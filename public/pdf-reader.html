<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Static GK & Current Affairs Vault — PDF Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>
<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
:root {
    --bg-main: #0b0f19;
    --bg-sidebar: #131a2e;
    --bg-toolbar: #131a2e;
    --text-main: #f8fafc;
    --text-muted: #64748b;
    --border-color: #1e293b;
    --primary: #06b6d4;
    --primary-hover: #0891b2;
    --primary-glow: rgba(6, 182, 212, 0.15);
    
    --yellow-hl: rgba(253, 224, 71, 0.45);
    --green-hl: rgba(74, 222, 128, 0.45);
    --pink-hl: rgba(244, 114, 182, 0.45);
    --blue-hl: rgba(96, 165, 250, 0.45);
    
    --sidebar-width: 300px;
    --toolbar-height: 56px;
    --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
}
body {
    font-family: 'Outfit', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* ─── Top Toolbar ─── */
.toolbar {
    height: var(--toolbar-height);
    background-color: var(--bg-toolbar);
    border-bottom: 1px solid var(--border-color);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 1.25rem;
    z-index: 10;
    flex-shrink: 0;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.15);
}
.toolbar-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    min-width: 0;
}
.back-btn {
    background: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-main);
    padding: 0.4rem 0.8rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    transition: all 0.2s var(--ease-in-out);
    white-space: nowrap;
}
.back-btn:hover {
    background-color: var(--border-color);
    border-color: var(--text-muted);
}
.pdf-title {
    font-size: 0.95rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-main);
}

.toolbar-center {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}
.nav-group {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    background: var(--bg-main);
    padding: 3px;
    border-radius: 8px;
    border: 1px solid var(--border-color);
}
.nav-btn {
    background: transparent;
    border: none;
    color: var(--text-main);
    width: 30px;
    height: 30px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
}
.nav-btn:hover {
    background-color: var(--border-color);
}
.nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}
.page-display {
    font-family: 'Fira Code', monospace;
    font-size: 0.8rem;
    padding: 0 0.5rem;
    min-width: 80px;
    text-align: center;
}

.zoom-group {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    background: var(--bg-main);
    padding: 3px;
    border-radius: 8px;
    border: 1px solid var(--border-color);
}

.toolbar-right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.75rem;
}

/* Tool Actions & Options */
.btn-group {
    display: flex;
    background: var(--bg-main);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 3px;
    gap: 3px;
}
.tool-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    width: 30px;
    height: 30px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
}
.tool-btn:hover {
    color: var(--text-main);
    background-color: var(--border-color);
}
.tool-btn.active {
    color: var(--primary);
    background-color: var(--border-color);
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.2);
}

/* Color Picker Dropdown */
.color-picker {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 0 4px;
}
.color-swatch {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s;
}
.color-swatch:hover {
    transform: scale(1.2);
}
.color-swatch.active {
    border-color: var(--text-main);
    transform: scale(1.2);
}
.swatch-yellow { background-color: #fde047; }
.swatch-green { background-color: #4ade80; }
.swatch-pink { background-color: #f472b6; }
.swatch-blue { background-color: #60a5fa; }
.swatch-orange { background-color: #fb923c; }
.swatch-purple { background-color: #c084fc; }
.swatch-red { background-color: #f87171; }
.swatch-teal { background-color: #2dd4bf; }

/* Dropdown select custom styling */
.tool-select {
    height: 30px;
    background: var(--bg-main);
    border: 1px solid var(--border-color);
    color: var(--text-main);
    border-radius: 6px;
    padding: 0 6px;
    font-family: inherit;
    font-size: 0.78rem;
    outline: none;
    cursor: pointer;
}

/* ─── Main View Workspace ─── */
.workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
}

/* Sidebar for PDFs and Bookmarks */
.sidebar {
    width: var(--sidebar-width);
    background-color: var(--bg-sidebar);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform 0.3s var(--ease-in-out);
}
/* Hide sidebar in fullscreen mode */
:fullscreen .sidebar {
    display: none !important;
}
:-webkit-full-screen .sidebar {
    display: none !important;
}
:-ms-fullscreen .sidebar {
    display: none !important;
}
.sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border-color);
    background: rgba(0,0,0,0.1);
}
.sidebar-tab {
    flex: 1;
    padding: 0.75rem;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-align: center;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
}
.sidebar-tab:hover {
    color: var(--text-main);
}
.sidebar-tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
}

.sidebar-search {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border-color);
}
.sidebar-search input {
    width: 100%;
    padding: 0.5rem 0.75rem;
    background: var(--bg-main);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    color: var(--text-main);
    font-family: inherit;
    font-size: 0.8rem;
    outline: none;
}
.sidebar-search input:focus {
    border-color: var(--primary);
}
.sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem;
}
.sidebar-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.65rem 0.75rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--text-muted);
    text-decoration: none;
    transition: all 0.2s;
    margin-bottom: 2px;
}
.sidebar-item:hover {
    background-color: rgba(255, 255, 255, 0.04);
    color: var(--text-main);
}
.sidebar-item.active {
    background-color: rgba(255,255,255,0.06);
    color: var(--primary);
    font-weight: 600;
}
.sidebar-item i {
    flex-shrink: 0;
}

/* PDF Render Viewer */
.viewer-viewport {
    flex: 1;
    overflow: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 2rem;
    background-color: var(--bg-main);
    position: relative;
    scroll-behavior: smooth;
}
.viewer-container {
    position: relative;
    box-shadow: 0 12px 30px -6px rgba(0, 0, 0, 0.4);
    background-color: #fff;
    margin: 0 auto;
    transition: transform 0.25s var(--ease-in-out);
}
#pdfCanvas {
    display: block;
}
#drawCanvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 2;
    cursor: crosshair;
}

/* Text Box Overlays */
.text-box-input {
    position: absolute;
    z-index: 100;
    background: var(--bg-sidebar);
    color: var(--text-main);
    border: 1px solid var(--primary);
    outline: none;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    padding: 4px 8px;
    border-radius: 4px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* Status Notifications */
.status-msg {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: #0ea5e9;
    color: #fff;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(14, 165, 233, 0.25);
    z-index: 50;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s var(--ease-in-out);
    pointer-events: none;
}
.status-msg.show {
    opacity: 1;
    transform: translateY(0);
}

:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
}

@media(max-width: 900px) {
    .sidebar {
        display: none;
    }
    .toolbar {
        grid-template-columns: auto 1fr;
    }
    .toolbar-center {
        display: none;
    }
}
</style>
</head>
<body>

<!-- Toolbar Header -->
<header class="toolbar">
    <div class="toolbar-left">
        <a href="index.html" class="back-btn">
            <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i>
            Exit
        </a>
        <div class="pdf-title" id="pdfName">Loading Document…</div>
    </div>

    <!-- Paging & Navigation Center -->
    <div class="toolbar-center">
        <!-- Paging Navigation -->
        <div class="nav-group">
            <button class="nav-btn" id="prevPageBtn" title="Previous Page">
                <i data-lucide="chevron-left" style="width: 16px; height: 16px;"></i>
            </button>
            <span class="page-display"><span id="pageNum">0</span> / <span id="pageCount">0</span></span>
            <button class="nav-btn" id="nextPageBtn" title="Next Page">
                <i data-lucide="chevron-right" style="width: 16px; height: 16px;"></i>
            </button>
        </div>

        <!-- Zoom Options -->
        <div class="zoom-group">
            <button class="nav-btn" id="zoomOutBtn" title="Zoom Out">
                <i data-lucide="zoom-out" style="width: 16px; height: 16px;"></i>
            </button>
            <span class="page-display" id="zoomLabel" style="min-width:60px;">130%</span>
            <button class="nav-btn" id="zoomInBtn" title="Zoom In">
                <i data-lucide="zoom-in" style="width: 16px; height: 16px;"></i>
            </button>
        </div>

        <!-- Page Actions -->
        <div class="zoom-group">
            <button class="nav-btn" id="actionRotate" title="Rotate Page 90° Clockwise">
                <i data-lucide="rotate-cw" style="width: 16px; height: 16px;"></i>
            </button>
        </div>
    </div>

    <!-- Annotations & System Actions -->
    <div class="toolbar-right">
        <!-- Tool Selection Group -->
        <div class="btn-group">
            <button class="tool-btn active" id="toolSelect" title="Select / Pan Mode">
                <i data-lucide="mouse-pointer" style="width: 16px; height: 16px;"></i>
            </button>
            <button class="tool-btn" id="toolDraw" title="Highlighter / Draw Pen Mode">
                <i data-lucide="highlighter" id="drawIndicatorIcon" style="width: 16px; height: 16px;"></i>
            </button>
            <button class="tool-btn" id="toolText" title="Add Text Annotation">
                <i data-lucide="type" style="width: 16px; height: 16px;"></i>
            </button>
            <button class="tool-btn" id="toolErase" title="Eraser Mode">
                <i data-lucide="eraser" style="width: 16px; height: 16px;"></i>
            </button>
        </div>

        <!-- Highlighter/Pen Tip dropdown -->
        <select class="tool-select" id="highlighterType" title="Tip shape or Stroke style" style="display:none;">
            <option value="chisel">Chisel Tip</option>
            <option value="round">Round Tip</option>
            <option value="underline">Underline</option>
            <option value="box">Box Block</option>
            <option value="opaque-free">Opaque Pen</option>
            <option value="opaque-line">Opaque Line</option>
        </select>

        <!-- Colors Selection -->
        <div class="color-picker" id="colorPicker" style="display:none;">
            <div class="color-swatch swatch-yellow active" data-color="yellow"></div>
            <div class="color-swatch swatch-green" data-color="green"></div>
            <div class="color-swatch swatch-pink" data-color="pink"></div>
            <div class="color-swatch swatch-blue" data-color="blue"></div>
            <div class="color-swatch swatch-orange" data-color="orange"></div>
            <div class="color-swatch swatch-purple" data-color="purple"></div>
            <div class="color-swatch swatch-red" data-color="red"></div>
            <div class="color-swatch swatch-teal" data-color="teal"></div>
        </div>

        <!-- Action Items (Undo, Clear, Bookmark, Fullscreen, Save) -->
        <div class="btn-group">
            <button class="tool-btn" id="actionUndo" title="Undo Last Annotation">
                <i data-lucide="undo-2" style="width: 16px; height: 16px;"></i>
            </button>
            <button class="tool-btn" id="actionClear" title="Clear Page Annotations">
                <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i>
            </button>
            <button class="tool-btn" id="actionBookmark" title="Bookmark This Page">
                <i data-lucide="bookmark" id="bookmarkIcon" style="width: 16px; height: 16px;"></i>
            </button>
        </div>

        <button class="tool-btn" id="actionSave" title="Save All Document Annotations" style="color:var(--primary)">
            <i data-lucide="save" style="width: 16px; height: 16px;"></i>
        </button>
        <button class="tool-btn" id="actionFullscreen" title="Toggle Fullscreen">
            <i data-lucide="maximize" id="fullscreenIcon" style="width: 16px; height: 16px;"></i>
        </button>
    </div>
</header>

<div class="workspace">
    <!-- Sidebar Panel -->
    <aside class="sidebar">
        <!-- Tabs -->
        <div class="sidebar-tabs">
            <button class="sidebar-tab active" id="tabFiles">Files</button>
            <button class="sidebar-tab" id="tabBookmarks">Bookmarks</button>
        </div>

        <!-- Local Scheme file:// Warning Banner -->
        <input type="file" id="localFilePicker" accept=".pdf" style="display:none">
        <div class="local-file-warning" id="localWarning" style="display:none; padding: 0.85rem; margin: 0.75rem; background: #7f1d1d; border: 1px solid #ef4444; border-radius: 8px; font-size: 0.75rem; line-height: 1.4;">
            <p style="font-weight:700; margin-bottom: 0.25rem; color:#fff;">⚠️ CORS Block (Local File Scheme)</p>
            <p style="margin-bottom: 0.5rem; color:#f8fafc;">Browsers restrict automatic PDF loading under file://. Launch a local web server, or select the PDF manually below:</p>
            <button class="back-btn" onclick="document.getElementById('localFilePicker').click()" style="width:100%; justify-content:center; padding:4px 0;">
                <i data-lucide="folder-open" style="width:12px; height:12px;"></i> Choose File Manually
            </button>
        </div>

        <!-- Files Section -->
        <div id="sidebarFilesSection" style="display: flex; flex-direction: column; flex: 1; min-height: 0;">
            <div class="sidebar-search">
                <input type="text" id="sidebarSearch" placeholder="Search files…">
            </div>
            <div class="sidebar-list" id="pdfList"></div>
        </div>

        <!-- Bookmarks Section -->
        <div id="sidebarBookmarksSection" style="display: none; flex-direction: column; flex: 1; min-height: 0;">
            <div class="sidebar-list" id="bookmarksList"></div>
        </div>
    </aside>

    <!-- Viewer Space -->
    <main class="viewer-viewport">
        <div class="viewer-container" id="viewerContainer">
            <canvas id="pdfCanvas"></canvas>
            <canvas id="drawCanvas"></canvas>
        </div>
    </main>
</div>

<div class="status-msg" id="statusMsg">Annotations Saved Successfully!</div>

<script src="mocks-data.js"></script>
<script>
// Configure PDF.js worker
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// Highlighter presets
const HIGHLIGHT_COLORS = {
    yellow: 'rgba(253, 224, 71, 0.45)',
    green: 'rgba(74, 222, 128, 0.45)',
    pink: 'rgba(244, 114, 182, 0.45)',
    blue: 'rgba(96, 165, 250, 0.45)',
    orange: 'rgba(251, 146, 60, 0.45)',
    purple: 'rgba(192, 132, 252, 0.45)',
    red: 'rgba(248, 113, 113, 0.45)',
    teal: 'rgba(45, 212, 191, 0.45)'
};

// Pen opaque presets
const OPAQUE_COLORS = {
    yellow: '#fde047',
    green: '#4ade80',
    pink: '#f472b6',
    blue: '#60a5fa',
    orange: '#fb923c',
    purple: '#c084fc',
    red: '#f87171',
    teal: '#2dd4bf'
};

// Underline solid presets
const UNDERLINE_COLORS = {
    yellow: '#d97706',
    green: '#15803d',
    pink: '#db2777',
    blue: '#2563eb',
    orange: '#ea580c',
    purple: '#9333ea',
    red: '#dc2626',
    teal: '#0d9488'
};


// Application State
let pdfDoc = null;
let currentPath = '';
let currentNum = 1;
let currentZoom = 1.3;
let currentRotation = 0;

let activeTool = 'select'; // 'select', 'draw', 'text', 'erase'
let activeColor = 'yellow';
let highlighterType = 'chisel'; // 'chisel', 'round', 'underline', 'box', 'opaque-free', 'opaque-line'

let isDrawing = false;
let drawings = {}; // key: filepath, value: { pageNum: [pathObjects] }
let bookmarks = {}; // key: filepath, value: [pageNumbers]
let currentPathPoints = [];

// DOM Elements
const canvas = document.getElementById('pdfCanvas');
const drawCanvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
const dCtx = drawCanvas.getContext('2d');
const viewerContainer = document.getElementById('viewerContainer');
const pdfNameDisplay = document.getElementById('pdfName');
const pageNumDisplay = document.getElementById('pageNum');
const pageCountDisplay = document.getElementById('pageCount');
const zoomLabel = document.getElementById('zoomLabel');

function htmlEnc(s) {
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
}

// Local storage management
function loadDrawings() {
    drawings = JSON.parse(localStorage.getItem('pdf_annotations') || '{}');
    bookmarks = JSON.parse(localStorage.getItem('pdf_bookmarks') || '{}');
}
function saveDrawings() {
    localStorage.setItem('pdf_annotations', JSON.stringify(drawings));
    localStorage.setItem('pdf_bookmarks', JSON.stringify(bookmarks));
    showStatus('Document Annotations Saved!');
}

function showStatus(text) {
    const el = document.getElementById('statusMsg');
    el.textContent = text;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
}

// PDF.js Page Rendering
async function renderPage(num) {
    if (!pdfDoc) return;
    currentNum = num;
    pageNumDisplay.textContent = num;
    
    document.getElementById('prevPageBtn').disabled = (num <= 1);
    document.getElementById('nextPageBtn').disabled = (num >= pdfDoc.numPages);
    
    // Update active page bookmark icon state
    updateBookmarkIconState();

    const page = await pdfDoc.getPage(num);
    const viewport = page.getViewport({ scale: currentZoom, rotation: currentRotation });
    
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    drawCanvas.width = viewport.width;
    drawCanvas.height = viewport.height;
    
    viewerContainer.style.width = viewport.width + 'px';
    viewerContainer.style.height = viewport.height + 'px';

    const renderCtx = {
        canvasContext: ctx,
        viewport: viewport
    };
    
    await page.render(renderCtx).promise;
    
    // Redraw vector annotations
    redrawAnnotations();
}

// Redraw vector annotations relative to canvas width/height
function redrawAnnotations() {
    dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    
    // Remove temporary input boxes
    document.querySelectorAll('.text-box-input').forEach(el => el.remove());

    const fileDrawings = drawings[currentPath] || {};
    const pageDrawings = fileDrawings[currentNum] || [];

    pageDrawings.forEach(path => {
        if (path.type === 'box') {
            const startX = path.points[0].x * drawCanvas.width;
            const startY = path.points[0].y * drawCanvas.height;
            const endX = path.points[1].x * drawCanvas.width;
            const endY = path.points[1].y * drawCanvas.height;
            
            dCtx.fillStyle = HIGHLIGHT_COLORS[path.color] || HIGHLIGHT_COLORS.yellow;
            dCtx.fillRect(startX, startY, endX - startX, endY - startY);
        } else if (path.type === 'text') {
            const startX = path.points[0].x * drawCanvas.width;
            const startY = path.points[0].y * drawCanvas.height;
            
            dCtx.fillStyle = OPAQUE_COLORS[path.color] || OPAQUE_COLORS.yellow;
            dCtx.font = "bold 14px 'Outfit', sans-serif";
            dCtx.fillText(path.text, startX, startY);
        } else {
            dCtx.beginPath();
            
            const isOpaque = path.type.startsWith('opaque');
            
            if (path.type === 'underline') {
                dCtx.lineWidth = 3;
                dCtx.lineCap = 'round';
                dCtx.lineJoin = 'round';
                dCtx.strokeStyle = UNDERLINE_COLORS[path.color] || UNDERLINE_COLORS.yellow;
            } else if (isOpaque) {
                dCtx.lineWidth = 3; // Thinner for writing pen
                dCtx.lineCap = 'round';
                dCtx.lineJoin = 'round';
                dCtx.strokeStyle = OPAQUE_COLORS[path.color] || OPAQUE_COLORS.yellow;
            } else {
                dCtx.lineWidth = (path.widthPercent || 0.02) * drawCanvas.width;
                dCtx.lineCap = path.type === 'round' ? 'round' : 'square';
                dCtx.lineJoin = path.type === 'round' ? 'round' : 'miter';
                dCtx.strokeStyle = HIGHLIGHT_COLORS[path.color] || HIGHLIGHT_COLORS.yellow;
            }

            path.points.forEach((pt, idx) => {
                const x = pt.x * drawCanvas.width;
                const y = pt.y * drawCanvas.height;
                if (idx === 0) dCtx.moveTo(x, y);
                else dCtx.lineTo(x, y);
            });
            dCtx.stroke();
        }
    });
}

// Coordinate Helpers
function getCanvasCoords(e) {
    const rect = drawCanvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
        x: clientX - rect.left,
        y: clientY - rect.top
    };
}

// Drawing Actions
function startDraw(e) {
    if (activeTool !== 'draw') return;
    isDrawing = true;
    const coords = getCanvasCoords(e);
    currentPathPoints = [coords];
}

function draw(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const coords = getCanvasCoords(e);
    
    // Lock horizontal line for Chisel/Round/Underline/OpaqueLine
    const isLineLock = highlighterType === 'underline' || highlighterType === 'opaque-line' || (highlighterType === 'chisel' && e.shiftKey);
    if (isLineLock && currentPathPoints.length > 0) {
        coords.y = currentPathPoints[0].y;
    }
    
    currentPathPoints.push(coords);
    dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    redrawAnnotations();

    // Render active drawing path
    if (highlighterType === 'box') {
        const start = currentPathPoints[0];
        dCtx.fillStyle = HIGHLIGHT_COLORS[activeColor];
        dCtx.fillRect(start.x, start.y, coords.x - start.x, coords.y - start.y);
    } else {
        dCtx.beginPath();
        const isOpaque = highlighterType.startsWith('opaque');
        
        if (highlighterType === 'underline') {
            dCtx.lineWidth = 3;
            dCtx.lineCap = 'round';
            dCtx.lineJoin = 'round';
            dCtx.strokeStyle = UNDERLINE_COLORS[activeColor] || UNDERLINE_COLORS.yellow;
        } else if (isOpaque) {
            dCtx.lineWidth = 3;
            dCtx.lineCap = 'round';
            dCtx.lineJoin = 'round';
            dCtx.strokeStyle = OPAQUE_COLORS[activeColor];
        } else {
            dCtx.lineWidth = 18;
            dCtx.lineCap = highlighterType === 'round' ? 'round' : 'square';
            dCtx.lineJoin = highlighterType === 'round' ? 'round' : 'miter';
            dCtx.strokeStyle = HIGHLIGHT_COLORS[activeColor];
        }
        
        currentPathPoints.forEach((pt, idx) => {
            if (idx === 0) dCtx.moveTo(pt.x, pt.y);
            else dCtx.lineTo(pt.x, pt.y);
        });
        dCtx.stroke();
    }
}

function endDraw() {
    if (!isDrawing) return;
    isDrawing = false;
    
    if (currentPathPoints.length > 1) {
        let savedPoints;
        if (highlighterType === 'box') {
            savedPoints = [
                { x: currentPathPoints[0].x / drawCanvas.width, y: currentPathPoints[0].y / drawCanvas.height },
                { x: currentPathPoints[currentPathPoints.length - 1].x / drawCanvas.width, y: currentPathPoints[currentPathPoints.length - 1].y / drawCanvas.height }
            ];
        } else {
            savedPoints = currentPathPoints.map(pt => ({
                x: pt.x / drawCanvas.width,
                y: pt.y / drawCanvas.height
            }));
        }

        if (!drawings[currentPath]) drawings[currentPath] = {};
        if (!drawings[currentPath][currentNum]) drawings[currentPath][currentNum] = [];

        drawings[currentPath][currentNum].push({
            type: highlighterType,
            color: activeColor,
            widthPercent: 18 / drawCanvas.width,
            points: savedPoints
        });
    }
    currentPathPoints = [];
    redrawAnnotations();
}

// Text Annotation Tool Handler
function handleTextAdd(e) {
    if (activeTool !== 'text') return;
    
    // Remove existing inputs first
    document.querySelectorAll('.text-box-input').forEach(el => el.remove());
    
    const coords = getCanvasCoords(e);
    
    // Create absolute text input element
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'text-box-input';
    input.placeholder = 'Type note and press Enter…';
    
    // Position input relative to drawing container
    const rect = drawCanvas.getBoundingClientRect();
    input.style.left = coords.x + 'px';
    input.style.top = (coords.y - 12) + 'px';
    
    viewerContainer.appendChild(input);
    input.focus();
    
    // Save on Enter
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            const val = input.value.trim();
            if (val) {
                if (!drawings[currentPath]) drawings[currentPath] = {};
                if (!drawings[currentPath][currentNum]) drawings[currentPath][currentNum] = [];
                
                drawings[currentPath][currentNum].push({
                    type: 'text',
                    color: activeColor,
                    text: val,
                    points: [{ x: coords.x / drawCanvas.width, y: coords.y / drawCanvas.height }]
                });
                redrawAnnotations();
            }
            input.remove();
        }
    });
    
    // Close if clicked away empty
    input.addEventListener('blur', () => {
        setTimeout(() => input.remove(), 100);
    });
}

// Eraser Logic
function handleEraser(e) {
    if (activeTool !== 'erase') return;
    const coords = getCanvasCoords(e);
    const nX = coords.x / drawCanvas.width;
    const nY = coords.y / drawCanvas.height;
    
    const fileDrawings = drawings[currentPath] || {};
    const pageDrawings = fileDrawings[currentNum] || [];
    
    let hitIndex = -1;
    for (let i = pageDrawings.length - 1; i >= 0; i--) {
        const path = pageDrawings[i];
        const isNear = path.points.some(pt => {
            const dx = pt.x - nX;
            const dy = pt.y - nY;
            return Math.sqrt(dx*dx + dy*dy) < 0.03; // threshold radius
        });
        if (isNear) {
            hitIndex = i;
            break;
        }
    }
    
    if (hitIndex > -1) {
        pageDrawings.splice(hitIndex, 1);
        redrawAnnotations();
    }
}

// Navigation & Bookmark Toggle
function updateBookmarkIconState() {
    const isBookmarked = (bookmarks[currentPath] || []).includes(currentNum);
    const icon = document.getElementById('bookmarkIcon');
    if (isBookmarked) {
        icon.setAttribute('data-lucide', 'bookmark-minus');
        icon.parentElement.style.color = 'var(--primary)';
    } else {
        icon.setAttribute('data-lucide', 'bookmark');
        icon.parentElement.style.color = 'inherit';
    }
    if (typeof lucide !== 'undefined') lucide.createIcons();
}

function toggleBookmark() {
    if (!currentPath) return;
    if (!bookmarks[currentPath]) bookmarks[currentPath] = [];
    
    const index = bookmarks[currentPath].indexOf(currentNum);
    if (index > -1) {
        // Remove bookmark
        bookmarks[currentPath].splice(index, 1);
        showStatus(`Bookmark Removed (Page ${currentNum})`);
    } else {
        // Add bookmark
        bookmarks[currentPath].push(currentNum);
        bookmarks[currentPath].sort((a,b)=>a-b);
        showStatus(`Page ${currentNum} Bookmarked!`);
    }
    updateBookmarkIconState();
    buildBookmarksList();
}

// Sidebar list generators
function buildSidebar(searchQuery = '') {
    const list = document.getElementById('pdfList');
    list.innerHTML = '';
    
    const pdfs = MOCK_DATA.filter(m => m.path.includes('pdf-reader.html?file='));
    const filtered = pdfs.filter(m => m.name.toLowerCase().includes(searchQuery.toLowerCase()));

    filtered.forEach(m => {
        const urlParams = new URLSearchParams(m.path.split('?')[1]);
        const filePath = urlParams.get('file');
        
        const item = document.createElement('div');
        item.className = 'sidebar-item';
        item.dataset.path = filePath;
        item.innerHTML = `<i data-lucide="file-text" style="width:16px;height:16px;"></i> <span>${htmlEnc(m.name)}</span>`;
        
        item.addEventListener('click', () => {
            loadPDF(filePath);
        });
        list.appendChild(item);
    });
    
    if (typeof lucide !== 'undefined') lucide.createIcons();
}

function buildBookmarksList() {
    const list = document.getElementById('bookmarksList');
    list.innerHTML = '';
    
    const fileBookmarks = bookmarks[currentPath] || [];
    if (fileBookmarks.length === 0) {
        list.innerHTML = `<div style="text-align:center; padding: 2rem; font-size:0.8rem; color:var(--text-muted);">No page bookmarks for this document.</div>`;
        return;
    }
    
    fileBookmarks.forEach(pageNo => {
        const item = document.createElement('div');
        item.className = 'sidebar-item';
        item.innerHTML = `<i data-lucide="bookmark" style="width:16px;height:16px;"></i> <span>Page ${pageNo}</span>`;
        item.addEventListener('click', () => {
            renderPage(pageNo);
        });
        list.appendChild(item);
    });
    
    if (typeof lucide !== 'undefined') lucide.createIcons();
}

// Document Load
async function loadPDF(source) {
    try {
        let loadingTask;
        if (typeof source === 'string') {
            currentPath = source;
            const filename = source.split('/').pop().replace(/\.pdf$/i, '');
            pdfNameDisplay.textContent = filename;
            loadingTask = pdfjsLib.getDocument(source);
        } else if (source instanceof File) {
            currentPath = source.name;
            pdfNameDisplay.textContent = source.name.replace(/\.pdf$/i, '');
            const arrayBuffer = await source.arrayBuffer();
            loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
        } else {
            return;
        }
        
        pdfDoc = await loadingTask.promise;
        pageCountDisplay.textContent = pdfDoc.numPages;
        
        document.getElementById('localWarning').style.display = 'none';

        if (typeof source === 'string') {
            document.querySelectorAll('.sidebar-item').forEach(el => {
                el.classList.toggle('active', el.dataset.path === source);
            });
        }
        
        currentRotation = 0;
        renderPage(1);
        buildBookmarksList();
    } catch(err) {
        console.error('Error loading PDF:', err);
        pdfNameDisplay.textContent = 'Error Loading PDF File';
        
        if (window.location.protocol === 'file:') {
            document.getElementById('localWarning').style.display = 'block';
        }
    }
}

// UI Bindings
document.addEventListener('DOMContentLoaded', () => {
    loadDrawings();

    const params = new URLSearchParams(window.location.search);
    const fileParam = params.get('file') || 'Current affairs PDF/Appointment 2026-01-08.pdf';
    
    if (window.location.protocol === 'file:') {
        document.getElementById('localWarning').style.display = 'block';
    }

    buildSidebar();
    loadPDF(fileParam);

    // Local file input
    document.getElementById('localFilePicker').addEventListener('change', e => {
        const file = e.target.files[0];
        if (file) loadPDF(file);
    });

    // Sidebar search
    document.getElementById('sidebarSearch').addEventListener('input', e => {
        buildSidebar(e.target.value);
    });

    // Paging Action events
    document.getElementById('prevPageBtn').addEventListener('click', () => {
        if (currentNum > 1) renderPage(currentNum - 1);
    });
    document.getElementById('nextPageBtn').addEventListener('click', () => {
        if (currentNum < pdfDoc.numPages) renderPage(currentNum + 1);
    });

    // Zooming Actions
    document.getElementById('zoomInBtn').addEventListener('click', () => {
        currentZoom = Math.min(3.0, currentZoom + 0.15);
        zoomLabel.textContent = Math.round(currentZoom * 100) + '%';
        renderPage(currentNum);
    });
    document.getElementById('zoomOutBtn').addEventListener('click', () => {
        currentZoom = Math.max(0.6, currentZoom - 0.15);
        zoomLabel.textContent = Math.round(currentZoom * 100) + '%';
        renderPage(currentNum);
    });

    // Rotate Action
    document.getElementById('actionRotate').addEventListener('click', () => {
        currentRotation = (currentRotation + 90) % 360;
        renderPage(currentNum);
    });

    // Tool Picker
    document.getElementById('toolSelect').addEventListener('click', () => {
        activeTool = 'select';
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('toolSelect').classList.add('active');
        document.getElementById('highlighterType').style.display = 'none';
        document.getElementById('colorPicker').style.display = 'none';
        drawCanvas.style.cursor = 'default';
    });

    document.getElementById('toolDraw').addEventListener('click', () => {
        activeTool = 'draw';
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('toolDraw').classList.add('active');
        document.getElementById('highlighterType').style.display = 'block';
        document.getElementById('colorPicker').style.display = 'flex';
        drawCanvas.style.cursor = 'crosshair';
    });

    document.getElementById('toolText').addEventListener('click', () => {
        activeTool = 'text';
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('toolText').classList.add('active');
        document.getElementById('highlighterType').style.display = 'none';
        document.getElementById('colorPicker').style.display = 'flex';
        drawCanvas.style.cursor = 'text';
    });

    document.getElementById('toolErase').addEventListener('click', () => {
        activeTool = 'erase';
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('toolErase').classList.add('active');
        document.getElementById('highlighterType').style.display = 'none';
        document.getElementById('colorPicker').style.display = 'none';
        drawCanvas.style.cursor = 'cell';
    });

    // Highlighter dropdown
    document.getElementById('highlighterType').addEventListener('change', e => {
        highlighterType = e.target.value;
        const icon = document.getElementById('drawIndicatorIcon');
        if (highlighterType.startsWith('opaque')) {
            icon.setAttribute('data-lucide', 'pen-tool');
        } else {
            icon.setAttribute('data-lucide', 'highlighter');
        }
        if (typeof lucide !== 'undefined') lucide.createIcons();
    });

    // Color swatches picker
    document.getElementById('colorPicker').addEventListener('click', e => {
        const swatch = e.target.closest('.color-swatch');
        if (!swatch) return;
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        swatch.classList.add('active');
        activeColor = swatch.dataset.color;
    });

    // Sidebar Tabs
    document.getElementById('tabFiles').addEventListener('click', () => {
        document.getElementById('tabFiles').classList.add('active');
        document.getElementById('tabBookmarks').classList.remove('active');
        document.getElementById('sidebarFilesSection').style.display = 'flex';
        document.getElementById('sidebarBookmarksSection').style.display = 'none';
    });
    document.getElementById('tabBookmarks').addEventListener('click', () => {
        document.getElementById('tabBookmarks').classList.add('active');
        document.getElementById('tabFiles').classList.remove('active');
        document.getElementById('sidebarBookmarksSection').style.display = 'flex';
        document.getElementById('sidebarFilesSection').style.display = 'none';
        buildBookmarksList();
    });

    // Undo / Clear / Bookmark / Fullscreen
    document.getElementById('actionUndo').addEventListener('click', () => {
        if (drawings[currentPath] && drawings[currentPath][currentNum]) {
            drawings[currentPath][currentNum].pop();
            redrawAnnotations();
        }
    });
    document.getElementById('actionClear').addEventListener('click', () => {
        if (confirm('Clear all annotations on this page?')) {
            if (drawings[currentPath] && drawings[currentPath][currentNum]) {
                drawings[currentPath][currentNum] = [];
                redrawAnnotations();
            }
        }
    });
    document.getElementById('actionBookmark').addEventListener('click', toggleBookmark);
    document.getElementById('actionSave').addEventListener('click', saveDrawings);

    document.getElementById('actionFullscreen').addEventListener('click', () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.error(`Error entering fullscreen: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    });
    document.addEventListener('fullscreenchange', () => {
        const icon = document.getElementById('fullscreenIcon');
        if (document.fullscreenElement) {
            icon.setAttribute('data-lucide', 'minimize');
        } else {
            icon.setAttribute('data-lucide', 'maximize');
        }
        if (typeof lucide !== 'undefined') lucide.createIcons();
    });

    // Keyboard Shortcuts Binding
    document.addEventListener('keydown', e => {
        // Ignore shortcuts when editing text inputs
        const activeTag = document.activeElement.tagName;
        if (activeTag === 'INPUT' || activeTag === 'TEXTAREA') {
            return;
        }

        const isCtrl = e.ctrlKey || e.metaKey;

        switch (e.key.toLowerCase()) {
            case 'arrowleft':
            case 'pageup':
                e.preventDefault();
                if (currentNum > 1) renderPage(currentNum - 1);
                break;
            case 'arrowright':
            case 'pagedown':
                e.preventDefault();
                if (currentNum < pdfDoc.numPages) renderPage(currentNum + 1);
                break;
            case '=':
            case '+':
                if (isCtrl) e.preventDefault();
                document.getElementById('zoomInBtn').click();
                break;
            case '-':
                if (isCtrl) e.preventDefault();
                document.getElementById('zoomOutBtn').click();
                break;
            case 'v':
                document.getElementById('toolSelect').click();
                showStatus('Mode: Select / Pan');
                break;
            case 'h':
                document.getElementById('toolDraw').click();
                showStatus('Mode: Highlighter');
                break;
            case 't':
                document.getElementById('toolText').click();
                showStatus('Mode: Text Annotation');
                break;
            case 'e':
                document.getElementById('toolErase').click();
                showStatus('Mode: Eraser');
                break;
            case 'r':
                e.preventDefault();
                document.getElementById('actionRotate').click();
                break;
            case 'b':
                e.preventDefault();
                toggleBookmark();
                break;
            case 'z':
                if (isCtrl) {
                    e.preventDefault();
                    document.getElementById('actionUndo').click();
                }
                break;
            case 's':
                if (isCtrl) {
                    e.preventDefault();
                    saveDrawings();
                }
                break;
            case 'f':
                e.preventDefault();
                document.getElementById('actionFullscreen').click();
                break;
        }
    });

    // Mouse & Touch binds
    drawCanvas.addEventListener('mousedown', startDraw);
    drawCanvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', endDraw);
    drawCanvas.addEventListener('click', e => {
        handleTextAdd(e);
        handleEraser(e);
    });

    drawCanvas.addEventListener('touchstart', startDraw, { passive: false });
    drawCanvas.addEventListener('touchmove', draw, { passive: false });
    drawCanvas.addEventListener('touchend', endDraw);

    if (typeof lucide !== 'undefined') lucide.createIcons();
});
</script>
