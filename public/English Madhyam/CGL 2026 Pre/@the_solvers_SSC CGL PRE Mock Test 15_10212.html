    "correct_option_id": 3,
    "solution": "<p><strong>D)&nbsp;Will the research team have completed the project before the deadline?</strong></p>\r\n\r\n<p>Passive से Active Voice में बदलने के लिए, Passive वाक्य का Subject Active वाक्य का Object बन जाता है और &quot;by + doer&quot; Active वाक्य का Subject बन जाता है। Verb को Passive से Active में बदलते समय सही Tense का ध्यान रखा जाता है। यहाँ &quot;the project&quot; Subject है, &quot;will have been completed&quot; (Future Perfect Passive) Verb है और &quot;by the research team&quot; doer है। Active में बदलने पर &quot;the research team&quot; Subject बन जाता है, Verb &quot;will have completed&quot; (Future Perfect) हो जाता है और &quot;the project&quot; Object बन जाता है। साथ ही, प्रश्नवाचक संरचना बनाए रखने के लिए &quot;Will&quot; से वाक्य शुरू होता है। इसलिए सही वाक्य है &mdash; &quot;Will the research team have completed the project before the deadline?&quot;</p>\r\n\r\n<p>To change a sentence from Passive to Active Voice, the subject of the passive sentence becomes the object, and the doer (introduced by &quot;by&quot;) becomes the subject. The verb is converted into the correct active tense. In this case, &quot;the project&quot; (Subject), &quot;will have been completed&quot; (Future Perfect Passive), and &quot;by the research team&quot; are transformed into &quot;the research team&quot; (Subject), &quot;will have completed&quot; (Active Verb in Future Perfect), and &quot;the project&quot; (Object). The interrogative structure is maintained by starting with &quot;Will&quot;. Hence, the correct answer is &mdash; &quot;Will the research team have completed the project before the deadline?&quot; (Option 4)</p>",

    "solution": "<p><strong>C)&nbsp;Why doesn&#39;t the body reject benign tumours?</strong></p>\r\n\r\n<p>Passive से Active Voice में बदलने के लिए, Passive वाक्य का Subject Active वाक्य का Object बन जाता है और &quot;by + doer&quot; Active वाक्य का Subject बन जाता है। Verb को Passive से Active में बदलते समय सही Tense और Auxiliary Verb का ध्यान रखा जाता है। यहाँ &quot;benign tumours&quot; Subject है, &quot;aren&rsquo;t rejected&quot; (Present Simple Passive) Verb है और &quot;by the body&quot; doer है। Active में बदलने पर &quot;the body&quot; Subject बन जाता है, Verb &quot;doesn&rsquo;t reject&quot; (Present Simple Negative) हो जाता है और &quot;benign tumours&quot; Object बन जाता है। साथ ही, प्रश्नवाचक संरचना बनाए रखने के लिए &quot;Why doesn&rsquo;t&quot; से वाक्य शुरू होता है। इसलिए सही वाक्य है &mdash; &quot;Why doesn&rsquo;t the body reject benign tumours?&quot;</p>\r\n\r\n<p>To change a sentence from Passive to Active Voice, the subject of the passive sentence becomes the object, and the doer (introduced by &quot;by&quot;) becomes the subject. The verb is converted into the correct active form with proper auxiliary usage. In this case, &quot;benign tumours&quot; (Subject), &quot;aren&rsquo;t rejected&quot; (Present Simple Passive), and &quot;by the body&quot; are transformed into &quot;the body&quot; (Subject), &quot;doesn&rsquo;t reject&quot; (Active Verb in Present Simple Negative), and &quot;benign tumours&quot; (Object). The interrogative form is maintained by starting with &quot;Why doesn&rsquo;t&quot;. Hence, the correct answer is &mdash; &quot;Why doesn&rsquo;t the body reject benign tumours?&quot; (Option 3)</p>",

    "solution": "<p>A) . The officer said that the library would be supplied with sufficient number of books within one month.</p>\r\n\r\n<p>Direct से Indirect Narration में बदलते समय <strong>Reporting Verb</strong>, <strong>Tense</strong> और <strong>Modal Verb</strong> में परिवर्तन किया जाता है। दिए गए वाक्य में Reporting Verb <strong>&quot;said&quot;</strong> Past Tense में है, इसलिए Reported Speech का <strong>Future Tense (will)</strong> बदलकर <strong>Future in the Past (would)</strong> हो जाता है।<br />\r\nDirect वाक्य में &quot;will be supplied&quot; (Future Passive) प्रयोग हुआ है, जो Indirect में बदलकर &quot;would be supplied&quot; हो जाता है। बाकी वाक्य संरचना वही रहती है।</p>\r\n\r\n<p>To convert Direct Speech into Indirect Speech, the tense of the reported clause changes according to the reporting verb. Since the reporting verb <strong>&quot;said&quot;</strong> is in the past tense, the modal <strong>&quot;will&quot;</strong> changes to <strong>&quot;would&quot;</strong>. The passive construction is retained, so &quot;will be supplied&quot; correctly becomes &quot;would be supplied&quot; in Indirect Narration.</p>",
