    "solution": "<p><strong>D)&nbsp;Were the Greeks defeated by the Romans?</strong></p>\r\n\r\n<p>Active से Passive Voice में बदलने के लिए, Active वाक्य का Object Passive वाक्य का Subject बन जाता है। Verb को Active से Passive में बदलते समय सही Tense का प्रयोग किया जाता है। यहाँ &quot;the Romans&quot; Subject है, &quot;did defeat&quot; (Past Simple, interrogative form) Verb है और &quot;the Greeks&quot; Object है। Passive में बदलने पर Object &quot;the Greeks&quot; Subject बन जाता है, Verb को &quot;were defeated&quot; (Past Simple Passive) में बदला जाता है और &quot;by the Romans&quot; जोड़ा जाता है। साथ ही, प्रश्नवाचक संरचना बनाए रखने के लिए &quot;Were&quot; से वाक्य शुरू होता है। इसलिए सही वाक्य है &mdash; &quot;Were the Greeks defeated by the Romans?&quot;</p>\r\n\r\n<p>To change a sentence from Active to Passive Voice, the object of the active sentence becomes the subject of the passive sentence. The verb is changed into the passive form with the correct tense. In this case, &quot;the Romans&quot; (Subject), &quot;did defeat&quot; (Verb in Past Simple interrogative form), and &quot;the Greeks&quot; (Object) are transformed into &quot;the Greeks&quot; (Subject), &quot;were defeated&quot; (Passive Verb in Past Simple), and &quot;by the Romans&quot;. The interrogative structure is maintained by starting with &quot;Were&quot;. Hence, the correct answer is &mdash; &quot;Were the Greeks defeated by the Romans?&quot; (Option 4)</p>",
