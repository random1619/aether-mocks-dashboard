    "solution": "<p><strong>B)&nbsp; P, R, Q, S</strong></p>\r\n\r\n<p>He fuelled his body for the rigorous workout by adhering to a particular diet and drinking plenty of water.&nbsp;Throughout the week, he increased his endurance by running shorter distances&nbsp;He pushed his body to its limits by going on lengthy runs on the weekends. He was tired but elated when he crossed the finish line on race day</p>\r\n\r\n<p>Sentence P सबसे पहले आता है क्योंकि यह training की preparation stage introduce करता है। यहाँ &ldquo;He fuelled his body&rdquo; phrase बताता है कि intense workouts से पहले वह diet और hydration पर ध्यान देता है। यह passage की शुरुआत के लिए सही है क्योंकि physical effort से पहले body preparation logically आती है।</p>\r\n\r\n<p>Sentence R, Sentence P के बाद आता है क्योंकि अब actual weekly training routine explain किया जा रहा है। &ldquo;Throughout the week&rdquo; time marker दिखाता है और बताता है कि वह shorter distances run करके endurance बढ़ाता है। यह preparation के बाद regular practice को logically follow करता है।</p>\r\n\r\n<p>Sentence Q, Sentence R के बाद आता है क्योंकि यह training का intense phase दिखाता है। Weekend long runs body को limits तक push करने को दर्शाते हैं, जो weekly practice के next level के रूप में naturally fit होता है।</p>\r\n\r\n<p>Sentence S paragraph का conclusion है क्योंकि यह पूरे training process का final outcome बताता है। &ldquo;Race day&rdquo; completion stage है, और &ldquo;tired but elated&rdquo; emotions training के result को express करते हैं। इसलिए यह sentence अंत में आता है।</p>\r\n\r\n<p>Sentence P comes first because it introduces the preparation stage of the training. The phrase &ldquo;He fuelled his body&rdquo; shows that before starting intense physical activity, he focused on diet and hydration. Beginning with preparation creates a logical starting point for the paragraph.</p>\r\n\r\n<p>Sentence R follows Sentence P because it explains the regular weekly routine. The time expression &ldquo;Throughout the week&rdquo; clearly shows consistency, and running shorter distances helps build endurance. This naturally comes after body preparation.</p>\r\n\r\n<p>Sentence Q comes next as it describes the most demanding part of the training. Long weekend runs represent pushing the body to its limits, which logically follows the weekday endurance-building routine.</p>\r\n\r\n<p>Sentence S comes last because it shows the final result of all the training. &ldquo;Race day&rdquo; marks the completion of the entire process, and the emotions &ldquo;tired but elated&rdquo; reflect the outcome of sustained effort.</p>",

  {
    "question": "<p><strong>Read the passage and answer the following question:&nbsp;</strong></p>\r\n\r\n<p>In today&#39;s technology-centric era, electronic devices have become indispensable to modern life. From smartphones and laptops to home appliances, the demand for newer and faster gadgets continues to escalate. However, this increasing dependence has brought about a critical challenge: electronic waste, commonly known as e-waste.<br />\r\nE-waste refers to discarded electrical or electronic equipment that is obsolete or non-functional. Unlike regular waste, it contains hazardous substances such as lead, mercury, and cadmium. Improper disposal of e-waste allows these toxins to seep into soil and water bodies, causing severe environmental degradation and posing long-term health risks.<br />\r\nDeveloping nations are particularly vulnerable, as they often receive large volumes of e-waste from wealthier countries. In many cases, informal recycling sectors handle this waste without adequate safety measures. Workers, including children, dismantle devices manually, exposing themselves to toxic chemicals and dangerous working conditions.<br />\r\nOn the brighter side, responsible recycling of e-waste enables the recovery of valuable materials like copper, gold, and high-quality plastics. This not only mitigates environmental harm but also reduces the strain on natural resources. Governments and environmental agencies are advocating for sustainable practices such as repairing old devices, donating functional electronics, and following safe recycling methods. Public awareness, coupled with stringent regulations, is vital for tackling this escalating problem.<br />\r\nIn conclusion, managing e-waste effectively demands both individual accountability and collective efforts. Adopting eco-friendly habits can lead us toward a cleaner, safer, and more sustainable future.</p>\r\n\r\n<p><strong>Identify the type of the following sentence and justify your answer:</strong><br />\r\n&quot;Improper disposal of e-waste allows these toxins to seep into soil and water bodies, causing severe environmental degradation and posing long-term health risks.&quot;</p>",
