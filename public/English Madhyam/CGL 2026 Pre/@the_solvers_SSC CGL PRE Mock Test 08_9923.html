    "solution": "<p><strong>C) The manager is reviewing the report.</strong></p>\r\n\r\n<p>Passive से Active Voice में बदलने के लिए, Passive वाक्य का <strong>Agent</strong> (by whom) Active वाक्य का <strong>Subject</strong> बन जाता है। Verb को Passive से Active में बदलते समय <strong>Tense</strong> वही रखा जाता है। दिए गए वाक्य में &quot;The report&quot; Subject है, &quot;is being reviewed&quot; Verb (Present Continuous Passive) है और &quot;by the manager&quot; Agent है। Active में बदलने पर &quot;the manager&quot; Subject बन गया है, Verb को &quot;is reviewing&quot; (Present Continuous Active) में बदला गया है और &quot;the report&quot; Object बन गया है।</p>\r\n\r\n<p>To change a sentence from Passive to Active Voice, the agent of the passive sentence becomes the subject of the active sentence, and the verb is changed accordingly while keeping the tense the same. In this case, &quot;The report&quot; is the subject, &quot;is being reviewed&quot; is the verb in Present Continuous Passive, and &quot;by the manager&quot; is the agent. In the active form, &quot;the manager&quot; becomes the subject, the verb changes to &quot;is reviewing&quot; (Present Continuous Active), and &quot;the report&quot; becomes the object.</p>",
