    "solution": "<p><strong>B)&nbsp;Which type of books do you read?</strong></p>\r\n\r\n<p>Passive से Active Voice में बदलने के लिए, Passive वाक्य का Subject (agent) Active वाक्य का Subject बन जाता है और Passive का Subject Active का Object बन जाता है। Interrogative sentence में helping verb पहले आता है और tense वही रखा जाता है। दिए गए वाक्य में &quot;Which type of books&quot; Passive Subject है, &quot;are read&quot; Verb (Simple Present Passive) है और &quot;by you&quot; agent है। Active में बदलने पर &quot;you&quot; Subject बन गया है, Verb को &quot;do read&quot; (Simple Present Interrogative) में बदला गया है और &quot;which type of books&quot; Object के रूप में प्रयोग हुआ है। इसलिए सही वाक्य होगा &mdash; &quot;Which type of books do you read?&quot;</p>\r\n\r\n<p>To change a sentence from Passive to Active Voice, the agent becomes the subject and the passive subject becomes the object, while maintaining the same tense and interrogative structure. Here, &quot;Which type of books&quot; (Passive Subject), &quot;are read&quot; (Simple Present Passive), and &quot;by you&quot; (agent) are transformed into &quot;you&quot; (Subject), &quot;do read&quot; (Active Verb in Simple Present Interrogative), and &quot;which type of books&quot; (Object). Therefore, the correct sentence is &mdash; &quot;Which type of books do you read?&quot;</p>",
