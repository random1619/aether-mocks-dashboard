    "question": "<p><strong>Which of the following options is the most suitable conversion of the following sentence into Passive Voice?</strong></p>\r\n\r\n<p>Does she check all the final calculations before the launch?</p>",

    "options": [

    ],
    "correct_option_id": 0,
    "solution": "<p><strong>A)&nbsp;Are all the final calculations checked by her before the launch?</strong></p>\r\n\r\n<p>Active से Passive Voice में बदलने के लिए, Active वाक्य का Object Passive वाक्य का Subject बन जाता है। Interrogative sentence में helping verb पहले आता है और tense वही रखा जाता है। दिए गए वाक्य में &quot;she&quot; Subject है, &quot;does check&quot; Verb (Simple Present Interrogative) है और &quot;all the final calculations&quot; Object है। Passive में बदलने पर Object &quot;all the final calculations&quot; Subject बन गया है, Verb को &quot;are checked&quot; (Simple Present Passive) में बदला गया है और &quot;by her&quot; agent के रूप में प्रयोग हुआ है। इसलिए सही वाक्य होगा &mdash; &quot;Are all the final calculations checked by her before the launch?&quot;</p>\r\n\r\n<p>To change a sentence from Active to Passive Voice, the object becomes the subject, and in interrogative sentences, the helping verb comes first while maintaining the same tense. Here, &quot;she&quot; (Subject), &quot;does check&quot; (Verb in Simple Present Interrogative), and &quot;all the final calculations&quot; (Object) are transformed into &quot;all the final calculations&quot; (Subject), &quot;are checked&quot; (Passive Verb in Simple Present), and &quot;by her&quot; (agent). Therefore, the correct sentence is &mdash; &quot;Are all the final calculations checked by her before the launch?&quot;</p>",

  },

    "question": "<p><strong>Which of the following options is the most suitable conversion of the following sentence into active voice?</strong></p>\r\n\r\n<p>The new rules had been strictly enforced by the government before the elections.</p>",

    ],
    "correct_option_id": 2,
    "solution": "<p><strong>C)&nbsp; The government had strictly enforced the new rules before the elections.</strong></p>\r\n\r\n<p>Passive से Active Voice में बदलने के लिए, Passive वाक्य का Subject (agent) Active वाक्य का Subject बन जाता है और Passive का Subject Active का Object बन जाता है। Verb को Passive से Active में बदलते समय वही tense रखा जाता है। दिए गए वाक्य में &quot;The new rules&quot; Passive Subject है, &quot;had been enforced&quot; Verb (Past Perfect Passive) है और &quot;by the government&quot; agent है। Active में बदलने पर &quot;the government&quot; Subject बन गया है, Verb को &quot;had enforced&quot; (Past Perfect) में बदला गया है और &quot;the new rules&quot; Object के रूप में प्रयोग हुआ है। इसलिए सही वाक्य होगा &mdash; &quot;The government had strictly enforced the new rules before the elections.&quot;</p>\r\n\r\n<p>To change a sentence from Passive to Active Voice, the agent becomes the subject and the passive subject becomes the object while keeping the same tense. Here, &quot;The new rules&quot; (Passive Subject), &quot;had been enforced&quot; (Past Perfect Passive), and &quot;by the government&quot; (agent) are transformed into &quot;the government&quot; (Subject), &quot;had enforced&quot; (Active Verb in Past Perfect), and &quot;the new rules&quot; (Object). Therefore, the correct sentence is &mdash; &quot;The government had strictly enforced the new rules before the elections.&quot;</p>",

  },

    "solution": "<p>B) Indirect Speech: The supervisor asked whether the reports that were supposed to be finalized last week had been submitted to the review committee.</p>\r\n\r\n<p>Direct Speech: &ldquo;Had the final reports from last week been submitted to the committee?&rdquo; the supervisor asked.</p>\r\n\r\n<p>परिवर्तन के नियम: (1) &quot;asked whether&quot; &rarr; Direct question form (remove &quot;whether&quot;); (2) &quot;had been submitted&quot; (Past Perfect Passive) &rarr; retained as &quot;Had...been submitted&quot; in the question form; (3) &quot;that were supposed to be finalized last week&quot; &rarr; simplified as &quot;from last week&quot;; (4) &quot;review committee&quot; &rarr; &quot;committee&quot;.</p>\r\n\r\n<p>A is incorrect &ndash; &quot;Did you submit...?&quot; changes the verb from Passive to Active and shifts the subject to &quot;you&quot;, which is not implied in the indirect speech.</p>\r\n\r\n<p>C is incorrect &ndash; &quot;Have last week&rsquo;s reports been sent...?&quot; changes Past Perfect to Present Perfect and uses &quot;sent&quot; instead of &quot;submitted&quot;, altering the original meaning.</p>\r\n\r\n<p>D is incorrect &ndash; &quot;Were the reports due last week submitted to the review team?&quot; changes &quot;review committee&quot; to &quot;review team&quot; and uses Simple Past Passive instead of Past Perfect Passive.</p>",
