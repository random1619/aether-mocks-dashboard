    "correct_option_id": 3,
    "solution": "<p>D) Sairam said that she had to go to Delhi to him within the following couple of hours to take help to solve the problem she had mentioned.</p>\r\n\r\n<p>Direct से Indirect Narration में बदलते समय <strong>Pronoun</strong>, <strong>Tense</strong>, <strong>Time expression</strong> और <strong>Place-direction (come/go)</strong> में परिवर्तन किया जाता है। Reporting Verb &ldquo;said&rdquo; Past Tense में है, इसलिए Reported Speech का Tense backshift होता है। Direct Speech में &ldquo;has to come&rdquo; (Present obligation) को Indirect में <strong>had to go</strong> किया जाता है, क्योंकि Speaker &ldquo;Sairam&rdquo; से दूरी के कारण <strong>come &rarr; go</strong> का परिवर्तन आवश्यक है। &ldquo;to me&rdquo; Indirect में <strong>to him</strong> बनता है। Time expression &ldquo;within the next couple of hours&rdquo; को Indirect Speech में <strong>within the following couple of hours</strong> किया जाता है। साथ ही &ldquo;she mentioned&rdquo; (Simple Past) को <strong>she had mentioned</strong> (Past Perfect) में बदला जाता है।\\</p>\r\n\r\n<p>To change a sentence from <strong>Direct to Indirect Narration</strong>, necessary changes are made in <strong>pronouns, tense, time expressions, and verbs of motion (come/go)</strong>. In the given sentence, the reporting verb <strong>&ldquo;said&rdquo;</strong> is in the past tense, so the reported speech undergoes backshifting. The expression <strong>&ldquo;has to come&rdquo;</strong> changes to <strong>&ldquo;had to go&rdquo;</strong> because the movement is away from the speaker in indirect narration. The pronoun <strong>&ldquo;me&rdquo;</strong> changes to <strong>&ldquo;him&rdquo;</strong>, and the time expression <strong>&ldquo;within the next couple of hours&rdquo;</strong> changes to <strong>&ldquo;within the following couple of hours.&rdquo;</strong> The verb <strong>&ldquo;mentioned&rdquo;</strong> is changed to <strong>&ldquo;had mentioned&rdquo;</strong> following the sequence of tenses.</p>",
