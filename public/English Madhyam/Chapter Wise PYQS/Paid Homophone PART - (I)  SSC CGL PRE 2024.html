    <script>
        const questions = [
  {
    "question": "<strong>Select the most appropriate homophone to fill in the blank.</strong> <br /> He has the ________ to express his thoughts.",
    "options": [
      "Right",
      "Ride",
      "Write",
      "Rite"
    ],
    "correct_option_id": 0,
    "solution": "'A)right'का use होगा क्योंकि 'right' का अर्थ है किसी कार्य को करने का अधिकार या स्वतंत्रता। वाक्य में बताया गया है कि व्यक्ति को अपने विचार व्यक्त करने का अधिकार है, इसलिए 'right' यहाँ सही विकल्प है। जबकि 'ride' का अर्थ है सवारी करना, 'write' का अर्थ है लिखना, और 'rite' का अर्थ है किसी धार्मिक या पारंपरिक अनुष्ठान, जो इस संदर्भ में सही नहीं है। <br /> 'right'will be used because it means having the freedom or authority to do something. The sentence states that the person has the right to express his thoughts, making 'right' the correct option. Whereas, 'ride' means to travel on something, 'write' means to put words on paper, and 'rite' refers to a religious or traditional ceremony, which do not fit the context.",
    "question_index": 0
  },
  {
    "question": "<strong>Select the most appropriate homophone to fill in the blank.</strong> <br /> The ____________ was decorated with candles and chocolates everywhere",
    "options": [
      "flor",
      "floor",
      "flour",
      "flower"
    ],
    "correct_option_id": 1,
    "solution": "B)Floorका use होगा क्योंकि \"floor\" का अर्थ है वह सतह जिस पर हम चलते हैं। sentence में mention है कि सतह को मोमबत्तियों और चॉकलेट से सजाया गया है, इसलिए 'floor' यहाँ सही है। जबकि 'Flor' एक सही शब्द नहीं है, 'Flour' का अर्थ है आटा, और 'Flower' का अर्थ है फूल, जो इस context में सही नहीं हैं। <br /> Floor will be used because it means the surface we walk on. The sentence mentions that the surface was decorated with candles and chocolates, making 'floor' the correct choice here. Whereas, 'Flor' is not a correct word, 'Flour' means finely ground powder used for baking, and 'Flower' means a plant blossom, which don't fit in this context.",
    "question_index": 1
  },
  {
    "question": "<strong>Select the most appropriate homophone to fill in the blank.</strong> <br /> The ointment will help to _____ the wound.",
    "options": [
      "heel",
      "kneel",
      "heal",
      "he’ll"
    ],
    "correct_option_id": 2,
    "solution": "C)'Heal'का use होगा क्योंकि \"heal\" का अर्थ है घाव या चोट को ठीक करना। sentence में बताया गया है कि मरहम घाव को ठीक करने में मदद करेगा, इसलिए 'heal' यहाँ सही है। जबकि 'Heel' का अर्थ है एड़ी, जो इस संदर्भ में सही नहीं है, 'Kneel' का अर्थ है घुटनों के बल झुकना, जो इस संदर्भ में अनुपयुक्त है, और 'He’ll' एक संक्षिप्त रूप है \"he will\" का, जो sentence में सही नहीं है। <br /> 'Heal'will be used because it means to cure or make an injury better. The sentence suggests that the ointment will help improve the wound, making 'heal' the correct choice. <br /> Whereas, 'Heel' means the back part of the foot, which doesn’t fit the context, 'Kneel' means to bend down on knees, which is inappropriate here, and 'He’ll' is a contraction of \"he will,\" which doesn't suit the sentence grammatically.",
    "question_index": 2
  },
  {
    "question": "<strong>Select the most appropriate homophone to fill in the blank.</strong> <br /> He ________ his bike as fast as he could to reach home.",
    "options": [
      "rode",
      "rowed",
      "rote",
      "road"
    ],
    "correct_option_id": 0,
    "solution": "A)Rode'का use होगा क्योंकि इसका अर्थ होता है \"सवारी करना\" या \"किसी वाहन को चलाना\"। Sentence में कहा गया है कि उसने अपनी बाइक जितनी तेज़ हो सके चलाई, इसलिए 'rode' सही है। जबकि: 'Rowed' का अर्थ है \"चप्पू चलाना\", जो यहां bike के संदर्भ में सही नहीं है। 'Rote' का अर्थ है \"याद करना\" बिना समझे, जो sentence के context से मेल नहीं खाता। 'Road' का अर्थ होता है \"सड़क\", जो इस स्थिति में फिट नहीं बैठता। <br /> Rode'will be used because it means \"to ride\" or \"to travel on a vehicle.\" The sentence says he drove his bike as fast as possible, so 'rode' is correct. While: 'Rowed' means \"to use oars in a boat,\" which doesn't match the context of riding a bike. 'Rote' means \"to memorize without understanding,\" which doesn’t fit here. 'Road' means \"a pathway,\" which is incorrect in this context.",
    "question_index": 3
  },
  {
    "question": "<strong>Select the most appropriate homonyms from the given alternatives to fill in the blanks.</strong> <br /> The rowing instructor commanded them to ________ in a ________. <br /> A.row (verb) <br /> B.roe <br /> C.row (sequence)",
    "options": [
      "A, B",
      "B, C",
      "A, C",
      "C, A"
    ],
    "correct_option_id": 2,
    "solution": "C)'Row'(verb) का use होगा क्योंकि \"row\" का अर्थ होता है नाव को पानी में चलाना या चप्पू चलाना। यहां पर बोटिंग की बात की जा रही है, इसलिए \"row\" (verb) उपयुक्त है। दूसरा \"row\" (sequence) का use होगा क्योंकि यह एक अनुक्रम या पंक्ति को संदर्भित करता है। यहां 'sequence' का अर्थ एक क्रमबद्ध पंक्ति में होने से है। जबकि 'roe' का अर्थ मछली के अंडे से है, जो इस context में सही नहीं है। <br /> 'Row'(verb) will be used because it means to propel a boat using oars. In the sentence, the context is about a rowing activity, making 'row' (verb) appropriate. The second 'row' (sequence) refers to a line or an ordered arrangement. The word 'roe' refers to fish eggs, which doesn't fit in this context.",
    "question_index": 4
  },
  {
    "question": "<strong>Select the most appropriate homophone to fill in the blank.</strong> <br /> The summer was ______ hot this year.",
    "options": [
      "two",
      "to",
      "too",
      "tow"
    ],
    "correct_option_id": 2,
    "solution": "C)'Too'का उपयोग किया जाएगा क्योंकि 'too' का अर्थ है \"बहुत अधिक\" या \"अत्यधिक\"। इस sentence में गर्मी के अत्यधिक होने का जिक्र है, इसलिए 'too' यहाँ सही उत्तर है। जबकि 'Two' का अर्थ है संख्या 2, 'To' का उपयोग दिशा या उद्देश्य के लिए होता है, और 'Tow' का अर्थ है खींचना, जो इस context में सही नहीं है। <br /> Too'will be used because 'too' means \"very\" or \"excessively.\" In this sentence, it refers to the extreme heat of the summer, making 'too' the correct choice. Whereas, 'Two' refers to the number 2, 'To' is used for direction or purpose, and 'Tow' means to pull, which do not fit in this context",
    "question_index": 5
  },
  {
    "question": "<strong>Select the most appropriate homophone to fill in the blank.</strong> <br /> Ruby gave her mother a hug and offered to knead the ________.",
    "options": [
      "flora",
      "floor",
      "flour",
      "flavour"
    ],
    "correct_option_id": 2,
    "solution": "C)Flour'का use होगा क्योंकि \"flour\" का अर्थ होता है आटा, और sentence में \"knead\" शब्द का प्रयोग किया गया है, जिसका अर्थ है गूंथना, जो आटे से संबंधित होता है। इसलिए 'flour' यहाँ सही है। जबकि 'Flora' का अर्थ है पौधे, 'Floor' का अर्थ है फर्श, और 'Flavour' का अर्थ है स्वाद, जो इस context में सही नहीं हैं। <br /> 'Flour'will be used because \"flour\" means powdered grain, usually wheat, and the verb \"knead\" is used, which relates to dough, making 'flour' the correct option. Whereas, 'Flora' means plants, 'Floor' means the ground or surface, and 'Flavour' means taste, which don't fit in this context.",
    "question_index": 6
  },
  {
    "question": "<strong>Select the most appropriate homophone to fill in the blank.</strong> <br /> The _____ of the flowers spread everywhere when they bloom",
    "options": [
      "scent",
      "sent",
      "cent",
      "Saint"
    ],
    "correct_option_id": 0,
    "solution": "A)'Scent'का use होगा क्योंकि \"scent\" का अर्थ है खुशबू या सुगंध, जो फूलों के खिलने पर चारों ओर फैलती है। वाक्य में फूलों की महक फैलने की बात हो रही है, इसलिए 'scent' यहाँ सही है। जबकि 'Sent' का अर्थ भेजना होता है, 'Cent' पैसे की एक छोटी इकाई होती है, और 'Saint' का अर्थ संत या साधु होता है, जो इस संदर्भ में सही नहीं है। <br /> 'Scent'will be used because it means fragrance or aroma, which spreads everywhere when flowers bloom. The sentence discusses the spreading of fragrance, making 'scent' appropriate here. Whereas, 'Sent' means to dispatch, 'Cent' is a small currency unit, and 'Saint' refers to a holy person, which don't fit this context.",
    "question_index": 7
  }
];
