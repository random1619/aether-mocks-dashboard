  {
    "question": "<strong>In the given question, a statement divided into different segments is given. Rearrange all the segments to form a coherent statement.</strong> <br /> O: also benefit from knowing <br /> P: there are several reasons <br /> Q: why even parents would <br /> R: more about how and why <br /> S: children do the things that they do",
    "options": [

      "PQROS"
    ],
    "correct_option_id": 2,
    "solution": "C)PQORS <br /> Pstarts the sentence with \"there are several reasons,\" which introduces the idea that multiple reasons exist. <br /> Qfollows P because it introduces the subject: \"why even parents would.\" This connects to the idea of \"several reasons\" and starts explaining who the reasons are for — in this case, parents. <br /> Ocomes after Q because it logically continues the idea with \"also benefit from knowing.\" It explains what parents would benefit from, linking directly to Q and expanding on the importance of knowledge for parents. <br /> Rfollows O because it specifies \"more about how and why,\" explaining what parents would benefit from knowing. <br /> Sconcludes the sentence with \"children do the things that they do,\" which completes the thought by explaining what parents would gain insight into — their children's behavior. This directly ties back to the reasons mentioned in P.",
    "question_index": 0
  },
  {
    "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong> <br /> A. The genuine beliefs, though not unconsciously acquired by most children; and even if they depart from these beliefs in later life <br /> B. Something of them remains deeply implanted, ready to emerge in a time of stress of crisis <br /> C. The importance of education in forming character and opinion is very great and well recognised by all <br /> D. Education is, as a rule, the strongest force on the side of what exists and again fundamental change",
    "options": [
      "DABC",
      "CBAD",
      "DCAB",
      "CABD"
    ],
    "correct_option_id": 3,
    "solution": "D)CABD <br /> Why C comes first: This sentence introduces the general idea of the role of education in shaping character and beliefs <br /> Why A follows C:A expands on the idea of education's role in forming beliefs, explaining that while children may not always unconsciously acquire these beliefs, they still form a part of their character. <br /> Why B follows A:B connects logically by explaining that even if individuals depart from the beliefs formed in their childhood, these beliefs remain deeply implanted and can resurface in moments of crisis. It continues the thought introduced in A. <br /> Why D concludes:D wraps up the paragraph by reinforcing the idea that education generally supports the status quo and resists significant change.",
    "question_index": 1
  },
  {
    "question": "<strong>Select the correct option to form a meaningful sentence</strong> <br /> I  (a)/ that (b) /the chef (c)/to work (d)/in (e)/the new (f)/heard (g)/restaurant (h)/is going (i)/across the road (j)",

      "a, b, d, c, e, f, h, g, i, j",
      "a, g, b, c, i, d, e, f, h, j"
    ],
    "correct_option_id": 3,
    "solution": "D) a, g, b, c, i, d, e, f, h, j <br /> a. I <br /> This starts the sentence with the subject \"I\". <br /> g. heard <br /> This follows the subject with the action: \"I heard\". <br /> b. that <br /> This introduces the clause that explains what was heard: \"that\". <br /> c. the chef <br /> This introduces the subject of the clause, \"the chef\". <br /> i. is going <br /> This part explains what the chef is planning to do, \"is going\". <br /> d. to work <br /> This continues the sentence by specifying the action the chef is going to do: \"to work\". <br /> e. in <br /> This preposition introduces the location: \"in\". <br /> f. the new <br /> This specifies that the location is \"the new\". <br /> h. restaurant <br /> This completes the noun phrase, identifying the location as \"the new restaurant\". <br /> j. across the road <br /> This final part gives more detail about the location: \"across the road\".",
    "question_index": 2
  },
  {
    "question": "<strong>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</strong> <br /> A. needs to be <br /> B. the shelf in <br /> C. a piece of wood <br /> D. the kitchen <br /> E. need to buy <br /> F. replaced, so I will",
    "options": [
      "BDAFEC",
      "ACDBFE",
      "DEBACF",
      "BEFCAD"
    ],
    "correct_option_id": 0,
    "solution": "A)BDAFEC <br /> The shelf in the kitchen needs to be replaced, so I will need to buy a piece of wood <br /> B starts the sentence with \"the shelf in,\" which introduces what is being discussed and where it is located (the shelf in the kitchen). <br /> D follows B because it completes the location: \"the kitchen.\" Now we know that the shelf being talked about is in the kitchen. <br /> A comes next after D as it provides the verb: \"needs to be.\" This introduces what action is required for the shelf. <br /> F logically follows A because it provides more details about the action: \"replaced, so I will.\" This completes the thought that the shelf needs to be replaced. <br /> E follows F because it introduces what the speaker will do next: \"need to buy.\" It connects to the action of replacing by explaining the next step. <br /> C concludes the sentence by specifying what needs to be bought: \"a piece of wood.\" This completes the thought, explaining what will be bought to replace the shelf.",
    "question_index": 3
  },
  {

    "question": "<strong>Parts of a sentence are given below in jumbled order. Select the option that arranges the parts in the correct sequence to form a meaningful sentence.</strong> <br /> (P) the sun <br /> (Q) to our planet, Earth <br /> (O) provides essential energy <br /> (R) sustaining life and warmth",

  {
    "question": "<strong>Sentences of a paragraph are given below in jumbled order. Select the option that arranges the sentences in the correct sequence to form a meaningful and coherent paragraph.</strong> <br /> A) This past summer, my dream finally came true. <br /> B) Strange lands, exciting places, and new cultures have always fascinated me. <br /> C) Ever since I was a little girl, I dreamed about travelling overseas. <br /> D) I got to travel to England, France, Switzerland, and Germany.",

    "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong> <br /> A. Mobile phones or smartphones are becoming popular all over the world. <br /> B. But at the same time, it also harms us in many ways. <br /> C. It is the most widely used means of communication today. <br /> D. Today, it is very affordable and available to everyone.",

    "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph. Note: This is an advertisement of an ice-cream brand.</strong> <br /> (A) That’s why Silky is deliciously different and exceptionally versatile, natural, thick and durable ice cream. <br /> (B) Beautifully firm, nice, silky rather than thin and watery, it stays in shape and stands on top of fruits or pastries without soaking in. <br /> (C) Silky thick double ice cream has a unique, fresh taste and texture.",
    "options": [
      "CBA",
      "ABC",
      "BCA",
      "BAC"
    ],
    "correct_option_id": 0,
    "solution": "A)CBA <br /> C starts the paragraph by introducing the product: “Silky thick double ice cream has a unique, fresh taste and texture.” This sentence provides the main subject of the advertisement and sets the stage for describing the features of the product. <br /> B logically follows C because it elaborates on the texture of the ice cream mentioned in C: This adds specific details about why the texture is important, highlighting the strength of the product. <br /> A comes next after B to summarize the qualities of the ice cream: The “That’s why” phrase ties back to the qualities described in B and C, wrapping up the paragraph by emphasizing why Silky stands out.",
    "question_index": 8
  },
  {
    "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong> <br /> A. It was as simple as announcing what you have in your store or the services you offer in your premises. <br /> B. Over the years, advertising has evolved into a major industry that goes beyond informing to persuading and influencing. <br /> C. Advertising was initially meant to make people aware of the goods available in the market. <br /> D. It is a form of brainwashing consumers.",
    "options": [
      "BADC",
      "CABD",
      "DABC",
      "ADBC"
    ],
    "correct_option_id": 1,
    "solution": "B)CABD <br /> C startsthe paragraph by introducing the topic: \"Advertising\" (subject) and its original purpose, i.e., making people aware of goods available (main idea). This sets the foundation of the paragraph, explaining the initial purpose of advertising <br /> A follows C :\"It\" refers to the subject \"advertising\" in C, making this the next logical connection. The verb \"was\" and the noun phrase \"as simple as announcing\" clearly describe what advertising used to involve. <br /> B follows Aas it introduces the next stage of advertising, explaining how it evolved over time into a persuasive industry. \"Over the years\" signals a transition in time, and the subject \"advertising\" continues with a new action, \"has evolved,\" which matches the logical flow after discussing its initial simplicity. <br /> D concludesthe paragraph by providing a more critical view of modern advertising, labeling it as a form of brainwashing. The subject \"It\" refers back to \"advertising\" in B, maintaining consistency, and the verb \"is\" directly connects the subject to the final evaluation of advertising as \"a form of brainwashing.\"",

  {
    "question": "<strong>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence</strong>. <br /> (a) false news websites <br /> (b) spreading propaganda about politics <br /> (c) thrive because the advertisements and politicians <br /> (d) and social networking sites <br /> (e) make a lot of money",
    "options": [
      "aedcb",
      "aecbd",
      "adecb",
      "adcbe"

    "correct_option_id": 3,
    "solution": "D)adcbe <br /> false news websites and social networking sites thrive because the advertisements and politicians spreading propaganda about politics make a lot of money <br /> (a) false news websites is the subject of the sentence. This tells us who or what the sentence is about, so it should start the sentence. <br /> (d) and social networking sites further adds to the subject and logically follows after part (a), continuing the idea that both false news websites and social networking sites are involved. <br /> (c) thrive because the advertisements and politicians introduces the verb \"thrive\" and provides a reason for why these websites and sites thrive, forming the subject-verb relationship: \"False news websites and social networking sites thrive.\" <br /> (b) spreading propaganda about politics adds detail by explaining how these entities thrive—by spreading propaganda, clarifying the purpose. <br /> (e) make a lot of money gives the outcome of this process, showing that they benefit financially, thus concluding the sentence.",

    "question": "<strong>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence</strong>. <br /> P) willing to go <br /> Q) is not <br /> R) my son <br /> S) camping",

    "correct_option_id": 1,
    "solution": "B)RQPS <br /> my son is not willing to go camping <br /> (R) starts with \"my son\" as the subject. <br /> (Q) follows with \"is not,\" which establishes the verb. <br /> (P) comes next with \"willing to go,\" explaining the action. <br /> (S) concludes with \"camping,\" specifying where or for what",

    "question": "<strong>Parts of a sentence are given below in jumbled order. Select the option that arranges the parts in the correct sequence to form a meaningful sentence.</strong> <br /> (P) dreams provide an escape <br /> (Q) where reality is suspended <br /> (R) into a world <br /> (O) of endless possibilities",

    "correct_option_id": 0,
    "solution": "A)PROQ <br /> dreams provide an escape dreams provide an escape of endless possibilities where reality is suspended <br /> Why P comes first: P introduces the main subject and verb, establishing the idea that dreams offer a form of escape.Why R follows P:R adds to P by describing where the escape leads — into a world. It connects directly to P by specifying that the escape provided by dreams leads into another world. <br /> Why O follows R:O completes the idea introduced by R by describing this world as one \"of endless possibilities.\" <br /> Why Q follows O:Q provides additional information about the nature of this world by explaining that \"reality is suspended.\"",
    "question_index": 12

  {
    "question": "<strong>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</strong> <br /> A. So I am not very sure <br /> B. I have a driving license <br /> C. Of myself reaching home safely <br /> D. But no real driving experience",
    "options": [
      "BDAC",
      "CABD",
      "BDCA",
      "BCAD"
    ],
    "correct_option_id": 0,
    "solution": "A)BDAC <br /> I have a driving license But no real driving experience So I am not very sure Of myself reaching home safely <br /> Why B comes first:B introduces the main subject (I) and a fact about the subject’s qualifications — possessing a driving license. <br /> Why D follows B:D contrasts B by mentioning that despite having a license, the person lacks real driving experience. The use of \"but\" establishes a contrast with the previous statement. <br /> Why A follows D:A expresses the consequence of the lack of experience mentioned in D — uncertainty. The use of \"so\" here implies a resulting feeling due to the contrast in D. <br /> Why C follows A:C completes the thought introduced in A by specifying what the person is uncertain about — reaching home safely. This provides the full context of the speaker's uncertainty.",
    "question_index": 13
  },
  {
    "question": "<strong>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</strong> <br /> A: new facts and advanced <br /> B: but my opinion is <br /> C: he has discovered <br /> D: unchanged <br /> E: new arguments",
    "options": [

      "CAEBD"

    "correct_option_id": 3,
    "solution": "D)CAEBD <br /> he has discovered new facts and advanced new arguments but my opinion is unchanged <br /> Why C comes first:C introduces the subject (he) and the main action (has discovered), setting up the sentence's focus on the discoveries made. <br /> Why A follows C:A provides what the subject discovered — new facts and advanced knowledge. It directly complements the action introduced in C. <br /> Why E follows A:E completes the list of things discovered, adding \"new arguments\" to \"new facts and advanced.\" This gives a fuller picture of what has been discovered. <br /> Why B follows E:B introduces a contrasting idea with \"but,\" indicating a shift in the sentence to the speaker's opinion. <br /> Why D follows B:D completes the thought by stating that the speaker’s opinion remains \"unchanged.\" This finalizes the contrast mentioned in B.",
