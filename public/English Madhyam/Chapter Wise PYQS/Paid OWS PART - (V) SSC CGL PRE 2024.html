<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paid OWS PART - (V) SSC CGL PRE 2024</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="16">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Paid OWS PART - (V) SSC CGL PRE 2024</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">8</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">16 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Paid OWS PART - (V) SSC CGL PRE 2024</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<strong>Select the most appropriate option that can substitute the underlined word in the given sentence.</strong> <br /> An <ins><strong>intense</strong> </ins>wish to learn something keeps the nerves active.",
    "options": [
      "half-hearted",
      "fixed",
      "lazy",
      "powerful"
    ],
    "correct_option_id": 3,
    "solution": "D)'Powerful'का use 'intense' के स्थान पर किया जाएगा क्योंकि इस संदर्भ में, ‘intense’ का use किसी चीज की मजबूत या अत्यधिक डिग्री को दर्शाने के लिए किया गया है। <br /> 'Powerful'will be used instead of 'intense' because in this context, the word ‘intense’ is used to describe a strong or extreme degree of something. <br /> Intense(adjective) – very strong, extreme, or of great force. तीव्र <br /> Substitute:Powerful(adjective) – having great strength or force; very effective or strong. शक्तिशाली <br /> Half-hearted(adjective) – lacking enthusiasm, effort, or determination. Without much interest. आधे मन से <br /> Fixed(adjective) – firmly in place or unchanging. स्थिर <br /> Lazy(adjective) – unwilling to work or use energy. आलसी",
    "question_index": 0
  },
  {
    "question": "<strong>Select the most appropriate option to substitute the underlined segment in the given sentence.</strong> <br /> The line, 'Round the rugged rocks the ragged rascal ran' uses the <ins><strong>repetition of usually initial consonant sounds in two or more neighbouring words or syllables</strong></ins>",
    "options": [
      "allegory",
      "simile",
      "alliteration",
      "epithet"
    ],
    "correct_option_id": 2,
    "solution": "C) Alliteration (noun) – The repetition of usually initial consonant sounds in two or more neighboring words or syllables अनुप्रास अलंकार <br /> •Allegory (noun)– A story, poem, or picture that can be interpreted to reveal a hidden meaning, typically a moral or political one रूपक कथा•Simile (noun)– A figure of speech comparing one thing with another using \"like\" or \"as\" उपमा•Epithet (noun)– An adjective or descriptive phrase expressing a quality or attribute regarded as characteristic of the person or thing mentioned विशेषण या उपाधि",
    "question_index": 1
  },
  {
    "question": "<strong>Select the option that can be used as a one-word substitute for the underlined group of words.</strong> <br /> The soldier struck the enemy with the <ins><strong>short sword fixed onto the end of the gun</strong></ins>.",
    "options": [
      "Baton",
      "Bigot",
      "Bayonet",
      "Baron"
    ],
    "correct_option_id": 2,
    "solution": "C)Bayonet(noun) – Short sword fixed onto the end of the gun. बन्दूक के अगले हिस्से पर लगी छोटी तलवार <br /> Baton(noun) – a thin stick used by a conductor to direct an orchestra or choir. छड़ी <br /> Bigot(noun) – a person who is intolerant toward those holding different opinions. कट्टरपंथी <br /> Baron(noun) – a member of the lowest order of the British nobility. सामंत",
    "question_index": 2
  },
  {
    "question": "<strong>Select the option that can be used as a one-word substitute for the underlined group of words.</strong> <br /> His parents didn’t allow him to enrol in the arts college because he is a <ins><strong>dabbler in arts, science or literature.</strong></ins>",
    "options": [
      "Taciturn",
      "Dilettante",
      "Connoisseur",
      "Ignoramus"
    ],
    "correct_option_id": 1,
    "solution": "B)Dilettante(noun) – A person who cultivates an area of interest, such as the arts, without real commitment or knowledge. शौकिया व्यक्ति <br /> Taciturn(noun) – A person who is reserved or says very little. अल्पभाषी <br /> Connoisseur(noun) – An expert judge in matters of taste. पारखी <br /> Ignoramus(noun) – An ignorant or stupid person. अज्ञानी",
    "question_index": 3
  },
  {
    "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words.</strong> <br /> One who looks at the bright side of things/situations",
    "options": [
      "Scientist",
      "Pessimist",
      "Saint",
      "Optimist"
    ],
    "correct_option_id": 3,
    "solution": "D)Optimist(noun) – A person who looks at the bright side of things/situations. आशावादी <br /> Scientist(noun) – A person who is trained in science and works in a laboratory or field to make new discoveries. वैज्ञानिक <br /> Pessimist(noun) – A person who tends to see the worst aspect of things or believes that the worst will happen. निराशावादी <br /> Saint(noun) – A person recognized for holiness, virtue, or religious reverence. संत",
    "question_index": 4
  },
  {
    "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words.</strong> <br /> Loud enough to be heard",
    "options": [
      "Audacious",
      "Audible",
      "Audacity",
      "Audit"
    ],
    "correct_option_id": 1,
    "solution": "B)Audible(noun) – Loud enough to be heard, श्रवणीय <br /> Audacious(adjective) – showing a willingness to take bold risks, साहसी <br /> Audacity(noun) – the willingness to take bold risks; rude or disrespectful behavior, धृष्टता <br /> Audit(noun) – an official inspection of an organization's accounts, typically by an independent body, लेखा परीक्षा",
    "question_index": 5
  },
  {
    "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words.</strong> <br /> Money collected from people for a cause",
    "options": [
      "Savings",
      "Fund",
      "Deposit",
      "Collection"
    ],
    "correct_option_id": 1,
    "solution": "B)Fund(noun) – Money collected from people for a cause; धनराशि <br /> Savings(noun) – Money that someone has saved, typically through a bank or an account; बचत <br /> Deposit(noun) – A sum of money placed or kept in a bank account, usually to gain interest; जमा <br /> Collection(noun) – The action or process of gathering items or resources together; संग्रह",
    "question_index": 6
  },
  {
    "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words.</strong> <br /> Study of flying airplanes",
    "options": [
      "Acoustics",
      "Alchemy",
      "Astronomy",
      "Aviation"
    ],
    "correct_option_id": 3,
    "solution": "D)Aviation(noun) – The science or practice of flying airplanes हवाई जहाज उड़ाने का अध्ययन <br /> Acoustics(noun) – The study of sound and its properties. ध्वनि का अध्ययन <br /> Alchemy(noun) – A medieval form of chemistry aiming to transform matter, particularly into gold or find the elixir of life. रसायनशास्त्र की वह शाखा जो पदार्थों को बदलने का प्रयास करती है <br /> Astronomy(noun) – The study of celestial bodies such as stars, planets, and galaxies. खगोलशास्त्र",
    "question_index": 7
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
