<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paid SSC Selection Post (2024) - Filler PART - (II)</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="12">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Paid SSC Selection Post (2024) - Filler PART - (II)</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">6</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">12 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Paid SSC Selection Post (2024) - Filler PART - (II)</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<strong>Select the most appropriate option to fill in the blank.</strong> <br /> It is a proven fact that _______ living being can survive without water",
    "options": [
      "none",
      "no",
      "neither",
      "Any"
    ],
    "correct_option_id": 0,
    "solution": "B)'no'का use होगा क्योंकि 'no' का अर्थ है 'not any,' और यहां sentence में यह mention है कि कोई भी जीव बिना पानी के जीवित नहीं रह सकता। 'none' का अर्थ है 'कोई नहीं,' जो इस context में सही नहीं है। 'neither' का उपयोग तब किया जाता है जब दो विकल्पों में से किसी का चयन नहीं किया जा रहा हो, और 'any' का उपयोग वाक्य के वर्तमान संदर्भ में सही नहीं होगा। <br /> 'no' will be used because it means 'not any,' and the sentence is indicating that no living being can survive without water. 'none' means 'not one' which is not fitting here. 'neither' is used when referring to neither of two options, and 'any' doesn't fit in the current context.",
    "question_index": 0
  },
  {
    "question": "<strong>Select the most appropriate option to fill in the blank.</strong> <br /> The smoke coming out of the factory chimneys was polluting the air, which was becoming a major _______ for the local residents",
    "options": [
      "concern",
      "idea",
      "law",
      "area"
    ],
    "correct_option_id": 0,
    "solution": "A) Concern'का use होगा क्योंकि पूरे संदर्भ में, sentence स्थानीय निवासियों के लिए एक बड़ी समस्या की चर्चा कर रहा है। यहाँ \"The smoke coming out of the factory chimneys was polluting the air, which was becoming a major (8)_______ for the local residents\" के माध्यम से उस समस्या को दर्शाया जा रहा है, जिसमें फैक्ट्री की चिमनियों से निकलने वाला धुआं हवा को प्रदूषित कर रहा है और यह स्थानीय निवासियों के लिए एक महत्वपूर्ण मुद्दा बनता जा रहा है। इसलिए, \"concern\" सबसे उपयुक्त विकल्प होगा।",
    "question_index": 1
  },
  {
    "question": "<strong>Select the most appropriate option to fill in the blank.</strong> <br /> A popular theory among critics is that the character Count Dracula is based on the________ barbaric Vlad III, better known as Vlad the Impaler",
    "options": [
      "debauched",
      "ingloriously",
      "infamously",
      "Miserably"
    ],
    "correct_option_id": 2,
    "solution": "C) 'infamously'का use सही होगा क्योंकि 'infamously' का अर्थ है 'कुख्यात रूप से,' और यहां वाक्य में Count Dracula के चरित्र को कुख्यात Vlad III के साथ link किया जा रहा है, जिसे Vlad the Impaler के नाम से जाना जाता है। अन्य विकल्प जैसे 'debauched' का अर्थ है 'अश्लील,' 'ingloriously' का अर्थ है 'बिना गौरव के,' और 'miserably' का अर्थ है 'दुखी रूप से,' जो इस संदर्भ में सही नहीं हैं। <br /> 'infamously'will be used because it means 'notoriously,' and in the sentence, the character of Count Dracula is being linked to the notorious Vlad III, better known as Vlad the Impaler. Other options like 'debauched' mean 'immoral,' 'ingloriously' means 'without glory,' and 'miserably' means 'in a sad way,' which do not fit this context.",
    "question_index": 2
  },
  {
    "question": "<strong>Select the most appropriate option to fill in the blank.</strong> <br /> We met a lot of people _______ our stay in Ahmedabad.",
    "options": [
      "in",
      "while",
      "on",
      "during"
    ],
    "correct_option_id": 3,
    "solution": "D) 'During' का use होगा क्योंकि \"during\" का अर्थ है किसी समय अवधि के दौरान, जो यहाँ sentence में हमारे Ahmedabad में रहने के समय का वर्णन करता है। जबकि 'in' का उपयोग किसी स्थान या enclosed area में के लिए किया जाता है, 'while' का उपयोग किसी दो घटनाओं के साथ-साथ होने के लिए किया जाता है, और 'on' का उपयोग किसी surface या किसी दिन के लिए किया जाता है, जो इस context में सही नहीं है। <br /> 'During' will be used because it refers to a time period, which in this sentence is describing the duration of our stay in Ahmedabad, making 'during' the correct option. Whereas, 'in' is used for being inside a place or enclosed area, 'while' is used for two events happening at the same time, and 'on' is used for a surface or specific days, which don't fit in this context",
    "question_index": 3
  },
  {
    "question": "<strong>Select the most appropriate option to fill in the blank.</strong> <br /> Shraddha wandered through the labyrinth of thoughts, seeking clarity _____ chaos.",
    "options": [
      "for",
      "down",
      "amidst",
      "Upstairs"
    ],
    "correct_option_id": 2,
    "solution": "C) 'Amidst'का use होगा क्योंकि \"amidst\" का अर्थ होता है 'के बीच में'। इस sentence में, श्रद्धा अपने विचारों की भूलभुलैया में स्पष्टता खोज रही है, और यह स्पष्टता chaos (अराजकता) के बीच में पाई जा रही है, इसलिए 'amidst' सही है। जबकि 'for' का अर्थ होता है 'के लिए', 'down' का अर्थ है 'नीचे', और 'upstairs' का अर्थ है 'ऊपर की मंजिल', जो इस context में सही नहीं है। <br /> 'Amidst' will be used because it means 'in the middle of'. In this sentence, Shraddha is seeking clarity within a chaotic situation, making 'amidst' the correct choice. Whereas 'for' means 'for the purpose of', 'down' means 'toward a lower place', and 'upstairs' means 'to the upper floor', which do not fit in this context.",
    "question_index": 4
  },
  {
    "question": "<strong>Select the most appropriate option to fill in the blank.</strong> <br /> One answer to the ________ of air pollution is to build a car that does not pollute",
    "options": [
      "problem",
      "measure",
      "basis",
      "resolution"
    ],
    "correct_option_id": 0,
    "solution": "A) 'Problem'का use होगा क्योंकि \"problem\" का अर्थ होता है कोई समस्या या कठिनाई। इस sentence में वायु प्रदूषण की समस्या की बात की जा रही है, और इस समस्या का एक उत्तर दिया जा रहा है, इसलिए 'problem' यहाँ सही है। जबकि 'measure' का अर्थ है उपाय, 'basis' का अर्थ है आधार, और 'resolution' का अर्थ है समाधान, जो इस context में फिट नहीं होता। ' <br /> Problem' will be used because it means an issue or difficulty. The sentence discusses the issue of air pollution, and a possible solution is being mentioned, making 'problem' the correct choice here. Whereas 'measure' means an action or step, 'basis' means a foundation, and 'resolution' means a solution, which do not fit in this context.",
    "question_index": 5
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
