<!DOCTYPE html>
<html lang="en">
<head>

    <title>Paid SSC CHSL No substitution required PART (VI) (2024)</title>

<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">

                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Paid SSC CHSL No substitution required PART (VI) (2024)</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">40 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Paid SSC CHSL No substitution required PART (VI) (2024)</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">

                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>

                </div>
            </div>
        </div>

        <div class="mock-container">

            <div class="question-view">

                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <div class="sidebar">

                <div class="stats-grid">

                        <div class="stat-name">Answered</div>
                    </div>

                    </div>

                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {

      "in a beautiful youth",
      "a beautiful youth"

    "question_index": 0
  },
  {

    "question_index": 1
  },
  {

    "options": [
      "intensifies",
      "affects",
      "bestows",
      "results"

    "question_index": 2
  },
  {
    "question": "<strong>Select the most appropriate option that can replace the bracketed word segment in the following sentence.</strong> <br /> Men (allowed) for Olympic artistic swimming for the first time at the 2024 Paris Games, the IOC confirmed on Thursday.",
    "options": [
      "are likely",
      "have permitted",
      "are eligible",
      "will approve"
    ],
    "correct_option_id": 2,
    "solution": "C)'allowed' के बदले'are eligible'का प्रयोग होगा क्योंकि वाक्य भविष्य की घटना का उल्लेख कर रहा है; जैसे— \"Men are eligible for Olympic artistic swimming for the first time at the 2024 Paris Games, the IOC confirmed on Thursday.\"",
    "question_index": 3
  },
  {
    "question": "<strong>Select the most appropriate option that can substitute the underlined segment in the given sentence.</strong> <br /> As there was no one to <ins><strong>look thorough</strong></ins> the orphan, he had to take refuge in the orphanage",
    "options": [
      "look down upon",
      "look after",
      "look through",
      "look upon"
    ],
    "correct_option_id": 1,
    "solution": "B)Look after(phrasal verb) – To take care of someone or something. किसी की देखभाल करना।",
    "question_index": 4
  },
  {
    "question": "<strong>Select the most appropriate option that can substitute the underlined words in the following sentence.</strong> <br /> I cannot go out tonight because <ins><strong>I will preparing of</strong></ins> my interview tomorrow",

    "solution": "B)'I have to prepare for' will be the correct substitution because the sentence indicates that the speaker needs to prepare for the interview tomorrow. 'Have to' is used to indicate obligation, and 'prepare for' is used when getting ready for something; Like— I cannot go out tonight because I have to prepare for my interview tomorrow.",
    "question_index": 5
  },
  {
    "question": "<strong>Select the most appropriate option that can substitute the underlined segment in the given sentence.</strong> <br /> The player was declared <ins><strong>fit and in excellent health</strong></ins> to play the final matches.",

      "on cloud nine"

    "question_index": 6
  },
  {
    "question": "<strong>Select the most appropriate option that can substitute the underlined word in the given sentence.</strong> <br /> There was enough room in the <ins><strong>spacious</strong> </ins>flat for all of our furniture",

      "cozy",
      "cramped",
      "roomy"

    "correct_option_id": 3,

    "question_index": 7
  },
  {
    "question": "<strong>Select the most appropriate option to substitute the underlined segment in the following sentence.</strong> <br /> A gift from my teacher on the eve of the new year was <ins><strong>a complete surprise.</strong></ins>",

      "spilling of beans"

    "question_index": 8
  },
  {
    "question": "<strong>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select ‘No substitution required’.</strong> <br /> There is an old rivalry <ins><strong>between the three families</strong></ins> for ages",
    "options": [
      "of the three families",
      "No substitution required",
      "in the three families",
      "among the three families"
    ],
    "correct_option_id": 3,
    "solution": "D) between'के बदले 'among' का प्रयोग होगा क्योंकि 'among' का प्रयोग तीन या तीन से अधिक वस्तुओं या व्यक्तियों के बीच संबंध दिखाने के लिए होता है, जबकि 'between' का प्रयोग केवल दो वस्तुओं या व्यक्तियों के बीच संबंध दिखाने के लिए होता है; जैसे— There is an old rivalry among the three families for ages.",
    "question_index": 9
  },
  {
    "question": "<strong>Select the option that will improve the underlined part of the given sentence.</strong> <br /> It is my <ins><strong>custom</strong> </ins>to get up early in the morning",
    "options": [
      "perfection",
      "oddity",
      "addiction",
      "habit"
    ],
    "correct_option_id": 3,
    "solution": "D)Custom(noun) – A traditional and widely accepted way of behaving or doing something that is specific to a particular society, place, or time. रीति <br /> Improvement:Habit(noun) – A settled or regular tendency or practice, especially one that is hard to give up. आदत",
    "question_index": 10
  },
  {
    "question": "<strong>Select the most appropriate option that can substitute the underlined word in the following sentence.</strong> <br /> If it is sunny tomorrow, we <ins><strong>go</strong></ins> for a picnic",
    "options": [
      "will going",
      "goes",
      "will go",
      "will went"
    ],
    "correct_option_id": 0,
    "solution": "C)go' के बदले'will go'का प्रयोग होगा क्योंकि Conditional Clause में Present Tense है और Main Clause में Future Tense होना चाहिए; जैसे— If it is sunny tomorrow, we will go for a picnic.",
    "question_index": 11
  },
  {
    "question": "<strong>Select the most appropriate option that can substitute the underlined segment in the given sentence.</strong> <br /> Once bitten,<ins> <strong>thrice shy</strong></ins>",
    "options": [
      "twice shy",
      "once shy",
      "always shy",
      "never shy"
    ],
    "correct_option_id": 0,
    "solution": "A)thrice shy' के बदले'twice shy'का प्रयोग होगा क्योंकि यह प्रसिद्ध कहावत \"Once bitten, twice shy\" है; इसका अर्थ है कि एक बार धोखा खाने पर व्यक्ति सावधान हो जाता है। उदाहरण— Once bitten, twice shy.",
    "question_index": 12
  },
  {
    "question": "<strong>Select the most appropriate option that can substitute the underlined words in the following sentence.</strong> <br /> I consider that every matter must be considered <ins><strong>in every point</strong></ins> of view.",

      "on every point",
      "of every point",
      "from every point",
      "at every point"

    "correct_option_id": 2,
    "solution": "C)'in every point' के बदले'from every point'का प्रयोग होना चाहिए क्योंकि जब किसी विषय या वस्तु को विभिन्न दृष्टिकोणों से देखा जाता है, तो 'from every point of view' का प्रयोग किया जाता है। यह वाक्य का सही और प्राकृतिक रूप है; जैसे— I consider that every matter must be considered from every point of view.",
    "question_index": 13
  },
  {
    "question": "<strong>Select the option that can substitute the bracketed word segment meaningfully.</strong> <br /> Writing can instil a number of emotions (as in a reader).",
    "options": [

    "question_index": 14
  },
  {

    "question_index": 15
  },
  {

  },
  {
