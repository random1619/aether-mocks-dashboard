<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paid SSC Selection Post (2021) - Filler PART - (I)</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="14">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Paid SSC Selection Post (2021) - Filler PART - (I)</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">7</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">14 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Paid SSC Selection Post (2021) - Filler PART - (I)</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<strong>Select the most appropriate option to fill in the blank.</strong> <br /> The secret document was shared with the staff quite ______.",
    "options": [
      "with accident",
      "accidentally",
      "accidental",
      "in accident"
    ],
    "correct_option_id": 1,
    "solution": "B)Accidentally'का प्रयोग होगा क्योंकि पूरे संदर्भ में, sentence एक स्थिति की चर्चा कर रहा है जिसमें एक गुप्त दस्तावेज़ को कर्मचारियों के साथ अनजाने में साझा किया गया था। यहाँ \"The secret document was shared with the staff quite (12)\" के माध्यम से उस परिस्थिति को दर्शाया जा रहा है, जिसमें दस्तावेज़ का साझा होना एक संयोगवश घटित घटना थी। इसलिए, \"accidentally\" सबसे उपयुक्त विकल्प होगा। <br /> ‘Accidentally'should be used because in the entire context, the sentence is discussing a situation where a secret document was shared with the staff unknowingly. Here, through \"The secret document was shared with the staff quite (12)\", it portrays that the sharing of the document was an unintended event. Thus, \"accidentally\" would be the most appropriate choice.",
    "question_index": 0
  },
  {
    "question": "<strong>Select the most appropriate option to fill in the blank.</strong> <br /> On ______ of the river, I could see lush green corn fields",
    "options": [
      "both sides",
      "other side",
      "either sides",
      "other sides"
    ],
    "correct_option_id": 0,
    "solution": "A) both sides'का प्रयोग होगा क्योंकि पूरे संदर्भ में, वाक्य नदी के दोनों ओर हरे-भरे मक्का के खेतों को देखने की चर्चा कर रहा है। यहाँ \"On ______ of the river, I could see lush green corn fields\" के माध्यम से उस दृश्य को दर्शाया जा रहा है, जिसमें व्यक्ति नदी के दोनों ओर मक्का के खेत देख सकता है। इसलिए, \"both sides\" सबसे उपयुक्त विकल्प होगा। <br /> ‘Both sides'should be used because in the entire context, the sentence is discussing seeing lush green corn fields on both sides of the river. Here, through \"On ______ of the river, I could see lush green corn fields,\" it portrays that visual of corn fields on both sides of the river. Thus, \"both sides\" would be the most appropriate choice",
    "question_index": 1
  },
  {
    "question": "<strong>Select the most appropriate option to fill in the blank.</strong> <br /> I have been living in Delhi ______ April 1995",
    "options": [
      "for",
      "since",
      "with",
      "through"
    ],
    "correct_option_id": 1,
    "solution": "B) Since'का प्रयोग होगा क्योंकि पूरे संदर्भ में, sentence यह बताने की कोशिश कर रहा है कि किसी व्यक्ति ने दिल्ली में किस समय से रहना शुरू किया। यहाँ \"I have been living in Delhi ______ April 1995\" के माध्यम से उस तात्कालिक समय बिंदु को दर्शाया जा रहा है, जिसमें व्यक्ति ने दिल्ली में रहना प्रारंभ किया। इसलिए, \"since\" सबसे उपयुक्त विकल्प होगा। <br /> ‘Since'should be used because in the entire context, the sentence is trying to indicate the starting point of someone living in Delhi. Here, through \"I have been living in Delhi ______ April 1995,\" it portrays that specific point in time when the person began residing in Delhi. Thus, \"since\" would be the most appropriate choice",
    "question_index": 2
  },
  {
    "question": "<strong>Select the most appropriate option to fill in the blank.</strong> <br /> The suspects had to go through ______ parade so that the real culprit could be caught",
    "options": [
      "a identify",
      "an identification",
      "the identified",
      "an identify"
    ],
    "correct_option_id": 1,
    "solution": "B) an identification'का प्रयोग होगा क्योंकि पूरे संदर्भ में, sentence अपराधी को पकड़ने के लिए पहचान प्रक्रिया की चर्चा कर रहा है। यहाँ \"The suspects had to go through ______ parade so that the real culprit could be caught\" के माध्यम से उस पहचान की प्रक्रिया को दर्शाया जा रहा है। इसलिए, \"an identification\" सबसे उपयुक्त विकल्प होगा। <br /> ‘an identification'should be used because in the entire context, the sentence is discussing the process of identifying the real culprit. Here, through \"The suspects had to go through ______ parade so that the real culprit could be caught\", it portrays that identification process. Thus, \"an identification\" would be the most appropriate choice",
    "question_index": 3
  },
  {
    "question": "<strong>Select the most appropriate option to fill in the blank.</strong> <br /> The work cannot be completed on time ______ you work for longer hours",
    "options": [
      "unless",
      "even",
      "because",
      "since"
    ],
    "correct_option_id": 0,
    "solution": "A) 'Unless'का प्रयोग होगा क्योंकि इस संदर्भ में, वाक्य यह व्यक्त कर रहा है कि कार्य तब तक समय पर पूरा नहीं हो सकता जब तक आप लंबे समय तक काम नहीं करते। यहाँ \"The work cannot be completed on time ______ you work for longer hours\" वाक्य में एक शर्त है जो तभी पूरी होगी जब आप लंबे समय तक काम करेंगे। इसलिए, \"unless\" सबसे उपयुक्त विकल्प होगा। <br /> ‘Unless'should be used because in the given context, the sentence is expressing that the work cannot be completed on time unless you work for longer hours. Here, the sentence \"The work cannot be completed on time ______ you work for longer hours\" implies a condition that must be met for the work to be completed. Thus, \"unless\" would be the most appropriate choice",
    "question_index": 4
  },
  {
    "question": "<strong>Select the most appropriate option to fill in the blank.</strong> <br /> His painting was declared the best ______ all the entries",
    "options": [
      "among",
      "between",
      "from",
      "through"
    ],
    "correct_option_id": 0,
    "solution": "A) Among'का प्रयोग होगा क्योंकि पूरे संदर्भ में, sentence entries की तुलना कर रहा है और उनमें से सबसे अच्छी पेंटिंग की घोषणा कर रहा है। यहाँ \"His painting was declared the best ______ all the entries\" के माध्यम से यह दर्शाया जा रहा है कि किसी एक entry को सभी entries में से सर्वश्रेष्ठ के रूप में चुना गया है। इसलिए, \"among\" सबसे उपयुक्त विकल्प होगा। <br /> 'Among'should be used because in the entire context, the sentence is comparing entries and declaring the best painting among them. Here, through \"His painting was declared the best ______ all the entries,\" it shows that one entry has been selected as the best out of all the entries. Thus, \"among\" would be the most appropriate choice",
    "question_index": 5
  },
  {
    "question": "<strong>Select the most appropriate option to fill in the blank.</strong> <br /> Scarcely had I reached the terrace to water my plants ______ two monkeys jumped in front of me.",
    "options": [
      "that",
      "when",
      "than",
      "till"
    ],
    "correct_option_id": 1,
    "solution": "B) When'का प्रयोग होगा क्योंकि पूरे संदर्भ में, sentence एक ऐसी स्थिति की चर्चा कर रहा है जो लगभग तुरंत ही घटित हो जाती है। यहाँ \"Scarcely had I reached the terrace to water my plants ______ two monkeys jumped in front of me.\" के माध्यम से उस तात्कालिक घटना को दर्शाया जा रहा है, जिसमें एक क्रिया के तुरंत बाद दूसरी क्रिया घटित होती है। इसलिए, \"when\" सबसे उपयुक्त विकल्प होगा। <br /> When'should be used because in the entire context, the sentence is discussing a situation that happens almost immediately. Here, through \"Scarcely had I reached the terrace to water my plants ______ two monkeys jumped in front of me.\", it portrays that immediate sequence of events, where one action follows another almost instantaneously. Thus, \"when\" would be the most appropriate choice.",
    "question_index": 6
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
