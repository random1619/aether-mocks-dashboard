<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paid SSC Selection Post (2024) - Idioms PART - (II)</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="22">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Paid SSC Selection Post (2024) - Idioms PART - (II)</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">11</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">22 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Paid SSC Selection Post (2024) - Idioms PART - (II)</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<strong>Select the most appropriate idiom that can substitute the underlined words in thegiven sentence.</strong> <br /> I know you have been<ins> <strong>really busy</strong></ins> with your work, but can you just give me a fewminutes?",
    "options": [
      "jumped on the bandwagon",
      "on cloud nine",
      "snowed under",
      "through thick and thin"
    ],
    "correct_option_id": 2,
    "solution": "C)Snowed under (phrase)– Really busy with work काम में डूबा हुआ",
    "question_index": 0
  },
  {
    "question": "<strong>Select the most appropriate meaning of the given idiom.</strong> <br /> To make both ends meet",
    "options": [
      "To live within one’s income",
      "Quite worthless",
      "To anticipate",
      "To take back what you have said"
    ],
    "correct_option_id": 0,
    "solution": "A)To make both ends meet(idiom) – To live within one’s income किसी तरह से गुज़ारा करना",
    "question_index": 1
  },
  {
    "question": "<strong>Select the most appropriate meaning of the given idiom.</strong> <br /> Rohit laid down his proposal, and told Rohit that <ins><strong>the ball was now in his court</strong>.</ins>",
    "options": [
      "It is Rohit's responsibility to take the next action or decision",
      "He had to play the game and win the match",
      "He had to continue the remaining time in court",
      "The captaincy of the team was on his shoulders"
    ],
    "correct_option_id": 0,
    "solution": "A)The ball was now in his court(idiom) – it is his or her responsibility to take the next action or decision in a situation. अब उसका ज़िम्मेदारी है कि वह अगला कदम उठाए या निर्णय ले",
    "question_index": 2
  },
  {
    "question": "<strong>Select the most appropriate idiom that can substitute the underlined words in the given sentence.</strong> <br /> I know you’re blaming me for all that has happened but <ins><strong>I wasn’t at fault alone</strong></ins>",
    "options": [
      "it takes two to tango",
      "it is always darkest before the dawn",
      "make hay while the sun shines",
      "leave no stone unturned"
    ],
    "correct_option_id": 0,
    "solution": "A)It takes two to tango(idiom) – it means both parties involved in a situation are equally responsible.दोनोजिम्मेदारहैं/एकहाथसेतालीनहींबजती",
    "question_index": 3
  },
  {
    "question": "<strong>Select the most appropriate idiom that can substitute the underlined words in thegiven sentence.</strong> <br /> Sharon doing the work all by herself? Seems like it is <ins><strong>possible, but is very unlikely to happen</strong></ins>",
    "options": [
      "a piece of cake",
      "a bad egg",
      "bent out of shape",
      "pie in the sky"
    ],
    "correct_option_id": 3,
    "solution": "D)pie in the sky(idiom) – Something that is promised but is very unlikely to be realized हवा में महल",
    "question_index": 4
  },
  {
    "question": "<strong>Select the most appropriate meaning of the underlined idiom.</strong> <br /> We should teach our wards not to <ins><strong>look down upon</strong></ins> anybody in human society.",
    "options": [
      "Despise somebody",
      "Kneel down",
      "Talk leniently",
      "Guess on something"
    ],
    "correct_option_id": 0,
    "solution": "A)Look down upon(idiom) – Despise somebody तुच्छ समझना",
    "question_index": 5
  },
  {
    "question": "<strong>Select the most appropriate meaning of the underlined idiom.</strong> <br /> Everybody was surprised to see that he <ins><strong>fell flat</strong></ins> even after arduous efforts",
    "options": [
      "Fail to win applause",
      "Win a difficult race",
      "Fall from a height",
      "Succeed without hassles"
    ],
    "correct_option_id": 0,
    "solution": "A) Fell flat(idiom) – Fail to win applause सराहना प्राप्त करने में असफल",
    "question_index": 6
  },
  {
    "question": "<strong>Select the most appropriate idiom that can substitute the underlined segment in the given sentence.</strong> <br /> His old car has become<ins> <strong>a financial burden</strong></ins> on him now.",
    "options": [
      "An apple of one’s eye",
      "A white elephant",
      "A rare bird",
      "An eyesore"
    ],
    "correct_option_id": 1,
    "solution": "B) ‘a financial burden'के बदले 'a white elephant' का प्रयोग होगा क्योंकि 'a white elephant' का मतलब है 'महंगा और रख-रखाव में मुश्किल', जो 'a financial burden' को सही से substitute करता है; जैसे— His old car has become a white elephant on him now.",
    "question_index": 7
  },
  {
    "question": "<strong>Select the most appropriate meaning of the underlined idiom.</strong> <br /> Many unavoidable situations were avoided only because someone <ins><strong>had our back</strong></ins>",
    "options": [
      "Without help",
      "In consultation",
      "To support",
      "Within reach"
    ],
    "correct_option_id": 2,
    "solution": "C)To support- (had our back) - समर्थन देना. <br /> Had our back refers to someone providing support or protection",
    "question_index": 8
  },
  {
    "question": "<strong>Select the most appropriate meaning of the following idiom.</strong> <br /> At sixes and sevens",
    "options": [
      "In disorder",
      "In happy mood",
      "Having dispute",
      "Heavy rains"
    ],
    "correct_option_id": 0,
    "solution": "A)At sixes and sevens(idiom) –In disorderअव्यवस्था में",
    "question_index": 9
  },
  {
    "question": "<strong>Select the most appropriate meaning of the given idiom.</strong> <br /> Midhuna was nineteen years old, too young to <ins><strong>buy the farm</strong></ins>",
    "options": [
      "Spend money",
      "Stop living",
      "Possess anything",
      "Own a property"
    ],
    "correct_option_id": 1,
    "solution": "B) Buy the farm(idiom)–Stop livingमरना",
    "question_index": 10
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
