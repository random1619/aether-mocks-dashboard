<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paid Antonym - Part (VI) (SSC CGL 2023)</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="16">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Paid Antonym - Part (VI) (SSC CGL 2023)</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">8</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">16 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Paid Antonym - Part (VI) (SSC CGL 2023)</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "Select the most appropriate <strong>ANTONYM </strong>of the underlined word. <br /> My energy <ins><strong>waned</strong> </ins>to see my college team performing poorly in the match.",
    "options": [
      "Declined",
      "Dimmed",
      "Abated",
      "Grew"
    ],
    "correct_option_id": 3,
    "solution": "D)Waned(verb) – To decrease in strength, intensity, or size, to diminish, reduce. घटना/ गिरावट होना <br /> Antonym:Grew(verb) – To increase in size, amount, intensity, or quality. बढ़ना",
    "question_index": 0
  },
  {
    "question": "Select the most appropriate <strong>ANTONYM </strong>of the underlined word. <br /> She is a <ins><strong>veteran</strong> </ins>journalist known for her powerful writing style.",
    "options": [
      "Renowned",
      "Creviced",
      "Conditioned",
      "Novice"
    ],
    "correct_option_id": 3,
    "solution": "D)Veteran(noun) – A person who has had long experience in a particular field, especially in the military. अनुभवी <br /> Antonym: Novice(noun) – A person new to or inexperienced in a field or situation, beginner. नौसिखिया",
    "question_index": 1
  },
  {
    "question": "Choose the <strong>ANTONYM </strong>of the word <strong>'fetish'</strong> in the given sentence. <br /> Shilpi has a fixed indifference and obsession towards problems in life.",
    "options": [
      "Indifference",
      "Fixed",
      "Problems",
      "Obsession"
    ],
    "correct_option_id": 0,
    "solution": "A)Fetish(verb) – the fact that somebody spends an unreasonable amount of time doing only a particular activity or thinking only about a particular thing किसी विशिष्ट वस्तु के बारे में सोचते हुए या किसी विशिष्ट काम में बहुत ज़्यादा समय लगाना <br /> Antonym:Indifference(noun) – Lack of interest, concern, or sympathy; apathy. उदासीनता",
    "question_index": 2
  },
  {
    "question": "Select the most appropriate <strong>ANTONYM</strong> of the underlined word. <br /> The boy looked <ins><strong>disheveled</strong> </ins>and lost.",
    "options": [
      "Tidy",
      "Clumsy",
      "Infuriated",
      "Excited"
    ],
    "correct_option_id": 0,
    "solution": "A)Disheveled(adjective) – Messy, untidy, unkempt, ruffled.बेढंगा <br /> Antonym:Tidy(adjective) – Neat, organized, orderly, clean.सुव्यवस्थित",
    "question_index": 3
  },
  {
    "question": "Select the most appropriate <strong>ANTONYM </strong>of the underlined word. <br /> The apple tasted incredibly <ins><strong>sweet</strong> </ins>.",
    "options": [
      "Delicious",
      "Pleasant",
      "Bitter",
      "Special"
    ],
    "correct_option_id": 2,
    "solution": "C)Sweet(adjective) – Having the pleasant taste characteristic of sugar or honey; not salty, sour, or bitter. मीठा <br /> Antonym:Bitter(adjective) – Having a sharp, pungent taste or smell; not sweet.कड़वा",
    "question_index": 4
  },
  {
    "question": "Select the most appropriate <strong>ANTONYM</strong> of the underlined word in the given sentence. <br /> I must have a chance to <ins><strong>rectify </strong></ins>my error.",
    "options": [
      "worsen",
      "alter",
      "reason",
      "Modify"
    ],
    "correct_option_id": 0,
    "solution": "A)Rectify(verb) – To make right, correct, amend, or adjust.सुधारना <br /> Antonym:Worsen(verb) – To make or become worse, deteriorate, degrade.बिगाड़ना",
    "question_index": 5
  },
  {
    "question": "Select the most appropriate <strong>ANTONYM </strong>of the underlined word. <br /> My <ins><strong>complaint</strong></ins> is that the gardener dozes off during work.",
    "options": [
      "Challenge",
      "Carp",
      "Praise",
      "Demur"
    ],
    "correct_option_id": 2,
    "solution": "C)Complaint(noun) – An expression of dissatisfaction, grievance, unhappiness.शिकायत <br /> Antonym:Praise(noun) – Expression of approval, admiration, or compliment.प्रशंसा",
    "question_index": 6
  },
  {
    "question": "Select the most appropriate <strong>ANTONYM </strong>of the underlined word in the given sentence. <br /> The lizard's light brown skin acts as <ins><strong>camouflag</strong></ins> in the desert sand.",
    "options": [
      "clothed",
      "mask",
      "reveal",
      "Vanishing"
    ],
    "correct_option_id": 2,
    "solution": "C)Camouflage(noun) – The use of any combination of materials, coloration, or illumination for concealment, either by making animals or objects hard to see, or by disguising them as something else. छला वरण लगाना <br /> Antonym:Reveal(verb) – To make (previously unknown or secret information) known to others; to uncover, to show, to display. प्रकटकरना",
    "question_index": 7
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
