<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paid OWS - Part (IV) (SSC CGL 2023)</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="28">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Paid OWS - Part (IV) (SSC CGL 2023)</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">14</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">28 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Paid OWS - Part (IV) (SSC CGL 2023)</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "Select the option that can be used as a <strong>one-word substitute </strong>for the given group of words. <br /> A detailed description of a series of real or fictional events taking place over a long period of time",
    "options": [
      "Witness",
      "Joumal",
      "Saga",
      "Case study"
    ],
    "correct_option_id": 2,
    "solution": "C) Saga(noun) – A detailed description of a series of real or fictional events taking place over a long period of time. गाथा",
    "question_index": 0
  },
  {
    "question": "Select the option that can be used as a <strong>one-word substitute</strong> for the given group of words. <br /> A person who compiles a dictionary",
    "options": [
      "Plagiarist",
      "Iconoclast",
      "Bibliophile",
      "Lexicographer"
    ],
    "correct_option_id": 3,
    "solution": "D)Lexicographer(noun) – A person who compiles a dictionary. शब्दकोश रचयिता",
    "question_index": 1
  },
  {
    "question": "Select the option that can be used as a <strong>one-word substitute</strong> for the given group of words. <br /> Being careful that every detail of something is correct",
    "options": [
      "Fastidious",
      "Squeamish",
      "Stubborn",
      "Impregnable"
    ],
    "correct_option_id": 0,
    "solution": "A) Fastidious(adjective) – Being very attentive to and concerned about accuracy and detail. सूक्ष्मता से ध्यान देने वाला",
    "question_index": 2
  },
  {
    "question": "Select the option that can be used as a <strong>one-word substitute</strong> for the given group of words. <br /> A person who draws or produces maps",
    "options": [
      "Calligrapher",
      "Choreographer",
      "Chauffeur",
      "Cartographer"
    ],
    "correct_option_id": 3,
    "solution": "D)Cartographer(noun) – A person who draws or produces maps. मानचित्रकार",
    "question_index": 3
  },
  {
    "question": "Select the option that can be used as a <strong>one-word substitute</strong> for the given group of words. <br /> A secret plan, made to do something (usually wrong)",
    "options": [
      "Strategy",
      "Planning",
      "Conditioning",
      "Conspiracy"
    ],
    "correct_option_id": 3,
    "solution": "D)Conspiracy(noun) – A secret plan by a group to do something unlawful or harmful. षड्यंत्र",
    "question_index": 4
  },
  {
    "question": "Select the option that can be used as a <strong>one-word substitute</strong> for the given group of words. <br /> To put off doing something, especially out of habitual carelessness or laziness",
    "options": [
      "Accelerate",
      "Lacerate",
      "Procrastinate",
      "Recuperate"
    ],
    "correct_option_id": 2,
    "solution": "C) Procrastinate(verb) – To put off doing something, especially out of habitual carelessness or laziness. टाल-मटोल करना",
    "question_index": 5
  },
  {
    "question": "Select the option that can be used as a <strong>one-word substitute </strong>for the given group of words. <br /> A person who gives help and sympathy to people who need it.",
    "options": [
      "Preacher",
      "Moralist",
      "Samaritan",
      "Pardoner"
    ],
    "correct_option_id": 2,
    "solution": "C)Samarbitan(noun) – A person who gives help and sympathy to people who need it. सहायक",
    "question_index": 6
  },
  {
    "question": "Select the option that can be used as a <strong>one-word substitute</strong> for the given group of words. <br /> Animal living both on land and water.",
    "options": [
      "Marine",
      "Amphibian",
      "Arboreal",
      "Terrestrial"
    ],
    "correct_option_id": 1,
    "solution": "B) Amphibian(noun) – A type of animal that can live both on land and in water. जलस्‍थलचर",
    "question_index": 7
  },
  {
    "question": "Select the option that can be used as a <strong>one-word substitute</strong> for the given group of words. <br /> Something that is absolutely necessary, that you cannot do without.",
    "options": [
      "Insular",
      "Indispensable",
      "Isolated",
      "Intolerant"
    ],
    "correct_option_id": 1,
    "solution": "B)Indispensable(adjective) – Absolutely necessary; essential; cannot be done without. अनिवार्य",
    "question_index": 8
  },
  {
    "question": "Select the option that can be used as a <strong>one-word substitute</strong> for the given group of words. <br /> Which cannot be read.",
    "options": [
      "Illiterate",
      "Inaudible",
      "Invisible",
      "Illegible"
    ],
    "correct_option_id": 3,
    "solution": "D)Illegible(adjective) – Not clear enough to be read; handwriting or print that is hard to decipher. अपठनीय",
    "question_index": 9
  },
  {
    "question": "Select the option that can be used as a <strong>one-word substitute</strong> for the given group of words. <br /> The murder of a large number of people from a particular nation or ethnic group.",
    "options": [
      "Geronticide",
      "Honour killing",
      "Genocide",
      "Mariticide"
    ],
    "correct_option_id": 2,
    "solution": "C)Genocide(noun) – The deliberate killing of a large group of people, especially those of a particular nation or ethnic group. नरसंहार",
    "question_index": 10
  },
  {
    "question": "Select the option that can be used as a <strong>one-word substitute </strong>for the given group of words. <br /> Life history written by oneself.",
    "options": [
      "Autography",
      "Autobiography",
      "Autophagy",
      "Autocracy"
    ],
    "correct_option_id": 1,
    "solution": "B) Autobiography(noun) – A self-written account of the life of oneself. आत्मजीवनी",
    "question_index": 11
  },
  {
    "question": "Select the option that can be used as a <strong>one-word substitute</strong> for the given group of words. <br /> A person who does not drink alcohol.",
    "options": [
      "Vegetarian",
      "Celibate",
      "Teetotaller",
      "Abstain"
    ],
    "correct_option_id": 2,
    "solution": "C) Teetotaller(noun) – A person who never drinks alcohol. शराब न पीने वाला",
    "question_index": 12
  },
  {
    "question": "Select the option that can be used as a <strong>one-word substitute</strong> for the given group of words. <br /> Something belonging to or surviving from an earlier period",
    "options": [
      "Vestige",
      "Dinosaur",
      "Ruin",
      "Relic"
    ],
    "correct_option_id": 3,
    "solution": "D) Relic(noun) – Something belonging to or surviving from an earlier period अवशेष",
    "question_index": 13
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
