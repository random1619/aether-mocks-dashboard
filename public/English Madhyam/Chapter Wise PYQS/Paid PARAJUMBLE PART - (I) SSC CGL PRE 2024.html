    "question": "<strong>Given below are four jumbled sentences. Select the option that gives their correct logical sequence.</strong> <br /> <strong>A.</strong> These can turn around to track stars with the rotation of Earth. <br /> <strong>B</strong>. Observatories are places to study place. <br /> <strong>C.</strong> They are mostly built on the mountain tops. <br /> <strong>D</strong>. Telescopes are placed in the dome-shaped roof of the building",
