<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Paid Sentence Improvement PART - (IV) SSC CGL PRE 2024</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">11</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">22 mins</div>
                </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Paid Sentence Improvement PART - (IV) SSC CGL PRE 2024</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">

            <div class="question-view">

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>

                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<strong>Select the most appropriate option that can substitute the underlined part in the following sentence</strong>. <br /> We all have to <ins><strong>pull our socks up</strong></ins> for the upcoming Board exam, if we want to get outstanding grades.",
    "options": [
      "act in a proper manner",
      "revive interest in old matters",
      "work harder than before",
      "calm down impudent contempt"
    ],
    "correct_option_id": 2,
    "solution": "C) 'pull our socks up' के बदले'work harder than before'का प्रयोग होगा क्योंकि 'pull our socks up' का अर्थ होता है मेहनत से काम करना और अपने प्रयासों को बढ़ाना। अतः सही उत्तर 'C' है; जैसे— We all have to work harder than before to achieve great success. <br /> 'work harder than before' will be used instead of 'pull our socks up' because 'pull our socks up' means to put more effort into something or work harder. Hence, the correct answer is 'C'; Like— We all have to work harder than before to achieve great success.",
    "question_index": 0
  },
  {
    "question": "<strong>Select the most appropriate option to substitute the underlined segment in the given sentence</strong>. <br /> Ashoka was the greatest <ins><strong>than all the Mauryan Emperors</strong></ins>",
    "options": [
      "to other Mauryan Emperors",
      "of the Mauryan Emperors",
      "all Mauryan Emperors",
      "to all another Mauryan Emperors"
    ],
    "correct_option_id": 1,
    "solution": "B) 'than all the Mauryan Emperors' के बदले'of the Mauryan Emperors'का प्रयोग होगा क्योंकि Superlative Degree के साथ ‘of’ Preposition का प्रयोग होता है; जैसे— He is the best of all the players. <br /> 'of the Mauryan Emperors' will be used instead of 'than all the Mauryan Emperors' because with the Superlative Degree, the preposition ‘of’ is used; Like— He is the best of all the players.",
    "question_index": 1
  },
  {
    "question": "<strong>Select the option that can substitute/replace the bracketed word correctly and complete the sentence</strong>. <br /> I said I (don’t) understand",
    "options": [
      "am doing",
      "doesn’t",
      "done",
      "didn’t"
    ],
    "correct_option_id": 3,
    "solution": "D) don’t' के बदले 'didn’t'का प्रयोग होगा क्योंकि मुख्य Clause 'I said' Past Tense में है, इसलिए Bracket में दिए गए Clause में भी Verb Past Tense में होना चाहिए; जैसे— I said I didn’t understand. <br /> 'didn’t' will be used instead of 'don’t' because the main clause 'I said' is in the Past Tense, so the verb in the bracketed clause should also be in the Past Tense; like— I said I didn’t understand.",
    "question_index": 2
  },
  {
    "question": "<strong>Select the most appropriate option to substitute the underlined segment in the given sentence.</strong> <br /> The <ins><strong>betrayer of the country</strong></ins> was at last unmasked",
    "options": [
      "theist",
      "truant",
      "transgressor",
      "traitor"
    ],
    "correct_option_id": 3,
    "solution": "D) 'betrayer of the country' ' के बदलेTraitorका प्रयोग होगा क्योंकि 'traitor' का अर्थ होता है देशद्रोही, जो इस वाक्य में सही विकल्प है। जबकि 'theist' का अर्थ आस्तिक होता है, 'truant' का अर्थ गैरहाजिर रहने वाला होता है और 'transgressor' का अर्थ नियम तोड़ने वाला होता है, जो इस संदर्भ में उचित नहीं है। <br /> 'Traitor'will be used instead of 'betrayer of the country' because 'traitor' means a person who betrays his country, which is the correct meaning in this sentence. 'Theist' means a believer in God, 'truant' refers to someone who stays away from duty, and 'transgressor' means someone who violates a rule, none of which fit this context.",
    "question_index": 3
  },
  {
    "question": "<strong>Select the most appropriate option to substitute the underlined word segment in the given sentence</strong>. <br /> I picked up my little clock and it began to <ins><strong>dance gracefully</strong></ins>",
    "options": [
      "chime prettily",
      "move gradually",
      "work agreeably",
      "lift smoothly"
    ],
    "correct_option_id": 0,
    "solution": "A) dance gracefully' के बदले'chime prettily'का प्रयोग होगा क्योंकि घड़ी के लिए 'dance' शब्द का प्रयोग गलत है और घड़ी के बजने को 'chime' कहा जाता है, जो संदर्भ में उचित है। उदाहरण के लिए: \"The clock chimed prettily every hour.\" <br /> 'chime prettily' will be used instead of 'dance gracefully' because the word 'dance' is incorrectly used for a clock. The proper term for a clock making sound is 'chime,' which fits the context. For example: \"The clock chimed prettily every hour.\"",
    "question_index": 4
  },
  {
    "question": "<strong>Select the most appropriate option that can substitute the underlined segment in the given sentence.</strong> <br /> RN Right’s literary works helped redefine discussions<ins> <strong>in race relations in America</strong></ins> in the mid-20th century.",
    "options": [
      "by race relations in America",
      "to race relations in America",
      "beside race relations in America",
      "of race relations in America"
    ],
    "correct_option_id": 3,
    "solution": "D) 'in race relations in America' के बदलेof race relations in America'का प्रयोग नहीं होगा क्योंकि 'redefine discussions' के संदर्भ में preposition 'of' का प्रयोग किया जाना चाहिए। 'discussions of race relations' एक सामान्य संरचना है, जहाँ 'of' का प्रयोग संबंध को दर्शाने के लिए होता है; जैसे— This book covers discussions of environmental issues in modern society. <br /> 'of race relations in America' will replace 'in race relations in America' because, in the context of 'redefine discussions,' the preposition 'of' is appropriate. 'Discussions of race relations' is a common structure where 'of' is used to show the relation; Like— This book covers discussions of environmental issues in modern society.",
    "question_index": 5
  },
  {
    "question": "<strong>Select the most appropriate option that can substitute the underlined segment in the given sentence.</strong> <br /> The chair I have bought recently <ins><strong>is costly</strong></ins> than what I bought last year.",
    "options": [
      "will be costly",
      "is costlier",
      "was costly",
      "is the costliest"
    ],
    "correct_option_id": 1,
    "solution": "B) 'is costly' के बदले'is costlier'का प्रयोग होगा क्योंकि यहाँ दो वस्तुओं की तुलना की जा रही है, अत: Comparative Degree (costlier) का प्रयोग किया जाएगा। जैसे— This chair is costlier than that one. <br /> 'is costlier' will be used instead of 'is costly' because here, a comparison is being made between two items, so the Comparative Degree (costlier) is required. Like— This chair is costlier than that one.",
    "question_index": 6
  },
  {
    "question": "<strong>Select the most appropriate option that can substitute the underlined word in the given sentence.</strong> <br /> <ins><strong>Verity</strong></ins> is a good virtue for human life.",
    "options": [
      "Cooperation",
      "Knowledge",
      "Truth",
      "Information"
    ],
    "correct_option_id": 2,
    "solution": "C) Verity’ के बदले'Truth'का प्रयोग होगा क्योंकि ‘Verity’ का अर्थ 'सत्य' या 'सच्चाई' होता है, जो इंसान के जीवन में एक अच्छे गुण को दर्शाता है। अतः वाक्य में ‘Truth’ सही विकल्प है क्योंकि यह 'सत्य' के गुण का सही अर्थ प्रकट करता है। <br /> 'Truth'will replace 'Verity' because 'Verity' means 'truth' or 'reality,' which represents a good virtue for human life. Therefore, in the sentence, 'Truth' is the correct word to convey the intended meaning.",
    "question_index": 7
  },
  {
    "question": "<strong>Select the most appropriate option to substitute the underlined part of the following sentence.</strong> <br /> The playwright has faced <ins><strong>many ups and downs</strong></ins> in his literary career, which spanned for almost 30 years.",
    "options": [
      "much truth and falsehood",
      "much light and darkness",
      "many agreements and disagreements",
      "many good and bad times"
    ],
    "correct_option_id": 3,
    "solution": "'D)many good and bad times'के बदले 'ups and downs' का प्रयोग होगा क्योंकि वाक्यांश\"ups and downs\" जीवन या करियर में होने वाले विभिन्न अनुभवों, विशेष रूप से अच्छे और बुरे समय का प्रतिनिधित्व करता है। अतः 'many good and bad times' इसका सही और सटीक प्रतिस्थापन है। जैसे—The playwright has faced many ups and downs in his literary career, which spanned for almost 30 years. <br /> many good and bad times\" will be used instead of \"ups and downs\" because the phrase \"ups and downs\" reflects the various experiences in one’s life or career, particularly the good and bad times. Hence, \"many good and bad times\" is the correct and accurate substitution. Like—The playwright has faced many ups and downs in his literary career, which spanned for almost 30 years.",
    "question_index": 8
  },
  {
    "question": "<strong>Select the most appropriate option that can substitute the underlined segment in the given sentence. If no substitution is required, select ‘No substitution’.</strong> <br /> The chief guest concluded his speech as <ins><strong>he requested</strong></ins> to stop by the organisers",
    "options": [
      "he will be requested",
      "he was requested",
      "no substitution",
      "he is requested"
    ],
    "correct_option_id": 1,
    "solution": "B)he was requested'का प्रयोग 'he requested' के स्थान पर किया जाएगा क्योंकि मुख्य clause में Verb Past Tense 'concluded' में है। इसलिए Relative Clause में भी Verb Past Tense में होना चाहिए। अतः 'he was requested' सही उत्तर है। उदाहरण के लिए: <br /> he was requested'will be used instead of 'he requested' because in the main clause, the verb 'concluded' is in the Past Tense. Therefore, the Relative Clause should also follow the Past Tense. Hence, 'he was requested' is the correct answer.",
    "question_index": 9
  },
  {
    "question": "<strong>Select the word segment that can substitute the bracketed word segment correctly and complete the sentence meaningfully.</strong> <br /> We will have to (put the meeting away) as the Director is not well.",
    "options": [
      "put the meeting on",
      "put the meeting again",
      "put the meeting off",
      "put the meeting up"
    ],
    "correct_option_id": 2,
    "solution": "C) ' put the meeting away' के बदले 'put the meetingoffका प्रयोग नहीं होगा क्योंकि 'put off' का अर्थ 'स्थगित करना' है, और यहां Director की तबियत खराब होने के कारण बैठक को स्थगित किया जा रहा है। अतः सही उत्तर 'put the meeting off' होगा; जैसे — We will have to put the meeting off as the Director is not well. <br /> 'put the meetingoff' will be used instead of 'put the meeting away' because \"put off\" means \"to postpone\" or \"to delay.\" Here, due to the Director's illness, the meeting needs to be postponed. So, \"put the meeting off\" is the correct and meaningful phrase for this sentence.",
    "question_index": 10
  }
];
    </script>
