<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paid Idioms  - Part (iii) (SSC CGL 2023)</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="18">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Paid Idioms  - Part (iii) (SSC CGL 2023)</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">9</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">18 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Paid Idioms  - Part (iii) (SSC CGL 2023)</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<strong>Select the most appropriate meaning of the given idiom.</strong> <br /> Taking a bull by the horns",
    "options": [
      "Wearing a skull cap",
      "To decapitate a bull for beef",
      "To make a stupid decision thinking it to be daring",
      "To deal with a difficult situation in a very direct or confident way"
    ],
    "correct_option_id": 3,
    "solution": "D)Taking a bull by the horns(idiom) – To deal with a difficult situation in a very direct or confident way कठिन परिस्थिति का सामना करना।",
    "question_index": 0
  },
  {
    "question": "<strong>Identify the sentence that provides the meaning of the given idiom.</strong> <br /> Under the cloud",
    "options": [
      "The classmates were dancing together under the rain.",
      "The driver was under suspicion after the police found blood on his car.",
      "The Red fort looks beautiful amidst the cloudy weather and cold atmosphere.",
      "It was the best place to sit under the sky with hands full of food."
    ],
    "correct_option_id": 1,
    "solution": "B) Under the cloud(idiom) – Being under suspicion or disrepute आशंका में होना",
    "question_index": 1
  },
  {
    "question": "<strong>Select the most appropriate meaning of the given idiom.</strong> <br /> Once in a blue moon",
    "options": [
      "Very ancient",

      "Very high"
    ],
    "correct_option_id": 2,
    "solution": "C) Once in a blue moon (idiom) – Very rareबहुत ही दुर्लभ",
    "question_index": 2
  },
  {
    "question": "<strong>Select the sentence that has the most appropriate meaning of the given idiom.</strong> <br /> Bad blood",
    "options": [
      "She is so scared of cockroaches that she fainted when she saw them crawling near her foot.",
      "The doctor dropped the bad news to Ravi as he was suffering from a serious disease.",
      "The gangster had some bitter relations with a local activist so he warned him to stay out of his business.",
      "Sushant always gets in trouble for telling lies but he never learns anything."
    ],
    "correct_option_id": 2,
    "solution": "C)Bad blood(idiom) – Bitter relations between people कट्टर दुश्मनी",
    "question_index": 3
  },
  {
    "question": "<strong>Select the most appropriate meaning of the given idiom.</strong> <br /> A perfect storm",
    "options": [
      "Pretty good judgement",
      "Healing from trauma",
      "The worst possible situation",
      "Appropriate for all occasions"
    ],
    "correct_option_id": 2,
    "solution": "C)perfect storm(idiom) – The worst possible situation सबसे खराब संभावित स्थिति",
    "question_index": 4
  },
  {
    "question": "<strong>Select the most appropriate meaning of the given idiom.</strong> <br /> Hit the jackpot",

    "correct_option_id": 3,
    "solution": "D)Hit the jackpot(idiom) – Gaining a big success बड़ी सफलता पाना",
    "question_index": 5
  },
  {
    "question": "<strong>Select the most appropriate meaning of the underlined phrase.</strong> <br /> Ravish is ready to <ins><strong>throw caution to the wind</strong></ins>.",
    "options": [
      "Fight with wind",
      "Act foolishly",
      "Spend lavishly",
      "Take risk"
    ],
    "correct_option_id": 3,
    "solution": "D)Throw caution to the wind(phrase) – Take risk जोखिम लेना.",
    "question_index": 6
  },
  {
    "question": "<strong>Choose the most appropriate meaning of the underlined phrase.</strong> <br /> Many analysts are tipping stable, blue-chip companies <strong>to <ins>weather the storm</ins></strong>.",
    "options": [
      "to deal with a simple situation without being harmed",
      "to deal with a situation without thinking",
      "to deal with a difficult situation without being harmed",
      "to deal with a simple situation without harming anyone else"
    ],
    "correct_option_id": 2,
    "solution": "C)To weather the storm(phrase) – To deal with a difficult situation without being harmed.किसी कठिन परिस्थिति से बिना किसी नुकसान के निपटना।",
    "question_index": 7
  },
  {
    "question": "<strong>Select the most appropriate meaning of the given idiom</strong>. <br /> Pass the buck",
    "options": [
      "Providing essential services",

      "Blaming another person",
      "Saying something unpleasant"
    ],
    "correct_option_id": 2,
    "solution": "C)Pass the buck(idiom) – Blaming another person दूसरे पर दोष डालना",
    "question_index": 8
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
