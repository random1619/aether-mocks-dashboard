<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Mocks — Premium Mock Test Dashboard</title>
    <meta name="description" content="Browse, search and track your mock test preparation across all providers in one clean, unified dashboard.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <!-- Fixed Top Navigation -->
    <nav class="topnav" id="topnav">
        <div class="topnav-left">
            <div class="nav-logo">
                <i class="fa-solid fa-layer-group"></i>
            </div>
            <div class="nav-brand">
                <span class="nav-brand-name">Aether Mocks</span>
                <span class="nav-brand-tagline">Mock Test Explorer</span>
            </div>
        </div>

        <div class="topnav-center">
            <div class="global-search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="global-search" class="global-search" placeholder="Search across all 1,000+ mocks...">
                <kbd class="search-kbd">⌘K</kbd>
            </div>
        </div>

        <div class="topnav-right">
            <div class="view-toggle">
                <button class="view-btn active" id="view-grid-btn" title="Grid View">
                    <i class="fa-solid fa-grip-vertical"></i>
                    <span>Grid</span>
                </button>
                <button class="view-btn" id="view-roadmap-btn" title="Roadmap View">
                    <i class="fa-solid fa-route"></i>
                    <span>Roadmap</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Stats Strip -->
    <div class="stats-strip" id="stats-strip">
        <div class="stat-item">
            <div class="stat-icon stat-icon-blue">
                <i class="fa-solid fa-file-lines"></i>
            </div>
            <div class="stat-body">
                <div class="stat-number" id="stat-total">0</div>
                <div class="stat-label">Total Tests</div>
            </div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-icon stat-icon-green">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <div class="stat-body">
                <div class="stat-number stat-number-green" id="stat-completed">0</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-icon stat-icon-amber">
                <i class="fa-solid fa-hourglass-half"></i>
            </div>
            <div class="stat-body">
                <div class="stat-number stat-number-amber" id="stat-remaining">0</div>
                <div class="stat-label">Remaining</div>
            </div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item stat-item-progress">
            <div class="stat-icon stat-icon-violet">
                <i class="fa-solid fa-chart-line"></i>
            </div>
            <div class="stat-body">
                <div class="stat-progress-row">
                    <div class="stat-number" id="stat-progress-txt">0%</div>
                    <div class="stat-progress-track">
                        <div class="stat-progress-fill" id="stat-progress-bar"></div>
                    </div>
                </div>
                <div class="stat-label">Overall Progress</div>
            </div>
        </div>
    </div>

    <!-- App Shell -->
    <div class="app-shell">

        <!-- Left Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-header-title">
                    <i class="fa-solid fa-sliders"></i>
                    Filters
                </div>
                <div class="results-badge" id="results-count">0 mocks</div>
            </div>

            <div class="sidebar-body">
                <!-- Provider Filter -->
                <div class="filter-group">
                    <div class="filter-group-label">
                        <i class="fa-solid fa-building-columns"></i>
                        Provider
                    </div>
                    <div class="pills-container" id="provider-filters"></div>
                </div>

                <!-- Subject Filter -->
                <div class="filter-group">
                    <div class="filter-group-label">
                        <i class="fa-solid fa-graduation-cap"></i>
                        Subject
                    </div>
                    <div class="pills-container" id="subject-filters"></div>
                </div>

                <!-- Category Filter -->
                <div class="filter-group">
                    <div class="filter-group-label">
                        <i class="fa-solid fa-folder-open"></i>
                        Category
                    </div>
                    <div class="select-wrapper">
                        <select class="custom-select" id="category-filter">
                            <option value="all">All Categories</option>
                        </select>
                        <i class="fa-solid fa-chevron-down select-arrow"></i>
                    </div>
                </div>

                <!-- Status Filter -->
                <div class="filter-group">
                    <div class="filter-group-label">
                        <i class="fa-solid fa-circle-half-stroke"></i>
                        Status
                    </div>
                    <div class="status-tabs" id="status-filters">
                        <button class="status-tab active" data-status="all">All</button>
                        <button class="status-tab" data-status="completed">
                            <i class="fa-solid fa-check"></i> Done
                        </button>
                        <button class="status-tab" data-status="pending">
                            <i class="fa-regular fa-clock"></i> Pending
                        </button>
                    </div>
                </div>

                <!-- Sort -->
                <div class="filter-group">
                    <div class="filter-group-label">
                        <i class="fa-solid fa-sort"></i>
                        Sort By
                    </div>
                    <div class="select-wrapper">
                        <select class="custom-select" id="sort-select">
                            <option value="name-asc">Name A → Z</option>
                            <option value="name-desc">Name Z → A</option>
                            <option value="provider-asc">By Provider</option>
                        </select>
                        <i class="fa-solid fa-chevron-down select-arrow"></i>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-toolbar">
                <div class="toolbar-left">
                    <span class="results-text" id="results-text">Loading mocks...</span>
                </div>
                <div class="toolbar-right">
                    <div class="load-more-wrapper" id="load-more-wrapper" style="display:none;">
                        <button class="load-more-btn" id="load-more-btn">
                            <i class="fa-solid fa-plus"></i> Load More
                        </button>
                    </div>
                </div>
            </div>

            <div class="grid" id="grid">
                <!-- Cards injected by JS -->
            </div>
        </main>
    </div>

    <script src="mocks-data.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
