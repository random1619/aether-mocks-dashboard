<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>

        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following is the correct order of basicity?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2381;&#2359;&#2366;&#2352;&#2368;&#2351;&#2340;&#2366; &#2325;&#2366; &#2360;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2361;&#2376;?</p><p><b>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</b></span>",
    "options": [
      "<span class=\"eqt\">LiOH &gt; NaOH &gt; KOH &gt; CsOH</span><span class=\"hqt\" style=\"display:none\">LiOH > NaOH > KOH > CsOH</span>",
      "<span class=\"eqt\">LiOH &gt; KOH &gt; CsOH &gt; NaOH</span><span class=\"hqt\" style=\"display:none\">LiOH > KOH > CsOH > NaOH</span>",
      "<span class=\"eqt\">KOH &gt; CsOH &gt; NaOH &gt; LiOH</span><span class=\"hqt\" style=\"display:none\">KOH > CsOH > NaOH > LiOH</span>",
      "<span class=\"eqt\">CsOH &gt; KOH &gt; NaOH &gt; LiOH</span><span class=\"hqt\" style=\"display:none\">CsOH > KOH > NaOH > LiOH</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>1) <b>Definition of Basicity:</b></p><p>o Basicity refers to the strength of a base, which depends on its ability to donate hydroxide ions (OH&#8722;OH^-OH&#8722;) in an aqueous solution.</p><p>2) <b>Trend in Alkali Metal Hydroxides:</b></p><p>o As we move down Group 1 of the periodic table, the hydroxides of alkali metals become stronger bases due to increased ionic size and solubility in water.</p><p>o Order of basicity: CsOH &gt; KOH &gt; NaOH &gt; LiOH.</p><p><b>Explanation of Incorrect Options:</b></p><p>&#183; Option 1, 2, and 3 list incorrect trends that do not align with the periodic properties of alkali metals.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following elements is a metalloid?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2340;&#2340;&#2381;&#2357; &#2313;&#2346;&#2343;&#2366;&#2340;&#2369; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Iron</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2361;&#2366;</span>",
      "<span class=\"eqt\">Oxygen</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Sodium</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Silicon</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2354;&#2367;&#2325;&#2377;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Silicon is classified as a metalloid because it has properties of both metals and non-metals.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Where is sodium located on the periodic table?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2350;&#2375;&#2306; &#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2325;&#2361;&#2366;&#2305; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bottom of the table</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2339;&#2368; &#2350;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2344;&#2368;&#2330;&#2375;</span>",
      "<span class=\"eqt\">Top period</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2368;&#2352;&#2381;&#2359; &#2310;&#2357;&#2352;&#2381;&#2340; &#2350;&#2375;&#2306;</span>",
      "<span class=\"eqt\">On the right side</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2366;&#2312;&#2306; &#2323;&#2352;</span>",
      "<span class=\"eqt\">On the left side</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2312;&#2306; &#2323;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>The metals are to the left of the line (except for hydrogen, which is a nonmetal)</b>, the nonmetals are to the right of the line, and the elements immediately adjacent to the line are the metalloids.</p><p>Sodium in the Periodic Table. Sodium, atomic symbol Na, has an atomic number of eleven, and lies in group 1 on the periodic table, below lithium and to the left of magnesium.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The reaction of an acid and a metal gives:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2309;&#2350;&#2381;&#2354; &#2324;&#2352; &#2319;&#2325; &#2343;&#2366;&#2340;&#2369; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Hydrogen gas and salt</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344; &#2327;&#2376;&#2360; &#2324;&#2352; &#2344;&#2350;&#2325;</span>",
      "<span class=\"eqt\">Carbon dioxide, salt and water</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;, &#2344;&#2350;&#2325; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Salt and water</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2350;&#2325; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Carbon dioxide, salt and hydrogen gas</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;, &#2344;&#2350;&#2325; &#2324;&#2352; &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344; &#2327;&#2376;&#2360;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; When an acid reacts with a metal, the products are <b>salt and hydrogen gas</b>.</p><p>&#183; <b>General reaction:</b></p><p>Metal + Acid &rarr; Salt + Hydrogen gas</p><p>Example: Zn + HCl &rarr; ZnCl&#8322; + H&#8322;&#8593;</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the chemical name for Ge.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2340;&#2381;&#2352; Ge &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2344;&#2366;&#2350; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Gallium</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2354;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Gold</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2354;&#2381;&#2337; (&#2360;&#2379;&#2344;&#2366;)</span>",
      "<span class=\"eqt\">Germanium</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2352;&#2381;&#2350;&#2375;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Gadolinium</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2337;&#2379;&#2354;&#2367;&#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Germanium is a chemical element with symbol <b>Ge</b> and atomic number <b>32</b>. Classified as a metalloid, germanium is a solid at room temperature.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which element of group 13 is a soft metal with a low melting point (303K) and is widely used in doping semiconductors and producing solid-state devices such as transistors?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2370;&#2361; 13 &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2340;&#2340;&#2381;&#2357; &#2319;&#2325; &#2325;&#2350; &#2327;&#2354;&#2344;&#2366;&#2306;&#2325; (303K) &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2344;&#2352;&#2350; &#2343;&#2366;&#2340;&#2369; &#2361;&#2376; &#2324;&#2352; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2352;&#2381;&#2343;&#2330;&#2366;&#2354;&#2325; &#2325;&#2375; &#2337;&#2379;&#2346;&#2344;/&#2309;&#2346;&#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2324;&#2352; &#2335;&#2381;&#2352;&#2366;&#2306;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352; &#2332;&#2376;&#2360;&#2375; &#2336;&#2379;&#2360;-&#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2375; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Aluminium</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2354;&#2381;&#2351;&#2369;&#2350;&#2368;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Boron</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2379;&#2352;&#2377;&#2344;</span>",
      "<span class=\"eqt\">Thallium</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2376;&#2354;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Gallium</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2354;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Gallium</b>, a soft metal of group 13, has the second lowest melting point (after mercury) and can remain in the liquid phase at a larger range of temperatures than any other substance.</p><p>With a low melting point of 303K, it is widely used in doping semiconductors and producing solid-state devices such as transistors.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following types of elements is included in the leftmost group of the periodic table?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2340;&#2340;&#2381;&#2357; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2325;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2366;&#2319;&#2305; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Noble gases</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2379;&#2348;&#2354; &#2327;&#2376;&#2360;</span>",
      "<span class=\"eqt\">Halogen</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2376;&#2354;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Non metal</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2366;&#2340;&#2369;</span>",
      "<span class=\"eqt\">Alkali Metals</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2359;&#2366;&#2352;&#2368;&#2351; &#2343;&#2366;&#2340;&#2369;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The group of elements that are on the far left of the periodic table are called the <b>alkali metals</b>, which have one electron in their outermost shell that they tend to lose easily.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>'Au' is the symbol for which of the following elements?</p></span><span class=\"hqt\" style=\"display:none\">'Au' &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2340;&#2340;&#2381;&#2357; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Gold</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Aluminium</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2351;&#2369;&#2350;&#2368;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Silver</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2305;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Argon</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2327;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The symbol <b>'Au'</b> represents <b>Gold</b>.</p><p>It comes from the Latin word <b>'Aurum'</b>, which means gold. Gold is a highly valued precious metal with the atomic number 79.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a halogen gas?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2361;&#2376;&#2354;&#2379;&#2332;&#2344; &#2327;&#2376;&#2360; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">F</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2347;</span>",
      "<span class=\"eqt\">He</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361;</span>",
      "<span class=\"eqt\">Cl</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2379;&#2352;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Br</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;&#2310;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Halogens are a group of elements in Group 17 of the periodic table, including Fluorine (F), Chlorine (Cl), Bromine (Br), Iodine (I), and Astatine (At).</p><p>&#183; Helium (He) is not a halogen; it is a noble gas from Group 18, known for its stability and non-reactivity.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>What is the position of non-metals in the periodic table?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2350;&#2375;&#2306; &#2309;&#2343;&#2366;&#2340;&#2369;&#2323;&#2306; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bottom of the table</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2339;&#2368; &#2325;&#2375; &#2344;&#2367;&#2330;&#2354;&#2366; &#2349;&#2366;&#2327;</span>",
      "<span class=\"eqt\">On the right side</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2366;&#2312;&#2306; &#2323;&#2352;</span>",
      "<span class=\"eqt\">On the left side</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2312;&#2306; &#2323;&#2352;</span>",
      "<span class=\"eqt\">Top period</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2368;&#2352;&#2381;&#2359; &#2310;&#2357;&#2352;&#2381;&#2340;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In the periodic table: the metal elements are placed on the left-hand side. The non-metal elements are placed on the <b>right-hand side.</b></p>",
    "question_index": 9
  }
];
