  {
    "question": "<span class=\"eqt\"><p>The traditional art form of \"Madhubani\" or \"Mithila\" painting belongs to which state?</p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2350;&#2343;&#2369;&#2348;&#2344;&#2368;\" &#2351;&#2366; \"&#2350;&#2367;&#2341;&#2367;&#2354;&#2366;\" &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2354;&#2366; &#2325;&#2366; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2325;&#2354;&#2366; &#2352;&#2370;&#2346; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">Uttar Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2366;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;&#2404;</span>",
      "<span class=\"eqt\">Madhya Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Rajasthan</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Bihar</b> is the state where Madhubani painting originated.</p><p>Madhubani (or Mithila) painting is a traditional art form practiced in the Mithila region of Bihar. It features geometric patterns, mythological motifs, and natural elements, traditionally painted on freshly plastered mud walls but now also on cloth, handmade paper, and canvas.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which Indian state is famous for the \"Warli\" tribal art form?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351; \"&#2357;&#2366;&#2352;&#2354;&#2368;\" &#2310;&#2342;&#2367;&#2357;&#2366;&#2360;&#2368; &#2325;&#2354;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">Gujarat</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2332;&#2352;&#2366;&#2340;</span>",

    ],
    "correct_option_id": 0,
    "solution": "<p><b>Maharashtra</b> is famous for Warli tribal art.</p><p>Warli art originated in the Warli tribe of Maharashtra. It is characterized by its simple white geometric and stick-like human figures against an earthy background, depicting scenes of daily and social life.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>\"Yakshagana\" is a traditional theater form predominantly practiced in which state?</p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2351;&#2325;&#2381;&#2359;&#2327;&#2366;&#2344;\" &#2319;&#2325; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2352;&#2306;&#2327;&#2350;&#2306;&#2330; &#2352;&#2370;&#2346; &#2361;&#2376; &#2332;&#2379; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2330;&#2354;&#2367;&#2340; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Tamil Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>",

    "question_index": 2
  },
  {

    "question_index": 3
  },

      "<span class=\"eqt\">Andhra Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Tamil Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>",

    "question_index": 4

    "correct_option_id": 0,
    "solution": "<p><b>Tamil Nadu</b> is the state where Tanjore paintings originated.</p><p>Tanjore (Thanjavur) paintings originated in the town of Thanjavur in Tamil Nadu during the Maratha rule in the 16th century. These paintings are characterized by rich, vivid colors, gold foil overlays, and inlay work with glass beads or semi-precious stones, typically depicting Hindu gods, goddesses, and saints.</p>",
    "question_index": 5

    "correct_option_id": 0,

      "<span class=\"eqt\">a-iv, b-i, c-iii, d-ii</span><span class=\"hqt\" style=\"display:none\">a-iv, b-i, c-iii, d-ii</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Bell Metal (DHOKRA): </b>Bastar and Raigarh districts of Chhattisgarh are popular for crafting bell metal handicrafts using brass, and bronze. Tribes like 'Ghawas' of Bastar and 'Jharas' of Raigarh mainly practice this art form, also known as Dhokra art. This is done with lost wax technique or hollow casting.</p><p>&#183; <b>Godna</b> is possibly the most pioneering art form, currently practiced by a handful of women in Jangala in Chhattisgarh. Ladies of this village paint traditional tattoo motifs on textiles. They use natural color obtained from the forest and combine them with acrylic paint to make it more stable on fabric.</p><p>&#183; The <b>Loha Shilp</b> or the use of wrought iron to create dark raw forms of the metal artifacts and figurines is another craft form of Chhattisgarh. The raw material used for this craft is mostly recycled scrap iron. Things like lamps, candle stands, effigies of musicians, toys, figurines, and deities are the typical products made out of this craft.</p><p>&#183; <b>Tumba</b> is a less known craft widely produced in the Bastar region, which originated with the widespread use of hollow gourd shells. Tribal use them as containers to store water and salfi, from which this art is inspired.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>\"Thangka\" painting is a traditional Buddhist art form primarily associated with which Indian state/region?</p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2341;&#2366;&#2306;&#2327;&#2325;&#2366;\" &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2354;&#2366; &#2319;&#2325; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2348;&#2380;&#2342;&#2381;&#2343; &#2325;&#2354;&#2366; &#2352;&#2370;&#2346; &#2361;&#2376; &#2332;&#2379; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2367;&#2360; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351;/&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sikkim</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2325;&#2381;&#2325;&#2367;&#2350;</span>",
      "<span class=\"eqt\">Ladakh</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2342;&#2381;&#2342;&#2366;&#2326;</span>",
      "<span class=\"eqt\">Arunachal Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>All of the above</b> regions are associated with Thangka painting.</p><p>Thangka paintings are traditional Buddhist scroll paintings practiced in the Himalayan regions of India including Sikkim, Ladakh, and Arunachal Pradesh. These detailed paintings usually depict Buddhist deities, mandalas, or important scenes from Buddhist teachings.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which state is known for the traditional \"Cheriyal Scroll Painting\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; \"&#2330;&#2375;&#2352;&#2367;&#2351;&#2354; &#2360;&#2381;&#2325;&#2381;&#2352;&#2377;&#2354; &#2346;&#2375;&#2306;&#2335;&#2367;&#2306;&#2327;\" &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Telangana</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2375;&#2354;&#2306;&#2327;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Andhra Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Karnataka</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;</span>",
      "<span class=\"eqt\">Tamil Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Telangana</b> is known for Cheriyal Scroll Painting.</p><p>Cheriyal Scroll Painting is a stylized form of narrative scroll painting from Telangana. Traditionally created by the Nakashi family, these colorful scrolls depict stories from Indian mythology and were used by storytelling communities like the Kaki Padagollu.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>\"Thodu Bommalata\" (String Puppet) is a traditional art form of which state?</p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2341;&#2379;&#2337;&#2370; &#2348;&#2379;&#2350;&#2381;&#2350;&#2366;&#2354;&#2340;&#2366;\" (&#2360;&#2381;&#2335;&#2381;&#2352;&#2367;&#2306;&#2327; &#2325;&#2336;&#2346;&#2369;&#2340;&#2354;&#2368;) &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2325;&#2354;&#2366; &#2352;&#2370;&#2346; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Andhra Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Kerala</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2352;&#2354;</span>",
      "<span class=\"eqt\">Tamil Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>",
      "<span class=\"eqt\">Karnataka</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Andhra Pradesh</b> is the state associated with Thodu Bommalata.</p><p>Thodu Bommalata, also known as String Puppet theatre, is a traditional puppet art form from Andhra Pradesh. The puppets are controlled by strings and narrate stories primarily from Hindu epics like Ramayana and Mahabharata.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following caves contains one of the oldest surviving murals in India dating from 2nd century BC to 5-6th century AD?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2327;&#2369;&#2347;&#2366; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2348;&#2360;&#2375; &#2346;&#2369;&#2352;&#2366;&#2344;&#2375; &#2332;&#2368;&#2357;&#2367;&#2340; &#2349;&#2367;&#2340;&#2381;&#2340;&#2367;&#2330;&#2367;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2361;&#2376;, &#2332;&#2379; &#2342;&#2370;&#2360;&#2352;&#2368; &#2358;&#2340;&#2366;&#2348;&#2381;&#2342;&#2368; &#2312;&#2360;&#2366; &#2346;&#2370;&#2352;&#2381;&#2357; &#2360;&#2375; 5-6&#2357;&#2368;&#2306; &#2358;&#2340;&#2366;&#2348;&#2381;&#2342;&#2368; &#2312;&#2360;&#2381;&#2357;&#2368; &#2340;&#2325; &#2325;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bagh Caves</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2328; &#2327;&#2369;&#2347;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Ajanta Caves</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2332;&#2306;&#2340;&#2366; &#2325;&#2368; &#2327;&#2369;&#2347;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Ellora Caves</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2354;&#2379;&#2352;&#2366; &#2325;&#2368; &#2327;&#2369;&#2347;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Jogimara Caves</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2379;&#2327;&#2368;&#2350;&#2366;&#2352;&#2366; &#2327;&#2369;&#2347;&#2366;&#2319;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Ajanta Caves</b> (Maharashtra) contain one of the oldest surviving murals in India, dating from 2nd century BC to 5-6th century AD.</p><p>These caves are carved in a horse-shoe shape, belonging to Maurya, Gupta and Shunga period. They feature both murals and fresco paintings using the tempera style (use of pigments). The paintings primarily depict Buddhist themes like Jataka stories and the life of Buddha.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following principles of Indian paintings refers to the variety of form, looks and appearance?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2354;&#2366; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2352;&#2370;&#2346;, &#2352;&#2370;&#2346; &#2324;&#2352; &#2342;&#2367;&#2326;&#2366;&#2357;&#2335; &#2325;&#2368; &#2357;&#2367;&#2357;&#2367;&#2343;&#2340;&#2366; &#2325;&#2379; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pramana</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2350;&#2366;&#2339;</span>",
      "<span class=\"eqt\">Rupabheda</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2370;&#2346;&#2349;&#2375;&#2342;</span>",
      "<span class=\"eqt\">Lavanya Yojanam</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2357;&#2339;&#2381;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Sadrisyam</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2342;&#2381;&#2352;&#2367;&#2360;&#2381;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Rupabheda</b> refers to the variety of form, looks and appearance in Indian paintings.</p><p>This is one of the six fundamental principles (Shadanga) of Indian paintings mentioned in classical texts. The other principles include Pramana (proportion), Bhava (expressions), Lavanya Yojanam (aesthetic composition), Sadrisyam (resemblance), and Varnikabhanga (use of brush and colors).</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which pre-historic painting site is located in Uttarakhand?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2326;&#2306;&#2337; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2352;&#2366;&#2327;&#2376;&#2340;&#2367;&#2361;&#2366;&#2360;&#2367;&#2325; &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2354;&#2366; &#2360;&#2381;&#2341;&#2354; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bhimbetka rock paintings</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2368;&#2350;&#2348;&#2375;&#2335;&#2325;&#2366; &#2358;&#2376;&#2354;&#2330;&#2367;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Narsinghgarh rock paintings</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2360;&#2367;&#2306;&#2361;&#2327;&#2338;&#2364; &#2358;&#2376;&#2354;&#2330;&#2367;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Lakhudiyar rock paintings</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2326;&#2369;&#2337;&#2367;&#2351;&#2366;&#2352; &#2358;&#2376;&#2354;&#2330;&#2367;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Jogimara rock paintings</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2379;&#2327;&#2368;&#2350;&#2366;&#2352;&#2366; &#2358;&#2376;&#2354; &#2330;&#2367;&#2340;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Lakhudiyar rock paintings</b> are located in Uttarakhand.</p><p>These are important pre-historic rock paintings, while Bhimbetka rock paintings are found in Madhya Pradesh, Narsinghgarh paintings in Madhya Pradesh, and Jogimara rock paintings in Chhattisgarh.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>The name \"Miniature Paintings\" is derived from which of the following words?</p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2354;&#2328;&#2369; &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2354;&#2366;\" &#2344;&#2366;&#2350; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2358;&#2348;&#2381;&#2342; &#2360;&#2375; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Minium</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2306;&#2342;&#2370;&#2352;</span>",
      "<span class=\"eqt\">Minute</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">Minimal</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350;</span>",
      "<span class=\"eqt\">Minuscule</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2361;&#2360;&#2381;&#2340;&#2354;&#2375;&#2326;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The name \"Miniature Paintings\" is derived from the word <b>\"Minium\"</b> which means Red lead paint.</p><p>Miniature paintings are small and detailed, typically not larger than 25 square inches. They follow a formula of 1/6th of the actual object size.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Mughal emperors is known as the \"Naturalist\" and is associated with the golden period of Mughal miniature paintings?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2350;&#2369;&#2327;&#2354; &#2360;&#2350;&#2381;&#2352;&#2366;&#2335; &#2325;&#2379; \"&#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367;&#2357;&#2366;&#2342;&#2368;\" &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2357;&#2361; &#2350;&#2369;&#2327;&#2354; &#2354;&#2328;&#2369; &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2354;&#2366; &#2325;&#2375; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2325;&#2366;&#2354; &#8203;&#8203;&#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Akbar</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2348;&#2352;</span>",
      "<span class=\"eqt\">Babur</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2348;&#2352;</span>",
      "<span class=\"eqt\">Jahangir</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2361;&#2366;&#2306;&#2327;&#2368;&#2352;</span>",
      "<span class=\"eqt\">Shah Jahan</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2361;&#2332;&#2361;&#2366;&#2305;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Jahangir</b> is known as the \"Naturalist\" and his reign is considered the golden period of Mughal miniature paintings.</p><p>Under Jahangir's patronage, artist Ustad Mansoor created famous works like \"Zebra, the turkey and the cock.\" Jahangir brought decorated margins to miniature paintings and maintained a private workshop for artists.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Which school of painting is known for the famous work \"Bani Thani\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2354;&#2366; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2325;&#2371;&#2340;&#2367; \"&#2348;&#2366;&#2344;&#2368; &#2336;&#2344;&#2368;\" &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kishangarh School</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2358;&#2344;&#2327;&#2338;&#2364; &#2360;&#2381;&#2325;&#2370;&#2354;</span>",
      "<span class=\"eqt\">Marwar School</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2352;&#2357;&#2366;&#2337;&#2364; &#2360;&#2381;&#2325;&#2370;&#2354;</span>",
      "<span class=\"eqt\">Kangra School</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2306;&#2327;&#2337;&#2364;&#2366; &#2360;&#2381;&#2325;&#2370;&#2354;</span>",
      "<span class=\"eqt\">Mewar School</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2357;&#2366;&#2337;&#2364; &#2360;&#2381;&#2325;&#2370;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The <b>Kishangarh School</b> of painting is known for the famous work \"Bani Thani.\"</p><p>This school was patronized by Sawant Singh and featured artists like Nagari Das and Nihal Chand. Kishangarh paintings typically depict devotional and amorous relations between Radha and Krishna, with distinctive features like long necks, arched eyebrows, thin lips, and wide eyes.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following mural paintings is found in Tamil Nadu and is intimately connected with Jain themes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2367;&#2340;&#2381;&#2340;&#2367; &#2330;&#2367;&#2340;&#2381;&#2352; &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2350;&#2375;&#2306; &#2346;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2332;&#2376;&#2344; &#2357;&#2367;&#2359;&#2351;&#2379;&#2306; &#2360;&#2375; &#2328;&#2344;&#2367;&#2359;&#2381;&#2336; &#2352;&#2370;&#2346; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lepakshi Temple Paintings</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2375;&#2346;&#2366;&#2325;&#2381;&#2359;&#2368; &#2350;&#2306;&#2342;&#2367;&#2352; &#2325;&#2368; &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Sittanavasal Cave Paintings</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2340;&#2381;&#2340;&#2344;&#2357;&#2366;&#2360;&#2354; &#2327;&#2369;&#2347;&#2366; &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Badami Cave Temple</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2342;&#2366;&#2350;&#2368; &#2327;&#2369;&#2347;&#2366; &#2350;&#2306;&#2342;&#2367;&#2352;</span>",
      "<span class=\"eqt\">Armamalai Cave Paintings</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2381;&#2350;&#2366;&#2350;&#2354;&#2366;&#2312; &#2327;&#2369;&#2347;&#2366; &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2366;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Sittanavasal Cave Paintings</b> are found in Tamil Nadu and are intimately connected with Jain themes and symbology.</p><p>These paintings date from 1st century BC to 10th century CE and bear resemblance to Bagh and Ajanta paintings. They feature themes like a lotus pool with birds, elephants, buffaloes, and a young man plucking flowers.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>The father of Modern paintings in India is considered to be:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2354;&#2366; &#2325;&#2366; &#2332;&#2344;&#2325; &#2325;&#2367;&#2360;&#2375; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">M.F. Hussain</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;.&#2319;&#2347;. &#2361;&#2369;&#2360;&#2376;&#2344;</span>",
      "<span class=\"eqt\">Amrita Sher-Gil</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2371;&#2340;&#2366; &#2358;&#2375;&#2352;&#2327;&#2367;&#2354;</span>",
      "<span class=\"eqt\">Raja Ravi Varma</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2366; &#2352;&#2357;&#2367; &#2357;&#2352;&#2381;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Abanindranath Tagore</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2344;&#2368;&#2344;&#2381;&#2342;&#2381;&#2352;&#2344;&#2366;&#2341; &#2335;&#2376;&#2327;&#2379;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Raja Ravi Varma</b> is considered the father of Modern paintings in India.</p><p>He is known for blending Indian themes with Western techniques of color and style. His famous works include \"Lady in the Moonlight,\" \"Shakuntala,\" and \"Damayanti and Swan.\"</p>",
    "question_index": 18
