<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>

                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>

                <!-- Dynamically populated question container -->

                <!-- Controls -->
                <div class="nav-controls">

                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following taxes is both progressive in nature and levied directly on an individual's earnings in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2352; &#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2327;&#2340;&#2367;&#2358;&#2368;&#2354; &#2361;&#2376; &#2324;&#2352; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2368; &#2325;&#2350;&#2366;&#2312; &#2346;&#2352; &#2360;&#2368;&#2343;&#2375; &#2354;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Corporate Tax</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2327;&#2350;&#2367;&#2340; &#2325;&#2352;</span>",
      "<span class=\"eqt\">Income Tax</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2325;&#2352;</span>",
      "<span class=\"eqt\">Goods and Services Tax (GST)</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2360;&#2381;&#2340;&#2369; &#2319;&#2357;&#2306; &#2360;&#2375;&#2357;&#2366; &#2325;&#2352; (GST)</span>",
      "<span class=\"eqt\">Capital Gains Tax</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2354;&#2366;&#2349; &#2325;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Income tax in India is progressive in nature, meaning the rate increases as the individual's income increases. It is levied directly on personal income.</b></p><p>&bull; Corporate Tax is levied on company profits, not individual earnings.</p><p>&bull; GST is an indirect tax on goods and services, applied uniformly regardless of the payer's income.</p><p>&bull; Capital Gains Tax are Applies to profits from asset sales, but is not necessarily progressive.</p><p><b>Further Insight:</b></p><p>&bull; <b><img width=420 height=241 id=image1.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25803/image001.jpg\"></b></p><p>&bull; Progressive tax: It is a type of taxation system in which the government takes a larger percentage of income as tax from high-income groups than from low-income groups. E.g Direct taxes such as Income tax</p><p>&bull; Proportional tax: It is a type of taxation system in which the government takes the same percentage of income as tax from all income groups. E.g Indirect taxes such as GST </p><p>&bull; Regressive tax: It is a type of taxation system in which the government takes a larger percentage of income as tax from low-income groups than from high-income groups.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following best explains the primary difference between capital expenditure and revenue expenditure in government finances?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2357;&#2367;&#2340;&#2381;&#2340; &#2350;&#2375;&#2306; &#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351; &#2324;&#2352; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351; &#2325;&#2375; &#2348;&#2368;&#2330; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2309;&#2306;&#2340;&#2352; &#2325;&#2379; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2375; &#2338;&#2306;&#2327; &#2360;&#2375; &#2360;&#2350;&#2333;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Capital expenditure creates long-term assets, whereas revenue expenditure is for short-term obligations.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351; &#2342;&#2368;&#2352;&#2381;&#2328;&#2325;&#2366;&#2354;&#2367;&#2325; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351; &#2309;&#2354;&#2381;&#2346;&#2325;&#2366;&#2354;&#2367;&#2325; &#2342;&#2366;&#2351;&#2367;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Capital expenditure is non-recurring, while revenue expenditure is recurring in nature.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351; &#2327;&#2376;&#2352;-&#2310;&#2357;&#2352;&#2381;&#2340;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351; &#2310;&#2357;&#2352;&#2381;&#2340;&#2368; &#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Capital expenditure includes subsidies, while revenue expenditure includes investments.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351; &#2350;&#2375;&#2306; &#2360;&#2348;&#2381;&#2360;&#2367;&#2337;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Capital expenditure focuses on consumption, while revenue expenditure focuses on investment.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351; &#2313;&#2346;&#2349;&#2379;&#2327; &#2346;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351; &#2344;&#2367;&#2357;&#2375;&#2358; &#2346;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Capital expenditure typically involves one-time investments like infrastructure, while revenue expenditure includes ongoing costs such as salaries and subsidies.</b></p><p>&bull; Assets are not always long-term; short-term spending may also count as capital expenditure if it builds new infrastructure.</p><p>&bull; Subsidies are a form of revenue expenditure, not capital.</p><p>Further Insight:</p><p>&bull; <b>Capital Expenditure</b>: Spending on creating assets like infrastructure (buildings, roads) and investment in public sector undertakings.</p><p>&bull; <b>Revenue Expenditure</b>: Day-to-day expenses such as salaries, pensions, and subsidies.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following constitutes non-tax revenue for the Indian government?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2376;&#2352;-&#2325;&#2352; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2325;&#2366; &#2327;&#2336;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Income from customs duty</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2350;&#2366; &#2358;&#2369;&#2354;&#2381;&#2325; &#2360;&#2375; &#2310;&#2351;</span>",
      "<span class=\"eqt\">Dividends from public sector enterprises</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2313;&#2342;&#2381;&#2351;&#2350;&#2379;&#2306; &#2360;&#2375; &#2354;&#2366;&#2349;&#2366;&#2306;&#2358;</span>",
      "<span class=\"eqt\">GST collections</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;</span>",
      "<span class=\"eqt\">Excise duty collections</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2358;&#2369;&#2354;&#2381;&#2325; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Non-tax revenue includes government earnings from sources other than taxes, such as dividends from public enterprises, fees, and interest income.</b></p><p>&bull; Customs duty is a tax on imports and exports, making it tax revenue.</p><p>&bull; GST is an indirect tax and part of tax revenue.</p><p>&bull; Excise duty is another indirect tax, also part of tax revenue.</p><p><b>Further Insight:</b></p><p>Public revenue consists of the income generated by the government. It is of two types:</p><p>a. Tax Revenue</p><p>&bull; Direct Taxes: Includes income tax, corporate tax, etc.</p><p>&bull; Indirect Taxes: Includes GST, customs duty, etc.</p><p>b. Non-Tax Revenue</p><p>&bull; Fees and Penalties: Charges levied by the government for services.</p><p>&bull; Dividends from Public Enterprises: Income from government-owned enterprises.</p><p>&bull; Interest Income: Interest on loans provided by the government.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In the context of India's Union Budget, which type of budget aims to justify each expense as though it were new, with no reference to past spending?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2348;&#2332;&#2335; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2348;&#2332;&#2335; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2381;&#2351;&#2351; &#2325;&#2379; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2313;&#2330;&#2367;&#2340; &#2336;&#2361;&#2352;&#2366;&#2344;&#2366; &#2361;&#2376; &#2332;&#2376;&#2360;&#2375; &#2325;&#2367; &#2357;&#2361; &#2344;&#2351;&#2366; &#2361;&#2379;, &#2340;&#2341;&#2366; &#2311;&#2360;&#2350;&#2375;&#2306; &#2346;&#2367;&#2331;&#2354;&#2375; &#2357;&#2381;&#2351;&#2351; &#2325;&#2366; &#2325;&#2379;&#2312; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2344; &#2361;&#2379;?</p></span>",
    "options": [
      "<span class=\"eqt\">Performance-Based Budget</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2348;&#2332;&#2335;</span>",
      "<span class=\"eqt\">Outcome-Based Budget</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2367;&#2339;&#2366;&#2350;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2348;&#2332;&#2335;</span>",
      "<span class=\"eqt\">Zero-Based Budget</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2370;&#2344;&#2381;&#2351;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2348;&#2332;&#2335;</span>",
      "<span class=\"eqt\">Primary Budget</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2348;&#2332;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>A zero-based budget requires each expense to be justified from zero, ensuring that all expenditures are reviewed for necessity.</b></p><p>&bull; Performance-based budgets focus on achieving specific outputs or goals.</p><p>&bull; Outcome-based budgets assess the final results of spending.</p><p>&bull; Primary budget refers to a simplified budget form focusing on major areas of expenditure but is not a formal classification.</p><p><b>Further Insight:</b></p><p>&bull; <b>Types of Budget</b></p><p>&bull; <b>Zero-Based Budget</b>: Each expense must be justified from zero.</p><p>&bull; <b>Performance-Based Budget</b>: Focuses on the outputs and outcomes of public spending.</p><p>&bull; <b>Outcome-Based Budget</b>: Emphasizes results achieved from spending.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is the main objective of fiscal policy in a developing country like India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2332;&#2376;&#2360;&#2375; &#2357;&#2367;&#2325;&#2366;&#2360;&#2358;&#2368;&#2354; &#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2344;&#2368;&#2340;&#2367; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ensuring price stability</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2381;&#2341;&#2367;&#2352;&#2340;&#2366; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Controlling inflation through monetary measures</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2313;&#2346;&#2366;&#2351;&#2379;&#2306; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Promoting economic growth and equitable distribution of income</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2324;&#2352; &#2310;&#2351; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Regulating the stock market</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2375;&#2351;&#2352; &#2348;&#2366;&#2332;&#2364;&#2366;&#2352; &#2325;&#2379; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Fiscal policy in developing countries like India focuses on fostering economic growth and reducing income inequality through government spending and taxation policies.</b></p><p>&bull; Inflation control is a part of monetary policy, not fiscal policy.</p><p>&bull; Regulating the stock market is handled by financial regulatory bodies, not fiscal policy.</p><p><b>Further Insight:</b></p><p>&bull; Fiscal policy refers to government strategies for revenue collection and expenditure to influence the economy.</p><p>&bull; <b>Objectives</b></p><p>&bull; <b>Economic Stability</b>: Control inflation and unemployment.</p><p>&bull; <b>Economic Growth</b>: Encourage investment and consumption.</p><p>&bull; <b>Equitable Distribution</b>: Redistribution of wealth through taxation and spending.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Internal debt of the Indian government includes which of the following?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2315;&#2339; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Loans from the World Bank</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2381;&#2357; &#2348;&#2376;&#2306;&#2325; &#2360;&#2375; &#2315;&#2339;</span>",
      "<span class=\"eqt\">Bonds issued to domestic investors</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2352;&#2375;&#2354;&#2370; &#2344;&#2367;&#2357;&#2375;&#2358;&#2325;&#2379;&#2306; &#2325;&#2379; &#2332;&#2366;&#2352;&#2368; &#2325;&#2367;&#2319; &#2327;&#2319; &#2348;&#2366;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Loans from foreign governments</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2360;&#2352;&#2325;&#2366;&#2352;&#2379;&#2306; &#2360;&#2375; &#2315;&#2339;</span>",
      "<span class=\"eqt\">Funds from external commercial borrowings</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2361;&#2381;&#2351; &#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351;&#2367;&#2325; &#2313;&#2343;&#2366;&#2352; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Internal debt refers to loans taken from within the country, such as bonds issued to domestic investors.</b></p><p>&bull; Loans from the World Bank are part of <b>external debt.</b></p><p>&bull; Foreign government loans fall under<b> external debt.</b></p><p>&bull; External commercial borrowings are also part of <b>external debt.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Public Debt are of two types:</b></p><p>&#9675; Internal Debt</p><p>&#9632; Loans raised from domestic sources like banks and financial institutions.</p><p>&#9675; External Debt</p><p>&#9632; Loans taken from foreign sources, including international institutions and governments.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which constitutional body is responsible for making recommendations regarding the distribution of tax revenues between the Union and the States?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2344;&#2367;&#2325;&#2366;&#2351; &#2360;&#2306;&#2328; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2352; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2325;&#2375; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358;&#2375;&#2306; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Planning Commission</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2379;&#2332;&#2344;&#2366; &#2310;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">GST Council</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2346;&#2352;&#2367;&#2359;&#2342;</span>",
      "<span class=\"eqt\">Finance Commission</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2340;&#2381;&#2340; &#2310;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">National Development Council</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2357;&#2367;&#2325;&#2366;&#2360; &#2346;&#2352;&#2367;&#2359;&#2342;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>The Finance Commission is a constitutional body that recommends how tax revenues should be distributed between the Centre and the States</b>.</p><p>&bull; The Planning Commission was involved in planning but not in revenue distribution (now replaced by NITI Aayog).</p><p>&bull; GST Council oversees GST-related issues but does not handle general tax revenue distribution.</p><p>&bull; National Development Council focuses on development planning, not tax distribution.</p><p><b>Further Insight:</b></p><p>&bull; <b>Finance Commission of India</b> </p><p>&#9675; The Finance Commission is established under **Article 280** of the Indian Constitution.</p><p>&#9675; It is constituted by the President of India.</p><p>&#9675; The first Finance Commission was formed in 1951.</p><p>&#9675; The first chairman of the Finance Commission was K.C. Neogy.</p><p>&#9675; The current chairman of the Finance Commission is Arvind Panagariya.</p><p>&#9675; <b>Major Objectives:</b></p><p>&#9632; To recommend the distribution of taxes between the Centre and the States, and among the States themselves.</p><p>&#9632; To determine the principles governing grants-in-aid to the States by the Centre.</p><p>&#9632; To suggest measures to augment the Consolidated Fund of a State to supplement the resources of Panchayats and Municipalities.</p><p>&#9632; To address both vertical and horizontal fiscal imbalances.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following welfare schemes is implemented through Direct Benefit Transfer (DBT) to reduce leakages?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339;&#2325;&#2366;&#2352;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2354;&#2368;&#2325;&#2375;&#2332; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2354;&#2366;&#2349; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2339; (DBT) &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2367;&#2340; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">MGNREGA</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;&#2332;&#2368;&#2319;&#2344;&#2310;&#2352;&#2312;&#2332;&#2368;&#2319; (MGNREGA)</span>",
      "<span class=\"eqt\">PM-Kisan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2319;&#2350;-&#2325;&#2367;&#2360;&#2366;&#2344; (PM-Kisan)</span>",
      "<span class=\"eqt\">Public Distribution System (PDS)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2357;&#2367;&#2340;&#2352;&#2339; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; (PDS)</span>",
      "<span class=\"eqt\">Fertilizer Subsidy</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2352;&#2381;&#2357;&#2352;&#2325; &#2360;&#2348;&#2381;&#2360;&#2367;&#2337;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>PM-Kisan provides direct income support to farmers via DBT, which helps minimize the chances of leakages by directly crediting the benefits to beneficiaries' bank accounts.</b></p><p>&bull; MGNREGA payments are not fully through DBT.</p><p>&bull; PDS primarily involves the physical distribution of subsidized goods.</p><p>&bull; Fertilizer subsidy payments have a DBT component, but the scheme itself is broader.</p><p><b>Further Insight:</b></p><p>&bull; <b>Subsidy Expenditure</b></p><p>&#9675; Subsidies are government expenditures aimed at making essential goods affordable (food, fuel, fertilizers). However, they increase the fiscal deficit.</p><p>&bull; <b>Direct Benefit Transfer (DBT)</b></p><p>&#9675; The DBT scheme ensures that subsidies are transferred directly to the beneficiaries' bank accounts to reduce leakages.</p><p>&bull; <b>Welfare Schemes</b></p><p>&bull; <b>MGNREGA</b>: Provides employment to rural households.</p><p>&bull; <b>PM-Kisan</b>: Income support to small farmers.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which method of deficit financing is likely to cause inflation in the economy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2328;&#2366;&#2335;&#2375; &#2325;&#2375; &#2357;&#2367;&#2340;&#2381;&#2340;&#2346;&#2379;&#2359;&#2339; &#2325;&#2368; &#2325;&#2380;&#2344; &#2360;&#2368; &#2357;&#2367;&#2343;&#2367; &#2360;&#2375; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Borrowing from the public</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2340;&#2366; &#2360;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Selling government assets</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Printing new money</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2351;&#2375; &#2346;&#2376;&#2360;&#2375; &#2331;&#2366;&#2346;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Raising taxes</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Printing new money increases the money supply in the economy, leading to inflation if not managed properly.</b></p><p>&bull; Borrowing does not directly cause inflation, though interest rates may rise.</p><p>&bull; Selling assets reduces fiscal deficits without adding to the money supply.</p><p>&bull; Raising taxes typically controls inflation by reducing disposable income.</p><p><b>Further Insight:</b></p><p>&bull; <b>Deficit Financing</b></p><p>&#9675; Types of Deficits </p><p>&#9632; <b>Revenue Deficit</b>, <b>Fiscal Deficit</b>, and <b>Primary Deficit</b> </p><p>&#9675; <b>Methods of Financing Deficit</b></p><p>&#9632; Borrowing, printing money, and selling government assets are common ways to finance deficits</p><p>&#9675; <b>Impact of Deficit Financing</b></p><p>&#9632; Excessive deficit financing can lead to inflation, increased interest rates, and a higher debt burden</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>What is the likely impact of disinvestment on public sector enterprises in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2313;&#2342;&#2381;&#2351;&#2350;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2366; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Increased government ownership</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2360;&#2381;&#2357;&#2366;&#2350;&#2367;&#2340;&#2381;&#2357; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Reduction in fiscal burden</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2348;&#2379;&#2333; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Growth in public sector employment</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Expansion of PSE operations</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2319;&#2360;&#2312; &#2346;&#2352;&#2367;&#2330;&#2366;&#2354;&#2344; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Disinvestment helps reduce the fiscal burden by allowing the government to earn revenue through the sale of its stake in PSEs.</b></p><p>&bull; Disinvestment decreases government ownership, not increases it.</p><p>&bull; Disinvestment might lead to downsizing, reducing public sector employment.</p><p>&bull; PSE operations may not necessarily expand due to disinvestment; it could lead to privatization.</p><p><b>Further Insight:</b></p><p>&bull; <b>Disinvestment refers to the process by which the government sells its stake or ownership in public sector enterprises (PSEs) to private entities or other organizations. The goal is to reduce the government's role in business operations, improve efficiency, and generate revenue</b></p><p>&bull; Objectives of disinvestment:</p><p>&#9675; Revenue Generation: Disinvestment helps raise funds for the government, which can be used for development projects or to reduce fiscal deficits.</p><p>&#9675; Improving Efficiency: Private sector management often brings in better efficiency and productivity compared to government-run enterprises.</p><p>&#9675; Reducing Fiscal Burden: Selling stakes in PSEs helps decrease the financial burden on the government, including subsidies and funding for losses.</p><p>&#9675; Encouraging Competition: It fosters a more competitive environment, which can lead to better services and lower costs for consumers.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following measures is primarily associated with fiscal consolidation in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2313;&#2346;&#2366;&#2351; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2360;&#2350;&#2375;&#2325;&#2344; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Increasing fiscal deficit</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2338;&#2364;&#2340;&#2366; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Expanding welfare schemes</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2354;&#2381;&#2351;&#2366;&#2339;&#2325;&#2366;&#2352;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Reducing non-essential government spending</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2352;-&#2332;&#2364;&#2352;&#2370;&#2352;&#2368; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2326;&#2352;&#2381;&#2330; &#2350;&#2375;&#2306; &#2325;&#2335;&#2380;&#2340;&#2368;</span>",
      "<span class=\"eqt\">Boosting revenue deficit</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2328;&#2366;&#2335;&#2366; &#2348;&#2338;&#2364;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Fiscal consolidation aims to reduce the government's deficit by cutting unnecessary expenditures and increasing revenues.</b></p><p>&bull; Increasing the fiscal deficit is opposite fiscal consolidation goals.</p><p>&bull; Expanding welfare schemes typically increases expenditure, counterproductive to consolidation.</p><p>&bull; Boosting the revenue deficit worsens fiscal health rather than consolidating it.</p><p><b>Further Insight:</b></p><p>&bull; <b>Measures for Fiscal Consolidation</b></p><p>&#9675; Includes controlling expenditure, increasing tax revenue, and implementing the <b>FRBM Act</b> provisions</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>What is a primary objective of counter-cyclical fiscal policy in an economic downturn?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2350;&#2306;&#2342;&#2368; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;-&#2330;&#2325;&#2381;&#2352;&#2368;&#2351; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2344;&#2368;&#2340;&#2367; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Reducing public expenditure to control inflation</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2357;&#2381;&#2351;&#2351; &#2350;&#2375;&#2306; &#2325;&#2335;&#2380;&#2340;&#2368;</span>",
      "<span class=\"eqt\">Increasing public spending to boost demand</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2306;&#2327; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2357;&#2381;&#2351;&#2351; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Raising interest rates to encourage savings</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2330;&#2340; &#2325;&#2379; &#2346;&#2381;&#2352;&#2379;&#2340;&#2381;&#2360;&#2366;&#2361;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352;&#2375;&#2306; &#2348;&#2338;&#2364;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Decreasing taxes to reduce fiscal deficit</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2375; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Counter-cyclical fiscal policies aim to stimulate the economy during a downturn by increasing public spending to boost demand and economic activity.</b></p><p>&bull; Reducing expenditure would deepen a recession, not alleviate it.</p><p>&bull; Raising interest rates discourages spending, which is counterproductive during downturns.</p><p>&bull; Decreasing taxes might reduce revenue but does not directly boost spending.</p><p><b>Further Insight:</b></p><p>&bull; <b>Fiscal Stimulus and Counter-Cyclical Policies</b></p><p>&#9675; <b>Fiscal Stimulus</b>: The government increases spending to stimulate the economy during a downturn/Slowdown.</p><p>&#9675; <b>Counter-Cyclical Fiscal Policy</b>: Used to stabilize the economy by increasing spending during recessions and reducing it during booms.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following aspects of India's fiscal system distinguishes it from those of developed countries like the USA or UK?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2361;&#2354;&#2370; &#2311;&#2360;&#2375; &#2309;&#2350;&#2375;&#2352;&#2367;&#2325;&#2366; &#2351;&#2366; &#2348;&#2381;&#2352;&#2367;&#2335;&#2375;&#2344; &#2332;&#2376;&#2360;&#2375; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2342;&#2375;&#2358;&#2379;&#2306; &#2360;&#2375; &#2309;&#2354;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Reliance on corporate tax for revenue</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2377;&#2352;&#2381;&#2346;&#2379;&#2352;&#2375;&#2335; &#2325;&#2352; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Use of deficit financing to manage fiscal deficits</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2375; &#2325;&#2375; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2328;&#2366;&#2335;&#2375; &#2325;&#2375; &#2357;&#2367;&#2340;&#2381;&#2340;&#2346;&#2379;&#2359;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">The absence of a progressive tax structure</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2327;&#2340;&#2367;&#2358;&#2368;&#2354; &#2325;&#2352; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2325;&#2366; &#2309;&#2349;&#2366;&#2357;</span>",
      "<span class=\"eqt\">High dependence on indirect taxes like GST for revenue</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2332;&#2376;&#2360;&#2375; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352;&#2379;&#2306; &#2346;&#2352; &#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; <b>India relies heavily on indirect taxes like GST for revenue, unlike many developed countries where direct taxes contribute a larger share of government revenue.</b></p><p>&bull; India, like other countries, also relies on corporate tax, but not disproportionately.</p><p>&bull; Deficit financing is common across developing and developed nations.</p><p>&bull; India has a progressive income tax structure.</p>",
    "question_index": 12

; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",

    "solution": "<p>&bull; <b>GST is indeed a destination-based tax, meaning tax revenue accrues to the state where the goods or services are consumed.</b></p><p>&bull; GST applies uniformly to the supply of goods and services.</p><p>&bull; GST subsumed only indirect taxes (e.g., VAT, excise duty), not direct taxes like income tax.</p><p><b>Further Insight:</b></p><p>&bull; GST was implemented on July 1, 2017, following the passage of the Goods and Services Tax Act, 2017. </p><p>&bull; The introduction of GST aimed to simplify the tax system, reduce the cascading effect of taxes, and create a single national market.</p><p>&bull; <b>Structure:</b> GST is a multi-stage, destination-based tax system and is divided into three main categories:</p><p>1) <b>Central GST (CGST):</b> Collected by the Central Government on intra-state sales.</p><p>2) <b>State GST (SGST):</b> Collected by the State Government on intra-state sales.</p><p>3) <b>Integrated GST (IGST):</b> Collected by the Central Government on inter-state sales and imports, and then distributed between the Centre and the states.</p>",

    "solution": "<p>&bull; Income Tax is a progressive tax on individual earnings.</p><p>&bull; Corporate Tax is levied on the profits of companies.</p><p>&bull; GST is an indirect tax on goods and services.</p><p>&bull; Capital Gains Tax is imposed on profits from the sale of assets.</p><p><b>Further Insight:</b></p><p><b>a. Direct Taxes</b></p><p><b>These are levied directly on the income or wealth of individuals or organizations.</b></p><p>&bull; <b>Income Tax: Tax on personal income earned by individuals, Hindu Undivided Families (HUFs), and others.</b></p><p>&bull; <b>Corporate Tax: Tax on the income or profits of corporations.</b></p><p>&bull; <b>Capital Gains Tax: Tax on profits made from the sale of assets like property, stocks, etc.</b></p><p>&bull; <b>Wealth Tax (abolished in 2015): Earlier levied on the net wealth of individuals exceeding a specified limit.</b></p><p><b>b. Indirect Taxes</b></p><p><b>These taxes are levied on goods and services.</b></p><p>&bull; <b>Goods and Services Tax (GST): A unified tax system replacing multiple indirect taxes. It's levied on the supply of goods and services.</b></p><p>&bull; <b>Customs Duty: Tax on imports and exports of goods.</b></p><p>&bull; <b>Excise Duty: A tax on the production of goods within India (now mostly subsumed under GST).</b></p><p>&bull; <b>Service Tax (pre-GST): A tax on services (now subsumed under GST).</b></p>",
