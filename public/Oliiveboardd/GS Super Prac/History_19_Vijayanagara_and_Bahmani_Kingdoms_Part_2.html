    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is correct with respect to establishment of the Vijayanagar Empire? </p><p>A. Krishnadevaraya established this empire on the banks of the Tungabhadra River.</p><p>B. It was established in the year 1336 C.E.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>A. &#2325;&#2371;&#2359;&#2381;&#2339;&#2342;&#2375;&#2357;&#2352;&#2366;&#2351; &#2344;&#2375; &#2340;&#2369;&#2306;&#2327;&#2349;&#2342;&#2381;&#2352;&#2366; &#2344;&#2342;&#2368; &#2325;&#2375; &#2340;&#2335; &#2346;&#2352; &#2311;&#2360; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368; &#2341;&#2368;&#2404;</p><p>B. &#2311;&#2360;&#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2357;&#2352;&#2381;&#2359; 1336 &#2312;. &#2350;&#2375;&#2306; &#2361;&#2369;&#2312; &#2341;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Hakka and Bukka established this empire on the banks of the Tungabhadra River in the year 1336 C.E.</p><p><b>Further insights:</b></p><p>&#183; The South Indian dynasties  -  the Yadavas of Devagiri, the Kakatiyas of Warangal, the Pandyas of Madurai, Hoysalas of Dwarasamudra (Halebeedu), the Cholas of Tanjavur were all the victims of violent attacks of Allauddin Khilji. </p><p>&#183; As a result, political instability, lawlessness, fear and religious turmoil prevailed everywhere. </p><p>&#183; Under these circumstances, the Kingdom of Vijayanagara was born. It ruled for three centuries. By 15th century, it spread up to Indian Ocean in the South, Bay of Bengal in East and Arabian Sea in the West.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following dynasties ruled the Vijayanagar Empire? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358; &#2344;&#2375; &#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2346;&#2352; &#2358;&#2366;&#2360;&#2344; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sangama, Saluva, Tuluva, Araveedu</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2327;&#2350;&#2366;, &#2360;&#2366;&#2354;&#2369;&#2357;&#2366;, &#2340;&#2369;&#2354;&#2369;&#2357;&#2366;, &#2309;&#2352;&#2366;&#2357;&#2368;&#2337;&#2369;</span>",
      "<span class=\"eqt\">Sangama, Shahi, Tuluva, Chalukya</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2327;&#2350;, &#2358;&#2366;&#2361;&#2368;, &#2340;&#2369;&#2354;&#2369;&#2357;, &#2330;&#2366;&#2354;&#2369;&#2325;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Sangama, Saluva, Kakatiya, Araveedu</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2327;&#2350;&#2366;, &#2360;&#2366;&#2354;&#2369;&#2357;&#2366;, &#2325;&#2366;&#2325;&#2340;&#2368;&#2351;, &#2309;&#2352;&#2366;&#2357;&#2368;&#2337;&#2369;</span>",
      "<span class=\"eqt\">Saluva, Hoysala, Tuluva, Araveedu</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2354;&#2369;&#2357;&#2366;, &#2361;&#2379;&#2351;&#2360;&#2354;&#2366;, &#2340;&#2369;&#2354;&#2369;&#2357;&#2366;, &#2309;&#2352;&#2357;&#2367;&#2342;&#2369;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Four Dynasties that ruled Vijayanagar: Sangama, Saluva, Tuluva, Araveedu.</p><p>Further insights:</p><p>The famous kings of Sangama dynasty (1336  -  1486 C.E.) were Harihara I, Bukkaraya, Harihara II and Praudhadevaraya. Harihara laid the foundation for the Vijayanagar empire and developed a capital amidst new hillocks.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which Vijayanagar king was known as \"Elephant Hunter\"? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2325;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2366; &#2325;&#2379; \"&#2361;&#2366;&#2341;&#2368; &#2358;&#2367;&#2325;&#2366;&#2352;&#2368;\" &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bukkaraya</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2325;&#2381;&#2325;&#2366;&#2352;&#2366;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Harihara II</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2367;&#2361;&#2352; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Devaraya II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2375;&#2357;&#2352;&#2366;&#2351; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Krishnadevaraya</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2381;&#2339;&#2342;&#2375;&#2357;&#2352;&#2366;&#2351;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Devaraya II (Praudhadevaraya) (1424-1446 CE) :</b></p><p>&#183; The most famous king in the Sangama dynasty was Devaraya II. He had earned the title of 'Elephant Hunter'. </p><p>&#183; Devaraya II defeated the king Gajapati Kapilendra of Orissa and seized Kondaveedu. By suppressing the regional leaders of the border, he expanded the kingdom upto Krishna river in the north east. </p><p>&#183; Later, he defeated the Kerala ruler and received royalties from Kerala and Sri Lanka. This earned him the title \"Dakshinapathada Chakravarthi\" (the Emperor of the South).Through these conquests the Vijayanagar Empire extended from Sri Lanka to Gulbarga and Telangana to Malabar.</p><p>&#183; Krishnadevaraya liberated Mohammad Shah and made him the king Bahamani kingdom. Hence he got the title 'Yavanarjya Prathishtapanacharya'. </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true about Economic system of Vijayanagar empire?</p><p>I. Farmers used to give one-fourth of their income to the government in the form of tax.</p><p>II. There were five kinds of practices of land holdings like geni, guttige, siddhaya, vara and gadi.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p><p>I. &#2325;&#2367;&#2360;&#2366;&#2344; &#2309;&#2346;&#2344;&#2368; &#2310;&#2351; &#2325;&#2366; &#2319;&#2325;-&#2330;&#2380;&#2341;&#2366;&#2312; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2342;&#2375;&#2340;&#2375; &#2341;&#2375;&#2404;</p><p>II. &#2349;&#2370;&#2350;&#2367; &#2332;&#2379;&#2340; &#2325;&#2368; &#2346;&#2366;&#2305;&#2330; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2346;&#2381;&#2352;&#2341;&#2366;&#2319;&#2305; &#2341;&#2368;&#2306; &#2332;&#2376;&#2360;&#2375; &#2325;&#2367; &#2332;&#2367;&#2344;&#2368;, &#2327;&#2369;&#2335;&#2381;&#2335;&#2367;&#2327;&#2375;, &#2360;&#2367;&#2342;&#2381;&#2343;&#2351;&#2366;, &#2357;&#2352; &#2324;&#2352; &#2327;&#2366;&#2342;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Vijayanagar was economically prosperous. Land tax was the main source of revenue for the kingdom. </p><p>Farmers used to give one-fourth of their income to the government in the form of tax. Professional tax, revenue tax, road tax, market tax, commercial tax, import and export taxes and tributes from the vassals were the other forms of revenue to the kingdom.</p><p>Agriculture was the backbone of the economy. People grew different kinds of crops throughout the year. Jowar, ragi, paddy, wheat, lentils, pulses like green gram, black gram and tuvar, sesame seeds, groundnuts, cotton, sugarcane and coconut were the main crops. </p><p>The Vijayanagar kings constructed wells, tanks and canals to encourage irrigation and agriculture.</p><p>There were five kinds of practices of land holdings like geni, guttige, siddhaya, vara and gadi (tenancy, lease holdings and other kinds).</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which year marks the fall of the Vijayanagar Empire in the Battle of Rakshasa-Tangadi? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2325;&#2381;&#2359;&#2360;-&#2340;&#2306;&#2327;&#2337;&#2364;&#2368; &#2325;&#2375; &#2351;&#2369;&#2342;&#2381;&#2343; &#2350;&#2375;&#2306; &#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2346;&#2340;&#2344; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2361;&#2369;&#2310;?</p></span>",
    "options": [
      "<span class=\"eqt\">1529 C.E.</span><span class=\"hqt\" style=\"display:none\">1529 C.E.</span>",
      "<span class=\"eqt\">1542 C.E.</span><span class=\"hqt\" style=\"display:none\">1542 C.E.</span>",
      "<span class=\"eqt\">1565 C.E.</span><span class=\"hqt\" style=\"display:none\">1565 C.E.</span>",
      "<span class=\"eqt\">1586 C.E.</span><span class=\"hqt\" style=\"display:none\">1586 C.E.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The battle of Rakkasa-Thangadi that took place in 1565 CE was one of the decisive battles in the history of Vijayanagara Kingdom. </p><p>&#183; With fall of this large empire, the politics of South India changed drastically. There were internal clashes for the power after the death of Krishnadevaraya. Another cycle of violence started with the death of Achyutharaya who had succeeded Krishnadevaraya. </p><p>&#183; Though, Sadashivaraya came to power, the power was in the hands of Ramaraya, his son-in-law. </p><p>&#183; Though Ramaraya could extend the Kingdom by waging many wars, it created new enemies. His moves made the Deccan Sultans to get united.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Who established the Bahmani Kingdom? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2361;&#2350;&#2344;&#2368; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mohammad Gawan</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2361;&#2350;&#2381;&#2350;&#2342; &#2327;&#2357;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Alauddin Hasan Gangu Bahaman Shah</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2361;&#2360;&#2344; &#2327;&#2306;&#2327;&#2370; &#2348;&#2361;&#2350;&#2344; &#2358;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Ibrahim Adil Shah II</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2348;&#2381;&#2352;&#2366;&#2361;&#2368;&#2350; &#2310;&#2342;&#2367;&#2354; &#2358;&#2366;&#2361; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Feroz Shah</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2367;&#2352;&#2379;&#2332; &#2358;&#2366;&#2361;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In the year 1347 C.E., Alaud-din Hasan Gangu Bahaman Shah established this dynasty. The Bahamani and Shahi dynasties ruled from 1347 to 1686 C.E. </p><p>Among their rulers, Mohammad Shah I, Mohammad Shah II, Feroz Shah, Usuf Adil Khan, Ibrahim Adil Shah I, Ibrahim Adil Shah II are important.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which was the first capital of the Bahmani Kingdom? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2361;&#2350;&#2344;&#2368; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2346;&#2361;&#2354;&#2368; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2325;&#2380;&#2344; &#2360;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Gulbarga</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2354;&#2348;&#2352;&#2381;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Bidar</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;&#2342;&#2352;</span>",
      "<span class=\"eqt\">Bijapur</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;&#2332;&#2366;&#2346;&#2369;&#2352;</span>",
      "<span class=\"eqt\">Golconda</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2354;&#2325;&#2369;&#2306;&#2337;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The history of Bahamani Rulers can be seen at two stages: in the first stage (1346-1422 CE), Gulbarga was their capital. </p><p>Their main rivals were 'Rayaas' of Telengana and Vijayanagara. Eight Sultan's ruled from here. </p><p>Shiyabuddin Ahamed shifted the capital from Gulbarga to Bidar. </p><p>Bidar remained the capital city of Bahamani till their end.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Who was the Prime Minister of the Bahmani Kingdom known for his administrative reforms? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2361;&#2350;&#2344;&#2368; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2357;&#2361; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2380;&#2344; &#2341;&#2375; &#2332;&#2379; &#2309;&#2346;&#2344;&#2375; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2332;&#2366;&#2340;&#2375; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Feroz Shah</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2367;&#2352;&#2379;&#2332; &#2358;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Mohammad Gawan</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2361;&#2350;&#2381;&#2350;&#2342; &#2327;&#2357;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Ibrahim Adil Shah II</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2348;&#2381;&#2352;&#2366;&#2361;&#2368;&#2350; &#2310;&#2342;&#2367;&#2354; &#2358;&#2366;&#2361; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Usuf Adil Khan</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2360;&#2369;&#2347;&#2364; &#2310;&#2342;&#2367;&#2354; &#2326;&#2364;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Mohammad Gawan (1411-1481 C.E.): </p><p>&#183; From1347 to 1426 C.E.,Kalburgi was the capital of Bahamani kingdom. During this period, Mohammad Gawan ruled the kingdom with selflessness and dedication. </p><p>&#183; As a Prime Minister, he took the Bahamani kingdom to great heights. He learnt Muslim religious verses and law at Cairo, also gained proficiency in Arab and Parsi languages.</p><p>&#183; He served as the Prime Minister during the rule of Bahamani kings Humayun, Nizam Shah and Mohammad Shah III. </p><p>&#183; He was responsible for enhancing the glory of Bahamani kingdom by his efficient administration and victories.</p><p>&#183; Gawan conquered Konkan, Goa and Belagavi. Later, he invaded Orissa and conquered Kondaveedu. </p><p>&#183; In the year 1481 C.E., he invaded Kanchi and plundered its huge wealth. Thus, Mohammad Gawan who was responsible for the all-round development of the Bahamani kingdom, became a victim to a conspiracy of his enemies and was beheaded on the false charge of betrayal to the kingdom. </p><p>&#183; After his death, the kingdom became weak and disintegrated into five parts.</p><p><img width=563 height=187 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27404/image001.png\" ></p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the correct statement.</p><p>A. The most important king of Adil Shahi was Ibrahim II ascended the throne in his 9th year. He ruled over for 47 years. </p><p>B. His book 'Kitab-E-Navaras' begins with prayers to the God's Ganesha, Saraswathi and Narasimha.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>A. &#2310;&#2342;&#2367;&#2354; &#2358;&#2366;&#2361;&#2368; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2352;&#2366;&#2332;&#2366; &#2311;&#2348;&#2381;&#2352;&#2366;&#2361;&#2367;&#2350; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2341;&#2366; &#2332;&#2379; &#2309;&#2346;&#2344;&#2375; 9&#2357;&#2375;&#2306; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2360;&#2367;&#2306;&#2361;&#2366;&#2360;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366;&#2404; &#2313;&#2360;&#2344;&#2375; 47 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2340;&#2325; &#2358;&#2366;&#2360;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>B. &#2313;&#2360;&#2325;&#2368; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; '&#2325;&#2367;&#2340;&#2366;&#2348;-&#2319;-&#2344;&#2357;&#2352;&#2360;' &#2349;&#2327;&#2357;&#2366;&#2344; &#2327;&#2339;&#2375;&#2358;, &#2360;&#2352;&#2360;&#2381;&#2357;&#2340;&#2368; &#2324;&#2352; &#2344;&#2352;&#2360;&#2367;&#2306;&#2361; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2352;&#2381;&#2341;&#2344;&#2366; &#2360;&#2375; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Ibrahim Adil Shah II (1580  -  1627C.E.)</b></p><p>&#183; The most important king of Adil Shahi, Ibrahim II ascended the throne in his 9th year. He ruled over for 47 years with historic incidents. </p><p>&#183; Politically he took Vijayapura to the pinnacle of glory with his efficient administration, and was responsible for the tremendous progress in art, literature and education.</p><p>&#183; His book 'Kitab-E-Navaras' begins with prayers to the God's Ganesha, Saraswathi and Narasimha. There are prayers to Mohammad Paigambar too. This book is evidence of the knowledge, magnanimity and religious tolerance of Ibrahim II. </p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct about Administration of Vijayanagar Empire?</p><p>I. Nayankar was the State Council leader.</p><p>II. Thimmarasa was a great Prime Minister.</p><p>III. In the Provinces the Nadagowdas and in the cities the Pattanaswami or Pattanashetty used to look after the administration.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2344;&#2351;&#2344;&#2325;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2375; &#2344;&#2375;&#2340;&#2366; &#2341;&#2375;&#2404;</p><p>II. &#2341;&#2367;&#2350;&#2381;&#2350;&#2366;&#2352;&#2366;&#2360;&#2366; &#2319;&#2325; &#2350;&#2361;&#2366;&#2344; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2341;&#2375;&#2404;</p><p>III. &#2346;&#2381;&#2352;&#2366;&#2306;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2366;&#2342;&#2327;&#2380;&#2337;&#2364;&#2366; &#2324;&#2352; &#2358;&#2361;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2335;&#2381;&#2335;&#2366;&#2344;&#2360;&#2381;&#2357;&#2366;&#2350;&#2368; &#2351;&#2366; &#2346;&#2335;&#2381;&#2335;&#2366;&#2344;&#2366;&#2358;&#2375;&#2335;&#2381;&#2335;&#2368; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2368; &#2342;&#2375;&#2326;&#2349;&#2366;&#2354; &#2325;&#2352;&#2340;&#2375; &#2341;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Administration of Vijayanagar Empire:</p><p>The Council of Ministers, strong military, provincial chieftains or the king would give land to the leader or chieftain in return for military service. There were different bodies like the State Council leader (Nayankar), village administration etc. Thimmarasa was a great Prime Minister. The kingdom had various administrative levels like the state, Naadu and village.</p><p>The king enjoyed absolute power in judicial matters. The provincial be severe. The village was the last level of administration and the Grama Sabhas used to carry on the administration there. The Gowda, Karnam and Talwar used to assist in the village administration. In the Provinces the Nadagowdas and in the cities the Pattanaswami or Pattanashetty used to look after the administration.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which book describes Kampana's victory over the Sultan of Madurai? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2350;&#2375;&#2306; &#2350;&#2342;&#2369;&#2352;&#2376; &#2325;&#2375; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344; &#2346;&#2352; &#2325;&#2306;&#2346;&#2366;&#2344;&#2366; &#2325;&#2368; &#2332;&#2368;&#2340; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2361;&#2376;? </p></span>",
    "options": [
      "<span class=\"eqt\">Manucharitam</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2344;&#2369;&#2330;&#2352;&#2367;&#2340;&#2350;&#2381;</span>",
      "<span class=\"eqt\">Amukta Maalyada</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2369;&#2325;&#2381;&#2340; &#2350;&#2366;&#2354;&#2381;&#2351;&#2342;&#2366;</span>",
      "<span class=\"eqt\">Madura Vijayam</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2342;&#2369;&#2352;&#2366; &#2357;&#2367;&#2332;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Bharateshavaibhava</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2375;&#2358;&#2381;&#2357;&#2351;&#2349;&#2357;</span>"

    "correct_option_id": 2,
    "solution": "<p>Bukka's son Kampana defeated the Sultan of Madurai and enlarged his Kingdom. This victory is marked in 'Madura Vijayam' written by Gangadevi.</p>",

  },
  {
    "question": "<span class=\"eqt\"><p>Match the following:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Amatya</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Accounts officer.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Rayaswomy</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. System under which every farmer had to give a specific share of his farm produce to the following twelve group of people.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Aayagara Padhathi</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Minister who assisted the king in various administrative works.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Karunika</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Chief secretary.</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344; &#2325;&#2379; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2309;&#2350;&#2366;&#2340;&#2381;&#2351;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2354;&#2375;&#2326;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2352;&#2366;&#2351;&#2360;&#2381;&#2357;&#2366;&#2350;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2357;&#2361; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2332;&#2367;&#2360;&#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2325;&#2367;&#2360;&#2366;&#2344; &#2325;&#2379; &#2309;&#2346;&#2344;&#2368; &#2325;&#2371;&#2359;&#2367; &#2313;&#2346;&#2332; &#2325;&#2366; &#2319;&#2325; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2348;&#2366;&#2352;&#2361; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2325;&#2379; &#2342;&#2375;&#2344;&#2366; &#2361;&#2379;&#2340;&#2366; &#2341;&#2366;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2310;&#2351;&#2366;&#2327;&#2352; &#2346;&#2343;&#2341;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2357;&#2361; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2332;&#2379; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2366; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2352;&#2340;&#2366; &#2341;&#2366;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2337;&#2368;. &#2325;&#2352;&#2369;&#2339;&#2367;&#2325;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2350;&#2369;&#2326;&#2381;&#2351; &#2360;&#2330;&#2367;&#2357;&#2404;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">A-ii, B-iv, C-iii, D-i</span><span class=\"hqt\" style=\"display:none\">A-ii, B-iv, C-iii, D-i</span>",
      "<span class=\"eqt\">A-iii, B-iv, C-ii, D-i</span><span class=\"hqt\" style=\"display:none\">A-iii, B-iv, C-ii, D-i</span>",
      "<span class=\"eqt\">A-iii, B-iv, C-i, D-ii</span><span class=\"hqt\" style=\"display:none\">A-iii, B-iv, C-i, D-ii</span>",
      "<span class=\"eqt\">A-ii, B-i, C-iv, D-iii</span><span class=\"hqt\" style=\"display:none\">A-ii, B-i, C-iv, D-iii</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Key words from Vijayanagar Kingdom: </p><p>&#183; Amatya - Minister who assisted the king in various administrative works. </p><p>&#183; Rayasam - Secretary of the ministry. </p><p>&#183; Rayaswomy - Chief secretary. </p><p>&#183; Karunika - Accounts officer. </p><p>&#183; Manepradhani - Supervisor of the palace. </p><p>&#183; Karyakartha - One who does works indicated by the king. </p><p>&#183; Deshamukh and desai - Revenue supervisors at paraganas. </p><p>&#183; Amara Nayakas/ Nayankara Padhathi - Many subordianate chieftains of vijayanagar kings were assisting the kings during wars. King used to award land grand in recognition of their service. The chieftains were ruling such areas. Such areas were recognised with the prefix 'Amara'. </p><p>&#183; Aayagara Padhathi - Under the system every farmer had to give a specific share of his farm produce to the following twelve group of people. Village head (Gowda), Village accoutant (Shanuboga), Carpenter, washerman, policeman (Talawara), Preist (Joyisa), Cobbler, Iron, Smith, Gold smith, waterman, potter and hairdresser. All these people had a role in the village administration.</p><p>Key words from Bahamani Kingdom:</p><p>&#183; Aphakis - People migrated from Iran and Iraq. </p><p>&#183; Wakeel-E-Sultanath - Prime minister. </p><p>&#183; Amir-E-Jumla - Finance minister / Revenue minister. </p><p>&#183; Musthaf-ul-Mulk - Assitant finance minister. </p><p>&#183; Nazer-E-Ashraf - Foreign minister. </p><p>&#183; Mufthi - Critique of law. </p><p>&#183; Dabeer - Secretary. </p><p>&#183; Kotwal - Public police </p><p>&#183; Tharaf - Provinces. Provincial head: Tharafdhar </p><p>&#183; Amar-Ul-Umara - Army chief. </p><p>&#183; Khosa-i-Sultani - officer under sultan </p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following literary works with their authors:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Amukta Maalyada</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Tenali Ramakrishna</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Ubhataradhyacharitam</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Ratnakaravarni</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Bharateshavaibhava</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Allasani Peddanna</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Manucharitam</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Krishnadevaraya</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351;&#2367;&#2325; &#2325;&#2371;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2354;&#2375;&#2326;&#2325;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2309;&#2350;&#2369;&#2325;&#2381;&#2340;&#2366; &#2350;&#2366;&#2354;&#2381;&#2351;&#2342;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2340;&#2375;&#2344;&#2366;&#2354;&#2368; &#2352;&#2366;&#2350;&#2325;&#2371;&#2359;&#2381;&#2339;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2313;&#2349;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2381;&#2351;&#2330;&#2352;&#2367;&#2340;&#2350;&#2381;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2352;&#2340;&#2381;&#2344;&#2366;&#2325;&#2352;&#2357;&#2352;&#2381;&#2339;&#2367;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2349;&#2366;&#2352;&#2340;&#2375;&#2358;&#2357;&#2376;&#2349;&#2357;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2309;&#2354;&#2381;&#2354;&#2366;&#2360;&#2366;&#2344;&#2368; &#2346;&#2375;&#2342;&#2381;&#2342;&#2344;&#2381;&#2344;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2350;&#2344;&#2369;&#2330;&#2352;&#2367;&#2340;&#2350;&#2381;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2325;&#2371;&#2359;&#2381;&#2339;&#2342;&#2375;&#2357;&#2352;&#2366;&#2351;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-d, ii-a, iii-b, iv-c</span><span class=\"hqt\" style=\"display:none\">i-d, ii-a, iii-b, iv-c</span>",
      "<span class=\"eqt\">i-c, ii-d, iii-a, iv-b</span><span class=\"hqt\" style=\"display:none\">i-c, ii-d, iii-a, iv-b</span>",
      "<span class=\"eqt\">i-b, ii-a, iii-d, iv-c</span><span class=\"hqt\" style=\"display:none\">i-b, ii-a, iii-d, iv-c</span>",
      "<span class=\"eqt\">i-a, ii-b, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-a, ii-b, iii-c, iv-d</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>o Amukta Maalyada was written by Krishnadevaraya</p><p>o Tenali Ramakrishna wrote the Ubhataradhyacharitam</p><p>o Bharateshavaibhava was written by Ratnakaravarni</p><p>o Allasani Peddanna wrote the Manucharitam </p><p>Literature in Vijayanagar Empire:</p><p>&#183; Due to the peace and order, economic progress; literature flourished. Various works were created in Kannada, Sanskrit, Telugu and Tamil languages.</p><p>&#183; Ratnakaravarni's 'Bharateshavaibhava', Chamarasa's 'Prabhulingaleele', Kumaravyasa's 'Gaduginabharata' are the important Kannada works of the time. Bheemakavi translated Palkurike Somanatha's Telugu work, 'Basavapurana', to Kannada language. </p><p>&#183; The collection of Veerashaiva vachanas called 'Shunyasampadane' was also published. Besides Lakkanna Dandesha's 'Shivatatvachintamani', books in Kannada on human medical science, veterinary science, poetics, astrology and cookery were also published. Saint Purandaradasa, Kanakadasa, Shripadaraya and Vyasaraya enriched dasa sahitya. Among these, Kanakadasa's 'Mohanatarangini', 'Nalacharita', 'Haribhaktisara' and 'Ramadhanyacharita' are important.</p><p>&#183; Vidyaranya wrote 'Shankaravijaya' and 'Sarvadarshana sangraha' in Sanskrit. His brother, Sayanacharya, wrote commentaries on the Vedas called 'Vedarthaprakasha', 'Ayurvedasudhanidhi', 'Purusharthasudhanidhi' and other books. Kampannaraya's wife, Gangadevi, wrote a book called 'Maduravijayam'. This book deals with Kampanna's invasion and a description of places of pilgrimage.</p><p>&#183; The court poet of Devaraya II, Srinatha, had earned the title 'Kavichakravarthi'. There were eight famous poets called the Asthadiggajas in Krishnadevaraya's court.</p><p>&#183; Allasani Peddanna's 'Manucharitam', Timmanna's 'Parijatapaharanam', and Tenali Ramakrishna's 'Ubhataradhyacharitam' are important works of this period.</p><p>&#183; Krishnadevaraya's court had also Tamil poets, Paranjyothiyer Veeraraghavar, Mandala Purusha, jnanaprakasha, Harihara and others. Paranjyoti Iyer wrote 'Tiruvalayadal puranam'. In the period of Vijayanagara empire they encouraged Sanskrit, Kannada, Telugu and Tamil languages.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about the Vijayanagar Empire: </p><p>I. It was established as a reaction to the attacks of Allauddin Khilji on South Indian dynasties </p><p>II. The capital city was Hampi from the very beginning </p><p>III. The empire at its peak extended from Godavari in the north to Indian Ocean in the south </p><p>IV. Europeans had established colonies in India during Krishnadevaraya's reign</p><p>Which of the statements given above are correct? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2351;&#2361; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;&#2379;&#2306; &#2346;&#2352; &#2309;&#2354;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2326;&#2367;&#2354;&#2332;&#2368; &#2325;&#2375; &#2361;&#2350;&#2354;&#2379;&#2306; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;</p><p>II. &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2358;&#2361;&#2352; &#2358;&#2369;&#2352;&#2370; &#2360;&#2375; &#2361;&#2368; &#2361;&#2350;&#2381;&#2346;&#2368; &#2341;&#2366;</p><p>III. &#2309;&#2346;&#2344;&#2375; &#2330;&#2352;&#2350; &#2346;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; &#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368; &#2360;&#2375; &#2354;&#2375;&#2325;&#2352; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2350;&#2375;&#2306; &#2361;&#2367;&#2306;&#2342; &#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352; &#2340;&#2325; &#2347;&#2376;&#2354;&#2366; &#2361;&#2369;&#2310; &#2341;&#2366;</p><p>IV. &#2325;&#2371;&#2359;&#2381;&#2339;&#2342;&#2375;&#2357;&#2352;&#2366;&#2351; &#2325;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2351;&#2370;&#2352;&#2379;&#2346;&#2368;&#2351; &#2354;&#2379;&#2327;&#2379;&#2306; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2313;&#2346;&#2344;&#2367;&#2357;&#2375;&#2358; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2319; &#2341;&#2375;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">I, III and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">II, III and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II, III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">I, II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2319;&#2357;&#2306; III</span>",
      "<span class=\"eqt\">All of these</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344; &#2360;&#2348;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The Vijayanagar Empire was established in 1336 C.E. by Hakka and Bukka as a response to the political instability and religious turmoil caused by the attacks of Allauddin Khilji on South Indian dynasties like the Yadavas, Kakatiyas, and Hoysalas. </p><p>&#183; While Hampi became the capital of the Vijayanagar Empire, it was not the capital from the very beginning. The empire was initially established on the banks of the Tungabhadra River, and Hampi later became the capital. <b>Hence statement II is incorrect.</b></p><p>&#183; At its peak under Krishnadevaraya, the Vijayanagar Empire extended from the River Godavari in the north to the Indian Ocean in the south, and from the Arabian Sea in the west to the Bay of Bengal in the east.</p><p>&#183; During Krishnadevaraya's reign (1509-1529 C.E.), Europeans like the Portuguese had arrived in India and established colonies, particularly in Goa. Krishnadevaraya maintained friendly relations with the Portuguese.</p>",
    "question_index": 13
  },

    "question": "<span class=\"eqt\"><p>Arrange the following rulers of the Vijayanagar Empire in chronological order: </p><p>I. Krishnadevaraya </p><p>II. Bukkaraya </p><p>III. Devaraya II </p><p>IV. Ramaraya</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2366;&#2360;&#2325;&#2379;&#2306; &#2325;&#2379; &#2325;&#2366;&#2354;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;: </p><p>I. &#2325;&#2371;&#2359;&#2381;&#2339;&#2342;&#2375;&#2357;&#2352;&#2366;&#2351; </p><p>II. &#2348;&#2369;&#2325;&#2381;&#2325;&#2366;&#2352;&#2366;&#2351; </p><p>III. &#2342;&#2375;&#2357;&#2352;&#2366;&#2351; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; </p><p>IV. &#2352;&#2366;&#2350;&#2352;&#2366;&#2351;</p></span>",
    "options": [
      "<span class=\"eqt\">II, III, I, IV</span><span class=\"hqt\" style=\"display:none\">II, III, I, IV</span>",
      "<span class=\"eqt\">I, II, III, IV</span><span class=\"hqt\" style=\"display:none\">I, II, III, IV</span>",
      "<span class=\"eqt\">II, I, III, IV</span><span class=\"hqt\" style=\"display:none\">II, I, III, IV</span>",
      "<span class=\"eqt\">III, II, I, IV</span><span class=\"hqt\" style=\"display:none\">III, II, I, IV</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct chronological order is: Bukkaraya (Sangama dynasty), Devaraya II (Sangama dynasty), Krishnadevaraya (Tuluva dynasty), and Ramaraya (Araveedu dynasty).</p><p>&#183; Bukkaraya was one of the founders of the Vijayanagar Empire and ruled during the early years of the Sangama dynasty (1336 - 1486 C.E.). He was a key figure in establishing the empire and expanding its territories.</p><p>&#183; Devaraya II, also known as Praudhadevaraya, ruled during the Sangama dynasty from 1424 to 1446 C.E. He was one of the most famous kings of the Sangama dynasty and expanded the empire significantly.</p><p>&#183; Krishnadevaraya ruled during the Tuluva dynasty from 1509 to 1529 C.E. He is considered the greatest ruler of the Vijayanagar Empire, and his reign marked the peak of the empire's power and cultural achievements.</p><p>&#183; Ramaraya was the son-in-law of Krishnadevaraya and ruled during the Araveedu dynasty. He was a key figure in the later years of the Vijayanagar Empire and played a significant role in its administration until the empire's decline after the Battle of Talikota in 1565 C.E.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>State whether the following statements is incorrect. </p><p>I. Sati system was prevalent during the Vijayanagar period </p><p>III. Krishnadevaraya was from the Sangama dynasty.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2340;&#2366;&#2319;&#2305; &#2325;&#2367; &#2325;&#2381;&#2351;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;&#2404;</p><p>I. &#2360;&#2340;&#2368; &#2346;&#2381;&#2352;&#2341;&#2366; &#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2346;&#2381;&#2352;&#2330;&#2354;&#2367;&#2340; &#2341;&#2368;&#2404;</p><p>III. &#2325;&#2371;&#2359;&#2381;&#2339;&#2342;&#2375;&#2357;&#2352;&#2366;&#2351; &#2360;&#2306;&#2327;&#2350;&#2366; &#2357;&#2306;&#2358; &#2360;&#2375; &#2341;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sati system, where a widow immolates herself on her husband's funeral pyre, was indeed prevalent during the Vijayanagar period. This practice was part of the social customs of the time, although it was not universally practiced.</p><p>Krishnadevaraya was not from the Sangama dynasty. He belonged to the <b>Tuluva dynasty</b>, which was the third dynasty to rule the Vijayanagar Empire. The Sangama dynasty was the first dynasty, and Krishnadevaraya ruled during the Tuluva dynasty's reign (1509 - 1529 C.E.).</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the odd one out: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2359;&#2350; &#2325;&#2379; &#2346;&#2361;&#2330;&#2366;&#2344;&#2375;&#2306;: </p></span>",
    "options": [
      "<span class=\"eqt\">Virupaksha Temple</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2352;&#2369;&#2346;&#2366;&#2325;&#2381;&#2359; &#2350;&#2306;&#2342;&#2367;&#2352;</span>",
      "<span class=\"eqt\">Vittala Temple</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2381;&#2336;&#2354; &#2350;&#2306;&#2342;&#2367;&#2352;</span>",
      "<span class=\"eqt\">Mahanavami Platform</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2344;&#2357;&#2350;&#2368; &#2350;&#2306;&#2330;</span>",
      "<span class=\"eqt\">Gol Gumbaz</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2354; &#2327;&#2369;&#2350;&#2381;&#2348;&#2332;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Gol Gumbaz is the odd one out as it is a monument of the Bahmani Kingdom, while the others are all structures from the Vijayanagar Empire.</p><p>&#183; Gol Gumbaz: This is a mausoleum located in Bijapur (now Vijayapura), Karnataka. It was built by the Adil Shahi dynasty of the Bahamani Kingdom, not the Vijayanagar Empire. It is famous for its massive dome and acoustic properties.</p><p>&#183; Virupaksha Temple: This is a famous temple located in Hampi, the capital of the Vijayanagar Empire. It is one of the oldest and most significant temples in the region, dedicated to Lord Shiva.</p><p>&#183; Vittala Temple: Another iconic temple in Hampi, known for its exquisite architecture, including the famous stone chariot and musical pillars. It is also part of the Vijayanagar Empire's cultural heritage.</p><p>&#183; Mahanavami Platform: This is a large platform in Hampi where the Vijayanagar kings celebrated the Dasara festival. It is an important historical structure associated with the Vijayanagar Empire.</p>",

    "question": "<span class=\"eqt\"><p>Match the following foreign visitors to the Vijayanagara Empire with the rulers during whose reign they visited:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I (Foreign Visitors)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II(Vijayanagara Rulers)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Ibn Battuta</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Praudadevaraya</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Abdul Razack</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Krishnadevaraya</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Domingos Paes</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Harihara I</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Fernao Nuniz</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Achuytadevaraya</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2310;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2310;&#2327;&#2306;&#2340;&#2369;&#2325;&#2379;&#2306; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2313;&#2344; &#2358;&#2366;&#2360;&#2325;&#2379;&#2306; &#2360;&#2375; &#2325;&#2352;&#2375;&#2306; &#2332;&#2367;&#2344;&#2325;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2342;&#2380;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; I (&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2310;&#2327;&#2306;&#2340;&#2369;&#2325;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; II (&#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2358;&#2366;&#2360;&#2325;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2319;. &#2311;&#2348;&#2381;&#2344; &#2348;&#2340;&#2370;&#2340;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2346;&#2381;&#2352;&#2380;&#2343;&#2342;&#2375;&#2357;&#2352;&#2366;&#2351;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2348;&#2368;. &#2309;&#2348;&#2381;&#2342;&#2369;&#2354; &#2352;&#2332;&#2381;&#2332;&#2366;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2325;&#2371;&#2359;&#2381;&#2339;&#2342;&#2375;&#2357;&#2352;&#2366;&#2351;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2368;. &#2337;&#2379;&#2350;&#2367;&#2306;&#2327;&#2379;&#2360; &#2346;&#2375;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2361;&#2352;&#2367;&#2361;&#2352; I</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2337;&#2368;. &#2347;&#2352;&#2381;&#2344;&#2366;&#2323; &#2344;&#2369;&#2344;&#2367;&#2332;&#2364;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2309;&#2330;&#2381;&#2351;&#2369;&#2340;&#2342;&#2375;&#2357;&#2352;&#2366;&#2351;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">A-iii, B-i, C-ii, D-iv</span><span class=\"hqt\" style=\"display:none\">A-iii, B-i, C-ii, D-iv</span>",
      "<span class=\"eqt\">A-ii, B-i, C-iii, D-iv</span><span class=\"hqt\" style=\"display:none\">A-ii, B-i, C-iii, D-iv</span>",
      "<span class=\"eqt\">A-iv, B-iii, C-i, D-ii</span><span class=\"hqt\" style=\"display:none\">A-iv, B-iii, C-i, D-ii</span>",
      "<span class=\"eqt\">A-i, B-ii, C-iv, D-iii</span><span class=\"hqt\" style=\"display:none\">A-i, B-ii, C-iv, D-iii</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Various travel writings of many foreign visitors who visited Vijayanagara Empire is one of the important sources of information about period of Vijayanagara Kings. Many visitors from foreign countries had visited Vijayanagara. They documented details on the kings, politics, economy, society and culture of Vijayanagara. </p><p>The following are the important foreign visitors who visited Vijayanagara: </p><p>Ibn Battuta (Morocco) -Harihara I, Nicole-de-Conti (Italy), Abdul Razack (Persia), Nikitin (Russia) -Praudadevaraya, Ludovico di Varthema (Italy) - Narasimha II, Barbosa, Domingos Paes (Portuguese) - Krishnadevaraya, Fernao Nuniz (Portuguese) Achuytadevaraya, Ceasar Fredrick(Italy) after the war of Rakasatangadi, Baradas (Englad) after the death of Raja Venkata I and many others. </p><p>Most of these visitors are from Europe as the Sea route was discovered by that time. The monopoly of the Arab traders was broken by Portuguese.</p>",
    "question_index": 17
  },

    "question": "<span class=\"eqt\"><p>Gol Gumbaz is _______meters tall.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2379;&#2354; &#2327;&#2369;&#2350;&#2381;&#2348;&#2332; _______&#2350;&#2368;&#2335;&#2352; &#2314;&#2306;&#2330;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">71</span><span class=\"hqt\" style=\"display:none\">71</span>",
      "<span class=\"eqt\">61</span><span class=\"hqt\" style=\"display:none\">61</span>",
      "<span class=\"eqt\">41</span><span class=\"hqt\" style=\"display:none\">41</span>",
      "<span class=\"eqt\">51</span><span class=\"hqt\" style=\"display:none\">51</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The Gol Gumbaz of Vijayapura(Karnataka) is one of the greatest structures in the world. It has an area of 1800 sq.ft. There are 7-storied minarets in the four corners of the building. There is a huge dome in the center.</p><p>&#183; Mohammad Adil Shah constructed this monument. The construction work is said to have begun around 1626 and completed in 1656. </p><p>&#183; This structure is 51 mtrs.tall and has a wide dome. </p><p>&#183; The dome has four pillars in which steps have been built to go up.</p><p>&#183; The unique feature of this dome is that if one whispers standing on one side of the dome, it can be heard clearly on the other side. It is the biggest Dome in India.</p>",

  },

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct about Bahamani Kingdom?</p><p>I. The cabinet was called Majlis-E-Ilwith.</p><p>II. Gawan converted the then existed four 'Tarafs' (provinces) into eight units and these provinces were divided into fifteen Sarakars. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2348;&#2361;&#2350;&#2344;&#2368; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2325;&#2376;&#2348;&#2367;&#2344;&#2375;&#2335; &#2325;&#2379; &#2350;&#2332;&#2354;&#2367;&#2360;-&#2319;-&#2311;&#2354;&#2357;&#2367;&#2341; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404;</p><p>II. &#2327;&#2357;&#2366;&#2344; &#2344;&#2375; &#2340;&#2340;&#2381;&#2325;&#2366;&#2354;&#2368;&#2344; &#2330;&#2366;&#2352; '&#2340;&#2352;&#2366;&#2347;&#2364;' (&#2346;&#2381;&#2352;&#2366;&#2306;&#2340;&#2379;&#2306;) &#2325;&#2379; &#2310;&#2336; &#2311;&#2325;&#2366;&#2311;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2324;&#2352; &#2311;&#2344; &#2346;&#2381;&#2352;&#2366;&#2306;&#2340;&#2379;&#2306; &#2325;&#2379; &#2346;&#2306;&#2342;&#2381;&#2352;&#2361; &#2360;&#2352;&#2366;&#2325;&#2366;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Administration during Bahamani Kingdom:</p><p>There were three levels of administration namely Central, Provincial and Village.</p><p>Among these, there was revenue, judicial and military administration too.</p><p>The Sultan was the chief of the central administration. The cabinet was called Majlis-E-Ilwith. Top officials, commandants, ulemas and amins were friends and relatives of the Sultan.</p><p>Gawan converted the then existed four 'Tarafs' (provinces) into eight units and these provinces were divided into fifteen Sarakars. </p><p>The Subedar was the administrator in each of these Sarakars. Sarakars were divided into paraganas. Kotwal, Deshmukh and Desai were the administrators of the paraganas.</p><p>The final unit of administration was the village having Patel, Kulkarni and guards as staff. The village units were independent units.</p>",
    "question_index": 19
  }
