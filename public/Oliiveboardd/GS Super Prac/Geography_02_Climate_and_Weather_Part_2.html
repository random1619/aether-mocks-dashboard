<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following examples for variations in the weather and climate of India is/are true?</p><p>I. While in the summer the mercury occasionally touches 55&deg;C in the western Rajasthan, it drops down to as low as minus 45&deg;C in winter around Leh. </p><p>II. In the Thar desert, if the day temperature is around 50&deg;C, at night, it may drop down considerably up to 15&deg;-20&deg;C. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2380;&#2360;&#2350; &#2324;&#2352; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369; &#2350;&#2375;&#2306; &#2349;&#2367;&#2344;&#2381;&#2344;&#2340;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2327;&#2352;&#2381;&#2350;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344; &#2350;&#2375;&#2306; &#2346;&#2366;&#2352;&#2366; &#2325;&#2349;&#2368;-&#2325;&#2349;&#2368; 55 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2360;&#2375;&#2354;&#2381;&#2360;&#2367;&#2351;&#2360; &#2340;&#2325; &#2346;&#2361;&#2369;&#2306;&#2330; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2360;&#2352;&#2381;&#2342;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2354;&#2375;&#2361; &#2325;&#2375; &#2310;&#2360;&#2346;&#2366;&#2360; &#2351;&#2361; &#2358;&#2370;&#2344;&#2381;&#2351; &#2360;&#2375; 45 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2360;&#2375;&#2354;&#2381;&#2360;&#2367;&#2351;&#2360; &#2344;&#2368;&#2330;&#2375; &#2340;&#2325; &#2327;&#2367;&#2352; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2341;&#2366;&#2352; &#2352;&#2375;&#2327;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344; &#2350;&#2375;&#2306;, &#2351;&#2342;&#2367; &#2342;&#2367;&#2344; &#2325;&#2366; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; 50 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2360;&#2375;&#2354;&#2381;&#2360;&#2367;&#2351;&#2360; &#2325;&#2375; &#2310;&#2360;&#2346;&#2366;&#2360; &#2361;&#2376;, &#2340;&#2379; &#2352;&#2366;&#2340; &#2350;&#2375;&#2306; &#2351;&#2361; 15 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; -20 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2360;&#2375;&#2354;&#2381;&#2360;&#2367;&#2351;&#2360; &#2340;&#2325; &#2327;&#2367;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; While in the summer the mercury occasionally touches 55&deg;C in the western Rajasthan, it drops down to as low as minus 45&deg;C in winter around Leh. </p><p>&#183; Churu in Rajasthan may record a temperature of 50&deg;C or more on a June day while the mercury hardly touches 19&deg;C in Tawang (Arunachal Pradesh) on the same day. </p><p>&#183; On a December night, temperature in Drass (Ladakh) may drop down to minus 45&deg;C while Thiruvananthapuram or Chennai on the same night records 20&deg;C or 22&deg;C. </p><p>&#183; These examples confirm that there are seasonal variations in temperature from place to place and from region to region in India. </p><p>&#183; Not only this, if we take only a single place and record the temperature for just one day, variations are no less striking. </p><p>&#183; In Kerala and in the Andaman Islands, the difference between day and night temperatures may be hardly seven or eight degree Celsius. </p><p>&#183; But in the Thar desert, if the day temperature is around 50&deg;C, at night, it may drop down considerably upto 15&deg;-20&deg;C. </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding rainfall distribution in India and choose the correct option: </p><p>a. Areas along the west coast, the Western Ghats, and the hills of Meghalaya receive high rainfall, exceeding 200 cm annually. </p><p>b. Jaisalmer in Rajasthan receives rainfall over 1080 cm in a year, similar to Cherrapunji and Mawsynram. </p><p>c. Winter rainfall in northwestern India, caused by weak temperate cyclones from the Mediterranean Sea, is highly beneficial for rabi crops. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2359;&#2366; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:</p><p>a. &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2340;&#2335;, &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335; &#2324;&#2352; &#2350;&#2375;&#2328;&#2366;&#2354;&#2351; &#2325;&#2368; &#2346;&#2361;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2357;&#2366;&#2354;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2366;&#2354;&#2366;&#2344;&#2366; 200 &#2360;&#2375;&#2350;&#2368; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2349;&#2366;&#2352;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>b. &#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2375; &#2332;&#2376;&#2360;&#2354;&#2350;&#2375;&#2352; &#2350;&#2375;&#2306; &#2330;&#2375;&#2352;&#2366;&#2346;&#2370;&#2306;&#2332;&#2368; &#2324;&#2352; &#2350;&#2380;&#2360;&#2367;&#2344;&#2352;&#2366;&#2350; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; 1080 &#2360;&#2375;&#2350;&#2368; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2357;&#2352;&#2381;&#2359;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>c. &#2349;&#2370;&#2350;&#2343;&#2381;&#2351; &#2360;&#2366;&#2327;&#2352; &#2360;&#2375; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2325;&#2350;&#2332;&#2379;&#2352; &#2358;&#2368;&#2340;&#2379;&#2359;&#2381;&#2339; &#2330;&#2325;&#2381;&#2352;&#2357;&#2366;&#2340;&#2379;&#2306; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2352;&#2381;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366; &#2352;&#2348;&#2368; &#2325;&#2368; &#2347;&#2360;&#2354;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2347;&#2366;&#2351;&#2342;&#2375;&#2350;&#2306;&#2342; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#8226; The <b>highest rainfall occurs along the west coast, on the Western Ghats, as well as in the sub-Himalayan areas is the northeast and the hills of Meghalaya</b>, where it exceeds 200 cm .</p><p>&#8226; While Cherrapunji and Mawsynram receive rainfall over 1,080 cm, <b>Jaisalmer in Rajasthan rarely gets more than 9 cm of rainfall</b> .</p><p>&#8226; <b>Winter rainfall by temperate cyclones in north India is highly beneficial for rabi crops</b>.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following factors does NOT determine the climate of India according to the source? </p><p>I. Latitude. </p><p>II. Himalayan Mountains. </p><p>III. Soil composition. </p><p>IV. Distance from the Sea. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2366;&#2352;&#2325; &#2360;&#2381;&#2352;&#2379;&#2340; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369; &#2325;&#2379; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p><p>I. &#2309;&#2325;&#2381;&#2359;&#2366;&#2306;&#2358;&#2404;</p><p>II. &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2346;&#2352;&#2381;&#2357;&#2340;&#2404;</p><p>III. &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2368; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;&#2404;</p><p>IV. &#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2360;&#2375; &#2342;&#2370;&#2352;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I,II,III and IV</span><span class=\"hqt\" style=\"display:none\">I,II,III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2319;&#2357;&#2306; IV</span>",
      "<span class=\"eqt\">I and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; IV</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Latitude, the Himalayan Mountains, distribution of land and water, distance from the sea, altitude, and relief</b> are some factors determining India's climate. </p><p>Soil composition is not a primary climatic determinant.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The Inter Tropical Convergence Zone (ITCZ) in July is located around: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2369;&#2354;&#2366;&#2312; &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2352; &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2309;&#2349;&#2367;&#2360;&#2352;&#2339; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; (&#2310;&#2312;&#2335;&#2368;&#2360;&#2368;&#2332;&#2375;&#2337;) &#2310;&#2360;&#2346;&#2366;&#2360; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">The equator.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2350;&#2343;&#2381;&#2351; &#2352;&#2375;&#2326;&#2366;.</span>",
      "<span class=\"eqt\">20&deg;N-25&deg;N latitudes (over the Gangetic plain).</span><span class=\"hqt\" style=\"display:none\">20&deg;N-25&deg;N &#2309;&#2325;&#2381;&#2359;&#2366;&#2306;&#2358;&#2379;&#2306; (&#2327;&#2306;&#2327;&#2366; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344; &#2346;&#2352;)</span>",
      "<span class=\"eqt\">South of the Tropic of Capricorn.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2325;&#2352; &#2352;&#2375;&#2326;&#2366; &#2325;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2350;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The Himalayas.</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2350;&#2366;&#2354;&#2351;.</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In <b>July</b>, due to the apparent northward movement of the sun, the <b>Inter Tropical Convergence Zone (ITCZ)</b> shifts <b>northward</b> and is located around <b>20&deg;N-25&deg;N latitudes</b>, over the <b>Gangetic Plain</b> in India.</p><p>The <b>Inter Tropical Convergence Zone (ITCZ)</b> is a low-pressure zone near the <b>equator</b>, where the <b>northeast and southeast trade winds</b> converge. It is characterized by <b>rising warm air, heavy cloud formation, and frequent rainfall</b>.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The southwest monsoon enters the Kerala coast by approximately: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2354;&#2327;&#2349;&#2327; &#2311;&#2360; &#2360;&#2350;&#2351; &#2325;&#2375;&#2352;&#2354; &#2340;&#2335; &#2346;&#2352; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Mid-July.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351; &#2332;&#2369;&#2354;&#2366;&#2312;.</span>",
      "<span class=\"eqt\">End of September.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2340;&#2350;&#2381;&#2348;&#2352; &#2325;&#2366; &#2309;&#2306;&#2340;.</span>",
      "<span class=\"eqt\">1st June.</span><span class=\"hqt\" style=\"display:none\">1 &#2332;&#2370;&#2344;.</span>",
      "<span class=\"eqt\">Mid-November.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351; &#2344;&#2357;&#2350;&#2381;&#2348;&#2352;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>southwest monsoon</b> typically <b>enters the Kerala coast around June 1st</b>, marking the onset of the monsoon season in India.</p><p>The <b>Southwest Monsoon</b> is a crucial weather phenomenon that brings <b>heavy rainfall</b> to India, especially during <b>June to September</b>.</p><p><b>Entry into India</b></p><p>&#183; The <b>monsoon winds originate from the Indian Ocean</b> and are drawn towards the Indian subcontinent due to <b>low-pressure formation over northwest India</b>.</p><p>&#183; The monsoon <b>first hits the Kerala coast around June 1st</b>, making Kerala the <b>first state to receive monsoon rains</b>.</p><p>&#183; It then advances northward, covering the entire country by <b>July</b>.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A break in the monsoon is characterized by: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2350;&#2375;&#2306; &#2357;&#2367;&#2352;&#2366;&#2350; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2351;&#2361; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Continuous heavy rainfall for several weeks.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2312; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2340;&#2325; &#2354;&#2327;&#2366;&#2340;&#2366;&#2352; &#2349;&#2366;&#2352;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366;&#2404;</span>",
      "<span class=\"eqt\">A sudden and violent onset of rain.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2330;&#2366;&#2344;&#2325; &#2324;&#2352; &#2332;&#2379;&#2352;&#2342;&#2366;&#2352; &#2348;&#2366;&#2352;&#2367;&#2358; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379; &#2327;&#2312;&#2404;</span>",
      "<span class=\"eqt\">Failure of rain to occur for one or more weeks during the southwest monsoon period.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2319;&#2325; &#2351;&#2366; &#2309;&#2343;&#2367;&#2325; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2340;&#2325; &#2357;&#2352;&#2381;&#2359;&#2366; &#2344; &#2361;&#2379;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The retreating of monsoon winds from the subcontinent.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2350;&#2361;&#2366;&#2342;&#2381;&#2357;&#2368;&#2346; &#2360;&#2375; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344;&#2368; &#2361;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2346;&#2368;&#2331;&#2375; &#2361;&#2335;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A <b>break in the monsoon</b> refers to <b>a temporary dry period</b> during the <b>southwest monsoon season</b> when rainfall stops for <b>one or more weeks</b> despite the season being active. This occurs due to factors like the shifting of the <b>monsoon trough</b> away from its normal position.</p><p><b>Causes of Monsoon Breaks</b></p><p>I. <b>Northward shifting of the monsoon trough</b>  -  The rain-bearing winds move away from the main landmass.</p><p>II. <b>Strengthening of high-pressure systems</b> over the Bay of Bengal.</p><p>III. <b>Weakening of low-pressure systems</b> over land.</p><p>These breaks can <b>affect agriculture and water availability</b> in India.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following causes rainfall in northwestern India during winter? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2352;&#2381;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2359;&#2366; &#2325;&#2366; &#2325;&#2366;&#2352;&#2339; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Southwest monsoon.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344;.</span>",
      "<span class=\"eqt\">Northeast monsoon.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2352; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344;.</span>",
      "<span class=\"eqt\">Weak temperate cyclones from the Mediterranean Sea.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2350;&#2343;&#2381;&#2351; &#2360;&#2366;&#2327;&#2352; &#2360;&#2375; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2325;&#2350;&#2332;&#2364;&#2379;&#2352; &#2358;&#2368;&#2340;&#2379;&#2359;&#2381;&#2339; &#2330;&#2325;&#2381;&#2352;&#2357;&#2366;&#2340;&#2404;</span>",
      "<span class=\"eqt\">Local convectional currents.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2360;&#2306;&#2357;&#2361;&#2344; &#2343;&#2366;&#2352;&#2366;&#2319;&#2305;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In northwestern India, some <b>weak temperate cyclones from the Mediterranean sea cause rainfall</b> in the winter.</p><p>During <b>winter</b>, northwestern India (Punjab, Haryana, Rajasthan, and western Uttar Pradesh) receives <b>rainfall due to Western Disturbances</b>.</p><p>These <b>temperate cyclones</b> originate over the <b>Mediterranean Sea</b> and travel eastward, bringing <b>light to moderate rainfall</b> to the region.</p><p>This winter rainfall is <b>important for the Rabi crops</b>, especially <b>wheat</b>.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The hot, dry winds known as 'Loo' primarily blow in the: </p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2354;&#2370;' &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2327;&#2352;&#2381;&#2350;, &#2358;&#2369;&#2359;&#2381;&#2325; &#2361;&#2357;&#2366;&#2319;&#2306; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2361;&#2366;&#2306; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;&#2306;: </p></span>",
    "options": [
      "<span class=\"eqt\">Coastal areas of Tamil Nadu.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2325;&#2375; &#2340;&#2335;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2404;</span>",
      "<span class=\"eqt\">Northern plains from Punjab to Bihar.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2332;&#2366;&#2348; &#2360;&#2375; &#2348;&#2367;&#2361;&#2366;&#2352; &#2340;&#2325; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2350;&#2376;&#2342;&#2366;&#2344;&#2404;</span>",
      "<span class=\"eqt\">Western Ghats.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335;.</span>",
      "<span class=\"eqt\">Northeastern states.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>'Loo'</b>, which are hot, dry, and oppressing winds, blow in the <b>Northern plains from Punjab to Bihar</b>.</p><p>Further insights:</p><p><b>Mango showers</b> are pre-monsoon showers that are a common phenomenon in <b>Kerala and coastal areas of Karnataka</b>.</p><p><b>Kalbaisakhi</b> refers to <b>violent thunderstorms</b> that occur in <b>eastern and northeastern India</b> during the <b>pre-monsoon season (March to May)</b>.</p><p>&#183; In <b>Bihar and Uttar Pradesh</b>, these storms are called <b>\"Bordoisila\"</b>.</p><p>&#183; In <b>Assam</b>, similar storms are known as <b>\"Bordoisikhila\"</b>.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about the seasons in India and choose the correct option: </p><p>a. The cold weather season in north India is typically characterized by feeble high pressure conditions over the northern plain. </p><p>b. The hot weather season sees the ITCZ shift southward, leading to the prevalence of hot and dry 'Loo' winds in the northern plains. </p><p>c. The retreating monsoon season, occurring in October and November, is associated with clear skies and a rise in temperature, often referred to as 'October heat'. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2380;&#2360;&#2350;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:</p><p>a. &#2313;&#2340;&#2381;&#2340;&#2352; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2336;&#2306;&#2337; &#2325;&#2375; &#2350;&#2380;&#2360;&#2350; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2350;&#2376;&#2342;&#2366;&#2344; &#2346;&#2352; &#2325;&#2350;&#2332;&#2379;&#2352; &#2313;&#2330;&#2381;&#2330; &#2342;&#2348;&#2366;&#2357; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>b. &#2327;&#2352;&#2381;&#2350; &#2350;&#2380;&#2360;&#2350; &#2325;&#2375; &#2350;&#2380;&#2360;&#2350; &#2350;&#2375;&#2306; &#2310;&#2312;&#2335;&#2368;&#2360;&#2368;&#2332;&#2375;&#2337; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2325;&#2368; &#2323;&#2352; &#2358;&#2367;&#2347;&#2381;&#2335; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2327;&#2352;&#2381;&#2350; &#2324;&#2352; &#2358;&#2369;&#2359;&#2381;&#2325; '&#2354;&#2370;' &#2361;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2330;&#2354;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>c. &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; &#2324;&#2352; &#2344;&#2357;&#2306;&#2348;&#2352; &#2350;&#2375;&#2306; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2366; &#2350;&#2380;&#2360;&#2350; &#2360;&#2366;&#2347; &#2310;&#2360;&#2350;&#2366;&#2344; &#2324;&#2352; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2375; &#2360;&#2366;&#2341; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2375; &#2309;&#2325;&#2381;&#2360;&#2352; '&#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; &#2325;&#2368; &#2327;&#2352;&#2381;&#2350;&#2368;' &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; During the <b>cold weather season (winter)</b> in <b>north India</b>, the region experiences <b>feeble high-pressure conditions</b> over the <b>northern plains</b>.</p><p>o This is because <b>cold, dry air descends</b>, creating stable conditions with <b>light winds and low temperatures</b>.</p><p>&#183; The <b>hot weather season (summer, March-May)</b> sees the <b>ITCZ shift northward</b>, not <b>southward</b>. </p><p>o This northward shift creates <b>low-pressure conditions</b> over the northern plains, leading to the <b>hot and dry 'Loo' winds</b>.</p><p>&#183; The <b>retreating monsoon season (October-November)</b> is marked by <b>clear skies and a rise in temperature</b>.</p><p>o This phenomenon is often called <b>'October Heat'</b>, as <b>humidity remains high</b>, leading to a temporary <b>increase in temperature</b> before winter sets in.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The Arabian Sea branch of the monsoon causes very heavy rainfall on the: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2368; &#2309;&#2352;&#2348; &#2360;&#2366;&#2327;&#2352; &#2358;&#2366;&#2326;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2346;&#2352; &#2348;&#2361;&#2369;&#2340; &#2349;&#2366;&#2352;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Leeward side of the Western Ghats.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335; &#2325;&#2366; &#2346;&#2357;&#2344;&#2357;&#2367;&#2350;&#2369;&#2326; &#2346;&#2325;&#2381;&#2359;&#2404;</span>",
      "<span class=\"eqt\">Deccan Plateau.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2325;&#2344; &#2325;&#2366; &#2346;&#2336;&#2366;&#2352;.</span>",
      "<span class=\"eqt\">Windward side of the Sahyadris and Western Coastal Plain.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2361;&#2381;&#2351;&#2366;&#2342;&#2381;&#2352;&#2367; &#2324;&#2352; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2340;&#2335;&#2368;&#2351; &#2350;&#2376;&#2342;&#2366;&#2344; &#2325;&#2366; &#2346;&#2357;&#2344;&#2350;&#2369;&#2326;&#2368; &#2346;&#2325;&#2381;&#2359;&#2404;</span>",
      "<span class=\"eqt\">Ganga plains.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2327;&#2366; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The <b>Arabian Sea branch of the southwest monsoon</b> hits the <b>Western Ghats (Sahyadris)</b> first.</p><p>&#183; The <b>windward side (western slopes)</b> of the <b>Western Ghats and the coastal plain (Konkan &amp; Malabar regions)</b> receive <b>very heavy rainfall</b> due to <b>orographic (relief) rainfall</b>.</p><p>&#183; As the monsoon winds <b>rise along the slopes of the Western Ghats</b>, they <b>cool, condense, and cause heavy rainfall</b>, especially in places like <b>Mumbai, Goa, Mangalore, and Kerala</b>.</p>",
    "question_index": 9
  },

    "question": "<span class=\"eqt\"><p>The Tamil Nadu coast remains relatively dry during the southwest monsoon season because: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2375; &#2350;&#2380;&#2360;&#2350; &#2350;&#2375;&#2306; &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2325;&#2366; &#2340;&#2335; &#2309;&#2346;&#2375;&#2325;&#2381;&#2359;&#2366;&#2325;&#2371;&#2340; &#2358;&#2369;&#2359;&#2381;&#2325; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;, &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367;:</p></span>",
    "options": [
      "<span class=\"eqt\">It receives heavy rainfall from the Arabian Sea branch.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2309;&#2352;&#2348; &#2360;&#2366;&#2327;&#2352; &#2358;&#2366;&#2326;&#2366; &#2360;&#2375; &#2349;&#2366;&#2352;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is parallel to the Bay of Bengal branch of the southwest monsoon and lies in the rain-shadow area of the Arabian Sea branch.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2368; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2368; &#2326;&#2366;&#2337;&#2364;&#2368; &#2358;&#2366;&#2326;&#2366; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2361;&#2376; &#2324;&#2352; &#2309;&#2352;&#2348; &#2360;&#2366;&#2327;&#2352; &#2358;&#2366;&#2326;&#2366; &#2325;&#2375; &#2357;&#2352;&#2381;&#2359;&#2366;-&#2331;&#2366;&#2351;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The northeast monsoon is active during this period.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2346;&#2370;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2352; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It experiences high temperatures and low humidity.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2313;&#2330;&#2381;&#2330; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2324;&#2352; &#2325;&#2350; &#2310;&#2352;&#2381;&#2342;&#2381;&#2352;&#2340;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2349;&#2357; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>Tamil Nadu coast</b> remains <b>relatively dry</b> during the <b>southwest monsoon (June-September)</b> because:</p><p>&#183; The <b>Bay of Bengal branch</b> of the monsoon <b>flows parallel</b> to the coast, reducing the chance of significant rainfall.</p><p>&#183; The <b>Western Ghats block the Arabian Sea branch</b>, causing <b>orographic rainfall on the windward side (Kerala, Karnataka, Maharashtra)</b>, leaving <b>Tamil Nadu in the rain-shadow region</b>.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following weather mechanisms with their corresponding seasons in India: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Westerly Jet Streams bringing Western Cyclonic Disturbances</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Summer season</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Shift of Inter-Tropical Convergence Zone (ITCZ) northwards</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Winter season</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. South-West Monsoon winds from the Indian Ocean</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Rainy season</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2380;&#2360;&#2350; &#2340;&#2306;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2350;&#2380;&#2360;&#2350;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2330;&#2325;&#2381;&#2352;&#2357;&#2366;&#2340;&#2368; &#2357;&#2367;&#2325;&#2381;&#2359;&#2379;&#2349; &#2354;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2332;&#2375;&#2335; &#2343;&#2366;&#2352;&#2366;&#2319;&#2305;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2327;&#2381;&#2352;&#2368;&#2359;&#2381;&#2350; &#2315;&#2340;&#2369;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2309;&#2306;&#2340;&#2352;-&#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2309;&#2349;&#2367;&#2360;&#2352;&#2339; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; (ITCZ) &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2368; &#2323;&#2352; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2358;&#2368;&#2340; &#2315;&#2340;&#2369;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2361;&#2367;&#2306;&#2342; &#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352; &#2360;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2361;&#2357;&#2366;&#2319;&#2305;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2357;&#2352;&#2381;&#2359;&#2366; &#2315;&#2340;&#2369;</td></tr></table></span>",
    "options": [

    ],
    "correct_option_id": 2,
    "solution": "<p><b>Winter season</b></p><p>&#183; In <b>winter</b>, <b>westerly jet streams</b> carry <b>Western Disturbances</b> from the <b>Mediterranean Sea</b> to <b>northwest India</b>.</p><p>&#183; These cause <b>rainfall in Punjab, Haryana, and northern India</b>, which is crucial for <b>Rabi crops</b>.</p><p><b>Summer season</b></p><p>&#183; During <b>summer (March-May)</b>, intense heating causes the <b>ITCZ to shift northwards</b>, creating <b>low-pressure areas</b> over north India.</p><p>&#183; This shift <b>pulls in monsoon winds</b>, leading to the onset of the rainy season.</p><p><b>Rainy season</b></p><p>&#183; In <b>June-September</b>, the <b>Southwest Monsoon</b> winds bring <b>heavy rainfall</b> across India, especially on the <b>windward side of the Western Ghats and the northeastern states</b>.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>The average annual rainfall in India is about: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2324;&#2360;&#2340; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2357;&#2352;&#2381;&#2359;&#2366; &#2354;&#2327;&#2349;&#2327; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">50 cm.</span><span class=\"hqt\" style=\"display:none\">50 &#2360;&#2375;&#2350;&#2368;.</span>",
      "<span class=\"eqt\">75 cm.</span><span class=\"hqt\" style=\"display:none\">75 &#2360;&#2375;&#2350;&#2368;.</span>",
      "<span class=\"eqt\">125 cm.</span><span class=\"hqt\" style=\"display:none\">125 &#2360;&#2375;&#2350;&#2368;.</span>",
      "<span class=\"eqt\">200 cm.</span><span class=\"hqt\" style=\"display:none\">200 &#2360;&#2375;&#2350;&#2368;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>average annual rainfall in India</b> is approximately <b>125 cm</b>.</p><p>However, rainfall <b>varies significantly</b> across different regions:</p><p>&#183; Areas of High Rainfall : The highest rainfall occurs along the west coast, on the Western Ghats, as well as in the sub-Himalayan areas is the northeast and the hills of Meghalaya. Here the rainfall exceeds 200 cm. </p><p>&#183; Areas of Medium Rainfall : Rainfall between 100-200 cm is received in the southern parts of Gujarat, east Tamil Nadu, northeastern Peninsula covering Odisha, Jharkhand, Bihar, eastern Madhya Pradesh, northern Ganga plain along the sub-Himalayas and the Cachar Valley and Manipur. </p><p>&#183; Areas of Low Rainfall : Western Uttar Pradesh, Delhi, Haryana, Punjab, Jammu and Kashmir, eastern Rajasthan, Gujarat and Deccan Plateau receive rainfall between 50-100 cm. </p><p>&#183; Areas of Inadequate Rainfall: Parts of the Peninsula, especially in Andhra Pradesh, Karnataka and Maharashtra, Ladakh and most of western Rajasthan receive rainfall below 50 cm. Snowfall is restricted to the Himalayan.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following regions with their rainfall pattern.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Region</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Rainfall</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Western ghats</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Less than 50 cm</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Cachar Valley</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. 50-100 cm</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Deccan plateau</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Exceeds 200 cm</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Western Rajasthan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. 100-200 cm</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2357;&#2352;&#2381;&#2359;&#2366; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2357;&#2352;&#2381;&#2359;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. 50 &#2360;&#2375;&#2350;&#2368; &#2360;&#2375; &#2325;&#2350;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2325;&#2331;&#2366;&#2352; &#2328;&#2366;&#2335;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. 50-100 &#2360;&#2375;&#2350;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2337;&#2375;&#2325;&#2381;&#2325;&#2344; &#2346;&#2336;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. 200 &#2360;&#2375;&#2350;&#2368; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. 100-200 &#2360;&#2375;&#2350;&#2368;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">a-i, b-ii, c-iii, d-iv</span><span class=\"hqt\" style=\"display:none\">a-i, b-ii, c-iii, d-iv</span>",
      "<span class=\"eqt\">a-ii, b-i, c-iii, d-iv</span><span class=\"hqt\" style=\"display:none\">a-ii, b-i, c-iii, d-iv</span>",
      "<span class=\"eqt\">a-iii, b-iv, c-ii, d-i</span><span class=\"hqt\" style=\"display:none\">a-iii, b-iv, c-ii, d-i</span>",
      "<span class=\"eqt\">a-iv, b-iii, c-i, d-ii</span><span class=\"hqt\" style=\"display:none\">a-iv, b-iii, c-i, d-ii</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Distribution of Rainfall: </p><p>The average annual rainfall in India is about 125 cm, but it has great spatial variations . </p><p>&#183; Areas of High Rainfall : The highest rainfall occurs along the west coast, on the Western Ghats, as well as in the sub-Himalayan areas is the northeast and the hills of Meghalaya. Here the rainfall exceeds 200 cm. In some parts of Khasi and Jaintia hills, the rainfall exceeds 1,000 cm. In the Brahmaputra valley and the adjoining hills, the rainfall is less then 200 cm. </p><p>&#183; Areas of Medium Rainfall : Rainfall between 100-200 cm is received in the southern parts of Gujarat, east Tamil Nadu, northeastern Peninsula covering Odisha, Jharkhand, Bihar, eastern Madhya Pradesh, northern Ganga plain along the sub-Himalayas and the Cachar Valley and Manipur. </p><p>&#183; Areas of Low Rainfall : Western Uttar Pradesh, Delhi, Haryana, Punjab, Jammu and Kashmir, eastern Rajasthan, Gujarat and Deccan Plateau receive rainfall between 50-100 cm. </p><p>&#183; Areas of Inadequate Rainfall: Parts of the Peninsula, especially in Andhra Pradesh, Karnataka and Maharashtra, Ladakh and most of western Rajasthan receive rainfall below 50 cm. Snowfall is restricted to the Himalayan.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the monsoon winds of the Arabian Sea: </p><p>A. One of its branches causes orographic rainfall along the Western Ghats. </p><p>B. After crossing the Western Ghats, these winds cause heavy rainfall in the leeward side. </p><p>C. One branch moves along the Ganga plains reaching till Punjab and Haryana.</p><p>Which of the above statements is/are <b>correct</b>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2352;&#2348; &#2360;&#2366;&#2327;&#2352; &#2325;&#2368; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344;&#2368; &#2361;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>A. &#2311;&#2360;&#2325;&#2368; &#2319;&#2325; &#2358;&#2366;&#2326;&#2366; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335;&#2379;&#2306; &#2346;&#2352; &#2346;&#2352;&#2381;&#2357;&#2340;&#2368;&#2351; &#2357;&#2352;&#2381;&#2359;&#2366; &#2325;&#2366; &#2325;&#2366;&#2352;&#2339; &#2348;&#2344;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>B. &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335;&#2379;&#2306; &#2325;&#2379; &#2346;&#2366;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2351;&#2375; &#2361;&#2357;&#2366;&#2319;&#2305; &#2346;&#2357;&#2344;&#2357;&#2367;&#2350;&#2369;&#2326; &#2346;&#2325;&#2381;&#2359; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366; &#2325;&#2366; &#2325;&#2366;&#2352;&#2339; &#2348;&#2344;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>C. &#2319;&#2325; &#2358;&#2366;&#2326;&#2366; &#2327;&#2306;&#2327;&#2366; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2306;&#2332;&#2366;&#2348; &#2324;&#2352; &#2361;&#2352;&#2367;&#2351;&#2366;&#2339;&#2366; &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Only A and C</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2324;&#2352; C</span>",
      "<span class=\"eqt\">All A, B, and C</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; A, B, &#2324;&#2352; C</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The <b>Arabian Sea branch of the southwest monsoon</b> brings <b>moisture-laden winds</b> to the <b>Western Ghats</b>.</p><p>o As these winds hit the <b>windward side (western slopes) of the Western Ghats</b>, they <b>rise, cool, and cause orographic rainfall</b> in <b>Kerala, Karnataka, Goa, and Maharashtra</b>.</p><p>&#183; After crossing the <b>Western Ghats</b>, the winds descend on the <b>leeward (rain-shadow) side</b>, causing <b>much less rainfall</b> in regions like <b>Pune, Solapur, and parts of Maharashtra and Karnataka</b>.</p><p>o These areas receive <b>scanty rainfall</b> because the moisture is already lost over the windward slopes.</p><p>&#183; One <b>branch of the Arabian Sea monsoon</b> moves <b>northward along the Ganga plains</b>, bringing <b>rainfall to Madhya Pradesh, Uttar Pradesh, Bihar, and up to Punjab and Haryana</b>.</p><p>o This rainfall is <b>moderate to heavy</b>, contributing significantly to agriculture in northern India.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>According to the Indian Meteorological Department, how many distinct seasons are found in India? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2380;&#2360;&#2350; &#2357;&#2367;&#2349;&#2366;&#2327; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2350;&#2380;&#2360;&#2350; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Two.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2404;</span>",
      "<span class=\"eqt\">Three.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;&#2404;</span>",
      "<span class=\"eqt\">Four.</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;.</span>",
      "<span class=\"eqt\">Six.</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2361;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Indian Meteorological Department recognizes the following <b>four seasons</b>: the cold weather season, the hot weather or summer season, the southwest monsoon season, and the retreating monsoon season.</p><p><b>Winter (January  -  February)</b></p><p>&#183; <b>Cold and dry weather</b> with low temperatures, especially in <b>northern India</b>.</p><p>&#183; Influenced by <b>Western Disturbances</b>, bringing <b>rain to northwest India</b>.</p><p><b>Summer or Pre-Monsoon (March  -  May)</b></p><p>&#183; <b>High temperatures</b> (above 40&deg;C in some areas) and <b>dry conditions</b>.</p><p>&#183; Hot winds like <b>'Loo'</b> blow in the northern plains.</p><p><b>Southwest Monsoon or Rainy Season (June  -  September)</b></p><p>&#183; <b>Heavy rainfall</b> due to the <b>southwest monsoon winds</b>.</p><p>&#183; Orographic rainfall occurs along the <b>Western Ghats and northeastern states</b>.</p><p><b>Post-Monsoon or Retreating Monsoon (October  -  December)</b></p><p>&#183; <b>Monsoon winds withdraw</b>, causing <b>clear skies and rising temperatures</b> (October Heat).</p><p>&#183; The <b>Northeast Monsoon</b> brings rain to <b>Tamil Nadu, Andhra Pradesh, and Odisha</b>.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the incorrect with respect to Traditional Indian Seasons followed in north and central India.</p><p>I. In the Indian tradition, a year is divided into six two-monthly seasons.</p><p>II. According to the Indian Calendar, Varsha season are months Asvina-Kartika.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2340;&#2381;&#2340;&#2352; &#2324;&#2352; &#2350;&#2343;&#2381;&#2351; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2330;&#2354;&#2367;&#2340; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2315;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2327;&#2364;&#2354;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2352;&#2306;&#2346;&#2352;&#2366; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2379; &#2331;&#2361; &#2342;&#2381;&#2357;&#2367;-&#2350;&#2366;&#2360;&#2367;&#2325; &#2315;&#2340;&#2369;&#2323;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2325;&#2376;&#2354;&#2375;&#2306;&#2337;&#2352; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2357;&#2352;&#2381;&#2359;&#2366; &#2315;&#2340;&#2369; &#2309;&#2358;&#2381;&#2357;&#2367;&#2344;-&#2325;&#2366;&#2352;&#2381;&#2340;&#2367;&#2325; &#2325;&#2375; &#2350;&#2361;&#2368;&#2344;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Varsha (Rainy season)</b> corresponds to <b>Shravana  -  Bhadrapada (July  -  August)</b>.</p><p>In the Indian tradition, a year is divided into six two-monthly seasons(Ritu system). This cycle of seasons, which the common people in north and central India follow is based on their practical experience and age-old perception of weather phenomena. However, this system does not match with the seasons of south India where there is little variation in the seasons.</p><p><img width=350 height=171 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27523/image001.png\"></p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p><b>Assertion (A)</b>: Most parts of India receive rainfall from June to September. </p><p><b>Reason (R)</b>: During this period, the South-West Monsoon winds bring moisture-laden air from the Indian Ocean to the subcontinent.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2349;&#2366;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306; &#2332;&#2370;&#2344; &#2360;&#2375; &#2360;&#2367;&#2340;&#2306;&#2348;&#2352; &#2340;&#2325; &#2357;&#2352;&#2381;&#2359;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2311;&#2360; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2361;&#2357;&#2366;&#2319;&#2305; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352; &#2360;&#2375; &#2344;&#2350;&#2368; &#2360;&#2375; &#2349;&#2352;&#2368; &#2361;&#2357;&#2366; &#2325;&#2379; &#2313;&#2346;&#2350;&#2361;&#2366;&#2342;&#2381;&#2357;&#2368;&#2346; &#2350;&#2375;&#2306; &#2354;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2340;&#2341;&#2366; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is true but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is false but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Most parts of <b>India receive rainfall between June and September</b>.</p><p>&#183; This period marks the <b>southwest monsoon season</b>, which brings the <b>majority of India's annual rainfall</b>.</p><p>&#183; The <b>Southwest Monsoon winds</b> originate from the <b>Indian Ocean</b> and carry <b>moisture-laden air</b> toward the Indian subcontinent.</p><p>&#183; These winds bring <b>heavy rainfall</b>, especially to regions like <b>the Western Ghats, northeast India, and the Indo-Gangetic plains</b>.</p><p>&#183; This happens due to the <b>intense low-pressure system</b> over <b>northwest India and the ITCZ shift northward</b>.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following winds are described as 'displaced' equatorial easterlies? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2344; &#2361;&#2357;&#2366;&#2323;&#2306; &#2325;&#2379; '&#2357;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340;' &#2349;&#2370;&#2350;&#2343;&#2381;&#2351;&#2352;&#2375;&#2326;&#2368;&#2351; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2361;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2339;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Northeast monsoons.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2352; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344;.</span>",
      "<span class=\"eqt\">Southwest monsoons.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344;.</span>",
      "<span class=\"eqt\">Westerly jet streams.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2332;&#2375;&#2335; &#2343;&#2366;&#2352;&#2366;&#2319;&#2305;.</span>",
      "<span class=\"eqt\">Local winds like 'Loo'.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2361;&#2357;&#2366;&#2319;&#2305; &#2332;&#2376;&#2360;&#2375; '&#2354;&#2370;'&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The <b>Southwest Monsoon winds</b> are often referred to as <b>\"displaced equatorial easterlies\"</b> because they originate from the <b>southeast trade winds</b> of the Southern Hemisphere.</p><p>&#183; Due to the <b>Coriolis effect</b>, these winds <b>cross the equator and get deflected to the right</b>, turning into <b>southwesterly winds</b>.</p><p>&#183; These <b>moisture-laden winds</b> bring <b>heavy rainfall</b> to the Indian subcontinent during the <b>monsoon season (June-September)</b>.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>The Bay of Bengal branch of the monsoon winds is deflected towards the Indian subcontinent by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2368; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2368; &#2326;&#2366;&#2337;&#2364;&#2368; &#2358;&#2366;&#2326;&#2366; &#2325;&#2368; &#2361;&#2357;&#2366;&#2319;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2313;&#2346;&#2350;&#2361;&#2366;&#2342;&#2381;&#2357;&#2368;&#2346; &#2325;&#2368; &#2323;&#2352; &#2325;&#2367;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2369;&#2337;&#2364;&#2340;&#2368; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">The high-pressure system over the Tibetan Plateau.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2367;&#2348;&#2381;&#2348;&#2340;&#2368; &#2346;&#2336;&#2366;&#2352; &#2346;&#2352; &#2313;&#2330;&#2381;&#2330; &#2342;&#2348;&#2366;&#2357; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;&#2404;</span>",
      "<span class=\"eqt\">The Western Ghats.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335;.</span>",
      "<span class=\"eqt\">The Arakan Hills along the coast of Myanmar.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2381;&#2351;&#2366;&#2306;&#2350;&#2366;&#2352; &#2325;&#2375; &#2340;&#2335; &#2346;&#2352; &#2309;&#2352;&#2366;&#2325;&#2366;&#2344; &#2346;&#2361;&#2366;&#2337;&#2364;&#2367;&#2351;&#2366;&#2305;&#2404;</span>",
      "<span class=\"eqt\">The low-pressure trough over North-West India.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2349;&#2366;&#2352;&#2340; &#2346;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344; &#2342;&#2348;&#2366;&#2357; &#2325;&#2368; &#2327;&#2352;&#2381;&#2340; &#2348;&#2344;&#2368; &#2361;&#2369;&#2312; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The Bay of Bengal branch of the southwest monsoon originates from the Indian Ocean and moves northward.</p><p>&#183; <b>As these moisture-laden winds approach the coast of Myanmar, they encounter the Arakan Hills, which run parallel to the coast.</b></p><p>&#183; The Arakan Hills deflect these winds toward the northeast, pushing them toward northeastern India, particularly Assam and Meghalaya.</p><p>&#183; This results in heavy rainfall in places like Mawsynram and Cherrapunji, some of the wettest places on Earth.</p><p>&#183; The remaining monsoon winds continue westward, bringing rainfall to Bihar, Uttar Pradesh, and the Gangetic plains.</p>",
