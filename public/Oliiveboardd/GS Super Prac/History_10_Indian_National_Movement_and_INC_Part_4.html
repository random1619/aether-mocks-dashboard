    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct about the formation of the Indian National Congress? </p><p>I. The Indian National Congress was founded by Allan Octavian Hume in 1885 </p><p>II. The first session of the Indian National Congress was held in Bombay (Mumbai) </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2375; &#2327;&#2336;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p><p>I. &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2319;&#2354;&#2344; &#2321;&#2325;&#2381;&#2335;&#2375;&#2357;&#2367;&#2351;&#2344; &#2361;&#2381;&#2351;&#2370;&#2350; &#2344;&#2375; 1885 &#2350;&#2375;&#2306; &#2325;&#2368; &#2341;&#2368;&#2404;</p><p>II. &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2360;&#2340;&#2381;&#2352; &#2348;&#2377;&#2350;&#2381;&#2348;&#2375; (&#2350;&#2369;&#2306;&#2348;&#2312;) &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Both statements are correct. </p><p>&#183; The Indian National Congress was founded by A.O. Hume, a retired British civil servant, in 1885. </p><p>&#183; The first session was held in Bombay (now Mumbai) from December 28-31, 1885, with 72 delegates in attendance under the presidency of Womesh Chandra Bonnerjee.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The Gandhi-Irwin Pact, signed in 1931, was an agreement between Mahatma Gandhi and the British Government that:</p></span><span class=\"hqt\" style=\"display:none\"><p>1931 &#2350;&#2375;&#2306; &#2361;&#2360;&#2381;&#2340;&#2366;&#2325;&#2381;&#2359;&#2352;&#2367;&#2340; &#2327;&#2366;&#2306;&#2343;&#2368;-&#2311;&#2352;&#2357;&#2367;&#2344; &#2360;&#2350;&#2333;&#2380;&#2340;&#2366; &#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; &#2324;&#2352; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2360;&#2350;&#2333;&#2380;&#2340;&#2366; &#2341;&#2366; &#2332;&#2367;&#2360;&#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;:</p></span>",
    "options": [
      "<span class=\"eqt\">Granted immediate independence to India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2379; &#2340;&#2340;&#2381;&#2325;&#2366;&#2354; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2368; &#2327;&#2312;</span>",
      "<span class=\"eqt\">Ended the Civil Disobedience Movement in exchange for participation in the Round Table Conference</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2354;&#2350;&#2375;&#2332; &#2360;&#2350;&#2381;&#2350;&#2375;&#2354;&#2344; &#2350;&#2375;&#2306; &#2349;&#2366;&#2327; &#2354;&#2375;&#2344;&#2375; &#2325;&#2375; &#2348;&#2342;&#2354;&#2375; &#2360;&#2357;&#2367;&#2344;&#2351; &#2309;&#2357;&#2332;&#2381;&#2334;&#2366; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Created separate electorates for different religious communities</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2344; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2348;&#2344;&#2366;&#2319; &#2327;&#2319;</span>",
      "<span class=\"eqt\">Established provincial autonomy in British India</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2306;&#2340;&#2368;&#2351; &#2360;&#2381;&#2357;&#2366;&#2351;&#2340;&#2381;&#2340;&#2340;&#2366; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Gandhi-Irwin Pact, signed on March 5, 1931, between Mahatma Gandhi and Lord Irwin (Viceroy of India), ended the Civil Disobedience Movement. </p><p>In exchange, the Congress agreed to participate in the Second Round Table Conference in London. The British Government agreed to release political prisoners and Gandhi agreed to suspend the movement. </p><p>This was a significant moment of negotiation between the Congress and the British Government.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct about the Cabinet Mission Plan of 1946? </p><p>I. It was initially accepted by both the Indian National Congress and the Muslim League </p><p>II. It proposed a three-tier federal structure for independent India </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; 1946 &#2325;&#2368; &#2325;&#2376;&#2348;&#2367;&#2344;&#2375;&#2335; &#2350;&#2367;&#2358;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2311;&#2360;&#2375; &#2358;&#2369;&#2352;&#2370; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2324;&#2352; &#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2354;&#2368;&#2327; &#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2375; &#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>II. &#2311;&#2360;&#2344;&#2375; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2354;&#2367;&#2319; &#2340;&#2381;&#2352;&#2367;&#2360;&#2381;&#2340;&#2352;&#2368;&#2351; &#2360;&#2306;&#2328;&#2368;&#2351; &#2338;&#2366;&#2306;&#2330;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2352;&#2326;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Cabinet Mission Plan of 1946 was initially accepted by both the Congress and the Muslim League, though disagreements over interpretation later emerged. </p><p>The plan proposed a three-tier federal structure for independent India: a weak central government handling only foreign affairs, defense, and communications; provincial groupings (potentially based on Hindu/Muslim majority areas); and strong provinces with significant autonomy. </p><p>It was a last attempt by the British to keep India united before the decision for partition.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Following Congress Sessions with Their Presidents:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Session</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>President</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Lucknow Session(1916)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) Jawaharlal Nehru</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Allahabad Session(1928)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) Bal Gangadhar Tilak</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Bombay Session(1939)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) Motilal Nehru</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) Ramgarh Session(1936)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) Subhas Chandra Bose</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) &#2354;&#2326;&#2344;&#2314; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344; (1916)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) &#2332;&#2357;&#2366;&#2361;&#2352;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344;(1928)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) &#2348;&#2366;&#2354; &#2327;&#2306;&#2327;&#2366;&#2343;&#2352; &#2340;&#2367;&#2354;&#2325;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2348;&#2350;&#2381;&#2348;&#2312; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344;(1939)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) &#2350;&#2379;&#2340;&#2368;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) &#2352;&#2366;&#2350;&#2327;&#2338;&#2364; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344;(1936)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) &#2360;&#2369;&#2349;&#2366;&#2359; &#2330;&#2306;&#2342;&#2381;&#2352; &#2348;&#2379;&#2360;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i  -  a, ii  -  b, iii  -  c, iv  -  d</span><span class=\"hqt\" style=\"display:none\">i  -  a, ii  -  b, iii  -  c, iv  -  d</span>",
      "<span class=\"eqt\">i  -  b, ii  -  c, iii  -  d, iv  -  a</span><span class=\"hqt\" style=\"display:none\">i  -  b, ii  -  c, iii  -  d, iv  -  a</span>",
      "<span class=\"eqt\">i  -  c, ii  -  d, iii  -  a, iv  -  b</span><span class=\"hqt\" style=\"display:none\">i  -  c, ii  -  d, iii  -  a, iv  -  b</span>",
      "<span class=\"eqt\">i  -  d, ii  -  c, iii  -  b, iv  -  a</span><span class=\"hqt\" style=\"display:none\">i  -  d, ii  -  c, iii  -  b, iv  -  a</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Lucknow Session (1916)</b>: Presided by <b>Bal Gangadhar Tilak</b>, notable for the <b>Lucknow Pact</b> (Congress-League unity).</p><p>&#183; <b>Allahabad Session (1928)</b>: Led by <b>Motilal Nehru</b>, which adopted the <b>Nehru Report</b> demanding Dominion Status.</p><p>&#183; <b>Bombay Session (1939)</b>: <b>Subhas Chandra Bose</b> was re-elected President but resigned due to differences with Gandhi.</p><p>&#183; <b>Ramgarh Session (1936)</b>: <b>Jawaharlal Nehru</b> emphasized socialist policies and anti-fascist struggles.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Who was the last Congress President before independence?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2309;&#2306;&#2340;&#2367;&#2350; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2380;&#2344; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Jawaharlal Nehru</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2357;&#2366;&#2361;&#2352;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</span>",
      "<span class=\"eqt\">Mahatma Gandhi</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368;</span>",
      "<span class=\"eqt\">Abul Kalam Azad</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2348;&#2369;&#2354; &#2325;&#2354;&#2366;&#2350; &#2310;&#2332;&#2364;&#2366;&#2342;</span>",
      "<span class=\"eqt\">J.B. Kripalani</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2375;.&#2348;&#2368;.&#2325;&#2371;&#2346;&#2354;&#2366;&#2344;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; Acharya J.B. Kripalani served as the President of the Indian National Congress during the crucial period from 1946 to 1947, just before India gained its independence on August 15, 1947. </p><p>&#183; He presided over the Congress during the final negotiations for independence and the partition of India.</p><p>&#183; While Jawaharlal Nehru became India's first Prime Minister, Maulana Abul Kalam Azad had served as Congress President earlier (1940-1946), and Mahatma Gandhi, though the spiritual leader of the movement, had formally served as Congress President only once in 1924. </p><p>&#183; Mahatma Gandhi served as the President of the Indian National Congress only once, at the 1924 Belgaum (now Belagavi) session.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct? </p><p>I. The Extremists in the Indian National Congress advocated for self-government (Swaraj) as an immediate goal </p><p>II. The Moderates believed in constitutional methods and petitioning the British government </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2350;&#2375;&#2306; &#2327;&#2352;&#2350; &#2342;&#2354; &#2325;&#2375; &#2354;&#2379;&#2327; &#2340;&#2340;&#2381;&#2325;&#2366;&#2354; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2358;&#2366;&#2360;&#2344; (&#2360;&#2381;&#2357;&#2352;&#2366;&#2332;) &#2325;&#2368; &#2357;&#2325;&#2366;&#2354;&#2340; &#2325;&#2352;&#2340;&#2375; &#2341;&#2375;&#2404;</p><p>II. &#2344;&#2352;&#2350; &#2342;&#2354; &#2325;&#2375; &#2354;&#2379;&#2327; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2340;&#2352;&#2368;&#2325;&#2379;&#2306; &#2324;&#2352; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2352;&#2325;&#2366;&#2352; &#2360;&#2375; &#2351;&#2366;&#2330;&#2367;&#2325;&#2366; &#2342;&#2366;&#2351;&#2352; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2357;&#2367;&#2358;&#2381;&#2357;&#2366;&#2360; &#2325;&#2352;&#2340;&#2375; &#2341;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Both statements are correct. </p><p>The Extremists, led by Bal Gangadhar Tilak, Lala Lajpat Rai, and Bipin Chandra Pal, demanded complete self-rule (Swaraj) as an immediate goal. </p><p>The Moderates, led by Dadabhai Naoroji, Gopal Krishna Gokhale, and others, believed in achieving reforms through constitutional means, petitioning the British government, and using peaceful persuasion.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which Congress leader was a key proponent of the Swadeshi Movement?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2344;&#2375;&#2340;&#2366; &#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;&#2325; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Jawaharlal Nehru</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2357;&#2366;&#2361;&#2352;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</span>",
      "<span class=\"eqt\">Subhas Chandra Bose</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2349;&#2366;&#2359; &#2330;&#2306;&#2342;&#2381;&#2352; &#2348;&#2379;&#2360;</span>",
      "<span class=\"eqt\">Bal Gangadhar Tilak</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2354; &#2327;&#2306;&#2327;&#2366;&#2343;&#2352; &#2340;&#2367;&#2354;&#2325;</span>",
      "<span class=\"eqt\">Sardar Vallabhbhai Patel</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2342;&#2366;&#2352; &#2357;&#2354;&#2381;&#2354;&#2349;&#2349;&#2366;&#2312; &#2346;&#2335;&#2375;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Bal Gangadhar Tilak</b> popularized Swadeshi (1905-1908) with the slogan <i>\"Swaraj is my birthright!\"</i></p><p>&#183; Bal Gangadhar Tilak, often referred to as \"Lokmanya\" Tilak, was one of the foremost leaders who championed the Swadeshi Movement, particularly after the partition of Bengal in 1905. The movement encouraged boycotting British goods and promoting Indian-made products.</p><p>&#183; Tilak, along with other nationalist leaders like Bipin Chandra Pal and Lala Lajpat Rai (collectively known as \"Lal-Bal-Pal\"), advocated for more radical approaches to achieving independence, including swadeshi (self-sufficiency), boycott of foreign goods, and national education. His slogan \"Swaraj is my birthright and I shall have it\" became famous during this period.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The Home Rule Movement was initiated by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2379;&#2350; &#2352;&#2370;&#2354; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2368; &#2341;&#2368;:</p></span>",

      "<span class=\"eqt\">Bal Gangadhar Tilak</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2354; &#2327;&#2306;&#2327;&#2366;&#2343;&#2352; &#2340;&#2367;&#2354;&#2325;</span>",
      "<span class=\"eqt\">Annie Besant</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2368; &#2348;&#2375;&#2360;&#2375;&#2306;&#2335;</span>",

    ],
    "correct_option_id": 3,
    "solution": "<p>The <b>Home Rule Movement</b> in India was launched in <b>1916</b> by:</p><p>&#183; <b>Bal Gangadhar Tilak</b> in <b>Maharashtra and Karnataka</b></p><p>&#183; <b>Annie Besant</b> in <b>Madras, Bombay, and other parts of India</b></p><p>They both aimed to achieve <b>self-government (Home Rule)</b> within the British Empire, similar to what was granted to dominions like Australia and Canada.</p>",

  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct about the Purna Swaraj (Complete Independence) Resolution? </p><p>I. It was adopted by the Indian National Congress at its Lahore session </p><p>II. It was adopted in the year 1929 </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2381;&#2357;&#2352;&#2366;&#2332; (&#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366;) &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p><p>I. &#2311;&#2360;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2354;&#2366;&#2361;&#2380;&#2352; &#2360;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2366;&#2351;&#2366; &#2341;&#2366;</p><p>II. &#2311;&#2360;&#2375; &#2357;&#2352;&#2381;&#2359; 1929 &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Both statements are correct. The Purna Swaraj (Complete Independence) Resolution was adopted by the Indian National Congress at its historic Lahore Session on December 31, 1929, under the presidency of Jawaharlal Nehru. </p><p>This marked a significant shift in the Congress's position from demanding dominion status to complete independence from British rule.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Who was the first Indian woman to become President of the Indian National Congress? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2368; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2348;&#2344;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2361;&#2354;&#2368; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2361;&#2367;&#2354;&#2366; &#2325;&#2380;&#2344; &#2341;&#2368;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sarojini Naidu</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2379;&#2332;&#2367;&#2344;&#2368; &#2344;&#2366;&#2351;&#2337;&#2370;</span>",
      "<span class=\"eqt\">Vijaya Lakshmi Pandit</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2332;&#2351;&#2366; &#2354;&#2325;&#2381;&#2359;&#2381;&#2350;&#2368; &#2346;&#2306;&#2337;&#2367;&#2340;</span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>Annie Besant was the first woman to become President of the Indian National Congress in 1917. She was an Irish-British theosophist, women's rights activist, and supporter of Indian self-rule who played a significant role in India's freedom movement.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Mahatma Gandhi became the sole leader of the Congress after which event? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2328;&#2335;&#2344;&#2366; &#2325;&#2375; &#2348;&#2366;&#2342; &#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2375; &#2319;&#2325;&#2350;&#2366;&#2340;&#2381;&#2352; &#2344;&#2375;&#2340;&#2366; &#2348;&#2344; &#2327;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">Nagpur Session (1920)</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2327;&#2346;&#2369;&#2352; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344; (1920)</span>",
      "<span class=\"eqt\">Champaran Satyagraha</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2306;&#2346;&#2366;&#2352;&#2339; &#2360;&#2340;&#2381;&#2351;&#2366;&#2327;&#2381;&#2352;&#2361;</span>",
      "<span class=\"eqt\">Quit India Movement</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2331;&#2379;&#2337;&#2364;&#2379; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Civil Disobedience Movement</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2357;&#2367;&#2344;&#2351; &#2309;&#2357;&#2332;&#2381;&#2334;&#2366; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Gandhi emerged as the sole leader of the Congress after the Nagpur Session of 1920, when the Congress adopted his non-cooperation movement as its official policy and restructured the organization according to his vision.</p><p>Prior to this movement, Gandhi had been gaining influence within the Congress since his return from South Africa in 1915, but it was the successful mobilization of the masses during the Non-Cooperation Movement that solidified his leadership position. The movement involved boycotting British institutions, returning British honors, and embracing swadeshi (domestic products).</p>",
    "question_index": 10
  },
  {

    "options": [

      "<span class=\"eqt\">Abul Kalam Azad</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2348;&#2369;&#2354; &#2325;&#2354;&#2366;&#2350; &#2310;&#2332;&#2364;&#2366;&#2342;</span>",
      "<span class=\"eqt\">J.B. Kripalani</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2375;.&#2348;&#2368;.&#2325;&#2371;&#2346;&#2354;&#2366;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Vallabhbhai Patel</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2354;&#2381;&#2354;&#2349;&#2349;&#2366;&#2312; &#2346;&#2335;&#2375;&#2354;</span>"

    "correct_option_id": 2,
    "solution": "<p>Maulana Abul Kalam Azad was the President of the Indian National Congress during the Quit India Movement in 1942. </p><p>He held the position from 1940 to 1946, which was the longest continuous term for any Congress president.</p>",
    "question_index": 11
  },

    "question": "<span class=\"eqt\"><p>The Surat Split of 1907 is significant because it:</p></span><span class=\"hqt\" style=\"display:none\"><p>1907 &#2325;&#2366; &#2360;&#2370;&#2352;&#2340; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2311;&#2360;&#2354;&#2367;&#2319; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367;:</p></span>",
    "options": [
      "<span class=\"eqt\">Marked the merger of Moderates and Extremists under Gandhi's leadership</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2306;&#2343;&#2368;&#2332;&#2368; &#2325;&#2375; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2350;&#2375;&#2306; &#2313;&#2342;&#2366;&#2352;&#2357;&#2366;&#2342;&#2368; &#2324;&#2352; &#2327;&#2352;&#2350;&#2346;&#2306;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2357;&#2367;&#2354;&#2351; &#2361;&#2369;&#2310;</span>",
      "<span class=\"eqt\">Led to the expulsion of Extremists after a clash over presidential nomination</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2346;&#2342; &#2325;&#2375; &#2344;&#2366;&#2350;&#2366;&#2306;&#2325;&#2344; &#2325;&#2379; &#2354;&#2375;&#2325;&#2352; &#2361;&#2369;&#2319; &#2360;&#2306;&#2328;&#2352;&#2381;&#2359; &#2325;&#2375; &#2348;&#2366;&#2342; &#2330;&#2352;&#2350;&#2346;&#2306;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2366;&#2360;&#2367;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Resulted in the British government banning the Congress</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2352;&#2325;&#2366;&#2352; &#2344;&#2375; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2306;&#2343; &#2354;&#2327;&#2366; &#2342;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Established the demand for Purna Swaraj as Congress's goal</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2381;&#2357;&#2352;&#2366;&#2332; &#2325;&#2368; &#2350;&#2366;&#2306;&#2327; &#2325;&#2379; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2366; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2348;&#2344;&#2366;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The <b>Surat Split (1907)</b> occurred when <b>Moderates rejected Bal Gangadhar Tilak's nomination</b> for Congress president, favoring <b>Dr. Rash Behari Ghose</b>. This led to:</p><p>o <b>Expulsion of Extremists</b> (Tilak, Lajpat Rai, Bipin Chandra Pal) from the Congress.</p><p>o <b>Reunification only in 1916</b> via the Lucknow Pact.</p>",

  },

    "question": "<span class=\"eqt\"><p>Who represented the Congress in the Partition discussions?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2330;&#2352;&#2381;&#2330;&#2366; &#2350;&#2375;&#2306; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mahatma Gandhi</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368;</span>",
      "<span class=\"eqt\">Jawaharlal Nehru</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2357;&#2366;&#2361;&#2352;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</span>",
      "<span class=\"eqt\">Vallabhbhai Patel</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2354;&#2381;&#2354;&#2349;&#2349;&#2366;&#2312; &#2346;&#2335;&#2375;&#2354;</span>",

    ],
    "correct_option_id": 3,
    "solution": "<p>All three leaders - Mahatma Gandhi, Jawaharlal Nehru, and Vallabhbhai Patel - represented the Congress in the Partition discussions. </p><p>They were the key figures from the Congress side who participated in the negotiations with the British government and the Muslim League regarding the partition of India.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which Congress leader was the Chairman of the Drafting Committee for the Indian Constitution? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2352;&#2370;&#2346; &#2360;&#2350;&#2367;&#2340;&#2367; &#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2344;&#2375;&#2340;&#2366; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Jawaharlal Nehru</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2357;&#2366;&#2361;&#2352;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</span>",
      "<span class=\"eqt\">B.R. Ambedkar</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;.&#2310;&#2352;. &#2309;&#2350;&#2381;&#2348;&#2375;&#2337;&#2325;&#2352;</span>",
      "<span class=\"eqt\">Sardar Vallabhbhai Patel</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2342;&#2366;&#2352; &#2357;&#2354;&#2381;&#2354;&#2349;&#2349;&#2366;&#2312; &#2346;&#2335;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Rajendra Prasad</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2360;&#2366;&#2342;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Dr. B.R. Ambedkar was the Chairman of the Drafting Committee for the Indian Constitution.</p><p>While he was not a member of the Congress party at that time (he was a member of the Scheduled Castes Federation), he was appointed to this crucial position due to his legal expertise and vision. </p><p>He later joined the Congress government as Law Minister.</p>",
    "question_index": 14
  },

    "question": "<span class=\"eqt\"><p>Which of the following movements was launched by the Indian National Congress in 1942? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; 1942 &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Non-Cooperation Movement</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2361;&#2351;&#2379;&#2327; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Civil Disobedience Movement</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2357;&#2367;&#2344;&#2351; &#2309;&#2357;&#2332;&#2381;&#2334;&#2366; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Swadeshi Movement</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Quit India Movement</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2331;&#2379;&#2337;&#2364;&#2379; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Quit India Movement was launched by the Indian National Congress under the leadership of Mahatma Gandhi in August 1942. </p><p>It was also known as the 'August Kranti' (August Revolution) and was initiated with Gandhi's call for immediate independence of India with the famous slogan \"Do or Die.\" </p><p>This was the final major movement in India's freedom struggle before independence in 1947.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>The first Prime Minister of Independent India from Congress was: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2381;&#2352;&#2341;&#2350; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360;&#2368; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2341;&#2375;: </p></span>",
    "options": [
      "<span class=\"eqt\">Sardar Vallabhbhai Patel</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2342;&#2366;&#2352; &#2357;&#2354;&#2381;&#2354;&#2349;&#2349;&#2366;&#2312; &#2346;&#2335;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Jawaharlal Nehru</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2357;&#2366;&#2361;&#2352;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</span>",
      "<span class=\"eqt\">Rajendra Prasad</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2360;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Abul Kalam Azad</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2348;&#2369;&#2354; &#2325;&#2354;&#2366;&#2350; &#2310;&#2332;&#2364;&#2366;&#2342;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Jawaharlal Nehru became the first Prime Minister of independent India on August 15, 1947. </p><p>He was chosen for this position by the Congress party leadership and served as Prime Minister until his death in 1964, winning three consecutive general elections.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following pairs of Indian National Congress sessions and their significance is INCORRECTLY matched? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2375; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344;&#2379;&#2306; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2327;&#2354;&#2340; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lahore Session (1929) - Adoption of Complete Independence (Purna Swaraj) Resolution</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2361;&#2380;&#2352; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344; (1929) - &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2381;&#2357;&#2352;&#2366;&#2332; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2325;&#2379; &#2309;&#2346;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Calcutta Session (1906) - First endorsement of the Swadeshi Movement</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2354;&#2325;&#2340;&#2381;&#2340;&#2366; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344; (1906) - &#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344;</span>",
      "<span class=\"eqt\">Karachi Session (1931) - Passage of the Fundamental Rights Resolution</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2366;&#2330;&#2368; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344; (1931) - &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2346;&#2366;&#2352;&#2367;&#2340; &#2361;&#2379;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Bombay Session (1934) - Launch of the Quit India Movement</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2350;&#2381;&#2348;&#2312; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344; (1934) - &#2349;&#2366;&#2352;&#2340; &#2331;&#2379;&#2337;&#2364;&#2379; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2366; &#2358;&#2369;&#2349;&#2366;&#2352;&#2306;&#2349;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The Bombay Session of 1934 is incorrectly paired with the launch of the Quit India Movement. </p><p>&#183; The Quit India Movement was actually launched at the Bombay Session held in August 1942, not in 1934. </p><p>&#183; The 1934 Bombay Session was significant for being the first session after Gandhi's withdrawal from active politics following the suspension of the Civil Disobedience Movement, and it focused on reorganization of the Congress and participation in the upcoming legislative elections under the Government of India Act, 1935.</p><p>Further information:</p><p><b>Important Indian National Congress sessions</b>, their presidents, and historical significance:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Year</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Session</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>President</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Significance</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1885</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bombay (First Session)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">W.C. Bonnerjee</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Foundation of INC; Moderate demands for reforms under British rule.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1905</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Benares</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Gopal Krishna Gokhale</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Condemned Bengal Partition; Swadeshi Movement gained momentum.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1906</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Calcutta</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Dadabhai Naoroji</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Adopted <b>\"Swaraj\"</b> (self-governance) as a goal for the first time.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1907</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Surat</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rash Behari Ghose</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Surat Split</b>: Extremists (Tilak) expelled; Moderates took control.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1916</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lucknow</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ambika Charan Mazumdar</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Lucknow Pact</b>: Congress-League unity; Extremists readmitted.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1917</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Calcutta</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Annie Besant</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">First woman president; demanded self-rule (Home Rule Movement).</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1920</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Nagpur</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Vijayaraghavachariar</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Approved <b>Non-Cooperation Movement</b> (Gandhi's leadership).</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1922</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Gaya</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C.R. Das</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Formation of <b>Swaraj Party</b> after Non-Cooperation suspension.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1929</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lahore</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Jawaharlal Nehru</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Purna Swaraj</b> (Complete Independence) declared; Civil Disobedience decided.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1931</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Karachi</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vallabhbhai Patel</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Endorsed <b>Gandhi-Irwin Pact</b>; Fundamental Rights resolution passed.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1938</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Haripura</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Subhas Chandra Bose</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Emphasized industrialization and socialist planning.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1939</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tripuri</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Subhas Chandra Bose</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bose re-elected but resigned due to Gandhi's opposition.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1947</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Delhi</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">J.B. Kripalani</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Last session before Independence; focused on partition challenges.</td></tr></table>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Who succeeded Jawaharlal Nehru as officially elected Prime Minister? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2357;&#2366;&#2361;&#2352;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370; &#2325;&#2375; &#2348;&#2366;&#2342; &#2310;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2380;&#2344; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2367;&#2340; &#2361;&#2369;&#2310;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lal Bahadur Shastri</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2354; &#2348;&#2361;&#2366;&#2342;&#2369;&#2352; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Indira Gandhi</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2342;&#2367;&#2352;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368;</span>",
      "<span class=\"eqt\">Morarji Desai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2352;&#2366;&#2352;&#2332;&#2368; &#2342;&#2375;&#2360;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Gulzarilal Nanda</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2354;&#2332;&#2366;&#2352;&#2368;&#2354;&#2366;&#2354; &#2344;&#2306;&#2342;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Lal Bahadur Shastri succeeded Jawaharlal Nehru as the Prime Minister of India following Nehru's death in 1964. </p><p>While Gulzarilal Nanda served as interim Prime Minister for 13 days after Nehru's death, Shastri was officially selected as the next Prime Minister and served until his untimely death in January 1966.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>The Congress party split into Congress (Organization) and Congress (Requisition) in: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2346;&#2366;&#2352;&#2381;&#2335;&#2368; &#2325;&#2366; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; (&#2360;&#2306;&#2327;&#2336;&#2344;) &#2324;&#2352; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; (&#2309;&#2343;&#2367;&#2327;&#2381;&#2352;&#2361;&#2339;) &#2350;&#2375;&#2306; &#2361;&#2369;&#2310;: </p></span>",

    "correct_option_id": 1,
    "solution": "<p>&#183; The Congress party split in 1969 into Congress (O) or Congress (Organisation) led by Morarji Desai and the Congress (R) or Congress (Requisition), later called Congress (I) led by Indira Gandhi. </p><p>&#183; This split occurred due to ideological differences and power struggles within the party, particularly over the selection of the presidential candidate.</p>",
