<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following objectives of the First Five-Year Plan (1951-1956) was largely achieved by the end of the plan?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2341;&#2350; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; (1951-1956) &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2309;&#2306;&#2340; &#2340;&#2325; &#2325;&#2366;&#2347;&#2368; &#2361;&#2342; &#2340;&#2325; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2352; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Industrial growth</span><span class=\"hqt\" style=\"display:none\">&#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Food self-sufficiency</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2366;&#2342;&#2381;&#2351;&#2366;&#2344;&#2381;&#2344; &#2310;&#2340;&#2381;&#2350;&#2344;&#2367;&#2352;&#2381;&#2349;&#2352;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Establishment of heavy industries</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2368; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Expansion of foreign trade</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The <b>First Five-Year Plan focused primarily on agriculture, price stability, power, and transport.</b></p><p>&bull; One of its <b>significant achievements was food self-sufficiency, largely due to good harvests in the last two years.</b></p><p><b>Further Insight:</b></p><p>&bull; First Five-Year Plan (1951-1956)</p><p>&#9675; Architect: K.N. Raj</p><p>&#9675; Target Growth: 2.1%</p><p>&#9675; Actual Growth: 3.6%</p><p>&#9675; Key Focus: Agriculture, price stability, power, transport</p><p>&#9675; Model Used: Harrod-Domar Model</p><p>&#9675; Key Events</p><p>&#9632; Influx of refugees</p><p>&#9632; Severe food shortages and inflation</p><p>&#9632; Success due to good harvests in the last two years</p><p>&#9632; Rehabilitation of refugees, food self-sufficiency, and price control achieved</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The Second Five-Year Plan (1956-1961), which emphasized rapid industrialization, is also known as the:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; (1956-1961), &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2340;&#2368;&#2357;&#2381;&#2352; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2368;&#2325;&#2352;&#2339; &#2346;&#2352; &#2332;&#2379;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;, &#2325;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2344;&#2366;&#2350;&#2379;&#2306; &#2360;&#2375; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Nehru Plan</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2361;&#2352;&#2370; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Mahalanobis Plan</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2354;&#2344;&#2379;&#2348;&#2367;&#2360; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Gandhi Plan</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2306;&#2343;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Ambedkar Plan</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2381;&#2348;&#2375;&#2337;&#2325;&#2352; &#2351;&#2379;&#2332;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Second Five-Year Plan was based on the model developed by Prof. P.C. Mahalanobis and is therefore referred to as the Mahalanobis Plan. </b></p><p>&bull; It focused on rapid industrialization, particularly the development of heavy and basic industries. </p><p><b>Further Insight:</b></p><p>&bull; Second Five-Year Plan (1956-1961)</p><p>&bull; Architect: P.C. Mahalanobis</p><p>&bull; Target Growth: 4.5%</p><p>&bull; Actual Growth: 4.3%</p><p>&bull; Key Focus: Rapid industrialization, heavy and basic industries</p><p>&bull; Model Used: Harrod-Domar Model, Mahalanobis' two &amp; four-sector model</p><p>&bull; Key Events:</p><p>&#9675; Industrial Policy of 1956 advocating a socialistic pattern of society</p><p>&#9675; Acute shortage of foreign exchange</p><p>&#9675; Price rise of around 30%</p><p>&#9675; Moderate success despite foreign loan dependency</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following unforeseen events was a major reason for the failure of the Third Five-Year Plan (1961-1966)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2366;&#2358;&#2367;&#2340; &#2328;&#2335;&#2344;&#2366; &#2340;&#2368;&#2360;&#2352;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; (1961-1966) &#2325;&#2368; &#2357;&#2367;&#2347;&#2354;&#2340;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2325;&#2366;&#2352;&#2339; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Indo-Pak War of 1965</span><span class=\"hqt\" style=\"display:none\">1965 &#2325;&#2366; &#2349;&#2366;&#2352;&#2340;-&#2346;&#2366;&#2325; &#2351;&#2369;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">Devaluation of the rupee</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;&#2346;&#2319; &#2325;&#2366; &#2309;&#2357;&#2350;&#2370;&#2354;&#2381;&#2351;&#2344;</span>",
      "<span class=\"eqt\">High global oil prices</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2357;&#2376;&#2358;&#2381;&#2357;&#2367;&#2325; &#2340;&#2375;&#2354; &#2325;&#2368;&#2350;&#2340;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Excessive monsoon rains</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2357;&#2352;&#2381;&#2359;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>The Third Five-Year Plan was severely impacted by unforeseen events such as the Indo-Pak war in 1965, Chinese aggression in 1962, and a severe drought in 1965-66. </b></p><p>&bull; These events shifted the focus from development to defense, leading to the plan's failure.</p><p><b>Further Insight:</b></p><p>&bull; <b>Third Five-Year Plan (1961-1966)</b></p><p>&bull; <b>Known as \"Gadgil Yojana\"</b></p><p>&bull; <b>Target Growth</b>: 5.6%</p><p>&bull; <b>Actual Growth</b>: 2.8%</p><p>&bull; <b>Key Focus</b>: Agriculture as top priority to support exports and industry</p><p>&bull; <b>Key Events</b>:</p><p>&#9675; Chinese aggression (1962)</p><p>&#9675; Indo-Pak war (1965)</p><p>&#9675; Severe drought (1965-66)</p><p>&#9675; Shift from development to defense due to conflicts</p><p>&bull; Plan largely failed due to external factors</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The slogan \"Garibi Hatao\" (Remove Poverty) was associated with which Five-Year Plan?</p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2327;&#2352;&#2368;&#2348;&#2368; &#2361;&#2335;&#2366;&#2323;\" &#2325;&#2366; &#2344;&#2366;&#2352;&#2366; &#2325;&#2367;&#2360; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Third Plan</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2360;&#2352;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Fourth Plan</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2380;&#2341;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Fifth Plan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2306;&#2330;&#2357;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Sixth Plan</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2336;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>The Fifth Five-Year Plan (1974-1979) aimed at the removal of poverty (Garibi Hatao) and achieving self-reliance. </b></p><p>&bull; <b>This slogan was popularized by Prime Minister Indira Gandhi during this period</b>. </p><p><b>Further Insight:</b></p><p>&bull; Fifth Five-Year Plan (1974-1979)</p><p>&#9675; Architect: D.P. Dhar (initially)</p><p>&#9675; Target Growth: 4.4%</p><p>&#9675; Actual Growth: 4.8%</p><p>&#9675; Key Focus: Poverty removal (Garibi Hatao) and self-reliance</p><p>&#9675; Key Events:</p><p>&#9632; Global oil price shock and inflation</p><p>&#9632; Prime Minister's 20-point program after the Emergency (1975)</p><p>&#9632; Plan terminated early by the Janata Party government in 1978</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following factors contributed to the introduction of Three Annual Plans instead of a Five-Year Plan between 1966-1969?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2325;&#2366;&#2352;&#2325; &#2344;&#2375; 1966-1969 &#2325;&#2375; &#2348;&#2368;&#2330; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2340;&#2368;&#2344; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2325;&#2368; &#2358;&#2369;&#2352;&#2370;&#2310;&#2340; &#2350;&#2375;&#2306; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2342;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Devaluation of the rupee</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;&#2346;&#2319; &#2325;&#2366; &#2309;&#2357;&#2350;&#2370;&#2354;&#2381;&#2351;&#2344;</span>",
      "<span class=\"eqt\">Political instability</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2309;&#2360;&#2381;&#2341;&#2367;&#2352;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Lack of agricultural output</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;</span>",
      "<span class=\"eqt\">War with Pakistan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2325;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; &#2351;&#2369;&#2342;&#2381;&#2343;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>The failure of the Third Five-Year Plan and the devaluation of the rupee led to a postponement of the Fourth Five-Year Plan. </b></p><p>&bull; As a result, three annual plans were implemented to stabilize the economy and focus on agriculture during a time of food shortages. </p><p>&bull; Political instability and war with Pakistan were contributory factors, but the direct cause for the annual plans was the rupee devaluation and economic recession.</p><p><b>Further Insight: </b></p><p>&bull; Plan Holiday (1966-1969)</p><p>&#9675; Description: Three Annual Plans were introduced after the failure of the Third Plan</p><p>&#9675; Key Events:</p><p>&#9632; Rupee devaluation to boost exports</p><p>&#9632; Food shortages and inflation</p><p>&#9632; Focus on agriculture through high-yielding seeds, fertilizers, and irrigation</p><p>&#9632; Economic stabilization in preparation for future plans</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The twin objectives of the Fourth Five-Year Plan were:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2380;&#2341;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2342;&#2379; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2341;&#2375;:</p></span>",
    "options": [
      "<span class=\"eqt\">Rapid industrialization and employment generation</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2357;&#2381;&#2352; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368;&#2325;&#2352;&#2339; &#2324;&#2352; &#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2360;&#2371;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Growth with stability and progressive achievement of self-reliance</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352;&#2340;&#2366; &#2325;&#2375; &#2360;&#2366;&#2341; &#2357;&#2367;&#2325;&#2366;&#2360; &#2324;&#2352; &#2310;&#2340;&#2381;&#2350;&#2344;&#2367;&#2352;&#2381;&#2349;&#2352;&#2340;&#2366; &#2325;&#2368; &#2346;&#2381;&#2352;&#2327;&#2340;&#2367;&#2358;&#2368;&#2354; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Reduction in poverty and family planning</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2352;&#2368;&#2348;&#2368; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368; &#2324;&#2352; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2344;&#2367;&#2351;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Agricultural productivity and population control</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366; &#2324;&#2352; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Fourth Five-Year Plan (1969-1974) had the twin objectives of achieving growth with stability and the progressive achievement of self-reliance, especially after the Indo-Pak war and economic sanctions.</p><p><b>Further Insight:</b></p><p>&bull; Fourth Five-Year Plan (1969-1974)</p><p>&#9675; Ashok Rudra and Alon S. Manney Plan</p><p>&#9675; Target Growth: 5.7%</p><p>&#9675; Actual Growth: 3.3%</p><p>&#9675; Key Focus: Agricultural growth, self-reliance, family planning</p><p>&#9675; Key Events:</p><p>&#9632; Indo-Pak war (1971)</p><p>&#9632; Influx of Bangladeshi refugees</p><p>&#9632; Poor monsoon in the last three years</p><p>&#9632; Price situation deteriorated, making the plan a failure</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The Seventh Five-Year Plan aimed at achieving growth through which of the following strategies?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2340;&#2357;&#2368;&#2306; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2352;&#2339;&#2344;&#2368;&#2340;&#2367; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2357;&#2367;&#2325;&#2366;&#2360; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2352;&#2344;&#2366; &#2341;&#2366;?</p></span>",
    "options": [

      "<span class=\"eqt\">Food production, employment opportunities, and productivity</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2366;&#2342;&#2381;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344;, &#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2325;&#2375; &#2309;&#2357;&#2360;&#2352; &#2324;&#2352; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Nationalization of industries and banking sector reform</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2325;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351;&#2325;&#2352;&#2339; &#2324;&#2352; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352;</span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The <b>Seventh Five-Year Plan aimed to accelerate food grain production, increase employment opportunities, and raise productivity, with a focus on 'food, work, and productivity'. </b></p><p><b>Further Insight:</b></p><p>&bull; <b>Seventh Five-Year Plan (1985-1990)</b></p><p>&bull; <b>Target Growth</b>: 5.0%</p><p>&bull; <b>Actual Growth</b>: 6.0%</p><p>&bull; <b>Key Focus</b>: Food grain production, employment, productivity (\"Food, Work, Productivity\")</p><p>&bull; <b>Key Events</b>:</p><p>&#9675; India started recovering from the \"Hindu Rate of Growth\" with 6% growth</p><p>&bull; Plan was considered very successful</p><p>&bull; The <b>\"Hindu rate of growth\"</b> is a term that refers to India's slow economic growth rate from the 1950s to the 1980s. </p><p>&#9675; The term was coined by Indian economist Raj Krishna in 1978</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What was the primary reason for the postponement of the Eighth Five-Year Plan from 1990 to 1992?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2336;&#2357;&#2368;&#2306; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2379; 1990 &#2360;&#2375; 1992 &#2340;&#2325; &#2360;&#2381;&#2341;&#2327;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2325;&#2366;&#2352;&#2339; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [

    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Eighth Five-Year Plan was delayed due to political uncertainty and instability at the center following the collapse of governments in the early 1990s.</b></p><p>&bull; Although economic issues were significant during the period, political instability was the primary reason for the delay.</p><p><b>Further Insight:</b></p><p>&bull; Eighth Five-Year Plan (1992-1997)</p><p>&#9675; Target Growth: 5.6%</p><p>&#9675; Actual Growth: 6.8%</p><p>&#9675; Key Focus: Economic reforms, liberalization, industrial growth</p><p>&#9675; Key Events:</p><p>&#9632; Political instability delayed the plan by two years</p><p>&#9632; Liberalization reforms introduced</p><p>&#9632; High growth in agriculture, manufacturing, and exports</p><p>&#9632; Decline in public sector investments</p>",
    "question_index": 7

  {
    "question": "<span class=\"eqt\"><p>The Ninth Five-Year Plan focused primarily on:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2380;&#2357;&#2368;&#2306; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2341;&#2368;:</p></span>",
    "options": [
      "<span class=\"eqt\">Rapid industrialization and economic liberalization</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2357;&#2381;&#2352; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2368;&#2325;&#2352;&#2339; &#2324;&#2352; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2313;&#2342;&#2366;&#2352;&#2368;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Growth with social justice and equality</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2344;&#2381;&#2351;&#2366;&#2351; &#2324;&#2352; &#2360;&#2350;&#2366;&#2344;&#2340;&#2366; &#2325;&#2375; &#2360;&#2366;&#2341; &#2357;&#2367;&#2325;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Privatization and foreign investment</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2332;&#2368;&#2325;&#2352;&#2339; &#2324;&#2352; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2344;&#2367;&#2357;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Technology-led growth and infrastructure development</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2357;&#2367;&#2325;&#2366;&#2360; &#2324;&#2352; &#2348;&#2369;&#2344;&#2367;&#2351;&#2366;&#2342;&#2368; &#2338;&#2366;&#2306;&#2330;&#2375; &#2325;&#2366; &#2357;&#2367;&#2325;&#2366;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Ninth Five-Year Plan (1997-2002) was focused on growth with social justice and equality, emphasizing rural development, agriculture, and the social sector. </b></p><p>&bull; While private investment and technology were important, the primary objective was social justice</p><p><b>Further Insight:</b></p><p>&bull; Ninth Five-Year Plan (1997-2002)</p><p>&#9675; Target Growth: 6.5%</p><p>&#9675; Actual Growth: 5.4%</p><p>&#9675; Key Focus: Growth with social justice and equality, private sector involvement</p><p>&#9675; Key Events:</p><p>&#9632; Focus on agriculture and rural development to generate employment</p><p>&#9632; Emphasis on social sectors like education and healthcare</p>",

    "question": "<span class=\"eqt\"><p>Which of the following was a key monitorable target set during the Tenth Five-Year Plan (2002-2007)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2360;&#2357;&#2368;&#2306; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; (2002-2007) &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2344;&#2367;&#2327;&#2352;&#2366;&#2344;&#2368; &#2351;&#2379;&#2327;&#2381;&#2351; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",

      "<span class=\"eqt\">Establishing a comprehensive public health insurance system</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2348;&#2368;&#2350;&#2366; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;</span>"

    "question": "<span class=\"eqt\"><p>The Eleventh Five-Year Plan focused on achieving which of the following?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2381;&#2351;&#2366;&#2352;&#2361;&#2357;&#2368;&#2306; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2341;&#2368;?</p></span>",
    "options": [

      "<span class=\"eqt\">Reducing foreign debt</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2315;&#2339; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;</span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>The Eleventh Plan was aimed at achieving \"Faster and More Inclusive Growth,\" with an emphasis on social inclusion and reducing disparities. </b></p><p>&bull; This plan sought to ensure that the benefits of growth reached all sections of society.</p><p><b>Further Insight:</b></p><p>&bull; Eleventh Five-Year Plan (2007-2012)</p><p>&#9675; Target Growth: 9%</p><p>&#9675; Actual Growth: 8%</p><p>&#9675; Key Focus: Inclusive growth, job creation, poverty reduction, addressing inequalities</p><p>&#9675; Key Events:</p><p>&#9632; India emerged as one of the fastest-growing economies</p><p>&#9632; Economic growth was not perceived as inclusive for many marginalized groups (SCs, STs, minorities).</p>",

    "question": "<span class=\"eqt\"><p>Which of the following statements about the First Five-Year Plan (1951 - 1956) is/are correct?</p><p><b>a.</b> The plan was based on the Mahalanobis model.</p><p><b>b.</b> One of its main objectives was price stability.</p><p><b>c.</b> The actual growth rate achieved during the plan was higher than the target growth rate.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2341;&#2350; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; (1951 - 1956) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>a. &#2351;&#2361; &#2351;&#2379;&#2332;&#2344;&#2366; &#2350;&#2361;&#2366;&#2354;&#2344;&#2379;&#2348;&#2367;&#2360; &#2350;&#2377;&#2337;&#2354; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2341;&#2368;&#2404;</p><p>b. &#2311;&#2360;&#2325;&#2366; &#2319;&#2325; &#2350;&#2369;&#2326;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2381;&#2341;&#2367;&#2352;&#2340;&#2366; &#2341;&#2366;&#2404;</p><p>c. &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2342;&#2352; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2357;&#2367;&#2325;&#2366;&#2360; &#2342;&#2352; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2341;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",

    "correct_option_id": 1,
    "solution": "<p>&bull; The First Five-Year Plan (1951-1956) was based on the <b>Harrod-Domar model</b>. </p><p>&bull; One of the objectives of the First Plan was indeed <b>price stability</b>.</p><p>&bull; The <b>target growth rate</b> was 2.1%, but the <b>actual growth rate achieved was 3.6%</b>.</p><p><b>Further Insight:</b></p><p>&bull; First Five-Year Plan (1951-1956)</p><p>&#9675; Architect: K.N. Raj</p><p>&#9675; Target Growth: 2.1%</p><p>&#9675; Actual Growth: 3.6%</p><p>&#9675; Key Focus: Agriculture, price stability, power, transport</p><p>&#9675; Model Used: Harrod-Domar Model</p><p>&#9675; Key Events</p><p>&#9632; Influx of refugees</p><p>&#9632; Severe food shortages and inflation</p><p>&#9632; Success due to good harvests in the last two years</p><p>&#9632; Rehabilitation of refugees, food self-sufficiency, and price control achieved</p>",

    "solution": "<p>&bull; The <b>Second Five-Year Plan</b> emphasized <b>rapid industrialization</b>, especially in heavy and basic industries.</p><p>&bull; It also faced issues like <b>foreign exchange shortage</b> and <b>price rise</b>, contributing to its moderate success.</p><p>&bull; . However, the plan was based on <b>both the Harrod-Domar model and the four-sector model</b> of Prof. Mahalanobis, not the two-sector model.</p><p><b>Further Insight:</b></p><p>&bull; Second Five-Year Plan (1956-1961)</p><p>&bull; Architect: P.C. Mahalanobis</p><p>&bull; Target Growth: 4.5%</p><p>&bull; Actual Growth: 4.3%</p><p>&bull; Key Focus: Rapid industrialization, heavy and basic industries</p><p>&bull; Model Used: Harrod-Domar Model, Mahalanobis' two &amp; four-sector model</p><p>&bull; Key Events:</p><p>&#9675; Industrial Policy of 1956 advocating a socialistic pattern of society</p><p>&#9675; Acute shortage of foreign exchange</p><p>&#9675; Price rise of around 30%</p><p>&#9675; Moderate success despite foreign loan dependency</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is/are true about the Fifth Five-Year Plan (1974-1979)?</p><p><b>a.</b> It focused on \"Garibi Hatao\" (removal of poverty) and self-reliance.</p><p><b>b.</b> The plan was terminated early by the Janata Party government.</p><p><b>c.</b> The actual growth rate achieved during this plan was lower than the target.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2306;&#2330;&#2357;&#2368;&#2306; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; (1974-1979) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>a. &#2311;&#2360;&#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344; \"&#2327;&#2352;&#2368;&#2348;&#2368; &#2361;&#2335;&#2366;&#2323;\" &#2324;&#2352; &#2310;&#2340;&#2381;&#2350;&#2344;&#2367;&#2352;&#2381;&#2349;&#2352;&#2340;&#2366; &#2346;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2341;&#2366;&#2404;</p><p>b. &#2311;&#2360; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2379; &#2332;&#2344;&#2340;&#2366; &#2346;&#2366;&#2352;&#2381;&#2335;&#2368; &#2360;&#2352;&#2325;&#2366;&#2352; &#2344;&#2375; &#2360;&#2350;&#2351; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2361;&#2368; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>c. &#2311;&#2360; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2342;&#2352; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2360;&#2375; &#2325;&#2350; &#2341;&#2368;&#2404;</p     "correct_option_id": 1,
    "solution": "<p>&bull; The <b>Fifth Five-Year Plan</b> aimed at <b>removal of poverty (\"Garibi Hatao\")</b> and <b>self-reliance</b>.</p><p>&bull; It was <b>terminated early</b> in 1978 when the Janata Party came to power</p><p>&bull; The <b>actual growth rate (4.8%)</b> was <b>higher</b> than the <b>targeted 4.4%</b>.</p><p><b>Further Insight:</b></p><p>&bull; Fifth Five-Year Plan (1974-1979)</p><p>&#9675; Architect: D.P. Dhar (initially)</p><p>&#9675; Target Growth: 4.4%</p><p>&#9675; Actual Growth: 4.8%</p><p>&#9675; Key Focus: Poverty removal (Garibi Hatao) and self-reliance</p><p>&#9675; Key Events:</p><p>&#9632; Global oil price shock and inflation</p><p>&#9632; Prime Minister's 20-point program after the Emergency (1975)</p><p>&#9632; Plan terminated early by the Janata Party government in 1978</p>",
