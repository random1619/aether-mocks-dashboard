<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following instruments is used to measure the speed of an aircraft relative to the speed of sound?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2313;&#2346;&#2325;&#2352;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2375; &#2360;&#2366;&#2346;&#2375;&#2325;&#2381;&#2359; &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2350;&#2366;&#2344; &#2325;&#2368; &#2327;&#2340;&#2367; &#2350;&#2366;&#2346;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tachometer</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2376;&#2325;&#2379;&#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Machmeter</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2330;&#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Speedometer</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2368;&#2337;&#2379;&#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Anemometer</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2368;&#2350;&#2379;&#2350;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Machometer is used to measure the speed of an aircraft relative to the speed of the sound</p><p>&bull; Tachometer: Measures rotational speed, especially in rpm.</p><p>&bull; Speedometer: Measures the speed of a moving vehicle.</p><p>&bull; Anemometer: Measures wind speed and pressure.</p><p></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which instrument is used in submarines to observe objects above sea level?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2344;&#2337;&#2369;&#2348;&#2381;&#2348;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2340;&#2354; &#2360;&#2375; &#2314;&#2346;&#2352; &#2325;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2366; &#2344;&#2367;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2313;&#2346;&#2325;&#2352;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sextant</span><span class=\"hqt\" style=\"display:none\">&#2359;&#2359;&#2381;&#2336;&#2325;</span>",
      "<span class=\"eqt\">Periscope</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2352;&#2367;&#2360;&#2381;&#2325;&#2379;&#2346;</span>",
      "<span class=\"eqt\">Telescope</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2370;&#2352;&#2348;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Binoculars</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2370;&#2352;&#2348;&#2368;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Periscope is used in submarines to observe objects above sea level.</p><p>&bull; Sextant: Measures the altitude of celestial bodies for navigation.</p><p>&bull; Telescope: Magnifies distant objects.</p><p>&bull; Binoculars: Used for magnifying views of distant objects.</p><p></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What is the function of a Fathometer?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2376;&#2341;&#2379;&#2350;&#2368;&#2335;&#2352; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Measures the depth of the ocean</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2325;&#2368; &#2327;&#2361;&#2352;&#2366;&#2312; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Measures the refractive index of liquids</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2352;&#2354; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2375; &#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;&#2366;&#2306;&#2325; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Measures the salinity of solutions</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2354;&#2351;&#2344;&#2379;&#2306; &#2325;&#2368; &#2354;&#2357;&#2339;&#2340;&#2366; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Measures atmospheric pressure</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354;&#2368;&#2351; &#2342;&#2348;&#2366;&#2357; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Fathometer is used to measure the depth of the ocean</p><p>&bull; Refractometer: Measures refractive index and salinity.</p><p>&bull; Barometer: Measures atmospheric pressure.</p><p></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which instrument is used in a generator to reverse the direction of electric current?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2313;&#2354;&#2335;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2344;&#2352;&#2375;&#2335;&#2352; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2313;&#2346;&#2325;&#2352;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Transformer</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2347;&#2366;&#2352;&#2381;&#2350;&#2352;</span>",
      "<span class=\"eqt\">Commutator</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350;&#2381;&#2351;&#2370;&#2335;&#2375;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Dynamo</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2366;&#2311;&#2344;&#2375;&#2350;&#2379;</span>",
      "<span class=\"eqt\">Electrometer</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340;&#2350;&#2366;&#2346;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; A commutator is used in an electric generator to reverse the direction of electric current.</p><p>&bull; Transformer: Converts voltage levels without frequency change.</p><p>&bull; Dynamo: Converts mechanical energy into electrical energy.</p><p>&bull; Electrometer: Measures potential differences in electric currents.</p><p></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The instrument used to measure blood pressure is called?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2325;&#2381;&#2340;&#2330;&#2366;&#2346; &#2350;&#2366;&#2346;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2351;&#2369;&#2325;&#2381;&#2340; &#2313;&#2346;&#2325;&#2352;&#2339; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Stethoscope</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2367;&#2358;&#2381;&#2352;&#2366;&#2357;&#2325;</span>",
      "<span class=\"eqt\">Sphygmomanometer</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2325;&#2381;&#2340;&#2342;&#2366;&#2348;&#2350;&#2366;&#2346;&#2368;</span>",
      "<span class=\"eqt\">Hygrometer</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2342;&#2381;&#2352;&#2340;&#2366;&#2350;&#2366;&#2346;&#2368;</span>",
      "<span class=\"eqt\">Electroscope</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340;&#2342;&#2352;&#2381;&#2358;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Sphygmomanometer is used to measure blood pressure.</p><p>&bull; Stethoscope: Used to hear heart and lung sounds.</p><p>&bull; Hygrometer: Measures humidity.</p><p>&bull; Electroscope: Detects electric charge presence.</p><p></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The function of a Seismograph is to _________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2368;&#2360;&#2381;&#2350;&#2379;&#2327;&#2381;&#2352;&#2366;&#2347; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; _________ &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Detect underground minerals</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2350;&#2367;&#2327;&#2340; &#2326;&#2344;&#2367;&#2332;&#2379;&#2306; &#2325;&#2366; &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Record earthquake shocks</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2325;&#2377;&#2352;&#2381;&#2337; &#2349;&#2370;&#2325;&#2306;&#2346; &#2325;&#2375; &#2333;&#2335;&#2325;&#2375;</span>",
      "<span class=\"eqt\">Measure humidity in air</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2357;&#2366; &#2350;&#2375;&#2306; &#2344;&#2350;&#2368; &#2350;&#2366;&#2346;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Measure depth of oceans</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352;&#2379;&#2306; &#2325;&#2368; &#2327;&#2361;&#2352;&#2366;&#2312; &#2350;&#2366;&#2346;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Seismograph is used to record earthquake shocks</p><p>&bull; Fathometer: Measures ocean depth.</p><p>&bull; Hygrometer: Measures humidity.</p><p>&bull; Refractometer: Measures refractive index.</p><p></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which instrument is used to measure the intensity of solar radiation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2380;&#2352; &#2357;&#2367;&#2325;&#2367;&#2352;&#2339; &#2325;&#2368; &#2340;&#2368;&#2357;&#2381;&#2352;&#2340;&#2366; &#2350;&#2366;&#2346;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2313;&#2346;&#2325;&#2352;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Barometer</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2352;&#2379;&#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Pyrometer</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2359;&#2381;&#2339;&#2340;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352; &#2344;&#2366;&#2346;&#2344;&#2375; &#2325;&#2366; &#2351;&#2306;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Pyrheliometer</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2352;&#2375;&#2354;&#2367;&#2351;&#2379;&#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Tachometer</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2376;&#2325;&#2379;&#2350;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Pyrheliometer is used to measure the intensity of solar radiation</p><p>&bull; Barometer: Measures atmospheric pressure.</p><p>&bull; Pyrometer: Measures high temperatures.</p><p>&bull; Tachometer: Measures rotational speed.</p><p></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What does an Electroscope detect?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2360;&#2381;&#2325;&#2379;&#2346; &#2325;&#2381;&#2351;&#2366; &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Presence of sound waves</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Intensity of light</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2368; &#2340;&#2368;&#2357;&#2381;&#2352;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Presence of electric charge</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2310;&#2357;&#2375;&#2358; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Atmospheric pressure</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2369; - &#2342;&#2366;&#2348;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; An electroscope is a scientific instrument used to detect the presence of electric charge or ionizing radiation on an object</p><p>&bull; Microphone: Converts sound waves into electrical signals.</p><p>&bull; Photometer: Measures light intensity.</p><p>&bull; Barometer: Measures atmospheric pressure.</p><p></p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which instrument measures the relative density of liquids?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2313;&#2346;&#2325;&#2352;&#2339; &#2340;&#2352;&#2354; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2375; &#2360;&#2366;&#2346;&#2375;&#2325;&#2381;&#2359; &#2328;&#2344;&#2340;&#2381;&#2357; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lactometer</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2325;&#2335;&#2379;&#2350;&#2367;&#2335;&#2375;&#2352;</span>",
      "<span class=\"eqt\">Hydrometer</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Viscometer</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2360;&#2381;&#2325;&#2379;&#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Ohmmeter</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2350;&#2350;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; A hydrometer is used to measure the relative density of liquids.</p><p>&bull; Lactometer: Measures milk density.</p><p>&bull; Viscometer: Measures liquid viscosity.</p><p>&bull; Ohmmeter: Measures electrical resistance.</p><p></p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>What is the function of a Bolometer?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2379;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Detects infrared radiation</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2352;&#2325;&#2381;&#2340; &#2357;&#2367;&#2325;&#2367;&#2352;&#2339; &#2325;&#2366; &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
