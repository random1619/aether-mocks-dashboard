<body>
    <!-- Welcome Screen -->

                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">

                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>

                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>

                <!-- Controls -->

                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>

            <!-- Desktop Navigator Sidebar -->

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Who discovered radioactivity?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2343;&#2352;&#2381;&#2350;&#2367;&#2340;&#2366; &#2325;&#2368; &#2326;&#2379;&#2332; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Henri Becquerel</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2344;&#2352;&#2368; &#2348;&#2375;&#2325;&#2381;&#2357;&#2375;&#2352;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Marie Curie</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2352;&#2368; &#2325;&#2381;&#2351;&#2370;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Pierre Curie</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2351;&#2352;&#2375; &#2325;&#2381;&#2351;&#2370;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Ernest Rutherford</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2381;&#2344;&#2375;&#2360;&#2381;&#2335; &#2352;&#2342;&#2352;&#2347;&#2379;&#2352;&#2381;&#2337;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Henri Becquerel discovered radioactivity in 1896 while working with phosphorescent materials.</p><p>&bull; Marie Curie and Pierre Curie further researched radioactivity and discovered radium and polonium.</p><p>&bull; Ernest Rutherford contributed to the study of radioactive decay and atomic structure.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements regarding alpha (&#945;) particles is correct?</p><p>(a) They have high penetrating power.</p><p>(b) They have a charge of +2e.</p><p>(c) Their emission increases the atomic number of an element.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2354;&#2381;&#2347;&#2366; (&#945;) &#2325;&#2339;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>(a) &#2313;&#2344;&#2325;&#2368; &#2349;&#2375;&#2342;&#2344; &#2358;&#2325;&#2381;&#2340;&#2367; &#2313;&#2330;&#2381;&#2330; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>(b) &#2313;&#2344;&#2325;&#2366; &#2310;&#2357;&#2375;&#2358; +2e &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>(c) &#2313;&#2344;&#2325;&#2375; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2344; &#2360;&#2375; &#2325;&#2367;&#2360;&#2368; &#2340;&#2340;&#2381;&#2357; &#2325;&#2368; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only (a) and (b)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (&#2319;) &#2324;&#2352; (&#2348;&#2368;)</span>",
      "<span class=\"eqt\">Only (b)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (&#2348;&#2368;)</span>",
      "<span class=\"eqt\">Only (b) and (c)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (&#2348;&#2368;) &#2324;&#2352; (&#2360;&#2368;)</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Alpha particles are helium nuclei with a +2e charge.</p><p>&bull; Alpha particles have low penetrating power.</p><p>&bull; Alpha decay decreases the atomic number.</p><p>&bull; Alpha particles</p><p>&#9675; Composition: Consists of 2 protons and 2 neutrons (Helium nucleus).</p><p>&#9675; Emission: Released during alpha decay of heavy nuclei.</p><p>&#9675; Charge &amp; Mass: Positively charged (+2) and relatively heavy.</p><p>&#9675; Speed: Moves at approximately 10&#8311; m/s.</p><p>&#9675; Ionization: Highly ionizing, causing significant damage in a short path.</p><p>&#9675; Penetration: Low penetrating power; stopped by paper or a few cm of air.</p><p>&#9675; Biological Effect: Harmful if inhaled or ingested, causing severe tissue damage.</p><p>&#9675; Scattering: Deflected when passing through thin metal foils.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The half-life of a radioactive substance is the time in which:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2343;&#2352;&#2381;&#2350;&#2368; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2368; &#2309;&#2352;&#2381;&#2343;&#2366;&#2351;&#2369; &#2357;&#2361; &#2360;&#2350;&#2351; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">The mass of the substance reduces to zero</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2358;&#2370;&#2344;&#2381;&#2351; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The mass reduces to half of its initial value</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2309;&#2346;&#2344;&#2375; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2350;&#2366;&#2344; &#2325;&#2366; &#2310;&#2343;&#2366; &#2352;&#2361; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The atomic number reduces by half</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2310;&#2343;&#2368; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The decay process stops</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2359;&#2351; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2352;&#2369;&#2325; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Half-life is the time taken for half of a radioactive sample to decay.</p><p>&bull; Decay of mass never reaches zero.</p><p>&bull; Atomic numbers may not always be halved.</p><p>&bull; Decay continues indefinitely.</p><p>&bull; Half life of radio active substance</p><p>&#9675; The time taken for half of a radioactive substance to decay is known as Half life of radioactive</p><p>&#9675; Nature: It is constant for a given radioactive substance</p><p>&#9675; Dependence: Independent of the initial amount of the substance.</p><p>&#9675; Measurement: Expressed in seconds, minutes, hours, years, etc.</p><p>&#9675; Application: Used in carbon dating, nuclear medicine, and nuclear waste management.</p><p>&#9675; Example: Uranium-238 has a half-life of 4.5 billion years.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In a nuclear reaction, which of the following is always conserved?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2361;&#2350;&#2375;&#2358;&#2366; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mass</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Charge</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2354;&#2381;&#2325;</span>",
      "<span class=\"eqt\">Energy</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2352;&#2381;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Both (2) and (3)</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; (2) &#2324;&#2352; (3)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; In nuclear reactions, charge and energy are conserved.</p><p>&bull; Mass is partially converted into energy.</p><p>&bull; Nuclear Reaction</p><p>&#9675; Nuclear reaction is a process in which atomic nuclei undergo a transformation, leading to a change in their composition, energy, or structure.</p><p>&#9675; It is of three types: nuclear fission, nuclear fusion, and radioactive decay.</p><p>&#9675; Produces a large amount of energy due to mass-to-energy conversion</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The SI unit of radioactivity is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2343;&#2352;&#2381;&#2350;&#2367;&#2340;&#2366; &#2325;&#2368; SI &#2311;&#2325;&#2366;&#2312; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Curie</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2351;&#2370;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Becquerel</span><span class=\"hqt\" style=\"display:none\">Becquerel</span>",
      "<span class=\"eqt\">Rutherford</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2342;&#2352;&#2347;&#2379;&#2352;&#2381;&#2337;</span>",
      "<span class=\"eqt\">Roentgen</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2377;&#2344;&#2381;&#2335;&#2327;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Becquerel (Bq) measures disintegrations per second.</p><p>&bull; Curie is an older unit.</p><p>&bull; Rutherford is not a unit of radioactivity.</p><p>&bull; Roentgen measures ionizing radiation exposure.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following types of radiation has the highest penetrating power?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2357;&#2367;&#2325;&#2367;&#2352;&#2339; &#2325;&#2368; &#2349;&#2375;&#2342;&#2344; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Alpha</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2347;&#2366;</span>",
      "<span class=\"eqt\">Beta</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Gamma</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2350;&#2366;</span>",
      "<span class=\"eqt\">X-ray</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2381;&#2360;-&#2352;&#2375;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Gamma rays have the highest penetration power.</p><p>&bull; Alpha has the lowest penetration.</p><p>&bull; Beta is moderate.</p><p>&bull; X-rays are less penetrating than gamma rays.</p><p>&bull; Gamma Rays</p><p>&#9675; Gamma rays are high-energy electromagnetic waves emitted from the nucleus of a radioactive atom.</p><p>&#9675; They have no mass and no charge, unlike alpha and beta particles.</p><p>&#9675; Highly penetrating; can pass through most materials except dense substances like lead or thick concrete.</p><p>&#9675; Usually emitted along with alpha or beta decay to release excess nuclear energy.</p><p>&#9675; Travel at the speed of light (3 x 10<sup>8</sup>m/s) in a vacuum.</p><p>&#9675; Detected using devices like Geiger-Muller counters and scintillation detectors.</p><p>&#9675; Weakly ionizing compared to alpha and beta particles.</p><p>&#9675; Widely used in cancer radiotherapy, sterilization, food preservation, and industrial imaging.</p><p>&#9675; Requires heavy elements like lead or several meters of concrete for effective shielding.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which among the following statements is NOT true about beta (&#946;) decay?</p><p>(a) It involves the emission of electrons or positrons.</p><p>(b) It results in an increase or decrease in atomic number.</p><p>(c) It emits helium nuclei.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2348;&#2368;&#2335;&#2366; (&#946;) &#2325;&#2381;&#2359;&#2351; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2340;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p><p>(a) &#2311;&#2360;&#2350;&#2375;&#2306; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2351;&#2366; &#2346;&#2377;&#2332;&#2364;&#2367;&#2335;&#2381;&#2352;&#2377;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2344; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</p><p>(b) &#2311;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2351;&#2366; &#2325;&#2350;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>(c) &#2351;&#2361; &#2361;&#2368;&#2354;&#2367;&#2351;&#2350; &#2344;&#2366;&#2349;&#2367;&#2325; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only (a)</span><span class=\"hqt\" style=\"display:none\">(a)</span>",
      "<span class=\"eqt\">Only (b)</span><span class=\"hqt\" style=\"display:none\">(b)</span>",
      "<span class=\"eqt\">Only (c)</span><span class=\"hqt\" style=\"display:none\">(c)</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Beta decay does not emit helium nuclei (which are &#945; particles).</p><p>&bull; Beta Decay</p><p>&#9675; Beta decay is a type of radioactive decay in which a nucleus emits a beta particle (electron or positron).</p><p>&#9675; It occurs in two forms - Beta-minus (&#946;&#8315;) decay and Beta-plus (&#946;&#8314;) decay.</p><p>&#9675; Beta-minus (&#946;&#8315;) Decay: A neutron converts into a proton, emitting an electron (e<sup>-</sup>) and an antineutrino</p><p>&#9675; Beta-plus (&#946;&#8314;) Decay: A proton converts into a neutron, emitting a positron (e<sup>+</sup>) and a neutrino.</p><p>&#9675; More penetrating than alpha particles but less than gamma rays; can be stopped by a few millimeters of aluminum.</p><p>&#9675; Moderate ionizing ability, higher than gamma rays but lower than alpha particles.</p><p>&#9675; The mass number remains unchanged in beta decay</p><p>&#9675; Used in medical treatments (e.g., radiotherapy), carbon dating (C<sup>14 </sup>decay), and nuclear reactors.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If a radioactive substance has a half-life of 10 years, how much of a 20g sample remains after 30 years?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2343;&#2352;&#2381;&#2350;&#2368; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2368; &#2309;&#2352;&#2381;&#2343;&#2366;&#2351;&#2369; 10 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;, &#2340;&#2379; 30 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; 20 &#2327;&#2381;&#2352;&#2366;&#2350; &#2344;&#2350;&#2370;&#2344;&#2375; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2349;&#2366;&#2327; &#2358;&#2375;&#2359; &#2348;&#2330;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">10g</span><span class=\"hqt\" style=\"display:none\">10 &#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">5g</span><span class=\"hqt\" style=\"display:none\">5&#2332;&#2368;</span>",
      "<span class=\"eqt\">2.5g</span><span class=\"hqt\" style=\"display:none\">2.5 &#2327;&#2381;&#2352;&#2366;&#2350;</span>",

    "correct_option_id": 2,
    "solution": "<p>&bull; A half-life of 10 years means after 10 years, 20g becomes 10g; after 20 years, 10g becomes 5g; after 30 years, 5g becomes 2.5g.</p><p>&bull; 20g &rarr; 10g &rarr; 5g &rarr; 2.5g.</p><p>&bull; Half life of radio active substance</p><p>&#9675; The time taken for half of a radioactive substance to decay is known as Half life of radioactive</p><p>&#9675; Nature: It is constant for a given radioactive substance</p><p>&#9675; Dependence: Independent of the initial amount of the substance.</p><p>&#9675; Measurement: Expressed in seconds, minutes, hours, years, etc.</p><p>&#9675; Application: Used in carbon dating, nuclear medicine, and nuclear waste management.</p><p>&#9675; Example: Uranium-238 has a half-life of 4.5 billion years.</p>",

  {
    "question": "<span class=\"eqt\"><p>The isotope used in carbon dating is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2375;&#2335;&#2367;&#2306;&#2327; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2351;&#2369;&#2325;&#2381;&#2340; &#2310;&#2311;&#2360;&#2379;&#2335;&#2379;&#2346; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">C-12</span><span class=\"hqt\" style=\"display:none\">C-12</span>",
      "<span class=\"eqt\">C-13</span><span class=\"hqt\" style=\"display:none\">C-13</span>",
      "<span class=\"eqt\">C-14</span><span class=\"hqt\" style=\"display:none\">C-14</span>",
      "<span class=\"eqt\">C-15</span><span class=\"hqt\" style=\"display:none\">C-15</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Carbon-14 is used in radiocarbon dating.</p><p>&bull; Carbon dating is a method used to determine the age of ancient organic materials.</p><p>&bull; It is based on the radioactive decay of Carbon-14 (C-14) isotope.</p><p>&bull; Half-life of C-14: Approximately 5730 years.</p><p>&bull; Living organisms absorb C-14 from the atmosphere; after death, C-14 decays at a known rate.</p><p>&bull; Used in archaeology, geology, and paleontology to date fossils, wood, and artifacts up to 50,000 years old.</p>",

  {
    "question": "<span class=\"eqt\"><p>Which of the following does NOT involve radioactivity?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2350;&#2375;&#2306; &#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2343;&#2352;&#2381;&#2350;&#2367;&#2340;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Uranium decay</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2352;&#2375;&#2344;&#2367;&#2351;&#2350; &#2325;&#2381;&#2359;&#2351;</span>",
      "<span class=\"eqt\">Nuclear fusion</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2306;&#2354;&#2351;&#2344;</span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; X-rays are generated through electron transitions, not radioactive decay.</p><p>&bull; Radioactivity is the spontaneous emission of radiation from unstable atomic nuclei.</p><p>&bull; Discovered by: Henri Becquerel in 1896.</p><p>&bull; Types of Radiation: Alpha (&#945;), Beta (&#946;), and Gamma (&#947;) rays.</p><p>&bull; Cause: Occurs due to nuclear instability, leading to decay into a more stable nucleus.</p><p>&bull; Half-Life: The time taken for half of a radioactive substance to decay.</p><p>&bull; Units of Measurement: Measured in Becquerel (Bq) and Curie (Ci).</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is correct regarding the energy released in radioactive decay?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2343;&#2352;&#2381;&#2350;&#2368; &#2325;&#2381;&#2359;&#2351; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2367;&#2340; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It is equal to the mass defect multiplied by the square of the speed of light.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2342;&#2379;&#2359; &#2325;&#2379; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2360;&#2375; &#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2350;&#2366;&#2344; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is always greater than the energy released in a chemical reaction.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2360;&#2342;&#2376;&#2357; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2367;&#2340; &#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It depends on the binding energy per nucleon of the daughter nucleus.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2360;&#2306;&#2340;&#2340;&#2367; &#2344;&#2366;&#2349;&#2367;&#2325; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2344;&#2381;&#2351;&#2370;&#2325;&#2381;&#2354;&#2367;&#2321;&#2344; &#2348;&#2306;&#2343;&#2344; &#2314;&#2352;&#2381;&#2332;&#2366; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">All of the above.</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; The energy released in radioactive decay follows Einstein's mass-energy equivalence principle (E = mc&#178;), is much greater than chemical reaction energy, and is dependent on the binding energy of the daughter nucleus.</p><p>&bull; Radioactivity is the spontaneous emission of radiation from unstable atomic nuclei.</p><p>&bull; Discovered by: Henri Becquerel in 1896.</p><p>&bull; Types of Radiation: Alpha (&#945;), Beta (&#946;), and Gamma (&#947;) rays.</p><p>&bull; Cause: Occurs due to nuclear instability, leading to decay into a more stable nucleus.</p><p>&bull; Half-Life: The time taken for half of a radioactive substance to decay.</p><p>&bull; Units of Measurement: Measured in Becquerel (Bq) and Curie (Ci).</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which radioactive element is used in heart pacemakers due to its long half-life?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2343;&#2352;&#2381;&#2350;&#2368; &#2340;&#2340;&#2381;&#2357; &#2309;&#2346;&#2344;&#2375; &#2354;&#2306;&#2348;&#2375; &#2309;&#2352;&#2381;&#2343;&#2366;&#2351;&#2369; &#2325;&#2366;&#2354; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2361;&#2371;&#2342;&#2351; &#2346;&#2375;&#2360;&#2350;&#2375;&#2325;&#2352; &#2350;&#2375;&#2306; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

    "correct_option_id": 1,
    "solution": "<p>&bull; Plutonium-238 has a long half-life (~88 years) and emits consistent thermal energy, making it ideal for heart pacemakers.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Radioactive Element</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Uses in Daily Life</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Uranium-235</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Used as fuel in nuclear power plants for electricity generation.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Carbon-14</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Used in radiocarbon dating to determine the age of archaeological artifacts.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cobalt-60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Used in cancer radiotherapy and food sterilization.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Americium-241</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Used in smoke detectors for detecting fire hazards.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Technetium-99m</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Used in medical imaging for diagnosing organ functions.</td></tr></table>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>In nuclear fission, the binding energy per nucleon of the daughter nuclei is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2357;&#2367;&#2326;&#2306;&#2337;&#2344; &#2350;&#2375;&#2306;, &#2360;&#2306;&#2340;&#2340;&#2367; &#2344;&#2366;&#2349;&#2367;&#2325; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2344;&#2381;&#2351;&#2370;&#2325;&#2381;&#2354;&#2367;&#2321;&#2344; &#2348;&#2306;&#2343;&#2344; &#2314;&#2352;&#2381;&#2332;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Lower than that of the parent nucleus</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354; &#2344;&#2366;&#2349;&#2367;&#2325; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2325;&#2350;</span>",
      "<span class=\"eqt\">Equal to that of the parent nucleus</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354; &#2344;&#2366;&#2349;&#2367;&#2325; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352;</span>",
      "<span class=\"eqt\">Higher than that of the parent nucleus</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354; &#2344;&#2366;&#2349;&#2367;&#2325; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Not related to fission</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2326;&#2306;&#2337;&#2344; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The products of fission have a higher binding energy per nucleon, which makes them more stable and releases energy in the process.</p><p>&bull; Nuclear fission is the process in which a heavy nucleus splits into two or more smaller nuclei, releasing a large amount of energy.</p><p>&bull; A tremendous amount of heat and radiation is released due to the breaking of nuclear bonds.</p><p>&bull; A single fission reaction releases neutrons, which further cause more fission, leading to a self-sustaining reaction.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following isotopes is NOT used as a nuclear fuel?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2312;&#2306;&#2343;&#2344; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2313;&#2346;&#2351;&#2379;&#2327; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 3,
    "solution": "<p>&bull; Radon-222 is a radioactive noble gas and not used as a nuclear fuel. The other three isotopes are widely used in nuclear reactions.</p><p>&bull; Nuclear fuel is a material used in nuclear reactors to sustain a nuclear fission reaction.</p><p>&bull; Common Examples: Uranium-235, Uranium-238, Plutonium-239, Thorium-232 are widely used nuclear fuels.</p><p>&bull; Found in solid (fuel rods), liquid, or gaseous forms, depending on the reactor type.</p>",

  {
    "question": "<span class=\"eqt\"><p>The Geiger-M&#252;ller counter is used to detect:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2368;&#2332;&#2352;-&#2350;&#2369;&#2354;&#2352; &#2325;&#2366;&#2313;&#2306;&#2335;&#2352; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Neutrons only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344;</span>",
      "<span class=\"eqt\">Gamma rays only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2327;&#2366;&#2350;&#2366; &#2325;&#2367;&#2352;&#2339;&#2375;&#2306;</span>",

      "<span class=\"eqt\">Alpha radiation only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2309;&#2354;&#2381;&#2347;&#2366; &#2357;&#2367;&#2325;&#2367;&#2352;&#2339;</span>"

    "correct_option_id": 2,
    "solution": "<p>&bull; The GM counter detects ionizing radiation, including alpha, beta, and gamma rays, by counting ionization events.</p><p>&bull; Becquerel (Bq) measures disintegrations per second.</p><p>&bull; Roentgen measures ionizing radiation exposure.</p>",

  {
    "question": "<span class=\"eqt\"><p>Heavy water (D&#8322;O) is used as a moderator in nuclear reactors because it:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2368; &#2332;&#2354; (D&#8322;O) &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2352;&#2367;&#2319;&#2325;&#2381;&#2335;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2350;&#2306;&#2342;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2351;&#2361;:</p></span>",
    "options": [
      "<span class=\"eqt\">Speeds up neutrons</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344; &#2325;&#2368; &#2327;&#2340;&#2367; &#2348;&#2338;&#2364;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Slows down neutrons</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344; &#2325;&#2379; &#2343;&#2368;&#2350;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Absorbs neutrons</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344; &#2325;&#2379; &#2309;&#2357;&#2358;&#2379;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Produces neutrons</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Heavy water reduces the speed of fast neutrons, increasing the probability of fission in nuclear reactors.</p><p>&bull; A moderator is a substance used in a nuclear reactor to slow down fast neutrons, making them more likely to sustain a controlled fission reaction.</p><p>&bull; Common Moderators: Heavy water (D&#8322;O), Graphite, Light water (H&#8322;O), Beryllium, and Carbon.</p><p>&bull; Reduces the speed of neutrons without absorbing them, increasing the probability of Uranium-235 or Plutonium-239 undergoing fission.</p>",
    "question_index": 15

  {
    "question": "<span class=\"eqt\"><p>The term 'critical mass' in nuclear fission refers to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2357;&#2367;&#2326;&#2306;&#2337;&#2344; &#2350;&#2375;&#2306; '&#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367;&#2325; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;' &#2358;&#2348;&#2381;&#2342; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">The smallest mass required for a sustained chain reaction</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">The mass at which fission ceases</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2332;&#2367;&#2360; &#2346;&#2352; &#2357;&#2367;&#2326;&#2306;&#2337;&#2344; &#2352;&#2369;&#2325; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The maximum mass a reactor can hold</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2352;&#2367;&#2319;&#2325;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2325;&#2367;&#2340;&#2344;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2343;&#2366;&#2352;&#2339; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The threshold mass for fusion</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2354;&#2351;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2361;&#2354;&#2368;&#2332; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Critical mass is the minimum mass of fissile material needed to maintain an uninterrupted chain reaction.</p><p>&bull; Nuclear fission is the process in which a heavy nucleus splits into two or more smaller nuclei, releasing a large amount of energy.</p><p>&bull; A tremendous amount of heat and radiation is released due to the breaking of nuclear bonds.</p><p>&bull; A single fission reaction releases neutrons, which further cause more fission, leading to a self-sustaining reaction.</p>",
    "question_index": 16
  },
  {

    "options": [
