<body>

                </div>

                <!-- Controls -->

                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following types of chemical bonds involves the sharing of electrons between two atoms? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2348;&#2306;&#2343;&#2344; &#2350;&#2375;&#2306; &#2342;&#2379; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2366;&#2333;&#2366;&#2325;&#2352;&#2339; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ionic bonds</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2379;&#2344;&#2367;&#2325; &#2348;&#2306;&#2343;&#2344;</span>",
      "<span class=\"eqt\">Covalent bonds</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2361;&#2360;&#2306;&#2351;&#2379;&#2332;&#2368; &#2310;&#2348;&#2306;&#2343;</span>",
      "<span class=\"eqt\">Metallic bonds</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2340;&#2381;&#2357;&#2367;&#2325; &#2348;&#2306;&#2343;&#2344;</span>",
      "<span class=\"eqt\">Electrostatic forces</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2360;&#2381;&#2335;&#2376;&#2335;&#2367;&#2325; &#2348;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Covalent bonds</b> result from the sharing of electrons between two atoms, typically involving one nonmetallic element with another. </p><p>Ionic bonds result from electrostatic forces between ions of opposite charge. </p><p>Metallic bonds are found in solid metals. </p><p>Electrostatic forces are the basis of ionic bonds.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>What determines the polarity of a bond between two atoms? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2348;&#2306;&#2343;&#2344; &#2325;&#2368; &#2343;&#2381;&#2352;&#2369;&#2357;&#2340;&#2366; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2339; &#2325;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The size of the atoms</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">The number of valence electrons</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2351;&#2379;&#2332;&#2325;&#2340;&#2366; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">The difference in electronegativity between the atoms</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340;-&#2315;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325;&#2340;&#2366; &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2352;</span>",
      "<span class=\"eqt\">The bond order</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2306;&#2337; &#2310;&#2342;&#2375;&#2358;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Bond polarity arises due to an unequal sharing of electrons between two atoms. </p><p>This occurs when the atoms involved have <b>different electronegativities</b> - a measure of an atom's tendency to attract shared electrons. </p><p>The greater the difference in electronegativity, the more polar the bond becomes. </p><p>A <b>large difference</b> leads to a highly polar or even ionic bond, while <b>equal or nearly equal</b> electronegativities result in a nonpolar bond.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>According to the octet rule, which of the following is a stable arrangement of valence electrons for an atom? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2359;&#2381;&#2335;&#2325; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2306;&#2351;&#2379;&#2332;&#2325;&#2340;&#2366; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2360;&#2381;&#2341;&#2367;&#2352; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Two electrons</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;</span>",
      "<span class=\"eqt\">Six electrons</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2361; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;</span>",
      "<span class=\"eqt\">Eight electrons</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2336; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;</span>",
      "<span class=\"eqt\">Ten electrons</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2360; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>octet rule</b> states that atoms tend to gain, lose, or share electrons to achieve a stable electron configuration with <b>eight valence electrons</b>, similar to that of noble gases. </p><p>This configuration is especially stable because it fills the s and p orbitals in the outermost shell.</p><p>Although there are exceptions (like hydrogen and helium, which follow the duet rule), the octet is a common guideline for chemical bonding.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Lewis dot symbols primarily represent which of the following? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2369;&#2312;&#2360; &#2337;&#2377;&#2335; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">All electrons in an atom</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;</span>",
      "<span class=\"eqt\">Core electrons</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2352; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;</span>",
      "<span class=\"eqt\">Valence electrons</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2339;&#2369; &#2325;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Neutrons in the nucleus</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2349;&#2367;&#2325; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Lewis dot symbols</b> are a visual representation of an element's <b>valence electrons</b>, which are the electrons in the outermost shell involved in bonding. </p><p>The chemical symbol represents the element's nucleus and core electrons, while <b>dots placed around the symbol</b> represent the valence electrons. </p><p>This helps predict how atoms will bond in molecules.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which type of bond typically forms between a metal and a nonmetal? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2343;&#2366;&#2340;&#2369; &#2324;&#2352; &#2309;&#2343;&#2366;&#2340;&#2369; &#2325;&#2375; &#2348;&#2368;&#2330; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2348;&#2306;&#2343;&#2344; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Covalent bond</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2361;&#2360;&#2306;&#2351;&#2379;&#2332;&#2325; &#2348;&#2306;&#2343;&#2344;</span>",
      "<span class=\"eqt\">Metallic bond</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2340;&#2381;&#2357;&#2367;&#2325; &#2348;&#2306;&#2343;&#2344;</span>",
      "<span class=\"eqt\">Ionic bond</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2379;&#2344;&#2367;&#2325; &#2348;&#2306;&#2343;</span>",
      "<span class=\"eqt\">Hydrogen bond</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344; &#2348;&#2306;&#2343;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>An <b>ionic bond</b> is formed when a <b>metal donates</b> one or more electrons to a <b>nonmetal</b>, resulting in positively charged (cation) and negatively charged (anion) ions. </p><p>The electrostatic attraction between these oppositely charged ions holds them together. </p><p>For example, in sodium chloride (NaCl), sodium (a metal) transfers an electron to chlorine (a nonmetal), forming an ionic bond.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What happens to the bond length as the bond order between two atoms increases? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2348;&#2306;&#2343;&#2344; &#2325;&#2381;&#2352;&#2350; &#2348;&#2338;&#2364;&#2344;&#2375; &#2346;&#2352; &#2348;&#2306;&#2343;&#2344; &#2354;&#2306;&#2348;&#2366;&#2312; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2346;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bond length increases</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2343; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Bond length decreases</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2343; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2328;&#2335; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Bond length remains the same</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2343; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2357;&#2361;&#2368; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">There is no direct relationship</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2366; &#2325;&#2379;&#2312; &#2360;&#2368;&#2343;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Bond order</b> refers to the number of chemical bonds between a pair of atoms. </p><p>As bond order increases (for example, from a single to a double to a triple bond), the atoms are held together more tightly, pulling them closer. This results in a <b>shorter bond length</b>. </p><p>Therefore, higher bond order = <b>stronger and shorter bond</b>.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Match the type of chemical bond with its general description:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.Ionic Bond</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Results from the sharing of electrons between two atoms</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.Covalent Bond</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Electrons are shared equally between two atoms with equal electronegativity</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.Metallic Bond</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Results from electrostatic forces between ions of opposite charge, typically between a metal and a nonmetal</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.Nonpolar Covalent Bond</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Found in solid metals with bonding electrons free to move throughout the structure</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2348;&#2306;&#2343;&#2344; &#2325;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2357;&#2367;&#2357;&#2352;&#2339; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.&#2310;&#2351;&#2344;&#2367;&#2325; &#2348;&#2306;&#2343;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2342;&#2379; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2306;&#2335;&#2357;&#2366;&#2352;&#2375; &#2360;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.&#2360;&#2361;&#2360;&#2306;&#2351;&#2379;&#2332;&#2325; &#2348;&#2306;&#2343;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2350;&#2366;&#2344; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340;-&#2315;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325;&#2340;&#2366; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2350;&#2366;&#2344; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2366;&#2333;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.&#2343;&#2366;&#2340;&#2381;&#2357;&#2367;&#2325; &#2348;&#2306;&#2343;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2310;&#2357;&#2375;&#2358; &#2357;&#2366;&#2354;&#2375; &#2310;&#2351;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2360;&#2381;&#2335;&#2376;&#2335;&#2367;&#2325; &#2348;&#2354;&#2379;&#2306; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346;, &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2319;&#2325; &#2343;&#2366;&#2340;&#2369; &#2324;&#2352; &#2319;&#2325; &#2309;&#2343;&#2366;&#2340;&#2369; &#2325;&#2375; &#2348;&#2368;&#2330;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.&#2327;&#2376;&#2352;-&#2343;&#2381;&#2352;&#2369;&#2357;&#2368;&#2351; &#2360;&#2361;&#2360;&#2306;&#2351;&#2379;&#2332;&#2325; &#2348;&#2306;&#2343;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2336;&#2379;&#2360; &#2343;&#2366;&#2340;&#2369;&#2323;&#2306; &#2350;&#2375;&#2306; &#2346;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2348;&#2306;&#2343;&#2344; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2350;&#2375;&#2306; &#2328;&#2370;&#2350;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i &rarr; a, ii &rarr; c, iii &rarr; d, iv &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; c, iii &rarr; d, iv &rarr; b</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; a, iii &rarr; d, iv &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; a, iii &rarr; d, iv &rarr; b</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; d, iii &rarr; a, iv &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; d, iii &rarr; a, iv &rarr; b</span>",
      "<span class=\"eqt\">i &rarr; d, ii &rarr; a, iii &rarr; c, iv &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; d, ii &rarr; a, iii &rarr; c, iv &rarr; b</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>i. Ionic Bond </b><b>&rarr;</b><b> c:</b> Formed by the <b>transfer of electrons</b> from a metal to a nonmetal, creating ions held together by <b>electrostatic attraction</b>.</p><p>&#183; <b>ii. Covalent Bond </b><b>&rarr;</b><b> a:</b> Formed when atoms <b>share electrons</b>, typically between two nonmetals.</p><p>&#183; <b>iii. Metallic Bond </b><b>&rarr;</b><b> d:</b> Found in metals; <b>electrons are delocalized</b> and free to move throughout the metallic structure, giving metals their conductivity and malleability.</p><p>&#183; <b>iv. Nonpolar Covalent Bond </b><b>&rarr;</b><b> b:</b> A type of covalent bond where <b>electrons are shared equally</b> because the atoms have <b>equal electronegativity</b>.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What is the primary force of attraction in an ionic bond? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2351;&#2344;&#2367;&#2325; &#2348;&#2306;&#2343;&#2344; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2310;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sharing of electrons</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2366;&#2333;&#2366;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Magnetic forces</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2348;&#2354;</span>",
      "<span class=\"eqt\">Electrostatic forces between oppositely charged ions</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2310;&#2357;&#2375;&#2358;&#2367;&#2340; &#2310;&#2351;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340;&#2360;&#2381;&#2341;&#2376;&#2340;&#2367;&#2325; &#2348;&#2354;</span>",
      "<span class=\"eqt\">Gravitational forces</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>An <b>ionic bond</b> forms when one atom (usually a metal) donates electrons to another (usually a nonmetal), resulting in positively and negatively charged ions.</p><p>The <b>electrostatic attraction</b> between these oppositely charged ions is what holds them together in an ionic compound.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct regarding bond order, bond length, and bond energy in covalent bonds?</p><p>I. The number of electron pairs that hold two atoms together is called the bond order. </p><p>II. Generally, as bond order increases, bond length decreases and bond energy increases. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2360;&#2306;&#2351;&#2379;&#2332;&#2325; &#2348;&#2306;&#2343;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2306;&#2343; &#2325;&#2381;&#2352;&#2350;, &#2348;&#2306;&#2343; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2348;&#2306;&#2343; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2342;&#2379; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2352;&#2326;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2348;&#2306;&#2343; &#2325;&#2381;&#2352;&#2350; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2310;&#2350; &#2340;&#2380;&#2352; &#2346;&#2352;, &#2332;&#2376;&#2360;&#2375;-&#2332;&#2376;&#2360;&#2375; &#2348;&#2306;&#2343; &#2325;&#2381;&#2352;&#2350; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376;, &#2348;&#2306;&#2343; &#2354;&#2306;&#2348;&#2366;&#2312; &#2328;&#2335;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2348;&#2306;&#2343; &#2314;&#2352;&#2381;&#2332;&#2366; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I:</b> Bond order is defined as the <b>number of electron pairs</b> shared between two atoms in a covalent bond.</p><p><b>Statement II:</b> Generally, <b>as bond order increases</b>, the bond becomes <b>stronger (higher energy)</b> and <b>shorter (reduced bond length)</b>. This trend holds true for comparable bonds in similar environments.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>What does a large electronegativity difference between two bonded atoms typically indicate? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2348;&#2337;&#2364;&#2366; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340;-&#2315;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325;&#2340;&#2366; &#2309;&#2306;&#2340;&#2352; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A nonpolar covalent bond</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2309;&#2343;&#2381;&#2352;&#2369;&#2357;&#2368;&#2351; &#2360;&#2361;&#2360;&#2306;&#2351;&#2379;&#2332;&#2325; &#2348;&#2306;&#2343;&#2344;</span>",
      "<span class=\"eqt\">A polar covalent bond with a small dipole moment</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2331;&#2379;&#2335;&#2375; &#2342;&#2381;&#2357;&#2367;&#2343;&#2381;&#2352;&#2369;&#2357;&#2368;&#2351; &#2310;&#2328;&#2370;&#2352;&#2381;&#2339; &#2357;&#2366;&#2354;&#2366; &#2343;&#2381;&#2352;&#2369;&#2357;&#2368;&#2351; &#2360;&#2361;&#2360;&#2306;&#2351;&#2379;&#2332;&#2325; &#2348;&#2306;&#2343;&#2344;</span>",
      "<span class=\"eqt\">An ionic bond</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2310;&#2351;&#2344;&#2367;&#2325; &#2348;&#2306;&#2343;&#2344;</span>",
      "<span class=\"eqt\">A metallic bond</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2343;&#2366;&#2340;&#2369; &#2348;&#2306;&#2343;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>When two atoms have a <b>large difference in electronegativity</b> (typically &ge; 1.7 on the Pauling scale), the more electronegative atom can <b>completely attract the bonding electrons</b>, resulting in <b>electron transfer</b> rather than sharing. </p><p>This leads to the formation of <b>ions</b> and an <b>ionic bond</b>, as seen in compounds like NaCl.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a characteristic property of ionic substances ? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2310;&#2351;&#2344;&#2367;&#2325; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2366; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2327;&#2369;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Low melting point</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350; &#2327;&#2354;&#2344;&#2366;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Soft and malleable</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2350; &#2324;&#2352; &#2354;&#2330;&#2368;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Organized into an ordered lattice</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2332;&#2366;&#2354; &#2350;&#2375;&#2306; &#2360;&#2306;&#2327;&#2336;&#2367;&#2340;</span>",
      "<span class=\"eqt\">Poor electrical conductors in the molten state</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2328;&#2354;&#2368; &#2361;&#2369;&#2312; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2326;&#2352;&#2366;&#2348; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2330;&#2366;&#2354;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Ionic compounds</b> consist of positively and negatively charged ions arranged in a <b>regular, repeating pattern</b> called a <b>crystalline lattice</b>. </p><p>This highly ordered structure gives ionic substances distinct properties such as <b>high melting and boiling points</b>, <b>brittleness</b>, and the ability to <b>conduct electricity when molten or dissolved in water</b>, due to the mobility of ions.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>How is a triple covalent bond represented in a Lewis structure? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2369;&#2312;&#2360; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2350;&#2375;&#2306; &#2340;&#2381;&#2352;&#2367;-&#2360;&#2361;&#2360;&#2306;&#2351;&#2379;&#2332;&#2325; &#2348;&#2306;&#2343; &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">By one line between the atoms</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2352;&#2375;&#2326;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366;</span>",
      "<span class=\"eqt\">By two lines between the atoms</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2342;&#2379; &#2352;&#2375;&#2326;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366;</span>",
      "<span class=\"eqt\">By three lines between the atoms</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2340;&#2368;&#2344; &#2352;&#2375;&#2326;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366;</span>",
      "<span class=\"eqt\">By three dots between the atoms</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2340;&#2368;&#2344; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In a <b>Lewis structure</b>, each <b>line represents a shared pair of electrons</b> (a covalent bond). </p><p>A <b>triple covalent bond</b>, where <b>three electron pairs</b> are shared between two atoms, is shown using <b>three lines</b> between the atoms. </p><p>An example is nitrogen gas (N&#8801;N), which has a strong triple bond between two nitrogen atoms.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>What is the relationship between bond energy and bond order for bonds between similar atoms?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2348;&#2306;&#2343;&#2344; &#2314;&#2352;&#2381;&#2332;&#2366; &#2324;&#2352; &#2348;&#2306;&#2343;&#2344; &#2325;&#2381;&#2352;&#2350; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2381;&#2351;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Higher bond order means lower bond energy</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330;&#2340;&#2352; &#2348;&#2306;&#2343;&#2344; &#2325;&#2381;&#2352;&#2350; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2344;&#2367;&#2350;&#2381;&#2344; &#2348;&#2306;&#2343;&#2344; &#2314;&#2352;&#2381;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Higher bond order means higher bond energy</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330;&#2340;&#2352; &#2348;&#2306;&#2343;&#2344; &#2325;&#2381;&#2352;&#2350; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2313;&#2330;&#2381;&#2330;&#2340;&#2352; &#2348;&#2306;&#2343;&#2344; &#2314;&#2352;&#2381;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Bond energy is independent of bond order</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2343;&#2344; &#2314;&#2352;&#2381;&#2332;&#2366; &#2348;&#2306;&#2343;&#2344; &#2325;&#2381;&#2352;&#2350; &#2360;&#2375; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">There is no consistent relationship</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2360;&#2369;&#2360;&#2306;&#2327;&#2340; &#2360;&#2306;&#2348;&#2306;&#2343; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Bond order</b> refers to the number of bonds (or shared electron pairs) between two atoms. As bond order increases (e.g., single &rarr; double &rarr; triple bond), <b>bond strength increases</b>, meaning <b>more energy is required to break the bond</b>. </p><p>Therefore, <b>higher bond order corresponds to higher bond energy</b>, reflecting stronger interactions between atoms.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following elements typically does NOT obey the octet rule? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2340;&#2340;&#2381;&#2357; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2309;&#2359;&#2381;&#2335;&#2325; &#2344;&#2367;&#2351;&#2350; &#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Carbon</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344;</span>",
      "<span class=\"eqt\">Oxygen</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Hydrogen</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Nitrogen</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>octet rule</b> states that atoms tend to form bonds to achieve <b>eight electrons</b> in their valence shell. </p><p>However, <b>hydrogen</b> only has one electron and can hold a maximum of <b>two electrons</b> in its 1s orbital (like helium). </p><p>Therefore, hydrogen <b>follows the duet rule</b>, not the octet rule, and is an exception.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>What is the bond order of the N&#8801;N bond in the nitrogen molecule (N&#8322;)? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2309;&#2339;&#2369; (N&#8322;) &#2350;&#2375;&#2306; N&#8801;N &#2348;&#2306;&#2343; &#2325;&#2366; &#2348;&#2306;&#2343; &#2325;&#2381;&#2352;&#2350; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In the <b>nitrogen molecule (N&#8322;)</b>, the two nitrogen atoms share <b>three pairs of electrons</b>, forming a <b>triple bond</b>. </p><p>The <b>bond order</b>, which equals the number of bonding electron pairs, is therefore <b>3</b>. This triple bond contributes to nitrogen's <b>high bond energy</b> and <b>chemical stability</b>.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following best describes the relationship between bond length and bond dissociation energy for diatomic molecules with similar bonding? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2360;&#2350;&#2366;&#2344; &#2348;&#2306;&#2343;&#2344; &#2357;&#2366;&#2354;&#2375; &#2342;&#2381;&#2357;&#2367;&#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2325; &#2309;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2306;&#2343;&#2344; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2348;&#2306;&#2343;&#2344; &#2357;&#2367;&#2351;&#2379;&#2332;&#2344; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2348;&#2306;&#2343; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Shorter bond length generally corresponds to lower bond dissociation energy</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2379;&#2335;&#2368; &#2348;&#2377;&#2344;&#2381;&#2337; &#2354;&#2306;&#2348;&#2366;&#2312; &#2310;&#2350; &#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2350; &#2348;&#2377;&#2344;&#2381;&#2337; &#2346;&#2371;&#2341;&#2325;&#2381;&#2325;&#2352;&#2339; &#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2375; &#2350;&#2375;&#2354; &#2326;&#2366;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Shorter bond length generally corresponds to higher bond dissociation energy</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2379;&#2335;&#2368; &#2348;&#2306;&#2343; &#2354;&#2306;&#2348;&#2366;&#2312; &#2310;&#2350; &#2340;&#2380;&#2352; &#2346;&#2352; &#2313;&#2330;&#2381;&#2330; &#2348;&#2306;&#2343; &#2357;&#2367;&#2351;&#2379;&#2332;&#2344; &#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2375; &#2350;&#2375;&#2354; &#2326;&#2366;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Bond length and bond dissociation energy are unrelated</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2343;&#2344; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2348;&#2306;&#2343;&#2344; &#2357;&#2367;&#2351;&#2379;&#2332;&#2344; &#2314;&#2352;&#2381;&#2332;&#2366; &#2309;&#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Longer bond length always corresponds to higher bond dissociation energy</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2350;&#2381;&#2348;&#2368; &#2348;&#2306;&#2343; &#2354;&#2306;&#2348;&#2366;&#2312; &#2361;&#2350;&#2375;&#2358;&#2366; &#2313;&#2330;&#2381;&#2330; &#2348;&#2306;&#2343; &#2357;&#2367;&#2351;&#2379;&#2332;&#2344; &#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2375; &#2350;&#2375;&#2354; &#2326;&#2366;&#2340;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Bond dissociation energy</b> is the energy required to break a bond between two atoms. </p><p>For <b>similar types of bonds</b>, a <b>shorter bond length</b> usually indicates that the atoms are held together more tightly, meaning the bond is <b>stronger</b>. </p><p>Therefore, <b>more energy is needed</b> to break it, resulting in a <b>higher bond dissociation energy</b>.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>What is the significance of achieving a noble gas electron configuration for atoms in chemical bonding? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2348;&#2306;&#2343;&#2344; &#2350;&#2375;&#2306; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2340;&#2381;&#2325;&#2371;&#2359;&#2381;&#2335; &#2327;&#2376;&#2360; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2357;&#2367;&#2344;&#2381;&#2351;&#2366;&#2360; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2350;&#2361;&#2340;&#2381;&#2357; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It makes the atoms more reactive</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2379; &#2309;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2358;&#2368;&#2354; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It generally leads to a more stable arrangement with lower energy</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2360;&#2375; &#2310;&#2350; &#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2350; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2375; &#2360;&#2366;&#2341; &#2309;&#2343;&#2367;&#2325; &#2360;&#2381;&#2341;&#2367;&#2352; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2348;&#2344;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It always results in the formation of ionic bonds</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2361;&#2350;&#2375;&#2358;&#2366; &#2310;&#2351;&#2344;&#2367;&#2325; &#2348;&#2306;&#2343;&#2379;&#2306; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It violates the octet rule for all elements</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2360;&#2349;&#2368; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2359;&#2381;&#2335;&#2325; &#2344;&#2367;&#2351;&#2350; &#2325;&#2366; &#2313;&#2354;&#2381;&#2354;&#2306;&#2328;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Atoms bond in order to achieve <b>greater stability</b>. </p><p>Having a <b>noble gas electron configuration</b> (usually 8 electrons in the valence shell for main group elements) provides a <b>stable, low-energy</b> arrangement. </p><p>This is why many atoms gain, lose, or share electrons  -  to reach that <b>stable octet</b> configuration seen in noble gases.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Match the concept related to bonding with its description:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.Octet rule</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. The number of electron pairs that hold two atoms together</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.Electronegativity</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Tendency of atoms to prefer to have eight electrons in the valence shell</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.Bond Order</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Represents the valence electrons of an element around its chemical symbol</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.Lewis Dot Symbol</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. The relative ability of an atom to attract electrons to itself in a chemical compound</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2306;&#2343;&#2344; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2325;&#2379; &#2311;&#2360;&#2325;&#2375; &#2357;&#2367;&#2357;&#2352;&#2339; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.&#2309;&#2359;&#2381;&#2335;&#2325; &#2344;&#2367;&#2351;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2342;&#2379; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2352;&#2326;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2315;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325;&#2340;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2368; &#2357;&#2376;&#2354;&#2375;&#2306;&#2360; &#2358;&#2375;&#2354; &#2350;&#2375;&#2306; &#2310;&#2336; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2352;&#2326;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.&#2348;&#2377;&#2344;&#2381;&#2337; &#2321;&#2352;&#2381;&#2337;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2325;&#2367;&#2360;&#2368; &#2340;&#2340;&#2381;&#2357; &#2325;&#2375; &#2357;&#2376;&#2354;&#2375;&#2306;&#2360; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.&#2354;&#2369;&#2312;&#2360; &#2337;&#2377;&#2335; &#2360;&#2367;&#2306;&#2348;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2351;&#2380;&#2327;&#2367;&#2325; &#2350;&#2375;&#2306; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2379; &#2309;&#2346;&#2344;&#2368; &#2323;&#2352; &#2310;&#2325;&#2352;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2325;&#2368; &#2360;&#2366;&#2346;&#2375;&#2325;&#2381;&#2359; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i &rarr; b, ii &rarr; d, iii &rarr; a, iv &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; d, iii &rarr; a, iv &rarr; c</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; a, iii &rarr; d, iv &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; a, iii &rarr; d, iv &rarr; c</span>",
      "<span class=\"eqt\">i &rarr; d, ii &rarr; b, iii &rarr; a, iv &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; d, ii &rarr; b, iii &rarr; a, iv &rarr; c</span>",
      "<span class=\"eqt\">i &rarr; a, ii &rarr; d, iii &rarr; b, iv &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; d, iii &rarr; b, iv &rarr; c</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The <b>octet rule</b> describes the tendency for atoms to have eight valence electrons.</p><p>&#183; <b>Electronegativity</b> is the ability of an atom to attract electrons in a compound.</p><p>&#183; <b>Bond order</b> is the number of electron pairs holding atoms together. </p><p>&#183; A <b>Lewis dot symbol</b> shows valence electrons as dots around the element symbol.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct regarding ionic and covalent bonds? </p><p>I. Ionic bonds typically involve a metal with a nonmetal and result from electrostatic forces between ions of opposite charge. </p><p>II. Covalent bonds typically involve one nonmetallic element with another and result from the sharing of electrons between two atoms. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2351;&#2344;&#2367;&#2325; &#2324;&#2352; &#2360;&#2361;&#2360;&#2306;&#2351;&#2379;&#2332;&#2325; &#2348;&#2306;&#2343;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2310;&#2351;&#2344;&#2367;&#2325; &#2348;&#2306;&#2343;&#2379;&#2306; &#2350;&#2375;&#2306; &#2310;&#2350; &#2340;&#2380;&#2352; &#2346;&#2352; &#2319;&#2325; &#2343;&#2366;&#2340;&#2369; &#2324;&#2352; &#2319;&#2325; &#2309;&#2343;&#2366;&#2340;&#2369; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2351;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2310;&#2357;&#2375;&#2358; &#2357;&#2366;&#2354;&#2375; &#2310;&#2351;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2360;&#2381;&#2335;&#2376;&#2335;&#2367;&#2325; &#2348;&#2354;&#2379;&#2306; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2348;&#2344;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2360;&#2361;&#2360;&#2306;&#2351;&#2379;&#2332;&#2325; &#2348;&#2306;&#2343;&#2379;&#2306; &#2350;&#2375;&#2306; &#2310;&#2350; &#2340;&#2380;&#2352; &#2346;&#2352; &#2319;&#2325; &#2309;&#2343;&#2366;&#2340;&#2369; &#2340;&#2340;&#2381;&#2357; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2375; &#2360;&#2366;&#2341; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2351;&#2375; &#2342;&#2379; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2306;&#2335;&#2357;&#2366;&#2352;&#2375; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I:</b> True. <b>Ionic bonds</b> form between a <b>metal and a nonmetal</b>, and involve a <b>transfer of electrons</b>, creating oppositely charged ions that are held together by <b>electrostatic attraction</b>.</p><p><b>Statement II:</b> True. <b>Covalent bonds</b> occur between <b>two nonmetals</b>, where atoms <b>share electron pairs</b> to achieve stable electron configurations.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following elements is most likely to form an ionic bond with chlorine?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2340;&#2340;&#2381;&#2357; &#2325;&#2381;&#2354;&#2379;&#2352;&#2368;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; &#2310;&#2351;&#2344;&#2367;&#2325; &#2348;&#2306;&#2343; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Oxygen</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Nitrogen</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Sodium</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Carbon</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Ionic bonds</b> typically form between a <b>metal and a nonmetal</b>.</p><p>&#183; <b>Chlorine</b> is a highly electronegative nonmetal that tends to <b>gain electrons</b>.</p><p>&#183; <b>Sodium</b> is a metal that readily <b>loses one electron</b> to achieve a stable octet.</p><p>When sodium (Na) gives up one electron to chlorine (Cl), they form <b>Na</b><b>&#8314;</b><b> and Cl</b><b>&#8315;</b><b> ions</b>, which are held together by <b>electrostatic attraction</b>  -  the hallmark of an <b>ionic bond</b>.</p><p>Sodium is a metal and chlorine is a nonmetal. </p><p>Ionic bonds typically form between <b>metals and nonmetals</b>, where electrons are transferred from the metal to the nonmetal.</p>",
    "question_index": 19
  }
];
