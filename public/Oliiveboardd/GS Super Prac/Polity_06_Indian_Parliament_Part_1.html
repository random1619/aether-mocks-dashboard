<body>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In India, which of the following bills CANNOT be introduced in the Rajya Sabha?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; <b>&#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</b>?</p></span>",
    "options": [
      "<span class=\"eqt\">Both constitutional amendment and ordinary bills</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2324;&#2352; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2367;&#2354; &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">The constitutional amendment bill</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;</span>",
      "<span class=\"eqt\">The money bill</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2344; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;</span>",
      "<span class=\"eqt\">The ordinary bill</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2367;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Money bills</b> cannot be introduced in Rajya Sabha. Money bills can be introduced only in the Lok Sabha with the prior recommendation of the President.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Q is the mother of T. R is the husband of P. S is the father of Q. T is the brother of P. How is P related to S?</p></span><span class=\"hqt\" style=\"display:none\">Q, T &#2325;&#2368; &#2350;&#2366;&#2305; &#2361;&#2376;&#2404; R, P &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;&#2404; S, Q &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;&#2404; T, P &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;&#2404; P, S &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Daughter's daughter</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2335;&#2368; &#2325;&#2368; &#2348;&#2375;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Mother's mother</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2305; &#2325;&#2368; &#2350;&#2366;&#2305;</span>",
      "<span class=\"eqt\">Mother's father</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2340;&#2366; &#2325;&#2375; &#2346;&#2367;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Brother's wife</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2312; &#2325;&#2368; &#2348;&#2368;&#2357;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>As Q is the mother of T,</p><p>R is the husband of P</p><p>S is the father of Q</p><p>T is the brother of P</p><p>So the family tree is represented as follows:-</p><p><img width=269 height=172 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27253/image021.png\"></p><p>So S is maternal grandfather of P</p><p>So option (a) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The oath of office to the Vice-President is administered by the ________.</p></span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2346;&#2342; &#2325;&#2368; &#2358;&#2346;&#2341; ________ &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2367;&#2354;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">Chief Justice of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>",
      "<span class=\"eqt\">President</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;</span>",
      "<span class=\"eqt\">Comptroller and Auditor General (CAG)</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2325; &#2319;&#2357;&#2306; &#2350;&#2361;&#2366;&#2354;&#2375;&#2326;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2325; (&#2360;&#2368;&#2319;&#2332;&#2368;)</span>",
      "<span class=\"eqt\">Prime Minister</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>As per Article 69 of the Constitution, the Vice-President takes the oath of office from the President of India.</p><p>&bull; Option 1: Chief Justice of India  -  Administers the oath to the President.</p><p>&bull; Option 3: CAG  -  Not involved in the swearing-in process.</p><p>&bull; Option 4: Prime Minister  -  Has no role in administering the oath.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In India, who appoints the Advocate General of a State?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2350;&#2361;&#2366;&#2343;&#2367;&#2357;&#2325;&#2381;&#2340;&#2366; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2325;&#2367;&#2344;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Governor of the State</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Prime Minister of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">President of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Chief Minister of the State</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Governor of each State shall appoint a person who is qualified to be appointed as a Judge of a High Court to be Advocate General for the State.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Constitutional Amendment Acts made the president bound by the advice of the council of ministers headed by the prime minister?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2344;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2368; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;&#2340;&#2366; &#2357;&#2366;&#2354;&#2368; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2368; &#2360;&#2354;&#2366;&#2361; &#2360;&#2375; &#2348;&#2366;&#2343;&#2381;&#2351; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">46th</span><span class=\"hqt\" style=\"display:none\">46 &#2357;&#2368;&#2306;</span>",
      "<span class=\"eqt\">42nd</span><span class=\"hqt\" style=\"display:none\">42 &#2357;&#2375;&#2306;</span>",
      "<span class=\"eqt\">48th</span><span class=\"hqt\" style=\"display:none\">48 &#2357;&#2375;&#2306;</span>",
      "<span class=\"eqt\">40th</span><span class=\"hqt\" style=\"display:none\">40 &#2357;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The 42nd Constitutional Amendment Act of 1976 made the President of India bound by the advice of the Council of Ministers headed by the Prime Minister.</p><p>&bull; This amendment explicitly stipulated that the President shall act in accordance with such advice, thereby reducing the scope for the President to act independently or delay decisions made by the Cabinet. &#8203;</p><p>&bull; 46th Amendment (1982): Enabled states to levy sales tax on consignment transfers and clarified taxation of works contracts, hire-purchase, and goods.</p><p>&bull; 48th Amendment (1984): Extended President's Rule in Punjab beyond one year due to ongoing militancy and unrest.</p><p>&bull; 40th Amendment (1976): Included 36 additional laws in the Ninth Schedule to protect them from judicial review and clarified maritime jurisdiction.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Who is considered the highest law officer of a state in India?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2357;&#2367;&#2343;&#2367; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368; &#2325;&#2367;&#2360;&#2375; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Advocate General</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2343;&#2367;&#2357;&#2325;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Attorney General</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2344;&#2381;&#2351;&#2366;&#2351;&#2357;&#2366;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Chief Justice of High Court</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>",
      "<span class=\"eqt\">Auditor General</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2354;&#2375;&#2326;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2325;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Advocate General is the highest law officer in a state, as per Article 165 of the Indian Constitution.</p><p>&#183; Attorney General  -  Highest law officer of India (Article 76).</p><p>&#183; Chief Justice of High Court  -  Head of judiciary but not a law officer.</p><p>&#183; Auditor General  -  Handles financial audits, not legal matters.</p><p>Thus, the correct answer is A) Advocate General.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article of the Constitution of India empowers a high court to issue a writ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2319;&#2325; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2379; &#2352;&#2367;&#2335; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;-</p></span>",
    "options": [
      "<span class=\"eqt\">Article 132</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 132</span>",
      "<span class=\"eqt\">Article 226</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 226</span>",
      "<span class=\"eqt\">Article 143</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 143</span>",
      "<span class=\"eqt\">Article 32</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Article 226 </b>of the Constitution empowers a high court to issue writs such as habeas corpus, mandamus, certiorari, prohibition and quo warranto. The writ jurisdiction of the high court is concurrent with the writ jurisdiction of the Supreme Court.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements are correct regarding the benefits of the retired President of India?</p><p>A. The former President of India will also been titled to a monthly pension of &#8377; 2.5lakh.</p><p>B. He/She is entitled to a secretarial staff comprising a private secretary, a personal assistant, an additional private secretary, two peons, and office expenses up to &#8377;1 lakh per annum.</p><p>C. He/She is also entitled to free highest-class travel any where in India, accompanied by one person, by rail, air, or steamer.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2375;&#2357;&#2366;&#2344;&#2367;&#2357;&#2371;&#2340;&#2381;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2354;&#2366;&#2349;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A. &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2349;&#2368; 2.5 &#2354;&#2366;&#2326; &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2350;&#2366;&#2360;&#2367;&#2325; &#2346;&#2375;&#2306;&#2358;&#2344; &#2342;&#2368; &#2332;&#2366;&#2319;&#2327;&#2368;&#2404;</p><p>B. &#2357;&#2361; &#2360;&#2330;&#2367;&#2357;&#2368;&#2351; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2357;&#2371;&#2344;&#2381;&#2342; &#2325;&#2366;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2319;&#2325; &#2344;&#2367;&#2332;&#2368; &#2360;&#2330;&#2367;&#2357;, &#2319;&#2325; &#2309;&#2346;&#2352; &#2344;&#2367;&#2332;&#2368; &#2360;&#2330;&#2367;&#2357;, &#2319;&#2325; &#2344;&#2367;&#2332;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325;, &#2342;&#2379; &#2330;&#2346;&#2352;&#2366;&#2360;&#2368; &#2361;&#2379;&#2306;&#2327;&#2375; &#2340;&#2341;&#2366; &#2360;&#2366;&#2336; &#2361;&#2332;&#2366;&#2352; &#2352;&#2369;&#2346;&#2319; &#2346;&#2381;&#2352;&#2340;&#2367;&#2357;&#2352;&#2381;&#2359; &#2340;&#2325; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2354;&#2351; &#2357;&#2381;&#2351;&#2351;&#2379;&#2306; &#2325;&#2375; &#2361;&#2325;&#2342;&#2366;&#2352; &#2361;&#2376;&#2306;&#2404;</p><p>C. &#2357;&#2361; &#2357;&#2366;&#2351;&#2369;&#2351;&#2366;&#2344;, &#2352;&#2375;&#2354; &#2351;&#2366; &#2360;&#2381;&#2335;&#2368;&#2350;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2330;&#2381;&#2330;&#2340;&#2350; &#2342;&#2352;&#2381;&#2332;&#2375; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2360;&#2366;&#2341;, &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2361;&#2368;&#2306; &#2349;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2349;&#2368; &#2361;&#2325;&#2342;&#2366;&#2352; &#2361;&#2376;&#2404;</p></span>",
    "options": [

    "correct_option_id": 3,
    "solution": "<p>&#183; The former President of India will also be entitled to a monthly pension of Rs. 2.5 lakhs.</p><p>&#183; He is entitled to a secretarial staff comprising a private secretary, a personal assistant, an additional private secretary, two peons, and office expenses up to Rs. 1 lakh per annum.</p><p>&#183; As per The President's Emoluments and Pension Act, 1951, the retired President of India is entitled to free medical attendance and treatment.</p><p>&#183; He is also entitled to free highest-class travel anywhere in India, accompanied by one person, by rail, air, or steamer.</p><p>&#183; The President of India gets a salary of Rs. 5 lakh per month. A former President of the country who demits office wither after the expiration of his term or by resignation gets a pension at the rate of 50% of the emoluments of the President per month for the rest of his or her life.</p><p>&#183; As per the 1951 Act, a retired President will, for the rest of his or her life will be entitled to use of a furnished residence (including its maintenance) without the payment of rent, two telephones (one for internet and broadband connectivity), a car or allowance to avail a car and one mobile phone with national roaming facility.</p><p>&#183; The law also states that the spouse of the former President is entitled to get a family pension at the rate of 50 percent of what a retired President gets, for the rest of his/her life, in case the President dies in office, resigns, or demits office after the end of the term.</p><p>&#183; The spouse of the former President of India is also entitled to medical attendance and treatment free of charge for the rest of his or her life. Such a spouse will be entitled to the use of a furnished residence without the payment of license fee.</p><p>&#183; He or she is entitled to a secretarial staff consisting of a private secretary and a peon, and office expenses of up to Rs. 20,000 per annum.</p><p>&#183; The spouse, quite like the retired President, is also entitled to a free telephone and a car, or such car allowance for the rest of his or her life, and is allowed 12 top class single journeys anywhere in the country by air, or steamer or rail, accompanied by a companion or a relative.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following is the most controversial Article in the Indian Constitution, which provides for President's rule in any state?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2357;&#2367;&#2357;&#2366;&#2342;&#2366;&#2360;&#2381;&#2346;&#2342; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2361;&#2376;, &#2332;&#2379; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2358;&#2366;&#2360;&#2344; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [

      "<span class=\"eqt\">Article 356</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 356</span>",
      "<span class=\"eqt\">Article 360</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 360</span>",
      "<span class=\"eqt\">Article 352</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 352</span>"

    "question": "<span class=\"eqt\"><p>Which of the following is NOT the qualification for the appointment of judges of the Supreme Court?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2351;&#2379;&#2327;&#2381;&#2351;&#2340;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A judge of high court for at least five years</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2346;&#2366;&#2306;&#2330; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2340;&#2325; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>",
      "<span class=\"eqt\">An advocate of Supreme Court for at least ten years</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2342;&#2360; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2340;&#2325; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2357;&#2325;&#2366;&#2354;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2344;&#2369;&#2349;&#2357;</span>",
      "<span class=\"eqt\">An advocate of high court for at least ten years</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2342;&#2360; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2340;&#2325; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2357;&#2325;&#2366;&#2354;&#2340; &#2325;&#2366; &#2309;&#2344;&#2369;&#2349;&#2357;</span>",
      "<span class=\"eqt\">A distinguished judge in the opinion of the President</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; &#2352;&#2366;&#2351; &#2350;&#2375;&#2306; &#2319;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2359;&#2381;&#2336;&#2367;&#2340; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; An advocate of the Supreme court for at least ten years is not the qualification for the appointment of judges of the Supreme Court.</p><p>&bull; &#8203;According to Article 124(3) of the Constitution of India, the qualifications required for appointment as a Judge of the Supreme Court are as follows:&#8203;</p><p>&#9675; Citizenship: The individual must be a citizen of India.&#8203;</p><p>&#9675; Judicial Experience: The individual must have served as a Judge of a High Court (or of two or more such courts in succession) for at least five years.&#8203;</p><p>&#9675; Advocacy Experience: Alternatively, the individual must have been an advocate of a High Court (or of two or more such courts in succession) for at least ten years.&#8203;</p><p>&#9675; Distinguished Jurist: The individual is, in the opinion of the President, a distinguished jurist.&#8203;</p>",
