    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>What is the main role of drugs in enzyme-catalyzed reactions?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2306;&#2332;&#2366;&#2311;&#2350;-&#2313;&#2340;&#2381;&#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2342;&#2357;&#2366;&#2323;&#2306; &#2325;&#2368; &#2350;&#2369;&#2326;&#2381;&#2351; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To permanently bind with enzymes and stop their function</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2332;&#2366;&#2311;&#2350;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2348;&#2306;&#2343; &#2332;&#2366;&#2344;&#2366; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2352;&#2379;&#2325;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To either increase or decrease the rate of enzyme-catalyzed reactions</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2332;&#2366;&#2311;&#2350;-&#2313;&#2340;&#2381;&#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2368; &#2342;&#2352; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2344;&#2366; &#2351;&#2366; &#2328;&#2335;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To convert enzymes into proteins</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2332;&#2366;&#2311;&#2350;&#2381;&#2360; &#2325;&#2379; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To act as a substrate for enzyme reactions</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2332;&#2366;&#2311;&#2350; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2348;&#2381;&#2360;&#2335;&#2381;&#2352;&#2375;&#2335; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Enzyme-catalyzed reactions are chemical reactions that are accelerated by enzymes, which act as biological catalysts. </p><p>&bull; Enzymes are specialized proteins that increase the rate of a reaction by lowering the activation energy required for the reaction to occur, without being consumed or permanently altered in the process.</p><p><img width=624 height=431 id=image3.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27446/image001.png\"></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is true about competitive inhibition?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366;&#2340;&#2381;&#2350;&#2325; &#2344;&#2367;&#2359;&#2375;&#2343; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The inhibitor binds at the allosteric site of the enzyme</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2352;&#2379;&#2343;&#2325; &#2319;&#2306;&#2332;&#2366;&#2311;&#2350; &#2325;&#2375; &#2319;&#2354;&#2379;&#2360;&#2381;&#2335;&#2375;&#2352;&#2367;&#2325; &#2360;&#2381;&#2341;&#2354; &#2346;&#2352; &#2348;&#2306;&#2343;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The inhibitor has a shape similar to the substrate</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2352;&#2379;&#2343;&#2325; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2360;&#2348;&#2381;&#2360;&#2335;&#2381;&#2352;&#2375;&#2335; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The enzyme is permanently deactivated</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2332;&#2366;&#2311;&#2350; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2381;&#2352;&#2367;&#2351; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The inhibitor does not affect substrate binding</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2352;&#2379;&#2343;&#2325; &#2360;&#2348;&#2381;&#2360;&#2335;&#2381;&#2352;&#2375;&#2335; &#2348;&#2306;&#2343;&#2344; &#2325;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Competitive inhibitors resemble the substrate and compete for the active site.</p><p>&bull; Competitive inhibition is a type of enzyme inhibition where an inhibitor molecule, which resembles the substrate in structure, competes with the substrate for binding to the active site of the enzyme. </p><p><img width=624 height=431 id=image4.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27446/image002.png\"></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If a drug binds to a receptor and mimics the natural messenger, which category does it fall into?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2379;&#2312; &#2342;&#2357;&#2366; &#2325;&#2367;&#2360;&#2368; &#2352;&#2367;&#2360;&#2375;&#2346;&#2381;&#2335;&#2352; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2360;&#2306;&#2342;&#2375;&#2358;&#2357;&#2366;&#2361;&#2325; &#2325;&#2368; &#2344;&#2325;&#2354; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; &#2325;&#2367;&#2360; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2350;&#2375;&#2306; &#2310;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Antagonist</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2346;&#2325;&#2381;&#2359;&#2368;</span>",
      "<span class=\"eqt\">Agonist</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2327;&#2379;&#2344;&#2367;&#2360;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Enzyme inhibitor</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2332;&#2366;&#2311;&#2350; &#2309;&#2357;&#2352;&#2379;&#2343;&#2325;</span>",
      "<span class=\"eqt\">Antacid</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2335;&#2366;&#2360;&#2367;&#2337;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Agonists bind to receptors and mimic the natural chemical messenger, activating the receptor. </p><p>&bull; An agonist drug \"turns on\" or stimulates the receptor, leading to a response similar to what the natural ligand (e.g., a hormone or neurotransmitter) would cause.</p><p><img width=624 height=467 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27446/image003.png\"></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following correctly differentiates between antiseptics and disinfectants?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2319;&#2306;&#2335;&#2368;&#2360;&#2375;&#2346;&#2381;&#2335;&#2367;&#2325;&#2381;&#2360; &#2324;&#2352; &#2325;&#2368;&#2335;&#2366;&#2339;&#2369;&#2344;&#2366;&#2358;&#2325;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2361;&#2368; &#2309;&#2306;&#2340;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Antiseptics are used on non-living surfaces, while disinfectants are used on living tissues</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2335;&#2368;&#2360;&#2375;&#2346;&#2381;&#2335;&#2367;&#2325;&#2381;&#2360; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2344;&#2367;&#2352;&#2381;&#2332;&#2368;&#2357; &#2360;&#2340;&#2361;&#2379;&#2306; &#2346;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2325;&#2368;&#2335;&#2366;&#2339;&#2369;&#2344;&#2366;&#2358;&#2325; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2332;&#2368;&#2357;&#2367;&#2340; &#2314;&#2340;&#2325;&#2379;&#2306; &#2346;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both are equally effective on living tissues</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2332;&#2368;&#2357;&#2367;&#2340; &#2314;&#2340;&#2325;&#2379;&#2306; &#2346;&#2352; &#2360;&#2350;&#2366;&#2344; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Antiseptics can be used on living tissues, while disinfectants are for non-living surfaces</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2335;&#2368;&#2360;&#2375;&#2346;&#2381;&#2335;&#2367;&#2325; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2332;&#2368;&#2357;&#2367;&#2340; &#2314;&#2340;&#2325;&#2379;&#2306; &#2346;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2325;&#2368;&#2335;&#2366;&#2339;&#2369;&#2344;&#2366;&#2358;&#2325; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2344;&#2367;&#2352;&#2381;&#2332;&#2368;&#2357; &#2360;&#2340;&#2361;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Disinfectants are weaker in action than antiseptics</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2368;&#2335;&#2366;&#2339;&#2369;&#2344;&#2366;&#2358;&#2325; &#2319;&#2306;&#2335;&#2368;&#2360;&#2375;&#2346;&#2381;&#2335;&#2367;&#2325;&#2381;&#2360; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2325;&#2350;&#2332;&#2364;&#2379;&#2352; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2352;&#2326;&#2340;&#2375; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Antiseptics are used on wounds and cuts, while disinfectants are used on non-living surfaces.</p><p>&bull; Antiseptic are chemical substances that prevent the growth of microorganisms or kill them but are safe to be applied to living tissues, such as skin or mucous membranes. They are used to reduce the risk of infection in wounds, cuts, or during surgical procedures</p><p>&bull; Disinfectants are chemical agents that destroy or inhibit the growth of microorganisms, but they are applied to inanimate objects (non-living surfaces) like floors, instruments, or furniture. They are generally stronger and may be toxic if applied to living tissues.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements about broad-spectrum antibiotics is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2381;&#2352;&#2377;&#2337;-&#2360;&#2381;&#2346;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2350; &#2319;&#2306;&#2335;&#2368;&#2348;&#2366;&#2351;&#2379;&#2335;&#2367;&#2325; &#2342;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">They target only Gram-positive bacteria</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2325;&#2375;&#2357;&#2354; &#2327;&#2381;&#2352;&#2366;&#2350;-&#2346;&#2377;&#2332;&#2367;&#2335;&#2367;&#2357; &#2348;&#2376;&#2325;&#2381;&#2335;&#2368;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2361;&#2368; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2348;&#2344;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">They target both Gram-positive and Gram-negative bacteria</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2327;&#2381;&#2352;&#2366;&#2350;-&#2346;&#2377;&#2332;&#2367;&#2335;&#2367;&#2357; &#2324;&#2352; &#2327;&#2381;&#2352;&#2366;&#2350;-&#2344;&#2375;&#2327;&#2375;&#2335;&#2367;&#2357; &#2342;&#2379;&#2344;&#2379;&#2306; &#2348;&#2376;&#2325;&#2381;&#2335;&#2368;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2354;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">They are effective against only one type of microorganism</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2325;&#2375;&#2357;&#2354; a &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350;&#2332;&#2368;&#2357; &#2325;&#2375; &#2357;&#2367;&#2352;&#2369;&#2342;&#2381;&#2343; &#2361;&#2368; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">They are ineffective against bacterial infections</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2332;&#2368;&#2357;&#2366;&#2339;&#2369; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2309;&#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Broad-spectrum antibiotics, such as Ampicillin and Amoxicillin, work against a wide range of bacteria.</p><p>&bull; (1) Incorrect  -  They affect both Gram-positive and Gram-negative bacteria.</p><p>&bull; (3) Incorrect  -  Limited-spectrum antibiotics target only one organism.</p><p>&bull; (4) Incorrect  -  They are designed to treat bacterial infections.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an example of a narcotic analgesic?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2366;&#2342;&#2325; &#2342;&#2352;&#2381;&#2342;&#2344;&#2366;&#2358;&#2325; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Aspirin</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360;&#2381;&#2346;&#2367;&#2352;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Ibuprofen</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2311;&#2348;&#2369;&#2346;&#2381;&#2352;&#2379;&#2347;&#2364;&#2375;&#2344;</span>",
      "<span class=\"eqt\">Morphine</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2347;&#2364;&#2368;&#2350; &#2325;&#2366; &#2360;&#2340;&#2381;&#2340;&#2381;&#2357;</span>",
      "<span class=\"eqt\">Naproxen</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2346;&#2381;&#2352;&#2379;&#2325;&#2381;&#2360;&#2375;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Morphine is a narcotic analgesic that induces sleep and relieves pain.</p><p>&bull; Narcotic: Refers to a class of drugs that act on the central nervous system.</p><p>&bull; Analgesic: Means they relieve pain by reducing the perception of pain in the brain.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>What is the function of tranquilizers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2335;&#2381;&#2352;&#2376;&#2306;&#2325;&#2381;&#2357;&#2367;&#2354;&#2366;&#2311;&#2332;&#2364;&#2352; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To kill bacteria</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2325;&#2381;&#2335;&#2368;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2350;&#2366;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">To relieve stress and treat mental disorders</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2344;&#2366;&#2357; &#2342;&#2370;&#2352; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2350;&#2366;&#2344;&#2360;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2366; &#2311;&#2354;&#2366;&#2332; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">To act as painkillers</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2352;&#2381;&#2342; &#2344;&#2367;&#2357;&#2366;&#2352;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To increase the immune response</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2325;&#2381;&#2359;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Tranquilizers are used for treating anxiety and mental disorders.</p><p>&bull; Antimicrobials kill bacteria.</p><p>&bull; Analgesics relieve pain.</p><p>&bull; Immuno-boosters enhance immunity.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What is the main reason why soaps do not work well in hard water?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2336;&#2379;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2360;&#2366;&#2348;&#2369;&#2344; &#2336;&#2368;&#2325; &#2360;&#2375; &#2325;&#2366;&#2350; &#2325;&#2381;&#2351;&#2379;&#2306; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2375;, &#2311;&#2360;&#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2325;&#2366;&#2352;&#2339; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Hard water contains metal ions, such as Ca &amp; Mg, that form insoluble salts with soap</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2336;&#2379;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; Ca &#2324;&#2352; Mg &#2332;&#2376;&#2360;&#2375; &#2343;&#2366;&#2340;&#2369; &#2310;&#2351;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2379; &#2360;&#2366;&#2348;&#2369;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; &#2309;&#2328;&#2369;&#2354;&#2344;&#2358;&#2368;&#2354; &#2354;&#2357;&#2339; &#2348;&#2344;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Soap molecules are broken down by hard water</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2348;&#2369;&#2344; &#2325;&#2375; &#2309;&#2339;&#2369; &#2325;&#2336;&#2379;&#2352; &#2332;&#2354; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2335;&#2370;&#2335; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Hard water neutralizes soap molecules</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2336;&#2379;&#2352; &#2332;&#2354; &#2360;&#2366;&#2348;&#2369;&#2344; &#2325;&#2375; &#2309;&#2339;&#2369;&#2323;&#2306; &#2325;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2381;&#2352;&#2367;&#2351; &#2325;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Soap molecules dissolve too quickly in hard water</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2348;&#2369;&#2344; &#2325;&#2375; &#2309;&#2339;&#2369; &#2325;&#2336;&#2379;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2348;&#2361;&#2369;&#2340; &#2332;&#2354;&#2381;&#2342;&#2368; &#2328;&#2369;&#2354; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Calcium and magnesium ions in hard water form insoluble precipitates with soap, reducing cleansing efficiency.</p><p><img width=336 height=152 id=image5.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27446/image004.png\"></p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which type of detergent is commonly used in shampoos and household cleaning agents?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2376;&#2350;&#2381;&#2346;&#2370; &#2324;&#2352; &#2328;&#2352;&#2375;&#2354;&#2370; &#2360;&#2347;&#2366;&#2312; &#2319;&#2332;&#2375;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2337;&#2367;&#2335;&#2352;&#2381;&#2332;&#2375;&#2306;&#2335; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Anionic detergents</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2366;&#2351;&#2344;&#2367;&#2325; &#2337;&#2367;&#2335;&#2352;&#2381;&#2332;&#2375;&#2306;&#2335;</span>",
      "<span class=\"eqt\">Cationic detergents</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2344;&#2366;&#2351;&#2344;&#2367;&#2325; &#2337;&#2367;&#2335;&#2352;&#2381;&#2332;&#2375;&#2306;&#2335;</span>",
      "<span class=\"eqt\">Non-ionic detergents</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2352;-&#2310;&#2351;&#2344;&#2367;&#2325; &#2337;&#2367;&#2335;&#2352;&#2381;&#2332;&#2375;&#2306;&#2335;</span>",
      "<span class=\"eqt\">Amphoteric detergents</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2349;&#2351;&#2343;&#2352;&#2381;&#2350;&#2368; &#2337;&#2367;&#2335;&#2352;&#2381;&#2332;&#2375;&#2306;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Anionic detergents, such as sodium lauryl sulfate, are used in household cleaning products.</p><p>&bull; Cationic Detergents: Synthetic detergents with a positively charged hydrophilic head, like cetyltrimethylammonium bromide, used as disinfectants.</p><p>&bull; Non-Ionic Detergents: Synthetic detergents with an uncharged hydrophilic head, like polyoxyethylene alcohols, used in mild cleansers.</p><p>&bull; Amphoteric Detergents: Synthetic detergents with both positive and negative charges, like betaines, used in gentle personal care products.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements about analgesics is incorrect?</p><p>(a) Narcotic analgesics can cause sleep when administered in medicinal doses.</p><p>(b) Non-narcotic analgesics are used for mild pain relief.</p><p>(c) Aspirin is a narcotic analgesic.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2352;&#2381;&#2342;&#2344;&#2366;&#2358;&#2325; &#2342;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p><p>(a) &#2350;&#2366;&#2342;&#2325; &#2342;&#2352;&#2381;&#2342;&#2344;&#2366;&#2358;&#2325; &#2342;&#2357;&#2366;&#2319;&#2306; &#2324;&#2359;&#2343;&#2368;&#2351; &#2326;&#2369;&#2352;&#2366;&#2325; &#2350;&#2375;&#2306; &#2342;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2344;&#2368;&#2306;&#2342; &#2354;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>(b) &#2327;&#2376;&#2352;-&#2350;&#2366;&#2342;&#2325; &#2342;&#2352;&#2381;&#2342;&#2344;&#2366;&#2358;&#2325; &#2342;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2361;&#2354;&#2381;&#2325;&#2375; &#2342;&#2352;&#2381;&#2342; &#2360;&#2375; &#2352;&#2366;&#2361;&#2340; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>(c) &#2319;&#2360;&#2381;&#2346;&#2367;&#2352;&#2367;&#2344; &#2319;&#2325; &#2350;&#2366;&#2342;&#2325; &#2342;&#2352;&#2381;&#2342;&#2344;&#2366;&#2358;&#2325; &#2342;&#2357;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Only c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c</span>",
      "<span class=\"eqt\">All of the following</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Aspirin is a non-narcotic analgesic used for mild pain relief.</p><p>&bull; A non-narcotic analgesic is a type of drug that relieves pain without causing sedation or addiction</p><p>&bull; Narcotic analgesics like morphine and its derivatives are used for severe pain management and may cause drowsiness or dependence</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which food additive prevents spoilage by inhibiting microbial growth?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2326;&#2366;&#2342;&#2381;&#2351; &#2351;&#2379;&#2332;&#2381;&#2351; &#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350;&#2332;&#2368;&#2357;&#2379;&#2306; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2379; &#2352;&#2379;&#2325;&#2325;&#2352; &#2326;&#2352;&#2366;&#2348; &#2361;&#2379;&#2344;&#2375; &#2360;&#2375; &#2348;&#2330;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Artificial sweetener</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2340;&#2381;&#2352;&#2367;&#2350; &#2360;&#2381;&#2357;&#2368;&#2335;&#2344;&#2352;</span>",
      "<span class=\"eqt\">Food preservative</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2366;&#2342;&#2381;&#2351; &#2346;&#2352;&#2367;&#2352;&#2325;&#2381;&#2359;&#2325;</span>",
      "<span class=\"eqt\">Antioxidant</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2335;&#2368;&#2321;&#2325;&#2381;&#2360;&#2367;&#2337;&#2375;&#2306;&#2335;</span>",
      "<span class=\"eqt\">Fat emulsifier</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2360;&#2366; &#2346;&#2366;&#2351;&#2360;&#2368;&#2325;&#2366;&#2352;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Food preservatives (e.g., sodium benzoate) prevent microbial spoilage. </p><p>&bull; Food preservatives are defined as chemical substances that are added to food to prevent decomposition by microbial growth or undesirable chemical changes. </p><p>&bull; They help in maintaining the freshness, nutritional value, and shelf life of food by inhibiting the growth of bacteria, fungi, or yeasts, or by preventing oxidation and rancidity.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>A drug that neutralizes excess gastric acid is likely to be classified as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2327;&#2376;&#2360;&#2381;&#2335;&#2381;&#2352;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337; &#2325;&#2379; &#2348;&#2375;&#2309;&#2360;&#2352; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2342;&#2357;&#2366; &#2325;&#2379; &#2360;&#2306;&#2349;&#2357;&#2340;&#2307; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Antihistamine</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2360;&#2381;&#2335;&#2350;&#2368;&#2344; &#2352;&#2379;&#2343;&#2368;</span>",
      "<span class=\"eqt\">Analgesic</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2352;&#2381;&#2342;&#2344;&#2366;&#2358;&#2325;</span>",
      "<span class=\"eqt\">Antacid</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2335;&#2366;&#2360;&#2367;&#2337;</span>",
      "<span class=\"eqt\">Antibiotic</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2335;&#2368;&#2348;&#2366;&#2351;&#2379;&#2335;&#2367;&#2325; &#2342;&#2357;&#2366;&#2323;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Antacids (e.g., gelusil) neutralize gastric acid.</p><p>&bull; Antacid: Substances that neutralize excess stomach acid to relieve acidity, indigestion, or heartburn. They are typically bases or basic salts, with examples like magnesium hydroxide and aluminium hydroxide.</p><p>&bull; Antihistamine: Chemicals that inhibit the action of histamine, a compound released during allergic reactions, thus relieving symptoms like sneezing, itching, or nasal congestion. Examples include terfenadine (e.g., Seldane) and cetirizine.</p><p>&bull; Analgesic: Drugs that reduce pain without causing unconsciousness or significant mental impairment. They can be narcotic (e.g., morphine) or non-narcotic (e.g., aspirin, ibuprofen), with the latter also often having anti-inflammatory effects.</p><p>&bull; Antibiotic: Chemical substances produced by microorganisms (or synthesized) that kill or inhibit the growth of other microorganisms, used to treat bacterial infections. Examples include penicillin, chloramphenicol, and tetracycline, with penicillin noted as a narrow-spectrum antibiotic discovered by Alexander Fleming.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following antibiotics is a broad-spectrum antibiotic?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2319;&#2306;&#2335;&#2368;&#2348;&#2366;&#2351;&#2379;&#2335;&#2367;&#2325; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2360;&#2381;&#2346;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2350; &#2319;&#2306;&#2335;&#2368;&#2348;&#2366;&#2351;&#2379;&#2335;&#2367;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Penicillin G</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2344;&#2367;&#2360;&#2367;&#2354;&#2367;&#2344; &#2332;&#2368;</span>",
      "<span class=\"eqt\">Ampicillin</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;&#2381;&#2346;&#2368;&#2360;&#2367;&#2354;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Bithional</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2341;&#2367;&#2323;&#2344;&#2354;</span>",
      "<span class=\"eqt\">Soframicine</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2347;&#2381;&#2352;&#2366;&#2350;&#2366;&#2311;&#2360;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; A broad-spectrum antibiotic is defined as an antibiotic that is effective against a wide range of disease-causing bacteria, including both Gram-positive and Gram-negative bacteria. </p><p>&bull; These antibiotics can kill or inhibit the growth of multiple types of bacteria, making them useful when the specific causative organism is unknown. </p><p>&bull; <b>Ampicillin is an example of such an antibiotic.</b></p><p>&bull; Penicillin G is a narrow-spectrum antibiotic.</p><p>&bull; Bithional is an antiseptic, not an antibiotic.</p><p>&bull; Soframicine is also an antiseptic used for wounds.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following drugs is an example of an antagonist?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2342;&#2357;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2346;&#2325;&#2381;&#2359;&#2368; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A drug that activates a receptor</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2342;&#2357;&#2366; &#2332;&#2379; &#2352;&#2367;&#2360;&#2375;&#2346;&#2381;&#2335;&#2352; &#2325;&#2379; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A drug that inhibits the receptor's natural function</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2342;&#2357;&#2366; &#2332;&#2379; &#2352;&#2367;&#2360;&#2375;&#2346;&#2381;&#2335;&#2352; &#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2348;&#2366;&#2343;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A drug that increases enzyme activity</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2342;&#2357;&#2366; &#2332;&#2379; &#2319;&#2306;&#2332;&#2366;&#2311;&#2350; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A drug that mimics a chemical messenger</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2342;&#2357;&#2366; &#2332;&#2379; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2360;&#2306;&#2342;&#2375;&#2358;&#2357;&#2366;&#2361;&#2325; &#2325;&#2368; &#2344;&#2325;&#2354; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Antagonists are drugs that block the function of a receptor, preventing its natural action.</p><p><img width=624 height=467 id=image1.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27446/image005.png\"></p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is true about antibiotics?</p><p>(a) Bactericidal drugs inhibit bacterial growth without killing them.</p><p>(b) Erythromycin is a bacteriostatic antibiotic.</p><p>(c) Penicillin is a broad-spectrum antibiotic.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2319;&#2306;&#2335;&#2368;&#2348;&#2366;&#2351;&#2379;&#2335;&#2367;&#2325; &#2342;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>(a) &#2332;&#2368;&#2357;&#2366;&#2339;&#2369;&#2344;&#2366;&#2358;&#2325; &#2342;&#2357;&#2366;&#2319;&#2306; &#2348;&#2376;&#2325;&#2381;&#2335;&#2368;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2350;&#2366;&#2352;&#2375; &#2348;&#2367;&#2344;&#2366; &#2313;&#2344;&#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2379; &#2352;&#2379;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>(b) &#2319;&#2352;&#2367;&#2341;&#2381;&#2352;&#2379;&#2350;&#2366;&#2311;&#2360;&#2367;&#2344; &#2319;&#2325; &#2348;&#2376;&#2325;&#2381;&#2335;&#2368;&#2352;&#2367;&#2351;&#2379;&#2360;&#2381;&#2335;&#2375;&#2335;&#2367;&#2325; &#2319;&#2306;&#2335;&#2368;&#2348;&#2366;&#2351;&#2379;&#2335;&#2367;&#2325; &#2361;&#2376;&#2404;</p><p>(c) &#2346;&#2375;&#2344;&#2367;&#2360;&#2367;&#2354;&#2367;&#2344; &#2319;&#2325; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2360;&#2381;&#2346;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2350; &#2319;&#2306;&#2335;&#2368;&#2348;&#2366;&#2351;&#2379;&#2335;&#2367;&#2325; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">All of the following</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2349;&#2368;</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c</span>",
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Bactericidal drugs kill bacteria (e.g., penicillin, aminoglycosides).</p><p>&bull; Bacteriostatic drugs inhibit bacterial growth without killing them (e.g., erythromycin, tetracycline).</p><p>&bull; Penicillin G is narrow-spectrum.</p><p>&bull; Antibiotic: Chemical substances produced by microorganisms (or synthesized) that kill or inhibit the growth of other microorganisms, used to treat bacterial infections. Examples include penicillin, chloramphenicol, and tetracycline, with penicillin noted as a narrow-spectrum antibiotic discovered by Alexander Fleming.</p>",
    "question_index": 14
