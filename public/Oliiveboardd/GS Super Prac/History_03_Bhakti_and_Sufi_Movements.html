<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The seventh to ninth centuries saw the emergence of new religious movements led by the ________ (saints devoted to Shiva) and ________ (saints devoted to Vishnu) in South India.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2340;&#2357;&#2368;&#2306; &#2360;&#2375; &#2344;&#2380;&#2357;&#2368;&#2306; &#2358;&#2340;&#2366;&#2348;&#2381;&#2342;&#2368; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; ________ (&#2358;&#2367;&#2357; &#2325;&#2379; &#2360;&#2350;&#2352;&#2381;&#2346;&#2367;&#2340; &#2360;&#2306;&#2340;) &#2324;&#2352; ________ (&#2357;&#2367;&#2359;&#2381;&#2339;&#2369; &#2325;&#2379; &#2360;&#2350;&#2352;&#2381;&#2346;&#2367;&#2340; &#2360;&#2306;&#2340;) &#2325;&#2375; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2350;&#2375;&#2306; &#2344;&#2319; &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;&#2379;&#2306; &#2325;&#2366; &#2313;&#2342;&#2351; &#2361;&#2369;&#2310;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Siddhacharas; Nathpanthis</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2330;&#2366;&#2352;; &#2344;&#2366;&#2341;&#2346;&#2306;&#2341;&#2368;</span>",
      "<span class=\"eqt\">Yogis; Sufis</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2379;&#2327;&#2368;; &#2360;&#2370;&#2347;&#2368;</span>",
      "<span class=\"eqt\">Nayanars; Alvars</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2351;&#2344;&#2366;&#2352;; &#2309;&#2354;&#2357;&#2352;</span>",
      "<span class=\"eqt\">Alvars; Nayanars</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2357;&#2352;; &#2344;&#2351;&#2344;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In South India during the seventh to ninth centuries, new religious movements were led by the <b>Nayanars</b> (devoted to Shiva) and <b>Alvars</b> (devoted to Vishnu).</p><p>During the seventh to ninth centuries in South India, two major Bhakti movements emerged:</p><p>&bull; The <b>Nayanars</b> were saints devoted to <b>Shiva</b>.</p><p>&bull; The <b>Alvars</b> were saints devoted to <b>Vishnu</b>.</p><p>These movements played a significant role in spreading devotional worship (Bhakti) and composing hymns in Tamil, influencing later Hindu traditions.</p><p>The other options are incorrect because:</p><p>&bull; <b>Siddhacharas</b> and <b>Nathpanthis</b> were associated with Tantric and yogic traditions, not Bhakti.</p><p>&bull; <b>Yogis</b> and <b>Sufis</b> were ascetic and mystical traditions, not part of the early South Indian Bhakti movement.</p><p>&bull; <b>Alvars; Nayanars</b> is the reverse order, and the question specifies Nayanars (Shiva devotees) first.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a compilation of the songs of the Alvars?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2354;&#2357;&#2352; &#2325;&#2375; &#2327;&#2368;&#2340;&#2379;&#2306; &#2325;&#2366; &#2360;&#2306;&#2325;&#2354;&#2344; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tevaram</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2375;&#2357;&#2352;&#2350;</span>",
      "<span class=\"eqt\">Divya Prabandham</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2357;&#2381;&#2351; &#2346;&#2381;&#2352;&#2348;&#2344;&#2381;&#2343;&#2350;</span>",
      "<span class=\"eqt\">Tiruvacakam</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2367;&#2352;&#2369;&#2357;&#2325;&#2381;&#2325;&#2350;</span>",
      "<span class=\"eqt\">Vachanas</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2330;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The songs of the Alvars were compiled in the <b>Divya Prabandham</b>.</p><p>The <b>Divya Prabandham</b> is a collection of Tamil hymns composed by the <b>Alvars</b>, the Vaishnava saint-poets devoted to Vishnu.</p><p>It is considered a sacred scripture in the Sri Vaishnavism tradition.</p><p>The other options are related to different traditions:</p><p>&bull; <b>Tevaram</b>  -  A compilation of hymns by the <b>Nayanars</b> (Shiva devotees).</p><p>&bull; <b>Tiruvacakam</b>  -  A famous Shaiva devotional text composed by <b>Manikkavacakar</b>, a later Nayanar saint.</p><p>&bull; <b>Vachanas</b>  -  Devotional verses in Kannada composed by <b>Sharana saints</b> of the Virashaiva (Lingayat) tradition.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Shankara, born in Kerala in the eighth century, was an advocate of ________, the doctrine of the oneness of the individual soul and the Supreme God.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2336;&#2357;&#2368;&#2306; &#2358;&#2340;&#2366;&#2348;&#2381;&#2342;&#2368; &#2350;&#2375;&#2306; &#2325;&#2375;&#2352;&#2354; &#2350;&#2375;&#2306; &#2332;&#2344;&#2381;&#2350;&#2375; &#2358;&#2306;&#2325;&#2352;&#2366;&#2330;&#2366;&#2352;&#2381;&#2351; ________, &#2309;&#2352;&#2381;&#2341;&#2366;&#2340;&#2381; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2310;&#2340;&#2381;&#2350;&#2366; &#2324;&#2352; &#2346;&#2352;&#2350;&#2346;&#2367;&#2340;&#2366; &#2346;&#2352;&#2350;&#2366;&#2340;&#2381;&#2350;&#2366; &#2325;&#2368; &#2319;&#2325;&#2340;&#2366; &#2325;&#2375; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2375; &#2360;&#2350;&#2352;&#2381;&#2341;&#2325; &#2341;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Dvaita</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2376;&#2340;</span>",
      "<span class=\"eqt\">Vishishtadvaita</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335;&#2366;&#2342;&#2381;&#2357;&#2376;&#2340;</span>",
      "<span class=\"eqt\">Advaita</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2342;&#2381;&#2357;&#2376;&#2340;</span>",
      "<span class=\"eqt\">Shuddhadvaita</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2342;&#2381;&#2343;&#2366;&#2342;&#2381;&#2357;&#2376;&#2340;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Adi Shankara (8th century CE)</b>, born in Kerala, was the foremost proponent of <b>Advaita Vedanta</b>, a philosophy that emphasizes the <b>non-dual (advaita)</b> nature of reality. According to this doctrine:</p><p>&bull; The individual soul (<b>Atman</b>) and the Supreme Reality (<b>Brahman</b>) are one and the same.</p><p>&bull; The perceived world of multiplicity is an illusion (<b>Maya</b>), and true knowledge (<b>Jnana</b>) leads to liberation (<b>Moksha</b>).</p><p><b>Further insights:</b></p><p>&bull; <b>Dvaita</b>  -  Dualism, propagated by <b>Madhvacharya</b>, which maintains a strict distinction between God and souls.</p><p>&bull; <b>Vishishtadvaita</b>  -  Qualified non-dualism, taught by <b>Ramanujacharya</b>, where souls and God are distinct but unified in a relational way.</p><p>&bull; <b>Shuddhadvaita</b>  -  Pure non-dualism, associated with <b>Vallabhacharya</b>, which stresses God's absolute oneness but with distinctions in divine manifestations.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Ramanuja, who was deeply influenced by the Alvars, believed that the best means of attaining salvation was through intense devotion to ________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2350;&#2366;&#2344;&#2369;&#2332;, &#2332;&#2379; &#2309;&#2354;&#2357;&#2352;&#2379;&#2306; &#2360;&#2375; &#2348;&#2361;&#2369;&#2340; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2341;&#2375;, &#2325;&#2366; &#2350;&#2366;&#2344;&#2344;&#2366; &#8203;&#8203;&#2341;&#2366; &#2325;&#2367; &#2350;&#2379;&#2325;&#2381;&#2359; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2360;&#2366;&#2343;&#2344; ________ &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2327;&#2361;&#2344; &#2349;&#2325;&#2381;&#2340;&#2367; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Shiva</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2357;</span>",
      "<span class=\"eqt\">Vishnu</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2359;&#2381;&#2339;&#2369;</span>",
      "<span class=\"eqt\">Brahma</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Durga</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2369;&#2352;&#2381;&#2327;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Ramanuja believed that the best means of attaining salvation was through intense devotion to <b>Vishnu</b>.</p><p><b>Ramanuja (11th - 12th century CE)</b>, a key philosopher in the Sri Vaishnavism tradition, was deeply influenced by the devotional hymns of the <b>Alvars</b> (Vaishnava saints).</p><p>He propagated <b>Vishishtadvaita (Qualified Non-Dualism)</b>, which emphasized:</p><p>&bull; <b>Intense devotion (Bhakti) to Vishnu (or his avatar, Krishna)</b> as the path to salvation.</p><p>&bull; The soul's loving surrender (<b>Prapatti</b>) to Vishnu for liberation (<b>Moksha</b>).</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The Virashaiva movement, initiated by Basavanna in Karnataka, strongly argued against ________ ideas about caste and the treatment of women.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325; &#2350;&#2375;&#2306; &#2348;&#2360;&#2357;&#2344;&#2381;&#2344;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2319; &#2327;&#2319; &#2357;&#2368;&#2352;&#2358;&#2376;&#2357; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2344;&#2375; &#2332;&#2366;&#2340;&#2367; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2357;&#2381;&#2351;&#2357;&#2361;&#2366;&#2352; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; ________ &#2357;&#2367;&#2330;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2332;&#2379;&#2352;&#2342;&#2366;&#2352; &#2340;&#2352;&#2381;&#2325; &#2342;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Buddhist</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2380;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">Jain</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2376;&#2344;</span>",
      "<span class=\"eqt\">Brahmanical</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2366;&#2361;&#2381;&#2350;&#2339;&#2357;&#2366;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Sufi</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2347;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The <b>Virashaiva (Lingayat) movement</b>, initiated by <b>Basavanna</b> in <b>Karnataka</b>, strongly opposed <b>Brahmanical ideas</b> about caste and the treatment of women.</p><p>&bull; It emphasized <b>equality, devotion to Lord Shiva, and rejection of caste discrimination and rituals.</b></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Bhakti reformer with the region they were prominent in:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column A(Bhakti reformer)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column B(Region)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. Chaitanya</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. North India</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. Ramananda</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Bengal</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. Guru Nanak</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Maharashtra</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. Dnyanadeva(Gnanadeva)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Punjab(near Lahore)</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2325;&#2381;&#2340;&#2367; &#2360;&#2369;&#2343;&#2366;&#2352;&#2325; &#2325;&#2366; &#2313;&#2360; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2357;&#2375; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2341;&#2375;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A(&#2349;&#2325;&#2381;&#2340;&#2367; &#2360;&#2369;&#2343;&#2366;&#2352;&#2325;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B(&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. &#2330;&#2376;&#2340;&#2344;&#2381;&#2351;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2313;&#2340;&#2381;&#2340;&#2352; &#2349;&#2366;&#2352;&#2340;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. &#2352;&#2366;&#2350;&#2366;&#2344;&#2306;&#2342;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2348;&#2306;&#2327;&#2366;&#2354;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. &#2327;&#2369;&#2352;&#2369; &#2344;&#2366;&#2344;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. &#2332;&#2381;&#2334;&#2366;&#2344;&#2342;&#2375;&#2357;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2346;&#2306;&#2332;&#2366;&#2348;(&#2354;&#2366;&#2361;&#2380;&#2352; &#2325;&#2375; &#2346;&#2366;&#2360;)</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">I &rarr; a, II &rarr; b, III &rarr; c, IV &rarr; d</span><span class=\"hqt\" style=\"display:none\">I &rarr; a, II &rarr; b, III &rarr; c, IV &rarr; d</span>",
      "<span class=\"eqt\">I &rarr; b, II &rarr; a, III &rarr; d, IV &rarr; c</span><span class=\"hqt\" style=\"display:none\">I &rarr; b, II &rarr; a, III &rarr; d, IV &rarr; c</span>",
      "<span class=\"eqt\">I &rarr; b, II &rarr; a, III &rarr; c, IV &rarr; d</span><span class=\"hqt\" style=\"display:none\">I &rarr; b, II &rarr; a, III &rarr; c, IV &rarr; d</span>",
      "<span class=\"eqt\">I &rarr; c, II &rarr; d, III &rarr; a, IV &rarr; b</span><span class=\"hqt\" style=\"display:none\">I &rarr; c, II &rarr; d, III &rarr; a, IV &rarr; b</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Chaitanya</b> was a well-known saint and reformer of <b>Bengal</b> who popularized the Krishna cult.</p><p>&bull; <b>Ramananda</b> preached his principles in Hindi at Banaras and Agra, which are in <b>North India</b>.</p><p>&bull; <b>Guru Nanak</b> was born near Lahore in <b>Punjab</b> and was the founder of the Sikh religion.</p><p>&bull; <b>Gnanadeva</b> was prominent in <b>Maharashtra</b> in the thirteenth century and is credited with writing a commentary on the Bhagavad Gita called Gyaneshwari.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which Vaishnavite Bhakti preacher was associated with the Telangana region along with Nimbarka?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2376;&#2359;&#2381;&#2339;&#2357; &#2349;&#2325;&#2381;&#2340;&#2367; &#2346;&#2381;&#2352;&#2330;&#2366;&#2352;&#2325; &#2344;&#2367;&#2350;&#2381;&#2348;&#2366;&#2352;&#2381;&#2325; &#2325;&#2375; &#2360;&#2366;&#2341; &#2340;&#2375;&#2354;&#2306;&#2327;&#2366;&#2344;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tulsidas</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2369;&#2354;&#2360;&#2368;&#2342;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Surdas</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2352;&#2342;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Mirabai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2368;&#2352;&#2366;&#2348;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Vallabhacharya</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2354;&#2381;&#2354;&#2349;&#2366;&#2330;&#2366;&#2352;&#2381;&#2351;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; In the thirteenth century, Madhava from Kannada region propagated Dvaita or dualism of Jivatma and Paramatma.</p><p>&bull; According to his philosophy, the world is not an illusion but a reality. God, soul, matter are unique in nature.</p><p>&bull; Nimbarka and <b>Vallabhacharya</b> were also other preachers of Vaishnavite Bhakti in the Telungana region.</p><p>&bull; Surdas was the disciple of Vallabhacharya and he popularized Krishna cult in north India.</p><p>&bull; Mirabai was a great devotee of Krishna and she became popular in Rajasthan for her bhajans.</p><p>&bull; Tulsidas was a worshipper of Rama and composed the famous Ramcharitmanas, the Hindi version of Ramayana.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Kabir was brought up in a family of Muslim ________ or weavers settled in or near Benares (Varanasi).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2348;&#2368;&#2352; &#2325;&#2366; &#2346;&#2366;&#2354;&#2344;-&#2346;&#2379;&#2359;&#2339; &#2348;&#2344;&#2366;&#2352;&#2360; (&#2357;&#2366;&#2352;&#2366;&#2339;&#2360;&#2368;) &#2350;&#2375;&#2306; &#2351;&#2366; &#2313;&#2360;&#2325;&#2375; &#2310;&#2360;&#2346;&#2366;&#2360; &#2348;&#2360;&#2375; &#2319;&#2325; &#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; ________&#2351;&#2366; &#2348;&#2369;&#2344;&#2325;&#2352; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2350;&#2375;&#2306; &#2361;&#2369;&#2310; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">julahas</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2369;&#2354;&#2366;&#2361;&#2360;</span>",
      "<span class=\"eqt\">faqirs</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2325;&#2368;&#2352;</span>",
      "<span class=\"eqt\">ulemas</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2354;&#2375;&#2350;&#2366;</span>",
      "<span class=\"eqt\">qazis</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2332;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Kabir, the 15th-century mystic poet and saint, was raised in a family of <b>Muslim julahas (weavers)</b> near Varanasi. The term \"Julaha\" refers to a traditional weaving community in North India.</p><p>The vast collection of verses attributed to Kabir are called <b>Bijak</b> and <b>Sakhi</b>.</p><p>&bull; <b>Faqirs</b>  -  Refers to Muslim ascetics or Sufi mendicants, not a weaving community.</p><p>&bull; <b>Ulemas</b>  -  Islamic scholars, unrelated to Kabir's family background.</p><p>&bull; <b>Qazis</b>  -  Muslim judges, not associated with Kabir's upbringing.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Baba Guru Nanak established a centre at ________ (Dera Baba Nanak on the river Ravi).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2366;&#2348;&#2366; &#2327;&#2369;&#2352;&#2369; &#2344;&#2366;&#2344;&#2325; &#2344;&#2375; ________ (&#2352;&#2366;&#2357;&#2368; &#2344;&#2342;&#2368; &#2346;&#2352; &#2337;&#2375;&#2352;&#2366; &#2348;&#2366;&#2348;&#2366; &#2344;&#2366;&#2344;&#2325;) &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Ayodhya</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2351;&#2379;&#2343;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Kartarpur</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2340;&#2366;&#2352;&#2346;&#2369;&#2352;</span>",
      "<span class=\"eqt\">Talwandi</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2354;&#2357;&#2306;&#2337;&#2368;</span>",
      "<span class=\"eqt\">Amritsar</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2371;&#2340;&#2360;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Baba Guru Nanak established a centre at <b>Kartarpur</b>. He emphasized the importance of <b>the worship of one God</b>, welfare of others, and purity of conduct.</p><p>&bull; The common kitchen was known as <b>langar</b>. Guru Angad compiled the compositions in a new script known as <b>Gurmukhi</b>.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The holy scripture of the Sikhs is now known as the ________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2367;&#2326;&#2379;&#2306; &#2325;&#2375; &#2346;&#2357;&#2367;&#2340;&#2381;&#2352; &#2343;&#2352;&#2381;&#2350;&#2327;&#2381;&#2352;&#2306;&#2341; &#2325;&#2379; &#2309;&#2348; ________ &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Kitab-i-Aqdas</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2340;&#2366;&#2348;-&#2319;-Aqdas</span>",
      "<span class=\"eqt\">Zend Avesta</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2364;&#2375;&#2306;&#2337; &#2309;&#2357;&#2375;&#2360;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Guru Granth Sahib</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2369; &#2327;&#2381;&#2352;&#2306;&#2341; &#2360;&#2366;&#2361;&#2367;&#2348;</span>",
      "<span class=\"eqt\">Tripitaka</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2346;&#2367;&#2335;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The <b>Guru Granth Sahib</b> is the central religious scripture of Sikhism, revered as the eternal Guru by Sikhs.</p><p>&bull; It was compiled by Guru Arjan Dev (5th Sikh Guru) in 1604 and later finalized by Guru Gobind Singh (10th Guru).</p><p>&bull; It contains hymns (shabads) from Sikh Gurus, Bhakti saints like Kabir and Namdev, and Sufi mystics, emphasizing devotion to one God and righteous living.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Mughal rulers issued a farman (imperial order) in 1598 allowing the Jesuit fathers to build a church in Khambat?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2350;&#2369;&#2327;&#2354; &#2358;&#2366;&#2360;&#2325; &#2344;&#2375; 1598 &#2350;&#2375;&#2306; &#2319;&#2325; &#2347;&#2352;&#2350;&#2366;&#2344; (&#2358;&#2366;&#2361;&#2368; &#2310;&#2342;&#2375;&#2358;) &#2332;&#2366;&#2352;&#2368; &#2325;&#2352; &#2332;&#2375;&#2360;&#2369;&#2311;&#2335; &#2346;&#2366;&#2342;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2326;&#2306;&#2348;&#2366;&#2340; &#2350;&#2375;&#2306; &#2319;&#2325; &#2330;&#2352;&#2381;&#2330; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Aurangzeb</span><span class=\"hqt\" style=\"display:none\">&#2324;&#2352;&#2306;&#2327;&#2332;&#2375;&#2348;</span>",
      "<span class=\"eqt\">Shah Jahan</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2361;&#2332;&#2361;&#2366;&#2305;</span>",
      "<span class=\"eqt\">Akbar</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2348;&#2352;</span>",
      "<span class=\"eqt\">Jahangir</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2361;&#2366;&#2306;&#2327;&#2368;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Emperor Akbar</b> (r. 1556 - 1605) was known for his policy of religious tolerance and openness to interfaith dialogue.</p><p>&bull; In <b>1598</b>, he issued a <b>farman (imperial order)</b> permitting Jesuit missionaries to construct a church in <b>Khambat (Cambay, Gujarat)</b>.</p><p>&bull; This aligns with his broader engagement with Christianity, including debates at the Ibadat Khana (House of Worship) in Fatehpur Sikri.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was an important centre of the Bhakti tradition in Maharashtra?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2350;&#2375;&#2306; &#2349;&#2325;&#2381;&#2340;&#2367; &#2346;&#2352;&#2306;&#2346;&#2352;&#2366; &#2325;&#2366; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ayodhya</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2351;&#2379;&#2343;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Mathura</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2341;&#2369;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Pandharpur</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2338;&#2352;&#2346;&#2369;&#2352;</span>",
      "<span class=\"eqt\">Kanchi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2306;&#2330;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Pandharpur</b> in Maharashtra was a major center of the <b>Bhakti tradition</b>, particularly associated with the <b>Varkari sect</b>, which worships Lord Vitthala (a form of Vishnu/Krishna).</p><p>&bull; Prominent saints like <b>Jnaneshwar, Namdev, Tukaram, and Eknath</b> were part of this movement, emphasizing devotion through hymns (abhangas) and pilgrimages to Pandharpur.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following best describes the form of bhakti advocated by Baba Guru Nanak?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2348;&#2366;&#2348;&#2366; &#2327;&#2369;&#2352;&#2369; &#2344;&#2366;&#2344;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2367;&#2340; &#2349;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Saguna bhakti, emphasizing the worship of specific deities like Vishnu and Shiva.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2327;&#2369;&#2339; &#2349;&#2325;&#2381;&#2340;&#2367;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2357;&#2367;&#2359;&#2381;&#2339;&#2369; &#2324;&#2352; &#2358;&#2367;&#2357; &#2332;&#2376;&#2360;&#2375; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2342;&#2375;&#2357;&#2340;&#2366;&#2323;&#2306; &#2325;&#2368; &#2346;&#2370;&#2332;&#2366; &#2346;&#2352; &#2348;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A synthesis of Vedic rituals and local customs.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2376;&#2342;&#2367;&#2325; &#2309;&#2344;&#2369;&#2359;&#2381;&#2336;&#2366;&#2344;&#2379;&#2306; &#2324;&#2352; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2352;&#2368;&#2340;&#2367;-&#2352;&#2367;&#2357;&#2366;&#2332;&#2379;&#2306; &#2325;&#2366; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339;&#2404;</span>",
      "<span class=\"eqt\">Nirguna bhakti, firmly repudiating external religious practices and worshipping a formless Absolute.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2327;&#2369;&#2339; &#2349;&#2325;&#2381;&#2340;&#2367;, &#2348;&#2366;&#2361;&#2381;&#2351; &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2346;&#2381;&#2352;&#2341;&#2366;&#2323;&#2306; &#2325;&#2366; &#2342;&#2371;&#2338;&#2364;&#2340;&#2366;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2326;&#2306;&#2337;&#2344; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2344;&#2367;&#2352;&#2366;&#2325;&#2366;&#2352; &#2346;&#2352;&#2350; &#2360;&#2340;&#2381;&#2340;&#2366; &#2325;&#2368; &#2346;&#2370;&#2332;&#2366; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Primarily focused on elaborate temple worship and offerings.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2357;&#2367;&#2360;&#2381;&#2340;&#2371;&#2340; &#2350;&#2306;&#2342;&#2367;&#2352; &#2346;&#2370;&#2332;&#2366; &#2324;&#2352; &#2346;&#2381;&#2352;&#2360;&#2366;&#2342; &#2346;&#2352; &#2343;&#2381;&#2351;&#2366;&#2344; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The message of <b>Baba Guru Nanak</b> suggests that he advocated a form of <b>nirguna bhakti</b>. He firmly repudiated the external practices of the religions he saw around him and believed the Absolute had no gender or form.</p><p>&bull; <b>Baba Guru Nanak</b> was born in a village called Nankana Sahib near the river <b>Ravi</b> in the predominantly Muslim Punjab.</p><p>&bull; <b>Baba Guru Nanak</b> organised his followers into a community. He set up rules for <b>congregational worship (sangat) involving collective recitation</b>.</p><p>&bull; <b>Baba Guru Nanak</b> expressed his ideas through hymns called \"<b>shabad</b>\" in Punjabi, the language of the region.</p><p>&bull; The fifth preceptor, Guru Arjan, <b>compiled Baba Guru Nanak's hymns along with those of his four successors and other religious poets like Baba Farid, Ravidas and Kabir in the Adi Granth Sahib</b>.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>The Bhakti movement was characterized by which of the following features?</p><p>I. Emphasis on devotion to a personal god</p><p>II. Rejection of caste distinctions</p><p>III. Strict adherence to Vedic rituals</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2325;&#2381;&#2340;&#2367; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2341;&#2368;?</p><p>I. &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2312;&#2358;&#2381;&#2357;&#2352; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2360;&#2350;&#2352;&#2381;&#2346;&#2339; &#2346;&#2352; &#2332;&#2379;&#2352;</p><p>II. &#2332;&#2366;&#2340;&#2367; &#2349;&#2375;&#2342; &#2325;&#2368; &#2309;&#2360;&#2381;&#2357;&#2368;&#2325;&#2371;&#2340;&#2367;</p><p>III. &#2357;&#2376;&#2342;&#2367;&#2325; &#2309;&#2344;&#2369;&#2359;&#2381;&#2336;&#2366;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2326;&#2381;&#2340; &#2346;&#2366;&#2354;&#2344;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Solution:</b></p><p>&bull; <b>Emphasis on devotion to a personal god</b> - Bhakti saints focused on loving devotion (bhakti) to deities like Vishnu, Shiva or their incarnations.</p><p>&bull; <b>Rejection of caste distinctions</b> - Many Bhakti saints openly criticized the caste system and welcomed followers from all backgrounds.</p><p>&bull; However, it did not strictly adhere to Vedic rituals; rather, it focused on personal devotion over ritualistic practices.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Sufi Saint with the center of their activities:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I(Sufi Saints)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II(Center of their activities)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. Khwaja Muinuddin Chishti</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.Delhi</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. Bahauddin Zakariya</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.Ajmer</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. Nizamuddin Auliya</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.Lahore</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. Shaikh Ismail</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.Multan</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2347;&#2368; &#2360;&#2306;&#2340;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2368; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; I (&#2360;&#2370;&#2347;&#2368; &#2360;&#2306;&#2340;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; II (&#2313;&#2344;&#2325;&#2368; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. &#2326;&#2381;&#2357;&#2366;&#2332;&#2366; &#2350;&#2369;&#2312;&#2344;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2330;&#2367;&#2358;&#2381;&#2340;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.&#2342;&#2367;&#2354;&#2381;&#2354;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. &#2348;&#2361;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2332;&#2364;&#2325;&#2366;&#2352;&#2367;&#2351;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.&#2309;&#2332;&#2350;&#2375;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. &#2344;&#2367;&#2332;&#2364;&#2366;&#2350;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2324;&#2354;&#2367;&#2351;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.&#2354;&#2366;&#2361;&#2380;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. &#2358;&#2375;&#2326; &#2311;&#2360;&#2381;&#2350;&#2366;&#2311;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.&#2350;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">I &rarr; a, II &rarr; b, III &rarr; c, IV &rarr; d</span><span class=\"hqt\" style=\"display:none\">I &rarr; a, II &rarr; b, III &rarr; c, IV &rarr; d</span>",
      "<span class=\"eqt\">I &rarr; b, II &rarr; d, III &rarr; a, IV &rarr; c</span><span class=\"hqt\" style=\"display:none\">I &rarr; b, II &rarr; d, III &rarr; a, IV &rarr; c</span>",
      "<span class=\"eqt\">I &rarr; c, II &rarr; a, III &rarr; d, IV &rarr; b</span><span class=\"hqt\" style=\"display:none\">I &rarr; c, II &rarr; a, III &rarr; d, IV &rarr; b</span>",
      "<span class=\"eqt\">I &rarr; d, II &rarr; c, III &rarr; b, IV &rarr; a</span><span class=\"hqt\" style=\"display:none\">I &rarr; d, II &rarr; c, III &rarr; b, IV &rarr; a</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Khwaja Muinuddin Chishti</b> settled in <b>Ajmer</b>. <b>Bahauddin Zakariya</b> was a well-known Sufi saint whose branch was known as the Suhrawardi Order.</p><p>&bull; While his specific center isn't explicitly mentioned, the Suhrawardi order flourished in Multan and Sindh.</p><p>&bull; <b>Nizamuddin Auliya</b> belonged to the Chishti order and his activities were centered in <b>Delhi</b> (it is widely known).</p><p>&bull; <b>Shaikh Ismail</b> of <b>Lahore</b> was the first Sufi saint who started preaching his ideas.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Bhakti reformers was born at Allahabad and was originally a follower of Ramanuja?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2325;&#2381;&#2340;&#2367; &#2360;&#2369;&#2343;&#2366;&#2352;&#2325; &#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342; &#2350;&#2375;&#2306; &#2346;&#2376;&#2342;&#2366; &#2361;&#2369;&#2310; &#2341;&#2366; &#2324;&#2352; &#2350;&#2370;&#2354; &#2352;&#2370;&#2346; &#2360;&#2375; &#2352;&#2366;&#2350;&#2366;&#2344;&#2369;&#2332; &#2325;&#2366; &#2309;&#2344;&#2369;&#2351;&#2366;&#2351;&#2368; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kabir</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2348;&#2368;&#2352;</span>",
      "<span class=\"eqt\">Ramananda</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2350;&#2366;&#2344;&#2344;&#2381;&#2342;</span>",
      "<span class=\"eqt\">Guru Nanak</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2369; &#2344;&#2366;&#2344;&#2325;</span>",
      "<span class=\"eqt\">Tulsidas</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2369;&#2354;&#2360;&#2368;&#2342;&#2366;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Ramananda</b> was born at Allahabad and was originally a follower of Ramanuja. Later, he founded his own sect and preached his principles in Hindi.</p><p>&bull; Kabir was a disciple of Ramananda, Guru Nanak was the founder of Sikhism and a disciple of Kabir, and Tulsidas was a worshipper of Rama who composed the Ramcharitmanas.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Sufi terms with their meanings:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Zikr</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Sufi hospice</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Sama</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Recitation of divine names</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Urs</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Death anniversary of a Sufi saint</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Khangah</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Mystical music</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2347;&#2368; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2309;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2332;&#2364;&#2367;&#2325;&#2381;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2360;&#2370;&#2347;&#2368; &#2343;&#2352;&#2381;&#2350;&#2358;&#2366;&#2354;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2360;&#2350;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2312;&#2358;&#2381;&#2357;&#2352;&#2368;&#2351; &#2344;&#2366;&#2350;&#2379;&#2306; &#2325;&#2366; &#2346;&#2366;&#2336;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2313;&#2352;&#2381;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2360;&#2370;&#2347;&#2368; &#2360;&#2306;&#2340; &#2325;&#2368; &#2346;&#2369;&#2339;&#2381;&#2351;&#2340;&#2367;&#2341;&#2367;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2326;&#2366;&#2344;&#2327;&#2366;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2352;&#2361;&#2360;&#2381;&#2351;&#2350;&#2351; &#2360;&#2306;&#2327;&#2368;&#2340;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-d, ii-b, iii-a, iv-c</span><span class=\"hqt\" style=\"display:none\">i-d, ii-b, iii-a, iv-c</span>",
      "<span class=\"eqt\">i-a, ii-b, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-a, ii-b, iii-c, iv-d</span>",
      "<span class=\"eqt\">i-b, ii-d, iii-c, iv-a</span><span class=\"hqt\" style=\"display:none\">i-b, ii-d, iii-c, iv-a</span>",
      "<span class=\"eqt\">i-d, ii-b, iii-c, iv-a</span><span class=\"hqt\" style=\"display:none\">i-d, ii-b, iii-c, iv-a</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Zikr (Dhikr)</b>  -  A devotional practice involving the <b>repetition of God's names</b> or sacred phrases, often accompanied by rhythmic breathing or movement.</p><p>&bull; <b>Sama</b>  -  Spiritual gatherings featuring <b>ecstatic music and dance</b> (associated with the Mevlevi \"whirling dervishes\" and Chishti Sufis).</p><p>&bull; <b>Urs</b>  -  Literally \"wedding,\" symbolizing the <b>death anniversary of a Sufi saint</b>, celebrated as their union with the Divine.</p><p>&bull; <b>Khangah (Khanqah)</b>  -  A <b>Sufi lodge or hospice</b> where disciples lived, trained, and held communal rituals under a sheikh's guidance.</p><p>Further information:</p><p>Ziyarat refers to the pilgrimage to a Sufi saint's tomb.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was a striking feature of the Alvars and Nayanars traditions? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2309;&#2354;&#2357;&#2352; &#2324;&#2352; &#2344;&#2351;&#2344;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2346;&#2352;&#2306;&#2346;&#2352;&#2366;&#2323;&#2306; &#2325;&#2368; &#2319;&#2325; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326;&#2344;&#2368;&#2351; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Exclusion of women from devotional practices</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2325;&#2381;&#2340;&#2367; &#2309;&#2344;&#2369;&#2359;&#2381;&#2336;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2366; &#2348;&#2361;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Predominantly Sanskrit compositions</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2326;&#2381;&#2351;&#2340;&#2307; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340; &#2352;&#2330;&#2344;&#2366;&#2319;&#2305;</span>",
      "<span class=\"eqt\">The presence of women devotees</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2367;&#2354;&#2366; &#2358;&#2381;&#2352;&#2342;&#2381;&#2343;&#2366;&#2354;&#2369;&#2323;&#2306; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Royal patronage from the outset</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2352;&#2370; &#2360;&#2375; &#2361;&#2368; &#2358;&#2366;&#2361;&#2368; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A striking feature of the <b>Alvars (Vaishnavite saints) and Nayanars (Shaivite saints)</b> traditions was the <b>active participation of women devotees</b>. Notable examples include:</p><p>&bull; <b>Andal</b>, the only female Alvar, whose devotional hymns remain central to Tamil Vaishnavism.</p><p>&bull; <b>Karaikkal Ammaiyar</b>, a revered Nayanar saint who composed hymns for Shiva.</p><p>These traditions were:</p><p>&bull; <b>Composed in Tamil</b> (not Sanskrit), making devotion accessible to common people.</p><p>&bull; <b>Inclusive</b>, challenging social hierarchies (though not all caste barriers were erased).</p><p>&bull; Initially rooted in <b>popular devotion</b>; royal patronage (like the Cholas for Nayanars) came later.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Bhakti saints with their associated deities:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.Alvars</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.Shiva</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.Nayanars</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.Vishnu</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.Mirabai</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.Krishna</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.Kabir</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.Formless God</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2325;&#2381;&#2340;&#2367; &#2360;&#2306;&#2340;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2342;&#2375;&#2357;&#2340;&#2366;&#2323;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.&#2309;&#2354;&#2357;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.&#2358;&#2367;&#2357;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2344;&#2351;&#2344;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2357;&#2367;&#2359;&#2381;&#2339;&#2369;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2350;&#2368;&#2352;&#2366;&#2348;&#2366;&#2312;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2325;&#2371;&#2359;&#2381;&#2339;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2325;&#2348;&#2368;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2344;&#2367;&#2352;&#2366;&#2325;&#2366;&#2352; &#2312;&#2358;&#2381;&#2357;&#2352;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-a, ii-b, iii-d, iv-c</span><span class=\"hqt\" style=\"display:none\">i-a, ii-b, iii-d, iv-c</span>",
      "<span class=\"eqt\">i-a, ii-b, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-a, ii-b, iii-c, iv-d</span>",
      "<span class=\"eqt\">i-d, ii-c, iii-a, iv-b</span><span class=\"hqt\" style=\"display:none\">i-d, ii-c, iii-a, iv-b</span>",
      "<span class=\"eqt\">i-b, ii-a, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-b, ii-a, iii-c, iv-d</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; <b>Alvars</b>  -  Tamil poet-saints devoted to <b>Vishnu</b> (or his incarnations like Krishna and Rama).</p><p>&bull; <b>Nayanars</b>  -  Tamil poet-saints devoted to <b>Shiva</b>.</p><p>&bull; <b>Mirabai</b>  -  Rajput princess and mystic devoted to <b>Krishna</b>.</p><p>&bull; <b>Kabir</b>  -  Rejected idol worship and emphasized devotion to a <b>formless God</b> (Nirguna Bhakti).</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>The prem-akhyan (love story) Padmavat, composed by Malik Muhammad Jayasi, is an example of how Sufi thinkers used local narratives to express ideas of:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2354;&#2367;&#2325; &#2350;&#2369;&#2361;&#2350;&#2381;&#2350;&#2342; &#2332;&#2366;&#2351;&#2360;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2352;&#2330;&#2367;&#2340; &#2346;&#2381;&#2352;&#2375;&#2350;-&#2310;&#2326;&#2381;&#2351;&#2366;&#2344; (&#2346;&#2381;&#2352;&#2375;&#2350; &#2325;&#2341;&#2366;) &#2346;&#2342;&#2381;&#2350;&#2366;&#2357;&#2340; &#2311;&#2360; &#2348;&#2366;&#2340; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376; &#2325;&#2367; &#2325;&#2376;&#2360;&#2375; &#2360;&#2370;&#2347;&#2368; &#2357;&#2367;&#2330;&#2366;&#2352;&#2325;&#2379;&#2306; &#2344;&#2375; &#2357;&#2367;&#2330;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2310;&#2326;&#2381;&#2351;&#2366;&#2344;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Political allegory and social critique</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2352;&#2370;&#2346;&#2325; &#2324;&#2352; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2310;&#2354;&#2379;&#2330;&#2344;&#2366;</span>",
      "<span class=\"eqt\">The importance of adhering to Islamic law</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2381;&#2354;&#2366;&#2350;&#2368; &#2325;&#2366;&#2344;&#2370;&#2344; &#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2357;</span>",
      "<span class=\"eqt\">Divine love using human love as an allegory</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2358;&#2381;&#2357;&#2352;&#2368;&#2351; &#2346;&#2381;&#2352;&#2375;&#2350; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2366;&#2344;&#2357;&#2368;&#2351; &#2346;&#2381;&#2352;&#2375;&#2350; &#2325;&#2379; &#2352;&#2370;&#2346;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">The power of miracles performed by Sufi saints</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2347;&#2368; &#2360;&#2306;&#2340;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2375; &#2327;&#2319; &#2330;&#2350;&#2340;&#2381;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Other sufis such as Baba Farid composed verses in the local language.Yet others composed long poems or <i>masnavis</i> to express ideas of <b>divine love using human love as an allegory</b>. For example, the <i>prem-akhyan</i> (love story) <i>Padmavat</i> composed by Malik Muhammad Jayasi revolved around the romance of Padmini and Ratansen, the king of Chittor. Their trials were symbolic of the soul's journey to the divine.</p>",
    "question_index": 19
  }
];
