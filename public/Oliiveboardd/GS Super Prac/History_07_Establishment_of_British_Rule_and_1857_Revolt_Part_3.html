    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following was the first trading post established by the British in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2346;&#2361;&#2354;&#2366; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2367;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Surat</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2352;&#2340;</span>",
      "<span class=\"eqt\">Masulipatnam</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2360;&#2370;&#2354;&#2367;&#2346;&#2335;&#2344;&#2350;</span>",
      "<span class=\"eqt\">Bombay</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2348;&#2312;</span>",
      "<span class=\"eqt\">Calcutta</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2354;&#2325;&#2340;&#2381;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The British established their first trading post in Masulipatnam in 1611, which marked the beginning of their dominance over trade in India.</p><p>&bull; <b>Surat </b>was the second trading post established in 1613.</p><p>&bull; <b>Bombay </b>became a significant British trading post but was acquired later in 1661.</p><p>&bull; <b>Calcutta</b> was a major center of British power but not the first trading post.</p><p><b>Further Insight:</b></p><p>&bull; British East India Company established its key factories in India:</p><p>&#9675; <b>Surat (1613)</b>: </p><p>&#9632; The first factory was established in Surat after the British received permission from the Mughal emperor Jahangir to trade in the region.</p><p>&#9675; <b>Masulipatnam (1611)</b>: </p><p>&#9632; Located in modern-day Andhra Pradesh, Masulipatnam became an early foothold for British trade, especially in textiles and spices. </p><p>&#9632; It served as a significant port on the southeastern coast.</p><p>&#9632; It was not much successful.</p><p>&#9675; <b>Madras (1639)</b>: </p><p>&#9632; The British built a factory at Madras after obtaining permission from the Nayak rulers. </p><p>&#9632; This factory eventually grew into Fort St. George </p><p>&#9675; <b>Hugli, Bengal (1640)</b>: </p><p>&#9632; Factories were set up in Hugli, Balasore, and Cossimbazar.</p><p>&#9675; <b>Bombay (1668):</b></p><p>&#9632; Originally ceded to the British as part of Catherine of Braganza's dowry when she married Charles II, Bombay became the British East India Company's base on the western coast. </p><p>&#9675; <b>Calcutta (1698)</b>: </p><p>&#9632; The British secured land from Mughal Emperor Aurangzeb and established Fort William in Calcutta, which became the main center of British operations in Bengal. </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The Battle of Buxar (1764) consolidated British power in India due to their victory over which alliance?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2325;&#2381;&#2360;&#2352; &#2325;&#2368; &#2354;&#2337;&#2364;&#2366;&#2312; (1764) &#2344;&#2375; &#2325;&#2367;&#2360; &#2327;&#2336;&#2348;&#2306;&#2343;&#2344; &#2346;&#2352; &#2332;&#2368;&#2340; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2350;&#2332;&#2348;&#2370;&#2340; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Nawab of Bengal and French</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2327;&#2366;&#2354; &#2324;&#2352; &#2347;&#2364;&#2381;&#2352;&#2366;&#2306;&#2360; &#2325;&#2375; &#2344;&#2357;&#2366;&#2348;</span>",
      "<span class=\"eqt\">Marathas and Nawab of Hyderabad</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2352;&#2366;&#2336;&#2366; &#2324;&#2352; &#2361;&#2376;&#2342;&#2352;&#2366;&#2348;&#2366;&#2342; &#2325;&#2375; &#2344;&#2357;&#2366;&#2348;</span>",
      "<span class=\"eqt\">Nawab of Awadh, Mughal Emperor, and Nawab of Bengal</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2343; &#2325;&#2375; &#2344;&#2357;&#2366;&#2348;, &#2350;&#2369;&#2327;&#2354; &#2360;&#2350;&#2381;&#2352;&#2366;&#2335; &#2324;&#2352; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2375; &#2344;&#2357;&#2366;&#2348;</span>",
      "<span class=\"eqt\">Portuguese and Dutch</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2352;&#2381;&#2340;&#2327;&#2366;&#2354;&#2368; &#2324;&#2352; &#2337;&#2330;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>The British defeated the combined forces of the Nawab of Awadh (Shuja-ud-Daula), Mughal Emperor Shah Alam II, and Nawab of Bengal (Mir Qasim) in the Battle of Buxar, which was pivotal in establishing British supremacy in northern India.</b></p><p>&bull; <b>The British defeated the Nawab of Bengal and the French in the Battle</b> of Plassey in 1757.</p><p><b>Further Insight:</b></p><p>&bull; <b>Battle of Plassey (1757)</b></p><p>&#9675; Date: June 23, 1757</p><p>&#9675; Location: Plassey (Palashi), Bengal </p><p>&#9675; Opponents:</p><p>&#9632; British East India Company led by Robert Clive</p><p>&#9632; Nawab of Bengal Siraj-ud-Daulah, supported by the French</p><p>&#9675; Cause: The conflict arose due to Siraj-ud-Daulah's opposition to British interference in Bengal and the fortification of Calcutta.</p><p>&#9675; Mir Jafar, the commander of Siraj-ud-Daulah's army, betrayed him by not engaging his troops, leading to the Nawab's defeat. </p><p>&#9675; Outcome:</p><p>&#9632; British Victory: Secured control over Bengal.</p><p>&bull; <b>Battle of Buxar (1764)</b></p><p>&#9675; Date: October 22, 1764</p><p>&#9675; Opponents: British East India Company vs. Combined forces of Mir Qasim (Nawab of Bengal), Shah Alam II (Mughal Emperor), and Shuja-ud-Daula (Nawab of Awadh).</p><p>&#9675; Cause: Discontent over British interference and oppressive policies in Bengal, after Mir Qasim's dismissal as Nawab.</p><p>&#9675; Outcome: Decisive British victory under Hector Munro.</p><p>&#9675; Major Changes to Indian Landscape:</p><p>&#9632; Solidified British control over Bengal, Bihar, and Orissa.</p><p>&#9632; Led to the Treaty of Allahabad (1765), granting the British Diwani rights (right to collect revenue) over Bengal.</p><p>&#9632; Weakened the Mughal Empire, marking the start of British dominance in northern India.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following acts renamed the Governor of Bengal as the Governor-General of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2344;&#2375; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2375; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352; &#2325;&#2366; &#2344;&#2366;&#2350; &#2348;&#2342;&#2354;&#2325;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352;-&#2332;&#2344;&#2352;&#2354; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Charter Act of 1813</span><span class=\"hqt\" style=\"display:none\">1813 &#2325;&#2366; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Charter Act of 1853</span><span class=\"hqt\" style=\"display:none\">1853 &#2325;&#2366; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Charter Act of 1833</span><span class=\"hqt\" style=\"display:none\">1833 &#2325;&#2366; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Regulating Act of 1773</span><span class=\"hqt\" style=\"display:none\">1773 &#2325;&#2366; &#2352;&#2375;&#2327;&#2369;&#2354;&#2375;&#2335;&#2367;&#2306;&#2327; &#2319;&#2325;&#2381;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>The Charter Act of 1833 was the act that designated the Governor-General of Bengal as the Governor-General of India, centralizing administration.</b></p><p>&bull; <b>Charter Act of 1813:</b> Ended the Company's monopoly on trade but did not rename the Governor-General.</p><p>&bull; Charter Act of 1853<b>:</b> Open competition system for recruitment and selection of civil servants.</p><p>&bull; <b>Regulating Act of 1773:</b> Created the office of the Governor-General of Bengal but did not rename it.</p><p><b>Further Insight:</b></p><p>&bull; <b>Charter Act of 1833</b>:</p><p>&#9675; This Act centralized administration by designating the Governor-General of Bengal as the Governor-General of India, making Lord William Bentinck the first to hold this title.</p><p>&#9675; The legislative powers of the Governor-General's council were extended to cover all of British India.</p><p>&#9675; The Company's commercial activities were entirely stopped, and it became purely an administrative body.</p><p>&#9675; A Law Commission, headed by Lord Macaulay, was established to codify Indian laws</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which Governor General is associated with the extensive use of the Subsidiary Alliance in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352; &#2332;&#2344;&#2352;&#2354; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2360;&#2361;&#2366;&#2351;&#2325; &#2360;&#2306;&#2343;&#2367; &#2325;&#2375; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2313;&#2346;&#2351;&#2379;&#2327; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lord Dalhousie</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2337;&#2354;&#2361;&#2380;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Lord Cornwallis</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2377;&#2352;&#2381;&#2344;&#2357;&#2366;&#2354;&#2367;&#2360;</span>",
      "<span class=\"eqt\">Lord Wellesley</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2357;&#2375;&#2354;&#2375;&#2360;&#2381;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Warren Hastings</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2377;&#2352;&#2375;&#2344; &#2361;&#2375;&#2360;&#2381;&#2335;&#2367;&#2306;&#2327;&#2381;&#2360;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Lord Wellesley extensively used the Subsidiary Alliance, a diplomatic strategy used to bring Indian princely states under British control.</b></p><p>&bull; Lord Dalhousie was associated with the Doctrine of Lapse, not Subsidiary Alliance.</p><p>&bull; Lord Cornwallis was Known for reforms in civil services and the Permanent Settlement.</p><p>&bull; Warren Hastings was the first Governor-General of Bengal, introduced various judicial reforms but not the Subsidiary Alliance.</p><p><b>Further Insight:</b></p><p>&bull; <b>Subsidiary Alliance:</b></p><p>&bull; <b>Introduced by</b>: Lord Wellesley (1798).</p><p>&bull; <b>Key Point</b>: Indian rulers had to accept British protection and station British troops in their territories, losing control over foreign affairs.</p><p>&bull; <b>Hyderabad (1798), Mysore (1799), Awadh (1801), Peshwa (1801)</b></p><p>&bull; <b>Doctrine of Lapse:</b></p><p>&#9675; <b>Introduced by</b>: Lord Dalhousie.</p><p>&#9675; <b>Key Point</b>: States without a direct male heir were annexed by the British.</p><p>&#9675; Satara (1848), Nagpure (1853), Jhansi (1854)</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Charter Acts abolished the East India Company's monopoly on trade, except for tea and trade with China?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2344;&#2375; &#2330;&#2366;&#2351; &#2324;&#2352; &#2330;&#2368;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352;, &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2346;&#2352; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2375; &#2319;&#2325;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2379; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Charter Act of 1793</span><span class=\"hqt\" style=\"display:none\">1793 &#2325;&#2366; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Charter Act of 1813</span><span class=\"hqt\" style=\"display:none\">1813 &#2325;&#2366; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Charter Act of 1833</span><span class=\"hqt\" style=\"display:none\">1833 &#2325;&#2366; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Charter Act of 1853</span><span class=\"hqt\" style=\"display:none\">1853 &#2325;&#2366; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Charter Act of 1813 </b>ended the East India Company's monopoly on trade except for trade in tea and with China, marking a shift in British commercial policy.</p><p>&bull; Charter Act of 1793: Renewed the Company's monopoly on trade.</p><p>&bull; Charter Act of 1833: Ended all of the Company's commercial activities.</p><p>&bull; Charter Act of 1853: Opened civil services for competition but did not address trade.</p><p><b>Further Insight:</b></p><p>&bull; <b>Charter Act of 1833</b>:</p><p>&#9675; This Act centralized administration by designating the Governor-General of Bengal as the Governor-General of India, making Lord William Bentinck the first to hold this title.</p><p>&#9675; The legislative powers of the Governor-General's council were extended to cover all of British India.</p><p>&#9675; <b>End of Commercial Functions</b>: The Company's commercial activities were entirely stopped, and it became purely an administrative body.</p><p>&#9675; <b>Law Commission</b>: A Law Commission, headed by Lord Macaulay, was established to codify Indian laws</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which Charter Act introduced an open competition system for recruitment to the Indian Civil Services?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2367;&#2357;&#2367;&#2354; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2349;&#2352;&#2381;&#2340;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2369;&#2354;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2351;&#2379;&#2327;&#2367;&#2340;&#2366; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Charter Act of 1793</span><span class=\"hqt\" style=\"display:none\">1793 &#2325;&#2366; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Charter Act of 1813</span><span class=\"hqt\" style=\"display:none\">1813 &#2325;&#2366; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Charter Act of 1853</span><span class=\"hqt\" style=\"display:none\">1853 &#2325;&#2366; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Government of India Act, 1919</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1919</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>The Charter Act of 1853 introduced an open competitive examination system for entry into the Indian Civil Services, a landmark reform in British Indian administration.</b></p><p>&bull; The Charter Act of 1793 did not introduce this system; it renewed the Company's trade monopoly.</p><p>&bull; The Charter Act of 1813 ended the trade monopoly but did not deal with civil services.</p><p>&bull; Government of India Act, 1919 Introduced dyarchy but not civil services competition.</p><p><b>Further Insight:</b></p><p>&bull; <b>Charter Act of 1853</b>:</p><p>&#9675; <b>Open Civil Services</b>: For the first time, the Act introduced an open competition system for recruitment to the Indian Civil Services (ICS), based on merit.</p><p>&#9675; <b>Expansion of Legislative Council</b>: The Governor-General's council was expanded to 12 members, including representation from Indian provinces like Bombay and Madras.</p><p>&#9675; <b>No Time Limit for Company's Rule</b>: Unlike previous Acts, this Act did not specify a time limit for the renewal of the Company's charter, signaling an indefinite period of Company rule until 1858</p>",

      "<span class=\"eqt\">Charter Act of 1853</span><span class=\"hqt\" style=\"display:none\">1853 &#2325;&#2366; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",

    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Charter Act of 1833 established the Law Commission headed by Lord Macaulay, which was responsible for codifying laws in India.</b></p><p>&bull; The Charter Act of 1793 did not establish the Law Commission.</p><p>&bull; Charter Act of 1853 Focused on civil service reforms, not codification of laws.</p><p>&bull; Government of India Act, 1935 dealt with provincial autonomy, not law codification.</p><p><b>Further Insight:</b></p><p>&bull; <b>Charter Act of 1833</b>:</p><p>&#9675; This Act centralized administration by designating the Governor-General of Bengal as the Governor-General of India, making Lord William Bentinck the first to hold this title.</p><p>&#9675; The legislative powers of the Governor-General's council were extended to cover all of British India.</p><p>&#9675; <b>End of Commercial Functions</b>: The Company's commercial activities were entirely stopped, and it became purely an administrative body.</p><p>&#9675; <b>Law Commission</b>: A Law Commission, headed by Lord Macaulay, was established to codify Indian laws</p>",

    "question": "<span class=\"eqt\"><p>Which Charter Act granted the Governor-General authority over the governors of Madras and Bombay in specific situations?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2344;&#2375; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352;-&#2332;&#2344;&#2352;&#2354; &#2325;&#2379; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2346;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2350;&#2342;&#2381;&#2352;&#2366;&#2360; &#2324;&#2352; &#2348;&#2350;&#2381;&#2348;&#2312; &#2325;&#2375; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352;&#2379;&#2306; &#2346;&#2352; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>&bull; <b>The Charter Act of 1793 granted the Governor-General of Bengal more powers, including control over the governors of Madras and Bombay in certain cases.</b></p><p>&bull; The Charter Act of 1833 Gave the Governor-General of Bengal the title of Governor-General of India but didn't introduce this specific provision.</p><p>&bull; Charter Act of 1853 Focused on civil services and legislative council reforms.</p><p>&bull; Government of India Act, 1909 Focused on separate electorates and limited reforms.</p><p><b>Further Insight:</b></p><p>&bull; <b>Charter Act of 1793:</b></p><p>&#9675; It continued the East India Company's trade monopoly in India for another 20 years.</p><p>&#9675; It was clarified that the Company ruled India on behalf of the British Crown.</p><p>&#9675; The Governor-General of Bengal was granted more authority, including overriding his council's decisions in certain cases.</p><p>&#9675; The Company had to allocate &#8377;5 lakh annually to the British government, and the salaries of the Board of Control were charged to Indian revenue.</p><p>&#9675; The Governor-General now had authority over the governors of Madras and Bombay in specific situations&#8203;.</p>",

    "question": "<span class=\"eqt\"><p>The Government of India Act, 1858, is primarily known for which of the following changes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1858 &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Introduction of dyarchy in provinces</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2344;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2381;&#2357;&#2376;&#2343; &#2358;&#2366;&#2360;&#2344; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2358;&#2369;&#2352;&#2370;&#2310;&#2340;</span>",
      "<span class=\"eqt\">Transfer of power from the East India Company to the British Crown</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2360;&#2375; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2325;&#2381;&#2352;&#2366;&#2313;&#2344; &#2325;&#2379; &#2360;&#2340;&#2381;&#2340;&#2366; &#2325;&#2366; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2339;</span>",

      "<span class=\"eqt\">Introduction of an open competition system for civil services</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2357;&#2367;&#2354; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2369;&#2354;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2358;&#2369;&#2352;&#2370;&#2310;&#2340;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Government of India Act, 1858, marked the formal end of the East India Company's rule and transferred all powers of administration, revenue, and territories to the British Crown.</b></p><p>&bull; Introduction of dyarchy in provinces: This was introduced by the Government of India Act, 1919.</p><p>&bull; Introduction of separate electorates for Muslims: Introduced by the Morley-Minto Reforms (Government of India Act, 1909).</p><p>&bull; Introduction of an open competition system for civil services: Introduced by the Charter Act of 1853.</p><p><b>Further Insight:</b></p><p>&bull; <b>Government of India Act, 1858</b></p><p>&#9675; <b>Enacted after</b>: The Revolt of 1857.</p><p>&#9675; <b>Objective</b>: To transfer the governance of India from the East India Company to the British Crown.</p><p>&#9675; <b>Key Provisions</b>:</p><p>&#9632; <b>End of Company Rule</b>: The British Crown assumed direct control over India, ending the rule of the East India Company.</p><p>&#9632; <b>Viceroy of India</b>: The Governor-General was renamed as the Viceroy, representing the British Crown in India. Lord Canning became the first Viceroy.</p><p>&#9632; <b>Secretary of State for India</b>: A new position, the Secretary of State for India, was created in the British Cabinet to oversee Indian affairs.</p><p>&#9632; <b>Council of India</b>: A 15-member council was set up to assist the Secretary of State in managing India.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which Government of India Act introduced dyarchy in the provincial government system?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2344;&#2375; &#2346;&#2381;&#2352;&#2366;&#2306;&#2340;&#2368;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2350;&#2375;&#2306; &#2342;&#2381;&#2357;&#2376;&#2343; &#2358;&#2366;&#2360;&#2344; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Government of India Act, 1858</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1858</span>",
      "<span class=\"eqt\">Government of India Act, 1919</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1919</span>",
      "<span class=\"eqt\">Government of India Act, 1909</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1909</span>",
      "<span class=\"eqt\">Government of India Act, 1935</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1935</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Government of India Act, 1919 introduced dyarchy, a system in which provincial subjects were divided into 'Transferred' (under Indian ministers) and 'Reserved' (under British officials) categories.</b></p><p>&bull; Government of India Act, 1858: This ended Company rule but did not introduce dyarchy.</p><p>&bull; Government of India Act, 1909: Introduced separate electorates but not dyarchy.</p><p>&bull; Government of India Act, 1935: Gave provinces autonomy but dyarchy was introduced earlier in 1919.</p><p><b>Further Insight:</b></p><p>&bull; <b>Government of India Act, 1919 (Montagu-Chelmsford Reforms)</b>:</p><p>&#9675; <b>Dyarchy</b>: Introduced dyarchy in the provinces, separating subjects into 'Transferred' and 'Reserved' categories. Indian ministers controlled the 'Transferred' subjects like education and health, while the British retained control over 'Reserved' subjects like law and order.</p><p>&#9675; <b>Bicameralism</b>: Established bicameral legislatures at the central level, with the introduction of the Council of States (Upper House) and the Legislative Assembly (Lower House).</p><p>&#9675; <b>Limited Franchise</b>: Voting rights were extended to a limited section of Indians, primarily based on property and education qualifications</p><p>&#9675; Expansion of franchise to women, depressed class, etc.</p><p>&#9675; <b>Introduced Public Service Commission</b>.</p><p>&#9675; Established High commissioner Office for India in London.</p>",
    "question_index": 9
  },

    "question": "<span class=\"eqt\"><p>Which of the following Acts introduced separate electorates for Muslims in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2369;&#2360;&#2354;&#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2354;&#2327; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2344; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2368;?</p></span>",
    "options": [

      "<span class=\"eqt\">Government of India Act, 1919</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1919</span>",
      "<span class=\"eqt\">Government of India Act, 1909</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1909</span>",
      "<span class=\"eqt\">Government of India Act, 1935</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1935</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>The Government of India Act, 1909 (Morley-Minto Reforms) introduced separate electorates for Muslims, allowing them to elect their representatives separately in both provincial and central legislative bodies.</b></p><p>&bull; Government of India Act, 1858: Did not deal with electoral reforms.</p><p>&bull; Government of India Act, 1919: Expanded franchise but did not introduce separate electorates.</p><p>&bull; Government of India Act, 1935: Expanded autonomy but separate electorates were already introduced in 1909.</p><p><b>Further Insight:</b></p><p>&bull; <b>Government of India Act, 1909 (Morley-Minto Reforms)</b>:</p><p>&#9675; <b>Separate Electorates</b>: Introduced separate electorates for Muslims, laying the groundwork for communal representation in Indian politics.</p><p>&#9675; <b>Executive Councils</b>: Indians were allowed to join the Viceroy's and Provincial Governors' Executive Councils for the first time.</p><p>&#9675; <b>Expansion fo the Legslative Council from 16 to 60 members.</b></p><p>&#9675; Satyendra P Sinha appointed as the first Indian member of the Viceroys Executive Council.</p>",

  {
    "question": "<span class=\"eqt\"><p>The Government of India Act, 1935, is significant because it introduced which of the following reforms?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1935, &#2311;&#2360;&#2354;&#2367;&#2319; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2311;&#2360;&#2344;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2369;&#2343;&#2366;&#2352; &#2346;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Dyarchy at the central level</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2342;&#2381;&#2357;&#2376;&#2343; &#2358;&#2366;&#2360;&#2344;</span>",
      "<span class=\"eqt\">Provincial autonomy</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2306;&#2340;&#2368;&#2351; &#2360;&#2381;&#2357;&#2366;&#2351;&#2340;&#2381;&#2340;&#2340;&#2366;</span>",
      "<span class=\"eqt\">End of British rule in India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2358;&#2366;&#2360;&#2344; &#2325;&#2366; &#2309;&#2306;&#2340;</span>",
      "<span class=\"eqt\">Introduction of direct elections</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2330;&#2369;&#2344;&#2366;&#2357;&#2379;&#2306; &#2325;&#2368; &#2358;&#2369;&#2352;&#2370;&#2310;&#2340;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Government of India Act, 1935 introduced provincial autonomy, granting more administrative powers to Indian provinces while keeping central control intact.</p><p>&bull; <b>Dyarchy at the central level:</b> Dyarchy was introduced at the provincial level by the Government of India Act, 1919, not at the central level.</p><p>&bull; <b>End of British rule in India:</b> This occurred later in 1947, not with the 1935 Act.</p><p>&bull; <b>Introduction of direct elections:</b> Introduced by the Government of India Act, 1919, but expanded in 1935.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following provisions was NOT included in the Government of India Act, 1935?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1935 &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Introduction of bicameral legislatures in provinces</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2344;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2381;&#2357;&#2367;&#2360;&#2342;&#2344;&#2368;&#2351; &#2357;&#2367;&#2343;&#2366;&#2351;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2368; &#2358;&#2369;&#2352;&#2370;&#2310;&#2340;</span>",
      "<span class=\"eqt\">Creation of the Federal Court</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2328;&#2368;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339;</span>",
      "<span class=\"eqt\">Complete federal system with princely states</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2351;&#2366;&#2360;&#2340;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2328;&#2368;&#2351; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Establishment of a Central Public Service Commission</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2354;&#2379;&#2325; &#2360;&#2375;&#2357;&#2366; &#2310;&#2351;&#2379;&#2327; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>The Government of India Act, 1935, proposed a federal system that included both British Indian provinces and princely states, but this was never fully implemented due to resistance from princely states.</b></p><p>&bull; Introduction of bicameral legislatures in provinces: The Act did introduce bicameral legislatures.</p><p>&bull; Creation of the Federal Court: The Act did establish the Federal Court of India.</p><p>&bull; Establishment of a Central Public Service Commission: This was also introduced under the Government of India Act, 1935.</p><p><b>Further Insight:</b></p><p>&bull; <b>Government of India Act, 1935</b>:</p><p>&#9675; <b>Provincial Autonomy</b>: Granted autonomy to Indian provinces, giving them more power over their internal administration. This marked a significant shift in governance.</p><p>&#9675; <b>Federation</b>: It proposed a federation of India, including both British India and princely states, though this was never fully implemented.</p><p>&#9675; <b>Bicameral Legislatures</b>: Introduced bicameral legislatures in several provinces.</p><p>&#9675; <b>Diarchy at Centre</b>.</p><p>&#9675; <b>Division of Power into three lists</b>- Federal, Provincial and Concurrent. Residuary power to be rest in the hands of Governor General.</p><p>&#9675; <b>Establishment of Federal Court</b>: A Federal Court was established to adjudicate disputes between provinces and the central government.</p><p>&#9675; <b>Provide separate electorate for depressed class(schedule class, women and labour)</b></p><p>&#9675; Establishment of a Central Public Service Commission</p>",
    "question_index": 12

    "question": "<span class=\"eqt\"><p>Which Government of India Act allowed Indians to be appointed to the Viceroy's Executive Council for the first time?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2344;&#2375; &#2346;&#2361;&#2354;&#2368; &#2348;&#2366;&#2352; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351;&#2379;&#2306; &#2325;&#2379; &#2357;&#2366;&#2351;&#2360;&#2352;&#2366;&#2351; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2346;&#2352;&#2367;&#2359;&#2342; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2368;?</p></span>",

      "<span class=\"eqt\">Government of India Act, 1919</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1919</span>",
      "<span class=\"eqt\">Government of India Act, 1909</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1909</span>",

    "solution": "<p>&bull; <b>The Government of India Act, 1909 (Morley-Minto Reforms) allowed Indians to be appointed to the Viceroy's Executive Council for the first time, a significant step in involving Indians in governance.</b></p><p>&bull; Government of India Act, 1858: Focused on transferring power to the Crown, not Indian participation in governance.</p><p>&bull; Government of India Act, 1919: Expanded Indian participation but Indians were already in the executive councils.</p><p>&bull; Government of India Act, 1935: Introduced provincial autonomy but did not mark the first Indian inclusion in the executive councils.</p><p><b>Further Insight:</b></p><p>&bull; <b>Government of India Act, 1909 (Morley-Minto Reforms)</b>:</p><p>&#9675; <b>Separate Electorates</b>: Introduced separate electorates for Muslims, laying the groundwork for communal representation in Indian politics.</p><p>&#9675; <b>Executive Councils</b>: Indians were allowed to join the Viceroy's and Provincial Governors' Executive Councils for the first time.</p><p>&#9675; <b>Expansion fo the Legslative Council from 16 to 60 members.</b></p><p>&#9675; Satyendra P Sinha appointed as the first Indian member of the Viceroys Executive Council.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the <b>Charter Act of 1833</b>:</p><p>(a) It marked the complete cessation of the East India Company's commercial activities.</p><p>(b) It vested all legislative powers in the Governor-General of Bengal.</p><p>(c) It was the first Act to introduce the open competition system for Indian Civil Services.</p><p>Which of the statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>1833 &#2325;&#2375; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2311;&#2360;&#2344;&#2375; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2368; &#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351;&#2367;&#2325; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340;&#2367; &#2325;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>(b) &#2311;&#2360;&#2344;&#2375; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2375; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352;-&#2332;&#2344;&#2352;&#2354; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2357;&#2367;&#2343;&#2366;&#2351;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2366;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2325;&#2368;&#2306;&#2404;</p><p>(c) &#2351;&#2361; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2367;&#2357;&#2367;&#2354; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2369;&#2354;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2351;&#2379;&#2327;&#2367;&#2340;&#2366; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2346;&#2361;&#2354;&#2366; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2341;&#2366;&#2404;</p><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The <b>Charter Act of 1833</b> stopped the East India Company's commercial functions.</p><p>&bull; The Act centralized legislative powers in the Governor-General of Bengal, who became the Governor-General of India.</p><p>&bull; <b>The </b>open competition system for civil services was introduced later in the <b>Charter Act of 1853</b>.</p><p><b>Further Insight:</b></p><p>&bull; <b>Charter Act of 1833</b>:</p><p>&#9675; <b>Governor-General of India</b>: This Act centralized administration by designating the Governor-General of Bengal as the Governor-General of India, making Lord William Bentinck the first to hold this title.</p><p>&#9675; <b>Legislative Centralization</b>: The legislative powers of the Governor-General's council were extended to cover all of British India.</p><p>&#9675; <b>End of Commercial Functions</b>: The Company's commercial activities were entirely stopped, and it became purely an administrative body.</p><p>&bull; <b>Law Commission</b>: A Law Commission, headed by Lord Macaulay, was established to codify Indian laws</p>",
    "question_index": 14
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the <b>Charter Act of 1853</b>:</p><p>(a) It introduced an open competition system for recruitment to the Indian Civil Services.</p><p>(b) It extended the legislative powers of the Governor-General's Council to all of British India.</p><p>(c) The Act renewed the Company's monopoly for another 20 years.</p><p>Which of the statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>1853 &#2325;&#2375; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2311;&#2360;&#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2367;&#2357;&#2367;&#2354; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2349;&#2352;&#2381;&#2340;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2326;&#2369;&#2354;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2351;&#2379;&#2327;&#2367;&#2340;&#2366; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368;&#2404;</p><p>(b) &#2311;&#2360;&#2344;&#2375; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352;-&#2332;&#2344;&#2352;&#2354; &#2325;&#2368; &#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2368; &#2357;&#2367;&#2343;&#2366;&#2351;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2346;&#2370;&#2352;&#2375; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2349;&#2366;&#2352;&#2340; &#2340;&#2325; &#2348;&#2338;&#2364;&#2366; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>(c) &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2344;&#2375; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2375; &#2319;&#2325;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2379; &#2309;&#2327;&#2354;&#2375; 20 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2357;&#2368;&#2344;&#2368;&#2325;&#2371;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Charter Act of 1853</b> introduced the open competition system for Indian Civil Services.</p><p>&bull; <b>It </b>extended the legislative authority of the Governor-General's Council across all British India.</p><p>&bull; <b>The </b>Act did not specify a time frame for renewing the Company's rule, marking a significant change from earlier Acts.</p><p><b>Further Insight:</b></p><p>&bull; <b>Charter Act of 1853</b>:</p><p>&#9675; <b>Open Civil Services</b>: For the first time, the Act introduced an open competition system for recruitment to the Indian Civil Services (ICS), based on merit.</p><p>&#9675; <b>Expansion of Legislative Council</b>: The Governor-General's council was expanded to 12 members, including representation from Indian provinces like Bombay and Madras.</p><p>&#9675; <b>No Time Limit for Company's Rule</b>: Unlike previous Acts, this Act did not specify a time limit for the renewal of the Company's charter, signaling an indefinite period of Company rule until 1858</p>",
    "question_index": 15

    "question": "<span class=\"eqt\"><p>Consider the following statements about the <b>Government of India Act, 1909</b>:</p><p>(a) It introduced separate electorates for Muslims in India.</p><p>(b) It allowed Indians to be appointed to the Viceroy's Executive Council for the first time.</p><p>(c) It introduced bicameral legislatures at the provincial level.</p><p>Which of the statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1909 &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2311;&#2360;&#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2369;&#2360;&#2354;&#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2354;&#2327; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2325; &#2350;&#2306;&#2337;&#2354; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2368;&#2404;</p><p>(b) &#2311;&#2360;&#2344;&#2375; &#2346;&#2361;&#2354;&#2368; &#2348;&#2366;&#2352; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351;&#2379;&#2306; &#2325;&#2379; &#2357;&#2366;&#2351;&#2360;&#2352;&#2366;&#2351; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2346;&#2352;&#2367;&#2359;&#2342; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2368;&#2404;</p><p>(c) &#2311;&#2360;&#2344;&#2375; &#2346;&#2381;&#2352;&#2366;&#2306;&#2340;&#2368;&#2351; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2342;&#2381;&#2357;&#2367;&#2360;&#2342;&#2344;&#2368;&#2351; &#2357;&#2367;&#2343;&#2366;&#2351;&#2367;&#2325;&#2366; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2368;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Government of India Act, 1909</b> introduced separate electorates for Muslims.</p><p>&bull; Indians were appointed to the Viceroy's Executive Council for the first time under this Act.</p><p>&bull; Bicameralism at the provincial level was introduced later by the <b>Government of India Act, 1919</b>.</p><p><b>Further Insight:</b></p><p>&bull; <b>Government of India Act, 1909 (Morley-Minto Reforms)</b>:</p><p>&#9675; <b>Separate Electorates</b>: Introduced separate electorates for Muslims, laying the groundwork for communal representation in Indian politics.</p><p>&#9675; <b>Executive Councils</b>: Indians were allowed to join the Viceroy's and Provincial Governors' Executive Councils for the first time.</p><p>&#9675; <b>Expansion fo the Legslative Council from 16 to 60 members.</b></p><p>&#9675; Satyendra P Sinha appointed as the first Indian member of the Viceroys Executive Council.</p>",
    "question_index": 16

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the <b>Government of India Act, 1919</b>:</p><p>(a) It introduced bicameral legislatures at the central level.</p><p>(b) It introduced the system of dyarchy in the provinces.</p><p>(c) It introduced provincial autonomy for the first time in British India.</p><p>Which of the statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1919 &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2311;&#2360;&#2344;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2342;&#2381;&#2357;&#2367;&#2360;&#2342;&#2344;&#2368;&#2351; &#2357;&#2367;&#2343;&#2366;&#2351;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2368;&#2404;</p><p>(b) &#2311;&#2360;&#2344;&#2375; &#2346;&#2381;&#2352;&#2366;&#2306;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2381;&#2357;&#2376;&#2343; &#2358;&#2366;&#2360;&#2344; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2368;&#2404;</p><p>(c) &#2311;&#2360;&#2344;&#2375; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2368; &#2348;&#2366;&#2352; &#2346;&#2381;&#2352;&#2366;&#2306;&#2340;&#2368;&#2351; &#2360;&#2381;&#2357;&#2366;&#2351;&#2340;&#2381;&#2340;&#2340;&#2366; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2368;&#2404;</p><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Government of India Act, 1919</b> introduced bicameralism at the central level with the Council of States and the Legislative Assembly.</p><p>&#9675; it also introduced dyarchy at the provincial level.</p><p>&bull; Provincial autonomy was introduced by the <b>Government of India Act, 1935</b>, not 1919.</p><p><b>Further Insight:</b></p><p>&bull; <b>Government of India Act, 1919 (Montagu-Chelmsford Reforms):</b></p><p>&#9675; Dyarchy: Introduced dyarchy in the provinces, separating subjects into 'Transferred' and 'Reserved' categories. Indian ministers controlled the 'Transferred' subjects like education and health, while the British retained control over 'Reserved' subjects like law and order.</p><p>&#9675; Bicameralism: Established bicameral legislatures at the central level, with the introduction of the Council of States (Upper House) and the Legislative Assembly (Lower House).</p><p>&#9675; Limited Franchise: Voting rights were extended to a limited section of Indians, primarily based on property and education qualifications</p><p>&#9675; Expansion of franchise to women, depressed class, etc.</p><p>&#9675; Introduced Public Service Commission.</p><p>&#9675; Established High commissioner Office for India in London.</p>",
    "question_index": 17
  },
