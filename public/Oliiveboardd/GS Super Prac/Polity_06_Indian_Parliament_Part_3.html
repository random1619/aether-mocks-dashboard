    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Who presides over the sessions of the Rajya Sabha?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2325;&#2375; &#2360;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;&#2340;&#2366; &#2325;&#2380;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Vice President of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Prime Minister</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">President of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Speaker of Lok Sabha</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2325; &#2360;&#2349;&#2366; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#9679;\tUnder Article 63, the Vice President of India acts as the ex-officio Chairman of the Rajya Sabha.</p><p>&#9679;\tThe Prime Minister, President, and Speaker of Lok Sabha do not preside over Rajya Sabha sessions.</p><p>Further Insight:</p><p>&#9679;\tThe President is the Head of the Union and mentioned under Article 52.</p><p>&#9679;\tThe Prime Minister is the Head of the Council of Ministers whose duty is to aid and advise the president while the President exercises his power under Article 74.</p><p>&#9679;\tSpeaker of Lok Sabha is the presiding officer of the Lok Sabha or House of People and mentioned in Article 93 of the Constitution.</p><p></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about the Houses of Parliament.</p><p>a. Rajya Sabha is directly elected by the people of India.</p><p>b. Lok Sabha is indirectly elected through MLAs of the State</p><p>Which of the above statements are correct</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2360;&#2342;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>a. &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2325;&#2366; &#2330;&#2369;&#2344;&#2366;&#2357; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2368;&#2343;&#2375; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>b. &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2325;&#2366; &#2330;&#2369;&#2344;&#2366;&#2357; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2357;&#2367;&#2343;&#2366;&#2351;&#2325;&#2379;&#2306; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Neither a and b</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; a &#2324;&#2352; &#2344; &#2361;&#2368; b</span>",
      "<span class=\"eqt\">Both a and b</span><span class=\"hqt\" style=\"display:none\">&#2319; &#2324;&#2352; &#2348;&#2368; &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Members of Rajya Sabha shall be elected by the elected members of the Legislative Assembly of the State in accordance with the system of proportional representation by means of the single transferable vote.</p><p>&bull; Members of Lok Sabha shall be directly elected by members of the constituencies in the States</p><p>Further Insight:</p><p>&bull; The Constitution of India allows for a maximum of 550 members in the House of People or Lok Sabha,</p><p>&#9675; with 530 members representing the States and 20 representing the Union Territories.</p><p>&#9675; At present, the Lok Sabha has 543 seats filled by elected representatives.</p><p>&bull; The Rajya Sabha should consist of not more than 250 members -</p><p>&#9675; 238 members representing the States and Union Territories,</p><p>&#9675; and 12 members nominated by the President.</p><p>&#9675; Current Strength of Rajya Sabha is 245</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is incorrect about Qualification for Member of Lok Sabha or House of the People?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2351;&#2366; &#2354;&#2379;&#2325; &#2360;&#2349;&#2366; &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2351;&#2379;&#2327;&#2381;&#2351;&#2340;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Candidate must be citizen of India</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2349;&#2381;&#2351;&#2352;&#2381;&#2341;&#2368; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;</span>",
      "<span class=\"eqt\">Candidate must attain minimum age of 25 years</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2349;&#2381;&#2351;&#2352;&#2381;&#2341;&#2368; &#2325;&#2368; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2310;&#2351;&#2369; 25 &#2357;&#2352;&#2381;&#2359; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;</span>",
      "<span class=\"eqt\">Candidate should not hold office of profit under Government of India</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2349;&#2381;&#2351;&#2352;&#2381;&#2341;&#2368; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2354;&#2366;&#2349; &#2325;&#2366; &#2346;&#2342; &#2343;&#2366;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;</span>",
      "<span class=\"eqt\">Candidate must be born in India</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2349;&#2381;&#2351;&#2352;&#2381;&#2341;&#2368; &#2325;&#2366; &#2332;&#2344;&#2381;&#2350; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Qualifications for Lok Sabha (House of the People)  -  Article 84:</p><p>&#9675; The candidate must be a citizen of India.</p><p>&#9675; The minimum age required is 25 years.</p><p>&#9675; The candidate must be registered as a voter in any parliamentary constituency in India.</p><p>&#9675; The candidate should not hold any office of profit under the Government of India or any state, except for offices specifically exempted by Parliament.</p><p>&#9675; The candidate must not be disqualified under Article 102, which includes:</p><p>&#9632; Being declared of unsound mind by a competent court.</p><p>&#9632; Being an undischarged insolvent.</p><p>&#9632; Being disqualified under laws made by Parliament, such as those related to criminal offenses (e.g., Representation of the People Act, 1951).</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is correct for the reason of disqualification of a member of Rajya Sabha under Article 102?</p><p>a. If he holds office of Profit under the Government of India or any State</p><p>b. If he is undischarged insolvent</p><p>c. If he voluntarily acquired citizenship of a foreign State</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 102 &#2325;&#2375; &#2340;&#2361;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2349;&#2366; &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351; &#2325;&#2368; &#2309;&#2351;&#2379;&#2327;&#2381;&#2351;&#2340;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>a. &#2351;&#2342;&#2367; &#2357;&#2361; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2351;&#2366; &#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2354;&#2366;&#2349; &#2325;&#2366; &#2346;&#2342; &#2343;&#2366;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</p><p>b. &#2351;&#2342;&#2367; &#2357;&#2361; &#2309;&#2344;&#2369;&#2350;&#2379;&#2342;&#2367;&#2340; &#2342;&#2367;&#2357;&#2366;&#2354;&#2367;&#2351;&#2366; &#2361;&#2376;</p><p>c. &#2351;&#2342;&#2367; &#2313;&#2360;&#2344;&#2375; &#2360;&#2381;&#2357;&#2375;&#2330;&#2381;&#2331;&#2366; &#2360;&#2375; &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2354;&#2368; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">All of the following</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2349;&#2368;</span>",
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Article 102: Disqualification for membership</p><p>&#9675; (1) A person shall be disqualified for being chosen as, and for being, a member of either House of Parliament</p><p>&#9632; (a) if he holds any office of profit under the Government of India or the Government of any State, other than an office declared by Parliament by law not to disqualify its holder</p><p>&#9632; if he is of unsound mind and stands so declared by a competent court;</p><p>&#9632; if he is an undischarged insolvent;</p><p>&#9632; if he is not a citizen of India, or has voluntarily acquired the citizenship of a foreign State, or is under any acknowledgment of allegiance or adherence to a foreign State;</p><p>&#9632; if he is so disqualified by or under any law made by Parliament.</p><p>&#9675; (2) A person shall be disqualified for being a member of either House of Parliament if he is so disqualified under the Tenth Schedule.</p><p>&bull; Qualifications for Rajya Sabha (Council of States)  -  Article 84:</p><p>&#9675; The candidate must be a citizen of India.</p><p>&#9675; The minimum age required is 30 years.</p><p>&#9675; The candidate must be a registered voter in any state or Union Territory in India.</p><p>&#9675; Similar to Lok Sabha, the candidate should not hold any office of profit under the Government of India or any state, unless specifically exempted by Parliament.</p><p>&#9675; Candidate must not be disqualified under Article 102</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The Speaker and Deputy Speaker of the House of the People mentioned under Article ______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; ______ &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2313;&#2354;&#2381;&#2354;&#2367;&#2326;&#2367;&#2340; &#2354;&#2379;&#2325; &#2360;&#2349;&#2366; &#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2324;&#2352; &#2313;&#2346;&#2366;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Article 93</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 93</span>",
      "<span class=\"eqt\">Article 94</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 94</span>",
      "<span class=\"eqt\">Article 95</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 95</span>",
      "<span class=\"eqt\">Article 96</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 96</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Article 93: The Speaker and Deputy Speaker of the House of the People:</p><p>&#9675; The House of the People shall, as soon as may be, choose two members of the House to be respectively Speaker and Deputy Speaker thereof and, so often as the office of Speaker or Deputy Speaker becomes vacant, the House shall choose another member to be Speaker or Deputy Speaker, as the case may be.</p><p>Further Insight:</p><p>&bull; Article 85: Provisions related to sessions of Parliament, prorogation, and disSolution:.</p><p>&bull; Article 86: President's right to address and send messages to Parliament.</p><p>&bull; Article 87: Special address by the President to Parliament at the start of the first session after elections and each year's first session.</p><p>&bull; Article 88: Rights of Ministers and Attorney General to participate in Parliamentary proceedings but without the right to vote.</p><p>&bull; Article 89: Election and role of the Chairman and Deputy Chairman of the Rajya Sabha.</p><p>&bull; Article 90: Conditions for the removal of the Deputy Chairman of the Rajya Sabha.</p><p>&bull; Article 91: Powers of the Deputy Chairman when the Chairman is absent in the Rajya Sabha.</p><p>&bull; Article 92: Procedures for the discharge of duties by the Chairman or Deputy Chairman during vacancies in Rajya Sabha.</p><p>&bull; Article 93: Election of Speaker and Deputy Speaker of the Lok Sabha.</p><p>&bull; Article 94: Conditions for vacating or removing the Speaker or Deputy Speaker of the Lok Sabha.</p><p>&bull; Article 95: Role of the Deputy Speaker when the Speaker is absent in the Lok Sabha.</p><p>&bull; Article 96: Provisions for the Speaker or Deputy Speaker to vacate their office during debates.</p><p>&bull; Article 97: Salaries and allowances of the Chairman, Deputy Chairman, Speaker, and Deputy Speaker.</p><p>&bull; Article 98: Secretariat of each House of Parliament and appointment of officers.</p><p>&bull; Article 99: Oath or affirmation by members of Parliament.</p><p>&bull; Article 100: Voting procedures in Parliament, including quorum requirements.</p><p>&bull; Article 101: Disqualifications for being a member of Parliament due to dual membership or absence.</p><p>&bull; Article 102: Disqualifications for membership in Parliament, such as holding an office of profit, being of unsound mind, or insolvency.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The members of the Rajya Sabha are elected by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351;&#2379;&#2306; &#2325;&#2366; &#2330;&#2369;&#2344;&#2366;&#2357; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Direct election by the people</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2340;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2330;&#2369;&#2344;&#2366;&#2357;</span>",
      "<span class=\"eqt\">State Legislative Assemblies</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Lok Sabha members</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2360;&#2342;&#2360;&#2381;&#2351;</span>",
      "<span class=\"eqt\">The President</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Rajya Sabha members are elected by State Legislative Assemblies and appointed by the President.</p><p>&bull; They are not directly elected by the people or by Lok Sabha members.</p><p>Further Insight:</p><p>&bull; Qualifications for Rajya Sabha (Council of States)  -  Article 84:</p><p>&#9675; The candidate must be a citizen of India.</p><p>&#9675; The minimum age required is 30 years.</p><p>&#9675; The candidate must be a registered voter in any state or Union Territory in India.</p><p>&#9675; Similar to Lok Sabha, the candidate should not hold any office of profit under the Government of India or any state, unless specifically exempted by Parliament.</p><p>&#9675; Candidate must not be disqualified under Article 102, which includes:</p><p>&#9632; Being declared of unsound mind by a competent court.</p><p>&#9632; Being an undischarged insolvent.</p><p>&#9632; Being disqualified under laws like the Representation of the People Act, 1951, including for certain criminal offenses.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>When did the special address by the President take place?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2366; &#2357;&#2367;&#2358;&#2375;&#2359; &#2309;&#2349;&#2367;&#2349;&#2366;&#2359;&#2339; &#2325;&#2348; &#2361;&#2369;&#2310;?</p></span>",
    "options": [
      "<span class=\"eqt\">First session after each state election and at commencement of the first session of each year</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2352;&#2366;&#2332;&#2381;&#2351; &#2330;&#2369;&#2344;&#2366;&#2357; &#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2361;&#2354;&#2366; &#2360;&#2340;&#2381;&#2352; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2360;&#2340;&#2381;&#2352; &#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349; &#2350;&#2375;&#2306;</span>",
      "<span class=\"eqt\">First session after each general election and at commencement of the each session of each year</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2310;&#2350; &#2330;&#2369;&#2344;&#2366;&#2357; &#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2361;&#2354;&#2366; &#2360;&#2340;&#2381;&#2352; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2340;&#2381;&#2352; &#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349; &#2350;&#2375;&#2306;</span>",
      "<span class=\"eqt\">First session after each general election and at commencement of the first session of each year</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2310;&#2350; &#2330;&#2369;&#2344;&#2366;&#2357; &#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2361;&#2354;&#2366; &#2360;&#2340;&#2381;&#2352; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2360;&#2340;&#2381;&#2352; &#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349; &#2350;&#2375;&#2306;</span>",
      "<span class=\"eqt\">First session after each general election and at commencement of the last session of each year</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2310;&#2350; &#2330;&#2369;&#2344;&#2366;&#2357; &#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2361;&#2354;&#2366; &#2360;&#2340;&#2381;&#2352; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340;&#2367;&#2350; &#2360;&#2340;&#2381;&#2352; &#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349; &#2350;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Article 87: Special Address by the President</p><p>&#9675; (1) At the commencement of 2[the first session after each general election to the House of the People and at the commencement of the first session of each year] the President shall address both Houses of Parliament assembled together and inform Parliament of the causes of its summons.</p><p>&#9675; (2) Provision shall be made by the rules regulating the procedure of either House for the allotment of time for discussion of the matters referred to in such address</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>As per Article 79 the Parliament shall consist of</p><p>a. President</p><p>b. Rajya Sabha</p><p>c. Lok Sabha</p><p>Choose the correct option:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 79 &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2360;&#2306;&#2360;&#2342; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2306;&#2327;&#2375;</p><p>a. &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;</p><p>b. &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366;</p><p>c. &#2354;&#2379;&#2325;&#2360;&#2349;&#2366;</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only c and a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c &#2324;&#2352; a</span>",
      "<span class=\"eqt\">All of the following</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Article 79. Constitution of the Parliament</p><p>&#9675; There shall be a Parliament for the Union which shall consist of the President and two Houses to be known respectively as the Council of States and the House of the People.</p><p>Further Insight:</p><p>&bull; Article 72: President's power to grant pardons, reprieves, respites, or remissions of punishment.</p><p>&bull; Article 73: Extent of the executive power of the Union.</p><p>&bull; Article 74: Council of Ministers to aid and advise the President.</p><p>&bull; Article 75: Provisions regarding the appointment, tenure, and responsibilities of the Prime Minister and Council of Ministers.</p><p>&bull; Article 76: Appointment, functions, and duties of the Attorney General of India.</p><p>&bull; Article 77: Conduct of business of the Government of India and authentication of orders and instruments.</p><p>&bull; Article 78: Duties of the Prime Minister concerning the President.</p><p>&bull; Article 79: Constitution of the Parliament of India (comprising the President, Lok Sabha, and Rajya Sabha).</p><p>&bull; Article 80: Composition of the Rajya Sabha (Council of States).</p><p>&bull; Article 81: Composition of the Lok Sabha (House of the People).</p><p>&bull; Article 82: Provisions regarding the delimitation of constituencies.</p><p>&bull; Article 83: Duration of Houses of Parliament (Lok Sabha and Rajya Sabha).</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Maximum strength of Lok Sabha and Rajya Sabha is ________ and _________ respectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2325;&#2368; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2360;&#2342;&#2360;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; ________ &#2324;&#2352; _________ &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">550 and 250</span><span class=\"hqt\" style=\"display:none\">550 &#2324;&#2352; 250</span>",
      "<span class=\"eqt\">552 and 248</span><span class=\"hqt\" style=\"display:none\">552 &#2324;&#2352; 248</span>",
      "<span class=\"eqt\">530 and 238</span><span class=\"hqt\" style=\"display:none\">530 &#2324;&#2352; 238</span>",
      "<span class=\"eqt\">545 and 245</span><span class=\"hqt\" style=\"display:none\">545 &#2324;&#2352; 245</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The current maximum strength of the Lok Sabha is 550 and Rajya Sabha is 250.</p><p>&bull; The Constitution of India allows for a maximum of 550 members in the House of People or Lok Sabha,</p><p>&#9675; with 530 members representing the States and 20 representing the Union Territories.</p><p>&#9675; At present, the Lok Sabha has 543 seats filled by elected representatives.</p><p>&bull; The Rajya Sabha should consist of not more than 250 members -</p><p>&#9675; 238 members representing the States and Union Territories,</p><p>&#9675; and 12 members nominated by the President.</p><p>&#9675; Current Strength of Rajya Sabha is 245</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The Rajya Sabha can delay a money bill for_________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2343;&#2344; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2379; _________ &#2340;&#2325; &#2357;&#2367;&#2354;&#2306;&#2348;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">14 days</span><span class=\"hqt\" style=\"display:none\">14 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">7 days</span><span class=\"hqt\" style=\"display:none\">7 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">21 days</span><span class=\"hqt\" style=\"display:none\">21 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">30 days</span><span class=\"hqt\" style=\"display:none\">30 &#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The Rajya Sabha can delay a money bill for a maximum of 14 days. It cannot amend or reject it.</p><p>Further Insight:</p><p>&bull; Money Bill</p><p>o It is defined under Article 110</p><p>o A bill can be deemed as money bill if</p><p>a) The imposition, abolition, remission, alteration or regulation of any tax</p><p>b) Any guarantee or financial obligation by Government of India for Payment of money or withdrawal of money from Consolidated Fund of India or Contingency Fund of India or Their custody.</p><p>c) Appropriation of Moneys out of the Consolidated fund of India.</p><p>d) Any Expenditure Charged on Consolidated fund of India</p><p>o It can only be introduced in the House of People or Lok Sabha.</p><p>o Rajya Sabha can only discuss the money bill and give recommendation</p><p>o These recommendations are not binding to Lok Sabha</p><p>o Rajya Sabha can hold the bill for a period of 14 days only ,after that it automatically passes.</p><p>o The Speaker of the Lok Sabha stamped the bill as the money bill.</p><p>o Budget is the Money bill</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>What is the minimum age for a candidate to be eligible for the Legislative Assembly?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2343;&#2366;&#2344;&#2360;&#2349;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2366;&#2340;&#2381;&#2352; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352; &#2325;&#2368; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2310;&#2351;&#2369; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">21 years</span><span class=\"hqt\" style=\"display:none\">21 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">30 years</span><span class=\"hqt\" style=\"display:none\">30 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">25 years</span><span class=\"hqt\" style=\"display:none\">25 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">35 years</span><span class=\"hqt\" style=\"display:none\">35 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; A candidate must be at least 25 years old to be eligible for the Legislative Assembly.</p><p>Further Insight:</p><p>&bull; Qualification to Member of Legislative Assembly (MLA) are:</p><p>&#9632; The candidate must be a citizen of India.</p><p>&#9632; The candidate must be at least 25 years old.</p><p>&#9632; The candidate must be registered as a voter in the state or union territory in which they seek election. This ensures that candidates have a legitimate interest and connection to the constituency they wish to represent.</p><p>&bull; Disqualification:</p><p>&#9632; The candidate must not be disqualified under any laws governing disqualifications.</p><p>&#9632; Such as Under the Representation of People Act, 1951</p><p>&bull; &#167; This includes being disqualified by law due to certain criminal convictions, insolvency, or being a member of a religious or communal institution</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Who acts as the presiding officer of the Legislative Assembly?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2375; &#2346;&#2368;&#2336;&#2366;&#2360;&#2368;&#2344; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Governor</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Speaker</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2325;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Chief Minister</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Deputy Speaker</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2360;&#2349;&#2366;&#2346;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Speaker acts as the presiding officer of the Legislative Assembly.</p><p>&bull; The Deputy Speaker acts in the absence of the Speaker.</p><p>Further Insight:</p><p>&bull; Article 178 governs the election, duties, and removal of the Speaker of the State Legislative Assembly.</p><p>&bull; The Speaker plays a crucial role in maintaining the order of the Assembly, certifying money bills, and casting votes in the event of a tie.</p><p>&bull; The Speaker's decision on parliamentary procedures and the certification of money bills is final and binding.</p><p>&bull; The process of removing the Speaker requires a special resolution with 14 days' notice.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>The creation of a State Legislative Council requires:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344; &#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2375; &#2327;&#2336;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Approval of the Governor</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2366; &#2309;&#2344;&#2369;&#2350;&#2379;&#2342;&#2344;</span>",
      "<span class=\"eqt\">A resolution passed by the State Legislature and permission by Parliament</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2366;&#2352;&#2367;&#2340; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2324;&#2352; &#2360;&#2306;&#2360;&#2342; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Consent of the Chief Minister</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2368; &#2360;&#2361;&#2350;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Directive from the Supreme Court</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Legislative Council of a state can be created or abolished by the Parliament based on a recommendation from the state.</p><p>&bull; The State Legislature can propose but not create it.</p><p>&bull; The Governor recommends but does not establish it.</p><p>&bull; The Supreme court has no direct power in this regard.</p><p>Further insight:</p><p>&bull; Legislative Councils Abolition or creation(Article 169) Procedure:</p><p>o Only Parliament of India can create or abolish Legislative council if State Legislative Assembly pass a resolution for abolition or creation by majority of 2/3<sup>rd</sup> present and voting</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the State Legislative Council:</p><p>a. The Legislative Council is a permanent body.</p><p>b. The Legislative Council can be abolished by a simple majority in the Legislative Assembly.</p><p>c. The Governor can nominate members to the Legislative Council.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344; &#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2357;&#2367;&#2343;&#2366;&#2344; &#2346;&#2352;&#2367;&#2359;&#2342; &#2319;&#2325; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2344;&#2367;&#2325;&#2366;&#2351; &#2361;&#2376;&#2404;</p><p>b. &#2357;&#2367;&#2343;&#2366;&#2344; &#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2379; &#2357;&#2367;&#2343;&#2366;&#2344;&#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2361;&#2369;&#2350;&#2340; &#2360;&#2375; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>c. &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2357;&#2367;&#2343;&#2366;&#2344; &#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2350;&#2344;&#2379;&#2344;&#2368;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">a only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">a and c only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">b and c only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">a, b, and c</span><span class=\"hqt\" style=\"display:none\">&#2319;, &#2348;&#2368;, &#2324;&#2352; &#2360;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Legislative Council is a permanent body, meaning it cannot be dissolved.</p><p>&bull; The Legislative Assembly can propose to abolish the Legislative Council, but it requires Parliament's approval for the abolition.</p><p>&bull; The Governor can nominate members to the Legislative Council as per Article 171</p><p>Further insight:</p><p>&bull; In State, State Legislature is made up of:</p><p>&#9632; State Legislative Assembly (Article 168) + Governor</p><p>&#9632; State Legislative Assembly + Governor + Legislative Council(169).</p><p>&#9632; State legislative council is presently in Andhra Pradesh, Bihar, Madhya Pradesh, Maharashtra, Karnataka ,Tamil Nadu , Telangana and Uttar Pradesh</p><p>&bull; Legislative Councils Abolition or creation(Article 169) Procedure:</p><p>&#9632; Only Parliament of India can create or abolish Legislative council if State Legislative Assembly pass a resolution for abolition or creation by majority of 2/3<sup>rd</sup> present and voting</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is correct about the State Legislative Assembly?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The members of the Legislative Assembly are directly elected by the people.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351; &#2360;&#2368;&#2343;&#2375; &#2332;&#2344;&#2340;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2330;&#2369;&#2344;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The term of the Legislative Assembly is normally six years.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2331;&#2361; &#2357;&#2352;&#2381;&#2359; &#2325;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The Legislative Assembly cannot be dissolved before the completion of its term.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2379; &#2313;&#2360;&#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379;&#2344;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2349;&#2306;&#2327; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366;&#2404;</span>",
      "<span class=\"eqt\">None of the following are correct</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2360;&#2361;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The people of the state directly elect the members of the Legislative Assembly.</p><p>&bull; The Legislative Assembly typically has a term of five years unless dissolved earlier.</p><p>&bull; The Legislative Assembly can be dissolved before its full term by the Governor on the advice of the Chief Minister.</p><p>Further Insight:</p><p>&bull; State Legislative Assembly:</p><p>&#9675; State legislative assembly is established under Article 168.</p><p>&#9675; The people of the state directly elect the members of the state legislative council.</p><p>&#9675; Total members are decided as per population of the State under Article 170.</p><p>&#9675; Tenure of the Assembly is 5 years.(Article 172)</p><p>&#9675; Qualification of member is under Article 173</p><p>&#9675; Can make law under State list and concurrent list.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>In which situation can the Chief Minister be removed from office?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2379; &#2346;&#2342; &#2360;&#2375; &#2361;&#2335;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">After the Governor's term ends.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342;&#2404;</span>",
      "<span class=\"eqt\">On the advice of the Advocate General.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2343;&#2367;&#2357;&#2325;&#2381;&#2340;&#2366; &#2325;&#2368; &#2360;&#2354;&#2366;&#2361; &#2346;&#2352;&#2404;</span>",
      "<span class=\"eqt\">When a no-confidence motion is passed by the Legislative Assembly.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2348; &#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2357;&#2367;&#2358;&#2381;&#2357;&#2366;&#2360; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">By a judicial decision of the High Court.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The Chief Minister must resign if a no-confidence motion is passed in the Legislative Assembly.</p><p>&bull; The Governor's term does not affect the Chief Minister.</p><p>&bull; The Advocate General does not have this power.</p><p>&bull; Judicial decisions do not directly remove a Chief Minister.</p><p>Further insight:</p><p>&bull; Article 153 - Governors of States.</p><p>&bull; Article 154 - Executive power of State.</p><p>&bull; Article 155 - Appointment of Governor.</p><p>&bull; Article 156 - Term of office of Governor.</p><p>&bull; Article 157 - Qualifications for appointment as Governor.</p><p>&bull; Article 158 - Conditions of Governor's office.</p><p>&bull; Article 159 - Oath or affirmation by the Governor.</p><p>&bull; Article 160 - Discharge of the functions of the Governor in certain contingencies.</p><p>&bull; Article 161 - Power of Governor to grant pardons, etc., and to suspend, remit or commute sentences in certain cases.</p><p>&bull; Article 162 - Extent of executive power of the State</p><p>&bull; Article 165  -  Advocate General of the State</p><p>&bull; Article of 214  -  High Court of the State.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>A money bill can be introduced in the Legislative Assembly only with the prior recommendation of:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2343;&#2366;&#2344;&#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2343;&#2344; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2368; &#2346;&#2370;&#2352;&#2381;&#2357; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358; &#2360;&#2375; &#2361;&#2368; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">The Governor</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2352;&#2381;&#2357;&#2344;&#2352;</span>",
      "<span class=\"eqt\">The Chief Minister</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">The Advocate General</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2343;&#2367;&#2357;&#2325;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">The Speaker</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2325;&#2381;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; A money bill can only be introduced with the Governor's recommendation.</p><p>&bull; The Chief Minister may initiate the process of Money bill, but the bill requires the Governor's recommendation.</p><p>&bull; The Advocate General has no role in money bills.</p><p>&bull; The Speaker presides over discussions but does not recommend bills.</p><p>Further insight</p><p>&bull; Money Bill is mentioned under Article 199</p><p>&bull; A bill can be deemed as money bill if</p><p>(a) the imposition, abolition, remission, alteration, or regulation of any tax;</p><p>(b) the regulation of the borrowing of money or the giving of any guarantee by the State, or the amendment of the law with respect to any financial obligations undertaken or to be undertaken by the State;</p><p>(c) the custody of the Consolidated Fund or the Contingency Fund of the State, the payment of moneys into or the withdrawal of moneys from any such Fund;</p><p>(d) the appropriation of moneys out of the Consolidated Fund of the State;</p><p>(e) the declaring of any expenditure to be expenditure charged on the Consolidated Fund of the State, or the increasing of the amount of any such expenditure;</p><p>(f) the receipt of money on account of the Consolidated Fund of the State or the public account of the State or the custody or issue of such money</p><p>&bull; It can only be introduced in the State legislative Assembly, not in the State Legislative Council.</p><p>&bull; State legislative Council can only discuss the money bill and give recommendation</p><p>&bull; These recommendations are not binding to Lok Sabha</p><p>&bull; The State Legislative Council can hold a bill for a period of 14 days only ,after that it automatically passes.</p><p>&bull; The Speaker of the State Legislative Council stamped the bill as the money bill.</p><p>&bull; The budget is the Money bill.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>What proportion of Legislative Council members are elected by graduates?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2343;&#2366;&#2344; &#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351; &#2360;&#2381;&#2344;&#2366;&#2340;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2330;&#2369;&#2344;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1/4th</span><span class=\"hqt\" style=\"display:none\">1/4</span>",
      "<span class=\"eqt\">1/12th</span><span class=\"hqt\" style=\"display:none\">1/12&#2357;&#2366;&#2306;</span>",
      "<span class=\"eqt\">1/3rd</span><span class=\"hqt\" style=\"display:none\">1/3</span>",
      "<span class=\"eqt\">1/5th</span><span class=\"hqt\" style=\"display:none\">1/5&#2357;&#2366;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; As per article 171, 1/12<sup>th </sup>of the member of the council shall be elected by graduates.</p><p>Further Insight:</p><p>&bull; The minimum strength of the Legislative Council is set at 40 members but cannot exceed 1/3<sup>rd</sup> of the total number of members in Legislative Assembly of the State.</p><p>&bull; Members are elected from different constituencies:</p><p>&#9675; 1/3 are elected by the members of the Legislative Assembly.</p><p>&#9675; 1/3 are elected by local authorities (municipalities, district boards, etc.).</p><p>&#9675; 1/12 are elected by teachers in the state.</p><p>&#9675; 1/12 are elected by graduates of the state.</p><p>&#9675; The remaining members are nominated by the Governor for their expertise in fields like literature, science, arts, social service and co-operative movement.</p><p>&bull; The members of the State Legislative Council serve a term of six years, with one-third of the members retiring every two years, making the Council a permanent body.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>The State Legislature consists of _______, _______ and in some states _________ is also present .</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354; &#2350;&#2375;&#2306; _______, _______ &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2325;&#2369;&#2331; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; _________ &#2349;&#2368; &#2350;&#2380;&#2332;&#2370;&#2342; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">President, Lok Sabha and Rajya Sabha</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;, &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366;</span>",
      "<span class=\"eqt\">Governor, State Legislative Assembly and State Council</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354;, &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2346;&#2352;&#2367;&#2359;&#2342;</span>",
      "<span class=\"eqt\">Governor, State Council and State Legislative Assembly</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354;, &#2352;&#2366;&#2332;&#2381;&#2351; &#2346;&#2352;&#2367;&#2359;&#2342; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366;</span>",
      "<span class=\"eqt\">Governor, State Legislative Assembly and Chief Minister</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354;, &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2324;&#2352; &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; In State, State Legislature is made up of:</p><p>&#9632; State Legislative Assembly (Article 168) + Governor</p><p>&#9632; State Legislative Assembly + Governor + Legislative Council(169).</p><p>&#9632; State legislative council is presently in Andhra Pradesh, Bihar, Madhya Pradesh, Maharashtra, Karnataka ,Tamil Nadu , Telangana and Uttar Pradesh</p><p>&bull; Legislative Councils Abolition or creation(Article 169) Procedure:</p><p>&#9632; o Only Parliament of India can create or abolish Legislative council if State Legislative Assembly pass a resolution for abolition or creation by majority of 2/3<sup>rd</sup> present and voting.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the discretionary powers of the Governor:</p><p>a. The Governor can reserve any bill for the President's consideration.</p><p>b. The Governor has the power to dismiss the Chief Minister at their discretion.</p><p>c. The Governor can act without the advice of the Council of Ministers in certain circumstances.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2368; &#2357;&#2367;&#2357;&#2375;&#2325;&#2366;&#2343;&#2368;&#2344; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2379;&#2312; &#2349;&#2368; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>b. &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2375; &#2346;&#2366;&#2360; &#2309;&#2346;&#2344;&#2375; &#2357;&#2367;&#2357;&#2375;&#2325; &#2360;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2379; &#2348;&#2352;&#2381;&#2326;&#2366;&#2360;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2361;&#2376;&#2404;</p><p>c. &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2369;&#2331; &#2346;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2368; &#2360;&#2354;&#2366;&#2361; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">a only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">a and c only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">b and c only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">a, b, and c</span><span class=\"hqt\" style=\"display:none\">&#2319;, &#2348;&#2368;, &#2324;&#2352; &#2360;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Governor can reserve any bill for the President's consideration under Article 200 of the Constitution.</p><p>&bull; The Governor cannot dismiss the Chief Minister at their discretion. The Chief Minister must resign if they lose the majority in the Legislative Assembly.</p><p>&bull; In some situations (e.g., when reserving a bill for the President), the Governor can act without the advice of the Council of Ministers.</p><p>Further Insight:</p><p>&bull; Discretionary power of the Governor in the Article 163</p><p>&bull; Article 163(1) Council of Ministers to aid and advise the governor to exercise his function except so far as he is by or under constitution required to exercise his function or any of them at his discretion.</p><p>&bull; Article 163(2) If there is a question if he can use his discretion under the Constitution, the decision of the Governor in his discretion shall be final and validity of anything done by the Governor shall not be called in question on the ground that he ought or ought not to have acted in his discretion.</p>",
    "question_index": 19
  }
