    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following temples is known as the 'Black Pagoda'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2306;&#2342;&#2367;&#2352; '&#2348;&#2381;&#2354;&#2376;&#2325; &#2346;&#2376;&#2327;&#2379;&#2337;&#2366;' &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sun Temple, Konark</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2352;&#2381;&#2351; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2325;&#2379;&#2339;&#2366;&#2352;&#2381;&#2325;</span>",
      "<span class=\"eqt\">Brihadeeswara Temple, Thanjavur</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2371;&#2361;&#2342;&#2375;&#2358;&#2381;&#2357;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2340;&#2306;&#2332;&#2366;&#2357;&#2369;&#2352;</span>",
      "<span class=\"eqt\">Kailasa Temple, Ellora</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2354;&#2366;&#2360;&#2366; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2319;&#2354;&#2379;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Meenakshi Temple, Madurai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2368;&#2344;&#2366;&#2325;&#2381;&#2359;&#2368; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2350;&#2342;&#2369;&#2352;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The <b>Sun Temple at Konark</b> is known as the 'Black Pagoda'.</p><p>&#183; This magnificent temple in Odisha, built in the 13th century by King Narasimhadeva I of the Eastern Ganga Dynasty, earned this nickname from European sailors who used it as a landmark for navigation. </p><p>&#183; The temple's dark stone structure stood out against the coastline, making it visible from far out at sea.</p><p>Further insights:</p><p>&#183; <b>Brihadeeswara Temple, Thanjavur</b>: Built by Raja Raja Chola I around 1010 CE, this magnificent temple is dedicated to Lord Shiva. It's renowned for its massive main tower (vimana) that stands at 216 feet high and is topped with a monolithic granite cupola weighing 80 tons. The temple is a UNESCO World Heritage Site and a prime example of Dravidian architecture. It's sometimes called \"Dakshin Meru\" (Southern Meru).</p><p>&#183; <b>Kailasa Temple, Ellora</b>: This remarkable temple was carved out of a single rock, making it the largest monolithic structure in the world. Built in the 8th century by the Rashtrakuta king Krishna I, it's dedicated to Lord Shiva. The temple resembles Mount Kailash and features intricate carvings depicting various Hindu mythological stories. It's part of the Ellora Caves complex, another UNESCO World Heritage Site.</p><p>&#183; <b>Meenakshi Temple, Madurai</b>: Dedicated to Goddess Meenakshi (a form of Parvati) and her consort Sundareswarar (Lord Shiva), this temple is known for its stunning architecture with 14 colorful gopurams (gateway towers). The tallest tower rises to 170 feet. The temple complex covers around 14 acres and contains an estimated 33,000 sculptures. It's famous for the sculpted pillars in the Hall of Thousand Pillars and hosts the grand Meenakshi Thirukalyanam festival annually.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which temple is known as the richest temple in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2306;&#2342;&#2367;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2350;&#2368;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tirupati Balaji Temple</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2367;&#2352;&#2369;&#2346;&#2340;&#2367; &#2348;&#2366;&#2354;&#2366;&#2332;&#2368; &#2350;&#2306;&#2342;&#2367;&#2352;</span>",
      "<span class=\"eqt\">Padmanabhaswamy Temple</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2342;&#2381;&#2350;&#2344;&#2366;&#2349;&#2360;&#2381;&#2357;&#2366;&#2350;&#2368; &#2350;&#2306;&#2342;&#2367;&#2352;</span>",
      "<span class=\"eqt\">Golden Temple</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2350;&#2306;&#2342;&#2367;&#2352;</span>",
      "<span class=\"eqt\">Jagannath Temple</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2327;&#2344;&#2381;&#2344;&#2366;&#2341; &#2350;&#2306;&#2342;&#2367;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The Padmanabhaswamy Temple in Thiruvananthapuram, Kerala, is known as the richest temple in India.</p><p>&#183; This temple gained widespread attention in 2011 when sealed vaults within the temple were opened by order of the Supreme Court of India, revealing treasure estimated to be worth over $22 billion (approximately &#8377;1.2 lakh crore). The wealth includes gold coins, jewelry, diamonds, golden idols, and other precious artifacts collected over hundreds of years. Some vaults remain unopened.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The Dilwara Temples, famous for their extraordinary marble carvings, are dedicated to which religion?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2346;&#2344;&#2368; &#2309;&#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2360;&#2306;&#2327;&#2350;&#2352;&#2350;&#2352; &#2344;&#2325;&#2381;&#2325;&#2366;&#2358;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2342;&#2367;&#2354;&#2357;&#2366;&#2337;&#2364;&#2366; &#2350;&#2306;&#2342;&#2367;&#2352; &#2325;&#2367;&#2360; &#2343;&#2352;&#2381;&#2350; &#2325;&#2379; &#2360;&#2350;&#2352;&#2381;&#2346;&#2367;&#2340; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Hinduism</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2344;&#2381;&#2342;&#2370; &#2343;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Buddhism</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2342;&#2381;&#2343; &#2343;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Jainism</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2376;&#2344; &#2343;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Sikhism</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2326; &#2343;&#2352;&#2381;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The Dilwara Temples are dedicated to <b>Jainism</b>.</p><p>&#183; These magnificent temples, located at Mount Abu in Rajasthan, are renowned for their spectacular marble carvings and are considered among the most beautiful Jain temples in the world. </p><p>&#183; Built between the 11th and 13th centuries by Chalukya rulers, they showcase incredibly intricate marble work with delicate carvings on ceilings, pillars, doorways, and panels. The level of detail in the marble craftsmanship is so exceptional that the stone appears almost translucent in places.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following temples is considered one of the Char Dham pilgrimage sites?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2306;&#2342;&#2367;&#2352; &#2330;&#2366;&#2352; &#2343;&#2366;&#2350; &#2340;&#2368;&#2352;&#2381;&#2341; &#2360;&#2381;&#2341;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kashi Vishwanath Temple</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2358;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357;&#2344;&#2366;&#2341; &#2350;&#2306;&#2342;&#2367;&#2352;</span>",
      "<span class=\"eqt\">Lingaraja Temple</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2367;&#2306;&#2327;&#2352;&#2366;&#2332; &#2350;&#2306;&#2342;&#2367;&#2352;</span>",
      "<span class=\"eqt\">Badrinath Temple</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2342;&#2381;&#2352;&#2368;&#2344;&#2366;&#2341; &#2350;&#2306;&#2342;&#2367;&#2352;</span>",
      "<span class=\"eqt\">Brihadeeswara Temple</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2371;&#2361;&#2342;&#2375;&#2358;&#2381;&#2357;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Badrinath Temple</b> is one of the Char Dham pilgrimage sites.</p><p>The Char Dham (literally \"four abodes\") is a set of four pilgrimage sites in India that are widely revered by Hindus. They consist of:</p><p>&#183; Badrinath in Uttarakhand (dedicated to Lord Vishnu)</p><p>&#183; Dwarka in Gujarat (dedicated to Lord Krishna)</p><p>&#183; Puri in Odisha (home to the Jagannath Temple)</p><p>&#183; Rameshwaram in Tamil Nadu (dedicated to Lord Shiva)</p><p>Badrinath Temple, situated in the Garhwal Himalayas along the banks of the Alaknanda River, is dedicated to Lord Vishnu in his Badrinath form and is considered one of the holiest shrines in Hinduism.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The Shore Temple, a UNESCO World Heritage Site, is located at:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2379;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2319;&#2325; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2357;&#2367;&#2358;&#2381;&#2357; &#2343;&#2352;&#2379;&#2361;&#2352; &#2360;&#2381;&#2341;&#2354;, &#2351;&#2361;&#2366;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Mahabalipuram</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2348;&#2354;&#2368;&#2346;&#2369;&#2352;&#2350;</span>",
      "<span class=\"eqt\">Puri</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Dwarka</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2366;&#2352;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Rameswaram</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2350;&#2375;&#2358;&#2381;&#2357;&#2352;&#2350;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The Shore Temple is located at <b>Mahabalipuram</b> (also known as Mamallapuram), Tamil Nadu.</p><p>&#183; Built during the 7th century during the reign of Narasimhavarman II of the Pallava dynasty, the Shore Temple is one of the oldest structural temples in South India. </p><p>&#183; It stands on the shores of the Bay of Bengal and is famous for its intricate stone carvings and structural elegance. The temple complex contains shrines dedicated to Lord Shiva and Lord Vishnu. Its location by the sea makes it particularly distinctive, as it appears to rise from the waters.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are true?</p><p>I.The Golden Temple (Harmandir Sahib) in Amritsar is situated in the center of a pool called Amrit Sarovar (Pool of Nectar).</p><p>II. The Golden Temple is the holiest gurdwara and the most important pilgrimage site in Sikhism.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2309;&#2350;&#2371;&#2340;&#2360;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2350;&#2306;&#2342;&#2367;&#2352; (&#2361;&#2352;&#2350;&#2306;&#2342;&#2367;&#2352; &#2360;&#2366;&#2361;&#2367;&#2348;) &#2309;&#2350;&#2371;&#2340; &#2360;&#2352;&#2379;&#2357;&#2352; (&#2309;&#2350;&#2371;&#2340; &#2325;&#2366; &#2325;&#2369;&#2306;&#2337;) &#2344;&#2366;&#2350;&#2325; &#2319;&#2325; &#2325;&#2369;&#2306;&#2337; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>II. &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2350;&#2306;&#2342;&#2367;&#2352; &#2360;&#2367;&#2326; &#2343;&#2352;&#2381;&#2350; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2346;&#2357;&#2367;&#2340;&#2381;&#2352; &#2327;&#2369;&#2352;&#2369;&#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2324;&#2352; &#2360;&#2348;&#2360;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2340;&#2368;&#2352;&#2381;&#2341; &#2360;&#2381;&#2341;&#2354; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The Golden Temple (Harmandir Sahib) is located in Amritsar, Punjab, India.</p><p>&#183; This sacred Sikh shrine was built in the 16th century and gets its popular name from its distinctive gold-plated upper floors. </p><p>&#183; The temple is situated in the center of a sacred pool called Amrit Sarovar (Pool of Nectar), which gave the city its name. </p><p>&#183; The Golden Temple is the holiest gurdwara and the most important pilgrimage site in Sikhism.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which temple complex is carved out of a single rock and is considered one of the largest monolithic structures in the world?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2306;&#2342;&#2367;&#2352; &#2346;&#2352;&#2367;&#2360;&#2352; &#2319;&#2325; &#2361;&#2368; &#2330;&#2335;&#2381;&#2335;&#2366;&#2344; &#2325;&#2379; &#2340;&#2352;&#2366;&#2358; &#2325;&#2352; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2375; &#2342;&#2369;&#2344;&#2367;&#2351;&#2366; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2309;&#2326;&#2306;&#2337; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Elephanta Caves</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2354;&#2368;&#2347;&#2375;&#2306;&#2335;&#2366; &#2327;&#2369;&#2347;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Ajanta Caves</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2332;&#2306;&#2340;&#2366; &#2325;&#2368; &#2327;&#2369;&#2347;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Kailasa Temple, Ellora</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2354;&#2366;&#2360;&#2366; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2319;&#2354;&#2379;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Mahabalipuram Rathas</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2348;&#2354;&#2368;&#2346;&#2369;&#2352;&#2350; &#2352;&#2341;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Kailasa Temple at Ellora</b> is carved out of a single rock and is considered one of the largest monolithic structures in the world.</p><p>Built in the 8th century by the Rashtrakuta king Krishna I, it was carved top-down from a single piece of rock and represents Mount Kailash, the abode of Lord Shiva.</p><p>It's part of the Ellora cave complex in Maharashtra, India. What makes it truly remarkable is that it was created through a vertical excavation process - sculptors started from the top and worked their way downward, removing thousands of tons of rock to create this elaborate temple complex.</p><p>The temple is dedicated to Lord Shiva and was built in the 8th century by the Rashtrakuta dynasty. Its construction demonstrates extraordinary architectural vision and skill, as the entire structure was carved without the use of scaffolding.</p><p>Further insights:</p><p>&#183; Elephanta Caves: Rock-cut cave temples on Elephanta Island near Mumbai</p><p>&#183; Ajanta Caves: Rock-cut Buddhist cave monuments containing paintings and sculptures</p><p>&#183; Mahabalipuram Rathas: Five monolithic shrines, but each is separate and smaller in scale</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The Kandariya Mahadeva Temple, known for its spectacular architecture, is part of which temple complex?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2337;&#2366;&#2352;&#2367;&#2351;&#2366; &#2350;&#2361;&#2366;&#2342;&#2375;&#2357; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2332;&#2379; &#2309;&#2346;&#2344;&#2368; &#2358;&#2366;&#2344;&#2342;&#2366;&#2352; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2354;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2325;&#2367;&#2360; &#2350;&#2306;&#2342;&#2367;&#2352; &#2346;&#2352;&#2367;&#2360;&#2352; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Khajuraho</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2332;&#2369;&#2352;&#2366;&#2361;&#2379;</span>",
      "<span class=\"eqt\">Hampi</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2350;&#2381;&#2346;&#2368;</span>",
      "<span class=\"eqt\">Konark</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2339;&#2366;&#2352;&#2381;&#2325;</span>",
      "<span class=\"eqt\">Aihole</span><span class=\"hqt\" style=\"display:none\">&#2320;&#2361;&#2379;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The Kandariya Mahadeva Temple is part of the <b>Khajuraho</b> temple complex.</p><p>&#183; The Kandariya Mahadeva Temple is the largest and most ornate Hindu temple in the Khajuraho group of temples located in Madhya Pradesh, India. </p><p>&#183; Built during the Chandela dynasty in the early 11th century (approximately 1025-1050 CE), it's dedicated to Lord Shiva and is renowned for its spectacular Nagara-style architecture and elaborate sculptures.</p><p>&#183; The Khajuraho temple complex is famous for its intricate stone carvings depicting various aspects of life, including spiritual teachings, mythological narratives, and erotic sculptures. The complex was designated as a UNESCO World Heritage Site in 1986.</p><p>Further insights:</p><p>&#183; Hampi: Ruins of the Vijayanagara Empire in Karnataka</p><p>&#183; Konark: Location of the Sun Temple in Odisha</p><p>&#183; Aihole: Early Hindu temple complex in Karnataka known as the \"Cradle of Indian architecture\"</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which temple is famous for its musical pillars that produce different musical notes when struck?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2306;&#2342;&#2367;&#2352; &#2309;&#2346;&#2344;&#2375; &#2360;&#2306;&#2327;&#2368;&#2340;&#2350;&#2351; &#2360;&#2381;&#2340;&#2306;&#2349;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2376; &#2332;&#2367;&#2344; &#2346;&#2352; &#2330;&#2379;&#2335; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2306;&#2327;&#2368;&#2340;&#2350;&#2351; &#2360;&#2381;&#2357;&#2352; &#2344;&#2367;&#2325;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Meenakshi Temple, Madurai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2368;&#2344;&#2366;&#2325;&#2381;&#2359;&#2368; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2350;&#2342;&#2369;&#2352;&#2376;</span>",
      "<span class=\"eqt\">Vittala Temple, Hampi</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2381;&#2336;&#2354; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2361;&#2350;&#2381;&#2346;&#2368;</span>",
      "<span class=\"eqt\">Brihadeeswarar Temple, Thanjavur</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2371;&#2361;&#2342;&#2375;&#2358;&#2381;&#2357;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2340;&#2306;&#2332;&#2366;&#2357;&#2369;&#2352;</span>",
      "<span class=\"eqt\">Jagannath Temple, Puri</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2327;&#2344;&#2381;&#2344;&#2366;&#2341; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2346;&#2369;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The <b>Vittala Temple in Hampi</b> is famous for its musical pillars.</p><p>&#183; The Vittala Temple complex in Hampi, Karnataka, contains the remarkable SaReGaMa pillars (named after the Indian musical notes), which produce distinct musical notes when gently tapped. </p><p>&#183; These 56 musical pillars are carved from solid granite, and each main pillar is surrounded by smaller pillars that can generate various sounds resembling different musical instruments when struck.</p><p>&#183; This architectural marvel was built during the Vijayanagara Empire in the 15th century, and its musical pillars demonstrate the advanced understanding of acoustics possessed by the architects of that era.</p><p>Further insights:</p><p>&#183; Meenakshi Temple in Madurai is known for its towering gopurams and sculptural richness </p><p>&#183; Brihadeeswarar Temple in Thanjavur is famous for its massive scale and engineering excellence </p><p>&#183; Jagannath Temple in Puri is known for the annual Rath Yatra festival and its religious significance</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The Lotus Temple in New Delhi belongs to which religion?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2312; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340; &#2354;&#2379;&#2335;&#2360; &#2335;&#2375;&#2350;&#2381;&#2346;&#2354; &#2325;&#2367;&#2360; &#2343;&#2352;&#2381;&#2350; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Hinduism</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2344;&#2381;&#2342;&#2370; &#2343;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Jainism</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2376;&#2344; &#2343;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Buddhism</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2342;&#2381;&#2343; &#2343;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Bah&#225;'&#237; Faith</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2366;&#2312; &#2310;&#2360;&#2381;&#2341;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The Lotus Temple belongs to the <b>Bah&#225;'&#237; Faith</b>.</p><p>&#183; The Lotus Temple, completed in 1986, is one of the most recognizable architectural landmarks in India. </p><p>&#183; It's officially known as the Bah&#225;'&#237; House of Worship and serves as the Mother Temple of the Indian subcontinent for the Bah&#225;'&#237; Faith.</p><p>&#183; The temple is notable for its distinctive lotus-shaped design with 27 free-standing marble petals arranged in clusters of three to form nine sides. </p><p>&#183; This nine-sided structure reflects the Bah&#225;'&#237; emphasis on unity, as the number nine symbolizes completeness and the unity of all religions in Bah&#225;'&#237; teachings.</p><p>&#183; Unlike many religious buildings, the Lotus Temple has no images, icons, or religious symbols inside. </p><p>&#183; In accordance with Bah&#225;'&#237; principles, it's open to people of all faiths for prayer and meditation, promoting the core Bah&#225;'&#237; belief in the unity of all religions and humanity.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which temple is known as the \"White Pagoda\" and served as a landmark for sailors?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2306;&#2342;&#2367;&#2352; \"&#2358;&#2381;&#2357;&#2375;&#2340; &#2346;&#2376;&#2327;&#2379;&#2337;&#2366;\" &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2344;&#2366;&#2357;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2320;&#2340;&#2367;&#2361;&#2366;&#2360;&#2367;&#2325; &#2360;&#2381;&#2341;&#2354; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Jagannath Temple, Puri</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2327;&#2344;&#2381;&#2344;&#2366;&#2341; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2346;&#2369;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Shore Temple, Mahabalipuram</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2379;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2350;&#2361;&#2366;&#2348;&#2354;&#2368;&#2346;&#2369;&#2352;&#2350;</span>",
      "<span class=\"eqt\">Sun Temple, Konark</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2352;&#2381;&#2351; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2325;&#2379;&#2339;&#2366;&#2352;&#2381;&#2325;</span>",
      "<span class=\"eqt\">Kailashnath Temple, Kanchipuram</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2354;&#2366;&#2358;&#2344;&#2366;&#2341; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2325;&#2366;&#2306;&#2330;&#2368;&#2346;&#2369;&#2352;&#2350;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The <b>Jagannath Temple in Puri</b> is known as the \"White Pagoda\".</p><p>&#183; The Jagannath Temple at Puri is one of the most revered Vaishnava sites of worship in India. </p><p>&#183; One of the oldest Hindu temples to still be in use, its main shrine was built by Anantavarman of the Chodaganga dynasty in the tenth century. </p><p>&#183; The deities within the shrine, however, are believed to be much older and are associated with the great mythical ruler of the Satya-yuga, King Indrayumna, nephew of Lord Ram.</p><p>&#183; The temple, which in the 19th century, recognised by European sailors as the \"white pagoda\", now proudly displays the natural colours of the khondalite stone that had been used by Anantavarma to construct the home of the Lord in the 10th century.</p><p>&#183; It forms a triad with the Sun Temple at Konark (Black Pagoda) and Lingaraja Temple in Bhubaneswar.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the incorrect statement(s).</p><p>A. The Rath Yatra at Jagannath Temple takes place in the Hindu month of Asvina.</p><p>B. English word \"juggernaut\" derives from the name Jagannath and the massive chariot used in this festival.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2354;&#2340; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>A. &#2332;&#2327;&#2344;&#2381;&#2344;&#2366;&#2341; &#2350;&#2306;&#2342;&#2367;&#2352; &#2350;&#2375;&#2306; &#2352;&#2341; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2361;&#2367;&#2306;&#2342;&#2370; &#2350;&#2361;&#2368;&#2344;&#2375; &#2309;&#2358;&#2381;&#2357;&#2367;&#2344; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>B. &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2358;&#2348;&#2381;&#2342; \"&#2332;&#2369;&#2327;&#2352;&#2381;&#2344;&#2377;&#2335;\" &#2332;&#2327;&#2344;&#2381;&#2344;&#2366;&#2341; &#2344;&#2366;&#2350; &#2324;&#2352; &#2311;&#2360; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2350;&#2375;&#2306; &#2311;&#2360;&#2381;&#2340;&#2375;&#2350;&#2366;&#2354; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2358;&#2366;&#2354; &#2352;&#2341; &#2360;&#2375; &#2344;&#2367;&#2325;&#2354;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">A only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Both A and B are correct</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Both A and B are incorrect</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2364;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The Jagannath Temple in Puri is famous for its annual Rath Yatra.</p><p>&#183; The Rath Yatra at Jagannath Temple is one of the most celebrated and iconic religious festivals in India. </p><p>&#183; During this festival, the three deities - Lord Jagannath (a form of Lord Vishnu), his brother Balabhadra, and sister Subhadra - are taken out of the temple in elaborate wooden chariots and pulled through the streets of Puri by devotees. </p><p>&#183; The main chariot of Lord Jagannath is approximately 45 feet high and has 16 wheels.</p><p>&#183; This festival takes place during the Hindu month of Ashadha (June-July) and attracts millions of devotees from across the world. </p><p>&#183; The tradition is so significant that the English word \"juggernaut\" (meaning an unstoppable force) derives from the name Jagannath and the massive chariot used in this festival.</p><p>Further insights:</p><p>&#183; Tirupati Balaji Temple is known for being one of the richest temples in the world</p><p>&#183; Meenakshi Temple is famous for its elaborate architecture and gopurams</p><p>&#183; Kashi Vishwanath Temple is one of the most sacred Shiva temples in India</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following temples with their locations:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Lingaraja Temple</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Odisha</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Virupaksha Temple</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Karnataka</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Ramappa Temple</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Telangana</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Kamakhya Temple</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Assam</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2306;&#2342;&#2367;&#2352;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2354;&#2367;&#2306;&#2327;&#2352;&#2366;&#2332; &#2350;&#2306;&#2342;&#2367;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2323;&#2337;&#2367;&#2358;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2357;&#2367;&#2352;&#2369;&#2346;&#2366;&#2325;&#2381;&#2359; &#2350;&#2306;&#2342;&#2367;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2352;&#2366;&#2350;&#2346;&#2381;&#2346;&#2366; &#2350;&#2306;&#2342;&#2367;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2340;&#2375;&#2354;&#2306;&#2327;&#2366;&#2344;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2325;&#2366;&#2350;&#2366;&#2326;&#2381;&#2351;&#2366; &#2350;&#2306;&#2342;&#2367;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2309;&#2360;&#2350;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-a, ii-b, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-a, ii-b, iii-c, iv-d</span>",
      "<span class=\"eqt\">i-b, ii-a, iii-d, iv-c</span><span class=\"hqt\" style=\"display:none\">i-b, ii-a, iii-d, iv-c</span>",
      "<span class=\"eqt\">i-a, ii-c, iii-b, iv-d</span><span class=\"hqt\" style=\"display:none\">i-a, ii-c, iii-b, iv-d</span>",
      "<span class=\"eqt\">i-d, ii-b, iii-c, iv-a</span><span class=\"hqt\" style=\"display:none\">i-d, ii-b, iii-c, iv-a</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Lingaraja Temple - Odisha</b></p><p>o The Lingaraja Temple is located in Bhubaneswar, the capital city of Odisha.</p><p>o Built in the 11th century by the Somavamsi dynasty, it is dedicated to Lord Shiva and represents the Kalinga style of temple architecture.</p><p>o It stands at a height of about 180 feet and is surrounded by numerous smaller temples and shrines.</p><p>o The temple is known for its intricate carvings and the Lingam (representation of Lord Shiva) that is naturally formed (Swayambhu).</p><p>o Non-Hindus are not allowed to enter the temple premises.</p><p><b>Virupaksha Temple - Karnataka</b></p><p>o The Virupaksha Temple is located in Hampi, Karnataka, within the ruins of the ancient city of Vijayanagara.</p><p>o It is dedicated to Lord Virupaksha, a form of Lord Shiva, and dates back to the 7th century with expansions made during the Vijayanagara Empire in the 14th-16th centuries.</p><p>o The temple features a 160-foot high gopuram (tower) and is still an active place of worship.</p><p>o It is notable for its inverted shadow of the main tower, which can be seen inside the temple.</p><p>o The temple survived the destruction of Hampi in 1565 and is a UNESCO World Heritage Site.</p><p><b>Ramappa Temple - Telangana</b></p><p>o The Ramappa Temple is located in Palampet village in Telangana state.</p><p>o Built in the 13th century during the Kakatiya dynasty reign, it is named after its sculptor, Ramappa, rather than the deity.</p><p>o The temple is dedicated to Lord Shiva and is known for its lightweight \"floating bricks\" that reportedly float on water.</p><p>o It features intricate carvings and sculptures depicting various mythological themes.</p><p>o In 2021, it was designated as a UNESCO World Heritage Site.</p><p><b>Kamakhya Temple - Assam</b></p><p>o The Kamakhya Temple is located on Nilachal Hill in Guwahati, Assam.</p><p>o It is one of the oldest and most revered Shakti Peethas dedicated to Goddess Kamakhya, a form of Goddess Durga.</p><p>o The temple's origin is dated to the 8th-9th century, with reconstructions in the 16th century.</p><p>o It is famous for its Ambubachi Mela, a fertility festival that celebrates the annual menstruation cycle of Goddess Kamakhya.</p><p>o The main shrine contains no idol but a stone that is worshipped as the yoni (female genital) of the goddess.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>The Lepakshi Temple, famous for its hanging pillar, is located in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2346;&#2344;&#2375; &#2354;&#2335;&#2325;&#2340;&#2375; &#2360;&#2381;&#2340;&#2306;&#2349; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2354;&#2375;&#2346;&#2366;&#2325;&#2381;&#2359;&#2368; &#2350;&#2306;&#2342;&#2367;&#2352; &#2325;&#2361;&#2366;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Andhra Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Tamil Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>",
      "<span class=\"eqt\">Kerala</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2352;&#2354;</span>",
      "<span class=\"eqt\">Karnataka</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;</span>"

    "correct_option_id": 0,
    "solution": "<p>The Lepakshi Temple is located in <b>Andhra Pradesh</b>.</p><p>Built in the 16th century during the Vijayanagara Empire, it is famous for its hanging pillar that does not touch the ground and can be passed through with a thin cloth or piece of paper.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is the oldest functioning temple in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2346;&#2369;&#2352;&#2366;&#2344;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2352;&#2340; &#2350;&#2306;&#2342;&#2367;&#2352; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Jagannath Temple, Puri</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2327;&#2344;&#2381;&#2344;&#2366;&#2341; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2346;&#2369;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Kashi Vishwanath Temple, Varanasi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2358;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357;&#2344;&#2366;&#2341; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2357;&#2366;&#2352;&#2366;&#2339;&#2360;&#2368;</span>"
