    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Who was the hero of Kalidasa's drama 'Malvikagnimitra'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2354;&#2367;&#2342;&#2366;&#2360; &#2325;&#2375; &#2344;&#2366;&#2335;&#2325; '&#2350;&#2366;&#2354;&#2357;&#2367;&#2325;&#2366;&#2327;&#2381;&#2344;&#2367;&#2350;&#2367;&#2340;&#2381;&#2352;' &#2325;&#2366; &#2344;&#2366;&#2351;&#2325; &#2325;&#2380;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ashoka's grandson</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2358;&#2379;&#2325; &#2325;&#2375; &#2346;&#2379;&#2340;&#2375;</span>",
      "<span class=\"eqt\">Chandragupta Maurya's Son</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2350;&#2380;&#2352;&#2381;&#2351; &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Brihadratha's Son</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2371;&#2361;&#2342;&#2381;&#2352;&#2341; &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Pushyamitra Sunga's Son</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2359;&#2381;&#2351;&#2350;&#2367;&#2340;&#2381;&#2352; &#2358;&#2369;&#2306;&#2327; &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Pushyamitra Sunga's Son Agnimitra was the hero of Kalidasa's drama 'Malvikagnimitra'.</p><p>Further Insight:</p><p>&bull; Shunga Dynasty</p><p>&#9675; First capital at Patliputra; second capital at Vidisha (under Agnimitra's viceroyalty)</p><p>&#9675; Pushyamitra Shunga:</p><p>&#9632; Defend the Gangetic valley and culture from Greek invasions.</p><p>&#9632; Erected the Bharhut Stupa.</p><p>&#9632; Revived Brahmanical order through Ashwamedha sacrifice and patronized scholars like Patanjali and Manu.</p><p>&#9675; Agnimitra Shunga:</p><p>&#9632; Succeeded Pushyamitra.</p><p>&#9632; Featured in Kalidasa's play Malvikagnimitra, a love story with handmaiden Malvika.</p><p>&#9632; His son Vasumitra repelled Demetrius I of Bactria.</p><p>&#9675; The last ruler, Devabhuti, was overthrown by Vasudeva, founding the Kanva Dynasty.</p><p>&#9675; Books written in this period : Manusmriti and Malvikagnimitra.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Pushyamitra Sunga the founder of the Sunga dynasty in place of Maurya's performed two Asvamedha Yajnas. Who was the priest of these two Yajanas?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2369;&#2306;&#2327; &#2357;&#2306;&#2358; &#2325;&#2375; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325; &#2346;&#2369;&#2359;&#2381;&#2351;&#2350;&#2367;&#2340;&#2381;&#2352; &#2358;&#2369;&#2306;&#2327; &#2344;&#2375; &#2350;&#2380;&#2352;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2342;&#2379; &#2309;&#2358;&#2381;&#2357;&#2350;&#2375;&#2343; &#2351;&#2332;&#2381;&#2334; &#2325;&#2367;&#2319;&#2404; &#2311;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2351;&#2332;&#2381;&#2334;&#2379;&#2306; &#2325;&#2366; &#2346;&#2369;&#2352;&#2379;&#2361;&#2367;&#2340; &#2325;&#2380;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Patanjali</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2306;&#2332;&#2354;&#2367;</span>",
      "<span class=\"eqt\">Kalidas</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2354;&#2367;&#2342;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Shusrut</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2358;&#2381;&#2352;&#2369;&#2340;</span>",
      "<span class=\"eqt\">Mahakashaypa</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2325;&#2358;&#2381;&#2351;&#2346;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Patanjali was the Priest of the two Asvamedha Yajnas performed by the Pusyamitra Sunga.</p><p>Further Insight:</p><p>&bull; Shunga Dynasty</p><p>&#9675; First capital at Patliputra; second capital at Vidisha (under Agnimitra's viceroyalty)</p><p>&#9675; Pushyamitra Shunga:</p><p>&#9632; Defend the Gangetic valley and culture from Greek invasions.</p><p>&#9632; Erected the Bharhut Stupa.</p><p>&#9632; Revived Brahmanical order through Ashwamedha sacrifice and patronized scholars like Patanjali and Manu.</p><p>&#9675; <img width=280 height=259 id=image1.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26918/image001.png\"></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Who was the founder of the Kanva dynasty, who killed the last ruler of the Sunga dynasty Devbhuti?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2339;&#2381;&#2357; &#2357;&#2306;&#2358; &#2325;&#2366; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325; &#2325;&#2380;&#2344; &#2341;&#2366;, &#2332;&#2367;&#2360;&#2344;&#2375; &#2358;&#2369;&#2306;&#2327; &#2357;&#2306;&#2358; &#2325;&#2375; &#2309;&#2306;&#2340;&#2367;&#2350; &#2358;&#2366;&#2360;&#2325; &#2342;&#2375;&#2357;&#2349;&#2370;&#2340;&#2367; &#2325;&#2368; &#2361;&#2340;&#2381;&#2351;&#2366; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Vasudeva</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2360;&#2369;&#2342;&#2375;&#2357;</span>",
      "<span class=\"eqt\">Pushyamitra</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2359;&#2381;&#2351;&#2350;&#2367;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Dantidurg</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2306;&#2340;&#2367;&#2342;&#2369;&#2352;&#2381;&#2327;</span>",
      "<span class=\"eqt\">Nagarjuna</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2327;&#2366;&#2352;&#2381;&#2332;&#2369;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Vasudeva was minister of Devabhuti, last ruler of the Sunga Dynasty. He killed Devabhuti in 73 BC and founded the Kanva Dynasty.</p><p>Further Insight:</p><p>&bull; Kanva Dynasty (73 BC  -  28 BC)</p><p>&#9675; Vasudeva Kanva overthrew Devabhuti, the last Shunga ruler, and established the Kanva Dynasty.</p><p>&#9675; Capitals: Vidisha and Patliputra.</p><p>&#9675; Vasudeva Kanva was succeeded by his son, Bhumimitra.</p><p>&#9675; Narayan, son of Bhumimitra, followed as the next ruler.</p><p>&#9675; The dynasty ruled for a total of 26 years.</p><p>&#9675; The last Kanva king, Susarman, was defeated and killed by the Satavahana (Andhra) king.</p><p>&#9675; This marked the end of the Kanva Dynasty, which was primarily a Brahmin dynasty.</p><p>&#9675; <img width=227 height=222 id=image2.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26918/image002.png\"></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Who was the founder of the Satvahana Dynasty?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2340;&#2357;&#2366;&#2361;&#2344; &#2357;&#2306;&#2358; &#2325;&#2366; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325; &#2325;&#2380;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Vasudeva</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2360;&#2369;&#2342;&#2375;&#2357;</span>",
      "<span class=\"eqt\">Pushyamitra</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2359;&#2381;&#2351;&#2350;&#2367;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Simuka</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2350;&#2369;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Satkarni I</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2325;&#2352;&#2381;&#2339;&#2368; I</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Simuka was the founder of the Stavahna Dynasty. </p><p>Further Insight:</p><p>&bull; </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which Satvahana ruler was the author of the book 'Gathasaptasati'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2366;&#2340;&#2357;&#2366;&#2361;&#2344; &#2358;&#2366;&#2360;&#2325; '&#2327;&#2366;&#2341;&#2366;&#2360;&#2346;&#2381;&#2340;&#2358;&#2340;&#2368;' &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2325;&#2366; &#2354;&#2375;&#2326;&#2325; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Simuka</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2350;&#2369;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Vasishthiputra Sri Satakarni</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2358;&#2367;&#2359;&#2381;&#2336;&#2367;&#2346;&#2369;&#2340;&#2381;&#2352; &#2358;&#2381;&#2352;&#2368; &#2358;&#2366;&#2340;&#2325;&#2352;&#2381;&#2339;&#2368;</span>",
      "<span class=\"eqt\">Satkarni I</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2325;&#2352;&#2381;&#2339;&#2368; I</span>",
      "<span class=\"eqt\">Hala</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2354;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Hala, The 17th ruler of Satavahana Dynasty was the author of book 'Gathasaptasati' or 'Sattasai' in Prakrit.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What was the Capital of Satavahanas?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2340;&#2357;&#2366;&#2361;&#2344;&#2379;&#2306; &#2325;&#2368; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2325;&#2381;&#2351;&#2366; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pratisthan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2359;&#2381;&#2336;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Madurai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2342;&#2369;&#2352;&#2376;</span>",
      "<span class=\"eqt\">Mathura</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2341;&#2369;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Ujjain</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2332;&#2381;&#2332;&#2376;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Pratisthan or Paithan was the capital of the Satavahanas</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The Nanaghat inscription which describes the achievements of the Satvahana Rule Satakarni-I issued by ___________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2366;&#2344;&#2366;&#2328;&#2366;&#2335; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326; &#2332;&#2379; &#2360;&#2366;&#2340;&#2357;&#2366;&#2361;&#2344; &#2358;&#2366;&#2360;&#2325; &#2360;&#2366;&#2340;&#2325;&#2352;&#2381;&#2339;&#2368;-I &#2325;&#2368; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, ___________ &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2332;&#2366;&#2352;&#2368; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Devi Balashri</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2375;&#2357;&#2368; &#2348;&#2366;&#2354;&#2366;&#2358;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Devi Naganika</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2375;&#2357;&#2368; &#2344;&#2366;&#2327;&#2344;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Gautamiputra Satakarni</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2380;&#2340;&#2350;&#2368;&#2346;&#2369;&#2340;&#2381;&#2352; &#2358;&#2366;&#2340;&#2325;&#2352;&#2381;&#2339;&#2368;</span>",
      "<span class=\"eqt\">Yajna Sri Satakarni</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2332;&#2381;&#2334; &#2358;&#2381;&#2352;&#2368; &#2360;&#2366;&#2340;&#2325;&#2352;&#2381;&#2339;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Devi Naganika, the widow of Satakarni-I issued the Nanaghat inscription which describes the achievements of the ruler Satakarni-I.</p><p>Further Insight:</p><p>&bull; Satavahana Dynasty</p><p>&#9675; Referred to as \"Andhras\" in the Puranas.</p><p>&#9675; Founded by Simuka.</p><p>&#9675; Emerged in the north-western Deccan region in the 1st century BC.</p><p>&#9675; Primary capital: Pratishthana (modern Paithan, Maharashtra) on the Godavari River.</p><p>&#9632; Secondary capital: Amravati.</p><p>&#9675; Sources of Information:</p><p>&#9632; Aitreya Brahmana, Puranas, epics, Brihat Katha by Gunadya, and Kamasutra by Vatsyayana.</p><p>&#9632; Inscriptions: Nanaghat, Nasik, Hatigumpa (Kharavela), and Erragudi (Ashoka).</p><p>&#9675; Known as \"megalithic people\" due to graves encircled by large stones.</p><p>&#9675; Gautamiputra Satkarni (Ekabrahmana):</p><p>&#9632; Defeated Sakas, Greeks, Parthians, and Nahapana (Western Satrapa).</p><p>&#9632; Achievements recorded in Nasik inscription by his mother, Gautami Balashri.</p><p>&#9675; Yajnasri Satakarni (150 CE):</p><p>&#9632; Reclaimed Gujarat, Malwa, and Andhra after Rudradaman's invasion.</p><p>&#9675; Declined by the late 2nd century CE.</p><p>&#9675; Replaced by the Vakataka Dynasty, another Brahmin dynasty, in the Deccan region.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Who convinced Menander, one of the Indo-Greek kings to adopt Buddhism? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2306;&#2337;&#2379;-&#2351;&#2370;&#2344;&#2366;&#2344;&#2368; &#2352;&#2366;&#2332;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2350;&#2375;&#2344;&#2366;&#2306;&#2337;&#2352; &#2325;&#2379; &#2348;&#2380;&#2342;&#2381;&#2343; &#2343;&#2352;&#2381;&#2350; &#2309;&#2346;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360;&#2344;&#2375; &#2352;&#2366;&#2332;&#2368; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mahakasypa</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2325;&#2358;&#2381;&#2351;&#2346;</span>",
      "<span class=\"eqt\">Mogaliputta Tissa</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2327;&#2366;&#2354;&#2367;&#2346;&#2369;&#2340;&#2381;&#2340; &#2340;&#2367;&#2360;&#2381;&#2360;&#2366;</span>",
      "<span class=\"eqt\">Vasumitra</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2360;&#2369;&#2350;&#2367;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Nagasen</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2327;&#2360;&#2375;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Nagasen, the author of 'Milindpanho'( or the Questions of the Milind or Menander) convinced Menander to adopt Buddhism. </p>",
    "question_index": 7

    "question": "<span class=\"eqt\"><p>Who were the first rulers in India to issue gold coins bearing inscriptions of the images of Kings and gods?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2366;&#2323;&#2306; &#2324;&#2352; &#2342;&#2375;&#2357;&#2340;&#2366;&#2323;&#2306; &#2325;&#2368; &#2331;&#2357;&#2367;&#2351;&#2379;&#2306; &#2357;&#2366;&#2354;&#2375; &#2360;&#2379;&#2344;&#2375; &#2325;&#2375; &#2360;&#2367;&#2325;&#2381;&#2325;&#2375; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2361;&#2354;&#2375; &#2358;&#2366;&#2360;&#2325; &#2325;&#2380;&#2344; &#2341;&#2375;?</p></span>",

    "solution": "<p>&bull; Indo-Greeks were the first rulers in India to issue gold coins bearing inscriptions of the images of Kings and gods.</p><p>Further Insight:</p><p>&bull; Indo-Greeks (200 BC  -  100 CE)</p><p>&#9675; Greek settlers in India during the Post-Mauryan Period.</p><p>&#9675; Indio-greek rule India in 3 Branches:</p><p>&#9632; Bactria (North Afghanistan)</p><p>&#9632; Taxila (Takshashila)</p><p>&#9632; Sakal (Sialkot, now in Pakistan)</p><p>&#9675; Menander (165 BC  -  145 BC):</p><p>&#9632; Adopted Buddhism under Nagasena, who authored Milindpanho in Sanskrit, a significant historical source.</p><p>&#9675; Indo-Greeks were the one who were First to issue gold coins with inscriptions of kings and gods.</p><p>&#9675; Introduced governance practices, curtain usage (yavan), and the term horasastra (horoscope).</p><p>&#9675; Fostered advancements in metallurgy, medicine, astronomy, stone-cutting, and perfume-making.</p>",

    "solution": "<p>&bull; In the reign of Gondophernes, the most famous Parthian ruler, St. Thomas is said to have come to India for the propagation of Christianity.</p><p>Further Insight:</p><p>&bull; Indo-Parthians (Pahlavas)</p><p>&#9675; By the end of 100 BC, rulers with Iranian origins, known as the Indo-Parthians or Pahlavas, established control over north-western India.</p><p>&#9675; Gondophernes:</p><p>&#9632; Most notable king of the Indo-Parthians.</p><p>&#9632; His reign is significant for the arrival of St. Thomas, who is believed to have come to India to propagate Christianity.</p>",

    "question": "<span class=\"eqt\"><p>Which ruler inscribed the Junagarh inscription or Girnar Rock inscription, earliest ever inscription written in perfect Sanskrit language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2358;&#2366;&#2360;&#2325; &#2344;&#2375; &#2332;&#2370;&#2344;&#2366;&#2327;&#2338;&#2364; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326; &#2351;&#2366; &#2327;&#2367;&#2352;&#2344;&#2366;&#2352; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326;, &#2332;&#2379; &#2358;&#2369;&#2342;&#2381;&#2343; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2327;&#2351;&#2366; &#2360;&#2348;&#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326; &#2361;&#2376;, &#2309;&#2306;&#2325;&#2367;&#2340; &#2325;&#2352;&#2366;&#2351;&#2366; &#2341;&#2366;?</p></span>",

      "<span class=\"eqt\">Chandragupta I</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Kadphises</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2337;&#2347;&#2367;&#2360;&#2375;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Rudradaman, the Saka or Scythian ruler, inscribed the Junagarh inscription or Girnar Rock inscription, earliest ever inscription written in the perfect Sanskrit language.</p><p>Further Insight:</p><p>&bull; Sakas (100 BC  -  150 CE)</p><p>&#9675; Also known as Scythians, originating from Western China.</p><p>&#9675; Maues (Moga):</p><p>&#9632; First Shaka king (c. 80 BC), known from inscriptions and coins.</p><p>&#9675; Rudradaman (130 CE  -  150 CE):</p><p>&#9632; Ruled from Ujjain and mentioned in the Junagarh inscription (in Sanskrit).</p><p>&#9632; Repaired the Sudarshan Lake (originally constructed during Chandragupta Maurya's reign) for irrigation.</p><p>&#9675; Bhumak and Nahapana (Girnar):</p><p>&#9632; Coins spread widely across western India.</p><p>&#9675; Frequent wars with the Satavahanas, pressuring the Deccan region.</p><p>&#9675; Patronized Indian art and culture; became Indianized.</p><p>&#9675; Important art centers: Sanchi, Mathura, and Gandhara.</p><p>&bull; The King of Ujjain defeated the Sakas, assumed the title \"Vikramaditya,\" and established the Vikram Samvat era in 58 CE.</p>",

  },

    "question": "<span class=\"eqt\"><p>Which ruler introduced the gold coins on a large scale and for regular use in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2358;&#2366;&#2360;&#2325; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2348;&#2337;&#2364;&#2375; &#2346;&#2376;&#2350;&#2366;&#2344;&#2375; &#2346;&#2352; &#2324;&#2352; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2379;&#2344;&#2375; &#2325;&#2375; &#2360;&#2367;&#2325;&#2381;&#2325;&#2375; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2319;?</p></span>",

      "<span class=\"eqt\">Vima Kadhpises</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2350;&#2366; &#2325;&#2343;&#2346;&#2368;&#2360;&#2375;&#2332;&#2364;</span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Vima Kadhpises the 2nd ruler of the Kushans Dynasty, issued gold coins for regular use in India.</p><p>Further Insight:</p><p>&bull; Kushanas (50 CE  -  230 CE)</p><p>&#9675; The Kushanas, also known as Yueh-Chis, originated from China.</p><p>&#9675; They ruled North-West India with Purushpur (Peshawar) as their capital.</p><p>&#9675; Kanishka:</p><p>&#9632; The most significant Kushana ruler and a follower of Mahayana Buddhism.</p><p>&#9632; Founded the Saka Era in 78 CE.</p><p>&#9675; Other notable rulers: Wem Kadphises, Huviska, and Vasiska.</p><p>&#9675; Under Kanishka's reign, the 4th Buddhist Council was held at Kundalvan Vihar (Kashmir).</p><p>&#9632; Vasumitra was the president, and Ashwaghosh was the vice-president.</p><p>&#9632; Ashwaghosh authored the \"Buddha Charita\" (Biography of Buddha).</p><p>&#9675; Nagarjuna propounded Madhyamika Philosophy and discussed relativity, earning the title of \"Einstein of India.\"</p><p>&#9632; The Kushanas controlled the Silk Route, benefiting greatly from it.</p><p>&#9632; Issued gold standard coins (22-23 carats).</p><p>&#9632; Processed Chinese silk at Bharoch (Gujarat), making it an important trade center.</p><p>&#9675; Introduced innovations like saddles, armour, turbans, trousers, helmets, long coats, and improved cavalry.</p><p>&#9675; Established the Satrap system, dividing the empire into Satrapies governed by Satraps.</p>",
    "question_index": 11
  },

    "question": "<span class=\"eqt\"><p>When did the Kushana King Kanishka crowned and started the Saka era, the official calendar of the Government of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2369;&#2359;&#2366;&#2339; &#2352;&#2366;&#2332;&#2366; &#2325;&#2344;&#2367;&#2359;&#2381;&#2325; &#2344;&#2375; &#2325;&#2348; &#2352;&#2366;&#2332;&#2381;&#2351;&#2366;&#2349;&#2367;&#2359;&#2375;&#2325; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2310;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2325; &#2325;&#2376;&#2354;&#2375;&#2306;&#2337;&#2352;, &#2358;&#2325; &#2360;&#2306;&#2357;&#2340; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;?</p></span>",

      "<span class=\"eqt\">78 AD</span><span class=\"hqt\" style=\"display:none\">78 AD</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Kansihka, the Kushana king, was crowned in the year 78 AD.</p><p>&bull; He started the Saka era or Saka Samvat which is currently used by the Government of India as the official calendar</p><p>Further Insight:</p><p>&bull; Kushanas (50 CE  -  230 CE)</p><p>&#9675; The Kushanas, also known as Yueh-Chis, originated from China.</p><p>&#9675; They ruled North-West India with Purushpur (Peshawar) as their capital.</p><p>&#9675; Kanishka:</p><p>&#9632; The most significant Kushana ruler and a follower of Mahayana Buddhism.</p><p>&#9632; Founded the Saka Era in 78 CE.</p><p>&#9675; Other notable rulers: Wem Kadphises, Huviska, and Vasiska.</p><p>&#9675; Under Kanishka's reign, the 4th Buddhist Council was held at Kundalvan Vihar (Kashmir).</p><p>&#9632; Vasumitra was the president, and Ashwaghosh was the vice-president.</p><p>&#9632; Ashwaghosh authored the \"Buddha Charita\" (Biography of Buddha).</p><p>&#9675; Nagarjuna propounded Madhyamika Philosophy and discussed relativity, earning the title of \"Einstein of India.\"</p><p>&#9632; The Kushanas controlled the Silk Route, benefiting greatly from it.</p><p>&#9632; Issued gold standard coins (22-23 carats).</p><p>&#9632; Processed Chinese silk at Bharoch (Gujarat), making it an important trade center.</p><p>&#9675; Introduced innovations like saddles, armour, turbans, trousers, helmets, long coats, and improved cavalry.</p><p>&#9675; Established the Satrap system, dividing the empire into Satrapies governed by Satraps.</p>",

    "question": "<span class=\"eqt\"><p>King Kanishka of the Kushana dynasty was the Patron of 4th Buddhist Council. Who was the Vice Chairman of the 4th Buddhist Council?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2369;&#2359;&#2366;&#2339; &#2357;&#2306;&#2358; &#2325;&#2375; &#2352;&#2366;&#2332;&#2366; &#2325;&#2344;&#2367;&#2359;&#2381;&#2325; &#2330;&#2340;&#2369;&#2352;&#2381;&#2341; &#2348;&#2380;&#2342;&#2381;&#2343; &#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2375; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2325; &#2341;&#2375;&#2404; &#2330;&#2340;&#2369;&#2352;&#2381;&#2341; &#2348;&#2380;&#2342;&#2381;&#2343; &#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2375; &#2313;&#2346;&#2366;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2380;&#2344; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Vasumitra</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2360;&#2369;&#2350;&#2367;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Mogaliputta Tissa</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2327;&#2366;&#2354;&#2367;&#2346;&#2369;&#2340;&#2381;&#2340; &#2340;&#2367;&#2360;&#2381;&#2360;&#2366;</span>",
      "<span class=\"eqt\">Ashvaghosa</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2358;&#2381;&#2357;&#2328;&#2379;&#2359;</span>",
      "<span class=\"eqt\">Mahakashypa</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2325;&#2358;&#2381;&#2351;&#2346;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Ashvaghosa minister of King Kanishka was the vice chairman of the 4th Buddhist council which held in Kundalvan near Kashmir Valley</p><p>Further Insight:</p><p>&bull; The Fourth Buddhist Council was convened in 72 CE under the patronage of Kushan King Kanishka in Kashmir.</p><p>&#9675; Presiding Figures:</p><p>&#9632; President: Vasumitra, a prominent Buddhist scholar.</p><p>&#9632; Vice-President: Ashvagosa, a renowned Buddhist philosopher and poet</p><p>&#9675; Purpose:</p><p>&#9632; To address doctrinal disputes and unify the Buddhist community.</p><p>&#9632; To compile and standardize the Buddhist scriptures, ensuring their preservation and consistency.</p><p>&#9675; Outcome:</p><p>&#9632; The council led to the formal separation of Buddhism into two major schools:</p><p>&bull; Hinayana (Lesser Vehicle): Emphasizes individual enlightenment.</p><p>&bull; Mahayana (Greater Vehicle): Focuses on collective salvation and the Bodhisattva path.</p><p>&#9632; Compilation of the Vibhasha Shastras, comprehensive commentaries on Buddhist teachings.</p>",
    "question_index": 13
  },

    "question": "<span class=\"eqt\"><p>The famous scholars of ancient India such as Parsva, Vasumitra, Nagarjuna, Charak were in the court of ___________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2357;&#2367;&#2342;&#2381;&#2357;&#2366;&#2344; &#2332;&#2376;&#2360;&#2375; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357;, &#2357;&#2360;&#2369;&#2350;&#2367;&#2340;&#2381;&#2352;, &#2344;&#2366;&#2327;&#2366;&#2352;&#2381;&#2332;&#2369;&#2344;, &#2330;&#2352;&#2325; ___________ &#2325;&#2375; &#2342;&#2352;&#2348;&#2366;&#2352; &#2350;&#2375;&#2306; &#2341;&#2375;&#2404;</p></span>",

      "<span class=\"eqt\">Chandragupta Vikramaditya</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2357;&#2367;&#2325;&#2381;&#2352;&#2350;&#2366;&#2342;&#2367;&#2340;&#2381;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Kanishka patronized many famous scholars such as Parsva, Vasumitra, Asvaghosha, Bagarjuna, charak and Mathara etc.</p><p>Further Insight:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Scholar</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Works and Contributions</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Parsva</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Not much is known about his works. He is traditionally believed to be a part of the Buddhist monastic tradition, but his specific contributions are unclear.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vasumitra</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- President of the Fourth Buddhist Council.   - Worked on the compilation of the Vibhasha Shastras, which were comprehensive commentaries on Buddhist teachings.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ashvagosa</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Composed Buddhacarita (Biography of the Buddha), a major work on the life of the Buddha.   - Was a key figure in promoting Mahayana Buddhism.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Nagarjuna</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Propounded Madhyamika philosophy, which is central to Mahayana Buddhism.   - Known for his work on \"Mulamadhyamakakarika\", a key text in Buddhist philosophy.   - Discussed the concept of relativity and is sometimes referred to as the \"Einstein of India\".</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Charaka</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Famous for his work Charaka Samhita, a foundational text on Ayurveda (Indian traditional medicine).   - Provided systematic guidelines for medical treatments, diagnosis, and medicinal plants.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Mathara</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Contributions are less documented, but Mathara is often mentioned in Buddhist texts related to Buddhist councils and religious activities.</td></tr></table>",

  },

    "correct_option_id": 0,
    "solution": "<p>&bull; Satvahanas patronise and help in development of Amravati School of art</p><p>Further Insight:</p><p>&bull; Amravati School of Art</p><p>&#9675; The Amravati School of Art developed during the rule of the Satavahanas (2nd century BCE to 2nd century CE) in the region of Andhra Pradesh.</p><p>&#9675; It is one of the most important centers of Buddhist art in ancient India, flourishing during the reign of the Kushanas, especially under Kanishka.</p><p>&#9675; The Amravati style is characterized by:</p><p>&#9632; Depictions of the Buddha's life and important Buddhist events, often in continuous narratives. This was a significant development in Buddhist art.</p><p>&#9632; The use of high relief sculptures and fine detailing in stone, including representations of Buddha, Bodhisattvas, and other figures in the Buddhist pantheon.</p><p>&#9632; The art reflects influences from Greek, Roman, and Persian cultures due to the cultural exchanges along the Silk Route under Kushana rule.</p><p>&#9632; Unlike earlier Buddhist art that avoided depicting the Buddha directly, the Amravati school introduced symbolic depictions and narrative art, often portraying the Buddha's life through scenes like the birth of Buddha, enlightenment, and first sermon.</p><p>&#9632; Mainly created in white limestone and marble</p><p>&#9675; The Amravati Stupa is a key monument that features the sculptures from this school. The stupa is adorned with sculptures that showcase various Buddhist themes, such as the Jataka tales (stories of the Buddha's previous lives).</p><p>&#9675; The Amravati school declined with the rise of the Vakatakas and the shift in patronage, but it remains a major source of information on early Buddhist art.</p>",
    "question_index": 16
  },

    "solution": "<p>&bull; Nashik inscription, which records the achievement of Gautamiputra Satkarni inscribed by his mother Gautami Balashri.</p><p>Further Insight:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Inscription Name</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Location</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Significance</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Key Details</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Nanaghat Inscription</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Nanaghat, Maharashtra</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Important record of Satavahana rulers' reign and their relations with the West.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Commemorates Queen Nayanika's contributions and records donations.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Nasik Inscription</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Nasik, Maharashtra</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Provides details about the Satavahana dynasty, their rulers, and their territories.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Details the reign of Gautamiputra Satakarni and his mother Gautami Balashri.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hatigumpa Inscription</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hathigumpha, Odisha</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Chronicles the achievements of Kharavela of the Kalinga dynasty and his interactions with the Satavahanas.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Describes the defeat of Satavahanas by Kharavela, emphasizing his military success.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Erragudi Inscription</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Erragudi, Andhra Pradesh</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Relates to the Ashokan edicts and the role of Satavahanas in supporting Buddhism.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Mentions the support of Ashoka's edicts and the spread of Buddhism.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Junnar Inscription</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Junnar, Maharashtra</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Contains details about the administrative and military power of the Satavahanas.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Details the governance structure, including titles like \"Mahakshatrapa\" used by rulers.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Gulbarga Inscription</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Gulbarga, Karnataka</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Provides insight into the military exploits of Satavahana kings.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Mentions victories over foreign rulers and establishment of Satavahana power.</td></tr></table>",
