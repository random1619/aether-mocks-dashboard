<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>How much percentage of oxygen is present in the atmosphere?</p>",
    "options": [
      "39%",
      "79%",
      "10%",
      "21%"
    ],
    "correct_option_id": 3,
    "solution": "<p>The air in Earth's atmosphere is made up of approximately 78 percent nitrogen and <b>21 percent</b> oxygen. Air also has small amounts of other gases, too, such as carbon dioxide, neon, and hydrogen.</p>",
    "question_index": 0
  },
  {
    "question": "<p>All changes in the weather of the earth are caused by the ________.</p>",
    "options": [
      "altitude",
      "tides",
      "sun",
      "moon"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>sun</b> plays a central role in driving weather changes. It is the primary source of energy for our planet's atmosphere and surface. The sun's energy heats the Earth, causing variations in temperature that lead to the formation of weather patterns.</p>",
    "question_index": 1
  },
  {
    "question": "<p>The zone separating the troposphere from the stratosphere is called the ________________.</p>",
    "options": [
      "Stratomerge",
      "Tropopause",
      "Tropomerge",
      "Stratospause"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Tropopause is the boundary layer that separates the troposphere (lowest layer of the atmosphere) from the stratosphere.</p><p>&#183; The troposphere extends from the Earth's surface up to about 8-15 km and contains most of the weather phenomena like clouds, rain, and storms.</p><p>&#183; The tropopause acts as a transition layer, where the temperature stops decreasing with height and remains constant for a short distance before increasing in the stratosphere.</p><p>&#183; It is also important because it prevents strong vertical mixing of air masses, thereby trapping moisture and preventing cloud formation in the stratosphere.</p><p>Thus, the correct answer is Tropopause.</p>",
    "question_index": 2
  },
  {
    "question": "<p>The ozone layer is found in which of the following layers of the atmosphere?</p>",
    "options": [
      "Stratosphere",
      "Troposphere",
      "Mesosphere",
      "Exosphere"
    ],
    "correct_option_id": 0,
    "solution": "<p>The ozone layer is primarily located in the lower portion of the <b>stratosphere</b>, approximately 20-30 km above the Earth's surface.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Name the hot, dry oppressing winds that blow in between Delhi and Patna.</p>",
    "options": [
      "Nor westers",
      "Mango shower",
      "Blossom shower",
      "Loo"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Loo</b> is a strong, hot and dry summer afternoon wind from the west which blows over the western Indo-Gangetic Plain region of North India and Pakistan. It is especially strong in the months of May and June. Due to its very high temperatures (45 &deg;C - 50 &deg;C or 115&deg;F-120&deg;F), exposure to it may lead to heat strokes. Due to its extremely low humidity and high temperatures, the Loo also has a severe drying effect on vegetation leading to widespread browning in the areas affected by it during the months of May and June.</p>",
    "question_index": 4
  },
  {
    "question": "<p>What is the average height of troposphere?</p>",
    "options": [
      "20 km",
      "13 km",
      "24 km",
      "8 km"
    ],
    "correct_option_id": 1,
    "solution": "<p>The troposphere extends upward to about <b>10 km</b> (6.2 miles or about 33,000 feet) above sea level. The height of the top of the troposphere varies with latitude (it is lowest over the poles and highest at the equator) and by season (it is lower in winter and higher in summer).</p>",
    "question_index": 5
  },
  {
    "question": "<p>The centre of a cyclone is a calm area. It is called the ____ of the storm.</p>",
    "options": [
      "base",
      "focal point",
      "eye",
      "trigger point"
    ],
    "correct_option_id": 2,
    "solution": "<p>The centre of a cyclone is referred to as the \"<b>eye</b>,\" and it is characterized by calm and relatively clear weather conditions amidst the surrounding storm.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Polar easterlies are which kind of winds?</p>",
    "options": [
      "Seasonal winds",
      "Permanent winds",
      "Sea storm",
      "Local winds"
    ],
    "correct_option_id": 1,
    "solution": "<p>Permanent winds, also known as invariable or planetary wind systems, are global-scale wind patterns that blow consistently in the same direction throughout the year.</p><p>Polar winds flow from polar high-pressure belts to subpolar low-pressure belts in both hemispheres north and south. So, Polar winds are <b>permanent</b> kind of winds.</p>",
    "question_index": 7
  },
  {
    "question": "<p>The 'Western Disturbances' originate from the _____.</p>",
    "options": [
      "East China Sea",
      "Mediterranean Sea",
      "Arabian Sea",
      "Red Sea"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Western Disturbances are low-pressure systems originating over the <b>Mediterranean Sea</b>.</p><p>&#183; They bring winter rain and snow to northern India, particularly over the northwestern plains and the Himalayas.</p><p>&#183; These disturbances travel eastward and affect the Indian subcontinent during the winter season.</p>",
    "question_index": 8
  },
  {
    "question": "<p>What is the correct percentage by volume of various gases in Earth's atmosphere?</p>",
    "options": [
      "20.95% nitrogen, 78.09% oxygen, and 0.04% carbon dioxide and other greenhouse gases.",
      "10.95%nitrogen, 88.09% oxygen, and 0.09% carbon dioxide and other greenhouse gases.",
      "10.95% nitrogen, 78.09% oxygen, and 0.03% carbon dioxide and other greenhouse gases.",
      "78% nitrogen, 21% oxygen, and 0.03% carbon dioxide and other greenhouse gases."
    ],
    "correct_option_id": 3,
    "solution": "<p>Dry air is composed of approximately 78% nitrogen, 21% oxygen, 0.03% carbon dioxide, 1% argon, and small quantities of other gases.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Ozone at the higher level of the atmosphere is a product of ________ acting on oxygen molecules.</p>",
    "options": [
      "IR radiation",
      "UV Radiation",
      "Gamma rays",
      "X-rays"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Ozone at the higher level of the atmosphere is a product of ultraviolet radiation acting on oxygen molecules.</p><p>&bull; The ozone layer or ozone shield is a region of Earth's stratosphere that absorbs most of the Sun's ultraviolet radiation. It contains a high concentration of ozone (O3) in relation to other parts of the atmosphere, although still small in relation to other gases in the stratosphere.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Which of the following planets' atmosphere is made up of thick white and yellowish clouds of sulphuric acid?</p>",
    "options": [
      "Venus",
      "Neptune",
      "Mars",
      "Jupiter"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#8226; Venus has a dense atmosphere composed primarily of carbon dioxide, with clouds of sulphuric acid that reflect sunlight, making it the brightest planet in the night sky.</p><p>&#8226; These thick clouds trap heat, contributing to Venus being the hottest planet in the solar system.</p><p>&#8226; Other planets like Mars and Jupiter have atmospheres composed of different gases, mainly hydrogen, helium, and carbon dioxide.</p>",
    "question_index": 11
  },
  {
    "question": "<p>The rotating columns of air that occur over water bodies and are generally less severe than land tornadoes are known as:</p>",
    "options": [
      "Waterspouts",
      "Hurricanes",
      "Typhoons",
      "Squalls"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Waterspouts are the rotating columns of air that occur over water bodies and are generally less severe than land tornadoes.</p><p>&bull; Waterspouts: Tornado-like spinning columns of air and water mist formed over warm ocean waters, often associated with cumulus clouds.</p><p>&bull; Hurricanes: Intense tropical cyclones with strong winds (over 119 km/h) and heavy rain, forming over warm Atlantic and eastern Pacific waters.</p><p>&bull; Typhoons: Severe tropical cyclones with high winds and heavy rainfall, occurring over the western Pacific Ocean, similar to hurricanes.</p><p>&bull; Squalls: Sudden, short-lived bursts of strong winds, often accompanied by rain or thunderstorms, caused by atmospheric instability.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Which of the following statements is INCORRECT regarding the Coriolis force?</p>",
    "options": [
      "It is absent at the equator.",
      "Deflection is less when the wind speed is high.",
      "It deflects the wind to the right in the north and left in the south.",
      "It is directly proportional to the angle of altitude."
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Coriolis force is an apparent force caused by Earth's rotation, which affects moving objects like winds and ocean currents.</p><p>&#183; It is absent at the equator (Statement A is correct).</p><p>&#183; It causes winds to deflect to the right in the Northern Hemisphere and to the left in the Southern Hemisphere (Statement C is correct).</p><p>&#183; The force is directly proportional to latitude (Statement D is correct).</p><p>&#183; However, greater wind speed leads to greater deflection, not less. Hence, Statement B is incorrect.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Orographic rainfall occurs when _____________.</p>",
    "options": [
      "A cyclone makes landfall.",
      "The air masses collide at the Intertropical Convergence Zone.",
      "Saturated air mass comes across a mountain.",
      "Hot air rises up in conventional currents."
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Orographic rainfall occurs when moist air is forced to rise over a mountain range.</p><p>&#183; As the air rises, it cools and condenses, causing rainfall on the windward side of the mountain.</p><p>&#183; The leeward side remains dry, creating a rain shadow region.</p><p>&#183; Incorrect options: </p><p>o Option A: Cyclones bring rainfall, but they are not related to mountains.</p><p>o Option B: The Intertropical Convergence Zone (ITCZ) causes rain due to trade winds, not mountains.</p><p>o Option D: Convectional rainfall occurs due to heating of air, not because of mountains.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Western disturbances are responsible for:</p>",
    "options": [
      "extremely chilled weather of north-east India",
      "dusty storms in eastern coastal area of India",
      "rainfall during winters in north-western part of India",
      "hot winds during summers in northern India"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Western Disturbances</b> are <b>extratropical storms</b> originating in the <b>Mediterranean region</b>.</p><p>&bull; They travel eastward and enter <b>north-western India</b> via <b>Pakistan</b>, especially during <b>winter months (November to March)</b>.</p><p>&bull; These disturbances bring <b>rainfall and snowfall</b> to the <b>northwestern plains</b> (like Punjab, Haryana, Delhi, western UP) and <b>Himalayan regions</b> (like Himachal Pradesh, Uttarakhand, Jammu &amp; Kashmir).</p><p>&bull; This winter rainfall is crucial for the <b>rabi crops</b>, particularly <b>wheat</b>.</p>",
    "question_index": 15
  },
  {
    "question": "<p>_________ is a naturally occurring phenomenon that is responsible for the heating of the Earth's Surface and atmosphere.</p>",
    "options": [
      "Greenhouse effect",
      "Global heating",
      "Radiation",
      "Global warming"
    ],
    "correct_option_id": 0,
    "solution": "<p>The <b>greenhouse effec</b>t is a natural process where certain gases in the Earth's atmosphere trap heat from the sun, preventing it from escaping back into space. This process helps maintain Earth's temperature conducive to life. However, human activities, such as burning fossil fuels, have intensified this effect, leading to global warming and climate change.</p>",
    "question_index": 16
  },
  {
    "question": "<p>A dense mass of water drops on smoke or dust particles in the lower atmosphere layers is referred to as:</p>",
    "options": [
      "Mist",
      "Blizzard",
      "Frost",
      "Smog"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Smog is a combination of smoke and fog in the atmosphere.</p><p>&bull; It is caused by pollutants, mainly from vehicles and industries, and affects visibility and air quality.</p><p>&bull; Smog is a major issue in urban areas, especially in Delhi, Mumbai, and Beijing.</p>",
    "question_index": 17
  },
  {
    "question": "<p>What is mainly responsible for the increase in the greenhouse effect?</p>",
    "options": [
      "Increasing SO<sub>2</sub> levels",
      "Ozone layer hole",
      "Chlorofluorocarbon content is rising",
      "Increasing CO<sub>2</sub> concentration"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; <b>Increasing CO<sub>2</sub> concentration</b> is mainly responsible for the enhanced greenhouse effect.</p><p>&#183; CO<sub>2</sub> traps heat in the atmosphere, intensifying global warming.</p><p>&#183; SO<sub>2</sub> causes acid rain, the ozone layer hole affects UV radiation, and CFCs primarily deplete ozone, not the greenhouse effect.</p><p><b>Further Insight:</b></p><p>CO<sub>2</sub> emissions from fossil fuel combustion are a primary focus of climate change mitigation efforts, driving policies for renewable energy and carbon reduction.</p>",
    "question_index": 18
  },
  {
    "question": "<p>In which month is the Inter-Tropical Convergence Zone (ITCZ) located around 20&deg;N-25&deg;N latitude (over the Gangetic plain)?</p>",
    "options": [
      "May",
      "August",
      "June",
      "July"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Inter-Tropical Convergence Zone (ITCZ) is a low-pressure belt near the equator that shifts northwards during summers.</p><p>&#183; In July, it moves to 20&deg;N-25&deg;N over northern India (Gangetic Plain), bringing monsoon rains.</p><p>&#183; In winter (January), it shifts southward near the equator.</p><p>Thus, July is the correct answer.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
