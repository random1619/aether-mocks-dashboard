    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following is used to identify the presence of water in a sample?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2344;&#2350;&#2370;&#2344;&#2375; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lime water</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2348;&#2370; &#2325;&#2366; &#2352;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Anhydrous copper(II) sulfate</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2332;&#2354; &#2325;&#2377;&#2346;&#2352; (II) &#2360;&#2354;&#2381;&#2347;&#2375;&#2335;</span>",
      "<span class=\"eqt\">Hydrogen chloride</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344; &#2325;&#2381;&#2354;&#2379;&#2352;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Potassium permanganate</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2335;&#2375;&#2358;&#2367;&#2351;&#2350; &#2346;&#2352;&#2350;&#2376;&#2306;&#2327;&#2344;&#2375;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Anhydrous copper(II) sulfate (CuSO&#8324;) is white in its anhydrous form.</p><p>&#183; When water is present, it reacts with the copper(II) sulfate to form hydrated copper(II) sulfate (CuSO&#8324;&#183;5H&#8322;O), which is blue. </p><p>&#183; This color change from white to blue indicates the presence of water.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which method is commonly used to separate a mixture of liquids with different boiling points?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2381;&#2357;&#2341;&#2344;&#2366;&#2306;&#2325; &#2357;&#2366;&#2354;&#2375; &#2340;&#2352;&#2354; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2375; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2379; &#2309;&#2354;&#2327; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2367;&#2360; &#2357;&#2367;&#2343;&#2367; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Filtration</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2360;&#2381;&#2346;&#2306;&#2342;&#2344;</span>",
      "<span class=\"eqt\">Distillation</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2360;&#2357;&#2344;</span>",
      "<span class=\"eqt\">Chromatography</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2379;&#2350;&#2376;&#2335;&#2379;&#2327;&#2381;&#2352;&#2366;&#2347;&#2368;</span>",
      "<span class=\"eqt\">Sublimation</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2368; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Distillation is a separation technique that relies on the differences in boiling points of the components in a liquid mixture.<sup> </sup></p><p>The mixture is heated, and the component with the lower boiling point vaporizes first, is condensed, and collected separately. </p><p>Further insights:</p><p>&#183; <b>Filtration:</b> Filtration is used to separate solid particles from a liquid by passing the mixture through a filter medium. </p><p>&#183; <b>Chromatography:</b> Chromatography separates components of a mixture based on their differing affinities for a stationary and mobile phase. </p><p>&#183; <b>Sublimation:</b> Sublimation is used to separate a solid that sublimes (transitions directly from solid to gas) from other solids in a mixture.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What is the principle of chromatography?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2352;&#2379;&#2350;&#2376;&#2335;&#2379;&#2327;&#2381;&#2352;&#2366;&#2347;&#2368; &#2325;&#2366; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Separation based on differences in solubility</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2369;&#2354;&#2344;&#2358;&#2368;&#2354;&#2340;&#2366; &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2346;&#2371;&#2341;&#2325;&#2381;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Separation based on differences in boiling points</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2357;&#2341;&#2344;&#2366;&#2306;&#2325; &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2346;&#2371;&#2341;&#2325;&#2381;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Separation based on differences in mass</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2346;&#2371;&#2341;&#2325;&#2381;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Separation based on differences in color</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2306;&#2327; &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2346;&#2371;&#2341;&#2325;&#2381;&#2325;&#2352;&#2339;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Chromatography separates components of a mixture based on their differing affinities (solubility) for a stationary phase and a mobile phase. The components move through the system at different rates, leading to their separation. </p><p>Three components form the basis of the chromatography technique.</p><p>&#183; Stationary phase: This phase is always composed of a \"solid\" phase or \"a layer of a liquid adsorbed on the surface a solid support\".</p><p>&#183; Mobile phase: This phase is always composed of \"liquid\" or a \"gaseous component.\"</p><p>&#183; Separated molecules</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What color is the flame test result for sodium compounds?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2351;&#2380;&#2327;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2381;&#2357;&#2366;&#2354;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2366; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2325;&#2367;&#2360; &#2352;&#2306;&#2327; &#2325;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Green</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Blue</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Yellow</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Red</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; When sodium compounds are introduced to a flame, they produce a characteristic bright yellow color. </p><p>&#183; This is due to the excitation of sodium atoms, which emit light at specific wavelengths (primarily around 589 nm) when they return to their ground state.</p><p>&#183; This distinctive yellow color is why sodium street lights (which use sodium vapor) give off that characteristic yellow-orange glow, and it's also why table salt (sodium chloride) will make a flame turn yellow when thrown into a fire.</p><p><img border=0 width=385 height=220 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27567/image001.png\"></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following gases can be tested using limewater?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2327;&#2376;&#2360; &#2325;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2330;&#2370;&#2344;&#2375; &#2325;&#2375; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Oxygen</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Carbon dioxide</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2312;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Hydrogen</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Nitrogen</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Limewater (a solution of calcium hydroxide, Ca(OH)&#8322;) is used as a specific test for carbon dioxide. When carbon dioxide gas is bubbled through limewater, it reacts to form calcium carbonate, which is insoluble and causes the solution to turn cloudy or milky white.</p><p>The chemical reaction is: </p><p>Ca(OH)&#8322; + CO&#8322; &rarr; CaCO&#8323; + H&#8322;O</p><p>This cloudiness or milky precipitate formation is a positive test result, indicating the presence of carbon dioxide. This test is commonly used in laboratories to detect CO&#8322; in exhaled breath or as a product of chemical reactions.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What does a positive result in the test for sulfate ions (SO&#8324;&#178;&#8315;) look like?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2354;&#2381;&#2347;&#2375;&#2335; &#2310;&#2351;&#2344;&#2379;&#2306; (SO&#8324;&#178;&#8315;) &#2325;&#2375; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2350;&#2375;&#2306; &#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2325;&#2376;&#2360;&#2366; &#2342;&#2367;&#2326;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A white precipitate forms when barium chloride is added.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2352;&#2367;&#2351;&#2350; &#2325;&#2381;&#2354;&#2379;&#2352;&#2366;&#2311;&#2337; &#2350;&#2367;&#2354;&#2366;&#2344;&#2375; &#2346;&#2352; &#2360;&#2347;&#2375;&#2342; &#2309;&#2357;&#2325;&#2381;&#2359;&#2375;&#2346; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A red precipitate forms when silver nitrate is added.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2354;&#2381;&#2357;&#2352; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2375;&#2335; &#2350;&#2367;&#2354;&#2366;&#2344;&#2375; &#2346;&#2352; &#2354;&#2366;&#2354; &#2309;&#2357;&#2325;&#2381;&#2359;&#2375;&#2346; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A gas is produced when hydrochloric acid is added.</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2325;&#2381;&#2354;&#2379;&#2352;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337; &#2350;&#2367;&#2354;&#2366;&#2344;&#2375; &#2346;&#2352; &#2327;&#2376;&#2360; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A yellow precipitate forms when lead nitrate is added.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2375;&#2337; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2375;&#2335; &#2350;&#2367;&#2354;&#2366;&#2344;&#2375; &#2346;&#2352; &#2319;&#2325; &#2346;&#2368;&#2354;&#2366; &#2309;&#2357;&#2325;&#2381;&#2359;&#2375;&#2346; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>When testing for sulfate ions (SO&#8324;&#178;&#8315;), the standard procedure involves adding barium chloride (BaCl&#8322;) solution to the test solution, typically in acidic conditions (dilute HCl is often added first). If sulfate ions are present, a white precipitate of barium sulfate (BaSO&#8324;) forms immediately.</p><p>The chemical reaction is: Ba&#178;&#8314; + SO&#8324;&#178;&#8315; &rarr; BaSO&#8324;(s)</p><p>This white precipitate is insoluble in water and acids, which helps distinguish it from some other white precipitates. The formation of this white precipitate with barium chloride is a definitive test for the presence of sulfate ions.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>What is the chemical formula for the reagent used to test for halide ions (Cl&#8315;, Br&#8315;, I&#8315;)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2376;&#2354;&#2366;&#2311;&#2337; &#2310;&#2351;&#2344;&#2379;&#2306; (Cl&#8315;, Br&#8315;, I&#8315;) &#2325;&#2375; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2351;&#2369;&#2325;&#2381;&#2340; &#2309;&#2349;&#2367;&#2325;&#2352;&#2381;&#2350;&#2325; &#2325;&#2366; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2360;&#2370;&#2340;&#2381;&#2352; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Silver nitrate (AgNO&#8323;)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2354;&#2381;&#2357;&#2352; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2375;&#2335; (AgNO<sub>3</sub>)</span>",
      "<span class=\"eqt\">Potassium iodide (KI)</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2335;&#2375;&#2358;&#2367;&#2351;&#2350; &#2310;&#2351;&#2379;&#2337;&#2366;&#2311;&#2337; (KI)</span>",
      "<span class=\"eqt\">Sodium hydroxide (NaOH)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; (NaOH)</span>",
      "<span class=\"eqt\">Copper sulfate (CuSO&#8324;)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2377;&#2346;&#2352; &#2360;&#2354;&#2381;&#2347;&#2375;&#2335; (CuSO&#8324;)</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The chemical formula for the reagent used to test for halide ions (Cl&#8315;, Br&#8315;, I&#8315;) is AgNO&#8323; (silver nitrate).</p><p>When silver nitrate solution is added to a solution containing halide ions, it forms a characteristic precipitate with each halide:</p><p>&#183; Chloride ions (Cl&#8315;) form a white precipitate of silver chloride (AgCl)</p><p>&#183; Bromide ions (Br&#8315;) form a cream/pale yellow precipitate of silver bromide (AgBr)</p><p>&#183; Iodide ions (I&#8315;) form a yellow precipitate of silver iodide (AgI)</p><p>The general reaction is: Ag&#8314; + X&#8315; &rarr; AgX(s) (where X is Cl, Br, or I)</p><p>This test is typically performed in dilute nitric acid (HNO&#8323;) to prevent interference from other ions that might form precipitates with silver ions.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the correct statement.</p><p>I. Iodine solution is the standard reagent used to test for the presence of starch. </p><p>II. When iodine solution comes into contact with starch, it produces a characteristic blue-black or deep purple color.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2310;&#2351;&#2379;&#2337;&#2368;&#2344; &#2328;&#2379;&#2354; &#2360;&#2381;&#2335;&#2366;&#2352;&#2381;&#2330; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2311;&#2360;&#2381;&#2340;&#2375;&#2350;&#2366;&#2354; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2350;&#2366;&#2344;&#2325; &#2309;&#2349;&#2367;&#2325;&#2352;&#2381;&#2350;&#2325; &#2361;&#2376;&#2404;</p><p>II. &#2332;&#2348; &#2310;&#2351;&#2379;&#2337;&#2368;&#2344; &#2328;&#2379;&#2354; &#2360;&#2381;&#2335;&#2366;&#2352;&#2381;&#2330; &#2325;&#2375; &#2360;&#2306;&#2346;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2310;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2351;&#2361; &#2319;&#2325; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2344;&#2368;&#2354;&#2366;-&#2325;&#2366;&#2354;&#2366; &#2351;&#2366; &#2327;&#2361;&#2352;&#2366; &#2348;&#2376;&#2306;&#2327;&#2344;&#2368; &#2352;&#2306;&#2327; &#2346;&#2376;&#2342;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Iodine solution (often in the form of potassium iodide solution, or I&#8322;/KI, also known as Lugol's iodine) is the standard reagent used to test for the presence of starch. </p><p>&#183; When iodine solution comes into contact with starch, it produces a characteristic blue-black or deep purple color. This happens because the iodine molecules become trapped within the helical structure of the starch (specifically the amylose component), causing this distinctive color change.</p><p>&#183; This is a very sensitive and specific test that's commonly used in biology and food science.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Match the chemical test with the substance it detects:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column A(Test)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column B(Substance)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.Flame test</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.Chlorine gas</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.Barium chloride test</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.Sodium ions</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.Limewater test</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.Sulfate ions</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.Silver nitrate test</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.Halide ions</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2361;&#2330;&#2366;&#2344;&#2375; &#2327;&#2319; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A(&#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B(&#2346;&#2342;&#2366;&#2352;&#2381;&#2341;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.&#2332;&#2381;&#2357;&#2366;&#2354;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.&#2325;&#2381;&#2354;&#2379;&#2352;&#2368;&#2344; &#2327;&#2376;&#2360;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.&#2348;&#2375;&#2352;&#2367;&#2351;&#2350; &#2325;&#2381;&#2354;&#2379;&#2352;&#2366;&#2311;&#2337; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2310;&#2351;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.&#2330;&#2370;&#2344;&#2375; &#2325;&#2375; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.&#2360;&#2354;&#2381;&#2347;&#2375;&#2335; &#2310;&#2351;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.&#2360;&#2367;&#2354;&#2381;&#2357;&#2352; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2375;&#2335; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.&#2361;&#2376;&#2354;&#2366;&#2311;&#2337; &#2310;&#2351;&#2344;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i &rarr; b, ii &rarr; c, iii &rarr; a, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; c, iii &rarr; a, iv &rarr; d</span>",
      "<span class=\"eqt\">i &rarr; a, ii &rarr; b, iii &rarr; c, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; b, iii &rarr; c, iv &rarr; d</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; c, iii &rarr; d, iv &rarr; a</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; c, iii &rarr; d, iv &rarr; a</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; a, iii &rarr; b, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; a, iii &rarr; b, iv &rarr; d</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Flame test detects Sodium ions (Na&#8314;), which produce a yellow flame.</p><p>&#183; Barium chloride test detects Sulfate ions (SO&#8324;&#178;&#8315;), forming a white precipitate.</p><p>&#183; Limewater test detects Chlorine gas (Cl&#8322;), which turns limewater cloudy.</p><p>&#183; Silver nitrate test detects Halide ions (Cl&#8315;, Br&#8315;, I&#8315;), forming precipitates of silver halides.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which test is used to detect the presence of reducing sugars?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2346;&#2330;&#2366;&#2351;&#2325; &#2358;&#2352;&#2381;&#2325;&#2352;&#2366; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2366; &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Benedict's test</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2344;&#2375;&#2337;&#2367;&#2325;&#2381;&#2335; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Iodine test</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2379;&#2337;&#2368;&#2344; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Flame test</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2381;&#2357;&#2366;&#2354;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Tollen's test</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2377;&#2354;&#2375;&#2344; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Benedict's test is specifically used to detect reducing sugars such as glucose, fructose, lactose, and maltose. </p><p>&#183; When Benedict's solution (which contains copper(II) sulfate, sodium carbonate, and sodium citrate) is heated with a solution containing reducing sugars, the blue copper(II) ions are reduced to copper(I) oxide, which forms a brick-red precipitate.</p><p>&#183; The color change sequence typically goes from blue &rarr; green &rarr; yellow &rarr; orange &rarr; red, depending on the concentration of reducing sugar present. </p><p>&#183; The formation of this precipitate indicates a positive result for reducing sugars.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>What type of analysis is used to determine the composition of an unknown sample?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2332;&#2381;&#2334;&#2366;&#2340; &#2344;&#2350;&#2370;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2357;&#2367;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Quantitative analysis</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2340;&#2381;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2357;&#2367;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Qualitative analysis</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325; &#2357;&#2367;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Titration</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2366;&#2311;&#2335;&#2381;&#2352;&#2375;&#2335; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Spectroscopy</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2360;&#2381;&#2325;&#2379;&#2346;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Qualitative analysis is the type of chemical analysis used to determine the composition or identity of components in an unknown sample. It identifies what substances are present in a sample without necessarily measuring how much of each is present.</p><p>Qualitative analysis typically involves performing various chemical tests (like flame tests, precipitation reactions, or color change reactions) to detect the presence of specific ions or compounds in a sample.</p><p>The other options have different purposes:</p><p>&#183; Quantitative analysis determines how much of a substance is present (the amount or concentration)</p><p>&#183; Titration is a specific laboratory technique used in quantitative analysis to determine the concentration of a substance</p><p>&#183; Spectroscopy is an instrumental technique that can be used for both qualitative and quantitative analysis, but it's not a type of analysis itself - rather, it's a method or technique</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an example of a non-metal that is commonly tested in chemical analysis?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2327;&#2376;&#2352;-&#2343;&#2366;&#2340;&#2369; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2357;&#2367;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sodium (Na)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; (Na)</span>",
      "<span class=\"eqt\">Chlorine (Cl)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2379;&#2352;&#2368;&#2344; (Cl)</span>",
      "<span class=\"eqt\">Magnesium (Mg)</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2327;&#2381;&#2344;&#2368;&#2358;&#2367;&#2351;&#2350; (Mg)</span>",
      "<span class=\"eqt\">Calcium (Ca)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2354;&#2381;&#2358;&#2367;&#2351;&#2350; (Ca)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Chlorine is a non-metal that is commonly tested for in chemical analysis, particularly in its ionic form as chloride ions (Cl&#8315;). Chloride ions are frequently tested using silver nitrate solution, which forms a white precipitate of silver chloride when positive.</p><p>The other options listed are all metals:</p><p>&#183; Sodium (Na) is an alkali metal</p><p>&#183; Magnesium (Mg) is an alkaline earth metal</p><p>&#183; Calcium (Ca) is also an alkaline earth metal</p><p>Non-metals are typically found on the right side of the periodic table (except for hydrogen), while metals are found on the left and middle portions. Chlorine belongs to the halogen group (Group 17), which consists entirely of non-metals.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>What is the result when dilute hydrochloric acid is added to a carbonate?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2340;&#2344;&#2369; &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2325;&#2381;&#2354;&#2379;&#2352;&#2367;&#2325; &#2309;&#2350;&#2381;&#2354; &#2325;&#2379; &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2344;&#2375;&#2335; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">No reaction</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306;</span>",
      "<span class=\"eqt\">Gas is produced</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2360; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Precipitate is formed</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2325;&#2381;&#2359;&#2375;&#2346; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Color change occurs</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2306;&#2327; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>When dilute hydrochloric acid is added to a carbonate, carbon dioxide gas (CO&#8322;) is produced, which can be observed as effervescence or bubbling in the solution. This is a characteristic reaction used to test for carbonate ions.</p><p>The chemical reaction is: CO&#8323;&#178;&#8315; + 2H&#8314; &rarr; CO&#8322;(g) + H&#8322;O</p><p>A common way to confirm that the gas produced is indeed carbon dioxide is to bubble it through limewater (calcium hydroxide solution). If the gas is CO&#8322;, the limewater will turn cloudy due to the formation of calcium carbonate precipitate.</p><p>This reaction works with all carbonates, such as calcium carbonate (limestone, chalk), sodium carbonate, or potassium carbonate, and is a reliable test for identifying carbonate-containing compounds.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>What color does copper(II) ions produce in a flame test?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2381;&#2357;&#2366;&#2354;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2350;&#2375;&#2306; &#2325;&#2377;&#2346;&#2352; (II) &#2310;&#2351;&#2344; &#2325;&#2380;&#2344; &#2360;&#2366; &#2352;&#2306;&#2327; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Orange-red</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2352;&#2306;&#2327;&#2368;-&#2354;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Blue-green</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2354;&#2375; &#2361;&#2352;&#2375;</span>",
      "<span class=\"eqt\">Yellow</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Lilac</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2325;&#2366;&#2311;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Copper(II) ions produce a green flame during a flame test. This is a distinctive color change used to identify copper in chemical analysis.</p><p><img border=0 width=385 height=220 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27567/image002.png\" ></p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a property of an electrolyte?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2354;&#2366;&#2311;&#2335; &#2325;&#2366; &#2327;&#2369;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It cannot conduct electricity.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2348;&#2367;&#2332;&#2354;&#2368; &#2325;&#2366; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366;.</span>",
      "<span class=\"eqt\">It can conduct electricity in the solid state.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2336;&#2379;&#2360; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2325;&#2366; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It conducts electricity when molten or in solution.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2328;&#2354;&#2375; &#2361;&#2369;&#2319; &#2351;&#2366; &#2357;&#2367;&#2354;&#2351;&#2344; &#2350;&#2375;&#2306; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2351;&#2361; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2325;&#2366; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is always a gas.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2360;&#2342;&#2376;&#2357; &#2327;&#2376;&#2360; &#2361;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>An <b>electrolyte</b> is a substance that conducts electricity when:</p><p>&#183; Dissolved in water (aqueous solution) or</p><p>&#183; In a molten (liquid) state.</p><p>This is because electrolytes (e.g., salts, acids, or bases) dissociate into <b>mobile ions</b> that carry electric charge.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Assertion (A): The flame test is used to identify metal ions based on the color of the flame.</p><p>Reason (R): Different metal ions emit characteristic colors when heated in a flame due to the excitation of electrons.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2332;&#2381;&#2357;&#2366;&#2354;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2332;&#2381;&#2357;&#2366;&#2354;&#2366; &#2325;&#2375; &#2352;&#2306;&#2327; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2343;&#2366;&#2340;&#2369; &#2310;&#2351;&#2344;&#2379;&#2306; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2375;&#2332;&#2344;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2332;&#2381;&#2357;&#2366;&#2354;&#2366; &#2350;&#2375;&#2306; &#2327;&#2352;&#2381;&#2350; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2343;&#2366;&#2340;&#2369; &#2310;&#2351;&#2344; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2366; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2340;&#2341;&#2366; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true but R is false.</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false but R is true.</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The flame test is indeed a qualitative analytical technique used to identify certain metal ions (e.g., sodium, potassium, calcium) based on the <b>characteristic color</b> they impart to a flame.</p><p>When metal ions are heated in a flame, their electrons get excited to higher energy levels. Upon returning to the ground state, they emit energy as <b>light of specific wavelengths</b> (colors), which is unique to each metal ion.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following compounds will not react with dilute hydrochloric acid to release carbon dioxide?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2351;&#2380;&#2327;&#2367;&#2325; &#2340;&#2344;&#2369; &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2325;&#2381;&#2354;&#2379;&#2352;&#2367;&#2325; &#2309;&#2350;&#2381;&#2354; &#2325;&#2375; &#2360;&#2366;&#2341; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2352;&#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2344;&#2361;&#2368;&#2306; &#2331;&#2379;&#2337;&#2364;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sodium carbonate</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2344;&#2375;&#2335;</span>",
      "<span class=\"eqt\">Calcium carbonate</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2354;&#2381;&#2358;&#2367;&#2351;&#2350; &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2344;&#2375;&#2335;</span>",
      "<span class=\"eqt\">Magnesium carbonate</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2327;&#2381;&#2344;&#2368;&#2358;&#2367;&#2351;&#2350; &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2344;&#2375;&#2335;</span>",
      "<span class=\"eqt\">Sodium chloride</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2325;&#2381;&#2354;&#2379;&#2352;&#2366;&#2311;&#2337;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; Compounds like <b>sodium carbonate (Na&#8322;CO&#8323;)</b>, <b>calcium carbonate (CaCO&#8323;)</b>, and <b>magnesium carbonate (MgCO&#8323;)</b> react with <b>dilute HCl</b> to produce <b>CO&#8322; gas</b>, water, and a salt.</p><p><b>Example:</b></p><p>CaCO3&#8203;+2HCl&rarr;CaCl2&#8203;+H2&#8203;O+CO2&#8203;&#8593;</p><p>&#183; <b>Sodium chloride (NaCl)</b> does <b>not</b> react with dilute HCl because it is already a neutral salt and cannot release CO&#8322;.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following tests is used to detect the presence of protein in a solution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2354;&#2351;&#2344; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2366; &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Biuret test</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2351;&#2370;&#2352;&#2375;&#2335; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Benedict's test</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2344;&#2375;&#2337;&#2367;&#2325;&#2381;&#2335; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Iodine test</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2379;&#2337;&#2368;&#2344; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Sodium hydroxide test</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Biuret test</b> detects proteins by forming a <b>violet/purple</b> color when peptide bonds react with <b>Cu&#178;</b><b>&#8314;</b><b> ions</b> in an alkaline medium.</p><p>&#183; <b>Benedict's test</b> is for reducing sugars.</p><p>&#183; <b>Iodine test</b> detects starch.</p><p>&#183; <b>Sodium hydroxide test</b> alone does not specifically identify proteins.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>What is the role of the indicator in a titration?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2350;&#2366;&#2346;&#2344; &#2350;&#2375;&#2306; &#2360;&#2370;&#2330;&#2325; &#2325;&#2368; &#2325;&#2381;&#2351;&#2366; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To neutralize the acid or base</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2381;&#2354; &#2351;&#2366; &#2325;&#2381;&#2359;&#2366;&#2352; &#2325;&#2379; &#2348;&#2375;&#2309;&#2360;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">To indicate when the reaction is complete</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2348;&#2340;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2348; &#2346;&#2370;&#2352;&#2368; &#2361;&#2379; &#2327;&#2312; &#2361;&#2376;</span>",
      "<span class=\"eqt\">To increase the speed of the reaction</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">To produce less heat for safety</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2350; &#2327;&#2352;&#2381;&#2350;&#2368; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; An indicator (e.g., phenolphthalein) changes color at the <b>equivalence point</b>, signaling the completion of the acid-base reaction.</p><p>&#183; The primary role of an indicator in a titration is to signal the endpoint, or completion, of the reaction.</p><p>&#183; This is typically achieved through a noticeable color change that occurs when the added titrant has reacted stoichiometrically with the analyte. </p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct?</p><p>I. Barium chloride test is used to detect sulfate ions (SO&#8324;&#178;&#8315;).</p><p>II. Potassium ions produce a red flame in a flame test.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2348;&#2375;&#2352;&#2367;&#2351;&#2350; &#2325;&#2381;&#2354;&#2379;&#2352;&#2366;&#2311;&#2337; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2360;&#2354;&#2381;&#2347;&#2375;&#2335; &#2310;&#2351;&#2344;&#2379;&#2306; (SO&#8324;&#178;&#8315;) &#2325;&#2366; &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2346;&#2379;&#2335;&#2375;&#2358;&#2367;&#2351;&#2350; &#2310;&#2351;&#2344; &#2332;&#2381;&#2357;&#2366;&#2354;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2350;&#2375;&#2306; &#2354;&#2366;&#2354; &#2332;&#2381;&#2357;&#2366;&#2354;&#2366; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Statement I</b> is correct: The barium chloride test is used to detect sulfate ions (SO&#8324;&#178;&#8315;) by forming a white precipitate of barium sulfate.</p><p>&#183; <b>Statement II</b> is incorrect: <b>Potassium ions (K</b><b>&#8314;</b><b>)</b> produce a <b>lilac/purple flame</b> in a flame test, not red. The red flame is characteristic of <b>strontium (Sr&#178;</b><b>&#8314;</b><b>)</b> or <b>lithium (Li</b><b>&#8314;</b><b>)</b> ions.</p>",
    "question_index": 19
  }
