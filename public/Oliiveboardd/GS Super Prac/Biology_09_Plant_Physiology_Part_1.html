    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The development of a fruit without fertilization is called ________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2367;&#2344;&#2366; &#2344;&#2367;&#2359;&#2375;&#2330;&#2344; &#2325;&#2375; &#2347;&#2354; &#2325;&#2366; &#2357;&#2367;&#2325;&#2366;&#2360; _________ &#2325;&#2361;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Hybridogenesis</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2312;&#2348;&#2381;&#2352;&#2367;&#2337;&#2379;&#2332;&#2375;&#2344;&#2375;&#2360;&#2367;&#2360;</span>",
      "<span class=\"eqt\">Apomixis</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2306;&#2327;&#2332;&#2344;&#2344;</span>",
      "<span class=\"eqt\">Gametogamy</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2350;&#2375;&#2335;&#2379;&#2327;&#2376;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Parthenocarpy</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2367;&#2359;&#2375;&#2325;&#2347;&#2354;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Parthenocarpy</b> is the development of fruit without fertilization. The fruit resembles a normally produced fruit but is seedless. Varieties of the pineapple, banana, cucumber, grape, orange, grapefruit, persimmon, and breadfruit exemplify naturally occurring parthenocarpy.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Match the terms in column A with their respective properties in column B. </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">COLUMN A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">COLUMN B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Glucose</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Intermediate substance in breakdown of glucose</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Yeast</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Glucose is converted into Pyruvic acid</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Glycolysis</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Use nutrients for fermentation process</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Pyruvic acid</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Best organic substrate for respiration</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2340;&#2306;&#2349; A &#2350;&#2375;&#2306; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2342;&#2379;&#2306; &#2325;&#2379; &#2360;&#2381;&#2340;&#2306;&#2349; B &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2327;&#2369;&#2339;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2327;&#2381;&#2354;&#2370;&#2325;&#2379;&#2332;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2327;&#2381;&#2354;&#2370;&#2325;&#2379;&#2332; &#2325;&#2375; &#2335;&#2370;&#2335;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2343;&#2381;&#2351;&#2357;&#2352;&#2381;&#2340;&#2368; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2326;&#2350;&#2368;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2327;&#2381;&#2354;&#2370;&#2325;&#2379;&#2332; &#2325;&#2379; &#2346;&#2366;&#2311;&#2352;&#2369;&#2357;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2327;&#2381;&#2354;&#2366;&#2311;&#2325;&#2379;&#2354;&#2366;&#2311;&#2360;&#2367;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2325;&#2367;&#2339;&#2381;&#2357;&#2344; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2379;&#2359;&#2325; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2375;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2346;&#2366;&#2311;&#2352;&#2369;&#2357;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2358;&#2381;&#2357;&#2360;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2360;&#2348;&#2381;&#2360;&#2335;&#2381;&#2352;&#2375;&#2335;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-b, ii-a, iii-d, iv-c</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2312;-&#2348;&#2368;, &#2310;&#2312;&#2310;&#2312;-&#2319;, &#2310;&#2312;&#2310;&#2312;-&#2337;&#2368;, iv-&#2360;&#2368;</span>",
      "<span class=\"eqt\">i-d, ii-c, iii-b, iv-a</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2312;-&#2337;&#2368;, &#2310;&#2312;&#2310;&#2312;-&#2360;&#2368;, &#2310;&#2312;&#2310;&#2312;-&#2348;&#2368;, iv-&#2319;</span>",
      "<span class=\"eqt\">i-a, ii-b, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-&#2319;, ii-&#2348;&#2368;, iii-&#2360;&#2368;, iv-&#2337;&#2368;</span>",
      "<span class=\"eqt\">i-b, ii-d, iii-a, iv-c</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2312;-&#2348;&#2368;, &#2310;&#2312;&#2310;&#2312;-&#2337;&#2368;, iii-&#2319;, iv-&#2360;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Glucose &rarr; d (Best organic substrate for respiration)</p><p>&#183; Glucose is the primary energy source for cellular respiration, making it the best organic substrate.</p><p>Yeast &rarr; c (Uses nutrients for fermentation process)</p><p>&#183; Yeast is a microorganism that ferments sugars to produce alcohol and carbon dioxide, making it the correct match.</p><p>Glycolysis &rarr; b (Glucose is converted into pyruvic acid)</p><p>&#183; Glycolysis is the process in which glucose is broken down into pyruvic acid, releasing ATP.</p><p>Pyruvic acid &rarr; a (Intermediate substance in the breakdown of glucose)</p><p>&#183; Pyruvic acid is an intermediate compound formed at the end of glycolysis and used in further metabolic pathways.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What happens to the guard cells when water flows into them?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2342;&#2381;&#2357;&#2366;&#2352; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2344;&#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The guard cells close.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2366;&#2352; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2319;&#2305; &#2348;&#2306;&#2342; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Stomatal pores open.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2306;&#2343;&#2381;&#2352;&#2368; &#2331;&#2367;&#2342;&#2381;&#2352; &#2326;&#2369;&#2354; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Stomatal pores shrink.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2306;&#2343;&#2381;&#2352;&#2368; &#2331;&#2367;&#2342;&#2381;&#2352; &#2360;&#2367;&#2325;&#2369;&#2337;&#2364; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Stomatal pores close.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2306;&#2343;&#2381;&#2352;&#2368; &#2331;&#2367;&#2342;&#2381;&#2352; &#2348;&#2306;&#2342; &#2361;&#2379; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>When water flows into the guard cells, they become turgid and swell, which leads to the <b>opening of stomatal pores</b>, allowing for the exchange of gases and transpiration in plants.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of following pair of plastids  -  thing stored is NOT correct?</p><p><b>I. </b>Amyloplasts  -  oils and fats</p><p><b>II. </b>Aleuroplasts  -  carbohydrates</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2335;&#2367;&#2337;-&#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2367;&#2340; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2360;&#2361;&#2368; <b>&#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2376;?</p><p>I. &#2350;&#2306;&#2337;&#2354;&#2357;&#2325; (&#2319;&#2350;&#2366;&#2311;&#2354;&#2379;&#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2335;) - &#2340;&#2375;&#2354; &#2324;&#2352; &#2357;&#2360;&#2366;</p><p>II. &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2354;&#2357;&#2325; (&#2319;&#2354;&#2381;&#2351;&#2370;&#2352;&#2379;&#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2335;) - &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2375;&#2335;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Amyloplasts</b> are responsible for storing starch (carbohydrates), not oils and fats.</p><p><b>Aleuroplasts</b>, on the other hand, are responsible for storing proteins but not carbohydrates.</p><p>Hence, neither statement I nor II is correct.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following causes enlargement and extension growth of cells?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2375; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2324;&#2352; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2325;&#2366; &#2325;&#2366;&#2352;&#2339; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Imbibition</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;-&#2358;&#2379;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Pressure potential</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2348;&#2366;&#2357; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Osmotic pressure</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2366;&#2360;&#2352;&#2339;&#2368; &#2342;&#2357;&#2366;&#2348;</span>",
      "<span class=\"eqt\">Turgor pressure</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2352;&#2381;&#2327;&#2352; &#2342;&#2348;&#2366;&#2357;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Turgor pressure</b> refers to the pressure exerted by the cell membrane against the cell wall in plant cells, due to the water entering the cell. This pressure helps in the enlargement and extension of plant cells, as it maintains the rigidity and turgidity of the cell, which is necessary for cell growth.</p><p><b>Brief explanation of the other options:</b></p><p>&#183; <b>Imbibition</b>: This is the process by which water is absorbed by solid particles, such as seeds or dry tissues, but it is not the primary cause of cell enlargement.</p><p>&#183; <b>Pressure potential</b>: This is the potential energy due to pressure exerted on water within a cell, and although related to turgor, it is not directly responsible for cell growth.</p><p>&#183; <b>Osmotic pressure</b>: This is the pressure exerted by water when it moves from a region of lower solute concentration to one of higher solute concentration. While it contributes to water uptake, it does not directly cause cell enlargement.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What is the yellow dust present in the middle of a flower called?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2370;&#2354; &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2346;&#2368;&#2354;&#2368; &#2343;&#2370;&#2354; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pollen</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2366;&#2327;</span>",
      "<span class=\"eqt\">Zygote</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2369;&#2327;&#2381;&#2350;&#2344;&#2332;</span>",
      "<span class=\"eqt\">Sperm</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2366;&#2339;&#2369;</span>",
      "<span class=\"eqt\">Stomata</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2306;&#2343;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The yellow dust present in the middle of a flower is called <b>Pollen</b>. Pollen is essential for sexual reproduction of flowering plants and plants that produce cones. Each pollen grain contains male gametes necessary for fertilisation. The scientific study of living and fossilised pollen grains is known as palynology. The male part of flowering plants is the stamen.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In which of the following plants do roots arise from parts of a plant other than the radicle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2380;&#2343;&#2375; &#2350;&#2375;&#2306; &#2332;&#2337;&#2364;&#2375;&#2306; &#2350;&#2370;&#2354;&#2366;&#2306;&#2325;&#2369;&#2352; &#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366; &#2346;&#2380;&#2343;&#2375; &#2325;&#2375; &#2309;&#2344;&#2381;&#2351; &#2349;&#2366;&#2327;&#2379;&#2306; &#2360;&#2375; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Monstera</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2377;&#2344;&#2381;&#2360;&#2381;&#2335;&#2375;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Turnip</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2354;&#2332;&#2350;</span>",
      "<span class=\"eqt\">Mustard plant</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2360;&#2379;&#2306; &#2325;&#2366; &#2346;&#2380;&#2343;&#2366;</span>",
      "<span class=\"eqt\">Maize</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2325;&#2381;&#2325;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Adventitious roots</b> arise from parts of a plant <b>other than the radicle</b> (e.g., stems, leaves).</p><p>&#183; <b>Radicle</b>: The embryonic root (first root) of a plant.</p><p>&#183; <b>Monstera</b>: Develops <b>aerial adventitious roots</b> from its stems, which help it climb and absorb moisture (common in climbers/epiphytes).</p><p>&#183; <b>Other options</b>:</p><p>o <b>Turnip</b> &amp; <b>Mustard</b>: Have <b>taproot systems</b> (originating from the radicle).</p><p>o <b>Maize</b>: Has <b>fibrous roots</b> (also radicle-derived, though short-lived).</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The loss of water in the form of water droplets from leaves of plants is called _____</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2368; &#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2348;&#2370;&#2306;&#2342;&#2379;&#2306; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2361;&#2366;&#2344;&#2367; &#2325;&#2379; _____ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
    "options": [
      "<span class=\"eqt\">Pressure gradient</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2348;&#2366;&#2357; &#2325;&#2366; &#2319;&#2325; &#2350;&#2366;&#2346;</span>",
      "<span class=\"eqt\">Guttation</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2335;&#2381;&#2335;&#2375;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Translocation</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2357;&#2366;&#2342;&#2344;</span>",
      "<span class=\"eqt\">Plasmolysis</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2350;&#2379;&#2354;&#2367;&#2360;&#2367;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Guttation is the process where water droplets are excreted from the edges of leaves, typically during the night or in the early morning.</p><p>&#183; It occurs when the soil moisture is high, and root pressure forces water out through small openings called hydathodes.</p><p>&#183; This happens when transpiration is low, unlike normal water loss through stomata (which occurs via transpiration).</p><p>Difference between Guttation and Transpiration:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Feature</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Guttation</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Transpiration</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Type of water loss</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Liquid (water droplets)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vapor</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Time</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Night or early morning</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Daytime</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cause</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Root pressure</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Evaporation due to heat</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Openings</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hydathodes</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Stomata</td></tr></table><p>Plants like banana, tomato, and grass commonly exhibit guttation.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the element that helps to trap light energy that is essential for photosynthesis.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2340;&#2340;&#2381;&#2357; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2379; &#2335;&#2381;&#2352;&#2376;&#2346; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Cristae</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2367;&#2360;&#2381;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Amyloplasts</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;&#2366;&#2311;&#2354;&#2379;&#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Carotenoid</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2352;&#2379;&#2335;&#2367;&#2344;&#2377;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Vacuoles</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2325;&#2381;&#2340;&#2367;&#2325;&#2366;&#2319;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Carotenoids are ubiquitous and essential pigments in photosynthesis</b>. They absorb in the blue-green region of the solar spectrum and transfer the absorbed energy to (bacterio) chlorophylls, and so expand the wavelength range of light that is able to drive photosynthesis. This is an example of singlet-singlet energy transfer, and so carotenoids serve to enhance the overall efficiency of photosynthetic light reactions. Carotenoids also act to protect photosynthetic organisms from the harmful effects of excess exposure to light.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>What is the reason for the similar size of the vascular bundle in monocot leaves? </p></span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2344;&#2379;&#2325;&#2377;&#2335; &#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2306;&#2357;&#2361;&#2344;&#2368; &#2348;&#2306;&#2337;&#2354; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2310;&#2325;&#2366;&#2352; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2325;&#2366;&#2352;&#2339; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Cubical venation</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2344;&#2366;&#2325;&#2366;&#2352; &#2358;&#2367;&#2352;&#2366;&#2357;&#2367;&#2344;&#2381;&#2351;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Radial venation</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2337;&#2367;&#2351;&#2354; &#2358;&#2367;&#2352;&#2366;&#2357;&#2367;&#2344;&#2381;&#2351;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Rectangular venation</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2358;&#2367;&#2352;&#2366;&#2357;&#2367;&#2344;&#2381;&#2351;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Parallel venation</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2358;&#2367;&#2352;&#2366;&#2357;&#2367;&#2344;&#2381;&#2351;&#2366;&#2360;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Monocot leaves have parallel venation, which results in similar-sized vascular bundles.</p><p>Key Points:</p><p>&#183; Characteristic of monocot plant leaves</p><p>&#183; Veins run parallel to each other</p><p>&#183; Consistent vein structure throughout the leaf</p><p>&#183; Examples include grass, corn, and palm leaves</p><p>&#183; Differs from net or reticulate venation in dicot plants</p><p>&#183; Reflects the fundamental structural differences between monocot and dicot plants</p><p>&#183; Important in plant classification and identification</p>",
    "question_index": 9
  }
];
