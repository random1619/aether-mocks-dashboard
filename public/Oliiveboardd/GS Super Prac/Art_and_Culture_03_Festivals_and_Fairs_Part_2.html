  {
    "question": "<span class=\"eqt\"><p>Which of the following pairs of State and festival is correctly matched? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351; &#2324;&#2352; &#2340;&#2381;&#2351;&#2380;&#2361;&#2366;&#2352; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2360;&#2361;&#2368; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sikkim: Loosong/Namsoong</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2325;&#2381;&#2325;&#2367;&#2350;: &#2354;&#2370;&#2360;&#2379;&#2306;&#2327;/&#2344;&#2366;&#2350;&#2360;&#2370;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Odisha: Rath Yatra</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2337;&#2367;&#2358;&#2366;: &#2352;&#2341; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Manipur: Lai-Haraoba</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2339;&#2367;&#2346;&#2369;&#2352;: &#2354;&#2366;&#2312;-&#2361;&#2352;&#2380;&#2348;&#2366;</span>",

    ],
    "correct_option_id": 3,
    "solution": "<p>All of the above pairs of State and festival are correctly matched.</p><p>&#183; <b>Sikkim: Loosong/Namsoong</b>: Loosong, also known as Namsoong, is a traditional festival celebrated in Sikkim, marking the Sikkimese New Year.</p><p>&#183; <b>Odisha: Rath Yatra</b>: Rath Yatra is a famous festival in Odisha, particularly in Puri, where deities are taken out in grand chariots.</p><p>&#183; <b>Manipur: Lai-Haraoba</b>: Lai-Haraoba is a traditional festival in Manipur, celebrating the creation stories and cultural heritage of the Meitei people.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following International Festivals is from Nepal? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2344;&#2375;&#2346;&#2366;&#2354; &#2360;&#2375; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Potato Festival</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2354;&#2370; &#2350;&#2361;&#2379;&#2340;&#2381;&#2360;&#2357;</span>",
      "<span class=\"eqt\">Chocolate Festival</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2377;&#2325;&#2354;&#2375;&#2335; &#2350;&#2361;&#2379;&#2340;&#2381;&#2360;&#2357;</span>",

      "<span class=\"eqt\">Watermelon Festival</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2352;&#2348;&#2370;&#2332; &#2350;&#2361;&#2379;&#2340;&#2381;&#2360;&#2357;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Festival of Fulpati</b>: This is a significant part of the Dashain festival in Nepal. It involves the ceremonial bringing of sacred offerings, including the Fulpati (a collection of flowers, leaves, and fruits), to be used in the Dashain celebrations.</p><p>The other festivals mentioned are not specifically associated with Nepal:</p><p>&#183; <b>Potato Festival</b>: Celebrated in various countries, including the United States and Peru.</p><p>&#183; <b>Chocolate Festival</b>: Celebrated in various countries, including Switzerland and Belgium.</p><p>&#183; <b>Watermelon Festival</b>: Celebrated in various countries, including the United States and China.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The 'Bendur' or 'Pola' festival celebrated in Maharashtra is dedicated to which animals?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; '&#2348;&#2375;&#2306;&#2342;&#2370;&#2352;' &#2351;&#2366; '&#2346;&#2379;&#2354;&#2366;' &#2340;&#2381;&#2351;&#2380;&#2361;&#2366;&#2352; &#2325;&#2367;&#2360; &#2332;&#2366;&#2344;&#2357;&#2352; &#2325;&#2379; &#2360;&#2350;&#2352;&#2381;&#2346;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Elephants</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2341;&#2367;&#2351;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Cows</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2351;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Bulls</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2354;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Camels</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2306;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Bendur or Pola is a bull-worshipping festival celebrated in Maharashtra. During this festival, farmers decorate and worship bulls in recognition of their importance in agriculture. The festival demonstrates the deep connection between agricultural communities and their livestock.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following pairs of Tribe and Festival from Arunachal Pradesh, is correctly matched? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2325;&#2368; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367; &#2324;&#2352; &#2340;&#2381;&#2351;&#2380;&#2361;&#2366;&#2352; &#2325;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2332;&#2379;&#2337;&#2364;&#2366; &#2360;&#2361;&#2368; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lah-Chut: Meyor</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2361;-&#2330;&#2369;&#2335;: &#2350;&#2375;&#2351;&#2379;&#2352;</span>",
      "<span class=\"eqt\">Torgya: Monpa</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2379;&#2352;&#2327;&#2381;&#2351;&#2366;: &#2350;&#2379;&#2344;&#2346;&#2366;</span>",
      "<span class=\"eqt\">Poi-Pee-Mau: Tai Khamti</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2312;-&#2346;&#2368;-&#2350;&#2380;: &#2340;&#2366;&#2312; &#2326;&#2350;&#2381;&#2340;&#2368;</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All of the above pairs of Tribe and Festival from Arunachal Pradesh, are correctly matched. </p><p>&#183; Lah-Chut: The festival is associated with the harvesting of the crops and preparation of the summers and is commonly celebrated by the Meyor Tribe.</p><p>&#183; Torgya Monpa: Torgya is a three-day festival celebrated by the Monpa community of Arunachal Pradesh. It takes place annually at the Tawang Monastery. The festival is held every year in January.</p><p>&#183; Poi-Pee-Mau: A New Year festival of the Tai Khamptis - is the celebration of the advent of a new dawn for the community to usher a fresh era of socio-cultural development. Poi Pee Mau Tai Khampti or the Tai Khampti New Year has become the biggest festival amongst the folks of the Tai communities in the world</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>'Me-Dum-Me-Phi' is an important festival celebrated by which community in Assam?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2350;&#2375;-&#2337;&#2350;-&#2350;&#2375;-&#2347;&#2368;' &#2309;&#2360;&#2350; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bodo</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2379;&#2337;&#2379;</span>",
      "<span class=\"eqt\">Ahom</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2361;&#2379;&#2350;</span>",
      "<span class=\"eqt\">Karbi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2368;</span>",

    "correct_option_id": 1,
    "solution": "<p>The Ahoms celebrate Me-Dum Me-Phi with colourful processions clad in their traditional fineries. Annually celebrated on January 31, the Ahom community night of worships Chao Phi or ancestors on this day. </p><p>Along with paying homage to the departed, pujas are offered to the deities - Chauf and Dam Chaufi. It is a very Important festivals of the Ahoms. It is celebrated across Assam. It is a time of celebration with prayers. It is a very colourful festival.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The 'Chekor' festival, also known as the Parikrama of Wisdom, is a ______ long festival.</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2330;&#2375;&#2325;&#2379;&#2352;' &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352;, &#2332;&#2367;&#2360;&#2375; &#2332;&#2381;&#2334;&#2366;&#2344; &#2325;&#2368; &#2346;&#2352;&#2367;&#2325;&#2381;&#2352;&#2350;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, ______ &#2354;&#2306;&#2348;&#2366; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">10 day</span><span class=\"hqt\" style=\"display:none\">10 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">month</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2368;&#2344;&#2366;</span>",
      "<span class=\"eqt\">3 day</span><span class=\"hqt\" style=\"display:none\">3 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">day</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The Chekor (Parikrama of Wisdom) festival is celebrated in Shergaon, Arunachal Pradesh. </p><p>&#183; It has been said that Gelong Doyan Tenzing, a monk introduced this festival in the Sherdukpen region. </p><p>&#183; The main theme of the day long festival portrays the introduction of Chhey/Holy ures of Buddhism.</p><p>&#183; Chekor is the festival celebrated by Shertukpens. </p><p>&#183; The festival is of a month long, filled with activities throughout the month. This festival acts as coaching time for younger generations to know about their culture. </p><p>&#183; This festival also tells a lot about how to behave and conduct the day-to-day activities of an adult villager. </p><p>&#183; This festival is observed during the month of May-June. The fourth month of lunar calendar called Jipa SakaDawa. </p><p>&#183; It starts with reciting holy scripts of Buddhist scared text. </p><p>&#183; The village council (blu) hires monks from nearby villages and monasteries for the recitation. The monks recite the scripts whole day till a day before poornima (full moon) day</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following fairs of Jharkhand is organised by Oraon tribe? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2333;&#2366;&#2352;&#2326;&#2306;&#2337; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2375;&#2354;&#2366; &#2313;&#2352;&#2366;&#2306;&#2357; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sohrai</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2361;&#2352;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Jawa</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2357;&#2366;</span>",
      "<span class=\"eqt\">Murma mela</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2352;&#2350;&#2366; &#2350;&#2375;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Hijala mela</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2332;&#2354;&#2366; &#2350;&#2375;&#2354;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The Murma mela is celebrated by the Oraon tribe to celebrate victory. It is believed that people of the Munda tribe were the original residents of Murma, but with the migration of Oraon tribe to the area, the Munda raised a strong objection. </p><p>&#183; It was decided that the dispute will be settled by a music and dance competition between the two tribes. The tribe which would lose would have to leave the area. </p><p>&#183; The fight continued for seven days and seven nights in which the Oraons came out victorious, due to the possession of a special musical instrument, Mandar which the Mundas did not have.</p><p>&#183; However after winning, the Oraon asked the Mundas to not leave and stay together peacefully. But the Mundas did not agree. They kept their word and migrated to Khunti.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The 'Kalpataru Utsav' is a significant festival celebrated in which state?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2325;&#2354;&#2381;&#2346;&#2340;&#2352;&#2369; &#2313;&#2340;&#2381;&#2360;&#2357;' &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2361;&#2376;?</p></span>",

    "solution": "<p>The Kalpataru Utsav is celebrated in West Bengal. This festival commemorates a spiritual event in the life of Sri Ramakrishna at the Dakshineswar Kali Temple, where he is said to have attained the power to fulfill the spiritual wishes of his devotees.</p>",

  {

    "question": "<span class=\"eqt\"><p>The 'Saga Dawa' festival celebrated in Sikkim commemorates which events in Buddha's life and falls in which lunar month?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2367;&#2325;&#2381;&#2325;&#2367;&#2350; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; '&#2360;&#2366;&#2327;&#2366; &#2342;&#2366;&#2357;&#2366;' &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2348;&#2369;&#2342;&#2381;&#2343; &#2325;&#2375; &#2332;&#2368;&#2357;&#2344; &#2325;&#2368; &#2325;&#2367;&#2344; &#2328;&#2335;&#2344;&#2366;&#2323;&#2306; &#2325;&#2368; &#2351;&#2366;&#2342; &#2342;&#2367;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2325;&#2367;&#2360; &#2330;&#2306;&#2342;&#2381;&#2352; &#2350;&#2366;&#2361; &#2350;&#2375;&#2306; &#2310;&#2340;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Birth, Enlightenment and Parinirvana - Second month</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2381;&#2350;, &#2332;&#2381;&#2334;&#2366;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367; &#2324;&#2352; &#2346;&#2352;&#2367;&#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2339; - &#2342;&#2370;&#2360;&#2352;&#2366; &#2350;&#2361;&#2368;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Only Enlightenment - Fourth month</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2310;&#2340;&#2381;&#2350;&#2332;&#2381;&#2334;&#2366;&#2344; - &#2330;&#2380;&#2341;&#2366; &#2350;&#2361;&#2368;&#2344;&#2366;</span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>Saga Dawa is one of the most significant festivals in Tibetan Buddhism, celebrated in Sikkim during the fourth month of the lunar calendar (usually falling in May-June). This holy month commemorates three important events in Buddha's life:</p><p>&#8226; Birth</p><p>&#8226; Enlightenment (attainment of Buddhahood)</p><p>&#8226; Parinirvana (passing away)</p><p>The full moon day of this month, known as Saga Dawa Duchen, is considered particularly auspicious. During this month, Buddhist practitioners engage in meritorious activities, prayers, and offerings. The festival demonstrates the importance of the lunar calendar in Buddhist religious observances.</p>",

  },

    "question": "<span class=\"eqt\"><p>Which of the following is known as the biggest tribal festival of Gujarat?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2310;&#2342;&#2367;&#2357;&#2366;&#2360;&#2368; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Chitra Vichitra is the biggest Tribal festival in Gujarat. Every year the fair is celebrated in the month of March, fortnight after Holi, in Khed Brahma Taluka of Sabarkantha District. </p><p>&#183; The main temple is situated on a picturesque site called the Triveni Sangam, the sacred confluence of the three rivers Sabarmati, Akul and Vyakul, amid the foothills of the Aravalis. </p><p>&#183; The name of the festival is derived from the Mahabharata, one of the two major Sanskrit epics of ancient India. </p><p>&#183; It is believed that Chitravirya and Vichitravirya, the two sons of King Shantanu (the king of Hastinapur), were once the residents of the town and used to cure people diseases by making them drink the water of this site.</p>",
