    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The immediate explicit cause for the rise of extremism in the Indian National Movement was. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2350;&#2375;&#2306; &#2313;&#2327;&#2381;&#2352;&#2357;&#2366;&#2342; &#2325;&#2375; &#2313;&#2342;&#2351; &#2325;&#2366; &#2340;&#2366;&#2340;&#2381;&#2325;&#2366;&#2354;&#2367;&#2325; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2325;&#2366;&#2352;&#2339; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">the failure of the Moderates to win notable success</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2342;&#2366;&#2352;&#2357;&#2366;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326;&#2344;&#2368;&#2351; &#2360;&#2347;&#2354;&#2340;&#2366; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2357;&#2367;&#2347;&#2354;&#2340;&#2366;</span>",
      "<span class=\"eqt\">the famine and plague of 1896-97</span><span class=\"hqt\" style=\"display:none\">1896-97 &#2325;&#2366; &#2309;&#2325;&#2366;&#2354; &#2324;&#2352; &#2346;&#2381;&#2354;&#2375;&#2327;</span>",
      "<span class=\"eqt\">the ill-treatment of Indians in South Africa</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2309;&#2347;&#2381;&#2352;&#2368;&#2325;&#2366; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2342;&#2369;&#2352;&#2381;&#2357;&#2381;&#2351;&#2357;&#2361;&#2366;&#2352;</span>",
      "<span class=\"eqt\">the Partition of Bengal (1905)</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2327;&#2366;&#2354; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; (1905)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The partition of Bengal in 1905 provided a spark for the rise of extremism in the Indian National Movement and this measure of Lord Curzon was considered an immediate cause for the rise of extremism. </p><p>While the failure of Moderates and the famine were causes, the Partition was explicitly the immediate trigger. </p><p>The ill-treatment in South Africa encouraged Indians to fight against British rule but wasn't the immediate cause for the <i>rise of extremism.</i></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are correct regarding the rise of extremism in the Indian National Movement? </p><p>I. The failure of the Moderates to win any notable success other than the expansion of the legislative councils contributed to the rise of extremism. </p><p>II. The Russo-Japanese War of 1904-5, in which Japan defeated the European power Russia, encouraged Indians to fight against the European nation, Britain. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2350;&#2375;&#2306; &#2313;&#2327;&#2381;&#2352;&#2357;&#2366;&#2342; &#2325;&#2375; &#2313;&#2342;&#2351; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>I. &#2357;&#2367;&#2343;&#2366;&#2344; &#2346;&#2352;&#2367;&#2359;&#2342;&#2379;&#2306; &#2325;&#2375; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366; &#2325;&#2379;&#2312; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326;&#2344;&#2368;&#2351; &#2360;&#2347;&#2354;&#2340;&#2366; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2344;&#2352;&#2350;&#2346;&#2306;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2357;&#2367;&#2347;&#2354;&#2340;&#2366; &#2344;&#2375; &#2313;&#2327;&#2381;&#2352;&#2357;&#2366;&#2342; &#2325;&#2375; &#2313;&#2342;&#2351; &#2350;&#2375;&#2306; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>II. 1904-05 &#2325;&#2375; &#2352;&#2369;&#2360;&#2379;-&#2332;&#2366;&#2346;&#2366;&#2344;&#2368; &#2351;&#2369;&#2342;&#2381;&#2343;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2332;&#2366;&#2346;&#2366;&#2344; &#2344;&#2375; &#2351;&#2370;&#2352;&#2379;&#2346;&#2368;&#2351; &#2358;&#2325;&#2381;&#2340;&#2367; &#2352;&#2370;&#2360; &#2325;&#2379; &#2361;&#2352;&#2366;&#2351;&#2366;, &#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351;&#2379;&#2306; &#2325;&#2379; &#2351;&#2370;&#2352;&#2379;&#2346;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;, &#2348;&#2381;&#2352;&#2367;&#2335;&#2375;&#2344; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2354;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2379;&#2340;&#2381;&#2360;&#2366;&#2361;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I: Correct</b></p><p>&#183; The <b>Moderates' limited achievements</b> (e.g., Indian Councils Act 1892) frustrated younger nationalists. Their reliance on petitions and dialogue was seen as ineffective, fueling demand for militant methods (Extremism).</p><p><b>Statement II: Correct</b></p><p>&#183; <b>Japan's victory over Russia (1905)</b> shattered the myth of European invincibility, inspiring Indian nationalists like Tilak to adopt assertive resistance against British rule.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following leaders is NOT associated with the Extremist faction of the Indian National Movement? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2375;&#2340;&#2366; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2375; &#2327;&#2352;&#2350; &#2342;&#2354; &#2360;&#2375; &#2360;&#2306;&#2348;&#2342;&#2381;&#2343; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bal Gangadhar Tilak</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2354; &#2327;&#2306;&#2327;&#2366;&#2343;&#2352; &#2340;&#2367;&#2354;&#2325;</span>",
      "<span class=\"eqt\">Lala Lajpat Rai</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2354;&#2366; &#2354;&#2366;&#2332;&#2346;&#2340; &#2352;&#2366;&#2351;</span>",
      "<span class=\"eqt\">Bipin Chandra Pal</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2346;&#2367;&#2344; &#2330;&#2306;&#2342;&#2381;&#2352; &#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Gopal Krishna Gokhale</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2346;&#2366;&#2354; &#2325;&#2371;&#2359;&#2381;&#2339; &#2327;&#2379;&#2326;&#2354;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; <b>Gopal Krishna Gokhale (Option 4)</b> was a <b>Moderate leader</b>, advocating constitutional reforms and dialogue with the British. He mentored Gandhi but opposed radical methods.</p><p>&#183; Extremist Leaders (Lal-Bal-Pal Trio):</p><p>&#183; Bal Gangadhar Tilak: \"Swaraj is my birthright!\"</p><p>&#183; Lala Lajpat Rai: Fought for Swadeshi and Hindu-Muslim unity.</p><p>&#183; Bipin Chandra Pal: Promoted self-reliance and militant nationalism.</p><p>&#183; Key Difference:</p><p>Extremists (post-1905) demanded Swaraj through mass agitation, while Moderates (like Gokhale) sought gradual reforms.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The Swadeshi Movement involved which of the following programmes? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2358;&#2366;&#2350;&#2367;&#2354; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only the boycott of foreign goods</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2366; &#2348;&#2361;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Only the promotion of Swadeshi goods</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2330;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Boycott of government services and promotion of national education</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2348;&#2361;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352; &#2324;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Boycott of foreign goods, promotion of Swadeshi goods, and national education</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2366; &#2348;&#2361;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352;, &#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2324;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The <b>Swadeshi Movement (1905 - 1908)</b> was a <b>multi-faceted resistance strategy</b> against the Partition of Bengal, encompassing:</p><p>&#183; <b>Boycott of foreign goods</b> (especially British textiles).</p><p>&#183; <b>Promotion of Swadeshi goods</b> (e.g., Indian-made clothes, salt, soap).</p><p>&#183; <b>National education</b> (establishing institutions like <i>Bengal National College</i>).</p><p>&#183; <b>Boycott of government services</b> (e.g., courts, schools) in some regions.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are correct about the Muslim League? </p><p>I. The All-India Muslim League was finally set up on December 30, 1906. </p><p>II. Initially, they enjoyed the support of the Indian National Congress. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2354;&#2368;&#2327; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>I. &#2309;&#2326;&#2367;&#2354; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2354;&#2368;&#2327; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2309;&#2306;&#2340;&#2340;&#2307; 30 &#2342;&#2367;&#2360;&#2306;&#2348;&#2352;, 1906 &#2325;&#2379; &#2361;&#2369;&#2312; &#2341;&#2368;&#2404;</p><p>II. &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2350;&#2375;&#2306;, &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement I is correct. </p><p>The <b>All-India Muslim League</b> was officially established on <b>December 30, 1906</b>, at <b>Dhaka</b> during a meeting of Muslim leaders.</p><p><b>Statement II  -  Incorrect:</b></p><p>The <b>Indian National Congress did not support the Muslim League</b> initially. In fact, the League was formed partly in response to the growing influence of the Congress and was encouraged by the British to represent Muslim interests separately.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The Lucknow Pact (1916) was an agreement between which of the following? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2326;&#2344;&#2314; &#2360;&#2350;&#2333;&#2380;&#2340;&#2366; (1916) &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2360;&#2350;&#2333;&#2380;&#2340;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">The Moderates and the Extremists within the Congress</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2313;&#2342;&#2366;&#2352;&#2357;&#2366;&#2342;&#2368; &#2324;&#2352; &#2327;&#2352;&#2350;&#2346;&#2306;&#2341;&#2368;</span>",
      "<span class=\"eqt\">The Indian National Congress and the Muslim League</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2324;&#2352; &#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2354;&#2368;&#2327;</span>",
      "<span class=\"eqt\">The British Government and the Indian National Congress</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2352;&#2325;&#2366;&#2352; &#2324;&#2352; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360;</span>",
      "<span class=\"eqt\">The British Government and the Muslim League</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2352;&#2325;&#2366;&#2352; &#2324;&#2352; &#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2354;&#2368;&#2327;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>Lucknow Pact (1916)</b> was a historic agreement between:</p><p>&#183; <b>Indian National Congress</b> (led by Bal Gangadhar Tilak)</p><p>&#183; <b>Muslim League</b> (led by Muhammad Ali Jinnah)</p><p><b>Key Provisions:</b></p><p>&#183; <b>Joint constitutional demands</b> (e.g., self-government, 1/3rd Muslim representation in legislatures).</p><p>&#183; <b>Congress accepted separate electorates</b> for Muslims (a major Muslim League demand).</p><p>&#183; <b>Reunited Moderates and Extremists</b> after the 1907 Surat Split.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Who is regarded as the real founder of the popular anti-British movement in India? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2354;&#2379;&#2325;&#2346;&#2381;&#2352;&#2367;&#2351; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2357;&#2367;&#2352;&#2379;&#2343;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2366; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325; &#2325;&#2367;&#2360;&#2375; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lala Lajpat Rai</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2354;&#2366; &#2354;&#2366;&#2332;&#2346;&#2340; &#2352;&#2366;&#2351;</span>",
      "<span class=\"eqt\">Bal Gangadhar Tilak</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2354; &#2327;&#2306;&#2327;&#2366;&#2343;&#2352; &#2340;&#2367;&#2354;&#2325;</span>",
      "<span class=\"eqt\">Bipin Chandra Pal</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2346;&#2367;&#2344; &#2330;&#2306;&#2342;&#2381;&#2352; &#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Aurobindo Ghosh</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2348;&#2367;&#2306;&#2342;&#2379; &#2328;&#2379;&#2359;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Bal Gangadhar Tilak</b> is widely regarded as the <b>real founder of the popular anti-British movement</b> in India due to his:</p><p>&#183; <b>Mass Mobilization</b>: Pioneered public participation with slogans like <i>\"Swaraj is my birthright!\"</i></p><p>&#183; <b>Festivals as Tools</b>: Used <b>Ganesh Chaturthi</b> and <b>Shivaji Jayanti</b> to unite Indians against colonial rule.</p><p>&#183; <b>Extremist Leadership</b>: Advocated <b>boycott, Swadeshi, and national education</b> (post-1905 Bengal Partition).</p><p>&#183; <b>Newspapers</b>: <i>Kesari</i> (Marathi) and <i>Maratha</i> (English) spread nationalist ideas.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The Rowlatt Act of 1919 allowed the British government to do which of the following? </p></span><span class=\"hqt\" style=\"display:none\"><p>1919 &#2325;&#2375; &#2352;&#2377;&#2354;&#2375;&#2335; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2344;&#2375; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Introduce separate electorates for Muslims</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2360;&#2354;&#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2371;&#2341;&#2325; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2344; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Grant greater autonomy to provincial councils</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2306;&#2340;&#2368;&#2351; &#2346;&#2352;&#2367;&#2359;&#2342;&#2379;&#2306; &#2325;&#2379; &#2309;&#2343;&#2367;&#2325; &#2360;&#2381;&#2357;&#2366;&#2351;&#2340;&#2381;&#2340;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Arrest and detain people without trial on the basis of suspicion</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2342;&#2375;&#2361; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2348;&#2367;&#2344;&#2366; &#2350;&#2369;&#2325;&#2342;&#2350;&#2366; &#2330;&#2354;&#2366;&#2319; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2379; &#2327;&#2367;&#2352;&#2347;&#2381;&#2340;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2361;&#2367;&#2352;&#2366;&#2360;&#2340; &#2350;&#2375;&#2306; &#2354;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Establish national schools and colleges</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2360;&#2381;&#2325;&#2370;&#2354; &#2324;&#2352; &#2325;&#2377;&#2354;&#2375;&#2332; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Rowlatt Act allowed arrests on the basis of suspicion, and no appeal or petition could be filed against such arrests. It was widely opposed and called the Black Act.</p><p>Impact:</p><p>&#183; Sparked nationwide protests, leading to the <b>Jallianwala Bagh Massacre (April 1919)</b>.</p><p>&#183; Gandhi launched the <b>Non-Cooperation Movement (1920)</b> in response.</p><p>&#183; Gandhi withdrew the movement after violence in <b>Chauri Chaura (1922).</b></p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The Jallianwala Bagh massacre occurred in which city? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2354;&#2367;&#2351;&#2366;&#2306;&#2357;&#2366;&#2354;&#2366; &#2348;&#2366;&#2327; &#2361;&#2340;&#2381;&#2351;&#2366;&#2325;&#2366;&#2306;&#2337; &#2325;&#2367;&#2360; &#2358;&#2361;&#2352; &#2350;&#2375;&#2306; &#2361;&#2369;&#2310; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Delhi</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2354;&#2381;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Lahore</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2361;&#2380;&#2352;</span>",
      "<span class=\"eqt\">Amritsar</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2371;&#2340;&#2360;&#2352;</span>",
      "<span class=\"eqt\">Lucknow</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2326;&#2344;&#2314;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Jallianwala Bagh massacre</b> occurred on <b>13 April 1919</b> in <b>Amritsar, Punjab</b>, when:</p><p>&#183; British troops under <b>General Dyer</b> fired on unarmed civilians gathered for a peaceful protest.</p><p>&#183; <b>379+ killed, 1,200+ injured</b> (official figures; actual numbers likely higher).</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>What was Mahatma Gandhi's initial involvement in India's freedom struggle after his return in 1915? </p></span><span class=\"hqt\" style=\"display:none\"><p>1915 &#2350;&#2375;&#2306; &#2357;&#2366;&#2346;&#2360; &#2310;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2360;&#2306;&#2327;&#2381;&#2352;&#2366;&#2350; &#2350;&#2375;&#2306; &#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2368; &#2325;&#2381;&#2351;&#2366; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Directly leading a nationwide movement against the Rowlatt Act.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2380;&#2354;&#2335; &#2319;&#2325;&#2381;&#2335; &#2325;&#2375; &#2357;&#2367;&#2352;&#2369;&#2342;&#2381;&#2343; &#2342;&#2375;&#2358;&#2357;&#2381;&#2351;&#2366;&#2346;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2325;&#2367;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Becoming the undisputed leader of the National Movement immediately.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2369;&#2352;&#2344;&#2381;&#2340; &#2361;&#2368; &#2357;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2344;&#2381;&#2342;&#2379;&#2354;&#2344; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2357;&#2367;&#2357;&#2366;&#2342; &#2344;&#2375;&#2340;&#2366; &#2348;&#2344; &#2327;&#2351;&#2375;&#2404;</span>",
      "<span class=\"eqt\">Involvement in local movements at Champaran, Kheda, and Ahmedabad.</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2350;&#2381;&#2346;&#2366;&#2352;&#2339;, &#2326;&#2375;&#2337;&#2364;&#2366; &#2324;&#2352; &#2309;&#2361;&#2350;&#2342;&#2366;&#2348;&#2366;&#2342; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Forming the Swaraj Party with Motilal Nehru and C.R. Das.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2340;&#2368;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370; &#2324;&#2352; &#2360;&#2368;.&#2310;&#2352;.&#2342;&#2366;&#2360; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2381;&#2357;&#2352;&#2366;&#2332; &#2346;&#2366;&#2352;&#2381;&#2335;&#2368; &#2325;&#2366; &#2327;&#2336;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>After returning to India from South Africa in <b>1915</b>, Gandhi's initial focus was on <b>grassroots activism</b> through three key local movements:</p><p>&#183; <b>Champaran Satyagraha (1917)</b>: Advocated for indigo farmers against exploitative British planters.</p><p>&#183; <b>Kheda Satyagraha (1918)</b>: Supported peasants during a famine-induced tax crisis.</p><p>&#183; <b>Ahmedabad Mill Strike (1918)</b>: Mediated labor disputes for textile workers.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Act/Report with its primary focus:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Act/Report</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Primary Focus</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Rowlatt Act</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) Arrest and detention without trial</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Nehru Report</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) Blueprint for future Constitution</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Simon Commission</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) Constitutional reforms for India</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) Vernacular Press Act</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) Restrictions on press and sedition</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;/&#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335; &#2325;&#2366; &#2313;&#2360;&#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2347;&#2379;&#2325;&#2360; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;/&#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2347;&#2379;&#2325;&#2360;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) &#2352;&#2380;&#2354;&#2335; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) &#2348;&#2367;&#2344;&#2366; &#2360;&#2369;&#2344;&#2357;&#2366;&#2312; &#2325;&#2375; &#2327;&#2367;&#2352;&#2347;&#2381;&#2340;&#2366;&#2352;&#2368; &#2324;&#2352; &#2361;&#2367;&#2352;&#2366;&#2360;&#2340;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2344;&#2375;&#2361;&#2352;&#2370; &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) &#2349;&#2366;&#2357;&#2368; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2368; &#2352;&#2370;&#2346;&#2352;&#2375;&#2326;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2360;&#2366;&#2311;&#2350;&#2344; &#2325;&#2350;&#2368;&#2358;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) &#2357;&#2352;&#2381;&#2344;&#2366;&#2325;&#2381;&#2351;&#2369;&#2354;&#2352; &#2346;&#2381;&#2352;&#2375;&#2360; &#2319;&#2325;&#2381;&#2335;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) &#2346;&#2381;&#2352;&#2375;&#2360; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2306;&#2343; &#2324;&#2352; &#2352;&#2366;&#2332;&#2342;&#2381;&#2352;&#2379;&#2361;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i &rarr; a, ii &rarr; b, iii &rarr; c, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; b, iii &rarr; c, iv &rarr; d</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; d, iii &rarr; a, iv &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; d, iii &rarr; a, iv &rarr; b</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; a, iii &rarr; d, iv &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; a, iii &rarr; d, iv &rarr; c</span>",
      "<span class=\"eqt\">i &rarr; d, ii &rarr; c, iii &rarr; b, iv &rarr; a</span><span class=\"hqt\" style=\"display:none\">i &rarr; d, ii &rarr; c, iii &rarr; b, iv &rarr; a</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The Rowlatt Act of 1919 allowed for the arrest and detention of people without trial on the basis of suspicion. </p><p>&#183; The Nehru Report of 1928 was a blueprint for the future Constitution of India. </p><p>&#183; The Simon Commission was appointed to inquire into and report on the working of the system of government introduced by the Act of 1919, which dealt with constitutional reforms for India. </p><p>&#183; Vernacular Press Act (1878): Imposed restrictions on Indian-language newspapers </p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>The Khilafat Movement was primarily concerned with: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2326;&#2367;&#2354;&#2366;&#2347;&#2340; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2341;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Demanding complete independence from British rule.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2358;&#2366;&#2360;&#2344; &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2325;&#2368; &#2350;&#2366;&#2306;&#2327; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Protesting against the Simon Commission.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2311;&#2350;&#2344; &#2325;&#2350;&#2368;&#2358;&#2344; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2357;&#2367;&#2352;&#2379;&#2343; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344;.</span>",
      "<span class=\"eqt\">The defeat of Turkey in the First World War and the harsh terms of the Treaty of Sevres.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2341;&#2350; &#2357;&#2367;&#2358;&#2381;&#2357; &#2351;&#2369;&#2342;&#2381;&#2343; &#2350;&#2375;&#2306; &#2340;&#2369;&#2352;&#2381;&#2325;&#2368; &#2325;&#2368; &#2346;&#2352;&#2366;&#2332;&#2351; &#2324;&#2352; &#2360;&#2375;&#2357;&#2381;&#2352;&#2375;&#2360; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367; &#2325;&#2368; &#2325;&#2336;&#2379;&#2352; &#2358;&#2352;&#2381;&#2340;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Advocating for the rights of untouchables.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2331;&#2370;&#2340;&#2379;&#2306; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2357;&#2325;&#2366;&#2354;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Khilafat Movement (1919-1924) was a pan-Islamic campaign launched by Muslims in India to protest against the Allied powers' decision to abolish the Ottoman Caliphate, dismember the Ottoman Empire, and impose harsh conditions on Turkey through the Treaty of Sevres following World War I.</p><p>The movement was primarily concerned with:</p><p>&#183; Preserving the authority of the Ottoman Caliph (Khalifa), who was considered the spiritual leader of Muslims worldwide</p><p>&#183; Protecting Islamic holy places in the Middle East</p><p>&#183; Preventing the breakup of the Ottoman Empire, which was seen as the last major independent Muslim power</p><p>The Khilafat Movement was led by prominent Muslim leaders like the Ali brothers (Mohammad Ali and Shaukat Ali), Maulana Abul Kalam Azad, and others. </p><p>Mahatma Gandhi supported this movement and linked it with the Non-Cooperation Movement as part of his strategy to unite Hindus and Muslims against British rule. </p><p>This created a significant, though short-lived, period of Hindu-Muslim unity in the Indian freedom struggle.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>The Chauri Chaura incident, which led to the suspension of the Non-Cooperation Movement, occurred in which present-day Indian state? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2380;&#2352;&#2368; &#2330;&#2380;&#2352;&#2366; &#2325;&#2368; &#2328;&#2335;&#2344;&#2366;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2309;&#2360;&#2361;&#2351;&#2379;&#2327; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2360;&#2381;&#2341;&#2327;&#2367;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;, &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2361;&#2369;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Gujarat</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2332;&#2352;&#2366;&#2340;</span>",
      "<span class=\"eqt\">Maharashtra</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Uttar Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2366;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;&#2404;</span>",
      "<span class=\"eqt\">Punjab</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2332;&#2366;&#2348;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct answer is:</p><p>(3) Uttar Pradesh</p><p>The Chauri Chaura incident occurred on February 4, 1922, in Chauri Chaura, which is located in the Gorakhpur district of present-day Uttar Pradesh. </p><p>During this incident, a large group of protesters, participating in the Non-Cooperation Movement, clashed with police. </p><p>The confrontation escalated when the police fired on the demonstrators, and in retaliation, the crowd set fire to the police station, resulting in the deaths of 22 policemen.</p><p>Mahatma Gandhi, who was deeply committed to non-violence, was profoundly disturbed by this violent turn of events. </p><p>As a result, he decided to call off the Non-Cooperation Movement on February 12, 1922, despite its momentum and widespread support. </p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>The Simon Commission, which was opposed by almost all political parties in India, was formed to review: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2311;&#2350;&#2344; &#2325;&#2350;&#2368;&#2358;&#2344;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2354;&#2327;&#2349;&#2327; &#2360;&#2349;&#2368; &#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2342;&#2354;&#2379;&#2306; &#2344;&#2375; &#2357;&#2367;&#2352;&#2379;&#2343; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;, &#2325;&#2366; &#2327;&#2336;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2368; &#2360;&#2350;&#2368;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">The impact of the Non-Cooperation Movement.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2361;&#2351;&#2379;&#2327; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2366; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;.</span>",
      "<span class=\"eqt\">The working of the Government of India Act of 1919.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; 1919 &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;&#2404;</span>",
      "<span class=\"eqt\">The demands for complete independence.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2325;&#2368; &#2350;&#2366;&#2306;&#2327;.</span>",
      "<span class=\"eqt\">The issue of separate electorates for minorities.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2346;&#2360;&#2306;&#2326;&#2381;&#2351;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2371;&#2341;&#2325; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2367;&#2325;&#2366; &#2325;&#2366; &#2350;&#2369;&#2342;&#2381;&#2342;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Simon Commission was appointed by the British government in November 1927 under the chairmanship of Sir John Simon. </p><p>Its primary purpose was to review the working of the Government of India Act of 1919 (also known as the Montagu-Chelmsford Reforms) and to recommend further constitutional reforms for India.</p><p>The Commission faced widespread opposition in India because it did not include a single Indian member - all seven members were British. </p><p>This exclusion was seen as an insult to Indians and their capability for self-determination. </p><p>When the Commission arrived in India in February 1928, it was met with protests, boycotts, and demonstrations across the country with slogans like \"Simon Go Back.\" </p><p>The protests were supported by almost all major political parties, including the Indian National Congress and the Muslim League.</p><p>The opposition to the Simon Commission became a significant unifying moment in India's freedom struggle, bringing together different political factions against a common cause.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>The Civil Disobedience Movement was launched by Mahatma Gandhi with which significant event? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2357;&#2367;&#2344;&#2351; &#2309;&#2357;&#2332;&#2381;&#2334;&#2366; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2367;&#2360; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2328;&#2335;&#2344;&#2366; &#2325;&#2375; &#2360;&#2366;&#2341; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">The boycott of the Simon Commission in 1928.</span><span class=\"hqt\" style=\"display:none\">1928 &#2350;&#2375;&#2306; &#2360;&#2366;&#2311;&#2350;&#2344; &#2325;&#2350;&#2368;&#2358;&#2344; &#2325;&#2366; &#2348;&#2361;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352;&#2404;</span>",
      "<span class=\"eqt\">The declaration of Poorna Swaraj at the Lahore Congress session in 1929.</span><span class=\"hqt\" style=\"display:none\">1929 &#2350;&#2375;&#2306; &#2354;&#2366;&#2361;&#2380;&#2352; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2381;&#2357;&#2352;&#2366;&#2332; &#2325;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The Dandi Salt Satyagraha in 1930.</span><span class=\"hqt\" style=\"display:none\">1930 &#2350;&#2375;&#2306; &#2342;&#2366;&#2306;&#2337;&#2368; &#2344;&#2350;&#2325; &#2360;&#2340;&#2381;&#2351;&#2366;&#2327;&#2381;&#2352;&#2361;&#2404;</span>",
      "<span class=\"eqt\">The Quit India Resolution in 1942.</span><span class=\"hqt\" style=\"display:none\">1942 &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2331;&#2379;&#2337;&#2364;&#2379; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Civil Disobedience Movement was officially launched by Mahatma Gandhi with the famous Dandi Salt March (also known as the Salt Satyagraha). </p><p>On March 12, 1930, Gandhi began a 24-day march from Sabarmati Ashram to Dandi on the Gujarat coast, covering about 240 miles. </p><p>Upon reaching Dandi on April 6, 1930, Gandhi broke the Salt Law by picking up a handful of salt from the seashore, thus ceremonially producing salt without paying the salt tax imposed by the British.</p><p>This act of civil disobedience against the British salt monopoly became the symbolic beginning of the broader Civil Disobedience Movement, which encouraged Indians across the country to break salt laws and engage in other forms of non-violent resistance against British rule.</p><p>While the declaration of Poorna Swaraj (Complete Independence) at the Lahore Congress session in December 1929 set the stage for the Civil Disobedience Movement, the actual movement was launched with the Salt Satyagraha a few months later.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>The Cripps Mission of 1942 proposed: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2360; &#2350;&#2367;&#2358;&#2344; 1942 &#2344;&#2375; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2352;&#2326;&#2366;: </p></span>",
    "options": [
      "<span class=\"eqt\">Immediate complete independence for India.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2354;&#2367;&#2319; &#2340;&#2340;&#2381;&#2325;&#2366;&#2354; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The partition of India into separate states.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344;&#2404;</span>",
      "<span class=\"eqt\">The promise of Dominion Status for India after the Second World War and the setting up of a Constituent Assembly.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2357;&#2367;&#2358;&#2381;&#2357; &#2351;&#2369;&#2342;&#2381;&#2343; &#2325;&#2375; &#2348;&#2366;&#2342; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2379;&#2350;&#2367;&#2344;&#2367;&#2351;&#2344; &#2360;&#2381;&#2335;&#2375;&#2335;&#2360; &#2325;&#2366; &#2357;&#2366;&#2342;&#2366; &#2324;&#2352; &#2319;&#2325; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The continuation of British rule with greater Indian representation in the Viceroy's Executive Council.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2360;&#2352;&#2366;&#2351; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2346;&#2352;&#2367;&#2359;&#2342; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2375; &#2360;&#2366;&#2341; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2358;&#2366;&#2360;&#2344; &#2332;&#2366;&#2352;&#2368; &#2352;&#2361;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Cripps Mission, led by Sir Stafford Cripps who arrived in India in March 1942, was sent by the British government during World War II to secure Indian cooperation in the war effort. The key proposals of the Cripps Mission included:</p><p>&#183; Dominion Status would be granted to India after the conclusion of World War II</p><p>&#183; A Constituent Assembly would be formed after the war to frame a new constitution for India</p><p>&#183; Provinces would have the option to opt out of the Indian union if they did not wish to join</p><p>&#183; During the war, the British would maintain control of defense, but Indians would be included in the Viceroy's Executive Council</p><p>The Cripps proposals were rejected by all major Indian political parties. The Indian National Congress rejected it because it did not offer immediate independence and delayed self-government until after the war. The Muslim League rejected it because it did not explicitly address the creation of Pakistan. The mission ultimately failed, and shortly afterward, Gandhi launched the Quit India Movement in August 1942.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>The Mountbatten Plan of June 3, 1947, laid down the plan for: </p></span><span class=\"hqt\" style=\"display:none\"><p>3 &#2332;&#2370;&#2344; 1947 &#2325;&#2368; &#2350;&#2366;&#2313;&#2306;&#2335;&#2348;&#2375;&#2335;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2351;&#2379;&#2332;&#2344;&#2366; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;:</p></span>",
    "options": [
      "<span class=\"eqt\">Continued British rule in India with increased Indian participation.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2358;&#2366;&#2360;&#2344; &#2332;&#2366;&#2352;&#2368; &#2352;&#2361;&#2366;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351;&#2379;&#2306; &#2325;&#2368; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2368; &#2348;&#2338;&#2364;&#2340;&#2368; &#2327;&#2312;&#2404;</span>",
      "<span class=\"eqt\">The partition of India and the creation of Pakistan.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2324;&#2352; &#2346;&#2366;&#2325;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339;&#2404;</span>",
      "<span class=\"eqt\">India attaining Dominion Status under a unified government.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2379; &#2319;&#2325;&#2368;&#2325;&#2371;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2340;&#2361;&#2340; &#2337;&#2379;&#2350;&#2367;&#2344;&#2367;&#2351;&#2344; &#2325;&#2366; &#2342;&#2352;&#2381;&#2332;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2310;&#2404;</span>",
      "<span class=\"eqt\">The transfer of power to a Constituent Assembly while India remained within the British Commonwealth.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2350;&#2306;&#2337;&#2354; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2348;&#2344;&#2375; &#2352;&#2361;&#2344;&#2375; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2379; &#2360;&#2340;&#2381;&#2340;&#2366; &#2325;&#2366; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2339;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Lord Mountbatten put forth the plan for the partition of India on June 3, 1947.</p><p>The Mountbatten Plan, also known as the June 3rd Plan or the Partition Plan, was announced by Lord Mountbatten (the last Viceroy of India) on June 3, 1947. The plan laid out the framework for:</p><p>&#183; The partition of British India into two independent dominions: India and Pakistan</p><p>&#183; The creation of separate Constituent Assemblies for both nations</p><p>&#183; The transfer of power to these new dominions by August 15, 1947 (later Pakistan's independence was set for August 14)</p><p>&#183; The right of provinces to decide which dominion they would join</p><p>&#183; The princely states being given the option to join either dominion or remain independent</p><p>This plan accelerated the original timeline for British withdrawal (which had previously been set for June 1948) and formally acknowledged that partition would occur along religious lines, with Muslim-majority areas forming Pakistan and the remaining territories becoming India.</p>",
    "question_index": 16
  },

    "question": "<span class=\"eqt\"><p>Match the Leader with the associated organisation/title:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Leaders</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Organisation/title</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.Bal Gangadhar Tilak</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.Muslim League</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.Lala Lajpat Rai</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.Lokmanya</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.Nawab Salimullah Khan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.Lion of Punjab</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.Mahatma Gandhi</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.Non-violet resistance</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2375;&#2340;&#2366; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2360;&#2306;&#2327;&#2336;&#2344;/&#2358;&#2368;&#2352;&#2381;&#2359;&#2325; &#2360;&#2375; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2344;&#2375;&#2340;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2306;&#2327;&#2336;&#2344;/&#2358;&#2368;&#2352;&#2381;&#2359;&#2325;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.&#2348;&#2366;&#2354; &#2327;&#2306;&#2327;&#2366;&#2343;&#2352; &#2340;&#2367;&#2354;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.&#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2354;&#2368;&#2327;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.&#2354;&#2366;&#2354;&#2366; &#2354;&#2366;&#2332;&#2346;&#2340; &#2352;&#2366;&#2351;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.&#2354;&#2379;&#2325;&#2350;&#2366;&#2344;&#2381;&#2351;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.&#2344;&#2357;&#2366;&#2348; &#2360;&#2354;&#2368;&#2350;&#2369;&#2354;&#2381;&#2354;&#2366;&#2361; &#2326;&#2366;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.&#2346;&#2306;&#2332;&#2366;&#2348; &#2325;&#2366; &#2358;&#2375;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.&#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.&#2327;&#2376;&#2352;-&#2348;&#2376;&#2306;&#2327;&#2344;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i &rarr; a, ii &rarr; b, iii &rarr; c, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; b, iii &rarr; c, iv &rarr; d</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; c, iii &rarr; a, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; c, iii &rarr; a, iv &rarr; d</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; b, iii &rarr; d, iv &rarr; a</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; b, iii &rarr; d, iv &rarr; a</span>",
      "<span class=\"eqt\">i &rarr; d, ii &rarr; a, iii &rarr; c, iv &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; d, ii &rarr; a, iii &rarr; c, iv &rarr; b</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Bal Gangadhar Tilak was popularly known as \"Lokmanya\" (respected by the people). He was a prominent nationalist leader who advocated for swaraj (self-rule) and was part of the \"Lal-Bal-Pal\" triumvirate in the Indian freedom movement.</p><p>&#183; Lala Lajpat Rai was known as the \"Lion of Punjab\" or \"Punjab Kesari\" for his fearless opposition to British rule. He was a prominent nationalist leader and part of the \"Lal-Bal-Pal\" triumvirate.</p><p>&#183; Nawab Salimullah Khan of Dacca was one of the founding members and early leaders of the All India Muslim League, established in 1906. He played a significant role in the formation of the organization.</p><p>&#183; Mahatma Gandhi was the pioneer of satyagraha and non-violent resistance as methods of political struggle. His principles of non-violence and civil disobedience became central to India's independence movement.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was NOT a prominent revolutionary organization? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2319;&#2325; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367;&#2325;&#2366;&#2352;&#2368; &#2360;&#2306;&#2327;&#2336;&#2344; &#2344;&#2361;&#2368;&#2306; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Anushilan Samiti</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2358;&#2368;&#2354;&#2344; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Jugantar</span><span class=\"hqt\" style=\"display:none\">Jugantor</span>",
      "<span class=\"eqt\">Servants of the People Society</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344; &#2360;&#2375;&#2357;&#2325; &#2360;&#2350;&#2366;&#2332;</span>",
      "<span class=\"eqt\">Abhinav Bharat</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2349;&#2367;&#2344;&#2357; &#2349;&#2366;&#2352;&#2340;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Servants of the People Society was NOT a revolutionary organization.</p><p>It was founded by Lala Lajpat Rai in 1921 as a social service organization dedicated to constructive work, education, and the upliftment of society through constitutional means. </p><p>It followed Gandhian principles of non-violence and social reform rather than revolutionary or violent methods to achieve independence.</p><p>Anushilan Samiti: Founded in 1902 in Bengal, it was one of the earliest revolutionary organizations that advocated armed resistance against British rule. </p><p>Jugantar: An offshoot of Anushilan Samiti, founded around 1906, it was responsible for several revolutionary activities including assassination attempts on British officials. </p><p>Abhinav Bharat: Founded by Vinayak Damodar Savarkar in 1904, it was inspired by Mazzini's Young Italy movement and advocated armed revolution to overthrow British rule.</p><p>Further information:</p><p>&#183; In the first half of the 20th century, revolutionary groups sprang up mainly in Bengal, Maharashtra, Punjab and Madras. </p><p>&#183; The revolutionaries were not satisfied with the methods of both the moderates and extremists. Hence, they started many revolutionary secret organizations. </p><p>&#183; In Bengal Anusilan Samiti and Jugantar were established. </p><p>&#183; In Maharashtra Savarkar brothers had set up Abhinava Bharat. </p><p>&#183; In the Madras Presidency, Bharathmatha Association was started by Nilakanta Bramachari.</p><p>&#183; In Punjab Ajit Singh set up a secret society to spread revolutionary ideas among the youth.</p><p>&#183; In London, at India House, Shyamji Krishna Verma gathered young Indian nationalists like Madan Lal Dhingra, Savarkar, V.V.S. Iyer and T.S.S.Rajan. </p><p>&#183; Lala Hardyal set up the 'Ghadar Party' in USA to organise revolutionary activities from outside India.</p>",
    "question_index": 18
  },

    "question": "<span class=\"eqt\"><p>The \"August Offer\" (1940) was associated with:</p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2309;&#2327;&#2360;&#2381;&#2340; &#2321;&#2347;&#2352;\" (1940) &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2341;&#2366;:</p></span>",
    "options": [

      "<span class=\"eqt\">Partition of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344;</span>",

      "<span class=\"eqt\">Separate electorates</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2341;&#2325; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2325; &#2350;&#2306;&#2337;&#2354;</span>"
