<body>

  {

      "<span class=\"eqt\">Tripura</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2346;&#2369;&#2352;&#2366;</span>",

    "question_index": 0
  },
  {

      "<span class=\"eqt\">Afghanistan</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2347;&#2364;&#2327;&#2364;&#2366;&#2344;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344;</span>",

  },

    "options": [

    "correct_option_id": 2,
    "solution": "<p>&bull; Sri Lanka shares a maritime boundary with India and is separated by the Gulf of Mannar, primarily from Tamil Nadu.</p><p>&bull; Afghanistan shares a land border with India in the Ladakh region.</p><p>&bull; Myanmar shares a land border with several northeastern Indian states.</p><p>&bull; Bhutan shares a land border with multiple Indian states.</p><p><b>Further Insight:</b></p><p><b><img width=623 height=286 id=image1.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25842/image003.png\"></b></p>",

      "<span class=\"eqt\">Jammu &amp; Kashmir</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2350;&#2381;&#2350;&#2370; &#2324;&#2352; &#2325;&#2358;&#2381;&#2350;&#2368;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Himachal Pradesh shares a border with China but not with Pakistan. Ladakh, Jammu &amp; Kashmir, and Gujarat all share borders with both Pakistan and China (or their disputed territories).</p><p>&bull; Ladakh shares borders with both China and Pakistan (via PoK).</p><p>&bull; Gujarat shares a border with Pakistan but not with China.</p><p>&bull; Jammu &amp; Kashmir shares borders with both China and Pakistan (before bifurcation).</p><p><b>Further Insight:</b></p><p>&bull; <b>China</b></p><p>&#9675; Capital: Beijing</p><p>&#9675; Border Length: 3,488 km</p><p>&#9675; Bordering Indian States: Ladakh, Uttarakhand, Himachal Pradesh, Sikkim, Arunachal Pradesh</p><p>&#9675; Official Language: Mandarin</p><p>&#9675; Provinces/States: 26</p><p>&bull; <b>Pakistan</b></p><p>&#9675; Capital: Islamabad</p><p>&#9675; Border Length: 3,323 km</p><p>&#9675; Bordering Indian States: Ladakh, Jammu and Kashmir, Punjab, Rajasthan, Gujarat</p><p>&#9675; Official Language: Urdu</p><p>&#9675; Provinces/States: 4</p><p>&bull;</p><p><b><img width=624 height=379 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25842/image004.png\"></b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following countries does not share a border with the Indian state of West Bengal?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2342;&#2375;&#2358; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2368;&#2350;&#2366; &#2360;&#2366;&#2333;&#2366; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">Nepal</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Bangladesh</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2306;&#2327;&#2381;&#2354;&#2366;&#2342;&#2375;&#2358;</span>",
