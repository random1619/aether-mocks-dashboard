<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>

            <!-- Desktop Navigator Sidebar -->

                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">

                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following was the primary aim of the Taxation Laws (Amendment) Act, 2021?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2325;&#2352;&#2366;&#2343;&#2366;&#2344; &#2325;&#2366;&#2344;&#2370;&#2344; (&#2360;&#2306;&#2358;&#2379;&#2343;&#2344;) &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 2021 &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Introducing new taxation for foreign companies in India.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2319; &#2325;&#2352;&#2366;&#2343;&#2366;&#2344; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Abolishing direct taxation on foreign assets.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352;&#2366;&#2343;&#2366;&#2344; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Nullifying retrospective taxation on the indirect transfer of Indian assets.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2339; &#2346;&#2352; &#2346;&#2370;&#2352;&#2381;&#2357;&#2357;&#2381;&#2351;&#2366;&#2346;&#2368; &#2325;&#2352;&#2366;&#2343;&#2366;&#2344; &#2325;&#2379; &#2352;&#2342;&#2381;&#2342; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Implementing new provisions for digital taxation.</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2325;&#2352;&#2366;&#2343;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2319; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>The Taxation Laws (Amendment) Act, 2021 aimed to nullify retrospective taxation on indirect transfers of Indian assets, a controversial provision that impacted companies like Vodafone and Cairn Energy</b></p><p><b>Further Insight:</b></p><p>&bull; Retrospective tax refers to a tax law or regulation that applies to transactions or income that occurred in the past, not just the current or future periods.</p><p>&bull; <b>Taxation Laws (Amendment) Act, 2021</b></p><p>&#9675; <b>Date of Enactment: August 13, 2021.</b></p><p>&#9675; <b>Aim: This law aimed to nullify the retrospective taxation introduced in 2012. It sought to withdraw tax demands made on indirect transfer of Indian assets before May 28, 2012. This was introduced following disputes involving companies like Cairn and Vodafone.</b></p><p>&#9675; <b>Important Provisions:</b></p><p>&#9632; <b>Repeals retrospective tax provisions for the indirect transfer of Indian assets.</b></p><p>&#9632; <b>Provides for a refund of the taxes already collected under the retrospective provisions, provided the companies agree to withdraw pending litigation and forego interest claims.</b></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Under the Code on Social Security, 2020, which of the following group is a new inclusion under the social security benefits?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;, 2020 &#2325;&#2375; &#2340;&#2361;&#2340;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2350;&#2370;&#2361; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2354;&#2366;&#2349;&#2379;&#2306; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2319;&#2325; &#2344;&#2351;&#2366; &#2360;&#2350;&#2366;&#2357;&#2375;&#2358; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Seasonal workers</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2360;&#2350;&#2368; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Gig and platform workers</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2367;&#2327; &#2324;&#2352; &#2346;&#2381;&#2354;&#2375;&#2335;&#2347;&#2364;&#2377;&#2352;&#2381;&#2350; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Migrant workers</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2357;&#2366;&#2360;&#2368; &#2350;&#2332;&#2342;&#2370;&#2352;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Permanent government employees</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Code on Social Security, 2020, expanded social security benefits to include gig and platform workers, a major shift in labor law.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Code on Social Security, 2020</b></p><p>&#9675; Date of Enactment: September 28, 2020.</p><p>&#9675; Aim: To consolidate and simplify existing labor laws regarding social security benefits like provident fund, pension, insurance, and maternity benefits.</p><p>&#9675; Important Provisions:</p><p>&#9632; Merges nine existing labor laws into one.</p><p>&#9632; Universalizes social security benefits(welfare schemes related to life, disability cover, and accident insurance) to all workers, including gig and platform workers.</p><p>&#9632; Introduces a Social Security Fund for unorganized workers.</p><p>&#9675; Body Formed: National Social Security Board.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was introduced by the Consumer Protection Act, 2019, to enhance consumer grievance redressal?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366; &#2358;&#2367;&#2325;&#2366;&#2351;&#2340; &#2344;&#2367;&#2357;&#2366;&#2352;&#2339; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 2019 &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2346;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Establishment of Central Consumer Protection Authority (CCPA)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2346;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2352;&#2339; (CCPA) &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Introduction of online consumer courts</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366; &#2309;&#2342;&#2366;&#2354;&#2340;&#2379;&#2306; &#2325;&#2368; &#2358;&#2369;&#2352;&#2370;&#2310;&#2340;</span>",
      "<span class=\"eqt\">Removal of mediation from consumer disputes</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366; &#2357;&#2367;&#2357;&#2366;&#2342;&#2379;&#2306; &#2360;&#2375; &#2350;&#2343;&#2381;&#2351;&#2360;&#2381;&#2341;&#2340;&#2366; &#2325;&#2379; &#2361;&#2335;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Compulsory arbitration for all consumer cases</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2350;&#2343;&#2381;&#2351;&#2360;&#2381;&#2341;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>The Consumer Protection Act, 2019 established the CCPA to regulate violations of consumer rights and to provide swift remedies.</b></p><p>Further Insight:</p><p>&bull; <b>Consumer Protection Act, 2019</b></p><p>&#9675; Date of Enactment: August 9, 2019.</p><p>&#9675; Aim: To protect consumer rights and address consumer grievances in a more effective manner.</p><p>&#9675; Important Provisions:</p><p>&#9632; Establishes the Central Consumer Protection Authority (CCPA) to regulate consumer rights violations.</p><p>&#9632; Introduces concepts of product liability, e-commerce regulations, and unfair trade practices.</p><p>&#9632; Provides for mediation as an alternative dispute resolution.</p><p>&#9675; Body Formed: <b>Central Consumer Protection Authority (CCPA).</b></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following provisions was introduced in the Indian Companies Act through the 2013 amendment?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; 2013 &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2325;&#2306;&#2346;&#2344;&#2368; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2350;&#2375;&#2306; &#2346;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Deregulation of Corporate Social Responsibility (CSR)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2377;&#2352;&#2381;&#2346;&#2379;&#2352;&#2375;&#2335; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2313;&#2340;&#2381;&#2340;&#2352;&#2342;&#2366;&#2351;&#2367;&#2340;&#2381;&#2357; (CSR) &#2325;&#2366; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344;</span>",
      "<span class=\"eqt\">Introduction of \"One Person Company\"</span><span class=\"hqt\" style=\"display:none\">\"&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2306;&#2346;&#2344;&#2368;\" &#2325;&#2366; &#2346;&#2352;&#2367;&#2330;&#2351;</span>",
      "<span class=\"eqt\">Removal of company audit requirements</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2346;&#2344;&#2368; &#2321;&#2337;&#2367;&#2335; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2361;&#2335;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Merger of multiple companies under one board</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2348;&#2379;&#2352;&#2381;&#2337; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2325;&#2312; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2357;&#2367;&#2354;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The 2013 amendment introduced the concept of \"One Person Company,\" allowing a single individual to form a company.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Indian Companies Act</b></p><p>&#9675; Date of Enactment: First passed in 1956, significantly amended in 2013.</p><p>&#9675; Aim: To regulate companies and corporate practices in India.</p><p>&#9675; Important Provisions:</p><p>&#9632; Introduction of the concept of \"One Person Company\" (2013 amendment).</p><p>&#9632; Corporate Social Responsibility (CSR) mandates for certain companies.</p><p>&#9632; Provisions for better corporate governance and accountability.</p><p>&#9675; Body Formed: Registrar of Companies (RoC), National Company Law Tribunal (NCLT).</p><p>&#9675; Recent Update: Various amendments, including changes to CSR and the decriminalization of minor offenses, have been made in recent years.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which body primarily enforces the provisions of the Competition Act, 2002?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2367;&#2325;&#2366;&#2351; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 2002 &#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Registrar of Companies (RoC)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2346;&#2344;&#2368; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2381;&#2352;&#2366;&#2352; (RoC)</span>",
      "<span class=\"eqt\">Securities and Exchange Board of India (SEBI)</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2381;&#2352;&#2340;&#2367;&#2349;&#2370;&#2340;&#2367; &#2319;&#2357;&#2306; &#2357;&#2367;&#2344;&#2367;&#2350;&#2351; &#2348;&#2379;&#2352;&#2381;&#2337; (SEBI)</span>",
      "<span class=\"eqt\">Competition Commission of India (CCI)</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2310;&#2351;&#2379;&#2327; (CCI)</span>",
      "<span class=\"eqt\">Enforcement Directorate (ED)</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2357;&#2352;&#2381;&#2340;&#2344; &#2344;&#2367;&#2342;&#2375;&#2358;&#2366;&#2354;&#2351; (ED)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>The Competition Commission of India (CCI) enforces the provisions of the Competition Act, regulating anti-competitive practices and mergers.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Competition Act, 2002</b></p><p>&#9675; Date of Enactment: January 13, 2003.</p><p>&#9675; Aim: To promote fair competition in the market and prevent anti-competitive practices.</p><p>&#9675; Important Provisions:</p><p>&#9632; Prohibits anti-competitive agreements and abuse of dominant positions.</p><p>&#9632; Regulates mergers and acquisitions to prevent monopolies.</p><p>&#9675; Body Formed:<b> Competition Commission of India (CCI).</b></p><p>&#9675; Recent Update: The CCI has intensified its scrutiny of digital markets, particularly e-commerce and big-tech companies, to curb monopolistic behavior</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was a significant amendment to the Insolvency and Bankruptcy Code (IBC) in 2021?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; 2021 &#2350;&#2375;&#2306; &#2342;&#2367;&#2357;&#2366;&#2354;&#2366; &#2324;&#2352; &#2342;&#2367;&#2357;&#2366;&#2354;&#2367;&#2351;&#2366;&#2346;&#2344; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366; (IBC) &#2350;&#2375;&#2306; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2341;&#2366;?</p></span>",
    "options": [

      "<span class=\"eqt\">Abolition of the Insolvency and Bankruptcy Board of India (IBBI)</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2342;&#2367;&#2357;&#2366;&#2354;&#2366; &#2319;&#2357;&#2306; &#2342;&#2367;&#2357;&#2366;&#2354;&#2367;&#2351;&#2366;&#2346;&#2344; &#2348;&#2379;&#2352;&#2381;&#2337; (IBBI) &#2325;&#2366; &#2313;&#2344;&#2381;&#2350;&#2370;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Complete removal of liquidation process</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2367;&#2360;&#2350;&#2366;&#2346;&#2344; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2361;&#2335;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">New penalties for corporate governance violations</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2377;&#2352;&#2381;&#2346;&#2379;&#2352;&#2375;&#2335; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2313;&#2354;&#2381;&#2354;&#2306;&#2328;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2319; &#2342;&#2306;&#2337;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>The 2021 amendment introduced pre-packaged insolvency resolutions specifically for MSMEs, allowing quicker resolutions for financially distressed firms.</b></p><p>Further Insight:</p><p>&bull; <b>Insolvency and Bankruptcy Code (IBC), 2016</b></p><p>&#9675; Date of Enactment: May 28, 2016.</p><p>&#9675; Aim: To consolidate and amend laws related to insolvency and bankruptcy.</p><p>&#9675; Important Provisions:</p><p>&#9632; Provides a time-bound process for insolvency resolution.</p><p>&#9632; Establishes a framework for the liquidation of insolvent firms.</p><p>&#9675; Body Formed: Insolvency and Bankruptcy Board of India (IBBI), National Company Law Tribunal (NCLT).</p><p>&#9675; Recent Update: Amendments in 2021 introduced pre-packaged insolvency resolutions for MSMEs.</p>",

    "question": "<span class=\"eqt\"><p>The Prevention of Money Laundering Act (PMLA), 2002 empowers which body to confiscate the assets of money launderers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2343;&#2344; &#2358;&#2379;&#2343;&#2344; &#2344;&#2367;&#2357;&#2366;&#2352;&#2339; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (&#2346;&#2368;&#2319;&#2350;&#2319;&#2354;&#2319;), 2002 &#2325;&#2367;&#2360; &#2344;&#2367;&#2325;&#2366;&#2351; &#2325;&#2379; &#2343;&#2344; &#2358;&#2379;&#2343;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2332;&#2348;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">Central Vigilance Commission (CVC)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2360;&#2340;&#2352;&#2381;&#2325;&#2340;&#2366; &#2310;&#2351;&#2379;&#2327; (CVC)</span>",

    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Enforcement Directorate (ED) is empowered by PMLA to attach and confiscate properties obtained through money laundering activities.</b></p><p>&bull; CBI investigates general crimes but doesn't handle confiscations under PMLA.</p><p>&bull; The CVC focuses on corruption.</p><p>&bull; The Income Tax Department handles tax-related matters.</p><p><b>Further Insight:</b></p><p>&bull; <b>Prevention of Money Laundering Act (PMLA), 2002</b></p><p>&#9675; Date Passed: January 17, 2003</p><p>&#9675; Came in force : July 1, 2005.</p><p>&#9675; Aim: To prevent money laundering and to confiscate the property of money launderers.</p><p>&#9675; Important Provisions:</p><p>&#9632; Defines and criminalizes money laundering.</p><p>&#9632; Empowers enforcement agencies to attach and confiscate properties obtained through illegal means.</p><p>&#9675; Body Formed: Enforcement Directorate (ED).</p><p>&#9675; Recent Update: The scope of PMLA was widened through amendments in 2019, extending its applicability to a broader set of financial crimes. The Enforcement Directorate has been empowered to investigate high-profile cases under this Act&#8203;</p>",

    "question": "<span class=\"eqt\"><p>Which of the following regulatory bodies is responsible for overseeing the securities market in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2367;&#2351;&#2366;&#2350;&#2325; &#2344;&#2367;&#2325;&#2366;&#2351; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;&#2349;&#2370;&#2340;&#2367; &#2348;&#2366;&#2332;&#2366;&#2352; &#2325;&#2368; &#2342;&#2375;&#2326;&#2352;&#2375;&#2326; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [

    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; SEBI regulates securities markets to protect investors and ensure transparency.</p><p>&bull; RBI manages monetary policy, not the securities market</p><p>&bull; CCI focuses on competition in the market.</p><p>&bull; IRDAI oversees the insurance sector.</p><p><b>Further Insight:</b></p><p>&bull; <b>Securities and Exchange Board of India (SEBI) </b></p><p>&#9675; Formed on: April 12, 1988</p><p>&#9675; Established under: SEBI Act, 1992</p><p>&#9675; Primary Functions:</p><p>&#9632; Regulating the securities market to protect the interests of investors.</p><p>&#9632; Promoting the development of the securities market by ensuring efficient functioning.</p><p>&#9632; Preventing malpractices like insider trading, fraud, and unfair practices.</p><p>&#9632; Regulating stock exchanges, brokers, and sub-brokers in the securities market.</p>",

    "question": "<span class=\"eqt\"><p>Which body regulates standards for products and services in India, including quality certifications?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2369;&#2339;&#2357;&#2340;&#2381;&#2340;&#2366; &#2346;&#2381;&#2352;&#2350;&#2366;&#2339;&#2344; &#2360;&#2361;&#2367;&#2340; &#2350;&#2366;&#2344;&#2325;&#2379;&#2306; &#2325;&#2379; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2367;&#2325;&#2366;&#2351; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">BIS</span><span class=\"hqt\" style=\"display:none\">BIS</span>",
      "<span class=\"eqt\">CCI</span><span class=\"hqt\" style=\"display:none\">CCI</span>",
      "<span class=\"eqt\">RBI</span><span class=\"hqt\" style=\"display:none\">RBI</span>",
      "<span class=\"eqt\">IRDAI</span><span class=\"hqt\" style=\"display:none\">IRDAI</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>The Bureau of Indian Standards (BIS) sets product and service standards, ensuring quality and safety compliance. </b></p><p>&bull; CCI handles competition.</p><p>&bull; RBI manages monetary policy.</p><p>&bull; IRDAI regulates insurance.</p><p><b>Further Insight:</b></p><p>&bull; <b>Bureau of Indian Standards (BIS) </b></p><p>&#9675; Formed On: 1986</p><p>&#9675; Law Under Which It Was Formed: Bureau of Indian Standards Act, 1986 (subsequently replaced by the BIS Act, 2016)</p><p>&#9675; Primary Functions:</p><p>&#9632; BIS is the national standards body of India, responsible for the development, recognition, and promotion of standards across various sectors.</p><p>&#9632; It ensures the quality, safety, and reliability of products by conducting product certification schemes, hallmarking, and quality control.</p><p>&#9632; The BIS oversees standardization, marking, and certification of products to promote consumer safety and maintain uniform standards in goods and services.</p><p>&#9632; It also regulates the ISI mark, which is a certification of product quality, and conducts laboratory testing for compliance with Indian standards.</p><p>BIS plays a vital role in maintaining industrial efficiency and ensuring that products meet national and international quality benchmarks.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following statements are correct about the Insurance Regulatory and Development Authority of India (IRDAI)?</p><p>(a) IRDAI regulates both life and non-life insurance sectors in India.</p><p>(b) IRDAI was formed after the enactment of the Insurance Regulatory and Development Authority Act, 1999.</p><p>(c) IRDAI has the authority to regulate mutual fund operations.</p><p>Select the correct option:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2368;&#2350;&#2366; &#2357;&#2367;&#2344;&#2367;&#2351;&#2366;&#2350;&#2325; &#2324;&#2352; &#2357;&#2367;&#2325;&#2366;&#2360; &#2346;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2352;&#2339; (IRDAI) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>(a) IRDAI &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2332;&#2368;&#2357;&#2344; &#2324;&#2352; &#2327;&#2376;&#2352;-&#2332;&#2368;&#2357;&#2344; &#2348;&#2368;&#2350;&#2366; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>(b) IRDAI &#2325;&#2366; &#2327;&#2336;&#2344; &#2348;&#2368;&#2350;&#2366; &#2357;&#2367;&#2344;&#2367;&#2351;&#2366;&#2350;&#2325; &#2324;&#2352; &#2357;&#2367;&#2325;&#2366;&#2360; &#2346;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2352;&#2339; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1999 &#2325;&#2375; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>(c) IRDAI &#2325;&#2375; &#2346;&#2366;&#2360; &#2350;&#2381;&#2351;&#2370;&#2330;&#2369;&#2309;&#2354; &#2347;&#2306;&#2337; &#2346;&#2352;&#2367;&#2330;&#2366;&#2354;&#2344; &#2325;&#2379; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2361;&#2376;&#2404;</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",

    "solution": "<p>&bull; Insolvency and Bankruptcy Code, 2016 provides a time-bound process for insolvency resolution.</p><p>&bull; Competition Act, 2002 establishes the Competition Commission of India.</p><p>&bull; SARFAESI Act allows banks to sell defaulters' assets without court intervention.</p><p>&bull; Fugitive Economic Offenders Act deals with the confiscation of properties of economic offenders who flee the country.</p><p><b>Further Insight:</b></p><p>&bull; <b>SARFAESI Act (Securitisation and Reconstruction of Financial Assets and Enforcement of Security Interest Act)</b></p><p>&bull; Date of Enactment: December 17, 2002.</p><p>&bull; Aim: To allow banks and financial institutions to recover loans from defaulters without the court's intervention.</p><p>&bull; Important Provisions:</p><p>&#9675; Enables the sale of assets of defaulters sell them without court intervention.</p><p>&#9675; Permits the creation of Asset Reconstruction Companies (ARCs) to acquire non-performing assets.</p><p>&bull; Body Formed: Asset Reconstruction Companies (ARCs).</p><p>&#9675; Recent Update: In 2022, the government proposed amendments to make the process faster for recovery of non-performing assets (NPAs)&#8203;</p><p><b>Fugitive Economic Offenders Act, 2018</b></p><p>&bull; <b>Date Passed: July 25, 2018</b></p><p>&bull; <b>Date of Enactment: July 31, 2018.</b></p><p>&bull; <b>Aim: To deter economic offenders from fleeing India to evade legal prosecution and To confiscate properties of economic offenders who flee the country to avoid prosecution.</b></p><p>&bull; <b>Important Provisions:</b></p><p>&#9675; <b>Defines a fugitive economic offender as one who absconds after committing an offense worth over &#8377;100 crore.</b></p><p>&#9675; <b>Provides for the confiscation of their properties.</b></p><p>&bull; <b>Recent Update: No significant changes, but high-profile cases like Vijay Mallya and Nirav Modi have invoked this Act.</b></p>",

    "solution": "<p>&bull; SEBI oversees the securities markets and protects investors,</p><p>&bull; RBI regulates the monetary policy of India</p><p>&bull; IRDAI regulates insurance companies </p><p>&bull; TRAI regulates telecommunication services </p><p><b>Further Insight:</b></p><p>&bull; <b>The RBI is the central bank of India established in 1935 under RBI Act 1934, and plays a key role in regulating the monetary policy, overseeing banking operations, and ensuring economic stability.</b></p><p>&bull; <b>Monetary Authority</b>: Controls the supply of money to stabilize exchange rates, inflation, and overall economic growth.</p><p>&bull; <b>Issuer of Currency</b>: RBI has the sole authority to issue currency, ensuring security and reliability.</p><p>&bull; Issuer of Banking Licenses: Every bank must acquire a license from the RBI.</p><p>&bull; <b>Banker to the Government:</b> Provides financial services to the government, managing loans and public debt.</p><p>&bull; <b>Lender of Last Resort: </b>Provides funds to banks in need during financial distress.</p><p>&bull; <b>Custodian of Foreign Reserves: Manages India's foreign exchange reserves.</b></p><p>&bull; <b>Banking Ombudsman:</b> Provides a grievance redressal mechanism for customers to file complaints against banks.</p>",

    "solution": "<p>&bull; The Central Board of Film Certification (CBFC) regulates and certifies films for public exhibition.</p><p>&bull; NABARD regulates rural credit and development in the agricultural sector.</p><p>&bull; The Atomic Energy Regulatory Board (AERB) ensures the safe use of nuclear energy and radiation.</p><p>&bull; The Pension Fund Regulatory and Development Authority (PFRDA) oversees the National Pension System and regulates pensions.</p><p><b>Further Insight:</b></p><p>&bull; <b>Central Board of Film Certification (CBFC)</b></p><p>&bull; Formed On: 1952</p><p>&bull; Law: Cinematograph Act, 1952</p><p>&bull; Primary Functions:</p><p>&bull; CBFC, commonly known as the Censor Board, is responsible for certifying films for public exhibition in India.</p><p>&bull; It ensures that films adhere to legal and moral standards by regulating content related to public decency, morality, and national security.</p><p>&bull; Films are reviewed and assigned certification categories like U (Universal), A (Adult), UA (Parental Guidance), or S (Special) based on their content.</p><p>&bull; CBFC ensures that films comply with cultural and societal norms while balancing artistic freedom.</p><p>&bull; <b>National Bank for Agriculture and Rural Development (NABARD)</b></p><p>&bull; Formed On: 1982</p><p>&bull; Law Under Which It Was Formed: NABARD Act, 1981</p><p>&bull; Primary Functions:</p><p>&#9632; NABARD is a developmental financial institution focused on agriculture and rural development.</p><p>&#9632; Its primary role is to provide credit and financial support for agricultural and rural development activities, particularly in the farming sector and small-scale industries.</p><p>&#9632; NABARD also monitors and coordinates rural development policies and provides assistance to regional rural banks, cooperatives, and other financial institutions that lend to the rural economy.</p><p>&#9632; It plays a crucial role in promoting sustainable agriculture, improving rural livelihoods, and supporting initiatives like irrigation, farm mechanization, and rural infrastructure development.</p>",
