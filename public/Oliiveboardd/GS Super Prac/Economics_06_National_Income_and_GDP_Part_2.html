<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following components is included in the calculation of GDP?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2328;&#2335;&#2325; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Imports</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2366;&#2340;</span>",
      "<span class=\"eqt\">Intermediate goods</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2361;&#2366;&#2351;&#2325; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Consumption expenditure</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2349;&#2379;&#2327; &#2357;&#2381;&#2351;&#2351;</span>",
      "<span class=\"eqt\">Non-monetary services</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2352;-&#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2360;&#2375;&#2357;&#2366;&#2319;&#2305;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Gross Domestic Product (GDP) is the total monetary value of final goods and services produced within a country's economic boundaries during a specific period, usually a year.</p><p>&bull; Non-monetary goods and services (e.g., household activities) are not included in GDP calculations.</p><p><b>Further Insight:</b></p><p>&bull; Gross value added = Output  -  Intermediate consumption</p><p>&bull; <b>GDP at Market Prices = Gross value added + Indirect taxes  -  Subsidies</b></p><p>&bull; GDP = final consumption expenditures/actual final consumption + changes in inventories + gross fixed capital formation + acquisition less disposals of valuables + exports of goods and services  -  imports of goods and services</p><p>&bull; GDP at Market Prices = compensation of employees + operating surplus / mixed income + CFC(Consumption of fixed capital) + Indirect taxes  -  Subsidies</p><p>&bull; <b>GDP at factor cost = GDP at market prices  -  indirect taxes + subsidies</b></p><p>Source: Chapter 2 BASIC CONCEPTS OF NATIONAL ACCOUNTS AGGREGATES, by Ministry of Statistics and Programme Implementation.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT included in the Real GDP calculation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2327;&#2339;&#2344;&#2366; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Inflation adjustment</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2360;&#2350;&#2366;&#2351;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Current market prices</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Value of final goods and services</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2367;&#2350; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Nominal GDP</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2350;&#2350;&#2366;&#2340;&#2381;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Real GDP is adjusted for inflation and does not use current market prices while Nominal GDP is calculated at current prices.</p><p><b>Further Insight:</b></p><p>&bull; Nominal GDP: GDP calculated at current market prices without adjusting for inflation.</p><p>&bull; Real GDP : GDP adjusted for inflation, providing a more accurate measure of economic growth.</p><p>&bull; GDP Deflator: Used to convert nominal GDP into real GDP by adjusting for price changes. </p><p>&bull; Formula: GDP Deflator = Nominal GDP/Real GDP X 100</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements about GDP is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">GDP includes the total value of all final goods and services produced within a country, including imports.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2368; &#2342;&#2375;&#2358; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2360;&#2349;&#2368; &#2309;&#2306;&#2340;&#2367;&#2350; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2325;&#2369;&#2354; &#2350;&#2370;&#2354;&#2381;&#2351; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2310;&#2351;&#2366;&#2340; &#2349;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">GDP measures the economic output of a country without considering the effects of inflation.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2367;&#2319; &#2348;&#2367;&#2344;&#2366; &#2325;&#2367;&#2360;&#2368; &#2342;&#2375;&#2358; &#2325;&#2375; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">GDP at constant prices adjusts for changes in the price level to reflect the real value of goods and services.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351;&#2379;&#2306; &#2346;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2366;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">GDP at factor cost includes GDP at market prices plus indirect tax and minus subsidies.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2325; &#2354;&#2366;&#2327;&#2340; &#2346;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2350;&#2375;&#2306; &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (&#2332;&#2368;&#2337;&#2368;&#2346;&#2368;) &#2350;&#2375;&#2306; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2340;&#2341;&#2366; &#2360;&#2348;&#2381;&#2360;&#2367;&#2337;&#2368; &#2325;&#2379; &#2328;&#2335;&#2366;&#2325;&#2352; &#2358;&#2366;&#2350;&#2367;&#2354; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>GDP at constant prices (Real GDP) adjusts for changes in the price level(Inflation), providing a measure of the real value of goods and services. </b></p><p>&bull; <b>GDP includes only the value of goods and services produced within a country and excludes imports</b></p><p>&bull; <b>GDP at factor cost = GDP at market prices  -  indirect taxes + subsidies</b></p><p><b>Further Insight:</b></p><p>&bull; Nominal GDP does not account for inflation directly.</p><p>&bull; Gross value added = Output  -  Intermediate consumption</p><p>&bull; <b>GDP at Market Prices = Gross value added + Indirect taxes  -  Subsidies</b></p><p>&bull; GDP = final consumption expenditures/actual final consumption + changes in inventories + gross fixed capital formation + acquisition less disposals of valuables + exports of goods and services  -  imports of goods and services</p><p>&bull; GDP at Market Prices = compensation of employees + operating surplus / mixed income + CFC(Consumption of fixed capital) + Indirect taxes  -  Subsidies</p><p>&bull; <b>GDP at factor cost = GDP at market prices  -  indirect taxes + subsidies</b></p><p>Source: Chapter 2 BASIC CONCEPTS OF NATIONAL ACCOUNTS AGGREGATES, by Ministry of Statistics and Programme Implementation.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements accurately describes the GDP deflator?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2337;&#2367;&#2347;&#2381;&#2354;&#2375;&#2335;&#2352; &#2325;&#2366; &#2360;&#2335;&#2368;&#2325; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The GDP deflator is calculated by dividing nominal GDP by real GDP and multiplying by 100.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2337;&#2367;&#2347;&#2381;&#2354;&#2375;&#2335;&#2352; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2344;&#2366;&#2350;&#2350;&#2366;&#2340;&#2381;&#2352; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2325;&#2379; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2325;&#2375; &#2340;&#2341;&#2366; 100 &#2360;&#2375; &#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2325;&#2375; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The GDP deflator measures the inflation rate by comparing the current and base year prices of goods and services.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2337;&#2367;&#2347;&#2381;&#2354;&#2375;&#2335;&#2352; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2324;&#2352; &#2310;&#2343;&#2366;&#2352; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340;&#2379;&#2306; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2325;&#2352;&#2325;&#2375; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2342;&#2352; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The GDP deflator is calculated by dividing real GDP by nominal GDP and multiplying by 1000.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2337;&#2367;&#2347;&#2381;&#2354;&#2375;&#2335;&#2352; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2325;&#2379; &#2344;&#2366;&#2350;&#2350;&#2366;&#2340;&#2381;&#2352; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2325;&#2375; &#2340;&#2341;&#2366; 1000 &#2360;&#2375; &#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2325;&#2375; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The GDP deflator is calculated by dividing nominal GDP by real GDP and multiplying by 1000.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2337;&#2367;&#2347;&#2381;&#2354;&#2375;&#2335;&#2352; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2344;&#2366;&#2350;&#2350;&#2366;&#2340;&#2381;&#2352; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2325;&#2379; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2325;&#2375; &#2340;&#2341;&#2366; 1000 &#2360;&#2375; &#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2325;&#2375; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>The GDP deflator is calculated by dividing nominal GDP by real GDP and multiplying by 100. </b></p><p>&bull; <b>It measures inflation by adjusting for price level changes, not by comparing current and base year prices directly.</b></p><p><b>Further Insight:</b></p><p>&bull; Nominal GDP: GDP calculated at current market prices without adjusting for inflation.</p><p>&bull; Real GDP: GDP adjusted for inflation, providing a more accurate measure of economic growth.</p><p>&bull; GDP Deflator: Used to convert nominal GDP into real GDP by adjusting for price changes. </p><p>&bull; Formula: GDP Deflator = Nominal GDP/Real GDP X 100</p>",
    "question_index": 3
  },
  {

      "<span class=\"eqt\">Adjustment for foreign factor income</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2366;&#2351;&#2379;&#2332;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>National Income is derived from NNP by adjusting for indirect taxes and subsidies.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Net National Product (NNP):</b></p><p>&bull; It is the total market value of all final goods and services produced by a country's residents in a given period, after deducting depreciation (wear and tear on capital goods).</p><p>&bull; Formula: <b>NNP = GNP - Depreciation</b></p><p>&bull; It represents the <b>net output of a nation after accounting for the depreciation of its capital stock</b>.</p><p>&bull; <b>National Income (NI):</b></p><p>&bull; It is the total income earned by the residents of a country from all economic activities, including wages, rent, interest, and profits. It excludes indirect taxes and includes subsidies.</p><p>&bull; Formula:<b> NI = NNP at Factor Cost</b></p><p>&#9632; <b>National Income = NNP - Indirect taxes + Subsidies</b></p><p>&bull; <b>National Income is derived from NNP by adjusting for indirect taxes and subsidies</b>. It reflects the income generated by the production of goods and services at factor cost (i.e., without considering taxes and subsidies).</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following measures the income available to households after taxes and transfers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2352;&#2379;&#2306; &#2324;&#2352; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2339; &#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2310;&#2351; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Gross National Income</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2350;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Disposable Income</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2351;&#2379;&#2332;&#2381;&#2351; &#2310;&#2351;</span>",
      "<span class=\"eqt\">Net Domestic Product</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2342;&#2381;&#2343; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Net National Income</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2342;&#2381;&#2343; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Disposable Income is the amount of money households have after taxes and transfers.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Private income</b></p><p>&#9675; It refers to the total income earned by individuals and private enterprises from all sources, before the payment of taxes or deductions. It includes both earned and unearned income from within and outside the country.</p><p>&#9675; <b>Private Income=National Income+Transfer Payments+Net Factor Income from Abroad+Interest on National Debt</b></p><p>&bull; <b>Personal Income (PI)</b></p><p>&#9675; It is the total income received by individuals before they pay personal income taxes. </p><p>&#9675; It includes earned income, transfer payments, and other sources but excludes corporate profits retained by companies.</p><p>&#9675; <b>Personal Income=Private Income&#8722;Undistributed Corporate Profits&#8722;Corporate Taxes&#8722;Social Security Contributions</b></p><p>&bull; <b>Personal Disposable Income or Disposable income</b></p><p>&#9675; It is the income remaining with individuals after paying direct taxes, such as income taxes.</p><p>&#9675; It is the amount available for personal consumption, savings, or investment.</p><p>&#9675; It represents the purchasing power of Individuals</p><p>&#9675; <b>Personal Disposable Income=Personal Income&#8722;Personal Taxes</b></p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about Personal Income (PI):</p><p>a) Personal Income includes all earned income, but it excludes transfer payments like pensions.</p><p>b) PI is always lower than National Income due to the deduction of corporate profits and taxes.</p><p>c) Personal Income includes both earned and unearned incomes received by individuals.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2310;&#2351; (&#2346;&#2368;&#2310;&#2312;) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a) &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2310;&#2351; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2310;&#2351; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2311;&#2360;&#2350;&#2375;&#2306; &#2346;&#2375;&#2306;&#2358;&#2344; &#2332;&#2376;&#2360;&#2375; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2339; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>b) &#2325;&#2377;&#2352;&#2381;&#2346;&#2379;&#2352;&#2375;&#2335; &#2350;&#2369;&#2344;&#2366;&#2347;&#2375; &#2324;&#2352; &#2325;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2335;&#2380;&#2340;&#2368; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2346;&#2368;&#2310;&#2312; &#2361;&#2350;&#2375;&#2358;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; &#2360;&#2375; &#2325;&#2350; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>c) &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2310;&#2351; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2324;&#2352; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2342;&#2379;&#2344;&#2379;&#2306; &#2310;&#2351; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p></span>",

      "<span class=\"eqt\">Only b and c are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",

    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Personal Income (PI) includes both earned and unearned incomes </b></p><p>&bull; <b>It is usually lower than National Income after deducting corporate profits and taxes. </b></p><p>&bull; <b>PI also includes transfer payments.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Private income</b></p><p>&#9675; It refers to the total income earned by individuals and private enterprises from all sources, before the payment of taxes or deductions. It includes both earned and unearned income from within and outside the country.</p><p>&#9675; <b>Private Income=National Income+Transfer Payments+Net Factor Income from Abroad+Interest on National Debt</b></p><p>&bull; <b>Personal Income (PI)</b></p><p>&#9675; It is the total income received by individuals before they pay personal income taxes. </p><p>&#9675; It includes earned income, transfer payments, and other sources but excludes corporate profits retained by companies.</p><p>&#9675; <b>Personal Income=Private Income&#8722;Undistributed Corporate Profits&#8722;Corporate Taxes&#8722;Social Security Contributions</b></p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about Real GDP:</p><p>a) Real GDP is calculated using constant base year prices.</p><p>b) Real GDP adjusts for inflation to reflect the real value of goods and services.</p><p>c) Real GDP is always greater than Nominal GDP during periods of inflation.</p><p><b>Options:</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a) &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2360;&#2381;&#2341;&#2367;&#2352; &#2310;&#2343;&#2366;&#2352; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>b) &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2366;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>c) &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2368; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2361;&#2350;&#2375;&#2358;&#2366; &#2344;&#2366;&#2350;&#2350;&#2366;&#2340;&#2381;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only b and c are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",

    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Real GDP uses constant base year prices and adjusts for inflation to reflect the true value of goods and services. </b></p><p>&bull; <b>Real GDP is not necessarily greater than Nominal GDP during inflation - Nominal GDP tends to be higher during inflation </b></p><p><b>Further Insight:</b></p><p>&bull; Nominal GDP: GDP calculated at current market prices without adjusting for inflation.</p><p>&bull; Real GDP : GDP adjusted for inflation, providing a more accurate measure of economic growth.</p><p>&bull; GDP Deflator: Used to convert nominal GDP into real GDP by adjusting for price changes. </p><p>&bull; Formula: GDP Deflator = Nominal GDP/Real GDP X 100</p>",

    "question": "<span class=\"eqt\"><p>Match the following terms related to National Income</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column 1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column 2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Net Domestic Product</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Domestic production + income from abroad</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Gross National Product</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Market price - depreciation</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Personal Income</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. GNP - depreciation</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Net National Product</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. National Income  -  undistributed profits  -  Net interest payments  -  Corporate tax + government transfer payments</td></tr></table><p><b>Options:</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; 1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; 2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2358;&#2369;&#2342;&#2381;&#2343; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; + &#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2310;&#2351;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2360;&#2325;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; - &#2350;&#2370;&#2354;&#2381;&#2351;&#2361;&#2381;&#2352;&#2366;&#2360;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2310;&#2351;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2332;&#2368;&#2319;&#2344;&#2346;&#2368; - &#2350;&#2370;&#2354;&#2381;&#2351;&#2361;&#2381;&#2352;&#2366;&#2360;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2358;&#2369;&#2342;&#2381;&#2343; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; - &#2309;&#2357;&#2367;&#2340;&#2352;&#2367;&#2340; &#2354;&#2366;&#2349; - &#2358;&#2369;&#2342;&#2381;&#2343; &#2348;&#2381;&#2351;&#2366;&#2332; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; - &#2325;&#2377;&#2352;&#2381;&#2346;&#2379;&#2352;&#2375;&#2335; &#2325;&#2352; + &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2339; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344;</td></tr></table><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</p></span>",
    "options": [

    "solution": "<p>&bull; <b>Net Domestic Product (NDP) = Market price - depreciation</b></p><p>&bull; <b>Gross National Product (GNP) = Domestic production + income from abroad</b></p><p>&bull; <b>Personal Income = National Income  -  undistributed profits  -  Net interest payments  -  Corporate tax + government transfer payments</b></p><p>&bull; <b>Net National Product (NNP) = GNP minus depreciation</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Private Income=National Income+Transfer Payments+Net Factor Income from Abroad+Interest on National Debt</b></p><p>&bull; <b>Personal Income=Private Income&#8722;Undistributed Corporate Profits&#8722;Corporate Taxes&#8722;Social Security Contributions</b></p><p>&bull; GDP at factor cost = GDP at market prices  -  indirect taxes + subsidies</p><p>&bull; GNP=GDP+Net Factor Income from Abroad</p><p>&bull; Gross National Income (GNI)at market prices = GDP at market prices + taxes less subsidies on production and imports (Net receivable from abroad) + Compensation of Employees (Net receivable from abroad) + property income (Net receivable from abroad)</p><p>&bull; Net National Income (NNI) at market prices = GNI at market prices - consumption of fixed capital </p><p>&bull; Net National Disposable Income(NNDI) = NNI + net taxes on income and wealth receivable from abroad + net social contributions and benefits receivable from abroad</p>",

    "solution": "<p>&bull; <b>GDP Growth Rate = Depicts increase in real GDP over time </b></p><p>&bull; <b>Purchasing Power Parity (PPP) = Compares international cost of living </b></p><p>&bull; <b>Base Year = Used as a reference year for constant prices </b></p><p>&bull; <b>Human Development Index (HDI) = Measures development in terms of income, health, and education </b></p><p><b>Further Insight:</b></p><p>&bull; <b>Purchasing Power Parity</b></p><p>&#9675; It is an economic theory that compares different countries' currencies through a \"basket of goods\" approach. </p><p>&#9675; It suggests that in the absence of transportation costs and other barriers, identical goods should have the same price when expressed in a common currency. </p><p>&#9675; PPP is used to determine the relative value of currencies and compare economic productivity and standards of living between countries.</p><p>&#9675; As per PPP India's purchasing power is 3rd in the World after USA and China.</p><p>&bull; <b>Base Year</b></p><p>&#9675; A base year is a reference year used for comparison in economic and statistical analysis.</p><p>&#9675; It serves as a benchmark for comparing data from other years.</p><p>&#9675; The base year is used to measure changes in economic indicators, such as inflation, GDP, or the Consumer Price Index (CPI), by providing a standard reference point.</p>",

    "solution": "<p>&bull; <b>Circular Flow of Income = Flow of income between households and firms</b></p><p>&bull; <b>Multiplier Effect = Impact of increased spending on total income </b></p><p>&bull; <b>Open Economy = An economy that interacts with other economies </b></p><p>&bull; <b>Investment Multiplier = Ratio of change in income to change in investment </b></p><p><b>Further Insight:</b></p><p>&bull; <b>Circular flow of Income</b></p><p>&#9675; It describes how money moves through an economy. </p><p>&#9675; It shows the flow of money between different sectors of the Economy Such as households and firms and illustrates how economic activity is interconnected.</p> <h3 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt;page-break-after:auto'>&bull; <b>Multiplier Effect</b></h3><p>&#9675; <b>It</b> refers to the proportionate change in national income resulting from an initial change in spending or investment.</p><p>&#9675; It demonstrates how an initial increase in spending can lead to a larger overall increase in national income.</p><p>&#9675; For example: If the government increases spending on infrastructure, the firms involved will hire more workers. Those workers will spend their wages, leading to increased demand for other goods and services, and so on.</p> <h3 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt;page-break-after:auto'>&bull; <b>Open Economy</b></h3><p>&#9675; <b>It is</b> an economic system that interacts with other economies around the world. </p><p>&#9675; It engages in international trade and finance, allowing for the import and export of goods, services, and capital.</p><p>&bull; Investment Multiplier</p><p>&#9675; It is a specific type of multiplier effect that relates to changes in investment spending. </p><p>&#9675; It measures how an initial change in investment will affect the overall economy.</p><p>&#9675; For Example: If a company invests in building a new factory, it creates jobs and income for construction workers. These workers spend their wages on goods and services, stimulating further economic activity.</p>",
