<body>

                </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a characteristic feature of the Plant Kingdom?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2357;&#2344;&#2360;&#2381;&#2346;&#2340;&#2367; &#2332;&#2327;&#2340; &#2325;&#2368; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Autotrophic nutrition</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2346;&#2379;&#2359;&#2368; &#2346;&#2379;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Presence of a cell wall made of chitin</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2311;&#2335;&#2367;&#2344; &#2360;&#2375; &#2348;&#2344;&#2368; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2349;&#2367;&#2340;&#2381;&#2340;&#2367; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Eukaryotic cell structure</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2325;&#2375;&#2352;&#2367;&#2351;&#2379;&#2335;&#2367;&#2325; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Chlorophyll presence for photosynthesis</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2347;&#2367;&#2354; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Plants have cell walls made of cellulose, not chitin. Chitin is characteristic of fungi, not plants. Other options reflect true characteristics of plants:</b></p><p>&bull; <b>Autotrophic nutrition</b></p><p>&#9675; Plants produce their own food through photosynthesis.</p><p>&bull; <b>Eukaryotic cell structure</b></p><p>&#9675; Plant cells are eukaryotic, containing a defined nucleus.</p><p>&bull; <b>Chlorophyll presence</b></p><p>&#9675; Chlorophyll is essential for photosynthesis in plants.</p><p><b>Further Insight:</b></p><p>&bull; <b>Characteristic Features of the Plant Kingdom:</b></p><p>&#9675; Plants are eukaryotic and multicellular organism.</p><p>&#9675; Plant cells have rigid cell walls composed primarily of <b>cellulose</b>, providing structural support.</p><p>&#9675; Plants are <b>autotrophic</b>, meaning they produce their own food through photosynthesis, using sunlight, carbon dioxide, and water.</p><p>&#9675; Plants contain <b>chloroplasts</b>, specialized organelles that carry out photosynthesis, where the light energy is converted into chemical energy.</p><p>&#9675; Plants exhibit an <b>alternation of generations</b> in their life cycle, alternating between a <b>haploid gametophyte</b> and a <b>diploid sporophyte</b> stage.</p><p>&#9675; Reproduction can be <b>sexual</b> (involving gametes) or <b>asexual</b> (vegetative propagation).</p><p>&#9632; In higher plants, reproduction involves the formation of seeds, while lower plants reproduce through spores.</p><p>&#9675; Plants are <b>non-motile</b> and remain fixed in one place due to their roots anchoring them in the ground.</p><p>&#9675; Higher plants (like <b>pteridophytes</b>, <b>gymnosperms</b>, and <b>angiosperms</b>) possess <b>vascular tissues</b> like xylem and phloem for the conduction of water, nutrients, and food.</p><p>&#9675; Plants store food, usually in the form of <b>starch</b> or other carbohydrates, for later use.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which class of algae is characterized by the presence of chlorophyll a and chlorophyll d, and is predominantly marine?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2376;&#2357;&#2366;&#2354; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2352;&#2381;&#2327; &#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2347;&#2367;&#2354; &#2319; &#2324;&#2352; &#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2347;&#2367;&#2354; &#2337;&#2368; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2360;&#2375; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2361;&#2376;, &#2324;&#2352; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chlorophyceae</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2347;&#2366;&#2311;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Phaeophyceae</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2375;&#2323;&#2347;&#2366;&#2311;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Rhodophyceae</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2379;&#2337;&#2379;&#2347;&#2366;&#2311;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Cyanophyceae</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2351;&#2344;&#2379;&#2347;&#2366;&#2311;&#2360;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Rhodophyceae (red algae) are mainly marine and contain chlorophyll a and chlorophyll d. </b></p><p>&bull; <b>Chlorophyceae</b> (Green algae): Contains chlorophyll a and b, found in freshwater.</p><p>&bull; <b>Phaeophyceae</b> (Brown algae): Contains chlorophyll a and c, mostly marine.</p><p>&bull; <b>Cyanophyceae</b>: Also known as blue-green algae, contains chlorophyll a.</p><p><b>Further Insight:</b></p><p>&bull; <b>Algae</b></p><p>&bull; <b>Chlorophyll-bearing</b>, <b>autotrophic</b>, and <b>aquatic</b> organisms (found in freshwater and marine habitats).</p><p>&bull; Reproduce vegetatively by <b>fragmentation</b> and sexually by the formation of gametes.</p><p>&bull; <b>Classes of Algae</b>:</p><p>&#9675; <b>Chlorophyceae (Green Algae)</b>: Freshwater, chlorophyll a &amp; b, e.g., <b>Chlamydomonas</b>, <b>Ulothrix</b>.</p><p>&#9675; <b>Phaeophyceae (Brown Algae)</b>: Marine, chlorophyll a &amp; c, e.g., <b>Fucus</b>, <b>Sargassum</b>.</p><p>&#9675; <b>Rhodophyceae (Red Algae)</b>: Marine, chlorophyll a &amp; d, e.g., <b>Polysiphonia</b>, <b>Gelidium</b>.</p><p>&bull; Used in <b>food</b> (e.g., <b>Laminaria</b>, <b>Sargassum</b>).</p><p>&bull; Source of <b>iodine</b> and <b>antibiotic properties</b>.</p><p><img width=624 height=267 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25957/image001.jpg\"></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following structures help Bryophytes in reproduction through water?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2348;&#2381;&#2352;&#2366;&#2351;&#2379;&#2347;&#2366;&#2311;&#2335;&#2381;&#2360; &#2325;&#2379; &#2332;&#2354; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2346;&#2381;&#2352;&#2332;&#2344;&#2344; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Xylem</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2311;&#2354;&#2350;</span>",
      "<span class=\"eqt\">Antheridia</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2341;&#2375;&#2352;&#2367;&#2337;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Sporangia</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2379;&#2352;&#2376;&#2306;&#2327;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Phloem</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2354;&#2366;&#2319;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Bryophytes have antheridia (male) and archegonia (female) reproductive structures, which require water for the movement of sperm. Other options:</b></p><p>&bull; Bryophytes lack vascular tissues.</p><p>&bull; <b>Sporangia</b>: Present in <b>Pteridophytes</b> and other plants for spore production.</p><p>&bull; <b>Phloem</b>: Absent in Bryophytes; they lack true vascular systems.</p><p><b>Further Insight:</b></p><p>&bull; <b>Bryophyta</b></p><p>&bull; Known as the <b>amphibians of the plant kingdom</b>, dependent on water for reproduction.</p><p>&bull; <b>Non-vascular</b> plants found in moist, shaded habitats.</p><p>&bull; Examples: <b>Liverworts</b> (e.g., Marchantia), <b>Mosses</b> (e.g., Funaria), <b>Hornworts</b>.</p><p>&bull; Plant body has <b>root-like</b>, <b>stem-like</b>, and <b>leaf-like</b> structures.</p><p>&bull; Reproduction involves <b>antheridia</b> (male) and <b>archegonia</b> (female), producing spores and gametophytes.</p><p><img width=624 height=419 id=image2.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25957/image002.jpg\"></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following distinguishes Pteridophytes from Bryophytes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2335;&#2375;&#2352;&#2367;&#2337;&#2379;&#2347;&#2366;&#2311;&#2335;&#2381;&#2360; &#2325;&#2379; &#2348;&#2381;&#2352;&#2366;&#2351;&#2379;&#2347;&#2366;&#2311;&#2335;&#2381;&#2360; &#2360;&#2375; &#2309;&#2354;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Presence of an independent gametophyte</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2351;&#2369;&#2327;&#2381;&#2350;&#2325;&#2379;&#2342;&#2381;&#2349;&#2367;&#2342; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Presence of Vascular tissues</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2361;&#2344;&#2368; &#2314;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Use of spores for reproduction</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2332;&#2344;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2368;&#2332;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">Lack of roots, stems, and leaves</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2337;&#2364;&#2379;&#2306;, &#2340;&#2344;&#2379;&#2306; &#2324;&#2352; &#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Pteridophytes</b> are the first plants to have <b>vascular tissues</b> (xylem and phloem). Other options:</p><p>&bull; Both groups have <b>independent gametophytes</b>.</p><p>&bull; Both groups reproduce using <b>spores</b>.</p><p>&bull; <b>Pteridophytes</b> have well-differentiated roots, stems, and leaves, unlike Bryophytes.</p><p><b>Further Insight:</b></p><p>&bull; <b>Pteridophyta</b></p><p>&bull; First terrestrial plants to possess <b>vascular tissues</b> (xylem and phloem).</p><p>&bull; Well-differentiated plant body with <b>roots</b>, <b>stems</b>, and <b>leaves</b>.</p><p>&bull; Reproduce through spores produced in <b>sporangia</b>.</p><p>&bull; Examples: <b>Ferns</b>, <b>Horse-tails</b>, <b>Marsilea</b>.</p><p>&bull; <img width=467 height=419 id=image6.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25957/image003.png\"></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which division of plant bears naked seeds?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2380;&#2343;&#2375; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2327; &#2344;&#2327;&#2381;&#2344; &#2348;&#2368;&#2332; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Angiosperms</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2357;&#2371;&#2340;&#2348;&#2368;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Bryophytes</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2366;&#2351;&#2379;&#2347;&#2366;&#2311;&#2335;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Gymnosperms</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2367;&#2350;&#2381;&#2344;&#2379;&#2360;&#2381;&#2346;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Pteridophytes</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2352;&#2367;&#2337;&#2379;&#2347;&#2366;&#2311;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Gymnosperms bear naked seeds, which are not enclosed within fruits, unlike angiosperms. </b></p><p>&bull; <b>Angiosperms</b>: Seeds enclosed within fruits.</p><p>&bull; <b>Bryophytes</b>: Reproduce via spores, not seeds.</p><p>&bull; <b>Pteridophytes</b>: Also reproduce by spores, not seeds.</p><p><b>Further Insight:</b></p><p>&bull; <b>Gymnosperms</b></p><p>&bull; <b>Non-flowering</b>, <b>seed-bearing</b> plants with seeds that are <b>exposed</b> (not enclosed in fruits).</p><p>&bull; Examples: <b>Pinus</b>, <b>Cycas</b>, <b>Cedrus</b>.</p><p>&bull; Features:</p><p>&#9675; <b>Woody</b>, <b>perennial</b>, and may form large trees.</p><p>&#9675; <b>Taproot</b> system, with leaves that may be simple or compound.</p><p>&#9675; Reproduce through <b>heterospory</b> (microspores and megaspores).</p><p>&bull; <img width=567 height=431 id=image8.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25957/image004.png\"></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT true for Angiosperms?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2319;&#2306;&#2332;&#2367;&#2351;&#2379;&#2360;&#2381;&#2346;&#2352;&#2381;&#2350; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2340;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Presence of flowers</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2370;&#2354;&#2379;&#2306; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Double fertilization</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2361;&#2352;&#2366; &#2344;&#2367;&#2359;&#2375;&#2330;&#2344;</span>",
      "<span class=\"eqt\">Seeds enclosed in fruits</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2306;&#2342; &#2348;&#2368;&#2332;</span>",
      "<span class=\"eqt\">Absence of vascular tissue</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2361;&#2344;&#2368; &#2314;&#2340;&#2325; &#2325;&#2368; &#2309;&#2344;&#2369;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; <b>Angiosperms have well-developed vascular tissues (xylem and phloem).</b></p><p>&bull; <b>Presence of flowers</b>: A distinguishing feature of angiosperms.</p><p>&bull; <b>Double fertilization</b>: A unique reproductive feature in angiosperms.</p><p>&bull; <b>Seeds enclosed in fruits</b>: One of the key characteristics of angiosperms.</p><p><b>Further Insight:</b></p><p>&bull; <b>Angiosperms</b></p><p>&bull; <b>Flowering plants</b> with seeds enclosed in <b>fruits</b>.</p><p>&bull; Exhibit great diversity in size </p><p>&#9675; Smallest angiosperm: <b>Wolffia</b></p><p>&#9675; Largest angiosperm: <b>Eucalyptus</b></p><p>&bull; <b>Pollen grains</b> and <b>ovules</b> are developed in specialized structures called <b>flowers</b>.</p><p>&bull; Angiosperms are divided into:</p><p>&#9675; <b>Monocotyledons</b> </p><p>&#9675; <b>Dicotyledons</b></p><p>&bull; <img width=624 height=493 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25957/image005.png\"></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following organelles is responsible for photosynthesis in plants?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2306;&#2327; &#2346;&#2380;&#2343;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mitochondria</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2311;&#2335;&#2379;&#2325;&#2377;&#2344;&#2381;&#2337;&#2381;&#2352;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Chloroplast</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Nucleus</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2349;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Lysosome</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2311;&#2360;&#2379;&#2360;&#2379;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Chloroplasts contain chlorophyll, which is crucial for photosynthesis. Other options:</b></p><p>&bull; <b>Mitochondria</b>: Involved in <b>respiration</b> and energy production.</p><p>&bull; <b>Nucleus</b>: Contains <b>genetic material</b>.</p><p>&bull; <b>Lysosome</b>: Involved in <b>waste breakdown</b> and <b>recycling</b> of cellular material.</p><p><b>Further Insight:</b></p><p>&bull; <b>Plant Cell:</b></p><p>&bull; <b>Type</b>: Eukaryotic cell, found in plants.</p><p>&bull; <b>Cell Wall</b>: Present; made of <b>cellulose</b>, providing structural strength.</p><p>&bull; <b>Key Organelles</b>:</p><p>&#9675; <b>Nucleus</b>: Contains genetic material (DNA).</p><p>&#9675; <b>Mitochondria</b>: Produces energy (ATP).</p><p>&#9675; <b>Endoplasmic Reticulum (ER)</b>: Involved in protein and lipid synthesis.</p><p>&#9675; <b>Golgi Apparatus</b>: Packaging and transportation of proteins.</p><p>&#9675; <b>Chloroplasts</b>: Enable <b>photosynthesis</b> (conversion of light energy into chemical energy).</p><p>&#9675; <b>Large Central Vacuole</b>: Maintains turgor pressure and stores nutrients.</p><p>&bull; <b>Other Features</b>: Contains <b>plasmodesmata</b> (channels for communication between cells).</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What is the primary source of energy for autotrophic plants?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2357;&#2346;&#2379;&#2359;&#2368; &#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2360;&#2381;&#2352;&#2379;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Nitrogen</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Sunlight</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;</span>",
      "<span class=\"eqt\">Water</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Oxygen</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Autotrophic plants use <b>sunlight</b> to produce food through <b>photosynthesis</b>. Other options:</p><p>&bull; <b>Nitrogen</b>: Required for plant growth but not an energy source.</p><p>&bull; <b>Water</b>: Used in photosynthesis but is not the primary energy source.</p><p>&bull; <b>Oxygen</b>: Produced as a byproduct of photosynthesis, not an energy source.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which process is unique to sexual reproduction in angiosperms?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2306;&#2332;&#2367;&#2351;&#2379;&#2360;&#2381;&#2346;&#2352;&#2381;&#2350; &#2350;&#2375;&#2306; &#2354;&#2376;&#2306;&#2327;&#2367;&#2325; &#2346;&#2381;&#2352;&#2332;&#2344;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344; &#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2309;&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Binary fission</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2311;&#2344;&#2352;&#2368; &#2357;&#2367;&#2326;&#2306;&#2337;&#2344;</span>",
      "<span class=\"eqt\">Double fertilization</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2361;&#2352;&#2366; &#2344;&#2367;&#2359;&#2375;&#2330;&#2344;</span>",
      "<span class=\"eqt\">Budding</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2357;&#2379;&#2342;&#2367;&#2340;</span>",
      "<span class=\"eqt\">Spore formation</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;&#2332;&#2366;&#2339;&#2369; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Double fertilization</b> occurs in angiosperms, where one sperm fertilizes the egg, and the other forms the <b>endosperm</b>. Other processes:</p><p>&bull; <b>Binary fission</b>: Occurs in unicellular organisms, the mother cell divided into two daughter cells.</p><p>&bull; <b>Spore formation</b>: Common in lower plants like bryophytes and fungi.</p><p><b>Further Insight:</b></p><p>&bull; Double fertilization is a unique feature of angiosperms, involving two fusion events in the ovule. After pollination, the pollen grain germinates on the stigma, forming a pollen tube that carries two male gametes to the ovule.</p><p>&bull; <b>First Fertilization (Syngamy)</b>: One sperm cell fuses with the egg cell, forming a diploid zygote (2n), which later develops into the embryo.</p><p>&bull; <b>Second Fertilization (Triple Fusion)</b>: The other sperm cell fuses with the two polar nuclei in the central cell, forming a triploid (3n) endosperm. This endosperm nourishes the developing embryo.</p><p>&bull; <b>Significance</b>:</p><p>&#9675; <b>Zygote Formation</b>: The zygote develops into the embryo.</p><p>&#9675; <b>Endosperm Formation</b>: The triploid endosperm serves as a food source for the embryo and helps in seed germination.</p><p>&bull; <img width=624 height=493 id=image4.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25957/image006.png\"></p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a characteristic of Chlorophyceae which is also known as green algae?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2347;&#2366;&#2311;&#2360;&#2368; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; &#2361;&#2352;&#2375; &#2358;&#2376;&#2357;&#2366;&#2354; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Presence of fucoxanthin pigment</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2351;&#2370;&#2325;&#2379;&#2332;&#2364;&#2376;&#2306;&#2341;&#2367;&#2344; &#2357;&#2352;&#2381;&#2339;&#2325; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Chlorophyll a and b are the main pigments</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2347;&#2367;&#2354; &#2319; &#2324;&#2352; &#2348;&#2368; &#2350;&#2369;&#2326;&#2381;&#2351; &#2357;&#2352;&#2381;&#2339;&#2325; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Mostly marine and found in deep sea</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325;&#2340;&#2352; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2368; &#2324;&#2352; &#2327;&#2361;&#2352;&#2375; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Contains phycoerythrin as a pigment</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2339;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2347;&#2364;&#2366;&#2311;&#2325;&#2379;&#2319;&#2352;&#2367;&#2341;&#2381;&#2352;&#2367;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Chlorophyceae (green algae) contains chlorophyll a and b, which give them their green color. </b></p><p>&bull; <b>Fucoxanthin</b>: Present in <b>brown algae</b> (Phaeophyceae), not in green algae.</p><p>&bull; <b>Mostly marine</b>: Green algae are commonly found in <b>freshwater</b> environments.</p><p>&bull; <b>Phycoerythrin</b>: Found in <b>red algae</b> (Rhodophyceae), not in green algae.</p><p><b>Further Insight:</b></p><p>&bull; <b>Algae</b></p><p>&#9675; <b>Chlorophyll-bearing</b>, <b>autotrophic</b>, and <b>aquatic</b> organisms (found in freshwater and marine habitats).</p><p>&#9675; Reproduce vegetatively by <b>fragmentation</b> and sexually by the formation of gametes.</p><p>&#9675; <b>Classes of Algae</b>:</p><p>&#9632; <b>Chlorophyceae (Green Algae)</b>: Freshwater, chlorophyll a &amp; b, e.g., <b>Chlamydomonas</b>, <b>Ulothrix</b>.</p><p>&#9632; <b>Phaeophyceae (Brown Algae)</b>: Marine, chlorophyll a &amp; c, e.g., <b>Fucus</b>, <b>Sargassum</b>.</p><p>&#9632; <b>Rhodophyceae (Red Algae)</b>: Marine, chlorophyll a &amp; d, e.g., <b>Polysiphonia</b>, <b>Gelidium</b>.</p><p>&#9675; Used in <b>food</b> (e.g., <b>Laminaria</b>, <b>Sargassum</b>).</p><p>&#9675; Source of <b>iodine</b> and <b>antibiotic properties</b>.</p><p><img width=624 height=267 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25957/image007.jpg\"></p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following algae is widely used for agar-agar production?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2358;&#2376;&#2357;&#2366;&#2354; &#2309;&#2327;&#2352;-&#2309;&#2327;&#2352; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Spirogyra</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2366;&#2311;&#2352;&#2379;&#2327;&#2366;&#2311;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Gelidium</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2375;&#2354;&#2367;&#2337;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Chlamydomonas</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2376;&#2350;&#2366;&#2311;&#2337;&#2379;&#2350;&#2379;&#2344;&#2360;</span>",
      "<span class=\"eqt\">Fucus</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2351;&#2370;&#2325;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Gelidium</b> is a red algae (Rhodophyceae) used for the production of <b>agar-agar</b>, a gelatinous substance used in food and microbiology. Other options:</p><p>&bull; (1) <b>Spirogyra</b>: A type of green algae, not used for agar.</p><p>&bull; (3) <b>Chlamydomonas</b>: A unicellular green algae with no commercial use for agar.</p><p>&bull; (4) <b>Fucus</b>: A brown algae, used for other purposes like fertilizer</p><p><b>Further Insight:</b></p><p>&bull; Algae have several economic uses across various sectors:</p><p>&bull; <b>Food Source</b>: Algae, particularly marine forms like <i>Laminaria</i>, <i>Sargassum</i>, and <i>Porphyra</i>, are consumed as food in many Asian countries. They are rich in proteins, vitamins, and minerals.</p><p>&bull; <b>Agar-Agar Production</b>: Algae such as <i>Gelidium</i> and <i>Gracilaria</i> are used to extract agar, which is extensively used in microbiology for culturing microorganisms and as a stabilizer in food and cosmetics.</p><p>&bull; <b>Biofertilizers</b>: Algae like <i>Azolla</i> and <i>Anabaena</i> fix atmospheric nitrogen, enriching soil fertility. These algae are used as biofertilizers, especially in paddy fields.</p><p>&bull; <b>Commercial Products</b>: Alginates from brown algae (e.g., <i>Laminaria</i>) and carrageenan from red algae (e.g., <i>Chondrus</i>) are used in the food, textile, and pharmaceutical industries as thickeners, stabilizers, and emulsifiers.</p><p>&bull; <b>Aquaculture Feed</b>: Algae serve as a feedstock for fish and other marine organisms in aquaculture.</p><p>&bull; <b>Potential Biofuel Source</b>: Algae are being explored as a renewable source of biofuels due to their high lipid content and fast growth rate.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a characteristic feature of Mosses?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2350;&#2377;&#2360; &#2325;&#2368; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">They possess vascular tissues</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2350;&#2375;&#2306; &#2360;&#2306;&#2357;&#2361;&#2344;&#2368; &#2314;&#2340;&#2325; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">The sporophyte is independent of the gametophyte</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2379;&#2352;&#2379;&#2347;&#2366;&#2311;&#2335; &#2327;&#2376;&#2350;&#2375;&#2335;&#2379;&#2347;&#2366;&#2311;&#2335; &#2360;&#2375; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">They have true roots</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2325;&#2368; &#2332;&#2337;&#2364;&#2375;&#2306; &#2360;&#2330;&#2381;&#2330;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">The gametophyte stage is dominant</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2369;&#2327;&#2381;&#2350;&#2325;&#2379;&#2342;&#2381;&#2349;&#2367;&#2342; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; In <b>mosses</b> (a type of bryophyte), the <b>gametophyte</b> is the dominant stage of the life cycle. Other options:</p><p>&bull; <b>Vascular tissues</b>: Absent in bryophytes</p><p>&bull; <b>Sporophyte independent</b>: The <b>sporophyte</b> in bryophytes is <b>dependent on the gametophyte</b>.</p><p>&bull; <b>True roots</b>: Mosses have <b>rhizoids</b>, not true roots</p><p><b>Further Insight:</b></p><p>&bull; <b>Bryophytes</b> are non-vascular land plants that thrive in moist environments. </p><p>&bull; They lack true roots, stems, and leaves but possess structures analogous to them, like rhizoids for anchorage. </p><p>&bull; Bryophytes reproduce through spores and play an essential role in preventing soil erosion and maintaining moisture in ecosystems. </p><p>&bull; They are often called \"amphibians of the plant kingdom\" as they require water for reproduction.</p><p>&bull; <b>Classes of Bryophytes:</b></p><p>&#9675; <b>Hepaticopsida (Liverworts)</b>:</p><p>&#9632; These plants have flat, liver-shaped thalli.</p><p>&#9632; Reproduce asexually via gemmae cups.</p><p>&#9632; Examples: <i>Marchantia</i>, <i>Riccia</i>.</p><p>&#9675; <b>Anthocerotopsida (Hornworts)</b>:</p><p>&#9632; Have a flattened thallus and long horn-like sporophytes.</p><p>&#9632; Sporophytes continuously grow from their base.</p><p>&#9632; Examples: <i>Anthoceros</i>, <i>Notothylas</i>.</p><p>&#9675; <b>Bryopsida (Mosses)</b>:</p><p>&#9632; Possess small, leaf-like structures around a central stem.</p><p>&#9632; Mosses undergo a life cycle with a dominant gametophyte and a sporophyte attached to it.</p><p>&#9632; Examples: <i>Funaria</i>, <i>Sphagnum</i>.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following pteridophyte classes has homosporous plants?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2335;&#2375;&#2352;&#2367;&#2337;&#2379;&#2347;&#2366;&#2311;&#2335; &#2357;&#2352;&#2381;&#2327; &#2350;&#2375;&#2306; &#2360;&#2350;&#2348;&#2368;&#2332;&#2366;&#2339;&#2369;&#2325; &#2346;&#2380;&#2343;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Psilopsida</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2311;&#2354;&#2379;&#2346;&#2381;&#2360;&#2367;&#2337;&#2366;</span>",
      "<span class=\"eqt\">Lycopsida</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2311;&#2325;&#2379;&#2346;&#2381;&#2360;&#2367;&#2337;&#2366;</span>",
      "<span class=\"eqt\">Sphenopsida</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2347;&#2375;&#2344;&#2379;&#2346;&#2381;&#2360;&#2367;&#2337;&#2366;</span>",
      "<span class=\"eqt\">Pteropsida</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2352;&#2379;&#2346;&#2381;&#2360;&#2367;&#2337;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Psilopsida</b> (primitive pteridophytes) are <b>homosporous</b>, meaning they produce spores of the same size.</p><p>&bull; <b>Lycopsida</b>: Can be <b>heterosporous</b> or homosporous.</p><p>&bull; <b>Sphenopsida</b>: Mostly <b>homosporous</b>.</p><p>&bull; <b>Pteropsida</b>: Mostly <b>heterosporous</b>.</p><p><b>Further Insight:</b></p><p>&bull; Pteridophytes are vascular plants with true roots, stems, and leaves but reproduce via spores instead of seeds. They are considered the first land plants with vascular tissues (xylem and phloem), enabling better water and nutrient transport.</p><p>&#9675; <b>Classes of Pteridophytes:</b></p><p>&#9632; <b>Psilopsida</b> (Whisk ferns):</p><p>&bull; Simple, rootless plants with rhizomes.</p><p>&bull; Example: Psilotum.</p><p>&#9632; <b>Lycopsida</b> (Club mosses):</p><p>&bull; Small, evergreen plants with true roots and leaves.</p><p>&bull; Example: Lycopodium.</p><p>&#9632; <b>Sphenopsida</b> (Horsetails):</p><p>&bull; Hollow, jointed stems with scale-like leaves.</p><p>&bull; Example: Equisetum.</p><p>&#9632; <b>Pteropsida</b> (Ferns):</p><p>&bull; Large fronds with a complex vascular system.</p><p>&bull; Example: Pteris.</p><p>&#9675; Pteridophytes can be divided into two groups based on the types of spores they produce:</p><p>&#9632; <b>Homosporous Pteridophytes</b>:</p><p>&bull; Produce only one type of spore that develops into a bisexual gametophyte.</p><p>&bull; Example: <i>Pteris</i>.</p><p>&#9632; <b>Heterosporous Pteridophytes</b>:</p><p>&bull; Produce two types of spores:</p><p>&#9675; <b>Microspores</b> (male gametophyte)</p><p>&#9675; <b>Megaspores</b> (female gametophyte)</p><p>&bull; Example: <i>Selaginella</i>, <i>Salvinia</i>.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following plants is an example of gymnosperm?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2380;&#2343;&#2366; &#2332;&#2367;&#2350;&#2381;&#2344;&#2379;&#2360;&#2381;&#2346;&#2352;&#2381;&#2350; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Wheat</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2375;&#2361;&#2370;&#2305;</span>",
      "<span class=\"eqt\">Pine</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2368;&#2337;&#2364;</span>",
      "<span class=\"eqt\">Mango</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2350;</span>",
      "<span class=\"eqt\">Fern</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2352;&#2381;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Pine</b> is a gymnosperm, which means it has <b>naked seeds</b>. Other options:</p><p>&bull; <b>Wheat</b>: An angiosperm (monocot).</p><p>&bull; <b>Mango</b>: An angiosperm (dicot).</p><p>&bull; <b>Fern</b>: A pteridophyte, not a gymnosperm. </p><p><b>Further Insight:</b></p><p>&bull; <b>Gymnosperms</b></p><p>&bull; <b>Non-flowering</b>, <b>seed-bearing</b> plants with seeds that are <b>exposed</b> (not enclosed in fruits).</p><p>&bull; Examples: <b>Pinus</b>, <b>Cycas</b>, <b>Cedrus</b>.</p><p>&bull; Features:</p><p>&#9675; <b>Woody</b>, <b>perennial</b>, and may form large trees.</p><p>&#9675; <b>Taproot</b> system, with leaves that may be simple or compound.</p><p>&#9675; Reproduce through <b>heterospory</b> (microspores and megaspores).</p><p>&bull; <img width=309 height=337 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25957/image008.jpg\"></p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Gymnosperms differ from angiosperms in which of the following ways?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2367;&#2350;&#2381;&#2344;&#2379;&#2360;&#2381;&#2346;&#2352;&#2381;&#2350; &#2319;&#2306;&#2332;&#2367;&#2351;&#2379;&#2360;&#2381;&#2346;&#2352;&#2381;&#2350; &#2360;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Presence of xylem and phloem</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2311;&#2354;&#2350; &#2324;&#2352; &#2347;&#2381;&#2354;&#2379;&#2319;&#2350; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Seeds are enclosed within fruits</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;&#2332; &#2347;&#2354;&#2379;&#2306; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2348;&#2306;&#2342; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Absence of flowers</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2370;&#2354;&#2379;&#2306; &#2325;&#2366; &#2309;&#2349;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Presence of chlorophyll</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2347;&#2367;&#2354; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Gymnosperms do not have flowers. Their seeds are produced on cones and are exposed.</b> </p><p>&bull; Both gymnosperms and angiosperms have <b>xylem and phloem</b>.</p><p>&bull; Gymnosperms have <b>naked seeds</b>, not enclosed in fruits.</p><p>&bull; Both groups have <b>chlorophyll</b> for photosynthesis.</p><p><b>Further Insight:</b></p><p>NCERT:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Feature</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Gymnosperms</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Angiosperms</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Seeds</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Naked seeds, not enclosed in a fruit</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Seeds enclosed within a fruit (ovary)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Vascular Tissues</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Xylem lacks vessels; only tracheids are present</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Xylem has both vessels and tracheids</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Reproductive Structures</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cones (strobili) are the reproductive organs</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Flowers are the reproductive structures</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Pollination</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Primarily wind-pollinated</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Wind, water, and animal pollination</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Fertilization</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Single fertilization</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Double fertilization (zygote and endosperm)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Ovule</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ovules are exposed before fertilization</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ovules enclosed in the ovary before fertilization</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Gametophyte</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Female gametophyte develops inside ovule, male in pollen</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Female gametophyte develops within ovule, male in pollen grain</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Lifecycle</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sporophyte dominant, gametophyte reduced</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sporophyte dominant, gametophyte further reduced</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Example</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><i>Pinus</i>, <i>Cycas</i>, <i>Ginkgo</i></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><i>Mango</i>, <i>Wheat</i>, <i>Sunflower</i></td></tr></table>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Organism</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Pigment </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Chlorophyceae</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Phycocyanin</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Phaeophyceae</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Chlorophyll a and c</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Rhodophyceae</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Chlorophyll a and d</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Cyanophyceae (Blue-green algae)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Chlorophyll a and b</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2332;&#2368;&#2357;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2357;&#2352;&#2381;&#2339;&#2325;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2347;&#2366;&#2311;&#2360;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2347;&#2366;&#2311;&#2325;&#2379;&#2360;&#2366;&#2311;&#2344;&#2367;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2347;&#2367;&#2351;&#2379;&#2347;&#2366;&#2311;&#2360;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2347;&#2367;&#2354; a &#2324;&#2352; c</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2352;&#2379;&#2337;&#2379;&#2347;&#2366;&#2311;&#2360;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2347;&#2367;&#2354; a &#2324;&#2352; d</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2360;&#2366;&#2351;&#2344;&#2379;&#2347;&#2366;&#2311;&#2360;&#2368; (&#2344;&#2368;&#2354;&#2366;-&#2361;&#2352;&#2366; &#2358;&#2376;&#2357;&#2366;&#2354;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2347;&#2367;&#2354; a &#2324;&#2352; b</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i - d, ii - b, iii - c, iv - a</span><span class=\"hqt\" style=\"display:none\">i - d, ii - b, iii - c, iv - a</span>",

      "<span class=\"eqt\">i - d, ii - a, iii - b, iv - c</span><span class=\"hqt\" style=\"display:none\">i - d, ii - a, iii - b, iv - c</span>",
      "<span class=\"eqt\">i - c, ii - d, iii - a, iv - b</span><span class=\"hqt\" style=\"display:none\">i - c, ii - d, iii - a, iv - b</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Chlorophyceae (Green algae)</b>: Contains <b>Chlorophyll a and b</b>, which gives the green color.</p><p>&bull; <b>Phaeophyceae (Brown algae)</b>: Contains <b>Chlorophyll a and c</b> along with fucoxanthin, giving it a brown color.</p><p>&bull; <b>Rhodophyceae (Red algae)</b>: Contains <b>Chlorophyll a and d</b> along with phycoerythrin, which gives it a red color.</p><p>&bull; <b>Cyanophyceae (Blue-green algae: Bacteria)</b>: Contains <b>Phycocyanin</b>, a blue pigment, along with <b>Chlorophyll a</b>.</p><p><b>Further Insight:</b></p><p><img width=624 height=267 id=image1.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25957/image009.jpg\"></p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Pteridophytes:</p><p>(a) Pteridophytes possess true roots, stems, and leaves.</p><p>(b) Pteridophytes produce seeds for reproduction.</p><p>(c) The dominant phase in their life cycle is the sporophyte.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2335;&#2375;&#2352;&#2367;&#2337;&#2379;&#2347;&#2366;&#2311;&#2335;&#2381;&#2360; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2335;&#2375;&#2352;&#2367;&#2337;&#2379;&#2347;&#2366;&#2311;&#2335;&#2381;&#2360; &#2350;&#2375;&#2306; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2332;&#2337;&#2364;&#2375;&#2306;, &#2340;&#2344;&#2375; &#2324;&#2352; &#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2366;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>(b) &#2335;&#2375;&#2352;&#2367;&#2337;&#2379;&#2347;&#2366;&#2311;&#2335;&#2381;&#2360; &#2346;&#2381;&#2352;&#2332;&#2344;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2368;&#2332; &#2346;&#2376;&#2342;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>(c) &#2313;&#2344;&#2325;&#2375; &#2332;&#2368;&#2357;&#2344; &#2330;&#2325;&#2381;&#2352; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2330;&#2352;&#2339; &#2360;&#2381;&#2346;&#2379;&#2352;&#2379;&#2347;&#2366;&#2311;&#2335; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">All a, b, and c</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; a, b, &#2324;&#2352; c</span>"

    "correct_option_id": 2,
    "solution": "<p>&bull; Pteridophytes have well-differentiated roots, stems, and leaves, unlike bryophytes.</p><p>&bull; Pteridophytes reproduce through <b>spores</b>, not seeds.</p><p>&bull; <b>The dominant phase in the life cycle of pteridophytes is the sporophyte (diploid), while the gametophyte is reduced.</b></p><p><b>Further Insight:</b></p><p>&bull; Pteridophytes are vascular plants with true roots, stems, and leaves but reproduce via spores instead of seeds. They are considered the first land plants with vascular tissues (xylem and phloem), enabling better water and nutrient transport.</p><p>&#9675; <b>Classes of Pteridophytes:</b></p><p>&#9632; <b>Psilopsida</b> (Whisk ferns):</p><p>&bull; Simple, rootless plants with rhizomes.</p><p>&bull; Example: Psilotum.</p><p>&#9632; <b>Lycopsida</b> (Club mosses):</p><p>&bull; Small, evergreen plants with true roots and leaves.</p><p>&bull; Example: Lycopodium.</p><p>&#9632; <b>Sphenopsida</b> (Horsetails):</p><p>&bull; Hollow, jointed stems with scale-like leaves.</p><p>&bull; Example: Equisetum.</p><p>&#9632; <b>Pteropsida</b> (Ferns):</p><p>&bull; Large fronds with a complex vascular system.</p><p>&bull; Example: Pteris.</p><p><img width=170 height=315 id=image3.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25957/image010.png\"></p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about Gymnosperms:</p><p>(a) Gymnosperms produce seeds that are enclosed within fruits.</p><p>(b) They lack xylem vessels in their vascular tissues.</p><p>(c) Gymnosperms are generally woody, with no herbaceous species.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2367;&#2350;&#2381;&#2344;&#2379;&#2360;&#2381;&#2346;&#2352;&#2381;&#2350; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2332;&#2367;&#2350;&#2381;&#2344;&#2379;&#2360;&#2381;&#2346;&#2352;&#2381;&#2350; &#2347;&#2354;&#2379;&#2306; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2348;&#2306;&#2342; &#2348;&#2368;&#2332; &#2346;&#2376;&#2342;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>(b) &#2313;&#2344;&#2325;&#2375; &#2360;&#2306;&#2357;&#2361;&#2344;&#2368; &#2314;&#2340;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2332;&#2366;&#2311;&#2354;&#2350; &#2357;&#2366;&#2361;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2350;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>(c) &#2332;&#2367;&#2350;&#2381;&#2344;&#2379;&#2360;&#2381;&#2346;&#2352;&#2381;&#2350; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2354;&#2325;&#2337;&#2364;&#2368; &#2325;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2325;&#2379;&#2312; &#2358;&#2366;&#2325;&#2366;&#2361;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [

      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",

    "solution": "<p>&bull; Gymnosperms produce <b>naked seeds</b>, not enclosed within fruits (unlike angiosperms).</p><p>&bull; Gymnosperms lack <b>xylem vessels</b>; they have <b>tracheids</b> instead for water conduction.</p><p>&bull; Gymnosperms are typically <b>woody plants</b>, and they do not have herbaceous representatives.</p><p><b>Further Insight:</b></p><p><b>Gymnosperms</b></p><p>&bull; <b>Non-flowering</b>, <b>seed-bearing</b> plants with seeds that are <b>exposed</b> (not enclosed in fruits).</p><p>&bull; Examples: <b>Pinus</b>, <b>Cycas</b>, <b>Cedrus</b>.</p><p>&bull; Features:</p><p>&#9675; <b>Woody</b>, <b>perennial</b>, and may form large trees.</p><p>&#9675; <b>Taproot</b> system, with leaves that may be simple or compound.</p><p>&#9675; Reproduce through <b>heterospory</b> (microspores and megaspores).</p><p>&#9675; Gymnosperms lack <b>xylem vessels</b>; they have <b>tracheids</b> instead for water conduction</p><p><img width=309 height=337 id=image7.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25957/image011.jpg\"></p>",

    "solution": "<p>&bull; <b>Pteridophyte</b> - <b>Dryopteris</b> (a type of fern).</p><p>&bull; <b>Gymnosperm</b> - <b>Pinus</b> (a well-known gymnosperm).</p><p>&bull; <b>Bryophyte</b> - <b>Marchantia</b> (a liverwort).</p><p>&bull; <b>Angiosperm</b> - <b>Oryza sativa</b> (rice, a flowering plant).</p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Plant Type</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Example</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Bryophytes</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Mosses (e.g., <i>Sphagnum</i>)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Liverworts (e.g., <i>Marchantia</i>)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Pteridophytes</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ferns (e.g., <i>Pteris</i>)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Horse tails (e.g., <i>Equisetum</i>)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Club mosses (e.g., <i>Lycopodium</i>)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Gymnosperms</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Pine trees (e.g., <i>Pinus</i>)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cycads (e.g., <i>Cycas</i>)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ginkgo (e.g., <i>Ginkgo biloba</i>)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Angiosperms</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sunflower (e.g., <i>Helianthus annuus</i>)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Mango (e.g., <i>Mangifera indica</i>)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Wheat (e.g., <i>Triticum aestivum</i>)</td></tr></table>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the features of Monocot Seeds:</p><p>(a) Monocot seeds possess a single cotyledon.</p><p>(b) Monocot seeds exhibit hypogeal germination.</p><p>(c) In monocot seeds, the endosperm is usually absent.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2379;&#2344;&#2379;&#2325;&#2377;&#2335; &#2348;&#2368;&#2332;&#2379;&#2306; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2350;&#2379;&#2344;&#2379;&#2325;&#2377;&#2335; &#2348;&#2368;&#2332;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325;&#2354; &#2348;&#2368;&#2332;&#2346;&#2340;&#2381;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>(b) &#2350;&#2379;&#2344;&#2379;&#2325;&#2377;&#2335; &#2348;&#2368;&#2332; &#2361;&#2366;&#2311;&#2346;&#2379;&#2332;&#2375;&#2354; &#2309;&#2306;&#2325;&#2369;&#2352;&#2339; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>(c) &#2350;&#2379;&#2344;&#2379;&#2325;&#2377;&#2335; &#2348;&#2368;&#2332;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2319;&#2339;&#2381;&#2337;&#2379;&#2360;&#2381;&#2346;&#2352;&#2381;&#2350; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2309;&#2344;&#2369;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",

    "solution": "<p>&bull; Monocot seeds have <b>one cotyledon</b>, which is a key feature distinguishing them from dicots.</p><p>&bull; Many monocot seeds show <b>hypogeal germination</b>, where the cotyledon remains underground.</p><p>&bull; In monocot seeds, the <b>endosperm</b> is generally present and provides nourishment to the growing seedling.</p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Feature</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Monocot Seeds</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Dicot Seeds</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Seed Structure</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Single cotyledon</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Two cotyledons</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Example</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Maize (<i>Zea mays</i>), Rice (<i>Oryza sativa</i>)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bean (<i>Phaseolus</i>), Pea (<i>Pisum sativum</i>)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Cotyledon Function</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Storage of nutrients</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Storage of nutrients and can also perform photosynthesis in young plants</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Seed Coat</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Thin and membranous</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Thick and hard</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Embryo Structure</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Small embryo with short axis</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Larger embryo with distinct shoot and root axis</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Vascular Bundles</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Scattered in the stem</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Arranged in a circle</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Root System</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Fibrous root system</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Taproot system</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Flower Parts</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Usually in multiples of three</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Usually in multiples of four or five</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Examples of Uses</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cereal grains, grasses</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Pulses, oilseeds</td></tr></table><p></p>",
