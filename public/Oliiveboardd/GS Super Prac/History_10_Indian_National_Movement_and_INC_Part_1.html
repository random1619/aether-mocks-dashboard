    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following groups/parties was started in San Francisco, United States of America, during the Indian National Movement?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2350;&#2370;&#2361;/&#2346;&#2366;&#2352;&#2381;&#2335;&#2368; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2360;&#2376;&#2344; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2367;&#2360;&#2381;&#2325;&#2379;, &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2309;&#2350;&#2375;&#2352;&#2367;&#2325;&#2366; &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Hindustan Socialist Republican Association</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2306;&#2342;&#2369;&#2360;&#2381;&#2340;&#2366;&#2344; &#2360;&#2379;&#2358;&#2354;&#2367;&#2360;&#2381;&#2335; &#2352;&#2367;&#2346;&#2348;&#2381;&#2354;&#2367;&#2325;&#2344; &#2319;&#2360;&#2379;&#2360;&#2367;&#2319;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Swaraj Party</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2352;&#2366;&#2332; &#2346;&#2366;&#2352;&#2381;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Khilafat Committee</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2367;&#2354;&#2366;&#2347;&#2340; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Ghadar Party</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2364;&#2342;&#2352; &#2346;&#2366;&#2352;&#2381;&#2335;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Ghadar Party was formed in San Francisco, USA, in 1913 by Indian revolutionaries such as Lala Hardayal, Sohan Singh Bhakna, and Kartar Singh Sarabha. Its goal was to liberate India from British rule through an armed struggle.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>When was the Champaran Agrarian Law passed by the British Government?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2352;&#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2330;&#2306;&#2346;&#2366;&#2352;&#2339; &#2325;&#2371;&#2359;&#2367; &#2325;&#2366;&#2344;&#2370;&#2344; &#2325;&#2348; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1918</span><span class=\"hqt\" style=\"display:none\">1918</span>",
      "<span class=\"eqt\">1919</span><span class=\"hqt\" style=\"display:none\">1919</span>",
      "<span class=\"eqt\">1917</span><span class=\"hqt\" style=\"display:none\">1917</span>",
      "<span class=\"eqt\">1916</span><span class=\"hqt\" style=\"display:none\">1916</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The British Government enacted the Champaran Agrarian Law in <b>1918</b>, prompted by Mahatma Gandhi's 1917 Champaran Satyagraha Movement. This movement sought to end the coercive cultivation of indigo on farmers' lands in the Champaran district.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The Cabinet Mission came to India in_____ to discuss the ultimate transfer of power.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2340;&#2381;&#2340;&#2366; &#2325;&#2375; &#2309;&#2306;&#2340;&#2367;&#2350; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2339; &#2346;&#2352; &#2330;&#2352;&#2381;&#2330;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2376;&#2348;&#2367;&#2344;&#2375;&#2335; &#2350;&#2367;&#2358;&#2344; _____ &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2310;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1946</span><span class=\"hqt\" style=\"display:none\">1946</span>",
      "<span class=\"eqt\">1945</span><span class=\"hqt\" style=\"display:none\">1945</span>",
      "<span class=\"eqt\">1943</span><span class=\"hqt\" style=\"display:none\">1943</span>",
      "<span class=\"eqt\">1942</span><span class=\"hqt\" style=\"display:none\">1942</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Cabinet Mission arrived in India in <b>1946</b> with the purpose of discussing the modalities for the ultimate transfer of power from British rule to Indian hands. It played a crucial role in formulating proposals for the formation of a united and self-governing India, ultimately leading to the creation of the Mountbatten Plan and the subsequent partition in 1947.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Champaran Satyagraha was launched in which of the following years?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2306;&#2346;&#2366;&#2352;&#2339; &#2360;&#2340;&#2381;&#2351;&#2366;&#2327;&#2381;&#2352;&#2361; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1928</span><span class=\"hqt\" style=\"display:none\">1928</span>",
      "<span class=\"eqt\">1917</span><span class=\"hqt\" style=\"display:none\">1917</span>",
      "<span class=\"eqt\">1935</span><span class=\"hqt\" style=\"display:none\">1935</span>",
      "<span class=\"eqt\">1945</span><span class=\"hqt\" style=\"display:none\">1945</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Champaran Satyagraha of <b>1917</b> was the first satyagraha movement led by Mahatma Gandhi in British India and is considered a historically important rebellion in the Indian independence movement. It was India's first Civil Disobedience movement launched by Mahatma Gandhi to protest against the injustice meted out to tenant farmers in the Champaran district of Bihar.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In which year was All-India Muslim League formed?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2326;&#2367;&#2354; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2354;&#2368;&#2327; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2361;&#2369;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">1885</span><span class=\"hqt\" style=\"display:none\">1885</span>",
      "<span class=\"eqt\">1911</span><span class=\"hqt\" style=\"display:none\">1911</span>",
      "<span class=\"eqt\">1906</span><span class=\"hqt\" style=\"display:none\">1906</span>",
      "<span class=\"eqt\">1920</span><span class=\"hqt\" style=\"display:none\">1920</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p></p><p>The All-India Muslim League was formed on December 30, <b>1906,</b> in Dhaka. It was a political organization that aimed to represent the interests of Indian Muslims during the period of British colonial rule.</p><p> </p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following organisations, divided into two branches, was established by Lokmanya Bal Gangadhar Tilak and Annie Besant?</p><p>Options:</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2306;&#2327;&#2336;&#2344;, &#2342;&#2379; &#2358;&#2366;&#2326;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340;, &#2354;&#2379;&#2325;&#2350;&#2366;&#2344;&#2381;&#2351; &#2348;&#2366;&#2354; &#2327;&#2306;&#2327;&#2366;&#2343;&#2352; &#2340;&#2367;&#2354;&#2325; &#2324;&#2352; &#2319;&#2344;&#2368; &#2348;&#2375;&#2360;&#2375;&#2306;&#2335; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</span>",
    "options": [
      "<span class=\"eqt\">Indian Association</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2328;</span>",
      "<span class=\"eqt\">Theosophical society</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2367;&#2351;&#2379;&#2360;&#2379;&#2347;&#2367;&#2325;&#2354; &#2360;&#2379;&#2360;&#2366;&#2351;&#2335;&#2368;</span>",
      "<span class=\"eqt\">East Indian Association</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2344; &#2319;&#2360;&#2379;&#2360;&#2367;&#2319;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Home Rule League</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2379;&#2350; &#2352;&#2370;&#2354; &#2354;&#2368;&#2327;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Home Rule League was established in 1916 by Bal Gangadhar Tilak and Annie Besant. It was divided into two branches - one led by Tilak in Maharashtra and Central Provinces, and another led by Annie Besant in the rest of India. The movement aimed at achieving self-government for India within the British Empire.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which important event that started in 1930 played a significant role in motivating and mobilizing Indians to join the nonviolent movement for independence?</p></span><span class=\"hqt\" style=\"display:none\"><p>1930 &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2370; &#2361;&#2369;&#2312; &#2325;&#2367;&#2360; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2328;&#2335;&#2344;&#2366; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351;&#2379;&#2306; &#2325;&#2379; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2361;&#2367;&#2306;&#2360;&#2325; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2360;&#2306;&#2327;&#2336;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2344;&#2367;&#2349;&#2366;&#2312;?</p></span>",
    "options": [
      "<span class=\"eqt\">Swadeshi movement</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Gadar Movement</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2342;&#2352; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Quit India Movement</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2331;&#2379;&#2337;&#2364;&#2379; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Salt Satyagraha</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2350;&#2325; &#2360;&#2340;&#2381;&#2351;&#2366;&#2327;&#2381;&#2352;&#2361;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The <b>Salt Satyagraha (Dandi March)</b>, initiated by <b>Mahatma Gandhi on March 12, 1930</b>, was a pivotal event in India's freedom struggle.</p><p>&#183; Gandhi and his followers marched <b>240 miles</b> from Sabarmati Ashram to Dandi to <b>protest the British salt tax</b>, symbolizing defiance against colonial oppression.</p><p>&#183; This <b>nonviolent campaign</b> mobilized millions of Indians, sparking widespread civil disobedience and uniting the nation against British rule.</p><p><b>Key Impact:</b></p><p>&#183; The Salt Satyagraha <b>globalized India's freedom struggle</b> and solidified Gandhi's strategy of <b>Satyagraha (nonviolent resistance)</b>.</p><p><b>Further information:</b></p><p>&#183; <b>Swadeshi Movement (1905 - 1911)</b>: Focused on boycotting British goods (pre-Gandhian era).</p><p>&#183; <b>Gadar Movement (1913s)</b>: A militant diaspora-led effort, not nonviolent.</p><p>&#183; <b>Quit India Movement (1942)</b>: Launched later, demanding immediate British withdrawal.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Gandhiji hoped that by coupling non-cooperation with _________, India's two major religious Communities, Hindus and Muslims, could collectively bring an end to colonial rule.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2366;&#2306;&#2343;&#2368;&#2332;&#2368; &#2325;&#2379; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342; &#2341;&#2368; &#2325;&#2367; &#2309;&#2360;&#2361;&#2351;&#2379;&#2327; &#2325;&#2379; _________ &#2325;&#2375; &#2360;&#2366;&#2341; &#2332;&#2379;&#2337;&#2364;&#2325;&#2352;, &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2342;&#2379; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351;- &#2361;&#2367;&#2306;&#2342;&#2370; &#2324;&#2352; &#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350;, &#2360;&#2366;&#2350;&#2370;&#2361;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2324;&#2346;&#2344;&#2367;&#2357;&#2375;&#2358;&#2367;&#2325; &#2358;&#2366;&#2360;&#2344; &#2325;&#2379; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Swadeshi Movement</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Khilafat Movement</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2367;&#2354;&#2366;&#2347;&#2340; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Sepoy Mutiny</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2346;&#2366;&#2361;&#2368; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;</span>",
      "<span class=\"eqt\">Civil Disobedience Movement</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2357;&#2367;&#2344;&#2351; &#2309;&#2357;&#2332;&#2381;&#2334;&#2366; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Gandhiji envisioned that by aligning the non-cooperation movement with the <b>Khilafat Movement</b>, which aimed to protect the interests of Muslims regarding the Caliphate, Hindus and Muslims could unite in their struggle against colonial rule. This strategy aimed to foster Hindu-Muslim unity as a potent force against British imperialism.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following signed the Poona pact with Mahatma Gandhi?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2344;&#2375; &#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2370;&#2344;&#2366; &#2360;&#2350;&#2333;&#2380;&#2340;&#2375; &#2346;&#2352; &#2361;&#2360;&#2381;&#2340;&#2366;&#2325;&#2381;&#2359;&#2352; &#2325;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ali Brothers</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2368; &#2348;&#2381;&#2352;&#2342;&#2352;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Chittaranjan Das</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2367;&#2340;&#2352;&#2306;&#2332;&#2344; &#2342;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Jyotiba Phule</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2381;&#2351;&#2379;&#2340;&#2367;&#2348;&#2366; &#2347;&#2369;&#2354;&#2375;</span>",
      "<span class=\"eqt\">Bhimrao Ambedkar</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2368;&#2350;&#2352;&#2366;&#2357; &#2309;&#2306;&#2348;&#2375;&#2337;&#2325;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Poona Pact was signed between Mahatma Gandhi and <b>Dr. Bhimrao Ambedkar</b> in 1932. It aimed to address the concerns of the depressed classes regarding political representation by ensuring separate electorates for them within reserved seats, as opposed to the Communal Award proposed by the British that would have granted them a fixed number of seats but without separate electorates.</p>",
    "question_index": 8
  },
  {

    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The <b>Quit India Movement</b>, also known as the <b>August Movement</b> or <b>Bharat Chhodo Andolan</b>, was a <b>mass civil disobedience movement</b> launched by <b>Mahatma Gandhi</b> on <b>8 August 1942</b> during <b>World War II</b>. </p><p>&#183; It demanded an immediate end to British colonial rule in India.</p><p>&#183; Gandhi gave the famous slogan <b>\"Do or Die\" (Karo Ya Maro)</b> to Indians, urging them to fight for complete independence.</p>",

    "question": "<span class=\"eqt\"><p>In which of the following cities did Mahatma Gandhi lead the peasant movement against the imposed indigo cultivation by the British planters? </p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2358;&#2361;&#2352; &#2350;&#2375;&#2306; &#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; &#2344;&#2375; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2348;&#2366;&#2327;&#2366;&#2344; &#2350;&#2366;&#2354;&#2367;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2327;&#2366;&#2312; &#2327;&#2312; &#2344;&#2368;&#2354; &#2325;&#2368; &#2326;&#2375;&#2340;&#2368; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2325;&#2367;&#2360;&#2366;&#2344; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2366; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</span>",

    "question": "<span class=\"eqt\"><p>What was the name of the campaign led by the Ali brothers and Maulana Abul Kalam Azad to save the Ottoman Caliphate as a symbol of unity among the Muslim community?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325;&#2340;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2323;&#2335;&#2379;&#2350;&#2344; &#2326;&#2367;&#2354;&#2366;&#2347;&#2340; &#2325;&#2379; &#2348;&#2330;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2354;&#2368; &#2348;&#2306;&#2343;&#2369;&#2323;&#2306; &#2324;&#2352; &#2350;&#2380;&#2354;&#2366;&#2344;&#2366; &#2309;&#2348;&#2369;&#2354; &#2325;&#2354;&#2366;&#2350; &#2310;&#2332;&#2364;&#2366;&#2342; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2330;&#2354;&#2366;&#2319; &#2327;&#2319; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; &#2325;&#2366; &#2344;&#2366;&#2350; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Wahabi Movement</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361;&#2366;&#2348;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Khilafat Movement</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2367;&#2354;&#2366;&#2347;&#2340; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Ahmadiya Movement</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2361;&#2350;&#2342;&#2367;&#2351;&#2366; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Faraizi Movement</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2352;&#2366;&#2351;&#2332;&#2364;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The <b>Khilafat Movement</b> (1919 - 1924) was a <b>pan-Islamic political protest campaign</b> launched by the <b>Ali brothers (Shaukat Ali and Mohammad Ali)</b> along with <b>Maulana Abul Kalam Azad</b> and other leaders. Its aim was to pressure the British government to preserve the <b>Ottoman Caliphate</b>, which many Indian Muslims regarded as a symbol of <b>Muslim unity and leadership</b>.</p><p>&#183; It also became a part of the <b>larger Indian freedom struggle</b>, and Mahatma Gandhi supported it as a unifying movement between Hindus and Muslims. </p><p>&#183; It eventually merged with the Non-Cooperation Movement led by Gandhi.</p><p><b>Further information:</b></p><p><b>Wahabi Movement</b></p><p>&#183; <b>Timeframe:</b> 1820s onwards</p><p>&#183; <b>Leader:</b> Syed Ahmed Barelvi</p><p>&#183; <b>Objective:</b> To <b>revive Islamic principles</b> and purify Islam by removing un-Islamic practices; later turned into a <b>militant movement</b> against British rule.</p><p><b>Ahmadiya Movement</b></p><p>&#183; <b>Timeframe:</b> Late 19th century</p><p>&#183; <b>Founder:</b> Mirza Ghulam Ahmad</p><p>&#183; <b>Objective:</b> Reform Islamic practices, promote <b>peace, rational thinking</b>, and oppose <b>religious violence</b>.</p><p><b>Faraizi Movement</b></p><p>&#183; <b>Timeframe:</b> 1830s</p><p>&#183; <b>Founder:</b> Haji Shariatullah</p><p>&#183; <b>Objective:</b> To <b>reform Muslim society</b> by focusing on <b>religious duties (Faraiz)</b> and removing un-Islamic customs.</p><p>&#183; <b>Region:</b> Bengal</p><p>&#183; <b>Later Leader:</b> Dudu Miyan, who gave it a more <b>anti-landlord and anti-British</b> character.</p><p>&#183; <b>Significance:</b> It was both a <b>religious reform</b> and <b>socio-political movement</b>.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>The campaign 'Ek Tareekh, Ek Ghanta, Ek Sath' is associated with which occasion?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2319;&#2325; &#2340;&#2366;&#2352;&#2368;&#2326;, &#2319;&#2325; &#2328;&#2306;&#2335;&#2366;, &#2319;&#2325; &#2360;&#2366;&#2341;' &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; &#2325;&#2367;&#2360; &#2309;&#2357;&#2360;&#2352; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ambedkar Jayanti</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2381;&#2348;&#2375;&#2337;&#2325;&#2352; &#2332;&#2351;&#2306;&#2340;&#2368;</span>",

      "<span class=\"eqt\">Vivekananda Jayanti</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2357;&#2375;&#2325;&#2366;&#2344;&#2306;&#2342; &#2332;&#2351;&#2306;&#2340;&#2368;</span>",
      "<span class=\"eqt\">Gandhi Jayanti</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2306;&#2343;&#2368; &#2332;&#2351;&#2306;&#2340;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; This campaign promotes cleanliness and was launched on Gandhi Jayanti.</p><p>&bull; Full Name: Mohandas Karamchand Gandhi</p><p>&bull; Born: 2 October 1869, Porbandar, Gujarat</p><p>&bull; Died: 30 January 1948, New Delhi</p><p>&bull; Education: Studied law in England; later went to South Africa, where he began his political activism.</p><p>&bull; Satyagraha: Gandhi's philosophy of non-violent resistance, first practiced in South Africa and later in India.</p><p>&bull; Champaran Movement (1917): First successful Satyagraha in India, supporting indigo farmers in Bihar.</p><p>&bull; Kheda Satyagraha (1918): Protested against tax collection during famine conditions.</p><p>&bull; Non-Cooperation Movement (1920-22): Urged Indians to boycott British institutions.</p><p>&bull; Civil Disobedience Movement (1930): Launched with the Dandi March, breaking the salt law.</p><p>&bull; Quit India Movement (1942): A mass protest demanding an end to British rule, launched with the slogan \"Do or Die\".</p><p>&bull; Role in Partition: Advocated Hindu-Muslim unity and opposed the partition of India.</p><p>&bull; Death: Assassinated by Nathuram Godse on 30 January 1948. </p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Due to which of the following events did Rabindranath Tagore return the title of 'Knighthood' to the British Government while expressing his anguish?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2328;&#2335;&#2344;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2352;&#2357;&#2368;&#2306;&#2342;&#2381;&#2352;&#2344;&#2366;&#2341; &#2335;&#2376;&#2327;&#2379;&#2352; &#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2346;&#2368;&#2337;&#2364;&#2366; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; '&#2344;&#2366;&#2311;&#2335;&#2361;&#2369;&#2337;' &#2325;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2354;&#2380;&#2335;&#2366; &#2342;&#2368; &#2341;&#2368;?</span>",
    "options": [
      "<span class=\"eqt\">Charan Paduka Incident</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2352;&#2339; &#2346;&#2366;&#2342;&#2369;&#2325;&#2366; &#2328;&#2335;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Partition of Bengal</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2366; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Jallianwala Bagh Massacre</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2354;&#2367;&#2351;&#2366;&#2305;&#2357;&#2366;&#2354;&#2366; &#2348;&#2366;&#2327; &#2361;&#2340;&#2381;&#2351;&#2366;&#2325;&#2366;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Chauri Chaura Incident</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2380;&#2352;&#2368; &#2330;&#2380;&#2352;&#2366; &#2325;&#2366;&#2306;&#2337;</span>"

    "correct_option_id": 2,
    "solution": "<p>Rabindranath Tagore renounced his knighthood in protest against the Jallianwala Bagh massacre of 1919, where British troops under General Dyer killed hundreds of unarmed Indians.</p><p>&bull; Option 1: Charan Paduka Incident  -  Not related.</p><p>&bull; Option 2: Partition of Bengal  -  Happened in 1905; no connection with knighthood.</p><p>&bull; Option 4: Chauri Chaura Incident  -  Led to Gandhi's Non-Cooperation Movement withdrawal but was not linked to Tagore's knighthood.</p>",
    "question_index": 13
  },

    "correct_option_id": 0,
    "solution": "<p><b>Lala Hardayal</b> started the <b>Ghadar</b> movement in the early twentieth century among Indians in North America, primarily Sikhs, to end British rule in their country of India. On July 15, 1913, the Ghadar Party was founded in Astoria, Oregon.</p><p>He founded the <b>Ghadar Party</b> in the United States. This party's members were expatriates who wanted to start an international movement against British rule in India. On July 15, 1913, the Ghadar Party was founded in Astoria, Oregon.</p>",

    "question": "<span class=\"eqt\"><p>The Non-Cooperation Movement was called off after which of the following incidents?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2328;&#2335;&#2344;&#2366; &#2325;&#2375; &#2348;&#2366;&#2342; &#2309;&#2360;&#2361;&#2351;&#2379;&#2327; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2379; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Outbreak of the First World War</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2341;&#2350; &#2357;&#2367;&#2358;&#2381;&#2357; &#2351;&#2369;&#2342;&#2381;&#2343; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2352;&#2350;&#2381;&#2349;</span>",
      "<span class=\"eqt\">Kakori train robbery</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2325;&#2379;&#2352;&#2368; &#2335;&#2381;&#2352;&#2375;&#2344; &#2337;&#2325;&#2376;&#2340;&#2368;</span>",
      "<span class=\"eqt\">Chauri-Chaura incident</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2380;&#2352;&#2368;-&#2330;&#2380;&#2352;&#2366; &#2325;&#2366;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Komagata Maru incident</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2350;&#2366;&#2327;&#2366;&#2335;&#2366; &#2350;&#2366;&#2352;&#2370; &#2328;&#2335;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Non-Cooperation Movement (1920-1922) was led by Mahatma Gandhi to resist British rule through non-violent means. However, it was called off after the Chauri-Chaura incident in February 1922, where a violent clash between protestors and police resulted in the burning of a police station and the death of 22 policemen. Gandhi, emphasizing non-violence, withdrew the movement following this event.</p><p>Hence, option (3) is the correct answer.</p>",
    "question_index": 15
  },
  {

    "options": [
      "<span class=\"eqt\">1917</span><span class=\"hqt\" style=\"display:none\">1917</span>",
      "<span class=\"eqt\">1915</span><span class=\"hqt\" style=\"display:none\">1915</span>",
      "<span class=\"eqt\">1925</span><span class=\"hqt\" style=\"display:none\">1925</span>",
      "<span class=\"eqt\">1910</span><span class=\"hqt\" style=\"display:none\">1910</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Hindu Mahasabha was established in <b>1915</b> as a reaction to rising concerns about Muslim fundamentalism and political activism during that period. It aimed to advocate for Hindu interests and promote Hindu nationalism as a response to perceived threats to Hindu identity and culture.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Khudai Khidmatgars, a non-violent movement among the Pathans, was started by ______.</p></span><span class=\"hqt\" style=\"display:none\">&#2326;&#2369;&#2342;&#2366;&#2312; &#2326;&#2367;&#2342;&#2350;&#2340;&#2327;&#2366;&#2352;, &#2346;&#2336;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2309;&#2361;&#2367;&#2306;&#2360;&#2325; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;, ______ &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">Alluri Sitarama Raju</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2354;&#2370;&#2352;&#2368; &#2360;&#2368;&#2340;&#2366;&#2352;&#2366;&#2350; &#2352;&#2366;&#2332;&#2370;</span>",
      "<span class=\"eqt\">Bakht Khan</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2326;&#2381;&#2340; &#2326;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Khan Abdul Ghaffar Khan</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2366;&#2344; &#2309;&#2348;&#2381;&#2342;&#2369;&#2354; &#2327;&#2347;&#2381;&#2347;&#2366;&#2352; &#2326;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Sachindra Bakshi</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2330;&#2367;&#2344;&#2381;&#2342;&#2381;&#2352; &#2348;&#2325;&#2381;&#2358;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Khan Abdul Ghaffar Khan, also known as Frontier Gandhi, founded the Khudai Khidmatgars (Servants of God) movement. It was a non-violent resistance movement against British rule, primarily active in Northwest Frontier Province (now in Pakistan).</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>After the _______, Mahatma Gandhi called off the Non-Cooperation Movement.</p></span><span class=\"hqt\" style=\"display:none\"><p>_______ &#2325;&#2375; &#2348;&#2366;&#2342; &#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; &#2344;&#2375; &#2309;&#2360;&#2361;&#2351;&#2379;&#2327; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2357;&#2366;&#2346;&#2360; &#2354;&#2375; &#2354;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Jallianwala Bagh Massacre</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2354;&#2367;&#2351;&#2366;&#2306;&#2357;&#2366;&#2354;&#2366; &#2348;&#2366;&#2327; &#2344;&#2352;&#2360;&#2306;&#2361;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Chauri Chaura incident</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2380;&#2352;&#2368; &#2330;&#2380;&#2352;&#2366; &#2325;&#2366;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Bengal Partition</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2327;&#2366;&#2354; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Round Table conferences</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2354;&#2350;&#2375;&#2332; &#2360;&#2350;&#2381;&#2350;&#2375;&#2354;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>Chauri Chaura incident</b> occurred at Chauri Chaura in the Gorakhpur district of the United Province, (modern Uttar Pradesh) in British India on 4 February 1922, when a large group of protesters, participating in the Non-cooperation movement, clashed with police, who opened fire. In retaliation the demonstrators attacked and set fire to a police station, killing all of its occupants. The incident led to the deaths of three civilians and 23 policemen. Mahatma Gandhi, who was strictly against violence, halted the Non-cooperation Movement on the national level on 12 February 1922, as a direct result of this incident.</p>",
    "question_index": 18
