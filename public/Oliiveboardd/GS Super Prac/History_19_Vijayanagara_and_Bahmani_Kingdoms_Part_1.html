    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following was the last dynasty of the Vijayanagara Empire?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2309;&#2306;&#2340;&#2367;&#2350; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Aravidu dynasty</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2357;&#2367;&#2342;&#2369; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Sangama dynasty</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2327;&#2350;&#2366; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Saluva dynasty</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2354;&#2369;&#2357;&#2366; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Tuluva dynasty</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2369;&#2354;&#2369;&#2357;&#2366; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The Vijayanagara Empire was one of the greatest empires in South India, founded in 1336 by Harihara I and Bukka I.</p><p>&#183; It saw rule under four major dynasties:</p><p>1) Sangama Dynasty (1336 - 1485) &rarr; Founded by Harihara &amp; Bukka.</p><p>2) Saluva Dynasty (1485 - 1505) &rarr; Established after overthrowing Sangama rule.</p><p>3) Tuluva Dynasty (1505 - 1570) &rarr; Krishnadevaraya, the most famous ruler, belonged to this dynasty.</p><p>4) Aravidu Dynasty (1570 - 1646) &rarr; The last ruling dynasty after the empire's decline.</p><p>&#183; After the Battle of Talikota (1565), Vijayanagara suffered a major defeat against the Deccan Sultanates, leading to its fall.</p><p>&#183; The Aravidu dynasty continued ruling parts of the empire but was eventually defeated by the Bijapur Sultanate.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following was granted the title of 'Chief of the Merchants' or Malikut-Tujjar by the Bahamani ruler, Humayun Shah?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2348;&#2361;&#2350;&#2344;&#2368; &#2358;&#2366;&#2360;&#2325; &#2361;&#2369;&#2350;&#2366;&#2351;&#2370;&#2306; &#2358;&#2366;&#2361; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; '&#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326;' &#2351;&#2366; &#2350;&#2354;&#2367;&#2325;&#2369;&#2340;-&#2340;&#2369;&#2332;&#2381;&#2332;&#2352; &#2325;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2342;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ahmad III</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2361;&#2350;&#2342; &#2340;&#2371;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Aladdin Imad Shah</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2366;&#2342;&#2368;&#2344; &#2311;&#2350;&#2366;&#2342; &#2358;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Mahmud Gawan</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2350;&#2370;&#2342; &#2327;&#2357;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Yusuf Adil Shah</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2360;&#2369;&#2347; &#2310;&#2342;&#2367;&#2354; &#2358;&#2366;&#2361;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Mahmud Gawan</b> was a highly influential Persian merchant and statesman who served as the Prime Minister (Wakil-us-Saltanat) in the Bahmani Sultanate. He was granted the title of \"Malik-ut-Tujjar\" (Chief of the Merchants) by the Bahmani Sultan Humayun Shah (reigned 1458-1461) in recognition of his abilities and contributions. He later served with distinction under subsequent Bahmani rulers.</p><p><b>Explanation of Other Options:</b></p><p><b>&#8226; </b>Ahmad III: Ahmad Shah III was a Bahmani Sultan who reigned after Humayun Shah.</p><p><b>&#8226; </b>Aladdin Imad Shah: Founder of the Imad Shahi dynasty of Berar, one of the successor states of the Bahmani Sultanate.</p><p><b>&#8226; </b>Yusuf Adil Shah: Founder of the Adil Shahi dynasty of Bijapur, another successor state of the Bahmani Sultanate.</p><p><b>Further insights:</b></p><p>&#8226; Mahmud Gawan was renowned for his administrative reforms, military successes, and patronage of learning. He established a famous madrasa (college) in Bidar.</p><p>&#8226; Despite his loyal service and capabilities, he fell victim to court intrigues and was executed in 1481 on the orders of Sultan Muhammad Shah III Lashkari, an event that significantly weakened the Bahmani Sultanate.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which Bahmani ruler granted the title of 'Chief of the Merchants' or Malikut-Tujjar to Mahmud Gawan?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2348;&#2361;&#2350;&#2344;&#2368; &#2358;&#2366;&#2360;&#2325; &#2344;&#2375; &#2350;&#2361;&#2350;&#2370;&#2342; &#2327;&#2357;&#2366;&#2305; &#2325;&#2379; '&#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326;' &#2351;&#2366; &#2350;&#2354;&#2367;&#2325;&#2369;&#2340;-&#2340;&#2369;&#2332;&#2381;&#2332;&#2366;&#2352; &#2325;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Humayun Shah</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2369;&#2350;&#2366;&#2351;&#2370;&#2305; &#2358;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Alauddin Hasan Bahman Shah</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2361;&#2360;&#2344; &#2348;&#2361;&#2350;&#2344; &#2358;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Muhammmad Shah</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2361;&#2350;&#2381;&#2350;&#2342; &#2358;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Feroz Shah</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2367;&#2352;&#2379;&#2332;&#2364; &#2358;&#2366;&#2361;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Mahmud Gawan, an Iranian trader, obtained the title of 'Chief of the Merchants' from the Bahamani ruler, <b>Humayun Shah</b>, after arriving in the Deccan region.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>While historians use the term Vijayanagara Empire and contemporaries of this empire described it as the<u> </u>.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2340;&#2367;&#2361;&#2366;&#2360;&#2325;&#2366;&#2352; &#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2358;&#2348;&#2381;&#2342; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2311;&#2360; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2360;&#2350;&#2325;&#2366;&#2354;&#2368;&#2344;&#2379;&#2306; &#2344;&#2375; &#2311;&#2360;&#2375;__________&#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2339;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Gajapati Samarajya</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2332;&#2346;&#2340;&#2367; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Karnataka Samrajyamu</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351;&#2350;&#2369;</span>",
      "<span class=\"eqt\">Andhra Samarajyu</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2343;&#2381;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351;&#2369;</span>",
      "<span class=\"eqt\">Sthalapati Samrajya</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2354;&#2346;&#2340;&#2367; &#2360;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Contemporaries of the Vijayanagara Empire referred to it as <b>\"Karnataka Samrajyamu,\"</b> emphasizing its dominance and influence over the Karnataka region. Despite modern historians using the term \"Vijayanagara Empire,\" the contemporaneous designation highlights the empire's strong association with the Karnataka region during its reign.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Harihara and Bukka established an independent state in Karnataka and established the capital city Vijayanagar on the banks of the river___________ in 1336.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2352;&#2367;&#2361;&#2352; &#2324;&#2352; &#2348;&#2369;&#2325;&#2381;&#2325;&#2366; &#2344;&#2375; &#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325; &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368; &#2324;&#2352; 1336 &#2350;&#2375;&#2306; ______ &#2344;&#2342;&#2368; &#2325;&#2375; &#2340;&#2335; &#2346;&#2352; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2358;&#2361;&#2352; &#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Betwa</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2340;&#2357;&#2366;</span>",
      "<span class=\"eqt\">Tungabhadra</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2369;&#2306;&#2327;&#2349;&#2342;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Mahanadi</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2344;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Tapi</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2346;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The kingdom of Vijayanagar was founded by Harihara and Bukka, two of five brothers (surnamed Sangama) who had served in the administrations of both Kakatiya and Kampili before those kingdoms were conquered by the armies of the Delhi sultanate in the 1320s.</p><p>Vijayanagara was located on the banks of the <b>Tungabhadra</b> river in Karnataka.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Dynasties established the kingdom of Vijayanagara?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358; &#2344;&#2375; &#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sangama Dynasty</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2327;&#2350; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Nagama Dynasty</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2327;&#2350; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Soma Dynasty</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Tuluva Dynasty</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2369;&#2354;&#2369;&#2357; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Vijayanagara Dynasty reigned over India for a period of three centuries. The Vijayanagara kingdom was established in 1336 by Harihara and Bukka of the <b>Sangama dynasty</b>.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Krishnadeva Raya, the most famous ruler of the Vijayanagara Empire, belonged to which dynasty?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2360;&#2348;&#2360;&#2375; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2358;&#2366;&#2360;&#2325; &#2325;&#2371;&#2359;&#2381;&#2339;&#2342;&#2375;&#2357; &#2352;&#2366;&#2351; &#2325;&#2367;&#2360; &#2357;&#2306;&#2358; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Aravidu</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2366;&#2357;&#2367;&#2342;&#2369;</span>",
      "<span class=\"eqt\">Saluva</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2354;&#2369;&#2357;&#2366;</span>",
      "<span class=\"eqt\">Tuluva</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2369;&#2354;&#2369;&#2357;&#2366;</span>",
      "<span class=\"eqt\">Sangama</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2327;&#2350;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Krishnadeva Raya, the celebrated ruler of the Vijayanagara Empire during the 16th century, hailed from the <b>Tuluva</b> dynasty. He is remembered for his significant contributions to literature, arts, and architecture, as well as for his military prowess, which led to the empire's peak of prosperity and power.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Under the Bahmani kingdom, the provinces were administered by ________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2361;&#2350;&#2344;&#2368; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340;, &#2346;&#2381;&#2352;&#2366;&#2306;&#2340;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; ________ &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Amirs</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2368;&#2352;</span>",
      "<span class=\"eqt\">Afaquis</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2347;&#2366;&#2325;&#2381;&#2357;&#2367;&#2360;</span>",
      "<span class=\"eqt\">Khalisa</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2354;&#2368;&#2360;&#2366;</span>",
      "<span class=\"eqt\">Tarafdars</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2352;&#2347;&#2342;&#2366;&#2352;</span>"

    "correct_option_id": 3,
    "solution": "<p>Under the Bahmani Sultanate, the kingdom was divided into provinces known as 'tarafs'. The governors or administrators of these tarafs were called <b>Tarafdars</b>.</p><p><b>Explanation of Other Options:</b></p><p>&#8226;Amirs: Amir is a general term for a commander, noble, or ruler in Islamic contexts. While Tarafdars were nobles or amirs, \"Tarafdar\" was the specific title for provincial governors.</p><p>&#8226;Afaquis: Afaquis (or Pardesis) were foreign-origin nobles (e.g., Persians, Turks, Arabs) in the Bahmani court, often in conflict with the Dakhnis (Deccan-origin nobles). This refers to a faction of nobles, not an administrative post for provinces.</p><p>&#8226;Khalisa: Khalisa land referred to crown lands, i.e., lands whose revenue went directly to the royal treasury. It's a type of land tenure, not an administrator.</p><p><b>Further insights:</b></p><p>&#8226; The Bahmani Sultanate (1347 - 1527) was a major medieval Indian kingdom in the Deccan.</p><p>&#8226; The number of tarafs and the power of the Tarafdars varied over time. Initially, there were four tarafs, but later, under rulers like Mahmud Gawan, the number was increased to eight to reduce the power of individual governors and improve administration.</p><p>&#8226; The Tarafdars were responsible for maintaining law and order, collecting revenue, and providing military contingents to the Sultan.</p>",

    "solution": "<p>The <b>Saluva dynasty</b>, the second dynasty of the Vijayanagara Empire, was founded by <b>Narasimha Deva Raya</b> (also known as <b>Saluva Narasimha</b>) in <b>1485 AD</b>.</p><p>Key Points:</p><p>&#183; <b>Background</b>: The Saluvas were originally <b>military commanders</b> under the Sangama dynasty.</p><p>&#183; <b>Rise to Power</b>: Narasimha Deva Raya seized the throne after the <b>weak rule of Virupaksha Raya II</b> (last Sangama ruler), marking the end of the Sangama dynasty.</p><p>&#183; <b>Significance</b>: His reign began the transition to a more centralized administration, though the dynasty was short-lived (1485 - 1505).</p><p><b>Further insight:</b></p><p>&#183; <b>Rama Deva Raya</b> &rarr; A later ruler from the <b>Tuluva dynasty</b>.</p><p>&#183; <b>Bukka Raya I</b> &rarr; Co-founder of the Vijayanagara Empire (<b>Sangama dynasty</b>).</p><p>&#183; <b>Krishnadeva Raya</b> &rarr; Greatest ruler of the <b>Tuluva dynasty</b> (1509 - 1529).</p>",

    "solution": "<p><b>Krishna Deva Raya</b> (reigned 1509 - 1529), the most illustrious ruler of the Vijayanagara Empire, is known to have taken the title \"Yavana Rajya Sthapanacharya,\" which translates to \"Establisher of the Yavana (foreign/Muslim) kingdom.\" This title likely refers to his military victories over the Bahmani Sultanates and his role in restoring a Bahmani prince to the throne of Bidar, thereby asserting his influence and authority over them.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; Vira Narasimha Raya: Predecessor of Krishna Deva Raya, ruled for a short period.</p><p>&#8226; Achyuta Deva Raya: Successor of Krishna Deva Raya.</p><p>&#8226; Sada Siva Raya: A later ruler of the Vijayanagara Empire, during whose reign the empire suffered a decisive defeat at the Battle of Talikota (1565).</p><p><b>Further insights:</b></p><p>&#8226; Krishna Deva Raya's reign is considered the golden age of the Vijayanagara Empire, marked by military successes, administrative efficiency, and patronage of art, literature, and architecture.</p><p>&#8226; He was a renowned scholar and poet himself, composing works like \"Amuktamalyada\" in Telugu and \"Jambavati Kalyanam\" in Sanskrit.</p><p>&#8226; His victories against the Gajapatis of Odisha and the Sultans of the Deccan consolidated Vijayanagara's power.</p>",
