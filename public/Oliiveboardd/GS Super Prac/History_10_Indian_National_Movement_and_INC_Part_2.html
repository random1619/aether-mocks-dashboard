        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Who wrote the patriotic song 'Sare Jahan Se Achha Hindustan Hamara' that was published in the weekly journal Ittehad on 16 August 1904?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2375;&#2358;&#2349;&#2325;&#2381;&#2340;&#2367; &#2327;&#2368;&#2340; '&#2360;&#2366;&#2352;&#2375; &#2332;&#2361;&#2366;&#2306; &#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2361;&#2367;&#2306;&#2342;&#2379;&#2360;&#2381;&#2340;&#2366;&#2306; &#2361;&#2350;&#2366;&#2352;&#2366;' &#2325;&#2367;&#2360;&#2344;&#2375; &#2354;&#2367;&#2326;&#2366; &#2341;&#2366; &#2332;&#2379; 16 &#2309;&#2327;&#2360;&#2381;&#2340; 1904 &#2325;&#2379; &#2360;&#2366;&#2346;&#2381;&#2340;&#2366;&#2361;&#2367;&#2325; &#2346;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2311;&#2340;&#2381;&#2340;&#2375;&#2361;&#2366;&#2342; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2361;&#2369;&#2310; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Muhammad Iqbal</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2361;&#2350;&#2381;&#2350;&#2342; &#2311;&#2325;&#2348;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Chandrasekhar Azad</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2306;&#2342;&#2381;&#2352;&#2358;&#2375;&#2326;&#2352; &#2310;&#2332;&#2364;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Rabindranath Tagore</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2368;&#2344;&#2381;&#2342;&#2381;&#2352;&#2344;&#2366;&#2341; &#2335;&#2376;&#2327;&#2379;&#2352;</span>",
      "<span class=\"eqt\">Sardar Bhagat Singh</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2342;&#2366;&#2352; &#2349;&#2327;&#2340; &#2360;&#2367;&#2306;&#2361;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The patriotic song \"Sare Jahan Se Achha Hindustan Hamara\" (also known as \"Tarana-e-Hindi\") was written by the poet <b>Muhammad Iqbal</b> (Allama Iqbal). It was first published in the weekly journal <i>Ittehad</i> on August 16, 1904.</p><p><b>Explanation of Other Options:</b></p><p><b>&#8226; </b>Chandrasekhar Azad: A prominent Indian revolutionary and freedom fighter.</p><p><b>&#8226; </b>Rabindranath Tagore: A Nobel laureate, poet, philosopher, and composer who wrote India's national anthem, \"Jana Gana Mana.\"</p><p><b>&#8226; </b>Sardar Bhagat Singh: A charismatic Indian revolutionary and socialist who was a key figure in the Indian independence movement.</p><p><b>Further insights:</b></p><p>&#8226; Muhammad Iqbal (1877 - 1938) was an influential poet, philosopher, and politician in British India.</p><p>&#8226; \"Sare Jahan Se Achha\" quickly gained popularity and became an anthem of opposition to British rule in India.</p><p>&#8226; While Iqbal later became a prominent advocate for the creation of Pakistan, this early poem remains a widely cherished patriotic song in India.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following Indian freedom fighters was fondly called Gandhi Buri (old lady Gandhi) for her dedication towards Gandhian principals?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2360;&#2375;&#2344;&#2366;&#2344;&#2368; &#2325;&#2379; &#2327;&#2366;&#2306;&#2343;&#2368;&#2357;&#2366;&#2342;&#2368; &#2352;&#2367;&#2351;&#2366;&#2360;&#2340;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2360;&#2350;&#2352;&#2381;&#2346;&#2339; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2360;&#2346;&#2381;&#2352;&#2375;&#2350; &#2327;&#2366;&#2306;&#2343;&#2368; &#2348;&#2370;&#2352;&#2368; (old lady Gandhi) &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kamla Chaudhary</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350;&#2354;&#2366; &#2330;&#2380;&#2343;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Dakshayani Velayudhan</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2366;&#2351;&#2344;&#2368; &#2357;&#2375;&#2354;&#2366;&#2351;&#2369;&#2342;&#2381;&#2343;&#2344;</span>",
      "<span class=\"eqt\">Matangini Hazra</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2340;&#2306;&#2327;&#2367;&#2344;&#2368; &#2361;&#2366;&#2332;&#2352;&#2366;</span>",
      "<span class=\"eqt\">leela Roy</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2368;&#2354;&#2366; &#2352;&#2377;&#2351;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Matangini Hazra </b>was an Indian revolutionary who participated in the Indian independence movement until she was shot dead by the British Indian police in front of the Tamluk Police Station on 29 September 1942.</p><p>&bull; She was affectionately known as Gandhi buri, Bengali for old lady Gandhi.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>'Drain of Wealth', a critique of the colonial exploitation, was given by which of the following nationalist leaders?</p></span><span class=\"hqt\" style=\"display:none\">'&#2343;&#2344; &#2325;&#2366; &#2344;&#2367;&#2359;&#2381;&#2325;&#2366;&#2360;&#2344;', &#2324;&#2346;&#2344;&#2367;&#2357;&#2375;&#2358;&#2367;&#2325; &#2358;&#2379;&#2359;&#2339; &#2325;&#2368; &#2310;&#2354;&#2379;&#2330;&#2344;&#2366;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2357;&#2366;&#2342;&#2368; &#2344;&#2375;&#2340;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2368; &#2327;&#2312; &#2341;&#2368;?</span>",
    "options": [
      "<span class=\"eqt\">Dadabhai Naoroji</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2366;&#2342;&#2366;&#2349;&#2366;&#2312; &#2344;&#2380;&#2352;&#2379;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Rajendra Prasad</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2360;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Chakravarti Rajagopalachari</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2325;&#2381;&#2352;&#2357;&#2352;&#2381;&#2340;&#2368; &#2352;&#2366;&#2332;&#2327;&#2379;&#2346;&#2366;&#2354;&#2366;&#2330;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Sardar Vallabhbhai Patel</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2342;&#2366;&#2352; &#2357;&#2354;&#2381;&#2354;&#2349;&#2349;&#2366;&#2312; &#2346;&#2335;&#2375;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Dadabhai Naoroji, also known as the Grand Old Man of India, developed the Drain of Wealth Theory, which explained how Britain drained India's economic resources through:</p><p>I. Unfair trade practices  -  raw materials were exported cheaply, and finished goods were sold at high prices.</p><p>II. Salaries of British officials  -  paid from Indian revenues.</p><p>III. Home Charges  -  remittances sent to Britain.</p><p>His book \"Poverty and Un-British Rule in India\" provided statistical proof of this economic exploitation.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>On 31 October 1940, who among the following was arrested for offering individual Satyagraha to protest against India's forced participation in the Second World War?</p></span><span class=\"hqt\" style=\"display:none\">31 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 1940 &#2325;&#2379;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2357;&#2367;&#2358;&#2381;&#2357; &#2351;&#2369;&#2342;&#2381;&#2343; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2332;&#2348;&#2352;&#2344; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2368; &#2325;&#2375; &#2357;&#2367;&#2352;&#2379;&#2343; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2360;&#2340;&#2381;&#2351;&#2366;&#2327;&#2381;&#2352;&#2361; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2367;&#2352;&#2347;&#2381;&#2340;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Saifuddin Kitchlew</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2376;&#2347;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2325;&#2367;&#2330;&#2354;&#2370;</span>",
      "<span class=\"eqt\">Subhas Chandra Bose</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2349;&#2366;&#2359; &#2330;&#2306;&#2342;&#2381;&#2352; &#2348;&#2379;&#2360;</span>",
      "<span class=\"eqt\">Jawaharlal Nehru</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2357;&#2366;&#2361;&#2352;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</span>",
      "<span class=\"eqt\">Sardar Vallabhbhai Patel</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2342;&#2366;&#2352; &#2357;&#2354;&#2381;&#2354;&#2349;&#2349;&#2366;&#2312; &#2346;&#2335;&#2375;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Individual Satyagraha (1940) was launched by Mahatma Gandhi as a non-violent protest against British policies during World War II.</p><p>&#183; It was different from mass movements like the Quit India Movement (1942) and was limited to select leaders.</p><p>&#183; Vinoba Bhave was the first Satyagrahi, followed by Jawaharlal Nehru as the second Satyagrahi.</p><p>&#183; Nehru was arrested on 31 October 1940 for delivering anti-war speeches and demanding freedom of speech.</p><p>&#183; Other notable leaders arrested during Individual Satyagraha: </p><p>o Brahma Dutt (Third Satyagrahi)</p><p>o Acharya Kripalani</p><p>o J.B. Kripalani</p><p>Thus, the correct answer is Jawaharlal Nehru.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following stated in 1902, India was not ruled for its benefit, but rather for the benefit of its conquerors?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2344;&#2375; 1902 &#2350;&#2375;&#2306; &#2325;&#2361;&#2366; &#2341;&#2366; &#2325;&#2367; &#2349;&#2366;&#2352;&#2340; &#2346;&#2352; &#2358;&#2366;&#2360;&#2344; &#2313;&#2360;&#2325;&#2375; &#2354;&#2366;&#2349; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2361;&#2368;&#2306;, &#2348;&#2354;&#2381;&#2325;&#2367; &#2313;&#2360;&#2325;&#2375; &#2357;&#2367;&#2332;&#2375;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2366;&#2349; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bal Gangadhar Tilak</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2354; &#2327;&#2306;&#2327;&#2366;&#2343;&#2352; &#2340;&#2367;&#2354;&#2325;</span>",
      "<span class=\"eqt\">Lala Lajpat Rai</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2354;&#2366; &#2354;&#2366;&#2332;&#2346;&#2340; &#2352;&#2366;&#2351;</span>",
      "<span class=\"eqt\">Annie Besant</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2368; &#2348;&#2375;&#2360;&#2375;&#2306;&#2335;</span>",
      "<span class=\"eqt\">Sarojini Naidu</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2379;&#2332;&#2367;&#2344;&#2368; &#2344;&#2366;&#2351;&#2337;&#2370;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Annie Besant </b>stated in 1902 that India was not ruled for its benefit, but rather for the benefit of its conquerors. </p><p>She was a prominent British social reformer and political activist who played a significant role in the Indian independence movement. </p><p><b>Explanation of Other Options:</b></p><p>&#8226; Bal Gangadhar Tilak: A prominent assertive nationalist leader, very critical of British rule.</p><p>&#8226; Lala Lajpat Rai: Another key assertive nationalist leader, also a strong critic of British economic exploitation.</p><p>&#8226; Sarojini Naidu: A prominent poet and political activist who became deeply involved in the independence movement, but her most active political phase was slightly later.</p><p><b>Further insights:</b></p><p>&#8226; Annie Besant's work through the Theosophical Society and her later political activism through the Home Rule League aimed to awaken Indian pride and demand self-governance.</p><p>&#8226; Her critique of British rule often focused on its detrimental impact on Indian culture, economy, and self-respect.</p><p>&#8226; If this specific quote is attributed to her in 1902, it would be an early expression of her strong pro-Indian and anti-colonial stance.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is NOT true about C Rajagopalachari?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2368;. &#2352;&#2366;&#2332;&#2327;&#2379;&#2346;&#2366;&#2354;&#2366;&#2330;&#2366;&#2352;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; <b>&#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">He was the &#64257;rst Indian to become the Governor General of India</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352; &#2332;&#2344;&#2352;&#2354; &#2348;&#2344;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2361;&#2354;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2341;&#2375;</span>",
      "<span class=\"eqt\">He was the founder of the Swatantra Party</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2346;&#2366;&#2352;&#2381;&#2335;&#2368; &#2325;&#2375; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325; &#2341;&#2375;</span>",
      "<span class=\"eqt\">He was a senior leader of the Congress</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2375; &#2357;&#2352;&#2367;&#2359;&#2381;&#2336; &#2344;&#2375;&#2340;&#2366; &#2341;&#2375;&#2404;</span>",
      "<span class=\"eqt\">He was the &#64257;rst recipient of the Padma Shree Award</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2346;&#2342;&#2381;&#2350; &#2358;&#2381;&#2352;&#2368; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2325;&#2352;&#2381;&#2340;&#2366; &#2341;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>C. Rajagopalachari was a prominent leader in Indian politics, serving as the first Indian Governor General of India and a senior figure in the Congress party. He later founded the Swatantra Party, advocating for economic liberalism and individual freedom. However, <b>he was not the first recipient of the Padma Shree Award.</b></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Who gave title of \"Father of the Nation\" to Mahatma Gandhi?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2305;&#2343;&#2368; &#2325;&#2379; \"&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2367;&#2340;&#2366;\" &#2325;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2325;&#2367;&#2360;&#2344;&#2375; &#2342;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rabindranath Tagore</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2368;&#2344;&#2381;&#2342;&#2381;&#2352;&#2344;&#2366;&#2341; &#2335;&#2376;&#2327;&#2379;&#2352;</span>",
      "<span class=\"eqt\">Subhas Chandra Bose</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2349;&#2366;&#2359; &#2330;&#2306;&#2342;&#2381;&#2352; &#2348;&#2379;&#2360;</span>",

    "question": "<span class=\"eqt\"><p>In pre-independent India, who was the first person to discuss the concept of poverty line?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2346;&#2370;&#2352;&#2381;&#2357; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2327;&#2352;&#2368;&#2348;&#2368; &#2352;&#2375;&#2326;&#2366; &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2346;&#2352; &#2330;&#2352;&#2381;&#2330;&#2366; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2361;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2380;&#2344; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">M.K Gandhi</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;.&#2325;&#2375;. &#2327;&#2366;&#2305;&#2343;&#2368;</span>",

    "correct_option_id": 3,
    "solution": "<p></p><p><b>Dadabhai Naoroji</b>, an Indian nationalist, social reformer, and early leader in the Indian independence movement, is often credited with discussing and popularizing the concept of a \"poverty line.\"</p><p> </p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>What is the name of the famous British social reformer known for founding the Indian Home Rule League in 1916?</p></span><span class=\"hqt\" style=\"display:none\"><p>1916 &#2350;&#2375;&#2306; &#2311;&#2306;&#2337;&#2367;&#2351;&#2344; &#2361;&#2379;&#2350; &#2352;&#2370;&#2354; &#2354;&#2368;&#2327; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2350;&#2366;&#2332; &#2360;&#2369;&#2343;&#2366;&#2352;&#2325; &#2325;&#2366; &#2344;&#2366;&#2350; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Maria Rye</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2352;&#2367;&#2351;&#2366; &#2352;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Annie Besant</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2368; &#2348;&#2375;&#2360;&#2375;&#2306;&#2335;</span>",
      "<span class=\"eqt\">Catherine Osler</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2341;&#2352;&#2368;&#2344; &#2323;&#2360;&#2381;&#2354;&#2352;</span>",
      "<span class=\"eqt\">Anne Knight</span><span class=\"hqt\" style=\"display:none\">&#2320;&#2344;&#2368; &#2344;&#2366;&#2311;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Annie Besant</b> was a prominent <b>British social reformer, theosophist, and Indian nationalist</b>.</p><p>&bull; In <b>1916</b>, she <b>founded the Indian Home Rule League</b>, advocating for <b>self-governance (Home Rule)</b> for India within the British Empire.</p><p>&bull; She worked closely with Indian leaders and played a key role in <b>mobilizing public opinion</b> for the cause of Indian autonomy.</p><p>&bull; She also became the <b>first woman President of the Indian National Congress</b> in <b>1917</b>.</p><p><b>Other Options Explained:</b></p><p>&bull; <b>Maria Rye</b>: British social reformer known for her work with <b>orphaned children</b> and emigration schemes to Canada, <b>not connected to Indian politics</b>.</p><p>&bull; <b>Catherine Osler</b>: A British <b>suffragist</b> and women's rights activist, focused on <b>British women's suffrage</b>, <b>not Indian independence</b>.</p><p>&bull; <b>Anne Knight</b>: An early British <b>feminist and anti-slavery campaigner</b>, predating Annie Besant, not involved in <b>Indian nationalist movements</b>.</p><p><b>Further Insight:</b></p><p>&bull; The <b>Indian Home Rule League</b> movement was inspired by the <b>Irish Home Rule movement</b>.</p><p>&bull; Along with Annie Besant, <b>Bal Gangadhar Tilak</b> also led a parallel Home Rule League in western India.</p><p>&bull; The movement laid the groundwork for more assertive nationalist activities that followed, including the <b>Non-Cooperation Movement</b> led by Gandhi.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following gave the famous 'Do or Die' slogan during Quit India Movement?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2331;&#2379;&#2337;&#2364;&#2379; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; '&#2325;&#2352;&#2379; &#2351;&#2366; &#2350;&#2352;&#2379;' &#2325;&#2366; &#2344;&#2366;&#2352;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2342;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Abul Kalam Azad</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2348;&#2369;&#2354; &#2325;&#2354;&#2366;&#2350; &#2310;&#2332;&#2364;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Jawaharlal Nehru</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2357;&#2366;&#2361;&#2352; &#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</span>",
      "<span class=\"eqt\">Subhash Chandra Bose</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2349;&#2366;&#2359; &#2330;&#2306;&#2342;&#2381;&#2352; &#2348;&#2379;&#2360;</span>",
      "<span class=\"eqt\">Mahatma Gandhi</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Top of Form</p><p>During the Quit India Movement in 1942, <b>Mahatma Gandhi</b> gave the iconic 'Do or Die' slogan, urging the Indian people to adopt a decisive and unwavering stance against British colonial rule. The slogan became a rallying cry for the intensification of the independence struggle.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Sardar Vallabhbhai Patel, who was the first Home Minister of India, is known by which sobriquet?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2352;&#2342;&#2366;&#2352; &#2357;&#2354;&#2381;&#2354;&#2349;&#2349;&#2366;&#2312; &#2346;&#2335;&#2375;&#2354;, &#2332;&#2379; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2327;&#2371;&#2361; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2341;&#2375;, &#2325;&#2367;&#2360; &#2313;&#2346;&#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Grand old man of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2361;&#2366;&#2344; &#2348;&#2369;&#2332;&#2369;&#2352;&#2381;&#2327;</span>",
      "<span class=\"eqt\">Iron man of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2354;&#2380;&#2361; &#2346;&#2369;&#2352;&#2369;&#2359;</span>",
      "<span class=\"eqt\">Morning star of Indian Renaissance</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2369;&#2344;&#2352;&#2381;&#2332;&#2366;&#2327;&#2352;&#2339; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2340;&#2307;&#2325;&#2366;&#2354;&#2368;&#2344; &#2340;&#2366;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Father of Indian Unrest</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2309;&#2358;&#2366;&#2306;&#2340;&#2367; &#2325;&#2375; &#2332;&#2344;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Sardar Vallabhbhai Patel is called the \"Iron Man of India\" due to his role in unifying the princely states into the Indian Union.</p><p>&#183; He was instrumental in integrating over 560 princely states after independence.</p><p>&#183; The title symbolizes his strength, determination, and firm leadership.</p><p><b>Further insights:</b></p><p><b>Grand Old Man of India  -  Dadabhai Naoroji</b></p><p>&#183; He was one of the earliest Indian political leaders and a strong advocate for Indian self-rule.</p><p>&#183; First Indian to be elected to the British Parliament.</p><p>&#183; Known for his work on the <b>Drain Theory</b>, highlighting how British policies were economically exploiting India.</p><p><b>Raja Ram Mohan Roy</b></p><p>&#183; A social and educational reformer, often considered the <b>father of the Indian Renaissance</b>.</p><p>&#183; Advocated for the abolition of <b>sati</b>, child marriage, and promoted <b>women's education</b> and <b>modern education</b>.</p><p>&#183; Founded the <b>Brahmo Samaj</b> in 1828.</p><p><b>Father of Indian Unrest  -  Bal Gangadhar Tilak</b></p><p>&#183; A prominent freedom fighter and nationalist leader.</p><p>&#183; Known for his assertive style of leadership and the slogan: <b>\"Swaraj is my birthright and I shall have it.\"</b></p><p>&#183; The British colonial authorities gave him this title due to his powerful and fiery speeches that stirred political awakening.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Lal Bahadur Shastri was born on _________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2366;&#2354; &#2348;&#2361;&#2366;&#2342;&#2369;&#2352; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368; &#2325;&#2366; &#2332;&#2344;&#2381;&#2350; _________ &#2325;&#2379; &#2361;&#2369;&#2310; &#2341;&#2366;&#2404;</p></span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>Lal Bahadur Shastri, born on <b>2 October 1904,</b> was a prominent Indian politician and statesman. He served as the second Prime Minister of India from 1964 to 1966, succeeding Jawaharlal Nehru. Shastri is remembered for his leadership during the Indo-Pakistani War of 1965 and for popularizing the slogan \"Jai Jawan Jai Kisan\" (Hail the Soldier, Hail the Farmer) to boost morale and emphasize the importance of both the military and agriculture in nation-building.</p>",

  },
  {
    "question": "<span class=\"eqt\"><p>Being the President of the Indian National Congress, who among the following had called for complete independence from the British Raj in 1929?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2344;&#2366;&#2340;&#2375;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2344;&#2375; 1929 &#2350;&#2375;&#2306; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2352;&#2366;&#2332; &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2325;&#2366; &#2310;&#2361;&#2381;&#2357;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Jawaharlal Nehru</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2357;&#2366;&#2361;&#2352;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</span>",
      "<span class=\"eqt\">Subhas Chandra Bose</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2349;&#2366;&#2359; &#2330;&#2306;&#2342;&#2381;&#2352; &#2348;&#2379;&#2360;</span>",
      "<span class=\"eqt\">Sardar Vallabhbhai Patel</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2342;&#2366;&#2352; &#2357;&#2354;&#2381;&#2354;&#2349;&#2349;&#2366;&#2312; &#2346;&#2335;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Mahatma Gandhi</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>At the Lahore Session of the Indian National Congress in 1929, Jawaharlal Nehru, as the President, passed the resolution for Purna Swaraj (Complete Independence) and declared 26th January 1930 as Independence Day.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following was one of the leaders who was instrumental in convincing Mahatma Gandhi about the need to start a non-cooperation movement in support of The Khilafat?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2313;&#2344; &#2344;&#2375;&#2340;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2341;&#2375; &#2332;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347;&#2340; &#2325;&#2375; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2350;&#2375;&#2306; &#2319;&#2325; &#2309;&#2360;&#2361;&#2351;&#2379;&#2327; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; &#2325;&#2379; &#2360;&#2350;&#2333;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2344;&#2367;&#2349;&#2366;&#2312; &#2341;&#2368;?</p></span>",
    "options": [

      "<span class=\"eqt\">Maulana Abul Kalam Azad</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2354;&#2366;&#2344;&#2366; &#2309;&#2348;&#2369;&#2354; &#2325;&#2354;&#2366;&#2350; &#2310;&#2332;&#2364;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Abdul Ghaffar Khan</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2348;&#2381;&#2342;&#2369;&#2354; &#2327;&#2347;&#2381;&#2347;&#2366;&#2352; &#2326;&#2366;&#2344;</span>",

    ],
    "correct_option_id": 3,
    "solution": "<p><b>Shaukat Ali </b>was one of the leaders who was instrumental in convincing Mahatma Gandhi about the need to start a non-cooperation movement in support of The Khilafat.</p><p>Khilafat movemen was a pan-Islamic force in India that arose in 1919 in an effort to salvage the Ottoman caliph as a symbol of unity among the Muslim community in India during the British raj. The movement was initially bolstered by Gandhi's noncooperation movement but fell apart after the abolition of the caliphate in 1924.</p><p>The combined Khilafat Non-Cooperation movement was the first all-India agitation against British rule.</p>",
    "question_index": 13
  },

    "solution": "<p>Veer Surendra Sai (23 January 1809  -  28 February 1884) was a native Indian as well as a regional freedom fighter from the Bengal Presidency, now <b>Odisha</b>. He fought against British rule in India after they dethroned the king and queen of Sambalpur State as he was the legal heir.</p>",

    "solution": "<p>&#183; <b>Faraizi Movement:</b> This socio-religious reform movement in Eastern Bengal in the early 19th century was founded by <b>IV. Haji Shariatullah</b>.</p><p>&#183; <b>Mohammedan Literary Society:</b> Founded in Calcutta in 1863 to promote modern education and discuss political, social, and religious issues among Muslims, its founder was <b>III. Nawab Abdul Latif</b>.</p><p>&#183; <b>Indian Patriotic Association:</b> This was founded by <b>II. Sir Syed Ahmad Khan</b> in 1888, along with Raja Shiv Prasad of Benaras, to counter the propaganda of the Indian National Congress and promote loyalty to the British.</p><p>&#183; <b>Wahabi Movement (also known as Tariqah-i-Muhammadiyah in India):</b> This revivalist Islamic movement in India in the 19th century was significantly led and popularized by <b>I. Sayyid Ahmad of Rae Bareli</b> (also known as Syed Ahmed Barelvi).</p><p><b>Further insights:</b></p><p></b>&#8226; <b>Faraizi Movement:</b> Focused on adherence to the obligatory duties (faraiz) of Islam and opposed un-Islamic customs. It also had an agrarian character, fighting for the rights of peasants.</p><p>&#8226; <b>Mohammedan Literary Society:</b> Played a crucial role in the intellectual awakening of Muslims in Bengal by encouraging Western education alongside religious learning.</p><p>&#8226; <b>Indian Patriotic Association:</b> Formed to oppose the Indian National Congress and demonstrate Muslim loyalty to British rule, reflecting Sir Syed Ahmad Khan's political stance at the time.</p><p>&#8226; <b>Wahabi Movement:</b> Aimed to purify Islam and return to its original principles. It had both religious and political dimensions, including armed struggle against the Sikhs and later the British.</p>",
