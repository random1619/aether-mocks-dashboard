    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following was NOT a factor contributing to the rise of Extremism in the Indian National Congress?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2350;&#2375;&#2306; &#2313;&#2327;&#2381;&#2352;&#2357;&#2366;&#2342; &#2325;&#2375; &#2313;&#2342;&#2351; &#2350;&#2375;&#2306; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2342;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2325;&#2366;&#2352;&#2325; &#2344;&#2361;&#2368;&#2306; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">The failure of the Moderates' methods</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2342;&#2366;&#2352;&#2357;&#2366;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2340;&#2352;&#2368;&#2325;&#2379;&#2306; &#2325;&#2368; &#2357;&#2367;&#2347;&#2354;&#2340;&#2366;</span>",
      "<span class=\"eqt\">The impact of social reform movements</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;</span>",
      "<span class=\"eqt\">The establishment of the Indian National Congress in 1885</span><span class=\"hqt\" style=\"display:none\">1885 &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;</span>",
      "<span class=\"eqt\">The imperialist policies of Lord Curzon</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2352;&#2381;&#2332;&#2344; &#2325;&#2368; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351;&#2357;&#2366;&#2342;&#2368; &#2344;&#2368;&#2340;&#2367;&#2351;&#2366;&#2305;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The INC was formed in 1885 as a platform for political discussion but did not immediately lead to extremism.</p><p>&bull; The Extremists emerged due to dissatisfaction with the Moderates' policies, influence of social reformers, and British repression.</p><p>&bull; Lord Curzon's policies like the Partition of Bengal fueled extremist sentiments.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>What was the main ideological difference between the Moderates and the Extremists?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2342;&#2366;&#2352;&#2357;&#2366;&#2342;&#2368; &#2324;&#2352; &#2327;&#2352;&#2350;&#2346;&#2306;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2369;&#2326;&#2381;&#2351; &#2357;&#2376;&#2330;&#2366;&#2352;&#2367;&#2325; &#2309;&#2306;&#2340;&#2352; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Moderates relied on petitions, while Extremists advocated active resistance</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2342;&#2366;&#2352;&#2357;&#2366;&#2342;&#2368; &#2351;&#2366;&#2330;&#2367;&#2325;&#2366;&#2323;&#2306; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2341;&#2375;, &#2332;&#2348;&#2325;&#2367; &#2313;&#2327;&#2381;&#2352;&#2357;&#2366;&#2342;&#2368; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2325;&#2368; &#2357;&#2325;&#2366;&#2354;&#2340; &#2325;&#2352;&#2340;&#2375; &#2341;&#2375;</span>",
      "<span class=\"eqt\">Moderates opposed British rule, while Extremists supported it</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2342;&#2366;&#2352;&#2357;&#2366;&#2342;&#2367;&#2351;&#2379;&#2306; &#2344;&#2375; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2358;&#2366;&#2360;&#2344; &#2325;&#2366; &#2357;&#2367;&#2352;&#2379;&#2343; &#2325;&#2367;&#2351;&#2366;, &#2332;&#2348;&#2325;&#2367; &#2327;&#2352;&#2350;&#2346;&#2306;&#2341;&#2367;&#2351;&#2379;&#2306; &#2344;&#2375; &#2311;&#2360;&#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Moderates encouraged violence, while Extremists followed a peaceful approach</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2342;&#2366;&#2352;&#2357;&#2366;&#2342;&#2367;&#2351;&#2379;&#2306; &#2344;&#2375; &#2361;&#2367;&#2306;&#2360;&#2366; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2367;&#2351;&#2366;, &#2332;&#2348;&#2325;&#2367; &#2330;&#2352;&#2350;&#2346;&#2306;&#2341;&#2367;&#2351;&#2379;&#2306; &#2344;&#2375; &#2358;&#2366;&#2306;&#2340;&#2367;&#2346;&#2370;&#2352;&#2381;&#2339; &#2342;&#2371;&#2359;&#2381;&#2335;&#2367;&#2325;&#2379;&#2339; &#2309;&#2346;&#2344;&#2366;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Extremists wanted dominion status, while Moderates sought complete independence</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2352;&#2350;&#2346;&#2306;&#2341;&#2368; &#2346;&#2381;&#2352;&#2349;&#2369;&#2340;&#2381;&#2357; &#2325;&#2366; &#2342;&#2352;&#2381;&#2332;&#2366; &#2330;&#2366;&#2361;&#2340;&#2375; &#2341;&#2375;, &#2332;&#2348;&#2325;&#2367; &#2313;&#2342;&#2366;&#2352;&#2357;&#2366;&#2342;&#2368; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2330;&#2366;&#2361;&#2340;&#2375; &#2341;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The Moderates believed in constitutional methods like petitions, prayer and discussions.</p><p>&bull; The Extremists, led by leaders like Tilak, Pal, and Lajpat Rai, believed in self-reliance, boycotts, and direct action.</p><p>&bull; Both sought Swaraj, but Extremists wanted immediate self-rule, while Moderates aimed for gradual reforms.</p><p>&bull; Features of the Extremist Faction:</p><p>&#9675; Rejected constitutional methods and emphasized aggressive resistance.</p><p>&#9675; Advocated Swadeshi, Boycott, and National Education.</p><p>&#9675; Opposed British partition of Bengal (1905).</p><p>&#9675; Criticized the Moderates for their petition-based politics.</p><p>&#9675; Influenced by radical nationalism and self-rule (Swaraj) demand.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The immediate cause of the split between Moderates and Extremists in the INC was:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2350;&#2375;&#2306; &#2313;&#2342;&#2366;&#2352;&#2357;&#2366;&#2342;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2313;&#2327;&#2381;&#2352;&#2357;&#2366;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2325;&#2366; &#2340;&#2366;&#2340;&#2381;&#2325;&#2366;&#2354;&#2367;&#2325; &#2325;&#2366;&#2352;&#2339; &#2341;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Differences over the approach towards social reform</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2342;&#2371;&#2359;&#2381;&#2335;&#2367;&#2325;&#2379;&#2339; &#2346;&#2352; &#2350;&#2340;&#2349;&#2375;&#2342;</span>",
      "<span class=\"eqt\">The method of resistance against the Partition of Bengal</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2327;&#2366;&#2354; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2325;&#2375; &#2357;&#2367;&#2352;&#2369;&#2342;&#2381;&#2343; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2325;&#2366; &#2340;&#2352;&#2368;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Personal rivalry between Tilak and Gokhale</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2367;&#2354;&#2325; &#2324;&#2352; &#2327;&#2379;&#2326;&#2354;&#2375; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367;&#2342;&#2381;&#2357;&#2306;&#2342;&#2381;&#2357;&#2367;&#2340;&#2366;</span>",
      "<span class=\"eqt\">The issue of Swaraj as the ultimate goal of INC</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2352;&#2366;&#2332; &#2325;&#2366; &#2350;&#2369;&#2342;&#2381;&#2342;&#2366; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2366; &#2309;&#2306;&#2340;&#2367;&#2350; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The split occurred at the Surat Session (1907) due to differing approaches in method of resistance against the Partition of Bengal.</p><p>&bull; Moderates favored petitions, while Extremists wanted agitation and boycott movements.</p><p>&bull; Though ideological differences existed before, the Partition of Bengal intensified the conflict.</p><p>&bull; Surat Split (1907)</p><p>&#9675; It marked the <b>division between Moderates and Extremists</b> due to ideological differences.</p><p>&#9675; <b>Moderates (led by Gopal Krishna Gokhale)</b> preferred <b>gradual reforms</b> and working with the British.</p><p>&#9675; <b>Extremists (led by Bal Gangadhar Tilak, Lala Lajpat Rai, and Bipin Chandra Pal)</b> demanded <b>Swaraj and direct action</b>.</p><p>&#9675; The split happened over the selection of the <b>INC President</b>  -  Moderates supported <b>Rash Behari Ghosh</b>, while Extremists wanted <b>Tilak</b>.</p><p>&#9675; The session turned violent, and <b>Tilak's supporters were forcefully expelled</b>.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following leaders did NOT belong to the Extremist faction?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2375;&#2340;&#2366; &#2330;&#2352;&#2350;&#2346;&#2306;&#2341;&#2368; &#2327;&#2369;&#2335; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bal Gangadhar Tilak</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2354; &#2327;&#2306;&#2327;&#2366;&#2343;&#2352; &#2340;&#2367;&#2354;&#2325;</span>",
      "<span class=\"eqt\">Gopal Krishna Gokhale</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2346;&#2366;&#2354; &#2325;&#2371;&#2359;&#2381;&#2339; &#2327;&#2379;&#2326;&#2354;&#2375;</span>",
      "<span class=\"eqt\">Bipin Chandra Pal</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2346;&#2367;&#2344; &#2330;&#2306;&#2342;&#2381;&#2352; &#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Lala Lajpat Rai</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2354;&#2366; &#2354;&#2366;&#2332;&#2346;&#2340; &#2352;&#2366;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Gokhale was a Moderate and believed in constitutional methods.</p><p>&bull; The trio Lala Lajpat Rai, Bal Gangadhar Tilak, and Bipin Chandra Pal, popularly known as Lal-Bal-Pal were the prominent leaders of the Extremist movement</p><p>&bull; Lala Lajpat Rai also known as Punjab Kesari known for his fiery speeches and protests and he played a key role in the Swadeshi Movement and against Simon Commission</p><p>&bull; Bal Gangadhar Tilak also known as the Father of Indian Unrest played key role in the Swadeshi Movement and Home Rule League Movement </p><p>&bull; Bipin Chandra Pal also known as the Father of Revolutionary Thoughts was leader from Bengal and a strong advocate of Swadeshi and National Movement.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT associated with Bal Gangadhar Tilak?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2348;&#2366;&#2354; &#2327;&#2306;&#2327;&#2366;&#2343;&#2352; &#2340;&#2367;&#2354;&#2325; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">\"Swaraj is my birthright, and I will have it.\"</span><span class=\"hqt\" style=\"display:none\">\"&#2360;&#2381;&#2357;&#2352;&#2366;&#2332; &#2350;&#2375;&#2352;&#2366; &#2332;&#2344;&#2381;&#2350;&#2360;&#2367;&#2342;&#2381;&#2343; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2361;&#2376; &#2324;&#2352; &#2350;&#2376;&#2306; &#2311;&#2360;&#2375; &#2354;&#2375;&#2325;&#2352; &#2352;&#2361;&#2370;&#2305;&#2327;&#2366;&#2404;\"</span>",
      "<span class=\"eqt\">Ganpati festival and Shivaji festival</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2339;&#2346;&#2340;&#2367; &#2313;&#2340;&#2381;&#2360;&#2357; &#2324;&#2352; &#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2313;&#2340;&#2381;&#2360;&#2357;</span>",
      "<span class=\"eqt\">Home Rule League</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2379;&#2350; &#2352;&#2370;&#2354; &#2354;&#2368;&#2327;</span>",
      "<span class=\"eqt\">Formation of the Indian National Congress</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2366; &#2327;&#2336;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Tilak popularized the Ganpati festival and Shivaji festival to promote nationalism.</p><p>&bull; He played a key role in the Home Rule League movement.</p><p>&bull; The INC was founded in 1885, before Tilak rose to prominence.</p><p>&bull; <b>Bal Gangadhar Tilak (\"Father of Indian Unrest\")</b></p><p>&#9675; First leader to demand <b>Swaraj (\"Self-rule is my birthright\")</b>.</p><p>&#9675; Popularized <b>Ganesh Utsav and Shivaji Jayanti</b> for nationalist mobilization.</p><p>&#9675; Founded newspapers <b>Kesari (Marathi) and Mahratta (English)</b>.</p><p>&#9675; Led the <b>Home Rule League Movement (1916)</b>.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following gave the slogan \"Go back, Simon\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2344;&#2375; \"&#2360;&#2366;&#2311;&#2350;&#2344; &#2357;&#2366;&#2346;&#2360; &#2332;&#2366;&#2323;\" &#2325;&#2366; &#2344;&#2366;&#2352;&#2366; &#2342;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bal Gangadhar Tilak</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2354; &#2327;&#2306;&#2327;&#2366;&#2343;&#2352; &#2340;&#2367;&#2354;&#2325;</span>",
      "<span class=\"eqt\">Lala Lajpat Rai</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2354;&#2366; &#2354;&#2366;&#2332;&#2346;&#2340; &#2352;&#2366;&#2351;</span>",
      "<span class=\"eqt\">Subhas Chandra Bose</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2349;&#2366;&#2359; &#2330;&#2306;&#2342;&#2381;&#2352; &#2348;&#2379;&#2360;</span>",
      "<span class=\"eqt\">Mahatma Gandhi</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Lala Lajpat Rai led protests against the Simon Commission in 1928.</p><p>&bull; He was injured during the protest and later succumbed to his injuries.</p><p>&bull; Lala Lajpat Rai (\"Punjab Kesari\")</p><p>&#9675; Leader from Punjab, known for his fiery speeches and protests.</p><p>&#9675; Played a key role in the Swadeshi Movement.</p><p>&#9675; Protested against the Simon Commission (1928) and died due to police brutality..</p>",
    "question_index": 5
  },
  {

  {
    "question": "<span class=\"eqt\"><p>Which international event inspired Indian Extremists in their struggle against British rule?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2328;&#2335;&#2344;&#2366; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2313;&#2327;&#2381;&#2352;&#2357;&#2366;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2357;&#2367;&#2352;&#2369;&#2342;&#2381;&#2343; &#2360;&#2306;&#2328;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;?</p></span>",

  {
    "question": "<span class=\"eqt\"><p>What was the main objective of the Swadeshi Movement?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;?</p></span>",

      "<span class=\"eqt\">To create a separate electorate for Indians</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2371;&#2341;&#2325; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2344; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2348;&#2344;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To oppose the Rowlatt Act</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2380;&#2354;&#2335; &#2319;&#2325;&#2381;&#2335; &#2325;&#2366; &#2357;&#2367;&#2352;&#2379;&#2343; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The Swadeshi Movement aimed to reduce dependence on British goods.</p><p>&bull; It was a response to the Partition of Bengal and promoted economic self-reliance.</p><p>&bull; Swadeshi Movement (1905-1911) </p><p>&#9675; Launched in <b>1905</b> as a response to <b>Lord Curzon's partition of Bengal</b>.</p><p>&#9675; Swadeshi\" means <b>'of one's own country'</b>, promoting <b>self-reliance and indigenous goods</b>.</p><p>&#9675; Prominent leaders included <b>Bal Gangadhar Tilak, Lala Lajpat Rai, Bipin Chandra Pal, Aurobindo Ghosh, and Rabindranath Tagore</b>.</p><p>&#9675; Focused on <b>boycotting British goods</b> like textiles and promoting <b>Indian-made products</b>.</p>",

  },
  {
    "question": "<span class=\"eqt\"><p>Which event marked the formal split between the Moderates and Extremists in the Indian National Congress?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2328;&#2335;&#2344;&#2366; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2350;&#2375;&#2306; &#2344;&#2352;&#2350;&#2346;&#2306;&#2341;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2327;&#2352;&#2350;&#2346;&#2306;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2324;&#2346;&#2330;&#2366;&#2352;&#2367;&#2325; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2325;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;?</p></span>",

    "solution": "<p>&bull; The Surat Session of 1907 led to a formal split between the Moderates and Extremists due to ideological differences. </p><p>&bull; The Swadeshi Movement was a reaction to Bengal's partition. </p><p>&bull; Partition of Bengal catalyzed extremism but did not cause the division. </p><p>&bull; The Home Rule League was formed in 1916 to demand self-governance.</p>",

  {

    "correct_option_id": 1,
    "solution": "<p>&bull; Tilak used Ganapati and Shivaji festivals to unite people and promote nationalist sentiments.</p><p>&bull; Lala Lajpat Rai, Bipin Chandra Pal, and Aurobindo Ghosh were prominent Extremists leaders.</p><p>&bull; <b>Bal Gangadhar Tilak (\"Father of Indian Unrest\")</b></p><p>&#9675; First leader to demand <b>Swaraj (\"Self-rule is my birthright\")</b>.</p><p>&#9675; Popularized <b>Ganesh Utsav and Shivaji Jayanti</b> for nationalist mobilization.</p><p>&#9675; Founded newspapers <b>Kesari (Marathi) and Mahratta (English)</b>.</p><p>&#9675; Led the <b>Home Rule League Movement (1916)</b>.</p>",

    "solution": "<p>&bull; Aurobindo Ghosh wrote 'New Lamps for Old' in 'Indu Prakash' (1893-94) to criticize Moderate policies. </p><p>&bull; Aurobindo Ghosh</p><p>&#9675; A key extremist leader advocating <b>Swaraj, Swadeshi, and passive resistance</b>.</p><p>&#9675; Arrested for <b>Alipore Bomb Case (1908)</b> but later acquitted</p><p>&#9675; Edited <b>Bande Mataram</b> and <b>Karmayogin</b> for spreading nationalist ideas.</p><p>&#9675; Moved to Pondicherry and founded Aurobindo Ashram, promoting Integral Yoga.</p><p>&#9675; Wrote <b>\"The Life Divine\"</b> and <b>\"Savitri\"</b>, blending nationalism with spirituality.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Partition of Bengal (1905). Which of the statements given above are correct?</p><p>a) The decision to partition Bengal was taken by Lord Curzon.</p><p>b) The partition was primarily aimed at dividing the Hindu and Muslim communities.</p><p>c) The Swadeshi Movement emerged as a direct response to the Partition of Bengal.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2306;&#2327;&#2366;&#2354; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; (1905) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404; &#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>a) &#2348;&#2306;&#2327;&#2366;&#2354; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2352;&#2381;&#2332;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>b) &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2361;&#2367;&#2306;&#2342;&#2370; &#2324;&#2352; &#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351;&#2379;&#2306; &#2325;&#2379; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2341;&#2366;&#2404;</p><p>c) &#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2348;&#2306;&#2327;&#2366;&#2354; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2313;&#2349;&#2352;&#2366;&#2404;</p></span>",
    "options": [
