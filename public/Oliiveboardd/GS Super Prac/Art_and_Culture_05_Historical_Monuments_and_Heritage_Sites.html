<body>
    <!-- Welcome Screen -->

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">

                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>

    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In which year was the foundation stone for the Gateway of India laid in Bombay (now Mumbai)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2377;&#2350;&#2381;&#2348;&#2375; (&#2309;&#2348; &#2350;&#2369;&#2306;&#2348;&#2312;) &#2350;&#2375;&#2306; &#2327;&#2375;&#2335;&#2357;&#2375; &#2321;&#2347; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2368; &#2310;&#2343;&#2366;&#2352;&#2358;&#2367;&#2354;&#2366; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2352;&#2326;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">1920</span><span class=\"hqt\" style=\"display:none\">1920</span>",
      "<span class=\"eqt\">1915</span><span class=\"hqt\" style=\"display:none\">1915</span>",
      "<span class=\"eqt\">1911</span><span class=\"hqt\" style=\"display:none\">1911</span>",
      "<span class=\"eqt\">1905</span><span class=\"hqt\" style=\"display:none\">1905</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Gateway of India is an arch monument built during the 20th century in Bombay, India. The monument was erected to commemorate the landing of King George V and Queen Mary at Apollo Bunder on their visit to India in 1911.</p><p>Built in Indo-Saracenic style, the foundation stone for the Gateway of India was laid on <u>31 March 1911</u>. The structure is an arch made of basalt, 26 metres (85 feet) high. The final design of George Wittet was sanctioned in 1914 and the construction of the monument was completed in 1924. The Gateway was later used as a symbolic ceremonial entrance to India for Viceroys and the new Governors of Bombay. It served to allow entry and access to India.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The Howrah bridge was officially opened in the year _______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2366;&#2357;&#2337;&#2364;&#2366; &#2348;&#2381;&#2352;&#2367;&#2332; &#2310;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2325; &#2340;&#2380;&#2352; &#2346;&#2352; &#2357;&#2352;&#2381;&#2359; _______ &#2350;&#2375;&#2306; &#2326;&#2379;&#2354;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1943</span><span class=\"hqt\" style=\"display:none\">1943</span>",
      "<span class=\"eqt\">1948</span><span class=\"hqt\" style=\"display:none\">1948</span>",
      "<span class=\"eqt\">1930</span><span class=\"hqt\" style=\"display:none\">1930</span>",
      "<span class=\"eqt\">1935</span><span class=\"hqt\" style=\"display:none\">1935</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The <b>Howrah Bridge</b>, also known as the <b>Rabindra Setu</b>, was officially opened to the public in <b>1943</b>.</p><p>&bull; It is located in <b>Kolkata (formerly Calcutta)</b>, India, and connects the city to the Howrah district.</p><p>&bull; The bridge is a <b>suspension bridge</b> and is one of the busiest in the world, serving as a critical transportation link.</p><p><b>Details:</b></p><p>&bull; Construction began in <b>1936</b>, and after seven years of building, it was officially inaugurated in <b>1943</b>.</p><p>&bull; It was built without any nuts and bolts, using riveting instead.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In which of the following states is the Sanchi Stupa UNESCO World Heritage Site located?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2360;&#2366;&#2306;&#2330;&#2368; &#2360;&#2381;&#2340;&#2370;&#2346; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2357;&#2367;&#2358;&#2381;&#2357; &#2343;&#2352;&#2379;&#2361;&#2352; &#2360;&#2381;&#2341;&#2354; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Punjab</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2332;&#2366;&#2348;</span>",
      "<span class=\"eqt\">Bihar</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2361;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Rajasthan</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Madhya Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The <b>Sanchi Stupa</b> is a famous <b>Buddhist monument</b> and a <b>UNESCO World Heritage Site</b>, located in the <b>Raisen district of Madhya Pradesh</b>, near Bhopal.</p><p>&#183; It was originally commissioned by <b>Emperor Ashoka</b> in the 3rd century BCE.</p><p>&#183; It is one of the oldest stone structures in India and a key symbol of India's Buddhist heritage.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Rani -Ki- Vav (the Queen'S stepwell) is situated on the banks of which river?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2344;&#2368;-&#2325;&#2368;-&#2357;&#2366;&#2357; (&#2352;&#2366;&#2344;&#2368; &#2325;&#2368; &#2348;&#2366;&#2357;&#2337;&#2364;&#2368;) &#2325;&#2367;&#2360; &#2344;&#2342;&#2368; &#2325;&#2375; &#2340;&#2335; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ganga</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Yamuna</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2350;&#2369;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Krishna</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2381;&#2339;&#2366;</span>",
      "<span class=\"eqt\">Saraswati</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2360;&#2381;&#2357;&#2340;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Rani Ki Vav is a historical site that is situated on the banks of the river <b>Saraswati</b>.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The Bidar Fort of Karnataka is irregularly ______ in shape.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325; &#2325;&#2366; &#2348;&#2368;&#2342;&#2352; &#2325;&#2367;&#2354;&#2366; &#2309;&#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; ______ &#2310;&#2325;&#2366;&#2352; &#2325;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rhomboid</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2367;&#2352;&#2381;&#2351;&#2327;&#2381;&#2357;&#2352;&#2381;&#2327;</span>",
      "<span class=\"eqt\">Circular</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2367;&#2346;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Rectangular</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Square</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2327;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Bidar Fort</b>, built in the 15th century by the Bahmani Sultanate, has an <b>irregular rhomboid shape</b>, adapting to the natural terrain of the Deccan plateau. Its layout includes seven gates and 37 bastions.</p><p><b>Further Insight:</b></p><p>The fort is a fine example of Persian-influenced architecture and houses structures like the Rangin Mahal and Gagan Mahal.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The Mysore palace was the residence of the _____.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2376;&#2360;&#2370;&#2352; &#2350;&#2361;&#2354; _____ &#2325;&#2366; &#2344;&#2367;&#2357;&#2366;&#2360; &#2360;&#2381;&#2341;&#2366;&#2344; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Chandelas</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2306;&#2342;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Palas</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Bundelas</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2306;&#2342;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Wadiyar</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2337;&#2367;&#2351;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Mysore Palace, also known as Amba Vilas Palace, is a historical palace and a royal residence (house). It is located in Mysore, Karnataka. It used to be the official residence of the <b>Wadiyar</b> dynasty and the seat of the Kingdom of Mysore.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Alai-Darwaza, the southern gateway of the Quwwat-ul-Islam mosque in Delhi, was constructed by ______</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2325;&#2368; &#2325;&#2369;&#2357;&#2381;&#2357;&#2340;-&#2313;&#2354;-&#2311;&#2360;&#2381;&#2354;&#2366;&#2350; &#2350;&#2360;&#2381;&#2332;&#2367;&#2342; &#2325;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352; &#2309;&#2354;&#2366;&#2312;-&#2342;&#2366;&#2352;&#2357;&#2366;&#2332;&#2366; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; ______ &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2352;&#2357;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Mu'izz ad-Din Muhammad Ghori</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2311;&#2332;&#2364; &#2309;&#2342;-&#2342;&#2368;&#2344; &#2350;&#2369;&#2361;&#2350;&#2381;&#2350;&#2342; &#2327;&#2380;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Ahmad Sh&#257;h Durrani</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2361;&#2350;&#2342; &#2358;&#2366;&#2361; &#2342;&#2369;&#2352;&#2381;&#2352;&#2366;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Ala-ud-din Khilji</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2366;-&#2313;&#2342;-&#2342;&#2368;&#2344; &#2326;&#2367;&#2354;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Muhammad bin Tughlu</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2361;&#2350;&#2381;&#2350;&#2342; &#2348;&#2367;&#2344; &#2340;&#2369;&#2327;&#2354;&#2369;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Alai Darwaza was erected by <b>Ala-ud-Din Khalji,</b> a Sultan of Delhi (r.1296-1316) in c.1305 as the southern entrance gateway to the Quwwat-ul-Islam Mosque. The mosque is the earliest surviving in India and stands in the Qutb complex. The Alai Darwaza is thought to have been one of four gateways planned along the walls and is the only one surviving.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Jai Prakash Narayan Museum of Socialism is situated in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2351;&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2344;&#2366;&#2352;&#2366;&#2351;&#2339; &#2360;&#2350;&#2366;&#2332;&#2357;&#2366;&#2342; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2366;&#2354;&#2351; &#2325;&#2361;&#2366;&#2305; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Vadodara</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2337;&#2379;&#2342;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Amritsar</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2371;&#2340;&#2360;&#2352;</span>",
      "<span class=\"eqt\">New Delhi</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2312; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Lucknow</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2326;&#2344;&#2314;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The JayaPrakash Narayan Interpretation Centre/ Museum of Socialism in <b>Lucknow</b> is built on the idea of creating public architecture. JayaPrakash Narayanan played a leading part in the formation of the Congress Socialist Party, a left-wing group within the Congress Party, the organization that led the campaign for Indian independence.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a heritage site of Madhya Pradesh?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2343;&#2381;&#2351; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2325;&#2366; &#2319;&#2325; &#2357;&#2367;&#2352;&#2366;&#2360;&#2340; &#2360;&#2381;&#2341;&#2354; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lepakshi</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2375;&#2346;&#2366;&#2325;&#2381;&#2359;&#2368;</span>",
      "<span class=\"eqt\">Bhimbetka</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2368;&#2350;&#2348;&#2375;&#2335;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Sasaram</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2360;&#2366;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Hampi</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2350;&#2381;&#2346;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Bhimbetka is a heritage site of Madhya Pradesh. </b>The Bhimbetka Rock Shelter has the oldest-known rock art in India, as well as is one of the largest prehistoric complexes to be seen. An archaeological treasure, Bhimbetka has around 243 rock shelters and have earned the honour of UNESCO World Heritage Site.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Mahabalipuram temple was built under the reign of which of the following dynasties?</p></span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2348;&#2354;&#2368;&#2346;&#2369;&#2352;&#2350; &#2350;&#2306;&#2342;&#2367;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358; &#2325;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Rashtrakuta</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2325;&#2369;&#2335;</span>",
      "<span class=\"eqt\">Pratihara</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2361;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Chola</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2379;&#2354;</span>",
      "<span class=\"eqt\">Pallava</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2354;&#2381;&#2354;&#2357;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The famous Mahabalipuram temple complex (also known as the Shore Temple) was built by the Pallava dynasty under the reign of Narasimhavarman I (also known as Mamalla) in the 7th century CE.</p><p>&#183; The temple is known for its Dravidian-style architecture and is a UNESCO World Heritage Site.</p><p>&#183; Rashtrakutas, Pratiharas, and Cholas were prominent South Indian dynasties, but they were not responsible for building Mahabalipuram temples.</p>",
    "question_index": 9
  }
];
    </script>
