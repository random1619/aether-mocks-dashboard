    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>How many Directive Principles of State Policy were added by the 42nd Constitutional Amendment Act, 1976?</p></span><span class=\"hqt\" style=\"display:none\">42&#2357;&#2375;&#2306; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1976 &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351; &#2344;&#2368;&#2340;&#2367; &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2325; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2332;&#2379;&#2337;&#2364;&#2375; &#2327;&#2319;?</span>",
    "options": [
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>",
      "<span class=\"eqt\">Four</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Five</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2305;&#2330;</span>",
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The 42nd Amendment Act of 1976 was a significant constitutional amendment that made several important changes to the Indian Constitution. Specifically, it added four new Directive Principles of State Policy to Part IV of the Constitution. These additions were aimed at strengthening the social and economic foundation of the Indian state and providing clearer guidance for state policies.</p><p>The Four Added Directive Principles Were:</p> <ol style='margin-top:0cm' start=1 type=1> <li class=MsoNormal>Protecting the environment and safeguarding forests and wildlife</li> <li class=MsoNormal>Protecting monuments and places of national importance</li> <li class=MsoNormal>Separating the judiciary from the executive</li> <li class=MsoNormal>Promoting international peace and security</li> </ol>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Constitutional Amendment Acts led to the formation of the Goods and Services Tax Council?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2340;&#2361;&#2340; &#2357;&#2360;&#2381;&#2340;&#2369; &#2319;&#2357;&#2306; &#2360;&#2375;&#2357;&#2366; &#2325;&#2352; &#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2366; &#2327;&#2336;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">102nd Constitutional Amendment Act</span><span class=\"hqt\" style=\"display:none\">102&#2357;&#2366;&#2306; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">100th Constitutional Amendment Act</span><span class=\"hqt\" style=\"display:none\">100&#2357;&#2366;&#2306; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">101st Constitutional Amendment Act</span><span class=\"hqt\" style=\"display:none\">101&#2357;&#2366;&#2306; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">103rd Constitutional Amendment Act</span><span class=\"hqt\" style=\"display:none\">103&#2357;&#2366;&#2306; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The 101st Constitutional Amendment Act (2016) led to the introduction of GST (Goods and Services Tax) in India and established the GST Council, which oversees its implementation.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a feature of the Constitution of India?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Universal Adult Franchise</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2349;&#2380;&#2350;&#2367;&#2325; &#2357;&#2351;&#2360;&#2381;&#2325; &#2350;&#2340;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Independent Judiciary</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2344;&#2381;&#2351;&#2366;&#2351;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Dual Citizenship</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2361;&#2352;&#2368; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Blend of rigidity &amp; flexibility</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2336;&#2379;&#2352;&#2340;&#2366; &#2324;&#2352; &#2354;&#2330;&#2368;&#2354;&#2375;&#2346;&#2344; &#2325;&#2366; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; India follows a single citizenship system like the UK. Dual citizenship is not allowed.</p><p>&#183; Universal Adult Franchise: Every citizen above 18 has the right to vote.</p><p>&#183; Independent Judiciary: Judiciary functions independently from the executive and legislature.</p><p>&#183; Blend of Rigidity &amp; Flexibility: The Indian Constitution can be amended but is neither too rigid nor too flexible.</p><p>Thus, the correct answer is Dual Citizenship.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The concept of 'Independence of Judiciary' in the Indian Constitution is taken from the Constitution of:</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; '&#2344;&#2381;&#2351;&#2366;&#2351;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2325;&#2368; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366;' &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2325;&#2367;&#2360; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2375; &#2354;&#2368; &#2327;&#2312; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Ireland</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2352;&#2354;&#2376;&#2306;&#2337;</span>",
      "<span class=\"eqt\">France</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2352;&#2366;&#2306;&#2360;</span>",
      "<span class=\"eqt\">The USA</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2309;&#2350;&#2375;&#2352;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Britain</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2367;&#2335;&#2375;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The concept of the independence of the judiciary in India has been influenced by the U.S. Constitution. The American system provides a strict separation of powers, ensuring that the judiciary functions independently from the executive and legislature. This principle was incorporated into the Indian Constitution to maintain an impartial and fair judiciary.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Constitution Amendment Bills is related to the provision of modifying the list of Scheduled Castes in Tamil Nadu?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2370;&#2330;&#2368; &#2325;&#2379; &#2360;&#2306;&#2358;&#2379;&#2343;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">The Constitution (Scheduled Tribes) Order (Amendment) Bill, 2019</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; (&#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367;) &#2310;&#2342;&#2375;&#2358; (&#2360;&#2306;&#2358;&#2379;&#2343;&#2344;) &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;, 2019</span>",
      "<span class=\"eqt\">The Constitution (Scheduled Tribes) Order Amendment Act, 2013</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; (&#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367;) &#2310;&#2342;&#2375;&#2358; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 2013</span>",
      "<span class=\"eqt\">The Constitution (Scheduled Caste) Order (Amendment) Bill, 2015</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; (&#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2366;&#2340;&#2367;) &#2310;&#2342;&#2375;&#2358; (&#2360;&#2306;&#2358;&#2379;&#2343;&#2344;) &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;, 2015</span>",
      "<span class=\"eqt\">The Constitution (Scheduled Castes) Order (Amendment) Bill, 2021</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; (&#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2366;&#2340;&#2367;&#2351;&#2366;&#2306;) &#2310;&#2342;&#2375;&#2358; (&#2360;&#2306;&#2358;&#2379;&#2343;&#2344;) &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;, 2021</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The Constitution (Scheduled Castes) Order (Amendment) Bill, 2021 was introduced to modify the list of Scheduled Castes in Tamil Nadu by including certain communities in the SC list.</p><p>&#183; This bill aimed at correcting anomalies and ensuring social justice.</p><p>Thus, the correct answer is D) The Constitution (Scheduled Castes) Order (Amendment) Bill, 2021.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The Indian Constitution has established _________.</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2344;&#2375; _________ &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368; &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">partial Judicial system</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2358;&#2367;&#2325; &#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;</span>",
      "<span class=\"eqt\">dual judicial system</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2361;&#2352;&#2368; &#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;</span>",
      "<span class=\"eqt\">independent judicial system</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;</span>",
      "<span class=\"eqt\">plural judicial system</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2369;&#2357;&#2367;&#2343; &#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Indian judiciary</b> is designed to be <b>independent</b> to ensure that it can function without interference from the executive and legislative branches of the government. The independence of the judiciary is a key feature of the Indian Constitution, ensuring that judges can make impartial decisions based on law and justice, without any external influence.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Constitutions inspired the law-making process in India?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2366;&#2344;&#2370;&#2344; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Irish Constitution</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2352;&#2367;&#2358; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344;</span>",
      "<span class=\"eqt\">US Constitution</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2375;&#2352;&#2367;&#2325;&#2368; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344;</span>",
      "<span class=\"eqt\">British Constitution</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Canadian Constitution</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2344;&#2366;&#2337;&#2366; &#2325;&#2366; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The law-making process in India has been primarily influenced by the British Constitution because:</p> <ul style='margin-top:0cm' type=disc> <li class=MsoNormal>India's Parliamentary system of government (Lok Sabha &amp; Rajya Sabha) follows the Westminster model of the UK.</li> <li class=MsoNormal>The bicameral legislature, the concept of Rule of Law, and parliamentary sovereignty are derived from the British system.</li> <li class=MsoNormal>The procedure for making laws, including debates, committee reviews, and assent by the President, is inspired by the British parliamentary process.</li> </ul><p>Thus, the British Constitution played a crucial role in shaping India's legislative system.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which fundamental duty applies to you when you see your college friends start fighting with the canteen person when he passed a few anti-religious statements?</p></span><span class=\"hqt\" style=\"display:none\">&#2332;&#2348; &#2310;&#2346; &#2342;&#2375;&#2326;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367; &#2310;&#2346;&#2325;&#2375; &#2325;&#2377;&#2354;&#2375;&#2332; &#2325;&#2375; &#2342;&#2379;&#2360;&#2381;&#2340; &#2325;&#2376;&#2306;&#2335;&#2368;&#2344; &#2357;&#2366;&#2354;&#2375; &#2360;&#2375; &#2333;&#2327;&#2337;&#2364;&#2344;&#2375; &#2354;&#2327;&#2375;, &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2313;&#2360;&#2344;&#2375; &#2325;&#2369;&#2331; &#2343;&#2352;&#2381;&#2350;-&#2357;&#2367;&#2352;&#2379;&#2343;&#2368; &#2348;&#2366;&#2340;&#2375;&#2306; &#2325;&#2361;&#2368;&#2306; &#2341;&#2368;&#2306;, &#2340;&#2379; &#2310;&#2346; &#2346;&#2352; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">To promote harmony and the spirit of brotherhood</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2342;&#2381;&#2349;&#2366;&#2357; &#2324;&#2352; &#2349;&#2366;&#2312;&#2330;&#2366;&#2352;&#2375; &#2325;&#2368; &#2349;&#2366;&#2357;&#2344;&#2366; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To value and preserve the rich heritage</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2371;&#2342;&#2381;&#2343; &#2357;&#2367;&#2352;&#2366;&#2360;&#2340; &#2325;&#2379; &#2350;&#2361;&#2340;&#2381;&#2357; &#2342;&#2375;&#2344;&#2366; &#2324;&#2352; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To develop the scientific temper, humanism, and the spirit of inquiry</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2376;&#2332;&#2381;&#2334;&#2366;&#2344;&#2367;&#2325; &#2342;&#2371;&#2359;&#2381;&#2335;&#2367;&#2325;&#2379;&#2339;, &#2350;&#2366;&#2344;&#2357;&#2340;&#2366;&#2357;&#2366;&#2342; &#2324;&#2352; &#2332;&#2367;&#2332;&#2381;&#2334;&#2366;&#2360;&#2366; &#2325;&#2368; &#2349;&#2366;&#2357;&#2344;&#2366; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To protect and improve our natural environment</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2350;&#2366;&#2352;&#2375; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339; &#2325;&#2368; &#2352;&#2325;&#2381;&#2359;&#2366; &#2324;&#2352; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>According to Article 51A of the Indian Constitution, one of the fundamental duties is \"to promote harmony and the spirit of common brotherhood among all the people of India, transcending religious, linguistic, and regional or sectional diversities.\" This duty applies when handling conflicts based on religious sentiments.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT mentioned in the Indian Constitution as a Fundamental Duty?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2339;&#2367;&#2340; <b>&#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To respect elders</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2337;&#2364;&#2379;&#2306; &#2325;&#2366; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To promote harmony</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2342;&#2381;&#2349;&#2366;&#2357; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To safeguard public property</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To defend the country</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2375;&#2358; &#2325;&#2366; &#2360;&#2352;&#2381;&#2350;&#2341;&#2344; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>To respect the elders is not a fundamental duty mentioned in Article 51A of Indian Constitution.</p><p>Fundamental duties as per article 51A are:</p><p>It shall be the duty of every citizen of India - </p><p>(a) to abide by the Constitution and respect its ideals and institutions, the National Flag and the National Anthem;</p><p>(b) to cherish and follow the noble ideals which inspired our national struggle for freedom;</p><p>(c) to uphold and protect the sovereignty, unity and integrity of India;</p><p>(d) to defend the country and render national service when called upon to do so;</p><p>(e) to promote harmony and the spirit of common brotherhood amongst all the people of India</p><p>(f) to value and preserve the rich heritage of our composite culture;</p><p>(g) to protect and improve the natural environment</p><p>(h) to develop the scientific temper, humanism and the spirit of inquiry and reform;</p><p>(i) to safeguard public property and to abjure violence;</p><p>(j) to strive towards excellence in all spheres of individual and collective activity</p><p>(k) who is a parent or guardian to provide opportunities for education to his child or, as the case may be, ward between the age of six and fourteen years.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following duties has been NOT prescribed by the Indian Constitution as Fundamental Duties?</p><p>I. To defend the country</p><p>II. To pay income tax</p><p>III. To cast the vote in election</p><p>IV. To safeguard the public property</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p><p>I. &#2342;&#2375;&#2358; &#2325;&#2368; &#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366;</p><p>II. &#2310;&#2351;&#2325;&#2352; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;</p><p>III. &#2330;&#2369;&#2344;&#2366;&#2357; &#2350;&#2375;&#2306; &#2357;&#2379;&#2335; &#2337;&#2366;&#2354;&#2344;&#2366;</p><p>IV. &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366;</span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">2 and 3 both</span><span class=\"hqt\" style=\"display:none\">2 &#2324;&#2352; 3 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">2 and 4 both</span><span class=\"hqt\" style=\"display:none\">2 &#2324;&#2352; 4 &#2342;&#2379;&#2344;&#2379;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Paying income tax and casting vote in elections are not mentioned as Fundamental Duties in Article 51A of the Indian Constitution.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Under which article the parliament amend the constitution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2360;&#2342; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 269</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 269</span>",
      "<span class=\"eqt\">Article 74</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 74</span>",
      "<span class=\"eqt\">Article 374</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 374</span>",
      "<span class=\"eqt\">Article 368</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 368</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Article 368 in Part XX of the Constitution deals with the powers of Parliament to amend the Constitution and its procedure.</b> It states that the Parliament may, in exercise of its constituent power, amend by way of addition, variation or repeal any provision of the Constitution in accordance with the procedure laid down for the purpose. However, the Parliament cannot amend those provisions which form the 'basic structure' of the Constitution.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>The 61<sup>st</sup> Amendment to the Constitution of india.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; 61&#2357;&#2366;&#2305; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; ________ &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">restricted the size of council of ministers to 15% of the number of legislative members</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2325;&#2379; &#2357;&#2367;&#2343;&#2366;&#2351;&#2367;&#2325;&#2366; &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; 15% &#2340;&#2325; &#2360;&#2368;&#2350;&#2367;&#2340; &#2325;&#2352; &#2342;&#2375;&#2344;&#2375;</span>",
      "<span class=\"eqt\">Substituted 'Odia' for 'Oriya'</span><span class=\"hqt\" style=\"display:none\">'&#2323;&#2337;&#2364;&#2367;&#2351;&#2366;' &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; '&#2313;&#2337;&#2364;&#2367;&#2351;&#2366;' &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">exempted Arunachal Pradesh from reservation for Scheduled Castes in Panchayati Raj institutions</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2325;&#2379; &#2346;&#2306;&#2330;&#2366;&#2351;&#2340;&#2368; &#2352;&#2366;&#2332; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2352;&#2325;&#2381;&#2359;&#2339; &#2360;&#2375; &#2331;&#2370;&#2335; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375;</span>",
      "<span class=\"eqt\">reduced the age for voting from 21 to 18 years</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2340;&#2342;&#2366;&#2344; &#2325;&#2368; &#2310;&#2351;&#2369; 21 &#2360;&#2375; &#2328;&#2335;&#2366;&#2325;&#2352; 18 &#2357;&#2352;&#2381;&#2359; &#2325;&#2352;&#2344;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; The <b>Sixty-first Amendment</b> of the Constitution of india, officially known as <b><i>The Constitution (Sixty-first Amendment) Act, 1988</i></b>, lowered the Voting age of elections to the Lok Sabha and to the Legislative Assemblies of States from<b> 21 years to 18 years.</b></p><p>&bull; This was done by amending Article 326 of the Constitution, which concerns elections to the Lok Sabha and the Assemblies.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is mentioned in Article 1 of the Indian Constitution?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 1 &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2366; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">India that is Bharat as a federation of states</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2328; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;</span>",
      "<span class=\"eqt\">India that is Bharat as a parliamentary democracy</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342;&#2368;&#2351; &#2354;&#2379;&#2325;&#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;</span>",
      "<span class=\"eqt\">India that is Bharat shall be a Union of states</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2309;&#2352;&#2381;&#2341;&#2366;&#2340; &#2349;&#2366;&#2352;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2366; &#2360;&#2306;&#2328; &#2361;&#2379;&#2327;&#2366;</span>",
      "<span class=\"eqt\">India that is Bharat as a presidential form of democracy</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2332;&#2379; &#2325;&#2367; &#2354;&#2379;&#2325;&#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Article 1 of the Indian Constitution states:</p><p><i>\"India, that is Bharat, shall be a Union of States.\"</i></p><p>&bull; The term \"Union of States\" was chosen by Dr. B.R. Ambedkar to emphasize that states cannot secede from the Union.</p><p>&bull; Unlike a federation, where states have the right to withdraw, India is a \"union\", meaning states have no such right.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which Committee had suggested a penalty or punishment for the non-performance of Fundamental Duties?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2360;&#2350;&#2367;&#2340;&#2367; &#2344;&#2375; &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351;&#2379;&#2306; &#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2344; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2342;&#2306;&#2337; &#2351;&#2366; &#2360;&#2332;&#2366; &#2325;&#2366; &#2360;&#2369;&#2333;&#2366;&#2357; &#2342;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Swaran Singh Committee</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2360;&#2367;&#2306;&#2361; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Indira Gandhi Committee</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2342;&#2367;&#2352;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Morarji Desai Committee</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2352;&#2366;&#2352;&#2332;&#2368; &#2342;&#2375;&#2360;&#2366;&#2312; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Verma Committee</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2350;&#2366; &#2360;&#2350;&#2367;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The <b>Swaran Singh Committee </b>recommended penalties for the non-performance of Fundamental Duties in India. This committee's suggestions aimed to enforce the responsibilities outlined in the Constitution and encourage citizens to fulfil their Fundamental Duties.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which committee recommended Constitutional recognition for the local government bodies in 1989?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360; &#2360;&#2350;&#2367;&#2340;&#2367; &#2344;&#2375; 1989 &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2344;&#2367;&#2325;&#2366;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2325;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358; &#2325;&#2368; &#2341;&#2368;?</span>",
    "options": [
      "<span class=\"eqt\">Ashok Mehta Committee</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2358;&#2379;&#2325; &#2350;&#2375;&#2361;&#2340;&#2366; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">PK Thungon Committee</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2325;&#2375; &#2341;&#2369;&#2306;&#2327;&#2379;&#2344; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Balwant Rai Mehta Committee</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2354;&#2357;&#2306;&#2340; &#2352;&#2366;&#2351; &#2350;&#2375;&#2361;&#2340;&#2366; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Verma Committee</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2350;&#2366; &#2360;&#2350;&#2367;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The PK Thungon Committee (1989) recommended giving constitutional status to Panchayati Raj institutions and suggested the three-tier system of local governance. This led to the 73rd and 74th Constitutional Amendments (1992), granting Panchayati Raj and Municipalities constitutional recognition.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a Fundamental Duty?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">To prohibit trade in rare and endangered species</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2369;&#2352;&#2381;&#2354;&#2349; &#2319;&#2357;&#2306; &#2360;&#2306;&#2325;&#2335;&#2327;&#2381;&#2352;&#2360;&#2381;&#2340; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2306;&#2343; &#2354;&#2327;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To value and preserve the rich heritage of the country's composite culture</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2375;&#2358; &#2325;&#2368; &#2360;&#2350;&#2327;&#2381;&#2352; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367; &#2325;&#2368; &#2360;&#2350;&#2371;&#2342;&#2381;&#2343; &#2357;&#2367;&#2352;&#2366;&#2360;&#2340; &#2325;&#2379; &#2350;&#2361;&#2340;&#2381;&#2357; &#2342;&#2375;&#2344;&#2366; &#2324;&#2352; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To safeguard public property and to abjure violence</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2361;&#2367;&#2306;&#2360;&#2366; &#2325;&#2366; &#2346;&#2352;&#2367;&#2340;&#2381;&#2351;&#2366;&#2327; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To uphold and protect the sovereignty, unity, and integrity of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2360;&#2306;&#2346;&#2381;&#2352;&#2349;&#2369;&#2340;&#2366;, &#2319;&#2325;&#2340;&#2366; &#2324;&#2352; &#2309;&#2326;&#2306;&#2337;&#2340;&#2366; &#2325;&#2379; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2344;&#2366; &#2324;&#2352; &#2313;&#2360;&#2325;&#2368; &#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Fundamental Duties are listed under Article 51A of the Indian Constitution. The prohibition of trade in rare and endangered species is covered under environmental laws, but it is not explicitly listed as a Fundamental Duty.</p><p>&bull; Option 2, 3, and 4  -  These are Fundamental Duties under Article 51A.</p>",
    "question_index": 15
