    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Calculate the revenue receipts from the following information: </p><p>Revenue deficit = 2.80% of GDP; Revenue expenditure = 10.80% of GDP.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2360;&#2375; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2328;&#2366;&#2335;&#2366; = &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2325;&#2366; 2.80%; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351; = &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2325;&#2366; 10.80%.</p></span>",
    "options": [
      "<span class=\"eqt\">12.80</span><span class=\"hqt\" style=\"display:none\">12.80</span>",
      "<span class=\"eqt\">8.00</span><span class=\"hqt\" style=\"display:none\">8.00</span>",
      "<span class=\"eqt\">13.60</span><span class=\"hqt\" style=\"display:none\">13.60</span>",
      "<span class=\"eqt\">2.70</span><span class=\"hqt\" style=\"display:none\">2.70</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Given Data</b>: </p><p>&#183; Revenue Deficit = 2.80% of GDP</p><p>&#183; Revenue Expenditure = 10.80% of GDP</p><p><b>Calculation</b>: </p><p>Using the revenue deficit formula: Revenue Receipts=Revenue Expenditure&#8722;Revenue Deficit </p><p>Substitute the given values: </p><p>Revenue Receipts=10.80%&#8722;2.80%=8.00% of GDP</p><p><b>Key Definitions</b>: </p><p>&#183; <b>Revenue Receipts</b>: The income a government earns from tax and non-tax sources (e.g., taxes, fees, dividends) that does not create liabilities or reduce assets. It is used to meet regular expenses like salaries and subsidies.</p><p>&#183; <b>Revenue Expenditure</b>: The expenditure on recurring items like salaries, pensions, and interest payments, which does not create assets or reduce liabilities.</p><p>&#183; <b>Revenue Deficit</b>: The excess of revenue expenditure over revenue receipts, indicating the shortfall in funds for regular expenses. Mathematically: Revenue Deficit=Revenue Expenditure&#8722;Revenue Receipts</p><p><b>Components of Revenue Receipts</b>: </p><p>&#183; <b>Tax Revenue</b>: Includes income tax, GST, corporate tax, etc.</p><p>&#183; <b>Non-Tax Revenue</b>: Includes dividends from public sector enterprises, fees, and grants.</p><p>&#183; In India's budget (e.g., 2023 - 24), tax revenue typically constitutes ~80 - 85% of revenue receipts.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Match the concepts in column A with their respective descriptions in column B.</p><p><img width=602 height=122 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27002/image024.jpg\" ></p></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2340;&#2306;&#2349; A &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366;&#2323;&#2306; &#2325;&#2379; &#2360;&#2381;&#2340;&#2306;&#2349; B &#2350;&#2375;&#2306; &#2342;&#2367;&#2319; &#2327;&#2319; &#2313;&#2344;&#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2357;&#2367;&#2357;&#2352;&#2339;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;&#2404;</p><p><img width=602 height=122 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27002/image024.jpg\" ></span>",
    "options": [
      "<span class=\"eqt\">a-2, b-1, c-3, d-4</span><span class=\"hqt\" style=\"display:none\">&#2319;-2, &#2348;&#2368;-1, &#2360;&#2368;-3, &#2337;&#2368;-4</span>",
      "<span class=\"eqt\">a-3, b-1, c-2, d-4</span><span class=\"hqt\" style=\"display:none\">&#2319;-3, &#2348;&#2368;-1, &#2360;&#2368;-2, &#2337;&#2368;-4</span>",
      "<span class=\"eqt\">a-3, b-4, c-1, d-2</span><span class=\"hqt\" style=\"display:none\">&#2319;-3, &#2348;&#2368;-4, &#2360;&#2368;-1, &#2337;&#2368;-2</span>",
      "<span class=\"eqt\">a-4, b-3, c-2, d-1</span><span class=\"hqt\" style=\"display:none\">&#2319;-4, &#2348;&#2368;-3, &#2360;&#2368;-2, &#2337;&#2368;-1</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>a. Gross National Product (GNP): It represents the total money value of national output (goods and services) produced by a country's residents in a given period. This matches option 3.</p><p>b. Net National Product (NNP): NNP is GNP minus depreciation (wear and tear of capital goods). It essentially measures the net production of goods and services. This matches option 4.</p><p>c. Personal Income (PI): Personal income refers to the total income received by individuals before taxes. This matches option 1.</p><p>d. Disposable Personal Income (DPI): DPI is personal income after tax deductions, meaning the income individuals can actually spend. This matches option 2.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct?</p><p>I. Only marketed goods are considered while estimating Gross Domestic Product (GDP).</p><p>II. The work done by a woman at her home is outside the purview of Gross Domestic Product.</p><p>III. In estimating GDP, only final goods and services are considered.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (GDP) &#2325;&#2366; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; &#2354;&#2327;&#2366;&#2340;&#2375; &#2360;&#2350;&#2351; &#2325;&#2375;&#2357;&#2354; &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2375;&#2306; &#2354;&#2366;&#2319; &#2327;&#2319; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2319;&#2325; &#2350;&#2361;&#2367;&#2354;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2346;&#2344;&#2375; &#2328;&#2352; &#2346;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2325;&#2375; &#2342;&#2366;&#2351;&#2352;&#2375; &#2360;&#2375; &#2348;&#2366;&#2361;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. GDP &#2325;&#2366; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; &#2354;&#2327;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2309;&#2306;&#2340;&#2367;&#2350; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only II and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only I and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Gross domestic product (GDP) is the standard measure of the value added created through the production of goods and services in a country during a certain period.</p><p>It also measures the income earned from that production, or th<b>e total amount spent on final goods and services </b>(less imports).While GDP is the single most important indicator to capture economic activity, it falls short of providing a suitable measure of people's material well-being for which alternative indicators may be more appropriate. This indicator is based on nominal GDP (also called GDP at current prices or GDP in value) and is available in different measures.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements about GDP and Welfare are correct?</p><p>i. GDP of a country is an indicator of welfare of the people. </p><p>ii. If GDP is rising, the welfare may not rise equally. </p><p>iii. GDP and Welfare both are not related to each other.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2324;&#2352; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>i. &#2325;&#2367;&#2360;&#2368; &#2342;&#2375;&#2358; &#2325;&#2368; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2375; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339; &#2325;&#2366; &#2360;&#2370;&#2330;&#2325; &#2361;&#2376;&#2404;</p><p>ii. &#2351;&#2342;&#2367; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2348;&#2338;&#2364; &#2352;&#2361;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339; &#2360;&#2350;&#2366;&#2344; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2361;&#2368;&#2306; &#2348;&#2338;&#2364; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>iii. &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2324;&#2352; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339; &#2342;&#2379;&#2344;&#2379;&#2306; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">Only i and ii</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">Only i and iii</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">Only ii and iii</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#8226; Statement i is correct: GDP is often used as an indicator of welfare, though it has limitations.</p><p>&#8226; Statement ii is correct: Rising GDP may not equitably improve welfare due to income inequality or other factors.</p><p>&#8226; Statement iii is incorrect: GDP and welfare are related, though the relationship is not perfect, as GDP does not account for non-economic factors like health or happiness.</p><p><b>Further Insight</b>:</p><p>&#8226; GDP measures a country's economic output but does not capture distribution, environmental costs, or non-market factors like life expectancy or literacy. </p><p>&#8226; For a comprehensive welfare assessment, metrics like the Human Development Index (HDI) or Gini coefficient are also considered.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Why are the intermediate goods NOT included in the National Income?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2343;&#2381;&#2351;&#2357;&#2352;&#2381;&#2340;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2379; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; &#2350;&#2375;&#2306; &#2325;&#2381;&#2351;&#2379;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Intermediate goods increases the income.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351;&#2357;&#2352;&#2381;&#2340;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2360;&#2375; &#2310;&#2351; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Intermediate goods decreases the income.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351;&#2357;&#2352;&#2381;&#2340;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2306; &#2310;&#2351; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">For the prevention of double accounting.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2361;&#2352;&#2375; &#2354;&#2375;&#2326;&#2366;&#2306;&#2325;&#2344; &#2325;&#2368; &#2352;&#2379;&#2325;&#2341;&#2366;&#2350; &#2325;&#2375; &#2354;&#2367;&#2319;&#2404;</span>",
      "<span class=\"eqt\">Intermediate goods are not reliable.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351;&#2357;&#2352;&#2381;&#2340;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2306; &#2357;&#2367;&#2358;&#2381;&#2357;&#2360;&#2344;&#2368;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2368;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Intermediate goods are goods that are used up in the process of producing other goods (final goods). They are not included in the calculation of National Income (like GDP) <b>to prevent double counting (or multiple counting)</b>. If the value of intermediate goods were included along with the value of final goods, the value of the intermediate goods would be counted twice  -  once as an intermediate good and again as part of the value of the final good.</p><p><b>Further insights:</b></p><p>&#8226; National Income measures the total value of final goods and services produced in an economy during a specific period.</p><p>&#8226; For example, if flour is used to make bread, the flour is an intermediate good, and the bread is the final good. Including the value of both flour and bread in national income would overstate the actual value produced. Only the value of the bread (the final product) is counted.</p><p>&#8226; This approach ensures an accurate measure of the economy's output.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>______ at Market Price refers to the sum total of factor incomes earned by residents of a country during an accounting year including net indirect taxes.</p></span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; ______ &#2360;&#2375; &#2340;&#2366;&#2340;&#2381;&#2346;&#2352;&#2381;&#2351; &#2319;&#2325; &#2354;&#2375;&#2326;&#2366; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2367;&#2360;&#2368; &#2342;&#2375;&#2358; &#2325;&#2375; &#2344;&#2367;&#2357;&#2366;&#2360;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351; &#2325;&#2375; &#2325;&#2369;&#2354; &#2351;&#2379;&#2327; &#2360;&#2375; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2358;&#2369;&#2342;&#2381;&#2343; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2349;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">Net Domestic Product (NDP)</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2342;&#2381;&#2343; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (&#2319;&#2344;&#2337;&#2368;&#2346;&#2368;)</span>",
      "<span class=\"eqt\">Gross Domestic Product (GDP)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (&#2332;&#2368;&#2337;&#2368;&#2346;&#2368;)</span>",
      "<span class=\"eqt\">Gross National Product (GNP)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (&#2332;&#2368;&#2319;&#2344;&#2346;&#2368;)</span>",
      "<span class=\"eqt\">Net National Product (NNP)</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2342;&#2381;&#2343; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (&#2319;&#2344;&#2319;&#2344;&#2346;&#2368;)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Net National Product (NNP) at Market Price is the total factor incomes earned by a country's residents in an accounting year, including net indirect taxes (taxes minus subsidies). It adjusts Gross National Product (GNP) for depreciation and reflects national income available.</p><p>&#183; \"NDP\" (option 1) is domestic-focused, excluding foreign income.</p><p>&#183; \"GDP\" (option 2) is domestic production, not resident income.</p><p>&#183; \"GNP\" (option 3) includes depreciation, unlike NNP.</p><p>NNP fits the description, making option 4 correct.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a correct statement?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">National Income is GNP at FC.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; &#2319;&#2347;.&#2360;&#2368;. &#2346;&#2352; &#2332;&#2368;.&#2319;&#2344;.&#2346;&#2368;. &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">National Income is NDP at MP.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351;, &#2350;&#2343;&#2381;&#2351; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2350;&#2375;&#2306; NDP &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">National Income is GDP at MP.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; &#2350;&#2343;&#2381;&#2351; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">National Income is NNP at FC.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; &#2319;&#2347;&#2360;&#2368; &#2346;&#2352; &#2319;&#2344;&#2319;&#2344;&#2346;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct definition of National Income is:</p><p>National Income=Net National Product at Factor Cost (NNP at FC)\\text{National Income} = \\text{Net National Product at Factor Cost (NNP at FC)}National Income=Net National Product at Factor Cost (NNP at FC)</p><p>Explanation of terms:</p><p>&#183; GNP (Gross National Product) - Total output produced by a country's residents, including those abroad.</p><p>&#183; NDP (Net Domestic Product) - GDP minus depreciation.</p><p>&#183; GDP (Gross Domestic Product) - Total value of goods and services produced within a country's borders.</p><p>&#183; NNP (Net National Product) - GNP minus depreciation.</p><p>&#183; Factor Cost (FC) - Excludes taxes and includes subsidies.</p><p>&#183; Market Price (MP) - Includes taxes and excludes subsidies.</p><p>Since National Income is best represented as NNP at Factor Cost (NNP at FC),</p><p>option (4) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Each of the following statements includes two terms. In three cases, the two terms mean the same as each other. In which of the following cases do the two terms NOT mean the same as each other?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2379; &#2358;&#2348;&#2381;&#2342; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404; &#2340;&#2368;&#2344; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2342;&#2379;&#2344;&#2379;&#2306; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2368; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2350;&#2366;&#2350;&#2354;&#2375; &#2350;&#2375;&#2306; &#2342;&#2379;&#2344;&#2379;&#2306; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Nominal GDP and GDP at current prices</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2350;&#2350;&#2366;&#2340;&#2381;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2324;&#2352; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2350;&#2370;&#2354;&#2381;&#2351;&#2379;&#2306; &#2346;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</span>",
      "<span class=\"eqt\">The base period and the reference period</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2343;&#2366;&#2352; &#2309;&#2357;&#2343;&#2367; &#2324;&#2352; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2309;&#2357;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Changes in real GDP and the GDP deflator</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2324;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2309;&#2346;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367;&#2325;&#2366;&#2352;&#2325; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Real GDP and GDP at constant prices</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2324;&#2352; &#2360;&#2381;&#2341;&#2367;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351;&#2379;&#2306; &#2346;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Nominal GDP and GDP at current prices are the same since both measure GDP using current market prices.</p><p>&#183; The base period and the reference period are often used interchangeably in economic comparisons.</p><p>&#183; Real GDP and GDP at constant prices are also the same because real GDP is adjusted for inflation, using constant prices.</p><p>&#183; Changes in real GDP and the GDP deflator are different.</p><p>o Real GDP measures economic output adjusted for inflation.</p><p>o The GDP deflator is a price index that reflects changes in price levels.</p><p>o A change in the GDP deflator does not always mean an equal change in real GDP.</p><p>Thus, option 3 is the correct answer.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The relationship between which of the following is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2348;&#2306;&#2343; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">NDP at market price = GDP at market price + depreciation</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2319;&#2344;&#2337;&#2368;&#2346;&#2368; = &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; + &#2350;&#2370;&#2354;&#2381;&#2351;&#2361;&#2381;&#2352;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Domestic income = NDP at market price + net indirect taxes</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2352;&#2375;&#2354;&#2370; &#2310;&#2351; = &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2319;&#2344;&#2337;&#2368;&#2346;&#2368; + &#2358;&#2369;&#2342;&#2381;&#2343; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352;</span>",
      "<span class=\"eqt\">GDP at market price = price + quantity of final goods and services</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; = &#2350;&#2370;&#2354;&#2381;&#2351; + &#2309;&#2306;&#2340;&#2367;&#2350; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">National income = NDP at factor cost + net factor income from abroad</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; = &#2325;&#2366;&#2352;&#2325; &#2354;&#2366;&#2327;&#2340; &#2346;&#2352; &#2319;&#2344;&#2337;&#2368;&#2346;&#2368; + &#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2358;&#2369;&#2342;&#2381;&#2343; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#8226; <b>National Income = NDP at factor cost + Net Factor Income from Abroad (NFIA)</b>.</p><p>&#8226; This is a standard national income accounting identity.</p><p>&#8226; <b>Depreciation</b> is deducted from GDP to get <b>NDP</b>, and <b>factor cost</b> excludes indirect taxes.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the true statement</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2340;&#2381;&#2351; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">If real GDP is 240 and price index is 120, nominal GDP is 200.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; 240 &#2361;&#2376; &#2324;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; 120 &#2361;&#2376;, &#2340;&#2379; &#2344;&#2366;&#2350;&#2350;&#2366;&#2340;&#2381;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; 200 &#2361;&#2379;&#2327;&#2366;&#2404;</span>",
      "<span class=\"eqt\">If real GDP is 500 and price index is 200, nominal GDP is 250.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; 500 &#2361;&#2376; &#2324;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; 200 &#2361;&#2376;, &#2340;&#2379; &#2344;&#2366;&#2350;&#2350;&#2366;&#2340;&#2381;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; 250 &#2361;&#2379;&#2327;&#2366;&#2404;</span>",
      "<span class=\"eqt\">If real GDP is 500 and price index is 200, nominal GDP is 700.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; 500 &#2361;&#2376; &#2324;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; 200 &#2361;&#2376;, &#2340;&#2379; &#2344;&#2366;&#2350;&#2350;&#2366;&#2340;&#2381;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; 700 &#2361;&#2379;&#2327;&#2366;&#2404;</span>",
      "<span class=\"eqt\">If real GDP is 240 and price index is 120, nominal GDP is 288.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; 240 &#2361;&#2376; &#2324;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; 120 &#2361;&#2376;, &#2340;&#2379; &#2344;&#2366;&#2350;&#2350;&#2366;&#2340;&#2381;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; 288 &#2361;&#2379;&#2327;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Accurately applies the formula for calculating nominal GDP, which involves multiplying the real GDP by the price index divided by 100. In this case, with a real <b>GDP of 240 and a price index of 120, the resulting nominal GDP is indeed 288</b>.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio between the nominal and real GDP is called ________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2306;&#2325;&#2367;&#2340;/&#2344;&#2377;&#2350;&#2367;&#2344;&#2354; &#2324;&#2352; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2379; ________ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Net national income</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2357;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351;</span>",
      "<span class=\"eqt\">Value added GDP</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354;&#2381;&#2351; &#2357;&#2352;&#2381;&#2343;&#2367;&#2340; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</span>",
      "<span class=\"eqt\">&#8201;Green GDP</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2367;&#2340; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</span>",
      "<span class=\"eqt\">GDP deflator</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2309;&#2346;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367;&#2325;&#2366;&#2352;&#2325;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The <b>GDP deflator</b>, also known as the implicit price deflator, is a measure used to assess inflation.</p><p>GDP deflator = Nominal GDP/Real GDP * 100</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>NDP = _________.</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2337;&#2368;&#2346;&#2368; = _________.</span>",
    "options": [
      "<span class=\"eqt\">GDP  -  Depreciation</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; - &#2350;&#2370;&#2354;&#2381;&#2351;&#2361;&#2381;&#2352;&#2366;&#2360;</span>",
      "<span class=\"eqt\">GDP + Depreciation</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2350;&#2370;&#2354;&#2381;&#2351;&#2361;&#2381;&#2352;&#2366;&#2360;</span>",
      "<span class=\"eqt\">GDP  -  Net factor income from abroad</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; - &#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2358;&#2369;&#2342;&#2381;&#2343; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351;</span>",
      "<span class=\"eqt\">GDP + Net factor income from abroad</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2358;&#2369;&#2342;&#2381;&#2343; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Net Domestic Product (NDP) is derived from Gross Domestic Product (GDP) by subtracting depreciation (wear and tear of capital assets).</p><p>Formula:</p><p>NDP=GDP&#8722;Depreciation</p><p>Hence, option 1 (GDP  -  Depreciation) is the correct answer.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following identity is correct regarding GNP?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2368;&#2319;&#2344;&#2346;&#2368; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">GNP = GDP + Factor income earned by the domestic factors of production employed in the rest of the world + Factor income earned by the factors of production of the rest of the world employed in the domestic economy</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2319;&#2344;&#2346;&#2368; = &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; + &#2358;&#2375;&#2359; &#2357;&#2367;&#2358;&#2381;&#2357; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2379;&#2332;&#2367;&#2340; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2328;&#2352;&#2375;&#2354;&#2370; &#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351; + &#2328;&#2352;&#2375;&#2354;&#2370; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2379;&#2332;&#2367;&#2340; &#2358;&#2375;&#2359; &#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351;</span>",
      "<span class=\"eqt\">GNP = GDP  -  Factor income earned by the domestic factors of production employed in the rest of the world  -  Factor income earned by the factors of production of the rest of the world employed in the domestic economy</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2319;&#2344;&#2346;&#2368; = &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; - &#2358;&#2375;&#2359; &#2357;&#2367;&#2358;&#2381;&#2357; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2379;&#2332;&#2367;&#2340; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2328;&#2352;&#2375;&#2354;&#2370; &#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351; - &#2328;&#2352;&#2375;&#2354;&#2370; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2379;&#2332;&#2367;&#2340; &#2358;&#2375;&#2359; &#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351;</span>",
      "<span class=\"eqt\">GNP = GDP + Factor income earned by the domestic factors of production employed in the rest of the world  -  Factor income earned by the factors of production of the rest of the world employed in the domestic economy</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2319;&#2344;&#2346;&#2368; = &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; + &#2358;&#2375;&#2359; &#2357;&#2367;&#2358;&#2381;&#2357; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2379;&#2332;&#2367;&#2340; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2328;&#2352;&#2375;&#2354;&#2370; &#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351; - &#2328;&#2352;&#2375;&#2354;&#2370; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2379;&#2332;&#2367;&#2340; &#2358;&#2375;&#2359; &#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351;</span>",
      "<span class=\"eqt\">GNP = GDP  -  Factor income earned by the domestic factors of production employed in the rest of the world + Factor income earned by the factors of production of the rest of the world employed in the domestic economy</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2319;&#2344;&#2346;&#2368; = &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; - &#2358;&#2375;&#2359; &#2357;&#2367;&#2358;&#2381;&#2357; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2379;&#2332;&#2367;&#2340; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2328;&#2352;&#2375;&#2354;&#2370; &#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351; + &#2328;&#2352;&#2375;&#2354;&#2370; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2379;&#2332;&#2367;&#2340; &#2358;&#2375;&#2359; &#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Correct relationship between GDP and GNP:</p><p>GNP = GDP + Factor income earned by the domestic factors of production employed in the rest of the world  -  Factor income earned by the factors of production of the rest of the world employed in the domestic economy</p><p>Hence, option (c) is correct.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Match the items is List I with those in List II.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Measure of National Income</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Formula</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. GNP</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. GNP - Depreciation</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. NNP</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. C + I + G + Net exports</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. GDP</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. GDP  -  Depreciation</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. NDP</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. GDP + Net factor income from abroad</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2330;&#2368; I &#2325;&#2368; &#2360;&#2370;&#2330;&#2344;&#2366; &#2325;&#2379; &#2360;&#2370;&#2330;&#2368; II &#2325;&#2368; &#2360;&#2370;&#2330;&#2344;&#2366; &#2360;&#2375; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; &#2325;&#2366; &#2350;&#2366;&#2346;</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2340;&#2381;&#2352;</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. GNP</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. GNP - &#2350;&#2370;&#2354;&#2381;&#2351;&#2361;&#2381;&#2352;&#2366;&#2360;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. NNP</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. C + I + G + &#2344;&#2367;&#2357;&#2354; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. GDP</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. GDP - &#2350;&#2370;&#2354;&#2381;&#2351;&#2361;&#2381;&#2352;&#2366;&#2360;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. NDP</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. GDP + &#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2344;&#2367;&#2357;&#2354; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-b, ii-d, iii-a, iv-c</span><span class=\"hqt\" style=\"display:none\">i-b, ii-d, iii-a, iv-c</span>",
      "<span class=\"eqt\">i-a, ii-c, iii-d, iv-b</span><span class=\"hqt\" style=\"display:none\">i-a, ii-c, iii-d, iv-b</span>",
      "<span class=\"eqt\">i-d, ii-a, iii-b, iv-c</span><span class=\"hqt\" style=\"display:none\">i-d, ii-a, iii-b, iv-c</span>",
      "<span class=\"eqt\">i-c, ii-b, iii-d, iv-a</span><span class=\"hqt\" style=\"display:none\">i-c, ii-b, iii-d, iv-a</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>(i). GNP equals GDP + Net factor income from abroad, representing the total income earned by domestic residents, including income from overseas investments.</p><p>(ii). NNP equals GDP  -  Depreciation, representing the net value of goods and services produced by a country after accounting for depreciation of capital assets.</p><p>(iii). GDP equals consumption (C), investment (I), government spending (G), and net exports (exports - imports) from the total value of goods and services produced within a country's borders.</p><p>(iv). NNP equals GDP - depreciation, representing the net value of goods and services produced by a country after accounting for depreciation of capital assets.</p><p>Hence<b>, i-d, ii-a, iii-b, iv-c</b> is correct.</p>",
    "question_index": 13
  },

    "question": "<span class=\"eqt\"><p>Which of the following is NOT correct with regards to the history of calculating National Income (NI) in India?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; (&#2319;&#2344;&#2310;&#2312;) &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2375; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">First attempt to compute NI was made by Dadabhai Naoroji.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2310;&#2312; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2342;&#2366;&#2342;&#2366;&#2349;&#2366;&#2312; &#2344;&#2380;&#2352;&#2379;&#2332;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">First official attempt to compute NI was made by PC Mahalanobis.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2310;&#2312; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2310;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2325; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2346;&#2368;&#2360;&#2368; &#2350;&#2361;&#2366;&#2354;&#2344;&#2379;&#2348;&#2367;&#2360; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Dadabhai Naoroji divided the Indian economy into two parts: primary sector and secondary sector.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2366;&#2342;&#2366;&#2349;&#2366;&#2312; &#2344;&#2380;&#2352;&#2379;&#2332;&#2368; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2379; &#2342;&#2379; &#2349;&#2366;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;: &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2324;&#2352; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2404;</span>",
      "<span class=\"eqt\">First scientific method to compute NI was used by Dr VKRV Rao.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2310;&#2312; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2361;&#2354;&#2368; &#2357;&#2376;&#2332;&#2381;&#2334;&#2366;&#2344;&#2367;&#2325; &#2357;&#2367;&#2343;&#2367; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2337;&#2377;. &#2357;&#2368;&#2325;&#2375;&#2310;&#2352;&#2357;&#2368; &#2352;&#2366;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Dadabhai Naoroji</b> made the <b>first attempt</b> to compute India's National Income, but he did not divide the economy into <b>primary</b> and <b>secondary sectors</b>. Instead, he was primarily focused on estimating the <b>national income</b> using the concept of the <b>Drain of Wealth</b> in his book \"Poverty and Un-British Rule in India\". His estimates were more concerned with the economic exploitation by the British rather than classifying the economy into sectors.</p><p>&#183; <b>PC Mahalanobis</b> made the <b>first official attempt</b> to compute National Income in India in the 1940s and played a significant role in the development of statistical methods in India.</p><p>&#183; <b>Dr VKRV Rao</b> is credited with introducing the <b>scientific method</b> for calculating National Income in India, using statistical methods to estimate the national income and improving the accuracy of calculations.</p><p>Thus, the statement about Naoroji dividing the economy into the primary and secondary sectors is <b>incorrect</b>.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>If we deduct depreciation from GNP the measure of aggregate income that we obtain is called _____.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2361;&#2350; &#2332;&#2368;&#2319;&#2344;&#2346;&#2368; &#2360;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351;&#2361;&#2381;&#2352;&#2366;&#2360; &#2328;&#2335;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2361;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2325;&#2369;&#2354; &#2310;&#2351; &#2325;&#2366; &#2350;&#2366;&#2346; _____ &#2325;&#2361;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Gross Domestic Product at market prices</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Gross Domestic Product</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Net National Product</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2357;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Personal income</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2310;&#2351;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>NNP (Net National Product)</b> is derived by subtracting the depreciation value, which represents the consumption of capital stock, from the GNP (Gross National Product).</p><p>Net National Product (NNP) = Gross National Product (GNP)  -  Depreciation.</p>",
    "question_index": 15
  },

    "question": "<span class=\"eqt\"><p>If GNP is 16% higher than the last year and the rate of inflation is 9%, production in the economy has grown by:</p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (&#2332;&#2368;&#2319;&#2344;&#2346;&#2368;) &#2346;&#2367;&#2331;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 16% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376; &#2324;&#2352; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2368; &#2342;&#2352; 9% &#2361;&#2376;, &#2340;&#2379; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2369;&#2312; &#2361;&#2376;:</span>",

      "<span class=\"eqt\">6%</span><span class=\"hqt\" style=\"display:none\">6%</span>",

  {
    "question": "<span class=\"eqt\"><p>While estimating Gross Domestic Product, the monetary value of only final goods is considered because____________.</p><p>a. its immobility ends the active economic flow</p><p>b. of the issues of double counting</p><p>c. the value added at each stage of production is included</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2325;&#2366; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; &#2354;&#2327;&#2366;&#2340;&#2375; &#2360;&#2350;&#2351;, &#2325;&#2375;&#2357;&#2354; &#2309;&#2306;&#2340;&#2367;&#2350; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367;____________&#2404;</p><p>a. &#2311;&#2360;&#2325;&#2368; &#2327;&#2340;&#2367;&#2361;&#2368;&#2344;&#2340;&#2366; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2325;&#2379; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;</p><p>b. &#2342;&#2379;&#2361;&#2352;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2375; &#2350;&#2369;&#2342;&#2381;&#2342;&#2375;</p><p>c. &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2330;&#2352;&#2339; &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2366; &#2327;&#2351;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">All a, b and c</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; a, b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; When estimating <b>Gross Domestic Product (GDP)</b>, only the monetary value of <b>final goods and services</b> is considered to avoid <b>double counting</b>.</p><p>&#183; Double counting occurs when the value of intermediate goods (used in the production of final goods) is counted multiple times, which would inflate the GDP figure and provide an inaccurate measure of economic activity.</p><p><b>Why only final goods?</b></p><p>&#183; <b>Final goods</b> are products that are ready for consumption or use by end-users, such as a car sold to a consumer or a laptop purchased for personal use.</p><p>&#183; The value of final goods already includes the value of all <b>intermediate goods</b> (e.g., steel, tires, or microchips used to make the car or laptop) used in their production.</p><p>&#183; Counting both intermediate and final goods would result in counting the same value multiple times, leading to an overestimation of GDP.</p><p><b>Further insight:</b></p><p><b>GDP Calculation Methods:</b></p><p>&#183; <b>Expenditure Approach</b>: GDP = C + I + G + (X - M), where only the value of final goods and services is included in consumption (C), investment (I), government spending (G), and net exports (X - M).</p><p>&#183; <b>Value-Added Approach</b>: This method sums the value added at each stage of production to avoid double counting, but it is not the focus of the question.</p><p>&#183; <b>Income Approach</b>: This sums all incomes (wages, profits, rents) generated in production, but it is also not relevant here.</p>",
    "question_index": 17
  },
