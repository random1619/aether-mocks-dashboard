    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A light bulb working on a 18 V battery draws a current of 3 A. What will be the resistance of the bulb?</p></span><span class=\"hqt\" style=\"display:none\"><p>18 V &#2325;&#2368; &#2348;&#2376;&#2335;&#2352;&#2368; &#2346;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2348;&#2354;&#2381;&#2348; &#2350;&#2375;&#2306; &#2360;&#2375; 3 A &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2343;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2354;&#2381;&#2348; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">6 &#937;</span><span class=\"hqt\" style=\"display:none\">6 &#937;</span>",
      "<span class=\"eqt\">2 &#937;</span><span class=\"hqt\" style=\"display:none\">2 &#937;</span>",
      "<span class=\"eqt\">4 &#937;</span><span class=\"hqt\" style=\"display:none\">4 &#937;</span>",
      "<span class=\"eqt\">3 &#937;</span><span class=\"hqt\" style=\"display:none\">3 &#937;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The measure of opposition applied by any object to the flow of electric current is known as resistance.</p><p>Resistance Formula is R = V/I.</p><p>Here, V = 18 Volt and I = 3A</p><p>R= 18/3 = 6 &#937;</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the formula that represents Ohm's law.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2323;&#2350; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2370;&#2340;&#2381;&#2352; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">V = A +&#937;&#8239;</span><span class=\"hqt\" style=\"display:none\">V = A +&#937;&#8239;</span>",
      "<span class=\"eqt\">A = V x &#937;</span><span class=\"hqt\" style=\"display:none\">A = V x &#937;</span>",
      "<span class=\"eqt\">&#937;&#8239; = A x V</span><span class=\"hqt\" style=\"display:none\">&#937;&#8239; = A x V</span>",
      "<span class=\"eqt\">V = A x &#937;&#8239;</span><span class=\"hqt\" style=\"display:none\">V = A x &#937;&#8239;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Ohm's law states the relationship between current (A), voltage (V), and resistance (&#937;&#8239;). The amount of steady current through a large number of materials is directly proportional to the potential difference, or voltage, across the materials. <b>The formula that represents - V = A x &#937;&#8239;.</b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What is the starting voltage of an AA battery used for home gadgets such as remote controls, small toys, and wireless kitchen appliances?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2328;&#2352;&#2375;&#2354;&#2370; &#2327;&#2376;&#2332;&#2375;&#2335;&#2381;&#2360; (&#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306;) &#2332;&#2376;&#2360;&#2375; &#2325;&#2367; &#2352;&#2367;&#2350;&#2379;&#2335; &#2325;&#2306;&#2335;&#2381;&#2352;&#2379;&#2354;, &#2331;&#2379;&#2335;&#2375; &#2326;&#2367;&#2354;&#2380;&#2344;&#2375; &#2324;&#2352; &#2357;&#2366;&#2351;&#2352;&#2354;&#2375;&#2360; &#2352;&#2360;&#2379;&#2312; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; AA &#2348;&#2376;&#2335;&#2352;&#2368; &#2325;&#2366; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340;&#2368; &#2357;&#2379;&#2354;&#2381;&#2335;&#2375;&#2332; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2.0 V</span><span class=\"hqt\" style=\"display:none\">2.0 V</span>",
      "<span class=\"eqt\">1.5 V</span><span class=\"hqt\" style=\"display:none\">1.5 V</span>",
      "<span class=\"eqt\">3.0 V</span><span class=\"hqt\" style=\"display:none\">3.0 V</span>",
      "<span class=\"eqt\">2.5 V</span><span class=\"hqt\" style=\"display:none\">2.5 V</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Triple A batteries are often used for small electronic devices such as TV remote controls, kitchen timers, graphing calculators, and bathroom scales. AAA batteries, like AA batteries, also measure at <b>1.5V</b>, but generate less energy due to their smaller size.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The equation F= k(q<sub>1</sub> x q<sub>2</sub>/q<sub>1</sub>) is representation of: </p><p>(Where F is the attractive or repulsive electric force of two point charges q<sub>1</sub> and q<sub>2</sub> and r is the distance between two charges)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2368;&#2325;&#2352;&#2339; F= k(q<sub>1</sub> x q<sub>2</sub>/q<sub>1</sub>) &#2344;&#2367;&#2350;&#2381;&#2344; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;:</p><p>(&#2332;&#2361;&#2366;&#2305; F &#2342;&#2379; &#2348;&#2367;&#2344;&#2381;&#2342;&#2369; &#2310;&#2357;&#2375;&#2358;&#2379;&#2306; q<sub>1</sub> &#2340;&#2341;&#2366; q<sub>2</sub> &#2325;&#2366; &#2310;&#2325;&#2352;&#2381;&#2359;&#2325; &#2351;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2352;&#2381;&#2359;&#2368; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2348;&#2354; &#2361;&#2376; &#2340;&#2341;&#2366; r &#2342;&#2379; &#2310;&#2357;&#2375;&#2358;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2361;&#2376;)</p></span>",
    "options": [
      "<span class=\"eqt\">Coulomb's law</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2370;&#2354;&#2377;&#2350; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Biot-Savart law</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2351;&#2379;&#2335;-&#2360;&#2366;&#2357;&#2352;&#2381;&#2340; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Charle's law</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;&#2381;&#2354;&#2381;&#2360; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Ohm's law</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2350; &#2325;&#2366;&#2344;&#2370;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Coulomb's Law describes the electrostatic force between two stationary, electrically charged particles.</p><p>&bull; Formulated by French physicist Charles-Augustin de Coulomb in 1785, it states that the magnitude of the electrostatic force (F) between two point charges is directly proportional to the product of the magnitudes of the charges and inversely proportional to the square of the distance (r) between them.&#8203;</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a conductor?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2319;&#2325; &#2360;&#2369;&#2330;&#2366;&#2354;&#2325; <b>&#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Hard rubber</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2336;&#2379;&#2352; &#2352;&#2348;&#2352;</span>",
      "<span class=\"eqt\">Copper</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2305;&#2348;&#2366;</span>",
      "<span class=\"eqt\">Silver</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2305;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Nickel</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2325;&#2375;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Hard rubber</b> is not a conductor of electricity because it is an insulator. Insulators, like hard rubber, have high resistance to the flow of electric current. They do not allow electric charges to move freely through them and therefore do not conduct electricity.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the correct statement.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Resistance of a wire depends on the length and density of the wire.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2340;&#2366;&#2352; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2328;&#2344;&#2340;&#2381;&#2357; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Specific resistance is the same for all conductors.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2360;&#2349;&#2368; &#2330;&#2366;&#2354;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Resistance of a wire depends on the length and cross-section of the wire.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2340;&#2366;&#2352; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2309;&#2344;&#2369;&#2346;&#2381;&#2352;&#2360;&#2381;&#2341; &#2325;&#2366;&#2335; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Specific resistance is dependent on the cross-sectional area of the wire.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2340;&#2366;&#2352; &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2381;&#2352;&#2360;&#2381;&#2341; &#2325;&#2366;&#2335; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Resistance of a wire depends upon:</p><p>&#183; Length of wire: Resistance is directly proportional to the length of a wire.</p><p>&#183; Area of a cross-section of wire: Resistance is inversely proportional to the area of cross-section the wire.</p><p>&#183; The temperature of the wire: Resistance of a wire is directly proportional to the temperature of the wire.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>An electric iron requires a ________ fuse to prevent short-circuiting.</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2367;&#2325; &#2310;&#2351;&#2352;&#2344; &#2325;&#2379; &#2358;&#2377;&#2352;&#2381;&#2335;-&#2360;&#2352;&#2381;&#2325;&#2367;&#2335;&#2367;&#2306;&#2327; &#2325;&#2379; &#2352;&#2379;&#2325;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; ________ &#2347;&#2381;&#2351;&#2370;&#2332; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">5 A</span><span class=\"hqt\" style=\"display:none\">5 &#2319;</span>",
      "<span class=\"eqt\">3 A</span><span class=\"hqt\" style=\"display:none\">3 &#2319;</span>",
      "<span class=\"eqt\">2 A</span><span class=\"hqt\" style=\"display:none\">2 &#2319;</span>",
      "<span class=\"eqt\">4 A</span><span class=\"hqt\" style=\"display:none\">4 &#2319;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>An electric iron typically requires a <b>5-ampere fuse</b> to protect against short circuits and overloads, ensuring safe operation.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which device is used to either break electric circuit or to complete it?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2346;&#2352;&#2367;&#2346;&#2341; &#2325;&#2379; &#2340;&#2379;&#2337;&#2364;&#2344;&#2375; &#2351;&#2366; &#2313;&#2360;&#2375; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2313;&#2346;&#2325;&#2352;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Insulators</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2360;&#2369;&#2354;&#2375;&#2335;&#2352;/&#2352;&#2379;&#2343;&#2368;</span>",
      "<span class=\"eqt\">Wires</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Switch</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2367;&#2330;</span>",
      "<span class=\"eqt\">Bulb</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2354;&#2381;&#2348;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>An electric <b>switch</b> is a device that can either interrupt or complete an electric circuit.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Materials that allow electric current to pass through them are called ______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2375; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2367;&#2351;&#2366;&#2306; &#2332;&#2379; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2343;&#2366;&#2352;&#2366; &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; &#2309;&#2306;&#2342;&#2352; &#2360;&#2375; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2306;, ______ &#2325;&#2361;&#2354;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">insulators</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2379;&#2343;&#2325; (&#2311;&#2344;&#2381;&#2360;&#2354;&#2375;&#2335;&#2352;)</span>",
      "<span class=\"eqt\">alternator</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340;&#2381;&#2352; (&#2310;&#2354;&#2381;&#2335;&#2352;&#2381;&#2344;&#2375;&#2335;&#2352;)</span>",
      "<span class=\"eqt\">conductors</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2367;&#2330;&#2366;&#2354;&#2325; (&#2325;&#2306;&#2337;&#2325;&#2381;&#2335;&#2352;)</span>",
      "<span class=\"eqt\">capacitor</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2343;&#2366;&#2352;&#2367;&#2340;&#2381;&#2352; (&#2325;&#2376;&#2346;&#2360;&#2367;&#2335;&#2352;)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p></p><p>Materials that allow electric current to pass through them are called <b>conductors</b>. Conductors have a high number of free electrons that are able to move easily within the material, allowing for the flow of electric charge or current.</p><p> </p>",
    "question_index": 8
