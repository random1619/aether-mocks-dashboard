    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Purvanchal Himalayas does NOT comprise of:</p>",
    "options": [
      "Naga hills",
      "Pir Panjal range",
      "Manipur hills",
      "Mizo hills"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Pir Panjal range is part of the western Himalayas, not the Purvanchal Himalayas.</p>",
    "question_index": 0
  },
  {
    "question": "<p><img width=44 height=1 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20788/image012.png\">As the river enters the plain it twists and turns forming large bends known as</p>",
    "options": [
      "ox-bow",
      "levees",
      "floodplains",
      "meanders"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Meander</b> is when water flows in a curvy, bendy path, like a snake. As a river makes its way through an area that is relatively flat, it often develops bends as it erodes its way through the path of least resistance. Once a meander starts, it often becomes more and more exaggerated.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Which of the following is an example of young fold mountain ranges?</p>",
    "options": [
      "Appalachains mountain range",
      "Alps mountain range",
      "Aravali mountain range",
      "Ural mountain range"
    ],
    "correct_option_id": 1,
    "solution": "<p>There are three types of mountains- Fold Mountains, Block Mountains and the Volcanic Mountains. The Himalayan Mountains and the<b> Alps</b> are young fold mountains with rugged relief and high conical peaks. The Aravali range in India is one of the oldest fold mountain systems in the world. The range has considerably worn down due to the processes of erosion. The Appalachians in North America and the Ural mountains in Russia have rounded features and low elevation. They are very old fold mountains.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Read the given characteristic features of the Indian Desert. Which statement is NOT correct about the Indian Desert?</p>",
    "options": [
      "It receives 500 mm rainfall per year.",
      "It has sand dunes.",
      "It lies northwest of the Aravalli hills.",
      "It is also known as Marusthali."
    ],
    "correct_option_id": 0,
    "solution": "<p>Characteristics of Indian Desert:</p><p>&#183; It receives very low rainfall about 100 mm or less in west and about low rainfall for 500 mm or less in east.</p><p>&#183; It is an undulating sandy plain covered with sand dunes.</p><p>&#183; It lies towards the western margins of the Aravalli Hills.</p><p>&#183; It is also known as Marusthali.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Which of the following is an example of intrusive igneous rocks?</p>",
    "options": [
      "Basalt",
      "Obsidian",
      "Granite",
      "Pumice"
    ],
    "correct_option_id": 2,
    "solution": "<p>Igneous rocks are formed from the solidification of molten rock material. Some form below Earth's surface. Some form on or above Earth's surface. </p><p>Intrusive igneous rocks crystallize below Earth's surface, and the slow cooling that occurs there allows large crystals to form. Examples of intrusive igneous rocks are: diabase, diorite, gabbro, <b>granite, </b>pegmatite, and peridotite.</p><p>Extrusive igneous rocks erupt onto the surface, where they cool quickly to form small crystals. Some cool so quickly that they form an amorphous glass. These rocks include: andesite, <b>basalt, obsidian, pumice, </b>and tuff.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Which of the following hills and their region are correctly matched?</p>",
    "options": [
      "Patkai hills  -  Western ghats",
      "Mizo hills  -  Eastern ghats",
      "Shevaroy hills  -  Western ghats",
      "Javadi hills  -  Eastern ghats"
    ],
    "correct_option_id": 3,
    "solution": "<p>Patkai and Mizo hills are part of Purvanchal, also called Eastern Highlands, mountain ranges in eastern India.</p><p>Shevaroy and Javadi hills in Tamil Nadu are part of the Eastern Ghats.</p>",
    "question_index": 5
  },
  {
    "question": "<p>In West Bengal, how many rice crops are grown in a year?</p>",
    "options": [
      "Three",
      "Two",
      "Four",
      "One"
    ],
    "correct_option_id": 0,
    "solution": "<p>West Bengal, the largest producer of rice in India, grows three main rice crops in a year:</p><p>1) Aus (pre-monsoon, sown in March-April, harvested in July-August).</p><p>2) Aman (monsoon, sown in June-July, harvested in November-December).</p><p>3) Boro (winter, sown in November-December, harvested in April-May).</p>",
    "question_index": 6
  },
  {
    "question": "<p>Kamet is the second highest peak in the state of ________.</p>",
    "options": [
      "Uttarakhand",
      "Kerala",
      "Mizoram",
      "Sikkim"
    ],
    "correct_option_id": 0,
    "solution": "<p>Kamet Himalayan peak is located in the Chamoli district of <b>Uttarakhand</b> in the northern Himalayas. It is the third-highest peak of the country with a height of 7,756 m. In the Garhwal region, it is the second-highest peak, after Nanda Devi. </p>",
    "question_index": 7
  },
  {
    "question": "<p>Which physical feature of India prevents the cold winds from central Asia from entering the Indian subcontinents?</p>",
    "options": [
      "Indian plains",
      "Indian desert",
      "Coastal area",
      "Himalayas"
    ],
    "correct_option_id": 3,
    "solution": "<p>The <b>Himalayas</b> prevent the cold winds from Central Asia from entering the Indian subcontinent. The massive mountain range acts as a barrier, blocking the frigid winds that would otherwise make the climate much colder in the region, especially during winter.</p>",
    "question_index": 8
  },
  {
    "question": "<p>What is the average elevation of the Eastern Ghats of India?</p>",
    "options": [
      "400 metres",
      "200 metres",
      "600 metres",
      "900 metres"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Eastern Ghats are a discontinuous range of mountains along India's eastern coast. Their average elevation is generally considered to be around <b>600 metres (approximately 2,000 feet)</b> above sea level. They are lower in altitude and less continuous compared to the Western Ghats.</p><p>While some peaks in the Eastern Ghats reach higher elevations (e.g., Arma Konda at around 1,680 metres, Jindhagada Peak at 1,690 metres), the <i>average</i> elevation is lower than 900 metres.</p><p><b>Further insights:</b></p><p>&#8226; The Eastern Ghats stretch from Odisha in the north, through Andhra Pradesh and Telangana, to Tamil Nadu in the south, passing some parts of Karnataka.</p><p>&#8226; They are eroded and broken by several major rivers of peninsular India, such as the Mahanadi, Godavari, Krishna, and Kaveri, which flow eastward into the Bay of Bengal.</p><p>&#8226; The elevation varies considerably along their length, with some sections being prominent hills and others being more subdued.</p>",
    "question_index": 9
  },
  {
    "question": "<p>What is the name of the northern part of the western coastal plain between Mumbai and Goa?</p>",
    "options": [
      "Coromandel coast",
      "Malabar coast",
      "Kannad plain",
      "Konkan coast"
    ],
    "correct_option_id": 3,
    "solution": "<p>The northern part of the western coastal plain of India, extending roughly from Daman in the north to Goa in the south (thus including the stretch between Mumbai and Goa), is known as the <b>Konkan Coast</b>.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; Coromandel Coast: This is the southeastern coastal plain of India, extending from Kanyakumari to the delta of the Krishna River.</p><p>&#8226; Malabar Coast: This is the southwestern coastal plain of India, generally extending from Goa southwards to Kanyakumari, encompassing the coast of Kerala.</p><p>&#8226; Kannad Plain (or Karnataka Coast): This is the central stretch of the western coastal plain, located in Karnataka, between the Konkan Coast to the north and the Malabar Coast to the south.</p><p><b>Further insights:</b></p><p>&#8226; The Western Coastal Plains are relatively narrow and are characterized by estuaries, lagoons, and backwaters (kayals, especially in Kerala).</p><p>&#8226; The Konkan Coast is known for its scenic beauty, with hills of the Western Ghats extending close to the sea, and numerous ports.</p>",
    "question_index": 10
  },
  {
    "question": "<p>In which of the following districts of Rajasthan are the 'Barchans' found?</p>",
    "options": [
      "Udaipur",
      "Jaisalmer",
      "Bhilwara",
      "Alwar"
    ],
    "correct_option_id": 1,
    "solution": "<p>Barchans are crescent-shaped sand dunes typically found in desert regions.</p><p>Key Points:</p><p>Characteristic of the Thar Desert in Rajasthan</p><p>Jaisalmer is located in the heart of the Thar Desert</p><p>Barchans form in areas with limited sand supply and consistent wind direction</p><p>Shaped like a crescent with two curved horns pointing downwind</p><p>Typical of arid and semi-arid regions</p><p>Move slowly across the desert landscape</p><p>Important geological feature of desert ecosystems</p>",
    "question_index": 11
  },
  {
    "question": "<p>Which plateaus are very fertile because they are rich in black soil that is very good for farming?</p><p><b>Options:</b></p>",
    "options": [
      "African Plateau",
      "Ethiopian Plateau",
      "Katanga Plateau",
      "Deccan Lava Plateau"
    ],
    "correct_option_id": 3,
    "solution": "<p>1) <b>About the Deccan Lava Plateau:</b></p><p>o Located in <b>India</b>, this plateau is formed by volcanic eruptions that created extensive deposits of basalt rock. Over time, the weathering of basalt rock produced <b>black soil</b> (Regur soil), which is rich in minerals like calcium carbonate, magnesium, potash, and lime.</p><p>o Black soil is ideal for growing crops like cotton, sugarcane, and pulses, making the plateau one of the most agriculturally productive regions in India.</p><p>2) <b>Incorrect Options:</b></p><p>o <b>African Plateau:</b> While parts of it are fertile, it is not known specifically for black soil.</p><p>o <b>Ethiopian Plateau:</b> Fertility varies across regions, and it lacks black soil deposits.</p><p>o <b>Katanga Plateau:</b> Known for its rich mineral resources (copper and cobalt) rather than fertile black soil.</p>",
    "question_index": 12
  },
  {
    "question": "<p>In which direction is the general elevation of the peninsular plateau of India?</p>",
    "options": [
      "From North to South",
      "From West to East",
      "From South to North",
      "From East to West"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>Peninsular Plateau of India</b> (also called the Deccan Plateau) has a general elevation trend of <b>sloping from West to East</b>.</p><p>&#183; <b>Western Edge (Higher Elevation):</b></p><p>o The plateau is bounded by the <b>Western Ghats (Sahyadri Range)</b>, which are higher (avg. elevation: 900 - 1600 m).</p><p>o This side receives heavy rainfall due to the Arabian Sea branch of monsoon winds.</p><p>&#183; <b>Eastern Edge (Lower Elevation):</b></p><p>o The <b>Eastern Ghats</b> are more eroded and discontinuous, with lower elevations (avg. 600 m).</p><p>o Rivers like the <b>Godavari, Krishna, and Kaveri</b> flow eastward, draining into the Bay of Bengal.</p>",
    "question_index": 13
  },
  {
    "question": "<p>What is the name of the physical feature that is the longitudinal valley lying between the Lesser Himalayas and the Siwalik in India?</p>",
    "options": [
      "Duns",
      "Doab",
      "Bhabhar",
      "Terai"
    ],
    "correct_option_id": 0,
    "solution": "<p>The longitudinal valleys lying between the Lesser Himalayas (Himachal range) and the Outer Himalayas (Siwalik range) are known as <b>Duns</b> (or Doons). These are typically broad, flat-floored valleys filled with gravel and alluvial deposits.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; Doab: A doab is a term used in India and Pakistan for a tract of land lying between two converging, or confluent, rivers.</p><p>&#8226; Bhabhar: The Bhabhar is a narrow, porous, gravel-strewn belt at the foothills of the Siwaliks, where streams often disappear underground. It lies south of the Siwaliks.</p><p>&#8226; Terai: The Terai is a belt of marshy grasslands, savannas, and forests located south of the Bhabhar region, where the underground streams reappear on the surface.</p><p><b>Further insights:</b></p><p>&#8226; Famous examples of Duns include Dehradun (the largest Dun), Kotli Dun, and Patli Dun in Uttarakhand and Himachal Pradesh.</p><p>&#8226; These valleys are generally fertile and support agriculture and human settlements.</p><p>&#8226; They are formed due to the folding and faulting processes associated with the formation of the Himalayas.</p>",
    "question_index": 14
  },
  {
    "question": "<p>The Great Rann of Kutch falls into______region of India.</p>",
    "options": [
      "Eastern Ghats",
      "Coastal Plains",
      "Thar Desert",
      "Northern Plain"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Great Rann of Kutch is a salt marsh situated in Gujarat's Kutch District, India, within the <b>Thar Desert</b>.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Choose the correct statements about the islands of India.</p><p>a. Lakshadweep Islands are composed of coral islands.</p><p>b. Andaman and Nicobar islands are composed of coral islands.</p><p>c. It is believed that Lakshadweep islands are an elevated portion of submarine mountains.</p><p>d. It is believed that Andaman and Nicobar islands are an elevated portion of submarine mountains.</p>",
    "options": [
      "b and c",
      "a and b",
      "a and d",
      "c and d"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let's analyze each statement:</p><p>&#183; <b>a.Lakshadweep Islands are composed of coral islands.</b> This is correct. The Lakshadweep archipelago consists of atolls, which are ring-shaped coral reefs or islands.</p><p>&#183; b. Andaman and Nicobar islands are composed of coral islands. This is partially true but largely incorrect as a primary description. While there are coral reefs surrounding parts of the Andaman and Nicobar Islands, the islands themselves are primarily volcanic in origin, forming an archipelago that is the emergent part of a submarine mountain range.</p><p>&#183; c. It is believed that Lakshadweep islands are an elevated portion of submarine mountains. This is incorrect. They are atolls formed by coral growth on submerged volcanic features, but their primary composition is coral. The submarine mountain idea is more applicable to the Andaman and Nicobar Islands.</p><p>&#183; <b>d. It is believed that Andaman and Nicobar islands are an elevated portion of submarine mountains.</b> This is correct. These islands are considered to be the above-sea-level peaks of a submerged mountain range that extends from the Arakan Yoma range in Myanmar to the Indonesian archipelago.</p><p>Therefore, the correct statements are 'a' and 'd'.</p><p><b>Further insights:</b></p><p>&#8226; <b>Lakshadweep Islands:</b> Located in the Arabian Sea, they are a group of 36 coral atolls and reefs. Their formation is attributed to the accumulation of coral polyps on submerged volcanic formations of the Chagos-Laccadive Ridge.</p><p>&#8226; <b>Andaman and Nicobar Islands:</b> Located in the Bay of Bengal, these islands are an archipelago forming a union territory of India. They represent the peaks of a submerged mountain range resulting from the collision of the Indian Plate with the Eurasian Plate. Some islands, like Barren Island, have active volcanoes. While fringing coral reefs are present, the islands' core is not primarily coral.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Through which of the following actions does the lithosphere move over the asthenosphere?</p>",
    "options": [
      "Weathering",
      "Continental drift",
      "Plate tectonics",
      "Deposition"
    ],
    "correct_option_id": 2,
    "solution": "<p>The theory, which solidified in the 1960s, transformed the earth sciences by explaining many phenomena, including mountain building events, volcanoes, and earthquakes. In <b>plate tectonics</b>, Earth's outermost layer, or lithosphere - made up of the crust and upper mantle - is broken into large rocky plates.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Which is the largest part of the northern plains and is formed of older alluvium?</p>",
    "options": [
      "Terai",
      "Bhangar",
      "Khadar",
      "Bhabar"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Bhangar region is composed of older alluvial soil and lies above the floodplains. It consists of clay and kankar (lime nodules) deposits. In contrast, Khadar is the newer alluvium, which is more fertile due to annual flooding by rivers.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Which is the waterbody that separates Andaman Islands and Nicobar Islands?</p>",
    "options": [
      "Eight Degree Channel",
      "Nine Degree Channel",
      "Ten Degree Channel",
      "Eleven Degree Channel"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Ten Degree Channel</b> is the waterbody that <b>separates the Andaman Islands from the Nicobar Islands</b>.</p><p>&#183; It lies approximately along the <b>10&deg; north latitude</b>, hence the name.</p><p>&#183; This channel is about <b>150 km wide</b> and lies between <b>Little Andaman</b> (to the north) and <b>Car Nicobar</b> (to the south).</p><p>&#183; It is a part of the <b>Bay of Bengal</b>.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Channel Name</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Separates</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Eight Degree Channel</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lakshadweep islands (Minicoy and Maldives)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Nine Degree Channel</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Kalpeni and Suheli Par islands (in Lakshadweep)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Ten Degree Channel</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Andaman Islands and Nicobar Islands</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Eleven Degree Channel</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Not commonly referenced in Indian maritime zones</td></tr></table>",
    "question_index": 19
  }
];
    </script>
