    "correct_option_id": 0,
    "solution": "<p>The Patiala Gharana of Hindustani classical music was founded in the mid-19th century by Ustad <b>Ali Baksh Khan</b> and his friend Ustad Fateh Ali Khan (who were known as \"Aliya-Fattu\"). Ali Baksh Khan was the father of the legendary Ustad Bade Ghulam Ali Khan, who is one of the most celebrated exponents of this gharana.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; Nathu Khan: A sarangi player, possibly associated with various styles but not a founder of Patiala Gharana in the primary sense.</p><p>&#8226; Abdul Wahid Khan: One of the founders of the Kirana Gharana.</p><p>&#8226; Chhaju Khan: Associated with the Bhendibazaar Gharana.</p><p><b>Further insights:</b></p><p>&#8226; The Patiala Gharana is known for its romantic and expressive style, intricate taans (fast melodic passages), layakari (rhythmic play), and the use of sargams (solfege).</p><p>&#8226; It incorporates elements from other gharanas like Gwalior, Jaipur, and Kirana.</p><p>&#8226; Prominent vocalists of this gharana include Ustad Bade Ghulam Ali Khan, Ustad Amanat Ali Khan, Ustad Fateh Ali Khan (nephew of Bade Ghulam Ali Khan), Parveen Sultana, and Ajoy Chakrabarty.</p>",

    "question_index": 1
  },

    "options": [
      "<span class=\"eqt\">a-iv, b-iii, c-ii, d-i</span><span class=\"hqt\" style=\"display:none\">&#2319;-iv, &#2348;&#2368;-iii, &#2360;&#2368;-ii, &#2337;&#2368;-i</span>",

    "correct_option_id": 3,
    "solution": "<p>&#61623; Santoor - Pt. Shiv Kumar Sharma</p><p>&#183; Pt. Shiv Kumar Sharma is the most famous Santoor player in India and is credited with popularizing it in Hindustani classical music.</p><p>&#61623; Sitar - Anoushka Shankar</p><p>&#183; Anoushka Shankar, daughter of Ravi Shankar, is an internationally recognized Sitar player.</p><p>&#61623; Shehnai - Ustad Bismillah Khan</p><p>&#183; Ustad Bismillah Khan is synonymous with the Shehnai and played a crucial role in elevating its status in classical music.</p><p>&#61623; Sarangi - Ustad Binda Khan</p><p>&#183; Ustad Binda Khan was a noted Sarangi player in Hindustani classical music.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Famous musician Shakoor Khan was associated with which of the following musical instruments?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2360;&#2306;&#2327;&#2368;&#2340;&#2325;&#2366;&#2352; &#2358;&#2325;&#2370;&#2352; &#2326;&#2366;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2366;&#2342;&#2381;&#2351; &#2351;&#2306;&#2340;&#2381;&#2352; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;?</p></span>",

    "question": "<span class=\"eqt\"><p>Which of the following is called the cyclic arrangement of time units in Hindustani Classical music?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2361;&#2367;&#2306;&#2342;&#2369;&#2360;&#2381;&#2340;&#2366;&#2344;&#2368; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2360;&#2306;&#2327;&#2368;&#2340; &#2350;&#2375;&#2306; &#2360;&#2350;&#2351; &#2311;&#2325;&#2366;&#2311;&#2351;&#2379;&#2306; &#2325;&#2368; &#2330;&#2325;&#2381;&#2352;&#2368;&#2351; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">Jati</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Tala</b> refers to the <b>cyclic rhythmic framework</b> in Hindustani classical music. </p><p>&#183; Each Tala has a specific number of beats (matras) arranged in groups called vibhags, and these cycles repeat throughout the performance. </p><p>&#183; Musicians keep track of the Tala through hand gestures called kriyas (including claps and waves), which mark important points in the rhythmic cycle.</p><p>&#183; Examples: <i>Teental</i> (16 beats), <i>Jhaptal</i> (10 beats), <i>Ektaal</i> (12 beats).</p><p>Why Not Others?</p><p>&#183; <b>Alap</b>: Unmetered, free-flowing melodic introduction.</p><p>&#183; <b>Raga</b>: Melodic scale/mood (not time-bound).</p><p>&#183; <b>Jati </b>: Classification of ragas or talas by structure.</p><p><b>Key Point</b>: Tala is the <b>metrical cycle</b> that musicians and percussionists (e.g., tabla players) follow.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>With which of the following musical instruments is the musician Zakir Hussain associated?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2327;&#2368;&#2340;&#2325;&#2366;&#2352; &#2332;&#2366;&#2325;&#2367;&#2352; &#2361;&#2369;&#2360;&#2376;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2366;&#2342;&#2381;&#2351; &#2351;&#2306;&#2340;&#2381;&#2352; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;?</p></span>",

    "correct_option_id": 3,
    "solution": "<p><b>Ustad Zakir Hussain</b> (born 9 March 1951) is an Indian tabla player, composer, percussionist, music producer and film actor.</p><p>He was awarded the Padma shari in 1988, the Padma Bhushan in 2002, and the Padma Vibhushan in 2023, by the Government of India.<sup> </sup>He was also awarded the Govt of India's Sangeet Natak Academy in 1990, Fellowship of the Sangeet Natak Academy fellowship Ratna Sadsya in 2018.</p>",
