    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A circular coil having 'n' turns produces a field ______________ times larger than that produced by a single turn.</p></span><span class=\"hqt\" style=\"display:none\">'n' &#2347;&#2375;&#2352;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2325;&#2369;&#2306;&#2337;&#2354;&#2368;, &#2319;&#2325; &#2347;&#2375;&#2352;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2375; ______________ &#2327;&#2369;&#2344;&#2366; &#2348;&#2337;&#2364;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">2n</span><span class=\"hqt\" style=\"display:none\">2&#2319;&#2344;</span>",
      "<span class=\"eqt\">n</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;</span>",
      "<span class=\"eqt\">4n</span><span class=\"hqt\" style=\"display:none\">4&#2319;&#2344;</span>",
      "<span class=\"eqt\">3n</span><span class=\"hqt\" style=\"display:none\">3&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The magnetic field produced by a circular coil is directly proportional to the number of turns. If a coil has n turns, the field strength is n times that of a single-turn coil. This is because the field contributions from each turn add up constructively.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct?</p><p>Statements:</p><p>1) Ampere's Law describes the relationship between electric current and the magnetic field it produces.</p><p>2) Maxwell's equations are a set of four fundamental equations governing electric and magnetic fields in the absence of charges and currents.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344;:</p><p>1) &#2319;&#2350;&#2381;&#2346;&#2368;&#2351;&#2352; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2343;&#2366;&#2352;&#2366; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2348;&#2306;&#2343; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2350;&#2376;&#2325;&#2381;&#2360;&#2357;&#2375;&#2354; &#2325;&#2375; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2310;&#2357;&#2375;&#2358;&#2379;&#2306; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366;&#2323;&#2306; &#2325;&#2368; &#2309;&#2344;&#2369;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2324;&#2352; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2330;&#2366;&#2352; &#2350;&#2380;&#2354;&#2367;&#2325; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2366; &#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only Statement 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 2</span>",
      "<span class=\"eqt\">Neither Statement 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2325;&#2341;&#2344; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>",
      "<span class=\"eqt\">Both Statements 1 and 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only Statement 1</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 1</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Ampere's Law establishes a direct connection between electric currents and the magnetic fields they generate. This implies that the magnetic field in a region is influenced by the electric currents flowing in that region.</p><p>&bull; Maxwell's equations govern electric and magnetic fields in all scenarios, not just in the absence of charges and currents.</p><p>&bull; Maxwell's equations are four fundamental equations describing electric and magnetic fields:</p><p>&#9675; Gauss's Law for Electricity</p><p>&#9675; Gauss's law for Magnetism</p><p>&#9675; Faraday's Law of Induction</p><p>&#9675; Ampere-Maxwell Law</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The net magnetic flux through any closed surface is zero.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2348;&#2306;&#2342; &#2360;&#2340;&#2361; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2358;&#2369;&#2342;&#2381;&#2343; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2358;&#2370;&#2344;&#2381;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Magnetic flux is a vector quantity.</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2319;&#2325; &#2360;&#2342;&#2367;&#2358; &#2311;&#2325;&#2366;&#2312; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Earth's magnetic poles coincide with the geographic poles.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2375; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2343;&#2381;&#2352;&#2369;&#2357; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2343;&#2381;&#2352;&#2369;&#2357;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2375;&#2354; &#2326;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Two magnetic field lines may intersect.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Flux of magnetic field Through a closed surface is equal to zero</b> because Magnetic field lines are close curves, they don't have any beginning or end.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The induced current is the highest when the direction of motion of the coil is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2343;&#2366;&#2352;&#2366; &#2340;&#2348; &#2313;&#2330;&#2381;&#2330;&#2340;&#2350; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2348; &#2325;&#2369;&#2306;&#2337;&#2354;&#2368; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; ______</p></span>",
    "options": [
      "<span class=\"eqt\">not at right angles to the magnetic field</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2350;&#2325;&#2379;&#2339; &#2346;&#2352; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">at right angles to the electricity</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2350;&#2325;&#2379;&#2339; &#2346;&#2352; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">at right angles to the electric source</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2360;&#2381;&#2352;&#2379;&#2340; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2350;&#2325;&#2379;&#2339; &#2346;&#2352; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">at right angles to the magnetic field</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2350;&#2325;&#2379;&#2339; &#2346;&#2352; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>When the direction of motion of the coil is at right angles to the magnetic field, the induced current is the highest.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which device is used to measure the current flow using needle deflection caused by a magnetic field force acting upon a current-carrying wire?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2343;&#2366;&#2352;&#2366; &#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2340;&#2366;&#2352; &#2346;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351;&#2352;&#2340; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2348;&#2354; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2360;&#2369;&#2312; &#2325;&#2375; &#2357;&#2367;&#2325;&#2381;&#2359;&#2375;&#2346;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2343;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2325;&#2379; &#2350;&#2366;&#2346;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2313;&#2346;&#2325;&#2352;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Galvanometer</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2332;&#2354;&#2368; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2344;&#2366;&#2346;&#2344;&#2375; &#2325;&#2366; &#2351;&#2306;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Psophometer</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2347;&#2364;&#2379;&#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Potentiometer</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2344;&#2366;&#2357; &#2344;&#2366;&#2346;&#2344;&#2375; &#2325;&#2366; &#2351;&#2306;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Ammeter</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;&#2381;&#2350;&#2367;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; A <b>galvanometer</b> is an <b>electromechanical instrument</b> used to <b>detect and measure small electric currents</b>.</p><p>&#183; It works on the principle that a <b>magnetic field exerts a force on a current-carrying conductor</b>, causing <b>needle deflection</b> proportional to the current.</p><p>&#183; It's primarily used in <b>laboratories</b> and as the basis for constructing other devices like <b>ammeters</b> and <b>voltmeters</b>.</p><p><b>Other Options:</b></p><p>&#183; <b>Psophometer</b>: Measures noise in telephone circuits (not current).</p><p>&#183; <b>Potentiometer</b>: Measures voltage (potential difference) precisely.</p><p>&#183; <b>Ammeter</b>: Measures current <b>directly</b>, often based on galvanometer design, but can handle higher currents.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In the Right-Hand Thumb Rule, the thumb is directed towards the direction of:</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2366;&#2361;&#2367;&#2344;&#2375; &#2361;&#2366;&#2341; &#2325;&#2375; &#2309;&#2306;&#2327;&#2370;&#2336;&#2375; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2350;&#2375;&#2306;, &#2309;&#2306;&#2327;&#2370;&#2336;&#2375; &#2325;&#2379; &#2311;&#2360; &#2342;&#2367;&#2358;&#2366; &#2325;&#2368; &#2323;&#2352; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</span>",
    "options": [
      "<span class=\"eqt\">Current</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2332;&#2370;&#2342;&#2366;</span>",
      "<span class=\"eqt\">Electric field</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Motion of the conductor</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2337;&#2325;&#2381;&#2335;&#2352; &#2325;&#2368; &#2327;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Magnetic field</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The Right-Hand Thumb Rule, formulated by John Ambrose Fleming, is used in electromagnetism to determine the direction of the magnetic field around a current-carrying conductor.</p><p>&bull; According to this rule:</p><p>o If the right-hand thumb points in the direction of the current,</p><p>o The curled fingers indicate the direction of the magnetic field.</p><p>&bull; This rule is essential in understanding electromagnetism and its applications, such as in electric motors and generators.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>What do you call the effect of splitting of a spectral line into several components in the presence of a static magnetic field?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2381;&#2341;&#2367;&#2352; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2360;&#2381;&#2346;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2350;&#2368; &#2352;&#2375;&#2326;&#2366; &#2325;&#2375; &#2325;&#2312; &#2360;&#2306;&#2328;&#2335;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2346;&#2366;&#2335;&#2344; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Askaryan effect</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360;&#2381;&#2325;&#2376;&#2352;&#2367;&#2351;&#2344; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Zeeman effect</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2350;&#2344; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Bezold effect</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2332;&#2377;&#2354;&#2381;&#2337; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Domino effect</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2377;&#2350;&#2367;&#2344;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;</span>"
