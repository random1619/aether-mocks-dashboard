<body>
    <!-- Welcome Screen -->

            <div class="welcome-header" style="margin-bottom: 24px;">

                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">

        </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is correct regarding Qutb-ud-din Aibak's rule?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2369;&#2340;&#2369;&#2348;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2320;&#2348;&#2325; &#2325;&#2375; &#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">He was the first ruler to assume the title of Sultan of Delhi.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2325;&#2375; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344; &#2325;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2343;&#2366;&#2352;&#2339; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2361;&#2354;&#2375; &#2358;&#2366;&#2360;&#2325; &#2341;&#2375;&#2404;</span>",
      "<span class=\"eqt\">He completed the construction of the Qutub Minar.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2325;&#2369;&#2340;&#2369;&#2348; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2346;&#2370;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">His reign was marked by the construction of many educational institutions.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2325;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2309;&#2344;&#2375;&#2325; &#2358;&#2376;&#2325;&#2381;&#2359;&#2339;&#2367;&#2325; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2323;&#2306; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2361;&#2369;&#2310;&#2404;</span>",
      "<span class=\"eqt\">He was known as 'Lakh Baksh' for his generosity.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2344;&#2368; &#2313;&#2342;&#2366;&#2352;&#2340;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2357;&#2375; '&#2354;&#2366;&#2326;&#2348;&#2326;&#2381;&#2358;' &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2375; &#2332;&#2366;&#2340;&#2375; &#2341;&#2375;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; He was called 'Lakh Baksh' for his generosity.</p><p>&bull; Qutb-ud-din Aibak never assumed the title of Sultan; Iltutmish was the first to do so.</p><p>&bull; Iltutmish completed the construction of the Qutub Minar.</p><p>&bull; Aibak is not known for constructing educational institutions.</p><p><b>Further Insight:</b></p><p>&bull; <b>Mamluk (Slave) Dynasty (1206-1290 AD)</b></p><p>&bull; <b>Qutb-ud-din Aibak (1206 - 1210 AD)</b></p><p>&#9675; <b>Founder</b> of the Mamluk Dynasty.</p><p>&#9675; The <b>first Turk ruler</b> of Delhi.</p><p>&#9675; Held the positions of <b>Malik</b> and <b>Sipahsalar</b> but did not assume the title of Sultan.</p><p>&#9675; <b>Capital:</b> Lahore.</p><p>&#9675; Known as <b>'Lakh Baksh'</b> for his generosity.</p><p>&#9675; Initiated the construction of the <b>Qutub Minar</b>.</p><p>&#9675; Died in 1210 AD due to a sudden fall from a horse while playing Chaugan.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was NOT introduced by Shams-ud-din Iltutmish?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2358;&#2350;&#2381;&#2360;-&#2313;&#2342;-&#2342;&#2368;&#2344; &#2311;&#2354;&#2381;&#2340;&#2369;&#2340;&#2350;&#2367;&#2358; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2375;&#2358; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chalisa (Chahalgani)</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2354;&#2368;&#2360;&#2366; (&#2330;&#2361;&#2354;&#2327;&#2366;&#2344;&#2368;)</span>",
      "<span class=\"eqt\">Iqta system</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2325;&#2381;&#2340;&#2366; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Circulation of silver 'Taka' coins</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2306;&#2342;&#2368; &#2325;&#2375; '&#2335;&#2325;&#2366;' &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2330;&#2354;&#2344;</span>",
      "<span class=\"eqt\">The system of Diwan-e-Ariz</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2368;&#2357;&#2366;&#2344;-&#2319;-&#2310;&#2352;&#2367;&#2332;&#2364; &#2325;&#2368; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Iltutmish formed the Chalisa or Chahalgani. He introduced the Iqta system.</p><p>&bull; He introduced the silver 'Taka' coins.</p><p>&bull; <b>The system of Diwan-e-Ariz, dealing with military administration, was introduced by Ghiyas-ud-din Balban.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Shams-ud-din Iltutmish (1211 - 1236 AD)</b></p><p>&#9675; Belonged to the Shamshi lineage and was the<b> real founder of Turkish rule in India.</b></p><p>&#9675; <b>First ruler of Delhi to assume the title of Sultan.</b></p><p>&#9675; Completed the Qutub Minar.</p><p>&#9675; Introduced the Iqta system, granting land in lieu of cash salaries.</p><p>&#9675; Established the circulation of silver 'Taka' and copper 'Jeetal' coins.</p><p>&#9675; Composed the Chalisa (Chahalgani) and was known as the 'Father of Dome Construction' in India.</p><p>&#9675; <b>Shift Capital to Delhi.</b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which ruler of the Mamluk Dynasty is credited with laying the foundation of Turkish rule in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2350;&#2354;&#2369;&#2325; &#2357;&#2306;&#2358; &#2325;&#2375; &#2325;&#2367;&#2360; &#2358;&#2366;&#2360;&#2325; &#2325;&#2379; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2340;&#2369;&#2352;&#2381;&#2325;&#2368; &#2358;&#2366;&#2360;&#2344; &#2325;&#2368; &#2344;&#2368;&#2306;&#2357; &#2352;&#2326;&#2344;&#2375; &#2325;&#2366; &#2358;&#2381;&#2352;&#2375;&#2351; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Razia Sultan</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2332;&#2367;&#2351;&#2366; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Ghiyas-ud-din Balban</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2351;&#2366;&#2360;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2348;&#2354;&#2348;&#2344;</span>",
      "<span class=\"eqt\">Iltutmish</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2381;&#2340;&#2369;&#2340;&#2350;&#2367;&#2358;</span>",
      "<span class=\"eqt\">Qutb-ud-din Aibak</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2340;&#2369;&#2348;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2320;&#2348;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Iltutmish is considered the real founder of Turkish rule in India</b></p><p>&bull; Razia Sultan was notable as the first and only woman ruler but did not lay the foundation.</p><p>&bull; Balban strengthened the monarchy but did not lay the foundation.</p><p>&bull; Aibak began Turkish rule, but Iltutmish solidified it.</p><p><b>Further Insight:</b></p><p>&bull; <b>Shams-ud-din Iltutmish (1211 - 1236 AD)</b></p><p>&#9675; Belonged to the Shamshi lineage and was the<b> real founder of Turkish rule in India.</b></p><p>&#9675; <b>First ruler of Delhi to assume the title of Sultan.</b></p><p>&#9675; Completed the Qutub Minar.</p><p>&#9675; Introduced the Iqta system, granting land in lieu of cash salaries.</p><p>&#9675; Established the circulation of silver 'Taka' and copper 'Jeetal' coins.</p><p>&#9675; Composed the Chalisa (Chahalgani) and was known as the 'Father of Dome Construction' in India.</p><p>&#9675; <b>Shift Capital to Delhi.</b></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following measures was NOT implemented by Alauddin Khilji?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2313;&#2346;&#2366;&#2351; &#2309;&#2354;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2326;&#2367;&#2354;&#2332;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2366;&#2327;&#2370; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Introduction of the market control system</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2332;&#2366;&#2352; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2346;&#2352;&#2367;&#2330;&#2351;</span>",
      "<span class=\"eqt\">Imposition of Jazia on non-Muslims</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2352;-&#2350;&#2369;&#2360;&#2354;&#2350;&#2366;&#2344;&#2379;&#2306; &#2346;&#2352; &#2332;&#2332;&#2367;&#2351;&#2366; &#2325;&#2352; &#2354;&#2327;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Ban on alcohol consumption</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2352;&#2366;&#2348; &#2325;&#2375; &#2360;&#2375;&#2357;&#2344; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2306;&#2343;</span>",
      "<span class=\"eqt\">Establishment of a permanent army</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2360;&#2375;&#2344;&#2366; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The imposition of Jazia is attributed to Firoz Shah Tughlaq.</p><p>&bull; Alauddin Khilji is famous for his market control system.</p><p>&bull; Khilji implemented a ban on alcohol. He established a large permanent army.</p><p><b>Further Insight:</b></p><p>&bull; <b>Alauddin Khilji (1296 - 1316 AD)</b></p><p>&#9675; Son of <b>Shihabuddin Khilji</b>.</p><p>&#9675; Formed a large, <b>permanent army</b> and initiated several <b>expansion campaigns</b>.</p><p>&#9675; Notable conquests:</p><p>&#9632; <b>Somnath Temple</b> demolition in 1301 AD.</p><p>&#9632; <b>Ranthambore</b> in 1303 AD.</p><p>&#9632; <b>Chittor</b> in 1309 AD.</p><p>&#9632; <b>Siwana</b> and other regions under the southern campaign led by <b>Malik Kafur</b>.</p><p>&#9675; Implemented a <b>ban on alcohol</b> and established a <b>market control system</b>.</p><p>&#9675; Instituted <b>Diwan-e-Riyasat</b> and <b>Shahane-Mandi</b>.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What was the primary objective of Alauddin Khilji's southern campaigns?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2354;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2326;&#2367;&#2354;&#2332;&#2368; &#2325;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2368; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Expansion of trade routes</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2350;&#2366;&#2352;&#2381;&#2327;&#2379;&#2306; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Acquisition of wealth and resources</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2344; &#2324;&#2352; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2325;&#2366; &#2309;&#2352;&#2381;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Strengthening alliances with local rulers</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2358;&#2366;&#2360;&#2325;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2327;&#2336;&#2348;&#2306;&#2343;&#2344; &#2325;&#2379; &#2350;&#2332;&#2348;&#2370;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Spreading Islam in southern India</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2311;&#2360;&#2381;&#2354;&#2366;&#2350; &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The campaigns were aimed at acquiring wealth, especially under the leadership of Malik Kafur.</b></p><p><b>Further Insight:</b></p><p>&bull; Alauddin Khilji (1296-1316)</p><p>o Killed his father-in-law Jalaluddin Khilji and succeeded the throne</p><p>o He won Gujarat (1298), Ranthambhor (1301), </p><p>&#9642; Alauddin Army led by Malik Kafur defeated</p><p>&bull; Yadavs of Devagiri</p><p>&bull; Kakatiya's of Warangal</p><p>&bull; Hoysalas of Dwarsamudra</p><p>&bull; Pandya of Madurai</p><p>o Reforms by Khilji</p><p>&#9642; Issued 4 ordinance to control the noble of the Empire</p><p>&#9642; Introduce the system of Dagh (branding of horse) and Chehra (descriptive identity of soldier)</p><p>&#9642; Market reform to control the market.</p><p>&#9642; Introduce new land revenue system known as kharja in which all the land was to be measured and state share was to be fixed its about 50% of the peasant production.</p><p>&bull; Form special officer called Mustakharaj for collection of revenue.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following correctly describes Jalal-ud-din Firuz Khilji's governance policy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2332;&#2354;&#2366;&#2354;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2347;&#2364;&#2367;&#2352;&#2379;&#2332;&#2364; &#2326;&#2367;&#2354;&#2332;&#2368; &#2325;&#2368; &#2358;&#2366;&#2360;&#2344; &#2344;&#2368;&#2340;&#2367; &#2325;&#2366; &#2360;&#2361;&#2368; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">He was known for his harsh 'Policy of Blood and Iron.'</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2309;&#2346;&#2344;&#2368; &#2325;&#2336;&#2379;&#2352; '&#2352;&#2325;&#2381;&#2340; &#2324;&#2352; &#2354;&#2380;&#2361; &#2325;&#2368; &#2344;&#2368;&#2340;&#2367;' &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2332;&#2366;&#2340;&#2375; &#2341;&#2375;&#2404;</span>",
      "<span class=\"eqt\">He established a liberal policy of non-interference.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2309;&#2361;&#2360;&#2381;&#2340;&#2325;&#2381;&#2359;&#2375;&#2346; &#2325;&#2368; &#2313;&#2342;&#2366;&#2352; &#2344;&#2368;&#2340;&#2367; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2368;&#2404;</span>",
      "<span class=\"eqt\">He prioritized military expansion throughout his reign.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2346;&#2370;&#2352;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2360;&#2376;&#2344;&#2381;&#2351; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366; &#2342;&#2368;&#2404;</span>",
      "<span class=\"eqt\">He shifted the capital from Delhi to Devagiri.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2325;&#2379; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2375; &#2342;&#2375;&#2357;&#2327;&#2367;&#2352;&#2368; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Jalal-ud-din Firuz Khilji adopted a liberal policy of non-interference.</b></p><p>&bull; 'Policy of Blood and Iron' was associated with Ghiyas-ud-din Balban.</p><p>&bull; The capital was shifted to Devagiri by Muhammad bin Tughlaq.</p><p><b>Further Insight:</b></p><p>&bull; <b>Jalal-ud-din Firuz Khilji (1290 - 1296 AD)</b></p><p>&#9675; <b>Founder</b> of the Khilji Dynasty.</p><p>&#9675; Initially a <b>commander</b> during Balban's tenure and was granted the title <b>'Shaista Khan'</b>.</p><p>&#9675; Adopted a <b>liberal policy</b> of <b>'non-interference'</b>, abandoning the previous <b>'Policy of Blood and Iron'</b>.</p><p>&#9675; Faced Mongol attacks led by <b>Abdullah</b> in 1292 AD.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following reforms by Muhammad bin Tughlaq is considered a failure?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2369;&#2361;&#2350;&#2381;&#2350;&#2342; &#2348;&#2367;&#2344; &#2340;&#2369;&#2327;&#2354;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2319; &#2327;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2369;&#2343;&#2366;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2360;&#2347;&#2354; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">Expansion of the postal system</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2366;&#2325; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Establishment of Diwan-e-Koh&#238; for agricultural improvements</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2368;&#2357;&#2366;&#2344;-&#2319;-&#2325;&#2379;&#2361; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Canal digging for irrigation</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2306;&#2330;&#2366;&#2312; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2361;&#2352; &#2326;&#2369;&#2342;&#2366;&#2312;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>The introduction of brass and copper coins was a failure due to forgery issues.</b></p><p>&bull; The postal system was expanded successfully.</p><p>&bull; Diwan-e-Koh&#238; aimed at agriculture but faced limited success.</p><p>&bull; Canal digging for irrigation was generally successful.</p><p><b>Further Insight:</b></p><p>&bull; <b>Muhammad bin Tughlaq (Jauna Khan)</b></p><p>&#9675; 1325 to 1351 AD</p><p>&#9675; The boundaries of the Delhi Sultanate expanded the most during his reign.</p><p>&#9675; Original name <b>Ulug Khan</b></p><p>&#9675; Imposed taxes on houses and pastures as well</p><p>&#9675; The separate agriculture department was named<b> Diwan-e-Koh&#7881;.</b></p><p>&#9675; Dug the most number of canals</p><p>&#9675; <b>Shifted the capital from Delhi to Devagiri (Daulatabad)</b></p><p>&#9675; <b>He issued brass and copper coins.</b></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which city was NOT founded by Firoz Shah Tughlaq?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2358;&#2361;&#2352; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2347;&#2367;&#2352;&#2379;&#2332; &#2358;&#2366;&#2361; &#2340;&#2369;&#2327;&#2354;&#2325; &#2344;&#2375; &#2344;&#2361;&#2368;&#2306; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Firozabad</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2367;&#2352;&#2379;&#2332;&#2366;&#2348;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Fatehabad</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2340;&#2375;&#2361;&#2366;&#2348;&#2366;&#2342;</span>",

    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Devagiri was associated with Muhammad bin Tughlaq, not Firoz Shah.</p><p>&bull; Firozabad was founded by Firoz Shah.</p><p>&bull; Fatehabad was founded by Firoz Shah.</p><p>&bull; Jaunpur was founded by Firoz Shah.</p><p><b>Further Insight:</b></p><p>&bull; <b>Firoz Shah Tughlaq (1351 - 1388 AD)</b></p><p>&#9675; Known as the <b>'Akbar of the Sultanate period'</b>.</p><p>&#9675; Collected four main taxes: <b>Kharaj</b> (land tax), <b>Zakat</b> (from Muslims), <b>Jazia</b> (from non-Muslims), and <b>Khums</b> (goods looted in war).</p><p>&#9675; Founded cities like <b>Hisar, Firozabad, Fatehabad, Firoz Shah Kotla,</b> and <b>Jaunpur</b>.</p><p>&#9675; Built canals, hospitals, mosques, and reconstructed structures like the <b>Qutub Minar</b>.</p><p>&#9675; Established <b>Diwan-e-Bandagan</b> for slaves and <b>Diwan-e-Khairat</b> for charity.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which title did Khizr Khan adopt during his reign?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2326;&#2367;&#2332;&#2381;&#2352; &#2326;&#2366;&#2306; &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2343;&#2366;&#2352;&#2339; &#2325;&#2368;?</p></span>",
    "options": [

      "<span class=\"eqt\">Shah</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2361;</span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Khizr Khan adopted the title 'Rayat-e-Aala.'</p><p><b>Further Insight:</b></p><p><b>Sayyid Dynasty (1414 - 1451 AD)</b></p><p>&bull; <b>Khizr Khan (1414 - 1421 AD)</b></p><p>&#9675; <b>Founder</b> of the Sayyid Dynasty.</p><p>&#9675; Former governor of <b>Multan</b> and <b>Timur's deputy</b> in India.</p><p>&#9675; Did not take the title of Sultan, instead used <b>\"Rayat-e-Aala\"</b>.</p><p>&#9675; Described by historian Farista as a <b>just and generous ruler</b>.</p><p>&bull; <b>Alam Shah (1445 - 1451 AD)</b></p><p>&#9675; The <b>last ruler</b> of the Sayyid Dynasty.</p><p>&#9675; Voluntarily <b>abdicated the throne</b> in favor of <b>Bahlol Lodi</b>, marking the transition to the Lodi Dynasty.</p>",
    "question_index": 8
  },
  {

    "options": [
      "<span class=\"eqt\">Battle of Panipat</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2344;&#2368;&#2346;&#2340; &#2325;&#2368; &#2354;&#2337;&#2364;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Timur's invasion</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2376;&#2350;&#2370;&#2352; &#2325;&#2366; &#2310;&#2325;&#2381;&#2352;&#2350;&#2339;</span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Sayyid Dynasty was founded after Timur's invasion.</p><p>&bull; The First Battle of Panipat is associated with the Mughals foundation.</p><p><b>Further Insight:</b></p><p><b>Sayyid Dynasty (1414 - 1451 AD)</b></p><p>&bull; <b>Khizr Khan (1414 - 1421 AD)</b></p><p>&#9675; <b>Founder</b> of the Sayyid Dynasty.</p><p>&#9675; <b>Former governor of Multan and Timur's deputy in India.</b></p><p>&#9675; Did not take the title of Sultan, instead used <b>\"Rayat-e-Aala\"</b>.</p><p>&#9675; Described by historian Farista as a <b>just and generous ruler</b>.</p><p>&bull; <b>Alam Shah (1445 - 1451 AD)</b></p><p>&#9675; The <b>last ruler</b> of the Sayyid Dynasty.</p><p>&#9675; Voluntarily <b>abdicated the throne</b> in favor of <b>Bahlol Lodi</b>, marking the transition to the Lodi Dynasty.</p>",
    "question_index": 9
  },
  {

    "options": [

      "<span class=\"eqt\">Ibrahim Lodi</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2348;&#2381;&#2352;&#2366;&#2361;&#2368;&#2350; &#2354;&#2379;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Firoz Shah Tughlaq</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2367;&#2352;&#2379;&#2332; &#2358;&#2366;&#2361; &#2340;&#2369;&#2327;&#2354;&#2325;</span>"

    "solution": "<p>&bull; Sikandar Lodi founded Agra in 1504</p><p>&bull; Bahlol Lodi founded the Lodhi dynasty</p><p><b>Further Insight:</b></p><p>&bull; <b>Sikandar Lodi (1489 - 1517 AD)</b></p><p>&#9675; Son of Bahlol Lodi.</p><p>&#9675; Introduced the <b>Gaje Sikandari</b> standard for measuring land.</p><p>&#9675; <b>Founded the city of Agra</b> in 1504 AD and <b>shifted the capital</b> there in 1506 AD due to its strategic location.</p><p>&#9675; Imposed <b>Jazia</b> on Hindus and banned certain Islamic practices to consolidate power.</p><p>&#9675; Faced military challenges, notably attacks on <b>Gwalior Fort</b>, which were repelled by Raja Man Singh.</p><p>&#9675; Died in 1517 AD due to a throat disease.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about Ghiyas-ud-din Balban:</p><p>(a) He established the practice of 'Sijda' and 'Pabos'.</p><p>(b) He implemented the 'Policy of Blood and Iron'.</p><p>(c) He introduced silver 'Taka' and copper 'Jeetal' coins.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2351;&#2366;&#2360;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2348;&#2354;&#2348;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2313;&#2360;&#2344;&#2375; '&#2360;&#2367;&#2332;&#2342;&#2366;' &#2324;&#2352; '&#2346;&#2366;&#2348;&#2379;&#2360;' &#2325;&#2368; &#2346;&#2381;&#2352;&#2341;&#2366; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;&#2404;</p><p>(b) &#2313;&#2360;&#2344;&#2375; '&#2352;&#2325;&#2381;&#2340; &#2324;&#2352; &#2354;&#2380;&#2361; &#2325;&#2368; &#2344;&#2368;&#2340;&#2367;' &#2354;&#2366;&#2327;&#2370; &#2325;&#2368;&#2404;</p><p>(c) &#2313;&#2360;&#2344;&#2375; &#2330;&#2366;&#2306;&#2342;&#2368; &#2325;&#2375; '&#2335;&#2325;&#2366;' &#2324;&#2352; &#2340;&#2366;&#2306;&#2348;&#2375; &#2325;&#2375; '&#2332;&#2368;&#2340;&#2354;' &#2360;&#2367;&#2325;&#2381;&#2325;&#2375; &#2330;&#2354;&#2366;&#2319;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",

    "correct_option_id": 1,
    "solution": "<p>&bull; Balban introduced the practices of 'Sijda' (prostration) and 'Pabos' (kissing the feet).</p><p>&bull; Balban's policy of Blood and Iron aimed at strengthening the monarchy.</p><p>&bull; The silver 'Taka' and copper 'Jeetal' coins were introduced by Iltutmish.</p><p><b>Further Insight:</b></p><p>&bull; <b>Ghiyas-ud-din Balban (1266 - 1287 AD)</b></p><p>&#9675; The <b>9th Sultan</b> of the Mamluk Dynasty.</p><p>&#9675; A former <b>slave of Iltutmish</b> who rose to power.</p><p>&#9675; Advocated the <b>theory of monarchy</b> and the <b>divine right of kings</b>.</p><p>&#9675; Established practices like <b>'Sijda'</b> and <b>'Pabos'</b> and celebrated the Iranian festival <b>'Nowroz'</b>.</p><p>&#9675; Reorganized the army through <b>'Diwan-e-Ariz'</b> and implemented the <b>'Policy of Blood and Iron'</b>.</p><p>&#9675; <b>Capital:</b> Delhi.</p><p>&bull; <b>Last Ruler: Shamsuddin Qumars (1286 - 1290 AD)</b></p><p>&#9675; His reign marked the end of the Mamluk Dynasty, leading to the rise of the Khilji Dynasty.</p>",

    "solution": "<p>&bull; Alauddin Khilji prohibited the consumption of alcohol.</p><p>&bull; He implemented market reforms and introduced price controls.</p><p>&bull; Alauddin's forces sacked Gujarat and destroyed the Somnath Temple.</p><p><b>Further Insight:</b></p><p>&bull; <b>Alauddin Khilji (1296 - 1316 AD)</b></p><p>&#9675; Son of <b>Shihabuddin Khilji</b>.</p><p>&#9675; Formed a large, <b>permanent army</b> and initiated several <b>expansion campaigns</b>.</p><p>&#9675; Notable conquests include:</p><p>&#9632; <b>Somnath Temple</b> demolition in 1301 AD.</p><p>&#9632; <b>Ranthambore</b> in 1303 AD.</p><p>&#9632; <b>Chittor</b> in 1309 AD.</p><p>&#9632; Alauddin Army led by Malik Kafur defeated</p><p>&bull; Yadavs of Devagiri</p><p>&bull; Kakatiyas of Warangal</p><p>&bull; Hoysalas of Dwarsamudra</p><p>&bull; Pandya of Madurai</p><p>&#9675; Implemented a <b>ban on alcohol</b> and established a <b>market control system</b>.</p><p>&#9675; Instituted <b>Diwan-e-Riyasat</b> and <b>Shahane-Mandi</b>.</p><p>&#9675; Died in 1316 AD.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about Malik Kafur, Alauddin Khilji's general:</p><p>(a) He led successful campaigns in the Deccan, extending the Sultanate's control.</p><p>(b) He was originally a Hindu but converted to Islam.</p><p>(c) He led the final attack that resulted in Alauddin Khilji's death.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2354;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2326;&#2367;&#2354;&#2332;&#2368; &#2325;&#2375; &#2360;&#2375;&#2344;&#2366;&#2346;&#2340;&#2367; &#2350;&#2354;&#2367;&#2325; &#2325;&#2366;&#2347;&#2370;&#2352; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2313;&#2360;&#2344;&#2375; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2325;&#2375; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2340;&#2375; &#2361;&#2369;&#2319; &#2342;&#2325;&#2381;&#2325;&#2344; &#2350;&#2375;&#2306; &#2360;&#2347;&#2354; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344;&#2379;&#2306; &#2325;&#2366; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>(b) &#2357;&#2361; &#2350;&#2370;&#2354; &#2352;&#2370;&#2346; &#2360;&#2375; &#2361;&#2367;&#2306;&#2342;&#2370; &#2341;&#2366;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2313;&#2360;&#2344;&#2375; &#2311;&#2360;&#2381;&#2354;&#2366;&#2350; &#2343;&#2352;&#2381;&#2350; &#2309;&#2346;&#2344;&#2366; &#2354;&#2367;&#2351;&#2366;&#2404;</p><p>(c) &#2313;&#2360;&#2344;&#2375; &#2309;&#2306;&#2340;&#2367;&#2350; &#2361;&#2350;&#2354;&#2375; &#2325;&#2366; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2325;&#2367;&#2351;&#2366;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2309;&#2354;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2326;&#2367;&#2354;&#2332;&#2368; &#2325;&#2368; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2361;&#2379; &#2327;&#2312;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about Muhammad bin Tughlaq:</p><p>(a) He shifted the capital from Delhi to Devagiri (Daulatabad).</p><p>(b) He introduced brass and copper currency which failed due to forgery.</p><p>(c) He was successful in increasing agricultural productivity by establishing the Diwan-e-Koh&#238;.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2369;&#2361;&#2350;&#2381;&#2350;&#2342; &#2348;&#2367;&#2344; &#2340;&#2369;&#2327;&#2354;&#2325; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2313;&#2360;&#2344;&#2375; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2325;&#2379; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2375; &#2342;&#2375;&#2357;&#2327;&#2367;&#2352;&#2368; (&#2342;&#2380;&#2354;&#2340;&#2366;&#2348;&#2366;&#2342;) &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>(b) &#2313;&#2360;&#2344;&#2375; &#2346;&#2368;&#2340;&#2354; &#2324;&#2352; &#2340;&#2366;&#2306;&#2348;&#2375; &#2325;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2332;&#2379; &#2332;&#2366;&#2354;&#2360;&#2366;&#2332;&#2368; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2357;&#2367;&#2347;&#2354; &#2361;&#2379; &#2327;&#2312;&#2404;</p><p>(c) &#2357;&#2361; &#2342;&#2368;&#2357;&#2366;&#2344;-&#2319;-&#2325;&#2379;&#2361; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2352;&#2325;&#2375; &#2325;&#2371;&#2359;&#2367; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2360;&#2347;&#2354; &#2352;&#2361;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",

    "correct_option_id": 1,
    "solution": "<p>&bull; Muhammad bin Tughlaq moved the capital to Daulatabad.</p><p>&bull; His introduction of copper and brass coins failed due to counterfeit issues.</p><p>&bull; The Diwan-e-Koh&#238; project was unsuccessful in improving agriculture.</p><p><b>Further Insight:</b></p><p>&bull; <b>Reforms of Muhammad bin Tughlaq</b></p><p>&#9675; <b>Token Currency Reform</b></p><p>&#9632; Introduced copper coins due to silver shortage.</p><p>&#9632; Failure: Led to widespread counterfeiting.</p><p>&#9675; <b>Taxation in Doab</b></p><p>&#9632; Increased land tax in the fertile Doab region.</p><p>&#9632; Failure: Coincided with famine, causing revolts.</p><p>&#9675; <b>Shifting Capital to Daulatabad</b></p><p>&#9632; Moved capital from Delhi to Daulatabad.</p><p>&#9632; Failure: Caused hardship; later reversed.</p><p>&#9675; <b>Agricultural Reforms (Diwan-i-Kohi)</b></p><p>&#9632; Loans to farmers to cultivate barren land.</p><p>&#9632; Failure: Poor planning; abandoned due to financial losses.</p><p>&#9675; <b>Military Expansion</b></p><p>&#9632; Ambitious campaigns in Central Asia.</p><p>&#9632; Failure: Drained resources, no lasting success.</p><p>&#9675; Revenue Reforms</p><p>&#9632; Streamlined revenue collection and imposed house taxes.</p><p>&#9632; Failure: Led to widespread discontent.</p><p>&#9675; Promotion of Trade</p><p>&#9632; Improved trade routes and infrastructure.</p><p>&#9632; Failure: Other failed policies overshadowed benefits.</p><p>&#9675; <b>Agricultural Loans (Taqavi)</b></p><p>&#9632; Loans to farmers for seeds/tools after famine.</p><p>&#9632; Mixed success: Some benefit, but corruption hindered results.</p><p>&#9675; Irrigation Projects</p><p>&#9632; Built canals for improved agriculture.</p><p>&#9632; Limited success: Poor execution.</p>",
    "question_index": 14
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about Firoz Shah Tughlaq:</p><p>(a) He imposed the Jazia tax on non-Muslims.</p><p>(b) He established new cities like Hisar, Firozabad, and Fatehabad.</p><p>(c) He implemented the 'Policy of Blood and Iron' to strengthen his rule.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2367;&#2352;&#2379;&#2332; &#2358;&#2366;&#2361; &#2340;&#2369;&#2327;&#2354;&#2325; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2313;&#2360;&#2344;&#2375; &#2327;&#2376;&#2352;-&#2350;&#2369;&#2360;&#2354;&#2350;&#2366;&#2344;&#2379;&#2306; &#2346;&#2352; &#2332;&#2332;&#2367;&#2351;&#2366; &#2325;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366;&#2404;</p><p>(b) &#2313;&#2360;&#2344;&#2375; &#2361;&#2367;&#2360;&#2366;&#2352;, &#2347;&#2367;&#2352;&#2379;&#2332;&#2366;&#2348;&#2366;&#2342; &#2324;&#2352; &#2347;&#2340;&#2375;&#2361;&#2366;&#2348;&#2366;&#2342; &#2332;&#2376;&#2360;&#2375; &#2344;&#2319; &#2358;&#2361;&#2352; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2319;&#2404;</p><p>(c) &#2313;&#2360;&#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2358;&#2366;&#2360;&#2344; &#2325;&#2379; &#2350;&#2332;&#2348;&#2370;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; '&#2352;&#2325;&#2381;&#2340; &#2324;&#2352; &#2354;&#2380;&#2361; &#2325;&#2368; &#2344;&#2368;&#2340;&#2367;' &#2354;&#2366;&#2327;&#2370; &#2325;&#2368;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [

      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">a, b and c</span><span class=\"hqt\" style=\"display:none\">a, b , c</span>"

    "solution": "<p>&bull; Firoz Shah imposed the Jazia tax.</p><p>&bull; He founded new cities, including Firozabad and Fatehabad.</p><p>&bull; The 'Policy of Blood and Iron' was implemented by Balban, not Firoz Shah.</p><p><b>Further Insight:</b></p><p>&bull; <b>Firoz Shah Tughlaq (1351 - 1388 AD)</b></p><p>&#9675; Known as the <b>'Akbar of the Sultanate period'</b>.</p><p>&#9675; Collected four main taxes: <b>Kharaj</b> (land tax), <b>Zakat</b> (from Muslims), <b>Jazia</b> (from non-Muslims), and <b>Khums</b> (goods looted in war).</p><p>&#9675; Founded cities like <b>Hisar, Firozabad, Fatehabad, Firoz Shah Kotla,</b> and <b>Jaunpur</b>.</p><p>&#9675; Built canals, hospitals, mosques, and reconstructed structures like the <b>Qutub Minar</b>.</p><p>&#9675; Established <b>Diwan-e-Bandagan</b> for slaves and <b>Diwan-e-Khairat</b> for charity.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about Khizr Khan, the founder of the Sayyid Dynasty:</p><p>(a) He was the governor of Multan before founding the Sayyid Dynasty.</p><p>(b) He assumed the title of Sultan upon ascending the throne.</p><p>(c) He ruled as a deputy of Timur in India.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2376;&#2351;&#2381;&#2351;&#2342; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358; &#2325;&#2375; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325; &#2326;&#2367;&#2332;&#2381;&#2352; &#2326;&#2366;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2357;&#2361; &#2360;&#2376;&#2351;&#2381;&#2351;&#2342; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2350;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344; &#2325;&#2366; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352; &#2341;&#2366;&#2404;</p><p>(b) &#2313;&#2360;&#2344;&#2375; &#2360;&#2367;&#2306;&#2361;&#2366;&#2360;&#2344; &#2346;&#2352; &#2330;&#2338;&#2364;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344; &#2325;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2343;&#2366;&#2352;&#2339; &#2325;&#2368;&#2404;</p><p>(c) &#2313;&#2360;&#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2340;&#2376;&#2350;&#2370;&#2352; &#2325;&#2375; &#2337;&#2367;&#2346;&#2381;&#2335;&#2368; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2358;&#2366;&#2360;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",

    "solution": "<p>&bull; Khizr Khan was previously the governor of Multan.</p><p>&bull; He did not assume the title of Sultan.</p><p>&bull; He ruled as Timur's deputy in India.</p><p><b>Further Insight:</b></p><p><b>Sayyid Dynasty (1414 - 1451 AD)</b></p><p>&bull; <b>Khizr Khan (1414 - 1421 AD)</b></p><p>&#9675; <b>Founder</b> of the Sayyid Dynasty.</p><p>&#9675; <b>Former governor of Multan and Timur's deputy in India.</b></p><p>&#9675; Did not take the title of Sultan, instead used <b>\"Rayat-e-Aala\"</b>.</p><p>&#9675; Described by historian Farista as a <b>just and generous ruler</b>.</p><p>&bull; <b>Alam Shah (1445 - 1451 AD)</b></p><p>&#9675; The <b>last ruler</b> of the Sayyid Dynasty.</p><p>&#9675; Voluntarily <b>abdicated the throne</b> in favor of <b>Bahlol Lodi</b>, marking the transition to the Lodi Dynasty.</p>",

    "solution": "<p>&bull; Iltutmish introduced the <b>Iqta system</b>.</p><p>&bull; Balban established the <b>Diwan-e-Ariz</b> to reorganize the army.</p><p>&bull; Alauddin Khilji introduced <b>Diwan-e-Riyasat</b> for market control.</p><p>&bull; Firoz Shah Tughlaq established the <b>Diwan-e-Bandagan</b> to manage slaves.</p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Ruler</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Department</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Head of Department</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Primary Function</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Iltutmish (1211-1236)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Diwan-i-Risalat</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sadr-us-Sudur</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Managed religious matters and endowments, oversaw Islamic law.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Alauddin Khilji (1296-1316)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Diwan-i-Mustakhraj</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Revenue Officer</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Collected arrears from tax defaulters, oversaw state revenue collections.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ghiyasuddin Tughlaq (1320-1325)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Diwan-i-Kohi</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Agricultural Officer</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Implemented agrarian reforms, promoted better irrigation systems, and
