<body>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Who is responsible for appointing the Prime Minister of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chief Justice of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>",
      "<span class=\"eqt\">Speaker of Lok Sabha</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2325; &#2360;&#2349;&#2366; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;</span>",
      "<span class=\"eqt\">President of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Vice President of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>The President of India appoints the Prime Minister.</b></p><p>&bull; The Chief Justice of India and Speaker of Lok Sabha do not have this power, and the Vice President's role is limited to presiding over Rajya Sabha.</p><p>&bull; President is mentioned under Article 53</p><p>&bull; <b>The President appoints all the executive posts such as the Ministers, Bureaucrats under Union Government body, Head of the constitutional and Statutory body.</b></p><p><b>Further Insight:</b></p><p>&bull; Speaker of Lok Sabha is the presiding officer of the Lok Sabha or House of People and mentioned in Article 93 of the Constitution.</p><p>&bull; The Chief Justice of India is the Executive Head of the Supreme Court of India mentioned in Article 124.</p><p>&bull; Vice President is the Ex-officio chairman of the Rajya Sabha mentioned under Article 63.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The President of India can grant pardons under which Article of the Constitution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2375; &#2340;&#2361;&#2340; &#2325;&#2381;&#2359;&#2350;&#2366;&#2342;&#2366;&#2344; &#2342;&#2375; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 72</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 72</span>",
      "<span class=\"eqt\">Article 73</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 73</span>",
      "<span class=\"eqt\">Article 74</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 74</span>",
      "<span class=\"eqt\">Article 75</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 75</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Article 72 provides the President with the power to grant pardons, reprieves, and commutations</b>.</p><p>&bull; Only the President has the power to Pardon death sentence and the Military and Governor can't use its Pardoning power in these cases. (Governor has pardoning power under Article 162).</p><p><b>Further Insight:</b></p><p>&bull; Article 73 - Extent of executive power of the Union.</p><p>&bull; Article 74 - Council of Ministers headed by the Prime Minister to aid and advise the President.</p><p>&bull; Article 75  -  Appointment of PM by President and other Ministers on advice of Prime Minister.</p><p>&#9675; o The total number of Ministers, including the Prime Minister, in the Council of Ministers shall not exceed fifteen per cent. of the total number of members of the House of the People.</p><p>o The Council of Ministers shall be collectively responsible to the House of the People.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Evaluate the following statements about the Vice President of India:</p><p>a) The Vice President of India presides over the Lok Sabha sessions.</p><p>b) The Vice President is elected for a term of 5 years.</p><p>c) The Vice President acts as President in the absence of the President.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><p>a) &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2360;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;&#2340;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>b) &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; 5 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2330;&#2369;&#2344;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>c) &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; &#2309;&#2344;&#2369;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; The <b>Vice President presides over the Rajya Sabha (Article 64), not the Lok Sabha</b>.</p><p>&bull; The Vice President is <b>elected for a term of 5 years</b> (Article 67).</p><p>&bull; The Vice President<b> acts as President in the absence of the President (Article 65).</b></p><p><b>Further Insight:</b></p><p>&bull; The Vice President is elected by Members of the Both Houses of Parliament(Article 66) while the President is elected by only elected members of Parliament and state legislative assembly(Article 54).</p><p>&bull; <b>Vice President of India</b>:</p><p>&bull; <b>Article 63</b>: There shall be a Vice-President of India.</p><p>&bull; <b>Article 64</b>: Vice-President is the ex-officio Chairman of Rajya Sabha.</p><p>&bull; <b>Article 65</b>: Acts as President in case of vacancy or absence.</p><p>&bull; <b>Article 66</b>: Elected by an electoral college of Parliament.</p><p>&bull; <b>Article 67</b>: Holds office for a five-year term.</p><p>&bull; <b>Article 68</b>: Election to be held before term ends or within six months of vacancy.</p><p>&bull; <b>Article 69</b>: Takes oath before the President or designated officer.</p><p>&bull; <b>Article 70</b>: Performs President's duties if both offices are vacant.</p><p>&bull; <b>Article 71</b>: Supreme Court handles election disputes of President or Vice-President.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The Vice President of India is elected by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2366; &#2330;&#2369;&#2344;&#2366;&#2357; &#2325;&#2367;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">The members of Lok Sabha</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2325; &#2360;&#2349;&#2366; &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351;</span>",
      "<span class=\"eqt\">The members of Rajya Sabha</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2349;&#2366; &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351;</span>",
      "<span class=\"eqt\">The elected members of Parliament</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2367;&#2340; &#2360;&#2342;&#2360;&#2381;&#2351;</span>",
      "<span class=\"eqt\">The elected and nominated members of Parliament</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2367;&#2340; &#2324;&#2352; &#2350;&#2344;&#2379;&#2344;&#2368;&#2340; &#2360;&#2342;&#2360;&#2381;&#2351;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>o <b>Under Article 66, The Vice President is elected by an Electoral College consisting of the members of both Houses of Parliament.</b></p><p>o State Legislatures are not involved in this election.</p><p><b>Further Insight:</b></p><p>&bull; <b>Vice President of India</b>:</p><p>&bull; <b>Article 63</b>: There shall be a Vice-President of India.</p><p>&bull; <b>Article 64</b>: Vice-President is the ex-officio Chairman of Rajya Sabha.</p><p>&bull; <b>Article 65</b>: Acts as President in case of vacancy or absence.</p><p>&bull; <b>Article 66</b>: Elected by an electoral college of Parliament.</p><p>&bull; <b>Article 67</b>: Holds office for a five-year term.</p><p>&bull; <b>Article 68</b>: Election to be held before term ends or within six months of vacancy.</p><p>&bull; <b>Article 69</b>: Takes oath before the President or designated officer.</p><p>&bull; <b>Article 70</b>: Performs President's duties if both offices are vacant.</p><p>&bull; <b>Article 71</b>: Supreme Court handles election disputes of President or Vice-President.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The Attorney General of India advises the government on:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2361;&#2366;&#2344;&#2381;&#2351;&#2366;&#2351;&#2357;&#2366;&#2342;&#2368; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2367;&#2359;&#2351;&#2379;&#2306; &#2346;&#2352; &#2360;&#2354;&#2366;&#2361; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Economic policies</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367;&#2351;&#2366;&#2306;</span>",
      "<span class=\"eqt\">Legal matters</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2350;&#2366;&#2350;&#2354;&#2375;</span>",
      "<span class=\"eqt\">Foreign relations</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2352;&#2367;&#2358;&#2381;&#2340;&#2375;</span>",
      "<span class=\"eqt\">Budgeting</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2332;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The <b>Attorney General provides legal advice to the government</b>.</p><p>&bull; Economic policies, foreign relations, and budgeting are not the primary responsibilities of the Attorney General.</p><p><b>Further Insight:</b></p><p>&bull; Mention under Article 76 of constitution</p><p>&bull; The <b>Attorney General is a kind of lawyer for the Government of India and is the highest law officer of the country</b>.</p><p>&bull; For appointment he must possess the same qualification as a Judge of the Supreme court.</p><p>&bull; Hold office during pleasure of the President i.e can be removed any time.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The Attorney General of India is appointed for period of:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2361;&#2366;&#2344;&#2381;&#2351;&#2366;&#2351;&#2357;&#2366;&#2342;&#2368; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">4 years</span><span class=\"hqt\" style=\"display:none\">4 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">5 years</span><span class=\"hqt\" style=\"display:none\">5 &#2360;&#2366;&#2354;</span>",
      "<span class=\"eqt\">6 years</span><span class=\"hqt\" style=\"display:none\">6 &#2360;&#2366;&#2354;</span>",
      "<span class=\"eqt\">At the pleasure of the President</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; &#2311;&#2330;&#2381;&#2331;&#2366;&#2344;&#2369;&#2360;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; The <b>Attorney General serves at the pleasure of the President, meaning there is no fixed term.</b></p><p><b>Further Insight::</b></p><p>&bull; The Attorney General acts as the chief legal advisor to the government mentioned under Article 76.</p><p>&bull; They do not have a fixed term, and can be removed by the President any time.</p><p>&bull; He/She generally does not represent private parties in legal matters unless permitted by the Government of India.</p><p>&bull; He has the right to an audience in all courts in the territory of India.</p><p>&bull; He can sit in both houses and take part in debate but cannot vote in any resolution.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The executive powers of the Union are vested in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2328; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2366;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">The President</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;</span>",
      "<span class=\"eqt\">The Prime Minister</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Council of Ministers</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2346;&#2352;&#2367;&#2359;&#2342;&#2381;</span>",
      "<span class=\"eqt\">The Parliament</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Executive powers are vested in the President under Article 53</b>.</p><p><b>Further Insight::</b></p><p>&bull; The Prime Minister and council of ministers are mentioned under Article 74 , their duty is to aid and advise the President while he exercises his powers.</p><p>&bull; Parliament consists of the House of People , House of States and President and Mentioned under Article 79.</p><p>&bull; <b>President of India</b>:</p><p>&bull; <b>Article 52</b>: There shall be a President of India.</p><p>&bull; <b>Article 53</b>: Executive power of the Union vested in the President.</p><p>&bull; <b>Article 54</b>: Election of the President by an electoral college.</p><p>&bull; <b>Article 56</b>: Term of office of the President (5 years).</p><p>&bull; <b>Article 57</b>: Eligibility for re-election as President.</p><p>&bull; <b>Article 58</b>: Qualifications for election as President.</p><p>&bull; <b>Article 61</b>: Procedure for impeachment of the President.</p><p>&bull; <b>Article 62</b>: Time of election to fill vacancy in President's office.</p><p>&bull; <b>Article 72</b>: President's power to grant pardons, reprieves, etc.</p><p>&bull; <b>Article 74</b>: President to act on the advice of the Council of Ministers.</p><p>&bull; <b>Article 75</b>: Appointment of Prime Minister and other Ministers by the President.</p><p>&bull; <b>Article 77</b>: Conduct of business of the Government of India in the President's name.</p><p>&bull; <b>Article 123</b>: President's power to promulgate ordinances.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is under Jurisdiction of the Union Government?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Maintenance of law and order in cities</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2361;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2366;&#2344;&#2370;&#2344; &#2324;&#2352; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Conducting elections for municipal bodies</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2327;&#2352; &#2344;&#2367;&#2325;&#2366;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2330;&#2369;&#2344;&#2366;&#2357; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Formulating foreign policy</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358; &#2344;&#2368;&#2340;&#2367; &#2340;&#2376;&#2351;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Providing healthcare services</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2360;&#2375;&#2357;&#2366;&#2319;&#2306; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The <b>Union Government is responsible for formulating foreign policy.</b></p><p>&bull; <b>Maintenance of law and order is the responsibility of State Government</b></p><p>&bull; Conducting municipal elections is the function of State Election Commission</p><p>&bull; Providing healthcare services are primarily managed at the state or local levels.</p><p><b>Further Insight:</b></p><p>&bull; Power of Union government is mention under Schedule 7 , List 1 or Union List</p><p>&bull; There are 100 subject in the Union List on which Union has exclusive right to make law</p><p>&bull; Such as Defence, Foreign Affairs, Currency and Coinage, War and Peace , Atomic Energy, Railways, Citizenship etc..</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The primary function of the Comptroller and Auditor General is to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2325; &#2319;&#2357;&#2306; &#2350;&#2361;&#2366;&#2354;&#2375;&#2326;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2325; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Formulate policies for taxation</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2366;&#2343;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2368;&#2340;&#2367;&#2351;&#2366;&#2306; &#2340;&#2376;&#2351;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Audit the accounts of the government</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2326;&#2366;&#2340;&#2379;&#2306; &#2325;&#2366; &#2321;&#2337;&#2367;&#2335; &#2325;&#2352;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Conduct elections for Parliament</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2354;&#2367;&#2319; &#2330;&#2369;&#2344;&#2366;&#2357; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Provide legal advice to the government</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2360;&#2354;&#2366;&#2361; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>o The<b> primary function of the CAG is to audit the accounts of the government</b>.</p><p>o Formulating tax policies, conducting elections, and providing legal advice are not within the CAG's role.</p><p><b>Further Insight:</b></p><p>&bull; CAG mentioned under Article 148. He/she:</p><p>o Appointed by President of India</p><p>o Can be removed from the Office in like manner and on the like ground as a Judge of the Supreme Court.</p><p>o Make an oath before the President of India.</p><p>o He is appointed for 6 years or 65 years of age whichever is earlier.</p><p>&bull; Comptroller and Auditor-General shall perform such duties and exercise such powers in relation to the accounts of the Union and of the States and of any other authority or body as may be prescribed by or under any law made by Parliament or Any institution where money of Government of India is invested(after supreme court decision).</p><p>&bull; He submits reports to the President of India and the President shall cause them to be laid before each House of Parliament.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Council of Ministers of the Union Government is collectively responsible to?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2346;&#2352;&#2367;&#2359;&#2342; &#2360;&#2366;&#2350;&#2370;&#2361;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2313;&#2340;&#2381;&#2340;&#2352;&#2342;&#2366;&#2351;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lok Sabha</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2325;&#2360;&#2349;&#2366;</span>",
      "<span class=\"eqt\">Rajya Sabha</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2349;&#2366;</span>",
      "<span class=\"eqt\">Parliament</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342;</span>",
      "<span class=\"eqt\">President</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>According to the Article 75 of the Constitution of the India Union Council of Ministers are collectively responsible to the House Of People(Lok Sabha).</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Article 75</b></p><p>&bull; The Prime Minister is appointed by the President, and the other Ministers are appointed by the President on the advice of the Prime Minister.</p><p>&bull; The Ministers hold office at the pleasure of the President.</p><p>&bull; <b>The Council of Ministers is collectively responsible to the Lok Sabha.</b></p><p>&bull; <b>A Minister who is not a member of either House of Parliament for six consecutive months shall cease to be a Minister.</b></p><p>&bull; The salaries and allowances of Ministers are determined by Parliament.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not a qualification for becoming a Governor?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2351;&#2379;&#2327;&#2381;&#2351;&#2340;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2348;&#2344;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Must be a citizen of India.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;.</span>",
      "<span class=\"eqt\">Must be at least 35 years old.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2369; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; 35 &#2357;&#2352;&#2381;&#2359; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</span>",
      "<span class=\"eqt\">Must have served as a judge of a High Court.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2351;&#2366; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</span>",
      "<span class=\"eqt\">Must not hold any office of profit.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2354;&#2366;&#2349; &#2325;&#2375; &#2346;&#2342; &#2346;&#2352; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The <b>qualifications</b> to be a <b>Governor are that the person must be a citizen of India, be at least 35 years old, and not hold any office of profit.</b></p><p><b>Further Insight</b></p><p>&bull; <b>Governor</b></p><p>&#9675; <b>Article 153 - Governors of States.</b></p><p>&#9675; <b>Article 154 - Executive power of State.</b></p><p>&#9675; <b>Article 155 - Appointment of Governor.</b></p><p>&#9675; <b>Article 156 - Term of office of Governor.</b></p><p>&#9675; <b>Article 157 - Qualifications for appointment as Governor.</b></p><p>&#9675; <b>Article 158 - Conditions of Governor's office.</b></p><p>&#9675; <b>Article 159 - Oath or affirmation by the Governor.</b></p><p>&#9675; <b>Article 160 - Discharge of the functions of the Governor in certain contingencies.</b></p><p>&#9675; <b>Article 161 - Power of Governor to grant pardons, etc., and to suspend, remit or commute sentences in certain cases.</b></p><p>&#9675; <b>Article 162 - Extent of executive power of the State</b></p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>The Governor must act in accordance with the advice of the:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2368; &#2360;&#2354;&#2366;&#2361; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;:</p></span>",
    "options": [
      "<span class=\"eqt\">Chief Minister</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Prime Minister</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Council of Ministers</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2346;&#2352;&#2367;&#2359;&#2342;&#2381;</span>",
      "<span class=\"eqt\">State Legislature</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The <b>Governor is bound to act according to the advice of the Council of Ministers, except in certain discretionary cases</b>.</p><p><b>Further insight:</b></p><p>&bull; <b>Article 74 </b>There shall be a council of Ministers headed by the Prime Minister to aid and advise the president in Exercise of His power.</p><p>&bull; <b>Article 75: </b>Prime Minister appointed by President and other minister by President on advice of PM</p><p>&#9675; <b>Council of Ministers are collectively responsible to House of People or Lok-sabha</b></p><p>&bull; In State, State Legislature is made up of:</p><p>&#9675; State Legislative Assembly (Article 168) + Governor</p><p>&#9675; State Legislative Assembly + Governor + Legislative Council(169).</p><p>&#9675; <b>State legislative council is presently</b> in Andhra Pradesh, Bihar, Madhya Pradesh, Maharashtra, Karnataka ,Tamil Nadu , Telangana and Uttar Pradesh</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Chief Minister's role:</p><p>a. The Chief Minister is the real executive authority in the state.</p><p>b. The Chief Minister is appointed by the Governor.</p><p>c. The Governor can dismiss the Chief Minister at any time.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2368; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368; &#2361;&#2376;&#2404;</p><p>b. &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>c. &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2360;&#2350;&#2351; &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2379; &#2348;&#2352;&#2381;&#2326;&#2366;&#2360;&#2381;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">a only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">a and b only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">a, b, and c</span><span class=\"hqt\" style=\"display:none\">a, b, c</span>",
      "<span class=\"eqt\">b and c only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Chief Minister is the real executive head of the state government.</b></p><p>&bull; The <b>Chief Minister is appointed by the Governor</b>, typically the leader of the majority party in the Legislative Assembly.</p><p>&bull; The <b>Governor cannot dismiss the Chief Minister arbitrarily</b>. The Chief Minister remains in office as long as they have the confidence of the Legislative Assembly.</p><p><b>Further Insight:</b></p><p>&bull; <b>Article 163:</b> Council of ministers to aid and advise Governor and Governor can also work in the matters allowed by Constitution and if there is a conflict of question whether he can allow or not his discretion is final.</p><p>&bull; <b>Article 164:</b> Chief Minister shall be appointed by the Governor and other minister appointed by Governor on the advice of the Chief minister</p><p>&#9675; Minister Hold office during pleasure of Governor</p><p>&#9675; Council of Ministers shall be collectively responsible to the Legislative Assembly of the State.</p><p>&#9675; Total number of minister included Chief Minister cannot exceed 15% of the total strength of the State Legislative Assembly</p><p>&#9675; But it cannot be less than 12</p><p>&#9675; If a person becomes a minister , he/she has to become a member of the State legislature within 6 months, after expiration of these 6 months he/she ceases to be a minister.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>In which situation can the Chief Minister be removed from office?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2379; &#2346;&#2342; &#2360;&#2375; &#2361;&#2335;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">After the Governor's term ends.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342;&#2404;</span>",
      "<span class=\"eqt\">On the advice of the Advocate General.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2343;&#2367;&#2357;&#2325;&#2381;&#2340;&#2366; &#2325;&#2368; &#2360;&#2354;&#2366;&#2361; &#2346;&#2352;&#2404;</span>",
      "<span class=\"eqt\">When a no-confidence motion is passed by the Legislative Assembly.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2348; &#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2357;&#2367;&#2358;&#2381;&#2357;&#2366;&#2360; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">By a judicial decision of the High Court.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The Chief Minister <b>must resign if a no-confidence motion is passed in the Legislative Assembly.</b></p><p>&bull; The <b>Governor's term does not affect the Chief Minister</b>.</p><p>&bull; The Advocate General does not have this power.</p><p>&bull; <b>Judicial decisions do not directly remove a Chief Minister</b>.</p><p><b>Further insight:</b></p><p>&bull; <b>Article 153 - Governors of States.</b></p><p>&bull; <b>Article 154 - Executive power of State.</b></p><p>&bull; <b>Article 155 - Appointment of Governor.</b></p><p>&bull; <b>Article 156 - Term of office of Governor.</b></p><p>&bull; <b>Article 157 - Qualifications for appointment as Governor.</b></p><p>&bull; <b>Article 158 - Conditions of Governor's office.</b></p><p>&bull; <b>Article 159 - Oath or affirmation by the Governor.</b></p><p>&bull; <b>Article 160 - Discharge of the functions of the Governor in certain contingencies.</b></p><p>&bull; <b>Article 161 - Power of Governor to grant pardons, etc., and to suspend, remit or commute sentences in certain cases.</b></p><p>&bull; <b>Article 162 - Extent of executive power of the State</b></p><p>&bull; Article 165  -  Advocate General of the State</p><p>&bull; Article of 214  -  High Court of the State.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the Following is the highest law officer of the State?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2357;&#2367;&#2343;&#2367; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Attorney General</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2344;&#2381;&#2351;&#2366;&#2351;&#2357;&#2366;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Advocate General</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2343;&#2367;&#2357;&#2325;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Solicitor General</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2346;&#2348;&#2381;&#2354;&#2367;&#2325; &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2325;&#2381;&#2351;&#2370;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Chief Justice of High Court</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Advocate general of the state is the Highest Law officer of the state, appointed by the Governor.</p><p><b>Further Insight:</b></p><p>&bull; Article 165  -  Advocate General for the State</p><p>&#9632; Highest Law officer of the State (lawyer of the State Government).</p><p>&#9632; He must be qualified to be Judge of the High Court.</p><p>&#9632; He gives advice on legal matters to the State Government.</p><p>&#9632; He holds office during the pleasure of the Governor. (No fixed term, can be removed any time.)</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Who acts as the presiding officer of the Legislative Assembly?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2375; &#2346;&#2368;&#2336;&#2366;&#2360;&#2368;&#2344; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Governor</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Speaker</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2325;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Chief Minister</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Deputy Speaker</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2360;&#2349;&#2366;&#2346;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Speaker acts as the presiding officer of the Legislative Assembly</b>.</p><p>&bull; The Deputy Speaker acts in the absence of the Speaker.</p><p><b>Further Insight:</b></p><p>&bull; <b>Article 178</b> governs the election, duties, and removal of the Speaker of the State Legislative Assembly.</p><p>&bull; The Speaker plays a crucial role in maintaining the order of the Assembly, certifying money bills, and casting votes in the event of a tie.</p><p>&bull; The Speaker's decision on parliamentary procedures and the certification of money bills is <b>final and binding</b>.</p><p>&bull; The process of removing the Speaker requires a special resolution with <b>14 days' notice</b>.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Under which articles the President and Governor can grant Pardons respectively?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2375; &#2340;&#2361;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2325;&#2381;&#2359;&#2350;&#2366;&#2342;&#2366;&#2344; &#2342;&#2375; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 72 and Article 161</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 72 &#2324;&#2352; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 161</span>",
      "<span class=\"eqt\">Article 75 and Article 160</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 75 &#2324;&#2352; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 160</span>",
      "<span class=\"eqt\">Article 161 and Article 72</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 161 &#2324;&#2352; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 72</span>",
      "<span class=\"eqt\">Article 160 and Article 75</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 160 &#2324;&#2352; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 75</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Under Article 72 President's pardon power is mentioned and Under Article 161 Governor's pardon power is mentioned.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Powers and Functions of Governor</b>:</p><p>&bull; <b>Executive Powers</b>: The Governor appoints the <b>Chief Minister</b> and other members of the Council of Ministers, based on the Chief Minister's advice (Article 164). The Governor also appoints other key officials like the Advocate General and judges of subordinate courts.</p><p>&bull; <b>Legislative Powers</b>: The Governor summons, prorogues, and dissolves the <b>State Legislative Assembly</b> (Article 174).</p><p>&bull; <b>Ordinance Power</b>: Under <b>Article 213</b>, the Governor can issue <b>ordinances</b> when the State Legislature is not in session.</p><p>&bull; <b>Judicial Powers</b>: The Governor has the power to <b>grant pardons</b>, reprieves, or commute sentences in certain cases, under <b>Article 161</b>.</p><p>&bull; <b>Discretionary Powers</b>: The Governor can act independently in certain situations, such as appointing a Chief Minister when no clear majority exists or during a constitutional crisis.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>The members of the Rajya Sabha are elected by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351;&#2379;&#2306; &#2325;&#2366; &#2330;&#2369;&#2344;&#2366;&#2357; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Direct election by the people</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2340;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2330;&#2369;&#2344;&#2366;&#2357;</span>",
      "<span class=\"eqt\">State Legislative Assemblies</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Lok Sabha members</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2360;&#2342;&#2360;&#2381;&#2351;</span>",
      "<span class=\"eqt\">The President</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Rajya Sabha members are elected by State Legislative Assemblies and appointed by the President.</b></p><p>&bull; They are <b>not directly elected by the people or by Lok Sabha members.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Qualifications for Lok Sabha (House of the People)  -  Article 84:</b></p><p>&#9675; The candidate must be a <b>citizen of India</b>.</p><p>&#9675; The minimum age required is <b>25 years</b>.</p><p>&#9675; The candidate must be registered as a <b>voter</b> in any parliamentary constituency in India.</p><p>&#9675; The candidate should not hold any <b>office of profit</b> under the Government of India or any state, except for offices specifically exempted by Parliament.</p><p>&#9675; The candidate must not be disqualified under <b>Article 102</b>, which includes:</p><p>&#9632; Being declared of <b>unsound mind</b> by a competent court.</p><p>&#9632; Being an <b>undischarged insolvent</b>.</p><p>&#9632; Being disqualified under laws made by Parliament, such as those related to criminal offenses (e.g., <b>Representation of the People Act, 1951</b>)</p><p>&bull; <b>Qualifications for Rajya Sabha (Council of States)  -  Article 84:</b></p><p>&#9675; The candidate must be a <b>citizen of India</b>.</p><p>&#9675; The minimum age required is <b>30 years</b>.</p><p>&#9675; The candidate must be a <b>registered voter</b> in any state or Union Territory in India.</p><p>&#9675; Similar to Lok Sabha, the candidate should not hold any <b>office of profit</b> under the Government of India or any state, unless specifically exempted by Parliament.</p><p>&#9675; Candidate must not be disqualified under <b>Article 102</b>, which includes:</p><p>&#9632; Being declared of <b>unsound mind</b> by a competent court.</p><p>&#9632; Being an <b>undischarged insolvent</b>.</p><p>&#9632; Being disqualified under laws like the <b>Representation of the People Act, 1951</b>, including for certain criminal offenses.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following Article Union Executive with their clauses:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column 1 </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column 2 </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Article 52</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Executive power of Union vested in President</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Article 74</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Appointment of Prime Minister and Ministers</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Article 76</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Attorney General of India</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Article 75</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. President of India</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2360;&#2306;&#2328; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2326;&#2306;&#2337;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; 1 </td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; 2 </td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 52</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2360;&#2306;&#2328; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2350;&#2375;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 74</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2324;&#2352; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 76</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2361;&#2366;&#2344;&#2381;&#2351;&#2366;&#2351;&#2357;&#2366;&#2342;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 75</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2328;. &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i - d, ii - a, iii - c, iv - b</span><span class=\"hqt\" style=\"display:none\">i - d, ii - a, iii - c, iv - b</span>",
      "<span class=\"eqt\">i - b, ii - d, iii - a, iv - c</span><span class=\"hqt\" style=\"display:none\">i - b, ii - d, iii - a, iv - c</span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Article 52  -  President of India</b>: Article 52 states that there shall be a President of India</p><p>&bull; <b>Article 74  -  Executive Power of Union Vested in President</b>: Article 74 establishes that the President shall exercise executive power based on the aid and advice of the Council of Ministers.</p><p>&bull; <b>Article 76  -  Attorney General of India</b>: Article 76 refers to the Attorney General of India, who is the chief legal advisor to the government.</p><p>&bull; <b>Article 75  -  Appointment of Prime Minister and Ministers</b>: Article 75 deals with the appointment of the Prime Minister and other Ministers by the President.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following Article of State Executive with their clauses: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column 1</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column 2 </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Article 153</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Governor's discretionary powers</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Article 154</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Appointment of Governor</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Article 155</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Executive power of State vested in Governor</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Article 163</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. There shall be a Governor in every State</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2367;&#2339;&#2368; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2326;&#2306;&#2337;&#2379;&#2306; &#2360;&#2375; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; 1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; 2 </td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 153</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2368; &#2357;&#2367;&#2357;&#2375;&#2325;&#2366;&#2343;&#2368;&#2344; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2366;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 154</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 155</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2350;&#2375;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 163</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2328;. &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2319;&#2325; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2361;&#2379;&#2327;&#2366;</td></tr></table></span>",
    "options": [

    "solution": "<p>&bull; <b>Article 153  -  There shall be a Governor in every State</b>: Article 153 specifies that each state shall have a Governor.</p><p>&bull; <b>Article 154  -  Executive Power of State Vested in Governor</b>: Article 154 vests the executive power of the state in the Governor.</p><p>&bull; <b>Article 155  -  Appointment of Governor</b>: Article 155 deals with the appointment of the Governor by the President.</p><p>&bull; <b>Article 163  -  Governor's Discretionary Powers</b>: Article 163 gives the Governor discretionary powers in certain matters.</p>",
