    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A body of mass 10 kg is lifted vertically upward by 2 meters. Calculate the work done against gravity. (g = 9.8 m/s&#178;)</p></span><span class=\"hqt\" style=\"display:none\"><p>10 kg &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2325;&#2366; &#2319;&#2325; &#2346;&#2367;&#2306;&#2337; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2352;&#2370;&#2346; &#2360;&#2375; 2 &#2350;&#2368;&#2335;&#2352; &#2314;&#2346;&#2352; &#2313;&#2336;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2325;&#2375; &#2357;&#2367;&#2352;&#2369;&#2342;&#2381;&#2343; &#2325;&#2367;&#2319; &#2327;&#2319; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2375;&#2306;&#2404; (g = 9.8 m/s&#178;)</p></span>",
    "options": [
      "<span class=\"eqt\">196 J</span><span class=\"hqt\" style=\"display:none\">196 J</span>",
      "<span class=\"eqt\">180 J</span><span class=\"hqt\" style=\"display:none\">180 J</span>",
      "<span class=\"eqt\">156 J</span><span class=\"hqt\" style=\"display:none\">156 J</span>",
      "<span class=\"eqt\">186 J</span><span class=\"hqt\" style=\"display:none\">186 J</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Work is done when a force causes an object to move a certain distance. In this case, the force is gravity, and the distance is the vertical displacement of the body. When lifting an object against gravity, the work done is equal to the change in its potential energy. </p><p>&#183; Work done = Force  X  displacement(h)</p><p>&#183; Force = mass(m)  X  acceleration due to gravity(g)</p><p>&#183; Work done = m * g * h</p><p>&#183; Given </p><p>o m = 10 kg </p><p>o g = 9.8 m/s&#178; </p><p>o h = 2 meters</p><p>&#183; Work done = 10 kg * 9.8 m/s&#178; * 2 m = 196 Joules(J)</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a unit of power?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2368; &#2311;&#2325;&#2366;&#2312; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Watt</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2335;</span>",
      "<span class=\"eqt\">Joule/second</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2370;&#2354;/&#2360;&#2375;&#2325;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Newton-meter</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2335;&#2344;-&#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Horsepower</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2379;&#2337;&#2364;&#2375; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Watt (W)</b> is the standard SI unit of power. </p><p>&#183; <b>Joule/second (J/s)</b> is also a unit of power. Power is defined as the rate at which work is done, and work is measured in Joules. So, Joules per second is equivalent to Watts. </p><p>&#183; <b>Horsepower (hp)</b> is another unit of power, commonly used for engines. </p><p>&#183; <b>Newton-meter (N</b><b>&#8901;</b><b>m)</b> is a unit of <i>torque</i> or <i>moment</i>, not power. While related to work and energy, torque describes a rotational force. Work is done <i>by</i> a torque, but the Newton-meter itself is the unit of torque</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column A</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column B</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Kinetic Energy</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.mgh</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Potential Energy</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &frac12;mv&#178;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Work</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. F  X  d</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Power</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Work/time</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2327;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.mgh</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2314;&#2352;&#2381;&#2332;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &frac12;mv&#178;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2325;&#2366;&#2352;&#2381;&#2351;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. F X d</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2358;&#2325;&#2381;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2325;&#2366;&#2352;&#2381;&#2351;/&#2360;&#2350;&#2351;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-b, ii-a, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-b, ii-a, iii-c, iv-d</span>",
      "<span class=\"eqt\">i-a, ii-b, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-a, ii-b, iii-c, iv-d</span>",
      "<span class=\"eqt\">i-b, ii-a, iii-d, iv-c</span><span class=\"hqt\" style=\"display:none\">i-b, ii-a, iii-d, iv-c</span>",
      "<span class=\"eqt\">i-c, ii-b, iii-a, iv-d</span><span class=\"hqt\" style=\"display:none\">i-c, ii-b, iii-a, iv-d</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Kinetic Energy (KE):</b> </p><p>&#183; Kinetic energy is the energy an object possesses due to its motion. The formula &frac12;mv&#178; calculates this energy, where:</p><p>o m = mass of the object</p><p>o velocity (speed) of the object</p><p>&#183; A heavier object moving faster has more kinetic energy. A stationary object has zero kinetic energy.</p><p><b>Potential Energy (PE):</b> </p><p>Potential energy is the energy an object possesses due to its position in a force field (like gravity). The formula mgh calculates gravitational potential energy, where:</p><p>&#183; m = mass of the object</p><p>&#183; g = acceleration due to gravity (approximately 9.8 m/s&#178; on Earth)</p><p>&#183; h = height of the object above a reference point</p><p>&#183; The higher an object is, the more gravitational potential energy it has. At ground level (our usual reference point), the potential energy is often considered to be zero.</p><p><b>Work (W):</b> </p><p>Work is done when a force causes an object to move a certain distance. The formula F  X  d calculates work, where:</p><p>&#183; F = force applied to the object</p><p>&#183; d = distance the object moves in the direction of the force</p><p>&#183; If you push a box across the floor, you're doing work on the box. If you push against a wall and it doesn't move, you're not doing any work (even though you're exerting a force) because the distance is zero.</p><p><b>Power (P):</b> </p><p>Power is the rate at which work is done. The formula Work/time calculates power, where:</p><p>&#183; Work = the amount of work done</p><p>&#183; time = the time taken to do that work</p><p>&#183; A more powerful engine can do the same amount of work (like lifting a weight) in less time than a less powerful engine. Power is measured in Watts (Joules per second).</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A body has 100 J of kinetic energy. If its velocity is doubled, its kinetic energy will be:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2346;&#2367;&#2306;&#2337; &#2350;&#2375;&#2306; 100 &#2332;&#2370;&#2354; &#2327;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2311;&#2360;&#2325;&#2366; &#2357;&#2375;&#2327; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2368; &#2327;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2361;&#2379;&#2327;&#2368;:</p></span>",
    "options": [
      "<span class=\"eqt\">200 J</span><span class=\"hqt\" style=\"display:none\">200 J</span>",
      "<span class=\"eqt\">300 J</span><span class=\"hqt\" style=\"display:none\">300 J</span>",
      "<span class=\"eqt\">400 J</span><span class=\"hqt\" style=\"display:none\">400 J</span>",
      "<span class=\"eqt\">100 J</span><span class=\"hqt\" style=\"display:none\">100 J</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The formula for kinetic energy is: KE = &frac12; mv&#178; </p><p>where m is mass and v is velocity</p><p>&#183; Initially:</p><p>100 J = &frac12; m(v&#8321;)&#178;</p><p>where v&#8321; is the initial velocity</p><p>&#183; When velocity is doubled:</p><p>v&#8322; = 2v&#8321; where v&#8322; is the new velocity</p><p>&#183; The new kinetic energy will be: KE&#8322; = &frac12; m(v&#8322;)&#178; = &frac12; m(2v&#8321;)&#178; = &frac12; m(4v&#8321;&#178;) = 2mv&#8321;&#178;</p><p>&#183; Since &frac12; mv&#8321;&#178; = 100 J </p><p>Therefore, KE&#8322; = 2(100 J) = 400 J</p><p>Also, kinetic energy is proportional to the square of velocity. When velocity doubles, the kinetic energy increases by a factor of 4.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The gravitational potential energy of an object depends on:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2368; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2314;&#2352;&#2381;&#2332;&#2366; &#2311;&#2360; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Only its mass</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2311;&#2360;&#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Only its height above ground</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2332;&#2350;&#2368;&#2344; &#2360;&#2375; &#2311;&#2360;&#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Both mass and height</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither mass nor height</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;, &#2344; &#2314;&#2305;&#2330;&#2366;&#2312;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The formula for gravitational potential energy is:</p><p>PE = mgh </p><p>Where:</p><p>&#183; PE = Gravitational Potential Energy</p><p>&#183; m = mass of the object </p><p>&#183; g = acceleration due to gravity (a constant value) </p><p>&#183; h = height of the object above a reference point </p><p>As you can see from the formula, potential energy is directly proportional to both mass (m) and height (h). If either mass or height increases, the potential energy increases.</p><p>If either is zero, the potential energy is zero.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>One horsepower is equal to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2309;&#2358;&#2381;&#2357;&#2358;&#2325;&#2381;&#2340;&#2367; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">746 watts</span><span class=\"hqt\" style=\"display:none\">746 &#2357;&#2366;&#2335;</span>",
      "<span class=\"eqt\">647 watts</span><span class=\"hqt\" style=\"display:none\">647 &#2357;&#2366;&#2335;</span>",
      "<span class=\"eqt\">674 watts</span><span class=\"hqt\" style=\"display:none\">674 &#2357;&#2366;&#2335;</span>",
      "<span class=\"eqt\">764 watts</span><span class=\"hqt\" style=\"display:none\">764 &#2357;&#2366;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>One horsepower (hp) is a unit of power commonly used to measure the output of engines and motors. It is defined as exactly <b>746 watts</b> in the International System of Units (SI). This conversion is widely accepted in physics and engineering.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>When an object moves in a circular path, and the force is always perpendicular to the displacement, the work done is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2325;&#2379;&#2312; &#2357;&#2360;&#2381;&#2340;&#2369; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2346;&#2341; &#2346;&#2352; &#2327;&#2340;&#2367; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2324;&#2352; &#2348;&#2354; &#2361;&#2350;&#2375;&#2358;&#2366; &#2357;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344; &#2325;&#2375; &#2354;&#2306;&#2348;&#2357;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2361;&#2379;&#2327;&#2366;: </p></span>",
    "options": [
      "<span class=\"eqt\">Positive</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325;</span>",
      "<span class=\"eqt\">Negative</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325;</span>",
      "<span class=\"eqt\">Zero</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2370;&#2344;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Constant</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>When an object moves in a circular path, the centripetal force (the force that keeps the object moving in a circle) is always directed <b>perpendicular to the displacement</b> of the object at every point along the path.</p><p>Work done = F  X  d  X  cos&#952;</p><p>where:</p><p>&#183; F is the force applied,</p><p>&#183; d is the displacement,</p><p>&#183; &#952; is the angle between the force and displacement vectors.</p><p>When force is perpendicular to displacement, &#952; = 90&deg;. Substituting this into the formula:</p><p>cos90&deg; = 0, therefore work done = 0.</p><p>Thus, <b>no work is done</b> when the force is perpendicular to the displacement, as in the case of circular motion.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The principle of conservation of energy states that:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2325;&#2366; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2361;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367;:</p></span>",
    "options": [
      "<span class=\"eqt\">Energy can be created but not destroyed</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2313;&#2360;&#2375; &#2344;&#2359;&#2381;&#2335; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Energy can be destroyed but not created</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2379; &#2344;&#2359;&#2381;&#2335; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2348;&#2344;&#2366;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Energy can neither be created nor destroyed</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2379; &#2344; &#2340;&#2379; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2344; &#2361;&#2368; &#2344;&#2359;&#2381;&#2335; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Energy can be both created and destroyed</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2366; &#2360;&#2371;&#2332;&#2344; &#2324;&#2352; &#2357;&#2367;&#2344;&#2366;&#2358; &#2342;&#2379;&#2344;&#2379;&#2306; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>principle of conservation of energy</b> states that energy cannot be created or destroyed; it can only be transformed from one form to another or transferred from one object to another. This is a fundamental law of physics and applies to all isolated systems.</p><p>For example:</p><p>&#183; In a closed system, the total amount of energy remains constant over time.</p><p>&#183; Energy can change forms (e.g., kinetic energy to potential energy, or electrical energy to heat energy), but the total energy remains the same.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>A simple pendulum has maximum potential energy at:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2352;&#2354; &#2354;&#2379;&#2354;&#2325; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Mean position</span><span class=\"hqt\" style=\"display:none\">&#2324;&#2360;&#2340; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Extreme position</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2352;&#2350; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Middle of the swing</span><span class=\"hqt\" style=\"display:none\">&#2333;&#2370;&#2354;&#2375; &#2325;&#2375; &#2350;&#2343;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Quarter of the swing</span><span class=\"hqt\" style=\"display:none\">&#2333;&#2370;&#2354;&#2375; &#2325;&#2366; &#2330;&#2380;&#2341;&#2366;&#2312; &#2349;&#2366;&#2327;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In a simple pendulum:</p><p>&#183; The <b>mean position</b> (the lowest point of the swing) is where the pendulum has <b>maximum kinetic energy</b> and <b>minimum potential energy</b>.</p><p>&#183; The <b>extreme positions</b> (the highest points of the swing) are where the pendulum momentarily comes to rest. At these points, the pendulum has <b>maximum potential energy</b> and <b>minimum kinetic energy</b> (zero).</p><p>This is because:</p><p>&#183; At the extreme positions, the pendulum is at its maximum height, and gravitational potential energy (U=mgh) is at its highest.</p><p>&#183; As the pendulum swings back toward the mean position, this potential energy is converted into kinetic energy.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an example of negative work?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lifting a book</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2340;&#2366;&#2348; &#2313;&#2336;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Walking on level ground</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2340;&#2354; &#2332;&#2350;&#2368;&#2344; &#2346;&#2352; &#2330;&#2354;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Applying brakes to a moving car</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2354;&#2340;&#2368; &#2325;&#2366;&#2352; &#2350;&#2375;&#2306; &#2348;&#2381;&#2352;&#2375;&#2325; &#2354;&#2327;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Pushing a wall</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2368;&#2357;&#2366;&#2352; &#2325;&#2379; &#2343;&#2325;&#2381;&#2325;&#2366; &#2342;&#2375;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Negative work</b> occurs when the force applied to an object acts <i>opposite</i> to the direction of the object's motion. In the case of brakes, the force is applied to <i>slow down</i> the car, which is in the opposite direction of the car's forward movement. This reduces the car's kinetic energy.</p><p><b>Further insight:</b></p><p>&#183; <b>Lifting a book:</b> The force you apply is upwards, and the book moves upwards. The force and displacement are in the same direction, therefore, it's positive work. </p><p>&#183; <b>Walking on level ground:</b> While there are forces at play, the <i>net</i> work done by your body to move you forward on level ground is approximately zero. The forces of your feet pushing back and the ground pushing forward mostly cancel out in terms of displacement. There is work done to overcome friction and maintain speed, but it is not negative work. </p><p>&#183; <b>Pushing a wall:</b> You apply a force to the wall, but the wall doesn't move. Since there's no displacement (distance moved), no work is done (work = force x distance). Therefore, it's neither positive nor negative work.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>The work done in moving a body over a closed path is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2346;&#2367;&#2306;&#2337; &#2325;&#2379; &#2348;&#2306;&#2342; &#2346;&#2341; &#2346;&#2352; &#2330;&#2354;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Maximum</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325;&#2340;&#2350;</span>",
      "<span class=\"eqt\">Minimum</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350;</span>",
      "<span class=\"eqt\">Zero</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2370;&#2344;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Infinite</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2306;&#2340;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In a closed path, final position equals initial position. Net displacement is zero, therefore total work done is zero.</p><p>This is a fundamental concept in physics related to <i>conservative forces</i>. For conservative forces, the work done in moving an object between two points <i>does not depend on the path taken</i>. So, if the starting and ending points are the same (a closed path), the net work is always zero.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>The work-energy theorem states that: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2352;&#2381;&#2351;-&#2314;&#2352;&#2381;&#2332;&#2366; &#2346;&#2381;&#2352;&#2350;&#2375;&#2351; &#2325;&#2361;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367;:</p></span>",
    "options": [
      "<span class=\"eqt\">Work done is equal to the change in potential energy.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Work done is equal to the change in kinetic energy.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2327;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Potential energy is equal to kinetic energy.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2327;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Total energy is constant.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2354; &#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2381;&#2341;&#2367;&#2352; &#2361;&#2376;.</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>work-energy theorem</b> states that the <b>work done by the net force</b> acting on an object is equal to the <b>change in its kinetic energy</b>.</p><p>Mathematically, this is expressed as:</p><p>W=&#916;KE</p><p>where:</p><p>&#183; W is the work done by the net force,</p><p>&#183; &#916;KE is the change in kinetic energy (KE=1/2mv<sup>2</sup>).</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements accurately describes the relationship between work, energy, and power?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351;, &#2314;&#2352;&#2381;&#2332;&#2366; &#2324;&#2352; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2348;&#2306;&#2343; &#2325;&#2366; &#2360;&#2335;&#2368;&#2325; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Work represents the rate at which energy is transferred</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2351; &#2313;&#2360; &#2342;&#2352; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360; &#2346;&#2352; &#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Energy is the capacity to do work, and power is the rate at which work is done or energy is transferred</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2358;&#2325;&#2381;&#2340;&#2367; &#2357;&#2361; &#2342;&#2352; &#2361;&#2376; &#2332;&#2367;&#2360; &#2346;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2351;&#2366; &#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Power is the capacity to do work, and energy represents the rate at which work is done</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2342;&#2352; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Work, energy and power are same</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2351;, &#2314;&#2352;&#2381;&#2332;&#2366; &#2324;&#2352; &#2358;&#2325;&#2381;&#2340;&#2367; &#2319;&#2325; &#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Energy</b>:</p><p>o Energy is the <b>capacity to do work</b>.</p><p>o It exists in various forms (e.g., kinetic, potential, thermal) and can be transferred or transformed.</p><p>o The unit of energy is the <b>joule (J)</b>.</p><p><b>Work</b>:</p><p>o Work is done when a force causes a displacement.</p><p>o It is a measure of <b>energy transfer</b>.</p><p>o The unit of work is also the <b>joule (J)</b>.</p><p><b>Power</b>:</p><p>o Power is the <b>rate at which work is done or energy is transferred</b>.</p><p>o It measures how quickly energy is used or transferred.</p><p>o The unit of power is the <b>watt (W)</b>, where 1&#8201;W=1&#8201;J/s1W=1J/s.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>A body of mass 5 kg moving with velocity 2 m/s has kinetic energy:</p></span><span class=\"hqt\" style=\"display:none\"><p>2 &#2350;&#2368;&#2335;&#2352;/&#2360;&#2375;&#2325;&#2375;&#2306;&#2337; &#2357;&#2375;&#2327; &#2360;&#2375; &#2327;&#2340;&#2367;&#2350;&#2366;&#2344; 5 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2325;&#2375; &#2346;&#2367;&#2306;&#2337; &#2325;&#2368; &#2327;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">10 J</span><span class=\"hqt\" style=\"display:none\">10 J</span>",
      "<span class=\"eqt\">20 J</span><span class=\"hqt\" style=\"display:none\">20 J</span>",
      "<span class=\"eqt\">15 J</span><span class=\"hqt\" style=\"display:none\">15 J</span>",
      "<span class=\"eqt\">25 J</span><span class=\"hqt\" style=\"display:none\">25 J</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Kinetic Energy(KE) = &frac12;mv&#178;</p><p>where:</p><p>&#183; m is the mass of the body,</p><p>&#183; v is the velocity of the body.</p><p>Given:</p><p>&#183; Mass (m) = 5 kg,</p><p>&#183; Velocity (v) = 2 m/s.</p><p>Substitute the values into the formula:</p><p>KE = &frac12;  X  5  X  (2)&#178;</p><p>KE = &frac12;  X  5  X  4</p><p>KE = 10 J</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>In an elastic collision: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2366;&#2360;&#2381;&#2341; &#2335;&#2325;&#2381;&#2325;&#2352; &#2350;&#2375;&#2306;: </p></span>",
    "options": [
      "<span class=\"eqt\">total linear momentum is not conserved</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2354; &#2352;&#2375;&#2326;&#2368;&#2351; &#2360;&#2306;&#2357;&#2375;&#2327; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>",
      "<span class=\"eqt\">total kinetic energy of the system is not conserved</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2325;&#2369;&#2354; &#2327;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>",
      "<span class=\"eqt\">total kinetic energy of the system is conserved</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2325;&#2369;&#2354; &#2327;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In an <b>elastic collision</b>:</p><p>&#183; <b>Total linear momentum is conserved</b>:</p><p>o This is true for all types of collisions, whether elastic or inelastic. Momentum conservation is a fundamental law of physics.</p><p>&#183; <b>Total kinetic energy of the system is conserved</b>:</p><p>o This is the defining characteristic of an elastic collision. In such collisions, the total kinetic energy before the collision is equal to the total kinetic energy after the collision.</p><p>Examples of elastic collisions include collisions between billiard balls or gas molecules (in ideal conditions).</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Below are a few statements about kinetic energy.</p><p>A. Kinetic energy depends on the mass and velocity of an object.</p><p>B. Kinetic energy is a scalar quantity.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2327;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404;</p><p>A. &#2327;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2375; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2324;&#2352; &#2357;&#2375;&#2327; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>B. &#2327;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2319;&#2325; &#2309;&#2342;&#2367;&#2358; &#2352;&#2366;&#2358;&#2367; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Both A &amp; B are incorrect</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Both A and B are correct</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The formula for kinetic energy is KE = (1/2)mv&#178;, where 'm' is mass and 'v' is velocity. Both mass and velocity directly affect the kinetic energy.</p><p>Kinetic energy is a scalar quantity, meaning it has magnitude but no direction. It's just a value representing the amount of energy associated with motion. Unlike velocity (which is a vector), kinetic energy doesn't have a directional component.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is INCORRECT?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Work done can be negative</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2344;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Work done is a scalar quantity</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2319;&#2325; &#2309;&#2342;&#2367;&#2358; &#2352;&#2366;&#2358;&#2367; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Work done is measured in joules</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2332;&#2370;&#2354; &#2350;&#2375;&#2306; &#2350;&#2366;&#2346;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Work done is a vector quantity</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2319;&#2325; &#2360;&#2342;&#2367;&#2358; &#2352;&#2366;&#2358;&#2367; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Work done is a <i>scalar</i> quantity. It has magnitude but no direction. While the <i>force</i> and <i>displacement</i> involved in work can be vectors, their dot product (which is how work is calculated) results in a scalar value.</p><p>Work done is negative when the force and displacement are in opposite directions (e.g., friction acting against motion).</p><p>The SI unit of work is the joule (J), where 1&#8201;J=1&#8201;N&#8901;m</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>An electric bulb of 60 W runs for 5 hours. The energy consumed in kWh is:</p></span><span class=\"hqt\" style=\"display:none\"><p>60 W &#2325;&#2366; &#2319;&#2325; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2348;&#2354;&#2381;&#2348; 5 &#2328;&#2306;&#2335;&#2375; &#2340;&#2325; &#2330;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404; kWh &#2350;&#2375;&#2306; &#2326;&#2346;&#2340; &#2314;&#2352;&#2381;&#2332;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">0.3</span><span class=\"hqt\" style=\"display:none\">0.3</span>",
      "<span class=\"eqt\">3.0</span><span class=\"hqt\" style=\"display:none\">3.0</span>",
      "<span class=\"eqt\">0.03</span><span class=\"hqt\" style=\"display:none\">0.03</span>",
      "<span class=\"eqt\">30.0</span><span class=\"hqt\" style=\"display:none\">30.0</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>To calculate the energy consumed by the electric bulb, use the formula:</p><p>Energy (kWh)=Power (W) X Time (h)/1000</p><p>Given:</p><p>&#183; Power (P) = 60 W,</p><p>&#183; Time (t) = 5 hours.</p><p>Substitute the values into the formula:</p><p>Energy=60 X 5/1000=300/1000=0.3&#8201;kWh</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>The work done against gravity in moving a body horizontally is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2346;&#2367;&#2306;&#2337; &#2325;&#2379; &#2325;&#2381;&#2359;&#2376;&#2340;&#2367;&#2332; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2325;&#2375; &#2357;&#2367;&#2352;&#2369;&#2342;&#2381;&#2343; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Maximum</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325;&#2340;&#2350;</span>",
      "<span class=\"eqt\">Minimum</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350;</span>",
      "<span class=\"eqt\">Zero</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2370;&#2344;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Depends on speed</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2340;&#2367; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In horizontal motion, displacement is perpendicular to gravitational force, making work done against gravity zero.</p><p>Work is done when a force causes displacement. When moving horizontally, the force of gravity acts vertically downwards. Since the displacement is perpendicular to the force of gravity, no work is done <i>against</i> gravity. If you were moving the object <i>upwards</i> against gravity, then work would be done. Horizontally, gravity doesn't contribute.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>Below are a few statements about power. </p><p>A. The average power of a force is defined as the ratio of the work, W, to the total time t taken. </p><p>B. Power is a vector quantity.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404;</p><p>A. &#2325;&#2367;&#2360;&#2368; &#2348;&#2354; &#2325;&#2368; &#2324;&#2360;&#2340; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2325;&#2366;&#2352;&#2381;&#2351;, W, &#2324;&#2352; &#2354;&#2367;&#2319; &#2327;&#2319; &#2325;&#2369;&#2354; &#2360;&#2350;&#2351; t &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>B. &#2358;&#2325;&#2381;&#2340;&#2367; &#2319;&#2325; &#2360;&#2342;&#2367;&#2358; &#2352;&#2366;&#2358;&#2367; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Both A &amp; B are incorrect</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Both A &amp; B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Power is defined as the rate at which work is done or energy is transferred.</p><p>&#183; Mathematically, average power (P<sub>avg</sub>&#8203;) is given by:</p><p>P<sub>avg</sub>=Wt &#8203;</p><p>where W is the work done and t is the total time taken.</p><p>&#183; Power is a <b>scalar quantity</b>, not a vector.</p><p>&#183; Power is calculated using work (a scalar) and time (a scalar), and it has no direction associated with it.</p>",
    "question_index": 19
  }
