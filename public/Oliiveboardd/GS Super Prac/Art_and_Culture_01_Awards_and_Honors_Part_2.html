    "correct_option_id": 0,

  {

    "correct_option_id": 0,
    "solution": "<p><b>Shanti Swarup Bhatnagar Prize - Science and Technology</b> </p><p>The Shanti Swarup Bhatnagar Prize for Science and Technology is a prestigious science award in India. It was established in 1958 in honor of Shanti Swarup Bhatnagar, the founder director of the Council of Scientific and Industrial Research (CSIR). The prize is awarded annually for outstanding contributions to science and technology. It is given in seven different categories: Biological Sciences, Chemical Sciences, Earth, Atmosphere, Ocean and Planetary Sciences, Engineering Sciences, Mathematical Sciences, Medical Sciences, and Physical Sciences. Recipients must be Indian citizens and under 45 years of age.</p><p><b>Pulitzer Prize - Journalism</b> </p><p>The Pulitzer Prize is one of the most prestigious awards in journalism, literature, and musical composition in the United States. It was established in 1917 by provisions in the will of Joseph Pulitzer, a Hungarian-American journalist and newspaper publisher. The prizes are administered by Columbia University in New York City. The Pulitzer Prize for journalism is awarded in various categories, including investigative reporting, explanatory reporting, breaking news, and feature writing. The prize aims to recognize excellence in journalism and encourage high standards in the profession.</p><p><b>Pritzker Prize - Architecture</b> </p><p>Pritzker Architecture Prize is often referred to as the \"Nobel Prize of Architecture.\" It was established in 1979 by the Pritzker family through their Hyatt Foundation. The prize is awarded annually to a living architect whose built work demonstrates a combination of talent, vision, and commitment. It includes a $100,000 grant and a bronze medallion. The prize is intended to honor a living architect whose work has produced consistent and significant contributions to humanity and the built environment through the art of architecture.</p><p><b>Grammy Awards - Music</b> </p><p>The Grammy Awards are presented by the Recording Academy to recognize achievements in the music industry. They were first presented in 1959 and are considered one of the four major annual American entertainment awards, along with the Academy Awards, Emmy Awards, and Tony Awards. The Grammy Awards cover a wide range of music genres and categories, including Record of the Year, Album of the Year, Song of the Year, and Best New Artist. The trophy depicts a gilded gramophone. The awards ceremony is known for its performances by prominent artists and has become a platform for social and political statements.</p>",
