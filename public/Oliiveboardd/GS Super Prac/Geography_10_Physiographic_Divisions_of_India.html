    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements correctly identifies the relationship between the Great Himalayas and the Lesser Himalayas?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2350;&#2361;&#2366;&#2344; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2324;&#2352; &#2354;&#2328;&#2369; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2348;&#2306;&#2343;&#2379;&#2306; &#2325;&#2379; &#2360;&#2361;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2346;&#2361;&#2330;&#2366;&#2344;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The Great Himalayas include the Naga Hills and the Karakoram Range.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2344; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2344;&#2366;&#2327;&#2366; &#2346;&#2361;&#2366;&#2337;&#2364;&#2367;&#2351;&#2366;&#2305; &#2324;&#2352; &#2325;&#2366;&#2352;&#2366;&#2325;&#2379;&#2352;&#2350; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The Lesser Himalayas lie between the Great Himalayas and the Shiwaliks, and contain the Dhaoladhar and Pir Panjal ranges.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2328;&#2369; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2350;&#2361;&#2366;&#2344; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2324;&#2352; &#2358;&#2367;&#2357;&#2366;&#2354;&#2367;&#2325; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;, &#2324;&#2352; &#2311;&#2360;&#2350;&#2375;&#2306; &#2343;&#2380;&#2354;&#2366;&#2343;&#2366;&#2352; &#2324;&#2352; &#2346;&#2368;&#2352; &#2346;&#2306;&#2332;&#2366;&#2354; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366;&#2319;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The Great Himalayas and the Lesser Himalayas are part of the same geological formation but are separated by the Mahabharat Range Hills.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2344; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2324;&#2352; &#2354;&#2328;&#2369; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2319;&#2325; &#2361;&#2368; &#2349;&#2370;&#2357;&#2376;&#2332;&#2381;&#2334;&#2366;&#2344;&#2367;&#2325; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2350;&#2361;&#2366;&#2349;&#2366;&#2352;&#2340; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366; &#2325;&#2368; &#2346;&#2361;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2311;&#2344;&#2381;&#2361;&#2375;&#2306; &#2309;&#2354;&#2327; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The Lesser Himalayas are the highest range in the Himalayan system, including peaks like Mount Everest.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2328;&#2369; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351;, &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2314;&#2306;&#2330;&#2368; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2350;&#2366;&#2313;&#2306;&#2335; &#2319;&#2357;&#2352;&#2375;&#2360;&#2381;&#2335; &#2332;&#2376;&#2360;&#2368; &#2330;&#2379;&#2335;&#2367;&#2351;&#2366;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Lesser Himalayas lie between the Great Himalayas and the Shiwaliks and include ranges such as Dhaoladhar and Pir Panjal.</p><p>&bull; The Great Himalayas are the highest range, not the Lesser Himalayas.</p><p><b>Further Insight:</b></p><p>&bull; The Himalayas stretch across northern India from west to east, forming a formidable barrier between the Indian subcontinent and the Tibetan Plateau.</p><p>&bull; <b>Major Ranges:</b></p><p>&#9675; <b>Great Himalayas (Himadri):</b> Highest range, including peaks like Mount Everest (8,848 meters) and Kanchenjunga (8,598 meters).</p><p>&#9675; <b>Lesser Himalayas (Himachal or Middle Himalayas):</b> Includes ranges like the Dhaoladhar, Nagtibha, and Pir Panjal.</p><p>&#9675; <b>Shiwaliks (Outer Himalayas):</b> The most distant range from the core, extending from 900 to 1000 meters in altitude.</p><p>&bull; <img width=552 height=352 id=image3.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image001.jpg\"></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In which geographical feature of the Northern Plains would you most likely find the most recent alluvial deposits?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2325;&#2368; &#2325;&#2367;&#2360; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2350;&#2375;&#2306; &#2310;&#2346;&#2325;&#2379; &#2360;&#2348;&#2360;&#2375; &#2344;&#2357;&#2368;&#2344;&#2340;&#2350; &#2332;&#2354;&#2379;&#2338;&#2364; &#2332;&#2350;&#2366;&#2357; &#2350;&#2367;&#2354;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bhabar</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2348;&#2352;</span>",
      "<span class=\"eqt\">Tarai</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2352;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Khadar</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2366;&#2342;&#2352;</span>",
      "<span class=\"eqt\">Bhangar</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2306;&#2327;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The Khadar region receives the most recent alluvial deposits, enriched by seasonal floods.</p><p>&bull; Bhabar region is characterized by older, coarser alluvium near the Shiwaliks.</p><p>&bull; Tarai region has dense vegetation and less defined channels, not the newest deposits.</p><p>&bull; Bhangar has older, more consolidated soil that does not receive recent deposits.</p><p><b>Further Insight:</b></p><p>&bull; <b>The Northern Plains</b></p><p>&#9675; <b>Formation:</b></p><p>&#9632; Formed by the alluvial deposits from the Indus, Ganga, and Brahmaputra rivers.</p><p>&#9632; Spans 3200 km from east to west, with alluvial deposits extending up to 2000 km beneath the surface.</p><p>&#9675; <b>Geographical Features:</b></p><p>&#9632; <b>Bhabar:</b> Narrow strip near the Shiwalik foothills with steep slopes.</p><p>&#9632; <b>Tarai:</b> Dense vegetation area south of Bhabar with poorly defined channels.</p><p>&#9632; <b>Alluvial Plains:</b> Includes:</p><p>&bull; <b>Khadar:</b> Flooded during monsoons with fresh alluvium deposits.</p><p>&bull; <b>Bhangar:</b> Older, non-flooded soil with consolidated deposits.</p><p>&#9632; <b>Regional Divisions:</b></p><p>&#9675; <b>Punjab Plains:</b> Formed by the Indus River and its tributaries, extending into Pakistan.</p><p>&#9675; <b>Ganga Plains:</b> Between the Teesta and Ghaggar rivers, encompassing parts of Delhi, Haryana, Bihar, Uttar Pradesh, and Jharkhand.</p><p>&#9675; <b>Brahmaputra Plains:</b> Mainly in Assam.</p><p>&bull; <img width=526 height=289 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image002.png\"></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following ranges forms the primary boundary of the Deccan Plateau to the north?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; &#2342;&#2325;&#2381;&#2325;&#2344; &#2325;&#2375; &#2346;&#2336;&#2366;&#2352; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2360;&#2368;&#2350;&#2366; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Aravalli Range</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2366;&#2357;&#2354;&#2368; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Vindhyan Range</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2306;&#2343;&#2381;&#2351; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Satpura Range</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2346;&#2369;&#2337;&#2364;&#2366; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Western Ghats</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Vindhyan Range forms the northern boundary of the Deccan Plateau. </p><p><b>Further Insight:</b></p><p>&bull; <b>The Peninsular Plateau</b></p><p>&#9675; A large<b> triangular plateau with elevations between 600 and 900 meters above sea level</b>.</p><p>&#9675; <b>Boundaries:</b></p><p>&#9632; <b>Delhi Ridge:</b> Extension of the Aravallis in the northwest.</p><p>&#9632; <b>Raj Mahal Hills:</b> To the east.</p><p>&#9632; <b>Gir Range:</b> To the west.</p><p>&#9632; <b>Cardamom Hills:</b> To the south.</p><p>&#9675; <b>Divisions:</b></p><p>&#9632; <b>Central Highlands:</b> Includes the Malwa Plateau, bounded by the Vindhyan range and Aravallis, with the Satpura range marking its southern border.</p><p>&#9632; <b>Deccan Plateau:</b> South of the Narmada River, with extensions including the Mahadev, Kaimur Hills, and Maikal range. It rises to the east and includes the Meghalaya Plateau and North Cachar Hills.</p><p>&#9632; <b>North-Eastern Plateau:</b> Includes the Meghalaya and Karbi-Anglong plateaus, shaped by the north-eastward movement of the Indian plate.</p><p>&bull; <img width=483 height=385 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image003.png\"></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following features is most indicative of the Thar Desert's geological history?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2341;&#2366;&#2352; &#2352;&#2375;&#2327;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344; &#2325;&#2375; &#2349;&#2370;&#2357;&#2376;&#2332;&#2381;&#2334;&#2366;&#2344;&#2367;&#2325; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2360;&#2306;&#2325;&#2375;&#2340; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Extensive river systems flowing through its center.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2375; &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352; &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2348;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2357;&#2367;&#2360;&#2381;&#2340;&#2371;&#2340; &#2344;&#2342;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2367;&#2351;&#2366;&#2305;&#2404;</span>",
      "<span class=\"eqt\">A significant fault line separating it from the Deccan Plateau.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2349;&#2381;&#2352;&#2306;&#2358; &#2352;&#2375;&#2326;&#2366; &#2361;&#2376; &#2332;&#2379; &#2311;&#2360;&#2375; &#2342;&#2325;&#2381;&#2325;&#2344; &#2325;&#2375; &#2346;&#2336;&#2366;&#2352; &#2360;&#2375; &#2309;&#2354;&#2327; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Evidence of a submerged ancient sea with fossilized remains.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2357;&#2366;&#2358;&#2381;&#2350; &#2309;&#2357;&#2358;&#2375;&#2359;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2337;&#2370;&#2348;&#2375; &#2361;&#2369;&#2319; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2325;&#2366; &#2360;&#2366;&#2325;&#2381;&#2359;&#2381;&#2351;&#2404;</span>",
      "<span class=\"eqt\">Dense tropical rainforest ecosystems.</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2344;&#2375; &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2357;&#2352;&#2381;&#2359;&#2366;&#2357;&#2344; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The Thar Desert shows evidence of having been submerged in ancient times, with fossilized remains like the Akal wood fossils.</p><p>&bull; Thar Desert does not have extensive river systems but rather features sparse water bodies.</p><p>&bull; Thar Desert does not have a significant fault line separating it from the Deccan Plateau.</p><p>&bull; Thar Desert is characterized by arid conditions, not tropical rainforests.</p><p><b>Further Insight:</b></p><p>&bull; <b>The Great Indian Desert/Thar Desert</b></p><p>&#9675; <b>Location and Characteristics:</b></p><p>&#9632; Located in north-western India, primarily in Rajasthan.</p><p>&#9632; Features include longitudinal barchans (crescent-shaped dunes), minimal rainfall, and sparse vegetation.</p><p>&#9675; <b>Geological History:</b></p><p>&#9632; Thought to have been submerged during the Mesozoic era, with fossil evidence like Akal's wood fossils.</p><p>&#9675; <b>Geographical Features:</b></p><p>&#9632; <b>Dunes and Terrain:</b> Includes mushroom rocks, shifting dunes, and oases.</p><p>&#9632; <b>Rivers:</b> The Luni is the significant river flowing through the desert.</p><p>&bull; <img width=432 height=236 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image004.png\"></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements accurately describes a feature of the Eastern Coastal Plains?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2340;&#2335;&#2368;&#2351; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2325;&#2366; &#2360;&#2335;&#2368;&#2325; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It extends from Gujarat to Kerala and is characterized by wide, sandy beaches.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340; &#2360;&#2375; &#2325;&#2375;&#2352;&#2354; &#2340;&#2325; &#2347;&#2376;&#2354;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2375; &#2330;&#2380;&#2337;&#2364;&#2375;, &#2352;&#2375;&#2340;&#2368;&#2354;&#2375; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2340;&#2335; &#2311;&#2360;&#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">It includes major deltas such as those of the Mahanadi, Godavari, Krishna, and Kaveri rivers.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2350;&#2375;&#2306; &#2350;&#2361;&#2366;&#2344;&#2342;&#2368;, &#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368;, &#2325;&#2371;&#2359;&#2381;&#2339;&#2366; &#2324;&#2352; &#2325;&#2366;&#2357;&#2375;&#2352;&#2368; &#2344;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2337;&#2375;&#2354;&#2381;&#2335;&#2366; &#2332;&#2376;&#2360;&#2375; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2337;&#2375;&#2354;&#2381;&#2335;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">It is bordered by the Western Ghats and is known for its volcanic activity.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335; &#2360;&#2375; &#2328;&#2367;&#2352;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376; &#2324;&#2352; &#2309;&#2346;&#2344;&#2368; &#2332;&#2381;&#2357;&#2366;&#2354;&#2366;&#2350;&#2369;&#2326;&#2368; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is separated from the Deccan Plateau by a fault line.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2342;&#2325;&#2381;&#2325;&#2344; &#2325;&#2375; &#2346;&#2336;&#2366;&#2352; &#2360;&#2375; &#2319;&#2325; &#2349;&#2381;&#2352;&#2306;&#2358; &#2352;&#2375;&#2326;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2354;&#2327; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Eastern Coastal Plains are characterized by major river deltas like those of the Mahanadi, Godavari, Krishna, and Kaveri.</p><p>&bull; Eastern Coastal Plains are bordered by the Eastern Ghats, not known for volcanic activity.</p><p>&bull; Eastern Coastal Plains are not separated from the Deccan Plateau by a fault line but rather by the Eastern Ghats.</p><p><b>Further Insight:</b></p><p>&bull; <b>Eastern Coastal Plains:</b></p><p>&#9675; Located between the Bay of Bengal and the Eastern Ghats, covering Tamil Nadu, Andhra Pradesh, and Odisha.</p><p>&#9675; Includes major deltas such as those of the Mahanadi, Godavari, Krishna, and Kaveri rivers.</p><p>&#9675; Sub-divided into:</p><p>&#9632; Northern Circar: Features deltas and Chilika Lake.</p><p>&#9632; Coromandel Coast: Extends from Kanyakumari to the Krishna delta.</p><p><img width=455 height=439 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image005.png\"></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following accurately describes the geological features of the Lakshadweep Islands?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2354;&#2325;&#2381;&#2359;&#2342;&#2381;&#2357;&#2368;&#2346; &#2342;&#2381;&#2357;&#2368;&#2346; &#2360;&#2350;&#2370;&#2361; &#2325;&#2368; &#2349;&#2370;&#2357;&#2376;&#2332;&#2381;&#2334;&#2366;&#2344;&#2367;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2323;&#2306; &#2325;&#2366; &#2360;&#2335;&#2368;&#2325; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">They are characterized by volcanic activity and are located between the Arabian Sea and the Bay of Bengal.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2332;&#2381;&#2357;&#2366;&#2354;&#2366;&#2350;&#2369;&#2326;&#2368;&#2351; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2351;&#2369;&#2325;&#2381;&#2340; &#2361;&#2376;&#2306; &#2324;&#2352; &#2309;&#2352;&#2348; &#2360;&#2366;&#2327;&#2352; &#2340;&#2341;&#2366; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2368; &#2326;&#2366;&#2337;&#2364;&#2368; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They feature coral deposits and are located in the Arabian Sea.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2366;&#2354; &#2349;&#2306;&#2337;&#2366;&#2352; &#2361;&#2376;&#2306; &#2324;&#2352; &#2351;&#2375; &#2309;&#2352;&#2348; &#2360;&#2366;&#2327;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They are primarily composed of sedimentary rock and are situated between the Andaman Sea and the Indian Ocean.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351;&#2340;&#2307; &#2309;&#2357;&#2360;&#2366;&#2342;&#2368; &#2330;&#2335;&#2381;&#2335;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2348;&#2344;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2309;&#2306;&#2337;&#2350;&#2366;&#2344; &#2360;&#2366;&#2327;&#2352; &#2324;&#2352; &#2361;&#2367;&#2306;&#2342; &#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They include significant fault lines and volcanic activity, forming a part of the Indian Ocean Ridge.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375;&#2306; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2349;&#2381;&#2352;&#2306;&#2358; &#2352;&#2375;&#2326;&#2366;&#2319;&#2306; &#2324;&#2352; &#2332;&#2381;&#2357;&#2366;&#2354;&#2366;&#2350;&#2369;&#2326;&#2368; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2366;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;, &#2332;&#2379; &#2361;&#2367;&#2306;&#2342; &#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352; &#2352;&#2367;&#2332; &#2325;&#2366; &#2319;&#2325; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Lakshadweep Islands are known for their coral deposits and are located in the Arabian Sea.</p><p>&bull; Lakshadweep Islands are not volcanic but are coral islands.</p><p>&bull; Lakshadweep Islands are not composed of sedimentary rock and are located in the Arabian Sea, not the Andaman Sea.</p><p>&bull; Lakshadweep Islands do not include significant fault lines or volcanic activity related to the Indian Ocean Ridge.</p><p><b>Further Insight:</b></p><p>&bull; <b>Andaman and Nicobar Islands</b></p><p>&#9675; Geographical Location:</p><p>&#9632; Situated in the Bay of Bengal, between 6&deg; to 14&deg; N latitude and 92&deg; to 94&deg; E longitude.</p><p>&#9632; Divided into two groups: Andaman Islands (north) and Nicobar Islands (south), separated by the Ten Degree Channel.</p><p>&#9675; Number of Islands:</p><p>&#9632; Consists of 572 islands and islets, with the Labyrinth Islands and Ritchie's Archipelago being major groups.</p><p>&#9675; Formation:</p><p>&#9632; <b>The islands are believed to be elevated portions of submerged mountain ranges.</b></p><p>&#9632; <b>The Barren Island in the Andamans has India's only active volcano.</b></p><p>&#9675; Important Peaks:</p><p>&#9632; <b>Saddle Peak (North Andaman) is the highest peak at 738 m.</b></p><p>&#9632; <b>Mount Thuiller (642 m) in the Nicobar group.</b></p><p>&bull; </p><p>&bull; <img width=623 height=228 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image006.png\"></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements correctly describes the geographical extent of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2360;&#2368;&#2350;&#2366; &#2325;&#2366; &#2360;&#2361;&#2368; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">India spans from 6&deg;45' N to 37&deg;6'N latitude and 68&deg;7'E to 97&deg;25'E longitude.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; 6&deg;45' &#2313;&#2340;&#2381;&#2340;&#2352; &#2360;&#2375; 37&deg;6' &#2313;&#2340;&#2381;&#2340;&#2352; &#2309;&#2325;&#2381;&#2359;&#2366;&#2306;&#2358; &#2340;&#2341;&#2366; 68&deg;7' &#2346;&#2370;&#2352;&#2381;&#2357; &#2360;&#2375; 97&deg;25' &#2346;&#2370;&#2352;&#2381;&#2357; &#2342;&#2375;&#2358;&#2366;&#2306;&#2340;&#2352; &#2340;&#2325; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">India stretches from 8&deg;4'N to 37&deg;6'N latitude and 75&deg;7'E to 95&deg;25'E longitude.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; 8&deg;4'&#2313;&#2340;&#2381;&#2340;&#2352; &#2360;&#2375; 37&deg;6'&#2313;&#2340;&#2381;&#2340;&#2352; &#2309;&#2325;&#2381;&#2359;&#2366;&#2306;&#2358; &#2340;&#2341;&#2366; 75&deg;7'&#2346;&#2370;&#2352;&#2381;&#2357; &#2360;&#2375; 95&deg;25'&#2346;&#2370;&#2352;&#2381;&#2357; &#2342;&#2375;&#2358;&#2366;&#2306;&#2340;&#2352; &#2340;&#2325; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">India is located between 10&deg;4'N and 30&deg;6'N latitude and 80&deg;7'E to 100&deg;25'E longitude.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; 10&deg;4'N &#2324;&#2352; 30&deg;6'N &#2309;&#2325;&#2381;&#2359;&#2366;&#2306;&#2358; &#2340;&#2341;&#2366; 80&deg;7'E &#2360;&#2375; 100&deg;25'E &#2342;&#2375;&#2358;&#2366;&#2306;&#2340;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">India covers latitudes from 0&deg; to 30&deg;N and longitudes from 60&deg;E to 90&deg;E.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; 0 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2360;&#2375; 30 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2309;&#2325;&#2381;&#2359;&#2366;&#2306;&#2358; &#2340;&#2341;&#2366; 60 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2346;&#2370;&#2352;&#2381;&#2357; &#2360;&#2375; 90 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2346;&#2370;&#2352;&#2381;&#2357; &#2342;&#2375;&#2358;&#2366;&#2306;&#2340;&#2352; &#2340;&#2325; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; India spans from approximately 6&deg;N to 37&deg;N latitude and 68&deg;E to 97&deg;E longitude.</p><p><b>Further Insight:</b></p><p>&bull; Complete India (Including Islands):</p><p>&#9675; Latitudinal Extension: From 6&deg;45' N (Sailendra Island in the Andaman and Nicobar Islands) to 37&deg;6' N (Indira Col in Jammu and Kashmir).</p><p>&#9675; Longitudinal Extension: From 68&deg;7' E (near Guhar Moti, Gujarat) to 97&deg;25' E (near Kibithu, Arunachal Pradesh).</p><p>&bull; Mainland India:</p><p>&#9675; Latitudinal Extension: From 8&deg;4' N (Kanyakumari, Tamil Nadu) to 37&deg;6' N (Indira Col in Jammu and Kashmir).</p><p>&#9675; Longitudinal Extension: From 68&deg;7' E (near Guhar Moti, Gujarat) to 97&deg;25' E (near Kibithu, Arunachal Pradesh).</p><p>&bull; <img width=443 height=521 id=image7.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image007.png\"></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following mountain ranges is not part of the Trans-Himalayas?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2346;&#2352;&#2381;&#2357;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;-&#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Zanskar Range</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2364;&#2366;&#2306;&#2360;&#2381;&#2325;&#2352; &#2352;&#2375;&#2306;&#2332;</span>",
      "<span class=\"eqt\">Karakoram Range</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2366;&#2325;&#2379;&#2352;&#2350; &#2352;&#2375;&#2306;&#2332;</span>",
      "<span class=\"eqt\">Ladakh Range</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2342;&#2381;&#2342;&#2366;&#2326; &#2352;&#2375;&#2306;&#2332;</span>",
      "<span class=\"eqt\">Aravalli Range</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2366;&#2357;&#2354;&#2368; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; The Aravalli Range is not part of the Trans-Himalayas; it is a separate range in western India.</p><p><b>Further Insight:</b></p><p>&bull; <b>Trans-Himalayas</b></p><p>&#9675; Location and Extension:</p><p>&#9632; The Trans-Himalayas, also known as the Tibetan Himalayas, are located to the north of the Greater Himalayas.</p><p>&#9632; They extend from the western part of the Himalayas in Jammu and Kashmir to the eastern part of Arunachal Pradesh.</p><p>&#9632; They span approximately from the Ladakh region in the west to the Tibetan Plateau in the east.</p><p>&#9675; Geographical Features:</p><p>&#9632; The Trans-Himalayas lie between the Great Himalayas to the south and the Tibetan Plateau to the north.</p><p>&#9675; Major Ranges and Hills:</p><p>&#9632; Zanskar Range:</p><p>&bull; Located in the Zanskar Valley in Ladakh.</p><p>&bull; Known for its rugged terrain and high-altitude desert landscape.</p><p>&#9632; Ladakh Range:</p><p>&bull; Extends parallel to the Zanskar Range.</p><p>&bull; Situated in the northern part of the Indian state of Ladakh.</p><p>&#9632; Karakoram Range:</p><p>&bull; Located between the Ladakh region and Gilgit-Baltistan.</p><p>&bull; Famous for high peaks like K2 and the Siachen Glacier.</p><p>&#9632; Hemis Range:</p><p>&bull; Part of the Ladakh region.</p><p>&bull; Known for the Hemis Monastery and its remote, high-altitude terrain.</p><p>&#9632; Nubra Valley:</p><p>&bull; Lies between the Ladakh Range and the Karakoram Range.</p><p>&bull; Known for its unique landscape with sand dunes and high-altitude desert conditions.</p><p>&bull; <img width=624 height=466 id=image5.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image008.jpg\"></p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements about the Himalayan range is true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Punjab Himalayas: Located between the kali and Indus rivers</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2332;&#2366;&#2348; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351;: &#2325;&#2366;&#2354;&#2368; &#2324;&#2352; &#2360;&#2367;&#2306;&#2343;&#2369; &#2344;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2381;&#2341;&#2367;&#2340;</span>",
      "<span class=\"eqt\">Kumaon Himalayas: Located between the Sutlej and Kali rivers.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2350;&#2366;&#2314;&#2305; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351;: &#2360;&#2340;&#2354;&#2369;&#2332; &#2324;&#2352; &#2325;&#2366;&#2354;&#2368; &#2344;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Nepal Himalayas: Located between the Kali and Sutlej rivers.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2346;&#2366;&#2354; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351;: &#2325;&#2366;&#2354;&#2368; &#2324;&#2352; &#2360;&#2340;&#2354;&#2369;&#2332; &#2344;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Assam Himalayas: Located between the Brahamputra and Dihang rivers</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2350; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351;: &#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2346;&#2369;&#2340;&#2381;&#2352; &#2324;&#2352; &#2342;&#2367;&#2361;&#2366;&#2306;&#2327; &#2344;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2381;&#2341;&#2367;&#2340;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Punjab Himalayas: Located between the Indus and Sutlej rivers, this region is also known as the Kashmir Himalaya or the Himachal Himalaya.</p><p>&bull; <b>Kumaon Himalayas: Located between the Sutlej and Kali rivers.</b></p><p>&bull; Nepal Himalayas: Located between the Kali and Teesta rivers in Nepal.</p><p>&bull; Assam Himalayas: Located between the Teesta and Dihang rivers in Assam.</p><p>&bull; Purvanchal: Located beyond the Dihang river</p><p><b>Further Insight:</b></p>  <h3 style='margin:0cm;line-height:12.0pt;page-break-after:auto;background:white; border:none;padding:0cm'>&bull; <b>Division of the Himalayas from West to East Based on Rivers</b> </h3><p>&bull; <b>Punjab Himalayas (Indus to Sutlej)</b></p><p>&#9675; It spans from the Indus River in the west to the Sutlej River in the east.</p><p>&#9675; This region is referred to as the <b>Kashmir Himalaya</b> in the northern part and the <b>Himachal Himalaya</b> in the southern part.</p><p>&#9675; States Covered: Includes Jammu and Kashmir, Ladakh, and parts of Himachal Pradesh.</p><p>&#9675; Notable Features:</p><p>&#9632; Important Peaks: <b>Nanga Parbat, Harmukh, and Pir Panjal.</b></p><p>&#9632; Significance: This region contains major hill stations (e.g., Shimla, Manali) and the Kashmir Valley</p><p>&#9632; <b>Glaciers such as the Siachen and important passes like Zojila and Banihal also feature here</b>.</p> <h4 style='margin:0cm;line-height:12.0pt;page-break-after:auto;background:white; border:none;padding:0cm;padding-top:0cm;padding-bottom:0cm;border-bottom:0cm none #E3E3E3'>&bull; <b>Kumaon Himalayas (Sutlej to Kali)</b></h4><p>&#9675; It is located between the Sutlej River in the west and the Kali River (also called the Sharda or Mahakali) in the east.</p><p>&#9675; States Covered: Major parts of Uttarakhand.</p><p>&#9675; Notable Features:</p><p>&#9632; <b>Important Peaks: Nanda Devi, Trishul, and Kamet.</b></p><p>&#9632; Hill Stations: Includes popular destinations like <b>Nainital</b> and Almora.</p><p>&#9632; Significance: <b>Known for its deep valleys</b></p> <h4 style='margin:0cm;line-height:12.0pt;page-break-after:auto;background:white; border:none;padding:0cm;padding-top:0cm;padding-bottom:0cm;border-bottom:0cm none #E3E3E3'>&bull; <b>Nepal Himalayas (Kali to Teesta)</b></h4><p>&#9675; It is located between the Kali River (western boundary) and the Teesta River (eastern boundary).</p><p>&#9675; Countries Covered: Predominantly Nepal, with some influence on India's Sikkim region.</p><p>&#9675; Notable Features:</p><p>&#9632; Important Peaks:<b> Mount Everest, Kanchenjunga, Makalu, and Annapurna.</b></p> <h4 style='margin:0cm;line-height:12.0pt;page-break-after:auto;background:white; border:none;padding:0cm;padding-top:0cm;padding-bottom:0cm;border-bottom:0cm none #E3E3E3'>&bull; <b>Assam Himalayas (Teesta to Dihang)</b></h4><p>&#9675; It is located between the Teesta River in Sikkim to the Dihang (also known as Siang or Brahmaputra) River in Arunachal Pradesh.</p><p>&#9675; Includes parts of Sikkim, West Bengal (Darjeeling region), Bhutan, and Arunachal Pradesh.</p><p>&#9675; Notable Features:</p><p>&#9632; <b>Important Peaks: Kangchenjunga, part of the eastern Himalayan range.</b></p> <h4 style='margin:0cm;line-height:12.0pt;page-break-after:auto;background:white; border:none;padding:0cm;padding-top:0cm;padding-bottom:0cm;border-bottom:0cm none #E3E3E3'>&bull; <b>Purvanchal (Beyond Dihang)</b></h4><p>&#9675; The Purvanchal Himalayas are located beyond the Dihang River, marking the transition of the Himalayas into the northeastern part of India.</p><p>&#9675; States Covered: Includes parts of Arunachal Pradesh, Nagaland, Manipur, Mizoram, and Tripura.</p><p>&#9675; Notable Features:</p><p>&#9632; Important Hills and Ranges: <b>Patkai Hills, Naga Hills, Mizo Hills, and Manipur Hills.</b></p><p>&bull; <img width=400 height=223 id=image8.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image009.png\"></p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a characteristic of the Tarai region in the Northern Plains?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2340;&#2352;&#2366;&#2312; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It has a well-defined river channel and sparse vegetation.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2369;&#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2344;&#2342;&#2368; &#2330;&#2376;&#2344;&#2354; &#2324;&#2352; &#2357;&#2367;&#2352;&#2354; &#2357;&#2344;&#2360;&#2381;&#2346;&#2340;&#2367; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is situated just south of the Bhabar region and features dense natural vegetation.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2349;&#2366;&#2348;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2336;&#2368;&#2325; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2350;&#2375;&#2306; &#2328;&#2344;&#2368; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2357;&#2344;&#2360;&#2381;&#2346;&#2340;&#2367; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It consists of older alluvium and is prone to frequent flooding.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2346;&#2369;&#2352;&#2366;&#2344;&#2368; &#2332;&#2354;&#2379;&#2338;&#2364; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2360;&#2375; &#2348;&#2344;&#2366; &#2361;&#2376; &#2324;&#2352; &#2351;&#2361;&#2366;&#2306; &#2309;&#2325;&#2381;&#2360;&#2352; &#2348;&#2366;&#2338;&#2364; &#2310;&#2340;&#2368; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is characterized by the presence of sandbars and meanders.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2352;&#2375;&#2340; &#2325;&#2375; &#2335;&#2368;&#2354;&#2379;&#2306; &#2324;&#2352; &#2328;&#2369;&#2350;&#2366;&#2357;&#2342;&#2366;&#2352; &#2352;&#2366;&#2360;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Tarai region is located south of the Bhabar region and is known for its dense natural vegetation.</p><p>&bull; Tarai region does not have a well-defined river channel and is characterized by dense vegetation.</p><p>&bull; Tarai region does not consist of older alluvium or frequent flooding.</p><p>&bull; Sandbars and meanders are features of the alluvial plains, not the Tarai region.</p><p><b>Further Insight:</b></p><p><b>The Northern Plains</b></p><p>&#9675; <b>Formation:</b></p><p>&#9632; Formed by the alluvial deposits from the Indus, Ganga, and Brahmaputra rivers.</p><p>&#9632; Spans 3200 km from east to west, with alluvial deposits extending up to 2000 km beneath the surface.</p><p>&#9675; <b>Geographical Features:</b></p><p>&#9632; <b>Bhabar:</b> Narrow strip near the Shiwalik foothills with steep slopes.</p><p>&#9632; <b>Tarai:</b> Dense vegetation area south of Bhabar with poorly defined channels.</p><p>&#9632; <b>Alluvial Plains:</b> Includes:</p><p>&bull; <b>Khadar:</b> Flooded during monsoons with fresh alluvium deposits.</p><p>&bull; <b>Bhangar:</b> Older, non-flooded soil with consolidated deposits.</p><p>&#9632; <b>Regional Divisions:</b></p><p>&#9675; <b>Punjab Plains:</b> Formed by the Indus River and its tributaries, extending into Pakistan.</p><p>&#9675; <b>Ganga Plains:</b> Between the Teesta and Ghaggar rivers, encompassing parts of Delhi, Haryana, Bihar, Uttar Pradesh, and Jharkhand.</p><p>&#9675; <b>Brahmaputra Plains:</b> Mainly in Assam.</p><p>&bull; North to south map</p><p>&#9675; <img width=526 height=289 id=image15.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image010.png\"></p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following best describes the geographical feature of the Thar Desert?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2341;&#2366;&#2352; &#2352;&#2375;&#2327;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344; &#2325;&#2368; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It is a coastal desert located along the Arabian Sea.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2309;&#2352;&#2348; &#2360;&#2366;&#2327;&#2352; &#2325;&#2375; &#2325;&#2367;&#2344;&#2366;&#2352;&#2375; &#2360;&#2381;&#2341;&#2367;&#2340; &#2319;&#2325; &#2340;&#2335;&#2368;&#2351; &#2352;&#2375;&#2327;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is a plateau characterized by volcanic activity and high elevation.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2319;&#2325; &#2346;&#2336;&#2366;&#2352; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2332;&#2381;&#2357;&#2366;&#2354;&#2366;&#2350;&#2369;&#2326;&#2368;&#2351; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367; &#2324;&#2352; &#2313;&#2330;&#2381;&#2330; &#2314;&#2306;&#2330;&#2366;&#2312; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is an arid region with sparse vegetation, located in northwestern India and eastern Pakistan.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2357;&#2367;&#2352;&#2354; &#2357;&#2344;&#2360;&#2381;&#2346;&#2340;&#2367; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2358;&#2369;&#2359;&#2381;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2361;&#2376;, &#2332;&#2379; &#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2349;&#2366;&#2352;&#2340; &#2324;&#2352; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2346;&#2366;&#2325;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It consists of fertile alluvial plains with frequent river floods.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2350;&#2375;&#2306; &#2313;&#2346;&#2332;&#2366;&#2314; &#2332;&#2354;&#2379;&#2338;&#2364; &#2350;&#2376;&#2342;&#2366;&#2344; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2344;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2348;&#2366;&#2338;&#2364; &#2309;&#2325;&#2381;&#2360;&#2352; &#2310;&#2340;&#2368; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The Thar Desert is an arid region with sparse vegetation, located in northwestern India and eastern Pakistan.</p><p>&bull; Thar Desert is not a coastal desert but an arid region inland. </p><p><b>Further Insight:</b></p><p>&bull; <b>The Great Indian Desert/Thar Desert</b></p><p>&#9675; <b>Location and Characteristics:</b></p><p>&#9632; Located in north-western India, primarily in Rajasthan.</p><p>&#9632; Features include longitudinal barchans (crescent-shaped dunes), minimal rainfall, and sparse vegetation.</p><p>&#9675; <b>Geological History:</b></p><p>&#9632; Thought to have been submerged during the Mesozoic era, with fossil evidence like Akal's wood fossils.</p><p>&#9675; <b>Geographical Features:</b></p><p>&#9632; <b>Dunes and Terrain:</b> Includes mushroom rocks, shifting dunes, and oases.</p><p>&#9632; <b>Rivers:</b> The Luni is the significant river flowing through the desert.</p><p>&bull; <img width=432 height=236 id=image13.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image011.png\"></p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which feature distinguishes the Western Coastal Plains from the Eastern Coastal Plains?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2340;&#2335;&#2368;&#2351; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2340;&#2335;&#2368;&#2351; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2309;&#2354;&#2327; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The Western Coastal Plains are narrower and have sandy beaches, while the Eastern Coastal Plains are wider and have major deltas.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2340;&#2335;&#2368;&#2351; &#2350;&#2376;&#2342;&#2366;&#2344; &#2360;&#2306;&#2325;&#2352;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2313;&#2344;&#2350;&#2375;&#2306; &#2352;&#2375;&#2340;&#2368;&#2354;&#2375; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2340;&#2335; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2340;&#2335;&#2368;&#2351; &#2350;&#2376;&#2342;&#2366;&#2344; &#2330;&#2380;&#2337;&#2364;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2313;&#2344;&#2350;&#2375;&#2306; &#2348;&#2337;&#2364;&#2375; &#2337;&#2375;&#2354;&#2381;&#2335;&#2366; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The Western Coastal Plains are characterized by wide river deltas, while the Eastern Coastal Plains have rocky shores.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2340;&#2335;&#2368;&#2351; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2371;&#2340; &#2344;&#2342;&#2368; &#2337;&#2375;&#2354;&#2381;&#2335;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2340;&#2335;&#2368;&#2351; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2340;&#2335; &#2330;&#2335;&#2381;&#2335;&#2366;&#2344;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The Western Coastal Plains include the Sundarbans Delta, while the Eastern Coastal Plains have volcanic islands.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2340;&#2335;&#2368;&#2351; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2369;&#2306;&#2342;&#2352;&#2348;&#2344; &#2337;&#2375;&#2354;&#2381;&#2335;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2340;&#2335;&#2368;&#2351; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2332;&#2381;&#2357;&#2366;&#2354;&#2366;&#2350;&#2369;&#2326;&#2368; &#2342;&#2381;&#2357;&#2368;&#2346; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The Western Coastal Plains are part of the Deccan Plateau, while the Eastern Coastal Plains are located in the Himalayan foothills.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2340;&#2335;&#2368;&#2351; &#2350;&#2376;&#2342;&#2366;&#2344; &#2342;&#2325;&#2381;&#2325;&#2344; &#2325;&#2375; &#2346;&#2336;&#2366;&#2352; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2340;&#2335;&#2368;&#2351; &#2350;&#2376;&#2342;&#2366;&#2344; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2325;&#2368; &#2340;&#2352;&#2366;&#2312; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The Western Coastal Plains are narrower and feature sandy beaches, while the Eastern Coastal Plains are wider and include major river deltas.</p><p>&bull; Western Coastal Plains are known for sandy beaches, not wide deltas.</p><p>&bull; the Sundarbans Delta is part of the Eastern Coastal Plains, not the Western Coastal Plains.</p><p>&bull; Western Coastal Plains are not part of the Deccan Plateau, and the Eastern Coastal Plains are not in the Himalayan foothills.</p><p><b>Further Insight:</b></p><p>&bull; <b>Western Coastal Plains:</b></p><p>&#9675; Lies between the Arabian Sea and the Western Ghats, extending from Gujarat to Kerala.</p><p>&#9675; Notable for natural ports like Kandla, Mangalore, and Cochin.</p><p>&#9675; Subdivision of Western Coast:</p><p>&#9632; Gujarat Coast</p><p>&#9632; Konkan Coast</p><p>&#9632; Malabar Coast</p>  <h3 style='margin:0cm;line-height:12.0pt;page-break-after:auto;background:white; border:none;padding:0cm;padding-bottom:0cm;border-bottom:0cm none #E3E3E3'>&#9675; <b>Key Characteristics of the Western Coastal Plain:</b></h3><p>&#9632; Narrow and flat terrain with a tropical climate.</p><p>&#9632; Rich in natural resources, especially for agriculture (coconuts, spices), and fisheries.</p><p>&bull; <b>Eastern Coastal Plains:</b></p><p>&#9675; Located between the Bay of Bengal and the Eastern Ghats, covering Tamil Nadu, Andhra Pradesh, and Odisha.</p><p>&#9675; Includes major deltas such as those of the Mahanadi, Godavari, Krishna, and Kaveri rivers.</p><p>&#9675; Sub-divided into:</p><p>&#9632; Northern Circar: Features deltas and Chilika Lake.</p><p>&#9632; Coromandel Coast: Extends from Kanyakumari to the Krishna delta.</p><p>&bull; <img width=455 height=439 id=image14.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image012.png\"></p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following correctly describes the Lakshadweep Islands' geological composition?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2354;&#2325;&#2381;&#2359;&#2342;&#2381;&#2357;&#2368;&#2346; &#2342;&#2381;&#2357;&#2368;&#2346; &#2360;&#2350;&#2370;&#2361; &#2325;&#2368; &#2349;&#2370;&#2357;&#2376;&#2332;&#2381;&#2334;&#2366;&#2344;&#2367;&#2325; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2325;&#2366; &#2360;&#2361;&#2368; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The Lakshadweep Islands are formed primarily from volcanic activity.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2325;&#2381;&#2359;&#2342;&#2381;&#2357;&#2368;&#2346; &#2342;&#2381;&#2357;&#2368;&#2346; &#2360;&#2350;&#2370;&#2361; &#2350;&#2369;&#2326;&#2381;&#2351;&#2340;&#2307; &#2332;&#2381;&#2357;&#2366;&#2354;&#2366;&#2350;&#2369;&#2326;&#2368; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367; &#2360;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2361;&#2369;&#2319; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The Lakshadweep Islands are composed mainly of coral atolls and are located in the Arabian Sea.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2325;&#2381;&#2359;&#2342;&#2381;&#2357;&#2368;&#2346; &#2342;&#2381;&#2357;&#2368;&#2346; &#2360;&#2350;&#2370;&#2361; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2357;&#2366;&#2354; &#2342;&#2381;&#2357;&#2368;&#2346;&#2379;&#2306; &#2360;&#2375; &#2348;&#2344;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2352;&#2348; &#2360;&#2366;&#2327;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The Lakshadweep Islands are sedimentary islands found in the Bay of Bengal.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2325;&#2381;&#2359;&#2342;&#2381;&#2357;&#2368;&#2346; &#2342;&#2381;&#2357;&#2368;&#2346; &#2360;&#2350;&#2370;&#2361; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2368; &#2326;&#2366;&#2337;&#2364;&#2368; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2357;&#2360;&#2366;&#2342;&#2368; &#2342;&#2381;&#2357;&#2368;&#2346; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The Lakshadweep Islands are characterized by active tectonic fault lines and mountain ranges.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2325;&#2381;&#2359;&#2342;&#2381;&#2357;&#2368;&#2346; &#2342;&#2381;&#2357;&#2368;&#2346;&#2360;&#2350;&#2370;&#2361; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2335;&#2375;&#2325;&#2381;&#2335;&#2379;&#2344;&#2367;&#2325; &#2347;&#2377;&#2354;&#2381;&#2335; &#2354;&#2366;&#2311;&#2344;&#2375;&#2306; &#2324;&#2352; &#2346;&#2352;&#2381;&#2357;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366;&#2319;&#2306; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Lakshadweep Islands are coral atolls located in the Arabian Sea.</p><p>&bull; Lakshadweep Islands are located in the Arabian Sea, not the Bay of Bengal.</p><p>&bull; Lakshadweep Islands do not feature active tectonic fault lines or mountain ranges.</p><p><b>Further Insight:</b></p><p>&bull; <b>Lakshadweep</b></p><p>&#9675; Geographical Location:</p><p>&#9632; Situated in the Arabian Sea, off the southwest coast of IndiaClosest mainland is Kerala, approximately 280-480 km away.</p><p>&#9675; Number of Islands:</p><p>&#9632; Consists of 36 coral islands, 12 atolls, 3 reefs, and 5 submerged banks.</p><p>&#9632; <b>Minicoy is the largest island, and Kavaratti is the administrative headquarters.</b></p><p>&#9675; Formation:</p><p>&#9632; The islands are coral atolls formed from volcanic activity, later colonized by coral reefs.</p><p>&#9632; Coral deposits are significant, creating lagoons and reefs which are ecologically important.</p><p>&#9675; Ecology and Biodiversity:</p><p>&#9632; Known for rich marine biodiversity, including coral reefs, seaweeds, and a variety of fish species.</p><p>&#9632; <b>The Pitti Island is a declared bird sanctuary.</b></p><p>&bull; <img width=623 height=228 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image013.png\"></p>",
    "question_index": 12
  },

    "question": "<span class=\"eqt\"><p>Which of the following is a significant feature of the Andaman and Nicobar Islands?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2309;&#2306;&#2337;&#2350;&#2366;&#2344; &#2324;&#2352; &#2344;&#2367;&#2325;&#2379;&#2348;&#2366;&#2352; &#2342;&#2381;&#2357;&#2368;&#2346; &#2360;&#2350;&#2370;&#2361; &#2325;&#2368; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">They are primarily composed of sedimentary rock formations.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351;&#2340;&#2307; &#2309;&#2357;&#2360;&#2366;&#2342;&#2368; &#2330;&#2335;&#2381;&#2335;&#2366;&#2344; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;&#2323;&#2306; &#2360;&#2375; &#2348;&#2344;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They include the active volcanic regions of Barren Island and Narcondam Island.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375;&#2306; &#2348;&#2376;&#2352;&#2344; &#2342;&#2381;&#2357;&#2368;&#2346; &#2324;&#2352; &#2344;&#2366;&#2352;&#2381;&#2325;&#2379;&#2306;&#2337;&#2350; &#2342;&#2381;&#2357;&#2368;&#2346; &#2325;&#2375; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2332;&#2381;&#2357;&#2366;&#2354;&#2366;&#2350;&#2369;&#2326;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They are known for their extensive coral reef systems along the eastern coast.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2340;&#2335; &#2346;&#2352; &#2309;&#2346;&#2344;&#2368; &#2357;&#2367;&#2360;&#2381;&#2340;&#2371;&#2340; &#2346;&#2381;&#2352;&#2357;&#2366;&#2354; &#2349;&#2367;&#2340;&#2381;&#2340;&#2367; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They lie in the Arabian Sea and are part of the Western Ghats.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2309;&#2352;&#2348; &#2360;&#2366;&#2327;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2306; &#2324;&#2352; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Andaman and Nicobar Islands include active volcanic regions such as Barren Island and Narcondam Island.</p><p>&bull; Andaman and Nicobar Islands have a diverse geological composition including volcanic origins.</p><p>&bull; <b>Extensive coral reef systems are more characteristic of the Lakshadweep Islands, not the Andaman and Nicobar Islands.</b></p><p>&bull; The Andaman and Nicobar Islands are located in the Bay of Bengal, not the Arabian Sea, and are not part of the Western Ghats.</p><p><b>Further Insight:</b></p><p><b>Andaman and Nicobar Islands</b></p><p>&#9675; Geographical Location:</p><p>&#9632; Situated in the Bay of Bengal, between 6&deg; to 14&deg; N latitude and 92&deg; to 94&deg; E longitude.</p><p>&#9632; Divided into two groups: Andaman Islands (north) and Nicobar Islands (south), separated by the Ten Degree Channel.</p><p>&#9675; Number of Islands:</p><p>&#9632; Consists of 572 islands and islets, with the Labyrinth Islands and Ritchie's Archipelago being major groups.</p><p>&#9675; Formation:</p><p>&#9632; <b>The islands are believed to be elevated portions of submerged mountain ranges.</b></p><p>&#9632; <b>The Barren Island in the Andamans has India's only active volcano.</b></p><p>&#9675; Important Peaks:</p><p>&#9632; <b>Saddle Peak (North Andaman) is the highest peak at 738 m.</b></p><p>&#9632; <b>Mount Thuiller (642 m) in the Nicobar group.</b></p><p>&bull; <img width=623 height=228 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image014.png\"></p>",
    "question_index": 13
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding important passes in India:</p><p><b>a.</b> Nathu-La is an important pass located in Sikkim that connects India and Tibet.</p><p><b>b.</b> Jelepa La is the main India-Tibet trade route connecting Kalimpong near Darjeeling with Lhasa in Tibet.</p><p><b>c.</b> Zoji-La pass, located in Jammu &amp; Kashmir, connects India with Afghanistan.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2342;&#2352;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2344;&#2366;&#2341;&#2370;-&#2354;&#2366; &#2360;&#2367;&#2325;&#2381;&#2325;&#2367;&#2350; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2342;&#2352;&#2381;&#2352;&#2366; &#2361;&#2376; &#2332;&#2379; &#2349;&#2366;&#2352;&#2340; &#2324;&#2352; &#2340;&#2367;&#2348;&#2381;&#2348;&#2340; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>b. &#2332;&#2375;&#2354;&#2375;&#2346;&#2366; &#2354;&#2366;, &#2342;&#2366;&#2352;&#2381;&#2332;&#2367;&#2354;&#2367;&#2306;&#2327; &#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2354;&#2367;&#2350;&#2381;&#2346;&#2379;&#2306;&#2327; &#2325;&#2379; &#2340;&#2367;&#2348;&#2381;&#2348;&#2340; &#2350;&#2375;&#2306; &#2354;&#2381;&#2361;&#2366;&#2360;&#2366; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2349;&#2366;&#2352;&#2340;-&#2340;&#2367;&#2348;&#2381;&#2348;&#2340; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2350;&#2366;&#2352;&#2381;&#2327; &#2361;&#2376;&#2404;</p><p>c. &#2332;&#2350;&#2381;&#2350;&#2370; &#2324;&#2352; &#2325;&#2358;&#2381;&#2350;&#2368;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2332;&#2364;&#2379;&#2332;&#2368;-&#2354;&#2366; &#2342;&#2352;&#2381;&#2352;&#2366; &#2349;&#2366;&#2352;&#2340; &#2325;&#2379; &#2309;&#2347;&#2327;&#2366;&#2344;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",

    "question": "<span class=\"eqt\"><p>Which statement accurately describes the geographical features and boundaries of the Peninsular Plateau?</p><p>a) The Peninsular Plateau is divided into the Central Highlands, Deccan Plateau, and North-Eastern Plateau, with the Satpura Range forming the northern boundary of the Deccan Plateau.</p><p>b) The Deccan Plateau is bounded by the Aravalli Range to the north and the Satpura Range to the south, with the Central Highlands extending further east.</p><p>c) The North-Eastern Plateau includes the Meghalaya Plateau and is separated from the Deccan Plateau by a fault line.</p><p>d) The Central Highlands consist of the Deccan Plateau and extend to the western coast of India.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2346;&#2381;&#2352;&#2366;&#2351;&#2342;&#2381;&#2357;&#2368;&#2346;&#2368;&#2351; &#2346;&#2336;&#2366;&#2352; &#2325;&#2368; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2323;&#2306; &#2324;&#2352; &#2360;&#2368;&#2350;&#2366;&#2323;&#2306; &#2325;&#2366; &#2360;&#2335;&#2368;&#2325; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p><p>a) &#2346;&#2381;&#2352;&#2366;&#2351;&#2342;&#2381;&#2357;&#2368;&#2346;&#2368;&#2351; &#2346;&#2336;&#2366;&#2352; &#2325;&#2379; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2361;&#2366;&#2311;&#2354;&#2376;&#2306;&#2337;&#2381;&#2360;, &#2337;&#2375;&#2325;&#2381;&#2325;&#2344; &#2346;&#2336;&#2366;&#2352; &#2324;&#2352; &#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2346;&#2336;&#2366;&#2352; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2360;&#2340;&#2346;&#2369;&#2337;&#2364;&#2366; &#2352;&#2375;&#2306;&#2332; &#2337;&#2375;&#2325;&#2381;&#2325;&#2344; &#2346;&#2336;&#2366;&#2352; &#2325;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2360;&#2368;&#2350;&#2366; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>b) &#2337;&#2375;&#2325;&#2381;&#2325;&#2344; &#2346;&#2336;&#2366;&#2352; &#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; &#2309;&#2352;&#2366;&#2357;&#2354;&#2368; &#2352;&#2375;&#2306;&#2332; &#2324;&#2352; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2350;&#2375;&#2306; &#2360;&#2340;&#2346;&#2369;&#2337;&#2364;&#2366; &#2352;&#2375;&#2306;&#2332; &#2360;&#2375; &#2328;&#2367;&#2352;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2361;&#2366;&#2311;&#2354;&#2376;&#2306;&#2337;&#2381;&#2360; &#2346;&#2370;&#2352;&#2381;&#2357; &#2350;&#2375;&#2306; &#2310;&#2327;&#2375; &#2340;&#2325; &#2347;&#2376;&#2354;&#2375; &#2361;&#2369;&#2319; &#2361;&#2376;&#2306;&#2404;</p><p>c) &#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2346;&#2336;&#2366;&#2352; &#2350;&#2375;&#2306; &#2350;&#2375;&#2328;&#2366;&#2354;&#2351; &#2346;&#2336;&#2366;&#2352; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376; &#2324;&#2352; &#2351;&#2361; &#2319;&#2325; &#2347;&#2377;&#2354;&#2381;&#2335; &#2354;&#2366;&#2311;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2337;&#2375;&#2325;&#2381;&#2325;&#2344; &#2346;&#2336;&#2366;&#2352; &#2360;&#2375; &#2309;&#2354;&#2327; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>d) &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2361;&#2366;&#2311;&#2354;&#2376;&#2306;&#2337;&#2381;&#2360; &#2350;&#2375;&#2306; &#2337;&#2375;&#2325;&#2381;&#2325;&#2344; &#2346;&#2336;&#2366;&#2352; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376; &#2324;&#2352; &#2351;&#2361; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2340;&#2335; &#2340;&#2325; &#2347;&#2376;&#2354;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;&#2404;</p></span>",

    "solution": "<p>&bull; The Peninsular Plateau is divided into the Central Highlands, Deccan Plateau, and North-Eastern Plateau, with the Satpura Range forming the northern boundary of the Deccan Plateau.</p><p>&bull; Aravalli Range is not a boundary of the Deccan Plateau; it forms the western boundary of the Central Highlands.</p><p>&bull; The North-Eastern Plateau is separated from the Deccan Plateau by a fault line, but this does not cover the full extent of the region.</p><p>&bull; Central Highlands do not include the Deccan Plateau and do not extend to the western coast.</p><p><b>Further Insight:</b></p><p>&bull; <b>The Peninsular Plateau</b></p><p>&#9675; A large triangular plateau with elevations between 600 and 900 meters above sea level.</p><p>&#9675; <b>Boundaries:</b></p><p>&#9632; <b>Delhi Ridge:</b> Extension of the Aravallis in the northwest.</p><p>&#9632; <b>Raj Mahal Hills:</b> To the east.</p><p>&#9632; <b>Gir Range:</b> To the west.</p><p>&#9632; <b>Cardamom Hills:</b> To the south.</p><p>&#9675; <b>Divisions:</b></p><p>&#9632; <b>Central Highlands:</b> Includes the Malwa Plateau, bounded by the Vindhyan range and Aravallis, with the Satpura range marking its southern border.</p><p>&#9632; <b>Deccan Plateau:</b> South of the Narmada River, with extensions including the Mahadev, Kaimur Hills, and Maikal range. It rises to the east and includes the Meghalaya Plateau and North Cachar Hills.</p><p>&#9632; <b>North-Eastern Plateau:</b> Includes the Meghalaya and Karbi-Anglong plateaus, shaped by the north-eastward movement of the Indian plate.</p><p>&#9675; <b>Notable Features:</b></p><p>&#9632; <b>Deccan Trap:</b> Region with black soil formed by volcanic rocks.</p><p>&#9632; <b>Ravines:</b> Chambal, Bhind, and Morena are significant ravines.</p><p>&bull; <img width=483 height=385 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image016.png\"></p>",

  },

    "solution": "<p>&bull; The major island of Andaman is Port Blair which is also the capital of Andaman and Nicobar island.</p><p>&bull; The Lakshadweep Islands are known for their coral reefs and marine life.</p><p>&bull; Indira Point, The southernmost point of India located in great Nicobar Island</p><p>&bull; Barren Island is famous for its volcanic origin and remote location.</p><p><b>Further Insight:</b></p><p>&bull; <b>Andaman and Nicobar Islands</b></p><p>&#9675; Located in the Bay of Bengal; closer to Myanmar and Thailand than mainland India.</p><p>&#9675; Geography: Consists of 572 islands, of which 37 are inhabited.</p><p>&#9675; Capital: Port Blair (Andaman Islands)</p><p>&#9675; Division:</p><p>&#9632; Andaman Islands: Northern group of islands.</p><p>&#9632; Nicobar Islands: Southern group.</p><p>&#9675; Key Features:</p><p>&#9632; Barren Island: India's only active volcano.</p><p>&#9632; Great Nicobar Island: Southernmost point, home to Indira Point.</p><p>&#9675; Tribes: Jarwa, Onge, Sentinalese, and Nicobarese.</p><p>&#9675; </p> <h3 style='margin:0cm;line-height:12.0pt;page-break-after:auto;background:white; border:none;padding:0cm;padding-top:0cm;padding-bottom:0cm;border-bottom:0cm none #E3E3E3'>&bull; <b>Lakshadweep</b></h3> <h3 style='margin:0cm;line-height:12.0pt;page-break-after:auto;background:white; border:none;padding:0cm;padding-top:0cm;padding-bottom:0cm;border-bottom:0cm none #E3E3E3'>&#9675; Situated in the Arabian Sea, off the coast of Kerala.</h3><p>&#9675; Consists of 36 islands, 10 of which are inhabited. All islands are coral atolls.</p><p>&#9675; Main Islands: Kavaratti (capital), Agatti, Minicoy, Amini.</p><p>&#9675; Known for its coral reefs, rich marine life, and pristine beaches.</p><p>&#9675; Tribes: Majority population is of Malayalam-speaking Muslims.</p><p>&bull; <img width=623 height=228 id=image9.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25828/image018.png\"></p>",
