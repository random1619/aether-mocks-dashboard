s drawn from Govind Vallabh Pant Sagar reservoir.</p><p>&#183; <b>Tiroda Thermal Power Plant</b></p><p>o The Tiroda thermal power plant in Maharashtra, India, stands as a 3,300MW coal-based facility under Adani Power Maharashtra's ownership. </p><p>o Comprising five 660MW units, it commenced operations between August 2012 and October 2014. </p><p>o Employing cutting-edge supercritical technology, it sources water from the Wainganga River. </p><p>&#183; <b>Talcher Super Thermal Power Station</b></p><p>o Situated in Odisha's Angul district, the Talcher Super Thermal Power Station, or NTPC Talcher Kaniha, boasts a 3,000MW capacity and is owned and operated by NTPC. </p><p>o With six 500MW units, it commenced operations between February 1995 and February 2005.</p><p>&#183; <b>Rihand Thermal Power Station</b></p><p>o Located in Rihandnagar, Sonebhadra district, Uttar Pradesh, the Rihand Thermal Power Station, owned by NTPC, boasts a 3,000MW capacity. </p><p>o Its six units, each generating 500MW, were commissioned between March 1988 and October 2013. </p><p>o Coal is sourced from Madhya Pradesh's mines, while water is drawn from the Rihand Reservoir on the Son River.</p><p>&#183; <b>Sipat Thermal Power Plant</b></p><p>o The Sipat Super Thermal Power Plant, located in Sipat, Bilaspur district, Chhattisgarh, is the eighth-largest in India with a 2,980MW capacity. </p><p>o Owned by NTPC, it features six units, a mix of 660MW supercritical and 500MW units, operational between August 2008 and June 2012. Renamed Rajiv Gandhi Super Thermal Power Station in 2013, it sources coal from Dipika Mines and water from the Right Bank Canal. </p><p>&#183; <b>Chandrapur Super Thermal Power Station</b></p><p>o The Chandrapur Super Thermal Power Station, Maharashtra's largest, boasts a 2,920MW capacity in Chandrapur. </p><p>o Operated by the Maharashtra State Power Generation Company, it comprises five 500MW units and two 210MW units, commissioned between 1985 and 2016. </p><p>o Drawing water from Erai and Chargaon dams, it satisfies a quarter of Maharashtra's electricity demand, exemplifying its critical role in the state's power supply.</p><p>&#183; <b>NTPC Dadri</b></p><p>o NTPC Dadri, also known as National Capital Power Station (NCPS), owned and operated by NTPC, is situated in Gautam Budh Nagar district, Uttar Pradesh, 48km from New Delhi. </p><p>o With a 2637MW capacity, it ranks as India's sixth-largest thermal plant. </p><p>o Featuring six coal-fired units and six gas-based units, commissioned between 1991 and 2010, it draws coal from Piparwar Mines, gas from GAIL Hazira-Bijapur-Jagdishpur Pipeline, and water from Upper Ganga Canal.</p>",
