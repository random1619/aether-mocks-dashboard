    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following processes in plants directly converts light energy into chemical energy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2380;&#2343;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2379; &#2360;&#2368;&#2343;&#2375; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2314;&#2352;&#2381;&#2332;&#2366; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Respiration</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2357;&#2360;&#2344;</span>",
      "<span class=\"eqt\">Photosynthesis</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Transpiration</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2375;&#2342;</span>",
      "<span class=\"eqt\">Growth</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2325;&#2366;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Photosynthesis</b> is a physico-chemical process by which green plants use light energy to drive the synthesis of organic compounds.</p><p>Respiration releases energy from organic compounds, transpiration involves water movement, and growth is an increase in size.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The primary site of photosynthesis in higher plants is the</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2330;&#2381;&#2330; &#2346;&#2380;&#2343;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2360;&#2381;&#2341;&#2354; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Stem</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Root</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2337;&#2364;</span>",
      "<span class=\"eqt\">Flower</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2370;&#2354;</span>",
      "<span class=\"eqt\">Leaf</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2381;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Photosynthesis does take place in the <b>green leaves</b> of plants but it does so also in other green parts of the plants.</p><p>However, leaves, particularly the mesophyll cells within them containing chloroplasts, are the primary sites.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The oxygen released during photosynthesis comes from</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2367;&#2340; &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2325;&#2361;&#2366;&#2305; &#2360;&#2375; &#2310;&#2340;&#2368; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Carbon dioxide</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2312;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Water</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Glucose</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2352;&#2381;&#2325;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Chlorophyll</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2347;&#2367;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In green plants <b>H&#8322;O is the hydrogen donor and is oxidised to O&#8322;</b> during photosynthesis.</p><p>This was later proved by using radioisotopic techniques.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The light-dependent reactions of photosynthesis occur in the</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;-&#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;</p></span>",
    "options": [
      "<span class=\"eqt\">Stroma</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2381;&#2352;&#2379;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Grana (thylakoid membranes)</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2366;&#2344;&#2366; (&#2341;&#2366;&#2351;&#2354;&#2366;&#2325;&#2379;&#2311;&#2337; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368;)</span>",
      "<span class=\"eqt\">Cytoplasm</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Nucleus</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2349;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Within the chloroplasts, the <b>membrane system (grana, stroma lamellae)</b> is responsible for trapping the light energy and also for the synthesis of ATP and NADPH, which are products of the light-dependent reactions.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The end products of the light-dependent reactions of photosynthesis are</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;-&#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2309;&#2306;&#2340;&#2367;&#2350; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2361;&#2376;&#2306;</p></span>",
    "options": [
      "<span class=\"eqt\">Glucose and oxygen</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2354;&#2370;&#2325;&#2379;&#2332;&#2364; &#2324;&#2352; &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Carbon dioxide and water</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368;</span>",
      "<span class=\"eqt\">ATP, NADPH, and oxygen</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2335;&#2368;&#2346;&#2368;, &#2319;&#2344;&#2319;&#2337;&#2368;&#2346;&#2368;&#2319;&#2330;, &#2324;&#2352; &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Sugar and ATP</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2352;&#2381;&#2325;&#2352;&#2366; &#2324;&#2352; &#2319;.&#2335;&#2368;.&#2346;&#2368;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Light reactions or the 'Photochemical' phase include light absorption, water splitting, oxygen release, and the formation of high-energy chemical intermediates, <b>ATP and NADPH</b>. <b>Oxygen</b> is also released as a result of water splitting.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The Calvin cycle (dark reaction) takes place in the</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2354;&#2381;&#2357;&#2367;&#2344; &#2330;&#2325;&#2381;&#2352; (&#2309;&#2306;&#2343;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;) &#2325;&#2361;&#2366;&#2305; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Thylakoid lumen</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2366;&#2351;&#2354;&#2366;&#2325;&#2379;&#2311;&#2337; &#2354;&#2369;&#2350;&#2375;&#2344;</span>",
      "<span class=\"eqt\">Thylakoid membrane</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2366;&#2351;&#2354;&#2366;&#2325;&#2379;&#2311;&#2337; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Stroma</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2381;&#2352;&#2379;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Intermembrane space of chloroplast</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2335; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352;&#2333;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2381;&#2341;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In <b>stroma</b>, enzymatic reactions synthesise sugar, which in turn forms starch. These reactions are part of the Calvin cycle, also known as dark reactions.</p><p>The Calvin cycle (dark reaction) takes place in the <b>Stroma</b> of the chloroplast.</p><p>&bull; The <b>stroma</b> is the fluid-filled space surrounding the thylakoids in the chloroplast, where the enzymes required for the Calvin cycle are located.</p><p>&bull; The <b>thylakoid lumen</b> and <b>thylakoid membrane </b>are involved in the light-dependent reactions (photosynthesis, not the Calvin cycle).</p><p>&bull; The <b>intermembrane space of chloroplast </b>is between the inner and outer membranes of the chloroplast and is not directly involved in photosynthesis.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The first stable product of carbon dioxide fixation in the C&#8323; pathway is</p></span><span class=\"hqt\" style=\"display:none\"><p>C&#8323; &#2350;&#2366;&#2352;&#2381;&#2327; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2347;&#2367;&#2325;&#2381;&#2360;&#2375;&#2358;&#2344; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2360;&#2381;&#2341;&#2367;&#2352; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Oxaloacetic acid (OAA)</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2366;&#2354;&#2379;&#2319;&#2360;&#2367;&#2335;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337; (OAA)</span>",
      "<span class=\"eqt\">Ribulose-1,5-bisphosphate (RuBP)</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2348;&#2369;&#2354;&#2379;&#2332;-1,5-&#2348;&#2367;&#2360;&#2347;&#2364;&#2377;&#2360;&#2381;&#2347;&#2364;&#2375;&#2335; (RuBP)</span>",
      "<span class=\"eqt\">3-phosphoglyceric acid (PGA)</span><span class=\"hqt\" style=\"display:none\">3-&#2347;&#2377;&#2360;&#2381;&#2347;&#2379;&#2327;&#2381;&#2354;&#2367;&#2360;&#2352;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337; (&#2346;&#2368;&#2332;&#2368;&#2319;)</span>",
      "<span class=\"eqt\">Phosphoenol pyruvate (PEP)</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2377;&#2360;&#2381;&#2347;&#2379;&#2311;&#2344;&#2379;&#2354; &#2346;&#2366;&#2311;&#2352;&#2370;&#2357;&#2375;&#2335; (&#2346;&#2368;&#2312;&#2346;&#2368;)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The use of radioactive &#185;&#8308;C by Melvin Calvin in algal photosynthesis studies led to the discovery that the <b>first CO&#8322; fixation product was a 3-carbon organic acid</b>, identified as <b>3-phosphoglyceric acid or in short PGA</b>.</p><p>Further information:</p><p>The primary CO&#8322; acceptor in C&#8324; plants is a 3-carbon molecule phosphoenol pyruvate (PEP) and is present in the <b>mesophyll cells</b>. The enzyme responsible for this fixation is PEP carboxylase or PEPcase.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>RuBisCO, the most abundant enzyme in the world, can bind to both carbon dioxide and oxygen. Its affinity for which gas is higher under normal conditions?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2369;&#2348;&#2367;&#2360;&#2381;&#2325;&#2379;, &#2342;&#2369;&#2344;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2346;&#2381;&#2352;&#2330;&#2369;&#2352; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2346;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2306;&#2332;&#2366;&#2311;&#2350; &#2361;&#2376;, &#2332;&#2379; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2324;&#2352; &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2346;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2327;&#2376;&#2360; &#2325;&#2375; &#2354;&#2367;&#2319; &#2311;&#2360;&#2325;&#2368; &#2310;&#2340;&#2381;&#2350;&#2368;&#2351;&#2340;&#2366; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Oxygen</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Carbon dioxide</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2312;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Both have equal affinity</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2310;&#2340;&#2381;&#2350;&#2368;&#2351;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Depends on temperature</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>RuBisCO has a much greater affinity for <b>CO&#8322;</b> when the CO&#8322;:O&#8322; ratio is nearly equal.</p><p>&bull; <b>RuBisCO (Ribulose-1,5-bisphosphate carboxylase/oxygenase)</b> is the key enzyme in the Calvin cycle and catalyzes two competing reactions:</p><p>&bull; <b>Carboxylation</b> (productive pathway)  -  CO&#8322; binds to RuBP, leading to carbon fixation (C&#8323; pathway).</p><p>&bull; <b>Oxygenation</b> (wasteful pathway)  -  O&#8322; binds to RuBP, leading to photorespiration.</p><p>&bull; <b>RuBisCO's affinity for CO&#8322; is about 80 times higher than for O&#8322;</b> under normal atmospheric conditions (with CO&#8322; at ~0.04% and O&#8322; at ~21%).</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Glycolysis, the breakdown of glucose to pyruvic acid, occurs in the</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2381;&#2354;&#2366;&#2311;&#2325;&#2379;&#2354;&#2366;&#2311;&#2360;&#2367;&#2360;, &#2327;&#2381;&#2354;&#2370;&#2325;&#2379;&#2332; &#2325;&#2366; &#2346;&#2366;&#2311;&#2352;&#2369;&#2357;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337; &#2350;&#2375;&#2306; &#2357;&#2367;&#2328;&#2335;&#2344;, &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Mitochondria</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2311;&#2335;&#2379;&#2325;&#2377;&#2344;&#2381;&#2337;&#2381;&#2352;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Chloroplast</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Cytoplasm</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Nucleus</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2349;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Glycolysis occurs in the cytoplasm</b> of the cell and is present in all living organisms.</p><p>&bull; <b>Glycolysis</b> is the metabolic pathway that breaks down <b>glucose into pyruvate (pyruvic acid)</b>.</p><p>&bull; It occurs in the <b>cytoplasm (cytosol)</b> of the cell, <b>not</b> in membrane-bound organelles like mitochondria or chloroplasts.</p><p>&bull; Glycolysis is an <b>anaerobic process</b> (does not require oxygen) and is the first stage of cellular respiration in both aerobic and anaerobic organisms.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The net gain of ATP molecules during glycolysis is</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2381;&#2354;&#2366;&#2311;&#2325;&#2379;&#2354;&#2366;&#2311;&#2360;&#2367;&#2360; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2319;&#2335;&#2368;&#2346;&#2368; &#2309;&#2339;&#2369;&#2323;&#2306; &#2325;&#2366; &#2358;&#2369;&#2342;&#2381;&#2343; &#2354;&#2366;&#2349; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>",
      "<span class=\"eqt\">38</span><span class=\"hqt\" style=\"display:none\">38</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>ATP is utilised at two steps, and ATP is synthesised at four steps during glycolysis from one glucose molecule, resulting in a <b>net gain of two ATP molecules</b>.</p><p>&bull; <b>Glycolysis</b> breaks down <b>1 glucose molecule (6C) into 2 pyruvate molecules (3C each)</b>.</p><p>&bull; <b>Total ATP produced</b>: <b>4 ATP</b> (2 from substrate-level phosphorylation per pyruvate &rarr; 4 total).</p><p>&bull; <b>ATP consumed</b>: <b>2 ATP</b> (used in the energy investment phase to phosphorylate glucose).</p><p>&bull; <b>Net ATP gain</b> = <b>4 ATP (produced) - 2 ATP (used) = 2 ATP</b>.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>The end product of anaerobic respiration in yeast is</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2368;&#2360;&#2381;&#2335; &#2350;&#2375;&#2306; &#2309;&#2357;&#2366;&#2351;&#2357;&#2368;&#2351; &#2358;&#2381;&#2357;&#2360;&#2344; &#2325;&#2366; &#2309;&#2306;&#2340;&#2367;&#2350; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Lactic acid</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2376;&#2325;&#2381;&#2335;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337;</span>",
      "<span class=\"eqt\">Pyruvic acid</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2352;&#2369;&#2357;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337;</span>",
      "<span class=\"eqt\">Ethanol and carbon dioxide</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2341;&#2375;&#2344;&#2377;&#2354; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Water and carbon dioxide</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2354; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Yeast (a fungus) undergoes <b>alcoholic fermentation</b>, a type of anaerobic respiration.</p><p>&bull; The process starts with <b>glycolysis</b>, breaking glucose into <b>pyruvate (pyruvic acid)</b>.</p><p>&bull; Since oxygen is absent, pyruvate is then converted into:</p><p>o <b>Ethanol (alcohol)</b></p><p>o <b>Carbon dioxide (CO&#8322;)</b> (which causes bread to rise and beverages to bubble).</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Aerobic respiration primarily occurs in the</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2352;&#2379;&#2348;&#2367;&#2325; &#2358;&#2381;&#2357;&#2360;&#2344; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Cytoplasm</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Nucleus</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2349;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Mitochondria</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2311;&#2335;&#2379;&#2325;&#2377;&#2344;&#2381;&#2337;&#2381;&#2352;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Endoplasmic reticulum</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2381;&#2340;&#2307; &#2346;&#2381;&#2352;&#2342;&#2357;&#2381;&#2351;&#2351;&#2368; &#2332;&#2354;&#2367;&#2325;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The breakdown of complex molecules to yield energy takes place in the cytoplasm and in the <b>mitochondria</b> (also only in eukaryotes).</p><p>For aerobic respiration to take place, pyruvate is transported from the cytoplasm into the <b>mitochondria</b>.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Plant growth is generally</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2380;&#2343;&#2375; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307;</p></span>",
    "options": [
      "<span class=\"eqt\">Determinate</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2325;&#2381;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Indeterminate</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2369;&#2357;&#2367;&#2343;&#2366; &#2350;&#2375;&#2306; &#2346;&#2337;&#2364;&#2366; &#2361;&#2369;&#2310;</span>",
      "<span class=\"eqt\">Limited to embryonic stages</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2381;&#2352;&#2370;&#2339; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2340;&#2325; &#2360;&#2368;&#2350;&#2367;&#2340;</span>",
      "<span class=\"eqt\">Uniform throughout life</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2357;&#2344; &#2349;&#2352; &#2319;&#2325;&#2352;&#2370;&#2346;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Plant growth is unique because plants retain the capacity for unlimited growth throughout their life.</b></p><p>This ability of the plants is due to the presence of meristems.</p><p>This form of growth wherein new cells are always being added to the plant body by the activity of the meristem is called the <b>open form of growth</b> or indeterminate growth.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Increase in the girth of a plant due to the activity of vascular cambium is called</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2357;&#2361;&#2344;&#2368; &#2325;&#2376;&#2350;&#2381;&#2348;&#2367;&#2351;&#2350; &#2325;&#2368; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351;&#2340;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2346;&#2380;&#2343;&#2375; &#2325;&#2368; &#2346;&#2352;&#2367;&#2343;&#2367; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Primary growth</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Secondary growth</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Apical dominance</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2368;&#2352;&#2381;&#2359;&#2360;&#2381;&#2341; &#2346;&#2381;&#2352;&#2349;&#2369;&#2340;&#2381;&#2357;</span>",
      "<span class=\"eqt\">Differentiation</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2375;&#2342;&#2349;&#2366;&#2357;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In dicotyledonous plants and gymnosperms, the lateral meristems, <b>vascular cambium and cork-cambium appear later in life.</b></p><p><b>These are the meristems that cause the increase in the girth of the organs in which they are active.</b></p><p><b>This is known as secondary growth</b> of the plant.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>The phenomenon where the growing apical bud inhibits the growth of lateral buds is called</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2328;&#2335;&#2344;&#2366; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2369;&#2312; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2354;&#2368; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2325;&#2354;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2379; &#2352;&#2379;&#2325;&#2340;&#2368; &#2361;&#2376;, &#2325;&#2361;&#2354;&#2366;&#2340;&#2368; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Apical dominance</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2368;&#2352;&#2381;&#2359;&#2360;&#2381;&#2341; &#2346;&#2381;&#2352;&#2349;&#2369;&#2340;&#2381;&#2357;</span>",
      "<span class=\"eqt\">Parthenocarpy</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2367;&#2359;&#2375;&#2325; &#2347;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Senescence</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2338;&#2364;&#2366;&#2346;&#2366;</span>",
      "<span class=\"eqt\">Abscission</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2326;&#2306;&#2337;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In most higher plants, the growing apical bud inhibits the growth of the lateral (axillary) buds, a phenomenon called <b>apical dominance</b>.</p><p>&bull; <b>Apical dominance</b> is a phenomenon where the <b>main central stem (apical bud) suppresses the growth of lateral (axillary) buds</b>, ensuring that the plant grows vertically rather than branching out excessively.</p><p>&bull; This is primarily regulated by the plant hormone <b>auxin</b>, produced in the shoot tip.</p><p>&bull; When the apical bud is removed (e.g., by pruning), lateral buds grow, leading to bushier plant growth.</p><p><b>Further insights:</b></p><p>&bull; <b>Parthenocarpy</b>  -  Development of fruit <b>without fertilization</b> (e.g., seedless fruits).</p><p>&bull; <b>Senescence</b>  -  The <b>aging and deterioration</b> of plant parts (e.g., leaf fall in autumn).</p><p>&bull; <b>Abscission</b>  -  The <b>shedding of leaves, flowers, or fruits</b> due to hormonal changes (e.g., ethylene).</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are correct?</p><p>I. Photosynthesis is a physico-chemical process that uses light energy to synthesize organic compounds.</p><p>II. The Calvin cycle occurs in all photosynthetic plants, whether they have C&#8323; or C&#8324; pathways.</p><p>III. Photorespiration is a process that results in the synthesis of sugars and ATP.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2319;&#2325; &#2349;&#2380;&#2340;&#2367;&#2325;-&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2361;&#2376; &#2332;&#2379; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2351;&#2380;&#2327;&#2367;&#2325;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2325;&#2376;&#2354;&#2381;&#2357;&#2367;&#2344; &#2330;&#2325;&#2381;&#2352; &#2360;&#2349;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2325; &#2346;&#2380;&#2343;&#2379;&#2306; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2330;&#2366;&#2361;&#2375; &#2313;&#2344;&#2350;&#2375;&#2306; C&#8323; &#2351;&#2366; C&#8324; &#2350;&#2366;&#2352;&#2381;&#2327; &#2361;&#2379;&#2404;</p><p>III. &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2358;&#2381;&#2357;&#2360;&#2344; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2358;&#2352;&#2381;&#2325;&#2352;&#2366; &#2324;&#2352; &#2319;&#2335;&#2368;&#2346;&#2368; &#2325;&#2366; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I and II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Only I and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II, and III</span><span class=\"hqt\" style=\"display:none\">I, II, &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct; Photosynthesis is indeed both a physical (light-dependent) and chemical (biochemical reactions) process that converts light energy into chemical energy (organic compounds like glucose).</p><p>Statement II is also correct ; While C&#8324; plants have an additional CO&#8322;-concentrating mechanism, all photosynthetic plants ultimately use the Calvin cycle to fix carbon into sugars. C&#8324; plants just perform part of the process in different cells.</p><p>Statement III is incorrect; Photorespiration is actually a wasteful process that occurs when RuBisCO binds O&#8322; instead of CO&#8322;. It consumes ATP and releases CO&#8322;, leading to a net loss of energy and carbon (opposite of sugar synthesis).</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) accurately describes plant growth regulators (PGRs)?</p><p>I. Auxins, gibberellins, and cytokinins are primarily involved in growth-promoting activities.</p><p>II. Abscisic acid (ABA) generally acts as a plant growth promoter.</p><p>III. Ethylene is a gaseous PGR involved in fruit ripening and senescence.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2344;&#2367;&#2351;&#2366;&#2350;&#2325;&#2379;&#2306; (PGRs) &#2325;&#2366; &#2360;&#2335;&#2368;&#2325; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p><p>I. &#2321;&#2325;&#2381;&#2360;&#2367;&#2344;, &#2332;&#2367;&#2348;&#2352;&#2375;&#2354;&#2367;&#2344; &#2324;&#2352; &#2360;&#2366;&#2311;&#2335;&#2379;&#2325;&#2366;&#2311;&#2344;&#2367;&#2344; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2319;&#2348;&#2381;&#2360;&#2367;&#2360;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337; (ABA) &#2310;&#2350; &#2340;&#2380;&#2352; &#2346;&#2352; &#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2319;&#2341;&#2367;&#2354;&#2368;&#2344; &#2319;&#2325; &#2327;&#2376;&#2360;&#2368;&#2351; PGR &#2361;&#2376; &#2332;&#2379; &#2347;&#2354;&#2379;&#2306; &#2325;&#2375; &#2346;&#2325;&#2344;&#2375; &#2324;&#2352; &#2332;&#2368;&#2352;&#2381;&#2339;&#2340;&#2366; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Only III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">I, II, and III</span><span class=\"hqt\" style=\"display:none\">I, II, &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct; auxins, gibberellins, and cytokinins are involved in growth promoting activities.</p><p>&bull; Auxins &rarr; Cell elongation, apical dominance.</p><p>&bull; Gibberellins &rarr; Stem elongation, seed germination.</p><p>&bull; Cytokinins &rarr; Cell division, delay senescence.</p><p>Statement II is incorrect; ABA acts as a general <b>plant growth inhibitor</b>. It helps in:</p><p>&bull; Stomatal closure (during drought).</p><p>&bull; Seed dormancy.</p><p>&bull; Stress responses.</p><p>Statement III is correct; ethylene promotes <b>senescence</b> and is highly effective in <b>fruit ripening</b>.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Match the scientist with their key contribution to the understanding of photosynthesis:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Joseph Priestley</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Proposed the pathway of carbon assimilation in photosynthesis</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Jan Ingenhousz</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Provided evidence for the production of glucose in plants</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Julius von Sachs</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Showed that sunlight is essential for air purification by plants</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Melvin Calvin</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Revealed the essential role of air in the growth of green plants and discovered oxygen</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2368; &#2360;&#2350;&#2333; &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2375; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; &#2357;&#2376;&#2332;&#2381;&#2334;&#2366;&#2344;&#2367;&#2325;&#2379;&#2306; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2332;&#2379;&#2360;&#2375;&#2347; &#2346;&#2381;&#2352;&#2367;&#2360;&#2381;&#2335;&#2354;&#2375;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#23
