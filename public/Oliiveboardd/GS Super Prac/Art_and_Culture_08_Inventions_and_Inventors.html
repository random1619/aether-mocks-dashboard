<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Who among the following is credited with the invention of the first automatic calculator?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2346;&#2381;&#2352;&#2341;&#2350; &#2360;&#2381;&#2357;&#2330;&#2366;&#2354;&#2367;&#2340; &#2325;&#2376;&#2354;&#2325;&#2369;&#2354;&#2375;&#2335;&#2352; &#2325;&#2375; &#2310;&#2357;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352; &#2325;&#2366; &#2358;&#2381;&#2352;&#2375;&#2351; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Blaise Pascal</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2354;&#2375;&#2332;&#2364; &#2346;&#2366;&#2360;&#2381;&#2325;&#2354;</span>",
      "<span class=\"eqt\">Wilhelm Schickard</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2354;&#2381;&#2361;&#2375;&#2350; &#2358;&#2367;&#2325;&#2366;&#2352;&#2381;&#2337;</span>",
      "<span class=\"eqt\">Charles Babbage</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;&#2381;&#2354;&#2381;&#2360; &#2348;&#2376;&#2348;&#2375;&#2332;</span>",
      "<span class=\"eqt\">John Napier</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2377;&#2344; &#2344;&#2375;&#2346;&#2367;&#2351;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Wilhelm Schickard invented the first automatic calculator in 1623, known as the \"Calculating Clock.\"</p><p>&bull; Blaise Pascal developed a mechanical calculator known as the Pascaline in 1642.</p><p>&bull; Charles Babbage is regarded as the \"Father of the Computer\" for designing the Analytical Engine.</p><p>&bull; John Napier is famous for inventing logarithms.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which invention is incorrectly matched with its inventor?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2310;&#2357;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352; &#2313;&#2360;&#2325;&#2375; &#2310;&#2357;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352;&#2325; &#2360;&#2375; &#2327;&#2354;&#2340; &#2350;&#2375;&#2354; &#2326;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Periodic Table  -  Dmitri Mendeleev</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; - &#2342;&#2367;&#2350;&#2367;&#2340;&#2381;&#2352;&#2368; &#2350;&#2375;&#2306;&#2337;&#2375;&#2354;&#2368;&#2357;</span>",
      "<span class=\"eqt\">Gramophone  -  Thomas Edison</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2366;&#2350;&#2379;&#2347;&#2379;&#2344; - &#2341;&#2377;&#2350;&#2360; &#2319;&#2337;&#2367;&#2360;&#2344;</span>",
      "<span class=\"eqt\">X-ray  -  Wilhelm Roentgen</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2381;&#2360;-&#2352;&#2375; - &#2357;&#2367;&#2354;&#2381;&#2361;&#2375;&#2350; &#2352;&#2379;&#2319;&#2306;&#2335;&#2332;&#2375;&#2344;</span>",
      "<span class=\"eqt\">Air Conditioner  -  Nikola Tesla</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2351;&#2352; &#2325;&#2306;&#2337;&#2368;&#2358;&#2344;&#2352; - &#2344;&#2367;&#2325;&#2379;&#2354;&#2366; &#2335;&#2375;&#2360;&#2381;&#2354;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; The air conditioner was invented by Willis Carrier in 1902.</p><p>&bull; The Periodic Table was devised by Dmitri Mendeleev in 1869.</p><p>&bull; The Gramophone was invented by Thomas Edison in 1878.</p><p>&bull; X-rays were discovered by Wilhelm Roentgen in 1895.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The invention of the steam engine played a crucial role in the Industrial Revolution. Who among the following invented the first practical steam locomotive?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2335;&#2368;&#2350; &#2311;&#2306;&#2332;&#2344; &#2325;&#2375; &#2310;&#2357;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352; &#2344;&#2375; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367; &#2350;&#2375;&#2306; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2344;&#2367;&#2349;&#2366;&#2312;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2344;&#2375; &#2346;&#2361;&#2354;&#2375; &#2357;&#2381;&#2351;&#2366;&#2357;&#2361;&#2366;&#2352;&#2367;&#2325; &#2360;&#2381;&#2335;&#2368;&#2350; &#2354;&#2379;&#2325;&#2379;&#2350;&#2379;&#2335;&#2367;&#2357; &#2325;&#2366; &#2310;&#2357;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">George Stephenson</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2377;&#2352;&#2381;&#2332; &#2360;&#2381;&#2335;&#2368;&#2347;&#2375;&#2306;&#2360;&#2344;</span>",
      "<span class=\"eqt\">Robert Fulton</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2377;&#2348;&#2352;&#2381;&#2335; &#2347;&#2369;&#2354;&#2381;&#2335;&#2344;</span>",
      "<span class=\"eqt\">Thomas Newcomen</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2377;&#2350;&#2360; &#2344;&#2381;&#2351;&#2370;&#2325;&#2379;&#2350;&#2375;&#2344;</span>",
      "<span class=\"eqt\">James Watt</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2375;&#2350;&#2381;&#2360; &#2357;&#2377;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; George Stephenson built the first successful steam locomotive in 1804.</p><p>&bull; Robert Fulton developed the first successful steamboat.</p><p>&bull; Thomas Newcomen built an early steam engine for pumping water.</p><p>&bull; James Watt improved the efficiency of the steam engine.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Who is credited with the discovery of oxygen?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2325;&#2368; &#2326;&#2379;&#2332; &#2325;&#2366; &#2358;&#2381;&#2352;&#2375;&#2351; &#2325;&#2367;&#2360;&#2375; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Henry Cavendish</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2344;&#2352;&#2368; &#2325;&#2376;&#2357;&#2375;&#2306;&#2337;&#2367;&#2358;</span>",
      "<span class=\"eqt\">Joseph Priestley</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2379;&#2360;&#2375;&#2347; &#2346;&#2381;&#2352;&#2368;&#2360;&#2381;&#2335;&#2354;&#2375;</span>",
      "<span class=\"eqt\">Carl Wilhelm Scheele</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2354; &#2357;&#2367;&#2354;&#2381;&#2361;&#2375;&#2350; &#2358;&#2375;&#2354;&#2375;</span>",
      "<span class=\"eqt\">Antoine Lavoisier</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2335;&#2379;&#2344;&#2368; &#2354;&#2366;&#2357;&#2379;&#2311;&#2360;&#2367;&#2319;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Joseph Priestley is credited with discovering oxygen in 1774.</p><p>&bull; Henry Cavendish discovered hydrogen.</p><p>&bull; Carl Wilhelm Scheele also discovered oxygen independently but published his findings later.</p><p>&bull; Antoine Lavoisier named the element \"oxygen.\"</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Who invented the first successful polio vaccine?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2361;&#2354;&#2368; &#2360;&#2347;&#2354; &#2346;&#2379;&#2354;&#2367;&#2351;&#2379; &#2357;&#2376;&#2325;&#2381;&#2360;&#2368;&#2344; &#2325;&#2366; &#2310;&#2357;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Jonas Salk</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2379;&#2344;&#2366;&#2360; &#2360;&#2366;&#2354;&#2381;&#2325;</span>",
      "<span class=\"eqt\">Alexander Fleming</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2375;&#2325;&#2381;&#2332;&#2375;&#2306;&#2337;&#2352; &#2347;&#2381;&#2354;&#2375;&#2350;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Robert Koch</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2377;&#2348;&#2352;&#2381;&#2335; &#2325;&#2379;&#2330;</span>",
      "<span class=\"eqt\">Edward Jenner</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2337;&#2357;&#2352;&#2381;&#2337; &#2332;&#2375;&#2344;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Jonas Salk developed the first polio vaccine.</p><p>&bull; Alexander Fleming discovered penicillin.</p><p>&bull; Robert Koch identified the bacteria causing tuberculosis.</p><p>&bull; Edward Jenner developed the smallpox vaccine.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following is associated with the invention of the bifocal lens?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2342;&#2381;&#2357;&#2367;&#2347;&#2379;&#2325;&#2360;&#2368; &#2354;&#2375;&#2306;&#2360; &#2325;&#2375; &#2310;&#2357;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Benjamin Franklin</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2306;&#2332;&#2366;&#2350;&#2367;&#2344; &#2347;&#2381;&#2352;&#2376;&#2306;&#2325;&#2354;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Galileo Galilei</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2354;&#2368;&#2354;&#2367;&#2351;&#2379; &#2327;&#2376;&#2354;&#2368;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Isaac Newton</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2311;&#2332;&#2364;&#2376;&#2325; &#2344;&#2381;&#2351;&#2370;&#2335;&#2344;</span>",
      "<span class=\"eqt\">Johannes Kepler</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2379;&#2361;&#2366;&#2344;&#2381;&#2360; &#2325;&#2375;&#2346;&#2381;&#2354;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Benjamin Franklin invented the bifocal lens in 1779.</p><p>&bull; Galileo invented an improved version of the telescope.</p><p>&bull; Isaac Newton developed the reflecting telescope.</p><p>&bull; Johannes Kepler formulated the laws of planetary motion.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was NOT invented by Thomas Edison?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2366; &#2310;&#2357;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352; &#2341;&#2377;&#2350;&#2360; &#2319;&#2337;&#2367;&#2360;&#2344; &#2344;&#2375; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Phonograph</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2366;&#2350;&#2379;&#2347;&#2364;&#2379;&#2344;</span>",
      "<span class=\"eqt\">Electric battery</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2348;&#2376;&#2335;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Light bulb</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2311;&#2335; &#2348;&#2354;&#2381;&#2348;</span>",
      "<span class=\"eqt\">Motion picture camera</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2358;&#2344; &#2346;&#2367;&#2325;&#2381;&#2330;&#2352; &#2325;&#2376;&#2350;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The electric battery was invented by Alessandro Volta in 1800.</p><p>&bull; The Phonograph was Edison's invention.</p><p>&bull; Edison improved and commercialized the light bulb.</p><p>&bull; Edison developed the motion picture camera.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The Richter scale, used to measure earthquakes, was developed by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2370;&#2325;&#2306;&#2346; &#2325;&#2379; &#2350;&#2366;&#2346;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2367;&#2325;&#2381;&#2335;&#2352; &#2346;&#2376;&#2350;&#2366;&#2344;&#2375; &#2325;&#2366; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Alfred Wegener</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2347;&#2381;&#2352;&#2375;&#2337; &#2357;&#2375;&#2327;&#2375;&#2344;&#2352;</span>",
      "<span class=\"eqt\">Charles Richter</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;&#2381;&#2354;&#2381;&#2360; &#2352;&#2367;&#2325;&#2381;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Robert Hooke</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2377;&#2348;&#2352;&#2381;&#2335; &#2361;&#2369;&#2325;</span>",
      "<span class=\"eqt\">William Herschel</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2354;&#2367;&#2351;&#2350; &#2361;&#2352;&#2381;&#2358;&#2375;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Charles Richter developed the Richter scale in 1935.</p><p>&bull; Alfred Wegener proposed the theory of continental drift.</p><p>&bull; Robert Hooke discovered the law of elasticity.</p><p>&bull; William Herschel discovered Uranus.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The jet engine was developed by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2375;&#2335; &#2311;&#2306;&#2332;&#2344; &#2325;&#2366; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2367;&#2351;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Hans von Ohain</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2306;&#2360; &#2357;&#2377;&#2344; &#2323;&#2361;&#2376;&#2344;</span>",
      "<span class=\"eqt\">Igor Sikorsky</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2327;&#2379;&#2352; &#2360;&#2367;&#2325;&#2379;&#2352;&#2360;&#2381;&#2325;&#2368;</span>",
      "<span class=\"eqt\">Robert Goddard</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2377;&#2348;&#2352;&#2381;&#2335; &#2327;&#2379;&#2337;&#2366;&#2352;&#2381;&#2337;</span>",
      "<span class=\"eqt\">Wilbur Wright</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2354;&#2381;&#2348;&#2352; &#2352;&#2366;&#2311;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Hans von Ohain developed the first operational jet engine in 1936.</p><p>&bull; Igor Sikorsky developed the first practical helicopter.</p><p>&bull; Robert Goddard pioneered rocketry.</p><p>&bull; Wilbur Wright, along with his brother Orville, invented the airplane.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Who discovered the circulation of blood in the human body?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2357; &#2358;&#2352;&#2368;&#2352; &#2350;&#2375;&#2306; &#2352;&#2325;&#2381;&#2340; &#2346;&#2352;&#2367;&#2360;&#2306;&#2330;&#2352;&#2339; &#2325;&#2368; &#2326;&#2379;&#2332; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2368;?</p></span>",
