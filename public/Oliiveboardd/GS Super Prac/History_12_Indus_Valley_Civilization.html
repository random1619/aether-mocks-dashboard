    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following Indus Valley Civilization sites is located farthest to the East?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2360;&#2381;&#2341;&#2354; &#2346;&#2370;&#2352;&#2381;&#2357; &#2350;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2342;&#2370;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Daimabad</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2376;&#2350;&#2366;&#2348;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Sutkagengor</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2340;&#2381;&#2325;&#2366;&#2327;&#2375;&#2306;&#2327;&#2379;&#2352;</span>",
      "<span class=\"eqt\">Mandu</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2306;&#2337;&#2370;</span>",
      "<span class=\"eqt\">Alamgirpur</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2354;&#2350;&#2327;&#2368;&#2352;&#2346;&#2369;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Alamgirpur, located in Western Uttar Pradesh, is the easternmost site of the Indus Valley Civilization, making it farthest to the east.</p><p>&bull; Daimabad is the southernmost site, located in Maharashtra.</p><p>&bull; Sutkagengor is the westernmost site in Baluchistan.</p><p>&bull; Mandu is the northernmost site in Jammu.</p><p><b>Further Insight:</b></p><p>&bull; <b>Geographical Extent of IVC</b></p><p>&#9675; Covered modern-day Punjab, Sindh, Baluchistan, Rajasthan, Gujarat, and Western Uttar Pradesh.</p><p>&#9675; Westernmost Site: Sutkagengor (Baluchistan).</p><p>&#9675; Easternmost Site: Alamgirpur (Western UP).</p><p>&#9675; Northernmost Site: Mandu (Jammu).</p><p>&#9675; Southernmost Site: Daimabad (Ahmednagar, Maharashtra).</p><p><img width=624 height=785 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25844/image001.jpg\"></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following sites is associated with the discovery of the world's first known man-made dockyard?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2381;&#2341;&#2354; &#2342;&#2369;&#2344;&#2367;&#2351;&#2366; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2332;&#2381;&#2334;&#2366;&#2340; &#2350;&#2366;&#2344;&#2357; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2337;&#2377;&#2325;&#2351;&#2366;&#2352;&#2381;&#2337; &#2325;&#2368; &#2326;&#2379;&#2332; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kalibangan</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2354;&#2368;&#2348;&#2306;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Harappa</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2337;&#2364;&#2346;&#2381;&#2346;&#2366;</span>",
      "<span class=\"eqt\">Lothal</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2341;&#2354;</span>",
      "<span class=\"eqt\">Chanhudaro</span><span class=\"hqt\" style=\"display:none\">Chanhudaro</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Lothal in Gujarat is known for its dockyard, which suggests maritime activities and trade.</b></p><p>&bull; Kalibangan is known for fire altars and camel bones.</p><p>&bull; Harappa is famous for granaries and sandstone statues.</p><p>&bull; Chanhudaro is known for a bead-making shop and footprint of a dog chasing a cat.</p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Site</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Excavator</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Location</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Findings</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Harappa</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Daya Ram Sahni (1921)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">River Ravi, Pakistan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sandstone statues, granaries, bullock carts</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Chanhudaro</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N.G. Majumdar (1931)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sindh, Pakistan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bead makers' shop, footprint of dog chasing a cat</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Kalibangan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ghose (1953)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rajasthan, India</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Fire altars, camel bones, wooden plough</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lothal</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R. Rao (1953)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Gujarat, India</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Dockyard, rice husk, chess-playing</td></tr></table>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following first excavated the site of Mohenjodaro, leading to its rediscovery in 1922?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2344;&#2375; &#2360;&#2348;&#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2350;&#2379;&#2361;&#2344;&#2332;&#2379;&#2342;&#2337;&#2364;&#2379; &#2360;&#2381;&#2341;&#2354; &#2325;&#2368; &#2326;&#2369;&#2342;&#2366;&#2312; &#2325;&#2368;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; 1922 &#2350;&#2375;&#2306; &#2311;&#2360;&#2325;&#2368; &#2346;&#2369;&#2344;&#2307; &#2326;&#2379;&#2332; &#2361;&#2369;&#2312;?</p></span>",
    "options": [
      "<span class=\"eqt\">R.D. Banerjee</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;.&#2337;&#2368;. &#2348;&#2344;&#2352;&#2381;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Daya Ram Sahni</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2351;&#2366; &#2352;&#2366;&#2350; &#2360;&#2366;&#2361;&#2344;&#2368;</span>",
      "<span class=\"eqt\">John Marshall</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2377;&#2344; &#2350;&#2366;&#2352;&#2381;&#2358;&#2354;</span>",
      "<span class=\"eqt\">N.G. Majumdar</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;.&#2332;&#2368;. &#2350;&#2332;&#2370;&#2350;&#2342;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; R.D. Banerjee first excavated the site of Mohenjodaro in 1922, unearthing one of the major cities of the Indus Valley Civilization.</p><p>&bull; Daya Ram Sahni discovered Harappa in 1921.</p><p>&bull; John Marshall was the Director-General of ASI but did not directly excavate Mohenjodaro</p><p>&bull; N.G. Majumdar excavated Chanhudaro in 1931.</p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Site</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Excavator</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Location</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Findings</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Harappa</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Daya Ram Sahni (1921)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">River Ravi, Pakistan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sandstone statues, granaries, bullock carts</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Mohenjodaro</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R.D. Banerjee (1922)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">River Indus, Sindh, Pakistan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Great Bath, bronze dancing girl, Pashupati seal, cotton</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Chanhudaro</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N.G. Majumdar (1931)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sindh, Pakistan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bead makers' shop, footprint of dog chasing a cat</td></tr></table>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is <i>incorrect</i> regarding the features of Indus Valley Civilization cities?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2325;&#2375; &#2358;&#2361;&#2352;&#2379;&#2306; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cities had well-planned drainage systems.</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2361;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2330;&#2381;&#2331;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2344;&#2367;&#2351;&#2379;&#2332;&#2367;&#2340; &#2332;&#2354; &#2344;&#2367;&#2325;&#2366;&#2360;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2367;&#2351;&#2366;&#2305; &#2341;&#2368;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Cities had a citadel and a lower town.</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2361;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2327;&#2338;&#2364; &#2324;&#2352; &#2319;&#2325; &#2344;&#2367;&#2330;&#2354;&#2366; &#2358;&#2361;&#2352; &#2361;&#2379;&#2340;&#2366; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Temples and large palaces were discovered in most cities.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2358;&#2361;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2350;&#2306;&#2342;&#2367;&#2352; &#2324;&#2352; &#2348;&#2337;&#2364;&#2375; &#2350;&#2361;&#2354; &#2346;&#2366;&#2319; &#2327;&#2319;&#2404;</span>",
      "<span class=\"eqt\">Houses were built using burnt bricks.</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2352;&#2379;&#2306; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2346;&#2325;&#2368; &#2361;&#2369;&#2312; &#2312;&#2306;&#2335;&#2379;&#2306; &#2360;&#2375; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; No temples or large palaces have been discovered in Indus Valley Civilization cities, a unique feature that differentiates it from other ancient civilizations.</p><p>&bull; Drainage systems were advanced with closed drainage lines.</p><p>&bull; Most cities had a citadel and lower town.</p><p>&bull; Burnt bricks were commonly used for building houses.</p><p><b>Further Insight:</b></p><p>&bull; <b>Major Features of the Indus Valley Civilization (IVC):</b></p><p>&#9675; Most cities had a citadel and a lower town</p><p>&#9675; Society Divided into elite (citadel), middle-class (merchants) and lower-class (laborers).</p><p>&#9675; Evidence of advanced town planning with grid system, drainage, and brick structures.</p><p>&#9675; <b>Matriarchal Society</b>:</p><p>&#9632; Worship of the Mother Goddess, indicated by terracotta female figurines.</p><p>&#9632; Men and women wore garments of cotton, silk, wool, and were skilled in spinning and weaving.:</p><p>&#9675; Extensive use of copper, bronze, and absence of iron.</p><p>&#9675; Skilled in boat-making, bead-making, and seal-making (primarily steatite).</p><p>&#9675; Advanced pottery, jewelry-making, and sculpting (e.g., the \"Dancing Girl\").</p><p>&#9675; Agriculture flourished with crops like wheat, barley, and cotton.</p><p>&#9675; Trade was extensive, both inter-regional and with Mesopotamia, using a barter system.</p><p>&#9675; Use of standardized weights and measures; seals used for trade.</p><p>&#9675; No clear evidence of centralized rulers; possibly a merchant class-controlled society.</p><p>&#9675; <b>Religious Practices</b>:</p><p>&#9632; Worshipped deities like Proto-Shiva (Pashupati), fertility gods, trees, and animals.</p><p>&#9632; Evidence of sacred spots like the Great Bath for ritualistic purposes.</p><p>&#9675; First tidal port built at Lothal.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following animals was not domesticated by the Indus Valley people?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2332;&#2366;&#2344;&#2357;&#2352; &#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2325;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2366;&#2354;&#2340;&#2370; &#2344;&#2361;&#2368;&#2306; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pigs</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2309;&#2352;</span>",
      "<span class=\"eqt\">Horses</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2379;&#2337;&#2364;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Sheep</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2375;&#2337;&#2364;</span>",
      "<span class=\"eqt\">Goats</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2325;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>There is no significant evidence of horse domestication in the Indus Valley Civilization, although horse remains were later found in sites like Surkotada.</b></p><p>&bull; Pigs were domesticated.</p><p>&bull; Sheep were domesticated for wool and meat.</p><p>&bull; Goats were also domesticated.</p><p><b>Further Insight:</b></p><p>&bull; <b>Commonly Domesticated Animals</b> in IVC</p><p>&#9675; <b>Cattle</b>: Humped bulls and cows were used for ploughing and transportation.</p><p>&#9675; <b>Buffaloes</b>: Used for their strength and milk production.</p><p>&#9675; <b>Goats and Sheep</b>: Raised for meat, milk, and wool.</p><p>&#9675; <b>Pigs</b>: Used for meat and possibly for agricultural work.</p><p>&#9675; <b>Elephants</b>: Likely used for heavy lifting and as a status symbol.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is <i>not</i> associated with religious beliefs of the Indus Valley Civilization?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2325;&#2368; &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366;&#2323;&#2306; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Worship of male and female deities</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2352;&#2369;&#2359; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366; &#2342;&#2375;&#2357;&#2340;&#2366;&#2323;&#2306; &#2325;&#2368; &#2346;&#2370;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Presence of fire altars in Kalibangan</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2354;&#2368;&#2348;&#2306;&#2327;&#2344; &#2350;&#2375;&#2306; &#2309;&#2327;&#2381;&#2344;&#2367;&#2357;&#2375;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Discovery of a seal depicting a three-eyed figure believed to be Pashupati</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2350;&#2369;&#2361;&#2352; &#2325;&#2368; &#2326;&#2379;&#2332; &#2332;&#2367;&#2360; &#2346;&#2352; &#2340;&#2368;&#2344; &#2310;&#2306;&#2326;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2357;&#2361; &#2346;&#2358;&#2369;&#2346;&#2340;&#2367; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Temples of Lord Shiva have been discovered in Mohenjodaro</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2361;&#2344;&#2332;&#2379;&#2342;&#2337;&#2364;&#2379; &#2350;&#2375;&#2306; &#2349;&#2327;&#2357;&#2366;&#2344; &#2358;&#2367;&#2357; &#2325;&#2375; &#2350;&#2306;&#2342;&#2367;&#2352; &#2326;&#2379;&#2332;&#2375; &#2327;&#2319; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; <b>No temples of Lord Shiva or any other deities have been discovered in Mohenjodaro or any other Indus Valley site. Religious practices were largely centered around seals and figurines.</b></p><p>&bull; Worship of male and female deities is confirmed by excavations.</p><p>&bull; Fire altars were found at Kalibangan.</p><p>&bull; The Pashupati seal was discovered, believed to depict an early form of Lord Shiva.</p><p><b>Further Insight:</b></p><p>&bull; <b>Religious Practices in IVC</b>:</p><p>&#9675; Worshipped deities like Proto-Shiva (Pashupati), fertility gods, trees, and animals.</p><p>&#9675; Evidence of sacred spots like the Great Bath for ritualistic purposes.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The famous \"Dancing Girl\" figurine was made of which material?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; \"&#2337;&#2366;&#2306;&#2360;&#2367;&#2306;&#2327; &#2327;&#2352;&#2381;&#2354;\" &#2350;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2367;&#2360; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2360;&#2375; &#2348;&#2344;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Terracotta</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2352;&#2325;&#2379;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Bronze</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2340;&#2354;</span>",
      "<span class=\"eqt\">Stone</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2381;&#2341;&#2352;</span>",
      "<span class=\"eqt\">Copper</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2305;&#2348;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The \"Dancing Girl\" figurine, found at Mohenjodaro, is made of bronze and is an iconic artifact of the Indus Valley Civilization.</b></p><p>&bull; Terracotta was used for making pottery.</p><p>&bull; Stone was used for sculptures like the Priest-King.</p><p>&bull; Copper was used for tools and utensils, but not this figurine.</p><p><b>Further Insight:</b></p><p>&bull; <b>Metallurgy in IVC</b></p><p>&#9675; The Indus Valley Civilization (IVC) predominantly used copper and bronze. <b>Iron was not used during this period.</b></p><p>&#9675; Copper was Sourced from Khetri mines in Rajasthan. Copper was used for making tools, weapons, and artifacts.</p><p>&#9675; Bronze is an alloy of copper and tin, used for making various tools, weapons, and decorative items.</p><p>&bull; Evidence: Bronze artifacts, such as the famous <b>Bronze Dancing Girl sculpture, and tools and weapons found in Harappan sites illustrate the advanced metallurgical skills of the IVC.</b></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which Indus Valley site served as a major trading point between Harappa and Mesopotamia?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2381;&#2341;&#2354; &#2361;&#2337;&#2364;&#2346;&#2381;&#2346;&#2366; &#2324;&#2352; &#2350;&#2375;&#2360;&#2379;&#2346;&#2379;&#2335;&#2366;&#2350;&#2367;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lothal</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2341;&#2354;</span>",
      "<span class=\"eqt\">Sutkagendor</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2340;&#2381;&#2325;&#2366;&#2327;&#2375;&#2306;&#2337;&#2379;&#2352;</span>",
      "<span class=\"eqt\">Ropar</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2379;&#2346;&#2337;&#2364;</span>",
      "<span class=\"eqt\">Banawali</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2344;&#2366;&#2357;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Sutkagendor, located in Baluchistan, served as a trading post between Harappa and Mesopotamia, facilitating long-distance trade.</b></p><p>&bull; Lothal was a port city but not specifically between Harappa and Mesopotamia.</p><p>&bull; Ropar was a settlement near the river but not known for international trade.</p><p>&bull; Banawali was more agricultural with evidence of barley, not a trading center.</p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Site</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Excavator</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Location</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Findings</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sutkagendor</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Stein (1929)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Balochistan, Pakistan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Trading point between Harappa and Babylon</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lothal</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R. Rao (1953)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Gujarat, India</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Dockyard, rice husk, chess-playing</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Banawali</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R.S. Bisht (1974)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Haryana, India</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Beads, barley, pre-Harappan and Harappan evidence</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Dholavira</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R.S. Bisht (1985)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Gujarat, India</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Water reservoirs, first UNESCO World Heritage Site of IVC in India</td></tr></table>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about the geographical extent of the Indus Valley Civilization:</p><p>(a) The southernmost site of the Indus Valley Civilization is Daimabad.</p><p>(b) Alamgirpur is the westernmost site of the civilization.</p><p>(c) Sutkagengor is located in present-day Rajasthan.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2325;&#2368; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2360;&#2368;&#2350;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2368; &#2360;&#2381;&#2341;&#2354; &#2342;&#2376;&#2350;&#2366;&#2348;&#2366;&#2342; &#2361;&#2376;&#2404;</p><p>(b) &#2310;&#2354;&#2350;&#2327;&#2368;&#2352;&#2346;&#2369;&#2352; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2360;&#2381;&#2341;&#2354; &#2361;&#2376;&#2404;</p><p>(c) &#2360;&#2369;&#2340;&#2325;&#2366;&#2327;&#2375;&#2306;&#2327;&#2379;&#2352; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only (a)</span><span class=\"hqt\" style=\"display:none\">(a)</span>",
      "<span class=\"eqt\">Only (b)</span><span class=\"hqt\" style=\"display:none\">(b)</span>",
      "<span class=\"eqt\">Both (a) and (b)</span><span class=\"hqt\" style=\"display:none\">(a) , (b)</span>",
      "<span class=\"eqt\">Both (b) and (c)</span><span class=\"hqt\" style=\"display:none\">(b) , (c)</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Daimabad is the southernmost site of the Indus Valley Civilization, located in Maharashtra</b>.</p><p>&bull; Alamgirpur is the easternmost site, not westernmost.</p><p>&bull; Sutkagengor is in Baluchistan, not Rajasthan.</p><p><b>Further Insight:</b></p><p><b>Geographical Extent of IVC</b></p><p>&#9675; Covered modern-day Punjab, Sindh, Baluchistan, Rajasthan, Gujarat, and Western Uttar Pradesh.</p><p>&#9675; Westernmost Site: Sutkagengor (Baluchistan).</p><p>&#9675; Easternmost Site: Alamgirpur (Western UP).</p><p>&#9675; Northernmost Site: Mandu (Jammu).</p><p>&#9675; Southernmost Site: Daimabad (Ahmednagar, Maharashtra).</p><p><img width=624 height=785 id=image1.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25844/image002.jpg\"></p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about important Indus Valley Civilization sites:</p><p>(a) Kalibangan is located on the banks of the Ghaggar River in Rajasthan.</p><p>(b) The first man-made dockyard was discovered in Lothal.</p><p>(c) Banawali was located in modern-day Gujarat.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2325;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2381;&#2341;&#2354;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2325;&#2366;&#2354;&#2368;&#2348;&#2306;&#2327;&#2366; &#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344; &#2350;&#2375;&#2306; &#2328;&#2327;&#2381;&#2327;&#2352; &#2344;&#2342;&#2368; &#2325;&#2375; &#2340;&#2335; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>(b) &#2346;&#2361;&#2354;&#2366; &#2350;&#2366;&#2344;&#2357; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2337;&#2377;&#2325;&#2351;&#2366;&#2352;&#2381;&#2337; &#2354;&#2379;&#2341;&#2354; &#2350;&#2375;&#2306; &#2326;&#2379;&#2332;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>(c) &#2348;&#2344;&#2366;&#2357;&#2354;&#2368; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2341;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only (a)</span><span class=\"hqt\" style=\"display:none\">(a)</span>",
      "<span class=\"eqt\">Both (a) and (b)</span><span class=\"hqt\" style=\"display:none\">(a) , (b)</span>",
      "<span class=\"eqt\">Both (b) and (c)</span><span class=\"hqt\" style=\"display:none\">(b) , (c)</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Kalibangan is correctly located on the Ghaggar River in Rajasthan.</b></p><p>&bull; <b>Lothal in Gujarat is known for the discovery of the first man-made dockyard.</b></p><p>&bull; <b>Banawali is located in Haryana, not Gujarat.</b></p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Site</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Excavator</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Year</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Location</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Region</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Associated River</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Notable Findings</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\\Kalibangan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ghose</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1953</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rajasthan, India</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rajasthan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ghaggar-Hakra River</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Fire altars, camel bones, wooden plough</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lothal</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R. Rao</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1953</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Gujarat, India</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Gujarat</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sabarmati River</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Dockyard, rice husk, chess-playing</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Banawali</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R.S. Bisht</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1974</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Haryana, India</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Haryana</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sarasvati River</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Beads, barley, pre-Harappan and Harappan evidence</td></tr></table>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the excavation of Indus Valley Civilization:</p><p>(a) The site of Harappa was first excavated by Daya Ram Sahni in 1921.</p><p>(b) R.D. Banerjee first excavated Mohenjodaro in 1922.</p><p>(c) N.G. Majumdar excavated the site of Chanhudaro in 1935.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2325;&#2368; &#2326;&#2369;&#2342;&#2366;&#2312; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2361;&#2337;&#2364;&#2346;&#2381;&#2346;&#2366; &#2360;&#2381;&#2341;&#2354; &#2325;&#2368; &#2326;&#2369;&#2342;&#2366;&#2312; &#2360;&#2348;&#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2342;&#2351;&#2366; &#2352;&#2366;&#2350; &#2360;&#2366;&#2361;&#2344;&#2368; &#2344;&#2375; 1921 &#2350;&#2375;&#2306; &#2325;&#2368; &#2341;&#2368;&#2404;</p><p>(b) &#2310;&#2352;.&#2337;&#2368;. &#2348;&#2344;&#2352;&#2381;&#2332;&#2368; &#2344;&#2375; &#2360;&#2348;&#2360;&#2375; &#2346;&#2361;&#2354;&#2375; 1922 &#2350;&#2375;&#2306; &#2350;&#2379;&#2361;&#2344;&#2332;&#2379;&#2342;&#2337;&#2364;&#2379; &#2325;&#2368; &#2326;&#2369;&#2342;&#2366;&#2312; &#2325;&#2368; &#2341;&#2368;&#2404;</p><p>(c) &#2319;&#2344;.&#2332;&#2368;. &#2350;&#2332;&#2370;&#2350;&#2342;&#2366;&#2352; &#2344;&#2375; 1935 &#2350;&#2375;&#2306; &#2330;&#2344;&#2381;&#2361;&#2370;&#2342;&#2337;&#2364;&#2379; &#2360;&#2381;&#2341;&#2354; &#2325;&#2368; &#2326;&#2369;&#2342;&#2366;&#2312; &#2325;&#2368; &#2341;&#2368;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only (a)</span><span class=\"hqt\" style=\"display:none\">(a)</span>",
      "<span class=\"eqt\">Both (a) and (b)</span><span class=\"hqt\" style=\"display:none\">(a) , (b)</span>",
      "<span class=\"eqt\">Both (b) and (c)</span><span class=\"hqt\" style=\"display:none\">(b) , (c)</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Daya Ram Sahni excavated Harappa in 1921.</b></p><p>&bull; <b>R.D. Banerjee excavated Mohenjodaro in 1922.</b></p><p>&bull; <b>N.G. Majumdar excavated Chanhudaro in 1931, not 1935.</b></p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Site</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Excavator</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Year</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sutkagendor</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Stein</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1929</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Chanhudaro</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N.G. Majumdar</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1931</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Amri</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N.G. Majumdar</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1935</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Kalibangan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ghose</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1953</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lothal</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R. Rao</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1955</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Surkotada</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">J.P. Joshi</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1964</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Banawali</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R.S. Bisht</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1974</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Dholavira</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R.S. Bisht</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1985</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Harappa</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Daya Ram Sahni</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1921</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Mohenjodaro</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R.D. Banerji</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1922</td></tr></table>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about the features of Indus Valley cities:</p><p>(a) Most cities had a citadel and a lower town.</p><p>(b) Granaries and large temples were common features in cities.</p><p>(c) The cities had well-planned drainage systems.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2325;&#2375; &#2358;&#2361;&#2352;&#2379;&#2306; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2358;&#2361;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2327;&#2338;&#2364; &#2324;&#2352; &#2319;&#2325; &#2344;&#2367;&#2330;&#2354;&#2366; &#2358;&#2361;&#2352; &#2341;&#2366;&#2404;</p><p>(b) &#2358;&#2361;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2344;&#2381;&#2344; &#2349;&#2306;&#2337;&#2366;&#2352; &#2324;&#2352; &#2348;&#2337;&#2364;&#2375; &#2350;&#2306;&#2342;&#2367;&#2352; &#2310;&#2350; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2319;&#2306; &#2341;&#2368;&#2306;&#2404;</p><p>(c) &#2358;&#2361;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2330;&#2381;&#2331;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2344;&#2367;&#2351;&#2379;&#2332;&#2367;&#2340; &#2332;&#2354; &#2344;&#2367;&#2325;&#2366;&#2360;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2341;&#2368;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only (a)</span><span class=\"hqt\" style=\"display:none\">Only (a)</span>",
      "<span class=\"eqt\">Both (a) and (c)</span><span class=\"hqt\" style=\"display:none\">Both (a) , (c)</span>",
      "<span class=\"eqt\">Both (b) and (c)</span><span class=\"hqt\" style=\"display:none\">Both (b) , (c)</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"

    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Cities typically had a citadel and a lower town.</b></p><p>&bull; <b>While granaries were found, no large temples were discovered.</b></p><p>&bull; <b>Cities had advanced drainage systems.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Major Features of the Indus Valley Civilization (IVC):</b></p><p>&#9675; Most cities had a citadel and a lower town</p><p>&#9675; Society Divided into elite (citadel), middle-class (merchants) and lower-class (laborers).</p><p>&#9675; Evidence of advanced town planning with grid system, drainage, and brick structures.</p><p>&#9675; <b>Matriarchal Society</b>:</p><p>&#9632; Worship of the Mother Goddess, indicated by terracotta female figurines.</p><p>&#9632; Men and women wore garments of cotton, silk, wool, and were skilled in spinning and weaving.:</p><p>&#9675; Extensive use of copper, bronze, and absence of iron.</p><p>&#9675; Skilled in boat-making, bead-making, and seal-making (primarily steatite).</p><p>&#9675; Advanced pottery, jewelry-making, and sculpting (e.g., the \"Dancing Girl\").</p><p>&#9675; Agriculture flourished with crops like wheat, barley, and cotton. The civilization was the first to cultivate cotton.</p><p>&#9675; Trade was extensive, both inter-regional and with Mesopotamia, using a barter system.</p><p>&#9675; Use of standardized weights and measures; seals used for trade.</p><p>&#9675; No clear evidence of centralized rulers; possibly a merchant class-controlled society.</p><p>&#9675; <b>Religious Practices</b>:</p><p>&#9632; Worshipped deities like Proto-Shiva (Pashupati), fertility gods, trees, and animals.</p><p>&#9632; Evidence of sacred spots like the Great Bath for ritualistic purposes.</p><p>&#9675; First tidal port built at Lothal.</p>",

  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the art and craft of the Indus Valley Civilization:</p><p>(a) The famous Dancing Girl figurine found in Mohenjodaro was made of bronze.</p><p>(b) Faience was used to make beads and bangles.</p><p>(c) The bearded Priest-King statue was made of terracotta.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2325;&#2368; &#2325;&#2354;&#2366; &#2324;&#2352; &#2358;&#2367;&#2354;&#2381;&#2346; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2350;&#2379;&#2361;&#2344;&#2332;&#2379;&#2342;&#2337;&#2364;&#2379; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2368; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2344;&#2371;&#2340;&#2381;&#2351; &#2325;&#2352;&#2340;&#2368; &#2354;&#2337;&#2364;&#2325;&#2368; &#2325;&#2368; &#2350;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2366;&#2306;&#2360;&#2375; &#2360;&#2375; &#2348;&#2344;&#2368; &#2341;&#2368;&#2404;</p><p>(b) &#2347;&#2364;&#2366;&#2311;&#2344;&#2375;&#2360; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2350;&#2379;&#2340;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2330;&#2370;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404;</p><p>(c) &#2342;&#2366;&#2338;&#2364;&#2368; &#2357;&#2366;&#2354;&#2375; &#2346;&#2369;&#2332;&#2366;&#2352;&#2368;-&#2352;&#2366;&#2332;&#2366; &#2325;&#2368; &#2350;&#2370;&#2352;&#2381;&#2340;&#2367; &#2335;&#2375;&#2352;&#2366;&#2325;&#2379;&#2335;&#2366; &#2360;&#2375; &#2348;&#2344;&#2368; &#2341;&#2368;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
