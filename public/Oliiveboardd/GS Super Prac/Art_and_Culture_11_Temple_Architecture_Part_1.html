<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Fonts & Icons -->

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">10</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">10 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">

                <div class="stats-grid">

                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The Ganesh-rath is one of the finest monolithic temples at _____________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2339;&#2375;&#2358;-&#2352;&#2341; _____________ &#2325;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2375;&#2361;&#2340;&#2352;&#2368;&#2344; &#2309;&#2326;&#2306;&#2337; &#2350;&#2306;&#2342;&#2367;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Mahabalipuram</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2348;&#2354;&#2368;&#2346;&#2369;&#2352;&#2350;</span>",
      "<span class=\"eqt\">Sarnath</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2344;&#2366;&#2341;</span>",
      "<span class=\"eqt\">Gangaikondacholapuram</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2327;&#2312;&#2325;&#2379;&#2306;&#2337;&#2330;&#2379;&#2354;&#2346;&#2369;&#2352;&#2350;</span>",
      "<span class=\"eqt\">Kanchipuram</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2306;&#2330;&#2368;&#2346;&#2369;&#2352;&#2350;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Ganesh Ratha Overview:</b> A monolithic rock-cut temple in <b>Mahabalipuram</b>, Tamil Nadu, carved during the Pallava dynasty (7th - 8th century CE). It is part of the Pancha Rathas, a UNESCO World Heritage Site.</p><p>&#183; <b>Features:</b> Carved from a single granite boulder, it resembles a chariot (ratha) and is dedicated to Lord Ganesha, though originally to another deity.</p><p>&#183; <b>Other Options:</b></p><p>o <b>Sarnath:</b> Known for Buddhist stupas, not rock-cut temples.</p><p>o <b>Gangaikondacholapuram:</b> Features Chola architecture, not monolithic rathas.</p><p>o <b>Kanchipuram:</b> Known for structural temples like Kailasanatha, not monolithic ones.</p><p><b>Further Insights:</b></p><p>&#183; <b>Pancha Rathas:</b> Named after the Pandavas (Draupadi, Arjuna, Bhima, Dharmaraja, Nakula-Sahadeva), these temples showcase diverse Dravidian architectural styles.</p><p>&#183; <b>Pallava Legacy:</b> Mahabalipuram's rock-cut architecture influenced later South Indian temple designs, seen in Chola and Vijayanagara periods.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Where is Kandariya Mahadev Temple situated?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2342;&#2352;&#2367;&#2351;&#2366; &#2350;&#2361;&#2366;&#2342;&#2375;&#2357; &#2350;&#2306;&#2342;&#2367;&#2352; &#2325;&#2361;&#2366;&#2305; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Deogarh</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2375;&#2357;&#2327;&#2338;&#2364;</span>",
      "<span class=\"eqt\">Modhera</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2338;&#2375;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Aurangabad</span><span class=\"hqt\" style=\"display:none\">&#2324;&#2352;&#2306;&#2327;&#2366;&#2348;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Khajuraho</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2332;&#2369;&#2352;&#2366;&#2361;&#2379;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Kandariya Mahadeva Temple is located in the Chhatarpur district of Madhya Pradesh in Central India. It is in the Khajuraho village, and the temple complex is spread over an area of 6 square kilometers (2.3 sq mi).</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The lofty gates erected in the courtyard of the temples in south India were called ________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2306;&#2342;&#2367;&#2352;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2306;&#2327;&#2339; &#2350;&#2375;&#2306; &#2348;&#2344;&#2375; &#2314;&#2306;&#2330;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; ________ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">mandap</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2337;&#2346;</span>",
      "<span class=\"eqt\">ardhmandap</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2381;&#2343;&#2350;&#2306;&#2337;&#2346;</span>",
      "<span class=\"eqt\">vimana</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">gopuram</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2346;&#2369;&#2352;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The lofty gates in the courtyard of South Indian temples are known as \"<b>gopuram</b>.\" These are elaborate and ornate entrance towers that often depict intricate sculptures and serve as monumental and symbolic entrances to the temple complex.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The Sun Temple at Konark was built under the rule of which dynasty?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2379;&#2339;&#2366;&#2352;&#2381;&#2325; &#2325;&#2366; &#2360;&#2370;&#2352;&#2381;&#2351; &#2350;&#2306;&#2342;&#2367;&#2352; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358; &#2325;&#2375; &#2358;&#2366;&#2360;&#2344; &#2350;&#2375;&#2306; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pallava Dynasty</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2354;&#2381;&#2354;&#2357; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Pandya Dynasty</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2306;&#2337;&#2381;&#2351; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Eastern Ganga Dynasty</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2327;&#2306;&#2327;&#2366; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Rashtrakuta Dynasty</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2325;&#2370;&#2335; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The Sun Temple at Konark was built in 13th century CE by <b>King Narasimhadeva I</b> of the <b>Eastern Ganga Dynasty.</b></p><p>&bull; The temple is shaped like a chariot and dedicated to the Sun God, Surya.</p><p>&bull; The temple is a UNESCO World Heritage Site, known for its architectural brilliance and intricate carvings.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In which present day state will you find the Megudi temple?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2375;&#2327;&#2369;&#2337;&#2368; &#2350;&#2306;&#2342;&#2367;&#2352; &#2310;&#2346;&#2325;&#2379; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tamil Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>",
      "<span class=\"eqt\">Odisha</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2337;&#2367;&#2358;&#2366;</span>",
      "<span class=\"eqt\">Karnataka</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;</span>",
      "<span class=\"eqt\">Kerala</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2352;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>\"Meguti Jain Temple\" is another remarkable temple of its kind. Located in Aihole, <b>Karnataka </b>on the Megutigudda, this temple exhibits Dravidian style of architecture. The temple stands on a hill and thus named as \"MeganaBasadi\", meaning the The Upper Temple, which in course of time was corrupted to Megudi or Meguti.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The Hindu temples 'Hinglaj Mata' and 'Katasraj' are located in which neighbouring country of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2367;&#2306;&#2342;&#2370; &#2350;&#2306;&#2342;&#2367;&#2352; '&#2361;&#2367;&#2306;&#2327;&#2354;&#2366;&#2332; &#2350;&#2366;&#2340;&#2366;' &#2324;&#2352; '&#2325;&#2335;&#2366;&#2360;&#2381;&#2352;&#2366;&#2332;' &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2325;&#2367;&#2360; &#2346;&#2337;&#2364;&#2379;&#2360;&#2368; &#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pakistan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2325;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Bhutan</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2335;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Sri Lanka</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2368;&#2354;&#2306;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Nepal</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2346;&#2366;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Hinglaj Mata Temple:</b> Located in Balochistan, <b>Pakistan</b>, it is a major Shakti Peeth, revered by Hindus for Goddess Hinglaj (a form of Durga).</p><p>&#183; <b>Katasraj Temple:</b> In Punjab province, <b>Pakistan</b>, a historic complex dedicated to Lord Shiva, known for its sacred pond.</p><p>&#183; <b>Context:</b> Both are significant pilgrimage sites for Hindus, maintained despite Pakistan's Muslim-majority population.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Brihadiswara Temple, which exhibits Dravidian temple architecture, is located in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2371;&#2361;&#2342;&#2368;&#2358;&#2381;&#2357;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2332;&#2379; &#2342;&#2381;&#2352;&#2357;&#2367;&#2337;&#2364; &#2350;&#2306;&#2342;&#2367;&#2352; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2354;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2325;&#2361;&#2366;&#2305; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Thanjavur</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2306;&#2332;&#2366;&#2357;&#2369;&#2352;</span>",
      "<span class=\"eqt\">Dharmapuri</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2352;&#2381;&#2350;&#2346;&#2369;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Madurai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2342;&#2369;&#2352;&#2376;</span>",
      "<span class=\"eqt\">Thiruvananthapuram</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2367;&#2352;&#2369;&#2357;&#2344;&#2306;&#2340;&#2346;&#2369;&#2352;&#2350;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#8226; The <b>Brihadiswara Temple</b> is located in <b>Thanjavur</b>, Tamil Nadu.</p><p>&#8226; Built by <b>Raja Raja Chola I</b> in the 11th century, it is a masterpiece of <b>Chola architecture</b>.</p><p>&#8226; The temple is a UNESCO World Heritage Site and a prime example of <b>Dravidian style temple architecture</b>, noted for its towering vimana and granite construction.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The Mahabodhi Temple Complex has direct association with the life of the______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2361;&#2366;&#2348;&#2379;&#2343;&#2367; &#2350;&#2306;&#2342;&#2367;&#2352; &#2346;&#2352;&#2367;&#2360;&#2352; &#2325;&#2366; ______ &#2325;&#2375; &#2332;&#2368;&#2357;&#2344; &#2360;&#2375; &#2360;&#2368;&#2343;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Lord Buddha</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2327;&#2357;&#2366;&#2344; &#2348;&#2369;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">Jain Trithankars</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2376;&#2344; &#2340;&#2368;&#2352;&#2381;&#2341;&#2306;&#2325;&#2352;</span>",
      "<span class=\"eqt\">Mughal rulers</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2327;&#2354; &#2358;&#2366;&#2360;&#2325;</span>",
      "<span class=\"eqt\">Sikh Gurus</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2326; &#2327;&#2369;&#2352;&#2369;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Mahabodhi Temple Complex is a sacred site located in Bodh Gaya, India. It is a significant pilgrimage destination for Buddhists around the world because it has a direct association with the life of Siddhartha Gautama, who later became known as <b>Lord Buddha</b>.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is the style of temple architecture that is widely favoured in northern India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2350;&#2306;&#2342;&#2367;&#2352; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2354;&#2366; &#2358;&#2376;&#2354;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2360;&#2306;&#2342; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Vihar</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2361;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Madapa</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2342;&#2366;&#2346;&#2366;</span>",
      "<span class=\"eqt\">Nagar</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2327;&#2352;</span>",
      "<span class=\"eqt\">Dravid</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2367;&#2337;&#2364;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Nagara</b> style is the predominant temple architecture style in <b>northern India</b>.</p><p>Key features of Nagara style:</p><p>&#183; Beehive-shaped tower called <b>shikhara</b>.</p><p>&#183; Temples are generally built on a raised platform.</p><p>&#183; Absence of elaborate boundary walls or gateways (unlike Dravidian temples).</p><p>&#183; The <b>garbhagriha</b> (sanctum sanctorum) is directly under the shikhara.</p><p><b>Further Insight: </b></p><p>&#183; <b>Vihar:</b> Refers to Buddhist monastery complexes, not a style of temple architecture.</p><p>&#183; <b>Madapa:</b> Likely a misspelling of <i>Mandapa</i>, which is a component of temples (pillared hall), not a style.</p><p>&#183; <b>Dravid:</b> Refers to Dravidian style, which is typical of southern India and includes features like pyramid-shaped towers (vimanas) and large gateway towers (gopurams).</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The temple at Khajuraho were built during which dynasty?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2326;&#2332;&#2369;&#2352;&#2366;&#2361;&#2379; &#2325;&#2366; &#2350;&#2306;&#2342;&#2367;&#2352; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358; &#2325;&#2375; &#2360;&#2350;&#2351; &#2348;&#2344;&#2366;&#2319; &#2327;&#2319; &#2341;&#2375;?</p></span>",
