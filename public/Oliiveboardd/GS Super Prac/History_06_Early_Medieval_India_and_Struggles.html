        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements best explains the significance of Kannauj during the Tripartite Struggle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2340;&#2381;&#2352;&#2367;&#2346;&#2325;&#2381;&#2359;&#2368;&#2351; &#2360;&#2306;&#2328;&#2352;&#2381;&#2359; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2344;&#2381;&#2344;&#2380;&#2332; &#2325;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357; &#2325;&#2379; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2360;&#2350;&#2333;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It was the religious capital of Northern India.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2341;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Kannauj was a commercially strategic city due to its location on the Ganga trade route.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2327;&#2366; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2350;&#2366;&#2352;&#2381;&#2327; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2325;&#2344;&#2381;&#2344;&#2380;&#2332; &#2319;&#2325; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2367;&#2325; &#2342;&#2371;&#2359;&#2381;&#2335;&#2367; &#2360;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2358;&#2361;&#2352; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Kannauj was primarily a cultural hub under the Gupta Empire.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2346;&#2381;&#2340; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2340;&#2361;&#2340; &#2325;&#2344;&#2381;&#2344;&#2380;&#2332; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2319;&#2325; &#2360;&#2366;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Kannauj was a fortified city that remained unconquered during this period.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2344;&#2381;&#2344;&#2380;&#2332; &#2319;&#2325; &#2325;&#2367;&#2354;&#2366;&#2348;&#2306;&#2342; &#2358;&#2361;&#2352; &#2341;&#2366; &#2332;&#2379; &#2311;&#2360; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2309;&#2332;&#2375;&#2351; &#2352;&#2361;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Kannauj was commercially strategic due to its position on the Ganga trade route, which made it an essential center for controlling trade between North and Eastern India. </b></p><p>&bull; This economic importance was the main reason for the struggle between the Gurjara-Pratiharas, Palas, and Rashtrakutas.</p><p><b>Further Insight:</b></p><p>&bull; <b>Tripartite Struggle for Kannauj Supremacy (750-1000 CE)</b></p><p>&#9675; <b>Major Empires</b>: Gurjara-Pratihara (Western India), Palas (Eastern India), Rashtrakutas (Deccan).</p><p>&#9675; <b>Cause</b>: Control over Kannauj, a commercially strategic location on the Ganga trade route and previously the capital of Harshavardhan.</p><p><img width=564 height=748 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25852/image001.jpg\"></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following rulers is credited with the reconstruction of the Somnath temple after Arab raids?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2358;&#2366;&#2360;&#2325; &#2325;&#2379; &#2309;&#2352;&#2348; &#2361;&#2350;&#2354;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342; &#2360;&#2379;&#2350;&#2344;&#2366;&#2341; &#2350;&#2306;&#2342;&#2367;&#2352; &#2325;&#2375; &#2346;&#2369;&#2344;&#2352;&#2381;&#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2366; &#2358;&#2381;&#2352;&#2375;&#2351; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Nagabhata I</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2327;&#2349;&#2335;&#2381;&#2335; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Mihir Bhoja</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2361;&#2367;&#2352; &#2349;&#2379;&#2332;</span>",
      "<span class=\"eqt\">Nagabhata II</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2327;&#2349;&#2335;&#2381;&#2335; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Vatsaraja</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2340;&#2381;&#2360;&#2352;&#2366;&#2332;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Nagabhata II is credited with rebuilding the Somnath temple after it was damaged by Arab invasions.</b></p><p>&bull; Nagabhata I is noted for repelling early Arab invasions but didn't rebuild the temple.</p><p>&bull; Mihir Bhoja is known for consolidating the empire and adopting the title 'Adivaraha'.</p><p>&bull; Vatsaraja initiated the Tripartite Struggle but wasn't involved with the Somnath temple.</p><p><b>Further Insight:</b></p><p>&bull; <b>Important Rulers of Gurjara-Pratihara Dynasty (730-1036)</b></p><p>&#9675; Nagabhatta I (730-760):</p><p>&#9632; Famed for containing Arab invasions.</p><p>&#9632; Defeated by Rashtrakuta king Dhruva.</p><p>&#9675; Vatsaraja (780-800):</p><p>&#9632; Made Kannauj his capital, initiating the \"Tripartite Struggle.\"</p><p>&#9632; Defeated Pala ruler Dharmapala and Rashtrakuta king Dantidurga.</p><p>&#9675; Nagabhata II (805-833):</p><p>&#9632; Conquered Kannauj and rebuilt Somnath temple after Arab raids.</p><p>&#9675; Bhoja I / Mihir Bhoja (836-885):</p><p>&#9632; Greatest Pratihara ruler, adopted the title 'Adivaraha.'</p><p><img width=624 height=336 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25852/image002.jpg\"></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Pala rulers is famous for founding Vikramshila University?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2366;&#2354; &#2358;&#2366;&#2360;&#2325; &#2357;&#2367;&#2325;&#2381;&#2352;&#2350;&#2358;&#2367;&#2354;&#2366; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Gopala</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Dharampala</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2352;&#2350;&#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Devapala</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2357;&#2346;&#2366;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Mahipala</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2367;&#2346;&#2366;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Dharampala is credited with founding Vikramshila University, which became a major center for Buddhist learning, complementing Nalanda.</b></p><p>&bull; Gopala founded the Pala dynasty .</p><p>&bull; Devapala expanded the Pala Empire but is not connected to Vikramshila.</p><p><b>Further Insight:</b></p><p>&bull; <b>Important ruler of the Palas of Bengal (750-1150)</b></p><p>&#9675; Gopala (750 CE):</p><p>&#9632; Founder of Pala Dynasty</p><p>&#9632; Founded Odantapuri monastery, the second-largest after Nalanda.</p><p>&#9675; Dharampala (770-810):</p><p>&#9632; Founded Vikramshila University and revived Nalanda University.</p><p>&#9675; Devapala (810-850):</p><p>&#9632; Expanded empire, known for victories over Hunas, Gurjaras, and Dravidas.</p><p><img width=530 height=283 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25852/image003.png\"></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which Rashtrakuta king is associated with the construction of the Kailasanath Temple at Ellora?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2325;&#2370;&#2335; &#2352;&#2366;&#2332;&#2366; &#2319;&#2354;&#2379;&#2352;&#2366; &#2325;&#2375; &#2325;&#2376;&#2354;&#2366;&#2358;&#2344;&#2366;&#2341; &#2350;&#2306;&#2342;&#2367;&#2352; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Dantidurga</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2344;&#2335;&#2367;&#2342;&#2369;&#2352;&#2381;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Krishna I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2381;&#2339; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Amoghavarsha I</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2379;&#2328;&#2357;&#2352;&#2381;&#2359; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Indra III</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2381;&#2342;&#2381;&#2352; &#2340;&#2371;&#2340;&#2368;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Krishna I, who succeeded Dantidurga, is renowned for commissioning the Kailasanath Temple, an architectural marvel carved from a single rock.</b></p><p>&bull; Dantidurga is known for founding the Rashtrakuta kingdom.</p><p><b>Further Insight:</b></p><p>&bull; <b>Important Rulers of Rashtrakutas of Deccan (752-973)</b></p><p>&#9675; Dantidurga (753-756):</p><p>&#9632; Founded Rashtrakuta kingdom.</p><p>&#9675; Krishna I (756-774):</p><p>&#9632; Defeated Pallavas and built the famous Kailasanath (Shiva) temple at Ellora.</p><p>&#9675; Amoghavarsha I (814-878):</p><p>&#9632; Compared to Ashoka, built a new capital at Manyakheta. Authored <i>Kavirajamarga</i> (Kannada) and <i>Prashnottara Ratnamalika</i> (Sanskrit).</p><p><img width=484 height=515 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25852/image004.jpg\"></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following titles was assumed by Rajendra I after his conquest of the Ganges valley?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2306;&#2327;&#2366; &#2328;&#2366;&#2335;&#2368; &#2346;&#2352; &#2357;&#2367;&#2332;&#2351; &#2325;&#2375; &#2348;&#2366;&#2342; &#2352;&#2366;&#2332;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2341;&#2350; &#2344;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2343;&#2366;&#2352;&#2339; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Parakesari</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2325;&#2375;&#2360;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Gangaikondachola</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2327;&#2312;&#2325;&#2379;&#2306;&#2337;&#2330;&#2379;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Chakravartin</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2325;&#2381;&#2352;&#2357;&#2352;&#2381;&#2340;&#2368;</span>",
      "<span class=\"eqt\">Tribhuvanachakravartin</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2357;&#2344;&#2330;&#2325;&#2381;&#2352;&#2357;&#2352;&#2381;&#2340;&#2368;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>After his successful northern campaign up to the Ganges valley, Rajendra I assumed the title \"Gangaikondachola\" (the Chola who conquered the Ganga).</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Important ruler of the Chola dynasty (985-1044 CE)</b></p><p>&bull; <b>Founding: By Vijayalaya, a feudatory of Pallavas. The Imperial Cholas were based in Tanjore.</b></p><p>&bull; <b>Key Rulers</b></p><p>&#9675; Rajaraja I (985-1014 AD):</p><p>&#9632; Expanded Chola empire, conquered Maldives, and built the Rajarajeshwara or Brihadeshwara temple at Thanjavur.</p><p>&#9675; Rajendra I (1014-1044 AD):</p><p>&#9632; Conquered Sri Lanka, assumed the title \"Gangaikondachola,\" and built a new capital city, Gangaikondacholapuram.</p><p>&#9675; Chola Architecture: Dravidian architecture reached its zenith. The Brihadeshwara Temple at Tanjore and Nataraja Temple at Chidambaram are notable examples.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following best describes the Chola system of local self-government?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2360;&#2381;&#2357;&#2358;&#2366;&#2360;&#2344; &#2325;&#2368; &#2330;&#2379;&#2354; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Direct governance by royal officials.</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2361;&#2368; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2358;&#2366;&#2360;&#2344;&#2404;</span>",
      "<span class=\"eqt\">Village assemblies (Ur and Sabha) exercised considerable autonomy in local matters.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2366;&#2350; &#2360;&#2349;&#2366;&#2323;&#2306; (&#2313;&#2352; &#2324;&#2352; &#2360;&#2349;&#2366;) &#2325;&#2379; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2360;&#2381;&#2357;&#2366;&#2351;&#2340;&#2381;&#2340;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2341;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Control by military garrisons stationed in the region.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2340;&#2376;&#2344;&#2366;&#2340; &#2360;&#2376;&#2344;&#2381;&#2351; &#2330;&#2380;&#2325;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339;&#2404;</span>",
      "<span class=\"eqt\">Governance through a council of noble elites appointed by the king.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2369;&#2354;&#2368;&#2344; &#2357;&#2352;&#2381;&#2327; &#2325;&#2368; &#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2358;&#2366;&#2360;&#2344;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Cholas were known for their highly decentralized local administration, where village assemblies (Ur for general population and Sabha for Brahmins) had significant authority in governance, especially concerning revenue and legal matters.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Important ruler of the Chola dynasty (985-1044 CE)</b></p><p>&bull; <b>Founding: By Vijayalaya, a feudatory of Pallavas. The Imperial Cholas were based in Tanjore.</b></p><p>&bull; <b>Key Rulers</b></p><p>&#9675; Rajaraja I (985-1014 AD):</p><p>&#9632; Expanded Chola empire, conquered Maldives, and built the Rajarajeshwara or Brihadeshwara temple at Thanjavur.</p><p>&#9675; Rajendra I (1014-1044 AD):</p><p>&#9632; Conquered Sri Lanka, assumed the title \"Gangaikondachola,\" and built a new capital city, Gangaikondacholapuram.</p><p>&#9675; Chola Architecture: Dravidian architecture reached its zenith. The Brihadeshwara Temple at Tanjore and Nataraja Temple at Chidambaram are notable examples</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following monuments was built under the patronage of Rajaraja Chola I?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2381;&#2350;&#2366;&#2352;&#2325; &#2352;&#2366;&#2332;&#2352;&#2366;&#2332;&#2366; &#2330;&#2379;&#2354; &#2346;&#2381;&#2352;&#2341;&#2350; &#2325;&#2375; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2350;&#2375;&#2306; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Meenakshi Temple, Madurai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2368;&#2344;&#2366;&#2325;&#2381;&#2359;&#2368; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2350;&#2342;&#2369;&#2352;&#2376;</span>",
      "<span class=\"eqt\">Brihadeshwara Temple, Thanjavur</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2371;&#2361;&#2342;&#2375;&#2358;&#2381;&#2357;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2340;&#2306;&#2332;&#2366;&#2357;&#2369;&#2352;</span>",
      "<span class=\"eqt\">Virupaksha Temple, Pattadakal</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2352;&#2369;&#2346;&#2366;&#2325;&#2381;&#2359; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2346;&#2335;&#2381;&#2335;&#2366;&#2337;&#2325;&#2354;</span>",
      "<span class=\"eqt\">Shore Temple, Mahabalipuram</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2379;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352;, &#2350;&#2361;&#2366;&#2348;&#2354;&#2368;&#2346;&#2369;&#2352;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Rajaraja Chola I is credited with constructing the Brihadeshwara Temple at Thanjavur, one of the grandest achievements of Dravidian temple architecture.</b></p><p>&bull; Meenakshi Temple in Madurai was associated with later Pandya rulers.</p><p>&bull; Virupaksha Temple was built by the Chalukyas.</p><p>&bull; Shore Temple was constructed by the Pallavas.</p><p><b>Further Insight:</b></p><p>&bull; Brihadeshwara Temple (Thanjavur):</p><p>&#9675; Built by Rajaraja Chola I.</p><p>&#9675; UNESCO World Heritage Site.</p><p>&#9675; Known for its massive dome and exquisite sculptures.</p><p>&bull; Gangaikondacholisvaram Temple:</p><p>&#9675; Constructed by Rajendra Chola I.</p><p>&#9675; UNESCO World Heritage Site.</p><p>&bull; Nataraja Temple (Chidambaram):</p><p>&#9675; Dedicated to Lord Shiva in his dancing form.</p><p>&#9675; Important pilgrimage site; known for its unique architecture and cultural significance.</p><p>&bull; Airavatesvara Temple (Darasuram):</p><p>&#9675; Built by Rajendra Chola II.</p><p>&#9675; UNESCO World Heritage Site.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Who succeeded Harshavardhana as the ruler of the Vardhan dynasty after his death?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2352;&#2381;&#2359;&#2357;&#2352;&#2381;&#2343;&#2344; &#2325;&#2368; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2325;&#2375; &#2348;&#2366;&#2342; &#2357;&#2352;&#2381;&#2343;&#2344; &#2357;&#2306;&#2358; &#2325;&#2366; &#2358;&#2366;&#2360;&#2325; &#2325;&#2380;&#2344; &#2348;&#2344;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rajyavardhana</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351;&#2357;&#2352;&#2381;&#2343;&#2344;</span>",
      "<span class=\"eqt\">Grahavarman</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2361;&#2357;&#2352;&#2381;&#2350;&#2344;</span>",
      "<span class=\"eqt\">Prabhakaravardhana</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2349;&#2366;&#2325;&#2352;&#2357;&#2352;&#2381;&#2343;&#2344;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; <b>Harshavardhana died without a direct heir, and no significant ruler succeeded him, leading to the decline of the Vardhan dynasty.</b></p><p>&bull; Rajyavardhana was Harshavardhana's elder brother but was killed by Sasanka before Harsha came to power.</p><p>&bull; Grahavarman was Harsha's brother-in-law, married to his sister, and not his successor.</p><p>&bull; Prabhakaravardhana was Harsha's father and had died earlier.</p><p><b>Further Insight:</b></p><p>&bull; <b>Vardhan Dynasty</b></p><p>&#9675; Period: 6th - 7th century CE.</p><p>&#9675; Capital: Thanesar.</p><p>&#9675; Key Rulers:</p><p>&#9632; Prabhakaravardhana: Expanded territory; father of Harshavardhana.</p><p>&#9632; Rajyavardhana: Notable for defeating foreign invasions; killed by Sasanka of Bengal.</p><p>&#9632; <b>Harshavardhana: </b></p><p>&bull; <b>Unified northern India</b></p><p>&bull; <b>promoted Buddhism</b></p><p>&bull; <b>Hosted the Prayag Assembly</b></p><p>&bull; <b>authored \"Nagananda.\"</b></p><p><b><img width=529 height=254 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25852/image005.jpg\"></b></p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following literary works is attributed to a Rashtrakuta ruler?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351;&#2367;&#2325; &#2325;&#2371;&#2340;&#2367; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2325;&#2370;&#2335; &#2358;&#2366;&#2360;&#2325; &#2325;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kavirajamarga</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2357;&#2367;&#2352;&#2366;&#2332;&#2350;&#2366;&#2352;&#2381;&#2327;</span>",
      "<span class=\"eqt\">Arthashastra</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2381;&#2341;&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Shishupala Vadha</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2358;&#2369;&#2346;&#2366;&#2354; &#2357;&#2343;</span>",
      "<span class=\"eqt\">Abhijnanasakuntalam</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2349;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344;&#2358;&#2366;&#2325;&#2369;&#2344;&#2381;&#2340;&#2354;&#2350;&#2381;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Amoghavarsha I of the Rashtrakutas authored <i>Kavirajamarga</i>, an important work in Kannada literature, demonstrating his patronage of arts and culture.</b></p><p>&bull; <i>Arthashastra</i> was authored by Kautilya (Chanakya).</p><p>&bull; <i>Shishupala Vadha</i> was written by Magha, a poet in the Gupta era.</p><p>&bull; <i>Abhijnanasakuntalam</i> was written by Kalidasa during the Gupta period.</p><p><b>Further Insight:</b></p><p>&bull; <b>Important Rulers of Rashtrakutas of Deccan (752-973)</b></p><p>&#9675; Dantidurga (753-756):</p><p>&#9632; Founded Rashtrakuta kingdom.</p><p>&#9675; Krishna I (756-774):</p><p>&#9632; Defeated Pallavas and built the famous Kailasanath (Shiva) temple at Ellora.</p><p>&#9675; Amoghavarsha I (814-878):</p><p>&#9632; Compared to Ashoka, built a new capital at Manyakheta. Authored <i>Kavirajamarga</i> (Kannada) and <i>Prashnottara Ratnamalika</i> (Sanskrit).</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which Chola king is known for organizing a naval expedition to Southeast Asia?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2330;&#2379;&#2354; &#2352;&#2366;&#2332;&#2366; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2346;&#2370;&#2352;&#2381;&#2357; &#2319;&#2358;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2344;&#2380;&#2360;&#2376;&#2344;&#2367;&#2325; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rajaraja I</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2352;&#2366;&#2332;&#2366; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Rajendra I</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Vijayalaya Chola</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2332;&#2351;&#2366;&#2354;&#2351; &#2330;&#2379;&#2354;</span>",
      "<span class=\"eqt\">Kulottunga I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2354;&#2379;&#2340;&#2381;&#2340;&#2369;&#2306;&#2327;&#2366; I</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Rajendra I is famous for sending a naval expedition to Southeast Asia, specifically against the Srivijaya kingdom, which expanded the Chola influence across the Bay of Bengal.</b></p><p>&bull; Rajaraja I expanded Chola influence, but his campaigns were mainly focused on southern India and Sri Lanka.</p><p>&bull; Vijayalaya Chola is the founder of the Chola dynasty but not known for naval expeditions.</p><p>&bull; Kulottunga I had campaigns in Sri Lanka but didn't lead major naval expeditions to Southeast Asia.</p><p><b>Further Insight:</b></p><p>&bull; <b>Important ruler of the Chola dynasty (985-1044 CE)</b></p><p>&bull; <b>Founding: By Vijayalaya, a feudatory of Pallavas. The Imperial Cholas were based in Tanjore.</b></p><p>&bull; <b>Key Rulers</b></p><p>&#9675; Rajaraja I (985-1014 AD):</p><p>&#9632; Expanded Chola empire, conquered Maldives, and built the Rajarajeshwara or Brihadeshwara temple at Thanjavur.</p><p>&#9675; Rajendra I (1014-1044 AD):</p><p>&#9632; Conquered Sri Lanka, assumed the title \"Gangaikondachola,\" and built a new capital city, Gangaikondacholapuram.</p><p>&#9675; Chola Architecture: Dravidian architecture reached its zenith. The Brihadeshwara Temple at Tanjore and Nataraja Temple at Chidambaram are notable examples</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Pulakeshin II:</p><p>a. Pulakeshin II expanded the Chalukya kingdom into northern India.</p><p>b. He defeated Harshavardhana and established the Narmada River as a key boundary.</p><p>c. He is credited with the construction of the Brihadeshwara Temple at Thanjavur.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2369;&#2354;&#2325;&#2375;&#2358;&#2367;&#2344; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2346;&#2369;&#2354;&#2325;&#2375;&#2358;&#2367;&#2344; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2344;&#2375; &#2330;&#2366;&#2354;&#2369;&#2325;&#2381;&#2351; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>b. &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2361;&#2352;&#2381;&#2359;&#2357;&#2352;&#2381;&#2343;&#2344; &#2325;&#2379; &#2361;&#2352;&#2366;&#2351;&#2366; &#2324;&#2352; &#2344;&#2352;&#2381;&#2350;&#2342;&#2366; &#2344;&#2342;&#2368; &#2325;&#2379; &#2319;&#2325; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2360;&#2368;&#2350;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>c. &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2340;&#2306;&#2332;&#2366;&#2357;&#2369;&#2352; &#2350;&#2375;&#2306; &#2348;&#2371;&#2361;&#2342;&#2375;&#2358;&#2381;&#2357;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2366; &#2358;&#2381;&#2352;&#2375;&#2351; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">a and b only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">b only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">b and c only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">a, b, and c</span><span class=\"hqt\" style=\"display:none\">a, b, c</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Pulakeshin II famously defeated Harshavardhana and established the Narmada as a territorial boundary.</b></p><p>&bull; Pulakeshin II did expand southward but primarily focused on consolidating power in the Deccan rather than northern India.</p><p>&bull; The Brihadeshwara Temple was built by Rajaraja Chola I, not Pulakeshin II.</p><p><b>Further Insight:</b></p><p>&bull; <b>Chalukya Dynasty</b></p><p>&#9675; <b>Period:</b> 6th - 8th century CE.</p><p>&#9675; <b>Key Ruler:</b></p><p>&#9632; <b>Pulakeshin II:</b> Expanded the kingdom; defeated Harshavardhana, establishing the Narmada as a key boundary.</p><p>&#9675; <b>Capital:</b> Badami.</p><p>&#9675; <b>Contributions:</b></p><p>&#9632; Renowned for rock-cut and structural temples (e.g., Badami cave temples).</p><p>&#9632; Patronage of Hinduism and Jainism, fostering regional art and architecture.</p><p><img width=357 height=380 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25852/image006.png\"></p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Rajput clans was primarily responsible for defending India against Mahmud of Ghazni's invasions?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2352;&#2366;&#2332;&#2346;&#2370;&#2340; &#2357;&#2306;&#2358; &#2350;&#2361;&#2350;&#2370;&#2342; &#2327;&#2332;&#2344;&#2357;&#2368; &#2325;&#2375; &#2310;&#2325;&#2381;&#2352;&#2350;&#2339;&#2379;&#2306; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chauhans</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2380;&#2361;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Guhilots</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2361;&#2367;&#2354;&#2379;&#2335;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Paramaras</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2352;&#2360;</span>",
      "<span class=\"eqt\">Pratiharas</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2361;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; <b>The Pratiharas were instrumental in defending western India against Mahmud of Ghazni's invasions, particularly during the reign of Nagabhata II.</b></p><p>&bull; Chauhans resisted later Islamic invasions but not specifically Mahmud of Ghazni.</p><p>&bull; The Guhilots were active in Mewar but didn't play a key role against Mahmud of Ghazni.</p><p>&bull; Paramaras were known for their internal conflicts but didn't focus on Ghazni's invasions.</p><p><b>Further Insight:</b></p><p>&bull; <b>Chahamanas (Chauhans) (6th - 12th century)</b></p><p>&#9675; <b>Key Ruler</b>: Prithviraj Chauhan</p><p>&#9675; <b>Region</b>: Rajasthan and surrounding areas</p><p>&#9675; The Chauhans were<b> feudal lords under the Pratiharas </b>and played a significant role in resisting Arab invasions and later establishing their independent rule in northern India.</p><p>&bull; <b>Paramaras of Malwa (9th - 14th century)</b></p><p>&#9675; <b>Region</b>: Malwa (Central India)</p><p>&#9675; They were initially <b>vassals of the Rashtrakutas</b>, but eventually, they became an independent force, known for their contributions to art, literature, and architecture.</p><p>&bull; <b>Chandellas of Bundelkhand (9th - 13th century)</b></p><p>&#9675; <b>Region</b>: Bundelkhand (Central India)</p><p>&#9675; They are<b> best known for building the famous temples of Khajuraho, a UNESCO World Heritage site</b>, and played a key role in central Indian politics.</p>",
    "question_index": 11
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Tripartite Struggle for Kannauj:</p><p><b>a.</b> The struggle was primarily between the Gurjara-Pratiharas, Palas, and Cholas.</p><p><b>b.</b> Kannauj's significance lay in its strategic position on the Ganga trade route.</p><p><b>c.</b> The Tripartite Struggle ultimately weakened all three participating dynasties.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2344;&#2381;&#2344;&#2380;&#2332; &#2325;&#2375; &#2354;&#2367;&#2319; &#2340;&#2381;&#2352;&#2367;&#2346;&#2325;&#2381;&#2359;&#2368;&#2351; &#2360;&#2306;&#2328;&#2352;&#2381;&#2359; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2360;&#2306;&#2328;&#2352;&#2381;&#2359; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2327;&#2369;&#2352;&#2381;&#2332;&#2352;-&#2346;&#2381;&#2352;&#2340;&#2367;&#2361;&#2366;&#2352;, &#2346;&#2366;&#2354; &#2324;&#2352; &#2330;&#2379;&#2354;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2341;&#2366;&#2404;</p><p>b. &#2325;&#2344;&#2381;&#2344;&#2380;&#2332; &#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2357; &#2327;&#2306;&#2327;&#2366; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2350;&#2366;&#2352;&#2381;&#2327; &#2346;&#2352; &#2311;&#2360;&#2325;&#2368; &#2352;&#2339;&#2344;&#2368;&#2340;&#2367;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2341;&#2366;&#2404;</p><p>c. &#2340;&#2381;&#2352;&#2367;&#2346;&#2325;&#2381;&#2359;&#2368;&#2351; &#2360;&#2306;&#2328;&#2352;&#2381;&#2359; &#2344;&#2375; &#2309;&#2306;&#2340;&#2340;&#2307; &#2349;&#2366;&#2327; &#2354;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2349;&#23     "question": "<span class=\"eqt\"><p>Consider the following statements about the Gurjara-Pratiharas:</p><p><b>a.</b> The Pratiharas are credited with stopping Arab invasions east of the Indus River.</p><p><b>b.</b> Nagabhata II rebuilt the Somnath Temple after its destruction by Mahmud of Ghazni.</p><p><b>c.</b> Bhoja I, also known as Mihir Bhoja, was the most prominent ruler of the dynasty.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2352;&#2381;&#2332;&#2352;-&#2346;&#2381;&#2352;&#2340;&#2367;&#2361;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2346;&#2381;&#2352;&#2340;&#2367;&#2361;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2360;&#2367;&#2306;&#2343;&#2369; &#2344;&#2342;&#2368; &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357; &#2350;&#2375;&#2306; &#2309;&#2352;&#2348; &#2310;&#2325;&#2381;&#2352;&#2350;&#2339;&#2379;&#2306; &#2325;&#2379; &#2352;&#2379;&#2325;&#2344;&#2375; &#2325;&#2366; &#2358;&#2381;&#2352;&#2375;&#2351; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>b. &#2344;&#2366;&#2327;&#2349;&#2335;&#2381;&#2335; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2344;&#2375; &#2350;&#2361;&#2350;&#2370;&#2342; &#2327;&#2332;&#2344;&#2357;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2379;&#2350;&#2344;&#2366;&#2341; &#2350;&#2306;&#2342;&#2367;&#2352; &#2325;&#2375; &#2357;&#2367;&#2344;&#2366;&#2358; &#2325;&#2375; &#2348;&#2366;&#2342; &#2313;&#2360;&#2325;&#2366; &#2346;&#2369;&#2344;&#2352;&#2381;&#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2352;&#2366;&#2351;&#2366;&#2404;</p><p>c. &#2349;&#2379;&#2332; &#2346;&#2381;&#2352;&#2341;&#2350;, &#2332;&#2367;&#2360;&#2375; &#2350;&#2367;&#2361;&#2367;&#2352; &#2349;&#2379;&#2332; &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2311;&#2360; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2358;&#2366;&#2360;&#2325; &#2341;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",

    "solution": "<p>&bull; Pratiharas were responsible for stopping Arab invasions east of the Indus.</p><p>&bull; Nagabhata II rebuilt the Somnath Temple after an earlier Arab raid, not after its destruction by Mahmud of Ghazni.</p><p>&bull; Bhoja I, also called Mihir Bhoja, was the greatest ruler of the dynasty.</p><p><b>Further Insight:</b></p><p>&bull; <b>Important Rulers of Gurjara-Pratihara Dynasty (730-1036)</b></p><p>&#9675; Nagabhatta I (730-760):</p><p>&#9632; Famed for containing Arab invasions.</p><p>&#9632; Defeated by Rashtrakuta king Dhruva.</p><p>&#9675; Vatsaraja (780-800):</p><p>&#9632; Made Kannauj his capital, initiating the \"Tripartite Struggle.\"</p><p>&#9632; Defeated Pala ruler Dharmapala and Rashtrakuta king Dantidurga.</p><p>&#9675; Nagabhata II (805-833):</p><p>&#9632; Conquered Kannauj and rebuilt Somnath temple after Arab raids.</p><p>&#9675; Bhoja I / Mihir Bhoja (836-885):</p><p>&#9632; Greatest Pratihara ruler, adopted the title 'Adivaraha.'</p><p><img width=624 height=336 id=image3.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25852/image008.jpg\"></p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about the Pala Dynasty:</p><p><b>a.</b> Gopala, the founder of the Pala dynasty, established his rule through democratic means.</p><p><b>b.</b> The Palas were ardent followers of Theravada Buddhism.</p><p><b>c.</b> Dharampala established Vikramshila University.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2354; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2346;&#2366;&#2354; &#2357;&#2306;&#2358; &#2325;&#2375; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325; &#2327;&#2379;&#2346;&#2366;&#2354; &#2344;&#2375; &#2354;&#2379;&#2325;&#2340;&#2366;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325; &#2340;&#2352;&#2368;&#2325;&#2379;&#2306; &#2360;&#2375; &#2309;&#2346;&#2344;&#2366; &#2358;&#2366;&#2360;&#2344; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>b. &#2346;&#2366;&#2354; &#2341;&#2375;&#2352;&#2357;&#2366;&#2342; &#2348;&#2380;&#2342;&#2381;&#2343; &#2343;&#2352;&#2381;&#2350; &#2325;&#2375; &#2313;&#2340;&#2381;&#2360;&#2366;&#2361;&#2368; &#2309;&#2344;&#2369;&#2351;&#2366;&#2351;&#2368; &#2341;&#2375;&#2404;</p><p>c. &#2343;&#2352;&#2381;&#2350;&#2346;&#2366;&#2354; &#2344;&#2375; &#2357;&#2367;&#2325;&#2381;&#2352;&#2350;&#2358;&#2367;&#2354;&#2366; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#236     "solution": "<p>&bull; Gopala was elected by regional chieftains, which is a unique aspect of his rise to power.</p><p>&bull; Palas were followers of Mahayana Buddhism, not Theravada.</p><p>&bull; Dharampala is known for establishing Vikramshila University.</p><p><b>Further Insight:</b></p><p>&bull; <b>Important ruler of the Palas of Bengal (750-1150)</b></p><p>&#9675; Gopala (750 CE):</p><p>&#9632; Founder of Pala Dynasty</p><p>&#9632; Founded Odantapuri monastery, the second-largest after Nalanda.</p><p>&#9675; Dharampala (770-810):</p><p>&#9632; Founded Vikramshila University and revived Nalanda University.</p><p>&#9675; Devapala (810-850):</p><p>&#9632; Expanded empire, known for victories over Hunas, Gurjaras, and Dravidas.</p><p><img width=530 height=283 id=image6.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25852/image009.png\"></p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about the Rashtrakutas:</p><p><b>a.</b> Amoghavarsha I is credited with building the famous Kailasanath Temple at Ellora.</p><p><b>b.</b> The Rashtrakutas had friendly relations with the Abbasid Caliphate.</p><p><b>c.</b> Krishna I was the first Rashtrakuta ruler to defeat the Pallavas.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2325;&#2370;&#2335;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2319;&#2354;&#2379;&#2352;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2325;&#2376;&#2354;&#2366;&#2358;&#2344;&#2366;&#2341; &#2350;&#2306;&#2342;&#2367;&#2352; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2366; &#2358;&#2381;&#2352;&#2375;&#2351; &#2309;&#2350;&#2379;&#2328;&#2357;&#2352;&#2381;&#2359; &#2346;&#2381;&#2352;&#2341;&#2350; &#2325;&#2379; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>b. &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2325;&#2370;&#2335;&#2379;&#2306; &#2325;&#2375; &#2309;&#2348;&#2381;&#2348;&#2366;&#2360;&#2367;&#2342; &#2326;&#2354;&#2368;&#2347;&#2366; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2376;&#2340;&#2381;&#2352;&#2368;&#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2348;&#2306;&#2343; &#2341;&#2375;&#2404;</p><p>c. &#2325;&#2371;&#2359;&#2381;&#2339; &#2346;&#2381;&#2352;&#2341;&#2350; &#2346;&#2354;&#2381;&#2354;&#2357;&#2379;&#2306; &#2325;&#2379; &#2361;&#2352;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2346;&#2361;&#2354;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2325;&#2370;&#2335; &#2358;&#2366;&#2360;&#2325; &#2341;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",

    "solution": "<p>&bull; Krishna I, not Amoghavarsha I, built the famous Kailasanath Temple at Ellora.</p><p>&bull; Rashtrakutas had diplomatic and trade relations with the Abbasid Caliphate.</p><p>&bull; Krishna I was the first Rashtrakuta ruler to defeat the Pallavas.</p><p><b>Further Insight:</b></p><p>&bull; <b>Important Rulers of Rashtrakutas of Deccan (752-973)</b></p><p>&#9675; Dantidurga (753-756):</p><p>&#9632; Founded Rashtrakuta kingdom.</p><p>&#9675; Krishna I (756-774):</p><p>&#9632; Defeated Pallavas and built the famous Kailasanath (Shiva) temple at Ellora.</p><p>&#9675; Amoghavarsha I (814-878):</p><p>&#9632; Compared to Ashoka, built a new capital at Manyakheta. Authored <i>Kavirajamarga</i> (Kannada) and <i>Prashnottara Ratnamalika</i> (Sanskrit).</p><p><img width=484 height=515 id=image5.jpg src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25852/image010.jpg\"></p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Chola dynasty:</p><p><b>a.</b> Rajaraja I conquered parts of Sri Lanka during his reign.</p><p><b>b.</b> Rajendra I built a new capital city, Gangaikondacholapuram, after his campaign to the Ganga.</p><p><b>c.</b> The Cholas are primarily remembered for their contributions to North Indian temple architecture.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2379;&#2354; &#2357;&#2306;&#2358; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2352;&#2366;&#2332;&#2352;&#2366;&#2332;&#2366; &#2346;&#2381;&#2352;&#2341;&#2350; &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2358;&#2381;&#2352;&#2368;&#2354;&#2306;&#2325;&#2366; &#2325;&#2375; &#2325;&#2369;&#2331; &#2361;&#2367;&#2360;&#2381;&#2360;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2332;&#2351; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2368;&#2404;</p><p>b. &#2352;&#2366;&#2332;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2341;&#2350; &#2344;&#2375; &#2327;&#2306;&#2327;&#2366; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2319;&#2325; &#2344;&#2351;&#2366; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2358;&#2361;&#2352; &#2327;&#2306;&#2327;&#2312;&#2325;&#2379;&#2306;&#2337;&#2330;&#2379;&#2354;&#2346;&#2369;&#2352;&#2350; &#2348;&#2344;&#2366;&#2351;&#2366;&#2404;</p><p>c. &#2330;&#2379;&#2354;&#2379;&#2306; &#2325;&#2379; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2306;&#2342;&#2367;&#2352; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2354;&#2366; &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2375; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2351;&#2366;&#2342; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",

    "correct_option_id": 0,
    "solution": "<p>&bull; Rajaraja I conquered northern parts of Sri Lanka.</p><p>&bull; Rajendra I built Gangaikondacholapuram after his successful Ganga expedition.</p><p>&bull; Cholas are renowned for their contributions to <i>South</i> Indian, specifically Dravidian, temple architecture.</p><p><b>Further Insight:</b></p><p>&bull; <b>Important ruler of the Chola dynasty (985-1044 CE)</b></p><p>&bull; <b>Founding: By Vijayalaya, a feudatory of Pallavas. The Imperial Cholas were based in Tanjore.</b></p><p>&bull; <b>Key Rulers</b></p><p>&#9675; Rajaraja I (985-1014 AD):</p><p>&#9632; Expanded Chola empire, conquered Maldives, and built the Rajarajeshwara or Brihadeshwara temple at Thanjavur.</p><p>&#9675; Rajendra I (1014-1044 AD):</p><p>&#9632; Conquered Sri Lanka, assumed the title \"Gangaikondachola,\" and built a new capital city, Gangaikondacholapuram.</p>",

4; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Vardhan Dynasty:</p><p>a. Harshavardhana initially ruled over both Kannauj and Thanesar.</p><p>b. Rajyavardhana was killed by the ruler of Bengal, Sasanka.</p><p>c. Harshavardhana was a follower of Mahayana Buddhism, and he organized the famous Prayag Assembly.</p><p>d. Harshavardhana authored the play \"Nagananda\" in Sanskrit.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2352;&#2381;&#2343;&#2344; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2361;&#2352;&#2381;&#2359;&#2357;&#2352;&#2381;&#2343;&#2344; &#2344;&#2375; &#2358;&#2369;&#2352;&#2370; &#2350;&#2375;&#2306; &#2325;&#2344;&#2381;&#2344;&#2380;&#2332; &#2324;&#2352; &#2341;&#2366;&#2344;&#2375;&#2360;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2352; &#2358;&#2366;&#2360;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>b. &#2352;&#2366;&#2332;&#2381;&#2351;&#2357;&#2352;&#2381;&#2343;&#2344; &#2325;&#2368; &#2361;&#2340;&#2381;&#2351;&#2366; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2375; &#2358;&#2366;&#2360;&#2325; &#2360;&#2366;&#2360;&#2306;&#2325;&#2366; &#2344;&#2375; &#2325;&#2368; &#2341;&#2368;&#2404;</p><p>c. &#2361;&#2352;&#2381;&#2359;&#2357;&#2352;&#2381;&#2343;&#2344; &#2350;&#2361;&#2366;&#2351;&#2366;&#2344; &#2348;&#2380;&#2342;&#2381;&#2343; &#2343;&#2352;&#2381;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2351;&#2366;&#2351;&#2368; &#2341;&#2375;, &#2324;&#2352; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2346;&#2381;&#2352;&#2351;&#2366;&#2327; &#2360;&#2349;&#2366; &#2325;&#2366; &#2310;&#2
