        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In which of the following articles, \"Right against Exploitation\" are mentioned?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2350;&#2375;&#2306; \"&#2358;&#2379;&#2359;&#2339; &#2325;&#2375; &#2357;&#2367;&#2352;&#2369;&#2342;&#2381;&#2343; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;\" &#2325;&#2366; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 23  -  24</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 23 - 24</span>",
      "<span class=\"eqt\">Article 32  -  35</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32 - 35</span>",
      "<span class=\"eqt\">Article 25  -  28</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 25 - 28</span>",
      "<span class=\"eqt\">Article 29  -  30</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 29 - 30</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Articles 23 and 24</b> of the Indian Constitution enshrine the Right against Exploitation, providing Fundamental Rights that protect citizens from forced labor and exploitation.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Article 19 of the Indian Constitution provides for how many types of freedoms?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 19 &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">44</span><span class=\"hqt\" style=\"display:none\">44</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>According to Article 19 of the Indian Constitution, every Indian citizen is entitled to <b>six (6) </b>essential freedoms:</p><p>1) Freedom of speech and expression</p><p>2) Freedom of assembly</p><p>3) Freedom of association</p><p>4) Freedom of movement</p><p>5) Freedom to reside and settle in any part of the country.</p><p>6) Freedom to practice any profession, occupation, trade, or business.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article of the Constitution of India lays down that an Indian citizen has the right to use any restaurant, road or public place?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2351;&#2361; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2319;&#2325; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2325;&#2379; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2352;&#2375;&#2360;&#2381;&#2340;&#2352;&#2366;&#2306;, &#2360;&#2337;&#2364;&#2325; &#2351;&#2366; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 17 (1)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 17 (1)</span>",
      "<span class=\"eqt\">Article 15 (2)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 15 (2)</span>",
      "<span class=\"eqt\">Article 14 (2)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 14 (2)</span>",
      "<span class=\"eqt\">Article 16 (1)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 16 (1)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Article 15 in The Constitution of India 1949-</p><p>Prohibition of discrimination on grounds of religion, race, caste, sex or place of birth</p><p>1) The State shall not discriminate against any citizen on grounds only of religion, race, caste, sex, place of birth or any of them.</p><p>2) <b>No citizen shall, on grounds only of religion, race, caste, sex, place of birth or any of them, be subject to any disability, liability, restriction or condition with regard to-</b></p><p><b>(a)</b><b> access to shops, public restaurants, hotels and palaces of public entertainment; or</b></p><p><b>(b)</b><b> the use of wells, tanks, bathing ghats, roads and places of public resort maintained wholly or partly out of State funds or dedicated to the use of the general public.</b></p><p>3) Nothing in this article shall prevent the State from making any special provision for women and children.</p><p>4) Nothing in this article or in clause (2) of Article 29 shall prevent the State from making any special provision for the advancement of any socially and educationally backward classes of citizens or for the Scheduled Castes and the Scheduled Tribes.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article specifies the procedure for amending the Indian Constitution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2344;&#2367;&#2352;&#2381;&#2342;&#2367;&#2359;&#2381;&#2335; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 365</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 365</span>",
      "<span class=\"eqt\">Article 366</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 366</span>",
      "<span class=\"eqt\">Article 368</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 368</span>",
      "<span class=\"eqt\">Article 367</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 367</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Article 368</b> of the Indian Constitution, located in Part XX, specifies the power of Parliament to amend the Constitution and the procedure thereof.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; Article 365: Deals with the effect of failure to comply with, or to give effect to, directions given by the Union (related to President's Rule).</p><p>&#8226; Article 366: Contains definitions of various terms used in the Constitution.</p><p>&#8226; Article 367: Deals with interpretation of the Constitution.</p><p><b>Further insights:</b></p><p>&#8226; Article 368 outlines different procedures for amending various parts of the Constitution:</p><p>* Some provisions can be amended by a simple majority of Parliament.</p><p>* Most provisions require a special majority of Parliament (a majority of the total membership of each House and a majority of not less than two-thirds of the members of each House present and voting).</p><p>* Certain provisions relating to the federal structure require a special majority of Parliament plus ratification by the legislatures of at least half of the states.</p><p>&#8226; The doctrine of \"basic structure,\" established by the Supreme Court, limits Parliament's power to amend certain fundamental features of the Constitution.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following duties is specified as the 10th Fundamental Duty in the Indian Constitution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; 10&#2357;&#2375;&#2306; &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2342;&#2367;&#2359;&#2381;&#2335; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To cherish and follow the noble ideals which inspired our national struggle for freedom</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2361;&#2350;&#2366;&#2352;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2360;&#2306;&#2328;&#2352;&#2381;&#2359; &#2325;&#2379; &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2350;&#2361;&#2366;&#2344; &#2310;&#2342;&#2352;&#2381;&#2358;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2332;&#2379;&#2325;&#2352; &#2352;&#2326;&#2344;&#2366; &#2324;&#2352; &#2313;&#2344;&#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To provide opportunities for education to his child or as the case may be, ward between the age of six and fourteen years</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2344;&#2375; &#2348;&#2330;&#2381;&#2330;&#2375; &#2351;&#2366; &#2357;&#2366;&#2352;&#2381;&#2337; &#2325;&#2379;, &#2332;&#2376;&#2360;&#2366; &#2349;&#2368; &#2350;&#2366;&#2350;&#2354;&#2366; &#2361;&#2379;, &#2331;&#2361; &#2360;&#2375; &#2330;&#2380;&#2342;&#2361; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2375; &#2348;&#2368;&#2330; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2309;&#2357;&#2360;&#2352; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To develop the scientific temper, humanism and the spirit of inquiry and reform</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2376;&#2332;&#2381;&#2334;&#2366;&#2344;&#2367;&#2325; &#2342;&#2371;&#2359;&#2381;&#2335;&#2367;&#2325;&#2379;&#2339;, &#2350;&#2366;&#2344;&#2357;&#2340;&#2366;&#2357;&#2366;&#2342; &#2324;&#2352; &#2309;&#2344;&#2381;&#2357;&#2375;&#2359;&#2339; &#2319;&#2357;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2368; &#2349;&#2366;&#2357;&#2344;&#2366; &#2325;&#2366; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To strive towards excellence in all spheres of individual and collective activity</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2324;&#2352; &#2360;&#2366;&#2350;&#2370;&#2361;&#2367;&#2325; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367; &#2325;&#2375; &#2360;&#2349;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2325;&#2371;&#2359;&#2381;&#2335;&#2340;&#2366; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The 10th Fundamental Duty states that every citizen shall strive towards excellence in all spheres of individual and collective activity to raise the nation's standard.</p><p><b>The 11 Fundamental Duties of Indian Citizens</b></p><p>It shall be the duty of every citizen of India to:</p><p>1&#65039;) <b>Respect the Constitution</b> and its ideals, the <b>National Flag</b>, and the <b>National Anthem</b>.</p><p>2&#65039;) <b>Cherish and follow the noble ideals</b> that inspired the <b>freedom struggle</b>.</p><p>3&#65039;) <b>Uphold and protect</b> the <b>sovereignty, unity, and integrity</b> of India.</p><p>4&#65039;) <b>Defend the country</b> and render <b>national service</b> when required.</p><p>5&#65039;) <b>Promote harmony</b> and the spirit of <b>common brotherhood</b> among all Indians, respecting <b>diversity</b>.</p><p>6&#65039;) <b>Value and preserve the rich heritage</b> of India's <b>composite culture</b>.</p><p>7&#65039;) <b>Protect and improve the natural environment</b>, including forests, lakes, rivers, and wildlife, and have <b>compassion for living creatures</b>.</p><p>8&#65039;) <b>Develop scientific temper, humanism, and a spirit of inquiry and reform</b>.</p><p>9&#65039;) <b>Safeguard public property</b> and <b>avoid violence</b>.</p><p>10) <b>Strive towards excellence</b> in all spheres of individual and collective activity.</p><p>1&#65039;1) (Added by 86th Amendment, 2002) <b>Provide opportunities for education</b> to children between <b>6-14 years</b> (for parents/guardians).</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which among the following Articles of the Constitution of India deals with the right to free and compulsory education of all children in the age group of 6-14 years?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 6-14 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2375; &#2360;&#2349;&#2368; &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2307;&#2358;&#2369;&#2354;&#2381;&#2325; &#2319;&#2357;&#2306; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">31A</span><span class=\"hqt\" style=\"display:none\">31A</span>",
      "<span class=\"eqt\">21A</span><span class=\"hqt\" style=\"display:none\">21A</span>",
      "<span class=\"eqt\">101</span><span class=\"hqt\" style=\"display:none\">101</span>",
      "<span class=\"eqt\">74</span><span class=\"hqt\" style=\"display:none\">74</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Article <b>21A</b> of the Indian Constitution addresses the right to free and compulsory education for children aged 6-14 years. This article underscores the importance of providing equitable access to quality education for all children in this age group.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Article______of the Indian Constitution deals with \"Right to Constitutional Remedies\".</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342;______\"&#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2313;&#2346;&#2330;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;\" &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">28  -  33</span><span class=\"hqt\" style=\"display:none\">28  -  33</span>",
      "<span class=\"eqt\">32  -  35</span><span class=\"hqt\" style=\"display:none\">32  -  35</span>",
      "<span class=\"eqt\">25  -  30</span><span class=\"hqt\" style=\"display:none\">25  -  30</span>",
      "<span class=\"eqt\">22  -  25</span><span class=\"hqt\" style=\"display:none\">22  -  25</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Articles <b>32 to 35</b> of the Indian Constitution are indeed related to the Fundamental Rights of the citizens of India. These articles ensure that citizens have certain rights and freedoms and empower them with legal remedies in case of any infringement.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which is NOT a Directive Principle to be followed by the State for policy-making?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2340;&#2367;-&#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2366;&#2332;&#2381;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2366;&#2354;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2325; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tender age of children is not abused</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2325;&#2368; &#2325;&#2379;&#2350;&#2354; &#2313;&#2350;&#2381;&#2352; &#2325;&#2366; &#2342;&#2369;&#2352;&#2369;&#2346;&#2351;&#2379;&#2327; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Equal pay for equal work</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2350; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2366;&#2344; &#2357;&#2375;&#2340;&#2344;</span>",
      "<span class=\"eqt\">The operation of economic system results for concentration of wealth</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2343;&#2344; &#2325;&#2366; &#2360;&#2306;&#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The ownership of material resources of the community are for common good</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2325;&#2375; &#2349;&#2380;&#2340;&#2367;&#2325; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2381;&#2357;&#2366;&#2350;&#2367;&#2340;&#2381;&#2357; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2349;&#2354;&#2366;&#2312; &#2325;&#2375; &#2354;&#2367;&#2319; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The <b>concentration of wealth is not a Directive Principle of State Policy</b> (DPSP) under Part IV of the Indian Constitution.</p><p>&#183; DPSPs guide the state in promoting welfare and justice.</p><p>&#183; Options like protecting children from abuse (Article 39), ensuring equal pay for equal work (Article 39), and distributing resources for the common good (Article 39) align with DPSPs.</p><p>&#183; However, concentration of wealth contradicts Article 39(c), which aims to prevent wealth concentration.</p><p><b>Further Insight:</b></p><p>&#183; DPSPs, though non-justiciable, are fundamental for equitable governance.</p><p>&#183; They aim to reduce inequalities and promote social justice, making the prevention of wealth concentration a key objective rather than its promotion.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Articles of the Constitution of India prohibits employment of children in factories etc.?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2366;&#2352;&#2326;&#2366;&#2344;&#2379;&#2306; &#2310;&#2342;&#2367; &#2350;&#2375;&#2306; &#2348;&#2366;&#2354;&#2325;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2351;&#2379;&#2332;&#2344; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2359;&#2375;&#2343; &#2354;&#2327;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">31</span><span class=\"hqt\" style=\"display:none\">31</span>",
      "<span class=\"eqt\">17</span><span class=\"hqt\" style=\"display:none\">17</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Article 24 </b>of the Constitution of India prohibits the employment of children below the age of 14 years in factories, mines, and other hazardous occupations.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a fundamental duty of an Indian citizen?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2325;&#2366; &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To uphold and protect the sovereignty, unity and integrity of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2360;&#2306;&#2346;&#2381;&#2352;&#2349;&#2369;&#2340;&#2366;, &#2319;&#2325;&#2340;&#2366; &#2324;&#2352; &#2309;&#2326;&#2306;&#2337;&#2340;&#2366; &#2325;&#2379; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2344;&#2366; &#2324;&#2352; &#2313;&#2360;&#2325;&#2368; &#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To safeguard public property and to abjure violence</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2361;&#2367;&#2306;&#2360;&#2366; &#2325;&#2366; &#2346;&#2352;&#2367;&#2340;&#2381;&#2351;&#2366;&#2327; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To vote in public elections</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2330;&#2369;&#2344;&#2366;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306; &#2350;&#2340;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">To value and preserve the rich heritage of our composite culture</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2350;&#2366;&#2352;&#2368; &#2350;&#2367;&#2358;&#2381;&#2352;&#2367;&#2340; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367; &#2325;&#2368; &#2360;&#2350;&#2371;&#2342;&#2381;&#2343; &#2357;&#2367;&#2352;&#2366;&#2360;&#2340; &#2325;&#2379; &#2350;&#2361;&#2340;&#2381;&#2357; &#2342;&#2375;&#2344;&#2366; &#2324;&#2352; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>To vote in public elections</b>, while a crucial democratic right and civic responsibility, is not explicitly listed as a Fundamental Duty under Article 51A of the Indian Constitution. </p><p>The Fundamental Duties outline moral and civic obligations of citizens to promote patriotism and uphold the unity of India.</p><p><b>Explanation of Other Options:</b></p><p>&#183; To uphold and protect the sovereignty, unity and integrity of India: This is a fundamental duty as per Article 51A(c).</p><p>&#183; To safeguard public property and to abjure violence: This is a fundamental duty as per Article 51A(i).</p><p>&#183; To value and preserve the rich heritage of our composite culture: This is a fundamental duty as per Article 51A(f).</p><p><b>Further insights:</b></p><p>&#183; Fundamental Duties were added to the Indian Constitution by the 42nd Amendment Act in 1976, on the recommendations of the Swaran Singh Committee.</p><p>&#183; There are currently 11 Fundamental Duties listed in Article 51A, Part IV-A of the Constitution.</p><p>&#183; While Fundamental Duties are not directly enforceable by courts in the same way as Fundamental Rights, they serve as a moral compass and reminder of citizens' responsibilities towards the nation.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which article of the constitution states that 'No person shall be deprived of his life or personal liberty except according to procedure established by law' ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2350;&#2375;&#2306; &#2325;&#2361;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; '&#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2325;&#2366;&#2344;&#2370;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366; &#2313;&#2360;&#2325;&#2375; &#2332;&#2368;&#2357;&#2344; &#2351;&#2366; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2360;&#2375; &#2357;&#2306;&#2330;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;'?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 19</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 19</span>",
      "<span class=\"eqt\">Article 22</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 22</span>",
      "<span class=\"eqt\">Article 21</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 21</span>",
      "<span class=\"eqt\">Article 20</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 20</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Article 21 </b>protects the right to life and personal liberty of every person in India. It states that no person shall be deprived of his life or personal liberty except according to the procedure established by law.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Fundamental Rights is available for Indians as well as foreigners?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341;-&#2360;&#2366;&#2341; &#2357;&#2367;&#2342;&#2375;&#2358;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2349;&#2368; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Right of minorities to establish and administer educational institutions</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2346;&#2360;&#2306;&#2326;&#2381;&#2351;&#2325;&#2379;&#2306; &#2325;&#2379; &#2358;&#2376;&#2325;&#2381;&#2359;&#2339;&#2367;&#2325; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2313;&#2344;&#2325;&#2366; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Equality of opportunity in matters of public employment</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2325;&#2375; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2357;&#2360;&#2352; &#2325;&#2368; &#2360;&#2350;&#2366;&#2344;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Right to protection of language, script and culture of minorities</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2346;&#2360;&#2306;&#2326;&#2381;&#2351;&#2325;&#2379;&#2306; &#2325;&#2368; &#2349;&#2366;&#2359;&#2366;, &#2354;&#2367;&#2346;&#2367; &#2324;&#2352; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367; &#2325;&#2375; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Right to elementary education</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Under <b>Article 21A</b> of the Indian Constitution, the <b>Right to Elementary Education</b> (for children aged 6 - 14) is guaranteed to <b>all persons</b>, including <b>foreigners</b>, as it is derived from the broader <b>Right to Life and Personal Liberty (Article 21)</b>.</p><p>Why not the others?</p><p>(a) <b>Right of minorities to establish/administer educational institutions (Article 30)</b>: Available only to <b>Indian religious/linguistic minorities</b>.</p><p>(b) <b>Equality of opportunity in public employment (Article 16)</b>: Reserved exclusively for <b>Indian citizens</b>.</p><p>(c) <b>Protection of minority culture/language (Article 29)</b>: Applicable only to <b>Indian minorities</b>.</p><p><b>Exception:</b> Some rights under <b>Article 14 (Equality before Law)</b> and <b>Article 21 (Life and Liberty)</b> extend to foreigners, but the options above are more specific.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Article 40 of the Indian constitution is related with_____.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 40_____ &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Protection of life</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2357;&#2344; &#2325;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366;</span>",
      "<span class=\"eqt\">Organisation of village panchayats</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2366;&#2350; &#2346;&#2306;&#2330;&#2366;&#2351;&#2340;&#2379;&#2306; &#2325;&#2366; &#2360;&#2306;&#2327;&#2336;&#2344;</span>",
      "<span class=\"eqt\">Uniform civil code for the citizens</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2366;&#2344; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Freedom to manage religious affairs</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Article 40 of the Indian Constitution directs the State to <b>organize village panchayats</b> under the Directive Principles of State Policy.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following article of Indian constitution is related with \"Promotion of International Peace and security\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; \"&#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2358;&#2366;&#2306;&#2340;&#2367; &#2324;&#2352; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2368; &#2309;&#2349;&#2367;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367;\" &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 47</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 47</span>",
      "<span class=\"eqt\">Article 43</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 43</span>",
      "<span class=\"eqt\">Article 51</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 51</span>",
      "<span class=\"eqt\">Article 40</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 40</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The article of the Indian Constitution that is related with \"Promotion of International Peace and security\" is <b>Article 51.</b> Article 51 is one of the Directive Principles of State Policy (DPSP) that are enshrined in Part IV of the Constitution</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article of the Indian Constitution mentions that \"The State shall endeavour to promote cottage industries on an individual or co-operative basis in rural areas\"?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2350;&#2375;&#2306; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2361;&#2376; &#2325;&#2367; \"&#2352;&#2366;&#2332;&#2381;&#2351; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2351;&#2366; &#2360;&#2361;&#2325;&#2366;&#2352;&#2368; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2325;&#2369;&#2335;&#2368;&#2352; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2325;&#2352;&#2375;&#2327;&#2366;\"?</span>",
    "options": [
      "<span class=\"eqt\">Article 44</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 44</span>",
      "<span class=\"eqt\">Article 49</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 49</span>",
      "<span class=\"eqt\">Article 43</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 43</span>",
      "<span class=\"eqt\">Article 42</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 42</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Article 43 is a Directive Principle of State Policy (DPSP) that directs the State to promote cottage industries in rural areas on an individual or cooperative basis.</p><p>&bull; This article aims to support self-employment, enhance rural development, and improve economic self-sufficiency.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Articles of the Indian Constitution CANNOT be suspended even during an emergency declared on the grounds of war or external aggression?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2351;&#2369;&#2342;&#2381;&#2343; &#2351;&#2366; &#2348;&#2366;&#2361;&#2352;&#2368; &#2310;&#2325;&#2381;&#2352;&#2350;&#2339; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2328;&#2379;&#2359;&#2367;&#2340; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2349;&#2368; &#2344;&#2367;&#2354;&#2306;&#2348;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Articles 15 and 17</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 15 &#2324;&#2352; 17</span>",
      "<span class=\"eqt\">Articles 20 and 21</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 20 &#2324;&#2352; 21</span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Article 20 (Protection in respect of conviction for offenses) and Article 21 (Protection of life and personal liberty) are non-suspendable even during a National Emergency under Article 359.</p><p>&bull; In the 1978 amendment, the 44th Constitutional Amendment ensured that fundamental rights under Articles 20 and 21 remain in force during emergencies.</p><p>&bull; Other rights under Part III of the Constitution can be suspended, but the right to life and liberty is inviolable.</p>",
