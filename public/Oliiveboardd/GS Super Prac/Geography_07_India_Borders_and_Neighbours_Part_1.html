<!DOCTYPE html>

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Which of the following nations is the smallest neighbour of India in terms of area?</p>",
    "options": [
      "Bangladesh",
      "Maldives",
      "Nepal",
      "Afghanistan"
    ],
    "correct_option_id": 1,
    "solution": "<p>In the options, <b>Maldives</b> is the smallest neighbour of India in terms of area.</p><p>India has nine neighbouring countries namely Afghanistan, Pakistan, China, Bhutan, Nepal, Myanmar, Bangladesh, Maldives, and Sri Lanka.</p><p>India shares its border with seven countries which are Afghanistan, Pakistan, China, Bhutan, Nepal, Myanmar, and Bangladesh.</p><p>Sri Lanka is separated from India by the Gulf of Mannar. The Maldives is located under the island of Lakshadweep in the southwest part of the Indian Ocean.</p>",
    "question_index": 0
  },
  {
    "question": "<p>What is the capital of India's neighbouring country Afghanistan?</p>",
    "options": [
      "Karachi",
      "Kathmandu",
      "Kandahar",
      "Kabul"
    ],
    "correct_option_id": 3,
    "solution": "<p>The capital of Afghanistan is <b>Kabul</b>. Kabul is the largest city of Afghanistan and is located in the eastern part of the country, in the Kabul Province.</p>",
    "question_index": 1
  },
  {
    "question": "<p>How many countries share their land borders with India?</p>",
    "options": [
      "Nine",
      "Seven",
      "Six",
      "Eight"
    ],
    "correct_option_id": 1,
    "solution": "<p>India shares land borders with <b>seven</b> countries: Pakistan, China, Nepal, Bhutan, Bangladesh, Myanmar, and Afghanistan (via Pakistan-occupied Kashmir). This accounts for India's diverse geopolitical boundaries.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Which country shares a sea-line border with India?</p>",
    "options": [
      "Maldives",
      "Philippines",
      "Fiji",
      "Pakistan"
    ],
    "correct_option_id": 0,
    "solution": "<p>The country that shares a sea-line border with India is <b>Maldives</b>. The Maldives is a tropical island nation located in the Indian Ocean, southwest of Sri Lanka and India.</p>",
    "question_index": 3
  },
  {
    "question": "<p>\"Radcliffe line\" separates India with which country?</p>",
    "options": [
      "China",
      "Pakistan",
      "Nepal",
      "Bangladesh"
    ],
    "correct_option_id": 1,
    "solution": "<p>The boundary demarcation line between India and <b>Pakistan</b> known as the Radcliffe Line came into force on 17 August 1947. The boundary line is named after Sir Cyril Radcliffe the man who had the thankless job of drawing the lines of Partition to carve out Muslim majority Pakistan from India.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Which of the following is the transboundary river between India and Pakistan?</p>",
    "options": [
      "Indus",
      "Ravi",
      "Beas",
      "Jhelum"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Indus River is a major transboundary river that flows through both India and Pakistan. It originates in Tibet, flows through India, and then into Pakistan, where it eventually empties into the Arabian Sea. The river is vital for both countries, especially for irrigation in Pakistan.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Which of the following is the official language of Afghanistan?</p>",
    "options": [
      "Uzbek",
      "Dhivehi",
      "Dari",
      "Turkmen"
    ],
    "correct_option_id": 2,
    "solution": "<p>Afghanistan has <b>two official languages</b>:</p><p>&#183; <b>Dari (Afghan Persian)</b>  -  Spoken by about <b>50%</b> of the population, serves as the lingua franca.</p><p>&#183; <b>Pashto</b>  -  The language of the Pashtun ethnic group (about <b>35%</b> speakers).</p><p>Why Not Other Options?</p><p>&#183; <b>Uzbek</b> &amp; <b>Turkmen</b>  -  Recognized <b>regional languages</b> but not official.</p><p>&#183; <b>Dhivehi</b>  -  The official language of the <b>Maldives</b>, unrelated to Afghanistan.</p><p><b>Key Note</b>: Dari is often used in government, education, and media alongside Pashto.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Where is the Gulf of Mannar located?</p>",
    "options": [
      "Between the southeastern tip of India and the western coast of Sri Lanka",
      "Between the southeastern tip of India and the eastern coast of Sri Lanka",
      "Between the southeastern tip of India and the northwestern coast of Sri Lanka",
      "Between the southeastern tip of India and the southern coast of Sri Lanka"
    ],
    "correct_option_id": 0,
    "solution": "<p>Gulf of Mannar, inlet of the Indian Ocean, is located between southeastern India and western Sri Lanka. It is bounded to the northeast by Rameswaram (island), Adam's (Rama's) Bridge (a chain of shoals), and Mannar Island. The gulf is 80 - 170 miles (130 - 275 km) wide and 100 miles (160 km) long. It receives several rivers, including the Tambraparni (India) and the Aruvi (Sri Lanka). The port of Tuticorin is on the Indian coast. The gulf is noted for its pearl banks and sacred chank (a gastropod mollusk).</p>",
    "question_index": 7
  },
  {
    "question": "<p>In which country is the 'Kachin Manaw Festival' celebrated?</p>",
    "options": [
      "Sri Lanka",
      "Myanmar",
      "Nepal",
      "Maldives"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Kachin Manaw Festival is a traditional ethnic festival celebrated in Myanmar (Burma) by the Kachin people.</p><p>&#183; It is held to mark New Year, victories in battle, and tribal unity.</p><p>&#183; The festival features traditional dances, music, and rituals performed around the Manaw poles, which are decorated with tribal symbols.</p><p>&#183; It is considered one of the most important cultural events for the Kachin people.</p><p>&#183; The Kachin community primarily resides in Kachin State, Myanmar, near the border with China and India.</p><p>Thus, the correct answer is Myanmar.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Choose the coasts that are running along the Arabian sea.</p><p>a. Northern Circars</p><p>b. Malabar</p><p>c. Konkan</p><p>d. Coromandel</p>",
    "options": [
      "Only a and c",
      "a, b and c",
      "b, c and d",
      "Only b and c"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let's identify the location of each coast:</p><p>&#183; a. Northern Circars: This coastal region is on the eastern coast of India, along the Bay of Bengal, primarily in present-day Andhra Pradesh and Odisha.</p><p>&#183; <b>b. Malabar Coast:</b> This is a stretch of India's southwestern coastline, along the Arabian Sea, primarily in Kerala and parts of Karnataka.</p><p>&#183; <b>c. Konkan Coast:</b> This is a stretch of India's western coastline, along the Arabian Sea, encompassing coastal areas of Maharashtra, Goa, and northern Karnataka.</p><p>&#183; d. Coromandel Coast: This is the southeastern coastal region of India, along the Bay of Bengal, primarily in Tamil Nadu and parts of Andhra Pradesh.</p><p>Therefore, the coasts running along the Arabian Sea are the Malabar Coast (b) and the Konkan Coast (c).</p><p><b>Further insights:</b></p><p>&#8226; India has a long coastline divided into the Western Coastal Plains (along the Arabian Sea) and the Eastern Coastal Plains (along the Bay of Bengal).</p><p>&#8226; The Western Coastal Plains are further subdivided into regions like the Kutch and Kathiawar coast (Gujarat), Konkan Coast, Kanara Coast (Karnataka), and Malabar Coast.</p><p>&#8226; The Eastern Coastal Plains include regions like the Utkal Coast (Odisha), Northern Circars, and Coromandel Coast.</p>",
    "question_index": 9
  },
  {
    "question": "<p>The 90-degree East Meridian does NOT pass through:</p>",
    "options": [
      "Bangladesh",
      "Sikkim",
      "Bhutan",
      "Meghalaya"
    ],
    "correct_option_id": 1,
    "solution": "<p>The 90 degree East Meridian passes through Bangladesh, Bhutan, and Meghalaya in India, but it does not pass through <b>Sikkim</b>. This geographical reference line helps determine the longitudinal coordinates of these regions.</p>",
    "question_index": 10
  },
  {
    "question": "<p>The New Moore Island is in geographic proximity to:</p>",
    "options": [
      "Pakistan",
      "Myanmar",
      "Bangladesh",
      "Sri Lanka"
    ],
    "correct_option_id": 2,
    "solution": "<p>New Moore Island, also known as South Talpatti Island, was a small uninhabited island in the Bay of Bengal, near the India-Bangladesh maritime border.</p><p>&#183; It emerged after the 1970 Bhola Cyclone but later submerged due to rising sea levels.</p><p>&#183; Both India and Bangladesh claimed the island, but in 2010, it disappeared underwater due to climate change.</p><p>Thus, the correct answer is Bangladesh.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Which of the following statement is correct?</p><p>I. The biggest state of India in terms of area is Uttar Pradesh.</p><p>II.Rajasthan is the state of India which have highest population among all other states of India.</p>",
    "options": [
      "Only I",
      "Neither I nor II",
      "Only II",
      "Both I and II"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Rajasthan</b> (342,239 sq km) is the largest state in India in terms of area. Rajasthan accounts for 10.4 percent of the total country's area. According to 2011 Census, <b>Uttar Pradesh</b> is the most populous state and Sikkim is the least populous state in India.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Match India's neighbouring countries in column A with their official languages in column B.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column A(Country names)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column B(Official Languages)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1)Sri Lanka</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.Mandarin</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2)China</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.Burmese</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3)Myanmar</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.Tamil</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4)Bhutan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.Dzongkha</td></tr></table>",
    "options": [
      "1-d, 2-a, 3-b, 4-c",
      "1-c, 2-a, 3-b, 4-d",
      "1-a, 2-b, 3-c, 4-d",
      "1-b, 2-a, 3-c, 4-d"
    ],
    "correct_option_id": 1,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Country</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Official Language</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Explanation</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1) Sri Lanka</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Tamil</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sri Lanka has <b>two official languages</b>: <b>Sinhala</b> and <b>Tamil</b>.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>2) China</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Mandarin</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Mandarin (also known as <b>Putonghua</b>) is the <b>official language of China</b>.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>3) Myanmar</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Burmese</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The <b>official language</b> of Myanmar is <b>Burmese</b>.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>4) Bhutan</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Dzongkha</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Dzongkha</b> is the <b>official language</b> of Bhutan.</td></tr></table><p><b>Further Insight:</b></p><p>&bull; <b>Sri Lanka</b>: While Sinhala is the majority language, Tamil is co-official and widely spoken, especially in the north and east.</p><p>&bull; <b>China</b>: Mandarin is spoken across the nation, despite many regional dialects.</p><p>&bull; <b>Myanmar</b>: Burmese is spoken by the majority and used in all official contexts.</p><p>&bull; <b>Bhutan</b>: Dzongkha is a Sino-Tibetan language unique to Bhutan.</p><p><b>Official Languages of Remaining SAARC Countries:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Country</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Official Language(s)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Afghanistan</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Pashto</b> and <b>Dari</b> (Persian dialect)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Bangladesh</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Bengali</b> (Bangla)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Nepal</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Nepali</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Pakistan</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Urdu</b> (official)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><i>Note:</i> English is also used officially and widely</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Maldives</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Dhivehi</b> (also called Maldivian)</td></tr></table>",
    "question_index": 13
  },
  {
    "question": "<p>India shares its land boundaries with which countries in the east?</p>",
    "options": [
      "China, Nepal and Bhutan",
      "Bhutan and Afghanistan",
      "Myanmar and Bangladesh",
      "Pakistan and Afghanistan"
    ],
    "correct_option_id": 2,
    "solution": "<p>India shares its land borders with seven countries. Pakistan and Afghanistan in the northwest, China , Nepal, and Bhutan in the North and <b>Myanmar and Bangladesh in the east. </b>Towards the south, India has two neighbouring island countries - Sri Lanka and Maldives.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Which is the Standard Meridian of India?</p>",
    "options": [
      "84&deg;40&#8242; E",
      "82&deg;30&#8242; E",
      "81&deg;30&#8242; E",
      "83&deg;30&#8242; E"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#8226; The Standard Meridian of India is 82&deg;30&#8242; E, which passes through Mirzapur in Uttar Pradesh.</p><p>&#8226; It is used as the basis for Indian Standard Time (IST), which is UTC+5:30.</p><p>&#8226; This helps maintain a uniform time across the entire country.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Which mountain range covers a distance of about 1500 miles (2400 km) and passes through India, Pakistan, Afghanistan, China, Bhutan, and Nepal?</p>",
    "options": [
      "Himalayan mountain range",
      "Purvanchal mountain range",
      "Aravalli mountain range",
      "Pir Panjal mountain range"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The Himalayas stretch across the north-eastern portion of India. They cover approximately 1,500 mi (2,400 km) and pass through the nations of India, Pakistan, Afghanistan, China, Bhutan and Nepal.</p><p>&bull; The Himalayan range is made up of three parallel ranges often referred to as the Greater Himalayas, the Lesser Himalayas, and the Outer Himalayas.</p>",
    "question_index": 16
  },
  {
    "question": "<p>India shares its longest land border with which of the following countries?</p>",
    "options": [
      "Bangladesh",
      "Pakistan",
      "China",
      "Nepal"
    ],
    "correct_option_id": 0,
    "solution": "<p>India shares its longest land border with <b>Bangladesh</b>. This border stretches for approximately 4,096 kilometres (about 2,545 miles). The border between India and Bangladesh is quite extensive and diverse, encompassing various geographical features such as rivers, hills, and plains.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Which of the following is in geographical proximity to Sri Lanka?</p>",
    "options": [
      "Only Karaikal",
      "Karaikal and Yanam",
      "Mahe",
      "Only Yanam"
    ],
    "correct_option_id": 0,
    "solution": "<p>Karaikal is a district of the Union Territory of Puducherry and is located on the southeastern coast of India. It is geographically closer to Sri Lanka, being situated along the Coromandel Coast of the Bay of Bengal.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Which of the following pairs do NOT share any borders?</p><p>Options:</p>",
    "options": [
      "Bhutan and Arunachal Pradesh",
      "Bhutan and Meghalaya",
      "Bhutan and West Bengal",
      "Bhutan and Assam"
    ],
    "correct_option_id": 1,
    "solution": "<p>Among the given options, Bhutan and Meghalaya do not share any borders. Bhutan shares borders with:</p><p>&#183; Arunachal Pradesh (east)</p><p>&#183; West Bengal (south)</p><p>&#183; Assam (south)</p><p>&#183; But has no common border with Meghalaya</p>",
    "question_index": 19
  }
];
    </script>
