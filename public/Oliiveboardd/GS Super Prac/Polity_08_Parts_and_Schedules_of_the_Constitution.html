<!DOCTYPE html>
<html lang="en">
<head>

    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which part of the Indian Constitution deals with the Union and its Territory? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2327; &#2360;&#2306;&#2328; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Part I</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; I</span>",
      "<span class=\"eqt\">Part II</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; II</span>",
      "<span class=\"eqt\">Part III</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; III</span>",
      "<span class=\"eqt\">Part IV</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; IV</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Part I</b> (Articles 1-4) of the Constitution deals with the Union and its territory, defining the Indian Union and its states. </p><p>&bull; <b>Part II</b> (Articles 5-11) deals with citizenship provisions. </p><p>&bull; <b>Part III</b> (Articles 12-35) enshrines the Fundamental Rights of citizens. </p><p>&bull; <b>Part IV</b> (Articles 36-51) contains the Directive Principles of State Policy. </p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part of the Constitution</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Articles Covered</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Important Articles with One-liner Details</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part I</b>: The Union and its Territory</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 1-4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 1</b>: Defines India as a Union of States.   <b>Article 3</b>: Formation of new states and alteration of areas.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part II</b>: Citizenship</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 5-11</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 5</b>: Citizenship at the commencement of the Constitution.   <b>Article 11</b>: Parliament's power to regulate citizenship by law.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part III</b>: Fundamental Rights</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 12-35</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 14</b>: Equality before law.   <b>Article 19</b>: Protection of six fundamental freedoms.   <b>Article 21</b>: Right to life and personal liberty.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part IV</b>: Directive Principles of State Policy</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 36-51</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 39</b>: Equal pay for equal work.   <b>Article 44</b>: Uniform Civil Code.   <b>Article 48A</b>: Protection of the environment.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part IVA</b>: Fundamental Duties</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Article 51A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 51A</b>: Lists the fundamental duties of citizens of India.</td></tr></table>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Fundamental Rights in the Indian Constitution are categorized under which part? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2325;&#2367;&#2360; &#2349;&#2366;&#2327; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Part II</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; II</span>",
      "<span class=\"eqt\">Part III</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; III</span>",
      "<span class=\"eqt\">Part IV</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; IV</span>",
      "<span class=\"eqt\">Part V</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; V</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Part III</b> of the Constitution covers Fundamental Rights (Articles 12-35). </p><p>&bull; <b>Part II</b> relates to citizenship. </p><p>&bull; <b>Part IV</b> discusses the Directive Principles of State Policy, which are non-justiciable rights. </p><p>&bull; <b>Part V</b> deals with the Union, including the President and Parliament. </p><p><b>Further Insight</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part of the Constitution</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Articles Covered</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Important Articles with One-liner Details</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part I</b>: The Union and its Territory</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 1-4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 1</b>: Defines India as a Union of States.   <b>Article 3</b>: Formation of new states and alteration of areas.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part II</b>: Citizenship</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 5-11</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 5</b>: Citizenship at the commencement of the Constitution.   <b>Article 11</b>: Parliament's power to regulate citizenship by law.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part III</b>: Fundamental Rights</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 12-35</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 14</b>: Equality before law.   <b>Article 19</b>: Protection of six fundamental freedoms.   <b>Article 21</b>: Right to life and personal liberty.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part IV</b>: Directive Principles of State Policy</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 36-51</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 39</b>: Equal pay for equal work.   <b>Article 44</b>: Uniform Civil Code.   <b>Article 48A</b>: Protection of the environment.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part IVA</b>: Fundamental Duties</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Article 51A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 51A</b>: Lists the fundamental duties of citizens of India.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part V</b>: The Union</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 52-151</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 52</b>: The President of India.   <b>Article 72</b>: Pardoning powers of the President.   <b>Article 123</b>: Ordinance-making power of the President.</td></tr></table>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which part of the Constitution provides for a \"Three-Tier Government\" system, with Panchayats at the village, intermediate, and district levels? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2327; \"&#2340;&#2381;&#2352;&#2367;&#2360;&#2381;&#2340;&#2352;&#2368;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352;\" &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2327;&#2381;&#2352;&#2366;&#2350;, &#2350;&#2343;&#2381;&#2351;&#2357;&#2352;&#2381;&#2340;&#2368; &#2324;&#2352; &#2332;&#2367;&#2354;&#2366; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2346;&#2306;&#2330;&#2366;&#2351;&#2340;&#2375;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Part IV</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; IV</span>",
      "<span class=\"eqt\">Part IX</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; IX</span>",
      "<span class=\"eqt\">Part X</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; X</span>",
      "<span class=\"eqt\">Part XI</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; XI</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Part IX</b> (Articles 243-243O) introduces Panchayati Raj institutions. </p><p>&bull; <b>Part IV</b> concerns the Directive Principles of State Policy. </p><p>&bull; <b>Part X</b> deals with Scheduled and Tribal Areas. </p><p>&bull; <b>Part XI</b> deals with relations between the Union and the States. </p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part of the Constitution</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Articles Covered</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Important Articles with One-liner Details</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part VI</b>: The States</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 152-237</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 154</b>: Executive power of the State.   <b>Article 213</b>: Ordinance-making power of the Governor.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part VII</b>: States in the B category</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(Repealed)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(This part dealt with provisions related to Part B states; repealed by the 7th Constitutional Amendment.)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part VIII</b>: Union Territories</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 239-242</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 239A</b>: Creation of Legislative Assemblies for Union Territories.   <b>Article 240</b>: Power of President to make regulations for certain Union Territories.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part IX</b>: Panchayats</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 243-243O</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 243</b>: Constitution and composition of Panchayats.   <b>Article 243G</b>: Powers, authority, and responsibilities of Panchayats.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part IXA</b>: Municipalities</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 243P-243ZG</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 243Q</b>: Constitution of Municipalities.   <b>Article 243W</b>: Powers and responsibilities of Municipalities.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part IXB</b>: Co-operative Societies</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 243ZH-243ZT</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 243ZI</b>: Incorporation of cooperative societies.   <b>Article 243ZL</b>: Audit of accounts of cooperative societies.</td></tr></table>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Part V of the Constitution primarily addresses which of the following? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2349;&#2366;&#2327; V &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Fundamental Duties</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Union Government</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2328; &#2360;&#2352;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">State Government</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Emergency Provisions</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354;&#2368;&#2344; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Part V</b> includes provisions for the Union Government, including the President, Vice President, and Parliament (Articles 52-151). </p><p>&bull; <b>Fundamental Duties</b> are covered under <b>Part IVA</b>. </p><p>&bull; <b>State Government</b> is dealt with in <b>Part VI</b>. </p><p>&bull; <b>Emergency Provisions</b> are covered under <b>Part XVIII</b>. </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which Schedule of the Indian Constitution contains provisions relating to languages recognized by the Constitution? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2368; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2349;&#2366;&#2359;&#2366;&#2323;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">6th Schedule</span><span class=\"hqt\" style=\"display:none\">6&#2357;&#2368;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368;</span>",
      "<span class=\"eqt\">8th Schedule</span><span class=\"hqt\" style=\"display:none\">8&#2357;&#2368;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368;</span>",
      "<span class=\"eqt\">9th Schedule</span><span class=\"hqt\" style=\"display:none\">9&#2357;&#2368;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368;</span>",
      "<span class=\"eqt\">10th Schedule</span><span class=\"hqt\" style=\"display:none\">10&#2357;&#2368;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>8th Schedule</b> lists the official languages of India. Initially, it had 14 languages, now it includes 22. </p><p>&bull; <b>6th Schedule</b> deals with the administration of Tribal Areas in Assam, Meghalaya, Tripura, and Mizoram. </p><p>&bull; <b>9th Schedule</b> deals with land reform laws and was added by the 1st Amendment in 1951. </p><p>&bull; <b>10th Schedule</b> contains provisions regarding disqualification of members on the grounds of defection. </p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Schedules deals with the allocation of seats in the Rajya Sabha? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2360;&#2368;&#2335;&#2379;&#2306; &#2325;&#2375; &#2310;&#2357;&#2306;&#2335;&#2344; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [

    "question": "<span class=\"eqt\"><p>Which part of the Indian Constitution highlights \"Federation with a Strong Centre\"? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2327; \"&#2319;&#2325; &#2350;&#2332;&#2348;&#2370;&#2340; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2306;&#2328;\" &#2346;&#2352; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2337;&#2366;&#2354;&#2340;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Part VI</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; VI</span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Part XI (Articles 245-263) deals with the relationship between the Union and States, highlighting India's quasi-federal structure with a strong central authority.</b> </p><p>&bull; <b>Part I</b> is about the Union and its Territory. </p><p>&bull; <b>Part VI</b> deals with States and their governments. </p><p>&bull; <b>Part XII</b> deals with finance, property, contracts, and suits. </p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part of the Constitution</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Articles Covered</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Important Articles with One-liner Details</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part IX</b>: Panchayats</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 243-243O</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 243</b>: Constitution and composition of Panchayats.   <b>Article 243G</b>: Powers, authority, and responsibilities of Panchayats.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part IXA</b>: Municipalities</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 243P-243ZG</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 243Q</b>: Constitution of Municipalities.   <b>Article 243W</b>: Powers and responsibilities of Municipalities.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part IXB</b>: Co-operative Societies</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 243ZH-243ZT</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 243ZI</b>: Incorporation of cooperative societies.   <b>Article 243ZL</b>: Audit of accounts of cooperative societies.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part X</b>: Scheduled and Tribal Areas</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 244-244A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 244</b>: Administration of Scheduled Areas.   <b>Article 244A</b>: Formation of autonomous states.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part XI</b>: Relations between the Union and the States</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 245-263</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 245</b>: Extent of laws made by Parliament and State Legislatures.   <b>Article 256</b>: Obligation of States and the Union.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part XII</b>: Finance, Property, Contracts, and Suits</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 264-300A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 265</b>: Taxes not to be imposed without authority of law.   <b>Article 280</b>: Finance Commission.   <b>Article 300A</b>: Right to property.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part XIII</b>: Trade, Commerce, and Intercourse</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 301-307</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 301</b>: Freedom of trade, commerce, and intercourse.   <b>Article 304</b>: Restrictions on trade and commerce among states.</td></tr></table>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Under which part does the Constitution empower Parliament to impose limits on the financial borrowing of States? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2349;&#2366;&#2327; &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2306;&#2360;&#2342; &#2325;&#2379; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2313;&#2343;&#2366;&#2352; &#2346;&#2352; &#2360;&#2368;&#2350;&#2366; &#2354;&#2327;&#2366;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    ],
    "correct_option_id": 0,

rections of the Union.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part XX</b>: Amendment of the Constitution</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Article 368</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 368</b>: Procedure for amendment of the Constitution.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part XXI</b>: Temporary, Transitional, and Special Provisions</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 369-392</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 370</b>: Special status to Jammu and Kashmir (now abrogated).   <b>Article 371</b>: Special provisions for certain states.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part XXII</b>: Short title, commencement, authoritative text in Hindi and repeals</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 393-395</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 393</b>: Short title of the Constitution.   <b>Article 395</b>: Repeals of laws inconsistent with the Constitution.</td></tr></table>",

    "question": "<span class=\"eqt\"><p>The Indian Constitution enshrines the \"Emergency Provisions\" under which part? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2349;&#2366;&#2327; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; \"&#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354;&#2368;&#2344; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;\" &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2306;?</p></span>",

    "question": "<span class=\"eqt\"><p>Which part of the Constitution deals with the amendment process of the Indian Constitution? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2327; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Part XX</b> (Article 368) lays down the process for amending the Constitution. </p><p>&bull; <b>Part XXI</b> contains Temporary, Transitional, and Special Provisions. </p><p>&bull; <b>Part XXII</b> provides for the short title, commencement, and repeal of the Constitution. </p><p>&bull; <b>Part XV</b> deals with elections. </p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part of the Constitution</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Articles Covered</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Important Articles with One-liner Details</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part XIVA</b>: Tribunals</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 323A-323B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 323A</b>: Administrative tribunals.   <b>Article 323B</b>: Tribunals for other matters.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part XV</b>: Elections</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 324-329</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 324</b>: Superintendence, direction, and control of elections vested in the Election Commission.   <b>Article 326</b>: Right to vote for all adults.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part XVI</b>: Special Provisions relating to Certain Classes</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 330-342</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 330</b>: Reservation of seats for Scheduled Castes and Scheduled Tribes in the House of the People.   <b>Article 340</b>: Appointment of a Commission to investigate the conditions of backward classes.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part XVII</b>: Official Language</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 343-351</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 343</b>: Official language of the Union.   <b>Article 348</b>: Language to be used in the Supreme Court and High Courts.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part XVIII</b>: Emergency Provisions</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 352-360</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 352</b>: Proclamation of Emergency.   <b>Article 356</b>: President's Rule.   <b>Article 360</b>: Financial Emergency.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part XIX</b>: Miscellaneous</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 361-367</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 361</b>: Protection of President and Governors from legal proceedings.   <b>Article 365</b>: Effect of failure to comply with directions of the Union.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part XX</b>: Amendment of the Constitution</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Article 368</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 368</b>: Procedure for amendment of the Constitution.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part XXI</b>: Temporary, Transitional, and Special Provisions</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 369-392</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 370</b>: Special status to Jammu and Kashmir (now abrogated).   <b>Article 371</b>: Special provisions for certain states.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Part XXII</b>: Short title, commencement, authoritative text in Hindi and repeals</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Articles 393-395</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article 393</b>: Short title of the Constitution.   <b>Article 395</b>: Repeals of laws inconsistent with the Constitution.</td></tr></table>",
