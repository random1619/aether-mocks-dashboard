    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The Cholas initially emerged as feudatories in which region after the Sangam period? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2327;&#2350; &#2325;&#2366;&#2354; &#2325;&#2375; &#2348;&#2366;&#2342; &#2330;&#2379;&#2354; &#2357;&#2306;&#2358; &#2325;&#2367;&#2360; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2360;&#2366;&#2350;&#2306;&#2340; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2313;&#2349;&#2352;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kanchi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2306;&#2330;&#2368;</span>",
      "<span class=\"eqt\">Madurai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2342;&#2369;&#2352;&#2376;</span>",
      "<span class=\"eqt\">Uraiyur</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2352;&#2312;&#2351;&#2369;&#2352;</span>",
      "<span class=\"eqt\">Tanjore</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2306;&#2332;&#2380;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The Cholas initially emerged as <b>feudatories in Uraiyur</b> after the <b>Sangam period</b> before becoming a dominant power in South India. </p><p>&#183; They became prominent in the ninth century and established an empire comprising the major portion of South India. </p><p>&#183; They also extended their sway in Sri Lanka and the Malay Peninsula. Therefore, they are called as the Imperial Cholas.</p><p>&#183; Uraiyur, near modern-day <b>Tiruchirapalli (Trichy), Tamil Nadu</b>, was an early Chola capital.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Who is considered the founder of the Imperial Chola line? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2366;&#2361;&#2368; &#2330;&#2379;&#2354; &#2357;&#2306;&#2358; &#2325;&#2366; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325; &#2325;&#2367;&#2360;&#2375; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rajaraja I</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2352;&#2366;&#2332;&#2366; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Rajendra I</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Aditya I</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2342;&#2367;&#2340;&#2381;&#2351; I</span>",
      "<span class=\"eqt\">Vijayalaya</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2332;&#2351;&#2366;&#2354;&#2351;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The Imperial Chola dynasty was founded by Vijayalaya, who captured Tanjore from the Muttaraiyars, built a temple for Durga, and his son Aditya I ended the Pallava kingdom and annexing Tondaimandalam. </p><p>&#183; Parantaka I, a notable Chola ruler, defeated the Pandyas and the ruler of Ceylon but lost to the Rashtrakutas at the Battle of Takkolam. </p><p>&#183; Parantaka I was a great builder of temples.</p><p>&#183; He also provided the vimana of the famous Nataraja temple at Chidambaram with a golden roof. </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which Pallava ruler was defeated by Aditya I, leading to the annexation of Tondaimandalam by the Cholas? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2346;&#2354;&#2381;&#2354;&#2357; &#2358;&#2366;&#2360;&#2325; &#2325;&#2379; &#2310;&#2342;&#2367;&#2340;&#2381;&#2351; &#2346;&#2381;&#2352;&#2341;&#2350; &#2344;&#2375; &#2346;&#2352;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2340;&#2379;&#2306;&#2337;&#2312;&#2350;&#2306;&#2337;&#2354;&#2350; &#2346;&#2352; &#2330;&#2379;&#2354;&#2379;&#2306; &#2325;&#2366; &#2325;&#2348;&#2381;&#2332;&#2366; &#2361;&#2379; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mahendravarman I</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2375;&#2306;&#2342;&#2381;&#2352;&#2357;&#2352;&#2381;&#2350;&#2344; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Narasimhavarman I</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2360;&#2367;&#2306;&#2361;&#2357;&#2352;&#2381;&#2350;&#2344; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Aparajita</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2352;&#2366;&#2332;&#2367;&#2340;</span>",
      "<span class=\"eqt\">Rajasimha</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2367;&#2306;&#2361;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Aditya I put an end to the Pallava kingdom by defeating Aparajita and annexed Tondaimandalam.</p><p>&#183; The early Pallava rulers from 250 A.D. to 350 A.D. issued their charters in Prakrit. This was due to their Satavahana connections.</p><p>&#183; Simhavishnu (560 - 590 CE) was the first significant Pallava ruler who expanded the kingdom by defeating the Cholas and other southern neighbors. </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which Pallava ruler assumed the title 'Vatapikonda' after defeating Pulakesin II? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2346;&#2354;&#2381;&#2354;&#2357; &#2358;&#2366;&#2360;&#2325; &#2344;&#2375; &#2346;&#2369;&#2354;&#2325;&#2375;&#2358;&#2367;&#2344; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2325;&#2379; &#2361;&#2352;&#2366;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; '&#2357;&#2366;&#2335;&#2366;&#2346;&#2368;&#2325;&#2379;&#2306;&#2337;&#2366;' &#2325;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2343;&#2366;&#2352;&#2339; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mahendravarman I</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2375;&#2306;&#2342;&#2381;&#2352;&#2357;&#2352;&#2381;&#2350;&#2344; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Narasimhavarman I</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2360;&#2367;&#2306;&#2361;&#2357;&#2352;&#2381;&#2350;&#2344; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Paramesvaravarman I</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2375;&#2358;&#2381;&#2357;&#2352;&#2357;&#2352;&#2381;&#2350;&#2344; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Rajasimha</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2367;&#2306;&#2361;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Narasimhavarman I (630 - 668 CE) defeated Pulakesin II, captured Badami, and took the title Vatapikonda (Conqueror of Vatapi). </p><p>Further insights:</p><p>List of some Pallava kings and their various titles:</p><p>&#183; <b>Mahendravarman I</b> (600  -  630 A.D.):</p><p>o <b>Gunabhara</b></p><p>o <b>Satyasandha</b></p><p>o <b>Chettakari</b> (builder of temples)</p><p>o <b>Chitrakarapuli</b></p><p>o <b>Vichitrachitta</b></p><p>o <b>Mattavilasa</b></p><p>&#183; <b>Narasimhavarman I</b> (630 - 668 A.D.):</p><p>o <b>Mamalla</b> (great wrestler)</p><p>o <b>Vatapikonda</b> (conqueror of Vatapi)</p><p>&#183; <b>Narasimhavarman II</b> or <b>Rajasimha</b> (695 - 722 A.D.):</p><p>o <b>Sankarabhakta</b></p><p>o <b>Vadhyavidyadhara</b></p><p>o <b>Agamapriya</b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Kanchi was the capital city of which South Indian dynasty? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2306;&#2330;&#2368; &#2325;&#2367;&#2360; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358; &#2325;&#2368; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cholas</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2379;&#2354;</span>",
      "<span class=\"eqt\">Pandyas</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2306;&#2337;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Pallavas</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2354;&#2381;&#2354;&#2357;</span>",
      "<span class=\"eqt\">Cheras</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2375;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>After the Sangam Age, the Kalabhra dynasty ruled the Tamil country for about 250 years, followed by the <b>Pallavas</b> who established their kingdom in Tondaimandalam with Kanchipuram as their capital, until Tondaimandalam was annexed by the Imperial Cholas in the early 10th century AD. </p><p>Further information:</p><p>&#183; The early Pallava rulers from 250 A.D. to 350 A.D. issued their charters in Prakrit. Important among them were Sivaskandavarman and Vijayaskandavarman. </p><p>&#183; The second line of Pallava rulers who ruled between 350 A.D. and 550 A.D. issued their charters in Sanskrit. The most important ruler of this line was Vishnugopa who was defeated by Samudragupta during his South Indian expedition. </p><p>&#183; The rulers of the third line who ruled from 575 A.D. to their ultimate fall in the ninth century issued their charters both in Sanskrit and Tamil. </p><p>&#183; Simhavishnu was the first ruler of this line. He destroyed the Kalabhras and firmly established the Pallava rule in Tondaimandalam. He also defeated the Cholas and extended the Pallava territory up to the river Kaveri. </p><p>&#183; Other great Pallava rulers of this line were Mahendravarman I, Narasimhavarman I, and Narasimhavarman II. </p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which Chola king's naval expedition reached its climax, leading to control over the Malabar and Coromandal coasts? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2330;&#2379;&#2354; &#2352;&#2366;&#2332;&#2366; &#2325;&#2366; &#2344;&#2380;&#2360;&#2376;&#2344;&#2367;&#2325; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; &#2309;&#2346;&#2344;&#2375; &#2330;&#2352;&#2350;&#2379;&#2340;&#2381;&#2325;&#2352;&#2381;&#2359; &#2346;&#2352; &#2346;&#2361;&#2369;&#2306;&#2330;&#2366;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2350;&#2366;&#2354;&#2366;&#2348;&#2366;&#2352; &#2324;&#2352; &#2325;&#2379;&#2352;&#2379;&#2350;&#2306;&#2337;&#2354; &#2340;&#2335;&#2379;&#2306; &#2346;&#2352; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2310;?</p></span>",
    "options": [
      "<span class=\"eqt\">Parantaka I</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2306;&#2340;&#2325; I</span>",
      "<span class=\"eqt\">Rajaraja I</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2352;&#2366;&#2332;&#2366; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Rajendra I</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Kulottunga I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2354;&#2379;&#2340;&#2381;&#2340;&#2369;&#2306;&#2327;&#2366; I</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The naval achievements of the Tamils reached their climax under the Cholas, and they controlled the Malabar and Coromandal coasts. This was particularly significant during the reign of Rajendra I, who undertook a famous naval expedition to Kadaram.</p><p>Further information:</p><p>&#183; Vijayalaya captured Tanjore and built a temple for Durga. </p><p>&#183; Rajaraja I completed the construction of the famous Brihadeeswarar Temple at Tanjore.</p><p>&#183; Rajendra I assumed the title 'Gangaikondan' after his North Indian expedition and founded the city of Gangaikondacholapuram.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is/are true about Rajaraja Chola? </p><p>a. He constructed the Brihadeeswara Temple at Tanjore. </p><p>b. He annexed northern Sri Lanka and shifted its capital to Polanaruva. </p><p>c. Rajaraja assumed a number of titles like Mummidi Chola, Jayankonda and</p><p>Sivapadasekara </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2352;&#2366;&#2332;&#2366; &#2330;&#2379;&#2354; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>a. &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2340;&#2306;&#2332;&#2380;&#2352; &#2350;&#2375;&#2306; &#2348;&#2371;&#2361;&#2342;&#2375;&#2358;&#2381;&#2357;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2352;&#2366;&#2351;&#2366;&#2404;</p><p>b. &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2358;&#2381;&#2352;&#2368;&#2354;&#2306;&#2325;&#2366; &#2346;&#2352; &#2325;&#2348;&#2381;&#2332;&#2366; &#2325;&#2352; &#2354;&#2367;&#2351;&#2366; &#2324;&#2352; &#2311;&#2360;&#2325;&#2368; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2346;&#2379;&#2354;&#2344;&#2366;&#2352;&#2369;&#2357;&#2366; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352; &#2342;&#2368;&#2404;</p><p>c. &#2352;&#2366;&#2332;&#2352;&#2366;&#2332;&#2366; &#2344;&#2375; &#2350;&#2369;&#2350;&#2381;&#2350;&#2367;&#2337;&#2368; &#2330;&#2379;&#2354;, &#2332;&#2351;&#2344;&#2325;&#2379;&#2306;&#2337;&#2366; &#2324;&#2352; &#2332;&#2376;&#2360;&#2368; &#2325;&#2312; &#2313;&#2346;&#2366;&#2343;&#2367;&#2351;&#2366;&#2305; &#2343;&#2366;&#2352;&#2339; &#2325;&#2368;&#2306;&#2404;</p><p>&#2358;&#2367;&#2357;&#2346;&#2342;&#2358;&#2375;&#2326;&#2352;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>It was under Rajaraja I and his son Rajendra I that the Chola power reached its highest point of glory.</p><p>&#183; The invasion of Sri Lanka which was entrusted to his son Rajendra I. As the Sri Lankan king Mahinda V fled away from his country, the Cholas annexed the northern Sri Lanka. </p><p>&#183; The capital was shifted from Anuradhapura to Polanaruva where a Shiva temple was built.</p><p>&#183; Later Mahinda V, the king of Sri Lanka attempted to recover from the Cholas the northern part of Ceylon. Rajendra I defeated him and seized the southern Sri Lanka. Thus the whole of Sri Lanka was made part of the Chola Empire under Rajendra I.</p><p>&#183; Rajaraja's last military achievement was a naval expedition against the Maldive Islands which were conquered.</p><p>&#183; By these conquests, the extent of the Chola empire under Rajaraja I included the Pandya, Chera and the Tondaimandalam regions of Tamil Nadu and the Gangavadi, Nolambapadi and the Telugu Choda territories in the Deccan and the northern part of Ceylon and the Maldive Islands beyond India. </p><p>&#183; Rajaraja assumed a number of titles like Mummidi Chola, Jayankonda and</p><p>Sivapadasekara. </p><p>&#183; He was a devout follower of Saivism. He completed the construction of the famous Rajarajeswara temple or Brihadeeswara temple at Tanjore in 1010 A.D.</p><p>&#183; He also helped in the construction of a Buddhist monastery at Nagapattinam.</p><p>Further information:</p><p>List of some Chola kings and their various titles:</p><p>&#183; <b>Rajaraja I</b>:</p><p>o <b>Mummidi Chola</b></p><p>o <b>Jayanconda</b></p><p>o <b>Sivapadasekara</b></p><p>&#183; <b>Rajendra I</b> (1012 - 1044 A.D.):</p><p>o <b>Mudikondan</b></p><p>o <b>Gangaikondan</b> - This title was assumed after his successful North Indian expedition.</p><p>o <b>Kadarankondan</b> - This title was likely assumed after his naval expedition to Kadaram (Sri Vijaya).</p><p>o <b>Pandita Cholan</b></p><p>&#183; <b>Kulottunga I</b>:</p><p>o While the source doesn't explicitly list titles assumed by him, it mentions that he <b>earned the title Sungam Tavirtta Cholan</b> for abolishing tolls. This translates to \"the Chola who abolished tolls\".</p>",

    "question": "<span class=\"eqt\"><p>Match the Chola administrative terms with their meanings: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column A (Terms)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column B(Meanings)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A.Mandalam</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.Village Assembly</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B.Sabha</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.Province</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C.Kudavolai</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.Land revenue department</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Puravuvarithinaikkalam</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.Lottery system for committee selection</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2379;&#2354; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;&#2367;&#2325; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2309;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A (&#2358;&#2348;&#2381;&#2342;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B (&#2309;&#2352;&#2381;&#2341;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A.&#2350;&#2306;&#2337;&#2354;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.&#2327;&#2381;&#2352;&#2366;&#2350; &#2360;&#2349;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B.&#2360;&#2349;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.&#2346;&#2381;&#2352;&#2366;&#2306;&#2340;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2368;.&#2325;&#2369;&#2342;&#2366;&#2357;&#2379;&#2354;&#2366;&#2312;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.&#2349;&#2370;&#2350;&#2367; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2367;&#2349;&#2366;&#2327;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2337;&#2368;. &#2346;&#2369;&#2352;&#2366;&#2357;&#2369;&#2357;&#2352;&#2367;&#2341;&#2367;&#2344;&#2366;&#2311;&#2325;&#2381;&#2325;&#2354;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.&#2360;&#2350;&#2367;&#2340;&#2367; &#2330;&#2351;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2354;&#2377;&#2335;&#2352;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">A-ii, B-i, C-iv, D-iii</span><span class=\"hqt\" style=\"display:none\">A-ii, B-i, C-iv, D-iii</span>",
      "<span class=\"eqt\">A-iii, B-iv, C-i, D-ii</span><span class=\"hqt\" style=\"display:none\">A-iii, B-iv, C-i, D-ii</span>",

    "correct_option_id": 0,
    "solution": "<p>&#183; The Chola Empire was divided into <i>mandalams</i>, and each <i>mandalam</i> was further divided into <i>valanadus</i> and <i>nadus</i>.</p><p>&#183; The system of village autonomy with <i>sabhas</i> and their committees developed significantly during the Chola rule.</p><p>&#183; In the inscriptions at Uttiramerur, which are mentioned as giving a detailed account of village administration under the Cholas, are historically known to describe a system where members for village committees were selected through a lottery system called <i>Kudavolai</i>.</p><p>&#183; The land revenue department was well organized and was called <i>puravuvarithinai kkalam</i>.</p><p>Further information:</p><p>Here is a gist of other administrative and revenue terms from the Chola period:</p><p><b>Administrative Divisions:</b></p><p>&#183; Below the <i>mandalam</i> (province), the Chola Empire was divided into <b>valanadus</b> and <b>nadus</b>.</p><p>&#183; In each <i>nadu</i>, there were a number of <b>autonomous villages</b>.</p><p>&#183; A <b>town</b> was known as a <b>nagaram</b> and was under the administration of a council called <b>nagarattar</b>.</p><p>&#183; The <i>valanadu</i> was under a <b>periyanattar</b>, and the <i>nadu</i> was under a <b>nattar</b>.</p><p><b>Military Administration Terms:</b></p><p>&#183; The Cholas maintained a regular standing army comprising elephants, cavalry, infantry, and a navy.</p><p>&#183; The royal troops were called <b>Kaikkolaperumpadai</b>.</p><p>&#183; Within this, there was a personal troop to defend the king known as <b>Velaikkarar</b>.</p><p>&#183; Military cantonments called <b>kadagams</b> existed.</p><p><b>Revenue Terms:</b></p><p>&#183; The land revenue department was well organized and called <b>puravuvarithinaikkalam</b>.</p><p>&#183; All lands were carefully surveyed and classified for the assessment of revenue.</p><p>&#183; The residential portion of the village was called <b>ur nattam</b>.</p><p>&#183; Lands belonging to temples were <b>exempted from tax</b>.</p><p>&#183; Besides land revenue, there were <b>tolls and customs</b> on goods taken from one place to another.</p><p>&#183; Various kinds of <b>professional taxes</b> were levied.</p><p>&#183; <b>Dues were levied on ceremonial occasions</b> like marriages and <b>judicial fines</b> were also a source of revenue.</p><p><b>Officials:</b></p><p>&#183; There was an elaborate administrative machinery comprising various officials called <b>perundanam</b> and <b>sirudanam</b>.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about the Pallavas:</p><p>a. The monolithic <i>rathas</i> at Mamallapuram were erected during the reign of Mahendravarman I. </p><p>b. Hieun Tsang visited the Pallava capital Kanchipuram during the rule of Narasimhavarman I. </p><p>c. The Pallavas issued their earliest inscriptions primarily in Tamil.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2354;&#2381;&#2354;&#2357;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2350;&#2366;&#2350;&#2354;&#2381;&#2354;&#2346;&#2369;&#2352;&#2350; &#2350;&#2375;&#2306; &#2309;&#2326;&#2306;&#2337; &#2352;&#2341; &#2350;&#2361;&#2375;&#2306;&#2342;&#2381;&#2352;&#2357;&#2352;&#2381;&#2350;&#2344; &#2346;&#2381;&#2352;&#2341;&#2350; &#2325;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2348;&#2344;&#2366;&#2319; &#2327;&#2319; &#2341;&#2375;&#2404;</p><p>b. &#2344;&#2352;&#2360;&#2367;&#2306;&#2361;&#2357;&#2352;&#2381;&#2350;&#2344; &#2346;&#2381;&#2352;&#2341;&#2350; &#2325;&#2375; &#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2361;&#2381;&#2357;&#2375;&#2344; &#2340;&#2381;&#2360;&#2366;&#2306;&#2327; &#2344;&#2375; &#2346;&#2354;&#2381;&#2354;&#2357;&#2379;&#2306; &#2325;&#2368; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2325;&#2366;&#2306;&#2330;&#2368;&#2346;&#2369;&#2352;&#2350; &#2325;&#2366; &#2342;&#2380;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>c. &#2346;&#2354;&#2381;&#2354;&#2357;&#2379;&#2306; &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340;&#2368; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2340;&#2350;&#2367;&#2354; &#2350;&#2375;&#2306; &#2332;&#2366;&#2352;&#2368; &#2325;&#2367;&#2319; &#2341;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Statement a is incorrect</b> Narasimhavarman I was the founder of Mamallapuram and the monolithic <i>rathas</i> were erected during his reign. It was Narasimhavarman I, also known as Mamalla, who is credited with these monuments, not Mahendravarman I.</p><p>&#183; During reign of Narasimhavarman I, Hiuen Tsang visited the Pallava capital Kanchipuram.</p><p>&#183; <b>Statement c is incorrect. </b>The Pallavas issued their earlier inscriptions in Prakrit and Sanskrit because of their Satavahana connections. They later issued charters in both Sanskrit and Tamil.</p><p>Therefore, only statement b is correct.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct regarding the architectural contributions of the Pallavas and Cholas? </p><p>I. The Brihadeeswarar Temple at Tanjore is an example of Pallava architecture. </p><p>II. The Pallavas introduced the art of excavating rock-cut temples.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2346;&#2354;&#2381;&#2354;&#2357;&#2379;&#2306; &#2324;&#2352; &#2330;&#2379;&#2354;&#2379;&#2306; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2346;&#2340;&#2381;&#2351; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2340;&#2306;&#2332;&#2380;&#2352; &#2325;&#2366; &#2348;&#2371;&#2361;&#2342;&#2375;&#2358;&#2381;&#2357;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352; &#2346;&#2354;&#2381;&#2354;&#2357; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2354;&#2366; &#2325;&#2366; &#2319;&#2325; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;&#2404;</p><p>II. &#2346;&#2354;&#2381;&#2354;&#2357;&#2379;&#2306; &#2344;&#2375; &#2330;&#2335;&#2381;&#2335;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2325;&#2366;&#2335;&#2325;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2368; &#2325;&#2354;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>The Big Temple at Tanjore was built by the Chola king Rajaraja I</b>. It is also known as the <b>Rajarajeswara temple or Brihadeeswarar temple at Tanjore</b>. Therefore, the Brihadeeswarar Temple is an example of <b>Chola architecture</b>, not Pallava architecture. Thus, Statement I is incorrect.</p><p>&#183; T<b>he Pallavas introduced the art of excavating temples from the rock</b>. <b>Mahendravarman I introduced the rock-cut temples</b>. Thus, Statement II is correct.</p><p>&#183; The 'Open Art Gallery' at Mamallapuram with sculptures like the 'Descent of the Ganges' showcases the sculptural beauty of the Pallava period.</p>",
    "question_index": 9
  },

    "solution": "<p><b>Mahendravarman I (600  -  630 A.D.)</b> assumed several titles, including <b>Chettakari (builder of temples).</b></p><p>Narasimhavarman I was also known as Mamalla, which means 'great wrestler'. He was the founder of Mamallapuram.</p><p>Further insights:</p><p>List of some Pallava kings and their various titles:</p><p>&#183; <b>Mahendravarman I</b> (600  -  630 A.D.):</p><p>o <b>Gunabhara</b></p><p>o <b>Satyasandha</b></p><p>o <b>Chettakari</b> (builder of temples)</p><p>o <b>Chitrakarapuli</b></p><p>o <b>Vichitrachitta</b></p><p>o <b>Mattavilasa</b></p><p>&#183; <b>Narasimhavarman I</b> (630 - 668 A.D.):</p><p>o <b>Mamalla</b> (great wrestler)</p><p>o <b>Vatapikonda</b> (conqueror of Vatapi)</p><p>&#183; <b>Narasimhavarman II</b> or <b>Rajasimha</b> (695 - 722 A.D.):</p><p>o <b>Sankarabhakta</b></p><p>o <b>Vadhyavidyadhara</b></p><p>o <b>Agamapriya</b></p>",

    "correct_option_id": 0,
    "solution": "<p>&#183; Narasimhavarman I attacked the Chalukya kingdom, defeated Pulakesin II and destroyed the capital city of Vatapi. Narasimhavarman I assumed the title 'Vatapikonda'\".</p><p>&#183; Mahendravarman I authored the Sanskrit work Mattavilasa Prahasanam\".</p><p>&#183; Narasimhavarman II (or Rajasimha) is the ruler during whose reign the \"Shore temple at Mamallapuram was built. It remains the finest examples of the early structural temples of the Pallavas.</p><p>&#183; Simhavishnu was the first major ruler of this line. He destroyed the Kalabhras and firmly established the Pallava rule in Tondaimandalam.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which Chola inscription provides detailed accounts of village administration, including the nomination of ward members? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2330;&#2379;&#2354; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326; &#2357;&#2366;&#2352;&#2381;&#2337; &#2360;&#2342;&#2360;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2344;&#2366;&#2350;&#2366;&#2306;&#2325;&#2344; &#2360;&#2361;&#2367;&#2340; &#2327;&#2381;&#2352;&#2366;&#2350; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2371;&#2340; &#2357;&#2367;&#2357;&#2352;&#2339; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tanjore inscription</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2306;&#2332;&#2380;&#2352; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326;</span>",
      "<span class=\"eqt\">Gangaikondacholapuram inscription</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2327;&#2376;&#2325;&#2379;&#2339;&#2381;&#2337;&#2330;&#2379;&#2354;&#2346;&#2369;&#2352;&#2350; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326;</span>",
      "<span class=\"eqt\">Uttiramerur inscriptions</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2367;&#2352;&#2366;&#2350;&#2375;&#2352;&#2369;&#2352; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326;</span>",
      "<span class=\"eqt\">Nagapattinam inscription</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2327;&#2346;&#2335;&#2381;&#2335;&#2367;&#2344;&#2350; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The two famous Uttiramerur inscriptions give a detailed account of the village administration under the Cholas, including the qualifications and disqualifications for ward membership. These inscriptions belong to the reign of Parantaka I.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Pallava ruler with the architectural style they are associated with:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Pallava Ruler</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Architectural Style</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Mahendravarman I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Structural Temples</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Narasimhavarman I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Rock-cut Temples</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Rajasimha</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Monolithic Rathas</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2354;&#2381;&#2354;&#2357; &#2358;&#2366;&#2360;&#2325; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2313;&#2360; &#2360;&#2381;&#2341;&#2366;&#2346;&#2340;&#2381;&#2351; &#2358;&#2376;&#2354;&#2368; &#2360;&#2375; &#2325;&#2352;&#2375;&#2306; &#2332;&#2367;&#2360;&#2360;&#2375; &#2357;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2361;&#2376;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2346;&#2354;&#2381;&#2354;&#2357; &#2358;&#2366;&#2360;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2358;&#2367;&#2354;&#2381;&#2346; &#2358;&#2376;&#2354;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2350;&#2361;&#2375;&#2306;&#2342;&#2381;&#2352;&#2357;&#2352;&#2381;&#2350;&#2344; &#2346;&#2381;&#2352;&#2341;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2350;&#2306;&#2342;&#2367;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2344;&#2352;&#2360;&#2367;&#2306;&#2361;&#2357;&#2352;&#2381;&#2350;&#2344; &#2346;&#2381;&#2352;&#2341;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2330;&#2335;&#2381;&#2335;&#2366;&#2344; &#2325;&#2366;&#2335;&#2325;&#2352; &#2348;&#2344;&#2366;&#2319; &#2327;&#2319; &#2350;&#2306;&#2342;&#2367;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2352;&#2366;&#2332;&#2360;&#2367;&#2306;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2309;&#2326;&#2306;&#2337; &#2352;&#2341;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i &rarr; a, ii &rarr; b, iii &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; b, iii &rarr; c</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; c, iii &rarr; a</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; c, iii &rarr; a</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; a, iii &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; a, iii &rarr; b</span>",
      "<span class=\"eqt\">i &rarr; a, ii &rarr; c, iii &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; c, iii &rarr; b</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Mahendravarman I introduced the rock-cut temples</b> and was a great builder of cave temples. His style of Pallava temples is seen at places like Mandagappattu, Mahendravadi, and Mamandur.</p><p>&#183; <b>Narasimhavarman I was the founder of Mamallapuram and the monolithic <i>rathas</i> were erected during his reign</b>. The five <i>rathas</i>, popularly called the Panchapandava <i>rathas</i>, signify different styles of temple architecture.</p><p>&#183; <b>Rajasimha introduced the structural temples</b>. Examples of these early structural temples from his reign include the <b>Shore Temple at Mamallapuram</b> and the <b>Kailasanatha temple at Kanchipuram</b>, which are considered the finest examples.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which Chola ruler sent a large embassy of 72 merchants to China? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2330;&#2379;&#2354; &#2358;&#2366;&#2360;&#2325; &#2344;&#2375; 72 &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2319;&#2325; &#2348;&#2337;&#2364;&#2366; &#2342;&#2370;&#2340;&#2366;&#2357;&#2366;&#2360; &#2330;&#2368;&#2344; &#2349;&#2375;&#2332;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rajaraja I</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2352;&#2366;&#2332;&#2366; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Rajendra I</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Kulottunga I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2354;&#2379;&#2340;&#2381;&#2340;&#2369;&#2306;&#2327;&#2366; I</span>",
      "<span class=\"eqt\">Rajadhiraja I</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2366;&#2343;&#2367;&#2352;&#2366;&#2332; &#2346;&#2381;&#2352;&#2341;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Kulottunga I sent a large embassy of 72 merchants to China and maintained cordial relations with the kingdom of Sri Vijaya.</p><p>&#183; Under Kulottunga III the central authority became weak. The rise of the feudatories like the Kadavarayas and the emergence of the Pandya power as a challenge to Chola supremacy contributed to the ultimate downfall of the Chola Empire. </p><p>&#183; Rajendra III was the last Chola king who was defeated by Jatavarman Sundarapandya II. The Chola country was absorbed into the Pandya Empire.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>The division of the Chola Empire into mandalam, valanadu, and nadu represents which aspect of their administration? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2379;&#2354; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2350;&#2306;&#2337;&#2354;&#2350;, &#2357;&#2354;&#2344;&#2366;&#2337;&#2369; &#2324;&#2352; &#2344;&#2366;&#2337;&#2369; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2313;&#2344;&#2325;&#2375; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2346;&#2361;&#2354;&#2370; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;? </p></span>",
    "options": [
      "<span class=\"eqt\">Military administration</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2376;&#2344;&#2381;&#2351; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;</span>",
      "<span class=\"eqt\">Revenue administration</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;</span>",
      "<span class=\"eqt\">Provincial administration</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2306;&#2340;&#2368;&#2351; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;</span>",
      "<span class=\"eqt\">Judicial administration</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Provincial administration:</b></p><p>&#183; The Chola Empire was divided into mandalams and each mandalam into valanadus and nadus. In each nadu there were a number of autonomous villages. </p><p>&#183; The royal princes or officers were in charge of mandalams. </p><p>&#183; The valanadu was under periyanattar and nadu under nattar. </p><p>&#183; The town was known as nagaram and it was under the administration of a council called nagarattar.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Mahendravarman I, a Pallava ruler, was initially a follower of which religion before converting to Saivism? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2354;&#2381;&#2354;&#2357; &#2358;&#2366;&#2360;&#2325; &#2350;&#2361;&#2375;&#2306;&#2342;&#2381;&#2352;&#2357;&#2352;&#2381;&#2350;&#2344; &#2346;&#2381;&#2352;&#2341;&#2350; &#2358;&#2376;&#2357; &#2343;&#2352;&#2381;&#2350; &#2309;&#2346;&#2344;&#2366;&#2344;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2325;&#2367;&#2360; &#2343;&#2352;&#2381;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2351;&#2366;&#2351;&#2368; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Buddhism</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2342;&#2381;&#2343; &#2343;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Jainism</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2376;&#2344; &#2343;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Vaishnavism</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2376;&#2359;&#2381;&#2339;&#2357;</span>",
      "<span class=\"eqt\">Ajivika</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2332;&#2368;&#2357;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Mahendravarman I was a follower of Jainism in the early part of his career. He was converted to Saivism by the influence of the Saiva saint, Thirunavukkarasar alias Appar. </p><p>&#183; He built a Siva temple at Tiruvadi.</p><p>&#183; He assumed a number of titles like Gunabhara, Satyasandha, Chettakari (builder of temples) Chitrakarapuli, Vichitrachitta and Mattavilasa.</p><p>&#183; He had also authored the Sanskrit work Mattavilasa Prahasanam. His title Chitrakarapuli reveals his talents in painting. </p><p>&#183; He is also regarded as an expert in music. The music inscription at Kudumianmalai is ascribed to him.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>The famous Sanskrit scholar Dandin adorned the court of which Pallava ruler? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340; &#2357;&#2367;&#2342;&#2381;&#2357;&#2366;&#2344; &#2342;&#2339;&#2381;&#2337;&#2367;&#2344; &#2325;&#2367;&#2360; &#2346;&#2354;&#2381;&#2354;&#2357; &#2358;&#2366;&#2360;&#2325; &#2325;&#2375; &#2342;&#2352;&#2348;&#2366;&#2352; &#2325;&#2368; &#2358;&#2379;&#2349;&#2366; &#2348;&#2338;&#2364;&#2366;&#2340;&#2375; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mahendravarman I</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2375;&#2306;&#2342;&#2381;&#2352;&#2357;&#2352;&#2381;&#2350;&#2344; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Narasimhavarman I</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2360;&#2367;&#2306;&#2361;&#2357;&#2352;&#2381;&#2350;&#2344; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Narasimhavarman II (Rajasimha)</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2360;&#2367;&#2306;&#2361;&#2357;&#2352;&#2381;&#2350;&#2344; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; (&#2352;&#2366;&#2332;&#2360;&#2367;&#2350;&#2381;&#2361;&#2366;)</span>",
      "<span class=\"eqt\">Nandivarman II</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2306;&#2342;&#2368;&#2357;&#2352;&#2381;&#2350;&#2344; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The famous Sanskrit scholar Dandin is said to have adorned the court of Narasimhavarman II (Rajasimha).</p><p>&#183; Narasimhavarman I was succeeded by Mahendravarman II and Parameswarvarman I and the Pallava  -  Chalukya conflict continued during their reign. </p><p>&#183; Thereafter, Narasimhavarman II became the ruler of the Pallava kingdom. </p><p>&#183; He was also known as Rajasimha. </p><p>&#183; His regime was peaceful and he evinced more interest in developing the art and architecture. </p><p>&#183; The Shore temple at Mamallapuram and the Kailasanatha temple at Kanchipuram were built in this period. </p><p>&#183; He was also a great patron of art and letters. The famous Sanskrit scholar Dandin is said to have adorned his court. </p><p>&#183; He sent embassies to China and the maritime trade flourished during his reign. Rajasimha assumed titles like Sankarabhakta, Vadhyavidyadhara and Agamapriya. </p><p>&#183; He was succeeded by Parameswaravarman II and Nandivarman II. The Pallava rule lasted till the end of the ninth century A.D. </p><p>&#183; The Chola king Aditya I defeated the last Pallava ruler Aparajita and seized the Kanchi region. With this, the rule of Pallava dynasty came to an end.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct about the administration of the Pallavas? </p><p>I. The king provided land-grants to the temple known as Devadana and also to the Brahmans known as Brahmadeya. </p><p>II. The Brahmadeya and Devadhana lands were exempted from tax. </p><p>III. The Pallava state was divided into Kottams.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2346;&#2354;&#2381;&#2354;&#2357;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2352;&#2366;&#2332;&#2366; &#2344;&#2375; &#2342;&#2375;&#2357;&#2342;&#2366;&#2344; &#2344;&#2366;&#2350;&#2325; &#2350;&#2306;&#2342;&#2367;&#2352; &#2324;&#2352; &#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2342;&#2375;&#2351; &#2344;&#2366;&#2350;&#2325; &#2348;&#2381;&#2352;&#2366;&#2361;&#2381;&#2350;&#2339;&#2379;&#2306; &#2325;&#2379; &#2349;&#2370;&#2350;&#2367;-&#2309;&#2344;&#2369;&#2342;&#2366;&#2344; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>II. &#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2342;&#2375;&#2351; &#2324;&#2352; &#2342;&#2375;&#2357;&#2342;&#2366;&#2344; &#2325;&#2368; &#2349;&#2370;&#2350;&#2367; &#2325;&#2379; &#2325;&#2352; &#2360;&#2375; &#2350;&#2369;&#2325;&#2381;&#2340; &#2352;&#2326;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>III. &#2346;&#2354;&#2381;&#2354;&#2357; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2379;&#2335;&#2381;&#2335;&#2350; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only I and II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">All I, II and III</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Administration of the Pallavas </p><p>&#183; The Pallavas had a well organized administrative system. </p><p>&#183; The Pallava state was divided into Kottams. The Kottam was administered by officers appointed by the king. The king was at the centre of administration in which he was assisted by able ministers. He was the fountain of justice. He maintained a well-trained army. </p><p>&#183; He provided land-grants to the temple known as Devadana and also to the Brahmans known as Brahmadeya. </p><p>&#183; It was also the responsibility of the central government to provide irrigation facilities to the lands. </p><p>&#183; A number of irrigation tanks were dug by the Pallava kings. The irrigation tanks at Mahendravadi and Mamandur were dug during the reign of Mahendravarman I. </p><p>&#183; Detailed information on the tax system could also be traced from the Pallava inscriptions. Land tax was the primary source of the government revenue. </p><p>&#183; The Brahmadeya and Devadhana lands were exempted from tax. </p><p>&#183; Traders and artisans such as carpenters, goldsmiths, washer-men, oil-pressers and weavers paid taxes to the government. </p><p>&#183; The Pallava inscriptions throw much light on the village assemblies called sabhas and their committees. They maintained records of all village lands, looked after local affairs and managed temples.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>The decline of the Chola Empire was significantly contributed to by the rise of which feudatories and powers? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2379;&#2354; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2346;&#2340;&#2344; &#2350;&#2375;&#2306; &#2325;&#2367;&#2344; &#2360;&#2366;&#2350;&#2306;&#2340;&#2379;&#2306; &#2324;&#2352; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2313;&#2342;&#2351; &#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chalukyas and Rashtrakutas</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2354;&#2369;&#2325;&#2381;&#2351; &#2324;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2325;&#2370;&#2335;</span>",
      "<span class=\"eqt\">Pallavas and Pandyas</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2354;&#2381;&#2354;&#2357; &#2324;&#2352; &#2346;&#2366;&#2306;&#2337;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Kadavarayas and Pandya power</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2342;&#2357;&#2352;&#2366;&#2351; &#2324;&#2352; &#2346;&#2366;&#2306;&#2337;&#2381;&#2351; &#2358;&#2325;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Cheras and Gangas</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2375;&#2352; &#2324;&#2352; &#2327;&#2306;&#2327;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Under Kulottunga III, the central authority became weak. The rise of the feudatories like the Kadavarayas and the emergence of the Pandya power as a challenge to Chola supremacy contributed to the ultimate downfall of the Chola Empire.</p><p>Simhavishnu's court hosted Bharavi, author of *Kiratarjuniya*. </p><p>Velaikkarar* were the king's trusted bodyguards. </p>",
    "question_index": 19
  }
];
