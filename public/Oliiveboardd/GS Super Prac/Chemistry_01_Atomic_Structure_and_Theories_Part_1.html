<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">10</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">10 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

        </div>
    </div>
    
    <!-- Main Exam Interface -->

        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>

                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>What is the relative charge of a proton and neutron?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2379;&#2335;&#2377;&#2344; &#2324;&#2352; &#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344; &#2325;&#2366; &#2360;&#2366;&#2346;&#2375;&#2325;&#2381;&#2359; &#2310;&#2357;&#2375;&#2358; (&#2352;&#2367;&#2354;&#2375;&#2335;&#2367;&#2357; &#2330;&#2366;&#2352;&#2381;&#2332;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">-1 and +1 respectively</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2350;&#2358;&#2307; -1 &#2324;&#2352; +1</span>",
      "<span class=\"eqt\">+1 and -1 respectively</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2350;&#2358;&#2307; +1 &#2324;&#2352; -1</span>",
      "<span class=\"eqt\">+1 and 0 respectively</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2350;&#2358;&#2307; +1 &#2324;&#2352; 0</span>",
      "<span class=\"eqt\">-1 and 0 respectively</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2350;&#2358;&#2307; -1 &#2324;&#2352; 0</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Relative charge of a proton is <b>+1</b>.</p><p>Relative charge of an electron is  - 1.</p><p>Relative charge of a neutron is <b>0</b>.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The members of a family of an element that all have the same number of protons, but different numbers of neutrons are called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2340;&#2340;&#2381;&#2340;&#2381;&#2357; &#2325;&#2375; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2325;&#2375; &#2357;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351; &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2379;&#2335;&#2377;&#2344; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2349;&#2367;&#2344;&#2381;&#2344;-&#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2354;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">isotopes</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325;/&#2310;&#2311;&#2360;&#2379;&#2335;&#2379;&#2346;</span>",
      "<span class=\"eqt\">&#8201;isotrones</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2311;&#2360;&#2379;&#2335;&#2381;&#2352;&#2379;&#2344;</span>",
      "<span class=\"eqt\">isobars&#8201;</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2342;&#2366;&#2348; &#2352;&#2375;&#2326;&#2366;/&#2310;&#2311;&#2360;&#2379;&#2348;&#2352;&#2381;&#2360;</span>",
      "<span class=\"eqt\">isotones</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344;/&#2310;&#2311;&#2360;&#2379;&#2335;&#2379;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Isotopes</b> are members of a family of an element that all have the same number of protons but different numbers of neutrons.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What is the atomic number of nitrogen?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2325;&#2368; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;/&#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Atomic number of nitrogen is 7</b>, which means each nitrogen atom has 7 protons. Its element symbol is N. Nitrogen is odourless, tasteless, and colourless gas at room temperature and pressure.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Hydrogen resembles the properties of which two groups of the periodic table?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2325;&#2375; &#2325;&#2367;&#2344; &#2342;&#2379; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2325;&#2375; &#2327;&#2369;&#2339;&#2379;&#2306; &#2325;&#2375; &#2360;&#2342;&#2371;&#2358; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Group 2 and group 17</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 2 &#2324;&#2352; &#2360;&#2350;&#2370;&#2361; 17</span>",
      "<span class=\"eqt\">Group 1 and group 3</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 1 &#2324;&#2352; &#2360;&#2350;&#2370;&#2361; 3</span>",
      "<span class=\"eqt\">Group 1 and group 17</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 1 &#2324;&#2352; &#2360;&#2350;&#2370;&#2361; 17</span>",
      "<span class=\"eqt\">Group 2 and group 4</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 2 &#2324;&#2352; &#2360;&#2350;&#2370;&#2361; 4</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The position of hydrogen is not fixed in the periodic table, sometimes it is placed with alkali metals in 1<sup>st</sup> group and sometimes with halogens in the 17<sup>th</sup> group as it resembles with alkali metal metals as well as with halogens.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The signs of charges of electron, proton and neutron are __________, respectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;, &#2346;&#2381;&#2352;&#2379;&#2335;&#2377;&#2344; &#2324;&#2352; &#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344; &#2325;&#2375; &#2310;&#2357;&#2375;&#2358; &#2325;&#2375; &#2330;&#2367;&#2361;&#2381;&#2344; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; __________ &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">negative, neutral and positive,</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325;, &#2340;&#2335;&#2360;&#2381;&#2341; &#2324;&#2352; &#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325;,</span>",
      "<span class=\"eqt\">negative, positive and neutral,</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325;, &#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2324;&#2352; &#2340;&#2335;&#2360;&#2381;&#2341;,</span>",
      "<span class=\"eqt\">neutral, positive and negative,</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2335;&#2360;&#2381;&#2341;, &#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2324;&#2352; &#2344;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325;,</span>",
      "<span class=\"eqt\">positive, negative and neutral,</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325;, &#2344;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2324;&#2352; &#2340;&#2335;&#2360;&#2381;&#2341;,</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The charges of the subatomic particles are:</p><p>&#183; Electron: Negatively charged (-1 elementary charge)</p><p>&#183; Proton: Positively charged (+1 elementary charge)</p><p>&#183; Neutron: No charge (neutral)</p><p>Therefore, the signs of charges of electron, proton, and neutron are <b>negative, positive, and neutral</b>, respectively.</p><p><b>Further insights:</b></p><p>&#8226; Electrons are found orbiting the nucleus of an atom.</p><p>&#8226; Protons and neutrons are found within the nucleus of an atom.</p><p>&#8226; The magnitude of the charge on an electron and a proton is the same (elementary charge, approximately 1.602  X  10&#8315;&#185;&#8313; coulombs), but their signs are opposite.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What is the atomicity of Phosphorus?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2360;&#2381;&#2347;&#2379;&#2352;&#2360; &#2325;&#2368; &#2346;&#2352;&#2350;&#2366;&#2339;&#2381;&#2357;&#2367;&#2325;&#2340;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Poly-atomic</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2369;&#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2325;</span>",
      "<span class=\"eqt\">Monoatomic</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2325;</span>",
      "<span class=\"eqt\">Diatomic</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2325;</span>",
      "<span class=\"eqt\">Tetra-atomic</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2335;&#2381;&#2352;&#2366;-&#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2325;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Phosphorus typically exists in a <b>Tetra-atomic</b> state, with four atoms of phosphorus bound together in its most common molecular form. This arrangement gives phosphorus its characteristic properties and reactivity in various chemical reactions.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In Newlands' Octaves, the properties of lithium and ________ were found to be the same.</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2354;&#2376;&#2306;&#2337;&#2381;&#2360; &#2325;&#2375; &#2309;&#2359;&#2381;&#2335;&#2325; &#2350;&#2375;&#2306; &#2354;&#2367;&#2341;&#2367;&#2351;&#2350; &#2324;&#2352; ________ &#2325;&#2375; &#2327;&#2369;&#2339; &#2360;&#2350;&#2366;&#2344; &#2346;&#2366;&#2319; &#2327;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">Sodium</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Aluminium</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2351;&#2369;&#2350;&#2368;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Magnesium</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2327;&#2344;&#2368;&#2358;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Beryllium</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2368;&#2352;&#2379;&#2332;&#2364;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Newlands' Law of Octaves (1864) stated that every eighth element in increasing atomic mass showed similar properties.</p><p>&bull; According to this pattern, lithium (Li) and sodium (Na), which are both alkali metals, shared similar chemical properties.</p><p>&bull; This was an early attempt to classify elements before Mendeleev's periodic table.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the number of electrons found in the outermost shell of halogen.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2376;&#2354;&#2379;&#2332;&#2344; &#2325;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2366;&#2361;&#2352;&#2368; &#2325;&#2379;&#2358; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2346;&#2361;&#2330;&#2366;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>",
      "<span class=\"eqt\">One</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;</span>",
      "<span class=\"eqt\">Five</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2305;&#2330;</span>",
      "<span class=\"eqt\">Seven</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2340;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Halogens are elements belonging to Group 17 of the periodic table (e.g., Fluorine, Chlorine, Bromine, Iodine, Astatine). They are characterized by having <b>seven</b> electrons in their outermost electron shell (valence shell). Their general electron configuration for the valence shell is ns&#178;np&#8309;.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; Two: Elements with two valence electrons are typically alkaline earth metals (Group 2) or Helium (a noble gas).</p><p>&#8226; One: Elements with one valence electron are alkali metals (Group 1) or Hydrogen.</p><p>&#8226; Five: Elements with five valence electrons belong to Group 15 (e.g., Nitrogen, Phosphorus).</p><p><b>Further insights:</b></p><p>&#8226; Having seven valence electrons makes halogens highly reactive nonmetals. They tend to gain one electron to achieve a stable octet configuration (like noble gases), forming negatively charged ions (anions) with a -1 charge (e.g., F&#8315;, Cl&#8315;).</p><p>&#8226; They readily form compounds with metals (ionic salts) and with other nonmetals (covalent compounds).</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Protium, deuterium and tritium are the naturally occurring isotopes of:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2379;&#2335;&#2367;&#2351;&#2350;, &#2337;&#2381;&#2351;&#2370;&#2335;&#2375;&#2352;&#2367;&#2351;&#2350; &#2324;&#2352; &#2335;&#2381;&#2352;&#2367;&#2335;&#2367;&#2351;&#2350; _______ &#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2366;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">gold</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2354;&#2381;&#2337;</span>",
      "<span class=\"eqt\">hydrogen</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">nitrogen</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">carbon</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Protium, deuterium and tritium are the naturally occurring isotopes of <b>Hydrogen</b> element. Each isotope of hydrogen is made up of only one proton, but these isotopes differ in the number of neutrons the atoms contain. The extra neutrons make the isotopes heavier: deuterium is twice as heavy as ordinary hydrogen (sometimes called protium), while tritium is three times as heavy.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which element in the modern periodic table has the same number of valence electrons as that of caesium?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2340;&#2340;&#2381;&#2357; &#2350;&#2375;&#2306; &#2360;&#2306;&#2351;&#2379;&#2332;&#2325;&#2340;&#2366; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2368;&#2332;&#2364;&#2367;&#2351;&#2350; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;?</p></span>",
    "options": [
