  {
    "question": "<span class=\"eqt\"><p>The Assam government observed the birthday of ________ on 31 March 2023, as Students Day in the state.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2360;&#2350; &#2360;&#2352;&#2325;&#2366;&#2352; 31 &#2350;&#2366;&#2352;&#2381;&#2330; 2023 &#2325;&#2379; ________ &#2325;&#2375; &#2332;&#2344;&#2381;&#2350;&#2342;&#2367;&#2344; &#2325;&#2379; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2331;&#2366;&#2340;&#2381;&#2352; &#2342;&#2367;&#2357;&#2360; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2319;&#2327;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Bodofa Upendra Nath Brahma</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2379;&#2337;&#2379;&#2347;&#2366; &#2313;&#2346;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352; &#2344;&#2366;&#2341; &#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Biraj Kumar Sarma</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2352;&#2366;&#2332; &#2325;&#2369;&#2350;&#2366;&#2352; &#2358;&#2352;&#2381;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Prafulla Kumar Mahanta</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2347;&#2369;&#2354;&#2381;&#2354; &#2325;&#2369;&#2350;&#2366;&#2352; &#2350;&#2361;&#2306;&#2340;</span>",
      "<span class=\"eqt\">Bhrigu Kumar Phukan</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2371;&#2327;&#2369; &#2325;&#2369;&#2350;&#2366;&#2352; &#2347;&#2369;&#2325;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The Assam government observed the birthday of <b>Bodofa Upendra Nath Brahma</b> on 31 March 2023, as Students Day in the state.</p><p>&#183; Upendra Nath Brahma was a prominent Bodo leader who advocated for the rights and recognition of the Bodo people in Assam. </p><p>&#183; He is often referred to as \"Bodofa\" (Father of the Bodos). </p><p>&#183; The Assam government's decision to observe his birthday as Students Day recognizes his significant contributions and leadership.</p>",
    "question_index": 0

  {
    "question": "<span class=\"eqt\"><p>When was the International Day for Elder Persons 2021 celebrated?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2306;&#2340;&#2352;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2357;&#2371;&#2342;&#2381;&#2343;&#2332;&#2344; &#2342;&#2367;&#2357;&#2360; 2021 &#2325;&#2348; &#2350;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 October</span><span class=\"hqt\" style=\"display:none\">1 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;</span>",
      "<span class=\"eqt\">3 October</span><span class=\"hqt\" style=\"display:none\">3 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;</span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>The International Day for Elder Persons in 2021 was celebrated on <b>October 1st.</b> This annual observance aims to raise awareness about the challenges and issues faced by elderly individuals worldwide, highlighting the importance of their contributions to society and advocating for their rights and well-being.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In which year did Narendra Modi propose to celebrate a day for yoga as 'International Day of Yoga' while speaking at the United Nations General Assembly?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2350;&#2361;&#2366;&#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2348;&#2379;&#2354;&#2340;&#2375; &#2361;&#2369;&#2319; &#2358;&#2381;&#2352;&#2368;. &#2344;&#2352;&#2375;&#2306;&#2342;&#2381;&#2352; &#2350;&#2379;&#2342;&#2368; &#2344;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2351;&#2379;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2342;&#2367;&#2344; '&#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2351;&#2379;&#2327; &#2342;&#2367;&#2357;&#2360;' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2344;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2352;&#2326;&#2366; &#2341;&#2366;?</p></span>",

    ],
    "correct_option_id": 3,

    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following was the chief guest of India's first Republic Day in 1950?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; 1950 &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2327;&#2339;&#2340;&#2306;&#2340;&#2381;&#2352; &#2342;&#2367;&#2357;&#2360; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2309;&#2340;&#2367;&#2341;&#2367; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rana Abdul Hamid</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2339;&#2366; &#2309;&#2348;&#2381;&#2342;&#2369;&#2354; &#2361;&#2366;&#2350;&#2367;&#2342;</span>",
      "<span class=\"eqt\">Georgy Zhukov</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2377;&#2352;&#2381;&#2332;&#2368; &#2333;&#2369;&#2325;&#2379;&#2357;</span>",
      "<span class=\"eqt\">Sukarno</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2325;&#2352;&#2381;&#2339;&#2379;</span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Sukarno</b>, the first President of Indonesia, was the <b>chief guest at India's first Republic Day celebrations on 26 January 1950</b>. </p><p>&#183; This marked a significant diplomatic gesture, as both countries had recently gained independence (India in 1947, Indonesia in 1945) and were founding members of the Non-Aligned Movement.</p><p><b>Further insight:</b></p><p>&#183; <b>Rana Abdul Hamid</b>  -  A Pakistani military officer, irrelevant to the 1950 event.</p><p>&#183; <b>Georgy Zhukov</b>  -  Soviet Marshal; first Soviet chief guest in <b>1955</b>, not 1950.</p><p>&#183; <b>Queen Elizabeth</b>  -  First British monarch to attend R-Day in <b>1961</b> (as Queen of the UK and Commonwealth; India had already removed the British monarch as head of state by 1950).</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>When is the statehood day of Tripura observed?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2381;&#2352;&#2367;&#2346;&#2369;&#2352;&#2366; &#2325;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351;&#2340;&#2381;&#2357; &#2342;&#2367;&#2357;&#2360; &#2325;&#2348; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3 October</span><span class=\"hqt\" style=\"display:none\">3 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;</span>",
      "<span class=\"eqt\">12 March</span><span class=\"hqt\" style=\"display:none\">12 &#2350;&#2366;&#2352;&#2381;&#2330;</span>",
      "<span class=\"eqt\">21 January</span><span class=\"hqt\" style=\"display:none\">21 &#2332;&#2344;&#2357;&#2352;&#2368;</span>",
      "<span class=\"eqt\">21 February</span><span class=\"hqt\" style=\"display:none\">21 &#2347;&#2352;&#2357;&#2352;&#2368;</span>"

    "correct_option_id": 2,
    "solution": "<p>Statehood Day is celebrated every year as Manipur, Meghalaya, and Tripura on <b>January 21</b> as they attained statehood under the North Eastern Region (Reorganization) Act of 1971. Earlier before the north-eastern region was turned into seven sisters with the statehood of Manipur, Tripura, Meghalaya, Assam, Mizoram, Arunachal Pradesh, and Nagaland, the North Eastern composition consisted of Assam plains from the old Assam Province, the hill districts, and the North Eastern Frontier Tracts (NEFT) of the North-Eastern borderland.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In India, Teachers' Day is celebrated annually on September 5 to mark the birthday of:</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2358;&#2367;&#2325;&#2381;&#2359;&#2325; &#2342;&#2367;&#2357;&#2360; &#2346;&#2381;&#2352;&#2340;&#2367;&#2357;&#2352;&#2381;&#2359; 5 &#2360;&#2367;&#2340;&#2306;&#2348;&#2352; &#2325;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2375; &#2332;&#2344;&#2381;&#2350;&#2342;&#2367;&#2344; &#2325;&#2375; &#2313;&#2346;&#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</span>",
    "options": [
      "<span class=\"eqt\">APJ Abdul Kalam</span><span class=\"hqt\" style=\"display:none\">&#2319;.&#2346;&#2368;.&#2332;&#2375;. &#2309;&#2348;&#2381;&#2342;&#2369;&#2354; &#2325;&#2354;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Sardar Vallabhbhai Patel</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2342;&#2366;&#2352; &#2357;&#2354;&#2381;&#2354;&#2349;&#2349;&#2366;&#2312; &#2346;&#2335;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Sarvepalli Radhakrishnan</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2357;&#2346;&#2354;&#2381;&#2354;&#2368; &#2352;&#2366;&#2343;&#2366;&#2325;&#2371;&#2359;&#2381;&#2339;&#2344;</span>",
      "<span class=\"eqt\">Subhas Chandra Bose</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2349;&#2366;&#2359; &#2330;&#2306;&#2342;&#2381;&#2352; &#2348;&#2379;&#2360;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Teachers' Day is celebrated on September 5 in India to honor Dr. Sarvepalli Radhakrishnan, a great scholar, philosopher, and the second President of India.</p><p>&#183; When his students wanted to celebrate his birthday, he suggested that instead of celebrating his birthday, the day should be dedicated to teachers.</p><p>&#183; The first Teachers' Day was celebrated in 1962.</p><p>Other options:</p><p>&#183; APJ Abdul Kalam - Missile Man of India, his birthday (October 15) is celebrated as World Students' Day.</p><p>&#183; Sardar Vallabhbhai Patel - Iron Man of India, his birthday (October 31) is observed as National Unity Day.</p><p>&#183; Subhas Chandra Bose - Freedom fighter, his birthday (January 23) is observed as Parakram Diwas.</p><p>Hence, option (3) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Gurpurab is celebrated to commemorate the birthday of Guru Nanak Dev Ji. He was the _________ guru of Sikhs?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2352;&#2369;&#2346;&#2352;&#2381;&#2357; &#2327;&#2369;&#2352;&#2369; &#2344;&#2366;&#2344;&#2325; &#2342;&#2375;&#2357; &#2332;&#2368; &#2325;&#2375; &#2332;&#2344;&#2381;&#2350;&#2342;&#2367;&#2344; &#2325;&#2375; &#2313;&#2346;&#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2361; &#2360;&#2367;&#2326;&#2379;&#2306; &#2325;&#2375; _________ &#2327;&#2369;&#2352;&#2369; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Second</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2370;&#2360;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Third</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2360;&#2352;&#2366;</span>",
      "<span class=\"eqt\">First</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2361;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Fourth</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2380;&#2341;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Guru Nanak Dev Ji</b> (1469 - 1539) was the <b>founder of Sikhism</b> and the <b>first of the ten Sikh Gurus</b>.</p><p>&#183; <b>Gurpurab</b> (or Guru Nanak Jayanti) is celebrated to commemorate his birth anniversary.</p><p>&#183; He laid the foundation of Sikh teachings, emphasizing <b>equality, devotion to God, and honest living</b>.</p><p>Further information:</p><p>&#183; <b>Second</b>  -  Guru Angad Dev Ji was the second Sikh Guru.</p><p>&#183; <b>Third</b>  -  Guru Amar Das Ji was the third Sikh Guru.</p><p>&#183; <b>Fourth</b>  -  Guru Ram Das Ji was the fourth Sikh Guru.</p>",
    "question_index": 6
  },
  {

    "options": [

      "<span class=\"eqt\">31 October</span><span class=\"hqt\" style=\"display:none\">31 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;</span>",
      "<span class=\"eqt\">9 August</span><span class=\"hqt\" style=\"display:none\">9 &#2309;&#2327;&#2360;&#2381;&#2340;</span>",

    "correct_option_id": 3,
    "solution": "<p>International Day for the Preservation of the Ozone Layer is celebrated on <b>September 16 </b>designed by the United Nations General Assembly. This designation had been made on December 19, 2000, in commemoration of the date, in 1987, on which nations signed the Montreal Protocol on Substances that Deplete the Ozone Layer.</p>",

  {
    "question": "<span class=\"eqt\"><p>The birthday of ________ is celebrated as the International Day of Non-Violence.</p></span><span class=\"hqt\" style=\"display:none\">___________ &#2325;&#2366; &#2332;&#2344;&#2381;&#2350;&#2342;&#2367;&#2344; &#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2309;&#2361;&#2367;&#2306;&#2360;&#2366; &#2342;&#2367;&#2357;&#2360; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
