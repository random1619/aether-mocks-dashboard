<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>

                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Articles 245 to 255 in Part XI of the Indian Constitution deal with the ____________.</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2349;&#2366;&#2327; XI &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 245 &#2360;&#2375; 255 ____________ &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">Emergency provisions</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354;&#2368;&#2344; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Financial relations between the Centre and the states</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2360;&#2306;&#2348;&#2306;&#2343;</span>",
      "<span class=\"eqt\">Legislative relations between the Centre and the states</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2367;&#2343;&#2366;&#2351;&#2368; &#2360;&#2306;&#2348;&#2306;&#2343;</span>",
      "<span class=\"eqt\">Tribunals</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2367;&#2325;&#2352;&#2339;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Articles 245 to 255 in Part XI of the Indian Constitution deal with legislative relations between the Centre and the States. These articles define the extent of laws made by Parliament and state legislatures, including the distribution of legislative powers under the Union List, State List, and Concurrent List.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article of the Indian Constitution mentions that a person may be appointed as the Governor of two or more states?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2350;&#2375;&#2306; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2361;&#2376; &#2325;&#2367; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2342;&#2379; &#2351;&#2366; &#2309;&#2343;&#2367;&#2325; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 153</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 153</span>",
      "<span class=\"eqt\">Article 152</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 152</span>",
      "<span class=\"eqt\">Article 151</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 151</span>",
      "<span class=\"eqt\">Article 150</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 150</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Article 153</b> of the Indian Constitution states: \"Governors of States. - There shall be a Governor for each State: Provided that nothing in this article shall prevent the appointment of the same person as Governor for two or more States.\"</p><p>The proviso allowing the same person to be appointed as Governor for two or more States was added by the 7th Constitutional Amendment Act, 1956.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; Article 152: Contains the definition of \"State\" for the purposes of Part VI of the Constitution (which deals with The States), unless the context otherwise requires.</p><p>&#8226; Article 151: Deals with Audit reports of the Union and the States.</p><p>&#8226; Article 150: Deals with the Form of accounts of the Union and of the States.</p><p><b>Further insights:</b></p><p>&#8226; When a person is appointed as Governor for two or more States, their emoluments and allowances are allocated among the States in such proportion as the President may by order determine (Article 158(3A)).</p><p>&#8226; This provision allows for flexibility in gubernatorial appointments.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following subject matters with their concerned Articles.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>a</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>b</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Superintendence, direction, and control of elections to be vested in an Election commission.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A) Article 329</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Power of parliament to make provisions with respect to election to legislature.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B) Article 324</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Bar of interference by courts in electoral matters.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C) Article 327</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2367;&#2359;&#2351;-&#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2360;&#2375; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>a</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>b</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2344;&#2379;&#2306; &#2325;&#2375; &#2309;&#2343;&#2368;&#2325;&#2381;&#2359;&#2339;, &#2344;&#2367;&#2342;&#2375;&#2358;&#2344; &#2324;&#2352; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2319;&#2325; &#2330;&#2369;&#2344;&#2366;&#2357; &#2310;&#2351;&#2379;&#2327; &#2350;&#2375;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2379;&#2344;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A) &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 329</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2357;&#2367;&#2343;&#2366;&#2344;-&#2350;&#2306;&#2337;&#2354;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2313;&#2346;&#2348;&#2306;&#2343; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2360;&#2342; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B) &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 324</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2344; &#2360;&#2306;&#2348;&#2306;&#2343;&#2368; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2325;&#2375; &#2361;&#2360;&#2381;&#2340;&#2325;&#2381;&#2359;&#2375;&#2346; &#2325;&#2366; &#2357;&#2352;&#2381;&#2332;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C) &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 327</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">1-A, 2-B, 3-C</span><span class=\"hqt\" style=\"display:none\">1-A, 2-B, 3-C</span>",
      "<span class=\"eqt\">1-A, 2-C, 3-B</span><span class=\"hqt\" style=\"display:none\">1-A, 2-C, 3-B</span>",
      "<span class=\"eqt\">1-C, 2-B, 3-A</span><span class=\"hqt\" style=\"display:none\">1-C, 2-B, 3-A</span>",
      "<span class=\"eqt\">1-B, 2-C, 3-A</span><span class=\"hqt\" style=\"display:none\">1-B, 2-C, 3-A</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Article 324 grants the Election Commission the authority to oversee and manage the electoral process.</p><p>Article 327 confers upon Parliament the power to enact laws pertaining to the conduct of elections to the legislatures.</p><p>Article 329 establishes limitations on judicial interference in electoral matters, maintaining the autonomy of the electoral process.</p><p>Hence, correct combination is 1-B, 2-C, 3-A.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The total number of fundamental duties provided by the constitution of India is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2319; &#2327;&#2319; &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; ___ &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">29</span><span class=\"hqt\" style=\"display:none\">29</span>",
      "<span class=\"eqt\">32</span><span class=\"hqt\" style=\"display:none\">32</span>",
      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Constitution of India was framed by a Constituent Assembly set up under the Cabinet Mission Plan of 1946. Originally ten fundamental duties were listed. Later on, by virtue of the 86th Constitution the Amendment in 2002, <b>11th duty</b> was added.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>How many languages are included in the Eighth Schedule of the Constitution of India as scheduled languages?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2368; &#2310;&#2336;&#2357;&#2368;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2349;&#2366;&#2359;&#2366;&#2319;&#2305; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2349;&#2366;&#2359;&#2366;&#2323;&#2306; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>",
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Eighth Schedule</b> of the <b>Constitution of India</b> originally included <b>14 languages</b>. Over time, through various constitutional amendments, the number has increased to <b>22 scheduled languages</b>.</p><p>These include: Assamese, Bengali, Gujarati, Hindi, Kannada, Kashmiri, Konkani, Malayalam, Manipuri, Marathi, Nepali, Oriya, Punjabi, Sanskrit, Sindhi, Tamil, Telugu, Urdu, Bodo, Santhali, Maithili, and Dogri.</p><p>The 92nd Constitutional Amendment Act, 2003 added <b>Bodo</b>, <b>Santhali</b>, <b>Maithili</b>, and <b>Dogri</b> as the most recent additions.</p><p>So, currently, <b>22 languages</b> are recognized as <b>scheduled languages</b> under the Eighth Schedule.</p><p>&#183; <b>Original (1950)</b>: 14 languages.</p><p>&#183; <b>Current (2024)</b>: <b>22 languages</b> (last addition: <b>Bodo, Dogri, Maithili, Santhali</b> in 2003).</p><p>&#183; <b>Recent demands</b>: Include <b>Tulu, Rajasthani, Bhojpuri</b>.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>As per article 158, the Governor shall NOT be a member of either House of Parliament or of a House of the Legislature of any State specified in ________ Schedule</p></span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 158 &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2360;&#2342;&#2344; &#2351;&#2366; ________ &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2342;&#2367;&#2359;&#2381;&#2335; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354; &#2325;&#2375; &#2360;&#2342;&#2344; &#2325;&#2366; &#2360;&#2342;&#2360;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2327;&#2366;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">Seventh</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2340;&#2357;&#2368;&#2306;</span>",
      "<span class=\"eqt\">Fifth</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2306;&#2330;&#2357;&#2366;&#2306;</span>",
      "<span class=\"eqt\">First</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2361;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Third</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2360;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>According to Article 158(1):</p><p>\"The Governor shall not be a member of either House of Parliament or a House of the Legislature of any State specified in the First Schedule.\"</p><p>If a person who is already a member of the Parliament or State Legislature is appointed as a Governor, they are deemed to have vacated their seat upon assuming office.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which part of the Indian Constitution deals with the election of the Vice President?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2327; &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2330;&#2369;&#2344;&#2366;&#2357; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Part IV</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; IV</span>",
      "<span class=\"eqt\">Part III</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; III</span>",
      "<span class=\"eqt\">Part VI</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; VI</span>",
      "<span class=\"eqt\">Part V</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; V</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The election of the Vice President of India is governed by Article 63 to Article 71 under Part V of the Indian Constitution. According to Article 66, the Vice President is elected by an electoral college consisting of members of both houses of Parliament using a proportional representation system through a single transferable vote.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article of the Indian Constitution mentions that 'The Council of Ministers shall be collectively responsible to the Legislative Assembly of the state'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2350;&#2375;&#2306; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2361;&#2376; &#2325;&#2367; '&#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2346;&#2352;&#2367;&#2359;&#2342; &#2360;&#2366;&#2350;&#2370;&#2361;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2313;&#2340;&#2381;&#2340;&#2352;&#2342;&#2366;&#2351;&#2368; &#2361;&#2379;&#2327;&#2368;'?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 164(3)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 164(3)</span>",
      "<span class=\"eqt\">Article 164(1)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 164(1)</span>",
      "<span class=\"eqt\">Article 164(2)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 164(2)</span>",
      "<span class=\"eqt\">Article 164(4)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 164(4)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Article 164(2)</b> of the Indian Constitution states: \"The Council of Ministers shall be collectively responsible to the Legislative Assembly of the State.\" This establishes the principle of parliamentary accountability for the state government.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; Article 164(3): Requires the Governor to administer the oaths of office and secrecy to a Minister before he enters upon his office.</p><p>&#8226; Article 164(1): Deals with the appointment of the Chief Minister by the Governor and other Ministers by the Governor on the advice of the Chief Minister. It also mentions that Ministers hold office during the pleasure of the Governor. Provisos to this clause deal with tribal welfare ministers and limits on the size of the council of ministers.</p><p>&#8226; Article 164(4): States that a Minister who for any period of six consecutive months is not a member of the Legislature of the State shall at the expiration of that period cease to be a Minister.</p><p><b>Further insights:</b></p><p>&#8226; Collective responsibility means that the entire state Council of Ministers is responsible for all its decisions and actions. If the Legislative Assembly passes a no-confidence motion, the entire ministry must resign.</p><p>&#8226; This principle is analogous to Article 75(3) for the Union Council of Ministers' responsibility to the Lok Sabha.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following parts of the Indian Constitution is commonly referred to as the 'Magna Carta of India'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2349;&#2366;&#2327; &#2325;&#2379; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; '&#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2350;&#2376;&#2327;&#2381;&#2344;&#2366; &#2325;&#2366;&#2352;&#2381;&#2335;&#2366;' &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Part III</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; III</span>",
      "<span class=\"eqt\">Part I</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; I</span>",
      "<span class=\"eqt\">Part IV</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; IV</span>",
      "<span class=\"eqt\">Part II</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Part III</b> of the Indian Constitution, which deals with Fundamental Rights, is commonly referred to as the 'Magna Carta of India'. The Magna Carta was a charter of rights agreed to by King John of England in 1215, and it is considered a foundational document for constitutional liberties.</p><p><b>Explanation of Other Options:</b></p><p><b>&#8226; </b>Part I: Deals with \"The Union and its Territory.\"</p><p><b>&#8226; </b>Part IV: Deals with \"Directive Principles of State Policy.\"</p><p><b>&#8226; </b>Part II: Deals with \"Citizenship.\"</p><p><b>Further insights:</b></p><p>&#8226; The Fundamental Rights enshrined in Part III (Articles 12 to 35) guarantee basic human rights to all citizens of India, and in some cases, to non-citizens as well.</p><p>&#8226; These rights are justiciable, meaning they are enforceable by courts.</p><p>&#8226; They include rights such as the Right to Equality, Right to Freedom, Right against Exploitation, Right to Freedom of Religion, Cultural and Educational Rights, and Right to Constitutional Remedies.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which part of the Constitution deals with the Panchayats?</p></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2327; &#2346;&#2306;&#2330;&#2366;&#2351;&#2340;&#2379;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Part IV</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; IV</span>",
      "<span class=\"eqt\">Part IX</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; IX</span>",
      "<span class=\"eqt\">Part VII</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; VII</span>",
      "<span class=\"eqt\">Part X</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; X</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Part IX of the Indian Constitution (Articles 243-243O) deals with the Panchayati Raj system. It was introduced through the 73rd Constitutional Amendment Act, 1992, which established a three-tier local governance structure in rural areas.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>_________ Fundamental Duties were added in Part-IV of the Constitution under Article 51-A in the year 1976 through the 42nd Constitutional Amendment.</p><p>Options:</p></span><span class=\"hqt\" style=\"display:none\">________ &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2357;&#2352;&#2381;&#2359; 1976 &#2350;&#2375;&#2306; 42&#2357;&#2375;&#2306; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 51-&#2319; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2349;&#2366;&#2327;-IV &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</span>",
    "options": [
      "<span class=\"eqt\">Eight</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2336;</span>",
      "<span class=\"eqt\">Ten</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2360;</span>",
      "<span class=\"eqt\">Twelve</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2352;&#2361;</span>",
      "<span class=\"eqt\">Nine</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2380;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The 42nd Constitutional Amendment Act (1976) introduced Ten Fundamental Duties under Article 51-A in Part IV-A of the Indian Constitution. These duties were inspired by the Soviet Constitution and were later increased to Eleven through the 86th Constitutional Amendment Act (2002), which added the duty of parents to provide education to their children.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Articles 52 to 78 in Part V of the Indian Constitution deal with __________.</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2349;&#2366;&#2327; V &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 52 &#2360;&#2375; 78 __________ &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">Finance Commission of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2357;&#2367;&#2340;&#2381;&#2340; &#2310;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">Union Executive</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2328; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2367;&#2339;&#2368;</span>",
      "<span class=\"eqt\">Amendment of the Constitution</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344;</span>",
      "<span class=\"eqt\">National emergency</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Articles 52 to 78 of the Indian Constitution deal with the Union Executive, which includes:</p><p>&bull; President (Article 52-62)</p><p>&bull; Vice-President (Article 63-71)</p><p>&bull; Prime Minister and Council of Ministers (Article 74-75)</p><p>&bull; Attorney General of India (Article 76)</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>In May 2023, the Supreme Court of India granted couples the right to get divorce on the grounds of 'irretrievable breakdown of marriage' under ______ of the Indian Constitution.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2312; 2023 &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2344;&#2375; &#2332;&#2379;&#2337;&#2364;&#2379;&#2306; &#2325;&#2379; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; ______ &#2325;&#2375; &#2340;&#2361;&#2340; '&#2357;&#2367;&#2357;&#2366;&#2361; &#2325;&#2375; &#2309;&#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;&#2368;&#2351; &#2335;&#2370;&#2335;&#2344;&#2375;' &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2340;&#2354;&#2366;&#2325; &#2354;&#2375;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Article 142(1)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 142(1)</span>",
      "<span class=\"eqt\">Article 132(1)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 132(1)</span>",
      "<span class=\"eqt\">Article 122(1)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 122(1)</span>",
      "<span class=\"eqt\">Article 152(1)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 152(1)</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; In <b>May 2023</b>, the <b>Supreme Court of India</b> held that it can grant <b>divorce on the grounds of \"irretrievable breakdown of marriage\"</b> by exercising its <b>extraordinary powers</b> under <b>Article 142(1)</b> of the Constitution.</p><p><b>Article 142(1): </b>Empowers the Supreme Court to <b>pass any decree or order necessary for doing complete justice</b> in any case before it.</p><p>&#183; This provision allows the Court to dissolve a marriage <b>even if specific grounds are not met under the Hindu Marriage Act or other personal laws</b>, provided that reconciliation is impossible.</p><p><b>Further Insight</b>:</p><p>&#183; This ruling expanded divorce grounds beyond the Hindu Marriage Act, allowing courts to dissolve marriages where reconciliation is impossible.</p><p>&#183; <b>Article 132(1):</b> Deals with appellate jurisdiction of the Supreme Court in constitutional matters.</p><p>&#183; <b>Article 122(1):</b> Relates to courts not inquiring into parliamentary proceedings.</p><p>&#183; <b>Article 152(1):</b> Defines the term \"State\" for Part VI (not related to judiciary or marriage).</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article in the Fundamental Duties is invoked when you see in a private party that the Indian flag has been used as a covering for the speaker's desk?</p></span><span class=\"hqt\" style=\"display:none\">&#2332;&#2348; &#2310;&#2346; &#2342;&#2375;&#2326;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367; &#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2332;&#2368; &#2346;&#2366;&#2352;&#2381;&#2335;&#2368; &#2350;&#2375;&#2306; &#2357;&#2325;&#2381;&#2340;&#2366; &#2325;&#2368; &#2350;&#2375;&#2332; &#2325;&#2379; &#2338;&#2325;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2343;&#2381;&#2357;&#2332; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2350;&#2370;&#2354; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Article 51A (c)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 51&#2319; (&#2360;&#2368;)</span>",
      "<span class=\"eqt\">Article 51A (d)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 51&#2319; (&#2337;&#2368;)</span>",
      "<span class=\"eqt\">Article 51A (a)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 51&#2319; (&#2319;)</span>",
      "<span class=\"eqt\">Article 51A (b)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 51&#2319; (&#2348;&#2368;)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Article 51A (a) of the Indian Constitution states that it is the duty of every citizen \"to abide by the Constitution and respect its ideals and institutions, the National Flag and the National Anthem.\" Using the Indian flag as a decoration or covering violates Flag Code of India and disrespects national symbols.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Article 148 of the Constitution of India provides for an independent office of the ______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 148 ______ &#2325;&#2375; &#2319;&#2325; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2346;&#2342; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Attorney General of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2361;&#2366;&#2344;&#2381;&#2351;&#2366;&#2351;&#2357;&#2366;&#2342;&#2368;</span>",
      "<span class=\"eqt\">President of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Comptroller and Auditor General of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2325; &#2319;&#2357;&#2306; &#2350;&#2361;&#2366;&#2354;&#2375;&#2326;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2325;</span>",
      "<span class=\"eqt\">Advocate General of the state</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2350;&#2361;&#2366;&#2343;&#2367;&#2357;&#2325;&#2381;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Article 148 - Comptroller and Auditor-General of India</p><p>There shall be a Comptroller and Auditor-General of India who shall be appointed by the President by warrant under his hand and seal and shall only be removed from office in like manner and on like grounds as a Judge of the Supreme Court.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which part of the Constitution of India consists of the idea of a Welfare State?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2349;&#2366;&#2327; &#2350;&#2375;&#2306; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339;&#2325;&#2366;&#2352;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2357;&#2367;&#2330;&#2366;&#2352; &#2360;&#2350;&#2381;&#2350;&#2367;&#2354;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Directive Principles of State Policy</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2344;&#2368;&#2340;&#2367; &#2325;&#2375; &#2344;&#2367;&#2342;&#2375;&#2358;&#2325; &#2340;&#2340;&#2381;&#2357;</span>",
      "<span class=\"eqt\">Fundamental Duties</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Fundamental Rights</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Preamble</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The <b>Directive Principles of State Policy </b>are enumerated in Part IV of the Constitution from Articles 36 to 51. They embody the concept of a welfare state.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Articles of the Indian Constitution mentions that 'The State shall, in particular, direct its policy towards securing that the ownership and control of the material resources of the community are so distributed as best to subserve the common good'?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2350;&#2375;&#2306; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2361;&#2376; &#2325;&#2367; '&#2352;&#2366;&#2332;&#2381;&#2351;, &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375;, &#2309;&#2346;&#2344;&#2368; &#2344;&#2368;&#2340;&#2367; &#2325;&#2379; &#2351;&#2361; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2367;&#2340; &#2325;&#2352;&#2375;&#2327;&#2366; &#2325;&#2367; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2325;&#2375; &#2349;&#2380;&#2340;&#2367;&#2325; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2381;&#2357;&#2366;&#2350;&#2367;&#2340;&#2381;&#2357; &#2324;&#2352; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2357;&#2367;&#2340;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2325;&#2367; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2349;&#2354;&#2366;&#2312; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2350; &#2361;&#2379;'?</span>",
    "options": [
      "<span class=\"eqt\">Article 39(a)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 39(&#2319;)</span>",
      "<span class=\"eqt\">Article 39(b)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 39(&#2348;&#2368;)</span>",
      "<span class=\"eqt\">Article 39(c)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 39(&#2360;&#2368;)</span>",
      "<span class=\"eqt\">Article 39(d)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 39(&#2337;&#2368;)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Article 39(b) of the Directive Principles of State Policy (DPSP) ensures that material resources are distributed for the common good. It is aimed at achieving economic justice.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>In which of the following years was the citizenship Act passed by the Indian Parliament?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2360;&#2342; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2340;&#2366; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",

      "<span class=\"eqt\">1945</span><span class=\"hqt\" style=\"display:none\">1945</span>",
      "<span class=\"eqt\">1955</span><span class=\"hqt\" style=\"display:none\">1955</span>",

    "correct_option_id": 2,
    "solution": "<p>The <b>Citizenship Act of 1955 </b>regulates who may acquire Indian citizenship and on what grounds. A person may become an Indian citizen if they are born in India or have Indian parentage or have resided in the country for a period of time, etc. However, illegal migrants are prohibited from acquiring Indian citizenship. An illegal migrant is a foreigner who: (i) enters the country without valid travel documents, like a passport and visa, or (ii) enters with valid documents, but stays beyond the permitted time period.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following is NOT a condition for acquiring the citizenship of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2352;&#2381;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Descent</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2338;&#2364;&#2366;&#2312;</span>",

    "correct_option_id": 0,
    "solution": "<p>Under the <b>Indian Citizenship Act, 1955</b>, citizenship can be acquired through the following ways:</p><p>1) <b>By Birth</b> (Section 3)</p><p>2) <b>By Descent</b> (Section 4) </p><p>3) <b>By Registration</b> (Section 5) </p><p>4) <b>By Naturalisation</b> (Section 6)</p><p>5) <b>By Incorporation of Territory</b> (Section 7)</p><p>6) <b>By Domicile</b> (Part II of the Constitution) </p><p>However, <b>holding property</b> is <b>not</b> a condition for acquiring Indian citizenship. Owning land or assets in India does not automatically grant citizenship.</p><p>Further information:</p><p>&#183; <b>Descent:</b> If one or both parents are Indian citizens.</p><p>&#183; <b>Registration:</b> For PIOs, spouses of Indian citizens, etc., after fulfilling residency requirements.</p><p>&#183; <b>Domicile:</b> Permanent residence in India (for certain categories like overseas citizens).</p>",
