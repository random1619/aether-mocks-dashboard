    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The Central Office of the Reserve Bank of India was initially established in which present city in 1935?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2367;&#2332;&#2352;&#2381;&#2357; &#2348;&#2376;&#2306;&#2325; &#2325;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2354;&#2351; 1935 &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2358;&#2361;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Delhi</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2354;&#2381;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Mumbai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2306;&#2348;&#2312;</span>",
      "<span class=\"eqt\">Kolkata</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2354;&#2325;&#2366;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Chennai</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2375;&#2344;&#2381;&#2344;&#2312;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The <b>Reserve Bank of India (RBI)</b> was <b>established in 1935</b>, and its <b>Central Office was initially located in Kolkata</b> (then known as Calcutta).</p><p>&#183; Later, in <b>1937</b>, the <b>Central Office was moved to Mumbai</b>, which remains the RBI headquarters to this day.</p><p><b>Key Facts:</b></p><p>&#183; RBI was established under the <b>Reserve Bank of India Act, 1934</b>.</p><p>&#183; It started functioning on <b>1st April 1935</b>.</p><p>&#183; Though now headquartered in Mumbai, <b>Kolkata</b> was its <b>first central office location</b>.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In India, statutory liquidity ratio is fixed by _____.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306;, &#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2340;&#2352;&#2354;&#2340;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; _____ &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2340;&#2351; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">India Brand Equity Foundation</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2348;&#2381;&#2352;&#2366;&#2306;&#2337; &#2311;&#2325;&#2381;&#2357;&#2367;&#2335;&#2368; &#2347;&#2366;&#2313;&#2306;&#2337;&#2375;&#2358;&#2344;</span>",
      "<span class=\"eqt\">State Government</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Commercial Banks</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351;&#2367;&#2325; &#2348;&#2376;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Reserve Bank of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2367;&#2332;&#2352;&#2381;&#2357; &#2348;&#2376;&#2306;&#2325;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The <b>Reserve Bank of India (RBI)</b> sets the <b>Statutory Liquidity Ratio (SLR)</b> for commercial banks.</p><p>&#183; It is the minimum percentage of a commercial bank's net demand and time liabilities (NDTL) that it has to maintain in the form of liquid assets like cash, gold, or government-approved securities.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The mutual funds industry in India is regulated by which of the following organisations?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2381;&#2351;&#2369;&#2330;&#2369;&#2309;&#2354; &#2347;&#2306;&#2337; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2306;&#2327;&#2336;&#2344;/&#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ministry of Commerce and SIDBI</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2324;&#2352; SIDBI</span>",
      "<span class=\"eqt\">NITI Aayog and IIFCL</span><span class=\"hqt\" style=\"display:none\">NITI &#2310;&#2351;&#2379;&#2327; &#2324;&#2352; IIFCL</span>",
      "<span class=\"eqt\">SEBI and RBI</span><span class=\"hqt\" style=\"display:none\">SEBI &#2324;&#2352; RBI</span>",
      "<span class=\"eqt\">IRDA and IFCI</span><span class=\"hqt\" style=\"display:none\">IRDA &#2324;&#2352; IFCI</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Mutual fund (MF) schemes can be classified into four categories, keeping in mind guidelines of the <b>Securities and Exchange Board of India (SEBI) and Reserve bank of India </b>(RBI) on categorisation and rationalisation of mutual fund schemes.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The net worth of any bank is equal to ___________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2348;&#2376;&#2306;&#2325; &#2325;&#2368; &#2344;&#2367;&#2357;&#2354; &#2350;&#2366;&#2354;&#2367;&#2351;&#2340;___________ &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">liabilities - assets</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2375;&#2344;&#2342;&#2366;&#2352;&#2367;&#2351;&#2366;&#2305; - &#2310;&#2360;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">(reserves + loans) - liabilities</span><span class=\"hqt\" style=\"display:none\">(&#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2344;&#2367;&#2343;&#2367;&#2351;&#2366;&#2306; + &#2315;&#2339;) - &#2342;&#2375;&#2344;&#2342;&#2366;&#2352;&#2367;&#2351;&#2366;&#2305;</span>",
      "<span class=\"eqt\">interest + liabilities</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2351;&#2366;&#2332; + &#2342;&#2375;&#2344;&#2342;&#2366;&#2352;&#2367;&#2351;&#2366;&#2305;</span>",
      "<span class=\"eqt\">(reserves + loans) + liabilities</span><span class=\"hqt\" style=\"display:none\">(&#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2344;&#2367;&#2343;&#2367;&#2351;&#2366;&#2306; + &#2315;&#2339;) + &#2342;&#2375;&#2344;&#2342;&#2366;&#2352;&#2367;&#2351;&#2366;&#2305;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The net worth of a bank is calculated by <b>subtracting its liabilities from the sum of reserves and loans</b>. This measure represents the residual interest of the bank's owners or shareholders after covering all debts and obligations. A positive net worth indicates the bank's financial health and capacity to meet its obligations.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In which of the following years did the Government of India set up the Monetary Policy Committee?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2344;&#2375; &#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367; &#2360;&#2350;&#2367;&#2340;&#2367; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">2016</span><span class=\"hqt\" style=\"display:none\">2016</span>",
      "<span class=\"eqt\">2010</span><span class=\"hqt\" style=\"display:none\">2010</span>",
      "<span class=\"eqt\">2008</span><span class=\"hqt\" style=\"display:none\">2008</span>",
      "<span class=\"eqt\">2019</span><span class=\"hqt\" style=\"display:none\">2019</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Reserve Bank of India Act, 1934 has been amended by the Finance Act, 2016, to provide for a statutory and institutionalised framework for a Monetary Policy Committee, for maintaining price stability, while keeping in mind the objective of growth.</p><p>The Monetary Policy Committee would be entrusted with the task of fixing the benchmark policy rate (repo rate) required to contain inflation within the specified target level.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is issued by commercial banks at a discount on face value?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351;&#2367;&#2325; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2331;&#2370;&#2335; &#2346;&#2352; &#2332;&#2366;&#2352;&#2368; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Commercial papers</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351;&#2367;&#2325; &#2346;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Certificates of deposits</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2350;&#2366; &#2346;&#2381;&#2352;&#2350;&#2366;&#2339;&#2346;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Treasury bills</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2375;&#2332;&#2352;&#2368; &#2348;&#2367;&#2354;</span>",
      "<span class=\"eqt\">Promissory notes</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2330;&#2344; &#2344;&#2379;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Certificate of Deposit (CD)</b> is issued by the RBI (Reserve Bank of India) in a dematerialised form. It is a financial instrument with fixed-income facilities and assured payout from the beginning. Both Scheduled Commercial Bank and All-India Financial Institutions are authorised to issue a CD at a discount on its face value.</p><p>Besides, financial institutions and banks issue certificates of deposit on a floating rate basis.</p><p>The Reserve Bank of India permits Scheduled Commercial Banks, Regional Rural Banks, Small Finance Banks and All-India Financial Institutions to issue CDs (certificate of deposits).</p><p></p><p>Commercial paper and certificate of deposit are different in two aspects. Firstly, banks and financial institutions issue certificates of deposit, but large corporations, primary dealers, and All-India Financial Institutions issue commercial papers.</p><p></p><p></p><p><b>Further information:</b></p><p><b>Treasury Bills (T-Bills)</b>:</p><p>&#183; These are <b>issued by the Government of India/RBI</b> (not by commercial banks).</p><p>&#183; They <b>are issued at a discount</b> and <b>redeemed at face value</b>.</p><p><b>Promissory Notes</b>:</p><p>&#183; These are <b>written promises</b> to pay a certain amount of money on demand or at a fixed future date.</p><p>&#183; They are <b>not typically issued at a discount</b>, and <b>not a money market instrument issued by commercial banks</b> for raising funds.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The total liability of the monetary authority of the country, Reserve Bank of India, is called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2375;&#2358; &#2325;&#2375; &#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2346;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2352;&#2339;, &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2367;&#2395;&#2352;&#2381;&#2357; &#2348;&#2376;&#2306;&#2325; &#2325;&#2368; &#2325;&#2369;&#2354; &#2342;&#2375;&#2351;&#2340;&#2366; &#2325;&#2361;&#2354;&#2366;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Grey money</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2352;&#2367;&#8205;&#2349;&#2366;&#2359;&#2367;&#8205;&#2340;/&#2309;&#2357;&#2376;&#2343; &#2343;&#2344;</span>",
      "<span class=\"eqt\">High powered money</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2343;&#2366;&#2352;&#2349;&#2370;&#2340; &#2343;&#2344;</span>",
      "<span class=\"eqt\">Cold cash</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2354;&#2381;&#2337; &#2325;&#2376;&#2358;</span>",
      "<span class=\"eqt\">Hot money</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2340;&#2367;&#8205;&#2358;&#2368;&#2328;&#2381;&#2352; &#2330;&#2354;&#2366;&#2351;&#2350;&#2366;&#2344; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The total liability of the monetary authority of the country, RBI, is called <b>the monetary base or high-powered money</b>. It consists of currency (notes and coins in circulation with the public and vault cash of commercial banks) and deposits held by the Government of India and commercial banks with RBI.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which Indian banknote released in November 2016 features Mangalyaan on the reverse side?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2357;&#2306;&#2348;&#2352; 2016 &#2350;&#2375;&#2306; &#2332;&#2366;&#2352;&#2368; &#2325;&#2367;&#2360; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325;&#2344;&#2379;&#2335; &#2325;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2346;&#2325;&#2381;&#2359; &#2346;&#2352; &#2350;&#2306;&#2327;&#2354;&#2351;&#2366;&#2344; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;500</span><span class=\"hqt\" style=\"display:none\">&#8377;500</span>",
      "<span class=\"eqt\">&#8377;2,000</span><span class=\"hqt\" style=\"display:none\">&#8377;2,000</span>",
      "<span class=\"eqt\">&#8377;200</span><span class=\"hqt\" style=\"display:none\">&#8377;200</span>",
      "<span class=\"eqt\">&#8377;100</span><span class=\"hqt\" style=\"display:none\">&#8377;100</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Reserve Bank of India revealed the new bill, part of the \"Mahatma Gandhi (New) Series\" of banknotes, which features an illustration on its reverse of the Indian Space Research Organization's Mangalyaan or Mars Orbiter Mission that was launched on Nov. 5, 2013. The bill has a face value of <b>2000 rupees </b>(about $30 U.S.), making it India's highest denomination of currency.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following refers to the purchase and sale of government securities?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2349;&#2370;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2326;&#2352;&#2368;&#2342; &#2324;&#2352; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2325;&#2379; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bank rate</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2306;&#2325; &#2342;&#2352;</span>",
      "<span class=\"eqt\">Open market operations</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2369;&#2354;&#2366; &#2348;&#2366;&#2332;&#2366;&#2352; &#2346;&#2352;&#2367;&#2330;&#2366;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Reserve ratio</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</span>",
      "<span class=\"eqt\">High powered money</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2358;&#2325;&#2381;&#2340;&#2367; &#2357;&#2366;&#2354;&#2366; &#2343;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Open Market Operations (OMO):</b></p><p>&#183; These are <b>direct instruments of monetary policy</b>.</p><p>&#183; It refers to the <b>buying and selling of government securities</b> by the <b>central bank (RBI)</b> in the <b>open market</b>.</p><p>&#183; Purpose: To <b>control liquidity</b> in the banking system.</p><p>o When RBI <b>sells</b> securities &rarr; it <b>absorbs liquidity</b> (money goes out of circulation).</p><p>o When RBI <b>buys</b> securities &rarr; it <b>injects liquidity</b> (money flows into the system).</p><p><b>Bank Rate:</b></p><p>&#183; This is the interest rate at which the central bank (RBI in India) lends money to commercial banks without any collateral.</p><p>&#183; It <b>does not involve buying or selling of government securities</b>.</p><p><b>Reserve Ratio:</b></p><p>&#183; Refers to <b>CRR (Cash Reserve Ratio)</b> and <b>SLR (Statutory Liquidity Ratio)</b>.</p><p>&#183; These are the portions of deposits that banks are required to keep with the RBI or in specific forms.</p><p>&#183; <b>Not related to buying/selling government securities directly</b>.</p><p><b>High Powered Money:</b></p><p>&#183; Also called <b>Reserve Money</b>.</p><p>&#183; It includes <b>currency in circulation + deposits of banks with RBI</b>.</p><p>&#183; It refers to the base money, not the process of security trading.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following banks is in charge of India's banking and monetary system?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2348;&#2376;&#2306;&#2325; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2324;&#2352; &#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2346;&#2381;&#2352;&#2349;&#2366;&#2352;&#2368; &#2361;&#2376;?</p></span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>Reserve Bank of India (RBI)</b> is India's central bank and is responsible for regulating the country's banking and monetary system. Its primary functions include issuing currency, managing monetary policy, supervising financial institutions, and acting as a banker to the government and commercial banks.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; Union Bank of India (UBI): A public sector commercial bank.</p><p>&#8226; Bank of Baroda (BOB): A public sector commercial bank.</p><p>&#8226; State Bank of India (SBI): The largest public sector commercial bank in India.</p><p>While these are important banks, the RBI is the apex regulatory authority.</p><p><b>Further insights:</b></p><p>&#8226; The RBI was established on April 1, 1935, in accordance with the provisions of the Reserve Bank of India Act, 1934.</p><p>&#8226; Its key objectives include maintaining price stability (controlling inflation) and ensuring an adequate flow of credit to productive sectors of the economy.</p><p>&#8226; It uses various monetary policy tools like the repo rate, reverse repo rate, CRR, and SLR to manage liquidity and influence interest rates.</p>",
    "question_index": 9
  },
  {

    "correct_option_id": 0,

    "question": "<span class=\"eqt\"><p>SLR is an important tool used by RBI to control money supply in the economy. The full form of SLR is ____________________.</p></span><span class=\"hqt\" style=\"display:none\"><p>SLR &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; RBI &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2313;&#2346;&#2325;&#2352;&#2339; &#2361;&#2376;&#2404; SLR &#2325;&#2366; &#2346;&#2370;&#2352;&#2381;&#2339; &#2352;&#2370;&#2346; _______________ &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Statutory Liquidity Reserve</span><span class=\"hqt\" style=\"display:none\">Statutory Liquidity Reserve</span>",
      "<span class=\"eqt\">Stipulated Liquidity Reserve</span><span class=\"hqt\" style=\"display:none\">Stipulated Liquidity Reserve</span>",
      "<span class=\"eqt\">Statutory Liquidity Ratio</span><span class=\"hqt\" style=\"display:none\">Statutory Liquidity Ratio</span>",
      "<span class=\"eqt\">Stipulated Liquidity Ratio</span><span class=\"hqt\" style=\"display:none\">Stipulated Liquidity Ratio</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Statutory Liquidity Ratio or SLR</b> is a minimum percentage of deposits that a commercial bank has to maintain in the form of liquid cash, gold or other securities. It is basically the reserve requirement that banks are expected to keep before offering credit to customers. These are not reserved with the Reserve Bank of India (RBI), but with banks themselves. The SLR is fixed by the RBI. CRR (Cash Reserve Ratio) and SLR have been the traditional tools of the central bank's monetary policy to control credit growth, flow of liquidity and inflation in the economy. The SLR was prescribed by Section 24 (2A) of Banking Regulation Act, 1949.</p>",
    "question_index": 13
  },
  {

      "<span class=\"eqt\">Liquidity Adjustment Facility</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2354;&#2344;&#2367;&#2343;&#2367; &#2360;&#2350;&#2366;&#2351;&#2379;&#2332;&#2344; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366;</span>"

    "correct_option_id": 2,
    "solution": "<p></p><p><b>Open Market Operations</b> involve the buying and selling of government securities by the central bank (Reserve Bank of India, or RBI in this case) in the open market. The primary purpose of OMO is to manage the liquidity and money supply in the economy.</p><p> </p>",

    "question": "<span class=\"eqt\"><p>Selling of bonds by the RBI will cause money supply to __________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2366;&#2306;&#2337; &#2348;&#2375;&#2330;&#2344;&#2375; &#2360;&#2375; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; __________ &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">increase</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2338;&#2364;&#2379;&#2340;&#2352;&#2368;</span>",
      "<span class=\"eqt\">No relationship exists between selling bonds and money supply</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2306;&#2337; &#2348;&#2375;&#2330;&#2344;&#2375; &#2324;&#2352; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2379;&#2312; &#2360;&#2306;&#2348;&#2306;&#2343; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>",
      "<span class=\"eqt\">fluctuate</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2366;&#2352; &#2330;&#2338;&#2364;&#2366;&#2357;</span>",
      "<span class=\"eqt\">decrease</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2335;&#2366;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>When the Reserve Bank of India (RBI) sells government bonds (securities) in the open market (as part of its Open Market Operations - OMO), it withdraws liquidity from the banking system. Commercial banks and other entities buy these bonds from the RBI, paying for them with money. This reduces the cash reserves of commercial banks, thereby contracting their lending capacity and leading to a <b>decrease</b> in the money supply in the economy.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; increase: Buying bonds by the RBI injects liquidity and increases the money supply.</p><p>&#8226; No relationship exists between selling bonds and money supply: Incorrect, OMO is a key tool for influencing money supply.</p><p>&#8226; fluctuate: While money supply can fluctuate due to various factors, the direct impact of RBI selling bonds is a decrease.</p><p><b>Further insights:</b></p><p>&#8226; Open Market Operations (OMO) are a major monetary policy tool used by central banks to manage liquidity and influence interest rates.</p><p>&#8226; Selling bonds is a contractionary monetary policy measure, aimed at curbing inflation or excessive credit growth.</p><p>&#8226; Conversely, buying bonds from the market injects money into the system and is an expansionary monetary policy measure.</p>",
    "question_index": 17
  },
  {
