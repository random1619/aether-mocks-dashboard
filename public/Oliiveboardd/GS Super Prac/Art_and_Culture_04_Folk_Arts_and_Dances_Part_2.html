    "solution": "<p>&bull; <b>Gotipua dance is performed by young boys aged between 6 to 14 years, dressed as girls, and is especially popular in Raghurajpur village. </b></p><p>&bull; Ghumura: A drum-based dance performed by men, famous in Kalahandi. </p><p>&bull; Bagha Nacha: A tiger dance performed by men during Chaitra. </p><p>&bull; Danda Nata: An ancient folk dance to appease Lord Shiva.</p><p>Further Insight:</p><p>&bull; <b>Dances of Odisha</b></p><p>&#9675; <b>Ruk Mar Nacha</b></p><p>&#9675; <b>Dalkhai Dance</b>  -  Tribal dance performed during Dussehra</p><p>&#9675; <b>Ghumura</b>  -  Performed in Kalahandi district.</p><p>&#9675; <b>Paika</b>  -  War dance, performed by the Paika community</p><p>&#9675; <b>Bagha Nacha</b>  -  Also called Tiger Dance, performed during Chaitra festival</p><p>&#9675; <b>Goti Pua</b>  -  Precursor to classical Odissi dance, performed by young boys</p><p>&#9675; <b>Munari</b></p><p>&#9675; <b>Danda Nata</b>  -  Devotees perform this in the Ganjam district to appease Lord Shiva</p><p>&#9675; <b>Medha Nacha</b>  -  Mask dance performed in coastal Odisha</p>",

    "solution": "<p>&bull; Bharatanatyam originated in Tamil Nadu and is deeply rooted in temple culture. </p><p>&bull; Bharatanatyam incorporates both Tandava (masculine) and Lasya (feminine) elements. </p><p>&bull; Bharatanatyam is performed by both male and female dancers in modern times. </p><p>Further Insight:</p><p>&bull; <b>Bharatanatyam</b></p><p>&#9675; <b>State in which it perfomed</b>: Tamil Nadu</p><p>&#9675; <b>History and facts</b>: </p><p>&#9632; Bharatanatyam is one of the oldest classical dance forms in India, originating in the temples of Tamil Nadu. </p><p>&#9632; It was traditionally performed by <i>devadasis</i> (temple dancers) as a form of devotion to deities. </p><p>&#9632; It was codified in the Natya Shastra by the sage Bharata. </p><p>&#9632; The revival of Bharatanatyam in the 20th century was largely due to the efforts of Rukmini Devi Arundale, who brought it from temples to the proscenium stage, refining its aesthetics and removing any associations with the devadasi system.</p><p>&#9675; <b>Exponents</b>:</p><p>&#9632; Rukmini Devi Arundale</p><p>&#9632; Padma Subrahmanyam</p><p>&#9632; Vyjayanthimala</p><p>&#9632; Padmini</p><p>&#9632; Smt. Swati Daithankar</p>",
