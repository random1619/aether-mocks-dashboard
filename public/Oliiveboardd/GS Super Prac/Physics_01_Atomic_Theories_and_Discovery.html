<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">10</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">10 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In 1812, who described the hypothesis that equal volumes of different gases contain an equal number of molecules?</p></span><span class=\"hqt\" style=\"display:none\"><p>1812 &#2350;&#2375;&#2306;, &#2325;&#2367;&#2360;&#2344;&#2375; &#2351;&#2361; &#2346;&#2352;&#2367;&#2325;&#2354;&#2381;&#2346;&#2344;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2368; &#2341;&#2368; &#2325;&#2367; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2327;&#2376;&#2360;&#2379;&#2306; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2310;&#2351;&#2340;&#2344; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2309;&#2339;&#2369; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Amedeo Avogadro</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2375;&#2342;&#2367;&#2323; &#2309;&#2357;&#2379;&#2327;&#2366;&#2342;&#2381;&#2352;&#2379;</span>",
      "<span class=\"eqt\">James Watt</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2375;&#2350;&#2381;&#2360; &#2357;&#2377;&#2335;</span>",
      "<span class=\"eqt\">John Dalton</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2377;&#2344; &#2337;&#2366;&#2354;&#2381;&#2335;&#2344;</span>",
      "<span class=\"eqt\">Albert Einstein</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2348;&#2352;&#2381;&#2335; &#2310;&#2311;&#2306;&#2360;&#2381;&#2335;&#2368;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; In <b>1812</b>, <b>Amedeo Avogadro</b>, an Italian scientist, proposed the <b>Avogadro's hypothesis (or Avogadro's law)</b>, which states that <b>equal volumes of different gases, at the same temperature and pressure, contain an equal number of molecules</b>. </p><p>&#183; This foundational principle later became crucial in the development of the <b>kinetic theory of gases</b> and modern chemistry.</p><p>Why not the others?</p><p>&#183; <b>James Watt</b>: A Scottish inventor known for improving the steam engine, unrelated to gas laws.</p><p>&#183; <b>John Dalton</b>: Proposed <b>Dalton's atomic theory</b> but did not formulate Avogadro's hypothesis.</p><p>&#183; <b>Albert Einstein</b>: Worked on Brownian motion and quantum theory, much later (early 20th century).</p><p><b>Fun Fact:</b> Avogadro's number (6.022  X  10&#178;&ge; molecules/mol) was named in his honor, though it was determined after his lifetime.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>For which discovery did Henri Becquerel receive the Nobel Prize in Physics in 1903?</p></span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2344;&#2352;&#2368; &#2348;&#2375;&#2325;&#2381;&#2357;&#2375;&#2352;&#2375;&#2354; &#2325;&#2379; 1903 &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2326;&#2379;&#2332; &#2325;&#2375; &#2354;&#2367;&#2319; &#2349;&#2380;&#2340;&#2367;&#2325;&#2368; &#2325;&#2366; &#2344;&#2379;&#2348;&#2375;&#2354; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2350;&#2367;&#2354;&#2366; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Spontaneous Radioactivity</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2340;&#2307;&#2360;&#2381;&#2347;&#2370;&#2352;&#2381;&#2340; &#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2343;&#2352;&#2381;&#2350;&#2367;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Radioactive Elements</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2343;&#2352;&#2381;&#2350;&#2368; &#2340;&#2340;&#2381;&#2357;</span>",
      "<span class=\"eqt\">Radium Emanation</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2337;&#2367;&#2351;&#2350; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Diagnostic Radiography</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2366;&#2351;&#2327;&#2381;&#2344;&#2379;&#2360;&#2381;&#2335;&#2367;&#2325; &#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2327;&#2381;&#2352;&#2366;&#2347;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Henri Becquerel shared the 1903 Nobel Prize in Physics with Marie and Pierre Curie for his discovery of spontaneous radioactivity in uranium in 1896.</p><p>This groundbreaking discovery was made somewhat accidentally when Becquerel observed that uranium salts had fogged a photographic plate without exposure to sunlight, demonstrating natural radiation emission.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In which year did Robert Brown observe the zigzag movement of colloidal particles in solution?</p></span><span class=\"hqt\" style=\"display:none\">&#2352;&#2377;&#2348;&#2352;&#2381;&#2335; &#2348;&#2381;&#2352;&#2366;&#2313;&#2344; &#2344;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2357;&#2367;&#2354;&#2351;&#2344; &#2350;&#2375;&#2306; &#2325;&#2379;&#2354;&#2366;&#2311;&#2337;&#2354; &#2325;&#2339;&#2379;&#2306; &#2325;&#2368; &#2335;&#2375;&#2338;&#2364;&#2368;-&#2350;&#2375;&#2338;&#2364;&#2368; &#2327;&#2340;&#2367; &#2342;&#2375;&#2326;&#2368; &#2341;&#2368;?</span>",
    "options": [
      "<span class=\"eqt\">1829</span><span class=\"hqt\" style=\"display:none\">1829</span>",
      "<span class=\"eqt\">1826</span><span class=\"hqt\" style=\"display:none\">1826</span>",
      "<span class=\"eqt\">1828</span><span class=\"hqt\" style=\"display:none\">1828</span>",
      "<span class=\"eqt\">1827</span><span class=\"hqt\" style=\"display:none\">1827</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Robert Brown, a Scottish botanist, first observed the zigzag (random) movement of colloidal particles in 1827 while studying pollen grains suspended in water under a microscope. This motion, later called Brownian motion, was explained by Albert Einstein in 1905, confirming that it results from the collision of particles with molecules of the surrounding medium.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which type of electromagnetic radiation was discovered by Johann Wilhelm Ritter in 1801?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2379;&#2361;&#2366;&#2344; &#2357;&#2367;&#2354;&#2381;&#2361;&#2375;&#2350; &#2352;&#2367;&#2335;&#2352; &#2344;&#2375; 1801 &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2330;&#2369;&#2350;&#2381;&#2348;&#2325;&#2368;&#2351; &#2357;&#2367;&#2325;&#2367;&#2352;&#2339; &#2325;&#2368; &#2326;&#2379;&#2332; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">X-rays</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2381;&#2360;-&#2352;&#2375;</span>",
      "<span class=\"eqt\">Ultraviolet rays</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2366;&#2348;&#2376;&#2306;&#2327;&#2344;&#2368; &#2325;&#2367;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Infrared rays</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2352;&#2325;&#2381;&#2340; &#2325;&#2367;&#2352;&#2339;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Gamma rays</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2350;&#2366; &#2325;&#2367;&#2352;&#2339;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Johann Wilhelm Ritter</b>, a German physicist, discovered <b>ultraviolet (UV) rays</b> in <b>1801</b>.</p><p>&bull; He noticed that invisible rays just beyond the violet end of the visible spectrum caused <b>silver chloride</b> to darken quickly.</p><p>&bull; This discovery confirmed the existence of radiation beyond violet light, hence the term <b>\"ultra-violet\"</b>.</p><p><b>Other Options:</b></p><p>&bull; <b>X-rays</b>  -  Discovered by <b>Wilhelm Conrad R&#246;ntgen</b> in <b>1895</b>.</p><p>&bull; <b>Infrared rays</b>  -  Discovered by <b>William Herschel</b> in <b>1800</b> (just a year before Ritter's discovery).</p><p>&bull; <b>Gamma rays</b>  -  Discovered by <b>Paul Villard</b> in <b>1900</b>.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In 1928,who discovered that when a ray of coloured light enters a liquid, a fraction of the light scattered by that liquid is of a different colour?</p></span><span class=\"hqt\" style=\"display:none\"><p>1928 &#2350;&#2375;&#2306;, &#2325;&#2367;&#2360;&#2344;&#2375; &#2351;&#2361; &#2326;&#2379;&#2332; &#2325;&#2367;&#2351;&#2366; &#2325;&#2368; &#2332;&#2348; &#2352;&#2306;&#2327;&#2368;&#2344; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2368; &#2319;&#2325; &#2325;&#2367;&#2352;&#2339; &#2325;&#2367;&#2360;&#2368; &#2342;&#2381;&#2352;&#2357; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360; &#2342;&#2381;&#2352;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2325;&#2368;&#2352;&#2381;&#2339;&#2367;&#2340; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2366; &#2319;&#2325; &#2309;&#2306;&#2358; &#2319;&#2325; &#2349;&#2367;&#2344;&#2381;&#2344; &#2352;&#2306;&#2327; &#2325;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lord Rayleigh</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2352;&#2375;&#2354;&#2375;</span>",
      "<span class=\"eqt\">CV Raman</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368; &#2357;&#2368; &#2352;&#2350;&#2344;</span>",
      "<span class=\"eqt\">SN Bose</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360; &#2319;&#2344; &#2348;&#2379;&#2360;</span>",
      "<span class=\"eqt\">John Tyndall</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2377;&#2344; &#2335;&#2367;&#2306;&#2337;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>At this institute, <b>Sir C. V. Raman</b> discovered in 1928 that when a beam of coloured light entered a liquid, a fraction of the light scattered by that liquid was of a different color. Raman showed that the nature of this scattered light was dependent on the type of sample present.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Philosophiae Naturalis Principia Mathematica, popularly known as Principia, published in 1687, is the great work of which scientist?</p></span><span class=\"hqt\" style=\"display:none\"><p>1687 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2347;&#2367;&#2354;&#2379;&#2360;&#2379;&#2347;&#2368; &#2344;&#2375;&#2330;&#2369;&#2352;&#2375;&#2354;&#2367;&#2360; &#2346;&#2381;&#2352;&#2367;&#2344;&#2381;&#2360;&#2367;&#2346;&#2367;&#2351;&#2366; &#2350;&#2376;&#2341;&#2375;&#2350;&#2375;&#2335;&#2367;&#2325;&#2366;, &#2332;&#2367;&#2360;&#2375; &#2346;&#2381;&#2352;&#2367;&#2344;&#2381;&#2360;&#2367;&#2346;&#2367;&#2351;&#2366; &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2325;&#2367;&#2360; &#2357;&#2376;&#2332;&#2381;&#2334;&#2366;&#2344;&#2367;&#2325; &#2325;&#2368; &#2350;&#2361;&#2366;&#2344; &#2325;&#2371;&#2340;&#2367; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Johannes Kepler</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2379;&#2361;&#2366;&#2344;&#2381;&#2360; &#2325;&#2375;&#2346;&#2381;&#2354;&#2352;</span>",
      "<span class=\"eqt\">John Philoponus</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2377;&#2344; &#2347;&#2367;&#2354;&#2379;&#2346;&#2379;&#2344;&#2360;</span>",
      "<span class=\"eqt\">Isaac Newton</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2311;&#2332;&#2376;&#2325; &#2344;&#2381;&#2351;&#2370;&#2335;&#2344;</span>",
      "<span class=\"eqt\">Edmund Halley</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2337;&#2350;&#2306;&#2337; &#2361;&#2376;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Philosophiae Naturalis Principia Mathematica, popularly known as Principia, published in 1687, is the great work of <b>Sir. Isaac Newton.</b></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In which year did Galileo describe the regular, swinging motion of a pendulum by the action of gravity and acquired momentum?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2376;&#2354;&#2368;&#2354;&#2367;&#2351;&#2379; &#2344;&#2375; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2324;&#2352; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2360;&#2306;&#2357;&#2375;&#2327; &#2325;&#2368; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2375;&#2306;&#2337;&#2369;&#2354;&#2350; &#2325;&#2368; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340;, &#2333;&#2370;&#2354;&#2340;&#2368; &#2327;&#2340;&#2367; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1605</span><span class=\"hqt\" style=\"display:none\">1605</span>",
      "<span class=\"eqt\">1600</span><span class=\"hqt\" style=\"display:none\">1600</span>",
      "<span class=\"eqt\">1599</span><span class=\"hqt\" style=\"display:none\">1599</span>",
      "<span class=\"eqt\">1602</span><span class=\"hqt\" style=\"display:none\">1602</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; <b>Galileo Galilei</b> first described the <b>regular swinging motion of a pendulum</b> in <b>1602</b> after observing a chandelier in Pisa Cathedral.</p><p>&#183; He discovered that the <b>period of oscillation</b> (time of swing) was constant and depended on the <b>length of the pendulum</b>, not the amplitude.</p><p>&#183; This laid the foundation for <b>pendulum clocks</b> (later developed by Christiaan Huygens in 1656).</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Who propounded the famous equation E = mc&#178; in 1905?</p></span><span class=\"hqt\" style=\"display:none\"><p>1905 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; E = mc&#178; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2346;&#2366;&#2342;&#2344; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Werner Heisenberg</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2344;&#2352; &#2361;&#2366;&#2311;&#2332;&#2375;&#2344;&#2348;&#2352;&#2381;&#2327;</span>",
      "<span class=\"eqt\">Isaac Newton</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2311;&#2332;&#2364;&#2376;&#2325; &#2344;&#2381;&#2351;&#2370;&#2335;&#2344;</span>",
      "<span class=\"eqt\">Albert Einstein</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2348;&#2352;&#2381;&#2335; &#2310;&#2311;&#2306;&#2360;&#2381;&#2335;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Ernest Rutherford</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2381;&#2344;&#2375;&#2360;&#2381;&#2335; &#2352;&#2342;&#2352;&#2347;&#2379;&#2352;&#2381;&#2337;</span>"
