    "question": "<span class=\"eqt\"><p>Match the Reformer with the Movement/Organization:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Reformer</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Movement/Organization</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Raja Rammohan Roy</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Arya Samaj</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Swami Dayanand Saraswati</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Brahmo Samaj</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Sir Syed Ahmad Khan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Aligarh Movement</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Jyotiba Phule</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Satyashodhak Samaj</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2369;&#2343;&#2366;&#2352;&#2325; &#2325;&#2379; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;/&#2360;&#2306;&#2327;&#2336;&#2344; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2369;&#2343;&#2366;&#2352;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2310;&#2306;&#2342;&#2379;&#2354;&#2344;/&#2360;&#2306;&#2327;&#2336;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2352;&#2366;&#2332;&#2366; &#2352;&#2366;&#2350;&#2350;&#2379;&#2361;&#2344; &#2352;&#2366;&#2351;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2310;&#2352;&#2381;&#2351; &#2360;&#2350;&#2366;&#2332;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2360;&#2381;&#2357;&#2366;&#2350;&#2368; &#2342;&#2351;&#2366;&#2344;&#2306;&#2342; &#2360;&#2352;&#2360;&#2381;&#2357;&#2340;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2379; &#2360;&#2350;&#2366;&#2332;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2360;&#2352; &#2360;&#2376;&#2351;&#2342; &#2309;&#2361;&#2350;&#2342; &#2326;&#2366;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2309;&#2354;&#2368;&#2327;&#2338;&#2364; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2332;&#2381;&#2351;&#2379;&#2340;&#2367;&#2348;&#2366; &#2347;&#2369;&#2354;&#2375;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2360;&#2340;&#2381;&#2351;&#2358;&#2379;&#2343;&#2325; &#2360;&#2350;&#2366;&#2332;</td></tr></table></span>",

      "<span class=\"eqt\">i &rarr; a, ii &rarr; b, iii &rarr; c, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; b, iii &rarr; c, iv &rarr; d</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; a, iii &rarr; c, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; a, iii &rarr; c, iv &rarr; d</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; a, iii &rarr; d, iv &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; a, iii &rarr; d, iv &rarr; c</span>",
      "<span class=\"eqt\">i &rarr; a, ii &rarr; c, iii &rarr; b, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; c, iii &rarr; b, iv &rarr; d</span>"

    "correct_option_id": 1,
    "solution": "<p>&bull; Raja Rammohan Roy established the Brahmo Samaj at Calcutta in 1828 in order to purify Hinduism and to preach monotheism. He is considered as the first 'modern man of India'. He was a pioneer of socio-religious reform movements in modern India.</p><p>&bull; The Arya Samaj was founded by Swami Dayanand Saraswathi at Bombay in 1875. Born in Kathiawar in Gujarat, Swami Dayanand (1824-83) was a scholar, a patriot, a social reformer and a revivalist. He believed the Vedas were the source of true knowledge. His motto was \"Back to the Vedas\".</p><p>&bull; The Aligarh Movement was started by Sir Syed Ahmad Khan (1817-98) for the social and educational advancement of the Muslims in India. He fought against the medieval backwardness and advocated a rational approach towards religion.</p><p>&bull; Jyotiba Phule belonged to a low caste family in Maharashtra. He waged a life-long struggle against upper caste domination and Brahmanical supremacy. In 1873 he founded the Satyashodak Samaj to fight against the caste system.</p><p>Further information:</p><p>Swami Dayanand Saraswathi:</p><p>&bull; He was against idol worship, child marriage and caste system based on birth. He encouraged intercaste marriages and widow remarriage.</p><p>&bull; He started the Suddhi movement to bring back those Hindus who had converted to other religions to its fold.</p><p>&bull; He wrote the book Satyartha Prakash which contains his ideas. The Arya Samaj, though founded in Bombay, became very powerful in Punjab and spread its influence to other parts of India.</p><p>&bull; It has contributed very much to the spread of education.</p><p>&bull; The first Dayanand Anglo-Vedic (DAV) School was founded in 1886 at Lahore.</p><p>&bull; Many more schools came up in other parts of India in later years. The Arya Samaj had also spread nationalism.</p><p>Sir Syed Ahmad Khan:</p><p>&bull; In 1866, he started the Mohammadan Educational Conference as a general forum for spreading liberal ideas among the Muslims.</p><p>&bull; In 1875, he founded a modern school at Aligarh to promote English education among the Muslims.</p><p>&bull; This had later grown into the Mohammadan Anglo Oriental College and then into the Aligarh Muslim University.</p><p>Jyotiba Phule:</p><p>&bull; He pioneered the widow remarriage movement in Maharashtra and worked for the education for women.</p><p>&bull; Jyotiba Phule and his wife established the first girls' school at Poona in 1851.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>What was a key objective of the Aligarh Movement?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2354;&#2368;&#2327;&#2338;&#2364; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">To promote traditional Islamic education</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2311;&#2360;&#2381;&#2354;&#2366;&#2350;&#2368; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To oppose Western education</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2325;&#2366; &#2357;&#2367;&#2352;&#2379;&#2343; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To advance the social and educational status of Muslims in India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2369;&#2360;&#2354;&#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2324;&#2352; &#2358;&#2376;&#2325;&#2381;&#2359;&#2367;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2379; &#2310;&#2327;&#2375; &#2348;&#2338;&#2364;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To revive the Mughal Empire</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2327;&#2354; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2379; &#2346;&#2369;&#2344;&#2352;&#2381;&#2332;&#2368;&#2357;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The Aligarh Movement was started by Sir Syed Ahmad Khan (1817-98) for the social and educational advancement of the Muslims in India.</p><p>&bull; He fought against the medieval backwardness and advocated a rational approach towards religion.</p><p>&bull; In 1866, he started the Mohammadan Educational Conference as a general forum for spreading liberal ideas among the Muslims.</p><p>&bull; In 1875, he founded a modern school at Aligarh to promote English education among the Muslims.</p><p>&bull; This had later grown into the Mohammadan Anglo Oriental College and then into the Aligarh Muslim University.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct concerning social reforms related to women?</p><p>I. The practice of Sati was declared a punishable offense in 1829 during the administration of Lord Cornwallis.</p><p>II. The Widow Remarriage Act was passed in 1856.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2366;&#2352;&#2381;&#2344;&#2357;&#2366;&#2354;&#2367;&#2360; &#2325;&#2375; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; 1829 &#2350;&#2375;&#2306; &#2360;&#2340;&#2368; &#2346;&#2381;&#2352;&#2341;&#2366; &#2325;&#2379; &#2342;&#2306;&#2337;&#2344;&#2368;&#2351; &#2309;&#2346;&#2352;&#2366;&#2343; &#2328;&#2379;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>II. &#2357;&#2367;&#2343;&#2357;&#2366; &#2346;&#2369;&#2344;&#2352;&#2381;&#2357;&#2367;&#2357;&#2366;&#2361; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; 1856 &#2350;&#2375;&#2306; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement I is incorrect as the practice of Sati was declared a punishable offense in 1829 during the administration of <b>Lord William Bentinck</b>.</p><p>Raj Rammohan Roy is most remembered for helping Lord William Bentinck to declare the practice of Sati a punishable offence in 1829. He also protested against the child marriage and female infanticide. He favored the remarriage of widows, female education and women's right to property.</p><p>Statement II is correct; the <b>Widow Remarriage Act was passed in 1856</b>.</p><p>In July 1856, J.P. Grant, a member of the Governor-General's Council finally tabled a bill in support of the widow remarriage, which was passed on 13 July 1856 and came to be called the Widow Remarriage Act, 1856.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The first girls' school at Poona was established by whom?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2370;&#2344;&#2366; &#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2366; &#2348;&#2366;&#2354;&#2367;&#2325;&#2366; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; &#2325;&#2367;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Raja Rammohan Roy</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2366; &#2352;&#2366;&#2350;&#2350;&#2379;&#2361;&#2344; &#2352;&#2366;&#2351;</span>",
      "<span class=\"eqt\">Ishwar Chandra Vidyasagar</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2358;&#2381;&#2357;&#2352; &#2330;&#2306;&#2342;&#2381;&#2352; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2360;&#2366;&#2327;&#2352;</span>",
      "<span class=\"eqt\">Jyotiba Phule and his wife</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2381;&#2351;&#2379;&#2340;&#2367;&#2348;&#2366; &#2347;&#2369;&#2354;&#2375; &#2324;&#2352; &#2313;&#2344;&#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Swami Dayanand Saraswati</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2366;&#2350;&#2368; &#2342;&#2351;&#2366;&#2344;&#2306;&#2342; &#2360;&#2352;&#2360;&#2381;&#2357;&#2340;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>first girls' school at Poona</b> was established by <b>Jyotiba Phule and his wife</b> in 1851.</p><p>Further information:</p><p><b>Ishwar Chandra Vidyasagar (1820 - 1891)  -  A Short Note</b></p><p><b>Key Contributions:</b></p><p><b>Social Reforms:</b></p><p>o Championed <b>widow remarriage</b>, leading to the <b>Hindu Widows' Remarriage Act (1856)</b>.</p><p>o Fought against <b>child marriage</b> and <b>polygamy</b>.</p><p><b>Education:</b></p><p>o Simplified <b>Bengali prose</b> and promoted vernacular education.</p><p>o Established <b>schools for girls</b>, including the <b>Bethune School (1849)</b>.</p><p>o Advocated for <b>mass education</b>, earning the title <i>\"Vidyasagar\"</i> (Ocean of Knowledge).</p><p>He waged a life-long struggle against upper caste domination and Brahmanical supremacy. In 1873 he founded the Satyashodak Samaj to fight against the caste system.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The Age of Consent Act raised the minimum marriageable age for girls to how many years in 1891?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2350;&#2340;&#2367; &#2310;&#2351;&#2369; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2344;&#2375; 1891 &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2357;&#2366;&#2361; &#2325;&#2368; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2310;&#2351;&#2369; &#2348;&#2338;&#2364;&#2366;&#2325;&#2352; &#2325;&#2367;&#2340;&#2344;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2352; &#2342;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">10 years</span><span class=\"hqt\" style=\"display:none\">10 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">12 years</span><span class=\"hqt\" style=\"display:none\">12 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">14 years</span><span class=\"hqt\" style=\"display:none\">14 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">16 years</span><span class=\"hqt\" style=\"display:none\">16 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Through the enactment of the <b>Age of Consent Act</b> in 1891, the minimum marriageable age for girls was <b>raised to 12 years</b>.</p><p>The practice of child marriage was another social stigma for the women. In November 1870, the Indian Reforms Association was started with the efforts of Keshav Chandra Sen. A journal called Mahapap Bal Vivah (Child marriage: The Cardinal Sin) was also launched with the efforts of B.M. Malabari to fight against child marriage. In 1846, the minimum marriageable age for a girl was only 10 years.</p><p>In 1891, through the enactment of the Age of Consent Act, this was raised to 12 years. In 1930, through the Sharda Act, the minimum age was raised to 14 years. After independence, the limit was raised to 18 years in 1978.</p>",
    "question_index": 4
  },

    "question": "<span class=\"eqt\"><p>The Singh Sabhas started in Lahore and Amritsar in 1870 aimed at reforming which society?</p></span><span class=\"hqt\" style=\"display:none\"><p>1870 &#2350;&#2375;&#2306; &#2354;&#2366;&#2361;&#2380;&#2352; &#2324;&#2352; &#2309;&#2350;&#2371;&#2340;&#2360;&#2352; &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2360;&#2367;&#2306;&#2361; &#2360;&#2349;&#2366;&#2323;&#2306; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2367;&#2360; &#2360;&#2350;&#2366;&#2332; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366; &#2341;&#2366;?</p></span>",

    "solution": "<p>The <b>Singh Sabhas</b> aimed at <b>reforming the Sikh society</b>.</p><p>&bull; The Singh Sabhas started in Lahore and Amritsar in 1870 were aimed at reforming the Sikh society.</p><p>&bull; They helped to set up the Khalsa College at Amritsar in 1892.</p><p>&bull; They also encouraged Gurmukhi and Punjabi literature.</p><p>&bull; In 1920, the Akalis started a movement to remove the corrupt Mahants (priests) from the Sikh gurudwaras.</p><p>&bull; The British government was forced to make laws on this matter. Later, the Akalis organised themselves into a political party.</p>",

  },

    "options": [
      "<span class=\"eqt\">Debendranath Tagore</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2375;&#2348;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2344;&#2366;&#2341; &#2335;&#2376;&#2327;&#2379;&#2352;</span>",
      "<span class=\"eqt\">Keshab Chandra Sen</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2358;&#2357; &#2330;&#2306;&#2342;&#2381;&#2352; &#2360;&#2375;&#2344;</span>",
      "<span class=\"eqt\">Raja Rammohan Roy</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2366; &#2352;&#2366;&#2350;&#2350;&#2379;&#2361;&#2344; &#2352;&#2366;&#2351;</span>",

    "correct_option_id": 0,
    "solution": "<p>The <b>Tattvabodhini Sabha</b> (\"Truth-Enlightenment Society\") was founded in <b>1839</b> by <b>Debendranath Tagore</b> (father of Rabindranath Tagore) to:</p><p>&bull; Promote <b>rational inquiry</b> and <b>modern education</b> within Hinduism.</p><p>&bull; Revive the <b>philosophical roots of the Brahmo Samaj</b> (which had grown stagnant after Raja Rammohan Roy's death in 1833).</p><p>&bull; Publish the <b>Tattvabodhini Patrika</b>, a journal disseminating progressive ideas.</p>",

    "question": "<span class=\"eqt\"><p>Swami Vivekananda participated in the Parliament of Religions held in which city?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2357;&#2366;&#2350;&#2368; &#2357;&#2367;&#2357;&#2375;&#2325;&#2366;&#2344;&#2306;&#2342; &#2344;&#2375; &#2325;&#2367;&#2360; &#2358;&#2361;&#2352; &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2343;&#2352;&#2381;&#2350; &#2360;&#2306;&#2360;&#2342; &#2350;&#2375;&#2306; &#2349;&#2366;&#2327; &#2354;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">New York</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2351;&#2377;&#2352;&#2381;&#2325;</span>",
      "<span class=\"eqt\">London</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2306;&#2342;&#2344;</span>",
      "<span class=\"eqt\">Chicago</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2325;&#2366;&#2327;&#2379;</span>",
      "<span class=\"eqt\">Paris</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2352;&#2367;&#2360;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Swami Vivekananda</b> participated at the <b>Parliament of Religions held in Chicago (USA) in September 1893</b>.</p><p><b>Further information:</b></p><p>&bull; The original name of Swami Vivekananda was Narendranath Dutta (1863-1902) and he became the most famous disciple of Shri Ramkrishna Paramahamsa.</p><p>&bull; He was born in a prosperous Bengali family of Calcutta and educated in Scottish Church College. In 1886 Narendranath took the vow of Sanyasa and was given the name, Vivekananda. He preached Vedantic Philosophy. He condemned the caste system and the current Hindu emphasis on rituals and ceremonies.</p><p>&bull; Swami Vivekananda participated at the Parliament of Religions held in Chicago (USA) in September 1893 and raised the prestige of India and Hinduism very high.</p><p>&bull; He founded the Ramkrishna Mission at Belur in Howrah in 1897. It is a social service and charitable society. The objectives of this Mission are providing humanitarian relief and social work through the establishment of schools, colleges, hospitals and orphanages.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following established a Sanskrit College at Benares to promote the study of Hindu laws and philosophy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2344;&#2375; &#2361;&#2367;&#2306;&#2342;&#2370; &#2325;&#2366;&#2344;&#2370;&#2344; &#2324;&#2352; &#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2344;&#2366;&#2352;&#2360; &#2350;&#2375;&#2306; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340; &#2325;&#2377;&#2354;&#2375;&#2332; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;?</p></span>",
    "options": [

    "correct_option_id": 1,
    "solution": "<p>In 1791, due to the sincere efforts of the British resident, <b>Jonathan Duncan</b>, a <b>Sanskrit College was established in Benares</b> to:</p><p>&bull; Promote the study of <b>Hindu laws, philosophy, and scriptures</b> under British supervision.</p><p>&bull; Train <b>Indian pundits</b> to assist colonial courts in interpreting Hindu legal texts.</p><p>&bull; Balance <b>orientalist scholarship</b> with colonial administrative needs.</p>",

    "question": "<span class=\"eqt\"><p>Which Charter Act made a provision to spend one lakh rupees per annum for the spread of education in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2319;&#2325; &#2354;&#2366;&#2326; &#2352;&#2369;&#2346;&#2351;&#2375; &#2326;&#2352;&#2381;&#2330; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Charter Act of 1793</span><span class=\"hqt\" style=\"display:none\">1793 &#2325;&#2366; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Charter Act of 1813</span><span class=\"hqt\" style=\"display:none\">1813 &#2325;&#2366; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>Charter Act of 1813 adopted a provision to spend one lakh rupees per annum for the spread of education in India</b>.</p><p>The <b>Charter Act of 1813</b> included a historic provision:</p><p>&bull; <b>Annual expenditure of &#8377;1 lakh</b> for the \"revival and improvement of literature, encouragement of learned natives, and promotion of knowledge of sciences among Indians.\"</p><p>&bull; This marked the <b>first official British commitment</b> to education in India.</p><p>&bull; Funds were initially used for <b>oriental learning</b> (Sanskrit, Arabic, Persian) but later shifted to <b>English education</b> (post-1835 Macaulay Minute).</p>",
    "question_index": 9
  },

    "question": "<span class=\"eqt\"><p>Wood's Despatch of 1854 recommended the establishment of universities in which of the following cities?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2369;&#2337;&#2381;&#2360; &#2337;&#2367;&#2360;&#2381;&#2346;&#2376;&#2330; 1854 &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2358;&#2361;&#2352; &#2350;&#2375;&#2306; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Delhi, Agra, Lahore</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2354;&#2381;&#2354;&#2368;, &#2310;&#2327;&#2352;&#2366;, &#2354;&#2366;&#2361;&#2380;&#2352;</span>",

      "<span class=\"eqt\">Benares, Allahabad, Patna</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2344;&#2366;&#2352;&#2360;, &#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342;, &#2346;&#2335;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Surat, Ahmedabad, Nagpur</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2352;&#2340;, &#2309;&#2361;&#2350;&#2342;&#2366;&#2348;&#2366;&#2342;, &#2344;&#2366;&#2327;&#2346;&#2369;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Wood's Despatch</b> recommended the establishment of <b>one University each in Calcutta, Bombay, and Madras</b>, on the model of the London University.</p><p><b>Wood's Despatch of 1854</b> (also called the <b>\"Magna Carta of English Education in India\"</b>) recommended:</p><p>&bull; Establishing <b>universities in Calcutta, Bombay, and Madras</b> (1857) based on the <b>London University model</b>.</p><p>&bull; Promoting <b>Western education</b> while retaining Indian languages.</p><p>&bull; Creating a <b>hierarchical education system</b> (schools &rarr; colleges &rarr; universities).</p>",

    "question": "<span class=\"eqt\"><p>Match the Movement with its associated figure:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Movement/Organization</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Associated Figure</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Ramakrishna Mission</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Periyar E.V.R.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Self-Respect Movement</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Swami Vivekananda</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Theosophical Society</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Annie Besant</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Prarthana Samaj</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Dr. Atmaram Pandurang</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2330;&#2367;&#2340;&#2381;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2310;&#2306;&#2342;&#2379;&#2354;&#2344;/&#2360;&#2306;&#2327;&#2336;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2306;&#2348;&#2342;&#2381;&#2343; &#2330;&#2367;&#2340;&#2381;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2352;&#2366;&#2350;&#2325;&#2371;&#2359;&#2381;&#2339; &#2350;&#2367;&#2358;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2346;&#2375;&#2352;&#2367;&#2351;&#2366;&#2352; &#2312;.&#2357;&#2368;.&#2310;&#2352;.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2310;&#2340;&#2381;&#2350;-&#2360;&#2350;&#2381;&#2350;&#2366;&#2344; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2360;&#2381;&#2357;&#2366;&#2350;&#2368; &#2357;&#2367;&#2357;&#2375;&#2325;&#2366;&#2344;&#2306;&#2342;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2341;&#2367;&#2351;&#2379;&#2360;&#2379;&#2347;&#2367;&#2325;&#2354; &#2360;&#2379;&#2360;&#2366;&#2311;&#2335;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2319;&#2344;&#2368; &#2348;&#2375;&#2360;&#2375;&#2306;&#2335;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2346;&#2381;&#2352;&#2366;&#2352;&#2381;&#2341;&#2344;&#2366; &#2360;&#2350;&#2366;&#2332;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2337;&#2377;. &#2310;&#2340;&#2381;&#2350;&#2366;&#2352;&#2366;&#2350; &#2346;&#2366;&#2306;&#2337;&#2369;&#2352;&#2306;&#2327;</td></tr></table></span>",

    "correct_option_id": 1,
    "solution": "<p>&bull; The <b>Ramakrishna Mission</b> was founded by <b>Swami Vivekananda</b>.</p><p>&bull; The <b>Self-Respect Movement</b> was started by <b>Periyar E.V.R.</b></p><p>&bull; <b>Annie Besant</b> took over the leadership of the <b>Theosophical Society</b>.</p><p>&bull; The <b>Prarthana Samaj</b> was founded by <b>Dr. Atmaram Pandurang</b>.</p><p>Further information:</p><p>&bull; Ramakrishna Mission</p><p>o <b>Swami Vivekananda</b> founded the Ramkrishna Mission at Belur in Howrah in 1897. It is a social service and charitable society. The objectives of this Mission are providing humanitarian relief and social work through the establishment of schools, colleges, hospitals and orphanages.</p><p>&bull; Periyar E.V. Ramaswamy from Tamil Nadu was a great social reformer.</p><p>o In 1921, during the anti-liquor campaign he cut down 1000 coconut trees in his own farm.</p><p>o In 1924, he took an active part in the Vaikam Satyagraha. The objective of the Satyagraha was to secure for untouchables the right to use a road near a temple at Vaikom in Kerala.</p><p>o E.V.R. opposed the Varnashrama policy followed in the V.V.S. Iyer's Seranmadevi Gurugulam. During 1920- 1925 being in the Congrees Party he stressed that Congress should accept communal representation.</p><p>o Subsequently in 1925, he started the \"Self-Respect Movement\". The aims of the 'Self -Respect Movement' were to uplift the Dravidians and to expose the Brahminical tyrany and deceptive methods by which they controlled all spheres of Hindu life.</p><p>o He denounced the caste system, child marriage and enforced widowhood. He encouraged inter-caste marriages. He himself conducted many marriages without any rituals. Such a marriage was known as \"Self- Respect Marriage.\" He gave secular names to new born babies. He attacked the laws of Manu, which he called the basis of the entire Hindu social fabric of caste.</p><p>o He founded the Tamil journals Kudiarasu, Puratchi and Viduthalai to propagate his ideals.</p><p>o In 1938 at Tamil Nadu Women's Conference appreciatin the noble service rendered by E.V.R. he was given the title \"Periyar\".</p><p>o On 27th June 1970 by the UNESCO organisation praised and adorned with the title \"Socrates of South Asia\".</p><p>&bull; The Theosophical Society was founded in New York (USA) in 1875 by Madam H.P. Blavatsky, a Russian lady, and Henry Steel Olcott, an American colonel.</p><p>o Their main objectives were to form a universal brotherhood of man without any distinction of race, colour or creed and to promote the study of ancient religions and philosophies.</p><p>o They arrived in India and established their headquarters at Adyar in Madras in 1882. Later in 1893, Mrs. Annie Besant arrived in India and took over the leadership of the Society after the death of Olcott.</p><p>o Mrs. Annie Besant founded the Central Hindu School along with Madan Mohan Malaviya at Benaras which later developed into the Banaras Hindu University.</p><p>&bull; The Prarthana Samaj was founded in 1867 in Bombay by Dr. Atmaram Pandurang.</p><p>o It was an off-shoot of Brahmo Samaj. It was a reform movement within Hinduism and concentrated on social reforms like inter-dining, inter-marriage, widow remarriage and uplift of women and depressed classes.</p><p>o Justice M.G. Ranade and R.G. Bhandarkar joined it in 1870 and infused new strength to it. Justice Ranade promoted the Deccan Education Society.</p>",
    "question_index": 11
  },

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct?</p><p>I. Warren Hastings established a Madrasa in Calcutta in 1781 to encourage the study of Muslim laws along with Arabic and Persian languages.</p><p>II. In 1791, a Sanskrit College was established in Madras to promote the study of Hindu laws and philosophy due to the efforts of Jonathan Duncan.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p><p>I. &#2357;&#2366;&#2352;&#2375;&#2344; &#2361;&#2375;&#2360;&#2381;&#2335;&#2367;&#2306;&#2327;&#2381;&#2360; &#2344;&#2375; &#2309;&#2352;&#2348;&#2368; &#2324;&#2352; &#2347;&#2364;&#2366;&#2352;&#2360;&#2368; &#2349;&#2366;&#2359;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341;-&#2360;&#2366;&#2341; &#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2325;&#2366;&#2344;&#2370;&#2344;&#2379;&#2306; &#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2379; &#2346;&#2381;&#2352;&#2379;&#2340;&#2381;&#2360;&#2366;&#2361;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 1781 &#2350;&#2375;&#2306; &#2325;&#2354;&#2325;&#2340;&#2381;&#2340;&#2366; &#2350;&#2375;&#2306; &#2319;&#2325; &#2350;&#2342;&#2352;&#2360;&#2366; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;&#2404;</p><p>II. 1791 &#2350;&#2375;&#2306;, &#2332;&#2379;&#2344;&#2366;&#2341;&#2344; &#2337;&#2306;&#2325;&#2344; &#2325;&#2375; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360;&#2379;&#2306; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2361;&#2367;&#2306;&#2342;&#2370; &#2325;&#2366;&#2344;&#2370;&#2344;&#2379;&#2306; &#2324;&#2352; &#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2342;&#2381;&#2352;&#2366;&#2360; &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340; &#2325;&#2377;&#2354;&#2375;&#2332; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement I is correct as <b>Warren Hastings established a Madrasa in Calcutta in 1781</b> for the study of Muslim laws, Arabic, and Persian.</p><p>Statement II is incorrect as the <b>Sanskrit College was established in Benares (Banaras)</b>, not Madras, due to the efforts of Jonathan Duncan in 1791.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is incorrect regarding Raja Rammohan Roy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2366; &#2352;&#2366;&#2350;&#2350;&#2379;&#2361;&#2344; &#2352;&#2366;&#2351; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Raja Rammohan Roy established the Brahmo Samaj at Calcutta in 1828.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2366; &#2352;&#2366;&#2350;&#2350;&#2379;&#2361;&#2344; &#2352;&#2366;&#2351; &#2344;&#2375; 1828 &#2350;&#2375;&#2306; &#2325;&#2354;&#2325;&#2340;&#2381;&#2340;&#2366; &#2350;&#2375;&#2306; &#2348;&#2381;&#2352;&#2361;&#2381;&#2350; &#2360;&#2350;&#2366;&#2332; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;&#2404;</span>",
      "<span class=\"eqt\">He is considered as the first 'modern man of India'.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; '&#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2346;&#2369;&#2352;&#2369;&#2359;' &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">In 1830, he established the Atmiya Sabha.</span><span class=\"hqt\" style=\"display:none\">1830 &#2350;&#2375;&#2306; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2310;&#2340;&#2381;&#2350;&#2368;&#2351; &#2360;&#2349;&#2366; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Rammohan Roy started the first Bengali weekly Samvad Kaumudi and edited a Persian weekly Mirat-ul-akhbar.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2350;&#2350;&#2379;&#2361;&#2344; &#2352;&#2366;&#2351; &#2344;&#2375; &#2346;&#2361;&#2354;&#2366; &#2348;&#2306;&#2327;&#2366;&#2354;&#2368; &#2360;&#2366;&#2346;&#2381;&#2340;&#2366;&#2361;&#2367;&#2325; '&#2360;&#2306;&#2357;&#2366;&#2342; &#2325;&#2380;&#2350;&#2369;&#2342;&#2368;' &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2347;&#2364;&#2366;&#2352;&#2360;&#2368; &#2360;&#2366;&#2346;&#2381;&#2340;&#2366;&#2361;&#2367;&#2325; '&#2350;&#2367;&#2352;&#2366;&#2340;-&#2313;&#2354;-&#2309;&#2326;&#2364;&#2348;&#2366;&#2352;' &#2325;&#2366; &#2360;&#2306;&#2346;&#2366;&#2342;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Raja Rammohan Roy established the Brahmo Samaj at Calcutta in 1828 in order to purify Hinduism and to preach monotheism. He is considered as the first 'modern man of India'.</p><p>&bull; He was a pioneer of socio-religious reform movements in modern India. Born in 1772 in the Hooghly district of Bengal, he inculcated a brilliant freedom of thought and rationality.</p><p>&bull; He studied the Bible as well as Hindu and Muslim religious texts. He had excellent command over many languages including English, Sanskrit, Persian, Arabic, French, Latin, Greek and Hebrew.</p><p>&bull; In 1815, he established the Atmiya Sabha. Later, it was developed into the Brahmo Sabha in August 1828.</p><p>&bull; Through this organisation, he preached that there is only one God.</p><p>&bull; He combined the teachings of the Upanishads, the Bible and the Koran in developing unity among the people of different religions.</p><p>&bull; The work of the Atmiya Sabha was carried on by Maharishi Debendranath Tagore (father of Rabindranath Tagore), who renamed it as Brahmo Samaj.</p><p>&bull; He turned the Brahmo Samaj into a leading social organisation of India.</p><p>&bull; Raj Rammohan Roy is most remembered for helping Lord William Bentinck to declare the practice of Sati a punishable offence in 1829.</p><p>&bull; He also protested against the child marriage and female infanticide. He favored the remarriage of widows, female education and women's right to property.</p><p>&bull; He felt that the caste system was the greatest hurdle to Indian unity. He believed in the equality of mankind.</p><p>&bull; He did not believe in the supremacy of the Brahmin priests. He favoured inter-caste marriages.</p><p>&bull; He himself adopted a Muslim boy.</p><p>&bull; In 1817, he founded the Hindu College (now Presidency College, Calcutta) along with David Hare, a missionary.</p><p>&bull; He also set up schools for girls. Rammohan Roy started the first Bengali weekly Samvad Kaumudi and edited a Persian weekly Mirat-ul-akhbar.</p><p>&bull; He stood for the freedom of the press. Rammohan died in Bristol in England in 1833.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct regarding social reform movements?</p><p>I. The Brahmo Samaj, established by Raja Rammohan Roy, aimed to purify Hinduism and preach monotheism.</p><p>II. Swami Dayanand Saraswati, the founder of Arya Samaj, believed that the Vedas were the source of true knowledge.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2352;&#2366;&#2332;&#2366; &#2352;&#2366;&#2350;&#2350;&#2379;&#2361;&#2344; &#2352;&#2366;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2348;&#2381;&#2352;&#2361;&#2381;&#2350; &#2360;&#2350;&#2366;&#2332; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2361;&#2367;&#2306;&#2342;&#2370; &#2343;&#2352;&#2381;&#2350; &#2325;&#2379; &#2358;&#2369;&#2342;&#2381;&#2343; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2319;&#2325;&#2375;&#2358;&#2381;&#2357;&#2352;&#2357;&#2366;&#2342; &#2325;&#2366; &#2346;&#2381;&#2352;&#2330;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366; &#2341;&#2366;&#2404;</p><p>II. &#2310;&#2352;&#2381;&#2351; &#2360;&#2350;&#2366;&#2332; &#2325;&#2375; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325; &#2360;&#2381;&#2357;&#2366;&#2350;&#2368; &#2342;&#2351;&#2366;&#2344;&#2306;&#2342; &#2360;&#2352;&#2360;&#2381;&#2357;&#2340;&#2368; &#2325;&#2366; &#2350;&#2366;&#2344;&#2344;&#2366; &#8203;&#8203;&#2341;&#2366; &#2325;&#2367; &#2357;&#2375;&#2342; &#2361;&#2368; &#2360;&#2330;&#2381;&#2330;&#2375; &#2332;&#2381;&#2334;&#2366;&#2344; &#2325;&#2366; &#2360;&#2381;&#2352;&#2379;&#2340; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct. The <b>Brahmo Samaj (founded in 1828 by Raja Ram Mohan Roy)</b> aimed to:</p><p>&bull; Reform <b>Hinduism</b> by rejecting idolatry, caste, and superstitions.</p><p>&bull; Promote <b>monotheism and rational worship</b> (drawing from Upanishads, not Islam).</p><p>Statement II is correct. <b>Swami Dayananda Saraswati (founder of Arya Samaj, 1875)</b> asserted:</p><p>&bull; <b>\"Back to the Vedas\"</b> as the ultimate source of knowledge.</p><p>&bull; Rejected later Hindu practices (idol worship, caste) as corruptions.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Who founded the \"Temple Entry Movement\" in Kerala?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2352;&#2354; &#2350;&#2375;&#2306; \"&#2350;&#2306;&#2342;&#2367;&#2352; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;\" &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Narayana Guru</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2352;&#2366;&#2351;&#2339; &#2327;&#2369;&#2352;&#2369;</span>",
      "<span class=\"eqt\">Chattampi Swamikal</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2335;&#2381;&#2335;&#2350;&#2381;&#2346;&#2367; &#2360;&#2381;&#2357;&#2366;&#2350;&#2368;&#2325;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Ayyankali</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2351;&#2306;&#2325;&#2366;&#2354;&#2368;</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The <b>Temple Entry Movement</b> in Kerala was a collective effort by multiple reformers to end caste-based discrimination in Hindu temples. Key figures included:</p><p><b>Narayana Guru</b> (1856 - 1928):</p><p>o Advocated <b>\"One Caste, One Religion, One God\"</b> and consecrated temples for lower castes (e.g., <b>Aruvippuram Temple</b>, 1888).</p><p><b>Chattampi Swamikal</b> (1853 - 1924):</p><p>o Criticized Brahmin dominance and supported <b>spiritual equality</b>.</p><p><b>Ayyankali</b> (1863 - 1941):</p><p>o Fought for <b>Dalit rights</b>, including temple entry and access to public spaces.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following is associated with Young Bengal Movement?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2351;&#2369;&#2357;&#2366; &#2348;&#2306;&#2327;&#2366;&#2354; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Raja Ram Mohan Roy</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2366; &#2352;&#2366;&#2350; &#2350;&#2379;&#2361;&#2344; &#2352;&#2366;&#2351;</span>",
      "<span class=\"eqt\">Ishwar Chandra Vidyasagar</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2358;&#2381;&#2357;&#2352; &#2330;&#2306;&#2342;&#2381;&#2352; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2360;&#2366;&#2327;&#2352;</span>",
      "<span class=\"eqt\">Rabindranath Tagore</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2368;&#2344;&#2381;&#2342;&#2381;&#2352;&#2344;&#2366;&#2341; &#2335;&#2376;&#2327;&#2379;&#2352;</span>",
      "<span class=\"eqt\">Henry Vivian Derozio</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2344;&#2352;&#2368; &#2357;&#2367;&#2357;&#2367;&#2351;&#2344; &#2337;&#2375;&#2352;&#2379;&#2332;&#2364;&#2367;&#2351;&#2379;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Henry Vivian Derozio was the founder of the Young Bengal Movement. He was born in Calcutta in 1809 and taught in the Hindu College, Calcutta.</p><p>&bull; He died of cholera in 1833. His followers were known as the Derozians and their movement the Young Bengal Movement.</p><p>&bull; They attacked old traditions and decadent customs. They also advocated women's rights and their education.</p><p>&bull; They founded associations and organized debates against idol worship, casteism and superstitions.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Who founded the Nirankari Movement?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2352;&#2306;&#2325;&#2366;&#2352;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Baba Dayal Das</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2348;&#2366; &#2342;&#2351;&#2366;&#2354; &#2342;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Baba Ram Singh</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2348;&#2366; &#2352;&#2366;&#2350; &#2360;&#2367;&#2306;&#2361;</span>",
      "<span class=\"eqt\">Sant Ravidas</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2340; &#2352;&#2357;&#2367;&#2342;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Guru Nanak Dev Ji</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2369; &#2344;&#2366;&#2344;&#2325; &#2342;&#2375;&#2357; &#2332;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Sikh Reform Movement</b></p><p>&bull; Punjab also came under the spell of reforms. Baba Dayal Das founded the Nirankari Movement.</p><p>&bull; He insisted the worship of God as nirankar (formless).</p><p>&bull; The Namdhari Movement was founded by Baba Ram Singh.</p><p>&bull; His followers wore white clothes and gave up meat eating.</p><p>&bull; The Singh Sabhas started in Lahore and Amritsar in 1870 were aimed at reforming the Sikh society.</p><p>&bull; They helped to set up the Khalsa College at Amritsar in 1892.They also encouraged Gurmukhi and Punjabi literature.</p><p>&bull; In 1920, the Akalis started a movement to remove the corrupt Mahants (priests) from the Sikh gurudwaras.</p><p>&bull; The British government was forced to make laws on this matter. Later, the Akalis organised themselves into a political party.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>The Parsi Religious Reform Association was founded at Bombay by Furdunji Naoroji and S.S. Bengalee in _________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2352;&#2360;&#2368; &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352; &#2360;&#2306;&#2328; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2348;&#2306;&#2348;&#2312; &#2350;&#2375;&#2306; &#2347;&#2369;&#2352;&#2342;&#2369;&#2344;&#2332;&#2368; &#2344;&#2380;&#2352;&#2379;&#2332;&#2368; &#2324;&#2352; &#2319;&#2360;.&#2319;&#2360;. &#2348;&#2306;&#2327;&#2366;&#2354;&#2368; &#2344;&#2375; _________ &#2350;&#2375;&#2306; &#2325;&#2368; &#2341;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1851</span><span class=\"hqt\" style=\"display:none\">1851</span>",
      "<span class=\"eqt\">1881</span><span class=\"hqt\" style=\"display:none\">1881</span>",
      "<span class=\"eqt\">1861</span><span class=\"hqt\" style=\"display:none\">1861</span>",
      "<span class=\"eqt\">1871</span><span class=\"hqt\" style=\"display:none\">1871</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Parsi Reform Movement</p><p>&bull; The Parsi Religious Reform Association was founded at Bombay by Furdunji Naoroji and S.S. Bengalee in 1851.</p><p>&bull; They advocated the spread of women's education. They also wanted to reform their marriage customs.</p><p>&bull; Naoroji published a monthly journal, Jagat Mithra. The momentum gathered through these reform movements and went a long way in uplifting the entire community.</p><p>&bull; By the middle of the twentieth century most of them were highly placed in various capacities and have made a significant contribution to India's development.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>_________formed the Bhaiskrit Hitkarini Sabha in __________ in Bombay.</p></span><span class=\"hqt\" style=\"display:none\"><p>_________ &#2344;&#2375; &#2348;&#2377;&#2350;&#2381;&#2348;&#2375; &#2350;&#2375;&#2306; __________ &#2350;&#2375;&#2306; &#2349;&#2366;&#2312;&#2360;&#2381;&#2325;&#2371;&#2340; &#2361;&#2367;&#2340;&#2325;&#2366;&#2352;&#2367;&#2339;&#2368; &#2360;&#2349;&#2366; &#2325;&#2366; &#2327;&#2336;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Jyotirao Phule, 1854</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2381;&#2351;&#2379;&#2340;&#2367;&#2352;&#2366;&#2357; &#2347;&#2369;&#2354;&#2375;, 1854</span>",
      "<span class=\"eqt\">Gopal Hari Deshmukh, 1868</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2346;&#2366;&#2354; &#2361;&#2352;&#2367; &#2342;&#2375;&#2358;&#2350;&#2369;&#2326;, 1868</span>",
      "<span class=\"eqt\">B R Ambedkar, 1924</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368; &#2310;&#2352; &#2309;&#2306;&#2348;&#2375;&#2337;&#2325;&#2352;, 1924</span>",
      "<span class=\"eqt\">Mahadev Govind Ranade, 1870</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2342;&#2375;&#2357; &#2327;&#2379;&#2357;&#2367;&#2306;&#2342; &#2352;&#2366;&#2344;&#2366;&#2337;&#2375;, 1870</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Dr. Bhimrao Ambedkar dedicated his entire life for the welfare of the downtrodden.</p><p>&bull; In Bombay, he formed a Bahiskrit Hitkarini Sabha in July 1924 for this purpose.</p><p>&bull; The Sabha's name translates to \"Association for the Welfare of the Excluded.\"</p><p>&bull; Later, he also organised the Akhil Bharatiya Dalit Varg Sabha to fight against caste oppression.</p><p><b>Further information:</b></p><p>Jyotirao Phule in Western India and Shri Narayana Guru in Kerala respectively established the Satya Sadhak Samaj and the Shri Narayana Dharma Partipalana Yogam to include self-esteem among the downtrodden.</p><p><b>Gopal Hari Deshmukh</b> (Lokahitawadi) focused on reform through writings, not this organization.</p><p><b>M.G. Ranade</b> worked with the <b>Prarthana Samaj</b>.</p>",
    "question_index": 19
  }
