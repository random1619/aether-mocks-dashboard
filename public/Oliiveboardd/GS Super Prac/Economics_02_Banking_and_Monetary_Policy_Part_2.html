    "question": "<span class=\"eqt\"><p>Consider the following statements about the history of Indian banking:</p><p><b>a.</b> The Imperial Bank of India was formed in 1921 by the merger of three Presidency Banks: Bank of Bengal, Bank of Bombay, and Bank of Madras.</p><p><b>b.</b> The first purely Indian bank, Punjab National Bank, was founded in 1894.</p><p><b>c.</b> The nationalization of banks in 1969 brought 20 banks under government control.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2325;&#2375; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2311;&#2306;&#2346;&#2368;&#2352;&#2367;&#2351;&#2354; &#2348;&#2376;&#2306;&#2325; &#2321;&#2347; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2366; &#2327;&#2336;&#2344; 1921 &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2346;&#2381;&#2352;&#2375;&#2360;&#2368;&#2337;&#2375;&#2306;&#2360;&#2368; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306;: &#2348;&#2376;&#2306;&#2325; &#2321;&#2347; &#2348;&#2306;&#2327;&#2366;&#2354;, &#2348;&#2376;&#2306;&#2325; &#2321;&#2347; &#2348;&#2377;&#2350;&#2381;&#2348;&#2375; &#2324;&#2352; &#2348;&#2376;&#2306;&#2325; &#2321;&#2347; &#2350;&#2342;&#2381;&#2352;&#2366;&#2360; &#2325;&#2375; &#2357;&#2367;&#2354;&#2351; &#2360;&#2375; &#2361;&#2369;&#2310; &#2341;&#2366;&#2404;</p><p>b. &#2346;&#2361;&#2354;&#2366; &#2357;&#2367;&#2358;&#2369;&#2342;&#2381;&#2343; &#2352;&#2370;&#2346; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325;, &#2346;&#2306;&#2332;&#2366;&#2348; &#2344;&#2375;&#2358;&#2344;&#2354; &#2348;&#2376;&#2306;&#2325;, 1894 &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>c. 1969 &#2350;&#2375;&#2306; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351;&#2325;&#2352;&#2339; &#2344;&#2375; 20 &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2354;&#2366; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">a and b only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">b and c only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",

dia, Oriental Bank of Commerce, Punjab &amp; Sind Bank, Vijaya Bank</p>",

    "solution": "<p>&bull; The RBI is the <b>sole issuer of currency</b> in India.</p><p>&bull; The RBI acts as the <b>custodian of India's foreign exchange reserves</b>.</p><p>&bull; As the <b>monetary authority</b>, the RBI controls the money supply and inflation.</p><p>&bull; As the <b>banker to the government</b>, the RBI manages government loans and public debt.</p><p><b>Further Insight:</b></p><p>&bull; <b>The RBI is the central bank of India established in 1935 under RBI act 1934 and plays a key role in regulating the monetary policy, overseeing banking operations, and ensuring economic stability.</b></p><p>&bull; <b>Monetary Authority</b>: Controls the supply of money to stabilize exchange rates, inflation, and overall economic growth.</p><p>&bull; <b>Issuer of Currency</b>: RBI has the sole authority to issue currency, ensuring security and reliability.</p><p>&bull; Issuer of Banking Licenses: Every bank must acquire a license from the RBI.</p><p>&bull; <b>Banker to the Government:</b> Provides financial services to the government, managing loans and public debt.</p><p>&bull; <b>Lender of Last Resort: Provides funds to banks in need during financial distress.</b></p><p>&bull; <b>Custodian of Foreign Reserves</b>: Manages India's foreign exchange reserves.</p><p>&bull; Manager of Government Securities: Regulates government investments in bonds and securities.</p><p>&bull; <b>Regulator and Supervisor of Payment and Settlement Systems</b>: Oversees the security and efficiency of financial transactions in the country.</p><p>&bull; Developmental Role: Promotes banking outreach, financial literacy, and national economic goals.</p><p>&bull; Publisher of Economic Data: Regularly collects and disseminates financial and economic data.</p><p>&bull; <b>Banking Ombudsman:</b> Provides a grievance redressal mechanism for customers to file complaints against banks.</p>",
