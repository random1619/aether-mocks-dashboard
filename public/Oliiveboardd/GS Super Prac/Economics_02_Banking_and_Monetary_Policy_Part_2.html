    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements best describes the primary function of the Indian banking system ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Indian banks focus primarily on catering to the corporate sector and large enterprises.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2377;&#2352;&#2381;&#2346;&#2379;&#2352;&#2375;&#2335; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2324;&#2352; &#2348;&#2337;&#2364;&#2375; &#2313;&#2342;&#2381;&#2351;&#2350;&#2379;&#2306; &#2346;&#2352; &#2343;&#2381;&#2351;&#2366;&#2344; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The banking system in India serves individuals, corporates, and the government but excludes rural sectors from its main operations.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306;, &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2360;&#2375;&#2357;&#2366;&#2319;&#2306; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2346;&#2352;&#2367;&#2330;&#2366;&#2354;&#2344; &#2360;&#2375; &#2348;&#2366;&#2361;&#2352; &#2352;&#2326;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The Indian banking system plays a crucial role in the country's economic growth by catering to diverse sectors, including individuals, corporations, and government bodies.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306;, &#2344;&#2367;&#2327;&#2350;&#2379;&#2306; &#2324;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2344;&#2367;&#2325;&#2366;&#2351;&#2379;&#2306; &#2360;&#2361;&#2367;&#2340; &#2357;&#2367;&#2357;&#2367;&#2343; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366;&#2323;&#2306; &#2325;&#2368; &#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2352;&#2325;&#2375; &#2342;&#2375;&#2358; &#2325;&#2368; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2350;&#2375;&#2306; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2344;&#2367;&#2349;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">By providing loan and ensure profits of the Banks</span><span class=\"hqt\" style=\"display:none\">&#2315;&#2339; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2325;&#2352;&#2366;&#2325;&#2352; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2354;&#2366;&#2349; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The Indian banking system caters to diverse needs, including rural sectors and small enterprises, not just large corporations.</p><p>&bull; Rural sectors are very much a part of the banking system, especially through <b>Regional Rural Banks (RRBs)</b> and <b>Small Finance Banks (SFBs)</b>.</p><p>&bull; <b>The Indian banking system caters to various sectors, promoting growth across individuals, businesses, and governmental entities.</b></p><p><b>Further Insight:</b></p><p>&bull; Section 45 of the Reserve Bank of India Act, 1934, provides for appointment of scheduled commercial banks as agents at all places or at any place in India, for purposes that it may specify, \"<b>having regard to public interest, convenience of banking, banking development and such other factors which in its opinion are relevant in this regard</b>\".</p><p>&bull; According to the Section 5(b) of the Banking Regulation Act, 1949, <b>banking is defined as the process of accepting deposits of money from the public for lending or investment, repayable on demand or as otherwise agreed upon, and withdrawable through cheques, drafts, orders, or other instruments</b>.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following events did NOT directly lead to the formation of the State Bank of India (SBI)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2328;&#2335;&#2344;&#2366; &#2360;&#2368;&#2343;&#2375; &#2340;&#2380;&#2352; &#2346;&#2352; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2381;&#2335;&#2375;&#2335; &#2348;&#2376;&#2306;&#2325; (&#2319;&#2360;&#2348;&#2368;&#2310;&#2312;) &#2325;&#2375; &#2327;&#2336;&#2344; &#2325;&#2366; &#2325;&#2366;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2348;&#2344;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">The merger of the Presidency Banks to form the Imperial Bank of India in 1921.</span><span class=\"hqt\" style=\"display:none\">1921 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2375;&#2360;&#2368;&#2337;&#2375;&#2306;&#2360;&#2368; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2357;&#2367;&#2354;&#2351; &#2325;&#2352;&#2325;&#2375; &#2311;&#2306;&#2346;&#2368;&#2352;&#2367;&#2351;&#2354; &#2348;&#2376;&#2306;&#2325; &#2321;&#2347; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368; &#2327;&#2312;&#2404;</span>",
      "<span class=\"eqt\">The formation of three Presidency Banks in Bengal in 1806, Bombay in 1840 and Madras in 1843.</span><span class=\"hqt\" style=\"display:none\">1806 &#2350;&#2375;&#2306; &#2348;&#2306;&#2327;&#2366;&#2354; &#2350;&#2375;&#2306;, 1840 &#2350;&#2375;&#2306; &#2348;&#2350;&#2381;&#2348;&#2312; &#2350;&#2375;&#2306; &#2340;&#2341;&#2366; 1843 &#2350;&#2375;&#2306; &#2350;&#2342;&#2381;&#2352;&#2366;&#2360; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2346;&#2381;&#2352;&#2375;&#2360;&#2368;&#2337;&#2375;&#2306;&#2360;&#2368; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2327;&#2336;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The nationalization of the Imperial Bank of India in 1955 to form the State Bank of India.</span><span class=\"hqt\" style=\"display:none\">1955 &#2350;&#2375;&#2306; &#2311;&#2306;&#2346;&#2368;&#2352;&#2367;&#2351;&#2354; &#2348;&#2376;&#2306;&#2325; &#2321;&#2347; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351;&#2325;&#2352;&#2339; &#2325;&#2352; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2381;&#2335;&#2375;&#2335; &#2348;&#2376;&#2306;&#2325; &#2325;&#2366; &#2327;&#2336;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The establishment of the Oudh Commercial Bank in 1881.</span><span class=\"hqt\" style=\"display:none\">1881 &#2350;&#2375;&#2306; &#2309;&#2357;&#2343; &#2325;&#2350;&#2352;&#2381;&#2358;&#2367;&#2351;&#2354; &#2348;&#2376;&#2306;&#2325; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; The Presidency Banks' merger in 1921 directly led to the formation of the <b>Imperial Bank of India</b>, a precursor to the <b>SBI</b>.</p><p>&bull; Nationalization of the <b>Imperial Bank of India</b> in 1955 was a key step in the creation of <b>SBI</b>.</p><p>&bull; <b>Oudh Commercial Bank</b> did not contribute directly to the formation of <b>SBI</b>. </p><p><b>Further Insight:</b></p><p>&bull; Bank of Hindustan (1770): This was the first bank established in India, founded by Alexander and Co. in Calcutta under European management.</p><p>&#9675; Shut down in <b>1832</b> due to financial difficulties and instability in the banking system at that time.</p><p>&bull; Presidency Banks: Three major banks followed:</p><p>&#9675; Bank of Bengal (1806)</p><p>&#9675; Bank of Bombay (1840)</p><p>&#9675; Bank of Madras (1843) </p><p>&#9675; These banks were set up under the British Raj and were collectively known as Presidency Banks. <b>They later merged to form the Imperial Bank of India in 1921, which eventually became the State Bank of India (SBI).</b></p><p>&bull; Oudh Commercial Bank (1881): The first bank with limited liability and an Indian board.</p><p>&bull; Punjab National Bank (1894): The first purely Indian bank, founded by Indians.</p><p>&bull; <b>State Bank of India (SBI): Formed in 1955, it was the first national bank of independent India.</b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>During the nationalization of banks in 1969, which of the following was NOT one of the 14 banks that were nationalized?</p></span><span class=\"hqt\" style=\"display:none\"><p>1969 &#2350;&#2375;&#2306; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351;&#2325;&#2352;&#2339; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2348;&#2376;&#2306;&#2325; &#2313;&#2344; 14 &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2344;&#2361;&#2368;&#2306; &#2341;&#2366; &#2332;&#2367;&#2344;&#2325;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351;&#2325;&#2352;&#2339; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bank of Baroda</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2306;&#2325; &#2321;&#2347; &#2348;&#2337;&#2364;&#2380;&#2342;&#2366;</span>",
      "<span class=\"eqt\">Punjab National Bank</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2332;&#2366;&#2348; &#2344;&#2375;&#2358;&#2344;&#2354; &#2348;&#2376;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Syndicate Bank</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2306;&#2337;&#2367;&#2325;&#2375;&#2335; &#2348;&#2376;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Corporation Bank</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2377;&#2352;&#2381;&#2346;&#2379;&#2352;&#2375;&#2358;&#2344; &#2348;&#2376;&#2306;&#2325;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Bank of Baroda, Punjab National Bank, Syndicate Bank were among the 14 banks nationalized in 1969, bringing them under government control to expand banking reach.</p><p>&bull; <b>Corporation Bank</b>, was nationalized later, in 1980, as part of the second wave of bank nationalizations.</p><p><b>Further Insight:</b></p><p>&bull; The nationalization of banks became a significant step post-independence, aimed at ensuring better reach and aiding economic development.</p><p>&bull; <b>Nationalization of Banks in 1969:</b> 14 major banks were nationalized to bring banking services under government control and facilitate more inclusive financial services. These banks were:</p><p>&#9675; Allahabad Bank, Bank of India, Bank of Baroda, Bank of Maharashtra, Central Bank of India, Canara Bank, Dena Bank, Indian Overseas Bank, Indian Bank, Punjab National Bank, Syndicate Bank, Union Bank of India, United Bank, UCO Bank</p><p>&bull; <b>Nationalization of Banks in 1980:</b> Six more banks were nationalized to increase the government's control over the banking sector. These banks were:</p><p>&#9675; Andhra Bank, Corporation Bank, New Bank of India, Oriental Bank of Commerce, Punjab &amp; Sind Bank, Vijaya Bank</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which key recommendation by the Narasimham Committee had the greatest impact on modernizing the Indian banking system during the economic reforms?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2352;&#2360;&#2367;&#2350;&#2381;&#2361;&#2350; &#2360;&#2350;&#2367;&#2340;&#2367; &#2325;&#2368; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358; &#2325;&#2366; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325;&#2368;&#2325;&#2352;&#2339; &#2346;&#2352; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2346;&#2337;&#2364;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Promotion of foreign bank entries into India.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Further nationalization of banks to increase government control.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351;&#2325;&#2352;&#2339; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Emphasis on technological advancements like digitization and online banking.</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2332;&#2367;&#2335;&#2354;&#2368;&#2325;&#2352;&#2339; &#2324;&#2352; &#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2332;&#2376;&#2360;&#2368; &#2340;&#2325;&#2344;&#2368;&#2325;&#2368; &#2346;&#2381;&#2352;&#2327;&#2340;&#2367; &#2346;&#2352; &#2332;&#2379;&#2352;&#2404;</span>",
      "<span class=\"eqt\">Complete deregulation of interest rates across all sectors.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352;&#2379;&#2306; &#2325;&#2366; &#2346;&#2370;&#2352;&#2381;&#2339; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Narasimham Committee</b> recommended encouraging the entry of foreign banks, which modernized banking services.</p><p>&bull; Committee recommended stopping further nationalization of banks, not continuing it.</p><p>&bull; While interest rates were deregulated, it was not across all sectors.</p><p><b>Further Insight:</b></p><p>&bull; <b>Narasimham Committee (1991)</b></p><p>&#9675; Formed to reform India's banking sector after the 1991 economic crisis, the committee aimed to make banks more efficient and competitive.</p><p>&#9675; <b>Key Recommendations:</b></p><p>&#9632; <b>Lower SLR and CRR</b>: To free up funds for lending.</p><p>&#9632; <b>Interest Rate Deregulation</b>: Allow market-determined interest rates.</p><p>&#9632; <b>Prudential Norms</b>: Stricter capital adequacy (8%) and NPA recognition.</p><p>&#9632; <b>Bank Autonomy</b>: Reduce government interference in public sector banks.</p><p>&#9632; <b>Private Sector Entry</b>: Allow new private banks for increased competition.</p><p>&bull; <b>Narasimham Committee II (1998)</b></p><p>&#9675; Focused on strengthening and stabilizing the banking sector for long-term resilience.</p><p>&#9675; <b>Key Recommendations:</b></p><p>&#9632; <b>Bank Mergers</b>: Consolidate strong banks for global competitiveness.</p><p>&#9632; <b>Capital Adequacy</b>: Raise CAR from 8% to 10%.</p><p>&#9632; <b>NPA Management</b>: Set up <b>ARCs</b> for better recovery.</p><p>&#9632; <b>Bank Autonomy</b>: More operational freedom for public sector banks.</p><p>&#9632; <b>Foreign Banks &amp; FDI: Encourage more foreign participation.</b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What is the most significant difference between <b>Scheduled Banks</b> and <b>Non-Scheduled Banks</b> in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2324;&#2352; &#2327;&#2376;&#2352;-&#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2348;&#2360;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2309;&#2306;&#2340;&#2352; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Scheduled Banks are mandated to keep higher capital reserves with the RBI compared to Non-Scheduled Banks.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2327;&#2376;&#2352;-&#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2325;&#2375; &#2346;&#2366;&#2360; &#2309;&#2343;&#2367;&#2325; &#2346;&#2370;&#2306;&#2332;&#2368; &#2349;&#2306;&#2337;&#2366;&#2352; &#2352;&#2326;&#2344;&#2375; &#2325;&#2366; &#2342;&#2366;&#2351;&#2367;&#2340;&#2381;&#2357; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Non-Scheduled Banks are exempt from maintaining any reserves with the RBI.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2352;-&#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2379;&#2312; &#2349;&#2368; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2344;&#2367;&#2343;&#2367; &#2352;&#2326;&#2344;&#2375; &#2360;&#2375; &#2331;&#2370;&#2335; &#2342;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Scheduled Banks are listed in the Second Schedule of the RBI Act, while Non-Scheduled Banks are not.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2368; &#2342;&#2370;&#2360;&#2352;&#2368; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2360;&#2370;&#2330;&#2368;&#2348;&#2342;&#2381;&#2343; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2327;&#2376;&#2352;-&#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2344;&#2361;&#2368;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Non-Scheduled Banks primarily focus on the corporate sector, while Scheduled Banks cater to both individuals and corporates.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2352;-&#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2348;&#2376;&#2306;&#2325; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2377;&#2352;&#2381;&#2346;&#2379;&#2352;&#2375;&#2335; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2346;&#2352; &#2343;&#2381;&#2351;&#2366;&#2344; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2348;&#2376;&#2306;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2325;&#2377;&#2352;&#2381;&#2346;&#2379;&#2352;&#2375;&#2335; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2375;&#2357;&#2366;&#2319;&#2306; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Capital reserves are maintained by Schedule banks but not necessarily higher than Non-Scheduled Banks.</p><p>&bull; Non-Scheduled Banks do maintain some reserves, though with more flexibility than Scheduled Banks.</p><p>&bull; <b>Scheduled Banks are listed in the Second Schedule of the RBI Act.</b></p><p>&bull; <b>Non-Scheduled Banks</b> typically operate on a smaller scale, not exclusively in the corporate sector.</p><p><b>Further Insight:</b></p><p>&bull; Banks in India are broadly classified into <b>Scheduled</b> and <b>Non-Scheduled Banks</b>.</p><p>&bull; <b>Scheduled Banks</b></p><p>&#9675; <b>Scheduled Banks are listed in the Second Schedule of the RBI Act, 1934. They must meet certain criteria, including maintaining a minimum paid-up capital of Rs. 5 lakhs. These banks are regulated and supervised by the RBI and play a major role in the Indian economy.</b></p><p>&#9675; <b>Categories include:</b></p><p>&#9632; Public Sector Banks: Currently, India has 12 public sector banks (down from 21 after mergers in 2019 and 2020). Examples include SBI, Punjab National Bank, and Bank of Baroda&#8203;</p><p>&#9632; Private Sector Banks: Major private banks include HDFC Bank, ICICI Bank, and Axis Bank.</p><p>&#9632; Foreign Banks: These banks operate within India but are incorporated abroad. Examples include Citibank, HSBC, and Deutsche Bank.</p><p>&#9632; Regional Rural Banks (RRBs): RRBs are jointly owned by the Government of India, state governments, and sponsor banks, serving rural and agricultural areas.</p><p>&#9632; Small Finance Banks (SFBs): Licensed under the Banking Regulation Act, these banks provide financial services to underserved and unserved sections, such as small businesses and farmers.</p><p>&#9632; Payment Banks: These banks primarily handle deposits and payment services but are restricted from lending<b>&#8203;</b></p><p>&bull; <b>2. Non-Scheduled Banks</b></p><p>&#9675; <b>Non-Scheduled Banks are not listed in the Second Schedule of the RBI Act. </b>They operate on a smaller scale, focusing on specific sectors and regions. These banks do not have to maintain reserves with the RBI and have more limited scope and operations.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following best describes the role of the <b>RBI</b> as the <b>\"Lender of Last Resort\"</b>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; RBI &#2325;&#2368; \"&#2309;&#2306;&#2340;&#2367;&#2350; &#2313;&#2346;&#2366;&#2351; &#2325;&#2375; &#2315;&#2339;&#2342;&#2366;&#2340;&#2366;\" &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The RBI directly lends to individuals and small enterprises in times of need.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2332;&#2352;&#2370;&#2352;&#2340; &#2325;&#2375; &#2360;&#2350;&#2351; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2331;&#2379;&#2335;&#2375; &#2313;&#2342;&#2381;&#2351;&#2350;&#2379;&#2306; &#2325;&#2379; &#2360;&#2368;&#2343;&#2375; &#2315;&#2339; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The RBI lends to commercial banks facing financial distress when no other institutions are willing to lend.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2360;&#2306;&#2325;&#2335; &#2360;&#2375; &#2332;&#2370;&#2333; &#2352;&#2361;&#2375; &#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351;&#2367;&#2325; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2340;&#2348; &#2315;&#2339; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348; &#2325;&#2379;&#2312; &#2309;&#2344;&#2381;&#2351; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366; &#2315;&#2339; &#2342;&#2375;&#2344;&#2375; &#2325;&#2379; &#2340;&#2376;&#2351;&#2366;&#2352; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2368;&#2404;</span>",
      "<span class=\"eqt\">The RBI guarantees every loan provided by commercial banks to their customers.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351;&#2367;&#2325; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2346;&#2344;&#2375; &#2327;&#2381;&#2352;&#2366;&#2361;&#2325;&#2379;&#2306; &#2325;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2315;&#2339; &#2325;&#2368; &#2327;&#2366;&#2352;&#2306;&#2335;&#2368; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The RBI intervenes only in foreign exchange markets when commercial banks run out of currency reserves.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2375;&#2306; &#2340;&#2349;&#2368; &#2361;&#2360;&#2381;&#2340;&#2325;&#2381;&#2359;&#2375;&#2346; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348; &#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351;&#2367;&#2325; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2349;&#2306;&#2337;&#2366;&#2352; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>RBI</b> does not lend directly to individuals or small enterprises.</p><p>&bull; <b>RBI acts as a lender to banks during times of financial crisis, ensuring stability in the financial system.</b></p><p>&bull; <b>RBI</b> does not guarantee every loan issued by commercial banks.</p><p>&bull; <b>RBI</b> intervenes in foreign exchange markets but not exclusively during commercial bank distress.</p><p><b>Further Insight:</b></p><p>&bull; The RBI is the central bank of India and plays a key role in regulating the monetary policy, overseeing banking operations, and ensuring economic stability.</p><p>&bull; <b>Monetary Authority</b>: Controls the supply of money to stabilize exchange rates, inflation, and overall economic growth.</p><p>&bull; <b>Issuer of Currency</b>: RBI has the sole authority to issue currency, ensuring security and reliability.</p><p>&bull; Issuer of Banking Licenses: Every bank must acquire a license from the RBI.</p><p>&bull; <b>Banker to the Government:</b> Provides financial services to the government, managing loans and public debt.</p><p>&bull; <b>Lender of Last Resort: Provides funds to banks in need during financial distress.</b></p><p>&bull; Custodian of Foreign Reserves: Manages India's foreign exchange reserves.</p><p>&bull; Manager of Government Securities: Regulates government investments in bonds and securities.</p><p>&bull; Regulator and Supervisor of Payment and Settlement Systems: Oversees the security and efficiency of financial transactions in the country.</p><p>&bull; Developmental Role: Promotes banking outreach, financial literacy, and national economic goals.</p><p>&bull; Publisher of Economic Data: Regularly collects and disseminates financial and economic data.</p><p>&bull; <b>Banking Ombudsman:</b> Provides a grievance redressal mechanism for customers to file complaints against banks.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following functions of the Indian banking system is most closely aligned with financial inclusion and the promotion of equitable growth?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2360;&#2350;&#2366;&#2357;&#2375;&#2358;&#2344; &#2324;&#2352; &#2360;&#2350;&#2366;&#2344; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Issuing loans exclusively to corporate clients to support industrial growth.</span><span class=\"hqt\" style=\"display:none\">&#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2379; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2377;&#2352;&#2381;&#2346;&#2379;&#2352;&#2375;&#2335; &#2327;&#2381;&#2352;&#2366;&#2361;&#2325;&#2379;&#2306; &#2325;&#2379; &#2315;&#2339; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Expanding branch networks in urban areas for better access to digital banking.</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2340;&#2325; &#2348;&#2375;&#2361;&#2340;&#2352; &#2346;&#2361;&#2369;&#2306;&#2330; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2361;&#2352;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2358;&#2366;&#2326;&#2366; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Providing credit to underserved sectors like agriculture and small businesses through institutions like Regional Rural Banks (RRBs) and Small Finance Banks (SFBs).</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2368;&#2351; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; (RRBs) &#2324;&#2352; &#2354;&#2328;&#2369; &#2357;&#2367;&#2340;&#2381;&#2340; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; (SFBs) &#2332;&#2376;&#2360;&#2368; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2323;&#2306; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2325;&#2371;&#2359;&#2367; &#2324;&#2352; &#2354;&#2328;&#2369; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351;&#2379;&#2306; &#2332;&#2376;&#2360;&#2375; &#2357;&#2306;&#2330;&#2367;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2315;&#2339; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2325;&#2352;&#2366;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Increasing foreign exchange reserves through international banking transactions.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2349;&#2306;&#2337;&#2366;&#2352; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2352;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Financial inclusion targets more than just corporate clients, focusing on underserved sectors.</p><p>&bull; Financial inclusion focuses on rural areas and other unconnected areas because urban areas already have better access to financial services compared to rural areas.</p><p>&bull; <b>Institutions like RRBs and SFBs are established specifically to provide financial services to rural and underserved populations</b></p><p><b>Further Insight:</b></p><p>&bull; Financial Inclusion in India refers to the process of ensuring access to essential financial services, particularly for the underprivileged and marginalized sections of society. It aims to provide affordable financial products and services, such as banking, savings, credit, and insurance, to every individual, ensuring that no one is excluded from the formal financial system</p> <h3 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt;page-break-after:auto'>&bull; <b>Regional Rural Banks (RRBs):</b></h3><p>&#9675; RRBs were established on <b>October 2, 1975</b>.</p><p>&#9675; Created under the <b>Regional Rural Banks Act, 1976</b>.</p><p>&#9675; RRBs aim to provide banking services to rural areas, especially for the weaker sections of society like small and marginal farmers, artisans, and agricultural laborers. </p><p>&#9632; They focus on financial inclusion and development in rural regions, offering credit and other financial services to promote agriculture, small-scale industries, and rural employment.</p> <h3 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt;page-break-after:auto'>&bull; <b>Small Finance Banks (SFBs):</b></h3><p>&#9675; <b>T</b>he guidelines for SFBs were issued by the Reserve Bank of India (RBI) in <b>2014</b>, with the first batch of licenses granted in <b>2015</b>.</p><p>&#9675; SFBs operate under the regulatory framework of the <b>Banking Regulation Act, 1949</b> and are governed by the RBI guidelines.</p><p>&#9675; SFBs focus on serving underserved sections of the economy, including small businesses, marginal farmers, and unorganized sectors. </p><p>&#9632; Their key roles are providing savings vehicles and extending credit to small businesses and low-income groups. </p><p>&#9632; They also contribute to financial inclusion, offering banking services to regions and populations often ignored by mainstream banks.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT correctly associated with its historical significance in India's banking evolution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2357;&#2367;&#2325;&#2366;&#2360; &#2350;&#2375;&#2306; &#2311;&#2360;&#2325;&#2375; &#2320;&#2340;&#2367;&#2361;&#2366;&#2360;&#2367;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357; &#2360;&#2375; &#2360;&#2361;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The <b>Bank of Hindustan (1770)</b> was the first European-managed bank in India.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2306;&#2325; &#2321;&#2347; &#2361;&#2367;&#2306;&#2342;&#2369;&#2360;&#2381;&#2340;&#2366;&#2344; (1770) &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2366; &#2351;&#2370;&#2352;&#2379;&#2346;&#2368;&#2351; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2367;&#2340; &#2348;&#2376;&#2306;&#2325; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The <b>Oudh Commercial Bank (1881)</b> was the first Indian bank with limited liability and an Indian board.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2343; &#2325;&#2350;&#2352;&#2381;&#2358;&#2367;&#2351;&#2354; &#2348;&#2376;&#2306;&#2325; (1881) &#2360;&#2368;&#2350;&#2367;&#2340; &#2342;&#2375;&#2351;&#2340;&#2366; &#2324;&#2352; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2379;&#2352;&#2381;&#2337; &#2357;&#2366;&#2354;&#2366; &#2346;&#2361;&#2354;&#2366; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The <b>Imperial Bank of India (1921)</b> was formed by merging the three Presidency Banks.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2350;&#2381;&#2346;&#2368;&#2352;&#2367;&#2351;&#2354; &#2348;&#2376;&#2306;&#2325; &#2321;&#2347; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; (1921) &#2325;&#2366; &#2327;&#2336;&#2344; &#2340;&#2368;&#2344; &#2346;&#2381;&#2352;&#2375;&#2360;&#2368;&#2337;&#2375;&#2306;&#2360;&#2368; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2350;&#2367;&#2354;&#2366;&#2325;&#2352; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The <b>Bank of Bengal (1806)</b> was nationalized and converted into the State Bank of India in 1955.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2306;&#2325; &#2321;&#2347; &#2348;&#2306;&#2327;&#2366;&#2354; (1806) &#2325;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351;&#2325;&#2352;&#2339; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2324;&#2352; 1955 &#2350;&#2375;&#2306; &#2311;&#2360;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2381;&#2335;&#2375;&#2335; &#2348;&#2376;&#2306;&#2325; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; <b>Bank of Hindustan</b> was the first bank founded in India under European management.</p><p>&bull; <b>Oudh Commercial Bank</b> was a significant Indian-owned bank.</p><p>&bull; The <b>Imperial Bank of India</b> was indeed formed by merging the Presidency Banks.</p><p>&bull; <b>State Bank of India was formed from the Imperial Bank of India, not directly from the Bank of Bengal.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Bank of Hindustan (1770):</b> This was the first bank established in India, founded by Alexander and Co. in Calcutta under European management.</p><p>&#9675; shut down in <b>1832</b> due to financial difficulties and instability in the banking system at that time.</p><p>&bull; <b>Presidency Banks:</b> Three major banks followed:</p><p>&#9675; Bank of Bengal (1806)</p><p>&#9675; Bank of Bombay (1840)</p><p>&#9675; Bank of Madras (1843) </p><p>&#9675; These banks were set up under the British Raj and were collectively known as Presidency Banks.</p><p>&#9675; <b>They later merged to form the Imperial Bank of India in 1921, which eventually became the State Bank of India (SBI).</b></p><p>&bull; <b>Oudh Commercial Bank (1881):</b> The first bank with limited liability and an Indian board.</p><p>&bull; <b>Punjab National Bank (1894):</b> The first purely Indian bank, founded by Indians.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was a key objective behind the 1969 nationalization of banks in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; 1969 &#2350;&#2375;&#2306; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351;&#2325;&#2352;&#2339; &#2325;&#2375; &#2346;&#2368;&#2331;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Increasing private ownership in the banking sector to improve efficiency.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2369;&#2358;&#2354;&#2340;&#2366; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2344;&#2367;&#2332;&#2368; &#2360;&#2381;&#2357;&#2366;&#2350;&#2367;&#2340;&#2381;&#2357; &#2348;&#2338;&#2364;&#2366;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Expanding banking services to remote rural areas and making credit more accessible to priority sectors.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2342;&#2370;&#2352; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2340;&#2325; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366; &#2340;&#2341;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366; &#2357;&#2366;&#2354;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2315;&#2339; &#2325;&#2379; &#2309;&#2343;&#2367;&#2325; &#2360;&#2369;&#2354;&#2349; &#2348;&#2344;&#2366;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Promoting competition between public sector and private sector banks.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2324;&#2352; &#2344;&#2367;&#2332;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Establishing a uniform banking system regulated solely by international standards.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2350;&#2366;&#2344;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2319;&#2325; &#2360;&#2350;&#2366;&#2344; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2352;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Nationalization aimed at reducing private ownership, not increasing it.</p><p>&bull; <b>One of the main goals of bank nationalization was to make banking services more accessible to rural and priority sectors.</b></p><p>&bull; The purpose was not to promote competition but to expand government control over key banks.</p><p>&bull; The objectives of 1969 nationalization, which focused on domestic regulation and expanding financial inclusion.</p><p><b>Further Insight:</b></p><p>&bull; <b>Nationalization of Banks in 1969:</b> 14 major banks were nationalized to bring banking services under government control and facilitate more inclusive financial services. These banks were:</p><p>&#9675; Allahabad Bank, Bank of India, Bank of Baroda, Bank of Maharashtra, Central Bank of India, Canara Bank, Dena Bank, Indian Overseas Bank, Indian Bank, Punjab National Bank, Syndicate Bank, Union Bank of India, United Bank, UCO Bank</p><p>&bull; <b>Nationalization of Banks in 1980:</b> Six more banks were nationalized to increase the government's control over the banking sector. These banks were:</p><p>&#9675; Andhra Bank, Corporation Bank, New Bank of India, Oriental Bank of Commerce, Punjab &amp; Sind Bank, Vijaya Bank</p><p>&bull; <b>key reasons for the nationalization of banks in India:</b></p><p>&#9675; <b>Enhance Credit to Priority Sectors</b>: To direct more credit to agriculture, small industries, and exports.</p><p>&#9675; <b>Reduce Economic Disparities</b>: Focus on rural banking and support smaller enterprises.</p><p>&#9675; <b>Curb Concentration of Wealth</b>: Prevent monopolies by reducing control of banks by industrial houses.</p><p>&#9675; <b>Promote Social Welfare</b>: Align banking with development goals like poverty alleviation and job creation.</p><p>&#9675; <b>Restore Public Confidence</b>: Address frequent private bank failures and enhance trust in the banking system.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>In the context of the 1991 economic reforms, which of the following best explains the impact of foreign banks entering India?</p></span><span class=\"hqt\" style=\"display:none\"><p>1991 &#2325;&#2375; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2325;&#2379; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2375; &#2338;&#2306;&#2327; &#2360;&#2375; &#2360;&#2350;&#2333;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It decreased competition, leading to a consolidation of Indian public sector banks.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2325;&#2350; &#2361;&#2379; &#2327;&#2312;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2319;&#2325;&#2368;&#2325;&#2352;&#2339; &#2361;&#2369;&#2310;&#2404;</span>",
      "<span class=\"eqt\">It helped Indian banks adopt advanced technology and innovative banking practices.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2360;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2381;&#2344;&#2340; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2324;&#2352; &#2344;&#2357;&#2368;&#2344; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2346;&#2342;&#2381;&#2343;&#2340;&#2367;&#2351;&#2366;&#2306; &#2309;&#2346;&#2344;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2350;&#2367;&#2354;&#2368;&#2404;</span>",
      "<span class=\"eqt\">It forced the RBI to nationalize foreign banks to retain control over the financial system.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2344;&#2375; &#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2325;&#2379; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2346;&#2352; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351;&#2325;&#2352;&#2339; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2332;&#2348;&#2370;&#2352; &#2325;&#2367;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">It led to the complete withdrawal of public sector banks from rural areas.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2348;&#2376;&#2306;&#2325; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2360;&#2375; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2348;&#2366;&#2361;&#2352; &#2361;&#2379; &#2327;&#2351;&#2375;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Competition increased rather than decreased with foreign bank entry.</p><p>&bull; <b>Foreign banks introduced modern technology and innovations, which Indian banks later adopted.</b></p><p>&bull; Foreign banks were not nationalized; they were encouraged to operate alongside Indian banks.</p><p>&bull; Public sector banks continued to operate in rural areas, especially through <b>Regional Rural Banks (RRBs)</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Narasimham Committee (1991)</b></p><p>&#9675; Formed to reform India's banking sector after the 1991 economic crisis, the committee aimed to make banks more efficient and competitive.</p><p>&#9675; <b>Key Recommendations:</b></p><p>&#9632; <b>Lower SLR and CRR</b>: To free up funds for lending.</p><p>&#9632; <b>Interest Rate Deregulation</b>: Allow market-determined interest rates.</p><p>&#9632; <b>Prudential Norms</b>: Stricter capital adequacy (8%) and NPA recognition.</p><p>&#9632; <b>Bank Autonomy</b>: Reduce government interference in public sector banks.</p><p>&#9632; <b>Private Sector Entry</b>: Allow new private banks for increased competition.</p><p>&bull; <b>Narasimham Committee II (1998)</b></p><p>&#9675; Focused on strengthening and stabilizing the banking sector for long-term resilience.</p><p>&#9675; <b>Key Recommendations:</b></p><p>&#9632; <b>Bank Mergers</b>: Consolidate strong banks for global competitiveness.</p><p>&#9632; <b>Capital Adequacy</b>: Raise CAR from 8% to 10%.</p><p>&#9632; <b>NPA Management</b>: Set up <b>ARCs</b> for better recovery.</p><p>&#9632; <b>Bank Autonomy</b>: More operational freedom for public sector banks.</p><p>&#9632; <b>Foreign Banks &amp; FDI: Encourage more foreign participation.</b></p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following correctly distinguishes <b>Payment Banks</b> from other categories of banks in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2309;&#2344;&#2381;&#2351; &#2358;&#2381;&#2352;&#2375;&#2339;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2360;&#2375; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2360;&#2361;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2309;&#2354;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Payment Banks can lend money to small businesses but cannot accept demand deposits.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2348;&#2376;&#2306;&#2325; &#2331;&#2379;&#2335;&#2375; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351;&#2379;&#2306; &#2325;&#2379; &#2343;&#2344; &#2313;&#2343;&#2366;&#2352; &#2342;&#2375; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2350;&#2366;&#2306;&#2327; &#2332;&#2350;&#2366; &#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375;&#2404;</span>",
      "<span class=\"eqt\">Payment Banks can accept deposits up to a limit of &#8377;2 lakh per customer but cannot issue credit cards or loans.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2348;&#2376;&#2306;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367; &#2327;&#2381;&#2352;&#2366;&#2361;&#2325; 2 &#2354;&#2366;&#2326; &#2352;&#2369;&#2346;&#2351;&#2375; &#2340;&#2325; &#2325;&#2368; &#2332;&#2350;&#2366; &#2352;&#2366;&#2358;&#2367; &#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2325;&#2381;&#2352;&#2375;&#2337;&#2367;&#2335; &#2325;&#2366;&#2352;&#2381;&#2337; &#2351;&#2366; &#2315;&#2339; &#2332;&#2366;&#2352;&#2368; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375;&#2404;</span>",
      "<span class=\"eqt\">Payment Banks are designed for international transactions and cater primarily to foreign companies.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2348;&#2376;&#2306;&#2325; &#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2367;&#2332;&#2364;&#2366;&#2311;&#2344; &#2325;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306; &#2324;&#2352; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2360;&#2375;&#2357;&#2366;&#2319;&#2306; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Payment Banks are exempt from maintaining any statutory reserves with the RBI.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2379;&#2312; &#2349;&#2368; &#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2344;&#2367;&#2343;&#2367; &#2352;&#2326;&#2344;&#2375; &#2360;&#2375; &#2331;&#2370;&#2335; &#2342;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Payment Banks</b> cannot lend money, but they can accept deposits.</p><p>&bull; <b>Payment Banks can accept deposits up to a certain limit but are restricted from issuing loans or credit cards.</b></p><p>&bull; <b>Payment Banks</b> primarily focus on domestic customers, not international transactions.</p><p>&bull; <b>Payment Banks</b> still need to maintain statutory reserves as regulated by the <b>RBI</b>.</p><p><b>Further Insight:</b></p><p>&bull; <b>Payment Banks were introduced to further financial inclusion by providing basic banking services to unbanked sections of society. </b></p><p>&#9675; The Reserve Bank of India (RBI) issued guidelines for payment banks in November 2014. </p><p>&#9675; The first payment banks began operations in 2015.</p><p>&#9675; <b>Payment banks were recommended by the Nachiket Mor Committee on Comprehensive Financial Services for Small Businesses and Low-Income Households in 2013.</b></p><p>&#9675; <b>Primary Function:</b> </p><p>&#9632; Their core purpose is to offer small savings accounts, payments, remittances, and transfer services, but they cannot lend money. </p><p>&#9632; These banks aim to extend financial services to the rural and underserved populations, focusing on low-cost banking services.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>As the custodian of India's foreign exchange reserves, the <b>RBI</b> performs which of the following functions?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2349;&#2306;&#2337;&#2366;&#2352; &#2325;&#2375; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306;, &#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It dictates the exchange rates of all major currencies traded in India.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2379;&#2348;&#2366;&#2352; &#2325;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2349;&#2368; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2323;&#2306; &#2325;&#2368; &#2357;&#2367;&#2344;&#2367;&#2350;&#2351; &#2342;&#2352;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It manages the reserves to ensure the stability of the Indian rupee in international markets.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2348;&#2366;&#2332;&#2364;&#2366;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2369;&#2346;&#2319; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2352;&#2340;&#2366; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2349;&#2306;&#2337;&#2366;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It lends foreign currency to Indian exporters at subsidized rates.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340;&#2325;&#2379;&#2306; &#2325;&#2379; &#2352;&#2367;&#2351;&#2366;&#2351;&#2340;&#2368; &#2342;&#2352;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2313;&#2343;&#2366;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It sets the monetary policies of all foreign banks operating in India.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2352;&#2340; &#2360;&#2349;&#2368; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Exchange rates are determined by market forces, though the <b>RBI</b> may intervene.</p><p>&bull; <b>One of the RBI's key functions is to manage foreign reserves to stabilize the Indian rupee.</b></p><p>&bull; <b>RBI</b> does not subsidize loans to exporters directly.</p><p>&bull; <b>RBI</b> regulates foreign banks, it does not set their monetary policies.</p><p><b>Further Insight:</b></p><p>&bull; The RBI is the central bank of India established in 1935 and plays a key role in regulating the monetary policy, overseeing banking operations, and ensuring economic stability.</p><p>&bull; <b>Monetary Authority</b>: Controls the supply of money to stabilize exchange rates, inflation, and overall economic growth.</p><p>&bull; <b>Issuer of Currency</b>: RBI has the sole authority to issue currency, ensuring security and reliability.</p><p>&bull; Issuer of Banking Licenses: Every bank must acquire a license from the RBI.</p><p>&bull; <b>Banker to the Government:</b> Provides financial services to the government, managing loans and public debt.</p><p>&bull; <b>Lender of Last Resort: </b>Provides funds to banks in need during financial distress.</p><p>&bull; <b>Custodian of Foreign Reserves: Manages India's foreign exchange reserves.</b></p><p>&bull; <b>Banking Ombudsman:</b> Provides a grievance redressal mechanism for customers to file complaints against banks.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a direct tool used by the <b>RBI</b> to control inflation and manage money supply in the economy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2313;&#2346;&#2325;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Open Market Operations (OMO)</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2369;&#2354;&#2375; &#2348;&#2366;&#2332;&#2366;&#2352; &#2346;&#2352;&#2367;&#2330;&#2366;&#2354;&#2344; (OMO)</span>",
      "<span class=\"eqt\">Repo Rate adjustments</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2346;&#2379; &#2342;&#2352; &#2360;&#2350;&#2366;&#2351;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Statutory Liquidity Ratio (SLR)</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2340;&#2352;&#2354;&#2340;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; (SLR)</span>",
      "<span class=\"eqt\">Public Distribution System (PDS)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2357;&#2367;&#2340;&#2352;&#2339; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; (PDS)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; <b>Open Market Operations (OMO)</b> are a key tool used by the RBI to control the money supply.</p><p>&bull; Changes in the <b>Repo Rate</b> are a common tool to manage liquidity.</p><p>&bull; <b>Statutory Liquidity Ratio (SLR)</b> affects the amount of liquid assets banks must maintain, influencing money supply.</p><p>&bull; <b>Public Distribution System (PDS) is a government program related to food security, not an RBI tool for monetary control.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Monetary tools used by the RBI to control India's monetary policy:</b></p><p>&#9675; <b>Repo Rate</b>: The rate at which RBI lends to commercial banks. Increasing this makes borrowing expensive, controlling inflation.</p><p>&#9675; <b>Reverse Repo Rate</b>: The rate at which RBI borrows from banks. A higher rate reduces liquidity by encouraging banks to lend to RBI.</p><p>&#9675; <b>Cash Reserve Ratio (CRR): </b>The percentage of deposits banks must keep with RBI. Higher CRR reduces funds available for lending.</p><p>&#9675; <b>Statutory Liquidity Ratio (SLR): </b>The required percentage of bank deposits held in liquid assets like gold or government securities, limiting lending.</p><p>&#9675; <b>Open Market Operations (OMOs): </b>Buying/selling government securities in the market to control liquidity.</p><p>&#9675; <b>Marginal Standing Facility (MSF):</b> Banks can borrow overnight from RBI at a higher rate to meet short-term liquidity needs.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>The Reserve Bank of India issues currency in India under which legal framework?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2367;&#2332;&#2352;&#2381;&#2357; &#2348;&#2376;&#2306;&#2325; &#2325;&#2367;&#2360; &#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2338;&#2366;&#2306;&#2330;&#2375; &#2325;&#2375; &#2340;&#2361;&#2340; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Banking Regulation Act, 1949</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1949</span>",
      "<span class=\"eqt\">Reserve Bank of India Act, 1934</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2367;&#2332;&#2364;&#2352;&#2381;&#2357; &#2348;&#2376;&#2306;&#2325; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1934</span>",
      "<span class=\"eqt\">Payment and Settlement Systems Act, 2007</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2324;&#2352; &#2344;&#2367;&#2346;&#2335;&#2366;&#2344; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 2007</span>",
      "<span class=\"eqt\">Securities and Exchange Board of India Act, 1992</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2381;&#2352;&#2340;&#2367;&#2349;&#2370;&#2340;&#2367; &#2324;&#2352; &#2357;&#2367;&#2344;&#2367;&#2350;&#2351; &#2348;&#2379;&#2352;&#2381;&#2337; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1992</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Banking Regulation Act, 1949</b> regulates banking practices, not currency issuance.</p><p>&bull; <b>RBI Act, 1934 gives the RBI authority to issue currency in India.</b></p><p>&bull; <b>Payment and Settlement Systems Act, 2007</b> regulates payment systems, not currency issuance.</p><p>&bull; <b>SEBI Act, 1992</b> pertains to securities markets, not currency.</p><p><b>Further Insight:</b></p><p>&bull; <b>The Reserve Bank of India (RBI) Act, 1934 established the RBI and outlines its functions, powers, and operations</b></p><p>&#9675; <b>Establishment of RB</b>I: The Act provides for the establishment of the Reserve Bank of India as the central banking authority to regulate India's monetary system.</p><p>&#9675; <b>Monetary Control</b>: The Act empowers RBI to formulate and implement monetary policy, regulate currency issuance, and manage foreign exchange reserves.</p><p>&#9675; <b>Banking Supervision</b>: RBI is responsible for supervising and regulating commercial banks, financial institutions, and non-banking financial companies (NBFCs).</p><p>&#9675; <b>Currency Issuance</b>: The RBI has the sole authority to issue and manage currency notes, ensuring stability in the supply of money.</p><p>&#9675; <b>Lender of Last Resort</b>: RBI acts as the lender of last resort to banks during financial distress, providing liquidity support.</p><p>&#9675; <b>Government's Banker</b>: RBI acts as the banker to the central and state governments, managing their accounts and debt issuances.</p><p>&#9675; <b>Monetary Data and Reporting</b>: The RBI is required to maintain financial and economic data and report to the Parliament on monetary matters</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>In its role as the banker to the government, what responsibility does the <b>RBI</b> NOT perform?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2348;&#2376;&#2306;&#2325;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2368; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2350;&#2375;&#2306;, &#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2325;&#2380;&#2344; &#2360;&#2368; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352;&#2368; &#2344;&#2361;&#2368;&#2306; &#2344;&#2367;&#2349;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Managing government securities and public debt</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2349;&#2370;&#2340;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2315;&#2339; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344;</span>",
      "<span class=\"eqt\">Handling the government's cash and financial transactions</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2344;&#2325;&#2342;&#2368; &#2324;&#2352; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2325;&#2379; &#2360;&#2306;&#2349;&#2366;&#2354;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Printing and minting coins for the government</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2367;&#2325;&#2381;&#2325;&#2375; &#2331;&#2366;&#2346;&#2344;&#2366; &#2324;&#2352; &#2338;&#2366;&#2354;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Acting as the lender of last resort for the government during financial crises</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2360;&#2306;&#2325;&#2335; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2306;&#2340;&#2367;&#2350; &#2315;&#2339;&#2342;&#2366;&#2340;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; RBI manages <b>government securities</b> and public debt.</p><p>&bull; <b>RBI</b> handles cash and financial transactions on behalf of the government.</p><p>&bull; <b>RBI issues currency, the actual minting of coins is done by the Government of India.</b></p><p>&bull; RBI acts as the <b>lender of last resort</b>, providing financial support to the government in crises.</p><p><b>Further Insight:</b></p><p>&bull; The RBI is the central bank of India and plays a key role in regulating the monetary policy, overseeing banking operations, and ensuring economic stability.</p><p>&bull; <b>Monetary Authority</b>: Controls the supply of money to stabilize exchange rates, inflation, and overall economic growth.</p><p>&bull; <b>Issuer of Currency</b>: RBI has the sole authority to issue currency, ensuring security and reliability.</p><p>&bull; Issuer of Banking Licenses: Every bank must acquire a license from the RBI.</p><p>&bull; <b>Banker to the Government:</b> Provides financial services to the government, managing loans and public debt.</p><p>&bull; <b>Lender of Last Resort: Provides funds to banks in need during financial distress.</b></p><p>&bull; <b>Custodian of Foreign Reserves</b>: Manages India's foreign exchange reserves.</p><p>&bull; Manager of Government Securities: Regulates government investments in bonds and securities.</p><p>&bull; <b>Regulator and Supervisor of Payment and Settlement Systems</b>: Oversees the security and efficiency of financial transactions in the country.</p><p>&bull; Developmental Role: Promotes banking outreach, financial literacy, and national economic goals.</p><p>&bull; Publisher of Economic Data: Regularly collects and disseminates financial and economic data.</p><p>&bull; <b>Banking Ombudsman:</b> Provides a grievance redressal mechanism for customers to file complaints against banks.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Under which act does the <b>RBI</b> manage India's foreign exchange reserves and regulate foreign exchange transactions?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2340;&#2361;&#2340; &#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2349;&#2306;&#2337;&#2366;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2325;&#2379; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Foreign Exchange Management Act (FEMA), 1999</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (&#2347;&#2375;&#2350;&#2366;), 1999</span>",
      "<span class=\"eqt\">Foreign Contribution Regulation Act (FCRA), 2010</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2309;&#2306;&#2358;&#2342;&#2366;&#2344; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (&#2319;&#2347;&#2360;&#2368;&#2310;&#2352;&#2319;), 2010</span>",
      "<span class=\"eqt\">Indian Contract Act, 1872</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2342;&#2366; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1872</span>",
      "<span class=\"eqt\">Prevention of Money Laundering Act (PMLA), 2002</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2344; &#2358;&#2379;&#2343;&#2344; &#2344;&#2367;&#2357;&#2366;&#2352;&#2339; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (&#2346;&#2368;&#2319;&#2350;&#2319;&#2354;&#2319;), 2002</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Foreign Exchange Management Act (FEMA), 1999 empowers the RBI to manage India's foreign exchange reserves and regulate forex transactions</b>.</p><p>&bull; <b>FCRA</b> governs foreign contributions to NGOs and individuals, not the broader foreign exchange.</p><p>&bull; <b>Indian Contract Act</b> regulates contracts and has no role in foreign exchange.</p><p>&bull; <b>PMLA</b> focuses on preventing money laundering, not foreign exchange regulation.</p><p><b>Further Insight:</b></p><p>&bull; <b>Foreign Exchange Management Act (FEMA), 1999: Key Points</b></p><p>&#9675; FEMA was enacted to facilitate external trade, payments, and promote orderly management of foreign exchange in India.</p><p>&#9675; <b>Current Account Transactions</b>: It allows free trade of foreign exchange for current account transactions, subject to reasonable restrictions.</p><p>&#9675; <b>Capital Account Transactions</b>: Regulates capital flows (investments, borrowing, and lending) between India and other countries,<b> with restrictions imposed by the RBI.</b></p><p>&#9675; <b>Authorized Dealers: Only authorized entities like banks can deal in foreign exchange, ensuring proper control and management of forex transactions.</b></p><p>&bull; FEMA replaced the stringent FERA, making foreign exchange dealings more liberal and focused on managing rather than controlling forex.</p><p>&bull; FEMA violations are civil offenses, unlike FERA, which treated them as criminal offenses.</p>",
    "question_index": 15
  },
  {
