<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>

                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>

        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>

                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>

        <!-- Main Content -->

            <!-- Question Area -->

                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>

                        <div class="stat-name">Unanswered</div>

                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following describes heat, according to the modern concept?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A fine invisible fluid called caloric that flows between bodies.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2354;&#2379;&#2352;&#2367;&#2325; &#2344;&#2366;&#2350;&#2325; &#2319;&#2325; &#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350; &#2309;&#2342;&#2371;&#2358;&#2381;&#2351; &#2340;&#2352;&#2354; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2358;&#2352;&#2368;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2348;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A state variable that a system possesses in a certain amount.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2330;&#2352; &#2332;&#2379; &#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2350;&#2375;&#2306; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A form of energy in transit due to temperature difference.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2309;&#2306;&#2340;&#2352; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2346;&#2366;&#2352;&#2327;&#2350;&#2344; &#2350;&#2375;&#2306; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2366; &#2319;&#2325; &#2352;&#2370;&#2346;&#2404;</span>",
      "<span class=\"eqt\">The sum of kinetic and potential energies of molecules in a system.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2350;&#2375;&#2306; &#2309;&#2339;&#2369;&#2323;&#2306; &#2325;&#2368; &#2327;&#2340;&#2367;&#2332; &#2324;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The picture of heat as a fluid (caloric) was discarded in favor of the modern concept of <b>heat as a form of energy</b>, particularly energy in transit due to a temperature difference between the system and the surroundings.</p><p>Further insights:</p><p>&bull; The <b>caloric theory</b> was an outdated concept that viewed heat as a fluid-like substance.</p><p>&bull; Heat is <b>not</b> a <b>state variable</b> since it depends on the process rather than the system's state.</p><p>&bull; The <b>sum of kinetic and potential energies</b> of molecules represents the <b>internal energy</b> of a system, not heat.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>What is meant by thermodynamic equilibrium of a system?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2314;&#2359;&#2381;&#2350;&#2366;&#2327;&#2340;&#2367;&#2325; &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2340;&#2366;&#2340;&#2381;&#2346;&#2352;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The net external force and torque on the system are zero.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2346;&#2352; &#2344;&#2375;&#2335; &#2348;&#2366;&#2361;&#2381;&#2351; &#2348;&#2354; &#2324;&#2352; &#2335;&#2377;&#2352;&#2381;&#2325; &#2358;&#2370;&#2344;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The system is insulated from its surroundings by a diathermic wall.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2309;&#2346;&#2344;&#2375; &#2310;&#2360;-&#2346;&#2366;&#2360; &#2325;&#2375; &#2357;&#2366;&#2340;&#2366;&#2357;&#2352;&#2339; &#2360;&#2375; &#2319;&#2325; &#2337;&#2366;&#2351;&#2341;&#2352;&#2381;&#2350;&#2367;&#2325; &#2342;&#2368;&#2357;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2371;&#2341;&#2325; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The macroscopic variables characterizing the system do not change with time.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2381;&#2341;&#2370;&#2354; &#2330;&#2352; &#2360;&#2350;&#2351; &#2325;&#2375; &#2360;&#2366;&#2341; &#2344;&#2361;&#2368;&#2306; &#2348;&#2342;&#2354;&#2340;&#2375;&#2404;</span>",
      "<span class=\"eqt\">There is a flow of caloric between the system and its surroundings.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2310;&#2360;&#2346;&#2366;&#2360; &#2325;&#2375; &#2357;&#2366;&#2340;&#2366;&#2357;&#2352;&#2339; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2376;&#2354;&#2379;&#2352;&#2368; &#2325;&#2366; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A system is in <b>thermodynamic equilibrium</b> when its <b>macroscopic properties</b> (such as temperature, pressure, and volume) remain <b>constant over time</b>. This means:</p><p>&bull; There is <b>thermal equilibrium</b> (no temperature differences within the system).</p><p>&bull; There is <b>mechanical equilibrium</b> (no unbalanced forces or pressure differences).</p><p>&bull; There is <b>chemical equilibrium</b> (no net chemical reactions or diffusion).</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The Zeroth Law of Thermodynamics leads to the concept of:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2314;&#2359;&#2381;&#2350;&#2366;&#2327;&#2340;&#2367;&#2325;&#2368; &#2325;&#2366; &#2358;&#2370;&#2344;&#2381;&#2351;&#2357;&#2366;&#2305; &#2344;&#2367;&#2351;&#2350; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2325;&#2368; &#2323;&#2352; &#2354;&#2375; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Internal energy</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2314;&#2352;&#2381;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Entropy</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2381;&#2335;&#2381;&#2352;&#2366;&#2346;&#2368;</span>",
      "<span class=\"eqt\">Temperature</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2346;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Work</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Zeroth Law of Thermodynamics</b> states that:</p><p><i>\"If two systems are each in thermal equilibrium with a third system, then they are in thermal equilibrium with each other.\"</i></p><p>This principle establishes the concept of <b>temperature</b> as a measurable property. It allows us to define <b>a temperature scale</b> and use thermometers to measure temperature consistently.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a thermodynamic state variable?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2314;&#2359;&#2381;&#2350;&#2366;&#2327;&#2340;&#2367;&#2325; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2330;&#2352; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pressure</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2348;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Volume</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Temperature</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2346;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Heat</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2352;&#2381;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A <b>thermodynamic state variable</b> (or <b>state function</b>) is a property that depends <b>only on the current state of the system</b>, not on how the system reached that state. Examples include:</p><p>&bull; <b>Pressure (P)</b> &rarr; State variable</p><p>&bull; <b>Volume (V)</b> &rarr; State variable</p><p>&bull; <b>Temperature (T)</b> &rarr; State variable</p><p>However, <b>heat (Q) is NOT a state variable</b> because:</p><p>&bull; It depends on the <b>process</b> rather than the state.</p><p>&bull; It is a form of <b>energy transfer</b>, not an intrinsic property of the system.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What is internal energy (U) of a system?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2314;&#2352;&#2381;&#2332;&#2366; (U) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The energy associated with the motion of the system as a whole.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2381;&#2346;&#2370;&#2352;&#2381;&#2339; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2368; &#2314;&#2352;&#2381;&#2332;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The heat contained within the system at a given temperature.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2346;&#2352; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2344;&#2367;&#2361;&#2367;&#2340; &#2314;&#2359;&#2381;&#2350;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The sum of the kinetic and potential energies of the molecules of the system in a frame relative to which the center of mass of the system is at rest.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2347;&#2381;&#2352;&#2375;&#2350; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2309;&#2339;&#2369;&#2323;&#2306; &#2325;&#2368; &#2327;&#2340;&#2367;&#2332; &#2324;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2332;&#2367;&#2360;&#2325;&#2375; &#2360;&#2366;&#2346;&#2375;&#2325;&#2381;&#2359; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2381;&#2341;&#2367;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The work done by the system on its surroundings.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2346;&#2344;&#2375; &#2310;&#2360;-&#2346;&#2366;&#2360; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2346;&#2352; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>internal energy (U)</b> of a system is the total energy associated with the <b>microscopic</b> motion and interactions of its molecules, which includes:</p><p>&bull; <b>Kinetic energy</b> (due to molecular motion: translational, rotational, and vibrational).</p><p>&bull; <b>Potential energy</b> (due to intermolecular forces and bond energies).</p><p>This is measured <b>relative to the center of mass of the system</b>, meaning it excludes macroscopic motion (such as the system moving as a whole).</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>According to the First Law of Thermodynamics, which equation is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2314;&#2359;&#2381;&#2350;&#2366;&#2327;&#2340;&#2367;&#2325;&#2368; &#2325;&#2375; &#2346;&#2381;&#2352;&#2341;&#2350; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&#8710;Q = W - U</span><span class=\"hqt\" style=\"display:none\">&#8710;Q = W - U</span>",
      "<span class=\"eqt\">&#8710;Q = &#8710;U + &#8710;W</span><span class=\"hqt\" style=\"display:none\">&#8710;Q = &#8710;U + &#8710;W</span>",
      "<span class=\"eqt\">&#8710;U = Q - W</span><span class=\"hqt\" style=\"display:none\">&#8710;U = Q - W</span>",
      "<span class=\"eqt\">&#8710;W = &#8710;U + &#8710;Q</span><span class=\"hqt\" style=\"display:none\">&#8710;W = &#8710;U + &#8710;Q</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The first law of thermodynamics is given as &#916;<i>U </i>= <i>Q &#8722;</i> <i>W</i>, where &#916;<i>U</i> is the change in internal energy of a system, <i>Q</i> is the net heat transfer (the sum of all heat transfer into and out of the system), and <i>W</i> is the net work done (the sum of all work done on or by the system).</p><p>&bull; Both <i>Q</i> and <i>W</i> are energy in transit; only &#916;<i>U</i> represents an independent quantity capable of being stored.</p><p>&bull; The internal energy <i>U</i> of a system depends only on the state of the system and not how it reached that state.</p><p>&bull; Metabolism of living organisms, and photosynthesis of plants, are specialized types of heat transfer, doing work, and internal energy of systems.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In an isothermal process of an ideal gas, what remains constant?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2310;&#2342;&#2352;&#2381;&#2358; &#2327;&#2376;&#2360; &#2325;&#2368; &#2360;&#2350;&#2340;&#2366;&#2346;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2325;&#2381;&#2351;&#2366; &#2360;&#2381;&#2341;&#2367;&#2352; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pressure.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2348;&#2366;&#2357;&#2404;</span>",
      "<span class=\"eqt\">Volume.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2340;&#2344;&#2404;</span>",
      "<span class=\"eqt\">Temperature<b>.</b></span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2346;&#2350;&#2366;&#2344;.</span>",
      "<span class=\"eqt\">Internal energy.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2314;&#2352;&#2381;&#2332;&#2366;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>An <b>isothermal process</b> is a thermodynamic process that occurs at a <b>constant temperature</b>. This means:</p><p>&#916;T=0</p><p>Since the <b>internal energy (U) of an ideal gas depends only on temperature</b>, an isothermal process also implies:</p><p>&#916;U=0</p><p>However, <b>pressure (P) and volume (V) can change</b> according to <b>Boyle's Law</b>:</p><p>PV=constant(for a given amount of gas at constant temperature)</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>In an adiabatic process, what is the heat exchange (&#8710;Q) between the system and surroundings?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2352;&#2369;&#2342;&#2381;&#2343;&#2379;&#2359;&#2381;&#2350; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2324;&#2352; &#2346;&#2352;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2348;&#2368;&#2330; &#2314;&#2359;&#2381;&#2350;&#2366; &#2357;&#2367;&#2344;&#2367;&#2350;&#2351; (&#8710;Q) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Positive.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325;&#2404;</span>",
      "<span class=\"eqt\">Negative.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325;&#2404;</span>",
      "<span class=\"eqt\">Zero<b>.</b></span><span class=\"hqt\" style=\"display:none\">&#2358;&#2370;&#2344;&#2381;&#2351;.</span>",
      "<span class=\"eqt\">Equal to the work done by the system.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>An <b>adiabatic process</b> is a thermodynamic process in which <b>no heat is exchanged</b> between the system and its surroundings. This means:</p><p>&#916;Q=0</p><p>First law of thermodynamics is given as &#916;<i>U </i>= <i>Q  - </i> <i>W</i></p><p>Since Q=0 in an adiabatic process, the equation simplifies to:</p><p>&#916;<i>U</i> =&#8722;W</p><p>This means that any work done by the system comes at the expense of its <b>internal energy</b>, leading to a decrease in temperature (for expansion) or an increase in temperature (for compression).</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>For an ideal gas, the relationship between molar specific heat at constant pressure (Cp) and molar specific heat at constant volume (Cv) is given by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2342;&#2352;&#2381;&#2358; &#2327;&#2376;&#2360; &#2325;&#2375; &#2354;&#2367;&#2319;, &#2360;&#2381;&#2341;&#2367;&#2352; &#2342;&#2366;&#2348; &#2346;&#2352; &#2350;&#2379;&#2354;&#2352; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2314;&#2359;&#2381;&#2350;&#2366; (Cp) &#2324;&#2352; &#2360;&#2381;&#2341;&#2367;&#2352; &#2310;&#2351;&#2340;&#2344; &#2346;&#2352; &#2350;&#2379;&#2354;&#2352; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2314;&#2359;&#2381;&#2350;&#2366; (Cv) &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2348;&#2306;&#2343; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Cp + Cv = R</span><span class=\"hqt\" style=\"display:none\">Cp + Cv = R</span>",
      "<span class=\"eqt\">Cv - Cp = R</span><span class=\"hqt\" style=\"display:none\">Cv - Cp = R</span>",
      "<span class=\"eqt\">Cp - Cv = R</span><span class=\"hqt\" style=\"display:none\">Cp - Cv = R</span>",
      "<span class=\"eqt\">Cp  X  Cv = R</span><span class=\"hqt\" style=\"display:none\">Cp  X  Cv = R</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>F or an <b>ideal gas</b>, the relationship between <b>molar specific heat at constant pressure (Cp</b><b>&#8203;</b><b>)</b> and <b>molar specific heat at constant volume (Cv</b><b>&#8203;</b><b>)</b> is given by:</p><p>Cp&#8722;Cv=R</p><p>where:</p><p>&bull; Cp&#8203; = <b>Molar specific heat at constant pressure</b></p><p>&bull; Cv&#8203; = <b>Molar specific heat at constant volume</b></p><p>&bull; R = <b>Universal gas constant</b></p><p>This equation is derived from the <b>First Law of Thermodynamics</b> and the fact that at constant pressure, the gas does <b>work on its surroundings</b>, requiring additional energy input compared to a constant volume process.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>What is a quasi-static process characterized by?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2352;&#2381;&#2343;-&#2360;&#2381;&#2341;&#2376;&#2340;&#2367;&#2325; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A rapid change in the system's variables.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2330;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2340;&#2368;&#2357;&#2381;&#2352; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;&#2404;</span>",
      "<span class=\"eqt\">A large temperature difference between the system and surroundings.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2324;&#2352; &#2346;&#2352;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2348;&#2368;&#2330; &#2348;&#2337;&#2364;&#2366; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2309;&#2306;&#2340;&#2352;&#2404;</span>",
      "<span class=\"eqt\">The system remains in thermal and mechanical equilibrium with its surroundings throughout.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2309;&#2346;&#2344;&#2375; &#2346;&#2352;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2306;&#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2340;&#2366;&#2346;&#2368;&#2351; &#2324;&#2352; &#2351;&#2366;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325; &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2350;&#2375;&#2306; &#2348;&#2344;&#2368; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Significant dissipative effects like friction.</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2352;&#2381;&#2359;&#2339; &#2332;&#2376;&#2360;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2309;&#2346;&#2357;&#2381;&#2351;&#2351;&#2368; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A <b>quasi-static process</b> (also called a <b>quasi-equilibrium process</b>) is an <b>infinitely slow process</b> in which the system remains in <b>thermal and mechanical equilibrium</b> with its surroundings <b>at all times</b>. This means:</p><p>&bull; <b>Thermal equilibrium</b> &rarr; No significant temperature differences within the system.</p><p>&bull; <b>Mechanical equilibrium</b> &rarr; No unbalanced forces or pressure differences within the system.</p><p>This assumption allows the process to be <b>reversible</b> and ensures that the system passes through a continuous series of equilibrium states.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are correct regarding a Carnot engine?</p><p>I. A Carnot engine is a reversible engine operating between two temperatures, a hot reservoir at T&#8321; and a cold reservoir at T&#8322;</p><p>II. The efficiency of a Carnot engine depends on the working substance used in the cycle .</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2352;&#2381;&#2344;&#2379; &#2311;&#2306;&#2332;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>I. &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2344;&#2379; &#2311;&#2306;&#2332;&#2344; &#2319;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2357;&#2352;&#2381;&#2340;&#2368; &#2311;&#2306;&#2332;&#2344; &#2361;&#2376; &#2332;&#2379; &#2342;&#2379; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2330;&#2366;&#2354;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, T&#8321; &#2346;&#2352; &#2319;&#2325; &#2327;&#2352;&#2381;&#2350; &#2332;&#2354;&#2366;&#2358;&#2351; &#2324;&#2352; T&#8322; &#2346;&#2352; &#2319;&#2325; &#2336;&#2306;&#2337;&#2366; &#2332;&#2354;&#2366;&#2358;&#2351;&#2404;</p><p>II. &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2344;&#2379; &#2311;&#2306;&#2332;&#2344; &#2325;&#2368; &#2342;&#2325;&#2381;&#2359;&#2340;&#2366; &#2330;&#2325;&#2381;&#2352; &#2350;&#2375;&#2306; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2358;&#2368;&#2354; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A <b>Carnot engine</b> is an <b>idealized heat engine</b> that operates in a <b>reversible cycle</b> between two thermal reservoirs:</p><p>&bull; A <b>hot reservoir</b> at temperature T&#8321;.</p><p>&bull; A <b>cold reservoir</b> at temperature T&#8322;.</p><p>The efficiency (&#951;) of a Carnot engine is given by:</p><p>&#951; = 1  -  (T&#8322;/ T&#8321;)</p><p>where T1&#8203; and T2 are in <b>Kelvin</b>.</p><p>Statement II is incorrect. The <b>efficiency of a Carnot engine is independent of</b></p><p><b>the nature of the working substance</b>. It depends only on the temperatures of</p><p>the hot and cold reservoirs.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>According to the Kelvin-Planck statement of the Second Law of Thermodynamics, which of the following is impossible?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2314;&#2359;&#2381;&#2350;&#2366;&#2327;&#2340;&#2367;&#2325;&#2368; &#2325;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2325;&#2375;&#2354;&#2381;&#2357;&#2367;&#2344;-&#2346;&#2381;&#2354;&#2376;&#2306;&#2325; &#2325;&#2341;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2360;&#2306;&#2349;&#2357; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Transfer of heat from a colder to a hotter object.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2336;&#2339;&#2381;&#2337;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2360;&#2375; &#2325;&#2367;&#2360;&#2368; &#2327;&#2352;&#2381;&#2350; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2368; &#2323;&#2352; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2339;&#2404;</span>",
      "<span class=\"eqt\">A process where work is done on the system, and its internal energy increases.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2346;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2313;&#2360;&#2325;&#2368; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2314;&#2352;&#2381;&#2332;&#2366; &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A process whose sole result is the absorption of heat from a reservoir and the complete conversion of the heat into work.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2332;&#2367;&#2360;&#2325;&#2366; &#2319;&#2325;&#2350;&#2366;&#2340;&#2381;&#2352; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2325;&#2367;&#2360;&#2368; &#2349;&#2339;&#2381;&#2337;&#2366;&#2352; &#2360;&#2375; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2366; &#2309;&#2357;&#2358;&#2379;&#2359;&#2339; &#2324;&#2352; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2366; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2325;&#2366;&#2352;&#2381;&#2351; &#2350;&#2375;&#2306; &#2352;&#2370;&#2346;&#2366;&#2306;&#2340;&#2352;&#2339; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A process where a gas expands and does work on its surroundings.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2327;&#2376;&#2360; &#2347;&#2376;&#2354;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2309;&#2346;&#2344;&#2375; &#2310;&#2360;&#2346;&#2366;&#2360; &#2325;&#2375; &#2357;&#2366;&#2340;&#2366;&#2357;&#2352;&#2339; &#2346;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Kelvin-Planck statement of the Second Law of Thermodynamics</b> states that:</p><p><i>\"It is impossible to construct a heat engine that operates in a cyclic process and converts all the heat absorbed from a single thermal reservoir into an equivalent amount of work, without rejecting some heat to a colder reservoir.\"</i></p><p>This means <b>no heat engine can have 100% efficiency</b> because some energy must always be lost as waste heat to a colder reservoir.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>What does the Clausius statement of the Second Law of Thermodynamics imply is impossible?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2354;&#2380;&#2360;&#2367;&#2351;&#2360; &#2325;&#2375; &#2314;&#2359;&#2381;&#2350;&#2366;&#2327;&#2340;&#2367;&#2325;&#2368; &#2325;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2325;&#2341;&#2344; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2340;&#2366;&#2340;&#2381;&#2346;&#2352;&#2381;&#2351; &#2361;&#2376; &#2325;&#2367; &#2351;&#2361; &#2309;&#2360;&#2306;&#2349;&#2357; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The efficiency of a heat engine being 100%.</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2359;&#2381;&#2350;&#2366; &#2311;&#2306;&#2332;&#2344; &#2325;&#2368; &#2342;&#2325;&#2381;&#2359;&#2340;&#2366; 100% &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The transfer of heat from a colder object to a hotter object as the sole result.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2350;&#2366;&#2340;&#2381;&#2352; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2351;&#2361; &#2361;&#2376; &#2325;&#2367; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2339; &#2336;&#2339;&#2381;&#2337;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2360;&#2375; &#2327;&#2352;&#2381;&#2350; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2368; &#2323;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Work being converted into heat.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2366; &#2314;&#2359;&#2381;&#2350;&#2366; &#2350;&#2375;&#2306; &#2352;&#2370;&#2346;&#2366;&#2306;&#2340;&#2352;&#2339;&#2404;</span>",
      "<span class=\"eqt\">The internal energy of an isolated system remaining constant.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2371;&#2341;&#2325; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2381;&#2341;&#2367;&#2352; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>Clausius statement of the Second Law of Thermodynamics</b> states:</p><p><i>\"It is impossible for a system to transfer heat from a colder body to a hotter body without external work being done on the system.\"</i></p><p>This means that <b>heat does not spontaneously flow from a cold object to a hot object</b> without the input of external energy (e.g., work). This is why <b>refrigerators and air conditioners require electrical energy to operate</b>.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>A reversible process is defined as one that:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2357;&#2352;&#2381;&#2340;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Occurs spontaneously in nature.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2340;&#2307; &#2328;&#2335;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Involves dissipative effects like friction.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2350;&#2375;&#2306; &#2328;&#2352;&#2381;&#2359;&#2339; &#2332;&#2376;&#2360;&#2375; &#2309;&#2346;&#2357;&#2381;&#2351;&#2351;&#2368; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Takes the system through non-equilibrium states.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2379; &#2327;&#2376;&#2352;-&#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366;&#2323;&#2306; &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2354;&#2375; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Can be turned back such that both the system and the surroundings return to their original states with no other changeso anywhere.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2375; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2357;&#2366;&#2346;&#2360; &#2354;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2324;&#2352; &#2310;&#2360;-&#2346;&#2366;&#2360; &#2325;&#2366; &#2357;&#2366;&#2340;&#2366;&#2357;&#2352;&#2339;, &#2342;&#2379;&#2344;&#2379;&#2306; &#2361;&#2368; &#2348;&#2367;&#2344;&#2366; &#2325;&#2367;&#2360;&#2368; &#2309;&#2344;&#2381;&#2351; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375;, &#2309;&#2346;&#2344;&#2368; &#2350;&#2370;&#2354; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2354;&#2380;&#2335; &#2310;&#2319;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A <b>reversible process</b> is an <b>idealized thermodynamic process</b> that can be reversed without leaving any trace on the system or surroundings. This means:</p><p>&bull; The system passes through a continuous series of <b>equilibrium states</b>.</p><p>&bull; There are <b>no dissipative effects</b> like friction or turbulence.</p><p>&bull; Both the <b>system and surroundings return to their exact initial conditions</b> if the process is reversed.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>In a cyclic process, what is the change in internal energy (&#8710;U) of the system?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2330;&#2325;&#2381;&#2352;&#2368;&#2351; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2314;&#2352;&#2381;&#2332;&#2366; (&#8710;U) &#2350;&#2375;&#2306; &#2325;&#2381;&#2351;&#2366; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Positive.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325;&#2404;</span>",
      "<span class=\"eqt\">Negative.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325;&#2404;</span>",
      "<span class=\"eqt\">Zero.</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2370;&#2344;&#2381;&#2351;&#2404;</span>",
      "<span class=\"eqt\">Equal to the heat absorbed.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2358;&#2379;&#2359;&#2367;&#2340; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In a <b>cyclic process</b>, the system <b>returns to its initial state</b> after completing one full cycle. Since <b>internal energy (UUU) is a state function</b>, its change over a complete cycle is:</p><p>&#916;U=U<sub>final</sub>&#8722;U<sub>initial</sub>=0</p><p>According to the <b>First Law of Thermodynamics</b>:</p><p>&#916;U=Q&#8722;W</p><p>For a cyclic process:</p><p>&#916;U=0=&gt;Q=W</p><p>This means that the <b>net heat absorbed</b> by the system is equal to the <b>net work done</b> by the system over the cycle.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Match each thermodynamic process with its correct characteristic equation or definition.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Processes</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Characteristics</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.Isobaric</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.Constant Volume</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.Isothermal</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.No heat exchange</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.Adiabatic</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.Constant temperature</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.Isochoric</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.Constant pressure</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2314;&#2359;&#2381;&#2350;&#2366;&#2327;&#2340;&#2367;&#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2360;&#2361;&#2368; &#2309;&#2349;&#2367;&#2354;&#2325;&#2381;&#2359;&#2339;&#2367;&#2325; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2351;&#2366; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2366; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2319;&#2305;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.&#2360;&#2350;&#2342;&#2366;&#2348; &#2352;&#2375;&#2326;&#2368;&#2351;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.&#2360;&#2381;&#2341;&#2367;&#2352; &#2310;&#2351;&#2340;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2310;&#2311;&#2360;&#2379;&#2341;&#2352;&#2381;&#2350;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2325;&#2379;&#2312; &#2314;&#2359;&#2381;&#2350;&#2366; &#2357;&#2367;&#2344;&#2367;&#2350;&#2351; &#2344;&#2361;&#2368;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2352;&#2369;&#2342;&#2381;&#2343;&#2379;&#2359;&#2381;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2360;&#2381;&#2341;&#2367;&#2352; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2310;&#2311;&#2360;&#2379;&#2325;&#2379;&#2352;&#2367;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2360;&#2381;&#2341;&#2367;&#2352; &#2342;&#2348;&#2366;&#2357;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-d,ii-c,iii-b,iv-a</span><span class=\"hqt\" style=\"display:none\">i-d,ii-c,iii-b,iv-a</span>",
      "<span class=\"eqt\">i-b,ii-c,iii-d,iv-a</span><span class=\"hqt\" style=\"display:none\">i-b,ii-c,iii-d,iv-a</span>",
      "<span class=\"eqt\">i-c,ii-b,iii-d,iv-a</span><span class=\"hqt\" style=\"display:none\">i-c,ii-b,iii-d,iv-a</span>",
      "<span class=\"eqt\">i-a,ii-b,iii-c,iv-d</span><span class=\"hqt\" style=\"display:none\">i-a,ii-b,iii-c,iv-d</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Isobaric Process (Constant Pressure, P= constant)</b></p><p>&bull; In an <b>isobaric process</b>, the <b>pressure remains constant</b> while volume and temperature may change.</p><p>&bull; The first law of thermodynamics applies as: Q=&#916;U+W</p><p><b>Isothermal Process (Constant Temperature, T = constant)</b></p><p>&bull; In an <b>isothermal process</b>, the <b>temperature remains constant</b> (&#916;T =0), meaning the internal energy of the system does not change.</p><p>&bull; The first law simplifies to:</p><p>Q=W</p><p><b>Adiabatic Process (No Heat Exchange, Q=0)</b></p><p>&bull; In an <b>adiabatic process</b>, <b>no heat is exchanged</b> with the surroundings (Q=0).</p><p>&bull; The first law reduces to:</p><p>&#916;U =&#8722;W</p><p><b>Isochoric Process (Constant Volume, V= constant)</b></p><p>&bull; In an <b>isochoric process</b>, <b>the volume remains constant</b> (&#916;V=0), meaning no work is done by or on the system.</p><p>&bull; The first law simplifies to:</p><p>Q=&#916;U</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>During an adiabatic expansion of an ideal gas, its temperature:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2310;&#2342;&#2352;&#2381;&#2358; &#2327;&#2376;&#2360; &#2325;&#2375; &#2352;&#2369;&#2342;&#2381;&#2343;&#2379;&#2359;&#2381;&#2350; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2313;&#2360;&#2325;&#2366; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344;:</p></span>",
    "options": [
      "<span class=\"eqt\">Increases.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;.</span>",
      "<span class=\"eqt\">Remains constant.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;.</span>",
      "<span class=\"eqt\">Decreases.</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2335;&#2340;&#2366; &#2361;&#2376;.</span>",
      "<span class=\"eqt\">First increases then decreases.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2361;&#2354;&#2375; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376; &#2347;&#2367;&#2352; &#2328;&#2335;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>An <b>adiabatic process</b> is one in which <b>no heat exchange</b> occurs between the system and its surroundings (Q=0). According to the <b>First Law of Thermodynamics</b>:</p><p>&#916;U=Q&#8722;W</p><p>Since Q=0, this simplifies to:</p><p>&#916;U=&#8722;W</p><p>For an <b>expansion</b> process, the gas does <b>positive work</b> on its surroundings (W&gt;0). This means:</p><p>&#916;U&lt;0</p><p>For an <b>ideal gas</b>, internal energy (U) is directly proportional to <b>temperature</b> (T), so a <b>decrease in internal energy means a decrease in temperature</b>.</p><p>Thus, <b>during an adiabatic expansion, the temperature of the gas decreases</b>.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an extensive thermodynamic variable?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2319;&#2325; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2314;&#2359;&#2381;&#2350;&#2366;&#2327;&#2340;&#2367;&#2325; &#2330;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pressure.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2348;&#2366;&#2357;&#2404;</span>",
      "<span class=\"eqt\">Temperature.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2346;&#2350;&#2366;&#2344;&#2404;</span>",
      "<span class=\"eqt\">Density.</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2344;&#2340;&#2381;&#2357;&#2404;</span>",
      "<span class=\"eqt\">Volume<b>.</b></span><span class=\"hqt\" style=\"display:none\">&#2357;&#2377;&#2354;&#2381;&#2351;&#2370;&#2350;.</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Thermodynamic variables can be classified as:</p><p><b>Extensive Variables</b> &rarr; <b>Depend on the size or amount of the system.</b></p><p>o Examples: <b>Mass, Volume, Internal Energy, Entropy</b></p><p>o If you double the system size, these quantities also double.</p><p><b>Intensive Variables</b> &rarr; <b>Do not depend on the system size.</b></p><p>o Examples: <b>Pressure, Temperature, Density</b></p><p>o These remain the same regardless of how much of the substance is present.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Consider two systems A and B in thermal equilibrium. According to the Zeroth Law of Thermodynamics:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2341;&#2352;&#2381;&#2350;&#2354; &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2350;&#2375;&#2306; &#2342;&#2379; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2367;&#2351;&#2379;&#2306; A &#2324;&#2352; B &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404; &#2314;&#2359;&#2381;&#2350;&#2346;&#2381;&#2352;&#2357;&#2376;&#2327;&#2367;&#2325;&#2368; &#2325;&#2375; &#2358;&#2370;&#2344;&#2381;&#2351;&#2357;&#2375;&#2306; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;:</p></span>",
    "options": [
      "<span class=\"eqt\">They must have different temperatures.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2325;&#2366; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</span>",
      "<span class=\"eqt\">They can exchange heat even without a temperature difference.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2352; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366; &#2349;&#2368; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2366; &#2310;&#2342;&#2366;&#2344;-&#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They must have the same temperature.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2325;&#2366; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</span>",
      "<span class=\"eqt\">They cannot be in mechanical equilibrium.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2351;&#2366;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325; &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2350;&#2375;&#2306; &#2344;&#2361;&#2368;&#2306; &#2352;&#2361; &#2360;&#2325;&#2340;&#2375;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Zeroth Law of Thermodynamics</b> states:</p><p><i>\"If two systems, A and B, are each in thermal equilibrium with a third system C, then A and B are in thermal equilibrium with each other.\"</i></p><p>This means that when <b>two systems are in thermal equilibrium</b>, they <b>must have the same temperature</b>. This principle forms the basis for the definition of <b>temperature</b> and allows us to use thermometers to measure it consistently.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>The amount of heat required to change the temperature of a substance is proportional to its:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2375; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2325;&#2379; &#2348;&#2342;&#2354;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2313;&#2360;&#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Specific heat capacity only.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2314;&#2359;&#2381;&#2350;&#2366; &#2343;&#2366;&#2352;&#2367;&#2340;&#2366;.</span>",
      "<span class=\"eqt\">Temperature change only.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;.</span>",
      "<span class=\"eqt\">Both mass and temperature change.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2324;&#2352; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2348;&#2342;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Pressure and volume.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2348;&#2366;&#2357; &#2324;&#2352; &#2310;&#2351;&#2340;&#2344;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The amount of heat (Q) required to change the temperature of a substance is given by the formula:</p><p>Q=mc&#916;T</p><p>Where:</p><p>&bull; Q = Heat energy absorbed or released</p><p>&bull; m = Mass of the substance</p><p>&bull; c = Specific heat capacity</p><p>&bull; &#916;T = Change in temperature</p><p>From this equation, we see that <b>the heat required is directly proportional to both the mass (m) of the substance and the temperature change (&#916;T).</b></p>",
    "question_index": 19
  }
];
