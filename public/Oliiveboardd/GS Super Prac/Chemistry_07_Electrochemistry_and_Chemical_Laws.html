        const questions = [
  {
    "question": "<span class=\"eqt\"><p>According to a law postulated by _________, the amounts of different substances liberated by the same quantity of electricity passing through the electrolytic solution are proportional to their chemical equivalent weights.</p></span><span class=\"hqt\" style=\"display:none\"><p>___________ &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2346;&#2366;&#2342;&#2367;&#2340; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2309;&#2346;&#2328;&#2335;&#2344;&#2368; &#2357;&#2367;&#2354;&#2351;&#2344; &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2350;&#2366;&#2344; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2368; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2313;&#2344;&#2325;&#2375; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2340;&#2369;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2368; &#2349;&#2366;&#2352; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">John Dalton</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2377;&#2344; &#2337;&#2366;&#2354;&#2381;&#2335;&#2344;</span>",
      "<span class=\"eqt\">Joseph Fourier</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2379;&#2360;&#2375;&#2347; &#2347;&#2370;&#2352;&#2367;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Michael Faraday</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2311;&#2325;&#2354; &#2347;&#2376;&#2352;&#2366;&#2337;&#2375;</span>",
      "<span class=\"eqt\">Alfred Nobel</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2347;&#2381;&#2352;&#2375;&#2337; &#2344;&#2379;&#2348;&#2375;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Michael Faraday's</b> law of electrolysis states that the amount of substance liberated during electrolysis is directly proportional to the quantity of electricity passing through the electrolyte and inversely proportional to the equivalent weight of the substance. This principle forms the basis of quantitative analysis in electrochemistry.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>_________ Law of independent migration of ions states that limiting molar conductivity of an Electrolyte can be represented as the sum of the individual contributions of the anion and cation of the electrolyte.</p></span><span class=\"hqt\" style=\"display:none\"><p>________&#2310;&#2351;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2346;&#2381;&#2352;&#2357;&#2366;&#2360; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2354;&#2366;&#2311;&#2335; &#2325;&#2368; &#2360;&#2368;&#2350;&#2367;&#2340; &#2350;&#2379;&#2354;&#2352; &#2330;&#2366;&#2354;&#2325;&#2340;&#2366; &#2325;&#2379; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2354;&#2366;&#2311;&#2335; &#2325;&#2375; &#2315;&#2339;&#2366;&#2351;&#2344; &#2324;&#2352; &#2343;&#2344;&#2366;&#2351;&#2344; &#2325;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Dirac</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2352;&#2366;&#2325;</span>",
      "<span class=\"eqt\">Kohlrausch</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2361;&#2354;&#2352;&#2380;&#2358;</span>",
      "<span class=\"eqt\">Schr&#246;dinger</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2379;&#2337;&#2367;&#2306;&#2327;&#2352;</span>",
      "<span class=\"eqt\">Feynman</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2375;&#2344;&#2350;&#2376;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Kohlrausch's law</b> of independent migration of ions states that the molar conductivity of an electrolyte at infinite dilution is the sum of the individual contributions of its constituent ions. This principle is fundamental in understanding the conductive properties of electrolyte solutions.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements best describes the Hardy Schulze rule?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2361;&#2366;&#2352;&#2381;&#2337;&#2368; &#2358;&#2369;&#2354;&#2381;&#2332;&#2364; &#2344;&#2367;&#2351;&#2350; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">The ions are removed from the solution by the phenomenon of diffusion through a permeable membrane.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2344;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2346;&#2366;&#2352;&#2327;&#2350;&#2381;&#2351; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2357;&#2367;&#2360;&#2352;&#2339; &#2325;&#2368; &#2328;&#2335;&#2344;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2354;&#2351;&#2344; &#2360;&#2375; &#2361;&#2335;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The partial pressure of a component in a liquid mixture is proportional to its mole fraction in that mixture.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2342;&#2381;&#2352;&#2357; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2368; &#2328;&#2335;&#2325; &#2325;&#2366; &#2310;&#2306;&#2358;&#2367;&#2325; &#2342;&#2366;&#2348; &#2313;&#2360; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2313;&#2360;&#2325;&#2375; &#2350;&#2379;&#2354; &#2309;&#2306;&#2358; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">This is applied to obtain a colloidal solution of metals such as gold, silver, or platinum.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2360;&#2379;&#2344;&#2366;, &#2330;&#2366;&#2306;&#2342;&#2368; &#2351;&#2366; &#2346;&#2381;&#2354;&#2376;&#2335;&#2367;&#2344;&#2350; &#2332;&#2376;&#2360;&#2368; &#2343;&#2366;&#2340;&#2369;&#2323;&#2306; &#2325;&#2366; &#2325;&#2379;&#2354;&#2366;&#2311;&#2337;&#2354; &#2357;&#2367;&#2354;&#2351;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The amount of electrolyte required for the coagulation of a definite amount of a colloidal solution is dependent on the valency of the coagulating ion.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2354;&#2366;&#2311;&#2337;&#2368; &#2357;&#2367;&#2354;&#2351;&#2344; &#2325;&#2368; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2332;&#2350;&#2366;&#2357; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2309;&#2346;&#2328;&#2335;&#2381;&#2351; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2332;&#2350;&#2366;&#2357; &#2310;&#2351;&#2344; &#2325;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2325;&#2340;&#2366; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Hardy Schulze rule is a principle in colloid chemistry that states the coagulating power of an electrolyte is directly related to the valency (charge) of its ions. Specifically, the higher the valency of the coagulating ion, the less electrolyte is required to coagulate a colloidal solution. For example, a trivalent ion (like Al&ge;&#8314;) is more effective than a divalent ion (like Ca&#178;&#8314;), which is more effective than a monovalent ion (like Na&#8314;).</p><p>&#183; Option 1 describes osmosis or dialysis, not the Hardy Schulze rule.</p><p>&#183; Option 2 refers to Raoult's Law, unrelated to colloids.</p><p>&#183; Option 3 pertains to the preparation of colloidal solutions, not coagulation.</p><p>&#183; Option 4 accurately describes the Hardy Schulze rule.</p><p>Thus, the correct answer is option 4.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In which year did John Alexander Newlands propound a new concept of the 'Law of Octaves' proposing the periodicity of chemical elements arranged in order of atomic weight?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2377;&#2344; &#2309;&#2354;&#2375;&#2325;&#2381;&#2332;&#2375;&#2306;&#2337;&#2352; &#2344;&#2381;&#2351;&#2370;&#2354;&#2376;&#2306;&#2337;&#2381;&#2360; &#2344;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; '&#2309;&#2359;&#2381;&#2335;&#2325; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350;' &#2325;&#2368; &#2319;&#2325; &#2344;&#2312; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2368; &#2341;&#2368;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2349;&#2366;&#2352; &#2325;&#2375; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2368; &#2310;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1860</span><span class=\"hqt\" style=\"display:none\">1860</span>",
      "<span class=\"eqt\">1865</span><span class=\"hqt\" style=\"display:none\">1865</span>",
      "<span class=\"eqt\">1873</span><span class=\"hqt\" style=\"display:none\">1873</span>",
      "<span class=\"eqt\">1870</span><span class=\"hqt\" style=\"display:none\">1870</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In <b>1865</b>, John Alexander Newlands proposed the \"Law of Octaves,\" which suggested that the properties of elements repeat every eighth element when arranged in order of increasing atomic weight. He compared this periodicity to the musical octaves, drawing parallels between the chemical elements and notes in a musical scale.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The number of atoms in exactly 12 g of carbon-12 is known as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2352;&#2381;&#2348;&#2344;-12 &#2325;&#2375; &#2336;&#2368;&#2325; 12 &#2327;&#2381;&#2352;&#2366;&#2350; &#2350;&#2375;&#2306; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Avogadro's constant</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2379;&#2327;&#2366;&#2342;&#2381;&#2352;&#2379; &#2360;&#2381;&#2341;&#2367;&#2352;&#2366;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Rydberg constant</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2337;&#2348;&#2352;&#2381;&#2327; &#2360;&#2381;&#2341;&#2367;&#2352;&#2366;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Planck's constant</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2376;&#2306;&#2325; &#2360;&#2381;&#2341;&#2367;&#2352;&#2366;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Faraday's constant</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2376;&#2352;&#2366;&#2337;&#2375; &#2360;&#2381;&#2341;&#2367;&#2352;&#2366;&#2306;&#2325;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Avogadro's constant</b> (6.022  X  10&#178;&ge;) defines the number of atoms in <b>exactly 12 grams of carbon-12 (&#185;&#178;C)</b>, which is the basis for the <b>mole</b> (SI unit of amount of substance).</p><p><b>Further insights:</b></p><p>&#183; <b>Rydberg constant</b>: Relates to atomic spectra (wavelengths of light emitted by hydrogen).</p><p>&#183; <b>Planck's constant</b>: Fundamental in quantum mechanics (E=h&#957;).</p><p>&#183; <b>Faraday's constant</b>: Charge per mole of electrons (96,485&#8201;C/mol).</p><p><b>Key Note:</b></p><p>1 mole of <i>any substance</i> contains Avogadro's number of entities (atoms, molecules, etc.).</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The tendency of an atom or a functional group to attract a shared pair of electrons toward itself, is known as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2350;&#2370;&#2361; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2366;&#2333;&#2366; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2379; &#2309;&#2346;&#2344;&#2368; &#2323;&#2352; &#2310;&#2325;&#2352;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2325;&#2379; &#2311;&#2360; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">electronegativity</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2376;&#2342;&#2381;&#2351;&#2369;&#2340;&#2368;&#2351;&#2315;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325;&#2340;&#2366;</span>",
      "<span class=\"eqt\">electron affinity</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2310;&#2340;&#2381;&#2350;&#2368;&#2351;&#2340;&#2366;</span>",
      "<span class=\"eqt\">electro-positivity</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;-&#2346;&#2377;&#2332;&#2364;&#2367;&#2335;&#2367;&#2357;&#2367;&#2335;&#2368;</span>",
      "<span class=\"eqt\">electro attraction</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2310;&#2325;&#2352;&#2381;&#2359;&#2339;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Electronegativity</b> is a chemical property that describes the tendency of an atom (or a functional group) to attract a shared pair of electrons (or electron density) towards itself when it is part of a chemical bond.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; Electron affinity: This is the energy change (usually release) that occurs when an electron is added to a neutral atom in the gaseous state to form a negative ion. It measures the atom's ability to accept an electron.</p><p>&#8226; Electro-positivity: This is the tendency of an atom to lose electrons and form positive ions. It is essentially the opposite of electronegativity. Metals are generally electropositive.</p><p>&#8226; electro attraction: This is a general term and not a specific chemical property like electronegativity.</p><p><b>Further insights:</b></p><p>&#8226; Electronegativity is a relative scale, often measured using scales like the Pauling scale or Mulliken scale.</p><p>&#8226; Fluorine is the most electronegative element.</p><p>&#8226; Differences in electronegativity between bonded atoms determine the polarity of a covalent bond. If the difference is large, the bond is considered ionic.</p>",
    "question_index": 5
  },

      "<span class=\"eqt\">ignition temperature</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2327;&#2381;&#2344;&#2367;&#2358;&#2344; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344;</span>"

    "question": "<span class=\"eqt\"><p>In which year did Johannes Nicolaus Br&#248;nsted and Thomas Martin Lowry propose the fundamental concept of acids and bases?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2332;&#2379;&#2361;&#2366;&#2344;&#2381;&#2360; &#2344;&#2367;&#2325;&#2379;&#2354;&#2360; &#2348;&#2381;&#2352;&#2379;&#2306;&#2360;&#2381;&#2335;&#2375;&#2337; &#2324;&#2352; &#2341;&#2377;&#2350;&#2360; &#2350;&#2366;&#2352;&#2381;&#2335;&#2367;&#2344; &#2354;&#2379;&#2352;&#2368; &#2344;&#2375; &#2309;&#2350;&#2381;&#2354; &#2324;&#2352; &#2325;&#2381;&#2359;&#2366;&#2352; &#2325;&#2368; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2352;&#2326;&#2366; &#2341;&#2366;?</span>",

      "<span class=\"eqt\">1923</span><span class=\"hqt\" style=\"display:none\">1923</span>"

    "correct_option_id": 3,
    "solution": "<p>In 1923, Johannes Nicolaus Br&#248;nsted (Denmark) and Thomas Martin Lowry (UK) independently proposed the Br&#248;nsted-Lowry concept of acids and bases.</p><p>&#183; Acid: A substance that donates a proton (H&#8314;).</p><p>&#183; Base: A substance that accepts a proton (H&#8314;).</p><p>This definition expanded on the Arrhenius theory, allowing acids and bases to be understood beyond aqueous solutions.</p><p>Example:</p><p>&#183; HCl &rarr; H&#8314; + Cl&#8315; (HCl is an acid because it donates H&#8314;).</p><p>&#183; NH&#8323; + H&#8314; &rarr; NH&#8324;&#8314; (NH&#8323; is a base because it accepts H&#8314;).</p>",
