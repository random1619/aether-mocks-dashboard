    "solution": "<p>&bull; <b>World Wildlife Day:</b> March 3</p><p>o World Wildlife Day was established by the United Nations General Assembly on December 20, 2013, and is celebrated annually on March 3rd, coinciding with the anniversary of the adoption of the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES) in 1973.</p><p>&bull; <b>National Security Day:</b> March 4</p><p>o In India, March 04 is celebrated as National Security Day (Rastriya Suraksha Diwas) every year, in the honour of the Indian Security Forces.</p><p>&bull; <b>International Women's Day:</b> March 8</p><p>o IWD celebrates women's social, economic, cultural, and political achievements and calls for action to accelerate gender equality.</p><p>&bull; <b>World Consumer Rights Day:</b> March 15</p><p>o World Consumer Rights Day was inspired by President John F Kennedy, who sent a special message to the US Congress on 15th March 1962, in which he formally addressed the issue of consumer rights.</p>",

    "correct_option_id": 0,
    "solution": "<p>&bull; <b>June 5:</b> World Environment Day</p><p>o Led by the United Nations Environment Programme (UNEP) and held annually on 5 June since 1973, World Environment Day is the largest global platform for environmental public outreach and is celebrated by millions of people across the world.</p><p>&bull; <b>June 14:</b> World Blood Donor Day</p><p>o World Blood Donor Day, celebrated annually on 14 June, is a worldwide celebration to honour and thank those people who donate their blood, voluntarily and unpaid, to give others the gift of life. It is celebrated on the day of birthday anniversary of Karl Landsteiner, who discovered the ABO blood group system.</p><p>&bull; <b>June 21:</b> International Yoga Day</p><p>o Recognizing its universal appeal, on 11 December 2014, the United Nations proclaimed 21 June as the International Day of Yoga by resolution 69/131. The International Day of Yoga aims to raise awareness worldwide of the many benefits of practicing yoga.</p><p>&bull; <b>June 20:</b> World Refugee Day</p><p>o World Refugee Day is an international day organised every year on 20 June by the United Nations. It is designed to celebrate and honour refugees from around the world. The day was first established on 20 June 2001, in recognition of the 50th anniversary of the 1951 Convention Relating to the Status of Refugees.</p>",
