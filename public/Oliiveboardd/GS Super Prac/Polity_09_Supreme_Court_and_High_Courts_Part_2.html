    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The Supreme Court of India was inaugurated on _________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2313;&#2342;&#2381;&#2328;&#2366;&#2335;&#2344; _________ &#2325;&#2379; &#2361;&#2369;&#2310; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">26 January 1950</span><span class=\"hqt\" style=\"display:none\">26 &#2332;&#2344;&#2357;&#2352;&#2368; 1950</span>",
      "<span class=\"eqt\">26 November 1949</span><span class=\"hqt\" style=\"display:none\">26 &#2344;&#2357;&#2306;&#2348;&#2352; 1949</span>",
      "<span class=\"eqt\">28 January 1951</span><span class=\"hqt\" style=\"display:none\">28 &#2332;&#2344;&#2357;&#2352;&#2368; 1951</span>",
      "<span class=\"eqt\">28 January 1950</span><span class=\"hqt\" style=\"display:none\">28 &#2332;&#2344;&#2357;&#2352;&#2368; 1950</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The Supreme Court of India was inaugurated on 28 January 1951.</p><p>Further Insight:</p><p>&bull; Supreme Court of India</p><p>&#9675; The Indian Constitution establishes an integrated judicial system with the Supreme Court at the apex.</p><p>&#9675; Below the Supreme Court are various High Courts, forming a unified judicial hierarchy.</p><p>&#9675; This single judiciary system was adopted from the Government of India Act, 1935.</p><p>&#9675; The Supreme Court of India was inaugurated on 28th January 1950.</p><p>&#9675; Articles 124 to 147 in Part V of the Indian Constitution outline the structure and jurisdiction of the Supreme Court.</p><p>&#9675; The Supreme Court comprises the Chief Justice of India (CJI) and 33 other judges.</p><p>&#9675; Initially, the court had 30 judges and the CJI.</p><p>&#9675; The Supreme Court (Number of Judges) Amendment Act, 2019 increased the total number of judges, including the CJI, to 34.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements about the Supreme Court is Correct?</p><p>a) Supreme Court is the highest court of appeal in the country.</p><p>b) Supreme Court can hear appeals from any High Court or Tribunal but not cases or judgement related to Armed Forces.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>a) &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2309;&#2346;&#2368;&#2354; &#2325;&#2366; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2361;&#2376;&#2404;</p><p>b) &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2351;&#2366; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2367;&#2325;&#2352;&#2339; &#2325;&#2368; &#2309;&#2346;&#2368;&#2354; &#2360;&#2369;&#2344; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2360;&#2358;&#2360;&#2381;&#2340;&#2381;&#2352; &#2348;&#2354;&#2379;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2351;&#2366; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351;&#2379;&#2306; &#2346;&#2352; &#2360;&#2369;&#2344;&#2357;&#2366;&#2312; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both a and b</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; b &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Neither a and b</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; a &#2324;&#2352; &#2344; &#2361;&#2368; b</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The Supreme Court is the highest court of appeal in the country.</p><p>&bull; The Supreme Court can hear appeals from any High Court or Tribunal but not cases or judgement related to Armed Forces.</p><p>Further Insight:</p><p>&bull; Article 132: Appellate Jurisdiction of Supreme Court in Appeals from High Courts in Certain Cases</p><p>&#9675; An appeal shall lie to the Supreme Court from any judgment, decree, or final order of a High Court in the territory of India, whether in a civil, criminal, or other proceeding, if the High Court certifies under Article 134A that the case involves a substantial question of law as to the interpretation of this Constitution.</p><p>&bull; Article 133: Appellate Jurisdiction of Supreme Court in Appeals from High Courts in Civil Matters</p><p>&#9675; An appeal shall lie to the Supreme Court from any judgment, decree, or final order in a civil proceeding of a High Court in the territory of India if the High Court certifies under Article 134A:</p><p>(a) That the case involves a substantial question of law of general importance; and</p><p>(b) That in the opinion of the High Court the said question needs to be decided by the Supreme Court.</p><p>&bull; Article 134: Appellate Jurisdiction of Supreme Court in Criminal Matters</p><p>&#9675; An appeal shall lie to the Supreme Court from any judgment, final order, or sentence in a criminal proceeding of a High Court in the territory of India if the High Court:</p><p>(a) Has on appeal reversed an order of acquittal of an accused person and sentenced him to death; or</p><p>(b) Has withdrawn for trial before itself any case from any court subordinate to its authority and has in such trial convicted the accused person and sentenced him to death; or</p><p>(c) Certifies under Article 134A that the case is a fit one for appeal to the Supreme Court:</p><p>&bull; Article 136: Special Leave to Appeal by the Supreme Court</p><p>&#9675; Notwithstanding anything in this Chapter, the Supreme Court may, in its discretion, grant special leave to appeal from any judgment, decree, determination, sentence, or order in any cause or matter passed or made by any court or tribunal in the territory of India.</p><p>&#9675; Nothing in clause (1) shall apply to any judgment, determination, sentence, or order passed or made by any court or tribunal constituted by or under any law relating to the Armed Forces.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which constitutional body or post can increase the number of Supreme Court Judges?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2344;&#2367;&#2325;&#2366;&#2351; &#2351;&#2366; &#2346;&#2342; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2348;&#2338;&#2364;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The President of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Chief Justice of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>",
      "<span class=\"eqt\">Parliament</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342;</span>",
      "<span class=\"eqt\">Collegium of Supreme Court</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2346;&#2381;&#2352;&#2368;&#2350; &#2325;&#2379;&#2352;&#2381;&#2335; &#2325;&#2366; &#2325;&#2377;&#2354;&#2375;&#2332;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Under Article 124, the Constitution vested power to increase the number of Judges to Parliament of India.</p><p>Further Insight:</p><p>&bull; Article 124: Establishment and Constitution of Supreme Court</p><p>&#9675; (1 )There shall be a Supreme Court of India consisting of a Chief Justice of India and, until Parliament by law prescribes a larger number, not more than seven other Judges.</p><p>&#9675; (2) Every Judge of the Supreme Court shall be appointed by the President by warrant under his hand and seal after consultation with such of the Judges of the Supreme Court and of the High Courts in the States as the President may deem necessary for the purpose, and shall hold office until he attains the age of sixty-five years:</p><p>&#9632; (a) A Judge may, by writing under his hand addressed to the President, resign his office;</p><p>&#9632; (b) A Judge may be removed from his office in the manner provided in clause (4).</p><p>&#9675; (3) A person shall not be qualified for appointment as a Judge of the Supreme Court unless he is a citizen of India and - </p><p>&#9632; (a) Has been for at least five years a Judge of a High Court or of two or more such Courts in succession; or</p><p>&#9632; (b) Has been for at least ten years an advocate of a High Court or of two or more such Courts in succession; or</p><p>&#9632; (c) Is, in the opinion of the President, a distinguished jurist.</p><p>&#9675; (4) A Judge of the Supreme Court shall not be removed from his office except by an order of the President passed after an address by each House of Parliament supported by a majority of the total membership of that House and by a majority of not less than two-thirds of the members of that House present and voting has been presented to the President in the same session for such removal on the ground of proved misbehaviour or incapacity.</p><p>&#9675; (5) Parliament may by law regulate the procedure for the presentation of an address and for the investigation and proof of the misbehaviour or incapacity of a Judge under clause (4).</p><p>&#9675; .(6) Every person appointed to be a Judge of the Supreme Court shall, before he enters upon his office, make and subscribe before the President, or some person appointed in that behalf by him, an oath or affirmation according to the form set out for the purpose in the Third Schedule.</p><p>&#9675; (7) No person who has held office as a Judge of the Supreme Court shall plead or act in any court or before any authority within the territory of India.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What is the maximum service period of Judges of the Supreme Court of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2360;&#2375;&#2357;&#2366; &#2309;&#2357;&#2343;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">6 years of service or 65 years of age whichever is earlier</span><span class=\"hqt\" style=\"display:none\">6 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2360;&#2375;&#2357;&#2366; &#2351;&#2366; 65 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2332;&#2379; &#2349;&#2368; &#2346;&#2361;&#2354;&#2375; &#2361;&#2379;</span>",
      "<span class=\"eqt\">6 years of service from date of Joining as judge of Supreme Court</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2349;&#2366;&#2352; &#2327;&#2381;&#2352;&#2361;&#2339; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2340;&#2367;&#2341;&#2367; &#2360;&#2375; 6 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2360;&#2375;&#2357;&#2366;</span>",
      "<span class=\"eqt\">65 years of age</span><span class=\"hqt\" style=\"display:none\">65 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369;</span>",
      "<span class=\"eqt\">6 years of service or 62 years of age whichever is earlier</span><span class=\"hqt\" style=\"display:none\">6 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2360;&#2375;&#2357;&#2366; &#2351;&#2366; 62 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2332;&#2379; &#2349;&#2368; &#2346;&#2361;&#2354;&#2375; &#2361;&#2379;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; As per Article 124 Judge of Supreme Court can hold the office till the age of 65.</p><p>Further Insight:</p><p>&bull; Article 124: Establishment and Constitution of Supreme Court</p><p>&#9675; (1 )There shall be a Supreme Court of India consisting of a Chief Justice of India and, until Parliament by law prescribes a larger number, not more than seven other Judges.</p><p>&#9675; (2) Every Judge of the Supreme Court shall be appointed by the President by warrant under his hand and seal after consultation with such of the Judges of the Supreme Court and of the High Courts in the States as the President may deem necessary for the purpose, and shall hold office until he attains the age of sixty-five years:</p><p>&#9632; (a) A Judge may, by writing under his hand addressed to the President, resign his office;</p><p>&#9632; (b) A Judge may be removed from his office in the manner provided in clause </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not qualification to become Judges of the Supreme Court?</p><p>a) Have to be born in India</p><p>b) Has been a Judge of a High Court for at least 5 years</p><p>c) Be a distinguished Jurist</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2351;&#2379;&#2327;&#2381;&#2351;&#2340;&#2366; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2348;&#2344;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p><p>a) &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2376;&#2342;&#2366; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;</p><p>b) &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; 5 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2340;&#2325; &#2325;&#2367;&#2360;&#2368; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2352;&#2361; &#2330;&#2369;&#2325;&#2366; &#2361;&#2379;</p><p>c) &#2319;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2359;&#2381;&#2336;&#2367;&#2340; &#2357;&#2367;&#2343;&#2367;&#2357;&#2375;&#2340;&#2381;&#2340;&#2366; &#2361;&#2379;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Qualification of Judges of Supreme Court given in Clause of 3 of Article 124</p><p>&bull; Article 124 : Establishment and Constitution of Supreme Court</p><p>&#9675; (3) A person shall not be qualified for appointment as a Judge of the Supreme Court unless he is a citizen of India and - </p><p>&#9632; (a) Has been for at least five years a Judge of a High Court or of two or more such Courts in succession; or</p><p>&#9632; (b) Has been for at least ten years an advocate of a High Court or of two or more such Courts in succession; or</p><p>&#9632; (c) Is, in the opinion of the President, a distinguished jurist.</p>",
    "question_index": 4

    "question": "<span class=\"eqt\"><p>What is the grounds for removal of Judges of the Supreme Court?</p><p>a) Proved Misbehaviour of the Judges of the Supreme Court</p><p>b) Incapacity to continue to be Judges of the Supreme Court</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2379; &#2361;&#2335;&#2366;&#2344;&#2375; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p>a) &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2366; &#2360;&#2367;&#2342;&#2381;&#2343; &#2342;&#2369;&#2352;&#2381;&#2357;&#2381;&#2351;&#2357;&#2361;&#2366;&#2352;</p><p>b) &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2348;&#2344;&#2375; &#2352;&#2361;&#2344;&#2375; &#2350;&#2375;&#2306; &#2309;&#2360;&#2350;&#2352;&#2381;&#2341;&#2340;&#2366;</p></span>",
    "options": [
      "<span class=\"eqt\">Both a and b</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; b &#2342;&#2379;&#2344;&#2379;&#2306;</span>",

      "<span class=\"eqt\">Neither a and b</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; a &#2324;&#2352; &#2344; &#2361;&#2368; b</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; As per the constitution of India, Article 124 ground for the removal of Supreme Court Judges is Proved Misbehaviour and incapacity.</p><p>Further Insight:</p><p>&bull; Article 124: Establishment and Constitution of Supreme Court</p><p>&#9675; (4) A Judge of the Supreme Court shall not be removed from his office except by an order of the President passed after an address by each House of Parliament supported by a majority of the total membership of that House and by a majority of not less than two-thirds of the members of that House present and voting has been presented to the President in the same session for such removal on the ground of proved misbehaviour or incapacity.</p>",

    "solution": "<p>&bull; Original Jurisdiction of the Supreme Court of India mentioned under Article 131</p><p>Further Insight:</p><p>&bull; Article 131. Original jurisdiction of the Supreme Court. - Subject to the provisions of this Constitution, the Supreme Court shall, to the exclusion of any other court, have original jurisdiction in any dispute - </p><p>&#9675; (a) between the Government of India and one or more States; or</p><p>&#9675; (b) between the Government of India and any State or States on one</p><p>&#9675; side and one or more other States on the other; or</p><p>&#9675; (c) between two or more States,</p>",

  },

    "question": "<span class=\"eqt\"><p>As per Article 134A, Certificate for appeal to the Supreme Court given by _______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 134&#2319; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2309;&#2346;&#2368;&#2354; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2350;&#2366;&#2339;&#2346;&#2340;&#2381;&#2352; _______ &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",

    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; As per Article 134A, Certificate for appeal to the Supreme Court given by the High Court.</p><p>Further Insight:</p><p>&bull; Article 134A. Certificate for appeal to the Supreme Court. - Every High Court, passing or making a judgment, decree, final order, or sentence, referred to in clause (1) of article 132 or clause (1) of article 133, or clause (1) of article 134, - </p><p>&#9675; (a) may, if it deems fit so to do, on its own motion; and</p><p>&#9675; (b) shall, if an oral application is made, by or on behalf of the party aggrieved, immediately after the passing or making of such judgment, decree, final order or sentence, </p><p>&bull; [if the High Court certifies under article 134A - ]</p><p>&#9675; (a) that the case involves a substantial question of law of general importance; and </p><p>&#9675; (b) that in the opinion of the High Court the said question needs to be decided by the Supreme Court.</p>",

    "question": "<span class=\"eqt\"><p>Which Article of the Constitution of India give power to the Supreme Court to review its own decision?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2325;&#2368; &#2360;&#2350;&#2368;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">Article 135</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 135</span>",
      "<span class=\"eqt\">Article 142</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 142</span>",
      "<span class=\"eqt\">Article 132</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 132</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Article 137 of the Constitution of India give power to the Supreme Court to review its own decision</p><p>&bull; 137. Review of judgments or orders by the Supreme Court. - Subject to the provisions of any law made by Parliament or any rules made under article 145, the Supreme Court shall have power to review any judgment pronounced or order made by it.</p><p>Further Insight:</p><p>&bull; Article 130: Supreme Court to sit in Delhi or other places as the Chief Justice of India (CJI) may appoint with Presidential approval.</p><p>&bull; Article 131: Original jurisdiction of the Supreme Court in disputes between states or between states and the Centre.</p><p>&bull; Article 131A: [Repealed] Jurisdiction over constitutional validity of Central laws.</p><p>&bull; Article 132: Appellate jurisdiction of the Supreme Court in constitutional matters.</p><p>&bull; Article 133: Appellate jurisdiction in civil cases.</p><p>&bull; Article 134: Appellate jurisdiction in criminal cases.</p><p>&bull; Article 134A: Certificate for appeal to the Supreme Court.</p><p>&bull; Article 135: Jurisdiction and powers in matters other than those under federal jurisdiction.</p><p>&bull; Article 136: Special leave to appeal by the Supreme Court in its discretion.</p><p>&bull; Article 137: Power of the Supreme Court to review its judgments or orders.</p><p>&bull; Article 138: Enlargement of the jurisdiction of the Supreme Court by Parliament.</p><p>&bull; Article 139: Power to issue writs for enforcement of fundamental rights.</p><p>&bull; Article 139A: Transfer of certain cases to the Supreme Court.</p><p>&bull; Article 140: Ancillary powers of the Supreme Court.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article under the Constitution of India, Parliament by law can confer powers to the Supreme Court to issue certain writs?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2306;&#2360;&#2342; &#2325;&#2366;&#2344;&#2370;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2379; &#2325;&#2369;&#2331; &#2352;&#2367;&#2335; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 138</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 138</span>",
      "<span class=\"eqt\">Article 139</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 139</span>",
      "<span class=\"eqt\">Article 141</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 141</span>",
      "<span class=\"eqt\">Article 143</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 143</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Using Article 139 under Constitution of India, Parliament by law can confer powers to the Supreme Court to issue certain writs.</p><p>&bull; 139. Conferment on the Supreme Court of powers to issue certain writs. - Parliament may by law confer on the Supreme Court power to issue directions, orders or writs, including writs in the nature of habeas corpus, mandamus, prohibition, quo warranto and certiorari, or any of them, for any purposes other than those mentioned in clause (2) of article 32.</p><p>Further Insight:</p><p>&bull; Article 138: Parliament can expand the jurisdiction of the Supreme Court.</p><p>&bull; Article 139: Supreme Court can issue writs for enforcement of fundamental rights.</p><p>&bull; Article 139A: Transfer of cases to the Supreme Court for ensuring uniformity.</p><p>&bull; Article 140: Supreme Court's ancillary powers to fulfill its functions.</p><p>&bull; Article 141: Supreme Court's decisions are binding as law throughout India.</p><p>&bull; Article 142: Supreme Court's power to do complete justice in any case.</p><p>&bull; Article 143: President's power to seek advisory opinions from the Supreme Court.</p><p>&bull; Article 144: All authorities in India are to act in aid of the Supreme Court.</p><p>&bull; Article 145: Supreme Court's rule-making power regarding its practice and procedure.</p><p>&bull; Article 146: Appointments and conditions of service of Supreme Court officers and staff.</p><p>&bull; Article 147: Interpretation of the Constitution and laws under Supreme Court jurisdiction.</p>",
    "question_index": 9
  },

    "question": "<span class=\"eqt\"><p>Establishment of high court mention under Article _______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2366; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; _______ &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p></span>",

      "<span class=\"eqt\">216</span><span class=\"hqt\" style=\"display:none\">216</span>",
      "<span class=\"eqt\">217</span><span class=\"hqt\" style=\"display:none\">217</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Article 214 mentions there shall be a High Court for each State.</p><p>Further Insight:</p><p>&bull; High Courts in India</p><p>&#9675; The High Court is the highest judicial authority at the state level, as per the Indian Constitution.</p><p>&#9675; Initially, the Constitution provided for a High Court in each state.</p><p>&#9675; The 7th Amendment Act, 1956, empowered Parliament to establish a common High Court for two or more states and union territories.</p><p>&#9675; Currently, there are 25 High Courts, with 7 having jurisdiction over multiple states/union territories.</p><p>&#9675; Delhi and Jammu &amp; Kashmir are union territories with their own High Courts.</p><p>&#9675; Other union territories fall under the jurisdiction of various state High Courts.</p><p>&#9675; Parliament has the authority to extend the jurisdiction of a High Court.</p><p>&#9675; The first High Courts in India were established in 1862 at Calcutta, Bombay, and Madras.</p><p>&#9675; Articles 214 to 231 (Part VI) of the Constitution detail the organisation, independence, jurisdiction, powers, and procedures of High Courts.</p>",
    "question_index": 10
  },

    "question": "<span class=\"eqt\"><p>Match the following Writs and their meaning </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Habeas Corpus</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Let us have the body</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Mandamus</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. We command</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Prohibition</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. To Forbid</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Certiorari</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Be more fully informed</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2367;&#2335;&#2379;&#2306; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2309;&#2352;&#2381;&#2341; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2348;&#2306;&#2342;&#2368; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359;&#2368;&#2325;&#2352;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2361;&#2350;&#2375;&#2306; &#2358;&#2352;&#2368;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2342;&#2375;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2346;&#2352;&#2350;&#2366;&#2342;&#2375;&#2358;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2361;&#2350; &#2310;&#2342;&#2375;&#2358; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2344;&#2367;&#2359;&#2375;&#2343;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2350;&#2344;&#2366; &#2325;&#2352;&#2344;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2313;&#2340;&#2381;&#2346;&#2381;&#2352;&#2375;&#2359;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2309;&#2343;&#2367;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2375;&#2306;</td></tr></table></span>",
    "options": [

    "correct_option_id": 0,
    "solution": "<p>&bull; Habeas Corpus: \"Let us have the body\" </p><p>&bull; Mandamus: \"We command\" </p><p>&bull; Prohibition: \"To Forbid\" </p><p>&bull; Certiorari: \"Be more fully informed or to be certified\" </p><p>&bull; Quo-Warranto: \"By which authority\"</p><p>Further Insight:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Type of Writ</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Meaning</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Purpose</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Can Be Issued Against</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cannot Be Issued Against</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Habeas Corpus</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"To have the body of.\"</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Enforces the fundamental right of individual liberty against unlawful detention.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Both private and public authorities.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lawful detention, contempt proceedings, competent court detention, detention outside jurisdiction.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Mandamus</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"We command.\"</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Orders a public official or body to perform a duty they have failed or refused to perform.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Public officials, bodies, corporations, inferior courts.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Private individuals, discretionary work, contractual obligations, Indian President, State Governors, Chief Justice acting in a judicial capacity.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Prohibition</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"To forbid.\"</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Prevents a lower court or tribunal from exceeding its jurisdiction.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Judicial and quasi-judicial authorities.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Administrative authorities, legislative bodies, private individuals.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Certiorari</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"To be certified.\"</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Orders a lower court or tribunal to transfer a case or quash its order.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Judicial, quasi-judicial authorities, and administrative authorities (post-1991).</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Legislative bodies, private individuals.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Quo-Warranto</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"By what authority or warrant.\"</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Prevents illegal usurpation of public office; questions the legality of a person's claim to public office.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Permanent public office holders (created by statute or Constitution).</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Private or ministerial offices.</td></tr></table>",

  },

    "question": "<span class=\"eqt\"><p>The Judge of the High court wrote his resignation to ________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2344;&#2375; &#2309;&#2346;&#2344;&#2366; &#2311;&#2360;&#2381;&#2340;&#2368;&#2347;&#2366; ________ &#2325;&#2379; &#2354;&#2367;&#2326;&#2366;&#2404;</p></span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; As per Article 217, A judge may, by writing under his hand addressed to the President and resign his office</p><p>Further Insight:</p><p>&bull; Article 217: Appointment and Conditions of the Office of a Judge of a High Court</p><p>&#9675; (1) Every Judge of a High Court shall be appointed by the President by warrant under his hand and seal after consultation with the Chief Justice of India, the Governor of the State, and, in the case of appointment of a Judge other than the Chief Justice, the Chief Justice of the High Court.</p><p>&#9675; (2) A person shall not be qualified for appointment as a Judge of a High Court unless he is:</p><p>&#9632; (a) A citizen of India;</p><p>&#9632; (b) Has, for at least ten years, held a judicial office in the territory of India; or</p><p>&#9632; (c) Has, for at least ten years, been an advocate of a High Court or of two or more such Courts in succession.</p><p>&#9675; A Judge shall hold office until the age of 62 years.</p><p>&#9675; A Judge may resign by writing under his hand addressed to the President or may be removed as per the procedure prescribed in Article 124(4).</p><p>&#9675; After retirement, a Judge shall not plead or act in any court or before any authority in India.</p>",

    "question": "<span class=\"eqt\"><p>What are the qualifications for the appointment of a Judge of a High Court?</p><p>a) He must be citizen of India</p><p>b) held a judicial office for 5 years in the territory of India</p><p>c) Has been advocate of a High Court for at least ten years</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2381;&#2351;&#2366; &#2351;&#2379;&#2327;&#2381;&#2351;&#2340;&#2366;&#2319;&#2306; &#2361;&#2376;&#2306;?</p><p>a) &#2357;&#2361; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;</p><p>b) &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; 5 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2340;&#2325; &#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2352;&#2361; &#2330;&#2369;&#2325;&#2366; &#2361;&#2379;</p><p>c) &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2342;&#2360; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2340;&#2325; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2357;&#2325;&#2368;&#2354; &#2352;&#2361;&#2366; &#2361;&#2379;</p></span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; As per Article 217, A person shall not be qualified for appointment as a Judge of a High</p><p>&bull; Court unless he is a citizen of India and - </p><p>&#9675; (a) has for at least ten years held a judicial office in the territory of India; or</p><p>&#9675; (b) has for at least ten years been an advocate of a High Court or of two or more such Courts in succession.</p><p>Further Insight:</p><p>&bull; Article 217: Appointment and Conditions of the Office of a Judge of a High Court</p><p>&#9675; (1) Every Judge of a High Court shall be appointed by the President by warrant under his hand and seal after consultation with the Chief Justice of India, the Governor of the State, and, in the case of appointment of a Judge other than the Chief Justice, the Chief Justice of the High Court.</p><p>&#9675; (2) A person shall not be qualified for appointment as a Judge of a High Court unless he is:</p><p>&#9632; (a) A citizen of India;</p><p>&#9632; (b) Has, for at least ten years, held a judicial office in the territory of India; or</p><p>&#9632; (c) Has, for at least ten years, been an advocate of a High Court or of two or more such Courts in succession.</p><p>&#9675; A Judge shall hold office until the age of 62 years.</p><p>&#9675; A Judge may resign by writing under his hand addressed to the President or may be removed as per the procedure prescribed in Article 124(4).</p><p>&#9675; After retirement, a Judge shall not plead or act in any court or before any authority in India.</p>",

    "question": "<span class=\"eqt\"><p>Appointment of acting Chief Justice in High court is written in Article _________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2325; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; _________ &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2339;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Article 223</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 223</span>",
      "<span class=\"eqt\">Article 222</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 222</span>",
      "<span class=\"eqt\">Article 224</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 224</span>",
      "<span class=\"eqt\">Article 230</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 230</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Appointment of acting Chief Justice in the High Court is written in Article 223.</p><p>&bull; Article 223 Appointment of acting Chief Justice. - When the office of Chief Justice of a High Court is vacant or when any such Chief Justice is, by reason of absence or otherwise, unable to perform the duties of his office, the duties of the office shall be performed by such one of the other Judges of the Court as the President may appoint for the purpose.</p><p>Further Insight:</p><p>&bull; Article 220: Prohibition on Practice after Retirement</p><p>&bull; Article 221: Salaries, Allowances, and Pensions of Judges</p><p>&bull; Article 222: Transfer of Judges</p><p>&#9675; The President may transfer a judge from one High Court to another after consulting the Chief Justice of India.</p><p>&bull; Article 223: Appointment of Acting Chief Justice</p><p>The President can appoint an acting Chief Justice of a High Court when the office is vacant, from among its judges.</p><p>&bull; Article 224: Appointment of Additional Judges</p><p>The President may appoint additional judges to a High Court for a temporary period not exceeding two years.</p><p>&bull; Article 224A: Appointment of Retired Judges</p><p>A retired judge may be appointed by the Chief Justice of a High Court, with the President's consent, to sit as a judge of that High Court.</p><p>&bull; Article 225: Jurisdiction of High Courts</p><p>High Courts have the same jurisdiction as they had before the Constitution's commencement.</p><p>&bull; Article 226: Power of High Courts to Issue Writs</p><p>High Courts can issue writs for enforcing fundamental rights and for other purposes within their jurisdiction.</p><p>&bull; Article 227: Power of Superintendence over Subordinate Courts</p><p>High Courts have the power to supervise the functioning of subordinate courts within their jurisdiction.</p><p>&bull; Article 228: Transfer of Cases</p><p>The Supreme Court or High Court can transfer cases to itself or to another court for convenience or in the interest of justice.</p><p>&bull; Article 229: Rules of High Court</p><p>High Courts shall make rules for the practice and procedure of their own courts.</p><p>&bull; Article 230: Power of Parliament to Extend Jurisdiction of High Courts</p><p>Parliament may extend the jurisdiction of High Courts to any other territory or create additional courts in that territory.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Powers of Supreme Court and High Court to issue writs mentioned in Article _________ &amp; __________ respectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2324;&#2352; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2352;&#2367;&#2335; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2366;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; _________ &#2324;&#2352; __________ &#2350;&#2375;&#2306; &#2313;&#2354;&#2381;&#2354;&#2367;&#2326;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">Article 31 and Article 216</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 31 &#2324;&#2352; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 216</span>",
      "<span class=\"eqt\">Article 30 and Article 220</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 30 &#2324;&#2352; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 220</span>",
      "<span class=\"eqt\">Article 32 and Article 226</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32 &#2324;&#2352; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 226</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Powers of Supreme Court and High Court to issue writs mentioned in Article 32 and Article 226 respectively.</p><p>Further Insight:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Type of Writ</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Meaning</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Purpose</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Can Be Issued Against</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cannot Be Issued Against</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Habeas Corpus</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"To have the body of.\"</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Enforces the fundamental right of individual liberty against unlawful detention.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Both private and public authorities.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lawful detention, contempt proceedings, competent court detention, detention outside jurisdiction.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Mandamus</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"We command.\"</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Orders a public official or body to perform a duty they have failed or refused to perform.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Public officials, bodies, corporations, inferior courts.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Private individuals, discretionary work, contractual obligations, Indian President, State Governors, Chief Justice acting in a judicial capacity.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Prohibition</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"To forbid.\"</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Prevents a lower court or tribunal from exceeding its jurisdiction.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Judicial and quasi-judicial authorities.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Administrative authorities, legislative bodies, private individuals.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Certiorari</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"To be certified.\"</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Orders a lower court or tribunal to transfer a case or quash its order.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Judicial, quasi-judicial authorities, and administrative authorities (post-1991).</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Legislative bodies, private individuals.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Quo-Warranto</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"By what authority or warrant.\"</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Prevents illegal usurpation of public office; questions the legality of a person's claim to public office.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Permanent public office holders (created by statute or Constitution).</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Private or ministerial offices.</td></tr></table>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article gives the High Court power to be the Court of Record? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2379; &#2309;&#2349;&#2367;&#2354;&#2375;&#2326; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 215</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 215</span>",
      "<span class=\"eqt\">Article 216</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 216</span>",
      "<span class=\"eqt\">Article 218</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 218</span>",
      "<span class=\"eqt\">Article 220</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 220</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Article 215 gives High Court power to be the Court of Record</p><p>Further Insight:</p><p>&bull; Article 214: High Courts for States</p><p>There shall be a High Court for each state.</p><p>&bull; Article 215: High Courts to Be Courts of Record</p><p>Every High Court shall be a court of record and have the power to punish for contempt of itself.</p><p>&bull; Article 216: Constitution of High Courts</p><p>Every High Court shall consist of a Chief Justice and such other judges as the President may decide.</p><p>&bull; Article 217: Appointment and Conditions of Office of Judges of High Courts</p><p>Judges of High Courts are appointed by the President and hold office until the age of 62, with conditions prescribed by law.</p><p>&bull; Article 218: Qualification for Appointment of Judges of High Courts</p><p>A person is qualified for appointment as a judge of a High Court if he has been an advocate for 10 years or a judge of a subordinate court.</p><p>&bull; Article 219: Oath or Affirmation by Judges of High Courts</p><p>Judges of High Courts must take an oath or affirmation to uphold the Constitution and discharge their duties impartially.</p><p>&bull; Article 220: Prohibition on Practice after Retirement</p><p>A retired High Court judge cannot practice in any court or before any authority in India.</p><p>&bull; Article 221: Salaries, Allowances, and Pensions of Judges</p><p>The salaries, allowances, and pensions of High Court judges are determined by Parliament and charged on the Consolidated Fund of India.</p><p>&bull; Article 222: Transfer of Judges</p><p>The President can transfer a judge from one High Court to another after consulting the Chief Justice of India.</p><p>&bull; Article 223: Appointment of Acting Chief Justice</p><p>The President can appoint an acting Chief Justice of a High Court when the office is vacant, from among its judges.</p><p>&bull; Article 224: Appointment of Additional Judges</p><p>The President may appoint additional judges to a High Court for a temporary period not exceeding two years.</p><p>&bull; Article 225: Jurisdiction of High Courts</p><p>High Courts have the same jurisdiction as they had before the Constitution's commencement.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>After retirement a Judge of the Supreme Court can practice law in front of which authority?</p><p>a) Supreme Court</p><p>b) High Court</p><p>c) Tribunal</p><p>Choose the correct option</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2375;&#2357;&#2366;&#2344;&#2367;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2325;&#2375; &#2348;&#2366;&#2342; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2352;&#2339; &#2325;&#2375; &#2360;&#2350;&#2325;&#2381;&#2359; &#2325;&#2366;&#2344;&#2370;&#2344; &#2325;&#2366; &#2309;&#2349;&#2381;&#2351;&#2366;&#2360; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p><p>a) &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;</p><p>b) &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;</p><p>c) &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2367;&#2325;&#2352;&#2339;</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">All of the following</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2349;&#2368;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; As per Article 124 clause 7, No person who has held office as a Judge of the Supreme Court shall plead or act in any court or before any authority within the territory of India.</p><p>&bull; Judges of the Supreme Court can't practice law before any authority in India.</p><p>Further Insight:</p><p>&bull; Article 124: Establishment and Constitution of Supreme Court</p><p>The Supreme Court of India is established, consisting of the Chief Justice of India and other judges.</p><p>&bull; Article 125: Salaries, Allowances, and Pensions of Judges</p><p>The salaries, allowances, and pensions of Supreme Court judges are determined by Parliament.</p><p>&bull; Article 126: Appointment of Acting Chief Justice</p><p>The President can appoint an acting Chief Justice of India when the office is vacant.</p><p>&bull; Article 127: Appointment of Ad-hoc Judges</p><p>The President may appoint ad-hoc judges to the Supreme Court when required.</p><p>&bull; Article 128: Attendance of Retired Judges at sittings of the Supreme Court</p><p>Retired judges of the Supreme Court may attend sittings as per the President's direction.</p><p>&bull; Article 129: Supreme Court to Be a Court of Record</p><p>The Supreme Court is a court of record with the power to punish for contempt of itself.</p><p>&bull; Article 130: Seat of Supreme Court</p><p>The Supreme Court is situated in Delhi, and its benches may be established elsewhere.</p><p>&bull; Article 131: Original Jurisdiction of Supreme Court</p><p>The Supreme Court has original jurisdiction in disputes between states or between states and the Union.</p><p>&bull; Article 132: Appellate Jurisdiction of Supreme Court in Constitutional Matters</p><p>The Supreme Court can hear appeals from High Courts in cases involving constitutional issues.</p><p>&bull; Article 133: Appellate Jurisdiction of Supreme Court in Civil Matters</p><p>The Supreme Court can hear appeals in civil matters from High Courts where substantial justice is at stake.</p><p>&bull; Article 134: Appellate Jurisdiction of Supreme Court in Criminal Matters</p><p>The Supreme Court can hear appeals in criminal matters from High Courts involving death sentences or other significant issues.</p><p>&bull; Article 135: Jurisdiction of the Supreme Court in Relation to Other Courts</p><p>The Supreme Court has jurisdiction over any matter relating to the interpretation of the Constitution, as prescribed by law.</p>",
    "question_index": 18
  },

    "solution": "<p>&bull; The Supreme court struck down the National Judicial Appointment Commission, which was made to replace the Supreme Court's Collegium system in 2015. The National Judicial Appointment Commission added in the Constitution under 99th Constitution Amendment Act 2014.</p><p>&bull; This amendment has been struck down by the Supreme Court in the case of Supreme Court Advocates-on-Record Association and another Vs Union of India in its judgment dated 16-10-2015, AIR 2016 SC 117.</p>",
