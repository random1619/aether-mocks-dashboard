    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following philosophers was the first to propose the concept that matter is made of indivisible particles called atoms?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2342;&#2366;&#2352;&#2381;&#2358;&#2344;&#2367;&#2325; &#2344;&#2375; &#2360;&#2348;&#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2351;&#2361; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;&#2367;&#2340; &#2325;&#2368; &#2341;&#2368; &#2325;&#2367; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2309;&#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2325;&#2339;&#2379;&#2306; &#2360;&#2375; &#2348;&#2344;&#2366; &#2361;&#2376; &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Aristotle</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2360;&#2381;&#2340;&#2370;</span>",
      "<span class=\"eqt\">John Dalton</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2377;&#2344; &#2337;&#2366;&#2354;&#2381;&#2335;&#2344;</span>",
      "<span class=\"eqt\">Democritus</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2350;&#2379;&#2325;&#2381;&#2352;&#2367;&#2335;&#2360;</span>",
      "<span class=\"eqt\">J.J. Thomson</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2375;.&#2332;&#2375;.&#2341;&#2377;&#2350;&#2360;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Democritus was the first philosopher to suggest that matter is composed of tiny, indivisible particles called atoms. </b></p><p><b>Further Insight:</b></p><p>&bull; <b>Atom</b> is derived from the Greek word \"atomos,\" meaning indivisible. </p><p>&bull; Ancient Greek philosophers, such as <b>Democritus</b>, were among the first to propose the concept of atoms.</p><p>&bull; He believed that matter is composed of tiny, invisible, and indivisible particles that are in constant motion.</p><p>&bull; John Dalton later built on Democritus' idea with his atomic theory. </p><p>&bull; <b>Aristotle rejected the atomic theory</b></p><p>&bull; <b>J.J. Thomson discovered the electron.</b> </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following postulates of Dalton's atomic theory explains the Law of Conservation of Mass?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2337;&#2366;&#2354;&#2381;&#2335;&#2344; &#2325;&#2375; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Atoms combine in simple whole-number ratios.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2352;&#2354; &#2346;&#2370;&#2352;&#2381;&#2339;-&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Atoms are indivisible in a chemical reaction.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2309;&#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Atoms of different elements have different masses.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2375; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2349;&#2367;&#2344;&#2381;&#2344;-&#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Atoms of the same element are identical in mass and properties.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2361;&#2368; &#2340;&#2340;&#2381;&#2357; &#2325;&#2375; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2324;&#2352; &#2327;&#2369;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Dalton's postulate that atoms are indivisible in a chemical reaction directly explains the Law of Conservation of Mass, as atoms cannot be destroyed or created, only rearranged.</b></p><p>&bull; <b>Atoms combine in simple whole-number ratios</b>: It explains the law of definite proportions.</p><p>&bull; <b>Atoms of the same element are identical in mass and properties: </b>It shows the consistency within an element..</p><p><b>Further Insight:</b></p><p>&bull; <b>Dalton's Atomic Theory</b></p><p>&bull; Matter consists of small and indivisible particles called <b>atoms</b>.</p><p>&bull; Atoms of a given element are identical in mass and properties.</p><p>&bull; Atoms combine in simple whole-number ratios to form compounds(<b>law of definite proportions</b>).</p><p>&bull; Atoms cannot be created or destroyed in chemical reactions (supporting the <b>Law of Conservation of Mass</b>).</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which subatomic particle was discovered through the cathode ray experiment conducted by J.J. Thomson?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2375;.&#2332;&#2375;.&#2341;&#2377;&#2350;&#2360;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2319; &#2327;&#2319; &#2325;&#2376;&#2341;&#2379;&#2337; &#2325;&#2367;&#2352;&#2339; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2325;&#2367;&#2360; &#2313;&#2346;&#2346;&#2352;&#2350;&#2366;&#2339;&#2381;&#2357;&#2367;&#2325; &#2325;&#2339; &#2325;&#2368; &#2326;&#2379;&#2332; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Proton</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2335;&#2377;&#2344;</span>",
      "<span class=\"eqt\">Electron</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;</span>",
      "<span class=\"eqt\">Neutron</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344;</span>",
      "<span class=\"eqt\">Positron</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2332;&#2368;&#2335;&#2381;&#2352;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; J.J. Thomson's <b>cathode ray experiment</b> led to the discovery of the electron, a negatively charged particle.</p><p>&bull; <b>Proton</b>: Discovered by Rutherford during his gold foil experiment.</p><p>&bull; <b>Neutron</b>: Discovered by James Chadwick in 1932.</p><p>&bull; <b>Positron</b>: An antimatter counterpart to the electron.</p><p><b>Further Insight:</b></p><p>&bull; <b>Electrons</b>: </p><p>&#9675; J.J. Thomson's <b>cathode ray experiment</b> led to the discovery of electrons in 1897. </p><p>&#9675; He also proposed the <b>plum pudding model</b> of the atom, where electrons were embedded in a positively charged \"pudding.\"</p><p>&bull; <img width=482 height=220 id=image16.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25985/image001.png\"></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>According to Rutherford's atomic model, what occupies the majority of the space within an atom?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2342;&#2352;&#2347;&#2379;&#2352;&#2381;&#2337; &#2325;&#2375; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2350;&#2377;&#2337;&#2354; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2380;&#2344; &#2328;&#2375;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Neutrons</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344;</span>",
      "<span class=\"eqt\">Protons</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2335;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Electrons</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Empty space</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2366;&#2354;&#2368; &#2360;&#2381;&#2341;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; <b>Rutherford's gold foil experiment showed that most of the atom is empty space, with a dense nucleus at the center and electrons orbiting around it.</b></p><p>&bull; <b>Neutrons</b>: Located in the nucleus but do not occupy much space.</p><p>&bull; <b>Protons</b>: Reside in the nucleus but do not fill the atom's volume.</p><p>&bull; <b>Electrons</b>: They orbit the nucleus but still leave much of the atom as empty space.</p><p><b>Further Insight:</b></p><p>&bull; <b>Rutherford's Atomic Model</b></p><p>&bull; Gold Foil Experiment (1909): </p><p>&bull; Ernest Rutherford conducted an experiment where alpha particles were directed at a thin sheet of gold foil.</p><p>&bull; Most particles passed through, but some were deflected, and a few even bounced back.</p><p>&bull; Conclusions from the Experiment:</p><p>&bull; <b>Most of the mass and positive charge of the atom is concentrated in a very small, dense region called the nucleus.</b></p><p>&bull; <b>Most of the atom is empty space, </b>allowing the majority of alpha particles to pass through.</p><p>&bull; The negatively charged electrons revolve around the nucleus in circular orbits, similar to planets around the sun.</p><p>&bull; <b>Limitations:</b></p><p>&bull; Could not explain the stability of the atom, as classical physics predicted electrons would spiral into the nucleus and loose energy while revolving.</p><p>&bull; <img width=278 height=278 id=image12.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25985/image002.png\"></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is true according to Bohr's atomic model?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2379;&#2361;&#2352; &#2325;&#2375; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2350;&#2377;&#2337;&#2354; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Electrons revolve around the nucleus in fixed orbits without losing energy.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2348;&#2367;&#2344;&#2366; &#2314;&#2352;&#2381;&#2332;&#2366; &#2326;&#2379;&#2319; &#2344;&#2366;&#2349;&#2367;&#2325; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2325;&#2381;&#2359;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2328;&#2370;&#2350;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Electrons can lose energy and spiral into the nucleus.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2314;&#2352;&#2381;&#2332;&#2366; &#2326;&#2379; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2344;&#2366;&#2349;&#2367;&#2325; &#2350;&#2375;&#2306; &#2360;&#2352;&#2381;&#2346;&#2367;&#2354;&#2366;&#2325;&#2366;&#2352; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Electrons have an equal probability of existing anywhere in the atom.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2375; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2350;&#2375;&#2306; &#2325;&#2361;&#2368;&#2306; &#2349;&#2368; &#2357;&#2367;&#2342;&#2381;&#2351;&#2350;&#2366;&#2344; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2360;&#2350;&#2366;&#2344; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Electrons revolve around the nucleus in elliptical orbits.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2344;&#2366;&#2349;&#2367;&#2325; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2309;&#2339;&#2381;&#2337;&#2366;&#2325;&#2366;&#2352; &#2325;&#2325;&#2381;&#2359;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2328;&#2370;&#2350;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Bohr proposed that electrons move in fixed orbits, and as long as they remain in these orbits, they do not emit energy. Electrons only emit or absorb energy when they jump between orbits.</b></p><p>&bull; <b>Electrons can lose energy and spiral into the nucleus</b></p><p>&#9675; This was a limitation in Rutherford's model, corrected by Bohr.</p><p><b>Further Insight:</b></p><p>&bull; Niels Bohr (1913) improved upon Rutherford's model by introducing quantized electron orbits:</p><p>&bull; <b>Electrons move in specific, stable orbits without radiating energy known as Quantized Orbits( discrete orbit)</b>.</p><p>&bull; When an electron jumps between orbits, energy is absorbed or emitted in the form of light. This explains the <b>line spectra</b> of elements.</p><p>&bull; <b>Significance:</b></p><p>&bull; Explained the stability of atoms and the line spectra of hydrogen.</p><p>&bull; <b>Limitations:</b></p><p>&bull; Could not explain spectra of more complex atoms.</p><p>&bull; <img width=399 height=399 id=image2.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25985/image003.png\"></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements about isotopes is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2311;&#2360;&#2379;&#2335;&#2379;&#2346; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Isotopes of an element have different numbers of protons.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2340;&#2340;&#2381;&#2357; &#2325;&#2375; &#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2379;&#2335;&#2377;&#2344; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2349;&#2367;&#2344;&#2381;&#2344;-&#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Isotopes have the same number of neutrons but different numbers of protons.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2346;&#2381;&#2352;&#2379;&#2335;&#2377;&#2344; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2349;&#2367;&#2344;&#2381;&#2344;-&#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Isotopes have the same chemical properties but different physical properties.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2327;&#2369;&#2339; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2349;&#2380;&#2340;&#2367;&#2325; &#2327;&#2369;&#2339; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Isotopes are different elements with similar atomic numbers.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325; &#2360;&#2350;&#2366;&#2344; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2340;&#2340;&#2381;&#2357; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Isotopes of an element have the same number of protons (and therefore similar chemical properties) but different numbers of neutrons, giving them different physical properties such as mass.</b> </p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Term</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Definition</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Examples</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Isotopes</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Atoms of the same element with the same atomic number (Z) but different mass numbers (A) due to a different number of neutrons.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Hydrogen Isotopes: Protium (&#185;H), Deuterium (&#178;H), Tritium (&ge;H)   - Carbon Isotopes: &#185;&#178;C, &#185;&ge;C, &#185;&#8308;C</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Isobars</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Atoms of different elements with the same mass number (A) but different atomic numbers (Z). These have the same total number of protons and neutrons combined.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Argon-40 (&#8308;&#8304;Ar) and Calcium-40 (&#8308;&#8304;Ca)   - Carbon-14 (&#185;&#8308;C) and Nitrogen-14 (&#185;&#8308;N)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Isotones</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Atoms of different elements that have the same number of neutrons but different atomic numbers and mass numbers.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Carbon-14 (&#185;&#8308;C) and Nitrogen-15 (&#185;&#8309;N) (both have 7 neutrons)   - Chlorine-37 (&ge;&#8311;Cl) and Potassium-39 (&ge;&#8313;K) (both have 20 neutrons)</td></tr></table>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements describes a Cation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2343;&#2344;&#2366;&#2351;&#2344; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">An atom that gains electrons to form a positive charge.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2332;&#2379; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2327;&#2381;&#2352;&#2361;&#2339; &#2325;&#2352;&#2325;&#2375; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2310;&#2357;&#2375;&#2358; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">An atom that loses electrons to form a positive charge.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2332;&#2379; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2326;&#2379;&#2325;&#2352; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2310;&#2357;&#2375;&#2358; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">An atom that gains electrons to form a negative charge.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2332;&#2379; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2327;&#2381;&#2352;&#2361;&#2339; &#2325;&#2352;&#2325;&#2375; &#2315;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325; &#2310;&#2357;&#2375;&#2358; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">An atom that loses protons to form a positive charge.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2332;&#2379; &#2346;&#2381;&#2352;&#2379;&#2335;&#2377;&#2344; &#2326;&#2379;&#2325;&#2352; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2310;&#2357;&#2375;&#2358; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; A <b>cation</b> is formed when an atom loses electrons, resulting in a positive charge.</p><p>&bull; Gaining electrons forms a negative ion (anion).</p><p>&bull; Atoms cannot lose protons without changing their elemental identity.</p><p><b>Further Insight:</b></p><p>&bull; <img width=344 height=313 id=image11.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25985/image004.jpg\"></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following best describes the <b>Law of Constant Proportions</b>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2381;&#2341;&#2367;&#2352; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mass can neither be created nor destroyed in a chemical reaction.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2325;&#2366; &#2344; &#2340;&#2379; &#2360;&#2371;&#2332;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2344; &#2361;&#2368; &#2357;&#2367;&#2344;&#2366;&#2358; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The relative number and kinds of atoms in a compound are constant.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2351;&#2380;&#2327;&#2367;&#2325; &#2350;&#2375;&#2306; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2368; &#2360;&#2366;&#2346;&#2375;&#2325;&#2381;&#2359; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2381;&#2341;&#2367;&#2352; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">In a chemical substance, elements are always present in definite proportions by mass.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2350;&#2375;&#2306; &#2340;&#2340;&#2381;&#2357; &#2360;&#2342;&#2376;&#2357; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Atoms combine in simple whole-number ratios to form compounds.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2352;&#2354; &#2346;&#2370;&#2352;&#2381;&#2339;-&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2325;&#2352; &#2351;&#2380;&#2327;&#2367;&#2325; &#2348;&#2344;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>The Law of Constant Proportions states that in any given chemical compound, the elements are present in definite and constant proportions by mass.</b></p><p>&#9675; <b>Given by Joseph Proust</b></p><p>&bull; <b>Mass can neither be created nor destroyed</b>: <b>Law of Conservation of Mass (by Antoine Lavoisier)</b>.</p><p>&bull; <b>Atoms combine in whole-number ratios</b>: <b>Law of Multiple Proportions</b>.</p><p><b>Further Insight:</b></p><p>&bull; </p><p>&bull; <img width=624 height=253 id=image15.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25985/image005.png\"></p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following correctly defines the atomic number (Z) of an element?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2319;&#2325; &#2340;&#2340;&#2381;&#2357; &#2325;&#2368; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; (Z) &#2325;&#2379; &#2360;&#2361;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The number of neutrons in an atom's nucleus.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2325;&#2375; &#2344;&#2366;&#2349;&#2367;&#2325; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The sum of protons and neutrons in an atom's nucleus.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2325;&#2375; &#2344;&#2366;&#2349;&#2367;&#2325; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2379;&#2335;&#2377;&#2344; &#2324;&#2352; &#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344; &#2325;&#2366; &#2351;&#2379;&#2327;&#2404;</span>",
      "<span class=\"eqt\">The number of protons in an atom's nucleus.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2325;&#2375; &#2344;&#2366;&#2349;&#2367;&#2325; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2379;&#2335;&#2377;&#2344; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;.</span>",
      "<span class=\"eqt\">The number of electrons in the outermost shell.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2348;&#2360;&#2375; &#2348;&#2366;&#2361;&#2352;&#2368; &#2325;&#2379;&#2358; &#2350;&#2375;&#2306; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>The atomic number (Z) of an element is the number of protons present in its nucleus. </b></p><p>&#9675; <b>It is this number that defines the element. </b></p><p>&#9675; For example, the atomic number of <b>Hydrogen</b> is 1, meaning it has 1 proton.</p><p>&bull; The sum of protons and neutrons gives the <b>mass number</b>, not the atomic number</p><p>&bull; The number of electrons in the outermost shell defines the element's <b>valency.</b></p><p><b>Further Insight:</b></p><p>&bull; <img width=331 height=166 id=image17.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25985/image006.png\"></p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Who is credited with publishing the first modern periodic table and predicting the existence of unknown elements?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2361;&#2354;&#2368; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2309;&#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2375; &#2309;&#2360;&#2381;&#2340;&#2367;&#2340;&#2381;&#2357; &#2325;&#2368; &#2349;&#2357;&#2367;&#2359;&#2381;&#2351;&#2357;&#2366;&#2339;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2358;&#2381;&#2352;&#2375;&#2351; &#2325;&#2367;&#2360;&#2375; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">John Dalton</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2377;&#2344; &#2337;&#2366;&#2354;&#2381;&#2335;&#2344;</span>",
      "<span class=\"eqt\">Dmitri Mendeleev</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2350;&#2367;&#2340;&#2381;&#2352;&#2368; &#2350;&#2375;&#2306;&#2337;&#2375;&#2354;&#2368;&#2357;</span>",
      "<span class=\"eqt\">Henry Moseley</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2344;&#2352;&#2368; &#2350;&#2379;&#2360;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Horace Groves Deming</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2379;&#2352;&#2375;&#2360; &#2327;&#2381;&#2352;&#2379;&#2357;&#2381;&#2360; &#2337;&#2375;&#2350;&#2367;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Dmitri Mendeleev is considered the father of the modern periodic table. </b></p><p>&bull; <b>Henry Moseley introduced the concept of atomic number but did not develop the first periodic table.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Dmitri Mendeleev is considered the father of the modern periodic table. </b></p><p>&#9675; In 1871, he <b>arranged elements based on atomic mass </b></p><p>&#9675; He left gaps for undiscovered elements, predicting their properties with remarkable accuracy.such as </p><p>&#9632; Eka-Boron: later found and named as Scandium</p><p>&#9632; Eka-Aluminum: later named as gallium</p><p>&#9632; Eka-Silicon: later named as germanium</p><p>&#9675; Limitation of Mendeleev Periodic Table</p><p>&#9632; He can't explain the position of Hydrogen, which show properties of Halogen but placed in Alkali Metals</p><p>&#9632; Not able to explain isotopes.</p><p>&#9632; Elements with different properties grouped together.</p><p>&bull; <b><img width=624 height=339 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25985/image007.png\"></b></p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>What happens to the atomic radius as you move down a group in the periodic table?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2368; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2344;&#2368;&#2330;&#2375; &#2325;&#2368; &#2323;&#2352; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It increases</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2360;&#2375; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It decreases</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2328;&#2335;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It remains constant</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2360;&#2381;&#2341;&#2367;&#2352; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It first increases and then decreases</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2346;&#2361;&#2354;&#2375; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2347;&#2367;&#2352; &#2328;&#2335;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>As we move down a group in the periodic table:</b></p><p>&#9675; The <b>atomic radius increases</b> due to the addition of electron shells. </p><p>&#9675; Each added shell places the outermost electrons farther from the nucleus, increasing the overall size of the atom.</p><p><b>Further Insight:</b></p><p>&bull; <img width=625 height=351 id=image13.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25985/image008.jpg\"></p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following properties generally increases as you move from left to right across a period in Periodic Table?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2368; &#2310;&#2357;&#2352;&#2381;&#2340; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2306; &#2360;&#2375; &#2342;&#2366;&#2319;&#2306; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2327;&#2369;&#2339; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Atomic size</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2310;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Ionization energy</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2344;&#2368;&#2325;&#2352;&#2339; &#2314;&#2352;&#2381;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Metallic character</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2340;&#2381;&#2357;&#2367;&#2325; &#2330;&#2352;&#2367;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Number of electron shells</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2358;&#2376;&#2354;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>As we move from left to right across a period, the ionization energy increases. </b></p><p>&#9675; <b>This is because the nuclear charge becomes stronger, making it harder to remove an electron from the outer shell.</b></p><p>&bull; <b>Atomic size</b> decreases across a period due to stronger nuclear forces pulling electrons closer.</p><p>&bull; <b>Metallic character</b> decreases as you move across a period, with non-metals becoming more prominent.</p><p>&bull; The <b>number of electron shells</b> remains constant across a period; it only increases down a group.</p><p><b>Further Insight:</b></p><p><img width=624 height=423 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25985/image009.png\"></p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>The elements from which block in the periodic table are known as the transition metals?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2348;&#2381;&#2354;&#2377;&#2325; &#2325;&#2375; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339; &#2343;&#2366;&#2340;&#2369; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">s-block</span><span class=\"hqt\" style=\"display:none\">s-block</span>",
      "<span class=\"eqt\">p-block</span><span class=\"hqt\" style=\"display:none\">p-block</span>",
      "<span class=\"eqt\">d-block</span><span class=\"hqt\" style=\"display:none\">d-block</span>",
      "<span class=\"eqt\">f-block</span><span class=\"hqt\" style=\"display:none\">f-block</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>d-block elements</b> are known as <b>transition metals</b>. </p><p>&#9675; These elements occupy Groups <b>3 to 12</b> in the periodic table and exhibit properties like variable oxidation states and the ability to form colored compounds. </p><p><b>Further Insight:</b></p><p>&bull; The Periodic Table is also divided into <b>four blocks</b> based on the electron configuration of elements:</p><p>&#9675; <b>s-block</b>: Includes <b>alkali metals</b> (Group 1) and <b>alkaline earth metals</b> (Group 2). Examples: <b>Sodium (Na)</b>, <b>Calcium (Ca)</b>.</p><p>&#9675; <b>p-block</b>: Consists of <b>Groups 13 to 18</b>, including <b>metalloids</b> and nonmetals. Examples: <b>Oxygen (O)</b>, <b>Chlorine (Cl)</b>, <b>Neon (Ne)</b>.</p><p>&#9675; <b>d-block</b>: Comprises <b>transition metals</b> (Groups 3 to 12). Examples: <b>Iron (Fe)</b>, <b>Copper (Cu)</b>. These metals often form colored compounds and exhibit variable oxidation states.</p><p>&#9675; <b>f-block</b>: Contains <b>lanthanides</b> (atomic numbers 58-71) and <b>actinides</b> (atomic numbers 90-103). All <b>actinides</b> are radioactive. Example: <b>Uranium (U)</b></p><p>&bull; <img width=624 height=167 id=image10.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25985/image010.png\"></p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements about nonmetals is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2309;&#2343;&#2366;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">They are good conductors of electricity.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2348;&#2367;&#2332;&#2354;&#2368; &#2325;&#2375; &#2309;&#2330;&#2381;&#2331;&#2375; &#2360;&#2306;&#2357;&#2366;&#2361;&#2325; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They form covalent bonds with other elements.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2309;&#2344;&#2381;&#2351; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2361;&#2360;&#2306;&#2351;&#2379;&#2332;&#2325; &#2348;&#2306;&#2343; &#2348;&#2344;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They are malleable and ductile.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2310;&#2328;&#2366;&#2340;&#2357;&#2352;&#2381;&#2343;&#2381;&#2351; &#2319;&#2357;&#2306; &#2340;&#2344;&#2381;&#2351; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They generally have high melting and boiling points.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2325;&#2366; &#2327;&#2354;&#2344;&#2366;&#2306;&#2325; &#2324;&#2352; &#2325;&#2381;&#2357;&#2341;&#2344;&#2366;&#2306;&#2325; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2313;&#2330;&#2381;&#2330; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Nonmetals</b> tend to form <b>covalent bonds</b> with other elements. </p><p>&bull; They share electrons in their outer shell to achieve stability, as seen in compounds like <b>H2O</b> (water) and <b>CO2</b> (carbon dioxide).</p><p>&bull; Nonmetals are <b>poor conductors</b> of electricity, unlike metals.</p><p>&bull; Nonmetals are generally <b>brittle</b>, not malleable or ductile.</p><p>&bull; Nonmetals typically have <b>low</b> melting and boiling points, except for a few like carbon (diamond).</p><p><b>Further Insight:</b></p><p>&bull; Based on their physical and chemical properties, elements are categorized as:</p><p>&#9675; <b>Metals</b>:</p><p>&#9632; Good conductors of heat and electricity.</p><p>&#9632; Form <b>ionic compounds</b> and alloys.</p><p>&#9632; Examples: <b>Iron (Fe)</b>, <b>Gold (Au)</b>.</p><p>&#9675; <b>Non-metals</b>:</p><p>&#9632; Typically form <b>covalent bonds</b>.</p><p>&#9632; Can exist as solids, liquids, or gases.</p><p>&#9632; Examples: <b>Oxygen (O)</b>, <b>Nitrogen (N)</b>.</p><p>&#9675; <b>Metalloids</b>:</p><p>&#9632; Exhibit properties of both metals and non-metals.</p><p>&#9632; Examples: <b>Silicon (Si)</b>, <b>Arsenic (As)</b>.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a key difference between Mendeleev's periodic table and the modern periodic table?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2375;&#2306;&#2337;&#2375;&#2354;&#2368;&#2357; &#2325;&#2368; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2324;&#2352; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2369;&#2326;&#2381;&#2351; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mendeleev's table was based on atomic number.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2306;&#2337;&#2375;&#2354;&#2368;&#2357; &#2325;&#2368; &#2340;&#2366;&#2354;&#2367;&#2325;&#2366; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2341;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Mendeleev's table grouped elements based on their properties.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2306;&#2337;&#2375;&#2354;&#2368;&#2357; &#2325;&#2368; &#2340;&#2366;&#2354;&#2367;&#2325;&#2366; &#2350;&#2375;&#2306; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2327;&#2369;&#2339;&#2379;&#2306; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2360;&#2350;&#2370;&#2361;&#2368;&#2325;&#2371;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Modern periodic table arranges elements by atomic number.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2379; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Modern periodic table does not include any gaps for undiscovered elements.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2350;&#2375;&#2306; &#2309;&#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2379;&#2312; &#2360;&#2381;&#2341;&#2366;&#2344; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The <b>modern periodic table</b> is based on the <b>atomic number</b>, whereas <b>Mendeleev's table</b> was based on <b>atomic mass</b>.</p><p>&bull; <b>The modern periodic law states that properties of elements are periodic functions of their atomic number.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Dmitri Mendeleev is considered the father of the modern periodic table. </b></p><p>&#9675; In 1871, he <b>arranged elements based on atomic mass </b></p><p>&#9675; He left gaps for undiscovered elements, predicting their properties with remarkable accuracy.such as </p><p>&#9632; Eka-Boron: later found and named as Scandium</p><p>&#9632; Eka-Aluminum: later named as gallium</p><p>&#9632; Eka-Silicon: later named as germanium</p><p>&#9675; Limitation of Mendeleev Periodic Table</p><p>&#9632; He can't explain the position of Hydrogen, which show properties of Halogen but placed in Alkali Metals</p><p>&#9632; Not able to explain isotopes.</p><p>&#9632; Elements with different properties grouped together.</p><p>&bull; <b><img width=624 height=339 id=image5.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25985/image007.png\"></b></p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding trends in the periodic table:</p><p>a. Atomic radius increases across a period from left to right.</p><p>b. Electronegativity increases as you move from left to right in a period.</p><p>c. Ionization energy decreases down a group.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2319;&#2325; &#2310;&#2357;&#2352;&#2381;&#2340; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2306; &#2360;&#2375; &#2342;&#2366;&#2319;&#2306; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>b. &#2319;&#2325; &#2310;&#2357;&#2352;&#2381;&#2340; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2306; &#2360;&#2375; &#2342;&#2366;&#2319;&#2306; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2315;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325;&#2340;&#2366; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>c. &#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2344;&#2368;&#2330;&#2375; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2310;&#2351;&#2344;&#2368;&#2325;&#2352;&#2339; &#2314;&#2352;&#2381;&#2332;&#2366; &#2328;&#2335;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2319;&#2325;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Atomic radius decreases across a period due to increasing nuclear charge.</p><p>&bull; Electronegativity increases across a period as elements become more eager to attract electrons.</p><p>&bull; Ionization energy decreases down a group because the outermost electrons are farther from the nucleus and easier to remove.</p><p><b>Further Insight:</b></p><p>&bull; <b>Trends in the Periodic Table</b></p><p>&bull; <b>Atomic Radius</b>:</p><p>&#9675; Increases down a group due to the addition of electron shells.</p><p>&#9675; Decreases across a period as the nuclear charge pulls electrons closer.</p><p>&bull; <b>Ionization Energy</b>:</p><p>&#9675; Decreases down a group (electrons are further from the nucleus).</p><p>&#9675; Increases across a period (more energy needed to remove electrons).</p><p>&bull; <b>Electronegativity</b>:</p><p>&#9675; Decreases down a group.</p><p>&#9675; Increases across a period, with <b>Fluorine (F)</b> being the most electronegative element.</p><p>&bull; <b>Electron Affinity</b>:</p><p>&#9675; Increases across a period (except noble gases).</p><p>&#9675; Decreases down a group.</p><p>&bull; <img width=624 height=423 id=image14.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25985/image009.png\"></p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the p-block elements:</p><p>a. The p-block contains both metals and nonmetals.</p><p>b. The elements in Group 17 are called transition elements.</p><p>c. The noble gases are part of the p-block.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2368;-&#2348;&#2381;&#2354;&#2377;&#2325; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2346;&#2368;-&#2348;&#2381;&#2354;&#2377;&#2325; &#2350;&#2375;&#2306; &#2343;&#2366;&#2340;&#2369; &#2324;&#2352; &#2309;&#2343;&#2366;&#2340;&#2369; &#2342;&#2379;&#2344;&#2379;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>b. &#2360;&#2350;&#2370;&#2361; 17 &#2325;&#2375; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339; &#2340;&#2340;&#2381;&#2357; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>c. &#2313;&#2340;&#2381;&#2325;&#2371;&#2359;&#2381;&#2335; &#2327;&#2376;&#2360;&#2375;&#2306; &#2346;&#2368;-&#2348;&#2381;&#2354;&#2377;&#2325; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Only c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>The p-block contains a variety of elements, including metals, nonmetals, and metalloids.</b></p><p>&bull; <b>Group 17 elements are halogens, not transition elements.</b></p><p>&bull; <b>Noble gases (Group 18) belong to the p-block.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>p-Block Elements:</b></p><p>&bull; Contains metals, metalloids, and nonmetals.</p><p>&bull; Includes noble gases (Group 18).</p><p>&bull; Groups: 13 to 18</p><p>&bull; Group 13: Boron (B), Aluminium (Al), Gallium (Ga), Indium (In), Thallium (Tl).</p><p>&bull; Group 14: Carbon (C), Silicon (Si), Germanium (Ge), Tin (Sn), Lead (Pb).</p><p>&bull; Group 15: Nitrogen (N), Phosphorus (P), Arsenic (As), Antimony (Sb), Bismuth (Bi).</p><p>&bull; Group 16: Oxygen (O), Sulfur (S), Selenium (Se), Tellurium (Te), Polonium (Po).</p><p>&bull; Group 17 (Halogens): Fluorine (F), Chlorine (Cl), Bromine (Br), Iodine (I), Astatine (At).</p><p>&bull; Group 18 (Noble Gases): Helium (He), Neon (Ne), Argon (Ar), Krypton (Kr), Xenon (Xe), Radon (Rn).</p><p><img width=510 height=575 id=image4.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25985/image011.png\"></p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about the f-block elements:</p><p><b>a.</b> Lanthanides are part of the f-block and exhibit similar chemical properties.</p><p><b>b.</b> Actinides in the f-block are mostly non-radioactive.</p><p><b>c.</b> The f-block elements are also known as inner transition metals.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>f-&#2348;&#2381;&#2354;&#2377;&#2325; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2354;&#2376;&#2306;&#2341;&#2375;&#2344;&#2366;&#2311;&#2337;&#2381;&#2360; f-&#2348;&#2381;&#2354;&#2377;&#2325; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;&#2306; &#2324;&#2352; &#2360;&#2350;&#2366;&#2344; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2327;&#2369;&#2339; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>b. f-&#2348;&#2381;&#2354;&#2377;&#2325; &#2350;&#2375;&#2306; &#2319;&#2325;&#2381;&#2335;&#2367;&#2344;&#2366;&#2311;&#2337;&#2381;&#2360; &#2332;&#2381;&#2351;&#2366;&#2342;&#2366;&#2340;&#2352; &#2327;&#2376;&#2352;-&#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2343;&#2352;&#2381;&#2350;&#2368; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>c. f-&#2348;&#2381;&#2354;&#2377;&#2325; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2379; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339; &#2343;&#2366;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Lanthanides exhibit similar properties due to the filling of 4f orbitals.</b></p><p>&bull; <b>Actinides are mostly radioactive, with some being highly unstable.</b></p><p>&bull; <b>f-block elements are referred to as inner transition metals due to their position in the periodic table.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>f-Block Elements (Inner Transition Metals):</b></p><p>&bull; Lanthanoids (Atomic numbers 57 to 71):</p><p>&bull; Silvery-white metals, high melting points.</p><p>&bull; Common oxidation state: +3.</p><p>&bull; Examples: Lanthanum (La), Cerium (Ce), Neodymium (Nd), Europium (Eu), etc.</p><p>&bull; Actinoids (Atomic numbers 89 to 103):</p><p>&bull; All are radioactive.</p><p>&bull; Examples: Thorium (Th), Uranium (U), Plutonium (Pu), etc.</p><p><img width=731 height=121 id=image9.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25985/image012.jpg\"></p>",
    "question_index": 17
