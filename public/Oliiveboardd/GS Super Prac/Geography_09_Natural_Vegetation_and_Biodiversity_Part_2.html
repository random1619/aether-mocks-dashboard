<head>

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following refers to a plant community that has grown naturally without human aid and has been left undisturbed for a long time? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2358;&#2348;&#2381;&#2342; &#2313;&#2360; &#2357;&#2344;&#2360;&#2381;&#2346;&#2340;&#2367; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2325;&#2379; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2350;&#2366;&#2344;&#2357; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366; &#2360;&#2381;&#2357;&#2366;&#2349;&#2366;&#2357;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2361;&#2369;&#2310; &#2361;&#2376; &#2324;&#2352; &#2354;&#2306;&#2348;&#2375; &#2360;&#2350;&#2351; &#2340;&#2325; &#2309;&#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2352;&#2361;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cultivated crops</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2375;&#2340;&#2368; &#2325;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2347;&#2360;&#2354;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Orchards</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2327;&#2368;&#2330;&#2375;</span>",
      "<span class=\"eqt\">Natural vegetation</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2357;&#2344;&#2360;&#2381;&#2346;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Planted vegetation</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2379;&#2346;&#2367;&#2340; &#2357;&#2344;&#2360;&#2381;&#2346;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Natural vegetation</b> refers to plant communities that have grown naturally without human intervention and have been left undisturbed for a long period. These plant communities develop according to local environmental conditions including climate, soil type, and topography.</p><p>In contrast:</p><p>&#183; Cultivated crops are deliberately planted and managed by humans for food production</p><p>&#183; Orchards are planned plantings of trees or shrubs maintained for food production</p><p>&#183; Planted vegetation refers to any plants deliberately introduced by humans, which may include ornamental gardens, tree plantations, or restoration projects</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>India is one of the how many mega bio-diversity countries of the world? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2375;&#2327;&#2366; &#2332;&#2376;&#2357;-&#2357;&#2367;&#2357;&#2367;&#2343;&#2340;&#2366; &#2357;&#2366;&#2354;&#2375; &#2342;&#2375;&#2358;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>India is recognized as one of the <b>12 mega biodiversity</b> countries globally. </p><p>These countries collectively harbor the majority of Earth's species and are characterized by exceptional biodiversity, high levels of endemism (species found nowhere else), and diverse ecosystems. </p><p>India's status stems from its varied climate zones, geographical features, and evolutionary history, which have created numerous distinct ecological habitats ranging from the Himalayas to coastal regions.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What percentage of the world's total number of flowering plants is found in India? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2375; &#2325;&#2369;&#2354; &#2346;&#2369;&#2359;&#2381;&#2346;&#2368;&#2351; &#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">4 per cent</span><span class=\"hqt\" style=\"display:none\">4 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span>",
      "<span class=\"eqt\">8 per cent</span><span class=\"hqt\" style=\"display:none\">8 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span>",
      "<span class=\"eqt\">6 per cent</span><span class=\"hqt\" style=\"display:none\">6 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span>",
      "<span class=\"eqt\">10 per cent</span><span class=\"hqt\" style=\"display:none\">10 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>With approximately <b>6% of the world's flowering</b> plant species, India has remarkable floral diversity despite covering only about 2.4% of the world's land area. </p><p>This disproportionately high plant diversity is due to India's varied climate zones, diverse topography ranging from the Himalayas to coastal plains, and its position at the intersection of different biogeographic regions. </p><p>India is home to over 18,000 species of flowering plants, including around 4,900 endemic species found nowhere else on Earth.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are correct regarding Tropical Evergreen Forests? </p><p>I. These forests thrive in areas with more than 200 cm of rainfall and a short dry season. </p><p>II. Teak is one of the most commercially important trees found in these forests. </p><p>III. These forests appear green all year round because there is no definite time for trees to shed their leaves.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2360;&#2342;&#2366;&#2348;&#2361;&#2366;&#2352; &#2357;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2351;&#2375; &#2357;&#2344; 200 &#2360;&#2375;&#2350;&#2368; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2357;&#2352;&#2381;&#2359;&#2366; &#2324;&#2352; &#2331;&#2379;&#2335;&#2375; &#2358;&#2369;&#2359;&#2381;&#2325; &#2350;&#2380;&#2360;&#2350; &#2357;&#2366;&#2354;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2344;&#2346;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2360;&#2366;&#2327;&#2380;&#2344; &#2311;&#2344; &#2357;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2348;&#2360;&#2375; &#2357;&#2381;&#2351;&#2366;&#2357;&#2360;&#2366;&#2351;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2346;&#2375;&#2337;&#2364;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2361;&#2376;&#2404;</p><p>III. &#2351;&#2375; &#2332;&#2306;&#2327;&#2354; &#2346;&#2370;&#2352;&#2375; &#2360;&#2366;&#2354; &#2361;&#2352;&#2375;-&#2349;&#2352;&#2375; &#2342;&#2367;&#2326;&#2366;&#2312; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2346;&#2375;&#2337;&#2364;&#2379;&#2306; &#2325;&#2375; &#2346;&#2340;&#2381;&#2340;&#2375; &#2327;&#2367;&#2352;&#2344;&#2375; &#2325;&#2366; &#2325;&#2379;&#2312; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2350;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">Both I and III</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; III &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement I is correct as Tropical evergreen forests are typically found in regions with high annual rainfall (generally over 200 cm) and either no dry season or a very short one. </p><p>Statement III is also correct. In tropical evergreen forests, trees do shed their leaves, but not simultaneously. Individual trees lose and replace leaves gradually throughout the year rather than during a specific season, which is why these forests maintain their green appearance year-round.</p><p>Statement II is incorrect. Teak (Tectona grandis) is actually a characteristic species of tropical deciduous forests, not evergreen forests. Teak trees shed their leaves during the dry season, which is a deciduous trait.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Sundari trees, known for providing durable hard timber, are found in the delta of which river system?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2369;&#2306;&#2342;&#2352;&#2368; &#2325;&#2375; &#2346;&#2375;&#2337;&#2364;, &#2332;&#2379; &#2335;&#2367;&#2325;&#2366;&#2314; &#2325;&#2336;&#2379;&#2352; &#2354;&#2325;&#2337;&#2364;&#2368; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2325;&#2367;&#2360; &#2344;&#2342;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2337;&#2375;&#2354;&#2381;&#2335;&#2366; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mahanadi</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2344;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Krishna</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2381;&#2339;</span>",
      "<span class=\"eqt\">Godavari</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Ganga-Brahmaputra</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2327;&#2366;-&#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2346;&#2369;&#2340;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The Sundari tree (Heritiera fomes) is the dominant mangrove species in the Sundarbans, which is the world's largest mangrove forest located in the <b>Ganga-Brahmaputra</b> delta region spanning across India and Bangladesh. </p><p>&#183; The name \"Sundarbans\" is actually derived from \"Sundari,\" reflecting how prevalent these trees are in this ecosystem. These trees provide valuable hardwood timber that is highly resistant to water and is used for boat-building, construction, and furniture. </p><p>&#183; The Sundarbans is a UNESCO World Heritage site and forms a critical protective barrier against cyclones and storm surges in the Bay of Bengal region. </p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Type of Forest with its Rainfall Range:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column I (Forest Type)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column II (Rainfall Range)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Tropical Evergreen Forests</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. 70-200 cm</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Tropical Deciduous Forests</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Less than 50 cm</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Tropical Thorn Forests</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. More than 200 cm</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) Dry Deciduous Forests</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.70  -  100 cm</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2344; &#2325;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2313;&#2360;&#2325;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366; &#2360;&#2368;&#2350;&#2366; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; I (&#2357;&#2344; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; II (&#2357;&#2352;&#2381;&#2359;&#2366; &#2360;&#2368;&#2350;&#2366;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2360;&#2342;&#2366;&#2348;&#2361;&#2366;&#2352; &#2357;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. 70-200 &#2360;&#2375;&#2350;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2346;&#2352;&#2381;&#2339;&#2346;&#2366;&#2340;&#2368; &#2357;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. 50 &#2360;&#2375;&#2350;&#2368; &#2360;&#2375; &#2325;&#2350;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2325;&#2366;&#2306;&#2335;&#2375;&#2342;&#2366;&#2352; &#2357;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. 200 &#2360;&#2375;&#2350;&#2368; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) &#2358;&#2369;&#2359;&#2381;&#2325; &#2346;&#2352;&#2381;&#2339;&#2346;&#2366;&#2340;&#2368; &#2357;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.70 - 100 &#2360;&#2375;&#2350;&#2368;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i - c, ii - a, iii - b, iv - d</span><span class=\"hqt\" style=\"display:none\">i - c, ii - a, iii - b, iv - d</span>",
      "<span class=\"eqt\">i - a, ii - c, iii - d, iv - b</span><span class=\"hqt\" style=\"display:none\">i - a, ii - c, iii - d, iv - b</span>",
      "<span class=\"eqt\">i - b, ii - d, iii - a, iv - c</span><span class=\"hqt\" style=\"display:none\">i - b, ii - d, iii - a, iv - c</span>",
      "<span class=\"eqt\">i - d, ii - b, iii - c, iv - a</span><span class=\"hqt\" style=\"display:none\">i - d, ii - b, iii - c, iv - a</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Tropical Evergreen : Found in high rainfall areas (&gt;200 cm) like Western Ghats, dense &amp; non-shedding (e.g., Mahogany).</p><p>&#183; Tropical Deciduous : Monsoon forests (70-200 cm); shed leaves in dry season (e.g., Teak, Sal).</p><p>&#183; Tropical Thorn : Arid regions (&lt;50 cm) with xerophytic plants (e.g., Cactus, Kikar).</p><p>&#183; Dry Deciduous : Transitional (70-100 cm); less dense than tropical deciduous (e.g., Neem, Acacia).</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Trees in which type of forest shed their leaves for about six to eight weeks in dry summer? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2357;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2375;&#2337;&#2364; &#2358;&#2369;&#2359;&#2381;&#2325; &#2327;&#2381;&#2352;&#2368;&#2359;&#2381;&#2350;&#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2354;&#2327;&#2349;&#2327; &#2331;&#2361; &#2360;&#2375; &#2310;&#2336; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2340;&#2325; &#2309;&#2346;&#2344;&#2375; &#2346;&#2340;&#2381;&#2340;&#2375; &#2327;&#2367;&#2352;&#2366; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tropical Evergreen Forests</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2360;&#2342;&#2366;&#2348;&#2361;&#2366;&#2352; &#2357;&#2344;</span>",
      "<span class=\"eqt\">Tropical Deciduous Forests</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2346;&#2352;&#2381;&#2339;&#2346;&#2366;&#2340;&#2368; &#2357;&#2344;</span>",
      "<span class=\"eqt\">Tropical Thorn Forests and Scrubs</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2325;&#2366;&#2306;&#2335;&#2375;&#2342;&#2366;&#2352; &#2357;&#2344; &#2324;&#2352; &#2333;&#2366;&#2337;&#2364;&#2367;&#2351;&#2366;&#2305;</span>",
      "<span class=\"eqt\">Montane Forests</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2381;&#2357;&#2340;&#2368;&#2351; &#2357;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Tropical Deciduous Forests</b> (also called <b>monsoon forests</b>) shed their leaves <b>for 6 - 8 weeks during dry summers</b> (typically April - June) to conserve water.</p><p>&#183; <b>Examples</b>: Teak, Sal, Peepal, and Neem trees.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Some of the commercially important trees of this forest are ebony, mahogany, rosewood, rubber and cinchona. Which forest is being talked about here?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2332;&#2306;&#2327;&#2354; &#2325;&#2375; &#2325;&#2369;&#2331; &#2357;&#2381;&#2351;&#2366;&#2357;&#2360;&#2366;&#2351;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2346;&#2375;&#2337;&#2364; &#2361;&#2376;&#2306; &#2310;&#2348;&#2344;&#2370;&#2360;, &#2350;&#2361;&#2379;&#2327;&#2344;&#2368;, &#2358;&#2368;&#2358;&#2350;, &#2352;&#2348;&#2352; &#2324;&#2352; &#2360;&#2367;&#2344;&#2325;&#2379;&#2344;&#2366;&#2404; &#2351;&#2361;&#2366;&#2305; &#2325;&#2367;&#2360; &#2332;&#2306;&#2327;&#2354; &#2325;&#2368; &#2348;&#2366;&#2340; &#2361;&#2379; &#2352;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tropical Evergreen Forests</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2360;&#2342;&#2366;&#2348;&#2361;&#2366;&#2352; &#2357;&#2344;</span>",
      "<span class=\"eqt\">Tropical Deciduous Forests</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2346;&#2352;&#2381;&#2339;&#2346;&#2366;&#2340;&#2368; &#2357;&#2344;</span>",
      "<span class=\"eqt\">Tropical Thorn Forests and Scrubs</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2325;&#2366;&#2306;&#2335;&#2375;&#2342;&#2366;&#2352; &#2357;&#2344; &#2324;&#2352; &#2333;&#2366;&#2337;&#2364;&#2367;&#2351;&#2366;&#2305;</span>",
      "<span class=\"eqt\">Montane Forests</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2381;&#2357;&#2340;&#2368;&#2351; &#2357;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Tropical Evergreen Forests </p><p>&#183; These forests are restricted to heavy rainfall areas of the Western Ghats and the island groups of Lakshadweep, Andaman and Nicobar, upper parts of Assam and Tamil Nadu coast. </p><p>&#183; They are at their best in areas having more than 200 cm of rainfall with a short dry season. The trees reach great heights up to 60 metres or even above. </p><p>&#183; Since the region is warm and wet throughout the year, it has a luxuriant vegetation of all kinds  -  trees, shrubs and creepers giving it a multilayered structure. </p><p>&#183; There is no definite time for trees to shed their leaves. </p><p>&#183; As such, these forests appear green all the year round. </p><p>&#183; Some of the commercially important trees of this forest are ebony, mahogany, rosewood, rubber and cinchona.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a main plant species found in Tropical Thorn Forests and Scrubs? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2350;&#2369;&#2326;&#2381;&#2351; &#2357;&#2344;&#2360;&#2381;&#2346;&#2340;&#2367; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2325;&#2366;&#2306;&#2335;&#2375;&#2342;&#2366;&#2352; &#2357;&#2344;&#2379;&#2306; &#2324;&#2352; &#2333;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mahogany</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2379;&#2327;&#2344;&#2368; &#2357;&#2371;&#2325;&#2381;&#2359;</span>",
      "<span class=\"eqt\">Rosewood</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2368;&#2358;&#2350;</span>",
      "<span class=\"eqt\">Acacias</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2348;&#2370;&#2354;</span>",
      "<span class=\"eqt\">Teak</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2368;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Acacias</b>, palms, euphorbias and cacti are the main plant species in Tropical Thorn Forests and Scrubs. </p><p>Mahogany and Rosewood are found in Tropical Evergreen Forests, and Teak is dominant in Tropical Deciduous Forests.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following wetland pairing is incorrect? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2310;&#2352;&#2381;&#2342;&#2381;&#2352;&#2349;&#2370;&#2350;&#2367; &#2351;&#2369;&#2327;&#2381;&#2350;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Deccan Plateau - Southern reservoirs and west coast lagoons</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2325;&#2344; &#2346;&#2336;&#2366;&#2352; - &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2368; &#2332;&#2354;&#2366;&#2358;&#2351; &#2324;&#2352; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2340;&#2335; &#2354;&#2376;&#2327;&#2370;&#2344;</span>",
      "<span class=\"eqt\">Rajasthan/Gujarat - Vast freshwater lakes</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344;/&#2327;&#2369;&#2332;&#2352;&#2366;&#2340; - &#2357;&#2367;&#2358;&#2366;&#2354; &#2350;&#2368;&#2336;&#2375; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2333;&#2368;&#2354;&#2375;&#2306;</span>",
      "<span class=\"eqt\">East Coast - Delta wetlands and Chilika Lake</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2340;&#2335; - &#2337;&#2375;&#2354;&#2381;&#2335;&#2366; &#2310;&#2352;&#2381;&#2342;&#2381;&#2352;&#2349;&#2370;&#2350;&#2367; &#2324;&#2352; &#2330;&#2367;&#2354;&#2381;&#2325;&#2366; &#2333;&#2368;&#2354;</span>",
      "<span class=\"eqt\">Himalayan foothills - Marshes and swamps of northeast India</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2325;&#2368; &#2340;&#2354;&#2361;&#2335;&#2368; - &#2346;&#2370;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2342;&#2354;&#2342;&#2354; &#2324;&#2352; &#2342;&#2354;&#2342;&#2354;&#2368; &#2349;&#2370;&#2350;&#2367;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The country's wetlands have been grouped into eight categories, viz. </p><p>(i) the reservoirs of the Deccan Plateau in the south together with the lagoons and other wetlands of the southern west coast; </p><p>(ii) the <b>vast saline expanses</b> of Rajasthan, Gujarat and the Gulf of Kachchh; </p><p>(iii) freshwater lakes and reservoirs from Gujarat eastwards through Rajasthan (Keoladeo National Park) and Madhya Pradesh; </p><p>(iv) the delta wetlands and lagoons of India's east coast (Chilika Lake); </p><p>(v) the freshwater marshes of the Gangetic Plain; </p><p>(vi) the floodplains of the Brahmaputra; the marshes and swamps in the hills of northeast India and the Himalayan foothills; </p><p>(vii) the lakes and rivers of the montane region of Kashmir and Ladakh; and </p><p>(viii) the mangrove forest and other wetlands of the island arcs of the Andaman and Nicobar Islands.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following trees is NOT a common coniferous tree found in temperate forests between 1500 and 3000 metres in the Himalayas? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2371;&#2325;&#2381;&#2359; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; 1500 &#2360;&#2375; 3000 &#2350;&#2368;&#2335;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2350;&#2358;&#2368;&#2340;&#2379;&#2359;&#2381;&#2339; &#2332;&#2306;&#2327;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2358;&#2306;&#2325;&#2369;&#2343;&#2366;&#2352;&#2368; &#2357;&#2371;&#2325;&#2381;&#2359; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pine</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2368;&#2337;&#2364;</span>",
      "<span class=\"eqt\">Oak</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2354;&#2370;&#2340;</span>",
      "<span class=\"eqt\">Deodar</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2375;&#2357;&#2342;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Silver fir</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2354;&#2381;&#2357;&#2352; &#2347;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Between 1500 and 3000 metres, temperate forests containing coniferous trees, like pine, deodar, silver fir, spruce and cedar, are found. </p><p><b>Oak</b> is an evergreen broad-leaf tree that predominates in the wet temperate type of forests between 1000 and 2000 metres.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Mangrove forests are found in the areas of coasts influenced by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2376;&#2306;&#2327;&#2381;&#2352;&#2379;&#2357; &#2357;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2340;&#2335;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Heavy rainfall</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366;</span>",
      "<span class=\"eqt\">High temperature</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Tides</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2381;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Strong winds</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2375;&#2332;&#2364; &#2361;&#2357;&#2366;&#2319;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Mangrove forests</b> thrive in <b>coastal areas influenced by tides</b>, where:</p><p>&#183; <b>Saltwater and freshwater mix</b> (estuaries, deltas).</p><p>&#183; <b>Tidal fluctuations</b> bring nutrients and oxygen, supporting unique ecosystems.</p><p>&#183; Examples: <b>Sundarbans (India/Bangladesh)</b>, Bhitarkanika (Odisha).</p><p>Further information:</p><p>In India, the mangrove forests spread over 6,740 sq. km which is 7 per cent of the world's mangrove forests. They are highly developed in the Andaman and Nicobar Islands and the Sunderbans of West Bengal. </p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>The \"Shola\" temperate forests in Southern India are primarily found in which of the following regions?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2368; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; \"&#2358;&#2379;&#2354;&#2366;\" &#2360;&#2350;&#2358;&#2368;&#2340;&#2379;&#2359;&#2381;&#2339; &#2357;&#2344; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Satpura and Maikal ranges</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2346;&#2369;&#2337;&#2364;&#2366; &#2324;&#2352; &#2350;&#2376;&#2325;&#2366;&#2354; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Nilgiris, Anaimalai, and Palani hills</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2354;&#2327;&#2367;&#2352;&#2368;, &#2309;&#2344;&#2366;&#2312;&#2350;&#2354;&#2366;&#2312; &#2324;&#2352; &#2346;&#2354;&#2366;&#2344;&#2368; &#2346;&#2361;&#2366;&#2337;&#2364;&#2367;&#2351;&#2366;&#2305;</span>",
      "<span class=\"eqt\">Vindhyas and Aravallis</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2306;&#2343;&#2381;&#2351; &#2324;&#2352; &#2309;&#2352;&#2366;&#2357;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Eastern Ghats and Chota Nagpur Plateau</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2328;&#2366;&#2335; &#2324;&#2352; &#2331;&#2379;&#2335;&#2366; &#2344;&#2366;&#2327;&#2346;&#2369;&#2352; &#2346;&#2336;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The southern mountain forests include the forests found in three distinct areas of Peninsular India viz; the Western Ghats, the Vindhyas and the Nilgiris. </p><p>&#183; As they are closer to the tropics, and only 1,500 m above the sea level, vegetation is temperate in the higher regions, and subtropical on the lower regions of the Western Ghats, especially in Kerala, Tamil Nadu and Karnataka.</p><p>&#183; <b>The temperate forests are called Sholas in the Nilgiris, Anaimalai and Palani hills. </b></p><p>&#183; Some of the other trees of this forest of economic significance include, magnolia, laurel, cinchona and wattle. Such forests are also found in the Satpura and the Maikal ranges.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following plants is used to treat blood pressure and is found only in India? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2380;&#2343;&#2366; &#2352;&#2325;&#2381;&#2340;&#2330;&#2366;&#2346; &#2325;&#2375; &#2311;&#2354;&#2366;&#2332; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2325;&#2375;&#2357;&#2354; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Jamun</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2350;&#2369;&#2344;</span>",
      "<span class=\"eqt\">Arjun</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2381;&#2332;&#2369;&#2344;</span>",
      "<span class=\"eqt\">Sarpagandha</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2346;&#2327;&#2306;&#2343;&#2366;</span>",
      "<span class=\"eqt\">Neem</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Sarpagandha</b> is used to treat blood pressure; it is found only in India.</p><p>&#183; <b>Sarpagandha</b> is a medicinal plant <b>native to India</b> (found in the Himalayas, Western Ghats, and Assam).</p><p>&#183; Its roots contain <b>reserpine</b>, a compound used to treat <b>hypertension (high blood pressure)</b> and anxiety.</p><p>&#183; Recognized in <b>Ayurveda</b> and modern medicine.</p><p>Further information:</p><p>India is known for its herbs and spices from ancient times. Some 2,000 plants have been described in Ayurveda and at least 500 are in regular use. The World Conservation Union's Red List has named 352 medicinal plants of which 52 are critically threatened and 49 endangered. The commonly used plants in India are:</p><p>&#183; Sarpagandha : Used to treat blood pressure; it is found only in India.</p><p>&#183; Jamun : The juice from ripe fruit is used to prepare vinegar, which is carminative and diuretic, and</p><p>&#183; has digestive properties. The powder of the seed is used for controlling diabetes.</p><p>&#183; Arjun : The fresh juice of leaves is a cure for earache. It is also used to regulate blood pressure.</p><p>&#183; Babool : Leaves are used as a cure for eye sores. Its gum is used as a tonic.</p><p>&#183; Neem : Has high antibiotic and antibacterial properties.</p><p>&#183; Tulsi : Is used to cure cough and cold.</p><p>&#183; Kachnar : Is used to cure asthma and ulcers. The buds and roots are good for digestive problems.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>According to the new forest policy of India modified in 1988, what percentage of the geographical areas was targeted to be under forest cover? </p></span><span class=\"hqt\" style=\"display:none\"><p>1988 &#2350;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2367;&#2340; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2344;&#2312; &#2357;&#2344; &#2344;&#2368;&#2340;&#2367; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; &#2357;&#2344; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2354;&#2366;&#2344;&#2375; &#2325;&#2366; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2352;&#2326;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">22 per cent</span><span class=\"hqt\" style=\"display:none\">22 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span>",
      "<span class=\"eqt\">33 per cent</span><span class=\"hqt\" style=\"display:none\">33 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span>",
      "<span class=\"eqt\">44 per cent</span><span class=\"hqt\" style=\"display:none\">44 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span>",
      "<span class=\"eqt\">50 per cent</span><span class=\"hqt\" style=\"display:none\">50 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to the new forest policy, the Government will emphasise sustainable forest management in order to conserve and expand forest reserve. </p><p>The forest policy aimed at <b>bringing 33 per cent of the geographical areas under forest cover</b>.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT one of the three categories under which the National Commission on Agriculture (1976) classified social forestry? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2313;&#2344; &#2340;&#2368;&#2344; &#2358;&#2381;&#2352;&#2375;&#2339;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2371;&#2359;&#2367; &#2310;&#2351;&#2379;&#2327; (1976) &#2344;&#2375; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2357;&#2366;&#2344;&#2367;&#2325;&#2368; &#2325;&#2379; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Urban forestry</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2361;&#2352;&#2368; &#2357;&#2366;&#2344;&#2367;&#2325;&#2368;</span>",
      "<span class=\"eqt\">Rural forestry</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2357;&#2366;&#2344;&#2367;&#2325;&#2368;</span>",
      "<span class=\"eqt\">Farm forestry</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2357;&#2366;&#2344;&#2367;&#2325;&#2368;</span>",
      "<span class=\"eqt\">Commercial forestry</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351;&#2367;&#2325; &#2357;&#2366;&#2344;&#2367;&#2325;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The National Commission on Agriculture (1976) has classified social forestry into three categories: <b>Urban forestry, Rural forestry and Farm forestry</b>. </p><p>Commercial forestry is not explicitly mentioned as a separate category of social forestry in the sources.</p><p>Further information:</p><p>&#183; Urban forestry pertains to the raising and management of trees on public and privately owned lands in and around urban centres such as green belts, parks, roadside avenues, industrial and commercial green belts, etc. </p><p>&#183; Rural forestry lays emphasis on promotion of agro-forestry and community-forestry. </p><p>&#183; Agro-forestry is the raising of trees and agriculture crops on the same land inclusive of the waste patches. It combines forestry with agriculture, thus, altering the simultaneous production of food, fodder, fuel, timber and fruit. </p><p>&#183; Farm forestry is a term applied to the process under which farmers grow trees for commercial and non-commercial purposes on their farm lands.</p><p>&#183; Community forestry involves the raising of trees on public or community land such as the village pasture and temple land, roadside, canal bank, strips along railway lines, and schools etc. Community forestry programme aims at providing benefits to the community as a whole. Community forestry provides a means under which the people of landless classes can associate themselves in treeraising and thus, get those benefits which otherwise are restricted for landowners.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Type of Vegetation with a Prominent Tree Species:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Vegetation Type</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Prominent Tree Species</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Tropical Evergreen Forests</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Teak</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Tropical Deciduous Forests</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Pine</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Montane Forests (1500 - 3000m)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Ebony</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) Tropical Thorn Forests</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Babool</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2357;&#2371;&#2325;&#2381;&#2359; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2325;&#2375; &#2360;&#2366;&#2341; &#2357;&#2344;&#2360;&#2381;&#2346;&#2340;&#2367; &#2325;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2357;&#2344;&#2360;&#2381;&#2346;&#2340;&#2367; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2357;&#2371;&#2325;&#2381;&#2359; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2366;&#2305;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2360;&#2342;&#2366;&#2348;&#2361;&#2366;&#2352; &#2357;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2360;&#2366;&#2327;&#2380;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2346;&#2352;&#2381;&#2339;&#2346;&#2366;&#2340;&#2368; &#2357;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2330;&#2368;&#2337;&#2364;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2346;&#2352;&#2381;&#2357;&#2340;&#2368;&#2351; &#2357;&#2344; (1500 - 3000 &#2350;&#2368;.)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2310;&#2348;&#2344;&#2370;&#2360;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2325;&#2366;&#2306;&#2335;&#2375;&#2342;&#2366;&#2352; &#2357;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2328;. &#2348;&#2348;&#2370;&#2354;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i &rarr; a, ii &rarr; c, iii &rarr; d, iv &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; c, iii &rarr; d, iv &rarr; b</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; a, iii &rarr; b, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; a, iii &rarr; b, iv &rarr; d</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; d, iii &rarr; a, iv &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; d, iii &rarr; a, iv &rarr; c</span>",
      "<span class=\"eqt\">i &rarr; d, ii &rarr; b, iii &rarr; c, iv &rarr; a</span><span class=\"hqt\" style=\"display:none\">i &rarr; d, ii &rarr; b, iii &rarr; c, iv &rarr; a</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Ebony</b> is a commercially important tree found in <b>Tropical Evergreen Forests</b>. </p><p>&#183; <b>Teak</b> is the most dominant species of <b>Tropical Deciduous Forests</b>. </p><p>&#183; <b>Pine</b> is a coniferous tree found in temperate forests within <b>Montane Forests</b> between 1500 and 3000 metres. </p><p>&#183; <b>Babool</b> is an important species found in <b>Tropical Thorn Forests</b>.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Social forestry aims at:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2357;&#2366;&#2344;&#2367;&#2325;&#2368; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Managing forests only for commercial purposes</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2344;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2375;&#2357;&#2354; &#2357;&#2381;&#2351;&#2366;&#2357;&#2360;&#2366;&#2351;&#2367;&#2325; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Restricting forest activities to government agencies</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2344; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2319;&#2332;&#2375;&#2306;&#2360;&#2367;&#2351;&#2379;&#2306; &#2340;&#2325; &#2360;&#2368;&#2350;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Management and protection of forests and afforestation on barren lands for environmental, social and rural development</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339;, &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2324;&#2352; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2344;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2324;&#2352; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2340;&#2341;&#2366; &#2348;&#2306;&#2332;&#2352; &#2349;&#2370;&#2350;&#2367; &#2346;&#2352; &#2357;&#2344;&#2352;&#2379;&#2346;&#2339;</span>",
      "<span class=\"eqt\">Focusing solely on urban green belts</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2358;&#2361;&#2352;&#2368; &#2361;&#2352;&#2367;&#2340; &#2346;&#2335;&#2381;&#2335;&#2368; &#2346;&#2352; &#2343;&#2381;&#2351;&#2366;&#2344; &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Social forestry</b> is a community-centric approach that focuses on:</p><p>&#183; <b>Environmental benefits</b>: Combating deforestation, soil erosion, and climate change.</p><p>&#183; <b>Social upliftment</b>: Providing fuelwood, fodder, and livelihood to rural communities.</p><p>&#183; <b>Afforestation</b>: Planting trees on <b>degraded lands</b> (wastelands, roadsides, village commons).</p><p><b>Why Not Others?</b></p><p>&#183; <b>Commercial purposes</b>: Social forestry prioritizes <b>community needs</b> over timber trade.</p><p>&#183; <b>Government-only</b>: Actively involves <b>local communities</b> in forest management.</p><p>&#183; <b>Urban green belts</b>: Only a small part; mainly targets <b>rural areas</b> and wastelands.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Virgin vegetation that is purely Indian is known as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2358;&#2369;&#2342;&#2381;&#2343; &#2352;&#2370;&#2346; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2325;&#2369;&#2306;&#2357;&#2366;&#2352;&#2368; &#2357;&#2344;&#2360;&#2381;&#2346;&#2340;&#2367; &#2325;&#2379; &#2311;&#2360; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Exotic plants</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2346;&#2380;&#2343;&#2375;</span>",
      "<span class=\"eqt\">Introduced species</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2366;&#2305;</span>",
      "<span class=\"eqt\">Endemic or indigenous species</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325; &#2351;&#2366; &#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2366;&#2305;</span>",
      "<span class=\"eqt\">Cultivated crops</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2375;&#2340;&#2368; &#2325;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2347;&#2360;&#2354;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Endemic/indigenous species</b> refer to plants that are <b>native to India</b> and have grown naturally in the region for centuries without human intervention.</p><p>&#183; Examples: <b>Neem, Banyan, Sandalwood</b>.</p><p>Further information:</p><p>&#183; <b>Exotic plants</b>: Introduced from foreign countries (e.g., <b>Eucalyptus</b> from Australia).</p><p>&#183; <b>Introduced species</b>: Brought intentionally/unintentionally (e.g., <b>Lantana</b> from South America).</p><p>&#183; <b>Cultivated crops</b>: Grown by humans (e.g., <b>Rice, Wheat</b>).</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are correct concerning Tropical Deciduous Forests? </p><p>I. They are also known as the monsoon forests and spread over regions receiving rainfall between 200 cm and 70 cm. </p><p>II. These forests are divided into moist and dry deciduous types based on the availability of water.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2346;&#2352;&#2381;&#2339;&#2346;&#2366;&#2340;&#2368; &#2357;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2311;&#2344;&#2381;&#2361;&#2375;&#2306; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2357;&#2344; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2351;&#2375; 200 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 70 &#2360;&#2375;&#2350;&#2368; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2352;&#2381;&#2359;&#2366; &#2357;&#2366;&#2354;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2347;&#2376;&#2354;&#2375; &#2361;&#2369;&#2319; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2311;&#2344; &#2357;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2340;&#2366; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2344;&#2350; &#2324;&#2352; &#2358;&#2369;&#2359;&#2381;&#2325; &#2346;&#2352;&#2381;&#2339;&#2346;&#2366;&#2340;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2364;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement I is correct as Tropical Deciduous Forests are also called monsoon forests and are found in regions with 200 cm to 70 cm of rainfall. They shed leaves in the dry season to conserve water.</p><p>Statement II is also correct; these forests are further divided into moist and dry deciduous based on water availability. </p><p>&#183; <b>Moist Deciduous</b>: Found in areas with <b>100 - 200 cm</b> rainfall (e.g., Teak, Sal in Central India).</p><p>&#183; <b>Dry Deciduous</b>: Found in areas with <b>70 - 100 cm</b> rainfall (e.g., Neem, Acacia in Rajasthan).</p>",
    "question_index": 19
  }
];
