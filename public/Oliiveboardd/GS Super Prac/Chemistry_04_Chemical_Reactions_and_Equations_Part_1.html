<body>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In the reaction Zn + 2HCl &rarr; ZnCl<sub>2</sub> + H<sub>2</sub>, which of the following statements are correct? </p><p>a. Zinc gets oxidized </p><p>b. Hydrogen ions get reduced </p><p>c. Chlorine remains unchanged </p><p>d. Zinc loses electrons </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; Zn + 2HCl &rarr; ZnCl<sub>2</sub> + H<sub>2</sub> &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>a. &#2332;&#2367;&#2306;&#2325; &#2321;&#2325;&#2381;&#2360;&#2368;&#2325;&#2371;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p>b. &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344; &#2310;&#2351;&#2344; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;</p><p>c. &#2325;&#2381;&#2354;&#2379;&#2352;&#2368;&#2344; &#2309;&#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;</p><p>d. &#2332;&#2367;&#2306;&#2325; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2326;&#2379; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">a, b, c and d</span><span class=\"hqt\" style=\"display:none\">a, b, c , d</span>",
      "<span class=\"eqt\">a and b</span><span class=\"hqt\" style=\"display:none\">a , b</span>",
      "<span class=\"eqt\">a, c and d</span><span class=\"hqt\" style=\"display:none\">a, c , d</span>",
      "<span class=\"eqt\">b and c</span><span class=\"hqt\" style=\"display:none\">b , c</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Zi<b>nc gets oxidized</b>: Zinc (Zn) loses electrons and forms zinc ions (Zn<sup>2+</sup>), meaning it undergoes oxidation.</p><p>Zn&rarr;Zn<sup>2+</sup>+2<sup>e-</sup> </p><p>&#183; <b>Hydrogen ions get reduced</b>: The hydrogen ions (H<sup>+</sup>)from HCl gain electrons and form hydrogen gas (H<sub>2</sub>&#8203;).</p><p>2H<sup>+</sup>+2e<sup>&#8722;</sup>&rarr;H<sup>2</sup> </p><p>&#183; <b>Chlorine remains unchanged</b>: Chlorine is already present as chloride ions (Cl<sup>-</sup>)in HCl and remains in the same ionic form in ZnCl&#8322;.</p><p>&#183; <b>Zinc loses electrons</b>: Since zinc undergoes oxidation, it <b>loses electrons</b>, which confirms statement <b>d</b>.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In a balanced chemical equation, the number of atoms of each element must be:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2340;&#2340;&#2381;&#2357; &#2325;&#2375; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;:</p></span>",
    "options": [
      "<span class=\"eqt\">Minimized</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350; &#2360;&#2375; &#2325;&#2350;</span>",
      "<span class=\"eqt\">Maximized</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325;&#2340;&#2350;</span>",
      "<span class=\"eqt\">Equal on both sides</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2340;&#2352;&#2347; &#2348;&#2352;&#2366;&#2348;&#2352;</span>",
      "<span class=\"eqt\">Random</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2366;&#2342;&#2371;&#2330;&#2381;&#2331;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; A balanced chemical equation follows the <b>law of conservation of mass</b>, which states that matter cannot be created or destroyed in a chemical reaction.</p><p>&#183; This means the <b>number of atoms of each element must be the same on both the reactant and product sides</b> of the equation.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following represents a synthesis (combination) reaction?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; (&#2360;&#2306;&#2351;&#2379;&#2332;&#2344;) &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A + B &rarr; AB</span><span class=\"hqt\" style=\"display:none\">A + B &rarr; AB</span>",
      "<span class=\"eqt\">AB &rarr; A + B</span><span class=\"hqt\" style=\"display:none\">AB &rarr; A + B</span>",
      "<span class=\"eqt\">A + B &rarr; AC</span><span class=\"hqt\" style=\"display:none\">A + B &rarr; AC</span>",
      "<span class=\"eqt\">AB &rarr; A + C</span><span class=\"hqt\" style=\"display:none\">AB &rarr; A + C</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; A <b>synthesis (combination) reaction</b> occurs when two or more reactants combine to form a single product.</p><p>&#183; The general form of a synthesis reaction is:</p><p>A+B&rarr;AB</p><p>&#183; One sort of combination reaction that occurs frequently is the reaction of an element with oxygen to form an oxide. Metals and nonmetals both react readily with oxygen under most conditions. </p><p>&#183; Magnesium reacts rapidly and dramatically when ignited, combining with oxygen from the air to produce a fine powder of magnesium oxide.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In a decomposition reaction, a compound breaks down into:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2346;&#2328;&#2335;&#2344; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2351;&#2380;&#2327;&#2367;&#2325; &#2335;&#2370;&#2335;&#2325;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344; &#2348;&#2344; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">More complex substances</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325; &#2332;&#2335;&#2367;&#2354; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;</span>",
      "<span class=\"eqt\">Simpler substances</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2354; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;</span>",
      "<span class=\"eqt\">Identical substances</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2366;&#2344; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;</span>",
      "<span class=\"eqt\">Gaseous substances only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2327;&#2376;&#2360;&#2368;&#2351; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; A <b>decomposition reaction</b> is a type of chemical reaction in which a single compound breaks down into <b>two or more simpler substances</b>.</p><p>&#183; The general form of a decomposition reaction is:</p><p>AB&rarr;A+B</p><p>&#183; Most decomposition reactions require an input of energy in the form of heat, light, or electricity.</p><p>&#183; Binary compounds are compounds composed of just two elements. The simplest kind of decomposition reaction is when a binary compound decomposes into its elements. </p><p>&#183; A reaction is also considered to be a decomposition reaction even when one or more of the products is still a compound.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which coefficient would you place in front of H<sub>2</sub>O to balance the equation: </p><p>H<sub>2</sub> + O<sub>2</sub> &rarr; H<sub>2</sub>O?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2346; H<sub>2</sub>O &#2325;&#2375; &#2360;&#2366;&#2350;&#2344;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2327;&#2369;&#2339;&#2366;&#2306;&#2325; &#2352;&#2326;&#2375;&#2306;&#2327;&#2375;:</p><p>H<sub>2</sub> + O<sub>2</sub> &rarr; H<sub>2</sub>O?</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; To balance a chemical equation, we ensure that the number of atoms of each element is <b>equal on both sides</b>.</p><p>&#183; The given unbalanced equation:</p><p>H<sub>2</sub> + O<sub>2</sub> &rarr; H<sub>2</sub>O</p><p>&#183; <b>Step 1:</b> Count the atoms on both sides.</p><p>o Left side: <b>H = 2</b>, <b>O = 2</b> (from O&#8322;).</p><p>o Right side: <b>H = 2</b>, <b>O = 1</b> (in one H&#8322;O molecule).</p><p>&#183; <b>Step 2:</b> Adjust the coefficient of <b>H&#8322;O</b> to balance oxygen.</p><p>o Since O&#8322; has <b>2 oxygen atoms</b>, we need <b>2 H&#8322;O molecules</b> to have <b>2 oxygen atoms</b> on the right.</p><p>o H<sub>2</sub> + O<sub>2</sub> &rarr; 2H<sub>2</sub>O</p><p>&#183; <b>Step 3:</b> Now, check hydrogen.</p><p>o Left side: <b>H = 2</b> (from H&#8322;).</p><p>o Right side: <b>H = 4</b> (from 2 H&#8322;O molecules).</p><p>o To balance hydrogen, place <b>2</b> in front of <b>H&#8322;</b>:</p><p>o 2H<sub>2</sub> + O<sub>2</sub> &rarr; 2H<sub>2</sub>O</p><p>&#183; Now, both <b>H</b> and <b>O</b> are balanced.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A single displacement reaction involves:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325;&#2354; &#2357;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Two compounds exchanging ions</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2351;&#2380;&#2327;&#2367;&#2325; &#2310;&#2351;&#2344;&#2379;&#2306; &#2325;&#2366; &#2310;&#2342;&#2366;&#2344;-&#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">One element replacing another in a compound</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2351;&#2380;&#2327;&#2367;&#2325; &#2350;&#2375;&#2306; &#2319;&#2325; &#2340;&#2340;&#2381;&#2357; &#2325;&#2366; &#2342;&#2370;&#2360;&#2352;&#2375; &#2340;&#2340;&#2381;&#2357; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2361;&#2379;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Breaking down a single compound</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2319;&#2325;&#2354; &#2351;&#2380;&#2327;&#2367;&#2325; &#2325;&#2379; &#2340;&#2379;&#2337;&#2364;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Combining two elements</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2366; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A <b>single displacement reaction</b> (also called a <b>single replacement reaction</b>) occurs when <b>one element replaces another</b> in a compound. The general form is:</p><p>A+BC&rarr;AC+B</p><p>where <b>A replaces B</b> in the compound <b>BC</b>.</p><p>In this general reaction, element A is a metal and replaces element B, also a metal, in the compound. When the element that is doing the replacing is a nonmetal, it must replace another nonmetal in a compound, and the general equation becomes:</p><p>Y+XZ&rarr;XY+Z</p><p>Y is a nonmetal and replaces the nonmetal Z in the compound with X.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Reaction Type</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Example</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Synthesis Reaction</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) Iron reacting with copper sulfate solution</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Decomposition Reaction</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) Sodium metal reacting with chlorine</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Single Replacement Reaction</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) Decomposition of calcium carbonate</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) Double Replacement Reaction</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) Barium chloride reacting with sodium sulfate</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2313;&#2342;&#2366;&#2361;&#2352;&#2339;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) &#2325;&#2377;&#2346;&#2352; &#2360;&#2354;&#2381;&#2347;&#2375;&#2335; &#2328;&#2379;&#2354; &#2325;&#2375; &#2360;&#2366;&#2341; &#2310;&#2351;&#2352;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2309;&#2346;&#2328;&#2335;&#2344; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) &#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2343;&#2366;&#2340;&#2369; &#2325;&#2381;&#2354;&#2379;&#2352;&#2368;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2319;&#2325;&#2354; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) &#2325;&#2376;&#2354;&#2381;&#2358;&#2367;&#2351;&#2350; &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2344;&#2375;&#2335; &#2325;&#2366; &#2309;&#2346;&#2328;&#2335;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) &#2342;&#2379;&#2361;&#2352;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) &#2348;&#2375;&#2352;&#2367;&#2351;&#2350; &#2325;&#2381;&#2354;&#2379;&#2352;&#2366;&#2311;&#2337; &#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2360;&#2354;&#2381;&#2347;&#2375;&#2335; &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-b, ii-c, iii-a, iv-d</span><span class=\"hqt\" style=\"display:none\">i-b, ii-c, iii-a, iv-d</span>",
      "<span class=\"eqt\">i-a, ii-b, iii-d, iv-c</span><span class=\"hqt\" style=\"display:none\">i-a, ii-b, iii-d, iv-c</span>",
      "<span class=\"eqt\">i-c, ii-d, iii-b, iv-a</span><span class=\"hqt\" style=\"display:none\">i-c, ii-d, iii-b, iv-a</span>",
      "<span class=\"eqt\">i-d, ii-c, iii-a, iv-b</span><span class=\"hqt\" style=\"display:none\">i-d, ii-c, iii-a, iv-b</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>:</b></p><p><b>Synthesis Reaction:</b> A synthesis (or combination) reaction occurs when two or more reactants combine to form a single product.</p><p><b>Example:</b> Sodium (Na) reacts with chlorine (Cl<sub>2</sub>&#8203;) to form sodium chloride (NaCl).</p><p>&#183; 2Na+Cl2&rarr;2Nacl</p><p><b>Decomposition Reaction :</b> A decomposition reaction occurs when a compound breaks down into simpler substances.</p><p><b>Example:</b> Calcium carbonate (CaCO<sub>3</sub>&#8203;) decomposes into calcium oxide and carbon dioxide.</p><p>&#183; CaCO3&#8203;&rarr;CaO+CO2&#8203; </p><p><b>Single Replacement Reaction:</b> A single replacement reaction occurs when an element displaces another in a compound.</p><p><b>Example:</b> Iron (Fe) displaces copper (Cu) from copper sulfate solution.</p><p>&#183; Fe+CuSO4&rarr;FeSO4+Cu</p><p><b>Double Replacement Reaction:</b> A double replacement reaction occurs when two compounds exchange their ions to form new compounds.</p><p><b>Example:</b> Barium chloride reacts with sodium sulfate to form barium sulfate (precipitate) and sodium chloride.</p><p>&#183; BaCl2+Na2SO4&rarr;BaSO4&#8595;+2NaCl</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Statements about chemical changes: </p><p>A. Rusting of iron is an example of a reversible chemical change. </p><p>B. Chemical reactions can produce new substances with different physical and chemical properties. </p><p>Which of the above statements is/are correct? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2325;&#2341;&#2344;:</p><p>A. &#2354;&#2379;&#2361;&#2375; &#2350;&#2375;&#2306; &#2332;&#2306;&#2327; &#2354;&#2327;&#2344;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2357;&#2352;&#2381;&#2340;&#2368; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;&#2404;</p><p>B. &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2349;&#2380;&#2340;&#2367;&#2325; &#2324;&#2352; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2327;&#2369;&#2339;&#2379;&#2306; &#2357;&#2366;&#2354;&#2375; &#2344;&#2319; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Both A &amp; B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Both A &amp; B are incorrect</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Rusting (iron + oxygen &rarr; iron oxide) is an <b>irreversible</b> chemical change. It cannot be easily converted back to pure iron without further chemical processing.</p><p>&#183; Chemical reactions involve breaking and forming bonds, leading to new substances (e.g., burning wood produces ash and gases, which are chemically different from the original wood). Hence Only <b>Statement B</b> is correct.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Regarding chemical reactions and energy: </p><p>A. All chemical reactions absorb energy from the surrounding environment. </p><p>B. Exothermic reactions release energy in the form of heat to the surroundings. </p><p>Which of the above statements is/are correct? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2324;&#2352; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;:</p><p>A. &#2360;&#2349;&#2368; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2306; &#2310;&#2360;&#2346;&#2366;&#2360; &#2325;&#2375; &#2357;&#2366;&#2340;&#2366;&#2357;&#2352;&#2339; &#2360;&#2375; &#2314;&#2352;&#2381;&#2332;&#2366; &#2309;&#2357;&#2358;&#2379;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>B. &#2314;&#2359;&#2381;&#2350;&#2366;&#2325;&#2381;&#2359;&#2375;&#2346;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2306; &#2310;&#2360;&#2346;&#2366;&#2360; &#2325;&#2375; &#2357;&#2366;&#2340;&#2366;&#2357;&#2352;&#2339; &#2350;&#2375;&#2306; &#2327;&#2352;&#2381;&#2350;&#2368; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2314;&#2352;&#2381;&#2332;&#2366; &#2350;&#2369;&#2325;&#2381;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Both A &amp; B are incorrect</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Both A &amp; B are incorrect</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Only <b>endothermic reactions</b> absorb energy. Many reactions (like combustion) <b>release</b> energy instead.</p><p>&#183; It is true that exothermic reactions release energy in the form of heat to the surroundings. Examples include burning fuel, respiration, and neutralization reactions, which all release heat.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>What distinguishes a chemical change from a physical change?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2379; &#2349;&#2380;&#2340;&#2367;&#2325; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2309;&#2354;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A physical change alters the appearance of a substance</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2380;&#2340;&#2367;&#2325; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2360;&#2375; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2366; &#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2348;&#2342;&#2354; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A chemical change transforms one molecular substance into another</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2319;&#2325; &#2310;&#2339;&#2357;&#2367;&#2325; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2379; &#2342;&#2370;&#2360;&#2352;&#2375; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A physical change always involves heat</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2380;&#2340;&#2367;&#2325; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2350;&#2375;&#2306; &#2361;&#2350;&#2375;&#2358;&#2366; &#2314;&#2359;&#2381;&#2350;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A chemical change only occurs in solids</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375;&#2357;&#2354; &#2336;&#2379;&#2360; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A chemical change involves the formation of new substances with different properties, while a physical change only alters the state or appearance without changing the molecular composition. </p><p>During a chemical change, the chemical identity of substances changes.</p><p>Chemical changes can occur in all states of matter - solids, liquids, and gases. Examples include combustion of gases, neutralization reactions in liquids, and rusting of solid iron.</p><p>Many physical changes alter appearance (like cutting paper or melting ice), but the key point is that the molecular identity remains unchanged in physical changes.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an example of a chemical reaction?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ice melting</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2352;&#2381;&#2347; &#2346;&#2367;&#2328;&#2354;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Water evaporating</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2357;&#2366;&#2359;&#2381;&#2346;&#2368;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Gasoline burning</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2360;&#2379;&#2354;&#2368;&#2344; &#2332;&#2354;&#2344;&#2366;</span>",
      "<span class=\"eqt\">A mountain being weathered</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2361;&#2366;&#2337;&#2364; &#2325;&#2366; &#2309;&#2346;&#2325;&#2381;&#2359;&#2351; &#2361;&#2379; &#2352;&#2361;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Burning gasoline is a chemical reaction (combustion), producing new substances (CO&#8322;, H&#8322;O). </p><p>This is a chemical reaction because when gasoline burns, it undergoes combustion - a chemical reaction where hydrocarbons in the gasoline combine with oxygen to produce new substances: carbon dioxide, water vapor, and heat energy. The chemical bonds in the original molecules are broken and new bonds are formed, creating entirely new substances with different properties.</p><p>The other options are physical changes or processes:</p><p>Ice melting is a physical change where water changes from solid to liquid state without changing its chemical composition.</p><p>Water evaporating is a physical change where water changes from liquid to gas state while remaining H&#8322;O.</p><p>A mountain being weathered primarily involves physical changes like erosion and fragmentation, though some aspects of weathering (like certain minerals reacting with acid rain) can involve chemical changes. However, as presented, this is mainly describing physical breakdown rather than chemical transformation.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>What must be true for a chemical equation to be balanced?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2381;&#2351;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">The total number of electrons must be the same</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;</span>",
      "<span class=\"eqt\">The same number and types of atoms must appear on both sides</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2340;&#2352;&#2347; &#2360;&#2350;&#2366;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2342;&#2367;&#2326;&#2366;&#2312; &#2342;&#2375;&#2344;&#2375; &#2330;&#2366;&#2361;&#2367;&#2319;</span>",
      "<span class=\"eqt\">The number of molecules must be identical</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2339;&#2369;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;</span>",
      "<span class=\"eqt\">The total mass must be zero</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2354; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2358;&#2370;&#2344;&#2381;&#2351; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The same number and types of atoms must appear on both side statement reflects the law of conservation of mass in chemical reactions - atoms cannot be created or destroyed in a chemical reaction, so each type of atom must be present in equal numbers on both sides of the equation. This ensures that all atoms are accounted for as reactants transform into products.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>What is the oxidation number of an element in its free state?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2340;&#2340;&#2381;&#2357; &#2325;&#2368; &#2350;&#2369;&#2325;&#2381;&#2340; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2321;&#2325;&#2381;&#2360;&#2368;&#2325;&#2352;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">+1</span><span class=\"hqt\" style=\"display:none\">+1</span>",
      "<span class=\"eqt\">-1</span><span class=\"hqt\" style=\"display:none\">-1</span>",
      "<span class=\"eqt\">Zero</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2370;&#2344;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Varies depending on the element</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2340;&#2381;&#2357; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>When an element exists in its free or uncombined state (not bonded to other elements), its oxidation number is always zero.</p><p>This applies to all elements, whether they exist as single atoms (like noble gases) or as molecules composed of the same element (like O&#8322;, N&#8322;, P&#8324;, S&#8328;, etc.).</p><p>For example:</p><p>&#183; Oxygen in O&#8322; has an oxidation number of 0</p><p>&#183; Sodium metal (Na) has an oxidation number of 0</p><p>&#183; Nitrogen in N&#8322; has an oxidation number of 0</p><p>&#183; Sulfur in S&#8328; has an oxidation number of 0</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the correct statement with respect to a chemical reaction.</p><p>I. When an element is oxidized in a redox reaction, it loses electrons.</p><p>II. This electron loss results in an decrease in the element's oxidation number. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2332;&#2348; &#2325;&#2379;&#2312; &#2340;&#2340;&#2381;&#2357; &#2352;&#2375;&#2337;&#2377;&#2325;&#2381;&#2360; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2321;&#2325;&#2381;&#2360;&#2368;&#2325;&#2371;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2326;&#2379; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2311;&#2360; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2361;&#2366;&#2344;&#2367; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2340;&#2340;&#2381;&#2357; &#2325;&#2368; &#2321;&#2325;&#2381;&#2360;&#2368;&#2325;&#2352;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368; &#2310;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Both are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2364;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>When an element is oxidized in a redox reaction, it loses electrons. This electron loss results in an increase in the element's oxidation number. </p><p>The term \"oxidation\" comes from reactions with oxygen (which tends to remove electrons from other elements), but it now refers more broadly to any reaction where an element loses electrons.</p><p>A helpful mnemonic to remember this is \"OIL RIG\": Oxidation Is Loss (of electrons), Reduction Is Gain (of electrons).</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>What determines whether a single-replacement reaction will occur?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2361; &#2325;&#2376;&#2360;&#2375; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2319;&#2325;&#2354; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2328;&#2335;&#2367;&#2340; &#2361;&#2379;&#2327;&#2368; &#2351;&#2366; &#2344;&#2361;&#2368;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">The color of the substances</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2366; &#2352;&#2306;&#2327;</span>",
      "<span class=\"eqt\">The temperature of the reaction</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2366; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">The activity series of metals</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2340;&#2369;&#2323;&#2306; &#2325;&#2368; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351;&#2340;&#2366; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366;</span>",
      "<span class=\"eqt\">The number of electrons in the outer shell</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2361;&#2352;&#2368; &#2310;&#2357;&#2352;&#2339; &#2350;&#2375;&#2306; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A more reactive metal (higher in the activity series) can displace a less reactive one. </p><p>In a single-replacement reaction (also called a single-displacement reaction), one element replaces another element in a compound. Whether this replacement occurs depends on the relative reactivity of the elements involved, which is organized in the activity series of metals.</p><p>A metal can only replace another metal from a compound if it is more reactive (higher in the activity series) than the metal being replaced. For example, zinc can replace copper in copper sulfate solution (Zn + CuSO&#8324; &rarr; ZnSO&#8324; + Cu) because zinc is more reactive than copper.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>What is activation energy in a chemical reaction?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351;&#2339; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The total energy of the products</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2314;&#2352;&#2381;&#2332;&#2366;</span>",
      "<span class=\"eqt\">The energy required to start a reaction</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2314;&#2352;&#2381;&#2332;&#2366;</span>",
      "<span class=\"eqt\">The heat generated during a reaction</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2314;&#2359;&#2381;&#2350;&#2366;</span>",
      "<span class=\"eqt\">The energy of the reactants</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2349;&#2367;&#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2325;&#2368; &#2314;&#2352;&#2381;&#2332;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Activation energy is the minimum energy needed to initiate a reaction (e.g., striking a match). </p><p>It can be thought of as an energy barrier that must be overcome for reactants to be converted into products.</p><p>When molecules collide, they need sufficient energy to break existing bonds so that new bonds can form. This initial energy requirement is the activation energy (often denoted as Ea).</p><p>Catalysts work by providing an alternative reaction pathway with a lower activation energy, which is why they increase reaction rates without being consumed in the process.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>What does the term \"reduced\" mean in a chemical reaction?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; \"&#2309;&#2346;&#2330;&#2351;&#2367;&#2340;\" &#2358;&#2348;&#2381;&#2342; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Increasing oxidation number</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2338;&#2364;&#2340;&#2368; &#2321;&#2325;&#2381;&#2360;&#2368;&#2325;&#2352;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Decreasing number of atoms</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2368; &#2328;&#2335;&#2340;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Gaining electrons</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Losing mass</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2326;&#2379;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>When a substance is reduced, it gains electrons, which typically results in a decrease in its oxidation number.</p><p>Reduction always occurs alongside oxidation in what we call redox reactions. When one substance is oxidized (loses electrons), another substance must be reduced (gains those electrons).</p><p>For example, in the reaction between zinc and copper ions: </p><p>Zn(s) + Cu&#178;&#8314;(aq) &rarr; Zn&#178;&#8314;(aq) + Cu(s)</p><p>The zinc atoms lose electrons (are oxidized) while the copper ions gain electrons (are reduced).</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>In an exothermic reaction, what happens to heat?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2314;&#2359;&#2381;&#2350;&#2366;&#2325;&#2381;&#2359;&#2375;&#2346;&#2368; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Heat is absorbed</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2359;&#2381;&#2350;&#2366; &#2309;&#2357;&#2358;&#2379;&#2359;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Heat is generated</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2352;&#2381;&#2350;&#2368; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Temperature remains constant</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2360;&#2381;&#2341;&#2367;&#2352; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Heat is neutralized</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2352;&#2381;&#2350;&#2368; &#2348;&#2375;&#2309;&#2360;&#2352; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Exothermic reactions release heat (e.g., combustion). </p><p>In exothermic reactions, energy is released from the chemical system to the surroundings in the form of heat. This occurs because the energy of the products is lower than the energy of the reactants, and this energy difference is released as thermal energy.</p><p>Common examples of exothermic reactions include:</p><p>&#183; Combustion reactions (burning fuels)</p><p>&#183; Neutralization reactions between acids and bases</p><p>&#183; Many oxidation reactions</p><p>&#183; Formation of chemical bonds</p><p>This is in contrast to endothermic reactions, which absorb heat from the surroundings.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>What typically happens when metal carbonates are heated?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2343;&#2366;&#2340;&#2369; &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2344;&#2375;&#2335; &#2325;&#2379; &#2327;&#2352;&#2381;&#2350; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">They become more reactive</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2309;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2358;&#2368;&#2354; &#2361;&#2379; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">They decompose to metal oxide and carbon dioxide</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2343;&#2366;&#2340;&#2369; &#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2350;&#2375;&#2306; &#2357;&#2367;&#2328;&#2335;&#2367;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">They increase in mass</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">They change color</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2352;&#2306;&#2327; &#2348;&#2342;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>When metal carbonates are heated, they typically undergo thermal decomposition, breaking down into a metal oxide and carbon dioxide gas. </p><p>For example, calcium carbonate (CaCO&#8323;) decomposes to form calcium oxide (CaO) and carbon dioxide (CO&#8322;).</p><p>Thermal decomposition: CaCO&#8323; &rarr; CaO + CO&#8322;. </p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>In a single-replacement reaction, what general rule applies?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325;&#2354; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2344;&#2367;&#2351;&#2350; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Metals replace non-metals</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2340;&#2369;&#2319;&#2306; &#2309;&#2343;&#2366;&#2340;&#2369;&#2323;&#2306; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2354;&#2375;&#2340;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Metals replace metals, non-metals replace non-metals</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2340;&#2369;&#2319;&#2306; &#2343;&#2366;&#2340;&#2369;&#2323;&#2306; &#2325;&#2368; &#2332;&#2327;&#2361; &#2354;&#2375;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2309;&#2343;&#2366;&#2340;&#2369;&#2319;&#2306; &#2309;&#2343;&#2366;&#2340;&#2369;&#2323;&#2306; &#2325;&#2368; &#2332;&#2327;&#2361; &#2354;&#2375;&#2340;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only gases can replace solids</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2327;&#2376;&#2360;&#2375;&#2306; &#2361;&#2368; &#2336;&#2379;&#2360; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2354;&#2375; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Reactions only occur at high temperatures</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2325;&#2375;&#2357;&#2354; &#2313;&#2330;&#2381;&#2330; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2346;&#2352; &#2361;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Active metals replace less active metals, and halogens follow a similar trend. </p><p>Metals typically replace metals, and non-metals replace non-metals. </p><p>For example, in the reaction of zinc with hydrochloric acid, zinc (a metal) replaces hydrogen (a non-metal) in the compound, forming zinc chloride and hydrogen gas.</p>",
    "question_index": 19
  }
];
