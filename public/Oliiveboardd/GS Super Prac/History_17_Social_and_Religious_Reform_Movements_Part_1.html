  {
    "question": "<span class=\"eqt\"><p>For the political education of the people at the local level, who brought the resolution on local self-government?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2360;&#2381;&#2357;&#2358;&#2366;&#2360;&#2344; &#2346;&#2352; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2325;&#2367;&#2360;&#2344;&#2375; &#2354;&#2366;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lord Ripon</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2352;&#2367;&#2346;&#2344;</span>",
      "<span class=\"eqt\">Lord Mayo</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2350;&#2375;&#2351;&#2379;</span>",

    ],
    "correct_option_id": 0,
    "solution": "<p><b>Lord Ripon</b> introduced the resolution on local self-government, also known as the Ripon Resolution, during his tenure as the Viceroy of India from 1880 to 1884. This resolution aimed to empower local bodies and promote political education among the people at the grassroots level, laying the foundation for decentralized governance in British India.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Who founded the Arya Samaj in Mumbai in 1875?</p></span><span class=\"hqt\" style=\"display:none\">1875 &#2350;&#2375;&#2306; &#2350;&#2369;&#2306;&#2348;&#2312; &#2350;&#2375;&#2306; &#2310;&#2352;&#2381;&#2351; &#2360;&#2350;&#2366;&#2332; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2368;?</span>",

    "correct_option_id": 0,

    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following founded the Atmiya Sabha in 1814?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2344;&#2375; 1814 &#2350;&#2375;&#2306; &#2310;&#2340;&#2381;&#2350;&#2368;&#2351; &#2360;&#2349;&#2366; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;?</span>",
    "options": [

    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Guru Ghasidas led which of the following movements to improve the social condition of leather workers in British India?</p></span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2369; &#2328;&#2366;&#2360;&#2368;&#2342;&#2366;&#2360; &#2344;&#2375; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2330;&#2350;&#2337;&#2364;&#2366; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2366; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2325;&#2367;&#2351;&#2366;?</span>",

    "correct_option_id": 3,
    "solution": "<p>Guru Ghasidas, a social reformer from Chhattisgarh, founded the Satnami Movement in the early 19th century. The movement aimed at uplifting marginalized communities, including leather workers, and advocated against caste-based discrimination.</p>",

  {
    "question": "<span class=\"eqt\"><p>The Paramhans Mandali was founded in 1840 atto work for the abolition of caste.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2352;&#2350;&#2361;&#2306;&#2360; &#2350;&#2306;&#2337;&#2354;&#2368; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; 1840 &#2350;&#2375;&#2306; _____ &#2350;&#2375;&#2306; &#2332;&#2366;&#2340;&#2367; &#2325;&#2375; &#2313;&#2344;&#2381;&#2350;&#2370;&#2354;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2366;&#2350; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p></span>",

    "correct_option_id": 2,
    "solution": "<p>The objective behind the formation of the Paramhans Mandali was the abolition of the caste system. It was formed in the erstwhile city of <b>Bombay</b> in 1840.</p><p>Samaj in Bombay was the Paramahamsa Sabha, a secret society formed in 1849 for discussion, the singing of hymns, and the sharing of a communal meal prepared by a low-caste cook. In 1864 Keshab Chunder Sen, founder of the BharatvarshiyaBrahmoSamaj, visited Bombay, and the interest he evoked there..</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Where was the Hindu college established in the year 1791 to teach ancient Sanskrit texts?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340; &#2327;&#2381;&#2352;&#2306;&#2341;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2352;&#2381;&#2359; 1791 &#2350;&#2375;&#2306; &#2361;&#2367;&#2306;&#2342;&#2370; &#2325;&#2377;&#2354;&#2375;&#2332; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2361;&#2366;&#2306; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Madras</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2342;&#2381;&#2352;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Calcutta</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2354;&#2325;&#2340;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Banaras</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2344;&#2366;&#2352;&#2360;</span>",
      "<span class=\"eqt\">Agra</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2327;&#2352;&#2366;</span>"

    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Hindu College 1791:</b> Established in <b>Banaras</b> (Varanasi) by Jonathan Duncan, a British administrator, as the <b>Banaras Sanskrit College</b> to preserve and teach ancient Sanskrit texts, including Vedas and Puranas.</p><p>&#183; <b>Historical Context:</b> The college aimed to bridge British governance with Indian traditions, training scholars in Hindu scriptures and law.</p><p><b>Further Insights:</b></p><p>&#183; <b>Evolution:</b> Now part of Sampurnanand Sanskrit University, the college remains a center for Sanskrit studies.</p><p>&#183; <b>Cultural Impact:</b> It preserved India's classical knowledge during colonial rule, influencing later educational reforms.</p><p>&#183; <b>Contrast:</b> The term \"Hindu College\" also refers to a later institution in Calcutta (1817), but the 1791 Banaras college is distinct for its Sanskrit focus.</p>",

  },
  {

    "solution": "<p>&#183; <b>Brahmo Samaj</b> - Founded by <b>Raja Ram Mohan Roy</b> in 1828.</p><p>&#183; <b>Ramakrishna Mission</b> - Founded by <b>Swami Vivekananda</b> in 1897.</p><p>&#183; <b>Prarthana Samaj</b> - Founded by <b>Atmaram Pandurang</b> in 1867.</p><p>&#183; <b>Arya Samaj</b> - Founded by <b>Dayananda Saraswati</b> in 1875.</p>",

  {

    "question": "<span class=\"eqt\"><p>Due to the efforts of whom among the following social reformers was the first Hindu Widow Remarriage Act introduced and passed in 1856?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2375; &#2360;&#2350;&#2366;&#2332; &#2360;&#2369;&#2343;&#2366;&#2352;&#2325;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360;&#2379;&#2306; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; 1856 &#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2366; &#2361;&#2367;&#2306;&#2342;&#2370; &#2357;&#2367;&#2343;&#2357;&#2366; &#2346;&#2369;&#2344;&#2352;&#2381;&#2357;&#2367;&#2357;&#2366;&#2361; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2346;&#2375;&#2358; &#2324;&#2352; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [

      "<span class=\"eqt\">Ishwar Chandra Vidyasagar</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2358;&#2381;&#2357;&#2352; &#2330;&#2306;&#2342;&#2381;&#2352; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2360;&#2366;&#2327;&#2352;</span>",
      "<span class=\"eqt\">Raja Ram Mohan Roy</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2366; &#2352;&#2366;&#2350; &#2350;&#2379;&#2361;&#2344; &#2352;&#2366;&#2351;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#8226; The Hindu Widow Remarriage Act of 1856 was introduced largely due to the efforts of Ishwar Chandra Vidyasagar, a prominent social reformer and educator.</p><p>&#8226; He strongly advocated for women's rights and worked to change traditional Hindu laws that forbade widow remarriage.</p><p>&#8226; His efforts led to the British Government passing the Act legalizing widow remarriage in India.</p><p><b>Other Options:</b></p><p>&#183; <b>Radhakant Deb</b>: Opposed widow remarriage; conservative leader.</p><p>&#183; <b>Atmaram Pandurang</b>: Social reformer from Maharashtra.</p><p>&#183; <b>Raja Ram Mohan Roy</b>: Known for abolition of <b>Sati</b>, not widow remarriage specifically.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>The Act that is also known as 'Morley-Minto Reforms 'is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2332;&#2367;&#2360;&#2375; '&#2350;&#2377;&#2352;&#2381;&#2354;&#2375;-&#2350;&#2367;&#2306;&#2335;&#2379; &#2352;&#2367;&#2347;&#2377;&#2352;&#2381;&#2350;&#2381;&#2360;' &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Government of India Act, 1935</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2358;&#2366;&#2360;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1935</span>",
      "<span class=\"eqt\">Indian Councils Act, 1909</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2352;&#2367;&#2359;&#2342;&#2381; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1909</span>",
      "<span class=\"eqt\">Rowlatt Act, 1919</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2379;&#2354;&#2375;&#2335; &#2319;&#2325;&#2381;&#2335;, 1919</span>",
      "<span class=\"eqt\">Government of India Act, 1912</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1912</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The British Parliament passed the Morley-Minto Reforms in order to increase the representation of Indians in the administration of British India. In addition to updating the Indian Councils Acts of 1861 and 1892, the Indian Councils Act of 1909 also introduced the idea of a separate electorate.</p><p>The <b><u>Morley-Minto Reforms</u></b>, sometimes referred to as the Indian Councils Act (1909), was created by John Morley, the secretary of state for India from 1905 to 1910.</p>",
    "question_index": 13
  },

      "<span class=\"eqt\">Bombay Presidency</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2377;&#2350;&#2381;&#2348;&#2375; &#2346;&#2381;&#2352;&#2375;&#2360;&#2368;&#2337;&#2375;&#2306;&#2360;&#2368;</span>",

    "correct_option_id": 2,
    "solution": "<p>The Satyashodhak Samaj was established by Mahatma Jotirao Phule in 1873 at <b>Bombay Presidency</b>. The members of Phule's organisation were called 'satyashodhaks' or truth-seekers. The Satyashodhak movement in the next few decades revolutionised modern Maharashtra by offering a systemic critique of the caste system.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Jyotiba Phule belonged from which state?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2381;&#2351;&#2379;&#2340;&#2367;&#2348;&#2366; &#2347;&#2369;&#2354;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2375; &#2341;&#2375;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p><i>Jyotiba Phule</i> was a prominent social reformer and educationist from <b>Maharashtra</b>, who worked for women's and Dalit rights.</p><p>&#183; <b>Contributions:</b> Advocated for women's education, caste equality, and Dalit rights. Founded the Satyashodhak Samaj (1873) to challenge Brahminical dominance.</p><p>&#183; <b>Other Options:</b> Tamil Nadu, Gujarat, and Karnataka had their own reformers (e.g., Periyar, Dayanand Saraswati), but Phule was Maharashtrian.</p><p><b>Further Insights:</b></p><p>&#183; <b>Legacy:</b> Phule's work laid the foundation for India's social justice movements. He and his wife, Savitribai, pioneered girls' education in India.</p><p>&#183; <b>Satyashodhak Samaj:</b> Promoted rationalism and equality, influencing leaders like Dr. B.R. Ambedkar.</p><p>&#183; <b>Recognition:</b> Phule is celebrated through awards, statues, and institutions like the Mahatma Phule Krishi Vidyapeeth in Maharashtra.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Which Governor-General of British India helped Raja Ram Mohan Roy legally abolish the sati practice?</p></span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2325;&#2367;&#2360; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352; &#2332;&#2344;&#2352;&#2354; &#2344;&#2375; &#2352;&#2366;&#2332;&#2366; &#2352;&#2366;&#2350; &#2350;&#2379;&#2361;&#2344; &#2352;&#2366;&#2351; &#2325;&#2379; &#2360;&#2340;&#2368; &#2346;&#2381;&#2352;&#2341;&#2366; &#2325;&#2379; &#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2368;?</span>",
    "options": [

      "<span class=\"eqt\">Lord Cornwallis</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2377;&#2352;&#2381;&#2344;&#2357;&#2366;&#2354;&#2367;&#2360;</span>",
      "<span class=\"eqt\">Lord William Bentinck</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2357;&#2367;&#2354;&#2367;&#2351;&#2350; &#2348;&#2375;&#2306;&#2335;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Lord William Bentinck</b> served as the Governor-General of India from 1828 to 1835. He played a crucial role in the abolition of the <b>sati</b> (or <b>suttee</b>) practice, which involved the self-immolation of widows. Under his administration, and with the efforts of social reformers like <b>Raja Ram Mohan Roy</b>, the practice was officially banned in 1829 through the <b>Regulation XVII</b> of 1829, making it illegal and punishable by law.</p>",
    "question_index": 16
  },
  {
