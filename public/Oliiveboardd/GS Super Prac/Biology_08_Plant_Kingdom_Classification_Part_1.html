    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The numerical taxonomy of plants is based on which of the following?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2357;&#2352;&#2381;&#2327;&#2367;&#2325;&#2368; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">All observable characteristics</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2339;&#2368;&#2351; &#2309;&#2349;&#2367;&#2354;&#2325;&#2381;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Chemical constituents</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2328;&#2335;&#2325;</span>",
      "<span class=\"eqt\">Structure</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2352;&#2330;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Chromosome number</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2339;&#2360;&#2370;&#2340;&#2381;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Numerical Taxonomy is the technique of classifying organisms using numerical methods. This method firmly clarifies as well as displays the degree of link among the species. Organisms are classified into taxa according to their similarities and differences. Numerical Taxonomy is at present a very essential part of current systematics. Numerical Taxonomy is also known as Taximetrics; however, presently it is more commonly referred to as Phenetics. It is the Numerical evaluation of the similarities or affinities of taxonomic units, which are typically classified into taxa based on their affinities.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is related to neem?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2344;&#2368;&#2350; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Tendril</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2364;&#2369;&#2354;&#2381;&#2347;&#2364;</span>",
      "<span class=\"eqt\">Palmately</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2341;&#2375;&#2354;&#2368; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Pinnately</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2325;&#2381;&#2359;&#2357;&#2340;&#2381;</span>",
      "<span class=\"eqt\">Spines</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Neem leaves are pinnately compound, meaning they have multiple leaflets arranged along both sides of a central stalk (rachis). This arrangement is common in plants like neem, rose, and tamarind.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which among the following are called the amphibians of the plant kingdom?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2357;&#2344;&#2360;&#2381;&#2346;&#2340;&#2367; &#2332;&#2327;&#2340; &#2325;&#2366; &#2332;&#2354;&#2360;&#2381;&#2341;&#2354;&#2330;&#2352; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pteridophytes</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2376;&#2352;&#2367;&#2337;&#2379;&#2347;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">Gymnosperms</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2367;&#2350;&#2381;&#2344;&#2379;&#2360;&#2381;&#2346;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Bryophytes</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2366;&#2351;&#2379;&#2347;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">Liverworts</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2367;&#2357;&#2352;&#2357;&#2352;&#2381;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Bryophytes</b> are called the amphibians of the plant kingdom. Which include ferns and their relatives, share characteristics that enable them to adapt to both aquatic and terrestrial environments, much like amphibians in the animal kingdom.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a component of a flower?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2347;&#2370;&#2354; &#2325;&#2366; &#2328;&#2335;&#2325; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Androecium</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2350;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Corolla</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2352;&#2379;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Spines</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Calyx</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2376;&#2325;&#2381;&#2360;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A flower consists of four main parts - Calyx (sepals), Corolla (petals), Androecium (male reproductive part), and Gynoecium (female reproductive part). Spines are modified leaves or stem structures found in some plants for defense but are not a floral component.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>______ Plants that do not have well-differentiated body design fall in this group. The plants in this group are commonly called algae. These plants are predominantly aquatic.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2380;&#2343;&#2375; &#2332;&#2367;&#2344;&#2325;&#2375; &#2358;&#2352;&#2368;&#2352; &#2325;&#2368; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2309;&#2330;&#2381;&#2331;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2357;&#2367;&#2349;&#2375;&#2342;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2357;&#2375; ____ &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2310;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2311;&#2360; &#2360;&#2350;&#2370;&#2361; &#2325;&#2375; &#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2379; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2358;&#2376;&#2357;&#2366;&#2354; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2375; &#2346;&#2380;&#2343;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2332;&#2354;&#2368;&#2351; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Bryophyta</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2366;&#2351;&#2379;&#2347;&#2366;&#2311;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Angiosperms</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2357;&#2371;&#2340;&#2348;&#2368;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Thallophyta</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2376;&#2354;&#2379;&#2347;&#2366;&#2311;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Pteridophyta</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2352;&#2367;&#2337;&#2379;&#2347;&#2366;&#2311;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Thallophyta consists of plants that do not have a well-differentiated body structure. The plants in this group are commonly called algae. These plants are predominantly aquatic.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT related to reticulate venation?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2332;&#2366;&#2354;&#2368;&#2342;&#2366;&#2352; &#2358;&#2367;&#2352;&#2366;&#2357;&#2367;&#2344;&#2381;&#2351;&#2366;&#2360; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">China rose</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2368;&#2344; &#2327;&#2369;&#2354;&#2366;&#2348;</span>",
      "<span class=\"eqt\">Tulsi</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2369;&#2354;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Maize</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2325;&#2381;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Coriander</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2344;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Venation refers to the pattern of veins in leaves:</p><p>&bull; Reticulate venation (net-like structure) is found in dicots (e.g., China rose, Tulsi, Coriander).</p><p>&bull; Parallel venation (parallel veins) is found in monocots (e.g., Maize, Grass, Banana).</p><p>Thus, Maize does not have reticulate venation.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Who explained the structure and reproductive system of algae in 1935?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2352;&#2381;&#2359; 1935 &#2350;&#2375;&#2306; &#2358;&#2376;&#2357;&#2366;&#2354; &#2325;&#2368; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2319;&#2357;&#2306; &#2346;&#2381;&#2352;&#2332;&#2344;&#2344; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">MOP Iyengar</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;.&#2323;.&#2346;&#2368;. &#2309;&#2351;&#2306;&#2327;&#2352;</span>",
      "<span class=\"eqt\">FE Fritsch</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2347;.&#2312;. &#2347;&#2381;&#2352;&#2367;&#2335;&#2381;&#2358;</span>",
      "<span class=\"eqt\">William Henry</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2354;&#2367;&#2351;&#2350; &#2361;&#2375;&#2344;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Carolus Linnaeus</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2352;&#2379;&#2354;&#2360; &#2354;&#2368;&#2344;&#2367;&#2351;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>F.E. Fritsch (1935, 1945) in his book \"The Structure and Reproduction of the Algae\" proposed a system of classification of algae. He treated algae giving rank of division and divided it into 11 classes. His classification of algae is mainly based upon characters of pigments, flagella and reserve food material.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>One of the _____, the giant redwood tree Sequoia is one of the tallest tree species.</p></span><span class=\"hqt\" style=\"display:none\"><p>_____ &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325;, &#2357;&#2367;&#2358;&#2366;&#2354; &#2352;&#2375;&#2337;&#2357;&#2369;&#2337; &#2357;&#2371;&#2325;&#2381;&#2359; &#2360;&#2367;&#2325;&#2379;&#2311;&#2351;&#2366; &#2360;&#2348;&#2360;&#2375; &#2314;&#2305;&#2330;&#2375; &#2357;&#2371;&#2325;&#2381;&#2359; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">mosses</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2377;&#2360;</span>",
      "<span class=\"eqt\">pteridophytes</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2352;&#2367;&#2337;&#2379;&#2347;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">liverworts</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2367;&#2357;&#2352;&#2357;&#2352;&#2381;&#2335;</span>",
      "<span class=\"eqt\">gymnosperms</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2366;&#2357;&#2371;&#2340;&#2348;&#2368;&#2332;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The giant redwood, scientifically known as Sequoia, holds the title for the world's tallest tree among <b>gymnosperms</b>.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>In respect of classification of algae, the members of Phaeophyceae are commonly called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2376;&#2357;&#2366;&#2354; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;, &#2347;&#2364;&#2367;&#2351;&#2379;&#2347;&#2364;&#2366;&#2311;&#2360;&#2368; &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; _____ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">red algae</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2354; &#2358;&#2376;&#2357;&#2366;&#2354;</span>",
      "<span class=\"eqt\">white algae</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2357;&#2354;/&#2360;&#2398;&#2375;&#2342; &#2358;&#2376;&#2357;&#2366;&#2354;</span>",
      "<span class=\"eqt\">green algae</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2367;&#2340; &#2358;&#2376;&#2357;&#2366;&#2354;</span>",
      "<span class=\"eqt\">brown algae</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2352;&#2366; &#2358;&#2376;&#2357;&#2366;&#2354;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In the classification of algae, the members of Phaeophyceae are commonly called <b>\"brown algae.\"</b> Brown algae are a group of photosynthetic organisms found primarily in marine environments. They are characterized by their brown color, Brown algae can vary in size from small filamentous forms to large and complex seaweeds.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements best defines monoecious?</p><p><b>Options:</b></p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2319;&#2325;&#2354;&#2367;&#2306;&#2327;&#2368; &#2325;&#2379; &#2360;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2350; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p><p><b>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</b></span>",
    "options": [
      "<span class=\"eqt\">A flower with both androecium and gynoecium</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2347;&#2370;&#2354; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2346;&#2369;&#2306;&#2325;&#2375;&#2360;&#2352; &#2324;&#2352; &#2332;&#2366;&#2351;&#2366;&#2306;&#2327; &#2342;&#2379;&#2344;&#2379;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
