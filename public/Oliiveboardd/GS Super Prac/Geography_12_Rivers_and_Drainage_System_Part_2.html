<body>
    <!-- Welcome Screen -->

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following rivers originates from Amarkantak plateau?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2344;&#2342;&#2368; &#2309;&#2350;&#2352;&#2325;&#2306;&#2335;&#2325; &#2346;&#2336;&#2366;&#2352; &#2360;&#2375; &#2344;&#2367;&#2325;&#2354;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Godavari</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Narmada</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2381;&#2350;&#2342;&#2366;</span>",
      "<span class=\"eqt\">Krishna</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2381;&#2339;</span>",
      "<span class=\"eqt\">Mahanadi</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2344;&#2342;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>Narmada</b> river originates from Amarkantak plateau in Madhya Pradesh. It is one of the major west-flowing rivers of the Indian peninsula and flows through a rift valley between the Vindhya and Satpura ranges.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The Wular Lake, one of the largest freshwater lakes in Asia, is located in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2369;&#2354;&#2352; &#2333;&#2368;&#2354;, &#2319;&#2358;&#2367;&#2351;&#2366; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2350;&#2368;&#2336;&#2375; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2333;&#2368;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325;, &#2325;&#2361;&#2366;&#2305; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Himachal Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2350;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Uttarakhand</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2326;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Jammu and Kashmir</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2350;&#2381;&#2350;&#2370; &#2324;&#2352; &#2325;&#2358;&#2381;&#2350;&#2368;&#2352;</span>",
      "<span class=\"eqt\">Sikkim</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2325;&#2381;&#2325;&#2367;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Wular Lake</b> is located in Jammu and Kashmir's Bandipora district. It is one of the largest freshwater lakes in Asia and was designated as a Ramsar Site (Wetland of International Importance) in 1990.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is the longest river of India that flows entirely within the country?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2354;&#2306;&#2348;&#2368; &#2344;&#2342;&#2368; &#2361;&#2376; &#2332;&#2379; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2342;&#2375;&#2358; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2348;&#2361;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Godavari</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Krishna</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2381;&#2339;</span>",
      "<span class=\"eqt\">Narmada</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2381;&#2350;&#2342;&#2366;</span>",
      "<span class=\"eqt\">Yamuna</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2350;&#2369;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The <b>Godavari</b> is the longest river (1,465 km) that flows entirely within India. It originates at Trimbakeshwar in Maharashtra and flows eastward across the Deccan Plateau before emptying into the Bay of Bengal.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The Brahmaputra river is known by which name in Tibet?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2367;&#2348;&#2381;&#2348;&#2340; &#2350;&#2375;&#2306; &#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2346;&#2369;&#2340;&#2381;&#2352; &#2344;&#2342;&#2368; &#2325;&#2379; &#2325;&#2367;&#2360; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tsangpo</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2360;&#2306;&#2327;&#2381;&#2346;&#2379;</span>",
      "<span class=\"eqt\">Dihang</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2361;&#2366;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Jamuna</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2350;&#2369;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Padma</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2342;&#2381;&#2350;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In Tibet, the Brahmaputra river is known as <b>Tsangpo</b> (or Yarlung Tsangpo). When it enters India in Arunachal Pradesh, it is called Dihang or Siang, and later becomes known as the Brahmaputra in Assam. In Bangladesh, it is called the Jamuna.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a tributary of the Ganga river?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2327;&#2306;&#2327;&#2366; &#2344;&#2342;&#2368; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Son</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Yamuna</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2350;&#2369;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Tapi</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2346;&#2368;</span>",
      "<span class=\"eqt\">Gomti</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2350;&#2340;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Tapi</b> is not a tributary of the Ganga river. It is an independent river that flows westward and drains into the Arabian Sea. The Son, Yamuna, and Gomti are all tributaries of the Ganga river system.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following lakes with their states:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I (Lakes)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II (States)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Chilika Lake</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Rajasthan</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Pulicat Lake</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Odisha</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Sambhar Lake</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Tamil Nadu &amp; Andhra Pradesh</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Loktak Lake</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Manipur</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2333;&#2368;&#2354;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; I (&#2333;&#2368;&#2354;&#2375;&#2306;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; II (&#2352;&#2366;&#2332;&#2381;&#2351;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2330;&#2367;&#2354;&#2381;&#2325;&#2366; &#2333;&#2368;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2346;&#2369;&#2354;&#2367;&#2325;&#2335; &#2333;&#2368;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2323;&#2337;&#2367;&#2358;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2360;&#2366;&#2306;&#2349;&#2352; &#2333;&#2368;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2324;&#2352; &#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2354;&#2379;&#2325;&#2340;&#2325; &#2333;&#2368;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2350;&#2339;&#2367;&#2346;&#2369;&#2352;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-b, ii-c, iii-a, iv-d</span><span class=\"hqt\" style=\"display:none\">i-b, ii-c, iii-a, iv-d</span>",
      "<span class=\"eqt\">i-c, ii-b, iii-d, iv-a</span><span class=\"hqt\" style=\"display:none\">i-c, ii-b, iii-d, iv-a</span>",
      "<span class=\"eqt\">i-d, ii-a, iii-c, iv-b</span><span class=\"hqt\" style=\"display:none\">i-d, ii-a, iii-c, iv-b</span>",
      "<span class=\"eqt\">i-a, ii-d, iii-b, iv-c</span><span class=\"hqt\" style=\"display:none\">i-a, ii-d, iii-b, iv-c</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct matching is:</p><p>Chilika Lake - Odisha (largest coastal lagoon in India)</p><p>Pulicat Lake - Tamil Nadu &amp; Andhra Pradesh (second largest brackish water lagoon)</p><p>Sambhar Lake - Rajasthan (largest inland salt lake)</p><p>Loktak Lake - Manipur (largest freshwater lake in Northeast India)</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The Indus Water Treaty was signed between India and Pakistan in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2324;&#2352; &#2346;&#2366;&#2325;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2367;&#2306;&#2343;&#2369; &#2332;&#2354; &#2360;&#2306;&#2343;&#2367; &#2346;&#2352; &#2361;&#2360;&#2381;&#2340;&#2366;&#2325;&#2381;&#2359;&#2352; &#2325;&#2348; &#2361;&#2369;&#2319; &#2341;&#2375;:</p></span>",
    "options": [
      "<span class=\"eqt\">1960</span><span class=\"hqt\" style=\"display:none\">1960</span>",
      "<span class=\"eqt\">1965</span><span class=\"hqt\" style=\"display:none\">1965</span>",
      "<span class=\"eqt\">1972</span><span class=\"hqt\" style=\"display:none\">1972</span>",
      "<span class=\"eqt\">1948</span><span class=\"hqt\" style=\"display:none\">1948</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Indus Water Treaty was signed between India and Pakistan in <b>1960</b>. The treaty was brokered by the World Bank and allocates the waters of the Indus river system between the two countries.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Select the correct option about the Sundarbans Delta.</p><p>Statement A: It is formed primarily by the confluence of the Ganga and Yamuna rivers.</p><p>Statement B: It is the world's largest mangrove forest and a UNESCO World Heritage</p><p>Site.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2369;&#2306;&#2342;&#2352;&#2357;&#2344; &#2337;&#2375;&#2354;&#2381;&#2335;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; A: &#2351;&#2361; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2327;&#2306;&#2327;&#2366; &#2324;&#2352; &#2351;&#2350;&#2369;&#2344;&#2366; &#2344;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2327;&#2350; &#2360;&#2375; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; B: &#2351;&#2361; &#2342;&#2369;&#2344;&#2367;&#2351;&#2366; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2350;&#2376;&#2306;&#2327;&#2381;&#2352;&#2379;&#2357; &#2357;&#2344; &#2324;&#2352; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2325;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357; &#2343;&#2352;&#2379;&#2361;&#2352; &#2360;&#2381;&#2341;&#2354; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; B: &#2351;&#2361; &#2342;&#2369;&#2344;&#2367;&#2351;&#2366; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2350;&#2376;&#2306;&#2327;&#2381;&#2352;&#2379;&#2357; &#2357;&#2344; &#2324;&#2352; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2325;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357; &#2343;&#2352;&#2379;&#2361;&#2352; &#2360;&#2381;&#2341;&#2354; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only statement B is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; B &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both statements A and B are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Both statements A and B are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only statement A is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; A &#2360;&#2361;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Only statement B is correct. The Sundarbans Delta is indeed the world's largest</p><p>mangrove forest and was designated as a UNESCO World Heritage Site in 1987.</p><p>However, statement A is incorrect because the Sundarbans Delta is formed primarily</p><p>by the confluence of the Ganga, Brahmaputra, and Meghna rivers, not the Ganga and</p><p>Yamuna. The Yamuna is actually a tributary of the Ganga and joins it much further</p><p>upstream at Allahabad (Prayagraj).</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The Bhakra Nangal Dam is built on which river?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2326;&#2337;&#2364;&#2366; &#2344;&#2366;&#2306;&#2327;&#2354; &#2348;&#2366;&#2306;&#2343; &#2325;&#2367;&#2360; &#2344;&#2342;&#2368; &#2346;&#2352; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
