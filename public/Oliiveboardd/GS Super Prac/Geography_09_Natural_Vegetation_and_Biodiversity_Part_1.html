<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Which of the following is the most dominant species of the Tropical Deciduous Forests?</p>",
    "options": [
      "Mulberry",
      "Rubber",
      "Coconut",
      "Teak"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; &#8203;The most dominant species of the Tropical Deciduous Forests is Teak (Tectona grandis).</p><p>&bull; These forests, also known as monsoon forests, are characterized by trees that shed their leaves during the dry season to conserve water. </p><p>&bull; Teak is highly valued for its durable and water-resistant wood, making it a significant species in these forests.</p>",
    "question_index": 0
  },
  {
    "question": "<p>The Mangrove Forests represent an ecotone between:</p>",
    "options": [
      "Marine and Terrestrial ecosystem",
      "desert and forest",
      "saltwater and freshwater",
      "Marine and forest"
    ],
    "correct_option_id": 0,
    "solution": "<p>The <b>Mangrove Forests represent an ecotone between Marine and Terrestrial ecosystem.</b></p><p>The Grasslands represent an ecotone between desert and forest.</p><p>The Estuaries represent an ecotone between saltwater and freshwater.</p>",
    "question_index": 1
  },
  {
    "question": "<p>A process like river bifurcation can create valuable landforms for the environment, providing growth of vegetation. An example of such landform is _____.</p>",
    "options": [
      "river deltas",
      "potholes",
      "V-shaped valleys",
      "cascades"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>River deltas</b> are formed when a river bifurcates or splits into several branches as it flows into a larger body of water, like an ocean or a lake.</p><p>&#183; This bifurcation creates <b>fertile land</b> in the form of a delta, which is rich in nutrients due to the deposition of sediments.</p><p>&#183; Deltas provide an ideal environment for the growth of <b>vegetation</b>, supporting diverse ecosystems.</p><p>&#183; Examples include the Ganges-Brahmaputra Delta and the Nile Delta.</p><p><b>Further Insight:</b></p><p>&#183; Potholes  -  Small, circular depressions formed by the erosion caused by water, not typically a landform that supports vegetation.</p><p>&#183; V-shaped valleys  -  Formed by river erosion, but not directly related to bifurcation and vegetation growth.</p><p>&#183; Cascades  -  Waterfalls or flowing streams; not landforms associated with vegetation growth from bifurcation.<b></b></p><p></p>",
    "question_index": 2
  },
  {
    "question": "<p>Ebony, mahogany, and rosewood trees are part of which type of forest?</p>",
    "options": [
      "Temperate forest",
      "Tropical deciduous forest",
      "Tropical evergreen forest",
      "Alphine vegetation"
    ],
    "correct_option_id": 2,
    "solution": "<p>Ebony, mahogany, and rosewood trees thrive in <b>tropical evergreen forests</b> characterized by high temperatures and consistent rainfall throughout the year. These forests, also known as rainforests, provide ideal conditions for the growth of diverse flora, including valuable hardwood trees like ebony, mahogany, and rosewood.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Which of the following is a type of vegetation found in the Himalayan region?</p>",
    "options": [
      "Mangrove",
      "Pampas",
      "Savannah",
      "Alpine"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Alpine</b> vegetation refers to the type of plant life that thrives in high-altitude mountainous regions, including the Himalayas. This vegetation is characterized by its adaptation to harsh environmental conditions such as cold temperatures, low oxygen levels, and rocky terrain. In the Himalayan region, as one ascends to higher elevations, the vegetation undergoes distinct changes, transitioning from subtropical and temperate forests to alpine vegetation.</p>",
    "question_index": 4
  },
  {
    "question": "<p>The arid forest research institute is located in _________.</p>",
    "options": [
      "Jodhpur",
      "Jaipur",
      "Ahmedabad",
      "Dehradun"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Arid Forest Research Institute, situated at Jodhpur in Rajasthan (India),</b> is one of the institutes of the Indian Council of Forestry Research &amp; Education ( ICFRE ) working under the Ministry of Environment, Forest and Climate Change, Govt. of India.</p><p>&bull; The Objective of the Institute is to carry out scientific research in forestry in order to provide technologies to increase the vegetative cover and to conserve the biodiversity in the hot arid and semi arid region of Rajasthan, Gujarat and Dadra &amp; Nagar Haveli union territory.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Which of the following states has mangrove forests?</p>",
    "options": [
      "Telangana",
      "Andhra Pradesh",
      "Rajasthan",
      "Manipur"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#8226; <b>Andhra Pradesh</b> has notable <b>mangrove forests</b>, especially in the <b>Krishna and Godavari deltas</b>.</p><p>&#8226; Mangroves thrive in <b>coastal intertidal zones</b>; Telangana and Rajasthan are landlocked, and Manipur is a hilly state with no significant mangrove presence.</p><p>&#8226; These forests play a crucial role in <b>coastal protection and biodiversity</b>.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Sandalwood grows in which type of forests?</p>",
    "options": [
      "Savanna forests",
      "Tropical deciduous forests",
      "Equatorial evergreen forests",
      "Tropical rainforests"
    ],
    "correct_option_id": 1,
    "solution": "<p>Sandalwood trees thrive well in the <b>tropical</b> and<b> sub-tropical regions where the climate is hot &amp; humid.</b> The cultivation requires temperatures ranging from 12 degree to 40 degree Celsius and lands at reasonably higher altitudes (preferably 2000 to 3500 feet above sea level).</p>",
    "question_index": 7
  },
  {
    "question": "<p>Ebony and Mahogany trees are found in which type of forests?</p><p>Options:</p>",
    "options": [
      "Mangrove forests",
      "Tropical deciduous forests",
      "Tropical evergreen forests",
      "Montane forests"
    ],
    "correct_option_id": 2,
    "solution": "<p>Ebony and Mahogany trees are primarily found in tropical evergreen forests. These forests:</p><p>&#183; Have high rainfall throughout the year</p><p>&#183; Maintain constant humidity</p><p>&#183; Have optimal conditions for hardwood trees</p><p>&#183; Provide the perfect environment for these valuable timber species to grow</p>",
    "question_index": 8
  },
  {
    "question": "<p>Reni Village in Garhwal was known for what environmental movement in 1970?</p>",
    "options": [
      "Save Silent Valley Movement",
      "Chipko Movement",
      "Jungle Bachao Andolan",
      "Appiko Movement"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The 'Chipko movement' is a movement that followed Gandhian method of nonviolent resistance through the act of hugging trees to protect them from being felled. The Chipko movement started in early 1970 in the Garhwal Himalayas of Uttarakhand (the then U.P).</p><p>&bull; The landmark event took place on 26 March, 1974 when a group of peasant women of <b>Reni village in Chamoli district of Uttarakhand acted to prevent the cutting of trees and reclaim their traditional forest rights. </b>Their actions inspired hundreds of such actions which spread throughout India. It led to the formulation of people sensitive policies which put a stop on the open felling of trees.</p><p>&bull; On March 26, 2004, Reni, Laata, and other villages of the Niti Valley celebrated the 30<sup>th</sup> anniversary of the Chipko Movement, where all the surviving original participants united. The celebrations started at Laata, the ancestral home of Gaura Devi, one of the leaders of Chipko movement.</p>",
    "question_index": 9
  },
  {
    "question": "<p>What type of forests are found north and south of the equator between 40&deg; and 60&deg; where rainfall is high, between 500-1500 mm in a year?</p>",
    "options": [
      "Taiga forests",
      "Coniferous forests",
      "Mediterranean forests",
      "Temperate deciduous forests"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Temperate deciduous forests are common in the mid-latitudes. These forests are found between 40&deg; and 60&deg; north and south of the equator. The rainfall is high, between 500-1,500 mm a year. The temperatures remain on average above 0&deg;C even in the winter. The summer temperatures average between 20-25&deg;C. The winter is cooler, which encourages the trees to shed their leaves.</p><p>&bull; Deciduous forests contain trees with broad leaves such as oak, beech and elm. They occur in places with high rainfall, warm summers and cooler winters and lose their leaves in winter.</p>",
    "question_index": 10
  },
  {
    "question": "<p>As per the 'India State of Forest Report', 2019, the total forest and tree cover is _________% of</p><p>The total geographical area of India.</p>",
    "options": [
      "14.39",
      "29.39",
      "24.56",
      "20.39"
    ],
    "correct_option_id": 2,
    "solution": "<p>According to the 'India State of Forest Report', 2019, the combined forest and tree cover in India constitutes <b>24.56%</b> of the total geographical area of the country. This includes both natural forest areas and tree cover outside forests.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Sundari trees are found in which type of forests in India? </p>",
    "options": [
      "Mangrove forests",
      "Tropical deciduous forests",
      "The thorn forests and scrubs",
      "Tropical evergreen forests"
    ],
    "correct_option_id": 0,
    "solution": "<p>Sundari trees (Heritiera fomes) are the dominant species in the Sundarbans mangrove forests. These trees are well adapted to the brackish water conditions of mangrove forests and give the Sundarbans its name.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Pneumatophores are specialised ______ in hydrophytes.</p>",
    "options": [
      "seeds",
      "roots",
      "fruits",
      "flowers"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Pneumatophores are specialized root structures that grow out from the water surface and facilitate the aeration necessary for root respiration in hydrophytic trees such as many mangrove species </b>(e.g., Avicenniagerminans and Lagunculariaraecemosa), bald cypresses, and cotton (tupelo) gum (Nyssaaquatica).</p>",
    "question_index": 13
  },
  {
    "question": "<p>In which state is cactus vegetation found in dry areas of Thorny Bushes in the form of spines?</p>",
    "options": [
      "West Bengal",
      "Assam",
      "Odisha",
      "Rajasthan"
    ],
    "correct_option_id": 3,
    "solution": "<p>Thorny Bushes are found in the dry parts of the country and their leaves are in the form of spines to save water.</p><p>Important trees are cactus, khair, babool, and keekar and they are found in <b>Rajasthan</b>, Punjab, Haryana, Gujarat and eastern slopes of Western Ghats</p>",
    "question_index": 14
  },
  {
    "question": "<p>Which of the following is a species of tropical deciduous forests?</p>",
    "options": [
      "Palms",
      "Mahogany",
      "Teak",
      "Ebony"
    ],
    "correct_option_id": 2,
    "solution": "<p>Tropical deciduous forests, also called monsoon forests, shed their leaves during dry seasons to conserve water. Teak (Tectona grandis) is a dominant species found in these forests, particularly in India, Myanmar, and Thailand.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Camellia sinensis is a plant that produces _______ .</p>",
    "options": [
      "Tea",
      "Coffee",
      "Jute",
      "Sugarcane"
    ],
    "correct_option_id": 0,
    "solution": "<p>Camellia sinensis is a species of evergreen shrub or small tree in the flowering plant family Theaceae. <b>Its leaves and leaf buds are used to produce the popular beverage, tea.</b></p>",
    "question_index": 16
  },
  {
    "question": "<p>Which of the following is INCORRECTLY matched?</p>",
    "options": [
      "Montane climate - Uttar Pradesh, Bihar, and Jharkhand",
      "Tropical monsoon climate - The Western Ghats, the Malabar Coast and southern Assam",
      "Tropical semi-arid (steppe) climate - Karnataka, central Maharashtra, some parts of Tamil Nadu and Andhra Pradesh",
      "Hot deserts, arid climate - Rajasthan and some parts of Gujarat"
    ],
    "correct_option_id": 0,
    "solution": "<p>Montane climate, characterized by cold temperatures at high altitudes, is not typically associated with the states of Uttar Pradesh, Bihar, and Jharkhand. These states do not have significant mountainous regions with the necessary elevation for a montane climate.</p><p>Hence, \"Montane climate - Uttar Pradesh, Bihar, and Jharkhand\" is not correctly matched.</p>",
    "question_index": 17
  },
  {
    "question": "<p>In which of the following regions is the tropical evergreen forests found in India?</p>",
    "options": [
      "Eastern Ghats",
      "Western Ghats",
      "Rann of Kutch",
      "Thar Desert"
    ],
    "correct_option_id": 1,
    "solution": "<p>Tropical evergreen forests in India are primarily found in regions that receive heavy rainfall (typically over 200 cm annually) and have high temperatures throughout the year. The <b>Western Ghats</b>, particularly their windward slopes, are a prime location for these forests.</p><p><b>Explanation of Other Options:</b></p><p><b>&#8226; </b>Eastern Ghats: The Eastern Ghats receive less rainfall compared to the Western Ghats and are characterized more by moist deciduous and dry deciduous forests, though some patches of semi-evergreen forests exist.</p><p><b>&#8226; </b>Rann of Kutch: This is a large salt marsh in Gujarat, characterized by arid and semi-arid conditions, supporting scrub vegetation and mangroves in coastal areas, not tropical evergreen forests.</p><p><b>&#8226; </b>Thar Desert: Located in Rajasthan and parts of adjoining states, this is an arid desert region with sparse, xerophytic vegetation.</p><p><b>Further insights:</b></p><p>&#8226; Besides the Western Ghats, tropical evergreen forests in India are also found in parts of the Northeastern states (like Assam, Arunachal Pradesh, Meghalaya, Nagaland, Tripura, Mizoram, and Manipur) and in the Andaman and Nicobar Islands.</p><p>&#8226; These forests are characterized by dense, multi-layered vegetation with a wide variety of trees, lianas, and epiphytes, and they remain green throughout the year.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Where in India are the Sundari trees that provide durable and hard timber found?</p>",
    "options": [
      "Tropical Deciduous Forests",
      "Mangrove Forests",
      "Montane Forests",
      "Tropical Evergreen Forests"
    ],
    "correct_option_id": 1,
    "solution": "<p>Sundari trees, known for their durable and hard timber, are primarily found in <b>Mangrove Forests</b> in India. These trees are well adapted to saline coastal environments and are crucial for maintaining the health of these ecosystems.</p>",
    "question_index": 19
  }
];
    </script>

</body>
