    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The spread of which movement in Maharashtra inculcated a spirit of religious unity among the Marathas?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2375; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352; &#2344;&#2375; &#2350;&#2352;&#2366;&#2336;&#2379;&#2306; &#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2319;&#2325;&#2340;&#2366; &#2325;&#2368; &#2349;&#2366;&#2357;&#2344;&#2366; &#2346;&#2376;&#2342;&#2366; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sufi movement</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2347;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Bhakti movement</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2325;&#2381;&#2340;&#2367; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Arya Samaj movement</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2351; &#2360;&#2350;&#2366;&#2332; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Brahmo Samaj movement</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2379; &#2360;&#2350;&#2366;&#2332; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The spread of the Bhakti movement in Maharashtra inculcated a spirit of religious unity among the Marathas.</p><p>&bull; Various factors contributed to the rise of Marathas in the sixteenth and seventeenth centuries.</p><p>&bull; The physical environment of the Maratha country shaped certain peculiar qualities among the Marathas.</p><p>&bull; The mountainous region and dense forests made them brave soldiers and adopt guerilla tactics.</p><p>&bull; They built a number of forts on the mountains. The spread of the Bhakti movement in Maharashtra inculcated a spirit of religious unity among them.</p><p>&bull; The spiritual leaders like Tukkaram, Ramdas, Vaman Pandit and Eknath fostered social unity.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following administrative terms under Shivaji with their functions:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Terms</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Functions</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Peshwa</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Military commander</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Sar-i-Naubat(Senapati)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Intelligence, posts, and household affairs</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Amatya</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Finance and general administration</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Waqia-Navis</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Accountant General</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;&#2367;&#2325; &#2346;&#2342;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2358;&#2352;&#2381;&#2340;&#2375;&#2306;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2366;&#2352;&#2381;&#2351;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2346;&#2375;&#2358;&#2357;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2360;&#2376;&#2344;&#2381;&#2351; &#2325;&#2350;&#2366;&#2306;&#2337;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2360;&#2352;-&#2319;-&#2344;&#2380;&#2348;&#2340; (&#2360;&#2375;&#2344;&#2366;&#2346;&#2340;&#2367;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2326;&#2369;&#2347;&#2367;&#2351;&#2366;, &#2346;&#2342; &#2324;&#2352; &#2328;&#2352;&#2375;&#2354;&#2370; &#2350;&#2366;&#2350;&#2354;&#2375;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2309;&#2350;&#2366;&#2340;&#2381;&#2351;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2357;&#2367;&#2340;&#2381;&#2340; &#2324;&#2352; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2357;&#2366;&#2325;&#2367;&#2351;&#2366;-&#2344;&#2357;&#2368;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2350;&#2361;&#2366;&#2354;&#2375;&#2326;&#2366;&#2325;&#2366;&#2352;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-c, ii-a, iii-d, iv-b</span><span class=\"hqt\" style=\"display:none\">i-c, ii-a, iii-d, iv-b</span>",
      "<span class=\"eqt\">i-a, ii-b, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-a, ii-b, iii-c, iv-d</span>",
      "<span class=\"eqt\">i-d, ii-c, iii-b, iv-a</span><span class=\"hqt\" style=\"display:none\">i-d, ii-c, iii-b, iv-a</span>",
      "<span class=\"eqt\">i-b, ii-a, iii-d, iv-c</span><span class=\"hqt\" style=\"display:none\">i-b, ii-a, iii-d, iv-c</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Peshwa</b> was responsible for <b>finance and general administration</b>.</p><p>&bull; <b>Sar-i-Naubat (Senapati)</b> was the <b>military commander</b>.</p><p>&bull; <b>Amatya</b> was the <b>Accountant General</b>.</p><p>&bull; <b>Waqia-Navis</b> was in charge of <b>intelligence, posts, and household affairs</b>.</p><p>Further information:</p><p>&bull; Sachiv  -  Correspondence.</p><p>&bull; Sumanta  -  Master of ceremonies.</p><p>&bull; Nyayadish  -  Justice.</p><p>&bull; Panditarao  -  Charities and religious administration.</p><p>Most of the administrative reforms of Shivaji were based on the practices of the Deccan sultanates. For example, Peshwa was the Persian title.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Shivaji reduced the powers of the existing deshmuks and kulkarnis. He appointed his own revenue officials called _______</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2344;&#2375; &#2350;&#2380;&#2332;&#2370;&#2342;&#2366; &#2342;&#2375;&#2358;&#2350;&#2369;&#2326;&#2379;&#2306; &#2324;&#2352; &#2325;&#2369;&#2354;&#2325;&#2352;&#2381;&#2339;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; _______ &#2344;&#2366;&#2350;&#2325; &#2309;&#2346;&#2344;&#2375; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Kathi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2336;&#2368;</span>",
      "<span class=\"eqt\">Ambers</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2381;&#2348;&#2352;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Karkuns</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2325;&#2369;&#2344;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Chauth</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2380;&#2341;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The revenue system of Shivaji was based on that of Malik Amber of Ahmadnagar.</p><p>&bull; Lands were measured by using the measuring rod called kathi.</p><p>&bull; Lands were also classified into three categories  -  paddy fields, garden lands and hilly tracks.</p><p>&bull; He reduced the powers of the existing deshmuks and kulkarnis. He appointed his own revenue officials called karkuns.</p><p>&bull; Chauth and sardeshmukhi were the taxes collected not in the Maratha kingdom but in the neighbouring territories of the Mughal empire or Deccan sultanates.</p><p>&bull; Chauth was one fourth of the land revenue paid to the Marathas in order to avoid the Maratha raids. Sardeshmukhi was an additional levy of ten percent on those lands which the Marathas claimed hereditary rights.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Political unity among the Marathas was conferred by whom?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2352;&#2366;&#2336;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2319;&#2325;&#2340;&#2366; &#2325;&#2367;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Shahji Bhonsle</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2361;&#2332;&#2368; &#2349;&#2379;&#2306;&#2360;&#2354;&#2375;</span>",
      "<span class=\"eqt\">Balaji Vishwanath</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2354;&#2366;&#2332;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357;&#2344;&#2366;&#2341;</span>",
      "<span class=\"eqt\">Shivaji</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2357;&#2366;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Tarabai</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2352;&#2366;&#2348;&#2366;&#2312;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Political unity was conferred by Shivaji.</p><p>&bull; The Marathas held important positions in the administrative and military systems of Deccan Sultanates of Bijapur and Ahmadnagar.</p><p>&bull; There were a number of influential Maratha families such as the Mores and Nimbalkers.</p><p>&bull; But the credit of establishing a powerful Maratha state goes to Shahji Bhonsle and his son Shivaji.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Arrange the following Peshwas of the Maratha Empire in the correct chronological order:</p><p>I. Baji Rao I</p><p>II. Madhav Rao I</p><p>III. Balaji Vishwanath</p><p>IV. Nana Saheb (Balaji Baji Rao)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2352;&#2366;&#2336;&#2366; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2375;&#2358;&#2357;&#2366;&#2323;&#2306; &#2325;&#2379; &#2360;&#2361;&#2368; &#2325;&#2366;&#2354;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2348;&#2366;&#2332;&#2368; &#2352;&#2366;&#2357; I</p><p>II. &#2350;&#2366;&#2343;&#2357; &#2352;&#2366;&#2357; I</p><p>III. &#2348;&#2366;&#2354;&#2366;&#2332;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357;&#2344;&#2366;&#2341;</p><p>IV. &#2344;&#2366;&#2344;&#2366; &#2360;&#2366;&#2361;&#2375;&#2348; (&#2348;&#2366;&#2354;&#2366;&#2332;&#2368; &#2348;&#2366;&#2332;&#2368; &#2352;&#2366;&#2357;)</p></span>",
    "options": [
      "<span class=\"eqt\">III-I-IV-II</span><span class=\"hqt\" style=\"display:none\">III-I-IV-II</span>",
      "<span class=\"eqt\">II-III-IV-II</span><span class=\"hqt\" style=\"display:none\">II-III-IV-II</span>",
      "<span class=\"eqt\">IV-II-I-III</span><span class=\"hqt\" style=\"display:none\">IV-II-I-III</span>",
      "<span class=\"eqt\">III-IV-II-I</span><span class=\"hqt\" style=\"display:none\">III-IV-II-I</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>III </b><b>&rarr;</b><b> I </b><b>&rarr;</b><b> IV </b><b>&rarr;</b><b> II</b></p><p>(Balaji Vishwanath &rarr; Baji Rao I &rarr; Nana Saheb &rarr; Madhav Rao I)</p><p><b>Balaji Vishwanath (1713 - 1720)</b></p><p>First major Peshwa, laid the foundation of Peshwa power.</p><p><b>Baji Rao I (1720 - 1740)</b></p><p>Son of Balaji Vishwanath, expanded Maratha power dramatically.</p><p><b>Nana Saheb (Balaji Baji Rao) (1740 - 1761)</b></p><p>Son of Baji Rao I, presided over the empire at its peak but faced the disaster of the Third Battle of Panipat.</p><p><b>Madhav Rao I (1761 - 1772)</b></p><p>Son of Nana Saheb, restored Maratha power after Panipat.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Maratha families is mentioned as influential before the rise of Shivaji?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2350;&#2352;&#2366;&#2336;&#2366; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2325;&#2379; &#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2325;&#2375; &#2313;&#2342;&#2351; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2358;&#2366;&#2354;&#2368; &#2348;&#2340;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The Shindes</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2306;&#2342;&#2375;</span>",
      "<span class=\"eqt\">The Holkars</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2379;&#2354;&#2325;&#2352;</span>",
      "<span class=\"eqt\">The Mores and the Nimbalkars</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2352;&#2375;&#2360; &#2324;&#2352; &#2344;&#2367;&#2306;&#2348;&#2366;&#2354;&#2325;&#2352;</span>",
      "<span class=\"eqt\">The Gaekwads</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2351;&#2325;&#2357;&#2366;&#2337;&#2364;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Before the rise of <b>Chhatrapati Shivaji Maharaj</b>, the <b>Mores of Javali</b> and the <b>Nimbalkars of Phaltan</b> were prominent <b>Maratha families</b> with significant local power in the <b>Western Ghats region</b>.</p><p>&bull; <b>The Mores</b> controlled the <b>Javali valley</b>, a strategic area later captured by Shivaji in 1656, which helped him expand his foothold in the Konkan.</p><p>&bull; <b>The Nimbalkars</b> were influential in <b>Phaltan</b> (southern Maharashtra) and often allied with the Adil Shahis of Bijapur before aligning with the Marathas.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which Peshwa established the system of confederacy among the Maratha chiefs?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2346;&#2375;&#2358;&#2357;&#2366; &#2344;&#2375; &#2350;&#2352;&#2366;&#2336;&#2366; &#2360;&#2352;&#2342;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2328; &#2325;&#2368; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">The More family</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2352; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">The Nimbalkar family</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2306;&#2348;&#2366;&#2354;&#2325;&#2352; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Shahji Bhonsle and his son Shivaji</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2361;&#2332;&#2368; &#2349;&#2379;&#2306;&#2360;&#2354;&#2375; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2346;&#2369;&#2340;&#2381;&#2352; &#2358;&#2367;&#2357;&#2366;&#2332;&#2368;</span>",
      "<span class=\"eqt\">The Peshwas</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2358;&#2357;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; After the death of <b>Chhatrapati Shahu (1749)</b>, the Peshwa became the de facto ruler, and regional Maratha chiefs (like Holkars, Shindes, Bhonsles, and Gaekwads) gained semi-autonomous power.</p><p>&bull; <b>Balaji Baji Rao formalized this decentralized system</b>, allowing chiefs to govern their territories while coordinating under Peshwa's leadership for military and political goals.</p><p>Further insights:</p><p>&bull; Baji Rao was the eldest son of Balaji Viswanath. He succeeded his father as Peshwa at the age young age of twenty. The Maratha power reached its zenith under him.</p><p>&bull; He initiated the system of confederacy among the Maratha chiefs.</p><p>&bull; Under this system, each Maratha chief was assigned a territory which could be administered autonomously.</p><p>&bull; As a result, many Maratha families became prominent and established their authority in different parts of India. They were the Gaekwad at Baroda, the Bhonsle at Nagpur, the Holkars at Indore, the Scindias at Gwalior, and the Peshwas at Poona.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following treaties/events with the corresponding years:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Treaties/Events</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Years</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i) Treaty of Purandar</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.1680</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii) Shivaji's coronation at Raigarh</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.1666</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii) Shivaji's death</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.1674</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv) Shivaji's visit to Agra and imprisonment</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.1665</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2306;&#2343;&#2367;&#2351;&#2379;&#2306;/&#2328;&#2335;&#2344;&#2366;&#2323;&#2306; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2360;&#2375; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2306;&#2343;&#2367;/&#2328;&#2335;&#2344;&#2366;&#2319;&#2305;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2357;&#2352;&#2381;&#2359;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i) &#2346;&#2369;&#2352;&#2306;&#2342;&#2352; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.1680</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii) &#2352;&#2366;&#2351;&#2327;&#2338;&#2364; &#2350;&#2375;&#2306; &#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2325;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351;&#2366;&#2349;&#2367;&#2359;&#2375;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.1666</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii) &#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2325;&#2368; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.1674</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv) &#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2325;&#2368; &#2310;&#2327;&#2352;&#2366; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2324;&#2352; &#2325;&#2366;&#2352;&#2366;&#2357;&#2366;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.1665</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-d, ii-c, iii-a, iv-b</span><span class=\"hqt\" style=\"display:none\">i-d, ii-c, iii-a, iv-b</span>",
      "<span class=\"eqt\">i-a, ii-b, iii-d, iv-c</span><span class=\"hqt\" style=\"display:none\">i-a, ii-b, iii-d, iv-c</span>",
      "<span class=\"eqt\">i-c, ii-d, iii-b, iv-a</span><span class=\"hqt\" style=\"display:none\">i-c, ii-d, iii-b, iv-a</span>",
      "<span class=\"eqt\">i-b, ii-a, iii-d, iv-c</span><span class=\"hqt\" style=\"display:none\">i-b, ii-a, iii-d, iv-c</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Treaty of Purandar</b> &#10141; <b>d. 1665</b></p><p>Signed between Shivaji and Mughal general Jai Singh, leading to Shivaji's conditional surrender and later his famous escape from Agra.</p><p>&bull; <b>Shivaji's coronation at Raigarh</b> &#10141; <b>c. 1674</b></p><p>Shivaji was formally crowned as Chhatrapati on June 6, 1674, marking the foundation of the Maratha Empire.</p><p>&bull; <b>Shivaji's death</b> &#10141; <b>a. 1680</b></p><p>Shivaji died on April 3, 1680, at Raigad Fort, after ruling for nearly six years post-coronation.</p><p>&bull; <b>Shivaji's visit to Agra and imprisonment</b> &#10141; <b>b. 1666</b></p><p>Shivaji was invited to Agra by Aurangzeb in 1666, imprisoned, but made a dramatic escape later that year.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>According to the Treaty of Purandar, how many forts did Shivaji have to surrender to the Mughals out of the 35 he held?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2369;&#2352;&#2306;&#2342;&#2352; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; 35 &#2325;&#2367;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2325;&#2367;&#2354;&#2375; &#2350;&#2369;&#2327;&#2354;&#2379;&#2306; &#2325;&#2379; &#2360;&#2380;&#2306;&#2346;&#2344;&#2375; &#2346;&#2337;&#2364;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>",
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>According to the <b>Treaty of Purandar (1665)</b>, signed between <b>Chhatrapati Shivaji Maharaj</b> and <b>Mughal general Jai Singh I</b>, Shivaji had to surrender <b>23 out of the 35 forts</b> he controlled at the time.</p><p>The remaining 12 forts were to be left to Shivaji on condition of service and loyalty to the Mughal empire.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Maratha army under Shivaji.</p><p>A. The regular army was supervised by havaldars, and the soldiers were given fixed salaries.</p><p>B. There were two divisions in the Maratha cavalry: Bargirs, who were equipped and paid by the state, and Silahdars, who were maintained by the nobles.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2350;&#2352;&#2366;&#2336;&#2366; &#2360;&#2375;&#2344;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>A. &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2360;&#2375;&#2344;&#2366; &#2325;&#2368; &#2342;&#2375;&#2326;&#2352;&#2375;&#2326; &#2361;&#2357;&#2354;&#2342;&#2366;&#2352; &#2325;&#2352;&#2340;&#2375; &#2341;&#2375; &#2324;&#2352; &#2360;&#2376;&#2344;&#2367;&#2325;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2357;&#2375;&#2340;&#2344; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404;</p><p>B. &#2350;&#2352;&#2366;&#2336;&#2366; &#2328;&#2369;&#2337;&#2364;&#2360;&#2357;&#2366;&#2352; &#2360;&#2375;&#2344;&#2366; &#2350;&#2375;&#2306; &#2342;&#2379; &#2357;&#2367;&#2349;&#2366;&#2327; &#2341;&#2375;: &#2348;&#2366;&#2352;&#2327;&#2368;&#2352;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2352;&#2366;&#2332;&#2381;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2369;&#2360;&#2332;&#2381;&#2332;&#2367;&#2340; &#2324;&#2352; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;, &#2324;&#2352; &#2360;&#2367;&#2354;&#2361;&#2342;&#2366;&#2352;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2352;&#2312;&#2360;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Shivaji was a man of military genius and his army was well organized. The regular army consisted of about 30000 to 40000 cavalry supervised by havaildars.</p><p>&bull; They were given fixed salaries. There were two divisions in the Maratha cavalry  -  1. bargirs, equipped and paid by the state; and 2. silahdars, maintained by the nobles.</p><p>&bull; In the infantry, the Mavli foot soldiers played an important role. Shivaji also maintained a navy.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Shivaji's administration.</p><p>a. Shivaji was the central figure in the government and was assisted by a council of eight ministers called Ashtapradhan.</p><p>b. Each minister in the Ashtapradhan was solely responsible to the council as a whole.</p><p>c. Shivaji's revenue system was based on that of Malik Amber of Ahmadnagar.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2325;&#2375; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>a. &#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2360;&#2352;&#2325;&#2366;&#2352; &#2350;&#2375;&#2306; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2341;&#2375; &#2324;&#2352; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2310;&#2336; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2346;&#2352;&#2367;&#2359;&#2342; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2341;&#2368;, &#2332;&#2367;&#2360;&#2375; &#2309;&#2359;&#2381;&#2335;&#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404;</p><p>b. &#2309;&#2359;&#2381;&#2335;&#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2313;&#2340;&#2381;&#2340;&#2352;&#2342;&#2366;&#2351;&#2368; &#2341;&#2366;&#2404;</p><p>c. &#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2325;&#2368; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2309;&#2361;&#2350;&#2342;&#2344;&#2327;&#2352; &#2325;&#2375; &#2350;&#2354;&#2367;&#2325; &#2309;&#2306;&#2348;&#2352; &#2325;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2341;&#2368;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The <b>Ashtapradhan (Council of Eight Ministers)</b> advised Shivaji on governance, military, finance, and justice. Key ministers included:</p><p>&bull; <i>Peshwa (Prime Minister)</i></p><p>&bull; <i>Amatya (Finance Minister)</i></p><p>&bull; <i>Senapati (Commander-in-Chief)</i></p><p>&bull; <i>Mantri (Chronicler/Diplomat)</i></p><p>The ministers were <b>directly accountable to Shivaji</b>, not the council. The Ashtapradhan was an advisory body, but ultimate authority rested with the king.</p><p>The revenue system of Shivaji was based on that of <b>Malik Amber of Ahmadnagar</b>.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Shivaji faced defeat and lost Poona under which Mughal governor of the Deccan sent by Aurangazeb?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2324;&#2352;&#2306;&#2327;&#2332;&#2375;&#2348; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2349;&#2375;&#2332;&#2375; &#2327;&#2319; &#2342;&#2325;&#2381;&#2325;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2350;&#2369;&#2327;&#2354; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2325;&#2379; &#2361;&#2366;&#2352; &#2325;&#2366; &#2360;&#2366;&#2350;&#2344;&#2366; &#2325;&#2352;&#2344;&#2366; &#2346;&#2337;&#2364;&#2366; &#2324;&#2352; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2346;&#2370;&#2344;&#2366; &#2349;&#2368; &#2326;&#2379; &#2342;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Raja Jai Singh</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2366; &#2332;&#2351; &#2360;&#2367;&#2306;&#2361;</span>",
      "<span class=\"eqt\">Afzal Khan</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2347;&#2364;&#2332;&#2364;&#2354; &#2326;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Shaista Khan</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2311;&#2360;&#2381;&#2340;&#2366; &#2326;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Mir Jumla</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2368;&#2352; &#2332;&#2369;&#2350;&#2354;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Shaista Khan</b> (Aurangzeb's maternal uncle) was appointed as the <b>Mughal governor of the Deccan in 1660</b> to crush Shivaji's rebellion.</p><p>&bull; In <b>1663</b>, Shivaji <b>lost Poona (Pune)</b> to Shaista Khan, who occupied Shivaji's ancestral Lal Mahal palace.</p><p>&bull; However, in a daring <b>night raid (April 1663)</b>, Shivaji attacked Shaista Khan in Pune, cutting his fingers and killing his son. This forced Shaista Khan to retreat.</p><p>&bull; Raja Jai Singh defeated Shivaji later (1665) at Purandar, but Shaista Khan was the first Mughal governor to temporarily seize Poona.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>For the second time, Surat was plundered by Shivaji in which year?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2352;&#2340; &#2325;&#2379; &#2342;&#2370;&#2360;&#2352;&#2368; &#2348;&#2366;&#2352; &#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2344;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2354;&#2370;&#2335;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1663</span><span class=\"hqt\" style=\"display:none\">1663</span>",
      "<span class=\"eqt\">1665</span><span class=\"hqt\" style=\"display:none\">1665</span>",
      "<span class=\"eqt\">1670</span><span class=\"hqt\" style=\"display:none\">1670</span>",
      "<span class=\"eqt\">1674</span><span class=\"hqt\" style=\"display:none\">1674</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Shivaji <b>plundered Surat for the second time in 1670</b> (specifically <b>October 1670</b>).</p><p><b>First Sack of Surat (1664):</b></p><p>&bull; Shivaji's <b>first attack</b> on Surat (Mughal Empire's richest port) shocked the Mughals and boosted Maratha resources.</p><p><b>Second Sack of Surat (1670):</b></p><p>&bull; After escaping Mughal captivity (1666) and rebuilding his power, Shivaji <b>re-attacked Surat</b> in <b>1670</b> to weaken Aurangzeb's finances.</p><p>&bull; The Mughal governor, <b>Inayat Khan</b>, fled again, and the Marathas looted the city <b>unopposed</b>.</p><p><b>Significance:</b></p><p>&bull; The <b>1670 plunder</b> reaffirmed Maratha dominance and funded Shivaji's campaigns to <b>recapture lost forts</b> (like Sinhagad, Purandar).</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Under whose reign the Peshwas rose to power?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2325;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2346;&#2375;&#2358;&#2357;&#2366; &#2360;&#2340;&#2381;&#2340;&#2366; &#2350;&#2375;&#2306; &#2310;&#2351;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rajaram</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2366; &#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Shambaji</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2306;&#2348;&#2366;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Shahu</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2361;&#2370;</span>",
      "<span class=\"eqt\">Shivaji II</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; There ensued a war of succession after the death of Shivaji between his sons, Shambaji and Rajaram.</p><p>&bull; Shambaji emerged victorious but later he was captured and executed by the Mughals.</p><p>&bull; Rajaram succeeded the throne but the Mughals made him to flee to the Ginjee fort. He died at Satara. He was succeeded by his minor son Shivaji II with his mother Tara Bai as regent.</p><p>&bull; The next ruler was Shahu in whose reign the Peshwas rose to power.</p>",
    "question_index": 13
