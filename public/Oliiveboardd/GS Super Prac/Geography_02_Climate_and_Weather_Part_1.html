<!DOCTYPE html>

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>The season for torrential downpours, often accompanied by hail, associated with violent winds, and localized thunderstorms. In West Bengal, these kinds of storms are known as:</p>",
    "options": [
      "Trade winds",
      "Loo",
      "Kaal Baisakhi",
      "Mahawat"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#8226; <b>Kaal Baisakhi</b> refers to intense, localized thunderstorms in West Bengal during spring, often with hail and strong winds. </p><p>&#8226; Trade winds are global wind patterns, Loo is a hot wind, and Mahawat refers to winter precipitation.</p><p><b>Further Insight</b>:</p><p>&#8226; Kaal Baisakhi, also called Nor'westers, occurs in eastern India during April-May, driven by moisture-laden winds from the Bay of Bengal. </p><p>&#8226; These storms can cause significant damage but also provide relief from pre-monsoon heat.</p>",
    "question_index": 0
  },
  {
    "question": "<p>The minimum period of time taken upto which the weather variations are considered to predict the climate of a place is years.</p>",
    "options": [
      "20",
      "25",
      "10",
      "30"
    ],
    "correct_option_id": 3,
    "solution": "<p>Some scientists define climate as the average weather for a particular region and time period, usually taken over <b>30</b>-years.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Low annual range of temperature and high annual rainfall are characteristics of a ______.</p>",
    "options": [
      "Mediterranean climate",
      "Temperate climate",
      "Tropical humid climate",
      "Cold climate"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Tropical humid climates</b> exist between Tropic of Cancer and Tropic of Capricorn. The sun being overhead throughout the year and the presence of Inter Tropical Convergence Zone (ITCZ) make the climate hot and humid. Annual range of temperature is very low and annual rainfall is high. The tropical group is divided into three types as per the climate classification scheme developed by V. Koeppen, namely (i) Af- Tropical wet climate; (ii) Am - Tropical monsoon climate; (iii) Aw- Tropical wet and dry climate.</p>",
    "question_index": 2
  },
  {
    "question": "<p>In which state of India is Kund or Tanka used for water harvesting?</p><p>Options:</p>",
    "options": [
      "Rajasthan",
      "Andhra Pradesh",
      "Uttar Pradesh",
      "Punjab"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Kund</b> and <b>Tanka</b> are traditional water-harvesting structures found in <b>Rajasthan</b>, designed to collect and store rainwater for domestic use in arid regions.</p><p>&#183; <b>Kunds</b> are underground reservoirs, while <b>Tankas</b> are tank-like structures with a catchment area.</p><p>Incorrect options:</p><p>&#183; While other states use rainwater harvesting, these specific structures are prominent in Rajasthan due to its desert climate.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Which of the following is NOT a major climate control factor?</p>",
    "options": [
      "Altitude",
      "Latitude",
      "Interior of the earth",
      "Ocean currents"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Major climate controls: Latitude, altitude, ocean currents, pressure systems, and wind patterns.</p><p>&#183; The Earth's interior does not directly influence climate, so it is NOT a major climate control.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Which Indian city experiences the LEAST difference in average temperature between its hottest and coldest months?</p>",
    "options": [
      "Bhopal",
      "Delhi",
      "Mumbai",
      "Srinagar"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Mumbai's proximity to the Arabian Sea moderates its climate, leading to milder temperatures year-round.</p><p>&bull; As a tropical city, Mumbai experiences warm temperatures throughout the year, but the variation between the hottest and coldest months is relatively small compared to inland cities.</p><p>&bull; Mumbai:</p><p>&#9675; Hottest month (April): Average maximum temperature of 33.9&deg;C (93&deg;F)</p><p>&#9675; Coldest month (January): Average minimum temperature of 23.4&deg;C (74.1&deg;F)</p><p>&#9675; Temperature difference: Approximately 10.5&deg;C</p><p>&bull; Bhopal:</p><p>&#9675; Hottest month (May): Average maximum temperature of 40.4&deg;C (104.7&deg;F)</p><p>&#9675; Coldest month (January): Average minimum temperature of 10.7&deg;C (51.3&deg;F)</p><p>&#9675; Temperature difference: Approximately 29.7&deg;C &#8203;</p><p>&bull; Delhi:</p><p>&#9675; Hottest month (June): Average maximum temperature of 41.2&deg;C (106.2&deg;F)</p><p>&#9675; Coldest month (January): Average minimum temperature of 7.5&deg;C (45.5&deg;F)</p><p>&#9675; Temperature difference: Approximately 33.7&deg;C &#8203;</p><p>&bull; Srinagar:</p><p>&#9675; Hottest month (July): Average maximum temperature of 29.2&deg;C (84.6&deg;F)</p><p>&#9675; Coldest month (January): Average minimum temperature of -0.4&deg;C (31.3&deg;F)</p><p>&#9675; Temperature difference: Approximately 29.6&deg;C</p>",
    "question_index": 5
  },
  {
    "question": "<p>Which of the following States/Union Territories of India receives the highest average annual rainfall?</p>",
    "options": [
      "Rajasthan",
      "Ladakh",
      "Meghalaya",
      "Delhi"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Meghalaya</b> is the state in India that receives the highest average annual rainfall. Specifically, places like Mawsynram and Cherrapunji in Meghalaya are renowned for being among the wettest places on Earth.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; Rajasthan: Large parts of Rajasthan, especially the Thar Desert region, are arid and receive very low rainfall.</p><p>&#8226; Ladakh: Ladakh is a cold desert region located in the rain shadow of the Himalayas and receives very scanty rainfall.</p><p>&#8226; Delhi: Delhi has a semi-arid climate and receives moderate rainfall, primarily during the monsoon season, far less than Meghalaya.</p><p><b>Further insights:</b></p><p>&#8226; The heavy rainfall in Meghalaya is due to its geographical location, orographic lifting of moisture-laden winds from the Bay of Bengal by the Khasi, Garo, and Jaintia Hills, and the funneling effect of these hills.</p><p>&#8226; The average annual rainfall in Mawsynram is over 11,800 mm.</p>",
    "question_index": 6
  },
  {
    "question": "<p>El Nino is a climate pattern that describes the unusual warming of surface waters in which ocean?</p>",
    "options": [
      "Indian Ocean",
      "Atlantic Ocean",
      "Arctic Ocean",
      "Pacific Ocean"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; <b>El Ni&#241;o</b> is a climate pattern that describes the unusual warming of surface waters in the <b>Pacific Ocean</b>.</p><p>&#183; El Ni&#241;o significantly affects monsoons, hurricanes, and temperatures worldwide, including in India.</p><p><b>Key Details:</b></p><p>&#183; <b>Occurrence:</b> Every 2 - 7 years in the central and eastern tropical Pacific.</p><p>&#183; <b>Impact:</b> Disrupts global weather patterns, causing heavy rainfall in some regions and droughts in others.</p><p>&#183; <b>Opposite Phase:</b> <i>La Ni&#241;a</i> (cooling of Pacific waters).</p><p>&#183; <b>Full Name:</b> <i>El Ni&#241;o-Southern Oscillation (ENSO)</i>  -  a combined ocean-atmosphere phenomenon.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Which of the following codes signify the Cold Climate with Dry Winters according to Koeppen?</p>",
    "options": [
      "EF",
      "Df",
      "ET",
      "Dw"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Koeppen system categorizes climates into five types:</p><p>Type A: Tropical Moist Climates (hot and rainy year-round).</p><p>Type B: Dry Climates (limited rainfall).</p><p>Type C: Mild Mid-latitude Climates (moderate temperatures and rainfall).</p><p>Type D: Cold Mid-latitude Climates (cold winters and moderate rainfall).</p><p>Type E: Polar Climates (very cold throughout the year).</p><p>Code for Dry Winters according to Koeppen is '<b>Dw</b>'</p>",
    "question_index": 8
  },
  {
    "question": "<p>Which of the following pair of type of climate  -  area is NOT correct?</p><p><b>I. </b>Semi-arid steppe climate  -  Punjab</p><p><b>II. </b>Monsoon with dry summer  -  Coromandel coast of Tamil Nadu</p>",
    "options": [
      "Only I",
      "Neither I nor II",
      "Only II",
      "Both I and II"
    ],
    "correct_option_id": 0,
    "solution": "<p>Punjab region of India has a semi-arid climate, but it is not classified as a steppe climate. A steppe climate is characterized by dry grasslands with little or no trees, and a mean annual precipitation of 250 to 500 mm.</p><p>The Coromandel coast of Tamil Nadu experiences a Tropical Wet and Dry Climate.</p><p>Hence, only statement I is not correct.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Consider the following statements about the main reasons for the excessive cold in north India during the cold weather season and identify which of the statements are correct.</p><p>A) States like Punjab, Haryana and Rajasthan, being far away from the moderating influence of sea, experience continental climate.</p><p>B) The snowfall in the nearby Himalayan ranges creates a cold wave situation.</p><p>C) Around February, the cold winds coming from the Caspian Sea and Turkmenistan bring a cold wave along with frost and fog over the north western parts of India.</p>",
    "options": [
      "A and B only",
      "B and C only",
      "A, B and C",
      "A and C only"
    ],
    "correct_option_id": 2,
    "solution": "<p>There are three main reasons for the excessive cold in north India during this season:</p><p>(i) States like Punjab, Haryana and Rajasthan being far away from the moderating influence of sea experience continental climate.</p><p>(ii) The snowfall in the nearby Himalayan ranges creates cold wave situation.</p><p>(iii) Around February, the cold winds coming from the Caspian Sea and Turkmenistan bring cold wave along with frost and fog over the north western parts of India.</p>",
    "question_index": 10
  },
  {
    "question": "<p>According to Indian Meteorology, which of the following is NOT a season experienced in India?</p>",
    "options": [
      "The southwest monsoon season",
      "The hot weather season",
      "Equatorial season",
      "The cold weather season"
    ],
    "correct_option_id": 2,
    "solution": "<p>The India Meteorological Department (IMD) recognizes four seasons:</p><p>a. <b>Cold Weather Season</b> (Winter, Dec - Feb).</p><p>b. <b>Hot Weather Season</b> (Summer, Mar - May).</p><p>c. <b>Southwest Monsoon Season</b> (Rainy, Jun - Sep).</p><p>d. <b>Post-Monsoon Season</b> (Autumn, Oct - Nov).</p><p>The <b>Equatorial season</b> is not recognized in India, as it is typical of equatorial regions with consistent temperature and rainfall year-round.</p><p><b>Why other options are correct:</b></p><p>&#183; <b>Southwest Monsoon :</b> Brings heavy rainfall to India.</p><p>&#183; <b>Hot Weather Season :</b> Characterized by high temperatures.</p><p>&#183; <b>Cold Weather Season :</b> Marked by cooler temperatures, especially in North India.</p><p><b>Further Insight:</b></p><p>India's diverse climate results from its geographical position, with monsoons playing a critical role in agriculture and water resources.</p>",
    "question_index": 11
  },
  {
    "question": "<p>In how many agro-climatic zones has Tamil Nadu been classified?</p>",
    "options": [
      "3",
      "9",
      "7",
      "5"
    ],
    "correct_option_id": 2,
    "solution": "<p>Tamil Nadu has been categorized into <b>7</b> agro-climatic zones based on factors such as soil type, rainfall pattern, and climate conditions. This classification aids in the development and implementation of region-specific agricultural strategies and policies to optimize crop productivity and sustainability across the state.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Which letter code indicates mid-latitude desert climate in K&#246;ppen climate classification?</p>",
    "options": [
      "Cfa",
      "Dw",
      "EF",
      "BWk"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; BWk is the code from K&#246;ppen climate classification which indicate mid-latitude desert climate.</p><p>&bull; <img width=624 height=367 id=image3.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27838/image033.jpg\"></p>",
    "question_index": 13
  },
  {
    "question": "<p>According to Koeppen's Scheme, which type of climate is denoted by the letter 'E' in India?</p>",
    "options": [
      "Tropical savannah",
      "Hot desert",
      "Mansoon with dry summer",
      "Polar type"
    ],
    "correct_option_id": 3,
    "solution": "<p>In K&#246;ppen's climate classification system, the letter 'E' denotes the type of climate known as \"<b>Polar</b>\" climate. However, in India, which is closer to the equator and has a predominantly tropical climate, you would not typically find a climate denoted by 'E' since such climates are more characteristic of polar regions. India's climate regions are generally classified under letters like 'A' (tropical), 'B' (dry/arid), and 'C' (temperate).</p>",
    "question_index": 14
  },
  {
    "question": "<p>Which of the following groups of places in India has little differences in day and night temperatures?</p>",
    "options": [
      "Bhopal and Indore",
      "Chennai and Thiruvananthapuram",
      "Jammu and Kashmir",
      "Jaipur and Jaisalmer"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Coastal areas experience moderate climates due to the influence of the sea, leading to minimal temperature variation between day and night.</p><p>&#183; Chennai (Tamil Nadu) and Thiruvananthapuram (Kerala) are both coastal cities, experiencing small differences in day and night temperatures.</p><p>&#183; Other options: </p><p>o Bhopal &amp; Indore (Madhya Pradesh) &rarr; More temperature variation as they are inland cities.</p><p>o Jammu &amp; Kashmir &rarr; Extreme temperature differences due to altitude and continental climate.</p><p>o Jaipur &amp; Jaisalmer &rarr; Desert areas where days are extremely hot and nights are very cold.</p>",
    "question_index": 15
  },
  {
    "question": "<p>At what latitude does the easterly jet stream blow over peninsular India during the summer months?</p><p>Options:</p>",
    "options": [
      "24&deg;N",
      "30&deg;N",
      "14&deg;N",
      "28&deg;N"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; During summer, the <b>easterly jet stream</b> flows over peninsular India at an altitude of 14&deg;N.</p><p>&#183; This jet stream influences the onset and withdrawal of the <b>monsoon</b>, playing a crucial role in India's climate system.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Which of the following statements is correct about 'Loo' winds in the context of the Indian climate?</p>",
    "options": [
      "They blow in the rainy season.",
      "They blow in the summer season.",
      "They blow in the winter season.",
      "They blow in the winter and rainy season."
    ],
    "correct_option_id": 1,
    "solution": "<p>'Loo' winds are strong, hot, dry, and gusty winds that blow over the northern and northwestern plains of India (from Punjab to Bihar) during the <b>summer season</b>, typically in the months of May and June, before the onset of the monsoon.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; They blow in the rainy season: The rainy season (monsoon) brings moisture and relief from the Loo.</p><p>&#8226; They blow in the winter season: Winter season in North India is characterized by cold winds.</p><p>&#8226; They blow in the winter and rainy season: Incorrect.</p><p><b>Further insights:</b></p><p>&#8226; Loo winds originate from the Thar Desert and other arid regions to the west.</p><p>&#8226; They are characterized by extremely high temperatures (often exceeding 45&deg;C) and very low humidity.</p><p>&#8226; Direct exposure to Loo can cause heatstroke and dehydration, making it a hazardous weather phenomenon.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Mawsynram receives the highest average annual rainfall in the world because the Monsoon Winds of the Bay of Bengal strike the _____________ hill.</p>",
    "options": [
      "Chota Nagpur Plateau",
      "Khasi",
      "Western Ghats",
      "Aravalli"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#8226; Mawsynram, in Meghalaya, receives the highest average annual rainfall due to monsoon winds from the Bay of Bengal striking the <b>Khasi</b> Hills, causing orographic lift and heavy precipitation.</p><p>&#8226; The Chota Nagpur Plateau, Western Ghats, and Aravalli ranges are not in the direct path of these monsoon winds.</p><p><b>Further Insight</b>:</p><p>&#8226; Mawsynram averages over 11,000 mm of rainfall annually, slightly surpassing Cherrapunji, also in the Khasi Hills. </p><p>&#8226; The orographic effect, where moist air rises and cools over the hills, results in exceptional rainfall, making this region the wettest on Earth.</p>",
    "question_index": 18
  },
  {
    "question": "<p>In which part of India is cool mountain climate observed?</p>",
    "options": [
      "West",
      "South",
      "North",
      "East"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; A cool mountain climate is observed in <b>Northern</b> India, particularly in the Himalayan region (e.g., Jammu and Kashmir, Himachal Pradesh, Uttarakhand). </p><p>&#183; This region experiences cold temperatures and snowfall in winter, unlike the tropical climates elsewhere in India. </p><p><b>Explanation of Other Options</b>: </p><p>&#183; <b>West</b>: Incorrect, as Western India (e.g., Rajasthan, Gujarat) has arid or semi-arid climates.</p><p>&#183; <b>South</b>: Incorrect, as Southern India (e.g., Tamil Nadu, Kerala) has tropical climates.</p><p>&#183; <b>East</b>: Incorrect, as Eastern India (e.g., West Bengal, Odisha) has tropical or subtropical climates, though some hill areas have cooler weather.</p>",
    "question_index": 19
  }
];
    </script>
