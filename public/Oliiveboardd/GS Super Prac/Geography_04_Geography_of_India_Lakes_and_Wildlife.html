  {
    "question": "<p>Match the lakes in column A with their countries in column B.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column - A</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column - B</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Lake Baikal</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Uganda and Tanzania</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Lake Superior</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Canada and USA</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Lock Lamond</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Scotland</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Lake Victoria</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Russia</td></tr></table>",
