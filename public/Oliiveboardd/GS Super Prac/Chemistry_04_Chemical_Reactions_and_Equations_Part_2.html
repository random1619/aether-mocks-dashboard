    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following laws states that the mass of reactants in a chemical reaction is always equal to the mass of products? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2367;&#2351;&#2350; &#2348;&#2340;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2309;&#2349;&#2367;&#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2361;&#2350;&#2375;&#2358;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2325;&#2375; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Law of Definite Proportions</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Law of Conservation of Mass</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Law of Multiple Proportions</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2339;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Gay-Lussac's Law</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2375;-&#2354;&#2369;&#2360;&#2366;&#2325; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Law of Conservation of Mass states that mass is neither created nor destroyed in a chemical reaction.</p><p>This law states that in a chemical reaction, the total mass of the reactants is always equal to the total mass of the products, meaning mass is neither created nor destroyed in a chemical reaction.</p><p>Further information:</p><p>&#183; <b>Gay-Lussac's Law</b>  -  This law applies to gases and states that the volumes of gases involved in a chemical reaction, when measured at the same temperature and pressure, are in simple whole number ratios. </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which law is stated as \"When two elements combine to form more than one compound, the masses of one element that combine with a fixed mass of the other are in a simple whole number ratio\"? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2367;&#2351;&#2350; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2361;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; \"&#2332;&#2348; &#2342;&#2379; &#2340;&#2340;&#2381;&#2357; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2325;&#2352; &#2319;&#2325; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2351;&#2380;&#2327;&#2367;&#2325; &#2348;&#2344;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2319;&#2325; &#2340;&#2340;&#2381;&#2357; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2342;&#2370;&#2360;&#2352;&#2375; &#2340;&#2340;&#2381;&#2357; &#2325;&#2375; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2325;&#2352; &#2319;&#2325; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;\"?</p></span>",
    "options": [
      "<span class=\"eqt\">Law of Definite Proportions</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Law of Conservation of Mass</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Law of Multiple Proportions</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2339;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Dalton's Law</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2366;&#2354;&#2381;&#2335;&#2344; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Law of Multiple Proportions</b>  -  This law states that when two elements combine to form more than one compound, the ratios of the masses of one element that combine with a fixed mass of the other are always in simple whole numbers. </p><p>For example, carbon and oxygen form both CO and CO&#8322;, and the ratio of oxygen masses in these compounds (16:32) simplifies to 1:2.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The Law of Definite Proportions states that: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350; &#2325;&#2361;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367;:</p></span>",
    "options": [
      "<span class=\"eqt\">The mass ratio of the elements in a compound is constant</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2351;&#2380;&#2327;&#2367;&#2325; &#2350;&#2375;&#2306; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2360;&#2381;&#2341;&#2367;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The mass of products equals the mass of reactants</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2309;&#2349;&#2367;&#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2325;&#2375; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Two elements can form different compounds in fixed ratios</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2340;&#2340;&#2381;&#2357; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2349;&#2367;&#2344;&#2381;&#2344;-&#2349;&#2367;&#2344;&#2381;&#2344; &#2351;&#2380;&#2327;&#2367;&#2325; &#2348;&#2344;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">The mass ratio changes in different reactions</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2348;&#2342;&#2354;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Law of Definite Proportions</b>  -  This law states that a given compound always contains the same elements in the same fixed ratio by mass, regardless of the source or method of preparation. </p><p>For example, water (H&#8322;O) always contains hydrogen and oxygen in a mass ratio of approximately 1:8.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>According to Dalton's Atomic Theory, atoms of the same element are: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2337;&#2366;&#2354;&#2381;&#2335;&#2344; &#2325;&#2375; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2319;&#2325; &#2361;&#2368; &#2340;&#2340;&#2381;&#2357; &#2325;&#2375; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2361;&#2376;&#2306;: </p></span>",
    "options": [
      "<span class=\"eqt\">Different in mass and size</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2324;&#2352; &#2310;&#2325;&#2366;&#2352; &#2350;&#2375;&#2306; &#2349;&#2367;&#2344;&#2381;&#2344;</span>",
      "<span class=\"eqt\">Identical in size and mass</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2325;&#2366;&#2352; &#2324;&#2352; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Identical in size but different in mass</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2325;&#2366;&#2352; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2354;&#2375;&#2325;&#2367;&#2344; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2349;&#2367;&#2344;&#2381;&#2344;</span>",
      "<span class=\"eqt\">Different in chemical properties</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2327;&#2369;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2367;&#2344;&#2381;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Dalton's Atomic Theory states that atoms of the same element are identical in size, mass, and other properties.</p><p>According to Dalton, atoms of the same element have identical chemical properties. Chemical properties change only when atoms belong to different elements.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the correct statement related to Dalton's Atomic Theory? </p><p>I. According to Dalton's Atomic Theory, atoms are indivisible and indestructible.</p><p>II. Dalton's Atomic Theory was proposed in 1808.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2337;&#2366;&#2354;&#2381;&#2335;&#2344; &#2325;&#2375; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;?</p><p>I. &#2337;&#2366;&#2354;&#2381;&#2335;&#2344; &#2325;&#2375; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2309;&#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2324;&#2352; &#2309;&#2357;&#2367;&#2344;&#2366;&#2358;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2337;&#2366;&#2354;&#2381;&#2335;&#2344; &#2325;&#2366; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; 1808 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Dalton proposed that atoms are the smallest units of matter and cannot be divided, created, or destroyed in a chemical reaction. </p><p>&#183; However, modern atomic theory has shown that atoms are made up of subatomic particles (protons, neutrons, and electrons) and can be split in nuclear reactions.</p><p>&#183; John Dalton introduced his atomic theory in 1808, describing how atoms combine in fixed ratios to form compounds and explaining the laws of chemical combination.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The atomic mass of an element is defined as: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2340;&#2340;&#2381;&#2357; &#2325;&#2366; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">The mass of the element in grams</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2340;&#2381;&#2357; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2327;&#2381;&#2352;&#2366;&#2350; &#2350;&#2375;&#2306;</span>",
      "<span class=\"eqt\">The average mass of one atom of the element compared to 1/12th the mass of a carbon-12 atom</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2340;&#2381;&#2357; &#2325;&#2375; &#2319;&#2325; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2325;&#2366; &#2324;&#2360;&#2340; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;, &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;-12 &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2325;&#2375; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2325;&#2375; 1/12&#2357;&#2375;&#2306; &#2349;&#2366;&#2327; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306;</span>",
      "<span class=\"eqt\">The number of atoms in one mole of the element</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2340;&#2381;&#2357; &#2325;&#2375; &#2319;&#2325; &#2350;&#2379;&#2354; &#2350;&#2375;&#2306; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">The total number of electrons in an atom</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2350;&#2375;&#2306; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The atomic mass of an element is measured relative to <b>1/12th of the mass of a carbon-12 atom</b> (which is defined as exactly 12 amu). This relative atomic mass considers the presence of isotopes and their natural abundances.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The molecular mass of a compound is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2351;&#2380;&#2327;&#2367;&#2325; &#2325;&#2366; &#2310;&#2339;&#2357;&#2367;&#2325; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">The sum of the atomic masses of all atoms in the compound</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2380;&#2327;&#2367;&#2325; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">The mass of one molecule of the compound</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2380;&#2327;&#2367;&#2325; &#2325;&#2375; &#2319;&#2325; &#2309;&#2339;&#2369; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">The mass of one mole of the compound</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2380;&#2327;&#2367;&#2325; &#2325;&#2375; &#2319;&#2325; &#2350;&#2379;&#2354; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">The ratio of mass of compound to the mass of an atom</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2380;&#2327;&#2367;&#2325; &#2325;&#2375; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2325;&#2366; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2325;&#2375; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2360;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The molecular mass of a compound is the sum of the atomic masses of all the atoms in the compound.</p><p>Molecular mass does not involve a ratio between a compound's mass and an atom's mass. Instead, it is simply the sum of atomic masses in the molecule.</p><p>For example, the molecular mass of water (<b>H&#8322;O</b>) is:</p><p>&#183; Hydrogen: 2 X 1.008 u</p><p>&#183; Oxygen: 16.00 u</p><p>&#183; <b>Total molecular mass = 18.016 u</b></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Raoult's Law describes the relationship between:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2313;&#2354;&#2381;&#2335; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2348;&#2306;&#2343; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">The vapor pressure of a solution and the mole fraction of the solvent.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2354;&#2351;&#2344; &#2325;&#2366; &#2357;&#2366;&#2359;&#2381;&#2346; &#2342;&#2366;&#2348; &#2324;&#2352; &#2357;&#2367;&#2354;&#2366;&#2351;&#2325; &#2325;&#2366; &#2350;&#2379;&#2354; &#2309;&#2306;&#2358;&#2404;</span>",
      "<span class=\"eqt\">The boiling point of a solution and the concentration of the solute.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2354;&#2351;&#2344; &#2325;&#2366; &#2325;&#2381;&#2357;&#2341;&#2344;&#2366;&#2306;&#2325; &#2324;&#2352; &#2357;&#2367;&#2354;&#2375;&#2351; &#2325;&#2368; &#2360;&#2366;&#2306;&#2342;&#2381;&#2352;&#2340;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The freezing point of a solution and the temperature of the solvent.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2354;&#2351;&#2344; &#2325;&#2366; &#2361;&#2367;&#2350;&#2366;&#2306;&#2325; &#2340;&#2341;&#2366; &#2357;&#2367;&#2354;&#2366;&#2351;&#2325; &#2325;&#2366; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344;&#2404;</span>",
      "<span class=\"eqt\">The osmotic pressure of a solution and the molarity of the solute.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2354;&#2351;&#2344; &#2325;&#2366; &#2310;&#2360;&#2350;&#2366;&#2335;&#2367;&#2325; &#2342;&#2366;&#2348; &#2324;&#2352; &#2357;&#2367;&#2354;&#2375;&#2351; &#2325;&#2368; &#2350;&#2379;&#2354;&#2352;&#2340;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Raoult's Law states that the partial vapor pressure of a component in a solution is equal to the vapor pressure of the pure component multiplied by its mole fraction in the solution. Mathematically, it can be expressed as:</p><p>P&#8321; = X&#8321;  X  P&#8321;&deg;</p><p>Where:</p><p>&#183; P&#8321; is the partial vapor pressure of component 1 in the solution</p><p>&#183; X&#8321; is the mole fraction of component 1 in the solution</p><p>&#183; P&#8321;&deg; is the vapor pressure of pure component 1 at the same temperature</p><p>This law is applicable to ideal solutions and works best for solutions with similar molecular components. It's an important principle in understanding vapor-liquid equilibria and forms the basis for distillation processes.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The number of atoms in one mole of any substance is known as: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2375; &#2319;&#2325; &#2350;&#2379;&#2354; &#2350;&#2375;&#2306; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2311;&#2360; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Avogadro's number</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2379;&#2327;&#2366;&#2342;&#2381;&#2352;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Dalton's number</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2366;&#2354;&#2381;&#2335;&#2344; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Planck's number</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2376;&#2306;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Mole number</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The number of atoms in one mole of any substance is known as Avogadro's number (or Avogadro's constant).</p><p>Avogadro's number equals 6.022  X  10&#178;&ge; particles per mole. This fundamental constant represents the number of atoms, molecules, ions, or any other particles that are present in one mole of a substance.</p><p>For example:</p><p>&#183; One mole of carbon-12 contains 6.022  X  10&#178;&ge; carbon atoms</p><p>&#183; One mole of water contains 6.022  X  10&#178;&ge; water molecules</p><p>&#183; One mole of sodium chloride contains 6.022  X  10&#178;&ge; formula units of NaCl</p><p>This constant is named after Italian scientist Amedeo Avogadro, although he did not determine the exact number himself.</p><p>Planck's constant (h=6.626 X 10^{-34} J&#8901;s) is related to quantum mechanics and energy quantization, not the number of atoms in a mole.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The percentage of oxygen in carbon dioxide (CO2) is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; (CO2) &#2350;&#2375;&#2306; &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">33.33%</span><span class=\"hqt\" style=\"display:none\">33.33%</span>",
      "<span class=\"eqt\">66.67%</span><span class=\"hqt\" style=\"display:none\">66.67%</span>",
      "<span class=\"eqt\">72.72%</span><span class=\"hqt\" style=\"display:none\">72.72%</span>",
      "<span class=\"eqt\">25%</span><span class=\"hqt\" style=\"display:none\">25%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>To determine the <b>percentage of oxygen in carbon dioxide (CO&#8322;)</b>, we use the formula:</p><p><img width=512 height=52 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27561/image001.png\"></p><p>&#183; Carbon (C) = <b>12.01 u</b></p><p>&#183; Oxygen (O) = <b>16.00 u</b> (since there are 2 oxygen atoms, total = <b>2  X  16.00 = 32.00 u</b>)</p><p>&#183; Molecular mass of CO&#8322; = <b>12.01 + 32.00 = 44.01 u</b></p><p>The percentage of oxygen in CO2 is calculated as (2 X 16)/44 X 100=72.72%</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>The mole ratio of carbon to oxygen in the combustion of carbon (C) to form CO2 is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; (C) &#2325;&#2375; &#2342;&#2361;&#2344; &#2360;&#2375; CO2 &#2348;&#2344;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2360;&#2375; &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2325;&#2366; &#2350;&#2379;&#2354; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">1:1</span><span class=\"hqt\" style=\"display:none\">1:1</span>",
      "<span class=\"eqt\">1:2</span><span class=\"hqt\" style=\"display:none\">1:2</span>",
      "<span class=\"eqt\">2:1</span><span class=\"hqt\" style=\"display:none\">2:1</span>",
      "<span class=\"eqt\">1:3</span><span class=\"hqt\" style=\"display:none\">1:3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The combustion of carbon to form carbon dioxide (CO2&#8203;) follows the balanced chemical equation:</p><p>C+O2&rarr;CO2 &#8203; </p><p>&#183; <b>1 mole of carbon (C)</b> reacts with <b>1 mole of oxygen gas (O&#8322;)</b> to form <b>1 mole of carbon dioxide (CO&#8322;)</b>.</p><p>&#183; In <b>CO&#8322;</b>, there are <b>2 oxygen atoms for every 1 carbon atom</b>.</p><p>Thus, the <b>mole ratio of carbon to oxygen atoms in CO&#8322;</b> is <b>1:2</b>.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Boyle's Law states that: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2377;&#2351;&#2354; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350; &#2325;&#2361;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367;:</p></span>",
    "options": [
      "<span class=\"eqt\">At a constant temperature, the volume of a gas is directly proportional to its pressure.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2346;&#2352;, &#2325;&#2367;&#2360;&#2368; &#2327;&#2376;&#2360; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2313;&#2360;&#2325;&#2375; &#2342;&#2366;&#2348; &#2325;&#2375; &#2360;&#2368;&#2343;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">At a constant temperature, the volume of a gas is inversely proportional to its pressure.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2346;&#2352;, &#2325;&#2367;&#2360;&#2368; &#2327;&#2376;&#2360; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2313;&#2360;&#2325;&#2375; &#2342;&#2366;&#2348; &#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">At a constant pressure, the volume of a gas is directly proportional to its temperature.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352; &#2342;&#2366;&#2348; &#2346;&#2352;, &#2325;&#2367;&#2360;&#2368; &#2327;&#2376;&#2360; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2313;&#2360;&#2325;&#2375; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2325;&#2375; &#2360;&#2368;&#2343;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">At a constant volume, the pressure of a gas is inversely proportional to its temperature.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352; &#2310;&#2351;&#2340;&#2344; &#2346;&#2352;, &#2325;&#2367;&#2360;&#2368; &#2327;&#2376;&#2360; &#2325;&#2366; &#2342;&#2366;&#2348; &#2313;&#2360;&#2325;&#2375; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Boyle's Law states that the volume of a gas is inversely proportional to the pressure at constant temperature.</p><p>This means that as the pressure on a gas increases, its volume decreases, provided the temperature remains constant. This relationship can be mathematically represented as P X V=constant where P is the pressure and V is the volume.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>According to Avogadro's Law: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2357;&#2379;&#2327;&#2366;&#2342;&#2381;&#2352;&#2379; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;:</p></span>",
    "options": [
      "<span class=\"eqt\">Equal volumes of gases at the same temperature and pressure contain equal masses.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2366;&#2344; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2324;&#2352; &#2342;&#2348;&#2366;&#2357; &#2346;&#2352; &#2360;&#2350;&#2366;&#2344; &#2310;&#2351;&#2340;&#2344; &#2357;&#2366;&#2354;&#2368; &#2327;&#2376;&#2360;&#2379;&#2306; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Equal volumes of gases at the same temperature and pressure contain equal numbers of molecules.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2366;&#2344; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2324;&#2352; &#2342;&#2348;&#2366;&#2357; &#2346;&#2352; &#2360;&#2350;&#2366;&#2344; &#2310;&#2351;&#2340;&#2344; &#2357;&#2366;&#2354;&#2368; &#2327;&#2376;&#2360;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2309;&#2339;&#2369; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The pressure of a gas is proportional to its temperature.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2327;&#2376;&#2360; &#2325;&#2366; &#2342;&#2366;&#2348; &#2313;&#2360;&#2325;&#2375; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2367;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The volume of a gas is proportional to its pressure.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2327;&#2376;&#2360; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2313;&#2360;&#2325;&#2375; &#2342;&#2366;&#2348; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Avogadro's Law states that under the same conditions of temperature and pressure, equal volumes of all gases contain an equal number of molecules. This fundamental gas law was proposed by Amedeo Avogadro in 1811.</p><p>The law can be expressed mathematically as: V &#8733; n (when temperature and pressure are constant)</p><p>Where:</p><p>&#183; V is the volume of the gas</p><p>&#183; n is the number of moles of the gas</p><p>This means that the volume of a gas is directly proportional to the number of moles (or molecules) when temperature and pressure remain constant.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>The Dulong-Petit Law is related to: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2337;&#2369;&#2354;&#2379;&#2306;&#2327;-&#2346;&#2375;&#2335;&#2367;&#2335; &#2325;&#2366;&#2344;&#2370;&#2344; &#2325;&#2367;&#2360;&#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">The heat capacity of gases</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2360;&#2379;&#2306; &#2325;&#2368; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366;</span>",
      "<span class=\"eqt\">The heat required to raise the temperature of one mole of a substance</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2375; &#2319;&#2325; &#2350;&#2379;&#2354; &#2325;&#2366; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2314;&#2359;&#2381;&#2350;&#2366;</span>",
      "<span class=\"eqt\">The heat required to raise the temperature of one gram-atomic mass of a metal</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2343;&#2366;&#2340;&#2369; &#2325;&#2375; &#2319;&#2325; &#2327;&#2381;&#2352;&#2366;&#2350;-&#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2325;&#2366; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2314;&#2359;&#2381;&#2350;&#2366;</span>",
      "<span class=\"eqt\">The relationship between temperature and volume of gases</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2360;&#2379;&#2306; &#2325;&#2375; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2324;&#2352; &#2310;&#2351;&#2340;&#2344; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2348;&#2306;&#2343;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Dulong-Petit Law states that most metals require 6.2 calories of heat to raise the temperature of one gram-atomic mass of metal by one degree Celsius.</p><p>The Dulong-Petit Law, formulated by French physicists Pierre Louis Dulong and Alexis Th&#233;r&#232;se Petit in 1819, states that the molar heat capacity of solid elemental metals is approximately constant at about 25 J/mol&#183;K (or 6 cal/mol&#183;&deg;C). </p><p>More precisely, it states that the product of the specific heat capacity and the atomic weight (gram-atomic mass) of a solid element is approximately 6 calories per degree Celsius.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Gay-Lussac's Law deals with the relationship between: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2375;-&#2354;&#2369;&#2360;&#2366;&#2325; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2348;&#2306;&#2343; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Volume and temperature of a gas at constant pressure.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352; &#2342;&#2366;&#2348; &#2346;&#2352; &#2327;&#2376;&#2360; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2324;&#2352; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344;&#2404;</span>",
      "<span class=\"eqt\">Pressure and temperature of a gas at constant volume.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352; &#2310;&#2351;&#2340;&#2344; &#2346;&#2352; &#2327;&#2376;&#2360; &#2325;&#2366; &#2342;&#2348;&#2366;&#2357; &#2324;&#2352; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344;&#2404;</span>",
      "<span class=\"eqt\">Pressure and volume of a gas at constant temperature.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2346;&#2352; &#2327;&#2376;&#2360; &#2325;&#2366; &#2342;&#2348;&#2366;&#2357; &#2324;&#2352; &#2310;&#2351;&#2340;&#2344;&#2404;</span>",
      "<span class=\"eqt\">Volume and pressure of a gas at constant temperature.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2346;&#2352; &#2327;&#2376;&#2360; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2324;&#2352; &#2342;&#2366;&#2348;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Gay-Lussac's Law states that for a fixed mass of gas at constant volume, the pressure is directly proportional to the absolute temperature. This can be expressed mathematically as:</p><p>P &#8733; T (at constant volume)</p><p>or</p><p>P&#8321;/T&#8321; = P&#8322;/T&#8322;</p><p>Where:</p><p>&#183; P is the pressure of the gas</p><p>&#183; T is the absolute temperature (in Kelvin)</p><p>Gay-Lussac's Law is one of the fundamental gas laws in thermodynamics, helping explain how gases behave when heated or cooled while kept in a sealed container.</p><p>Further insights:</p><p>&#183; Option (1) describes Charles's Law (V &#8733; T at constant pressure) </p><p>&#183; Option (4) describes Boyle's Law (P &#8733; 1/V at constant temperature)</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>According to Henry's Law, if the pressure of a gas is doubled, the solubility of the gas will: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2375;&#2344;&#2352;&#2368; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2327;&#2376;&#2360; &#2325;&#2366; &#2342;&#2348;&#2366;&#2357; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2327;&#2376;&#2360; &#2325;&#2368; &#2328;&#2369;&#2354;&#2344;&#2358;&#2368;&#2354;&#2340;&#2366;: </p></span>",
    "options": [
      "<span class=\"eqt\">Remain the same</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2361;&#2368; &#2352;&#2361;&#2375;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Be halved</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2343;&#2366; &#2361;&#2379; &#2332;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Double</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2361;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Increase four times</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352; &#2327;&#2369;&#2344;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Henry's Law states that at a constant temperature, the amount of gas dissolved in a liquid is directly proportional to the partial pressure of the gas above the liquid. Mathematically, it's expressed as:</p><p>C = k  X  P</p><p>Where:</p><p>&#183; C is the solubility (concentration) of the gas in the liquid</p><p>&#183; k is Henry's constant (which depends on the specific gas, liquid, and temperature)</p><p>&#183; P is the partial pressure of the gas</p><p>Since the relationship is directly proportional, when the pressure (P) doubles, the solubility (C) also doubles, assuming temperature remains constant.</p><p>This principle explains many everyday phenomena, such as why carbonated beverages fizz when opened (pressure release reduces gas solubility) and why deep-sea divers must ascend slowly (to prevent dissolved nitrogen from forming bubbles in the bloodstream as pressure decreases).</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>The van't Hoff factor is used to describe: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2376;&#2344;&#2381;&#2335; &#2361;&#2377;&#2347; &#2325;&#2366;&#2352;&#2325; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">The boiling point of a solution</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2354;&#2351;&#2344; &#2325;&#2366; &#2325;&#2381;&#2357;&#2341;&#2344;&#2366;&#2306;&#2325;</span>",
      "<span class=\"eqt\">The extent of ionization or dissociation of solutes</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2354;&#2375;&#2351; &#2325;&#2375; &#2310;&#2351;&#2344;&#2368;&#2325;&#2352;&#2339; &#2351;&#2366; &#2346;&#2371;&#2341;&#2325;&#2381;&#2325;&#2352;&#2339; &#2325;&#2368; &#2360;&#2368;&#2350;&#2366;</span>",
      "<span class=\"eqt\">The mass of the solute in a solution</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2354;&#2351;&#2344; &#2350;&#2375;&#2306; &#2357;&#2367;&#2354;&#2375;&#2351; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">The volume of solvent in a solution</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2354;&#2351;&#2344; &#2350;&#2375;&#2306; &#2357;&#2367;&#2354;&#2366;&#2351;&#2325; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The van't Hoff factor represents the number of particles into which a solute dissociates in a solution.</p><p>The van't Hoff factor (i) is a measure that indicates the degree to which a solute dissociates or associates in solution. It represents the ratio of the actual number of particles produced when a compound dissolves to the number of formula units initially dissolved.</p><p>For example:</p><p>&#183; For non-electrolytes like sugar (which don't dissociate), i &#8776; 1</p><p>&#183; For strong electrolytes like NaCl (which completely dissociate into Na&#8314; and Cl&#8315;), i &#8776; 2</p><p>&#183; For strong electrolytes like CaCl&#8322; (which completely dissociate into Ca&#178;&#8314; and 2Cl&#8315;), i &#8776; 3</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the correct statement.</p><p>I. A Frenkel defect occurs when an atom is displaced from its normal lattice site to an interstitial site within the crystal structure.</p><p>II. Schottky defects are typically observed in ionic solids, where both cations and anions are missing from their regular lattice positions.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2347;&#2381;&#2352;&#2375;&#2306;&#2325;&#2375;&#2354; &#2342;&#2379;&#2359; &#2340;&#2348; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348; &#2319;&#2325; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2325;&#2381;&#2352;&#2367;&#2360;&#2381;&#2335;&#2354; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2309;&#2346;&#2344;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2332;&#2366;&#2354;&#2368; &#2360;&#2381;&#2341;&#2366;&#2344; &#2360;&#2375; &#2319;&#2325; &#2309;&#2306;&#2340;&#2352;&#2366;&#2354;&#2368;&#2351; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2357;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2358;&#2377;&#2335;&#2325;&#2368; &#2342;&#2379;&#2359; &#2310;&#2350; &#2340;&#2380;&#2352; &#2346;&#2352; &#2310;&#2351;&#2344;&#2367;&#2325; &#2336;&#2379;&#2360; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2375;&#2326;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2361;&#2366;&#2305; &#2343;&#2344;&#2366;&#2351;&#2344; &#2324;&#2352; &#2315;&#2339;&#2366;&#2351;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2309;&#2346;&#2344;&#2375; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2332;&#2366;&#2354;&#2368; &#2360;&#2381;&#2341;&#2366;&#2344; &#2360;&#2375; &#2327;&#2366;&#2351;&#2348; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Frenkel defect occurs when an atom (typically a smaller cation) is displaced from its normal lattice site to an interstitial site within the crystal structure, creating a vacancy at the original site and an interstitial atom elsewhere in the lattice. </p><p>&#183; This type of defect is common in ionic compounds with significant size differences between cations and anions, such as silver halides (AgCl, AgBr, AgI).</p><p>&#183; Schottky defects are indeed typically observed in ionic solids and occur when both cations and anions are missing from their regular lattice positions in stoichiometric proportions, maintaining electrical neutrality. </p><p>&#183; These paired vacancies form when ions move from the interior of the crystal to the surface. </p><p>&#183; Schottky defects are common in compounds with similar cation and anion sizes, such as NaCl and KCl.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following laws with their respective descriptions:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column A</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column B</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) Kohlrausch's Law</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. The total pressure of a gas mixture is the sum of the partial pressures of individual gases.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) Dalton's Law of Partial Pressures</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. The molar conductivity of an electrolyte is the sum of the individual contributions of its ions.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) Henry's Law</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. The solubility of a gas in a liquid is directly proportional to the pressure of the gas.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4) Avogadro's Law</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Equal volumes of gases at the same temperature and pressure contain equal numbers of molecules.</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366;&#2344;&#2370;&#2344;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2357;&#2367;&#2357;&#2352;&#2339; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) &#2325;&#2379;&#2361;&#2354;&#2352;&#2377;&#2358; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2327;&#2376;&#2360; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2366; &#2325;&#2369;&#2354; &#2342;&#2348;&#2366;&#2357; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2327;&#2376;&#2360;&#2379;&#2306; &#2325;&#2375; &#2310;&#2306;&#2358;&#2367;&#2325; &#2342;&#2348;&#2366;&#2357;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) &#2337;&#2366;&#2354;&#2381;&#2335;&#2344; &#2325;&#2366; &#2310;&#2306;&#2358;&#2367;&#2325; &#2342;&#2348;&#2366;&#2357; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2325;&#2367;&#2360;&#2368; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2354;&#2366;&#2311;&#2335; &#2325;&#2368; &#2350;&#2379;&#2354;&#2352; &#2330;&#2366;&#2354;&#2325;&#2340;&#2366; &#2313;&#2360;&#2325;&#2375; &#2310;&#2351;&#2344;&#2379;&#2306; &#2325;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2325;&#2366; &#2351;&#2379;&#2327; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) &#2361;&#2375;&#2344;&#2352;&#2368; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2325;&#2367;&#2360;&#2368; &#2327;&#2376;&#2360; &#2325;&#2368; &#2342;&#2381;&#2352;&#2357; &#2350;&#2375;&#2306; &#2328;&#2369;&#2354;&#2344;&#2358;&#2368;&#2354;&#2340;&#2366; &#2327;&#2376;&#2360; &#2325;&#2375; &#2342;&#2348;&#2366;&#2357; &#2325;&#2375; &#2360;&#2368;&#2343;&#2375; &#2310;&#2344;&#2369;&#2346;&#2366;&#2340;&#2367;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4) &#2309;&#2357;&#2379;&#2327;&#2366;&#2342;&#2381;&#2352;&#2379; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2360;&#2350;&#2366;&#2344; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2324;&#2352; &#2342;&#2348;&#2366;&#2357; &#2346;&#2352; &#2360;&#2350;&#2366;&#2344; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2327;&#2376;&#2360;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2309;&#2339;&#2369; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">1 - A, 2 - B, 3 - C, 4 - D</span><span class=\"hqt\" style=\"display:none\">1 - A, 2 - B, 3 - C, 4 - D</span>",
      "<span class=\"eqt\">1 - B, 2 - A, 3 - D, 4 - C</span><span class=\"hqt\" style=\"display:none\">1 - B, 2 - A, 3 - D, 4 - C</span>",
      "<span class=\"eqt\">1 - B, 2 - A, 3 - C, 4 - D</span><span class=\"hqt\" style=\"display:none\">1 - B, 2 - A, 3 - C, 4 - D</span>",
      "<span class=\"eqt\">1 - C, 2 - D, 3 - A, 4 - B</span><span class=\"hqt\" style=\"display:none\">1 - C, 2 - D, 3 - A, 4 - B</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Kohlrausch's Law states that the limiting molar conductivity of an electrolyte at infinite dilution is the sum of the limiting molar conductivities of the individual ions in the electrolyte.</p><p>&#183; Dalton's Law of Partial Pressures - The total pressure of a gas mixture is the sum of the partial pressures of individual gases. </p><p>&#183; Henry's Law - The solubility of a gas in a liquid is directly proportional to the pressure of the gas. </p><p>&#183; Avogadro's Law - Equal volumes of gases at the same temperature and pressure contain equal numbers of molecules.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following best defines a ligand in coordination chemistry?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2350;&#2344;&#2381;&#2357;&#2351; &#2352;&#2360;&#2366;&#2351;&#2344; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2350;&#2375;&#2306; &#2354;&#2367;&#2327;&#2376;&#2306;&#2337; &#2325;&#2379; &#2360;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2350; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A molecule or ion that donates electron pairs to a central metal atom or ion</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2309;&#2339;&#2369; &#2351;&#2366; &#2310;&#2351;&#2344; &#2332;&#2379; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2343;&#2366;&#2340;&#2369; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2351;&#2366; &#2310;&#2351;&#2344; &#2325;&#2379; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2351;&#2369;&#2327;&#2381;&#2350; &#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A metal that accepts electron pairs from a surrounding ion</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2343;&#2366;&#2340;&#2369; &#2332;&#2379; &#2310;&#2360;&#2346;&#2366;&#2360; &#2325;&#2375; &#2310;&#2351;&#2344; &#2360;&#2375; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2351;&#2369;&#2327;&#2381;&#2350; &#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A molecule that only interacts with non-metals</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2309;&#2339;&#2369; &#2332;&#2379; &#2325;&#2375;&#2357;&#2354; &#2309;&#2343;&#2366;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2361;&#2368; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A substance that increases the oxidation state of a metal</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2332;&#2379; &#2343;&#2366;&#2340;&#2369; &#2325;&#2368; &#2321;&#2325;&#2381;&#2360;&#2368;&#2325;&#2352;&#2339; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Ligands are molecules or ions that donate electron pairs to a central metal ion to form coordination compounds.</p><p>This definition accurately describes the role of ligands, which are Lewis bases that form coordinate covalent bonds by sharing their electron pairs with a central metal atom or ion, which acts as a Lewis acid. Examples of common ligands include water (H&#8322;O), ammonia (NH&#8323;), chloride ions (Cl&#8315;), and carbon monoxide (CO).</p>",
    "question_index": 19
  }
];
