    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>What is the economic justification for subsidies in the agriculture sector?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2360;&#2348;&#2381;&#2360;&#2367;&#2337;&#2368; &#2325;&#2366; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2324;&#2330;&#2367;&#2340;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">It is mostly used to provide benefits for rich farmers.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2332;&#2381;&#2351;&#2366;&#2342;&#2366;&#2340;&#2352; &#2309;&#2350;&#2368;&#2352; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2354;&#2366;&#2349; &#2346;&#2361;&#2369;&#2306;&#2330;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is a part of government expenditure in the service sector.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2360;&#2375;&#2357;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2357;&#2381;&#2351;&#2351; &#2325;&#2366; &#2319;&#2325; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is an incentive to provide the benefits of advanced technology and decrease the cost of production.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2313;&#2344;&#2381;&#2344;&#2340; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2325;&#2366; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2354;&#2366;&#2327;&#2340; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2346;&#2381;&#2352;&#2379;&#2340;&#2381;&#2360;&#2366;&#2361;&#2344; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is used to provide benefits for capital goods producers in agriculture.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2371;&#2359;&#2367; &#2350;&#2375;&#2306; &#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2357;&#2360;&#2381;&#2340;&#2369; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2379;&#2306; &#2325;&#2379; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Agricultural subsidies help small and marginal farmers by:</p><p>&#183; Lowering production costs through cheaper fertilizers, seeds, and irrigation.</p><p>&#183; Encouraging the adoption of modern techniques for better yields.</p><p>&#183; Ensuring price stability by supporting farmers through Minimum Support Prices (MSP).</p><p>Thus, subsidies are justified as they promote agricultural productivity and ensure food security.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The productivity of which of the following crops had initially increased due to the Green Revolution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2352;&#2367;&#2340; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2347;&#2360;&#2354; &#2325;&#2368; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366; &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2369;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rice and pulses</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2357;&#2354; &#2324;&#2352; &#2342;&#2366;&#2354;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Wheat and sugarcane</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2375;&#2361;&#2370;&#2306; &#2324;&#2352; &#2327;&#2344;&#2381;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Wheat and rice</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2375;&#2361;&#2370;&#2306; &#2324;&#2352; &#2330;&#2366;&#2357;&#2354;</span>",
      "<span class=\"eqt\">Rice and cotton</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2357;&#2354; &#2324;&#2352; &#2325;&#2346;&#2366;&#2360;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Wheat and Rice are the crops had initially increased due to the Green Revolution.</p><p>&bull; The Green Revolution refers to the significant increase in agricultural production, particularly of food grains like wheat and rice, achieved through the adoption of modern farming techniques.</p><p>&bull; Initiated in India during the mid-1960s, with major developments between 1967 and 1978.&#8203;</p><p>&bull; Key Contributors:</p><p>&#9675; Dr. M.S. Swaminathan  -  Known as the Father of the Green Revolution in India.</p><p>&#9675; Dr. Norman Borlaug  -  Recognized globally for his contributions to high-yielding crop varieties.&#8203;</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What was the status of the agricultural sector in India before the Green Revolution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2352;&#2367;&#2340; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2371;&#2359;&#2367; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2381;&#2351;&#2366; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Use of old technology and the absence of required infrastructure</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2352;&#2366;&#2344;&#2368; &#2340;&#2325;&#2344;&#2368;&#2325; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2324;&#2352; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2348;&#2369;&#2344;&#2367;&#2351;&#2366;&#2342;&#2368; &#2338;&#2366;&#2306;&#2330;&#2375; &#2325;&#2366; &#2309;&#2349;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Use of advanced technology and high productivity</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2344;&#2340; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2324;&#2352; &#2313;&#2330;&#2381;&#2330; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">Use of advanced technology and dependency on rainfall</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2344;&#2340; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2324;&#2352; &#2357;&#2352;&#2381;&#2359;&#2366; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Use of traditional technology and the abundance of required infrastructure</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2324;&#2352; &#2309;&#2346;&#2375;&#2325;&#2381;&#2359;&#2367;&#2340; &#2348;&#2369;&#2344;&#2367;&#2351;&#2366;&#2342;&#2368; &#2338;&#2366;&#2306;&#2330;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2330;&#2369;&#2352;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Status of Agriculture sector in India before the Green Revolution:</p><p>&#9675; Agricultural productivity was low due to old technology, absence of required infrastructure, lack of irrigation facilities, and minimal use of fertilizers.</p><p>&#9675; Agriculture was the backbone of India's economy, employing approximately 75% of the population</p><p>&#9675; Farming was heavily reliant on monsoon rains, leading to inconsistent crop yields and vulnerability to droughts.</p><p>&#9675; Systems like Zamindari led to exploitation of farmers, with high rents and little incentive for land improvement.</p><p>&#9675; Farmers had minimal access to institutional credit, often relying on moneylenders with high-interest rates.</p><p>&#9675; Frequent famines and food shortages were common, highlighting the sector's inability to meet the population's needs. &#8203;</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What action was taken by the government to celebrate the achievement of the Green Revolution in agriculture?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2350;&#2375;&#2306; &#2361;&#2352;&#2367;&#2340; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367; &#2325;&#2368; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2367; &#2325;&#2366; &#2332;&#2358;&#2381;&#2344; &#2350;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2352;&#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2381;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2352;&#2357;&#2366;&#2312; &#2325;&#2368; &#2327;&#2312;?</span>",
    "options": [
      "<span class=\"eqt\">Released a regular salary for farmers</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2357;&#2375;&#2340;&#2344; &#2332;&#2366;&#2352;&#2368; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Distributed free food to all the people</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2307;&#2358;&#2369;&#2354;&#2381;&#2325; &#2349;&#2379;&#2332;&#2344; &#2357;&#2367;&#2340;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Released a special stamp, 'Wheat Revolution'</span><span class=\"hqt\" style=\"display:none\">'&#2327;&#2375;&#2361;&#2370;&#2305; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367;' &#2344;&#2366;&#2350;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359; &#2337;&#2366;&#2325; &#2335;&#2367;&#2325;&#2335; &#2332;&#2366;&#2352;&#2368; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Distributed green vegetables to the people</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2379; &#2361;&#2352;&#2368; &#2360;&#2348;&#2381;&#2332;&#2367;&#2351;&#2366;&#2306; &#2357;&#2367;&#2340;&#2352;&#2367;&#2340; &#2325;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>To commemorate the success of the Green Revolution, the Indian government issued a stamp called 'Wheat Revolution' in 1968, highlighting the increased wheat production due to modern farming techniques.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What is the primary objective of the Micro, Small, and Medium Enterprises Development (MSMED) Act of 2006 in India?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350;, &#2354;&#2328;&#2369; &#2324;&#2352; &#2350;&#2343;&#2381;&#2351;&#2350; &#2313;&#2342;&#2381;&#2351;&#2350; &#2357;&#2367;&#2325;&#2366;&#2360; (&#2319;&#2350;&#2319;&#2360;&#2319;&#2350;&#2312;&#2337;&#2368;) &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; 2006 &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">To regulate foreign companies</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To focus on large-scale industries only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2348;&#2337;&#2364;&#2375; &#2346;&#2376;&#2350;&#2366;&#2344;&#2375; &#2325;&#2375; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2346;&#2352; &#2343;&#2381;&#2351;&#2366;&#2344; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To increase import tariffs to protect MSMEs</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;&#2319;&#2360;&#2319;&#2350;&#2312; &#2325;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2351;&#2366;&#2340; &#2358;&#2369;&#2354;&#2381;&#2325; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">To promote and facilitate the development of MSMEs</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;&#2319;&#2360;&#2319;&#2350;&#2312; &#2325;&#2375; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366; &#2324;&#2352; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The MSMED Act, 2006 was enacted to promote, develop, and enhance the competitiveness of Micro, Small, and Medium Enterprises (MSMEs). It provides legal status to MSMEs and facilitates financial support, subsidies, and incentives.</p><p>Hence, option 4 (To promote and facilitate the development of MSMEs) is the correct answer.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In an economy, fisheries are a part of __________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306;, &#2350;&#2340;&#2381;&#2360;&#2381;&#2351; &#2346;&#2366;&#2354;&#2344; __________ &#2325;&#2366; &#2319;&#2325; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">tertiary sector</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2371;&#2340;&#2368;&#2351;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">secondary sector</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">either secondary or tertiary sector</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2366; &#2340;&#2379; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2351;&#2366; &#2340;&#2371;&#2340;&#2368;&#2351;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">primary sector</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In an economy, fisheries are a part of primary sector. The <b>primary sector of the economy</b> includes any industry involved in the extraction and production of raw materials, such as farming, logging, fishing, forestry and mining.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which industrial policy marked the beginning of liberalisation in the Indian industry, reducing the restrictions on private companies?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2350;&#2375;&#2306; &#2313;&#2342;&#2366;&#2352;&#2368;&#2325;&#2352;&#2339; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2368;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2344;&#2367;&#2332;&#2368; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2306;&#2343; &#2325;&#2350; &#2361;&#2379; &#2327;&#2319;?</span>",
    "options": [
      "<span class=\"eqt\">Industrial Policy 1991</span><span class=\"hqt\" style=\"display:none\">&#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367; 1991</span>",
      "<span class=\"eqt\">Industrial Policy 1980</span><span class=\"hqt\" style=\"display:none\">&#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367; 1980</span>",
      "<span class=\"eqt\">Industrial Policy 1977</span><span class=\"hqt\" style=\"display:none\">&#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367; 1977</span>",
      "<span class=\"eqt\">Industrial Policy 1956</span><span class=\"hqt\" style=\"display:none\">&#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367; 1956</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Industrial Policy of 1991 was a landmark reform in India's economic history. It introduced liberalization, privatization, and globalization (LPG) policies, allowing more private and foreign investments and reducing government control over industries.</p><p>Prior to 1991, the Indian economy was largely state-controlled with strict regulations. The reforms aimed to improve efficiency, boost economic growth, and attract foreign investment.</p><p>Hence, option (1) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What is the primary goal of the International Comparison Programme (ICP), led by the United Nations Statistics Division (UNSD)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2360;&#2366;&#2306;&#2326;&#2381;&#2351;&#2367;&#2325;&#2368; &#2346;&#2381;&#2352;&#2349;&#2366;&#2327; (&#2351;&#2370;&#2319;&#2344;&#2319;&#2360;&#2337;&#2368;) &#2325;&#2375; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2340;&#2369;&#2354;&#2344;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; (&#2310;&#2312;&#2360;&#2368;&#2346;&#2368;) &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To calculate Purchasing Power Parities (PPPs) and price level indices</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2351; &#2358;&#2325;&#2381;&#2340;&#2367; &#2360;&#2350;&#2340;&#2366; (&#2346;&#2368;&#2346;&#2368;&#2346;&#2368;) &#2324;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2381;&#2340;&#2352; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To collect data on international trade</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2346;&#2352; &#2337;&#2375;&#2335;&#2366; &#2319;&#2325;&#2340;&#2381;&#2352; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To implement statistical offices globally</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2381;&#2357; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2360;&#2366;&#2306;&#2326;&#2381;&#2351;&#2367;&#2325;&#2368;&#2351; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2325;&#2379; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2344;&#2381;&#2357;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To produce unemployment estimates globally</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2376;&#2358;&#2381;&#2357;&#2367;&#2325; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2348;&#2375;&#2352;&#2379;&#2332;&#2327;&#2366;&#2352;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; &#2354;&#2327;&#2366;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The primary goal of the International comparison Programme(ICP), led by the United Nation Statistics Division (UNSD) is to calculate Purchasing Power Parities(PPPs) and price level indices.</p><p>&bull; PPPs are exchange rates that equalize the purchasing power of different currencies by eliminating differences in price levels between countries.</p><p>&bull; PLIs are ratios of a country's PPP to its market exchange rate, used to compare relative cost of goods and services across countries.</p>",
    "question_index": 7

    "question": "<span class=\"eqt\"><p>Which of the following best defines liberalisation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2313;&#2342;&#2366;&#2352;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2350; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The process of enforcing strict government control over economic activities.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2360;&#2326;&#2381;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The process of maintaining existing government regulations and restrictions on economic activities.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2350;&#2380;&#2332;&#2370;&#2342;&#2366; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2344;&#2367;&#2351;&#2350;&#2379;&#2306; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2306;&#2343;&#2379;&#2306; &#2325;&#2379; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The process of increasing government regulations and restrictions on economic activities.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2306;&#2343; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The process of reducing or removing government regulations and restrictions on economic activities.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344;&#2379;&#2306; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2306;&#2343;&#2379;&#2306; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2351;&#2366; &#2361;&#2335;&#2366;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Liberalisation is the process of reducing or removing government regulation and restriction on economic activities.</p><p>&bull; Liberalisation involves the elimination or reduction of government controls over economic activities, allowing for greater participation of private entities and fostering a more market-oriented economy. This shift aims to increase efficiency, attract foreign investment, and integrate the economy with global markets.</p><p>&bull; Objectives of Liberalisation in India</p><p>&#9675; Enhance Global Market Integration: Develop a global market presence for the nation.</p><p>&#9675; Promote Foreign Trade: Encourage exports and manage imports effectively.</p><p>&#9675; Reduce Debt Burden: Alleviate the nation's debt through increased economic activity.</p><p>&#9675; Encourage Domestic Competition: Foster competition among domestic businesses to improve quality and efficiency.</p><p>&#9675; Attract Foreign Investment: Invite multinational corporations to invest and expand operations in India.</p><p>&#9675; Improve Technology and Capital: Facilitate the inflow of advanced technology and foreign capital.</p>",
    "question_index": 8
  },

    "question": "<span class=\"eqt\"><p>Which of the following is a possible criticism of privatisation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2344;&#2367;&#2332;&#2368;&#2325;&#2352;&#2339; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2310;&#2354;&#2379;&#2330;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Excessive government interference into private businesses</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2332;&#2368; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2361;&#2360;&#2381;&#2340;&#2325;&#2381;&#2359;&#2375;&#2346;</span>",
      "<span class=\"eqt\">Reduced competition and innovation in the market</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2332;&#2364;&#2366;&#2352; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2324;&#2352; &#2344;&#2357;&#2368;&#2344;&#2340;&#2366; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Limited access to essential services for marginalised populations</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2358;&#2367;&#2319; &#2346;&#2352; &#2350;&#2380;&#2332;&#2370;&#2342; &#2310;&#2348;&#2366;&#2342;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2340;&#2325; &#2360;&#2368;&#2350;&#2367;&#2340; &#2346;&#2361;&#2369;&#2306;&#2330;</span>",
      "<span class=\"eqt\">Expansion of bureaucracy and efficiency in public enterprises</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2313;&#2342;&#2381;&#2351;&#2350;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2380;&#2325;&#2352;&#2358;&#2366;&#2361;&#2368; &#2319;&#2357;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2369;&#2358;&#2354;&#2340;&#2366; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352;</span>"

    "solution": "<p>Privatization can face criticism for potentially resulting in <b>limited access to essential services for marginalized populations.</b> The concern arises from the idea that private entities may prioritize profitability over universal accessibility, affecting the availability of vital services for those with limited financial means.</p>",
