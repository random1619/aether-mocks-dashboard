    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following best describes 'matter'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2358;&#2348;&#2381;&#2342; '&#2346;&#2342;&#2366;&#2352;&#2381;&#2341;' &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Anything that has mass but does not occupy space.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2361;&#2379; &#2346;&#2352;&#2344;&#2381;&#2340;&#2369; &#2360;&#2381;&#2341;&#2366;&#2344; &#2344; &#2328;&#2375;&#2352;&#2340;&#2368; &#2361;&#2379;&#2404;</span>",
      "<span class=\"eqt\">Anything that occupies space but does not have mass.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2332;&#2379; &#2360;&#2381;&#2341;&#2366;&#2344; &#2328;&#2375;&#2352;&#2340;&#2368; &#2361;&#2376; &#2346;&#2352;&#2344;&#2381;&#2340;&#2369; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2344;&#2361;&#2368;&#2306; &#2352;&#2326;&#2340;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Anything that has both mass and occupies space.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2361;&#2379; &#2324;&#2352; &#2332;&#2379; &#2360;&#2381;&#2341;&#2366;&#2344; &#2349;&#2368; &#2328;&#2375;&#2352;&#2340;&#2368; &#2361;&#2379;&#2404;</span>",
      "<span class=\"eqt\">Anything that has neither mass nor occupies space.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2344; &#2340;&#2379; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2361;&#2379; &#2324;&#2352; &#2344; &#2361;&#2368; &#2357;&#2361; &#2360;&#2381;&#2341;&#2366;&#2344; &#2328;&#2375;&#2352;&#2340;&#2368; &#2361;&#2379;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Matter is defined by two essential properties: mass and the space it occupies.</b> </p><p><b>Further Insight:</b></p><p>&bull; Matter is everything around us, encompassing all things with different shapes, sizes, and textures. Whether it is air, water, plants, or animals, all these are forms of matter.</p><p>&bull; <b>Matter has mass and occupies space. </b></p><p>&#9675; <b>These two characteristics differentiate matter from other concepts like energy.</b></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is <b>NOT</b> a characteristic of plasma, the fourth state of matter?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2346;&#2381;&#2354;&#2366;&#2332;&#2381;&#2350;&#2366;, &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2368; &#2330;&#2380;&#2341;&#2368; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366;, &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Plasma is composed of ionized gas particles.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2366;&#2332;&#2381;&#2350;&#2366; &#2310;&#2351;&#2344;&#2367;&#2340; &#2327;&#2376;&#2360; &#2325;&#2339;&#2379;&#2306; &#2360;&#2375; &#2348;&#2344;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Plasma conducts electricity due to free electrons.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2366;&#2332;&#2381;&#2350;&#2366; &#2350;&#2369;&#2325;&#2381;&#2340; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2325;&#2366; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Plasma has a definite shape and volume like solids.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2366;&#2332;&#2381;&#2350;&#2366; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2324;&#2352; &#2310;&#2351;&#2340;&#2344; &#2336;&#2379;&#2360; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2368; &#2340;&#2352;&#2361; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Plasma can be found in stars and lightning.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2366;&#2332;&#2381;&#2350;&#2366; &#2340;&#2366;&#2352;&#2379;&#2306; &#2324;&#2352; &#2348;&#2367;&#2332;&#2354;&#2368; &#2350;&#2375;&#2306; &#2346;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Plasma, the fourth state of matter, is composed of ionized particles, meaning the gas has been heated so much that electrons are stripped away from atoms, resulting in a mixture of free electrons and positively charged ions.</b></p><p>&bull; <b>Plasma conducts electricity because of these free electrons, which move freely and carry charge. </b></p><p>&bull; <b>Plasma is commonly found in stars, lightning, and other ionized environments.</b></p><p><b>Further Insight:</b></p><p>&bull; <img width=624 height=253 id=image10.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25930/image001.png\"></p><p>&bull; <img width=624 height=357 id=image8.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25930/image002.png\"></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>When the temperature of a substance is increased ____________</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2366; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2348;&#2338;&#2364;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; ____________</p></span>",
    "options": [
      "<span class=\"eqt\">Intermolecular force between substance increases</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2340;&#2352;&#2366;&#2310;&#2339;&#2357;&#2367;&#2325; &#2348;&#2354; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Kinetic energy of particles of substance increases</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2375; &#2325;&#2339;&#2379;&#2306; &#2325;&#2368; &#2327;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Density of the substance increases</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2366; &#2328;&#2344;&#2340;&#2381;&#2357; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Mass of the substance increases</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>When temperature increases, the kinetic energy of the particles in a substance increases.</b></p><p>&bull; Intermolecular forces weaken with an increase in temperature.</p><p>&bull; Density often decreases as particles spread out at higher temperatures.</p><p>&bull; Mass remains constant despite temperature changes.</p><p><b>Further Insight:</b></p><p>&bull; <img width=624 height=343 id=image9.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25930/image003.png\"></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following best describes the Bose-Einstein Condensate (BEC)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2348;&#2379;&#2360;-&#2310;&#2311;&#2306;&#2360;&#2381;&#2335;&#2368;&#2344; &#2325;&#2306;&#2337;&#2375;&#2344;&#2360;&#2375;&#2335; (&#2348;&#2368;&#2312;&#2360;&#2368;) &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A state of matter formed at extremely high temperatures.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2340;&#2381;&#2351;&#2306;&#2340; &#2313;&#2330;&#2381;&#2330; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2368; &#2319;&#2325; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">A state of matter with high energy particles.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2339;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2368; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">A state of matter that forms at near absolute zero temperature.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2368; &#2357;&#2361; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2332;&#2379; &#2346;&#2352;&#2350; &#2358;&#2370;&#2344;&#2381;&#2351; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2346;&#2352; &#2348;&#2344;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A state of matter that occurs naturally in the Earth's atmosphere.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2368; &#2357;&#2361; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2332;&#2379; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2375; &#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2366;&#2349;&#2366;&#2357;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Bose-Einstein Condensate (BEC) is the fifth state of matter predicted by Satyendra Nath Bose and confirmed by Albert Einstein. </b></p><p>&bull; <b>It is a state of matter that forms at near absolute zero temperature.</b></p><p><b>Further Insight:</b></p><p>&bull; Bose-Einstein Condensate (BEC) is the fifth state of matter predicted by Satyendra Nath Bose and confirmed by Albert Einstein.</p><p>&#9675; It is formed when a gas of bosons is cooled to temperatures close to absolute zero (0 Kelvin or -273.15&deg;C).</p><p>&#9675; At this point, the particles lose their individual identities and clump together, behaving as a single quantum entity. </p><p>&#9675; This phenomenon was first observed experimentally in the 1990s. </p><p>&#9675; <b>The BEC exhibits unique properties like superfluidity and zero viscosity.</b></p><p><b><img width=624 height=357 id=image7.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25930/image004.jpg\"></b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is true about the intermolecular space in different states of matter?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2368; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2352;&#2366;&#2310;&#2339;&#2357;&#2367;&#2325; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Solids have the largest intermolecular space.</span><span class=\"hqt\" style=\"display:none\">&#2336;&#2379;&#2360;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2352;&#2366;&#2339;&#2381;&#2357;&#2367;&#2325; &#2360;&#2381;&#2341;&#2366;&#2344; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Gases have the smallest intermolecular space.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2360;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2352;&#2366;&#2339;&#2381;&#2357;&#2367;&#2325; &#2360;&#2381;&#2341;&#2366;&#2344; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Liquids have more intermolecular space than solids but less than gases.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306; &#2336;&#2379;&#2360;&#2379;&#2306; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325; &#2309;&#2306;&#2340;&#2352;&#2366;&#2339;&#2381;&#2357;&#2367;&#2325; &#2360;&#2381;&#2341;&#2366;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2327;&#2376;&#2360;&#2379;&#2306; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2325;&#2350; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">All states have the same intermolecular space.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2309;&#2306;&#2340;&#2352;&#2366;&#2339;&#2381;&#2357;&#2367;&#2325; &#2360;&#2381;&#2341;&#2366;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Liquids have moderate intermolecular space between particles, larger than solids but smaller than gases.</p><p>&bull; Solids have the smallest intermolecular space.</p><p>&bull; Gases have the largest intermolecular space..</p><p><b>Further Insight:</b></p><p>&bull; <img width=619 height=210 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25930/image005.jpg\"></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following correctly describes the property of gases?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2327;&#2376;&#2360;&#2379;&#2306; &#2325;&#2375; &#2327;&#2369;&#2339; &#2325;&#2366; &#2360;&#2361;&#2368; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Gases are incompressible and have fixed volume.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2360;&#2375;&#2306; &#2309;&#2360;&#2306;&#2346;&#2368;&#2337;&#2381;&#2351; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; &#2313;&#2344;&#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Gases expand to fill the shape and volume of their container.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2360;&#2375;&#2306; &#2309;&#2346;&#2344;&#2375; &#2346;&#2366;&#2340;&#2381;&#2352; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2324;&#2352; &#2310;&#2351;&#2340;&#2344; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2347;&#2376;&#2354;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Gases have strong intermolecular forces.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2360;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2348;&#2354; &#2309;&#2306;&#2340;&#2352;&#2366;&#2339;&#2381;&#2357;&#2367;&#2325; &#2348;&#2354; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Gases can never be converted to liquids.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2360;&#2379;&#2306; &#2325;&#2379; &#2325;&#2349;&#2368; &#2349;&#2368; &#2342;&#2381;&#2352;&#2357; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Gases, unlike solids and liquids, do not have a fixed volume and can expand to fill any container.</b></p><p>&bull; <b>Gases are compressible and do not have a fixed volume.</b></p><p>&bull; <b>Gases have very weak intermolecular forces.</b></p><p>&bull; <b>Gases can be liquefied by cooling or applying pressure.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Gaseous State</b></p><p>&#9675; Characteristics:</p><p>&#9632; Neither definite shape nor volume.</p><p>&#9632; Particles move rapidly, occupying the entire container.</p><p>&#9632; Highly compressible and exert pressure on the container walls.</p><p>&#9675; Properties of Gases:</p><p>&#9632; Compressibility: Volume decreases under pressure.</p><p>&#9632; Diffusibility: Ability to mix and spread.</p><p>&#9675; Examples: Air, oxygen, carbon dioxide.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an example of sublimation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2313;&#2352;&#2381;&#2343;&#2381;&#2357;&#2346;&#2366;&#2340;&#2344; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Boiling of water</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2313;&#2348;&#2354;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Melting of ice</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2352;&#2381;&#2347; &#2325;&#2366; &#2346;&#2367;&#2328;&#2354;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Conversion of dry ice to gas</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2359;&#2381;&#2325; &#2348;&#2352;&#2381;&#2347; &#2325;&#2366; &#2327;&#2376;&#2360; &#2350;&#2375;&#2306; &#2352;&#2370;&#2346;&#2366;&#2306;&#2340;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Condensation of water vapor</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2354; &#2357;&#2366;&#2359;&#2381;&#2346; &#2325;&#2366; &#2360;&#2306;&#2328;&#2344;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Sublimation refers to the direct conversion of a solid to gas without passing through the liquid state, which is seen in dry ice.</b></p><p>&bull; <b>Boiling refers to the conversion from liquid to gas.</b></p><p>&bull; <b>Melting involves a solid converting to a liquid.</b></p><p>&bull; <b>Condensation is the process where gas converts to liquid.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Interconversion of States of Matter</b></p><p>&bull; Matter can change from one state to another through changes in temperature and pressure:</p><p>&#9675; <b>Melting</b>: Solid to liquid.</p><p>&#9675; <b>Boiling</b>: Liquid to gas.</p><p>&#9675; <b>Condensation</b>: Gas to liquid.</p><p>&#9675; <b>Freezing</b>: Liquid to solid.</p><p>&#9675; <b>Sublimation</b>: Solid to gas directly (e.g., dry ice).</p><p>&bull; <img width=421 height=277 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25930/image006.png\"></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which process describes the direct conversion of gas to solid without passing through the liquid phase?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2340;&#2352;&#2354; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2375; &#2348;&#2367;&#2344;&#2366; &#2327;&#2376;&#2360; &#2325;&#2379; &#2360;&#2368;&#2343;&#2375; &#2336;&#2379;&#2360; &#2350;&#2375;&#2306; &#2352;&#2370;&#2346;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Evaporation</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2359;&#2381;&#2346;&#2368;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Sublimation</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2368; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Deposition</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2325;&#2381;&#2359;&#2375;&#2346;</span>",
      "<span class=\"eqt\">Melting</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2354;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Deposition is the process where a gas directly converts into a solid, skipping the liquid phase</b>.</p><p>&bull; <b>Evaporation</b> refers to the conversion of a liquid into a gas.</p><p>&bull; <b>Sublimation</b> refers to the direct change from a solid to a gas (the opposite of deposition).</p><p>&bull; <b>Melting </b>refers to the change from a solid to a liquid.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>What is meant by the latent heat of fusion?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2354;&#2351;&#2344; &#2325;&#2368; &#2327;&#2369;&#2346;&#2381;&#2340; &#2314;&#2359;&#2381;&#2350;&#2366; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2340;&#2366;&#2340;&#2381;&#2346;&#2352;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The heat required to raise the temperature of a liquid by 1&deg;C.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2342;&#2381;&#2352;&#2357; &#2325;&#2366; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; 1 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2360;&#2375;&#2354;&#2381;&#2360;&#2367;&#2351;&#2360; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2314;&#2359;&#2381;&#2350;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The heat required to change 1 kg of solid to liquid at its melting point without changing the temperature.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2367;&#2319; &#2348;&#2367;&#2344;&#2366; 1 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2336;&#2379;&#2360; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2327;&#2354;&#2344;&#2366;&#2306;&#2325; &#2346;&#2352; &#2342;&#2381;&#2352;&#2357; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2314;&#2359;&#2381;&#2350;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The heat required to convert a liquid to gas at its boiling point.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2342;&#2381;&#2352;&#2357; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2325;&#2381;&#2357;&#2341;&#2344;&#2366;&#2306;&#2325; &#2346;&#2352; &#2327;&#2376;&#2360; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2314;&#2359;&#2381;&#2350;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The heat required to increase the temperature of a gas by 10&deg;C.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2327;&#2376;&#2360; &#2325;&#2366; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; 10&deg;C &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2314;&#2359;&#2381;&#2350;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The latent heat of fusion is defined as the amount of heat required to convert 1 kg of a solid substance into liquid at its melting point</b>, without any change in temperature. </p><p>&bull; For example, the latent heat of fusion for ice is the energy needed to change ice at 0&deg;C to water at 0&deg;C, which is 334 kJ/kg. </p><p><b>Further Insight:</b></p> <h3 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt;page-break-after:auto;background:white'>&bull; <b>Latent Heat of Vaporisation</b></h3><p>&#9675; It is the amount of heat energy required to change 1 kg of a liquid into gas at atmospheric pressure at its boiling point.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an example of a compound?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2351;&#2380;&#2327;&#2367;&#2325; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Air</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2369;</span>",
      "<span class=\"eqt\">Carbon dioxide</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2312;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Saltwater</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2350;&#2325; &#2325;&#2366; &#2346;&#2366;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Iron filings and sand</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2361;&#2375; &#2325;&#2366; &#2348;&#2369;&#2352;&#2366;&#2342;&#2366; &#2324;&#2352; &#2352;&#2375;&#2340;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Carbon dioxide (CO2) is a compound formed by the chemical combination of carbon and oxygen atoms.</p><p>&bull; <b>Air</b> is a mixture of gases, not a compound.</p><p>&bull; <b>Salt water</b> is a mixture, not a compound.</p><p>&bull; <b>Iron filings and sand</b> is a heterogeneous mixture.</p><p><b>Further Insight:</b></p><p>&bull; <b>Atom:</b></p><p>&#9675; The smallest unit of matter that retains the properties of an element.</p><p>&#9675; Consists of protons, neutrons, and electrons.</p><p>&#9675; Example: A hydrogen atom (H) consists of one proton and one electron.</p> <h3 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt;page-break-after:auto'>&bull; <b>Molecule:</b></h3><p>&#9675; Formed when two or more atoms bond together.</p><p>&#9675; Can be made of the same or different elements.</p><p>&#9675; Example: O2O_2O2&#8203; (oxygen molecule), H2OH_2OH2&#8203;O (water molecule).</p><p>&#9675; Molecules can be elemental (same type of atom) or compound (different types of atoms).</p> <h3 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt;page-break-after:auto'>&bull; <b>Element:</b></h3><p>&#9675; A substance made of only one type of atom.</p><p>&#9675; Cannot be broken down into simpler substances by chemical means.</p><p>&#9675; Example: Oxygen (O), Gold (Au).</p><p>&#9675; Elements can combine to form compounds.</p> <h3 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt;page-break-after:auto'>&bull; <b>Compound:</b></h3><p>&#9675; A substance formed when two or more different elements chemically bond in fixed ratios.</p><p>&#9675; Properties of compounds are different from the elements that form them.</p><p>&#9675; Example: Water (H&#8322;O) is a compound made of hydrogen and oxygen. </p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about matter:</p><p>a) Matter is anything that has mass and occupies space.</p><p>b) Matter can only exist in solid, liquid, and gas states.</p><p>c) Plasma and Bose-Einstein Condensate are not considered states of matter.</p><p>Which of the following is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a) &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2357;&#2361; &#2330;&#2368;&#2332; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2332;&#2379; &#2360;&#2381;&#2341;&#2366;&#2344; &#2328;&#2375;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>b) &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2375;&#2357;&#2354; &#2336;&#2379;&#2360;, &#2340;&#2352;&#2354; &#2324;&#2352; &#2327;&#2376;&#2360;&#2368;&#2351; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2361;&#2368; &#2350;&#2380;&#2332;&#2370;&#2342; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>c) &#2346;&#2381;&#2354;&#2366;&#2332;&#2381;&#2350;&#2366; &#2324;&#2352; &#2348;&#2379;&#2360;-&#2310;&#2311;&#2306;&#2360;&#2381;&#2335;&#2368;&#2344; &#2325;&#2306;&#2337;&#2375;&#2344;&#2360;&#2375;&#2335; &#2325;&#2379; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2368; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2344;&#2361;&#2368;&#2306; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a is correct.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2360;&#2361;&#2368; &#2361;&#2376;.</span>",
      "<span class=\"eqt\">Only a and b are correct.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Only a and c are correct.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Only b and c are correct.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Matter is anything that has mass and occupies space</p><p>&bull; Matter also exists in plasma and Bose-Einstein condensate states. </p><p><b>Further Insight:</b></p><p>&bull; Matter is everything around us, encompassing all things with different shapes, sizes, and textures. Whether it is air, water, plants, or animals, all these are forms of matter.</p><p>&#9675; <b>Matter has mass and occupies space. </b></p><p>&#9632; <b>These two characteristics differentiate matter from other concepts like energy.</b></p><p>&#9675; </p><p>&bull; <b>Properties of Matter</b></p><p>&#9675; <b>Made of Particles</b>: Matter consists of tiny particles such as atoms and molecules.</p><p>&#9675; <b>Intermolecular Space</b>: There is space between particles, called intermolecular space.</p><p>&#9675; <b>Kinetic Energy</b>: Particles in matter are in continuous motion. The speed of these particles, and thus their kinetic energy, increases with temperature.</p><p>&#9675; <b>Intermolecular Force</b>: Particles attract each other via intermolecular forces, which vary in strength depending on the type of matter.</p><p>&bull; There are 5 states of Matter:</p><p>&#9675; <img width=605 height=358 id=image6.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25930/image007.jpg\"></p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about the properties of matter:</p><p>a) Density is mass per unit volume of a substance.</p><p>b) Kinetic energy of matter increases as temperature decreases.</p><p>c) The volume of a gas is directly proportional to its temperature at constant pressure.</p><p>Which of the following is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2375; &#2327;&#2369;&#2339;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a) &#2328;&#2344;&#2340;&#2381;&#2357; &#2325;&#2367;&#2360;&#2368; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2311;&#2325;&#2366;&#2312; &#2310;&#2351;&#2340;&#2344; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2361;&#2376;&#2404;</p><p>b) &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2328;&#2335;&#2344;&#2375; &#2346;&#2352; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2368; &#2327;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>c) &#2360;&#2381;&#2341;&#2367;&#2352; &#2342;&#2366;&#2348; &#2346;&#2352; &#2327;&#2376;&#2360; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2313;&#2360;&#2325;&#2375; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a is correct.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2360;&#2361;&#2368; &#2361;&#2376;.</span>",
      "<span class=\"eqt\">Only b and c are correct.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Only a and c are correct.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">All a, b, and c are correct.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; a, b, &#2324;&#2352; c &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Density is mass divided by volume.</p><p>&bull; Kinetic energy decreases with a drop in temperature.</p><p>&bull; The volume of a gas is directly proportional to its temperature at constant pressure, following Charles' Law in thermodynamics.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the states of matter:</p><p>a) Solids have definite shape and volume.</p><p>b) Liquids have a definite volume but take the shape of their container.</p><p>c) Gases have a definite volume but no definite shape.</p><p>Which of the following is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2368; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a) &#2336;&#2379;&#2360;&#2379;&#2306; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2324;&#2352; &#2310;&#2351;&#2340;&#2344; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>b) &#2340;&#2352;&#2354; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2357;&#2375; &#2309;&#2346;&#2344;&#2375; &#2346;&#2366;&#2340;&#2381;&#2352; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2354;&#2375; &#2354;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>c) &#2327;&#2376;&#2360;&#2379;&#2306; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2325;&#2379;&#2312; &#2310;&#2325;&#2366;&#2352; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2366;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p>&bull; Solids maintain a fixed shape and volume.</p><p>&bull; Liquids take the shape of their container but retain their volume.</p><p>&bull; Gases have neither definite shape nor definite volume. </p><p><b>Further Insight:</b></p><p>&bull; <b>Solid:</b></p><p>&#9675; Fixed shape and volume.</p><p>&#9675; Atoms/molecules are tightly packed and vibrate in place.</p><p>&#9675; Example: Iron, ice.</p> <h3 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt;page-break-after:auto'>&bull; <b>Liquid:</b></h3><p>&#9675; Fixed volume, but no fixed shape.</p><p>&#9675; Atoms/molecules are loosely packed and can flow.</p><p>&#9675; Example: Water, oil.</p> <h3 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt;page-break-after:auto'>&bull; <b>Gas:</b></h3><p>&#9675; No fixed shape or volume.</p><p>&#9675; Atoms/molecules are far apart and move freely.</p><p>&#9675; Example: Oxygen, carbon dioxide.</p><p>&bull; <img width=421 height=277 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25930/image008.png\"></p>",

0;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Only b and c are correct.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the classification of matter:</p><p>a) Compounds are pure substances made up of two or more elements chemically combined in a fixed ratio.</p><p>b) Mixtures can be separated into their components by physical means.</p><p>c) Elements can be broken down into simpler substances by chemical reactions.</p><p>Which of the following is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a) &#2351;&#2380;&#2327;&#2367;&#2325; &#2342;&#2379; &#2351;&#2366; &#2342;&#2379; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2360;&#2375; &#2348;&#2344;&#2375; &#2358;&#2369;&#2342;&#2381;&#2343; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2379; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>b) &#2350;&#2367;&#2358;&#2381;&#2352;&#2339;&#2379;&#2306; &#2325;&#2379; &#2349;&#2380;&#2340;&#2367;&#2325; &#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2344;&#2325;&#2375; &#2328;&#2335;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2354;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>c) &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2379; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2352;&#2354; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2350;&#2375;&#2306; &#2340;&#2379;&#2337;&#2364;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",

    "solution": "<p>&bull; Compounds are pure substances.</p><p>&bull; Mixtures can be separated physically (e.g., filtration, distillation).</p><p>&bull; Elements cannot be broken down into simpler substances by chemical reactions. </p><p><b>Further Insight:</b></p><p>&bull; <b>Elements</b></p><p>&#9675; <b>Definition</b>: Substances made of only one type of atom.</p><p>&#9675; <b>Categories</b>: Metals, non-metals, and metalloids.</p><p>&#9675; <b>Examples</b>: Gold (Au), Copper (Cu), Oxygen (O).</p><p>&bull; <b>Compounds</b></p><p>&#9675; <b>Definition</b>: Substances made from atoms of two or more elements chemically combined.</p><p>&#9675; <b>Types</b>:</p><p>&#9632; <b>Organic Compounds</b>: Contain carbon atoms.</p><p>&#9632; <b>Inorganic Compounds</b>: Do not contain carbon atoms as the main constituent.</p><p>&#9675; <b>Examples</b>: Carbon dioxide (CO2), Glucose (C6H12O6).</p><p>&bull; <b>Mixtures</b></p><p>&#9675; <b>Definition</b>: A physical combination of substances that can be separated by physical methods.</p><p>&#9675; <b>Types</b>:</p><p>&#9632; <b>Homogeneous Mixtures</b>: Uniform composition (e.g., saltwater).</p><p>&#9632; <b>Heterogeneous Mixtures</b>: Non-uniform composition (e.g., sand and iron filings).</p>",
    "question_index": 14
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding evaporation:</p><p>a) Evaporation is a surface phenomenon where molecules escape from the surface of a liquid into the gas phase.</p><p>b) Evaporation only occurs when the liquid reaches its boiling point.</p><p>c) Evaporation causes cooling of the surrounding area.</p><p>Which of the following is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2359;&#2381;&#2346;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a) &#2357;&#2366;&#2359;&#2381;&#2346;&#2368;&#2325;&#2352;&#2339; &#2319;&#2325; &#2360;&#2340;&#2361;&#2368; &#2328;&#2335;&#2344;&#2366; &#2361;&#2376; &#2332;&#2361;&#2366;&#2306; &#2309;&#2339;&#2369; &#2340;&#2352;&#2354; &#2325;&#2368; &#2360;&#2340;&#2361; &#2360;&#2375; &#2327;&#2376;&#2360;&#2368;&#2351; &#2330;&#2352;&#2339; &#2350;&#2375;&#2306; &#2344;&#2367;&#2325;&#2354; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>b) &#2357;&#2366;&#2359;&#2381;&#2346;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375;&#2357;&#2354; &#2340;&#2348; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348; &#2340;&#2352;&#2354; &#2309;&#2346;&#2344;&#2375; &#2325;&#2381;&#2357;&#2341;&#2344;&#2366;&#2306;&#2325; &#2346;&#2352; &#2346;&#2361;&#2369;&#2306;&#2330; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>c) &#2357;&#2366;&#2359;&#2381;&#2346;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2310;&#2360;&#2346;&#2366;&#2360; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2336;&#2306;&#2337;&#2366; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b are correct.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Only a and c are correct.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Only b and c are correct.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">All a, b, and c are correct.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; a, b, &#2324;&#2352; c &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>"

    "correct_option_id": 1,
    "solution": "<p>&bull; Evaporation happens only at the surface of a liquid, and molecules with sufficient energy escape into the gas phase.</p><p>&bull; Evaporation can occur at temperatures below the boiling point.</p><p>&bull; Evaporation absorbs heat, causing cooling.</p><p><b>Further Insight:</b></p><p>&bull; <b>Factors Affecting Evaporation:</b></p><p>&bull; <b>Temperature</b>: Higher temperature increases the rate of evaporation.</p><p>&bull; <b>Surface Area</b>: Larger surface area leads to faster evaporation.</p><p>&bull; <b>Humidity</b>: Higher humidity slows down evaporation.</p><p>&bull; <b>Wind Speed</b>: Higher wind speed increases the rate of evaporation.</p><p>&bull; <b>Applications of Evaporation</b></p><p>&bull; <b>Cooling via Evaporation</b>: </p><p>&#9675; Sweating cools the body by evaporation. </p><p>&#9675; <b>Earthen pots cool water through evaporation.</b></p>",

  },

    "question": "<span class=\"eqt\"><p>Which of the following is an example of an <b>amorphous solid</b>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2366;&#2325;&#2366;&#2352; &#2336;&#2379;&#2360; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Diamond</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2366;&#2351;&#2350;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Glass</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2305;&#2330;</span>",
      "<span class=\"eqt\">Sodium Chloride</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2325;&#2381;&#2354;&#2379;&#2352;&#2366;&#2311;&#2337;</span>",

    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Amorphous solids</b> lack a well-defined crystalline structure, and their atoms are arranged randomly, like in <b>glass</b>.</p><p>&bull; <b>Diamond</b> and <b>graphite</b> are crystalline solids with a highly ordered structure, while <b>sodium chloride</b> is also a crystalline solid.</p><p><b>Further Insight:</b></p><p>&bull; <b>Solid State</b></p><p>&#9675; <b>Characteristics</b>:</p><p>&#9632; Definite shape, mass, and volume.</p><p>&#9632; Strong intermolecular forces due to closely packed particles.</p><p>&#9632; Rigid and incompressible, with high density and melting points.</p><p>&#9675; <b>Examples</b>: Table, pen, diamonds, sodium chloride (NaCl).</p><p>&#9675; <b>Types of Solids</b>:</p><p>&#9632; <b>Crystalline Solids</b>: Regular arrangement of particles (e.g., NaCl, diamond).</p><p>&#9632; <b>Amorphous Solids</b>: Irregular arrangement of particles (e.g., glass, plastic).</p><p>&#9632; <b>Metallic Solids</b>: Solids with delocalized electrons, making them good conductors (e.g., iron, copper).</p><p>&#9632; <b>Ceramics</b>: Inorganic non-metallic solids, known for hardness and brittleness (e.g., clay, tiles).</p><p>&#9632; <b>Composite Solids</b>: Made from two or more materials (e.g., plywood).</p>",
    "question_index": 16
  },

    "solution": "<p>&bull; Particles in all states of matter (solid, liquid, and gas) are in constant motion, though the degree of movement varies with the state (fastest in gases, slowest in solids).</p><p>&bull; Particles of matter do have space between them, known as intermolecular space. The amount of space varies; it is least in solids and most in gases.</p><p>&bull; The attractive force between particles is strongest in solids, moderate in liquids, and weakest in gases.</p>",

    "solution": "<p>&bull; Elements consist of only one type of atom.</p><p>&bull; Compounds contain atoms of different elements in a fixed ratio.</p><p>&bull; Mixtures can have substances combined in any ratio.</p><p>&bull; <b>Homogeneous mixture</b> have uniform composition throughout.</p><p><b>Further Insight:</b></p><p><b>Elements</b></p><p>&#9675; <b>Definition</b>: Substances made of only one type of atom.</p><p>&#9675; <b>Categories</b>: Metals, non-metals, and metalloids.</p><p>&#9675; <b>Examples</b>: Gold (Au), Copper (Cu), Oxygen (O).</p><p>&bull; <b>Compounds</b></p><p>&#9675; <b>Definition</b>: Substances made from atoms of two or more elements chemically combined.</p><p>&#9675; <b>Types</b>:</p><p>&#9632; <b>Organic Compounds</b>: Contain carbon atoms.</p><p>&#9632; <b>Inorganic Compounds</b>: Do not contain carbon atoms as the main constituent.</p><p>&#9675; <b>Examples</b>: Carbon dioxide (CO2), Glucose (C6H12O6).</p><p>&bull; <b>Mixtures</b></p><p>&#9675; <b>Definition</b>: A physical combination of substances that can be separated by physical methods.</p><p>&#9675; <b>Types</b>:</p><p>&#9632; <b>Homogeneous Mixtures</b>: Uniform composition (e.g., saltwater).</p><p>&#9632; <b>Heterogeneous Mixtures</b>: Non-uniform composition (e.g., sand and iron filings).</p>",
