<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">

        <div class="exam-header">

                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>

        </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>

        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>What was the actual growth rate of the first five-year plan?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2341;&#2350; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2368; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2342;&#2352; &#2325;&#2381;&#2351;&#2366; &#2341;&#2368;?</span>",
    "options": [
      "<span class=\"eqt\">4.2%</span><span class=\"hqt\" style=\"display:none\">4.2%</span>",
      "<span class=\"eqt\">2.6%</span><span class=\"hqt\" style=\"display:none\">2.6%</span>",
      "<span class=\"eqt\">3.6%</span><span class=\"hqt\" style=\"display:none\">3.6%</span>",
      "<span class=\"eqt\">2.1%</span><span class=\"hqt\" style=\"display:none\">2.1%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>During India's First Five-Year Plan (1951-56), the actual growth rate achieved was 3.6%. This performance exceeded the initial target growth rate of 2.1%. The plan primarily concentrated on developing the primary sector, with special emphasis on agriculture, irrigation, power projects, and transportation infrastructure development.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which Five Year Plan period saw the initiation of the Hill Area Development Programme?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2309;&#2357;&#2343;&#2367; &#2350;&#2375;&#2306; &#2346;&#2361;&#2366;&#2337;&#2364;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2361;&#2369;&#2312;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sixth Five Year Plan</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2336;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Fourth Five Year Plan</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2380;&#2341;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Eighth Five Year Plan</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2336;&#2357;&#2368;&#2306; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Fifth Five Year Plan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2306;&#2330;&#2357;&#2368;&#2306; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Hill Area Development Programme (HADP) was initiated during the <b>Fifth Five Year Plan (1974-1979)</b>. The program aimed at the socio-economic development of designated hill areas, focusing on ecological balance and sustainable development.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; Sixth Five Year Plan (1980-1985)</p><p>&#8226; Fourth Five Year Plan (1969-1974): Some pilot projects for hill areas might have started, but the formal HADP is associated with the Fifth Plan.</p><p>&#8226; Eighth Five Year Plan (1992-1997)</p><p><b>Further insights:</b></p><p>&#8226; The HADP covered specific hill areas in states like Assam, West Bengal, Tamil Nadu, Uttar Pradesh (now Uttarakhand), and the Western Ghats region.</p><p>&#8226; The program focused on sectors like agriculture, horticulture, forestry, soil conservation, animal husbandry, and development of infrastructure.</p><p>&#8226; It recognized the unique geographical and ecological challenges faced by hill regions.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The five-year plans for India with their duration are given below. Which of the following is correctly matched?</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) Second five-year plan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1956-57 to 1960-61</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) Third five-year plan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1961-62 to 1965-66</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) Fourth five-year plan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1966-67 to 1970-71</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;&#2319;&#2306; &#2324;&#2352; &#2313;&#2344;&#2325;&#2368; &#2309;&#2357;&#2343;&#2367; &#2344;&#2368;&#2330;&#2375; &#2342;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2361;&#2376;?</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) &#2342;&#2370;&#2360;&#2352;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1956-57 &#2360;&#2375; 1960-61</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) &#2340;&#2368;&#2360;&#2352;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1961-62 &#2360;&#2375; 1965-66</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) &#2330;&#2380;&#2341;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1966-67 &#2360;&#2375; 1970-71</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">Both a and c</span><span class=\"hqt\" style=\"display:none\">&#2319; &#2324;&#2352; &#2360;&#2368; &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Both b and c</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368; &#2324;&#2352; &#2360;&#2368; &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2319;&#2325;</span>",
      "<span class=\"eqt\">Both a and b</span><span class=\"hqt\" style=\"display:none\">&#2319; &#2324;&#2352; &#2348;&#2368; &#2342;&#2379;&#2344;&#2379;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The five-year plans in India were a series of centralized economic development programs implemented by the Government of India. Below is the correct duration of each plan:</p><p>1) Second Five-Year Plan (1956-1961)</p><p>o The second five-year plan was from 1956 to 1961, focusing on rapid industrialization, especially in heavy industries like steel, machinery, and mining.</p><p>o The given duration in the question (1956-57 to 1960-61) is incorrect because the plan started in 1956 and ended in 1961.</p><p>2) Third Five-Year Plan (1961-1966)</p><p>o The third five-year plan was from 1961 to 1966, aiming at self-reliance and agricultural production improvement.</p><p>o The given duration in the question (1961-62 to 1965-66) is incorrect because the plan started in 1961, not 1961-62.</p><p>3) Fourth Five-Year Plan (1969-1974)</p><p>o The fourth five-year plan was from 1969 to 1974, focusing on growth with stability and progress towards self-reliance.</p><p>o The given duration in the question (1966-67 to 1970-71) is incorrect because there was a three-year gap (1966-69) between the third and fourth plans due to economic instability, during which annual plans were implemented.</p><p>Final Conclusion:</p><p>The answer key (D: Both a and b) is incorrect based on the actual historical data.</p><p>Since none of the options are correct, this question appears to have a mistake. The correct durations should be:</p><p>&#183; Second Plan: 1956-1961</p><p>&#183; Third Plan: 1961-1966</p><p>&#183; Fourth Plan: 1969-1974</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The Mahalanobis model was the basis for which Five-Year Plan?</p></span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2354;&#2344;&#2379;&#2348;&#2367;&#2360; &#2350;&#2377;&#2337;&#2354; &#2325;&#2367;&#2360; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Fourth Five-Year Plan</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2380;&#2341;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Second Five-Year Plan</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2370;&#2360;&#2352;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Sixth Five-Year Plan</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2336;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">First Five-Year Plan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2341;&#2350; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Mahalanobis model, developed by statistician Prasanta Chandra Mahalanobis, was crucial in India's economic planning.</p><p>Key points:</p><p>Formed the theoretical basis of the Second Five-Year Plan (1956-1961)</p><p>Emphasized rapid industrialization and socialist pattern of development</p><p>Focused on heavy industries and public sector growth</p><p>Proposed a balanced approach to economic development</p><p>Influenced by the Soviet model of economic planning</p><p>Aimed to transform India from an agrarian to an industrial economy</p><p>Mahalanobis was a key economic advisor to Prime Minister Jawaharlal Nehru</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following options is INCORRECT?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2327;&#2354;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Distinguished economists from India and abroad were invited to advise on India's economic development during the first five-year plan period.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2341;&#2350; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2346;&#2352; &#2360;&#2354;&#2366;&#2361; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2349;&#2366;&#2352;&#2340; &#2324;&#2352; &#2357;&#2367;&#2342;&#2375;&#2358; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2359;&#2381;&#2336;&#2367;&#2340; &#2309;&#2352;&#2381;&#2341;&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2310;&#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">India borrowed the idea of five-year plans from the former Soviet Union.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2325;&#2366; &#2357;&#2367;&#2330;&#2366;&#2352; &#2346;&#2370;&#2352;&#2381;&#2357; &#2360;&#2379;&#2357;&#2367;&#2351;&#2340; &#2360;&#2306;&#2328; &#2360;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The Planning Commission of India was set up in 1950.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2351;&#2379;&#2332;&#2344;&#2366; &#2310;&#2351;&#2379;&#2327; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; 1950 &#2350;&#2375;&#2306; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</span>",
      "<span class=\"eqt\">The chairmanship of the Planning Commission of India was given to the Prime Minister.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2351;&#2379;&#2332;&#2344;&#2366; &#2310;&#2351;&#2379;&#2327; &#2325;&#2368; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;&#2340;&#2366; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2379; &#2342;&#2368; &#2327;&#2312;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#8226; The <b>First Five-Year Plan (1951 - 56)</b> was based on the <b>Harrod-Domar model</b> and largely guided by <b>Indian economists</b>, including <b>K.N. Raj</b>.</p><p>&#8226; Though influenced by the Soviet model, it did <b>not involve foreign economists</b> directly advising.</p><p>&#8226; The Planning Commission was indeed established in <b>1950</b> with the <b>Prime Minister as its chairperson</b>.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What is NOT a goal of Five-Year Plans?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2325;&#2366; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">High Population Growth</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">High GDP Growth</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2357;&#2367;&#2325;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Equal benefits to all the people</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2366;&#2344; &#2354;&#2366;&#2349;</span>",
      "<span class=\"eqt\">Self- Reliance</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2340;&#2381;&#2350;&#2344;&#2367;&#2352;&#2381;&#2349;&#2352;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The objectives of the five-year plans were to achieve growth, modernization, equity, and self-reliance. <b>High Population Growth</b> is not a goal of Five Year plan.</p>",
    "question_index": 5

    "correct_option_id": 2,
    "solution": "<p>Statement 1: Incorrect. Five-year plans in India focused on government intervention to promote balanced economic development, especially in key sectors like agriculture, industry, and infrastructure.</p><p>Statement 2: Correct. The five-year plans were designed to allow long-term government intervention to achieve planned economic goals, including reducing poverty, boosting industrial and agricultural production, and addressing social inequities.</p><p>Statement 3: Incorrect. While some plans emphasized the tertiary sector (services), they also focused on primary (agriculture) and secondary (industry) sectors, depending on the priorities of the plan.</p><p>Statement 4: Incorrect. The five-year plans were not solely market-oriented; they followed a mixed economy model, combining market mechanisms with government planning and regulation.</p>",
