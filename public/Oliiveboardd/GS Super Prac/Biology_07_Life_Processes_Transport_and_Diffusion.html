    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following is the primary reason professional biologists consider invisible molecular movement necessary for life?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2361; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2325;&#2366;&#2352;&#2339; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2346;&#2375;&#2358;&#2375;&#2357;&#2352; &#2332;&#2368;&#2357;&#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344;&#2368; &#2309;&#2342;&#2371;&#2358;&#2381;&#2351; &#2310;&#2339;&#2357;&#2367;&#2325; &#2327;&#2340;&#2367; &#2325;&#2379; &#2332;&#2368;&#2357;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">It allows for visible growth in organisms.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2332;&#2368;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2371;&#2358;&#2381;&#2351; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is the only way organisms can respond to their environment.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2319;&#2325;&#2350;&#2366;&#2340;&#2381;&#2352; &#2340;&#2352;&#2368;&#2325;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2360;&#2375; &#2332;&#2368;&#2357; &#2309;&#2346;&#2344;&#2375; &#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Living organisms are well-organised structures that need continuous repair and maintenance at the molecular level.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2357;&#2367;&#2340; &#2332;&#2368;&#2357; &#2360;&#2369;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;&#2319;&#2306; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2310;&#2339;&#2357;&#2367;&#2325; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2344;&#2367;&#2352;&#2306;&#2340;&#2352; &#2350;&#2352;&#2350;&#2381;&#2350;&#2340; &#2324;&#2352; &#2352;&#2326;&#2352;&#2326;&#2366;&#2357; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It directly provides energy for all life processes.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2360;&#2349;&#2368; &#2332;&#2368;&#2357;&#2344; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359;&#2340;&#2307; &#2314;&#2352;&#2381;&#2332;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Living organisms have well-organised structures that are likely to break down over time due to environmental effects.</p><p>Continuous repair and maintenance at the molecular level, which involves molecular movement, are essential to sustain life.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In multicellular organisms, why is simple diffusion often insufficient to meet the requirements of all cells?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2361;&#2369;&#2325;&#2379;&#2358;&#2367;&#2325;&#2368;&#2351; &#2332;&#2368;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2360;&#2352;&#2354; &#2357;&#2367;&#2360;&#2352;&#2339; &#2346;&#2381;&#2352;&#2366;&#2351;&#2307; &#2360;&#2349;&#2368; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2325;&#2381;&#2351;&#2379;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Multicellular organisms do not come into contact with the environment.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2369;&#2325;&#2379;&#2358;&#2367;&#2325;&#2368;&#2351; &#2332;&#2368;&#2357; &#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339; &#2325;&#2375; &#2360;&#2306;&#2346;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2344;&#2361;&#2368;&#2306; &#2310;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">All cells in multicellular organisms are in direct contact with the surrounding environment.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2369;&#2325;&#2379;&#2358;&#2367;&#2325;&#2368;&#2351; &#2332;&#2368;&#2357;&#2379;&#2306; &#2325;&#2368; &#2360;&#2349;&#2368; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2319;&#2305; &#2310;&#2360;&#2346;&#2366;&#2360; &#2325;&#2375; &#2357;&#2366;&#2340;&#2366;&#2357;&#2352;&#2339; &#2325;&#2375; &#2360;&#2368;&#2343;&#2375; &#2360;&#2306;&#2346;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">As body size increases and body design becomes more complex, all cells may not be in direct contact with the surrounding environment.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2376;&#2360;&#2375;-&#2332;&#2376;&#2360;&#2375; &#2358;&#2352;&#2368;&#2352; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2358;&#2352;&#2368;&#2352; &#2325;&#2368; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2309;&#2343;&#2367;&#2325; &#2332;&#2335;&#2367;&#2354; &#2361;&#2379;&#2340;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2360;&#2349;&#2368; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2319;&#2306; &#2310;&#2360;&#2346;&#2366;&#2360; &#2325;&#2375; &#2357;&#2366;&#2340;&#2366;&#2357;&#2352;&#2339; &#2325;&#2375; &#2360;&#2368;&#2343;&#2375; &#2360;&#2306;&#2346;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2344;&#2361;&#2368;&#2306; &#2352;&#2361; &#2346;&#2366;&#2340;&#2368;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Diffusion only works for single-celled organisms.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2360;&#2352;&#2339; &#2325;&#2375;&#2357;&#2354; a&#2325;&#2379;&#2358;&#2367;&#2325;&#2368;&#2351; &#2332;&#2368;&#2357;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In multicellular organisms, not all cells are in direct contact with the surrounding environment due to increased body size and complexity, making simple diffusion insufficient.</p><p>This limitation led to the evolution of:</p><p>&bull; Specialized exchange surfaces (lungs, gills)</p><p>&bull; Transport systems (blood, vascular tissues)</p><p>&bull; Circulatory mechanisms to overcome diffusion limits</p><p>Example:</p><p>In humans, oxygen cannot diffuse quickly enough to reach all cells, necessitating respiratory and circulatory systems.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following terms in Column I with their descriptions in Column II:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column I (Term)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column II (Description)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Chlorophyll</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Tiny pores on the surface of leaves involved in gaseous exchange</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Stomata</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Finger-like projections in the small intestine that increase surface area for absorption</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Villi</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Green pigment in plants that absorbs light energy for photosynthesis</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) Nephron</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Basic filtration unit in the kidneys</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2377;&#2354;&#2350; I &#2350;&#2375;&#2306; &#2342;&#2367;&#2319; &#2327;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2379; &#2325;&#2377;&#2354;&#2350; II &#2350;&#2375;&#2306; &#2342;&#2367;&#2319; &#2327;&#2319; &#2313;&#2344;&#2325;&#2375; &#2357;&#2367;&#2357;&#2352;&#2339; &#2360;&#2375; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2377;&#2354;&#2350; I (&#2358;&#2348;&#2381;&#2342;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2377;&#2354;&#2350; II (&#2357;&#2367;&#2357;&#2352;&#2339;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) &#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2347;&#2367;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2340;&#2361; &#2346;&#2352; &#2331;&#2379;&#2335;&#2375; &#2331;&#2367;&#2342;&#2381;&#2352; &#2327;&#2376;&#2360;&#2368;&#2351; &#2357;&#2367;&#2344;&#2367;&#2350;&#2351; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2352;&#2306;&#2343;&#2381;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2331;&#2379;&#2335;&#2368; &#2310;&#2306;&#2340; &#2350;&#2375;&#2306; &#2313;&#2306;&#2327;&#2354;&#2368; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2325;&#2375; &#2313;&#2349;&#2366;&#2352; &#2332;&#2379; &#2309;&#2357;&#2358;&#2379;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2340;&#2361; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2357;&#2367;&#2354;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2346;&#2380;&#2343;&#2379;&#2306; &#2350;&#2375;&#2306; &#2361;&#2352;&#2366; &#2352;&#2306;&#2327;&#2342;&#2381;&#2352;&#2357;&#2381;&#2351; &#2332;&#2379; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2379; &#2309;&#2357;&#2358;&#2379;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) &#2344;&#2375;&#2347;&#2381;&#2352;&#2377;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2327;&#2369;&#2352;&#2381;&#2342;&#2375; &#2350;&#2375;&#2306; &#2348;&#2369;&#2344;&#2367;&#2351;&#2366;&#2342;&#2368; &#2344;&#2367;&#2360;&#2381;&#2346;&#2306;&#2342;&#2344; &#2311;&#2325;&#2366;&#2312;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i  -  d, ii  -  c, iii  -  b, iv  -  a</span><span class=\"hqt\" style=\"display:none\">i  -  d, ii  -  c, iii  -  b, iv  -  a</span>",
      "<span class=\"eqt\">i  -  c, ii  -  a, iii  -  b, iv  -  d</span><span class=\"hqt\" style=\"display:none\">i  -  c, ii  -  a, iii  -  b, iv  -  d</span>",
      "<span class=\"eqt\">i  -  a, ii  -  b, iii  -  d, iv  -  c</span><span class=\"hqt\" style=\"display:none\">i  -  a, ii  -  b, iii  -  d, iv  -  c</span>",
      "<span class=\"eqt\">i  -  b, ii  -  a, iii  -  c, iv  -  d</span><span class=\"hqt\" style=\"display:none\">i  -  b, ii  -  a, iii  -  c, iv  -  d</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Chlorophyll</b> is the <b>green pigment in plants that absorbs light energy for photosynthesis</b>.</p><p>&bull; <b>Stomata</b> are <b>tiny pores on the surface of leaves involved in gaseous exchange</b>.</p><p>&bull; <b>Villi</b> are <b>finger-like projections in the small intestine that increase the surface area for absorption</b>.</p><p>&bull; <b>Nephron</b> is the <b>basic filtration unit in the kidneys</b>.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What is the form in which carbohydrates are stored in plants as an internal energy reserve?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2380;&#2343;&#2379;&#2306; &#2350;&#2375;&#2306; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2314;&#2352;&#2381;&#2332;&#2366; &#2349;&#2306;&#2337;&#2366;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2375;&#2335; &#2325;&#2367;&#2360; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Glucose</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2352;&#2381;&#2325;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Glycogen</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2354;&#2366;&#2311;&#2325;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Pyruvate</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2352;&#2370;&#2357;&#2375;&#2335;</span>",
      "<span class=\"eqt\">Starch</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2366;&#2352;&#2381;&#2330;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; <b>Starch</b> is the <b>primary storage form of carbohydrates in plants</b>. It serves as an <b>energy reserve</b> and is stored in <b>roots, tubers, seeds, and chloroplasts</b>.</p><p>&bull; Plants convert excess glucose into <b>insoluble starch</b> for long-term storage, which can later be broken down into glucose when energy is needed.</p><p>&bull; <b>Glucose </b>is the immediate energy source but is <b>not stored</b> in large amounts.</p><p>&bull; <b>Glycogen</b> is how <b>animals</b> (not plants) store carbohydrates (e.g., in liver and muscles).</p><p>&bull; <b>Pyruvate i</b>s a metabolic intermediate in cellular respiration, <b>not a storage molecule</b>.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What is the role of potassium hydroxide in the experiment demonstrating the necessity of carbon dioxide for photosynthesis?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2350;&#2375;&#2306; &#2346;&#2379;&#2335;&#2375;&#2358;&#2367;&#2351;&#2350; &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2377;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2325;&#2368; &#2325;&#2381;&#2351;&#2366; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To provide water to the plant.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2380;&#2343;&#2375; &#2325;&#2379; &#2346;&#2366;&#2344;&#2368; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2325;&#2352;&#2366;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To release carbon dioxide for the plant to use.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2380;&#2343;&#2375; &#2325;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327; &#2361;&#2375;&#2340;&#2369; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2350;&#2369;&#2325;&#2381;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To absorb carbon dioxide from the enclosed environment.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2354;&#2327;&#2381;&#2344; &#2357;&#2366;&#2340;&#2366;&#2357;&#2352;&#2339; &#2360;&#2375; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2325;&#2379; &#2309;&#2357;&#2358;&#2379;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To provide sunlight to the plant.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2380;&#2343;&#2375; &#2325;&#2379; &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Potassium hydroxide (KOH)</b> is used in photosynthesis experiments to <b>remove CO&#8322;</b> from the air inside an enclosed setup (e.g., a bell jar).</p><p>&bull; It reacts with CO&#8322; to form <b>potassium carbonate (K&#8322;CO&#8323;)</b>, creating a <b>CO&#8322;-free environment</b>:</p><p>2&#8201;KOH+CO<sub>2</sub>&rarr;K<sub>2</sub>CO<sub>3</sub>+H<sub>2</sub>0</p><p>&bull; By absorbing CO&#8322;, KOH helps <b>prove that CO&#8322; is essential</b> for photosynthesis (e.g., when a plant in a KOH-containing setup fails to produce starch).</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are correct about excretion in plants?</p><p>I. Transpiration helps plants get rid of excess carbon dioxide.</p><p>II. Plants can store waste products in cellular vacuoles or in leaves that fall off.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2346;&#2380;&#2343;&#2379;&#2306; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2357;&#2366;&#2359;&#2381;&#2346;&#2379;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2344; &#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2379; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2360;&#2375; &#2331;&#2369;&#2335;&#2325;&#2366;&#2352;&#2366; &#2346;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2346;&#2380;&#2343;&#2375; &#2309;&#2346;&#2358;&#2367;&#2359;&#2381;&#2335; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2325;&#2379; &#2325;&#2379;&#2358;&#2367;&#2325;&#2368;&#2351; &#2352;&#2367;&#2325;&#2381;&#2340;&#2367;&#2325;&#2366;&#2323;&#2306; &#2351;&#2366; &#2327;&#2367;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Statement I (Incorrect):</b></p><p>o <b>Transpiration</b> is the loss of <b>water vapor</b> (not CO&#8322;) through stomata.</p><p>o Plants remove excess CO&#8322; primarily through <b>photosynthesis</b> or <b>diffusion via stomata</b>, but this is not excretion.</p><p>&bull; <b>Statement II (Correct):</b></p><p>o Plants store waste products (e.g., tannins, resins, gums) in:</p><p>&bull; <b>Cellular vacuoles</b> (e.g., calcium oxalate crystals).</p><p>&bull; <b>Old leaves</b> that eventually shed (e.g., rubber tree latex).</p><p>Unlike animals, plants lack a dedicated excretory system and <b>use storage or shedding</b> to manage wastes.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>What is the enzyme present in saliva that helps in the digestion of food?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2366;&#2352; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2357;&#2361; &#2319;&#2306;&#2332;&#2366;&#2311;&#2350; &#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2376; &#2332;&#2379; &#2349;&#2379;&#2332;&#2344; &#2325;&#2375; &#2346;&#2366;&#2330;&#2344; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pepsin</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2340;&#2381;&#2340; &#2325;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2309;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Trypsin</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2367;&#2346;&#2381;&#2360;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Lipase</span><span class=\"hqt\" style=\"display:none\">lipase</span>",
      "<span class=\"eqt\">Salivary amylase</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2352; &#2319;&#2350;&#2366;&#2311;&#2354;&#2375;&#2332;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; <b>Salivary amylase</b> (also called <i>ptyalin</i>) is the <b>enzyme in saliva</b> that breaks down <b>starch</b> into simpler sugars (like maltose) during digestion.</p><p>&bull; It is secreted by <b>salivary glands</b> and acts in the <b>mouth</b> (pH ~6.7 - 7.0).</p><p>Further insights:</p><p>&bull; <b>Pepsin</b>: Stomach enzyme that digests <b>proteins</b> (not present in saliva).</p><p>&bull; <b>Trypsin</b>: Pancreatic enzyme for <b>protein digestion</b> in the small intestine.</p><p>&bull; <b>Lipase</b>: Breaks down <b>fats</b> (produced by pancreas, not salivary glands).</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are correct?</p><p>I. Autotrophs can prepare their own food using simple inorganic materials like carbon dioxide and water.</p><p>II. Heterotrophs depend directly on inorganic sources for their food.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2360;&#2381;&#2357;&#2346;&#2379;&#2359;&#2368; &#2332;&#2368;&#2357; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2332;&#2376;&#2360;&#2375; &#2360;&#2352;&#2354; &#2309;&#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2309;&#2346;&#2344;&#2366; &#2349;&#2379;&#2332;&#2344; &#2340;&#2376;&#2351;&#2366;&#2352; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2357;&#2367;&#2359;&#2350;&#2346;&#2379;&#2359;&#2368; &#2332;&#2368;&#2357; &#2309;&#2346;&#2344;&#2375; &#2349;&#2379;&#2332;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2368;&#2343;&#2375; &#2309;&#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2360;&#2381;&#2352;&#2379;&#2340;&#2379;&#2306; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Statement I (Correct):</b></p><p>o <b>Autotrophs</b> (e.g., plants, algae, cyanobacteria) synthesize their own food via <b>photosynthesis</b> (using CO&#8322;, water, and sunlight) or <b>chemosynthesis</b> (using inorganic chemicals).</p><p>&bull; <b>Statement II (Incorrect):</b></p><p>o <b>Heterotrophs</b> (e.g., animals, fungi) depend on <b>organic sources</b> (plants/other organisms) for food, <b>not inorganic materials</b>.</p><p>Autotrophs form the base of the food chain by converting inorganic compounds into organic matter, while heterotrophs rely on consuming autotrophs or other heterotrophs.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Where does the complete digestion of carbohydrates, proteins, and fats primarily occur in the human alimentary canal?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2357; &#2310;&#2361;&#2366;&#2352; &#2344;&#2354;&#2368; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2375;&#2335;, &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2324;&#2352; &#2357;&#2360;&#2366; &#2325;&#2366; &#2346;&#2370;&#2352;&#2381;&#2339; &#2346;&#2366;&#2330;&#2344; &#2350;&#2369;&#2326;&#2381;&#2351;&#2340;&#2307; &#2325;&#2361;&#2366;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Stomach</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2335;</span>",
      "<span class=\"eqt\">Large intestine</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2337;&#2364;&#2368;</span>",
      "<span class=\"eqt\">Small intestine</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2379;&#2335;&#2368; &#2310;&#2306;&#2340;</span>",
      "<span class=\"eqt\">Oesophagus</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2375;&#2328;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Small intestine</b> is the <b>primary site</b> for complete digestion of all major nutrients:</p><p>o <b>Carbohydrates</b>: Broken down into <b>glucose</b> by pancreatic amylase and intestinal enzymes.</p><p>o <b>Proteins</b>: Converted to <b>amino acids</b> by trypsin, chymotrypsin, and peptidases.</p><p>o <b>Fats</b>: Emulsified by bile and digested into <b>fatty acids + glycerol</b> by lipase.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following modes of nutrition in Column I with the organisms that exhibit them in Column II:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column I (Nutrition)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column II (Organism)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Autotrophic nutrition</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Animals and fungi</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Heterotrophic nutrition</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Fungi like bread moulds</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Parasitic nutrition</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Green plants</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) Saprophytic nutrition</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Cuscuta(amar-bel)</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2340;&#2306;&#2349; I &#2350;&#2375;&#2306; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2379;&#2359;&#2339; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2340;&#2352;&#2368;&#2325;&#2379;&#2306; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2360;&#2381;&#2340;&#2306;&#2349; II &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2332;&#2368;&#2357;&#2379;&#2306; &#2360;&#2375; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; I (&#2346;&#2379;&#2359;&#2339;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; II (&#2332;&#2368;&#2357;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) &#2360;&#2381;&#2357;&#2346;&#2379;&#2359;&#2368; &#2346;&#2379;&#2359;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2332;&#2366;&#2344;&#2357;&#2352; &#2324;&#2352; &#2325;&#2357;&#2325;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2357;&#2367;&#2359;&#2350;&#2346;&#2379;&#2359;&#2368; &#2346;&#2379;&#2359;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2348;&#2381;&#2352;&#2375;&#2337; &#2350;&#2379;&#2354;&#2381;&#2337;&#2381;&#2360; &#2332;&#2376;&#2360;&#2375; &#2325;&#2357;&#2325;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2346;&#2352;&#2332;&#2368;&#2357;&#2368; &#2346;&#2379;&#2359;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2361;&#2352;&#2375; &#2346;&#2380;&#2343;&#2375;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) &#2350;&#2371;&#2340;&#2379;&#2346;&#2332;&#2368;&#2357;&#2368; &#2346;&#2379;&#2359;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2325;&#2369;&#2360;&#2325;&#2369;&#2335;&#2366; (&#2309;&#2350;&#2352;-&#2348;&#2375;&#2354;)</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i  -  d, ii  -  c, iii  -  b, iv  -  a</span><span class=\"hqt\" style=\"display:none\">i  -  d, ii  -  c, iii  -  b, iv  -  a</span>",
      "<span class=\"eqt\">i  -  c, ii  -  a, iii  -  d, iv  -  b</span><span class=\"hqt\" style=\"display:none\">i  -  c, ii  -  a, iii  -  d, iv  -  b</span>",
      "<span class=\"eqt\">i  -  a, ii  -  b, iii  -  d, iv  -  c</span><span class=\"hqt\" style=\"display:none\">i  -  a, ii  -  b, iii  -  d, iv  -  c</span>",
      "<span class=\"eqt\">i  -  b, ii  -  a, iii  -  c, iv  -  d</span><span class=\"hqt\" style=\"display:none\">i  -  b, ii  -  a, iii  -  c, iv  -  d</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Autotrophs (i)</b>: Produce their own food (e.g., green plants via photosynthesis).</p><p>&bull; <b>Heterotrophs (ii)</b>: Depend on other organisms (e.g., animals, fungi).</p><p>&bull; <b>Parasites (iii)</b>: Derive nutrition from hosts (e.g., <i>Cuscuta</i>, a parasitic plant).</p><p>&bull; <b>Saprophytes (iv)</b>: Feed on dead organic matter (e.g., bread mould fungi).</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are correct concerning transport in human beings?</p><p>I. Arteries carry deoxygenated blood from the heart to the lungs.</p><p>II. Veins have valves to ensure that blood flows only towards the heart<b>.</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2350;&#2366;&#2344;&#2357; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2343;&#2350;&#2344;&#2367;&#2351;&#2366;&#2306; &#2361;&#2371;&#2342;&#2351; &#2360;&#2375; &#2347;&#2375;&#2347;&#2337;&#2364;&#2379;&#2306; &#2340;&#2325; &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2352;&#2361;&#2367;&#2340; &#2352;&#2325;&#2381;&#2340; &#2354;&#2375; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2344;&#2360;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2366;&#2354;&#2381;&#2357; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2379; &#2351;&#2361; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367; &#2352;&#2325;&#2381;&#2340; &#2325;&#2375;&#2357;&#2354; &#2361;&#2371;&#2342;&#2351; &#2325;&#2368; &#2323;&#2352; &#2348;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Statement I is incorrect</b>. While arteries generally carry blood away from the heart, the pulmonary artery carries deoxygenated blood from the right ventricle to the lungs for oxygenation. Oxygen-rich blood from the lungs comes to the left atrium and then is pumped out to the body via the aorta (an artery).</p><p>&bull; <b>Statement II is correct</b>. Veins collect the blood from different organs and bring it back to the heart. They do not need thick walls because the blood is no longer under pressure, instead they have valves that ensure that the blood flows only in one direction.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following processes in Column I with their associated locations in Column II (in human beings):</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column I (Process)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column II (Location)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Digestion of starch</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Stomach</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Absorption of digested food</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Small intestine</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Creation of acidic medium</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.Mouth</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) Water absorption from undigested food</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Large intestine</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2377;&#2354;&#2350; I &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2325;&#2377;&#2354;&#2350; II &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2313;&#2344;&#2325;&#2368; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; (&#2350;&#2366;&#2344;&#2357; &#2350;&#2375;&#2306;) &#2360;&#2375; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2377;&#2354;&#2350; I (&#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2377;&#2354;&#2350; II (&#2360;&#2381;&#2341;&#2366;&#2344;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) &#2360;&#2381;&#2335;&#2366;&#2352;&#2381;&#2330; &#2325;&#2366; &#2346;&#2366;&#2330;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2346;&#2375;&#2335;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2346;&#2330;&#2375; &#2361;&#2369;&#2319; &#2349;&#2379;&#2332;&#2344; &#2325;&#2366; &#2309;&#2357;&#2358;&#2379;&#2359;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2326;. &#2331;&#2379;&#2335;&#2368; &#2310;&#2306;&#2340;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2309;&#2350;&#2381;&#2354;&#2368;&#2351; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.&#2350;&#2369;&#2305;&#2361;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) &#2309;&#2346;&#2330;&#2367;&#2340; &#2349;&#2379;&#2332;&#2344; &#2360;&#2375; &#2332;&#2354; &#2309;&#2357;&#2358;&#2379;&#2359;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2348;&#2337;&#2364;&#2368; &#2310;&#2306;&#2340;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i  -  d, ii  -  c, iii  -  b, iv  -  a</span><span class=\"hqt\" style=\"display:none\">i  -  d, ii  -  c, iii  -  b, iv  -  a</span>",
      "<span class=\"eqt\">i  -  c, ii  -  b, iii  -  a, iv  -  d</span><span class=\"hqt\" style=\"display:none\">i  -  c, ii  -  b, iii  -  a, iv  -  d</span>",
      "<span class=\"eqt\">i  -  a, ii  -  b, iii  -  d, iv  -  c</span><span class=\"hqt\" style=\"display:none\">i  -  a, ii  -  b, iii  -  d, iv  -  c</span>",
      "<span class=\"eqt\">i  -  b, ii  -  a, iii  -  c, iv  -  d</span><span class=\"hqt\" style=\"display:none\">i  -  b, ii  -  a, iii  -  c, iv  -  d</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Starch digestion</b> begins in the <b>mouth</b> due to salivary amylase.</p><p>&bull; <b>Nutrient absorption</b> occurs primarily in the <b>small intestine</b> (villi increase surface area).</p><p>&bull; <b>Acidic medium (HCl)</b> is created in the <b>stomach</b> for protein digestion.</p><p>&bull; <b>Water absorption</b> happens in the <b>large intestine</b>, forming solid waste.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>What is the function of villi present in the inner lining of the small intestine?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2331;&#2379;&#2335;&#2368; &#2310;&#2306;&#2340; &#2325;&#2368; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2346;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2357;&#2367;&#2354;&#2368; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To secrete digestive enzymes.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2330;&#2344; &#2319;&#2306;&#2332;&#2366;&#2311;&#2350;&#2379;&#2306; &#2325;&#2366; &#2360;&#2381;&#2352;&#2366;&#2357; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To increase the surface area for absorption of digested food.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2330;&#2375; &#2361;&#2369;&#2319; &#2349;&#2379;&#2332;&#2344; &#2325;&#2375; &#2309;&#2357;&#2358;&#2379;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2340;&#2361; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To propel food forward through peristalsis.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2350;&#2366;&#2325;&#2369;&#2306;&#2330;&#2344; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2349;&#2379;&#2332;&#2344; &#2325;&#2379; &#2310;&#2327;&#2375; &#2348;&#2338;&#2364;&#2366;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To store undigested food material.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2330;&#2367;&#2340; &#2326;&#2366;&#2342;&#2381;&#2351; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2325;&#2379; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Villi</b> are <b>finger-like projections</b> in the small intestine that:</p><p>o <b>Maximize surface area</b> (~300 m&#178;) for efficient nutrient absorption.</p><p>o Contain <b>blood capillaries and lacteals</b> to absorb:</p><p>&bull; Glucose/amino acids (into blood).</p><p>&bull; Fatty acids/glycerol (into lymph).</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>What is the first step in the breakdown of glucose during respiration in all organisms?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2349;&#2368; &#2332;&#2368;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306; &#2358;&#2381;&#2357;&#2360;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2327;&#2381;&#2354;&#2370;&#2325;&#2379;&#2332; &#2325;&#2375; &#2335;&#2370;&#2335;&#2344;&#2375; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2330;&#2352;&#2339; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Conversion into ethanol and carbon dioxide.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2341;&#2375;&#2344;&#2377;&#2354; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2350;&#2375;&#2306; &#2352;&#2370;&#2346;&#2366;&#2306;&#2340;&#2352;&#2339;&#2404;</span>",
      "<span class=\"eqt\">Conversion into lactic acid.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2376;&#2325;&#2381;&#2335;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337; &#2350;&#2375;&#2306; &#2352;&#2370;&#2346;&#2366;&#2306;&#2340;&#2352;&#2339;.</span>",
      "<span class=\"eqt\">Breakdown into a three-carbon molecule called pyruvate.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2352;&#2370;&#2357;&#2375;&#2335; &#2344;&#2366;&#2350;&#2325; &#2340;&#2368;&#2344; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2309;&#2339;&#2369; &#2350;&#2375;&#2306; &#2357;&#2367;&#2328;&#2335;&#2367;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Complete oxidation into carbon dioxide and water using oxygen.</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2381;&#2339; &#2321;&#2325;&#2381;&#2360;&#2368;&#2325;&#2352;&#2339;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Glycolysis</b> is the <b>universal first step</b> of glucose breakdown in <b>all organisms</b> (aerobic/anaerobic).</p><p>o Occurs in the <b>cytoplasm</b>.</p><p>o Glucose (6C) splits into <b>2 pyruvate molecules (3C each)</b>.</p><p>o Releases <b>2 ATP and NADH</b> (net gain).</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>What is the function of xylem in plants?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2380;&#2343;&#2379;&#2306; &#2350;&#2375;&#2306; &#2332;&#2366;&#2311;&#2354;&#2350; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Transport of food and amino acids.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2379;&#2332;&#2344; &#2324;&#2352; &#2309;&#2350;&#2368;&#2344;&#2379; &#2319;&#2360;&#2367;&#2337; &#2325;&#2366; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344;.</span>",
      "<span class=\"eqt\">Transport of water and minerals obtained from the soil.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2332;&#2354; &#2319;&#2357;&#2306; &#2326;&#2344;&#2367;&#2332;&#2379;&#2306; &#2325;&#2366; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344;&#2404;</span>",
      "<span class=\"eqt\">Transport of products of photosynthesis.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2325;&#2366; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344;&#2404;</span>",
      "<span class=\"eqt\">Exchange of gases.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2360;&#2379;&#2306; &#2325;&#2366; &#2310;&#2342;&#2366;&#2344;-&#2346;&#2381;&#2352;&#2342;&#2366;&#2344;.</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Xylem</b> is a <b>vascular tissue</b> responsible for:</p><p>o <b>Upward transport</b> of water and dissolved minerals (e.g., nitrates, phosphates) from roots to other plant parts.</p><p>o Provides <b>structural support</b> (contains lignin-strengthened dead cells).</p><p>Further information:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Feature</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Xylem</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Phloem</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Function</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Transports <b>water &amp; minerals</b> (roots &rarr; shoots)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Transports <b>food (sugars), amino acids</b> (leaves &rarr; other parts)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direction</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Unidirectional</b> (upward)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Bidirectional</b> (up or down)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Components</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Tracheids</p><p>- Vessels (dead cells)</p><p>- Fibers</p><p>- Parenchyma</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Sieve tubes (living)</p><p>- Companion cells</p><p>- Phloem fibers</p><p>- Parenchyma</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Cell Status</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Dead cells</b> at maturity (hollow)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Living cells</b> (require energy)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Cell Walls</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Thick, <b>lignified</b> (provides support)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Thin, non-lignified</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Process</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Driven by <b>transpiration pull</b> &amp; root pressure</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Driven by <b>active transport</b> (energy-dependent)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Substances Transported</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Water, dissolved minerals (e.g., Mg&#178;&#8314;, NO&#8323;&#8315;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sucrose, amino acids, hormones</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Additional Role</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Provides <b>mechanical strength</b> to plants</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Stores food (e.g., in roots)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Found in</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Roots, stems, leaves (vascular bundles)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Roots, stems, leaves (vascular bundles)</td></tr></table>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>What is the process by which plants lose water in the form of vapour from their aerial parts?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2380;&#2343;&#2375; &#2309;&#2346;&#2344;&#2375; &#2361;&#2357;&#2366;&#2312; &#2349;&#2366;&#2327;&#2379;&#2306; &#2360;&#2375; &#2357;&#2366;&#2359;&#2381;&#2346; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2326;&#2379; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Translocation</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2357;&#2366;&#2342;&#2344;</span>",
      "<span class=\"eqt\">Respiration</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2357;&#2360;&#2344;</span>",
      "<span class=\"eqt\">Transpiration</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2375;&#2342;</span>",
      "<span class=\"eqt\">Photosynthesis</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Transpiration</b> is the process where plants lose <b>water vapor</b> through tiny pores called <b>stomata</b> (mainly on leaves).</p><p>&bull; It creates a <b>\"transpiration pull\"</b> that helps:</p><p>o Transport water/minerals upward (via xylem).</p><p>o Cool the plant.</p><p>Further information:</p><p>&bull; <b>Translocation</b>: Movement of <b>food</b> via phloem (not water vapor).</p><p>&bull; <b>Respiration</b>: Breakdown of glucose for energy (involves gases but not water loss).</p><p>&bull; <b>Photosynthesis</b>: Food production using CO&#8322; + water (stomata open for CO&#8322;, but water loss is a side effect).</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>The digestion of fats in the small intestine is aided by secretions from which of the following organs?</p><p>i. Salivary glands</p><p>ii. Liver</p><p>iii. Pancreas</p><p>iv. Gastric glands</p><p>Choose the correct combination from the options given:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2331;&#2379;&#2335;&#2368; &#2310;&#2306;&#2340; &#2350;&#2375;&#2306; &#2357;&#2360;&#2366; &#2325;&#2375; &#2346;&#2366;&#2330;&#2344; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2306;&#2327; &#2360;&#2375; &#2360;&#2381;&#2352;&#2366;&#2357; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2350;&#2367;&#2354;&#2340;&#2368; &#2361;&#2376;?</p><p>i. &#2354;&#2366;&#2352; &#2327;&#2381;&#2352;&#2306;&#2341;&#2367;&#2351;&#2366;&#2305;</p><p>ii. &#2351;&#2325;&#2371;&#2340;</p><p>iii. &#2309;&#2327;&#2381;&#2344;&#2381;&#2351;&#2366;&#2358;&#2351;</p><p>iv. &#2327;&#2376;&#2360;&#2381;&#2335;&#2381;&#2352;&#2367;&#2325; &#2327;&#2381;&#2352;&#2306;&#2341;&#2367;&#2351;&#2366;&#2305;</p><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2361;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">i and iv</span><span class=\"hqt\" style=\"display:none\">i &#2324;&#2352; iv</span>",
      "<span class=\"eqt\">ii and iii</span><span class=\"hqt\" style=\"display:none\">ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i and iii</span><span class=\"hqt\" style=\"display:none\">i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">ii and iv</span><span class=\"hqt\" style=\"display:none\">ii &#2324;&#2352; iv</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The digestion of fats in the small intestine is aided by secretions from: <b>Liver</b></p><p><b>and Pancreas.</b></p><p><b>Liver</b>: Secretes <b>bile</b> (stored in gallbladder) which:</p><p>o Emulsifies fats &rarr; breaks large globules into smaller droplets.</p><p>o Increases surface area for enzyme action.</p><p><b>Pancreas</b>: Secretes <b>pancreatic lipase</b> (enzyme) which:</p><p>o Hydrolyzes fats &rarr; fatty acids + glycerol.</p><p>&bull; <b>Salivary glands</b>: Secrete <i>salivary amylase</i> (only digests starch in mouth).</p><p>&bull; <b>Gastric glands</b>: Secrete <i>gastric lipase</i> (minor role; mainly digests proteins in stomach).</p>",
    "question_index": 16
  },
  {
