    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The Constituent Assembly of India, which was responsible for drafting the Constitution, was formed based on the recommendations of which of the following?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366;, &#2332;&#2379; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2350;&#2360;&#2380;&#2342;&#2366; &#2340;&#2376;&#2351;&#2366;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2341;&#2368;, &#2325;&#2366; &#2327;&#2336;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358;&#2379;&#2306; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">August Offer</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2327;&#2360;&#2381;&#2340; &#2321;&#2347;&#2352;</span>",
      "<span class=\"eqt\">Cripps Mission</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2360; &#2350;&#2367;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Cabinet Mission</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2348;&#2367;&#2344;&#2375;&#2335; &#2350;&#2367;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Mountbatten Plan</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2313;&#2306;&#2335;&#2348;&#2375;&#2335;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The <b>Cabinet Mission Plan</b> of 1946 proposed the formation of a Constituent Assembly to draft the Indian Constitution.</p><p>&bull; The Cabinet Mission was sent by the British government to India to discuss the transfer of power and the post-war future of India.</p><p>&bull; The Constituent Assembly was tasked with framing a constitution that would ensure a smooth transition of power from British rule to independent India.</p><p>&bull; The Assembly consisted of representatives elected by provincial legislatures and nominated by princely states.</p><p>&bull; The Constituent Assembly first met on 9th December 1946, marking the beginning of the constitutional process.</p><p><b>Additional details:</b></p><p>&bull; August Offer was a set of proposals made by the British Government in 1940 to gain Indian support in World War II.</p><p>&bull; Cripps Mission 1942, sent by Britishers to India to secure full support of Indians in World War II.</p><p>&bull; Mountbatten Plan is also known as the June 3 Plan. According to this Plan Mountbatten decided the Partition of India and Pakistan and both Muslim league and Congress accepted it.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are true?</p><p>A.Dr. Rajendra Prasad was the President of the Constituent Assembly of India.</p><p>B.Harendra Coomar Mookerjee served as the Vice President of the Constituent Assembly.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A. &#2337;&#2377;. &#2352;&#2366;&#2332;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2360;&#2366;&#2342; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2341;&#2375;&#2404;</p><p>B. &#2361;&#2352;&#2375;&#2306;&#2342;&#2381;&#2352; &#2325;&#2369;&#2350;&#2366;&#2352; &#2350;&#2369;&#2326;&#2352;&#2381;&#2332;&#2368; &#2344;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2375; &#2313;&#2346;&#2366;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">A only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Dr. Rajendra Prasad</b> was the President of the Constituent Assembly of India.</p><p>&bull; <b>Dr. H.C. Mookerjee</b> served as the Vice President of the Constituent Assembly, playing a key role in the debates and proceedings.</p><p>&bull; Along with Harendra Coomar Mookerjee, V. T. Krishnamachari was also elected as the second vice-president of the Constituent Assembly.</p><p>&bull; H.C. Mookerjee later became the first Governor of West Bengal after independence.</p><p><b>Additional details:</b></p><p>&bull; Sardar Patel was the Chairman of Provincial Committee, Fundamental rights committee, Minorities Committees. Option 1 is incorrect</p><p>&bull; Dr. Ambedkar was the Chairman of the drafting committee. Option 2 is incorrect</p><p>&bull; C. Rajagopalachari was the First Indian to be the Governor General of India. Option 4 is incorrect</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The inspiration for the inclusion of a Preamble in the Indian Constitution was drawn from the Constitution of which country?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;&#2344;&#2366; &#2325;&#2379; &#2358;&#2366;&#2350;&#2367;&#2354; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2375;&#2352;&#2339;&#2366; &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2375; &#2354;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">France</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2352;&#2366;&#2306;&#2360;</span>",
      "<span class=\"eqt\">Canada</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2344;&#2366;&#2337;&#2366;</span>",
      "<span class=\"eqt\">USA</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2319;&#2360;&#2319;</span>",
      "<span class=\"eqt\">Australia</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2360;&#2381;&#2335;&#2381;&#2352;&#2375;&#2354;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The Preamble of the Indian Constitution was inspired by the Preamble of the United States Constitution.</p><p>&bull; Preamble outlines the objectives of the Constitution, including Justice, Liberty, Equality, and Fraternity.</p><p>&bull; The Indian Preamble reflects the ideals of the Indian state and the principles guiding the Constitution.</p><p>&bull; It serves as an introduction and embodies the essence of the Indian Constitution, setting the tone for its provisions.</p><p>&bull; While the structure is similar to the US preamble, the content is uniquely tailored to India's socio-political context.</p><p><b>Additional details:</b></p><p>&bull; The provision of liberty, equality and fraternity was taken from France.</p><p>&bull; The idea of the Federal system and the protection of human rights are inspired from Canada.</p><p>&bull; Freedom of trade, commerce and intercourse, Joint sitting of two houses of Parliament, Cooperative Federalism, Centre-State relation, Concurrent list were from Australia.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The idea of \"Parliamentary Sovereignty\" in the Indian Constitution is similar to which country's system?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; \"&#2360;&#2306;&#2360;&#2342;&#2368;&#2351; &#2360;&#2306;&#2346;&#2381;&#2352;&#2349;&#2369;&#2340;&#2366;\" &#2325;&#2366; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2325;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">France</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2352;&#2366;&#2306;&#2360;</span>",
      "<span class=\"eqt\">USA</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2319;&#2360;&#2319;</span>",
      "<span class=\"eqt\">UK</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2325;&#2375;</span>",
      "<span class=\"eqt\">Japan</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2346;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Ideas of single citizenship, Rule of law, parliamentary system etc were from the UK.</p><p><b>Additional details:</b></p><p>&bull; France: The French system does not emphasize parliamentary sovereignty as the UK does.</p><p>&bull; USA: The U.S. has a system of checks and balances with no single body being sovereign, unlike the UK's parliamentary sovereignty.</p><p>&bull; Japan: Japan's post-war Constitution establishes a constitutional monarchy with a parliamentary system, but it does not reflect parliamentary sovereignty in the same way as the UK.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following was the primary architect and chairman of the Drafting Committee of the Indian Constitution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2352;&#2370;&#2346; &#2360;&#2350;&#2367;&#2340;&#2367; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2366;&#2352; &#2324;&#2352; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Jawaharlal Nehru</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2357;&#2366;&#2361;&#2352;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</span>",
      "<span class=\"eqt\">Dr. Rajendra Prasad</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2377;. &#2352;&#2366;&#2332;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2360;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Dr. B.R. Ambedkar</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2377;. &#2348;&#2368;.&#2310;&#2352;. &#2309;&#2350;&#2381;&#2348;&#2375;&#2337;&#2325;&#2352;</span>",
      "<span class=\"eqt\">K.M. Munshi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;.&#2319;&#2350;. &#2350;&#2369;&#2306;&#2358;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Dr. B.R. Ambedkar is Known as the \"Father of the Indian Constitution\". He was the Chairman of the Drafting Committee.</p><p>&bull; He was instrumental in drafting the detailed provisions of the Constitution, balancing various interests.</p><p>&bull; Ambedkar played a key role in framing the Fundamental Rights, Directive Principles, and provisions for social justice.</p><p>&bull; His legal acumen ensured that the Constitution was a robust document capable of guiding a diverse nation.</p><p><b>Additional details:</b></p><p>&bull; Jawaharlal Nehru was the First Prime Minister of India.</p><p>&bull; Dr. Rajendra Prasad was the President of the Constituent Assembly.</p><p>&bull; K.M Munshi was the chairman of the Order of the Business Committee of the Constituent Assembly.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The concept of \"Judicial Review\" in the Indian Constitution was primarily influenced by which country's constitutional system?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; \"&#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2360;&#2350;&#2368;&#2325;&#2381;&#2359;&#2366;\" &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2325;&#2368; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2360;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">UK</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2325;&#2375;</span>",
      "<span class=\"eqt\">France</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2352;&#2366;&#2306;&#2360;</span>",
      "<span class=\"eqt\">USA</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2319;&#2360;&#2319;</span>",
      "<span class=\"eqt\">Germany</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2352;&#2381;&#2350;&#2344;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The concept of Judicial review allows the judiciary to review the constitutionality of legislative and executive actions.</p><p>&bull; Judicial Review empowers the judiciary to protect the rights of citizens and maintain the rule of law.</p><p>&bull; India adopted this principle from the United States, where it is a cornerstone of constitutional law.</p><p>&bull; It ensures the supremacy of the Constitution and acts as a check on the powers of other branches of government.</p><p>&bull; The Supreme Court of India has used judicial review to uphold Fundamental Rights and ensure justice.</p><p><b>Additional details:</b></p><p>&bull; Features from the UK include Single Citizenship, Office of CAG, Rule of law and Parliamentary form of government.</p><p>&bull; We got 'Republic, liberty, equality and fraternity' from France.</p><p>&bull; We got 'emergency' provision from Germany.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>From which country's constitution did India adopt the concept of Fundamental Duties?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2375; &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2325;&#2379; &#2309;&#2346;&#2344;&#2366;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Soviet Union</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2357;&#2367;&#2351;&#2340; &#2360;&#2306;&#2328;</span>",
      "<span class=\"eqt\">Japan</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2346;&#2366;&#2344;</span>",
      "<span class=\"eqt\">USA</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2319;&#2360;&#2319;</span>",
      "<span class=\"eqt\">France</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2352;&#2366;&#2306;&#2360;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The concept of Fundamental Duties in the Indian Constitution was borrowed from the Soviet Union.</p><p>&bull; These duties were introduced through the 42nd Amendment in 1976 during the Emergency period.</p><p>&bull; They aim to remind citizens of their responsibilities toward the nation, complementing Fundamental Rights.</p><p>&bull; Fundamental duties written under Article 51A.</p><p>&bull; These duties reflect the socialist ideals of the time and emphasize the balance between rights and duties.</p><p><b>Additional details:</b></p><p>&bull; We got the Doctrine of procedure established by law from Japan.</p><p>&bull; We got Fundamental Rights, Judicial Review, Post of President, Vice President etc. from the U.S.</p><p>&bull; We got Republic, liberty, equality and fraternity from France.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The resolution that outlined the guiding principles for the Indian Constitution, known as the \"Objective Resolution,\" was moved by whom?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2350;&#2366;&#2352;&#2381;&#2327;&#2342;&#2352;&#2381;&#2358;&#2325; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;&#2379;&#2306; &#2325;&#2379; &#2352;&#2375;&#2326;&#2366;&#2306;&#2325;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;, &#2332;&#2367;&#2360;&#2375; \"&#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;\" &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2325;&#2367;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Dr. B.R. Ambedkar</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2377;. &#2348;&#2368;.&#2310;&#2352;. &#2309;&#2350;&#2381;&#2348;&#2375;&#2337;&#2325;&#2352;</span>",
      "<span class=\"eqt\">Jawaharlal Nehru</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2357;&#2366;&#2361;&#2352;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</span>",
      "<span class=\"eqt\">Dr. Rajendra Prasad</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2377;. &#2352;&#2366;&#2332;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2360;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Sardar Patel</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2342;&#2366;&#2352; &#2346;&#2335;&#2375;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Objective Resolution was moved by Jawaharlal Nehru on 13th December 1946 in the Constituent Assembly.</p><p>&bull; It laid down the ideals and principles that would guide the drafting of the Constitution.</p><p>&bull; The resolution emphasized sovereignty, democracy, justice, and equality as the goals for the Indian state.</p><p>&bull; It was unanimously adopted by the Assembly on 22nd January 1947 and later became the Preamble's basis.</p><p>&bull; The Objective Resolution was a significant step in defining the foundational values of independent India.</p><p><b>Additional details:</b></p><p>&bull; Dr. B.R Ambedkar was the Chairman of the Drafting Committee.</p><p>&bull; Dr. Rajendra Prasad was the President of the Constituent Assembly.</p><p>&bull; Sardar Patel was the Chairman of Provincial Committee, Fundamental rights committee, Minorities Committees.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which country's constitution provided the basis for the Directive Principles of State Policy in the Indian Constitution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2381;&#2351; &#2344;&#2368;&#2340;&#2367; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2325; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2343;&#2366;&#2352; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [

    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Directive Principles of State Policy were inspired by the Irish Constitution.</p><p>&bull; These principles aim to guide the state in formulating policies and laws that promote social welfare.</p><p>&bull; Unlike Fundamental Rights, these principles are non-justiciable, meaning they cannot be enforced by courts.</p><p>&bull; They cover areas like social justice, economic equality, and the promotion of international peace.</p><p><b>Additional details:</b></p><p>&bull; We took Freedom of trade, commerce and intercourse, Joint sitting of two houses of Parliament, Cooperative Federalism, Centre-State relation, Concurrent list from Australia.</p><p>&bull; The idea of the Federal system and the protection of human rights are inspired from Canada.</p><p>&bull; We got election of the members of the Rajya Sabha and Procedure of amendment of Constitution from South Africa.</p>",

  },
  {

    "correct_option_id": 2,
    "solution": "<p>&bull; The Indian Constitution was formally adopted by the Constituent Assembly on 26th November 1949.</p><p>&bull; It came into effect on 26th January 1950, celebrated annually as Republic Day.</p><p>&bull; 26th November 1949 is observed as Constitution Day in India to commemorate this historic event.</p><p><b>Additional details:</b></p><p>&bull; The drafting process took nearly three years, with extensive debates and discussions.</p><p>&bull; On 15<sup>th</sup> August 1947 we got independence.</p><p>&bull; The Constitution Assembly was first met on 9<sup>th</sup> December 1946.</p>",

    "question": "<span class=\"eqt\"><p>The concept of the \"Rule of Law\" in the Indian Constitution was borrowed from which country's legal system?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; \"&#2325;&#2366;&#2344;&#2370;&#2344; &#2325;&#2375; &#2358;&#2366;&#2360;&#2344;\" &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2325;&#2368; &#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2360;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",

      "<span class=\"eqt\">France</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2352;&#2366;&#2306;&#2360;</span>",
      "<span class=\"eqt\">Australia</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2360;&#2381;&#2335;&#2381;&#2352;&#2375;&#2354;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The \"Rule of Law\" concept was borrowed from the British legal system and integrated into the Indian Constitution.</p><p>&bull; It signifies that all individuals, including government officials, are subject to the law, ensuring equality before the law.</p><p>&bull; Articles 14, 19, and 21 embody the principles of the rule of law, guaranteeing equality and personal liberties.</p><p>&bull; The rule of law allows the judiciary to review legislative and executive actions, ensuring they conform to the Constitution.</p><p><b>Additional details:</b></p><p>&bull; We got Fundamental Rights, Judicial Review, Post of President, Vice President etc. from the U.S. Option 1 is incorrect.</p><p>&bull; We got Republic, liberty, equality and fraternity from France. Option 3 is incorrect.</p><p>&bull; We took Freedom of trade, commerce and intercourse, Joint sitting of two houses of Parliament, Cooperative Federalism, Centre-State relation, Concurrent list from Australia.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>The phrase \"We, the people of India\" in the Preamble emphasizes which principle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;&#2344;&#2366; &#2350;&#2375;&#2306; \"&#2361;&#2350;, &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2354;&#2379;&#2327;\" &#2357;&#2366;&#2325;&#2381;&#2351;&#2366;&#2306;&#2358; &#2325;&#2367;&#2360; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2346;&#2352; &#2332;&#2379;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sovereignty</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2346;&#2381;&#2352;&#2349;&#2369;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Secularism</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2352;&#2381;&#2350;&#2344;&#2367;&#2352;&#2346;&#2375;&#2325;&#2381;&#2359;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Democracy</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2306;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Socialism</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2366;&#2332;&#2357;&#2366;&#2342;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The phrase \"We, the people of India\" signifies that the Constitution derives its authority from the citizens of India. The real sovereign of India is its people.</p><p>&bull; It underscores the idea that the people are the ultimate source of all political power in the country.</p><p>&bull; This principle establishes that the government is elected by the people and is accountable to them.</p><p>&bull; It emphasizes the collective will of the entire nation, ensuring that the Constitution represents all citizens.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following was not a member of the Indian Constituent Assembly?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2366; &#2360;&#2342;&#2360;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mahatma Gandhi</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368;</span>",

      "<span class=\"eqt\">Dr. Rajendra Prasad</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2377;. &#2352;&#2366;&#2332;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2360;&#2366;&#2342;</span>",
      "<span class=\"eqt\">K.M. Munshi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;.&#2319;&#2350;. &#2350;&#2369;&#2306;&#2358;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Despite being a key figure in India's freedom struggle, Mahatma Gandhi was not a member of the Constituent Assembly.</p><p>&bull; Gandhi focused more on social reforms and grassroots movements during the Assembly's formation.</p><p>&bull; His ideas, particularly on non-violence and self-reliance, influenced many members of the Assembly.</p><p>&bull; Gandhi chose to stay away from formal politics, allowing leaders like Nehru and Patel to take charge.</p><p>&bull; His vision for India continued to influence the Constitution, even without his direct participation.</p><p><b>Additional details:</b></p><p>&bull; Dr. Rajendra Prasad was the President of the Constituent Assembly.</p><p>&bull; Sardar Patel was the Chairman of Provincial Committee, Fundamental rights committee, Minorities Committees.</p><p>&bull; KM Munshi was a member of the constitutional assembly and chairman of the Order of the Business Committee of the Constituent Assembly.</p>",
    "question_index": 12
  },
  {

      "<span class=\"eqt\">Government of India Act, 1935</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1935</span>",
      "<span class=\"eqt\">Weimar Constitution of Germany</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2352;&#2381;&#2350;&#2344;&#2368; &#2325;&#2366; &#2357;&#2366;&#2311;&#2350;&#2352; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Australian Constitution</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2360;&#2381;&#2335;&#2381;&#2352;&#2375;&#2354;&#2367;&#2351;&#2366;&#2312; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344;</span>"

    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Government of India Act, 1935</b> served as a significant source for many provisions in the Indian Constitution.</p><p>&bull; It provided a federal structure, provincial autonomy, and the idea of a central government, which were incorporated into the Constitution.</p><p>&bull; The Act laid down the administrative framework that was adapted and modified for independent India.</p><p>&bull; Many administrative and legislative provisions were borrowed and refined from this Act.</p>",
    "question_index": 13

  {
    "question": "<span class=\"eqt\"><p>The concept of \"Single Citizenship\" in the Indian Constitution was borrowed from which country's constitution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; \"&#2319;&#2325;&#2354; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2340;&#2366;\" &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Canada</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2344;&#2366;&#2337;&#2366;</span>",
      "<span class=\"eqt\">UK</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2325;&#2375;</span>",
      "<span class=\"eqt\">USA</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2319;&#2360;&#2319;</span>",
      "<span class=\"eqt\">Australia</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2360;&#2381;&#2335;&#2381;&#2352;&#2375;&#2354;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The concept of \"Single Citizenship\" was borrowed from the United Kingdom's constitutional system.</p><p>&bull; Unlike the dual citizenship system in federal countries like the USA, India has a single citizenship for all its citizens.</p><p>&bull; This concept promotes national unity and integrity by treating all citizens equally, irrespective of their state of residence.</p><p>&bull; The Indian Constitution does not provide for state citizenship, unlike some federal countries.</p><p>&bull; Single citizenship ensures uniformity in the rights and duties of citizens across the country.</p><p><b>Additional details:</b></p><p>&bull; The idea of the Federal system and the protection of human rights are inspired from Canada.</p><p>&bull; We got Fundamental Rights, Judicial Review, Post of President, Vice President etc. from the U.S.</p><p>&bull; We took Freedom of trade, commerce and intercourse, Joint sitting of two houses of Parliament, Cooperative Federalism, Centre-State relation, Concurrent list from Australia.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which country's constitution influenced the inclusion of the \"Emergency Provisions\" in the Indian Constitution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; \"&#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354;&#2368;&#2344; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;&#2379;&#2306;\" &#2325;&#2379; &#2358;&#2366;&#2350;&#2367;&#2354; &#2325;&#2352;&#2344;&#2375; &#2325;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Germany</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2352;&#2381;&#2350;&#2344;&#2368;</span>",
      "<span class=\"eqt\">USA</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2319;&#2360;&#2319;</span>",
      "<span class=\"eqt\">Canada</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2344;&#2366;&#2337;&#2366;</span>",
      "<span class=\"eqt\">Russia</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2370;&#2360;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The Emergency Provisions in the Indian Constitution were influenced by the Weimar Constitution of Germany.</p><p>&bull; Provisions under Articles 352 to 360 allow the central government to take special powers during times of national emergency.</p><p>&bull; <b>Types of Emergencies:</b> The Constitution provides for three types of emergencies: National, President Rule, and Financial.</p><p>&bull; During an emergency, the powers of the state governments are significantly reduced, and the central government assumes greater authority.</p><p>&bull; The inclusion of Emergency Provisions ensures that the Indian state can maintain stability and order during extraordinary situations, though it also raises concerns about the potential for abuse of power.</p><p><b>Additional details:</b></p><p>&bull; The idea of the Federal system and the protection of human rights are inspired from Canada.</p><p>&bull; We got Fundamental Rights, Judicial Review, Post of President, Vice President etc. from the U.S.</p><p>&bull; We got social, economic and political justice and the ideal of fundamental duties from the Russia formerly USSR.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Who was appointed as the Constitutional Advisor to the Constituent Assembly of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2375; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2360;&#2354;&#2366;&#2361;&#2325;&#2366;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2375; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">B.N. Rau</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;.&#2319;&#2344;. &#2352;&#2366;&#2313;</span>",

      "<span class=\"eqt\">Dr. B.R. Ambedkar</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2377;. &#2348;&#2368;.&#2310;&#2352;. &#2309;&#2350;&#2381;&#2348;&#2375;&#2337;&#2325;&#2352;</span>",
      "<span class=\"eqt\">Sardar Patel</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2342;&#2366;&#2352; &#2346;&#2335;&#2375;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Sir Benegal Narsing Rau served as the Constitutional Advisor to the Constituent Assembly of India.</p><p>&bull; He played a crucial role in guiding the Assembly on legal and constitutional matters, drafting initial outlines of the Constitution.</p><p>&bull; Rau studied various constitutions around the world, providing insights and suggestions to the Assembly.</p><p>&bull; His drafts were later reviewed and refined by the Drafting Committee, headed by Dr. B.R. Ambedkar.</p><p>&bull; Rau's contributions were vital in shaping the final structure of the Indian Constitution.</p><p><b>Additional details:</b></p><p>&bull; The committees of the Constituent Assembly chaired by Jawaharlal Nehru were Union Powers Committee, States Committee, and Union Constitution Committee.</p><p>&bull; Dr. Ambedkar was the Chairman of the Drafting Committee.</p><p>&bull; Sardar Patel was the Chairman of Provincial Committee, Fundamental rights committee, Minorities Committees.</p>",
    "question_index": 16
