  {
    "question": "<span class=\"eqt\"><p>Which of the following is the only riverine port among the 12 major ports of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; 12 &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325;&#2350;&#2366;&#2340;&#2381;&#2352; &#2344;&#2342;&#2368; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Paradip Port</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2366;&#2342;&#2368;&#2346; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Kolkata Port</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2354;&#2325;&#2366;&#2340;&#2366; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Visakhapatnam Port</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2366;&#2326;&#2366;&#2346;&#2340;&#2381;&#2340;&#2344;&#2350; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Kamarajar Port</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2350;&#2352;&#2366;&#2332;&#2366;&#2352; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Kolkata Port, officially known as Syama Prasad Mookerjee Port, is the only riverine port among India's 12 major ports. It is situated on the banks of the Hooghly River and has a twin dock system  -  Haldia dock and Kolkata dock.</p><p>&bull; Paradip Port: Located in Odisha, it is at the confluence of the Mahanadi River and the Bay of Bengal but is not riverine.</p><p>&bull; Visakhapatnam Port : A natural harbor but not riverine.</p><p>&bull; Kamarajar Port : A corporate port near Chennai, not riverine.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following ports is known as the busiest container port in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2357;&#2381;&#2351;&#2360;&#2381;&#2340; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mumbai Port</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2306;&#2348;&#2312; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Chennai Port</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2375;&#2344;&#2381;&#2344;&#2312; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Jawaharlal Nehru Port</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2357;&#2366;&#2361;&#2352;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Cochin Port</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2330;&#2368;&#2344; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Jawaharlal Nehru Port (Nhava Sheva) is the largest container-handling port in India, managing around 56% of the country's total container traffic.</p><p>&bull; Mumbai Port : One of the busiest ports but mainly deals with crude oil and bulk cargo.</p><p>&bull; Chennai Port : The second-largest container port but not the busiest.</p><p>&bull; Cochin Port : Handles transshipment but not the largest container hub.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which port is strategically located between Chennai Port and Kolkata Port and is India's deepest landlocked port?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2330;&#2375;&#2344;&#2381;&#2344;&#2312; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2324;&#2352; &#2325;&#2379;&#2354;&#2325;&#2366;&#2340;&#2366; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2325;&#2375; &#2348;&#2368;&#2330; &#2352;&#2339;&#2344;&#2368;&#2340;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2327;&#2361;&#2352;&#2366; &#2360;&#2381;&#2341;&#2354;&#2352;&#2369;&#2342;&#2381;&#2343; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Visakhapatnam Port</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2366;&#2326;&#2366;&#2346;&#2340;&#2381;&#2340;&#2344;&#2350; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Paradip Port</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2366;&#2342;&#2368;&#2346; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Tuticorin Port</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2370;&#2340;&#2368;&#2325;&#2379;&#2352;&#2367;&#2344; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Kamarajar Port</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2350;&#2352;&#2366;&#2332;&#2366;&#2352; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Visakhapatnam Port, also known as Vizag Port, is India's deepest and safest landlocked port, located between Chennai and Kolkata. It has three harbors - inner, outer, and fishing harbors.</p><p>&bull; Paradip Port : Important for iron ore export but not landlocked.</p><p>&bull; Tuticorin Port : An artificial port but not landlocked.</p><p>&bull; Kamarajar Port : A corporate port near Chennai, but not landlocked.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following ports was the first major port on the eastern coast of India to be commissioned after independence?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2325;&#2375; &#2348;&#2366;&#2342; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2340;&#2335; &#2346;&#2352; &#2330;&#2366;&#2354;&#2370; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2346;&#2361;&#2354;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Paradip Port</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2366;&#2342;&#2368;&#2346; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Chennai Port</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2375;&#2344;&#2381;&#2344;&#2312; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Tuticorin Port</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2370;&#2340;&#2368;&#2325;&#2379;&#2352;&#2367;&#2344; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Visakhapatnam Port</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2366;&#2326;&#2366;&#2346;&#2340;&#2381;&#2340;&#2344;&#2350; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Paradip Port was declared the eighth major port of India in 1966 and was the first major port to be developed on the eastern coast post-independence.</p><p>&bull; Chennai Port : Existed since the colonial era.</p><p>&bull; Tuticorin Port : Developed later.</p><p>&bull; Visakhapatnam Port : Existed before independence.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which major Indian port is the leading exporter of iron ore?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2354;&#2380;&#2361; &#2309;&#2351;&#2360;&#2381;&#2325; &#2325;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kandla Port</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2306;&#2337;&#2354;&#2366; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Mormugao Port</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2352;&#2350;&#2369;&#2327;&#2366;&#2323; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Cochin Port</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2330;&#2368;&#2344; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Kolkata Port</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2354;&#2325;&#2366;&#2340;&#2366; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Mormugao Port, located in Goa, is the leading port for iron ore exports in India.</p><p>&bull; Kandla Port : Largest cargo-handling port but does not specialize in iron ore export.</p><p>&bull; Cochin Port : Deals with spices, tea, and container traffic.</p><p>&bull; Kolkata Port : Exports tea, coal, and steel, but not primarily iron ore.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following ports was formerly known as Ennore Port?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2346;&#2361;&#2354;&#2375; &#2319;&#2344;&#2381;&#2344;&#2379;&#2352; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Paradip Port</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2366;&#2342;&#2368;&#2346; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Kamarajar Port</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2350;&#2352;&#2366;&#2332;&#2366;&#2352; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Tuticorin Port</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2370;&#2340;&#2368;&#2325;&#2379;&#2352;&#2367;&#2344; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Visakhapatnam Port</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2366;&#2326;&#2366;&#2346;&#2340;&#2381;&#2340;&#2344;&#2350; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Kamarajar Port, formerly known as Ennore Port, is the first corporatized major port in India.</p><p>&bull; Paradip Port : Not corporatized.</p><p>&bull; Tuticorin Port : An artificial port but not corporatized.</p><p>&bull; Visakhapatnam Port : Not known as Ennore.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following ports is known for pearl fishery?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2350;&#2379;&#2340;&#2368; &#2350;&#2331;&#2354;&#2368; &#2346;&#2325;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chennai Port</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2375;&#2344;&#2381;&#2344;&#2312; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Tuticorin Port</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2370;&#2340;&#2368;&#2325;&#2379;&#2352;&#2367;&#2344; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Cochin Port</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2330;&#2368;&#2344; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Visakhapatnam Port</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2366;&#2326;&#2366;&#2346;&#2340;&#2381;&#2340;&#2344;&#2350; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Tuticorin Port (V.O. Chidambaranar Port) in Tamil Nadu is famous for pearl fishery in the Bay of Bengal.</p><p>&bull; Chennai Port : Known for automobile exports.</p><p>&bull; Cochin Port : Known for spice trade.</p><p>&bull; Visakhapatnam Port : Handles iron ore and oil but not pearls.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The International Container Transshipment Terminal (Vallarpadam Terminal) is part of which port?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2358;&#2367;&#2346;&#2350;&#2375;&#2306;&#2335; &#2335;&#2352;&#2381;&#2350;&#2367;&#2344;&#2354; (&#2357;&#2354;&#2381;&#2354;&#2366;&#2352;&#2346;&#2342;&#2350; &#2335;&#2352;&#2381;&#2350;&#2367;&#2344;&#2354;) &#2325;&#2367;&#2360; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cochin Port</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2330;&#2368;&#2344; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Chennai Port</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2375;&#2344;&#2381;&#2344;&#2312; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Jawaharlal Nehru Port</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2357;&#2366;&#2361;&#2352;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Mumbai Port</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2306;&#2348;&#2312; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The Vallarpadam International Container Transshipment Terminal is India's largest transshipment terminal and is part of the Cochin Port.</p><p>&bull; Chennai Port: A major container port but does not have this facility.</p><p>&bull; Jawaharlal Nehru Port: India's busiest container port but not a transshipment hub.</p><p>&bull; Mumbai Port: Not a transshipment port.</p>",
    "question_index": 7
