    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>According to Article 265 of the Indian Constitution, what is the key principle regarding the collection of taxes in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 265 &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2350;&#2369;&#2326;&#2381;&#2351; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">No tax shall be levied or collected without prior approval from the judiciary.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2366;&#2351;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2325;&#2368; &#2346;&#2370;&#2352;&#2381;&#2357; &#2360;&#2381;&#2357;&#2368;&#2325;&#2371;&#2340;&#2367; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366; &#2325;&#2379;&#2312; &#2349;&#2368; &#2325;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366; &#2351;&#2366; &#2357;&#2360;&#2370;&#2354;&#2366; &#2344;&#2361;&#2368;&#2306; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404;</span>",
      "<span class=\"eqt\">No tax shall be levied or collected except by authority of law.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2344;&#2370;&#2344; &#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366; &#2325;&#2379;&#2312; &#2349;&#2368; &#2325;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366; &#2351;&#2366; &#2357;&#2360;&#2370;&#2354;&#2366; &#2344;&#2361;&#2368;&#2306; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Taxes must be levied by Parliament, but collection is managed by states.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352; &#2360;&#2306;&#2360;&#2342; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The Finance Ministry can levy taxes with retrospective effect.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2340;&#2381;&#2340; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2346;&#2370;&#2352;&#2381;&#2357;&#2357;&#2381;&#2351;&#2366;&#2346;&#2368; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2360;&#2375; &#2325;&#2352; &#2354;&#2327;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Article 265 of the Constitution establishes that taxation can only be done by legal authority. This principle ensures that taxes cannot be arbitrarily imposed by any entity without due legislation.</b></p><p>&bull; Judiciary does not approve tax laws but can review their constitutionality.</p><p>&bull; Both Parliament and state legislatures levy taxes based on their respective jurisdictions.</p><p>&bull; Retrospective taxation can occur, but it must be done through legislative action, not solely by the Finance Ministry.</p><p><b>Further Insight:</b></p><p>&bull; Taxation in India is structured across a three-tier federal system, where the Centre, State, and Local Governments hold the authority to levy and collect taxes. </p><p>&bull; This power is explicitly provided by the Constitution of India.</p><p>&bull; Part XII of Constitution of India - Finance, Property, Contracts and Suits</p><p>&#9675; <b>Article 265 </b>- No tax shall be levied or collected except by authority of law.</p><p>&#9675; <b>Article 266</b> - Consolidated Funds and public accounts of India and of the States.</p><p>&#9675; <b>Article 267 </b>- Contingency Fund.</p><p>&bull; Distribution of Revenues between the Union and the States</p><p>&#9675; Article 268 - Duties levied by the Union but collected and appropriated by the States.</p><p>&#9675; Article 269 - Taxes levied and collected by the Union but assigned to the States.</p><p>&#9675; Article 269A - Levy and collection of goods and services tax in course of inter-State trade or commerce.</p><p>&#9675; Article 270 - Taxes levied and distributed between the Union and the States.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is considered a progressive tax in India, primarily aimed at reducing income inequality?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2327;&#2340;&#2367;&#2358;&#2368;&#2354; &#2325;&#2352; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2310;&#2351; &#2309;&#2360;&#2350;&#2366;&#2344;&#2340;&#2366; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Goods and Services Tax (GST)</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2360;&#2381;&#2340;&#2369; &#2319;&#2357;&#2306; &#2360;&#2375;&#2357;&#2366; &#2325;&#2352; (GST)</span>",
      "<span class=\"eqt\">Customs Duty</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2350;&#2366; &#2358;&#2369;&#2354;&#2381;&#2325;</span>",
      "<span class=\"eqt\">Income Tax</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2325;&#2352;</span>",
      "<span class=\"eqt\">Excise Duty</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2358;&#2369;&#2354;&#2381;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Income tax is progressive in nature, meaning higher income levels attract higher tax rates. </b></p><p>&#9675; <b>This is designed to distribute the tax burden more equitably, reducing income inequality.</b></p><p>&bull; GST is a proportional tax</p><p>&bull; Customs Duty is levied on imports and exports. It is not based on income levels.</p><p>&bull; Excise Duty is imposed on goods produced within the country and does not have a progressive nature.</p><p><b>Further Insight:</b></p><p>&bull; <b>Progressive tax</b>: It is a type of taxation system in which the government takes a larger percentage of income as tax from high-income groups than from low-income groups. E,g Direct taxes such as Income tax.</p><p>&bull; <b>Proportional tax</b>: It is a type of taxation system in which the government takes the same percentage of income as tax from all income groups. E.g Indirect taxes such as GST.</p><p>&bull; <b>Regressive tax</b>: It is a type of taxation system in which the government takes a larger percentage of income as tax from low-income groups than from high-income groups. E.g Indirect taxes whose burden mainly falls on low income group. </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Why are indirect taxes called regressive?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2327;&#2366;&#2350;&#2368; &#2325;&#2381;&#2351;&#2379;&#2306; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">They are charged at higher rates than direct tax</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325; &#2342;&#2352; &#2360;&#2375; &#2325;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">They are charged at the same rate for all income groups.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2310;&#2351; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2361;&#2368; &#2342;&#2352; &#2346;&#2352; &#2358;&#2369;&#2354;&#2381;&#2325; &#2354;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both above are correct</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">None of the above are correct</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2360;&#2361;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Low and high income earners pay the same amount under a regressive tax, which is a kind of tax imposed regardless of income.</b></p><p>&#9675; <b>Low-income taxpayers are more negatively impacted</b> than high-income earners. </p><p>&bull; Regardless of their financial situation, everyone who purchases goods must pay indirect taxes and they are charged at the same rate for all income groups..</p><p>&#9675; <b>It is a regressive tax since the poor will pay a higher percentage of their income in taxes than the rich people</b>. </p><p>&bull; Indirect taxes called regressive as </p><p><b>Further Insight:</b></p><p>&bull; Indirect taxes are levied on goods and services, where the tax burden is passed on to the final consumer. These are typically regressive as they apply uniformly regardless of income.</p><p>&bull; Examples:</p><p>&#9675; Goods and Services Tax (GST): A comprehensive tax covering all goods and services.</p><p>&#9675; Customs Duty: Levied on imports and exports.</p><p>&#9675; Excise Duty: Levied on the production of goods within the country.</p><p>&bull; The Central Board of Indirect Taxes and Customs (CBIC) administers indirect taxes.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>With enactment of which act the modern taxation system in India begin to evolve, ultimately leading to the enactment of the Income Tax Act of 1961?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2325;&#2352;&#2366;&#2343;&#2366;&#2344; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2361;&#2379;&#2344;&#2368; &#2358;&#2369;&#2352;&#2370; &#2361;&#2369;&#2312;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2309;&#2306;&#2340;&#2340;&#2307; 1961 &#2325;&#2366; &#2310;&#2351;&#2325;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2361;&#2369;&#2310;?</p></span>",
    "options": [
      "<span class=\"eqt\">Income Tax Act, 1833</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2325;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1833</span>",
      "<span class=\"eqt\">Income Tax Act, 1858</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2325;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1858</span>",
      "<span class=\"eqt\">Income Tax Act, 1860</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2325;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1860</span>",
      "<span class=\"eqt\">Income Tax Act, 1919</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2325;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1919</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>The modern taxation system began evolving under British rule, with the introduction of the first Income Tax Act in 1860, which laid the foundation for today's tax system culminating in the Income Tax Act of 1961.</b></p><p><b>Further Insight:</b></p><p>&bull; The modern taxation system began in 1860 under James Wilson, who introduced the Income Tax Act to cover the fiscal deficits following the Revolt of 1857.</p><p>&bull; Later, the Income Tax Act of 1922 formed the base for today's taxation system which is largely governed by the Income Tax Act of 1961(It was recommended by the Direct Taxes Enquiry Committee).</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following correctly describes the relationship between CGST, SGST, and IGST under the Goods and Services Tax regime?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2357;&#2360;&#2381;&#2340;&#2369; &#2319;&#2357;&#2306; &#2360;&#2375;&#2357;&#2366; &#2325;&#2352; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2375; &#2340;&#2361;&#2340; CGST, SGST &#2324;&#2352; IGST &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2348;&#2306;&#2343; &#2325;&#2366; &#2360;&#2361;&#2368; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">CGST and SGST apply on inter-state transactions, while IGST applies on intra-state transactions.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2324;&#2352; &#2319;&#2360;&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2309;&#2306;&#2340;&#2352;-&#2352;&#2366;&#2332;&#2381;&#2351;&#2368;&#2351; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2346;&#2352; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2310;&#2312;&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2309;&#2306;&#2340;&#2352;-&#2352;&#2366;&#2332;&#2381;&#2351;&#2368;&#2351; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2346;&#2352; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">CGST is collected by the state government, SGST by the central government, and IGST is shared equally.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366;, &#2319;&#2360;&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2340;&#2341;&#2366; &#2310;&#2312;&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2325;&#2379; &#2360;&#2350;&#2366;&#2344; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2366;&#2333;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">CGST and SGST apply on intra-state transactions, while IGST applies on inter-state transactions.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2324;&#2352; &#2319;&#2360;&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2309;&#2306;&#2340;&#2352;-&#2352;&#2366;&#2332;&#2381;&#2351;&#2368;&#2351; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2346;&#2352; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2310;&#2312;&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2309;&#2306;&#2340;&#2352;-&#2352;&#2366;&#2332;&#2381;&#2351;&#2368;&#2351; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2346;&#2352; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Only IGST applies on both inter-state and intra-state transactions.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2352;-&#2352;&#2366;&#2332;&#2381;&#2351;&#2368;&#2351; &#2324;&#2352; &#2309;&#2306;&#2340;&#2352;-&#2352;&#2366;&#2332;&#2381;&#2351;&#2368;&#2351; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2346;&#2352; &#2325;&#2375;&#2357;&#2354; IGST &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>CGST (Central Goods and Services Tax) and SGST (State Goods and Services Tax) apply to transactions within a state, while IGST (Integrated Goods and Services Tax) applies to transactions between states or on imports.</b></p><p>&bull; CGST and SGST do not apply to inter-state transactions. (Inter means with two different bodies, Intra means within the same body.)</p><p>&bull; CGST is collected by the central government, and SGST is collected by state governments; IGST is collected by the central government but distributed as per rules.</p><p>&bull; IGST only applies to inter-state transactions, not intra-state ones.</p><p><b>Further Insight:</b></p><p>&bull; <b>Goods and Services Tax (GST)</b></p><p>&#9675; Passed and added in constitution after 101st Constitutional amendment Bill 2016</p><p>&#9675; Implemented on July 1, 2017, GST is a multi-stage, destination-based tax.</p><p>&#9675; It is aimed at eliminating the cascading effect of previous taxes.</p><p>&#9675; GST integrates most indirect taxes into a single tax system.</p><p>&#9675; It is divided into CGST, SGST, and IGST (for inter-state transactions).</p><p>&bull; <b>GST Council:</b></p><p>&#9675; Decision-making body chaired by the Finance Minister of India mentioned in Article 279A.</p><p>&#9675; It includes the Union and State Finance Ministers.</p><p>&#9675; The Union has 1/3rd voting power while the state has 2/3rd voting power.</p><p>&#9632; To pass any bill it must be passed by 3/4th vote</p><p>&#9675; The council oversees changes in GST rates, exemptions, and procedural regulations</p><p>&bull; <b>Exemptions under GST</b></p><p>&#9675; Custom duty will be still collected along with the levy of IGST on imported goods.</p><p>&#9675; Petroleum and tobacco products are currently exempted.</p><p>&#9675; Excise duty on liquor, stamp duty and electricity taxes are also exempted.</p>",
    "question_index": 4
  },

    "question": "<span class=\"eqt\"><p>As per Section 115BBH of the Income Tax Act, how is the income from cryptocurrency taxed in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2351;&#2325;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2368; &#2343;&#2366;&#2352;&#2366; 115BBH &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335;&#2379;&#2325;&#2352;&#2375;&#2306;&#2360;&#2368; &#2360;&#2375; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2310;&#2351; &#2346;&#2352; &#2325;&#2376;&#2360;&#2375; &#2325;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">10% tax on long-term gains, 20% on short-term gains</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2368;&#2352;&#2381;&#2328;&#2325;&#2366;&#2354;&#2367;&#2325; &#2354;&#2366;&#2349; &#2346;&#2352; 10% &#2325;&#2352;, &#2309;&#2354;&#2381;&#2346;&#2325;&#2366;&#2354;&#2367;&#2325; &#2354;&#2366;&#2349; &#2346;&#2352; 20%</span>",
      "<span class=\"eqt\">Progressive tax based on income slabs</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351; &#2360;&#2381;&#2354;&#2376;&#2348; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2346;&#2381;&#2352;&#2327;&#2340;&#2367;&#2358;&#2368;&#2354; &#2325;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Cryptocurrency income is taxed at a flat 30% rate as per Section 115BBH of the Income Tax Act. </p><p>&bull; No deduction, except the cost of acquisition, are allowed.</p><p>&bull; Cryptocurrency is taxed at a flat rate of 30%, not differentiated by short or long-term gains.</p><p><b>Further Insight:</b></p><p>&bull; <b>Taxation on Virtual Digital Assets (Cryptocurrency)</b></p><p>&bull; Introduced: 2022-23 Budget.</p><p>&bull; Tax Rate: 30% on income from the transfer of virtual digital assets.</p><p>&bull; No Deductions: Except for the cost of acquisition.</p><p>&bull; 1% TDS: On transactions over a specific threshold.</p><p>&bull; Impact:</p><p>&bull; Aims to regulate the growing cryptocurrency market.</p><p>&bull; Encourages transparency in digital asset transactions.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following is an example of a tax levied specifically by state governments and not the central government?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2352; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2344; &#2325;&#2367; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366;?</p></span>",
    "options": [

    "solution": "<p>&bull; <b>Entertainment Tax is levied by state governments on activities such as movie screenings, amusement parks, and events.</b></p><p>&bull; Customs Duty, Income Tax and Corporation Tax are levied by the central government.</p><p><b>Further Insight:</b></p><p>&bull; State Taxes:</p><p>&#9675; Levied by State Governments:</p><p>&#9675; <b>Types of State tax:</b></p><p>&#9675; <b>State Goods and Services Tax (SGST)</b>: State portion of GST for intra-state sales.</p><p>&#9675; <b>Stamp Duty:</b> On property transactions and official documents.</p><p>&#9675; <b>Entertainment Tax:</b> On events like movies and concerts (now mostly subsumed under GST).</p><p>&bull; <b>Exemptions under GST</b></p><p>&#9675; Custom duty is still collected along with the levy of IGST on imported goods.</p><p>&#9675; Petroleum and tobacco products are exempted.</p><p>&#9675; Excise duty on liquor, stamp duty and electricity taxes are exempted.</p>",

    "question": "<span class=\"eqt\"><p>Under which Article of the Indian Constitution is the distribution of tax revenues between the Union and the States outlined?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2306;&#2328; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2352; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2325;&#2366; &#2357;&#2367;&#2340;&#2352;&#2339; &#2313;&#2354;&#2381;&#2354;&#2367;&#2326;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 268</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 268</span>",
      "<span class=\"eqt\">Article 280</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 280</span>",
      "<span class=\"eqt\">Article 270</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 270</span>",
      "<span class=\"eqt\">Article 246</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 246</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Article 270 of the Constitution details the sharing of tax revenues between the Union and the States. </b></p><p>&#9675; It <b>addresses taxes that are levied by the Union but shared with the States based on the recommendations of the Finance Commission.</b></p><p>&bull; Article 268 deals with duties levied by the Union but collected and appropriated by the States.</p><p>&bull; <b>Article 280 relates to the Finance Commission,</b> which recommends the distribution of revenues.</p><p>&bull; Article 246 defines the legislative powers between the Union and State governments.</p><p><b>Further Insight:</b></p><p>Part XII of Constitution of India - Finance, Property, Contracts and Suits</p><p>&#9675; <b>Article 265 </b>- No tax shall be levied or collected except by authority of law.</p><p>&#9675; <b>Article 266</b> - Consolidated Funds and public accounts of India and of the States.</p><p>&#9675; <b>Article 267 </b>- Contingency Fund.</p><p>&bull; Distribution of Revenues between the Union and the States</p><p>&#9675; Article 268 - Duties levied by the Union but collected and appropriated by the States.</p><p>&#9675; Article 269 - Taxes levied and collected by the Union but assigned to the States.</p><p>&#9675; Article 269A - Levy and collection of goods and services tax in course of inter-State trade or commerce.</p><p>&#9675; Article 270 - Taxes levied and distributed between the Union and the States.</p><p>&#9675; Article 275 - Grants from the Union to certain States.</p><p>&#9675; Article 279A - Goods and Services Tax Council.</p><p>&#9675; Article 280 - Finance Commission.</p><p>&#9675; Article 281 - Recommendations of the Finance Commission.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following taxes falls under the category of direct taxes in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2352; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352;&#2379;&#2306; &#2325;&#2368; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2350;&#2375;&#2306; &#2310;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Value Added Tax (VAT)</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354;&#2381;&#2351; &#2357;&#2352;&#2381;&#2343;&#2367;&#2340; &#2325;&#2352; (VAT)</span>",
      "<span class=\"eqt\">Securities Transaction Tax (STT)</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2349;&#2370;&#2340;&#2367; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2325;&#2352; (STT)</span>",
      "<span class=\"eqt\">Service Tax</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2357;&#2366; &#2325;&#2352;</span>",
      "<span class=\"eqt\">Excise Duty</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2358;&#2369;&#2354;&#2381;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Securities Transaction Tax (STT) is a direct tax that is levied on the purchase or sale of securities listed on Indian stock exchanges</b>. It is directly borne by the individual or entity engaged in the transaction.</p><p>&bull; VAT is an indirect tax, collected from consumers but remitted by businesses to the government.</p><p>&bull; Service Tax was an indirect tax, now subsumed under GST.</p><p>&bull; Excise Duty is also an indirect tax, imposed on the manufacture of goods.</p><p><b>Further Insight:</b></p><p>&bull; <b>Direct Taxes</b></p><p>&#9675; Direct taxes are<b> levied directly on the income or wealth of individuals or organizations, and the burden cannot be shifted.</b> </p><p>&#9675; These taxes are <b>mostly progressive</b>, meaning the tax rate increases with higher income.</p><p>&#9675; Examples:</p><p>&#9632; <b>Income Tax</b>: Levied on the income of individuals and businesses.</p><p>&#9632; <b>Corporate Tax</b>: Applied to the profits of companies.</p><p>&#9632; <b>Capital Gains Tax</b>: Tax on the sale of capital assets.</p><p>&#9632; Securities Transaction Tax (STT): Imposed on transactions in securities markets.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Before the introduction of GST, which of the following was an indirect tax levied at both the Central and State levels in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2344;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2381;&#2340;&#2352;&#2379;&#2306; &#2346;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Central Excise Duty</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2358;&#2369;&#2354;&#2381;&#2325;</span>",
      "<span class=\"eqt\">Custom Duty</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2360;&#2381;&#2335;&#2350; &#2337;&#2381;&#2351;&#2370;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Value Added Tax (VAT)</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354;&#2381;&#2351; &#2357;&#2352;&#2381;&#2343;&#2367;&#2340; &#2325;&#2352; (VAT)</span>",
      "<span class=\"eqt\">Income Tax</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2325;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>VAT was a major indirect tax applied by both the central and state governments before GST.</b></p><p>&#9675; It was collected on the sale of goods, with different rates in different states.</p><p>&bull; Central Excise Duty was levied on goods manufactured in India and was a central government tax.</p><p>&bull; Custom Duty is levied on imports and exports, also by the central government.</p><p>&bull; Income Tax is a direct tax.</p><p><b>Further Insight:</b></p><p>&bull; <b>VAT (Value Added Tax) </b></p><p>&#9675; VAT is an indirect tax levied on goods and services at each stage of production, from raw materials to the final product. </p><p>&#9675; It is charged on the value additions at different production stages. </p><p>&#9675; <b>Value Added Tax was incorporated into the Indian taxation system on 1st April 2005, replacing Sales Tax</b>. </p><p>&#9675; The Goods and Services Tax <b>(GST) is a value-added tax </b>that is poised to be implemented in India, which will replace all indirect taxes levied on goods and services by the Indian Central and State governments </p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which tax introduced during British rule in India was directly levied on landholders and had a profound effect on agriculture?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2352; &#2354;&#2366;&#2327;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366; &#2332;&#2379; &#2360;&#2368;&#2343;&#2375; &#2340;&#2380;&#2352; &#2346;&#2352; &#2349;&#2370;&#2360;&#2381;&#2357;&#2366;&#2350;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366; &#2324;&#2352; &#2311;&#2360;&#2325;&#2366; &#2325;&#2371;&#2359;&#2367; &#2346;&#2352; &#2327;&#2361;&#2352;&#2366; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2346;&#2337;&#2364;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Property Tax</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2352;</span>",
      "<span class=\"eqt\">Land Revenue</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357;</span>",
      "<span class=\"eqt\">Wealth Tax</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2352;</span>",
      "<span class=\"eqt\">Jizya Tax</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2367;&#2332;&#2364;&#2367;&#2351;&#2366; &#2325;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Land Revenue was a tax directly levied on landholders during British rule, particularly under the Permanent Settlement of Bengal. It had a significant impact on Indian agriculture and the rural economy.</b></p><p>&bull; Property Tax is a modern concept applied in urban areas.</p><p>&bull; Wealth Tax was introduced in independent India but has been abolished.</p><p>&bull; Jizya was a tax levied on non-Muslims during the Mughal period and before in Delhi Sultanate, unrelated to land or agriculture.</p><p><b>Further Insight:</b></p><p>&bull; <b>Permanent Settlement (1793)</b></p><p>&#9675; Introduced by Lord Cornwallis</p><p>&#9675; It was implemented in Bengal, Bihar, parts of Orissa</p><p>&#9675; Key Provisions:</p><p>&#9632; Revenue was a fixed annual amount, not subject to revision.</p><p>&#9632; Zamindars (landowners) were responsible for paying the fixed revenue.</p><p>&#9675; Led to commercialization and exploitation of farmers( zamindars had control over peasants, often leading to economic distress among farmers.)</p><p>&bull; <b>Ryotwari System</b></p><p>&#9675; Introduced by Thomas Munro</p><p>&#9675; Implemented in Madras, Bombay, parts of Assam, Central India</p><p>&#9675; Key Provisions:</p><p>&#9632; Revenue was directly assessed on the land and crop yield, with payments made by individual farmers (ryots).</p><p>&#9632; Farmers had occupancy rights and were directly accountable to the government.</p><p>&#9675; It provided more security to farmers and was adaptable to local conditions, though it faced challenges with land records and revenue assessment.</p><p>&bull; <b>Mahalwari System</b></p><p>&bull; Introduced by: Holt Mackenzie</p><p>&bull; Implemented in North-Western Provinces (now Uttar Pradesh), Punjab, Central India</p><p>&bull; Key Provisions:</p><p>&#9675; Revenue was collected from the head of a mahal (village or group of villages) based on land productivity.</p><p>&#9675; Land Tenure: Shared responsibility among the community; the revenue was based on collective accountability.</p><p>&bull; Impact: Aimed to balance interests but often led to administrative complexities and disputes over land rights<b>.</b></p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>What is the primary reason why the implementation of GST is considered a destination-based tax?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2351;&#2344; &#2325;&#2379; &#2327;&#2306;&#2340;&#2357;&#2381;&#2351;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352; &#2325;&#2381;&#2351;&#2379;&#2306; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2311;&#2360;&#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2325;&#2366;&#2352;&#2339; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Taxes are collected at the origin of goods and services.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2350;&#2370;&#2354; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2319;&#2325;&#2340;&#2381;&#2352; &#2325;&#2367;&#2351;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The tax is levied where goods and services are produced.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2325;&#2352; &#2357;&#2361;&#2366;&#2306; &#2354;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2361;&#2366;&#2306; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Taxes are collected where goods and services are consumed.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352; &#2357;&#2361;&#2366;&#2306; &#2319;&#2325;&#2340;&#2381;&#2352; &#2325;&#2367;&#2351;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2361;&#2366;&#2306; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2313;&#2346;&#2349;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Taxes are shared between both the origin and destination states.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2379;&#2306; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2350;&#2370;&#2354; &#2324;&#2352; &#2327;&#2306;&#2340;&#2357;&#2381;&#2351; &#2342;&#2379;&#2344;&#2379;&#2306; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>GST is a destination-based tax, meaning the tax is levied at the place where goods or services are finally consumed, rather than where they are produced. This helps in creating a uniform tax structure across states.</b></p><p>&bull; GST does not operate on an origin-based principle.</p><p>&bull; Production does not determine GST application.</p><p>&bull; Taxes are not shared between the origin and destination states in this manner.</p><p><b>Further Insight:</b></p><p>&bull; <b>Goods and Services Tax (GST)</b></p><p>&#9675; Introduced: July 1, 2017.</p><p>&#9675; Introduced by 101st Constitutional Act,2016 </p><p>&#9675; Structure: Divided into CGST, SGST, and IGST (for inter-state transactions).</p><p>&#9675; Key Features:</p><p>&#9632; Destination based Taxation</p><p>&#9632; Unified tax structure across the country.</p><p>&#9632; Removed cascading tax effects (tax on tax).</p><p>&#9632; Replaced indirect taxes like VAT, Excise, and Service Tax.</p>",
    "question_index": 11
  },

    "question": "<span class=\"eqt\"><p>Under the Indian tax regime, which of the following applies to the taxation of income earned from cryptocurrency trading?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2325;&#2352; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2375; &#2340;&#2361;&#2340;, &#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335;&#2379;&#2325;&#2352;&#2375;&#2306;&#2360;&#2368; &#2335;&#2381;&#2352;&#2375;&#2337;&#2367;&#2306;&#2327; &#2360;&#2375; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2310;&#2351; &#2346;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2352;&#2366;&#2343;&#2366;&#2344; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Income from cryptocurrency trading is treated as capital gains and taxed accordingly.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335;&#2379;&#2325;&#2352;&#2375;&#2306;&#2360;&#2368; &#2335;&#2381;&#2352;&#2375;&#2337;&#2367;&#2306;&#2327; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2310;&#2351; &#2325;&#2379; &#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2354;&#2366;&#2349; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2368; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2325;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A flat tax rate of 30% is applied, without the option for set-off against other income.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2381;&#2351; &#2310;&#2351; &#2360;&#2375; &#2325;&#2335;&#2380;&#2340;&#2368; &#2325;&#2375; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366;, 30% &#2325;&#2368; &#2319;&#2325;&#2360;&#2350;&#2366;&#2344; &#2325;&#2352; &#2342;&#2352; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Cryptocurrency trading income is exempt from tax if held for more than one year.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335;&#2379;&#2325;&#2352;&#2375;&#2306;&#2360;&#2368; &#2335;&#2381;&#2352;&#2375;&#2337;&#2367;&#2306;&#2327; &#2325;&#2368; &#2310;&#2351; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2360;&#2350;&#2351; &#2340;&#2325; &#2352;&#2326;&#2368; &#2332;&#2366;&#2319; &#2340;&#2379; &#2313;&#2360; &#2346;&#2352; &#2325;&#2352; &#2344;&#2361;&#2368;&#2306; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is taxed based on the individual's income slab.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360; &#2346;&#2352; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2368; &#2310;&#2351; &#2360;&#2381;&#2354;&#2376;&#2348; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2325;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Indian government has imposed a flat 30% tax rate on income from cryptocurrency trading, and no deduction or set-off against other income is permitted under Section 115BBH of the Income Tax Act.</b></p><p>&bull; Cryptocurrency income is not treated as capital gains, but taxed separately.</p><p>&bull; There is no exemption for cryptocurrency income based on holding period.</p><p>&bull; The tax rate is flat at 30%, not based on income slabs.</p><p><b>Further Insight:</b></p><p>&bull; <b>Taxation on Virtual Digital Assets (Cryptocurrency)</b></p><p>&bull; Introduced: 2022-23 Budget.</p><p>&bull; Tax Rate: 30% on income from the transfer of virtual digital assets.</p><p>&bull; No Deductions: Except for the cost of acquisition.</p><p>&bull; 1% TDS: On transactions over a specific threshold.</p><p>&bull; Impact:</p><p>&bull; Aims to regulate the growing cryptocurrency market.</p><p>&bull; Encourages transparency in digital asset transactions.</p>",
    "question_index": 12
  },

    "question": "<span class=\"eqt\"><p>Which of the following taxes is exclusively under the purview of state governments as per the Indian Constitution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2352; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Corporation Tax</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2327;&#2350; &#2325;&#2352;</span>",
      "<span class=\"eqt\">Capital Gains Tax</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2354;&#2366;&#2349; &#2325;&#2352;</span>",
      "<span class=\"eqt\">State Excise Duty</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2358;&#2369;&#2354;&#2381;&#2325;</span>",
      "<span class=\"eqt\">Securities Transaction Tax (STT)</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2349;&#2370;&#2340;&#2367; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2325;&#2352; (&#2319;&#2360;&#2335;&#2368;&#2335;&#2368;)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>State Excise Duty is levied by state governments on alcohol, narcotics, and other excisable goods produced within a state. It is one of the major revenue sources for state governments.</b></p><p>&bull; Corporation Tax is levied by the central government on corporate profits.</p><p>&bull; Capital Gains Tax is also under the central government's domain.</p><p>&bull; Securities Transaction Tax (STT) is levied by the central government.</p><p><b>Further Insight:</b></p><p>&bull; <b>Central Taxes:</b></p><p>&#9675; Taxes levied and collected by the Central Government:</p><p>&#9632; Income Tax: Tax on individual income.</p><p>&#9632; Excise Duty: On production and manufacturing of goods.</p><p>&#9632; Customs Duty: Tax on imports and exports.</p><p>&#9632; CGST (Central Goods and Services Tax): Component of GST on intra-state transactions.</p><p>&bull; <b>State Taxes</b>:</p><p>&#9675; Levied by State Governments:</p><p>&#9632; State Goods and Services Tax (SGST): State portion of GST for intra-state sales.</p><p>&#9632; Stamp Duty: On property transactions and official documents.</p><p>&#9632; Entertainment Tax: On events like movies and concerts (now mostly subsumed under GST).</p>",
    "question_index": 13
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about taxation in India:</p><p>a) Income Tax in India was first introduced in the year 1860 by Sir James Wilson.</p><p>b) The Constitution of India divides the power to levy taxes between the Union and the States.</p><p>c) Finance Commission is constituted under Article 265 of the Constitution of India.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2352;&#2366;&#2343;&#2366;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a) &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2310;&#2351;&#2325;&#2352; &#2346;&#2361;&#2354;&#2368; &#2348;&#2366;&#2352; &#2357;&#2352;&#2381;&#2359; 1860 &#2350;&#2375;&#2306; &#2360;&#2352; &#2332;&#2375;&#2350;&#2381;&#2360; &#2357;&#2367;&#2354;&#2381;&#2360;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>b) &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2328; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2352; &#2354;&#2327;&#2366;&#2344;&#2375; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>c) &#2357;&#2367;&#2340;&#2381;&#2340; &#2310;&#2351;&#2379;&#2327; &#2325;&#2366; &#2327;&#2336;&#2344; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 265 &#2325;&#2375; &#2340;&#2361;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Income tax was first introduced in India by Sir James Wilson in 1860 to meet the revenue demands of the British government.</b></p><p>&bull; The Constitution divides tax powers between the Union and States.</p><p>&bull; The <b>Finance Commission is constituted under Article 280</b>, not Article 265. Article 265 states that no tax shall be levied or collected except by the authority of law.</p><p><b>Further Insight:</b></p><p>&bull; The <b>modern taxation system began in 1860 under James Wilson</b>, who introduced the Income Tax Act to cover the fiscal deficits following the Revolt of 1857.</p><p>&#9675; Later, the Income Tax Act of 1922 formed the base for today's taxation system which is largely governed by the Income Tax Act of 1961(It was recommended by the Direct Taxes Enquiry Committee).</p><p>&bull; Part XII of Constitution of India - Finance, Property, Contracts and Suits</p><p>&#9675; <b>Article 265 </b>- No tax shall be levied or collected except by authority of law.</p><p>&#9675; <b>Article 266</b> - Consolidated Funds and public accounts of India and of the States.</p><p>&#9675; <b>Article 267 </b>- Contingency Fund.</p><p>&bull; Distribution of Revenues between the Union and the States</p><p>&#9675; Article 275 - Grants from the Union to certain States.</p><p>&#9675; Article 279A - Goods and Services Tax Council.</p><p>&#9675; Article 280 - Finance Commission.</p><p>&#9675; Article 281 - Recommendations of the Finance Commission.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct regarding direct taxes in India?</p><p>a) Direct taxes are levied on individuals or organizations and cannot be shifted to others.</p><p>b) Wealth Tax, which was abolished in 2015, was a direct tax.</p><p>c) Corporate Tax is an indirect tax on businesses.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>a) &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2351;&#2366; &#2360;&#2306;&#2327;&#2336;&#2344;&#2379;&#2306; &#2346;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2379;&#2306; &#2346;&#2352; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>b) &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2352;, &#2332;&#2367;&#2360;&#2375; 2015 &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;, &#2319;&#2325; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2341;&#2366;&#2404;</p><p>c) &#2325;&#2377;&#2352;&#2381;&#2346;&#2379;&#2352;&#2375;&#2335; &#2335;&#2376;&#2325;&#2381;&#2360; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351;&#2379;&#2306; &#2346;&#2352; &#2319;&#2325; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Direct taxes, such as income tax, are paid directly by the taxpayer.</p><p>&bull; Wealth Tax was a direct tax until it was abolished in 2015.</p><p>&bull; Corporate Tax is a direct tax, not an indirect tax, as it is levied directly on the income or profits of companies.</p><p><b>Further Insight:</b></p><p>&bull; <b>Direct Taxes</b></p><p>&#9675; Direct taxes are levied directly on the income or wealth of individuals or organizations, and the burden cannot be shifted. </p><p>&#9675; These taxes are mostly progressive, meaning the tax rate increases with higher income.</p><p>&#9675; Examples:</p><p>&#9632; Income Tax: Levied on the income of individuals and businesses.</p><p>&#9632; Corporate Tax: Applied to the profits of companies.</p><p>&#9632; Capital Gains Tax: Tax on the sale of capital assets.</p><p>&#9632; Securities Transaction Tax (STT): Imposed on transactions in securities markets.</p><p>&#9632; The Central Board of Direct Taxes (CBDT) is responsible for administering direct taxes.</p>",
    "question_index": 15
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements regarding GST in India is/are correct?</p><p>a) GST is a single tax applied uniformly across all states in India.</p><p>b) The GST Council is a constitutional body under Article 279A of the Constitution.</p><p>c) GST is a regressive tax, affecting low-income groups more than high-income groups.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>a) &#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2319;&#2325; &#2319;&#2325;&#2354; &#2325;&#2352; &#2361;&#2376; &#2332;&#2379; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2349;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2352;&#2370;&#2346; &#2360;&#2375; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>b) &#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2346;&#2352;&#2367;&#2359;&#2342; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 279&#2319; &#2325;&#2375; &#2340;&#2361;&#2340; &#2319;&#2325; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2344;&#2367;&#2325;&#2366;&#2351; &#2361;&#2376;&#2404;</p><p>c) &#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2319;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2327;&#2366;&#2350;&#2368; &#2325;&#2352; &#2361;&#2376;, &#2332;&#2379; &#2313;&#2330;&#2381;&#2330; &#2310;&#2351; &#2357;&#2366;&#2354;&#2375; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344; &#2310;&#2351; &#2357;&#2366;&#2354;&#2375; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2325;&#2379; &#2309;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",

    "correct_option_id": 0,
    "solution": "<p>&bull; <b>GST is a unified tax, but different states may apply different SGST rates, and the tax structure may vary.</b></p><p>&bull; The GST Council was established under Article 279A of the Indian Constitution to make recommendations on GST rates and structure.</p><p>&bull; <b>GST is generally considered a proportional tax because the rate is the same for all, regardless of income.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Goods and Services Tax (GST)</b></p><p>&#9675; Passed and added in constitution after 101st Constitutional amendment Bill 2016</p><p>&#9675; Implemented on July 1, 2017, GST is a multi-stage, destination-based tax.</p><p>&#9675; It is aimed at eliminating the cascading effect of previous taxes.</p><p>&#9675; GST integrates most indirect taxes into a single tax system.</p><p>&#9675; It is divided into CGST, SGST, and IGST (for inter-state transactions).</p><p>&bull; <b>GST Council:</b></p><p>&#9675; Decision-making body chaired by the Finance Minister of India mentioned in Article 279A.</p><p>&#9675; It includes the Union and State Finance Ministers.</p><p>&#9675; The Union has 1/3rd voting power while the state has 2/3rd voting power.</p><p>&#9632; To pass any bill it must be passed by 3/4th vote</p><p>&#9675; The council oversees changes in GST rates, exemptions, and procedural regulations</p><p>&bull; <b>Exemptions under GST</b></p><p>&#9675; Custom duty will be still collected along with the levy of IGST on imported goods.</p><p>&#9675; Petroleum and tobacco products are currently exempted.</p><p>&#9675; Excise duty on liquor, stamp duty and electricity taxes are also exempted.</p>",

  },

    "question": "<span class=\"eqt\"><p>Match the following direct taxes with their descriptions:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column 1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column 2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Wealth Tax</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Tax on the trading of securities in stock exchanges</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Corporate Tax</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Tax on income from the sale of assets</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Capital Gains Tax</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Abolished in 2015</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Securities Transaction Tax</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Tax on company profits</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2357;&#2367;&#2357;&#2352;&#2339; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; 1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; 2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2360;&#2     "correct_option_id": 0,
    "solution": "<p>&bull; Wealth Tax: Abolished in 2015.</p><p>&bull; Corporate Tax: Tax on company profits.</p><p>&bull; Capital Gains Tax: Tax on income from the sale of assets.</p><p>&bull; Securities Transaction Tax: Tax on trading of securities in stock exchanges.</p><p><b>Further Insight:</b></p><p>&bull; <b>Direct Taxes</b></p><p>&#9675; Direct taxes are levied directly on the income or wealth of individuals or organizations, and the burden cannot be shifted. These taxes are mostly progressive, meaning the tax rate increases with higher income.</p><p>&#9675; Examples:</p><p>&#9632; Income Tax: Levied on the income of individuals and businesses.</p><p>&#9632; Corporate Tax: Applied to the profits of companies.</p><p>&#9632; Capital Gains Tax: Tax on the sale of capital assets.</p><p>&#9632; Securities Transaction Tax (STT): Imposed on transactions in securities markets.</p><p>&#9675; The Central Board of Direct Taxes (CBDT) is responsible for administering direct taxes.</p><p>&bull; <b>Indirect Taxes</b></p><p>&#9675; Indirect taxes are levied on goods and services, where the tax burden is passed on to the final consumer. These are typically regressive as they apply uniformly regardless of income.</p><p>&#9675; Examples:</p><p>&#9632; Goods and Services Tax (GST): A comprehensive tax covering all goods and services.</p><p>&#9632; Customs Duty: Levied on imports and exports.</p><p>&#9632; Excise Duty: Levied on the production of goods within the country.</p><p>&#9675; The Central Board of Indirect Taxes and Customs (CBIC) administers indirect taxes.</p>",
    "question_index": 17
  },

    "question": "<span class=\"eqt\"><p>Match the following terms with their historical context:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column 1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column 2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Jizya</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Introduced by Lord Cornwallis in Bengal</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Permanent Settlement</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Tax system directly between the government and farmers</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Mahalwari System</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Tax on non-Muslims by Mughal rulers</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Ryotwari System</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Tax collected from village as unit</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2320;&#2340;&#2367;&#2361;&#2366;&#2360;&#2367;&#2325; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; 1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; 2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2332;&#2332;&#2367;&#2351;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &     "correct_option_id": 0,
    "solution": "<p>&bull; Jizya: Tax on non-Muslims by Mughal rulers (c).</p><p>&bull; Permanent Settlement: Introduced by Lord Cornwallis in Bengal (a).</p><p>&bull; In Mahalwari system tax was collected from the village as a unit.</p><p>&bull; Ryotwari System: Tax system directly between the government and farmers (b).</p><p><b>Further Insight:</b></p><p><b>Permanent Settlement (1793)</b></p><p>&#9675; Introduced by Lord Cornwallis</p><p>&#9675; It was implemented in Bengal, Bihar, parts of Orissa</p><p>&#9675; Key Provisions:</p><p>&#9632; Revenue was a fixed annual amount, not subject to revision.</p><p>&#9632; Zamindars (landowners) were responsible for paying the fixed revenue.</p><p>&#9675; Led to commercialization and exploitation of farmers( zamindars had control over peasants, often leading to economic distress among farmers.)</p><p>&bull; <b>Ryotwari System</b></p><p>&#9675; Introduced by Thomas Munro</p><p>&#9675; Implemented in Madras, Bombay, parts of Assam, Central India</p><p>&#9675; Key Provisions:</p><p>&#9632; Revenue was directly assessed on the land and crop yield, with payments made by individual farmers (ryots).</p><p>&#9632; Farmers had occupancy rights and were directly accountable to the government.</p><p>&#9675; It provided more security to farmers and was adaptable to local conditions, though it faced challenges with land records and revenue assessment.</p><p>&bull; <b>Mahalwari System</b></p><p>&bull; Introduced by: Holt Mackenzie</p><p>&bull; Implemented in North-Western Provinces (now Uttar Pradesh), Punjab, Central India</p><p>&bull; Key Provisions:</p><p>&#9675; Revenue was collected from the head of a mahal (village or group of villages) based on land productivity.</p><p>&#9675; Land Tenure: Shared responsibility among the community; the revenue was based on collective accountability.</p><p>&bull; Impact: Aimed to balance interests but often led to administrative complexities and disputes over land rights<b>.</b></p>",
    "question_index": 18
  },

    "solution": "<p>&bull; Stamp Duty: Levied on property transactions and legal documents (b).</p><p>&bull; Entertainment Tax: Imposed on movie tickets and entertainment events (c).</p><p>&bull; VAT: Still applicable on certain items like fuel, even after GST (d).</p><p>&bull; State Excise Duty: Applied to alcohol and narcotics (a).</p><p><b>Further Insight:</b></p><p>&bull; Central Taxes:</p><p>&#9675; Taxes levied and collected by the Central Government:</p><p>&#9632; Income Tax: Tax on individual income.</p><p>&#9632; Excise Duty: On production and manufacturing of goods.</p><p>&#9632; Customs Duty: Tax on imports and exports.</p><p>&#9632; CGST (Central Goods and Services Tax): Component of GST on intra-state transactions.</p><p>&bull; State Taxes:</p><p>&#9675; Levied by State Governments:</p><p>&#9632; State Goods and Services Tax (SGST): State portion of GST for intra-state sales.</p><p>&#9632; Stamp Duty: On property transactions and official documents.</p><p>&#9632; Entertainment Tax: On events like movies and concerts (now mostly subsumed under GST).</p>",
