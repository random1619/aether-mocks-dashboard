<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Who was the real founder of the Gupta Empire? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2346;&#2381;&#2340; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325; &#2325;&#2380;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Srigupta</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2368;&#2327;&#2369;&#2346;&#2381;&#2340;</span>",
      "<span class=\"eqt\">Chandragupta I</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Samudragupta</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340;</span>",
      "<span class=\"eqt\">Ghatotkacha</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2335;&#2379;&#2340;&#2381;&#2325;&#2330;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; While <b>Sri Gupta</b> is considered the first ruler of the Gupta dynasty, <b>Chandragupta I (c. 319 - 335 CE)</b> is widely regarded as the true founder, as he significantly expanded the empire.</p><p>&#183; He established the Gupta Era in 319-20 CE. </p><p>&#183; He strengthened his position by marrying a Lichchhavi princess named Kumaradevi. </p><p>&#183; This strategic marriage alliance helped him expand his territories and consolidate power.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which Gupta ruler is known as the \"Napoleon of India\" for his military conquests? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2327;&#2369;&#2346;&#2381;&#2340; &#2358;&#2366;&#2360;&#2325; &#2325;&#2379; &#2313;&#2360;&#2325;&#2368; &#2360;&#2376;&#2344;&#2381;&#2351; &#2357;&#2367;&#2332;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; \"&#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2344;&#2375;&#2346;&#2379;&#2354;&#2367;&#2351;&#2344;\" &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chandragupta I</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Samudragupta</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340;</span>",
      "<span class=\"eqt\">Chandragupta II</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Skandagupta</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2325;&#2344;&#2381;&#2342;&#2327;&#2369;&#2346;&#2381;&#2340;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Samudragupta, the son of Chandragupta I, is known as the \"Napoleon of India.\" </p><p>&#183; He earned this title due to his extensive military campaigns and conquests across India. </p><p>&#183; His achievements are documented in the Allahabad Pillar inscription (also known as the Prayag Prashasti). </p><p>&#183; The inscription, composed by his court poet Harisena, details his military conquests and expansion of the Gupta Empire.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The Allahabad Pillar inscription primarily describes the achievements of which Gupta ruler? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342; &#2360;&#2381;&#2340;&#2306;&#2349; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2367;&#2360; &#2327;&#2369;&#2346;&#2381;&#2340; &#2358;&#2366;&#2360;&#2325; &#2325;&#2368; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chandragupta I</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Samudragupta</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340;</span>",
      "<span class=\"eqt\">Chandragupta II</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Kumaragupta I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2350;&#2366;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2346;&#2381;&#2352;&#2341;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The Allahabad Pillar inscription primarily describes the achievements of Samudragupta. </p><p>&#183; This inscription is also known as the Prayag Prashasti. </p><p>&#183; It was composed by Samudragupta's court poet Harisena. </p><p>&#183; The inscription details Samudragupta's military campaigns, conquests, and the expansion of the Gupta Empire.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which Gupta ruler is associated with the title \"Vikramaditya\"? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2327;&#2369;&#2346;&#2381;&#2340; &#2358;&#2366;&#2360;&#2325; &#2325;&#2379; \"&#2357;&#2367;&#2325;&#2381;&#2352;&#2350;&#2366;&#2342;&#2367;&#2340;&#2381;&#2351;\" &#2325;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2360;&#2375; &#2360;&#2350;&#2381;&#2348;&#2342;&#2381;&#2343; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chandragupta I</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Samudragupta</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340;</span>",
      "<span class=\"eqt\">Chandragupta II</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Skandagupta</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2325;&#2344;&#2381;&#2342;&#2327;&#2369;&#2346;&#2381;&#2340;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Chandragupta II was associated with the title \"Vikramaditya.\" </p><p>&#183; He ruled approximately from 375-415 CE. </p><p>&#183; Chandragupta II defeated the Western Kshatrapas (Shakas) and expanded the empire. </p><p>&#183; His court was known for its cultural brilliance, with the legendary Nine Gems (Navaratnas) including Kalidasa.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The Chinese pilgrim Fa-Hien visited India during the reign of which Gupta ruler? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2368;&#2344;&#2368; &#2340;&#2368;&#2352;&#2381;&#2341;&#2351;&#2366;&#2340;&#2381;&#2352;&#2368; &#2347;&#2366;&#2361;&#2367;&#2351;&#2366;&#2344; &#2325;&#2367;&#2360; &#2327;&#2369;&#2346;&#2381;&#2340; &#2358;&#2366;&#2360;&#2325; &#2325;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2349;&#2366;&#2352;&#2340; &#2310;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chandragupta I</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Samudragupta</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340;</span>",
      "<span class=\"eqt\">Chandragupta II</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Kumaragupta I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2350;&#2366;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2346;&#2381;&#2352;&#2341;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The Chinese Buddhist pilgrim Fa-Hien visited India during the reign of Chandragupta II. </p><p>&#183; He stayed in India from approximately 399 to 414 CE. </p><p>&#183; Fa-Hien came to collect Buddhist texts and study Buddhism in its birthplace. </p><p>&#183; His accounts describe a peaceful and prosperous society with minimal crime under Gupta rule.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which Gupta ruler successfully repelled the Huna invasions? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2327;&#2369;&#2346;&#2381;&#2340; &#2358;&#2366;&#2360;&#2325; &#2344;&#2375; &#2361;&#2370;&#2339; &#2310;&#2325;&#2381;&#2352;&#2350;&#2339;&#2379;&#2306; &#2325;&#2379; &#2360;&#2347;&#2354;&#2340;&#2366;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2326;&#2342;&#2375;&#2337;&#2364;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chandragupta II</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Kumaragupta I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2350;&#2366;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Skandagupta</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2325;&#2344;&#2381;&#2342;&#2327;&#2369;&#2346;&#2381;&#2340;</span>",
      "<span class=\"eqt\">Budhagupta</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2327;&#2369;&#2346;&#2381;&#2340;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Skandagupta successfully repelled the Huna invasions. </p><p>&#183; He is considered the last great ruler of the Gupta dynasty.</p><p>&#183; Skandagupta ruled approximately from 455 to 467 CE. </p><p>&#183; He mobilized the empire's resources to fight off the Huna attacks, though this military effort strained the empire's finances.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The Mehrauli Iron Pillar inscription is associated with which Gupta ruler? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2361;&#2352;&#2380;&#2354;&#2368; &#2354;&#2380;&#2361; &#2360;&#2381;&#2340;&#2306;&#2349; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326; &#2325;&#2367;&#2360; &#2327;&#2369;&#2346;&#2381;&#2340; &#2358;&#2366;&#2360;&#2325; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chandragupta I</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Samudragupta</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340;</span>",
      "<span class=\"eqt\">Chandragupta II</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Skandagupta</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2325;&#2344;&#2381;&#2342;&#2327;&#2369;&#2346;&#2381;&#2340;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The Mehrauli Iron Pillar inscription is associated with Chandragupta II. </p><p>&#183; The pillar stands in the Qutub complex in Delhi. </p><p>&#183; It is renowned for its rust-resistant composition, showcasing the advanced metallurgical skills of the Gupta period. </p><p>&#183; The inscription praises the king's military victories and refers to him as \"Chandra.\"</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are correct concerning the post-Gupta period in North India? </p><p>I. The Chalukya ruler Pulakesin II defeated Harshavardhana on the banks of the river Narmada. </p><p>II. The Maitrakas of Valabhi were initially tributary chiefs of the Guptas and later established an independent kingdom in western India with Valabhi as an important center of learning and trade.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2340;&#2381;&#2340;&#2352; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2327;&#2369;&#2346;&#2381;&#2340;&#2379;&#2340;&#2381;&#2340;&#2352; &#2325;&#2366;&#2354; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2330;&#2366;&#2354;&#2369;&#2325;&#2381;&#2351; &#2358;&#2366;&#2360;&#2325; &#2346;&#2369;&#2354;&#2325;&#2375;&#2358;&#2367;&#2344; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2344;&#2375; &#2344;&#2352;&#2381;&#2350;&#2342;&#2366; &#2344;&#2342;&#2368; &#2325;&#2375; &#2340;&#2335; &#2346;&#2352; &#2361;&#2352;&#2381;&#2359;&#2357;&#2352;&#2381;&#2343;&#2344; &#2325;&#2379; &#2361;&#2352;&#2366;&#2351;&#2366;&#2404;</p><p>II. &#2357;&#2354;&#2381;&#2354;&#2349;&#2368; &#2325;&#2375; &#2350;&#2376;&#2340;&#2381;&#2352;&#2325; &#2358;&#2369;&#2352;&#2370; &#2350;&#2375;&#2306; &#2327;&#2369;&#2346;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2360;&#2361;&#2366;&#2351;&#2325; &#2360;&#2352;&#2342;&#2366;&#2352; &#2341;&#2375; &#2324;&#2352; &#2348;&#2366;&#2342; &#2350;&#2375;&#2306; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2357;&#2354;&#2381;&#2354;&#2349;&#2368; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2324;&#2352; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2325;&#2366; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2364;&#2354;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Both are correct</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Statement I is correct as Pulakesin II defeated Harsha on the banks of the Narmada. </p><p>Statement II is also correct; the Maitrakas were Gupta tributaries who became independent rulers of Valabhi, which was a significant center of learning and a port for trade.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The Pushyabhuti dynasty, to which Harshavardhana belonged, had its capital at: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2369;&#2359;&#2381;&#2351;&#2349;&#2370;&#2340;&#2367; &#2357;&#2306;&#2358;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2361;&#2352;&#2381;&#2359;&#2357;&#2352;&#2381;&#2343;&#2344; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2341;&#2375;, &#2325;&#2368; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2341;&#2368;: </p></span>",
    "options": [
      "<span class=\"eqt\">Kanauj</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2344;&#2381;&#2344;&#2380;&#2332;</span>",
      "<span class=\"eqt\">Thanesar</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2366;&#2344;&#2375;&#2360;&#2352;</span>",
      "<span class=\"eqt\">Pataliputra</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2335;&#2354;&#2367;&#2346;&#2369;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Valabhi</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2354;&#2381;&#2354;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The Pushyabhuti dynasty, to which Harshavardhana belonged, had its capital at Thanesar. </p><p>&#183; Thanesar is located in present-day Haryana. </p><p>&#183; The dynasty was founded by Pushyabhuti, but rose to prominence under Harshavardhana. </p><p>&#183; Harshavardhana later shifted his capital to Kanauj after expanding his kingdom.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The Bhitari inscription informs us about the reign of which Gupta ruler?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2367;&#2340;&#2352;&#2368; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326; &#2361;&#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2327;&#2369;&#2346;&#2381;&#2340; &#2358;&#2366;&#2360;&#2325; &#2325;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chandragupta II</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Skandagupta</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2325;&#2344;&#2381;&#2342;&#2327;&#2369;&#2346;&#2381;&#2340;</span>",
      "<span class=\"eqt\">Kumaragupta I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2350;&#2366;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Sri Gupta</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2368; &#2327;&#2369;&#2346;&#2381;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Skandagupta(454-467 CE) is generally considered the last important ruler of Gupta Empire, who ruled over a vast territory. </p><p>&#183; From the beginning of his reign he started facing various troubles in his realm. </p><p>&#183; The Bhitari inscription informs us that at the very beginning of his reign Pushyamitras posed trouble. </p><p>&#183; Though he was successful in averting the onslaught of Hunas, these campaigns cost the kingdom dearly.</p><p>&#183; Scholars maintain that his gold coins were not only limited but also had less gold in them as compared with the earlier rulers.</p><p>&#183; He was the last Gupta ruler to mint silver coins in western India.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>The Chinese pilgrim Hsuan Tsang visited India during the reign of: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2368;&#2344;&#2368; &#2340;&#2368;&#2352;&#2381;&#2341;&#2351;&#2366;&#2340;&#2381;&#2352;&#2368; &#2361;&#2381;&#2357;&#2375;&#2344; &#2340;&#2381;&#2360;&#2366;&#2306;&#2327; &#2344;&#2375; &#2325;&#2367;&#2360;&#2325;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2342;&#2380;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Chandragupta II</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Skandagupta</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2325;&#2344;&#2381;&#2342;&#2327;&#2369;&#2346;&#2381;&#2340;</span>",
      "<span class=\"eqt\">Harshavardhana</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2381;&#2359;&#2357;&#2352;&#2381;&#2343;&#2344;</span>",
      "<span class=\"eqt\">Pulakesin II</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2354;&#2325;&#2375;&#2358;&#2367;&#2344; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The Chinese pilgrim Hsuan Tsang visited India during the reign of Harshavardhana. </p><p>&#183; He stayed in India from approximately 630 to 645 CE. </p><p>&#183; Hsuan Tsang was hosted by Harshavardhana and attended the grand assembly at Kanauj. </p><p>&#183; His detailed accounts provide valuable information about Indian society, politics, and religion during this period.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>What was the lowest unit of administration in the Gupta Empire? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2346;&#2381;&#2340; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2344;&#2367;&#2330;&#2354;&#2368; &#2311;&#2325;&#2366;&#2312; &#2325;&#2381;&#2351;&#2366; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Grama</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2344;&#2366;&#2335;&#2368; &#2328;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Pradesha</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Vishaya</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2359;&#2351;</span>",
      "<span class=\"eqt\">Bhukti</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2369;&#2325;&#2381;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The provinces in the Gupta Empire were divided into districts called <i>pradesha</i> or <i>vishaya</i> . </p><p>&#183; The <i>vishayas</i> were further divided into <b>villages</b>, which were known as <b>grama</b> . </p><p>&#183; The head of the village, called the <i>gramadhyaksha</i>, looked after the village affairs with the assistance of village elders </p><p>&#183; Therefore, the <b>grama</b> was the lowest unit of administration in the Gupta period.</p><p>Further insights:</p><p>&#183; For facilitating the efficient functioning of administration, the kingdom was generally divided into a number of regions or provinces, headed by governors appointed by the king. </p><p>&#183; These provinces were known as the deshas, rashtras or bhuktis. </p><p>&#183; Some of the provinces mentioned in Gupta inscriptions are Tirabhukti (corresponded to north Bihar), Nagarabhukti, Magadhabhukti and Pundravardhanabhukti (corresponded to north Bengal). </p><p>&#183; The bhuktis were governed by Uparikas directly appointed by the king. The territorial units under the provinces (bhukti/desha) were known as vishaya (governed by vishayapati or in some cases by Ayuktaka). He was appointed by provincial governor. </p><p>&#183; The inscriptions from Bengal indicate that the vishayapati associated himself with Nagarsresthi (head of city merchants), Sarthavaha (caravan leader), Prathama- Kulika (head of the artisan community) and Prathamakayastha (head of the kayastha community).</p><p>&#183; Apart from these Pustapalas were officials who managed and kept records. </p><p>&#183; The administrative units below the district were referred differently in different regions, such as  -  vithi, ashtakuladhikarana, bhumi, pathaka and petha. </p><p>&#183; It seems that these units were placed above several villages and were administrated by different officials such as ayuktakas and vithi-mahattaras.</p><p>&#183; The lowest unit of administration was known as the grama which was headed by a gramika or gramadhyaksha. </p><p>&#183; is not very clear whether these officials were appointed by higher authorities or selected with the permission of villagers.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Match the administrative officials(during Gupta Empire) with their respective roles:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column A (Officials)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column B (Roles/Responsibilities)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) Mahadandanayaka</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a) Chief Justice, assisted the king in justice</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) Mahapratihara</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b) Chief of the palace guards</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) Vishayapati</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c) Head of the district (Vishaya)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4) Uparika</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d) Governor of the province (Bhukti)</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; (&#2327;&#2369;&#2346;&#2381;&#2340; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;) &#2325;&#2379; &#2313;&#2344;&#2325;&#2368; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366;&#2323;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A (&#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B (&#2349;&#2370;&#2350;&#2367;&#2325;&#2366;&#2319;&#2306;/&#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352;&#2367;&#2351;&#2366;&#2306;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) &#2350;&#2361;&#2366;&#2342;&#2306;&#2337;&#2344;&#2366;&#2351;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a) &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;, &#2344;&#2381;&#2351;&#2366;&#2351; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2366; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2352;&#2340;&#2375; &#2341;&#2375;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) &#2350;&#2361;&#2366;&#2346;&#2381;&#2352;&#2340;&#2367;&#2361;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b) &#2350;&#2361;&#2354; &#2325;&#2375; &#2352;&#2325;&#2381;&#2359;&#2325;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) &#2357;&#2367;&#2359;&#2351;&#2346;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c) &#2332;&#2367;&#2354;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; (&#2357;&#2367;&#2359;&#2351;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4) &#2313;&#2346;&#2352;&#2367;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d) &#2346;&#2381;&#2352;&#2366;&#2306;&#2340; &#2325;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; (&#2349;&#2369;&#2325;&#2381;&#2340;&#2367;)</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">1-a,2-b,3-c,4-d</span><span class=\"hqt\" style=\"display:none\">1-a,2-b,3-c,4-d</span>",
      "<span class=\"eqt\">1-d,2-b,3-a,4-c</span><span class=\"hqt\" style=\"display:none\">1-d,2-b,3-a,4-c</span>",
      "<span class=\"eqt\">1-c,2-d,3-b,4-a</span><span class=\"hqt\" style=\"display:none\">1-c,2-d,3-b,4-a</span>",
      "<span class=\"eqt\">1-b,2-a,3-c,4-d</span><span class=\"hqt\" style=\"display:none\">1-b,2-a,3-c,4-d</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The high-ranking officers included the <i>Mahadandanayaka </i>(Chief Justice) who assisted the king in the matters of justice. </p><p>&#183; In the provinces this work was entrusted to the <i>Uparikas </i>and in the districts to the <i>vishayapatis</i>.</p><p>&#183; In the villages the headman and the village elders used to decide upon petty cases. </p><p>&#183; The other high officials included the <i>Mahapratihara </i>(chief of the palace guards), <i>Pratihara </i>(regulated ceremonies and granted necessary permits for admission to the royal presence), <i>Dutakas </i>(implemented gifts when gifts of land were made to the brahmanas and others). </p><p>&#183; There existed an espionage system as well.</p><p>&#183; For facilitating the efficient functioning of administration, the kingdom was generally divided into a number of regions or provinces, headed by governors appointed by the king. </p><p>&#183; These provinces were known as the deshas, rashtras or bhuktis.</p><p>&#183; The bhuktis were governed by Uparikas directly appointed by the king.</p><p>&#183; The territorial units under the provinces (bhukti/desha) were known as vishaya (governed by vishayapati or in some cases by Ayuktaka).</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>The Chalukyas of Badami were succeeded by which dynasty? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2366;&#2342;&#2366;&#2350;&#2368; &#2325;&#2375; &#2330;&#2366;&#2354;&#2369;&#2325;&#2381;&#2351; &#2357;&#2306;&#2358; &#2325;&#2375; &#2348;&#2366;&#2342; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2306;&#2358; &#2360;&#2340;&#2381;&#2340;&#2366; &#2350;&#2375;&#2306; &#2310;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rashtrakutas</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2325;&#2370;&#2335;</span>",
      "<span class=\"eqt\">Pallavas</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2354;&#2381;&#2354;&#2357;</span>",
      "<span class=\"eqt\">Pandyas</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2306;&#2337;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Cholas</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2379;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The Chalukyas of Badami were succeeded by the Rashtrakutas.</p><p>&#183; The Rashtrakutas defeated the Chalukyas in the mid-8th century CE (around 757 CE). </p><p>&#183; Dantidurga was the Rashtrakuta ruler who overthrew the Chalukyas. </p><p>&#183; The Rashtrakutas ruled much of the Deccan for about two centuries before the Chalukyas regained power as the Later Chalukyas.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>The term \"Jayaskandhavara\" refers to: </p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2332;&#2351;&#2360;&#2381;&#2325;&#2306;&#2343;&#2357;&#2352;\" &#2358;&#2348;&#2381;&#2342; &#2325;&#2366; &#2340;&#2366;&#2340;&#2381;&#2346;&#2352;&#2381;&#2351; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">A temporary military camp</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2309;&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2360;&#2376;&#2344;&#2381;&#2351; &#2358;&#2367;&#2357;&#2367;&#2352;</span>",
      "<span class=\"eqt\">A type of land grant</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2350;&#2367; &#2309;&#2344;&#2369;&#2342;&#2366;&#2344; &#2325;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">A religious assembly</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2360;&#2349;&#2366;</span>",
      "<span class=\"eqt\">A royal court</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2358;&#2366;&#2361;&#2368; &#2342;&#2352;&#2348;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; \"Jayaskandhavara\" was a term used during ancient Indian periods, particularly in the Gupta era, to refer to a temporary military encampment or camp.</p><p>&#183; They served as administrative centers in newly conquered territories. </p><p>&#183; The term appears in various inscriptions from the post-Gupta period.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>The Tripartite Struggle for Kanauj involved which of the following dynasties? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2344;&#2381;&#2344;&#2380;&#2332; &#2325;&#2375; &#2354;&#2367;&#2319; &#2340;&#2381;&#2352;&#2367;&#2346;&#2325;&#2381;&#2359;&#2368;&#2351; &#2360;&#2306;&#2328;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358; &#2358;&#2366;&#2350;&#2367;&#2354; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Palas, Pratiharas, and Rashtrakutas</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2354;, &#2346;&#2381;&#2352;&#2340;&#2367;&#2361;&#2366;&#2352; &#2324;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2325;&#2370;&#2335;</span>",
      "<span class=\"eqt\">Guptas, Vakatakas, and Chalukyas</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2346;&#2381;&#2340;, &#2357;&#2366;&#2325;&#2366;&#2335;&#2325; &#2324;&#2352; &#2330;&#2366;&#2354;&#2369;&#2325;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Pallavas, Cholas, and Pandyas</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2354;&#2381;&#2354;&#2357;, &#2330;&#2379;&#2354; &#2324;&#2352; &#2346;&#2366;&#2306;&#2337;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Kushanas, Satavahanas, and Mauryas</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2359;&#2366;&#2339;, &#2360;&#2366;&#2340;&#2357;&#2366;&#2361;&#2344; &#2324;&#2352; &#2350;&#2380;&#2352;&#2381;&#2351;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The Tripartite Struggle for Kanauj involved the Palas, Pratiharas, and Rashtrakutas. </p><p>&#183; This struggle took place in the 8th and 9th centuries CE. </p><p>&#183; All three powers sought control over Kanauj due to its strategic and symbolic importance. </p><p>&#183; The Pratiharas eventually established control over Kanauj, though the struggle weakened all three powers.</p>",
    "question_index": 15
  },
  {

    "solution": "<p>The Huna (or Hun) invasions were indeed a major factor in weakening the Gupta Empire. Beginning around the late 5th century CE, these invasions drained the imperial treasury and military resources. Though Skandagupta initially repelled them, subsequent Huna attacks under leaders like Toramana and Mihirakula significantly contributed to the empire's decline. </p><p>Statement II is incorrect: The Gupta Empire faced several internal challenges apart from external invasions. These included: </p><p>&#183; Succession disputes among later Gupta rulers</p><p>&#183; Declining control over feudatory states and provincial governors who began asserting independence</p><p>&#183; Economic strain from decreased trade and increased military expenditure</p><p>&#183; The rise of feudalism which weakened central authority</p><p>&#183; Administrative inefficiencies in the later period</p>",
