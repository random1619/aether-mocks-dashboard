<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Match the animals in column A with the phylum they belong to in column B</p><p>Column-A Column-B</p><p>i. Jelly fish a. Mollusca</p><p>ii. Cray fish b. Mammal.</p><p>iii. Whale fish c. Insect</p><p>iv. Devil fish d. Coelenterate</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2377;&#2354;&#2350; A &#2350;&#2375;&#2306; &#2332;&#2368;&#2357; &#2325;&#2379; &#2325;&#2377;&#2354;&#2350; B &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2360;&#2306;&#2328;/&#2332;&#2366;&#2340;&#2367; &#2360;&#2375; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; :</p><p>&#2325;&#2377;&#2354;&#2350;-A &#2325;&#2377;&#2354;&#2350;-B</p><p>i. &#2332;&#2375;&#2354;&#2368; &#2347;&#2367;&#2358; a. &#2350;&#2379;&#2354;&#2360;&#2381;&#2325;</p><p>ii. &#2325;&#2381;&#2352;&#2375; &#2350;&#2331;&#2354;&#2368; a. &#2360;&#2381;&#2340;&#2344;&#2346;&#2366;&#2351;&#2368;</p><p>iii. &#2357;&#2381;&#2361;&#2375;&#2354; &#2350;&#2331;&#2354;&#2368; c. &#2325;&#2368;&#2335;</p><p>iv. &#2337;&#2375;&#2357;&#2367;&#2354; &#2347;&#2367;&#2358; d. &#2360;&#2368;&#2354;&#2375;&#2344;&#2381;&#2335;&#2352;&#2375;&#2335;</p></span>",
    "options": [
      "<span class=\"eqt\">i-a, ii-c, iii-b, iv-d</span><span class=\"hqt\" style=\"display:none\">i-a, ii-c, iii-b, iv-d</span>",
      "<span class=\"eqt\">i-d, ii-a, iii-b, iv-c</span><span class=\"hqt\" style=\"display:none\">i-d, ii-a, iii-b, iv-c</span>",
      "<span class=\"eqt\">i-a, ii-b, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-a, ii-b, iii-c, iv-d</span>",
      "<span class=\"eqt\">i-d, ii-c, iii-b, iv-a</span><span class=\"hqt\" style=\"display:none\">i-d, ii-c, iii-b, iv-a</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Jellyfish belongs to the phylum Coelenterate. </p><p>Crayfish belongs to the phylum Arthropoda (insect). </p><p>Whale belongs to the phylum Chordata (Mammal). </p><p>Devil fish (presumably referring to a type of octopus or squid) belongs to the phylum Mollusca. </p><p>So, the correct matching is <b>i-d, ii-c, iii-b, iv-a.</b></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an example of Phylum Arthropoda?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2347;&#2366;&#2311;&#2354;&#2350; &#2310;&#2352;&#2381;&#2341;&#2381;&#2352;&#2379;&#2346;&#2379;&#2337;&#2366; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Nereis</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2352;&#2368;&#2360;</span>",
      "<span class=\"eqt\">Butterfly</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2367;&#2340;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Hirudinaria</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2352;&#2369;&#2342;&#2367;&#2344;&#2375;&#2352;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Pila</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2354;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Butterfly belongs to Phylum Arthropoda, which includes insects, arachnids, and crustaceans.</p><p>&bull; Nereis  -  Belongs to Phylum Annelida.</p><p>&bull; Hirudinaria  -  A leech, belongs to Annelida.</p><p>&bull; Pila  -  A type of Mollusk.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The organisms that do not have a defined nucleus or organelles are classified into which Kingdom?</p></span><span class=\"hqt\" style=\"display:none\">&#2332;&#2367;&#2344; &#2332;&#2368;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2379;&#2312; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2344;&#2366;&#2349;&#2367;&#2325; &#2351;&#2366; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2306;&#2327; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2325;&#2367;&#2360; &#2332;&#2327;&#2340; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Fungi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2357;&#2325;</span>",
      "<span class=\"eqt\">Protista</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2377;&#2335;&#2367;&#2360;&#2381;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Monera</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2344;&#2375;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Plantae</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2366;&#2306;&#2335;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Organisms in the Monera kingdom, such as bacteria, are prokaryotic and lack a defined nucleus or membrane-bound organelles.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a characteristic of both mammals and birds?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2360;&#2381;&#2340;&#2344;&#2343;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2346;&#2325;&#2381;&#2359;&#2367;&#2351;&#2379;&#2306; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2368; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Viviparity</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2357;&#2367;&#2346;&#2376;&#2352;&#2367;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Pigmented skin</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2306;&#2332;&#2367;&#2340; &#2340;&#2381;&#2357;&#2330;&#2366;</span>",
      "<span class=\"eqt\">Pneumatic bones</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2357;&#2368;&#2351; &#2361;&#2337;&#2381;&#2337;&#2367;&#2351;&#2366;&#2306;</span>",
      "<span class=\"eqt\">Warm-blooded</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2379;&#2358;&#2368;&#2354;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Both mammals and birds are warm-blooded (endothermic), meaning they maintain a constant body temperature regardless of the environment.</p><p>&#183; Viviparity (giving birth to live young) is exclusive to mammals.</p><p>&#183; Pneumatic bones (hollow bones for flight) are found only in birds.</p><p>&#183; Pigmented skin is not a defining characteristic of both groups.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which group of animals are named because of their spiny skin and have a peculiar water-driven tube system that they use for moving around?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2366;&#2339;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2325;&#2367;&#2360; &#2360;&#2350;&#2370;&#2361; &#2325;&#2366; &#2344;&#2366;&#2350; &#2313;&#2344;&#2325;&#2368; &#2358;&#2370;&#2354;&#2351;&#2369;&#2325;&#2381;&#2340; &#2340;&#2381;&#2357;&#2330;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2352;&#2326;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2346;&#2366;&#2360; &#2319;&#2325; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2332;&#2354; &#2360;&#2306;&#2357;&#2361;&#2344; &#2335;&#2381;&#2351;&#2370;&#2348; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2357;&#2375; &#2330;&#2354;&#2344; (&#2327;&#2350;&#2344;) &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Hemichordata</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2350;&#2368;&#2325;&#2379;&#2352;&#2381;&#2337;&#2375;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Aschelminthes</span><span class=\"hqt\" style=\"display:none\">&#2320;&#2360;&#2381;&#2325;&#2375;&#2354;&#2350;&#2367;&#2306;&#2341;&#2368;&#2332;</span>",
      "<span class=\"eqt\">Echinodermata</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2366;&#2311;&#2344;&#2379;&#2337;&#2352;&#2381;&#2350;&#2375;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Mollusca</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2354;&#2360;&#2381;&#2325;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Echinoderms</b> have a spiny endoskeleton. They have radial symmetry as adults but bilateral symmetry as larvae. Echinoderms have a unique water vascular system with tube feet. This allows slow but powerful movement.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following animals has more than one heart?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2332;&#2366;&#2344;&#2357;&#2352; &#2325;&#2375; &#2319;&#2325; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2371;&#2342;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Porcupine</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2361;&#2368;</span>",
      "<span class=\"eqt\">Chameleon</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2367;&#2352;&#2327;&#2367;&#2335;</span>",
      "<span class=\"eqt\">Tortoise</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2331;&#2369;&#2310;</span>",
      "<span class=\"eqt\">Octopus</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2335;&#2379;&#2346;&#2360;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Octopuses</b> have three hearts, which is partly a consequence of having blue blood. Their two peripheral hearts pump blood through the gills, where it picks up oxygen. A central heart then circulates the oxygenated blood to the rest of the body to provide energy for organs and muscles.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following classes includes the family of turtles?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2327; &#2350;&#2375;&#2306; &#2325;&#2331;&#2369;&#2323;&#2306; &#2325;&#2366; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Chondrichthyes</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2306;&#2337;&#2381;&#2352;&#2367;&#2325;&#2341;&#2366;&#2311;&#2360;</span>",
      "<span class=\"eqt\">Reptilia</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2368;&#2360;&#2371;&#2346;</span>",
      "<span class=\"eqt\">Amphibia</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;&#2381;&#2347;&#2367;&#2348;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Aves</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2357;&#2367;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Turtles belong to the class Reptilia under the order Testudines (or Chelonia). They are cold-blooded vertebrates with scaly skin and lay eggs on land. Unlike amphibians, reptiles do not rely on water for reproduction.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a member of the Aves (birds) class?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2319;&#2357;&#2375;&#2360; (&#2346;&#2325;&#2381;&#2359;&#2368;) &#2357;&#2352;&#2381;&#2327; &#2325;&#2366; &#2360;&#2342;&#2360;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Psittacula</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2335;&#2381;&#2335;&#2366;&#2325;&#2369;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Neophron</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2323;&#2347;&#2352;&#2344;</span>",
      "<span class=\"eqt\">Pteropus</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2352;&#2379;&#2346;&#2360;</span>",
      "<span class=\"eqt\">Struthio</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2381;&#2352;&#2369;&#2341;&#2367;&#2351;&#2379;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Psittacula (Parrots) &rarr; Belong to the Aves class.</p><p>&#183; Neophron (Egyptian Vulture) &rarr; A bird of prey in Aves class.</p><p>&#183; Struthio (Ostrich) &rarr; The largest bird, belongs to Aves class.</p><p>&#183; Pteropus (Flying Fox, a type of bat) &rarr; Belongs to the Mammalia class, not Aves.</p><p>Thus, the correct answer is Pteropus.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>To what phylum does a blood sucking leech belong?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2325;&#2381;&#2340; &#2330;&#2370;&#2360;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2332;&#2379;&#2306;&#2325; &#2325;&#2367;&#2360; &#2360;&#2306;&#2328; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Platyhelminthes</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2375;&#2335;&#2367;&#2361;&#2375;&#2354;&#2381;&#2350;&#2367;&#2306;&#2341;&#2375;&#2360;</span>",
      "<span class=\"eqt\">Aschelmenthis</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2358;&#2375;&#2354;&#2350;&#2375;&#2344;&#2381;&#2341;&#2367;&#2360;</span>",
      "<span class=\"eqt\">Annelida</span><span class=\"hqt\" style=\"display:none\">&#2320;&#2344;&#2375;&#2354;&#2367;&#2337;&#2366;</span>",
      "<span class=\"eqt\">Cnidarian</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2337;&#2375;&#2352;&#2367;&#2351;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Leeches are segmented worms and belong to the phylum <b>Annelida</b>. Specifically, they are classified under the subclass Hirudinea.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; Platyhelminthes: This phylum includes flatworms like planarians, flukes, and tapeworms. They are unsegmented and acoelomate.</p><p>&#8226; Aschelminthes (Nemathelminthes): This phylum includes roundworms (nematodes). They are pseudocoelomate and unsegmented.</p><p>&#8226; Cnidaria: This phylum includes animals like jellyfish, corals, sea anemones, and hydras. They are characterized by radial symmetry and stinging cells (cnidocytes).</p><p><b>Further insights:</b></p><p>&#8226; Annelids are characterized by their segmented bodies (metamerism). Other members of this phylum include earthworms and polychaetes.</p><p>&#8226; Most leeches are freshwater inhabitants, while some are found in terrestrial or marine environments.</p><p>&#8226; Many leeches are blood-sucking (hematophagous) ectoparasites, while others are predators of small invertebrates. Medicinal leeches have been used historically for bloodletting.</p>",
    "question_index": 8
  },
  {

    "solution": "<p>i. Annelida &rarr; d. Earthworm (Earthworms belong to the phylum Annelida, which includes segmented worms.)</p><p>ii. Arthropoda &rarr; c. Ant (Ants belong to Arthropoda, which includes insects, arachnids, and crustaceans.)</p><p>iii. Echinodermata &rarr; b. Sea star (Sea stars belong to Echinodermata, which includes marine animals like sea urchins and sea cucumbers.)</p><p>iv. Platyhelminthes &rarr; a. Tapeworm (Tapeworms are flatworms, belonging to the phylum Platyhelminthes.)</p>",

    "question": "<span class=\"eqt\"><p>Identify the organism that is NOT a pseudocoelomate.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2332;&#2368;&#2357; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2325;&#2370;&#2335;&#2327;&#2369;&#2361;&#2367;&#2325;&#2366; (&#2360;&#2381;&#2351;&#2370;&#2337;&#2379;&#2360;&#2368;&#2354;&#2379;&#2350;&#2375;&#2335;) <b>&#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Ancylostoma</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2360;&#2366;&#2311;&#2354;&#2379;&#2360;&#2381;&#2335;&#2379;&#2350;&#2366; (&#2309;&#2306;&#2325;&#2369;&#2358;&#2325;&#2371;&#2350;&#2368;)</span>",

      "<span class=\"eqt\">Scorpions</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2330;&#2381;&#2331;&#2370; (&#2360;&#2381;&#2325;&#2379;&#2352;&#2381;&#2346;&#2367;&#2351;&#2344;)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The pseudocoelomates include the nematodes, rotifers, gastrotrichs, and introverts. Some members of some other phyla are also, strictly speaking, pseudocoelomate.</p><p><b>Scorpions are not pseudocoelomates</b></p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which organisms are classified as Aves?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2380;&#2344; &#2360;&#2375; &#2332;&#2368;&#2357; &#2319;&#2357;&#2375;&#2360; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2361;&#2376;&#2306;?</span>",
    "options": [
      "<span class=\"eqt\">Fishes</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2331;&#2354;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2357;&#2352;&#2381;&#2327;</span>",
      "<span class=\"eqt\">Frogs</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2306;&#2338;&#2325;</span>",
      "<span class=\"eqt\">Snakes</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2306;&#2346;</span>",
      "<span class=\"eqt\">Birds</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2325;&#2381;&#2359;&#2367;&#2351;&#2379;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Aves</b> is the scientific class that includes all <b>birds</b>. Birds are characterized by features such as feathers, beaks, and the ability to lay eggs with hard shells. They are warm-blooded and typically have the ability to fly, though some species are flightless.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a type of mosquito?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2330;&#2381;&#2331;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">culex</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2351;&#2370;&#2354;&#2375;&#2325;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Aedes</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2337;&#2368;&#2332;</span>",
      "<span class=\"eqt\">Limulus</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2367;&#2350;&#2369;&#2354;&#2360;</span>",
      "<span class=\"eqt\">Anopheles</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2379;&#2347;&#2364;&#2375;&#2354;&#2368;&#2332;&#2364;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Mosquitoes are common, flying insects that live in most parts of the world. Culex, Aedes Anopheles, etc. are the type of mosquitos. Here, <b>Limulus </b>is a genus of horseshoe crab, with one extant species, the Atlantic horseshoe crab (Limulus polyphemus). </p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>How many chambers are there in the heart of fishes?</p></span><span class=\"hqt\" style=\"display:none\">&#2350;&#2331;&#2354;&#2368; &#2325;&#2375; &#2361;&#2371;&#2342;&#2351; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2325;&#2325;&#2381;&#2359; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;?</span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Fish hearts typically have two chambers: one atrium and one ventricle. This simple cardiovascular system is different from the four-chambered hearts of mammals, reflecting the evolutionary stages of cardiac development.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Match the points under Column A with those under Column B. </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column A(Subphylum)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column B(Animal)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Hexapoda</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Daphnia</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Crustacea</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Mosquito</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Myriapoda</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Limulus</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Cheliacerata</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Julus</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2340;&#2306;&#2349; A &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2342;&#2367;&#2319; &#2327;&#2319; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2325;&#2379; &#2360;&#2381;&#2340;&#2306;&#2349; B &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2342;&#2367;&#2319; &#2327;&#2319; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A(&#2313;&#2346;&#2360;&#2306;&#2328;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B(&#2346;&#2358;&#2369;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2361;&#2375;&#2325;&#2381;&#2360;&#2366;&#2346;&#2379;&#2337;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2337;&#2376;&#2347;&#2364;&#2344;&#2367;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2325;&#2381;&#2352;&#2360;&#2381;&#2335;&#2375;&#2358;&#2367;&#2351;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2350;&#2330;&#2381;&#2331;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2350;&#2366;&#2311;&#2352;&#2367;&#2351;&#2366;&#2346;&#2379;&#2337;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2354;&#2367;&#2350;&#2369;&#2354;&#2360;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2330;&#2375;&#2354;&#2367;&#2351;&#2366;&#2360;&#2375;&#2352;&#2366;&#2335;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2332;&#2370;&#2354;&#2360;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-b, ii-c, iii-a, iv-d</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2312;-&#2348;&#2368;, &#2310;&#2312;&#2310;&#2312;-&#2360;&#2368;, &#2310;&#2312;&#2310;&#2312;-&#2319;, iv-&#2337;&#2368;</span>",
      "<span class=\"eqt\">i-a, ii-b, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-&#2319;, ii-&#2348;&#2368;, iii-&#2360;&#2368;, iv-&#2337;&#2368;</span>",
      "<span class=\"eqt\">i-d, ii-c, iii-b, iv-a</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2312;-&#2337;&#2368;, &#2310;&#2312;&#2310;&#2312;-&#2360;&#2368;, &#2310;&#2312;&#2310;&#2312;-&#2348;&#2368;, iv-&#2319;</span>",
      "<span class=\"eqt\">i-b, ii-a, iii-d, iv-c</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2312;-&#2348;&#2368;, &#2310;&#2312;&#2310;&#2312;-&#2319;, &#2310;&#2312;&#2310;&#2312;-&#2337;&#2368;, iv-&#2360;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Hexapoda includes insects, and mosquitoes belong to the class Insecta, making this the correct match.</p><p>Daphnia (also known as water flea) belongs to Crustacea, a subphylum of arthropods.</p><p>Julus is a genus of millipedes, which belong to Myriapoda.</p><p>Limulus (horseshoe crab) belongs to Chelicerata, a subphylum that includes arachnids and horseshoe crabs.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>______ is a sessile animal, that relies upon its relationship with plants like algae to build the largest structures of biological origin on earth.</p></span><span class=\"hqt\" style=\"display:none\"><p>______ &#2319;&#2325; &#2360;&#2381;&#2341;&#2367;&#2352; &#2346;&#2381;&#2352;&#2366;&#2339;&#2368; &#2361;&#2376;, &#2332;&#2379; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2346;&#2352; &#2332;&#2376;&#2357;&#2367;&#2325; &#2313;&#2340;&#2381;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;&#2323;&#2306; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2376;&#2357;&#2366;&#2354; &#2332;&#2376;&#2360;&#2375; &#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2309;&#2346;&#2344;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2379;&#2306; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Bird</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2325;&#2381;&#2359;&#2368;</span>",
      "<span class=\"eqt\">Mammal</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2360;&#2381;&#2340;&#2344; &#2346;&#2381;&#2352;&#2366;&#2339;&#2368;</span>",
      "<span class=\"eqt\">Coral</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2306;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Reptile</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2368;&#2360;&#2371;&#2346;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Coral</b>, a sessile animal, relies on its relationship with plant-like algae to build the largest structures of biological origin on Earth. Corals are sessile animals that \"take root\" on the ocean floor.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following options is associated with the class of cold-blooded animals?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2336;&#2306;&#2337;&#2375; &#2326;&#2370;&#2344; &#2357;&#2366;&#2354;&#2375; &#2332;&#2366;&#2344;&#2357;&#2352;&#2379;&#2306; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Chameleon</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2367;&#2352;&#2327;&#2367;&#2335;</span>",
      "<span class=\"eqt\">Pavo</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2357;&#2379;</span>",
      "<span class=\"eqt\">Macropus</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2325;&#2381;&#2352;&#2379;&#2346;&#2360;</span>",
      "<span class=\"eqt\">Psittacula</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2335;&#2381;&#2335;&#2366;&#2325;&#2369;&#2354;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct answer is Chameleon.</p><p>Chameleons are cold-blooded animals, meaning their body temperature is regulated by the external environment. This is typical of reptiles, a class of cold-blooded animals.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Jellyfish are an example of which type of phylum?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2375;&#2354;&#2367;&#2347;&#2364;&#2367;&#2358; &#2325;&#2367;&#2360; &#2360;&#2306;&#2328; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Phylum - protozoa</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2328; - &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2332;&#2379;&#2310;</span>",
      "<span class=\"eqt\">Phylum - Ctenophora</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2328; - &#2335;&#2368;&#2344;&#2379;&#2347;&#2379;&#2352;</span>",
      "<span class=\"eqt\">Phylum -Porifera</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2328; - &#2346;&#2379;&#2352;&#2368;&#2347;&#2375;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Phylum  - cnidaria</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2328; - &#2344;&#2366;&#2311;&#2337;&#2375;&#2352;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Jelly Fish belong to the kingdom Animalia and <b>phylum Cnidaria</b>.</p><p>The phylum Cnidaria includes soft-bodied stinging animals such as corals, sea anemones, and jellyfish.</p><p>This phylum consists of radially or radially symmetrical aquatic invertebrates having unique stinging structures in the tentacles surrounding the mouth.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following animals have a single opening in their digestive system that serves both as a mouth and an anus?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2332;&#2368;&#2357; &#2325;&#2375; &#2346;&#2366;&#2330;&#2344; &#2340;&#2306;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2319;&#2325;&#2354; &#2342;&#2381;&#2357;&#2366;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2350;&#2369;&#2305;&#2361; &#2324;&#2352; &#2327;&#2369;&#2342;&#2366; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Arachnids</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2381;&#2330;&#2367;&#2344;&#2367;&#2337;</span>",
      "<span class=\"eqt\">Echinoderms</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2366;&#2311;&#2344;&#2379;&#2337;&#2352;&#2381;&#2350;&#2375;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Platyhelminthes</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2375;&#2335;&#2368;&#2361;&#2376;&#2354;&#2381;&#2350;&#2367;&#2344;&#2381;&#2341;&#2368;&#2395;</span>",
      "<span class=\"eqt\">Arthropods</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2379;&#2346;&#2379;&#2337;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Flatworm, also called <b>platyhelminth</b>, any of the phylum Platyhelminthes, a group of soft-bodied, usually much flattened invertebrates. A number of flatworm species are free-living, but about 80 percent of all flatworms are parasitic - i.e., living on or in another organism and securing nourishment from it.</p>",
    "question_index": 19
  }
