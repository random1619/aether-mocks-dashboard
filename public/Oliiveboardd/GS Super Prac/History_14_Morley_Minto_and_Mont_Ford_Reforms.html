    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following modern industries was in operation in India during the British rule?</p><p>a. Cotton</p><p>b. Jute</p><p>c. Iron and Steel</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2325;&#2366;&#2352;&#2381;&#2351;&#2352;&#2340; &#2341;&#2366;?</p><p>a. &#2325;&#2346;&#2366;&#2360;</p><p>b. &#2332;&#2370;&#2335;</p><p>c. &#2354;&#2379;&#2361;&#2366; &#2324;&#2352; &#2311;&#2360;&#2381;&#2346;&#2366;&#2340;</p></span>",
    "options": [
      "<span class=\"eqt\">All of a, b and c</span><span class=\"hqt\" style=\"display:none\">a, b &#2324;&#2352; c &#2360;&#2349;&#2368;</span>",
      "<span class=\"eqt\">Both a and b</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; b &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>During British rule in India, <b>all three</b> modern industries - cotton, jute, and iron and steel - were operational, with cotton industry centers in Bengal, Bombay, and Madras, the jute industry in Bengal, and early developments in the iron and steel industry in places like Jamshedpur and Kulti.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>With reference to Morley-Minto Reforms of 1909, consider the following statements. </p><p>a) They are also called the Indian Councils Act, 1909. </p><p>b) They increased the strength of Legislative Councils. </p><p>c) The right to separate electorate was given to the Muslims.</p><p>Which of the above statements is/are correct? </p></span><span class=\"hqt\" style=\"display:none\">1909 &#2325;&#2375; &#2350;&#2377;&#2352;&#2381;&#2354;&#2375;-&#2350;&#2367;&#2306;&#2335;&#2379; &#2360;&#2369;&#2343;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>a) &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2352;&#2367;&#2359;&#2342; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1909 &#2349;&#2368; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>b) &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2357;&#2367;&#2343;&#2366;&#2344; &#2346;&#2352;&#2367;&#2359;&#2342;&#2379;&#2306; &#2325;&#2368; &#2340;&#2366;&#2325;&#2340; &#2348;&#2338;&#2364;&#2366;&#2312;&#2404;</p><p>c) &#2350;&#2369;&#2360;&#2354;&#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2309;&#2354;&#2327; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2344; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</span>",
    "options": [
      "<span class=\"eqt\">b, c</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;, &#2360;&#2368;</span>",
      "<span class=\"eqt\">a, b, c</span><span class=\"hqt\" style=\"display:none\">&#2319;, &#2348;&#2368;, &#2360;&#2368;</span>",
      "<span class=\"eqt\">c, a</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;, &#2319;</span>",
      "<span class=\"eqt\">a, b</span><span class=\"hqt\" style=\"display:none\">&#2319;, &#2348;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Morley-Minto Reforms were significant constitutional reforms in British India.</p><p>Key Points:</p><p>&#183; Also known as the Indian Councils Act of 1909</p><p>&#183; Introduced by Lord Morley (Secretary of State) and Lord Minto (Viceroy)</p><p>&#183; Increased number of members in legislative councils</p><p>&#183; Introduced separate electorates for Muslims</p><p>&#183; Aimed to provide limited political representation</p><p>&#183; Marked a step towards constitutional reforms</p><p>&#183; Partially addressed demands for Indian representation</p><p>&#183; Considered a milestone in colonial administrative reforms</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In which of the following years was the Mont-Ford Reforms report presented by the British colonial government in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2324;&#2346;&#2344;&#2367;&#2357;&#2375;&#2358;&#2367;&#2325; &#2360;&#2352;&#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2379;&#2306;&#2335;-&#2347;&#2379;&#2352;&#2381;&#2337; &#2360;&#2369;&#2343;&#2366;&#2352; &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">1907</span><span class=\"hqt\" style=\"display:none\">1907</span>",
      "<span class=\"eqt\">1918</span><span class=\"hqt\" style=\"display:none\">1918</span>",
      "<span class=\"eqt\">1934</span><span class=\"hqt\" style=\"display:none\">1934</span>",
      "<span class=\"eqt\">1942</span><span class=\"hqt\" style=\"display:none\">1942</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Montagu-Chelmsford Report, set of recommendations made to the British Parliament in <b>1918</b> that became the theoretical basis for the Government of India Act of 1919. The report was the result of lengthy deliberations between Edwin Samuel Montagu, secretary of state for India (1917 - 22), and Lord Chelmsford, viceroy of India (1916 - 21). In August 1917 Montagu had informed the House of Commons that the policy of the British government toward India was thereafter to be one of \"increasing association of Indians in every branch of the administration, with a view to the progressive realization of responsible government in India as an integral part of the empire.\"</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Under which of the following Acts was the power to rule India, transferred from the English East India Company to the British Crown?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2340;&#2361;&#2340; &#2349;&#2366;&#2352;&#2340; &#2346;&#2352; &#2358;&#2366;&#2360;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2360;&#2375; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2325;&#2381;&#2352;&#2366;&#2313;&#2344; &#2325;&#2379; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</span>",
    "options": [
      "<span class=\"eqt\">Regulating Act 1773</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2327;&#2369;&#2354;&#2375;&#2335;&#2367;&#2306;&#2327; &#2319;&#2325;&#2381;&#2335; 1773</span>",
      "<span class=\"eqt\">Pitt's India Act 1784</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2335;&#2381;&#2360; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2319;&#2325;&#2381;&#2335; 1784</span>",
      "<span class=\"eqt\">Government of India Act 1858</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; 1858</span>",
      "<span class=\"eqt\">Charter Act of 1833</span><span class=\"hqt\" style=\"display:none\">1833 &#2325;&#2366; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The power to rule India was transferred from the English East India Company to the British Crown under the <b>Government of India Act 1858</b>. This Act was passed following the Revolt of 1857 and marked the end of Company rule in India. It established direct governance of India by the British Crown through a Secretary of State for India.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Who introduced the Zamindari Settlement as a measure of land revenue administration?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2370;-&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2313;&#2346;&#2366;&#2351; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2350;&#2368;&#2306;&#2342;&#2366;&#2352;&#2368; &#2348;&#2306;&#2342;&#2379;&#2348;&#2360;&#2381;&#2340; &#2325;&#2367;&#2360;&#2344;&#2375; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lord Lytton</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2354;&#2367;&#2335;&#2344;</span>",
      "<span class=\"eqt\">Lord Curzon</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2352;&#2381;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Lord Cornwallis</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2377;&#2352;&#2381;&#2344;&#2357;&#2366;&#2354;&#2367;&#2360;</span>",
      "<span class=\"eqt\">Lord Wellesley</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2357;&#2376;&#2354;&#2375;&#2360;&#2381;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Zamindari Settlement was introduced by <b>Lord Cornwallis</b> during his tenure as Governor-General of India in the late 18th century. Under this system, landlords known as zamindars were granted hereditary rights to collect land revenue from peasants in exchange for fixed payments to the British government.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The Ryotwari Settlement, in which cultivators had to pay annual taxes directly to the government, was primarily introduced in which of the following provinces?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2376;&#2351;&#2340;&#2357;&#2366;&#2352;&#2368; &#2348;&#2306;&#2342;&#2379;&#2348;&#2360;&#2381;&#2340;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2325;&#2371;&#2359;&#2325;&#2379;&#2306; &#2325;&#2379; &#2360;&#2368;&#2343;&#2375; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2325;&#2352; &#2342;&#2375;&#2344;&#2366; &#2346;&#2337;&#2364;&#2340;&#2366; &#2341;&#2366;, &#2357;&#2361; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2366;&#2306;&#2340; &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Central province</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351; &#2346;&#2381;&#2352;&#2366;&#2306;&#2340;</span>",
      "<span class=\"eqt\">Assam and Bengal</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2350; &#2324;&#2352; &#2348;&#2306;&#2327;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Madras and Bombay</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2342;&#2381;&#2352;&#2366;&#2360; &#2324;&#2352; &#2348;&#2377;&#2350;&#2381;&#2348;&#2375;</span>",
      "<span class=\"eqt\">Punjab</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2332;&#2366;&#2348;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Ryotwari Settlement, implemented in <b>Madras and Bombay</b> presidencies, involved cultivators paying annual taxes directly to the government. This system aimed to simplify revenue collection by establishing a direct relationship between the government and individual cultivators in those regions during the British colonial period.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The Doctrine of Lapse was an annexation policy devised by which of the following Governor-Generals of India? </p></span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2351;&#2346;&#2327;&#2340; &#2325;&#2366; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352;-&#2332;&#2344;&#2352;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2340;&#2376;&#2351;&#2366;&#2352; &#2325;&#2368; &#2327;&#2312; &#2319;&#2325; &#2357;&#2367;&#2354;&#2351; &#2344;&#2368;&#2340;&#2367; &#2341;&#2368;?</span>",
    "options": [
      "<span class=\"eqt\">Lord Wellesley</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2357;&#2375;&#2354;&#2375;&#2360;&#2381;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Lord Dalhousie</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2337;&#2354;&#2361;&#2380;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Lord Mayo</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2350;&#2375;&#2351;&#2379;</span>",
      "<span class=\"eqt\">Lord Canning</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2376;&#2344;&#2367;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Doctrine of Lapse was introduced by Lord Dalhousie in 1848. According to this doctrine, any princely state under the British paramountcy would be annexed if the ruler died without a natural male heir. This led to the annexation of several states including Satara, Jhansi, and Nagpur.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The question consists of two statements, namely, Assertion (A) and Reason (R). Use them to choose the correct alternative.</p><p>Assertion (A): During the British rule, India's exports exceeded the imports leading to surplus of balance of trade.</p><p>Reason (R): The surplus of balance of trade was used for growth and development of India.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2342;&#2379; &#2325;&#2341;&#2344; &#2309;&#2352;&#2381;&#2341;&#2366;&#2340;&#2381; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A) &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; (R) &#2361;&#2376;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2344;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340;, &#2310;&#2351;&#2366;&#2340; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379; &#2327;&#2351;&#2366; &#2332;&#2367;&#2360;&#2360;&#2375; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2309;&#2343;&#2367;&#2358;&#2375;&#2359; &#2361;&#2379; &#2327;&#2351;&#2366;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2325;&#2375; &#2309;&#2343;&#2367;&#2358;&#2375;&#2359; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2324;&#2352; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is false but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is true and R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2324;&#2352; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>"

    "correct_option_id": 3,
    "solution": "<p>During the British rule, India had a trade surplus, but this surplus did not benefit India significantly. It largely resulted from the economic exploitation and export of Indian resources and goods to Britain, leading to economic drain rather than prosperity.</p><p>Hence, A is true, and R is false.</p>",

  {
    "question": "<span class=\"eqt\"><p>Who among the following devised the system of 'Subsidiary Alliance'?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2344;&#2375; '&#2360;&#2361;&#2366;&#2351;&#2325; &#2327;&#2336;&#2348;&#2306;&#2343;&#2344;' &#2325;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2340;&#2376;&#2351;&#2366;&#2352; &#2325;&#2368;?</span>",
    "options": [
      "<span class=\"eqt\">Lord Wellesley</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2357;&#2375;&#2354;&#2375;&#2360;&#2381;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Lord Canning</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2376;&#2344;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Lord William Bentinck</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2357;&#2367;&#2354;&#2367;&#2351;&#2350; &#2348;&#2375;&#2306;&#2335;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Lord Dalhousie</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2337;&#2354;&#2361;&#2380;&#2332;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Lord Wellesley, the Governor-General of India from 1798 to 1805, devised the system of Subsidiary Alliance. This policy was aimed at securing British influence over Indian princely states by requiring them to maintain British troops within their territories and pay for their upkeep. The system effectively reduced the sovereignty of Indian rulers, as it forced them into a dependent relationship with the British East India Company.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the INCORRECTLY matched pair(s) of the British Governor-Generals of India and the events with which they are associated.</p><p>i) Lord Dalhousie  -  Revolt of 1857</p><p>ii) Lord Auckland  -  First Afghan War</p><p>iii) Lord Canning  -  Wood's Despatch 1854</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352;-&#2332;&#2344;&#2352;&#2354;&#2379;&#2306; &#2325;&#2368; &#2327;&#2354;&#2340; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2324;&#2352; &#2313;&#2344; &#2328;&#2335;&#2344;&#2366;&#2323;&#2306; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2332;&#2367;&#2344;&#2360;&#2375; &#2357;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2361;&#2369;&#2319; &#2361;&#2376;&#2306;&#2404;</p><p>i) &#2354;&#2377;&#2352;&#2381;&#2337; &#2337;&#2354;&#2361;&#2380;&#2332;&#2368; - 1857 &#2325;&#2366; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;</p><p>ii) &#2354;&#2377;&#2352;&#2381;&#2337; &#2321;&#2325;&#2354;&#2376;&#2306;&#2337; - &#2346;&#2381;&#2352;&#2341;&#2350; &#2309;&#2347;&#2327;&#2366;&#2344; &#2351;&#2369;&#2342;&#2381;&#2343;</p><p>iii) &#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2376;&#2344;&#2367;&#2306;&#2327; - &#2357;&#2369;&#2337;&#2381;&#2360; &#2337;&#2367;&#2360;&#2381;&#2346;&#2376;&#2330; 1854</p></span>",
    "options": [
      "<span class=\"eqt\">Only (ii) and (iii)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (ii) &#2324;&#2352; (iii)</span>",
      "<span class=\"eqt\">Only (i) and (iii)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (i) &#2324;&#2352; (iii)</span>",
      "<span class=\"eqt\">Only (ii)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (ii)</span>",
      "<span class=\"eqt\">Only (i)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (i)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correctly matched pair is \"Lord Auckland  -  First Afghan War\".</p><p>Lord Dalhousie was the Governor-General of India from 1848 to 1856, and he is associated with the policies of annexation and the introduction of the Doctrine of Lapse. The Revolt of 1857 occurred during the tenure of Lord Canning, who succeeded Lord Dalhousie.</p><p>Lord Canning is not associated with Wood's Despatch of 1854. Wood's Despatch is connected to another Governor-General, Lord Dalhousie.</p><p>So, statements (i) and (iii) are not correctly matched.</p><p>Hence, option (b) is correct.</p>",
    "question_index": 9
  },

    "question": "<span class=\"eqt\"><p>Which of the following Acts passed under Warren Hastings was also called the 'half-loaf system'?</p></span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2352;&#2375;&#2344; &#2361;&#2375;&#2360;&#2381;&#2335;&#2367;&#2306;&#2327;&#2381;&#2360; &#2325;&#2375; &#2340;&#2361;&#2340; &#2346;&#2366;&#2352;&#2367;&#2340; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2379; '&#2361;&#2366;&#2347;-&#2352;&#2379;&#2335;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;' &#2349;&#2368; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;?</span>",
    "options": [

      "<span class=\"eqt\">Pitt's India Act 1784</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2335;&#2381;&#2360; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2319;&#2325;&#2381;&#2335; 1784</span>",
      "<span class=\"eqt\">Regulating Act 1773</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2327;&#2369;&#2354;&#2375;&#2335;&#2367;&#2306;&#2327; &#2319;&#2325;&#2381;&#2335; 1773</span>"

    "correct_option_id": 2,
    "solution": "<p>The Pitt's India Act of 1784 was introduced by British Prime Minister William Pitt the Younger to correct the shortcomings of the Regulating Act of 1773. The Act divided control of British India between the British government and the East India Company.</p>",
    "question_index": 10

  {

    "solution": "<p>The Rowlatt Act of 1919 allowed the British government to imprison individuals suspected of terrorism or anti-colonial activities without trial. It led to massive protests, including the Jallianwala Bagh massacre.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following British officers issued the infamous 'crawling order' where by Indian had to crawl on all fours to pass an alley?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368; &#2344;&#2375; '&#2352;&#2375;&#2306;&#2327;&#2344;&#2375; &#2325;&#2366; &#2310;&#2342;&#2375;&#2358;' (&#2325;&#2381;&#2352;&#2377;&#2354;&#2367;&#2306;&#2327; &#2310;&#2342;&#2375;&#2358;) &#2332;&#2366;&#2352;&#2368; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404; &#2332;&#2367;&#2360;&#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2327;&#2354;&#2368; &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2375;&#2306;&#2327;&#2325;&#2352; &#2332;&#2366;&#2344;&#2366; &#2346;&#2337;&#2364;&#2340;&#2366; &#2341;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>The Permanent Settlement came into operation in which of the following years?</p></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2348;&#2306;&#2342;&#2379;&#2348;&#2360;&#2381;&#2340; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2354;&#2366;&#2327;&#2370; &#2361;&#2369;&#2310;?</span>",

    "correct_option_id": 3,
    "solution": "<p>The Permanent Settlement was introduced in 1793 by Lord Cornwallis in Bengal, Bihar, and Odisha. Under this system, zamindars (landowners) were made responsible for collecting land revenue from peasants and paying a fixed amount to the British government. It led to landlord dominance but also economic distress among farmers.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following Acts was enacted by the British Parliament to give effect to the 'Mountbatten Plan'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; '&#2350;&#2366;&#2313;&#2306;&#2335;&#2348;&#2375;&#2335;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366;' &#2325;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2306;&#2360;&#2342; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",

      "<span class=\"eqt\">The Indian Independence Act of 1947</span><span class=\"hqt\" style=\"display:none\">1947 &#2325;&#2366; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>"

    "correct_option_id": 3,
    "solution": "<p>On February 20, 1947, the British Prime Minister Clement Attlee announced that British rule in India would end on June 30, 1948; Power was then to be transferred into the hands of responsible Indians.</p><p>On 3 June 1947, the British Government clarified that the constitution drafted by the Constituent Assembly of India (established in 1946) would not apply to areas of the country that were unwilling to adopt. On the same day (June 3, 1947) the Lord Viceroy of India presented the Mountbatten Partition Plan, known as the 'Mountbatten Plan'. <b>The plan was accepted by Congress and the Muslim League. The plan went into effect immediately with the enactment of the Indian Independence Act of 1947.</b></p>",
