    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Provisions related to the seat of the \"Supreme Court of India\" is mentioned in which article?</p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2313;&#2330;&#2381;&#2330;&#2340;&#2350; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;\" &#2325;&#2368; &#2360;&#2368;&#2335; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;&#2379;&#2306; &#2325;&#2366; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 132</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 132</span>",
      "<span class=\"eqt\">Article 131</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 131</span>",
      "<span class=\"eqt\">Article 130</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 130</span>",
      "<span class=\"eqt\">Article 129</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 129</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Article 130</b> of the Constitution of India states that the Supreme Court shall have its seat in Delhi or any other place or places, as may be appointed by the Chief Justice of India, with the approval of the President.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which is NOT correct about the High Court?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2360;&#2361;&#2368;<b> &#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It can deal with cases within the jurisdiction of the state.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2375; &#2340;&#2361;&#2340; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2360;&#2375; &#2344;&#2367;&#2346;&#2335; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It can hear appeals from the lower courts.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2344;&#2367;&#2330;&#2354;&#2368; &#2309;&#2342;&#2366;&#2354;&#2340;&#2379;&#2306; &#2360;&#2375; &#2309;&#2346;&#2368;&#2354; &#2360;&#2369;&#2344; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It can issue various writs for the protection of the Fundamental Rights.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2352;&#2367;&#2335; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It gives advisory opinion to the President of India.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2360;&#2354;&#2366;&#2361;&#2325;&#2366;&#2352;&#2368; &#2352;&#2366;&#2351; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The High Court possesses the power to issue directions to any individual or entity within its jurisdiction.</p><p>The High Court has the authority to consider and decide on appeals that originate from lower courts.</p><p>Article 226 empowers High Courts to issue directions, orders, or writs for the protection of the Fundamental Rights.</p><p>Article 143 of the Indian Constitution grants the Supreme Court (Not High Court) advisory jurisdiction.</p><p>Hence, option (d) is correct.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article of the Constitution of India mentions that law declared by Supreme Court is binding on all courts?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2350;&#2375;&#2306; &#2351;&#2361; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2361;&#2376; &#2325;&#2367; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2328;&#2379;&#2359;&#2367;&#2340; &#2325;&#2366;&#2344;&#2370;&#2344; &#2360;&#2349;&#2368; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2346;&#2352; &#2348;&#2366;&#2343;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 143</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 143</span>",
      "<span class=\"eqt\">Article 142</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 142</span>",
      "<span class=\"eqt\">Article 144</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 144</span>",
      "<span class=\"eqt\">Article 141</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 141</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Article 141</b> of the Constitution of India asserts that the law declared by the Supreme Court is binding on all courts throughout the country. This means that decisions and interpretations made by the Supreme Court hold authoritative and mandatory status for all other courts within the Indian jurisdiction.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>As of March 2023, how many High Courts are there in India?</p></span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2352;&#2381;&#2330; 2023 &#2340;&#2325; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2361;&#2376;&#2306;?</span>",
    "options": [
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>As of March 2023, India has a total of <b>25 High Courts</b>. These High Courts serve as the highest judicial bodies in their respective states and union territories, handling a wide range of legal matters.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article of the Indian Constitution empowers the Supreme Court to review its own judgements or orders?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351;&#2379;&#2306; &#2351;&#2366; &#2310;&#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2368; &#2360;&#2350;&#2368;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 138</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 138</span>",
      "<span class=\"eqt\">Article 135</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 135</span>",
      "<span class=\"eqt\">Article 136</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 136</span>",
      "<span class=\"eqt\">Article 137</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 137</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Article 137</b> of the Indian Constitution grants the Supreme Court the authority to review its own judgments or orders. This provision allows the court to correct errors or reconsider decisions in exceptional circumstances to ensure justice and uphold the rule of law.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article of the Constitution of India empowers a high court to issue a writ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2319;&#2325; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2379; &#2352;&#2367;&#2335; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;-</p></span>",
    "options": [
      "<span class=\"eqt\">Article 132</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 132</span>",
      "<span class=\"eqt\">Article 226</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 226</span>",
      "<span class=\"eqt\">Article 143</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 143</span>",
      "<span class=\"eqt\">Article 32</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32</span>"

    "correct_option_id": 1,
    "solution": "<p><b>Article 226 </b>of the Constitution empowers a high court to issue writs such as habeas corpus, mandamus, certiorari, prohibition and quo warranto. The writ jurisdiction of the high court is concurrent with the writ jurisdiction of the Supreme Court.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Articles 214 to 231 in Part VI of the Indian Constitution deal with the ______.</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2349;&#2366;&#2327; VI &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 214 &#2360;&#2375; 231 ______ &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">High Courts</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">District Courts</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2367;&#2354;&#2366; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Subordinate Courts</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2368;&#2344;&#2360;&#2381;&#2341; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Supreme Court</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2346;&#2381;&#2352;&#2368;&#2350; &#2325;&#2379;&#2352;&#2381;&#2335;</span>"

    "correct_option_id": 0,

    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>In January 2022, the Supreme Court conferred daughters with equal right to the father's property even prior to codification of Hindu Personal Laws and enactment of the Hindu Succession Act in ____.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2357;&#2352;&#2368; 2022 &#2350;&#2375;&#2306;, &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2344;&#2375; &#2361;&#2367;&#2306;&#2342;&#2370; &#2346;&#2352;&#2381;&#2360;&#2344;&#2354; &#2354;&#2377; &#2325;&#2375; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;&#2325;&#2352;&#2339; &#2324;&#2352; ____ &#2350;&#2375;&#2306; &#2361;&#2367;&#2306;&#2342;&#2370; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2361;&#2368; &#2348;&#2375;&#2335;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2346;&#2367;&#2340;&#2366; &#2325;&#2368; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1959</span><span class=\"hqt\" style=\"display:none\">1959</span>",
      "<span class=\"eqt\">1952</span><span class=\"hqt\" style=\"display:none\">1952</span>",
      "<span class=\"eqt\">1947</span><span class=\"hqt\" style=\"display:none\">1947</span>",
      "<span class=\"eqt\">1956</span><span class=\"hqt\" style=\"display:none\">1956</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Supreme Court ruled that daughters have equal rights to their father's property even before the Hindu Succession Act 1956 came into force. The court said that the law of inheritance would apply to partition of properties even if the father had died intestate (without a will) before <b>1956</b>.The court also referred to the ancient texts and Smritis that recognized the rights of female heirs, especially wives and daughters</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article of the Constitution of India grants power to the President to appoint Judges of the Supreme Court?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Article 124(2)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 124(2)</span>",
      "<span class=\"eqt\">Article 123(1)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 123(1)</span>",
      "<span class=\"eqt\">Article 127(3)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 127(3)</span>",
      "<span class=\"eqt\">Article 128(4)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 128(4)</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Article 124(2)</b> of the Constitution of India grants the power to the President of India to appoint the Judges of the Supreme Court. It states that the President shall appoint the Chief Justice of India and other Judges of the Supreme Court, following the procedure established by law.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The Supreme Court of India comprises the Chief Justice and not more than ______ other Judges appointed by the President of India. </p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; ______ &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2309;&#2344;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">37</span><span class=\"hqt\" style=\"display:none\">37</span>",
      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>",
      "<span class=\"eqt\">33</span><span class=\"hqt\" style=\"display:none\">33</span>",
      "<span class=\"eqt\">38</span><span class=\"hqt\" style=\"display:none\">38</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Supreme Court of India comprises the Chief Justice and not more than 33 other Judges appointed by the President of India.</p><p>This means the total number of judges in the Supreme Court, including the Chief Justice, can be up to 34. The number of judges can be increased or decreased by parliamentary law, but the current sanctioned strength is 34.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which article has a similar provision to that of Article 32 and deals with writ jurisdiction?</p><p></p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32 &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2352;&#2367;&#2335; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p><p><b>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</b></span>",
    "options": [
      "<span class=\"eqt\">Article 227</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 227</span>",
      "<span class=\"eqt\">Article 228</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 228</span>",
      "<span class=\"eqt\">Article 225</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 225</span>",
      "<span class=\"eqt\">Article 226</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 226</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>1) <b>Understanding Article 32:</b></p><p>o Article 32 of the Indian Constitution allows individuals to directly approach the Supreme Court for enforcement of fundamental rights through writs like habeas corpus, mandamus, prohibition, quo warranto, and certiorari.</p><p>o It is often referred to as the \"heart and soul of the Constitution\" (as termed by Dr. B.R. Ambedkar).</p><p>2) <b>About Article 226:</b></p><p>o Article 226 empowers High Courts to issue writs for enforcement of fundamental rights and for other purposes.</p><p>o Unlike Article 32, its scope is broader as it includes cases beyond fundamental rights.</p><p><b>Key Difference:</b></p><p>&#183; Article 32 is limited to fundamental rights and the Supreme Court.</p><p>&#183; Article 226 covers broader jurisdiction, including ordinary legal rights and is applicable to High Courts.</p><p><b>Incorrect Options:</b></p><p>&#183; <b>Article 227:</b> Deals with the High Court's power of superintendence over lower courts.</p><p>&#183; <b>Article 228:</b> Relates to the transfer of certain cases to High Courts.</p><p>&#183; <b>Article 225:</b> Pertains to the jurisdiction of existing High Courts.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT the qualification for the appointment of judges of the Supreme Court?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2351;&#2379;&#2327;&#2381;&#2351;&#2340;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A judge of high court for at least five years</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2346;&#2366;&#2306;&#2330; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2340;&#2325; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>",
      "<span class=\"eqt\">An advocate of Supreme Court for at least ten years</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2342;&#2360; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2340;&#2325; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2357;&#2325;&#2366;&#2354;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2344;&#2369;&#2349;&#2357;</span>",
      "<span class=\"eqt\">An advocate of high court for at least ten years</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2342;&#2360; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2340;&#2325; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2357;&#2325;&#2366;&#2354;&#2340; &#2325;&#2366; &#2309;&#2344;&#2369;&#2349;&#2357;</span>",
      "<span class=\"eqt\">A distinguished judge in the opinion of the President</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; &#2352;&#2366;&#2351; &#2350;&#2375;&#2306; &#2319;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2359;&#2381;&#2336;&#2367;&#2340; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; An advocate of the Supreme court for at least ten years is not the qualification for the appointment of judges of the Supreme Court.</p><p>&bull; &#8203;According to Article 124(3) of the Constitution of India, the qualifications required for appointment as a Judge of the Supreme Court are as follows:&#8203;</p><p>&#9675; Citizenship: The individual must be a citizen of India.&#8203;</p><p>&#9675; Judicial Experience: The individual must have served as a Judge of a High Court (or of two or more such courts in succession) for at least five years.&#8203;</p><p>&#9675; Advocacy Experience: Alternatively, the individual must have been an advocate of a High Court (or of two or more such courts in succession) for at least ten years.&#8203;</p><p>&#9675; Distinguished Jurist: The individual is, in the opinion of the President, a distinguished jurist.&#8203;</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>How many types of writs can be issued under Article 32 and 226 of the Constitution of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32 &#2324;&#2352; 226 &#2325;&#2375; &#2340;&#2361;&#2340; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2352;&#2367;&#2335; &#2332;&#2366;&#2352;&#2368; &#2325;&#2368; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Four</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Six</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2361;</span>",
      "<span class=\"eqt\">Five</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2305;&#2330;</span>",
      "<span class=\"eqt\">Seven</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2340;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Powers of High Courts conferred under Article 226 are wider as compared to powers conferred on the Supreme Court under Article 32 of the Constitution of India. Both the Articles 32 and 226 provide five types of writs namely writ of habeas corpus, mandamus, prohibition, certiorari and quo-warranto.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which writ is issued by a High Court or Supreme Court when a lower court has considered a case going beyond its jurisdiction?</p></span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2351;&#2366; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2380;&#2344; &#2360;&#2368; &#2352;&#2367;&#2335; &#2340;&#2348; &#2332;&#2366;&#2352;&#2368; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2332;&#2348; &#2344;&#2367;&#2330;&#2354;&#2368; &#2309;&#2342;&#2366;&#2354;&#2340; &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2375; &#2348;&#2366;&#2361;&#2352; &#2325;&#2375; &#2350;&#2366;&#2350;&#2354;&#2375; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2361;&#2379;?</span>",
    "options": [
      "<span class=\"eqt\">Quo Warranto</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2346;&#2371;&#2330;&#2381;&#2331;&#2366;</span>",
      "<span class=\"eqt\">Habeas Corpus</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2342;&#2368; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359;&#2368;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Prohibition</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2375;&#2343;</span>",
      "<span class=\"eqt\">Certiorari</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2350;&#2366;&#2339; &#2346;&#2340;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A Prohibition writ is a legal remedy issued by a higher court (high court or supreme court) when a lower court has exceeded its jurisdiction or is attempting to proceed with a case beyond its legal authority. This judicial instrument serves as a critical check and balance mechanism in the legal system, preventing lower courts from overstepping their prescribed legal boundaries. When a lower court starts to adjudicate a matter that is outside its competence or violates fundamental legal principles, the higher court can intervene through this writ. By issuing a Prohibition writ, the superior court effectively stops the lower court from continuing proceedings that are deemed improper or illegal. </p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>What does the writ of 'Mandamus' mean?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2346;&#2352;&#2350;&#2366;&#2342;&#2375;&#2358;' &#2352;&#2367;&#2335; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">We Command</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;/&#2310;&#2332;&#2381;&#2334;&#2366; &#2342;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">By What Warrants</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2360;&#2375;</span>",
      "<span class=\"eqt\">To be Certified</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2350;&#2366;&#2339;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">You May Have the Body</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2342;&#2368; &#2325;&#2379; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2375; &#2360;&#2366;&#2350;&#2344;&#2375; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2342;&#2352;&#2381;&#2332; &#2325;&#2352;&#2366;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Mandamus' means <b>'we command'</b>. It is issued by the Court to direct a public authority to perform the legal duties which it has not or refused to perform. It can be issued by the Court against a public official, public corporation, tribunal, inferior court or the government. It cannot be issued against a private individual or body, the President or Governors of States or against a working Chief Justices.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following jurisdictions of the Supreme Court allows it to settle disputes between the centre and state and amongst states?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2330;&#2381;&#2330;&#2340;&#2350; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2313;&#2360;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2348;&#2368;&#2330; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2367;&#2357;&#2366;&#2342;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2346;&#2335;&#2366;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Appellate</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2368;&#2354;-&#2360;&#2306;&#2348;&#2306;&#2343;&#2368;</span>",
      "<span class=\"eqt\">Advisory</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2354;&#2366;&#2361;&#2325;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Writ</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2335;</span>",
      "<span class=\"eqt\">Original</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Appellate</b> jurisdiction involves higher courts reviewing decisions made by lower courts, focusing on questions of law rather than revaluating the facts of the case.</p><p><b>Advisory</b> jurisdiction involves a court providing non-binding opinions or advice on legal questions presented by other entities or branches of government.</p><p><b>Writ</b> jurisdiction grants a court the authority to issue legal orders or commands, known as writs, to enforce fundamental rights and ensure justice.</p><p><b>Original</b> jurisdiction is a court's authority to hear and decide a case as the first instance, where trials are conducted, and decisions are made on both facts and law.</p><p>Under Article 131, the Supreme Court has <b><u>original jurisdiction</u></b> to resolve disputes between the State and the Centre.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>When was the High Court and Supreme Court Judges (Salaries and Conditions of Service) Amendment Bill, 2021 introduced in Lok Sabha?</p><p></p></span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2324;&#2352; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; (&#2357;&#2375;&#2340;&#2344; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366; &#2325;&#2368; &#2358;&#2352;&#2381;&#2340;&#2375;&#2306;) &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;, 2021 &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2325;&#2348; &#2346;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;?</p><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</span>",
    "options": [
      "<span class=\"eqt\">27 September 2021</span><span class=\"hqt\" style=\"display:none\">27 &#2360;&#2367;&#2340;&#2306;&#2348;&#2352; 2021</span>",
      "<span class=\"eqt\">30 November 2021</span><span class=\"hqt\" style=\"display:none\">30 &#2344;&#2357;&#2306;&#2348;&#2352; 2021</span>",
      "<span class=\"eqt\">29 March 2021</span><span class=\"hqt\" style=\"display:none\">29 &#2350;&#2366;&#2352;&#2381;&#2330; 2021</span>",
      "<span class=\"eqt\">28 April 2021</span><span class=\"hqt\" style=\"display:none\">28 &#2309;&#2346;&#2381;&#2352;&#2376;&#2354; 2021</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The <b>High Court and Supreme Court Judges (Salaries and Conditions of Service) Amendment Bill, 2021</b>, was introduced in <b>Lok Sabha on 30 November 2021</b>.</p><p>&#183; The bill sought to amend existing laws governing the salaries and conditions of service for judges of the Supreme Court and High Courts.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>What is the retirement age of Judges serving at the Supreme Court of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2352;&#2340; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2360;&#2375;&#2357;&#2366;&#2344;&#2367;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">68 years</span><span class=\"hqt\" style=\"display:none\">68 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">60 years</span><span class=\"hqt\" style=\"display:none\">60 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">65 years</span><span class=\"hqt\" style=\"display:none\">65 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">62 years</span><span class=\"hqt\" style=\"display:none\">62 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The retirement age for Supreme Court Judges in India is 65 years.</p><p>&bull; Article 124(2): Every judge of the Supreme Court, including the Chief Justice of India (CJI), retires upon attaining the age of 65 years.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>British Parliament introduced Indian High Courts Act in:</p></span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2306;&#2360;&#2342; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2348; &#2346;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;:</span>",
    "options": [
      "<span class=\"eqt\">1860</span><span class=\"hqt\" style=\"display:none\">1860</span>",
      "<span class=\"eqt\">1861</span><span class=\"hqt\" style=\"display:none\">1861</span>",
      "<span class=\"eqt\">1859</span><span class=\"hqt\" style=\"display:none\">1859</span>",
      "<span class=\"eqt\">1858</span><span class=\"hqt\" style=\"display:none\">1858</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Indian High Courts Act was passed by the British Parliament in 1861. This act authorized the Crown to establish High Courts in Indian presidencies. The first three High Courts were established in Calcutta, Bombay, and Madras.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>What is the upper age limit for appointment as a judge of High court as of October 2022?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2022 &#2340;&#2325; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2310;&#2351;&#2369; &#2360;&#2368;&#2350;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">62 years</span><span class=\"hqt\" style=\"display:none\">62 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">57 years</span><span class=\"hqt\" style=\"display:none\">57 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">55 years</span><span class=\"hqt\" style=\"display:none\">55 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">60 years</span><span class=\"hqt\" style=\"display:none\">60 &#2357;&#2352;&#2381;&#2359;</span>"
