</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>

                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>What is the unique property of carbon that allows it to form covalent bonds with other carbon atoms, leading to long chains and rings? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2325;&#2366; &#2357;&#2361; &#2309;&#2344;&#2379;&#2326;&#2366; &#2327;&#2369;&#2339; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; &#2332;&#2379; &#2313;&#2360;&#2375; &#2309;&#2344;&#2381;&#2351; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2361;&#2360;&#2306;&#2351;&#2379;&#2332;&#2325; &#2348;&#2306;&#2343; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2354;&#2350;&#2381;&#2348;&#2368; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366;&#2319;&#2306; &#2324;&#2352; &#2357;&#2354;&#2351; &#2348;&#2344;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tetravalency</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2335;&#2381;&#2352;&#2366;&#2357;&#2376;&#2354;&#2375;&#2306;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Isomerism</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2351;&#2357;&#2367;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Catenation</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Hybridisation</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2325;&#2352;&#2339;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Catenation</b> is the ability of an element to form bonds with itself, and this property is prominently exhibited by carbon, allowing it to create diverse organic structures. </p><p>Tetravalency refers to carbon's ability to form four bonds, isomerism to the existence of molecules with the same formula but different structures, and hybridisation to the mixing of atomic orbitals.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In a methane (CH<sub>4</sub>) molecule, what is the hybridisation state of the carbon atom and the shape of the molecule? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2368;&#2341;&#2375;&#2344; (CH<sub>4</sub>) &#2309;&#2339;&#2369; &#2350;&#2375;&#2306;, &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2325;&#2368; &#2360;&#2306;&#2325;&#2352;&#2339; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2324;&#2352; &#2309;&#2339;&#2369; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">sp2, trigonal planar</span><span class=\"hqt\" style=\"display:none\">sp2, &#2340;&#2381;&#2352;&#2367;&#2325;&#2379;&#2339;&#2368;&#2351; &#2360;&#2350;&#2340;&#2354;&#2368;&#2351;</span>",
      "<span class=\"eqt\">sp, linear</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360;&#2346;&#2368;, &#2352;&#2376;&#2326;&#2367;&#2325;</span>",
      "<span class=\"eqt\">sp3, tetrahedral</span><span class=\"hqt\" style=\"display:none\">sp3, &#2330;&#2340;&#2369;&#2359;&#2381;&#2347;&#2354;&#2325;&#2368;&#2351;</span>",
      "<span class=\"eqt\">sp3, trigonal pyramidal</span><span class=\"hqt\" style=\"display:none\">sp3, &#2340;&#2381;&#2352;&#2367;&#2325;&#2379;&#2339;&#2368;&#2351; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In a methane (CH&#8324;) molecule:</p><p>&#183; The <b>carbon atom</b> forms four sigma (&#963;) bonds with four hydrogen atoms.</p><p>&#183; To form these four equivalent sigma bonds, carbon undergoes <b>sp&ge; hybridization</b>.</p><p>&#183; The resulting shape of the molecule is <b>tetrahedral</b>, with bond angles of approximately <b>109.5&deg;</b>.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Type of Isomerism with its Cause:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Type of Isomerism</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Cause</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Chain Isomerism</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Different functional groups</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Position Isomerism</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Differs in the position of a substituent/functional group</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Functional Group Isomerism</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Different arrangement of carbon skeleton</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2357;&#2351;&#2357;&#2340;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2350;&#2366;&#2357;&#2351;&#2357;&#2340;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2366;&#2352;&#2339;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2360;&#2350;&#2366;&#2357;&#2351;&#2357;&#2340;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2350;&#2370;&#2361;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2360;&#2350;&#2352;&#2370;&#2346;&#2340;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344;/&#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2350;&#2370;&#2361; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2349;&#2367;&#2344;&#2381;&#2344;&#2340;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2350;&#2370;&#2361; &#2360;&#2350;&#2352;&#2370;&#2346;&#2340;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2325;&#2306;&#2325;&#2366;&#2354; &#2325;&#2368; &#2309;&#2354;&#2327; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i &rarr; a, ii &rarr; b, iii &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; b, iii &rarr; c</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; a, iii &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; a, iii &rarr; b</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; c, iii &rarr; a</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; c, iii &rarr; a</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; b, iii &rarr; a</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; b, iii &rarr; a</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Chain isomerism</b> arises due to the <b>different arrangement of the carbon skeleton</b>.</p><p><b>Functional group isomerism</b> occurs when compounds have the same molecular formula but <b>different functional groups</b>. </p><p><b>Position isomerism</b> occurs when compounds differ in the position of the substituent or functional group on the carbon skeleton. </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Type of Isomerism</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Cause</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(i) Chain Isomerism</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(c) Different arrangement of carbon skeleton</b> (e.g., straight vs. branched chains).</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(ii) Position Isomerism</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(Not directly listed)</b> Differs in the <b>position of a substituent/functional group</b> (e.g., 1-propanol vs. 2-propanol).</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(iii) Functional Group Isomerism</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(a) Different functional groups</b> (e.g., ethanol vs. dimethyl ether, both C&#8322;H&#8326;O).</td></tr></table>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) accurately describe(s) &#960; (pi) bonds?</p><p>I. A &#960; bond is formed by the sideways overlap of parallel p orbitals on adjacent atoms.</p><p>II. Rotation about a carbon-carbon double bond (C=C) is restricted due to the interference with the maximum overlap of p orbitals in the &#960; bond.</p><p>III. The electron charge cloud of a &#960; bond is located in the plane of the bonding atoms.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#960; (pi) &#2348;&#2377;&#2344;&#2381;&#2337; &#2325;&#2366; &#2360;&#2335;&#2368;&#2325; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p><p>I. &#2319;&#2325; &#960; &#2348;&#2377;&#2344;&#2381;&#2337; &#2310;&#2360;&#2344;&#2381;&#2344; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2346;&#2352; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; p &#2321;&#2352;&#2381;&#2348;&#2367;&#2335;&#2354;&#2381;&#2360; &#2325;&#2375; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2323;&#2357;&#2352;&#2354;&#2376;&#2346; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;-&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2348;&#2354; &#2348;&#2377;&#2344;&#2381;&#2337; (C=C) &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2352;&#2379;&#2335;&#2375;&#2358;&#2344; &#960; &#2348;&#2377;&#2344;&#2381;&#2337; &#2350;&#2375;&#2306; p &#2321;&#2352;&#2381;&#2348;&#2367;&#2335;&#2354;&#2381;&#2360; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2323;&#2357;&#2352;&#2354;&#2376;&#2346; &#2325;&#2375; &#2360;&#2366;&#2341; &#2361;&#2360;&#2381;&#2340;&#2325;&#2381;&#2359;&#2375;&#2346; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>III. &#2319;&#2325; &#960; &#2348;&#2377;&#2344;&#2381;&#2337; &#2325;&#2366; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2330;&#2366;&#2352;&#2381;&#2332; &#2325;&#2381;&#2354;&#2366;&#2313;&#2337; &#2348;&#2377;&#2344;&#2381;&#2337;&#2367;&#2306;&#2327; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2340;&#2354; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III</span><span class=\"hqt\" style=\"display:none\">II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II, and III</span><span class=\"hqt\" style=\"display:none\">I, II, &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement I is correct as &#960; bond formation requires parallel orientation of p orbitals for sideways overlap. </p><p>Statement II is also correct; rotation about a C=C bond is restricted because it would disrupt the overlap of the p orbitals. </p><p>Statement III is incorrect; the electron charge cloud of the &#960; bond is located <b>above and below</b> the plane of the bonding atoms.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following models used for visualising organic molecules emphasizes the relative size of each atom based on its van der Waals radius? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2309;&#2339;&#2369;&#2323;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2351;&#2369;&#2325;&#2381;&#2340; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2377;&#2337;&#2354; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2325;&#2375; &#2357;&#2376;&#2344; &#2337;&#2375;&#2352; &#2357;&#2366;&#2354;&#2381;&#2360; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2313;&#2360;&#2325;&#2375; &#2360;&#2366;&#2346;&#2375;&#2325;&#2381;&#2359; &#2310;&#2325;&#2366;&#2352; &#2346;&#2352; &#2332;&#2379;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Framework model</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2352;&#2375;&#2350;&#2357;&#2352;&#2381;&#2325; &#2350;&#2377;&#2337;&#2354;</span>",
      "<span class=\"eqt\">Ball-and-stick model</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2375;&#2306;&#2342; &#2324;&#2352; &#2331;&#2337;&#2364;&#2368; &#2350;&#2377;&#2337;&#2354;</span>",
      "<span class=\"eqt\">Space-filling model</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2344;-&#2349;&#2352;&#2339; &#2350;&#2377;&#2337;&#2354;</span>",
      "<span class=\"eqt\">Ball-and-spring model</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2377;&#2354;-&#2324;&#2352;-&#2360;&#2381;&#2346;&#2381;&#2352;&#2367;&#2306;&#2327; &#2350;&#2377;&#2337;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The <b>space-filling model</b> (also called the <b>CPK model</b>) represents atoms as spheres whose <b>sizes are proportional to their van der Waals radii</b>, and the spheres are arranged to reflect how the atoms are actually packed in space.</p><p>&#183; This model emphasizes <b>how much space each atom occupies</b>, giving a more realistic sense of the molecule's overall size and shape.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Organic compounds containing carbon atoms joined in the form of a ring are classified as: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2354;&#2351; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2369;&#2337;&#2364;&#2375; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2357;&#2366;&#2354;&#2375; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2351;&#2380;&#2327;&#2367;&#2325;&#2379;&#2306; &#2325;&#2379; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Acyclic compounds</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2330;&#2325;&#2381;&#2352;&#2368;&#2351; &#2351;&#2380;&#2327;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Aliphatic compounds</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2354;&#2367;&#2347;&#2376;&#2335;&#2367;&#2325; &#2351;&#2380;&#2327;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Cyclic or closed chain compounds</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2325;&#2381;&#2352;&#2368;&#2351; &#2351;&#2366; &#2348;&#2306;&#2342; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2351;&#2380;&#2327;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Open chain compounds</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2369;&#2354;&#2368; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2351;&#2380;&#2327;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Cyclic or closed chain or ring compounds</b> contain carbon atoms joined in the form of a ring. </p><p>Acyclic and open chain compounds have straight or branched chains. </p><p>Aliphatic compounds include both acyclic and alicyclic compounds.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Hybridisation State of Carbon with the Shape of the Molecule: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column A(Hybridisation State of Carbon)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column B(Shape of the Molecule)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.sp<sup>3</sup></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.Linear</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.sp<sup>2</sup></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.Tetrahedral</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.sp</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.Trigonal planar</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2325;&#2368; &#2361;&#2366;&#2311;&#2348;&#2381;&#2352;&#2367;&#2337;&#2366;&#2311;&#2332;&#2375;&#2358;&#2344; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2379; &#2309;&#2339;&#2369; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A(&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2325;&#2368; &#2361;&#2366;&#2311;&#2348;&#2381;&#2352;&#2367;&#2337;&#2366;&#2311;&#2332;&#2375;&#2358;&#2344; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B(&#2309;&#2339;&#2369; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.sp<sup>3</sup></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.&#2352;&#2376;&#2326;&#2367;&#2325;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.sp<sup>2</sup></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.&#2335;&#2375;&#2335;&#2381;&#2352;&#2366;&#2361;&#2375;&#2337;&#2381;&#2352;&#2354;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.sp</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.&#2340;&#2381;&#2352;&#2367;&#2325;&#2379;&#2339;&#2368;&#2351; &#2360;&#2350;&#2340;&#2354;&#2368;&#2351;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i &rarr; a, ii &rarr; b, iii &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; b, iii &rarr; c</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; c, iii &rarr; a</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; c, iii &rarr; a</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; a, iii &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; a, iii &rarr; b</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; a, iii &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; a, iii &rarr; c</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>sp&ge; hybridisation</b>: Forms 4 sigma bonds, resulting in a <b>tetrahedral geometry</b> (e.g., CH&#8324;).</p><p>&#183; <b>sp&#178; hybridisation</b>: Forms 3 sigma bonds and 1 pi bond, resulting in a <b>trigonal planar geometry</b> (e.g., C&#8322;H&#8324;).</p><p>&#183; <b>sp hybridisation</b>: Forms 2 sigma bonds and 2 pi bonds, resulting in a <b>linear geometry</b> (e.g., C&#8322;H&#8322;).</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an example of a heterocyclic compound? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2361;&#2375;&#2335;&#2381;&#2352;&#2379;&#2360;&#2366;&#2311;&#2325;&#2381;&#2354;&#2367;&#2325; &#2351;&#2380;&#2327;&#2367;&#2325; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cyclohexane</span><span class=\"hqt\" style=\"display:none\">cyclohexane</span>",
      "<span class=\"eqt\">Benzene</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2306;&#2332;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Tetrahydrofuran</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2335;&#2381;&#2352;&#2366;&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2347;&#2381;&#2351;&#2370;&#2352;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Naphthalene</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2347;&#2364;&#2341;&#2354;&#2368;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Tetrahydrofuran</b> is an example of a heterocyclic compound because it contains an atom other than carbon (oxygen) within the ring. </p><p>Cyclohexane is a homocyclic alicyclic compound, benzene and naphthalene are benzenoid aromatic compounds.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>A series of organic compounds with the same functional group, where successive members differ by a  - CH2 unit, is called a: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2361;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2350;&#2370;&#2361; &#2357;&#2366;&#2354;&#2375; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2351;&#2380;&#2327;&#2367;&#2325;&#2379;&#2306; &#2325;&#2368; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366;, &#2332;&#2361;&#2366;&#2306; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2360;&#2342;&#2360;&#2381;&#2351; - CH2 &#2311;&#2325;&#2366;&#2312; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2313;&#2360;&#2375; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Functional group</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2350;&#2370;&#2361;</span>",
      "<span class=\"eqt\">Homologous series</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2332;&#2366;&#2340;&#2368;&#2351; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Isomers</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2311;&#2360;&#2379;&#2350;&#2352;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Polymers</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2377;&#2354;&#2367;&#2350;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A <b>homologous series</b> is a family of organic compounds that:</p><p>&#183; Have the <b>same functional group</b>.</p><p>&#183; Show a <b>gradual change in physical properties</b>.</p><p>&#183; Differ by a <b> - CH&#8322; (methylene) unit</b> between successive members.</p><p>&#183; Exhibit <b>similar chemical properties</b>.</p><p><b>Why not the other options?</b></p><p>&#183; <b>Functional group</b>: Refers to a specific group of atoms (like  - OH,  - COOH) that determines reactivity, not the series itself.</p><p>&#183; <b>Isomers</b>: Compounds with the same molecular formula but different structures.</p><p>&#183; <b>Polymers</b>: Large molecules formed by repeating monomer units (not necessarily differing by  - CH&#8322;).</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The IUPAC name for CH3 - CH(CH3) - CH2 - CH3 is: </p></span><span class=\"hqt\" style=\"display:none\"><p>CH3 - CH(CH3) - CH2 - CH3 &#2325;&#2366; IUPAC &#2344;&#2366;&#2350; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">2-Methylbutane</span><span class=\"hqt\" style=\"display:none\">2-&#2350;&#2367;&#2341;&#2366;&#2311;&#2354;&#2348;&#2381;&#2351;&#2370;&#2335;&#2375;&#2344;</span>",
      "<span class=\"eqt\">Isopentane</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2311;&#2360;&#2379;&#2346;&#2375;&#2344;&#2335;&#2375;&#2344;</span>",
      "<span class=\"eqt\">3-Methylbutane</span><span class=\"hqt\" style=\"display:none\">3-&#2350;&#2367;&#2341;&#2366;&#2311;&#2354;&#2348;&#2381;&#2351;&#2370;&#2335;&#2375;&#2344;</span>",
      "<span class=\"eqt\">sec-Pentane</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2325;-&#2346;&#2375;&#2306;&#2335;&#2375;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The longest carbon chain has four carbons (butane), and there is a methyl group at the 2nd position. Hence, the IUPAC name is <b>2-Methylbutane</b>. </p><p>Isopentane is a common name for this compound.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>In the IUPAC nomenclature of branched alkanes, the longest carbon chain is selected as the parent chain, and numbering is done such that the branched carbon atoms get the: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2366;&#2326;&#2367;&#2340; &#2319;&#2354;&#2381;&#2325;&#2375;&#2344;&#2379;&#2306; &#2325;&#2375; IUPAC &#2344;&#2366;&#2350;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306;, &#2360;&#2348;&#2360;&#2375; &#2354;&#2306;&#2348;&#2368; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2379; &#2350;&#2370;&#2354; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2369;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2325;&#2352;&#2339; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2358;&#2366;&#2326;&#2367;&#2340; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Highest possible numbers</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330;&#2340;&#2350; &#2360;&#2306;&#2349;&#2357; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Lowest possible numbers</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2360;&#2306;&#2349;&#2357; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Numbers in alphabetical order of substituents</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2379;&#2306; &#2325;&#2375; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305;</span>",
      "<span class=\"eqt\">Any arbitrary set of numbers</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2325;&#2379;&#2312; &#2349;&#2368; &#2350;&#2344;&#2350;&#2366;&#2344;&#2366; &#2360;&#2350;&#2370;&#2361;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In <b>IUPAC nomenclature for branched alkanes</b>, the key rules are:</p><p>&#183; <b>Longest carbon chain</b> is selected as the parent chain.</p><p>&#183; <b>Numbering is done</b> to give the <b>lowest possible locants (numbers)</b> to the substituents (branches).</p><p>o If two substituents are at equal distances from either end, the numbering is chosen such that the <b>next substituent gets the lower number</b>.</p><p>o If identical substituents are present, <b>alphabetical order</b> determines priority (but numbering is still based on the lowest numbers).</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>The order of decreasing priority for some functional groups in IUPAC nomenclature is: </p></span><span class=\"hqt\" style=\"display:none\"><p>IUPAC &#2344;&#2366;&#2350;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2328;&#2335;&#2340;&#2368; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366; &#2325;&#2366; &#2325;&#2381;&#2352;&#2350; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">- OH &gt; &gt;C=O &gt;  - COOH</span><span class=\"hqt\" style=\"display:none\">- OH &gt; &gt;C=O &gt; - COOH</span>",
      "<span class=\"eqt\">- COOH &gt; &gt;C=O &gt;  - OH</span><span class=\"hqt\" style=\"display:none\">- COOH &gt; &gt;C=O &gt; - OH</span>",
      "<span class=\"eqt\">&gt;C=O &gt;  - COOH &gt;  - OH</span><span class=\"hqt\" style=\"display:none\">&gt;C=O &gt; - COOH &gt; - OH</span>",
      "<span class=\"eqt\">- OH &gt;  - COOH &gt; &gt;C=O</span><span class=\"hqt\" style=\"display:none\">- OH &gt; - COOH &gt; &gt;C=O</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to the order of preference, the priority decreases in the order: <b> - COOH &gt; &gt;C=O &gt;  - OH</b> (carboxylic acid &gt; ketone &gt; alcohol).</p><p>In <b>IUPAC nomenclature</b>, functional groups are assigned <b>priority</b> based on their <b>seniority</b> for determining the <b>parent chain</b> and <b>suffix</b> in naming. The correct decreasing order of priority for the given groups is:</p><p>i. <b> - COOH (Carboxylic acid)</b> &rarr; <b>Highest priority</b> (suffix: <i>-oic acid</i>)</p><p>ii. <b>&gt;C=O (Ketone or Aldehyde)</b> &rarr; <b>Next priority</b> (suffix: <i>-one</i> or <i>-al</i>)</p><p>iii. <b> - OH (Alcohol)</b> &rarr; <b>Lower priority</b> (suffix: <i>-ol</i>)</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Compounds having the same molecular formula but different connectivity of atoms are called: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2320;&#2360;&#2375; &#2351;&#2380;&#2327;&#2367;&#2325; &#2332;&#2367;&#2344;&#2325;&#2366; &#2309;&#2339;&#2369;&#2360;&#2370;&#2340;&#2381;&#2352; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379; &#2354;&#2375;&#2325;&#2367;&#2344; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2325;&#2340;&#2366; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2379;, &#2325;&#2361;&#2354;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;: </p></span>",
    "options": [
      "<span class=\"eqt\">Stereoisomers</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2368;&#2352;&#2367;&#2351;&#2379;&#2310;&#2311;&#2360;&#2379;&#2350;&#2352;</span>",
      "<span class=\"eqt\">Conformers</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2352;&#2370;&#2346;&#2325;</span>",
      "<span class=\"eqt\">Structural isomers</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2352;&#2330;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2310;&#2311;&#2360;&#2379;&#2350;&#2352;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Enantiomers</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2306;&#2335;&#2368;&#2323;&#2350;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Structural isomers</b> (also called <b>constitutional isomers</b>) have the <b>same molecular formula</b> but differ in the <b>connectivity of atoms</b>  -  meaning the atoms are bonded in different orders or patterns.</p><p><b>Further information:</b></p><p>&#183; <b>Stereoisomers</b>: Same connectivity, but different spatial arrangement of atoms.</p><p>&#183; <b>Conformers</b>: Same molecule shown in different rotational forms around single bonds.</p><p>&#183; <b>Enantiomers</b>: A type of stereoisomer  -  non-superimposable mirror images.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) correctly describe(s) aspects of organic reaction mechanisms?</p><p>I. Heterolytic cleavage of a covalent bond results in the formation of free radicals. </p><p>II. A nucleophile is a reagent that brings an electron pair to the reactive site and attacks an electrophilic center. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2375; &#2346;&#2361;&#2354;&#2369;&#2323;&#2306; &#2325;&#2366; &#2360;&#2361;&#2368; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p><p>I. &#2360;&#2361;&#2360;&#2306;&#2351;&#2379;&#2332;&#2325; &#2348;&#2306;&#2343;&#2344; &#2325;&#2375; &#2357;&#2367;&#2359;&#2350; &#2309;&#2346;&#2328;&#2335;&#2344;&#2368; &#2357;&#2367;&#2326;&#2306;&#2337;&#2344; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2350;&#2369;&#2325;&#2381;&#2340; &#2350;&#2370;&#2354;&#2325;&#2379;&#2306; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2344;&#2381;&#2351;&#2370;&#2325;&#2381;&#2354;&#2367;&#2351;&#2379;&#2347;&#2366;&#2311;&#2354; &#2319;&#2325; &#2309;&#2349;&#2367;&#2325;&#2352;&#2381;&#2350;&#2325; &#2361;&#2376; &#2332;&#2379; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2358;&#2368;&#2354; &#2360;&#2366;&#2311;&#2335; &#2346;&#2352; &#2354;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2347;&#2367;&#2354;&#2367;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2352; &#2361;&#2350;&#2354;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Both are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2364;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement II is correct; a nucleophile is electron-rich and seeks a nucleus (positive charge), donating an electron pair to an electrophilic center. </p><p>Statement I is incorrect; <b>heterolytic cleavage</b> results in the formation of ions (carbocations or carbanions), while <b>homolytic cleavage</b> produces free radicals. </p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>The permanent polarisation of a &#963;-bond caused by the polarisation of an adjacent &#963;-bond is known as: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2360;&#2344;&#2381;&#2344; &#963;-&#2348;&#2306;&#2343; &#2325;&#2375; &#2343;&#2381;&#2352;&#2369;&#2357;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#963;-&#2348;&#2306;&#2343; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2343;&#2381;&#2352;&#2369;&#2357;&#2368;&#2325;&#2352;&#2339; &#2311;&#2360; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Resonance effect</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2344;&#2366;&#2342; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Inductive effect</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2375;&#2352;&#2339;&#2367;&#2325; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Electromeric effect</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2350;&#2375;&#2352;&#2367;&#2325; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Hyperconjugation</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2346;&#2352;&#2325;&#2379;&#2344;&#2381;&#2332;&#2369;&#2327;&#2375;&#2358;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The <b>inductive effect</b> refers to the <b>permanent polarization</b> of a &#963;-bond due to the <b>electronegativity difference</b> between atoms.</p><p>&#183; It occurs <b>along a chain of atoms</b> in a molecule, where polarization in one &#963;-bond affects adjacent &#963;-bonds, leading to a <b>shift in electron density</b> through the chain.</p><p>&#183; This is a <b>permanent effect</b>, not dependent on the presence of a reagent.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following techniques is commonly used for the purification of solid organic compounds based on the difference in their solubilities in a suitable solvent? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2340;&#2325;&#2344;&#2368;&#2325; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2357;&#2367;&#2354;&#2366;&#2351;&#2325; &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2368; &#2328;&#2369;&#2354;&#2344;&#2358;&#2368;&#2354;&#2340;&#2366; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2336;&#2379;&#2360; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2351;&#2380;&#2327;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2358;&#2369;&#2342;&#2381;&#2343;&#2367;&#2325;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Distillation</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2360;&#2357;&#2344;</span>",
      "<span class=\"eqt\">Sublimation</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2368; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Crystallisation</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2367;&#2360;&#2381;&#2335;&#2354;&#2368;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Chromatography</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2379;&#2350;&#2376;&#2335;&#2379;&#2327;&#2381;&#2352;&#2366;&#2347;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Crystallisation</b> is a purification technique commonly used for <b>solid organic compounds</b>.</p><p>It works based on the <b>difference in solubilities</b> of the compound and its impurities in a suitable <b>solvent</b>:</p><p>&#183; The impure compound is dissolved in a hot solvent.</p><p>&#183; Upon cooling, the pure compound crystallizes out, leaving impurities in the solution.</p><p>Further information:</p><p>&#183; <b>Distillation</b>: Used for <b>liquids</b>, based on <b>boiling points</b>.</p><p>&#183; <b>Sublimation</b>: Used for solids that <b>sublime</b> (go directly from solid to gas).</p><p>&#183; <b>Chromatography</b>: Used for separating components of a mixture, often in <b>small-scale analysis</b>.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>In Lassaigne's test, the presence of nitrogen in an organic compound is confirmed by the formation of Prussian blue colour due to the formation of: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2366;&#2360;&#2375;&#2344; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2351;&#2380;&#2327;&#2367;&#2325; &#2350;&#2375;&#2306; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2368; &#2346;&#2369;&#2359;&#2381;&#2335;&#2367; &#2346;&#2381;&#2352;&#2358;&#2367;&#2351;&#2366;&#2312; &#2344;&#2368;&#2354;&#2375; &#2352;&#2306;&#2327; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2360;&#2375; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2375; &#2348;&#2344;&#2344;&#2375; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Sodium cyanide (NaCN)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2360;&#2366;&#2311;&#2344;&#2366;&#2311;&#2337; (NaCN)</span>",
      "<span class=\"eqt\">Sodium hexacyanidoferrate(II) (Na&#8324;[Fe(CN)&#8326;])</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2361;&#2375;&#2325;&#2381;&#2360;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2337;&#2379;&#2347;&#2375;&#2352;&#2375;&#2335;(II) (Na&#8324;[Fe(CN)&#8326;])</span>",
      "<span class=\"eqt\">Iron(III) hexacyanidoferrate(II) &rarr; Fe&#8324;[Fe(CN)&#8326;]&#8323;</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2352;&#2344;(III) &#2361;&#2375;&#2325;&#2381;&#2360;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2337;&#2379;&#2347;&#2375;&#2352;&#2375;&#2335;(II) &rarr; Fe&#8324;[Fe(CN)&#8326;]&#8323;</span>",
      "<span class=\"eqt\">Ammonium cyanide (NH<sub>4</sub>CN)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2379;&#2344;&#2367;&#2351;&#2350; &#2360;&#2366;&#2311;&#2344;&#2366;&#2311;&#2337; (NH4CN)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In <b>Lassaigne's test</b> for <b>nitrogen</b>, the organic compound is fused with sodium to form <b>sodium cyanide (NaCN)</b>. The extract (called Lassaigne's extract) is then treated with <b>ferrous sulfate (FeSO&#8324;)</b> and then acidified. If nitrogen is present:</p><p>&#183; NaCN reacts with Fe&#178;&#8314; to form <b>sodium hexacyanidoferrate(II)</b> (Na&#8324;[Fe(CN)&#8326;]).</p><p>&#183; Upon oxidation and reaction with Fe&ge;&#8314; (from FeCl&#8323; or air), <b>Prussian blue</b> is formed, which is:</p><p><b>Iron(III) hexacyanidoferrate(II) </b><b>&rarr;</b><b> Fe</b><b>&#8324;</b><b>[Fe(CN)</b><b>&#8326;</b><b>]</b><b>&#8323;</b></p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>The separation technique based on continuous differential partitioning of components of a mixture between stationary and mobile phases is called: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2367;&#2352; &#2324;&#2352; &#2327;&#2340;&#2367;&#2358;&#2368;&#2354; &#2330;&#2352;&#2339;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2375; &#2328;&#2335;&#2325;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2352;&#2306;&#2340;&#2352; &#2357;&#2367;&#2349;&#2375;&#2342;&#2325; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2346;&#2371;&#2341;&#2325;&#2381;&#2325;&#2352;&#2339; &#2340;&#2325;&#2344;&#2368;&#2325; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Adsorption chromatography</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2358;&#2379;&#2359;&#2339; &#2325;&#2381;&#2352;&#2379;&#2350;&#2376;&#2335;&#2379;&#2327;&#2381;&#2352;&#2366;&#2347;&#2368;</span>",
      "<span class=\"eqt\">Partition chromatography</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2325;&#2381;&#2352;&#2379;&#2350;&#2376;&#2335;&#2379;&#2327;&#2381;&#2352;&#2366;&#2347;&#2368;</span>",
      "<span class=\"eqt\">Column chromatography</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2340;&#2306;&#2349; &#2325;&#2381;&#2352;&#2379;&#2350;&#2376;&#2335;&#2379;&#2327;&#2381;&#2352;&#2366;&#2347;&#2368;</span>",
      "<span class=\"eqt\">Thin layer chromatography</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2354;&#2368; &#2346;&#2352;&#2340; &#2325;&#2381;&#2352;&#2379;&#2350;&#2376;&#2335;&#2379;&#2327;&#2381;&#2352;&#2366;&#2347;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Partition chromatography</b> is based on the continuous differential partitioning of components of a mixture between stationary and mobile phases. </p><p>Paper chromatography is an example. </p><p>Adsorption chromatography is based on differential adsorption.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Functional Group with its Suffix:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Carboxylic acid</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.-oic acid</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.Aldehyde</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.-one</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.Ketone</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.-al</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.Esters</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.-oate</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2350;&#2370;&#2361; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2351; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2325;&#2381;&#2360;&#2367;&#2354;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.-&#2323;&#2311;&#2325; &#2319;&#2360;&#2367;&#2337;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.&#2319;&#2354;&#2381;&#2337;&#2367;&#2361;&#2366;&#2311;&#2337;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b.-one</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.&#2325;&#2368;&#2335;&#2379;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c.-al</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.&#2319;&#2360;&#2381;&#2335;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.-&#2323;&#2319;&#2335;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i &rarr; a, ii &rarr; c, iii &rarr; b, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; c, iii &rarr; b, iv &rarr; d</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; a, iii &rarr; d, iv &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; a, iii &rarr; d, iv &rarr; b</span>",
      "<span class=\"eqt\">i &rarr; d, ii &rarr; b, iii &rarr; a, iv &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; d, ii &rarr; b, iii &rarr; a, iv &rarr; c</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; d, iii &rarr; c, iv &rarr; a</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; d, iii &rarr; c, iv &rarr; a</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Carboxylic acids</b> (-COOH) use the suffix <b>-oic acid</b> (e.g., ethanoic acid)</p><p>&#183; <b>Aldehydes</b> (-CHO) use the suffix <b>-al</b> (e.g., ethanal)</p><p>&#183; <b>Ketones</b> (&gt;C=O) use the suffix <b>-one</b> (e.g., propanone)</p><p>&#183; <b>Esters</b> (-COOR) use the suffix <b>-oate</b> (e.g., methyl ethanoate)</p><p><b>Key Points:</b></p><p>&#183; This follows standard IUPAC nomenclature rules</p><p>&#183; The suffix always indicates the highest priority functional group in the molecule</p><p>&#183; When multiple functional groups are present, the highest priority one determines the suffix while others become prefixes</p><p><img width=533 height=751 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27631/image001.png\"></p>",
    "question_index": 18
  },
