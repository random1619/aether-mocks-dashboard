<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>

                <!-- Controls -->

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is correct regarding the procedure for altering the boundaries of states under Article 3 of the Indian Constitution? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 3 &#2325;&#2375; &#2340;&#2361;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2368;&#2350;&#2366;&#2323;&#2306; &#2325;&#2379; &#2348;&#2342;&#2354;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The consent of the state whose boundary is being altered is mandatory.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2360;&#2368;&#2350;&#2366; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2352;&#2361;&#2366; &#2361;&#2376; &#2313;&#2360;&#2325;&#2368; &#2360;&#2361;&#2350;&#2340;&#2367; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The President must refer the proposal to the concerned state's legislature for their opinion.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2325;&#2379; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354; &#2325;&#2375; &#2346;&#2366;&#2360; &#2313;&#2344;&#2325;&#2368; &#2352;&#2366;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2349;&#2375;&#2332;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The Parliament can directly pass a law to alter state boundaries without consulting the state.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2375; &#2346;&#2352;&#2366;&#2350;&#2352;&#2381;&#2358; &#2325;&#2367;&#2319; &#2348;&#2367;&#2344;&#2366; &#2360;&#2368;&#2343;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2360;&#2368;&#2350;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2366;&#2344;&#2370;&#2344; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A Constitutional Amendment is required for altering state boundaries.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2360;&#2368;&#2350;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Article 3 empowers Parliament to alter the boundaries of a state; however, the President must refer the bill to the legislature of the concerned state for their opinion, though the opinion is not binding. </b></p><p><b>Further Insight:</b></p><p>&bull; <b>Part 1: The Union and Its Territory</b></p><p>&bull; <b>Article 1</b>: Name and territory of the Union.</p><p>&bull; <b>Article 2</b>: Admission and establishment of new states.</p><p>&bull; <b>Article 3</b>: Formation of new states, alteration of areas, boundaries, or names of existing states.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following powers is conferred on Parliament by Article 11 of the Indian Constitution? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 11 &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2306;&#2360;&#2342; &#2325;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2366;&#2305; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Granting citizenship to any foreign national.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2325;&#2379; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Revoking citizenship of a person.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2368; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2340;&#2366; &#2352;&#2342;&#2381;&#2342; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Defining the procedure for acquiring and terminating citizenship.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Regulating citizenship laws only for natural-born citizens.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2340;&#2366; &#2325;&#2366;&#2344;&#2370;&#2344;&#2379;&#2306; &#2325;&#2379; &#2325;&#2375;&#2357;&#2354; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2332;&#2344;&#2381;&#2350;&#2375; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Article 11 empowers Parliament to regulate all matters relating to citizenship, including acquisition and termination.</b> </p><p><b>Further Insight:</b></p><p>&bull; <b>Part 2: Citizenship (Articles 5 - 11)</b></p><p>&bull; <b>Article 5</b>: Citizenship at the commencement of the Constitution.</p><p>&bull; <b>Article 6</b>: Rights of citizenship for persons migrating to India from Pakistan.</p><p>&bull; <b>Article 10</b>: Continuance of the rights of citizenship.</p><p>&bull; <b>Article 11</b>: Parliament's authority to regulate citizenship rights by law.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Under Article 15 of the Constitution, which of the following discriminations is <b>not</b> explicitly prohibited? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 15 &#2325;&#2375; &#2340;&#2361;&#2340; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2375;&#2342;&#2349;&#2366;&#2357; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2306;&#2343;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Discrimination on the basis of religion.</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2352;&#2381;&#2350; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2349;&#2375;&#2342;&#2349;&#2366;&#2357;&#2404;</span>",
      "<span class=\"eqt\">Discrimination on the basis of caste.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2340;&#2367; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2349;&#2375;&#2342;&#2349;&#2366;&#2357;&#2404;</span>",
      "<span class=\"eqt\">Discrimination on the basis of place of birth.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2381;&#2350; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2349;&#2375;&#2342;&#2349;&#2366;&#2357;&#2404;</span>",
      "<span class=\"eqt\">Discrimination on the basis of Physical ability.</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2352;&#2368;&#2352;&#2367;&#2325; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2349;&#2375;&#2342;&#2349;&#2366;&#2357;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; <b>Article 15 prohibits discrimination on grounds of religion, race, caste, sex, or place of birth, but it does not explicitly mention gender identity. </b></p><p><b>Further Insight:</b></p><p>&bull; <b>Right to Equality (Articles 14 - 18)</b></p><p>&bull; <b>Article 14: Equality before the law.</b></p><p>&bull; <b>Article 15: Prohibition of discrimination based on religion, race, caste, sex, or place of birth.</b></p><p>&bull; <b>Article 16: Equality of opportunity in public employment.</b></p><p>&bull; <b>Article 17: Abolition of untouchability.</b></p><p>&bull; <b>Article 18: Abolition of titles.</b></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not a right under Article 19? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 19 &#2325;&#2375; &#2340;&#2361;&#2340; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Freedom of speech and expression.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2325;&#2381; &#2319;&#2357;&#2306; &#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2368; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Right to form associations or unions.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2328; &#2351;&#2366; &#2351;&#2370;&#2344;&#2367;&#2351;&#2344; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2404;</span>",
      "<span class=\"eqt\">Right to move freely throughout the territory of India.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351;&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2340;&#2344;&#2381;&#2340;&#2381;&#2352;&#2340;&#2366;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2328;&#2370;&#2350;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2404;</span>",
      "<span class=\"eqt\">Right to own property.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2366; &#2360;&#2381;&#2357;&#2366;&#2350;&#2367;&#2340;&#2381;&#2357; &#2352;&#2326;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;.</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>The right to own a property is not a right under Article 19, it was omitted after 44th Constitutional amendment 1978. </b></p><p><b>Further Insight:</b></p><p>&bull; <b>Right to Freedom (Articles 19 - 22)</b></p><p>&bull; <b>Article 19: Guarantees six fundamental freedoms to Indian citizens:</b></p><p>&#9675; <b>(a) Freedom of speech and expression.</b></p><p>&#9675; <b>(b) Freedom to assemble peacefully without arms.</b></p><p>&#9675; <b>(c) Freedom to form associations or unions.</b></p><p>&#9675; <b>(d) Freedom to move freely across India.</b></p><p>&#9675; <b>(e) Freedom to reside and settle anywhere in India.</b></p><p>&#9675; <b>(g) Freedom to practice any profession, or carry on any occupation, trade, or business.</b></p><p>&bull; <b>Article 20: Protection in respect of conviction for offenses.</b></p><p>&bull; <b>Article 21: Protection of life and personal liberty.</b></p><p>&bull; <b>Article 22: Protection against arbitrary arrest and detention</b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following forms of labor does <b>not</b> fall under the prohibition outlined in Article 23? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2358;&#2381;&#2352;&#2350; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 23 &#2350;&#2375;&#2306; &#2313;&#2354;&#2381;&#2354;&#2367;&#2326;&#2367;&#2340; &#2344;&#2367;&#2359;&#2375;&#2343; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2344;&#2361;&#2368;&#2306; &#2310;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Begar</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2327;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Human trafficking.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2344;&#2357; &#2340;&#2360;&#2381;&#2325;&#2352;&#2368;.</span>",
      "<span class=\"eqt\">Forced labor</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2343;&#2369;&#2310; &#2350;&#2332;&#2364;&#2342;&#2370;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Compulsory military service</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2360;&#2376;&#2344;&#2381;&#2351; &#2360;&#2375;&#2357;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; <b>Article 23 prohibits forced labor, begar, and human trafficking, but compulsory military service imposed by the state is an exception</b>. </p><p><b>Further Insight:</b></p><p>&bull; <b>Right Against Exploitation (Articles 23 - 24)</b></p><p>&bull; <b>Article 23</b>: Prohibition of traffic in human beings and forced labor.</p><p>&bull; <b>Article 24</b>: Prohibition of child labor (children under 14 years) in factories and hazardous work.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following provisions is allowed by Article 27? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 27 &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2344;&#2369;&#2350;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Freedom as to payment of taxes for promotion of any particular religion</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359; &#2343;&#2352;&#2381;&#2350; &#2325;&#2375; &#2346;&#2381;&#2352;&#2330;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2352;&#2379;&#2306; &#2325;&#2375; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Freedom to manage religious affairs.</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Freedom of conscience and free profession, practice and propagation of religion</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2307;&#2325;&#2352;&#2339; &#2325;&#2368; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2324;&#2352; &#2343;&#2352;&#2381;&#2350; &#2325;&#2368; &#2309;&#2348;&#2366;&#2343; &#2352;&#2370;&#2346; &#2360;&#2375; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366;, &#2310;&#2330;&#2352;&#2339; &#2324;&#2352; &#2346;&#2381;&#2352;&#2330;&#2366;&#2352;-&#2346;&#2381;&#2352;&#2360;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Freedom as to attendance at religious instruction or religious worship in certain educational institutions.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2331; &#2358;&#2376;&#2325;&#2381;&#2359;&#2367;&#2325; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2351;&#2366; &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2346;&#2370;&#2332;&#2366; &#2350;&#2375;&#2306; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Article 27 prohibits the state from imposing taxes for the promotion or maintenance of any religion.</b> </p><p><b>Further Insight:</b></p><p>&bull; <b>Right to Freedom of Religion (Articles 25 - 28)</b></p><p>&bull; <b>Article 25</b>: Freedom of conscience and free profession, practice, and propagation of religion.</p><p>&bull; <b>Article 26</b>: Freedom to manage religious affairs.</p><p>&bull; <b>Article 27</b>: Freedom from paying taxes for promotion of any religion.</p><p>&bull; <b>Article 28</b>: Freedom from attending religious instruction in educational institutions wholly funded by the state.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following writs under Article 32 can be issued to prevent a person from being detained unlawfully? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32 &#2325;&#2375; &#2340;&#2361;&#2340; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2352;&#2367;&#2335; &#2325;&#2367;&#2360;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2327;&#2376;&#2352;&#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2361;&#2367;&#2352;&#2366;&#2360;&#2340; &#2350;&#2375;&#2306; &#2354;&#2375;&#2344;&#2375; &#2360;&#2375; &#2352;&#2379;&#2325;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2352;&#2368; &#2325;&#2368; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Certiorari.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2350;&#2366;&#2339; &#2346;&#2340;&#2381;&#2352;.</span>",
      "<span class=\"eqt\">Prohibition.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2375;&#2343;.</span>",
      "<span class=\"eqt\">Habeas Corpus.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2342;&#2368; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359;&#2368;&#2325;&#2352;&#2339;.</span>",
      "<span class=\"eqt\">Mandamus.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2342;&#2375;&#2358;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>The writ of Habeas Corpus is specifically issued to release a person from unlawful detention. </b></p><p><b> Further Insight:</b></p><p>&bull; <b>Article 32</b> of the Indian Constitution guarantees the <b>Right to Constitutional Remedies</b>, allowing citizens to move the Supreme Court directly for enforcement of their fundamental rights. It is considered the <b>\"heart and soul\" of the Constitution</b> by Dr. B.R. Ambedkar.</p><p>&bull; There are five types of writs:</p><p>&#9675; <b>Habeas Corpus</b>: \"Produce the body.\" It protects against unlawful detention.</p><p>&#9675; <b>Mandamus</b>: \"We command.\" Directs public officials to perform their duties.</p><p>&#9675; <b>Prohibition</b>: Stops lower courts or tribunals from exceeding their jurisdiction.</p><p>&#9675; <b>Certiorari</b>: Transfers a case from a lower court to a higher court or quashes an illegal order.</p><p>&#9675; <b>Quo Warranto</b>: Challenges the legality of a person holding a public office.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which principle is the state supposed to promote under Article 43A of the Indian Constitution? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 43A &#2325;&#2375; &#2340;&#2361;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2379; &#2325;&#2367;&#2360; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">Right to strike.</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2337;&#2364;&#2340;&#2366;&#2354; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;.</span>",
      "<span class=\"eqt\">Workers' participation in management.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2350;&#2375;&#2306; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;&#2379;&#2306; &#2325;&#2368; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Equal pay for equal work.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2366;&#2344; &#2357;&#2375;&#2340;&#2344;&#2404;</span>",
      "<span class=\"eqt\">Reservation of jobs for backward classes.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2331;&#2337;&#2364;&#2375; &#2357;&#2352;&#2381;&#2327;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2380;&#2325;&#2352;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2310;&#2352;&#2325;&#2381;&#2359;&#2339;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Article 43A directs the state to promote workers' participation in the management of industries. </b></p><p><b>Further Insight:</b></p><p>&bull; .<b>Part 4: Directive Principles of State Policy (Articles 36 - 51)</b></p><p>&bull; <b>Article 36</b>: Definition of the Directive Principles.</p><p>&bull; <b>Article 37</b>: Application of the Directive Principles.</p><p>&bull; <b>Article 39A</b>: Equal justice and free legal aid.</p><p>&bull; <b>Article 40</b>: Organization of village panchayats.</p><p>&bull; <b>Article 41</b>: Right to work, education, and public assistance.</p><p>&bull; <b>Article 43</b>: Living wages, etc., for workers.</p><p>&bull; <b>Article 43A</b>: Participation of workers in the management of industries.</p><p>&bull; <b>Article 44</b>: Uniform Civil Code (currently applicable in Goa).</p><p>&bull; <b>Article 45</b>: Provision for free and compulsory education for children.</p><p>&bull; <b>Article 46</b>: Promotion of educational and economic interests of SCs, STs, and OBCs.</p><p>&bull; <b>Article 47</b>: Duty of the state to raise nutrition levels and improve public health.</p><p>&bull; <b>Article 48</b>: Organization of agriculture and animal husbandry.</p><p>&bull; <b>Article 49</b>: Protection of monuments and places of national importance.</p><p>&bull; <b>Article 50</b>: Separation of the judiciary from the executive.</p><p>&bull; <b>Article 51</b>: Promotion of international peace and security.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>What is the primary aim of Article 50 in ensuring the separation of the judiciary from the executive? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2381;&#2351;&#2366;&#2351;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2325;&#2379; &#2325;&#2366;&#2352;&#2381;&#2351;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2360;&#2375; &#2346;&#2371;&#2341;&#2325; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 50 &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To protect judicial independence.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2325;&#2368; &#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To allow executive interference in judicial proceedings.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2325;&#2379; &#2361;&#2360;&#2381;&#2340;&#2325;&#2381;&#2359;&#2375;&#2346; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To merge the functions of the judiciary and executive in certain cases.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2331; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2366;&#2351;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2325;&#2366; &#2357;&#2367;&#2354;&#2351; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To allow the legislature to control judicial appointments.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2343;&#2366;&#2351;&#2367;&#2325;&#2366; &#2325;&#2379; &#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2352;&#2326;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>The purpose of Article 50 is to protect the independence of the judiciary from the executive by separation of powers between the executive and Judiciary.</b></p><p><b>Further Insight:</b></p><p>.<b>Part 4: Directive Principles of State Policy (Articles 36 - 51)</b></p><p>&bull; <b>Article 36</b>: Definition of the Directive Principles.</p><p>&bull; <b>Article 37</b>: Application of the Directive Principles.</p><p>&bull; <b>Article 39A</b>: Equal justice and free legal aid.</p><p>&bull; <b>Article 40</b>: Organization of village panchayats.</p><p>&bull; <b>Article 41</b>: Right to work, education, and public assistance.</p><p>&bull; <b>Article 43</b>: Living wages, etc., for workers.</p><p>&bull; <b>Article 43A</b>: Participation of workers in the management of industries.</p><p>&bull; <b>Article 44</b>: Uniform Civil Code (currently applicable in Goa).</p><p>&bull; <b>Article 45</b>: Provision for free and compulsory education for children.</p><p>&bull; <b>Article 46</b>: Promotion of educational and economic interests of SCs, STs, and OBCs.</p><p>&bull; <b>Article 47</b>: Duty of the state to raise nutrition levels and improve public health.</p><p>&bull; <b>Article 48</b>: Organization of agriculture and animal husbandry.</p><p>&bull; <b>Article 49</b>: Protection of monuments and places of national importance.</p><p>&bull; <b>Article 50</b>: Separation of the judiciary from the executive.</p><p>&bull; <b>Article 51</b>: Promotion of international peace and security.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is <b>not</b> one of the Fundamental Duties listed under Article 51A? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 51A &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2370;&#2330;&#2368;&#2348;&#2342;&#2381;&#2343; &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To safeguard public property.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To pay taxes honestly.</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2350;&#2366;&#2344;&#2342;&#2366;&#2352;&#2368; &#2360;&#2375; &#2325;&#2352;&#2379;&#2306; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To defend the country and render national service when called upon.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2375;&#2358; &#2325;&#2368; &#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366; &#2340;&#2341;&#2366; &#2310;&#2361;&#2381;&#2357;&#2366;&#2344; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2360;&#2375;&#2357;&#2366; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To strive towards excellence in all spheres of individual and collective activity.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2324;&#2352; &#2360;&#2366;&#2350;&#2370;&#2361;&#2367;&#2325; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367; &#2325;&#2375; &#2360;&#2349;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2325;&#2371;&#2359;&#2381;&#2335;&#2340;&#2366; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2325;&#2352;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Paying taxes is a legal obligation but not a Fundamental Duty under Article 51A. </b></p><p><b>Further Insight:</b></p><p>&bull; .<b>Fundamental Duties under Article 51A(Added by 44th Constitutional Amendment </b></p><p>Act 1976):</p><p>&bull; To abide by the Constitution and respect its ideals, the National Flag, and the National Anthem.</p><p>&bull; To cherish and follow the noble ideals that inspired India's freedom struggle.</p><p>&bull; To uphold and protect the sovereignty, unity, and integrity of India.</p><p>&bull; To defend the country and render national service when called upon.</p><p>&bull; To promote harmony and the spirit of common brotherhood among all Indians, transcending religious, linguistic, and regional differences.</p><p>&bull; To preserve the rich heritage of the country's composite culture.</p><p>&bull; To protect and improve the natural environment, including forests, lakes, rivers, and wildlife.</p><p>&bull; To develop scientific temper, humanism, and the spirit of inquiry and reform.</p><p>&bull; To safeguard public property and abjure violence.</p><p>&bull; To strive towards excellence in all spheres of individual and collective activity.</p><p>&bull; To provide opportunities for education to children between the ages of 6 and 14 (added by the 86th Amendment 2002).</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>According to Article 57, how many times can a person be re-elected as the President of India? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 57 &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2368; &#2348;&#2366;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2369;&#2344;&#2307; &#2330;&#2369;&#2344;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Once.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2348;&#2366;&#2352;&#2404;</span>",
      "<span class=\"eqt\">Twice.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2348;&#2366;&#2352;&#2404;</span>",
      "<span class=\"eqt\">Unlimited times.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2368;&#2350;&#2367;&#2340; &#2348;&#2366;&#2352;.</span>",
      "<span class=\"eqt\">Thrice.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344; &#2348;&#2366;&#2352;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Article 57 places no restriction on the number of terms a person can be re-elected as President.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>The President</b></p><p>&#9675; <b>Article 52  -  The President of India.</b></p><p>&#9675; <b>Article 53  -  Executive power of the Union is vested in the President.</b></p><p>&#9675; <b>Article 54  -  Election of the President.</b></p><p>&#9675; <b>Article 55  -  Manner of election of the President.</b></p><p>&#9675; <b>Article 56  -  Term of office of the President (5 years).</b></p><p>&#9675; <b>Article 57  -  Eligibility for re-election.</b></p><p>&#9675; <b>Article 58  -  Qualifications for election as President.</b></p><p>&#9675; <b>Article 59  -  Conditions of the President's office.</b></p><p>&#9675; <b>Article 60  -  Oath or affirmation by the President.</b></p><p>&#9675; <b>Article 61  -  Procedure for impeachment of the President.</b></p><p>&#9675; <b>Article 62  -  Time of holding an election to fill a vacancy in the office of President and the term of office of a person elected to fill a casual vacancy.</b></p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>What is the role of the Council of Ministers under Article 74? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 74 &#2325;&#2375; &#2340;&#2361;&#2340; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2368; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To assist the President in ceremonial functions.</span><span class=\"hqt\" style=\"display:none\">&#2324;&#2346;&#2330;&#2366;&#2352;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To aid and advise the President, whose decision is final to the President.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2319;&#2357;&#2306; &#2360;&#2354;&#2366;&#2361; &#2342;&#2375;&#2344;&#2366;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2306;&#2340;&#2367;&#2350; &#2361;&#2379;&#2327;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To aid and advise the President, whose advice is binding to the President.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2319;&#2357;&#2306; &#2360;&#2354;&#2366;&#2361; &#2342;&#2375;&#2344;&#2366;, &#2332;&#2367;&#2344;&#2325;&#2368; &#2360;&#2354;&#2366;&#2361; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2366;&#2343;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">To act independently without the President's consent.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; &#2360;&#2361;&#2350;&#2340;&#2367; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Under Article 74, the advice of the Council of Ministers is binding on the President. </b></p><p><b>Further Insight:</b></p><p>&bull; <b>Part 5: The Union</b></p><p>&bull; <b>Article 52</b>: The President of India.</p><p>&bull; <b>Article 53</b>: Executive powers of the Union.</p><p>&bull; <b>Article 54</b>: Election of the President.</p><p>&bull; <b>Article 61</b>: Procedure for impeachment of the President.</p><p>&bull; <b>Article 63</b>: The Vice-President of India.</p><p>&bull; <b>Article 66</b>: Election of the Vice-President.</p><p>&bull; <b>Article 72</b>: Pardoning powers of the President.</p><p>&bull; <b>Article 74</b>: Council of Ministers to aid and advise the President.</p><p>&bull; <b>Article 76</b>: Attorney-General of India.</p><p>&bull; <b>Article 79</b>: Constitution of Parliament.</p><p>&bull; <b>Article 80</b>: Composition of Rajya Sabha.</p><p>&bull; <b>Article 81</b>: Composition of Lok Sabha.</p><p>&bull; <b>Article 112</b>: Annual financial budget.</p><p>&bull; <b>Article 123</b>: Powers of the President to promulgate ordinances during Parliament recess.</p><p>&bull; <b>Article 124</b>: Establishment of the Supreme Court.</p><p>&bull; <b>Article 148</b>: Comptroller and Auditor General of India (CAG).</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Under which circumstances is a joint sitting of both Houses of Parliament convened as per Article 108? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 108 &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2342;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2348;&#2376;&#2336;&#2325; &#2325;&#2367;&#2344; &#2346;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2369;&#2354;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">When an ordinary bill is rejected by Rajya Sabha.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2348; &#2325;&#2379;&#2312; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2349;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2360;&#2381;&#2357;&#2368;&#2325;&#2371;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">When the Lok Sabha passes an ordinary bill with amendments not accepted by Rajya Sabha.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2348; &#2354;&#2379;&#2325; &#2360;&#2349;&#2366; &#2325;&#2367;&#2360;&#2368; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2379; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2349;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2344; &#2325;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">When Rajya Sabha fails to pass an ordinary bill within six months.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2348; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2349;&#2366; &#2331;&#2361; &#8203;&#8203;&#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2325;&#2367;&#2360;&#2368; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2379; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2357;&#2367;&#2347;&#2354; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">All of the above.</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; <b>A joint sitting is convened when the ordinary bill is rejected, amended, or stalled in Rajya Sabha for six months. </b></p><p><b>Further Insight:</b></p><p>&bull; .Article 108 of the Indian Constitution provides for a <b>joint sitting</b> of both Houses of Parliament (Lok Sabha and Rajya Sabha) <b>to resolve a deadlock when a bill has been rejected by one House or when both Houses have not agreed on the amendments. </b></p><p>&bull; <b>The joint sitting is presided over by the Speaker of the Lok Sabha.</b></p><p>&bull; This provision is applicable only for <b>ordinary bills</b>, and it is <b>not used for money bills or constitutional amendment bills.</b></p><p>&bull; The joint sitting mechanism ensures legislative functionality when there is a deadlock between the two Houses.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which power is conferred on the Supreme Court under Article 129? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 129 &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2379; &#2325;&#2380;&#2344; &#2360;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2368; &#2327;&#2312; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Power to declare laws unconstitutional.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2344;&#2370;&#2344;&#2379;&#2306; &#2325;&#2379; &#2309;&#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2328;&#2379;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2404;</span>",
      "<span class=\"eqt\">Power to make appointments of High Court judges.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2404;</span>",
      "<span class=\"eqt\">Power to punish for its contempt.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2344;&#2368; &#2309;&#2357;&#2350;&#2366;&#2344;&#2344;&#2366; &#8203;&#8203;&#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2339;&#2381;&#2337; &#2342;&#2375;&#2344;&#2375; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2404;</span>",
      "<span class=\"eqt\">Power to review its own judgments.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2344;&#2375; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2350;&#2368;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Article 129 empowers the Supreme Court to punish for its contempt as a Court of Record.</b> </p><p><b>Further Insight:</b></p><p>&bull; The <b>Supreme Court of India</b>:</p><p>&bull; <b>Article 124</b>: Establishment and Constitution of the Supreme Court.</p><p>&bull; <b>Article 125</b>: Salaries and allowances of the Judges of the Supreme Court.</p><p>&bull; <b>Article 126</b>: Appointment of acting Chief Justice.</p><p>&bull; <b>Article 127</b>: Appointment of ad hoc Judges.</p><p>&bull; <b>Article 128</b>: Attendance of retired Judges at sittings of the Supreme Court.</p><p>&bull; <b>Article 129</b>: Supreme Court to be a Court of Record and can punish for its contempt.</p><p>&bull; <b>Article 130</b>: Seat of the Supreme Court.</p><p>&bull; <b>Article 131</b>: Original jurisdiction of the Supreme Court.</p><p>&bull; <b>Article 132</b>: Appellate jurisdiction in Constitutional matters.</p><p>&bull; <b>Article 133</b>: Appellate jurisdiction in civil matters.</p><p>&bull; <b>Article 134</b>: Appellate jurisdiction in criminal matters.</p><p>&bull; <b>Article 134A</b>: Certificate for appeal to the Supreme Court.</p><p>&bull; <b>Article 135</b>: Jurisdiction and powers of the Federal Court under existing laws.</p><p>&bull; <b>Article 136</b>: Special leave to appeal by the Supreme Court.</p><p>&bull; <b>Article 137</b>: Review of judgments or orders by the Supreme Court.</p><p>&bull; <b>Article 138</b>: Enlargement of the jurisdiction of the Supreme Court.</p><p>&bull; <b>Article 139</b>: Conferment of powers to issue certain writs.</p><p>&bull; <b>Article 140</b>: Ancillary powers of the Supreme Court.</p><p>&bull; <b>Article 141</b>: Law declared by Supreme Court to be binding on all courts.</p><p>&bull; <b>Article 142</b>: Enforcement of decrees and orders of the Supreme Court.</p><p>&bull; <b>Article 143</b>: Power of the President to consult the Supreme Court (Advisory jurisdiction).</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>When a bill is presented to the Governor under Article 200, what are their options? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 200 &#2325;&#2375; &#2340;&#2361;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2375; &#2360;&#2350;&#2325;&#2381;&#2359; &#2325;&#2379;&#2312; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2344;&#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2381;&#2351;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">To give assent to the bill.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2379; &#2360;&#2381;&#2357;&#2368;&#2325;&#2371;&#2340;&#2367; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To withhold assent.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2361;&#2350;&#2340;&#2367; &#2344; &#2342;&#2375;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To reserve the bill for the consideration of the President.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2379; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2357;&#2367;&#2330;&#2366;&#2352;&#2366;&#2352;&#2381;&#2341; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2352;&#2326;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">All of the above.</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; <b>The Governor can assent, withhold assent, or reserve the bill for Presidential consideration. </b></p><p><b>Further Insight:</b></p><p>&bull; The <b>Governor</b>:</p><p>&bull; <b>Article 153</b>: Governors of states.</p><p>&bull; <b>Article 154</b>: Executive power of the state vested in the Governor.</p><p>&bull; <b>Article 155</b>: Appointment of the Governor.</p><p>&bull; <b>Article 156</b>: Term of office of the Governor.</p><p>&bull; <b>Article 157</b>: Qualifications for appointment as Governor.</p><p>&bull; <b>Article 158</b>: Conditions of the Governor's office.</p><p>&bull; <b>Article 159</b>: Oath or affirmation by the Governor.</p><p>&bull; <b>Article 160</b>: Discharge of functions of the Governor in certain contingencies.</p><p>&bull; <b>Article 161</b>: Power of Governor to grant pardons, etc., and to suspend, remit, or commute sentences.</p><p>&bull; <b>Article 162</b>: Extent of executive power of the state.</p><p>&bull; <b>Article 163</b>: Council of Ministers to aid and advise the Governor.</p><p>&bull; <b>Article 164</b>: Other provisions related to Ministers and their appointment by the Governor.</p><p>&bull; <b>Article 165</b>: Advocate General for the State, appointed by the Governor.</p><p>&bull; <b>Article 166</b>: Conduct of business of the state government.</p><p>&bull; <b>Article 167</b>: Duties of the Chief Minister with respect to the Governor.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is <b>not</b> a ground on which the High Court can issue writs under Article 226? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2361; &#2310;&#2343;&#2366;&#2352; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376; &#2332;&#2367;&#2360; &#2346;&#2352; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 226 &#2325;&#2375; &#2340;&#2361;&#2340; &#2352;&#2367;&#2335; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">For enforcement of Fundamental Rights.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319;&#2404;</span>",
      "<span class=\"eqt\">For any other purpose.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2309;&#2344;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319;&#2404;</span>",
      "<span class=\"eqt\">For preventive detention cases.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2357;&#2366;&#2352;&#2325; &#2344;&#2367;&#2352;&#2379;&#2343; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319;&#2404;</span>",
      "<span class=\"eqt\">To review legislative actions of Parliament.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342; &#2325;&#2368; &#2357;&#2367;&#2343;&#2366;&#2351;&#2368; &#2325;&#2366;&#2352;&#2381;&#2352;&#2357;&#2366;&#2311;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2350;&#2368;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; High Courts can issue writs under Article 226 for enforcement of rights and other purposes, but not for reviewing legislative actions of Parliament. </p><p><b>Further Insight:</b></p><p>&bull; .<b>High Court</b>:</p><p>&bull; <b>Article 214</b>: Establishment of High Courts.</p><p>&bull; <b>Article 215</b>: High Courts to be Courts of Record.</p><p>&bull; <b>Article 216</b>: Constitution of High Courts.</p><p>&bull; <b>Article 217</b>: Appointment and conditions of the office of a Judge of a High Court.</p><p>&bull; <b>Article 219</b>: Oath or affirmation by High Court Judges.</p><p>&bull; <b>Article 220</b>: Restriction on practice after being a permanent Judge.</p><p>&bull; <b>Article 222</b>: Transfer of a Judge from one High Court to another.</p><p>&bull; <b>Article 223: Appointment of acting Chief Justice of a High Court.</b></p><p>&bull; <b>Article 224</b>: Appointment of additional and acting Judges.</p><p>&bull; <b>Article 224A</b>: Appointment of retired Judges at sittings of the High Court.</p><p>&bull; <b>Article 225</b>: Jurisdiction of existing High Courts.</p><p>&bull; <b>Article 226: Power of High Courts to issue writs.</b></p><p>&bull; <b>Article 227</b>: Power of superintendence over all courts by the High Court.</p><p>&bull; <b>Article 228</b>: Transfer of certain cases to the High Court.</p><p>&bull; <b>Article 230</b>: Extension of jurisdiction of a High Court to Union territories.</p><p>&bull; <b>Article 231</b>: Establishment of a common High Court for two or more states.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>What is the role of a Gram Sabha as defined under Article 243A? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 243&#2319; &#2325;&#2375; &#2340;&#2361;&#2340; &#2327;&#2381;&#2352;&#2366;&#2350; &#2360;&#2349;&#2366; &#2325;&#2368; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It acts as the apex executive authority in village governance.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2327;&#2381;&#2352;&#2366;&#2350; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2350;&#2375;&#2306; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It comprises all adult residents of a village.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2350;&#2375;&#2306; &#2327;&#2366;&#2306;&#2357; &#2325;&#2375; &#2360;&#2349;&#2368; &#2357;&#2351;&#2360;&#2381;&#2325; &#2344;&#2367;&#2357;&#2366;&#2360;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">It elects the sarpanch and other officials.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2360;&#2352;&#2346;&#2306;&#2330; &#2324;&#2352; &#2309;&#2344;&#2381;&#2351; &#2346;&#2342;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2330;&#2369;&#2344;&#2366;&#2357; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is the legislative body at the village level.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2327;&#2381;&#2352;&#2366;&#2350; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2357;&#2367;&#2343;&#2366;&#2351;&#2368; &#2344;&#2367;&#2325;&#2366;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; The Gram Sabha consists of all adult residents of a village, serving as a body to voice opinions and decisions on local issues. </p><p><b>Further Insight:</b></p><p>&bull; <b>Article 243</b>: It defines the <b>Panchayats</b> as institutions of self-government at the village, intermediate, and district levels. It also covers the constitutional provision for establishing Panchayats and their functioning in India's rural local governance system.</p><p>&bull; <b>Article 243A</b>: This article grants the <b>Gram Sabha</b> (village assembly) the authority to exercise powers and perform functions at the village level as outlined by law. The Gram Sabha consists of all registered voters in the village, giving them direct participation in local governance decisions.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>What is the primary purpose of the Contingency Fund of India under Article 267? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 267 &#2325;&#2375; &#2340;&#2361;&#2340; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2310;&#2325;&#2360;&#2381;&#2350;&#2367;&#2325;&#2340;&#2366; &#2344;&#2367;&#2343;&#2367; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
