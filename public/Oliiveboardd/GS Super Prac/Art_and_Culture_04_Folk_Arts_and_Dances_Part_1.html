    "correct_option_id": 0,
    "solution": "<p><b>Bhavai</b> is a traditional folk dance form that originates from the state of <b>Rajasthan</b>. It is known for its intricate footwork, acrobatics, and balancing skills, where dancers balance several pots or pitchers on their heads while performing the dance.</p><p>&#183; <b>Bhavai</b> is performed to express devotion, and it is often associated with religious and cultural events.</p><p>&#183; It is recognized for its vibrant costumes, dynamic movements, and the skillful balancing of objects, making it a unique and captivating performance.</p><p>&#183; Here are the various traditional dance forms from <b>Odisha</b>, <b>Rajasthan</b>, <b>Madhya Pradesh</b>, and <b>Bihar</b>:</p><p><b>Further information:</b></p><p><b>Various dance forms from Odisha</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Dance Form</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Description</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Odissi</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A classical dance form known for its graceful movements, intricate footwork, and symbolic hand gestures. It is performed to devotional music.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Chhau</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A martial arts-based dance form, often performed with masks, depicting mythological stories and martial feats.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Gotipua</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A traditional dance performed by young boys dressed as girls, showcasing intricate acrobatic movements.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Danda Nata</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A ritual dance form performed to honor the deity Shiva. It involves a series of physically intense movements and symbolic offerings.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Mahari</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A classical dance form performed by devadasis (temple dancers), characterized by slow, graceful movements and expressions.</td></tr></table><p><b>Rajasthan</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Dance Form</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Description</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Ghoomar</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A traditional folk dance of Rajasthan performed by women in circular movements, often during festive occasions like marriages and festivals.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Kalbeliya</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A famous dance form performed by the Kalbeliya community, characterized by rapid, swirling movements and graceful postures mimicking a snake.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Bhavai</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A folk dance where dancers balance several pots or pitchers on their heads while performing intricate footwork and spins.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Kachhi Ghodi</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A traditional male dance performed on horseback, usually depicting battle scenes or royal celebrations.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Chari</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A dance form in which dancers balance oil lamps (chari) on their heads while performing rhythmic movements, often during religious ceremonies.</td></tr></table><p><b>Madhya Pradesh</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Dance Form</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Description</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Pandavani</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A folk performance that narrates the epic Mahabharata, focusing on the stories of the Pandavas. It is both a dance and a musical form.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Gond</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A tribal dance form performed by the Gond community, usually during festivals, focusing on storytelling, rituals, and nature worship.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Dandaria</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A folk dance performed by the tribal communities, where dancers create a circle and move rhythmically in unison, often with musical instruments.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Raut Nacha</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A traditional dance performed by the <b>Gond</b> and <b>Goura</b> tribes, celebrating Lord Krishna and his devotees.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Matki Dance</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A folk dance performed by women in Madhya Pradesh, where they balance earthen pots on their heads while moving rhythmically to the beats of folk music.</td></tr></table><p><b>Bihar</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Dance Form</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Description</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Bidesia</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A popular folk dance performed by men and women, often during festivals, depicting themes of separation, love, and longing.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Jat-Jatin</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A traditional folk dance that is often performed by couples, where the male and female performers sing and dance in harmony to express love and emotions.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Fagua</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A folk dance performed during the festival of Holi, where dancers move energetically in circles, celebrating the arrival of spring and the festival of colors.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Kajari</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A traditional folk dance form associated with the monsoon season, performed by women, where they express longing for their husbands or lovers.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Chhau</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Though originally from Odisha, the <b>Chhau dance</b> is also performed in Bihar, particularly during the <b>Chaitra Parva</b> festival. It is known for its martial arts-inspired movements.</td></tr></table>",

      "<span class=\"eqt\">Kuchipudi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2330;&#2367;&#2346;&#2369;&#2337;&#2364;&#2368;</span>",
      "<span class=\"eqt\">Chhau</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2366;&#2314;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Chhau</b> is a tribal martial dance performed in eastern India, especially in the states of Jharkhand, Odisha, and West Bengal.</p><p>&#183; <b>Chhau Dance Overview:</b> A semi-classical, tribal-martial dance performed predominantly by men in Jharkhand, Odisha, and West Bengal, characterized by vigorous movements and masked performances.</p><p>&#183; <b>Styles and Themes:</b></p><p>o <b>Styles:</b> Seraikella (Jharkhand), Purulia (West Bengal), and Mayurbhanj (Odisha), each with distinct mask usage and choreography.</p><p>o <b>Themes:</b> Draws from mythology (e.g., Mahabharata, Ramayana) and martial traditions, reflecting tribal heritage.</p><p>&#183; <b>Other Dances:</b></p><p>o <b>Odissi:</b> Classical dance from Odisha, performed by both genders, not male-exclusive.</p><p>o <b>Sattriya:</b> Classical dance from Assam, rooted in Vaishnavism, not region-specific.</p><p>o <b>Kuchipudi:</b> Classical dance from Andhra Pradesh, not male-exclusive or region-specific.</p><p><b>Further Insights:</b></p><p>&#183; <b>Cultural Significance:</b> Chhau blends folk, tribal, and classical elements, recognized by UNESCO as an intangible cultural heritage in 2010.</p><p>&#183; <b>Performance Context:</b> Often performed during festivals like Chaitra Parva, with elaborate costumes and masks (except in Mayurbhanj).</p><p>&#183; <b>Modern Revival:</b> Efforts to preserve Chhau include training academies and global performances, countering urbanization's impact on tribal traditions.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>What is known to be 'ekaharya', where one dancer takes on many roles in a single performance?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2319;&#2325;&#2366;&#2361;&#2366;&#2352;&#2381;&#2351;' &#2325;&#2367;&#2360;&#2375; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2361;&#2366;&#2306; &#2319;&#2325; &#2344;&#2352;&#2381;&#2340;&#2325; &#2319;&#2325; &#2361;&#2368; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340;&#2367; &#2350;&#2375;&#2306; &#2325;&#2312; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366;&#2319;&#2306; &#2344;&#2367;&#2349;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bharatanatyam</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2352;&#2340;&#2344;&#2366;&#2335;&#2381;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Kathak</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2325;</span>",
      "<span class=\"eqt\">Kuchipudi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2330;&#2367;&#2346;&#2369;&#2337;&#2364;&#2368;</span>",
      "<span class=\"eqt\">Kathakali</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2325;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Bharatnatyam</b> dance is known to be ekaharya, where one dancer takes on many roles in a single performance. </p><p>&#183; In the early 19th century, the famous Tanjore Quartette, under the patronage of Raja Serfoji are said to have been responsible for the repertoire of Bharatnatyam dance as we see it today.</p><p>&#183; The style was kept alive by the devadasis, who were young girls 'gifted' by their parents to the temples and who were married to the gods. </p><p>&#183; The devadasis performed music and dance as offerings to the deities, in the temple courtyards. </p><p>&#183; Some of the renowned performers and gurus of the early part of the century belong to the devadasi families, a well-known name is Bala Saraswati.</p><p><b>Further information:</b></p><p><b>Bharatanatyam:</b></p><p>&#183; One of the <b>oldest classical dance forms</b> of India, originating in <b>Tamil Nadu</b>.</p><p>&#183; Rooted in the <b>Natya Shastra</b> (ancient text by Sage Bharata) and <b>Temple traditions</b> (as a devotional art).</p><p><b>Key Features</b></p><p>&#183; <b>Ekaharya Lasya</b>: Solo dancer portrays multiple characters.</p><p>&#183; <b>Technique</b>:</p><p>o <b>Nritta</b> (pure dance movements, rhythm-based).</p><p>o <b>Nritya</b> (expressive dance with gestures and emotions).</p><p>o <b>Natya</b> (dramatic storytelling).</p><p>&#183; <b>Adavus</b>: Basic dance units (e.g., <i>Tatta</i>, <i>Natta</i>, <i>Kudittamettu</i>).</p><p>&#183; <b>Mudras</b>: Hand gestures (e.g., <i>Hamsasya</i>, <i>Tripataka</i>).</p><p><b>Performance Structure</b></p><p>(a) <b>Alarippu</b>  -  Invocatory piece, warm-up.</p><p>(b) <b>Jatiswaram</b>  -  Pure dance with rhythmic patterns.</p><p>(c) <b>Shabdam</b>  -  Blend of dance and expressive lyrics.</p><p>(d) <b>Varnam</b>  -  Central piece combining <i>nritta</i> and <i>abhinaya</i> (expression).</p><p>(e) <b>Padam</b>  -  Emotional storytelling (often devotional).</p><p>(f) <b>Tillana</b>  -  Energetic finale with intricate footwork.</p>",
    "question_index": 6
  },

    "options": [

      "<span class=\"eqt\">Kathak</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2325;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A renowned <b>Kuchipudi and Bharatanatyam</b> dancer and scholar, Dr. Ananda Shankar Jayant spent six years at Kalakshetra, learning Bharatanatyam, Carnatic music, veena, dance theory, philosophy etc., and acquired a Diploma and a Post-graduate Diploma in Bharatanatyam. On her return to Hyderabad, she learnt Kuchipudi from PasumarthyRamalingaShastry. Interested in sharing her art as well as thanks to interested parents wanting her to teach their children, Ananda became a dance teacher when she was 17. Her early choreographic attempts were in directing short dance pieces of 10 to 20 minutes for young children. These were staged at school functions and local competitions.</p>",

  },

    "correct_option_id": 3,

  },

    "question": "<span class=\"eqt\"><p>Which of the following dances is NOT a part of the Odia culture?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2371;&#2340;&#2381;&#2351; &#2323;&#2337;&#2367;&#2351;&#2366; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Paika</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2325;&#2366;</span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>Kathakali is a classical Indian dance form that originated in the state of Kerala, in southwestern India. It is known for its elaborate costumes, intricate makeup, detailed gestures, and storytelling based on Hindu epics and Puranas. It is not a part of Odia (from Odisha) culture.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; Paika: Paika Nrutya is a traditional martial folk dance of Odisha, performed by the Paikas (warrior class) to display their fighting skills and valor.</p><p>&#8226; Gotipua: Gotipua is a traditional dance form in Odisha, considered a precursor to Odissi classical dance. It is performed by young boys dressed as female characters who sing and dance in praise of Lord Jagannath and Krishna.</p><p>&#8226; Dalkhai: Dalkhai is a popular folk dance of Western Odisha, performed by women during festivals like Bhaijiuntia, Phagun Puni, and Nuakhai. It involves vibrant music and themes of love, nature, and mythology.</p><p><b>Further insights:</b></p><p>&#8226; Odisha has a rich and diverse cultural heritage, with numerous classical, folk, and tribal dance forms. Odissi is one of the eight recognized classical dance forms of India.</p><p>&#8226; Other prominent folk dances of Odisha include Ghumura, Chhau (Mayurbhanj Chhau), Sambalpuri dance, Karma dance, and Chadheya Nata.</p>",
    "question_index": 9
  },

    "solution": "<p>Kelucharan Mohapatra was a legendary Indian classical dancer, guru, and exponent of <b>Odissi </b>dance, who is credited with the revival and popularizing of this classical dance form in the 20th century.</p><p>He was the first person to receive the Padma Vibhushan(2000) from Odisha. He won Sangeet Natak Akademi Award in 1966, Padma Shri in 1974 and Padma Bhushan in 1988.</p>",

    "solution": "<p><b><i>Bihu</i></b> is a traditional folk dance from Assam, performed during the Bihu festival.</p><p>Others listed (Bharatanatyam, Mohiniyattam, and Sattriya) are classical dance forms.</p><p>&#183; <b>Folk vs. Classical Dances:</b></p><p>o <b>Folk Dances:</b> Community-based, often tied to festivals or rituals, with simpler movements and regional variations (e.g., Bihu, Garba).</p><p>o <b>Classical Dances:</b> Codified, with strict techniques and historical texts (e.g., Natya Shastra). Recognized by Sangeet Natak Akademi: Bharatanatyam, Kathak, Odissi, etc.</p><p>&#183; <b>Analysis of Options:</b></p><p>o <b>Bharatanatyam:</b> Classical dance from Tamil Nadu, not folk.</p><p>o <b>Mohiniyattam:</b> Classical dance from Kerala, not folk.</p><p>o <b>Sattriya:</b> Classical dance from Assam, rooted in Vaishnavism, not folk.</p><p>o <b>Bihu:</b> A vibrant folk dance from Assam, performed during the Bihu festival, celebrating harvest and spring.</p>",

    "question": "<span class=\"eqt\"><p>What are the two main parts corresponding to Lasya and Tandava elements in Manipuri dance?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2339;&#2367;&#2346;&#2369;&#2352;&#2368; &#2344;&#2371;&#2340;&#2381;&#2351; &#2350;&#2375;&#2306; &#2354;&#2366;&#2360;&#2381;&#2351; &#2324;&#2352; &#2340;&#2366;&#2306;&#2337;&#2357; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2342;&#2379; &#2350;&#2369;&#2326;&#2381;&#2351; &#2349;&#2366;&#2327; &#2325;&#2380;&#2344; &#2360;&#2375; &#2361;&#2376;&#2306;?</p></span>",

      "<span class=\"eqt\">Varnam and Paran</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2339;&#2350; &#2324;&#2352; &#2346;&#2352;&#2339;</span>",

      "<span class=\"eqt\">Jagoi and Cholom</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2327;&#2379;&#2312; &#2324;&#2352; &#2330;&#2379;&#2354;&#2379;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In Manipuri dance, the two main stylistic divisions reflecting the Lasya (graceful, feminine) and Tandava (vigorous, masculine) elements are broadly represented by <b>Jagoi</b> and <b>Cholom</b>.</p><p><b>Jagoi:</b> This refers to the classical Manipuri dance which is predominantly Lasya-oriented. It includes forms like Ras Leela, characterized by delicate, fluid movements, and graceful expressions, often depicting the love stories of Radha and Krishna.</p><p><b>Cholom:</b> This encompasses the more vigorous, Tandava-style dances, often performed by men. Pung Cholom (drum dance) and Kartal Cholom (cymbal dance) are prominent examples, involving energetic movements, acrobatic elements, and rhythmic precision.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; Bhangi and Stri: \"Bhangi\" refers to postures or poses in dance. \"Stri\" means woman. These are not the primary stylistic divisions.</p><p>&#8226; Varnam and Paran: Varnam is a central piece in Bharatanatyam. Paran is a rhythmic composition in Kathak. These are not terms for the main Lasya/Tandava divisions in Manipuri.</p><p>&#8226; Vira and Toda: \"Vira\" refers to the heroic sentiment (rasa). \"Toda\" is a type of rhythmic composition. Not the main divisions in Manipuri.</p><p><b>Further insights:</b></p><p>&#8226; Manipuri dance is one of the major Indian classical dance forms, originating from the state of Manipur.</p><p>&#8226; While Jagoi is predominantly Lasya and Cholom is predominantly Tandava, there can be elements of both within each form. For example, some male characters in Ras Leela (Jagoi) might exhibit Tandava elements, and some female aspects might be depicted in certain Cholom sequences.</p><p>&#8226; The themes in Manipuri dance are largely devotional, revolving around Radha-Krishna and other Vaishnavite themes, as well as local deities and traditions.</p>",
