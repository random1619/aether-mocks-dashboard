    "correct_option_id": 3,
    "solution": "<p><b>Diwali</b>, also known as <b>Deepavali</b>, is famously known as the <b>\"Festival of Lights\"</b> in India. It symbolizes the victory of light over darkness and good over evil. Key features include:</p><p>&bull; Lighting <b>diyas (earthen lamps)</b> and candles.</p><p>&bull; Decorating homes with <b>rangoli</b> and colorful lights.</p><p>&bull; Celebrated with fireworks, sweets, and family gatherings.</p><p>&bull; Associated with the return of <b>Lord Rama</b> to Ayodhya (as per Hindu mythology).</p><p><b>Further insights:</b></p><p>&bull; <b>Holi</b>  -  Known as the <b>\"Festival of Colors\"</b>, not lights.</p><p>&bull; <b>Onam</b>  -  A harvest festival of Kerala, marked by feasts and boat races.</p><p>&bull; <b>Bihu</b>  -  An Assamese festival celebrating agriculture, with dance and music.</p>",
    "question_index": 11
  },

    "question": "<span class=\"eqt\"><p>In which of the following Indian states, is Makar Sankranti celebrated by the name of 'Magha Saaji'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2350;&#2325;&#2352; &#2360;&#2306;&#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367; &#2325;&#2379; '&#2350;&#2366;&#2328; &#2360;&#2366;&#2332;&#2368;' &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p>Makar Sankranti is the first major Hindu festival we celebrate. Also known as Uttarayana Maghi or simply Sankranti, this harvest festival usually takes place in the month of January and is celebrated in several states though under different names. In <b>Himachal Pradesh</b>, the festival is called Magha Saaji.</p><p>&bull; In Uttar Pradesh and Gujarat, the festival is known as Uttarayan or Kicheri.</p><p>&bull; In Odisha, it is called Makara Chaula</p><p>&bull; In Bihar, the festival is referred to as Til Sakraat or Dahi Chura.</p><p>&bull; Keralites refer to the occasion as Makaravilakku.</p><p>&bull; In Karnataka, it is known as Suggi.</p><p>&bull; It is known as Pongal in Tamil Nadu.</p><p>&bull; In Maharashtra and Goa, the festival is known as Haldi Kumkum or Maghi Sankrant.</p>",
    "question_index": 12
  },

    "solution": "<p>&#183; Tamu Lochar is the New Year of the Gurung community and is celebrated every year on the 30th of December in Sikkim. It marks the change of animal sign (lho) for the <b>Gurung</b> community.</p><p>&#183; <b>Tamu Lochar</b>, also known as <b>Tamu Losar</b>, is a major Nepali-Buddhist festival as well. </p><p>&#183; Tamu Lochar is observed as a public holiday in Sikkim<b>.</b></p><p>&#183; It is the start of the Gurung New Year, which begins on 30 December according to the English calendar and the 15th day of Pusa in Vikram Sambat(according to Nepali Bikram Sambat Calendar).</p><p><b>Further information:</b></p><p><b>The following are the list of festivals celebrated in Sikkim:</b></p><p>Maghe Sankranti</p><p>Maghe Sankranti, also called as Makar Sankranti in other parts of the India, is the first day of the tenth month of the Bikram Sambat calendar which heralds the onset of warmer weather. It is a major secular festival of the Nepalese. It falls on the fourteenth of January every year.</p><p><b>Sonam Lochar</b></p><p>The first day of the twelfth month in the lunar calendar is celebrated as the New Year by the Tamang Community in the state. The Tamangs celebrate this auspicious day with great joy and fervor.</p><p><b>Losar</b></p><p>Losar, the Tibetan New Year as per the lunar calendar, is celebrated across the state with great enthusiasm and gaiety. It is celebrated on the first day of the first month of the Tibetan lunar calendar.</p><p><b>Holi</b></p><p>This Hindu festival of colors symbolizes the victory of good over evil. It also marks the advent of spring and people of Sikkim celebrate it joyously with a splash of color. It is celebrated on the full moon day as per the Vikram Samvat Hindu calendar in the month of Phalgun.</p><p><b>Ramnawami (Chaite Dasain)</b></p><p>This festival is dedicated to the memory of Lord Rama. It occurs on the ninth day of Chaitra month (the first month of the Hindu calendar). The festival commemorates the birth of Rama who is remembered for his prosperous and righteous reign.</p><p><b>Good Friday</b></p><p>Good Friday, also known as \" Holy Friday\" is Friday immediately preceding Easter Sunday. It is observed by Christians all over the world as the day on which Jesus was crucified.</p><p><b>Sakewa</b></p><p>Sakewa is a religious festival celebrated by the Kirat Khambu Rai community of Sikkim. It is also known as the Bhoomi puja or Chandi puja (worship of mother earth). The festival begins on the full moon day of the Hindu month of Baisakh, which usually falls in April/May.</p><p><b>Saga Dawa</b></p><p>Saga Dawa is the most important religious day for the Buddhists all over the world. The day marks the birth, attainment of enlightenment and parinirvana of Lord Buddha. It falls on the 15th day (full moon) of the fourth Tibetan lunar month.</p><p><b>Id Ul Fitr</b></p><p>Id Ul Fitr is an important religious festival of the Muslim community that marks the end of Ramadan, the Islamic month of fasting. It is the first day of the Islamic month of Shawwal.</p><p><b>Bhanu Jayanti</b></p><p>Bhanu Jayanti marks the birth anniversary of Nepali poet Adikabi Bhanu Bhakta Acharya who was born in 1814 in Nepal. It falls on 13th July.</p><p><b>Drukpa Tshechi</b></p><p>Drukpa Tsechi is the day on which Lord Buddha gave his first teachings to his first five disciples at Sarnath. It falls on the fourth day of the 6th month of the Buddhist lunar calendar.</p><p><b>Guru Rinpoche's Thrungkar Tshechu</b></p><p>Guru Rinpoche's Thrungkar Tshechuis the birth anniversary of our patron saint Lord Padmasambhava. It falls on the tenth day of the fifth month of the Buddhist lunar calendar.</p><p><b>Tendong Lho Rum Faat</b></p><p>Tendong Lho Rum Faat is one of the oldest and most important festivals celebrated in Sikkim by the Lepcha community. According to the Lepchas, Mt. Tendong had saved the Lepcha people during a great deluge which flooded the entire Mayel Lyang (Sikkim). The Lepchas celebrate this occasion to pay respect to Mount Tendong. It falls on 8th August every year.</p><p><b>Janmasthami</b></p><p>Janmasthami is the Hindu festival that celebrates the birth anniversary of Lord Krishna. It occurs on the 8th day of the Krishnapaksha in the Hindu month of Shravan which usually falls in the month of July or August.</p><p><b>Indrajatra</b></p><p>Indrajatra is a festival celebrated by the Newar community to pay homage to Lord Indra and his mother for rains and good harvest.</p><p><b>Pang Lhabsol</b></p><p>Pang Lhabsol is a festival unique to Sikkim and is performed every year to pay tribute, honour and to propitiate the protective guarding deities of Sikkim, especially Mount Khangchendzonga, the guardian deity of Sikkim. It falls on the fifteenth day of the seventh month as per the lunar calendar.</p><p><b>Durga Puja (Dasain)</b></p><p>Durga Puja is a Hindu festival which marks the battle of goddess Durga with the powerful buffalo demon Mahishasura. Her victory is epitomized as victory of good over evil thus, the celebration. It occurs in the Hindu calendar month of Ashvin which usually falls in September or October months.</p><p><b>Diwali (Laxmi Puja)</b></p><p>Diwali or Deepawali , the festival of lights, is one of the most important and popular hindu festival. It symbolizes the victory of light over darkness, good over evil, knowledge over ignorance, right over wrong and hope over despair.</p><p><b>Lhabab Dhuechen</b></p><p>Lhabab dhuechen is observed to mark the descent of Lord Buddha from heaven back to earth. He had left earth at the age of 41 to give teachings s to benefit the gods and to repay the kindness of this mother by liberating her from samsara. It occurs on the 22nd day of the ninth month of the Tibetan lunar calendar.</p><p><b>Teyongsi Sirijunga Sawan Tongnam</b></p><p>Teyongsi Sirijunga Sawan Tongnam marks the birth anniversary of Limboo revivalist and scholar Teyongsi Sirijunga. It falls on 23rd of December.</p><p><b>Barahimizong</b></p><p>Barahimizong is observed and celebrated by the Mangar community to worship their forefathers.</p><p><b>Kagyed Dance</b></p><p>Kagyed Dance is the post harvest masked dance to ward off evil and bring good fortune in the coming year. It symbolizes the destruction of evil forces by burning effigies made of wood, flour and paper. It falls on the 28th and 29th day of the 10th month of Tibetan lunar calendar.</p><p><b>Losoong/Namsoong</b></p><p>Losoong/Namsoong is the Sikkimese New Year which marks the end of harvest season. The Lepchas celebrate the occasion as Namsoong while the Sikkimese Bhutias call it the Losoong. The celebrations start from the 29th of the tenth month of Tibetan lunar calendar and continues for a week.</p><p><b>Christmas</b></p><p>Christmas commemorates the birth of Lord Jesus Christ and it is celebrated as a religious and cultural festival by billions of people around the world on 25th December.</p>",
    "question_index": 17
  },
