    "question": "<span class=\"eqt\"><p>Who among the following was one of the recipients of the inaugural 'Prof CR Rao Centenary Gold Medal' award in 2021?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; 2021 &#2350;&#2375;&#2306; &#2313;&#2342;&#2381;&#2328;&#2366;&#2335;&#2344; '&#2346;&#2381;&#2352;&#2379;&#2347;&#2375;&#2360;&#2352; &#2360;&#2368;&#2310;&#2352; &#2352;&#2366;&#2357; &#2358;&#2340;&#2366;&#2348;&#2381;&#2342;&#2368; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2346;&#2342;&#2325;' &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2341;&#2366;?</span>",

    "correct_option_id": 2,

  {
    "question": "<span class=\"eqt\"><p>Harivarasanam award is given in the field of music by which of the following state governments?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2306;&#2327;&#2368;&#2340; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2361;&#2352;&#2367;&#2357;&#2352;&#2360;&#2344;&#2350; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [

  {
    "question": "<span class=\"eqt\"><p>When was the Sri Shanmukhananda National Eminence Award set up?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2381;&#2352;&#2368; &#2359;&#2344;&#2350;&#2369;&#2326;&#2366;&#2344;&#2306;&#2342; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2358;&#2381;&#2352;&#2375;&#2359;&#2381;&#2336;&#2340;&#2366; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2325;&#2348; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",

  {
    "question": "<span class=\"eqt\"><p>Which of the following awards is presented for lifetime achievement in sports and games? It was instituted to honour those sportspersons who have contributed to sports by their performance and continue to contribute to the promotion of sports even after their retirement from an active sporting career. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2326;&#2375;&#2354; &#2324;&#2352; &#2326;&#2375;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2310;&#2332;&#2368;&#2357;&#2344; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;? &#2351;&#2361; &#2313;&#2344; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366; &#2332;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2360;&#2375; &#2326;&#2375;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2342;&#2367;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2326;&#2375;&#2354; &#2325;&#2352;&#2367;&#2351;&#2352; &#2360;&#2375; &#2360;&#2306;&#2344;&#2381;&#2351;&#2366;&#2360; &#2354;&#2375;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2349;&#2368; &#2326;&#2375;&#2354;&#2379;&#2306; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2350;&#2375;&#2306; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2342;&#2375;&#2344;&#2366; &#2332;&#2366;&#2352;&#2368; &#2352;&#2326;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">Dhyanchand Award</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2351;&#2366;&#2344;&#2330;&#2306;&#2342; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Dronacharya Award</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2379;&#2339;&#2366;&#2330;&#2366;&#2352;&#2381;&#2351; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352;</span>",

    "correct_option_id": 1,
    "solution": "<p>The <b>Dhyanchand Award</b> is India's <b>highest lifetime achievement award in sports and games</b>, named after hockey legend <b>Major Dhyan Chand</b>.</p><p>Key Features:</p><p>&#183; <b>Purpose</b>: Honors retired sportspersons for their <b>lifetime contributions</b> to sports through performance and post-retirement promotion.</p><p>&#183; <b>Instituted in</b>: <b>2002</b> (replacing the earlier <b>Lifetime Achievement Award</b>).</p><p>&#183; <b>Includes</b>: &#8377;10 lakh cash prize, a statuette, and a scroll of honor.</p><p>Further information:</p><p>&#183; <b>Arjuna Award</b>  -  For <b>consistent outstanding performance</b> (active athletes).</p><p>&#183; <b>Dronacharya Award</b>  -  For <b>excellence in coaching</b>.</p><p>&#183; <b>Major Dhyan Chand Khel Ratna</b>  -  Does not exist; the <b>Khel Ratna</b> (now <b>Major Dhyan Chand Khel Ratna</b>) is India's <b>highest sporting honor for active athletes</b> (renamed in 2021).</p>",

    "solution": "<p>The Tansen Samman is a prestigious music award instituted by the Government of Madhya Pradesh. </p><p>It is presented during the Tansen Music Festival held annually in Gwalior to honor outstanding contributions in the field of Hindustani classical music.</p><p>Established in 1980, the award initially offered a sum of Rs. 5,000, which was increased to Rs. 50,000 in 1986, and to Rs. 1 lakh in 1990. </p><p>Currently, the award carries a sum of Rs. 5 lakh. The purpose of this award is to honor significant contributions in the field of arts and to acknowledge the contributions of citizens to the cultural realm.</p><p><b>Further information:</b></p><p>Some notable state awards for art and culture.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Award Name</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>State</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Field of Recognition</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Tansen Samman</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Madhya Pradesh</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hindustani classical music</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Kalidas Samman</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Madhya Pradesh</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Classical music, dance, theatre, and fine arts</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Kumar Gandharva Samman</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Madhya Pradesh</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Young vocalists/instrumentalists in classical music</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;
