    "correct_option_id": 3,

  {

    "question": "<span class=\"eqt\"><p>Sangeeta Shankar was awarded Sangeet Natak Akademi Award 2021 for her contribution in playing which musical instrument?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2327;&#2368;&#2340;&#2366; &#2358;&#2306;&#2325;&#2352; &#2325;&#2379; &#2325;&#2367;&#2360; &#2360;&#2306;&#2327;&#2368;&#2340; &#2357;&#2366;&#2342;&#2381;&#2351;&#2351;&#2306;&#2340;&#2381;&#2352; &#2348;&#2332;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2375; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2306;&#2327;&#2368;&#2340; &#2344;&#2366;&#2335;&#2325; &#2309;&#2325;&#2366;&#2342;&#2350;&#2368; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; 2021 &#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;?</p></span>",

    "correct_option_id": 2,
    "solution": "<p>&#8226; Sangeeta Shankar, an eminent <b>violinist</b>, received the Sangeet Natak Akademi Award 2021.</p><p>&#8226; She is renowned for her work in Indian classical music and has contributed significantly to promoting the violin in Hindustani classical music.</p><p>List of some <b>famous Indian classical musicians</b> associated with each instrument:</p><p><b>Santoor:</b></p><p>&#183; <b>Pandit Shivkumar Sharma</b>  -  The most renowned santoor maestro; credited with popularizing the santoor in Indian classical music.</p><p>&#183; <b>Rahul Sharma</b>  -  Son of Shivkumar Sharma; a prominent santoor player of the younger generation.</p><p>&#183; <b>Bhajan Sopori</b>  -  From Jammu &amp; Kashmir; known for his fusion of traditional and innovative styles.</p><p><b>Veena:</b></p><p>&#183; <b>Emani Sankara Sastry</b>  -  Renowned Carnatic veena player.</p><p>&#183; <b>S. Balachander</b>  -  Known for his unique style and contributions to veena in Carnatic music.</p><p>&#183; <b>Jayanthi Kumaresh</b>  -  One of the leading veena artists today; known for her expressive playing.</p><p><b>Violin:</b></p><p>&#183; <b>Lalgudi Jayaraman</b>  -  Legendary Carnatic violinist; developed a unique style called the \"Lalgudi Bani\".</p><p>&#183; <b>Dr. L. Subramaniam</b>  -  Famous for fusion and Western collaborations; expert in both Carnatic and Western classical.</p><p>&#183; <b>T.N. Krishnan</b>  -  Highly respected Carnatic violinist.</p><p>&#183; <b>N. Rajam</b>  -  Hindustani violinist; pioneered the \"Gayaki Ang\" (vocal style) on the violin.</p><p><b>Flute:</b></p><p>&#183; <b>Pandit Hariprasad Chaurasia</b>  -  World-famous Hindustani flautist; known for his soulful bansuri renditions.</p><p>&#183; <b>N. Ramani</b>  -  Renowned Carnatic flautist; contributed significantly to the development of Carnatic flute.</p><p>&#183; <b>Ronu Majumdar</b>  -  Hindustani classical flautist known for blending traditional and contemporary styles.</p>",
