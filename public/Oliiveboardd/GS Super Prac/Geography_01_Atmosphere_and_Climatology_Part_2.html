<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The Earth is surrounded by a huge blanket of air called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2360;&#2375; &#2361;&#2357;&#2366; &#2325;&#2375; &#2319;&#2325; &#2357;&#2367;&#2358;&#2366;&#2354; &#2310;&#2357;&#2352;&#2339; &#2360;&#2375; &#2328;&#2367;&#2352;&#2368; &#2361;&#2369;&#2312; &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Biosphere</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;&#2323;&#2360;&#2381;&#2347;&#2367;&#2309;</span>",
      "<span class=\"eqt\">Atmosphere</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354;</span>",
      "<span class=\"eqt\">Hydrosphere</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2368;&#2337;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Lithosphere</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2354;&#2350;&#2306;&#2337;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Earth is enveloped by a large blanket of air known as the atmosphere. This layer of gases surrounds our planet and is essential for supporting life.</p><p>In contrast:</p><p>&#8226; The biosphere includes all living organisms and the ecosystems they inhabit</p><p>&#8226; The hydrosphere comprises all water bodies on Earth</p><p>&#8226; The lithosphere refers to the solid outer layer of the Earth, including the crust and upper mantle</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which two gases make up the bulk of the atmosphere?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2349;&#2366;&#2327; &#2325;&#2380;&#2344; &#2360;&#2368; &#2342;&#2379; &#2327;&#2376;&#2360;&#2379;&#2306; &#2360;&#2375; &#2348;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Oxygen and Carbon dioxide</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Nitrogen and Carbon dioxide</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Nitrogen and Oxygen</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2324;&#2352; &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Helium and Hydrogen</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2368;&#2354;&#2367;&#2351;&#2350; &#2324;&#2352; &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Nitrogen and oxygen are the two primary gases present in the atmosphere. Nitrogen accounts for about 78% while oxygen makes up approximately 21%.</p><p>In contrast:</p><p>&#8226; Carbon dioxide is present in very small amounts</p><p>&#8226; Helium and hydrogen exist in trace amounts and are not significant components of the atmosphere</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following gases is found in lesser quantities in the atmosphere?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2327;&#2376;&#2360; &#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2350;&#2375;&#2306; &#2325;&#2350; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2346;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Nitrogen</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Oxygen</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Carbon dioxide</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2312;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">The bulk of the atmosphere is not made of Carbon dioxide.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2349;&#2366;&#2327; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2360;&#2375; &#2344;&#2361;&#2368;&#2306; &#2348;&#2344;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Carbon dioxide is found in much smaller amounts compared to nitrogen and oxygen. Other trace gases include helium, ozone, argon, and hydrogen.</p><p>In contrast:</p><p>&#8226; Nitrogen and oxygen are the dominant gases in the atmosphere</p><p>&#8226; Option 4 is a restatement rather than a direct answer</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Plants cannot take which gas directly from the air?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2380;&#2343;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2327;&#2376;&#2360; &#2360;&#2368;&#2343;&#2375; &#2361;&#2357;&#2366; &#2360;&#2375; &#2344;&#2361;&#2368;&#2306; &#2354;&#2375; &#2360;&#2325;&#2340;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Oxygen</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Carbon dioxide</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2312;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Nitrogen</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">All gases can be directly taken by plants.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2327;&#2376;&#2360;&#2375;&#2306; &#2346;&#2380;&#2343;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2368;&#2343;&#2375; &#2354;&#2368; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Although nitrogen is essential for plant growth, plants cannot absorb it directly from the air. It must first be converted into usable forms by bacteria in the soil.</p><p>In contrast:</p><p>&#8226; Carbon dioxide is absorbed by plants during photosynthesis</p><p>&#8226; Oxygen is used by plants for respiration</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What role do bacteria in the soil and roots of some plants play in the nitrogen cycle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2348;&#2376;&#2325;&#2381;&#2335;&#2368;&#2352;&#2367;&#2351;&#2366; &#2324;&#2352; &#2325;&#2369;&#2331; &#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2368; &#2332;&#2337;&#2364;&#2375;&#2306; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2330;&#2325;&#2381;&#2352; &#2350;&#2375;&#2306; &#2325;&#2381;&#2351;&#2366; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2344;&#2367;&#2349;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">They release nitrogen into the air.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2361;&#2357;&#2366; &#2350;&#2375;&#2306; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2331;&#2379;&#2337;&#2364;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They help animals absorb nitrogen.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2346;&#2358;&#2369;&#2323;&#2306; &#2325;&#2379; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2309;&#2357;&#2358;&#2379;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They take nitrogen from the air and change its form so that plants can use it.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2361;&#2357;&#2366; &#2360;&#2375; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2354;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2313;&#2360;&#2325;&#2366; &#2352;&#2370;&#2346; &#2348;&#2342;&#2354; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2366;&#2325;&#2367; &#2346;&#2380;&#2343;&#2375; &#2313;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352; &#2360;&#2325;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They use nitrogen to produce oxygen.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Soil bacteria, especially those in the roots of legumes, convert atmospheric nitrogen into nitrates and other compounds that plants can absorb and use.</p><p>In contrast:</p><p>&#8226; Option 1 is incorrect as bacteria convert nitrogen for use, not release it</p><p>&#8226; Option 2 and 4 are unrelated to the nitrogen fixation process</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Match the atmospheric layers with their characteristics:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Atmospheric Layer</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Characteristic</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Troposphere</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Contains the ozone layer</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Stratosphere</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Meteorites burn up here</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Mesosphere</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Most weather phenomena occur here</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv)Thermosphere</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.Helps in radio transmission</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354;&#2368;&#2351; &#2346;&#2352;&#2340;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354;&#2368;&#2351; &#2346;&#2352;&#2340;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) &#2325;&#2381;&#2359;&#2379;&#2349;&#2350;&#2306;&#2337;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2323;&#2332;&#2379;&#2344; &#2346;&#2352;&#2340; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2360;&#2350;&#2340;&#2366;&#2346; &#2350;&#2306;&#2337;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2313;&#2354;&#2381;&#2325;&#2366;&#2346;&#2367;&#2306;&#2337; &#2351;&#2361;&#2366;&#2305; &#2332;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2350;&#2343;&#2381;&#2351;&#2350;&#2306;&#2337;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2350;&#2380;&#2360;&#2350; &#2360;&#2306;&#2348;&#2306;&#2343;&#2368; &#2328;&#2335;&#2344;&#2366;&#2319;&#2306; &#2351;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) &#2341;&#2352;&#2381;&#2350;&#2379;&#2360;&#2381;&#2347;&#2368;&#2351;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d.&#2352;&#2375;&#2337;&#2367;&#2351;&#2379; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352;&#2339; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i - c, ii - a, iii - b, iv - d</span><span class=\"hqt\" style=\"display:none\">i - c, ii - a, iii - b, iv - d</span>",
      "<span class=\"eqt\">i - a, ii - c, iii - d, iv - b</span><span class=\"hqt\" style=\"display:none\">i - a, ii - c, iii - d, iv - b</span>",
      "<span class=\"eqt\">i - b, ii - d, iii - a, iv - c</span><span class=\"hqt\" style=\"display:none\">i - b, ii - d, iii - a, iv - c</span>",
      "<span class=\"eqt\">i - d, ii - b, iii - c, iv - a</span><span class=\"hqt\" style=\"display:none\">i - d, ii - b, iii - c, iv - a</span>"
    ],
    "correct_option_id": 0,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Atmospheric Layer</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Characteristic</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Key Facts</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Troposphere</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) Most weather phenomena occur here</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lowest layer (0 - 12 km); contains clouds, rain, storms.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Stratosphere</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) Contains the ozone layer</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Extends up to 50 km; ozone absorbs UV radiation.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Mesosphere</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) Meteorites burn up here</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">50 - 85 km; \"middle layer\" where space debris vaporizes.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv)Thermosphere</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d)Helps in radio transmission</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">85 - 600 km; ionized gases reflect radio waves.</td></tr></table><p>The K&#225;rm&#225;n line (100 km above sea level, in the thermosphere) marks the boundary between Earth and space.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which gas creates the greenhouse effect by trapping heat radiated from the Earth?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2327;&#2376;&#2360; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2360;&#2375; &#2344;&#2367;&#2325;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2379; &#2352;&#2379;&#2325;&#2325;&#2352; &#2327;&#2381;&#2352;&#2368;&#2344;&#2361;&#2366;&#2313;&#2360; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2346;&#2376;&#2342;&#2366; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Nitrogen</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Oxygen</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Carbon dioxide</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2312;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Ozone</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2332;&#2379;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Carbon dioxide is a greenhouse gas that traps heat in the Earth's atmosphere, contributing to the greenhouse effect and global warming.</p><p>In contrast:</p><p>&#8226; Nitrogen and oxygen do not have significant greenhouse effects</p><p>&#8226; Ozone has a minor greenhouse effect but is primarily known for blocking harmful UV radiation</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about the greenhouse effect and global warming. </p><p>Which of the statements given above is/are correct?</p><p>a. Carbon dioxide is a greenhouse gas essential for making the Earth liveable. </p><p>b. An increase in greenhouse gases like carbon dioxide leads to a decrease in the Earth's temperature. </p><p>c. Burning of fuels like coal and oil adds billions of tons of carbon dioxide into the atmosphere each year.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2381;&#2352;&#2368;&#2344;&#2361;&#2366;&#2313;&#2360; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2324;&#2352; &#2327;&#2381;&#2354;&#2379;&#2348;&#2354; &#2357;&#2366;&#2352;&#2381;&#2350;&#2367;&#2306;&#2327; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>a. &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2379; &#2352;&#2361;&#2344;&#2375; &#2351;&#2379;&#2327;&#2381;&#2351; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2327;&#2381;&#2352;&#2368;&#2344;&#2361;&#2366;&#2313;&#2360; &#2327;&#2376;&#2360; &#2361;&#2376;&#2404;</p><p>b. &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2332;&#2376;&#2360;&#2368; &#2327;&#2381;&#2352;&#2368;&#2344;&#2361;&#2366;&#2313;&#2360; &#2327;&#2376;&#2360;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2360;&#2375; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2375; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368; &#2310;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>c. &#2325;&#2379;&#2351;&#2354;&#2366; &#2324;&#2352; &#2340;&#2375;&#2354; &#2332;&#2376;&#2360;&#2375; &#2312;&#2306;&#2343;&#2344;&#2379;&#2306; &#2325;&#2375; &#2332;&#2354;&#2344;&#2375; &#2360;&#2375; &#2361;&#2352; &#2360;&#2366;&#2354; &#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2350;&#2375;&#2306; &#2309;&#2352;&#2348;&#2379;&#2306; &#2335;&#2344; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2332;&#2369;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Carbon dioxide is a greenhouse gas essential for making the Earth liveable is Correct</b>  -  CO&#8322; is a natural greenhouse gas that traps heat, keeping Earth warm enough to sustain life. Without it, the planet would be too cold.</p><p>&#183; <b>Burning of fuels like coal and oil adds billions of tons of carbon dioxide into the atmosphere each year is Correct</b>  -  Fossil fuel combustion is the primary human-made source of CO&#8322; emissions, significantly increasing atmospheric greenhouse gases.</p><p>&#183; <b>An increase in greenhouse gases like carbon dioxide leads to a decrease in the Earth's temperature </b>is <b>Incorrect</b>  -  More greenhouse gases <b>trap more heat</b>, causing <b>global warming</b>, not cooling.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The atmosphere is divided into how many layers starting from the Earth's surface?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2368; &#2360;&#2340;&#2361; &#2360;&#2375; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2325;&#2352; &#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2325;&#2367;&#2340;&#2344;&#2368; &#2346;&#2352;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Four</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Five</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2305;&#2330;</span>",
      "<span class=\"eqt\">Six</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2361;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The atmosphere is divided into <b>five</b> layers starting from the Earth's surface. These layers are:</p><p>&#183; <b>Troposphere</b>  -  The lowest layer where we live and where weather occurs.</p><p>&#183; <b>Stratosphere</b>  -  Contains the ozone layer, which absorbs and scatters ultraviolet solar radiation.</p><p>&#183; <b>Mesosphere</b>  -  The layer where most meteorites burn up upon entering Earth's atmosphere.</p><p>&#183; <b>Thermosphere</b>  -  A layer where solar activity creates phenomena like the auroras.</p><p>&#183; <b>Exosphere</b>  -  The outermost layer, where atmospheric particles are extremely sparse and gradually fade into space.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which is the most important layer of the atmosphere where the air we breathe exists?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2346;&#2352;&#2340; &#2325;&#2380;&#2344; &#2360;&#2368; &#2361;&#2376; &#2332;&#2361;&#2366;&#2306; &#2361;&#2350; &#2360;&#2366;&#2306;&#2360; &#2354;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Stratosphere</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2381;&#2352;&#2376;&#2335;&#2379;&#2360;&#2381;&#2347;&#2367;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Mesosphere</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2368;&#2360;&#2379;&#2360;&#2381;&#2347;&#2368;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Troposphere</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2359;&#2379;&#2349; &#2350;&#2306;&#2337;&#2354;</span>",
      "<span class=\"eqt\">Thermosphere</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2352;&#2381;&#2350;&#2379;&#2360;&#2381;&#2347;&#2368;&#2351;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most important layer of the atmosphere where the air we breathe exists is the <b>troposphere</b>.</p><p>The troposphere is the lowest layer of the atmosphere, extending from the Earth's surface up to about 8 to 15 kilometers (5 to 9 miles) high, depending on the location. It contains most of the atmosphere's mass, including the oxygen we breathe, and is where weather phenomena occur.</p><p>In contrast:</p><p>&#8226; Stratosphere, mesosphere, and thermosphere are higher layers and do not contain breathable air in significant amounts</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements regarding air pressure is/are correct?</p><p>a. Air pressure is highest at sea level and decreases with height.</p><p>b. In areas where temperature is high, air gets heated and rises, creating a low-pressure area.</p><p>c. Air always moves from low-pressure areas to high-pressure areas.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2351;&#2369; &#2342;&#2366;&#2348; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>a. &#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2340;&#2354; &#2346;&#2352; &#2357;&#2366;&#2351;&#2369; &#2342;&#2366;&#2348; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2375; &#2360;&#2366;&#2341; &#2328;&#2335;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>b. &#2332;&#2367;&#2344; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2357;&#2361;&#2366;&#2306; &#2361;&#2357;&#2366; &#2327;&#2352;&#2381;&#2350; &#2361;&#2379;&#2325;&#2352; &#2314;&#2346;&#2352; &#2313;&#2336;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2350; &#2342;&#2348;&#2366;&#2357; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>c. &#2361;&#2357;&#2366; &#2361;&#2350;&#2375;&#2358;&#2366; &#2325;&#2350; &#2342;&#2348;&#2366;&#2357; &#2357;&#2366;&#2354;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2360;&#2375; &#2313;&#2330;&#2381;&#2330; &#2342;&#2348;&#2366;&#2357; &#2357;&#2366;&#2354;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2323;&#2352; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Air pressure is highest at sea level and decreases with height.</b></p><p>This statement is <b>correct</b>. Air pressure is highest at sea level due to the weight of the atmosphere above. As you go higher, the air pressure decreases because there is less air above exerting pressure.</p><p><b>In areas where temperature is high, air gets heated and rises, creating a low-pressure area.</b></p><p>This statement is <b>correct</b>. When air is heated, it expands and becomes less dense, causing it to rise. As it rises, it creates a low-pressure area. This is why warm regions tend to have lower air pressure.</p><p><b>Air always moves from low-pressure areas to high-pressure areas.</b></p><p>This statement is <b>incorrect</b>. Air actually moves from high-pressure areas to low-pressure areas. The movement is driven by the pressure difference, and it works to equalize the pressure.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Low pressure is associated with:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344; &#2342;&#2366;&#2348; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Clear and sunny skies</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2347;&#2364; &#2324;&#2352; &#2343;&#2370;&#2346; &#2357;&#2366;&#2354;&#2366; &#2310;&#2360;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Cold and dry weather</span><span class=\"hqt\" style=\"display:none\">&#2336;&#2306;&#2337;&#2366; &#2324;&#2352; &#2358;&#2369;&#2359;&#2381;&#2325; &#2350;&#2380;&#2360;&#2350;</span>",
      "<span class=\"eqt\">Cloudy skies and wet weather</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2342;&#2354; &#2331;&#2366;&#2319; &#2352;&#2361;&#2375;&#2306;&#2327;&#2375; &#2324;&#2352; &#2350;&#2380;&#2360;&#2350; &#2327;&#2368;&#2354;&#2366; &#2352;&#2361;&#2375;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Calm winds</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2306;&#2340; &#2361;&#2357;&#2366;&#2319;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Low-pressure systems</b> occur when warm, moist air rises, cools, and condenses, forming <b>clouds and precipitation</b>.</p><p>&#183; These systems are associated with <b>stormy, rainy, or snowy weather</b> (e.g., cyclones, hurricanes).</p><p><b>Why Not the Others?</b></p><p>&#183; <b>Clear and sunny skies</b>  -  High-pressure systems (descending air prevents cloud formation).</p><p>&#183; <b>Cold and dry weather</b>  -  Typically high pressure (stable air masses, like in winter anticyclones).</p><p>&#183; <b>Calm winds</b>  -  More common in high-pressure zones (low pressure often brings strong, gusty winds).</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>The movement of air from high pressure areas to low pressure areas is called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2330;&#2381;&#2330; &#2342;&#2366;&#2348; &#2357;&#2366;&#2354;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2360;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344; &#2342;&#2366;&#2348; &#2357;&#2366;&#2354;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2323;&#2352; &#2357;&#2366;&#2351;&#2369; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2379; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Air pressure</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2369; &#2342;&#2366;&#2348;</span>",
      "<span class=\"eqt\">Wind</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2357;&#2366;</span>",
      "<span class=\"eqt\">Convection</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2357;&#2375;&#2325;&#2381;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Precipitation</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2359;&#2339;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Wind is defined as the horizontal movement of air from areas of high pressure to areas of low pressure. This movement occurs because air naturally flows from regions where pressure is higher toward regions where pressure is lower.</p><p>The other options refer to different meteorological concepts:</p><p>&#183; Air pressure: The force exerted by the weight of air molecules above a given point</p><p>&#183; Convection: The vertical movement of air due to heating and cooling (a process that can create winds)</p><p>&#183; Precipitation: The release of water from clouds in the form of rain, snow, sleet, or hail</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Winds that blow constantly throughout the year in a particular direction are called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2379; &#2361;&#2357;&#2366;&#2319;&#2306; &#2346;&#2370;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2319;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2354;&#2327;&#2366;&#2340;&#2366;&#2352; &#2348;&#2361;&#2340;&#2368; &#2361;&#2376;&#2306; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Local winds</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2361;&#2357;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Seasonal winds</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2360;&#2350;&#2368; &#2361;&#2357;&#2366;&#2319;&#2305;</span>",
      "<span class=\"eqt\">Permanent winds</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2361;&#2357;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Variable winds</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;&#2358;&#2368;&#2354; &#2361;&#2357;&#2366;&#2319;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Permanent winds are wind systems that blow consistently throughout the year in a particular direction, maintaining a relatively constant pattern regardless of season. These include:</p><p>&#183; Trade winds</p><p>&#183; Westerlies</p><p>&#183; Polar easterlies</p><p>The other options refer to different types of wind patterns:</p><p>&#183; Local winds: Small-scale winds that are influenced by local geographic features (like mountain and valley breezes)</p><p>&#183; Seasonal winds: Winds that change direction with the seasons (like monsoons)</p><p>&#183; Variable winds: Winds that frequently change direction and speed</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Monsoon winds in India are an example of which type of wind?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344;&#2368; &#2361;&#2357;&#2366;&#2319;&#2305; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2361;&#2357;&#2366; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Permanent winds</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2361;&#2357;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Seasonal winds</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2360;&#2350;&#2368; &#2361;&#2357;&#2366;&#2319;&#2305;</span>",
      "<span class=\"eqt\">Local winds</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2361;&#2357;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Trade winds</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2367;&#2325; &#2361;&#2357;&#2366;&#2319;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Monsoon winds in India are a classic example of seasonal winds because they:</p><p>&#183; Change direction with the seasons (southwest in summer, northeast in winter)</p><p>&#183; Are driven by the differential heating of land and sea across seasons</p><p>&#183; Occur with a predictable annual pattern</p><p>&#183; Bring distinct wet and dry seasons to the Indian subcontinent</p><p>The other options are different types of wind systems:</p><p>&#183; Permanent winds: Winds that blow consistently throughout the year in a particular direction</p><p>&#183; Local winds: Small-scale winds affected by local geographic features (like land and sea breezes)</p><p>&#183; Trade winds: Permanent winds that blow from subtropical high-pressure areas toward the equator</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Land and sea breezes are examples of which type of wind?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2354;&#2368;&#2351; &#2324;&#2352; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2368; &#2361;&#2357;&#2366;&#2319;&#2306; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2361;&#2357;&#2366; &#2325;&#2375; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Permanent winds</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2361;&#2357;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Seasonal winds</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2360;&#2350;&#2368; &#2361;&#2357;&#2366;&#2319;&#2305;</span>",
      "<span class=\"eqt\">Local winds</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2361;&#2357;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Westerlies</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2330;&#2381;&#2331;&#2350;&#2368; &#2361;&#2357;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Land and sea breezes are classified as local winds because they:</p><p>&#183; Occur on a small geographical scale</p><p>&#183; Are caused by local temperature differences between land and sea</p><p>&#183; Follow a daily cycle (diurnal pattern)</p><p>&#183; Affect only coastal areas</p><p>The other options are different types of wind systems:</p><p>&#183; Permanent winds: Consistent wind patterns that blow throughout the year in a particular direction (like trade winds)</p><p>&#183; Seasonal winds: Winds that change direction with the seasons (like monsoons)</p><p>&#183; Westerlies: Prevailing winds that blow from west to east in the middle latitudes</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>The amount of water vapour in the air at any time is known as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2360;&#2350;&#2351; &#2361;&#2357;&#2366; &#2350;&#2375;&#2306; &#2332;&#2354;&#2357;&#2366;&#2359;&#2381;&#2346; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2379; &#2311;&#2360; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Precipitation</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Humidity</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Condensation</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2359;&#2381;&#2346;&#2368;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Evaporation</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2359;&#2381;&#2346;&#2368;&#2325;&#2352;&#2339;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Humidity refers to the amount of water vapor present in the air at a given time. It's a measure of how much moisture is in the atmosphere.</p><p>The other options refer to different water cycle processes:</p><p>&#183; Precipitation: The process where water falls from clouds to the Earth's surface (as rain, snow, etc.)</p><p>&#183; Condensation: The process where water vapor changes into liquid water.</p><p>&#183; Evaporation: The process where liquid water changes into water vapor.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Precipitation that comes down to the Earth in liquid form is called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2352;&#2354; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2346;&#2352; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Snow</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2352;&#2381;&#2347;</span>",
      "<span class=\"eqt\">Hail</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2354;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Rain</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2352;&#2367;&#2358;</span>",
      "<span class=\"eqt\">Sleet</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2354;&#2375; &#2325;&#2375; &#2360;&#2366;&#2341; &#2357;&#2352;&#2381;&#2359;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Rain is the form of precipitation that reaches the Earth in liquid form.</p><p>&#183; <b>Rain</b> is the precipitation that falls to the Earth in liquid form, typically in the form of water droplets.</p><p>&#183; <b>Snow</b> is frozen precipitation that falls as ice crystals.</p><p>&#183; <b>Hail</b> consists of frozen balls of ice that form during thunderstorms.</p><p>&#183; <b>Sleet</b> is a mix of rain and snow, consisting of ice pellets.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following instruments measures atmospheric pressure?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2313;&#2346;&#2325;&#2352;&#2339; &#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354;&#2368;&#2351; &#2342;&#2348;&#2366;&#2357; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Thermometer</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2352;&#2381;&#2350;&#2366;&#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Rain Gauge</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2359;&#2366;&#2350;&#2366;&#2346;&#2368;</span>",
      "<span class=\"eqt\">Barometer</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2352;&#2379;&#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Wind Vane</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2340; &#2342;&#2367;&#2327;&#2381;&#2342;&#2352;&#2381;&#2358;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A barometer is the instrument used to measure atmospheric pressure.</p><p>&#183; A <b>barometer</b> measures <b>atmospheric pressure</b> (e.g., mercury barometer, aneroid barometer).</p><p>&#183; Used in weather forecasting to predict changes (high pressure = fair weather, low pressure = storms).</p><p>Further information:</p><p>&#183; <b>Thermometer</b>  -  Measures <b>temperature</b>.</p><p>&#183; <b>Rain Gauge</b>  -  Measures <b>rainfall amount</b>.</p><p>&#183; <b>Wind Vane</b>  -  Shows <b>wind direction</b>.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the type of rainfall in the figure below.</p><p><img width=208 height=160 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27651/image001.png\" ></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2330;&#2367;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2359;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2346;&#2361;&#2330;&#2366;&#2344;&#2375;&#2306;&#2404;</p><p><img width=208 height=160 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27651/image001.png\" ></p></span>",
    "options": [
      "<span class=\"eqt\">Cyclonic rainfall</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2325;&#2381;&#2352;&#2357;&#2366;&#2340;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366;</span>",
      "<span class=\"eqt\">Convectional rainfall</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2361;&#2344;&#2368;&#2351; &#2357;&#2352;&#2381;&#2359;&#2366;</span>",
      "<span class=\"eqt\">Relief rainfall</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2361;&#2340; &#2357;&#2352;&#2381;&#2359;&#2366;</span>",
      "<span class=\"eqt\">Orographic rainfall</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2381;&#2357;&#2340;&#2368;&#2351; &#2357;&#2352;&#2381;&#2359;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The image shows cyclonic rainfall.</p><p><b>Cyclonic (Frontal) Rainfall</b></p><p>&#183; Occurs when two air masses (cold and warm) meet, forming a <b>weather front</b>.</p><p>&#183; The warm, moist air rises over the colder air, cools, condenses, and forms clouds, leading to prolonged rainfall.</p><p>&#183; Common in <b>temperate regions</b> (e.g., UK, USA) and associated with <b>depressions</b> or cyclones.</p><p><img width=654 height=201 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27651/image002.png\"></p><p><b>Convectional Rainfall</b></p><p>&#183; Caused by <b>intense heating of the ground</b>, making warm air rise rapidly.</p><p>&#183; As the air rises, it cools, condenses, and forms <b>cumulonimbus clouds</b>, leading to heavy, short-lived rain with thunderstorms.</p><p>&#183; Common in <b>tropical regions</b> (e.g., Amazon Basin, Congo) and during summer afternoons.</p><p><b>Relief (Orographic) Rainfall</b></p><p>&#183; Occurs when moist air is forced to rise over <b>mountains or hills</b>.</p><p>&#183; As air ascends, it cools, condenses, and rains on the <b>windward side</b> of the mountain.</p><p>&#183; The <b>leeward side</b> remains dry, creating a <b>rain shadow desert</b> (e.g., Eastern Himalayas, Andes).</p><p><b>Orographic Rainfall (Same as Relief Rainfall)</b></p><p>&#183; Another term for <b>relief rainfall</b>, emphasizing the role of terrain (mountains) in causing precipitation.</p><p><b>Summary:</b></p><p>&#183; <b>Cyclonic</b>: Frontal collision (temperate zones).</p><p>&#183; <b>Convectional</b>: Local heating (tropics, summer).</p><p>&#183; <b>Relief/Orographic</b>: Mountain-induced (windward wet, leeward dry).</p>",
    "question_index": 19
  }
];
