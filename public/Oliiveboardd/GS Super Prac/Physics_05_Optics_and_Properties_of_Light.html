<body>

                <div class="questions-grid"></div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements about light is incorrect?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Light exhibits both wave and particle nature.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2340;&#2352;&#2306;&#2327; &#2324;&#2352; &#2325;&#2339; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Light can travel in a vacuum.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2340; &#2350;&#2375;&#2306; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Light can propagate in a curved path naturally.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2357;&#2325;&#2381;&#2352; &#2346;&#2341; &#2346;&#2352; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352;&#2367;&#2340; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The speed of light is approximately 3  X  10^8 m/s.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2368; &#2327;&#2340;&#2367; &#2354;&#2327;&#2349;&#2327; 3 x 10^8 &#2350;&#2368;&#2335;&#2352;/&#2360;&#2375;&#2325;&#2306;&#2337; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Light always propagates in a straight line unless it undergoes refraction or reflection. </p><p>&bull; Light is a form of energy that enables vision by entering our eyes, allowing humans and creatures to see objects.</p><p>&bull; Light is an electromagnetic wave exhibiting both wave-like (e.g., diffraction) and particle-like (e.g., photon) properties</p><p>&bull; Light travels at a constant speed of approximately 3 x 10<sup>8</sup><sub> 1</sub>m/s in a vacuum (or air).</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Why can't we see an object in complete darkness?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2350; &#2346;&#2370;&#2352;&#2381;&#2339; &#2309;&#2306;&#2343;&#2325;&#2366;&#2352; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; &#2325;&#2381;&#2351;&#2379;&#2306; &#2344;&#2361;&#2368;&#2306; &#2342;&#2375;&#2326; &#2346;&#2366;&#2340;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Because light is absorbed by objects in the dark</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2309;&#2306;&#2343;&#2375;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2357;&#2358;&#2379;&#2359;&#2367;&#2340; &#2325;&#2352; &#2354;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Because no light is emitted or reflected towards our eyes</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2361;&#2350;&#2366;&#2352;&#2368; &#2310;&#2305;&#2326;&#2379;&#2306; &#2325;&#2368; &#2323;&#2352; &#2325;&#2379;&#2312; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2367;&#2340; &#2351;&#2366; &#2346;&#2352;&#2366;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Because our eyes are not adapted to darkness</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2361;&#2350;&#2366;&#2352;&#2368; &#2310;&#2305;&#2326;&#2375;&#2306; &#2309;&#2306;&#2343;&#2375;&#2352;&#2375; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Because objects do not exist in darkness</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2306; &#2309;&#2306;&#2343;&#2375;&#2352;&#2375; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Vision is possible only when light emitted or reflected by an object reaches our eyes.</p><p>&bull; The human eye acts like a camera, using its parts to capture and process light to form an image that the brain interprets.</p><p>&bull; Light forms an inverted, real image on the retina.</p><p>&bull; The brain receives these impulses, inverts the upside-down image, and interprets it as an upright visual perception, enabling us to \"see\" the object.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a non-luminous object?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2309;&#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sun</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2352;&#2332;</span>",
      "<span class=\"eqt\">Glowworm</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2369;&#2327;&#2344;&#2370;</span>",
      "<span class=\"eqt\">Candle</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2350;&#2348;&#2340;&#2381;&#2340;&#2368;</span>",
      "<span class=\"eqt\">Moon</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2306;&#2342;&#2381;&#2352;&#2350;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; A non-luminous object does not produce its own light but reflects light from other sources. The moon is visible due to reflected sunlight.</p><p>&bull; Translucent materials allow partial passage of light, such as paraffin wax. Glass and water are transparent, while rubber is opaque.</p><p>&bull; Opaque objects either reflect or absorb light; they do not allow light to pass through them.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not a law of reflection?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2352;&#2366;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The angle of incidence is equal to the angle of reflection.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2346;&#2340;&#2344; &#2325;&#2379;&#2339; &#2346;&#2352;&#2366;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2379;&#2339; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The incident ray, the reflected ray, and the normal all lie in the same plane.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2346;&#2340;&#2367;&#2340; &#2325;&#2367;&#2352;&#2339;, &#2346;&#2352;&#2366;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2367;&#2352;&#2339; &#2324;&#2352; &#2309;&#2349;&#2367;&#2354;&#2350;&#2381;&#2348; &#2360;&#2349;&#2368; &#2319;&#2325; &#2361;&#2368; &#2340;&#2354; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The angle of incidence is always 90&deg;.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2346;&#2340;&#2344; &#2325;&#2379;&#2339; &#2360;&#2342;&#2376;&#2357; 90&deg; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The laws of reflection hold for both smooth and rough surfaces.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2366;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2330;&#2367;&#2325;&#2344;&#2368; &#2324;&#2352; &#2326;&#2369;&#2352;&#2342;&#2352;&#2368; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2361;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The angle of incidence can vary; it is not always 90&deg;.</p><p>&bull; Laws of Reflection</p><p>&#9675; The angle of incidence is equal to the angle of reflection.</p><p>&#9675; The incident ray, the reflected ray, and the normal to the surface at the point of incidence all lie in the same plane.</p><p>&#9675; Reflection is the turning back of light into the same medium after striking a surface (e.g., opaque materials like mirrors).</p><p><img width=492 height=271 id=image10.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27341/image001.png\"></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The image formed by a plane mirror is always:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2340;&#2354; &#2342;&#2352;&#2381;&#2346;&#2339; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2350;&#2381;&#2348; &#2360;&#2342;&#2376;&#2357; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Real and inverted</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2324;&#2352; &#2313;&#2354;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Virtual and laterally inverted</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2349;&#2366;&#2360;&#2368; &#2324;&#2352; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2313;&#2354;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Real and erect</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2324;&#2352; &#2360;&#2368;&#2343;&#2366;</span>",
      "<span class=\"eqt\">Virtual and magnified</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2349;&#2366;&#2360;&#2368; &#2324;&#2352; &#2310;&#2357;&#2352;&#2381;&#2343;&#2367;&#2340;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Plane mirrors form virtual, laterally inverted, and same-sized images.</p><p>&bull; A convex mirror always forms a virtual, erect, and diminished image.</p><p><img width=508 height=293 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27341/image002.png\"></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a use of concave mirrors?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2357;&#2340;&#2354; &#2342;&#2352;&#2381;&#2346;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rear-view mirrors in vehicles</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2361;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2368;&#2331;&#2375; &#2342;&#2375;&#2326;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2342;&#2352;&#2381;&#2346;&#2339;</span>",
      "<span class=\"eqt\">Shaving mirrors</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2375;&#2357;&#2367;&#2306;&#2327; &#2342;&#2352;&#2381;&#2346;&#2339;</span>",
      "<span class=\"eqt\">Security mirrors in stores</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2369;&#2325;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2342;&#2352;&#2381;&#2346;&#2339;</span>",
      "<span class=\"eqt\">Side mirrors in motorcycles</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2335;&#2352;&#2360;&#2366;&#2311;&#2325;&#2367;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2366;&#2311;&#2337; &#2350;&#2367;&#2352;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Concave mirrors are used as shaving mirrors because they provide a magnified image when the object is within the focal length.</p><p>&bull; Uses of Concave Mirrors</p><p>&#9675; Torches, Searchlights, and Headlights: Produces powerful parallel beams by reflecting light from the focal point.</p><p>&#9675; Shaving Mirror: Forms a magnified, upright image when the face is between the pole and focal point.</p><p>&#9675; Dentist's Mirror: Creates a large, virtual image of teeth for close examination when held near the object.</p><p>&#9675; Solar Furnaces: Concentrates sunlight to a focal point to generate intense heat for melting or cooking.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The refractive index of medium 2 with respect to medium 1 is given by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2343;&#2381;&#2351;&#2350; 1 &#2325;&#2375; &#2360;&#2366;&#2346;&#2375;&#2325;&#2381;&#2359; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; 2 &#2325;&#2366; &#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;&#2366;&#2306;&#2325; &#2344;&#2367;&#2350;&#2381;&#2344; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">&#181;<sub>21</sub> = Speed of light in medium 1 / Speed of light in medium 2</span><span class=\"hqt\" style=\"display:none\">&#181;<sub>21</sub> = &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; 1 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2368; &#2327;&#2340;&#2367; / &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; 2 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2368; &#2327;&#2340;&#2367;</span>",
      "<span class=\"eqt\">&#181;<sub>21 </sub>= Speed of light in medium 2 / Speed of light in medium 1</span><span class=\"hqt\" style=\"display:none\">&#181;<sub>21 </sub>= &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; 2 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2368; &#2327;&#2340;&#2367; / &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; 1 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2368; &#2327;&#2340;&#2367;</span>",
      "<span class=\"eqt\">&#181;<sub>21 </sub>= (Speed of light in vacuum)<sup>2</sup> / Speed of light in medium 2</span><span class=\"hqt\" style=\"display:none\">&#181;<sub>21 </sub>= (&#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2368; &#2327;&#2340;&#2367;)<sup>2</sup> / &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2368; &#2327;&#2340;&#2367; 2</span>",
      "<span class=\"eqt\">&#181;<sub>21 </sub>= 1 / (Speed of light in medium 1)</span><span class=\"hqt\" style=\"display:none\">&#181;<sub>21 </sub>= 1 / (&#2350;&#2366;&#2343;&#2381;&#2351;&#2350; 1 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2368; &#2327;&#2340;&#2367;)</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The refractive index formula is &#181;<sub>21</sub>= Speed of light in medium 1 / Speed of light in medium 2.</p><p>&bull; The bending of a ray of light as it passes from one medium to another is called refraction of light.</p><p>&bull; When a ray of light travels from air into water, it bends towards the normal at the point of incidence on the air-water interface.\" Conversely, \"it bends away from the normal\" when moving from water to air.</p><p><img width=624 height=431 id=image7.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27341/image003.png\"></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which phenomenon causes the twinkling of stars?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2328;&#2335;&#2344;&#2366; &#2340;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2335;&#2367;&#2350;&#2335;&#2367;&#2350;&#2366;&#2344;&#2375; &#2325;&#2366; &#2325;&#2366;&#2352;&#2339; &#2348;&#2344;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Reflection</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348;</span>",
      "<span class=\"eqt\">Refraction</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Dispersion</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2376;&#2354;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Scattering</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2326;&#2352;&#2344;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Atmospheric refraction causes the twinkling of stars due to continuous bending of light.</p><p>&bull; As the path of rays of light coming from the star goes on varying slightly, the apparent position of the star fluctuates and the amount of starlight entering the eye flickers  -  the star sometimes appears brighter, and at some other time, fainter, which is the twinkling effect (Source NCERT)</p><p><img width=426 height=462 id=image9.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27341/image004.png\"></p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The formula 1/v + 1/u = 1/f is known as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2340;&#2381;&#2352; 1/v + 1/u = 1/f &#2325;&#2379; &#2311;&#2360; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Snell's law</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2344;&#2375;&#2354; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Lens formula</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2375;&#2306;&#2360; &#2360;&#2370;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Mirror formula</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2352;&#2381;&#2346;&#2339; &#2360;&#2370;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Refractive index formula</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; &#2360;&#2370;&#2340;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; This is the mirror formula used for concave and convex mirrors.</p><p>&bull; 1/v + 1/u = 1/f </p><p><img width=463 height=385 id=image4.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27341/image005.png\"></p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Power of a lens is given by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2375;&#2306;&#2360; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2344;&#2367;&#2350;&#2381;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">P = f (in meters)</span><span class=\"hqt\" style=\"display:none\">P = f (m)</span>",
      "<span class=\"eqt\">P = 1/f (in meters)</span><span class=\"hqt\" style=\"display:none\">P = 1/f (m)</span>",
      "<span class=\"eqt\">P = f<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">P = f<sup>2</sup></span>",
      "<span class=\"eqt\">P = f/2</span><span class=\"hqt\" style=\"display:none\">P = f/2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Power of a lens is measured in diopters and given by P = 1/f.</p><p>&bull; The power of a lens is defined as the reciprocal of its focal length. It is represented by the letter P</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Total internal reflection occurs when:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2370;&#2352;&#2381;&#2339; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2346;&#2352;&#2366;&#2357;&#2352;&#2381;&#2340;&#2344; &#2340;&#2348; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;:</p></span>",
    "options": [
      "<span class=\"eqt\">Light moves from rarer to denser medium</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2357;&#2367;&#2352;&#2354; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2360;&#2328;&#2344; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2325;&#2368; &#2323;&#2352; &#2327;&#2340;&#2367; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Light moves from denser to rarer medium with incidence angle greater than critical angle</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2328;&#2344; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2357;&#2367;&#2352;&#2354; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2325;&#2368; &#2323;&#2352; &#2310;&#2346;&#2340;&#2344; &#2325;&#2379;&#2339; &#2325;&#2375; &#2360;&#2366;&#2341; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367;&#2325; &#2325;&#2379;&#2339; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2327;&#2340;&#2367; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Light moves at any angle from denser to rarer medium</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2328;&#2344; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2357;&#2367;&#2352;&#2354; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2325;&#2368; &#2323;&#2352; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2325;&#2379;&#2339; &#2346;&#2352; &#2327;&#2340;&#2367; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Light undergoes refraction</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344; &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; When the angle of incidence exceeds the critical angle, total internal reflection occurs.</p><p>&bull; When light travels from an optically denser medium to a rarer medium at the interface, it is partly reflected back into the same medium and partly refracted to the second medium. This reflection is called the internal reflection (Source NCERT)</p><p><img width=618 height=460 id=image8.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27341/image006.png\"></p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>The dispersion of light results in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2375; &#2347;&#2376;&#2354;&#2366;&#2357; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346;:</p></span>",
    "options": [
      "<span class=\"eqt\">Reflection</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348;</span>",
      "<span class=\"eqt\">Refraction</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Separation of white light into its component colors</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2357;&#2375;&#2340; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2328;&#2335;&#2325; &#2352;&#2306;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2354;&#2327; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Bending of light without color separation</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2306;&#2327; &#2346;&#2371;&#2341;&#2325;&#2381;&#2325;&#2352;&#2339; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2366; &#2333;&#2369;&#2325;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Dispersion breaks white light into VIBGYOR components.</p><p><img width=624 height=351 id=image5.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27341/image007.png\"></p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which color of light bends the most in a prism?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2352;&#2306;&#2327; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2350;&#2369;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Red</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Green</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Blue</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Violet</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2306;&#2327;&#2344;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Violet has the shortest wavelength and bends the most.</p><p>&bull; Different colours of light bend through different angles with respect to the incident ray as they pass through a prism</p><p>&bull; The violet light bends the most while the red light bends the least because of the difference in their wavelengths</p><p><img width=538 height=304 id=image2.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27341/image008.png\"></p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>A rainbow formation is caused due to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2306;&#2342;&#2381;&#2352;&#2343;&#2344;&#2369;&#2359; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366;&#2352;&#2339;&#2379;&#2306; &#2360;&#2375; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Only refraction</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Only total internal reflection</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2346;&#2370;&#2352;&#2381;&#2339; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2346;&#2352;&#2366;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">A combination of refraction, reflection, and dispersion</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;, &#2346;&#2352;&#2366;&#2357;&#2352;&#2381;&#2340;&#2344; &#2324;&#2352; &#2347;&#2376;&#2354;&#2366;&#2357; &#2325;&#2366; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Only diffraction</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2357;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; A rainbow forms due to refraction, dispersion, and reflection inside raindrops.</p><p>&bull; A rainbow is always formed in a direction opposite to that of the Sun. </p><p>&bull; The water droplets act like small prisms. </p><p>&bull; They refract and disperse the incident sunlight, then reflect it internally, and finally refract it again when it comes out of the raindrop.</p><p>&bull; Due to the dispersion of light and internal reflection, different colours reach the observer's eye</p><p><img width=395 height=331 id=image3.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27341/image009.png\"></p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which phenomenon explains why a pencil partially submerged in water appears bent?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2328;&#2335;&#2344;&#2366; &#2351;&#2361; &#2348;&#2340;&#2366;&#2340;&#2368; &#2361;&#2376; &#2325;&#2367; &#2346;&#2366;&#2344;&#2368; &#2350;&#2375;&#2306; &#2310;&#2306;&#2358;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2337;&#2370;&#2348;&#2368; &#2361;&#2369;&#2312; &#2346;&#2375;&#2306;&#2360;&#2367;&#2354; &#2350;&#2369;&#2337;&#2364;&#2368; &#2361;&#2369;&#2312; &#2325;&#2381;&#2351;&#2379;&#2306; &#2342;&#2367;&#2326;&#2366;&#2312; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Reflection</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348;</span>",
      "<span class=\"eqt\">Refraction</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Dispersion</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2376;&#2354;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Scattering</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2326;&#2352;&#2344;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Refraction bends light as it passes from water (denser) to air (rarer), making the pencil appear bent at the water's surface.</p><p>&bull; Reflection is a phenomenon in which there is turning back of light into the same medium after striking a surface.</p><p>&bull; The splitting of white light into its seven constituent colours (VIBGYOR) when passing through a prism due to varying wavelengths is called Dispersion.</p><p>&bull; The redirection of light in various directions by small particles in the atmosphere, causing phenomena like the blue sky is called scattering </p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>A plane mirror forms an image that is 15 cm behind it. If the mirror is moved 5 cm toward the object, what is the new image distance from the object? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2340;&#2354; &#2342;&#2352;&#2381;&#2346;&#2339; &#2319;&#2325; &#2331;&#2357;&#2367; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2313;&#2360;&#2325;&#2375; &#2346;&#2368;&#2331;&#2375; 15 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2352;&#2381;&#2346;&#2339; &#2325;&#2379; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2368; &#2323;&#2352; 5 &#2360;&#2375;&#2350;&#2368; &#2354;&#2375; &#2332;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2360;&#2381;&#2340;&#2369; &#2360;&#2375; &#2344;&#2312; &#2331;&#2357;&#2367; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;? </p></span>",
    "options": [
      "<span class=\"eqt\">40 cm</span><span class=\"hqt\" style=\"display:none\">40 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">20 cm</span><span class=\"hqt\" style=\"display:none\">20 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">15 cm</span><span class=\"hqt\" style=\"display:none\">15 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">30 cm</span><span class=\"hqt\" style=\"display:none\">30 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Initially, object-to-image distance = 15 cm (behind mirror) + 15 cm (object in front) = 30 cm. </p><p>&bull; Mirror moves 5 cm closer, reducing object distance to 10 cm; image remains 10 cm behind, total distance = 20 cm.</p><p><img width=508 height=293 id=image11.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27341/image002.png\"></p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding refraction of light. Which of the following statements is/are correct?</p><p>(a) When light travels from a denser to a rarer medium, it bends away from the normal.</p><p>(b) The refractive index of a medium is the ratio of the speed of light in a vacuum to the speed of light in that medium.</p><p>(c) If the angle of incidence is greater than the critical angle, light passes into the rarer medium with maximum speed.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2375; &#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p><p>(a) &#2332;&#2348; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2328;&#2344; &#2360;&#2375; &#2357;&#2367;&#2352;&#2354; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2350;&#2375;&#2306; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2351;&#2361; &#2309;&#2349;&#2367;&#2354;&#2306;&#2348; &#2360;&#2375; &#2342;&#2370;&#2352; &#2350;&#2369;&#2337;&#2364; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>(b) &#2325;&#2367;&#2360;&#2368; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2325;&#2366; &#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;&#2366;&#2306;&#2325; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2368; &#2327;&#2340;&#2367; &#2324;&#2352; &#2313;&#2360; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>(c) &#2351;&#2342;&#2367; &#2310;&#2346;&#2340;&#2344; &#2325;&#2379;&#2339; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367;&#2325; &#2325;&#2379;&#2339; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2357;&#2367;&#2352;&#2354; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2327;&#2340;&#2367; &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only (a) and (b)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (&#2319;) &#2324;&#2352; (&#2348;&#2368;)</span>",
      "<span class=\"eqt\">Only (b) and (c)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (&#2348;&#2368;) &#2324;&#2352; (&#2360;&#2368;)</span>",
      "<span class=\"eqt\">Only (a) and (c)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (&#2319;) &#2324;&#2352; (&#2360;&#2368;)</span>",
      "<span class=\"eqt\">(a), (b), and (c)</span><span class=\"hqt\" style=\"display:none\">(&#2319;), (&#2348;&#2368;), &#2324;&#2352; (&#2360;&#2368;)</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Laws of Refraction:</p><p>&#9675; \"The incident ray, the refracted ray and the normal to the interface of two transparent media at the point of incidence, all lie in the same plane.\"</p><p>&#9675; \"The ratio of sine of angle of incidence to the sine of angle of refraction is a constant, for the light of a given colour and for the given pair of media. This law is also known as Snell's law of refraction.</p><p>&bull; Statement (c) is incorrect because when the angle of incidence exceeds the critical angle, total internal reflection occurs, and light does not pass into the rarer medium.</p>",
    "question_index": 16
