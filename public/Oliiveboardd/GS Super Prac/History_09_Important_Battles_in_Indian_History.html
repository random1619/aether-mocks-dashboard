  },
  {
    "question": "<span class=\"eqt\"><p>The Battle of Colachel (1741) was significant because_____________.&#8203;</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2379;&#2354;&#2366;&#2330;&#2375;&#2354; &#2325;&#2368; &#2354;&#2337;&#2364;&#2366;&#2312; (1741) &#2311;&#2360;&#2354;&#2367;&#2319; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2341;&#2368; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367;____________.&#8203;</p></span>",
    "options": [
      "<span class=\"eqt\">It marked the end of Portuguese power in India.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2381;&#2340;&#2327;&#2366;&#2354;&#2368; &#2360;&#2340;&#2381;&#2340;&#2366; &#2325;&#2375; &#2309;&#2306;&#2340; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">It was the first time an Indian kingdom defeated a European power at sea.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2346;&#2361;&#2354;&#2368; &#2348;&#2366;&#2352; &#2341;&#2366; &#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351; &#2344;&#2375; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2368; &#2351;&#2370;&#2352;&#2379;&#2346;&#2368;&#2351; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2361;&#2352;&#2366;&#2351;&#2366; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">It led to the establishment of French colonies in India.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2368;&#2360;&#2368; &#2313;&#2346;&#2344;&#2367;&#2357;&#2375;&#2358;&#2379;&#2306; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2361;&#2369;&#2312;&#2404;</span>",
      "<span class=\"eqt\">It resulted in the British gaining control over Bengal.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2379;&#2306; &#2325;&#2379; &#2348;&#2306;&#2327;&#2366;&#2354; &#2346;&#2352; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379; &#2327;&#2351;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Battle of Colachel, fought in 1741, was significant as it marked the first time an Indian kingdom, the Kingdom of Travancore under Maharaja Marthanda Varma, defeated a European colonial power, the Dutch East India Company, at sea.</p><p>&bull; Travancore forces achieved a decisive victory, capturing De Lannoy and other Dutch officers, and effectively ending Dutch colonial ambitions in the region.</p><p>&bull; Following the battle, a treaty known as the Treaty of Mavelikkara was signed between Travancore and the Dutch, solidifying peace and friendship between the two parties.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Regarding the Battle of Buxar (1764), consider the following statements:</p><p>a) The battle was fought between the British East India Company and a coalition of Indian rulers.</p><p>b) Shuja-ud-Daula of Awadh fought alongside Mir Qasim and the Mughal Emperor.</p><p>c) The battle established British control over Bengal, Bihar, and Odisha.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2325;&#2381;&#2360;&#2352; &#2325;&#2368; &#2354;&#2337;&#2364;&#2366;&#2312; (1764) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a) &#2351;&#2361; &#2354;&#2337;&#2364;&#2366;&#2312; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2324;&#2352; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2358;&#2366;&#2360;&#2325;&#2379;&#2306; &#2325;&#2375; &#2327;&#2336;&#2348;&#2306;&#2343;&#2344; &#2325;&#2375; &#2348;&#2368;&#2330; &#2354;&#2337;&#2364;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p><p>b) &#2309;&#2357;&#2343; &#2325;&#2375; &#2358;&#2369;&#2332;&#2366;-&#2313;&#2342;-&#2342;&#2380;&#2354;&#2366; &#2344;&#2375; &#2350;&#2368;&#2352; &#2325;&#2366;&#2360;&#2367;&#2350; &#2324;&#2352; &#2350;&#2369;&#2327;&#2354; &#2360;&#2350;&#2381;&#2352;&#2366;&#2335; &#2325;&#2375; &#2360;&#2366;&#2341; &#2354;&#2337;&#2364;&#2366;&#2312; &#2354;&#2337;&#2364;&#2368;&#2404;</p><p>c) &#2311;&#2360; &#2354;&#2337;&#2364;&#2366;&#2312; &#2344;&#2375; &#2348;&#2306;&#2327;&#2366;&#2354;, &#2348;&#2367;&#2361;&#2366;&#2352; &#2324;&#2352; &#2323;&#2337;&#2367;&#2358;&#2366; &#2346;&#2352; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">a, b, and c</span><span class=\"hqt\" style=\"display:none\">a, b &#2324;&#2352; c</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; The British fought against a coalition of Mir Qasim (Nawab of Bengal), Shuja-ud-Daula (Nawab of Awadh), and Mughal Emperor Shah Alam II.</p><p>&bull; Shuja-ud-Daula, along with Mir Qasim, opposed the British.</p><p>&bull; The British victory solidified their control over eastern India.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The Fourth Anglo-Mysore War (1799) led to the death of which ruler?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2380;&#2341;&#2375; &#2310;&#2306;&#2327;&#2381;&#2354;-&#2350;&#2376;&#2360;&#2370;&#2352; &#2351;&#2369;&#2342;&#2381;&#2343; (1799) &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2358;&#2366;&#2360;&#2325; &#2325;&#2368; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2361;&#2369;&#2312;?</p></span>",
    "options": [
      "<span class=\"eqt\">Haider Ali</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2376;&#2342;&#2352; &#2309;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Tipu Sultan</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2368;&#2346;&#2370; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Shuja-ud-Daula</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2332;&#2366;&#2313;&#2342;&#2381;&#2342;&#2380;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Mir Qasim</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2368;&#2352; &#2325;&#2366;&#2360;&#2367;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Tipu Sultan, the ruler of Mysore, was killed at Srirangapatna in 1799 during the Fourth Anglo-Mysore War.</p><p>&bull; Haider Ali, his father, died earlier during the Second Anglo-Mysore War.</p><p>&bull; Shuja-ud-Daula was the Nawab of Awadh, involved in the Battle of Buxar (1764).</p><p>&bull; Mir Qasim was a former Nawab of Bengal who fought against the British in Battle of Buxar.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which treaty concluded the First Anglo-Maratha War (1775-1782)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2360;&#2306;&#2343;&#2367; &#2360;&#2375; &#2346;&#2381;&#2352;&#2341;&#2350; &#2310;&#2306;&#2327;&#2381;&#2354;-&#2350;&#2352;&#2366;&#2336;&#2366; &#2351;&#2369;&#2342;&#2381;&#2343; (1775-1782) &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2310;?</p></span>",
    "options": [
      "<span class=\"eqt\">Treaty of Bassein</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2360;&#2368;&#2344; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Treaty of Salbai</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2354;&#2348;&#2366;&#2312; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Treaty of Amritsar</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2371;&#2340;&#2360;&#2352; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Treaty of Lahore</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2361;&#2380;&#2352; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Treaty of Salbai (1782) ended the First Anglo-Maratha War, restoring pre-war territorial positions.</p><p>&bull; The Treaty of Bassein (1802) was signed between the British and the Peshwa before the Second Anglo-Maratha War.</p><p>&bull; The Treaty of Amritsar (1809) was between the British and Ranjit Singh.</p><p>&bull; The Treaty of Lahore (1846) ended the First Anglo-Sikh War.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>The Treaty of Yandabo (1826) ended which war?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2306;&#2342;&#2366;&#2348;&#2379; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367; (1826) &#2344;&#2375; &#2325;&#2367;&#2360; &#2351;&#2369;&#2342;&#2381;&#2343; &#2325;&#2379; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">First Anglo-Burmese War</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2341;&#2350; &#2310;&#2306;&#2327;&#2381;&#2354;-&#2348;&#2352;&#2381;&#2350;&#2368; &#2351;&#2369;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">First Anglo-Maratha War</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2341;&#2350; &#2310;&#2306;&#2327;&#2381;&#2354;-&#2350;&#2352;&#2366;&#2336;&#2366; &#2351;&#2369;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">First Anglo-Mysore War</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2341;&#2350; &#2310;&#2306;&#2327;&#2381;&#2354;-&#2350;&#2376;&#2360;&#2370;&#2352; &#2351;&#2369;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">First Anglo-Sikh War</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2341;&#2350; &#2310;&#2306;&#2327;&#2381;&#2354;-&#2360;&#2367;&#2326; &#2351;&#2369;&#2342;&#2381;&#2343;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The Treaty of Yandabo (1826) ended the First Anglo-Burmese War, forcing Burma to cede Assam, Manipur, and other territories to the British.</p><p>&bull; Burma agreed to pay a substantial indemnity to the British, totaling &le;1,000,000.</p><p>&bull; Burma agreed to accept a British Resident at the court of Ava (the Burmese capital).</p><p>&bull; Burma renounced all claims in Assam and Manipur, which became British protectorates.</p><p>&bull; It established British dominance in the region and laid the foundation for the eventual annexation of Burma into British India.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Who was the last ruling Nawab of Awadh when the British annexed it in 1856?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; 1856 &#2350;&#2375;&#2306; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2379;&#2306; &#2344;&#2375; &#2309;&#2357;&#2343; &#2346;&#2352; &#2325;&#2348;&#2381;&#2332;&#2364;&#2366; &#2325;&#2367;&#2351;&#2366; &#2340;&#2379; &#2357;&#2361;&#2366;&#2306; &#2325;&#2375; &#2309;&#2306;&#2340;&#2367;&#2350; &#2358;&#2366;&#2360;&#2325; &#2344;&#2357;&#2366;&#2348; &#2325;&#2380;&#2344; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Saadat Ali Khan</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2310;&#2342;&#2340; &#2309;&#2354;&#2368; &#2326;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Wajid Ali Shah</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2332;&#2367;&#2342; &#2309;&#2354;&#2368; &#2358;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Asaf-ud-Daula</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2360;&#2347;&#2364;-&#2313;&#2342;-&#2342;&#2380;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Shuja-ud-Daula</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2332;&#2366;&#2313;&#2342;&#2381;&#2342;&#2380;&#2354;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Wajid Ali Shah was deposed by the British in 1856, leading to the annexation of Awadh under the Doctrine of Lapse.</p><p>&bull; Lord Dalhousie, the Governor-General of India, implemented the \"Doctrine of Lapse\" which allowed the British to annex Indian states if they were deemed to be misgoverned or if the ruler died without a male heir.</p><p>&bull; The annexation of Awadh further fueled existing tensions between the British and the locals, eventually leading to the Revolt of 1857, with Awadh being a major epicenter of the rebellion.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following states was NOT annexed under the Doctrine of Lapse?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351; &#2361;&#2337;&#2364;&#2346; &#2344;&#2368;&#2340;&#2367; &#2325;&#2375; &#2340;&#2361;&#2340; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Satara</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2366;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Jhansi</span><span class=\"hqt\" style=\"display:none\">&#2333;&#2366;&#2306;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Hyderabad</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2376;&#2342;&#2352;&#2366;&#2348;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Nagpur</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2327;&#2346;&#2369;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Hyderabad was a princely state that remained independent until 1948.</p><p>&bull; Satara, Jhansi, and Nagpur were annexed by the British under the Doctrine of Lapse.</p><p>&bull; Lord Dalhousie, the Governor-General of India, implemented the \"Doctrine of Lapse\" which allowed the British to annex Indian states if they were deemed to be misgoverned or if the ruler died without a male heir.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Who led the Revolt of 1857 in Kanpur?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2344;&#2346;&#2369;&#2352; &#2350;&#2375;&#2306; 1857 &#2325;&#2375; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361; &#2325;&#2366; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rani Lakshmibai</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2344;&#2368; &#2354;&#2325;&#2381;&#2359;&#2381;&#2350;&#2368; &#2348;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Nana Sahib</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2344;&#2366; &#2360;&#2366;&#2361;&#2348;</span>",
      "<span class=\"eqt\">Bahadur Shah II</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2366;&#2342;&#2369;&#2352; &#2358;&#2366;&#2361; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Kunwar Singh</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2306;&#2357;&#2352; &#2360;&#2367;&#2306;&#2361;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Nana Sahib led the 1857 Revolt in Kanpur.</p><p>&bull; Rani Lakshmibai fought in Jhansi</p><p>&bull; Bahadur Shah II was declared emperor in Delhi</p><p>&bull; Kunwar Singh fought in Bihar.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Leader</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Place of Revolt</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bahadur Shah II</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Delhi</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Nana Sahib</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Kanpur</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tantia Tope</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Kanpur</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rani Lakshmibai</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Jhansi</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Begum Hazrat Mahal</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lucknow</td></tr></table>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which treaty forced the British to recognize Nepal's sovereignty?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2360;&#2306;&#2343;&#2367; &#2344;&#2375; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2379;&#2306; &#2325;&#2379; &#2344;&#2375;&#2346;&#2366;&#2354; &#2325;&#2368; &#2360;&#2306;&#2346;&#2381;&#2352;&#2349;&#2369;&#2340;&#2366; &#2325;&#2379; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2332;&#2348;&#2370;&#2352; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Treaty of Sugauli</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2327;&#2380;&#2354;&#2368; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Treaty of Lucknow</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2326;&#2344;&#2314; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Treaty of Allahbad</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Treaty of Paris</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2352;&#2368;&#2360; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The Anglo-Nepalese War (1814-1816) ended with the Treaty of Sugauli (1816), reducing Nepal's territory but recognizing its sovereignty.</p><p>&bull; Treaty of Lucknow (1801): Signed between the British East India Company and Nawab Saadat Ali Khan of Awadh, leading to the annexation of Rohilkhand, Gorakhpur, and the Doab region, making Awadh a British subordinate state.</p><p>&bull; Treaty of Allahabad (1765): Signed after the Battle of Buxar between the British East India Company and Mughal Emperor Shah Alam II, granting the British Diwani rights (revenue collection) of Bengal, Bihar, and Orissa, marking the beginning of British rule in India.</p><p>&bull; Treaty of Paris (1763): Signed between Britain and France, ending the Seven Years' War, with France losing most of its territories in India except for Pondicherry, Karaikal, Mahe, and Chandernagore, strengthening British dominance.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Which was the first major uprising against British rule in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2346;&#2361;&#2354;&#2366; &#2348;&#2337;&#2364;&#2366; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361; &#2325;&#2380;&#2344; &#2360;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Revolt of 1857</span><span class=\"hqt\" style=\"display:none\">1857 &#2325;&#2366; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;</span>",
