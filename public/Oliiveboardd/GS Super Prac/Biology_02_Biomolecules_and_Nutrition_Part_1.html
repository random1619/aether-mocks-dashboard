    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Name a common electrolyte disorder that occurs when the amount of sodium in your blood becomes abnormally low.</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2354;&#2366;&#2311;&#2335; &#2357;&#2367;&#2325;&#2366;&#2352; &#2325;&#2366; &#2344;&#2366;&#2350; &#2348;&#2340;&#2366;&#2319;&#2306; &#2332;&#2379; &#2340;&#2348; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348; &#2310;&#2346;&#2325;&#2375; &#2352;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2309;&#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">Hyperkalemia</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2346;&#2352;&#2325;&#2354;&#2375;&#2350;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Hypokalemia</span><span class=\"hqt\" style=\"display:none\">hypokalemia</span>",
      "<span class=\"eqt\">Hyponatremia</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2346;&#2379;&#2344;&#2375;&#2335;&#2381;&#2352;&#2375;&#2350;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Hypernatremia</span><span class=\"hqt\" style=\"display:none\">hypernatremia</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Hyponatremia is a condition where the sodium levels in the blood drop below normal (less than 135 mEq/L), leading to symptoms like nausea, headaches, confusion, and seizures.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which amino acid is a precursor to serotonin, a neurotransmitter that regulates your appetite, sleep and mood?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2350;&#2368;&#2344;&#2379; &#2319;&#2360;&#2367;&#2337; &#2360;&#2375;&#2352;&#2379;&#2335;&#2379;&#2344;&#2367;&#2344; &#2325;&#2366; &#2309;&#2327;&#2381;&#2352;&#2342;&#2370;&#2340; &#2361;&#2376;, &#2332;&#2379; &#2319;&#2325; &#2344;&#2381;&#2351;&#2370;&#2352;&#2379;&#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2350;&#2368;&#2335;&#2352; &#2361;&#2376; &#2332;&#2379; &#2310;&#2346;&#2325;&#2368; &#2349;&#2370;&#2326;, &#2344;&#2368;&#2306;&#2342; &#2324;&#2352; &#2350;&#2370;&#2337; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tryptophan</span><span class=\"hqt\" style=\"display:none\">tryptophan</span>",
      "<span class=\"eqt\">Methionine</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2341;&#2367;&#2351;&#2379;&#2344;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Valine</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2376;&#2354;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Isoleucine</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2311;&#2360;&#2379;&#2354;&#2381;&#2351;&#2370;&#2360;&#2368;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The amino acid tryptophan is the precursor to serotonin, a neurotransmitter that plays a crucial role in regulating mood, appetite, and sleep.</p><p>&bull; Serotonin's influence extends beyond the central nervous system; it is also synthesized in the intestines, where it regulates gut motility and secretory activity</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Select the INCORRECT statement with regards to vitamins.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2327;&#2354;&#2340; &#2325;&#2341;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Plants can synthesise almost all vitamins.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2380;&#2343;&#2375; &#2354;&#2327;&#2349;&#2327; &#2360;&#2349;&#2368; &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Most of the vitamins cannot get synthesised in sufficient amount in our body.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2361;&#2350;&#2366;&#2352;&#2375; &#2358;&#2352;&#2368;&#2352; &#2350;&#2375;&#2306; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379; &#2346;&#2366;&#2340;&#2375;&#2404;</span>",
      "<span class=\"eqt\">Vitamins are organic compounds.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2351;&#2380;&#2327;&#2367;&#2325; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Some bacteria in the gut do not produce vitamins.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2340; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2348;&#2376;&#2325;&#2381;&#2335;&#2368;&#2352;&#2367;&#2351;&#2366; &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2375;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#8226; Statement D is incorrect as <b>gut bacteria, like those producing vitamin K and some B vitamins, do synthesize vitamins. </b></p><p>&#8226; Statements A, B, and C are correct: plants synthesize most vitamins, humans cannot produce sufficient amounts of most vitamins, and vitamins are organic compounds.</p><p><b>Further Insight</b>:</p><p>&#8226; Vitamins are essential micronutrients required in small amounts for metabolic processes. Deficiencies can cause diseases like scurvy (vitamin C) or beriberi (vitamin B1). </p><p>&#8226; Gut bacteria contribute significantly to vitamin K and B vitamin production, reducing dependency on dietary sources.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>______ is the tube that carries urine from the kidney to the urinary bladder.</p></span><span class=\"hqt\" style=\"display:none\"><p>______ &#2357;&#2361; &#2335;&#2381;&#2351;&#2370;&#2348; &#2361;&#2376; &#2332;&#2379; &#2350;&#2370;&#2340;&#2381;&#2352; &#2325;&#2379; &#2327;&#2369;&#2352;&#2381;&#2342;&#2375; &#2360;&#2375; &#2350;&#2370;&#2340;&#2381;&#2352;&#2366;&#2358;&#2351; &#2340;&#2325; &#2354;&#2375; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Ureter</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2340;&#2381;&#2352;&#2357;&#2366;&#2361;&#2367;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Urethra</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2340;&#2381;&#2352;&#2350;&#2366;&#2352;&#2381;&#2327;</span>",
      "<span class=\"eqt\">Sphincter</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2352;&#2339;&#2368;</span>",
      "<span class=\"eqt\">Aorta</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2343;&#2350;&#2344;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The major organs of the urinary system are:</p><p><b>Kidneys </b>- filter the blood, keep the right balance of water in body tissues, and change liquid wasteproducts into urine.</p><p><b>Ureters</b> - long narrow tubes that carry urine from the kidneys to the urinary bladder.</p><p><b>Urinary bladder</b> - a muscular pouch where urine collects and is stored until it is passed out of the body.</p><p><b>Urethra</b> - short, narrow tube that carries urine from the bladder to the outside.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Swollen bluish veins resulting from the valves that do not close properly are called _____.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2354;&#2381;&#2357;&#2379;&#2306; &#2325;&#2375; &#2336;&#2368;&#2325; &#2360;&#2375; &#2348;&#2306;&#2342; &#2344; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2360;&#2370;&#2332;&#2368; &#2361;&#2369;&#2312; &#2344;&#2368;&#2354;&#2368; &#2344;&#2360;&#2379;&#2306; &#2325;&#2379; _____ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Varicose veins</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2352;&#2366; &#2325;&#2368; &#2344;&#2360;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Superficial veins</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2361;&#2368; &#2344;&#2360;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Systemic veins</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;&#2327;&#2340; &#2344;&#2360;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Deep veins</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2361;&#2352;&#2368; &#2344;&#2360;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Varicose</b> veins are twisted, swollen veins near the surface of the skin and occur when weak or defective valves allow blood to flow backward or stagnate within the vein.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following options correctly matches column-A and column-B?</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column-A (Food component)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column-B (Enzyme involved in digestion)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Protein</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Amylase</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Carbohydrates</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Lipase</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Fats</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Trypsin</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2377;&#2354;&#2350;-A &#2324;&#2352; &#2325;&#2377;&#2354;&#2350;-B &#2360;&#2375; &#2360;&#2361;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2350;&#2375;&#2354; &#2326;&#2366;&#2340;&#2366; &#2361;&#2376;?</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2325;&#2377;&#2354;&#2350;-A (&#2326;&#2366;&#2342;&#2381;&#2351; &#2328;&#2335;&#2325;)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2325;&#2377;&#2354;&#2350;-B (&#2346;&#2366;&#2330;&#2344; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2319;&#2306;&#2332;&#2366;&#2311;&#2350;)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2319;&#2350;&#2366;&#2311;&#2354;&#2375;&#2332;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2375;&#2335;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2354;&#2366;&#2311;&#2346;&#2375;&#2332;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2357;&#2360;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2335;&#2381;&#2352;&#2367;&#2346;&#2381;&#2360;&#2367;&#2344;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-c, ii-a, iii-b</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2312;-&#2360;&#2368;, &#2310;&#2312;&#2310;&#2312;-&#2319;, &#2310;&#2312;&#2310;&#2312;-&#2348;&#2368;</span>",
      "<span class=\"eqt\">i-b, ii-a, iii-c</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2312;-&#2348;&#2368;, &#2310;&#2312;&#2310;&#2312;-&#2319;, &#2310;&#2312;&#2310;&#2312;-&#2360;&#2368;</span>",
      "<span class=\"eqt\">i-a, ii-b, iii-c</span><span class=\"hqt\" style=\"display:none\">i-&#2319;, ii-&#2348;&#2368;, iii-&#2360;&#2368;</span>",
      "<span class=\"eqt\">i-a, ii-c, iii-b</span><span class=\"hqt\" style=\"display:none\">i-&#2319;, ii-&#2360;&#2368;, iii-&#2348;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Protein</b>: The enzyme <b>Trypsin</b> (produced in the pancreas) helps in the digestion of proteins by breaking them into smaller peptides.</p><p>&#183; <b>Carbohydrates</b>: The enzyme <b>Amylase</b> (found in saliva and pancreatic fluid) breaks down carbohydrates into simple sugars.</p><p>&#183; <b>Fats</b>: The enzyme <b>Lipase</b> (produced by the pancreas) is responsible for breaking down fats into fatty acids and glycerol.</p><p><b>Further Insight:</b></p><p>These enzymes play vital roles in breaking down macronutrients for absorption.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following are the functions of blood in the human body? </p><p>1) Oxygen transport</p><p>2) Carbon dioxide transport</p><p>3) Nutrient transport</p><p>4) Waste disposal</p><p>Select the correct answer using the code given below<b>:</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2357; &#2358;&#2352;&#2368;&#2352; &#2350;&#2375;&#2306; &#2352;&#2325;&#2381;&#2340; &#2325;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>1) &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2325;&#2366; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344;</p><p>2) &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2325;&#2366; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344;</p><p>3) &#2346;&#2379;&#2359;&#2325; &#2340;&#2340;&#2381;&#2357; &#2325;&#2366; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344;</p><p>4) &#2309;&#2346;&#2358;&#2367;&#2359;&#2381;&#2335; &#2344;&#2367;&#2346;&#2335;&#2366;&#2344;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;:</p></span>",
    "options": [
      "<span class=\"eqt\">Only 1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1, 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">Only 2, 3 and 4</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2, 3 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">Only 1 and 3</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">Only 1 and 4</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Waste disposal is not a function of blood. </b>Blood plays several important roles in the body, including:</p><p>&bull; <b>Oxygen transport:</b> Blood carries oxygen from the lungs to the cells in the body and also carries carbon dioxide from the cells to the lungs for removal.</p><p>&bull; <b>Carbon dioxide transport:</b> Blood carries carbon dioxide away from the cells and to the lungs, where it is exhaled.</p><p>&bull; <b>Nutrient transport:</b> Blood carries nutrients such as glucose, amino acids, and minerals from the digestive system to the cells of the body.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Metabolic reactions in our body are carried out by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2350;&#2366;&#2352;&#2375; &#2358;&#2352;&#2368;&#2352; &#2350;&#2375;&#2306; &#2313;&#2346;&#2366;&#2346;&#2330;&#2351;&#2368; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2325;&#2367;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">proteins</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344;</span>",
      "<span class=\"eqt\">carbohydrates</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2375;&#2335;</span>",
      "<span class=\"eqt\">lipids</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2367;&#2346;&#2367;&#2337;</span>",
      "<span class=\"eqt\">salts</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2357;&#2339;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Metabolism, the sum of the chemical reactions that take place within each cell of a living organism and that provide energy for vital processes and for synthesizing new organic material.<b> All the metabolic reactions in our body are carried out by protein.</b></p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>What do you mean by semiconservative DNA replication?</p></span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2381;&#2343;&#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2368; &#2337;&#2368;&#2319;&#2344;&#2319; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2371;&#2340;&#2367; &#2360;&#2375; &#2310;&#2346;&#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2309;&#2349;&#2367;&#2346;&#2381;&#2352;&#2366;&#2351; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">After the completion of replication, each DNA molecule would have two parental and two newly synthesised strands.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2371;&#2340;&#2367;&#2325;&#2352;&#2339; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2337;&#2368;&#2319;&#2344;&#2319; &#2309;&#2339;&#2369; &#2350;&#2375;&#2306; &#2342;&#2379; &#2346;&#2376;&#2340;&#2371;&#2325; &#2324;&#2352; &#2342;&#2379; &#2344;&#2357; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2367;&#2340; &#2360;&#2381;&#2335;&#2381;&#2352;&#2376;&#2306;&#2337; &#2361;&#2379;&#2306;&#2327;&#2375;&#2404;</span>",
      "<span class=\"eqt\">RNA is dependent on DNA for the synthesis of proteins.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2319;&#2344;&#2319; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2325;&#2375; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2368;&#2319;&#2344;&#2319; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">DNA is dependent on RNA for the synthesis of proteins.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2325;&#2375; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2368;&#2319;&#2344;&#2319; &#2310;&#2352;&#2319;&#2344;&#2319; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">After the completion of replication, each DNA molecule would have one parental and one newly synthesised strand.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2371;&#2340;&#2367;&#2325;&#2352;&#2339; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2337;&#2368;&#2319;&#2344;&#2319; &#2309;&#2339;&#2369; &#2350;&#2375;&#2306; &#2319;&#2325; &#2346;&#2376;&#2340;&#2371;&#2325; &#2340;&#2341;&#2366; &#2319;&#2325; &#2344;&#2357; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2367;&#2340; &#2352;&#2332;&#2381;&#2332;&#2369;&#2325; &#2361;&#2379;&#2327;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Semiconservative DNA replication is a process discovered by Meselson and Stahl in 1958, where each new DNA molecule formed during replication consists of one parental (original) strand and one newly synthesized strand. During replication, the double-stranded DNA unwinds, and each strand serves as a template for the synthesis of a complementary strand. This ensures that the genetic information is preserved, with each daughter molecule being half \"old\" (parental) and half \"new.\"</p><p>&#183; Option 1 is incorrect because it suggests four strands per molecule, which contradicts the structure of DNA (only two strands per molecule).</p><p>&#183; Options 2 and 3 describe transcription and reverse transcription, respectively, not replication.</p><p>&#183; Option 4 correctly defines semiconservative replication.</p><p>Thus, the correct answer is option 4.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>How many parathyroid glands are present on the back side of the thyroid gland in humans?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2357; &#2350;&#2375;&#2306; &#2341;&#2366;&#2351;&#2352;&#2366;&#2351;&#2337; &#2327;&#2381;&#2352;&#2306;&#2341;&#2367; &#2325;&#2375; &#2346;&#2367;&#2331;&#2354;&#2375; &#2349;&#2366;&#2327; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2346;&#2376;&#2352;&#2366;&#2341;&#2366;&#2351;&#2352;&#2366;&#2311;&#2337; &#2327;&#2381;&#2352;&#2344;&#2381;&#2341;&#2367;&#2351;&#2366;&#2305; &#2346;&#2366;&#2351;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Six</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2361;</span>",
      "<span class=\"eqt\">Five</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2305;&#2330;</span>",
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Four</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The parathyroid glands are <b>four </b>small, oval-shaped glands. They are located next to the two thyroid gland lobes in the neck. Each gland is usually about the size of a pea.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following glands is present between the lungs?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2327;&#2381;&#2352;&#2306;&#2341;&#2367; &#2347;&#2375;&#2347;&#2337;&#2364;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2380;&#2332;&#2370;&#2342; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pituitary</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2351;&#2370;&#2359;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Pineal</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2344;&#2367;&#2351;&#2354;</span>",
      "<span class=\"eqt\">Hypothalamus</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2358;&#2381;&#8205;&#2330;&#2375;&#2340;&#2325;/&#2361;&#2366;&#2311;&#2346;&#2379;&#2341;&#2376;&#2354;&#2375;&#2350;&#2360;</span>",
      "<span class=\"eqt\">Thymus</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2366;&#2311;&#2350;&#2360;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The <u>thymus gland</u>, located behind your sternum and between your lungs, is only active until puberty.</p><p>After puberty, the thymus starts to slowly shrink and become replaced by fat.</p><p>Thymosin is the hormone of the thymus, and it stimulates the development of disease-fighting T cells.</p><p>The thymus gland will not function throughout a full lifetime, but it has a big responsibility when it's active - helping the body protect itself against autoimmunity, which occurs when the immune system turns against itself. Therefore, the thymus plays a vital role in the lymphatic system (your body's defense network) and endocrine system.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements about enzymes in the human body is/are correct?</p><p>Statement A: Maltase is present in the saliva and breaks the sugar maltose into glucose.</p><p>Statement B: Amylase is present in the saliva and helps change starches into sugars.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2357; &#2358;&#2352;&#2368;&#2352; &#2350;&#2375;&#2306; &#2319;&#2306;&#2332;&#2366;&#2311;&#2350;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344; A: &#2350;&#2366;&#2354;&#2381;&#2335;&#2375;&#2332;&#2364; &#2354;&#2366;&#2352; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2330;&#2368;&#2344;&#2368; &#2350;&#2366;&#2354;&#2381;&#2335;&#2379;&#2332;&#2364; &#2325;&#2379; &#2327;&#2381;&#2354;&#2370;&#2325;&#2379;&#2332; &#2350;&#2375;&#2306; &#2340;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; B: &#2319;&#2350;&#2366;&#2311;&#2354;&#2375;&#2332; &#2354;&#2366;&#2352; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2360;&#2381;&#2335;&#2366;&#2352;&#2381;&#2330; &#2325;&#2379; &#2358;&#2352;&#2381;&#2325;&#2352;&#2366; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>",
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Statement A: Maltase is present in the saliva and breaks the sugar maltose into glucose.</b> </p><p>&#183; This is <b>incorrect</b>. Maltase is an enzyme that breaks down maltose into glucose, but it is primarily found in the small intestine, not in saliva. Saliva contains enzymes like amylase (also called ptyalin), but not maltase.</p><p><b>Statement B: Amylase is present in the saliva and helps change starches into sugars.</b> </p><p>&#183; This is <b>correct</b>. Salivary amylase, also known as ptyalin, is present in saliva and begins the digestion of starches by breaking them down into simpler sugars like maltose.</p><p><b>Further insight:</b></p><p><b>Digestive Enzymes in the Human Body</b></p><p><b>1) Mouth</b>: </p><p>o <b>Enzymes</b>: Salivary amylase (ptyalin) and lingual lipase.</p><p>o <b>Function</b>: Salivary amylase breaks down starches into simpler sugars like maltose. For example, when you chew bread, it starts tasting sweeter as starches are converted into sugars. Lingual lipase begins fat digestion but is more active in the stomach.</p><p>o <b>Conditions</b>: Saliva has a near-neutral pH (around 6.2 - 7.6), which is optimal for amylase activity.</p><p>2) <b>Stomach</b>: </p><p>o <b>Enzymes</b>: Pepsin (for proteins) and gastric lipase (for fats). Salivary amylase is deactivated here due to the low pH (1.5 - 3.5).</p><p>o <b>Function</b>: The stomach primarily digests proteins using pepsin, and no significant carbohydrate digestion occurs here. Maltase is not present in the stomach either.</p><p>3) <b>Small Intestine</b>: </p><p>o <b>Enzymes</b>: Pancreatic amylase, brush border enzymes (maltase, sucrase, lactase, etc.), and others like trypsin and lipase.</p><p>o <b>Function</b>: </p><p>&#167; Pancreatic amylase continues starch digestion, breaking starches into maltose.</p><p>&#167; Brush border enzymes like <b>maltase</b>, <b>sucrase</b> (breaks sucrose into glucose and fructose), and <b>lactase</b> (breaks lactose into glucose and galactose) complete carbohydrate digestion.</p><p>&#167; The resulting monosaccharides (glucose, fructose, galactose) are absorbed into the bloodstream through the intestinal lining.</p><p>o <b>Conditions</b>: The small intestine has a slightly alkaline pH (around 7 - 8), ideal for these enzymes.</p><p>4) <b>Large Intestine</b>: </p><p>o No significant enzymatic digestion occurs here, but gut bacteria ferment undigested carbohydrates, producing gases and short-chain fatty acids.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following organ secretes hydrochloric acid that helps our body in killing pathogenic bacteria?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2306;&#2327; &#2361;&#2350;&#2366;&#2352;&#2375; &#2358;&#2352;&#2368;&#2352; &#2325;&#2379; &#2352;&#2379;&#2327;&#2332;&#2344;&#2325; &#2332;&#2368;&#2357;&#2366;&#2339;&#2369;/&#2348;&#2376;&#2325;&#2381;&#2335;&#2368;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2350;&#2366;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2325;&#2381;&#2354;&#2379;&#2352;&#2367;&#2325; &#2309;&#2350;&#2381;&#2354; &#2325;&#2366; &#2360;&#2381;&#2352;&#2366;&#2357; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kidney</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2371;&#2325;&#2381;&#2325;</span>",
      "<span class=\"eqt\">Heart</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2381;&#2352;&#2342;&#2351;</span>",
      "<span class=\"eqt\">Stomach</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2366;&#2358;&#2351;</span>",
      "<span class=\"eqt\">Brain</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2360;&#2381;&#2340;&#2367;&#2359;&#2381;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Stomach</b> secretes hydrochloric acid that helps our body in killing pathogenic bacteria. It is secreted by parietal cells in the stomach.Excessive secretion of stomach acid can lead to the formation of peptic ulcers.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>From which of the following sources does the brain get energy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2381;&#2352;&#2379;&#2340; &#2360;&#2375; &#2350;&#2360;&#2381;&#2340;&#2367;&#2359;&#2381;&#2325; &#2325;&#2379; &#2314;&#2352;&#2381;&#2332;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Amino acids</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2368;&#2344;&#2379; &#2309;&#2350;&#2381;&#2354;</span>",
      "<span class=\"eqt\">Nucleic acids</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2325;&#2381;&#2354;&#2367;&#2325; &#2309;&#2350;&#2381;&#2354;</span>",
      "<span class=\"eqt\">Fatty acids</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2360;&#2366;&#2351;&#2369;&#2325;&#2381;&#2340; &#2309;&#2350;&#2381;&#2354;</span>",
      "<span class=\"eqt\">Glucose</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2352;&#2381;&#2325;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Brain get energy from glucose. Glucose, a form of sugar, is the primary source of energy for every cell in the body. Because the brain is so rich in nerve cells, or neurons, it is the most energy-demanding organ, using one-half of all the sugar energy in the body.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which part of the body is responsible for the manufacture of red blood cells?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2366;&#2354; &#2352;&#2325;&#2381;&#2340; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2352;&#2368;&#2352; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2306;&#2327; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Heart</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2371;&#2342;&#2351;</span>",
      "<span class=\"eqt\">Lungs</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2375;&#2347;&#2337;&#2364;&#2375;</span>",
      "<span class=\"eqt\">Bone marrow</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2381;&#2341;&#2367; &#2350;&#2332;&#2381;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Brain</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2360;&#2381;&#2340;&#2367;&#2359;&#2381;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Bone marrow</b> produces red blood cells that carry oxygen, white blood cells that prevent infection and platelets that control bleeding. The absence of bone marrow can be fatal since it's an essential part of your body. Bone marrow is spongy tissue in the middle of certain bones. Most blood cells are made in your bone marrow. This process is called haemopoiesis.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is essential to form hemoglobin in blood?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2352;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2361;&#2368;&#2350;&#2379;&#2327;&#2381;&#2354;&#2379;&#2348;&#2367;&#2344; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Fats</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2360;&#2366;</span>",
      "<span class=\"eqt\">Iron</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2352;&#2344;</span>",
      "<span class=\"eqt\">Calcium</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2354;&#2381;&#2360;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Protein</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Iron</b> is a mineral found in every cell of the body. Iron is considered an essential mineral because it is needed to make hemoglobin, a part of blood cells.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the cell that is amoeboid in shape.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2310;&#2325;&#2366;&#2352; &#2350;&#2375;&#2306; &#2309;&#2350;&#2368;&#2348;&#2366;&#2325;&#2371;&#2340;&#2367; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Nerve cell</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Columnar epithelial cell</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2340;&#2306;&#2349;&#2325;&#2366;&#2352; &#2313;&#2346;&#2325;&#2354;&#2366; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Red blood cell</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2354; &#2352;&#2325;&#2381;&#2340; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">White blood cell</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2357;&#2375;&#2340; &#2352;&#2325;&#2381;&#2340; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Contrary to their name, <b>white blood cells </b>are colorless but can appear as a very light purple to pink color when examined under a microscope and colored with dye. These extremely tiny cells have a round shape with a distinct center membrane (nucleus).</p>",
    "question_index": 16
