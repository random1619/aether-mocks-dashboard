    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The term 'natural increase of population' refers to the increase in population due to:</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;' &#2358;&#2348;&#2381;&#2342; &#2325;&#2366; &#2340;&#2366;&#2340;&#2381;&#2346;&#2352;&#2381;&#2351; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2360;&#2375; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Only the number of births.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2332;&#2344;&#2381;&#2350;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;.</span>",
      "<span class=\"eqt\">Only the number of deaths.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2350;&#2380;&#2340;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;.</span>",
      "<span class=\"eqt\">Only the net migration.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2358;&#2369;&#2342;&#2381;&#2343; &#2346;&#2381;&#2352;&#2357;&#2366;&#2360;&#2344;.</span>",
      "<span class=\"eqt\">The difference between birth rates and death rates.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2340;&#2352;.</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Natural increase of population is calculated by subtracting the death rate from the birth rate. It does <b>not</b> include migration. So, it's the <b>difference between births and deaths</b> in a population over a period of time.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The National Population Policy (NPP) 2000 in India aims to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2344;&#2368;&#2340;&#2367; (&#2319;&#2344;&#2346;&#2368;&#2346;&#2368;) 2000 &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Primarily focus on increasing the population size.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2346;&#2352; &#2343;&#2381;&#2351;&#2366;&#2344; &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Only address issues related to the elderly population.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2348;&#2369;&#2332;&#2369;&#2352;&#2381;&#2327; &#2310;&#2348;&#2366;&#2342;&#2368; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2350;&#2369;&#2342;&#2381;&#2342;&#2379;&#2306; &#2346;&#2352; &#2361;&#2368; &#2343;&#2381;&#2351;&#2366;&#2344; &#2342;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Promote responsible and planned parenthood and improve individual health and welfare.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2319;&#2357;&#2306; &#2344;&#2367;&#2351;&#2379;&#2332;&#2367;&#2340; &#2346;&#2367;&#2340;&#2371;&#2340;&#2381;&#2357; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366; &#2340;&#2341;&#2366; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2319;&#2357;&#2306; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Mandate a specific family size for all citizens.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2310;&#2325;&#2366;&#2352; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2375;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>NPP 2000</b> was introduced to address India's population challenges holistically. Its key objectives include:</p><p>&#183; <b>Promoting voluntary and informed choices</b> in family planning.</p><p>&#183; <b>Reducing infant/maternal mortality rates</b> through better healthcare access.</p><p>&#183; <b>Achieving population stabilization</b> by 2045 (not forced mandates).</p><p>&#183; <b>Empowering women</b> via education and reproductive health services.</p><p>Further information:</p><p>Population Policy in India</p><p>&#183; <b>National Population Policy 2000</b></p><p>The government policy adopted on February 15th, 2000, aimed to address immediate needs in contraception and healthcare infrastructure, integrate services for basic reproductive and child health care, achieve replacement-level Total Fertility Rate by 2010, and stabilize population growth by 2045.</p><p>However, the policy faced criticism for its narrow focus on contraception and sterilization at the expense of essential prerequisites like poverty alleviation, improving living standards, and enhancing education.</p><p>&#183; <b>Population Regulation Bill, 2019</b></p><p>The Population Regulation Bill of 2019, introduced by Member of Parliament Rakesh Sinha in July 2019, proposed penal measures for individuals with more than two living children. These penalties included potential disqualification from elected office, reduction in financial benefits, and decreased entitlements under the public distribution system.</p><p>&#183; <b>Uttar Pradesh Population (Control, Stabilization and Welfare) Bill, 2021</b></p><p>The proposed bill focuses on promoting a two-child policy, stipulating that individuals who do not comply within the state will face disqualification from contesting local elections, pursuing government positions, or receiving any form of sponsorship. Additionally, efforts will be made to stabilize the population through initiatives addressing infertility, reproductive health, and reducing maternal and infant mortality rates. The policy also aims to provide better support, healthcare, and nutrition to adolescents aged between 11 and 19 years, as well as elderly care services.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following continents accounts for the largest share of the world's population? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2350;&#2361;&#2366;&#2342;&#2381;&#2357;&#2368;&#2346; &#2350;&#2375;&#2306; &#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Europe</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2352;&#2379;&#2346;</span>",
      "<span class=\"eqt\">Africa</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2347;&#2381;&#2352;&#2368;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Asia</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2358;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">North America</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2309;&#2350;&#2375;&#2352;&#2367;&#2325;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Asia is the most populous continent, home to major population centers like <b>China and India</b>, which alone account for over a third of the global population. While Africa's population is growing rapidly, <b>Asia still holds the largest share</b>.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following factors:</p><p>A. Fertile soils </p><p>B. Extreme climate </p><p>C. Availability of minerals </p><p>D. Mountainous terrain. </p><p>Which of these are generally associated with higher population density?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>A. &#2313;&#2346;&#2332;&#2366;&#2314; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368;</p><p>B. &#2330;&#2352;&#2350; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369;</p><p>C. &#2326;&#2344;&#2367;&#2332;&#2379;&#2306; &#2325;&#2368; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2340;&#2366;</p><p>D. &#2346;&#2361;&#2366;&#2337;&#2364;&#2368; &#2311;&#2354;&#2366;&#2325;&#2366;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2313;&#2330;&#2381;&#2330; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2328;&#2344;&#2340;&#2381;&#2357; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">B and D only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B &#2324;&#2352; D</span>",
      "<span class=\"eqt\">A and B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2324;&#2352; B</span>",
      "<span class=\"eqt\">B, C, and D only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B, C, &#2324;&#2352; D</span>",
      "<span class=\"eqt\">A and C only.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2324;&#2352; C.</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Fertile soils</b> (A) support agriculture, leading to food security and dense settlements.</p><p><b>Availability of minerals</b> (C) encourages industrial development and job opportunities, attracting people.</p><p>In contrast, <b>extreme climates</b> (B) and <b>mountainous terrain</b> (D) are less favorable for large populations due to harsh living conditions and difficult access.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Match the term with its definition:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.Population Density</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. The difference between the birth rate and the death rate</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.Natural Growth Rate</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. The average number of years that an average person can expect to live</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.Emigration</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. The number of people living in a unit area of the earth's surface</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.Life Expectancy</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Migrants who move out of a place</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2348;&#2381;&#2342; &#2325;&#2379; &#2313;&#2360;&#2325;&#2368; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2366; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.&#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2328;&#2344;&#2340;&#2381;&#2357;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2342;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2324;&#2360;&#2340; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2332;&#2368;&#2344;&#2375; &#2325;&#2368; &#2309;&#2346;&#2375;&#2325;&#2381;&#2359;&#2367;&#2340; &#2324;&#2360;&#2340; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2313;&#2340;&#2381;&#2346;&#2381;&#2352;&#2357;&#2366;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2368; &#2360;&#2340;&#2361; &#2325;&#2375; &#2319;&#2325; &#2311;&#2325;&#2366;&#2312; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2352;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2332;&#2368;&#2357;&#2344; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2366;&#2358;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2346;&#2381;&#2352;&#2357;&#2366;&#2360;&#2368; &#2332;&#2379; &#2319;&#2325; &#2360;&#2381;&#2341;&#2366;&#2344; &#2360;&#2375; &#2348;&#2366;&#2361;&#2352; &#2330;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i &rarr; a, ii &rarr; b, iii &rarr; c, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; b, iii &rarr; c, iv &rarr; d</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; a, iii &rarr; d, iv &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; a, iii &rarr; d, iv &rarr; b</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; d, iii &rarr; a, iv &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; d, iii &rarr; a, iv &rarr; b</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; a, iii &rarr; d, iv &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; a, iii &rarr; d, iv &rarr; c</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Population Density is the number of people living in a unit area of the earth's surface.</p><p>&#183; The Natural Growth Rate is the difference between the birth rate and the death rate.</p><p>&#183; Emigration refers to migrants who move out of a place.</p><p>&#183; Life Expectancy is the average number of years that an average person can expect to live.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a geographical factor influencing population distribution? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2325;&#2366;&#2352;&#2325; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Availability of better housing</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2361;&#2340;&#2352; &#2310;&#2357;&#2366;&#2360; &#2325;&#2368; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Presence of religious significance</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Fertile soils suitable for agriculture</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2313;&#2346;&#2332;&#2366;&#2314; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Availability of employment opportunities</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2325;&#2375; &#2309;&#2357;&#2360;&#2352;&#2379;&#2306; &#2325;&#2368; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Fertile soils</b> are a <b>geographical factor</b> because they directly relate to the physical environment and natural resources. They support agriculture, making areas with fertile land more attractive for settlement.</p><p>&#183; <b>Better housing</b> is a <b>social</b> factor.</p><p>&#183; <b>Religious significance</b> is a <b>cultural</b> factor.</p><p>&#183; <b>Employment opportunities</b> are an <b>economic</b> factor.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The main cause of population change is the interplay between: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2325;&#2366;&#2352;&#2339; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2375; &#2348;&#2368;&#2330; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Birth rates and migration only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2346;&#2381;&#2352;&#2357;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Death rates and migration only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352; &#2324;&#2352; &#2346;&#2381;&#2352;&#2357;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Birth rates and death rates only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352;</span>",
      "<span class=\"eqt\">Birth rates, death rates, and migration</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2381;&#2350; &#2342;&#2352;, &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352; &#2324;&#2352; &#2346;&#2381;&#2352;&#2357;&#2366;&#2360;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Population change is driven by:</p><p>&#183; <b>Births</b> (increase population)</p><p>&#183; <b>Deaths</b> (decrease population)</p><p>&#183; <b>Migration</b> (both increase and decrease depending on whether it's immigration or emigration)</p><p>These three factors <b>together</b> determine how a population grows or shrinks over time.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>A high birth rate and a high death rate generally result in: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2330;&#2381;&#2330; &#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2313;&#2330;&#2381;&#2330; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352; &#2325;&#2366; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2351;&#2361; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Rapid population increase</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2357;&#2381;&#2352; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Population explosion</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2367;&#2360;&#2381;&#2347;&#2379;&#2335;</span>",
      "<span class=\"eqt\">Slow population growth</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2368;&#2350;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Population decrease</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>When both birth rates and death rates are high, the net population growth tends to be <b>slow</b>. </p><p>This demographic pattern is characteristic of the first stage of demographic transition, often seen in pre-industrial societies. In this scenario, while many children are born (high birth rate), many people also die (high death rate), resulting in only a small difference between births and deaths. </p><p>This small difference translates to <b>slow population growth</b>. </p><p>Option (A) is incorrect because rapid population increase occurs when birth rates are high but death rates are low. </p><p>Option (B) is incorrect as population explosion specifically refers to a sudden, rapid increase in population, which doesn't occur when death rates match high birth rates. </p><p>Option (D) is incorrect because population decrease would occur if death rates exceeded birth rates, not when they're both similarly high. </p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The Demographic Transition Theory suggests that as a society progresses from a rural agrarian to an urban industrial and literate one, it moves through stages characterized by changes in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2360;&#2366;&#2306;&#2326;&#2381;&#2351;&#2367;&#2325;&#2368; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2348;&#2340;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2332;&#2376;&#2360;&#2375;-&#2332;&#2376;&#2360;&#2375; &#2325;&#2379;&#2312; &#2360;&#2350;&#2366;&#2332; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2325;&#2371;&#2359;&#2367; &#2360;&#2375; &#2358;&#2361;&#2352;&#2368; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2324;&#2352; &#2360;&#2366;&#2325;&#2381;&#2359;&#2352; &#2360;&#2350;&#2366;&#2332; &#2325;&#2368; &#2323;&#2352; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376;, &#2357;&#2361; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2330;&#2352;&#2339;&#2379;&#2306; &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Resource availability and environmental quality.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2366;&#2343;&#2344; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2340;&#2366; &#2324;&#2352; &#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339; &#2327;&#2369;&#2339;&#2357;&#2340;&#2381;&#2340;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Birth rates and death rates.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352;.</span>",
      "<span class=\"eqt\">Migration patterns and occupational structures.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2357;&#2366;&#2360;&#2344; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2324;&#2352; &#2357;&#2381;&#2351;&#2366;&#2357;&#2360;&#2366;&#2351;&#2367;&#2325; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;&#2319;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Technological advancements and political systems.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2325;&#2344;&#2368;&#2325;&#2368; &#2346;&#2381;&#2352;&#2327;&#2340;&#2367; &#2324;&#2352; &#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2367;&#2351;&#2366;&#2305;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>Demographic Transition Theory</b> explains population changes over time in relation to economic and social development. As a society modernizes:</p><p>&#183; <b>Death rates decline</b> due to better healthcare and sanitation.</p><p>&#183; <b>Birth rates eventually decline</b> as education and urbanization increase.</p><p>This transition happens in stages and is mainly observed through <b>changing birth and death rates</b>.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>'Push' factors of migration are related to the:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2357;&#2366;&#2360; &#2325;&#2375; '&#2346;&#2369;&#2358;' &#2325;&#2366;&#2352;&#2325; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Attractiveness of the destination.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2340;&#2357;&#2381;&#2351; &#2325;&#2366; &#2310;&#2325;&#2352;&#2381;&#2359;&#2339;.</span>",
      "<span class=\"eqt\">Reasons for leaving the place of origin.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354; &#2360;&#2381;&#2341;&#2366;&#2344; &#2331;&#2379;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339;.</span>",
      "<span class=\"eqt\">Facilitation of movement between regions.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2310;&#2357;&#2366;&#2327;&#2350;&#2344; &#2325;&#2368; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Availability of resources in both origin and destination.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354; &#2319;&#2357;&#2306; &#2327;&#2306;&#2340;&#2357;&#2381;&#2351; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2346;&#2352; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2325;&#2368; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2340;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In migration theory, factors influencing population movement are categorized as either \"push\" or \"pull\" factors. </p><p><b>Push factors</b> specifically refer to conditions that drive people to leave their place of origin or current residence. These include negative circumstances such as unemployment, political persecution, armed conflict, natural disasters, food scarcity, and poor living conditions. </p><p>Further information:</p><p>a structured table outlining the <b>push and pull factors of migration</b>:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Push Factors (Reasons to leave a place)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Pull Factors (Reasons to move to a place)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1. Economic</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1. Economic</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Poverty/lack of jobs</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Better job opportunities</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Low wages</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Higher wages/salaries</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Economic instability</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Economic stability/growth</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>2. Social</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>2. Social</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Lack of education/healthcare</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Access to quality education/healthcare</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Discrimination/persecution</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Social equality/acceptance</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Poor living conditions</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Better living standards</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>3. Political</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>3. Political</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- War/conflict</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Political stability/safety</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Oppressive government</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Democratic freedoms</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Human rights violations</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Protection of rights</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>4. Environmental</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>4. Environmental</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Natural disasters (floods, droughts)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Favorable climate</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Pollution/environmental degradation</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Clean environment</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Scarcity of resources (water, land)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Abundant natural resources</td></tr></table><p><b>Key Notes:</b></p><p>&#183; <b>Push factors</b> drive people away from their home region.</p><p>&#183; <b>Pull factors</b> attract migrants to a new location.</p><p>&#183; Often, migration results from a <b>combination</b> of these factors (e.g., fleeing war <i>and</i> seeking jobs).</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>A country with a high rate of population growth is likely to face challenges related to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2330;&#2381;&#2330; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2342;&#2352; &#2357;&#2366;&#2354;&#2375; &#2342;&#2375;&#2358; &#2325;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2330;&#2369;&#2344;&#2380;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2360;&#2366;&#2350;&#2344;&#2366; &#2325;&#2352;&#2344;&#2366; &#2346;&#2337;&#2364; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Surplus of resources and low demand for jobs.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2325;&#2366; &#2309;&#2343;&#2367;&#2358;&#2375;&#2359; &#2324;&#2352; &#2344;&#2380;&#2325;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2350; &#2350;&#2366;&#2306;&#2327;&#2404;</span>",
      "<span class=\"eqt\">Underutilization of infrastructure and public services.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2344;&#2367;&#2351;&#2366;&#2342;&#2368; &#2338;&#2366;&#2306;&#2330;&#2375; &#2324;&#2352; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2325;&#2350; &#2313;&#2346;&#2351;&#2379;&#2327;&#2404;</span>",
      "<span class=\"eqt\">Increased pressure on limited resources and potential socio-economic problems.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2350;&#2367;&#2340; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2346;&#2352; &#2348;&#2338;&#2364;&#2340;&#2366; &#2342;&#2348;&#2366;&#2357; &#2324;&#2352; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325;-&#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366;&#2319;&#2305;&#2404;</span>",
      "<span class=\"eqt\">A large proportion of elderly population requiring extensive healthcare.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2332;&#2369;&#2352;&#2381;&#2327; &#2310;&#2348;&#2366;&#2342;&#2368; &#2325;&#2375; &#2319;&#2325; &#2348;&#2337;&#2364;&#2375; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375; &#2325;&#2379; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2342;&#2375;&#2326;&#2349;&#2366;&#2354; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A country experiencing high population growth typically faces <b>increased pressure on limited resources and potential socio-economic problems</b>. Rapid population growth often leads to resource scarcity (including food, water, and energy), environmental degradation, housing shortages, and strain on public services such as education and healthcare. It can also create challenges in providing adequate employment opportunities for a growing workforce. </p><p>Option (A) is incorrect because high population growth typically leads to resource scarcity and increased job competition, not surplus. </p><p>Option (B) is incorrect as infrastructure and public services tend to be overutilized rather than underutilized in rapidly growing populations. </p><p>Option (D) is incorrect because high population growth rates usually result in a young age structure with a high proportion of children and working-age adults, not elderly people (aging populations are more characteristic of countries with low birth rates and low population growth).</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>A population pyramid is used to show the: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2344;&#2367;&#2350;&#2381;&#2344; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Population density of a country</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2342;&#2375;&#2358; &#2325;&#2366; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2328;&#2344;&#2340;&#2381;&#2357;</span>",
      "<span class=\"eqt\">Rate of population growth over time</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2351; &#2325;&#2375; &#2360;&#2366;&#2341; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2342;&#2352;</span>",
      "<span class=\"eqt\">Age and sex composition of a population</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2368; &#2310;&#2351;&#2369; &#2324;&#2352; &#2354;&#2367;&#2306;&#2327; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Occupational structure of a population</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2357;&#2360;&#2366;&#2351;&#2367;&#2325; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A population pyramid (also called an age-sex pyramid) is a graphical representation that shows the distribution of various age groups in a population, typically with males on one side and females on the other. </p><p>The shape of the pyramid can tell us about the population's growth rate, life expectancy, and fertility rates.</p><p>Population density, rate of growth over time, and occupational structure are all important demographic indicators, but they are not what population pyramids specifically illustrate.</p><p>A broad base signifies a high number of births, and a rapidly narrowing top indicates a large percentage of deaths, particularly in infancy, and fewer people reaching old age.</p><p>Further information:</p><p><b>Key Features of population pyramid:</b></p><p><b>Expansive</b>:</p><p>o Youth-heavy (broad base) &rarr; High dependency ratio.</p><p>o Typical of <b>developing nations</b> (e.g., Sub-Saharan Africa).</p><p><b>Stationary</b>:</p><p>o Balanced age groups &rarr; Sustainable workforce.</p><p>o Seen in <b>developed economies</b> with stable fertility (~2.1 children/woman).</p><p><b>Constrictive</b>:</p><p>o Elderly-dominated (narrow base) &rarr; Aging crisis.</p><p>o Common in <b>post-industrial societies</b> (e.g., Japan's \"inverted pyramid\").</p><p><b>Visualization:</b></p><p>&#183; <b>&#9650;</b><b> Expansive</b> (Triangle): High birth rates.</p><p>&#183; <b>&#128276;</b><b> Stationary</b> (Bell): Balanced replacement.</p><p>&#183; <b>&#9905;&#65039;</b><b> Constrictive</b> (Urn): Low fertility, aging population.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a major component of population change?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2328;&#2335;&#2325; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Births</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Deaths</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2340;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Migration</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2357;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Literacy</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2325;&#2381;&#2359;&#2352;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The <b>three major components of population change</b> are:</p><p>i. <b>Births</b> (fertility rate)</p><p>ii. <b>Deaths</b> (mortality rate)</p><p>iii. <b>Migration</b> (immigration/emigration).</p><p><b>Literacy</b> is a demographic <i>characteristic</i> (like age or gender) but does not directly alter population size or composition.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>The number of dependents in a country includes: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2310;&#2358;&#2381;&#2352;&#2367;&#2340;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;: </p></span>",
    "options": [
      "<span class=\"eqt\">Only young people below 15 years</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 15 &#2357;&#2352;&#2381;&#2359; &#2360;&#2375; &#2325;&#2350; &#2310;&#2351;&#2369; &#2325;&#2375; &#2351;&#2369;&#2357;&#2366;</span>",
      "<span class=\"eqt\">Only elderly people above 65 years</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 65 &#2357;&#2352;&#2381;&#2359; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2310;&#2351;&#2369; &#2325;&#2375; &#2348;&#2369;&#2332;&#2369;&#2352;&#2381;&#2327; &#2354;&#2379;&#2327;</span>",
      "<span class=\"eqt\">Both young people below 15 years and elderly people above 65 years</span><span class=\"hqt\" style=\"display:none\">15 &#2357;&#2352;&#2381;&#2359; &#2360;&#2375; &#2325;&#2350; &#2310;&#2351;&#2369; &#2325;&#2375; &#2351;&#2369;&#2357;&#2366; &#2324;&#2352; 65 &#2357;&#2352;&#2381;&#2359; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2310;&#2351;&#2369; &#2325;&#2375; &#2348;&#2369;&#2332;&#2369;&#2352;&#2381;&#2327; &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only people who are unemployed</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2357;&#2375; &#2354;&#2379;&#2327; &#2332;&#2379; &#2348;&#2375;&#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Dependency ratio</b> measures the economically inactive population reliant on the working-age group (15 - 64 years).</p><p>&#183; It includes:</p><p>o <b>Youth dependents</b> (&lt;15 years)</p><p>o <b>Elderly dependents</b> (&gt;65 years).</p><p>&#183; Unemployment is <i>not</i> a criterion for dependency.</p><p><b>Key Terms:</b></p><p>&#183; <b>Population Change</b>: Driven by births, deaths, and migration.</p><p>&#183; <b>Dependency Ratio</b>: Reflects societal burden (e.g., high youth dependency in growing populations).</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Industrial areas tend to be densely populated due to: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2328;&#2344;&#2368; &#2310;&#2348;&#2366;&#2342;&#2368; &#2361;&#2379;&#2344;&#2375; &#2325;&#2366; &#2325;&#2366;&#2352;&#2339; &#2351;&#2361; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Availability of fresh water sources</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2332;&#2375; &#2332;&#2354; &#2360;&#2381;&#2352;&#2379;&#2340;&#2379;&#2306; &#2325;&#2368; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Presence of mineral deposits only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2326;&#2344;&#2367;&#2332; &#2349;&#2306;&#2337;&#2366;&#2352; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Opportunities for employment</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2325;&#2375; &#2309;&#2357;&#2360;&#2352;</span>",
      "<span class=\"eqt\">Favourable climatic conditions</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369; &#2346;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Industrial areas attract dense populations primarily because they offer <b>job opportunities</b> in factories, trade, and services. This leads to migration and urban growth.</p><p>&#183; <b>Fresh water sources</b>: While important, they are not the <i>primary</i> reason for density in industrial zones.</p><p>&#183; <b>Mineral deposits</b>: These drive industrial location but don't directly cause population density unless jobs are created.</p><p>&#183; <b>Climatic conditions</b>: Industries often thrive even in harsh climates (e.g., steel plants in Jharkhand).</p><p><b>Economic pull factor</b>: People cluster where livelihoods are available, making employment the strongest driver of density in industrial regions.</p><p>Examples:</p><p>&#183; <b>Mumbai</b> (textile/finance jobs)</p><p>&#183; <b>Detroit</b> (historically, auto industry jobs)</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following factors can lead to rural-to-urban migration? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2366;&#2352;&#2325; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2360;&#2375; &#2358;&#2361;&#2352;&#2368; &#2346;&#2381;&#2352;&#2357;&#2366;&#2360; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lack of employment opportunities in urban areas</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2361;&#2352;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2325;&#2375; &#2309;&#2357;&#2360;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Poor living conditions in cities</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2361;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2361;&#2344;&#2375; &#2325;&#2368; &#2326;&#2352;&#2366;&#2348; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Better educational and health facilities in urban areas</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2361;&#2352;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2375;&#2361;&#2340;&#2352; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2324;&#2352; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Socio-political unrest in urban centers</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2361;&#2352;&#2368; &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325;-&#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2309;&#2358;&#2366;&#2306;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Rural-to-urban migration occurs when people move from rural areas to cities, and one of the primary \"pull factors\" drawing people to urban areas is the availability of better educational and health facilities. </p><p>Cities typically offer more schools, universities, hospitals, and specialized medical care compared to rural regions.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following correctly defines 'population doubling time'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; '&#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2361;&#2379;&#2344;&#2375; &#2325;&#2366; &#2360;&#2350;&#2351;' &#2325;&#2379; &#2360;&#2361;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The period required for a country's population to increase by 100%.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2342;&#2375;&#2358; &#2325;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; 100% &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2309;&#2357;&#2343;&#2367;&#2404;</span>",
      "<span class=\"eqt\">The time it takes for the birth rate to double.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2325;&#2379; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2361;&#2379;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351;&#2404;</span>",
      "<span class=\"eqt\">The time taken by any population to double itself at its current annual growth rate.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2309;&#2346;&#2344;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2342;&#2352; &#2360;&#2375; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2361;&#2379;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351;&#2404;</span>",
      "<span class=\"eqt\">The period over which the population growth rate doubles.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2309;&#2357;&#2343;&#2367; &#2332;&#2367;&#2360;&#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2342;&#2352; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Population doubling time is a demographic concept that calculates how long it would take for a population to double in size if it continues growing at its current rate.</p><p>It's a useful metric for understanding population growth dynamics and making comparisons between different populations or regions.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>A country with improving healthcare and falling death rates, while birth rates remain high, will likely experience: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2367;&#2360; &#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2360;&#2375;&#2357;&#2366; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2361;&#2379; &#2352;&#2361;&#2366; &#2361;&#2379; &#2324;&#2352; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352; &#2350;&#2375;&#2306; &#2327;&#2367;&#2352;&#2366;&#2357;&#2335; &#2310; &#2352;&#2361;&#2368; &#2361;&#2379;, &#2332;&#2348;&#2325;&#2367; &#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2314;&#2306;&#2330;&#2368; &#2348;&#2344;&#2368; &#2361;&#2369;&#2312; &#2361;&#2379;, &#2357;&#2361;&#2366;&#2306; &#2360;&#2306;&#2349;&#2357;&#2340;&#2307; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2344;&#2369;&#2349;&#2357; &#2361;&#2379;&#2306;&#2327;&#2375;: </p></span>",
    "options": [
      "<span class=\"eqt\">A decrease in population</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Slow population growth</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2368;&#2350;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">High population growth rates</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2342;&#2352;</span>",
      "<span class=\"eqt\">A stable population</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>When a country experiences:</p><p>&#183; <b>Falling death rates</b> (due to better healthcare, nutrition, sanitation)</p><p>&#183; <b>High birth rates</b> (remaining unchanged),</p><p>this creates a <b>demographic gap</b> where births significantly outnumber deaths, leading to <b>rapid population growth</b>.</p><p><b>Why Not Other Options?</b></p><p>&#183; <b> Decrease in population</b>: Impossible if deaths decline and births stay high.</p><p>&#183; <b>Slow growth</b>: Only occurs if birth rates <i>also</i> fall (e.g., later stages of demographic transition).</p><p>&#183; <b>Stable population</b>: Requires low/balanced birth and death rates (e.g., Stage 4 of demographic transition).</p><p><b>Real-World Example:</b></p><p>Many <b>Sub-Saharan African</b> and <b>South Asian</b> countries (e.g., Niger, Afghanistan) currently exhibit this pattern, resulting in <b>youthful populations</b> and high growth.</p><p><b>Key Theory:</b></p><p>This aligns with <b>Stage 2 of the Demographic Transition Model (DTM)</b>, where societies move from high to declining mortality while fertility remains high.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>The term 'human resource' emphasizes that people are: </p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2350;&#2366;&#2344;&#2357; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344;' &#2358;&#2348;&#2381;&#2342; &#2311;&#2360; &#2348;&#2366;&#2340; &#2346;&#2352; &#2332;&#2379;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2354;&#2379;&#2327;: </p></span>",
    "options": [
      "<span class=\"eqt\">Equally skilled and motivated</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2366;&#2344; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2369;&#2358;&#2354; &#2324;&#2352; &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340;</span>",
      "<span class=\"eqt\">Liabilities to a nation's development</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2325;&#2375; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2366;&#2351;&#2367;&#2340;&#2381;&#2357;</span>",
      "<span class=\"eqt\">Assets that can contribute to development</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2325;&#2366;&#2360; &#2350;&#2375;&#2306; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2342;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2366;&#2305;</span>",
      "<span class=\"eqt\">Dependent on natural resources only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The term <b>\"human resource\"</b> highlights that people are:</p><p>&#183; <b>Valuable assets</b> (not liabilities) who drive economic/social progress through skills, innovation, and labor.</p><p>&#183; <b>Active contributors</b> to development when educated, healthy, and empowered (e.g., Japan's skilled workforce boosting its economy).</p><p>Investments in <b>education, healthcare, and training</b> transform people into productive human resources, fueling national development.</p><p>Example:</p><p>&#183; <b>South Korea's</b> focus on education turned its population into a high-tech workforce.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>Match the stage of demographic transition with its population characteristics: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Stage I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Low birth and death rates, stable or slow growth</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Stage II</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. High birth rate and declining death rate, rapid growth</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Stage III</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. High birth and death rates, slow or stagnant growth</td></tr></table><p>Choose the correct match:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2360;&#2366;&#2306;&#2326;&#2381;&#2351;&#2367;&#2325;&#2368;&#2351; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339; &#2325;&#2375; &#2330;&#2352;&#2339; &#2325;&#2379; &#2313;&#2360;&#2325;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2323;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2330;&#2352;&#2339; I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2325;&#2350; &#2332;&#2344;&#2381;&#2350; &#2324;&#2352; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352;, &#2360;&#2381;&#2341;&#2367;&#2352; &#2351;&#2366; &#2343;&#2368;&#2350;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2330;&#2352;&#2339; II</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2313;&#2330;&#2381;&#2330; &#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2328;&#2335;&#2340;&#2368; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352;, &#2340;&#2368;&#2357;&#2381;&#2352; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2330;&#2352;&#2339; III</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2313;&#2330;&#2381;&#2330; &#2332;&#2344;&#2381;&#2350; &#2324;&#2352; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352;, &#2343;&#2368;&#2350;&#2368; &#2351;&#2366; &#2360;&#2381;&#2341;&#2367;&#2352; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</td></tr></table><p>&#2360;&#2361;&#2368; &#2350;&#2367;&#2354;&#2366;&#2344; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">a-i, b-ii, c-iii</span><span class=\"hqt\" style=\"display:none\">a-i, b-ii, c-iii</span>",
      "<span class=\"eqt\">a-ii, b-iii, c-i</span><span class=\"hqt\" style=\"display:none\">a-ii, b-iii, c-i</span>",
      "<span class=\"eqt\">a-iii, b-ii, c-i.</span><span class=\"hqt\" style=\"display:none\">a-iii, b-ii, c-i.</span>",
      "<span class=\"eqt\">a-i, b-iii, c-ii</span><span class=\"hqt\" style=\"display:none\">a-i, b-iii, c-ii</span>"

    "solution": "<p><b>Demographic Transition Model (DTM) stages:</b></p><p>Stage I (Pre-transition): Both birth and death rates are high, leading to slow or stagnant overall population growth </p><p>Stage II (Early transition): Death rates begin falling (due to improved healthcare, sanitation, etc.) while birth rates remain high, causing rapid population growth </p><p>Stage III (Late transition): Birth rates also begin to fall, gradually approaching the low death rates, resulting in slower, more stable population growth</p><p>Stage IV: Balanced low birth/death rates (possible aging population).</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Stage</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Birth Rate</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Death Rate</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Population Growth</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Example (Historical/Current)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Stage I (High Stationary)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">High</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">High</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Very Slow/Stagnant</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Pre-industrial societies (e.g., 18th-century Europe)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Stage II (Early Expanding)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">High</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rapidly Declining</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rapid Increase</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Developing countries (e.g., India 1950s-1980s)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Stage III (Late Expanding)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Declining</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Low (Stable)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Slowing Growth</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Emerging economies (e.g., Brazil, China today)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Stage IV (Low Stationary)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Low</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Low</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Stable/Declining</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Developed nations (e.g., Japan, Germany)</td></tr></table><p></p>",
