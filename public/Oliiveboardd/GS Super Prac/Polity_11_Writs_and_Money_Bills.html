<body>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which writ is issued by a High Court or Supreme Court when a lower court has considered a case going beyond its jurisdiction?</p></span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2351;&#2366; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2380;&#2344; &#2360;&#2368; &#2352;&#2367;&#2335; &#2340;&#2348; &#2332;&#2366;&#2352;&#2368; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2332;&#2348; &#2344;&#2367;&#2330;&#2354;&#2368; &#2309;&#2342;&#2366;&#2354;&#2340; &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2375; &#2348;&#2366;&#2361;&#2352; &#2325;&#2375; &#2350;&#2366;&#2350;&#2354;&#2375; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2361;&#2379;?</span>",
    "options": [
      "<span class=\"eqt\">Quo Warranto</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2346;&#2371;&#2330;&#2381;&#2331;&#2366;</span>",
      "<span class=\"eqt\">Habeas Corpus</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2342;&#2368; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359;&#2368;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Prohibition</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2375;&#2343;</span>",
      "<span class=\"eqt\">Certiorari</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2350;&#2366;&#2339; &#2346;&#2340;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A Prohibition writ is a legal remedy issued by a higher court (high court or supreme court) when a lower court has exceeded its jurisdiction or is attempting to proceed with a case beyond its legal authority. This judicial instrument serves as a critical check and balance mechanism in the legal system, preventing lower courts from overstepping their prescribed legal boundaries. When a lower court starts to adjudicate a matter that is outside its competence or violates fundamental legal principles, the higher court can intervene through this writ. By issuing a Prohibition writ, the superior court effectively stops the lower court from continuing proceedings that are deemed improper or illegal. </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>With reference to the Money Bills in the Parliament, which of the following statements is INCORRECT?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2360;&#2342; &#2350;&#2375;&#2306; &#2343;&#2344; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The Lok Sabha can either accept or reject all or any of the recommendations of the Rajya Sabha.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2325;&#2368; &#2360;&#2349;&#2368; &#2351;&#2366; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358; &#2325;&#2379; &#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2351;&#2366; &#2309;&#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It can be introduced only in the Lok Sabha.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2375; &#2325;&#2375;&#2357;&#2354; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2346;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It can be rejected or amended by the Rajya Sabha.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2349;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2360;&#2381;&#2357;&#2368;&#2325;&#2371;&#2340; &#2351;&#2366; &#2360;&#2306;&#2358;&#2379;&#2343;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It can only be introduced by a minister and not by a private member.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2375; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2344; &#2325;&#2367; &#2319;&#2325; &#2344;&#2367;&#2332;&#2368; &#2360;&#2342;&#2360;&#2381;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Lok Sabha exercises more powers in money matters. Once the Lok Sabha passes the budget of the government or any other money related law, the <b>Rajya Sabha cannot reject it.</b> The Rajya Sabha can only delay it by 14 days or suggest changes in it.</p><p>A Money Bill can be introduced in Lok Sabha only. If any question arises whether a Bill is a Money Bill or not, the decision of Speaker thereon is final. The Speaker is under no obligation to consult any one in coming to a decision or in giving certificate that a Bill is a Money Bill.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In which year was the Estimates Committee constituted for the first time in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2368; &#2348;&#2366;&#2352; &#2346;&#2381;&#2352;&#2366;&#2325;&#2381;&#2325;&#2354;&#2344; &#2360;&#2350;&#2367;&#2340;&#2367; &#2325;&#2366; &#2327;&#2336;&#2344; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1948</span><span class=\"hqt\" style=\"display:none\">1948</span>",
      "<span class=\"eqt\">1950</span><span class=\"hqt\" style=\"display:none\">1950</span>",
      "<span class=\"eqt\">1947</span><span class=\"hqt\" style=\"display:none\">1947</span>",
      "<span class=\"eqt\">1949</span><span class=\"hqt\" style=\"display:none\">1949</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Committee on Estimates, constituted for the first time in <b>1950</b>, is a Parliamentary Committee consisting of 30 members, elected every year by the Lok Sabha from amongst its Members. The Chairperson of the Committee is appointed by the Speaker from amongst its members. A Minister cannot be elected as a member of the Committee and if a member after selection to the Committee is appointed a Minister, the member ceases to be a Member of the Committee from the date of such appointment.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is constituted under Article 280 of the Constitution of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 280 &#2325;&#2375; &#2340;&#2361;&#2340; &#2327;&#2336;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Advocate General</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2337;&#2357;&#2379;&#2325;&#2375;&#2335; &#2332;&#2344;&#2352;&#2354;</span>",
      "<span class=\"eqt\">Central Vigilance Commission</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2360;&#2340;&#2352;&#2381;&#2325;&#2340;&#2366; &#2310;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">Finance Commission</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2340;&#2381;&#2340; &#2310;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">National Commission for Women</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2350;&#2361;&#2367;&#2354;&#2366; &#2310;&#2351;&#2379;&#2327;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Finance Commission is constituted under Article 280 of the Constitution of India.</p><p>The President shall, within two years from the commencement of this Constitution and thereafter at the expiration of every fifth year or at such earlier time as the President considers necessary, by order <b>constitute a Finance Commission</b> which shall consist of a Chairman and four other members to be appointed by the President.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>UPSC is a Constitutional Body to conduct examinations for appointments to the services of the Union and the services of the State, respectively, under Article ________.</p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2346;&#2368;&#2319;&#2360;&#2360;&#2368; &#2319;&#2325; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2344;&#2367;&#2325;&#2366;&#2351; &#2361;&#2376; &#2332;&#2379; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; ________ &#2325;&#2375; &#2340;&#2361;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2360;&#2306;&#2328; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">320</span><span class=\"hqt\" style=\"display:none\">320</span>",
      "<span class=\"eqt\">324</span><span class=\"hqt\" style=\"display:none\">324</span>",
      "<span class=\"eqt\">328</span><span class=\"hqt\" style=\"display:none\">328</span>",
      "<span class=\"eqt\">332</span><span class=\"hqt\" style=\"display:none\">332</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Article 320 of the Indian Constitution deals with the functions of the Union Public Service Commission (UPSC) and State Public Service Commissions. It mandates these bodies to conduct examinations for appointments to civil services and advise on recruitment policies.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The Supreme Court of India comprises the Chief Justice and not more than ______ other Judges appointed by the President of India. </p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; ______ &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2309;&#2344;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">37</span><span class=\"hqt\" style=\"display:none\">37</span>",
      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>",
      "<span class=\"eqt\">33</span><span class=\"hqt\" style=\"display:none\">33</span>",
      "<span class=\"eqt\">38</span><span class=\"hqt\" style=\"display:none\">38</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Supreme Court of India comprises the Chief Justice and not more than 33 other Judges appointed by the President of India.</p><p>This means the total number of judges in the Supreme Court, including the Chief Justice, can be up to 34. The number of judges can be increased or decreased by parliamentary law, but the current sanctioned strength is 34.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following is NOT a member of the National Human Rights Commission (NHRC)?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2350;&#2366;&#2344;&#2357;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2310;&#2351;&#2379;&#2327; (&#2319;&#2344;&#2319;&#2330;&#2310;&#2352;&#2360;&#2368;) &#2325;&#2366; &#2360;&#2342;&#2360;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">District Magistrate</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2367;&#2354;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Former Chief Justice of the High Court</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>",
      "<span class=\"eqt\">Former Chief Justice of the Supreme Court</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>",
      "<span class=\"eqt\">Former Judge of the Supreme Court</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2346;&#2381;&#2352;&#2368;&#2350; &#2325;&#2379;&#2352;&#2381;&#2335; &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The National Human Rights Commission (NHRC) comprises:</p><p>&bull; Chairperson: A former Chief Justice of India</p><p>&bull; Members: A former Supreme Court judge, a former High Court Chief Justice, and experts in human rights</p><p>&bull; Ex-officio members from commissions like SC/ST, Women, and Minorities</p><p>A District Magistrate (DM) is not part of NHRC but may assist in implementing human rights-related measures at the local level.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>In which of the following years was the Election Commission of India founded?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2330;&#2369;&#2344;&#2366;&#2357; &#2310;&#2351;&#2379;&#2327; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</span>",
    "options": [
      "<span class=\"eqt\">1955</span><span class=\"hqt\" style=\"display:none\">1955</span>",
      "<span class=\"eqt\">1952</span><span class=\"hqt\" style=\"display:none\">1952</span>",
      "<span class=\"eqt\">1950</span><span class=\"hqt\" style=\"display:none\">1950</span>",
      "<span class=\"eqt\">1947</span><span class=\"hqt\" style=\"display:none\">1947</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Election Commission of India was established on January 25, 1950, just a day before India became a republic. It is a constitutional body under Article 324 of the Indian Constitution.</p>",
    "question_index": 7
