    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The exchange of O&#8322; from the atmosphere with CO&#8322; produced by the cells is called: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; CO&#8322; &#2325;&#2375; &#2360;&#2366;&#2341; &#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2360;&#2375; O&#8322; &#2325;&#2366; &#2310;&#2342;&#2366;&#2344;-&#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2361;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Cellular respiration</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2358;&#2367;&#2325;&#2368;&#2351; &#2358;&#2381;&#2357;&#2360;&#2344;</span>",
      "<span class=\"eqt\">Breathing</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2305;&#2360; &#2354;&#2375;&#2344;&#2375;</span>",
      "<span class=\"eqt\">Circulation</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2360;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Metabolism</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2351;&#2366;&#2346;&#2330;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The exchange of O&#8322; from the atmosphere with CO&#8322; produced by the cells is called breathing.</p><p>This process specifically refers to the exchange of gases between our body and the external environment, where we inhale oxygen from the atmosphere and exhale carbon dioxide produced by our cells. </p><p>While cellular respiration, circulation, and metabolism are all related processes, breathing (also called external respiration or ventilation) is the specific term for this gas exchange function.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct regarding human respiration?</p><p>I. The exchange of O&#8322; and CO&#8322; in lower invertebrates like sponges occurs through gills.</p><p>II. The diaphragm contracts during inspiration, increasing the volume of the thoracic chamber.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2350;&#2366;&#2344;&#2357; &#2358;&#2381;&#2357;&#2360;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2360;&#2381;&#2346;&#2306;&#2332; &#2332;&#2376;&#2360;&#2375; &#2344;&#2367;&#2330;&#2354;&#2375; &#2309;&#2325;&#2358;&#2375;&#2352;&#2369;&#2325;&#2368; &#2332;&#2368;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306; O&#8322; &#2324;&#2352; CO&#8322; &#2325;&#2366; &#2310;&#2342;&#2366;&#2344;-&#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2327;&#2367;&#2354;&#2381;&#2360; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2360;&#2366;&#2305;&#2360; &#2354;&#2375;&#2344;&#2375; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2337;&#2366;&#2351;&#2366;&#2347;&#2381;&#2352;&#2366;&#2350; &#2360;&#2367;&#2325;&#2369;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2357;&#2325;&#2381;&#2359;&#2368;&#2351; &#2325;&#2325;&#2381;&#2359; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Statement I  -  Incorrect:</b></p><p>In <b>lower invertebrates like sponges</b>, <b>respiration occurs through simple diffusion across their body surface</b>, <b>not through gills</b>. Gills are found in more complex aquatic animals like fish and some arthropods.</p><p><b>Statement II  -  Correct:</b></p><p>During <b>inspiration (inhalation)</b> in human respiration, the <b>diaphragm contracts and moves downward</b>, which <b>increases the volume</b> of the <b>thoracic cavity</b> and allows the lungs to expand as air is drawn in.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct about human blood? </p><p>I. Plasma constitutes nearly 45 per cent of the blood and contains formed elements.</p><p>II. Erythrocytes in most mammals are devoid of a nucleus and are biconcave in shape.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2350;&#2366;&#2344;&#2357; &#2352;&#2325;&#2381;&#2340; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2346;&#2381;&#2354;&#2366;&#2332;&#2381;&#2350;&#2366; &#2352;&#2325;&#2381;&#2340; &#2325;&#2366; &#2354;&#2327;&#2349;&#2327; 45 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2340;&#2340;&#2381;&#2357; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2360;&#2381;&#2340;&#2344;&#2343;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2352;&#2367;&#2341;&#2381;&#2352;&#2379;&#2360;&#2366;&#2311;&#2335;&#2381;&#2360; &#2344;&#2366;&#2349;&#2367;&#2325; &#2360;&#2375; &#2352;&#2361;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2310;&#2325;&#2366;&#2352; &#2350;&#2375;&#2306; &#2313;&#2349;&#2351;&#2354;&#2367;&#2306;&#2327;&#2368; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Statement I  -  Incorrect:</b></p><p><b>Plasma</b> actually constitutes about <b>55%</b> of human blood, not 45%. It is the <b>fluid portion</b> and does <b>not contain the formed elements</b> (RBCs, WBCs, and platelets); rather, the <b>formed elements make up about 45%</b> of the blood.</p><p><b>Statement II  -  Correct:</b></p><p><b>Erythrocytes (red blood cells)</b> in most mammals, including humans, are <b>biconcave</b> in shape and <b>lack a nucleus</b>, which helps increase surface area for gas exchange.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following blood cells is most abundant and plays a significant role in the transport of respiratory gases? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2352;&#2325;&#2381;&#2340; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2330;&#2369;&#2352; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2358;&#2381;&#2357;&#2360;&#2344; &#2327;&#2376;&#2360;&#2379;&#2306; &#2325;&#2375; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344; &#2350;&#2375;&#2306; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2344;&#2367;&#2349;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Leucocytes</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2381;&#2351;&#2370;&#2325;&#2379;&#2360;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">Platelets</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2375;&#2335;&#2354;&#2375;&#2335;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Erythrocytes</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2352;&#2367;&#2341;&#2381;&#2352;&#2379;&#2360;&#2366;&#2311;&#2335;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Thrombocytes</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2381;&#2352;&#2379;&#2350;&#2381;&#2348;&#2379;&#2360;&#2366;&#2311;&#2335;&#2381;&#2360;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Erythrocytes (Red Blood Cells)</b> are the <b>most abundant</b> blood cells and are primarily responsible for the <b>transport of respiratory gases</b>  -  <b>oxygen</b> and <b>carbon dioxide</b>.</p><p>They contain <b>hemoglobin</b>, a protein that binds to oxygen in the lungs and delivers it to tissues throughout the body.</p><p>Further information:</p><p><b>Leucocytes (White Blood Cells)</b></p><p>&#183; <b>Function:</b> Defend the body against <b>infections</b> and <b>foreign invaders</b>.</p><p>&#183; <b>Types include:</b> Neutrophils, lymphocytes, monocytes, eosinophils, and basophils.</p><p>&#183; <b>Not involved in gas transport</b>, but crucial for <b>immunity</b>.</p><p>&#183; <b>Much fewer in number</b> compared to erythrocytes.</p><p><b>Platelets</b></p><p>&#183; Also called <b>thrombocytes</b> in general terminology (though option 4 mentions them separately).</p><p>&#183; <b>Function:</b> Help in <b>blood clotting</b> (coagulation) to prevent blood loss during injuries.</p><p>&#183; <b>Do not carry oxygen or CO&#8322;</b>.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Plasma without the clotting factors is called: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2341;&#2325;&#2381;&#2325;&#2375; &#2348;&#2344;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366; &#2346;&#2381;&#2354;&#2366;&#2332;&#2381;&#2350;&#2366; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Lymph</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2360;&#2368;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Serum</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2352;&#2350;</span>",
      "<span class=\"eqt\">Tissue fluid</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2340;&#2325; &#2342;&#2381;&#2352;&#2357;</span>",
      "<span class=\"eqt\">Blood</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2370;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Plasma without the clotting factors is called serum.</p><p>&#183; <b>Serum</b> is the <b>fluid part of blood</b> that remains <b>after clotting</b> has occurred.</p><p>&#183; It is essentially <b>plasma minus the clotting factors</b> (like fibrinogen).</p><p>&#183; Serum contains <b>electrolytes, hormones, antibodies</b>, and other proteins  -  <b>but no clotting agents</b>.</p><p>Further information:</p><p>&#183; <b>Lymph:</b></p><p>A clear fluid that circulates in the lymphatic system, formed from interstitial fluid. It contains <b>white blood cells</b>, especially <b>lymphocytes</b>, and helps in <b>immune responses</b>.</p><p>&#183; <b>Tissue fluid (Interstitial fluid):</b></p><p>Fluid that surrounds the body's cells, derived from plasma. It helps in the <b>exchange of nutrients and waste</b> between blood and tissues.</p><p>&#183; <b>Blood:</b></p><p>A connective tissue composed of <b>plasma + formed elements</b> (RBCs, WBCs, platelets). It includes clotting factors unless already clotted.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following blood groups is considered the 'universal donor'? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2352;&#2325;&#2381;&#2340; &#2360;&#2350;&#2370;&#2361; &#2325;&#2379; '&#2360;&#2366;&#2352;&#2381;&#2357;&#2349;&#2380;&#2350;&#2367;&#2325; &#2342;&#2366;&#2340;&#2366;' &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A</span><span class=\"hqt\" style=\"display:none\">A</span>",
      "<span class=\"eqt\">B</span><span class=\"hqt\" style=\"display:none\">B</span>",
      "<span class=\"eqt\">AB</span><span class=\"hqt\" style=\"display:none\">AB</span>",
      "<span class=\"eqt\">O</span><span class=\"hqt\" style=\"display:none\">O</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Blood group O negative (O</b><b>&#8315;</b><b>)</b> is considered the <b>universal donor</b> because:</p><p>&#183; It <b>does not have A or B antigens</b> on red blood cells.</p><p>&#183; It also <b>lacks the Rh factor</b>, so it won't trigger an immune response in recipients of any ABO or Rh group.</p><p><b>Quick Comparison of Blood Groups:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Blood Group</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Antigens on RBCs</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Antibodies in Plasma</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Can Donate To</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Anti-B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A, AB</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Anti-A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B, AB</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">AB</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A and B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">None</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">AB (universal recipient)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">O</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">None</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Anti-A and Anti-B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">All (universal donor, esp. O&#8315;)</td></tr></table>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the incorrect statement about human neural system.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2357; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2327;&#2354;&#2340; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">The human neural system is divided into two parts - the central neural system (CNS) and the peripheral neural system (PNS).</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2344;&#2357; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2340;&#2306;&#2340;&#2381;&#2352; &#2342;&#2379; &#2349;&#2366;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2361;&#2376; - &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2340;&#2306;&#2340;&#2381;&#2352; (&#2360;&#2368;&#2319;&#2344;&#2319;&#2360;) &#2324;&#2352; &#2346;&#2352;&#2367;&#2343;&#2368;&#2351; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2340;&#2306;&#2340;&#2381;&#2352; (&#2346;&#2368;&#2319;&#2344;&#2319;&#2360;)&#2404;</span>",
      "<span class=\"eqt\">The nerve fibres of the PNS are of two types : (a) afferent fibres (b) efferent fibres.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2319;&#2344;&#2319;&#2360; &#2325;&#2375; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2340;&#2306;&#2340;&#2369; &#2342;&#2379; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;: (&#2319;) &#2309;&#2349;&#2367;&#2357;&#2366;&#2361;&#2368; &#2340;&#2306;&#2340;&#2369; (&#2348;&#2368;) &#2309;&#2346;&#2357;&#2366;&#2361;&#2368; &#2340;&#2306;&#2340;&#2369;&#2404;</span>",
      "<span class=\"eqt\">The afferent nerve fibres transmit impulses from tissues/organs to the CNS and the efferent fibres transmit regulatory impulses from the CNS to the concerned peripheral tissues/organs.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2349;&#2367;&#2357;&#2366;&#2361;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2340;&#2306;&#2340;&#2369; &#2314;&#2340;&#2325;&#2379;&#2306;/&#2309;&#2306;&#2327;&#2379;&#2306; &#2360;&#2375; &#2310;&#2357;&#2375;&#2327;&#2379;&#2306; &#2325;&#2379; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2340;&#2306;&#2340;&#2381;&#2352; &#2340;&#2325; &#2346;&#2361;&#2369;&#2306;&#2330;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2309;&#2346;&#2357;&#2366;&#2361;&#2368; &#2340;&#2306;&#2340;&#2369; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2340;&#2306;&#2340;&#2381;&#2352; &#2360;&#2375; &#2344;&#2367;&#2351;&#2366;&#2350;&#2325; &#2310;&#2357;&#2375;&#2327;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2352;&#2367;&#2343;&#2368;&#2351; &#2314;&#2340;&#2325;&#2379;&#2306;/&#2309;&#2306;&#2327;&#2379;&#2306; &#2340;&#2325; &#2346;&#2361;&#2369;&#2306;&#2330;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">All are correct.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;.</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The human neural system is divided into two parts : (i) the central neural system (CNS) (ii) the peripheral neural system (PNS) </p><p>&#183; The CNS includes the brain and the spinal cord and is the site of information processing and control. </p><p>&#183; The PNS comprises of all the nerves of the body associated with the CNS (brain and spinal cord). </p><p>&#183; The nerve fibres of the PNS are of two types : (a) afferent fibres (b) efferent fibres.</p><p>&#183; The afferent nerve fibres transmit impulses from tissues/organs to the CNS and the efferent fibres transmit regulatory impulses from the CNS to the concerned peripheral tissues/organs. </p><p>&#183; The PNS is divided into two divisions called somatic neural system and autonomic neural system. </p><p>&#183; The somatic neural system relays impulses from the CNS to skeletal muscles while the autonomic neural system transmits impulses from the CNS to the involuntary organs and smooth muscles of the body. </p><p>&#183; The autonomic neural system is further classified into sympathetic neural system and parasympathetic neural system. </p><p>&#183; Visceral nervous system is the part of the peripheral nervous system that comprises the whole complex of nerves, fibres, ganglia, and plexuses by which impulses travel from the central nervous system to the viscera and from the viscera to the central nervous system.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>In humans, urine formed by the nephrons is ultimately stored in the: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2344;&#2369;&#2359;&#2381;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2344;&#2375;&#2347;&#2381;&#2352;&#2377;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2350;&#2370;&#2340;&#2381;&#2352; &#2309;&#2306;&#2340;&#2340;&#2307; &#2325;&#2361;&#2366;&#2305; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Ureter</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2340;&#2381;&#2352;&#2357;&#2366;&#2361;&#2367;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Renal pelvis</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2381;&#2342;&#2375; &#2325;&#2381;&#2359;&#2379;&#2339;&#2368;</span>",
      "<span class=\"eqt\">Urinary bladder</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2340;&#2381;&#2352;&#2366;&#2358;&#2351;</span>",
      "<span class=\"eqt\">Urethra</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2340;&#2381;&#2352;&#2350;&#2366;&#2352;&#2381;&#2327;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Urine formed by the nephrons is ultimately carried to the urinary bladder where it is stored.</p><p>In humans, <b>urine is formed in the nephrons</b> (functional units of the kidneys).</p><p>From there, it flows through:</p><p>&#183; <b>Collecting ducts</b> &rarr;</p><p>&#183; <b>Renal pelvis</b> &rarr;</p><p>&#183; <b>Ureters</b> (one from each kidney) &rarr;</p><p>&#183; <b>Urinary bladder</b>, where it is <b>stored temporarily</b> until excretion.</p><p>During urination, urine exits the body through the <b>urethra</b>.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct about the human neural system? </p><p>I. The somatic neural system transmits impulses from the CNS to involuntary organs. </p><p>II. Myelinated nerve fibres are enveloped with Schwann cells that form a myelin sheath around the axon.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2350;&#2366;&#2344;&#2357; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2342;&#2376;&#2361;&#2367;&#2325; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2340;&#2306;&#2340;&#2381;&#2352; &#2360;&#2375; &#2309;&#2344;&#2376;&#2330;&#2381;&#2331;&#2367;&#2325; &#2309;&#2306;&#2327;&#2379;&#2306; &#2340;&#2325; &#2310;&#2357;&#2375;&#2327;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2330;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2350;&#2366;&#2311;&#2354;&#2367;&#2344;&#2375;&#2335;&#2375;&#2337; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2340;&#2306;&#2340;&#2369; &#2358;&#2381;&#2357;&#2366;&#2344; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2360;&#2375; &#2328;&#2367;&#2352;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2379; &#2309;&#2325;&#2381;&#2359;&#2340;&#2306;&#2340;&#2369; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2350;&#2366;&#2311;&#2354;&#2367;&#2344; &#2310;&#2357;&#2352;&#2339; &#2348;&#2344;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Statement I  -  Incorrect:</b></p><p>The <b>somatic neural system</b> controls <b>voluntary actions</b> and <b>transmits impulses from the CNS to skeletal (voluntary) muscles</b>.</p><p>It does <b>not</b> regulate involuntary organs. That is the function of the <b>autonomic nervous system</b>.</p><p><b>Statement II  -  Correct:</b></p><p><b>Myelinated nerve fibres</b> are covered by <b>Schwann cells</b>, which form the <b>myelin sheath</b> around the <b>axon</b>.</p><p>This <b>insulates</b> the nerve fibre and allows <b>faster conduction</b> of nerve impulses.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The process of filtration of blood in the kidney is carried out by the: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2352;&#2381;&#2342;&#2375; &#2350;&#2375;&#2306; &#2352;&#2325;&#2381;&#2340; &#2325;&#2375; &#2344;&#2367;&#2360;&#2381;&#2346;&#2306;&#2342;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2367;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Renal tubule</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2371;&#2325;&#2381;&#2325; &#2344;&#2354;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Bowman's capsule</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2379;&#2350;&#2344; &#2325;&#2376;&#2346;&#2381;&#2360;&#2370;&#2354;</span>",
      "<span class=\"eqt\">Glomerulus</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2354;&#2379;&#2350;&#2375;&#2352;&#2369;&#2354;&#2360;</span>",
      "<span class=\"eqt\">Collecting duct</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2339; &#2357;&#2366;&#2361;&#2367;&#2344;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The <b>glomerulus</b> is a <b>network of capillaries</b> located within the <b>Bowman's capsule</b> in each nephron of the kidney.</p><p>&#183; It is responsible for the <b>ultrafiltration</b> of blood  -  allowing <b>water, salts, glucose, and waste products</b> to pass into the Bowman's capsule, while <b>blood cells and large proteins remain in the blood</b>.</p><p><b>Further information:</b></p><p>&#183; <b>Renal tubule:</b></p><p>Part of the nephron where <b>reabsorption and secretion</b> occur after filtration, not the site of filtration itself.</p><p>&#183; <b>Bowman's capsule:</b></p><p>It <b>surrounds the glomerulus</b> and <b>collects the filtrate</b>, but the <b>actual filtration is done by the glomerulus</b>.</p><p>&#183; <b>Collecting duct:</b></p><p>It receives urine from multiple nephrons and is involved in <b>water reabsorption</b> and <b>concentration of urine</b>, not in filtration.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Reabsorption of glucose actively occurs in which part of the nephron? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2381;&#2354;&#2370;&#2325;&#2379;&#2332; &#2325;&#2366; &#2346;&#2369;&#2344;&#2307; &#2309;&#2357;&#2358;&#2379;&#2359;&#2339; &#2344;&#2375;&#2347;&#2381;&#2352;&#2377;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2349;&#2366;&#2327; &#2350;&#2375;&#2306; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bowman's capsule</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2379;&#2350;&#2344; &#2325;&#2376;&#2346;&#2381;&#2360;&#2370;&#2354;</span>",
      "<span class=\"eqt\">Loop of Henle</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2344;&#2354;&#2375; &#2325;&#2366; &#2347;&#2306;&#2342;&#2366;</span>",
      "<span class=\"eqt\">Proximal convoluted tubule</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2368;&#2346;&#2360;&#2381;&#2341; &#2325;&#2369;&#2306;&#2337;&#2354;&#2367;&#2340; &#2344;&#2354;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Distal convoluted tubule</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2370;&#2352;&#2360;&#2381;&#2341; &#2325;&#2369;&#2306;&#2337;&#2354;&#2367;&#2340; &#2344;&#2354;&#2367;&#2325;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The <b>proximal convoluted tubule (PCT)</b> is the <b>primary site for active reabsorption of glucose</b>, amino acids, vitamins, and a significant amount of water and ions from the filtrate.</p><p>&#183; This reabsorption is done through <b>active transport mechanisms</b>, requiring energy (ATP).</p><p>Further information:</p><p><b>Bowman's capsule:</b></p><p>Only <b>collects the filtrate</b> from the glomerulus; <b>no reabsorption</b> occurs here.</p><p><b>Loop of Henle:</b></p><p>Primarily involved in <b>water and salt reabsorption</b>, but <b>not glucose</b>.</p><p><b>Distal convoluted tubule:</b></p><p>Some selective reabsorption and secretion happen here, but <b>glucose is not reabsorbed</b> at this stage - it should already be reabsorbed in the PCT.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which type of muscle is primarily involved in locomotory actions and changes of body postures? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2350;&#2366;&#2306;&#2360;&#2346;&#2375;&#2358;&#2368; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2327;&#2340;&#2367;&#2358;&#2368;&#2354; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2324;&#2352; &#2358;&#2352;&#2368;&#2352; &#2325;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Visceral muscle</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2340; &#2325;&#2368; &#2350;&#2366;&#2306;&#2360;&#2346;&#2375;&#2358;&#2368;</span>",
      "<span class=\"eqt\">Cardiac muscle</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2371;&#2342;&#2351; &#2325;&#2368; &#2350;&#2366;&#2306;&#2360;&#2346;&#2375;&#2358;&#2368;</span>",
      "<span class=\"eqt\">Smooth muscle</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2367;&#2325;&#2344;&#2368; &#2346;&#2375;&#2358;&#2368;</span>",
      "<span class=\"eqt\">Skeletal muscle</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2325;&#2366;&#2354; &#2325;&#2368; &#2350;&#2366;&#2306;&#2360;&#2346;&#2375;&#2358;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Skeletal muscles are primarily involved in locomotory actions and changes of body postures.</p><p>&#183; <b>Skeletal muscles</b> are:</p><p>o <b>Voluntary</b> muscles controlled consciously.</p><p>o <b>Attached to bones</b>, enabling <b>movement</b> and <b>changes in body posture</b>.</p><p>o <b>Striated</b> in appearance and <b>multinucleated</b>.</p><p>Further information:</p><p>&#183; <b> Visceral muscle</b> (same as smooth muscle):</p><p>Found in internal organs (like intestines, blood vessels); <b>involuntary</b> and <b>non-striated</b>; not involved in locomotion.</p><p>&#183; <b>Cardiac muscle:</b></p><p>Found only in the <b>heart</b>; <b>involuntary</b>, <b>striated</b>, with intercalated discs; controls heartbeat, not body movement.</p><p>&#183; <b>Smooth muscle:</b></p><p>Involuntary muscles found in walls of internal organs; help with processes like digestion, <b>not locomotion</b>.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>The functional unit of a muscle fibre responsible for contraction is the: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2325;&#2369;&#2330;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2350;&#2366;&#2306;&#2360;&#2346;&#2375;&#2358;&#2368; &#2347;&#2366;&#2311;&#2348;&#2352; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2311;&#2325;&#2366;&#2312; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Myofibril</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2351;&#2379;&#2347;&#2366;&#2311;&#2348;&#2381;&#2352;&#2367;&#2354;</span>",
      "<span class=\"eqt\">Sarcolemma</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2325;&#2379;&#2354;&#2375;&#2350;&#2381;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Sarcomere</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2325;&#2379;&#2350;&#2367;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Sarcoplasm</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2325;&#2379;&#2346;&#2381;&#2354;&#2366;&#2332;&#2381;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Each myofibril contains many serially arranged units called sarcomere which are the functional units.</p><p>&#183; The sarcomere is the basic contractile unit within muscle fibers. It contains the protein filaments actin and myosin, which slide past each other during muscle contraction according to the sliding filament theory. </p><p>&#183; Sarcomeres are arranged in series within myofibrils (which are bundles of protein filaments). The sarcolemma is the cell membrane of a muscle fiber, and the sarcoplasm is the cytoplasm of the muscle cell. </p><p>&#183; While all these structures play important roles in muscle function, the sarcomere is specifically the fundamental contractile unit.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>The junction between a motor neuron and the sarcolemma of the muscle fibre is called the: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2379;&#2335;&#2352; &#2344;&#2381;&#2351;&#2370;&#2352;&#2377;&#2344; &#2324;&#2352; &#2350;&#2366;&#2306;&#2360;&#2346;&#2375;&#2358;&#2368; &#2347;&#2366;&#2311;&#2348;&#2352; &#2325;&#2375; &#2360;&#2352;&#2325;&#2379;&#2354;&#2375;&#2350;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2375; &#2332;&#2306;&#2325;&#2381;&#2358;&#2344; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Synapse</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2381;&#2340;&#2352;&#2381;&#2327;&#2381;&#2352;&#2341;&#2344;</span>",
      "<span class=\"eqt\">Neurotransmitter junction</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2352;&#2379;&#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2350;&#2368;&#2335;&#2352; &#2332;&#2306;&#2325;&#2381;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Neuromuscular junction</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2352;&#2379;&#2350;&#2360;&#2381;&#2325;&#2381;&#2351;&#2370;&#2354;&#2352; &#2360;&#2306;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Motor unit</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2335;&#2352; &#2311;&#2325;&#2366;&#2312;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; A <b>neuromuscular junction</b> is the <b>specialized synapse</b> where a <b>motor neuron connects to the sarcolemma</b> (cell membrane) of a <b>muscle fiber</b>.</p><p>&#183; It allows the <b>transmission of nerve impulses</b> to the muscle via <b>neurotransmitters</b> (like <b>acetylcholine</b>), causing <b>muscle contraction</b>.</p><p>Further information:</p><p>&#183; <b>Synapse:</b></p><p>A general term for the junction between <b>two neurons</b> or between a <b>neuron and another cell</b>, including neuromuscular junctions - but less specific.</p><p>&#183; <b>Neurotransmitter junction:</b></p><p>Not a standard term; neurotransmitters are <b>released at junctions</b>, but this is not the correct name for the structure.</p><p>&#183; <b>Motor unit:</b></p><p>Refers to <b>one motor neuron and all the muscle fibers it innervates</b>, not the junction itself.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>The central neural system (CNS) includes the: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2340;&#2306;&#2340;&#2381;&#2352; (&#2360;&#2368;&#2319;&#2344;&#2319;&#2360;) &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;: </p></span>",
    "options": [
      "<span class=\"eqt\">Brain and cranial nerves</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2360;&#2381;&#2340;&#2367;&#2359;&#2381;&#2325; &#2324;&#2352; &#2325;&#2346;&#2366;&#2354; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366;&#2319;&#2305;</span>",
      "<span class=\"eqt\">Spinal cord and peripheral nerves</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2368;&#2338;&#2364; &#2325;&#2368; &#2361;&#2337;&#2381;&#2337;&#2368; &#2324;&#2352; &#2346;&#2352;&#2367;&#2343;&#2368;&#2351; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366;&#2319;&#2305;</span>",
      "<span class=\"eqt\">Brain and spinal cord</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2360;&#2381;&#2340;&#2367;&#2359;&#2381;&#2325; &#2324;&#2352; &#2352;&#2368;&#2338;&#2364; &#2325;&#2368; &#2361;&#2337;&#2381;&#2337;&#2368;</span>",
      "<span class=\"eqt\">All nerves of the body</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2352;&#2368;&#2352; &#2325;&#2368; &#2360;&#2349;&#2368; &#2344;&#2360;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The central nervous system consists of the brain and spinal cord, which are protected by the skull and vertebral column respectively. </p><p>The cranial nerves, peripheral nerves, and all other nerves throughout the body belong to the peripheral nervous system (PNS), which connects the CNS to the rest of the body.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Nerve impulses are transmitted away from the cell body of a neuron by the: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2310;&#2357;&#2375;&#2327; &#2344;&#2381;&#2351;&#2370;&#2352;&#2377;&#2344; &#2325;&#2375; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2358;&#2352;&#2368;&#2352; &#2360;&#2375; &#2342;&#2370;&#2352; &#2346;&#2381;&#2352;&#2375;&#2359;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;: </p></span>",
    "options": [
      "<span class=\"eqt\">Dendrites</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2344;&#2381;&#2337;&#2381;&#2352;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">Axon</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2381;&#2360;&#2379;&#2344;</span>",
      "<span class=\"eqt\">Cell body</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2354; &#2358;&#2352;&#2368;&#2352;</span>",
      "<span class=\"eqt\">Nissl's granules</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2360;&#2381;&#2360;&#2354; &#2325;&#2375; &#2325;&#2339;&#2367;&#2325;&#2366;&#2319;&#2305;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Axon </b>: The long, slender projection of a neuron that conducts electrical impulses (<b>action potentials</b>) <b>away from the cell body</b> to synapses or other neurons/muscles.</p><p>&#183; <b>Why not others?</b></p><p>o Dendrites: Receive signals and transmit them <b>toward</b> the cell body.</p><p>o Cell body: Contains the nucleus but does not transmit impulses.</p><p>o Nissl's granules: Rough ER in neurons for protein synthesis, unrelated to impulse transmission.</p><p><b>Key Concept:</b></p><p>Neurons communicate via <b>electrochemical signals</b>, with axons serving as the primary output pathway.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>The chemical involved in the transmission of nerve impulses at chemical synapses is called a: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2360;&#2367;&#2344;&#2375;&#2346;&#2381;&#2360; &#2346;&#2352; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2310;&#2357;&#2375;&#2327;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2330;&#2352;&#2339; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2352;&#2360;&#2366;&#2351;&#2344; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Hormone</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2352;&#2381;&#2350;&#2379;&#2344;</span>",
      "<span class=\"eqt\">Neurotransmitter</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2344;&#2366;&#2351;&#2369;&#2360;&#2306;&#2330;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Enzyme</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2332;&#2366;&#2311;&#2350;</span>",
      "<span class=\"eqt\">Receptor</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2360;&#2375;&#2346;&#2381;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Chemicals called neurotransmitters are involved in the transmission of impulses at chemical synapses.</p><p>&#183; <b>Neurotransmitter</b>: Chemicals like <b>acetylcholine, dopamine, or serotonin</b> are released from synaptic vesicles to transmit signals across synapses.</p><p>&#183; <b>Why not others?</b></p><p>o Hormone: Acts through blood (endocrine system), not synaptic gaps.</p><p>o Enzyme: Catalyzes biochemical reactions but doesn't transmit impulses.</p><p>o Receptor: Binds neurotransmitters but isn't the transmitting chemical itself.</p><p><b>Key Concept:</b></p><p>Neurotransmitters bridge the <b>synaptic cleft</b>, enabling neuron-to-neuron or neuron-to-muscle communication.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Endocrine glands are also known as: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2306;&#2340;&#2307;&#2360;&#2381;&#2352;&#2366;&#2357;&#2368; &#2327;&#2381;&#2352;&#2306;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2311;&#2344; &#2344;&#2366;&#2350;&#2379;&#2306; &#2360;&#2375; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Duct glands</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2361;&#2367;&#2344;&#2368; &#2327;&#2381;&#2352;&#2306;&#2341;&#2367;&#2351;&#2366;&#2306;</span>",
      "<span class=\"eqt\">Exocrine glands</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2367;&#2307;&#2360;&#2381;&#2352;&#2366;&#2357;&#2368; &#2327;&#2381;&#2352;&#2306;&#2341;&#2367;&#2351;&#2366;&#2306;</span>",
      "<span class=\"eqt\">Ductless glands</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2354;&#2367;&#2325;&#2366;&#2357;&#2367;&#2361;&#2368;&#2344; &#2327;&#2381;&#2352;&#2306;&#2341;&#2367;&#2351;&#2366;&#2306;</span>",
      "<span class=\"eqt\">Tubular glands</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2354;&#2367;&#2325;&#2366;&#2325;&#2366;&#2352; &#2327;&#2381;&#2352;&#2306;&#2341;&#2367;&#2351;&#2366;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Endocrine glands lack ducts and are hence, called ductless glands.</p><p>Endocrine glands secrete hormones directly into the bloodstream rather than through ducts, which is why they're called \"ductless glands.\" </p><p>In contrast, exocrine glands release their secretions through ducts to specific locations, such as sweat glands releasing sweat onto the skin surface or salivary glands releasing saliva into the mouth.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Brain Region with its primary function:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column I (Brain Region)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column II (Function)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Cerebrum</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) Manages vital reflexes (respiration, heart rate, gastric secretions).</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Cerebellum</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) Thalamus relays sensory signals; Hypothalamus regulates temperature, hunger, and hormones.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Thalamus/Hypothalamus</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) Coordinates voluntary movements, posture, and balance (integrates input from ears/muscles).</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) Medulla</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) Controls voluntary movements, balance, and higher cognitive functions (e.g., thinking, memory).</td></tr></table></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2360;&#2381;&#2340;&#2367;&#2359;&#2381;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; I (&#2350;&#2360;&#2381;&#2340;&#2367;&#2359;&#2381;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; II (&#2325;&#2366;&#2352;&#2381;&#2351;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) &#2346;&#2381;&#2352;&#2350;&#2360;&#2381;&#2340;&#2367;&#2359;&#2381;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2332;&#2327;&#2340;&#2366; (&#2358;&#2381;&#2357;&#2360;&#2344;, &#2361;&#2371;&#2342;&#2351; &#2327;&#2340;&#2367;, &#2327;&#2376;&#2360;&#2381;&#2335;&#2381;&#2352;&#2367;&#2325; &#2360;&#2381;&#2352;&#2366;&#2357;) &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2360;&#2375;&#2352;&#2367;&#2348;&#2376;&#2354;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) &#2341;&#2376;&#2354;&#2375;&#2350;&#2360; &#2360;&#2306;&#2357;&#2375;&#2342;&#2368; &#2360;&#2306;&#2325;&#2375;&#2340;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;; &#2361;&#2366;&#2311;&#2346;&#2379;&#2341;&#2376;&#2354;&#2375;&#2350;&#2360; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344;, &#2349;&#2370;&#2326; &#2324;&#2352; &#2361;&#2366;&#2352;&#2381;&#2350;&#2379;&#2344; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2341;&#2376;&#2354;&#2375;&#2350;&#2360;/&#2361;&#2366;&#2311;&#2346;&#2379;&#2341;&#2376;&#2354;&#2375;&#2350;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) &#2360;&#2381;&#2357;&#2376;&#2330;&#2381;&#2331;&#2367;&#2325; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306;, &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2324;&#2352; &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2325;&#2366; &#2360;&#2350;&#2344;&#2381;&#2357;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; (&#2325;&#2366;&#2344;&#2379;&#2306;/&#2350;&#2366;&#2306;&#2360;&#2346;&#2375;&#2358;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2311;&#2344;&#2346;&#2369;&#2335; &#2325;&#2379; &#2319;&#2325;&#2368;&#2325;&#2371;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;)&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) &#2350;&#2375;&#2337;&#2369;&#2354;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) &#2360;&#2381;&#2357;&#2376;&#2330;&#2381;&#2331;&#2367;&#2325; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306;, &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2324;&#2352; &#2313;&#2330;&#2381;&#2330; &#2360;&#2306;&#2332;&#2381;&#2334;&#2366;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; (&#2332;&#2376;&#2360;&#2375;, &#2360;&#2379;&#2330;, &#2360;&#2381;&#2350;&#2371;&#2340;&#2367;) &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</td></tr></table></p></span>",
    "options": [
      "<span class=\"eqt\">i &rarr; d, ii &rarr; c, iii &rarr; b, iv &rarr; a</span><span class=\"hqt\" style=\"display:none\">i &rarr; d, ii &rarr; c, iii &rarr; b, iv &rarr; a</span>",
      "<span class=\"eqt\">i &rarr; a, ii &rarr; b, iii &rarr; c, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; b, iii &rarr; c, iv &rarr; d</span>",
      "<span class=\"eqt\">i &rarr; d, ii &rarr; a, iii &rarr; c, iv &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; d, ii &rarr; a, iii &rarr; c, iv &rarr; b</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; d, iii &rarr; a, iv &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; d, iii &rarr; a, iv &rarr; b</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Cerebrum - Controls voluntary movements, balance, and higher cognitive functions (e.g., thinking, memory).</p><p>Cerebellum - Coordinates voluntary movements, posture, and balance (integrates input from ears/muscles).</p><p>Thalamus/Hypothalamus - Thalamus relays sensory signals; Hypothalamus regulates temperature, hunger, and hormones.</p><p>Medulla - Manages vital reflexes (respiration, heart rate, gastric secretions).</p><p></p><p>&#183; <b>Cerebrum </b>: Largest part; handles <b>conscious activities</b> (speech, decision-making).</p><p>&#183; <b>Cerebellum </b>: \"Little brain\" for <b>motor coordination</b> and balance.</p><p>&#183; <b>Thalamus/Hypothalamus </b>: Thalamus = \"sensory relay station\"; Hypothalamus = <b>homeostasis</b> (hunger, thirst, temperature).</p><p>&#183; <b>Medulla </b>: Part of brainstem; controls <b>autonomic functions</b> (breathing, heart rate).</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Blood Component with its primary function:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column I (Blood Component)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column II (Function)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Erythrocytes</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) Defend against infections (e.g., neutrophils, lymphocytes).</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Leucocytes</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) Transport respiratory gases (O&#8322; and CO&#8322;) via hemoglobin.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Platelets</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) Maintain osmotic pressure and transport substances (e.g., hormones, drugs).</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) Albumins</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) Essential for blood clotting (coagulation) at injury sites.</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2325;&#2381;&#2340; &#2328;&#2335;&#2325; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; I (&#2352;&#2325;&#2381;&#2340; &#2328;&#2335;&#2325;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; II (&#2325;&#2366;&#2352;&#2381;&#2351;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) &#2319;&#2352;&#2367;&#2341;&#2381;&#2352;&#2379;&#2360;&#2366;&#2311;&#2335;&#2381;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339;&#2379;&#2306; &#2360;&#2375; &#2348;&#2330;&#2366;&#2357; (&#2332;&#2376;&#2360;&#2375;, &#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2379;&#2347;&#2367;&#2354;, &#2354;&#2367;&#2350;&#2381;&#2347;&#2379;&#2360;&#2366;&#2311;&#2335;&#2381;&#2360;)&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2354;&#2381;&#2351;&#2370;&#2325;&#2379;&#2360;&#2366;&#2311;&#2335;&#2381;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) &#2361;&#2368;&#2350;&#2379;&#2327;&#2381;&#2354;&#2379;&#2348;&#2367;&#2344; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2358;&#2381;&#2357;&#2360;&#2344; &#2327;&#2376;&#2360;&#2379;&#2306; (O&#8322; &#2324;&#2352; CO&#8322;) &#2325;&#2366; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2346;&#2381;&#2354;&#2375;&#2335;&#2354;&#2375;&#2335;&#2381;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) &#2310;&#2360;&#2350;&#2366;&#2335;&#2367;&#2325; &#2342;&#2348;&#2366;&#2357; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2344;&#2366; &#2324;&#2352; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2366; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344; &#2325;&#2352;&#2344;&#2366; (&#2332;&#2376;&#2360;&#2375;, &#2361;&#2366;&#2352;&#2381;&#2350;&#2379;&#2344;, &#2342;&#2357;&#2366;&#2319;&#2306;)&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) &#2319;&#2354;&#2381;&#2348;&#2369;&#2350;&#2367;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) &#2330;&#2379;&#2335; &#2357;&#2366;&#2354;&#2368; &#2332;&#2327;&#2361;&#2379;&#2306; &#2346;&#2352; &#2352;&#2325;&#2381;&#2340; &#2325;&#2366; &#2341;&#2325;&#2381;&#2325;&#2366; &#2332;&#2350;&#2344;&#2375; (&#2332;&#2350;&#2366;&#2357;) &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2404;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i - b, ii - a, iii - d, iv - c</span><span class=\"hqt\" style=\"display:none\">i - b, ii - a, iii - d, iv - c</span>",
      "<span class=\"eqt\">i - a, ii - b, iii - c, iv - d</span><span class=\"hqt\" style=\"display:none\">i - a, ii - b, iii - c, iv - d</span>",
      "<span class=\"eqt\">i - c, ii - d, iii - a, iv - b</span><span class=\"hqt\" style=\"display:none\">i - c, ii - d, iii - a, iv - b</span>",
      "<span class=\"eqt\">i - d, ii - c, iii - b, iv - a</span><span class=\"hqt\" style=\"display:none\">i - d, ii - c, iii - b, iv - a</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Erythrocytes </b>: Red blood cells (RBCs) carry <b>oxygen</b> and <b>carbon dioxide</b>.</p><p>&#183; <b>Leucocytes: </b>White blood cells (WBCs) combat <b>pathogens</b>.</p><p>&#183; <b>Platelets </b>: Cell fragments that form <b>clots</b> to stop bleeding.</p><p>&#183; <b>Albumins </b>: Plasma proteins maintaining <b>blood volume</b> and pressure.</p><p>Albumins constitute <b>~60%</b> of plasma proteins.</p>",
    "question_index": 19
  }
];
