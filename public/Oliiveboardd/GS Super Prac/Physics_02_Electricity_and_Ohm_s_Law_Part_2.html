<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Match the following:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Electric Current</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Ohm</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Potential Difference</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Watt</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Resistance</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Ampere</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Electric Power</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Volt</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2343;&#2366;&#2352;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2323;&#2350;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2309;&#2306;&#2340;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2357;&#2366;&#2335;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2319;&#2350;&#2381;&#2346;&#2368;&#2351;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2358;&#2325;&#2381;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2357;&#2379;&#2354;&#2381;&#2335;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">A-3, B-4, C-1, D-2</span><span class=\"hqt\" style=\"display:none\">A-3, B-4, C-1, D-2</span>",
      "<span class=\"eqt\">A-4, B-3, C-2, D-1</span><span class=\"hqt\" style=\"display:none\">A-4, B-3, C-2, D-1</span>",
      "<span class=\"eqt\">A-1, B-2, C-3, D-4</span><span class=\"hqt\" style=\"display:none\">A-1, B-2, C-3, D-4</span>",
      "<span class=\"eqt\">A-2, B-1, C-4, D-3</span><span class=\"hqt\" style=\"display:none\">A-2, B-1, C-4, D-3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Electric Current</b> is measured in <b>Ampere</b>.</p><p>&bull; <b>Potential Difference</b> is measured in <b>Volt</b>.</p><p>&bull; <b>Resistance</b> is measured in <b>Ohm.</b></p><p>&bull; <b>Electric Power</b> is measured in <b>Watt</b>.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is the correct formula for electric current?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2343;&#2366;&#2352;&#2366; &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2370;&#2340;&#2381;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">I=Q/t</span><span class=\"hqt\" style=\"display:none\">I=Q/t</span>",
      "<span class=\"eqt\">I=Q X t</span><span class=\"hqt\" style=\"display:none\">I=Q X t</span>",
      "<span class=\"eqt\">I=t/Q&#8203;</span><span class=\"hqt\" style=\"display:none\">I=t/Q&#8203;</span>",
      "<span class=\"eqt\">I=Q+t</span><span class=\"hqt\" style=\"display:none\">I=Q+t</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Electric current is defined as the rate of flow of charge. The formula for electric current is:</p><p>I=Q/t</p><p>where:</p><p>&bull; I = current (in Amperes),</p><p>&bull; Q = charge (in Coulombs),</p><p>&bull; t = time (in seconds).</p><p>Thus, the correct formula is <b>I = Q/t</b>.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What is the potential difference across a conductor if 2 joules of work is done to move a charge of 1 coulomb?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 1 &#2325;&#2370;&#2354;&#2377;&#2350; &#2310;&#2357;&#2375;&#2358; &#2325;&#2379; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 2 &#2332;&#2370;&#2354; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2330;&#2366;&#2354;&#2325; &#2325;&#2375; &#2346;&#2366;&#2352; &#2357;&#2367;&#2349;&#2357;&#2366;&#2306;&#2340;&#2352; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 V</span><span class=\"hqt\" style=\"display:none\">1 V</span>",
      "<span class=\"eqt\">2 V</span><span class=\"hqt\" style=\"display:none\">2 V</span>",
      "<span class=\"eqt\">0.5 V</span><span class=\"hqt\" style=\"display:none\">0.5 V</span>",
      "<span class=\"eqt\">4 V</span><span class=\"hqt\" style=\"display:none\">4 V</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The potential difference V is given by:</p><p>V=W/Q</p><p>where:</p><p>&bull; W = work done (in Joules),</p><p>&bull; Q = charge (in Coulombs).</p><p>Given:</p><p>&bull; W=2&#8201;J,</p><p>&bull; Q=1&#8201;C.</p><p>Thus:</p><p>V=2&#8201;J/1&#8201;C=2&#8201;V</p><p>The potential difference is <b>2 V</b>.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>According to Ohm's law, the current through a conductor is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2323;&#2350; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2325;&#2367;&#2360;&#2368; &#2330;&#2366;&#2354;&#2325; &#2360;&#2375; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;&#2367;&#2340; &#2343;&#2366;&#2352;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Directly proportional to the resistance</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2325;&#2375; &#2360;&#2368;&#2343;&#2375; &#2310;&#2344;&#2369;&#2346;&#2366;&#2340;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Inversely proportional to the potential difference</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2349;&#2357;&#2366;&#2344;&#2381;&#2340;&#2352; &#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368;</span>",
      "<span class=\"eqt\">Directly proportional to the potential difference</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2349;&#2357;&#2366;&#2344;&#2381;&#2340;&#2352; &#2325;&#2375; &#2360;&#2368;&#2343;&#2375; &#2310;&#2344;&#2369;&#2346;&#2366;&#2340;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Inversely proportional to the resistance</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Ohm's law states:</p><p>V=IR</p><p>where:</p><p>&bull; V = potential difference (in Volts),</p><p>&bull; I = current (in Amperes),</p><p>&bull; R = resistance (in Ohms).</p><p>From Ohm's law:</p><p>&bull; Current I is <b>directly proportional</b> to the potential difference V.</p><p>&bull; Current I is <b>inversely proportional</b> to the resistance R.</p><p>Thus, the correct statement is:</p><p><b>Current is directly proportional to the potential difference</b>.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following materials has the highest resistivity?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;&#2325;&#2340;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Silver</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2305;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Copper</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2305;&#2348;&#2366;</span>",
      "<span class=\"eqt\">Glass</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2305;&#2330;</span>",
      "<span class=\"eqt\">Aluminium</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2351;&#2369;&#2350;&#2368;&#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Silver, Copper, and Aluminium</b> are metals and have low resistivity (they are good conductors).</p><p>&bull; <b>Glass</b> is an insulator and has very high resistivity.</p><p>Thus, <b>Glass</b> has the highest resistivity.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What is the resistance of a conductor if a potential difference of 12 V produces a current of 3 A?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 12 V &#2325;&#2366; &#2357;&#2367;&#2349;&#2357;&#2366;&#2344;&#2381;&#2340;&#2352; 3 A &#2343;&#2366;&#2352;&#2366; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2330;&#2366;&#2354;&#2325; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">4 &#937;</span><span class=\"hqt\" style=\"display:none\">4 &#937;</span>",
      "<span class=\"eqt\">36 &#937;</span><span class=\"hqt\" style=\"display:none\">36 &#937;</span>",
      "<span class=\"eqt\">0.25 &#937;</span><span class=\"hqt\" style=\"display:none\">0.25 &#937;</span>",
      "<span class=\"eqt\">15 &#937;</span><span class=\"hqt\" style=\"display:none\">15 &#937;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>We can use Ohm's Law, which states:</p><p>&bull; Voltage (V) = Current (I) x Resistance (R)</p><p>To find the resistance (R), we can rearrange the formula:</p><p>&bull; R = V / I</p><p>Given:</p><p>&bull; Voltage (V) = 12 V</p><p>&bull; Current (I) = 3 A</p><p>Therefore:</p><p>&bull; R = 12 V / 3 A = 4 &#937;</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>What is the commercial unit of electrical energy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2368; &#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351;&#2367;&#2325; &#2311;&#2325;&#2366;&#2312; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Joule</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2380;&#2354;</span>",
      "<span class=\"eqt\">Watt</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2335;</span>",
      "<span class=\"eqt\">Kilowatt-hour</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2354;&#2379;&#2357;&#2366;&#2335;&#2381;&#2335; &#2328;&#2344;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Ampere-hour</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;&#2381;&#2346;&#2368;&#2351;&#2352; &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The commercial unit of electrical energy is kilowatt-hour (kWh), which is commonly used in electricity billing.</p><p>1 kWh = 1000 watts  X  3600 seconds = 3.6  X  10&#8310; Joules.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What is the resistance of a wire if its length is doubled and its cross-sectional area is halved?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2340;&#2366;&#2352; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2325;&#2352; &#2342;&#2368; &#2332;&#2366;&#2319; &#2340;&#2341;&#2366; &#2313;&#2360;&#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2381;&#2352;&#2360;&#2381;&#2341; &#2325;&#2366;&#2335; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2310;&#2343;&#2366; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2340;&#2379; &#2340;&#2366;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Remains the same</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2376;&#2360;&#2366; &#2361;&#2368; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Doubles</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Quadruples</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2366;&#2341; &#2332;&#2344;&#2381;&#2350; &#2354;&#2375;&#2344;&#2375;&#2357;&#2366;&#2354;&#2375; &#2348;&#2330;&#2381;&#2330;&#2375;</span>",
      "<span class=\"eqt\">Halves</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2343;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The resistance R of a wire is given by:</p><p>R=&#961;(l/A)</p><p>where:</p><p>&bull; &#961; = resistivity (constant for a material),</p><p>&bull; l = length of the wire,</p><p>&bull; A = cross-sectional area.</p><p>If the length is doubled (l&#8242;=2l) and the area is halved (A&#8242;=A/2&#8203;), the new resistance R&#8242; is:</p><p>R&#8242;=&#961;(2l/A/2)=&#961;(4l/A)=4R</p><p>Thus, the resistance <b>quadruples</b>.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is incorrect?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A fuse is a safety device used in electric circuits.</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2381;&#2351;&#2370;&#2332;&#2364; &#2319;&#2325; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2313;&#2346;&#2325;&#2352;&#2339; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2346;&#2352;&#2367;&#2346;&#2341;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A fuse has a high melting point.</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2351;&#2370;&#2332; &#2325;&#2366; &#2327;&#2354;&#2344;&#2366;&#2306;&#2325; &#2313;&#2330;&#2381;&#2330; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A fuse is connected in series with the circuit.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2347;&#2381;&#2351;&#2370;&#2332; &#2360;&#2352;&#2381;&#2325;&#2367;&#2335; &#2325;&#2375; &#2360;&#2366;&#2341; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368;&#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A fuse protects the circuit from overloading.</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2351;&#2370;&#2332; &#2360;&#2352;&#2381;&#2325;&#2367;&#2335; &#2325;&#2379; &#2323;&#2357;&#2352;&#2354;&#2379;&#2337;&#2367;&#2306;&#2327; &#2360;&#2375; &#2348;&#2330;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; A fuse is a safety device that melts and breaks the circuit when the current exceeds a safe limit.</p><p>&bull; A fuse has a <b>low melting point</b>, not a high melting point.</p><p>&bull; It is connected in series with the circuit to protect it from overloading.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>According to Kirchhoff's junction rule:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2352;&#2330;&#2377;&#2347; &#2325;&#2375; &#2332;&#2306;&#2325;&#2381;&#2358;&#2344; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;:</p></span>",
    "options": [
      "<span class=\"eqt\">The algebraic sum of all currents at a junction is zero</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2332;&#2306;&#2325;&#2381;&#2358;&#2344; &#2346;&#2352; &#2360;&#2349;&#2368; &#2343;&#2366;&#2352;&#2366;&#2323;&#2306; &#2325;&#2366; &#2348;&#2368;&#2332;&#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2351;&#2379;&#2327; &#2358;&#2370;&#2344;&#2381;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The algebraic sum of all voltages in a closed loop is zero</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2342; &#2354;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2357;&#2379;&#2354;&#2381;&#2335;&#2375;&#2332; &#2325;&#2366; &#2348;&#2368;&#2332;&#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2351;&#2379;&#2327; &#2358;&#2370;&#2344;&#2381;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The sum of all resistances in a series circuit equals total resistance</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2360;&#2352;&#2381;&#2325;&#2367;&#2335; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2325;&#2369;&#2354; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The product of current and resistance equals voltage</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2352;&#2366; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2325;&#2366; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2357;&#2379;&#2354;&#2381;&#2335;&#2375;&#2332; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The algebraic sum of all currents at a junction is zero.</p><p></p><p>This is a statement of Kirchhoff's Current Law (KCL), also known as Kirchhoff's Junction Rule. It states that the total current entering a junction or node in an electrical circuit is equal to the total current leaving the junction. In other words, electric charge is conserved at junctions in a circuit.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following materials has the lowest resistivity?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;&#2325;&#2340;&#2366; &#2360;&#2348;&#2360;&#2375; &#2325;&#2350; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Iron</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2361;&#2366;</span>",
      "<span class=\"eqt\">Copper</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2305;&#2348;&#2366;</span>",
      "<span class=\"eqt\">Nichrome</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2325;&#2381;&#2352;&#2379;&#2350;</span>",
      "<span class=\"eqt\">Tungsten</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2306;&#2327;&#2360;&#2381;&#2335;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Among the given options, copper has the lowest resistivity, making it an excellent conductor of electricity. This is why copper is commonly used in electrical wiring and components.</p><p>For reference, the approximate resistivity values (in ohm-meters) at room temperature are:</p><p>Copper: 1.68  10^-8 &#937;m</p><p>Iron: 9.71  10^-8 &#937;m</p><p>Tungsten: 5.6  10^-8 &#937;m</p><p>Nichrome: 1.5  10^-6 &#937;m (much higher as it's an alloy designed for heating elements)</p><p></p><p>Copper's low resistivity makes it the best conductor among these four materials.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is incorrect?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Electrical devices in a series circuit have the same current passing through them.</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2346;&#2352;&#2367;&#2346;&#2341; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2343;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The potential difference across each resistor in a series circuit is the same.</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2346;&#2352;&#2367;&#2346;&#2341; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;&#2325; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2367;&#2349;&#2357;&#2366;&#2344;&#2381;&#2340;&#2352; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The equivalent resistance in a series circuit is the sum of individual resistances.</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2346;&#2352;&#2367;&#2346;&#2341; &#2350;&#2375;&#2306; &#2340;&#2369;&#2354;&#2381;&#2351; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The reciprocal of the equivalent resistance in a parallel circuit is the sum of the reciprocals of individual resistances.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2350;&#2366;&#2344;&#2381;&#2340;&#2352; &#2346;&#2352;&#2367;&#2346;&#2341; &#2350;&#2375;&#2306; &#2360;&#2350;&#2340;&#2369;&#2354;&#2381;&#2351; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2325;&#2366; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;, &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;&#2379;&#2306; &#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The incorrect statement is: \"The potential difference across each resistor in a series circuit is the same.\"</p><p>This statement is false. In a series circuit:</p><p>The current through each resistor is the same (as the first statement correctly indicates)</p><p>The potential difference (voltage) across each resistor is generally NOT the same. Instead, the voltage across each resistor depends on its resistance according to Ohm's Law (V = IR)</p><p>The total voltage is divided among the resistors proportionally to their resistances</p><p>The sum of all voltage drops equals the total voltage of the source</p><p></p><p>The correct principle is that in a PARALLEL circuit (not series), the voltage across each resistor is the same.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>The property of a conductor to resist the flow of charge is known as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2330;&#2366;&#2354;&#2325; &#2325;&#2375; &#2310;&#2357;&#2375;&#2358; &#2325;&#2375; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2327;&#2369;&#2339; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Conductance</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2357;&#2366;&#2361;&#2325;&#2340;&#2381;&#2340;&#2381;&#2357;</span>",
      "<span class=\"eqt\">Resistance</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;</span>",
      "<span class=\"eqt\">Capacitance</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Inductance</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2359;&#2381;&#2336;&#2366;&#2346;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The property of a conductor to resist the flow of charge is called Resistance.</p><p></p><p>Resistance is the measure of how much a material opposes the flow of electric current. It's measured in ohms (&#937;) and is defined by Ohm's Law (V = IR), where higher resistance means the material allows less current to flow for a given voltage.</p><p>The other options represent different electrical properties:</p><p>Conductance is the opposite of resistance (how easily current flows)</p><p>Capacitance is the ability to store electric charge</p><p>Inductance is the property that opposes changes in current</p><p></p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>In an electric circuit, the direction of conventional current flow is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2346;&#2352;&#2367;&#2346;&#2341; &#2350;&#2375;&#2306;, &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2343;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Opposite to the direction of electron flow</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340;</span>",
      "<span class=\"eqt\">From negative to positive terminal</span><span class=\"hqt\" style=\"display:none\">&#2315;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2375; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2335;&#2352;&#2381;&#2350;&#2367;&#2344;&#2354; &#2340;&#2325;</span>",
      "<span class=\"eqt\">In the direction of electron flow</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Unpredictable</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2366;&#2358;&#2367;&#2340;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In an electric circuit, the direction of conventional current flow is opposite to the direction of electron flow</p><p>Conventional current is defined as flowing from the positive terminal to the negative terminal (from higher potential to lower potential). However, electrons, which carry the charge in metal conductors, actually flow from the negative terminal to the positive terminal.</p><p>This opposite relationship exists because conventional current direction was established before the discovery of electrons and their negative charge. Benjamin Franklin originally defined current direction, assuming positive charges were flowing. When electrons were later discovered to be the charge carriers with negative charge, the convention was already established and maintained for consistency.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>The heating effect of electric current is utilized in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2340;&#2366;&#2346;&#2368;&#2351; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Electric generators</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2332;&#2344;&#2352;&#2375;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Electric motors</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2350;&#2379;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Electric heaters</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2367;&#2325; &#2361;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Electric bells</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2332;&#2354;&#2368; &#2325;&#2368; &#2328;&#2306;&#2335;&#2367;&#2351;&#2366;&#2305;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The heating effect of electric current is utilized in electric heaters.</p><p>Electric heaters: These devices are specifically designed to convert electrical energy into heat energy. They use a high-resistance wire (often nichrome) that gets very hot when an electric current passes through it. This heat is then used for warming the surroundings.</p><p></p><p></p><p>Electric generators: These devices convert mechanical energy into electrical energy. While there is some heat generated due to resistance in the wires, it's generally an unwanted byproduct, not the primary function. </p><p>Electric motors: These devices convert electrical energy into mechanical energy. Again, heat is generated due to resistance, but it's a loss of energy and not the intended purpose. </p><p>Electric bells: These devices use electromagnetism to create a ringing sound. While there's a small heating effect in the electromagnet's coil, it's not the principle behind their operation.</p><p></p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>What is the total resistance of three resistors of 2 &#937;, 4 &#937;, and 6 &#937; connected in series?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2350;&#2375;&#2306; &#2332;&#2369;&#2337;&#2364;&#2375; 2 &#937;, 4 &#937;, &#2324;&#2352; 6 &#937; &#2325;&#2375; &#2340;&#2368;&#2344; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;&#2325;&#2379;&#2306; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12 &#937;</span><span class=\"hqt\" style=\"display:none\">12 &#937;</span>",
      "<span class=\"eqt\">6 &#937;</span><span class=\"hqt\" style=\"display:none\">6 &#937;</span>",
      "<span class=\"eqt\">4 &#937;</span><span class=\"hqt\" style=\"display:none\">4 &#937;</span>",
      "<span class=\"eqt\">2 &#937;</span><span class=\"hqt\" style=\"display:none\">2 &#937;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>When resistors are connected in series, their total resistance is simply the sum of the individual resistances.</p><p>For resistors in series, Rs=R1+R2+R3=2+4+6=12&#8201; &#937;</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is used to protect electrical circuits from overloading?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2346;&#2352;&#2367;&#2346;&#2341;&#2379;&#2306; &#2325;&#2379; &#2323;&#2357;&#2352;&#2354;&#2379;&#2337;&#2367;&#2306;&#2327; &#2360;&#2375; &#2348;&#2330;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Resistor</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2352;&#2379;&#2343;</span>",
      "<span class=\"eqt\">Fuse</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2351;&#2370;&#2332;</span>",
      "<span class=\"eqt\">Capacitor</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2343;&#2366;&#2352;&#2367;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Diode</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2366;&#2351;&#2379;&#2337;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Fuse: A fuse is a safety device that contains a metal wire or strip that melts when too much current flows through it. This breaks the circuit and stops the flow of electricity, preventing damage from overheating.</p><p></p><p>Resistor: A resistor limits the amount of current that flows in a circuit, but it doesn't break the circuit in an overload situation. It's designed to control current, not necessarily to stop it entirely in an emergency.</p><p>Capacitor: A capacitor stores electrical energy. While it plays a vital role in circuits, it doesn't protect against overcurrents in the way a fuse does. </p><p>Diode: A diode allows current to flow in one direction only. It's a crucial component in electronic circuits, but it's not designed to be the primary protector against overloading.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>What is the SI unit of resistance?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2325;&#2368; SI &#2311;&#2325;&#2366;&#2312; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Siemens</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2350;&#2375;&#2306;&#2360;</span>",
      "<span class=\"eqt\">Henry</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2344;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Ohm</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2350;</span>",
      "<span class=\"eqt\">Tesla</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2360;&#2381;&#2354;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The SI unit of resistance is the Ohm (&#937;).</p><p>Siemens (S): The siemens is the SI unit of electrical conductance. Conductance is the reciprocal of resistance, meaning it's a measure of how easily an electric current can pass through a material.</p><p></p><p>Henry (H): The henry is the SI unit of inductance. Inductance is a property of an electrical circuit that opposes changes in electric current. It's often associated with coils of wire and magnetic fields.</p><p></p><p>Tesla (T): The tesla is the SI unit of magnetic flux density or magnetic field strength. It's used to measure the strength of a magnetic field.</p>",
    "question_index": 17
