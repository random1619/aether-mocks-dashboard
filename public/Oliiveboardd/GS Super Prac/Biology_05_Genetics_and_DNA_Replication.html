<body>
    <!-- Welcome Screen -->

                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Among the following diseases, which one is NOT inherited?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2348;&#2368;&#2350;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2348;&#2368;&#2350;&#2366;&#2352;&#2368; &#2357;&#2306;&#2358;&#2366;&#2327;&#2340; <b>&#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cystic fibrosis</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2335;&#2368;&#2351; &#2352;&#2375;&#2358;&#2366;&#2350;&#2351;&#2340;&#2366;/&#2360;&#2367;&#2360;&#2381;&#2335;&#2367;&#2325; &#2347;&#2366;&#2311;&#2348;&#2381;&#2352;&#2379;&#2360;&#2367;&#2360;</span>",
      "<span class=\"eqt\">Down syndrome</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2366;&#2313;&#2344; &#2360;&#2367;&#2306;&#2337;&#2381;&#2352;&#2379;&#2350;</span>",
      "<span class=\"eqt\">Muscular dystrophy</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2358;&#2368; &#2342;&#2369;&#2359;&#2381;&#2346;&#2379;&#2359;&#2339;/&#2350;&#2360;&#2381;&#2325;&#2369;&#2354;&#2352; &#2337;&#2367;&#2360;&#2381;&#2335;&#2381;&#2352;&#2377;&#2347;&#2368;</span>",
      "<span class=\"eqt\">Malaria</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2354;&#2375;&#2352;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Malaria</b> is the only disease in the list that is not inherited. Unlike Cystic fibrosis, Down syndrome, and Muscular dystrophy, which have genetic origins, Malaria is caused by parasites transmitted through mosquito bites and does not pass from one generation to another through genetic inheritance.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Who developed the technique of preserving food by raising its temperature to prevent microbial growth?</p></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350;&#2332;&#2368;&#2357;&#2379;&#2306; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2379; &#2352;&#2379;&#2325;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2348;&#2338;&#2364;&#2366;&#2325;&#2352; &#2349;&#2379;&#2332;&#2344; &#2325;&#2379; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2340;&#2325;&#2344;&#2368;&#2325; &#2325;&#2367;&#2360;&#2344;&#2375; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2325;&#2368;?</span>",
    "options": [
      "<span class=\"eqt\">Robert Koch</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2377;&#2348;&#2352;&#2381;&#2335; &#2325;&#2379;&#2330;</span>",
      "<span class=\"eqt\">Antonie van Leeuwenhoek</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2335;&#2379;&#2344;&#2368; &#2357;&#2376;&#2344; &#2354;&#2368;&#2313;&#2357;&#2375;&#2344;&#2361;&#2377;&#2325;</span>",
      "<span class=\"eqt\">Louis Pasteur</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2369;&#2312; &#2346;&#2366;&#2358;&#2381;&#2330;&#2352;</span>",
      "<span class=\"eqt\">Joseph Lister</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2379;&#2360;&#2375;&#2347; &#2354;&#2367;&#2360;&#2381;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Pasteurization</b> is the process of heating food (usually liquids like milk) to eliminate pathogens and extend shelf life.</p><p>&#183; Developed by <b>Louis Pasteur</b> in the 1860s.</p><p><b>Other options:</b></p><p>&#183; (1) <b>Robert Koch</b>: Pioneered germ theory, identified tuberculosis bacterium.</p><p>&#183; (2) <b>Antonie van Leeuwenhoek</b>: Invented microscopes, first to observe microorganisms.</p><p>&#183; (4) <b>Joseph Lister</b>: Introduced antiseptic surgery.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following enzymes are essential for DNA replication in an animal cell?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2319;&#2306;&#2332;&#2366;&#2311;&#2350; &#2346;&#2358;&#2369; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2350;&#2375;&#2306; &#2337;&#2368;&#2319;&#2344;&#2319; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2371;&#2340;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Reverse transcriptase, DNA polymerase, DNA primase</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2357;&#2352;&#2381;&#2360; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2325;&#2381;&#2352;&#2367;&#2346;&#2335;&#2375;&#2360;, &#2337;&#2368;&#2319;&#2344;&#2319; &#2346;&#2377;&#2354;&#2368;&#2350;&#2352;&#2375;&#2332;&#2364;, &#2337;&#2368;&#2319;&#2344;&#2319; &#2346;&#2381;&#2352;&#2366;&#2311;&#2350;&#2375;&#2332;&#2364;</span>",
      "<span class=\"eqt\">Topoisomerase, DNA ligase, DNA polymerase, DNA primase</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2379;&#2346;&#2379;&#2310;&#2311;&#2360;&#2379;&#2350;&#2375;&#2352;&#2375;&#2332;&#2364;, &#2337;&#2368;&#2319;&#2344;&#2319; &#2354;&#2366;&#2311;&#2327;&#2375;&#2332;, &#2337;&#2368;&#2319;&#2344;&#2319; &#2346;&#2377;&#2354;&#2368;&#2350;&#2352;&#2375;&#2332;&#2364;, &#2337;&#2368;&#2319;&#2344;&#2319; &#2346;&#2381;&#2352;&#2366;&#2311;&#2350;&#2375;&#2332;&#2364;</span>",
      "<span class=\"eqt\">Reverse transcriptase, RNA polymerase, Ligase</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2357;&#2352;&#2381;&#2360; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2325;&#2381;&#2352;&#2367;&#2346;&#2335;&#2375;&#2360;, &#2310;&#2352;&#2319;&#2344;&#2319; &#2346;&#2377;&#2354;&#2368;&#2350;&#2352;&#2375;&#2332;&#2364;, &#2354;&#2366;&#2311;&#2327;&#2375;&#2360;</span>",
      "<span class=\"eqt\">Reverse transcriptase, DNA polymerase, Ligase</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2357;&#2352;&#2381;&#2360; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2325;&#2381;&#2352;&#2367;&#2346;&#2335;&#2375;&#2360;, &#2337;&#2368;&#2319;&#2344;&#2319; &#2346;&#2377;&#2354;&#2368;&#2350;&#2352;&#2375;&#2332;&#2364;, &#2354;&#2366;&#2311;&#2327;&#2375;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The process of DNA replication requires several key enzymes:</p><p>&#183; DNA Polymerase: Synthesizes the new DNA strand.</p><p>&#183; DNA Primase: Creates RNA primers needed for replication.</p><p>&#183; Topoisomerase: Prevents supercoiling by cutting and rejoining DNA strands.</p><p>&#183; DNA Ligase: Seals gaps between Okazaki fragments on the lagging strand.</p><p>Reverse Transcriptase is used in RNA-based viruses, not in normal DNA replication.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What is the primary gas responsible for the leavening effect in bread when yeast ferments sugars?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2326;&#2350;&#2368;&#2352; &#2358;&#2352;&#2381;&#2325;&#2352;&#2366; &#2325;&#2379; &#2325;&#2367;&#2339;&#2381;&#2357;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2352;&#2379;&#2335;&#2368; &#2350;&#2375;&#2306; &#2326;&#2350;&#2368;&#2352;&#2368;&#2325;&#2352;&#2339; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2327;&#2376;&#2360; &#2325;&#2380;&#2344; &#2360;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Carbon dioxide</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2312;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Nitrogen</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Oxygen</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Helium</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2368;&#2354;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The primary gas responsible for the leavening effect in bread during yeast fermentation is <b>carbon dioxide</b>. </p><p>&#183; When yeast ferments sugars, it produces carbon dioxide and alcohol as byproducts.</p><p>&#183; The carbon dioxide gas gets trapped in the dough, forming bubbles that cause the dough to rise.</p><p><b>Further Insight:</b></p><p>&#183; <b>Nitrogen</b>: Not produced by yeast fermentation.</p><p>&#183; <b>Oxygen</b>: Used by yeast in aerobic respiration, but not the primary leavening gas.</p><p>&#183; <b>Helium</b>: An inert gas, not involved in fermentation.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The phenomenon of the interaction between nonallelic genes at two or more loci resulting in one gene masking the phenotypic expression of another gene, is known as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2351;&#2366; &#2309;&#2343;&#2367;&#2325; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2346;&#2352; &#2327;&#2376;&#2352;-&#2319;&#2354;&#2368;&#2354;&#2367;&#2325; &#2332;&#2368;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2368; &#2328;&#2335;&#2344;&#2366; &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2319;&#2325; &#2332;&#2368;&#2344; &#2342;&#2370;&#2360;&#2352;&#2375; &#2332;&#2368;&#2344; &#2325;&#2368; &#2347;&#2375;&#2344;&#2379;&#2335;&#2366;&#2311;&#2346;&#2367;&#2325; &#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2331;&#2369;&#2346;&#2366; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2313;&#2360;&#2375; &#2311;&#2360; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Linkage</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2337;&#2364;&#2368;</span>",
      "<span class=\"eqt\">Complete inheritance</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2339; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Epistasis</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2346;&#2367;&#2360;&#2381;&#2335;&#2366;&#2360;&#2367;&#2360;</span>",
      "<span class=\"eqt\">Incomplete inheritance</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2370;&#2352;&#2381;&#2339; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Epistasis</b> is a genetic phenomenon where <b>one gene (at one locus) masks or suppresses the expression of another gene (at a different locus)</b>. These genes are <b>nonallelic</b>, meaning they are not alternate forms of the same gene.</p><p>&#183; For example, in some coat color traits in animals, one gene may control pigment production, and another may determine pigment color. If the gene for pigment production is turned \"off,\" the color gene cannot express itself - this is epistasis.</p><p>&#183; It is a form of <b>non-Mendelian inheritance</b>.</p><p>&#183; Example: In Labrador Retrievers, coat color is controlled by two genes, and one can mask the expression of the other.</p><p>Other options:</p><p>&#183; <b>Linkage</b>  -  When genes are located close together on the same chromosome and tend to be inherited together.</p><p>&#183; <b>Complete inheritance</b>  -  Not a standard term in genetics.</p><p>&#183; <b>Incomplete inheritance</b>  -  Likely refers to <b>Incomplete Dominance</b>, where the heterozygous phenotype is an intermediate between both homozygous phenotypes (e.g., red + white = pink flowers).</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which types of gametes are found in Spirogyra?</p></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2366;&#2311;&#2352;&#2379;&#2327;&#2366;&#2311;&#2352;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2351;&#2369;&#2327;&#2381;&#2350;&#2325; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</span>",
    "options": [
      "<span class=\"eqt\">Isogamous and flagellated</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2357;&#2367;&#2357;&#2366;&#2361;&#2368; &#2324;&#2352; &#2325;&#2358;&#2366;&#2349;&#2367;&#2325;&#2366;&#2351;&#2369;&#2325;&#2381;&#2340;</span>",
      "<span class=\"eqt\">Heterogamous and non-flagellated</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2359;&#2350;&#2354;&#2367;&#2306;&#2327;&#2368; &#2324;&#2352; &#2327;&#2376;&#2352;-&#2343;&#2381;&#2357;&#2332;&#2366;&#2306;&#2325;&#2367;&#2340;</span>",
      "<span class=\"eqt\">Heterogamous and flagellated</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2359;&#2350;&#2354;&#2367;&#2306;&#2327;&#2368; &#2324;&#2352; &#2325;&#2358;&#2366;&#2349;&#2367;&#2325;&#2366;&#2351;&#2369;&#2325;&#2381;&#2340;</span>",
      "<span class=\"eqt\">Isogamous and non-flagellated</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2357;&#2367;&#2357;&#2366;&#2361;&#2368; &#2324;&#2352; &#2327;&#2376;&#2352;-&#2343;&#2381;&#2357;&#2332;&#2366;&#2306;&#2325;&#2367;&#2340;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Spirogyra, a green filamentous algae, reproduces sexually through isogamy, where both gametes are identical in size and structure. The gametes are non-flagellated, meaning they lack movement and rely on water currents for fusion during reproduction.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which bacteria have a thick cell wall with several layers of peptidoglycan and teichoic acid?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2348;&#2376;&#2325;&#2381;&#2335;&#2368;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2346;&#2375;&#2346;&#2381;&#2335;&#2367;&#2337;&#2379;&#2327;&#2381;&#2354;&#2366;&#2311;&#2325;&#2344; &#2324;&#2352; &#2335;&#2375;&#2325;&#2379;&#2311;&#2325; &#2319;&#2360;&#2367;&#2337; &#2325;&#2368; &#2325;&#2312; &#2346;&#2352;&#2340;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2350;&#2379;&#2335;&#2368; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2349;&#2367;&#2340;&#2381;&#2340;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Staphylococcus aureus</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2366;&#2347;&#2368;&#2354;&#2379;&#2325;&#2379;&#2325;&#2360; &#2321;&#2352;&#2368;&#2309;&#2360;</span>",
      "<span class=\"eqt\">Pseudomonas aeruginosa</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2351;&#2370;&#2337;&#2379;&#2350;&#2379;&#2344;&#2366;&#2360; &#2319;&#2352;&#2369;&#2327;&#2367;&#2344;&#2379;&#2360;&#2366;</span>",
      "<span class=\"eqt\">Salmonella enterica</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2354;&#2381;&#2350;&#2379;&#2344;&#2375;&#2354;&#2366; &#2319;&#2344;&#2381;&#2335;&#2375;&#2352;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Escherichia coli</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2358;&#2352;&#2368;&#2325;&#2367;&#2351;&#2366; &#2325;&#2379;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Bacteria are broadly classified into Gram-positive and Gram-negative based on their cell wall structure and Gram staining reaction.</p><p>&#183; <b>Gram-positive bacteria</b> have a thick cell wall composed of multiple layers of peptidoglycan and also contain teichoic acids (including lipoteichoic acids) embedded within this peptidoglycan layer.</p><p>&#183; Gram-negative bacteria have a thinner peptidoglycan layer and an outer membrane containing lipopolysaccharides (LPS).</p><p>Among the options:</p><p>&#183; <b>Staphylococcus aureus:</b> This is a Gram-positive bacterium. It has a thick peptidoglycan layer and teichoic acids in its cell wall.</p><p>&#183; Pseudomonas aeruginosa: This is a Gram-negative bacterium.</p><p>&#183; Salmonella enterica: This is a Gram-negative bacterium.</p><p>&#183; Escherichia coli (E. coli): This is a Gram-negative bacterium.</p><p>Therefore, <b>Staphylococcus aureus</b> has a thick cell wall with several layers of peptidoglycan and teichoic acid.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The phenomenon whereby the female gamete undergoes development to form new organisms without fertilisation in some organisms like rotifers, honeybees, some lizards and birds is called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2346;&#2352;&#2367;&#2328;&#2335;&#2344;&#2366; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2332;&#2368;&#2357;&#2379;&#2306; &#2332;&#2376;&#2360;&#2375; &#2352;&#2379;&#2335;&#2367;&#2347;&#2364;&#2352;&#2381;&#2360;, &#2350;&#2343;&#2369;&#2350;&#2325;&#2381;&#2326;&#2367;&#2351;&#2379;&#2306;, &#2325;&#2369;&#2331; &#2331;&#2367;&#2346;&#2325;&#2354;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2346;&#2325;&#2381;&#2359;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2350;&#2366;&#2342;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350;&#2325; &#2348;&#2367;&#2344;&#2366; &#2344;&#2367;&#2359;&#2375;&#2330;&#2344; &#2325;&#2375; &#2344;&#2319; &#2332;&#2368;&#2357;&#2379;&#2306; &#2325;&#2379; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2313;&#2360;&#2375; _____ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">apomixis</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2306;&#2327;&#2332;&#2344;&#2344;</span>",

      "<span class=\"eqt\">budding</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2325;&#2369;&#2354;&#2344;</span>",
      "<span class=\"eqt\">parthenogenesis</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2367;&#2359;&#2375;&#2325;&#2332;&#2344;&#2344;</span>"

    "correct_option_id": 3,
    "solution": "<p><b>Parthenogenesis</b> is a reproductive strategy in which the female gamete develops into a new organism without fertilization by a male gamete. This phenomenon is observed in various species, including rotifers, honeybees, some lizards, and birds, enabling reproduction without the need for mating.</p>",

    "question": "<span class=\"eqt\"><p>In which year did Avery, MacLeod and McCarty prove that all living organisms (except viruses) have DNA as their genetic material?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2319;&#2357;&#2352;&#2368;, &#2350;&#2376;&#2325;&#2354;&#2367;&#2351;&#2379;&#2337; &#2324;&#2352; &#2350;&#2376;&#2325;&#2366;&#2352;&#2381;&#2341;&#2368; &#2344;&#2375; &#2351;&#2361; &#2360;&#2366;&#2348;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2325;&#2367; &#2360;&#2349;&#2368; &#2332;&#2368;&#2357;&#2367;&#2340; &#2332;&#2368;&#2357;&#2379;&#2306; (&#2357;&#2366;&#2351;&#2352;&#2360; &#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352;) &#2350;&#2375;&#2306; &#2310;&#2344;&#2369;&#2357;&#2306;&#2358;&#2367;&#2325; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2337;&#2368;&#2319;&#2344;&#2319; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 2,
    "solution": "<p>&#183; In <b>1944</b>, <b>Oswald Avery</b>, <b>Colin MacLeod</b>, and <b>Maclyn McCarty</b> conducted experiments that demonstrated that <b>DNA is the substance that carries genetic information</b> in organisms. </p><p>&#183; They worked with the bacterium <i>Streptococcus pneumoniae</i> and showed that DNA could transform the properties of cells  -  a process known as <b>transformation</b>. </p><p>&#183; This was a landmark discovery in molecular biology, establishing DNA as the genetic material (except in some viruses, which have RNA instead).</p>",
