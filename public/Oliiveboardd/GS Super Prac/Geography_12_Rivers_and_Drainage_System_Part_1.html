<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>The Wardha is a tributary of which of the following rivers?</p>",
    "options": [
      "Mahanadi",
      "Tapi",
      "Godavari",
      "Narmada"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Wardha River is a major tributary of the Godavari River, originating in Madhya Pradesh and flowing through Maharashtra.</p><p>&bull; Option 1: Mahanadi  -  Incorrect, Mahanadi flows in Chhattisgarh and Odisha.</p><p>&bull; Option 2: Tapi  -  Incorrect, flows in Madhya Pradesh, Maharashtra, and Gujarat.</p><p>&bull; Option 4: Narmada  -  Incorrect, flows in Madhya Pradesh and Gujarat.</p>",
    "question_index": 0
  },
  {
    "question": "<p>In which group of states does the Luni River flow?</p>",
    "options": [
      "Bihar and West Bengal",
      "Andhra Pradesh and Telangana",
      "Rajasthan and Gujarat",
      "Maharashtra and Karnataka"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Luni River originates in the Aravalli Range near Ajmer in Rajasthan and flows southwestward into the Rann of Kutch in Gujarat. It is the largest river in the Thar Desert and is saline in its lower reaches.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Subansiri, Jia Bharali, Dhansiri, and Puthimari are the major tributaries of which river?</p>",
    "options": [
      "Godavari",
      "Mahanadi",
      "Brahmaputra",
      "Bhagirathi"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Brahmaputra River, one of the major rivers in India, originates in Tibet and flows through Arunachal Pradesh and Assam before entering Bangladesh.</p><p>&#183; Subansiri, Jia Bharali, Dhansiri, and Puthimari are its major tributaries in Assam.</p><p>&#183; These tributaries contribute significantly to the river's flow, particularly during the monsoon season.</p><p>Thus, the correct answer is option 3.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Tsangpo and Jamuna are other names of which river?</p>",
    "options": [
      "Indus",
      "Ganga",
      "Narmada",
      "Brahmaputra"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Brahmaputra River is known by different names in different regions:</p><p>&#183; In Tibet, it is called Tsangpo (meaning \"Purifier\").</p><p>&#183; In Bangladesh, it is called Jamuna.</p><p>&#183; In India, it flows through Arunachal Pradesh and Assam before entering Bangladesh.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Which of the following rivers is an east-flowing river?</p>",
    "options": [
      "Mahi River",
      "Narmada River",
      "Godavari River",
      "Tapi River"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Godavari River is an east-flowing river that originates in Maharashtra and drains into the Bay of Bengal.</p><p>&#183; Mahi and Tapi Rivers flow westward into the Arabian Sea.</p><p>&#183; Narmada River also flows westward into the Arabian Sea.</p><p>Thus, the correct answer is Godavari River.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Which of the following rivers originates from the Himalayas?</p><p></p>",
    "options": [
      "Godavari",
      "Tapi",
      "Narmada",
      "Ganga"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct answer is Ganga. The Ganga River originates from the Gangotri Glacier in the Himalayas in Uttarakhand, India. The other rivers mentionedGodavari, Tapi, and Narmadaoriginate from the Deccan Plateau and are not Himalayan rivers.</p>",
    "question_index": 5
  },
  {
    "question": "<p>The river known as Ganges of the South is:</p>",
    "options": [
      "Godavari",
      "Krishna",
      "Kaveri",
      "None of these"
    ],
    "correct_option_id": 2,
    "solution": "<p>Kaveri River is known as Dakshin Ganga (Ganges of the South). It is celebrated for its scenery and sanctity in Tamil literature, and its entire course is considered holy ground. The river is also important for its irrigation canal projects.</p>",
    "question_index": 6
  },
  {
    "question": "<p>In which of the following states is Anchar Lake located?</p>",
    "options": [
      "Bihar",
      "Meghalaya",
      "Assam",
      "Jammu and Kashmir"
    ],
    "correct_option_id": 3,
    "solution": "<p>Anchar Lake is a lake located near Soura area in the city of Srinagar, <b>Jammu and Kashmir</b>, India. Situated close to Ganderbal, the lake is connected with the famous Dal Lake via a channel \"Amir Khan Nallah\" which passes through Gilsar and Khushal Sar.</p>",
    "question_index": 7
  },
  {
    "question": "<p>In the context of rivers and their tributaries, which of the following pairs is correct?</p>",
    "options": [
      "Krishna  -  Manjra",
      "Godavari  -  Kabini",
      "Indus  -  Subansiri",
      "Alaknanda  -  pindar"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Manjra is a tributary of the Godavari River.</p><p>&bull; Kabini is one of the major tributary of the Cauvery River.</p><p>&bull; The Subansiri River is a trans-Himalayan river and a tributary of the Brahmaputra River.</p><p>&bull; <b>Pindar River </b>flows in Uttarakhand, India. Pindar originates from Pindari Glacier which is located in Bageshwar district of Kumaon region in Uttarakhand. It is a tributary of <b>Alaknanda</b><b> River</b>.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Which of the following is the largest inhabited riverine island in the world?</p>",
    "options": [
      "Peacock",
      "Majuli",
      "Bhavani",
      "Lakshadweep"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Majuli Island, located in the Brahmaputra River, Assam, India, is recognized as the largest inhabited riverine island in the world.</p><p>&bull; It became the first island district of India in 2016.</p><p>&bull; Majuli is known for its Vaishnavite monasteries (Satras) and is a center of Assamese culture.</p><p>&bull; Due to erosion and climate change, its size has reduced significantly over the years.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Which of the following Indian cities is situated at the banks of Lake Pichola?</p>",
    "options": [
      "Udaipur",
      "Ahmedabad",
      "Agra",
      "Kurnool"
    ],
    "correct_option_id": 0,
    "solution": "<p>One of the oldest and the biggest lakes in <b>Udaipur</b>, <b>Pichola</b> lake is world famous for its picturesque beauty and scenic surrounding. Rudyard Kipling mentioned this lake in his Letters of Marque (1899), \"If the Venetian, owned the Pichola Lake, he might say with justice, see it and die</p>",
    "question_index": 10
  },
  {
    "question": "<p>The Gandak River is a tributary of which river?</p>",
    "options": [
      "Yamuna River",
      "Ganga River",
      "Kaveri River",
      "Brahmaputra River"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Gandak River originates in Nepal and flows through Bihar, where it merges with the Ganga River near Hajipur. It is a major river of northern India and Nepal.</p>",
    "question_index": 11
  },
  {
    "question": "<p>'Bhagirathi' and 'Alaknanda' rivers confluence at:</p>",
    "options": [
      "Joshimath",
      "Haridwar",
      "Karanprayag",
      "Devaprayag"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Bhagirathi and Alaknanda rivers meet at Devaprayag in Uttarakhand. After this confluence, the river is known as the Ganga (Ganges). Devaprayag is one of the Panch Prayag (five confluences) of Alaknanda River and is considered one of the holiest places in Hinduism. The town of Devaprayag is situated at an elevation of 830 meters above sea level.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Which of the following rivers is INCORRECTLY matched with its respective place of origin?</p>",
    "options": [
      "Mahanadi- Sihawa Mountain",
      "Sutlej - Dal Lake",
      "Ganga - Gangotri glacier",
      "Godavari - Trimbakeshwar"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Sutlej River does not originate from Dal Lake. The Sutlej River's actual origin is in the Tibetan plateau near Lake Rakshastal. Dal Lake is a significant lake in the Indian-administered region of Jammu and Kashmir, but it is not the source of the Sutlej River. </p><p>Hence, option (b) is correct. </p>",
    "question_index": 13
  },
  {
    "question": "<p>On which lake is the world's only floating post office situated?</p>",
    "options": [
      "Wular Lake",
      "Dal Lake",
      "Chilika Lake",
      "Loktak Lake"
    ],
    "correct_option_id": 1,
    "solution": "<p>The \"Floating Post Office, <b>Dal Lake</b>\", claimed to be the only such in the world, is built on an intricately carved maroon houseboat, now moored on the western edge of the Dal Lake. Jammu Kashmir is often credited as the crown to India's glory.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Which of the following is NOT a tributary of the Ganga?</p>",
    "options": [
      "Yamuna",
      "Gandak",
      "Kosi",
      "Lohit"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Lohit River is NOT a tributary of the Ganga; it is a tributary of the Brahmaputra River in Arunachal Pradesh. The Yamuna, Gandak, and Kosi are major tributaries of the Ganga.</p>",
    "question_index": 15
  },
  {
    "question": "<p>The Bhakra Dam in India is built on:</p>",
    "options": [
      "Beas river",
      "Jhelum river",
      "Sutlej river",
      "Ghaghara river"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Bhakra Dam is one of the highest straight gravity dams in the world. It has been constructed on the Sutlej at the site of Bhakra gorge near Rupnagar (Ropar). The dam is 226 metre high and 518 metres long with its maximum width at the base as 362 metre.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Match the following:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Characteristics/Other Name</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Name Of River</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Area of Badland topography</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Godavari</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Vridh Ganga</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Brahmaputra</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Tsangpo</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Kosi</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Sorrow of Bihar</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Chambal</td></tr></table>",
    "options": [
      "A-1, B-4, C-2, D-3",
      "A-4, B-2, C-1, D-3",
      "A-4, B-1, C-3, D-2",
      "A-4, B-1, C-2, D-3"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Chambal River basin is known for its badland topography.</p><p>Vridh Ganga is an alternative name for the Godavari River.</p><p>Tsangpo is the name of the Brahmaputra River as it flows through Tibet before entering India. The Kosi River is often referred to as the \"Sorrow of Bihar\" due to its historical tendency to cause severe floods in the region.</p><p>Hence, correct combination is A-4, B-1, C-2, D-3.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Which of the following is NOT an antecedent river in India?</p>",
    "options": [
      "Indus",
      "Yamuna",
      "Kosi",
      "Ganga"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Yamuna is not an example of an antecedent river.</p><p>&bull; An antecedent river is a river that maintains its original course even after the land over which it flows undergoes tectonic uplift, such as the formation of mountains. </p><p>&bull; These rivers are older than the geological structures they traverse and have the erosive power to cut through rising terrain, forming deep gorges.</p><p>&bull; Examples of Antecedent Rivers in India</p><p>&#9675; Indus River</p><p>&#9675; Satluj River</p><p>&#9675; Brahmaputra River</p><p>&#9675; Kosi River</p><p>&#9675; Saryu (Kali) River</p><p>&#9675; Arun River (a tributary of the Kosi)</p><p>&bull; These rivers originated before the uplift of the Himalayas and have carved out deep valleys and gorges as they continue to flow through the rising mountain ranges .</p>",
    "question_index": 18
  },
  {
    "question": "<p>In the ancient temple of Mahadev at Mahabaleshwar, the spout emerging from the mouth of a cow statue is the source of which river basin?</p><p>Options:</p>",
    "options": [
      "Kaveri",
      "Krishna",
      "Godavari",
      "Narmada"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The Krishna River originates from Mahabaleshwar, Maharashtra, where it emerges from the mouth of a cow (Gomukh) in the ancient Mahadev temple.</p><p>&#183; Kaveri, Godavari, and Narmada have different origins.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
