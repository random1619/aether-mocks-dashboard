<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>

                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

            </div>
        </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">

        <div class="exam-header">

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements accurately describes the content of the Annual Financial Statement as per Article 112 of the Indian Constitution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 112 &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2357;&#2367;&#2357;&#2352;&#2339; &#2325;&#2368; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2325;&#2366; &#2360;&#2335;&#2368;&#2325; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It includes only estimates of revenue receipts and expenditure.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2357;&#2381;&#2351;&#2351; &#2325;&#2366; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It covers estimates of revenue and capital receipts, actual receipts and expenditure of the previous year, and the economic policy for the coming year.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2324;&#2352; &#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;, &#2346;&#2367;&#2331;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2366;&#2306; &#2324;&#2352; &#2357;&#2381;&#2351;&#2351; &#2340;&#2341;&#2366; &#2310;&#2327;&#2366;&#2350;&#2368; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It only provides details about the actual receipts and expenditure of the current financial year.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2325;&#2375;&#2357;&#2354; &#2330;&#2366;&#2354;&#2370; &#2357;&#2367;&#2340;&#2381;&#2340; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2357;&#2381;&#2351;&#2351; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2357;&#2367;&#2357;&#2352;&#2339; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It focuses solely on the economic and financial policies for the coming year.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2310;&#2327;&#2366;&#2350;&#2368; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2324;&#2352; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2344;&#2368;&#2340;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Annual Financial Statement includes more than just estimates of revenue receipts and expenditure; it also covers capital receipts and expenditure</b> etc.</p><p>&bull; This option accurately describes the comprehensive content of the Annual Financial Statement as it includes estimates of revenue and capital receipts, details of actual receipts and expenditure of the closing year, and the economic policy for the coming year.</p><p>&bull; It provides more than just details of the current year's actual receipts and expenditure.</p><p><b>Further Insight:</b></p><p>&bull; <b>Article: 112 Annual financial statement.</b></p><p>&#9675; (1) The <b>President shall in respect of every financial year cause to be laid</b> before both the Houses of Parliament a<b> statement of the estimated receipts and expenditure of the Government of India for that year</b>, in this Part referred to as the \"annual financial statement''.</p><p>&#9675; (2) The estimates of expenditure embodied in the annual financial statement shall show separately - </p><p>&#9632; (a) the <b>sums required to meet expenditure described by this Constitution as expenditure charged upon the Consolidated Fund of India</b>; </p><p>&#9632; (b) the<b> sums required to meet other expenditure proposed to be made from the Consolidated Fund of India</b>, and shall distinguish expenditure on revenue account from other expenditure</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which body is primarily responsible for preparing the Union Budget?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2368;&#2351; &#2348;&#2332;&#2335; &#2340;&#2376;&#2351;&#2366;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2367;&#2325;&#2366;&#2351; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ministry of Commerce and Industry</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351; &#2319;&#2357;&#2306; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Reserve Bank of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2367;&#2332;&#2352;&#2381;&#2357; &#2348;&#2376;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Budget Division of the Department of Economic Affairs</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2325;&#2375; &#2357;&#2367;&#2349;&#2366;&#2327; &#2325;&#2366; &#2348;&#2332;&#2335; &#2346;&#2381;&#2352;&#2349;&#2366;&#2327;</span>",
      "<span class=\"eqt\">Planning Commission</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2379;&#2332;&#2344;&#2366; &#2310;&#2351;&#2379;&#2327;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The Ministry of Commerce and Industry does not prepare the Union Budget.</p><p>&bull; The<b> Reserve Bank of India does not prepare the Union Budget but plays a role in deficit financing</b>.</p><p>&bull; The <b>Budget Division of the Department of Economic Affairs in the Finance Ministry is responsible for preparing the Budget.</b></p><p>&bull; The Planning Commission was replaced by the NITI Aayog and does not prepare the Union Budget.</p><p><b>Further Insight:</b></p><p>&bull; <b>Finance Minister: Nirmala Sitharaman</b></p><p>&bull; <b>Current Chief Economic Advisor (CEA) is Venkatraman Anantha Nageswaran</b></p><p>&#9675; <b>CEA prepares the Economic Survey and Present Before Budget.</b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following changes introduced in the 2017 Budget presentation aimed to streamline the budgeting process?</p></span><span class=\"hqt\" style=\"display:none\"><p>2017 &#2325;&#2375; &#2348;&#2332;&#2335; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340;&#2367; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2348;&#2332;&#2335; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2360;&#2369;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Introduction of a new tax regime</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2312; &#2325;&#2352; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2366; &#2346;&#2352;&#2367;&#2330;&#2351;</span>",
      "<span class=\"eqt\">Merger of Railway Budget with the General Budget</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2354; &#2348;&#2332;&#2335; &#2325;&#2366; &#2310;&#2350; &#2348;&#2332;&#2335; &#2350;&#2375;&#2306; &#2357;&#2367;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Increase in the number of financial statements</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2357;&#2367;&#2357;&#2352;&#2339;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Extension of the financial year</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2357;&#2352;&#2381;&#2359; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The merger of the Railway Budget with the General Budget was a significant change aimed at streamlining the budgeting process.</b></p><p><b>Further Insight:</b></p><p>&bull; The Union Budget for 2017-18 was announced by Finance Minister Arun Jaitley on February 1, 2017.</p><p>&bull; The budget included three major reforms:</p><p>&#9675; The date of presentation was advanced</p><p>&#9675; The railway budget was merged with the general budget</p><p>&#9675; Plan and non-plan expenditure were eliminated </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following best describes the difference between Plan and Non-Plan Expenditure?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366; &#2324;&#2352; &#2327;&#2376;&#2352;-&#2351;&#2379;&#2332;&#2344;&#2366; &#2357;&#2381;&#2351;&#2351; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2340;&#2352; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Plan Expenditure includes interest payments, while Non-Plan Expenditure includes developmental projects.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2379;&#2332;&#2344;&#2366; &#2357;&#2381;&#2351;&#2351; &#2350;&#2375;&#2306; &#2348;&#2381;&#2351;&#2366;&#2332; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2327;&#2376;&#2352;-&#2351;&#2379;&#2332;&#2344;&#2366; &#2357;&#2381;&#2351;&#2351; &#2350;&#2375;&#2306; &#2357;&#2367;&#2325;&#2366;&#2360;&#2366;&#2340;&#2381;&#2350;&#2325; &#2346;&#2352;&#2367;&#2351;&#2379;&#2332;&#2344;&#2366;&#2319;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Plan Expenditure is related to developmental activities, while Non-Plan Expenditure covers regular administrative expenses.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2379;&#2332;&#2344;&#2366;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351; &#2357;&#2367;&#2325;&#2366;&#2360;&#2366;&#2340;&#2381;&#2350;&#2325; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2327;&#2376;&#2352;-&#2351;&#2379;&#2332;&#2344;&#2366;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;&#2367;&#2325; &#2357;&#2381;&#2351;&#2351; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Plan Expenditure pertains to Pension, while Non-Plan Expenditure relates to tax revenues.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2379;&#2332;&#2344;&#2366; &#2357;&#2381;&#2351;&#2351; &#2346;&#2375;&#2306;&#2358;&#2344; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2327;&#2376;&#2352;-&#2351;&#2379;&#2332;&#2344;&#2366; &#2357;&#2381;&#2351;&#2351; &#2325;&#2352; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Plan Expenditure is concerned with Statutory transfers to States, while Non-Plan Expenditure deals with loans and borrowings.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2379;&#2332;&#2344;&#2366;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2360;&#2366;&#2306;&#2357;&#2367;&#2343;&#2367;&#2325; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2339; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2327;&#2376;&#2352;-&#2351;&#2379;&#2332;&#2344;&#2366;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351; &#2315;&#2339; &#2324;&#2352; &#2313;&#2343;&#2366;&#2352; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Interest payments are part of Non-Plan Expenditure, not Plan Expenditure.</p><p>&bull; <b>Plan Expenditure is related to developmental and planning activities, while Non-Plan Expenditure covers routine administrative expenses.</b></p><p>&bull; Pension are not considered Plan Expenditure, and tax revenues are not covered by Non-Plan Expenditure.</p><p>&bull; Plan Expenditure does not cover Statutory transfers to States, and Non-Plan Expenditure is not related to loans and borrowings in this context.</p><p><b>Further Insight:</b></p><p>&bull; Plan Expenditure</p><p>&#9675; Expenditures related to planning (e.g., Five Year Plans).</p><p>&#9675; For example: Electricity generation, irrigation, rural development, road construction.</p><p>&bull; Non-Plan Expenditure</p><p>&#9675; Expenditures other than plan expenditure.</p><p>&#9675; Examples: Interest payments, pensions, statutory transfers to states and union territories.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following accurately describes Capital Receipts?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2346;&#2370;&#2306;&#2332;&#2368; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2360;&#2335;&#2368;&#2325; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Receipts that increase the government's assets or decrease liabilities.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2366;&#2306; &#2332;&#2379; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306; &#2351;&#2366; &#2342;&#2375;&#2351;&#2340;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Receipts that do not impact the government's assets or liabilities.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2366;&#2306; &#2332;&#2379; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2351;&#2366; &#2342;&#2375;&#2344;&#2342;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2344;&#2361;&#2368;&#2306; &#2337;&#2366;&#2354;&#2340;&#2368;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Receipts that result from disinvestment and borrowing.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2344;&#2367;&#2357;&#2375;&#2358; &#2324;&#2352; &#2313;&#2343;&#2366;&#2352; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2366;&#2305;&#2404;</span>",
      "<span class=\"eqt\">Receipts used for routine administrative expenses.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;&#2367;&#2325; &#2357;&#2381;&#2351;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2352;&#2360;&#2368;&#2342;&#2375;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Capital Receipts typically decrease assets or increase liabilities.</p><p>&bull; Capital Receipts do impact the government's assets and liabilities.</p><p>&bull; <b>Capital Receipts include disinvestment and borrowings.</b></p><p>&bull; Routine administrative expenses are covered under Revenue Expenditure, not Capital Receipts.</p><p><b>Further Insight:</b></p><p><b><img width=584 height=301 id=image1.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25759/image001.jpg\"></b></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What is included in Revenue Expenditure?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351; &#2350;&#2375;&#2306; &#2325;&#2381;&#2351;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Long-term investments by the government in creating assets.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2350;&#2375;&#2306; &#2360;&#2352;&#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2368;&#2352;&#2381;&#2328;&#2325;&#2366;&#2354;&#2367;&#2325; &#2344;&#2367;&#2357;&#2375;&#2358;&#2404;</span>",
      "<span class=\"eqt\">The repayment of loans and borrowings.</span><span class=\"hqt\" style=\"display:none\">&#2315;&#2339; &#2319;&#2357;&#2306; &#2313;&#2343;&#2366;&#2352; &#2325;&#2368; &#2330;&#2369;&#2325;&#2380;&#2340;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Regular expenses such as salaries and pensions.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2340;&#2344; &#2324;&#2352; &#2346;&#2375;&#2306;&#2358;&#2344; &#2332;&#2376;&#2360;&#2375; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2357;&#2381;&#2351;&#2351;&#2404;</span>",
      "<span class=\"eqt\">Receipts from the sale of government assets.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2366;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Long-term investments are part of Capital Expenditure.</p><p>&bull; Repayment of loans is part of Capital Expenditure.</p><p>&bull; <b>Revenue Expenditure includes routine expenses such as salaries and pensions.</b></p><p>&bull; Receipts from asset sales are part of Capital Receipts</p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Budget Expenditure</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Revenue Expenditure (Components)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Capital Expenditure (Components)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b> </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(Expenditure which neither creates assets nor reduces liabilities)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(Expenditure which creates assets or reduces liabilities)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Examples</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Examples</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Examples</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Payment of interest</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Construction of roads, bridges, buildings</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Payment of salaries and pensions</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Purchase of land and machinery</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Grants and subsidies</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Investment in shares</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) Education and health services</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) Loans to states and foreign government</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(v) Defence services</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(v) Repayment of loans</td></tr></table>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a characteristic of a Deficit Budget?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2328;&#2366;&#2335;&#2375; &#2357;&#2366;&#2354;&#2375; &#2348;&#2332;&#2335; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Expected expenditure is equal to anticipated receipts.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2375;&#2325;&#2381;&#2359;&#2367;&#2340; &#2357;&#2381;&#2351;&#2351; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2366;&#2358;&#2367;&#2340; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Expected revenues exceed estimated expenditure.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2375;&#2325;&#2381;&#2359;&#2367;&#2340; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2357;&#2381;&#2351;&#2351; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Expenditure surpasses revenue for a designated year.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2342;&#2367;&#2359;&#2381;&#2335; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2381;&#2351;&#2351; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The budget is balanced with no surplus or deficit.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2332;&#2335; &#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340; &#2361;&#2376;, &#2311;&#2360;&#2350;&#2375;&#2306; &#2325;&#2379;&#2312; &#2309;&#2343;&#2367;&#2358;&#2375;&#2359; &#2351;&#2366; &#2328;&#2366;&#2335;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Expected expenditure is equal to anticipated receipts, It describes a<b> Balanced Budget.</b>.</p><p>&bull; Expected revenues exceed estimated expenditure, It describes a <b>Surplus Budget.</b></p><p>&bull; <b>A Deficit Budget occurs when expenditure exceeds revenue.</b></p><p>&bull; The budget is balanced with no surplus or deficit, It also describes a <b>Balanced Budget.</b></p><p><b>Further Inisght:</b></p><p>&bull; Types of Deficit:</p><p>&#9675; Revenue Deficit = Revenue Expenditure  -  Revenue Receipts</p><p>&#9675; Budgetary Deficit = Total Expenditure  -  Total Receipts (excluding net sale of treasury bills)</p><p>&#9675; Monetized Deficit (Deficit Financing) = Increase in net RBI credit to the Government</p><p>&#9675; Fiscal Deficit = Total Expenditure  -  (Revenue Receipts + Recovery of Loans + Receipts from the sale of assets by the Public Sector enterprises)</p><p>&#9675; Primary Deficit = Fiscal Deficit  -  Interest Payments</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What does the Fiscal Deficit measure?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2366; &#2325;&#2381;&#2351;&#2366; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The difference between total expenditure and revenue receipts plus non-debt creating capital receipts.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2354; &#2357;&#2381;&#2351;&#2351; &#2324;&#2352; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2340;&#2341;&#2366; &#2327;&#2376;&#2352;-&#2315;&#2339; &#2360;&#2371;&#2332;&#2344; &#2346;&#2370;&#2306;&#2332;&#2368; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352;&#2404;</span>",
      "<span class=\"eqt\">The excess of revenue expenditure over revenue receipts.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351; &#2325;&#2368; &#2309;&#2343;&#2367;&#2325;&#2340;&#2366;&#2404;</span>",
      "<span class=\"eqt\">The total borrowing requirements of the government.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2325;&#2369;&#2354; &#2313;&#2343;&#2366;&#2352; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366;&#2319;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The gap between expenditure and interest payments only.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2357;&#2381;&#2351;&#2351; &#2324;&#2352; &#2348;&#2381;&#2351;&#2366;&#2332; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Fiscal Deficit measures the difference between total expenditure and revenue receipts plus non-debt creating capital receipts.</b></p><p>&bull; Fiscal Deficit = Total Expenditure  -  (Revenue Receipts + Recovery of Loans + Receipts from the sale of assets by the Public Sector enterprises)</p><p>&bull; The excess of revenue expenditure over revenue receipts, it describes <b>Revenue Deficit</b>.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>What is the implication of a revenue deficit on government savings?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2328;&#2366;&#2335;&#2375; &#2325;&#2366; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2348;&#2330;&#2340; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2346;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It indicates the government is saving more and not spending beyond its means.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2360;&#2375; &#2360;&#2306;&#2325;&#2375;&#2340; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2325; &#2348;&#2330;&#2340; &#2325;&#2352; &#2352;&#2361;&#2368; &#2361;&#2376; &#2340;&#2341;&#2366; &#2309;&#2346;&#2344;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2326;&#2352;&#2381;&#2330; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2352;&#2361;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It implies that the government is spending more and using up savings from other sectors.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2366; &#2340;&#2366;&#2340;&#2381;&#2346;&#2352;&#2381;&#2351; &#2351;&#2361; &#2361;&#2376; &#2325;&#2367; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2325; &#2326;&#2352;&#2381;&#2330; &#2325;&#2352; &#2352;&#2361;&#2368; &#2361;&#2376; &#2340;&#2341;&#2366; &#2309;&#2344;&#2381;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2348;&#2330;&#2340; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352; &#2352;&#2361;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It shows that the government has a surplus in its revenue receipts.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2360;&#2375; &#2346;&#2340;&#2366; &#2330;&#2354;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2366;&#2306; &#2309;&#2343;&#2367;&#2358;&#2375;&#2359; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">It suggests an increase in capital expenditure.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2350;&#2375;&#2306; &#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2366; &#2360;&#2369;&#2333;&#2366;&#2357; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Revenue Deficit indicates overspending, not savings.</b></p><p>&bull; <b>Revenue Deficit implies that the government is spending more and using up savings from other sectors.</b></p><p>&bull; <b>A revenue deficit means the government's revenue receipts are not sufficient to cover its expenditure</b>.</p><p>&bull; Revenue Deficit does not specifically relate to an increase in capital expenditure.</p><p>&bull; Revenue Deficit = Revenue Expenditure  -  Revenue Receipts</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>What does Deficit Financing in India primarily involve?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2328;&#2366;&#2335;&#2375; &#2325;&#2375; &#2357;&#2367;&#2340;&#2381;&#2340;&#2346;&#2379;&#2359;&#2339; &#2350;&#2375;&#2306; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Borrowing from foreign sources.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2360;&#2381;&#2352;&#2379;&#2340;&#2379;&#2306; &#2360;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2375;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Issuing Treasury Bills and borrowing from the Reserve Bank of India.</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2375;&#2332;&#2352;&#2368; &#2348;&#2367;&#2354; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2367;&#2332;&#2352;&#2381;&#2357; &#2348;&#2376;&#2306;&#2325; &#2360;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2375;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Increasing taxes to cover the deficit.</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2366;&#2335;&#2375; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;&#2404;</span>",
      "<span class=\"eqt\">Reducing government expenditures significantly.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2357;&#2381;&#2351;&#2351; &#2350;&#2375;&#2306; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326;&#2344;&#2368;&#2351; &#2325;&#2350;&#2368; &#2354;&#2366;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>Deficit Financing primarily involves domestic borrowing rather than foreign sources.</b></p><p>&bull; <b>Deficit Financing involves issuing Treasury Bills and borrowing from the Reserve Bank of India.</b></p><p>&bull; Deficit Financing <b>does not primarily involve increasing taxes.</b></p><p>&bull; <b>Reducing expenditures is a measure to control deficit but not the main component of Deficit Financing.</b></p><p><b>Further Insight:</b></p><p>&bull; Types of Deficit:</p><p>&#9675; <b>Revenue Deficit = Revenue Expenditure  -  Revenue Receipts</b></p><p>&#9675; <b>Budgetary Deficit = Total Expenditure  -  Total Receipts (excluding net sale of treasury bills)</b></p><p>&#9675; <b>Monetized Deficit (Deficit Financing) = Increase in net RBI credit to the Government</b></p><p>&#9675; <b>Fiscal Deficit = Total Expenditure  -  (Revenue Receipts + Recovery of Loans + Receipts from the sale of assets by the Public Sector enterprises)</b></p><p>&#9675; <b>Primary Deficit = Fiscal Deficit  -  Interest Payments</b></p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>What is one of the primary objectives of the Fiscal Responsibility and Budget Management (FRBM) Act, 2003?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2313;&#2340;&#2381;&#2340;&#2352;&#2342;&#2366;&#2351;&#2367;&#2340;&#2381;&#2357; &#2324;&#2352; &#2348;&#2332;&#2335; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; (&#2319;&#2347;&#2310;&#2352;&#2348;&#2368;&#2319;&#2350;) &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 2003 &#2325;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To increase the fiscal deficit to stimulate economic growth.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2379; &#2346;&#2381;&#2352;&#2379;&#2340;&#2381;&#2360;&#2366;&#2361;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2375; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To ensure transparency in fiscal operations and reduce fiscal deficit.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2346;&#2352;&#2367;&#2330;&#2366;&#2354;&#2344; &#2350;&#2375;&#2306; &#2346;&#2366;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340;&#2366; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2340;&#2341;&#2366; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2375; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To eliminate all forms of government borrowing.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2313;&#2343;&#2366;&#2352; &#2325;&#2379; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",

    "solution": "<p>&bull; Tax Revenue refers to money collected from taxes imposed on individuals or companies, such as income tax and corporate tax.</p><p>&bull; Non-Tax Revenue is revenue earned through sources other than taxes, such as fees, fines, and dividends from government-owned companies.</p><p>&bull; Capital Receipts represent money the government receives which either increases its liabilities (like borrowings) or reduces its assets (like selling shares of public sector companies).</p><p>&bull; Revenue Receipts do not affect the assets or liabilities of the government; it includes tax and non-tax revenue but does not include capital transactions.</p>",

    "question": "<span class=\"eqt\"><p>Match the following types of deficits with their descriptions:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column 1</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column 2</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Revenue Deficit</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Difference between total expenditure and total receipts excluding borrowings</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Fiscal Deficit</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Excess of revenue expenditure over revenue receipts</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Primary Deficit</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Fiscal deficit minus interest payments</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Budget Deficit</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Shortfall in the total budget receipts compared to the total budget expenditures</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2328;&#2366;&#2335;&#2375; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2357;&#2367;&#2357;&#2352;&#2339; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; 1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; 2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2352;&#2366;&#2332;&#2     "solution": "<p>&bull; <b>Revenue Deficit </b>occurs when the government's revenue expenditure exceeds its revenue receipts, indicating a shortfall in the income generated from taxes and non-tax revenues.</p><p>&bull; <b>Fiscal Deficit </b>is the difference between the government's total expenditure (including capital and revenue expenditure) and total receipts (excluding borrowings). It reflects the overall gap the government needs to borrow.</p><p>&bull; <b>Primary Deficit </b>is derived from fiscal deficit after subtracting interest payments. It represents the government's deficit excluding the burden of interest payments on past loans.</p><p>&bull; <b>Budget Deficit</b> refers to when the total receipts of the government are less than the total expenditures, leading to an overall shortfall.</p>",
    "question_index": 16
  },

    "solution": "<p>&bull; <b>Outcome Budget</b> is a detailed analysis of how effectively the money allocated to different ministries and departments has been used in terms of meeting specific outcomes and goals.</p><p>&bull; <b>Zero-Based Budgeting</b> starts from a <b>zero base</b> every financial period, meaning each department or ministry must justify all its expenses anew, irrespective of previous budgets.</p><p>&bull; <b>Gender Budgeting</b> ensures that the budget focuses on <b>gender equality</b>, and specific financial allocations are made for <b>women's empowerment</b> and programs targeted at improving their socio-economic condition.</p><p>&bull; A <b>Balanced Budget</b> occurs when the government's <b>anticipated receipts</b> are equal to its <b>planned expenditure</b>, leading to neither a deficit nor a surplus.</p>",
