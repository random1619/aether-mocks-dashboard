  {
    "question": "<span class=\"eqt\"><p>In the third karnatak war, the British East India Company defeated the French forces at the_______in 1760 ending almost a century of conflict over French supremacy in India.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2360;&#2352;&#2375; &#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325; &#2351;&#2369;&#2342;&#2381;&#2343; &#2350;&#2375;&#2306;, &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2344;&#2375; 1760 &#2350;&#2375;&#2306; _______ &#2350;&#2375;&#2306; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2368;&#2360;&#2368; &#2360;&#2375;&#2344;&#2366; &#2325;&#2379; &#2361;&#2352;&#2366; &#2342;&#2367;&#2351;&#2366;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2368;&#2360;&#2368; &#2357;&#2352;&#2381;&#2330;&#2360;&#2381;&#2357; &#2325;&#2379; &#2354;&#2375;&#2325;&#2352; &#2354;&#2327;&#2349;&#2327; &#2319;&#2325; &#2360;&#2342;&#2368; &#2325;&#2366; &#2360;&#2306;&#2328;&#2352;&#2381;&#2359; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">The Siege of Arcot</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2325;&#2379;&#2335; &#2325;&#2368; &#2328;&#2375;&#2352;&#2366;&#2348;&#2306;&#2342;&#2368;</span>",
      "<span class=\"eqt\">The Battle of Adyar</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2337;&#2381;&#2351;&#2366;&#2352; &#2325;&#2366; &#2351;&#2369;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">The Battle of Ambur</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2381;&#2348;&#2370;&#2352; &#2325;&#2366; &#2351;&#2369;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">The Battle of Wandiwash</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2306;&#2337;&#2368;&#2357;&#2366;&#2358; &#2325;&#2366; &#2351;&#2369;&#2342;&#2381;&#2343;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>The Battle of Wandiwash </b>was the decisive battle of the Third Carnatic War, fought between the British East India Company and the French East India Company on 22 January 1760. The British forces, led by Lieutenant-General Sir Eyre Coote, defeated the French forces, commanded by Count de Lally, and captured the French stronghold of Wandiwash (now Vandavasi) in Tamil Nadu.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>English East India Company acquired Diwani of Bengal in______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2344;&#2375; ______ &#2350;&#2375;&#2306; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2368; &#2342;&#2368;&#2357;&#2366;&#2344;&#2368; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1765</span><span class=\"hqt\" style=\"display:none\">1765</span>",
      "<span class=\"eqt\">1755</span><span class=\"hqt\" style=\"display:none\">1755</span>",
      "<span class=\"eqt\">1760</span><span class=\"hqt\" style=\"display:none\">1760</span>",
      "<span class=\"eqt\">1770</span><span class=\"hqt\" style=\"display:none\">1770</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In <b>1765</b>, the East India Company was granted the Diwani of Bengal, Bihar, and Orissa by the Mughal Emperor. This grant allowed the company to collect revenue in these regions.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>As a result of which act did Queen Victoria, who was the monarch of Britain, also became the sovereign of British territories in India, with the title \"Empress of India\" in 1858?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2350;&#2361;&#2366;&#2352;&#2366;&#2344;&#2368; &#2357;&#2367;&#2325;&#2381;&#2335;&#2379;&#2352;&#2367;&#2351;&#2366;, &#2332;&#2379; &#2348;&#2381;&#2352;&#2367;&#2335;&#2375;&#2344; &#2325;&#2368; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2334;&#2368; &#2341;&#2368;&#2306;, 1858 &#2350;&#2375;&#2306; \"&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2334;&#2368;\" &#2325;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2325;&#2375; &#2360;&#2366;&#2341; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2349;&#2368; &#2360;&#2306;&#2346;&#2381;&#2352;&#2349;&#2369; &#2348;&#2344; &#2327;&#2312;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Indian Councils Act</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2352;&#2367;&#2359;&#2342; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Government Of India Act</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Charter Act</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Regulating Act</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>Government of India Act </b>1858 resulted in Queen Victoria, the monarch of Britain, assuming the title \"Empress of India\" and becoming the sovereign of British territories in India.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In which year did the Portuguese capture Goa?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2369;&#2352;&#2381;&#2340;&#2327;&#2366;&#2354;&#2367;&#2351;&#2379;&#2306; &#2344;&#2375; &#2327;&#2379;&#2357;&#2366; &#2346;&#2352; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2325;&#2348;&#2381;&#2332;&#2366; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1475 AD</span><span class=\"hqt\" style=\"display:none\">1475 &#2312;&#2360;&#2357;&#2368;</span>",
      "<span class=\"eqt\">1540 AD</span><span class=\"hqt\" style=\"display:none\">1540 &#2312;&#2360;&#2357;&#2368;</span>",
      "<span class=\"eqt\">1510 AD</span><span class=\"hqt\" style=\"display:none\">1510 &#2312;&#2360;&#2357;&#2368;</span>",
      "<span class=\"eqt\">1610 AD</span><span class=\"hqt\" style=\"display:none\">1610 &#2312;&#2360;&#2357;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Portuguese conquest of Goa occurred when the governor Afonso de Albuquerque captured the city in <b>1510</b> from Adil Shahis.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Acts of the British Parliament stated that a member of the British Cabinet was appointed Secretary of State for India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2350;&#2375;&#2306; &#2351;&#2361; &#2325;&#2361;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366; &#2325;&#2367; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2325;&#2376;&#2348;&#2367;&#2344;&#2375;&#2335; &#2325;&#2375; &#2319;&#2325; &#2360;&#2342;&#2360;&#2381;&#2351; &#2325;&#2379; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2330;&#2367;&#2357; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Indian Council Act of 1861</span><span class=\"hqt\" style=\"display:none\">1861 &#2325;&#2366; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2352;&#2367;&#2359;&#2342;&#2381; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Government of India Act of 1858</span><span class=\"hqt\" style=\"display:none\">1858 &#2325;&#2366; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Regulating Act, 1773</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2327;&#2369;&#2354;&#2375;&#2335;&#2367;&#2306;&#2327; &#2319;&#2325;&#2381;&#2335;, 1773</span>",
      "<span class=\"eqt\">Charter Ac of 1853</span><span class=\"hqt\" style=\"display:none\">1853 &#2325;&#2366; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>Government of India Act 1858</b> ended the rule of the East India Company and transferred governance to the British Crown. A British minister, called the Secretary of State for India, was made responsible for overseeing India's administration, establishing direct British control.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The rule of the English East India company was ended in British India under the Government of India Act______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;______ &#2325;&#2375; &#2340;&#2361;&#2340; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2366; &#2358;&#2366;&#2360;&#2344; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1858</span><span class=\"hqt\" style=\"display:none\">1858</span>",
      "<span class=\"eqt\">1857</span><span class=\"hqt\" style=\"display:none\">1857</span>",
      "<span class=\"eqt\">1859</span><span class=\"hqt\" style=\"display:none\">1859</span>",
      "<span class=\"eqt\">1856</span><span class=\"hqt\" style=\"display:none\">1856</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The rule of the English East India Company was formally ended in British India in <b>1858</b>. This act transferred the governance of India from the East India Company to the British Crown, marking the beginning of direct British rule in India, which lasted until India gained independence in 1947.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In which of the following systems was the charge of collecting the revenue and paying it to the Company given to the village headman, rather than the zamindar?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2319;&#2325;&#2340;&#2381;&#2352; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2379; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2349;&#2366;&#2352; &#2332;&#2364;&#2350;&#2368;&#2306;&#2342;&#2366;&#2352; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2327;&#2366;&#2305;&#2357; &#2325;&#2375; &#2350;&#2369;&#2326;&#2367;&#2351;&#2366; &#2325;&#2379; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mahalwari</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2354;&#2357;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Iqtadari</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2325;&#2381;&#2340;&#2366;&#2342;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Zamindari</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2350;&#2368;&#2306;&#2342;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Ryotwari</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2376;&#2351;&#2340;&#2357;&#2366;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The <b>Mahalwari system</b> involved the village headman collecting revenue from the village community and paying it to the British East India Company, rather than a zamindar.</p><p>&#183; The Mahalwari system assigned the responsibility of collecting revenue to the village headman (also called the 'mohal' head), instead of the zamindar. </p><p>&#183; This system was implemented in parts of northern India.</p><p><b>Further Insight: </b></p><p>&#183; <b>Iqtadari</b>: A medieval system under the Delhi Sultanate, not relevant to British revenue systems. </p><p>&#183; <b>Zamindari</b>: The zamindar, a landlord, was responsible for collecting and paying revenue to the Company. </p><p>&#183; <b>Ryotwari</b>: Revenue was collected directly from individual peasants (ryots) by the Company, bypassing intermediaries like zamindars or village headmen.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The Press and Registration of Books (PRB) Act was enacted in which year?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2375;&#2360; &#2319;&#2357;&#2306; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2346;&#2306;&#2332;&#2368;&#2325;&#2352;&#2339; (&#2346;&#2368;&#2310;&#2352;&#2348;&#2368;) &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2354;&#2366;&#2327;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1887</span><span class=\"hqt\" style=\"display:none\">1887</span>",
      "<span class=\"eqt\">1877</span><span class=\"hqt\" style=\"display:none\">1877</span>",
      "<span class=\"eqt\">1867</span><span class=\"hqt\" style=\"display:none\">1867</span>",
      "<span class=\"eqt\">1857</span><span class=\"hqt\" style=\"display:none\">1857</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The <b>Press and Registration of Books Act, 1867</b>, was enacted by the <b>British colonial government</b> to <b>regulate printing presses, newspapers, and books</b> in India.</p><p>&#183; Publishers and printers had to <b>declare their ownership and register publications</b> with authorities.</p><p>&#183; The Act is <b>still in force</b> (with amendments), but <b>plans to replace it</b> with a <b>more modern Press and Periodicals Bill</b> have been proposed.</p><p>&#183; It also laid the groundwork for <b>press freedom debates</b> in India.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The first English Factory in Bengal was set up on the banks of river \"Hugli\" in _____.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2306;&#2327;&#2366;&#2354; &#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2368; &#2311;&#2306;&#2327;&#2381;&#2354;&#2367;&#2358; &#2347;&#2376;&#2325;&#2381;&#2335;&#2381;&#2352;&#2368; _____ &#2350;&#2375;&#2306; \"&#2361;&#2369;&#2327;&#2354;&#2368;\" &#2344;&#2342;&#2368; &#2325;&#2375; &#2340;&#2335; &#2346;&#2352; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1671</span><span class=\"hqt\" style=\"display:none\">1671</span>",
      "<span class=\"eqt\">1641</span><span class=\"hqt\" style=\"display:none\">1641</span>",
      "<span class=\"eqt\">1661</span><span class=\"hqt\" style=\"display:none\">1661</span>",
      "<span class=\"eqt\">1651</span><span class=\"hqt\" style=\"display:none\">1651</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The first English factory was <b>set up on the banks of the river Hugli in 1651</b>. This was the base from which the Company's traders, known at that time as \"factors\", operated. The factory had a warehouse where goods for export were stored, and it had offices where Company officials sat.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Vasco da Gama, who discovered the sea route from Europe to India, belonged to which nation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2360;&#2381;&#2325;&#2379; &#2337;&#2368; &#2327;&#2366;&#2350;&#2366;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2351;&#2370;&#2352;&#2379;&#2346; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2340;&#2325; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2368; &#2350;&#2366;&#2352;&#2381;&#2327; &#2325;&#2368; &#2326;&#2379;&#2332; &#2325;&#2368; &#2341;&#2368;, &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2360;&#2375; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">England</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2327;&#2354;&#2376;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Portugal</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2352;&#2381;&#2340;&#2327;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Spain</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2375;&#2344;</span>",
      "<span class=\"eqt\">Germany</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2352;&#2381;&#2350;&#2344;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Vasco da Gama was a <b>Portuguese</b> explorer and navigator. He is famously credited with discovering the sea route from Europe to India by sailing around Africa's Cape of Good Hope, arriving at Calicut (Kozhikode) on the Malabar Coast of India in May 1498.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; England: English explorers like Sir Francis Drake were prominent later, but Vasco da Gama was Portuguese.</p><p>&#8226; Spain: Spain sponsored voyages like that of Christopher Columbus, who sailed west to find a route to the Indies but landed in the Americas.</p><p>&#8226; Germany: Germany was not a major maritime power involved in the early Age of Discovery in the same way as Portugal and Spain.</p><p><b>Further insights:</b></p><p>&#8226; Vasco da Gama's voyage was a significant event in world history, opening up direct maritime trade between Europe and Asia and paving the way for European colonial expansion.</p><p>&#8226; His expedition was sponsored by the Portuguese crown, seeking to establish a sea route to the East to access the lucrative spice trade, bypassing the traditional overland routes controlled by Arab and Venetian merchants.</p><p>&#8226; He made two subsequent voyages to India and was appointed Portuguese viceroy in India in 1524, shortly before his death there.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Under the Charter Act of 1833 in British India, the East India Company's monopoly on trade with which of the following countries was abolished?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; 1833 &#2325;&#2375; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2340;&#2361;&#2340;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2325;&#2375; &#2360;&#2366;&#2341; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2346;&#2352; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2366; &#2319;&#2325;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">China</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Burma</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2352;&#2381;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Sri Lanka</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2368;&#2354;&#2306;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Nepal</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2346;&#2366;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Charter Act of 1813 had ended the East India Company's monopoly on trade with India, except for trade in tea and trade with China. The <b>Charter Act of 1833</b> went further and completely abolished the East India Company's monopoly on trade, including its monopoly on the tea trade and its trade with <b>China</b>. After this Act, the Company's role became primarily administrative.</p><p><b>Further insights:</b></p><p>&#8226; The Charter Act of 1833 is also known as the Saint Helena Act 1833 or the Government of India Act 1833.</p><p>&#8226; It designated the Governor-General of Bengal as the Governor-General of India and centralized British administration in India.</p><p>&#8226; The Act also included provisions for the codification of Indian laws and attempted (though largely unsuccessfully at the time) to end discrimination in employment under the Company based on religion, place of birth, descent, or color.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Under which of the following Acts was Warren Hastings appointed as the Governor-General of Bengal?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2340;&#2361;&#2340; &#2357;&#2377;&#2352;&#2375;&#2344; &#2361;&#2375;&#2360;&#2381;&#2335;&#2367;&#2306;&#2327;&#2381;&#2360; &#2325;&#2379; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2366; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352;-&#2332;&#2344;&#2352;&#2354; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">The Regulating Act, 1773</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2327;&#2381;&#2351;&#2369;&#2354;&#2375;&#2335;&#2367;&#2306;&#2327; &#2319;&#2325;&#2381;&#2335;, 1773</span>",
      "<span class=\"eqt\">The Government of India Act, 1858</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1858</span>",
      "<span class=\"eqt\">The Government of India Act, 1909</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1909</span>",
      "<span class=\"eqt\">The Government of India Act, 1935</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1935</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The <b>Regulating Act of 1773</b> established the position of Governor-General of Bengal, and Warren Hastings became the first to hold this office.</p><p>&#183; This act was the first step by the British Parliament to regulate the affairs of the East India Company.</p><p><b>Key Provisions of the Regulating Act, 1773</b></p><p>a. <b>Creation of the Governor-General Position</b>:</p><p>o The Act established the position of Governor-General of Bengal, with authority over the presidencies of Bombay and Madras.</p><p>o Warren Hastings, who was already the Governor of Bengal, was elevated to the position of the first Governor-General in 1773.</p><p>o This centralized administrative control under one figure to streamline governance.</p><p>b. <b>Establishment of a Council</b>:</p><p>o A four-member Governor-General's Council was created to assist in decision-making. The members were appointed by the British government, and decisions were made by majority vote, with the Governor-General having a casting vote in case of a tie.</p><p>o This council was intended to check the powers of the Governor-General and reduce arbitrary decision-making.</p><p>c. <b>Judicial Reforms</b>:</p><p>o The Act introduced a Supreme Court in Calcutta (established in 1774) to administer justice to British subjects and Company employees, marking the beginning of a formal judicial system in India.</p><p>d. <b>Regulation of the East India Company</b>:</p><p>o The Act required the Company to submit regular reports to the British government, increasing parliamentary oversight.</p><p>o It aimed to curb corruption and ensure better financial management of the Company's operations.</p><p><b>Further Insight:</b></p><p><b>The Government of India Act, 1858</b>:</p><p>&#183; This Act was passed after the Revolt of 1857 and transferred the governance of India from the East India Company to the British Crown.</p><p>&#183; It established the office of the Viceroy and Governor-General, but this was long after Warren Hastings' time (he served as Governor-General from 1773 to 1785).</p><p><b>The Government of India Act, 1909</b>:</p><p>&#183; Also known as the Morley-Minto Reforms, this Act introduced limited electoral reforms and expanded legislative councils.</p><p>&#183; It was enacted over a century after Hastings' tenure and had no connection to his appointment.</p><p><b>The Government of India Act, 1935</b>:</p><p>&#183; This Act provided a framework for provincial autonomy and a federal structure for India.</p><p>&#183; It was passed much later and was irrelevant to the 18th-century context of Hastings' appointment.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which Act was passed by the British Parliament in 1773 to regulate the activities of the East India Company?</p></span><span class=\"hqt\" style=\"display:none\">&#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2368; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 1773 &#2350;&#2375;&#2306; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2306;&#2360;&#2342; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Pitt's India Act</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2335;&#2381;&#2360; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2319;&#2325;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Indian Slavery Act</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2342;&#2366;&#2360;&#2340;&#2366; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Age of Consent Act</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2361;&#2350;&#2340;&#2367; &#2325;&#2368; &#2310;&#2351;&#2369; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Regulating Act</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The Regulating Act of 1773 was the first British parliamentary act to regulate the East India Company's rule in India.</p><p>&#183; It established the position of Governor-General of Bengal (Warren Hastings) and a Supreme Court in Calcutta.</p><p>&#183; Pitt's India Act (1784) strengthened government control over the East India Company.</p><p>&#183; Indian Slavery Act (1843) abolished slavery in India.</p><p>&#183; Age of Consent Act (1891) raised the minimum marriageable age for girls.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Ryotwari system of revenue collection in India, introduced by the British, was based on the_______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2339; &#2325;&#2368; &#2352;&#2376;&#2351;&#2340;&#2357;&#2366;&#2337;&#2364;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;, &#2332;&#2379; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;, -------------- &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2341;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Smith's theory of rent</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2350;&#2367;&#2341; &#2325;&#2375; &#2354;&#2327;&#2366;&#2344; &#2325;&#2375; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;</span>",
      "<span class=\"eqt\">Ricardian theory of rent</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2327;&#2366;&#2344; &#2325;&#2375; &#2352;&#2367;&#2325;&#2366;&#2352;&#2381;&#2337;&#2367;&#2351;&#2344; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;</span>",
      "<span class=\"eqt\">Malthusian theory of rent</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2327;&#2366;&#2344; &#2325;&#2375; &#2350;&#2366;&#2354;&#2381;&#2341;&#2360;&#2367;&#2351;&#2344; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;</span>",
      "<span class=\"eqt\">Marx's theory of rent</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2352;&#2381;&#2325;&#2381;&#2360; &#2325;&#2375; &#2354;&#2327;&#2366;&#2344; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The British used the Ryotwari system to collect land revenue in India. They based it on the <b>Ricardian theory of rent,</b> which said that rent was the difference between the output of the best and the worst land. The Ryotwari system gave land rights to the peasants, but also charged them high and fixed revenue.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>In which of these battles the involvement of the Mughal army was not there?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2351;&#2369;&#2342;&#2381;&#2343; &#2350;&#2375;&#2306; &#2350;&#2369;&#2327;&#2354; &#2360;&#2375;&#2344;&#2366; &#2325;&#2368; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2368; &#2344;&#2361;&#2368;&#2306; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Battle of Haldighati</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2354;&#2381;&#2342;&#2368;&#2328;&#2366;&#2335;&#2368; &#2325;&#2366; &#2351;&#2369;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">Battle of Buxar</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2325;&#2381;&#2360;&#2352; &#2325;&#2366; &#2351;&#2369;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">Second Battle of Panipat</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2344;&#2368;&#2346;&#2340; &#2325;&#2366; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2351;&#2369;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">Battle of Aliwal</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2368;&#2357;&#2366;&#2354; &#2325;&#2366; &#2351;&#2369;&#2342;&#2381;&#2343;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Battle of <b>Aliwal</b> did not involve the Mughal army. This battle took place between the British East India Company and the Sikh Empire in 1846 during the First Anglo-Sikh War. The Mughal Empire's direct involvement was not a significant factor in this particular battle.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Mughal Emperor Shah Alam appointed the British East India Company as the Diwan of the province of Bengal in the year ______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2369;&#2327;&#2354; &#2360;&#2350;&#2381;&#2352;&#2366;&#2335; &#2358;&#2366;&#2361; &#2310;&#2354;&#2350; &#2344;&#2375; &#2357;&#2352;&#2381;&#2359; ______ &#2350;&#2375;&#2306; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2379; &#2348;&#2306;&#2327;&#2366;&#2354; &#2346;&#2381;&#2352;&#2366;&#2306;&#2340; &#2325;&#2375; &#2342;&#2368;&#2357;&#2366;&#2344; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1917</span><span class=\"hqt\" style=\"display:none\">1917</span>",
      "<span class=\"eqt\">1765</span><span class=\"hqt\" style=\"display:none\">1765</span>",
      "<span class=\"eqt\">1835</span><span class=\"hqt\" style=\"display:none\">1835</span>",
      "<span class=\"eqt\">1623</span><span class=\"hqt\" style=\"display:none\">1623</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Robert clive, who came in <b>1765</b> for the second time to lead the affairs of the Company in Bengal, took advantage of the situation and met the homeless emperor, <b>ShahAlam</b>, at Allahabad. The needy emperor was persuaded that appointing the East India Company the diwan of Bengal, Bihar and Orissa could revive the post of the centrally controlled diwan</p>",
    "question_index": 15

  {
    "question": "<span class=\"eqt\"><p>Vernacular press Act was enacted in which year?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2352;&#2381;&#2344;&#2366;&#2325;&#2381;&#2351;&#2370;&#2354;&#2352; (&#2342;&#2375;&#2358;&#2368;) &#2346;&#2381;&#2352;&#2375;&#2360; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1875</span><span class=\"hqt\" style=\"display:none\">1875</span>",
      "<span class=\"eqt\">1876</span><span class=\"hqt\" style=\"display:none\">1876</span>",
      "<span class=\"eqt\">1878</span><span class=\"hqt\" style=\"display:none\">1878</span>",
      "<span class=\"eqt\">1877</span><span class=\"hqt\" style=\"display:none\">1877</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Vernacular Press Act was a law passed in British India in <b>1878</b>. Its purpose was to restrict the freedom of the press in Indian languages (non-English).</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Who asked James Rennel to prepare the map of Hindustan?</p></span><span class=\"hqt\" style=\"display:none\">&#2332;&#2375;&#2350;&#2381;&#2360; &#2352;&#2375;&#2344;&#2375;&#2354; &#2325;&#2379; &#2361;&#2367;&#2306;&#2342;&#2369;&#2360;&#2381;&#2340;&#2366;&#2344; &#2325;&#2366; &#2344;&#2325;&#2381;&#2358;&#2366; &#2340;&#2376;&#2351;&#2366;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2361;&#2366; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Lord Ripon</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2352;&#2367;&#2346;&#2344;</span>",
      "<span class=\"eqt\">Robert Clive</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2377;&#2348;&#2352;&#2381;&#2335; &#2325;&#2381;&#2354;&#2366;&#2311;&#2357;</span>",
      "<span class=\"eqt\">Lord Dalhousie</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2337;&#2354;&#2361;&#2380;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Warren Hastings</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2377;&#2352;&#2375;&#2344; &#2361;&#2375;&#2360;&#2381;&#2335;&#2367;&#2306;&#2327;&#2381;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>James Rennell (1742-1830) was a pioneering English geographer, historian, and oceanographer. He was responsible for the first approximately accurate map of India and published the <i>Bengal Atlas </i>(1779). Both works were important for British colonial interests in the Subcontinent. </p><p>He was appointed by Robert Clive. The then Governor of Bengal and Bihar appointed him as the surveyor-general of the East India Company's dominions in Bengal in 1767 to prepare the map of Hindustan.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>The British East India Company captured Pondicherry (Puducherry) from the French in the year ______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2344;&#2375; &#2357;&#2352;&#2381;&#2359; ______ &#2350;&#2375;&#2306; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2368;&#2360;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2346;&#2366;&#2306;&#2337;&#2367;&#2330;&#2375;&#2352;&#2368; (&#2346;&#2369;&#2337;&#2369;&#2330;&#2375;&#2352;&#2368;) &#2346;&#2352; &#2325;&#2348;&#2381;&#2332;&#2366; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
