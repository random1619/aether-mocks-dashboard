        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In which of the following years was the Rajya Sabha first constituted?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2349;&#2366; &#2325;&#2366; &#2346;&#2361;&#2354;&#2368; &#2348;&#2366;&#2352; &#2327;&#2336;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1950</span><span class=\"hqt\" style=\"display:none\">1950</span>",
      "<span class=\"eqt\">1948</span><span class=\"hqt\" style=\"display:none\">1948</span>",
      "<span class=\"eqt\">1952</span><span class=\"hqt\" style=\"display:none\">1952</span>",
      "<span class=\"eqt\">1947</span><span class=\"hqt\" style=\"display:none\">1947</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>May 13, 1952</b> is remembered with pride and joy as the newly constituted Council of States sat together for the first time. This 'Second Chamber' of the Parliament of India, was later named as the Rajya Sabha, on August 23, 1954.</p><p>Since India's independence in 1947, the government had a vision of creating a democratic infrastructure that would represent people from all walks of life and all ages</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The term 'Parliament' refers to the ______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2342; '&#2360;&#2306;&#2360;&#2342;' ______ &#2325;&#2379; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rajya Sabha</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2349;&#2366;</span>",
      "<span class=\"eqt\">Lok Sabha</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2325; &#2360;&#2349;&#2366;</span>",
      "<span class=\"eqt\">State legislature</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2351;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">National legislature</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2357;&#2367;&#2343;&#2366;&#2351;&#2367;&#2325;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In the Indian governmental system, the Parliament serves as the <b>national legislature</b>. The Parliament is structured as a bicameral institution, consisting of two houses: the Rajya Sabha (Council of States) and the Lok Sabha (House of the People).</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article of the Constitution explains that the executive power of every state shall be so exercised as not to impede or prejudice the exercise of the executive power of the Union, and the executive power of the union shall extend to the giving of such directions to a state as may appear to the Government of India to be necessary for that purpose?</p><p>Options:</p></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366; &#2325;&#2367; &#2360;&#2306;&#2328; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2350;&#2375;&#2306; &#2325;&#2379;&#2312; &#2348;&#2366;&#2343;&#2366; &#2351;&#2366; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2327;&#2381;&#2352;&#2361; &#2344; &#2361;&#2379;, &#2324;&#2352; &#2360;&#2306;&#2328; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2379; &#2320;&#2360;&#2375; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; &#2342;&#2375;&#2344;&#2375; &#2340;&#2325; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352;&#2367;&#2340; &#2361;&#2379;&#2327;&#2368; &#2332;&#2379; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2313;&#2360; &#2346;&#2381;&#2352;&#2351;&#2379;&#2332;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2346;&#2381;&#2352;&#2340;&#2368;&#2340; &#2361;&#2379;?</p><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</span>",
    "options": [
      "<span class=\"eqt\">Article 261</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 261</span>",
      "<span class=\"eqt\">Article 247</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 247</span>",
      "<span class=\"eqt\">Article 257</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 257</span>",
      "<span class=\"eqt\">Article 123</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 123</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Article 257</b> of the Indian Constitution ensures that the <b>executive power</b> of a state does not interfere with the <b>executive power</b> of the Union.</p><p>&#183; It allows the Union to issue directions to states to ensure coordination and compliance with national interests.</p><p>Incorrect options:</p><p>&#183; <b>Article 261</b> deals with the recognition of public acts, records, and judicial proceedings.</p><p>&#183; <b>Article 247</b> provides for the power of Parliament to establish certain additional courts.</p><p>&#183; <b>Article 123</b> relates to the President's power to promulgate ordinances.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article of the Constitution of India deals with the conduct of business of the Government of a state?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Article 177</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 177</span>",
      "<span class=\"eqt\">Article 167</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 167</span>",
      "<span class=\"eqt\">Article 164</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 164</span>",
      "<span class=\"eqt\">Article 166</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 166</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Article 166 of the Indian Constitution specifically deals with the conduct of business of the Government of a state.</p><p>Key Points:</p><p>&#183; Provides rules for transaction of government business</p><p>&#183; Defines how state government business should be conducted</p><p>&#183; Specifies the Governor's role in state administration</p><p>&#183; Ensures systematic and orderly functioning of state government</p><p>&#183; Part of the constitutional provisions governing state executive</p><p>&#183; Helps maintain transparency in governmental processes</p><p>&#183; Supports the principle of responsible governance</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which article of the Constitution of India lays down that it shall be the duty of the Advocate-General to give advice to the Government of the State upon legal matters?</p><p>Options:</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2346;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2360;&#2354;&#2366;&#2361; &#2342;&#2375;&#2344;&#2366; &#2350;&#2361;&#2366;&#2343;&#2367;&#2357;&#2325;&#2381;&#2340;&#2366; &#2325;&#2366; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351; &#2361;&#2379;&#2327;&#2366;?</p><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</span>",
    "options": [
      "<span class=\"eqt\">Article 168</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 168</span>",
      "<span class=\"eqt\">Article 165</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 165</span>",
      "<span class=\"eqt\">Article 167</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 167</span>",
      "<span class=\"eqt\">Article 166</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 166</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Article 165 of the Indian Constitution states that the Advocate-General of a state advises the government on legal matters.</p><p>&#183; Article 168 deals with state legislatures.</p><p>&#183; Article 167 explains the duties of the Chief Minister to provide information to the Governor.</p><p>&#183; Article 166 discusses the conduct of business of the state government.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following articles of the Constitution of India lays down that 'The allocation of seats in the Council of States to be filled by representatives of the States and of the Union territories shall be in accordance with the provisions in that behalf contained in the Fourth Schedule'?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; '&#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2324;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2358;&#2366;&#2360;&#2367;&#2340; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2349;&#2352;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2360;&#2368;&#2335;&#2379;&#2306; &#2325;&#2366; &#2310;&#2357;&#2306;&#2335;&#2344; &#2330;&#2380;&#2341;&#2368; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2361;&#2379;&#2327;&#2366;'?</span>",
    "options": [
      "<span class=\"eqt\">Article 81</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 81</span>",
      "<span class=\"eqt\">Article 82</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 82</span>",
      "<span class=\"eqt\">Article 83</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 83</span>",
      "<span class=\"eqt\">Article 80</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 80</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Article 80 of the Indian Constitution deals with the composition of the Rajya Sabha (Council of States) and states that the allocation of seats shall be as per the Fourth Schedule. It also mentions that members are elected by the legislative assemblies of states and UTs.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>How many members are nominated by the President to the Rajya Sabha?</p></span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351; &#2350;&#2344;&#2379;&#2344;&#2368;&#2340; &#2325;&#2367;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The President of India nominates 12 members to the Rajya Sabha from fields like literature, science, art, and social service, as per Article 80 of the Indian Constitution.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following options is the legislative organ of the Union government?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2357;&#2367;&#2343;&#2366;&#2351;&#2368; &#2309;&#2306;&#2327; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Judiciary</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2366;&#2351;&#2340;&#2306;&#2340;&#2381;&#2352;</span>",

    "solution": "<p>The Parliament of India, consisting of the President, Lok Sabha, and Rajya Sabha, is the legislative organ of the Union government.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>In the state legislative assembly, the Money bill can be introduced with the prior permission of __________.</p></span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2343;&#2344; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; __________ &#2325;&#2368; &#2346;&#2370;&#2352;&#2381;&#2357; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2360;&#2375; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",

    "solution": "<p>According to Article 207 of the Indian Constitution, a Money Bill can only be introduced in the State Legislative Assembly with the prior recommendation of the Governor. This provision ensures executive oversight over financial legislation and maintains checks and balances in the state's financial management system.</p>",
