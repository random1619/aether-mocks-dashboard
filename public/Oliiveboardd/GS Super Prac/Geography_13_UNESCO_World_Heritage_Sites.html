  {
    "question": "<span class=\"eqt\"><p>43rd UNESCO site in India \"Moidams\" related to _________ dynasty.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; 43&#2357;&#2366;&#2306; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2360;&#2381;&#2341;&#2354; \"&#2350;&#2379;&#2312;&#2342;&#2350;&#2381;&#2360;\" _________ &#2352;&#2366;&#2332;&#2357;&#2306;&#2358; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Tang Dynasty</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2306;&#2327; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Gupta Dynasty</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2346;&#2381;&#2340; &#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Ahom Dynasty</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2361;&#2379;&#2350; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Mauryan Dynasty</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2352;&#2381;&#2351; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; 43rd UNESCO site in India \"Moidams\" related to Ahom Dynasty.</p><p>&bull; Moidams are the Mound Burial System of the Ahom System.</p><p>&bull; It is located in Patkai Ranges in eastern Assam</p><p>&bull; Charaideo was the capital of the Ahom kingdom (1228 - 1826), and the tumuli were the burial sites of the royals and nobility.</p><p>&bull; Tai-Ahom created moidams (burial mounds) accentuating the natural topography of hills, forests and water, thus forming a sacred geography</p><p>&bull; They contain the remains of kings and other royals together with grave goods such as food, horses and elephants, and sometimes queens and servants.</p><p>&bull; Rituals such as \"Me-Dam-Me-Phi\" and \"Tarpan\" were practiced at the Charaideo necropolis.</p><p>Further Insight:</p><p><img width=485 height=363 id=image15.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image001.jpg\"></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following are part of the Sacred Ensembles of the Hoysalas listed under UNESCO?</p><p>a. Chennakeshava Temple in Belur</p><p>b. Hoysaleshwara Temple in Halebidu</p><p>c. Keshava Temple in Somanathapura</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2370;&#2330;&#2368;&#2348;&#2342;&#2381;&#2343; &#2361;&#2379;&#2351;&#2360;&#2354;&#2379;&#2306; &#2325;&#2375; &#2346;&#2357;&#2367;&#2340;&#2381;&#2352; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;?</p><p>&#2319;. &#2348;&#2375;&#2354;&#2370;&#2352; &#2350;&#2375;&#2306; &#2330;&#2375;&#2344;&#2381;&#2344;&#2366;&#2325;&#2375;&#2358;&#2357; &#2350;&#2306;&#2342;&#2367;&#2352;</p><p>&#2348;&#2368;. &#2361;&#2354;&#2375;&#2348;&#2367;&#2337;&#2369; &#2350;&#2375;&#2306; &#2361;&#2379;&#2351;&#2360;&#2354;&#2375;&#2358;&#2381;&#2357;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352;</p><p>&#2360;&#2368;. &#2360;&#2379;&#2350;&#2344;&#2366;&#2341;&#2346;&#2369;&#2352;&#2366; &#2350;&#2375;&#2306; &#2325;&#2375;&#2358;&#2357; &#2350;&#2306;&#2342;&#2367;&#2352;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only c and a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c &#2324;&#2352; a</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Following are the Three Hoysala temples that are part of the Sacred Ensembles of the Hoysalas which was built between 12th to 13th centuries:</p><p>&#9675; Chennakeshava Temple in Belur</p><p>&#9675; Hoysaleshwara Temple in Halebidu</p><p>&#9675; Keshava Temple in Somanathapura</p><p>&bull; They are built by Hoysala dynasty(10th AD to 14th AD)</p><p>&#9675; Hoysla ruled most of the land, which is known as Karnataka now.</p><p>&#9675; Initially the capital was Belur, later shifted to Halebidu.</p><p>&bull; Hoysala architecture combined elements of Dravidian architecture with influences from northern India.</p><p>&bull; The temples are built by the followers of the Vaishnavism and Shaivism</p><p>&bull; The shrines are characterized by hyper-real sculptures and stone carvings that cover the entire architectural surface, a circumambulatory platform, a large-scale sculptural gallery, a multi-tiered frieze, and sculptures of the Sala legend.</p><p>Further Insight:</p><p><img width=365 height=365 id=image5.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image002.jpg\"></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What is the name of the university established at Santiniketan in 1921?</p></span><span class=\"hqt\" style=\"display:none\"><p>1921 &#2350;&#2375;&#2306; &#2358;&#2366;&#2306;&#2340;&#2367;&#2344;&#2367;&#2325;&#2375;&#2340;&#2344; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2344;&#2366;&#2350; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Visva Hindu University</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2381;&#2357; &#2361;&#2367;&#2306;&#2342;&#2370; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Visva Bharati University</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2381;&#2357;&#2349;&#2366;&#2352;&#2340;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Bengal University</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2327;&#2366;&#2354; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Hindu College</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2306;&#2342;&#2370; &#2325;&#2377;&#2354;&#2375;&#2332;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; In 1921 Visva Bharati University was established by Rabindranath Tagore at Santiniketan.</p><p>Further Insight:</p><p>&bull; Santiniketan</p><p>&#9675; It was a residential school and centre for art based on ancient Indian traditions and a vision of humanity transcending religious and cultural boundaries.</p><p>&#9675; It was established in 1901 in Rural West Bengal by renowned poet and philosopher Rabindranath Tagore.</p><p>&#9675; Santiniketan is an embodiment of Rabindranath Tagore's vision and philosophy of where 'the world would form a single nest' using a combination of education, appreciation of nature, music and the arts. It was example of 'total work of art' (Gesamtkunstwerk).</p><p>&#9675; Santiniketan was an experimental settlement in education and communal life in a rural setting.</p><p>&#9675; Visva Bharati University established at Shantiniketan in 1921, it recognises unity of Humanity.</p><p>&#9675; It has distinct architecture from British and European Modernism.</p><p>&#9675; It represents approaches toward a pan-Asian modernity, drawing on Ancient, medieval and folk traditions from across the region</p><p><img width=396 height=296 id=image8.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image003.jpg\"></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which Harappan City was known for the water management system and located in an arid area of Gujarat?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2337;&#2364;&#2346;&#2381;&#2346;&#2366; &#2358;&#2361;&#2352; &#2332;&#2354; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366; &#2324;&#2352; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340; &#2325;&#2375; &#2358;&#2369;&#2359;&#2381;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lothal</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2341;&#2354;</span>",
      "<span class=\"eqt\">Kalibangan</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2354;&#2368;&#2348;&#2306;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Dholavira</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2379;&#2354;&#2366;&#2357;&#2368;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Mohenjodaro</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2361;&#2344;&#2332;&#2379;&#2342;&#2337;&#2364;&#2379;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Dholavira was known for the water management system and located in an arid island of Khadir in the State of Gujarat.</p><p>Further Insight:</p><p>&bull; Dholavira: A Harappan City</p><p>&#9675; Located in an arid island of Khadir in the State of Gujarat</p><p>&#9675; It was occupied between 3000-1500 BCE</p><p>&#9675; Dholavira is an exceptional example of a proto-historic Bronze Age urban settlement pertaining to the Harappan Civilization(early, mature and late Harappan phases)</p><p>&#9675; City comprised two parts</p><p>&#9632; A fortified city</p><p>&bull; The walled city consists of a fortified Castle with attached fortified Bailey and Ceremonial Ground, and a fortified Middle Town and a Lower Town. </p><p>&bull; A series of reservoirs are found to the east and south of the Citadel.</p><p>&#9632; A large cemetery to the west of the city with cenotaphs of six types</p><p>&#9675; Bead Processing workshops were found</p><p>&#9675; Two seasonal streams provided a very scarce resource in the region.</p><p>&#9675; A sophisticated water management system demonstrates the ingenuity of Dholavira people in their struggle to survive and thrive in harsh environments.</p><p>&#9675; The city's location was chosen because of nearby sources of precious minerals</p><p>&#9675; Evidence of inter regional trade with other Harappan cities, as well as with cities in the Mesopotamia region and Oman Peninsula have been discovered.</p><p><img width=350 height=279 id=image16.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image004.jpg\"></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Pillars of which famous architecture under UNESCO list is made of lightweight porous bricks, also called floating bricks?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2360;&#2370;&#2330;&#2368; &#2325;&#2375; &#2340;&#2361;&#2340; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2354;&#2366; &#2325;&#2375; &#2360;&#2381;&#2340;&#2306;&#2349; &#2361;&#2354;&#2381;&#2325;&#2375; &#2333;&#2352;&#2333;&#2352;&#2366; &#2312;&#2306;&#2335;&#2379;&#2306; &#2360;&#2375; &#2348;&#2344;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2340;&#2376;&#2352;&#2340;&#2368; &#2312;&#2306;&#2335;&#2375;&#2306; &#2349;&#2368; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Taj Mahal</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2332; &#2350;&#2361;&#2354;</span>",
      "<span class=\"eqt\">Ramappa Temple</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2350;&#2346;&#2381;&#2346;&#2366; &#2350;&#2306;&#2342;&#2367;&#2352;</span>",
      "<span class=\"eqt\">Kailash Temple at Ellora</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2354;&#2379;&#2352;&#2366; &#2350;&#2375;&#2306; &#2325;&#2376;&#2354;&#2366;&#2358; &#2350;&#2306;&#2342;&#2367;&#2352;</span>",
      "<span class=\"eqt\">India Gate</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2327;&#2375;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Kakatiya Rudreshware Temple or Ramappa Temple, Telangana decorated beams and pillars of carved granite and dolerite with distinctive and pyramidal Vimana made of light weight porous bricks, called Floating bricks.</p><p>&bull; These bricks reduced the weight of the roof structures.</p><p>Further Insight:</p><p>&bull; Kakatiya Rudreshware Temple or Ramappa Temple</p><p>&#9675; Situated in Palampet village, about 200 km northeast of Hyderabad, Telangana.</p><p>&#9675; Built during the Kakatiyan period (1123 - 1323 CE) under the reign of Rudradeva and Recharla Rudra.</p><p>&#9675; Construction began in 1213 CE and took approximately 40 years to complete.</p><p>&#9675; Architecture</p><p>&#9632; Main Shiva temple within a walled complex.</p><p>&#9632; Constructed primarily from sandstone with intricate carvings.</p><p>&#9632; Features decorated beams and pillars made of carved granite and dolerite.</p><p>&#9632; Distinctive pyramidal Vimana (tower) made of lightweight porous bricks, also known as \"floating bricks,\" to reduce the roof's weight.</p><p>&#9675; High-quality sculptures depicting regional dance customs and Kakatiyan culture.</p><p>&#9675; Located at the foothills of a forested area, surrounded by agricultural fields.</p><p>&#9675; Near the Ramappa Cheruvu, a water reservoir built by the Kakatiyas.</p><p>&#9675; The site aligns with dharmic principles advocating temple construction in harmony with natural elements like hills, forests, water bodies, and agricultural lands.</p><p><img width=624 height=416 id=image3.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image005.png\"></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Who founded Jaipur, the present day capital of Rajasthan?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2368; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2332;&#2351;&#2346;&#2369;&#2352; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Prithvi Raj Chauhan II</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2352;&#2366;&#2332; &#2330;&#2380;&#2361;&#2366;&#2344; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Jai Singh I</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2351; &#2360;&#2367;&#2306;&#2361; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Jai Singh II</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2351; &#2360;&#2367;&#2306;&#2361; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Anangpa Tomar</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2306;&#2327;&#2346;&#2366; &#2340;&#2379;&#2350;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Jai Singh II or Sawai Jai Singh II (1688-1743) founded Jaipur in 1727.</p><p>Further Insight:</p><p>&bull; UNESCO site Jaipur, Rajasthan</p><p>&#9675; Founded in 1727 by Sawai Jai Singh II.</p><p>&#9675; Located in Rajasthan, unlike other cities in the region, it was established on a plain instead of hilly terrain.</p><p>&#9675; Built following a grid plan inspired by Vedic architecture.</p><p>&#9675; Streets feature continuous colonnaded businesses intersecting at large public squares called chaupars.</p><p>&#9675; Markets, shops, residences, and temples along main streets have uniform facades.</p><p>&#9675; Cultural Influences</p><p>&#9632; The city's planning reflects a blend of ancient Hindu, early modern Mughal, and Western ideas.</p><p>&#9632; The grid layout mirrors Western urban models, while city sectors (chowkris) are based on traditional Hindu principles.</p><p><img width=453 height=364 id=image12.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image006.jpg\"></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Who founded the city of Ahmedabad?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2361;&#2350;&#2342;&#2366;&#2348;&#2366;&#2342; &#2358;&#2361;&#2352; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ahmad Shah I</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2361;&#2350;&#2342; &#2358;&#2366;&#2361; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Krishna Dev Raya</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2381;&#2339; &#2342;&#2375;&#2357; &#2352;&#2366;&#2351;</span>",
      "<span class=\"eqt\">Akbar</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2348;&#2352;</span>",
      "<span class=\"eqt\">Ahmad Shah Abdali</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2361;&#2350;&#2342; &#2358;&#2366;&#2361; &#2309;&#2348;&#2381;&#2342;&#2366;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Ahmedabad city was founded by Ahmad Shah I in 1411 as capital of the Gujarat Sultanate.</p><p>&bull; Ahmedabad was named a UNESCO World Heritage City in July 2017, becoming the first city in India to receive this honor. </p><p>&bull; Gujarat Sultanate </p><p>&#9675; Formed in 1394</p><p>&#9675; founded by Muzaffar Shah, former Governor of Gujarat under the Tughlaq dynasty.</p><p>Further Insight:</p><p>&bull; Historical site of Ahmedabad</p><p>&#9675; Founded in the 15th century by Sultan Ahmad Shah.</p><p>&#9675; Located on the eastern bank of the Sabarmati River.</p><p>&#9675; Rich heritage from the Sultanate period includes:</p><p>&#9632; The Bhadra Citadel.</p><p>&#9632; Walls and gates of the Fort city.</p><p>&#9632; Numerous mosques and tombs.</p><p>&#9632; Features important Hindu and Jain temples from later periods.</p><p>&#9675; Urban Design</p><p>&#9632; Composed of densely-packed traditional houses (pols).</p><p>&#9632; Includes gated streets (puras) with unique elements:</p><p>&#9632; Bird feeders.</p><p>&#9632; Public wells.</p><p>&#9632; Religious institutions.</p><p>&#9675; Flourished as the capital of Gujarat for over six centuries.</p><p>&#9675; Continues to maintain its historical and cultural importance.</p><p><img width=512 height=246 id=image7.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image007.jpg\"></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>World's third highest mountain is located in which national park?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2366; &#2340;&#2368;&#2360;&#2352;&#2366; &#2360;&#2348;&#2360;&#2375; &#2314;&#2305;&#2330;&#2366; &#2346;&#2352;&#2381;&#2357;&#2340; &#2325;&#2367;&#2360; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2342;&#2381;&#2351;&#2366;&#2344; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Shimlipal National Park</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2350;&#2354;&#2366;&#2346;&#2366;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2342;&#2381;&#2351;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Nokrek National Park</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2379;&#2325;&#2352;&#2375;&#2325; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2342;&#2381;&#2351;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Kaziranga National Park</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2332;&#2368;&#2352;&#2306;&#2327;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2342;&#2381;&#2351;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Khangchendzonga National Park</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2330;&#2344;&#2332;&#2306;&#2327;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2342;&#2381;&#2351;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Khangchenzdzonga is the world's third highest mountain after Mountain Everest and Mount K2.</p><p>&bull; It is located in the Khangchendzonga National Park, Sikkim</p><p>&bull; It is the only mixed UNESCO site in India, listed in 2016.</p><p>Further Insight:</p><p>&bull; Khangchendzonga National Park, as UNESCO site</p><p>&#9675; Situated in northern India, in the state of Sikkim.</p><p>&#9675; Part of the Himalayan range, encompassing diverse terrains such as plains, valleys, lakes, glaciers, and ancient forests.</p><p>&#9675; Includes Mount Khangchendzonga, the world's third-highest peak at 8,586 meters (28,169 feet).</p><p>&#9675; Natural Aspect of the Khangchendzonga National Park</p><p>&#9632; Habitat spans from high mountains with glaciers to old-growth forests.</p><p>&#9632; Rich in diverse animal and plant species.</p><p>&#9675; Cultural and Religious Importance</p><p>&#9632; Mount Khangchendzonga is considered a sacred mountain in Tibetan Buddhism.</p><p>&#9632; The area is regarded as a beyul (sacred hidden land) in Buddhist tradition.</p><p>&#9632; Indigenous worship practices focus on natural elements such as caves, rivers, and lakes.</p><p>&#9632; Sacred stories and practices are deeply intertwined with Buddhist beliefs, forming the foundation of Sikkimese identity.</p><p><img width=441 height=232 id=image6.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image008.jpg\"></p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The famous Nalanda Mahavihara was a ____________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2344;&#2366;&#2354;&#2306;&#2342;&#2366; &#2350;&#2361;&#2366;&#2357;&#2367;&#2361;&#2366;&#2352; &#2319;&#2325; ____________ &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Hindu Ancient higher-learning institution</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2306;&#2342;&#2370; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2313;&#2330;&#2381;&#2330; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Muslim Ancient higher-learning institution</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2313;&#2330;&#2381;&#2330; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Buddhist Ancient higher-learning institution</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2380;&#2342;&#2381;&#2343; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2313;&#2330;&#2381;&#2330; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Maghdha Ancient higher-learning institution</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2328;&#2343;&#2366; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2313;&#2330;&#2381;&#2330; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The famous Nalanda Mahavihara was a Buddhist Ancient higher-learning institution, located in Bihar.</p><p>&bull; Kumaragupta I, the emperor of the Gupta Empire, founded Nalanda University around 427 CE.</p><p>Further Insight:</p><p>&bull; Nalanda Mahvihara</p><p>&#9675; Located in the state of Bihar, north-eastern India.</p><p>&#9675; It dates back to the 3rd or 4th century BCE and flourished until the 13th century CE burnt by Bakhtiyar Khilji.</p><p>&#9675; Represents an archaeological site of a renowned monastic and scholastic institution.</p><p>&#9675; Comprises remains of stupas, shrines, and viharas (residential and educational buildings).</p><p>&#9675; Contains significant artworks made of stucco, stone, and metal.</p><p>&#9675; Showcases advanced architectural and artistic achievements of the period.</p><p>&#9675; Known as the most ancient university of the Indian subcontinent.</p><p>&#9675; Operated as a center for higher learning and knowledge transmission for 800 years.</p><p>&#9675; Influenced the architectural and educational frameworks of other institutions in the region.</p><p><img width=434 height=434 id=image4.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image009.jpg\"></p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements are correct about the Natural UNESCO Heritage site in India?</p><p>a. Great Himalayan National Park is located in Himachal Pradesh</p><p>b. Kaziranga National Park is located in Assam</p><p>c. Manas wildlife sanctuary is located in Assam</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2357;&#2367;&#2352;&#2366;&#2360;&#2340; &#2360;&#2381;&#2341;&#2354; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>a. &#2327;&#2381;&#2352;&#2375;&#2335; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351;&#2344; &#2344;&#2375;&#2358;&#2344;&#2354; &#2346;&#2366;&#2352;&#2381;&#2325; &#2361;&#2367;&#2350;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;</p><p>b. &#2325;&#2366;&#2332;&#2368;&#2352;&#2306;&#2327;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2342;&#2381;&#2351;&#2366;&#2344; &#2309;&#2360;&#2350; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;</p><p>c. &#2350;&#2366;&#2344;&#2360; &#2357;&#2344;&#2381;&#2351;&#2332;&#2368;&#2357; &#2309;&#2349;&#2351;&#2366;&#2352;&#2339;&#2381;&#2351; &#2309;&#2360;&#2350; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only c and a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c &#2324;&#2352; a</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Great Himalayan National Park is located in Himachal Pradesh</p><p>&bull; Kaziranga National Park is located in Assam</p><p>&bull; Manas wildlife sanctuary is located in Assam</p><p>Further Insight:</p><p>&bull; Manas Wildlife Sanctuary, Assam</p><p>&#9675; Situated in the foothills of the Himalayas.</p><p>&#9675; Transition zone between wooded hills, alluvial grasslands, and tropical forests.</p><p>&#9675; Home to a diverse array of wildlife, including several endangered species.</p><p>&#9675; Key species:</p><p>&#9632; Tiger</p><p>&#9632; Pygmy Hog</p><p>&#9632; Indian Rhinoceros</p><p>&#9632; Indian Elephant</p><p>&bull; Great Himalayan National Park Conservation Area</p><p>&#9675; Situated in Himachal Pradesh, covering habitats from alpine peaks above 6,000 m (20,000 ft) to riverine forests below 2,000 m (6,600 ft).</p><p>&#9675; Encompasses 25 types of forests.</p><p>&#9675; Includes alpine meadows, riverine forests, and diverse ecosystems.</p><p>&#9675; Rich flora and fauna, featuring:</p><p>&#9675; Numerous species of birds, mammals, reptiles, and insects.</p><p>&#9675; Endangered species such as:</p><p>&#9632; Western Tragopan</p><p>&#9632; Musk Deer</p><p>&bull; Kaziranga National Park</p><p>&#9675; Situated in the floodplains of the Brahmaputra River, Assam.</p><p>&#9675; Home to the world's largest population of the Indian Rhinoceros.</p><p>&#9675; Also supports:</p><p>&#9632; Tigers</p><p>&#9632; Asian Elephants</p><p>&#9632; Wild Water Buffalo</p><p>&#9632; Ganges River Dolphin</p><p>&#9675; The wetlands serve as crucial habitats for migratory bird species.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which UNESCO site is printed on the back side of the new 100 rupee note?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2319; 100 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2344;&#2379;&#2335; &#2325;&#2375; &#2346;&#2368;&#2331;&#2375; &#2325;&#2367;&#2360; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2360;&#2366;&#2311;&#2335; &#2325;&#2379; &#2350;&#2369;&#2342;&#2381;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rani ki Vav</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2344;&#2368; &#2325;&#2368; &#2357;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Red Fort</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2354; &#2325;&#2367;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Humpi</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2350;&#2381;&#2346;&#2368;</span>",
      "<span class=\"eqt\">Sun Temple at Konark</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2339;&#2366;&#2352;&#2381;&#2325; &#2325;&#2366; &#2360;&#2370;&#2352;&#2381;&#2351; &#2350;&#2306;&#2342;&#2367;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Rani ki Vav is printed on the back side of new 100 rupee note.</p><p>Further Insight:</p><p>&bull; Rani-ki-Vav (The Queen's Stepwell), Patan, Gujarat</p><p>&#9675; Built in the 11th century AD as a memorial to a king by the Chaulukya dynasty.</p><p>&#9675; Located on the banks of the Saraswati River in Patan, Gujarat.</p><p>&#9675; A fine example of Maru-Gurjara architecture, showcasing the height of craftsmanship in stepwell construction.</p><p>&#9675; Designed as an inverted temple emphasizing the sanctity of water.</p><p>&#9675; Structural Details:</p><p>&#9632; Consists of seven levels of intricately carved stairs.</p><p>&#9632; Features over 500 principal sculptures and 1,000 minor ones.</p><p>&#9632; Sculptures depict religious, mythological, and secular themes, often referencing literary works.</p><p>&#9675; Silt-covered after the Saraswati River changed its course in the 13th century, which helped preserve its intricate details.</p><p><img width=474 height=474 id=image1.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image010.jpg\"></p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following do not come under UNESCO world Heritage sites in India?</p><p>a. Red Fort</p><p>b. Qutub Minar</p><p>c. India Gate</p><p>d. Agra Fort</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2325;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357; &#2343;&#2352;&#2379;&#2361;&#2352; &#2360;&#2381;&#2341;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2361;&#2368;&#2306; &#2310;&#2340;&#2366; &#2361;&#2376;?</p><p>a. &#2354;&#2366;&#2354; &#2325;&#2367;&#2354;&#2366;</p><p>b. &#2325;&#2369;&#2340;&#2369;&#2348; &#2350;&#2368;&#2344;&#2366;&#2352;</p><p>c. &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2327;&#2375;&#2335;</p><p>d. &#2310;&#2327;&#2352;&#2366; &#2325;&#2367;&#2354;&#2366;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and d</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; d</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only d</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; d</span>",
      "<span class=\"eqt\">Only c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Red Fort, Qutub Minar and Agra Fort are UNESCO sites in India while India Gate does not come under this list.</p><p>Further Insight:</p><p>&bull; Red Fort (Delhi)</p><p>&#9675; Built by Emperor Shah Jahan in 1648 as the main residence of the Mughal emperors.</p><p>&#9675; It features red sandstone walls, intricate Mughal architecture, and notable structures like Diwan-i-Aam and Diwan-i-Khas.</p><p>&#9675; Symbolizes India's rich history and serves as a venue for the annual Independence Day celebrations.</p><p>&bull; Qutub Minar (Delhi)</p><p>&#9675; A 73-meter-high tapering minaret built in 1193 by Qutb al-Din Aibak.</p><p>&#9675; Constructed using red sandstone and marble, showcasing Indo-Islamic architecture.</p><p>&#9675; Part of the Qutub Complex, which includes other monuments like the Iron Pillar and Quwwat-ul-Islam Mosque.</p><p>&bull; Agra Fort (Agra)</p><p>&#9675; Built by Akbar in 1565 as a stronghold of the Mughal Empire.</p><p>&#9675; Made of red sandstone, it includes palaces, mosques, and audience halls like the Jahangir Palace and Khas Mahal.</p><p>&#9675; Overlooks the Taj Mahal and served as a royal residence and military base.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Champaner-Pavagadh Archaeological Park is situated in the state of _________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2350;&#2381;&#2346;&#2366;&#2344;&#2375;&#2352;-&#2346;&#2366;&#2357;&#2366;&#2327;&#2338;&#2364; &#2346;&#2369;&#2352;&#2366;&#2340;&#2340;&#2381;&#2357; &#2346;&#2366;&#2352;&#2381;&#2325; _________ &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",

    "correct_option_id": 2,
    "solution": "<p>&bull; Champaner-Pavagadh Archaeological Park is situated in the state of Gujarat.</p><p>Further Insight:</p><p>&bull; Champaner-Pavagadh Archaeological Park, Gujarat</p><p>&#9675; It added in UNESCO list in 2004</p><p>&#9675; It represents periods from the Chalcolithic era to the 16th-century Gujarat Sultanate.</p><p>&#9675; Preserves the only complete and unchanged Islamic pre-Mughal city.</p><p>&#9675; Served as the short-lived capital of the Gujarat Sultanate.</p><p>&#9675; Religious Structure</p><p>&#9632; Hindu Temples: Kalika Mata Temple atop Pavagadh Hill, a major pilgrimage site.</p><p>&#9632; Jain Temples</p><p>&#9632; Jama Mosque</p><p>&#9675; Includes fortifications, palaces, water systems, and residential and agricultural structures.</p><p>&#9675; The cover remains from the 8th to 14th centuries.</p><p><img width=372 height=135 id=image2.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image011.png\"></p>",

    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Frederick William Stevens designed Chhatrapati Shivaji Terminus, formerly known as Victoria Terminus.</p><p>Further Insight:</p><p>&bull; Chhatrapati Shivaji Terminus (formerly Victoria Terminus)</p><p>&#9675; Situated in Mumbai, India.</p><p>&#9675; Symbolizes the city's identity as a 'Gothic City' and a major mercantile port.</p><p>&#9675; A blend of Victorian Gothic Revival architecture and Indian traditional styles.</p><p>&#9675; Inspired by late medieval Italian models and traditional Indian palace designs.</p><p>&#9675; Designed by British architect Frederick William Stevens.</p><p>&#9632; Construction began in 1878 and spanned 10 years.</p><p>&#9675; Notable for its stone dome, turrets, pointed arches, and intricate ground plan.</p><p>&#9675; Reflects collaboration between British architects and Indian craftsmen</p><p><img width=378 height=378 id=image13.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image012.jpg\"></p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>The Rock Shelters of Bhimbetka, which is a UNESCO cultural heritage site located at foothills of which mountain range?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2368;&#2350;&#2348;&#2375;&#2335;&#2325;&#2366; &#2325;&#2375; &#2358;&#2376;&#2354;&#2366;&#2358;&#2381;&#2352;&#2351;, &#2332;&#2379; &#2319;&#2325; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2360;&#2366;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367;&#2325; &#2357;&#2367;&#2352;&#2366;&#2360;&#2340; &#2360;&#2381;&#2341;&#2354; &#2361;&#2376;, &#2325;&#2367;&#2360; &#2346;&#2352;&#2381;&#2357;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2368; &#2340;&#2354;&#2361;&#2335;&#2368; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Shivalik Range</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2357;&#2366;&#2354;&#2367;&#2325; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Aravalli Range</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2366;&#2357;&#2354;&#2368; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Vindhyan Range</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2306;&#2343;&#2381;&#2351; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Satpura Range</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2346;&#2369;&#2337;&#2364;&#2366; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The Rock Shelters of Bhimbetka is located in foothills of the Vindhyan Range.</p><p>Further Insight:</p><p>&bull; Rock Shelters of Bhimbetka</p><p>&#9675; Situated in the foothills of the Vindhya Mountains, on the southern edge of the Central Indian plateau.</p><p>&#9675; Surrounded by dense forest and massive sandstone outcrops.</p><p>&#9675; It comprises five clusters of natural rock shelters.</p><p>&#9675; Houses paintings ranging from the Mesolithic Period to the historical period.</p><p>&#9632; Depict life and activities of hunter-gatherer societies.</p><p>&#9632; Reflect a continuous cultural evolution over thousands of years.</p><p>&#9675; Provides insight into prehistoric human life and artistic expression.</p><p><img width=624 height=328 id=image18.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image013.png\"></p>",
    "question_index": 14

  {
    "question": "<span class=\"eqt\"><p>Historical structure Vajrasana or the Diamond throne, which is thought to be built by Emperor Ashoka, is the part of which UNESCO structure?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2320;&#2340;&#2367;&#2361;&#2366;&#2360;&#2367;&#2325; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2357;&#2332;&#2381;&#2352;&#2366;&#2360;&#2344; &#2351;&#2366; &#2361;&#2368;&#2352;&#2366; &#2360;&#2367;&#2306;&#2361;&#2366;&#2360;&#2344;, &#2332;&#2367;&#2360;&#2375; &#2360;&#2350;&#2381;&#2352;&#2366;&#2335; &#2309;&#2358;&#2379;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2325;&#2367;&#2360; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ellora Caves</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2354;&#2379;&#2352;&#2366; &#2325;&#2368; &#2327;&#2369;&#2347;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Elephanta Caves</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2354;&#2368;&#2347;&#2375;&#2306;&#2335;&#2366; &#2327;&#2369;&#2347;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Mahabodhi Temple</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2348;&#2379;&#2343;&#2367; &#2350;&#2306;&#2342;&#2367;&#2352;</span>",
      "<span class=\"eqt\">Buddhist Monuments at Sanchi</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2305;&#2330;&#2368; &#2350;&#2375;&#2306; &#2348;&#2380;&#2342;&#2381;&#2343; &#2360;&#2381;&#2350;&#2366;&#2352;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The Vajrasana, or Diamond Throne, is part of the Mahabodhi Temple Complex at Bodh Gaya, which is a UNESCO World Heritage Site.</p><p>Further Insight:</p><p>&bull; Mahabodhi Temple Complex, Bodh Gaya</p><p>&#9675; Marks the site where Buddha attained enlightenment under the Bodhi Tree.</p><p>&#9675; First temple commissioned by Emperor Ashoka in the 3rd century BCE.</p><p>&#9675; Present structure dates to the 5th-6th centuries CE (Gupta period).</p><p>&#9675; Key Components of the Complex</p><p>&#9632; Mahabodhi Temple: Central structure marking the enlightenment site.</p><p>&#9632; Vajrasana: Polished sandstone slab by Emperor Ashoka, marking Buddha's meditation spot.</p><p>&#9632; Bodhi Tree: A descendant of the original tree under which Buddha meditated.</p><p>&#9632; Lotus Pond: Sacred waterbody within the complex.</p><p>&#9632; Votive Stupas: Numerous ancient stupas surrounding the temple.</p><p>&#9675; One of the four holiest Buddhist sites associated with Buddha's life..</p><p><img width=493 height=493 id=image11.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image014.jpg\"></p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Western Ghat traverses through which of the following states?</p><p>a. Goa</p><p>b. Maharashtra</p><p>c. Tamil Nadu</p><p>Choose the correct option</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2327;&#2369;&#2332;&#2352;&#2340;&#2366; &#2361;&#2376;?</p><p>a. &#2327;&#2379;&#2357;&#2366;</p><p>b. &#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;</p><p>c. &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only c and a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c &#2324;&#2352; a</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Western Ghats traverse through the States of Kerala, Tamil Nadu, Karnataka, Goa, Maharashtra and Gujarat.</p><p>Further Insight:</p><p>&bull; Western Ghat</p><p>&#9675; Natural UNESCO Heritage site in India added in 2012</p><p>&#9675; Recognized as a region of immense importance for biodiversity conservation.</p><p>&#9675; Noted for high geological, cultural, and aesthetic values.</p><p>&#9675; A 1,600 km mountain chain parallel to India's western coast, traversing Kerala, Tamil Nadu, Karnataka, Goa, Maharashtra, and Gujarat.</p><p>&#9675; Covers ~140,000 km&#178;, interrupted by the 30 km Palghat Gap.</p><p>&#9675; Older than the Himalayas, influencing monsoon weather patterns across peninsular India.</p><p>&#9675; One of eight global \"hottest hotspots\" of biological diversity.</p><p>&#9675; Features 325 globally threatened species, including:</p><p>&#9632; 229 plants</p><p>&#9632; 31 mammals</p><p>&#9632; 15 birds</p><p>&#9632; 43 amphibians</p><p>&#9632; 5 reptiles</p><p>&#9632; 1 fish</p><p>&#9675; Includes 129 Vulnerable, 145 Endangered, and 51 Critically Endangered species.</p><p>&#9675; Home to world-class non-equatorial tropical evergreen forests.</p><p><img width=396 height=209 id=image14.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image015.jpg\"></p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not part of the Mountain Railways of India under UNESCO cultural Heritage list?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2360;&#2366;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367;&#2325; &#2357;&#2367;&#2352;&#2366;&#2360;&#2340; &#2360;&#2370;&#2330;&#2368; &#2325;&#2375; &#2340;&#2361;&#2340; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2352;&#2381;&#2357;&#2340;&#2368;&#2351; &#2352;&#2375;&#2354;&#2357;&#2375; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Darjeeling Himalayan Railway</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2366;&#2352;&#2381;&#2332;&#2367;&#2354;&#2367;&#2306;&#2327; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351;&#2344; &#2352;&#2375;&#2354;&#2357;&#2375;</span>",
      "<span class=\"eqt\">Nilgiri Mountain Railway</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2354;&#2327;&#2367;&#2352;&#2367; &#2350;&#2366;&#2313;&#2306;&#2335;&#2375;&#2344; &#2352;&#2375;&#2354;&#2357;&#2375;</span>",
      "<span class=\"eqt\">Kalka-Shimla Railway</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2354;&#2325;&#2366;-&#2358;&#2367;&#2350;&#2354;&#2366; &#2352;&#2375;&#2354;&#2357;&#2375;</span>",
      "<span class=\"eqt\">Kozhikode-Kerala Railway</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2333;&#2367;&#2325;&#2379;&#2337;-&#2325;&#2375;&#2352;&#2354; &#2352;&#2375;&#2354;&#2357;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Kozhikode-Kerala Railway is not part of the Mountain Railways of India under UNESCO cultural heritage list.</p><p>Further Insight:</p><p>&bull; Mountain Railways of India</p><p>&#9675; Comprises three mountain railways built in the late 19th and early 20th centuries.</p><p>&#9632; Darjeeling Himalayan Railway (Opened 1881):</p><p>&bull; First hill passenger railway and a remarkable example of engineering.</p><p>&bull; Addressed the challenge of creating a rail link across scenic mountainous terrain.</p><p>&#9632; Nilgiri Mountain Railway (Completed 1908):</p><p>&bull; 46-km metre-gauge track in Tamil Nadu.</p><p>&bull; Elevation: 326 m to 2,203 m.</p><p>&bull; Construction began in 1891, showcasing the latest technology of its era.</p><p>&#9632; Kalka - Shimla Railway (Built mid-19th century):</p><p>&bull; 96-km single-track rail to Shimla, overcoming steep gradients and rugged terrain.</p><p>&#9675; UNESCO Recognition</p><p>&#9632; Darjeeling Himalayan Railway listed in 1999.</p><p>&#9632; Nilgiri Mountain Railway was added in 2005.</p><p>&#9632; Kalka - Shimla Railway included in 2008.</p><p>&#9675; Constructed to connect highland towns, overcoming challenging terrains through innovative engineering.</p><p>&#9675; Represent technological transfer during colonial times and remain fully operational.</p><p><img width=515 height=290 id=image17.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image016.jpg\"></p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Nanda Devi and Valley of Flowers National Parks is located in the state of _____________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2306;&#2342;&#2366; &#2342;&#2375;&#2357;&#2368; &#2324;&#2352; &#2347;&#2370;&#2354;&#2379;&#2306; &#2325;&#2368; &#2328;&#2366;&#2335;&#2368; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2342;&#2381;&#2351;&#2366;&#2344; _____________ &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Uttarakahand</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2326;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Himachal Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2350;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Jammu and Kashmir</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2350;&#2381;&#2350;&#2370; &#2324;&#2352; &#2325;&#2358;&#2381;&#2350;&#2368;&#2352;</span>",
      "<span class=\"eqt\">Sikkim</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2325;&#2381;&#2325;&#2367;&#2350;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Nanda Devi and Valley of Flowers national Parks located in the State of Uttarakhand.</p><p>Further Insight:</p><p>&bull; Nanda Devi and Valley of Flowers National Parks</p><p>&#9675; Located in the West Himalayas, India.</p><p>&#9675; Includes two National parks: Nanda Devi National Park and Valley of Flowers National Park.</p><p>&#9675; Nanda Devi Peak: India's second-highest mountain at 7,817 m (25,646 ft).(after Kangchenjunga)</p><p>&#9675; Alpine Meadows: Renowned for endemic alpine flowers and stunning natural beauty.</p><p>&#9675; It is a unique transition zone between the Zanskar and Great Himalaya ranges.</p><p>&#9675; Home to rare and endangered species such as:</p><p>&#9632; Asiatic black bear</p><p>&#9632; Snow leopard</p><p>&#9632; Brown bear</p><p>&#9632; Blue sheep (Bharal)</p><p>&#9675; Rich diversity of mountain plants.</p><p>&#9675; Nanda Devi National Park listed as a UNESCO site in 1988; Valley of Flowers added in 2005.</p><p><img width=419 height=279 id=image10.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image017.jpg\"></p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not part of Great Living Chola Temples?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2350;&#2361;&#2366;&#2344; &#2332;&#2368;&#2357;&#2367;&#2340; &#2330;&#2379;&#2354; &#2350;&#2306;&#2342;&#2367;&#2352;&#2379;&#2306; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Brihadisvara Temple at Thanjavur</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2306;&#2332;&#2366;&#2357;&#2369;&#2352; &#2350;&#2375;&#2306; &#2348;&#2371;&#2361;&#2342;&#2368;&#2358;&#2381;&#2357;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352;</span>",
      "<span class=\"eqt\">Choleshwar Temple at Kunoor</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2344;&#2370;&#2352; &#2350;&#2375;&#2306; &#2330;&#2379;&#2354;&#2375;&#2358;&#2381;&#2357;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352;</span>",
      "<span class=\"eqt\">Airavatesvara Temple at Darasuram</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2366;&#2352;&#2366;&#2360;&#2369;&#2352;&#2350; &#2350;&#2375;&#2306; &#2320;&#2352;&#2366;&#2357;&#2340;&#2375;&#2358;&#2381;&#2357;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352;</span>",
      "<span class=\"eqt\">Brihadisvara Temple at Ganagaikondacholisvaram</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2339;&#2327;&#2366;&#2312;&#2325;&#2379;&#2306;&#2337;&#2366;&#2330;&#2379;&#2354;&#2367;&#2360;&#2357;&#2352;&#2350; &#2350;&#2375;&#2306; &#2348;&#2371;&#2361;&#2342;&#2368;&#2358;&#2381;&#2357;&#2352; &#2350;&#2306;&#2342;&#2367;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Choleshwar Temple at Kunoor is not the part of Great Living Chola Temples.</p><p>Further Insight:</p><p>&bull; Great Living Chola Temples, Tamilnadu</p><p>&#9675; Added in UNESCO list in 1987, later expanded the list in 2004 to cover all three temples</p><p>&#9675; Built by Chola kings during the 11th and 12th centuries.</p><p>&#9675; Reflect the architectural brilliance of the Chola Empire, which ruled South India and neighboring islands.</p><p>&#9675; It includes Three Structures </p><p>&#9632; Brihadisvara Temple, Thanjavur: Notable for its straight and severe vimana (sanctum tower). It was built by Chola King Rajaraja I in 1009 CE for worshiping lord Shiva</p><p>&#9632; Brihadisvara Temple, Gangaikondacholisvaram: Built by Rajendra I in 1035, featuring a 53-meter vimana with recessed corners and an upward curving design.</p><p>&#9632; Airavatesvara Temple, Darasuram: Built by Rajaraja II, featuring a 24-meter vimana and intricate stone and bronze sculptures.</p><p>&#9675; These structures exemplify Dravidian architecture of the Chola period.</p><p>&#9675; Constructed with stone, adorned with sculptures in stone and bronze.</p><p><img width=457 height=314 id=image9.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26585/image018.jpg\"></p>",
    "question_index": 19
  }
