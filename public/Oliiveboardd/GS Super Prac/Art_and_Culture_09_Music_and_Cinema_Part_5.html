  {
    "question": "<span class=\"eqt\"><p>Which musician is credited with introducing the bansuri to classical concert halls?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2360;&#2306;&#2327;&#2368;&#2340;&#2325;&#2366;&#2352; &#2325;&#2379; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2360;&#2306;&#2327;&#2368;&#2340; &#2360;&#2350;&#2366;&#2352;&#2379;&#2361;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2366;&#2306;&#2360;&#2369;&#2352;&#2368; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2358;&#2381;&#2352;&#2375;&#2351; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Nityanand Haldipur</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2340;&#2381;&#2351;&#2366;&#2344;&#2306;&#2342; &#2361;&#2354;&#2381;&#2342;&#2368;&#2346;&#2369;&#2352;</span>"

    "correct_option_id": 2,

  {
    "question": "<span class=\"eqt\"><p>Which musician is known for reviving and popularizing the ancient Dhrupad style of Hindustani classical music?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2306;&#2327;&#2368;&#2340;&#2325;&#2366;&#2352; &#2361;&#2367;&#2306;&#2342;&#2369;&#2360;&#2381;&#2340;&#2366;&#2344;&#2368; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2360;&#2306;&#2327;&#2368;&#2340; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2343;&#2381;&#2352;&#2369;&#2346;&#2342; &#2358;&#2376;&#2354;&#2368; &#2325;&#2379; &#2346;&#2369;&#2344;&#2352;&#2381;&#2332;&#2368;&#2357;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2354;&#2379;&#2325;&#2346;&#2381;&#2352;&#2367;&#2351; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Zakir Hussain</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2325;&#2367;&#2352; &#2361;&#2369;&#2360;&#2376;&#2344;</span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>Ustad Zia Fariduddin Dagar was an Indian Classical Vocalist in the Dhrupad, the oldest existing form of the Hindustani Classical Music and part of the Dagar family of musicians.</p><p>Dhrupad is one of the oldest forms of classical music in North India, characterized by its meditative and spiritual approach. </p><p>He was awarded the 1994 Sangeet Natak Akademi Award in Hindustani music-Vocal by Sangeet Natak Akademi, India's National Academy of Music, Dance and Drama. </p><p>Padma Shri- India's fourth highest civilian honor been conferred upon him in year 2012  -  but he turned it down.</p>",

  },

    "question": "<span class=\"eqt\"><p>Which female vocalist is renowned for her unique style in the Jaipur-Atrauli gharana?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2351;&#2346;&#2369;&#2352;-&#2309;&#2340;&#2352;&#2380;&#2354;&#2368; &#2328;&#2352;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366; &#2327;&#2366;&#2351;&#2367;&#2325;&#2366; &#2309;&#2346;&#2344;&#2368; &#2309;&#2344;&#2370;&#2336;&#2368; &#2358;&#2376;&#2354;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Gangubai Hangal</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2327;&#2370;&#2348;&#2366;&#2312; &#2361;&#2306;&#2327;&#2354;</span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>Kesarbai Kerkar (1892-1977) was a renowned Indian classical vocalist of the Jaipur-Atrauli gharana. </p><p>A protege of Ustad Alladiya Khan (1855 - 1946), the founder of the gharana, from age sixteen, she went on to become one of the most noted khayal singers of the second half of the 20th century.</p><p>Awards won: Sangeet Natak Akademi Award (1953) and Padma Bhushan (1969). </p><p>Further insights:</p><p>&#8226; Madurai Shanmukhavadivu Subbulakshmi (16 September 1916  -  11 December 2004) was an Indian Carnatic singer. She was the first musician ever to be awarded the Bharat Ratna, India's highest civilian honour and also the first Indian musician to receive the Ramon Magsaysay award in 1974.</p><p>&#8226; Gangubai Hangal (05 March 1913  -  21 July 2009) was an Indian singer of the khayal genre of Hindustani classical music from Karnataka.</p><p>&#8226; Prabha Atre (13 September 1932  -  13 January 2024) was an Indian classical vocalist from the Kirana gharana.</p>",

  },

      "<span class=\"eqt\">Hariprasad Chaurasia</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2367;&#2346;&#2381;&#2352;&#2360;&#2366;&#2342; &#2330;&#2380;&#2352;&#2360;&#2367;&#2351;&#2366;</span>"

    "correct_option_id": 2,
    "solution": "<p>Ustad Allauddin Khan, the founder of the Maihar gharana and father of Ali Akbar Khan, played a significant role in popularizing the dilruba in Hindustani classical music. </p><p>The dilruba is a string instrument similar to the sarangi but easier to play, with a distinctive sound that bridges vocal and instrumental music. Khan's contributions to Indian classical music included mastery of numerous instruments and mentoring legendary musicians.</p>",

    "solution": "<p>Raja Chhatrapati Singh Judeo was an Indian percussionist. He was famous for his virtuosity on Pakhawaj drums used in Hindustani Classical Music.</p><p>Singh was awarded the Sangeet Natak Akademi award in 1991.</p><p>Further insights:</p><p>&#8226; Tulsidas Borkar (18 November 1934  -  29 September 2018) was an Indian composer and harmonium player. The Government of India awarded him the civilian honour of the Padma Shri in 2016.</p><p>&#8226; Sakharam Prabhakar Jalgaonkar (1 January 1922  -  16 September 2009), known as Appa Jalgaonkar or Appasaheb Jalgaonkar, was an Indian harmonium player from the state of Maharashtra.</p><p>&#8226; Brij Bhushan Kabra (1937  -  12 April 2018) was an Indian musician who popularized the guitar as an instrument in Indian classical music.</p>",
