        const questions = [
  {
    "question": "<span class=\"eqt\"><p>TRAI or Telecom Regulatory Authority of India was established in which year?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2335;&#2381;&#2352;&#2366;&#2312; &#2351;&#2366; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2342;&#2370;&#2352;&#2360;&#2306;&#2330;&#2366;&#2352; &#2344;&#2367;&#2351;&#2366;&#2350;&#2325; &#2346;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2352;&#2339; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">1992</span><span class=\"hqt\" style=\"display:none\">1992</span>",
      "<span class=\"eqt\">1995</span><span class=\"hqt\" style=\"display:none\">1995</span>",
      "<span class=\"eqt\">1999</span><span class=\"hqt\" style=\"display:none\">1999</span>",
      "<span class=\"eqt\">1997</span><span class=\"hqt\" style=\"display:none\">1997</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#9679;\tTRAI was established on 20th February 1997 by the Telecom Regulatory Authority of India Act, 1997.</p><p>Further Insight:</p><p>&#9679;\tTelecom Regulatory Authority of India (TRAI)</p><p>&#9675;\tFormed on: February 20, 1997</p><p>&#9675;\tEstablished under: Telecom Regulatory Authority of India Act, 1997</p><p>&#9675;\tPrimary Functions:</p><p>&#9632;\tRegulating telecom services to ensure quality, transparency, and fair competition.</p><p>&#9632;\tProtecting consumer interests by addressing grievances and promoting affordability.</p><p>&#9632;\tMonitoring tariffs and ensuring reasonable pricing of telecom services.</p><p>&#9632;\tPromoting innovation in telecom infrastructure and services.</p><p>&#9675;\tTRAI plays a crucial role in shaping Indias telecom landscape and maintaining a balance between service providers and consumers.</p><p></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>NITI Aayog replaced which body under the Government of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2340;&#2367; &#2310;&#2351;&#2379;&#2327; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2325;&#2367;&#2360; &#2344;&#2367;&#2325;&#2366;&#2351; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2354;&#2367;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Law Commission</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2343;&#2367; &#2310;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">Finance Commission</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2340;&#2381;&#2340; &#2310;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">Planning Commission</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2379;&#2332;&#2344;&#2366; &#2310;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">Human Rights Commission</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2344;&#2357;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2310;&#2351;&#2379;&#2327;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#9679;\tNITI Aayog replaces Planning Commission of India</p><p>Further Insight:</p><p>&#9679;\tThe National Institution for Transforming India (NITI Aayog)</p><p>&#9675;\tIt is a policy think tank of the Government of India</p><p>&#9675;\tEstablished on January 1,2015 to replace the Planning Commission.</p><p>&#9675;\tStructure</p><p>&#9632;\tNITI Aayog has a Governing Council chaired by the Prime Minister and Chief Ministers of all states and Lt. Governors of Union Territories.</p><p>&#9632;\tThe Prime Minister also appoints the Vice-Chairperson, Chief Executive Officer, and ex-officio members.</p><p>&#9675;\tNITI Aayog's objectives are based on seven pillars of effective governance: pro-people, pro-activity, participation, empowerment, inclusion of everyone, equality, and transparency</p><p>&#9675;\tNITI Aayog's mandate is to oversee the adoption and monitoring of the Sustainable Development Goals (SDGs) in the country.</p><p></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Under which article does the President constitute the Finance Commission of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2375; &#2340;&#2361;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2357;&#2367;&#2340;&#2381;&#2340; &#2310;&#2351;&#2379;&#2327; &#2325;&#2366; &#2327;&#2336;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 249</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 249</span>",
      "<span class=\"eqt\">Article 280</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 280</span>",
      "<span class=\"eqt\">Article 290</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 290</span>",
      "<span class=\"eqt\">Article 300</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 300</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#9679;\tArticle 280 of the Indian constitution states that The President constitutes the Finances Commission every Fifth year.</p><p>Further  Insight:</p><p>&#9679;\tFinance Commission of India</p><p>&#9675;\tThe Finance Commission is established under Article 280 of the Indian Constitution.</p><p>&#9675;\tIt is constituted by the President of India.</p><p>&#9675;\tThe first Finance Commission was formed in 1951.</p><p>&#9675;\tThe first chairman of the Finance Commission was K.C. Neogy.</p><p>&#9675;\tThe current chairman of the Finance Commission is Arvind Panagariya.</p><p>&#9675;\tMajor Objectives:</p><p>&#9632;\tTo recommend the distribution of taxes between the Centre and the States, and among the States themselves.</p><p>&#9632;\tTo determine the principles governing grants-in-aid to the States by the Centre.</p><p>&#9632;\tTo suggest measures to augment the Consolidated Fund of a State to supplement the resources of Panchayats and Municipalities.</p><p>&#9632;\tTo address both vertical and horizontal fiscal imbalances.</p><p></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which constitutional body is responsible for auditing the government finances to ensure transparency and accountability?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340;&#2366; &#2324;&#2352; &#2332;&#2357;&#2366;&#2348;&#2342;&#2375;&#2361;&#2368; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2357;&#2367;&#2340;&#2381;&#2340; &#2325;&#2366; &#2354;&#2375;&#2326;&#2366;-&#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2344;&#2367;&#2325;&#2366;&#2351; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">UPSC</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2346;&#2368;&#2319;&#2360;&#2360;&#2368;</span>",
      "<span class=\"eqt\">CAG</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2319;&#2332;&#2368;</span>",
      "<span class=\"eqt\">FCI</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2347;&#2360;&#2368;&#2310;&#2312;</span>",
      "<span class=\"eqt\">GST Council</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2346;&#2352;&#2367;&#2359;&#2342;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Comptroller and Auditor General of India (CAG) is the constitutional body that audits the government's finances to ensure transparency and accountability.</p><p>Further Insight:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Article</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Title</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Summary</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Article 148</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Comptroller and Auditor General of India</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Establishes the office of the CAG, who is appointed by the President of India.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Article 149</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Duties and Powers of the CAG</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Defines the duties and powers of the CAG in relation to auditing the accounts of the Union and State governments.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Article 150</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Uniformity in Accounts</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Provides for the establishment of a uniform form of accounts for the Union and States to maintain consistency.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Article 151</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Audit Reports</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Mandates the CAG to submit reports on the accounts of the Union and States to the President and Governors, respectively.</td></tr></table>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>UPSC got its constitutional status on ____________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2370;&#2346;&#2368;&#2319;&#2360;&#2360;&#2368; &#2325;&#2379; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2342;&#2352;&#2381;&#2332;&#2366; ____________ &#2325;&#2379; &#2350;&#2367;&#2354;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">January 26, 1950</span><span class=\"hqt\" style=\"display:none\">26 &#2332;&#2344;&#2357;&#2352;&#2368;, 1950</span>",
      "<span class=\"eqt\">November 26, 1949</span><span class=\"hqt\" style=\"display:none\">26 &#2344;&#2357;&#2306;&#2348;&#2352;, 1949</span>",
      "<span class=\"eqt\">August 15, 1947</span><span class=\"hqt\" style=\"display:none\">15 &#2309;&#2327;&#2360;&#2381;&#2340;, 1947</span>",
      "<span class=\"eqt\">October 1, 1926</span><span class=\"hqt\" style=\"display:none\">1 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;, 1926</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; UPSC got constitutional status on January 26, 1950.</p><p>&bull; Evolution of UPSC</p><p>&#9675; The Royal Commission on Superior Civil Services in India (1923) recommended the creation of a Public Service Commission in its 1924 report.</p><p>&#9675; First Public Service Commission established in 1926 with Sir Ross Barker as Chairman, having a limited advisory role.</p><p>&#9675; Federal Public Service Commission created under the Government of India Act, 1935.</p><p>&#9675; After India gained independence in 1947, the Federal Public Service Commission was renamed the Union Public Service Commission.</p><p>&#9675; On January 26, 1950, the Constitution of India granted the UPSC constitutional status.</p><p>Further Insight:</p><p>&bull; Union Public Service Commission (UPSC)</p><p>&#9675; Founded on October 1, 1926.</p><p>&#9675; Gained constitutional status on January 26, 1950.</p><p>&#9675; Governed by Articles 315 - 323 of the Indian Constitution.</p><p>&#9675; Article 315 mentions the Public Service Commission for the Union and for the States</p><p>&#9675; Composition and Appointment:</p><p>&#9632; Comprises a Chairman and ten members.</p><p>&#9632; Members are appointed by the President of India.</p><p>&#9632; Serve a term of six years or until the age of 65.</p><p>&#9632; At least half the members have prior government experience</p><p>&#9675; Conducts exams and recruits candidates for civil services and other government posts.</p><p>&#9675; Plays a crucial role in ensuring qualified personnel for India's governance.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What is the term of the Chairman of State Service Commission?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2375;&#2357;&#2366; &#2310;&#2351;&#2379;&#2327; &#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">6 years or 65 years of age whichever is earlier</span><span class=\"hqt\" style=\"display:none\">6 &#2357;&#2352;&#2381;&#2359; &#2351;&#2366; 65 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2332;&#2379; &#2349;&#2368; &#2346;&#2361;&#2354;&#2375; &#2361;&#2379;</span>",
      "<span class=\"eqt\">5 years or 70 years of age whichever is earlier</span><span class=\"hqt\" style=\"display:none\">5 &#2357;&#2352;&#2381;&#2359; &#2351;&#2366; 70 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2332;&#2379; &#2349;&#2368; &#2346;&#2361;&#2354;&#2375; &#2361;&#2379;</span>",
      "<span class=\"eqt\">6 years or 62 years of age whichever is earlier</span><span class=\"hqt\" style=\"display:none\">6 &#2357;&#2352;&#2381;&#2359; &#2351;&#2366; 62 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2332;&#2379; &#2349;&#2368; &#2346;&#2361;&#2354;&#2375; &#2361;&#2379;</span>",
      "<span class=\"eqt\">5 years or 60 years of age whichever is earlier</span><span class=\"hqt\" style=\"display:none\">5 &#2357;&#2352;&#2381;&#2359; &#2351;&#2366; 60 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2332;&#2379; &#2349;&#2368; &#2346;&#2361;&#2354;&#2375; &#2361;&#2379;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Term of the Member or Chairman of State Service Commission or Joint Service commission is 6 years or 62 years of age whichever is earlier.</p><p>Further Insight:</p><p>&bull; State Public Service Commission (SPSC)</p><p>&#9675; Governed by Articles 315 - 323 of the Indian Constitution.</p><p>&#9675; Article 315 mentions the Public Service Commission for the Union and for the States</p><p>&#9675; Responsible for state-level recruitment and personnel management.</p><p>&#9675; Composition and Appointment:</p><p>&#9632; Comprises a Chairman and members appointed by the Governor.</p><p>&#9632; At least half the members must have 10 years of government experience.</p><p>&#9632; Members serve a 6-year term or until the age of 62.</p><p>&#9675; Members can only be removed by the President of India.</p><p>&#9632; Grounds for removal include insolvency or misconduct.</p><p>&#9632; Requires consultation with the Supreme Court, if necessary.</p><p>&#9675; Ensures independence with protected tenure.</p><p>&#9675; Salaries are drawn from the state's Consolidated Fund, ensuring financial security.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The procedure of removal of Chief Election Commissioner of India is the same as of ___________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2330;&#2369;&#2344;&#2366;&#2357; &#2310;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2379; &#2361;&#2335;&#2366;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; ___________ &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Prime Minister of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">President of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Governor of State</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Judges of Supreme Court</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; The procedure of removal of Chief Election Commissioner of India is the same as of Judges of the Supreme Court.</p><p>Further Insight:</p><p>&bull; Articles Related to Elections and the Election Commission</p><p>&#9675; Article 324:</p><p>&#9632; Establishes the Election Commission of India (ECI) to oversee and ensure free and fair elections in the country. It grants the President the authority to appoint the Chief Election Commissioner and other Election Commissioners.</p><p>&#9675; Article 325:</p><p>&#9632; Provides for the creation of a common electoral roll for elections to the Lok Sabha and State Legislative Assemblies, ensuring that all citizens who are eligible can vote.</p><p>&#9675; Article 326:</p><p>&#9632; States that elections to the Lok Sabha and State Legislative Assemblies will be based on adult suffrage, meaning all citizens above the age of 18 are eligible to vote.</p><p>&#9675; Article 327:</p><p>&#9632; Empowers Parliament to make provisions for the conduct of elections to the Lok Sabha and to the State Legislatures.</p><p>&#9675; Article 328:</p><p>&#9632; Allows the State Legislatures to make provisions for the conduct of elections to the Legislative Assemblies of the states and to the offices of Chairpersons of Panchayats at different levels.</p><p>&#9675; Article 329:</p><p>&#9632; Prohibits the interference of courts in electoral matters, ensuring that the validity of elections is not questioned in a court of law.</p><p>&#9675; Article 330:</p><p>&#9632; Provides for the reservation of seats for Scheduled Castes (SCs) and Scheduled Tribes (STs) in the Lok Sabha and State Legislative Assemblies.</p><p>&#9675; Article 331:</p><p>&#9632; Empowers the President to nominate representatives of the Anglo-Indian community to the Lok Sabha if he/she believes that the community is not adequately represented.</p><p>&#9675; Article 332:</p><p>&#9632; Allows the reservation of seats for SCs and STs in the Legislative Assemblies of the states.</p><p>&#9675; Article 333:</p><p>&#9632; Empowers the Governor of a state to nominate not more than two members of the Anglo-Indian community to the Legislative Assembly if he/she feels that the community is not adequately represented.</p><p>&#9632; It abolished</p><p>&#9675; Article 334:</p><p>&#9632; Relates to the reservation of seats for SCs and STs, and the Anglo-Indian community, and provides for their continuation for a period of ten years from the commencement of the Constitution, which has been extended multiple times.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>National Commission of Scheduled Tribes is established under Article 338A by which Constitutional Amendment Act?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367; &#2310;&#2351;&#2379;&#2327; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 338A &#2325;&#2375; &#2340;&#2361;&#2340; &#2325;&#2367;&#2360; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2312; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">89th Constitutional Amendment Act, 2003</span><span class=\"hqt\" style=\"display:none\">89&#2357;&#2366;&#2306; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 2003</span>",
      "<span class=\"eqt\">86th Constitutional Amendment Act, 2002</span><span class=\"hqt\" style=\"display:none\">86&#2357;&#2366;&#2306; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 2002</span>",
      "<span class=\"eqt\">91st Constitutional Amendment Act, 2004</span><span class=\"hqt\" style=\"display:none\">91&#2357;&#2366;&#2306; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 2004</span>",
      "<span class=\"eqt\">97th Constitutional Amendment Act, 2003</span><span class=\"hqt\" style=\"display:none\">97&#2357;&#2366;&#2306; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 2003</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; National Commission of Scheduled Tribes established under Article 338A by 89th Constitutional Amendment Act, 2003.</p><p>Further Insight:</p><p>&bull; National Commission for Scheduled Tribes (NCST)</p><p>&#9675; Formed under Article 338-A through the 89th Constitutional Amendment Act, 2003.</p><p>&#9675; Became an independent body in 2004 to focus on Scheduled Tribes' welfare.</p><p>&#9675; Investigates the implementation of legal safeguards for Scheduled Tribes (STs).</p><p>&#9675; Addresses complaints regarding the rights and welfare of STs.</p><p>&#9675; Advises governments on policies and socio-economic planning for STs.</p><p>&#9675; Monitors and evaluates the progress of development programs for STs.</p><p>&#9675; Secures forest rights and protects traditional tribal resources.</p><p>&#9675; Addresses issues related to land rights and resource exploitation affecting STs.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article added by the 7th Constitutional Amendment Act, 1956 for establishment of the office of Special officer for Linguistic Minorities?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2359;&#2366;&#2312; &#2309;&#2354;&#2381;&#2346;&#2360;&#2306;&#2326;&#2381;&#2351;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2358;&#2375;&#2359; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; 7&#2357;&#2375;&#2306; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1956 &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2332;&#2379;&#2337;&#2364;&#2366; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 338B</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 338&#2348;&#2368;</span>",
      "<span class=\"eqt\">Article 346A</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 346&#2319;</span>",
      "<span class=\"eqt\">Article 356A</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 356&#2319;</span>",
      "<span class=\"eqt\">Article 350B</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 350&#2348;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Article 350B was added by 7th Constitutional Amendment Act, 1956 for establishment of the office of Special officer for Linguistic Minorities</p><p>Further Insight:</p><p>&bull; Special Officer for Linguistic Minorities</p><p>&#9675; Established under Article 350-B, introduced by the Seventh Constitutional Amendment Act, 1956.</p><p>&#9675; Mandates the President to appoint a Special Officer for Linguistic Minorities.</p><p>&#9675; Commissioner for Linguistic Minorities</p><p>&#9632; Created in 1957 to oversee linguistic minority rights.</p><p>&#9632; Operates under the Ministry of Minority Affairs.</p><p>&#9675; Headquarter located in Allahabad (Prayagraj).</p><p>&#9675; Regional Offices: Functioning in Karnataka, Tamil Nadu, and West Bengal.</p><p>&#9675; Function</p><p>&#9632; Investigates and reports on the implementation of safeguards for linguistic minorities.</p><p>&#9632; Ensures compliance with constitutional and legal protections for linguistic rights.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Office of Attorney General of India is mentioned under which article?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2361;&#2366;&#2344;&#2381;&#2351;&#2366;&#2351;&#2357;&#2366;&#2342;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2375; &#2340;&#2361;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 72</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 72</span>",
      "<span class=\"eqt\">Article 76</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 76</span>",
      "<span class=\"eqt\">Article 80</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 80</span>",
      "<span class=\"eqt\">Article 85</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 85</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Office of the Attorney General of India is mentioned under Article 76.</p><p>Further Insight:</p><p>&bull; Attorney General of India</p><p>&#9675; The Attorney General acts as the chief legal advisor to the government mentioned under Article 76.</p><p>&#9675; They do not have a fixed term, and can be removed by the President any time.</p><p>&#9675; He/She generally does not represent private parties in legal matters unless permitted by the Government of India.</p><p>&#9675; He has the right to an audience in all courts in the territory of India.</p><p>&#9675; He can sit in both houses and take part in debate but cannot vote in any resolution.</p>",
    "question_index": 9
  },

    "question": "<span class=\"eqt\"><p>Which body under the Government of India is the regulator and supervisor of the financial system of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2367;&#2325;&#2366;&#2351; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2344;&#2367;&#2351;&#2366;&#2350;&#2325; &#2324;&#2352; &#2346;&#2352;&#2381;&#2351;&#2357;&#2375;&#2325;&#2381;&#2359;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Office of Prime Minister</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Securities and Exchange Board of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2381;&#2352;&#2340;&#2367;&#2349;&#2370;&#2340;&#2367; &#2324;&#2352; &#2357;&#2367;&#2344;&#2367;&#2350;&#2351; &#2348;&#2379;&#2352;&#2381;&#2337;</span>",
      "<span class=\"eqt\">Reserve Bank of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2367;&#2332;&#2352;&#2381;&#2357; &#2348;&#2376;&#2306;&#2325;</span>",
      "<span class=\"eqt\">NABARD</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2348;&#2366;&#2352;&#2381;&#2337;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Reserve Bank of India an autonomous body under Government of India is the regulator and supervisor of the financial system of India.</p><p>Further Insight:</p><p>&bull; Reserve Bank of India (RBI)  -  Key Points</p><p>&#9675; Established on April 1, 1935, under the Reserve Bank of India Act, 1934.</p><p>&#9675; Originally located in Calcutta, the Central Office moved to Mumbai in 1937.</p><p>&#9675; Nationalized in 1949, now fully government-owned.</p><p>&#9675; Preamble: Focuses on monetary stability, a modern monetary policy framework, and price stability aligned with economic growth.</p><p>&#9675; Structure: Governed by a central board appointed by the Government of India.</p><p>&#9632; Directors: Governor, four Deputy Governors, ten nominated members, two government officials, and four regional board representatives.</p><p>&#9675; Main Functions:</p><p>&#9632; Monetary Authority: Implements monetary policy, with the Monetary Policy Committee (MPC) established in 2016 to set inflation targets (currently 4% &#177;2%).</p><p>&#9632; Financial Regulator: Oversees banking operations, issuing licenses, and setting parameters for the banking system.</p><p>&#9632; Foreign Exchange Manager: Manages reserves, facilitates trade, and maintains rupee value.</p><p>&#9632; Currency Issuer: Manages currency issuance and circulation.</p><p>&#9632; Developmental Role: Supports rural finance and priority sector lending.</p><p>&#9632; Financial Inclusion: Initiatives like No Frills Accounts and technology-based banking for wider access.</p><p>&#9632; Banker to Government and Banks: Manages government funds, provides financial support to banks</p>",
    "question_index": 10
  },

    "question": "<span class=\"eqt\"><p>Which statement is correct about the role and function of the National Human Rights Commission or NHRC?</p><p>a. Act as a civil court for judicial proceeding and can investigate human rights violation</p><p>b. Authority to utilize central or state government officers and agencies for investigation of violation of human rights</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2350;&#2366;&#2344;&#2357;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2310;&#2351;&#2379;&#2327; &#2351;&#2366; NHRC &#2325;&#2368; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>a. &#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2360;&#2367;&#2357;&#2367;&#2354; &#2325;&#2379;&#2352;&#2381;&#2335; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2350;&#2366;&#2344;&#2357;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2313;&#2354;&#2381;&#2354;&#2306;&#2328;&#2344; &#2325;&#2368; &#2332;&#2366;&#2306;&#2330; &#2325;&#2352;&#2344;&#2366;</p><p>b. &#2350;&#2366;&#2344;&#2357;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2313;&#2354;&#2381;&#2354;&#2306;&#2328;&#2344; &#2325;&#2368; &#2332;&#2366;&#2306;&#2330; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2351;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2319;&#2332;&#2375;&#2306;&#2360;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;</p></span>",
    "options": [
      "<span class=\"eqt\">Both a and b are incorrect</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; b &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Both a and b</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; b &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Function and role of NHRC</p><p>&#9675; Act as a civil court for judicial proceeding and can investigate human rights violation</p><p>&#9675; Authority to utilize central or state government officers and agencies for investigation of violation of human rights</p><p>Further Insight:</p><p>&bull; National Human Rights Commission (NHRC)</p><p>&#9675; Formed on 12th October 1993 under the Protection of Human Rights Act, 1993.</p><p>&#9632; Amended in 2006 and 2019.</p><p>&#9675; Its purpose is to Protects rights related to life, liberty, equality, and dignity as guaranteed by:</p><p>&#9632; The Indian Constitution.</p><p>&#9632; International covenants.</p><p>&#9675; Role and Functions:</p><p>&#9632; Acts as a civil court for judicial proceedings.</p><p>&#9632; Investigates human rights violations within one year of their occurrence.</p><p>&#9632; Utilizes central or state government officers and agencies for conducting investigations.</p>",
    "question_index": 12
  },

      "<span class=\"eqt\">1992</span><span class=\"hqt\" style=\"display:none\">1992</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; National Commission for women established in 1992 under the National Commission for Women Act, 1990.</p><p>Further Insight:</p><p>&bull; National Commission for Women (NCW)</p><p>&#9675; National Commission for women established in 1992 under the National Commission for Women Act, 1990.</p><p>&#9675; Its purpose is to advocate for women's rights and provide policy advice to the government on matters affecting women.</p><p>&#9675; It focuses on</p><p>&#9632; Dowry issues.</p><p>&#9632; Gender equality in employment.</p><p>&#9632; Prevention of exploitation and addressing rights violations.</p><p>&#9675; Its main functions are</p><p>&#9632; Investigates complaints related to:</p><p>&bull; Violence against women.</p><p>&bull; Discrimination.</p><p>&bull; Violations of women's rights.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following are the disputes handled by the NGT?</p><p>a. Environmental Protection</p><p>b. Forest conversation</p><p>c. International Water Pollution</p><p>Choose the correct option</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2357;&#2367;&#2357;&#2366;&#2342; &#2319;&#2344;&#2332;&#2368;&#2335;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2346;&#2335;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</p><p>a. &#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339;</p><p>b. &#2357;&#2344; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339;</p><p>c. &#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2332;&#2354; &#2346;&#2381;&#2352;&#2342;&#2370;&#2359;&#2339;</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only c and a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c &#2324;&#2352; a</span>",
      "<span class=\"eqt\">All of the following</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; NGT or National Green Tribunal handles the following dispute in India related to</p><p>&#9675; Environmental Protection</p><p>&#9675; Forest Protection</p><p>&#9675; Natural Resource Management</p><p>Further Insight:</p><p>&bull; National Green Tribunal (NGT)</p><p>&#9675; Formed under the National Green Tribunal Act, 2010.</p><p>&#9675; It's purpose is to Ensures swift and effective resolution of cases related to:</p><p>&#9632; Environmental protection.</p><p>&#9632; Forest conservation.</p><p>&#9632; Natural resource management.</p><p>&#9675; Handles disputes under seven key laws listed in Schedule I of the Act, including:</p><p>&#9632; The Water (Prevention and Control of Pollution) Act, 1974.</p><p>&#9632; The Forest (Conservation) Act, 1980.</p><p>&#9632; The Air (Prevention and Control of Pollution) Act, 1981.</p><p>&#9632; Others concerning environmental safeguards.</p><p>&#9675; Aims to resolve cases within six months of filing.</p>",
    "question_index": 14

    "solution": "<p>&bull; CVC or Central Vigilance Commission is the apex vigilance institution in India.</p><p>Further Insight:</p><p>&bull; Central Vigilance Commission (CVC)</p><p>&#9675; Apex vigilance institution in India.</p><p>&#9675; Functions independently of any executive authority.</p><p>&#9675; Set up in 1964 based on the recommendations of the Santhanam Committee.</p><p>&#9632; Granted statutory status by the CVC Act, 2003.</p><p>&#9675; Responsible for overseeing vigilance activities across all Central Government organizations.</p><p>&#9632; Advises authorities in planning, implementing, reviewing, and reforming vigilance measures.</p><p>&#9675; Structure</p><p>&#9632; A Central Vigilance Commissioner (Chairperson).</p><p>&#9632; Two Vigilance Commissioners.</p><p>&#9675; Appointment</p><p>&#9632; Appointed by the President based on recommendations of a three-member committee consisting of:</p><p>&bull; The Prime Minister (Chairperson).</p><p>&bull; The union Home minister.</p><p>&bull; The Leader of Opposition in the Lok Sabha.</p><p>&#9675; Functions:</p><p>&#9632; Preventive Vigilance: Advises on systemic improvements to prevent corruption.</p><p>&#9632; Supervisory Role: Monitors vigilance activities and complaints referred to the Central Bureau of Investigation (CBI).</p><p>&bull; Exercises superintendence over vigilance cases investigated by the CBI.</p><p>&#9632; Inquiry Oversight: Directs inquiries into corruption cases within Central Government departments.</p><p>&#9632; Coordination: Coordinates efforts to strengthen integrity in governance.</p><p>&#9632; Training &amp; Awareness: Promotes vigilance awareness and organizes training for officials.</p>",
