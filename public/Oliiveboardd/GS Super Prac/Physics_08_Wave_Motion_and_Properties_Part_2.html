<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../css/mock-main.css">

    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a type of mechanical wave?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2351;&#2366;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325; &#2340;&#2352;&#2306;&#2327; &#2325;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Electromagnetic wave</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340;&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2340;&#2352;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Sound wave</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Light wave</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2340;&#2352;&#2306;&#2327;</span>",
      "<span class=\"eqt\">X-ray</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2381;&#2360;-&#2352;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Mechanical waves</b> require a <b>material medium</b> (solid, liquid, or gas) to propagate.</p><p>&#183; <b>Sound waves</b> are mechanical waves that travel via particle vibrations (e.g., air molecules compressing and rarefying).</p><p>&#183; <b>Why not others?</b></p><p>&#183; Electromagnetic waves (e.g., light, X-rays) do <b>not</b> need a medium.</p><p>&#183; Light waves are electromagnetic.</p><p>&#183; X-rays are also electromagnetic.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct?</p><p>I. In transverse waves, particle motion is perpendicular to wave propagation.</p><p>II. Sound waves can be both transverse and longitudinal.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2309;&#2344;&#2369;&#2346;&#2381;&#2352;&#2360;&#2381;&#2341; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2325;&#2339; &#2327;&#2340;&#2367; &#2340;&#2352;&#2306;&#2327; &#2360;&#2306;&#2330;&#2352;&#2339; &#2325;&#2375; &#2354;&#2306;&#2348;&#2357;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306; &#2309;&#2344;&#2369;&#2346;&#2381;&#2352;&#2360;&#2381;&#2341; &#2324;&#2352; &#2309;&#2344;&#2369;&#2342;&#2376;&#2352;&#2381;&#2343;&#2381;&#2351; &#2342;&#2379;&#2344;&#2379;&#2306; &#2361;&#2379; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Statement I (Correct):</b></p><p>o <b>Transverse waves</b>: Particle motion is <b>perpendicular</b> to wave direction (e.g., waves on a string, light waves).</p><p>&#183; <b>Statement II (Incorrect):</b></p><p>o <b>Sound waves</b> are <b>longitudinal</b> in gases/liquids (particles oscillate parallel to wave direction).</p><p>o Exception: In <b>solids</b>, sound can have <b>both</b> transverse and longitudinal components due to rigidity.</p><p><b>Example:</b></p><p>&#183; <b>Longitudinal</b>: Sound in air (compressions/rarefactions).</p><p>&#183; <b>Transverse</b>: Seismic S-waves in Earth's crust.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which property of waves is defined as the number of oscillations per second?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2327;&#2369;&#2339; &#2346;&#2381;&#2352;&#2340;&#2367; &#2360;&#2375;&#2325;&#2306;&#2337; &#2342;&#2379;&#2354;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Wavelength</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2357;&#2354;&#2375;&#2306;&#2341;</span>",
      "<span class=\"eqt\">Amplitude</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Frequency</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Period</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2343;&#2367;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Frequency (f)</b>:</p><p>o Measured in <b>Hertz (Hz)</b>.</p><p>o Defines <b>oscillations per second</b> (e.g., 50 Hz = 50 cycles/second).</p><p>&#183; <b>Other options:</b></p><p>o Wavelength: Distance between wave crests (meters).</p><p>o Amplitude: Wave height (energy measure).</p><p>o Period: Time for one oscillation (seconds).</p><p><b>Formula:</b></p><p>f=1/T &#8203; (where T = period).</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What is the SI unit of wave velocity?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2352;&#2306;&#2327; &#2357;&#2375;&#2327; &#2325;&#2368; SI &#2311;&#2325;&#2366;&#2312; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">m/s&#178;</span><span class=\"hqt\" style=\"display:none\">m/s&#178;</span>",
      "<span class=\"eqt\">m/s</span><span class=\"hqt\" style=\"display:none\">m/s</span>",
      "<span class=\"eqt\">Hz</span><span class=\"hqt\" style=\"display:none\">Hz</span>",
      "<span class=\"eqt\">Nm</span><span class=\"hqt\" style=\"display:none\">Nm</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Wave velocity (v)</b>:</p><p>o SI unit: <b>meters per second (m/s)</b>.</p><p>o Calculated as <i>v</i>=<i>f</i> X <i>&#955;</i> (frequency  X  wavelength).</p><p><b>Example:</b></p><p>Speed of sound in air &#8776; <b>343 m/s</b> at 20&deg;C.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Sound waves in air are:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2357;&#2366; &#2350;&#2375;&#2306; &#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Longitudinal</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2342;&#2376;&#2352;&#2381;&#2343;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Transverse</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2337;&#2364;&#2366;</span>",
      "<span class=\"eqt\">Electromagnetic</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340;&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351;</span>",
      "<span class=\"eqt\">None of these</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Longitudinal waves</b>:</p><p>o Particles vibrate <b>parallel</b> to wave direction.</p><p>o In air, sound propagates as <b>compressions</b> (high pressure) and <b>rarefactions</b> (low pressure).</p><p>&#183; <b>Why not transverse?</b></p><p>o Gases/liquids lack shear rigidity for transverse waves.</p><p>o Solids can support both types.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What type of waves are produced in a stretched string? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2344;&#2368; &#2361;&#2369;&#2312; &#2337;&#2379;&#2352;&#2368; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Longitudinal</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2342;&#2376;&#2352;&#2381;&#2343;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Transverse</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2337;&#2364;&#2366;</span>",
      "<span class=\"eqt\">Electromagnetic</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340;&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Mechanical only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2351;&#2366;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Transverse waves</b> are produced in a stretched string because:</p><p>o The particles of the string move <b>perpendicular</b> to the direction of wave propagation.</p><p>o Example: Plucking a guitar string creates up-and-down oscillations.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The speed of sound is highest in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2352;&#2381;&#2357;&#2366;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Solids</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360;&#2319;&#2344;&#2319;&#2347;</span>",
      "<span class=\"eqt\">Liquids</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2352;&#2354; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;</span>",
      "<span class=\"eqt\">Gases</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2360;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Vacuum</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2376;&#2325;&#2381;&#2351;&#2370;&#2350;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Speed of sound</b> depends on the <b>medium's density</b> and <b>elasticity</b>:</p><p>o <b>Solids</b>: Fastest speed (e.g., steel &#8776; <b>5,960 m/s</b>) due to tightly packed molecules and strong intermolecular forces.</p><p>o <b>Liquids</b>: Slower than solids (e.g., water &#8776; <b>1,480 m/s</b>).</p><p>o <b>Gases</b>: Slowest (e.g., air &#8776; <b>343 m/s</b>) due to widely spaced molecules.</p><p>o <b>Vacuum</b>: <b>No sound</b> (sound requires a medium to propagate).</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which parameter increases when a sound source moves toward an observer?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2343;&#2381;&#2357;&#2344;&#2367; &#2360;&#2381;&#2352;&#2379;&#2340; &#2346;&#2352;&#2381;&#2351;&#2357;&#2375;&#2325;&#2381;&#2359;&#2325; &#2325;&#2368; &#2323;&#2352; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2376;&#2352;&#2366;&#2350;&#2368;&#2335;&#2352; &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Frequency</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Wavelength</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2357;&#2354;&#2375;&#2306;&#2341;</span>",
      "<span class=\"eqt\">Time period</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2351; &#2360;&#2368;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Amplitude</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2366;&#2350;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Doppler Effect</b>: When a sound source moves toward an observer:</p><p>o <b>Frequency increases</b> (higher pitch).</p><p>o <b>Wavelength decreases</b> (compressed waves).</p><p>o <b>Speed of sound</b> remains constant (depends only on the medium).</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following waves is NOT an example of an electromagnetic wave?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2340;&#2352;&#2306;&#2327; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2330;&#2369;&#2350;&#2381;&#2348;&#2325;&#2368;&#2351; &#2340;&#2352;&#2306;&#2327; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Radio waves</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2337;&#2367;&#2351;&#2379; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306;</span>",
      "<span class=\"eqt\">X-rays</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2381;&#2360;-&#2352;&#2375;</span>",
      "<span class=\"eqt\">Water waves</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2354;&#2361;&#2352;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Microwaves</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2357;&#2375;&#2357;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Radio waves</b>, <b>X-rays</b>, and <b>Microwaves</b> are all types of <b>electromagnetic (EM) waves</b>, which do <b>not require a medium</b> to propagate and can travel through a vacuum.</p><p><b>Water waves</b>, on the other hand, are <b>mechanical waves</b> that <b>require a medium (water)</b> to travel through and involve the actual movement of particles in the medium.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct?</p><p>I. Light waves can be polarized, but sound waves cannot.</p><p>II. The Doppler effect occurs due to the relative motion between a wave source and an observer.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2379; &#2343;&#2381;&#2352;&#2369;&#2357;&#2368;&#2325;&#2371;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2379; &#2344;&#2361;&#2368;&#2306;&#2404;</p><p>II. &#2337;&#2377;&#2346;&#2354;&#2352; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2340;&#2352;&#2306;&#2327; &#2360;&#2381;&#2352;&#2379;&#2340; &#2324;&#2352; &#2346;&#2352;&#2381;&#2351;&#2357;&#2375;&#2325;&#2381;&#2359;&#2325; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2366;&#2346;&#2375;&#2325;&#2381;&#2359; &#2327;&#2340;&#2367; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I is correct:</b> Light waves are <b>transverse electromagnetic waves</b>, which means their oscillations are perpendicular to the direction of propagation. This allows them to be <b>polarized</b>. Sound waves, however, are <b>longitudinal mechanical waves</b>, where particle vibrations occur along the direction of propagation, so <b>they cannot be polarized</b>.</p><p><b>Statement II is correct:</b> The <b>Doppler effect</b> refers to the change in frequency or wavelength of a wave as perceived by an observer moving relative to the source of the wave. It applies to <b>both sound and electromagnetic waves</b>.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following wave properties with their correct descriptions:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Property</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Description</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(A) Frequency</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(1) Distance between two successive crests/troughs</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(B) Amplitude</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(2) Number of oscillations per second</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(C) Wavelength</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(3) Maximum displacement from mean position</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(D) Time period</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(4) Time taken for one complete cycle</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2340;&#2352;&#2306;&#2327; &#2327;&#2369;&#2339;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2360;&#2361;&#2368; &#2357;&#2367;&#2357;&#2352;&#2339; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2327;&#2369;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2357;&#2367;&#2357;&#2352;&#2339;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(A) &#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(1) &#2342;&#2379; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2358;&#2367;&#2326;&#2352;&#2379;&#2306;/&#2327;&#2352;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(B) &#2310;&#2351;&#2366;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(2) &#2346;&#2381;&#2352;&#2340;&#2367; &#2360;&#2375;&#2325;&#2306;&#2337; &#2342;&#2379;&#2354;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(C) &#2340;&#2352;&#2306;&#2327;&#2342;&#2376;&#2352;&#2381;&#2328;&#2381;&#2351;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(3) &#2324;&#2360;&#2340; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2357;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(D) &#2360;&#2350;&#2351; &#2309;&#2357;&#2343;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(4) &#2319;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339; &#2330;&#2325;&#2381;&#2352; &#2350;&#2375;&#2306; &#2354;&#2327;&#2366; &#2360;&#2350;&#2351;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">A - 2, B - 3, C - 1, D - 4</span><span class=\"hqt\" style=\"display:none\">A - 2, B - 3, C - 1, D - 4</span>",
      "<span class=\"eqt\">A - 3, B - 2, C - 4, D - 1</span><span class=\"hqt\" style=\"display:none\">A - 3, B - 2, C - 4, D - 1</span>",
      "<span class=\"eqt\">A - 1, B - 4, C - 2, D - 3</span><span class=\"hqt\" style=\"display:none\">A - 1, B - 4, C - 2, D - 3</span>",
      "<span class=\"eqt\">A - 4, B - 1, C - 3, D - 2</span><span class=\"hqt\" style=\"display:none\">A - 4, B - 1, C - 3, D - 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Frequency</b> is the number of cycles or oscillations a wave completes in one second, measured in Hertz (Hz).</p><p>&#183; <b>Amplitude</b> is the maximum displacement of the particles from their mean position in a wave.</p><p>&#183; <b>Wavelength</b> is the distance between two consecutive crests or troughs in a transverse wave (or compressions/rarefactions in a longitudinal wave).</p><p>&#183; <b>Time period</b> is the time it takes to complete one full cycle of the wave.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Match the types of waves with their examples:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Wave Type</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Example</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(A) Longitudinal</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(1) Light waves</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(B) Transverse</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(2) Sound waves</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(C) Electromagnetic</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(3) Water waves</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(D) Mechanical</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(4) Seismic P-waves</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2340;&#2352;&#2306;&#2327; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2313;&#2342;&#2366;&#2361;&#2352;&#2339;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(A) &#2309;&#2344;&#2369;&#2342;&#2376;&#2352;&#2381;&#2343;&#2381;&#2351;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(1) &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(B) &#2309;&#2344;&#2369;&#2346;&#2381;&#2352;&#2360;&#2381;&#2341;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(2) &#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(C) &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340;&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(3) &#2332;&#2354; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(D) &#2351;&#2366;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(4) &#2349;&#2370;&#2325;&#2306;&#2346;&#2368;&#2351; P-&#2340;&#2352;&#2306;&#2327;&#2375;&#2306;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">A - 4, B - 3, C - 1, D - 2</span><span class=\"hqt\" style=\"display:none\">A - 4, B - 3, C - 1, D - 2</span>",
      "<span class=\"eqt\">A - 2, B - 1, C - 4, D - 3</span><span class=\"hqt\" style=\"display:none\">A - 2, B - 1, C - 4, D - 3</span>",
      "<span class=\"eqt\">A - 3, B - 4, C - 2, D - 1</span><span class=\"hqt\" style=\"display:none\">A - 3, B - 4, C - 2, D - 1</span>",
      "<span class=\"eqt\">A - 1, B - 2, C - 3, D - 4</span><span class=\"hqt\" style=\"display:none\">A - 1, B - 2, C - 3, D - 4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Longitudinal waves</b> involve particle motion parallel to wave direction. Example: <b>Seismic P-waves</b>.</p><p>&#183; <b>Transverse waves</b> involve particle motion perpendicular to wave direction. Example: <b>Water waves</b>.</p><p>&#183; <b>Electromagnetic waves</b> do not need a medium and include <b>light waves</b>.</p><p>&#183; <b>Mechanical waves</b> require a medium to travel through. Example: <b>Sound waves</b>.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>The bending of waves around obstacles is called: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2366;&#2343;&#2366;&#2323;&#2306; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2375; &#2350;&#2369;&#2337;&#2364;&#2344;&#2375; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;: </p></span>",
    "options": [
      "<span class=\"eqt\">Reflection</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348;</span>",
      "<span class=\"eqt\">Refraction</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Diffraction</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Polarization</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2352;&#2369;&#2357;&#2368;&#2325;&#2352;&#2339;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Diffraction</b>:</p><p>o Occurs when waves bend around obstacles or through openings.</p><p>o Example: Hearing sound around a corner or light spreading through a slit.</p><p>&#183; <b>Why not others?</b></p><p>Reflection: Waves bouncing off a surface (e.g., echo).</p><p>Refraction: Change in wave direction due to medium change (e.g., light bending in water).</p><p>Polarization: Restriction of wave oscillations to one plane (light waves only).</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>A tuning fork produces which type of wave in air?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2335;&#2381;&#2351;&#2370;&#2344;&#2367;&#2306;&#2327; &#2347;&#2377;&#2352;&#2381;&#2325; &#2361;&#2357;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2340;&#2352;&#2306;&#2327; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Longitudinal</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2342;&#2376;&#2352;&#2381;&#2343;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Transverse</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2337;&#2364;&#2366;</span>",
      "<span class=\"eqt\">Both longitudinal and transverse</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2342;&#2376;&#2352;&#2381;&#2343;&#2381;&#2351; &#2324;&#2352; &#2309;&#2344;&#2369;&#2346;&#2381;&#2352;&#2360;&#2381;&#2341; &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Tuning forks</b> create <b>sound waves</b> in air, which are <b>longitudinal waves</b>.</p><p>&#183; <b>Longitudinal waves</b>: Air molecules vibrate <b>parallel</b> to the direction of wave propagation, forming compressions and rarefactions.</p><p>&#183; When a tuning fork vibrates, it pushes air molecules, creating alternating high-pressure (compression) and low-pressure (rarefaction) regions that travel as sound.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following waves can travel in a vacuum?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2340; &#2350;&#2375;&#2306; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sound waves</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Water waves</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2354;&#2361;&#2352;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Radio waves</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2337;&#2367;&#2351;&#2379; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Seismic waves</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2325;&#2306;&#2346;&#2368;&#2351; &#2340;&#2352;&#2306;&#2327;&#2375;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Radio waves</b> are a type of <b>electromagnetic wave</b>, and electromagnetic waves <b>do not require a medium</b> to travel  -  they can propagate through a <b>vacuum</b> (such as space).</p><p>&#183; <b>Sound waves</b>, <b>water waves</b>, and <b>seismic waves</b> are <b>mechanical waves</b>, which <b>require a material medium</b> (like air, water, or earth) to propagate.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>The equation of a wave is given by y=Asin(&#969;t&#8722;kx). What does k represent?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2352;&#2306;&#2327; &#2325;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; y=Asin(&#969;t&#8722;kx) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; k &#2325;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Frequency</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Wave number</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2352;&#2306;&#2327; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Wave speed</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2352;&#2306;&#2327; &#2327;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Amplitude</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2366;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In the wave equation y=Asin(&#969;t&#8722;kx):</p><p>&#183; A is the <b>amplitude</b> of the wave (maximum displacement).</p><p>&#183; &#969; is the <b>angular frequency</b>, related to the frequency f by &#969;=2&#960;f.</p><p>&#183; k is the <b>wave number</b>, which tells us how many radians the wave oscillates per unit distance.</p><p>The <b>wave number k</b> is given by:</p><p>k=2&#960;/&#955;&#8203; </p><p>where &#955; is the <b>wavelength</b>.</p><p>So, <b>k </b>represents the <b>spatial frequency</b> of the wave  -  <b>how tightly the wave is \"packed\" in space</b>.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Which factor does NOT affect the speed of sound in a medium?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2366;&#2352;&#2325; &#2325;&#2367;&#2360;&#2368; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2350;&#2375;&#2306; &#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Temperature</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2346;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Pressure</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2348;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Medium's density</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2325;&#2366; &#2328;&#2344;&#2340;&#2381;&#2357;</span>",
      "<span class=\"eqt\">Color of medium</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2325;&#2366; &#2352;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The <b>speed of sound</b> in a medium depends on properties like:</p><p>&#183; <b>Temperature</b>: Higher temperatures generally increase the speed.</p><p>&#183; <b>Density</b>: Denser media can affect how fast sound travels.</p><p>&#183; <b>Pressure</b>: In gases, pressure (at constant temperature) doesn't change speed much, but combined with temperature, it has an effect.</p><p>However, the <b>color of the medium</b> is <b>not a physical property</b> that affects sound propagation. It's related to how the medium interacts with light, not sound.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Which phenomenon explains why a person at a distance hears sound even when a barrier is in place?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2328;&#2335;&#2344;&#2366; &#2351;&#2361; &#2348;&#2340;&#2366;&#2340;&#2368; &#2361;&#2376; &#2325;&#2367; &#2325;&#2381;&#2351;&#2379;&#2306; &#2342;&#2370;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2309;&#2357;&#2352;&#2379;&#2343; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2349;&#2368; &#2343;&#2381;&#2357;&#2344;&#2367; &#2360;&#2369;&#2344;&#2366;&#2312; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Reflection</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348;</span>",
      "<span class=\"eqt\">Refraction</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Diffraction</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Absorption</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2358;&#2379;&#2359;&#2339;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Diffraction</b> is the bending of waves around obstacles or the spreading of waves through openings.</p><p>&#183; This allows <b>sound waves</b> to bend around barriers and still reach a person even when there's no direct line of sight.</p><p>&#183; <b>Reflection</b> is the bouncing back of waves.</p><p>&#183; <b>Refraction</b> is the change in direction due to a change in medium.</p><p>&#183; <b>Absorption</b> involves energy loss as sound is absorbed by a material.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>The relation between velocity (v), frequency (f), and wavelength (&#955;\\lambda) of a wave is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2340;&#2352;&#2306;&#2327; &#2325;&#2375; &#2357;&#2375;&#2327; (v), &#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; (f) &#2324;&#2352; &#2340;&#2352;&#2306;&#2327;&#2342;&#2376;&#2352;&#2381;&#2328;&#2381;&#2351; (&#955;\\lambda) &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2348;&#2306;&#2343; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">v=f&#955;</span><span class=\"hqt\" style=\"display:none\">v=f&#955;</span>",
      "<span class=\"eqt\">v=f/&#955;</span><span class=\"hqt\" style=\"display:none\">v=f/&#955;</span>",
      "<span class=\"eqt\">v=f<sup>2</sup>&#955;</span><span class=\"hqt\" style=\"display:none\">v=f<sup>2</sup>&#955;</span>",

    "solution": "<p><b>The relation between velocity (v), frequency (f), and wavelength (&#955;) of a wave is:</b></p><p>v=f&#955;</p><p><b>Explanation:</b></p><p>&#183; v = <b>wave velocity</b> (how fast the wave travels)</p><p>&#183; f = <b>frequency</b> (number of oscillations per second)</p><p>&#183; &#955; = <b>wavelength</b> (distance between two successive crests or troughs)</p><p>This formula shows that the speed of a wave is directly proportional to both its frequency and its wavelength.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>When two waves of the same frequency and amplitude interfere constructively, the resultant amplitude is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2360;&#2350;&#2366;&#2344; &#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2324;&#2352; &#2310;&#2351;&#2366;&#2350; &#2325;&#2368; &#2342;&#2379; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306; &#2352;&#2330;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2361;&#2360;&#2381;&#2340;&#2325;&#2381;&#2359;&#2375;&#2346; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2368; &#2310;&#2351;&#2366;&#2350; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;:</p></span>",

      "<span class=\"eqt\">Zero</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2370;&#2344;&#2381;&#2351;</span>",

      "<span class=\"eqt\">Difference of both amplitudes</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2310;&#2351;&#2366;&#2350;&#2379;&#2306; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352;</span>",

    "solution": "<p>&#183; <b>Constructive interference</b> occurs when two waves meet <b>in phase</b> (i.e., their crests and troughs align).</p><p>&#183; When the waves have the <b>same frequency and amplitude</b>, their amplitudes <b>add up</b> at every point.</p><p>&#183; So, if each wave has amplitude AAA, the resultant wave will have amplitude A+A=2A.</p>",
