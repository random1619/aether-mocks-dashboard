<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following Vedas is considered the earliest and contains 1028 hymns?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2375;&#2342; &#2360;&#2348;&#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2350;&#2375;&#2306; 1028 &#2349;&#2332;&#2344; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sama Veda</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2350;&#2357;&#2375;&#2342;</span>",
      "<span class=\"eqt\">Yajur Veda</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2332;&#2369;&#2352;&#2381;&#2357;&#2375;&#2342;</span>",
      "<span class=\"eqt\">Rig Veda</span><span class=\"hqt\" style=\"display:none\">&#2315;&#2327;&#2381;&#2357;&#2375;&#2342;</span>",
      "<span class=\"eqt\">Atharva Veda</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2341;&#2352;&#2381;&#2357;&#2357;&#2375;&#2342;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Rig Veda is the oldest among the four Vedas and consists of 1028 hymns.</p><p>&bull; Sama Veda is the book of chants, set to tune for sacrifices.</p><p>&bull; Yajur Veda details sacrificial rituals.</p><p>&bull; Atharva Veda contains details of rituals and charms.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not classified under Shruti literature?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2358;&#2381;&#2352;&#2369;&#2340;&#2367; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Upanishads</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2344;&#2367;&#2359;&#2342;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Aranyakas</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2339;&#2381;&#2351;&#2325;</span>",
      "<span class=\"eqt\">Puranas</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2352;&#2366;&#2339;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Brahmanas</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2366;&#2361;&#2381;&#2350;&#2339;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Puranas are categorized under Smriti literature.</p><p>&bull; Shruti literature includes Vedas, Brahmanas, Aranyakas, and Upanishads.</p><p>&bull; Smriti literature includes Puranas, Vedanga, and Itihasa.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The Jataka tales are associated with which religion?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2366;&#2340;&#2325; &#2325;&#2341;&#2366;&#2319;&#2305; &#2325;&#2367;&#2360; &#2343;&#2352;&#2381;&#2350; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Jainism</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2376;&#2344; &#2343;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Buddhism</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2342;&#2381;&#2343; &#2343;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Hinduism</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2344;&#2381;&#2342;&#2370; &#2343;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Sikhism</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2326; &#2343;&#2352;&#2381;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Jataka tales are Buddhist folklore narrating previous lives of Buddha.</p><p>&bull; Jainism uses Prakrit literature, with texts like Agamas.</p><p>&bull; Hinduism has Puranas and epics like Ramayana and Mahabharata.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following is the earliest known playwright of Sanskrit drama?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340; &#2344;&#2366;&#2335;&#2325; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2346;&#2361;&#2354;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2344;&#2366;&#2335;&#2325;&#2325;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kalidasa</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2354;&#2367;&#2342;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Bhasa</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2360;&#2366;</span>",
      "<span class=\"eqt\">Sudraka</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2370;&#2342;&#2381;&#2352;&#2325;</span>",
      "<span class=\"eqt\">Visakhadatta</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2366;&#2326;&#2342;&#2340;&#2381;&#2340;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Bhasa is the earliest known playwright and is known for writing 13 plays, including \"Svapnavasavadatta,\" \"Pratijnayaugandharayana,\" and \"Urubhanga, etc..</p><p>&bull; Kalidasa wrote plays like Abhijnanasakuntalam.</p><p>&bull; Sudraka authored Mrichhakatika.</p><p>&bull; Visakhadatta wrote Mudrarakshasa.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The 'Tirukkural' is part of which category of literature?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2340;&#2367;&#2352;&#2369;&#2325;&#2381;&#2325;&#2369;&#2352;&#2354;' &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351; &#2325;&#2368; &#2325;&#2367;&#2360; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sanskrit epics</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340; &#2350;&#2361;&#2366;&#2325;&#2366;&#2357;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Buddhist scriptures</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2380;&#2342;&#2381;&#2343; &#2343;&#2352;&#2381;&#2350;&#2327;&#2381;&#2352;&#2306;&#2341;</span>",
      "<span class=\"eqt\">Sangam literature</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2327;&#2350; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Jain Agamas</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2376;&#2344; &#2310;&#2327;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Tirukkural is a Tamil ethical text from Sangam literature, written by Thriuvalluvar.</p><p>&bull; Sanskrit epics include Ramayana and Mahabharata.</p><p>&bull; Buddhist scriptures include Tripitaka.</p><p>&bull; Jain Agamas are Prakrit texts.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which Tamil epic narrates the story of Kovalan and Kannagi?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2340;&#2350;&#2367;&#2354; &#2350;&#2361;&#2366;&#2325;&#2366;&#2357;&#2381;&#2351; &#2325;&#2379;&#2357;&#2354;&#2344; &#2324;&#2352; &#2325;&#2344;&#2381;&#2344;&#2327;&#2368; &#2325;&#2368; &#2325;&#2361;&#2366;&#2344;&#2368; &#2348;&#2340;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tirukkural</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2367;&#2352;&#2369;&#2325;&#2381;&#2325;&#2369;&#2352;&#2354;</span>",
      "<span class=\"eqt\">Sivaga-Sindamani</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2357;&#2366;&#2327;&#2366;-&#2360;&#2367;&#2306;&#2342;&#2366;&#2350;&#2339;&#2367;</span>",
      "<span class=\"eqt\">Silappadikaram</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2354;&#2346;&#2381;&#2346;&#2366;&#2342;&#2367;&#2325;&#2366;&#2352;&#2350;</span>",
      "<span class=\"eqt\">Tirukkural</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2367;&#2352;&#2369;&#2325;&#2381;&#2325;&#2369;&#2352;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Silappadikaram narrates the tragic tale of Kovalan, a merchant, and his wife Kannagi, who is known for her virtue and righteousness..</p><p>&bull; Manimegalai is its sequel.</p><p>&bull; Sivaga-Sindamani is a Jain epic.</p><p>&bull; Tirukkural is a moralistic work.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>'Astadhyayi' is a treatise on which subject?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2309;&#2359;&#2381;&#2335;&#2366;&#2343;&#2381;&#2351;&#2366;&#2351;&#2368;' &#2325;&#2367;&#2360; &#2357;&#2367;&#2359;&#2351; &#2346;&#2352; &#2327;&#2381;&#2352;&#2306;&#2341; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Astronomy</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2327;&#2379;&#2354;</span>",
      "<span class=\"eqt\">Mathematics</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2325; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Grammar</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2351;&#2366;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Medicine</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2357;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Astadhyayi, written by Panini, is a Sanskrit grammar treatise.</p><p>&bull; Aryabhata worked on astronomy and mathematics.</p><p>&bull; Sushruta Samhita deals with medicine.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The 'Natyashastra' is attributed to which author?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2344;&#2366;&#2335;&#2381;&#2351;&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;' &#2325;&#2366; &#2358;&#2381;&#2352;&#2375;&#2351; &#2325;&#2367;&#2360; &#2354;&#2375;&#2326;&#2325; &#2325;&#2379; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bhasa</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2360;&#2366;</span>",
      "<span class=\"eqt\">Kalidasa</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2354;&#2367;&#2342;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Bharata</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;</span>",
      "<span class=\"eqt\">Bana bhatt</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2344;&#2366; &#2349;&#2335;&#2381;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The Natyashastra, a seminal treatise on performing arts, is traditionally attributed to the ancient Indian sage and priest, Bharata Muni.</p><p>&bull; Kalidasa wrote Abhijnanasakuntalam.</p><p>&bull; Bhasa was an early playwright.</p><p>&bull; Bana Bhatt wrote Harshacharita.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which text is considered the earliest surviving example of Sanskrit courtly prose?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2327;&#2381;&#2352;&#2344;&#2381;&#2341; &#2325;&#2379; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340; &#2342;&#2352;&#2348;&#2366;&#2352;&#2368; &#2327;&#2342;&#2381;&#2351; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2346;&#2369;&#2352;&#2366;&#2344;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Panchatantra</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2330;&#2340;&#2306;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Girnar Inscription of Rudradaman</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;&#2342;&#2381;&#2352;&#2342;&#2366;&#2350;&#2344; &#2325;&#2366; &#2327;&#2367;&#2352;&#2344;&#2366;&#2352; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326;</span>",
      "<span class=\"eqt\">Dasakumaracarita</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2358;&#2325;&#2369;&#2350;&#2366;&#2352;&#2330;&#2352;&#2367;&#2340;</span>",
      "<span class=\"eqt\">Vasavadatta</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2360;&#2357;&#2342;&#2340;&#2381;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Girnar Inscription also known as Junagadh rock inscription of Rudradaman (CE 150) is the earliest known Sanskrit courtly prose in Brahmi Script.</p><p>&bull; Panchatantra is a collection of fables.</p><p>&bull; Dasakumaracarita is a prose narrative.</p><p>&bull; Vasavadatta is a romantic story.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>'Buddhacharita' was composed by whom?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2348;&#2369;&#2342;&#2381;&#2343;&#2330;&#2352;&#2367;&#2340;' &#2325;&#2368; &#2352;&#2330;&#2344;&#2366; &#2325;&#2367;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ashvaghosa</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2358;&#2381;&#2357;&#2328;&#2379;&#2359;</span>",
      "<span class=\"eqt\">Sudraka</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2370;&#2342;&#2381;&#2352;&#2325;</span>",
      "<span class=\"eqt\">Kalidasa</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2354;&#2367;&#2342;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Bana</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Buddhacharita, a biography of Buddha, was written by Ashvaghosa.</p><p>&bull; Sudraka authored Mrichhakatika.</p><p>&bull; Kalidasa was a dramatist.</p><p>&bull; Bana Bhatt wrote Harshacharita.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which ancient text is considered the earliest known legal code in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2327;&#2381;&#2352;&#2344;&#2381;&#2341; &#2325;&#2379; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2346;&#2369;&#2352;&#2366;&#2344;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2357;&#2367;&#2343;&#2367; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Manusmriti</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2344;&#2369;&#2360;&#2381;&#2350;&#2371;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Arthashastra</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2381;&#2341;&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Dharma Sutras</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2352;&#2381;&#2350; &#2360;&#2370;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Yajnavalkya Smriti</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2366;&#2332;&#2381;&#2334;&#2357;&#2354;&#2381;&#2325;&#2381;&#2351; &#2360;&#2381;&#2350;&#2371;&#2340;&#2367;</span>"
