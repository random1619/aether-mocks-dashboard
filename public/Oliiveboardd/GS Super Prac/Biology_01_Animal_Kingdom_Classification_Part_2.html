<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">

                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->

                <!-- Controls -->

                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a characteristic feature of the Animal Kingdom?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2346;&#2358;&#2369; &#2332;&#2327;&#2340; &#2325;&#2368; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Heterotrophic nutrition</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2359;&#2350;&#2346;&#2379;&#2359;&#2368; &#2346;&#2379;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Presence of cell wall made of cellulose</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2354;&#2381;&#2351;&#2370;&#2354;&#2379;&#2332;&#2364; &#2360;&#2375; &#2348;&#2344;&#2368; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2349;&#2367;&#2340;&#2381;&#2340;&#2367; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Multicellular organization</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2369;&#2325;&#2379;&#2358;&#2367;&#2325;&#2368;&#2351; &#2360;&#2306;&#2327;&#2336;&#2344;</span>",
      "<span class=\"eqt\">Ability to move</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2354;&#2344;&#2375; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Animals do not have cell walls made of cellulose (this is a plant characteristic). Other options reflect true characteristics of animals:</p><p>&#183; Heterotrophic nutrition: Animals cannot produce their own food and must consume other organisms.</p><p>&#183; Multicellular organization: Animals are made up of many specialized cells.</p><p>&#183; Ability to move: Most animals can move actively at some stage in their life cycle.</p><p><b>Further Insight:</b></p><p>Characteristic Features of the Animal Kingdom:</p><p>&#9675; Animals are eukaryotic and multicellular organisms</p><p>&#9675; Animal cells lack cell walls</p><p>&#9675; Animals are heterotrophic, obtaining nutrients by consuming other organisms</p><p>&#9675; Most animals show specialized tissue organization</p><p>&#9675; Animals exhibit various levels of body symmetry (radial or bilateral)</p><p>&#9675; Most animals can move actively at some stage in their life</p><p>&#9675; Animals reproduce sexually, with distinct male and female gametes</p><p>&#9675; Most animals show advanced organ systems for various functions</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which phylum is characterized by the presence of nematocysts and radial symmetry?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2306;&#2328; &#2344;&#2367;&#2350;&#2376;&#2335;&#2379;&#2360;&#2367;&#2360;&#2381;&#2335; &#2324;&#2352; &#2352;&#2375;&#2337;&#2367;&#2351;&#2354; &#2360;&#2350;&#2352;&#2370;&#2346;&#2340;&#2366; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2360;&#2375; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Platyhelminthes</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2375;&#2335;&#2367;&#2361;&#2375;&#2354;&#2381;&#2350;&#2367;&#2306;&#2341;&#2375;&#2360;</span>",
      "<span class=\"eqt\">Cnidaria</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2337;&#2366;&#2352;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Annelida</span><span class=\"hqt\" style=\"display:none\">&#2320;&#2344;&#2375;&#2354;&#2367;&#2337;&#2366;</span>",
      "<span class=\"eqt\">Arthropoda</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2381;&#2352;&#2379;&#2346;&#2379;&#2337;&#2364;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Cnidarians</b> (phylum <b>Cnidaria</b>) are characterized by:</p><p>&#183; <b>Nematocysts</b>: Specialized stinging cells used for defense and capturing prey.</p><p>&#183; <b>Radial symmetry</b>: Their body parts are arranged symmetrically around a central axis.</p><p>Further insights:</p><p>&#183; <b>Platyhelminthes (Flatworms)</b>  -  Bilateral symmetry, no nematocysts.</p><p>&#183; <b>Annelida (Segmented worms)</b>  -  Bilateral symmetry, no nematocysts.</p><p>&#183; <b>Arthropoda (Insects, Crustaceans, etc.)</b>  -  Bilateral symmetry, no nematocysts.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What distinguishes chordates from other animal phyla?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2377;&#2352;&#2381;&#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2309;&#2344;&#2381;&#2351; &#2332;&#2344;&#2381;&#2340;&#2369; &#2360;&#2306;&#2328;&#2379;&#2306; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2309;&#2354;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Presence of a coelom</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2311;&#2354;&#2379;&#2350; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Bilateral symmetry</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2346;&#2325;&#2381;&#2359;&#2368;&#2351; &#2360;&#2350;&#2352;&#2370;&#2346;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Notochord during development</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2344;&#2379;&#2335;&#2379;&#2325;&#2377;&#2352;&#2381;&#2337;</span>",
      "<span class=\"eqt\">Segmented body</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2306;&#2337;&#2367;&#2340; &#2358;&#2352;&#2368;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Chordates are distinguished from other animal phyla by the presence of a <b>notochord</b> at some stage of their development.</p><p>&#183; <b>Notochord:</b> A flexible rod-like structure that provides support in embryonic stages and is replaced by a vertebral column in most vertebrates.</p><p>&#183; <b>Presence of a coelom :</b> Many other phyla, such as Annelida, Arthropoda, and Mollusca, also have a coelom, so this is not a unique feature of Chordates.</p><p>&#183; <b>Bilateral symmetry :</b> Bilateral symmetry is found in many other phyla, such as Arthropoda, Mollusca, and Annelida.</p><p>&#183; <b>Segmented body :</b> While some chordates exhibit segmentation (e.g., vertebrae in vertebrates), segmentation is more characteristic of phyla like Annelida and Arthropoda.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following animals belongs to the class Mammalia but lays eggs?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2332;&#2366;&#2344;&#2357;&#2352; &#2360;&#2381;&#2340;&#2344;&#2343;&#2366;&#2352;&#2368; &#2357;&#2352;&#2381;&#2327; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2309;&#2306;&#2337;&#2375; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kangaroo</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2327;&#2375;&#2352;&#2370;</span>",
      "<span class=\"eqt\">Platypus</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2348;&#2340;&#2381;&#2340;&#2325;-&#2360;&#2342;&#2371;&#2358; &#2344;&#2366;&#2325; &#2360;&#2375; &#2346;&#2358;&#2369;</span>",
      "<span class=\"eqt\">Dolphin</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2377;&#2354;&#2381;&#2347;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Bat</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2354;&#2381;&#2354;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>Platypus</b> belongs to the class <b>Mammalia</b> but is an <b>egg-laying mammal (monotreme)</b>.</p><p>&#183; <b>Monotremes</b> are a unique group of mammals that lay eggs instead of giving birth to live young.</p><p>&#183; The only living monotremes are <b>platypus</b> and <b>echidnas (spiny anteaters)</b>, both found in Australia and New Guinea.</p><p>&#183; Even though they lay eggs, they still possess mammalian characteristics such as <b>producing milk</b> and having <b>fur</b>.</p><p>Further insights:</p><p>&#183; Kangaroo: Marsupial mammal that gives birth to underdeveloped young</p><p>&#183; Dolphin: Aquatic mammal that gives birth to live young</p><p>&#183; Bat: Flying mammal that gives birth to live young</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Match the animal group with its respiratory organ:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column A (Group)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column B(Organ)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Fish</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.Lungs</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.Insects</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Gills</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Birds</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Trachea</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Amphibians</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Both lungs and skin</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2358;&#2369; &#2360;&#2350;&#2370;&#2361; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2358;&#2381;&#2357;&#2360;&#2344; &#2309;&#2306;&#2327; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A (&#2360;&#2350;&#2370;&#2361;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B (&#2309;&#2306;&#2327;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2350;&#2331;&#2354;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a.&#2347;&#2375;&#2347;&#2337;&#2364;&#2375;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.&#2325;&#2368;&#2335;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2327;&#2354;&#2347;&#2337;&#2364;&#2375;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2346;&#2325;&#2381;&#2359;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2358;&#2381;&#2357;&#2366;&#2360;&#2344;&#2354;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2313;&#2349;&#2351;&#2330;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2347;&#2375;&#2347;&#2337;&#2364;&#2375; &#2324;&#2352; &#2340;&#2381;&#2357;&#2330;&#2366; &#2342;&#2379;&#2344;&#2379;&#2306;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i &rarr; a, ii &rarr; b, iii &rarr; c, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; b, iii &rarr; c, iv &rarr; d</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; a, iii &rarr; d, iv &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; a, iii &rarr; d, iv &rarr; c</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; c, iii &rarr; a, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; c, iii &rarr; a, iv &rarr; d</span>",
      "<span class=\"eqt\">i &rarr; b, ii &rarr; d, iii &rarr; a, iv &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; b, ii &rarr; d, iii &rarr; a, iv &rarr; c</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Fish </b><b>&rarr;</b><b> Gills (b):</b></p><p>&#183; Fish use gills to extract oxygen from water.</p><p>&#183; Water passes over the gills, and oxygen diffuses into the bloodstream.</p><p><b>Insects </b><b>&rarr;</b><b> Trachea (c):</b></p><p>&#183; Insects breathe through a system of <b>tracheae</b> and <b>spiracles</b>.</p><p>&#183; Air enters through spiracles and travels through tracheal tubes directly to tissues.</p><p><b>Birds </b><b>&rarr;</b><b> Lungs (a):</b></p><p>&#183; Birds have highly efficient lungs with <b>air sacs</b> that ensure a continuous flow of oxygen, essential for flight.</p><p><b>Amphibians </b><b>&rarr;</b><b> Both lungs and skin (d):</b></p><p>&#183; Amphibians (e.g., frogs, salamanders) use <b>lungs</b> for breathing on land.</p><p>&#183; They also perform <b>cutaneous respiration (skin breathing)</b> in moist environments or underwater.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which group of animals first developed a complete digestive system with two openings?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2332;&#2344;&#2381;&#2340;&#2369; &#2360;&#2350;&#2370;&#2361; &#2344;&#2375; &#2360;&#2348;&#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2342;&#2379; &#2331;&#2367;&#2342;&#2381;&#2352;&#2379;&#2306; &#2357;&#2366;&#2354;&#2366; &#2346;&#2370;&#2352;&#2381;&#2339; &#2346;&#2366;&#2330;&#2344; &#2340;&#2306;&#2340;&#2381;&#2352; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Platyhelminthes</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2375;&#2335;&#2367;&#2361;&#2375;&#2354;&#2381;&#2350;&#2367;&#2306;&#2341;&#2375;&#2360;</span>",
      "<span class=\"eqt\">Nematoda</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2375;&#2335;&#2379;&#2337;&#2366;</span>",
      "<span class=\"eqt\">Cnidaria</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2337;&#2366;&#2352;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Porifera</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2352;&#2367;&#2347;&#2375;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Platyhelminthes (Flatworms):</b> Have an <b>incomplete digestive system</b> with only <b>one opening</b> (mouth), meaning food enters and waste exits through the same opening.</p><p>&#183; <b>Nematoda (Roundworms): First group to develop a complete digestive system</b> with <b>two openings</b> (a separate mouth and anus), allowing for <b>efficient digestion and nutrient absorption</b>.</p><p>&#183; <b>Cnidaria (Jellyfish, Corals, Sea Anemones):</b> Have a <b>gastrovascular cavity</b> with a <b>single opening</b>, functioning as both mouth and anus.</p><p>&#183; <b>Porifera (Sponges): Lack a digestive system</b>; they use filter feeding to extract nutrients.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Assertion (A): All vertebrates are chordates. Reason </p><p>(R): Vertebrates possess a vertebral column which replaces the notochord.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2360;&#2349;&#2368; &#2325;&#2358;&#2375;&#2352;&#2369;&#2325;&#2368; &#2325;&#2377;&#2352;&#2381;&#2337;&#2375;&#2335; &#2361;&#2376;&#2306;&#2404; &#2325;&#2366;&#2352;&#2339;</p><p>(R): &#2325;&#2358;&#2375;&#2352;&#2369;&#2325;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2358;&#2375;&#2352;&#2369;&#2325;&#2366; &#2360;&#2381;&#2340;&#2306;&#2349; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2344;&#2379;&#2335;&#2379;&#2325;&#2377;&#2352;&#2381;&#2337; &#2325;&#2368; &#2332;&#2327;&#2361; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2340;&#2341;&#2366; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true but R is false.</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false but R is true.</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Vertebrates belong to the phylum <b>Chordata</b> and share key chordate features such as a <b>notochord, dorsal nerve cord, pharyngeal slits, and post-anal tail</b> at some stage of life.</p><p>&#183; In vertebrates, the <b>notochord is present during embryonic development but gets replaced by a vertebral column (backbone)</b> in adults.</p><p>&#183; This structural change provides <b>better support and protection for the spinal cord</b>.</p>",
    "question_index": 6
  },

;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2330;&#2350;&#2327;&#2366;&#2342;&#2337;&#2364;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2319;&#2357;&#2375;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2325;&#2331;&#2369;&#2310;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2360;&#2352;&#2368;&#2360;&#2371;&#2346;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2346;&#2375;&#2306;&#2327;&#2369;&#2311;&#2344;</td></tr></table></span>",

    "correct_option_id": 1,
    "solution": "<p><b>Mammalia </b><b>&rarr;</b><b> Bat</b></p><p>&#183; Mammals are warm-blooded vertebrates with hair or fur and mammary glands.</p><p>&#183; <b>Bats</b> are the only flying mammals.</p><p><b>Amphibia </b><b>&rarr;</b><b> Salamander</b></p><p>&#183; Amphibians can live both on land and in water.</p><p>&#183; <b>Salamanders</b> are amphibians with moist skin and the ability to breathe through their skin.</p><p><b>Aves </b><b>&rarr;</b><b> Penguin</b></p><p>&#183; Birds (Aves) have feathers, beaks, and lay eggs.</p><p>&#183; <b>Penguins</b> are flightless birds adapted to swimming.</p><p><b>Reptilia </b><b>&rarr;</b><b> Turtle</b></p><p>&#183; Reptiles have scales and lay amniotic eggs.</p><p>&#183; <b>Turtles</b> are reptiles with a bony shell for protection.</p>",

    "question": "<span class=\"eqt\"><p>What type of symmetry is found in adult echinoderms?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2351;&#2360;&#2381;&#2325; &#2311;&#2325;&#2366;&#2311;&#2344;&#2379;&#2337;&#2352;&#2381;&#2350; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2360;&#2350;&#2352;&#2370;&#2346;&#2340;&#2366; &#2346;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bilateral symmetry</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2346;&#2325;&#2381;&#2359;&#2368;&#2351; &#2360;&#2350;&#2352;&#2370;&#2346;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Pentaradial symmetry</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2306;&#2335;&#2366;&#2352;&#2375;&#2337;&#2367;&#2351;&#2354; &#2360;&#2350;&#2352;&#2370;&#2346;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Asymmetry</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2359;&#2350;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Biradial symmetry</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2352;&#2375;&#2337;&#2367;&#2351;&#2354; &#2360;&#2350;&#2352;&#2370;&#2346;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Adult echinoderms</b> (e.g., starfish, sea urchins, sea cucumbers) exhibit <b>pentaradial symmetry</b>, meaning their body is arranged in <b>five or multiples of five radial sections</b> around a central axis.</p><p>&#183; <b>However, their larvae exhibit bilateral symmetry</b>, which later transforms into pentaradial symmetry as they develop into adults.</p>",
    "question_index": 8
  },

    "question": "<span class=\"eqt\"><p>Which of the following is NOT a characteristic of chordates?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2325;&#2377;&#2352;&#2381;&#2337;&#2375;&#2335;&#2381;&#2360; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Dorsal hollow nerve cord</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2326;&#2379;&#2326;&#2354;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2337;&#2379;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Ventral heart</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2352; &#2361;&#2371;&#2342;&#2351;</span>",
      "<span class=\"eqt\">Ventral nerve cord</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2379; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2352;&#2332;&#2381;&#2332;&#2369;</span>",
      "<span class=\"eqt\">Post-anal tail</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2342;&#2366;-&#2346;&#2358;&#2381;&#2330;&#2366;&#2340; &#2346;&#2370;&#2306;&#2331;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Chordates have a dorsal nerve cord, not a ventral one (which is found in annelids and arthropods)</p><p>Chordates are distinguished by the following key characteristics at some stage of their development:</p><p>&#183; <b>Dorsal hollow nerve cord</b>  -  This is a defining feature of chordates, running along the back (dorsal side) of the body.</p><p>&#183; <b>Ventral heart</b>  -  Unlike invertebrates, chordates have a heart located on the ventral (lower) side.</p><p>&#183; <b>Post-anal tail</b>  -  Chordates possess a tail that extends beyond the anus, though it may be reduced in some adult forms.</p><p>&#183; <b>Notochord</b> (not mentioned in the options but a defining characteristic)  -  A flexible, rod-like structure present during development</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following best describes the circulatory system of insects?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2368;&#2335;&#2379;&#2306; &#2325;&#2368; &#2346;&#2352;&#2367;&#2360;&#2306;&#2330;&#2352;&#2339; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Closed with four-chambered heart</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352; &#2325;&#2325;&#2381;&#2359;&#2368;&#2351; &#2361;&#2371;&#2342;&#2351; &#2360;&#2375; &#2348;&#2306;&#2342;</span>",
      "<span class=\"eqt\">Open with hemolymph</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2350;&#2379;&#2354;&#2367;&#2350;&#2381;&#2347; &#2325;&#2375; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Closed with two-chambered heart</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2325;&#2325;&#2381;&#2359;&#2368;&#2351; &#2361;&#2371;&#2342;&#2351; &#2360;&#2375; &#2348;&#2306;&#2342;</span>",
      "<span class=\"eqt\">No circulatory system</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2346;&#2352;&#2367;&#2360;&#2306;&#2330;&#2352;&#2339; &#2340;&#2306;&#2340;&#2381;&#2352; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Insects belong to <b>Phylum Arthropoda</b> and have an <b>open circulatory system</b>.</p><p>&#183; Their blood (called <b>hemolymph</b>) <b>does not circulate through blood vessels</b> but is instead pumped by a <b>dorsal tubular heart</b> into open spaces called <b>sinuses</b> in the body cavity.</p><p>&#183; The hemolymph directly bathes organs and tissues, facilitating nutrient and gas exchange.</p><p>Further insights:</p><p>&bull; Four-chambered heart: Found in birds and mammals</p><p>&bull; Two-chambered heart: Found in fish</p><p>&bull; All insects have a circulatory system</p>",
    "question_index": 10
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements is INCORRECT about Phylum Aschelminthes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2366;&#2311;&#2354;&#2350; &#2319;&#2358;&#2375;&#2354;&#2350;&#2367;&#2344;&#2381;&#2341;&#2375;&#2360; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">They are pseudocoelomate animals.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2360;&#2381;&#2351;&#2370;&#2337;&#2379;&#2360;&#2368;&#2354;&#2379;&#2350;&#2375;&#2335; &#2346;&#2381;&#2352;&#2366;&#2339;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They have an incomplete alimentary canal.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2325;&#2368; &#2310;&#2361;&#2366;&#2352; &#2344;&#2354;&#2368; &#2309;&#2343;&#2370;&#2352;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Sexes are usually separate.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2367;&#2306;&#2327; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Their body is circular in cross-section.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2325;&#2366; &#2358;&#2352;&#2368;&#2352; &#2309;&#2344;&#2369;&#2346;&#2381;&#2352;&#2360;&#2381;&#2341; &#2325;&#2366;&#2335; &#2350;&#2375;&#2306; &#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Phylum Aschelminthes (commonly referred to as <b>Nematoda</b>) has the following characteristics:</p><p>&#183; <b>Pseudocoelomate:</b> They possess a <b>false coelom</b> (pseudocoelom), meaning their body cavity is not fully lined with mesoderm. <i>(Correct - Option 1)</i></p><p>&#183; <b>Complete Alimentary Canal:</b> Unlike Platyhelminthes, which have an incomplete digestive system, <b>nematodes have a complete digestive system with both a mouth and an anus</b>. <i>(Incorrect - Option 2)</i></p><p>&#183; <b>Dioecious (Sexes Separate):</b> Most nematodes are <b>sexually dimorphic</b>, meaning male and female individuals are separate. <i>(Correct - Option 3)</i></p><p>&#183; <b>Cylindrical Body Shape:</b> Their body is elongated and circular in cross-section, which is a defining characteristic. <i>(Correct - Option 4)</i></p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following represents the most primitive form of circulation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2346;&#2352;&#2367;&#2360;&#2306;&#2330;&#2352;&#2339; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2310;&#2342;&#2367;&#2350; &#2352;&#2370;&#2346; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Closed circulatory system</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2342; &#2346;&#2352;&#2367;&#2360;&#2306;&#2330;&#2352;&#2339; &#2340;&#2306;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Open circulatory system</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2369;&#2354;&#2366; &#2346;&#2352;&#2367;&#2360;&#2306;&#2330;&#2352;&#2339; &#2340;&#2306;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Gastrovascular cavity</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2360;&#2381;&#2335;&#2381;&#2352;&#2379;&#2357;&#2366;&#2360;&#2381;&#2325;&#2369;&#2354;&#2352; &#2325;&#2376;&#2357;&#2367;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Diffusion through body surface</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2352;&#2368;&#2352; &#2325;&#2368; &#2360;&#2340;&#2361; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most primitive form of circulation occurs in <b>simple organisms that lack specialized circulatory systems</b>. Instead, they rely on <b>diffusion</b> for the exchange of gases, nutrients, and waste.</p><p>It is found in simple animals like <b>Porifera (sponges), Cnidaria (jellyfish, hydra), and Platyhelminthes (flatworms)</b>.</p><p>Further insights:</p><p>&#183; Gastrovascular cavity: Found in cnidarians</p><p>&#183; Open circulatory system: Found in arthropods and some mollusks</p><p>&#183; Closed circulatory system: Found in annelids, vertebrates</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following groups are exclusively marine?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2350;&#2370;&#2361; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Amphibia</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;&#2381;&#2347;&#2367;&#2348;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Reptilia</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2368;&#2360;&#2371;&#2346;</span>",
      "<span class=\"eqt\">Cyclostomata</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2311;&#2325;&#2381;&#2354;&#2379;&#2360;&#2381;&#2335;&#2379;&#2350;&#2375;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Aves</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2357;&#2367;&#2360;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Cyclostomata is the only group in the given options that is <b>exclusively marine</b>.</p><p><b>Amphibia</b> <i>(Incorrect - Option 1)</i></p><p>&#183; Amphibians (frogs, salamanders) <b>live in both aquatic and terrestrial habitats</b>.</p><p>&#183; They require water for reproduction, but they are <b>not exclusively marine</b>.</p><p><b>Reptilia</b> <i>(Incorrect - Option 2)</i></p><p>&#183; Includes turtles, snakes, crocodiles, and lizards.</p><p>&#183; Some reptiles (like sea turtles) are marine, but many others are terrestrial.</p><p>&#183; Since <b>not all reptiles are marine</b>, this option is incorrect.</p><p><b>Cyclostomata</b> <i>(Correct - Option 3)</i></p><p>&#183; Cyclostomes (lampreys and hagfishes) are <b>jawless fish</b>.</p><p>&#183; They are <b>exclusively marine or live in marine environments but may migrate to freshwater for breeding</b>.</p><p>&#183; These animals are primitive, with cartilaginous skeletons and circular mouths adapted for parasitic feeding.</p><p><b>Aves</b> <i>(Incorrect - Option 4)</i></p><p>&#183; Birds (Aves) are <b>not exclusively marine</b>.</p><p>&#183; Some birds like penguins and seagulls are found near oceans, but many species live in forests, grasslands, and deserts.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct?</p><p>I. The group of animals that first developed a true coelom is Annelida</p><p>II. The presence of an operculum is characteristic of Osteichthyes</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2332;&#2366;&#2344;&#2357;&#2352;&#2379;&#2306; &#2325;&#2366; &#2357;&#2361; &#2360;&#2350;&#2370;&#2361; &#2332;&#2367;&#2360;&#2344;&#2375; &#2360;&#2348;&#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2319;&#2325; &#2360;&#2330;&#2381;&#2330;&#2366; &#2360;&#2368;&#2354;&#2379;&#2350; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2357;&#2361; &#2319;&#2344;&#2375;&#2354;&#2367;&#2337;&#2366; &#2361;&#2376;</p><p>II. &#2321;&#2346;&#2352;&#2325;&#2369;&#2354;&#2350; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2323;&#2360;&#2381;&#2335;&#2367;&#2330;&#2381;&#2341;&#2367;&#2360; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; A <b>true coelom</b> is a fluid-filled body cavity lined completely by mesoderm.</p><p>o The first group to develop a true coelom is <b>Phylum Annelida</b> (e.g., earthworms, leeches).</p><p>o Earlier phyla such as <b>Platyhelminthes (flatworms) and Nematoda (roundworms)</b> lack a true coelom (Platyhelminthes are <b>acoelomate</b>, and Nematoda are <b>pseudocoelomate</b>).</p><p>&#183; <b>Osteichthyes</b> (bony fishes) have an <b>operculum</b>, which is a <b>bony flap covering the gills</b> that helps in respiration by protecting the delicate gill structures.</p><p>o In contrast, <b>Chondrichthyes</b> (cartilaginous fishes like sharks and rays) <b>lack an operculum</b> and instead rely on continuous swimming or spiracles for respiration.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a characteristic feature of phylum Porifera?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2347;&#2366;&#2311;&#2354;&#2350; &#2346;&#2379;&#2352;&#2367;&#2347;&#2375;&#2352;&#2366; &#2325;&#2368; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tissue-level organization</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2340;&#2325;-&#2360;&#2381;&#2340;&#2352;&#2368;&#2351; &#2360;&#2306;&#2327;&#2336;&#2344;</span>",
      "<span class=\"eqt\">Cellular-level organization</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2354;&#2369;&#2354;&#2352;-&#2360;&#2381;&#2340;&#2352;&#2368;&#2351; &#2360;&#2306;&#2327;&#2336;&#2344;</span>",
      "<span class=\"eqt\">Organ-level organization</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2327;-&#2360;&#2381;&#2340;&#2352;&#2368;&#2351; &#2360;&#2306;&#2327;&#2336;&#2344;</span>",
      "<span class=\"eqt\">Organ system-level organization</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2327; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;-&#2360;&#2381;&#2340;&#2352;&#2368;&#2351; &#2360;&#2306;&#2327;&#2336;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Phylum Porifera</b> (sponges) exhibits the <b>simplest level of organization</b> in the animal kingdom.</p><p>They have a <b>cellular-level organization</b>, meaning their bodies are made up of <b>loosely arranged specialized cells</b>, but <b>these cells do not form true tissues</b>.</p><p>In contrast:</p><p>&#183; <b>Tissue-level organization</b> is seen in <b>Cnidarians</b> (e.g., jellyfish, corals).</p><p>&#183; <b>Organ-level organization</b> is first seen in <b>Platyhelminthes</b> (e.g., flatworms).</p><p>&#183; <b>Organ system-level organization</b> is present in <b>higher phyla</b>, such as Annelida, Arthropoda, Mollusca, Echinodermata, and Chordata</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Match the structure with its function:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column A (Structure)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column B (Function)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Nematocysts</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Locomotion</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Setae</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Defense</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Scales</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Protection</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Cilia</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Attachment</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A (&#2360;&#2306;&#2352;&#2330;&#2344;&#2366;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B (&#2325;&#2366;&#2352;&#2381;&#2351;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2344;&#2367;&#2350;&#2375;&#2335;&#2379;&#2360;&#2367;&#2360;&#2381;&#2335;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2361;&#2352;&#2325;&#2340;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2360;&#2375;&#2335;&#2375;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2352;&#2325;&#2381;&#2359;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2340;&#2352;&#2366;&#2332;&#2370;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2360;&#2367;&#2354;&#2367;&#2351;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2309;&#2344;&#2369;&#2354;&#2327;&#2381;&#2344;&#2325;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-b, ii-d, iii-c, iv-a</span><span class=\"hqt\" style=\"display:none\">i-b, ii-d, iii-c, iv-a</span>",
      "<span class=\"eqt\">i-a, ii-b, iii-d, iv-c</span><span class=\"hqt\" style=\"display:none\">i-a, ii-b, iii-d, iv-c</span>",
      "<span class=\"eqt\">i-b, ii-a, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-b, ii-a, iii-c, iv-d</span>",
      "<span class=\"eqt\">i-a, ii-c, iii-d, iv-b</span><span class=\"hqt\" style=\"display:none\">i-a, ii-c, iii-d, iv-b</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Nematocysts </b><b>&rarr;</b><b> Defense</b></p><p>&#183; Nematocysts are <b>stinging cells</b> found in <b>Cnidarians</b> (e.g., jellyfish, sea anemones).</p><p>&#183; They help in capturing prey and <b>defense against predators</b> by injecting venom.</p><p><b>Setae </b><b>&rarr;</b><b> Locomotion</b></p><p>&#183; Setae are <b>bristle-like structures</b> present in <b>Annelids</b> (e.g., earthworms).</p><p>&#183; They help in gripping the ground, aiding in <b>movement</b>.</p><p><b>Scales </b><b>&rarr;</b><b> Protection</b></p><p>&#183; Scales are <b>hard, plate-like structures</b> found in <b>fish and reptiles</b>.</p><p>&#183; They provide <b>protection</b> against physical damage and parasites.</p><p><b>Cilia </b><b>&rarr;</b><b> Attachment</b></p><p>&#183; Cilia are <b>hair-like structures</b> found in various animals, including <b>protozoans and molluscan larvae</b>.</p><p>&#183; They help in <b>attachment, movement, and feeding</b>.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following features is NOT used as a basis for the classification of animals?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2332;&#2366;&#2344;&#2357;&#2352;&#2379;&#2306; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2313;&#2346;&#2351;&#2379;&#2327; &#2344;&#2361;&#2368;&#2306; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Body symmetry</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2352;&#2368;&#2352; &#2325;&#2368; &#2360;&#2350;&#2352;&#2370;&#2346;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Nature of coelom</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2311;&#2354;&#2379;&#2350; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Presence of chlorophyll</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2347;&#2367;&#2354; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Patterns of digestive system</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2330;&#2344; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2375; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Body symmetry</b> (<i>Radial, Bilateral, Asymmetrical</i>) is an important characteristic for classifying animals.</p><p>&#183; <b>Nature of coelom</b> (<i>Acoelomate, Pseudocoelomate, Coelomate</i>) plays a crucial role in classification.</p><p>&#183; <b>Patterns of the digestive system</b> (<i>Incomplete, Complete</i>) help distinguish different animal groups.</p><p>&#183; <b>Presence of chlorophyll</b> is <b>not a characteristic of animals</b> since chlorophyll is found in <b>plants and some protists (e.g., algae)</b> for photosynthesis.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>The term 'pseudocoelomate' refers to animals that have:</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2360;&#2381;&#2351;&#2370;&#2337;&#2379;&#2360;&#2368;&#2354;&#2379;&#2350;&#2375;&#2335;' &#2358;&#2348;&#2381;&#2342; &#2325;&#2366; &#2340;&#2366;&#2340;&#2381;&#2346;&#2352;&#2381;&#2351; &#2320;&#2360;&#2375; &#2332;&#2366;&#2344;&#2357;&#2352;&#2379;&#2306; &#2360;&#2375; &#2361;&#2376; &#2332;&#2367;&#2344;&#2350;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">A true body cavity lined by mesoderm</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2360;&#2379;&#2337;&#2352;&#2381;&#2350; &#2360;&#2375; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367;&#2348;&#2342;&#2381;&#2343; &#2319;&#2325; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2358;&#2352;&#2368;&#2352; &#2327;&#2369;&#2361;&#2366;</span>",
      "<span class=\"eqt\">No body cavity</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2358;&#2366;&#2352;&#2368;&#2352;&#2367;&#2325; &#2327;&#2369;&#2361;&#2366; &#2344;&#2361;&#2368;&#2306;</span>",
      "<span class=\"eqt\">A body cavity not completely lined by mesoderm</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2352;&#2368;&#2352; &#2325;&#2368; &#2327;&#2369;&#2361;&#2366; &#2332;&#2379; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2350;&#2375;&#2360;&#2379;&#2337;&#2352;&#2381;&#2350; &#2360;&#2375; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367;&#2348;&#2342;&#2381;&#2343; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2368;</span>",
      "<span class=\"eqt\">A body cavity derived from the gut</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2340; &#2360;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2319;&#2325; &#2358;&#2352;&#2368;&#2352; &#2327;&#2369;&#2361;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>A true coelom (coelomate animals)</b> has a body cavity <b>completely lined</b> by mesoderm (e.g., Annelida, Mollusca, Chordata).</p><p>&#183; <b>Acoelomates</b> (e.g., Platyhelminthes) <b>lack a body cavity</b> entirely.</p><p>&#183; <b>Pseudocoelomates</b> (e.g., Nematoda) have a <b>body cavity that is only partially lined by mesoderm</b>, meaning the mesoderm does not completely surround the coelom.</p><p>&#183; <b>A body cavity derived from the gut</b> refers to the <b>enterocoelous development of a true coelom</b>, which does not apply to pseudocoelomates.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>The following illustration refers to which basic body form of Cnidarians? </p><p><img width=142 height=128 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27526/image001.png\" ></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2330;&#2367;&#2340;&#2381;&#2352;&#2339; &#2344;&#2367;&#2337;&#2375;&#2352;&#2367;&#2351;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2350;&#2370;&#2354; &#2358;&#2352;&#2368;&#2352; &#2352;&#2370;&#2346; &#2325;&#2379; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p><p><img width=142 height=128 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27526/image001.png\" ></p></span>",
    "options": [
      "<span class=\"eqt\">Polyp</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2325;&#2337;&#2364;&#2366;</span>",
      "<span class=\"eqt\">Medusa</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2337;&#2369;&#2360;&#2366;</span>",
      "<span class=\"eqt\">Larva</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2352;&#2381;&#2357;&#2366;</span>",
      "<span class=\"eqt\">Ephyra</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2347;&#2364;&#2366;&#2311;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Cnidarians exhibit two basic body forms called polyp and medusa. </p><p><img width=501 height=344 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27526/image002.png\"></p><p>The former is a sessile and cylindrical form like Hydra, <i>Adamsia</i>, etc. whereas, the latter is umbrella-shaped and free-swimming like <i>Aurelia </i>or jelly fish. Those cnidarians which exist in both forms exhibit alternation of generation (Metagenesis), i.e., polyps produce medusae asexually and medusae form the polyps sexually (e.g., <i>Obelia</i>).</p>",
    "question_index": 19
  }
];
