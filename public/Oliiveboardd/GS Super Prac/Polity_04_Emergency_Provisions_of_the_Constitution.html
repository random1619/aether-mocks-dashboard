    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Constitutional Provisions for Emergency is mentioned in which part of the Constitution of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2349;&#2366;&#2327; &#2350;&#2375;&#2306; &#2313;&#2354;&#2381;&#2354;&#2367;&#2326;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Part 18</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; 18</span>",
      "<span class=\"eqt\">Part 20</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; 20</span>",
      "<span class=\"eqt\">Part 15</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; 15</span>",
      "<span class=\"eqt\">Part 11</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; 11</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#9679;\tConstitutional Provisions for Emergency mentioned in part 18 or XVIII of the Constitution of India.</p><p>Further Insight:</p><p>&#9679;\tPart I: Union and its Territory - Deals with the states, union territories, and the reorganization of territories.</p><p>&#9679;\tPart II: Citizenship - Provisions related to citizenship in India.</p><p>&#9679;\tPart III: Fundamental Rights - Lists the basic rights guaranteed to individuals.</p><p>&#9679;\tPart IV: Directive Principles of State Policy - Guidelines for policymaking to establish social and economic democracy.</p><p>&#9679;\tPart IVA: Fundamental Duties - Lists the duties of Indian citizens.</p><p>&#9679;\tPart V: The Union - Structure and functioning of the Union Government.</p><p>&#9679;\tPart VI: The States - Structure and functioning of State Governments.</p><p>&#9679;\tPart VII: Repealed - Initially dealt with Part-B states.</p><p>&#9679;\tPart VIII: Union Territories - Administration of Union Territories.</p><p>&#9679;\tPart IX: Panchayats - Provisions for rural local governance.</p><p>&#9679;\tPart IXA: Municipalities - Provisions for urban local governance.</p><p>&#9679;\tPart IXB: Cooperative Societies - Provisions for their functioning and regulation.</p><p>&#9679;\tPart X: Scheduled and Tribal Areas - Administration of Scheduled and Tribal Areas.</p><p>&#9679;\tPart XI: Relations between the Union and the States - Distribution of powers.</p><p>&#9679;\tPart XII: Finance, Property, Contracts, and Suits - Financial relations and management.</p><p>&#9679;\tPart XIII: Trade and Commerce - Freedom of trade and commerce across India.</p><p>&#9679;\tPart XIV: Services under the Union and the States - Provisions regarding civil services.</p><p>&#9679;\tPart XIVA: Tribunals - Provisions for administrative and other tribunals.</p><p>&#9679;\tPart XV: Elections - Provisions for conducting free and fair elections.</p><p>&#9679;\tPart XVI: Special Provisions - Safeguards for Scheduled Castes, Scheduled Tribes, and other weaker sections.</p><p>&#9679;\tPart XVII: Official Language - Provisions regarding languages in India.</p><p>&#9679;\tPart XVIII: Emergency Provisions - Provisions for handling emergencies in the country.</p><p>&#9679;\tPart XIX: Miscellaneous - Provisions on various matters not covered elsewhere.</p><p>&#9679;\tPart XX: Amendment of the Constitution - Procedures for constitutional amendments.</p><p>&#9679;\tPart XXI: Temporary, Transitional, and Special Provisions - Special provisions for certain states and regions.</p><p>&#9679;\tPart XXII: Short Title, Commencement, Authoritative Text - Deals with the title and commencement of the Constitution.</p><p></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>How many types of emergency are mentioned in the Constitution of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2366; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; There are 3 types of Emergency mentioned in the constitution of India. </p><p>&bull; 3 types are</p><p>&#9675; National Emergency</p><p>&#9675; State Emergency or President Rule</p><p>&#9675; Financial Emergency </p><p>Further Insight:</p><p>&bull; National Emergency mentioned under Article 352</p><p>&bull; State Emergency or Constitutional Emergency or President rule mentioned under Article 356</p><p>&bull; Financial Emergency mentioned under Article 360.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>National Emergency is mentioned under Article ___________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2366; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; ___________ &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">252</span><span class=\"hqt\" style=\"display:none\">252</span>",
      "<span class=\"eqt\">256</span><span class=\"hqt\" style=\"display:none\">256</span>",
      "<span class=\"eqt\">360</span><span class=\"hqt\" style=\"display:none\">360</span>",
      "<span class=\"eqt\">352</span><span class=\"hqt\" style=\"display:none\">352</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; National Emergency is mentioned under Article 352</p><p>Further Insight:</p><p>&bull; National Emergency (Article 352)</p><p>&#9675; National Emergency can be proclaimed based on:</p><p>&#9632; War</p><p>&#9632; External aggression</p><p>&#9632; Armed rebellion</p><p>&#9675; The term \"armed rebellion\" replaced \"internal disturbance\" through the 44th Amendment Act.</p><p>&#9675; Can be declared even before the actual occurrence of war, external aggression, or armed rebellion.</p><p>&#9675; Parliamentary Approval and Duration</p><p>&#9632; Proclamation must be approved by both Houses within 30 days.</p><p>&#9632; If Lok Sabha is dissolved, it must be approved within 30 days of its first reconstitution sitting.</p><p>&#9632; Once approved:</p><p>&bull; Emergency continues for 6 months.</p><p>&bull; Can be extended indefinitely with parliamentary approval every 6 months.</p><p>&#9632; Requires special majority in both Houses for approval or extension.</p><p>&#9675; Revocation of Proclamation</p><p>&#9632; Can be revoked anytime by the President without parliamentary approval.</p><p>&#9632; Must be revoked if Lok Sabha passes a resolution disapproving it by simple majority.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following are the basis on which National Emergency can be declared?</p><p>a. External Aggression</p><p>b. Internal disturbance</p><p>c. Armed rebellion</p><p>Choose the correct option</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2310;&#2343;&#2366;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2328;&#2379;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p><p>a. &#2348;&#2366;&#2361;&#2352;&#2368; &#2310;&#2325;&#2381;&#2352;&#2350;&#2339;</p><p>b. &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2309;&#2358;&#2366;&#2306;&#2340;&#2367;</p><p>c. &#2360;&#2358;&#2360;&#2381;&#2340;&#2381;&#2352; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only c and a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c &#2324;&#2352; a</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; As per Article 352, National Emergency can be declared if</p><p>&#9675; War with other country</p><p>&#9675; External Aggression</p><p>&#9675; Armed Rebellion within India</p><p>Further Insight:</p><p>&bull; National Emergency (Article 352)</p><p>&#9675; National Emergency can be proclaimed based on:</p><p>&#9632; War</p><p>&#9632; External aggression</p><p>&#9632; Armed rebellion</p><p>&#9675; The term \"armed rebellion\" replaced \"internal disturbance\" through the 44th Amendment Act.</p><p>&#9675; Can be declared even before the actual occurrence of war, external aggression, or armed rebellion.</p><p>&#9675; Parliamentary Approval and Duration</p><p>&#9632; Proclamation must be approved by both Houses within 30 days.</p><p>&#9632; If Lok Sabha is dissolved, it must be approved within 30 days of its first reconstitution sitting.</p><p>&#9632; Once approved:</p><p>&bull; Emergency continues for 6 months.</p><p>&bull; Can be extended indefinitely with parliamentary approval every 6 months.</p><p>&#9632; Requires special majority in both Houses for approval or extension.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What is the other name of the State emergency or Constitutional Emergency?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2351;&#2366; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2366; &#2342;&#2370;&#2360;&#2352;&#2366; &#2344;&#2366;&#2350; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Prime Minister rule</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2358;&#2366;&#2360;&#2344;</span>",
      "<span class=\"eqt\">Parliamentary Rule</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342;&#2368;&#2351; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Lok Sabha Rule</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">President Rule</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2358;&#2366;&#2360;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; State Emergency is called President rule because when a state emergency is in force all executive power of the state government is assumed by the President.</p><p>Further Insight:</p><p>&bull; President's Rule</p><p>&#9675; Article 355 obligates the Centre to ensure that the governance in every state aligns with the provisions of the Constitution.</p><p>&#9675; Article 356 enables the Centre to take over the state government in case of a failure of constitutional machinery, commonly known as President's Rule.</p><p>&#9675; Grounds for Imposition</p><p>&#9632; Under Article 356: The President can issue a proclamation if satisfied that the state's government cannot be carried on in accordance with the Constitution.</p><p>&#9632; Under Article 365: If a state fails to comply with or implement directions from the Centre, the President can declare that the state's governance has failed.</p><p>&#9675; Parliamentary Approval and Duration</p><p>&#9632; The proclamation of President's Rule must be approved by both Houses of Parliament within 2 months.</p><p>&#9632; If Lok Sabha is dissolved, the proclamation remains valid for 30 days from its first sitting after reconstitution, provided Rajya Sabha approves it in the interim.</p><p>&#9675; When President's Rule is imposed, the President gains the following powers:</p><p>&#9632; Assume the functions of the state government and powers of the Governor or other state executive authorities.</p><p>&#9632; Authorize Parliament to exercise the powers of the state legislature.</p><p>&#9632; Suspend constitutional provisions relating to any state authority or body, if necessary.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which article states the provisions of Financial Emergency?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2348;&#2340;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 356</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 356</span>",
      "<span class=\"eqt\">Article 358</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 358</span>",
      "<span class=\"eqt\">Article 360</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 360</span>",
      "<span class=\"eqt\">Article 362</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 362</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Article 360 states the provisions of Financial Emergency.</p><p>Further Insight:</p><p>&bull; Financial Emergency (Article 360)</p><p>&#9675; The President is empowered to proclaim a Financial Emergency if he is satisfied that the financial stability or credit of India, or any part of its territory, is threatened.</p><p>&#9675; The proclamation must be approved by both Houses of Parliament within two months from its issuance.</p><p>&#9675; Once approved, the Financial Emergency continues indefinitely until revoked by the President.</p><p>&#9675; Effects of Financial Emergency</p><p>&#9632; Extends the executive authority of the Union over financial matters of the states.</p><p>&#9632; The President can order the reduction of salaries and allowances of:</p><p>&bull; Individuals serving in the state.</p><p>&bull; Judges of the Supreme Court and High Courts.</p><p>&bull; All money bills or financial bills passed by the state legislature must be reserved for the President's consideration.</p><p>&#9632; The President can direct reductions in the salaries and allowances of individuals serving the Union government.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which article states that \"Duty of the Union to protect States against external aggression and internal disturbance\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2350;&#2375;&#2306; &#2325;&#2361;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; \"&#2348;&#2366;&#2361;&#2352;&#2368; &#2310;&#2325;&#2381;&#2352;&#2350;&#2339; &#2324;&#2352; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2309;&#2358;&#2366;&#2306;&#2340;&#2367; &#2360;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366; &#2360;&#2306;&#2328; &#2325;&#2366; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351; &#2361;&#2376;\"?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 352</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 352</span>",
      "<span class=\"eqt\">Article 354</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 354</span>",
      "<span class=\"eqt\">Article 355</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 355</span>",
      "<span class=\"eqt\">Article 356</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 356</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Article 355 states that it is duty of the Union to protect States against external aggression and internal disturbance</p><p>Further Insight:</p><p>&bull; Article 355 Duty of the Union to protect States against external aggression and internal disturbance. - It shall be the duty of the Union to protect every State against external aggression and internal disturbance and to ensure that the Government of every State is carried on in accordance with the provisions of this Constitution.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What is the reason for imposition of President Rule in the State? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2358;&#2366;&#2360;&#2344; &#2354;&#2327;&#2366;&#2344;&#2375; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2325;&#2366;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Failure of Constitution Machinery</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2358;&#2368;&#2344;&#2352;&#2368; &#2325;&#2368; &#2357;&#2367;&#2347;&#2354;&#2340;&#2366;</span>",
      "<span class=\"eqt\">State Government doesn't prove their majority in State Legislature</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2366; &#2348;&#2361;&#2369;&#2350;&#2340; &#2360;&#2366;&#2348;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2346;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Parliament doesn't like the current state government</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342; &#2325;&#2379; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2346;&#2360;&#2306;&#2342; &#2344;&#2361;&#2368;&#2306;</span>",
      "<span class=\"eqt\">Prime Minister doesn't think this government is right to run the State</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2379; &#2344;&#2361;&#2368;&#2306; &#2354;&#2327;&#2340;&#2366; &#2325;&#2367; &#2351;&#2361; &#2360;&#2352;&#2325;&#2366;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2330;&#2354;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2361;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; If there is Failure of constitutional machinery in the state, then President can impose the President rule in the state</p><p>Further Insight:</p><p>&bull; President's Rule</p><p>&#9675; Article 355 obligates the Centre to ensure that the governance in every state aligns with the provisions of the Constitution.</p><p>&#9675; Article 356 enables the Centre to take over the state government in case of a failure of constitutional machinery, commonly known as President's Rule.</p><p>&#9675; Grounds for Imposition</p><p>&#9632; Under Article 356: The President can issue a proclamation if satisfied that the state's government cannot be carried on in accordance with the Constitution.</p><p>&#9632; Under Article 365: If a state fails to comply with or implement directions from the Centre, the President can declare that the state's governance has failed.</p><p>&#9675; Parliamentary Approval and Duration</p><p>&#9632; The proclamation of President's Rule must be approved by both Houses of Parliament within 2 months.</p><p>&#9632; If Lok Sabha is dissolved, the proclamation remains valid for 30 days from its first sitting after reconstitution, provided Rajya Sabha approves it in the interim.</p><p>&#9675; When President's Rule is imposed, the President gains the following powers:</p><p>&#9632; Assume the functions of the state government and powers of the Governor or other state executive authorities.</p><p>&#9632; Authorize Parliament to exercise the powers of the state legislature.</p><p>&#9632; Suspend constitutional provisions relating to any state authority or body, if necessary.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>If a National Emergency is proclaimed in the country, within how many days or months is the approval of both houses required to continue the emergency?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2332;&#2366;&#2352;&#2368; &#2352;&#2326;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2351;&#2366; &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2342;&#2344;&#2379;&#2306; &#2325;&#2368; &#2350;&#2306;&#2332;&#2370;&#2352;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">90 days</span><span class=\"hqt\" style=\"display:none\">90 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">1 month</span><span class=\"hqt\" style=\"display:none\">1 &#2350;&#2361;&#2368;&#2344;&#2366;</span>",
      "<span class=\"eqt\">60 days</span><span class=\"hqt\" style=\"display:none\">60 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">4 month</span><span class=\"hqt\" style=\"display:none\">4 &#2350;&#2361;&#2368;&#2344;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Within 1 month of the issue of proclamation of National Emergency, the Government needs approval of both houses of Parliament, resolution by both houses must be passed by special majority.</p><p>Further Insight:</p><p>&bull; National Emergency </p><p>&#9675; National Emergency can be proclaimed based on:</p><p>&#9632; War</p><p>&#9632; External aggression</p><p>&#9632; Armed rebellion</p><p>&#9675; The term \"armed rebellion\" replaced \"internal disturbance\" through the 44th Amendment Act.</p><p>&#9675; Can be declared even before the actual occurrence of war, external aggression, or armed rebellion.</p><p>&#9675; Parliamentary Approval and Duration</p><p>&#9632; Proclamation must be approved by both Houses within 30 days.</p><p>&#9632; If Lok Sabha is dissolved, it must be approved within 30 days of its first reconstitution sitting.</p><p>&#9632; Once approved:</p><p>&bull; Emergency continues for 6 months.</p><p>&bull; Can be extended indefinitely with parliamentary approval every 6 months.</p><p>&#9632; Requires special majority in both Houses for approval or extension.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>There were three times when National Emergency was implemented in India. Which of the following is not the year in which the National emergency was implemented? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2348;&#2366;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2354;&#2366;&#2327;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2352;&#2381;&#2359; &#2357;&#2361; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2354;&#2366;&#2327;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1962</span><span class=\"hqt\" style=\"display:none\">1962</span>",
      "<span class=\"eqt\">1971</span><span class=\"hqt\" style=\"display:none\">1971</span>",
      "<span class=\"eqt\">1975</span><span class=\"hqt\" style=\"display:none\">1975</span>",
      "<span class=\"eqt\">1965</span><span class=\"hqt\" style=\"display:none\">1965</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; National emergency invoked in 1962, 1971 and 1975</p><p>Further Insight:</p><p>&bull; 1962: Proclaimed due to Chinese aggression (NEFA region); lasted till 1968.</p><p>&bull; 1971: Proclaimed during Pakistan's attack.</p><p>&bull; 1975: Proclaimed due to internal instability (revoked in 1977).</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following emergencies was never implemented in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2310;&#2346;&#2366;&#2340; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2349;&#2368; &#2354;&#2366;&#2327;&#2370; &#2344;&#2361;&#2368;&#2306; &#2325;&#2368; &#2327;&#2312;?</p></span>",
    "options": [
      "<span class=\"eqt\">National Emergency</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354;</span>",
      "<span class=\"eqt\">President Rule</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2358;&#2366;&#2360;&#2344;</span>",
      "<span class=\"eqt\">Financial Emergency</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Financial emergency has never been invoked in India.</p><p>Further Insight:</p><p>&bull; Financial Emergency (Article 360)</p><p>&#9675; The President is empowered to proclaim a Financial Emergency if he is satisfied that the financial stability or credit of India, or any part of its territory, is threatened.</p><p>&#9675; The proclamation must be approved by both Houses of Parliament within two months from its issuance.</p><p>&#9675; Once approved, the Financial Emergency continues indefinitely until revoked by the President.</p><p>&#9675; Effects of Financial Emergency</p><p>&#9632; Extends the executive authority of the Union over financial matters of the states.</p><p>&#9632; The President can order the reduction of salaries and allowances of:</p><p>&bull; Individuals serving in the state.</p><p>&bull; Judges of the Supreme Court and High Courts.</p><p>&bull; All money bills or financial bills passed by the state legislature must be reserved for the President's consideration.</p><p>&#9632; The President can direct reductions in the salaries and allowances of individuals serving the Union government.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following are the methods to Revoke the Proclamation of National Emergency?</p><p>a. President Revoke the Proclamation of National Emergency</p><p>b. Lok Sabha pass a resolution to Revoke National Emergency</p><p>c. Rajya Sabha pass a resolution to Revoke National Emergency</p><p>Choose the correct Option</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2379; &#2352;&#2342;&#2381;&#2342; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2357;&#2367;&#2343;&#2367;&#2351;&#2366;&#2305; &#2361;&#2376;&#2306;?</p><p>a. &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2379; &#2352;&#2342;&#2381;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</p><p>b. &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2379; &#2352;&#2342;&#2381;&#2342; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;</p><p>c. &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2379; &#2352;&#2342;&#2381;&#2342; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">All of the following</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2349;&#2368;</span>",
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; There are currently two methods for the revocation of Proclamation of National Emergency</p><p>&#9675; By the President </p><p>&#9675; By resolution of Lok Sabha</p><p>Further Insight:</p><p>&bull; National Emergency (Article 352)</p><p>&#9675; National Emergency can be proclaimed based on:</p><p>&#9632; War</p><p>&#9632; External aggression</p><p>&#9632; Armed rebellion</p><p>&#9675; Can be declared even before the actual occurrence of war, external aggression, or armed rebellion.</p><p>&#9675; Parliamentary Approval and Duration</p><p>&#9632; Proclamation must be approved by both Houses within 30 days.</p><p>&#9632; If Lok Sabha is dissolved, it must be approved within 30 days of its first reconstitution sitting.</p><p>&#9632; Once approved:</p><p>&bull; Emergency continues for 6 months.</p><p>&bull; Can be extended indefinitely with parliamentary approval every 6 months.</p><p>&#9632; Requires special majority in both Houses for approval or extension.</p><p>&#9675; Revocation of Proclamation</p><p>&#9632; Can be revoked anytime by the President without parliamentary approval.</p><p>&#9632; Must be revoked if Lok Sabha passes a resolution disapproving it by simple majority.</p>",
    "question_index": 11
  },

    "question": "<span class=\"eqt\"><p>What is the maximum period of the State emergency or President Rule?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2351;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2358;&#2366;&#2360;&#2344; &#2325;&#2368; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2309;&#2357;&#2343;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">There is no specific period that can be extended until Parliament approves the resolution.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2325;&#2379; &#2350;&#2306;&#2332;&#2370;&#2352;&#2368; &#2342;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2340;&#2325; &#2325;&#2379;&#2312; &#2357;&#2367;&#2358;&#2375;&#2359; &#2309;&#2357;&#2343;&#2367; &#2344;&#2361;&#2368;&#2306; &#2348;&#2338;&#2364;&#2366;&#2312; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Can be extended for maximum 3 years</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325;&#2340;&#2350; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2338;&#2364;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Can be extended for maximum 9 years</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325;&#2340;&#2350; 9 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2338;&#2364;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Can be extended for maximum 10 years</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325;&#2340;&#2350; 10 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2338;&#2364;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; President Rule can be extended for maximum period of 3 years</p><p>Further Insight:</p><p>&bull; President's Rule</p><p>&#9675; Article 355 obligates the Centre to ensure that the governance in every state aligns with the provisions of the Constitution.</p><p>&#9675; Article 356 enables the Centre to take over the state government in case of a failure of constitutional machinery, commonly known as President's Rule.</p><p>&#9675; Grounds for Imposition</p><p>&#9632; Under Article 356: The President can issue a proclamation if satisfied that the state's government cannot be carried on in accordance with the Constitution.</p><p>&#9632; Under Article 365: If a state fails to comply with or implement directions from the Centre, the President can declare that the state's governance has failed.</p><p>&#9675; Parliamentary Approval and Duration</p><p>&#9632; The proclamation of President's Rule must be approved by both Houses of Parliament within 2 months.</p><p>&#9632; If Lok Sabha is dissolved, the proclamation remains valid for 30 days from its first sitting after reconstitution, provided Rajya Sabha approves it in the interim.</p><p>&#9675; When President's Rule is imposed, the President gains the following powers:</p><p>&#9632; Assume the functions of the state government and powers of the Governor or other state executive authorities.</p><p>&#9632; Authorize Parliament to exercise the powers of the state legislature.</p><p>&#9632; Suspend constitutional provisions relating to any state authority or body, if necessary.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following fundamental rights can't be suspended in a National emergency?</p><p>a. Article 19</p><p>b. Article 20</p><p>c. Article 21</p><p>d. Article 25</p><p>Choose the correct option</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2344;&#2367;&#2354;&#2306;&#2348;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p><p>a. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 19</p><p>b. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 20</p><p>c. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 21</p><p>d. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 25</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only c and d</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c &#2324;&#2352; d</span>",
      "<span class=\"eqt\">Only a, b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a, b &#2324;&#2352; c</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Suspension of Fundamental Right means Person can't move to the court for the violation of Fundamental Rights by the State but after 44th Amendment one can move to court if there is violation of Article 20 and Article 21</p><p>Further Insight:</p><p>&bull; Suspension of Article 19 Rights:</p><p>&#9675; Rights under Article 19 are automatically suspended.</p><p>&#9675; Rights are restored after the emergency ends.</p><p>&#9675; 44th Amendment: Suspension of Article 19 allowed only in cases of war or external aggression.</p><p>&bull; Suspension of Other Fundamental Rights:</p><p>&#9675; Article 359 allows the President to suspend the enforcement of specified Fundamental Rights.</p><p>&#9675; Does not apply to Articles 20 and 21 as per the 44th Amendment.</p><p>&#9675; Requires parliamentary approval.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>In case of National emergency what will happen to the life of Lok Sabha and State Legislature? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2354;&#2379;&#2325; &#2360;&#2349;&#2366; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Parliament by law can extend the life of Lok Sabha and State legislature for one year at a time</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342; &#2325;&#2366;&#2344;&#2370;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2379;&#2325; &#2360;&#2349;&#2366; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2319;&#2325; &#2348;&#2366;&#2352; &#2350;&#2375;&#2306; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2338;&#2364;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Parliament by law can extend the life of Lok Sabha and State legislature for three years at a time</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342; &#2325;&#2366;&#2344;&#2370;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2379;&#2325; &#2360;&#2349;&#2366; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2319;&#2325; &#2348;&#2366;&#2352; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2338;&#2364;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Parliament by law can extend the life of Lok Sabha and State legislature for four years at a time</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342; &#2325;&#2366;&#2344;&#2370;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2379;&#2325; &#2360;&#2349;&#2366; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2319;&#2325; &#2348;&#2366;&#2352; &#2350;&#2375;&#2306; &#2330;&#2366;&#2352; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2338;&#2364;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Parliament by law can extend the life of Lok Sabha and State legislature for ten years at a time</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2342; &#2325;&#2366;&#2344;&#2370;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2379;&#2325; &#2360;&#2349;&#2366; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2319;&#2325; &#2348;&#2366;&#2352; &#2350;&#2375;&#2306; &#2342;&#2360; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2338;&#2364;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Parliament by law can extend the life of Lok Sabha and State legislature for one year at a time.</p><p>Further Insight:</p><p>&bull; Effects of National Emergency</p><p>&#9675; On Centre-State Relations</p><p>&#9632; Executive: Centre can issue directions to states on any matter.</p><p>&#9632; Legislative:</p><p>&bull; Parliament can legislate on subjects in the State List.</p><p>&bull; Presidential ordinances on state subjects are allowed if Parliament isn't in session.</p><p>&bull; Such laws become inoperative six months after the emergency ends.</p><p>&#9632; Financial: The President can modify the financial distribution of revenues.</p><p>&#9675; On Lok Sabha and State Assemblies:</p><p>&#9632; Lok Sabha's term can be extended by 1 year at a time, up to 6 months after emergency ends.</p><p>&#9632; Similar provisions apply to State Legislative Assemblies.</p><p>&#9675; On Fundamental Rights:</p><p>&#9632; Suspension of Article 19 Rights:</p><p>&bull; Rights under Article 19 are automatically suspended.</p><p>&bull; Rights are restored after the emergency ends.</p><p>&bull; 44th Amendment: Suspension of Article 19 allowed only in cases of war or external aggression.</p><p>&#9632; Suspension of Other Fundamental Rights:</p><p>&bull; Article 359 allows the President to suspend the enforcement of specified Fundamental Rights.</p><p>&bull; Does not apply to Articles 20 and 21 as per the 44th Amendment.</p><p>&bull; Requires parliamentary approval.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Within how many months of the proclamation of a Constitutional Emergency in a state does the Central Government need the approval of both houses of Parliament to continue the emergency?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2332;&#2366;&#2352;&#2368; &#2352;&#2326;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2342;&#2344;&#2379;&#2306; &#2325;&#2368; &#2350;&#2306;&#2332;&#2370;&#2352;&#2368; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">2 months</span><span class=\"hqt\" style=\"display:none\">2 &#2350;&#2361;&#2368;&#2344;&#2375;</span>",

      "<span class=\"eqt\">4 months</span><span class=\"hqt\" style=\"display:none\">4 &#2350;&#2361;&#2368;&#2344;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Within 2 months of Proclamation of a Constitutional Emergency or President rule in State, the Central government need the approval of both houses of Parliament to pass a resolution with with special majority to continue </p><p>Further Insight:</p><p>&bull; President's Rule</p><p>&#9675; Article 355 obligates the Centre to ensure that the governance in every state aligns with the provisions of the Constitution.</p><p>&#9675; Article 356 enables the Centre to take over the state government in case of a failure of constitutional machinery, commonly known as President's Rule.</p><p>&#9675; Grounds for Imposition</p><p>&#9632; Under Article 356: The President can issue a proclamation if satisfied that the state's government cannot be carried on in accordance with the Constitution.</p><p>&#9632; Under Article 365: If a state fails to comply with or implement directions from the Centre, the President can declare that the state's governance has failed.</p><p>&#9675; Parliamentary Approval and Duration</p><p>&#9632; The proclamation of President's Rule must be approved by both Houses of Parliament within 2 months.</p><p>&#9632; If Lok Sabha is dissolved, the proclamation remains valid for 30 days from its first sitting after reconstitution, provided Rajya Sabha approves it in the interim.</p><p>&#9675; When President's Rule is imposed, the President gains the following powers:</p><p>&#9632; Assume the functions of the state government and powers of the Governor or other state executive authorities.</p><p>&#9632; Authorize Parliament to exercise the powers of the state legislature.</p><p>&#9632; Suspend constitutional provisions relating to any state authority or body, if necessary.</p>",
    "question_index": 15
  },
  {

    "solution": "<p>&bull; According to Article 358, When National Emergency came into effect the six fundamental freedoms under Article 19 automatically suspended. </p><p>&bull; Article 19 revived automatically after the national emergency ended. </p><p>Further Insight:</p><p>&bull; Effects of National Emergency</p><p>&#9675; On Centre-State Relations</p><p>&#9632; Executive: Centre can issue directions to states on any matter.</p><p>&#9632; Legislative:</p><p>&bull; Parliament can legislate on subjects in the State List.</p><p>&bull; Presidential ordinances on state subjects are allowed if Parliament isn't in session.</p><p>&bull; Such laws become inoperative six months after the emergency ends.</p><p>&#9632; Financial: The President can modify the financial distribution of revenues.</p><p>&#9675; On Lok Sabha and State Assemblies:</p><p>&#9632; Lok Sabha's term can be extended by 1 year at a time, up to 6 months after emergency ends.</p><p>&#9632; Similar provisions apply to State Legislative Assemblies.</p><p>&#9675; On Fundamental Rights:</p><p>&#9632; Suspension of Article 19 Rights:</p><p>&bull; Rights under Article 19 are automatically suspended.</p><p>&bull; Rights are restored after the emergency ends.</p><p>&bull; 44th Amendment: Suspension of Article 19 allowed only in cases of war or external aggression.</p><p>&#9632; Suspension of Other Fundamental Rights:</p><p>&bull; Article 359 allows the President to suspend the enforcement of specified Fundamental Rights.</p><p>&bull; Does not apply to Articles 20 and 21 as per the 44th Amendment.</p><p>&bull; Requires parliamentary approval.</p>",

    "correct_option_id": 0,
    "solution": "<p>&bull; All three types of Emergency can be scrutinized by the court under Judicial Review.</p><p>Further Insight:</p><p>&bull; 38th Amendment Act, 1975: Made the declaration of Emergency immune to judicial review (later repealed by the 44th Amendment Act, 1978).</p><p>&#9675; Declared the President's satisfaction in invoking Article 356 as final and beyond judicial review.</p><p>&bull; 44th Amendment Act, 1978: Repealed the above provision, allowing judicial review of the President's decision to ensure it is not arbitrary.</p><p>&bull; Minerva Mills Case (1980): Supreme Court allowed judicial review on grounds of mala fide or irrelevant facts.</p>",
