    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Arrange the following European powers in the correct order of their arrival in India:</p><p>a. Dutch</p><p>b. French</p><p>c. Portuguese</p><p>d. Danish</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2351;&#2370;&#2352;&#2379;&#2346;&#2368;&#2351; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2375; &#2310;&#2327;&#2350;&#2344; &#2325;&#2375; &#2360;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2337;&#2330;</p><p>b. &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2368;&#2360;&#2368;</p><p>c. &#2346;&#2369;&#2352;&#2381;&#2340;&#2327;&#2366;&#2354;&#2368;</p><p>d. &#2337;&#2375;&#2344;&#2367;&#2358;</p></span>",
    "options": [
      "<span class=\"eqt\">a, b, c, d</span><span class=\"hqt\" style=\"display:none\">a, b, c, d</span>",
      "<span class=\"eqt\">c, a, d, b</span><span class=\"hqt\" style=\"display:none\">c, a, d, b</span>",
      "<span class=\"eqt\">c, d, a, b</span><span class=\"hqt\" style=\"display:none\">c, d, a, b</span>",
      "<span class=\"eqt\">d, c, b, a</span><span class=\"hqt\" style=\"display:none\">d, c, b, a</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Portuguese were the first Europeans to arrive in India in 1498, followed by the Dutch in 1595.</b></p><p>&bull; <b>The Danish East India Company came in 1616, and the French arrived later in 1664.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Timeline of European Arrival</b></p><p>&bull; 1492: Christopher Columbus discovers America, marking the start of European exploration.</p><p>&bull; 1498: Vasco da Gama of Portugal establishes a new sea route from Europe to India, landing in Calicut.</p><p>&bull; 1600: The British East India Company is established.</p><p>&bull; 1605: Dutch East India Company sets up its first factory in Masulipatnam.</p><p>&bull; 1616: The Danish East India Company is formed.</p><p>&bull; 1664: The French East India Company is established.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was NOT introduced to India by the Portuguese?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2369;&#2352;&#2381;&#2340;&#2327;&#2366;&#2354;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2344;&#2361;&#2368;&#2306; &#2354;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Printing Press</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2366;&#2346;&#2366;&#2326;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Tobacco Cultivation</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2381;&#2348;&#2366;&#2325;&#2370; &#2325;&#2368; &#2326;&#2375;&#2340;&#2368;</span>",
      "<span class=\"eqt\">Cultivation of Coffee</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2377;&#2347;&#2364;&#2368; &#2325;&#2368; &#2326;&#2375;&#2340;&#2368;</span>",
      "<span class=\"eqt\">Pineapple Cultivation</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2366;&#2344;&#2366;&#2360; &#2325;&#2368; &#2326;&#2375;&#2340;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Coffee was not introduced by the Portuguese; it was brought by Baba Budan from Yemen.</b></p><p>&bull; <b>The Portuguese introduced tobacco, the printing press, and crops like pineapple, papaya, and cashew.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Portuguese</b></p><p>&#9675; <b>Vasco da Gama: Discoverer of new sea route between India and Europe</b></p><p>&#9632; He was a resident of Portugal.</p><p>&#9632; At Cape of Good Hope</p><p>&bull; Met Gujarati guide Abdul Munik</p><p>&#9632; 17 May, 1498 AD reach Calicut port</p><p>&#9632; Then ruler Zamorin</p><p>&#9632; 1503 AD-Cochin (Kollam) - First factory</p><p>&#9675; <b>Francisco de Almeida</b></p><p>&#9632; First Portuguese governor</p><p>&#9632; 1509 AD-Defeated the joint army of Egypt, Turkey and Gujarat Captured Diu</p><p>&#9632; Blue Water Policy</p><p>&#9675; <b>Alphonso de Albuquerque</b></p><p>&#9632; Real founder of Portuguese power</p><p>&#9632; Recruitment of Indians in the army.</p><p>&#9632; Ban on Sati system</p><p>&#9632; Won Goa from Adil Shah of Bijapur in 1510 AD</p><p>&#9632; Established control over Malacca</p><p>&#9632; Rights over Persian Gulf</p><p>&#9675; <b>Nino de Cunha</b></p><p>&#9632; Make Goa-formal capital</p><p>&#9632; Establishment of Portuguese colonies in Santhomi (Madras), Hooghly (Bengal), Diu</p><p>&#9675; <b>Contribution of Portuguese to India</b></p><p>&#9632; Printing press</p><p>&#9632; Tobacco cultivation. Papaya, orange, litchi, pineapple, cashew, almond, sweet potato cultivation</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In which of the following regions did the Dutch establish their first factory in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2337;&#2330;&#2379;&#2306; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2366; &#2346;&#2361;&#2354;&#2366; &#2325;&#2366;&#2352;&#2326;&#2366;&#2344;&#2366; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pulicat</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2354;&#2367;&#2325;&#2335;</span>",
      "<span class=\"eqt\">Masulipatnam</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2360;&#2370;&#2354;&#2367;&#2346;&#2335;&#2344;&#2350;</span>",
      "<span class=\"eqt\">Nagapattinam</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2327;&#2346;&#2335;&#2381;&#2335;&#2367;&#2344;&#2350;</span>",
      "<span class=\"eqt\">Cochin</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2330;&#2368;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The Dutch East India Company established their first factory at Masulipatnam in 1605.</b></p><p>&bull; Pulicat and Nagapattinam were later centers of Dutch trade.</p><p><b>Further Insight:</b></p><p>&bull; <b>Dutch</b></p><p>&#9675; From Netherlands and Holland</p><p>&#9675; First factory established in 1605 AD at Masulipatam in Andhra Pradesh</p><p>&#9675; Second: Pattopoli (Nizampatnam)</p><p>&#9675; Third: Pulicat</p><p>&#9675; Establishment of Fort William in Kochi (1663 AD)</p><p>&#9675; Spice Islands (Indonesia) won from the Portuguese</p><p>&#9675; Development of cotton textile industry</p><p>&#9675; The British defeated the Dutch badly in the Battle of Bedra (Bengal) (1759 AD)</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following events marked the beginning of British control over Bengal?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2328;&#2335;&#2344;&#2366; &#2344;&#2375; &#2348;&#2306;&#2327;&#2366;&#2354; &#2346;&#2352; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Battle of Wandiwash</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2306;&#2337;&#2367;&#2357;&#2366;&#2358; &#2325;&#2368; &#2354;&#2337;&#2364;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Battle of Plassey</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2366;&#2360;&#2368; &#2325;&#2366; &#2351;&#2369;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">Battle of Bedra</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2342;&#2352;&#2366; &#2325;&#2368; &#2354;&#2337;&#2364;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Treaty of Surat</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2352;&#2340; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Battle of Plassey (1757) is considered the key turning point that marked the beginning of British control over Bengal after defeating the Nawab of Bengal, Siraj-ud-Daulah.</p><p><b>Further Insight:</b></p><p>&bull; <b>Battle of Plassey (1757)</b></p><p>&bull; <b>Date:</b> June 23, 1757</p><p>&bull; <b>Location:</b> Plassey (Palashi), Bengal</p><p>&bull; <b>Opponents:</b></p><p>&#9675; <b>British East India Company</b> led by <b>Robert Clive</b></p><p>&#9675; <b>Nawab of Bengal</b> Siraj-ud-Daulah, <b>supported by the French</b></p><p>&bull; <b>Cause:</b> The conflict arose due to Siraj-ud-Daulah's opposition to British interference in Bengal and the fortification of Calcutta.</p><p>&bull; Mir Jafar, the commander of Siraj-ud-Daulah's army, betrayed him by not engaging his troops, leading to the Nawab's defeat.</p><p>&bull; <b>Outcome:</b></p><p>&#9675; <b>British Victory:</b> Secured control over Bengal.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Where did the Danish establish their first factory in India in 1620?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2337;&#2375;&#2344;&#2350;&#2366;&#2352;&#2381;&#2325;&#2367;&#2351;&#2379;&#2306; &#2344;&#2375; 1620 &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2366; &#2346;&#2361;&#2354;&#2366; &#2325;&#2366;&#2352;&#2326;&#2366;&#2344;&#2366; &#2325;&#2361;&#2366;&#2306; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Travancore</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2366;&#2357;&#2339;&#2325;&#2379;&#2352;</span>",
      "<span class=\"eqt\">Calicut</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2354;&#2368;&#2325;&#2335;</span>",
      "<span class=\"eqt\">Cochin</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2330;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Goa</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2357;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The <b>Danish East India Company established their first factory in </b>Travancore <b>(present-day Tamil Nadu) in 1620.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Danish</b></p><p>&#9675; Danes came to India in 1616 AD</p><p>&#9675; The first factory was established in 1620 AD in Travancore (Tanjore) (TN)</p><p>&#9675; In 1745 AD, the Danes sold all their factories to the British and left India</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following events effectively ended the French colonial ambitions in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2328;&#2335;&#2344;&#2366; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2368;&#2360;&#2368; &#2324;&#2346;&#2344;&#2367;&#2357;&#2375;&#2358;&#2367;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2366;&#2325;&#2366;&#2306;&#2325;&#2381;&#2359;&#2366;&#2323;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Treaty of Surat</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2352;&#2340; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Battle of Plassey</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2366;&#2360;&#2368; &#2325;&#2366; &#2351;&#2369;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">Battle of Wandiwash</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2306;&#2337;&#2367;&#2357;&#2366;&#2358; &#2325;&#2368; &#2354;&#2337;&#2364;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Third Carnatic War</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2360;&#2352;&#2366; &#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325; &#2351;&#2369;&#2342;&#2381;&#2343;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>The Battle of Wandiwash (1760) was the decisive battle in which the British, led by Eyre Coote, defeated the French under Count de Lally, ending French ambitions in India.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>French</b></p><p>&#9675; First trading factory in Surat in 1668</p><p>&#9675; Second factory in Masulipatnam</p><p>&#9675; Establishment of Pondicherry</p><p>&#9675; 1690-92 AD-Establishment of Chandranagar</p><p>&#9675; 1724 AD French took over Malabar (Mahi)</p><p>&#9675; 1739 AD French took over Karikala</p><p>&#9675; Battle of Wandiwash (1760 AD)</p><p>&#9632; English army led by Eyre Coote</p><p>&#9632; French army led by Count de Lally</p><p>&#9632; <b>English defeated the French Almost ceased to exist</b></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was a key consequence of the Third Carnatic War (1757-1763) between the British and the French in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2324;&#2352; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2368;&#2360;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2340;&#2368;&#2360;&#2352;&#2375; &#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325; &#2351;&#2369;&#2342;&#2381;&#2343; (1757-1763) &#2325;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">French control over Bengal was consolidated</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2327;&#2366;&#2354; &#2346;&#2352; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2368;&#2360;&#2368; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2350;&#2332;&#2348;&#2370;&#2340; &#2361;&#2369;&#2310;</span>",
      "<span class=\"eqt\">The French lost their territories in India except for a few trading posts</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2331; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2367;&#2325; &#2330;&#2380;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2368;&#2360;&#2367;&#2351;&#2379;&#2306; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2375; &#2360;&#2349;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2326;&#2379; &#2342;&#2367;&#2319;</span>",
      "<span class=\"eqt\">British control over South India was weakened</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2349;&#2366;&#2352;&#2340; &#2346;&#2352; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2325;&#2350;&#2332;&#2379;&#2352; &#2361;&#2379; &#2327;&#2351;&#2366;</span>",
      "<span class=\"eqt\">French military power in India increased significantly</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2368;&#2360;&#2368; &#2360;&#2376;&#2344;&#2381;&#2351; &#2358;&#2325;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326;&#2344;&#2368;&#2351; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2369;&#2312;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The <b>Third Carnatic War concluded with the Treaty of Paris in 1763</b>, which allowed the French to retain only a few trading posts like Pondicherry, but they could no longer engage in military or political influence in India, thus marking the end of French ambitions in India.</p><p><b>Further Insight:</b></p><p>&bull; <b>Carnatic Wars (1746 - 1763)</b></p><p>&#9675; <b>It was</b> Series of three military conflicts in Southern India between British and French for dominance over the Indian subcontinent.</p><p>&#9675; <b>First Carnatic War (1746-1748):</b></p><p>&#9632; <b>Cause:</b> Spillover of the Austrian War of Succession in Europe.</p><p>&#9632; <b>Opponents:</b> British East India Company vs. French East India Company.</p><p>&#9632; <b>Outcome:</b> Treaty of Aix-la-Chapelle (1748) restored conquered territories, no clear victor.</p><p>&#9675; <b>Second Carnatic War (1749-1754):</b></p><p>&#9632; <b>Cause:</b> Succession disputes in Carnatic and Hyderabad.</p><p>&#9632; <b>Key Players:</b> British backed <b>Muhammad Ali</b>, French supported <b>Chanda Sahib</b>.</p><p>&#9632; <b>Outcome:</b> British victory; French political influence weakened.</p><p>&#9675; <b>Third Carnatic War (1756-1763):</b></p><p>&#9632; <b>Cause:</b> Seven Years' War in Europe.</p><p>&#9632; <b>Key Battle: Battle of Wandiwash</b> (1760)  -  decisive British victory.</p><p>&#9632; <b>Outcome:</b> Treaty of Paris (1763); British dominance in India solidified, French influence declined.</p>",

  },

    "question": "<span class=\"eqt\"><p>Which one of the following was not a part of the alliance that fought against the British in the Battle of Buxar (1764)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2348;&#2325;&#2381;&#2360;&#2352; &#2325;&#2368; &#2354;&#2337;&#2364;&#2366;&#2312; (1764) &#2350;&#2375;&#2306; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2379;&#2306; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2354;&#2337;&#2364;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2327;&#2336;&#2348;&#2306;&#2343;&#2344; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2344;&#2361;&#2368;&#2306; &#2341;&#2366;?</p></span>",

      "<span class=\"eqt\">Raghunath Rao</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2328;&#2369;&#2344;&#2366;&#2341; &#2352;&#2366;&#2357;</span>"

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Portuguese presence in India:</p><p>a. The first Portuguese Governor of India was Francisco de Almeida.</p><p>b. Goa was captured by the Portuguese under Afonso de Albuquerque in 1510.</p><p>c. The Portuguese were the first Europeans to establish a trading post in India.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2381;&#2340;&#2327;&#2366;&#2354;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2346;&#2369;&#2352;&#2381;&#2340;&#2327;&#2366;&#2354;&#2368; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2367;&#2360;&#2381;&#2325;&#2379; &#2337;&#2368; &#2309;&#2354;&#2381;&#2350;&#2375;&#2337;&#2366; &#2341;&#2375;&#2404;</p><p>b. &#2327;&#2379;&#2357;&#2366; &#2346;&#2352; 1510 &#2350;&#2375;&#2306; &#2309;&#2347;&#2379;&#2306;&#2360;&#2379; &#2337;&#2368; &#2309;&#2354;&#2381;&#2348;&#2369;&#2325;&#2352;&#2381;&#2325; &#2325;&#2375; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2381;&#2340;&#2327;&#2366;&#2354;&#2367;&#2351;&#2379;&#2306; &#2344;&#2375; &#2325;&#2348;&#2381;&#2332;&#2366; &#2325;&#2352; &#2354;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>c. &#2346;&#2369;&#2352;&#2381;&#2340;&#2327;&#2366;&#2354;&#2368; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2367;&#2325; &#2330;&#2380;&#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2361;&#2354;&#2375; &#2351;&#2370;&#2352;&#2379;&#2346;&#2368;&#2351; &#2341;&#2375;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",

    "correct_option_id": 3,
    "solution": "<p>&bull; <b>Francisco de Almeida was the first Portuguese Governor.</b></p><p>&bull; <b>Goa was captured by Albuquerque in 1510.</b></p><p>&bull; <b>Portuguese were the first Europeans to establish trading posts in India.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Portuguese Arrival and Rule</b></p><p>&bull; <b>Vasco da Gama</b> (1498):</p><p>&#9675; The Portuguese were the first Europeans to establish a presence in India. Vasco da Gama arrived in <b>Calicut</b> (Kerala) on <b>May 17, 1498</b>, guided by the Gujarati sailor <b>Abdul Munik</b>.</p><p>&#9675; He met <b>Zamorin</b>, the ruler of Calicut, and paved the way for Portuguese trade dominance. The first factory was set up in <b>Cochin</b> in 1503.</p><p>&bull; <b>Francisco de Almeida</b>:</p><p>&#9675; Appointed as the first Portuguese governor in 1505, he is known for implementing the \"Blue Water Policy\" aimed at naval supremacy.</p><p>&#9675; He defeated the joint army of Egypt, Turkey, and Gujarat at <b>Diu</b> in 1509.</p><p>&bull; <b>Alphonso de Albuquerque</b>:</p><p>&#9675; The real architect of Portuguese power in India. He:</p><p>&#9632; Captured <b>Goa</b> from the <b>Adil Shah of Bijapur</b> in 1510.</p><p>&#9632; Promoted intermarriage between Portuguese and Indians and banned the practice of <b>Sati</b>.</p><p>&#9632; Expanded Portuguese influence by capturing <b>Malacca</b> and securing rights over the <b>Persian Gulf</b>.</p><p>&bull; <b>Nino de Cunha</b>:</p><p>&#9675; Made <b>Goa</b> the formal capital of Portuguese India in 1530.</p><p>&#9675; Established Portuguese settlements in <b>Santhome (Madras), Hooghly (Bengal),</b> and <b>Diu</b>.</p><p>&bull; <b>Portuguese Contributions to India</b>:</p><p>&#9675; Introduction of <b>printing press</b>, cultivation of <b>tobacco, papaya, orange, litchi, pineapple, cashew, almond,</b> and <b>sweet potato</b>.</p><p>&#9675; The Portuguese ruled parts of India, notably <b>Goa, Daman,</b> and <b>Diu</b> for over 450 years.</p>",

  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the English East India Company:</p><p>a. The English East India Company was established in 1600 during the reign of Queen Elizabeth I.</p><p>b. The Battle of Swally in 1612 was significant as it led to the British gaining permission to trade in India.</p><p>c. The first English factory in India was established at Surat.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; 1600 &#2350;&#2375;&#2306; &#2350;&#2361;&#2366;&#2352;&#2366;&#2344;&#2368; &#2319;&#2354;&#2367;&#2332;&#2366;&#2348;&#2375;&#2341; &#2346;&#2381;&#2352;&#2341;&#2350; &#2325;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2361;&#2369;&#2312; &#2341;&#2368;&#2404;</p><p>b. 1612 &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2366;&#2354;&#2368; &#2325;&#2368; &#2354;&#2337;&#2364;&#2366;&#2312; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2341;&#2368; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2311;&#2360;&#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2379;&#2306; &#2325;&#2379; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2350;&#2367;&#2354;&#2368;&#2404;</p><p>c. &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2368; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2347;&#2376;&#2325;&#2381;&#2335;&#2381;&#2352;&#2368; &#2360;&#2370;&#2352;&#2340; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",

    "solution": "<p>&bull; The English East India Company was founded in 1600.</p><p>&bull; The Battle of Swally in 1612 paved the way for British trading rights.</p><p>&bull; Surat was the location of the first English factory in India.</p><p><b>Further Insight:</b></p><p>&bull; <b>British</b>:</p><p>&#9675; Queen Elizabeth of England gave Right to trade with Eastern countries for 15 years in December, 1600 AD</p><p>&#9675; Captain Hawkins</p><p>&#9632; First Englishman to came India, in a ship named Hector in 1608 AD</p><p>&#9632; First person to reach by sea-Captain Hawkins</p><p>&#9675; 1612 AD-Battle of Savalli</p><p>&#9632; English Captain Best defeated Portuguese army</p><p>&#9675; First factory in Masulipatnam in 1611 AD</p><p>&#9675; In 1613 AD factory in Surat.</p><p>&#9675; Sir Thomas Roe</p><p>&#9632; On January 10, 1616, Sir Thomas Roe met Jahangir</p><p>&#9675; In 1633. East Coast-First factories Balasore and Hariharpura</p><p>&#9675; 1661-King Charles II Marriage with Portuguese Princess Catherine-Bombay dowry</p><p>&#9632; 10 pounds annual rent-Bombay - East India Company</p><p>&#9675; Farrukhsiyar's decrees or Golden Farman</p><p>&#9632; Hamilton cure Farrukhsiyar and free him from illness</p><p>&#9632; Happily give three decrees to britishers</p><p>&bull; 3000 rupees annual tax, free Britishers from customs duty</p><p>&bull; Right to purchase 38 villages in Calcutta</p><p>&bull; Coins minted in Bombay were issued throughout the Mughal Empire</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Anglo-French rivalry in India:</p><p>a. The First Carnatic War (1746-48) was an extension of the War of Austrian Succession in Europe.</p><p>b. The Treaty of Aix-la-Chapelle ended the First Carnatic War.</p><p>c. Dupleix was the French Governor-General who played a significant role in the Second Carnatic War.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2319;&#2306;&#2327;&#2381;&#2354;&#2379;-&#2347;&#2364;&#2381;&#2352;&#2375;&#2306;&#2330; &#2346;&#2381;&#2352;&#2340;&#2367;&#2342;&#2381;&#2357;&#2306;&#2342;&#2381;&#2357;&#2367;&#2340;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2346;&#2361;&#2354;&#2366; &#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325; &#2351;&#2369;&#2342;&#2381;&#2343; (1746-48) &#2351;&#2370;&#2352;&#2379;&#2346; &#2350;&#2375;&#2306; &#2321;&#2360;&#2381;&#2335;&#2381;&#2352;&#2367;&#2351;&#2366;&#2312; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2375; &#2351;&#2369;&#2342;&#2381;&#2343; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2341;&#2366;&#2404;</p><p>b. &#2320;&#2325;&#2381;&#2360;-&#2354;&#2366;-&#2330;&#2376;&#2346;&#2354; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367; &#2344;&#2375; &#2346;&#2381;&#2352;&#2341;&#2350; &#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325; &#2351;&#2369;&#2342;&#2381;&#2343; &#2325;&#2379; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>c. &#2337;&#2369;&#2346;&#2381;&#2354;&#2375;&#2325;&#2381;&#2360; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2368;&#2360;&#2368; &#23     "solution": "<p>&bull; The First Carnatic War was indeed linked to the War of Austrian Succession, and it ended with the Treaty of Aix-la-Chapelle.</p><p>&bull; Dupleix played a significant role in the Second Carnatic War.</p><p><b>Further Insight:</b></p><p>&bull; <b>Carnatic Wars (1746 - 1763)</b></p><p>&#9675; <b>It was</b> Series of three military conflicts in Southern India between British and French for dominance over the Indian subcontinent.</p><p>&#9675; <b>First Carnatic War (1746-1748):</b></p><p>&#9632; <b>Cause:</b> Spillover of the Austrian War of Succession in Europe.</p><p>&#9632; <b>Opponents:</b> British East India Company vs. French East India Company.</p><p>&#9632; <b>Outcome:</b> Treaty of Aix-la-Chapelle (1748) restored conquered territories, no clear victor.</p><p>&#9675; <b>Second Carnatic War (1749-1754):</b></p><p>&#9632; <b>Cause:</b> Succession disputes in Carnatic and Hyderabad.</p><p>&#9632; <b>Key Players:</b> British backed <b>Muhammad Ali</b>, French supported <b>Chanda Sahib</b>.</p><p>&#9632; <b>Outcome:</b> British victory; French political influence weakened.</p><p>&#9675; <b>Third Carnatic War (1756-1763):</b></p><p>&#9632; <b>Cause:</b> Seven Years' War in Europe.</p><p>&#9632; <b>Key Battle: Battle of Wandiwash</b> (1760)  -  decisive British victory.</p><p>&#9632; <b>Outcome:</b> Treaty of Paris (1763); British dominance in India solidified, French influence declined.</p>",

    "solution": "<p>&bull; <b>Carnatic Wars (1746 - 1763)</b></p><p>&#9675; <b>It was</b> Series of three military conflicts in Southern India between British and French for dominance over the Indian subcontinent.</p><p>&#9675; <b>First Carnatic War (1746-1748):</b></p><p>&#9632; <b>Cause:</b> Spillover of the Austrian War of Succession in Europe.</p><p>&#9632; <b>Opponents:</b> British East India Company vs. French East India Company.</p><p>&#9632; <b>Outcome:</b> Treaty of Aix-la-Chapelle (1748) restored conquered territories, no clear victor.</p><p>&#9675; <b>Second Carnatic War (1749-1754):</b></p><p>&#9632; <b>Cause:</b> Succession disputes in Carnatic and Hyderabad.</p><p>&#9632; <b>Key Players:</b> British backed <b>Muhammad Ali</b>, French supported <b>Chanda Sahib</b>.</p><p>&#9632; <b>Outcome:</b> British victory; French political influence weakened.</p><p>&#9675; <b>Third Carnatic War (1756-1763):</b></p><p>&#9632; <b>Cause:</b> Seven Years' War in Europe.</p><p>&#9632; <b>Key Battle: Battle of Wandiwash</b> (1760)  -  decisive British victory.</p><p>&#9632; <b>Outcome:</b> Treaty of Paris (1763); British dominance in India solidified, French influence declined.</p><p>&bull; <b>Battle of Plassey (1757)</b></p><p>&bull; <b>Date:</b> June 23, 1757</p><p>&bull; <b>Location:</b> Plassey (Palashi), Bengal</p><p>&bull; <b>Opponents:</b></p><p>&#9675; <b>British East India Company</b> led by <b>Robert Clive</b></p><p>&#9675; <b>Nawab of Bengal</b> Siraj-ud-Daulah, <b>supported by the French</b></p><p>&bull; <b>Cause:</b> The conflict arose due to Siraj-ud-Daulah's opposition to British interference in Bengal and the fortification of Calcutta.</p><p>&bull; Mir Jafar, the commander of Siraj-ud-Daulah's army, betrayed him by not engaging his troops, leading to the Nawab's defeat.</p><p>&bull; <b>Outcome:</b></p><p>&#9675; <b>British Victory:</b> Secured control over Bengal.</p>",

    "solution": "<p>&bull; <b>Carnatic Wars (1746 - 1763)</b></p><p>&#9675; <b>It was</b> Series of three military conflicts in Southern India between British and French for dominance over the Indian subcontinent.</p><p>&#9675; <b>First Carnatic War (1746-1748):</b></p><p>&#9632; <b>Cause:</b> Spillover of the Austrian War of Succession in Europe.</p><p>&#9632; <b>Opponents:</b> British East India Company vs. French East India Company.</p><p>&#9632; <b>Outcome:</b> Treaty of Aix-la-Chapelle (1748) restored conquered territories, no clear victor.</p><p>&#9675; <b>Second Carnatic War (1749-1754):</b></p><p>&#9632; <b>Cause:</b> Succession disputes in Carnatic and Hyderabad.</p><p>&#9632; <b>Key Players:</b> British backed <b>Muhammad Ali</b>, French supported <b>Chanda Sahib</b>.</p><p>&#9632; <b>Outcome:</b> British victory; French political influence weakened.</p><p>&#9675; <b>Third Carnatic War (1756-1763):</b></p><p>&#9632; <b>Cause:</b> Seven Years' War in Europe.</p><p>&#9632; <b>Key Battle: Battle of Wandiwash</b> (1760)  -  decisive British victory.</p><p>&#9632; <b>Outcome:</b> Treaty of Paris (1763); British dominance in India solidified, French influence declined.</p>",

    "question": "<span class=\"eqt\"><p>Who is considered the real founder of Portuguese power in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2381;&#2340;&#2327;&#2366;&#2354;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325; &#2325;&#2367;&#2360;&#2375; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>&bull; <b>Alphonso de Albuquerque</b> is considered the real founder of Portuguese power in India. He captured Goa from the Adil Shah of Bijapur in 1510 AD and laid the foundation of the Portuguese colonial empire.</p><p>&bull; <b>Vasco da Gama</b> (1) discovered the sea route to India in 1498.</p><p>&bull; <b>Francisco de Almeida</b> (2) was the first Portuguese governor in India and is known for his \"Blue Water Policy.\"</p><p>&bull; <b>Nino de Cunha</b> (4) made Goa the formal capital of Portuguese territories in India.</p><p><b>Further Insight:</b></p><p>&bull; <b>Portuguese Arrival and Rule</b></p><p>&bull; <b>Vasco da Gama</b> (1498):</p><p>&#9675; The Portuguese were the first Europeans to establish a presence in India. Vasco da Gama arrived in <b>Calicut</b> (Kerala) on <b>May 17, 1498</b>, guided by the Gujarati sailor <b>Abdul Munik</b>.</p><p>&#9675; He met <b>Zamorin</b>, the ruler of Calicut, and paved the way for Portuguese trade dominance. The first factory was set up in <b>Cochin</b> in 1503.</p><p>&bull; <b>Francisco de Almeida</b>:</p><p>&#9675; Appointed as the first Portuguese governor in 1505, he is known for implementing the \"Blue Water Policy\" aimed at naval supremacy.</p><p>&#9675; He defeated the joint army of Egypt, Turkey, and Gujarat at <b>Diu</b> in 1509.</p><p>&bull; <b>Alphonso de Albuquerque</b>:</p><p>&#9675; The real architect of Portuguese power in India. He:</p><p>&#9632; Captured <b>Goa</b> from the <b>Adil Shah of Bijapur</b> in 1510.</p><p>&#9632; Promoted intermarriage between Portuguese and Indians and banned the practice of <b>Sati</b>.</p><p>&#9632; Expanded Portuguese influence by capturing <b>Malacca</b> and securing rights over the <b>Persian Gulf</b>.</p><p>&bull; <b>Nino de Cunha</b>:</p><p>&#9675; Made <b>Goa</b> the formal capital of Portuguese India in 1530.</p><p>&#9675; Established Portuguese settlements in <b>Santhome (Madras), Hooghly (Bengal),</b> and <b>Diu</b>.</p><p>&bull; <b>Portuguese Contributions to India</b>:</p><p>&#9675; Introduction of <b>printing press</b>, cultivation of <b>tobacco, papaya, orange, litchi, pineapple, cashew, almond,</b> and <b>sweet potato</b>.</p><p>&#9675; The Portuguese ruled parts of India, notably <b>Goa, Daman,</b> and <b>Diu</b> for over 450 years.</p>",
