    "question": "<span class=\"eqt\"><p>In cricket, what does the term \"Duck\" refer to? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2350;&#2375;&#2306; \"&#2337;&#2325;\" &#2358;&#2348;&#2381;&#2342; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376;?</p></span>",

    "solution": "<p>&bull; Duck refers to when a batsman gets out without scoring any runs. </p><p>&bull; Block or defensive shot: A defensive shot played with soft hands</p><p>&bull; LBW (Leg Before Wicket): A delivery that hits the batsman's leg before the stumps </p><p>&bull; A shot crossing the boundary without touching the ground is called a \"six.\" </p><p><b>Further Insight:</b></p><p>&bull; <b>Cricket Important Terminologies:</b> </p><p>&#9675; <b>LBW (Leg Before Wicket)</b>  -  A way of getting out. </p><p>&#9675; <b>Yorker</b>  -  A ball pitched right at the batsman's feet. </p><p>&#9675; <b>Duck</b>  -  When a batsman gets out without scoring a run. </p><p>&#9675; <b>Bouncer</b>  -  A short-pitched ball that bounces at chest or head height. </p><p>&#9675; <b>Sledging</b>  -  Verbal taunting between players. </p><p>&#9675; <b>Cover Drive</b>  -  A classic shot played on the off side. </p>",

    "question": "<span class=\"eqt\"><p>Which term is used in badminton for a shot that just clears the net and lands close to it? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2376;&#2337;&#2350;&#2367;&#2306;&#2335;&#2344; &#2350;&#2375;&#2306; &#2313;&#2360; &#2358;&#2377;&#2335; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344; &#2360;&#2366; &#2358;&#2348;&#2381;&#2342; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2344;&#2375;&#2335; &#2325;&#2379; &#2346;&#2366;&#2352; &#2325;&#2352;&#2325;&#2375; &#2313;&#2360;&#2325;&#2375; &#2325;&#2352;&#2368;&#2348; &#2327;&#2367;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Smash</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2352;&#2332;</span>",
      "<span class=\"eqt\">Drop Shot</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2381;&#2352;&#2377;&#2346; &#2358;&#2377;&#2335;</span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; \"Drop Shot\" refers to a soft shot that barely clears the net and falls close to it. </p><p>&bull; \"Smash\" refers to a powerful downward shot. </p><p>&bull; \"Clear\" is a shot that sends the shuttlecock to the back of the opponent's court. </p><p>&bull; \"Drive\" refers to a fast, flat shot in badminton. </p><p><b>Further Insight:</b></p><p>&bull; <b>Badminton Important Terminologies:</b> </p><p>&#9675; <b>Smash</b>  -  A powerful downward shot aimed at the opponent's court. </p><p>&#9675; <b>Drop Shot</b>  -  A soft shot that falls just over the net. </p><p>&#9675; <b>Clear</b>  -  A shot that sends the shuttlecock to the back of the opponent's court. </p><p>&#9675; <b>Rally</b>  -  A sequence of shots between players before a point is won. </p><p>&#9675; <b>Drive</b>  -  A fast and flat shot over the net. </p><p>&#9675; <b>Deuce</b>  -  When both players have 20 points each, requiring a two-point lead to win. </p>",

    "question": "<span class=\"eqt\"><p>In football, what is the term used when a player scores three goals in a single match? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2369;&#2335;&#2348;&#2377;&#2354; &#2350;&#2375;&#2306;, &#2332;&#2348; &#2325;&#2379;&#2312; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2368; &#2319;&#2325; &#2361;&#2368; &#2350;&#2376;&#2330; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2327;&#2379;&#2354; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2313;&#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2358;&#2348;&#2381;&#2342; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>&bull; \"Hat-trick\" refers to when a player scores three goals in one match. </p><p>&bull; \"Offside\" is a rule where a player is positioned too close to the opponent's goal. </p><p>&bull; \"Corner Kick\" is awarded when the ball crosses the goal line after touching a defender. </p><p>&bull; \"Penalty Kick\" is awarded for a foul in the penalty area. </p><p><b>Further Insight:</b></p><p>&bull; <b>Football Important Terminologies:</b> </p><p>&#9675; </p><p>&#9675; <b>Offside</b>  -  A player is in an offside position if they are nearer to the opponent's goal line than both the ball and the second-last defender. </p><p>&#9675; <b>Free Kick</b>  -  Awarded after a foul, can be direct or indirect. </p><p>&#9675; <b>Corner Kick</b>  -  A kick awarded to the attacking team when the ball crosses the goal line after being touched by a defending player. </p><p>&#9675; <b>Penalty Kick</b>  -  Awarded when a foul occurs within the penalty box. </p><p>&#9675; <b>Hat-trick</b>  -  When a player scores three goals in a single match. </p><p>&#9675; <b>Yellow/Red Card</b>  -  Disciplinary measures for misconduct. </p>",
