    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following observations was made by Hans Christian Oersted in 1820? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2357;&#2354;&#2379;&#2325;&#2344; &#2361;&#2306;&#2360; &#2325;&#2381;&#2352;&#2367;&#2358;&#2381;&#2330;&#2367;&#2351;&#2344; &#2323;&#2352;&#2381;&#2360;&#2381;&#2335;&#2375;&#2337; &#2344;&#2375; 1820 &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Moving charges do not produce a magnetic field.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2340;&#2367;&#2358;&#2368;&#2354; &#2310;&#2357;&#2375;&#2358; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2375;&#2404;</span>",
      "<span class=\"eqt\">A current in a straight wire causes a noticeable deflection in a nearby magnetic compass needle.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2343;&#2375; &#2340;&#2366;&#2352; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;&#2367;&#2340; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2343;&#2366;&#2352;&#2366;, &#2346;&#2366;&#2360; &#2360;&#2381;&#2341;&#2367;&#2340; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2306;&#2346;&#2366;&#2360; &#2360;&#2369;&#2312; &#2350;&#2375;&#2306; &#2343;&#2381;&#2351;&#2366;&#2344; &#2342;&#2375;&#2344;&#2375; &#2351;&#2379;&#2327;&#2381;&#2351; &#2357;&#2367;&#2325;&#2381;&#2359;&#2375;&#2346; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Electricity and magnetism are unrelated phenomena.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2324;&#2352; &#2330;&#2369;&#2306;&#2348;&#2325;&#2340;&#2381;&#2357; &#2309;&#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2328;&#2335;&#2344;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Light is not an electromagnetic wave.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2330;&#2369;&#2350;&#2381;&#2348;&#2325;&#2368;&#2351; &#2340;&#2352;&#2306;&#2327; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;.</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; In 1820, Hans Christian Oersted noticed during a lecture demonstration that a current in a straight wire caused a noticeable deflection in a nearby magnetic compass needle. </p><p>&#183; He investigated this phenomenon and concluded that moving charges or currents produced a magnetic field. </p><p>&#183; The realization that electricity and magnetism were intimately related stemmed from this discovery. </p><p>&#183; The understanding of light as an electromagnetic wave came later with Maxwell.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The magnetic field lines of a bar magnet (or a solenoid) have which of the following characteristics? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2331;&#2337;&#2364; &#2330;&#2369;&#2306;&#2348;&#2325; (&#2351;&#2366; &#2319;&#2325; &#2360;&#2379;&#2354;&#2375;&#2344;&#2379;&#2311;&#2337;) &#2325;&#2368; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2352;&#2375;&#2326;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2319;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">They originate from the north pole and end at the south pole outside the magnet and do not form closed loops.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2343;&#2381;&#2352;&#2369;&#2357; &#2360;&#2375; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2330;&#2369;&#2306;&#2348;&#2325; &#2325;&#2375; &#2348;&#2366;&#2361;&#2352; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2368; &#2343;&#2381;&#2352;&#2369;&#2357; &#2346;&#2352; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; &#2348;&#2306;&#2342; &#2354;&#2370;&#2346; &#2344;&#2361;&#2368;&#2306; &#2348;&#2344;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They form continuous closed loops.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2344;&#2367;&#2352;&#2306;&#2340;&#2352; &#2348;&#2306;&#2342; &#2354;&#2370;&#2346; &#2348;&#2344;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The tangent to the field line at a given point does not represent the direction of the net magnetic field B at that point.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2342;&#2367;&#2319; &#2327;&#2319; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2352;&#2375;&#2326;&#2366; &#2325;&#2368; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366; &#2313;&#2360; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2344;&#2375;&#2335; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; B &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2325;&#2379; &#2344;&#2361;&#2368;&#2306; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Magnetic field lines can intersect.</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2352;&#2375;&#2326;&#2366;&#2319;&#2306; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2325;&#2366;&#2335; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The magnetic field lines of a magnet (or a solenoid) form continuous closed loops.</p><p>&#183; Unlike electric field lines, they do not begin and end on charges. </p><p>&#183; The tangent to the field line at a given point represents the direction of the net magnetic field B at that point, and magnetic field lines do not intersect because the direction of the magnetic field would not be unique at the point of intersection.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The Biot-Savart law is used to determine the magnetic field due to which of the following? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2366;&#2351;&#2379;&#2335;-&#2360;&#2366;&#2357;&#2352;&#2381;&#2340; &#2344;&#2367;&#2351;&#2350; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A stationary electric charge.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2381;&#2341;&#2367;&#2352; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2310;&#2357;&#2375;&#2358;.</span>",
      "<span class=\"eqt\">A current-carrying element.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2343;&#2366;&#2352;&#2366;-&#2357;&#2366;&#2361;&#2325; &#2340;&#2340;&#2381;&#2357;.</span>",
      "<span class=\"eqt\">A uniform electric field.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2360;&#2350;&#2366;&#2344; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;.</span>",
      "<span class=\"eqt\">A permanent magnet at a large distance.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2348;&#2337;&#2364;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2330;&#2369;&#2350;&#2381;&#2348;&#2325;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Biot-Savart law specifically relates to the magnetic field generated by an electric current.</p><p>It states that the magnetic field dB at a point due to a current element I dl is given by: </p><p>dB = (&#956;&#8320;/4&#960;)  X  (I dl  X  r&#770;)/r&#178;</p><p>This law applies to a <b>current-carrying element</b>. </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Match the magnetic quantities with their units:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column A</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column B</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Magnetic Field (B)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. A m&#178;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Magnetic Moment (m)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. A m&#8315;&#185;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Magnetisation (M)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Tesla (T)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Magnetic Intensity (H)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Weber (Wb)</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2352;&#2366;&#2358;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2368; &#2311;&#2325;&#2366;&#2311;&#2351;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; (B)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. A m&#178;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2310;&#2328;&#2370;&#2352;&#2381;&#2339; (&#2350;&#2368;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. A m&#8315;&#185;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2330;&#2369;&#2350;&#2381;&#2348;&#2325;&#2340;&#2381;&#2357; (&#2350;&#2368;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2335;&#2375;&#2360;&#2381;&#2354;&#2366; (&#2335;&#2368;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2340;&#2368;&#2357;&#2381;&#2352;&#2340;&#2366; (&#2319;&#2330;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2357;&#2375;&#2348;&#2352; (&#2337;&#2348;&#2381;&#2354;&#2381;&#2351;&#2370;&#2348;&#2368;)</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i &rarr; c, ii &rarr; a, iii &rarr; b, iv &rarr; d</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; a, iii &rarr; b, iv &rarr; d</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; a, iii &rarr; b, iv &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; a, iii &rarr; b, iv &rarr; b</span>",
      "<span class=\"eqt\">i &rarr; a, ii &rarr; c, iii &rarr; d, iv &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; c, iii &rarr; d, iv &rarr; b</span>",
      "<span class=\"eqt\">i &rarr; c, ii &rarr; b, iii &rarr; a, iv &rarr; b</span><span class=\"hqt\" style=\"display:none\">i &rarr; c, ii &rarr; b, iii &rarr; a, iv &rarr; b</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The unit of <b>Magnetic Field (B)</b> is <b>Tesla (T)</b>.</p><p>&#183; The unit of <b>Magnetic Moment (m)</b> is <b>A m&#178;</b>.</p><p>&#183; The unit of <b>Magnetisation (M)</b> is <b>A m</b><b>&#8315;</b><b>&#185;</b>.</p><p>&#183; The unit of <b>Magnetic Intensity (H)</b> is <b>A m</b><b>&#8315;</b><b>&#185;</b>.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are correct regarding the magnetic properties of materials?</p><p>I. Diamagnetic substances have a small positive magnetic susceptibility. </p><p>II. Paramagnetic substances have a small negative magnetic susceptibility. </p><p>III. Ferromagnetic substances can retain magnetisation even after the external field is removed.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2375; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2327;&#2369;&#2339;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2350;&#2375;&#2306; &#2341;&#2379;&#2337;&#2364;&#2368; &#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2360;&#2306;&#2357;&#2375;&#2342;&#2344;&#2358;&#2368;&#2354;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2309;&#2344;&#2369;&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2350;&#2375;&#2306; &#2341;&#2379;&#2337;&#2364;&#2368; &#2344;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2360;&#2306;&#2357;&#2375;&#2342;&#2344;&#2358;&#2368;&#2354;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>III. &#2354;&#2380;&#2361;&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2348;&#2366;&#2361;&#2352;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; &#2361;&#2335;&#2366;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2349;&#2368; &#2330;&#2369;&#2306;&#2348;&#2325;&#2340;&#2381;&#2357; &#2325;&#2379; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I and II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Only III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">Only I and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II, and III</span><span class=\"hqt\" style=\"display:none\">I, II, &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Diamagnetic substances have a small positive magnetic susceptibility. This is incorrect. </b>Diamagnetic substances have a small negative magnetic susceptibility (&#967; &lt; 0). </p><p>When placed in an external magnetic field, they develop a weak magnetization in the opposite direction to the applied field, resulting in a repulsive effect.</p><p><b>Paramagnetic substances have a small negative magnetic susceptibility</b>. <b>This is incorrect.</b> Paramagnetic substances have a small positive magnetic susceptibility (&#967; &gt; 0). </p><p>When placed in an external magnetic field, they develop a weak magnetization in the same direction as the applied field, resulting in a weak attractive effect.</p><p><b>Ferromagnetic substances can retain magnetisation even after the external field is removed. This is correct.</b> </p><p>Ferromagnetic materials (such as iron, cobalt, and nickel) can retain their magnetization even after the external magnetic field is removed. </p><p>This property is called remanence or magnetic hysteresis and is the basis for permanent magnets.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The force on a straight conductor of length l carrying a steady current I in a uniform external magnetic field B is given by: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325;&#2360;&#2350;&#2366;&#2344; &#2348;&#2366;&#2361;&#2381;&#2351; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; B &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2352; &#2343;&#2366;&#2352;&#2366; I &#2357;&#2361;&#2344; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; l &#2354;&#2350;&#2381;&#2348;&#2366;&#2312; &#2325;&#2375; &#2360;&#2368;&#2343;&#2375; &#2330;&#2366;&#2354;&#2325; &#2346;&#2352; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2348;&#2354; &#2344;&#2367;&#2350;&#2381;&#2344; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">F = q (v  X  B).</span><span class=\"hqt\" style=\"display:none\">F = q (v  X  B).</span>",
      "<span class=\"eqt\">F = (lq) v X  B.</span><span class=\"hqt\" style=\"display:none\">F = (lq) v X  B.</span>",
      "<span class=\"eqt\">F = I (l  X  B).</span><span class=\"hqt\" style=\"display:none\">F = I (l  X  B).</span>",
      "<span class=\"eqt\">F = qE.</span><span class=\"hqt\" style=\"display:none\">F = qE.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The force on a straight conductor of length l and carrying a steady current I in a uniform external magnetic field B is given by F = I l  X  B, where the direction of l is given by the direction of the current. </p><p>This is derived from the Lorentz force acting on the moving charge carriers in the wire.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The magnetic force on a moving charged particle in a magnetic field is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2327;&#2340;&#2367;&#2358;&#2368;&#2354; &#2310;&#2357;&#2375;&#2358;&#2367;&#2340; &#2325;&#2339; &#2346;&#2352; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2348;&#2354; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">always parallel to the magnetic field.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2342;&#2376;&#2357; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2404;</span>",
      "<span class=\"eqt\">always in the direction of motion of the particle.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2342;&#2376;&#2357; &#2325;&#2339; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">perpendicular to both the velocity of the particle and the magnetic field.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2339; &#2325;&#2375; &#2357;&#2375;&#2327; &#2324;&#2352; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2306;&#2348;&#2357;&#2340;&#2404;</span>",
      "<span class=\"eqt\">independent of the velocity of the particle.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2339; &#2325;&#2375; &#2357;&#2375;&#2327; &#2360;&#2375; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The magnetic force on a charged particle moving in a magnetic field is given by the Lorentz force equation: </p><p>F = q(v  X  B), where F is the force vector, q is the charge of the particle, v is the velocity vector, and B is the magnetic field vector. </p><p>According to the properties of the cross product, the resulting force is <b>perpendicular to both the velocity of the particle and the magnetic field</b>.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Gauss's law for magnetism states that the net magnetic flux through any closed surface is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2369;&#2306;&#2348;&#2325;&#2340;&#2381;&#2357; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2377;&#2360; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350; &#2325;&#2361;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2348;&#2306;&#2342; &#2360;&#2340;&#2361; &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2358;&#2369;&#2342;&#2381;&#2343; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2347;&#2381;&#2354;&#2325;&#2381;&#2360; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">proportional to the net magnetic pole enclosed.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2354;&#2327;&#2381;&#2344; &#2358;&#2369;&#2342;&#2381;&#2343; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2343;&#2381;&#2352;&#2369;&#2357; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368;&#2404;</span>",
      "<span class=\"eqt\">equal to zero.</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2370;&#2344;&#2381;&#2351; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352;.</span>",
      "<span class=\"eqt\">proportional to the current passing through the surface.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2361; &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368;&#2404;</span>",
      "<span class=\"eqt\">always positive.</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2350;&#2375;&#2358;&#2366; &#2361;&#2368; &#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Gauss's law for magnetism states that the net magnetic flux through any closed surface is zero, mathematically expressed as &#8750; B.dS = 0. </p><p>This law reflects the fact that isolated magnetic poles (monopoles) are not known to exist.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Match the terms related to magnetic fields with their corresponding descriptions:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column A</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column B</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Magnetic Field Lines</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Force experienced by a moving charge in electric and magnetic fields</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Lorentz Force</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Continuous closed loops representing the direction of the magnetic field</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Biot-Savart Law</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Principle stating the magnetic field of several sources is the vector addition of the magnetic field of each individual source</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Superposition Principle</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Law describing the magnetic field produced by a current element</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2360;&#2306;&#2327;&#2340; &#2357;&#2367;&#2357;&#2352;&#2339; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2324;&#2352; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2319;&#2325; &#2327;&#2340;&#2367;&#2358;&#2368;&#2354; &#2310;&#2357;&#2375;&#2358; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2344;&#2369;&#2349;&#2357; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2348;&#2354;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2354;&#2379;&#2352;&#2375;&#2344;&#2381;&#2335;&#2381;&#2332;&#2364; &#2348;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2344;&#2367;&#2352;&#2306;&#2340;&#2352; &#2348;&#2306;&#2342; &#2354;&#2370;&#2346;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2348;&#2366;&#2351;&#2379;&#2335;-&#2360;&#2366;&#2357;&#2352;&#2381;&#2340; &#2344;&#2367;&#2351;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2325;&#2312; &#2360;&#2381;&#2352;&#2379;&#2340;&#2379;&#2306; &#2325;&#2375; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; &#2348;&#2340;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2360;&#2381;&#2352;&#2379;&#2340; &#2325;&#2375; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2366; &#2360;&#2342;&#2367;&#2358; &#2351;&#2379;&#2327; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2360;&#2369;&#2346;&#2352;&#2346;&#2379;&#2332;&#2367;&#2358;&#2344; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2343;&#2366;&#2352;&#2366; &#2340;&#2340;&#2381;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2344;&#2367;&#2351;&#2350;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i &rarr; a, ii &rarr; b, iii &rarr; d, iv &rarr; c</span><span class=\"hqt\" style=\"display:none\">i &rarr; a, ii &rarr; b, iii &rarr; d, iv &rarr; c</span>",

    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Magnetic Field Lines</b> form continuous closed loops.</p><p>&#183; The <b>Lorentz Force</b> is the total force on a charge due to both electric and magnetic fields.</p><p>&#183; The <b>Biot-Savart Law</b> gives the magnetic field dB due to a current element.</p><p>&#183; The <b>Superposition Principle</b> states that the net magnetic field is the vector sum of the fields from individual sources.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The magnetic field inside a long solenoid carrying a current I and having n turns per unit length is given by: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2354;&#2306;&#2348;&#2368; &#2346;&#2352;&#2367;&#2344;&#2366;&#2354;&#2367;&#2325;&#2366; &#2325;&#2375; &#2309;&#2306;&#2342;&#2352; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2366; I &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2340;&#2341;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367; &#2311;&#2325;&#2366;&#2312; &#2354;&#2306;&#2348;&#2366;&#2312; &#2350;&#2375;&#2306; n &#2347;&#2375;&#2352;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">B = &#181;&#8320; I / (2&#960;r).</span><span class=\"hqt\" style=\"display:none\">B = &#181;&#8320; I / (2&#960;r).</span>",
      "<span class=\"eqt\">B = &#181;&#8320; n / I.</span><span class=\"hqt\" style=\"display:none\">B = &#181;&#8320; n / I.</span>",
      "<span class=\"eqt\">B = &#181;&#8320; n I.</span><span class=\"hqt\" style=\"display:none\">B = &#181;&#8320; n I.</span>",
      "<span class=\"eqt\">B = &#181;&#8320; I / (2 n).</span><span class=\"hqt\" style=\"display:none\">B = &#181;&#8320; I / (2 n).</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The magnetic field inside a long solenoid is uniform and parallel to the axis of the solenoid. Its magnitude is given by the formula: B = &#956;&#8320;nI</p><p>Where:</p><p>&#183; B is the magnetic field strength</p><p>&#183; &#956;&#8320; is the permeability of free space (4&#960;  X  10&#8315;&#8311; H/m)</p><p>&#183; n is the number of turns per unit length of the solenoid</p><p>&#183; I is the current flowing through the solenoid</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are correct?</p><p>I. Moving charges or currents produce a magnetic field in the surrounding space. </p><p>II. The magnetic force on a moving charged particle is always parallel to its velocity. </p><p>III. The net magnetic flux through any closed surface is zero.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2327;&#2340;&#2367;&#2358;&#2368;&#2354; &#2310;&#2357;&#2375;&#2358; &#2351;&#2366; &#2343;&#2366;&#2352;&#2366;&#2319;&#2305; &#2310;&#2360;-&#2346;&#2366;&#2360; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2350;&#2375;&#2306; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2327;&#2340;&#2367;&#2358;&#2368;&#2354; &#2310;&#2357;&#2375;&#2358;&#2367;&#2340; &#2325;&#2339; &#2346;&#2352; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2348;&#2354; &#2361;&#2350;&#2375;&#2358;&#2366; &#2313;&#2360;&#2325;&#2375; &#2357;&#2375;&#2327; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2348;&#2306;&#2342; &#2360;&#2340;&#2361; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2358;&#2369;&#2342;&#2381;&#2343; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2358;&#2370;&#2344;&#2381;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II, and III</span><span class=\"hqt\" style=\"display:none\">I, II, &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Statement I is correct:</b> According to electromagnetic theory, a moving charge or current generates a magnetic field in the surrounding space.</p><p>&#183; <b>Statement II is incorrect:</b> The magnetic force on a moving charged particle is given by <b>F = q(v  X  B)</b>, which means the force is <b>perpendicular</b> to both the velocity and the magnetic field, not parallel.</p><p>&#183; <b>Statement III is correct:</b> According to <b>Gauss's law for magnetism</b>, the net magnetic flux through any closed surface is always zero because magnetic monopoles do not exist  -  magnetic field lines form closed loops.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>According to Ampere's Law, the line integral of the magnetic field around a closed loop is proportional to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2381;&#2346;&#2367;&#2351;&#2352; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2319;&#2325; &#2348;&#2306;&#2342; &#2354;&#2370;&#2346; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2366; &#2352;&#2375;&#2326;&#2368;&#2351; &#2360;&#2350;&#2366;&#2325;&#2354;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">The electric field inside the loop</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2370;&#2346; &#2325;&#2375; &#2309;&#2306;&#2342;&#2352; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">The electric current passing through the area enclosed by the loop</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2370;&#2346; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2352;&#2367;&#2348;&#2342;&#2381;&#2343; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2343;&#2366;&#2352;&#2366;</span>",
      "<span class=\"eqt\">The magnetic flux through the loop</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2370;&#2346; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;</span>",
      "<span class=\"eqt\">The electric flux through the loop</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2370;&#2346; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Ampere's Law states that &#8750;<b>B</b>&#183;d<b>l</b> = &#956;&#8320;I, where <b>B</b> is the magnetic field, d<b>l</b> is an infinitesimal segment of the closed loop, &#956;&#8320; is the permeability of free space, and I is the total electric current passing through the area enclosed by the loop. </p><p>This means the line integral of the magnetic field around a closed loop is directly proportional to the current enclosed by the loop, </p><p>Further information:</p><p>&#183; <b>Ampere's Law</b> relates the <b>enclosed current</b> to the <b>magnetic field</b> around a closed loop.</p><p>&#183; <b>Lorentz Force</b> describes the <b>force on a moving charge</b> due to <b>electric and magnetic fields</b>.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) accurately describe(s) magnetic field lines?</p><p>I. The magnetic field lines of a magnet form continuous closed loops. </p><p>II. The tangent to the field line at a point gives the direction of the magnetic field at that point. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2352;&#2375;&#2326;&#2366;&#2323;&#2306; &#2325;&#2366; &#2360;&#2335;&#2368;&#2325; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p><p>I. &#2319;&#2325; &#2330;&#2369;&#2306;&#2348;&#2325; &#2325;&#2368; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305; &#2344;&#2367;&#2352;&#2306;&#2340;&#2352; &#2348;&#2306;&#2342; &#2354;&#2370;&#2346; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2325;&#2367;&#2360;&#2368; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2352;&#2375;&#2326;&#2366; &#2325;&#2368; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366; &#2313;&#2360; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2348;&#2340;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2364;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I is correct:</b> Magnetic field lines always form <b>continuous closed loops</b>, emerging from the north pole of a magnet and entering the south pole, and continuing through the magnet back to the north pole.</p><p><b>Statement II is correct:</b> At any point on a magnetic field line, the <b>tangent to the line</b> represents the <b>direction</b> of the magnetic field at that point.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following materials exhibits strong magnetization when placed in an external magnetic field and tends to move from a region of weak magnetic field to a strong magnetic field? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2348;&#2366;&#2361;&#2352;&#2368; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2352;&#2326;&#2375; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2350;&#2332;&#2348;&#2370;&#2340; &#2330;&#2369;&#2306;&#2348;&#2325;&#2340;&#2381;&#2357; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2325;&#2350;&#2332;&#2379;&#2352; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2375; &#2350;&#2332;&#2348;&#2370;&#2340; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2323;&#2352; &#2348;&#2338;&#2364;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Diamagnetic substances.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;.</span>",
      "<span class=\"eqt\">Paramagnetic substances.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2369;&#2350;&#2381;&#2348;&#2325;&#2368;&#2351; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;.</span>",
      "<span class=\"eqt\">Ferromagnetic substances.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2380;&#2361;&#2330;&#2369;&#2350;&#2381;&#2348;&#2325;&#2368;&#2351; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;.</span>",
      "<span class=\"eqt\">All magnetic substances.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2330;&#2369;&#2350;&#2381;&#2348;&#2325;&#2368;&#2351; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Ferromagnetic substances</b> (like iron, cobalt, and nickel) exhibit <b>strong magnetization</b> in the presence of an external magnetic field. They have a high magnetic permeability and tend to move <b>from a region of weaker magnetic field to a region of stronger magnetic field</b> due to their strong alignment of magnetic domains.</p><p>&#183; <b>Diamagnetic substances</b> are repelled by magnetic fields and move from strong to weak field regions.</p><p>&#183; <b>Paramagnetic substances</b> are weakly attracted to magnetic fields but show <b>only slight magnetization</b>.</p><p>&#183; <b>Ferromagnetic substances</b> are the only ones with <b>strong magnetization</b>.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>The earth behaves as a magnet with the magnetic field pointing approximately from the: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2319;&#2325; &#2330;&#2369;&#2306;&#2348;&#2325; &#2325;&#2368; &#2340;&#2352;&#2361; &#2357;&#2381;&#2351;&#2357;&#2361;&#2366;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2354;&#2327;&#2349;&#2327; &#2311;&#2360; &#2323;&#2352; &#2311;&#2306;&#2327;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">geographic north to the geographic south.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2313;&#2340;&#2381;&#2340;&#2352; &#2360;&#2375; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2340;&#2325;&#2404;</span>",
      "<span class=\"eqt\">geographic east to the geographic west.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2346;&#2370;&#2352;&#2381;&#2357; &#2360;&#2375; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2340;&#2325;&#2404;</span>",
      "<span class=\"eqt\">geographic south to the geographic north.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2360;&#2375; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2313;&#2340;&#2381;&#2340;&#2352; &#2340;&#2325;&#2404;</span>",
      "<span class=\"eqt\">equator towards the poles.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2350;&#2343;&#2381;&#2351; &#2352;&#2375;&#2326;&#2366; &#2360;&#2375; &#2343;&#2381;&#2352;&#2369;&#2357;&#2379;&#2306; &#2325;&#2368; &#2323;&#2352;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Earth acts like a <b>giant bar magnet tilted slightly from the axis of rotation</b>. The <b>magnetic field lines emerge from the magnetic south pole (near the geographic north)</b> and enter the <b>magnetic north pole (near the geographic south)</b>.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>The force between two parallel current-carrying conductors is a consequence of: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2350;&#2366;&#2344;&#2381;&#2340;&#2352; &#2343;&#2366;&#2352;&#2366;&#2357;&#2366;&#2361;&#2368; &#2330;&#2366;&#2354;&#2325;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2348;&#2354; &#2325;&#2367;&#2360;&#2325;&#2366; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">electrostatic forces between the moving charges.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2340;&#2367;&#2358;&#2368;&#2354; &#2310;&#2357;&#2375;&#2358;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340;-&#2360;&#2381;&#2341;&#2376;&#2340;&#2367;&#2325; &#2348;&#2354;&#2404;</span>",
      "<span class=\"eqt\">the magnetic field produced by one conductor exerting a force on the moving charges in the other conductor.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2330;&#2366;&#2354;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2370;&#2360;&#2352;&#2375; &#2330;&#2366;&#2354;&#2325; &#2350;&#2375;&#2306; &#2327;&#2340;&#2367;&#2350;&#2366;&#2344; &#2310;&#2357;&#2375;&#2358;&#2379;&#2306; &#2346;&#2352; &#2348;&#2354; &#2354;&#2327;&#2366;&#2344;&#2375; &#2360;&#2375; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2404;</span>",
      "<span class=\"eqt\">gravitational forces.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354;.</span>",
      "<span class=\"eqt\">the electric field produced by one conductor affecting the current in the other.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2330;&#2366;&#2354;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2330;&#2366;&#2354;&#2325; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;&#2367;&#2340; &#2343;&#2366;&#2352;&#2366; &#2325;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>When a current flows through a conductor, it creates a <b>magnetic field</b> around it. </p><p>If there are <b>two parallel current-carrying conductors</b>, the magnetic field created by one conductor <b>interacts with the moving charges (current)</b> in the other, resulting in a <b>magnetic force</b> between the two.</p><p>This is the <b>basis of the definition of the ampere</b>.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>The torque &#964; on a current loop with magnetic moment m placed in a uniform magnetic field B is given by: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325;&#2360;&#2350;&#2366;&#2344; &#2330;&#2369;&#2350;&#2381;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; B &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2330;&#2369;&#2350;&#2381;&#2348;&#2325;&#2368;&#2351; &#2310;&#2328;&#2370;&#2352;&#2381;&#2339; m &#2357;&#2366;&#2354;&#2375; &#2343;&#2366;&#2352;&#2366; &#2354;&#2370;&#2346; &#2346;&#2352; &#2335;&#2377;&#2352;&#2381;&#2325; &#964; &#2344;&#2367;&#2350;&#2381;&#2344; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">&#964; = m . B.</span><span class=\"hqt\" style=\"display:none\">&#964; = m . B.</span>",
      "<span class=\"eqt\">&#964; = N I A / B.</span><span class=\"hqt\" style=\"display:none\">&#964; = N I A / B.</span>",
      "<span class=\"eqt\">&#964; = I A B.</span><span class=\"hqt\" style=\"display:none\">&#964; = I A B.</span>",
      "<span class=\"eqt\">&#964; = m  X  B.</span><span class=\"hqt\" style=\"display:none\">&#964; = m  X  B.</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The torque on a current loop in a uniform magnetic field B is given by the vector product of the magnetic moment m of the coil and the magnetic field: &#964; = m  X  B. </p><p>The magnitude of the torque is &#964; = m B sin &#952;, where &#952; is the angle between m and B.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>What happens to a diamagnetic substance when placed in an external magnetic field? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2379; &#2348;&#2366;&#2361;&#2381;&#2351; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2352;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It gets strongly magnetized in the direction of the field.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2342;&#2371;&#2338;&#2364;&#2340;&#2366; &#2360;&#2375; &#2330;&#2369;&#2350;&#2381;&#2348;&#2325;&#2367;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It gets weakly magnetized in the direction of the field.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2325;&#2350;&#2332;&#2379;&#2352; &#2352;&#2370;&#2346; &#2360;&#2375; &#2330;&#2369;&#2350;&#2381;&#2348;&#2325;&#2367;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is repelled by the field and the field inside is reduced.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2352;&#2381;&#2359;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2306;&#2342;&#2352; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It has no interaction with the magnetic field.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2366; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; &#2325;&#2379;&#2312; &#2360;&#2306;&#2346;&#2352;&#2381;&#2325; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Diamagnetic substances are <b>repelled by magnetic fields</b>. When placed in an external magnetic field, they develop a <b>weak magnetic moment in the opposite direction</b> to the applied field. As a result, the <b>magnetic field inside the diamagnetic material is reduced</b>.</p><p>This repulsive behavior is a defining characteristic of diamagnetism and occurs in all materials, but is usually only noticeable in substances like bismuth or superconductors, which show strong diamagnetic effects.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>What is the path of a charged particle moving with a velocity <b>v</b> perpendicular to a uniform magnetic field <b>B</b>? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325;&#2360;&#2350;&#2366;&#2344; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; B &#2325;&#2375; &#2354;&#2306;&#2348;&#2357;&#2340; v &#2357;&#2375;&#2327; &#2360;&#2375; &#2327;&#2340;&#2367;&#2350;&#2366;&#2344; &#2310;&#2357;&#2375;&#2358;&#2367;&#2340; &#2325;&#2339; &#2325;&#2366; &#2346;&#2341; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A straight line.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2368;&#2343;&#2368; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367;&#2404;</span>",
      "<span class=\"eqt\">A circular orbit.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2325;&#2325;&#2381;&#2359;&#2366;.</span>",
      "<span class=\"eqt\">A helical path.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2325;&#2369;&#2306;&#2337;&#2354;&#2367;&#2340; &#2346;&#2341;.</span>",
      "<span class=\"eqt\">A parabolic path.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2352;&#2357;&#2354;&#2351;&#2367;&#2325; &#2346;&#2341;.</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>When a charged particle enters a <b>uniform magnetic field</b> with its velocity <b>perpendicular</b> to the field, it experiences a <b>magnetic force</b> that acts as a <b>centripetal force</b>, constantly pulling the particle toward the center of a circular path.</p><p>This results in the particle moving in a <b>circular orbit</b>, with the <b>magnetic force perpendicular to its velocity</b> at all times, changing the direction but not the magnitude of the velocity.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>When a bar magnet is broken into two pieces: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2319;&#2325; &#2331;&#2337;&#2364; &#2330;&#2369;&#2350;&#2381;&#2348;&#2325; &#2325;&#2379; &#2342;&#2379; &#2335;&#2369;&#2325;&#2337;&#2364;&#2379;&#2306; &#2350;&#2375;&#2306; &#2340;&#2379;&#2337;&#2364;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">One piece becomes a north pole and the other becomes a south pole</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2335;&#2369;&#2325;&#2337;&#2364;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2343;&#2381;&#2352;&#2369;&#2357; &#2348;&#2344; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2366; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2368; &#2343;&#2381;&#2352;&#2369;&#2357; &#2348;&#2344; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
