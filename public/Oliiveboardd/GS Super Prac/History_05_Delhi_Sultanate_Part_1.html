        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Diwan-i Kohi was the department of________ introduced by Muhammad Bin Tughlaq.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368;&#2357;&#2366;&#2344;-&#2319; &#2325;&#2379;&#2361;&#2368; &#2350;&#2369;&#2361;&#2350;&#2381;&#2350;&#2342; &#2348;&#2367;&#2344; &#2340;&#2369;&#2327;&#2354;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; ________ &#2357;&#2367;&#2349;&#2366;&#2327; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">military</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2376;&#2344;&#2381;&#2351;</span>",
      "<span class=\"eqt\">agriculture</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367;</span>",
      "<span class=\"eqt\">market</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2332;&#2364;&#2366;&#2352;</span>",
      "<span class=\"eqt\">charity</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Diwan-i-Kohi (also Diwan-i-Amir-Kohi) was a department of <b>agriculture</b> established by Sultan Muhammad bin Tughlaq of the Delhi Sultanate. Its primary objective was to bring uncultivated land under cultivation by providing loans (sondhar) and other forms of assistance to farmers, and to improve agricultural practices.</p><p><b>Explanation of Other Options:</b></p><p>&#8226; military: The military department was typically Diwan-i-Arz.</p><p>&#8226; market: Alauddin Khalji is particularly known for his extensive market control policies and related departments (e.g., Diwan-i-Riyasat).</p><p>&#8226; charity: The department dealing with charity or religious endowments was often Diwan-i-Khairat or Diwan-i-Risalat.</p><p><b>Further insights:</b></p><p>&#8226; Muhammad bin Tughlaq initiated several ambitious and often controversial administrative and economic experiments.</p><p>&#8226; The Diwan-i-Kohi was part of his efforts to increase agricultural production and revenue. However, the scheme faced challenges due to corruption, inefficient implementation, and unfavorable climatic conditions, and ultimately did not achieve its intended success on a large scale.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which Delhi Sultan introduced two coins, namely silver tanka and copper jital?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344; &#2344;&#2375; &#2342;&#2379; &#2360;&#2367;&#2325;&#2381;&#2325;&#2375; &#2330;&#2354;&#2366;&#2319;, &#2309;&#2352;&#2381;&#2341;&#2366;&#2340;&#2381; &#2330;&#2366;&#2306;&#2342;&#2368; &#2325;&#2366; &#2335;&#2306;&#2325;&#2366; &#2324;&#2352; &#2340;&#2366;&#2306;&#2348;&#2375; &#2325;&#2366; &#2332;&#2368;&#2340;&#2354;?</span>",
    "options": [
      "<span class=\"eqt\">Qutbuddin Aibak</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2340;&#2369;&#2348;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2320;&#2348;&#2325;</span>",
      "<span class=\"eqt\">Bahlul Lodi</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2354;&#2369;&#2354; &#2354;&#2379;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Ghiyasuddin Balban</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2351;&#2366;&#2360;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2348;&#2354;&#2348;&#2344;</span>",
      "<span class=\"eqt\">Iltutmish</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2381;&#2340;&#2369;&#2340;&#2350;&#2367;&#2358;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Sultan Iltutmish (1211 - 1236 AD) of the Delhi Sultanate introduced the silver tanka and copper jital as standardized currency.</p><p>&#183; Silver tanka &rarr; Became the foundation of medieval Indian currency.</p><p>&#183; Copper jital &rarr; Used for smaller transactions.</p><p>He also introduced the Iqta system and was the first Delhi Sultan to get recognition from the Abbasid Caliphate.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following Delhi Sultanate rulers took the policy of 'blood and iron' to deal with the Mewati community?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2358;&#2366;&#2360;&#2325; &#2344;&#2375; &#2350;&#2375;&#2357;&#2366;&#2340;&#2368; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2360;&#2375; &#2344;&#2367;&#2346;&#2335;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; '&#2352;&#2325;&#2381;&#2340; &#2324;&#2352; &#2354;&#2380;&#2361;' &#2325;&#2368; &#2344;&#2368;&#2340;&#2367; &#2309;&#2346;&#2344;&#2366;&#2312;?</span>",
    "options": [
      "<span class=\"eqt\">Balban</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2354;&#2348;&#2344;</span>",
      "<span class=\"eqt\">Qutubuddin Aibak</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2340;&#2369;&#2348;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2320;&#2348;&#2325;</span>",
      "<span class=\"eqt\">Rajiya</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Iltutmish</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2381;&#2340;&#2369;&#2340;&#2350;&#2367;&#2358;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#8226; <i>Ghiyasuddin Balban</i> (ruled 1266 - 1287 AD) adopted a ruthless policy of \"blood and iron\" to crush rebellions and establish law and order, especially in regions like Mewat and Doab.</p><p>&#8226; The Mewatis were known for their rebellion and lawlessness, which Balban countered with strict military action and administrative control.</p><p><b>Ghiyasuddin Balban (Reign: 1266 - 1287)</b></p><p><b>Slave Dynasty (Mamluk Dynasty)  -  Delhi Sultanate</b></p><p><b>Early Life &amp; Rise to Power</b></p><p>&#183; Balban was a <b>Turkic slave</b> (originally from the Ilbari tribe) who was purchased by <b>Iltutmish</b>.</p><p>&#183; He rose through the ranks due to his intelligence and loyalty, becoming a key noble during <b>Nasiruddin Mahmud's</b> reign (1246 - 1266).</p><p>&#183; Served as <b>Naib (deputy)</b> and effectively controlled the Sultanate before formally ascending the throne in <b>1266</b> after Nasiruddin's death.</p><p><b>Key Policies &amp; Reforms</b></p><p><b>Theory of Kingship (Divine Right &amp; Blood Superiority)</b></p><p>o Balban believed in <b>absolute monarchy</b> and introduced the <b>\"Sijda\" (prostration)</b> and <b>\"Paibos\" (kissing the Sultan's feet)</b> to elevate his status.</p><p>o Declared himself the <b>\"Shadow of God on Earth\" (Zill-e-Ilahi)</b> to strengthen his authority.</p><p><b>Strong Centralized Rule</b></p><p>o Crushed the <b>\"Chahalgani\" (Group of Forty)</b>  -  a powerful council of nobles that challenged his authority.</p><p>o Appointed <b>spies</b> to monitor nobles and eliminated rebellions ruthlessly.</p><p>Further information:</p><p><b>Qutubuddin Aibak (Reign: 1206 - 1210)</b></p><p>&#183; <b>Founder of the Slave Dynasty (Mamluk Dynasty)</b> and the <b>Delhi Sultanate</b>.</p><p>&#183; Originally a <b>Turkic slave</b> of Muhammad Ghori, he rose to power as his trusted general.</p><p>&#183; After Ghori's death (1206), Aibak declared himself the ruler of Delhi.</p><p>&#183; Known for his <b>generosity</b> (called <b>\"Lakh Baksh\"</b>  -  giver of lakhs).</p><p>&#183; Began the construction of the <b>Qutub Minar</b> (completed by Iltutmish).</p><p>&#183; Died in 1210 while playing <b>chaugan (polo)</b>.</p><p><b>Iltutmish (Reign: 1211 - 1236)</b></p><p>&#183; <b>Son-in-law and successor of Aibak</b>, considered the real consolidator of the Delhi Sultanate.</p><p>&#183; Fought rivals like <b>Tajuddin Yildiz</b> and <b>Nasiruddin Qabacha</b> to secure his throne.</p><p>&#183; Introduced the <b>\"Iqta system\"</b> (land revenue system).</p><p>&#183; Issued the <b>silver Tanka</b> and <b>copper Jital</b>  -  standardized currency.</p><p>&#183; Completed the <b>Qutub Minar</b>.</p><p>&#183; Nominated his daughter <b>Razia Sultan</b> as his successor, bypassing his sons.</p><p><b>Razia Sultan (Reign: 1236 - 1240)</b></p><p>&#183; <b>First and only woman ruler of the Delhi Sultanate</b>.</p><p>&#183; Faced opposition from nobles due to her gender.</p><p>&#183; Promoted <b>meritocracy</b>, appointed an <b>Abyssinian slave, Malik Yakut</b>, as her close advisor.</p><p>&#183; Overthrown by nobles led by <b>Malik Altunia</b> (later allied with her but both were killed).</p><p>&#183; Her reign marked a brief but significant challenge to gender norms in medieval India.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following was daughter of Iltutmish, a ruler of Slave/Mamluk dynasty?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2327;&#2369;&#2354;&#2366;&#2350;/&#2350;&#2366;&#2350;&#2354;&#2369;&#2325; &#2357;&#2306;&#2358; &#2325;&#2375; &#2358;&#2366;&#2360;&#2325; &#2311;&#2354;&#2381;&#2340;&#2369;&#2340;&#2350;&#2367;&#2358; &#2325;&#2368; &#2348;&#2375;&#2335;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kubra Noorzai</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2348;&#2352;&#2366; &#2344;&#2370;&#2352;&#2332;&#2312;</span>",
      "<span class=\"eqt\">Harkha</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2326;&#2366;</span>",
      "<span class=\"eqt\">Razia Sultan</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2332;&#2367;&#2351;&#2366; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Shafiqa Ziayee</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2347;&#2368;&#2325;&#2366; &#2332;&#2364;&#2367;&#2351;&#2366;&#2351;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Razia Sultan</b>, also known as Razia al-Din, was the daughter of Iltutmish, a ruler of the Slave/Mamluk dynasty in India. She became the Sultan of Delhi and the first female ruler of the Delhi Sultanate in the 13th century.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In the Delhi Sultanate, which of the following were known as Bandagan?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2348;&#2306;&#2342;&#2327;&#2366;&#2344; &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Special person appointed for religious conversion.</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2352;&#2381;&#2350; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2361;&#2375;&#2340;&#2369; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2357;&#2367;&#2358;&#2375;&#2359; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2404;</span>",
      "<span class=\"eqt\">Special officer for Land revenue recovery.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;-&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2360;&#2370;&#2354;&#2368; &#2361;&#2375;&#2340;&#2369; &#2357;&#2367;&#2358;&#2375;&#2359; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Specialized artisans employed in the royal kharkhanas.</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2361;&#2368; &#2325;&#2366;&#2352;&#2326;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2352;&#2340; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2325;&#2366;&#2352;&#2368;&#2327;&#2352;&#2404;</span>",
      "<span class=\"eqt\">Special slaves bought for military service.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2376;&#2344;&#2381;&#2351; &#2360;&#2375;&#2357;&#2366; &#2361;&#2375;&#2340;&#2369; &#2326;&#2352;&#2368;&#2342;&#2375; &#2327;&#2319; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2342;&#2366;&#2360;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In the Delhi Sultanate, \"Bandagan\" referred to <b>special slaves who were acquired for military service.</b> These highly trained slave soldiers played a pivotal role in the Sultanate's military strength and administration, serving as a loyal and effective fighting force under the rulers.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Delhi Sultans primarily adopted a policy of consolidation rather than expansion?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344; &#2344;&#2375; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2319;&#2325;&#2368;&#2325;&#2352;&#2339; &#2325;&#2368; &#2344;&#2368;&#2340;&#2367; &#2309;&#2346;&#2344;&#2366;&#2312;?</span>",
    "options": [
      "<span class=\"eqt\">Ibrahim Lodi</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2348;&#2381;&#2352;&#2366;&#2361;&#2368;&#2350; &#2354;&#2379;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Balban</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2354;&#2348;&#2344;</span>",
      "<span class=\"eqt\">Alauddin Khalji</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2326;&#2367;&#2354;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Bahlol Lodi</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2354;&#2379;&#2354; &#2354;&#2379;&#2342;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Balban (1266-1287) was known for his strong administrative policies, maintaining law and order, and suppressing revolts rather than expanding the empire.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Diwan-i-Arz was essentially the department of _______ under Delhi Sultanate.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368;&#2357;&#2366;&#2344;-&#2319;-&#2309;&#2352;&#2381;&#2332; &#2350;&#2370;&#2354;&#2340;&#2307; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; _______ &#2325;&#2366; &#2357;&#2367;&#2349;&#2366;&#2327; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Financial services</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306;</span>",
      "<span class=\"eqt\">Court ceremonies</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2360;&#2350;&#2366;&#2352;&#2379;&#2361;</span>",
      "<span class=\"eqt\">Military services</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2376;&#2344;&#2381;&#2351; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306;</span>",
      "<span class=\"eqt\">Royal karkhanas</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2361;&#2368; &#2325;&#2366;&#2352;&#2326;&#2366;&#2344;&#2379;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Diwan-i-Arz in the Delhi Sultanate was responsible for managing the <b>military services </b>affairs of the state. It played a crucial role in the administration of the army, including matters related to recruitment, salaries, and other military functions.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following started the ceremony of 'Sijda' (prostration) and 'Paibos' (kissing of the monarch's feet), in the court?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2344;&#2375; &#2342;&#2352;&#2348;&#2366;&#2352; &#2350;&#2375;&#2306; '&#2360;&#2367;&#2332;&#2342;&#2366;' (&#2346;&#2381;&#2352;&#2339;&#2366;&#2350;) &#2324;&#2352; '&#2346;&#2366;&#2311;&#2348;&#2379;&#2360;' (&#2352;&#2366;&#2332;&#2366; &#2325;&#2375; &#2346;&#2376;&#2352; &#2330;&#2370;&#2350;&#2344;&#2366;) &#2325;&#2368; &#2352;&#2360;&#2381;&#2350; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Alauddin Khalji</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2326;&#2367;&#2354;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Ghiyasuddin Balban</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2351;&#2366;&#2360;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2348;&#2354;&#2348;&#2344;</span>",
      "<span class=\"eqt\">Iltutmish</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2381;&#2340;&#2369;&#2340;&#2350;&#2367;&#2358;</span>",
      "<span class=\"eqt\">Muhammad bin Tughlaq</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2361;&#2350;&#2381;&#2350;&#2342; &#2348;&#2367;&#2344; &#2340;&#2369;&#2327;&#2354;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Ghiyasuddin Balban</b>, who ruled the Delhi Sultanate from 1266 to 1287, introduced rigorous court discipline and Persian court ceremonies like 'Sijda' (prostration before the sultan) and 'Paibos' (kissing the sultan's feet). These were aimed at enhancing the prestige and power of the monarchy and instilling a sense of awe and respect among the nobles and subjects.</p><p><b>Explanation of Other Options:</b></p><p><b>&#8226; </b>Alauddin Khalji: Known for his military conquests and economic reforms, but Sijda and Paibos are primarily associated with Balban's efforts to assert royal authority.</p><p><b>&#8226; </b>Iltutmish: An earlier Sultan of Delhi who consolidated the Sultanate, but these specific Persian court ceremonies are attributed to Balban.</p><p><b>&#8226; </b>Muhammad bin Tughlaq: Known for his ambitious and often controversial experiments, but not specifically for introducing Sijda and Paibos.</p><p><b>Further insights:</b></p><p>&#8226; Balban believed in the theory of kingship that emphasized the divine right and despotic nature of the monarch.</p><p>&#8226; The introduction of Sijda and Paibos was part of his strategy to break the power of the Turkish nobles (Chahalgani or The Forty) and establish the supremacy of the Sultan.</p><p>&#8226; These practices were considered un-Islamic by some orthodox Ulema but were enforced by Balban to assert his authority.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which amongst the following Sultans shifted his capital from Delhi to Daulatabad?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344; &#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2375; &#2342;&#2380;&#2354;&#2340;&#2366;&#2348;&#2366;&#2342; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Muhammad Bin Tughlaq</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2361;&#2350;&#2381;&#2350;&#2342; &#2348;&#2367;&#2344; &#2340;&#2369;&#2327;&#2354;&#2325;</span>",
      "<span class=\"eqt\">Feroz Shah Tughlaq</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2367;&#2352;&#2379;&#2332; &#2358;&#2366;&#2361; &#2340;&#2369;&#2327;&#2354;&#2325;</span>",
      "<span class=\"eqt\">Sikandar Lodhi</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2325;&#2306;&#2342;&#2352; &#2354;&#2379;&#2343;&#2368;</span>",
      "<span class=\"eqt\">Ibrahim Lodhi</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2348;&#2381;&#2352;&#2366;&#2361;&#2368;&#2350; &#2354;&#2379;&#2343;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Muhammad Bin Tughlaq</b> (ruled 1325 - 1351) is known for his ambitious and often eccentric projects.</p><p>&#183; In 1327, he decided to shift the capital from <b>Delhi to Daulatabad (in present-day Maharashtra)</b> to better control the Deccan region and to protect the empire from Mongol invasions.</p><p>&#183; However, the move was a failure due to logistical issues, harsh travel conditions, and resistance from the people. Eventually, he had to shift the capital back to Delhi.</p>",
    "question_index": 8
  },

    "solution": "<p>Agra is believed to have existed since ancient times, including during the Mahabharata era. However, the city as we know it today was formally established by Sultan <b>Sikandar Lod&#299;</b>, a Muslim ruler, in the year 1504.</p>",

    "question": "<span class=\"eqt\"><p>Who among the following sultans of the delhi sultanate appointed GhiyasuddinBalban as his/her prime minister?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344; &#2344;&#2375; &#2327;&#2351;&#2366;&#2360;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2348;&#2354;&#2348;&#2344; &#2325;&#2379; &#2309;&#2346;&#2344;&#2366; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">ShamsuddinIIutmish</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2350;&#2360;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2311;&#2354;&#2381;&#2340;&#2369;&#2340;&#2350;&#2367;&#2358;</span>",
      "<span class=\"eqt\">Raziyya</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2332;&#2364;&#2367;&#2351;&#2366;</span>",

      "<span class=\"eqt\">Nasiruddin Mahmud</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2360;&#2368;&#2352;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2350;&#2361;&#2350;&#2370;&#2342;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>GhiyasuddinBalban served under his sultan <b>Nasir-ud-din Mahmud</b> as his right hand for 20 years and crushed all the rebellions whether outside the court or inside the court. Following his master's death, Balban ascended the throne in February 1265 AD. He first executed the survivors of the Chalisa and relieved himself of the dangers of rivalry. He suppressed with an iron hand the hill men whose forays were a terror in the suburbs of Delhi.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Who composed Tabaqat-i-Nasiri in the Delhi Sultanate period?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2340;&#2348;&#2325;&#2364;&#2366;&#2340;-&#2319;-&#2344;&#2366;&#2360;&#2367;&#2352;&#2368; &#2325;&#2368; &#2352;&#2330;&#2344;&#2366; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2368; &#2341;&#2368;?</p></span>",

      "<span class=\"eqt\">Ziauddin Barani</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2364;&#2367;&#2351;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2348;&#2352;&#2344;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Tabaqat-i-Nasiri named for Sultan Nasir-ud-Din, is an elaborate history of the Islamic world written in Persian by <b>Minhaj-i-Siraj Juzjani </b>and completed in 1260.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which officer under Alauddin Khilji was required to maintain a register of merchants to ensure an adequate supply of goods?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2354; &#2325;&#2368; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2354;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2326;&#2367;&#2354;&#2332;&#2368; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2325;&#2367;&#2360; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368; &#2325;&#2379; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2319;&#2325; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352; (&#2348;&#2361;&#2368;) &#2325;&#2379; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2344;&#2375; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2341;&#2368;?</p></span>",

    ],
    "correct_option_id": 3,
    "solution": "<p>Alauddin Khilji set up three markets in Delhi. Each market was under the control of a high officer called 'Shahna' who maintained a register of the merchants and strictly controlled the shopkeepers and the prices.</p>",

  },
  {
    "question": "<span class=\"eqt\"><p>Who had assumed the title of Balban?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2354;&#2348;&#2344; &#2325;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2325;&#2367;&#2360;&#2344;&#2375; &#2343;&#2366;&#2352;&#2339; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kabir Khan</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2348;&#2368;&#2352; &#2326;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Faid Khan</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2376;&#2342; &#2326;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Ulugh Khan</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2354;&#2370;&#2327; &#2326;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Ayaz Khan</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2351;&#2366;&#2395; &#2326;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Sultan Ulugh Khan-i-Azam, otherwise called Ghiyas-ad-din Balban, belonged to the stock of the Khakans of Albari. His father was khan over ten thousand houses (khanah), and the family was well known in Albari, among the Turkish tribes of Turkistan. Now, inasmuch as the Almighty desired to grant a support to the power of Islam and strength to the Mohammedan faith, to extend His glorious shadow over it, and to preserve Hindustan within the range of his favour and protection. He removed Ulugh Khan in his youth from Turkistan, separating him from his race and kindred, and from his tribe and relations, and conveying him to the country of Hindustan, for the purpose of curbing the Moghuls. God conducted him to Baghdad, and from that city to Gujarat, where Khwaja Jamal-ad-din Basri, a man remarkable for piety and integrity, ability and worth, purchased him and brought him up carefully like a son. Intelligence and ability shone out clearly in his countenance, and his patron, Jamal, looked upon him with an eye of kindness and treated him with especial consideration.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following systems of the Delhi sultanate had an influence on the Bahmani and Vijayanagar kingdoms?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2325;&#2368; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2366; &#2348;&#2361;&#2350;&#2344;&#2368; &#2324;&#2352; &#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2346;&#2352; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Walis</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2354;&#2367;&#2360;</span>",
      "<span class=\"eqt\">Cahalgani</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2361;&#2354;&#2327;&#2366;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Bitikchi</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2335;&#2367;&#2325;&#2330;&#2368;</span>",
      "<span class=\"eqt\">Iqtadari</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2325;&#2381;&#2340;&#2366;&#2342;&#2366;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The <b>Iqtadari</b> system of the Delhi Sultanate involved granting land revenue rights to individuals in exchange for military or administrative service. This system's influence extended to the Bahmani and Vijayanagara kingdoms in the Deccan region, where similar revenue arrangements were adopted.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Who was the first sultan (in the recorded history of the Dargah Sharif) to visit the shrine of Khwaja Muinuddin Chisti?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2326;&#2381;&#2357;&#2366;&#2332;&#2366; &#2350;&#2369;&#2312;&#2344;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2330;&#2367;&#2358;&#2381;&#2340;&#2368; &#2325;&#2368; &#2342;&#2352;&#2327;&#2366;&#2361; &#2346;&#2352; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2346;&#2361;&#2354;&#2366; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344; (&#2342;&#2352;&#2327;&#2366;&#2361; &#2358;&#2352;&#2368;&#2347; &#2325;&#2375; &#2342;&#2352;&#2381;&#2332; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360; &#2350;&#2375;&#2306;) &#2325;&#2380;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Alauddin Khilji</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2326;&#2367;&#2354;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Jalaluddin Khilji</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2354;&#2366;&#2354;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2326;&#2367;&#2354;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Balban</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2354;&#2348;&#2344;</span>",
      "<span class=\"eqt\">Muhammad bin Tughluq</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2361;&#2350;&#2381;&#2350;&#2342; &#2348;&#2367;&#2344; &#2340;&#2369;&#2327;&#2354;&#2325;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Muhammad bin Tugluq was the first sultan( in the recorded history of Dargah Sharif) to visit the shrine of the Khwaja Muinuddin Chisti.</p><p>&bull; Muhammad bin Tughluq (reigned 1325 - 1351) was the second Sultan of the Tughluq dynasty in India.</p><p>&bull; Muhammad bin Tughluq is remembered as a ruler with grand visions but flawed execution.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Who introduced the system of Dagh and Huliyah and cash payment to soldiers in the Delhi sultanate?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2350;&#2375;&#2306; &#2342;&#2366;&#2327; &#2324;&#2352; &#2361;&#2369;&#2354;&#2367;&#2351;&#2366; &#2324;&#2352; &#2360;&#2376;&#2344;&#2367;&#2325;&#2379;&#2306; &#2325;&#2379; &#2344;&#2325;&#2342; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2367;&#2360;&#2344;&#2375; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Alauddin Khalji</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2326;&#2367;&#2354;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Firuz Shah Tughluq</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2367;&#2352;&#2379;&#2332;&#2364; &#2358;&#2366;&#2361; &#2340;&#2369;&#2327;&#2354;&#2325;</span>",
      "<span class=\"eqt\">Jalaluddin Khalj</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2354;&#2366;&#2354;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2326;&#2367;&#2354;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Ghiyasuddin Tughluq</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2351;&#2366;&#2360;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2340;&#2369;&#2327;&#2354;&#2325;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Alauddin Khalji</b>, the second ruler of the Khalji dynasty in the Delhi Sultanate, introduced the system of Dagh (branding) and Huliyah (uniform) for the soldiers to ensure loyalty and discipline in his army. He also initiated the practice of cash payments, replacing the traditional land grants, to maintain a centralized control over the military and reduce the risk of disloyalty.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Which Sultan established a separate department (Diwan-i-AmirKohi) to take care of agriculture?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344; &#2344;&#2375; &#2325;&#2371;&#2359;&#2367; &#2325;&#2368; &#2342;&#2375;&#2326;&#2349;&#2366;&#2354; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2309;&#2354;&#2327; &#2357;&#2367;&#2349;&#2366;&#2327; (&#2342;&#2368;&#2357;&#2366;&#2344;-&#2319;-&#2309;&#2350;&#2368;&#2352; &#2325;&#2379;&#2361;&#2368;) &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Jalal-ud-dinKhalji</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2354;&#2366;&#2354;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2326;&#2364;&#2367;&#2354;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Khizr Khan</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2367;&#2332;&#2381;&#2352; &#2326;&#2366;&#2306;</span>",
      "<span class=\"eqt\">Muhammad Bin Tughlaq</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2361;&#2350;&#2381;&#2350;&#2342; &#2348;&#2367;&#2344; &#2340;&#2369;&#2327;&#2354;&#2325;</span>",
      "<span class=\"eqt\">Tughril Beg</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2369;&#2327;&#2352;&#2367;&#2354; &#2348;&#2375;&#2327;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Mohammad Bin Tughlaq (1325-51)</b></p><p><b>Prince Jauna, son of Ghiyasuddin Tughlaq </b>ascended the throne in 1325.</p><p>&#183; He gained the title Ulugh Khan. He was most educated of all the Sultans of the Delhi Sultanate.</p><p>&#183; <b>He created a department Diwan-e-Amir-e-Kohi for the improvement of the agriculture.</b></p><p>&#183; He distributed Sondhar i.e. agriculture loans advanced for extension of agriculture in barren lands.</p><p>&#183; He encouraged cash crops in place of cereals.</p>",
