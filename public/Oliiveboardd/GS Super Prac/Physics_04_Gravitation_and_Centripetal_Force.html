    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following forces is responsible for the motion of the moon around the Earth? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2348;&#2354; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2330;&#2306;&#2342;&#2381;&#2352;&#2350;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Frictional force</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354;</span>",
      "<span class=\"eqt\">Electrostatic force</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2348;&#2354;</span>",
      "<span class=\"eqt\">Gravitational force</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354;</span>",
      "<span class=\"eqt\">Magnetic force</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2348;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The moon revolves around the Earth due to the <b>gravitational force</b> between them. </p><p>This force acts as the centripetal force, keeping the moon in its orbit and preventing it from moving off in a straight line.</p><p>Further insights:</p><p>&#183; <b>Frictional force:</b> Friction is a force that opposes motion between surfaces in contact. Since there's no direct contact or a medium like air or water between the Earth and the moon, friction plays a negligible role in the moon's orbit. While there is a tiny amount of friction due to extremely thin traces of gases, it's not the main force.</p><p>&#183; <b>Electrostatic force:</b> This force exists between charged particles. While both the Earth and the moon have magnetic fields and some charged particles, the electrostatic forces are relatively weak over the vast distance between them. They don't have a significant influence on the moon's overall motion.</p><p>&#183; <b>Magnetic force:</b> Magnetic forces act on moving charges and magnetic materials. Although both the Earth and the moon have magnetic fields, these fields are not strong enough to be the primary force governing the moon's orbit.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>According to Newton's universal law of gravitation, the force between two objects is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2381;&#2351;&#2370;&#2335;&#2344; &#2325;&#2375; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2325;&#2375; &#2360;&#2366;&#2352;&#2381;&#2357;&#2349;&#2380;&#2350;&#2367;&#2325; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2342;&#2379; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2348;&#2354; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Proportional to the sum of their masses and inversely proportional to the distance between them.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2325;&#2375; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2340;&#2341;&#2366; &#2313;&#2344;&#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Proportional to the product of their masses and inversely proportional to the square of the distance between them.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2325;&#2375; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2340;&#2341;&#2366; &#2313;&#2344;&#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Proportional to the square of their masses and inversely proportional to the distance between them.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2325;&#2375; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2340;&#2341;&#2366; &#2313;&#2344;&#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Inversely proportional to the product of their masses and proportional to the square of the distance between them.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2325;&#2375; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2340;&#2341;&#2366; &#2313;&#2344;&#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The universal law of gravitation states that every object attracts every other object with a force that is <b>proportional to the product of their masses and inversely proportional to the square of the distance between them</b>.</p><p>Newton's law of gravitation states:</p><p>F=G(m1m2/r<sup>2</sup><i>)</i></p><p>&#183; F is the gravitational force.</p><p>&#183; G is the gravitational constant.</p><p>&#183; m1&#8203; and m2&#8203; are the masses of the two objects.</p><p>&#183; r is the distance between them.</p><p>Thus, the force is proportional to the product of their masses and inversely proportional to the square of the distance.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What provides the centripetal force that keeps the moon moving around the Earth? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2309;&#2349;&#2367;&#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2368;&#2351; &#2348;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; &#2332;&#2379; &#2330;&#2306;&#2342;&#2381;&#2352;&#2350;&#2366; &#2325;&#2379; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2328;&#2370;&#2350;&#2340;&#2366; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The moon's own inertia</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2306;&#2342;&#2381;&#2352;&#2350;&#2366; &#2325;&#2366; &#2309;&#2346;&#2344;&#2366; &#2332;&#2337;&#2364;&#2340;&#2381;&#2357;</span>",
      "<span class=\"eqt\">The Earth's magnetic field</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2366; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">The gravitational force of the Earth</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2366; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354;</span>",
      "<span class=\"eqt\">The atmospheric pressure of the Earth</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2366; &#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354;&#2368;&#2351; &#2342;&#2348;&#2366;&#2357;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>gravitational force of the Earth</b> provides the necessary centripetal force for the moon's orbit. Without this force, the moon would move in a straight line.</p><p>&#183; <b>Centripetal Force:</b> An object moving in a circular path needs a force constantly directed towards the center of the circle to keep it from flying off in a straight line. This is called centripetal force. </p><p>&#183; <b>Gravity's Role:</b> The Earth's gravity pulls the moon towards it. This gravitational force acts as the centripetal force, continuously bending the moon's path into an elliptical orbit.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If the distance between two objects is doubled, how does the gravitational force between them change? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2342;&#2379; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2325;&#2352; &#2342;&#2368; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2313;&#2344;&#2325;&#2375; &#2348;&#2368;&#2330; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; &#2350;&#2375;&#2306; &#2325;&#2381;&#2351;&#2366; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">It becomes half</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2310;&#2343;&#2366; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It becomes one-quarter</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2319;&#2325;-&#2330;&#2380;&#2341;&#2366;&#2312; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It doubles</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It becomes four times larger</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2330;&#2366;&#2352; &#2327;&#2369;&#2344;&#2366; &#2348;&#2337;&#2364;&#2366; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to Newton's Law of Universal Gravitation, the gravitational force between two objects is <b>inversely proportional to the square of the distance</b> between them. </p><p>Therefore, if the distance between two objects is doubled: </p><p>&#183; The force of gravity will decrease by a factor of 2 squared, which is 4</p><p>Gravitational force is inversely proportional to the square of the distance. If the distance r is doubled, the force F becomes:</p><p>F&#8242;=G(m1m2/(2r)<sup>2</sup>)=1/4(G(m1m2/r<sup>2</sup>)=1/4(F)</p><p>Thus, the force becomes one-quarter of its original value.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is correct regarding the gravitational force?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only the Earth attracts other objects.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2361;&#2368; &#2309;&#2344;&#2381;&#2351; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2379; &#2310;&#2325;&#2352;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Only large objects attract smaller objects.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2348;&#2337;&#2364;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2306; &#2361;&#2368; &#2331;&#2379;&#2335;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2379; &#2310;&#2325;&#2352;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">All objects in the universe attract each other.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2366;&#2339;&#2381;&#2337; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2305; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2310;&#2325;&#2352;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Gravitational force only exists between planets and stars.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; &#2325;&#2375;&#2357;&#2354; &#2327;&#2381;&#2352;&#2361;&#2379;&#2306; &#2324;&#2352; &#2340;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2361;&#2368; &#2350;&#2380;&#2332;&#2370;&#2342; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Newton's Law of Universal Gravitation:</b> This law states that every particle in the universe attracts every other particle with a force that is proportional to the product of their masses and inversely proportional to the square of the distance between their centers. This means: </p><p>&#183; Every object, regardless of size, exerts a gravitational pull.</p><p>&#183; This pull is mutual, meaning both objects attract each other.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What is the SI unit of the universal gravitation constant (G)? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2352;&#2381;&#2357;&#2349;&#2380;&#2350;&#2367;&#2325; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2360;&#2381;&#2341;&#2367;&#2352;&#2366;&#2306;&#2325; (G) &#2325;&#2368; SI &#2311;&#2325;&#2366;&#2312; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Nm/kg</span><span class=\"hqt\" style=\"display:none\">Nm/kg</span>",
      "<span class=\"eqt\">N kg<sup>2</sup>/m<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">N kg<sup>2</sup>/m<sup>2</sup></span>",
      "<span class=\"eqt\">Nm<sup>2</sup>/kg<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">Nm<sup>2</sup>/kg<sup>2</sup></span>",
      "<span class=\"eqt\">m/s<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">m/s<sup>2</sup></span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The SI unit of G is <b>N m<sup>2</sup> /kg<sup>2</sup></b>. </p><p>The SI unit of the gravitational constant (G):</p><p>&#183; <b>Newton's Law of Universal Gravitation:</b></p><p>o F = G(m&#8321;m&#8322;)/r&#178;</p><p>o Where: </p><p>&#167; F is the gravitational force (N) </p><p>&#167; G is the gravitational constant </p><p>&#167; m&#8321; and m&#8322; are the masses of the objects (kg) </p><p>&#167; r is the distance between the objects (m) </p><p>&#183; <b>Rearrange the equation to solve for G:</b></p><p>o G = Fr&#178;/ (m&#8321;m&#8322;)</p><p>&#183; <b>Substitute the SI units:</b></p><p>o G = (N * m&#178;) / (kg * kg)</p><p>o G = Nm&#178;/kg&#178; </p><p>Therefore, the SI unit of the universal gravitation constant (G) is Nm&#178;/kg&#178;.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>An object is in free fall if it: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2379;&#2312; &#2357;&#2360;&#2381;&#2340;&#2369; &#2350;&#2369;&#2325;&#2381;&#2340; &#2346;&#2340;&#2344; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2351;&#2342;&#2367; &#2357;&#2361;: </p></span>",
    "options": [
      "<span class=\"eqt\">experiences no force at all.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2348;&#2354; &#2309;&#2344;&#2369;&#2349;&#2357; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366;&#2404;</span>",
      "<span class=\"eqt\">is moving at a constant velocity.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2381;&#2341;&#2367;&#2352; &#2357;&#2375;&#2327; &#2360;&#2375; &#2328;&#2370;&#2350; &#2352;&#2361;&#2366; &#2361;&#2376;.</span>",
      "<span class=\"eqt\">is falling towards the Earth under the force of gravity alone.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; &#2325;&#2375; &#2340;&#2361;&#2340; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2368; &#2323;&#2352; &#2327;&#2367;&#2352; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">is thrown upwards.</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2368; &#2323;&#2352; &#2347;&#2375;&#2306;&#2325;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>An object is said to be in <b>free fall</b> when it falls towards the Earth under the influence of gravitational force only. Air resistance should not be a factor.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The acceleration due to gravity (g) on Earth is approximately: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2346;&#2352; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2340;&#2381;&#2357;&#2352;&#2339; (g) &#2354;&#2327;&#2349;&#2327; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">6.7 m/s<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">6.7 &#2350;&#2368;/&#2360;&#2375;<sup>2</sup></span>",
      "<span class=\"eqt\">10 m/s<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">10 &#2350;&#2368;/&#2360;&#2375;<sup>2</sup></span>",
      "<span class=\"eqt\">9.8 m/s<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">9.8 &#2350;&#2368;/&#2360;&#2375;<sup>2</sup></span>",
      "<span class=\"eqt\">11.2 m/s<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">11.2 &#2350;&#2368;/&#2360;&#2375;<sup>2</sup></span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The acceleration due to gravity (g) on Earth is approximately <b>9.8 m/s<sup>2</sup></b>.</p><p>This is the standard accepted value for the acceleration due to gravity near the Earth's surface. It means that for every second an object is in free fall, its velocity increases by approximately 9.8 meters per second.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The value of g (acceleration due to gravity) is greater: </p></span><span class=\"hqt\" style=\"display:none\"><p>g (&#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2340;&#2381;&#2357;&#2352;&#2339;) &#2325;&#2366; &#2350;&#2366;&#2344; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">at the equator.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2350;&#2343;&#2381;&#2351; &#2352;&#2375;&#2326;&#2366; &#2346;&#2352;&#2404;</span>",
      "<span class=\"eqt\">at the poles.</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2352;&#2369;&#2357;&#2379;&#2306; &#2346;&#2352;.</span>",
      "<span class=\"eqt\">at the center of the Earth.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2350;&#2375;&#2306;.</span>",
      "<span class=\"eqt\">at higher altitudes.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325; &#2314;&#2306;&#2330;&#2366;&#2312; &#2346;&#2352;.</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The value of <i>g</i> is greater at the poles.</p><p><b>Earth's Shape:</b> </p><p>&#183; The Earth is not a perfect sphere; it's an oblate spheroid, meaning it's slightly flattened at the poles and bulging at the equator.</p><p>&#183; This means the distance from the Earth's center to the poles is less than the distance from the Earth's center to the equator.</p><p><b>Gravitational Force and Distance:</b> </p><p>&#183; Gravitational force is inversely proportional to the square of the distance between objects. </p><p>&#183; Therefore, since the poles are closer to the Earth's center, the gravitational force, and thus the acceleration due to gravity (g), is slightly stronger there. </p><p><b>Centrifugal Force:</b> </p><p>&#183; The Earth's rotation also plays a role. The rotation creates a centrifugal force that acts outward, which is strongest at the equator. </p><p>&#183; This centrifugal force counteracts gravity, effectively reducing the value of 'g' at the equator.</p><p>Therefore, the combined effect of the Earth's shape and rotation results in a slightly higher value of 'g' at the poles compared to the equator.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following factors does the acceleration experienced by an object during free fall NOT depend on? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2325;&#2366;&#2352;&#2325; &#2346;&#2352; &#2350;&#2369;&#2325;&#2381;&#2340; &#2327;&#2367;&#2352;&#2366;&#2357;&#2335; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2344;&#2369;&#2349;&#2357; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2340;&#2381;&#2357;&#2352;&#2339; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mass of the Earth</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Radius of the Earth</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Mass of the object</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Universal gravitational constant</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2349;&#2380;&#2350;&#2367;&#2325; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2360;&#2381;&#2341;&#2367;&#2352;&#2366;&#2306;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The acceleration experienced by an object during free fall <b>does not depend on its mass</b>.</p><p><b>Acceleration due to gravity (g) formula:</b></p><p>&#183; g = GM/r&#178;</p><p>&#183; Where: </p><p>o G is the universal gravitational constant </p><p>o M is the mass of the Earth </p><p>o r is the radius of the Earth</p><p><b>Explanation:</b></p><p>&#183; From the formula, the acceleration due to gravity (g) depends on: </p><p>o The universal gravitational constant (G)</p><p>o The mass of the Earth (M)</p><p>o The radius of the Earth (r)</p><p>&#183; The mass of the object experiencing free fall is not included in this formula. This means that, regardless of its mass, all objects near the Earth's surface will experience the same acceleration due to gravity (neglecting air resistance).</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>What is the relationship between mass and weight? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2324;&#2352; &#2349;&#2366;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2381;&#2351;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mass and weight are the same thing.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2324;&#2352; &#2349;&#2366;&#2352; &#2319;&#2325; &#2361;&#2368; &#2330;&#2368;&#2332;&#2364; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Weight is the measure of inertia, while mass is the force of gravity.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352; &#2332;&#2337;&#2364;&#2340;&#2381;&#2357; &#2325;&#2366; &#2350;&#2366;&#2346; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Mass is constant, while weight depends on gravity.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2360;&#2381;&#2341;&#2367;&#2352; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2349;&#2366;&#2352; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Mass depends on gravity, while weight is constant.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2349;&#2366;&#2352; &#2360;&#2381;&#2341;&#2367;&#2352; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Mass is constant</b> and does not change with location, while <b>weight depends on the acceleration due to gravity</b>, which varies from place to place.</p><p><b>Mass:</b> </p><p>&#183; A measure of the amount of matter in an object.</p><p>&#183; An intrinsic property of an object, meaning it doesn't change based on location.</p><p>&#183; Measured in kilograms (kg).</p><p><b>Weight:</b> </p><p>&#183; The force of gravity acting on an object's mass.</p><p>&#183; Depends on the local gravitational field.</p><p>&#183; Measured in Newtons (N).</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>The weight of an object on the moon is approximately what fraction of its weight on Earth? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2350;&#2366; &#2346;&#2352; &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2349;&#2366;&#2352; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2346;&#2352; &#2313;&#2360;&#2325;&#2375; &#2349;&#2366;&#2352; &#2325;&#2366; &#2354;&#2327;&#2349;&#2327; &#2325;&#2367;&#2340;&#2344;&#2366; &#2349;&#2366;&#2327; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>",
      "<span class=\"eqt\">1/4</span><span class=\"hqt\" style=\"display:none\">1/4</span>",
      "<span class=\"eqt\">1/6</span><span class=\"hqt\" style=\"display:none\">1/6</span>",
      "<span class=\"eqt\">1/12</span><span class=\"hqt\" style=\"display:none\">1/12</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The weight of an object on the moon is approximately <b>1/6</b> of its weight on Earth.</p><p><b>Gravity on the Moon:</b> </p><p>&#183; The moon has significantly less mass than the Earth. </p><p>&#183; This results in a weaker gravitational pull. </p><p>&#183; Specifically, the acceleration due to gravity on the moon is about 1/6th of that on Earth. </p><p><b>Weight vs. Mass:</b> </p><p>&#183; Weight is the force of gravity acting on an object's mass. </p><p>&#183; Since the moon's gravity is 1/6th of Earth's, an object's weight on the moon will also be 1/6th of its weight on Earth.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Thrust is defined as: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2341;&#2381;&#2352;&#2360;&#2381;&#2335; &#2325;&#2379; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Force acting per unit area.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367; &#2311;&#2325;&#2366;&#2312; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2346;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2348;&#2354;.</span>",
      "<span class=\"eqt\">Force acting parallel to the surface.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2361; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2348;&#2354;&#2404;</span>",
      "<span class=\"eqt\">Force acting perpendicular to the surface.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2361; &#2346;&#2352; &#2354;&#2306;&#2348;&#2357;&#2340; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2348;&#2354;&#2404;</span>",
      "<span class=\"eqt\">Total force acting on an object.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2346;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2325;&#2369;&#2354; &#2348;&#2354;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Thrust</b> is the force acting on an object <b>perpendicular to the surface</b>.</p><p><b>Key Characteristics of Thrust</b></p><p>1) <b>Direction</b>:</p><p>o Thrust acts <b>perpendicular to the surface</b> of an object.</p><p>o For example, in rockets, thrust is generated in the upward direction, opposite to the direction of the expelled exhaust gases.</p><p>2) <b>Magnitude</b>:</p><p>o The magnitude of thrust depends on the rate at which mass is expelled and the velocity at which it is expelled.</p><p>o Mathematically, thrust (F) can be expressed as:</p><p>F=&#916;p/&#916;t</p><p>where &#916;p is the change in momentum and &#916;t is the time interval.</p><p>3) <b>Units</b>:</p><p>o The SI unit of thrust is the <b>newton (N)</b>.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Pressure is defined as: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2348;&#2366;&#2357; &#2325;&#2379; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Force acting parallel to the surface.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2361; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2348;&#2354;&#2404;</span>",
      "<span class=\"eqt\">Thrust per unit area.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367; &#2311;&#2325;&#2366;&#2312; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2346;&#2352; &#2348;&#2354;.</span>",
      "<span class=\"eqt\">Mass per unit volume.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367; &#2311;&#2325;&#2366;&#2312; &#2310;&#2351;&#2340;&#2344; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;.</span>",
      "<span class=\"eqt\">Weight multiplied by area.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352; &#2325;&#2379; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2360;&#2375; &#2327;&#2369;&#2339;&#2366; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Pressure</b> is defined as <b>thrust per unit area</b>. The SI unit of pressure is the pascal (Pa).</p><p><b>Thrust vs. Pressure</b></p><p>&#183; <b>Thrust</b>:</p><p>o Thrust is the <b>total force</b> acting perpendicular to a surface.</p><p>o Example: The force exerted by a rocket engine.</p><p>&#183; <b>Pressure</b>:</p><p>o Pressure is the <b>force per unit area</b> acting on a surface.</p><p>o Example: The pressure exerted by a gas on the walls of a container.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>The upward force exerted by a fluid on an object immersed in it is called: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2340;&#2352;&#2354; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2360;&#2350;&#2375;&#2306; &#2337;&#2370;&#2348;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2346;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2314;&#2346;&#2352; &#2325;&#2368; &#2323;&#2352; &#2348;&#2354; &#2325;&#2361;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Pressure</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2348;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Thrust</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2379;&#2352;</span>",
      "<span class=\"eqt\">Buoyant force</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2346;&#2381;&#2354;&#2366;&#2357;&#2344; &#2348;&#2354;</span>",
      "<span class=\"eqt\">Gravitational force</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Buoyant force:</b> </p><p>&#183; This is the upward force exerted by a fluid (liquid or gas) that opposes the weight of an immersed object.</p><p>&#183; It's the reason why objects float or seem lighter when submerged in a fluid.</p><p>&#183; The buoyant force is explained by Archimedes' principle, which states that the buoyant force on an object is equal to the weight of the fluid displaced by the<sup> 1 </sup>object.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>According to Archimedes' principle: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2352;&#2381;&#2325;&#2367;&#2350;&#2367;&#2337;&#2368;&#2332; &#2325;&#2375; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;:</p></span>",
    "options": [
      "<span class=\"eqt\">The buoyant force on an object is equal to the weight of the object.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2346;&#2352; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2313;&#2340;&#2381;&#2346;&#2381;&#2354;&#2366;&#2357;&#2344; &#2348;&#2354; &#2313;&#2360; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2375; &#2349;&#2366;&#2352; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The buoyant force on an object is equal to the volume of the fluid displaced by it.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2346;&#2352; &#2310;&#2352;&#2379;&#2346;&#2367;&#2340; &#2313;&#2340;&#2381;&#2346;&#2381;&#2354;&#2366;&#2357;&#2344; &#2348;&#2354; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2342;&#2381;&#2352;&#2357; &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The buoyant force on an object is equal to the weight of the fluid displaced by it.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2346;&#2352; &#2354;&#2327;&#2366; &#2313;&#2340;&#2381;&#2346;&#2381;&#2354;&#2366;&#2357;&#2344; &#2348;&#2354; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2342;&#2381;&#2352;&#2357; &#2325;&#2375; &#2349;&#2366;&#2352; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The buoyant force on an object is equal to the density of the fluid.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2346;&#2352; &#2313;&#2340;&#2381;&#2346;&#2381;&#2354;&#2366;&#2357;&#2344; &#2348;&#2354; &#2340;&#2352;&#2354; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2375; &#2328;&#2344;&#2340;&#2381;&#2357; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Archimedes' Principle:</b> This principle states that when an object is wholly or partially immersed in a fluid, it experiences an upward force (buoyant force) that is equal to the weight of the fluid that the object displaces.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following terms with their definitions: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column A</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column B</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Gravitational Force</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Force acting perpendicular to a surface</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Thrust</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Force of attraction between objects</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Pressure</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Upward force exerted by a fluid</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Buoyancy</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Thrust per unit area</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2368; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2366;&#2323;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2325;&#2367;&#2360;&#2368; &#2360;&#2340;&#2361; &#2325;&#2375; &#2354;&#2306;&#2348;&#2357;&#2340; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2348;&#2354;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2332;&#2379;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2310;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2342;&#2348;&#2366;&#2357;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2340;&#2352;&#2354; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2327;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2314;&#2346;&#2352; &#2325;&#2368; &#2323;&#2352; &#2348;&#2354;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2313;&#2331;&#2366;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2346;&#2381;&#2352;&#2340;&#2367; &#2311;&#2325;&#2366;&#2312; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2332;&#2379;&#2352;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-a, ii-b, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-a, ii-b, iii-c, iv-d</span>",
      "<span class=\"eqt\">i-b, ii-a, iii-d, iv-c</span><span class=\"hqt\" style=\"display:none\">i-b, ii-a, iii-d, iv-c</span>",
      "<span class=\"eqt\">i-c, ii-d, iii-a, iv-b</span><span class=\"hqt\" style=\"display:none\">i-c, ii-d, iii-a, iv-b</span>",
      "<span class=\"eqt\">i-d, ii-c, iii-b, iv-a</span><span class=\"hqt\" style=\"display:none\">i-d, ii-c, iii-b, iv-a</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Gravitational Force</b> is the force of attraction between objects.</p><p><b>Thrust</b> is the force acting perpendicular to a surface.</p><p><b>Pressure</b> is thrust per unit area.</p><p><b>Buoyancy</b> is the upward force exerted by a fluid.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements best explains why objects float or sink? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2348;&#2340;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2306; &#2325;&#2381;&#2351;&#2379;&#2306; &#2340;&#2376;&#2352;&#2340;&#2368; &#2351;&#2366; &#2337;&#2370;&#2348;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Objects with higher density than the liquid float.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2328;&#2344;&#2340;&#2381;&#2357; &#2357;&#2366;&#2354;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2306; &#2340;&#2376;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Objects with lower density than the liquid sink.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357; &#2360;&#2375; &#2325;&#2350; &#2328;&#2344;&#2340;&#2381;&#2357; &#2357;&#2366;&#2354;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2306; &#2337;&#2370;&#2348; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Objects with density equal to the liquid float.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2328;&#2344;&#2340;&#2381;&#2357; &#2357;&#2366;&#2354;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2306; &#2340;&#2376;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Objects with density less than that of the liquid float.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357; &#2360;&#2375; &#2325;&#2350; &#2328;&#2344;&#2340;&#2381;&#2357; &#2357;&#2366;&#2354;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2306; &#2340;&#2376;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Objects float if their density is less than that of the liquid . Objects sink if their density is greater than that of the liquid.</p><p><b>Density:</b> </p><p>&#183; Density is a measure of how much mass is contained in a given volume. </p><p>&#183; It's calculated as density = mass/volume. </p><p><b>Buoyancy:</b> </p><p>&#183; When an object is placed in a fluid (liquid or gas), it experiences an upward force called the buoyant force. </p><p>&#183; This force is related to the weight of the fluid that the object displaces (Archimedes' principle). </p><p><b>Floating vs. Sinking:</b> </p><p>&#183; If an object's density is less than the density of the fluid, the buoyant force will be greater than the object's weight, and the object will float. </p><p>&#183; If an object's density is greater than the density of the fluid, the object's weight will be greater than the buoyant force, and the object will sink.</p><p>&#183; If the density of an object is equal to the density of the fluid, the object will neither sink nor float, but will remain suspended in the fluid.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements: </p><p>A: The mass of an object varies from place to place. </p><p>B: The weight of an object remains constant everywhere. </p><p>Which of the above is/are true? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>A: &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2360;&#2381;&#2341;&#2366;&#2344;-&#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>B: &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2349;&#2366;&#2352; &#2361;&#2352; &#2332;&#2327;&#2361; &#2360;&#2381;&#2341;&#2367;&#2352; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only A is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only B is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both A and B are correct</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Both A and B are incorrect</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2364;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Mass remains constant whether the object is on the earth, the moon or even in outer space . The weight of an object depends on its location because *g* depends on location .</p><p><b>Mass:</b> </p><p>&#183; Mass is a measure of the amount of matter in an object.</p><p>&#183; It is an intrinsic property and remains constant regardless of the object's location.</p><p>&#183; Therefore, statement A is incorrect.</p><p><b>Weight:</b> </p><p>&#183; Weight is the force of gravity acting on an object's mass.</p><p>&#183; It is dependent on the gravitational field, which varies from place to place.</p><p>&#183; Therefore, statement B is incorrect.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct? </p><p>A: The force of gravity decreases with altitude. </p><p>B: The force of gravity decreases from the equator to the poles. </p><p>Which of the following is true? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A: &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2375; &#2360;&#2366;&#2341; &#2328;&#2335;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>B: &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; &#2349;&#2370;&#2350;&#2343;&#2381;&#2351; &#2352;&#2375;&#2326;&#2366; &#2360;&#2375; &#2343;&#2381;&#2352;&#2369;&#2357;&#2379;&#2306; &#2325;&#2368; &#2323;&#2352; &#2328;&#2335;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only A is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only B is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both A and B are correct</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Both A and B are incorrect</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2364;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>The force of gravity decreases with altitude</b>. The force of gravity <b>increases from the equator to the poles</b>.</p><p>The force of gravity is governed by Newton's Law of Universal Gravitation:</p><p>&#183; <b>F = G * (m1 * m2) / r<sup>2</sup></b></p><p>Where:</p><p>&#183; F is the force of gravity</p><p>&#183; G is the gravitational constant</p><p>&#183; m1 and m2 are the masses of the two objects </p><p>&#183; r is the distance between the centers of the two objects </p><p><b>Analyzing Statement A: \"The force of gravity decreases with altitude.\"</b></p><p>&#183; <b>Explanation:</b> </p><p>o Altitude means increasing the distance from the Earth's surface.</p><p>o In the formula, 'r' represents the distance between the centers of the two objects (in this case, the Earth and the object in question).</p><p>o As altitude increases, 'r' increases.</p><p>o Since 'r' is in the denominator of the equation, an increase in 'r' leads to a decrease in 'F' (the force of gravity).</p><p>o Therefore, the force of gravity weakens as you move farther away from the Earth's surface.</p><p>&#183; <b>Conclusion:</b> Statement A is correct.</p><p><b>Analyzing Statement B: \"The force of gravity decreases from the equator to the poles.\"</b></p><p>&#183; <b>Explanation:</b> </p><p>o <b>Earth's Shape:</b> The Earth is not a perfect sphere; it's an oblate spheroid. This means it bulges at the equator and is slightly flattened at the poles.</p><p>o <b>Distance to the Center:</b> Consequently, the distance from the Earth's center to the equator is greater than the distance from the Earth's center to the poles.</p><p>o <b>Centrifugal Force:</b> The Earth's rotation also generates a centrifugal force, which is strongest at the equator and weakest at the poles. This outward force counteracts gravity, making the effective gravity slightly less at the equator.</p><p>o <b>Gravity's Strength:</b> Because the poles are closer to the Earth's center and experience less centrifugal force, the force of gravity is slightly stronger at the poles than at the equator. This means that gravity increases from the equator to the poles, not decreases.</p><p>&#183; <b>Conclusion:</b> Statement B is incorrect.</p>",
    "question_index": 19
  }
];
