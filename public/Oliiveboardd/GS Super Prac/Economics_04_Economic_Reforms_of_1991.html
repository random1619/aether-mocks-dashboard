<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>

            <div class="welcome-actions">

                <!-- Controls -->

                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>

                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Who was the Prime Minister of India when the New Economic Policy (NEP) was introduced in 1991?</p></span><span class=\"hqt\" style=\"display:none\"><p>1991 &#2350;&#2375;&#2306; &#2332;&#2348; &#2344;&#2312; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367; (&#2319;&#2344;&#2312;&#2346;&#2368;) &#2346;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368; &#2340;&#2348; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2380;&#2344; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Atal Bihari Vajpayee</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2335;&#2354; &#2348;&#2367;&#2361;&#2366;&#2352;&#2368; &#2357;&#2366;&#2332;&#2346;&#2375;&#2351;&#2368;</span>",
      "<span class=\"eqt\">Rajiv Gandhi</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2368;&#2357; &#2327;&#2366;&#2306;&#2343;&#2368;</span>",
      "<span class=\"eqt\">P. V. Narasimha Rao</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;. &#2357;&#2368;. &#2344;&#2352;&#2360;&#2367;&#2350;&#2381;&#2361;&#2366; &#2352;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Indira Gandhi</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2342;&#2367;&#2352;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>P. V. Narasimha Rao was the Prime Minister who spearheaded</b> the implementation of the NEP in 1991, alongside Finance Minister Dr. Manmohan Singh.</p><p><b>Further Insight:</b></p><p>&bull; <b>Economic Crisis of 1991:</b></p><p>&#9675; India faced a severe financial crisis in 1991, marked by a Balance of Payments (BoP) crisis.</p><p>&#9675; Reasons included a decline in exports, dwindling foreign currency reserves, and rising inflation.</p><p>&#9675; India had to borrow $7 billion from the International Bank for Reconstruction and Development (IBRD), part of the World Bank, and the International Monetary Fund (IMF) under the condition of implementing economic reforms.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which key figure is known as the architect of India's economic reforms initiated in 1991?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; 1991 &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2319; &#2327;&#2319; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2366;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Manmohan Singh</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2344;&#2350;&#2379;&#2361;&#2344; &#2360;&#2367;&#2306;&#2361;</span>",
      "<span class=\"eqt\">R. V. Gupta</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;. &#2357;&#2368;. &#2327;&#2369;&#2346;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">S. P. Raj</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360;.&#2346;&#2368;.&#2352;&#2366;&#2332;</span>",
      "<span class=\"eqt\">P. Chidambaram</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;. &#2330;&#2367;&#2342;&#2306;&#2348;&#2352;&#2350;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Dr. Manmohan Singh, as Finance Minister</b>, played a crucial role in formulating and implementing the 1991 economic reforms.</p><p><b>Further Insight:</b></p><p>&bull; <b>Key Figures of Economic Reforms</b></p><p>&bull; <b>P. V. Narasimha Rao</b></p><p>&#9675; <b>Position:</b> Prime Minister of India (1991-1996).</p><p>&#9675; <b>Contribution:</b> Led the government during the 1991 economic crisis and was pivotal in implementing the New Economic Policy (NEP) that introduced liberalization, privatization, and globalization.</p><p>&bull; <b>Dr. Manmohan Singh</b></p><p>&#9675; <b>Position:</b> Finance Minister of India (1991-1996).</p><p>&#9675; <b>Contribution:</b> Architect of the economic reforms of 1991. He played a crucial role in formulating and executing the reforms that transformed the Indian economy, including liberalization of trade policies and fiscal consolidation.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which committee, chaired by M. Narasimham, focused on assessing the state of the Indian banking system in 1991?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;. &#2344;&#2352;&#2360;&#2367;&#2350;&#2381;&#2361;&#2344; &#2325;&#2368; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;&#2340;&#2366; &#2357;&#2366;&#2354;&#2368; &#2325;&#2367;&#2360; &#2360;&#2350;&#2367;&#2340;&#2367; &#2344;&#2375; 1991 &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2366; &#2310;&#2325;&#2354;&#2344; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2343;&#2381;&#2351;&#2366;&#2344; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Raj Committee</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Raghuram Rajan Committee</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2328;&#2369;&#2352;&#2366;&#2350; &#2352;&#2366;&#2332;&#2344; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Narasimham Committee I</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2360;&#2367;&#2350;&#2381;&#2361;&#2350; &#2360;&#2350;&#2367;&#2340;&#2367; I</span>",
      "<span class=\"eqt\">Narasimham Committee II</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2360;&#2367;&#2350;&#2381;&#2361;&#2350; &#2360;&#2350;&#2367;&#2340;&#2367; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The <b>Narasimham Committee I</b>, chaired by M. Narasimham, was established in 1991 to review the banking sector and recommend reforms. </p><p>&bull; The<b> Narasimham Committee II</b> (1998) focused on further strengthening the banking sector by recommending measures for improving financial stability and supervision.</p><p><b>Further Insight:</b></p><p>&bull; <b>The Narasimham Committee I (1991)</b></p><p>&#9675; Chairperson: M. Narasimham</p><p>&#9675; Objective: To assess the state of the Indian banking system and recommend reforms.</p><p>&#9675; Recommended measures to improve the efficiency and performance of the banking sector, including the introduction of new regulations and the adoption of international standards.</p><p>&bull; <b>The Narasimham Committee II (1998)</b></p><p>&#9675; Chairperson: M. Narasimham</p><p>&#9675; Objective: To review the progress of banking sector reforms and suggest further improvements.</p><p>&#9675; Focused on strengthening the banking sector by recommending measures for improving financial stability, enhancing supervisory practices, and increasing the autonomy of regulatory bodies.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What was one of the main objectives of the New Economic Policy (NEP) of 1991?</p></span><span class=\"hqt\" style=\"display:none\"><p>1991 &#2325;&#2368; &#2344;&#2312; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367; (&#2319;&#2344;&#2312;&#2346;&#2368;) &#2325;&#2366; &#2319;&#2325; &#2350;&#2369;&#2326;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Increase public sector enterprises</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2313;&#2342;&#2381;&#2351;&#2350;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Decrease foreign direct investment</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2344;&#2367;&#2357;&#2375;&#2358; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Enhance globalization and market orientation</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2376;&#2358;&#2381;&#2357;&#2368;&#2325;&#2352;&#2339; &#2324;&#2352; &#2348;&#2366;&#2332;&#2366;&#2352; &#2313;&#2344;&#2381;&#2350;&#2369;&#2326;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Reinstate trade barriers</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2348;&#2366;&#2343;&#2366;&#2323;&#2306; &#2325;&#2379; &#2346;&#2369;&#2344;&#2307; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; One of the main objectives of the NEP was t<b>o enhance globalization and make the economy more market-oriented.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Objectives of the New Economic Policy (NEP) 1991</b></p><p>&bull; Globalization: Integrate the economy into the global market.</p><p>&bull; Market Orientation: Make the economy more market-driven.</p><p>&bull; Reduce Inflation: Address and rectify payment imbalances.</p><p>&bull; Economic Growth: Increase growth rates and build foreign exchange reserves.</p><p>&bull; Stabilization: Convert the economy into a market economy by removing unnecessary restrictions.</p><p>&bull; Private Sector Participation: Enhance the role of private players in various sectors.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Under the 1991 economic reforms, what change was made to the industrial licensing system?</p></span><span class=\"hqt\" style=\"display:none\"><p>1991 &#2325;&#2375; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2340;&#2361;&#2340; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2354;&#2366;&#2311;&#2360;&#2375;&#2306;&#2360;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2350;&#2375;&#2306; &#2325;&#2381;&#2351;&#2366; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Industrial licensing was completely abolished</span><span class=\"hqt\" style=\"display:none\">&#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2354;&#2366;&#2311;&#2360;&#2375;&#2306;&#2360;&#2367;&#2306;&#2327; &#2325;&#2379; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Licensing was introduced for all sectors</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2354;&#2366;&#2311;&#2360;&#2375;&#2306;&#2360;&#2367;&#2306;&#2327; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2368; &#2327;&#2312;</span>",
      "<span class=\"eqt\">Only a few sectors remained under licensing requirements</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2369;&#2331; &#2361;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2354;&#2366;&#2311;&#2360;&#2375;&#2306;&#2360;&#2367;&#2306;&#2327; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2352;&#2361; &#2327;&#2319;</span>",
      "<span class=\"eqt\">Licensing was made more stringent for all industries</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2354;&#2366;&#2311;&#2360;&#2375;&#2306;&#2360;&#2367;&#2306;&#2327; &#2325;&#2379; &#2324;&#2352; &#2309;&#2343;&#2367;&#2325; &#2325;&#2336;&#2379;&#2352; &#2348;&#2344;&#2366; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The <b>industrial licensing system was significantly relaxed, with licensing requirements being retained only for a few sectors such as defense equipment and hazardous chemicals.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Licensing requirements were abolished for most industries, except for:</b></p><p>&#9675; Cigarettes</p><p>&#9675; Liquor</p><p>&#9675; Industrial explosives</p><p>&#9675; Defense equipment</p><p>&#9675; Hazardous chemicals</p><p>&#9675; Drugs</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which act replaced the Foreign Exchange Regulation Act (FERA) as part of the 1991 economic reforms?</p></span><span class=\"hqt\" style=\"display:none\"><p>1991 &#2325;&#2375; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2340;&#2361;&#2340; &#2325;&#2367;&#2360; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2344;&#2375; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (FERA) &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2354;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Foreign Exchange Management Act (FEMA)</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (FEMA)</span>",
      "<span class=\"eqt\">Foreign Trade Act (FTA)</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (FTA)</span>",
      "<span class=\"eqt\">International Investment Act (IIA)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2344;&#2367;&#2357;&#2375;&#2358; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (IIA)</span>",
      "<span class=\"eqt\">Foreign Exchange Reform Act (FERA)</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2360;&#2369;&#2343;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (FERA)</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The <b>Foreign Exchange Management Act (FEMA) replaced FERA, aiming to liberalize and simplify foreign exchange regulations.</b></p><p><b>Further Insight:</b></p> <h3 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt;page-break-after:auto'>&bull; <b>FERA (Foreign Exchange Regulation Act, 1973)</b></h3><p>&#9675; Year of Implementation: 1974</p><p>&#9675; Objectives:</p><p>&#9632; To regulate and control foreign exchange transactions.</p><p>&#9632; To ensure proper utilization of foreign exchange resources.</p><p>&#9632; To prevent capital flight from India.</p><p>&#9632; Placed strict restrictions on foreign investments, aiming to conserve foreign exchange reserves.</p><p>&#9632; Imposed stringent controls on payments and remittances to foreign countries.</p> <h3 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt;page-break-after:auto'>&bull; <b>FEMA (Foreign Exchange Management Act, 1999)</b></h3><p>&bull; Year of Implementation: 2000 (replaced FERA)</p><p>&bull; Key Objectives:</p><p>&#9675; To facilitate external trade and payments.</p><p>&#9675; To promote the orderly development and maintenance of the foreign exchange market in India.</p><p>&#9675; <b>Replaced the stringent FERA with more relaxed provisions to align with India's liberalized economic environment.</b></p><p>&#9675; Focused on management rather than regulation of foreign exchange, with a shift from enforcement to facilitation.</p>",
    "question_index": 5
  },
  {

    "question": "<span class=\"eqt\"><p>Which of the following was a direct outcome of the New Economic Policy (NEP) introduced in 1991?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; 1991 &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2344;&#2312; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367; (&#2319;&#2344;&#2312;&#2346;&#2368;) &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2341;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>What was a major reason for the 1991 economic crisis in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; 1991 &#2325;&#2375; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2360;&#2306;&#2325;&#2335; &#2325;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2325;&#2366;&#2352;&#2339; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;?</p></span>",

      "<span class=\"eqt\">Decrease in inflation rates</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2342;&#2352; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The<b> major reason for the 1991 economic crisis was the decline in exports, which led to a balance of payments crisis.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Economic Crisis of 1991:</b></p><p>&#9675; India faced a severe financial crisis in 1991, marked by a Balance of Payments (BoP) crisis.</p><p>&#9675; Reasons included a decline in exports, dwindling foreign currency reserves, and rising inflation.</p><p>&#9675; India had to borrow $7 billion from the International Bank for Reconstruction and Development (IBRD), part of the World Bank, and the International Monetary Fund (IMF) under the condition of implementing economic reforms.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about the Narasimham Committee I:</p><p>(a) It was established in 1991 to examine the Indian banking system.</p><p>(b) It recommended the reduction of Statutory Liquidity Ratio (SLR) and Cash Reserve Ratio (CRR).</p><p>(c) Its recommendations led to the introduction of Basel norms in Indian banking regulations.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2352;&#2360;&#2367;&#2350;&#2381;&#2361;&#2350; &#2360;&#2350;&#2367;&#2340;&#2367; I &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(a) &#2351;&#2361; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2332;&#2366;&#2306;&#2330; &#2325;&#2375; &#2354;&#2367;&#2319; 1991 &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>(b) &#2311;&#2360;&#2344;&#2375; &#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2340;&#2352;&#2354;&#2340;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; (&#2319;&#2360;&#2319;&#2354;&#2310;&#2352;) &#2324;&#2352; &#2344;&#2325;&#2342; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; (&#2360;&#2368;&#2310;&#2352;&#2310;&#2352;) &#2350;&#2375;&#2306; &#2325;&#2350;&#2368; &#2325;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358; &#2325;&#2368;&#2404;</p><p>(c) &#2311;&#2360;&#2325;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358;&#2379;&#2306; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327     "solution": "<p>&bull; The Narasimham Committee<b> I was formed in 1991 and made recommendations like reducing the SLR and CRR</b>. </p><p>&bull; However, Basel norms were introduced much later and were not a direct outcome of this committee's recommendations.</p><p><b>Further Insight:</b> </p><p>&bull; <b>The Narasimham Committee I (1991)</b></p><p>&#9675; Chairperson: M. Narasimham</p><p>&#9675; Objective: To assess the state of the Indian banking system and recommend reforms.</p><p>&#9675; Recommended measures to improve the efficiency and performance of the banking sector, including the introduction of new regulations and the adoption of international standards.</p> <h3 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt;page-break-after:auto'>&bull; <b>Basel Norms</b></h3><p>&bull; The<b> Basel Committee on Banking Supervision (BCBS), an international committee established by the central bank governors of the G10 countries.</b></p><p>&bull; Date of Implementation:</p><p>&#9675; <b>Basel I:</b> Introduced in 1988</p><p>&#9675; <b>Basel II:</b> Introduced in 2004</p><p>&#9675; <b>Basel III:</b> Introduced in 2010 (following the 2008 financial crisis)</p><p>&bull; <b>Objective:</b></p><p>&#9675; <b>Basel I:</b> To set minimum capital requirements for banks to reduce credit risk.</p><p>&#9675; <b>Basel II:</b> To enhance risk management and supervision, focusing on credit risk, market risk, and operational risk.</p><p>&#9675; <b>Basel III:</b> To improve the banking sector's ability to deal with financial stress, improve risk management, and strengthen banks' transparency and disclosures. It also introduced higher capital requirements and liquidity standards to avoid a repeat of the 2008 global financial crisis.</p>",

  },

    "solution": "<p>&bull; <b>While the NEP reduced the role of the public sector and encouraged foreign direct investment to improve foreign exchange reserves</b>.</p><p>&bull; Industrial licensing was not completely abolished for all sectors; certain sectors like defense and hazardous industries still required licenses.</p><p><b>Further Insight:</b></p><p>&bull; <b>Key Reforms under NEP Policy</b></p><p>&#9675; Selling government-owned enterprises (PSUs) to private players.</p><p>&#9675; Reduction in sectors reserved exclusively for the government from 17 to just 3 (Transport, Railways, Atomic energy).</p><p>&#9675; <b>Disinvestment:</b> Selling a portion of public sector equity to raise funds and improve efficiency.</p><p>&#9675; Reduction in tariffs, import duties, and trade restrictions.</p><p>&#9675; Allowing Foreign Direct Investment (FDI) up to 100% in some sectors.</p><p>&#9675; Convertibility of the Indian rupee in the current account to facilitate trade and investment.</p><p>&#9675; Removal of the industrial licensing regime (except in a few sectors like defense, explosives).</p><p>&#9675; Abolition of the <b>MRTP Act</b> (Monopolies and Restrictive Trade Practices Act) to promote competition.</p><p>&#9675; Freedom for industries to determine production levels and import capital goods like machinery freely.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Liberalization in India:</p><p>a) The industrial licensing regime was abolished for all industries, except a few like alcohol, explosives, and hazardous chemicals.</p><p>b) Liberalization allowed foreign institutional investors (FIIs) to invest in India's stock markets.</p><p>c) The Reserve Bank of India retained full control over the determination of interest rates even after liberalization.</p><p>Which of the statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2313;&#2342;&#2366;&#2352;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a) &#2358;&#2352;&#2366;&#2348;, &#2357;&#2367;&#2360;&#2381;&#2347;&#2379;&#2335;&#2325; &#2324;&#2352; &#2326;&#2340;&#2352;&#2344;&#2366;&#2325; &#2352;&#2360;&#2366;&#2351;&#2344;&#2379;&#2306; &#2332;&#2376;&#2360;&#2375; &#2325;&#2369;&#2331; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352; &#2360;&#2349;&#2368; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2354;&#2366;&#2311;&#2360;&#2375;&#2306;&#2360;&#2367;&#2306;&#2327; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2368; &#2327;&#2312;&#2404;</p><p>b) &#2313;&#2342;&#2366;&#2352;&#2368;&#2325;&#2352;&#2339; &#2344;&#2375; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2327;&#2340; &#2344;&#2367;&#2357;&#2375;&#2358;&#2325;&#2379;&#2306; (&#2319;&#2347;&#2310;&#2312;&#2310;&#2312;) &#2     "solution": "<p>&bull; <b>Industrial licensing was abolished for most industries, except a few restricted sectors. </b></p><p>&bull; <b>Liberalization allowed FIIs to invest in Indian markets. </b></p><p>&bull; <b>After liberalization, commercial banks were given the freedom to determine interest rates, reducing the RBI's role.</b></p><p><b>Further Insight:</b></p><p>&bull; <b>Liberalization</b></p><p>&#9675; It refers to the Relaxation of government restrictions, usually in areas of trade and investment.</p><p>&#9675; Key Steps Taken:</p><p>&#9632; Interest Rates: Commercial banks gained the freedom to set their interest rates, previously controlled by the Reserve Bank of India (RBI).</p><p>&#9632; Investment Limits: The investment limit for small-scale industries was raised to Rs. 1 crore.</p><p>&#9632; Import Freedom: Industries were allowed to import capital goods and raw materials without government restrictions.</p><p>&#9632; Abolition of Restrictive Practices: Restrictions imposed by the Monopolies and Restrictive Trade Practices (MRTP) Act were removed.</p><p>&#9632; Industrial Licensing: Removed for most industries, with exceptions in sensitive sectors such as defense, hazardous chemicals, and drugs.</p>",

8; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2368;&#2404;</p><p>c) &#2357;&#2376;&#2358;&#2381;&#2357;&#2368;&#2325;&#2352;&#2339; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375;, &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2328;&#2352;&#2375;&#2354;&#2370; &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2347;&#2352;&#2381;&#2350;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2341;&#2368;&#2404;</p><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
