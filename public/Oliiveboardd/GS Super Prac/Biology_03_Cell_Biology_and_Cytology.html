    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Who discovered cells in the human body?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2357; &#2358;&#2352;&#2368;&#2352; &#2350;&#2375;&#2306; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2368; &#2326;&#2379;&#2332; &#2325;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Charles Darwin</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;&#2381;&#2354;&#2381;&#2360; &#2337;&#2366;&#2352;&#2381;&#2357;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Robert Hooke</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2377;&#2348;&#2352;&#2381;&#2335; &#2361;&#2369;&#2325;</span>",
      "<span class=\"eqt\">Herbert Spencer</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2381;&#2348;&#2352;&#2381;&#2335; &#2360;&#2381;&#2346;&#2375;&#2306;&#2360;&#2352;</span>",
      "<span class=\"eqt\">Albert Einstein</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2348;&#2352;&#2381;&#2335; &#2310;&#2311;&#2306;&#2360;&#2381;&#2335;&#2366;&#2312;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Nitially discovered by <b>RobertHooke</b> in 1665, the cell has a rich and interesting history that has ultimately given way to many of today's scientific advancements</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In which year did Walther Flemming coined the term 'chromatin' for the stained substance found in the cell nucleus?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2354;&#2381;&#2335;&#2352; &#2347;&#2381;&#2354;&#2375;&#2350;&#2367;&#2306;&#2327; &#2344;&#2375; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2325;&#2375; &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2325; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2349;&#2367;&#2352;&#2306;&#2332;&#2367;&#2340; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2375; &#2354;&#2367;&#2319; '&#2325;&#2381;&#2352;&#2379;&#2350;&#2375;&#2335;&#2367;&#2344;' &#2358;&#2348;&#2381;&#2342; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2327;&#2338;&#2364;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1900</span><span class=\"hqt\" style=\"display:none\">1900</span>",
      "<span class=\"eqt\">1840</span><span class=\"hqt\" style=\"display:none\">1840</span>",
      "<span class=\"eqt\">1849</span><span class=\"hqt\" style=\"display:none\">1849</span>",
      "<span class=\"eqt\">1879</span><span class=\"hqt\" style=\"display:none\">1879</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>On 13th January <b>1879</b>, Walther Flemming was made a member of the Imperial German Academy of Natural Scientists in Halle. In the same year, he coined the term \"chromatin\" for the stainable substance found in the cell nucleus.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following illustrations is related to chloroplasts?</p><p><img width=602 height=106 id=\"Picture 26\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27168/image026.jpg\" ></p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2330;&#2367;&#2340;&#2381;&#2352; &#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2335; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p><p><img width=602 height=106 id=\"&#2330;&#2367;&#2340;&#2381;&#2352; 26\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27168/image026.jpg\" ></span>",
    "options": [
      "<span class=\"eqt\">a</span><span class=\"hqt\" style=\"display:none\">&#2319;</span>",
      "<span class=\"eqt\">d</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2368;</span>",
      "<span class=\"eqt\">c</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;</span>",
      "<span class=\"eqt\">b</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>a-</b> appears to depict a different type of cell structure, possibly a neuron.</p><p><b>b-</b> resembles a chromosome, which is unrelated to chloroplasts.</p><p><b>c-</b> accurately represents a chloroplast, identifiable by its internal thylakoid stacks (grana), where light-dependent reactions of photosynthesis occur.</p><p><b>d-</b> shows plant cells with a nucleus but does not specifically focus on chloroplasts.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>______ include/s glycogen, poly-&#946;- hydroxybutyrate granules, sulphur granules and gas vesicles.</p></span><span class=\"hqt\" style=\"display:none\"><p>______ &#2327;&#2381;&#2354;&#2366;&#2311;&#2325;&#2379;&#2332;&#2344;, &#2346;&#2377;&#2354;&#2368;-&#946;-&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2377;&#2325;&#2381;&#2360;&#2368;&#2348;&#2381;&#2351;&#2370;&#2335;&#2366;&#2311;&#2352;&#2375;&#2335; &#2325;&#2339;, &#2360;&#2354;&#2381;&#2347;&#2352; &#2325;&#2339; &#2324;&#2352; &#2327;&#2376;&#2360; &#2346;&#2369;&#2335;&#2367;&#2325;&#2366;&#2323;&#2306; &#2360;&#2375; &#2351;&#2369;&#2325;&#2381;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Flagella</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2358;&#2366;&#2349;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Plasma membrane</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2342;&#2381;&#2352;&#2357;&#2381;&#2351; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368;/&#2346;&#2381;&#2354;&#2366;&#2332;&#2381;&#2350;&#2366; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Mesosomes</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351;&#2325;&#2366;&#2351;/&#2350;&#2368;&#2332;&#2379;&#2360;&#2379;&#2350;</span>",
      "<span class=\"eqt\">Cytoplasm</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;/&#2360;&#2366;&#2311;&#2335;&#2379;&#2346;&#2381;&#2354;&#2366;&#2332;&#2381;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Cytoplasm is the gelatinous liquid that fills the inside of a cell. It is composed of water, salts, and various organic molecules. Some intracellular organelles, such the nucleus and mitochondria, are enclosed by membranes that separate them from the cytoplasm.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which component of cell organelles principally performs the function of packaging materials, to be delivered either to the intra-cellular targets or secreted outside the cell?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2309;&#2306;&#2327;&#2325; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2328;&#2335;&#2325; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2376;&#2325;&#2367;&#2306;&#2327; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2375; &#2351;&#2366; &#2340;&#2379; &#2309;&#2306;&#2340;&#2307; &#2325;&#2379;&#2358;&#2367;&#2325;&#2368;&#2351; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2351;&#2366; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2325;&#2375; &#2348;&#2366;&#2361;&#2352; &#2360;&#2381;&#2352;&#2366;&#2357;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chloroplast</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2367;&#2340;&#2354;&#2357;&#2325;</span>",
      "<span class=\"eqt\">Mitochondria</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2340;&#2381;&#2352;&#2325;&#2339;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Golgi Apparatus</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2377;&#2354;&#2381;&#2332;&#2368; &#2313;&#2346;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Chromosomes</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2339;&#2360;&#2370;&#2340;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Golgi apparatus</b> is the principal component of cell organelles that primarily carries out the function of packaging materials, either for delivery to targets within the cell or for secretion outside the cell.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following researchers observed densely stained reticular structures surrounding the nucleus?</p><p><img width=164 height=124 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27409/image023.jpg\" ></p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2358;&#2379;&#2343;&#2325;&#2352;&#2381;&#2340;&#2366; &#2344;&#2375; &#2344;&#2366;&#2349;&#2367;&#2325; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2328;&#2344;&#2368; &#2352;&#2306;&#2327; &#2325;&#2368; &#2332;&#2366;&#2354;&#2368;&#2342;&#2366;&#2352; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;&#2319;&#2306; &#2342;&#2375;&#2326;&#2368;&#2306;?</p><p><img width=164 height=124 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27409/image023.jpg\" ></span>",
    "options": [
      "<span class=\"eqt\">William Harvey</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2354;&#2367;&#2351;&#2350; &#2361;&#2366;&#2352;&#2381;&#2357;&#2375;</span>",
      "<span class=\"eqt\">Francis Crick</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2367;&#2360; &#2325;&#2381;&#2352;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Camillo Golgi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2350;&#2367;&#2354;&#2379; &#2327;&#2377;&#2354;&#2381;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Louis Pasteur</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2369;&#2312; &#2346;&#2366;&#2358;&#2381;&#2330;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Camillo Golgi discovered the Golgi apparatus, a cellular organelle involved in protein and lipid processing. It appears as a densely stained reticular structure around the nucleus when viewed under a microscope.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In which year did Walter Fleming stain the chromosomes to see them clearly and describe the entire process of mitosis?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2354;&#2381;&#2335;&#2352; &#2347;&#2381;&#2354;&#2375;&#2350;&#2367;&#2306;&#2327; &#2344;&#2375; &#2327;&#2369;&#2339;&#2360;&#2370;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2342;&#2375;&#2326;&#2344;&#2375; &#2324;&#2352; &#2360;&#2350;&#2360;&#2370;&#2340;&#2381;&#2352;&#2368; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2325;&#2368; &#2346;&#2370;&#2352;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2352;&#2306;&#2327;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1956</span><span class=\"hqt\" style=\"display:none\">1956</span>",
      "<span class=\"eqt\">1780</span><span class=\"hqt\" style=\"display:none\">1780</span>",
      "<span class=\"eqt\">1901</span><span class=\"hqt\" style=\"display:none\">1901</span>",
      "<span class=\"eqt\">1882</span><span class=\"hqt\" style=\"display:none\">1882</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; &#8203;In 1882, Walther Flemming used aniline dyes to stain chromosomes, allowing him to observe and describe the process of mitosis in detail.</p><p>&bull; Chromosomes: Thread-like structures in the cell nucleus, made of DNA and proteins, carrying genetic information; humans have 46 (23 pairs).</p><p>&bull; Mitosis: A cell division process producing two identical daughter cells with the same chromosome number, involving prophase, metaphase, anaphase, and telophase.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>In which year did Rudolf Virchow published an essay titled 'Cellular Pathology' in which he famously declared that \"every cell arises from another cell\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2369;&#2337;&#2379;&#2354;&#2381;&#2347; &#2357;&#2367;&#2352;&#2330;&#2379; &#2344;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; '&#2360;&#2375;&#2354;&#2369;&#2354;&#2352; &#2346;&#2376;&#2341;&#2379;&#2354;&#2377;&#2332;&#2368;' &#2344;&#2366;&#2350;&#2325; &#2319;&#2325; &#2344;&#2367;&#2348;&#2306;&#2343; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2360;&#2369;&#2357;&#2367;&#2342;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2351;&#2361; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2368; &#2341;&#2368; &#2325;&#2367; \"&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2309;&#2344;&#2381;&#2351; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2360;&#2375; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;\"?</p></span>",
    "options": [
      "<span class=\"eqt\">1865</span><span class=\"hqt\" style=\"display:none\">1865</span>",
      "<span class=\"eqt\">1845</span><span class=\"hqt\" style=\"display:none\">1845</span>",
      "<span class=\"eqt\">1835</span><span class=\"hqt\" style=\"display:none\">1835</span>",
      "<span class=\"eqt\">1855</span><span class=\"hqt\" style=\"display:none\">1855</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Rudolf Virchow was an eminent pathologist and politician, widely regarded as one of the greatest and most influential physicians in history. A founding father of both pathology and social medicine, Virchow analyzed the effects of disease in various organs and tissues of the human body. He identified that diseases are caused by malfunctioning cells. Scientists believed imbalances in the body created blastema in which disease cells start to grow. This belief began changing in <b>1855 </b>when Virchow, aged 34, published an essay in which famously he declared:</p><p>\"Every cell arises from another cell.\"</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which cell organelle is defined as the small round organelle that undergoes oxidation reactions to produce hydrogen peroxide?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2309;&#2306;&#2327;&#2325; &#2325;&#2379; &#2331;&#2379;&#2335;&#2375; &#2327;&#2379;&#2354; &#2309;&#2306;&#2327;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344; &#2346;&#2375;&#2352;&#2379;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2325;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2321;&#2325;&#2381;&#2360;&#2368;&#2325;&#2352;&#2339; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Centrosome</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2306;&#2335;&#2381;&#2352;&#2379;&#2360;&#2379;&#2350;</span>",
      "<span class=\"eqt\">Vacuole</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2325;&#2381;&#2340;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Nucleus</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2349;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Peroxisomes</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2352;&#2379;&#2325;&#2381;&#2360;&#2368;&#2360;&#2379;&#2350;&#2381;&#2360;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Peroxisomes are small, membrane-bound organelles involved in oxidation reactions that produce hydrogen peroxide as a by-product, playing a role in detoxification.</p>",
    "question_index": 8
  },
  {

  {
    "question": "<span class=\"eqt\"><p>______ is the fundamental structural unit of living organisms?</p></span><span class=\"hqt\" style=\"display:none\"><p>______ &#2332;&#2368;&#2357;&#2379;&#2306; &#2325;&#2368; &#2350;&#2370;&#2354;&#2349;&#2370;&#2340; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2311;&#2325;&#2366;&#2312; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Organ system</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2327; &#2340;&#2306;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Tissue</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2340;&#2325;</span>",
      "<span class=\"eqt\">Organ</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Cell</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2358;&#2367;&#2325;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Cells are the fundamental structural unit of living organisms.</p><p>Based on scientific observations over the next 150 years, scientists formulated the cell theory, which is used for all living organisms no matter how simple or complex. The cell theory incorporates three principles:</p><p>&bull; Cells are the most basic building units of life.</p><p>&bull; All living things are composed of cells.</p><p>&bull; New cells are made from preexisting cells, which divide into two.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following cell organelles possesses their own DNA and can synthesise protein for their functions?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2309;&#2306;&#2327;&#2325; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2366; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2366; &#2337;&#2368;&#2319;&#2344;&#2319; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2357;&#2361; &#2309;&#2346;&#2344;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2325;&#2366; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Endoplasmic reticulum</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2381;&#2340;&#2307; &#2346;&#2381;&#2352;&#2342;&#2357;&#2381;&#2351;&#2351;&#2368; &#2332;&#2354;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Chloroplast</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Centrosome</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2306;&#2335;&#2381;&#2352;&#2379;&#2360;&#2379;&#2350;</span>",
      "<span class=\"eqt\">Golgi complex</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2377;&#2354;&#2381;&#2327;&#2368; &#2325;&#2377;&#2350;&#2381;&#2346;&#2381;&#2354;&#2375;&#2325;&#2381;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Chloroplasts possess their own DNA and ribosomes, enabling them to synthesise proteins independently. </p><p>&bull; This is a unique feature of semi-autonomous organelles like mitochondria and chloroplasts.</p><p>&bull; Endoplasmic Reticulum: A network of membranous tubules and sacs involved in protein and lipid synthesis, and intracellular transport.</p><p>&bull; Chloroplast: Organelles in plant cells that contain chlorophyll and are responsible for photosynthesis.</p><p>&bull; Centrosome: A region in the cell that organizes microtubules and is involved in cell division.</p><p>&bull; Golgi Complex: A membrane-bound organelle responsible for modifying, sorting, and packaging proteins and lipids for transport.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following cell organelles can make copies of themselves?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2309;&#2306;&#2327;&#2325; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2351;&#2366;&#2306; &#2348;&#2344;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Golgi apparatus</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2377;&#2354;&#2381;&#2332;&#2368;&#2325;&#2366;&#2351;</span>",
      "<span class=\"eqt\">Vacuole</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2325;&#2381;&#2340;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Cytoplasm</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Mitochondria</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2340;&#2381;&#2352;&#2325;&#2339;&#2367;&#2325;&#2366;/&#2350;&#2366;&#2311;&#2335;&#2379;&#2325;&#2377;&#2344;&#2381;&#2337;&#2381;&#2352;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Top of Form</p><p><b>Mitochondria</b> have their own genetic material and the ability to replicate independently within the cell. This unique feature allows mitochondria to reproduce and contribute to the cellular energy production through oxidative phosphorylation.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Which cell organelles help in intracellular digestion and are known as the \"suicidal bags\" of the cell?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344;-&#2360;&#2375; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2306;&#2327; &#2309;&#2306;&#2340;&#2307; &#2325;&#2379;&#2358;&#2367;&#2325;&#2368;&#2351; &#2346;&#2366;&#2330;&#2344; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2325;&#2375; \"&#2310;&#2340;&#2381;&#2350;&#2328;&#2366;&#2340;&#2368; &#2348;&#2376;&#2327;\" &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lysosome</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2351;&#2360;&#2379;&#2360;&#2379;&#2350;</span>",
      "<span class=\"eqt\">Golgi bodies</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2377;&#2354;&#2381;&#2332;&#2368; &#2348;&#2377;&#2337;&#2368;</span>",
      "<span class=\"eqt\">Centrosome</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2306;&#2335;&#2381;&#2352;&#2379;&#2360;&#2379;&#2350;</span>",
      "<span class=\"eqt\">Chloroplasts</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The cell organelles that help in intracellular digestion and are known as the \"suicidal bags\" of the cell are <b>lysosomes</b>.</p><p>Lysosomes are spherical sacs filled with hydrolytic enzymes that can break down many types of biomolecules. They are found in animal cells and some plant cells. They digest cellular waste, foreign particles, and even damaged or old cell organelles.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>In cell biology, what is a large double-membraned organelle that is sometimes referred to as the 'central unit' of the cell because it contains the chromosomes that bear genetic material?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2332;&#2368;&#2357; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2350;&#2375;&#2306; &#2319;&#2325; &#2348;&#2337;&#2364;&#2366; &#2342;&#2379;&#2361;&#2352;&#2368;-&#2333;&#2367;&#2354;&#2381;&#2354;&#2368; &#2357;&#2366;&#2354;&#2366; &#2309;&#2306;&#2327;&#2325; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; &#2325;&#2349;&#2368;-&#2325;&#2349;&#2368; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2325;&#2368; '&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2311;&#2325;&#2366;&#2312;' &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2311;&#2360;&#2350;&#2375;&#2306; &#2327;&#2369;&#2339;&#2360;&#2370;&#2340;&#2381;&#2352; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2351;&#2375; &#2327;&#2369;&#2339;&#2360;&#2370;&#2340;&#2381;&#2352; &#2310;&#2344;&#2369;&#2357;&#2306;&#2358;&#2367;&#2325; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2325;&#2379; &#2357;&#2361;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Peroxisome</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2321;&#2325;&#2381;&#2360;&#2367;&#2360;&#2379;&#2350;</span>",
      "<span class=\"eqt\">Nucleus</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2325;</span>",
      "<span class=\"eqt\">Mitochondrion</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2311;&#2335;&#2379;&#2325;&#2366;&#2344;&#2381;&#8205;&#2337;&#2381;&#2352;&#2367;&#2351;&#2366;/&#2360;&#2370;&#2340;&#2381;&#2352;&#2325;&#2339;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Lysosome</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2311;&#2360;&#2379;&#2360;&#2379;&#2350;/&#2354;&#2351;&#2344;&#2325;&#2366;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Nucleus is a specialized structure occurring in most cells (except bacteria and blue-green algae) and separated from the rest of the cell by a double layer, the nuclear membrane.</p><p>&bull; In cell biology, <b>nucleus is a large double-membraned organelle</b> that is sometimes referred to as the 'central unit' of the cell because it contains the chromosomes that bear genetic material.</p><p>&bull; The nucleus controls and regulates the activities of the cell (e.g., growth and metabolism) and carries the genes, structures that contain the hereditary information.</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Which cell theory proved that the quasi-fluid nature of lipid enables lateral movement of proteins within the overall bilayer?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2344;&#2375; &#2351;&#2361; &#2360;&#2367;&#2342;&#2381;&#2343; &#2325;&#2367;&#2351;&#2366; &#2325;&#2367; &#2354;&#2367;&#2346;&#2367;&#2337; &#2325;&#2368; &#2309;&#2352;&#2381;&#2343;-&#2340;&#2352;&#2354; &#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367; &#2360;&#2350;&#2327;&#2381;&#2352; &#2348;&#2366;&#2311;&#2354;&#2375;&#2351;&#2352; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2325;&#2375; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2360;&#2306;&#2330;&#2354;&#2344; &#2325;&#2379; &#2360;&#2325;&#2381;&#2359;&#2350; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cell theory</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;</span>",
      "<span class=\"eqt\">Fluid mosaic model</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2352;&#2354; &#2350;&#2379;&#2332;&#2364;&#2375;&#2325; &#2350;&#2377;&#2337;&#2354;</span>",
      "<span class=\"eqt\">Model of Golgi bodies</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2377;&#2354;&#2381;&#2332;&#2368; &#2325;&#2366;&#2351; &#2350;&#2377;&#2337;&#2354;</span>",
      "<span class=\"eqt\">Vacuole theory</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2325;&#2381;&#2340;&#2367;&#2325;&#2366; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>The fluid mosaic</b> hypothesis was formulated by Singer and Nicolson in the early 1970s. According to this model, membranes are made up of lipids, proteins and carbohydrates. The main lipid membrane components are phospholipids</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>A part of the cell other than the nucleus which has DNA and ribosomes and can thus make its own proteins is known as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2325;&#2366; &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2325; &#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366; &#2357;&#2361; &#2349;&#2366;&#2327; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2337;&#2368;&#2319;&#2344;&#2319; &#2324;&#2352; &#2352;&#2366;&#2311;&#2348;&#2379;&#2360;&#2379;&#2350; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2357;&#2361; &#2309;&#2346;&#2344;&#2366; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2348;&#2344;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2325;&#2361;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Endoplasmic reticulum</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2381;&#2340;&#2307; &#2346;&#2381;&#2352;&#2342;&#2357;&#2381;&#2351;&#2351;&#2368; &#2332;&#2354;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Ribosomes</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2311;&#2348;&#2379;&#2360;&#2379;&#2350;</span>",
      "<span class=\"eqt\">Golgi apparatus</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2377;&#2354;&#2381;&#2332;&#2368;&#2325;&#2366;&#2351;</span>",
      "<span class=\"eqt\">Mitochondria</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2311;&#2335;&#2379;&#2325;&#2377;&#2344;&#2381;&#2337;&#2381;&#2352;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; <b>Mitochondria</b> are <b>semi-autonomous organelles</b> that contain:</p><p>o <b>Their own DNA (mtDNA)</b>.</p><p>o <b>Ribosomes (70S type, like prokaryotes)</b>.</p><p>o <b>Protein-synthesis machinery</b> to produce some of their own proteins.</p><p>&#183; Mitochondria's <b>bacterial-like features</b> support the <b>endosymbiotic theory</b> (evolution from engulfed prokaryotes).</p><p>Further insights:</p><p>&#183; <b>Endoplasmic Reticulum (ER)</b>: Lacks DNA; depends on the nucleus for protein synthesis.</p><p>&#183; <b>Ribosomes</b>: Protein factories but <b>no DNA</b> (require mRNA from the nucleus).</p><p>&#183; <b>Golgi Apparatus</b>: Processes/packages proteins but <b>cannot synthesize them independently</b>.</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the component that is unique only to prokaryotes.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2328;&#2335;&#2325; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2325;&#2375;&#2357;&#2354; &#2346;&#2381;&#2352;&#2379;&#2325;&#2376;&#2352;&#2367;&#2351;&#2379;&#2335;&#2381;&#2360; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Nucleus &#8239;</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2325;</span>",

      "<span class=\"eqt\">Nuclear membrane</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2325;&#2368;&#2351; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Mesosome is an extension of the cell membrane presence in cytoplasm as infolding and serves to increase the surface area in photosynthetic prokaryotes, cyanobacteria, wherein it carries the photosynthetic pigments.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>In animal cells, which membrane-bound cell organelles are generally smaller and help to separate waste products?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2381;&#2340;&#2369; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306;, &#2325;&#2380;&#2344;-&#2360;&#2368; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2306;&#2327; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2331;&#2379;&#2335;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2309;&#2346;&#2358;&#2367;&#2359;&#2381;&#2335; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2379; &#2309;&#2354;&#2327; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Plastids</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2335;&#2367;&#2337;</span>",
      "<span class=\"eqt\">Cytosols</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2311;&#2335;&#2379;&#2360;&#2377;&#2354;</span>",
      "<span class=\"eqt\">Golgi apparatus</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2377;&#2354;&#2381;&#2332;&#2368; &#2313;&#2346;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Vacuoles</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2360;&#2343;&#2366;&#2344;&#2368;</span>"

    "correct_option_id": 3,
