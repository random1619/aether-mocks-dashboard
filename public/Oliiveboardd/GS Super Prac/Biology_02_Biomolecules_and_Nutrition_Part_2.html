    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a function of food in the human body?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2366;&#2344;&#2357; &#2358;&#2352;&#2368;&#2352; &#2350;&#2375;&#2306; &#2349;&#2379;&#2332;&#2344; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Aiding in the production of useful body compounds</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2352;&#2368;&#2352; &#2350;&#2375;&#2306; &#2313;&#2346;&#2351;&#2379;&#2327;&#2368; &#2351;&#2380;&#2327;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2350;&#2375;&#2306; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Yielding energy for life processes</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2357;&#2344; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2314;&#2352;&#2381;&#2332;&#2366; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2325;&#2352;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Building up new cells during growth</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2344;&#2312; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339;</span>",
      "<span class=\"eqt\">Destroying old cells to maintain balance</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2369;&#2352;&#2366;&#2344;&#2368; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2379; &#2344;&#2359;&#2381;&#2335; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Food helps in energy production, cell building, and tissue repair. </p><p>&bull; Destroying old cells is a function of apoptosis, not food.</p><p>&bull; Food refers to any substance consumed by living organisms to provide energy, support growth, repair tissues, and maintain life processes.</p><p>&bull; It is a complex mixture of nutrients that organisms ingest, digest, and assimilate to meet their metabolic needs.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Macronutrients include all of the following except:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2376;&#2325;&#2381;&#2352;&#2379;&#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2367;&#2319;&#2306;&#2335;&#2381;&#2360; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2349;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Carbohydrates</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2375;&#2335;</span>",
      "<span class=\"eqt\">Vitamins</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Fats</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2360;&#2366;</span>",
      "<span class=\"eqt\">Proteins</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Vitamins are micronutrients.</p><p>&bull; Macronutrients are required in large amounts and include carbohydrates, proteins, and fats. </p><p>&bull; Needed in concentrations greater than 10 mmol/kg (for plants) or in significant grams per day (for humans)</p><p>&bull; Carbon (C), Hydrogen (H), Oxygen (O), Nitrogen (N), Phosphorus (P), Potassium (K), Calcium (Ca), Magnesium (Mg), and Sulphur (S).</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following carbohydrates is a type of monosaccharide?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2375;&#2335; &#2350;&#2379;&#2344;&#2379;&#2360;&#2376;&#2325;&#2375;&#2352;&#2366;&#2311;&#2337; &#2325;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sucrose</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2325;&#2381;&#2352;&#2379;&#2332;</span>",
      "<span class=\"eqt\">Maltose</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2354;&#2381;&#2335;&#2379;&#2332;&#2364;</span>",
      "<span class=\"eqt\">Fructose</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2352;&#2369;&#2325;&#2381;&#2335;&#2379;&#2332;</span>",
      "<span class=\"eqt\">Cellulose</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2354;&#2381;&#2351;&#2370;&#2354;&#2379;&#2332;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Monosaccharides include glucose and fructose</p><p>&#9675; Monosaccharides are the simplest form of sugars, consisting of a single sugar unit that cannot be hydrolyzed further.</p><p>&bull; Sucrose and maltose are disaccharides</p><p>&#9675; Disaccharides are the sugars formed by the condensation of two monosaccharide units, linked by a glycosidic bond, and can be hydrolyzed into their constituents.</p><p>&bull; Cellulose is a polysaccharide.</p><p>&#9675; Polysaccharide are Complex carbohydrates made of many monosaccharide units linked together,</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The main function of cellulose in the human body is to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2357; &#2358;&#2352;&#2368;&#2352; &#2350;&#2375;&#2306; &#2360;&#2375;&#2354;&#2381;&#2351;&#2370;&#2354;&#2379;&#2332;&#2364; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2325;&#2366;&#2352;&#2381;&#2351; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Provide energy</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2352;&#2381;&#2332;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Act as roughage for bowel movement</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2354; &#2340;&#2381;&#2351;&#2366;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2347;&#2375;&#2332; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Be stored as glycogen</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2354;&#2366;&#2311;&#2325;&#2379;&#2332;&#2344; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Convert into glucose for immediate use</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2340;&#2381;&#2325;&#2366;&#2354; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2381;&#2354;&#2370;&#2325;&#2379;&#2332; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Cellulose is not digestible by humans but provides dietary fiber that aids digestion.</p><p>&bull; Cellulose is a complex carbohydrate (polysaccharide) composed of numerous glucose units linked together, forming a major structural component in plants.</p><p>&bull; It is a linear polymer of &#946;-D-glucose units connected by &#946;-1,4-glycosidic bonds.</p><p>&bull; Found abundantly in the cell walls of plants, providing rigidity and strength.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an animal source of fat?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2360;&#2366; &#2325;&#2366; &#2346;&#2358;&#2369; &#2360;&#2381;&#2352;&#2379;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mustard oil</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2360;&#2379;&#2306; &#2325;&#2366; &#2340;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Coconut oil</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2352;&#2367;&#2351;&#2354; &#2340;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Butter</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2325;&#2381;&#2326;&#2344;</span>",
      "<span class=\"eqt\">Soybean oil</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2351;&#2366;&#2348;&#2368;&#2344; &#2340;&#2375;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Butter is derived from milk and is an animal source of fat, while mustard, coconut, and soybean oils are plant-based.</p><p>&bull; Fats are esters of glycerol and fatty acids, formed through a condensation reaction (esterification), commonly known as triglycerides.</p><p>&bull; Fats serve as a concentrated energy source (9 kcal/g), provide insulation, protect organs, and act as a structural component of cell membranes.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following vitamins is fat-soluble?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2357;&#2360;&#2366; &#2350;&#2375;&#2306; &#2328;&#2369;&#2354;&#2344;&#2358;&#2368;&#2354; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Vitamin C</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2360;&#2368;</span>",
      "<span class=\"eqt\">Vitamin B1</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2348;&#2368;1</span>",
      "<span class=\"eqt\">Vitamin D</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2337;&#2368;</span>",
      "<span class=\"eqt\">Vitamin B12</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2348;&#2368; 12</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Fat-soluble vitamins include A, D, E, and K. Vitamins B1, B12, and C are water-soluble.</p><p>&bull; Vitamins and their functions</p><p>&#9675; Vitamin A: Vision, skin health.</p><p>&#9675; Vitamin D: Calcium absorption, bone health.</p><p>&#9675; Vitamin E: Antioxidant, cell protection.</p><p>&#9675; Vitamin K: Blood clotting.</p><p>&#9675; Vitamin B: Energy metabolism, nerve function.</p><p>&#9675; Vitamin C: Antioxidant, collagen synthesis, immunity.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following carbohydrates is stored in the liver for future energy use?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2375;&#2335; &#2349;&#2357;&#2367;&#2359;&#2381;&#2351; &#2350;&#2375;&#2306; &#2314;&#2352;&#2381;&#2332;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2351;&#2325;&#2371;&#2340; &#2350;&#2375;&#2306; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Glucose</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2352;&#2381;&#2325;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Fructose</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2352;&#2369;&#2325;&#2381;&#2335;&#2379;&#2332;</span>",
      "<span class=\"eqt\">Glycogen</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2354;&#2366;&#2311;&#2325;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Sucrose</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2325;&#2381;&#2352;&#2379;&#2332;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Excess glucose is converted into glycogen and stored in the liver.</p><p>&bull; Carbohydrates are organic compounds made of carbon, hydrogen, and oxygen, with the general formula (CH&#8322;O)&#8345;. </p><p>&bull; They are the primary source of energy for the human body and are classified into three main types:</p><p>&#9675; Monosaccharides  -  Simple sugars like glucose, fructose, and galactose.</p><p>&#9675; Disaccharides  -  Formed by two monosaccharides, e.g., sucrose, lactose, and maltose.</p><p>&#9675; Polysaccharides  -  Complex carbohydrates like starch, glycogen, and cellulose.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which vitamin deficiency causes beriberi?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2325;&#2368; &#2325;&#2350;&#2368; &#2360;&#2375; &#2348;&#2375;&#2352;&#2368;&#2348;&#2375;&#2352;&#2368; &#2352;&#2379;&#2327; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Vitamin A</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2319;</span>",
      "<span class=\"eqt\">Vitamin B1</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2348;&#2368;1</span>",
      "<span class=\"eqt\">Vitamin C</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2360;&#2368;</span>",
      "<span class=\"eqt\">Vitamin K</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2325;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Vitamin B1 (thiamine) deficiency leads to beriberi, a disease affecting the nervous system.</p><p>&bull; Vitamin B is a water-soluble vitamin group essential for energy metabolism, nerve function, and red blood cell formation. It consists of eight different B-complex vitamins, each with specific functions.</p><p>&bull; Types and Functions of Vitamin B:</p><p>&#9675; Vitamin B1 (Thiamine)  -  Essential for carbohydrate metabolism; deficiency causes Beriberi.</p><p>&#9675; Vitamin B2 (Riboflavin)  -  Helps in energy production; deficiency leads to cracked lips and mouth sores.</p><p>&#9675; Vitamin B3 (Niacin)  -  Important for DNA repair and energy metabolism; deficiency causes Pellagra.</p><p>&#9675; Vitamin B5 (Pantothenic Acid)  -  Required for fatty acid synthesis.</p><p>&#9675; Vitamin B6 (Pyridoxine)  -  Helps in protein metabolism and neurotransmitter production; deficiency leads to anemia and nerve disorders.</p><p>&#9675; Vitamin B7 (Biotin)  -  Essential for fat metabolism and healthy skin/hair.</p><p>&#9675; Vitamin B9 (Folic Acid)  -  Crucial for DNA synthesis and fetal development; deficiency causes neural tube defects in babies.</p><p>&#9675; Vitamin B12 (Cobalamin)  -  Needed for red blood cell production and nerve function; deficiency causes Pernicious Anemia.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following foods is rich in protein?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2326;&#2366;&#2342;&#2381;&#2351; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2360;&#2375; &#2349;&#2352;&#2346;&#2370;&#2352; &#2361;&#2376;?</p></span>",
