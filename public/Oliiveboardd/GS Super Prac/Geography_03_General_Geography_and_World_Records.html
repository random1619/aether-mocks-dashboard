<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">

                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>

                </div>

            </div>
            
            <div class="welcome-actions">

                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

        </div>
    </div>
    
    <!-- Main Exam Interface -->

                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->

            <!-- Question Area -->
            <div class="question-view">

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>

                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following animals has the longest lifespan?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2332;&#2366;&#2344;&#2357;&#2352; &#2325;&#2366; &#2332;&#2368;&#2357;&#2344;&#2325;&#2366;&#2354; &#2360;&#2348;&#2360;&#2375; &#2354;&#2306;&#2348;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Blue Whale</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2354;&#2370; &#2357;&#2381;&#2361;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Giant Tortoise</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2366;&#2354;&#2325;&#2366;&#2351; &#2325;&#2331;&#2369;&#2310;</span>",
      "<span class=\"eqt\">African Bush Elephant</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2347;&#2364;&#2381;&#2352;&#2368;&#2325;&#2368; &#2348;&#2369;&#2358; &#2361;&#2366;&#2341;&#2368;</span>",

    "correct_option_id": 1,
    "solution": "<p>&bull; The Giant Tortoise has a lifespan of around 190 to 200 years, making it the longest-living animal.</p><p>&bull; Blue Whale: Largest animal but not the longest-living.</p><p>&bull; African Bush Elephant: Largest land animal but has an average lifespan of about 60 - 70 years.</p><p>&bull; Chimpanzee: Known for intelligence but has a lifespan of around 50 - 60 years.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which country has the highest population density?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2325;&#2366; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2328;&#2344;&#2340;&#2381;&#2357; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Singapore</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2306;&#2327;&#2366;&#2346;&#2369;&#2352;</span>",

    ],
    "correct_option_id": 2,

    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The world's longest railway bridge is located in which country?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2369;&#2344;&#2367;&#2351;&#2366; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2354;&#2306;&#2348;&#2366; &#2352;&#2375;&#2354;&#2357;&#2375; &#2346;&#2369;&#2354; &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;</span>",

    "correct_option_id": 1,

    "question_index": 2

  {

    "options": [
      "<span class=\"eqt\">Caspian Sea</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2360;&#2381;&#2346;&#2367;&#2351;&#2344; &#2360;&#2366;&#2327;&#2352;</span>",

    "question_index": 3

  {
    "question": "<span class=\"eqt\"><p>The world's largest diamond is named:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2375; &#2361;&#2368;&#2352;&#2375; &#2325;&#2366; &#2344;&#2366;&#2350; &#2361;&#2376;:</p></span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Cullinan is the largest diamond ever found, weighing over 3,106 carats (largest rough diamond ever found).Cut into 9 major stones. The Cullinan I is the largest clear-cut diamond in the world.</p><p>&bull; Koh-i-Noor:Mined in India (Golconda region). Weight: 105.6 carats (current size after recutting).</p><p>&bull; Hope Diamond Mined in India (Golconda region). 45.52 carats (current size). Currently located in the Smithsonian National Museum of Natural History, Washington D.C.</p><p>&bull; Orloff Diamond, Mined in India (Golconda region)., weight 189.62 Cararts. Current Location is Diamond fund of the Moscow Kremlin</p>",
    "question_index": 4

  {

      "<span class=\"eqt\">China</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2368;&#2344;</span>",

      "<span class=\"eqt\">India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Canada has the longest continuous land border with US 8,893 Kilometer</p><p>&bull; China has the longest land border in the world at 22,475 kilometers. It shares this border with 14 countries. </p><p>&bull; Russia has second longest continuous border with Kazakhstan</p><p>&bull; Indian has fifth longest land border in the world with Bangladesh</p>",

      "<span class=\"eqt\">Laerdal Tunnel</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2375;&#2352;&#2381;&#2337;&#2354; &#2360;&#2369;&#2352;&#2306;&#2327;</span>",

  {
    "question": "<span class=\"eqt\"><p>Which is the world's largest peninsula?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2346;&#2381;&#2352;&#2366;&#2351;&#2342;&#2381;&#2357;&#2368;&#2346; &#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Scandinavian Peninsula</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2325;&#2376;&#2306;&#2337;&#2367;&#2344;&#2375;&#2357;&#2367;&#2351;&#2366;&#2312; &#2346;&#2381;&#2352;&#2366;&#2351;&#2342;&#2381;&#2357;&#2368;&#2346;</span>"

    "correct_option_id": 0,
    "solution": "<p>&bull; The Arabian Peninsula is the largest in the world.</p><p>&#9675; Arabian Peninsula: Located in the Middle East, encompassing countries like Saudi Arabia, Yemen, and the United Arab Emirates. </p><p>&bull; Indian Peninsula: Primarily covers the southern part of India, bordered by the Arabian Sea and Bay of Bengal. </p><p>&bull; Labrador Peninsula: Found in eastern Canada, bordering Hudson Bay. </p><p>&bull; Scandinavian Peninsula: Covers most of Norway, Sweden, and a part of Finland in Northern Europe</p>",

  {

    "options": [
      "<span class=\"eqt\">Kathmandu</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2336;&#2350;&#2366;&#2306;&#2337;&#2370;</span>",

  {
    "question": "<span class=\"eqt\"><p>Which is the largest island in the world?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2342;&#2381;&#2357;&#2368;&#2346; &#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Amazon</span><span class=\"hqt\" style=\"display:none\">Amazon</span>",

    "solution": "<p>&bull; The coldest place on Earth is <b>East Antarctica</b>, specifically the <b>Antarctic Plateau</b>. </p><p>&bull; The lowest natural temperature ever directly recorded on Earth was <b>-128.6&deg;F (-89.2&deg;C)</b> at the <b>Soviet Vostok Station</b> on July 21, 1983. </p><p>&bull; More recent satellite measurements have identified even colder temperatures in some areas, with pockets reaching as low as <b>-144&deg;F (-98&deg;C)</b> during the polar winter.</p><p>&bull; Oymyakon is the coldest inhabited place on Earth located in Siberia, Russia ( -67.7&deg;C / -89.9&deg;F (1933).)</p><p>&bull; Verkhoyansk also located in Siberia Russia(Recorded as low as -67.8&deg;C / -90.0&deg;F (1892))</p><p>&bull; Greenland Ice Sheet is one of the coldest region in the northern Hemisphere (-66&deg;C / -87&deg;F in winter.)</p>",
