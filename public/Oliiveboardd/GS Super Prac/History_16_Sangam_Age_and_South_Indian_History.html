  {
    "question": "<span class=\"eqt\"><p>The Sangam literature mainly flourished under the patronage of:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2327;&#2350; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2375; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2350;&#2375;&#2306; &#2347;&#2354;&#2366;-&#2347;&#2370;&#2354;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Chera kings</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2375;&#2352; &#2352;&#2366;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Chola kings</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2379;&#2354; &#2352;&#2366;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Pandya kings</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2306;&#2337;&#2381;&#2351; &#2352;&#2366;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Kalabhra kings</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2354;&#2349;&#2381;&#2352; &#2352;&#2366;&#2332;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Sangam Literature Patronage: The Sangam literature primarily flourished under the Pandya kings' patronage in Madurai. </p><p>&#183; The Sangam (meaning \"assembly\" or \"academy\") was a college of Tamil poets and scholars who gathered under royal patronage. </p><p>&#183; Three such assemblies (Sangams) are believed to have existed, with the third Sangam (around 3rd century BCE to 3rd century CE) producing most of the surviving literature. </p><p>&#183; The Pandya kings provided crucial support by hosting these literary assemblies at their capital Madurai. </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following foreign sources mentions Muziris as the 'first emporium of India'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2360;&#2381;&#2352;&#2379;&#2340; &#2350;&#2369;&#2332;&#2367;&#2352;&#2367;&#2360; &#2325;&#2379; '&#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2319;&#2350;&#2381;&#2346;&#2379;&#2352;&#2367;&#2351;&#2350;' &#2348;&#2340;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Periplus of the Erythrean Sea</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2352;&#2367;&#2346;&#2381;&#2354;&#2360; &#2321;&#2347; &#2342; &#2311;&#2352;&#2367;&#2341;&#2381;&#2352;&#2367;&#2351;&#2344; &#2360;&#2366;&#2327;&#2352;</span>",
      "<span class=\"eqt\">Ptolemy's Geography</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2377;&#2354;&#2375;&#2350;&#2368; &#2325;&#2366; &#2349;&#2370;&#2327;&#2379;&#2354;</span>",
      "<span class=\"eqt\">Pliny's Natural History</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2367;&#2344;&#2368; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Megasthenes's Indica</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2327;&#2360;&#2381;&#2341;&#2344;&#2368;&#2332; &#2325;&#2368; &#2311;&#2306;&#2337;&#2367;&#2325;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Muziris as First Emporium Pliny the Elder, in his work \"Natural History\" (written around 77-79 CE), specifically mentions Muziris as the \"first emporium of India.\"</p><p>&#183; Muziris (modern-day Kodungallur in Kerala) was a major port city that facilitated extensive trade between South India and the Roman Empire.</p><p>&#183; Archaeological evidence, including Roman coins and artifacts, confirms the significance of this trading port. </p><p>&#183; The port handled trade in pepper, precious stones, pearls, muslin, and other valuable commodities.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following eco-regions with their landscapes:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column A(Eco-regions)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column B(Landscapes)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A.Kurinji</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.Forest region</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B.Mullai</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.Hilly region</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C.Marutham</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.Coastal region</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D.Neithal</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.Riverine track</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2346;&#2352;&#2367;&#2342;&#2371;&#2358;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; A(&#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; B(&#2346;&#2352;&#2367;&#2342;&#2371;&#2358;&#2381;&#2351;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2325;&#2369;&#2352;&#2367;&#2306;&#2332;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2357;&#2344; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2348;&#2368;.&#2350;&#2369;&#2354;&#2381;&#2354;&#2312;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.&#2346;&#2361;&#2366;&#2337;&#2364;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2368;.&#2350;&#2352;&#2369;&#2341;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.&#2340;&#2335;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2337;&#2368;.&#2344;&#2368;&#2341;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.&#2344;&#2342;&#2368; &#2346;&#2341;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">A-ii, B-i, C-iv, D-iii</span><span class=\"hqt\" style=\"display:none\">A-ii, B-i, C-iv, D-iii</span>",
      "<span class=\"eqt\">A-i, B-ii, C-iii, D-iv</span><span class=\"hqt\" style=\"display:none\">A-i, B-ii, C-iii, D-iv</span>",
      "<span class=\"eqt\">A-iii, B-iv, C-i, D-ii</span><span class=\"hqt\" style=\"display:none\">A-iii, B-iv, C-i, D-ii</span>",
      "<span class=\"eqt\">A-iv, B-iii, C-ii, D-i</span><span class=\"hqt\" style=\"display:none\">A-iv, B-iii, C-ii, D-i</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Sangam literature describes five ecological zones (Tinai):</p><p>&#183; Kurinji (mountainous region): Associated with hill tribes, hunting, and gathering</p><p>&#183; Mullai (forest region): Characterized by pastoral activities and cattle herding</p><p>&#183; Marutham (riverine plains): Agricultural lands along river valleys</p><p>&#183; Neithal (coastal region): Areas where fishing and salt production were primary activities</p><p>&#183; Palai (dry lands): Not a permanent landscape but represented areas that became arid during summer</p><p><img width=619 height=240 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27149/image001.png\" ></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following officials with their roles during the Sangam period:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column A (Officials)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column B (Roles)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Amaichar</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Gathered intelligence</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Anthanar</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Led military campaigns and managed army</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Senathipathi</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Conducted religious ceremonies and advised king</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Otrar</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Handled state administration and advised on policy</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2327;&#2350; &#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2368; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366;&#2323;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2377;&#2354;&#2350; &#2319; (&#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2377;&#2354;&#2350; &#2348;&#2368; (&#2349;&#2370;&#2350;&#2367;&#2325;&#2366;&#2319;&#2306;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2319;. &#2309;&#2350;&#2366;&#2351;&#2330;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2326;&#2369;&#2347;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2319;&#2325;&#2340;&#2381;&#2352; &#2325;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2348;&#2368;. &#2309;&#2344;&#2381;&#2341;&#2344;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2360;&#2376;&#2344;&#2381;&#2351; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344;&#2379;&#2306; &#2325;&#2366; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2360;&#2375;&#2344;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2367;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2368;. &#2360;&#2375;&#2344;&#2366;&#2346;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2360;&#2350;&#2366;&#2352;&#2379;&#2361; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2367;&#2319; &#2324;&#2352; &#2352;&#2366;&#2332;&#2366; &#2325;&#2379; &#2360;&#2354;&#2366;&#2361; &#2342;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2337;&#2368;. &#2323;&#2335;&#2381;&#2352;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2352;&#2366;&#2332;&#2381;&#2351; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2379; &#2360;&#2306;&#2349;&#2366;&#2354;&#2366; &#2324;&#2352; &#2344;&#2368;&#2340;&#2367; &#2346;&#2352; &#2360;&#2354;&#2366;&#2361; &#2342;&#2368;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">A-4, B-3, C-2, D-1</span><span class=\"hqt\" style=\"display:none\">A-4, B-3, C-2, D-1</span>",

    "correct_option_id": 0,
    "solution": "<p>&#183; Amaichar (Ministers) - Handled state administration and advised the king on policy matters</p><p>&#183; Anthanar (Priests) - Conducted religious ceremonies and provided spiritual guidance to the king</p><p>&#183; Senathipathi (Military commanders) - Led armies in battle and managed military affairs</p><p>&#183; Otrar (Spies) - Gathered intelligence about internal and external affairs and reported to the king</p><p>Further insights:</p><p>The fifth official group, Thuthar (envoys), was responsible for diplomatic relations with other kingdoms.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The coronation ceremony during Sangam Age was known as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2327;&#2350; &#2351;&#2369;&#2327; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2352;&#2366;&#2332;&#2381;&#2351;&#2366;&#2349;&#2367;&#2359;&#2375;&#2325; &#2360;&#2350;&#2366;&#2352;&#2379;&#2361; &#2325;&#2379; &#2311;&#2360; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Mudisoottuvila</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2342;&#2367;&#2360;&#2369;&#2340;&#2381;&#2340;&#2369;&#2357;&#2367;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Arasukattil</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2360;&#2369;&#2325;&#2366;&#2340;&#2381;&#2340;&#2367;&#2354;</span>",
      "<span class=\"eqt\">Arasavai</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2366;&#2360;&#2357;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Ariyanai</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2367;&#2351;&#2366;&#2344;&#2366;&#2312;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Coronation Ceremony Mudisoottuvila or arasukattilerudhal was the formal coronation ceremony. This elaborate ritual symbolized the transfer of power and included:</p><p>&#183; Religious ceremonies</p><p>&#183; Public proclamations</p><p>&#183; Installation of royal insignia</p><p>&#183; Recognition by nobles and officials</p><p>Further insights:</p><p>The king's court was called Arasavai. The king occupied a ceremonious throne in the court called Ariyanai. In the court, the king was surrounded by officials, distinguished visitors and court poets. . </p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which king built Kallanai across the river Kaveri?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2366; &#2344;&#2375; &#2325;&#2366;&#2357;&#2375;&#2352;&#2368; &#2344;&#2342;&#2368; &#2325;&#2375; &#2346;&#2366;&#2352; &#2325;&#2354;&#2381;&#2354;&#2344;&#2312; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2352;&#2366;&#2351;&#2366; &#2341;&#2366;?</p></span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>Kallanai Dam Karikalan Chola built the Kallanai (Grand Anicut) across the Kaveri River. This engineering marvel:</p><p>&#183; Kallanai means a dam made of stone</p><p>&#183; Was built around the 2nd century CE</p><p>&#183; Used stone blocks and is considered one of the oldest water-diversion structures still in use</p><p>&#183; Helped in irrigation and flood control</p><p>&#183; Demonstrates advanced engineering skills of the period</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The five-member committee in Sangam administration was called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2327;&#2350; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2350;&#2375;&#2306; &#2346;&#2366;&#2306;&#2330; &#2360;&#2342;&#2360;&#2381;&#2351;&#2368;&#2351; &#2360;&#2350;&#2367;&#2340;&#2367; &#2325;&#2379; &#2348;&#2369;&#2354;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Enberaayam</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2348;&#2375;&#2352;&#2366;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Aimperunguzhu</span><span class=\"hqt\" style=\"display:none\">&#2320;&#2350;&#2381;&#2346;&#2375;&#2352;&#2369;&#2306;&#2327;&#2369;&#2333;&#2369;</span>",
      "<span class=\"eqt\">Avai</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2312;</span>",
      "<span class=\"eqt\">Mandram</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2342;&#2381;&#2352;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Sangam administration had two important committees: Aimperunguzhu (Five-member committee):</p><p>&#183; Ministers</p><p>&#183; Priests</p><p>&#183; Military commanders</p><p>&#183; Spies</p><p>&#183; Ambassadors</p><p>Enberaayam (Eight-member group):</p><p>&#183; Various administrative officials handling different aspects of governance</p><p>Further insights:</p><p>The king's court was called Arasavai.The king occupied a ceremonious throne in the court called Ariyanai. In the court, the king was surrounded by officials, distinguished visitors and court poets. The rulers had five-fold duties. They were encouraging learning, performing rituals, presenting gifts, protecting people and punishing the criminals. </p><p>Ambassadors were employed by the kings. They played a significant role. The king was assisted by a number of officials. They were divided into Aimperunguzhu (five-member committee) and Enberaayam (eight-member group).</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The evening market in Madurai during Sangam Age was called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2327;&#2350; &#2351;&#2369;&#2327; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2350;&#2342;&#2369;&#2352;&#2376; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350; &#2325;&#2375; &#2348;&#2366;&#2332;&#2366;&#2352; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Nalangadi</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2354;&#2306;&#2327;&#2337;&#2368;</span>",
      "<span class=\"eqt\">Allangadi</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2354;&#2306;&#2327;&#2366;&#2337;&#2368;</span>",
      "<span class=\"eqt\">Mandram</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2342;&#2381;&#2352;&#2350;</span>",
      "<span class=\"eqt\">Pattinam</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2335;&#2381;&#2335;&#2367;&#2344;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Markets in Madurai Madurai had two main markets:</p><p>&#183; Nalangadi: Morning market dealing with fresh produce and daily necessities</p><p>&#183; Allangadi: Evening market focusing on specialized goods and luxury items This dual market system shows the sophisticated urban planning and commercial organization of the period.</p><p>Further insights:</p><p>In the context of ancient Tamil society, particularly during the Sangam Age, \"vanikan\" refers to a general trader, \"chattan\" is another term associated with trade, \"nigama\" denotes a merchant guild, \"umanar\" specifically refers to salt merchants, and \"chattu\" describes mobile or itinerant traders who moved from place to place to sell goods. </p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was NOT a major export item during Sangam Age?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2306;&#2327;&#2350; &#2351;&#2369;&#2327; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; &#2357;&#2360;&#2381;&#2340;&#2369; &#2344;&#2361;&#2368;&#2306; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pepper</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2354;&#2368; &#2350;&#2367;&#2352;&#2381;&#2330;</span>",
      "<span class=\"eqt\">Pearls</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2340;&#2368;</span>",
      "<span class=\"eqt\">Horses</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2379;&#2337;&#2364;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Silk</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2358;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Trade During Sangam Age Exports included:</p><p>&#183; Spices (especially pepper)</p><p>&#183; Pearls and precious stones</p><p>&#183; Textiles (muslin)</p><p>&#183; Ivory and sandalwood</p><p>&#183; Salt</p><p>Imports included:</p><p>&#183; Horses (mainly from Arabia)</p><p>&#183; Gold and silver</p><p>&#183; Wine</p><p>&#183; Mediterranean pottery</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The chief of the army during Sangam Age was known as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2327;&#2350; &#2351;&#2369;&#2327; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2360;&#2375;&#2344;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2325;&#2379; &#2311;&#2360; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Thanaithalaivan</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2366;&#2344;&#2376;&#2341;&#2354;&#2376;&#2357;&#2344;</span>",
      "<span class=\"eqt\">Enberaayam</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2348;&#2375;&#2352;&#2366;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Kizhar</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2332;&#2364;&#2361;&#2352;</span>",
      "<span class=\"eqt\">Veerar</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2368;&#2352;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The king's army consisted of four divisions, namely, infantry, cavalry, elephants and chariot force. The army was known as 'Padai'. The chief of the army was known as Thanaithalaivan. </p><p>The prominent weapons used during this period were sword, kedayam (shield), tomaram(lance), spears, bows and arrows. Tomaram is mentioned as a missile to be thrown at the enemy from a distance. The place where the weapons were kept was known as paddaikottil. The forts were protected by deep moats and trenches. The war drum was worshipped as a deity.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Which dynasty used 'Two Fish' as their royal insignia?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358; &#2344;&#2375; '&#2342;&#2379; &#2350;&#2331;&#2354;&#2367;&#2351;&#2379;&#2306;' &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; &#2358;&#2366;&#2361;&#2368; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2311;&#2360;&#2381;&#2340;&#2375;&#2350;&#2366;&#2354; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cheras</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2375;&#2352;</span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>Royal Insignias:</p><p>Each dynasty had distinct royal emblems:</p><p>&#183; Pandyas: Two Fish (representing their control over sea trade)</p><p>&#183; Cholas: Tiger (symbolizing strength and valor)</p><p>&#183; Cheras: Bow and Arrow (indicating their martial prowess)</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Kingdoms</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Capital</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Port</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Symbol</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cheras</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vanji</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Thondi, Musiri</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bow and Arrow</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cholas</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Uraiyur</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Poompuhar   (Kaveripattanam)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tiger</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Pandyas</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Madurai</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Korkai</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Fish</td></tr></table>",

    "question": "<span class=\"eqt\"><p>The fertile land in Sangam Age was called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2327;&#2350; &#2351;&#2369;&#2327; &#2350;&#2375;&#2306; &#2313;&#2346;&#2332;&#2366;&#2314; &#2349;&#2370;&#2350;&#2367; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Vanpulam</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2344;&#2346;&#2369;&#2354;&#2350;</span>",
      "<span class=\"eqt\">Menpulam</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2344;&#2346;&#2369;&#2354;&#2350;</span>",
      "<span class=\"eqt\">Mullai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2354;&#2381;&#2354;&#2312;</span>",
      "<span class=\"eqt\">Palai</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2354;&#2366;&#2312;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Agricultural Land Classification Land classifications included:</p><p>&#183; Menpulam: Fertile land suitable for agriculture. It produced paddy and sugarcane.</p><p>&#183; Vanpulam(hard land): The rest of the landscape, excluding Neithal, was called vanpulam (hard land), and it produced pulses and dry grains.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>The concept of Muthamizh included:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2369;&#2341;&#2366;&#2350;&#2367;&#2332; &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Iyal, Nadagam, Koothu</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2351;&#2366;&#2354;, &#2344;&#2366;&#2342;&#2327;&#2366;&#2350;, &#2325;&#2370;&#2341;&#2369;</span>",
      "<span class=\"eqt\">Iyal, Isai, Naatakam</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2351;&#2366;&#2354;, &#2311;&#2360;&#2366;&#2312;, &#2344;&#2366;&#2335;&#2325;&#2350;</span>",
      "<span class=\"eqt\">Isai, Koothu, Nadagam</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2366;&#2312;, &#2325;&#2369;&#2341;&#2369;, &#2344;&#2366;&#2342;&#2366;&#2327;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Iyal, Isai, Koothu</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2351;&#2366;&#2354;, &#2311;&#2360;&#2366;&#2312;, &#2325;&#2370;&#2341;&#2369;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Muthamizh represented three aspects of Tamil arts:</p><p>&#183; Iyal (Literature): Poetry and prose</p><p>&#183; Isai (Music): Both vocal and instrumental</p><p>&#183; Naatakam (Drama): Theatrical performances This trinity formed the foundation of Tamil cultural expression.</p><p>Further insights:</p><p>&#183; Karikalan was master of seven notes of music (EzhisaiVallavan). Singing bards were called panar and vraliyar. Dancing was performed by kanigaiyar. </p><p>&#183; Koothu (folk drama) was the most important cultural practice of the people of Sangam Age. They developed the concept of Muthamizh (Iyal, Isai, Naatakam).</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>The lighthouse in Sangam ports was called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2327;&#2350; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2381;&#2340;&#2306;&#2349; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Kalangaraillangusudar</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2354;&#2306;&#2327;&#2352;&#2376;&#2354;&#2366;&#2306;&#2327;&#2369;&#2360;&#2369;&#2342;&#2352;</span>",
      "<span class=\"eqt\">Pattinappakam</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2335;&#2381;&#2335;&#2367;&#2344;&#2346;&#2381;&#2346;&#2325;&#2350;</span>",
      "<span class=\"eqt\">Pattinam</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2335;&#2381;&#2335;&#2367;&#2344;&#2350;</span>",
      "<span class=\"eqt\">Paddaikottil</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2337;&#2381;&#2337;&#2376;&#2325;&#2379;&#2335;&#2367;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Warehouses for storing the goods were built along the coast. The chief ports had light houses, which were called Kalangaraillangusudar. Caravans of merchants carried their merchandise to different places in oxen-driven carts. Barter system was prevalent.</p><p>Major Ports: Musiri, Tondi, Korkai</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements about Sangam society is FALSE?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2327;&#2350; &#2360;&#2350;&#2366;&#2332; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Women had equal property rights</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2379; &#2360;&#2350;&#2366;&#2344; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2341;&#2375;</span>",
      "<span class=\"eqt\">Caste system was well developed</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2340;&#2367; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2309;&#2330;&#2381;&#2331;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2341;&#2368;</span>",
      "<span class=\"eqt\">Marriage was a matter of self-choice</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2357;&#2366;&#2361; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2368; &#2346;&#2360;&#2306;&#2342; &#2325;&#2366; &#2350;&#2366;&#2350;&#2354;&#2366; &#2341;&#2366;</span>",
      "<span class=\"eqt\">Chastity was considered the highest virtue</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2342;&#2381;&#2343;&#2340;&#2366; &#2325;&#2379; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2327;&#2369;&#2339; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Caste did not develop in Tamizhagam as it did in northern India. Varuna system (occupation based caste) came to the Dravidian south comparatively late.</p><p>Sangam Society Key characteristics:</p><p>&#183; Women enjoyed considerable freedom but not equal property rights</p><p>&#183; Social divisions were based on occupation rather than rigid caste</p><p>&#183; Marriage customs were relatively liberal</p><p>&#183; High value placed on personal virtue and honor</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>The court of justice in villages was called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2366;&#2306;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2366;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Avai</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2312;</span>",
      "<span class=\"eqt\">Mandram</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2342;&#2381;&#2352;&#2350;</span>",
      "<span class=\"eqt\">Ur</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2352;</span>",
      "<span class=\"eqt\">Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In the capital town, the court of justice was called Avai. In the villages, Mandram served as the place for dispensing justice.</p><p>Judicial System Justice was administered at different levels:</p><p>&#183; Avai: Royal court for major cases</p><p>&#183; Mandram: Village courts for local disputes</p><p>&#183; Sabha: Assembly of learned men for special cases</p><p>Further insights:</p><p>The entire kingdom was called Mandalam. Mandalam was divided into Nadus. Kurrmwas subdivision of Nadu. The Urwas a village, classified into perur (big village), Sirur (a small village) and Mudur (an old village) depending upon its population, size and antiquity. Pattinam was the name for a coastal town and Puharwas the general term for harbour town.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>The primary deity of the Tamils during Sangam Age was:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2327;&#2350; &#2351;&#2369;&#2327; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2340;&#2350;&#2367;&#2354;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2342;&#2375;&#2357;&#2340;&#2366; &#2341;&#2375;:</p></span>",
    "options": [
      "<span class=\"eqt\">Sivan</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2357;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Mayon</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2351;&#2379;&#2344;</span>",
      "<span class=\"eqt\">Seyon or Murugan</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2351;&#2379;&#2344; &#2351;&#2366; &#2350;&#2369;&#2352;&#2369;&#2327;&#2344;</span>",
      "<span class=\"eqt\">Indiran</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2342;&#2367;&#2352;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The primary deity of the Tamils was Seyon or Murugan. </p><p>&#183; Other gods worshipped during Sangam period were Sivan, Mayon (Vishnu), Indiran, Varunan and Kotravai. </p><p>&#183; The Hero stone (natukkal) worship was in practice. </p><p>&#183; Buddhism and Jainism also co-existed. </p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>The author of Silappathikaram was:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2367;&#2354;&#2346;&#2381;&#2346;&#2366;&#2342;&#2367;&#2325;&#2366;&#2352;&#2350; &#2325;&#2375; &#2354;&#2375;&#2326;&#2325; &#2341;&#2375;:</p></span>",
    "options": [
      "<span class=\"eqt\">Senguttuvan</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2306;&#2327;&#2369;&#2335;&#2381;&#2335;&#2369;&#2357;&#2344;</span>",
      "<span class=\"eqt\">Ilango Adigal</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2366;&#2306;&#2327;&#2379; &#2309;&#2337;&#2367;&#2327;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Karikalan</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2367;&#2325;&#2366;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Nedunchezhiyan</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2342;&#2369;&#2344;&#2330;&#2375;&#2333;&#2367;&#2351;&#2366;&#2344;</span>"

    "solution": "<p>Cheran Senguttuvan's younger brother was Ilango Adigal. He was the author of Silappathikaram.</p><p>Literary Works Ilango Adigal's Silappathikaram is one of the Five Great Epics of Tamil literature. It:</p><p>&#183; Tells the story of Kannagi and Kovalan</p><p>&#183; Provides detailed information about Sangam society</p><p>&#183; Combines poetry with prose</p><p>&#183; Offers insights into contemporary culture and customs</p><p><b>Further insights:</b></p><p>The Five Epics or Kappiyams are </p><p>&#183; Silappathikaaram </p><p>&#183; Manimekalai </p><p>&#183; Seevaka Chinthamani </p><p>&#183; Valaiyapathi </p><p>&#183; Kundalakesi</p><p>The texts of Pathinen Melkanakku include Pathupaattu(ten long songs) and Ettuthogai(the eight anthologies). These texts are the oldest among the classical Tamil texts. The texts of Pathinen Kilkanakku belong to a later date. </p><p>The Ettuthogai or the eight anthologies are: (1) Nattrinai (3) Paripaadal (5) Aingurunuru (7) Akanaanuru (2) Kurunthogai (4) Pathittrupathu (6) Kalithogai (8) Puranaanuru </p><p>Pathupattu collection includes ten long songs: (1) Thirumurugatrupadai (2) Porunaratrupadai (3) Perumpanatruppadai (4) Sirupanatrupadai (5) Mullaipaattu (6) Nedunalvaadai (7) Maduraikanchi (8) Kurinjipaattu (9) Pattinappaalai (10) Malaipadukadam.</p><p>Pathinen Kilkanakku(18 minor works) The Pathinen Kilkanakku comprises eighteen texts elaborating on ethics and morals. The pre eminent work among these is the Thirukkural composed by Thiruvalluvar. In 1330 couplets Thirukkural considers questions of morality, statecraft and love.</p>",
