    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements about sound is incorrect?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sound is produced by vibrating objects.</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2306;&#2346;&#2344; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2360;&#2375; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Sound waves can travel through a vacuum.</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2340; &#2350;&#2375;&#2306; &#2349;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The speed of sound depends on the medium.</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2368; &#2327;&#2340;&#2367; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Sound waves are longitudinal waves.</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306; &#2309;&#2344;&#2369;&#2342;&#2376;&#2352;&#2381;&#2328;&#2381;&#2351; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Sound waves are <b>mechanical waves</b> that require a medium (solid, liquid, or gas) to propagate.</p><p>&#183; In a vacuum, there is no medium for sound waves to travel through.</p><p>&#183; Therefore, the statement that sound waves can travel through a vacuum is <b>incorrect</b>.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The distance between two consecutive compressions or two consecutive rarefactions in a sound wave is called: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327; &#2350;&#2375;&#2306; &#2342;&#2379; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2360;&#2306;&#2346;&#2368;&#2337;&#2344;&#2379;&#2306; &#2351;&#2366; &#2342;&#2379; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2357;&#2367;&#2352;&#2354;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Time period</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2351; &#2360;&#2368;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Wavelength</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2357;&#2354;&#2375;&#2306;&#2341;</span>",
      "<span class=\"eqt\">Frequency</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Amplitude</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2366;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The wavelength of a sound wave is defined as the distance between two consecutive compressions or two consecutive rarefactions. </p><p>It is usually represented by &#955; (lambda) and measured in meters.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the part marked as A in the image below.</p><p><img width=382 height=182 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27400/image001.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2368; &#2327;&#2312; &#2331;&#2357;&#2367; &#2350;&#2375;&#2306; A &#2360;&#2375; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2349;&#2366;&#2327; &#2325;&#2379; &#2346;&#2361;&#2330;&#2366;&#2344;&#2375;&#2306;&#2404;</p><p><img width=382 height=182 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27400/image001.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">Amplitude</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Wavelength</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2357;&#2354;&#2375;&#2306;&#2341;</span>",
      "<span class=\"eqt\">Refractions</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Compressions</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2346;&#2368;&#2337;&#2364;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; In the diagram, <b>A</b> represents the <b>wavelength</b>, which is the distance between two consecutive crests or troughs of a wave.</p><p>&#183; Wavelength is a measure of the spatial period of the wave.</p><p><img width=565 height=296 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27400/image002.jpg\" ></p><p>A sound wave is the pattern of disturbance caused by the movement of energy traveling through a medium (such as air, water or any other liquid or solid matter) as it propagates away from the source of the sound. </p><p>A mechanical wave is transverse when all the particles of the medium, which are solid or liquid (and never gas), vibrate perpendicularly at right angles, up and down, and continue to move in the direction of the wave. For example, the ripples on the surface of a lake are transverse waves. Sound does not move through transverse waves except in special conditions. </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The number of complete oscillations per unit time is called: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2340;&#2367; &#2311;&#2325;&#2366;&#2312; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2381;&#2339; &#2342;&#2379;&#2354;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Amplitude</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Wavelength</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2357;&#2354;&#2375;&#2306;&#2341;</span>",
      "<span class=\"eqt\">Frequency</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Time period</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2351; &#2360;&#2368;&#2350;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Frequency (&#957;) is defined as the number of complete oscillations per unit time.</p><p>It is measured in hertz (Hz), where 1 Hz = 1 oscillation per second.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The unit of frequency is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2325;&#2368; &#2311;&#2325;&#2366;&#2312; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Meter</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Second</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2370;&#2360;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Hertz</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2335;&#2352;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Decibel</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2360;&#2367;&#2348;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The SI unit of frequency is hertz (Hz), named after Heinrich Rudolph Hertz. </p><p>One hertz equals one cycle per second.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Arrange the following in the order in which sound propagates:</p><p>a. Vibration of particles in the medium</p><p>b. Sound reaches the ear</p><p>c. Vibration of the source</p><p>d. Disturbance travels through the medium</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2379; &#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2375; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352; &#2325;&#2375; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2350;&#2375;&#2306; &#2325;&#2339;&#2379;&#2306; &#2325;&#2366; &#2325;&#2306;&#2346;&#2344;</p><p>b. &#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2366;&#2344; &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330;&#2340;&#2368; &#2361;&#2376;</p><p>c. &#2360;&#2381;&#2352;&#2379;&#2340; &#2325;&#2366; &#2325;&#2306;&#2346;&#2344;</p><p>d. &#2327;&#2337;&#2364;&#2348;&#2337;&#2364;&#2368; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">a, c, d, b</span><span class=\"hqt\" style=\"display:none\">a, c, d, b</span>",
      "<span class=\"eqt\">d, a, c, b</span><span class=\"hqt\" style=\"display:none\">d, a, c, b</span>",
      "<span class=\"eqt\">c, a, d, b</span><span class=\"hqt\" style=\"display:none\">c, a, d, b</span>",
      "<span class=\"eqt\">d, c, a, b</span><span class=\"hqt\" style=\"display:none\">d, c, a, b</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sound propagation follows this sequence:</p><p>o Vibration of the source.</p><p>o Vibration of particles in the medium.</p><p>o Disturbance travels through the medium.</p><p>o Sound reaches the ear.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The characteristic of sound that helps you identify your friend's voice in a dark room is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2368; &#2357;&#2361; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2332;&#2379; &#2310;&#2346;&#2325;&#2379; &#2309;&#2306;&#2343;&#2375;&#2352;&#2375; &#2325;&#2350;&#2352;&#2375; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2375; &#2350;&#2367;&#2340;&#2381;&#2352; &#2325;&#2368; &#2310;&#2357;&#2366;&#2332;&#2364; &#2346;&#2361;&#2330;&#2366;&#2344;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Pitch</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2357;&#2366;&#2332;&#2364; &#2325;&#2366; &#2313;&#2340;&#2366;&#2352;-&#2330;&#2338;&#2364;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Quality or timbre</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2339;&#2357;&#2340;&#2381;&#2340;&#2366; &#2351;&#2366; &#2354;&#2351;</span>",
      "<span class=\"eqt\">Loudness</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2348;&#2354;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Speed</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2347;&#2364;&#2381;&#2340;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The quality or timbre of sound is that characteristic which enables us to distinguish one sound from another having the same pitch and loudness. </p><p>It depends on the number of overtones present in the sound and their relative intensities.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p><b>Choose the correct option.</b></p><p><b>Assertion (A):</b> Sound waves are called mechanical waves. </p><p><b>Reason (R):</b> Sound waves require a medium for propagation. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2379; &#2351;&#2366;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2330;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2324;&#2352; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both A and R are true but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is true but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is false but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Sound waves are called mechanical waves.</p><p>&#183; Sound waves require a medium for propagation.</p><p>Both statements are true, and the reason correctly explains why sound waves are mechanical waves.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>In which medium does sound travel fastest at a particular temperature? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2346;&#2352; &#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2367;&#2360; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2350;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2340;&#2375;&#2332;&#2364; &#2327;&#2340;&#2367; &#2360;&#2375; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Air</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2369;</span>",
      "<span class=\"eqt\">Water</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Iron</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2361;&#2366;</span>",
      "<span class=\"eqt\">Vacuum</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2376;&#2325;&#2381;&#2351;&#2370;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sound travels fastest in solids, followed by liquids, and then gases. This is because the particles in solids are closely packed and can transmit vibrations more efficiently. </p><p>At a particular temperature, sound travels fastest in iron compared to water and air.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The audible range of hearing for an average human being is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2324;&#2360;&#2340; &#2350;&#2344;&#2369;&#2359;&#2381;&#2351; &#2325;&#2368; &#2360;&#2369;&#2344;&#2344;&#2375; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2325;&#2368; &#2358;&#2381;&#2352;&#2357;&#2381;&#2351; &#2360;&#2368;&#2350;&#2366; &#2361;&#2376;: </p></span>",
    "options": [

      "<span class=\"eqt\">200 Hz to 20000 Hz</span><span class=\"hqt\" style=\"display:none\">200 &#2361;&#2352;&#2381;&#2335;&#2381;&#2332; &#2360;&#2375; 20000 &#2361;&#2352;&#2381;&#2335;&#2381;&#2332;</span>",
      "<span class=\"eqt\">20 Hz to 20000 Hz</span><span class=\"hqt\" style=\"display:none\">20 &#2361;&#2352;&#2381;&#2335;&#2381;&#2332; &#2360;&#2375; 20000 &#2361;&#2352;&#2381;&#2335;&#2381;&#2332;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The audible range of sound for human beings extends from about 20 Hz to 20000 Hz (20 kHz). </p><p>Sounds below 20 Hz are called infrasound, and those above 20 kHz are called ultrasound.</p>",

  },

    "question": "<span class=\"eqt\"><p>For hearing a distinct echo, what is the minimum distance required between the source of sound and the reflecting surface if the speed of sound is 344 m/s? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2368; &#2327;&#2340;&#2367; 344 &#2350;&#2368;&#2335;&#2352;/&#2360;&#2375;&#2325;&#2375;&#2306;&#2337; &#2361;&#2376;, &#2340;&#2379; &#2319;&#2325; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2346;&#2381;&#2352;&#2340;&#2367;&#2343;&#2381;&#2357;&#2344;&#2367; &#2360;&#2369;&#2344;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2375; &#2360;&#2381;&#2352;&#2379;&#2340; &#2324;&#2352; &#2346;&#2352;&#2366;&#2357;&#2352;&#2381;&#2340;&#2325; &#2360;&#2340;&#2361; &#2325;&#2375; &#2348;&#2368;&#2330; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">17.2 m</span><span class=\"hqt\" style=\"display:none\">17.2 &#2350;&#2368;&#2335;&#2352;</span>",

      "<span class=\"eqt\">8.6 m</span><span class=\"hqt\" style=\"display:none\">8.6 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">172 m</span><span class=\"hqt\" style=\"display:none\">172 &#2350;&#2368;</span>"

    "correct_option_id": 0,
    "solution": "<p>The sensation of sound persists in our brain for about 0.1 s. For a distinct echo, the time interval between original and reflected sound must be at least 0.1 s. </p><p>At 344 m/s, sound travels 34.4 m in 0.1 s. </p><p>Since sound must travel to the obstacle and back, the minimum distance to the reflecting surface is 34.4 m &div; 2 = 17.2 m.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>The time taken for one complete oscillation of the density or pressure of the medium is called: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2325;&#2375; &#2328;&#2344;&#2340;&#2381;&#2357; &#2351;&#2366; &#2342;&#2348;&#2366;&#2357; &#2325;&#2375; &#2319;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339; &#2342;&#2379;&#2354;&#2344; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2350;&#2351; &#2325;&#2379; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",

    "solution": "<p>The time taken for one complete oscillation of the density or pressure of the medium is called the time period or period of the sound wave. It is represented by the symbol T and measured in seconds.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Sounds with frequencies higher than 20 kHz are called: </p></span><span class=\"hqt\" style=\"display:none\"><p>20 kHz &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2357;&#2366;&#2354;&#2368; &#2343;&#2381;&#2357;&#2344;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Infrasonic</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2381;&#2347;&#2381;&#2352;&#2366;&#2360;&#2379;&#2344;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Sonic</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2366;</span>",
      "<span class=\"eqt\">Ultrasonic</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2335;&#2381;&#2352;&#2366;&#2360;&#2379;&#2344;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Supersonic</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2366;&#2343;&#2381;&#2357;&#2344;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sounds with frequencies higher than 20 kHz are called ultrasonic sound or ultrasound. </p><p>These sounds are beyond the audible range of humans but can be heard by certain animals like bats and dolphins.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>The persistence of sound in an auditorium due to repeated reflections is called: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2366;&#2352;-&#2348;&#2366;&#2352; &#2346;&#2352;&#2366;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2325;&#2367;&#2360;&#2368; &#2360;&#2349;&#2366;&#2327;&#2366;&#2352; &#2350;&#2375;&#2306; &#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2375; &#2348;&#2344;&#2375; &#2352;&#2361;&#2344;&#2375; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Echo</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2370;&#2306;&#2332;</span>",
      "<span class=\"eqt\">Reverberation</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2343;&#2381;&#2357;&#2344;&#2367;</span>",
      "<span class=\"eqt\">Resonance</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2370;&#2306;&#2332;</span>",
      "<span class=\"eqt\">Refraction</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Reverberation is the persistence of sound in a big hall due to repeated reflections from the walls, ceiling, and floor. </p><p>Unlike an echo, which is a distinct repetition of the original sound, reverberation causes sound to continue until it is reduced to an inaudible level.</p>",
    "question_index": 13
  },
  {

  {
    "question": "<span class=\"eqt\"><p>A sound wave has a frequency of 500 Hz and a wavelength of 0.7 m. Calculate the speed of the wave.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327; &#2325;&#2368; &#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; 500 &#8203;&#8203;&#2361;&#2352;&#2381;&#2335;&#2381;&#2332; &#2324;&#2352; &#2340;&#2352;&#2306;&#2327;&#2342;&#2376;&#2352;&#2381;&#2328;&#2381;&#2351; 0.7 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;&#2404; &#2340;&#2352;&#2306;&#2327; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",

  {

    "question": "<span class=\"eqt\"><p>The quality or timbre of sound is that characteristic which enables us to: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2368; &#2327;&#2369;&#2339;&#2357;&#2340;&#2381;&#2340;&#2366; &#2351;&#2366; &#2354;&#2351; &#2357;&#2361; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2361;&#2350;&#2375;&#2306; &#2360;&#2325;&#2381;&#2359;&#2350; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Determine how loud the sound is</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306; &#2325;&#2367; &#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2367;&#2340;&#2344;&#2368; &#2340;&#2375;&#2332;&#2364; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Measure the pitch of the sound</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2368; &#2346;&#2367;&#2330; &#2350;&#2366;&#2346;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Distinguish one sound from another having same pitch and loudness</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2366;&#2344; &#2340;&#2366;&#2352;&#2340;&#2381;&#2357; &#2324;&#2352; &#2346;&#2381;&#2352;&#2348;&#2354;&#2340;&#2366; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2379; &#2342;&#2370;&#2360;&#2352;&#2368; &#2343;&#2381;&#2357;&#2344;&#2367; &#2360;&#2375; &#2309;&#2354;&#2327; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Measure the speed of sound</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2368; &#2327;&#2340;&#2367; &#2350;&#2366;&#2346;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 2,

    "question_index": 17

  {
    "question": "<span class=\"eqt\"><p>Ultrasonography is based on the principle of: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2354;&#2381;&#2335;&#2381;&#2352;&#2366;&#2360;&#2379;&#2344;&#2379;&#2327;&#2381;&#2352;&#2366;&#2347;&#2368; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Reflection of ultrasound waves</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2335;&#2381;&#2352;&#2366;&#2360;&#2366;&#2313;&#2306;&#2337; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2366; &#2346;&#2352;&#2366;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Refraction of ultrasound waves</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2335;&#2381;&#2352;&#2366;&#2360;&#2366;&#2313;&#2306;&#2337; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2366; &#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Diffraction of ultrasound waves</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2335;&#2381;&#2352;&#2366;&#2360;&#2366;&#2313;&#2306;&#2337; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2366; &#2357;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Interference of ultrasound waves</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2335;&#2381;&#2352;&#2366;&#2360;&#2366;&#2313;&#2306;&#2337; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2366; &#2361;&#2360;&#2381;&#2340;&#2325;&#2381;&#2359;&#2375;&#2346;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Ultrasonography is based on the principle of reflection of ultrasound waves. In this technique, ultrasonic waves travel through the tissues of the body and get reflected from regions where there is a change in tissue density. </p><p>These reflected waves are then converted into electrical signals to generate images.</p>",
    "question_index": 18

  {
    "question": "<span class=\"eqt\"><p>To reduce reverberation in auditoriums, the walls and ceiling are generally covered with: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2349;&#2366;&#2327;&#2366;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;&#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2368;&#2357;&#2366;&#2352;&#2379;&#2306; &#2324;&#2352; &#2331;&#2340; &#2325;&#2379; &#2310;&#2350; &#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2367;&#2360;&#2360;&#2375; &#2338;&#2325;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Highly polished surfaces</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2346;&#2377;&#2354;&#2367;&#2358; &#2360;&#2340;&#2361;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Sound-absorbent materials</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2357;&#2344;&#2367; &#2309;&#2357;&#2358;&#2379;&#2359;&#2325; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Metal sheets</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2335;&#2354; &#2358;&#2368;&#2335;</span>",
      "<span class=\"eqt\">Glass panels</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2354;&#2366;&#2360; &#2346;&#2376;&#2344;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>To reduce reverberation in auditoriums, the walls and ceiling are generally covered with sound-absorbent materials like compressed fiberboard, rough plaster, or draperies.</p><p>These materials absorb sound energy rather than reflecting it, preventing excessive reverberation.</p>",
