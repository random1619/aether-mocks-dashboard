<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Density of population, is expressed as______.</p>",
    "options": [
      "number of rural persons per unit area",
      "number of literate persons per unit area",
      "number of persons per unit area",
      "number of animals and persons per unit area"
    ],
    "correct_option_id": 2,
    "solution": "<p>The density of population is a measure that expresses the number of individuals living in a specific area, usually given as the <b>number of persons per unit area</b>.</p>",
    "question_index": 0
  },
  {
    "question": "<p>The growth rate of India's population has been declining since __________.</p>",
    "options": [
      "1971",
      "1991",
      "1951",
      "1981"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The growth rate peaked in the 1971-1981 period, but from 1981 onwards, the growth rate began to decline gradually. </p><p>&#183; The growth rate from 1981-1991 was 23.87%, showing a slight decrease.</p>",
    "question_index": 1
  },
  {
    "question": "<p>The National Youth Policy 2014 defines youth as population between the ages of ________ and _________.</p>",
    "options": [
      "20; 29",
      "15; 25",
      "15; 29",
      "10; 19"
    ],
    "correct_option_id": 2,
    "solution": "<p>The National Youth Policy (NYP) 2014 defines youth as individuals in the age group of 15 to 29 years.</p><p>&#183; This policy focuses on empowering young people in areas such as education, skill development, employment, and civic engagement.</p><p>&#183; It was introduced by the Ministry of Youth Affairs and Sports to provide a framework for youth-oriented programs.</p><p>Thus, the correct answer is 15-29 years (Option 3).</p>",
    "question_index": 2
  },
  {
    "question": "<p>Which of the following options is mostly caused by overpopulation? </p>",
    "options": [
      "Land and other renewable resources are under pressure",
      "Adequate natural resource storage",
      "Reduction in the scarcity of water",
      "Increase in the area covered by forests"
    ],
    "correct_option_id": 0,
    "solution": "<p>Overpopulation puts significant pressure on land and renewable resources as more people require more resources for survival, leading to:</p><p>&#183; Increased demand for agricultural land</p><p>&#183; Greater exploitation of natural resources</p><p>&#183; Strain on water resources</p><p>&#183; Deforestation for human settlement</p><p>&#183; Degradation of available resources</p>",
    "question_index": 3
  },
  {
    "question": "<p>Who published the logistic equation model of population growth in 1838?</p>",
    "options": [
      "Howard Thomas Odum",
      "Alfred Russel Wallace",
      "Pierre Fran&#231;ois Verhulst",
      "George Evelyn Hutchinson"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Pierre Fran&#231;ois Verhulst introduced the logistic growth model in 1838, describing how populations grow in a limited environment.</p><p>&#183; It forms the basis of modern population ecology.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Which of the following periods is known as the period of population explosion in India?</p>",
    "options": [
      "1981 - 2021",
      "1931 - 1961",
      "1921 - 1851",
      "1951 - 1981"
    ],
    "correct_option_id": 3,
    "solution": "<p>The period known as the \"population explosion\" in India is mainly associated with the years from <b>1951 to 1981</b>. This was when India's population experienced significant and rapid growth.</p>",
    "question_index": 5
  },
  {
    "question": "<p>What is the emigration of a significant proportion of a country's highly skilled, highly educated professional population to other countries offering better economic and social opportunities called?</p>",
    "options": [
      "Carrying capacity",
      "Brain drain",
      "Demographic transition",
      "Closed population"
    ],
    "correct_option_id": 1,
    "solution": "<p>The term <b>Brain drain indicates a substantial emigration or migration of individuals. </b>It is a situation when a country's highly skilled, highly educated professional population to other countries offering better economic and social opportunities.</p>",
    "question_index": 6
  },
  {
    "question": "<p>When the analysis of population density is done by calculating it through net cultivated area, what is this measure termed as?</p><p><b>Options:</b></p>",
    "options": [
      "Agricultural density",
      "Physiological density",
      "Gross density",
      "Net density"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Physiological density:- </b>The total population per net cultivated area of a country refers to it's physiological density.</p>",
    "question_index": 7
  },
  {
    "question": "<p>According to the Census of India 2001, which of the following is the main reason for male migration in India?</p>",
    "options": [
      "Education",
      "Marriage",
      "Work and employment",
      "Business"
    ],
    "correct_option_id": 2,
    "solution": "<p>As per the 2001 Census of India, the primary reason for male migration in India was work and employment, accounting for over 38% of total male migration. This pattern has continued in later censuses, reflecting economic migration trends.</p>",
    "question_index": 8
  },
  {
    "question": "<p>In which year was the Smart Cities Mission launched?</p>",
    "options": [
      "2015",
      "2013",
      "2019",
      "2018"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Smart Cities Mission was launched by the Government of India in 2015 to promote sustainable and inclusive urban development.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Which of the following countries has the highest Hindu population after India?</p>",
    "options": [
      "Bhutan",
      "Sri Lanka",
      "Myanmar",
      "Nepal"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; Nepal has the highest Hindu population after India. As of recent estimates, around 81% of Nepal's population follows Hinduism, making it the only officially Hindu country in the past.</p><p>&#183; Bhutan is primarily a Buddhist country, with a small Hindu population.</p><p>&#183; Sri Lanka has a Hindu population mainly concentrated in the northern and eastern regions but is significantly smaller than in Nepal.</p><p>&#183; Myanmar has a very small Hindu population, mostly among Indian-origin communities.</p>",
    "question_index": 10
  },
  {
    "question": "<p>The __________ results from an increase in the proportion of workers relative to non-workers in the population.</p>",
    "options": [
      "Age structure of population",
      "Demographic dividend",
      "Population momentum",
      "Old-age dependency ratio"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The <b>demographic dividend</b> results from an increase in the proportion of workers relative to non-workers in the population.</p><p>&bull; A demographic dividend occurs when there is a favorable age structure in a country's population, with a larger proportion of working-age people compared to dependents (children and elderly).</p><p>&bull; This demographic situation can potentially lead to accelerated economic growth if the right policies and conditions are in place to productively employ the larger workforce.</p><p><b>The other options describe different demographic concepts:</b></p><p>&bull; Age structure of population: The distribution of people across different age groups</p><p>&bull; Population momentum: The tendency for population growth to continue despite falling fertility rates</p><p>&bull; Old-age dependency ratio: The ratio of elderly people to working-age people</p>",
    "question_index": 11
  },
  {
    "question": "<p>What is the literacy rate of males in India as per the report published in the National Survey of India-2022?</p>",
    "options": [
      "83.4%",
      "86.3%",
      "84.7%",
      "81.2%"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The literacy rate is 77.70%, with literate males at <b>84.70%</b> and literate females at 70.30%, according to the National Family Health Survey (NFHS-5) and National Statistical Office: NSO (2021 and 2022). </p><p>&#183; NFHS-5 (2019-21): Conducted by the Ministry of Health and Family Welfare.</p><p>&#183; Census 2011 (last official census) reported 80.9% male literacy, but NFHS-5 reflects updated estimates.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Which of the following states launched the first Migration Monitoring System in the year 2022?</p>",
    "options": [
      "Karnataka",
      "Goa",
      "Maharashtra",
      "Kerala"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Maharashtra government launched India's first Migration Monitoring System in 2022 to track the movement of seasonal migrant workers and ensure their access to government welfare schemes. The system was developed to help monitor the socio-economic conditions of migrant laborers.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Which of the following movements created regional disparities between large and small farmers in India?</p>",
    "options": [
      "Green Revolution",
      "Yellow Revolution",
      "Pink Revolution",
      "Blue Revolution"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The Green Revolution (1960s-70s) focused on high-yielding variety (HYV) seeds, fertilizers, and irrigation, increasing agricultural production.</p><p>&bull; However, it mainly benefited large farmers in Punjab, Haryana, and western Uttar Pradesh, while small farmers in rain-fed areas lagged.</p><p>&bull; This led to regional disparities and increased the income gap between rich and poor farmers.</p>",
    "question_index": 14
  },
  {
    "question": "<p>As per the report of the NITI Aayog in 2023, which among the following states in India has the lowest percentage of the total population that is multidimensionally poor? </p>",
    "options": [
      "Kerala",
      "Goa",
      "Sikkim",
      "Uttarakhand"
    ],
    "correct_option_id": 0,
    "solution": "<p>As per the NITI Aayog's 2023 report on Multidimensional Poverty, Kerala had the lowest percentage of the total population that is multidimensionally poor among Indian states.</p><p>Reasons for Kerala's low poverty levels:</p> <ul style='margin-top:0cm' type=disc> <li class=MsoNormal>High literacy rate (above 96%) and strong educational infrastructure.</li> <li class=MsoNormal>Advanced healthcare system with high life expectancy and low infant mortality.</li> <li class=MsoNormal>Strong social welfare programs and effective governance.</li> </ul>",
    "question_index": 15
  },
  {
    "question": "<p>Which of the following age groups is considered as working population or working age in India?</p>",
    "options": [
      "15 - 40 years",
      "0 - 60 years",
      "15 - 59 years",
      "25 - 65 years"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>working-age population</b> in India, as per standard demographic definitions, includes individuals aged <b>15 - 59 years</b>. This group is considered capable of contributing to the labor force.</p><p><b>Why other options are incorrect:</b></p><p>&#183; <b>15 - 40 years:</b> Too narrow; excludes older productive workers.</p><p>&#183; <b>0 - 60 years:</b> Includes children and non-working groups, incorrect.</p><p>&#183; <b>25 - 65 years:</b> Excludes younger workers and extends too far.</p><p><b>Further Insight:</b></p><p>This range aligns with international standards, though some extend it to 64 years. It's critical for calculating dependency ratios and economic planning.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Which of the following years is called the Year of the Great Divide in the demographic history of India?</p>",
    "options": [
      "1951",
      "1911",
      "1921",
      "1931"
    ],
    "correct_option_id": 2,
    "solution": "<p>The year <b>1921</b> is often referred to as the \"Year of the Great Divide,\" the last period in which India's population declined, due to the effects of famine.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Which of the following reasons may be considered as India's pull factors for migration?</p><p>I. Labour demand</p><p>II. Natural disaster</p><p>III. Protection of human and civil rights</p><p>IV. High consumption and living standards</p>",
    "options": [
      "Only II",
      "Both I and IV",
      "Only II, III and IV",
      "Only I, III and IV"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; In migration theory, factors influencing population movement are categorized as either \"push\" or \"pull\" factors. </p><p>&#183; Push factors often involve negative conditions like war, poverty, or persecution, while pull factors offer positive opportunities like job prospects, better living standards, or political stability. </p><p>&#183; <b>Natural disaster</b> is a <b>push factor</b>  -  it drives people <b>away</b> from a place, not toward it.</p><p><b>Further information:</b></p><p>A structured table outlining the <b>push and pull factors of migration</b>:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Push Factors (Reasons to leave a place)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Pull Factors (Reasons to move to a place)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1. Economic</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>1. Economic</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Poverty/lack of jobs</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Better job opportunities</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Low wages</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Higher wages/salaries</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Economic instability</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Economic stability/growth</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>2. Social</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>2. Social</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Lack of education/healthcare</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Access to quality education/healthcare</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Discrimination/persecution</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Social equality/acceptance</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Poor living conditions</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Better living standards</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>3. Political</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>3. Political</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- War/conflict</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Political stability/safety</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Oppressive government</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Democratic freedoms</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Human rights violations</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Protection of rights</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>4. Environmental</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>4. Environmental</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Natural disasters (floods, droughts)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Favorable climate</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Pollution/environmental degradation</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Clean environment</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Scarcity of resources (water, land)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Abundant natural resources</td></tr></table><p><b>Key Notes:</b></p><p>&#183; <b>Push factors</b> drive people away from their home region.</p><p>&#183; <b>Pull factors</b> attract migrants to a new location.</p><p>&#183; Often, migration results from a <b>combination</b> of these factors (e.g., fleeing war <i>and</i> seeking jobs).</p>",
    "question_index": 18
  },
  {
    "question": "<p>Which of the following statements is true?</p><p>I. The Family Welfare Program has sought to promote responsible and planned parenthood on a mandatory basis.</p><p>II. The National Population Policy 2000 provides a policy framework to provide free and compulsory education up to the age of 14 years.</p><p>Select the correct options<b>:</b></p>",
    "options": [
      "Neither I nor II",
      "Only I",
      "Only II",
      "Both I and II"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Statement I is false:</b> The Government of India initiated the comprehensive Family Planning Programme in 1952. The Family Welfare Programme has sought <b>to promote responsible and planned parenthood on a voluntary basis.</b></p><p><b>Statement II is true: </b>The National Population Policy (NPP) 2000 is a culmination of years of planned efforts. <b>The NPP 2000 provides a policy framework for imparting free and compulsory school education up to 14 years of age</b>, reducing infant mortality rate to below 30 per 1000 live births, achieving universal immunization of children against all vaccine preventable diseases, promoting delayed marriage for girls, and making family welfare a people-center.</p>",
    "question_index": 19
  }
];
    </script>

</body>
</html>
