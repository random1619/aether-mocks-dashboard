<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">

                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">

        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>

                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>

            <!-- Desktop Navigator Sidebar -->

                    </div>
                    <div class="stat-item">

                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>An ecosystem is best described as a:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2379; &#2360;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2350; &#2352;&#2370;&#2346; &#2360;&#2375; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2357;&#2352;&#2381;&#2339;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Collection of only living organisms</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2332;&#2368;&#2357;&#2367;&#2340; &#2332;&#2368;&#2357;&#2379;&#2306; &#2325;&#2366; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;</span>",
      "<span class=\"eqt\">Functional unit of nature where living organisms interact among themselves</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2311;&#2325;&#2366;&#2312; &#2332;&#2361;&#2366;&#2305; &#2332;&#2368;&#2357;&#2367;&#2340; &#2332;&#2368;&#2357; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Specific geographical area with similar climate</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2366;&#2344; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369; &#2357;&#2366;&#2354;&#2366; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Group of organisms of the same species living in a particular area</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2352;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2361;&#2368; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2325;&#2375; &#2332;&#2368;&#2357;&#2379;&#2306; &#2325;&#2366; &#2360;&#2350;&#2370;&#2361;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>An ecosystem is a <b>functional unit</b> where <b>living organisms (biotic components)</b> interact with <b>each other</b> and with their <b>physical environment (abiotic components)</b>. It includes all the living and non-living components in a given area, along with their interactions.</p><p>&#183; <b>Incorrect</b>: An ecosystem includes <b>both living and non-living components</b>, not just living organisms.</p><p>&#183; <b>Incorrect</b>: A specific geographical area with a similar climate describes a <b>biome</b>, not an ecosystem.</p><p>&#183; <b>Incorrect</b>: A group of organisms of the same species living in a particular area is a <b>population</b>, not an ecosystem.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an example of a terrestrial ecosystem?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2381;&#2341;&#2354;&#2368;&#2351; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pond</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2354;&#2366;&#2348;</span>",
      "<span class=\"eqt\">Lake</span><span class=\"hqt\" style=\"display:none\">&#2333;&#2368;&#2354;</span>",
      "<span class=\"eqt\">Forest</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2306;&#2327;&#2354;</span>",
      "<span class=\"eqt\">Estuary</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2361;&#2366;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A <b>terrestrial ecosystem</b> is a land-based ecosystem, as opposed to aquatic ecosystems (which are water-based).</p><p>&#183; <b>Pond</b> &rarr; <b>Aquatic ecosystem</b> (freshwater)</p><p>&#183; <b>Lake</b> &rarr; <b>Aquatic ecosystem</b> (freshwater)</p><p>&#183; <b>Forest</b> &rarr; <b>Terrestrial ecosystem</b> (land-based, includes trees, animals, and microorganisms)</p><p>&#183; <b>Estuary</b> &rarr; <b>Aquatic ecosystem</b> (transition zone between rivers and seas, brackish water)</p><p>Thus, the correct example of a terrestrial ecosystem is <b>Forest</b>.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Ecological succession is best defined as the:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2379; &#2360;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2350; &#2352;&#2370;&#2346; &#2360;&#2375; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Sudden increase in the population of a species</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2325;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2309;&#2330;&#2366;&#2344;&#2325; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Gradual and fairly predictable change in the species composition of a given area</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2324;&#2352; &#2325;&#2366;&#2347;&#2368; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Seasonal variations in the number of organisms in an ecosystem</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2332;&#2368;&#2357;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2350;&#2380;&#2360;&#2350;&#2368; &#2357;&#2367;&#2357;&#2367;&#2343;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Impact of human activities on the environment</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339; &#2346;&#2352; &#2350;&#2366;&#2344;&#2357;&#2368;&#2351; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Ecological succession is the gradual and fairly predictable change in the species composition of a given area.</p><p><b>Ecological succession</b> refers to the <b>natural, gradual process</b> by which the structure of a biological community evolves over time. It involves:</p><p>&#183; <b>Orderly replacement</b> of species in an ecosystem.</p><p>&#183; <b>Progression</b> from pioneer species (e.g., lichens, grasses) to a stable climax community (e.g., mature forest).</p><p>&#183; <b>Changes driven</b> by environmental factors, species interactions, and disturbances.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In a forest ecosystem, trees occupy the:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2344; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2357;&#2371;&#2325;&#2381;&#2359; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344; &#2352;&#2326;&#2340;&#2375; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Bottom layers</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2330;&#2354;&#2368; &#2346;&#2352;&#2340;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Second vertical strata</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2370;&#2360;&#2352;&#2366; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2360;&#2381;&#2340;&#2352;</span>",
      "<span class=\"eqt\">Top vertical strata or layer</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2368;&#2352;&#2381;&#2359; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2360;&#2381;&#2340;&#2352; &#2351;&#2366; &#2346;&#2352;&#2340;</span>",
      "<span class=\"eqt\">Middle horizontal zone</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351; &#2325;&#2381;&#2359;&#2376;&#2340;&#2367;&#2332; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Trees occupy the top vertical strata or layer of a forest.</p><p>In a <b>forest ecosystem</b>, vegetation is organized into <b>vertical layers (stratification)</b>, with <b>trees forming the highest layer</b>:</p><p>&#183; <b>Top layer (Canopy)</b> &rarr; Dominated by tall trees that form a roof-like cover.</p><p>&#183; <b>Understory layer</b> &rarr; Smaller trees, shrubs, and young trees.</p><p>&#183; <b>Herb layer</b> &rarr; Grasses and non-woody plants.</p><p>&#183; <b>Forest floor</b> &rarr; Mosses, fungi, and decomposing matter.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a key functional aspect of an ecosystem?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2346;&#2361;&#2354;&#2370; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Species composition</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Stratification</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2340;&#2352;-&#2357;&#2367;&#2344;&#2381;&#2351;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Productivity</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Species enumeration</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The components of an ecosystem function as a unit, considering (i) productivity, (ii) decomposition, (iii) energy flow, and (iv) nutrient cycling.</p><p>A <b>key functional aspect</b> of an ecosystem refers to processes that sustain energy flow and nutrient cycling. <b>Productivity</b> is fundamental because:</p><p>&#183; It measures the <b>rate of biomass production</b> (energy capture by producers via photosynthesis).</p><p>&#183; It determines the <b>energy available</b> for higher trophic levels (herbivores, carnivores).</p><p>&#183; It influences <b>ecosystem stability</b> and biodiversity.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Gross primary productivity (GPP) minus respiration losses (R) is equal to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2325;&#2354; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366; (&#2332;&#2368;&#2346;&#2368;&#2346;&#2368;) &#2328;&#2335;&#2366; &#2358;&#2381;&#2357;&#2360;&#2344; &#2361;&#2366;&#2344;&#2367; (&#2310;&#2352;) &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Secondary productivity</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Net primary productivity (NPP)</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2342;&#2381;&#2343; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366; (&#2319;&#2344;&#2346;&#2368;&#2346;&#2368;)</span>",
      "<span class=\"eqt\">Biomass production</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2351;&#2379;&#2350;&#2366;&#2360; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344;</span>",
      "<span class=\"eqt\">Decomposition rate</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2328;&#2335;&#2344; &#2342;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Gross Primary Productivity (GPP): Total amount of energy (biomass) produced by plants through photosynthesis.</p><p>&#183; Respiration Losses (R): Energy expended by plants for their own metabolic activities.</p><p>&#183; Net Primary Productivity (NPP): The usable energy/biomass available for herbivores and higher trophic levels after accounting for plant respiration.</p><p>Formula:</p><p>NPP=GPP&#8722;R</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Succession that begins in areas where natural biotic communities have been destroyed is called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2320;&#2360;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2332;&#2361;&#2366;&#2306; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2332;&#2376;&#2357;&#2367;&#2325; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2344;&#2359;&#2381;&#2335; &#2361;&#2379; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2325;&#2361;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Primary succession</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Climax succession</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2352;&#2350;&#2379;&#2340;&#2381;&#2325;&#2352;&#2381;&#2359; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Secondary succession</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Hydrarch succession</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2366;&#2352;&#2381;&#2325; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Secondary succession begins in areas where natural biotic communities have been destroyed, such as in abandoned farmlands or burned/cut forests.</p><p>&#183; Secondary succession occurs in an area where an existing community has been disrupted or destroyed by a disturbance (like a fire, flood, or deforestation), but the soil remains intact. </p><p>&#183; Primary succession begins in a lifeless area where there is no soil (like bare rock or a newly formed volcanic island).</p><p>&#183; Climax succession refers to the final, stable community that develops at the end of ecological succession.</p><p>&#183; Hydrarch succession is ecological succession that begins in aquatic environments.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the incorrect statement about Photosynthetically active radiation (PAR).</p><p>I. Photosynthetically active radiation (PAR) constitutes approximately what percentage of incident solar radiation.</p><p>II. Plants capture only 2-10% of the PAR, and this small amount of energy sustains the entire living world.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2325; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2357;&#2367;&#2325;&#2367;&#2352;&#2339; (PAR) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2327;&#2354;&#2340; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2325; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2357;&#2367;&#2325;&#2367;&#2352;&#2339; (PAR) &#2328;&#2335;&#2344;&#2366; &#2360;&#2380;&#2352; &#2357;&#2367;&#2325;&#2367;&#2352;&#2339; &#2325;&#2366; &#2354;&#2327;&#2349;&#2327; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2346;&#2380;&#2343;&#2375; PAR &#2325;&#2366; &#2325;&#2375;&#2357;&#2354; 2-10% &#2361;&#2368; &#2327;&#2381;&#2352;&#2361;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2324;&#2352; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2368; &#2351;&#2361; &#2331;&#2379;&#2335;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2346;&#2370;&#2352;&#2375; &#2332;&#2368;&#2357;&#2367;&#2340; &#2332;&#2327;&#2340; &#2325;&#2379; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II are incorrect</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Both are correct</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; <b>Statement I</b> is incorrect because it is <b>incomplete</b> - it mentions PAR constitutes a percentage of solar radiation but <b>does not specify the actual value</b> (which is <b>~50%</b>). A correct version would be:</p><p><i>\"Photosynthetically active radiation (PAR) constitutes approximately <b>50%</b> of incident solar radiation.\"</i></p><p>&#183; <b>Statement II</b> is <b>correct</b>:</p><p>o Plants capture <b>only 2 - 10% of PAR</b> for photosynthesis.</p><p>o This small fraction sustains <b>all food chains</b> (herbivores &rarr; carnivores &rarr; decomposers).</p><p><b>Key Notes:</b></p><p>&#183; PAR is the <b>wavelength range (400 - 700 nm)</b> used by plants for photosynthesis.</p><p>&#183; While <b>50% of sunlight is PAR</b>, most is lost as heat, reflected, or unused due to environmental/latitudinal factors.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Trophic Level with its Correct Description:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column I(Trophic level)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column II(Description)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.Producers</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Organisms that feed on primary consumers; carnivores</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.Primary Consumers</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Autotrophs that convert solar energy into food</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.Secondary Consumers</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Apex predators; feed on secondary consumers</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.Tertiary Consumers</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Herbivores that feed directly on producers</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2335;&#2381;&#2352;&#2377;&#2347;&#2367;&#2325; &#2360;&#2381;&#2340;&#2352; &#2325;&#2366; &#2313;&#2360;&#2325;&#2375; &#2360;&#2361;&#2368; &#2357;&#2367;&#2357;&#2352;&#2339; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; I(&#2335;&#2381;&#2352;&#2377;&#2347;&#2367;&#2325; &#2360;&#2381;&#2340;&#2352;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; II(&#2357;&#2367;&#2357;&#2352;&#2339;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i.&#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2332;&#2368;&#2357; &#2332;&#2379; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;&#2323;&#2306; &#2346;&#2352; &#2349;&#2379;&#2332;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;; &#2350;&#2366;&#2306;&#2360;&#2366;&#2361;&#2366;&#2352;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii.&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2360;&#2381;&#2357;&#2346;&#2379;&#2359;&#2368; &#2332;&#2379; &#2360;&#2380;&#2352; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2379; &#2349;&#2379;&#2332;&#2344; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii.&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2358;&#2368;&#2352;&#2381;&#2359; &#2358;&#2367;&#2325;&#2366;&#2352;&#2368;; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;&#2323;&#2306; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2340;&#2371;&#2340;&#2368;&#2351;&#2325; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2358;&#2366;&#2325;&#2366;&#2361;&#2366;&#2352;&#2368; &#2332;&#2366;&#2344;&#2357;&#2352; &#2332;&#2379; &#2360;&#2368;&#2343;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2379;&#2306; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i - b, ii - d, iii - a, iv - c</span><span class=\"hqt\" style=\"display:none\">i - b, ii - d, iii - a, iv - c</span>",
      "<span class=\"eqt\">i - d, ii - b, iii - c, iv - a</span><span class=\"hqt\" style=\"display:none\">i - d, ii - b, iii - c, iv - a</span>",
      "<span class=\"eqt\">i - a, ii - c, iii - d, iv - b</span><span class=\"hqt\" style=\"display:none\">i - a, ii - c, iii - d, iv - b</span>",
      "<span class=\"eqt\">i - c, ii - a, iii - b, iv - d</span><span class=\"hqt\" style=\"display:none\">i - c, ii - a, iii - b, iv - d</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Producers:</b></p><p>&#183; These are the foundation of the ecosystem.</p><p>&#183; They are autotrophs, meaning they can produce their own food.</p><p>&#183; The primary way they do this is through photosynthesis, where they use solar energy to convert carbon dioxide and water into glucose (a type of sugar) for energy.</p><p>&#183; Examples include plants, algae, and cyanobacteria.</p><p><b> Primary Consumers:</b></p><p>&#183; These are herbivores.</p><p>&#183; They obtain their energy by eating producers.</p><p>&#183; Essentially, they are the first level of heterotrophs (organisms that can't make their own food and must consume others).</p><p>&#183; Examples include cows, deer, rabbits, grasshoppers, and zooplankton.</p><p><b>Secondary Consumers:</b></p><p>&#183; These are carnivores.</p><p>&#183; They eat primary consumers (herbivores).</p><p>&#183; They are higher up the food chain than primary consumers.</p><p>&#183; Examples include snakes, frogs, cats, and foxes.</p><p><b>Tertiary Consumers:</b></p><p>&#183; These are also carnivores.</p><p>&#183; They are at the top (or near the top) of the food chain and are sometimes called apex predators.</p><p>&#183; They eat secondary consumers.</p><p>&#183; They are not usually preyed upon by other animals (except perhaps when very young or weak).</p><p>&#183; Examples include lions, tigers, eagles, and sharks.</p><p>Decomposers break down complex organic matter into inorganic substances like carbon dioxide, water, and nutrients. This process is called decomposition.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Dead plant remains and dead remains of animals constitute:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2371;&#2340; &#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2375; &#2309;&#2357;&#2358;&#2375;&#2359; &#2324;&#2352; &#2332;&#2366;&#2344;&#2357;&#2352;&#2379;&#2306; &#2325;&#2375; &#2350;&#2371;&#2340; &#2309;&#2357;&#2358;&#2375;&#2359; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Humus</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Detritus</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2340;&#2352;&#2375;</span>",
      "<span class=\"eqt\">Litter</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2370;&#2337;&#2364;&#2366;</span>",
      "<span class=\"eqt\">Biomass</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2351;&#2379;&#2350;&#2366;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Detritus: This refers to the non-living organic matter, including dead plant remains (like leaves, stems, and roots) and dead animal remains. It's a crucial part of the ecosystem, as it's broken down by decomposers, recycling nutrients back into the soil. </p><p>&#183; Humus: This is a stable, dark, amorphous substance that is the end product of decomposition. It's a part of the soil, not just the initial dead remains. </p><p>&#183; Litter: This is the freshly fallen or only slightly decomposed plant material on the soil surface. It's a subset of detritus. </p><p>&#183; Biomass: This is the total mass of living organisms in a given area or volume.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Earthworms help in the breakdown of detritus into smaller particles. This process is called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2306;&#2330;&#2369;&#2319; &#2350;&#2354;&#2348;&#2375; &#2325;&#2379; &#2331;&#2379;&#2335;&#2375; &#2325;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2340;&#2379;&#2337;&#2364;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Leaching</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2368;&#2330;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Catabolism</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2330;&#2351;</span>",
      "<span class=\"eqt\">Fragmentation</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2326;&#2306;&#2337;&#2344;</span>",
      "<span class=\"eqt\">Mineralisation</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2344;&#2367;&#2332;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Detritivores, such as earthworms, break down detritus into smaller particles. This process is called fragmentation.</p><p>&#183; Fragmentation: This is the process where detritivores (like earthworms, mites, and other soil organisms) break down detritus into smaller physical pieces. This increases the surface area available for microbial decomposition (by bacteria and fungi).</p><p>&#183; Leaching: This is the process where water-soluble inorganic nutrients dissolve and are carried down into the soil layers. </p><p>&#183; Catabolism: This is a metabolic process where larger molecules are broken down into smaller ones to release energy. While decomposition involves catabolism by microorganisms, fragmentation is the specific physical breakdown done by detritivores. </p><p>&#183; Mineralization: This is the process by which organic matter is completely decomposed, releasing inorganic nutrients into the soil. This is a later stage in decomposition, following fragmentation.</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>A dark coloured amorphous substance that accumulates during decomposition and is highly resistant to microbial action is called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2361;&#2352;&#2375; &#2352;&#2306;&#2327; &#2325;&#2366; &#2309;&#2344;&#2366;&#2325;&#2366;&#2352; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2332;&#2379; &#2309;&#2346;&#2328;&#2335;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2332;&#2350;&#2366; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350;&#2332;&#2368;&#2357;&#2368; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2313;&#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Detritus</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2340;&#2352;&#2375;</span>",
      "<span class=\"eqt\">Humus</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Litter</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2370;&#2337;&#2364;&#2366;</span>",
      "<span class=\"eqt\">Inorganic nutrients</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2346;&#2379;&#2359;&#2325; &#2340;&#2340;&#2381;&#2357;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Humus</b> is a <b>dark-colored, amorphous organic substance</b> formed during the decomposition of plant and animal matter in soil.</p><p>It is <b>highly resistant to microbial breakdown</b> due to its complex chemical structure (e.g., lignin derivatives).</p><p>Enriches soil fertility by improving water retention and nutrient availability.</p><p><b>Why Not the Other Options?</b></p><p>&#183; <b>Detritus</b> &rarr; Refers to <b>freshly dead organic matter</b> (e.g., fallen leaves), which is <b>not yet decomposed</b> into humus.</p><p>&#183; <b>Litter</b> &rarr; <b>Undecomposed surface layer</b> (e.g., twigs, leaves) that eventually forms humus but is not humus itself.</p><p>&#183; <b>Inorganic nutrients</b> &rarr; Minerals like nitrates/phosphates; <b>not organic</b> like humus.</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>The primary source of energy for almost all ecosystems on Earth is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2346;&#2352; &#2354;&#2327;&#2349;&#2327; &#2360;&#2349;&#2368; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2340;&#2306;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2360;&#2381;&#2352;&#2379;&#2340; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Chemical energy from rocks</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2335;&#2381;&#2335;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2314;&#2352;&#2381;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Heat from the Earth's interior</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2375; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2349;&#2366;&#2327; &#2360;&#2375; &#2327;&#2352;&#2381;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Radiant energy from the sun</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2352;&#2381;&#2351; &#2360;&#2375; &#2357;&#2367;&#2325;&#2367;&#2352;&#2339;&#2367;&#2340; &#2314;&#2352;&#2381;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Decomposition of organic matter</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2366; &#2309;&#2346;&#2328;&#2335;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Sunlight (solar energy) is the primary energy source for nearly all ecosystems through photosynthesis.</p><p>&#183; Plants, algae, and cyanobacteria convert solar energy into chemical energy (glucose), forming the base of food chains.</p><p>&#183; Exceptions (like deep-sea hydrothermal vents) rely on chemosynthesis (Earth's internal heat), but these are rare.</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>In an aquatic ecosystem, the major conduit for energy flow is the:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2354;&#2368;&#2351; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2314;&#2352;&#2381;&#2332;&#2366; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Detritus food chain (DFC)</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2335;&#2381;&#2352;&#2367;&#2335;&#2360; &#2326;&#2366;&#2342;&#2381;&#2351; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; (&#2337;&#2368;&#2319;&#2347;&#2360;&#2368;)</span>",
      "<span class=\"eqt\">Grazing food chain (GFC)</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2352;&#2366;&#2327;&#2366;&#2361; &#2326;&#2366;&#2342;&#2381;&#2351; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; (&#2332;&#2368;&#2319;&#2347;&#2360;&#2368;)</span>",
      "<span class=\"eqt\">Nutrient cycle</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2359;&#2325; &#2330;&#2325;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Decomposition process</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2328;&#2335;&#2344; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Grazing Food Chain (GFC): In aquatic ecosystems, the grazing food chain, which starts with phytoplankton (the primary producers), is the primary pathway for energy flow. Phytoplankton are consumed by zooplankton, which are then eaten by small fish, and so on, up to larger fish. This direct consumption of producers is the main way energy moves through the system. </p><p>&#183; Detritus Food Chain (DFC): While the detritus food chain (which begins with dead organic matter) is important in aquatic ecosystems, especially in the deeper parts, it's generally not the major conduit of energy flow compared to the grazing food chain. </p><p>&#183; Nutrient Cycle: Nutrient cycles are essential for the availability of materials in an ecosystem, but they don't represent the flow of energy itself. Energy flows through the food chain. </p><p>&#183; Decomposition Process: Decomposition is a vital process for recycling nutrients, but it's part of the detritus food chain, not the main energy flow pathway in aquatic systems.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>Organisms that feed on producers are called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2379;&#2306; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2352;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2332;&#2368;&#2357;&#2379;&#2306; &#2325;&#2379; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Secondary consumers</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Tertiary consumers</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2371;&#2340;&#2368;&#2351;&#2325; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Primary consumers</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Decomposers</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2328;&#2335;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Organisms that feed on producers (plants) are called primary consumers.</p><p><b>Primary consumers</b> are organisms that <b>directly feed on producers</b> (autotrophs like plants, algae, or phytoplankton).</p><p>They are <b>herbivores</b> (e.g., deer, zooplankton, grasshoppers) and form the <b>second trophic level</b> in food chains.</p><p>Example: Grass (producer) &rarr; Deer (primary consumer).</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>The below represents a food web in a grassland ecosystem:</p><p>Grass &rarr; Grasshopper &rarr; Frog &rarr; Snake &rarr; Hawk. </p><p>Hawk is a ________ in the above ecosystem.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2319;&#2325; &#2328;&#2366;&#2360; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2319;&#2325; &#2326;&#2366;&#2342;&#2381;&#2351; &#2357;&#2375;&#2348; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;:</p><p>&#2328;&#2366;&#2360; &rarr; &#2335;&#2367;&#2337;&#2381;&#2337;&#2366; &rarr; &#2350;&#2375;&#2306;&#2338;&#2325; &rarr; &#2360;&#2366;&#2306;&#2346; &rarr; &#2348;&#2366;&#2332;&#2404;</p><p>&#2348;&#2366;&#2332; &#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2319;&#2325; ________ &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Secondary consumers</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Tertiary consumers</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2371;&#2340;&#2368;&#2351;&#2325; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Quaternary consumers</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2340;&#2369;&#2352;&#2381;&#2341;&#2325; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Decomposers</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2328;&#2335;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In the given food chain:</p><p>Grass (Producer) &rarr; Grasshopper (Primary consumer) &rarr; Frog (Secondary consumer) &rarr; Snake (Tertiary consumer) &rarr; Hawk (Quaternary consumer)</p><p>&#183; The hawk occupies the highest trophic level (4th/5th, depending on classification).</p><p>&#183; It is an apex predator (no natural predators in this ecosystem).</p><p>&#183; Some may classify the hawk as a tertiary consumer (counting from producer = level 1)</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>The trophic level occupied by herbivores is the:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2366;&#2325;&#2366;&#2361;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2327;&#2381;&#2352;&#2361;&#2339; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2346;&#2379;&#2359;&#2368; &#2360;&#2381;&#2340;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">First trophic level</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2341;&#2350; &#2335;&#2381;&#2352;&#2377;&#2347;&#2367;&#2325; &#2360;&#2381;&#2340;&#2352;</span>",
      "<span class=\"eqt\">Second trophic level</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2370;&#2360;&#2352;&#2366; &#2335;&#2381;&#2352;&#2377;&#2347;&#2367;&#2325; &#2360;&#2381;&#2340;&#2352;</span>",
      "<span class=\"eqt\">Third trophic level</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2360;&#2352;&#2366; &#2335;&#2381;&#2352;&#2377;&#2347;&#2367;&#2325; &#2360;&#2381;&#2340;&#2352;</span>",
      "<span class=\"eqt\">Fourth trophic level</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2380;&#2341;&#2366; &#2335;&#2381;&#2352;&#2377;&#2347;&#2367;&#2325; &#2360;&#2381;&#2340;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Trophic levels represent the position of organisms in a food chain based on their energy source.</p><p>&#183; First trophic level : Producers (plants, algae) that capture energy from the sun.</p><p>&#183; Second trophic level: Herbivores (primary consumers) that feed directly on producers (e.g., deer, grasshoppers).</p><p>&#183; Higher levels: Carnivores (secondary/tertiary consumers).</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>The transfer of energy from one trophic level to the next follows the:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2335;&#2381;&#2352;&#2377;&#2347;&#2367;&#2325; &#2360;&#2381;&#2340;&#2352; &#2360;&#2375; &#2309;&#2327;&#2354;&#2375; &#2335;&#2381;&#2352;&#2377;&#2347;&#2367;&#2325; &#2360;&#2381;&#2340;&#2352; &#2340;&#2325; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2339; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Law of conservation of energy</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Second law of thermodynamics</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2359;&#2381;&#2350;&#2366;&#2327;&#2340;&#2367;&#2325;&#2368; &#2325;&#2366; &#2342;&#2370;&#2360;&#2352;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">10 per cent law</span><span class=\"hqt\" style=\"display:none\">10 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2366;&#2344;&#2370;&#2344;</span>",
      "<span class=\"eqt\">Law of limiting factors</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2350;&#2367;&#2340; &#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The transfer of energy follows the 10 per cent law, where only 10% of the energy is transferred to each trophic level from the lower trophic level.</p><p>10% Law (Lindeman's Law of Trophic Efficiency):</p><p>&#183; Only ~10% of energy is transferred from one trophic level to the next.</p><p>&#183; The rest is lost as heat (respiration), waste, or unused biomass.</p><p>&#183; Example: If plants (producers) have 10,000 J, herbivores get ~1,000 J, carnivores ~100 J.</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Ecological pyramids represent the relationship between organisms at different trophic levels in terms of:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2379;&#2359;&#2339; &#2360;&#2381;&#2340;&#2352;&#2379;&#2306; &#2346;&#2352; &#2332;&#2368;&#2357;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2348;&#2306;&#2343;&#2379;&#2306; &#2325;&#2379; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Number only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Biomass only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2348;&#2366;&#2351;&#2379;&#2350;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Energy only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2314;&#2352;&#2381;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Number, biomass or energy</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2348;&#2366;&#2351;&#2379;&#2350;&#2366;&#2360; &#2351;&#2366; &#2314;&#2352;&#2381;&#2332;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The relationship in ecological pyramids is expressed in terms of number, biomass, or energy.</p><p><b>Ecological pyramids</b> graphically represent trophic relationships using:</p><p>&#183; <b>Pyramid of Numbers</b> &rarr; Count of organisms at each level (e.g., 1 tree &rarr; 1,000 insects &rarr; 10 birds).</p><p>&#183; <b>Pyramid of Biomass</b> &rarr; Dry weight of organisms (usually upright, but inverted in some ecosystems like oceans).</p><p>&#183; <b>Pyramid of Energy</b> &rarr; Always upright; shows energy flow (kJ/m&#178;/year), adhering to the <b>10% law</b>.</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>In most ecosystems, the pyramid of numbers is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2340;&#2306;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Inverted</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2354;&#2381;&#2335;&#2375;</span>",
      "<span class=\"eqt\">Spindle-shaped</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2369;&#2352;&#2368; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Upright</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2350;&#2366;&#2344;&#2342;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Irregular</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2367;&#2351;&#2350;&#2367;&#2340;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In <b>most ecosystems</b> (e.g., grasslands, forests), the <b>pyramid of numbers is upright</b> because:</p><p>&#183; <b>Producers (base)</b> are the most numerous (e.g., thousands of grass plants).</p><p>&#183; <b>Herbivores (middle)</b> are fewer (e.g., hundreds of grasshoppers).</p><p>&#183; <b>Top carnivores (apex)</b> are the rarest (e.g., a few hawks).</p><p>The <b>standard upright pyramid</b> reflects decreasing numbers upward due to energy loss (10%law).</p><p><b>Further information:</b></p><p>&#183; <b>Inverted</b>: Occurs in <b>parasitic food chains</b> (e.g., 1 tree &rarr; millions of lice) or <b>aquatic systems</b> (few phytoplankton support many zooplankton).</p><p>&#183; <b>Spindle-shaped</b>: Rare; seen when intermediate consumers outnumber producers (e.g., insects on a single large tree).</p><p>&#183; <b>Irregular</b>: No consistent pattern (uncommon).</p>",
    "question_index": 19
  }
];
