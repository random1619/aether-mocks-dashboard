    "correct_option_id": 3,
    "solution": "<p>In football (soccer), a banana kick refers to a technique where the player strikes the ball to create a curved trajectory(due to Magnus effect) that bends around obstacles like defensive walls or players. </p><p>This technique was popularized by players like Roberto Carlos of Brazil. </p><p>The name comes from the banana-like curve the ball follows during flight.</p><p>Further insights:</p><p>List of some popular sports terms associated with Football, Ice Hockey, Boxing, and Hockey.</p><p><b>Football (Soccer)</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Term</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Banana Kick</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A curved shot, typically in free-kicks</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Offside</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A player is closer to the opponent's goal line than the ball and defender</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Hat-trick</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Scoring 3 goals in a single match by the same player</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Nutmeg</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Kicking the ball through an opponent's legs</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Red Card</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sent-off from the game for a serious foul</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Tiki-Taka</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Quick short passing style, often linked to Spanish football</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Dribble</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Skillfully moving the ball past opponents while maintaining control</td></tr></table><p><b>Ice Hockey</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Term</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Puck</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The rubber disc used in place of a ball</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Power Play</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Advantage when one team has more players due to opponent's penalty</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Hat-trick</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Scoring 3 goals in a game by one player</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Checking</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Body contact used to disrupt an opponent</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Face-off</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Starting play by dropping the puck between two opposing players</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Slap Shot</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A powerful shot with a swinging motion</td></tr></table><p><b>Boxing</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Term</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Knockout (KO)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A boxer is unable to continue after being hit</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Technical Knockout (TKO)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Referee stops the fight due to a boxer's inability to continue safely</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Jab</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A quick, straight punch</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Uppercut</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">An upward punch typically aimed at the opponent's chin</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Southpaw</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A left-handed boxer (leads with right hand and foot)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Bout</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A match or contest</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Ring</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The square arena where boxers fight</td></tr></table><p><b>Field Hockey</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Term</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Push Pass</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A short pass where the stick stays in contact with the ball</td></tr><tr><td align=\"left\" style=       "<span class=\"eqt\">2021</span><span class=\"hqt\" style=\"display:none\">2021</span>",
      "<span class=\"eqt\">1991</span><span class=\"hqt\" style=\"display:none\">1991</span>",
      "<span class=\"eqt\">2019</span><span class=\"hqt\" style=\"display:none\">2019</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>Major Dhyan Chand Khel Ratna Award</b>, originally known as the <b>Rajiv Gandhi Khel Ratna Award</b>, is <b>India's highest sporting honor</b>.</p><p><b>Key Details:</b></p><p>&#183; <b>Renamed</b>: On <b>6 August 2021</b>, the award was renamed by Prime Minister <b>Narendra Modi</b> to honor <b>Major Dhyan Chand</b>, India's most iconic field hockey player, known as \"The Wizard\" for his exceptional skills.</p><p>&#183; <b>First Instituted</b>: The award was instituted in <b>1991 - 1992</b>.</p><p>&#183; <b>Purpose</b>: It is given for the <b>most outstanding performance in the field of sports</b> over a period of four years at the international level.</p><p>&#183; <b>Award Includes</b>:</p><p>o A <b>medal</b></p><p>o A <b>certificate</b></p><p>o A <b>cash prize</b> of &#8377;25 lakh (as of recent updates)</p><p><b>Further insights:</b></p><p><b>About Major Dhyan Chand:</b></p><p>&#183; <b>Born</b>: August 29, 1905</p><p>&#183; <b>Sport</b>: Field Hockey</p><p>&#183; <b>Achievements</b>:</p><p>o Led India to <b>three Olympic gold medals</b> (1928, 1932, 1936)</p><p>o Scored over <b>400 goals</b> in his career</p><p>o Known for his unmatched ball control and goal-scoring ability</p><p>&#183; <b>Legacy</b>:</p><p>o His birthday, <b>29 August</b>, is celebrated as <b>National Sports Day</b> in India</p><p>o Multiple stadiums and sports institutions across India are named after him</p>",
    "question_index": 6
  },

    "options": [

    ],
    "correct_option_id": 0,
    "solution": "<p>The Asian Games are a quadrennial multi-sport event held in Asia, organized by the Olympic Council of Asia (OCA). The first Asian Games were held in <b>New Delhi, India</b>, in <b>1951</b>.</p><p>&#183; <b>Year:</b> March 4 - 11, 1951</p><p>&#183; <b>Participating Nations:</b> 11</p><p>&#183; <b>Sports:</b> 6 (Athletics, Aquatics, Basketball, Cycling, Football, Weightlifting)</p><p>&#183; <b>Motto:</b> \"Play the game in the spirit of the game\"</p><p>Japanese athletes won the 24 gold, 21 silver, and 15 bronze medals, respectively; while the host nation India had 15 golds and 51 overall medals with most bronzes (20) and finished at second spot in a medal table. </p><p>The Asian Games were originally called the <b>Asian Games Federation (AGF) Games</b> and later became the <b>Asiad</b>. </p>",
    "question_index": 7
  },
