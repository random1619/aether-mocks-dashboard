    "question": "<p>Where is the head-quarters of United Nations located?</p>",

      "Washington DC",
      "Vienna"
    ],
    "correct_option_id": 2,
    "solution": "<p>The United Nations (UN) is an intergovernmental organization tasked to promote international co-operation and to create and maintain international order. A replacement for the ineffective League of Nations, the organization was established on 24 October 1945 after World War II in order to prevent another such conflict. At its founding, the UN had 51 member states; there are now 193. The headquarters of the UN is in Manhattan, New York City, and experiences extraterritoriality. Further main offices are situated in Geneva, Nairobi, and Vienna.</p>",

    "question": "<p>Which among the following is NOT an official language of UN?</p>",

      "Arabic",

      "Spanish",
      "Russian",
      "Japanese"
    ],
    "correct_option_id": 4,
    "solution": "<p>The six official languages of the UN, used in intergovernmental meetings and documents, are Arabic, Chinese, English, French, Russian, and Spanish. These languages are used at meetings of various UN organs, particularly the General Assembly (Article 51 of its Rules of Procedure), the Economic and Social Council, and the Security Council (Article 41 of its Rules of Procedure). Each representative of a country may speak in any one of these six languages, or may speak in any language and provide interpretation into one of the six official languages. The UN provides simultaneous interpretation from the official language into the other five official languages, via the United Nations Interpretation Service. The six official languages are also used for the dissemination of official documents. Until a document is available in all six official languages, it is not published. Generally, the texts in each of the six languages are equally authoritative.</p>",
    "question_index": 1
  },
  {

    "correct_option_id": 1,
    "solution": "<p>The United Nations Human Settlements Programme (UN - Habitat) is the United Nations agency for human settlements and sustainable urban development. It was established in 1978 as an outcome of the First UN Conference on Human Settlements and Sustainable Urban Development (Habitat I) held in Vancouver, Canada in 1976. UN-Habitat maintains its headquarters at the United Nations Office at Nairobi, Kenya. It is mandated by the United Nations General Assembly to promote socially and environmentally sustainable towns and cities with the goal of providing adequate shelter for all. It is a member of the United Nations Development Group.</p>",
    "question_index": 2
  },

    "correct_option_id": 4,

  },
  {

    "correct_option_id": 0,

    "question_index": 4
  },
  {

    ],
    "correct_option_id": 3,
    "solution": "<p>The United Nations Environment Programme is an agency of United Nations and coordinates its environmental activities, assisting developing countries in implementing environmentally sound policies and practices. It was founded by Maurice Strong, its first director, as a result of the United Nations Conference on the Human Environment (Stockholm Conference) in June 1972.</p>",

  {

      "Geneva"

  {

  {
    "question": "<p>The capital of Argentina is</p>",

      "San Luis"
    ],
    "correct_option_id": 1,
    "solution": "<p>Buenos Aires is the capital and most populous city of Argentina. The city is located on the western shore of the estuary of the R&#237;o de la Plata, on the South American continent's south-eastern coast. \"Buenos Aires\" can be translated as \"fair winds\" or \"good airs\", but the first one was the meaning intended by the founders in the 16<sup>th</sup> century, by the use of the original name \"Real de Nuestra Senora Santa Mar&#237;a del Buen Ayre\".</p>",

    "correct_option_id": 2,

    "question_index": 15

    "solution": "<p>Reykjav&#237;k is the capital and largest city of Iceland. It has a latitude of 64&deg;08' N, making it the world's northernmost capital of a sovereign state, and is a popular tourist destination. It is located in southwestern Iceland, on the southern shore of Faxa Bay.</p>",

    "solution": "<p>Nairobi is the capital and largest city of Kenya. The name comes from the Maasai phrase Enkare Nairobi, which translates to \"cool water\", a reference to the Nairobi River which flows through the city. The city is popularly referred to as the Green City in the Sun.</p>",

    "solution": "<p>Pyongyang is the capital and largest city of the Democratic People's Republic of Korea (commonly known as North Korea). Pyongyang is located on the Taedong River about 109 kilometres upstream from its mouth on the Yellow. The city was split from the South Pyongan province in 1946. It is administered as a directly governed city on the same level as provincial governments, as opposed to a special city as Seoul is in South Korea.</p>",

    "solution": "<p>Bishkek, formerly Pishpek and Frunze, is the capital and largest city of Kyrgyzstan (Kyrgyz Republic). Bishkek is also the administrative centre of the Chuy Region. The province surrounds the city, although the city itself is not part of the province, but rather a province-level unit of Kyrgyzstan.</p>",
