    "question": "Sarvam AI is an organization that is developing artificial intelligence tailored to India's needs by building foundational components and applying them to the country's unique linguistic, enterprise, and governance requirements.  What is the total financial and compute support allocated to Sarvam AI under the IndiaAI Mission?",

r>\t<li><strong>Saaras (Speech-to-Text):</strong> Supports all 22 scheduled languages, 8kHz telephony audio, and code-mixed speech.</li><br>\t<li><strong>Vision (Document Understanding):</strong> Tailored for 22  Indian languages, mixed scripts, and handwritten text</li><br></ol><br>Through these foundational capabilities, Sarvam AI demonstrates how India-centric AI can evolve into scalable, resilient, and population-scale digital infrastructure, enhancing public service delivery, improving linguistic accessibility, and reinforcing India's journey toward a globally competitive AI ecosystem.<br><strong>The Sarvam AI ecosystem consists of:</strong><br><ol><br>\t<li><strong>Sarvam for Conversations</strong>: Enterprise-grade (high capacity) conversational AI delivering human-like, culturally fluent voices in <strong>11 Indian languages</strong>. Handles over <strong>100 million  interactions with <500ms latency, deploys within <24 hours, and achieves up to 10x ROI.</strong></li><br>\t<li><strong>Sarvam for Work</strong>: A unified enterprise AI platform that accelerates value creation through an AI-assisted build\"debug\"optimize cycle. Open and modular, it integrates seamlessly with any model, data source, or infrastructure.</li><br>\t<li><strong>Sarvam AI for Content</strong>: Enables multilingual video dubbing with voice cloning and precise audio-visual sync, along with document translation that preserves layout and tone, supported by built-in quality review and editing tools.</li><br>\t<li><strong>Sarvam AI for Edge Intelligence</strong>: Delivers compact, low-latency multimodal AI for real-world deployment, combining edge and cloud inference to power real-time assistants, on-device NLP, and high-speed translation and summarisation.</li><br></ol><br><strong>Strategic Partnerships For Public Service Delivery</strong><br>Sarvam AI's institutional collaborations are transforming indigenous innovation into measurable public value across India. By working closely with national and state governments, the company is embedding advanced AI capabilities into critical service delivery systems.<br><ol><br>\t<li><strong>UIDAI (Unique Identification Authority of India) </strong>partnered with Sarvam AI to enhance Aadhaar services using AI-driven voice interaction, real-time fraud detection, and multilingual support. A custom GenAI stack will operate within UIDAI's secure, on-premise infrastructure, supporting 10 Indian languages with real-time enrolment feedback and fraud alerts.</li><br>\t<li><strong>The Government of Odisha</strong> in collaboration with Sarvam AI<strong> </strong>are establishing a 50MW AI-optimized Sovereign AI Capacity Hub to serve as a national compute backbone. It will support AI use cases in mining, industrial safety, and Odia-language skilling, contributing to the sovereign compute grid.</li><br>\t<li><strong>The Government of Tamil Nadu and IIT Madras</strong>, in collaboration with Sarvam, are developing Digital Sangam, India's first Sovereign AI Research Park, anchored by a 20MW AI data center to integrate advanced compute, research, and startup incubation for large-scale AI applications.</li><br></ol>",

    "solution": "<p>As a part of its latest move aimed at tightening loan based guidelines to ensure better recovery of capital and more fair terms for borrowers, RBI recently issued updated draft guidelines to be followed by recognised lenders including banks to recover loans.<br><br>As per the draft guidelines issued by RBI, recovery agents must avoid violating borrowers' privacy, refrain from visits and calls during inappropriate occasions such as weddings and avoid any harsh methods towards recovery.<br><ul><br>\t<li>The draft proposes that lenders put in place a structure to monitor and control the activity of recovery agents and ensure that they refrain from actions that could damage their integrity and reputation.</li><br>\t<li>The central bank also issued draft guidelines on the Kisan Credit Card (KCC)scheme, aimed at expanding coverage, streamlining operational aspects and addressing emerging sectoral requirements.</li><br>\t<li>The Kisan Credit Card scheme was launched to offer farmers easy access to affordable credit for their agricultural needs.</li><br></ul><br><strong>Revamping Kisan Credit Card scheme</strong><br>The Reserve Bank of India (RBI) has released a revised set of draft guidelines for the Kisan Credit Card (KCC) scheme. These updates aim to modernize the credit system, align loan cycles with actual harvest timelines, and bring more transparency to the borrowing process for farmers.<br>One of the most significant changes in the draft is the standardization of crop seasons to ensure uniformity in how loans are sanctioned and repaid.<br><ul><br>\t<li>Short-Duration Crops: Defined by a 12-month cycle.</li><br>\t<li>Long-Duration Crops: Defined by an 18-month cycle.</li><br>\t<li>Extended Loan Tenure: To better match these cycles, the RBI has proposed extending the tenure of KCC loans to six years. This shift is designed to ensure that repayment deadlines do not clash with the actual production and selling timelines of the farmers.</li><br></ul><br><strong>Funding for Agritech and organic farming</strong><br>The RBI is also expanding what a KCC loan can cover. Recognizing the shift toward modern farming, the draft framework now includes \"technological interventions\" as eligible expenses.<br>Under the 20% provision usually earmarked for the maintenance of farm assets, farmers can now seek funds for the following listed items.<br><ul><br>\t<li>Soil testing and real-time weather forecast services.</li><br>\t<li>Certification costs for organic farming or \"Good Agricultural Practices.\"</li><br>\t<li>3 Maintenance of essential modern machinery and digital infrastructure.</li><br></ul><br><strong>Streamlined credit limits</strong><br><ul><br>\t<li>The draft guidelines aim to align \"drawing limits\" with the actual \"scale of finance\" for each specific crop season. This means the amount of credit a farmer can withdraw will be more accurately tied to the real-world cost of cultivation of specific crops.</li><br>\t<li>The goal is to prevent under-funding while also ensuring farmers don't take on more debt than their harvest can support.</li><br></ul><br><strong>A safety net against informal lending</strong><br><ul><br>\t<li>Since its inception, the KCC scheme has served as a critical tool to keep farmers away from high-interest informal moneylenders. It covers post-harvest expenses and household consumption needs and investment requirements for allied sectors like dairying, fisheries, and animal husbandry.</li><br></ul><br></p>",

nce, and 1% fuel surcharge waiver, making credit safer & convenient for first-time users.</li><br></ol>",

    "correct_option_id": 2,
    "solution": "Paradip Port Authority (PPA) has been awarded the First Prize at the Swachhata Pakhwada Awards 2025, instituted by the Ministry of Ports, Shipping and Waterways (MoPSW), in recognition of its outstanding performance in cleanliness, sustainability, and community participation.<br><ul><br>\t<li>The award was presented by Hon'ble Union Minister of Ministry of Ports, Shipping and Waterways, Shri Sarbananda Sonowal, with Hon'ble Minister of State, Shri Shantanu Thakur and Shri Vijay Kumar, IAS, Secretary, of MoPSW, in attendance, at a ceremony held in New Delhi on Tuesday, 3rd February 2026. Shri P. L. Haranadh, IRTS, Chairman of Paradip Port Authority, received the honour on behalf of the port team.</li><br>\t<li>Several MoPSW organizations have been recognized with the Swachh Bharat Pakhwada Awards\"2025 for exemplary performance during Swachhata Pakhwada 2025 and Swachhata Hi Sewa 2025, marked by cleanliness drives, citizen engagement, advocacy, and Safai Mitra welfare, promoting a cleaner and more sustainable work environment.</li><br>\t<li>This achievement marks a proud milestone, reflecting the port's strong commitment to the ideals of Swachh Bharat Abhiyan, environmental stewardship, and inclusive development. Under the guidance of the Ministry of Ports, Shipping and Waterways, Paradip Port Authority successfully implemented the three core pillars of Swachhata Pakhwada 2025: Jan Bhagidari, Ek Ped Maa Ke Naam, and Safai Mitra Suraksha.</li><br>\t<li>As part of Jan Bhagidari, PPA ensured large-scale public participation through cleanliness drives across schools, heritage sites, temples, beaches, ponds, and port premises. Activities such as cyclothons, Swachhata Raths, rallies, Swachhata Runs, human chains, and citizen-led drives under campaigns like Ek Din Ek Ghanta Ek Saath reinforced the message that cleanliness is everyone's responsibility.</li><br>\t<li>Under the Ek Ped Maa Ke Naam initiative, extensive plantation drives transformed neglected areas into clean green zones. A significant highlight was the plantation of 40,000 saplings at Paradip Sea Beach to mark the birthday of Hon'ble Prime Minister Shri Narendra Modi Ji, under the \"Ek Ped Maa Ke Naam 2.0\" campaign. This reinforced the port's commitment to environmental protection, sustainable growth, and building a greener, healthier India.</li><br>\t<li>The Safai Mitra Suraksha pillar focused on the welfare, safety, and dignity of sanitation workers. Medical check-ups were organized, and Safai Mitras were formally recognized, including special felicitation on the Prime Minister's birthday, acknowledging their invaluable contribution to cleanliness.</li><br>\t<li>PPA also conducted awareness campaigns against single-use plastics through street theatre, rallies, cotton bag drives, and citizen engagement under the theme End Plastic Pollution. Innovative initiatives like Scrap to Structure and exhibitions on Waste to Wealth showcased sustainable reuse of Swachh Bharat Mission assets, involving youth and local talent.</li><br>\t<li>Additional activities included Swachhata-themed paintings, rangoli competitions, selfie booths, clean food street initiatives, blood donation camps, and renovation of the Administrative Building under Special Campaign 5.0, strengthening the culture of cleanliness across the port ecosystem.</li><br></ul><br><div style=\"background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;\">The Swachhata Pakhwada Awards are an annual initiative of MoPSW, evaluating ports and maritime institutions across the country on cleanliness drives, waste management, green initiatives, and public participation. This recognition reinforces Paradip Port Authority's leadership in advancing the Clean India Mission and setting benchmarks for sustainable port operations.</div>",

    "correct_option_id": 2,
    "solution": "India ranked 91st out of 182 countries and territories on the Corruption Perceptions Index (CPI) for 2025, with a score of 39, according to the latest report released by Transparency International.<br><br>The index measures perceived levels of public sector corruption on a scale from zero, indicating a highly corrupt environment, to 100, indicating a very clean one.<br><br>The report said corruption continues to pose a challenge across the Asia-Pacific region. \"With an average regional score of 45 out of 100, high levels of corruption appear to have remained largely unaddressed over the past decade,\" it said.<br>India's score rose by one point from 38 in 2024 to 39 in 2025. The data shows fluctuations over the past decade:<br><ul><br>\t<li><strong>2013:</strong>36</li><br>\t<li><strong>2014:</strong> 38</li><br>\t<li><strong>2015:</strong>38</li><br>\t<li><strong>2016:</strong>40</li><br>\t<li><strong>2017:</strong> 40</li><br>\t<li><strong>2018:</strong>41</li><br>\t<li><strong>2019:</strong>41</li><br>\t<li><strong>2020:</strong> 40</li><br>\t<li><strong>2021:</strong> 40</li><br>\t<li><strong>2022:</strong>40</li><br>\t<li><strong>2023:</strong>39</li><br>\t<li><strong>2024:</strong> 38</li><br>\t<li><strong>2025:</strong>39</li><br></ul><br><strong>Regional trends in Asia-Pacific</strong><br><ul><br>\t<li>The report showcased differences across the Asia-Pacific region. It said weak governance and limited accountability remain issues in several countries. Public frustration over corruption and governance concerns was visible in 2025, with protests led by young people in a number of countries.</li><br>\t<li>In the Philippines, which scored 32, allegations of misuse of public funds linked to a flood relief project drew public anger. Indonesia, with a score of 34, saw protests where violence and disinformation were reported. In Nepal, which also scored 34, protests led to political change after a social media ban and wider concerns about corruption. Pakistan was ranked at 136. </li><br>\t<li>According to the report, some countries in the region recorded improvement since 2012. Maldives scored 39, Vietnam 41, and Timor-Leste 44. The report attributed these gains to reforms aimed at strengthening oversight institutions and improving administrative systems. However, it said these countries continue to record relatively low scores and require further progress.</li><br>\t<li>At the lower end of the index, Afghanistan and Myanmar each scored 16, while North Korea scored 15. The report said limited transparency, restricted civic space, and weak institutional checks leave these countries vulnerable to corruption.</li><br></ul><br><strong>Key regional findings</strong><br><ul><br>\t<li>The report said eight of 32 countries in the region have improved since 2012, including Bhutan (71), Brunei (63), and Laos (34). Thailand (33) and Mongolia (31) showed a decline over the same period, with Mongolia facing concerns over the rule of law and civic freedoms.</li><br>\t<li>Singapore (84), New Zealand (81), and Australia (76) recorded the highest scores in the region, ranking third, fourth, and 12th globally, respectively, it said.</li><br>\t<li>As per the report, most countries in the region scored below the global average of 42. This group includes India (39), Bangladesh (24), and Indonesia (34).</li><br></ul><br><div style=\"background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;\">The Corruption Perceptions Index, first released in 1995, is used to assess public sector corruption worldwide. It evaluates 182 countries and territories using data from 13 external sources, including the World Bank, World Economic Forum, private risk and consulting firms, and research organisations. The scores reflect the views of experts and business leaders.</div>",

 recovery and obtain their agreement to abide by these guidelines before assigning duties.<br><br>Banks must display an up-to-date list of empanelled recovery agents across all channels, including branches, officers, and digital platforms.<br><br>In cases where an agreement with an agent is terminated, the bank must publicise the change to ensure borrowers do not continue to deal with the agent or its representatives.<br><br>When a case is forwarded to a recovery agent, banks are required to inform the borrower in writing \" either through a letter to their current address, an SMS to their registered mobile number, or<br><br>an email to their registered address. The bank must also notify the borrower of any changes in the recovery agent during an ongoing recovery process.<br><br>Banks must ensure that borrower information is shared with employees or recovery agents only to facilitate loan recovery duties and must implement safeguards to prevent misuse of this information.<br><br>If a borrower has lodged a grievance, the bank should not forward the concerned recovery case to an employee or recovery agent until the grievance is resolved. However, where the bank is convinced, with appropriate evidence, that the borrower is making frivolous or vexatious complaints to avoid recovery, it may continue recovery proceedings even if a grievance is pending.",

ating the <strong>Electronic Detailed Accident Report (eDAR)</strong> platform of the Ministry of Road Transport and Highways with the <strong>Transaction Management System (TMS 2.0)</strong> of the National Health Authority. This integration enables seamless digital linkage from accident reporting to hospital admission, police authentication, treatment administration, claim processing, and final payment. Police confirmation is required within defined timelines \" 24 hours for non-life-threatening cases and 48 hours for life-threatening cases \" ensuring accountability while allowing uninterrupted emergency care.</li><br>\t<li>Reimbursement to hospitals will be made through the <strong>Motor Vehicle Accident Fund (MVAF)</strong>. In cases where the offending vehicle is <strong>insured</strong>, payment will be drawn from contributions made by <strong>General Insurance Companies</strong>. In <strong>uninsured and Hit & Run cases</strong>, payment will be made through budgetary allocation by Government of India. Claims approved by the State Health Agency will be paid within <strong>10 days</strong>, thereby providing financial certainty to hospitals and encouraging uninterrupted treatment.</li><br>\t<li>Grievances of road accident victims will be addressed by a <strong>Grievance Redressal Officer</strong> nominated by the <strong>District Road Safety Committee</strong> chaired by the District Collector / District Magistrate / Deputy Commissioner, ensuring accountability at the district level.</li><br>\t<li>The approval and launch of PM RAHAT from <strong>Seva Teerth</strong> symbolizes a citizen-first approach \" where governance translates into timely action, compassionate response, and <strong>protection of life</strong>. By ensuring that no accident victim is denied life-saving treatment due to financial constraints, PM RAHAT marks a decisive step towards <strong>saving lives of road accident victims</strong>and strengthening India's emergency care ecosystem.</li><     "solution": "The Reserve Bank of India (RBI) announced the introduction of a risk-based premium (RBP) framework for deposit insurance, which will come into effect from April 1. The framework, which replaces the flat-rate premium system in place since 1962, will be reviewed at least once every three years.<br><ul><br>\t<li>The move is aimed at incentivising sound risk management practices by banks and lowering premium costs for stronger institutions.</li><br>\t<li>Currently, banks pay a uniform premium of 12 paise per ₹100 of assessable deposits. While the flat-rate system is easy to administer, it does not differentiate between banks based on their financial soundness.</li><br>\t<li>Under the RBP regime, banks will be classified into four risk categories \" A, B, C and D \" with Category A representing the lowest risk. Premium rates will range from 8 paise to 12 paise per ₹100 of assessable deposits, offering a discount of up to 33.3 per cent to the strongest banks.</li><br>\t<li>The risk categorisation will be based on the latest available audited financial year-end data and supervisory ratings. Banks will be required to pay the insurance premium in advance for the first half of FY27 (April-September 2026) by May 31, based on assessable deposits as of March 31.</li><br>\t<li>If supervisory ratings or financial data for the relevant year are unavailable, the most recent available data will be used. For example, if the supervisory rating for March 2025 is not available, the rating as of March 2024 will be considered. A similar approach will apply for the second half of FY27.</li><br>\t<li>The framework adopts a two-tier rating methodology. Scheduled commercial banks, excluding regional rural banks (RRBs), will be assessed under a Tier-I model that incorporates supervisory ratings, quantitative financial indicators, and the potential loss to the Deposit Insurance Fund in the event of a bank failure.</li><br>\t<li>Cooperative banks and RRBs will be evaluated under a Tier-II model, which places greater weight on financial ratios and governance-related indicators.</li><br>\t<li>Payments banks and local area banks will continue to pay the card rate due to data limitations for risk-based pricing. Urban cooperative banks will also continue to pay the card rate of 12 paise per ₹100 of assessable deposits.</li><br>\t<li>The RBI has also introduced a vintage incentive under the framework. Banks with long-standing, stress-free operations will be eligible for a discount of 1 per cent for each completed year, capped at 25 per cent, provided there is no history of restructuring or major regulatory intervention.</li><br>\t<li>For cooperative banks and Tier-IV urban cooperative banks, a flat vintage incentive of 25 per cent will apply after completion of 25 years of satisfactory operations without distress events.</li><br></ul>",

st groups to recruit Indian youth. The policy states that intelligence and law enforcement agencies have been disrupting such attempts, it also lists down the steps to counter radicalisation including engagement with community and religious leaders and non-governmental organisations, among others.</li><br>\t<li><strong>Aligning and shaping international efforts</strong>- The policy emphasises bilateral and multilateral treaties and agency-level intelligence sharing. Such cooperation has led to disruption and indictment of terror entities, deportation of fugitives and efforts to designate wanted terrorists at the United Nations (UN).</li><br>\t<li><strong>Recovery and resilience through a whole-of-society approach</strong>- India's whole-of-society approach includes public-private partnerships and involvement of doctors, psychologists, lawyers, Non-governmental organisations (NGOs), and community and religious leaders to sensitise and reintegrate affected communities.</li><br></ul>",

    "solution": "The Reserve Bank of India (RBI) has proposed allowing authorised dealers commercial banks and primary dealers to undertake foreign exchange and currency interest rate derivative transactions on electronic trading platforms (ETPs) located outside India, subject to defined regulatory safeguards, according to draft directions on Foreign Exchange Dealings of Authorised Persons released.<br><ul><br>\t<li>Under the draft framework, such offshore platforms must be located in jurisdictions that are members of the Financial Action Task Force and regulated by authorities affiliated with the Committee on Payments and Market Infrastructures or the International Organization of Securities Commissions. For trades involving the rupee, authorised dealers may transact only with non-residents, and the offshore ETP operator will be required to publicly disseminate transaction data.<small> </small></li><br>\t<li>The RBI has invited comments from market participants and other stakeholders by March 10.<small> </small></li><br>\t<li>The draft also proposes that authorised dealer (AD) Category-I banks may undertake rupee non-deliverable derivative contracts (NDDCs) with other ADs and overseas entities, including International Financial Services Centre (IFSC) Banking Units (IBUs) and Offshore Banking Units (OBUs), either directly or on a back-to-back basis through their overseas branches. Such contracts may be cash-settled in rupees or any foreign currency, subject to the condition that the bank, or its non-resident parent, has an operating IBU.</li><br>\t<li>In addition, the RBI has set out governance requirements for authorised dealers. They would be required to frame a board-approved policy on foreign exchange dealings, including a net overnight open position (NOOP) limit capped at 25 per cent of total capital (Tier I and Tier II), which must be communicated to the central bank. The RBI would retain the discretion to prescribe a separate net open position limit involving the rupee, depending on market conditions.</li><br>\t<li>The draft reiterates overseas foreign currency borrowing limits for AD Category-I banks at 100 per cent of Tier I capital or $10 million, whichever is higher, unless prior RBI approval is obtained. Certain categories \" including borrowings for export credit, capital-raising purposes, specified interest-free funds from the head office, and short-term nostro overdrafts \" remain outside this cap. Standalone Primary Dealers authorised as AD Category-III may borrow within limits prescribed under the Standalone Primary Dealers Directions, 2025.</li><br>\t<li>The central bank has also consolidated norms governing the deployment of surplus foreign currency funds by authorised dealers. Subject to a board-approved policy, ADs may undertake overnight placements, reverse repos of up to one year against overseas sovereign debt, investments in overseas money market or sovereign debt instruments with maturities of up to one year, and lending in rupees or foreign currency in terms of the Foreign Exchange Management (Borrowing and Lending) Regulations, 2018. Undeployed FCNR(B) funds may also be invested in long-term overseas sovereign debt, subject to residual maturity conditions.</li><br>\t<li>For the purpose of the draft circular, \"authorised persons\" refers to AD Category-I banks and Standalone Primary Dealers authorised as Authorised Dealer Category-III under Section 10(1) of the Foreign Exchange Management Act, 1999.</li><br>\t<li>The move comes amid the RBI's broader efforts over the past year to streamline foreign exchange regulations, deepen derivative markets, and align trading practices with evolving electronic platform norms.</li><br></ul>",

    "solution": "The Union Cabinet chaired by the Prime Minister, Shri Narendra Modi approved the launch of the Urban Challenge Fund (UCF) with a total Central Assistance (CA) of Rs. One lakh crore. CA will cover 25% of the project cost, subject to raising minimum 50% of the project cost from market.<br>This will lead to a total investment of Rs. Four lakh crore in urban sector in next five years, marking a paradigm shift in India's urban development approach from grant- based financing to market-linked, reform-driven and outcome-oriented infrastructure creation.<br><ul><br>\t<li>The Urban Challenge Fund will leverage market finance, private participation and citizen- centric reforms for delivery of high-quality urban infrastructure. The Fund aims to build resilient, productive, inclusive and climate-responsive cities, positioning those as key driver of the country's next phase of economic growth.</li><br>\t<li>The Fund will be operational from FY 2025\"26 to FY 2030\"31, with an extendable implementation period up to FY 2033\"34. It gives effect to the Government's vision announced in Budget 2025\"26 to implement proposals relating to Cities as Growth Hubs, Creative Redevelopment of Cities, and Water and Sanitation.</li><br></ul><br><strong>Salient Features of the Urban Challenge Fund:</strong><br><ol><br>\t<li>A minimum of 50 per cent of project financing have to be mobilised from market sources, including municipal bonds, bank loans and Public\"Private Partnerships (PPPs). The remaining share may be contributed by States, Union Territories (UTs), Urban Local Bodies (ULBs) or other sources.</li><br>\t<li>Projects will be selected through a transparent and competitive challenge mode, ensuring support to high-impact and reform-oriented proposals.</li><br>\t<li>There will be a strong thrust on reforms across Urban Governance, Market & Financial systems, Operational efficiency, and Urban Planning</li><br>\t<li>Private sector participation will be encouraged through structured risk-sharing frameworks and benchmarking of service delivery standards</li><br>\t<li>A dedicated ₹5,000 crore corpus will enhance the creditworthiness of 4223 cities including Tier- II and Tier-III cities, particularly for first-time access to market finance.</li><br>\t<li>Positioning ULBs as Bankable Asset Class.</li><br></ol><br><strong>Credit Repayment Guarantee for Smaller Cities:</strong><br><ul><br>\t<li>In order to facilitate first-time access to market finance for all Cities/ULBs in Northeastern & Hilly States and smaller ULBs (<1,00,000 population) in other States/UTs, a Credit Repayment Guarantee Scheme of ₹5,000 crore has been approved. The scheme will provide a Central guarantee of up to ₹7 crore or 70 per cent of the loan amount (whichever is lower) for first-time loans. On successful repayment of first loan, central guarantee of ₹7 crore or 50 per cent of the loan amount (whichever is lower) will be provided. This will effectively support projects of minimum Rs.20 crore for the first time and Rs.28 crore for subsequent projects in smaller cities.</li><br></ul><br><strong>Challenge-Based Project Selection:</strong><br><ul><br>\t<li>Projects under the Fund will be selected through a challenge-based framework including transformative impact, sustainability & reform orientation. Funding will be linked to reforms, milestones and clearly defined outcomes. Continuation of reforms will be a prerequisite for further fund release. Paperless monitoring of projects and reforms will be facilitated through a single digital portal of the Ministry of Housing and Urban Affairs.</li><br></ul><br><strong>Project Verticals:</strong><br><ul><br>\t<li>Cities as Growth Hubs, identification of city regions, important economic nodes, integrated spatial economic & transit planning - including greenfield and semi-greenfield developments, and development along transit and economic corridors, urban mobility, critical infrastructure projects to enhance economic competitiveness;</li><br>\t<li>Creative Redevelopment of Cities, covering renewal of central business districts and heritage cores, brownfield regeneration, Transit Oriented Development and retrofitting of legacy infrastructure, Climate resilience, disaster mitigation and countermagnets to decongest the existing cities in Northeastern & Hilly States; and</li><br>\t<li>Water and Sanitation, including upgradation of water supply, sewerage and stormwater systems, Rurban infrastructure, water grids and integrated solid waste management, including legacy waste remediation, focusing on swachhata.</li><br></ul><br><strong>Coverage:</strong><br>The Fund will cover:<br><ul><br>\t<li>All cities with a population of 10 lakh or more (2025 estimates);</li><br>\t<li>All State and Union Territory capitals not covered above; and</li><br>\t<li>Major industrial cities with a population of 1 lakh or more.</li><br></ul><br>Additionally, all ULBs in hilly States, North-Eastern States, and smaller ULBs with population below 1 lakh will be eligible for support under the Credit Repayment Guarantee Scheme. In principle all cities will be covered under UCF<br><strong>Reform-Linked Funding Framework:</strong><br>Funding under the Urban Challenge Fund is anchored to a comprehensive reform agenda covering:<br><ul><br>\t<li>Governance and digital reforms;</li><br>\t<li>Market and financial reforms to strengthen creditworthiness;</li><br>\t<li>Operational reforms for improved service delivery and utility efficiency;</li><br>\t<li>Urban planning and spatial reforms, including transit-oriented development and green infrastructure; and</li><br>\t<li>Project-specific reforms with defined Key Performance Indicators (KPIs), third-party verification and sustainable Operation & Maintenance mechanisms.</li><br></ul><br><strong>Outcome Orientation:</strong><br><ol><br>\t<li>Projects will be evaluated on their ability to deliver transformative outcomes- economic, social and climate, including revenue mobilization, private investment, job creation and, improved safety, inclusiveness, service equity and cleanliness.</li><br>\t<li>The Urban Challenge Fund is expected to catalyse large-scale private investment, strengthen urban governance, and accelerate the creation of future-ready cities aligned with national development priorities.</li><br></ol>",

    "solution": "The Reserve Bank of India has deferred the implementation of the Unique Transaction Identifier (UTI) framework for over-the-counter (OTC) derivative transactions to 1 January 2027, following industry feedback, the central bank said in a release.<br><br>The central bank had earlier proposed to implement UTI for all transactions in OTC markets from 1 April 2026, covering rupee interest rate derivatives, forward contracts in government securities, foreign currency derivatives, foreign currency interest rate derivatives and credit derivatives.<br><ul><br>\t<li>In its final directions, the RBI said the rollout timeline has been extended from the earlier proposed date to provide market participants sufficient time to build the necessary technical capabilities after the issuance of revised reporting formats and operating guidelines.</li><br>\t<li>Further, the RBI clarified that the directions will apply only to OTC derivative transactions entered into on or after the date the framework comes into effect. Outstanding contracts prior to the implementation date will not be required to obtain a UTI.</li><br>\t<li>On the issue of UTI generation, the RBI retained the proposed \"waterfall\" mechanism that sets out the order of entities responsible for generating the identifier. While some stakeholders had suggested mandating electronic trading platforms (ETPs) to generate UTIs, the regulator declined to prescribe a single entity.</li><br>\t<li>In line with global standards, the RBI said the mandate is for generation and reporting of the UTI, while providing flexibility regarding which entity generates it, based on the prescribed hierarchy or mutual agreement between counterparties. However, delegation of UTI generation to a vendor, where the Legal Entity Identifier embedded in the UTI would be that of the vendor, will not be permitted.</li><br>\t<li>For transactions reportable in multiple jurisdictions where there is no earlier foreign reporting deadline, the RBI has clarified that the UTI-generating entity may be mutually agreed upon by counterparties. A similar provision has also been introduced for trades reportable only in India, offering operational flexibility.</li><br>\t<li>Meanwhile, the RBI has extended the timeline for submission of the final UTI in cases where it is not available at the time of reporting. Market participants will now have five business days from the date of the transaction to report the UTI, instead of the earlier proposed two business days.</li><br>\t<li>Additionally, a provision has been introduced allowing the reporting counterparty to generate and report a temporary UTI to the trade repository if the final UTI is not available from the counterparty at the time of reporting.</li><br>\t<li>The directions maintain that modifications to contract details will be treated as updates and will not require generation of a new UTI. However, lifecycle events such as novation resulting in a new reportable derivative contract will necessitate a fresh identifier.</li><br>\t<li>The Clearing Corporation of India Limited (CCIL) will issue revised reporting formats and detailed operating guidelines for reporting OTC derivative transactions with UTIs. The RBI said queries and requests for further clarifications received from market participants have been shared with CCIL for suitable incorporation in the formats and guidelines.</li><br></ul>",

    "solution": "India's central bank tightened rules for loans taken by firms that undertake proprietary trading in shares and commodities and offer leverage to clients, the latest measure aimed at reducing speculative market activity in the South Asian nation.<br><br>All credit facilities to securities firms will have to be backed by collateral, while lending for trading on their own account or investments by brokers will be prohibited, according to a statement published on the Reserve Bank of India's website.<br><ul><br>\t<li>The so-called prudential rules for capital market intermediaries such as stock and commodity brokers will come into effect from April 1, the central bank said. </li><br>\t<li>The stricter measures would raise the cost of raising capital by proprietary trading firms and squeeze profits. While Indian banks traditionally do not directly finance proprietary trading, the directive closes a loophole that allowed short-term working capital loans given by banks to be diverted for trading by brokers. </li><br>\t<li>Proprietary trading firms accounted for more than 50 per cent of equity options turnover on the National Stock Exchange of India Ltd. \" the country's biggest stock bourse \" last year, according to data. In cash equities trading, their share hit a 21-year high on the NSE at around 30 per cent.</li><br>\t<li>The latest step comes just days after India sharply raised transaction tax on trading of single-stock and index derivatives in a bid to reduce speculative trading. Combined with the central bank's new rules, market participants fear the rules will hurt volumes.</li><br>\t<li>The RBI has also asked banks to demand that guarantees extended by them on behalf of a broker for proprietary trades to be fully secured, with 50 per cent of collateral being in cash and rest as cash equivalents and government securities. The new rule will narrow the type of securities trading firms can offer as collateral to banks.    </li><br>\t<li>The central bank also tightened lending rules for margin trading facility under which stock brokers offer leverage to their clients. Loans given by banks for the product will have to be fully secured by cash and other liquid securities. Stocks offered as collateral by brokers will be considered at a 40 per cent valuation discount. </li><br>\t<li>Margin trading facility has grown rapidly into a more than ₹1 trillion ($11 billion) market for stock brokers, where clients can get leverage of upto five times their capital.</li><br></ul>",

 RBI Governor said.<br>The MPC revised its inflation forecast from 2 per cent to 2.1 per cent. The quarterly inflation forecasts are:<br><ul><br>\t<li>Q4 FY26: 3.2 per cent</li><br>\t<li>Q1 FY27: 4 per cent</li><br>\t<li>Q2 FY27: 4.2 per cent</li><br></ul><br>The next meeting of the MPC is scheduled from April 6 to 8.",

    "solution": "The Pradhan Mantri Fasal Bima Yojana (PMFBY), introduced in the country from 2016-17 is providing comprehensive risk insurance against crop damage due to non-preventable natural risks from pre-sowing to post-harvest for the crops/areas notified by the concerned State Government.<br><ul><br>\t<li>The losses to crops due to wild animals, being preventable in nature, were therefore not covered earlier.  However, at the request of Ministry of Environment, Forest and Climate Change and State Governments, States have been allowed to notify the losses by wild animals on individual assessment as add on cover at the cost of State Government.  Detailed protocol for such coverage has been given in the Operational Guidelines of the scheme.</li><br>\t<li>Inundation as a risk cover is available to all notified crops under PMFBY.  However, for hydrophilic crops like paddy, jute, mesta, sugarcane, such cover is available except in case of localized claims.</li><br>\t<li>Considering requests from various stakeholders for inclusion of these perils under localized calamities in PMFBY, a Committee was constituted for \"Defining Modalities of Crop Loss by Wild Animal Attack and Inundation for Paddy Crop under Localised Risk\".  The Committee has submitted its report alongwith recommendations and Standard Operating Procedures (SOPs) for coverage of these risks.</li><br>\t<li>Further, the review/revisions / improvements in the crop insurance schemes is a continuous process and decision on suggestion/ representations/ recommendations of the stakeholders/studies are taken from time to time.  Based on the experience gained, views of various stakeholders, to ensure better transparency, accountability, timely payment of claims to the farmers and to make the scheme more farmer friendly, Government has periodically revised the Operational Guidelines of the PMFBY comprehensively in 2018, 2020 and 2023. </li><br>\t<li>Majority of the claims are settled within the stipulated timelines under the Operational Guidelines of the scheme by the insurance companies.    However, during the implementation of PMFBY, some complaints were received in the past about payment of claims which are primarily on account of (a) delay in providing State Government share of subsidy (b) non-payment/delayed payment or under payment of claims on account of incorrect/delayed submission of insurance proposals by banks (c) discrepancy in yield data & consequent disputes between State Government and insurance companies etc.  The pending claims on account of these issue are settled after their resolution as per provisions of the scheme.</li><br></ul><br>Government has taken various steps to strengthen implementation of this scheme, bring transparency and ensure timely settlement of claims :<br><ul><br>\t<li>Government has undertaken development of <strong>National Crop Insurance Portal (NCIP)</strong> as a single source of data ensuring subsidy payment, co-ordination, transparency, dissemination of information and delivery of services including direct online enrollment of farmers, uploading/obtaining individual insured famer's details for better monitoring and to ensure transfer of claim amount electronically to the individual farmer's Bank Account. </li><br>\t<li>In order to rigorously monitor claim disbursal process, a dedicated module namely <strong>'Digiclaim Module' </strong>has been operationalized for payment of claims from Kharif 2022 onwards.  It involves integration of National Crop Insurance Portal (NCIP) with Public Finance Management System (PFMS) and accounting system of Insurance Companies to provide timely & transparent processing of all claims w.e.f. Kharif 2024.  </li><br>\t<li>Delinking of Central Government share of premium subsidy from that of State Governments has been implemented so that farmers can get proportionate claims relating to the Central Government share.</li><br>\t<li>Also, towards leveraging technology in implementation of the scheme, various steps like capturing of yield data/Crop Cutting Experiments (CCEs) data through <strong>CCE-Agri App</strong>& uploading it on the NCIP, allowing insurance companies to witness the conduct of CCEs, integration of State land records with NCIP etc. have already been taken to improve timely settlement of the claims to farmers.</li><br>\t<li>Provision of 12% penalty on delay in payment of claims by insurance company is auto calculated on National Crop Insurance Portal (NCIP).</li><br>\t<li>Opening of ESCROW Account by the State Government concerned for deposit of their premium share in advance as per provisions of the scheme has been made mandatory w.e.f. Kharif 2025 season. </li><br></ul><br>  Following technologies for Objective Crop Damage & Loss Assessment and transparency have also been implemented recently w.e.f. 2023-24 under the scheme:<br><ol><br>\t<li><strong>YES-TECH (Yield Estimation System Based on Technology)</strong>for gradual migration to Remote-Sensing based yield estimation to help assess yields as well as fair and accurate Crop Yield Estimation<em>. </em>This initiative has been launched for paddy & wheat crops from Kharif 2023 wherein 30% weightage to yield estimation will mandatorily be assigned to YES-TECH derived yield. Soybean crop has been added from Kharif 2024 season. </li><br>\t<li><strong>WINDS (Weather Information Network and Data System) </strong>for setting up of Network of Automatic Weather Stations (AWS) & Automatic Rain-Gauges (ARG) to the tune of 5 times of existing  network for collecting hyper-local weather data at GP & Block level.  This will be fed into a National database with interoperability & sharing of data in coordination with India Meteorological Department (IMD).  WINDS provides data not only for YES-TECH but also for effective drought & disaster management, accurate weather prediction and offering better parametric insurance products.</li><br></ol>",

    "solution": "The Reserve Bank of India (RBI) announced the introduction of a risk-based premium (RBP) framework for deposit insurance, which will come into effect from April 1. The framework, which replaces the flat-rate premium system in place since 1962, will be reviewed at least once every three years.<br><ul><br>\t<li>The move is aimed at incentivising sound risk management practices by banks and lowering premium costs for stronger institutions.</li><br>\t<li>Currently, banks pay a uniform premium of 12 paise per ₹100 of assessable deposits. While the flat-rate system is easy to administer, it does not differentiate between banks based on their financial soundness.</li><br>\t<li>Under the RBP regime, banks will be classified into four risk categories \" A, B, C and D \" with Category A representing the lowest risk. Premium rates will range from 8 paise to 12 paise per ₹100 of assessable deposits, offering a discount of up to 33.3 per cent to the strongest banks.</li><br>\t<li>The risk categorisation will be based on the latest available audited financial year-end data and supervisory ratings. Banks will be required to pay the insurance premium in advance for the first half of FY27 (April-September 2026) by May 31, based on assessable deposits as of March 31.</li><br>\t<li>If supervisory ratings or financial data for the relevant year are unavailable, the most recent available data will be used. For example, if the supervisory rating for March 2025 is not available, the rating as of March 2024 will be considered. A similar approach will apply for the second half of FY27.</li><br>\t<li>The framework adopts a two-tier rating methodology. Scheduled commercial banks, excluding regional rural banks (RRBs), will be assessed under a Tier-I model that incorporates supervisory ratings, quantitative financial indicators, and the potential loss to the Deposit Insurance Fund in the event of a bank failure.</li><br>\t<li>Cooperative banks and RRBs will be evaluated under a Tier-II model, which places greater weight on financial ratios and governance-related indicators.</li><br>\t<li>Payments banks and local area banks will continue to pay the card rate due to data limitations for risk-based pricing. Urban cooperative banks will also continue to pay the card rate of 12 paise per ₹100 of assessable deposits.</li><br>\t<li>The RBI has also introduced a vintage incentive under the framework. Banks with long-standing, stress-free operations will be eligible for a discount of 1 per cent for each completed year, capped at 25 per cent, provided there is no history of restructuring or major regulatory intervention.</li><br>\t<li>For cooperative banks and Tier-IV urban cooperative banks, a flat vintage incentive of 25 per cent will apply after completion of 25 years of satisfactory operations without distress events.</li><br></ul>",

    "correct_option_id": 0,
    "solution": "The Reserve Bank of India has deferred the implementation of the Unique Transaction Identifier (UTI) framework for over-the-counter (OTC) derivative transactions to 1 January 2027, following industry feedback, the central bank said in a release.<br><br>The central bank had earlier proposed to implement UTI for all transactions in OTC markets from 1 April 2026, covering rupee interest rate derivatives, forward contracts in government securities, foreign currency derivatives, foreign currency interest rate derivatives and credit derivatives.<br><ul><br>\t<li>In its final directions, the RBI said the rollout timeline has been extended from the earlier proposed date to provide market participants sufficient time to build the necessary technical capabilities after the issuance of revised reporting formats and operating guidelines.</li><br>\t<li>Further, the RBI clarified that the directions will apply only to OTC derivative transactions entered into on or after the date the framework comes into effect. Outstanding contracts prior to the implementation date will not be required to obtain a UTI.</li><br>\t<li>On the issue of UTI generation, the RBI retained the proposed \"waterfall\" mechanism that sets out the order of entities responsible for generating the identifier. While some stakeholders had suggested mandating electronic trading platforms (ETPs) to generate UTIs, the regulator declined to prescribe a single entity.</li><br>\t<li>In line with global standards, the RBI said the mandate is for generation and reporting of the UTI, while providing flexibility regarding which entity generates it, based on the prescribed hierarchy or mutual agreement between counterparties. However, delegation of UTI generation to a vendor, where the Legal Entity Identifier embedded in the UTI would be that of the vendor, will not be permitted.</li><br>\t<li>For transactions reportable in multiple jurisdictions where there is no earlier foreign reporting deadline, the RBI has clarified that the UTI-generating entity may be mutually agreed upon by counterparties. A similar provision has also been introduced for trades reportable only in India, offering operational flexibility.</li><br>\t<li>Meanwhile, the RBI has extended the timeline for submission of the final UTI in cases where it is not available at the time of reporting. Market participants will now have five business days from the date of the transaction to report the UTI, instead of the earlier proposed two business days.</li><br>\t<li>Additionally, a provision has been introduced allowing the reporting counterparty to generate and report a temporary UTI to the trade repository if the final UTI is not available from the counterparty at the time of reporting.</li><br>\t<li>The directions maintain that modifications to contract details will be treated as updates and will not require generation of a new UTI. However, lifecycle events such as novation resulting in a new reportable derivative contract will necessitate a fresh identifier.</li><br>\t<li>The Clearing Corporation of India Limited (CCIL) will issue revised reporting formats and detailed operating guidelines for reporting OTC derivative transactions with UTIs. The RBI said queries and requests for further clarifications received from market participants have been shared with CCIL for suitable incorporation in the formats and guidelines.</li><br></ul>",
