    <!-- Inject Question Data -->
    <script>

  {

    "correct_option_id": 2,
    "solution": "<p>The brain and spinal cord constitute the central nervous system. They receive information from all parts of the body and integrate it.</p>",
    "question_index": 0
  },
  {

      "Cerebrum",
      "Medulla",
      "Hypothalamus",
      "Pons"
    ],
    "correct_option_id": 2,
    "solution": "<p>All involuntary actions including blood pressure, salivation and vomiting are controlled by the medulla in the hind-brain.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Gustatory receptors detect which among the following senses?</p>",

      "Light",
      "Temperature",
      "Pain"

    "correct_option_id": 1,
    "solution": "<p>Receptors are usually located in our sense organs, such as the inner ear, the nose, the tongue etc. Gustatory receptors will detect taste while olfactory receptors will detect smell.</p>",
    "question_index": 2
  },
  {

      "Regeneration",
      "Budding",
      "Vegetative propagation",
      "Spore formation"
    ],
    "correct_option_id": 1,
    "solution": "<p>Many fully differentiated organisms have the ability to give rise to new individual organisms from their body parts. For example, simple animals like Hydra and Planaria can be cut into any number of pieces and each piece grows into a complete organism. This is known as regeneration.</p>",
    "question_index": 3
  },
  {
    "question": "<p>DNA can be found in which among the following organelles of a cell?</p>",

      "Mitochondria",
      "Plastids",
      "Both 1 &amp; 2",
      "All the above"
    ],
    "correct_option_id": 4,
    "solution": "<p>All these organelles have their own DNA and ribosomes- protein synthesizing organelle. While nucleus and ribosomes are present in both animal and plant cell, Plastids are present only in plant cells.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Leukemia is caused by abnormal production of _________?</p>",
    "options": [
      "White Blood Cells",
      "Red Blood Cells",
      "Plasma",
      "Platelets",
      "Hormones"
    ],
    "correct_option_id": 0,
    "solution": "<p>In leukemia, abnormal blood cells are produced in the bone marrow. Usually, leukemia involves the production of abnormal white blood cells -- the cells responsible for fighting infection. However, the abnormal cells in leukemia do not function in the same way as normal white blood cells.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Which is the filtration unit of kidneys?</p>",
    "options": [
      "Medula",
      "Bladder",
      "Nephron",
      "Cortex",
      "Adrenal Gland"
    ],
    "correct_option_id": 2,
    "solution": "<p>Each capillary cluster in the kidney is associated with the cup-shaped end of a tube that collects the filtered urine. Each kidney has large numbers of these filtration units called nephrons packed close together.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Shape and size of cells are related to __________?</p>",
    "options": [
      "Type of organisms",
      "Function performed by the cells",
      "Nutrients absorbed by the cells",
      "Both 1 &amp; 3",
      "Both 2 &amp; 3"
    ],
    "correct_option_id": 1,
    "solution": "<p>The shape and size of cells are related to the specific function they perform.</p>",
    "question_index": 7
  },
  {
    "question": "<p>ATP- form of energy stands for _________?</p>",
    "options": [
      "Adipose tripotassium",
      "Acetalinide tripotassium",
      "Adenosine tripotassium",
      "Adenosine triphosphate",
      "Adipose triphosphate"
    ],
    "correct_option_id": 3,
    "solution": "<p>Different molecules move in and out of the cell through a type of transport requiring use of energy in the form of ATP. Adenosine triphosphate (ATP) is considered by biologists to be the energy currency of life.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Which among the following pigment is called as respiratory pigment?</p>",
    "options": [
      "Haemoglobin",
      "Cone",
      "Rhodopsin",
      "Lutein",
      "Melanin"
    ],
    "correct_option_id": 0,
    "solution": "<p>In human beings, the respiratory pigment is haemoglobin which has a very high affinity for oxygen. This pigment is present in the red blood corpuscles.</p>",
    "question_index": 9
  },
  {
    "question": "<p>The distance between the pole and the principal focus of a spherical mirror is called as _____?</p>",

      "Principle Axis",
      "Focal Length",
      "Centre of Curvature",
      "Aperture",
      "Radius of curvature"
    ],
    "correct_option_id": 1,
    "solution": "<p>The distance between the pole and the principal focus of a spherical mirror is called the focal length. It is represented by the letter f.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Refraction of light is due to change in which among the following?</p>",
    "options": [
      "Nature of light",
      "Particles of light",
      "Intensity of light",
      "Speed of light",
      "None of the above"
    ],
    "correct_option_id": 3,
    "solution": "<p>Refraction is due to change in the speed of light as it enters from one transparent medium to another.</p>",
    "question_index": 11
  },
  {
    "question": "<p>The SI Unit of electric current is _______?</p>",
    "options": [
      "Ampere",
      "Coulomb",
      "Joules",
      "Power",
      "Newton"
    ],
    "correct_option_id": 0,
    "solution": "<p>The electric current is expressed by a unit called ampere (A), named after the French scientist, Andre-Marie Ampere (1775 - 1836). One ampere is constituted by the flow of one coulomb of charge per second, that is, 1 A = 1 C/1 s.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Which among the following gases is filled in an electric bulb?</p>",

      "Hydrogen",
      "Carbon di oxide",
      "Oxygen",
      "Propane",
      "Nitrogen"
    ],
    "correct_option_id": 4,
    "solution": "<p>The electric bulbs are usually filled with chemically inactive nitrogen and argon gases to prolong the life of filament.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Which among the following converts kinetic energy into electric energy?</p>",

      "Electric generator",
      "Hydro Power Stations",

      "Photovoltaic Cell"

    "correct_option_id": 3,
    "solution": "<p>A wind turbine is a machine for converting the kinetic energy in wind into electrical energy. Moving air (wind) is used to rotate a machine called a turbine. Inside the wind turbine is an electrical generator. It's the electrical generator that transforms the kinetic energy into electrical energy.</p>",
    "question_index": 14
  },
  {

      "Silicon",
      "Boron",
      "Quartz",

      "Lead"
    ],

    "solution": "<p>Photovoltaic cells are solar cells. A photovoltaic cell (PV cell) is a specialized semiconductor diode that converts visible light into direct current (DC). It is made up of silicon.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Which part of eye regulates and controls the amount of light?</p>",

      "Cornea",
      "Retina",
      "Optical Nerve",
      "Pupil"

    "correct_option_id": 4,

    "question_index": 16
  },
  {
    "question": "<p>Acceleration due to earth's gravitational force (g) at north pole will be ________?</p>",

    "correct_option_id": 0,

    "question_index": 17
  },

    "question": "<p>When a hollow block and a solid block of rock of same dimensions are dropped from same height, which among the following can be observed?</p>",
    "options": [
      "Hollow block reaches the ground first",

    "solution": "<p>The acceleration experienced by an object is independent of its mass. This means that all objects hollow or solid, big or small, fall at the same rate. So, both blocks reach at the same time.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Power of which among the following lens is positive?</p>",

    "question_index": 19
  },
  {
    "question": "<p>Which among the following acid is produced by string of bees?</p>",

    "question_index": 21
  },
  {
    "question": "<p>Which among the following is an ore of Copper?</p>",

      "Chalcopyrite",
      "Galena",
      "Sphalerite",
      "Bauxite",

    "question_index": 22
  },

    "question_index": 24
  },

    ],
    "correct_option_id": 0,

    "question_index": 25
  },

  },
  {

    "correct_option_id": 4,
    "solution": "<p>Lead shielding helps protect from radiation because of its high molecular density. Effective at stopping gamma rays and x-rays, lead is used as radiation protection in applications ranging from x-ray imaging and PET rooms to nuclear reactors.</p>",
    "question_index": 27
  },
  {
    "question": "<p>Which among the following is NOT True about tooth decay?</p>",
    "options": [
      "pH of mouth will be lower than 5.5",

      "Bacteria play a major role in decay",
      "Toothpastes are basic in nature",
      "None of the above"

      "Calcium",
      "Magnesium",
      "Sodium",
      "Potassium",
      "Phosphate"
    ],
    "correct_option_id": 2,
    "solution": "<p>While making baking powder, which is a mixture of baking soda (sodium hydrogen carbonate) and a mild edible acid, carbon dioxide is released. Carbon dioxide produced during the reaction causes bread or cake to rise making them soft and spongy, which is proofing of bread.</p>",

  }
