3,661 crore over the next eight years (inflation-adjusted), focused on priority and aspirational districts to improve last-mile connectivity and emergency response.<br><strong>(d) Viability Gap Funding (VGF)</strong><br>Under the Regional Connectivity Scheme, airline operators receive financial support in the form of VGF for operating awarded routes. Recognising the need for longer market development, VGF support to airline operators is proposed amounting to Rs.10,043 crore over 10 years.<br><strong>(e) Atmanirbhar Bharat Aircraft Acquisition</strong><br>To address the shortage of small fixed-wing aircraft and helicopters required for operations in remote and difficult terrains and to advance the Atmanirbhar Bharat vision, the scheme also proposes to procure two HAL Dhruv helicopters for Pawan Hans and two HAL Dornier aircraft for Alliance Air.<br><strong>Background:</strong><br>The original UDAN Scheme was launched in October 2016 with the objective of making air travel affordable and strengthening connectivity to Tier-2 and Tier-3 cities. Over nine years of implementation:<br><ul><br>\t<li>663 routes have been operationalised across 95 airports, heliports and water aerodromes (as on 28 February 2026).</li><br>\t<li>More than 3.41 lakh flights have been operated, carrying 162.47 lakh passengers.</li><br>\t<li>Connectivity has been established in remote, hilly and island regions, boosting tourism, healthcare access and emergency services.</li><br>\t<li>The scheme has fostered growth in regional airlines and diverse fleet operations, laying a strong foundation for the Modified UDAN Scheme.</li><br></ul>",

ith India or where the beneficial owner of an investment into India is situated in or is a citizen of any such country, can invest only under the Government route. Additionally, any transfer of ownership of any existing or future FDI in an entity in India resulting in the beneficial ownership falling within the aforesaid jurisdiction(s) also require Government approval.</li><br>\t<li>Applicability of PN3 restrictions to cases where LBC investors may have only non-strategic, non-controlling interests was seen as adversely affecting investment flows from investors including global funds such as PE/ VC funds.</li><br></ul><br><br><strong>Benefits:</strong><br><br><ul><br>\t<li>It is expected that the new guidelines will provide clarity and ease of doing business in India, and facilitate investments which can contribute towards greater FDI inflows, access to new technologies, domestic value addition, expansion of domestic firms and integration with global supply chain. This would help in leveraging and enhancing India's competitiveness as a preferred investment and manufacturing destination. Increased FDI inflows would supplement domestic capital, support the objectives of Atmanirbhar Bharat, and accelerate overall economic growth.</li><br></ul><br>",

ng requirements and costs. The new mechanism will reduce fund blockage and is expected to be particularly beneficial during index rebalancing periods, when large buy and sell trades coincide.</li><br>\t<li>The regulator has approved a set of measures to ease operational constraints for REITs and InvITs. These include allowing InvITs to continue holding investments in SPVs even after project completion under certain conditions, expanding investment avenues through lower-risk liquid mutual funds, permitting limited exposure to greenfield projects for privately listed InvITs, and providing greater flexibility in borrowings for highly leveraged structures.</li><br>\t<li>SEBI has revised the 'fit and proper person' criteria for intermediaries, clarifying that the mere filing of an FIR or charge sheet will not automatically lead to disqualification. Instead, such cases will be evaluated on a principles-based approach. At the same time, the regulator has tightened norms by expanding disqualification to include convictions for economic offences and ensuring due process through a mandatory opportunity of being heard.</li><br></ul>",

ptions applicable to salaried taxpayers. However, it has doubled the number of cities eligible for 50 per cent exemption.</li><br>\t<li>Under the new rules, eight cities -- Mumbai, Kolkata, Delhi, Chennai, Hyderabad, Pune, Ahmedabad, and Bengaluru -- will qualify for a higher exemption limit of 50 per cent of salary, while all other locations will continue at 40 per cent.</li><br>\t<li>At present, salaried employees in Mumbai, Delhi, Kolkata, and Chennai are allowed to claim HRA exemption of up to 50 per cent of their salary, while those living in other locations are eligible for a lower limit of 40 per cent</li><br>\t<li>The new rules notified seek disclosure of tenant-landlord relationship for claiming I-T deductions and increased responsibility of auditors and companies for tax credit claims on foreign income.</li><br>\t<li>It also entrusts auditors with greater responsibility for checking PAN duplication and tax liability arising out of adverse audit observation.</li><br>\t<li>According to new rules, quoting of Permanent Account Number (PAN) will be mandatory for making cash deposits or withdrawals aggregating to Rs 10 lakh or more in a financial year, in one or more accounts of a person.</li><br>\t<li>Presently, PAN is required for cash deposits exceeding Rs 50,000 during any one day with a banking company or a cooperative bank.</li><br>\t<li>In case of purchase of motor vehicles (including motor cycles), a buyer has to quote his/her PAN if the price exceeds Rs 5 lakh.</li><br>\t<li>The current Income Tax Rules, 1962, do not provide for quoting of PAN for purchase of two-wheelers, while for motor vehicles it was mandatory irrespective of price.</li><br>\t<li>In case of hotel/restaurant bills, payments made to convention centres or banquet halls or a person engaged in event management, PAN will be mandatory if the payment exceeds Rs 1 lakh.</li><br>\t<li>The current I-T Rules specify a Rs 50,000 threshold for quoting PAN in case of hotel/restaurant bills.</li><br>\t<li>In case of purchase or sale or gift or joint development agreement of any immovable property, PAN will be mandatory if the transaction cost is more than Rs 20 lakh, as against the existing limit of Rs 10 lakh.</li><br>\t<li>It also clarifies how the holding period of assets will be calculated in specific cases to determine whether gains are short-term or long-term.</li><br>\t<li>For converted securities such as shares or debentures, the holding period will include the time for which the original instrument -- like bonds, debentures, or deposit certificates -- was held before conversion.</li><br>\t<li>It also entrusts auditors with greater responsibility for checking PAN duplication and tax liability arising out of adverse audit observation.</li><br>\t<li>Spanning an extensive document of 1,000 pages, the rules constitute a highly detailed code comprising several hundred individual rules along with dozens of prescribed forms, reflecting the scale and depth of the new tax framework.</li><br></ul>",

    "options": [

    "correct_option_id": 1,
    "solution": "Government of India has notified the Electricity (Amendment) Rules, 2026, amending Rule 3 of the Electricity Rules, 2005 relating to Captive Generating Plants (CGPs).The amendments aim to remove interpretational ambiguities, improve ease of doing business for industry,and align the captive generation framework with India's energy transition and industrial growth objectives.<br><br>Captive power generation has been a key enabling provision under the Electricity Act, 2003. The National Electricity Policy, 2005 recognised captive generation as an important mechanism for ensuring reliable and cost-effective electricity supply to industry.<br>The <strong>Electricity (Amendment) Rules, 2026</strong> have been introduced to provide greater clarity and flexibility in the framework governing captive power plants so that industries can more easily generate electricity for their own consumption. The amendments seek to align the captive generation regime with modern corporate structures and evolving industrial energy needs, particularly as companies increasingly invest in non-fossil fuel based captive power projects. By clarifying ownership provisions, simplifying rules for group captive arrangements, and establishing a clear verification mechanism, the amendments aim to reduce regulatory ambiguity and disputes. Many provisions in the Rules have been simplified for ease of compliance. New provision has been added to avoid imposition of charges on the captive consumers by the Distribution licensees pending verification of the captive status.   Overall, the amendments are expected to promote ease of doing business, enable industries to access reliable and cost-competitive electricity through captive generation, reduce regulatory ambiguities and disputes, and encourage greater investment in captive and non-fossil fuel based energy projects.<br><strong>Key features of the amendments</strong><br><ol><br>\t<li><strong>Clearly Defined Ownership Requirements</strong>- The definition of ownership has been clarified to include subsidiaries, holding companies and other subsidiaries of the holding company of the entity that establishes the captive generating plant. This clarification recognises modern corporate structures where power assets are often developed through group entities or special purpose vehicles. The amendment ensures that legitimate captive investments by corporate groups are not denied captive status merely due to organisational structuring.</li><br>\t<li><strong>Uniform Verification Period</strong>- Verification of captive status will be undertaken for the entire financial year, ensuring clarity and uniformity in implementation. In cases involving the first or last year of ownership of a captive generating plant, verification may be undertaken for the relevant part of the financial year.</li><br>\t<li><strong>Captive Plants established by Association of Persons (AoP)</strong>- The amendments provide greater flexibility in operation of group captive projects established through an Association of Persons (AoP). Captive users will be able to draw power based on their operational requirements, subject to overall compliance with the statutory ownership and consumption conditions. Consumption exceeding the proportionate entitlement of an individual user will not result in disqualification of captive status for the plant. However, such excess consumption will not qualify as individual captive consumption but will still count towards the collective captive consumption qualifying requirement of the group. Where a member of the AoP holds 26 percent or more ownership, the proportionate consumption requirement will not apply to that entity and its entire consumption will be treated as captive consumption. For the purpose of proportionate consumption calculation, a captive user together with its subsidiaries, holding company and other subsidiaries of the holding company will be treated as a single person.</li><br>\t<li><strong>Nodal Agencies for Captive Status Verification</strong>- With effect from 1st April,2026 the State or Union Territory Governments may designate a nodal agency for verification of captive status in cases of intra-state captive consumption. For inter-state captive consumption, verification will be undertaken by the National Load Despatch Centre (NLDC) . A Grievance Redressal Committee will be constituted by the Appropriate Government to address disputes arising from such  verification decisions .</li><br>\t<li><strong>Treatment of Cross-Subsidy Surcharge and Additional Surcharge</strong>- Pending verification of captive status, Cross-Subsidy Surcharge (CSS) and Additional Surcharge (AS) will not be levied if the captive users submit the prescribed declaration in accordance with the procedures issued by the NLDC (for inter-state cases) or the State nodal agency (for intra-state cases). If a generating plant subsequently fails to qualify as a captive generating plant upon verification, the applicable CSS and AS will become payable along with carrying cost. The carrying cost will be calculated at the base rate of the Late Payment Surcharge under the Electricity (Late Payment Surcharge and Related Matters) Rules, 2022.</li><br>\t<li><strong>Applicability of the Amendments</strong>- To facilitate smooth implementation, certain provisions relating to proportionate consumption in AoP structures, the verification framework, and the treatment of CSS and AS will come into effect from 1st April 2026. Other amendments will take effect immediately.</li><br></ol>",

    "solution": "Govt launches Rs. 20,000 crore credit guarantee scheme to boost MFIs<br>With microfinance institutions (MFIs) facing higher risk provisions and writeoffs, the government launched for them a Rs. 20,000 crore credit-guarantee scheme, aimed at easing liquidity tightness and increasing credit flow.<br><ul><br>\t<li>The scheme will take effect on March 20 and remain active until June 30 or when cumulative-guarantee coverage reaches Rs. 20,000 crore, whichever is earlier.</li><br>\t<li>The scheme's core objective is to provide guarantee coverage to member lending institutions (MLIs), primarily scheduled commercial banks and all-India financial institutions, for loans given to MFIs.</li><br>\t<li>This funding is strictly intended for incremental lending, which is fresh loans to small borrowers in accordance with the Reserve Bank of India's (RBI's) definitions of microfinance, and cannot be used to repay existing debts.</li><br>\t<li>The guarantee structure is designed to favour smaller players, which often face the toughest hurdles in accessing bank credit. </li><br>\t<li>The National Credit Guarantee Trustee Company (NCGTC) will cover the \"Amount in Default\" (principal plus interest) based on the MFI's size. For small MFIs, with assets under management (AUM) of less than Rs. 500 crore, it provides 80 per cent guarantee cover.</li><br>\t<li>Similarly, guarantee cover of 75 per cent will be provided for medium-sized MFIs with assets between Rs. 500 crore and Rs. 2,000 crore. And 70 per cent coverage will be given for large MFIs with AUM of Rs. 2,000 crore or more.</li><br>\t<li>The Microfinance Industry Network (MFIN), the other of the two SROs, expects the scheme to catalyse bank lending by restoring lender confidence, improving credit flow, and supporting sustainable sectoral growth, particularly for small and medium MFIs, which saw a dip of about 70 per cent in bank funding between the fourth quarter (Q4) of 2023-24 and Q3 2025-26.</li><br>\t<li>The interest rate on loans sanctioned by banks to MFIs has been capped at the external benchmark lending rate (EBLR) or the one-year marginal cost of lending rate plus 2 per cent per annum.</li><br>\t<li>MFIs are required to pass on these benefits by ensuring their lending rate to small borrowers is at least 1 per cent below their average lending rate over the past six months.</li><br>\t<li>To prevent fund concentration, MLIs have been asked to ensure that at least 5 per cent of their loans under the scheme are sanctioned to small MFIs and 10 per cent to medium-sized ones.</li><br>\t<li>Operational guidelines set a maximum loan tenure of three years, including a one-year moratorium on interest, followed by two years for repayment.</li><br>\t<li>Lending limits have been pegged to the MFI's size. By this, loans are capped at 20 per cent of the institution's AUM, subject to a maximum of Rs. 100 crore for small MFIs, Rs. 200 crore for medium ones, and Rs. 300 crore for those that are large.</li><br>\t<li>MLIs are required to pay the NCGTC a guarantee fee set at 0.5 per cent of the sanctioned amount in the first year and 0.5 per cent of the outstanding amount thereafter.</li><br>\t<li>The guidelines lay emphasis on accountability and creating fresh assets. MFIs must utilise the financial assistance for fresh loan assets within three months of disbursement and maintain a separate account for credit facilities extended under the scheme. </li><br>\t<li>If an MFI account is classified as a non-performing asset (NPA), the MLI can submit a claim for the defaulted amount annually.</li><br></ul>",

    "correct_option_id": 4,
    "solution": "The Ministry of Environment, Forest and Climate Change (MoEFCC), in collaboration with the National Biodiversity Authority (NBA), has submitted India's First National Report (NR1) on the implementation of the Nagoya Protocol on Access to Genetic Resources and the Fair and Equitable Sharing of Benefits Arising from their Utilization (ABS), to the Secretariat of the Convention on Biological Diversity (CBD) on 27th February 2026, in accordance with Article 29 of the Protocol on Monitoring and Reporting.<br><ul><br>\t<li>The report covers the period from 1 November 2017 to 31 December 2025 and highlights India's progress in implementing the Nagoya Protocol while contributing to Target 13 of India's updated National Biodiversity Strategy and Action Plan (NBSAP). India had earlier submitted its Interim National Report in November 2017.</li><br>\t<li>India's ABS framework operates under the Biological Diversity Act, 2002, supported by the Biological Diversity Rules, 2024 and the ABS Regulations, 2025, through a three-tier institutional structure comprising the National Biodiversity Authority, State Biodiversity Boards/Union Territory Biodiversity Councils, and Biodiversity Management Committees (BMCs) at the local level. More than 2,76,653 BMCs have been established across the country, strengthening community participation in biodiversity governance and benefit-sharing mechanisms.</li><br>\t<li>During the reporting period (2017\"2025), India issued 12,830 ABS approvals, including 5,913 approvals by the NBA for entities under Section 3(2) of the Biological Diversity Act covering research, bio-survey, commercial utilisation, transfer of research results, intellectual property rights and third-party transfers, and 6,917 approvals by SBBs/UTBCs for Section 7 entities for commercial utilisation of biological resources. India has also published 3,556 Internationally Recognised Certificates of Compliance (IRCCs) on the ABS Clearing-House, in accordance with Article 17 of the Nagoya Protocol, representing over 60% of the global total and demonstrating India's leadership in transparency and compliance.</li><br>\t<li>Implementation of the ABS framework has generated significant benefits. During the reporting period, ₹216.31 crore (USD 28.04 million) was mobilised through NBA approvals, of which ₹139.69 crore (USD 16.83 million) has been disbursed to benefit claimers, including BMCs, local communities, farmers and traditional knowledge holders, supporting biodiversity conservation and livelihoods. In addition, ₹51.96 crore (USD 6.56 million) was generated through approvals granted by SBBs/UTBCs for commercial utilisation by Indian entities under Section 7 of the Act. Furthermore, 395 NBA approvals incorporated non-monetary benefits, including capacity building, training, technology transfer and collaborative research.</li><br>\t<li>In line with the Nagoya Protocol, India also monitors the utilisation of foreign-sourced biological resources and associated traditional knowledge and 41 declarations were received by NBA in Form 10 for use of foreign bioresources as required under Rules 18 of the BD rules, 2024 and Section 36A of the BD Act, 2002.  </li><br>\t<li>India has also undertaken extensive awareness and capacity-building initiatives to strengthen ABS implementation. A total of 2,56,393 individuals were trained through 3,724 workshops and programmes, alongside over 600 capacity-building initiatives nationwide. </li><br>\t<li>With a strong legal framework, robust institutions and active community participation, India has emerged as a global leader in implementing the Nagoya Protocol. </li><br></ul>",

stem, enabling higher train loads, improved speed potential, and greater operational reliability on this high-density corridor.</li><br>\t<li>Located on the busy Mumbai\"Chennai route, the upgrade will strengthen power supply capacity, facilitating smoother freight movement and faster passenger services, including Vande Bharat trains. The project will contribute to Indian Railways' mission of achieving 3,000 MT freight loading while enhancing overall network efficiency.</li><br>\t<li>The work forms part of a nationwide programme included in the 2024\"25 Railway Budget aimed at modernising electric traction systems across Indian Railways.</li><br></ul><br><br><strong>Provision of OFC Communication Backbone in Vadodara and Mumbai Divisions</strong><br><br><ul><br>\t<li>Indian Railways has sanctioned ₹187.88 crore for strengthening the communication backbone in Vadodara and Mumbai Central Divisions of Western Railway.</li><br>\t<li>The project provides for installation of a 4×48 core Optical Fibre Cable (OFC) backbone architecture, ensuring enhanced bandwidth, network redundancy, and reliable support for LTE-based Kavach and other critical railway communication systems. This upgrade will strengthen the digital infrastructure required for the implementation of Kavach, the indigenous train collision avoidance system.</li><br>\t<li>Under this work, optical fibre cables will be laid over 1,000 route kilometres, including 692 km in Vadodara Division and 308 km in Mumbai Division.</li><br>\t<li>The project is part of a larger nationwide programme included in the 2024\"25 Railway Budget aimed at expanding Kavach and modernising railway communication systems across the network.</li><br></ul><br>",

nt, out of 19.36 crore rural households identified by the States/UTs in the country, around 15.80 crore (81.61%) households are reported to have tap water connections as on date.</li><br>\t<li>Beyond the physical achievements, impacts of JJM have been assessed by reputed national and international institutions/ individuals. SBI Research reported that JJM has freed 9 crore women from fetching water, enabling greater participation in other economic activities. World Health Organisation (WHO) estimated reduction in women drudgery by saving of 5.5 crore hours daily, prevention of 400,000 diarrheal deaths, and savings of 14 million Disability Adjusted Life Years (DALYs). Nobel laureate Prof. Michael Kremer estimated a potential of 30% reduction in under-five mortality, saving 1,36,000 lives annually; IIM Bangalore & International Labour Organisation (ILO) estimated generation of 59.9 lakh direct and 2.2 crore indirect person-years of potential employment, strengthening rural livelihoods through JJM. Women and the girl child have emerged as the principal beneficiaries of this intervention, with substantial gains in terms of reduced drudgery, improved health and hygiene, enhanced dignity, and greater opportunities for education and livelihood activities.</li><br></ul>",

ortunities.</li><br>\t<li>Signing of the Voluntary Guiding Principles for Resilient, Innovative and Efficient AI, endorsed by over 20  countries.</li><br>\t<li>Signing of the Voluntary Guiding Principles for Reskilling in the Age of AI, endorsed by 23 countries.</li><br>\t<li>Adoption of the Charter for the Democratic Diffusion of AI, supported by 22 countries and international institutions.</li><br>\t<li>Launch of the Resilient AI Challenge in partnership with UNESCO and France.</li><br>\t<li>Release of the Playbook for Advancing Resilient AI Infrastructure.</li><br>\t<li>Announcement of the Trusted AI Commons, with 22 partner countries prior to formal launch.</li><br>\t<li>Release of Guidance Notes on AI Governance, endorsed by 22 countries.</li><br>\t<li>Announcement of the Alliance for Advancing Inclusion Through AI, endorsed by 20 countries and UNICEF.</li><br>\t<li>Launch of the Network of AI for Science Institutions, with 19 partner countries at inception.</li><br></ul><br><strong>AI Impact Expo, Knowledge Outputs and Grassroots Adoption</strong><br>The AI Impact Expo emerged as one of the largest AI exhibitions globally, with over 850 exhibitors across 10 thematic pavilions.<br>At Bharat Mandapam, New Delhi, a live demonstration was conducted of an open-sourced handheld assistive device capable of visually recognising objects and environments based on voice queries and responding in multiple languages. The prototype, developed by BHASHINI and Current AI, was opened to the startup ecosystem for further technical enhancement and use-case development.<br>Six global casebooks documenting high-impact AI deployments were released, covering:<br><ul><br>\t<li>AI in Health (with WHO)</li><br>\t<li>AI in Energy (with IEA)</li><br>\t<li>AI in Gender Empowerment (with UN Women)</li><br>\t<li>AI in Agriculture (with the Government of Maharashtra, supported by the World Bank)</li><br>\t<li>AI in Education (with CSF and EkStep Foundation)</li><br>\t<li>AI in Accessibility     "solution": "The Ministry of Women and Child Development is implementing Centrally Sponsored Schemes in the country for the welfare of women and children, which are placed under three verticals, viz.<br>(1) Mission Shakti, for safety, protection and empowerment of women; (2) Saksham Anganwadi & Poshan 2.0 for improving nutrition & health indicators in the country; and (3) Mission Vatsalya, for protection and welfare of children in difficult circumstances.<br><strong>(1) Mission Shakti</strong>: The 'Mission Shakti' aims at strengthening interventions for women's safety, security and empowerment. It seeks to focus on proposing strategies for improving convergence across Ministries/ Departments and at different levels of governance. Mission Shakti comprises of two sub-schemes 'Sambal' and 'Samarthya' for safety and security of women and empowerment of women respectively.<br><ul><br>\t<li>The \"Sambal\" sub-scheme is for safety and security of women. It has the components of One Stop Centres (OSCs), Women Helpline (WHL), Beti Bachao Beti Padhao (BBBP) and Nari Adalat.</li><br>\t<li>The \"Samarthya\" sub scheme is for empowerment of women. It has the components of Pradhan Mantri Matru Vandana Yojana (PMMVY), Shakti Sadan, Sakhi Niwas, Palna and SANKALP: Hub for Empowerment of Women (HEW). It is a demand driven Centrally Sponsored sub scheme, under which funds are released to the States/UTs for implementation of various components.</li><br>\t<li>Further<strong>, </strong>SANKALP: HEW (Hub for Empowerment of Women) functions as a Project Monitoring Unit (PMU) for all components of Mission Shakti. It serves as a single window system to bridge the information and knowledge gap regarding schemes and facilities available for women as well as guide them to avail the benefits and entitlements.</li><br>\t<li>Hub for Empowerment of Women (HEW) known as SANKALP: HEW (Supportive Action for Nurturing and Knowledge-Based Advancement, Last-Mile Delivery and Potential Realization o
