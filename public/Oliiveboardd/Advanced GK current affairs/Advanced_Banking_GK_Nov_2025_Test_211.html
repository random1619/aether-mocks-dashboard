  {
    "question": "<p>The Reserve Bank of India (RBI) recognised the Self-Regulated PSO Association (SRPA) as a self-regulatory body for the payment system operators (PSO) sector. The body said more PSOs have initiated their membership process and are expected to join the association after formal approval from the RBI. As of November 2025, members of the SRPA include(s) which among the following?</p><p>I. Infibeam Avenues</p><p>II. BillDesk</p><p>III. Razorpay</p><p>IV. Paytm</p><p>V. OxyMoney</p><p>VI. BharatPay</p>",
    "options": [
      "II, III and V Only",
      "I, IV and VI Only",
      "I, III, V and VI Only",
      "V and VI Only",
      "I, II, III and V Only"
    ],
    "correct_option_id": 4,
    "solution": "<p>The Reserve Bank of India (RBI) recognised the Self-Regulated PSO Association (SRPA) as a self-regulatory body for the payment system operators (PSO) sector. The body said more PSOs have initiated their membership process and are expected to join the association after formal approval from the RBI.</p><p>&#183; At present, members of the SRPA include Infibeam Avenues (CC Avenue), BillDesk, Razorpay, PhonePe, CRED, Mobikwik, Mswipe, Euronet, Spice Money, Payworld, Unimoni, Open, In Solutions Global, Payglocal, Zokudo, SabPaisa, OxyMoney, and Concerto Software &amp; Systems. PSOs are entities authorised by the RBI to set up, operate, and manage payment systems in the country.</p><p>&#183; These systems enable the transfer of funds between individuals, businesses, and financial institutions through various modes such as cards, wallets, and digital payment platforms. An SRO is a non-governmental organisation that sets and enforces rules and standards relating to the conduct of member entities in the industry, with the aim of protecting consumers.</p><p>&#183; The RBI granted SRO status to the Fintech Association for Consumer Empowerment in the fintech space and the Finance Industry Development Council in the non-banking financial company sector. </p><p>&#183; Sa-Dhan and MFIN operate as SROs for the microfinance industry, while the Fixed Income Money Market and Derivatives Association of India (FIMMDA) serves as the SRO for financial markets.</p>",
    "question_index": 0
  },
  {
    "question": "<p>In November 2025, the Securities and Exchange Board of India (Sebi) proposed a fix for the long-standing challenges around locking in pre-IPO pledged shares and replacing the abridged prospectus with a simplified document summary. Which among the following statement(s) is/are correct in context of this?</p><p>I. Under current ICDR norms, pre-issue shareholding ' other than promoters ' must be locked in for nine months post-IPO.</p><p>II. Issuers would also be required to amend their Articles of Association to ensure that, upon pledge invocation or release.</p><p>III. The regulator has proposed enacting these changes by amending the Issue of Capital and Disclosure Requirements (ICDR) Regulations, 2018.</p>",
    "options": [
      "III Only",
      "I and II Only",
      "II and III Only",
      "II Only",
      "I Only"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Securities and Exchange Board of India (Sebi) proposed a fix for the long-standing challenges around locking in pre-IPO pledged shares and replacing the abridged prospectus with a simplified document summary.</p><p>In a consultation paper, the regulator has proposed enacting these changes by amending the Issue of Capital and Disclosure Requirements (ICDR) Regulations, 2018.</p><p>Under current ICDR norms, pre-issue shareholding ' other than promoters ' must be locked in for six months post-IPO. However, depositories are unable to create lock-in when shares are pledged, creating last-minute compliance hurdles for issuers, especially in companies with numerous or untraceable shareholders.</p><p>&#183; To address this, Sebi has proposed allowing depositories to mark such pledged shares as 'non-transferable' for the duration of the lock-in period, based on instructions from the issuer.</p><p>&#183; Issuers would also be required to amend their Articles of Association to ensure that, upon pledge invocation or release, the shares automatically continue under the required lock-in in the pledgee's or pledger's account. The regulator said NBFCs that lend against unlisted shares have concurred with the proposed framework.</p><p>&#183; The market regulator has also proposed eliminating the mandatory abridged prospectus ' currently required to accompany every IPO application ' and replacing it with a standardised 'offer document summary'.</p><p>&#183; The summary would be submitted along with the draft offer document and hosted separately on the websites of Sebi, stock exchanges, the issuer, and lead managers. It would contain focused, retail-friendly disclosures, including business and industry summaries, key risks, financial highlights, top litigation, and promoter information.</p><p>&#183; The move follows concerns that voluminous offer documents deter retail investors from meaningful review, leading many to instead rely on unverified grey-market or social media cues.</p>",
    "question_index": 1
  },
  {
    "question": "<p>In November 2025, the Sixteenth Finance Commission (XVIFC) was constituted by the Hon'ble President of India in pursuance of clause (1) of article 280 of the Constitution. Identify which among the following statements is/are NOT correct in context of the XVIFC?</p><p>I. The XVIFC is headed by Chairman Dr. Arvind Panagariya.</p><p>II. As per the terms of reference (ToR), the XVIFC was mandated to give its report covering a period of five years commencing on the 1st day of April, 2026.</p><p>III. This report has been organised in two volumes where Volume I contains the recommendations as per the TOR and the accompanying annexures are in Volume II.</p>",
    "options": [
      "I and III Only",
      "II Only",
      "I Only",
      "III Only",
      "All statements are correct"
    ],
    "correct_option_id": 4,
    "solution": "<p>The Sixteenth Finance Commission (XVIFC) was constituted by the Hon'ble President of India in pursuance of clause (1) of article 280 of the Constitution.</p><p>The XVIFC, headed by Chairman Dr. Arvind Panagariya, submitted its Report today to the Hon'ble President of India. Members of the XVIFC, Smt. Annie George Mathew, Dr. Manoj Panda, Shri T. Rabi Sankar and Dr. Soumyakanti Ghosh and the Secretary to the XVIFC Shri Ritvik Pandey accompanied the Chairman.</p><p>Thereafter, the XVIFC also presented a copy of the report to the Prime Minister and to the Union Finance Minister.</p><p>&#183; As per the terms of reference (ToR), the XVIFC was mandated to give its report covering a period of five years commencing on the 1st day of April, 2026 making recommendations on the distribution of the net proceeds of taxes between the Union and the States,</p><p>&#183; as well as the allocation between the States of the respective shares of such proceeds, grants-in-aid to States, review arrangements on financing Disaster Management initiatives, etc.</p><p>&#183; Accordingly, during its tenure, the XVIFC analysed the finances of the Union and States in detail and has come up with a report after wide-ranging consultations with the Union Government,</p><p>&#183; State Governments, Local Governments at different tiers, Chairpersons and Members of previous Finance Commissions, academic institutions of eminence, multi-lateral institutions, Advisory Council to the Commission, and other domain experts.</p><p>&#183; This report has been organised in two volumes where Volume I contains the recommendations as per the TOR and the accompanying annexures are in Volume II.</p><p>&#183; The report shall be available in the public domain once it is tabled in the Parliament by the Union Finance Minister under Article 281.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Markets regulator SEBI on November 24, 2025 proposed a review of the facility for 'Basic Services Demat Account' (BSDA) to improve financial inclusion, suggesting that Zero Coupon Zero Principal (ZCZP) bonds should be excluded from the portfolio value calculation used to determine BSDA eligibility. Which statement is not correct in the context of this?</p>",
    "options": [
      "The facility was introduced by SEBI in 2010 for reducing the burden of demat charges on investors with small portfolios.",
      "A basic service demat account, or BSDA, is a more basic version of a regular demat account.",
      "SEBI has proposed that 'ZCZP bonds shall not be considered while calculating the value of holding for the purpose of determining eligibility of demat accounts as BSDA'.",
      "This proposal supports the twin objectives of ease of investment and ease of doing business.",
      "All of the above are correct"
    ],
    "correct_option_id": 0,
    "solution": "<p>Markets regulator SEBI on November 24, 2025 proposed a review of the facility for 'Basic Services Demat Account' (BSDA) to improve financial inclusion, suggesting that Zero Coupon Zero Principal (ZCZP) bonds should be excluded from the portfolio value calculation used to determine BSDA eligibility.</p><p>The proposal, if implemented, would support the twin objectives of ease of investment and ease of doing business, the Securities and Exchange Board of India (SEBI) said in its consultation paper.</p><p>&#183; A basic service demat account, or BSDA, is a more basic version of a regular demat account. The facility was introduced by SEBI in 2012 for reducing the burden of demat charges on investors with small portfolios.</p><p>&#183; The regulator explained that ZCZP bonds are fundamentally distinct from conventional securities held in a demat account because they are non-transferable, non-tradable, and do not provide any monetary return or redemption value to the holder. Their economic value is closer to a social contribution or donation made by the investor rather than an investment asset capable of appreciation, liquidation, or portfolio enhancement.</p><p>&#183; Since BSDA eligibility is based on the realisable value of an investor's holdings, counting ZCZP bonds, whose value cannot be encashed or traded, may artificially inflate a portfolio and make an investor ineligible for BSDA benefits, it added.</p><p>&#183; Accordingly, SEBI has proposed that 'ZCZP bonds shall not be considered while calculating the value of holding for the purpose of determining eligibility of demat accounts as BSDA'.</p><p>&#183; The regulator has also proposed treating delisted securities on par with suspended securities, as both lack active trading, liquidity, and transparent price discovery. Excluding delisted securities from the BSDA valuation would ensure consistency and fairness, especially for investors whose holdings do not represent realisable market value.</p><p>&#183; For illiquid securities, SEBI noted that while they are not actively traded, they remain listed and can still be traded through specific mechanisms. Accordingly, it has been suggested that the last closing price of such securities be used when determining BSDA eligibility.</p><p>&#183; To promote ease of doing business for Depository Participants (DPs), SEBI proposed that DPs reassess the BSDA eligibility of existing beneficial owners on a quarterly basis, ensuring system-driven and uniform evaluations across all DPs. It also recommended allowing BO consent to be submitted through additional authenticated digital methods, instead of restricting it to the registered email ID.</p>",
    "question_index": 3
  },
  {
    "question": "<p>In November 2025 the Fixed Income Money Market and Derivatives Association of India (FIMMDA) proposed the settlement framework and market conventions for a new Overnight Indexed Swap (OIS) product using the secured overnight rupee rate (SORR) as the floating rate benchmark. Identify which of the following statements is/are correct in context of this proposal?</p>",
    "options": [
      "The SORR-OIS will have a T+1 start date and can be traded both between banks as well as between banks and their clients.",
      "FIMMDA has proposed that the notional amount and maturity of the swap will be mutually agreed, with a minimum interbank notional of Rs 1 crore.",
      "As per the FIMMDA, Standard interbank tenors will range from one month to nine months, and one year to ten years.",
      "For swaps beyond 6 months, settlement will be semi-annual, with net cash flows exchanged bilaterally or through the CCIL.",
      "Trading hours for the swap product will be 9:00 am to 6:00 pm from Monday to Saturday."
    ],
    "correct_option_id": 0,
    "solution": "<p>The Fixed Income Money Market and Derivatives Association of India (FIMMDA) proposed the settlement framework and market conventions for a new Overnight Indexed Swap (OIS) product using the secured overnight rupee rate (SORR) as the floating rate benchmark. The association has invited feedback on the proposal by December 15.</p><p>The SORR-OIS will be a standard interest rate swap, with SORR as the floating rate, observed daily, compounded and paid at an agreed frequency, similar to the existing Mumbai inter-bank offered rate (MIBOR) OIS product.</p><p>&#183; The SORR-OIS will have a T+1 start date and can be traded both between banks as well as between banks and their clients. Trading hours for the swap product will be 9:00 am to 5:00 pm, Monday to Friday. For swaps maturing within one year, the net difference between fixed and floating legs will be settled annually or at maturity. For swaps beyond one year, settlement will be semi-annual, with net cash flows exchanged bilaterally or through the Clearing Corporation of India (CCIL).</p><p>&#183; FIMMDA has proposed that the notional amount and maturity of the swap will be mutually agreed, with a minimum interbank notional of Rs 5 crore. Standard interbank tenors will range from one month to nine months, and one year to ten years.</p><p>&#183; The Reserve Bank of India's MIBOR committee, in a report published on October 1, 2024, had suggested that the Financial Benchmarks India Limited (FBIL) may develop and publish a benchmark based on the secured money market. Later, based on the recommendations of the MIBOR committee and the feedback received, and aligned with market dynamics, it was proposed to establish SORR, a secured money market-based benchmark, encompassing both basket repo and triparty repo (TREP).</p><p>&#183; From July 7, the FBIL had started publishing the rate on its website.</p>",
    "question_index": 4
  },
  {
    "question": "<p>According to the Reserve Bank's census on foreign liabilities and assets of Indian direct investment entities, released in November 2025, the U.S. and Singapore together accounted for over one-third of the FDI in India during 2024-25. In the case of the Overseas Direct Investment (ODI), which among the following countries were the top destination?</p>",
    "options": [
      "USA, UK, Singapore",
      "Singapore, Mauritius, Netherland",
      "UK, Brazil, USA",
      "Australia, UAE, USA",
      "UAE, USA, Singapore"
    ],
    "correct_option_id": 0,
    "solution": "<p>The U.S. and Singapore together accounted for over one-third of the FDI in India during 2024-25, according to the Reserve Bank's census on foreign liabilities and assets of Indian direct investment entities.</p><p>The Central bank released the provisional results of the 2024-25 round of the annual census on foreign liabilities and assets (FLA) covering cross-border liabilities and assets of the Indian entities.</p><p>&#183; Out of the 45,702 entities which responded in the latest census, 41,517 reported foreign direct investment (FDI) and/or overseas direct investment (ODI) in their balance sheet for March 2025, RBI said.</p><p>&#183; Of these entities, 33,637 had also reported in the previous census round, and 7,880 have newly reported in the current round.</p><p>&#183; Over three-fourths of the companies that reported inward direct investment were subsidiaries of foreign companies (single foreign investor holding more than 50% of total equity).</p><p>&#183; \"The United States and Singapore together accounted for over one-third of the FDI in India; other top sources included Mauritius, the United Kingdom and the Netherlands,\" it said.</p><p>&#183; <b>In the case of ODI, Singapore, the United States, and the United Kingdom were the top destinations.</b></p><p>&#183; <b>Of the total FDI during 2024-25 was '68,75,931 crore, the share of the U.S. was 20%, followed by Singapore (14.3%), Mauritius (13.3%), the U.K. (11.2%) and the Netherlands (9%).</b></p><p>&#183; The manufacturing sector accounted for the highest share of total FDI equity capital at market value (48.4%) as well as at face value (37.8%). The services sector was the second-highest shareholder in total FDI equity capital at market value.</p><p>&#183; The FDI was at '61,88,243 crore in the preceding year.</p><p>&#183; In case of outward direct investment ('11,66,790 crore), the share of Singapore was 22.2%, followed by the U.S. (15.4%), the U.K. (12.8%) and the Netherlands (9.6%) during 2024-25.</p><p>&#183; The RBI further said more than 97% of the responding DI entities were unlisted in March 2025, and that captured most of the FDI equity capital in India.</p><p>&#183; Non-financial companies held 90.5% of the FDI equity at face value.</p><p>&#183; In terms of market value, the growth of ODI (17.9%) outpaced the growth of FDI (11.1%) in India, in rupee terms, during 2024-25. As a result, the ratio of inward to outward DI stood at 5.9 times in March 2025 as compared to 6.3 times a year ago.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Identify which among the following statement(s) is/are correct as per the data released by the different rating agencies in November 2025?</p><p>I. ICRA forecast the gross NPAs rise marginally in FY26 but stay within a comfortable range of 2.1'2.3 per cent.</p><p>II. According to the IEA's World Energy Outlook 2025, India's energy demand, growing at an annual rate of 3 per cent through 2035.</p><p>III. India Ratings &amp; Research has projected India's GDP to expand by 7.2% in the second quarter (July-September) of FY26.</p>",
    "options": [
      "I and III Only",
      "II Only",
      "III Only",
      "I Only",
      "I, II and III"
    ],
    "correct_option_id": 4,
    "solution": "<p><b>ICRA Projections: - </b></p><p>&#183; ICRA upgrades bank credit growth estimates on GST reforms with improved demand in retail and micro, small and medium enterprise (MSME) segments after Goods and Services Tax (GST) rationalisation, rating agency ICRA said banks in India are expected to lend an additional Rs 50,000 crore, taking total credit expansion to Rs 19.5'21 trillion in the current financial year (FY26)</p><p>&#183; The robust offtake in the first half was driven by partial upfronting of demand from the third quarter (Q3 FY26) to the second quarter (Q2 FY26), given the early onset of the festive season supported by GST cuts. As a result, the incremental credit offtake in the second half(H2 FY26), at Rs 9.4-10.9 trillion, is expected to be flattish relative to the level in the (H1 FY26)</p><p>&#183; Both public and private banks are expected to maintain comfortable solvency and asset quality metrics, though a slight rise in credit cost is anticipated in the second half (H2 FY26). The fresh non-performing asset (NPA) generation rate for the full year is expected to be slightly higher than that seen in FY25.</p><p>&#183; Consequently, gross NPAs are forecast to rise marginally in FY26 but stay within a comfortable range of 2.1'2.3 per cent. This would translate into a modest increase in credit costs to about 0.7 per cent in FY26 for the sector, from 0.6 per cent seen in the recent past.</p><p><b>India Ratings &amp; Research Projections: - </b></p><p>&#183; India Ratings &amp; Research has projected India's GDP to expand by 7.2% in the second quarter (July-September) of FY26, driven primarily by strong private consumption and a resilient services sector. The Indian economy had recorded a 5.6% growth in Q2 of FY25, while it clocked 7.8% growth in the April'June quarter of the current fiscal, the fastest pace in five quarters.</p><p>&#183; Ind-Ra estimates private consumption to have grown 8% year-on-year in Q2 FY26, compared to 7% in Q1 and 6.4% in Q2 FY25. A favourable base effect, record low inflation, and steady rural wage growth are seen as major contributors to this uptick.</p><p>&#183; On the investment front, the agency said demand grew 7.5% year-on-year during Q2 FY26, with steady government capital expenditure playing a key role in sustaining momentum amid global uncertainty.</p><p><b>IEA's World Energy Outlook 2025: - </b></p><p>&#183; According to the IEA's World Energy Outlook 2025, by 2035, India will not only become the epicentre of global oil demand growth, surpassing China, but will also solidify its position as the leading exporter of transport fuels. On the flip side, import dependence of the world's third largest crude oil importer will rise to a whopping 92 per cent by 2035.</p><p>&#183; According to the IEA's World Energy Outlook 2025, India's energy demand, growing at an annual rate of 3 per cent through 2035, is the highest globally, which is supported by growing demand from households and industries. Oil and natural gas demand will increase 16 per cent by 2035 and continue to rise through to 2050.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Union Minister of State, Ministry of Fisheries, Animal Husbandry and Dairying, Shri George Kurian launched the Marine Fisheries Census (MFC) 2025 Household Enumeration and the VYAS ' BHARAT and VYAS- SUTRA app in Kochi, in November 2025. Identify the INCORRECT statement(s) in context of the MFC 2025?</p><p>I. The fourth edition of the Marine Fisheries Census will cover over 1.2 million households across 5,000 marine fishing villages.</p><p>II. The core household data collection is scheduled for an extended period of 45 days, from 3 November to 18 December 2025.</p><p>III. The entire enumeration of approximately 1.2 million fisher households across 5,000 villages/habitations in 13 coastal States and Union Territories will be fully digital and paperless.</p>",
    "options": [
      "I Only",
      "III Only",
      "I and III Only",
      "II and III Only",
      "II Only"

    "correct_option_id": 0,
    "solution": "<p>Union Minister of State, Ministry of Fisheries, Animal Husbandry and Dairying, Shri George Kurian launched the Marine Fisheries Census (MFC) 2025 Household Enumeration and the VYAS ' BHARAT and VYAS- SUTRA app in Kochi. The launch of MFC 2025 marks a complete and historic digital transformation of the national enumeration process.</p><p>Moving entirely from conventional paper-based methods, it is poised to generate the most comprehensive, granular, and geo-referenced national database to date, laying a robust foundation for evidence-based planning. S</p><p><b>MFC 2025: Historic Digital Leap and Tech Focus to Power Fisher folk Welfare</b></p><p>&#183; <b>Paradigm Shift: Fully Digital and Geo-Referenced Census</b>: The MFC'2025 represents a dramatic leap forward from its predecessors (e.g., 2005, 2010, 2016). The entire enumeration of approximately 1.2 million fisher households across 5,000 villages/habitations in 13 coastal States and Union Territories, including the Andaman &amp; Nicobar Islands and Lakshadweep, will be fully digital and paperless.</p><p>&#183; <b>Enumeration Period</b>: The core household data collection is scheduled for an extended period of 45 days, from 3 November to 18 December 2025.</p><p>&#183; <b>Digital Architecture</b>: The process is powered by a suite of custom-made, multilingual Android applications' <b>VyAS'NAV</b>(for validation of fishing villages and harbours), <b>VyAS'BHARAT</b>(household and infrastructure enumeration) and <b>VyAS'SUTRA</b>(for real-time supervision and monitoring of households and enumerators) developed by the nodal agency, the ICAR-Central Marine Fisheries Research Institute (CMFRI).</p><p>&#183; <b>Efficiency and Accuracy: </b>This digital approach enables real-time, geo-referenced data collection, eliminating manual errors and significantly accelerating data processing.</p><p>&#183; <b>Supervision and Oversight: </b>The entire operation is monitored through multi-tier web dashboards and a supervisory app, ensuring real-time progress tracking, data accuracy, and accountability across all levels of census management.</p><p>&#183; <b>Comprehensive Preparations and Tech Integration: </b>The preparatory phase for the MFC'2025 has been extensive, including pre-census workshops and high-level coordination meets, such as the Coastal States Fisheries Meet 2025. A crucial National Workshop for final operational strategy and coordination held at the ICAR'CMFRI in Kochi. Parallel to the census, the Department of Fisheries and CMFRI are championing the adoption of drone technology to enhance transparency and efficiency in marine fisheries data collection. Drones have been deployed to conduct aerial enumeration of fishing crafts during trawl ban periods. This includes major harbours on the East Coast-Vizag, Kakinada, and Tuticorin (April to June)'and key landing centres on the West Coast' Mangaluru, Beypore, and Puthiyappa (June to July). Crafts of various types (mechanised, motorized' onboard, and motorized' outboard) were counted using drone-based aerial shots, serving as a neutral and verifiable source to support ground-level data collection.</p><p>&#183; <b>Granular Data for Targeted Welfare:</b>The scope of the MFC'2025 has been significantly expanded to capture a deep, granular understanding of the socio-economic status of the coastal population, ensuring future government interventions are more precise and impactful.</p><p>&#183; <b>Expanded Socio-economic Data:</b>For the first time, the enumeration includes detailed information on crucial indicators like total family income, homeownership, outstanding liabilities, and sources of credit.</p><p>&#183; <b>Focus on Vulnerability:</b>Vital data will be gathered on insurance status, major losses or disabilities, the specific socio-economic impacts of the COVID-19 pandemic on fisher families, and the receipt of benefits from schemes like PMMSY/PM-MKSSY.</p><p>&#183; <b>Institutional Mapping:</b>New schedules focusing on Fish Farmer Producer Organizations (FFPOs) and Self-Help Groups (SHGs) are introduced to facilitate collectivization and strengthen the value chain.</p><p><b>Background: - </b></p><p>&#183; The National Marine Fisheries Census 2025 (MFC 2025), a coast-wide activity fully funded by the Department of Fisheries, Government of India, and ICAR-Central Marine Fisheries Research Institute (CMFRI) as the nodal agency and Fishery Survey of India (FSI) as the operational partner. </p><p>&#183; <b>The fifth edition of the Marine Fisheries Census will cover over 1.2 million households across 5,000 marine fishing villages.</b> The hallmark of this activity is household-level enumeration of fishers, fishing crafts, gears, and infrastructure across 1,200+ landing centres, 50 fishing harbours, jetties, markets, and processing plants with the help of specially designed mobile-based applications. MFC 2025, whose slogan is 'Smart Census, Smarter Fisheries' will facilitate better targeting of the PM-MKSSY allocations and infrastructure upgrades. </p><p>&#183; This wealth of new information will be the evidentiary bedrock for refining welfare programs and designing targeted, climate-resilient, and inclusive development strategies for the fishing community. The MFC'2025 is truly setting a new benchmark for data-driven fisheries governance in India and will help in community-led growth, fostering entrepreneurship among women and youth in coastal ecosystems.</p>",

    "question": "<p>National Social Assistance Programme (NSAP) is a fully funded Centrally Sponsored Scheme that extends financial support to individuals living below poverty line (BPL). Implemented by the Ministry of Rural Development, the programme operates across both rural and urban areas. Which among the following is/are the components of NSAP? </p><p>I. Indira Gandhi National Old Age Pension Scheme (IGNOAPS) </p><p>II. Indira Gandhi National Widow Pension Scheme (IGNWPS) </p><p>III. Indira Gandhi National Disability Pension Scheme (IGNDPS) </p><p>IV. National Family Benefit Scheme (NFBS) </p><p>V. Annapurna Scheme</p>",

    "solution": "<p>Introduced on 15 August 1995, the National Social Assistance Programme (NSAP) is a fully funded Centrally Sponsored Scheme that extends financial support to individuals living below poverty line (BPL). Implemented by the Ministry of Rural Development, the programme operates across both rural and urban areas. NSAP caters to 3.09 crore beneficiaries with a scheme-wise ceiling/ cap for each State/UT on the number of beneficiaries. This includes 221 lakh elderly persons under the Indira Gandhi National Old Age Pension Scheme (IGNOAPS), 67 lakh beneficiaries under Indira Gandhi National Widow Pension Scheme (IGNWPS), more than 8.33 lakh beneficiaries under Indira Gandhi National Disability Pension Scheme (IGNDPS), 3.5 lakh under National Family Benefit Scheme (NFBS)and 8.31 lakh beneficiaries under Annapurna Scheme, across the country. To provide a basic level of social security assistance to the most vulnerable category of citizens, such as the elderly, widows, and the divyangajan.</p><p>&#183; <b>Selection:</b> Gram Panchayats and Municipalities play an active role in identifying eligible beneficiaries under the different NSAP schemes.</p><p>&#183; <b>Disbursement:</b> Benefits are provided through DBT mode (94%), i.e, beneficiary's bank or post office savings accounts, or via postal money orders. Disbursement through Cash at the doorstep is also allowed by the scheme guidelines in extreme cases where the beneficiary is unable to go to the bank/post office to receive the pension.</p><p>&#183; <b>Monitoring:</b> States and Union Territories have the flexibility to implement the schemes through any State Government department, but each must appoint a Nodal Secretary at the State level to oversee implementation and coordinate with relevant departments. Progress must be reported quarterly in a prescribed format by the 15th day of the month following each quarter. Non-submission of progress reports is considered a lack of progress and may result in non-release of additional central assistance for the final quarter of the financial year.</p><p>The NSAP at present comprises five sub-schemes as its components -</p><p>&#183; Indira Gandhi National Old Age Pension Scheme (IGNOAPS)</p><p>&#183; Indira Gandhi National Widow Pension Scheme (IGNWPS)</p><p>&#183; Indira Gandhi National Disability Pension Scheme (IGNDPS)</p><p>&#183; National Family Benefit Scheme (NFBS)</p><p>&#183; Annapurna Scheme</p>",

n, Colombia</p><p>&#183; Cape Town, South Africa</p><p>&#183; Mexico City, Mexico</p><p>&#183; Mumbai, India</p><p>&#183; Beijing, China</p><p>&#183; Shanghai, China</p><p>&#183; Chicago, US</p><p>&#183; Seville, Spain</p><p>&#183; Melbourne, Australia</p>",

    "correct_option_id": 3,
    "solution": "<p>The Union Cabinet chaired by the Prime Minister, Shri Narendra Modi has approved the Export Promotion Mission (EPM) - a flagship initiative announced in the Union Budget 2025'26 to strengthen India's export competitiveness, particularly for MSMEs, first-time exporters, and labour-intensive sectors. The Mission will provide a comprehensive, flexible, and digitally driven framework for export promotion, with a total outlay of Rs.25,060 crore for FY 2025'26 to FY 2030'31. EPM marks a strategic shift from multiple fragmented schemes to a single, outcome-based, and adaptive mechanism that can respond swiftly to global trade challenges and evolving exporter needs. EPM is anchored in a collaborative framework involving the Department of Commerce, Ministry of MSME, Ministry of Finance, and other key stakeholders including Financial Institutions, Export Promotion Councils, Commodity Boards, industry associations, and state governments. <b>'The Mission will operate through two integrated sub-schemes:</b></p><p>&#183; <b>NIRYAT PROTSAHAN</b>'- focuses on improving access to affordable trade finance for MSMEs through a range of instruments such as interest subvention, export factoring, collateral guarantees, credit cards for e-commerce exporters, and credit enhancement support for diversification into new markets.</p><p>&#183; <b>NIRYAT DISHA</b>'- focuses on non-financial enablers that enhance market readiness and competitiveness, including export quality and compliance support, assistance for international branding, packaging, and participation in trade fairs, export warehousing and logistics, inland transport reimbursements, and trade intelligence and capacity-building initiatives.</p><p>EPM consolidates key export support schemes such as the Interest Equalisation Scheme (IES) and Market Access Initiative (MAI), aligning them with contemporary trade needs. The Mission is designed to directly address structural challenges that constrain Indian exports, including:</p><p>&#183; limited and expensive trade finance access,</p><p>&#183; high cost of compliance with international export standards,</p><p>&#183; inadequate export branding and fragmented market access, and</p><p>&#183; logistical disadvantages for exporters in interior and low-export-intensity regions.</p><p>Under EPM, priority support will be extended to sectors impacted by recent global tariff escalations, such as textiles, leather, gems &amp; jewellery, engineering goods, and marine products. The interventions will help sustain export orders, protect jobs, and support diversification into new geographies.' The Directorate General of Foreign Trade (DGFT) will act as the implementing agency, with all processes - from application to disbursal - being managed through a dedicated digital platform integrated with existing trade systems. <b>The Mission is expected to:</b></p><p>&#183; facilitate access to affordable trade finance for MSMEs,</p><p>&#183; enhance export readiness through compliance and certification support,</p><p>&#183; improve market access and visibility for Indian products,</p><p>&#183; boost exports from non-traditional districts and sectors, and</p><p>&#183; generate employment across manufacturing, logistics, and allied services.</p><p>EPM represents a forward-looking effort to make India's export framework more inclusive, technology-enabled, and globally competitive, aligning with the vision of Viksit Bharat @2047.</p>",

animal depredation are frequent and widespread. Reintroducing Paddy Inundation as a Localised Calamity Cover under PMFBY will especially benefit farmers in coastal and flood-prone States, including Odisha, Assam, West Bengal, Tamil Nadu, Kerala, Karnataka, Maharashtra and Uttarakhand, where paddy submergence is a recurring challenge. Together with the inclusion of Wild Animal Attack, these additions make PMFBY more inclusive, responsive and farmer-friendly, further strengthening the resilience of India's crop insurance system.</p>",

    "question": "<p>As reported in November 2025, Hungarian-British writer David Szalay's Flesh, this year's Booker Prize-winning novel, is a narrative of displacement, masculinity, and the weight of moral choices. </p><p>I. David Szalay was shortlisted for the Booker in 2016 for 'All That Man Is' and was selected as one of Granta's Best of Young British Novelists in 2013. </p><p>II. The 2025 Booker shortlist consisted of six titles drawn from a longlist of 13. </p><p>III. Each shortlisted author in 2025 was awarded '5,000.</p>",
    "options": [
      "I only",
      "I and II only",
      "II and III only",
      "I, II and III",
      "III only"
    ],
    "correct_option_id": 1,
    "solution": "<p>Hungarian-British writer David Szalay's Flesh, this year's Booker Prize-winning novel, is a narrative of displacement, masculinity, and the weight of moral choices. A Hungarian teenager, Istvan, drifts through life, a physical relationship, an older woman, juvenile detention, the Iraq war, and finally a job as a driver for the extremely wealthy in London. Globalisation is not an abstract concept in Flesh ' it is felt in the teeth. Some citizens are more equal than others. The novel probes spaces, however close to the bone, where human feeling survives ' including in the face of mortality. 'There's still something there,' says a woman about her dying husband.</p><p>&#183; On a train to see his mother, in a rare, poetic moment, Istvan glimpses the landscape of his youth: 'Deer flee across flooded fields. In the distance are low hills the colour of smoke.'</p><p>&#183; Coincidentally, this year's'Nobel Prize in Literature'was also awarded to a Hungarian writer ' the 71-year old'<b>L'szl' Krasznahorkai</b>' for his work which, in the words of the Swedish Academy, 'in the midst of apocalyptic terror, reaffirms the power of art'. The small and land-locked nation of Hungary in Central Europe has produced some remarkable writers. The nation has also had a tumultuous history. After World War I, in the Treaty of Trianon, Hungary lost more than two-thirds of its territory and its people ' compelling a turn to a past that has always seemed larger than the present.</p><p>&#183; Szalay was shortlisted for the Booker in 2016 for'<i>All That Man Is</i>, and was selected as one of'<i>Granta</i>'s Best of Young British Novelists in 2013.bThis is the second year in a row that publisher Jonathan Cape has bagged the top prize after Samantha Harvey won in 2024 for'<i>Orbital.'</i></p><p>&#183; The five other shortlisted books this year from a longlist of 13 were'<i>Audition</i>'(Fern Press) by'Katie Kitamura,'<i>The Loneliness of Sonia and Sunny</i>'(Hamish Hamilton),'<i>Flashlight</i>'(Jonathan Cape) by Susan Choi,'<i>The Rest of Our Lives</i>'(Faber and Faber) by Ben Markovits, and'<i>The Land in Winter</i>'(Sceptre) by Andrew Miller.</p><p>&#183; <b>David Szalay is the first Hungarian-British writer to win the Booker Prize. Born in Canada, Szalay has lived in Lebanon, the UK, Hungary, and now Vienna.</b></p><p>&#183; <i>Flesh</i>'s publisher, Jonathan Cape, has published the most Booker Prize winners in the history of the prize, with nine previous Booker winners: in 1974 (<i>The Conservationist</i>), 1976 (<i>Saville</i>), 1981 (<i>Midnight's Children</i>), 1984 (<i>Hotel du Lac</i>), 1991 (<i>The Famished Road</i>), 1998 (<i>Amsterdam</i>), 2007 (<i>The Gathering</i>), 2011 (<i>The Sense of an Ending</i>) and 2024 (<i>Orbita</i><i>l</i>).'<i>Flesh</i>'is the publisher's tenth winner.</p><p>&#183; The Booker Prize'is the leading literary award in the English speaking world, and has brought recognition, reward and readership to outstanding fiction for over five decades</p><p>&#183; Each year, the prize is awarded to what is, in the opinion of the judges, the best sustained work of fiction written in English and published in the UK and Ireland. It is a prize that transforms the winner's career.</p><p>&#183; The winner receives '50,000 as well as the '2,500 awarded'to each of the six shortlisted authors. Both the winner and the shortlisted authors are guaranteed a global readership and can expect a dramatic increase in book sales.</p>",

  },

    "question": "<p>According to data released by the National Statistical Office (NSO) on November 10, 2025, Rural unemployment declined to _________________from 4.8 percent in the April-June quarter, while urban unemployment edged up to ______________ from 6.8 percent, indicating a mild slowdown in hiring in city-based services and manufacturing sectors.</p>",
    "options": [
      "4.4 percent; 6.9 percent",
      "4.5 percent; 6.1 percent",
      "3.7 percent; 5.4 percent",
      "5.8 percent; 7.9 percent",
      "3.8 percent; 4.9 percent"
    ],
    "correct_option_id": 0,
    "solution": "<p>India's unemployment rate eased to 5.2 percent in the July-September quarter of FY26, down from 5.4 percent in the previous quarter, driven largely by stronger rural employment during the Kharif season, according to data released by the National Statistical Office (NSO) on November 10. The Periodic Labour Force Survey (PLFS) data revealed contrasting trends across regions. Rural unemployment declined to 4.4 percent from 4.8 percent in the April'June quarter, while urban unemployment edged up to 6.9 percent from 6.8 percent, indicating a mild slowdown in hiring in city-based services and manufacturing sectors. The improvement in rural employment coincided with the Kharif sowing period. The proportion of rural workers engaged in agriculture rose to 57.7 percent in Q2FY26, up from 53.5 percent in the previous quarter. In urban areas, employment in the tertiary sector-including trade, transport, and education-inched up to 62 percent, compared with 61.7 percent in Q1FY26. The Labour Force Participation Rate (LFPR) improved slightly to 55.1 percent, from 55.0 percent in the previous quarter, with both rural and urban areas showing small gains. Among women, participation continued its upward trend, rising to 33.7 percent from 33.4 percent a quarter earlier The Worker Population Ratio (WPR)-the share of employed persons in the working-age population-also inched up to 52.2 percent from 52.0 percent.</p><p>&#183; <b>Women's participation keeps rising</b>: - A key feature of the quarter was the continued increase in female workforce participation, particularly in rural India. Women's LFPR in rural areas climbed from 37.0 percent to 37.5 percent, while their WPR rose to 32 percent, reflecting higher engagement in both agricultural and self-employment activities.</p><p>&#183; <b>Job quality trends mixed</b>: - Indicators of employment composition showed mixed trends. Self-employment in rural areas surged to 62.8 percent from 60.7 percent, suggesting rising informal or family-based work. Regular wage and salaried employment in urban areas saw a modest rise to 49.8 percent from 49.4 percent, signalling relative stability in formal jobs. The share of casual labour fell marginally in both rural and urban regions, pointing to a gradual shift toward more stable work categories.</p><p>&#183; <b>Growth momentum moderates</b>: - The labour market data come amid signs that India's economy likely grew around 7 percent in the second quarter, slower than the 7.8 percent expansion recorded in the previous quarter, as per Reserve Bank of India (RBI) estimates.</p>",

    "question": "<p>In November 2025, the QS World University Rankings for Sustainability 2026 highlighted several indicator-level trends for Indian institutions. Identify the CORRECT Statement(s) regarding this. </p><p>I. Environmental education was the indicator in which nearly half of India's ranked universities showed improvement. </p><p>II. Across the 103 Indian institutions ranked, more universities improved than declined. </p><p>III. Nine Indian institutions scored above 84 in the Environmental Education indicator, including IIT Delhi, IIT Bombay, IIT Madras, IIT Kanpur, Jawaharlal Nehru University, Banaras Hindu University, and the Indian Institute of Science.</p>",

    "correct_option_id": 4,
    "solution": "<p>London-based QS Quacquarelli Symonds released its QS World University Rankings for Sustainability 2026, showing that India, with 103 universities, had the fourth-highest number of institutions in the list, behind the United States, China, and the United Kingdom. The QS sustainability rankings, established in 2023, assess institutions across environmental and social sustainability categories such as environmental impact, social impact, and governance. These include indicators covering environmental research, sustainability, and education, along with equality, employability, knowledge exchange, and health and wellbeing.</p><p>&#183; The rankings released showed institutions from the U.K., Canada, Sweden, and the U.S. dominating the top 15, with Lund University in Sweden taking the top position. This year's edition features close to 2,000 institutions from over 100 locations worldwide.</p><p>&#183; Of the 103 Indian universities featured, the Indian Institute of Technology Delhi was the best performing, placed at 205. Overall, QS noted that India had 12 universities in the top 500, matching the number for countries such as China and the Netherlands. QS also said that this year's rankings recorded the highest number of debut entries from China (46), followed by India (26), France (19), and Turkey (18).</p><p>&#183; While this is IIT Delhi's highest position in the sustainability rankings since their inception, it is lower in relative terms compared to its performance last year, when around 1,700 institutions were ranked. Among the top 15 Indian universities in this year's sustainability rankings, nine saw their positions drop compared to the previous year. These included Jadavpur University, IIT Kanpur, IIT Madras, the Indian Institute of Science, and others.</p><p>&#183; Across the 103 Indian institutions ranked, 30 saw their positions decline, 32 improved, and 15 remained unchanged.</p><p>&#183; At the indicator level, IIT Delhi (93rd) and IIT Kharagpur (96th) made it to the top 100 globally for Employability and Outcomes. The University of Delhi entered the top 100 for Knowledge Exchange, at 94. IIT Bombay was ranked 100th under the Environmental Impact category.</p><p>&#183; QS said in a statement that environmental education was the indicator in which nearly half of India's ranked universities showed improvement. Nine Indian institutions scored above 84 in this indicator, including IIT Delhi, IIT Bombay, IIT Madras, IIT Kanpur, Jawaharlal Nehru University, Banaras Hindu University, and the Indian Institute of Science.</p><p>&#183; In comparison, Indian institutions scored relatively lower in the social impact indicators'equality and impact of education. For example, while IISc secured its highest score in Environmental Education (96), its equality score was around 51.6, and its impact of education score was 52.5. Similarly, among the 16 IITs that featured in the rankings, equality scores ranged from 21.5 (IIT Ropar) to 69.8 (IIT Kanpur).</p><p>&#183; In a statement, <b>Jessica Turner, CEO of QS,</b> said: 'Overall, Indian universities excel in knowledge exchange and environmental sustainability. The higher education system also boasts some outstanding individual performances, especially among the IITs and institutions such as the University of Delhi.</p>",

    "question": "<p>The annual awards in the genre of children's literature, the Bal Sahitya Puraskar 2025 of the Sahitya Akademi is scheduled to held on 14 November 2025, in the Triveni Auditorium, Tansen Marg, New Delhi. Which of the given statements is/are correct about this?</p><p>I. The Sahitya Akademi was formally inaugurated by the Government of India on 12 March 1954.</p><p>II. Akademi gives 22 awards annually to literary works in the languages it has recognized.</p><p>III. Besides the 22 languages enumerated in the Constitution of India, the Sahitya Akademi has recognised English and Rajasthani as languages in which its programme may be implemented.</p>",
    "options": [
      "III Only",
      "II Only",
      "I and II Only",
      "I Only",
      "I, II, and III"
    ],
    "correct_option_id": 1,
    "solution": "<p>The annual awards in the genre of children's literature, the Bal Sahitya Puraskar 2025 of the Sahitya Akademi will be held on Friday, 14 November 2025, in the Triveni Auditorium, Tansen Marg, New Delhi. The awards will be presented by the President of the Akademi, Madhav Kaushik. The awardees shall receive a cheque for Rs. 50,000/- each and a bronze plaque in recognition of their works. </p><p><b>ABOUT SAHITYA AKADEMI: -</b></p><p>&#183; The Sahitya Akademi was formally inaugurated by the Government of India on'12 March 1954. The Government of India Resolution, which set forth the constitution of the Akademi, described it as a national organisation to work actively for the development of Indian letters and to set high literary standards, to foster and coordinate literary activities in all the Indian languages, and to promote through them all the cultural unity of the country.</p><p>&#183; Though set up by the Government, the Akademi functions as an autonomous organisation. It was registered as a society on 7 January 1956, under the Societies Registration Act, 1860.</p><p>&#183; Akademi gives 24 awards annually to literary works in the languages it has recognized and an equal number of awards to literary translations from and into the languages of India, both after a year-long process of scrutiny, discussion, and selection.</p><p>&#183; It also gives special awards called Bhasha Samman to significant contributions to languages not formally recognized by the Akademi, as well as for contributions to classical and medieval literature.</p><p>&#183; Besides the 22 languages enumerated in the Constitution ofIndia, the SahityaAkademi has recognised English and Rajasthani as languages in which its programme may be implemented. Names of present members of various language Advisory Boards, which have been constituted to render advice for implementing literary programmes in these 24 languages, are given on the website</p>",

    "question": "<p>In the context of RBI's September 2024 update on outward remittances under the Liberalised Remittance Scheme (LRS) and the April'September 2024 period (H1 FY25), Which of the statements are/is correct? </p><p>I. LRS outflows in H1 FY25 (April'September 2024) totaled $29.56 billion, a 7% year-on-year decline from $31.7 billion. </p><p>II. The marginal September uptick to $2.78 billion was primarily driven by increased investments by Indians in overseas equity/debt and robust international travel. </p><p>III. The LRS, introduced in 2004, permits remittances by all resident individuals free of charge, subject to an annual cap.</p>",

    "question": "<p>The Ministry of Rural Development is committed to transparent and effective implementation of the Mahatma Gandhi National Rural Employment Guarantee Act to ensure rural households benefit from it. To simplify and support these statutory processes, States/UTs have been requested to utilize the e-KYC feature already available in the NMMS app (National Mobile Monitoring System) for job card verification and subsequent renewal after following extant processes. Identify which among the following statement(s) is/are correct in context of this? </p><p>I. 99.67% active workers' Aadhar have already been seeded, e-KYC feature could be used as a simple, reliable, accurate and efficient way of verification of job cards. </p><p>II. e-KYC can be done anywhere as decided by the State, such as at worksite, special camps organised by the Gram Panchayat, etc. </p><p>III. As far as the deletion of job cards/workers is concerned, a detailed Standard Operating Procedure (SOP) was issued by the Ministry on 24 January 2025.</p>",
    "options": [

      "II and III Only",

    "solution": "<p>The Ministry of Rural Development continuously strives to ensure the transparent and effective implementation of the Mahatma Gandhi National Rural Employment Guarantee Act so that the rural households get benefitted from the provisions of the Act. MGNREGA has a huge reach covering 2.69 lakh Gram Panchayats across the country with over 26 Crore registered workers. Job card verification is a continuous process, whereas job card renewal is required to be done once in 5 years. To simplify and support these statutory processes, States/UTs have been requested to utilize the e-KYC feature already available in the NMMS app (National Mobile Monitoring System) for job card verification and subsequent renewal after following extant processes. This facilitative measure is intended to assist States in completing verification in a timely, transparent, and efficient manner. As 99.67% active workers' Aadhar have already been seeded, e-KYC feature could be used as a simple, reliable, accurate and efficient way of verification of job cards. During e-KYC, the Gram Rojgar Sahayak/ Worksite supervisor/Mate/ any other GP-level functionary captures a picture of the MGNREGA worker (through the NMMS App e-KYC feature), which is digitally/automatically verified with his/her Aadhar details in real time. The entire process for one worker gets completed in under a minute.</p><p>&#183; States have been advised to take necessary measures to make the process as smooth as possible by resolving issues like network connectivity, etc. e-KYC can be done anywhere as decided by the State, such as at worksite, special camps organised by the Gram Panchayat, etc.</p><p>&#183; As far as the deletion of job cards/workers is concerned, a detailed Standard Operating Procedure (SOP) was issued by the Ministry on 24 January 2025. This SOP provides clear, uniform, and transparent guidelines for States to follow, ensuring fairness, accountability, and protection of workers' interests in the management of job card records.</p>",

    "question": "<p>For modernising labour regulations, the Government of India has announced that the four Labour Codes, enhancing workers' welfare and aligning the labour ecosystem with the evolving world of work, this landmark move lays the foundation for a future-ready workforce and stronger, resilient industries driving labour reforms for Aatmanirbhar Bharat. Which among the following changes proposed in the new changes in the labour law is/are NOT correct?</p>",
    "options": [
      "Under the Code on Social Security, 2020, all workers, including gig &amp; platform workers to get social security coverage.",
      "Mandatory appointment letters to all workers.",
      "Employers must provide all workers above the age of 50 years with a free annual health check-up.",
      "ESIC coverage and benefits are extended Pan-India- voluntary for establishments with fewer than 10 employees.",
      "All of the above are correct"
    ],
    "correct_option_id": 2,
    "solution": "<p>In a historic decision, the Government of India has announced that the four Labour Codes - the Code on Wages, 2019, the Industrial Relations Code, 2020, the Code on Social Security, 2020 and the Occupational Safety, Health and Working Conditions Code, 2020 are being made effective from 21st November 2025, rationalising 29 existing labour laws. By modernising labour regulations, enhancing workers' welfare and aligning the labour ecosystem with the evolving world of work, this landmark move lays the foundation for a future-ready workforce and stronger, resilient industries driving labour reforms for Aatmanirbhar Bharat. In line with the wide-ranging consultations carried out during the drafting of the Labour Codes, the Government will likewise engage the public and stakeholders in the framing of the corresponding rules, regulations, schemes, etc. under the Codes.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\" colspan=\"3\"><b>A comparison of the labour ecosystem, before and after the implementation of the Labour Codes, is as follows:</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Pre Labour Reforms</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Post Labour Reforms</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Formalisation of Employment</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">No mandatory appointment letters</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Mandatory appointment letters </b>to all workers. Written proof will ensure transparency, job security, and fixed employment.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Social Security Coverage</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Limited Social Security Coverage</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Under the Code on Social Security, 2020, all workers, including <b>gig &amp; platform workers </b>to get social security coverage. All workers will get PF, ESIC, insurance, and other social security benefits.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Minimum Wages</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Minimum wages applied only to scheduled industries/employments; large sections of workers remained uncovered</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Under the Code on Wages, 2019, all workers to receive a <b>statutory right minimum wage payment</b>. Minimum wages and timely payment will ensure financial security.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Preventive Healthcare</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">No legal requirement for employers to provide free annual health check-ups to workers</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Employers must provide all workers above the age of <b>40 years with a free annual health check-up</b>. Promote a timely preventive healthcare culture</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Timely Wages</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">No mandatory compliance for employers' payment of wages</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Mandatory</b> for employers to provide <b>timely wages,</b> ensuring financial stability, reducing work stress, and boostingthe overall morale of the workers.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Women's workforce participation</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Women's employment in night shifts and certain occupations was restricted</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Women are permitted to work at night </b>and in <b>all types of work </b>across all establishments, subject to their consent and required safety measures. Women will get equal opportunities to earn higher incomes in high-paying job roles.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ESIC coverage</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ESIC coverage was limited to notified areas and specific industries; establishments with fewer than 10 employees were generally excluded, and hazardous-process units did not have uniform mandatory ESIC coverage across India</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>ESIC coverage and benefits are extended Pan-India </b>- voluntary for establishments with fewer than 10 employees, and mandatory for establishments with even one employee engaged in hazardous processes. Social protection coverage will be expanded to all workers.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Compliance Burden</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Multiple registrations, licenses, and returns across various labour laws.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Single registration, PAN-India single licens,e and single return. Simplified processes and reduction in Compliance Burden.</td></tr></table><p><b>Benefits of Labour Reforms Across Key Sectors:</b></p><p><b>1) Fixed-Term Employees (FTE): -</b></p><p>&#183; FTEs to receive all benefits equal to permanent workers, including leave, medical, and social security.</p><p>&#183; Gratuity eligibility after just one year, instead of five.</p><p>&#183; Equal wages as permanent staff, increasing income and protection.</p><p>&#183; Promotes direct hiring and reduces excessive contractualisation.</p><p><b>2) Gig &amp; Platform Workers:</b> -</p><p>&#183; 'Gig work', 'Platform work', and 'Aggregators' have been defined for the first time.</p><p>&#183; Aggregators must contribute 1'2% of the annual turnover, capped at 5% of the amount paid/payable to gig and platform workers.</p><p>&#183; Aadhaar-linked Universal Account Number will make welfare benefits easy to access, fully portable, and available across states, regardless of migration.</p><p><b>3) Contract Workers: -</b></p><p>&#183; Fixed-term employees (FTE) will increase employability and ensure social security, legal protection and benefits equal to permanent employees.</p><p>&#183; Fixed-term employees will become eligible for gratuity after one year of continuous service.</p><p>&#183; The principal employer will provide health benefits and social security benefits to contract workers.</p><p>&#183; Workers to get free annual health check-up.</p><p><b>4) Women Workers: -</b></p><p>&#183; Gender discrimination is legally prohibited.</p><p>&#183; Equal pay for equal work is ensured.</p><p>&#183; Women are permitted to work night shifts and in all types of work (including underground mining and heavy machinery), subject to their consent and mandatory safety measures.</p><p>&#183; Mandatory women's representation in grievance redressal committees</p><p>&#183; Provision to add parents-in-law in the Family Definition of Female employees, expanding dependent coverage, and ensuring inclusivity.</p><p><b>5) Youth Workers: -</b></p><p>&#183; Minimum wage is guaranteed for all workers.</p><p>&#183; All workers to get appointment letters, promoting social security, employment history, and formal employment.</p><p>&#183; Worker exploitation by employers is prohibited'payment of wages during leave has been made mandatory.</p><p>&#183; To ensure a decent standard of living, workers will receive wages as per the floor wage determined by the Central Government.</p><p><b>6) MSME Workers: -</b></p><p>&#183; All MSME workers covered under the Social Security Code, 2020, eligibility based on employee count.</p><p>&#183; Minimum wage guaranteed for all workers.</p><p>&#183; Workers will have access to facilities such as canteens, drinking water, and rest areas.</p><p>&#183; Provisions for standard working hours, double overtime wages, and paid leave.</p><p>&#183; Timely wage payment ensured.</p><p><b>7) Beedi &amp; Cigar Workers: -</b></p><p>&#183; Minimum wages are guaranteed for all.</p><p>&#183; Working hours capped at 8 -12 hours per day, 48 hours per week has been capped.</p><p>&#183; Overtime Work beyond prescribed hours, to be consent-based and pay at least double the normal wage rate.</p><p>&#183; Timely payment of wages ensured.</p><p>&#183; Workers are eligible for a Bonus after completing 30 days of work in a year.</p><p><b>8) Plantation Workers: -</b></p><p>&#183; Plantation workers are now brought under the OSHWC Code and the Social Security Code.</p><p>&#183; Labour Codes apply to plantations with more than 10 workers or 5 or more hectares.</p><p>&#183; Mandatory safety training on handling, storing, and using chemicals.</p><p>&#183; Protective equipment is mandatory to prevent accidents and chemical exposure.</p><p>&#183; Workers and their families to get full ESI medical facilities; Education facilities for their children are also guaranteed.</p><p><b>9) Audio-Visual &amp; Digital Media Workers: -</b></p><p>&#183; Digital and audio-visual workers, including journalists in electronic media, dubbing artists, and stunt persons, will now receive full benefits.</p><p>&#183; Mandatory appointment letter for all workers - clearly stating their designation, wages, and social security entitlements.</p><p>&#183; Timely payment of wages ensured.</p><p>&#183; Overtime Work beyond prescribed hours, to be consent-based and pay at least double the normal wage rate.</p><p><b>10) Mine Workers: -</b></p><p>&#183; The Social Security Code treats certain commuting accidents as employment-related, subject to conditions of time and place of employment.</p><p>&#183; The entral Govern und, pension, and insurance benefits are ensured for all, whether contract or temporary dock workers.</p><p>&#183; Employer-funded annual health check-ups are mandatory.</p><p>&#183; Dock workers to get mandatory medical facilities, first aid, sanitary and washing areas, etc., to ensure decent work conditions and safety.</p><p><b>15) Export Sector Workers: -</b></p><p>&#183; Export sector fixed-term workers to receive gratuity, provident fund (PF), and other social security benefits.</p><p>&#183; Every worker has the option of availing annual leave after 180 days of work in a year.</p><p>&#183; Every worker has the right to timely wage payment and no unauthorized wage deductions, and no wage ceiling restrictions.</p><p>&#183; Women are allowed to work on night shifts with consent, ensuring the opportunity to earn a higher income.</p><p>&#183; Safety and welfare measures include mandatory written consent, double wages for overtime, safe transportation, CCTV surveillance, and security arrangements.</p><p><b>Beyond the major welfare initiatives already highlighted, the Labour Codes introduce several further reforms that strengthen worker protection and simplify compliance for employers: -</b></p><p>&#183; National Floor Wage to ensure no worker receives a wage below the minimum living standard.</p><p>&#183; Gender-neutral pay and job opportunities, explicitly prohibiting discrimination'including against transgender persons.</p><p>&#183; Inspector-cum-Facilitator system, shifting enforcement towards guidance, awareness and compliance support rather than punitive action.</p><p>&#183; Faster and predictable dispute resolution, with two-member Industrial Tribunals and the option to approach tribunals directly after conciliation.</p><p>&#183; Single registration, single licence and single return across safety and working-conditions requirements, replacing multiple overlapping filings.</p><p>&#183; National OSH Board to set harmonised safety and health standards across secto
