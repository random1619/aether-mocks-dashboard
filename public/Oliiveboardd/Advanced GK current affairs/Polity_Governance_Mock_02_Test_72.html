    <script>
        const questions = [
  {
    "question": "<p>From constitution of which among the following country was directive principles of state policy borrowed?</p>",
    "options": [
      "France",
      "Britain",
      "Japan",
      "Ireland",
      "Canada"
    ],
    "correct_option_id": 3,
    "solution": "<p>Directive Principles of State Policy was borrowed from Irish Constitution. The framers of the Constitution borrowed this idea from the Irish Constitution of 1937, which had copied it from the Spanish Constitution. It denotes the ideals that the State should keep in mind while formulating policies and enacting laws.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Which among the following erstwhile Princely state was integrated with India by means of referendum?</p>",
    "options": [
      "Hyderabad",
      "Jammu &amp; Kashmir",
      "Junagarh",
      "Patiala",
      "Saurashtra"
    ],
    "correct_option_id": 2,
    "solution": "<p>At the time of independence, India comprised two categories of political units, namely, the British provinces (under the direct rule of British government) and the princely states (under the rule of native princes but subject to the paramountcy of the British Crown). While many princely states within Indian territory joined India, Hyderabad, Junagarh and Jammu &amp; Kashmir didn't join. But later Hyderabad by means of police action, Junagarh by means of referendum and Kashmir by the Instrument of Accession integrated with India.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Which among the following is referred to as \"Magna Carta of India\"?</p>",
    "options": [
      "Preamble",
      "Fundamental Duties",
      "Fundamental Rights",
      "Directive Principles",
      "Parliamentary System"
    ],
    "correct_option_id": 2,
    "solution": "<p>Fundamental Rights is described as the Magna Carta of India. 'Magna Carta' is the Charter of Rights issued by King John of England in 1215 under pressure from the barons. This is the first written document relating to the Fundamental Rights of citizens.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Election to which of the following office is conducted in open ballot system?</p>",
    "options": [
      "Member of Rajya Sabha",
      "President",
      "Vice President",
      "Prime Minister",
      "Speaker of Lok Sabha"
    ],
    "correct_option_id": 0,
    "solution": "<p>In the open ballot system, the voter has to show the ballot paper to the official agent of the party and cast the vote. It is used in elections to Membership of Rajya Sabha and legislative councils in states. Elections to rest of the above-mentioned offices are conducted by means of secret ballot system.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Which among the following North-Eastern state has more than one Rajya Sabha seat?</p>",
    "options": [
      "Meghalaya",
      "Mizoram",
      "Assam",
      "Arunachal Pradesh",
      "Nagaland"
    ],
    "correct_option_id": 2,
    "solution": "<p>Except Assam, all north-eastern states along with Sikkim has only one seat in Rajya Sabha. Assam has totally 7 Rajya Sabha seats and 14 Lok Sabha seats.</p>",
    "question_index": 4
  },
  {
    "question": "<p>What percentage of total strength is needed to constitute a sitting in house of parliament?</p>",
    "options": [
      "5%",
      "10%",
      "15%",
      "20%",
      "25%"
    ],
    "correct_option_id": 1,
    "solution": "<p>The quorum to constitute a meeting of the House is one-tenth of the total strength of the House. The presiding officer of the house adjourns the House or suspends the meeting in absence of a quorum. For Lok Sabha it is 54 and for Rajya Sabha it is 24.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Who among the following appoints Pro Tem speaker?</p>",
    "options": [
      "Prime Minister",
      "President",
      "Vice President",
      "Speaker",
      "Members of Parliament"
    ],
    "correct_option_id": 1,
    "solution": "<p>President appoints a member of the Lok Sabha as the Speaker Pro Tem. Usually, the senior most member is selected for this. The President himself administers oath to the Speaker Pro Tem. The Speaker Pro Tem has all the powers of the Speaker. He presides over the first sitting of the</p><p>newly-elected Lok Sabha. His main duty is to administer oath to the new members. He also enables the House to elect the new Speaker. the office of the Speaker Pro Tem ceases to exist. Hence, this office is a temporary office, existing for a few days.</p>",
    "question_index": 6
  },
  {
    "question": "<p>What is the maximum age limit to be a member of Union Public Service Commission?</p>",
    "options": [
      "50",
      "58",
      "60",
      "65",
      "70"
    ],
    "correct_option_id": 3,
    "solution": "<p>The UPSC consists of a chairman and other members appointed by the president of India. The chairman and members of the Commission hold office for a term of six years or until they attain the age of 65 years, whichever is earlier. The Commission consists of nine to eleven members including the chairman.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Which among the following bills must be passed by special majority in parliament?</p>",
    "options": [
      "Ordinary Bills",
      "Money Bills",
      "Financial Bills",
      "Constitutional Bills",
      "All the above"
    ],
    "correct_option_id": 3,
    "solution": "<p>Constitution amendment bill can be initiated only by the introduction of a bill for the purpose in either House of Parliament. The bill must be passed in each House by a special majority, that is, a majority (that is, more than 50 per cent) of the total membership of the House and a majority of two-thirds of the members of the House present and voting.</p>",
    "question_index": 8
  },
  {
    "question": "<p>What is the term for a member of state legislative council?</p>",
    "options": [
      "2 years",
      "5 years",
      "3 years",
      "6 years",
      "10 years"
    ],
    "correct_option_id": 3,
    "solution": "<p>The legislative council is a continuing chamber, that is, it is a permanent body and is not subject to dissolution. But, one-third of its members retire on the expiration of every second year. So, a member continues as such for six years.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Resignation of Speaker of Lok Sabha must be addressed to who among the following?</p>",
    "options": [
      "President",
      "Deputy Speaker",
      "Vice President",
      "Prime Minister",
      "Parliamentary Secretary"
    ],
    "correct_option_id": 1,
    "solution": "<p>Speaker remains in office during the life of the Lok Sabha. However, he has to vacate his office earlier in any of the following three cases:</p><p>1. if he ceases to be a member of the Lok Sabha;</p><p>2. if he resigns by writing to the Deputy Speaker; and</p><p>3. if he is removed by a resolution passed by a majority of all the members of the Lok Sabha. Such a resolution can be moved only after giving 14 days' advance notice.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Who among the following acts as Chairman of all Zonal Councils?</p>",
    "options": [
      "Prime Minister",
      "President",
      "Vice President",
      "Finance Minister",
      "Home Minister"
    ],
    "correct_option_id": 4,
    "solution": "<p>The zonal councils aim at promoting cooperation and coordination between states, union territories and the Centre. The home minister of Central government is the common chairman of the five zonal councils. Each chief minister acts as a vice-chairman of the council by rotation, holding office for a period of one year at a time.</p>",
    "question_index": 11
  },
  {
    "question": "<p>What is the maximum period for continuation of Financial emergency?</p>",
    "options": [
      "6 months",
      "1 year",
      "1 year and 6 months",
      "2 years",
      "No time limits"
    ],
    "correct_option_id": 4,
    "solution": "<p>Article 360 empowers the president to proclaim a Financial Emergency if he is satisfied that a situation has arisen due to which the financial stability or credit of India or any part of its territory is threatened. Once approved by both the Houses of Parliament, the Financial Emergency continues indefinitely till it is revoked. There is no maximum period prescribed for its operation.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Which among the following article deals with Fundamental Duties?</p>",
    "options": [
      "Article 51A",
      "Article 36",
      "Article 49B",
      "Article 27",
      "Article 63C"
    ],
    "correct_option_id": 0,
    "solution": "<p>Article 51A specifies a code of ten fundamental duties of the citizens. It was added to the constitution by 42nd Constitutional Amendment Act in 1976.</p>",
    "question_index": 13
  },
  {
    "question": "<p>As per constitution, there are totally how many types of urban local bodies in India?</p>",
    "options": [
      "3",
      "5",
      "8",
      "10",
      "12"
    ],
    "correct_option_id": 2,
    "solution": "<p>There are eight types of urban local governments in India - municipal corporation, municipality, notified area committee, town area committee, cantonment board, township, port trust and special purpose agency.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Which among the following was the first state to be formed after Independence?</p>",
    "options": [
      "Maharashtra",
      "Andhra",
      "Gujarat",
      "Nagaland",
      "Haryana"
    ],
    "correct_option_id": 1,
    "solution": "<p>In October 1953, Government of India created the first linguistic state, known as Andhra state, by separating the Telugu speaking areas from the Madras state. It was followed by bifurcation of Bombay into Maharashtra and Gujarat.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Chairman of Rajya Sabha is the President of which among the following Parliamentary Forum?</p>",
    "options": [
      "Parliamentary Forum on Water Conservation and Management",
      "Parliamentary Forum on Youth",
      "Parliamentary Forum on Children",
      "Parliamentary Forum on Population and Public Health",
      "Parliamentary Forum on Disaster Management"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Speaker of Lok Sabha is the President of all the Forums except the Parliamentary Forum on Population and Public Health wherein the Chairman of Rajya Sabha is the President and the Speaker is the Co-President. Members (other than the President and Vice-Presidents) of these forums are nominated by the Speaker/Chairman from amongst the leaders of various political parties/groups or their nominees, who have special knowledge/keen interest in the subject.</p>",
    "question_index": 16
  },
  {
    "question": "<p>First general elections were held in which year?</p>",
    "options": [
      "1946-47",
      "1947-48",
      "1949-50",
      "1950-51",
      "1951-52"
    ],
    "correct_option_id": 4,
    "solution": "<p>On January 24, 1950, the Constituent Assembly held its final session. It, however, did not end, and continued as the provisional parliament of India from January 26, 1950 till the formation of new Parliament after the first general elections in 1951 - 52. The Provisional Parliament ceased to exist on April 17, 1952. The first elected Parliament with the two Houses came into being in May 1952.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Which among the following act for the first time introduced Communal Electoral System in British India?</p>",
    "options": [
      "Government of India Act 1919",
      "Government of India Act 1935",
      "Indian Councils Act 1909",
      "Government of India Act 1858",
      "Charter Act of 1853"
    ],
    "correct_option_id": 2,
    "solution": "<p>Indian Councils Act 1909 is also known as Morley-Minto Reforms. It introduced a system of communal representation for Muslims by accepting the concept of 'separate electorate'. Under this, the Muslim members were to be elected only by Muslim voters. Thus, the Act 'legalised communalism' and Lord Minto came to be known as the Father of Communal Electorate.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Who among the following headed the \"Union Constitution Committee\" in constitution assembly?</p>",
    "options": [
      "Sardar Vallabh Bhai Patel",
      "J.B. Kriplani",
      "Dr. Rajendra Prasad",
      "Jawaharlal Nehru",
      "Dr. B.R. Ambedkar"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Constituent Assembly appointed several committees to deal with different tasks of constitution-making. Some important committees are:</p><p>1. Union Powers Committee  -  Jawaharlal Nehru</p><p>2. Union Constitution Committee  -  Jawaharlal Nehru</p><p>3. Provincial Constitution Committee  -  Sardar Patel</p><p>4. Drafting Committee  -  Dr. B.R. Ambedkar</p><p>6. Rules of Procedure Committee  -  Dr. Rajendra Prasad</p><p>7. States Committee (Committee for Negotiating with States)  -  Jawaharlal Nehru</p><p>8. Steering Committee  -  Dr. Rajendra Prasad</p>",
    "question_index": 19
  },
  {
    "question": "<p>Which among the following state is NOT included in Sixth Schedule of the constitution?</p>",
    "options": [
      "Assam",
      "Meghalaya",
      "Tripura",
      "Mizoram",
      "Nagaland"
    ],
    "correct_option_id": 4,
    "solution": "<p>The Constitution, under Sixth Schedule, contains special provisions for the administration of tribal areas in the four north-eastern states of Assam, Meghalaya, Tripura and Mizoram. Part X of the Constitution envisages a special system of administration for certain areas designated as 'scheduled areas' and 'tribal areas'.</p>",
    "question_index": 20
  },
  {
    "question": "<p>Who among the following is the highest law officer of India?</p>",
    "options": [
      "Attorney General of India",
      "Solicitor General of India",
      "Chief Justice of India",
      "Advocate General",
      "Advocate-on-Record"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Constitution (Article 76) has provided for the office of the Attorney General for India. He is the highest law officer in the country. The Attorney General (AG) is appointed by the president. He must be a person who is qualified to be appointed a judge of the Supreme Court.</p>",
    "question_index": 21
  },
  {
    "question": "<p>Which among the following state has adopted English as the official language?</p>",
    "options": [
      "Arunachal Pradesh",
      "Meghalaya",
      "Nagaland",
      "Both 1 &amp; 3",
      "All 1, 2 &amp; 3"
    ],
    "correct_option_id": 4,
    "solution": "<p>The Constitution does not specify the official language of different states. The legislature of a state may adopt any one or more of the languages in use in the state. The north-eastern States of Meghalaya, Arunachal Pradesh and Nagaland have adopted English.</p>",
    "question_index": 22
  },
  {
    "question": "<p>Who was the chairman of first finance commission?</p>",
    "options": [
      "J.M. Shelat",
      "Dr. P.V. Rajamannar",
      "Mahavir Tyagi",
      "K.C. Neogy",
      "Dr. C. Rangarajan"
    ],
    "correct_option_id": 3,
    "solution": "<p>First finance commission was constituted in the year 1951, and K.C. Neogy was the chairman of that commission. Constitution of India provides for a Finance Commission as a quasi-judicial body. It is constituted by the president of India every fifth year or at such earlier time as he considers necessary.</p>",
    "question_index": 23
  },
  {
    "question": "<p>What is the minimum age required to be a member of Lok Sabha?</p>",
    "options": [
      "21",
      "25",
      "30",
      "35",
      "40"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Constitution lays down the following qualifications for a person to be chosen a member of the Parliament: 1. He must be a citizen of India.</p><p>2. He must make and subscribe to an oath or affirmation before the person authorised by the</p><p>election commission for this purpose. In his oath or affirmation, he swears (a) To bear true faith and allegiance to the Constitution of India (b) To uphold the sovereignty and integrity of India</p><p>3. He must be not less than 30 years of age in the case of the Rajya Sabha and not less than 25 years of age in the case of the Lok Sabha.</p><p>4. He must posses other qualifications prescribed by Parliament.</p>",
    "question_index": 24
  },
  {
    "question": "<p>Which among the following committee of British India recommended separation of railway budget from general budget?</p>",
    "options": [
      "Lee Commission",
      "Macaulay Commission",
      "Acworth Commission",
      "Stanford Commission",
      "Henry Commission"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Railway Budget was separated from the General Budget in 1921 on the recommendations of the Acworth Committee. The Constitution refers to the budget as the 'annual financial statement'. In other words, the term 'budget' has nowhere been used in the Constitution. It is the popular name for the 'annual financial statement' that has been dealt with in Article 112 of the Constitution.</p>",
    "question_index": 25
  },
  {
    "question": "<p>Who was the first speaker of Lok Sabha?</p>",
    "options": [
      "Ananthasayanam Ayyangar",
      "K.S. Hedge",
      "Balram Jakhar",
      "G.V. Mavalankar",
      "P.A. Sagma"
    ],
    "correct_option_id": 3,
    "solution": "<p>G.V. Mavalankar was the first speaker of Lok Sabha from 1952 to 1956. The Speaker is elected by the Lok Sabha from amongst its members and he/she will be the presiding officer of Lok Sabha.</p>",
    "question_index": 26
  },
  {
    "question": "<p>Power of Supreme court to defend fundamental rights of the constitution comes under which of the following jurisdiction?</p>",
    "options": [
      "Writ",
      "Original",
      "Appellate",
      "Advisory",
      "Court of Record"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Constitution has constituted the Supreme Court as the guarantor and defender of the fundamental rights of the citizens. The Supreme Court is empowered to issue writs including habeas corpus, mandamus, prohibition, quo-warrento and certiorari for the enforcement of the fundamental rights of an aggrieved citizen. It is referred to as Writ Jurisdiction.</p>",
    "question_index": 27
  },
  {
    "question": "<p>To change the name of a state, constitution authorizes who among the following?</p>",
    "options": [
      "Prime Minster",
      "President",
      "Parliament",
      "State Legislature",
      "Governor"
    ],
    "correct_option_id": 2,
    "solution": "<p>Article 3 of the Constitution authorizes the Parliament to form new states or alter the areas, boundaries or names of the existing states without their consent. Parliament is not bound by the views of the state legislature and may either accept or reject them.</p>",
    "question_index": 28
  },
  {
    "question": "<p>There are totally how many schedules present in Indian Constitution?</p>",
    "options": [
      "10",
      "11",
      "8",
      "9",
      "12"
    ],
    "correct_option_id": 4,
    "solution": "<p>Schedules are lists in the Constitution that categorise and tabulate bureaucratic activity and policy of the Government. There are totally 12 schedules in Indian constitution. Original constitution had 8 schedules and remaining 4 was added through amendments.</p>",
    "question_index": 29
  }
];
    </script>
