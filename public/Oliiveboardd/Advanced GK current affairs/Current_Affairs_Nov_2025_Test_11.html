nt from 60.7 percent, suggesting rising informal or family-based work. Regular wage and salaried employment in urban areas saw a modest rise to 49.8 percent from 49.4 percent, signalling relative stability in formal jobs. The share of casual labour fell marginally in both rural and urban regions, pointing to a gradual shift toward more stable work categories.</li><br>\t<li><strong>Growth momentum moderates</strong>: - The labour market data come amid signs that India's economy likely grew around 7 percent in the second quarter, slower than the 7.8 percent expansion recorded in the previous quarter, as per Reserve Bank of India (RBI) estimates.</li><br></ul>",

oard for India to build globally competitive quantum hardware and will accelerate the nation's rise toward Prime Minister Modi's vision of a Viksit Bharat by 2047. \"These facilities,\" he said, \"will empower India to design, fabricate and scale its own quantum technologies, ushering in an era of sovereign, secure and world-class scientific innovation.\"</li><br></ul>",

ss structural challenges that constrain Indian exports, including:<br><ul><br>\t<li>limited and expensive trade finance access,</li><br>\t<li>high cost of compliance with international export standards,</li><br>\t<li>inadequate export branding and fragmented market access, and</li><br>\t<li>logistical disadvantages for exporters in interior and low-export-intensity regions.</li><br></ul><br>Under EPM, priority support will be extended to sectors impacted by recent global tariff escalations, such as textiles, leather, gems & jewellery, engineering goods, and marine products. The interventions will help sustain export orders, protect jobs, and support diversification into new geographies. <br>The Directorate General of Foreign Trade (DGFT) will act as the implementing agency, with all processes - from application to disbursal - being managed through a dedicated digital platform integrated with existing trade systems.<br><strong>The Mission is expected to:</strong><br><ul><br>\t<li>facilitate access to affordable trade finance for MSMEs,</li><br>\t<li>enhance export readiness through compliance and certification support,</li><br>\t<li>improve market access and visibility for Indian products,</li><br>\t<li>boost exports from non-traditional districts and sectors, and</li><br>\t<li>generate employment across manufacturing, logistics, and allied services.</li><br></ul><br>EPM represents a forward-looking effort to make India's export framework more inclusive, technology-enabled, and globally competitive, aligning with the vision of Viksit Bharat @2047.",

    "correct_option_id": 2,
    "solution": "Union Minister of State, Ministry of Fisheries, Animal Husbandry and Dairying, Shri George Kurian launched the Marine Fisheries Census (MFC) 2025 Household Enumeration and the VYAS \" BHARAT and VYAS- SUTRA app in Kochi. The launch of MFC 2025 marks a complete and historic digital transformation of the national enumeration process.<br><br>Moving entirely from conventional paper-based methods, it is poised to generate the most comprehensive, granular, and geo-referenced national database to date, laying a robust foundation for evidence-based planning.<br><strong>MFC 2025: Historic Digital Leap and Tech Focus to Power Fisher folk Welfare</strong><br><ul><br>\t<li><strong>Paradigm Shift: Fully Digital and Geo-Referenced Census</strong>: The MFC\"2025 represents a dramatic leap forward from its predecessors (e.g., 2005, 2010, 2016). The entire enumeration of approximately 1.2 million fisher households across 5,000 villages/habitations in 13 coastal States and Union Territories, including the Andaman & Nicobar Islands and Lakshadweep, will be fully digital and paperless.</li><br>\t<li><strong>Enumeration Period</strong>: The core household data collection is scheduled for an extended period of 45 days, from 3 November to 18 December 2025.</li><br>\t<li><strong>Digital Architecture</strong>: The process is powered by a suite of custom-made, multilingual Android applications\"<strong>VyAS\"NAV </strong>(for validation of fishing villages and harbours), <strong>VyAS\"BHARAT</strong> (household and infrastructure enumeration) and <strong>VyAS\"SUTRA</strong> (for real-time supervision and monitoring of households and enumerators) developed by the nodal agency, the ICAR\"Central Marine Fisheries Research Institute (CMFRI).</li><br>\t<li><strong>Efficiency and Accuracy:</strong> This digital approach enables real-time, geo-referenced data collection, eliminating manual errors and significantly accelerating data processing.</li><br>\t<li><strong>Supervision and Oversight:</strong> The entire operation is monitored through multi-tier web dashboards and a supervisory app, ensuring real-time progress tracking, data accuracy, and accountability across all levels of census management.</li><br>\t<li><strong>Comprehensive Preparations and Tech Integration:</strong> The preparatory phase for the MFC\"2025 has been extensive, including pre-census workshops and high-level coordination meets, such as the Coastal States Fisheries Meet 2025. A crucial National Workshop for final operational strategy and coordination held at the ICAR\"CMFRI in Kochi. Parallel to the census, the Department of Fisheries and CMFRI are championing the adoption of drone technology to enhance transparency and efficiency in marine fisheries data collection. Drones have been deployed to conduct aerial enumeration of fishing crafts during trawl ban periods. This includes major harbours on the East Coast\"Vizag, Kakinada, and Tuticorin (April to June)\"and key landing centres on the West Coast\"Mangaluru, Beypore, and Puthiyappa (June to July). Crafts of various types (mechanised, motorized\"onboard, and motorized\"outboard) were counted using drone-based aerial shots, serving as a neutral and verifiable source to support ground-level data collection.</li><br>\t<li><strong>Granular Data for Targeted Welfare: </strong>The scope of the MFC\"2025 has been significantly expanded to capture a deep, granular understanding of the socio-economic status of the coastal population, ensuring future government interventions are more precise and impactful.</li><br>\t<li><strong>Expanded Socio-economic Data:</strong> For the first time, the enumeration includes detailed information on crucial indicators like total family income, homeownership, outstanding liabilities, and sources of credit.</li><br>\t<li><strong>Focus on Vulnerability:</strong> Vital data will be gathered on insurance status, major losses or disabilities, the specific socio-economic impacts of the COVID-19 pandemic on fisher families, and the receipt of benefits from schemes like PMMSY/PM-MKSSY.</li><br>\t<li><strong>Institutional Mapping:</strong> New schedules focusing on Fish Farmer Producer Organizations (FFPOs) and Self-Help Groups (SHGs) are introduced to facilitate collectivization and strengthen the value chain.</li><br></ul><br><strong>Background</strong><br>The National Marine Fisheries Census 2025 (MFC 2025), a coast-wide activity fully funded by the Department of Fisheries, Government of India, and ICAR-Central Marine Fisheries Research Institute (CMFRI) as the nodal agency and Fishery Survey of India (FSI) as the operational partner. <strong>The fifth edition of the Marine Fisheries Census will cover over 1.2 million households across 5,000 marine fishing villages.</strong> The hallmark of this activity is household-level enumeration of fishers, fishing crafts, gears, and infrastructure across 1,200  landing centres, 50 fishing harbours, jetties, markets, and processing plants with the help of specially designed mobile-based applications. MFC 2025, whose slogan is 'Smart Census, Smarter Fisheries' will facilitate better targeting of the PM-MKSSY allocations and infrastructure upgrades. This wealth of new information will be the evidentiary bedrock for refining welfare programs and designing targeted, climate-resilient, and inclusive development strategies for the fishing community. The MFC\"2025 is truly setting a new benchmark for data-driven fisheries governance in India and will help in community-led growth, fostering entrepreneurship among women and youth in coastal ecosystems.",

    "solution": "The share of services in gross value added (GVA) in 2023-24 was the highest in Chandigarh (88.8 per cent), followed by Delhi (84.1 per cent), said a NITI Aayog report released last week. This indicates that a state or union territory (UT), while having high per capita income, is also more services oriented.<br><br>The report only used 22 major states/UTs for the analysis. At the all -India level, the share of services in GVA stood at 54.5 per cent in 2023-24.<br><ul><br>\t<li>In Chandigarh, the services sector is largely concentrated in 'trade & repair services' (35.4 per cent), followed by 'real estate, ownership of dwellings & professional services' (25.7 per cent), 'financial services' (15.9 per cent), 'public administration' (7.7 per cent), and 'other services' (6.8 per cent).</li><br>\t<li>\"The prominence of trade and repair reflects Chandigarh's zoning-led urban planning, which has enabled specialised retail and service corridors catering to the Tri-City region of Chandigarh\"Mohali\" Panchkula. Its dual-capital role sustains demand for professional services such as legal, architectural, and engineering services,\" added the report.</li><br>\t<li>In Delhi as well, 'real estate, ownership of dwellings & professional services' contributed nearly 31 per cent, reflecting robust demand for commercial and consulting services.</li><br>\t<li>'Financial services' contributed 19 per cent \" thus highlighting Delhi's status as a national financial centre with the 'transport & storage' sector contributing 13.7 per cent. This underscores its logistical importance.</li><br>\t<li>Among states, Karnataka has the highest share (62.3 per cent) of services in the gross state value added (GSVA), followed by Kerala (61.5 per cent) and Telangana (60.3 per cent).</li><br>\t<li>'Real estate, ownership of dwellings & professional services' is the biggest contributor in the share of GVA of all these three states.</li><br>\t<li>Surprisingly, Bihar (58 per cent) also has a high share of services in the GSVA, despite having very low per capita income.</li><br>\t<li>For Bihar, trade & repair services' (27.8 per cent) and 'other services' (20 per cent), led by small-scale neighbourhood retail outlets and self-employment, were the biggest contributors.</li><br>\t<li>\"This divergence suggests that the services sector in the state may be primarily characterised by lower productivity and more informal segments,\" the report notes.</li><br>\t<li>Meanwhile, Chhattisgarh (33.9 per cent) has the lowest share of services in the GSVA, due to the dominance of mining and mineral-based industries. The same is true for Odisha as services contribute only 38.2 per cent of the GSVA. </li><br>\t<li>Despite urban centres such as Indore and Bhopal emerging as hubs for information technology (IT), education, and real estate, the share of services in the GVA of Madhya Pradesh (38.8 per cent) remains low.</li><br>\t<li>\"Lower-income states, unless they invest in the right enablers, risk being locked into stagnant or low-return service structures,\" the report said.</li><br>\t<li>Gujarat (36.1 per cent), despite having high per capita income, has a low share of services in the GVA. This perhaps \"stems from a policy that emphasises on industrial and port-led growth.\"</li><br>\t<li>The report by the NITI Aayog is among the first dedicated state-level assessments of output in the services sector, going beyond aggregate trends. It presents a disaggregated and multi-dimensional profile of the sector.</li><br>\t<li>The report concludes that services are less tied to location than manufacturing \" meaning that even geographically remote or landlocked states can benefit from this transformation.</li><br>\t<li>\"With the right investments in broadband, e-governance, and skill development, these states can leapfrog traditional industrial phases and move directly into modern, tradable, knowledge-based services,\" it added. </li><br></ul>",

td></p><p><td>Minimum wages applied only to scheduled industries/employments; large sections of workers remained uncovered</td></p><p><td></p><p>Under the Code on Wages, 2019, all workers to receive a <strong>statutory right minimum wage payment</strong>. Minimum wages and timely payment will ensure financial security.</p><p></td></p><p></tr></p><p><tr></p><p><td>Preventive Healthcare</td></p><p><td>No legal requirement for employers to provide free annual health check-ups to workers</td></p><p><td></p><p>Employers must provide all workers above the age of <strong>40 years with a free annual health check-up</strong>. Promote a timely preventive healthcare culture</p><p></td></p><p></tr></p><p><tr></p><p><td>Timely Wages</td></p><p><td>No mandatory compliance for employers' payment of wages</td></p><p><td></p><p><strong>Mandatory</strong> for employers to provide <strong>timely wages,</strong> ensuring financial stability, reducing work stress, and boostingthe  overall morale of the workers.</p><p></td></p><p></tr></p><p><tr></p><p><td>Women's workforce participation</td></p><p><td>Womens employment in night shifts and certain occupations was restricted</td></p><p><td></p><p><strong>Women are permitted to work at night </strong>and in <strong>all types of work </strong>across all establishments, subject to their consent and required safety measures. Women will get equal opportunities to earn higher incomes in high-paying job roles.</p><p></td></p><p></tr></p><p><tr></p><p><td>ESIC coverage</td></p><p><td>ESIC coverage was limited to notified areas and specific industries; establishments with fewer than 10 employees were generally excluded, and hazardous-process units did not have uniform mandatory ESIC coverage across India</td></p><p><td></p><p><strong>ESIC coverage and benefits are extended Pan-India </strong>- voluntary for establishments with fewer than 10 employees, and mandatory for establishments with even one employee engaged in hazardous processes. Social protection coverage will be expanded to all workers.</p><p></td></p><p></tr></p><p><tr></p><p><td>Compliance Burden</td></p><p><td>Multiple registrations, licenses, and returns across various labour laws.</td></p><p><td></p><p>Single registration, PAN-India single licens,e and single return. Simplified processes and reduction in Compliance Burden.</p><p></td></p><p></tr></p><p></tbody></p><p></table></p>",

ernment or a recognised foreign university or institution or association or CFA Charter from the CFA Institute, and relevant certification from NISM or from any other organisation or institution accredited by NISM\".</li><br>\t<li>On easing the corporatisation process for individual IAs, Sebi said that once an investment adviser crosses the threshold of 300 clients or Rs 3 crore in fees, it should immediately notify the regulator and initiate the transition process.</li><br>\t<li>The IA would then have three months to apply for in-principle approval and an additional three months to complete the conversion to a non-individual entity. During this transition period, the IA would be allowed to onboard new clients and continue collecting fees, Sebi said.</li><br>\t<li>Earlier, an individual IA was required to complete the transition to a corporate structure within three months after crossing the prescribed client or fee limits.</li><br>\t<li>To give these effects, the Securities and Exchange Board of India (Sebi) has amended norms for investment advisers and research analysts. </li><br></ul>",

ss structural challenges that constrain Indian exports, including:<br><ul><br>\t<li>limited and expensive trade finance access,</li><br>\t<li>high cost of compliance with international export standards,</li><br>\t<li>inadequate export branding and fragmented market access, and</li><br>\t<li>logistical disadvantages for exporters in interior and low-export-intensity regions.</li><br></ul><br>Under EPM, priority support will be extended to sectors impacted by recent global tariff escalations, such as textiles, leather, gems & jewellery, engineering goods, and marine products. The interventions will help sustain export orders, protect jobs, and support diversification into new geographies. <br>The Directorate General of Foreign Trade (DGFT) will act as the implementing agency, with all processes - from application to disbursal - being managed through a dedicated digital platform integrated with existing trade systems.<br><strong>The Mission is expected to:</strong><br><ul><br>\t<li>facilitate access to affordable trade finance for MSMEs,</li><br>\t<li>enhance export readiness through compliance and certification support,</li><br>\t<li>improve market access and visibility for Indian products,</li><br>\t<li>boost exports from non-traditional districts and sectors, and</li><br>\t<li>generate employment across manufacturing, logistics, and allied services.</li><br></ul><br>EPM represents a forward-looking effort to make India's export framework more inclusive, technology-enabled, and globally competitive, aligning with the vision of Viksit Bharat @2047.",

    "question": "The Hon'ble President of India, H. E. Smt. Droupadi Murmu delivered a keynote address at the Eighth Session of the International Solar Alliance (ISA) Assembly at the iconic Bharat Mandapam in New Delhi. To convert end-of-life solar waste into opportunities for circular economy and green jobs, which initiative was launched at the ISA Assembly?",

    "solution": "The Hon'ble President of India, H. E. Smt. Droupadi Murmu delivered a keynote address at the Eighth Session of the International Solar Alliance (ISA) Assembly at the iconic Bharat Mandapam in New Delhi.<br><br>This marked the first-ever address by the President of India to the ISA Assembly, underscoring India's commitment to ISA's leadership in advancing global solar energy cooperation and its founding vision of \"One World, One Sun, One Grid advanced by the Hon'ble Prime Minister of India, Shri Narendra Modi.<br><ul><br>\t<li>The ISA, announced at COP21 in Paris, has evolved into a confident, results-driven institution underlining the notion of ambition to action. Over the past decade, it has moved from setting a global vision for solar energy to delivering measurable impact across Member Countries. Guided by its evolving vision anchored around four strategic pillars\"Catalytic Finance Hub, Global Capability Centre & Digitisation, Regional and Country-Level Engagement, and Technology Roadmap & Policy\"the Alliance is building a comprehensive ecosystem that mobilises investment, enhances capacity, informs policy, and promotes technological innovation, ensuring that solar energy becomes accessible, reliable, and affordable worldwide.</li><br>\t<li><strong>Representing the French Co-Presidency of the International Solar Alliance</strong>, <strong>H.E. Mrs Eléonore Caroit, French Minister of State (Ministre Déléguée) for Francophonie, International Partnerships and French Nationals Abroad</strong>, said in a video message: \"France attaches the utmost importance to the International Solar Alliance, which plays a pivotal role in advancing solar energy. Since the launch of the Alliance nearly ten years ago, France has had the honour of serving as co-president alongside India. This longstanding partnership reflects our unwavering commitment to the success of the Alliance and to the acceleration of the energy transition through solar power deployment.\"</li><br>\t<li>India's achievements in solar energy are a powerful source of inspiration. Now the world's third-largest solar power producer, India has achieved 50% of its total installed capacity from non-fossil fuel sources five years ahead of its 2030 target, avoided nearly ₹4 lakh crore (USD ~46 billion) in fossil fuel imports and pollution-related costs, and produced over 1,08,000 GWh of solar electricity. Through ISA, India will help replicate successful initiatives such as PM Surya Ghar \" Muft Bijli Yojana and PM-KUSUM across developing countries, particularly in Africa and small island nations. These programmes demonstrate the transformative impact of decentralised, people-focused energy solutions\"powering homes, supporting livelihoods, and taking energy access to the last mile. This is a shining example of South\"South cooperation, sharing lessons, scaling solutions, and accelerating global solar adoption.</li><br></ul><br><strong>Key Highlights:</strong><br><ul><br>\t<li>Launch of <strong>SUNRISE </strong>\" the <strong>Solar Upcycling Network for Recycling, Innovation & Stakeholder Engagement</strong>. SUNRISE will connect governments, industries, and innovators to unlock the value embedded in solar waste, transforming end-of-life challenges into engines of new industrial growth, green employment, and sustainable resource management.</li><br></ul><br><ul><br>\t<li>A dedicated <strong>One Sun One World One Grid (OSOWOG)</strong> programme, creating a vertical to drive regional solar interconnections. A forthcoming report identifies priority links across East Asia\"South Asia, South Asia\"Middle East, Middle East\"Europe, and Europe\"Africa, with feasibility studies and regulatory work set to begin over the next 2\"3 years.</li><br>\t<li>Ministers and heads of delegations from Small Island Developing States (SIDS) signed an in-principle<strong> Memorandum of Understanding for Procurement under the SIDS Platform</strong>, jointly developed by the <strong>ISA</strong> and the <strong>World Bank Group</strong>. The signing reaffirmed the commitment of 16 Member Countries (Antigua and Barbuda, Belize, Commonwealth of Dominica, Sri Lanka, Dominican Republic, Papua New Guinea, Kiribati, Nauru, Suriname, Saint Kitts & Nevis, Solomon Islands, Maldives, Seychelles, Mauritius, Fiji, Marshall Islands) to advancing solar energy deployment through coordinated procurement, digital integration, and capacity-building to enhance energy resilience.</li><br>\t<li>Unveiling of the <strong>Global Capability Centre</strong> pursuing the vision of Silicon Valley for solar in India using a hub-and-spoke model connecting existing national centres of excellence operating as Solar Technology Application Resource Centre (STAR-C) and introduction to the <strong>ISA Academy</strong>, an online platform with AI-driven personalised learning pathways that democratise access to solar-related knowledge for all.</li><br></ul><br><div style=\"background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;\">The Assembly will also witness the launch of five ISA knowledge products \" <strong>Ease of Doing Solar 2025, Solar PV Skills and Jobs in Africa, Solar Compass: Special Issue on Integrated Photovoltaics, Global Floating Solar Framework, and Global Solar Trends & Outlook 2025</strong>.</div><br>These reports will highlight key trends shaping the global solar landscape:<br><ul><br>\t<li><strong>Ease of Doing Solar (EODS) </strong>notes that global investments in the energy transition reached USD 2083 billion in 2024, with ISA Member Countries contributing USD 861.2 billion, underscoring the rising leadership of the Global South in shaping the clean energy future. Renewable energy attracted USD 725 billion, of which solar power accounted for USD 521 billion\"cementing its position as the dominant driver of the global energy transformation.</li><br></ul><br><ul><br>\t<li><strong>Solar PV Skills and Jobs in Africa</strong> projects the continent's solar workforce to grow from 226,000 today to 2.5\"4.2 million by 2050. Technicians will drive this growth, with 1.3 million roles expected, and small-scale systems accounting for 55% of all jobs. ISA calls for stronger certification, future-ready training, digital learning, and regional cooperation to build a skilled solar workforce for Africa's clean energy future.</li><br></ul><br><ul><br>\t<li><strong>Global Solar Trends & Outlook 2025 </strong>examines the transformation of solar energy from an emerging technology to the dominant force in global clean energy expansion. This comprehensive report provides decision-makers, investors, and development partners with critical insights into the evolving solar landscape.</li><br>\t<li><strong>Solar Compass \" Special Issue on Integrated PV Applications </strong>highlights that now is the moment for Global South leadership in solar innovation. With nearly 70% of buildings in developing countries yet to be constructed, Building-Integrated Photovoltaics (BIPV) offers a transformative opportunity to embed solar into the very fabric of future infrastructure. Through ISA-led initiatives, efforts are underway to reduce BIPV costs to rooftop solar levels and promote enabling policies\"such as solar-ready housing codes\"across the Global South.</li><br></ul><br><ul><br>\t<li><strong>Global Floating Solar Framework </strong>projects global floating solar capacity to expand rapidly over the next decade, with the Asia-Pacific region expected to lead this growth. This expansion reflects falling generation costs, currently between USD 0.05 and 0.07 per kWh, and continued design innovations that are making floating solar a viable alternative to land-based systems. The framework equips countries with the tools to develop strategies tailored to their unique geographies, markets, and social contexts.</li><br></ul><br>The Assembly will conclude with a site visit to BSES Rajdhani Power Limited's Kilokri Battery Energy Storage System, India's largest standalone urban BESS, and the Digital Twin of Network Project in Janakpuri, a landmark initiative introducing India's first large-scale, real-time digital twin for power distribution.<br><strong>About the International Solar Alliance:</strong><br><ul><br>\t<li>The International Solar Alliance is a global initiative launched in 2015 by India and France at COP21 in Paris. It has 125 Member and Signatory Countries. The Alliance works with governments to improve energy access and security worldwide and promotes solar power as a sustainable transition to a clean energy future.</li><br>\t<li>ISA's evolving vision is anchored on four strategic pillars: (1) Catalytic Finance Hub to unlock and mobilise investments at scale; (2) Global Capability Centre and Digitisation to foster innovation, digital platforms, and capacity building across Member Countries; (3) Regional and Country-level Engagement to drive tailored interventions through strategic partnerships and (4) Technology Roadmap and Policy to accelerate the deployment of emerging solar technologies through actionable policy frameworks and knowledge resources.</li><br>\t<li>With its advocacy for solar-powered solutions, ISA aims to transform lives, bring clean, reliable, and affordable energy to communities worldwide, fuel sustainable growth, and improve quality of life. On 6 December 2017, 15 countries signed and ratified the ISA Framework Agreement, making ISA the first international intergovernmental organisation to be headquartered in India.</li><br></ul>",

ives, and technological innovation, positioning itself as a global benchmark in cooperative success.</li><br>\t<li>As the world marks the UN International Year of Cooperatives, the *World Cooperative Monitor 2025* reinforces that the cooperative spirit, exemplified by institutions like IFFCO and Amul, continues to drive equitable growth and resilience. From the grassroots of India's villages to the global economic stage, cooperatives are proving that collective effort remains one of humanity's most powerful tools for transformation.</li><br></ul>",

    "question": "Implemented by the Ministry of Rural Development, National Social Assistance Programme (NSAP) is a fully funded Centrally Sponsored Scheme that extends financial support to individuals living below poverty line (BPL), was introduced in 1995. What is the budgetary allocation of this scheme for the FY2025-26?",

    "correct_option_id": 0,
    "solution": "<p>Introduced on 15 August 1995, the National Social Assistance Programme (NSAP) is a fully funded Centrally Sponsored Scheme that extends financial support to individuals living below poverty line (BPL). Implemented by the Ministry of Rural Development, the programme operates across both rural and urban areas.</p><p>NSAP caters to 3.09 crore beneficiaries with a scheme-wise ceiling/ cap for each State/UT on the number of beneficiaries. This includes 221 lakh elderly persons under the Indira Gandhi National Old Age Pension Scheme (IGNOAPS), 67 lakh beneficiaries under Indira Gandhi National Widow Pension Scheme (IGNWPS), more than 8.33 lakh beneficiaries under Indira Gandhi National Disability Pension Scheme (IGNDPS), 3.5 lakh under National Family Benefit Scheme (NFBS)and 8.31 lakh beneficiaries under Annapurna Scheme, across the country.</p><p>To provide a basic level of social security assistance to the most vulnerable category of citizens, such as the elderly, widows, and the divyangajan.</p><p><ul></p><p><li><strong>Selection:</strong> Gram Panchayats and Municipalities play an active role in identifying eligible beneficiaries under the different NSAP schemes.</li></p><p><li><strong>Disbursement:</strong> Benefits are provided through DBT mode (94%), i.e, beneficiary's bank or post office savings accounts, or via postal money orders. Disbursement through Cash at the doorstep is also allowed by the scheme guidelines in extreme cases where the beneficiary is unable to go to the bank/post office to receive the pension.</li></p><p><li><strong>Monitoring:</strong> States and Union Territories have the flexibility to implement the schemes through any State Government department, but each must appoint a Nodal Secretary at the State level to oversee implementation and coordinate with relevant departments. Progress must be reported quarterly in a prescribed format by the 15th day of the month following each quarter. Non-submission of progress reports is considered a lack of progress and may result in non-release of additional central assistance for the final quarter of the financial year.</li></p><p></ul></p><p>The NSAP at present comprises five sub-schemes as its components -</p><p><ul></p><p><li>Indira Gandhi National Old Age Pension Scheme (IGNOAPS)</li></p><p><li>Indira Gandhi National Widow Pension Scheme (IGNWPS)</li></p><p><li>Indira Gandhi National Disability Pension Scheme (IGNDPS)</li></p><p><li>National Family Benefit Scheme (NFBS)</li></p><p><li>Annapurna Scheme</li></p><p></ul></p><p><strong>1) Indira Gandhi National Old Age Pension Scheme (IGNOAPS)</strong>: -</p><p>The Indira Gandhi National Old Age Pension Scheme extends financial assistance to elderly citizens aged 60 years and above who belong to families living below the poverty line, by the Government of India.</p><p><ul></p><p><li>Under this scheme, individuals between 60 and 79 years of age receive Rs. 200 per month from the Central Government, while those aged 80 years and above are provided Rs. 500 per month.</li></p><p><li>In accordance with the guidelines of the National Social Assistance Programme, States and Union Territories are encouraged to supplement the Central share by contributing an equivalent or higher top-up amount.</li></p><p><li>This additional support helps ensure that the beneficiaries receive a reasonable and dignified level of income. Currently, the top-up provided by States and UTs under the old age pension component ranges from Rs. 50 to Rs. 5700 per month, leading to an average pension of around Rs. 1100 in many of the States/UTs.</li></p><p></ul></p><p><strong>2) Indira Gandhi National Widow Pension Scheme (IGNWPS): - </strong></p><p>Under this scheme, financial assistance is extended to widows aged between 40 and 79 years who belong to families living below the poverty line, as identified by the Government of India.</p><p><ul></p><p><li>Each eligible beneficiary in this age group receives Rs. 300 per month as central assistance. For widows who are 80 years and above, the amount of central assistance is Rs. 500 per month, providing essential financial support to help meet their basic needs.</li></p><p></ul></p><p><strong>3) Indira Gandhi National Disability Pension Scheme (IGNDPS): - </strong></p><p>With a total of Rs. 243.74 crore released to States and Union Territories under the Indira Gandhi National Disability Pension Scheme (IGNDPS) for the year 2024 25, this scheme caters to individuals aged between 18 and 79 years who have severe or multiple disabilities and belong to families living below the poverty line.</p><p><ul></p><p><li>The beneficiaries are eligible for central assistance of Rs. 300 per month. Beneficiaries who are 80 years and above receive Rs. 500 per month, ensuring continued financial support to help them manage their daily needs with dignity.</li></p><p></ul></p><p><strong>4) National Family Benefit Scheme (NFBS)</strong>: -</p><p>Under this scheme, a household living below the poverty line becomes eligible for a lump sum financial assistance in the unfortunate event of the death of its primary breadwinner, provided the deceased was between 18 and 59 years of age.</p><p><ul></p><p><li>The family receives Rs. 20,000 as support to help them cope with the immediate financial difficulties arising from the loss.</li></p><p></ul></p><p><strong>5) Annapurna Scheme: - </strong></p><p>Under the scheme, 10kg of food grains per month are provided free of cost to those senior citizens who, though eligible under the Indira Gandhi National Old Age Pension Scheme (IGNOAPS), are not receiving old age pension.</p><p><strong>Budgetary Allocation: - </strong></p><p>The budget allocation for the National Social Assistance Programme for the year 2025 26 stands at Rs. 9,652 crore.</p><p><table align=\"center\" cellspacing=\"0\" style=\"border-collapse:collapse; width:676.8px\"></p><p><tbody></p><p><tr></p><p><td style=\"background-color:#d9e2f3; border-bottom:1px solid #dddddd;     "question": "Markets regulator SEBI on November 24, 2025 proposed a review of the facility for 'Basic Services Demat Account' (BSDA) to improve financial inclusion, suggesting that Zero Coupon Zero Principal (ZCZP) bonds should be excluded from the portfolio value calculation used to determine BSDA eligibility. How often should Depository Participants (DPs) reassess BSDA eligibility of beneficial owners, as per SEBI's proposal?<br><br>",

    "correct_option_id": 1,
    "solution": "Markets regulator SEBI on November 24, 2025 proposed a review of the facility for 'Basic Services Demat Account' (BSDA) to improve financial inclusion, suggesting that Zero Coupon Zero Principal (ZCZP) bonds should be excluded from the portfolio value calculation used to determine BSDA eligibility.<br><br>The proposal, if implemented, would support the twin objectives of ease of investment and ease of doing business, the Securities and Exchange Board of India (SEBI) said in its consultation paper.<br><ul><br>\t<li>A basic service demat account, or BSDA, is a more basic version of a regular demat account. The facility was introduced by SEBI in 2012 for reducing the burden of demat charges on investors with small portfolios.</li><br>\t<li>The regulator explained that ZCZP bonds are fundamentally distinct from conventional securities held in a demat account because they are non-transferable, non-tradable, and do not provide any monetary return or redemption value to the holder. Their economic value is closer to a social contribution or donation made by the investor rather than an investment asset capable of appreciation, liquidation, or portfolio enhancement.</li><br>\t<li>Since BSDA eligibility is based on the realisable value of an investor's holdings, counting ZCZP bonds, whose value cannot be encashed or traded, may artificially inflate a portfolio and make an investor ineligible for BSDA benefits, it added.</li><br>\t<li>Accordingly, SEBI has proposed that \"ZCZP bonds shall not be considered while calculating the value of holding for the purpose of determining eligibility of demat accounts as BSDA\".</li><br>\t<li>The regulator has also proposed treating delisted securities on par with suspended securities, as both lack active trading, liquidity, and transparent price discovery. Excluding delisted securities from the BSDA valuation would ensure consistency and fairness, especially for investors whose holdings do not represent realisable market value.</li><br>\t<li>For illiquid securities, SEBI noted that while they are not actively traded, they remain listed and can still be traded through specific mechanisms. Accordingly, it has been suggested that the last closing price of such securities be used when determining BSDA eligibility.</li><br>\t<li>To promote ease of doing business for Depository Participants (DPs), SEBI proposed that DPs reassess the BSDA eligibility of existing beneficial owners on a quarterly basis, ensuring system-driven and uniform evaluations across all DPs. It also recommended allowing BO consent to be submitted through additional authenticated digital methods, instead of restricting it to the registered email ID.</li><br></ul>",
