    "question": "In January 2026, while introducing India's first Tailings Policy, the government highlighted the concept of \"companionality\", which refers to the presence of valuable companion elements occurring alongside primary minerals in ore bodies and mine tailings. With specific reference to zinc ores, which of the following elements was not identified in the policy as a commonly associated companion element?",

    "solution": "The central government announced the country's first tailings policy, setting guidelines for exploration of critical minerals from primary as well as the secondary sources like mine dumps and tailings of existing mines. Tailings refer to the leftover waste material after valuable minerals are extracted from crushed ore.<br>The government had, in its last Union Budget, announced to launch a policy for \"recovery of critical minerals from tailings\".<br><br><ul><br>\t<li>The policy was required because the occurrence of critical and strategic elements is not just restricted to the solid mineral resources under the administrative control of the Ministry of Mines but may also be available in other commodities which are being dealt with by various other ministries.</li><br>\t<li>\"Therefore, a coordinated approach among various ministries is essential to identify the location of all the tailing ponds and dumps, their quantity and likely availability of various critical and strategic elements. Based on this, the recoverability and economic viability of these tailings can be evaluated,\" the mines ministry said in a statement.</li><br>\t<li>The new policy is developed on the idea that a few commodities currently mined in India as primary ore may have scope for recovery of companion metals or elements from the tailings, anode slimes, pot linings and slags. For example, a copper mine may have Selenium, Tellurium, Molybdenum, Cobalt, Rhenium, Gold and Silver as companion elements.</li><br>\t<li>Similarly, Zinc is found along with Germanium, Silver, Cadmium, Indium.</li><br>\t<li>The ministry said that Indian Bureau of Mines (IBM), Central Mine Planning & Design Institute (CMPDI) and Atomic Minerals Directorate (AMD) should conduct sample analysis of dumps and tailings of all the existing mines to arrive at \"companionality\" to identify the location of waste dumps, overburden, and tailing ponds for the quantity and likely availability of critical and strategic elements.</li><br>\t<li>Critical minerals, including lithium, cobalt, nickel, rare earth elements (REE), etc., are vital for solar panels, wind turbines, batteries and are essential for India's economic growth.</li><br>\t<li>According to the policy document, a comprehensive approach is required for identification and resource evaluation of the critical minerals occurring in various sources during exploration as well as the exploitation stages involving agencies working in coal, non-coal, atomic minerals and the petroleum sector.</li><br>\t<li>The tailing policy is expected to serve as a standard guideline for tapping critical minerals from primary as well as the secondary sources, and also help in framing a roadmap for the recovery of these critical minerals which will ensure increased domestic production and reduced import dependency, increasing India's self-reliance in these minerals. </li><br></ul>",

    "question": "Securities and Exchange Board of India (Sebi) proposed allowing foreign portfolio investors (FPIs) to net funds across cash market transactions executed on the same day, aimed at easing liquidity pressure and lowering funding costs, especially during high-volume trading sessions such as index rebalancing days. Which of the following aspects will remain unchanged even if SEBI's proposal to allow fund netting for FPIs is implemented?",

    "correct_option_id": 3,
    "solution": "Market regulator Securities and Exchange Board of India (Sebi) proposed allowing foreign portfolio investors (FPIs) to net funds across cash market transactions executed on the same day, a move aimed at easing liquidity pressure and lowering funding costs, especially during high-volume trading sessions such as index rebalancing days.<br>Under the current framework, FPIs must settle all purchase and sale transactions on a gross basis, even when buy and sell values offset each other. This often leads to higher funding costs and operational inefficiencies. FPIs had sought such a relaxation from the regulator last year. <br> <ul><br>\t<li>The proposal \" part of a broader set of measures by Sebi to ease compliance requirements and simplify FPI onboarding \" comes against the backdrop of record outflows from domestic equities last year.</li><br>\t<li>While custodians net their settlement obligations with clearing corporations, FPIs are required to separately fund purchase trades and deliver securities for sale trades. Sebi noted that this practice frequently leaves FPIs underinvested for at least one day, and results in additional costs due to forex slippage and reliance on short-term credit lines.</li><br>\t<li>\"Netting of funds in this context shall mean using the proceeds of sale transactions in the cash market on a particular day to fund the purchase transactions in the cash market done by an FPI on the same day, thereby requiring the FPI to fulfil only the net fund obligation,\" Sebi said.</li><br>\t<li>However, the proposal restricts netting to \"outright\" transactions \" where purchases in one security and sales in another are offset to arrive at a net fund obligation. Netting will not be permitted where an FPI both buys and sells the same security within a settlement cycle. Such trades will continue to be settled on a gross basis, a safeguard Sebi said would help mitigate risks of market manipulation or excessive concentration by large investors.</li><br>\t<li>India follows a T 1 settlement cycle in the cash market. T 1 settlement cycle means trades are finalised (securities move to buyer, funds to seller) one business day after the transaction date (T).</li><br>\t<li>The regulator acknowledged concerns raised by custodians, clearing corporations, and stock exchanges regarding potential operational risks. These include a higher likelihood of trade rejections if sale transactions fail to confirm, increased settlement risk shifting from FPIs to custodians, and system stress during peak trading periods.</li><br>\t<li>Sebi said these risks are adequately mitigated by existing safeguards, including clearing corporations' default waterfall mechanisms and Core Settlement Guarantee Funds. It also pointed out that custodians already settle their obligations with clearing corporations on a net basis, meaning the proposed change would not materially increase clearing corporation exposure. Custodians, however, would need to upgrade their systems to enable validations based on netted obligations.</li><br>\t<li>Importantly, Sebi clarified that securities settlement between FPIs and custodians would continue on a gross basis. As a result, securities transaction tax (STT) and stamp duty will remain unchanged, and continue to be levied on delivery-based transactions.</li><br>\t<li>Implementation of the proposal would require amendments by Sebi as well as the Reserve Bank of India (RBI).</li><br>\t<li>In recent months, Sebi has rolled out several initiatives to ease FPI onboarding, including the use of digital signatures, single-window platform Swagat-FI, and simplified registration norms for investors focused solely on Indian government bonds.</li><br></ul>",

r export credit, aimed at addressing collateral constraints faced by MSME exporters and improving access to bank finance. Under this intervention, a collateral guarantee support for export credit is being introduced in partnership with the Credit Guarantee Fund Trust for Micro and Small Enterprises (CGTMSE). Guarantee coverage of up to 85 per cent will be provided for Micro and Small exporters and up to 65 per cent for Medium exporters, with a maximum outstanding guaranteed exposure of ₹10 crore per exporter in a financial year.</li><br>\t<li>This intervention is designed to complement existing credit guarantee mechanisms and to increase bank lending to export-oriented MSMEs. Detailed guidelines will be notified by CGTMSE, followed by a pilot phase and subsequent integration into a comprehensive revision of export promotion frameworks.</li><br>\t<li>The two interventions will be implemented on a pilot basis with continuous monitoring and data-driven refinements. Through the Export Promotion Mission, the Government aims to lower the cost of exporting, expand access to finance, strengthen India's export brand and diversify export markets, thereby enabling Indian exporters, particularly MSMEs, to integrate more deeply into global value chains and contribute to sustained export-led growth.</li><br>\t<li>The Government of India has launched a range of interventions under the Export Promotion Mission, a flagship initiative approved by the Union Cabinet on 12 November 2025, with a total outlay of ₹25,060 crore for the period from FY 2025\"26 to FY 2030\"31. The Mission seeks to strengthen India's export competitiveness with a sharp focus on MSMEs, first-time exporters and labour-intensive sectors, while supporting market diversification and promotion of value-added exports.</li><br>\t<li>The Export Promotion Mission is jointly implemented by the Department of Commerce, Ministry of MSME and Ministry of Finance. The Mission is structured around two integrated sub-schemes, na     "solution": "Banks and non-banking financial companies (NBFCs) should put a fully automated complaints management system with access to the Internal Ombudsman (IO) and Deputy Internal Ombudsman (DIO), and all unresolved grievances should be auto-escalated to the office of the IO for review, the Reserve Bank of India (RBI) said.<br><ul><br>\t<li>The regulator said the IO should get at least 10 days for review of complaints for which RBI, National Payments Corporation of India, or card network guidelines prescribe a timeline for resolution. For all other cases, a 20-day timeline from the receipt of the complaints has been prescribed.</li><br>\t<li>In the draft guidelines, released on October 7, the timeline to transfer the complaint that has been rejected by regulated entities to the office of the IO is within 20 days and in case of credit information companies, such complaints should be referred to the office of the internal ombudsman within 25 days of receipt.</li><br>\t<li>According to the directions, the office of the IO should not handle complaints received directly from the public, and should deal with the complaints that have already been examined by the bank, but have been partially resolved or being wholly rejected by the bank.</li><br>\t<li>A bank should have three categories on this issue, which are 'fully resolved', 'partially resolved' and 'wholly rejected' in its Complaint Management System for recording the decision on the complaints before escalation to the office of the IO.</li><br>\t<li>Banks have been asked to ensure that the final decision is communicated to the complainant within a period of 30 days from the date of receipt of complaint. The norms are applicable with 10 or more banking outlets in India as on March 31, 2025.</li><br>\t<li>\"The bank shall ensure that a complaint is not closed by the same branch/unit/other touch points, whether it has been resolved (fully or partially) or rejected,\" RBI said.</li><br>\t<li>The regulator has clarified that complaints related to corporate frauds, misappropriation etc., on the part of the bank that do not impact the customer in any manner should not be under the purview of the IO.</li><br>\t<li>The final directions are aimed to strengthen board-level oversight, with Customer Service Committees (CSCs) of banks' boards given responsibilities, including determining the number of IO and DIO. Further, only with the approval of competent authority at the level of a whole-time or executive director, management can overrule the decision of the IO.  </li><br>\t<li>\"All such cases where the decision of the internal ombudsman has been overruled by the competent authority shall be placed before the CSC of the Board of the bank for review,\" the RBI said.</li><br>\t<li>Further, the RBI introduced a detailed quarterly reporting requirement and empowered itself to review cases where customers succeed before the RBI Ombudsman after a bank has rejected an IO's recommendation.</li><br>\t<li>For NBFCs, the final guidelines are applicable only to deposit-taking NBFCs with 10 or more branches and non-deposit-taking NBFCs with asset size of ₹5,000 crore and above having a public customer interface, as on March 31, 2025. Several categories, including housing finance companies, core investment companies, infrastructure finance entities and NBFCs under insolvency or liquidation, have been excluded, unlike draft guidelines.</li><br>\t<li>The central bank has also introduced the same guidelines for other regulated entities such as small finance banks, payments banks, non-bank prepaid payment issuers, and credit information companies.</li><br></ul>",

    "solution": "The government notified the first phase of the Census of India 2027, stating that the house listing and housing census will be carried out between April 1 and September 30, 2026, across all states and Union Territories.<br><ul><br>\t<li>The notification was issued by the Ministry of Home Affairs through the Office of the Registrar General, India, and published in The Gazette of India (Extraordinary).</li><br>\t<li>It states that the first phase of the census \" known as the House Listing and Housing Census (HLO) \" will precede the population count and focus on housing conditions and amenities, not individuals.</li><br>\t<li>\"The houselisting operations for the Census of India 2027 shall take place between April 1, 2026 and September 30, 2026 in all states and Union Territories,\" the notification said.</li><br>\t<li>It added that the exercise will not run continuously for six months but will be conducted over a 30-day period to be decided separately by each state and Union Territory.</li><br>\t<li>The government has also introduced a self-enumeration window ahead of the house-to-house exercise.</li><br>\t<li>\"There shall also be an option for self-enumeration, which shall be conducted in a fifteen-day time period just before the start of house-to-house houselisting operations,\" the gazette stated.</li><br>\t<li>This provision allows households to submit details digitally before enumerators visit.</li><br>\t<li>The notification was issued under the powers conferred by Sections 3 and 17A of the Census Act, 1948, read with the Census Rules, 1990, and supersedes the earlier notification dated January 7, 2020.</li><br>\t<li>It clarified that the first phase would record details of houses, assets and basic amenities, while personal data would be collected later.</li><br></ul><br><strong>Second phase in 2027</strong><br>The second phase \" Population Enumeration (PE) \" will be conducted in February 2027, during which demographic, socio-economic and cultural details of every individual will be collected.<br>However, for Ladakh and snow-bound regions of Jammu and Kashmir, Himachal Pradesh and Uttarakhand, population enumeration will take place earlier, in September 2026, due to climatic conditions.<br><div style=\"background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;\">The Union Cabinet has approved an outlay of Rs 11,718 crore for conducting the census. The last nationwide census was carried out in 2011, with the 2021 exercise deferred due to the Covid-19 pandemic.</div><br><div style=\"background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;\">The government has confirmed that the reference date for Census 2027 will be 00:00 hours on March 1, 2027.</div>",

    "solution": "Union Minister for Finance and Corporate Affairs Smt. Nirmala Sitharaman tabled the Economic Survey 2025-26 in Parliament.Prepared by the Economic Division of the Department of Economic Affairs under the supervision of Chief Economic Adviser V Anantha Nageswaran, the Survey offers government's official assessment of the state of the economy and an outlook for the coming FY.<br>The highlights of the Economic Survey are as follows.<br><br><strong>STATE OF THE ECONOMY</strong><br><br><ol><br>\t<li>The global environment remains fragile, with growth holding up better than expected but risks elevated amid intensifying geopolitical tensions, trade fragmentation and financial vulnerabilities. The impact of these shocks may still surface with a lag.</li><br>\t<li>Against this backdrop, India's performance stands out. <strong>The First Advance Estimates place FY26 real GDP growth at 7.4 per cent and GVA growth at 7.3 per cent, reaffirming India's status as the fastest-growing major economy for the fourth consecutive year.</strong></li><br>\t<li><strong>Private Final Consumption Expenditure grew by 7.0 per cent in FY26, reaching 61.5 per cent of GD</strong>P, the highest since 2012 (FY23 also recorded 61.5 per cent share). This growth is supported by low inflation, stable employment, and increasing real purchasing power. Strong agricultural performance has bolstered rural consumption, while improvements in urban consumption, aided by tax rationalisation, indicate broad-based demand momentum.</li><br>\t<li>Investment activity strengthened in FY26, with <strong>Gross Fixed Capital Formation growing by 7.8 per cent and its share remaining steady at 30 per cent of GDP</strong>. This momentum was buoyed by sustained public capital expenditure and a revival in private investment activity, as evident from corporate announcements.</li><br>\t<li>On the supply side, services remain the main driver of growth. In the first half of FY26, the Gross Value Added (GVA) for services increased by 9.3 per cent, with an estimated 9.1 per cent growth for the entire fiscal year. This trend indicates a broad-based expansion across the sector.</li><br></ol><br><br><strong>FISCAL DEVELOPMENTS: ANCHORING STABILITY THROUGH CREDIBLE CONSOLIDATION</strong><br><br><ol><br>\t<li>The government's prudent fiscal management has strengthened credibility and reinforced confidence in India's macroeconomic and fiscal framework. This led to three sovereign credit rating upgrades in 2025 - by Morningstar DBRS, S&P Global Ratings, and Rating and Investment Information (R&I), Inc.</li><br>\t<li>Centre's revenue receipts strengthened from an average of about 8.5 per cent of GDP in FY16\"FY20 to 9.2% of GDP in FY25 (PA). This improvement was driven by buoyant non-corporate tax collections, which rose from about 2.4 per cent of GDP pre-pandemic to around 3.3 per cent post-pandemic.</li><br>\t<li>The direct tax base expanded steadily, with income tax returns filed increasing from 6.9 crore in FY22 to 9.2 crore in FY25. Higher return filings reflect improved compliance, greater use of technology in tax administration, and a growing number of individuals entering the tax net as their incomes rise.</li><br>\t<li>Gross GST collections during April\"December 2025 stood at ₹17.4 lakh crore, registering a year-on-year growth of 6.7 per cent. GST revenue growth is broadly aligned with prevailing nominal GDP growth conditions. In parallel, high-frequency indicators suggest robust transaction volumes, with cumulative e-way bill volumes during April-December 2025 growing by 21 per cent YoY.</li><br>\t<li>The effective capital expenditure of the Central government rose from an average of 2.7 per cent of GDP in the pre-pandemic period to about 3.9 per cent post-pandemic, and to a higher 4 per cent of GDP in FY25.</li><br>\t<li>Through Special Assistance to States for Capital Expenditure (SASCI), the Centre has incentivised States to maintain capital spending at around 2.4 per cent of GDP in FY25.</li><br>\t<li>The combined fiscal deficit of State Governments stayed broadly stable at around 2.8 per cent of GDP in the post-pandemic period, similar to pre-pandemic levels, but has edged up in recent years to 3.2 per cent in FY25, reflecting emerging pressures on State finances.</li><br>\t<li>India reduced its general government debt-to-GDP ratio by about 7.1 percentage points since 2020, even while maintaining high public investment.</li><br></ol><br><br><strong>MONETARY MANAGEMENT AND FINANCIAL INTERMEDIATION: REFINING THE REGULATORY TOUCH</strong><br><br><strong>Monetary aspects</strong><br><br><ol><br>\t<li>India's monetary and financial sectors have exhibited robust performance in FY26 (April-December 2025), underpinned by strategic policy actions and structural resilience across financial intermediation channels.</li><br></ol><br><br><strong>Banking sector performance</strong><br><br><ol><br>\t<li>A significant improvement has been observed in the asset quality of <strong>scheduled commercial banks (SCBs)</strong>, as evidenced by their GNPA ratio standing at 2.2% in September 2025 and net NPA ratio at 0.5% in September 2025, having reached a multi-decadal low level and record low level, respectively.</li><br>\t<li>As of 31 December 2025, the year-on-year growth in outstanding credit by SCBs increased to 14.5 per cent compared to 11.2 per cent in December 2024.</li><br></ol><br><br><strong>Financial inclusion</strong><br><br><ol><br>\t<li>The Pradhan Mantri Jan Dhan Yojana (PMJDY), launched in 2014, has opened 55.02 crore accounts as of March 2025, with 36.63 crore in rural and semi-urban areas, establishing foundational savings and transaction infrastructure for previously unbanked populations.</li><br>\t<li>The Stand-Up India Scheme offers bank loans ranging from ₹10 lakh to ₹1 crore to SC, ST, and women entrepreneurs for establishing greenfield enterprises.</li><br>\t<li>The PM Street Vendor's Aatmanirbhar Nidhi (PM SVANidhi) scheme is providing collateral-free working capital loans to street vendors.</li><br>\t<li>The Pradhan Mantri Mudra Yojana (PMMY) is financing micro and small enterprises in manufacturing, trading, services, and allied agricultural activities. By October 2025, the scheme had disbursed over ₹36.18 lakh crore across 55.45 crore loan accounts.</li><br></ol><br><br><strong>Other aspects of the financial sector</strong><br><br><ol><br>\t<li>During FY26 (till December 2025), 235 lakh of demat accounts were added, pushing the total count beyond 21.6 crore. A key milestone was the crossing of the 12-crore mark for unique investors in September 2025, with nearly a fourth of them being women.</li><br>\t<li>The mutual fund industry also expanded, with 5.9 crore unique investors as of the end of December 2025, of which 3.5 crore (as of November 2025) were from non-tier-I and tier-II cities, underscoring the diffusion of financial participation beyond traditional urban centres.</li><br>\t<li>India's first international financial services centre at GIFT City is creating an enabling ecosystem to attract and channel global capital.  </li><br></ol><br><br><strong>Outlook for the sector</strong><br><br><ol><br>\t<li>The systemic rise in regulatory quality has received international validation through the Financial Sector Assessment Program (FSAP) conducted jointly by the IMF and World Bank in 2025.  Both reports noted an increasingly resilient, diversified, and inclusive financial system, with total financial sector assets at nearly 187 per cent of GDP in CY 2024 and capital markets expanding from 144 per cent of GDP in CY 2017 to 175 per cent in CY 2024. The assessments found that banks and NBFCs possess adequate capital buffers even under severe stress scenarios.</li><br></ol><br><br><strong>EXTERNAL SECTOR: PLAYING THE LONG GAME</strong><br><br><ol><br>\t<li>Between CY 2005 & CY 2024, India's share of global merchandise exports nearly doubled from 1 per cent to 1.8 per cent, while its share of global commercial services exports more than doubled from 2 per cent to 4.3 per cent.</li><br>\t<li>According to UNCTAD's Trade and Development Report 2025, India ranked among the leading economies in trade partner diversification, ranking third in the Global South and recording a trade diversity score higher than all Global North economies.</li><br>\t<li>India's total exports reached a record USD 825.3 billion in FY25, registering a 6.1 per cent year-on-year growth, driven primarily by robust growth in services exports.</li><br>\t<li>Non-petroleum exports reached a historic high of USD 374.3 billion in FY25, while non-petroleum, non-gems and jewellery exports constituted nearly four-fifths of aggregate merchandise exports.</li><br>\t<li>Services exports touched an all-time high of USD 387.6 billion in FY25, growing by 13.6 per cent, reinforcing India's position as a global hub for technology and business services.</li><br>\t<li>India's current account deficit remained moderate, supported by strong net inflows from services exports and remittances that offset the merchandise trade deficit. In Q2 FY26, India's CAD, at around 1.3 per cent of GDP, compared favourably with several other major economies.</li><br>\t<li>India remained the world's largest recipient of remittances, with inflows reaching USD 135.4 billion in FY25, supporting stability in the external account. The share of remittances from advanced economies increased, reflecting a growing contribution from skilled and professional workers.</li><br>\t<li>India's foreign exchange reserves increased to USD 701.4 billion as of 16 January 2026, providing import cover of about 11 months and covering over 94 per cent of external debt, thereby strengthening resilience against external volatility.</li><br>\t<li>Amid a subdued global investment environment, India continued to attract substantial foreign direct investment, with gross FDI inflows reaching USD 64.7 billion during April-November 2025.</li><br>\t<li>India ranked fourth globally in Greenfield investment announcements in 2024, with over 1,000 projects and emerged as the largest destination for Greenfield digital investments between 2020-24.</li><br></ol><br><br><strong>INFLATION: TAMED AND ANCHORED </strong><br><br><ol><br>\t<li>India recorded the lowest inflation rate since the beginning of the CPI series, with April-Dec '25 average headline inflation coming in at 1.7%. The moderation in retail inflation can primarily be attributed to the general disinflationary trend in food and fuel prices, which together account for 52.7 per cent of India's Consumer Price Index (CPI) basket.</li><br>\t<li>Notably, among major Emerging Markets & Developing Economies (EMDEs), India has recorded one of the sharpest declines in headline inflation in 2025 over 2024, amounting to about 1.8 percentage points.</li><br></ol><br><br><strong>AGRICULTURE AND FOOD MANAGEMENT</strong><br><br><ol><br>\t<li>Between FY15 and FY24, the livestock sector witnessed strong growth, with GVA rising by nearly 195 per cent. The fisheries sector has also performed well, with fish production increasing by more than 140 per cent during 2014-2024, compared to the increase from 2004-14.</li><br>\t<li>With a good monsoon season, India's foodgrain production is estimated to have reached 3,577.3 lakh metric tonnes (LMT) in Agriculture Year (AY) 2024\"25, an increase of 254.3 LMT over the previous year. This growth has been driven by higher output of rice, wheat, maize and coarse cereals (Shree Anna).</li><br>\t<li>Despite rising foodgrain output, horticulture, accounting for about 33 per cent of agricultural GVA, has emerged as a key driver of agricultural growth. In 2024-25, horticulture production reached 362.08 million tonnes (MT), surpassing the estimated food grain production of 357.73 MT.</li><br>\t<li>To improve efficiency in agricultural marketing and infrastructure, the Government is implementing the Agriculture Marketing Infrastructure (AMI) sub-scheme under ISAM and the Agriculture Infrastructure Fund (AIF) to strengthen farm-gate facilities and encourage private sector participation. Price discovery has been enhanced through the e-NAM Scheme, which, as of 31 December 2025, has onboarded about 1.79 crore farmers, 2.72 crore traders and 4,698 FPOs, covering 1,522 mandis across 23 States and 4 UTs.</li><br>\t<li>Farmers' incomes are supported through assured MSP for mandated crops and PM-KISAN income transfers. In addition, the PM Kisan Maandhan Yojana (PMKMY) provides pension support, strengthening farmers' income security and social protection. Since its inception, under PM-KISAN, more than ₹4.09 lakh crore has been released to eligible farmers in 21 instalments. Under PMKMY, 24.92 lakh farmers are enrolled as of 31 December 2025.</li><br></ol><br><br><strong>SERVICES: FROM STABILITY TO NEW FRONTIERS</strong><br><br><ol><br>\t<li>Services' share in GDP rose to 53.6 per cent in H1 FY26; Services' share in GVA stood at the highest ever - 56.4 per cent - as per FAE of FY26 which shows the rising weight of modern, tradable and digitally delivered services.</li><br>\t<li>India is the world's seventh-largest exporter of services, with its share in global services trade more than doubling from 2 per cent in 2005 to 4.3 per cent in 2024.</li><br>\t<li>The services sector continues to be the largest recipient of foreign direct investment inflows, accounting for an average of 80.2 per cent of total FDI during FY23-FY25, up from 77.7 per cent in the pre-pandemic period (FY16-FY20).</li><br></ol><br><br><strong>INDUSTRY'S NEXT LEAP: STRUCTURAL TRANSFORMATION AND GLOBAL INTEGRATION</strong><br><br><ol><br>\t<li>Industrial activity strengthened in FY26, with Industry GVA growing 7.0% (real terms) in H1, despite subdued and persistent global headwinds.</li><br>\t<li>Manufacturing growth accelerated, with GVA expanding 7.72% in Q1 and 9.13% in Q2 FY26, reflecting structural recovery.</li><br>\t<li>Production Linked Incentive (PLI) Schemes across 14 sectors have attracted over ₹2.0 lakh crore of actual investment, generating incremental production/sales exceeding ₹18.7 lakh crore and over 12.6 lakh jobs as of September 2025.</li><br>\t<li><strong>India's innovation performance has strengthened steadily</strong>, with its <strong>Global Innovation Index rank improving to 38th in 2025 from 66th in 2019</strong>.</li><br>\t<li>The India Semiconductor Mission has advanced domestic capabilities, with 10 semiconductor manufacturing and packaging projects approved across 6 States, involving about ₹1.60 lakh crore of investment.</li><br></ol><br><br><strong>INVESTMENT AND INFRASTRUCTURE: STRENGTHENING CONNECTIVITY, CAPACITY AND COMPETITIVENES</strong>S<br><br><ol><br>\t<li>The Government of India's capital expenditure has increased nearly 4.2 times, from ₹2.63 lakhcrore in FY18 to ₹11.21 lakh crore in FY26 (BE), while effective capital expenditure in FY26 (BE) is ₹15.48 lakh crore, positioning infrastructure as a key growth driver.</li><br>\t<li>National highway infrastructure expanded substantially, with the NH network growing by about 60 per cent from 91,287 km (FY14) to 1,46,572 km (FY26, up to December), and operational High-Speed Corridors increasing nearly ten-fold\"from 550 km (FY14) to 5,364 km (FY26, up to December).</li><br>\t<li>Railway infrastructure continued to expand, with the rail network reaching 69,439 route km as of March 2025, a targeted addition of 3,500 km in FY26, and 99.1 per cent electrification achieved by October 2025.</li><br>\t<li>India has emerged as the world's third-largest domestic aviation market, with the number of airports increasing from 74 in 2014 to 164 in 2025.</li><br>\t<li>The power sector recorded sustained capacity expansion, with installed capacity rising 11.6 per cent (y-o-y) to 509.74 GW as of November 2025, and the demand\"supply gap declined from 4.2 per cent in FY14 to nil by November 2025</li><br>\t<li>Power sector reforms delivered a historic turnaround, with DISCOMs recording a positive Profit after Tax (PAT) of ₹2,701 crore in FY25 for the first time, alongside a reduction in AT&C losses from 22.62 per cent (FY14) to 15.04 per cent (FY25). Renewable energy constitutes around 49.83 per cent of total power generation capacity as of November 2025, with India ranking third globally in overall RE and installed solar capacity.</li><br>\t<li>Tele-density reached 86.76 per cent, and 5G services are now available in 99.9 per cent of districts in the country.</li><br>\t<li>Over 81 per cent of rural households have access to clean tap water under the Jal Jeevan Mission, as of October 2025.</li><br>\t<li>Space infrastructure strengthened, with India becoming the fourth nation to achieve autonomous satellite docking (SpaDeX), alongside expanded indigenous missions and increased private-sector participation.</li><br></ol><br><br><strong>ENVIRONMENT AND CLIMATE CHANGE: BUILDING A RESILIENT, COMPETITIVE AND DEVELOPMENT-DRIVEN INDIA</strong><br><br><ol><br>\t<li>During 2025-26 (up to 31st December 2025), a total of 38.61 GW of renewable energy capacity has been installed in the country, which includes 30.16 GW of solar power, 4.47 GW of wind power, 0.03 GW of Bio-Power and 3.24 GW of hydro power</li><br></ol><br><br><strong>EDUCATION AND HEALTH: WHAT WORKS AND WHAT'S NEXT</strong><br><br><ol><br>\t<li>India today operates one of the world's largest school systems, serving 24.69 crore students across 14.71 lakh schools, supported by over 1.01 crore teachers (UDISE  2024-25). </li><br>\t<li>India has made notable gains in school enrolment by strengthening infrastructure and teacher capacity, with schemes like Poshan Shakti Nirman and Samagra Shiksha Abhiyan promoting access and equity. Gross Enrolment Ratio (GER) are 90.9 at the primary stage (Grade I to V), 90.3 at the upper primary (Grade VI to VIII), 78.7 at the secondary stage (Grade IX and X) and 58.4 at the higher secondary stage (Grade XI and XII).</li><br></ol><br><br><strong>Higher education</strong><br><br><ol><br>\t<li>The number of higher education institutions (HEIs) has increased from 51,534 in 2014-15 to 70,018 as of June 2025, significantly improving access.  This increase is marked by substantial growth in universities and colleges. The number of premier higher education institutions (HEIs) has expanded significantly between 2014-15 and 2024-25. It now stands at 23 IITs, 21 IIMs, and 20 AIIMS, alongside the establishment of two international IIT campuses in Zanzibar and Abu Dhabi.</li><br>\t<li>Under the NEP, the higher education system has undergone several reforms.<br>\t<ul><br>\t\t<li> The National Credit Framework (NCrF), which aims to blend academic and skills-based learning, has been adopted by 170 universities.</li><br>\t\t<li>The Academic Bank of Credit covers 2660 institutions, with over 4.6 crore IDs issued, including the generation of 2.2 crore APAAR (Automated Permanent Academic Account Registry)  IDs with credits.</li><br>\t\t<li>153 universities have introduced flexible entry-exit pathways and biannual admissions to achieve the NEP target of 50 per cent GER by 2035.</li><br>\t</ul><br>\t</li><br></ol><br><br><strong>Health</strong><br><br><ol><br>\t<li>Since 1990, India has reduced its maternal mortality rate (MMR) by 86 per cent, far exceeding the global average of 48 per cent. A 78 per cent decline in the under-five mortality rate (U5MR) was achieved, surpassing the global reduction of 61 per cent and a 70 per cent decline in the neonatal mortality rate (NMR) compared to 54 per cent globally during 1990-2023.</li><br>\t<li>The infant mortality rate (IMR) marked a drop of more than 37 per cent over the past decade, declining from 40 deaths per thousand live births in 2013 to 25 in 2023.</li><br></ol><br><br><strong>EMPLOYMENT AND SKILL DEVELOPMENT: GETTING SKILLING RIGHT</strong><br><br><ol><br>\t<li>A total of 56.2 crore people (aged 15 years and above) were employed in Q2 FY26, reflecting a creation of around 8.7 lakh new jobs in Q2 compared to Q1 of FY26. </li><br>\t<li>The Annual Survey of Industries (ASI), which covers the organised manufacturing sector, results for FY24 highlight the manufacturing sector's resilience, showing a 6 per cent YoY increase in employment over the previous year. This translates to an addition of over 10 lakh jobs in FY24 compared to FY23.</li><br>\t<li>The Labour Codes have formally recognised gig and platform workers, expanding social security, welfare funds, and benefit portability.</li><br>\t<li>As of January 2026, the e-Shram portal has successfully registered over 31 crore unorganised workers; women account for over 54 per cent of total registrants, substantially strengthening the reach of gender-focused welfare schemes.</li><br>\t<li>The National Career Service (NCS) is a one-stop solution connecting job seekers, employers, training providers with over 59 million registered job seekers and 5.3 million job providers across diverse sectors and mobilising approximately 80 million vacancies.</li><br></ol><br><br><strong>Skill ecosystem</strong><br><br><ol><br>\t<li>The National Scheme for Upgradation of ITIs proposes to upgrade 1,000 government ITIs, including 200 hub ITIs and 800 spoke ITIs, through smart classrooms, modern labs, digital content, and industry-aligned long- and short-term courses.</li><br></ol><br><br><strong>RURAL DEVELOPMENT AND SOCIAL PROGRESS: FROM PARTICIPATION TO PARTNERSHIPS</strong><br><br><ol><br>\t<li>The World Bank has raised the poverty line from USD 2.15 to USD 3.00 a day, adjusted for the purchasing power of money to 2021 prices. According to the revised IPL, India's poverty rates in 2022-23 were 5.3 per cent for extreme poverty and 23.9 per cent for lower-middle-income poverty.</li><br>\t<li>The general government's social services expenditure (SSE) has shown a rising trend since FY22.</li><br>\t<li>The SSE stands at 7.9% of GDP in FY 2025-26 (BE) against 7.7% in 2024-25 (RE) and 7% in 2023-24.</li><br></ol><br><br><strong>Health of the rural economy</strong><br><br><ol><br>\t<li>As of December 2025, the drone survey under SVAMITVA has been completed in 3.28 lakh villages, against a target of nearly 3.44 lakh villages notified for drone survey. 2.76 crore property cards have been prepared for nearly 1.82 lakh villages. Lead Fertiliser Companies distributed 1,094 drones to SHG Drone Didis in 2023-24 using their own resources, with 500 of these drones provided under the Namo Drone Didi Scheme.</li><br></ol><br><br><strong>EVOLUTION OF THE AI ECOSYSTEM IN INDIA: THE WAY FORWARD</strong><br><br>Smaller, task-specific models deployed across sectors allow innovation to diffuse more evenly, reduce entry barriers for firms, and better fit the diversity of India's economic landscape. India's demand for AI is emerging from real-world problems rather than speculative frontier uses. Across healthcare, agriculture, urban management, education, disaster preparedness, and public administration, there is a growing appetite for AI systems that work on local hardware and operate in low-resource settings.",

    "solution": "The Ministry of Power announced the release of a new \"Draft National Electricity Policy (NEP) 2026\". The Draft NEP 2026 aims to transform the power sector for meeting the vision of Viksit Bharat @2047. The policy, once finalised, intends to replace the existing NEP which was notified in 2005<br><ul><br>\t<li>The first National Electricity Policy, notified in February 2005, addressed fundamental challenges of the power sector, including demand\"supply deficits, limited access to electricity, and inadequate infrastructure. Since then, India's power sector has witnessed transformational progress. Installed generation capacity has increased fourfold with significant private sector participation; universal electrification was achieved by March 2021; a unified national grid became operational in December 2013; and per capita electricity consumption reached 1,460 kWh in 2024\"25. Power markets and exchanges have improved flexibility and efficiency in power procurement across the country.</li><br>\t<li>In spite of these achievements, persistent challenges remain, particularly in the distribution segment like high accumulated losses and outstanding debt. Tariffs in several segments remain non\"cost reflective, and high cross-subsidisation has resulted in elevated industrial tariffs, adversely affecting the global competitiveness of Indian industry.</li><br>\t<li>Against this backdrop, the Draft NEP 2026 sets ambitious yet necessary goals. The Policy targets per capita electricity consumption of 2,000 kWh by 2030 and over 4,000 kWh by 2047. It also aligns with India's climate commitments, including reduction of emissions intensity by 45 percent below 2005 levels by 2030 and achievement of net-zero emissions by 2070, necessitating a decisive shift towards low-carbon energy pathways.</li><br></ul><br><br>Draft NEP 2026 includes following major interventions:<br><br><strong>Resource Adequacy (RA)</strong>:<br><br><ul><br>\t<li>To ensure required capacity expansion through decentralized advance planning, DISCOMs and SLDCs shall prepare RA plans at utility and state levels, in accordance with the regulations of State Commissions.  CEA will prepare a corresponding national plan to ensure adequacy at the national level.</li><br></ul><br><br><strong>Financial Viability & Economic Competitiveness</strong>:<br><br><ul><br>\t<li>Tariffs must be linked to a suitable index for automatic annual revision which operates if no tariff order is passed by the State Commission.</li><br>\t<li>Tariffs should progressively recover fixed costs through demand charges to avoid cross-subsidisation between the tariff components as well as among various categories of consumers.</li><br>\t<li>Exemption of cross-subsidies and surcharges on manufacturing industry, railways and metro railways to increase the economic competitiveness of Indian goods and reduce logistics cost.</li><br>\t<li>Regulatory Commissions, in consultation with Appropriate Governments, may exempt the distribution licensees from the Universal Service Obligation in respect of consumers having a contracted load of 1 MW and above.</li><br>\t<li>Strengthening of dispute resolution mechanism to reduce burden on Regulatory Commissions, enable faster dispute resolution and reduce financial burden on consumers.</li><br></ul><br><br><strong>Renewable Energy Generation & Storage</strong>:<br><br><ul><br>\t<li>RE capacity addition through market-based mechanisms and captive power plants.</li><br>\t<li>Installation of  storage by distribution licensee on behalf of small consumers to get benefit of economies of scale and by bulk consumers themselves to facilitate adoption of  Distributed Renewable Energy (DRE) sources.</li><br>\t<li>Trading of surplus energy from DRE as well storage by consumers themselves (P2P) or through aggregators.</li><br>\t<li>Parity between RE and conventional sources in scheduling and deviation by 2030.</li><br>\t<li>Market-based deployment of storage, use of emerging     "question": "The corporate affairs ministry has decided to reduce the compliance burden on company directors by allowing them to file know-your-customer (KYC) details in a simpler format only once in every three years instead of annually. As per the revised KYC form notified by the Ministry of Corporate Affairs on December 31, 2025, which of the following is NOT among the permitted uses of this form?",

      "Update of email ID",
      "DIN re-activation",

    ],
    "correct_option_id": 4,
    "solution": "The corporate affairs ministry has decided to reduce the compliance burden on company directors by allowing them to file know-your-customer (KYC) details in a simpler format only once in every three years instead of annually.<br>The relaxation in the rule will be effective from March 31 this year, the ministry said in a statement on Thursday.<br /><br>Separately, the ministry has also amended rules for easier voluntary closure of sick government companies through the centralised electronic system or C-PACE.<br><strong>New KYC rules</strong><br><ul><br>\t<li>All directors who have completed their latest KYC requirements are covered under the new provisions and their next filing would be due only by June 30, 2028.</li><br>\t<li>Those who haven't done so will have to get their director identification numbers (DINs) re-activated as per existing provisions by March 31, the ministry said.</li><br>\t<li>The country has more than three million registered company directors. In November alone, 39,406 DINs were registered.</li><br>\t<li>The easier KYC rules follow the ministry's review of the annual KYC requirement for directors under section 12A of the Companies (Appointment & Qualification of Directors) Rules, 2014.</li><br>\t<li>A High-Level Committee on Non-Financial Regulatory Reforms, set up by the government earlier, and other stakeholders had also suggested easing of the rules.</li><br></ul><br><strong>Revised KYC format</strong><br><ul><br>\t<li>The revised KYC form, notified by the ministry on December 31, can be used for KYC compliance, update of mobile number, email ID and residential address, besides DIN re-activation.</li><br>\t<li>\"The verification (through digital signature) by DIN holder/director and certification (through digital signature) by the professional during KYC filing process would be required only if the KYC form is submitted for the update of mobile number or email address or residential addresses,\" the ministry said.</li><br></ul><br><strong>Easier exit for govt firms</strong><br><ul><br>\t<li>In a separate notification, the ministry has amended Companies (Removal of Names of Companies from the Register of Companies) Rules, 2016, to provide for easier voluntary closure of ailing state-run firms and their subsidiaries through the centralised electronic system.</li><br>\t<li>The amendment, notified provides that in such cases, the indemnity bond in respect of one or more directors appointed or nominated by the Centre or state governments will be given by an authorised representative not below the rank of an under-secretary in the administrative ministry or department.</li><br>\t<li>The rules require the bond to be submitted along with the application for the voluntary closure of the state-run company as per section 248(2) of the Companies Act, 2013.</li><br></ul>",

    "question": "The Economic Survey 2025-26 highlighted India's record export performance in FY25, with total exports reaching USD 825.3 billion and services exports at an all-time high of USD 387.6 billion. Under this backdrop, India's current account deficit (CAD) in Q2 FY26 was around what percentage of GDP, supported by strong remittance inflows?",
    "options": [
      "0.8%",
      "1.3%",
      "2.5%",
      "3.2%",
      "4.0%"
    ],
    "correct_option_id": 1,
    "solution": "Union Minister for Finance and Corporate Affairs Smt. Nirmala Sitharaman tabled the Economic Survey 2025-26 in Parliament.Prepared by the Economic Division of the Department of Economic Affairs under the supervision of Chief Economic Adviser V Anantha Nageswaran, the Survey offers government's official assessment of the state of the economy and an outlook for the coming FY.<br>The highlights of the Economic Survey are as follows.<br><br><strong>STATE OF THE ECONOMY</strong><br><br><ol><br>\t<li>The global environment remains fragile, with growth holding up better than expected but risks elevated amid intensifying geopolitical tensions, trade fragmentation and financial vulnerabilities. The impact of these shocks may still surface with a lag.</li><br>\t<li>Against this backdrop, India's performance stands out. <strong>The First Advance Estimates place FY26 real GDP growth at 7.4 per cent and GVA growth at 7.3 per cent, reaffirming India's status as the fastest-growing major economy for the fourth consecutive year.</strong></li><br>\t<li><strong>Private Final Consumption Expenditure grew by 7.0 per cent in FY26, reaching 61.5 per cent of GD</strong>P, the highest since 2012 (FY23 also recorded 61.5 per cent share). This growth is supported by low inflation, stable employment, and increasing real purchasing power. Strong agricultural performance has bolstered rural consumption, while improvements in urban consumption, aided by tax rationalisation, indicate broad-based demand momentum.</li><br>\t<li>Investment activity strengthened in FY26, with <strong>Gross Fixed Capital Formation growing by 7.8 per cent and its share remaining steady at 30 per cent of GDP</strong>. This momentum was buoyed by sustained public capital expenditure and a revival in private investment activity, as evident from corporate announcements.</li><br>\t<li>On the supply side, services remain the main driver of growth. In the first half of FY26, the Gross Value Added (GVA) for services increased by 9.3 per cent, with an estimated 9.1 per cent growth for the entire fiscal year. This trend indicates a broad-based expansion across the sector.</li><br></ol><br><br><strong>FISCAL DEVELOPMENTS: ANCHORING STABILITY THROUGH CREDIBLE CONSOLIDATION</strong><br><br><ol><br>\t<li>The government's prudent fiscal management has strengthened credibility and reinforced confidence in India's macroeconomic and fiscal framework. This led to three sovereign credit rating upgrades in 2025 - by Morningstar DBRS, S&P Global Ratings, and Rating and Investment Information (R&I), Inc.</li><br>\t<li>Centre's revenue receipts strengthened from an average of about 8.5 per cent of GDP in FY16\"FY20 to 9.2% of GDP in FY25 (PA). This improvement was driven by buoyant non-corporate tax collections, which rose from about 2.4 per cent of GDP pre-pandemic to around 3.3 per cent post-pandemic.</li><br>\t<li>The direct tax base expanded steadily, with income tax returns filed increasing from 6.9 crore in FY22 to 9.2 crore in FY25. Higher return filings reflect improved compliance, greater use of technology in tax administration, and a growing number of individuals entering the tax net as their incomes rise.</li><br>\t<li>Gross GST collections during April\"December 2025 stood at ₹17.4 lakh crore, registering a year-on-year growth of 6.7 per cent. GST revenue growth is broadly aligned with prevailing nominal GDP growth conditions. In parallel, high-frequency indicators suggest robust transaction volumes, with cumulative e-way bill volumes during April-December 2025 growing by 21 per cent YoY.</li><br>\t<li>The effective capital expenditure of the Central government rose from an average of 2.7 per cent of GDP in the pre-pandemic period to about 3.9 per cent post-pandemic, and to a higher 4 per cent of GDP in FY25.</li><br>\t<li>Through Special Assistance to States for Capital Expenditure (SASCI), the Centre has incentivised States to maintain capital spending at around 2.4 per cent of GDP in FY25.</li><br>\t<li>The combined fiscal deficit of State Governments stayed broadly stable at around 2.8 per cent of GDP in the post-pandemic period, similar to pre-pandemic levels, but has edged up in recent years to 3.2 per cent in FY25, reflecting emerging pressures on State finances.</li><br>\t<li>India reduced its general government debt-to-GDP ratio by about 7.1 percentage points since 2020, even while maintaining high public investment.</li><br></ol><br><br><strong>MONETARY MANAGEMENT AND FINANCIAL INTERMEDIATION: REFINING THE REGULATORY TOUCH</strong><br><br><strong>Monetary aspects</strong><br><br><ol><br>\t<li>India's monetary and financial sectors have exhibited robust performance in FY26 (April-December 2025), underpinned by strategic policy actions and structural resilience across financial intermediation channels.</li><br></ol><br><br><strong>Banking sector performance</strong><br><br><ol><br>\t<li>A significant improvement has been observed in the asset quality of <strong>scheduled commercial banks (SCBs)</strong>, as evidenced by their GNPA ratio standing at 2.2% in September 2025 and net NPA ratio at 0.5% in September 2025, having reached a multi-decadal low level and record low level, respectively.</li><br>\t<li>As of 31 December 2025, the year-on-year growth in outstanding credit by SCBs increased to 14.5 per cent compared to 11.2 per cent in December 2024.</li><br></ol><br><br><strong>Financial inclusion</strong><br><br><ol><br>\t<li>The Pradhan Mantri Jan Dhan Yojana (PMJDY), launched in 2014, has opened 55.02 crore accounts as of March 2025, with 36.63 crore in rural and semi-urban areas, establishing foundational savings and transaction infrastructure for previously unbanked populations.</li><br>\t<li>The Stand-Up India Scheme offers bank loans ranging from ₹10 lakh to ₹1 crore to SC, ST, and women entrepreneurs for establishing greenfield enterprises.</li><br>\t<li>The PM Street Vendor's Aatmanirbhar Nidhi (PM SVANidhi) scheme is providing collateral-free working capital loans to street vendors.</li><br>\t<li>The Pradhan Mantri Mudra Yojana (PMMY) is financing micro and small enterprises in manufacturing, trading, services, and allied agricultural activities. By October 2025, the scheme had disbursed over ₹36.18 lakh crore across 55.45 crore loan accounts.</li><br></ol><br><br><strong>Other aspects of the financial sector</strong><br><br><ol><br>\t<li>During FY26 (till December 2025), 235 lakh of demat accounts were added, pushing the total count beyond 21.6 crore. A key milestone was the crossing of the 12-crore mark for unique investors in September 2025, with nearly a fourth of them being women.</li><br>\t<li>The mutual fund industry also expanded, with 5.9 crore unique investors as of the end of December 2025, of which 3.5 crore (as of November 2025) were from non-tier-I and tier-II cities, underscoring the diffusion of financial participation beyond traditional urban centres.</li><br>\t<li>India's first international financial services centre at GIFT City is creating an enabling ecosystem to attract and channel global capital.  </li><br></ol><br><br><strong>Outlook for the sector</strong><br><br><ol><br>\t<li>The systemic rise in regulatory quality has received international validation through the Financial Sector Assessment Program (FSAP) conducted jointly by the IMF and World Bank in 2025.  Both reports noted an increasingly resilient, diversified, and inclusive financial system, with total financial sector assets at nearly 187 per cent of GDP in CY 2024 and capital markets expanding from 144 per cent of GDP in CY 2017 to 175 per cent in CY 2024. The assessments found that banks and NBFCs possess adequate capital buffers even under severe stress scenarios.</li><br></ol><br><br><strong>EXTERNAL SECTOR: PLAYING THE LONG GAME</strong><br><br><ol><br>\t<li>Between CY 2005 & CY 2024, India's share of global merchandise exports nearly doubled from 1 per cent to 1.8 per cent, while its share of global commercial services exports more than doubled from 2 per cent to 4.3 per cent.</li><br>\t<li>According to UNCTAD's Trade and Development Report 2025, India ranked among the leading economies in trade partner diversification, ranking third in the Global South and recording a trade diversity score higher than all Global North economies.</li><br>\t<li>India's total exports reached a record USD 825.3 billion in FY25, registering a 6.1 per cent year-on-year growth, driven primarily by robust growth in services exports.</li><br>\t<li>Non-petroleum exports reached a historic high of USD 374.3 billion in FY25, while non-petroleum, non-gems and jewellery exports constituted nearly four-fifths of aggregate merchandise exports.</li><br>\t<li>Services exports touched an all-time high of USD 387.6 billion in FY25, growing by 13.6 per cent, reinforcing India's position as a global hub for technology and business services.</li><br>\t<li>India's current account deficit remained moderate, supported by strong net inflows from services exports and remittances that offset the merchandise trade deficit. In Q2 FY26, India's CAD, at around 1.3 per cent of GDP, compared favourably with several other major economies.</li><br>\t<li>India remained the world's largest recipient of remittances, with inflows reaching USD 135.4 billion in FY25, supporting stability in the external account. The share of remittances from advanced economies increased, reflecting a growing contribution from skilled and professional workers.</li><br>\t<li>India's foreign exchange reserves increased to USD 701.4 billion as of 16 January 2026, providing import cover of about 11 months and covering over 94 per cent of external debt, thereby strengthening resilience against external volatility.</li><br>\t<li>Amid a subdued global investment environment, India continued to attract substantial foreign direct investment, with gross FDI inflows reaching USD 64.7 billion during April-November 2025.</li><br>\t<li>India ranked fourth globally in Greenfield investment announcements in 2024, with over 1,000 projects and emerged as the largest destination for Greenfield digital investments between 2020-24.</li><br></ol><br><br><strong>INFLATION: TAMED AND ANCHORED </strong><br><br><ol><br>\t<li>India recorded the lowest inflation rate since the beginning of the CPI series, with April-Dec '25 average headline inflation coming in at 1.7%. The moderation in retail inflation can primarily be attributed to the general disinflationary trend in food and fuel prices, which together account for 52.7 per cent of India's Consumer Price Index (CPI) basket.</li><br>\t<li>Notably, among major Emerging Markets & Developing Economies (EMDEs), India has recorded one of the sharpest declines in headline inflation in 2025 over 2024, amounting to about 1.8 percentage points.</li><br></ol><br><br><strong>AGRICULTURE AND FOOD MANAGEMENT</strong><br><br><ol><br>\t<li>Between FY15 and FY24, the livestock sector witnessed strong growth, with GVA rising by nearly 195 per cent. The fisheries sector has also performed well, with fish production increasing by more than 140 per cent during 2014-2024, compared to the increase from 2004-14.</li><br>\t<li>With a good monsoon season, India's foodgrain production is estimated to have reached 3,577.3 lakh metric tonnes (LMT) in Agriculture Year (AY) 2024\"25, an increase of 254.3 LMT over the previous year. This growth has been driven by higher output of rice, wheat, maize and coarse cereals (Shree Anna).</li><br>\t<li>Despite rising foodgrain output, horticulture, accounting for about 33 per cent of agricultural GVA, has emerged as a key driver of agricultural growth. In 2024-25, horticulture production reached 362.08 million tonnes (MT), surpassing the estimated food grain production of 357.73 MT.</li><br>\t<li>To improve efficiency in agricultural marketing and infrastructure, the Government is implementing the Agriculture Marketing Infrastructure (AMI) sub-scheme under ISAM and the Agriculture Infrastructure Fund (AIF) to strengthen farm-gate facilities and encourage private sector participation. Price discovery has been enhanced through the e-NAM Scheme, which, as of 31 December 2025, has onboarded about 1.79 crore farmers, 2.72 crore traders and 4,698 FPOs, covering 1,522 mandis across 23 States and 4 UTs.</li><br>\t<li>Farmers' incomes are supported through assured MSP for mandated crops and PM-KISAN income transfers. In addition, the PM Kisan Maandhan Yojana (PMKMY) provides pension support, strengthening farmers' income security and social protection. Since its inception, under PM-KISAN, more than ₹4.09 lakh crore has been released to eligible farmers in 21 instalments. Under PMKMY, 24.92 lakh farmers are enrolled as of 31 December 2025.</li><br></ol><br><br><strong>SERVICES: FROM STABILITY TO NEW FRONTIERS</strong><br><br><ol><br>\t<li>Services' share in GDP rose to 53.6 per cent in H1 FY26; Services' share in GVA stood at the highest ever - 56.4 per cent - as per FAE of FY26 which shows the rising weight of modern, tradable and digitally delivered services.</li><br>\t<li>India is the world's seventh-largest exporter of services, with its share in global services trade more than doubling from 2 per cent in 2005 to 4.3 per cent in 2024.</li><br>\t<li>The services sector continues to be the largest recipient of foreign direct investment inflows, accounting for an average of 80.2 per cent of total FDI during FY23-FY25, up from 77.7 per cent in the pre-pandemic period (FY16-FY20).</li><br></ol><br><br><strong>INDUSTRY'S NEXT LEAP: STRUCTURAL TRANSFORMATION AND GLOBAL INTEGRATION</strong><br><br><ol><br>\t<li>Industrial activity strengthened in FY26, with Industry GVA growing 7.0% (real terms) in H1, despite subdued and persistent global headwinds.</li><br>\t<li>Manufacturing growth accelerated, with GVA expanding 7.72% in Q1 and 9.13% in Q2 FY26, reflecting structural recovery.</li><br>\t<li>Production Linked Incentive (PLI) Schemes across 14 sectors have attracted over ₹2.0 lakh crore of actual investment, generating incremental production/sales exceeding ₹18.7 lakh crore and over 12.6 lakh jobs as of September 2025.</li><br>\t<li><strong>India's innovation performance has strengthened steadily</strong>, with its <strong>Global Innovation Index rank improving to 38th in 2025 from 66th in 2019</strong>.</li><br>\t<li>The India Semiconductor Mission has advanced domestic capabilities, with 10 semiconductor manufacturing and packaging projects approved across 6 States, involving about ₹1.60 lakh crore of investment.</li><br></ol><br><br><strong>INVESTMENT AND INFRASTRUCTURE: STRENGTHENING CONNECTIVITY, CAPACITY AND COMPETITIVENES</strong>S<br><br><ol><br>\t<li>The Government of India's capital expenditure has increased nearly 4.2 times, from ₹2.63 lakhcrore in FY18 to ₹11.21 lakh crore in FY26 (BE), while effective capital expenditure in FY26 (BE) is ₹15.48 lakh crore, positioning infrastructure as a key growth driver.</li><br>\t<li>National highway infrastructure expanded substantially, with the NH network growing by about 60 per cent from 91,287 km (FY14) to 1,46,572 km (FY26, up to December), and operational High-Speed Corridors increasing nearly ten-fold\"from 550 km (FY14) to 5,364 km (FY26, up to December).</li><br>\t<li>Railway infrastructure continued to expand, with the rail network reaching 69,439 route km as of March 2025, a targeted addition of 3,500 km in FY26, and 99.1 per cent electrification achieved by October 2025.</li><br>\t<li>India has emerged as the world's third-largest domestic aviation market, with the number of airports increasing from 74 in 2014 to 164 in 2025.</li><br>\t<li>The power sector recorded sustained capacity expansion, with installed capacity rising 11.6 per cent (y-o-y) to 509.74 GW as of November 2025, and the demand\"supply gap declined from 4.2 per cent in FY14 to nil by November 2025</li><br>\t<li>Power sector reforms delivered a historic turnaround, with DISCOMs recording a positive Profit after Tax (PAT) of ₹2,701 crore in FY25 for the first time, alongside a reduction in AT&C losses from 22.62 per cent (FY14) to 15.04 per cent (FY25). Renewable energy constitutes around 49.83 per cent of total power generation capacity as of November 2025, with India ranking third globally in overall RE and installed solar capacity.</li><br>\t<li>Tele-density reached 86.76 per cent, and 5G services are now available in 99.9 per cent of districts in the country.</li><br>\t<li>Over 81 per cent of rural households have access to clean tap water under the Jal Jeevan Mission, as of October 2025.</li><br>\t<li>Space infrastructure strengthened, with India becoming the fourth nation to achieve autonomous satellite docking (SpaDeX), alongside expanded indigenous missions and increased private-sector participation.</li><br></ol><br><br><strong>ENVIRONMENT AND CLIMATE CHANGE: BUILDING A RESILIENT, COMPETITIVE AND DEVELOPMENT-DRIVEN INDIA</strong><br><br><ol><br>\t<li>During 2025-26 (up to 31st December 2025), a total of 38.61 GW of renewable energy capacity has been installed in the country, which includes 30.16 GW of solar power, 4.47 GW of wind power, 0.03 GW of Bio-Power and 3.24 GW of hydro power</li><br></ol><br><br><strong>EDUCATION AND HEALTH: WHAT WORKS AND WHAT'S NEXT</strong><br><br><ol><br>\t<li>India today operates one of the world's largest school systems, serving 24.69 crore students across 14.71 lakh schools, supported by over 1.01 crore teachers (UDISE  2024-25). </li><br>\t<li>India has made notable gains in school enrolment by strengthening infrastructure and teacher capacity, with schemes like Poshan Shakti Nirman and Samagra Shiksha Abhiyan promoting access and equity. Gross Enrolment Ratio (GER) are 90.9 at the primary stage (Grade I to V), 90.3 at the upper primary (Grade VI to VIII), 78.7 at the secondary stage (Grade IX and X) and 58.4 at the higher secondary stage (Grade XI and XII).</li><br></ol><br><br><strong>Higher education</strong><br><br><ol><br>\t<li>The number of higher education institutions (HEIs) has increased from 51,534 in 2014-15 to 70,018 as of June 2025, significantly improving access.  This increase is marked by substantial growth in universities and colleges. The number of premier higher education institutions (HEIs) has expanded significantly between 2014-15 and 2024-25. It now stands at 23 IITs, 21 IIMs, and 20 AIIMS, alongside the establishment of two international IIT campuses in Zanzibar and Abu Dhabi.</li><br>\t<li>Under the NEP, the higher education system has undergone several reforms.<br>\t<ul><br>\t\t<li> The National Credit Framework (NCrF), which aims to blend academic and skills-based learning, has been adopted by 170 universities.</li><br>\t\t<li>The Academic Bank of Credit covers 2660 institutions, with over 4.6 crore IDs issued, including the generation of 2.2 crore APAAR (Automated Permanent Academic Account Registry)  IDs with credits.</li><br>\t\t<li>153 universities have introduced flexible entry-exit pathways and biannual admissions to achieve the NEP target of 50 per cent GER by 2035.</li><br>\t</ul><br>\t</li><br></ol><br><br><strong>Health</strong><br><br><ol><br>\t<li>Since 1990, India has reduced its maternal mortality rate (MMR) by 86 per cent, far exceeding the global average of 48 per cent. A 78 per cent decline in the under-five mortality rate (U5MR) was achieved, surpassing the global reduction of 61 per cent and a 70 per cent decline in the neonatal mortality rate (NMR) compared to 54 per cent globally during 1990-2023.</li><br>\t<li>The infant mortality rate (IMR) marked a drop of more than 37 per cent over the past decade, declining from 40 deaths per thousand live births in 2013 to 25 in 2023.</li><br></ol><br><br><strong>EMPLOYMENT AND SKILL DEVELOPMENT: GETTING SKILLING RIGHT</strong><br><br><ol><br>\t<li>A total of 56.2 crore people (aged 15 years and above) were employed in Q2 FY26, reflecting a creation of around 8.7 lakh new jobs in Q2 compared to Q1 of FY26. </li><br>\t<li>The Annual Survey of Industries (ASI), which covers the organised manufacturing sector, results for FY24 highlight the manufacturing sector's resilience, showing a 6 per cent YoY increase in employment over the previous year. This translates to an addition of over 10 lakh jobs in FY24 compared to FY23.</li><br>\t<li>The Labour Codes have formally recognised gig and platform workers, expanding social security, welfare funds, and benefit portability.</li><br>\t<li>As of January 2026, the e-Shram portal has successfully registered over 31 crore unorganised workers; women account for over 54 per cent of total registrants, substantially strengthening the reach of gender-focused welfare schemes.</li><br>\t<li>The National Career Service (NCS) is a one-stop solution connecting job seekers, employers, training providers with over 59 million registered job seekers and 5.3 million job providers across diverse sectors and mobilising approximately 80 million vacancies.</li><br></ol><br><br><strong>Skill ecosystem</strong><br><br><ol><br>\t<li>The National Scheme for Upgradation of ITIs proposes to upgrade 1,000 government ITIs, including 200 hub ITIs and 800 spoke ITIs, through smart classrooms, modern labs, digital content, and industry-aligned long- and short-term courses.</li><br></ol><br><br><strong>RURAL DEVELOPMENT AND SOCIAL PROGRESS: FROM PARTICIPATION TO PARTNERSHIPS</strong><br><br><ol><br>\t<li>The World Bank has raised the poverty line from USD 2.15 to USD 3.00 a day, adjusted for the purchasing power of money to 2021 prices. According to the revised IPL, India's poverty rates in 2022-23 were 5.3 per cent for extreme poverty and 23.9 per cent for lower-middle-income poverty.</li><br>\t<li>The general government's social services expenditure (SSE) has shown a rising trend since FY22.</li><br>\t<li>The SSE stands at 7.9% of GDP in FY 2025-26 (BE) against 7.7% in 2024-25 (RE) and 7% in 2023-24.</li><br></ol><br><br><strong>Health of the rural economy</strong><br><br><ol><br>\t<li>As of December 2025, the drone survey under SVAMITVA has been completed in 3.28 lakh villages, against a target of nearly 3.44 lakh villages notified for drone survey. 2.76 crore property cards have been prepared for nearly 1.82 lakh villages. Lead Fertiliser Companies distributed 1,094 drones to SHG Drone Didis in 2023-24 using their own resources, with 500 of these drones provided under the Namo Drone Didi Scheme.</li><br></ol><br><br><strong>EVOLUTION OF THE AI ECOSYSTEM IN INDIA: THE WAY FORWARD</strong><br><br>Smaller, task-specific models deployed across sectors allow innovation to diffuse more evenly, reduce entry barriers for firms, and better fit the diversity of India's economic landscape. India's demand for AI is emerging from real-world problems rather than speculative frontier uses. Across healthcare, agriculture, urban management, education, disaster preparedness, and public administration, there is a growing appetite for AI systems that work on local hardware and operate in low-resource settings.",

rgence</strong>, comprising information convergence and process convergence.</p><p><ul></p><p><li><em>Information convergence</em>focuses on integrating government-generated data at the central and state levels to improve coordination, enable informed decision-making, and strengthen governance outcomes.</li></p><p><li><em>Process convergence</em>aims at aligning and unifying schemes to reduce redundancies, streamline operations, and improve service delivery. This includes merging similar schemes, combining common components, and fostering collaboration across ministries and states to create a cohesive MSME support ecosystem.</li></p><p></ul></p><p><strong>Key recommendations</strong></p><p><ul></p><p><li><strong>Centralized Portal for MSMEs</strong>: The report proposes an<strong>AI-powered centralized digital platform</strong>integrating MSME schemes, compliance, finance, and market intelligence. Drawing on global best practices, the portal would feature information, process, compliance, and market research modules, supported by AI chatbots, dashboards, and mobile access for real-time support to MSMEs.</li></p><p><li><strong>Convergence of Cluster Development Schemes</strong>: Integration of the Scheme of Fund for Regeneration of Traditional Industries (SFURTI) with the Micro and Small Enterprises  Cluster Development Programme (MSE-CDP). It proposes a dedicated sub-scheme for traditional industries, a unified governance structure under MSE-CDP, and consolidated funding with earmarked resources to preserve crafts, arts, and endangered traditional industries while improving scale and efficiency.</li></p><p><li><strong>Convergence of skill development programmes</strong>: The report proposes rationalising of skill initiatives into a three-tier structure covering entrepreneurship and business skills, MSME technical skills, and training for rural and women artisans. This approach merges overlapping schemes, improves coordination among institutions, and retains targeted inations, respectively. </li><br>\t<li>The US has suffered the third largest ranking decline over the past two decades \" after Venezuela and Vanuatu \" falling six places from 4th to 10th, while the UK ranks as the fourth-biggest faller, down four places from 3rd in 2006 to 7th in 2026.</li><br>\t<li>The UAE stands out as the strongest performer on the Henley Passport Index over the past 20 years, adding 149 visa-free destinations since 2006 and climbing 57 places to 5th on the rankings with access to 184 destinations visa-free, driven by sustained diplomatic engagement and visa liberalization.</li><br>\t<li>Countries across the Western Balkans and Eastern Europe have also made significant gains over the past two decades, led by Albania, which climbed 36 places to rank 43rd on the index. Ukraine has risen 34 places (to 30th), followed by Serbia ( 30 to 34th), North Macedonia ( 27 to 38th), and both Bosnia and Herzegovina ( 29) and Georgia ( 26), which now share 42nd place. Together, these advances highlight the impact of regional integration and closer alignment with key partners.</li><br></ul><br><div style=\"background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;\">India's rank of 80 and visa-free score of 55 means Indian travellers still need advance visas for most of Europe, the UK, the US, Canada and large parts of East Asia. While access exists across parts of Southeast Asia, Africa, the Caribbean and island nations, spontaneous travel remains limited compared to peers.</div><br><strong>For context:</strong><br><ul><br>\t<li>China, ranked 59th, has access to 81 destinations</li><br>\t<li>Saudi Arabia, ranked 54th, offers 88 destinations</li><br>\t<li>South Africa, ranked 48th, allows access to 101 destinations</li><br></ul><br>This gap has very real implications for Indian travellers\"longer planning cycles, higher costs, and more documentation for both leisure and business trips.<br><strong>As of January 2026, Indian passport holders have access to 55
