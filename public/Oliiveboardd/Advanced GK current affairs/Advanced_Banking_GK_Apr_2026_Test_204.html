of Indian development assistance and capacity building programs for Africa.</p>",

logue</p><p>2) Establishment of Distinguished Visitors Programme (DVP)'</p><p>3) Launch of dialogue between the two Foreign Ministries on Global Themes, including Climate Change, Arctic, and Maritime Cooperation.'</p><p>4) ROK joining Indo Pacific Oceans Initiative'</p><p>5) ROK joining International Solar Alliance and India joining Global Green Growth Institute (GGGI)'</p><p>6) Commemoration of the Year 2028-29 as Year of India-ROK Friendship.</p>",

    "solution": "<p>The Securities and Exchange Board of India (SEBI) has launched three new Information Technology platforms aimed at strengthening the regulatory framework, enhancing cybersecurity oversight, and improving ease of doing business in India's capital markets. </p><p><u>The announcement was made by SEBI Chairman on March 24, as part of the regulator's broader push towards digital transformation. According to an official statement, the newly introduced platforms are designed to streamline regulatory processes, improve operational efficiency, and bring greater transparency across the ecosystem.</u></p><p>&bull; <b>The initiatives - SUPCOMS, e-adjudication portal, and Cyber-Sec Audit Compliance (C-SAC) are aimed at streamlining communication, digitally enabling quasi-judicial proceedings, and enhancing cybersecurity supervision of SEBI-regulated entities.</b></p><p>&bull; SUPCOMS is a single universal platform for communications and replaces traditional email-centric interactions with SEBI. It ensures all communications are easily accessible and creates a robust institutional memory. \"This transition ensures that, going forward, all communications with external entities remain easily accessible for both SEBI and the entity,\" SEBI stated.</p><p>&bull; C-SAC, an AI-enabled platform, strengthens cybersecurity supervision of SEBI-regulated entities by analysing cyber audit reports, identifying compliance gaps, risk areas, and providing actionable insights. The platform enhances efficiency, reduces manual effort, and supports timely, data-driven supervisory decisions, according to the press release.</p><p>&bull; SEBI further noted that its e-adjudication portal is a next-gen platform designed to digitally enable quasi-judicial proceedings, providing an alternate, transparent platform for all parties involved. The portal facilitates direct interaction with external entities, allowing them to access and download Show Cause Notices, submit replies, and participate in proceedings through a dedicated online hearings module.</p>",

    "question": "<p>The Agricultural and Processed Food Products Export Development Authority (APEDA) has signed a 70-year lease agreement to establish a Basmati &amp; Organic Training Centre-cum-Demo Farm in Pilibhit, Uttar Pradesh. The centre aims to strengthen the Basmati rice ecosystem and promote organic farming practices in India. Which of the following statements Is/are correct? </p><p>I. Basmati rice is a Geographical Indication (GI) product of India and recorded exports worth over USD 5 billion in 2025- 26. </p><p>II. The upcoming centre in Pilibhit will be the first facility in India dedicated to Basmati organic training and demonstration covering both conventional and organic cultivation. </p><p>III. Pilibhit will become the second AICRP centre in Uttar Pradesh's Basmati GI zone after the establishment of this facility.</p>",

    "correct_option_id": 1,
    "solution": "<p>In a significant step towards strengthening the Basmati rice ecosystem in India, the transfer of land for the establishment of a Basmati &amp; Organic Training Centre-cum-Demo Farm at Tanda Bijaisi, Pilibhit, has been formalised through the signing of a 70-year lease agreement between the Agricultural and Processed Food Products Export Development Authority (APEDA), the Department of Agriculture, and the Government of Uttar Pradesh. The proposed Basmati &amp; Organic Training Centre-cum-Demo Farm will be developed over an area of approximately seven acres. The centre will be equipped with facilities including an auditorium, museum and gallery on Basmati and organic farming, conference room, laboratory and storage space for organic farming inputs. The facility is expected to support training and capacity building for Basmati and organic farmers, and also serve as a resource centre for agricultural experts and students. <b>Once established, the facility will be the country's first Basmati organic training and demonstration farm covering both conventional and organic Basmati cultivation</b>. Owing to its location, the centre is expected to benefit farmers and stakeholders in Uttar Pradesh and Uttarakhand.</p><p>&bull; <u>It was also announced that the upcoming centre has been designated as an All India Coordinated Research Projects (AICRP) centre for national-level Basmati trials, as recognised at the 61st Annual Rice Research Group Meeting. With this, Pilibhit will become the third AICRP centre in Uttar Pradesh's Basmati GI zone after Nagina (Bijnor) and BEDF Modipuram, following the operationalisation of the facility. This will facilitate systematic testing and evaluation of new Basmati varieties suited to the region's agro-climatic conditions.</u></p><p>&bull; Basmati rice, a Geographical Indication (GI) product of India, recorded exports valued at USD 5.67 billion in 2025'26, with export volumes reaching around 6.5 million metric tonnes. The sector continues to contribute significantly to India's agricultural exports, with a strong presence in markets across the Middle East, Europe and North America.</p><p>&bull; APEDA is promoting organic farming through training, certification support and market linkage initiatives to facilitate adoption of sustainable agricultural practices. These efforts are aligned with global demand for environmentally responsible produce.</p><p>&bull; The event was attended by Union Minister of State for Commerce and Industry and Electronics and Information Technology, Shri Jitin Prasada, senior public representatives of the district, officials of APEDA, the Government of Uttar Pradesh and other stakeholders.</p>",

    "solution": "<p>India's Palak Gulia and Mukesh Nelavalli broke the world record en route to winning a gold medal in the 10m air pistol mixed team competition at the ISSF World Cup for rifle and pistol in Granada. The win was impressive, as the field included the world champion Chinese pair of Kai Hu and Qianxun Yao, along with Paris Olympics bronze medallist Veronika Major and Akos Nagy of Hungary. With Nelavalli, making his senior debut, shooting a score of 294 as compared to Gulia's score of 287, the Indian pair qualified in second spot behind the Chinese pair. An hour later, the Indian pair won the title, with a 2.9-point lead over the second-placed Chinese pair, setting a new world record and junior world record score of 487.7.</p><p>&bull; As per the new mixed team final format, the top four teams will fight for medals, instead of just the top two as it was earlier. The new final format sees a mixed team firing five shots each in 250 seconds in the first three series before three elimination series consisting of three single shots each.</p><p>&bull; Nelavalli came into the final with 11 inner tens in the qualification and his first series of 50.7 as compared to Gulia's series of 49.4 meant that the Indian team (100.1) led the Chinese pair (99.7) by 0.4 points with the Hungarian pair placed at the third spot (98.8) and the American pair of Nathalia Tobar and Nickolaus Mowrer placed at the fourth spot (96.6).</p><p>&bull; The Indian pair would extend their lead over the second-placed Chinese pair to 2.6 points with Gulia shooting a series of 51.3 and Nelavalli a score of 51.6 after the second series. The last five-shot series saw the Indian pair extending their lead over the Chinese pair to 4.3 points with Gulia shooting a score of 51.4 and Nelavalli a score of 51.0 for a total score of 305.4 with the Chinese trailing at 301.1.</p><p>&bull; The elimination series would see the USA pair bowing out first followed by Hungary, with the Indian pair in the lead by 3.3 points over the Chinese after the fourth and a lead of 2.6 points after the penultimate series. Gulia, who had won the 10m air pistol title in 2023 Hangzhou Asian Games, shot the highest total in the elimination series with a score of 31.5 while Nelavalli shot 30.5 for the Indian pair to win the title.</p>",

    "question": "<p>UNESCO has designated 12 new Global Geoparks across 10 countries, increasing the total number of geoparks worldwide to 241 across 51 countries as part of efforts to preserve geological heritage and promote sustainable development. Which of the following statements are correct? </p><p>I. The total number of UNESCO Global Geoparks has reached 241 across 51 countries. </p><p>II. Malaysia has two newly designated geoparks in the latest list. </p><p>III. India is among the countries where new geoparks have been designated.</p>",
    "options": [
      "I only",
      "II only",
      "II and III only",
      "I and II only",
      "I, II, and III"
    ],
    "correct_option_id": 3,
    "solution": "<p>UNESCO has added 12 new sites to its Global Geoparks network. The expansion marks another significant milestone in the agency's global effort to preserve Earth's geological heritage while promoting sustainable development. The designated geoparks are located in China, France, Greece, Ireland, Japan, Malaysia, Portugal, Russia, Tunisia and Uruguay. The total number of UNESCO Global Geopark sites is now 241, spanning across 51 countries, covering an area of over 882,000 sq km.</p><p>&bull; <b>Changshan UNESCO Global Geopark - China</b></p><p>Located in Quzhou, Zhejiang Province, in eastern China, the park spans approximately 1,043.1 square kilometres. It is celebrated for preserving nearly a billion years of geological evolution and for its mountainous landscape and subtropical monsoon climate.</p><p>&bull; <b>Mt. Siguniang UNESCO Global Geopark - China</b></p><p>The park sits at the transition between the Qinghai-Tibet Plateau and the Sichuan Basin, offering a rare look at the Earth's tectonic history. It is famous for its Oriental Alps scenery and its position as a global biodiversity hotspot.'</p><p>&bull; <b>Terres d'H'rault UNESCO Global Geopark - France</b></p><p>The name reflects its deep connection to the Earth and the Herault River. Spanning 112 municipalities and home to over 100,000 residents, the place is often termed as an \"open-air laboratory\" that showcases a geological history spanning 540 million years.</p><p>&bull; <b>Nisyros UNESCO Global Geopark - Greece</b></p><p>The green space encompasses the entire volcanic island of Nisyros and its surrounding islets. It is renowned for being home to the youngest and most active volcanic system in Greece and one of the best-preserved calderas in the world.'</p><p>&bull; <b>Joyce Country and Western Lakes Global Geopark - Ireland</b></p><p>The diverse terrain features rare formations and dramatic landscapes. It is the first Global Geopark to include a Gaeltacht or Irish-speaking region.'</p><p>&bull; <b>Mine-Akiyoshidai Karst Plateau UNESCO Global Geopark - Japan</b></p><p>Covering the entire Mine City in Yamaguchi Prefecture, it is the 11th site in Japan to receive this status. The place is defined by the themes of White (limestone), Black (coal), and Red (copper).</p><p>&bull; <b>Lenggong UNESCO Global Geopark - Malaysia</b></p><p>The green space is a unique open-air museum that preserves nearly 2 million years of human history. The star attraction is the 11,000-year-old skeleton of \"Perak Man,\" the oldest and most complete prehistoric human skeleton found in Southeast Asia.'</p><p>&bull; <b>Sarawak Delta UNESCO Global Geopark - Malaysia</b></p><p>Known for its \"land-sea-river\" ecosystem, this park comes with sandstone landscapes, including the iconic sea stacks at Bako National Park, which represent the \"Oldest Land of Sarawak.\"'</p><p>&bull; <b>Algarvensis UNESCO Global Geopark - Portugal'</b></p><p>The region's high geodiversity showcases a broad range of rock types and landforms. Two especially distinct geological sites are the tsunami deposits at Lagoa dos Salgados from the 1755 Lisbon Earthquake and the Loule Salt Mine, Portugal's deepest publicly accessible point.</p><p>&bull; <b>Toratau UNESCO Global Geopark - Russian Federation</b></p><p>It is a testament to nearly 300 million years of Earth's history. The main landmarks are the three iconic Shikhans - Toratau, Yuraktau, and Kushtau. These are remnants of a massive barrier reef that thrived in the tropical Paleo-Ural ocean during the Permian period.'</p><p>&bull; <b>Dahar UNESCO Global Geopark - Tunisia'</b></p><p>The region is world-famous for its fossil remains, including bones of giant dinosaurs, crocodiles and turtles. It is particularly known for the discovery of the Tataouinea hannibalis, a unique long-necked dinosaur.</p><p>&bull; <b>Manantiales Serranos UNESCO Global Geopark - Uruguay</b></p><p>This one is covered with ancient mountain ranges and diverse ecosystems. True to its name, which translates to \"Springs of the Sierras, the area is rich in natural springs, wetlands, and aquifers.</p>",
    "question_index": 11
  },

    "question": "<p>The Ministry of Culture has launched 'VM Frames', a national filmmaking competition to commemorate 150 years of Vande Mataram, encouraging creative storytelling across multiple formats. Which of the following statements are correct?</p><p>I. 'VM Frames' includes categories like Reels, AI-based Films, and Short Films.</p><p>II. The competition marks 100 years of Vande Mataram.</p><p>III. The first prize in the Short Films category is '15 lakh.</p>",

      "I, II, and III"

    "correct_option_id": 3,
    "solution": "<p>As part of the nationwide commemoration of 150 years of Vande Mataram, the Ministry of Culture, Government of India, has announced the launch of 'VM Frames' ' a National Filmmaking Competition inviting citizens to creatively interpret the spirit of the National Song through visual storytelling. The year 2025 marks 150 years of Vande Mataram, a defining symbol of India's freedom movement and cultural identity. This milestone is being observed through a year-long commemoration anchored by the Ministry of Culture, in collaboration with States, Union Territories, Ministries, Indian Missions abroad, and citizens across the world. Written by Bankim Chandra Chattopadhyay,'<i>Vande Mataram</i>'holds a distinguished place in India's historical and cultural consciousness. The song's messaging of the motherland as the Divine Feminine inspired generations during the freedom struggle and continues to resonate with the spirit of the nation. </p><p><b>About VM Frames</b> 'VM Frames' seeks to engage filmmakers, creators, and citizens in reimagining the ethos of'<i>Vande Mataram</i>'through contemporary formats. The competition is open across three categories:</p><p>&bull; <b>Reels</b></p><p>&bull; <b>AI-based Films</b></p><p>&bull; <b>Short Films</b></p><p>Participants are encouraged to reflect themes of patriotism, cultural identity, unity, and the vision of a progressive New India. </p><p><b>Awards &amp; Recognition</b> The competition offers awards worth <b>up to Rs. 50 lakh</b>, structured as follows: <b>Reels Category</b></p><p>&bull; First Prize: Rs. 1,50,000</p><p>&bull; Second Prize: Rs. 1,00,000</p><p>&bull; Third Prize: Rs. 50,000</p><p><b>AI Films Category</b></p><p>&bull; First Prize: Rs. 5,00,000</p><p>&bull; Second Prize: Rs. 3,00,000</p><p>&bull; Third Prize: Rs. 1,50,000</p><p><b>Short Films Category</b></p><p>&bull; First Prize: Rs. 15,00,000</p><p>&bull; Second Prize: Rs. 12,00,000</p><p>&bull; Third Prize: Rs. 10,00,000</p>",

    "question": "<p>India's seafood exports reached a record high in FY 2025- 26, driven largely by strong performance in shrimp exports and diversification of export markets. Which of the following statements are correct?</p><p>I. India's seafood exports crossed Rs. 72,000 crore in FY 2025- 26.</p><p>II. Frozen shrimp accounted for more than two-thirds of total export earnings.</p><p>III. China was the largest export destination for India's seafood.</p>",

    "correct_option_id": 4,
    "solution": "<p>India's seafood exports rose to a record Rs. 72,325.82 crore (US$ 8.28 billion) in FY 2025'26, with volumes reaching 19.32 lakh metric tonnes, according to provisional data released by MPEDA. </p><p>&bull; Frozen shrimp remained the primary growth driver, contributing Rs. 47,973.13 crore (US$ 5.51 billion), accounting for over two-thirds of total export earnings. Shipments of shrimp grew 4.6% in volume and 6.35% in value, reinforcing its dominance in India's marine products export basket. The United States retained its position as the largest export destination, with imports totalling US$2.32 billion. </p><p>&bull; However, shipments to the US declined by 19.8% in volume and 14.5% in value, reflecting primarily the impact of reciprocal tariffs. This decline was offset by robust growth in alternative markets such as China, EU and Southeast Asian countries. </p><p>&bull; Exports to China, the second-largest destination, rose 22.7% in value and 20.1% in volume. The European Union posted strong gains, with exports increasing by 37.9% in value and 35.2% in volume. Southeast Asia also recorded significant expansion, with growth of over 36.1% and 28.2% in value and volume, respectively. </p><p>&bull; Exports to Japan grew 6.55% by value, while those to West Asia showed a marginal decline of 0.55%, due to the turmoil in the region during the fag end of the financial year. </p><p>&bull; In terms of logistics, the top five ports- Vizag, JNPT, Kochi, Kolkata and Chennai'accounted for nearly 64% of total export value, highlighting their continued importance in India's seafood export supply chain.</p>",

    "question": "<p>The Ministry of Civil Aviation released the second phase (April 2026) ranking of DGCA-approved Flying Training Organisations (FTOs), a data-driven initiative aimed at improving pilot training standards, safety, and transparency in India's aviation sector. Which of the following statements are correct? </p><p>I. The first phase of FTO ranking was released on 1st October 2025. </p><p>II. Avyanna Aviation Pvt. Ltd. is the only FTO placed in Category 'A' in April 2026 rankings. </p><p>III. The number of FTOs in Category 'B' decreased compared to the previous phase.</p>",

ng:5px;\">29</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bihar Flying Institute</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Patiala Aviation Club</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">31</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">SVKM NMIMS Academy of Aviation</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">32</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">BlueRay Aviation Pvt Ltd</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">33</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Pioneer Flying Club' Academy Pvt Ltd</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">34</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Govt. Aviation Training' Institute</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">35</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Redbird Flight Training Academy Pvt. Ltd</td></tr></table>",

    "question": "<p>The Government has notified the Startup India Fund of Funds 2.0 (FoF 2.0) to mobilize venture and growth capital for startups, building upon the earlier Fund of Funds for Startups (FFS 1.0). Which of the following statements are/is correct?</p><p>I. Startup India FoF 2.0 corpus is Rs. 10,000 crore.</p><p>II. Scheme directly invests in startups without AIFs.</p><p>III. SIDBI is the implementation agency for FoF 2.0.</p>",
    "options": [
      "I only",
      "II only",
      "II and III only",
      "I and III only",
      "I, II, and III"
    ],
    "correct_option_id": 3,
    "solution": "<p>Government notifies <b><u>Startup India Fund of Funds 2.0 with Rs. 10,000</u></b> crore corpus to mobilize capital for startups The Government has notified the Startup India Fund of Funds 2.0 (Startup India FoF 2.0) with a total corpus of Rs. 10,000 crore for the purpose of mobilizing venture and growth capital for the startup ecosystem of the country. </p><p>&bull; The Startup India FoF 2.0 builds upon the strong performance of the Fund of Funds for Startups (FFS 1.0), which was launched in 2016 under the Startup India Action Plan to address funding gaps and catalyse the domestic capital for startups. Startup India FoF 2.0 will have a total corpus of Rs. 10,000 crore for commitments to eligible Alternative Investment Funds (AIFs) spread across the 16th and 17th Finance Commission cycles. Investments under Startup India FoF 2.0 will focus on Alternative Investment Funds supporting priority segments including deep tech startups, early growth stage startups supported by smaller AIFs, technology-driven and innovative manufacturing startups, and sector or stage agnostic startups.</p><p>&bull; Startup India FoF 2.0 will follow a structured selection process for AIFs involving screening by a Venture Capital Investment Committee (VCIC) comprising of veterans from the startup ecosystem, and the Scheme incorporates robust monitoring and oversight mechanisms, while an Empowered Committee (EC) will also be constituted to monitor implementation and performance of the Scheme, and provisions for co-investment by Government and institutional investors under an umbrella framework have been included with appropriate governance safeguards.</p><p>&bull; The operational guidelines and the composition of VCIC will be issued by the Department for Promotion of Industry and Internal Trade (DPIIT).</p><p>&bull; Startup India FoF 2.0 is expected to play a critical role in advancing India's innovation-led growth agenda, and by supporting startups that build globally competitive technologies, products, and solutions, the Scheme will contribute to strengthening India's economic resilience, boosting manufacturing capabilities, generating high-quality jobs, and positioning India as a global innovation hub.</p><p>&bull; The Small Industries Development Bank of India (SIDBI) will commence operationalization of the scheme as the Implementation Agency (IA) with effect from the date of notification, and in addition, another domestic Implementation Agency will also be selected to implement the proposed Scheme.</p><p>&bull; The Startup India FoF 2.0 will contribute to the corpus of SEBI-registered Alternative Investment Funds (AIFs) for investing in entities recognised as 'startups' by the Central Government.</p>",

  {
    "question": "<p>According to Knight Frank's Wealth Report 2026, India has emerged as one of the fastest-growing wealth creators, with a sharp rise in its ultra-high-net-worth individual (UHNWI) population. Which of the following statements is/are correct? </p><p>I. India ranks 6th globally in terms of UHNWI population in 2026. </p><p>II. UHNWI refers to individuals having a net worth of more than $10 million. </p><p>III. India's UHNWI population is projected to grow further by 2031.</p>",
    "options": [
      "I only",
      "I and II only",
      "II and III only",
      "I and III only",
      "I, II, and III"
    ],
    "correct_option_id": 3,
    "solution": "<p>India is emerging as one of the world's fastest-growing wealth creators, with its ultra-high-net-worth individual (UHNWI) population expanding sharply and expected to accelerate further over the next five years, according to Knight Frank's Wealth Report 2026.</p><p>&bull; Between 2021 and 2026, India's UHNWI population ' individuals with net worth exceeding $30 million (Rs'282 crore) ' grew by 63.4%, making it one of the fastest-growing markets globally. This surge reflects a structural shift driven by entrepreneurship, digitalisation, deepening capital markets, and rising participation in equities and private investments.</p><p>&bull; <b>India now ranks as the 6th largest UHNWI market globally, with 19,877 ultra-rich individuals in 2026, accounting for 2.8% of the global total. This share has risen steadily from just over 2% five years ago, underscoring India's increasing relevance in the global wealth landscape.</b></p><p>&bull; <b><u>The growth momentum is expected to continue. Knight Frank projects India's UHNWI population to rise by 27% to 25,217 by 2031</u></b>, supported by sustained expansion across technology, industrials, and financial services. This positions India among the key engines of global wealth creation over the next decade.</p><p>&bull; India's billionaire cohort is also set for strong growth. The country currently has 207 billionaires, ranking third globally after the United States and China. This number is projected to increase by 51% to 313 by 2031, lifting India's share of global billionaires from 6.7% to 8%.</p><p>&bull; <b><u>At a city level, Mumbai continues to dominate, accounting for 35.4% of India's ultra-rich population. However, wealth is becoming more geographically dispersed. Delhi has increased its share to 22.8%, while cities such as Hyderabad and Chennai are gaining ground. Chennai, notably, has seen its share rise from 1.3% in 2015 to 4.8% in 2026, reflecting broader regional economic development.</u></b></p><p>&bull; This decentralisation trend indicates that wealth creation is spreading beyond traditional financial hubs into emerging urban centres, driven by infrastructure growth, startup ecosystems, and expanding business opportunities.</p><p>&bull; Globally, the number of UHNWIs reached 713,626 in 2026, up by over 162,000 since 2021'equivalent to nearly 89 new ultra-wealthy individuals being created every day. While the United States remains the dominant wealth hub, emerging economies like India are playing an increasingly important role in reshaping global wealth distribution.</p><p>&bull; <b>Shishir Baijal, Chairman and Managing Director, Knight Frank India</b>.</p>",
    "question_index": 16
  },

    "question": "<p>The Reserve Bank of India (RBI) has clarified norms regarding corporate credit cards issued under joint liability structure, along with rules on overdue reporting and asset classification. Which of the following statements are/is correct? </p><p>I. Overdue reporting for corporate credit cards under joint liability applies only to the corporate entity. </p><p>II. A credit card account is reported as 'past due' only after more than three days of non-payment. </p><p>III. RBI reduced risk weights on unsecured credit, including credit cards, to 100% in 2023.</p>",

    "question": "<p>The Reserve Bank of India (RBI) has issued guidelines exempting certain smaller NBFCs from registration and introduced a structured exit route for the first time. Which of the following statements is/are correct? </p><p>I. NBFCs with assets below Rs. 1,000 crore, no public funds, and no customer interface are classified as Unregistered Type I NBFCs. </p><p>II. RBI has provided a one-time window for deregistration till December 31, 2026 through the PRAVAAH portal. </p><p>III. NBFCs with assets of Rs. 1,000 crore or more are also exempt from registration under this framework.</p>",

    "solution": "<p>The Reserve Bank of India (RBI) issued final guidelines exempting non-banking financial companies (NBFCs) that do not avail of public funds, do not have a customer interface, and have assets of less than Rs. 1,000 crore from the requirement to register with it. <u>These NBFCs will be classified as 'Unregistered Type I NBFCs'.</u></p><p>&bull; Entities falling in this category will be exempt from registration requirements, provided they meet specified conditions, including operating a long-term business model without public funds or customer exposure. Boards must pass resolutions affirming compliance, while statutory auditors must certify the absence of public funds and customer interface.</p><p>&bull; Existing NBFCs meeting these criteria have been given a one-time window to apply for deregistration by December 31, 2026 ' introducing, for the first time, a structured exit route from the regulatory framework. Applications for deregistration must be made through the RBI's PRAVAAH (Platform for Regulatory Application, Validation, and Authorisation) portal. The regulations will come into effect on July 1.</p><p>&bull; The deregistration route is not unconditional. Applicants must submit audited financial statements for the past three years, a statutory auditor's certificate confirming the absence of public funds and customer interface, and a board resolution committing to maintain these conditions going forward. The RBI has reserved the right to refuse deregistration if it is not satisfied that the business model is genuinely and durably of the Type I variety.'</p><p>&bull; <u>NBFCs in this category with assets of Rs. 1,000 crore or more will be required to obtain registration as Type I NBFCs, while all other NBFCs will fall under the broader Type II classification.</u></p><p>&bull; The central bank has mandated aggregation of assets across group entities. If the combined assets of multiple such NBFCs within a group exceed Rs. 1,000 crore, all will be required to register and comply with applicable norms.'</p><p>&bull; The RBI has also tightened definitions to prevent regulatory arbitrage, clarifying that indirect access to public funds ' such as through group entities ' will be treated as public funding. NBFCs must not only avoid public funds and customer interface at present, but also demonstrate no intention to do so in future.'</p><p>&bull; Unregistered Type I NBFCs will continue to be governed by relevant provisions of the RBI Act. The regulator has reserved the right to issue directions or initiate action in case of concerns.'</p><p>&bull; Auditors have been given a more active role, with a requirement to file exception reports directly with the RBI if an entity breaches conditions relating to public funds or customer interface. The framework also introduces forward-looking conditions, requiring NBFCs to confirm not just current compliance, but also the absence of any intent to access public funds or customers in future.'</p><p>&bull; The amendments also place limits on overseas expansion. Unregistered Type I NBFCs seeking to undertake financial services investments abroad will first be required to obtain registration and prior approval from the RBI, and will be subject to existing overseas investment norms applicable to NBFCs.</p>",

    "question": "<p>The Reserve Bank of India (RBI) has introduced a phased reporting framework for OTC foreign exchange (FX) derivative contracts involving the rupee, to be implemented from July 2027, aiming to enhance transparency and price discovery. Which of the following statements are correct? </p><p>I. The reporting norms will be implemented in phases starting from July 1, 2027.</p><p>II. AD Category-I banks must report FX derivative transactions to CCIL. </p><p>III. The framework excludes non-deliverable FX derivative contracts.</p>",

    "solution": "<p>The Reserve Bank of India (RBI) will implement its reporting framework for over-the-counter (OTC) foreign exchange (FX) derivative contracts involving the rupee in phases from July 1, 2027 onwards, while retaining most of the provisions set out in its draft directions for Authorised Dealer Category-I (AD Cat-I) banks. </p><p>&bull; The phased timeline follows feedback from market participants that sought more time to meet reporting thresholds. Banks will now be required to ensure that reported transactions account for at least 70 per cent, 80 per cent and 90 per cent of the notional value of such contracts over a staggered period. </p><p>&bull; The directions require AD Cat-I banks to report OTC foreign exchange derivative contracts involving the rupee, including those undertaken globally by their offshore related parties, to the trade repository of the Clearing Corporation of India Ltd (CCIL). The feedback highlighted operational challenges in capturing and reporting transactions undertaken by related entities across jurisdictions. </p><p>&bull; The RBI did not accept this, saying the requirement is aimed at improving transparency and enabling price discovery in the foreign exchange market, and noted that some standalone primary dealers already comply with similar norms. </p><p>&bull; The norm defines 'related party' in line with equivalent accounting standards, excluding associates. The feedback had proposed limiting the scope to AD Cat-I banks and their offshore branches, which the RBI did not accept, saying the exclusion of associates already narrows the definition. </p><p>&bull; The RBI accepted feedback seeking clarity on the scope of transactions. It stated that both deliverable and non-deliverable OTC foreign exchange derivative contracts involving the rupee will be covered under the framework.</p>",
