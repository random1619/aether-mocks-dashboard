    "question": "<p>As pe the NPCI data released in July 2025, Unified Payments Interface (UPI) transactions dipped 1.5 per cent in June to 18.4 billion, compared to the record 18.68 billion last month. Identify which among the following statement(s) is/are correct in context of the same.</p><p>I. June Immediate Payment Service (IMPS) transactions were at 448 million, down 3 per cent from 464 million in May.</p><p>II. The number of FASTag transactions witnessed a decline of 4 per cent to 386 million in June, from 404 million in May.</p><p>III. Aadhaar Enabled Payment System (AePS) transactions in June dipped 8 per cent to 97 million, compared to 105 million in May. </p>",
    "options": [
      "III Only",
      "I and II Only",
      "II and III Only",
      "I Only",
      "I, II and III"
    ],
    "correct_option_id": 4,
    "solution": "<p><u>Unified Payments Interface (UPI) transactions dipped 1.5 per cent in June to 18.4 billion, compared to the record 18.68 billion last month.</u> Transaction value declined 4 per cent to Rs 24.04 trillion, compared to Rs 25.14 trillion in May.</p><p>Transactions in June grew 32 per cent from the year before and their value was up 20 per cent, according to data provided by NPCI.</p><p>&#183; <u>The number of daily transactions increased from 602 million in May to 613 million in June this year.</u> The value of daily transactions fell to Rs 80,131 crore in June, from Rs 81,106 crore in May.</p><p>&#183; <u>June Immediate Payment Service (IMPS) transactions were at 448 million, down 3 per cent from 464 million in May.</u> In value terms, this was a 5 per cent decline to Rs 6.06 trillion in June, from Rs 6.41 trillion in May. There were 449 million IMPS transactions in April and they were valued at Rs 6.22 trillion.</p><p>&#183; <u>IMPS transactions in June declined 13 per cent and grew 5 per cent in value from the year before.</u> The number of daily transactions dipped from 14.96 million to 14.94 million between May and June this year, leading to a drop in daily value from Rs 20,673 crore to Rs 20,212 crore.</p><p>&#183; <u>The number of FASTag transactions witnessed a decline of 4 per cent to 386 million in June, from 404 million in May.</u> Their value dropped 4 per cent from Rs 7,087 crore in May to Rs 6,793 crore in June. In April, this was recorded at 383 million and Rs 6,801 crore, respectively.</p><p>&#183; <u>The June FASTag numbers were 16 per cent up in volume and 18 per cent in value versus the same month in 2024. </u>The number of daily transactions dipped to 12.88 million from 13.05 million. This was reflected in value as well, which declined to Rs 226 crore from Rs 229 crore last month.</p><p>&#183; <u>Aadhaar Enabled Payment System (AePS) transactions in June dipped 8 per cent to 97 million, compared to 105 million in May.</u> The value of transactions during June this year was Rs 26,616 crore, down 7 per cent from Rs 28,703 crore in May.</p><p>&#183; The number of daily transactions was 3.24 million against May's 3.37 million volume. In value too, this was down to Rs 887 crore, as against Rs 926 crore in May. AePS saw a 3 per cent dip in volume and 6 per cent growth in value compared to June 2024.</p><p><img width=569 height=375 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28980/image001.png\"></p>",
    "question_index": 0
  },
  {
    "question": "<p>In July 2025, Meta has taken a decisive step to combat financial misinformation and protect investors in India by mandating SEBI registration verification for all securities and investment ads on its platforms, including Facebook, Instagram, Messenger, and WhatsApp. Which of the following statement(s) are/is not correct in context of this?</p><p>I. Effective August 30, 2025, this policy applies to all advertisers whether based in India or abroad targeting Indian users with investment-related content. </p><p>II. Advertisers will have at least one month to comply once eligible, and ads published before August 30 will require retroactive changes if the advertiser's account is verified under the new system.</p><p>III. Ads focused solely on financial education or skill-building may not require SEBI verification, but alternate verification still applies.</p>",
    "options": [
      "I and II Only",
      "II Only",
      "III Only",
      "I and III Only",
      "I, II and III"
    ],
    "correct_option_id": 0,
    "solution": "<p>Meta has taken a decisive step to combat financial misinformation and protect investors in India by mandating SEBI registration verification for all securities and investment ads on its platforms, including Facebook, Instagram, Messenger, and WhatsApp.</p><p>&#183; <u>Effective July 31, 2025, this policy applies to all advertisers' whether based in India or abroad' targeting Indian users with investment-related content. </u></p><p>&#183; Advertisers must submit valid SEBI registration details, with the verified SEBI number, organization name, and location displayed publicly on each ad, alongside mandatory disclaimers.</p><p>&#183; This transparency enables users to easily distinguish between regulated financial advice and unverified content, directly addressing the surge in scams and misleading promotions by unregistered advisors and so-called 'finfluencers'.</p><p>&#183; The new rules have a global reach, covering all campaigns aimed at Indian audiences, regardless of the advertiser's location.</p><p>&#183; For those exempt from SEBI registration, such as financial educators or trainers, Meta has introduced alternate verification pathways. Individuals must provide a government-issued ID, while organizations are required to upload business documents, ensuring that even educational content is traceable and accountable.</p><p>&#183; <u>Ads focused solely on financial education or skill-building may not require SEBI verification, but alternate verification still applies.</u></p><p>&#183; Meta began rolling out the verification process on June 26, 2025, with full global availability expected by July 28, 2025.</p><p>&#183; <u>Advertisers will have at least one month to comply once eligible, and ads published before July 31 do not require retroactive changes if the advertiser's account is verified under the new system.</u> Importantly, verification information will remain accessible in Meta's Ad Library for up to seven years, supporting long-term transparency and regulatory oversight.</p><p><img width=456 height=536 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28980/image002.png\"></p>",
    "question_index": 1
  },
  {
    "question": "<p>In July 2025, through an official statement, the Reserve Bank of India has advised all banks to integrate the Financial Fraud Risk Indicator tool developed by the Department of Telecom to curb online fraudulent transactions. Which of the following is NOT a data source used for the Financial Fraud Risk Indicator (FRI) tool developed by the Department of Telecom?</p><p>I. National Cybercrime Reporting Portal (NCRP)</p><p>II. Chakshu platform</p><p>III. Intelligence shared by banks and financial institutions</p><p>IV. Ministry of Corporate Affairs portal</p><p>V. Indian Cyber Crime Coordination Centre (I4C)</p>",
    "options": [
      "II Only",
      "I and V Only",
      "II, III and IV Only",
      "I, III, IV and IV Only",
      "IV Only"
    ],
    "correct_option_id": 4,
    "solution": "<p><u>The Reserve Bank of India has advised all banks to integrate the Financial Fraud Risk Indicator tool developed by the Department of Telecom to curb online fraudulent transactions</u>, an official statement said.</p><p>Banks and financial institutions can use the Financial Fraud Risk Indicator (FRI) in real time, which classifies mobile numbers based on their association with medium,</p><p>high or very high risk of financial fraud.</p><p>&#183; <u>The data is collected from various sources, including reporting on the Indian Cyber Crime Coordination Centre (I4C's) National Cybercrime Reporting Portal (NCRP), DoT's Chakshu platform, and Intelligence shared by banks and financial institutions.</u></p><p>&#183; <u>Launched in May 2025 by DoT's Digital Intelligence Unit (DIU), the system's utility has already been demonstrated, with leading institutions like PhonePe, Punjab National Bank, HDFC Bank, ICICI Bank, Paytm, and India Post Payments Bank actively using the platform.</u></p><p>&#183; DoT called the RBI move a \"watershed moment in the fight against cyber-enabled financial frauds\" and,</p><p>&#183; testament to the power of inter-agency collaboration in safeguarding citizens in India's growing digital economy.</p><p>&#183; \"It also underscores the strategic importance of automating data exchange between banks and DoT's DIP through API-based integration, enabling real-time responsiveness and continuous feedback to further refine the fraud risk models,\" the statement said.</p>",
    "question_index": 2
  },
  {
    "question": "<p>The Indian government has announced that, starting from July 16, 2025, all government payments exceeding _____________ must be processed through the Reserve Bank of India's (RBI) e-Kuber system. Previously, the threshold for mandating payments through e-Kuber was Rs. 500 crore, later reduced to __________________ for certain transactions specified by the Centre.</p>",
    "options": [
      "Rs. 95 crore; Rs. 105 crore",
      "Rs. 75 crore; Rs. 150 crore",
      "Rs. 100 crore; Rs. 300 crore",
      "Rs. 75 crore; Rs. 100 crore",
      "Rs. 150 crore; Rs. 200 crore"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Indian government has announced that, starting from July 16, 2025, all government payments exceeding Rs. 75 crores must be processed through the Reserve Bank of India's (RBI) e-Kuber system.</p><p><b><u>Here's why this is a significant change:</u></b></p><p>&#183; <b>Faster Reconciliation: </b>The primary goal is to drastically reduce the time it takes for government departments to reconcile their accounts, aiming for completion within 24 hours of funds being released.</p><p>&#183; <b>Real-time Expenditure Tracking: </b>This move will enable the central government to gain real-time insights into expenditure, a process that currently faces delays of at least a month.</p><p>&#183; <b>Enhanced Transparency: </b>Using e-Kuber will minimize discrepancies between central accounts and ministry bank statements, promoting greater transparency in government spending.</p><p>&#183; <b>Improved Vendor Payments: </b>Tracking delays in payments to vendors and contractors will become easier, potentially leading to faster settlements.</p><p>The e-Kuber system is the RBI's core banking solution (CBS), designed to manage various banking operations, including government transactions, government securities auctions, and fund management. It facilitates seamless financial operations by enabling banks to connect their single current account across the country.</p><p><b>Background and future prospects</b></p><p>&#183; <u>Previously, the threshold for mandating payments through e-Kuber was Rs. 500 crores, later reduced to Rs. 100 crore for certain transactions specified by the Centre.</u></p><p>&#183; The government may further reduce the threshold to '50 crore in the future, expanding the scope of transactionss under the e-Kuber system.</p><p>&#183; This initiative is part of a broader push to digitize and enhance accountability and efficiency within public finance in India.</p>",
    "question_index": 3
  },
  {
    "question": "<p>In July 2025, the Reserve Bank issued draft guidelines for novation of OTC derivative contracts to rationalising the related regulatory requirements. Which among the following statement(s) about the novation of OTC derivative is/are correct?</p><p>I. Novation is the replacement of one party in an OTC derivative contract with another, forming a new agreement with the transferee.</p><p>II. At present, the novation of OTC derivative contracts is governed by the RBI circular dated December 9, 2013.</p><p>III. As per the draft, market participants can't use a standard master agreement for novation.</p>",
    "options": [
      "II and III Only",
      "III Only",
      "II Only",
      "I and II Only",
      "I Only"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Reserve Bank issued draft guidelines for novation of OTC derivative contracts to rationalising the related regulatory requirements.</p><p><u>Novation means the replacement of a market maker with another market maker in an OTC derivative contract between two counterparties to an OTC derivative transaction with a new contract between remaining party and a third party(transferee).</u></p><p>The transaction shall be undertaken at prevailing market rates, said the Draft Reserve Bank of India (Novation of OTC Derivative Contracts) Directions, 2025.</p><p>&#183; \"The novation of an OTC derivative contract shall be done with the prior consent of the remaining party,\" it said.</p><p>&#183; It further added that the Fixed Income Money Market and Derivatives Association of India (FIMMDA) and the Foreign Exchange Dealers' Association of India (FEDAI), as applicable, in consultation with market participants and based on international best practices, shall devise standard agreements for novation.</p><p>&#183; <u>\"Market participants may, alternatively, use a standard master agreement for novation,\"</u> the draft said.</p><p>&#183; <u>At present, the novation of OTC derivative contracts is governed by the RBI circular dated December 9, 2013.</u></p><p>&#183; The provisions of the circular have been reviewed in the light of changes in the overall regulatory framework governing OTC derivatives since 2013 and the market feedback received, as well as with a view to rationalising the related regulatory requirements, the RBI said.</p>",
    "question_index": 4
  },
  {
    "question": "<p>The Reserve Bank of India (RBI) on July 11 clarified that loans sanctioned by banks against the voluntary pledge of gold and silver as collateral, up to the collateral-free limit, will not be considered a violation of the guidelines on collateral. In June 2025, the central bank released the final guidelines for lending against gold and silver collateral. As per this final guideline which among the following statement(s) is/are correct?</p><p>I. Lenders shall not grant any advance or loan against primary gold or silver, or financial assets backed by primary gold or silver.</p><p>II. Lenders can avail loans by re-pledging gold or silver that has already been pledged to them by their borrowers.</p><p>III. A suitable document or declaration must be obtained from the borrower in all cases.</p>",
    "options": [
      "I and III Only",
      "II Only",
      "I Only",
      "III Only",
      "I, II and III"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Reserve Bank of India (RBI) on July 11 clarified that loans sanctioned by banks against the voluntary pledge of gold and silver as collateral, up to the collateral-free limit, will not be considered a violation of the guidelines on collateral. In June 2025, the central bank released the final guidelines for lending against gold and silver collateral.</p><p>&#183; According to the guidelines, <u>lenders shall not grant any advance or loan against primary gold or silver, or financial assets backed by primary gold or silver, such as units of Exchange-Traded Funds or units of Mutual Funds. </u>Loans should also not be granted where the ownership of the gold is doubtful.</p><p>&#183; <u>A suitable document or declaration must be obtained from the borrower in all cases, affirming that the borrower is the rightful owner of the eligible collateral.</u> Additionally, <u>lenders must not avail loans by re-pledging gold or silver that has already been pledged to them by their borrowers.</u></p><p>&#183; <u>On the valuation front, the RBI stated that gold or silver accepted as collateral shall be valued based on the reference price corresponding to its actual purity (caratage).</u></p><p><b>For this purpose, the lower of: </b></p><p>(a) the average closing price over the preceding 30 days for gold or silver of that specific purity, or</p><p>(b) the closing price of the previous day for gold or silver of that specific purity, as published either by the India Bullion and Jewellers Association Ltd. </p><p>(IBJA) or by a commodity exchange regulated by the Securities and Exchange Board of India (SEBI), shall be used.</p>",
    "question_index": 5
  },
  {
    "question": "<p>SBI Card has announced a series of important changes for its credit cardholders, which will take effect from July 15, 2025. SBI Card will discontinue its complimentary air accident insurance coverage of Rs 1 crore. Effective July 15, 2025, this change applies to the which of the following cards: </p><p>I. SBI Card Miles Elite</p><p>II. SBI Card SimplyCLICK</p><p>III. SBI Card Elite</p><p>IV. SBI Card Miles Prime</p><p>V. SBI Card Aurum</p>",
    "options": [

      "III, IV and V Only",

    "correct_option_id": 4,
    "solution": "<p>SBI Card has announced a series of important changes for its credit cardholders, which will take effect from July 15, 2025.</p><p>&#183; SBI Card will discontinue its complimentary air accident insurance coverage of Rs 1 crore. This insurance coverage is offered on select premium SBI credit cards.</p><p><b>Effective July 15, 2025, this change applies to the following cards: </b></p><p>&#183; SBI Card Elite, </p><p>&#183; SBI Card Miles Elite, and </p><p>&#183; SBI Card Miles Prime. </p><p>Customers using these variants of credit cards will no longer be eligible for this benefit after the specified date.</p><p>&#183; The complimentary air accident insurance coverage of Rs 50 lakh is available on the SBI Card Prime and SBI Card Pulse will also be discontinued, effective July 15, 2025. Cardholders of these variants will no longer receive this insurance benefit from the specified date onwards, as per the information available on SBI's website.</p><p>&#183; The SBI Card has changed the MAD calculation against the SBI credit card. Effective July 15, 2025, the minimum amount due (MAD) on your SBI Credit Cards will be calculated as follows: 100% of GST + 100% of EMI amount + 100% of fees/charges + 100% of finance charges + any overlimit amount (if applicable) + 2% of the remaining outstanding balance.</p>",
    "question_index": 6

  {
    "question": "<p>The Reserve Bank of India announced that it has withdrawn the Corrective Action Plan (CAP) imposed on Religare Enterprises' wholly-owned subsidiary, Religare Finvest Limited (RFL), with immediate effect. Which of the following statements is incorrect regarding the Reserve Bank of India's recent decision on Religare Finvest Limited (RFL)?</p>",

      "The Burman family became the promoter of Religare Enterprises Ltd in 2025"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Reserve Bank of India announced that it has withdrawn the Corrective Action Plan (CAP) imposed on Religare Enterprises' wholly-owned subsidiary, Religare Finvest Limited (RFL), with immediate effect from July 23, 2025. The CAP was initially imposed on January 18, 2018, due to irregularities observed during the inspection as of March 31, 2017. </p><p><b>The NBFC arm had accumulated losses to the tune of Rs 2,270 crore till March 2022. </b>It said total expenses over the past financial year had been in excess of Rs 639 crore, against the total income of Rs 275.25 crore. On account of large scale siphoning of funds from REL and RFL, the latter was put into the CAP framework by the RBI. RFL completed a one-time settlement with 16 lenders through organic collections in March 2023 and paid more than Rs 9,000 crore to the banking system, it said. </p><p>&#183; The company is, however, advised to be in compliance with all the prudential requirements, said the stock exchange filing of Religare Enterprises. </p><p>&#183; Earlier this year, the Burman family acquired a controlling stake in Religare Enterprises Ltd (REL) after the completion of the open offer, and REL was designated as its promoter. Its shareholding post the acquisition deal stands at 83,201,819 equity shares, representing 25.16 per cent in the company.</p>",
    "question_index": 7
  },
  {
    "question": "<p>The Cabinet Committee on Economic Affairs chaired by the Prime Minister, has approved a special exemption for NLC India Limited (NLCIL) from the prevailing investment guidelines applicable to Navratna Central Public Sector Enterprises (CPSEs). Identify the CORRECT Statement(s) regarding this.</p><p>I. NLCIL has received a special exemption to invest Rs. 7,000 crore in its subsidiary NIRL, bypassing standard CPSE investment ceilings.</p><p>II. NLCIL currently operates over 10 GW of renewable energy capacity which will now be transferred to NIRL.</p><p>III. The Cabinet's approval aligns with India's long-term net zero and 'Panchamrit' goals, including achieving 500 GW non-fossil fuel capacity by 2030.</p>",
    "options": [
      "I Only",
      "II and III Only",
      "III Only",
      "I and III Only",
      "I, II and III"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Cabinet Committee on Economic Affairs chaired by the Prime Minister, has approved a special exemption for NLC India Limited (NLCIL) from the prevailing investment guidelines applicable to Navratna Central Public Sector Enterprises (CPSEs). <u>This strategic decision enables NLCIL to invest Rs.7,000 Crore in its wholly owned subsidiary, NLC India Renewables Limited (NIRL) and in turn NIRL investing in various projects directly or through formation of Joint Ventures, without the requirement of prior approval under the existing delegation of powers.</u> </p><p>&#183; This investment is further exempted from the 30% net worth ceiling stipulated by the Department of Public Enterprises (DPE) for, overall investment by CPSEs in JVs and Subsidiaries providing NLCIL and NIRL greater operational and financial flexibility.</p><p>&#183; The exemptions aim to support NLCIL's ambitious target of developing 10.11 GW of Renewable Energy (RE) capacity by 2030 and expanding this to 32 GW by 2047. The approval aligns with India's commitments made during COP26 for transition toward a low-carbon economy and achieve sustainable development. </p><p>&#183; The country has pledged to build 500 GW of non-fossil fuel energy capacity by 2030 as part of the 'Panchamrit' goals and its long-term commitment to achieve Net Zero emissions by 2070. At present, NLCIL operates seven renewable energy assets with a total installed capacity of 2 GW, which are either operational or close to commercial operation. </p><p>&#183; These assets will be transferred to NIRL pursuant to this Cabinet approval. NIRL, envisioned as the flagship platform for NLCIL's green energy initiatives, is actively exploring fresh opportunities across the renewable energy sector, including participation in competitive bidding for new projects. </p><p>&#183; The approval is expected to reinforce India's position as a green energy leader by reducing dependence on fossil fuels, lowering coal import, and enhancing reliability of 24x7 power supply across the country. Beyond the environmental impact, this initiative is projected to generate significant employment'both direct and indirect'during the construction and operation phases, thereby benefiting local communities and supporting inclusive economic growth.</p>",

    "question": "<p>The Union Cabinet chaired by the Prime Minister Narendra Modi approved the the National Sports Policy (NSP) 2025, a landmark initiative aimed at reshaping the country's sporting landscape and empowering citizens through sports. Identify the CORRECT Statement(s) regarding this.</p><p>I. The NSP 2025 replaces the National Sports Policy of 2011 and aims to make India a major contender in the 2036 Olympic Games.</p><p>II. One of the key pillars of the policy focuses on integrating sports into school education in alignment with the National Education Policy (NEP) 2020.</p><p>III. The NSP 2025 aims to promote economic and social development through sports by encouraging participation among marginalized communities and promoting sports tourism.</p>",

    "solution": "<p>The Union Cabinet chaired by the Prime Minister Shri Narendra Modi approved the the National Sports Policy (NSP) 2025, a landmark initiative aimed at reshaping the country's sporting landscape and empowering citizens through sports. The new policy supersedes the existing National Sports Policy, 2001, and lays out a visionary and strategic roadmap, to establish India as a global sporting powerhouse and a strong contender for excellence at international sporting events, including the 2036 Olympic Games. The NSP 2025 is the outcome of extensive consultations involving Central Ministries, NITI Aayog, State Governments, National Sports Federations (NSFs), athletes, domain experts, and public stakeholders. </p><p>The policy is anchored on five key pillars.</p><p><b>1) Excellence on the Global Stage: - </b></p><p>This pillar aims to:</p><p>&#183; Strengthen sports programs from the grassroots to elite levels, including mechanisms for early identification and nurturing of talent.</p><p>&#183; Promote the establishment of competitive leagues and competitions, and develop sports infrastructure in both rural and urban areas.</p><p>&#183; Build world-class systems for training, coaching, and holistic athlete support.</p><p>&#183; Enhance the capacity and governance of National Sports Federations.</p><p>&#183; Encourage the adoption of sports science, sports science, medicine, and technology to boost athletic performance.</p><p>&#183; Train and develop sports personnel, including coaches, technical officials, and support staff.</p><p><b>2) Sports for Economic Development: - </b></p><p>NSP 2025 recognizes the economic potential of sports and seeks to:</p><p>&#183; Promote sports tourism and attract major international events to India.</p><p>&#183; Strengthen the sports manufacturing ecosystem, and promote startups and entrepreneurship in the sector.</p><p>&#183; Encourage private sector participation through Public-Private Partnerships (PPPs), Corporate Social Responsibility (CSR) and innovative funding initiatives.</p><p><b>3) Sports for Social Development: - </b></p><p>The policy emphasizes the role of sports in driving social inclusion by:</p><p>&#183; Promoting participation among women, economically weaker sections, tribal communities, and persons with disabilities through focused programs.</p><p>&#183; Revitalizing and promoting indigenous and traditional games.</p><p>&#183; Positioning sports as a viable career option by integrating it into education, encouraging volunteering, and facilitating dual-career pathways.</p><p>&#183; Engaging the Indian diaspora through sports.</p><p><b>4) Sports as a People's Movement: - </b></p><p>To make sports a national movement, the policy aims to:</p><p>&#183; Drive mass participation and a culture of fitness through nationwide campaigns and community-based events.</p><p>&#183; Launch fitness indices for schools, colleges, and workplaces etc.</p><p>&#183; Enhance universal access to sports facilities.</p><p><b>5) Integration with Education (NEP 2020): -</b> </p><p>In alignment with the National Education Policy 2020, the NSP 2025 proposes to:</p><p>&#183; Integrate sports into school curricula.</p><p>&#183; Equip educators and physical education teachers with specialized training to promote sports education and awareness.</p><p><b>6) Strategic Framework: -</b> </p><p>To realise its objectives, the NSP 2025 lays down a comprehensive implementation strategy encompassing:</p><p>&#183; <b>Governance</b>: Establish a robust regulatory framework for sports governance, including legal framework.</p><p>&#183; <b>Private Sector Funding &amp; support</b>: Develop innovative financing mechanisms and engage private sector participation through PPPs and CSR.</p><p>&#183; <b>Technology &amp; Innovation</b>: Leverage emerging technologies, including AI and data analytics, for performance tracking, research, and program implementation.</p><p>&#183; <b>National Monitoring Framework</b>: Create a national framework with well-defined benchmarks, Key Performance Indicators (KPIs), and time-bound targets.</p><p>&#183; <b>Model Policy for States</b>: The NSP 2025 will serve as a model for States and Union Territories, encouraging them to revise or formulate their own policies in alignment with national objectives.</p><p>&#183; <b>Whole-of-Government Approach</b>: The policy calls for integration of sports promotion into the activities, schemes, and programs of all Ministries and Departments to achieve a holistic impact.</p>",

    "question": "<p>The Union Cabinet chaired by the Prime Minister, Shri Narendra Modi, has approved the Employment Linked Incentive (ELI) Scheme to support employment generation, enhance employability and social security across all sectors, with special focus on the manufacturing sector. Identify the INCORRECT Statement(s) regarding this.</p><p>I. The ELI Scheme has a total outlay of Rs 99,446 Crore and aims to create over 3.5 Crore jobs across sectors, with a special focus on manufacturing.</p><p>II. Under Part A of the scheme, first-time employees earning up to Rs 10,000 per month will receive a one-time direct incentive of Rs 10,000 upon joining.</p><p>III. Employers hiring additional workers with EPF salaries between Rs 20,000 to Rs 1 Lakh will receive Rs 3,000 per month per employee as incentive for two years, and up to four years in manufacturing.</p>",

    "solution": "<p>The Union Cabinet chaired by the Prime Minister, Shri Narendra Modi, has approved the Employment Linked Incentive (ELI) Scheme to support employment generation, enhance employability and social security across all sectors, with special focus on the manufacturing sector.</p><p>&#183; Under the Scheme, while the first-time employees will get one month's wage (up to Rs 15,000/-), the employers will be given incentives for a period to two years for generating additional employment, with extended benefits for another two years for the manufacturing sector.' The ELI Scheme was announced in the Union Budget 2024-25 as part of PM's package of five schemes to facilitate employment, skilling and other opportunities for 4.1 Crore youth with a total budget outlay of Rs 2 Lakh Crore.'</p><p>&#183; With an outlay of Rs 99,446 Crore, the ELI Scheme aims to incentivize the creation of more than 3.5 Crore jobs in the country, over a period of 2 years.' Out of these, 1.92 Crore beneficiaries will be first timers, entering the workforce.' The benefits of the Scheme would be applicable to jobs created between 01<sup>st</sup> August 2025 and 31<sup>st</sup> July, 2027.</p><p>The Scheme consists of two parts with Par A focused on first timers and Part B focused on employers: </p><p><b>Part A: Incentive to First Time Employees:</b></p><p>&#183; Targeting first-time employees registered with EPFO, this Part will offer one-month EPF wage up to Rs 15,000 in two installments.' Employees with salaries up to Rs 1 lakh will be eligible.' </p><p>&#183; The 1st'installment will be payable after 6 months of service and the 2nd'installment will be payable after 12 months of service and completion of a financial literacy programme by the employee. </p><p>&#183; To encourage the habit of saving, a portion of the incentive will be kept in a savings instrument of deposit account for a fixed period and can be withdrawn by the employee at a later date.</p><p>&#183; The Part A will benefit around 1.92 crore first time employees.</p><p><b>Part B: Support to Employers:</b></p><p>&#183; This part will cover generation of additional employment in all sectors, with a special focus on the manufacturing sector.' The employers will get incentives in respect of employees with salaries up to Rs 1 lakh.' </p><p>&#183; The Government will incentivize employers, up to Rs 3000 per month, for two years, for each additional employee with sustained employment for at least six months.</p><p>&#183; For the manufacturing sector, incentives will be extended to the 3rd'and 4th'years as well.</p><p>&#183; Establishments, which are registered with EPFO, will be required to hire at least two additional employees (for employers with less than 50 employees) or five additional employees (for employers with 50 or more employees), on a sustained basis for at least six months.'</p><p>The incentive structure will be as under:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>EPF Wage Slabs of Additional Employee (in</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Benefit to the Employer (per additional employment per month)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Up to Rs 10,000*</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Upto Rs 1,000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">More than Rs 10,000 and up to Rs 20,000</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rs 2,000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">More than Rs 20,000 (upto salary of Rs 1 Lakh/month)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rs 3,000</td></tr></table><p>This part is expected to incentivize employers for the creation of additional employment of nearly 2.60 crore persons. <b>Incentive Payment Mechanism:</b></p><p>&#183; All payments to the First Time Employees under Part A of the Scheme will be made through DBT (Direct Benefit Transfer) mode using Aadhar Bridge Payment System (ABPS).' Payments to the Employers under Part B will be made directly into their PAN-linked Accounts.</p><p>&#183; With ELI Scheme, the government intends to catalyse job creation in all sectors, particularly in manufacturing sector, besides incentivizing youth joining the workforce for the first time.' An important outcome of the Scheme will also be formalization of the country's workforce by extending social security coverage for crores of young men and women.</p>",

    "question": "<p>The Assistance in Deploying Energy Efficient Technologies in Industries &amp; Establishments (ADEETIE) scheme is officially launched by Hon'ble Union Minister of Power and Housing &amp; Urban Affairs, Shri Manohar Lal at a national roll-out event held in Panipat, Haryana. Identify the INCORRECT Statement(s) regarding this.</p><p>I. The ADEETIE scheme provides interest subvention of 5% for Micro and Small Enterprises and 3% for Medium Enterprises adopting energy-efficient technologies.</p><p>II. The scheme is implemented by the Bureau of Energy Efficiency (BEE) and has an overall budgetary outlay of Rs. 2000 crore.</p><p>III. ADEETIE will be rolled out in phases, covering a total of 160 industrial clusters over a three-year period from FY 2025-26 to FY 2027-28.</p>",

    "solution": "<p>The Assistance in Deploying Energy Efficient Technologies in Industries &amp; Establishments (ADEETIE) scheme is officially launched by Hon'ble Union Minister of Power and Housing &amp; Urban Affairs, Shri Manohar Lal at a national roll-out event held at Arya (P.G.) College, Panipat, Haryana. The launch of this landmark initiative marks a decisive step toward India's transition to a low-carbon economy by enabling Micro, Small, and Medium Enterprises (MSMEs) to upgrade to energy-efficient technologies through comprehensive financial and technical support.</p><p>&#183; The ADEETIE scheme, with a <b>budgetary outlay of Rs. 1000 crore</b>, is an initiative by the <b>Ministry of Power, Government of India</b>, is being implemented by the <b>Bureau of Energy Efficiency (BEE)</b>. The Scheme is structured to provide end -to-end hand holding through subvention on loans, Investment Grade Energy Audits (IGEA), Detailed Project Reports (DPRs), and post-implementation Monitoring and Verification (M&amp;V). </p><p>&#183; The scheme envisages to provide interest subvention of 5% for Micro and Small Enterprises, and 3% for Medium Enterprises on loans, ensuring accessibility and affordability for MSMEs seeking financial aid for energy efficiency (EE) projects.</p><p><b>About BEE</b>- </p><p>&#183; The Government of India set up the Bureau of Energy Efficiency (BEE) on March 1, 2002 under the provisions of the Energy Conservation Act, 2001. The mission of the Bureau of Energy Efficiency is to assist in developing policies and strategies with a thrust on self-regulation and market principles, within the overall framework of the Energy Conservation Act, 2001 with the primary objective of reducing the energy intensity of the Indian economy. </p><p>&#183; BEE coordinates with designated consumers, designated agencies and other organizations and recognises, identifies and utilises the existing resources and infrastructure, in performing the functions assigned to it under the Energy Conservation Act. The Energy Conservation Act provides for regulatory and promotional functions.</p><p><b>About the ADEETIE Scheme</b></p><p>&#183; <u>Interest Subvention Support:</p><p></u>MSMEs can avail 5% interest subvention for Micro &amp; Small Enterprises and 3% for Medium Enterprises on loans for adopting energy-efficient technologies.</p><p>&#183; <u>End-to-End Technical Support:</p><p></u>ADEETIE provides full handholding support'including investment-grade energy audits, DPR preparation, technology identification, and monitoring &amp; verification of implementation.</p><p>&#183; <u>Target Sectors:</p><p></u>The scheme covers 14 energy-intensive sectors: Brass, Bricks, Ceramics, Chemicals, Fishery, Food Processing, Forging, Foundry, Glass, Leather, Paper, Pharma, Steel Re-rolling, and Textiles.</p><p>&#183; <u>Implementation Approach:</p><p></u>ADEETIE will follow a phased roll-out, beginning with 60 industrial clusters in the first phase, followed by an additional 100 clusters in the second phase.</p><p>&#183; <u>Implementation Period:</u></p><p>The scheme will be implemented over three years, spanning FY 2025-26 to FY 2027-28, allowing for progressive deployment, course correction, and scaling based on early outcomes.</p><p>&#183; <u>Budget &amp; Impact:</p><p></u><b>'</b>Total outlay of Rs. 1000 crore, comprising:</p><p>1) Rs. 875 crore for interest subvention</p><p>2) Rs. 50 crore for Investment Grade Energy Audit support</p><p>3) Rs. 75 crore for handholding support through BEE</p><p>'Expected to catalyze '9000 crore in investments, including '6750 crore of MSME lending.</p>",

Africa)</p><p>7) Cambodia (Asia)</p><p>8) Cape Verde Islands (Africa)</p><p>9) Comoro Islands (Africa)</p><p>10) Cook Islands (Oceania)</p><p>11) Djibouti (Africa)</p><p>12) Dominica (North America)</p><p>13) Ethiopia (Africa)</p><p>14) Fiji (Oceania)</p><p>15) Grenada (North America)</p><p>16) Guinea Bissau (Africa)</p><p>17) Haiti (North America)</p><p>18) Indonesia (Asia)</p><p>19) Iran (Asia)</p><p>20) Jamaica (North America)</p><p>21) Jordan (Asia)</p><p>22) Kazakhstan (Asia)</p><p>23) Kenya (Africa)</p><p>24) Kiribati (Oceania)</p><p>25) Laos (Asia)</p><p>26) Macao (Asia)</p><p>27) Madagascar (Africa)</p><p>28) Malaysia (Asia)</p><p>29) Maldives (Asia)</p><p>30) Marshall Islands (Oceania)</p><p>31) Mauritius(Asia)</p><p>32) Micronesia (Oceania)</p><p>33) Mongolia (Asia)</p><p>34) Montserrat (North America)</p><p>35) Mozambique (Africa)</p><p>36) Myanmar (Asia)</p><p>37) Namibia (Africa)</p><p>38) Nepal (Asia)</p><p>39) Niue (Oceania)</p><p>40) Palau Islands (Oceania)</p><p>41) Phillipines (Asia)</p><p>42) Qatar (Asia)</p><p>43) Rwanda (Africa)</p><p>44) Samoa (Oceania)</p><p>45) Senegal (Africa)</p><p>46) Seychelles (Africa)</p><p>47) Sierra Leone (Africa)</p><p>48) Somalia (Africa)</p><p>49) Sri Lanka (Asia)</p><p>50) St. Kitts and Nevis (North America)</p><p>51) St. Lucia (North America)</p><p>52) St. Vincent and Grenadines (North America)</p><p>53) Tanzania (Africa)</p><p>54) Thailand (Asia)</p><p>55) Timor Leste (Asia)</p><p>56) Trinidad and Tobago (Africa)</p><p>57) Tuvalu (Oceania)</p><p>58) Vanuatu (Oceania)</p><p>59) Zimbabwe (Africa).</p>",

 Processing Clusters</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Development/ creation of modern infrastructure and common facilities to encourage group of entrepreneurs to set up food processing units based on cluster approach by linking groups of producers/ farmers to the processors and markets through well-equipped supply chain with modern infrastructure</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Creation/Expansion of Food Processing and Preservation Capacities</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Creation of processing and preservation capacities for food products for enhancing their shelf life and setting up of new food processing units, modernization/ expansion of existing food processing units to increase level of processing, value addition thereby leading to reduction of wastage.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) Operation Greens</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">To increase farmers' income by supporting the processing infrastructure in production clusters and FPOs and by linking farmers with the markets. Reduction of post-harvest losses by creating infrastructure facilities from farm to consumption point, and to increase food processing and value addition capacities by creating linkages among production clusters.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(v) Scheme for food safety &amp; Quality assurance Infrastructure</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">To strengthen the food quality control infrastructure and to make it available to the food processing sector and other stakeholders to ensure compliance with domestic and international food safety standards and to reduce the Turn-around Time (TAT) for analysis of food samples.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(vi) Human Resource and Institutions (R&amp;D)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">To undertake demand driven R&amp;D work for the benefit of food processing industry in terms of product and process development, efficient technologies, improved packaging, value addition etc. with commercial value.</td></tr></table>",

    "question": "<p>Consider the following statements regarding recent gubernatorial appointments in July 2025:</p><p>I. Kavinder Gupta, who earlier served as Deputy Chief Minister of Jammu and Kashmir and as Mayor of Jammu, was appointed as the new Lieutenant Governor of Ladakh, replacing Brig. (retd.) B.D. Mishra.</p><p>II. Pusapati Ashok Gajapathi Raju, a senior BJP leader from Andhra Pradesh, succeeded P.S. Sreedharan Pillai as the new Governor of Goa.</p><p>III. Ashim Kumar Ghosh, who led the BJP's West Bengal unit from 1999 to 2002, was appointed as the new Governor of Haryana, succeeding Bandaru Dattatreya.</p>",

    "solution": "<p>Former Deputy Chief Minister of Jammu and Kashmir Kavinder Gupta was appointed Lieutenant Governor of Ladakh (July 14, 2025) replacing B.D Mishra, a communication by the President's Secretariat said. The President has accepted the resignation of Brig. (retd.) Mishra, the statement said. </p><p>&#183; Former Civil Aviation Minister Pusapati Ashok Gajapathi Raju was appointed new Governor of Goa and senior Bharatiya Janata Party (BJP) leader from West Bengal, Ashim Kumar Ghosh, was appointed new Governor of Haryana. </p><p>&#183; Brig. Mishra (87) was appointed to the post on February 12, 2023 on removal of R.K Mathur, a retired bureaucrat. Mr. Raju,a senior Telugu Desam Party (TDP) leader from Andhra Pradesh, will succeed P.S Sreedharan Pillai as the Goa Governor. Mr. Pillai was sworn in as the Governor of Goa on July 15, 2021. </p><p>&#183; Mr. Raju (74) served as the Civil Aviation Minister between May 27, 2014 and March 10, 2018 under Prime Minister Narendra Modi. He has also held ministerial posts in the AP Government. Mr. Gupta belongs to Jammu and he served as the Mayor of Jammu for three consecutive terms from 2005 to 2010. He is also the national executive member of the BJP. </p><p>&#183; Mr. Ghosh, who headed the party's West Bengal unit between 1999 and 2002, will succeed Bandaru Dattatreya as Haryana Governor. Former Labour and Employment Minister Mr. Dattatreya assumed charge as Governor of Haryana on July 15, 2021. </p><p>&#183; In 1996, Mr. Ghosh became the State Secretary of the BJP and in 1998, he was appointed State Vice-President. From 1999 to 2002, he served as the State president of West Bengal BJP. From 2003 to 2005, he held the responsibility of Tripura Observer.</p>",

    "solution": "<p>Hon'ble President of India, Smt. Droupadi Murmu conferred Swachh Survekshan 2024-25 Awards at Vigyan Bhagwan, New Delhi hosted by the Ministry of Housing and Urban Affairs (MoHUA). 23 Super Swachh League Cities received felicitations in the presence of Union Minister, Shri Manohar Lal and MoS, MoHUA, Shri Tokhan Sahu. The new generation of clean cities of India have arrived with Ahmedabad, Bhopal and Lucknow emerging as top Swachh Shehar. 43 National awards have been announced, with a special recognition for Mahakumbh.</p><p>&#183; In the category of cities with a population between 3 and 10 lakh, Noida emerged as the cleanest city, followed by Chandigarh and Mysore. Ahmedabad received first position in the category of cities with a population of over 10 lakh.'</p><p>&#183; During the event, a total of 78 awards were presented across various categories. This year, the awards were presented across four categories, including Super Swachh League Cities and the top three cleanest cities in five different population categories.</p><p>&#183; Karnal has emerged as one of the top-three cleanest cities in the country in the Swachh Survekshan 2024-25 results announced.</p><p>&#183; The city was awarded by President Droupadi Murmu for being adjudged third in the 'Swachh Shehar' category for cities with a population between 50,000 and 3 lakh at an event organised by Union ministry of housing and urban affairs (MoHUA) at Vigyan Bhawan in New Delhi.</p><p>&#183; Dewas in Madhya Pradesh topped in the category, followed by Maharashtra's Karad at the second position.</p><p>&#183; Haryana urban local bodies minister Vipul Goel, Karnal mayor Renu Bala Gupta and municipal commissioner Vaishali Sharma received this award on the behalf of the city from Murmu.</p><p>&#183; Karnal is now the first city in Haryana to be honoured by the President in the awards.</p><p>&#183; Officials said that the city made an impressive progress in the cleanliness rankings from 115th position in 2023 in the category of cities with population above 1 lakh to third this time, but in a new and different category of population between 50,000 and 3 lakh.</p><p>&#183; The town ranked 85th in 2022, 86th in 2021 and 17th in 2020 in the one lakh population category.</p><p><b>Super Swachh League</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>S. No.</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Population Category</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>State</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>City</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">More than 10 Lakh</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Madhya Pradesh</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Indore</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">'</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Gujarat</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Surat</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">'</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Maharashtra</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Navi Mumbai</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">'</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Andhra Pradesh</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vijayawada</td></tr><tr><td align=\"left\" style=\"borde ><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">29</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tamil Nadu</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Namakkal</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Telangana</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Greater Hyderabad</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">31</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tripura</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Khowai</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">32</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Uttar Pradesh</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Agra</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">33</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Uttarakhand</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lalkuan</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">34</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">West Bengal</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Baidyabati</td></tr></table>",

    "question": "<p>The Hurun Research Institute released the Global Unicorn Index 2025, a ranking of the world's unicorns, defined as start-ups founded in the 2000s, worth at least a billion dollars and not yet listed on a public exchange. Identify the CORRECT Statement(s) regarding this.</p><p>I. SpaceX became the world's most valuable unicorn with a valuation of US$350 billion, overtaking ByteDance and OpenAI.</p><p>II. India ranks second globally in terms of the total number of unicorns, following the United States.</p><p>III. Tiger Global Management was named the world's most successful unicorn investor, with stakes in just under 200 unicorns.</p>",

      "I Only",

    "correct_option_id": 3,
    "solution": "<p>The Hurun Research Institute released the Global Unicorn Index 2025, a ranking of the world's unicorns, defined as start-ups founded in the 2000s, worth at least a billion dollars and not yet listed on a public exchange. The cut-off was 1 January 2025, with significant changes in valuation updated up to the date of release.</p><p>&#183; Hurun Research has been tracking unicorns since 2017. This is the seventh year of the '<i>Global Unicorn Index.</i></p><p>&#183; This report includes the '<i>Most Successful Unicorn Investors in the World 2025</i>, a ranking of the investment houses that have invested in the most unicorns.</p><p>&#183; Hurun Research found 1,523' unicorns in the world, based in 52 countries and 307 cities. 359'unicorns saw their valuations rise, of which 203'were new faces.'143 saw their valuations drop, of which 52 were 'demoted' as their valuation no longer cut US$1bn. 64 were 'promoted' out of the list, of which 34 went IPO and 30 were acquired. 1,073'saw no change to their valuations. Their total value was US$5.6tn.</p><p>&#183; The world's unicorns are disrupting financial services, business management solutions and healthcare. 77% sell software and services, led by FinTech, SaaS, and AI, whilst 23% have a physical product, led by Semiconductors, New Energy, Biotech, and HealthTech.</p><p>&#183; '<b>SpaceX</b>'has become the world's most valuable unicorn, with a staggering US$350 billion valuation, ahead of TikTok-owner ByteDance and OpenAI. It's the first time a space exploration company has led the pack.'</p><p>&#183; 'Elon Musk's new venture'<b>xAI</b>'burst onto our list straight into fourth place worldwide, valued at US$115 billion after acquiring social media platform X. It's unprecedented for a startup to debut among the Hurun Top Five like this.'</p><p>&#183; 'When it comes to unicorns, the world can essentially be '<b>split into three regions</b>: the US, China, and the Rest of the World. The US accounts for half of all unicorns, China a quarter, and the remaining quarter is spread across dozens of other countries, led by India and the UK. Surprisingly, perhaps, the EU countries together have just over 112 unicorns, less than 8%, despite contributing to 20% of the world's GDP. Each region has its strengths ' American unicorns are heavy in SaaS, FinTech and AI, China's in AI, Semiconductors and Renewable Energy, while the rest of the world leans towards FinTech and E-commerce ' reflecting different regional innovation focuses.'</p><p>&#183; 'The' <b>United States</b>' is in a league of its own with 758 'unicorns ' fully 50% of the world's total. California alone is home to 396 companies valued at a combined US$2.1tn. </p><p>&#183; The East Coast, led by New York with 141 unicorns, Massachusetts with 44 unicorns and Florida with 15 unicorns, continues to thrive in FinTech, Healthcare, and Enterprise Software. The Midwest, while smaller in count, shows growth in states like Illinois, with 15 unicorns, and demonstrates increasing startup momentum beyond coastal hubs. States like Texas, with over 32 unicorns, Colorado and Washington are emerging as strategic tech centres, boosted by talent migration and business-friendly environments. This dispersion indicates a maturing innovation landscape where startup ecosystems are flourishing across diverse regions, not just Silicon Valley.'</p><p>&#183; '<b>San Francisco</b>'remains the world's unicorn capital, leading by a wide margin, followed by New York. Beijing and Shanghai were third and fourth. Outside of the US and China, London has the highest concentration of unicorns, trailed by Bengaluru, Paris and Berlin. It's a reminder that the unicorn boom is not confined to one region ' while Silicon Valley and Beijing dominate, innovation thrives in many corners of the world.'</p><p>&#183; 'The' <b>Gulf region</b>'is finally on the unicorn map with 7 unicorns. The UAE leads the Middle East with 5 unicorns, and Saudi Arabia celebrated its first two unicorns this year. For a region long known for oil wealth, the rise of homegrown tech unicorns signals a new era ' one where the Gulf's investment might and entrepreneurial ambitions are creating a budding startup ecosystem. I suspect this is just the start of the Middle East's entry into the global startup scene.'</p><p>&#183; '<b>South-East Asia</b>' continues to gain ground in the unicorn landscape with 37. Singapore leads the region with 18 unicorns, followed by Indonesia with 8, Vietnam with 4, Thailand and the Philippines with 3 each, and Malaysia with 1. This is a positive sign that ASEAN economies, with their population of over 600 million, are nurturing more high-value startups. From e-commerce to fintech, it's a clear indication that South-East Asia's tech ecosystem is rapidly maturing.'</p><p>&#183; 'Tiger Global Management is the' <b>world's most successful unicorn investor </b>'for the second year running, with stakes in just under 200 of the unicorns on the Hurun Index. This year, Sequoia Capital overtook Hongshan for third spot. It goes to show the outsized role that a handful of visionary investors play ' they truly are the 'entrepreneurs behind the entrepreneurs,' providing the rocket fuel for so many unicorns.'</p><p>&#183; '64 unicorns left our index this year by '<b>'graduating'' </b>to the public markets or getting acquired. Despite a slowdown in the domestic economy, Chinese companies dominated unicorn IPOs last year. Of the 34 unicorns worldwide that went public, 19 were from China, far ahead of the US, which had just 9, and 6 from the Rest of the World. Most of the unicorns that went IPO came from sectors like software, AI, FinTech and BioTech, indicating those fields are maturing.'</p><p>&#183; '143'companies faced valuation cuts, and 52 were '<b>'demoted' </b>'after falling below the US$1 billion mark. This shift was led by the US with 19'such 'demotions' and China with 11. Among the biggest drops were Sweden's battery maker Northvolt, once valued at US$20 billion, and Chinese EV maker Hozon, previously at over US$4 billion. Even top names were hit ' fast fashion giant Shein lost US$15 billion in value, while Australia's Canva saw a US$13'billion drop. </p><p>&#183; These declines serve as a reminder that private valuations are fluid, and no company is immune to changing market conditions.'</p><p>&#183; ' London-based fintech '<b>Revolut</b>, for instance, shot up by US$27bn to a US$45 billion valuation, cracking the Hurun Top 10. It proves that groundbreaking startups can emerge outside the US and China duopoly. Others include Sweden-based buy now pay later platform '<b>Klarna</b>, more than doubling to US$14bn. Revolut and Klarna's rises underline the strength of FinTech as a sector and Europe's ability to compete with the Silicon Valley giants.'</p><p>&#183; '<b>Indian' </b>and <b>'Chinese entrepreneurs </b>'continue to play a major role in unicorn creation beyond their home countries. Indians co-founded over 130 unicorns abroad, over 90% in the US, with a handful in the UK and Germany. Among the largest are San Francisco-based Databricks (US$62bn), design platform Figma (US$12.5bn) and AI-native search startup Perplexity AI (US$9bn). On the Chinese side, just under 50 unicorns were founded by Chinese outside of China, led by Binance (US$35bn), Airtable (US$11bn) and both Aesc and Notion Labs, each worth US$10bn. These diaspora-driven ventures underscore the global nature of talent and capital in shaping the modern startup ecosystem.'</p><p>Hurun Chairman and Chief Researcher- Rupert Hoogewerf.</p>",

    "question": "<p>According to World Bank report, India ranks 4th globally in income equality with a Gini Index of 25.5, showcasing significant progress in equitable income distribution. Identify the CORRECT Statement(s) regarding this.</p><p>I. India's Gini Index stands at 25.5 in 2022'23, placing it as the fourth most equal country globally, after the Slovak Republic, Slovenia, and Belarus.</p><p>II. According to the World Bank, 171 million Indians moved out of extreme poverty between 2011 and 2023, reducing the poverty rate to 2.3% under the $2.15/day threshold.</p><p>III. India has a higher income equality rating than all G7 and G20 nations, including advanced economies like the United States and China.</p>",
    "options": [
      "I Only",
      "II Only",
      "III Only",
      "I and III Only",
      "I, II and III"
    ],
    "correct_option_id": 4,
    "solution": "<p>India ranks fourth globally in income equality with a Gini score of 25.5. Extreme poverty dropped to 2.3% in 2022-23, says World Bank 171 million Indians moved out of extreme poverty between 2011-23. According to the World Bank, '<b>India's Gini Index stands at 25.5</b>, making it the' <b>fourth most equal country </b>'in the world, after the Slovak Republic, Slovenia and Belarus. This is a remarkable achievement for a country of its size and diversity. It reflects how India's economic progress is being shared more evenly across its population. Behind this success is a consistent policy focus on reducing poverty, expanding financial access, and delivering welfare support directly to those who need it most.</p><p><b>Understanding the Gini Index</b>- </p><p>&#183; The Gini Index is a simple yet powerful way to understand how equally income, wealth or consumption is distributed across households or individuals in a country. It ranges in value from 0 to 100. </p><p>&#183; A score of 0 means perfect equality. A score of 100 means one person has all the income, wealth or consumption and others have none, hence absolute inequality. The higher the Gini Index the more unequal the country.</p><p><b>India's Global Standing in Equality</b>- </p><p>According to the latest World Bank data, India's Gini Index stands at 25.5. This places India among the most equal countries in the world in relative terms. India's score is much lower than '<b>China's 35.7 and far lower than the United States, which stands at 41.8.</b>' It is also '<b>more equal than every G7 and G20 country</b>, many of which are considered advanced economies.</p><p>&#183; India falls into the 'moderately low' inequality category, which includes Gini scores between 25 and 30, and is only a fraction away from '<b>joining the 'low inequality' group</b>, which includes countries like the Slovak Republic with a score of 24.1, Slovenia at 24.3, and Belarus at 24.4. Apart from these three, India has a better score than all of the other 167 countries for which the World Bank has released data.</p><p>&#183; Globally, just 30 countries fall into the 'moderately low' inequality category. 'including several European countries with strong welfare systems. These include Iceland, Norway, Finland, and Belgium. It also features growing economies like Poland and wealthy nations like the United Arab Emirates.</p><p>&#183; India's journey towards a more equal society is reflected in its Gini Index over the years. The index was measured at 28.8 in 2011, and reached 25.5 in 2022. This steady shift shows that India has made consistent progress in combining economic growth with social equity.</p><p><b>Poverty Reduction Driving Greater Equality</b>- </p><p>India's strong standing on the Gini Index is not a coincidence. It is closely linked to the country's sustained success in reducing poverty across both rural and urban regions. The '<i>Spring 2025 Poverty and Equity Brief </i>'by the World Bank highlights this achievement as one of the most significant in recent years.</p><p>&#183; According to the report, 171 million Indians have been lifted out of extreme poverty over the past decade. The share of people living on less than 2.15 US dollars a day, which was the global threshold for extreme poverty till June 2025, fell sharply from 16.2 percent in 2011-12 to just 2.3 percent in 2022-23. </p><p>&#183; Under World Bank's revised extreme poverty threshold of $3.00 per day, the 2022-23 poverty rate would be adjusted to 5.3 percent.</p><p><b>Key Government Initiatives</b>: - </p><p>India's progress towards greater income equality is backed by a series of focused government initiatives. These schemes aim to improve financial access, deliver welfare benefits efficiently, and support vulnerable and underrepresented groups. Together, they have helped bridge gaps, boost livelihoods, and ensure that growth reaches all sections of society. Some of the key schemes and initiatives are:</p><p>1) <u>PM Jan Dhan Yojana:'</u></p><p>&#183; Financial inclusion has been at the heart of India's social equity push. As of June 25, 2025 over 55.69 crore people hold Jan Dhan accounts, giving them direct access to government benefits and formal banking services.</p><p>2) <u>Aadhaar and Digital Identity:</u></p><p>&#183; <b>'</b>Aadhaar has enabled the creation of a unique digital identity for residents across the country. As of July 3, 2025, more than 142 crore Aadhaar cards have been issued. This system forms the backbone of welfare delivery by ensuring that benefits reach the right person at the right time through reliable authentication.</p><p>3) <u>Direct Benefit Transfer (DBT):</u></p><p>&#183; <b>'</b>The DBT system has streamlined welfare payments, reducing leakages and delays. Cumulative savings have reached '3.48 lakh crore as of March 2023, reflecting its efficiency and scale.</p><p>4) <u>Ayushman Bharat:</u></p><p>&#183; <b>'</b>Access to quality healthcare is key to improving social equity. The Ayushman Bharat scheme provides health coverage of up to '5 lakh per family per year. As of July 3, 2025, over 41.34 crore Ayushman Cards have been issued. The scheme is supported by more than 32,000 empanelled hospitals across the country. In</p><p>&#183; addition, the government launched the Ayushman Vay Vandana scheme to extend this coverage to all citizens aged 70 and above, regardless of income. The Ayushman Bharat Digital Mission has further strengthened this effort, with over 79 crore health accounts created to link individuals to digital health services.</p><p>5) <u>Stand-Up India:</u></p><p>&#183; <b>'</b>To promote inclusive entrepreneurship, the Stand-Up India scheme provides loans between Rs. 10 lakh and Rs. 1 crore to SC/ST and women entrepreneurs for setting up greenfield enterprises. </p><p>&#183; As of July 3, 2025, more than 2.75 lakh applications have been sanctioned, with total funding of '62,807.46 crore. This initiative empowers individuals from disadvantaged communities to participate in economic growth on their own terms.'</p><p>6) <u>Pradhan Mantri Garib Kalyan Anna Yojana (PMGKAY):</u></p><p><b>'</b>Food security remains a pillar of social protection. Launched during the COVID-19 pandemic, PMGKAY has continued to serve the most vulnerable sections of society. As of December 2024, the scheme has reached 80.67 crore beneficiaries, offering free food grains and ensuring that no one is left behind during times of crisis.</p><p>7) <u>PM Vishwakarma Yojana:</u></p><p>&#183; <b>'</b>Traditional artisans and craftspeople are vital to India's economic and cultural fabric. The PM Vishwakarma Yojana supports them with collateral-free loans, toolkits, digital training, and marketing support. </p><p>&#183; As of July 3, 2025, 29.95 lakh individuals have registered under the scheme, helping preserve livelihoods and promote inclusive growth across rural and semi-urban areas.</p>",

    "question": "<p>NITI Aayog in the collaboration of the Ministry of Development of North Eastern Region (MoDoNER) released the second edition of the North Eastern Region (NER) District Sustainable Development Goals (SDG) Index Report (2023-24). Which of the following statement(s) is/are correct in context of this report.</p><p>I. All districts in Mizoram, Sikkim and Tripura have achieved Front Runner status.</p><p>II. Sikkim has the narrowest range (5.5 points) in terms of the score of the highest and lowest district.</p><p>III. Mizoram has the lowest-scoring district in the entire region.</p>",
    "options": [
      "II Only",
      "III Only",
      "II and III Only",
      "I and II Only",
      "I, II and III"
    ],
    "correct_option_id": 3,
    "solution": "<p>The second edition of the North Eastern Region (NER) District Sustainable Development Goals (SDG) Index Report (2023-24) was released by NITI Aayog. The Index is developed by NITI Aayog and the Ministry of Development of North Eastern Region (MoDoNER), with technical support from UNDP. The Index, which builds upon the momentum of the first edition released on 26 August 2021, measures the performance of districts across eight North Eastern States on the SDGs.</p><p>&#183; The (2023-24) Index is 'a major milestone in improving monitoring at the regional level. The index reflects the commitment to address development challenges across social, economic, and environmental dimensions while ensuring that no one is left behind in the NER. Based on NITI Aayog's SDG India Index methodology, it serves as a key tool for monitoring development related progress at the district level in the region to inform decision making.</p><p>&#183; <b>Results and finding-'</b>The composite scores for the 121 districts range from 58.71 in Longding, Arunachal Pradesh to 81.43 in Hnahthial, Mizoram. Districts are categorised into four categories: i) Achiever: Score equals 100 (achieved the targets set for identified indicators); ii) Front Runner: Score between 65 and 99 (excluding 100); iii) Performer: Score between 50 and 65 (excluding 65); and iv) Aspirant: Score less than 50</p><p>&#183; All districts in Mizoram, Sikkim and Tripura have achieved Front Runner status, with no districts falling in the Aspirant or Achiever categories. Mizoram has the highest-scoring district in the entire Northeast region (Hnahthial at 81.43) and Arunachal Pradesh has the lowest-scoring district in the entire region (Longding at 58.71).</p><p>&#183; Sikkim has the narrowest range (5.5 points) in terms of the score of the highest and lowest district, showing the most consistent performance across its districts. Tripura has the distinction of having some of the highest-scoring districts with minimum intra-state variation (6.5 points). Mizoram and Nagaland have some of the highest-scoring districts but also exhibit variation (ranges of 13.72 and 15.07, respectively).</p><p><b><i>State-wise Highest and Lowest Scores of Districts within states:</i></b></p><p>&#183; Arunachal Pradesh: Lower Dibang Valley (73.36) to Longding (58.71)</p><p>&#183; Assam: Dibrugarh (74.29), South Salmara-Mankachar (59.71)</p><p>&#183; Manipur: Imphal West (73.21), Pherzawl (59.71)</p><p>&#183; Meghalaya: East Khasi Hills (73.00), East Jaintia Hills (63.00)</p><p>&#183; Mizoram: Hnahthial (81.43), Lawngtlai (67.71)</p><p>&#183; Nagaland: Mokokchung (78.43), Zunheboto (63.36)</p><p>&#183; Sikkim: Gangtok (76.64), Gyalshing (71.14)</p><p>&#183; Tripura: Gomati (78.79), Dhalai (72.29)</p><p>The NER District SDG Index 2023-24 serves as a critical policy tool for evidence-based planning, resource allocation, and monitoring of developmental efforts. The significant improvement in district performance reflects the impact of national flagship schemes coupled with localisation efforts through initiatives like the Aspirational Districts Programme. The index report provides detailed district-level analysis and recommendations for accelerating progress towards achieving the SDGs by 2030, ensuring that no district is left behind in the region's development journey.</p>",

    "question": "<p>India and the United Kingdom have taken a major step in building a stronger economic partnership with the signing of the Comprehensive Economic and Trade Agreement (CETA), in July 2025. Identify the CORRECT statement(s) regarding this.</p><p>I. The agreement secures duty-free access for 99% of India's exports to the UK, covering nearly the entire trade basket.</p><p>II. Under the Double Contribution Convention, Indian professionals and their employers will be exempt from social security payments in the UK for up to three years.</p><p>III. The agreement aims to double the bilateral trade between India and the UK from USD 56 billion to USD 112 billion by the year 2030.</p>",
    "options": [
      "II and III Only",
      "I Only",
      "III Only",
      "I and II Only",
      "I, II and III"
    ],
    "correct_option_id": 4,
    "solution": "<p>India and the United Kingdom have taken a major step in building a stronger economic partnership with the signing of the Comprehensive Economic and Trade Agreement (CETA) under the visionary leadership of Prime Minister Shri Narendra Modi. The agreement was signed by Commerce and Industry Minister, Mr. Piyush Goyal and Secretary of State for Business and Trade, Mr. Jonathan Reynolds in the presence of the two Prime Ministers.</p><p>&#183; <b>CETA secures unprecedented duty-free access for 99% of India's exports to the UK</b>, covering nearly the entire trade basket. This is expected to open new opportunities for labour-intensive industries such as textiles, marine products, leather, footwear, sports goods, toys, and gems and jewellery, alongside fast-growing sectors like engineering goods, auto components, and organic chemicals.</p><p>&#183; The services sector, a strong driver of India's economy, will also see wide-ranging benefits. The agreement provides greater market access in IT and IT-enabled services, financial and legal services, professional and educational services, and digital trade. Indian professionals, including those deployed by companies to work in UK across all services sectors, professionals deployed on contracts such as architects, engineers, chefs, yoga instructors, and musicians, will benefit from simplified visa procedures and liberalised entry categories, making it easier for talent to work in the UK.</p><p>&#183; India has also secured an agreement on the Double Contribution Convention. <b>This will exempt Indian professionals and their employers from social security payments in the UK for up to three years</b>, improving the cost competitiveness of Indian talent.</p><p>&#183; The agreement has been designed to make trade more inclusive. Women and youth entrepreneurs, farmers, fishermen, startups, and MSMEs will gain new access to global value chains, supported by provisions that encourage innovation, promote sustainable practices, and reduce non-tariff barriers.</p><p>&#183; CETA is expected to boost trade volumes significantly in the coming years, creating jobs, expanding exports, and supporting a deeper, more resilient economic relationship between India and the United Kingdom.</p>",

    "question": "<p>UIDAI has empowered Aadhaar number holders of India with the unique identity and a digital platform to authenticate anytime, anywhere. Which of the following statements is/are correct regarding UIDAI's recent steps towards Aadhaar number deactivation in case of death?</p><p>I. UIDAI deactivates Aadhaar numbers only after receiving biometric confirmation of death from the family.</p><p>II. UIDAI launched a service called \"Reporting of Death of a Family Member\" on the myAadhaar portal in June 2025.</p><p>III. UIDAI is sharing data of Aadhaar holders above 100 years with State Governments for verification of their living status.</p>",
    "options": [
      "I Only",
      "II and III Only",
      "III Only",
      "I and II Only",
      "I, II and III"
    ],
    "correct_option_id": 1,
    "solution": "<p>UIDAI has empowered Aadhaar number holders of India with the unique identity and a digital platform to authenticate anytime, anywhere. Aadhaar number is a unique 12-digit digital identity for the residents of India and NRIs. The 12-digit Aadhaar number is a random number generated without the use of any intelligence and, hence, not all 12-digit numbers are Aadhaar numbers. </p><p>&#183; No Aadhaar number is ever re-assigned to another individual. However, in case of the death of a person, it is essential that his/her Aadhaar number is deactivated to prevent identity fraud and unauthorised usage of such Aadhaar number. </p><p>&#183; It is also important to validate the status of the deceased Aadhaar number holders prior to deactivation of their Aadhaar numbers, as it may have widespread ramifications for them. </p><p><u>Therefore, in order to maintain the continued accuracy of the Aadhaar database, UIDAI has proactively taken the following measures to obtain death records from various sources and, deactivate Aadhaar numbers after due validation:</u></p><p>&#183; Recently, UIDAI requested the Registrar General of India (RGI) to share death records linked with Aadhaar numbers. </p><p>&#183; RGI has, till date, provided approximately 1.55 crore death records from 24 States/UTs using the Civil Registration System (CRS). After due validation, around 1.17 crore Aadhaar numbers have been deactivated. A similar exercise is continuing with non-CRS States/UTs. About 6.7 lakh death records have been received so far, and deactivation is in progress.</p><p>&#183; UIDAI has launched a new service - '<i>Reporting of Death of a Family Member</i>' - on the myAadhaar Portal on 9th June 2025 for deaths registered in 24 States/UTs presently using Civil Registration System. This portal allows individuals to report the death of their family members. </p><p>&#183; The family member, after authenticating himself/herself, is required to provide Aadhaar number and Death Registration Number along with other demographic details of the deceased person on the portal. </p><p>&#183; After due process of validation of the information submitted by the family member, further action is taken for the deactivation, or otherwise, of the Aadhaar number of the deceased person. The process of integration of remaining States/UTs with the portal is currently underway.</p><p>&#183; Besides above, UIDAI is also exploring the possibility of sourcing death records from banks and other Aadhaar ecosystem entities maintaining such information.</p><p>&#183; UIDAI is also taking support of State Governments in identifying the deceased Aadhaar number holders. As a pilot, demographic details of Aadhaar number holders aged more than 100 years are being shared with State Governments to verify whether the Aadhaar number holder is alive. Upon receipt of such verification report, necessary validation will be carried out before deactivating such Aadhaar number.</p><p>In order to prevent unauthorised usage of Aadhaar number of any family member after their death, it is recommended that Aadhaar number holders report death of their family members on my Aadhaar Portal after obtaining their death certificate from the death registering authorities.</p>",
    "question_index": 23
  },

    "question": "<p>India's electronics exports have surged by 47 percent to 12.41 billion dollars in the first quarter of the current fiscal, signalling the country's rise as a global manufacturing hub. Identify the CORRECT Statement(s) regarding this.</p><p>I. During April-June this fiscal, exports of ready-made garments of all textiles rose to 4.19 billion dollars as against 3.85 billion dollars in the same quarter last fiscal.</p><p>II. The US, UK, and China were the top three destinations for India's electronics exports.</p><p>III. The US remained the top export destination for both electronics and ready-made garments.</p>",

      "I Only",
      "I and III Only",
      "III Only",
      "I and II Only",
      "I, II and III"
    ],
    "correct_option_id": 1,
    "solution": "<p>India's electronics exports have surged by 47 percent to 12.41 billion dollars in the first quarter of the current fiscal, signalling the country's rise as a global manufacturing hub. According to the Commerce Ministry, the US, UAE, and China have emerged as the top three export destinations for India's electronics sector during the April-June quarter. This geographical spread highlights India's growing integration into the global electronics supply chain and underscores the country's emergence as a credible alternative manufacturing hub in Asia. The US remains India's largest export destination, commanding a 60.17 percent share, followed by the UAE (8.09 per cent) and China (3.88 per cent). </p><p>&#183; <u>The data also showed that the US remains the dominant export destination for India's ready-made garments. It accounted for 34.11 percent of shipments. The US is followed by the UK (8.81 per cent), the UAE (7.85 percent), Germany (5.51 percent), and Spain (5.29 percent). </u></p><p>&#183; <u>During April-June this fiscal, exports of ready-made garments of all textiles rose to 4.19 billion dollars as against 3.85 billion dollars in the same quarter last fiscal. </u></p><p>&#183; These figures reflect India's continued competitiveness in the global apparel market, backed by its skilled manufacturing base, diversified product offerings, and growing reputation for quality.</p>",

  }
