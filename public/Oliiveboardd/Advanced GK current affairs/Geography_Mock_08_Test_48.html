    "question": "<p>Read the statements given below and answer the following question.</p> <p>1. Sedimentary rocks are also called stratified rocks.</p> <p>2. Sedimentary rocks may contain fossils. </p> <p>3. Graphite is a sedimentary rock.</p><p>Which of the following options lists the incorrect statements?</p>",

    "question": "<p>Which of the following is the Pulicat Lake Bird Sanctuary known for?</p>",

    "correct_option_id": 1,
    "solution": "<p>The <b>Great Indian Bustard (Ardeotis nigriceps)</b> or Indian bustard is a bustard found in India and the adjoining regions of Pakistan. A large bird with a horizontal body and long bare legs, giving it an ostrich like appearance, this bird is among the heaviest of the flying birds. Once common on the dry plains of the Indian subcontinent, as few as 250 individuals were estimated in 2011 to survive and the species is critically endangered by hunting and loss of its habitat, which consists of large expanses of dry grassland and scrub. These birds are often found associated in the same habitat as blackbuck. In India, the bird was historically found in Punjab, Haryana, Uttar Pradesh, Madhya Pradesh, Chhattisgarh, Orissa, Andhra Pradesh, Rajasthan, Gujarat, Maharashtra, Karnataka and Tamil Nadu. <b>Today the bustard is restricted to isolated pockets in Andhra Pradesh, Gujarat, Karnataka, Maharashtra, Madhya Pradesh and Rajasthan (shared with Pakistan).</b></p> <p><b>Pulicat Lake Bird Sanctuary </b>is a famous 481 km&#178; located in Nellore, Chittoor districts of Andhra Pradesh and Protected area in Thiruvallur District of Tamil Nadu state near Elavur in South India. Pulicat Lake is the second largest brackish-water eco-system in India after Chilka lake in Orissa. The sanctuary is most noted for the many <b>greater flamingos</b> seen here. The biodiversity of this lake attracts hundreds of thousands of visitors per year.</p> <p>The <b>pink-headed duck (Rhodonessa caryophyllacea) is (or was) a large diving duck that was once found in parts of the Gangetic plains of India, Bangladesh and in the riverine swamps of Myanmar but feared extinct since the 1950s.</b> Numerous searches have failed to provide any proof of continued existence. It has been suggested that it may exist in the inaccessible swamp regions of northern Myanmar and some sight reports from that region have led to its status being declared as \"critically endangered\" rather than extinct. The genus placement has been disputed and while some have suggested that it is close to the red-crested pochard (Netta rufina), others have placed it in a separate genus of its own. It is unique in the pink coloration of the head combined with a dark body. A prominent wing patch and the long slender neck are features shared with the common <b>Indian spot-billed duck</b>. </p> <p>The <b>Indian vulture (Gyps indicus) is an Old World vulture</b> and is closely related to the griffon vulture, G. fulvus. It breeds mainly on hilly crags in central and peninsular India. The Indian vulture and the white-rumped vulture, G. bengalensis species have suffered a 99% - 97% population decrease in Bangladesh, Pakistan and India. Between 2000-2007 annual decline rates of this species averaged over sixteen percent. The cause of this has been identified as poisoning caused by <b>the veterinary drug diclofenac. </b>Diclofenac is a <b>non-steroidal anti-inflammatory drug (NSAID)</b> and when given to working animals it can reduce joint pain and so keep them working for longer. The drug is believed to be swallowed by vultures with the flesh of dead cattle that were given diclofenac in the last days of life. <b>Diclofenac causes kidney failure in several species of vultures.</b> In March 2006 the Indian Government announced its support for a <b>ban on the veterinary use of diclofenac.</b></p>",
