  {
    "question": "<p>Reserve Bank of India Governor Sanjay Malhotra proposed to issue three draft guidelines for customer protection, in February 2026. Identify the following CORRECT statement(s) regarding this. </p><p>I. The RBI proposes to issue draft guidelines on mis-selling, recovery of loans, and limiting customer liability in unauthorised electronic banking transactions. </p><p>II. A framework has been proposed to compensate customers up to Rs. 25,000 for losses incurred in small-value fraudulent transactions. </p><p>III. The existing instructions on limiting customer liability in unauthorised electronic transactions were first issued in 2020.</p>",
    "options": [
      "I only",
      "II only",
      "I and III only",
      "I and II only",
      "I, II, and III"
    ],
    "correct_option_id": 3,
    "solution": "<p>Reserve Bank of India Governor Sanjay Malhotra proposed to issue three draft guidelines for customer protection: one, relating to mis-selling; two, regarding <b>recovery of loans and engagement of recovery agents</b>; and three, on limiting liability of customers in unauthorised electronic banking transactions.</p><p>&#183; <b>\"It is also proposed to introduce a framework to compensate customers up to an amount of Rs. 25,000 for loss incurred in small-value fraudulent transactions,\" he said.</b></p><p>&#183; The extant instructions on limiting the liability of customers in unauthorised electronic banking transactions <b>were issued in 2017,</b> which deal with scenarios and timelines for zero/limited liability of a customer.</p><p>&#183; In view of the rapid adoption of technology in the banking sector and payments systems, since issuance of these instructions, the existing instructions have been reviewed, he said.</p><p>&#183; Accordingly, he said, the draft revised instructions, including a framework for compensation in case of small value fraudulent transactions, would be issued shortly for public consultation.</p><p>&#183; Observing that misselling financial products and services by any regulated entities has significant consequences for both customers as well as on such entities, Malhotra said, there is a felt need to ensure that third party products and services that are being sold at the bank counters are suitable to customer needs and are commensurate with the risk appetite of individual clients.</p><p>&#183; \"It has therefore been decided to issue comprehensive instructions to REs on advertising, marketing and sales of financial products and services. Draft instructions in this regard would be issued shortly for public consultation,\" he said.</p><p>&#183; He further said different sets of instructions are applicable to different categories of REs with respect to the engagement of recovery agents and conduct related aspects of loan recovery presently.</p><p>&#183; It has now been decided to review and harmonise all the extant conduct related instructions on engagement of recovery agents and other aspects related to recovery of loans, he said.</p><p>&#183; Announcing Mission Mission Saksham, the RBI Governor said it is focussed on capacity building for Urban Cooperative Banks.</p><p>&#183; Stressing that the Primary (Urban) Co-operative Banks (UCBs) are vital institutions for promoting financial inclusion and serving the unbanked, he said, securing their next phase of growth would depend on developing stronger skills and competencies, along with technical capabilities and operational resilience in them.</p><p>&#183; To serve this objective, he said, the Reserve Bank will soon launch Mission SAKSHAM (Sahakari Bank Kshamta Nirman) -- a sector-wide capacity-building and certification framework.</p><p>&#183; The capacity building of the sector will be implemented through a large number of physical training programmes as well as a scalable learning platform, to cover about 1.40 lakh participants, across functions, he said.</p><p>&#183; The Reserve Bank would endeavour to conduct these training programmes at locations close to participating UCBs, with content delivery in regional languages to the extent feasible, he said.</p><p>&#183; The mission will be pursued in partnership with the umbrella organisation of UCBs and national/state federations.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Consider the following statements regarding Mission SAKSHAM announced by the Reserve Bank of India, Which of the statements given is/are INCORRECT regarding this? </p><p>I. Mission SAKSHAM is a sector-wide capacity-building and certification framework for Urban Co-operative Banks (UCBs). </p><p>II. The mission aims to cover about 1.40 lakh participants through physical training programmes and a digital learning platform. </p><p>III. Training under the mission will be conducted only in English to maintain uniformity across regions.</p>",
    "options": [
      "I only",
      "II only",
      "III only",
      "I and II only",
      "I, II, and III"
    ],
    "correct_option_id": 2,
    "solution": "<p>Reserve Bank of India Governor Sanjay Malhotra proposed to issue three draft guidelines for customer protection: one, relating to mis-selling; two, regarding recovery of loans and engagement of recovery agents; and three, on limiting liability of customers in unauthorised electronic banking transactions.</p><p>&#183; \"It is also proposed to introduce a framework to compensate customers up to an amount of '25,000 for loss incurred in small-value fraudulent transactions,\" he said.</p><p>&#183; The extant instructions on limiting the liability of customers in unauthorised electronic banking transactions were issued in 2017, which deal with scenarios and timelines for zero/limited liability of a customer.</p><p>&#183; In view of the rapid adoption of technology in the banking sector and payments systems, since issuance of these instructions, the existing instructions have been reviewed, he said.</p><p>&#183; Accordingly, he said, the draft revised instructions, including a framework for compensation in case of small value fraudulent transactions, would be issued shortly for public consultation.</p><p>&#183; Observing that misselling financial products and services by any regulated entities has significant consequences for both customers as well as on such entities, Malhotra said, there is a felt need to ensure that third party products and services that are being sold at the bank counters are suitable to customer needs and are commensurate with the risk appetite of individual clients.</p><p>&#183; \"It has therefore been decided to issue comprehensive instructions to REs on advertising, marketing and sales of financial products and services. Draft instructions in this regard would be issued shortly for public consultation,\" he said.</p><p>&#183; He further said different sets of instructions are applicable to different categories of REs with respect to the engagement of recovery agents and conduct related aspects of loan recovery presently.</p><p>&#183; It has now been decided to review and harmonise all the extant conduct related instructions on engagement of recovery agents and other aspects related to recovery of loans, he said.</p><p>&#183; <b>Announcing Mission Mission Saksham, the RBI Governor said it is focussed on capacity building for Urban Cooperative Banks.</b></p><p>&#183; Stressing that the Primary (Urban) Co-operative Banks (UCBs) are vital institutions for promoting financial inclusion and serving the unbanked, he said, securing their next phase of growth would depend on developing stronger skills and competencies, along with technical capabilities and operational resilience in them.</p><p>&#183; To serve this objective, he said, the Reserve Bank will soon launch Mission SAKSHAM (Sahakari Bank Kshamta Nirman) -- a sector-wide capacity-building and certification framework.</p><p>&#183; <b>The capacity building of the sector will be implemented through a large number of physical training programmes as well as a scalable learning platform, to cover about 1.40 lakh participants, across functions, he said.</b></p><p>&#183; <b>The Reserve Bank would endeavour to conduct these training programmes at locations close to participating UCBs, with content delivery <u>in regional languages</u> to the extent feasible, he said.</b></p><p>&#183; The mission will be pursued in partnership with the umbrella organisation of UCBs and national/state federations.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Reserve Bank of India (RBI) has released draft guidelines barring banks and their recovery agents from using harsh or coercive practices. Identify the CORRECT Statement(s) regarding this. </p><p>I. Recovery agents are to interact only with borrowers or guarantors, and not with relatives or other associates. </p><p>II. Recovery calls and visits are permitted only between 8 am and 7 pm, with banks required to respect borrower requests to avoid contact at specific times.</p><p>III. For microfinance loans, field visits to a borrower's residence or workplace are permitted if the borrower fails to appear at the designated collection place on two or more successive occasions.</p>",
    "options": [
      "I only",
      "II only",
      "I and III only",
      "I and II only",
      "I, II, and III"
    ],
    "correct_option_id": 4,
    "solution": "<p>Reserve Bank of India (RBI) has released draft guidelines barring banks and their recovery agents from using harsh or coercive practices. The draft norms explicitly prohibit abusive or threatening language, excessive or anonymous calls, inappropriate messages, harassment of borrowers or their associates, public humiliation, threats of violence, and misleading representations regarding debt obligations or the consequences of non-repayment. </p><p>&#183; The proposed norms are set to take effect from July 1. Feedback on the draft may be submitted by March 4. Under the draft guidelines, banks are required to establish a dedicated mechanism for addressing recovery-related grievances. </p><p>&#183; The central bank has mandated that banks document the time and number of calls made by employees or recovery agents to borrowers or guarantors. </p><p>&#183; Banks must also ensure that all such calls are recorded. <b>RBI has proposed that recovery agents interact only with borrowers or guarantors, refraining from contacting relatives or other associates. Recovery calls and visits would be allowed only between 8 am and 7 pm, and banks must honour a borrower's request to avoid contact at specific times under normal circumstances</b>. Agents have also been directed to avoid recovery attempts during sensitive occasions such as bereavement, family emergencies, marriages, or festivals. </p><p>&#183; <b>For microfinance loans, collections must occur at a mutually agreed designated location. However, field visits to the borrower's residence or workplace would be permitted if the borrower fails to appear at the designated place on two or more successive occasions</b>. Lenders are also expected to ensure that recovery agents undergo training and receive certification from the Indian Institute of Banking &amp; Finance after completing the programme for debt recovery agents. </p><p>&#183; Banks must implement a proper code of conduct for both recovery agents and employees involved in loan recovery and obtain their agreement to abide by these guidelines before assigning duties. Banks must display an up-to-date list of empanelled recovery agents across all channels, including branches, officers, and digital platforms. In cases where an agreement with an agent is terminated, the bank must publicise the change to ensure borrowers do not continue to deal with the agent or its representatives. </p><p>&#183; When a case is forwarded to a recovery agent, banks are required to inform the borrower in writing ' either through a letter to their current address, an SMS to their registered mobile number, or an email to their registered address. The bank must also notify the borrower of any changes in the recovery agent during an ongoing recovery process. Banks must ensure that borrower information is shared with employees or recovery agents only to facilitate loan recovery duties and must implement safeguards to prevent misuse of this information. </p><p>&#183; If a borrower has lodged a grievance, the bank should not forward the concerned recovery case to an employee or recovery agent until the grievance is resolved. However, where the bank is convinced, with appropriate evidence, that the borrower is making frivolous or vexatious complaints to avoid recovery, it may continue recovery proceedings even if a grievance is pending.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Under the RBI's prudential norms for capital-market intermediaries effective from April 1, 2026, consider the following statements and identify the CORRECT Statement(s) regarding this. </p><p>I. All bank credit facilities to securities firms must be backed by collateral. </p><p>II. Bank lending for brokers' proprietary trading or for their own investments is prohibited. </p><p>III. Bank guarantees issued on behalf of a broker for proprietary trades must be fully secured, with at least 50% of collateral in cash. </p><p>IV. Loans given by banks for Margin Trading Facility may be partly secured, and stocks as collateral are to be valued with only a 10% discount.</p>",
    "options": [
      "I and II Only",
      "I, II and III Only",
      "II and IV Only",
      "I and IV Only",
      "All I, II, III and IV"
    ],
    "correct_option_id": 1,
    "solution": "<p>India's central bank tightened rules for loans taken by firms that undertake proprietary trading in shares and commodities and offer leverage to clients, the latest measure aimed at reducing speculative market activity in the South Asian nation. <b>All credit facilities to securities firms will have to be backed by collateral</b>, while lending for trading on their own account or investments by brokers will be prohibited, according to a statement published on the Reserve Bank of India's website.</p><p>&#183; The so-called prudential rules for capital market intermediaries such as stock and commodity brokers will come into effect from April 1, the central bank said.'</p><p>&#183; <b>The stricter measures would raise the cost of raising capital by proprietary trading firms and squeeze profits. While Indian banks traditionally do not directly finance proprietary trading, the directive closes a loophole that allowed short-term working capital loans given by banks to be diverted for trading by brokers.'</b></p><p>&#183; Proprietary trading firms accounted for more than 50 per cent of equity options turnover on the National Stock Exchange of India Ltd. </p><p>&#183; The latest step comes just days after India sharply raised transaction tax on trading of single-stock and index derivatives in a bid to reduce speculative trading. Combined with the central bank's new rules, market participants fear the rules will hurt volumes.</p><p>&#183; <b>The RBI has also asked banks to demand that guarantees extended by them on behalf of a broker for proprietary trades to be fully secured, with 50 per cent of collateral being in cash and rest as cash equivalents and government securities. </b>The new rule will narrow the type of securities trading firms can offer as collateral to banks.' '</p><p>&#183; <b>The central bank also tightened lending rules for margin trading facility under which stock brokers offer leverage to their clients. Loans given by banks for the product will have to be fully secured by cash and other liquid securities. Stocks offered as collateral by brokers will be considered at a <u>40 per cent</u> valuation discount.'</b></p><p>&#183; Margin trading facility has grown rapidly into a more than '1 trillion ($11 billion) market for stock brokers, where clients can get leverage of upto five times their capital.</p>",
    "question_index": 3
  },
  {
    "question": "<p>With reference to the RBI's February 2026 draft directions on Foreign Exchange Dealings of Authorised Persons released. for offshore ETPs, consider the following statements and Identify the CORRECT Statement(s) regarding this.</p><p>I. Offshore ETPs must be located in FATF member jurisdictions and regulated by authorities affiliated with CPMI or IOSCO.</p><p>II. For trades involving the Indian rupee, authorised dealers may transact only with non-residents.</p><p>III. The offshore ETP operator is required to publicly disseminate transaction data.</p>",
    "options": [
      "I and II Only",
      "II and III Only",
      "I and III Only",
      "I, II and III",
      "I Only"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Reserve Bank of India (RBI) has proposed allowing authorised dealers commercial banks and primary dealers to undertake foreign exchange and currency interest rate derivative transactions on electronic trading platforms (ETPs) located outside India, subject to defined regulatory safeguards, according to draft directions on Foreign Exchange Dealings of Authorised Persons released.</p><p>&#183; <b>Under the draft framework, such offshore platforms must be located in jurisdictions that are members of the Financial Action Task Force and regulated by authorities affiliated with the Committee on Payments and Market Infrastructures or the International Organization of Securities Commissions. For trades involving the rupee, authorised dealers may transact only with non-residents, and the offshore ETP operator will be required to <u>publicly disseminate transaction</u> data.'</b></p><p>&#183; The RBI has invited comments from market participants and other stakeholders by March 10.'</p><p>&#183; The draft also proposes that authorised dealer (AD) Category-I banks may undertake rupee non-deliverable derivative contracts (NDDCs) with other ADs and overseas entities, including International Financial Services Centre (IFSC) Banking Units (IBUs) and Offshore Banking Units (OBUs), either directly or on a back-to-back basis through their overseas branches. Such contracts may be cash-settled in rupees or any foreign currency, subject to the condition that the bank, or its non-resident parent, has an operating IBU.</p><p>&#183; In addition, the RBI has set out governance requirements for authorised dealers. They would be required to frame a board-approved policy on foreign exchange dealings, including a net overnight open position (NOOP) limit capped at 25 per cent of total capital (Tier I and Tier II), which must be communicated to the central bank. The RBI would retain the discretion to prescribe a separate net open position limit involving the rupee, depending on market conditions.</p><p>&#183; The draft reiterates overseas foreign currency borrowing limits for AD Category-I banks at 100 per cent of Tier I capital or $10 million, whichever is higher, unless prior RBI approval is obtained. Certain categories ' including borrowings for export credit, capital-raising purposes, specified interest-free funds from the head office, and short-term nostro overdrafts ' remain outside this cap. Standalone Primary Dealers authorised as AD Category-III may borrow within limits prescribed under the Standalone Primary Dealers Directions, 2025.</p><p>&#183; The central bank has also consolidated norms governing the deployment of surplus foreign currency funds by authorised dealers. Subject to a board-approved policy, ADs may undertake overnight placements, reverse repos of up to one year against overseas sovereign debt, investments in overseas money market or sovereign debt instruments with maturities of up to one year, and lending in rupees or foreign currency in terms of the Foreign Exchange Management (Borrowing and Lending) Regulations, 2018. Undeployed FCNR(B) funds may also be invested in long-term overseas sovereign debt, subject to residual maturity conditions.</p><p>&#183; For the purpose of the draft circular, 'authorised persons' refers to AD Category-I banks and Standalone Primary Dealers authorised as Authorised Dealer Category-III under Section 10(1) of the Foreign Exchange Management Act, 1999.</p><p>&#183; The move comes amid the RBI's broader efforts over the past year to streamline foreign exchange regulations, deepen derivative markets, and align trading practices with evolving electronic platform norms.</p>",
    "question_index": 4
  },
  {
    "question": "<p>The Reserve Bank of India has deferred the implementation of the Unique Transaction Identifier (UTI) framework for over-the-counter (OTC) derivative transactions to 1 January 2027, following industry feedback. Identify the correct Statement(s) regarding this. </p><p>I. Outstanding OTC derivative contracts entered into before the framework's effective date must be assigned UTIs retroactively. </p><p>II. The RBI retained the 'waterfall' hierarchy for UTI generation and did not mandate electronic trading platforms (ETPs) to generate UTIs. </p><p>III. Delegation of UTI generation to a vendor, where the vendor's Legal Entity Identifier (LEI) would be embedded in the UTI, is not permitted.</p>",
    "options": [
      "I only",
      "II only",
      "I and III only",
      "I and II only",
      "I, II, and III"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Reserve Bank of India has deferred the implementation of the Unique Transaction Identifier (UTI) framework for over-the-counter (OTC) derivative transactions to 1 January 2027, following industry feedback, the central bank said in a release. The central bank had earlier proposed to implement UTI for all transactions in OTC markets from 1 April 2026, covering rupee interest rate derivatives, forward contracts in government securities, foreign currency derivatives, foreign currency interest rate derivatives and credit derivatives.</p><p>&#183; In its final directions, the RBI said the rollout timeline has been extended from the earlier proposed date to provide market participants sufficient time to build the necessary technical capabilities after the issuance of revised reporting formats and operating guidelines.</p><p>&#183; Further, the RBI clarified that the directions will apply only to OTC derivative transactions entered into on or after the date the framework comes into effect. <b>Outstanding contracts prior to the implementation date will not be required to obtain a UTI.</b></p><p>&#183; <b>On the issue of UTI generation, the RBI retained the proposed 'waterfall' mechanism that sets out the order of entities responsible for generating the identifier. While some stakeholders had suggested mandating electronic trading platforms (ETPs) to generate UTIs, the regulator declined to prescribe a single entity.</b></p><p>&#183; In line with global standards, the RBI said the mandate is for generation and reporting of the UTI, while providing flexibility regarding which entity generates it, based on the prescribed hierarchy or mutual agreement between counterparties. However, delegation of UTI generation to a vendor, where the Legal Entity Identifier embedded in the UTI would be that of the vendor, will not be permitted.</p><p>&#183; For transactions reportable in multiple jurisdictions where there is no earlier foreign reporting deadline, the RBI has clarified that the UTI-generating entity may be mutually agreed upon by counterparties. A similar provision has also been introduced for trades reportable only in India, offering operational flexibility.</p><p>&#183; Meanwhile, the RBI has extended the timeline for submission of the final UTI in cases where it is not available at the time of reporting. Market participants will now have five business days from the date of the transaction to report the UTI, instead of the earlier proposed two business days.</p><p>&#183; Additionally, a provision has been introduced allowing the reporting counterparty to generate and report a temporary UTI to the trade repository if the final UTI is not available from the counterparty at the time of reporting.</p><p>&#183; The directions maintain that modifications to contract details will be treated as updates and will not require generation of a new UTI. However, lifecycle events such as novation resulting in a new reportable derivative contract will necessitate a fresh identifier.</p><p>&#183; The Clearing Corporation of India Limited (CCIL) will issue revised reporting formats and detailed operating guidelines for reporting OTC derivative transactions with UTIs. The RBI said queries and requests for further clarifications received from market participants have been shared with CCIL for suitable incorporation in the formats and guidelines.</p>",
    "question_index": 5
  },
  {
    "question": "<p>In February 2026, The Controller General of Accounts (CGA), Ms. T.C.A. Kalyani, launched two major initiatives aimed at strengthening the governance and efficiency of banks handling government transactions i.e. the Government Bank Dashboard and the Government Bank Manual in New Delhi. The Government Bank Manual primarily aims to:</p>",
    "options": [
      "Regulate private sector lending",
      "Standardize procedures for handling government business",
      "Supervise foreign exchange transactions",
      "Audit cooperative banks",
      "Monitor credit ratings of PSBs"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Controller General of Accounts (CGA), Ms. T.C.A. Kalyani, launched two major initiatives aimed at strengthening the governance and <b>efficiency of banks handling government transactions</b> i.e. the Government Bank Dashboard and the Government Bank Manual in New Delhi.</p><p>&#183; The Government Bank Manual provides a comprehensive and standardized framework for banks for handling government business . It clearly defines operational procedures, reporting obligations, reconciliation timelines, and compliance requirements. Its objective is straightforward: reduce ambiguity, mitigate operational risk, and strengthen accountability across all stakeholders.</p><p>&#183; The Government Bank Dashboard introduces real-time, data-driven monitoring of critical banking functions wrt government business. It tracks key performance indicators such as remittance timelines, scroll compliance, reconciliation status, transaction success rates, and adherence to service-level standards. This represents a significant shift from reactive, post-facto corrections to proactive oversight and performance management.</p><p>&#183; Emphasizing the broader vision behind these initiatives, the CGA highlighted that the reforms institutionalize uniform procedures and objective benchmarks, while reinforcing shared responsibility in safeguarding public funds. The next phase of reforms will focus on deeper digital integration, strengthened cybersecurity safeguards, advanced analytics capabilities, and institutional capacity building ' further modernizing the ecosystem of government banking operations.</p>",
    "question_index": 6
  },
  {
    "question": "<p>With reference to the Income Tax Act, 2025, consider the following statements, Which of the statements given is/are correct?</p><p>I. The Income Tax Act, 2025 will come into force from 1st April 2026, and simplified Income Tax Rules and Forms will be notified separately.</p><p>II. A Joint Committee of the Ministry of Corporate Affairs and the Central Board of Direct Taxes will be constituted to integrate ICDS requirements into Indian Accounting Standards (IndAS).</p><p>III. Separate accounting requirements based on ICDS will continue alongside IndAS beyond the tax year 2028-29.</p><p>IV. The Budget proposes to rationalize the definition of accountant under Safe Harbour Rules to promote Indian accounting and advisory firms globally.</p>",
    "options": [

    "question": "<p>The Union Budget 2026 has proposed the Foreign Assets of Small Taxpayers ' Disclosure Scheme (FAST'DS), 2026. What is the primary objective of the Foreign Assets of Small Taxpayers ' Disclosure Scheme (FAST'DS), 2026?</p>",
    "options": [
      "Facilitating overseas investment by residents",
      "Providing a one-time amnesty to disclose undisclosed foreign assets and income",
      "Encouraging foreign remittances into India",
      "Regularising domestic black money",
      "Offering permanent tax exemptions on foreign income"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Union Budget 2026 has proposed the Foreign Assets of Small Taxpayers ' Disclosure Scheme (FAST'DS), 2026, a one-time amnesty window for small taxpayers to regularise undisclosed foreign assets and foreign-sourced income relating to past years.</p><p>&#183; FAST'DS is a one-time, time-bound amnesty initiative that allows eligible taxpayers to voluntarily declare previously unreported foreign assets and foreign-sourced income from past years. 'By making a prescribed payment, eligible taxpayers can regularise such disclosures and obtain immunity from further tax, penalty, and prosecution under the Black Money law, subject to specified conditions and thresholds,' says Shubham Jain, director, SVAS Business Advisors.</p><p>&#183; The scheme covers individuals who were residents in the year in which the undisclosed asset or income arose. It also includes those who are non-residents currently but were residents when they acquired the asset.</p><p>&#183; However, the scheme is limited to small taxpayers and applies only within specified monetary caps on undisclosed foreign assets and income.'</p><p>&#183; FAST'DS allows disclosure of undisclosed foreign assets such as overseas immovable property or investments held directly or as a beneficial owner, where the source of investment is unexplained or unsatisfactorily explained.</p><p>&#183; For cases where the combined value of undisclosed income and assets is up to Rs 1 crore, the payable amount includes 30 per cent tax on the asset value as of March 31, 2026, 30 per cent tax on the undisclosed income, and a penalty equal to 100 per cent of the tax computed. 'In contrast, a flat fee of Rs 1 lakh applies to undisclosed foreign assets up to Rs 5 crore if they were acquired during non-resident status or funded from income already taxed in India but not disclosed after becoming a resident,' says Raote.</p><p>&#183; After a taxpayer files a declaration, the authority will electronically verify it and issue an order determining the payable amount within one month. Jain says taxpayers must pay within two months of receiving the order, with an option to seek a further two-month extension by paying interest at 1 per cent per month. The taxpayer must intimate payment details within this period.</p><p>&#183; FAST'DS applies to Indian resident taxpayers'resident and ordinarily resident individuals, as well as other resident assessees such as companies and firms'whose undisclosed foreign income or assets fall within the prescribed limits and were not disclosed in earlier returns.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Black Money Act: Tax, penalties and prosecution</b>'   &#183; 30 per cent tax on undisclosed item.   &#183; Penalty up to three times tax due; effectively up to 90 per cent of' value, over and above 30 per cent tax   &#183; Non-disclosure of foreign assets exceeding Rs 20 lakh: Rs 10 lakh penalty, even if unintentional   &#183; Aggregate non-disclosure up to Rs 20 lakh in a financial year: no penalty or prosecution, subject to conditions; foreign immovable property excluded from threshold   &#183; Wilful non-disclosure in ITR by resident taxpayer: rigorous imprisonment six months to seven years, plus fine</td></tr></table>",

    "question": "<p>With coverage designed to prioritise large and strategic urban centres, the Urban Challenge Fund (UCF) approved for FY 2025'26 identifies specific categories of cities eligible under the Fund and its guarantee support. Which of the following is NOT listed among the coverage/eligibility categories?</p>",
    "options": [

    "correct_option_id": 3,
    "solution": "<p>The Union Cabinet chaired by the Prime Minister, Shri Narendra Modi approved the launch of the Urban Challenge Fund (UCF) with a total Central Assistance (CA) of Rs. One lakh crore. CA will cover 25% of the project cost, subject to raising minimum 50% of the project cost from market. This will lead to a total investment of Rs. Four lakh crore in urban sector in next five years, marking a paradigm shift in India's urban development approach from grant- based financing to market-linked, reform-driven and outcome-oriented infrastructure creation.</p><p>&#183; The Urban Challenge Fund will leverage market finance, private participation and citizen- centric reforms for delivery of high-quality urban infrastructure. The Fund aims to build resilient, productive, inclusive and climate-responsive cities, positioning those as key driver of the country's next phase of economic growth.</p><p>&#183; The Fund will be operational from FY 2025'26 to FY 2030'31, with an extendable implementation period up to FY 2033'34. It gives effect to the Government's vision announced in Budget 2025'26 to implement proposals relating to Cities as Growth Hubs, Creative Redevelopment of Cities, and Water and Sanitation.</p><p><b>Salient Features of the Urban Challenge Fund:</b></p><p>1) A minimum of 50 per cent of project financing have to be mobilised from market sources, including municipal bonds, bank loans and Public'Private Partnerships (PPPs). The remaining share may be contributed by States, Union Territories (UTs), Urban Local Bodies (ULBs) or other sources.</p><p>2) Projects will be selected through a transparent and competitive challenge mode, ensuring support to high-impact and reform-oriented proposals.</p><p>3) There will be a strong thrust on reforms across Urban Governance, Market &amp; Financial systems, Operational efficiency, and Urban Planning</p><p>4) Private sector participation will be encouraged through structured risk-sharing frameworks and benchmarking of service delivery standards</p><p>5) A dedicated '5,000 crore corpus will enhance the creditworthiness of 4223 cities including Tier- II and Tier-III cities, particularly for first-time access to market finance.</p><p>6) Positioning ULBs as Bankable Asset Class.</p><p><b>Credit Repayment Guarantee for Smaller Cities:</b></p><p>&#183; <b><u>In order to facilitate first-time access to market finance for all Cities/ULBs in Northeastern &amp; Hilly States and smaller ULBs (&lt;1,00,000 population) in other States/UTs, a Credit Repayment Guarantee Scheme of '5,000 crore has been approved.</u></b> The scheme will provide a Central guarantee of up to '7 crore or 70 per cent of the loan amount (whichever is lower) for first-time loans. On successful repayment of first loan, central guarantee of '7 crore or 50 per cent of the loan amount (whichever is lower) will be provided. This will effectively support projects of minimum Rs.20 crore for the first time and Rs.28 crore for subsequent projects in smaller cities.</p><p><b>Challenge-Based Project Selection:</b></p><p>&#183; Projects under the Fund will be selected through a challenge-based framework including transformative impact, sustainability &amp; reform orientation. Funding will be linked to reforms, milestones and clearly defined outcomes. Continuation of reforms will be a prerequisite for further fund release. Paperless monitoring of projects and reforms will be facilitated through a single digital portal of the Ministry of Housing and Urban Affairs.</p><p><b>Project Verticals:</b></p><p>&#183; Cities as Growth Hubs, identification of city regions, important economic nodes, integrated spatial economic &amp; transit planning - including greenfield and semi-greenfield developments, and development along transit and economic corridors, urban mobility, critical infrastructure projects to enhance economic competitiveness;</p><p>&#183; Creative Redevelopment of Cities, covering renewal of central business districts and heritage cores, brownfield regeneration, Transit Oriented Development and retrofitting of legacy infrastructure, Climate resilience, disaster mitigation and countermagnets to decongest the existing cities in Northeastern &amp; Hilly States; and</p><p>&#183; Water and Sanitation, including upgradation of water supply, sewerage and stormwater systems, Rurban infrastructure, water grids and integrated solid waste management, including legacy waste remediation, focusing on swachhata.</p><p><b>Coverage:</b> The Fund will cover:</p><p>&#183; <b><u>All cities with a population of 10 lakh or more (2025 estimates);</u></b></p><p>&#183; <b><u>All State and Union Territory capitals not covered above; and</u></b></p><p>&#183; <b><u>Major industrial cities with a population of 1 lakh or more.</u></b></p><p>Additionally, all ULBs in hilly States, North-Eastern States, and smaller ULBs with population below 1 lakh will be eligible for support under the Credit Repayment Guarantee Scheme. In principle all cities will be covered under UCF <b>Reform-Linked Funding Framework:</b> Funding under the Urban Challenge Fund is anchored to a comprehensive reform agenda covering:</p><p>&#183; Governance and digital reforms;</p><p>&#183; Market and financial reforms to strengthen creditworthiness;</p><p>&#183; Operational reforms for improved service delivery and utility efficiency;</p><p>&#183; Urban planning and spatial reforms, including transit-oriented development and green infrastructure; and</p><p>&#183; Project-specific reforms with defined Key Performance Indicators (KPIs), third-party verification and sustainable Operation &amp; Maintenance mechanisms.</p><p><b>Outcome Orientation:</b></p><p>1) Projects will be evaluated on their ability to deliver transformative outcomes- economic, social and climate, including revenue mobilization, private investment, job creation and, improved safety, inclusiveness, service equity and cleanliness.</p><p>2) The Urban Challenge Fund is expected to catalyse large-scale private investment, strengthen urban governance, and accelerate the creation of future-ready cities aligned with national development priorities.</p>",

    "question": "<p>In February 2026, the Government of India linked enforcement in the edible oils sector to due process under the Essential Commodities Act. Consider the following statements about the VOPPA Order, 2025 and related legal safeguards, and identify the correct ones regarding this. </p><p>I. The VOPPA Order, 2025 mandates compulsory registration on both the NSWS and the VOPPA portal for manufacturers, processors, blenders, and re-packers of edible oils. </p><p>II. The amended Order requires monthly returns covering production, stocks, imports, dispatches, sales, and consumption of edible oil products. </p><p>III. Under Section 6B of the Essential Commodities Act, 1955, authorities may pass confiscation orders without providing any opportunity to show cause in urgent cases.</p>",

      "I, II, and III"

    "correct_option_id": 3,
    "solution": "<p>The Government of India has strengthened regulatory oversight across the edible oil value chain through the Vegetable Oil Products, Production and Availability (Regulation) Amendment Order, 2025 (VOPPA Order, 2025). </p><p>&#183; The amended Order mandates compulsory registration of all manufacturers, processors, blenders and re-packers of edible oils on the National Single Window System (NSWS) and the VOPPA portal, along with mandatory monthly submission of detailed production, stock and availability returns. </p><p>&#183; Under the amended VOPPA Order, 2025, all registered entities are required to file monthly returns covering production, stocks, imports, dispatches, sales and consumption of various edible oil products, including crude and refined vegetable oils, solvent-extracted oils, blended oils, vanaspati, margarine and other notified products. </p><p>&#183; <b><u>The concerned entities have been informed that, under Section 6A of the Essential Commodities Act, 1955, action including inspection and confiscation may be initiated in cases of contravention. </u></b></p><p>&#183; Further, as per Section 6B, a reasonable opportunity to show cause must be provided before any confiscation order is passed. Accordingly, the units have been given seven days to submit written explanations as to why action should not be initiated against them. </p><p>&#183; The Department has also clarified that similar Show Cause Notices will be issued to all units that are either not registered under the VOPPA framework or have failed to file mandatory returns, to ensure uniform compliance across the sector.</p>",

    "question": "<p>The Government has revised the startup recognition framework to further strengthen the Startup India Action Plan and advance the Prime Minister's vision of positioning India as a global innovation powerhouse, a manufacturing-led economy, and a hub for emerging technologies. Identify the CORRECT Statement(s) regarding this. </p><p>I. A dedicated 'Deep Tech Startup' sub-category has been introduced. </p><p>II. For deep tech entities, the turnover limit for recognition has been enhanced to Rs 300 crore. </p><p>III. Cooperative societies registered under State/UT Cooperative Acts and Multi-State Cooperative Societies registered under the Multi-State Cooperative Societies Act, 2002 are now eligible for startup recognition, subject to other criteria.</p>",

    "correct_option_id": 4,
    "solution": "<p>The Government has revised the startup recognition framework to further strengthen the Startup India Action Plan and advance the Prime Minister's vision of positioning India as a global innovation powerhouse, a manufacturing-led economy, and a hub for emerging technologies. As Startup India enters its second decade, the revised framework seeks to provide a more predictable, inclusive and future-ready policy environment for founders, while facilitating the flow of long-term patient capital into high-technology and research-intensive sectors. Key revisions to the startup recognition criteria are as follows:</p><p>&#183; <b>Enhanced turnover threshold for startup recognition</b>: Keeping in view the evolving startup ecosystem and the need to support enterprises at different stages of their business lifecycle, the turnover limit for recognition as a startup has been increased from '100 crore to '200 crore.</p><p>&#183; <b>Introduction of a dedicated category for Deep Tech Startups</b>: A new sub-category of 'Deep Tech Startup' has been introduced for entities working on cutting-edge and breakthrough technologies. The core attributes of Deep Tech Startups have been finalised through consultations with line Ministries, Departments and ecosystem stakeholders to ensure clarity, consistency and objective identification. In recognition of the long gestation periods, high research and development intensity, and capital-intensive nature of deep technology enterprises, the eligibility criteria for this category have been expanded, with the age limit extended from 10 years to 20 years from the date of incorporation or registration, and the turnover limit enhanced to '300 crore.</p><p>&#183; <b>Inclusion of cooperative societies as eligible entities</b>: To promote innovation-driven growth at the grassroots level in agriculture, allied sectors, rural industries and community-based enterprises, startup recognition eligibility has been extended to cooperative entities. Accordingly, Multi-State Cooperative Societies registered under the Multi-State Cooperative Societies Act, 2002, as well as Cooperative Societies registered under State and Union Territory Cooperative Acts, are now eligible for startup recognition, subject to fulfilment of other applicable criteria.</p><p>The revised framework follows extensive consultations with stakeholders across the startup ecosystem, as well as with various Ministries and Departments. The updated criteria are expected to expand access to startup benefits for research- and innovation-driven enterprises, provide targeted support to deep tech ventures requiring extended development timelines, enable cooperatives to drive innovation in agriculture and rural development, and further strengthen India's position as a global hub for high-technology and knowledge-intensive entrepreneurship.</p>",

portant work related to milking, feeding, managing cattles and ensuring animal health. Nearly 70% of the workforce in dairy farming consists of women, yet their contribution often remains undervalued due to the unorganized nature of the sector. Women led dairy cooperatives have emerged as a powerful tool for their empowerment. By setting up DCS in every uncovered panchayat/village under white revolution 2.0, more women dairy farmers will be brought under organized dairy cooperative sector for empowerment of women.</p>",

    "question": "<p>Government of India has signed Memorandum of understanding (MoU)/ agreements with 23 countries for sharing or cooperation on India Stack / Digital Public Infrastructure (DPI), primarily for replication and adoption of India's digital governance platforms. Identify the CORRECT Statement(s) regarding this.</p><p>I. The Global DPI Repository launched during India's G20 Presidency (2023), serves as a global knowledge platform, with India contributing the highest number of DPI solutions.</p><p>II. UPI is operational in more than eight countries, including both developed and developing economies.</p><p>III. India Stack Global provides access to fewer than 10 digital platforms for international adoption.</p>",

    "correct_option_id": 3,
    "solution": "<p>Government of India has signed Memorandum of understanding (MoU)/ agreements with 23 countries for sharing or cooperation on India Stack / Digital Public Infrastructure (DPI), primarily for replication and adoption of India's digital governance platforms. These MoUs focus on cooperation in areas such as digital identity, digital payments, data exchange and service delivery platforms, aligned with India's broader DPI diplomacy under the India Stack framework.</p><p>&#183; UPI is now live in over eight countries, including the UAE, Singapore, Bhutan, Nepal, Sri Lanka, France, Mauritius and Qatar, positioning India as a global leader in digital payments. Its growing international adoption is boosting remittances, promoting financial inclusion, and strengthening India's position in the global fintech landscape.</p><p>&#183; MoUs have been signed with Cuba, Kenya, United Arab Emirates and Lao People's Democratic Republic (LPDR) for Digilocker.</p><p>&#183; Apart from this, the Government of India has taken measures to share the success of India's Digital Public Infrastructure (DPI) globally.'<b>India Stack Global</b>'showcases India's DPI and facilitates its adoption by friendly countries. The portal provides access to'<b>18</b>'key digital platforms.</p><p>&#183; The'<b>Global DPI Repository</b>'launched during India's'<b>G20 Presidency (2023)</b>, serves as a global knowledge platform, with India contributing the highest number of DPI solutions.</p><p>Brief details of key Digital Public Infrastructure (DPI) and digital solutions are as follows:</p><p>&#183; <b>Aadhaar</b>' A biometric-based digital identity platform that enables unique identification and authentication of residents for efficient service delivery.</p><p>&#183; <b>Unified Payments Interface (UPI)</b>' A real-time digital payment system enabling instant, interoperable, and secure person-to-person and merchant transactions.</p><p>&#183; <b>CoWIN</b>' A digital platform for end-to-end management of vaccination services, including registration, scheduling, and certification.</p><p>&#183; <b>API Setu</b>' A platform that enables secure and standardized sharing of government data and services through APIs.</p><p>&#183; <b>DigiLocker</b>' A digital document wallet that allows citizens to store, access, and share authenticated electronic documents.</p><p>&#183; <b>Aarogya Setu</b>' A digital health application providing risk assessment, health advisories, and access to health-related services.</p><p>&#183; <b>Government e-Marketplace (GeM)</b>' An online platform for transparent and efficient procurement of goods and services by government entities.</p><p>&#183; <b>UMANG</b>' A unified mobile and web platform providing single-window access to a wide range of government services.</p><p>&#183; <b>DIKSHA</b>' A national digital platform supporting teachers and learners with e-content, training, and academic resources.</p><p>&#183; <b>e-Sanjeevani</b>' A telemedicine platform enabling remote doctor-to-patient consultations, particularly in rural and underserved areas.</p><p>&#183; <b>e-Hospital</b>' A hospital management system providing online registration, appointments, diagnostics, and billing services.</p><p>&#183; <b>e-Office</b>' A digital platform for paperless governance enabling electronic file management and decision-making in government offices.</p><p>&#183; <b>eCourts</b>' A mission-mode project for digitising court processes and improving access to judicial services.</p><p>&#183; <b>POSHAN Tracker</b>' A mobile-based application for real-time monitoring of nutrition service delivery under ICDS.</p><p>&#183; <b>National Non-Communicable Diseases Platform (NCD)</b>' A digital platform for screening, diagnosis, and management of major non-communicable diseases.</p><p>&#183; <b>Skill India Digital Hub (SIDH)</b>' A unified digital platform integrating skilling, training, and employment-related services.</p><p>&#183; <b>Public Financial Management System (PFMS)</b>' A platform for end-to-end monitoring of government funds and direct benefit transfers.</p><p>&#183; <b>PM GatiShakti</b>' A GIS-based digital platform for integrated planning and coordinated implementation of infrastructure projects.</p><p><b>List of countries with which Memorandum of Understanding (MoUs) have been signed for sharing or cooperation on India Stack / Digital Public Infrastructure (DPI).</b></p><p>1) Republic of Armenia</p><p>2) Republic of Sierra Leone</p><p>3) Republic of Suriname</p><p>4) Antigua and Barbuda</p><p>5) Papua New Guinea</p><p>6) Republic of Trinidad and Tobago</p><p>7) United Republic of Tanzania</p><p>8) Republic of Kenya</p><p>9) Republic of Cuba</p><p>10) Republic of Colombia</p><p>11) Lao People's Democratic Republic</p><p>12) Saint Kitts and Nevis</p><p>13) Ethiopia</p><p>14) Jamaica</p><p>15) Gambia</p><p>16) Fiji</p><p>17) Guyana</p><p>18) Venezuela</p><p>19) Sri Lanka</p><p>20) Brazil</p><p>21) Lesotho</p><p>22) Maldives</p><p>23) Mongolia</p>",

    "question": "<p>In February 2026, the Government operationalized PM RAHAT to ensure no accident victim is denied lifesaving care due to finances. Which of the following is NOT a feature of PM RAHAT?</p>",
    "options": [
      "Cashless treatment coverage is available for up to 7 days from the date of accident.",
      "Police confirmation timelines are 24 hours for non-life-threatening cases and 48 hours for life-threatening cases.",
      "Stabilization treatment in life-threatening cases is limited to 36 hours.",
      "Good Samaritans (bystanders) are termed as Rah-Veer under the scheme.",
      "A District-level Grievance Redressal Officer is nominated by the District Road Safety Committee chaired by the District Collector/District Magistrate/Deputy Commissioner."
    ],
    "correct_option_id": 2,
    "solution": "<p>In its very first decision after shifting to Seva Teerth, the Prime Minister approved the launch of the PM RAHAT (Road Accident Victim Hospitalization and Assured Treatment) Scheme, reflecting a governance approach rooted in Seva ' service, compassion and protection for vulnerable citizens. The decision underscores the Government's commitment to ensuring that no life is lost due to lack of immediate medical assistance after a road accident. India records a significant number of road accident fatalities every year, many of which are preventable with timely medical intervention. Studies indicate that nearly 50% of road accident deaths can be averted if victims are admitted to hospital within the first hour. By approving PM RAHAT from Seva Teerth, the Prime Minister has prioritized life-saving intervention, financial certainty for hospitals, and a structured emergency response system for accident victims.</p><p>&#183; Integration with the <b>Emergency Response Support System (ERSS) 112</b> helpline ensures that accident victims reach hospitals within the Golden Hour. Road accident victims, Rah-Veer (Good Samaritans), or any person at the accident site may <b>dial 112</b> to obtain details of the <b>nearest designated hospital</b> and <b>request ambulance assistance</b>, enabling swift coordination between emergency responders, police authorities and hospitals.</p><p>&#183; Under the Scheme, every eligible road accident victim on any category of road will be entitled to <b>cashless treatment up to Rs. 1.5 lakh</b> per victim, for period of <b>7 days</b> from the date of accident. Stabilization treatment will be provided for up to 24 hours in non-life-threatening cases and <b><u>up to 48 hours in life-threatening cases,</u></b> subject to police authentication on an integrated digital system.</p><p>&#183; PM RAHAT is implemented through a robust, technology-driven framework amalgamating the <b>Electronic Detailed Accident Report (eDAR)</b> platform of the Ministry of Road Transport and Highways with the <b>Transaction Management System (TMS 2.0)</b> of the National Health Authority. This integration enables seamless digital linkage from accident reporting to hospital admission, police authentication, treatment administration, claim processing, and final payment. Police confirmation is required within defined timelines ' 24 hours for non-life-threatening cases and 48 hours for life-threatening cases ' ensuring accountability while allowing uninterrupted emergency care.</p><p>&#183; Reimbursement to hospitals will be made through the <b>Motor Vehicle Accident Fund (MVAF)</b>. In cases where the offending vehicle is <b>insured</b>, payment will be drawn from contributions made by '<b>General Insurance Companies</b>. In <b>uninsured and Hit &amp; Run cases</b>, payment will be made through budgetary allocation by Government of India. Claims approved by the State Health Agency will be paid within <b>10 days</b>, thereby providing financial certainty to hospitals and encouraging uninterrupted treatment.</p><p>&#183; Grievances of road accident victims will be addressed by a <b>Grievance Redressal Officer</b> nominated by the <b>District Road Safety Committee</b> chaired by the District Collector / District Magistrate / Deputy Commissioner, ensuring accountability at the district level.</p><p>&#183; The approval and launch of PM RAHAT from <b>Seva Teerth</b> symbolizes a citizen-first approach where governance translates into timely action, compassionate response, and <b>protection of life</b>. By ensuring that no accident victim is denied life-saving treatment due to financial constraints, PM RAHAT marks a decisive step towards <b>saving lives of road accident victims </b>and strengthening India's emergency care ecosystem.</p>",
    "question_index": 16
  },

    "question": "<p>ICICI Prudential Pension Funds Management Company introduced the Swasthya Pension Scheme under the Pension Fund Regulatory and Development Authority's (PFRDA's) regulatory sandbox framework in February 2026 and identify the INCORRECT statement(s) regarding this. </p><p>I. Subscribers are allowed multiple withdrawals of up to 10% of their own contributions. </p><p>II. In medical emergencies where the requirement exceeds 70% of the corpus, premature closure is permitted with payments made directly to the healthcare provider and the balance shifted to the standard pension scheme.</p><p>III. During the pilot, the physical network of pharmacies and hospitals is restricted to Bengaluru and Hyderabad, with nationwide access via the Apollo 24/7 app for medicines and diagnostic services.</p>",

    "solution": "<p>ICICI Prudential Pension Funds Management Company introduced the Swasthya Pension Scheme under the Pension Fund Regulatory and Development Authority's (PFRDA's) regulatory sandbox framework. The scheme aims to help subscribers build a retirement corpus while offering flexibility to meet medical expenses. The Swasthya Pension Scheme is structured primarily as a retirement product with healthcare-linked flexibilities. For the proof-of-concept phase, the fund has launched a variant with higher equity exposure, aligned with the long-term objective of retirement planning. Over time, more conservative options may be introduced based on subscriber risk appetite. Subscribers can make multiple withdrawals of up to 25 per cent of their own contributions, compared to the limit of four partial withdrawals permitted during the tenure of a regular NPS account.</p><p>&#183; In medical emergencies where the requirement exceeds 70 per cent of the corpus, premature closure is allowed, with payments made directly to the healthcare provider and the balance transferred to the standard pension scheme.</p><p>&#183; The scheme is designed as a fully digital offering. For the sandbox phase, the healthcare network is anchored by Apollo Hospitals. Subscribers can access services through the Apollo 24/7 app, pharmacies, hospitals and diagnostic centres, with the option to make payments using their Swasthya Pension account. While the digital app can be used nationwide for medicines and diagnostic services, physical pharmacies and hospitals are currently limited to Bengaluru and Hyderabad during the pilot. KFin Technologies is the digital partner for the initiative.</p><p>&#183; The company emphasised that the scheme is positioned as a complement to health insurance, particularly for co-payments, outpatient consultations, diagnostics, pharmacy expenses and hospitalisation costs. During the sandbox phase, subscribers can enrol through the company's website or via the Apollo 24x7 platform.</p><p>PFRDA Chairman- Sivasubramanian Ramann Sumit Mohindra- Chief Executive Officer of the pension fund</p>",

    "question": "<p>The Ministry of Home Affairs (MHA) released India's first comprehensive national counter-terrorism policy and strategy, titled 'Prahaar', outlining a structured, intelligence-driven framework to prevent and combat terrorism in all its forms. Which of the statements given is/are correct? </p><p>I. Under the Response pillar, MHA has issued SOPs for apex-level coordination, including intelligence analysis and follow-up action through the Multi Agency Centre (MAC) platform. </p><p>II. The policy underscores that Indian anti-terror laws operate within a rule-of-law framework that protects fundamental rights and gives due importance to human rights. </p><p>III. 'Prahaar' excludes state and district authorities from its response framework to ensure unified central control.</p>",
    "options": [
      "I only",
      "II only",
      "I and III only",
      "I and II only",
      "I, II, and III"

    "correct_option_id": 3,
    "solution": "<p>The Ministry of Home Affairs (MHA) released India's first comprehensive national counter-terrorism policy and strategy, titled 'Prahaar', outlining a structured, intelligence-driven framework to prevent and combat terrorism in all its forms. The eight-page document stresses prevention of terror attacks, swift and proportionate response mechanisms, and stronger coordination among agencies. It adopts a 'whole-of-government' and 'whole-of-society' approach, while also seeking to mitigate conditions that enable terrorism, including radicalisation. Reiterating India's long-standing position, the policy states there can be no justification for violence and affirms a doctrine of 'zero tolerance' against terrorism. The policy is structured around seven pillars, represented by the acronym 'Prahaar':</p><p>&#183; <b>Prevention of terror attacks</b>- India will follow a proactive, intelligence-guided approach, giving primacy to intelligence gathering and dissemination to executive agencies for neutralising threats.</p><p>&#183; <b>Response</b>'- Responding to terror attacks is described as a multi-stakeholder exercise involving central, state and district authorities. The MHA has issued standard operating procedures for apex-level coordination, including intelligence analysis and follow-up action through the Multi Agency Centre (MAC) platform.</p><p>&#183; <b>Aggregating capacities-'</b>The policy calls for acquiring the latest tools, technology and weaponry, along with upgrading skills and tactics of counter-terror agencies.</p><p>&#183; <b>Human rights and rule of law</b>- It underscores that Indian laws, including anti-terror legislation, give due importance to human rights and operate within a rule-of-law framework that protects fundamental rights.</p><p>&#183; <b>Attenuating conditions enabling terrorism</b>- The document highlights sustained efforts by terrorist groups to recruit Indian youth. The policy states that intelligence and law enforcement agencies have been disrupting such attempts, it also lists down the steps to counter radicalisation including engagement with community and religious leaders and non-governmental organisations, among others.</p><p>&#183; <b>Aligning and shaping international efforts</b>- The policy emphasises bilateral and multilateral treaties and agency-level intelligence sharing. Such cooperation has led to disruption and indictment of terror entities, deportation of fugitives and efforts to designate wanted terrorists at the United Nations (UN).</p><p>&#183; <b>Recovery and resilience through a whole-of-society approach</b>- India's whole-of-society approach includes public-private partnerships and involvement of doctors, psychologists, lawyers, Non-governmental organisations (NGOs), and community and religious leaders to sensitise and reintegrate affected communities.</p>",

    "question": "<p>The Government of India launch a Central Bank Digital Currency (CBDC)-based Food Subsidy Distribution Pilot under the Pradhan Mantri Garib Kalyan Anna Yojana (PMGKAY) in the Union Territory of Puducherry on 26th February 2026. Which of the statements is/are correct? </p><p>I. It integrates the RBI's Digital Rupee into the Direct Benefit Transfer (DBT) framework of the Public Distribution System (PDS). </p><p>II. The CBDC tokens issued are redeemable only at authorized merchants and Fair Price Shops (FPS). </p><p>III. Canara Bank has been designated as the banking partner for the pilot.</p>",

      "I only",
      "II only",
      "I and III only",
      "I and II only",
      "I, II, and III"
    ],
    "correct_option_id": 4,
    "solution": "<p>In a major step towards strengthening India's digital public infrastructure and enhancing transparency in subsidy delivery, the Government of India will launch a Central Bank Digital Currency (CBDC)-based Food Subsidy Distribution Pilot under the Pradhan Mantri Garib Kalyan Anna Yojana (PMGKAY) in the Union Territory of Puducherry on 26th February 2026. The pilot will be inaugurated by the Hon'ble Union Minister for Consumer Affairs, Food and Public Distribution, Shri Pralhad Joshi, in the presence of the Lieutenant Governor of Puducherry, Shri K. Kailashnathan; Chief Minister of Puducherry, Shri N. Rangasamy; and other dignitaries.</p><p>&#183; <b>The digital rupee or e-rupee'</b>is a tokenised digital version of the Indian rupee, issued by the Reserve Bank of India (RBI) as a Central Bank Digital Currency (CBDC).</p><p>&#183; The introduction of Central Bank Digital Currency (CBDC ' Digital Rupee) offers'<b>an opportunity to enhance the DBT ecosystem</b>'by providing a secure, instant, traceable, and programmable digital cash mechanism for PMGKAY beneficiaries, thereby enabling smoother fund flow and reducing friction in availing entitlements.</p><p>&#183; The initiative marks a significant reform in the delivery of food subsidy through the Public Distribution System (PDS) by integrating the Digital Rupee issued by the Reserve Bank of India into the Direct Benefit Transfer (DBT) framework.'<b>Under the pilot project, food subsidy will be credited to identified beneficiaries in the form of programmable Central Bank Digital Currency (CBDC) tokens directly into their CBDC wallets</b>.</p><p>&#183; The tokens shall be redeemable exclusively for purchase of entitled foodgrains at authorized merchants &amp; Fair Price Shops (FPS), thereby ensuring purpose-bound usage of subsidy and enhanced transparency.</p><p>&#183; The pilot is being implemented in coordination with the Government of Puducherry, the Reserve Bank of India, Public Financial Management System (PFMS), <b>and designated banking partner, Canara Bank.</b></p>",

    "question": "<p>Paradip Port Authority (PPA) has been awarded the First Prize at the Swachhata Pakhwada Awards 2025, instituted by the Ministry of Ports, Shipping and Waterways (MoPSW), in recognition of its outstanding performance in cleanliness, sustainability, and community participation. Which three pillars formed the foundation of Paradip Port Authority's Swachhata Pakhwada 2025 initiatives?</p>",

    "solution": "<p>Paradip Port Authority (PPA) has been awarded the First Prize at the Swachhata Pakhwada Awards 2025, instituted by the Ministry of Ports, Shipping and Waterways (MoPSW), in recognition of its outstanding performance in cleanliness, sustainability, and community participation.</p><p>&#183; The award was presented by Hon'ble Union Minister of Ministry of Ports, Shipping and Waterways, Shri Sarbananda Sonowal, with Hon'ble Minister of State, Shri Shantanu Thakur and Shri Vijay Kumar, IAS, Secretary, of MoPSW, in attendance, at a ceremony held in New Delhi on Tuesday, 3rd February 2026. Shri P. L. Haranadh, IRTS, Chairman of Paradip Port Authority, received the honour on behalf of the port team.</p><p>&#183; Several MoPSW organizations have been recognized with the Swachh Bharat Pakhwada Awards'2025 for exemplary performance during Swachhata Pakhwada 2025 and Swachhata Hi Sewa 2025, marked by cleanliness drives, citizen engagement, advocacy, and Safai Mitra welfare, promoting a cleaner and more sustainable work environment.</p><p>&#183; This achievement marks a proud milestone, reflecting the port's strong commitment to the ideals of Swachh Bharat Abhiyan, environmental stewardship, and inclusive development. Under the guidance of the Ministry of Ports, Shipping and Waterways, Paradip Port Authority successfully implemented the three core pillars of Swachhata Pakhwada 2025:<b> Jan Bhagidari, Ek Ped Maa Ke Naam, and Safai Mitra Suraksha.</b></p><p>&#183; As part of Jan Bhagidari, PPA ensured large-scale public participation through cleanliness drives across schools, heritage sites, temples, beaches, ponds, and port premises. Activities such as cyclothons, Swachhata Raths, rallies, Swachhata Runs, human chains, and citizen-led drives under campaigns like Ek Din Ek Ghanta Ek Saath reinforced the message that cleanliness is everyone's responsibility.</p><p>&#183; Under the Ek Ped Maa Ke Naam initiative, extensive plantation drives transformed neglected areas into clean green zones. A significant highlight was the plantation of 40,000 saplings at Paradip Sea Beach to mark the birthday of Hon'ble Prime Minister Shri Narendra Modi Ji, under the 'Ek Ped Maa Ke Naam 2.0' campaign. This reinforced the port's commitment to environmental protection, sustainable growth, and building a greener, healthier India.</p><p>&#183; The Safai Mitra Suraksha pillar focused on the welfare, safety, and dignity of sanitation workers. Medical check-ups were organized, and Safai Mitras were formally recognized, including special felicitation on the Prime Minister's birthday, acknowledging their invaluable contribution to cleanliness.</p><p>&#183; PPA also conducted awareness campaigns against single-use plastics through street theatre, rallies, cotton bag drives, and citizen engagement under the theme End Plastic Pollution. Innovative initiatives like Scrap to Structure and exhibitions on Waste to Wealth showcased sustainable reuse of Swachh Bharat Mission assets, involving youth and local talent.</p><p>&#183; Additional activities included Swachhata-themed paintings, rangoli competitions, selfie booths, clean food street initiatives, blood donation camps, and renovation of the Administrative Building under Special Campaign 5.0, strengthening the culture of cleanliness across the port ecosystem.</p><p><u>The Swachhata Pakhwada Awards are an annual initiative of MoPSW, evaluating ports and maritime institutions across the country on cleanliness drives, waste management, green initiatives, and public participation. This recognition reinforces Paradip Port Authority's leadership in advancing the Clean India Mission and setting benchmarks for sustainable port operations.</u></p>",

    "solution": "<p>Reliance Retail ranked as India's largest unlisted company by revenue in the Unlisted Gems 2026 list released by JM Financial, in collaboration with Hurun India. Flipkart secured the second spot with revenues of Rs. 83,000 crore, while Malabar Gold and Diamonds ranked third at Rs. 66,000 crore.</p><p>&#183; The country's top private companies collectively generated '8.9 trillion in revenue in 2025, according to the report<b>. It featured 100 major privately held firms with annual revenues exceeding Rs. 1,000 crore, underscoring the expanding scale and profitability of India's unlisted corporate sector and signalling a robust pipeline of prospective IPO candidates.</b>'</p><p>&#183; Among the fastest-growing companies by revenue were Tata Electronics, which posted a staggering 3,173 per cent compounded annual growth rate(CAGR), followed by Tata Passenger Electric Mobility at 904 per cent, and JSW One Platforms at 522 per cent. The sharp rise of these companies signals the momentum in sectors such as electronics manufacturing, electric vehicles and digital business-to-business (B2B) commerce.'</p><p>&#183; <b>In profitability terms, Reliance Retail also led the pack with the highest Ebitda at Rs. 22,573 crore, followed by Adani Properties at Rs. 11,332 crore and Zerodha Broking at Rs. 5,664 crore. Together, the 100 companies delivered a combined Ebitda of Rs. 1.03 trillion.</b></p><p>&#183; According to the report, the 100 companies together saw net profits rise sharply from about '13,000 crore in 2023 to '35,900 crore in 2025, pointing to improving operational efficiency and demand momentum.</p><p>&#183; Their combined valuation stands at '28.5 trillion, with the firms employing roughly 1.2 million people, highlighting their importance to the broader economy. Balance sheets remain largely stable, <b>with 65 per cent of companies maintaining debt-to-equity ratios below 1x, though a handful of highly leveraged firms lift the overall average.</b></p><p>&#183; The list also featured fast-growing startups and digital-first businesses such as DeHaat, reflecting the widening mix of traditional and new-economy players achieving large scale, while remaining privately held. The list, which includes companies spanning retail, manufacturing, technology platforms, logistics and financial services, indicates the increasing depth of India's private enterprise ecosystem.</p>",

    "question": "<p>Sarvam AI is an organization that is developing artificial intelligence tailored to India's needs by building foundational components and applying them to the country's unique linguistic, enterprise, and governance requirements. Identify the CORRECT Statement(s) regarding this.</p><p>I. Sarvam AI has been selected under the Innovation Centre pillar of the IndiaAI Mission to develop indigenous foundational AI models with financial and compute support amounting to Rs. 246.72 crore.</p><p>II. The AI model \"Bulbul\" developed by Sarvam AI is a speech-to-text system that supports all 22 scheduled languages of India.</p><p>III. Sarvam AI has partnered with the Unique Identification Authority of India to enhance Aadhaar services through AI-driven voice interaction, multilingual support, and real-time fraud detection.</p>",

      "II only",
      "I and III only",
      "I and II only",

    "correct_option_id": 2,
    "solution": "<p>Sarvam AI is an organization that is developing artificial intelligence tailored to India's needs by building foundational components and applying them to the country's unique linguistic, enterprise, and governance requirements. The company has built a full-stack AI platform, with everything developed, deployed, and governed entirely in India. At the India AI Impact Summit 2026, Union Minister Shri Amit Shah stated that Sarvam AI exemplifies why the future belongs to India. He noted that the company is ensuring technology reaches every citizen, advancing the vision of Viksit Bharat, where innovation serves as a trusted ally in empowering people and strengthening the nation.</p><p>&#183; Sarvam AI stands out as one of the 12 organisations selected under the <b>Innovation Centre pillar </b>of the <b>IndiaAI Mission</b> to develop indigenous foundational models, with <b>financial and compute support amounting to Rs. 246.72 crore</b>. The company is building large language and speech models (LLMs) tailored for Indian languages and public service delivery, with capabilities such as voice-based interfaces, document processing, and citizen-centric applications that enhance accessibility and ease of use. By developing homegrown AI models aligned with national objectives, Sarvam AI is reducing reliance on foreign AI systems while strengthening the open-source ecosystem and enabling innovation across startups, academia, research institutions, and industry.</p><p>An <b>AI model</b> is a computer program trained on vast amounts of data to recognize patterns, make predictions, or generate new content, acting like a digital brain.</p><p><b>Sarvam AI's models include</b>:</p><p>1) <b>Bulbul (Text-to-Speech):'</b>Available in <b><u>11 Indian languages</u></b> with 39 distinct speaker voices.</p><p>2) <b>Saaras (Speech-to-Text):</b>'Supports all 22 scheduled languages, 8kHz telephony audio, and code-mixed speech.</p><p>3) <b>Vision (Document Understanding):</b>'Tailored for 22 Indian languages, mixed scripts, and handwritten text</p><p>Through these foundational capabilities, Sarvam AI demonstrates how India-centric AI can evolve into scalable, resilient, and population-scale digital infrastructure, enhancing public service delivery, improving linguistic accessibility, and reinforcing India's journey toward a globally competitive AI ecosystem. <b>The Sarvam AI ecosystem consists of:</b></p><p>1) <b>Sarvam for Conversations</b>: Enterprise-grade (high capacity) conversational AI delivering human-like, culturally fluent voices in'<b>11 Indian languages</b>. Handles over'<b>100 million interactions with &lt;500ms latency, deploys within &lt;24 hours, and achieves up to 10x ROI.</b></p><p>2) <b>Sarvam for Work</b>: A unified enterprise AI platform that accelerates value creation through an AI-assisted build'debug'optimize cycle. Open and modular, it integrates seamlessly with any model, data source, or infrastructure.</p><p>3) <b>Sarvam AI for Content</b>: Enables multilingual video dubbing with voice cloning and precise audio-visual sync, along with document translation that preserves layout and tone, supported by built-in quality review and editing tools.</p><p>4) <b>Sarvam AI for Edge Intelligence</b>: Delivers compact, low-latency multimodal AI for real-world deployment, combining edge and cloud inference to power real-time assistants, on-device NLP, and high-speed translation and summarisation.</p><p><b>Strategic Partnerships For Public Service Delivery</b> Sarvam AI's institutional collaborations are transforming indigenous innovation into measurable public value across India. By working closely with national and state governments, the company is embedding advanced AI capabilities into critical service delivery systems.</p><p>1) <b>UIDAI (Unique Identification Authority of India)'</b>partnered with Sarvam AI to enhance Aadhaar services using AI-driven voice interaction, real-time fraud detection, and multilingual support. A custom GenAI stack will operate within UIDAI's secure, on-premise infrastructure, supporting 10 Indian languages with real-time enrolment feedback and fraud alerts.</p><p>2) <b>The Government of Odisha</b>'in collaboration with Sarvam AI<b>'</b>are establishing a 50MW AI-optimized Sovereign AI Capacity Hub to serve as a national compute backbone. It will support AI use cases in mining, industrial safety, and Odia-language skilling, contributing to the sovereign compute grid.</p><p>3) <b>The Government of Tamil Nadu and IIT Madras</b>, in collaboration with Sarvam, are developing Digital Sangam, India's first Sovereign AI Research Park, anchored by a 20MW AI data center to integrate advanced compute, research, and startup incubation for large-scale AI applications.</p>",

;\"><b>Launch of the India-France Innovation Network</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Inauguration of H125 Helicopter Final Assembly Line at Vemagal, Karnataka</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\" rowspan=\"4\">Defence and Security</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Renewal of the Agreement between Government of India and French Republic on Defence Cooperation</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Joint Venture between BEL and Safran to produce HAMMER missiles in India</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Reciprocal deployment of officers at Indian Army and French Land Forces establishments</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Constitution of a Joint Advanced Technology Development Group</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\" rowspan=\"3\">Critical and Emerging Technologies including defence.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">10.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Joint Declaration of Intent for Cooperation in Critical Minerals and Metals</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">11.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Letter of Intent to establish a Centre on Advanced Materials between DST and CNRS</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">12.</td> re of Excellence for Skilling in Aeronautics</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Renewal of the Memorandum of Understanding between the Ministry of New and Renewable Energy and the Ministry for the Economy, Finance and Industrial, Energy and Digital Sovereignty on Renewable Energy Cooperation</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">21.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Letter of Intent between the Department of Posts, Ministry of Communications and La Poste, France</b></td></tr></table>",
