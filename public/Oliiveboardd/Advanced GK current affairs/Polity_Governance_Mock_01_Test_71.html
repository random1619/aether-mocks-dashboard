    <script>
        const questions = [
  {
    "question": "<p>Which among the following act created the designation \"Governor General of Bengal\" for the first time?</p>",
    "options": [
      "Regulating act 1773",
      "Pitt's India act 1784",
      "Charter Act 1833",
      "Government of India Act 1858",
      "Indian Councils Act 1861"
    ],
    "correct_option_id": 0,
    "solution": "<p>Regulating Act of 1773 designated the Governor of Bengal as the 'Governor-General of Bengal' and created an Executive Council of four members to assist him. The first such Governor-General was Lord Warren Hastings. It was the first step taken by the British Government to control and regulate the affairs of the East India Company in India.</p>",
    "question_index": 0
  },
  {
    "question": "Who among the following was the first President of the Constituent Assembly?",
    "options": [
      "Dr. Rajendra Prasad",
      "Jawaharlal Nehru",
      "Dr. B.R. Ambedkar",
      "Dr. Sachchidanand Sinha",
      "Sardar Patel"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Constituent Assembly held its first meeting on December 9, 1946. Dr. Sachchidanand Sinha, the oldest member, was elected as the temporary President of the Assembly, following the French practice. Later, on December 11, 1946, Dr. Rajendra Prasad and H C Mukherjee were elected as the President and Vice-President of the Assembly respectively.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Parliamentary System is also popularly referred to as which of the following?</p>",
    "options": [
      "People's System",
      "Westminster System",
      "Western Government System",
      "Constitutional System",
      "Proportional Representation System"
    ],
    "correct_option_id": 1,
    "solution": "<p>The parliamentary system is also known as the 'Westminster' model of government. Westminster is a place in London where the British Parliament is located. It is often used as a symbol/synonym of the British Parliament.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Which among the following schedule deals with allowances to certain constitutional posts?</p>",
    "options": [
      "Third Schedule",
      "Seventh Schedule",
      "Second Schedule",
      "Tenth Schedule",
      "Fifth Schedule"
    ],
    "correct_option_id": 2,
    "solution": "<p>Second Schedule of the constitution deals with Provisions relating to the emoluments, allowances, privileges for the posts of 1. The President of India 2. The Governors of States 3. The Speaker and the Deputy Speaker of the Lok Sabha 4. The Chairman and the Deputy Chairman of the Rajya Sabha 5. The Speaker and the Deputy Speaker of the Legislative Assembly in the states 6. The Chairman and the Deputy Chairman of the Legislative Council in the states 7. The Judges of the Supreme Court 8. The Judges of the High Courts 9. The Comptroller and Auditor-General of India.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Preamble of Indian Constitution is based on which of the following?</p>",
    "options": [
      "Indian Independence Act 1947",
      "Proclamation of British Crown",
      "Objective Resolution",
      "Both 1 and 2",
      "All 1, 2 &amp; 3"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Preamble to the Indian Constitution is based on the 'Objectives Resolution', drafted and moved by Pandit Nehru, and adopted by the Constituent Assembly. 'Preamble' refers to the introduction or preface to the Constitution. It contains the summary or essence of the Constitution.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Which among the following committee was first appointed in relation with reorganization of Indian States?</p>",
    "options": [
      "S K Dhar Committee",
      "Fazil Ali Commission",
      "JVP Committee",
      "Swaran Singh Committee",
      "Indian Boundary Commission"
    ],
    "correct_option_id": 0,
    "solution": "<p>There has been a demand from different regions, particularly South India, for reorganisation of states on linguistic basis. Accordingly, in June 1948, the Government of India appointed the Linguistic Provinces Commission under the chairmanship of S K Dhar to examine the feasibility of this. In later years, JVP committee and Fazil Ali Commission were appointed for the same purpose.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Citizens of which country are NOT eligible for Overseas Citizen of India status?</p>",
    "options": [
      "Nepal",
      "Bhutan",
      "Bangladesh",
      "Sri Lanka",
      "Myanmar"
    ],
    "correct_option_id": 2,
    "solution": "<p>Overseas Citizens of India is a scheme that was introduced in response to demands for dual citizenship by the Indian diaspora, particularly in developed countries. But it is not issued to citizens/ Indian diaspora of Bangladesh and Pakistan.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Constitution of which country was the source for incorporating Fundamental Rights in Indian Constitution?</p>",
    "options": [
      "Japan",
      "USA",
      "Britain",
      "France",
      "Australia"
    ],
    "correct_option_id": 1,
    "solution": "<p>India's Fundamental Rights are based on USA's Bill of Rights, which ensured its citizens rights and protection of it. Indian constitution grants rights for citizens as well as to friendly aliens. Part III of constitution contains the provisions of these rights.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Which among the following is referred to as Instrument of Instructions?</p>",
    "options": [
      "Fundamental Rights",
      "Preamble",
      "Fundamental Duties",
      "Directive Principles",
      "Parliamentary Acts"
    ],
    "correct_option_id": 3,
    "solution": "<p>Directive Principles are referred to as Instrument of Instructions. It denotes the ideals that the State should keep in mind while formulating policies and enacting laws. These are the constitutional instructions or recommendations to the State in legislative, executive and administrative matters.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Fundamental Duties of the constitution is based on the recommendations of the which of the following committee?</p>",
    "options": [
      "LM Singhvi Committee",
      "Ashok Mehta Committee",
      "Balwant Rai Mehta Committee",
      "Swaran Singh Committee",
      "G V K Rao Committee"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Swaran Singh committee recommended the inclusion of a separate chapter on fundamental duties in the Constitution. It stressed that the citizens should become conscious that in addition to the enjoyment of rights, they also have certain duties to perform as well. Following this Article 51A was added to the constitution.</p>",
    "question_index": 9
  },
  {
    "question": "<p>The doctrine of Basic Structure was introduced by whom?</p>",
    "options": [
      "Parliament",
      "Constituent Assembly",
      "Union Government",
      "British Crown",
      "Supreme Court"
    ],
    "correct_option_id": 4,
    "solution": "<p>Doctrine of Basic Structure was introduced by Supreme Court to restrict the parliament from changing the basis of constitution on which it was framed. It was introduced in Kesavananda Bharati case, 1973.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Whom among the following is referred to as the Nominal Executive of India?</p>",
    "options": [
      "Prime Minister",
      "Governor",
      "Chief Ministers",
      "Chief Justice of India",
      "President"
    ],
    "correct_option_id": 4,
    "solution": "<p>The President is the nominal executive (de jure executive or titular executive) while the Prime Minister is the real executive (de facto executive). Thus, the President is head of the State, while the Prime Minister is head of the government.</p>",
    "question_index": 11
  },
  {
    "question": "<p>State Legislature can make laws on subjects of which among the following lists of Seventh Schedule?</p>",
    "options": [
      "List I",
      "List II",
      "List III",
      "Both 2 &amp; 3",
      "All the lists"
    ],
    "correct_option_id": 3,
    "solution": "<p>Seventh schedule has three lists viz., List I  -  Union List- only Parliament can make laws; List II  -  Only State Legislature can make laws; List III  -  Concurrent List- both Parliament and State legislature can make laws.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Who is the chairman Inter-State Council?</p>",
    "options": [
      "Prime Minister",
      "President",
      "Home Minister",
      "Vice President",
      "Cabinet Secretary"
    ],
    "correct_option_id": 0,
    "solution": "<p>Prime Minister Chairs the Inter-State Council. The council is a recommendatory body on issues relating to inter-state, Centre - state and Centre - union territories relations. It aims at promoting coordination between them by examining, discussing and deliberating on such issues.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Which of the following condition is referred to as state emergency?</p>",
    "options": [
      "Threat of Financial Stability",
      "Armed Rebellion",
      "Failure of constitutional machinery",
      "External Aggression",
      "Emergency due to war"
    ],
    "correct_option_id": 2,
    "solution": "<p>An Emergency due to the failure of the constitutional machinery in the states (Article 356). This is popularly known as 'President's Rule'. It is also known by two other names 'State Emergency' or 'constitutional Emergency'. However, the Constitution does not use the word 'emergency' for this situation.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Which among the following is a special fundamental right that is enjoyed only by residents of Jammu &amp; Kashmir?</p>",
    "options": [
      "Right to freedom of Residence",
      "Right to freedom of Profession",
      "Right not to be driven out of a state",
      "Right to Property",
      "Protection against Arrest and Detention"
    ],
    "correct_option_id": 3,
    "solution": "<p>Part III (dealing with Fundamental Rights) is applicable to the state with some exceptions and conditions. The Fundamental Right to Property is still guaranteed in the state. Also, certain special rights are granted to the permanent residents of the state with regard to public employment, acquisition of immovable property, settlement and government scholarships.</p>",
    "question_index": 15
  },
  {
    "question": "<p>At present there are totally how many All India Services been created?</p>",
    "options": [
      "3",
      "2",
      "5",
      "6",
      "12"
    ],
    "correct_option_id": 0,
    "solution": "<p>There are totally 3 All India Services- IAS, IPS and IFS (Indian Forest Service). In 1947, Indian Civil Service (ICS) was replaced by IAS and the Indian Police (IP) was replaced by IPS and were recognised by the Constitution as All-India Services. In 1966, the Indian Forest Service (IFS) was created as the third All-India Service.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Which among the following state doesn't enjoy special provisions under the constitution?</p>",
    "options": [
      "Tamil Nadu",
      "Andhra Pradesh",
      "Assam",
      "Goa",
      "Sikkim"
    ],
    "correct_option_id": 0,
    "solution": "<p>Constitution provides special provisions for Maharashtra, Gujarat, Nagaland, Assam, Manipur, Andhra Pradesh, Sikkim, Mizoram, Arunachal Pradesh, Goa and Karnataka. The intention behind them is to meet the aspirations of the people of backward regions of the states or to protect the cultural and economic interests of the tribal people of the states or to deal with the disturbed law and order condition in some parts of the states or to protect the interests of the local people of the states.</p>",
    "question_index": 17
  },
  {
    "question": "<p>What is the minimum age qualification for a person to be elected to the office of President?</p>",
    "options": [
      "25",
      "30",
      "35",
      "40",
      "50"
    ],
    "correct_option_id": 2,
    "solution": "<p>A person to be eligible for election as President should fulfil the following qualifications:</p><p>1. He should be a citizen of India.</p><p>2. He should have completed 35 years of age.</p><p>3. He should be qualified for election as a member of the Lok Sabha.</p><p>4. He should not hold any office of profit under the Union government or any state government or any local authority or any other public authority.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Election to which of the following office doesn't involve Single Transferable Voting procedure?</p>",
    "options": [
      "Member of Rajya Sabha",
      "Office of Vice-President",
      "Office of President",
      "Member of Lok Sabha",
      "Members of legislative Council"
    ],
    "correct_option_id": 3,
    "solution": "<p>The single transferable vote (STV) is a voting system designed to achieve proportional representation through ranked voting in multi-seat organizations or constituencies. In case of election to seats of Member of Lok Sabha, it is done by straight voting system. This system ensures that the successful candidate is returned by the absolute majority of votes.</p>",
    "question_index": 19
  },
  {
    "question": "<p>Vice-President addresses his resignation to who among the following?</p>",
    "options": [
      "President",
      "Chief justice of India",
      "Prime Minister",
      "Speaker",
      "Chief Election Commissioner"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Vice-President holds office for a term of five years from the date on which he enters upon his office. However, he can resign from his office at any time by addressing the resignation letter to the President. The Vice-President occupies the second highest office in the country. He is accorded a rank next to the President in the official warrant of precedence.</p>",
    "question_index": 20
  },
  {
    "question": "<p>Who among the following allocates portfolios among the ministers?</p>",
    "options": [
      "President",
      "Prime Minister",
      "Speaker",
      "Vice- President",
      "Minister of Parliamentary Affairs"
    ],
    "correct_option_id": 1,
    "solution": "<p>Prime Minister is the real executive authority and head of the government. He/ She allocates and reshuffles various portfolios among the ministers. He can ask a minister to resign or advise the President to dismiss him in case of difference of opinion.</p>",
    "question_index": 21
  },
  {
    "question": "<p>Maximum strength of Council of Ministers should not exceed what percentage of strength of Lok Sabha?</p>",
    "options": [
      "10%",
      "15%",
      "5%",
      "20%",
      "No limit has been fixed"
    ],
    "correct_option_id": 1,
    "solution": "<p>The total number of ministers, including the Prime Minister, in the Council of Ministers shall not exceed 15% of the total strength of the Lok Sabha. The provision was added by the 91st Amendment Act of 2003. The council of ministers shall be collectively responsible to the Lok Sabha.</p>",
    "question_index": 22
  },
  {
    "question": "<p>How many can be nominated for Rajya Sabha?</p>",
    "options": [
      "2",
      "8",
      "10",
      "12",
      "16"
    ],
    "correct_option_id": 3,
    "solution": "<p>The president nominates 12 members to the Rajya Sabha from people who have special knowledge or practical experience in art, literature, science and social service. The rationale behind this principle of nomination is to provide eminent persons a place in the Rajya Sabha without going through the process of election.</p>",
    "question_index": 23
  },
  {
    "question": "<p>Which among the following cabinet committee is referred to as super cabinet?</p>",
    "options": [
      "Economic Affairs Committee",
      "Appointments Committee",
      "Political Affairs Committee",
      "Parliamentary Affairs Committee",
      "Natural Calamities committee"
    ],
    "correct_option_id": 2,
    "solution": "<p>Of all the Cabinet Committees, the most powerful is the Political Affairs Committee, often described as a \"Super-Cabinet\". The Political Affairs Committee deals with all policy matters pertaining to domestic and foreign affairs. It is headed by Prime Minster.</p>",
    "question_index": 24
  },
  {
    "question": "<p>What is the minimum age required to be appointed as a judge of Supreme Court?</p>",
    "options": [
      "30",
      "35",
      "55",
      "42",
      "No minimum age is prescribed"
    ],
    "correct_option_id": 4,
    "solution": "<p>Constitution has not prescribed a minimum age for appointment as a judge of the Supreme Court. A person to be appointed as a judge of the Supreme Court should have the following qualifications:</p><p>1. He should be a citizen of India.</p><p>2. (a) He should have been a judge of a High Court (or high courts in succession) for five years; or (b) He should have been an advocate of a High Court (or High Courts in succession) for ten years; or (c) He should be a distinguished jurist in the opinion of the president.</p>",
    "question_index": 25
  },
  {
    "question": "<p>Speaker of Lok Sabha is the ex-officio chairman of which of the following parliamentary committee?</p>",
    "options": [
      "Committee on Private Members' Bills",
      "Committee on Absence of Members",
      "House Committee",
      "Business Advisory Committee",
      "Committee on Salaries"
    ],
    "correct_option_id": 3,
    "solution": "<p>Business Advisory committee regulates the programme and time table of the House. It allocates time for the transaction of legislative and other business brought before the House by the government. The Lok Sabha committee consists of 15 members including the Speaker as its chairman. In the Rajya Sabha, it has 11 members including the Chairman as its ex-officio chairman.</p>",
    "question_index": 26
  },
  {
    "question": "<p>Panchayat Raj System was introduced through which of the constitutional amendment act?</p>",
    "options": [
      "74<sup>th</sup>",
      "70<sup>th</sup>",
      "71<sup>st</sup>",
      "72<sup>nd</sup>",
      "73<sup>rd</sup>"
    ],
    "correct_option_id": 4,
    "solution": "<p>The term Panchayati Raj in India signifies the system of rural local self-government. It has been established in all the states of India by the Acts of the state legislatures to build democracy at the grass root level. It is entrusted with rural development. It was constitutionalized through the 73rd Constitutional Amendment Act of 1992.</p>",
    "question_index": 27
  },
  {
    "question": "<p>Which among the following Indian State was NOT previously a Union Territory?</p>",
    "options": [
      "Himachal Pradesh",
      "Mizoram",
      "Tripura",
      "Arunachal Pradesh",
      "Haryana"
    ],
    "correct_option_id": 4,
    "solution": "<p>The union territories, on the other hand, are those areas which are under the direct control and administration of the Central government. Hence, they are also known as 'centrally administered territories'. Himachal Pradesh, Manipur, Tripura, Mizoram, Arunachal Pradesh and Goa, which are states today were formerly union territories.</p>",
    "question_index": 28
  },
  {
    "question": "<p>Which among the following state is NOT included in fifth schedule of the constitution?</p>",
    "options": [
      "Andhra Pradesh",
      "Tamil Nadu",
      "Telangana",
      "Gujarat",
      "Odisha"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Fifth Schedule of the Constitution deals with the administration and control of scheduled areas and scheduled tribes. At present, ten states of India have scheduled areas. These are: Andhra Pradesh, Jharkhand, Chhattisgarh, Gujarat, Himachal Pradesh, Madhya Pradesh, Maharashtra, Odisha and Rajasthan and Telangana.</p>",
    "question_index": 29
  }
];
