    "question": "<p>What is the name of the puppet theatre in the state of Tamil Nadu?</p>",

  {

      "Maharashtra"
    ],
    "correct_option_id": 0,
    "solution": "<p>Kuchipudi is a classical dance form of Andhra Pradesh. It derives its name from a village of state. Kuchipudi style of Yakshagaana was conceived by Siddhendra Yogi. The music that accompanies the dance is according to the classical school of Carnatic music. Initially the dance form was practiced by only male dancers. Later on the dance form was opened to female dancers as well.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Which is the only state from where two classical dance forms have originated?</p>",

      "Assam"

    "correct_option_id": 1,

  {

    "correct_option_id": 2,

  {
    "question": "<p>Which among the following is NOT a classical language of India?</p>",

    "question_index": 6
  },
  {
