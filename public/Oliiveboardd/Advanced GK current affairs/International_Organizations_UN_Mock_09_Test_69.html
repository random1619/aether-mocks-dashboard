    "correct_option_id": 3,

  {

    ],
    "correct_option_id": 2,

    "question_index": 2

    "question_index": 3

  {

      "June 5"

    "correct_option_id": 1,
    "solution": "<p>UN Day marks the anniversary of the entry into force in 1945 of the UN Charter. With the ratification of this founding document by the majority of its signatories, including the five permanent members of the Security Council, the United Nations officially came into being. 24 October has been celebrated as United Nations Day since 1948. In 1971, the United Nations General Assembly recommended that the day be observed by Member States as a public holiday.</p>",
    "question_index": 4

  {
    "question": "<p>Amnesty International is a non-governmental organisation focused on</p>",

      "Economic development"

    "correct_option_id": 1,

    "question_index": 5
  },
  {
    "question": "<p>The League of Nations was founded as a result of</p>",

      "London Conference"

    "correct_option_id": 2,

    "question_index": 6

  {

      "Vietnam"
