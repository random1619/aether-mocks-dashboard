        const questions = [
  {
    "question": "<p>ICICI Bank has announced the launch of the Capital Gains Account Scheme,a facility that allows taxpayers to park unutilised long-term capital gains or sale proceeds and claim tax exemptions while earning interest on the deposited amount. Identify which of the following statements (s) is/are correct in the context of this?</p><p>I. The scheme is available to resident individuals and Hindu Undivided Families (HUFs).</p><p>II. Under the scheme, customers can choose between three types of accounts.</p><p>III. Deposits made before the ITR due date can be used to claim exemption on long-term capital gains under relevant provisions of the Income Tax Act.</p>",
    "options": [
      "II Only",
      "I and III Only",
      "II and III Only",
      "III Only",
      "I, II and III"
    ],
    "correct_option_id": 1,
    "solution": "<p>ICICI Bank has announced the launch of the Capital Gains Account Scheme,a facility that allows taxpayers to park unutilised long-term capital gains or sale proceeds and claim tax exemptions while earning interest on the deposited amount. The launch comes after the government approved Bank as an authorised institution to accept deposits under the Capital Gains Account Scheme Effective January 1, 2026, the scheme is available to resident individuals and Hindu Undivided Families (HUFs). </p><p>&#183; The bank said the facility will be extended to non-individual entities and non-resident Indians (NRIs) at a later stage. Customers can open a Capital Gains Account by visiting an ICICI Bank branch, except rural branches, in line with CGAS rules. </p><p>Under the scheme, customers can choose between two types of accounts. </p><p>&#183; Type A accounts, similar to savings accounts, allow flexible withdrawals linked to approved reinvestment purposes. </p><p>&#183; Type B accounts function like term deposits and can be opened in cumulative or non-cumulative formats for a fixed tenure. </p><p>Deposits made before the ITR due date can be used to claim exemption on long-term capital gains under relevant provisions of the Income Tax Act. </p><p>The deposited funds can be temporarily parked for up to three years, during which taxpayers can plan reinvestment without losing the exemption benefit.</p>",
    "question_index": 0
  },
  {
    "question": "<p>The Reserve Bank of India (RBI) has tightened oversight on lending to related parties by prescribing transaction-level materiality thresholds, above which loans will require approval from a bank's board or a dedicated committee, according to the Reserve Bank of India (Commercial Banks - Credit Risk Management) Amendment Directions, 2026. Identify the CORRECT Statement(s) regarding this.</p><p>I. Materiality thresholds apply at the individual transaction level.</p><p>II. Credit facilities fully secured by cash or liquid securities (subject to LTV/valuation norms) are excluded from the thresholds.</p><p>III. Interbank loans are included under the thresholds.</p>",
    "options": [
      "I Only",
      "II Only",
      "I and II Only",
      "II and III Only",
      "I, II and III"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Reserve Bank of India (RBI) has tightened oversight on lending to related parties by prescribing transaction-level materiality thresholds, above which loans will require approval from a bank's board or a dedicated committee, according to the Reserve Bank of India (Commercial Banks ' Credit Risk Management) Amendment Directions, 2026.</p><p>&#183; According to the RBI, loans to related parties that are not otherwise prohibited under the Banking Regulation Act, 1949, or under the RBI's directions, will be subject to materiality thresholds linked to the size of a bank's balance sheet. The thresholds will apply at the individual transaction level, the RBI said.</p><p>&#183; For banks with assets exceeding Rs 10 trillion, the ceiling for the materiality threshold has been set at Rs 25 crore. Banks with assets between Rs 1 trillion and Rs 10 trillion will have a ceiling of Rs 10 crore, while banks with assets below Rs 1 trillion will be subject to a Rs 5 crore ceiling. Asset size will be determined based on the last audited balance sheet.</p><p>&#183; The norms exclude credit facilities that are fully secured by cash or liquid securities'subject to prescribed loan-to-value and valuation norms'as well as interbank loans.</p><p>&#183; While banks may prescribe different materiality thresholds for various categories of related-party loans in their internal credit policies, any loan breaching the prescribed threshold must be sanctioned either by the board or by the Committee on Lending to Related Parties. Loans below the threshold may be approved by authorities to whom lending powers have been delegated.</p>",
    "question_index": 1
  },
  {
    "question": "<p>The Reserve Bank of India (RBI) came out with a draft framework on declaration of dividend by banks, as it proposed capping dividend payout to shareholders at 75 per cent of their net profit, also called profit after tax (PAT). Identify the correct statement(s) regarding this.</p><p>I. Banks must report positive adjusted PAT for the relevant period.</p><p>II. Dividends cannot be funded from unrealised gains on fair valuation of Level 3 financial instruments.</p><p>III. Exceptional or extraordinary income can be included in PAT for calculating the eligible payout.</p>",
    "options": [
      "I Only",
      "II Only",
      "I and II Only",
      "II and III Only",
      "I, II and III"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Reserve Bank of India (RBI) came out with a draft framework on declaration of dividend by banks, as it proposed capping dividend payout to shareholders at 75 per cent of their net profit-- also called profit after tax (PAT). The draft regulations suggest compliance with applicable regulatory capital norms at the end of the previous financial year and continued compliance in the year of payout, with capital levels remaining above regulatory thresholds even after dividend payment.</p><p>&#183; Indian banks must report positive adjusted PAT for the relevant period, while foreign banks operating in branch mode must have positive PAT to remit profits to their head offices.'</p><p>&#183; In addition, banks must not be subject to any explicit restrictions imposed by the RBI or any other authority.</p><p>&#183; The RBI undertook a review of the existing prudential norms governing the declaration of dividends and remittance of profits, including those applicable to foreign banks operating in branch mode in India. As part of this exercise, a draft of the revised framework was released for public comments on January 2, 2024. Following stakeholder feedback and consultations, the RBI has now issued draft directions proposing a revised methodology for computing the maximum eligible dividend payout.</p><p>&#183; Foreign banks that meet the eligibility criteria may remit net profits earned from Indian operations without prior RBI approval, provided their accounts are audited.</p><p>&#183; Any excess remittance must be promptly returned by the head office. For the purpose of calculating PAT, banks are required to exclude exceptional or extraordinary income and any overstated profits flagged by statutory auditors. Dividends or profit remittances cannot be funded from unrealised gains on fair valuation of Level 3 financial instruments, or from certain provision reversals and unrealised gains linked to loan transfers, in line with existing RBI directions.</p><p>&#183; The RBI has retained the right to restrict dividend distribution or profit remittance in cases of non-compliance, with no special dispensation available if eligibility conditions are not met.</p><p>&#183; Non-compliance with these directions may attract supervisory or enforcement action.'</p>",
    "question_index": 2
  },
  {
    "question": "<p>With reference to the RBI's October 2025 directions on auto'escalation to the Internal Ombudsman (IO), identify the correct statements:</p><p>I. Where RBI/NPCI/card'network guidelines prescribe a resolution timeline, the IO must get at least 10 days for review; for all other cases, 20 days from receipt.</p><p>II. Banks must communicate the final decision to the complainant within 30 days of receipt of the complaint.</p><p>III. The office of the Internal Ombudsman is mandated to directly receive and handle complaints from customers even before the bank examines them.</p>",
    "options": [
      "I only",
      "II only",
      "I and II only",
      "II and III only",
      "I, II, and III"
    ],
    "correct_option_id": 2,
    "solution": "<p>Banks and non-banking financial companies (NBFCs) should put a fully automated complaints management system with access to the Internal Ombudsman (IO) and Deputy Internal Ombudsman (DIO), and all unresolved grievances should be auto-escalated to the office of the IO for review, the Reserve Bank of India (RBI) said.</p><p>&#183; The regulator said the IO should get at least 10 days for review of complaints for which RBI, National Payments Corporation of India, or card network guidelines prescribe a timeline for resolution. For all other cases, a 20-day timeline from the receipt of the complaints has been prescribed.</p><p>&#183; In the draft guidelines, released on October 7, the timeline to transfer the complaint that has been rejected by regulated entities to the office of the IO is within 20 days and in case of credit information companies, such complaints should be referred to the office of the internal ombudsman within 25 days of receipt.</p><p>&#183; According to the directions, the office of the IO should not handle complaints received directly from the public, and should deal with the complaints that have already been examined by the bank, but have been partially resolved or being wholly rejected by the bank.</p><p>&#183; A bank should have three categories on this issue, which are 'fully resolved', 'partially resolved' and 'wholly rejected' in its Complaint Management System for recording the decision on the complaints before escalation to the office of the IO.</p><p>&#183; Banks have been asked to ensure that the final decision is communicated to the complainant within a period of 30 days from the date of receipt of complaint. The norms are applicable with 10 or more banking outlets in India as on March 31, 2025.</p><p>&#183; 'The bank shall ensure that a complaint is not closed by the same branch/unit/other touch points, whether it has been resolved (fully or partially) or rejected,' RBI said.</p><p>&#183; The regulator has clarified that complaints related to corporate frauds, misappropriation etc., on the part of the bank that do not impact the customer in any manner should not be under the purview of the IO.</p><p>&#183; The final directions are aimed to strengthen board-level oversight, with Customer Service Committees (CSCs) of banks' boards given responsibilities, including determining the number of IO and DIO. Further, only with the approval of competent authority at the level of a whole-time or executive director, management can overrule the decision of the IO.'</p><p>&#183; 'All such cases where the decision of the internal ombudsman has been overruled by the competent authority shall be placed before the CSC of the Board of the bank for review,' the RBI said.</p><p>&#183; Further, the RBI introduced a detailed quarterly reporting requirement and empowered itself to review cases where customers succeed before the RBI Ombudsman after a bank has rejected an IO's recommendation.</p><p>&#183; For NBFCs, the final guidelines are applicable only to deposit-taking NBFCs with 10 or more branches and non-deposit-taking NBFCs with asset size of '5,000 crore and above having a public customer interface, as on March 31, 2025. Several categories, including housing finance companies, core investment companies, infrastructure finance entities and NBFCs under insolvency or liquidation, have been excluded, unlike draft guidelines.</p><p>&#183; The central bank has also introduced the same guidelines for other regulated entities such as small finance banks, payments banks, non-bank prepaid payment issuers, and credit information companies.</p>",
    "question_index": 3
  },
  {
    "question": "<p>In January 2026, DFS introduced a composite salary account package for central government employees to offer a comprehensive suite of banking and insurance benefits under a single account structure. Identify which among the following statements is/are NOT correct in the context of this.</p><p>I. The product has three core segments - banking, insurance, and cards.</p><p>II. The key features include personal accident insurance up to Rs 2 crore, air accident insurance up to Rs 2.5 crore.</p><p>III. Card benefits include airport lounge access, reward programmes, cashback offers, and unlimited transactions and nil maintenance charges.</p>",
    "options": [
      "II and III Only",
      "I and II Only",
      "I and III Only",
      "II Only",
      "I, II, and III"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Department of Financial Services (DFS) introduced a composite salary account package for central government employees to offer a comprehensive suite of banking and insurance benefits under a single account structure. </p><p>&#183; The product has three core segments - banking, insurance and cards, making it a one-stop financial solution for central government employees. The packages have been carefully designed in consultations with banks to ensure maximum coverage, uniformity and convenience for employees across all cadres (Group A, B and C). </p><p>&#183; Card benefits include airport lounge access, reward programmes, cashback offers, and unlimited transactions and nil maintenance charges. </p><p>&#183; The key features include personal accident insurance up to Rs 1.50 crore, air accident insurance up to Rs 2 crore, a zero-balance salary account with enhanced facilities, concessional interest rate on loans for housing, education, vehicle and personal requirements, among others.</p>",
    "question_index": 4
  },
  {
    "question": "<p>The flow of credit from non-financial sources as well as banks to commercial sector has increased by 44 per cent during the first nine months (April-December) of 2025-26 (M9FY26), as per the RBI's State of the Economy report for FY26 so far. identify the correct statement(s) regarding this.</p><p>I. The Indian rupee depreciated against the US dollar in December 2025, while its volatility remained lower than that of most major currencies.</p><p>II. In real effective terms, the rupee appreciated in December 2025 due to relatively lower inflation in India versus trading partners.</p><p>III. Non-bank sources such as corporate bond issuances and FDI to India showed a marked increase during FY26 so far.</p>",
    "options": [
      "I only",
      "II only",
      "I and III only",
      "II and III only",
      "I, II, and III"
    ],
    "correct_option_id": 2,
    "solution": "<p>The flow of credit from non-financial sources as well as banks to commercial sector has increased by 44 per cent during the first nine months (April-December) of 2025-26 (M9FY26), indicating demand conditions in the economy remaining buoyant underpinned by a resurgence in rural demand and a gradual recovery in urban demand,the RBI's monthly state of the economy report said.</p><p>&#183; The report observed that the first advance estimates of gross domestic product (GDP) for FY26 reflected the resilience of the Indian economy, driven by domestic factors ' private final consumption expenditure (PFCE) and fixed investment ' amid a challenging external environment. The figures released by the government earlier this month estimated GDP growth at 7.3 per cent for FY26 as compared to 6.5 per cent in the previous year.</p><p>&#183; A strong rebound in the manufacturing sector and continued buoyancy in services are expected to boost growth in gross value added (GVA). 'High-frequency indicators for December suggest continued buoyancy in growth impulses,' the report said.</p><p>&#183; It said the total flow of financial resources to the commercial sector increased compared to the same period a year ago, with non-bank sources along with bank sources contributing to the credit pickup.</p><p>&#183; According to latest data, during M9FY26, total flow of financial resources to the commercial sector increased by 44 per cent to '30.8 trillion from '21.3 trillion a year ago. The total flow of resources was '35.09 trillion in FY25 as compared to '34.04 trillion in FY24.</p><p>&#183; 'Non-bank sources ' corporate bond issuances, and foreign direct investment (FDI) to India ' showed a marked increase during the year so far,' the RBI report said.</p><p>&#183; Commenting on the recent volatility in the exchange rate, the report said the Indian rupee (INR) depreciated against the US dollar in December, pressured by foreign portfolio investor (FPI) outflows and uncertainty surrounding the India-US trade deal. At the same time, the report said, volatility of the Indian unit, as measured by the coefficient of variation, remained relatively lower than that of most major currencies.</p><p>&#183; 'In real effective terms, the Indian rupee depreciated in December due to depreciation of INR in nominal effective terms and relatively lower inflation in India vis-'-vis its major trading partners,' it said.</p><p>&#183; The GDP growth estimates for FY26 indicate that India will remain the fastest-growing major economy in the world. India has made significant efforts to diversify and strengthen its exports, aiming to mitigate external sector risks, the report said.</p><p>&#183; The RBI report emphasised that the policy focus should be on striking a balance between innovation and stability, consumer protection, and a prudent approach to regulation and supervision, which should help improve productivity and support long-term economic growth.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Reserve Bank of India announced a series of liquidity measures that will inject more than $23 billion into the banking system, following a review of current liquidity and financial conditions. The central bank has planned to use which among the following combinations to ease liquidity conditions in the financial system?</p>",
    "options": [
      "Cash Reserve Ratio reduction, repo rate cut, and reverse repo operation",
      "Open market bond purchases, foreign exchange swap, and variable rate repo operation",
      "Statutory Liquidity Ratio cut, marginal standing facility, and term lending",
      "Long-term repo operations, government securities sale, and forex intervention",
      "Bank rate cut, open market bond sales, and fixed rate repo"
    ],
    "correct_option_id": 1,
    "solution": "<p>Reserve Bank of India announced a series of liquidity measures that will inject more than $23 billion into the banking system, following a review of current liquidity and financial conditions. The central bank will use a combination of open market bond purchases, a foreign exchange swap and a variable rate repo operation to ease liquidity conditions in financial system. </p><p>&#183; As part of the measures, RBI will conduct a 90-day variable rate repo (VRR) operation for an amount of '25,000 crore on January 30, 2026, allowing banks to borrow funds at market-determined rates against collateral. </p><p>&#183; RBI will also carry out a USD/INR buy/sell swap auction of $10 billion with a tenor of three years on February 4, a move aimed at injecting durable rupee liquid In addition, the central bank said it will purchase government securities worth an aggregate Rs. 1,00,000 crore through open market operations in February. </p><p>&#183; The bond purchases will be conducted in two tranches of Rs 50,000 crore each on February 5 and February 12.</p>",
    "question_index": 6
  },
  {
    "question": "<p>In January 2026, the Reserve Bank of India announced a series of liquidity measures that will inject more than $23 billion into the banking system and will use a combination of open market bond purchases, a foreign exchange swap, and a variable rate repo operation to ease liquidity conditions in the financial system. Identify which among the following statements is/are correct in the context of this?</p><p>I. As part of the measures, RBI will conduct a 90-day variable rate repo (VRR) operation for an amount of Rs. 25,000 crore on January 30, 2026.</p><p>II. RBI will also carry out a USD/INR buy/sell swap auction of $10 billion with a tenor of three years on February 4, 2026.</p><p>III. The bond purchases will be conducted in two tranches of Rs 50,000 crore each on February 5 and February 12.</p>",
    "options": [
      "II Only",
      "I and III Only",
      "I, II and III",
      "III Only",
      "I Only"
    ],
    "correct_option_id": 2,
    "solution": "<p>Reserve Bank of India announced a series of liquidity measures that will inject more than $23 billion into the banking system, following a review of current liquidity and financial conditions. The central bank will use a combination of open market bond purchases, a foreign exchange swap and a variable rate repo operation to ease liquidity conditions in financial system. As part of the measures, RBI will conduct a 90-day variable rate repo (VRR) operation for an amount of '25,000 crore on January 30, 2026, allowing banks to borrow funds at market-determined rates against collateral. RBI will also carry out a USD/INR buy/sell swap auction of $10 billion with a tenor of three years on February 4, a move aimed at injecting durable rupee liquid In addition, the central bank said it will purchase government securities worth an aggregate Rs. 1,00,000 crore through open market operations in February. The bond purchases will be conducted in two tranches of Rs 50,000 crore each on February 5 and February 12.</p>",
    "question_index": 7
  },
  {
    "question": "<p>In January 2026, the Reserve Bank of India (RBI) has framed a principle-based resolution regime for borrowers impacted by natural calamities, giving regulated entities (REs) operational flexibility to design and implement relief measures. Which of the following statement(s) is/are not correct in the context of this? </p><p>I. As per the guidelines, exposures affected by a natural calamity and classified as 'standard', and not in default for up to 20 days (SMA-0) on the date of the event, will be eligible for relief. </p><p>II. Accounts restructured under the relief package will continue to be classified as 'standard', with income recognised on an accrual basis. </p><p>III. The guidelines will come into force from April 1, 2026.</p>",
    "options": [
      "I and III Only",
      "II Only",
      "I Only",
      "I, II and III",
      "III Only"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Reserve Bank of India (RBI) has framed a principle-based resolution regime for borrowers impacted by natural calamities, giving regulated entities (REs) operational flexibility to design and implement relief measures. The framework also factors in decisions of the State Level Bankers' Committee (SLBC) and District Consultative Committee (DCC). As per the guidelines, exposures affected by a natural calamity and classified as 'standard', and not in default for up to 30 days (SMA-0) on the date of the event, will be eligible for relief.It may also include a proposal for sanctioning additional finance to address the financial stress of the borrower, subject to due assessment of the viability prospects of the borrower The resolution plan to be implemented by a bank may include rescheduling of payments; conversion of any interest accrued or to be accrued into another credit facility; granting of a moratorium, etc, based on an assessment of the viability prospects of the borrower. The guidelines will come into force from April 1, 2026. To ensure timely rollout, the central bank has prescribed a dedicated window for invocation of the framework and a separate window for implementation of the resolution plan (RP). Accounts restructured under the relief package will continue to be classified as 'standard', with income recognised on an accrual basis.</p>",
    "question_index": 8
  },
  {
    "question": "<p>The Pension Fund Regulatory and Development Authority (PFRDA) has permitted the introduction of the 'NPS Swasthya Pension Scheme' as a proof of concept (PoC) under its Regulatory Sandbox Framework, aimed at integrating health-related benefits within the National Pension System (NPS). Which of the given statements about this scheme is/are NOT CORRECT?</p>",
    "options": [
      "The scheme will operate as a sector-specific scheme under the MSF and will be offered to Indian citizens on a voluntary basis.",
      "The framework also provides for a full premature exit in cases of critical medical treatment.",
      "There will be no restriction on the number of withdrawals.",
      "It will be a contributory pension scheme, governed by the provisions of the PFRDA Act, 2013.",
      "All of the above are correct"
    ],
    "correct_option_id": 4,
    "solution": "<p>The Pension Fund Regulatory and Development Authority (PFRDA) has permitted the introduction of the 'NPS Swasthya Pension Scheme' as a proof of concept (PoC) under its Regulatory Sandbox Framework, aimed at integrating health-related benefits within the National Pension System (NPS). The regulator said the pilot is intended to assess the operational, technological and regulatory feasibility of providing financial support for outpatient and inpatient medical expenses through a dedicated pension-linked scheme. Certain provisions of the PFRDA (Exits and Withdrawals under NPS) Regulations, 2015, have been relaxed for the duration of the PoC. The scheme will operate as a sector-specific scheme under the Multiple Scheme Framework (MSF) and will be offered to Indian citizens on a voluntary basis. It will be a contributory pension scheme, governed by the provisions of the PFRDA Act, 2013. </p><p>&#183; The framework also provides for a full premature exit in cases of critical medical treatment. Subscribers will be allowed to make partial withdrawals for medical expenses, with withdrawals capped at 25 per cent of their own contributions at any instance. Notably, there will be no restriction on the number of withdrawals, subject to a minimum accumulated corpus of Rs 50,000 before the first withdrawal. </p><p>&#183; Additionally, subscribers above the age of 40 (excluding government sector subscribers) will be allowed to transfer up to 30 per cent of their contributions from their existing NPS common account to the Swasthya Pension Scheme account. </p><p>&#183; The pilot will be rolled out for a limited period with a restricted number of subscribers. If the scheme is found unviable after the PoC period, subscribers will be given the option to transfer their accumulated corpus back to the common NPS account and exit as per existing rules. </p><p>&#183; Under the pilot, pension funds may launch the scheme after obtaining prior approval from the regulator and -26).</p><p>\"Approval includes (i) Rs. 1000 crore to support setting up of 50 Multi Product Food Irradiation Units under the component scheme-Integrated Cold Chain and Value Addition Infrastructure (ICCVAl) and 100 Food Testing Labs (FTLs) with NABL accreditation under the component scheme - Food Safety and Quality Assurance Infrastructure (FSQAI) of Pradhan Mantri Kisan Sampada Yojana (PMKSY), in alignment with the budget announcement for FY 2024-25.</p><p>&#183; Expression of Interest for 50 multi-product food irradiation projects floated on 07.08.2024 and 25.07.2025. 21 proposals were received, and 14 proposals have been approved during FY 2025-26.</p><p>&#183; Expression of Interest for 100 food quality &amp; safety testing labs with NABL accreditation floated on 20.11.2026, which is open upto 20.01.2026.</p>",

    "solution": "<p><b>Pradhan Mantri Formalisation of Micro Food Processing Enterprises Scheme</b></p><p>&#183; Under the Atmanirbhar Bharat Abhiyan, the Ministry of Food Processing Industries launched a Centrally Sponsored scheme named Pradhan Mantri Formalisation of Micro Food Processing Enterprises Scheme (PMFME) in June 2020 to encourage 'Vocal for Local' in the sector with a total outlay of Rs. 10,000 crore in the period of FY 2020-2025 for this scheme. The scheme has been extended up to FY 2025-26.</p><p>&#183; This is the first-ever Government scheme for Micro Food Processing enterprises and is targeted to benefit 2 lakh enterprises through credit-linked subsidy and adopting the approach of One District One Product.</p><p>&#183; Since Jan 2025, a total of 56,543 Loans have been sanctioned under the credit-linked subsidy component of the PMFME scheme. An amount of Rs. 240.92 crore has been sanctioned as seed capital assistance to 63,108 Self Help Group (SHGs) members. 1 Incubation Centre approved, and 8 Incubation Centres have been completed/inaugurated/commissioned during the period, providing product development support to grass-root Micro Enterprises. 10 proposals of Marketing &amp; Branding have been approved to provide branding support to the micro enterprises.</p><p>&#183; Since the inception of the scheme, a total of 1,72,707 loans have been sanctioned under the credit-linked subsidy component of the PMFME Scheme to individual beneficiaries, Farmer-Producer Organizations (FPOs), Self-Help Groups (SHGs), and Producer Cooperative Societies. An amount of Rs. 1282.98 crore has been released as seed capital assistance to 3.76 lakh Self Help Group (SHG) members.</p><p>&#183; 76 Incubation Centres have been approved to be set up in ODOP processing lines and allied product lines with an outlay of Rs. 208.11 Crore. 23 Incubation centres have been completed/ inaugurated/ commissioned.</p><p>&#183; 27 Proposals of marketing and branding have been approved, including 2 National Level Proposals (NAFED Phase 1 and Phase 2) and 25 State Level Proposals.</p>",

    "solution": "<p>Bengaluru and Chennai have retained their top positions among top Indian cities for women's safety and inclusivity, according to the fourth edition of the Top Cities for Women in India (TCWI) report by workplace culture consulting firm Avtar Group. TCWI is a year-long study that ranks 125 Indian cities based on women's participation, safety, and career growth, and identifies role-model cities and emerging best practices. It uses a City Inclusion Score (CIS), which combines social inclusion factors such as safety, quality infrastructure, and health, alongside industrial inclusion factors such as robust employment opportunities, inclusive work environments, and a supportive ecosystem for female entrepreneurs. Bengaluru posted a CIS of 53.29, ranking first ahead of Chennai with a Score of 49.86. <b>Inclusion scores</b></p><p>&#183; Bengaluru, though reflecting sustained strength in Industrial Inclusion and career enablement, ranked only third in social inclusion.</p><p>&#183; Chennai, on the other hand, secured the top position in social inclusion, continuing to lead in safety mechanisms, public services, mobility initiatives, and access to health and'education. The city ranked third in industrial inclusion.</p><p>&#183; Pune (46.27), Hyderabad (46.04), and Mumbai (44.49) complete the top five.</p><p>&#183; Meanwhile,'Delhi'dropped out of the top ten for the first time, ranking eleventh, while the nearby industrial hub of Gurugram climbed to sixth place- a significant improvement from 2022, when it was outside the top 20.</p><p>&#183; Interestingly, Tamil Nadu has emerged as one of the most inclusive states for women, with seven of the top 25 cities in the list from the state, including Chennai, Coimbatore, Thiruchirapalli, Madurai, Salem, Vellore, and Erode.</p><p>&#183; Overall, the Southern region emerged as the most inclusive, recording the highest scores across all three indices, with a regional average CIS of 21.60, while the Central and Eastern regions trailed across both inclusion dimensions.</p>",

spectively.'</p><p>&#183; The US has suffered the third largest ranking decline over the past two decades ' after Venezuela and Vanuatu ' falling six places from 4th to 10th, while the UK ranks as the fourth-biggest faller, down four places from 3rd in 2006 to 7th in 2026.</p><p>&#183; The UAE stands out as the strongest performer on the Henley Passport Index over the past 20 years, adding 149 visa-free destinations since 2006 and climbing 57 places to 5th on the rankings with access to 184 destinations visa-free, driven by sustained diplomatic engagement and visa liberalization.</p><p>&#183; Countries across the Western Balkans and Eastern Europe have also made significant gains over the past two decades, led by Albania, which climbed 36 places to rank 43rd on the index. Ukraine has risen 34 places (to 30th), followed by Serbia ( 30 to 34th), North Macedonia ( 27 to 38th), and both Bosnia and Herzegovina ( 29) and Georgia ( 26), which now share 42nd place. Together, these advances highlight the impact of regional integration and closer alignment with key partners.</p><p>India's rank of 80 and visa-free score of 55 means Indian travellers still need advance visas for most of Europe, the UK, the US, Canada and large parts of East Asia. While access exists across parts of Southeast Asia, Africa, the Caribbean and island nations, spontaneous travel remains limited compared to peers.</p><p><b>For context:</b></p><p>&#183; China, ranked 59th, has access to 81 destinations</p><p>&#183; Saudi Arabia, ranked 54th, offers 88 destinations</p><p>&#183; South Africa, ranked 48th, allows access to 101 destinations</p><p>This gap has very real implications for Indian travellers'longer planning cycles, higher costs, and more documentation for both leisure and business trips. <b>As of January 2026, Indian passport holders have access to 55 destinations without needing a pre-approved visa. These are spread across Asia, Africa, the Caribbean, Oceania and island nations, with very limited access in Europe or North America.</b></p>",

    "solution": "<p>Union Minister for Finance and Corporate Affairs Smt. Nirmala Sitharaman tabled the Economic Survey 2025-26 in Parliament.Prepared by the Economic Division of the Department of Economic Affairs under the supervision of Chief Economic Adviser V Anantha Nageswaran, the Survey offers government's official assessment of the state of the economy and an outlook for the coming FY. The highlights of the Economic Survey are as follows. </p><p><b>STATE OF THE ECONOMY: -</b></p><p>&#183; The global environment remains fragile, with growth holding up better than expected but risks elevated amid intensifying geopolitical tensions, trade fragmentation and financial vulnerabilities. The impact of these shocks may still surface with a lag.</p><p>&#183; Against this backdrop, India's performance stands out. 'The First Advance Estimates place FY26 real GDP growth at 7.4 per cent and GVA growth at 7.3 per cent, reaffirming India's status as the fastest-growing major economy for the fourth consecutive year.</p><p>&#183; Private Final Consumption Expenditure grew by 7.0 per cent in FY26, reaching 61.5 per cent of GDP, the highest since 2012 (FY23 also recorded 61.5 per cent share). This growth is supported by low inflation, stable employment, and increasing real purchasing power. Strong agricultural performance has bolstered rural consumption, while improvements in urban consumption, aided by tax rationalisation, indicate broad-based demand momentum.</p><p><b>FISCAL DEVELOPMENTS: - </b></p><p>The government's prudent fiscal management has strengthened credibility and reinforced confidence in India's macroeconomic and fiscal framework. This led to three sovereign credit rating upgrades in 2025 - by Morningstar DBRS, S&amp;P Global Ratings, and Rating and Investment Information (R&amp;I), Inc.</p><p>&#183; Centre's revenue receipts strengthened from an average of about 8.5 per cent of GDP in FY16'FY20 to 9.2% of GDP in FY25 (PA). This improvement was driven by buoyant non-corporate tax collections, which rose from about 2.4 per cent of GDP pre-pandemic to around 3.3 per cent post-pandemic.</p><p>&#183; The direct tax base expanded steadily, with income tax returns filed increasing from 6.9 crore in FY22 to 9.2 crore in FY25. Higher return filings reflect improved compliance, greater use of technology in tax administration, and a growing number of individuals entering the tax net as their incomes rise.</p><p><b>EXTERNAL SECTOR: PLAYING THE LONG GAME</b></p><p>&#183; Between CY 2005 &amp; CY 2024, India's share of global merchandise exports nearly doubled from 1 per cent to 1.8 per cent, while its share of global commercial services exports more than doubled from 2 per cent to 4.3 per cent.</p><p>&#183; According to UNCTAD's Trade and Development Report 2025, India ranked among the leading economies in trade partner diversification, ranking third in the Global South and recording a trade diversity score higher than all Global North economies.</p><p>&#183; India's total exports reached a record USD 825.3 billion in FY25, registering a 6.1 per cent year-on-year growth, driven primarily by robust growth in services exports.</p>",
