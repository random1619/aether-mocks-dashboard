    "question": "According to the Global Gender Gap Index which is released in June 2025, India has been ranked 131 out of 148 countries with an overall gender parity score of 64.4%. Identify the CORRECT Statement(s) regarding this.<br>I. India has improved its score in economic participation and opportunity but still ranks among the bottom five countries in this subindex.<br>II. In 2025, India recorded an increase in female representation in Parliament and ministerial roles compared to 2024.<br>III. India's educational attainment score reflects over 95% gender parity due to better literacy and tertiary education enrolment among females.",
    "options": [
      "I and II Only",
      "I and III Only",
      "II and III Only",
      "I%2C II and III",
      "III Only"
    ],
    "correct_option_id": 1,
    "solution": "India has been ranked 131 out of 148 countries on the Global Gender Gap Index 2025 with an overall gender parity score of 64.4%, a relative drop from 2024, when the country was placed at 129 out of 146 nations. This has been attributed to \"performance of other economies\", even as the Indian economy's overall performance improved in absolute terms by  0.3 points.<br><ul><br>\t<li>The report released by the World Economic Forum on Thursday also showed that India has recorded a slight drop in parity (-0.6 points) since the last edition as far as \"political empowerment\" was concerned.</li><br>\t<li>Data showed that female representation in Parliament fell from 14.7% to 13.8% in 2025, lowering the indicator score for the second year in a row below 2023 levels. Similarly, the share of women in ministerial roles fell from 6.5% to 5.6%, moving the indicator score (5.9%) further away this year from its highest level of 30% in 2019.</li><br>\t<li>The index annually measures gender parity across four key dimensions \" economic participation and opportunity, educational attainment, health and survival, and political empowerment. Globally no economy has yet achieved full gender parity. The global gender gap score in 2025 for all 148 economies in the index closed at 68.8%.</li><br>\t<li>Globally, the second-largest gap to bridge is in \"economic participation and opportunity\". Among the 148 economies covered in the 2025 edition, the score for this subindex varies from 31.3% in Sudan to 87.3% in Botswana.</li><br>\t<li>In this dimension, India has increased parity where its score has improved by   0.9 percentage points. However, it figures in the bottom five countries of this subindex \" Sudan, Pakistan (34.7%), Iran (34.9%), Egypt (40.6%) and India (40.7%).</li><br>\t<li>\"These countries are marked by extremely low estimated earned-income ratios, with women accessing less than one-third of economic resources available to men. They also show minimal gender parity in senior workplace roles, with females-to-males ratios not exceeding 0.4, and labour-force participation rates reflecting less than half parity between women and men,\" the report said.</li><br>\t<li>The report, however, shows that parity in estimated earned income in India has also increased from 28.6% to 29.9%. Scores in labour-force participation rate remains the same (45.9%), duplicating India's highest level achieved to date, it said.</li><br>\t<li>In terms of educational attainment, India scores 97.1%, reflecting positive shifts in female shares for literacy and tertiary education enrolment, which result in positive score improvements for the subindex as a whole.</li><br>\t<li>India also recorded higher parity in health and survival, driven by improved scores in sex ratio at birth and in healthy life expectancy. However, similar to other countries, parity in the latter is obtained despite an overall reduction in men's and women's life expectancy.</li><br>\t<li>Iceland (92.6%) continues to lead the index, holding the top position for 16 consecutive years, and remains the only economy to have closed more than 90% of its gender gap since 2022. India's neighbours \" Bangladesh is ranked 24, China 103, Bhutan 119, Nepal 125, Sri Lanka 130, Pakistan last at 148.</li><br>\t<li>For most economies covered in both the 2006 and 2025 editions, sex ratio at birth has remained largely unchanged. In Albania and Georgia, the ratio increased slightly, by 0.02 and 0.08, respectively. The largest decreases over the same period are observed in India (-0.01) and the Philippines (-0.02).</li><br></ul>",

rior to the due date of periodic updation of KYC, the RE shall give at least three advance intimations, including at least one intimation by letter, at appropriate intervals to its customers through available communication options/channels for complying with the requirement of periodic updation of KYC,\" RBI said.</li><br>\t<li>Subsequent to the due date, the RE shall give at least three reminders, including at least one reminder by letter, at appropriate intervals, to such customers who have still not complied with the requirements, despite advance intimations.</li><br>\t<li>The regulated entities are asked to expeditiously implement these guidelines and before January 01, 2026.</li><br>\t<li>Further, the banks are advised to organise camps and launch intensive campaigns including special camps, focusing on periodic updation of KYC, especially in rural and semi urban branches and the branches having large pendency in periodic updation of KYC.</li><br>\t<li>RBI has also asked banks to make available the facility of updation of KYC for activation of inoperative accounts and unclaimed deposits at all branches including non-home branches.</li><br>\t<li>\"Further, a bank shall endeavour to provide the facility of updation of KYC in such accounts and deposits through Video-Customer Identification Process (V-CIP),\" it said.</li><br>\t<li>\"This is a time to time practice of the RBI to tighten the KYC norms so that customers get benefits of DBTs. Also, there has been a rise in inoperative accounts and banks have to bear the cost of those accounts. In addition, frauds have also increased, so regular updation of KYC is essential to keep a check on frauds,\" said a senior banking official at another state-owned bank. </li><br></ul>",

    "question": "The Ministry of Statistics and Programme Implementation (MoSPI), Government of India, released the 8th issue of the publication titled \"EnviStats India 2025: Environment Statistics\" during the National Workshop on Using Alternate Data Sources and Frontier Technologies for Policy Making on 5th June, 2025 in New Delhi. Identify the Correct Statement(s) regarding this.<br>I. The publication includes data on the population's access to electricity, transport, and sanitation for the first time.<br>II. India accounts for over 2 lakh marine faunal species, according to the global biodiversity figures presented.<br>III. Inland fish production has more than doubled from 2013\"14 to 2023\"24, reaching over 139 lakh tonnes.",

    "solution": "The Ministry of Statistics and Programme Implementation (MoSPI), Government of India, released the 8th issue of the publication titled \"EnviStats India 2025: Environment Statistics\" during the National Workshop on Using Alternate Data Sources and Frontier Technologies for Policy Making on 5th June, 2025 in New Delhi.<br><br>Since 2018, the National Statistics Office (NSO) has been publishing \"EnviStats India\" in alignment with the Framework for the Development of Environment Statistics (FDES) 2013. The data presented in the publication are compiled based on the data, sourced from various Ministries, Departments, and Organizations of the Government of India.<br>Following the structure of FDES 2013, the data presented in \"EnviStats India 2025: Environment Statistics\" are organized into six components, each corresponding to the components of FDES 2013. Related topics under each component have been grouped together to facilitate easier understanding and use.<br>This year's publication introduced several changes in its formation and structure, which inter alia includes:<br><ul><br>\t<li>An expert group comprising representatives from line Ministries/Departments and domain experts in the field of environment was constituted to consult on potential improvements to the publication, including expanding its scope, identifying potential data sources, and suggesting refinements in its design and presentation.</li><br>\t<li>The publication has been restructured to provide information in a component-wise format.</li><br>\t<li>The concordance of indicators collected for EnviStats 2025 was mapped vis-à-vis FDES 2013. The comprehensive list of indicators under the Basic Set of Environment Statistics from FDES 2013 is also included in the publication.</li><br>\t<li> New data on the population's access to electricity, transport, and sanitation is included. An indicator containing <em>List of Ramsar Sites</em> was compiled based on the Expert Group's recommendations.  </li><br></ul><br><strong>Important Highlights of the publication \"EnviStats India 2025: Environment Statistics\":-</strong><br><ul><br>\t<li>The annual mean temperature increased from 25.05°C in 2001 to 25.74°C in 2024. Similarly, the annual minimum and maximum temperature rose from 19.32°C to 20.24°C and 30.78°C to 31.25°C respectively, during the same period.</li><br>\t<li>The annual rainfall data from 2001 to 2024 highlights significant year-to-year variability influenced by monsoon patterns. Despite this variability, the data does not indicate any clear long-term upward or downward trend in total annual rainfall.</li><br>\t<li>Globally, there are 2,47,605 marine faunal species, while India accounts for 20,613. India has 9,436 freshwater species, 5,023 species in the Indian Mangrove System, 3,383 species in the Estuarine Ecosystem, and a notable 22,404 species in its Soil Ecosystem.</li><br>\t<li>When considering the total count of faunal species, the world has 16,73,627 species of which 1,04,561 are found in India. </li><br>\t<li>Inland fish production has increased from 61.36 lakh tonnes in 2013-14 to 139.07 lakh tonnes in 2023\"24, possibly indicating inland aquaculture and freshwater fisheries. With a slower growth, Marine production has also increased from 34.43 lakh tonnes to 44.95 lakh tonnes during the same period.</li><br>\t<li>The Environment Sustainability Sector shows the highest expenditure share as Rs. 2433.24 crore in 2021-22. The Conservation of Natural Resource Sector shows an upward trend and the Agro-Forestry Sector exhibits the lowest expenditure among the three sectors: Agro-Forestry, Conservation of Natural Resources, and Environment Sustainability.</li><br></ul>",

oss PDOAs</strong> Users can effortlessly switch among PDO Aggregator networks, enhanced by a unified payment ecosystem.</li></p><p><li><strong>Mobile Data Offload Tie&#8209;ups</strong> PDOs can team with TSPs to alleviate spectrum congestion while earning extra revenue.</li></p><p><li><strong>Ad&#8209;Push Capabilities</strong> With user consent, PDOAs and App Providers can deliver relevant content/promotions, adding monetization routes.</li></p><p></ul></p>",
