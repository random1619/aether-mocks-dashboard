  {
    "question": "<p>A cell will swell up in which type of solution?</p>",

    "solution": "<p>If the medium surrounding the cell has a higher water concentration than the cell, meaning that the outside solution is very dilute, the cell will gain water by osmosis. Such a solution is known as a hypotonic solution. As a result, the water enters the cell and swells up.</p>",
