    "question": "<p>Hanging pillar is found in which of the following temples?</p>",

    "correct_option_id": 2,
    "solution": "<p>Hanging Pillar is found in Veerabadhra Temple in Lepakshi, Andhra Pradesh. It is also famous for the largest murals ever painted in Asia, which happens to be on the ceiling of the shrine. These paintings portrays 14 avatars of Lord Shiva. The temple is of the Vijayanagara architectural style.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Gugga Dance is associated with which state?</p>",

      "Sikkim"
    ],
    "correct_option_id": 1,
    "solution": "<p>Gugga dance is a ritualistic dance form practiced in the Haryana state of India. It is performed in the procession taken out in the memory of saint Gugga. This dance is generally performed in a procession held on a day about a week before the Gugga Naumi. The dance is accompanied with various musical instruments such as 'Deru', 'Thali' and 'Chimta'.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Which of the following is referred to as Bamboo dance?</p>",

    "correct_option_id": 4,
    "solution": "<p>Cheraw is a ritual dance performed in Mizoram. It consist of four people holding two crossed pairs of bamboo staves. In this the male dancers move these bamboo staves in rhythmic beats, the female dancers perform by stepping in and out of the bamboo blocks.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Warli folk art is associated with which state?</p>",

      "Gujarat",
      "Rajasthan",

      "Jammu &amp; Kashmir"
    ],
    "correct_option_id": 2,
    "solution": "<p>Warli art is a beautiful folk art of Maharashtra, traditionally created by the tribal womens. These are executed on the walls of the houses. Pictures of human beings and animals, depicting everyday life are drawn in a rhythmic pattern. Warli paintings are painted white on mud walls. Warli and Malkhar koli tribes of Maharashtra practice this art form.</p>",
    "question_index": 3
  },
  {
    "question": "<p>\"Dancing Girl\" belongs to which Indus Valley site?</p>",

      "Harappa",

      "Lothal"
    ],
    "correct_option_id": 2,
    "solution": "<p>Dancing Girl is a bronze statue found in Mohenjo-Daro. It depicts a girl in a standing position in a Tribhanga style. It was created using lost wax process. Presently the statue is displayed in National Museum, Delhi. Added to this sculpture, bronze Bull is also found in Mohenjo-Daro.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Which among the following is referred to as \"an epic poem in red sandstone\"?</p>",

      "Diwani-I-Khas",
      "Moti Masjid",
      "Jamma Masjid"
    ],
    "correct_option_id": 1,
    "solution": "<p>Fatehpur Sikri is referred to as an epic poem in red sandstone. It was founded by Mughal Emperor Akbar in 1569. Buland Darwaza, the highest gateway in the world is the main entrance for Fatehpur Sikri. Some important buildings of Fatehpur Sikiri are Panch Mahal and Diwan-i-Kas.</p>",
    "question_index": 5
  },
  {
    "question": "<p>The construction of Rastrapathi Bhavan was completed in the year ________?</p>",
    "options": [
      "1929",
      "1939",
      "1927",
      "1947",
      "1937"
    ],
    "correct_option_id": 0,
    "solution": "<p>Started in the year 1921, the construction of Rastrapaathi Bhavan was completed in the year 1929. It was designed by the British Architect, Sir Edwin Lutyens, is a mixture of Indian and Western schools of architecture. It is constructed on Raisina Hill, New Delhi. It was originally referred to as Viceroy's house, which is now official residence of President of India.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Which of the following temples is referred to as Black Pagoda?</p>",
    "options": [
      "Somnath Temple",
      "Khajuraho Temple",
      "Kailashanatha Temple",
      "Virupaksha Temple",
      "Konark Sun Temple"
    ],
    "correct_option_id": 4,
    "solution": "<p>Sun Temple at Konark is referred to as Black Pagoda. The temple was used as a navigational point by European sailors. They referred to it as the 'Black Pagoda' due to its dark color and its magnetic power that drew ships into the shore and caused shipwrecks.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Koli is the folk dance of which of the following state?</p>",

      "Odisha"
    ],
    "correct_option_id": 3,
    "solution": "<p>Koli is folk dance form of Maharashtra. It derives its name from the fisher folk of Maharashtra - Kolis. These community people are famous for their distinct identity among others and for their lively dances. Their dances are related to fishing. Women participants wear green coloured sari in their Koli style coming upto knees while male wear a lungi kind of costume having triangular shape. This dance got the loudest cheers and wolf whistles.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Which among the following modern architecture has been included in UNESCO's world heritage site?</p>",

      "Rashtrapathi Bhavan",
      "Akshardham Temple",
      "Capitol Complex"
    ],
    "correct_option_id": 4,
    "solution": "<p>Capitol complex in Chandigarh is an UNESCO world Heritage site since 2016. It was designed by the architect Le Corbusier. It comprises three buildings, three monuments and a lake, including the Palace of Assembly or Legislative Assembly, Secretariat, High Court, Open Hand Monument, Geometric Hill and Tower of Shadows.</p>",
    "question_index": 9
  },
  {
    "question": "<p>The \"Story of Integration of Indian States\" was authored by?</p>",

      "Vallabhai Patel",
      "Jawaharlal Nehru",
      "V.P.Menon",
      "C. Rajagopalachari",
      "Sarojini Naidu"
    ],
    "correct_option_id": 2,
    "solution": "<p>Story of Integration of Indian States was authored by V.P.Menon who assisted the then Home Minister of Independent India, Vallabhai Patel. It deals with diplomacy and bargains done between Indian government and Princely states.</p>",
    "question_index": 10
  },
  {
    "question": "<p>\"Indian Musalman\" was written by who among the following?</p>",

    "solution": "<p>Indian Musalman was written by William Hunter. It analyses the role of Indian Muslims in the revolt of 1857. This book is regarded as the base for initiation of divide and rule policy followed by British.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Which among the following is the first Indian work to receive Man Booker Prize?</p>",

    "question_index": 12
  },
  {
    "question": "<p>Which among the following is NOT a work of Mahatma Gandhi?</p>",

      "The conquest of Self",

    "correct_option_id": 2,
    "solution": "<p>A bunch of old letters was written by Jawaharlal Nehru. These letters were written mostly to Nehru by leading personalities and a few were written by him. They vividly capture the spirit of an India riven by terrible strife, but at the same time compelled by an inspiring new nationalism.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Who is the author of the book \"The Accidental Prime Minister\"?</p>",

    "question_index": 15
  },
  {

  },
  {
    "question": "<p>Which among the following novel was the first one to receive Man Booker Prize?</p>",

    "question": "<p>The book \"Rising Tides\" deals with which of the following?</p>",

    "solution": "<p>Sankara Kurup, Malayalam writer was the first recipient of Jnanpith Award. He won the prize in 1965 for his collection of poems in Malayalam Odakkuzhal. He is popularly referred to as Mahakavi G. he is also a recipient of Padma Bhushan. He has also served as the member of Rajya Sabha.</p>",
    "question_index": 20

    "question": "<p>Who among the following was the first recipient of Sahitya Akademi Fellowship?</p>",

    "correct_option_id": 3,
    "solution": "<p>Dr. S. Radhakrishnan was the first recipient of Sahitya Akademi Fellowship in the year 1968. It is the highest honor conferred by the Akademi on a writer is by electing him as its Fellow. This honor is reserved for `the immortals of literature' and limited to twenty-one only at any given time.</p>",
    "question_index": 21
  },
  {
    "question": "<p>Which among the following ministry presents \"Vishwakarma Rashtriya Puraskar\"?</p>",
    "options": [
      "Ministry of Agriculture and Farmers Welfare",
      "Ministry of Commerce and Industry",
      "Ministry of Labour &amp; Employment",
      "Ministry of Micro, Small and Medium Enterprises",
      "Ministry of Heavy Industries and Public Enterprises"
    ],
    "correct_option_id": 2,
    "solution": "<p>The award is presented by Ministry of Labour &amp; Employment. It is for rewarding &amp; recognizing the efforts of workers from the industrial undertakings at the national level. This scheme is applicable for workers employed in the factories &amp; docks. The VishwaKarma Rashtriya Puraskar (VRP) for each Performance Year will be granted to the awardees by the Hon'ble Union Labour &amp; Employment Minister, Govt. of India at a special function to be held in New Delhi. Usually, the function is held each year on 17th September to coincide with the Vishwakarma Day.</p>",
    "question_index": 22
  },
  {
    "question": "<p>Sant Kabir Award is associated with which of the following?</p>",
    "options": [
      "Literature",
      "Textile",
      "Music",
      "Farming",
      "Social Welfare"
    ],
    "correct_option_id": 1,
    "solution": "<p>Sant Kabir Award is an Indian Government award conferred to outstanding weavers who have made valuable contribution in keeping alive the handloom heritage. It was established for dedication in building up linkages between the past, present and future through dissemination of knowledge on traditional skills and designs by Ministry of Textiles, Government of India. The award is presented by the President of India. Award consists of one mounted gold coin, one shawl and a citation. In addition to this, Rs 6 lakh financial assistance will also be given to encourage and create 10 new products of high level of excellence, high aesthetic value and high quality in duration of one year.</p>",
    "question_index": 23
  },

    "question": "<p>Kayakalp Awards are presented for which of the following?</p>",

    "correct_option_id": 0,
    "solution": "<p>Kayakalp awardees are given for the work in maintaining high standards of sanitation and hygiene in public health facilities. It is presented by Ministry of Health and Family Welfare. ICT based application 'MeraAspataal (My Hospital)' that captures patients' feedback about their experience in the health facilities on the services are used for recognizing the awardees.</p>",
    "question_index": 24
  },
  {
    "question": "<p>Which among the following organization administers Crystal Award?</p>",

    "question": "<p>Who was the first recipient of Dr. B.C. Roy Award?</p>",

      "Vikram Marwah",
      "Nagarur Gopinath",

    "correct_option_id": 4,
    "solution": "<p>Dr.B.C. Roy was first awarded in 1973 to Sandip Mukerjee, FRCS, by then President VV Giri. Dr. B. C. Roy Award was instituted in 1962 in memory of B. C. Roy by Medical Council of India. It is presented by President of India in New Delhi on July 1, National Doctors' Day.</p>",
    "question_index": 26
  },

    "question": "<p>Which among the following award has been instituted by WHO specifically for India?</p>",

    "correct_option_id": 1,
    "solution": "<p>WHO Country Office for India instituted awards for Public Health Champions in 2015. The first awards were given out at the national consultation commemorating the World Health Day 2015 on 1 April 2015 at New Delhi. It is for recognizing public health champions is to honour and recognize efforts of both, individuals and institutions who have made an outstanding contribution to public health through advocacy for and involvement in impactful health policies, strategies and programmes with proven public health achievements and substantial improvement in health outcomes with equity in the country.</p>",
    "question_index": 27

    "question": "<p>Bharatendu Harishchandra Awards is associated with which of the following field?</p>",

      "Painting",

      "Environment",
      "Drama",
      "Film Industry"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Bharatendu Harishchandra Awards, is an initiative of the Ministry of Information and Broadcasting to promote books and manuscripts original writing in Hindi, have been implemented by the Publications Division annually since 1983. Named after renowned Hindi writer Shri Bharatendu Harishchandra, who paved the renaissance for Hindi language and literature, the awards were initially given in Journalism and Mass Communication. Three new categories, viz., National Integration, Women's Issues and Children's Literature were added in 1992.</p>",
    "question_index": 28
  },
  {
    "question": "<p>Kalinga prize is awarded by which of the following organization?</p>",
