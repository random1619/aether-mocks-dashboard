    "question": "<span class=\"eqt\"><p>Which of the following statements is/are true?</p><p>I.Perfect competition exists when there are many consumers buying a standardised product from numerous small businesses.</p><p>II.Because no seller is big enough or influential enough to affect price, sellers and buyers accept the going price.</p><p>III.In a market characterized by perfect competition, price is determined through the mechanisms of supply and demand.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2360;&#2361;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2340;&#2348; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2332;&#2348; &#2325;&#2312; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366; &#2325;&#2312; &#2331;&#2379;&#2335;&#2375; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351;&#2379;&#2306; &#2360;&#2375; &#2350;&#2366;&#2344;&#2325;&#2368;&#2325;&#2371;&#2340; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2326;&#2352;&#2368;&#2342;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2325;&#2379;&#2312; &#2349;&#2368; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2348;&#2337;&#2364;&#2366; &#2351;&#2366; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2358;&#2366;&#2354;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;, &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2324;&#2352; &#2326;&#2352;&#2368;&#2342;&#2366;&#2352; &#2330;&#2354; &#2352;&#2361;&#2368; &#2325;&#2368;&#2350;&#2340; &#2325;&#2379; &#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>III. &#2346;&#2370;&#2352;&#2381;&#2339; &#2346;&#2381;&#2352;&#2340;&#2367;&#2351;&#2379;&#2327;&#2367;&#2340;&#2366; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2357;&#2366;&#2354;&#2375; &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2375;&#2306;, &#2325;&#2368;&#2350;&#2340; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2339; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2324;&#2352; &#2350;&#2366;&#2306;&#2327; &#2325;&#2375; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",

    "correct_option_id": 3,
    "solution": "<p>Perfect competition exists when there are many consumers buying a standardised product from numerous small businesses. Because no seller is big enough or influential enough to affect price, sellers and buyers accept the going price. </p><p>In a market characterized by perfect competition, price is determined through the mechanisms of supply and demand. Prices are influenced both by the supply of products from sellers and by the demand for products by buyers.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about 'Mahalanobis Model'.</p><p>I. It emphasized on heavy industries.</p><p>II. It is associated with the First five-year plan.</p><p>Which of the following statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2350;&#2361;&#2366;&#2354;&#2344;&#2379;&#2348;&#2367;&#2360; &#2350;&#2377;&#2337;&#2354;' &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2311;&#2360;&#2344;&#2375; &#2349;&#2366;&#2352;&#2368; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2346;&#2352; &#2332;&#2379;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>II. &#2351;&#2361; &#2346;&#2361;&#2354;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",

    ],
    "correct_option_id": 0,
    "solution": "<p><b> Mahalanobis Model is also known as 'heavy industry' strategy </b>. The economy is divided into two sectors, one producing capital/investment good and the other producing consumer goods. The argument is that, for long-run sustained growth of consumer goods, the initial buildup of the investment goods sector is essential. So, the statement I is correct.</p><p><b> Second Five Year Plan </b> is associated with this type of model.</p><p><b> First five-year plan was based on Harrold-Domer model </b>. It suggests that there is no natural reason for an economy to have balanced growth. So, statement II is incorrect.</p><p></p>",
    "question_index": 44
  },

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true?</p><p>I. The English defeated the Portuguese at the Battle of Swally in 1612 under the command of Captain Thomas Best.</p><p>II. After this victory, the English obtained Emperor Jahangir's permission to establish a factory at Bombay.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2379;&#2306; &#2344;&#2375; &#2325;&#2376;&#2346;&#2381;&#2335;&#2344; &#2341;&#2377;&#2350;&#2360; &#2348;&#2375;&#2360;&#2381;&#2335; &#2325;&#2375; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2350;&#2375;&#2306; 1612 &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2366;&#2354;&#2368; &#2325;&#2375; &#2351;&#2369;&#2342;&#2381;&#2343; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2381;&#2340;&#2327;&#2366;&#2354;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2361;&#2352;&#2366;&#2351;&#2366;&#2404;</p><p>II. &#2311;&#2360; &#2332;&#2368;&#2340; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2379;&#2306; &#2344;&#2375; &#2348;&#2306;&#2348;&#2312; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2366;&#2352;&#2326;&#2366;&#2344;&#2366; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2381;&#2352;&#2366;&#2335; &#2332;&#2361;&#2366;&#2305;&#2327;&#2368;&#2352; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>After defeating the Portuguese at Swally in 1612 under Captain Thomas Best, the English secured Mughal favor, obtaining permission to establish a factory at \"Surat\". Hence Only statement I is correct.</p><p>This foothold became a key base for the Company's early trade on the west coast under Emperor Jahangir.</p><p>Further insights:</p><p>- The English had earlier set up a factory at Masulipatnam (1611) on the Coromandel Coast before their west-coast breakthrough.</p><p>- The Portuguese dominance declined after Swally; Portuguese power later shifted south to Goa.</p><p>- Subsequent treaties and farmans consolidated English privileges, leading to Bombay's (Mumbai) rise after its cession by the Portuguese (1661; transferred to EIC in 1668).</p><p>- The Battle of Bassein (1737 - 39) marked Maratha assertion against the Portuguese, further altering western coastal power.</p>",
    "question_index": 47

    "question": "<span class=\"eqt\"><p>A trader mixes 26 kg of rice at Rs. 10 per kg with 30 kg of rice of other variety at Rs. 36 per kg and sells the mixture at Rs. 30 per kg. His profit percent is approximately:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2368; 10 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; kg &#2325;&#2368;&#2350;&#2340; &#2357;&#2366;&#2354;&#2375; 26 kg &#2330;&#2366;&#2357;&#2354; &#2325;&#2379; 36 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; kg &#2325;&#2368;&#2350;&#2340; &#2357;&#2366;&#2354;&#2375; &#2309;&#2344;&#2381;&#2351; &#2325;&#2367;&#2360;&#2381;&#2350; &#2325;&#2375; 30 kg &#2330;&#2366;&#2357;&#2354; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2379; 30 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; kg &#2325;&#2368;&#2350;&#2340; &#2346;&#2352; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2366; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;:</p></span>",

      "<span class=\"eqt\">No profit no loss</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2354;&#2366;&#2349; &#2344; &#2361;&#2366;&#2344;&#2367;</span>",

    "question": "<span class=\"eqt\"><p>&#916;ABC and &#916;ABD are on the common base AB and DC = 2BD. If AB<b>&#10178;</b>DC, then which of the following is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#916;ABC &#2324;&#2352; &#916;ABD &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2310;&#2343;&#2366;&#2352; AB &#2361;&#2376; &#2324;&#2352; DC = 2BD &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; AB&#10178;DC &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",

    "solution": "<p>Here, DC = 2BD and AB is the common base of &#916;ABC and &#916;ABD. Also, AB<b>&#10178;</b>DC</p><p>So, the figure will be:</p><p><img width=245 height=180 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/ntpc2-22-2025sol.jpg\" ></p><p>Here, in &#916;ABC and &#916;ABD</p><p>BD = DC/2 = BC</p><p>So, AD = AC (because two sides and one angle are equal)</p><p>Therefore, <b>&#916;ABC </b><b>&#8773;</b><b> &#916;ABD</b></p>",

    "question": "<span class=\"eqt\"><p>The sum of two numbers is 216 and their H.C.F is 27. What are those two numbers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 216 &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2366; &#2350;&#2361;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; (H.C.F) 27 &#2361;&#2376;, &#2340;&#2379; &#2357;&#2375; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2306; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">27, 189</span><span class=\"hqt\" style=\"display:none\">27, 189</span>",
      "<span class=\"eqt\">154, 62</span><span class=\"hqt\" style=\"display:none\">154, 62</span>",
      "<span class=\"eqt\">24, 92</span><span class=\"hqt\" style=\"display:none\">124, 92</span>",
      "<span class=\"eqt\">88, 128</span><span class=\"hqt\" style=\"display:none\">88, 128</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Since the H.C.F of two numbers are 27 then we can write both numbers as 27a and 27b where a and b must be co-primes.</p><p>Then, 27a + 27b = 216</p><p>=&gt; a + b = 8</p><p>Now, co-primes with sum 8 are (1, 7) and (3, 5).</p><p>&#8756; Required number are (27  X  1, 27  X  7) and (27  X  3, 27  X  5) i.e. </p><p>(27, 189) and (81, 135);</p><p>Out of these, the one given in the answer choices is the pair (27, 189).</p>",
    "question_index": 53
  },

    "question": "<span class=\"eqt\"><p>When a shopkeeper sells an article for Rs 800, he numerically earns double the profit of what he would have lost had he sold it for Rs 500. If he is selling the article at 30% profit, find the S.P.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; 800 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375;, &#2313;&#2360; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; 500 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2361;&#2369;&#2319; &#2361;&#2366;&#2344;&#2367; &#2360;&#2375; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2354;&#2366;&#2349; &#2325;&#2350;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; 30% &#2354;&#2366;&#2349; &#2346;&#2352; &#2348;&#2375;&#2330; &#2352;&#2361;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;|</p></span>",
    "options": [
      "<span class=\"eqt\">720</span><span class=\"hqt\" style=\"display:none\">720</span>",
      "<span class=\"eqt\">760</span><span class=\"hqt\" style=\"display:none\">760</span>",
      "<span class=\"eqt\">800</span><span class=\"hqt\" style=\"display:none\">800</span>",
      "<span class=\"eqt\">780</span><span class=\"hqt\" style=\"display:none\">780</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>=&gt; Profit = 2*loss</p><p>=&gt; Let C.P be x</p><p>=&gt;  S.P<sub>1</sub>  -  x = 2 (x-S.P<sub>2</sub>)</p><p>=&gt; 800  -  x = 2 (x  -  500)</p><p>=&gt; 800  -  x = 2x  -  1000</p><p>=&gt; 1800 = 3x</p><p>=&gt; x = 1800/3</p><p>=&gt; = 600</p><p>=&gt; S.P = 600 + 30*600/100</p><p>=&gt; = 600 + 180</p><p>=&gt; = 780</p>",

><p></p></span>",

    "question": "<span class=\"eqt\"><p>A boat can travel downstream with a speed of 52 km/hr. If the speed of boat in still water is 45 kmph, how much distance can the boat cover in 2 hours while going upstream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 52 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2330;&#2366;&#2354; 45 km/hr &#2328;&#2306;&#2335;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2366;&#2357; 2 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>There are two circles with centre O and O' having the radius 10 cm and 13 cm respectively. The length of the common chord is 10 cm. What is the distance between centre of the circles?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2324;&#2352; O' &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;&#2319;&#2305; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 10 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 13 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2306;&#2404; &#2313;&#2349;&#2351;&#2344;&#2367;&#2359;&#2381;&#2336; &#2332;&#2368;&#2357;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 10 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>If the base area, height, and volume of a right hexagonal prism are (3&radic;3 x<sup>2</sup>/2) cm<sup>2</sup>, 15&radic;3 cm, and 17280 cm<sup>3</sup> respectively, find the value of x.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2350;&#2325;&#2379;&#2339;&#2368;&#2351; &#2359;&#2335;&#2381;&#2349;&#2369;&#2332; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;, &#2314;&#2305;&#2330;&#2366;&#2312;, &#2324;&#2352; &#2310;&#2351;&#2340;&#2344; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; (3&radic;3 x<sup>2</sup>/2) &#2360;&#2375;&#2350;&#2368;<sup>2</sup>, 15&radic;3 &#2360;&#2375;&#2350;&#2368;, &#2324;&#2352; 17280 &#2360;&#2375;&#2350;&#2368;<sup>3</sup> &#2361;&#2376;&#2306;, &#2340;&#2379; x &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",

    "question": "<span class=\"eqt\"><p>C is the centre of a semicircle of radius 14 cm with AB as diameter. Point O lies on the semicircle such that AO = OB. Find the difference between the areas of the two shaded regions shown in the figure.</p><p><img width=188 height=103 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13651/image001.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>C &#2319;&#2325; &#2309;&#2352;&#2381;&#2343;&#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 14 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2324;&#2352; AB &#2357;&#2381;&#2351;&#2366;&#2360; &#2361;&#2376;&#2404; &#2348;&#2367;&#2306;&#2342;&#2369; O &#2309;&#2352;&#2381;&#2343;&#2357;&#2371;&#2340;&#2381;&#2340; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376; &#2340;&#2366;&#2325;&#2367; AO = OB &#2361;&#2379;&#2404; &#2330;&#2367;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2342;&#2367;&#2326;&#2366;&#2319; &#2327;&#2319; &#2342;&#2379; &#2331;&#2366;&#2351;&#2366;&#2306;&#2325;&#2367;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p><img width=188 height=103 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13651/image001.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">42 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">42 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">35 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">35 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">56 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">56 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>In the given figure:</p><p>BC = OC = AC = radius of the semi-circle = 14 cm</p><p>C is the centre of the semi-circle and AO = OB. This means angle OCB is a right angle. So,</p><p>Area of triangle ACO = (1/2) * base * height</p><p>= (1/2) * AC * OC</p><p>= (1/2) * 14 * 14</p><p>= 98 cm<sup>2</sup></p><p>Area of unshaded region AOA + area of shaded region BOB = area of semi-circle  -  area of triangle AOB</p><p>= (1/2) * (22/7) * 14 * 14  -  (1/2) * 28 * 14</p><p>= 308 - 196</p><p>=112</p><p>Area of unshaded region AOA = area of shaded region BOB</p><p>area of shaded region BOB = 112/2</p><p>= 56 cm<sup>2</sup></p><p>Therefore, difference = 98  -  56 = <b>42 cm<sup>2</sup></b></p>",
    "question_index": 63
  },

    "question": "<span class=\"eqt\"><p>Mohit, Nikhil and Parth invested Rs. 84,000, Rs. 1,05,000 and Rs. 1,47,000 respectively. All three remained in the business for the full year. If the total profit at the end of the year was Rs. 84,800, then how much profit did Nikhil receive?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2379;&#2361;&#2367;&#2340;, &#2344;&#2367;&#2326;&#2367;&#2354; &#2324;&#2352; &#2346;&#2366;&#2352;&#2381;&#2341; &#2344;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#8377;84,000, &#8377;1,05,000 &#2324;&#2352; &#8377;1,47,000 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2340;&#2368;&#2344;&#2379;&#2306; &#2346;&#2370;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2350;&#2375;&#2306; &#2352;&#2361;&#2375;&#2404; &#2351;&#2342;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; &#8377;84,800 &#2341;&#2366;, &#2340;&#2379; &#2344;&#2367;&#2326;&#2367;&#2354; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2366; &#2354;&#2366;&#2349; &#2350;&#2367;&#2354;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>A principal P is invested in two different schemes for 3 years. Scheme M offers simple interest at 20% per annum. Scheme N offers compound interest at 20% per annum compounded annually. If the amount from Scheme N exceeds that from Scheme M by Rs. 640, find P.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2352;&#2366;&#2358;&#2367; P &#2325;&#2379; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2379; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2351;&#2379;&#2332;&#2344;&#2366; M &#2360;&#2352;&#2354; &#2348;&#2381;&#2351;&#2366;&#2332; 20% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2346;&#2352; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2379;&#2332;&#2344;&#2366; N &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; 20% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2346;&#2352; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2351;&#2379;&#2332;&#2344;&#2366; N &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2352;&#2366;&#2358;&#2367; &#2351;&#2379;&#2332;&#2344;&#2366; M &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2352;&#2366;&#2358;&#2367; &#2360;&#2375; 640 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; P &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p><div>&nbsp;What is the value of following expression:&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">sec&#952;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cot(&#960;/2  -  &#952;)</span></div>&nbsp;x&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">sin<sup>2</sup>(&#960;/2  -  &#952;)</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cosec&#952;</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;:</p><p>&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">sec&#952;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cot(&#960;/2  -  &#952;)</span></div>&nbsp;x&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">sin<sup>2</sup>(&#960;/2  -  &#952;)</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cosec&#952;</span></div></p></span>",

    "question": "<span class=\"eqt\"><p>A work of Rs. 7500 was assigned to two workers A and B who can complete their work in 25 days and 75 days respectively. If they work alternately, find total amount received by A.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2369;.7500 &#2325;&#2366; &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2342;&#2379; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;&#2379;&#2306; A &#2324;&#2352; B &#2325;&#2379; &#2360;&#2380;&#2306;&#2346;&#2366; &#2327;&#2351;&#2366; &#2340;&#2341;&#2366; A &#2324;&#2352; B &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 25 &#2342;&#2367;&#2344;&#2379;&#2306; &#2324;&#2352; 75 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2357;&#2375; &#2319;&#2325;&#2366;&#2306;&#2340;&#2352; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2369;&#2354; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.1800</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.1800</span>",
      "<span class=\"eqt\">Rs.4800</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.4800</span>",
      "<span class=\"eqt\">Rs.5700</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.5700</span>",
      "<span class=\"eqt\">Rs.5400</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.5400</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let total work be L.C.M (25, 75) = 75 units</p><p>Efficiency of A = 75 / 25 = 3</p><p>Efficiency of B = 75 / 75 = 1</p><p>Working together = 3+ 1 = 4</p><p>= 18 x 4 = 72 units</p><p>= 72 + 3 = 75 units</p><p>Part of the work completed by A = 18 x 3 + 3 = 57</p><p>Amount received by A = 57 x 7500 / 75 = Rs 5700</p>",

    "question": "<span class=\"eqt\"><p>The weight of an aluminium cone is (7/9) times the weight of iron cone. If weight of 1 gm of aluminium is (9/7) times of the weight of 1 gm of iron cone and heights of both cones are equal, then what is the ratio of radius of aluminium cone to radius of iron cone?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2354;&#2381;&#2351;&#2370;&#2350;&#2368;&#2344;&#2367;&#2351;&#2350; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2357;&#2332;&#2344; &#2354;&#2379;&#2361;&#2375; &#2325;&#2375; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2357;&#2332;&#2344; &#2325;&#2366; (7/9) &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 1 &#2327;&#2381;&#2352;&#2366;&#2350; &#2319;&#2354;&#2381;&#2351;&#2370;&#2350;&#2368;&#2344;&#2367;&#2351;&#2350; &#2325;&#2366; &#2357;&#2332;&#2344; &#2354;&#2379;&#2361;&#2375; &#2325;&#2375; 1 &#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2375; &#2357;&#2332;&#2344; &#2325;&#2366; (9/7) &#2327;&#2369;&#2344;&#2366; &#2361;&#2376; &#2324;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2358;&#2306;&#2325;&#2369;&#2323;&#2306; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;, &#2340;&#2379; &#2319;&#2354;&#2381;&#2351;&#2370;&#2350;&#2368;&#2344;&#2367;&#2351;&#2350; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; &#2354;&#2379;&#2361;&#2375; &#2325;&#2375; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">7: 9</span><span class=\"hqt\" style=\"display:none\">7: 9</span>",
      "<span class=\"eqt\">8: 9</span><span class=\"hqt\" style=\"display:none\">8: 9</span>",
      "<span class=\"eqt\">7: 8</span><span class=\"hqt\" style=\"display:none\">7: 8</span>",
      "<span class=\"eqt\">6: 7</span><span class=\"hqt\" style=\"display:none\">6: 7</span>"

    "correct_option_id": 0,
    "solution": "<p>Let height of the aluminium cone = height of iron cone = h</p><p>And radius of aluminium cone = r and radius of iron cone = R</p><p>According to the question,</p><p>{9 * (1/3 * &#960; * r<sup>2</sup> * h)}/{7 * (1/3 * &#960; * R<sup>2</sup> * h)} = 7/9</p><p>=&gt; r<sup>2</sup>/R<sup>2</sup> = 49/81</p><p>=&gt; r/R = 7/9</p>",

    "question": "<span class=\"eqt\"><p>What is the smallest positive integer that, when multiplied by 1.2, gives a whole number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; &#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2375; 1.2 &#2360;&#2375; &#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2319;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>1.2 = 12/10 = 6/5</p><p>Let the required smallest positive integer be n.</p><p>n  X  6/5 is a whole number.</p><p>So n must be a multiple of 5 to cancel the denominator 5.</p><p>Smallest such n = 5</p><p>5  X  6/5 = 6, a whole number.</p>",

    "question": "<span class=\"eqt\"><p>What is the maximum value of the sum of the series 78, 71, 64, 57, 50, .....</p><p>when terms are taken till they remain positive?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; 78, 71, 64, 57, 50, ..... &#2325;&#2366; &#2351;&#2379;&#2327; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p>&#2332;&#2348; &#2346;&#2342;&#2379;&#2306; &#2325;&#2379; &#2340;&#2348; &#2340;&#2325; &#2354;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2332;&#2348; &#2340;&#2325; &#2357;&#2375; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2352;&#2361;&#2375;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">447</span><span class=\"hqt\" style=\"display:none\">447</span>",
      "<span class=\"eqt\">484</span><span class=\"hqt\" style=\"display:none\">484</span>",
      "<span class=\"eqt\">444</span><span class=\"hqt\" style=\"display:none\">444</span>",
      "<span class=\"eqt\">474</span><span class=\"hqt\" style=\"display:none\">474</span>"

    "correct_option_id": 3,
    "solution": "<p>Arithmetic series - 78, 71, 64, 57, 50, ...?</p><p>d = 71  -  78 = -7</p><p>For maximum value, last term should be least positive integer.</p><p>78  -  7*11 = 1 (last term)</p><p>Total positive terms = n = 11 + 1 = 12</p><p>Sum = n/2 * (a<sub>1</sub> + a<sub>12</sub>)</p><p>= 12/2 * (78 + 1)</p><p>= 6 * 79</p><p>= 474</p>",
    "question_index": 74

  {
    "question": "<p>Arrange the following sentences in the most logical sequence.</p><p></p><p>1) As a result, people began to prioritise mental health and work-life balance. </p><p>2) The modern corporate environment has become increasingly demanding. </p><p>3) Employees often experience stress due to long working hours and high expectations. </p><p>4) Organisations started introducing wellness programmes and flexible schedules. </p><p>5) This shift encouraged a healthier approach to productivity. </p>",

    "correct_option_id": 0,
    "solution": "<p>The passage begins with 2, which introduces the central idea - the demanding nature of the modern corporate environment. Sentence 3 logically follows, as it elaborates on the consequences faced by employees, such as stress due to long hours and expectations.</p><p>Sentence 1 comes next, as \"As a result\" indicates the outcome of this stress - people prioritising mental health and work-life balance. Sentence 4 follows, showing the response by organisations through wellness programmes and flexible schedules.</p><p>Finally, sentence 5 concludes the passage, where \"This shift\" refers to these changes and highlights their broader impact on productivity.</p><p>Thus, the correct sequence is 2-3-1-4-5. Hence, (a) is the correct answer.</p>",

  },
