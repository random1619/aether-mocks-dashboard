<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../../css/mock-main.css">

<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If \"+\" means multiplication, \"-\" means addition, \"x\" means division, and \"&div;\" means subtraction, then find the value of:</p><p>18 + 6 x 3 - 4 &div; 7 = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; \"+\" &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2327;&#2369;&#2339;&#2366; &#2361;&#2376;, \"-\" &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2332;&#2379;&#2337;&#2364; &#2361;&#2376;, \"x\" &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2349;&#2366;&#2327; &#2361;&#2376;, &#2324;&#2352; \"&div;\" &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2328;&#2335;&#2366;&#2357; &#2361;&#2376;, &#2340;&#2379; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><p>18 + 6 x 3 - 4 &div; 7 = ?</p></span>",
    "options": [
      "<span class=\"eqt\">31</span><span class=\"hqt\" style=\"display:none\">31</span>",
      "<span class=\"eqt\">33</span><span class=\"hqt\" style=\"display:none\">33</span>",
      "<span class=\"eqt\">29</span><span class=\"hqt\" style=\"display:none\">29</span>",
      "<span class=\"eqt\">37</span><span class=\"hqt\" style=\"display:none\">37</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to the changed meanings,</p><p>18 + 6 x 3 - 4 &div; 7</p><p>= 18  X  6 &div; 3 + 4 - 7</p><p>= 108 &div; 3 + 4 - 7</p><p>= 36 + 4 - 7</p><p>= 40 - 7</p><p>= 33</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>What should come in place of the question mark?</p><p>GP, IN, KL, MJ, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; &#2325;&#2368; &#2332;&#2327;&#2361; &#2325;&#2381;&#2351;&#2366; &#2310;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>GP, IN, KL, MJ, ?</p></span>",
    "options": [
      "<span class=\"eqt\">NF</span><span class=\"hqt\" style=\"display:none\">NF</span>",
      "<span class=\"eqt\">OH</span><span class=\"hqt\" style=\"display:none\">OH</span>",
      "<span class=\"eqt\">PG</span><span class=\"hqt\" style=\"display:none\">PG</span>",
      "<span class=\"eqt\">QH</span><span class=\"hqt\" style=\"display:none\">QH</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>First letters are G, I, K, M</p><p>Their positions are 7, 9, 11, 13</p><p>Each time the increase is +2</p><p>So, the next first letter is O.</p><p>Second letters are P, N, L, J</p><p>Their positions are 16, 14, 12, 10</p><p>Each time the decrease is -2</p><p>So, the next second letter is H.</p><p>Hence, the next pair is OH.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>You detect a major discrepancy in an already circulated vendor statement. What is the proper response?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2346; &#2346;&#2361;&#2354;&#2375; &#2360;&#2375; &#2357;&#2367;&#2340;&#2352;&#2367;&#2340; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2357;&#2367;&#2357;&#2352;&#2339; &#2350;&#2375;&#2306; &#2319;&#2325; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2357;&#2367;&#2360;&#2306;&#2327;&#2340;&#2367; &#2325;&#2366; &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2313;&#2330;&#2367;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Assume the vendor will identify and correct it later</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2344; &#2354;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2311;&#2360;&#2375; &#2348;&#2366;&#2342; &#2350;&#2375;&#2306; &#2346;&#2361;&#2330;&#2366;&#2344;&#2325;&#2352; &#2360;&#2361;&#2368; &#2325;&#2352; &#2342;&#2375;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Keep silent because the statement has already gone out</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2369;&#2346; &#2352;&#2361;&#2375;&#2306; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2348;&#2351;&#2366;&#2344; &#2346;&#2361;&#2354;&#2375; &#2361;&#2368; &#2332;&#2366;&#2352;&#2368; &#2361;&#2379; &#2330;&#2369;&#2325;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Inform the vendor and send the corrected statement promptly</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2325;&#2379; &#2360;&#2370;&#2330;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2348;&#2351;&#2366;&#2344; &#2340;&#2369;&#2352;&#2306;&#2340; &#2349;&#2375;&#2332;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Say the accounts section caused the discrepancy entirely</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2361;&#2375;&#2306; &#2325;&#2367; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2326;&#2366;&#2340;&#2366; &#2309;&#2344;&#2369;&#2349;&#2366;&#2327; &#2344;&#2375; &#2309;&#2360;&#2306;&#2327;&#2340;&#2367; &#2346;&#2376;&#2342;&#2366; &#2325;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A major discrepancy in a circulated statement can mislead the receiving party.</p><p>The proper response is to disclose the error and issue the corrected statement quickly.</p><p>Option (1) is careless.</p><p>Option (2) ignores the problem.</p><p>Option (4) shifts blame instead of solving the issue.</p><p>Hence, option (3) is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Three audit briefings were conducted in Baripada, Balasore, and Bhadrak on Wednesday, Friday, and Sunday.</p><p>&#8226; Balasore was scheduled on neither Wednesday nor Sunday.</p><p>&#8226; Bhadrak was scheduled earlier than Baripada.</p><p>On which day was the audit briefing in Baripada conducted?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;, &#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;, &#2324;&#2352; &#2352;&#2357;&#2367;&#2357;&#2366;&#2352; &#2325;&#2379; &#2348;&#2366;&#2352;&#2367;&#2346;&#2342;&#2366;, &#2348;&#2366;&#2354;&#2366;&#2360;&#2379;&#2352;, &#2324;&#2352; &#2349;&#2342;&#2381;&#2352;&#2325; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2321;&#2337;&#2367;&#2335; &#2348;&#2381;&#2352;&#2368;&#2347;&#2367;&#2306;&#2327; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2368; &#2327;&#2312;&#2306;&#2404;</p><p>&#8226; &#2348;&#2366;&#2354;&#2366;&#2360;&#2379;&#2352; &#2344; &#2340;&#2379; &#2348;&#2369;&#2343;&#2357;&#2366;&#2352; &#2325;&#2379; &#2341;&#2366; &#2324;&#2352; &#2344; &#2361;&#2368; &#2352;&#2357;&#2367;&#2357;&#2366;&#2352; &#2325;&#2379;&#2404;</p><p>&#8226; &#2349;&#2342;&#2381;&#2352;&#2325; &#2348;&#2366;&#2352;&#2367;&#2346;&#2342;&#2366; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2341;&#2366;&#2404;</p><p>&#2348;&#2366;&#2352;&#2367;&#2346;&#2342;&#2366; &#2350;&#2375;&#2306; &#2321;&#2337;&#2367;&#2335; &#2348;&#2381;&#2352;&#2368;&#2347;&#2367;&#2306;&#2327; &#2325;&#2367;&#2360; &#2342;&#2367;&#2344; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Friday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Cannot be determined</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Balasore was scheduled on neither Wednesday nor Sunday.</p><p>Balasore = Friday</p><p>The remaining days are Wednesday and Sunday for Bhadrak and Baripada.</p><p>Bhadrak was scheduled earlier than Baripada.</p><p>Bhadrak = Wednesday</p><p>Balasore= Friday</p><p>Baripada = Sunday</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>On a seat-allotment strip, letters are arranged in the English alphabetical order. Which letter is 3rd to the right of the letter that is 4th to the left of X?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2368;&#2335;-&#2310;&#2357;&#2306;&#2335;&#2344; &#2346;&#2335;&#2381;&#2335;&#2368; &#2346;&#2352;, &#2309;&#2325;&#2381;&#2359;&#2352; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; X &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2330;&#2380;&#2341;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2340;&#2368;&#2360;&#2352;&#2366; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">V</span><span class=\"hqt\" style=\"display:none\">V</span>",
      "<span class=\"eqt\">W</span><span class=\"hqt\" style=\"display:none\">W</span>",
      "<span class=\"eqt\">U</span><span class=\"hqt\" style=\"display:none\">U</span>",
      "<span class=\"eqt\">Y</span><span class=\"hqt\" style=\"display:none\">Y</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>X is the 24th letter.</p><p>4th to the left of X:</p><p>X =&gt; W =&gt; V =&gt; U =&gt; T</p><p>So, the required intermediate letter is T.</p><p>Now move 3 places to the right of T.</p><p>T =&gt; U =&gt; V =&gt; W</p><p>Hence, the required letter is W.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statement and choose the option that follows.</p><p>Statement: The forest department has made RFID tagging compulsory for every elephant moved from one rehabilitation centre to another.</p><p>Inferences:</p><p>I. Every elephant transferred between rehabilitation centres must carry RFID tagging.</p><p>II. The department intends to track inter-centre movement of elephants more effectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2379; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344;: &#2357;&#2344; &#2357;&#2367;&#2349;&#2366;&#2327; &#2344;&#2375; &#2361;&#2352; &#2319;&#2325; &#2361;&#2366;&#2341;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2379; &#2319;&#2325; &#2346;&#2369;&#2344;&#2352;&#2381;&#2357;&#2366;&#2360; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2346;&#2369;&#2344;&#2352;&#2381;&#2357;&#2366;&#2360; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, RFID &#2335;&#2376;&#2327;&#2367;&#2306;&#2327; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352; &#2342;&#2368; &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>I. &#2361;&#2352; &#2357;&#2361; &#2361;&#2366;&#2341;&#2368; &#2332;&#2379; &#2346;&#2369;&#2344;&#2352;&#2381;&#2357;&#2366;&#2360; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2313;&#2360;&#2375; RFID &#2335;&#2376;&#2327;&#2367;&#2306;&#2327; &#2360;&#2366;&#2341; &#2354;&#2375;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368;&#2404;</p><p>II. &#2357;&#2367;&#2349;&#2366;&#2327; &#2361;&#2366;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2310;&#2357;&#2366;&#2332;&#2366;&#2361;&#2368; &#2325;&#2379; &#2309;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2335;&#2381;&#2352;&#2376;&#2325; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2311;&#2352;&#2366;&#2342;&#2366; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2370;&#2305;</span>",
      "<span class=\"eqt\">Only II follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both follow</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Neither follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The statement says RFID tagging has been made compulsory for every elephant moved between such centres.</p><p>So, inference I follows directly.</p><p>Making RFID tagging compulsory also reasonably indicates an intention to improve traceability of movement.</p><p>Therefore, inference II also follows.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If \"VOICE\" is coded as \"25 30 18 6 10\", what is \"AUDIO\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; \"VOICE\" &#2325;&#2379; \"25 30 18 6 10\" &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2340;&#2379; \"AUDIO\" &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">2 42 6 18 30</span><span class=\"hqt\" style=\"display:none\">2 42 6 18 30</span>",
      "<span class=\"eqt\">3 42 7 18 29</span><span class=\"hqt\" style=\"display:none\">3 42 7 18 29</span>",
      "<span class=\"eqt\">2 42 7 18 30</span><span class=\"hqt\" style=\"display:none\">2 42 7 18 30</span>",
      "<span class=\"eqt\">2 41 7 19 30</span><span class=\"hqt\" style=\"display:none\">2 41 7 19 30</span>"
    ],
    "correct_option_id": 2,

    "solution": "<p>In a significant development for Indian sports, the Kho Kho Federation of India (KKFI) has announced its newly elected Governing Body after successful elections held at its headquarters in New Delhi.</p><p>Sudhanshu Mittal has been re-elected as the President, while Upkar Singh Virk is the new General Secretary. The Governing Body also includes eight Vice Presidents, four Joint Secretaries, and 13 Executive Members. Athletes Ashwini Bipin Patil and Monika will represent the Athletes Commission.</p><p>Currently played in 58 countries, Kho Kho aims to expand to 90 nations this year.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about gharanas of Hindustani music:</p><p>a. The Gwalior gharana is regarded as the oldest gharana of Khayal singing.</p><p>b. The Patiala gharana is famous for its energetic and rhythmic vocal style.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2367;&#2306;&#2342;&#2369;&#2360;&#2381;&#2340;&#2366;&#2344;&#2368; &#2360;&#2306;&#2327;&#2368;&#2340; &#2325;&#2375; &#2328;&#2352;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2327;&#2381;&#2357;&#2366;&#2354;&#2367;&#2351;&#2352; &#2328;&#2352;&#2366;&#2344;&#2366; &#2326;&#2364;&#2351;&#2366;&#2354; &#2327;&#2366;&#2351;&#2344; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2346;&#2369;&#2352;&#2366;&#2344;&#2366; &#2328;&#2352;&#2366;&#2344;&#2366; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>b. &#2346;&#2335;&#2367;&#2351;&#2366;&#2354;&#2366; &#2328;&#2352;&#2366;&#2344;&#2366; &#2309;&#2346;&#2344;&#2368; &#2314;&#2352;&#2381;&#2332;&#2366;&#2357;&#2366;&#2344; &#2324;&#2352; &#2354;&#2351;&#2348;&#2342;&#2381;&#2343; &#2327;&#2366;&#2351;&#2344; &#2358;&#2376;&#2354;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">a only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">b only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Both a and b</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; b &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither a nor b</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; a &#2324;&#2352; &#2344; &#2361;&#2368; b</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements 'a' and 'b' are correct.</p><p>Explanation of Statements:</p><p>Statement a is correct: The <b>Gwalior gharana</b> is widely considered to be the oldest and most foundational of all the Khayal gharanas. It is often referred to as the \"Gangotri\" (the source of the Ganges) of Khayal singing, as many other gharanas can trace their stylistic origins back to it. Its singing style is known for its clarity, simplicity, and a well-balanced approach to melody and rhythm.</p><p>Statement b is correct: The <b>Patiala gharana</b> is renowned for its highly virtuosic, energetic, and rhythmically complex style of singing. It is characterized by the use of powerful taans (fast melodic passages), intricate laykari (rhythmic interplay), and a strong emphasis on emotional expression. Ustad Bade Ghulam Ali Khan is the most celebrated exponent of this gharana.</p><p><b>Further insights:</b></p><p>A <b>gharana</b> in Hindustani classical music is a system of social organization linking musicians or dancers by lineage or apprenticeship, and by adherence to a particular musical style.</p><p>Other major vocal gharanas include the Agra gharana (known for its powerful and robust style), the Kirana gharana (known for its focus on melody and emotional depth), and the Jaipur-Atrauli gharana (known for its complex and intellectual approach to raga structure).</p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct?</p><p>I. Zoji La, at about 3,500 m, lies on the Srinagar-Kargil-Leh corridor and provides a key passage across the Great Himalaya between the Kashmir Valley and the Dras-Ladakh region.</p><p>II. Nathu La is an Indo-China pass in Sikkim connecting to the Chumbi Valley and is located on the Srinagar-Leh axis.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2354;&#2327;&#2349;&#2327; 3,500 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2332;&#2364;&#2379;&#2332;&#2368; &#2354;&#2366;, &#2358;&#2381;&#2352;&#2368;&#2344;&#2327;&#2352;-&#2325;&#2366;&#2352;&#2327;&#2367;&#2354;-&#2354;&#2375;&#2361; &#2327;&#2354;&#2367;&#2351;&#2366;&#2352;&#2375; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2325;&#2358;&#2381;&#2350;&#2368;&#2352; &#2328;&#2366;&#2335;&#2368; &#2324;&#2352; &#2342;&#2381;&#2352;&#2366;&#2360;-&#2354;&#2342;&#2381;&#2342;&#2366;&#2326; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2361;&#2366;&#2344; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2350;&#2366;&#2352;&#2381;&#2327; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2344;&#2366;&#2341;&#2370; &#2354;&#2366; &#2360;&#2367;&#2325;&#2381;&#2325;&#2367;&#2350; &#2350;&#2375;&#2306; &#2319;&#2325; &#2349;&#2366;&#2352;&#2340;-&#2330;&#2368;&#2344; &#2342;&#2352;&#2381;&#2352;&#2366; &#2361;&#2376; &#2332;&#2379; &#2330;&#2369;&#2350;&#2381;&#2348;&#2368; &#2328;&#2366;&#2335;&#2368; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2358;&#2381;&#2352;&#2368;&#2344;&#2327;&#2352;-&#2354;&#2375;&#2361; &#2309;&#2325;&#2381;&#2359; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only Statement 1</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 1</span>",
      "<span class=\"eqt\">Only Statement 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 2</span>",
      "<span class=\"eqt\">Both Statements 1 and 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither Statement 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2325;&#2341;&#2344; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 2 is incorrect - Nathu La is in Sikkim (far east), not on the Srinagar-Leh axis.</p><p></p><p>\"Zoji La\" (about 3,500 m) lies on the Srinagar - Kargil - Leh corridor, providing the key passage across the Great Himalaya between the Kashmir Valley and the Dras - Ladakh region. It is strategically vital and subject to winter closures due to heavy snowfall.</p><p>- \"Rohtang La:\" Connects Kullu Valley with Lahaul - Spiti (Himachal Pradesh); lies on the Manali - Keylong route.</p><p>- \"Shipki La:\" Indo - China pass in Himachal Pradesh on the Sutlej; not on the Srinagar - Leh axis.</p><p>- \"Nathu La:\" Indo - China pass in Sikkim connecting to the Chumbi Valley; far to the east of Kashmir - Ladakh.</p><p>Further Insights:</p><p>- The Zojila Tunnel project aims to provide all-weather connectivity to Ladakh.</p><p>- Khardung La, north of Leh, connects the Indus Valley to the Nubra - Shyok region.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about 'Ahmadiyya Movement'.</p><p>I. It was a liberal Islamic movement based on the principles of the universal religion of all humanity.</p><p>II. It was founded by Sir Syed Ahmed Khan.</p><p>Select the CORRECT statements using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2309;&#2361;&#2350;&#2342;&#2367;&#2351;&#2366; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;' &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2351;&#2361; &#2360;&#2350;&#2360;&#2381;&#2340; &#2350;&#2366;&#2344;&#2357;&#2340;&#2366; &#2325;&#2375; &#2360;&#2366;&#2352;&#2381;&#2357;&#2349;&#2380;&#2350;&#2367;&#2325; &#2343;&#2352;&#2381;&#2350; &#2325;&#2375; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;&#2379;&#2306; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2319;&#2325; &#2313;&#2342;&#2366;&#2352; &#2311;&#2360;&#2381;&#2354;&#2366;&#2350;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2341;&#2366;&#2404;</p><p>II. &#2311;&#2360;&#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2360;&#2352; &#2360;&#2376;&#2351;&#2342; &#2309;&#2361;&#2350;&#2342; &#2326;&#2366;&#2344; &#2344;&#2375; &#2325;&#2368; &#2341;&#2368;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2370;&#2335; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Ahmadiyya forms a sect of Islam which originated from India. It was founded by <b> Mirza Ghulam Ahmad </b> in 1889. So, statement II is INCORRECT.</p><p>It was based on liberal principles. It described itself as the standard-bearer of Mohammedan Renaissance, and based itself, like the Brahmo Samaj, on the principles of the universal religion of all humanity, opposing jihad (sacred war against non-Muslims). So, statement I is correct. The movement spread Western liberal education among the Indian Muslims.</p><p></p>",

    "question": "<span class=\"eqt\"><p>Which of the following is not a member of noble gases in the Periodic table?</p><p>a. He</p><p>b. H</p><p>c. Xe</p><p>Choose the correct options.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2325;&#2371;&#2359;&#2381;&#2335; &#2327;&#2376;&#2360;&#2379;&#2306; &#2325;&#2366; &#2360;&#2342;&#2360;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p><p>a. He</p><p>b. H</p><p>c. Xe</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">a and b</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">b and c</span><span class=\"hqt\" style=\"display:none\">b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; H (Hydrogen) is not part of the group 18 (the Noble gases)</p><p>Further Insight:</p><p>&bull; <b>Members of Group 18 (Noble Gases)</b></p><p>&#9675; Helium (He)</p><p>&#9632; Common Uses:</p><p>&bull; Filling balloons due to its low density and non-flammability.</p><p>&bull; Cooling superconductor magnets in MRI machines.</p><p>&#9675; Neon (Ne)</p><p>&#9632; Common Uses:</p><p>&bull; Lighting in neon signs.</p><p>&bull; High-voltage indicators and gas lasers.</p><p>&#9675; Argon (Ar)</p><p>&#9632; Common Uses:</p><p>&bull; Shielding gas in arc welding to protect molten metal from oxidation.</p><p>&bull; Filling incandescent light bulbs to prevent filament degradation.</p><p>&#9675; Krypton (Kr)</p><p>&#9632; Common Uses:</p><p>&bull; Used in certain types of photographic flashes and high-performance light bulbs.</p><p>&bull; Insulating windows as part of gas-filled panes.</p><p>&#9675; Xenon (Xe)</p><p>&#9632; Common Uses:</p><p>&bull; In light sources for flash lamps and high-intensity discharge lamps.</p><p>&bull; Anesthesia in medical settings due to its anesthetic properties.</p><p>&#9675; Radon (Rn)</p><p>&#9632; Common Uses:</p><p>&bull; Limited use in radiation therapy for cancer treatment.</p><p>&bull; Research in nuclear physics and geochemistry.</p>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>Which mission is a joint collaboration between ISRO and NASA, aimed at Earth observation using dual-band Synthetic Aperture Radar to monitor surface changes and natural disasters?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2367;&#2358;&#2344; &#2311;&#2360;&#2352;&#2379; &#2324;&#2352; &#2344;&#2366;&#2360;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2361;&#2351;&#2379;&#2327; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2360;&#2340;&#2361; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2324;&#2352; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2310;&#2346;&#2342;&#2366;&#2323;&#2306; &#2325;&#2368; &#2344;&#2367;&#2327;&#2352;&#2366;&#2344;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2379;&#2361;&#2352;&#2375; &#2348;&#2376;&#2306;&#2337; &#2360;&#2367;&#2306;&#2341;&#2375;&#2335;&#2367;&#2325; &#2319;&#2346;&#2352;&#2381;&#2330;&#2352; &#2352;&#2337;&#2366;&#2352; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2366; &#2309;&#2357;&#2354;&#2379;&#2325;&#2344; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Aditya-L1</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2342;&#2367;&#2340;&#2381;&#2351;-&#2319;&#2354;1</span>",
      "<span class=\"eqt\">Chandrayaan-1</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2306;&#2342;&#2381;&#2352;&#2351;&#2366;&#2344;-1</span>",
      "<span class=\"eqt\">NISAR Mission</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2360;&#2366;&#2352; &#2350;&#2367;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Mars Orbiter Mission</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354; &#2321;&#2352;&#2381;&#2348;&#2367;&#2335;&#2352; &#2350;&#2367;&#2358;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The NISAR mission is the correct answer. The name itself is an acronym for NASA-ISRO Synthetic Aperture Radar, highlighting the collaboration and the key technology of the mission.</p><p>Explanation of Options:</p><p>a) Aditya-L1: This is ISRO's dedicated mission to study the Sun. It is not a collaboration with NASA for Earth observation.</p><p>b) Chandrayaan-1: This was ISRO's first lunar probe, launched in 2008. While it carried an instrument from NASA (the Moon Mineralogy Mapper, which famously discovered water molecules on the Moon), its primary objective was lunar science, not Earth observation using SAR.</p><p>c) NISAR (NASA-ISRO Synthetic Aperture Radar): This is the correct answer. NISAR is a major collaborative Earth observation satellite being jointly developed by the National Aeronautics and Space Administration (NASA) and the Indian Space Research Organisation (ISRO). Its primary goal is to use advanced radar imaging to measure changes in Earth's ecosystems, ice mass, vegetation, sea level rise, and natural hazards like earthquakes, tsunamis, and volcanoes.</p><p>d) Mars Orbiter Mission (Mangalyaan): This was ISRO's first interplanetary mission to Mars. It was an indigenous mission, not a joint collaboration with NASA for this specific purpose.</p><p>Further insights:</p><p>Dual-Band Radar: NISAR is unique because it will be the first satellite to use two different radar frequencies (L-band and S-band) to measure changes in our planet's surface. NASA is providing the L-band SAR, while ISRO is providing the S-band SAR and the spacecraft bus.</p><p>Scientific Goals: By repeatedly imaging the Earth's surface with high resolution, NISAR will provide unprecedented data on land surface deformation, ice sheet collapse, and ecosystem changes, which are crucial for understanding climate change and managing disasters.</p><p>The mission is scheduled for launch from India, and it represents a significant milestone in the partnership between the two space agencies.</p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>Arrange the following states in descending order of number of districts as per Census, 2011.</p><p>A. Uttar Pradesh</p><p>B. Madhya Pradesh</p><p>C. Maharashtra</p></span><span class=\"hqt\" style=\"display:none\"><p>2011 &#2325;&#2368; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2332;&#2367;&#2354;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2309;&#2357;&#2352;&#2379;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>A. &#2313;&#2340;&#2381;&#2340;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</p><p>B. &#2350;&#2343;&#2381;&#2351; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</p><p>C. &#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;</p></span>",
    "options": [
      "<span class=\"eqt\">B,A,C</span><span class=\"hqt\" style=\"display:none\">B,A,C</span>",
      "<span class=\"eqt\">A,B,C</span><span class=\"hqt\" style=\"display:none\">A,B,C</span>",
      "<span class=\"eqt\">C,B,A</span><span class=\"hqt\" style=\"display:none\">C,B,A</span>",
      "<span class=\"eqt\">A,C,B</span><span class=\"hqt\" style=\"display:none\">A,C,B</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct descending order of the states based on the number of districts they had at the time of the 2011 Census is Uttar Pradesh, followed by Madhya Pradesh, and then Maharashtra. This corresponds to the sequence A, B, C.</p><p>Explanation of the order:</p><p>According to the Census of India 2011, the number of districts in each of these states was as follows:</p><p>A) Uttar Pradesh: 71 districts</p><p>B) Madhya Pradesh: 50 districts</p><p>C) Maharashtra: 35 districts</p><p>Arranging these numbers in descending order (from largest to smallest) gives:</p><p>71 (Uttar Pradesh) > 50 (Madhya Pradesh) > 35 (Maharashtra)</p><p>Therefore, the correct sequence is A, B, C.</p><p>Further insights:</p><p>The number of districts in states is not static and changes over time as new districts are created for administrative convenience. For instance, since the 2011 Census:</p><p>Uttar Pradesh has created new districts, bringing its total to 75.</p><p>Madhya Pradesh has also added new districts, and its total is now over 50.</p><p>Maharashtra created the Palghar district in 2014, increasing its total to 36.</p><p>However, for questions specifying a particular census year, the data from that specific year must be used.</p>",
    "question_index": 32
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct?</p><p>I. Faraday's Law of Electromagnetic Induction states that a changing magnetic field induces an electromotive force (emf) in a closed circuit.</p><p>II. Lenz's Law determines the magnitude of the induced emf in a circuit</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2347;&#2376;&#2352;&#2366;&#2337;&#2375; &#2325;&#2366; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2330;&#2369;&#2350;&#2381;&#2348;&#2325;&#2368;&#2351; &#2346;&#2381;&#2352;&#2375;&#2352;&#2339; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350; &#2348;&#2340;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2319;&#2325; &#2348;&#2342;&#2354;&#2340;&#2366; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2319;&#2325; &#2348;&#2306;&#2342; &#2346;&#2352;&#2367;&#2346;&#2341; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340;-&#2358;&#2325;&#2381;&#2340;&#2367; (emf) &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2354;&#2375;&#2306;&#2332; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350; &#2319;&#2325; &#2346;&#2352;&#2367;&#2346;&#2341; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; emf &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2339; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only Statement 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 2</span>",
      "<span class=\"eqt\">Only Statement 1</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 1</span>",
      "<span class=\"eqt\">Both Statements 1 and 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither Statement 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2325;&#2341;&#2344; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement I is Correct.</p><p>This is the essence of Faradays Law - whenever the magnetic flux linked with a circuit changes, an emf (and hence a current, if the circuit is closed) is induced. The magnitude of the induced emf is proportional to the rate of change of magnetic flux.</p><p>Statement II is incorrect.</p><p>Lenz's Law does not determine the magnitude; it gives the direction of the induced emf or current. It states that the direction of induced current is such that it opposes the change in magnetic flux that produced it.</p>",
    "question_index": 33
  },

    "question": "<span class=\"eqt\"><p>Examine the following statements about the Kerala mural traditions:</p><p>I. The Kerala mural tradition, which flourished from the 16th to 18th centuries, was influenced by performing arts like Kathakali and ritual floor painting (kalam ezhuthu).</p><p>II. A defining characteristic of Kerala murals is the use of vibrant colours to represent human figures in a flat, two-dimensional style.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2352;&#2354; &#2349;&#2367;&#2340;&#2381;&#2340;&#2367; &#2330;&#2367;&#2340;&#2381;&#2352; &#2346;&#2352;&#2306;&#2346;&#2352;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2368; &#2332;&#2366;&#2305;&#2330; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2325;&#2375;&#2352;&#2354; &#2349;&#2367;&#2340;&#2381;&#2340;&#2367; &#2330;&#2367;&#2340;&#2381;&#2352; &#2346;&#2352;&#2306;&#2346;&#2352;&#2366;, &#2332;&#2379; 16&#2357;&#2368;&#2306; &#2360;&#2375; 18&#2357;&#2368;&#2306; &#2358;&#2340;&#2366;&#2348;&#2381;&#2342;&#2368; &#2340;&#2325; &#2347;&#2354;&#2368;-&#2347;&#2370;&#2354;&#2368;, &#2325;&#2341;&#2325;&#2354;&#2368; &#2332;&#2376;&#2360;&#2368; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2354;&#2366;&#2323;&#2306; &#2324;&#2352; &#2309;&#2344;&#2369;&#2359;&#2381;&#2336;&#2366;&#2344;&#2367;&#2325; &#2347;&#2352;&#2381;&#2358; &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2354;&#2366; (&#2325;&#2354;&#2350; &#2319;&#2333;&#2369;&#2341;&#2369;) &#2360;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2341;&#2368;&#2404;</p><p>II. &#2325;&#2375;&#2352;&#2354; &#2349;&#2367;&#2340;&#2381;&#2340;&#2367; &#2330;&#2367;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;, &#2360;&#2346;&#2366;&#2335;, &#2342;&#2381;&#2357;&#2367;-&#2310;&#2351;&#2366;&#2350;&#2368; &#2358;&#2376;&#2354;&#2368; &#2350;&#2375;&#2306; &#2350;&#2366;&#2344;&#2357; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2368;&#2357;&#2306;&#2340; &#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Only statement I is correct.</p><p>Statement I is correct: The Kerala mural tradition, in its mature phase from the 16th to 18th centuries, developed a unique pictorial language. This style was heavily influenced by the region's contemporary performing arts. The stylized figures, elaborate expressions, and postures in the murals draw heavily from the dance-drama form of Kathakali. Similarly, the tradition of using vibrant natural pigments and outlining figures is derived from the ritualistic floor painting known as kalam ezhuthu.</p><p>Statement II is incorrect: While Kerala murals are known for their vibrant and luminous colors (using a traditional palette called panchavarna), they do not represent figures in a flat, two-dimensional style. A key characteristic of this art form is its attempt to create a sense of depth and volume, representing human figures in a stylized but three-dimensional manner through careful shading and contouring. The figures are typically depicted with a sculptural quality.</p><p>Further insights:</p><p>The themes of Kerala murals are predominantly based on Hindu mythology, with episodes from the Ramayana, Mahabharata, and the Puranas being popular subjects.</p><p>Famous examples of these murals can be found in temples and palaces across Kerala, such as the Padmanabhaswamy Temple in Thiruvananthapuram and the Mattancherry Palace in Kochi.</p>",
    "question_index": 34
  },

    "question": "<span class=\"eqt\"><p>With reference to the characteristics of the Kathak dance form, consider the following statements:</p><p>I. The technique emphasizes a straight body posture without sharp bends or curves, and torso movements originate from the shoulder line rather than the spine.</p><p>II. A performance commences with a sequence called 'That', which involves soft gliding movements, followed by a formal entry known as 'Amad'.</p><p>III. Pirouettes are a characteristic feature of the pure dance (nritta) portions, which are performed to a repetitive melodic line called a nagma.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2341;&#2325; &#2344;&#2371;&#2340;&#2381;&#2351; &#2358;&#2376;&#2354;&#2368; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2351;&#2361; &#2340;&#2325;&#2344;&#2368;&#2325; &#2348;&#2367;&#2344;&#2366; &#2325;&#2367;&#2360;&#2368; &#2340;&#2368;&#2326;&#2375; &#2350;&#2379;&#2337;&#2364; &#2351;&#2366; &#2328;&#2369;&#2350;&#2366;&#2357; &#2325;&#2375; &#2360;&#2368;&#2343;&#2375; &#2358;&#2352;&#2368;&#2352; &#2325;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2346;&#2352; &#2332;&#2379;&#2352; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;, &#2324;&#2352; &#2343;&#2337;&#2364; &#2325;&#2368; &#2327;&#2340;&#2367; &#2352;&#2368;&#2338;&#2364; &#2325;&#2368; &#2348;&#2332;&#2366;&#2351; &#2325;&#2306;&#2343;&#2375; &#2325;&#2368; &#2352;&#2375;&#2326;&#2366; &#2360;&#2375; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2319;&#2325; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; '&#2341;&#2366;&#2335;' &#2344;&#2366;&#2350;&#2325; &#2319;&#2325; &#2309;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350; &#2325;&#2375; &#2360;&#2366;&#2341; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2344;&#2352;&#2350; &#2327;&#2381;&#2354;&#2366;&#2311;&#2337;&#2367;&#2306;&#2327; &#2350;&#2370;&#2357;&#2350;&#2375;&#2306;&#2335; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2311;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2319;&#2325; &#2324;&#2346;&#2330;&#2366;&#2352;&#2367;&#2325; &#2346;&#2381;&#2352;&#2357;&#2367;&#2359;&#2381;&#2335;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; '&#2310;&#2350;&#2342;' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2346;&#2367;&#2352;&#2380;&#2319;&#2335; &#2358;&#2369;&#2342;&#2381;&#2343; &#2344;&#2371;&#2340;&#2381;&#2351; (&#2344;&#2371;&#2340;&#2381;&#2340;) &#2349;&#2366;&#2327;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2344;&#2327;&#2350;&#2366; &#2344;&#2366;&#2350;&#2325; &#2319;&#2325; &#2342;&#2379;&#2361;&#2352;&#2366;&#2357;&#2342;&#2366;&#2352; &#2350;&#2343;&#2369;&#2352; &#2352;&#2375;&#2326;&#2366; &#2346;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I,II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The weight of the body is equally distributed along the horizontal and vertical axis. The full foot contact is of prime importance where only the toe or the ball of the foot are used, their function is limited.</p><p><b>There are no deflections and no use of sharp bends or curves of the upper or lower part of the body. Torso movements emerge from the change of the shoulder line rather than through the manipulations of the backbone or upper chest and lower waist muscles.</b></p><p>In the basic stance, the dancer stands straight, holds one hand at a level higher than the head and the other is extended out on the level of the shoulder.</p><p>The technique is built by the use of an intricate system of foot-work. Pure dance (nritta) is all important where complex rhythmic patterns are created through the use of the flat feet and the control of sound of the ankle bells worn by the dancer.</p><p>As in Bharatnatyam, Odissi and Manipuri, Kathak also builds its pure dance sequences by combining units of movement. The cadences are called differently by the names tukra, tora, and parana, all indicative of the nature of rhythmic patterns used and the percussion instrument accompanying the dance.</p><p><b>The dancer commences with a sequence called That where soft gliding movements of the neck, eyebrows and the wrists, are introduced. This is followed by a conventional formal entry known as the Amad (entry) and theSalami (salutation).</b></p><p>Then follow the various combinations of rhythmic passages all punctuated with and culminating in a number of pirouettes.</p><p><b>The pirouettes are the most characteristic feature of the dance style in nritta portions.</b></p><p>Recitation of the rhythmic syllables is common; the dancer often pauses to recite these to a specified metrical cycle followed by execution through movement.</p><p><b>The nritta portion of Kathak is performed to the nagma.</b> Both the drummer (here the drum is either a pakhawaj, a type of mridangam, or a pair of tabla) and the dancer weave endless combinations on a repetitive melodic line.</p><p>The metrical cycle (tala) of 16, 10, 14 beats provides the foundation on which the whole edifice of dance is built.</p>",
    "question_index": 35
  },

    "question": "<span class=\"eqt\"><p>Consider the following Statements:</p><p>I. The amount of energy always increases from one trophic level to another.</p><p>II. The biomass of an organism gradually decreases from producer to consumer level in all ecosystems.</p><p>III. Pyramid of numbers is both upright and inverted depending upon the ecosystem.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2361;&#2350;&#2375;&#2358;&#2366; &#2319;&#2325; &#2335;&#2381;&#2352;&#2377;&#2347;&#2367;&#2325; &#2360;&#2381;&#2340;&#2352; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2350;&#2375;&#2306; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2360;&#2349;&#2368; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2340;&#2306;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2332;&#2368;&#2357; &#2325;&#2366; &#2348;&#2366;&#2351;&#2379;&#2350;&#2366;&#2360; &#2343;&#2368;&#2352;&#2375;-&#2343;&#2368;&#2352;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325; &#2360;&#2375; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366; &#2360;&#2381;&#2340;&#2352; &#2340;&#2325; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2360;&#2368;&#2343;&#2366; &#2324;&#2352; &#2313;&#2354;&#2381;&#2335;&#2366; &#2342;&#2379;&#2344;&#2379;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement I is incorrect:</p><p>The will be some loss of energy in the form of unusable heat at each trophic level so that energy level decreases from 1<sup>st</sup> to 2<sup>nd</sup> trophic levels.</p><p>Statement II is incorrect:</p><p>The pyramid of biomass will gradually decrease but in the aquatic ecosystem it will increase from producer to higher trophic levels (Carnivores)</p><p>Statement III is correct:</p><p>The pyramid of the number will be upright for the grassland ecosystem and Inverted among Parasites.</p><p>Source: NCERT</p>",
    "question_index": 36

    "question": "<span class=\"eqt\"><p>Select the most appropriate answer from the options given below regarding Charcot-Marie-Tooth (CMT) disease.</p><p>Statement 1. Charcot-Marie-Tooth disease is a hereditary neurological disorder that affects the peripheral nerves.</p><p>Statement 2. It is commonly caused by duplication of the peripheral myelin protein-22 (PMP22) gene located on chromosome 17.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2366;&#2352;&#2325;&#2379;&#2335;-&#2350;&#2376;&#2352;&#2368;-&#2335;&#2370;&#2341; (&#2360;&#2368;&#2319;&#2350;&#2335;&#2368;) &#2352;&#2379;&#2327; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2348;&#2360;&#2375; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 1. &#2330;&#2366;&#2352;&#2325;&#2379;&#2335;-&#2350;&#2376;&#2352;&#2368;-&#2335;&#2370;&#2341; &#2352;&#2379;&#2327; &#2319;&#2325; &#2357;&#2306;&#2358;&#2366;&#2344;&#2369;&#2327;&#2340; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343;&#2368; &#2357;&#2367;&#2325;&#2366;&#2352; &#2361;&#2376; &#2332;&#2379; &#2346;&#2352;&#2367;&#2343;&#2368;&#2351; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2. &#2351;&#2361; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2327;&#2369;&#2339;&#2360;&#2370;&#2340;&#2381;&#2352; 17 &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2346;&#2352;&#2367;&#2343;&#2368;&#2351; &#2350;&#2366;&#2311;&#2354;&#2367;&#2344; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344;-22 (&#2346;&#2368;&#2319;&#2350;&#2346;&#2368;22) &#2332;&#2368;&#2344; &#2325;&#2375; &#2342;&#2379;&#2361;&#2352;&#2366;&#2357; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",

      "<span class=\"eqt\">Both statements 1 and 2 are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only statement 1 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 1 &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only statement 2 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 2 &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both statements 1 and 2 are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>CMT is one of the most common inherited neurological disorders, leading to muscle weakness and sensory loss. The most frequent cause is duplication of the PMP22 gene on chromosome 17, which disrupts normal myelin formation in peripheral nerves.</p>",

    "question": "<span class=\"eqt\"><p>Read the below statements marked as Assertion (A) and Reason (R). Mark the correct options:</p><p>Assertion (A): India secured the 99th rank on the Sustainable Development Report 2025 (SDG Index) with a score of around 67.</p><p>Reason (R): The improvement in rank was mainly because India significantly increased its score in health- and education-related SDG targets compared to previous years.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A) &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; (R) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2325;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2354;&#2327;&#2349;&#2327; 67 &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2340;&#2340; &#2357;&#2367;&#2325;&#2366;&#2360; &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335; 2025 (SDG &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325;) &#2350;&#2375;&#2306; 99&#2357;&#2368;&#2306; &#2352;&#2376;&#2306;&#2325; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2368;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2352;&#2376;&#2306;&#2325; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2311;&#2360;&#2354;&#2367;&#2319; &#2361;&#2369;&#2310; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2346;&#2367;&#2331;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2324;&#2352; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343;&#2368; SDG &#2354;&#2325;&#2381;&#2359;&#2381;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2375; &#2360;&#2381;&#2325;&#2379;&#2352; &#2350;&#2375;&#2306; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326;&#2344;&#2368;&#2351; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2340;&#2341;&#2366; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, but R is false.</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true.</span><span class=\"hqt\" style=\"display:none\">A &#2327;&#2354;&#2340; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"

    "solution": "<p>Reason R is not fully correct. While India's ranking improved, the report highlights India continues to show weak performance in SDG 2 (Zero Hunger), SDG 4 (Quality Education), and SDG 16 (Peace, Justice and Strong Institutions).</p><p>India ranked among the top 100 nations out of 167 countries for its progress in achieving the Sustainable Development Goals (SDGs), citing UN Sustainable Development Solutions Network's 10th and latest Sustainable Development Report (SDR) published on 24 June 2025.</p><p>India has secured the 99th spot on the 2025 SDG Index with a score of 67.</p><p>India has made measurable progress in eradicating poverty (SDG 1), expanding affordable energy access (SDG 7), and strengthening industrial and digital infrastructure (SDG 9). For example:</p><p>Poverty rate fell from 22% (2012, NSSO) to ~12% (2023, World Bank).</p><p>Near-universal household electrification achieved with record renewable expansion (India is 4th globally in renewable capacity).</p><p>Strong digital infrastructure through UPI and mobile penetration boosted financial inclusion.</p><p>These developments directly explain India's strong performance in these SDGs.</p><p>India's weak performance in these SDGs is supported by data:</p><p>SDG 2 (Zero Hunger): 35.5% of children under five are stunted (NFHS-5, 2019-21).</p><p>SDG 4 (Quality Education): Learning inequality persists - digital divide widened post-COVID-19 between rural and urban learners.</p><p>SDG 16 (Peace, Justice & Strong Institutions): India continues to rank low in global indices on press freedom and governance quality.</p><p></p>",
    "question_index": 39
  },

    "question": "<span class=\"eqt\"><p>With reference to the Brahmaputra, consider:</p><p>i. In Tibet it is known as the Yarlung Tsangpo.</p><p>ii. It enters India as the Siang/Dihang in Arunachal Pradesh.</p><p>iii. Subansiri is the largest south-bank tributary of the Brahmaputra.</p><p>Which of the statements given above is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2346;&#2369;&#2340;&#2381;&#2352; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. &#2340;&#2367;&#2348;&#2381;&#2348;&#2340; &#2350;&#2375;&#2306; &#2311;&#2360;&#2375; &#2351;&#2366;&#2352;&#2354;&#2369;&#2306;&#2327; &#2340;&#2381;&#2360;&#2366;&#2306;&#2327;&#2346;&#2379; &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>ii. &#2351;&#2361; &#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2360;&#2367;&#2351;&#2366;&#2306;&#2327;/&#2342;&#2367;&#2361;&#2366;&#2306;&#2327; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>iii. &#2360;&#2369;&#2348;&#2344;&#2360;&#2367;&#2352;&#2368; &#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2346;&#2369;&#2340;&#2381;&#2352; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2340;&#2335;&#2368;&#2351; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">ii and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i and ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statements i and ii are correct, while statement iii is incorrect. The river is called Yarlung Tsangpo in Tibet and enters India as the Siang/Dihang. However, the Subansiri is a north-bank tributary, not a south-bank one.</p><p>Explanation of Statements:</p><p>i is Correct. The Brahmaputra river originates from the Chemayungdung Glacier in the Kailash Range, near Mansarovar Lake in Tibet. In Tibet, where it flows eastward for about 1,200 km, it is known as the Yarlung Tsangpo.</p><p>ii is Correct. After its long journey across the Tibetan plateau, the river makes a dramatic hairpin bend around the Namcha Barwa peak and enters India through a deep gorge in the state of Arunachal Pradesh. In this mountainous region, it is known as the Siang or Dihang.</p><p>iii is Incorrect. The Subansiri is indeed the largest tributary of the Brahmaputra in terms of water volume. However, it originates in the Himalayas to the north and flows south to join the Brahmaputra. Therefore, it is a north-bank (or right-bank) tributary, not a south-bank tributary. The largest south-bank (or left-bank) tributary is the Dhansiri.</p><p>Further insights:</p><p>The river is only called the Brahmaputra after it is joined by its two major tributaries, the Dibang and the Lohit, as it enters the plains of Assam.</p><p>In Bangladesh, the river splits into two main branches. The main branch is known as the Jamuna, which joins the Ganga (known as the Padma in Bangladesh).</p><p>The Brahmaputra is a unique river, known for its massive discharge, tendency to form river islands (like Majuli, the world's largest river island), and causing devastating floods during the monsoon season.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about <b>GDP Deflator</b>.</p><p>I. It is the ratio of the value of goods and services an economy produces in a particular year at base prices to that of prevailing prices.</p><p>II. The nominal GDP is often higher than the Real GDP in a contracting economy.</p><p>Which of the above statement(s) is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2337;&#2367;&#2347;&#2381;&#2354;&#2375;&#2335;&#2352;</b> &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2351;&#2361; &#2325;&#2367;&#2360;&#2368; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2310;&#2343;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351;&#2379;&#2306; &#2346;&#2352; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2366; &#2346;&#2381;&#2352;&#2330;&#2354;&#2367;&#2340; &#2325;&#2368;&#2350;&#2340;&#2379;&#2306; &#2360;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2361;&#2376;&#2404;</p><p>II. &#2319;&#2325; &#2360;&#2306;&#2325;&#2369;&#2330;&#2367;&#2340; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2344;&#2366;&#2350;&#2350;&#2366;&#2340;&#2381;&#2352; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2309;&#2325;&#2381;&#2360;&#2352; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>It is a measure of general price inflation. GDP price deflator measures the difference between real GDP and nominal GDP. Nominal GDP is GDP evaluated at current market prices. Nominal GDP differs from real GDP as the former doesn't include inflation, while the latter does. As a result, nominal GDP will most often be higher than real GDP in an <b>expanding economy</b>. <b>Hence, Statement 2 is incorrect</b>.</p><p>GDP price deflator = (nominal GDP &div; real GDP) x 100</p><p>It is a much broader and comprehensive measure of inflation than CPI and WPI as it reflects the prices of all domestically produced goods and services in the economy whereas, CPI is based only a basket of select goods and is calculated on prices included in it, it does not capture inflation across the economy as a whole. WPI does not include services sector.</p><p></p>",
    "question_index": 41
  },
  {

57;&#2352;&#2381;&#2350;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2346;&#2352;&#2367;&#2306;&#2342;&#2375;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2309;&#2352;&#2369;&#2339; &#2325;&#2379;&#2354;&#2335;&#2325;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2325;&#2381;&#2352;&#2366;&#2312;, &#2342; &#2346;&#2368;&#2325;&#2377;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2309;&#2344;&#2368;&#2340;&#2366; &#2342;&#2375;&#2360;&#2366;&#2312;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2332;&#2375;&#2332;&#2369;&#2352;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2325;&#2350;&#2354;&#2366; &#2342;&#2366;&#2360;</td></tr></table></p></span>",
    "options": [

    "solution": "<p>Summer in Calcutta by Kamala Das:</p><p>Summer in Calcutta (1965) is a seminal collection of poetry by Kamala Das (also known as Kamala Surayya). The collection is celebrated for its confessional style, intense honesty, and bold exploration of female sexuality, love, and longing, which was groundbreaking for its time in Indian English literature.</p><p>Parinde by Nirmal Verma:</p><p>Parinde (Birds), a 1960 collection of short stories by Nirmal Verma, is considered a landmark in Hindi literature. It is credited with pioneering the 'Nai Kahani' (New Story) movement, which moved away from traditional storytelling to focus on the inner lives, alienation, and existential angst of modern individuals.</p><p>Cry, the Peacock by Anita Desai:</p><p>This was the debut novel of Anita Desai, published in 1963. A classic of Indian psychological fiction, the novel delves into the fractured psyche of its protagonist, Maya, exploring themes of marital discord, loneliness, and obsession. It established Desai as a powerful voice in Indian English fiction.</p><p>Jejuri by Arun Kolatkar:</p><p>Jejuri (1976) is an iconic collection of poems by the bilingual poet Arun Kolatkar. Written in English, the sequence of poems chronicles a visit to the pilgrimage town of Jejuri in Maharashtra. The work is lauded for its modernist sensibility, detached observational tone, and the way it juxtaposes faith and skepticism. It won the Commonwealth Poetry Prize in 1977.</p><p></p>",
