<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>When 9 is subtracted from 2/3 times a number, the result is 47 What is 25% of the original number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; 2/3 &#2327;&#2369;&#2344;&#2366; &#2350;&#2375;&#2306; &#2360;&#2375; 9 &#2328;&#2335;&#2366;&#2344;&#2375; &#2346;&#2352; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; 47 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2350;&#2370;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; 25% &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>"
    ],
    "solution": "<p>Let, the number = N</p><p>2N/3  -  9 = 47</p><p>2N/3 = 56</p><p>N = 84</p><p>25% of the number = 25% of 84 = 21</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If A : B = 4 : 9 and A + B = 65, find A and B.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A : B = 4 : 9 &#2324;&#2352; A + B = 65 &#2361;&#2376;, &#2340;&#2379; A &#2324;&#2352; B &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">20, 45</span><span class=\"hqt\" style=\"display:none\">20, 45</span>",
      "<span class=\"eqt\">25, 40</span><span class=\"hqt\" style=\"display:none\">25, 40</span>",
      "<span class=\"eqt\">15, 50</span><span class=\"hqt\" style=\"display:none\">15, 50</span>",
      "<span class=\"eqt\">30, 35</span><span class=\"hqt\" style=\"display:none\">30, 35</span>"
    ],
    "solution": "<p>4k + 9k = 65 =&gt; 13k = 65 =&gt; k = 5</p><p>A = 4 X 5 = 20, B = 9 X 5 = 45</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Priya's father Manish has a sister Meena. Meena's only daughter is Kavya. How is Kavya related to Priya?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2346;&#2367;&#2340;&#2366; &#2350;&#2344;&#2368;&#2359; &#2325;&#2368; &#2319;&#2325; &#2348;&#2361;&#2344; &#2350;&#2368;&#2344;&#2366; &#2361;&#2376;&#2404; &#2350;&#2368;&#2344;&#2366; &#2325;&#2368; &#2311;&#2325;&#2354;&#2380;&#2340;&#2368; &#2348;&#2375;&#2335;&#2368; &#2325;&#2366; &#2344;&#2366;&#2350; &#2325;&#2366;&#2357;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404; &#2325;&#2366;&#2357;&#2381;&#2351;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2367;&#2351;&#2366; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2352;&#2367;&#2358;&#2381;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Father's sister's daughter</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2340;&#2366; &#2325;&#2368; &#2348;&#2361;&#2344; &#2325;&#2368; &#2348;&#2375;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Mother's brother's daughter</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2305; &#2325;&#2375; &#2349;&#2366;&#2312; &#2325;&#2368; &#2348;&#2375;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Sister's daughter</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2344; &#2325;&#2368; &#2348;&#2375;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Father's daughter</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2340;&#2366; &#2325;&#2368; &#2348;&#2375;&#2335;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Priya's father Manish has a sister Meena. Meena's only daughter is Kavya.</p><p><img width=287 height=90 id=\"Picture 31\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28449/image031.png\"></p><p>Kavya is Priya's father's sister's daughter.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>While showing a portrait of a woman, Rohan said, \"She is the mother of the daughter of my father.\" How is that woman related to Rohan?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2350;&#2361;&#2367;&#2354;&#2366; &#2325;&#2366; &#2330;&#2367;&#2340;&#2381;&#2352; &#2342;&#2367;&#2326;&#2366;&#2340;&#2375; &#2361;&#2369;&#2319; &#2352;&#2379;&#2361;&#2344; &#2344;&#2375; &#2325;&#2361;&#2366;, \"&#2351;&#2361; &#2350;&#2375;&#2352;&#2375; &#2346;&#2367;&#2340;&#2366; &#2325;&#2368; &#2348;&#2375;&#2335;&#2368; &#2325;&#2368; &#2350;&#2366;&#2305; &#2361;&#2376;&#2404;\" &#2311;&#2360; &#2350;&#2361;&#2367;&#2354;&#2366; &#2325;&#2366; &#2352;&#2379;&#2361;&#2344; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Daughter</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Wife</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2381;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Mother</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2305;</span>",
      "<span class=\"eqt\">Cousin</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2330;&#2375;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>While showing a portrait of a woman, Rohan said, \"She is the mother of the daughter of my father.\"</p><p><img width=284 height=123 id=\"Picture 32\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28449/image032.png\"></p><p>That woman is the mother of Rohan.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following does NOT match the address given below?</p><p>Karan Malhotra 91, Maple Residency, Floor 2, Sector 11, Sonipat, 131001</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2340;&#2366; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2340;&#2375; &#2360;&#2375; &#2350;&#2375;&#2354; &#2344;&#2361;&#2368;&#2306; &#2326;&#2366;&#2340;&#2366; &#2361;&#2376;?</p><p>&#2325;&#2352;&#2339; &#2350;&#2354;&#2381;&#2361;&#2379;&#2340;&#2381;&#2352;&#2366; 91, &#2350;&#2375;&#2346;&#2354; &#2352;&#2375;&#2332;&#2367;&#2337;&#2375;&#2306;&#2360;&#2368;, &#2342;&#2370;&#2360;&#2352;&#2368; &#2350;&#2306;&#2332;&#2367;&#2354;, &#2360;&#2375;&#2325;&#2381;&#2335;&#2352; 11, &#2360;&#2379;&#2344;&#2368;&#2346;&#2340;, 131001</p></span>",
    "options": [
      "<span class=\"eqt\">Karan Malhotra 91, Maple Residency, Floor 2, Sector 11, Sonipat, 131001</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2339; &#2350;&#2354;&#2381;&#2361;&#2379;&#2340;&#2381;&#2352;&#2366; &#8203;&#8203;91, &#2350;&#2375;&#2346;&#2354; &#2352;&#2375;&#2332;&#2368;&#2337;&#2375;&#2306;&#2360;&#2368;, &#2350;&#2306;&#2332;&#2367;&#2354; 2, &#2360;&#2375;&#2325;&#2381;&#2335;&#2352; 11, &#2360;&#2379;&#2344;&#2368;&#2346;&#2340;, 131001</span>",
      "<span class=\"eqt\">Karan Malhotra 91, Maple Residency, Floor-2, Sector 11, Sonipat, 131001</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2339; &#2350;&#2354;&#2381;&#2361;&#2379;&#2340;&#2381;&#2352;&#2366; &#8203;&#8203;91, &#2350;&#2375;&#2346;&#2354; &#2352;&#2375;&#2332;&#2368;&#2337;&#2375;&#2306;&#2360;&#2368;, &#2347;&#2381;&#2354;&#2379;&#2352;-2, &#2360;&#2375;&#2325;&#2381;&#2335;&#2352; 11, &#2360;&#2379;&#2344;&#2368;&#2346;&#2340;, 131001</span>",
      "<span class=\"eqt\">Karan Malhotra 91, Maple Residency, Floor 2, Sector 11, Sonipat 131001</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2339; &#2350;&#2354;&#2381;&#2361;&#2379;&#2340;&#2381;&#2352;&#2366; 91, &#2350;&#2375;&#2346;&#2354; &#2352;&#2375;&#2332;&#2368;&#2337;&#2375;&#2306;&#2360;&#2368;, &#2350;&#2306;&#2332;&#2367;&#2354; 2, &#2360;&#2375;&#2325;&#2381;&#2335;&#2352; 11, &#2360;&#2379;&#2344;&#2368;&#2346;&#2340; 131001</span>",
      "<span class=\"eqt\">Karan Malhotra 91, Maple Residency, Floor 2, Sector 11, Sonipat, 131010</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2339; &#2350;&#2354;&#2381;&#2361;&#2379;&#2340;&#2381;&#2352;&#2366; &#8203;&#8203;91, &#2350;&#2375;&#2346;&#2354; &#2352;&#2375;&#2332;&#2368;&#2337;&#2375;&#2306;&#2360;&#2368;, &#2350;&#2306;&#2332;&#2367;&#2354; 2, &#2360;&#2375;&#2325;&#2381;&#2335;&#2352; 11, &#2360;&#2379;&#2344;&#2368;&#2346;&#2340;, 131010</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>We compare each option with the given address.</p><p>Option 1: Completely identical &#8594; Matches</p><p>Option 2: Hyphen in Floor-2 &#8594; Meaning unchanged &#8594; Matches</p><p>Option 3: Only punctuation and spacing differ &#8594; Matches</p><p>Option 4: PIN code 131010 is different from 131001 &#8594; Does NOT match</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Sentence: \"Smart robot built flame metal wires every night.\" If the 5<sup>th</sup> letter of every 2<sup>nd</sup> word is written in order, what word is formed? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2325;&#2381;&#2351;: \"Smart robot built flame metal wires every night.\" &#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2358;&#2348;&#2381;&#2342; &#2325;&#2366; &#2346;&#2366;&#2305;&#2330;&#2357;&#2366;&#2305; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2325;&#2380;&#2344; &#2360;&#2366; &#2358;&#2348;&#2381;&#2342; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">RLAE</span><span class=\"hqt\" style=\"display:none\">RLAE</span>",
      "<span class=\"eqt\">TALE</span><span class=\"hqt\" style=\"display:none\">TALE</span>",
      "<span class=\"eqt\">TEST</span><span class=\"hqt\" style=\"display:none\">TEST</span>",
      "<span class=\"eqt\">TIRH</span><span class=\"hqt\" style=\"display:none\">TIRH</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The 5<sup>th</sup> letter of every 2<sup>nd</sup> word is:</p><p>Smart robo<b>t</b> built flam<b>e</b> metal wire<b>s</b> every nigh<b>t</b> </p><p>Arranging the letters in the same order, the word formed is: TEST</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In this type of questions, question is provided with substitutes for various mathematical symbols, followed by a question involving calculation of an expression or choosing the correct/incorrect equation. You have to put the real signs in the given equation and then solve the questions as required.</p><p>If '^' stands for '-', '@' stands for '&div;', '%' stands for '+', '$' stands for 'x', then find the value of: 132 $ 5 ^ 46 % 96 @ 8 = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2342;&#2367;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2319;&#2325; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2344;&#2375; &#2351;&#2366; &#2360;&#2361;&#2368;/&#2327;&#2354;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2330;&#2369;&#2344;&#2344;&#2375; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2310;&#2346;&#2325;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2330;&#2367;&#2361;&#2381;&#2344; &#2354;&#2327;&#2366;&#2344;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2347;&#2367;&#2352; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366;&#2344;&#2369;&#2360;&#2366;&#2352; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2361;&#2354; &#2325;&#2352;&#2344;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2351;&#2342;&#2367; '^' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '-', '@' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&div;', '%' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '+' &#2324;&#2352; '$' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'x' &#2361;&#2376;, &#2340;&#2379; 132 $ 5 ^ 46 % 96 @ 8 = ? &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">626</span><span class=\"hqt\" style=\"display:none\">626</span>",
      "<span class=\"eqt\">638</span><span class=\"hqt\" style=\"display:none\">638</span>",
      "<span class=\"eqt\">614</span><span class=\"hqt\" style=\"display:none\">614</span>",

    "question": "<span class=\"eqt\"><p>Some equations are defined with a coded operator. If A &#10731; B = (A + B)<sup>2</sup> &#8722; 2AB + (A &#8722; B), find 9 &#10731; 4.</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2331; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2379; &#2325;&#2379;&#2337;&#2367;&#2340; &#2321;&#2346;&#2352;&#2375;&#2335;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; A &#10731; B = (A + B)<sup>2</sup> &#8722; 2AB + (A &#8722; B), &#2340;&#2379; 9 &#10731; 4 &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",

    "question": "<span class=\"eqt\"><p>What happens to the wavelength of light when it passes from air into glass?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2361;&#2357;&#2366; &#2360;&#2375; &#2325;&#2366;&#2306;&#2330; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2313;&#2360;&#2325;&#2368; &#2340;&#2352;&#2306;&#2327;&#2342;&#2376;&#2352;&#2381;&#2343;&#2381;&#2351; &#2350;&#2375;&#2306; &#2325;&#2381;&#2351;&#2366; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It increases</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It decreases</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2328;&#2335;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It remains unchanged</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2309;&#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It becomes zero</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2358;&#2370;&#2344;&#2381;&#2351; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>When light enters a denser medium like glass ( &#8776; 1.5 n&#8776;1.5 ) from air ( &#119899; &#8776; 1 n&#8776;1 ), its <b>speed decreases</b>. </p><p>Since the frequency of light remains constant (as it depends on the source), and the relationship is &#119907; = &#119891; &#120582; v=f&#955; (Velocity = Frequency  X  Wavelength), a decrease in velocity must result in a <b>proportional decrease in wavelength.</b></p>",
    "question_index": 25
  },

    "question": "<span class=\"eqt\"><p>If the price of a good increases by 25% and the quantity demanded falls by 5%, how would you classify the demand?</p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2350;&#2375;&#2306; 25% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2325;&#2368; &#2350;&#2366;&#2306;&#2327; &#2350;&#2375;&#2306; 5% &#2325;&#2368; &#2325;&#2350;&#2368; &#2310;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2310;&#2346; &#2350;&#2366;&#2306;&#2327; &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2325;&#2352;&#2375;&#2306;&#2327;&#2375;?</span>",
    "options": [
      "<span class=\"eqt\">Demand is elastic (elasticity greater than 1)</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2306;&#2327; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2366;&#2360;&#2381;&#2341; &#2361;&#2376; (&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2366;&#2360;&#2381;&#2341;&#2340;&#2366; 1 &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;)</span>",
      "<span class=\"eqt\">Demand is inelastic (elasticity less than 1)</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2306;&#2327; &#2354;&#2379;&#2330;&#2361;&#2368;&#2344; &#2361;&#2376; (&#2354;&#2379;&#2330; 1 &#2360;&#2375; &#2325;&#2350; &#2361;&#2376;)</span>",
      "<span class=\"eqt\">Demand is unitary elastic (elasticity equals 1)</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2306;&#2327; &#2311;&#2325;&#2366;&#2312; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2366;&#2360;&#2381;&#2341; &#2361;&#2376; (&#2354;&#2379;&#2330; 1 &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;)</span>",
      "<span class=\"eqt\">Demand is perfectly elastic (elasticity is infinite)</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2306;&#2327; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2366;&#2360;&#2381;&#2341; &#2361;&#2376; (&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2366;&#2360;&#2381;&#2341;&#2340;&#2366; &#2309;&#2344;&#2306;&#2340; &#2361;&#2376;)&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Price Elasticity of Demand is calculated as:</p><p>E<sub>p</sub> = % Change in Quantity Demanded/% Change in Price</p><p>Given: % Change in Quantity = 5%, % Change in Price = 25%.</p><p>E<sub>p</sub> = 5/25 = 0.2</p><p>Since 0.2&lt;1, the demand is considered <b>inelastic</b>, meaning the quantity demanded is not very responsive to price changes.</p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>Which of the following was the first Bill to be introduced and subsequently passed in the New Parliament House (Sadan) during the Special Session of Parliament, 2023?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2357;&#2367;&#2358;&#2375;&#2359; &#2360;&#2340;&#2381;&#2352;, 2023 &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2344;&#2319; &#2360;&#2306;&#2360;&#2342; &#2349;&#2357;&#2344; (&#2360;&#2342;&#2344;) &#2350;&#2375;&#2306; &#2346;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2324;&#2352; &#2348;&#2366;&#2342; &#2350;&#2375;&#2306; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2346;&#2361;&#2354;&#2366; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Nari Shakti Vandan Adhiniyam</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2352;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2357;&#2306;&#2342;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Jan Vishwas Bill</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344; &#2357;&#2367;&#2358;&#2381;&#2357;&#2366;&#2360; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;</span>",
      "<span class=\"eqt\">Digital Personal Data Protection Bill</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2337;&#2375;&#2335;&#2366; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;</span>",
      "<span class=\"eqt\">Bharatiya Nyaya Sanhita</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The very first law discussed and cleared in the new Parliament building was the Women's Reservation Bill.</p><p>The Nari Shakti Vandan Adhiniyam, 2023 (popularly known as the Women's Reservation Bill) was the first Bill introduced in the New Parliament House during the Special Session held in September 2023.</p><p>It was also passed by both Houses of Parliament in the new building.</p><p>The Jan Vishwas Bill aimed at decriminalising minor offences and was passed before the Special Session, in the old Parliament building</p><p>DPDP Act deals with data privacy but was passed earlier, in the old Parliament building</p><p>The Bharatiya Nyaya Sanhita is part of criminal law reforms but was not the first Bill of the new House.</p><p><b>Further Insights</b> </p><p>The Act provides 33% reservation for women in Lok Sabha and State Assemblies.</p><p>Its implementation is linked to delimitation after Census.</p><p>The Special Session (Sept 2023) marked the shift to the new Parliament building.</p><p>Passing this Bill symbolised women-led development narrative.</p><p>The event has high symbolic and constitutional significance for India's democracy.</p>",
    "question_index": 27
  },
  {
    "question": "<span class=\"eqt\"><p>According to Avtar's Top Cities for Women in India (TCWI) 2025 report, which city retained the No. 1 position as the top city for women in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2357;&#2340;&#2366;&#2352; &#2325;&#2368; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2368;&#2352;&#2381;&#2359; &#2358;&#2361;&#2352;&#2379;&#2306; (&#2335;&#2368;&#2360;&#2368;&#2337;&#2348;&#2381;&#2354;&#2381;&#2351;&#2370;&#2310;&#2312;) 2025 &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2368;&#2352;&#2381;&#2359; &#2358;&#2361;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2358;&#2361;&#2352; &#2346;&#2361;&#2354;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2344;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chennai</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2375;&#2344;&#2381;&#2344;&#2312;</span>",
      "<span class=\"eqt\">Pune</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2339;&#2375;</span>",
      "<span class=\"eqt\">Bengaluru</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2306;&#2327;&#2354;&#2369;&#2352;&#2369;</span>",
      "<span class=\"eqt\">Hyderabad</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2376;&#2342;&#2352;&#2366;&#2348;&#2366;&#2342;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Bengaluru retained its No. 1 position as the top city for women in India, reaffirming its leadership in creating a balanced ecosystem across social and industrial dimensions. Chennai, Pune, Hyderabad and Mumbai completed the top 5, workplace consulting firm Avtar's Top Cities for Women in India (TCWI) 2025 report showed.</p><p>Gurugram stood out among the top 10, climbing to No. 6 from No. 9 last year, driven largely by gains in industrial inclusion. The 2025 edition of TCWI covered 125 cities and drew comparisons with previous editions since the year 2022.</p><p>The report tracked women's inclusion across Indian cities through a longitudinal index covering participation, safety and career continuity. Cities were ranked based on the City Inclusion Score (CIS), derived from two parameters: Social Inclusion Score (SIS) and Industrial Inclusion Score (IIS). The SIS measured a city's liveability, safety, women's representation in employment, and broader indicators of women's empowerment. The IIS evaluated the extent to which organisations across industries were inclusive of women, reflecting workplace participation and representation, the presence of women-friendly industries, and career enablers provided by employers.</p>",
    "question_index": 28
  },

    "options": [
      "<span class=\"eqt\">Humayun</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2369;&#2350;&#2366;&#2351;&#2370;&#2306;</span>",
      "<span class=\"eqt\">Bahadur Shah I</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2366;&#2342;&#2369;&#2352; &#2358;&#2366;&#2361; &#2346;&#2381;&#2352;&#2341;&#2350;</span>",
      "<span class=\"eqt\">Akbar</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2348;&#2352;</span>",
      "<span class=\"eqt\">Babur</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2348;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Aurangzeb died in 1707. He was succeeded by his son Muazzam, who took the title Bahadur Shah I (also known as Shah Alam I). Though he tried to stabilize the empire, the Mughal authority began a steady decline after his reign due to internal factions and external invasions.</p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>The Nongkrem Dance Festival is celebrated at which of the following places?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2379;&#2306;&#2327;&#2325;&#2381;&#2352;&#2375;&#2350; &#2344;&#2371;&#2340;&#2381;&#2351; &#2350;&#2361;&#2379;&#2340;&#2381;&#2360;&#2357; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tura, the cultural centre of Garo Hills</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2352;&#2379; &#2361;&#2367;&#2354;&#2381;&#2360; &#2325;&#2366; &#2360;&#2366;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;, &#2340;&#2369;&#2352;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Smit, the cultural centre of the Khasi Hills</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2350;&#2367;&#2340;, &#2326;&#2366;&#2360;&#2368; &#2346;&#2361;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2360;&#2366;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Shillong Peak, the cultural centre of Jaintia Hills</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2354;&#2366;&#2306;&#2327; &#2346;&#2368;&#2325;, &#2332;&#2351;&#2306;&#2340;&#2367;&#2351;&#2366; &#2361;&#2367;&#2354;&#2381;&#2360; &#2325;&#2366; &#2360;&#2366;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Nongpoh, the cultural centre of Ri-Bhoi</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2379;&#2306;&#2327;&#2346;&#2379;&#2361;, &#2352;&#2368;-&#2349;&#2379;&#2312; &#2325;&#2366; &#2360;&#2366;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Nongkrem dance festival is celebrated during Autumn at Smit, the cultural centre of the Khasi Hills. A five day long religious festival of the Khasis, Ka Pomblang Nongkrem dance is popularly known as Nongkrem dance</p><p>Similar to all other festivals of the Meghalaya, Nongkrem Dance Festival is performed to appease the all powerful Goddess Ka Blei Synshar for a rich bumper harvest and prosperity of the people.</p><p><b><u>The Rituals of Nongkrem Dance Festival</u></b></p><p>The Syiem of Khyrim along with the high priest performs the Pomblang ceremony. He offers oblation to a Lei Shyllong; the God of Shyllong peak by sacrificing a cock. An important part of this festival is Pomblang (sacrifice of goats). Then offerings are made to the ancestor and ancestress of the ruling clan to the first uncle to the deity of Shillong peak.</p><p><b><u>The Activities in the Nongkrem Dance Festival</u></b></p><p>Religious part of the festival precedes dances, in which unmarried girls in all their exotic costumes participate. The men's dancing is naturally more vigorous and energetic. They hold a sword in their right hand and usually a white Yak hair whisk in their left hand, keeping time to the changing beats of drums and playing of the tangmuri or pipes.</p>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article of the Indian Constitution provides for the establishment of a High Court for a State?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Article 214</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 214</span>",
      "<span class=\"eqt\">Article 216</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 216</span>",
      "<span class=\"eqt\">Article 217</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 217</span>",
      "<span class=\"eqt\">Article 224</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 224</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Article 214</b> of the Indian Constitution explicitly states that \"There shall be a High Court for each State.\" While Parliament has the power to establish a common High Court for two or more states (under Article 231), Article 214 remains the foundational provision for the existence of High Courts at the state level.</p><p><b>Further insights:</b></p><p>&#183; <b>Article 216</b> deals with the constitution of High Courts.</p><p>&#183; <b>Article 217</b> deals with the appointment and conditions of the office of a Judge of a High Court.</p><p>&#183; <b>Article 224</b> deals with the appointment of additional and acting judges.</p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements about India's performance at the 2016 Rio Olympics is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>2016 &#2352;&#2367;&#2351;&#2379; &#2323;&#2354;&#2306;&#2346;&#2367;&#2325; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">India won more than five gold medals at Rio 2016.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2352;&#2367;&#2351;&#2379; 2016 &#2350;&#2375;&#2306; &#2346;&#2366;&#2306;&#2330; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2346;&#2342;&#2325; &#2332;&#2368;&#2340;&#2375;&#2404;</span>",
      "<span class=\"eqt\">India did not win any medals at Rio 2016.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2352;&#2367;&#2351;&#2379; 2016 &#2350;&#2375;&#2306; &#2325;&#2379;&#2312; &#2346;&#2342;&#2325; &#2344;&#2361;&#2368;&#2306; &#2332;&#2368;&#2340;&#2366;&#2404;</span>",
      "<span class=\"eqt\">P. V. Sindhu won a silver medal in badminton at Rio 2016.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;.&#2357;&#2368;. &#2360;&#2367;&#2306;&#2343;&#2369; &#2344;&#2375; &#2352;&#2367;&#2351;&#2379; 2016 &#2350;&#2375;&#2306; &#2348;&#2376;&#2337;&#2350;&#2367;&#2306;&#2335;&#2344; &#2350;&#2375;&#2306; &#2352;&#2332;&#2340; &#2346;&#2342;&#2325; &#2332;&#2368;&#2340;&#2366; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">India won its first Olympic medal in athletics at Rio 2016.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2352;&#2367;&#2351;&#2379; 2016 &#2350;&#2375;&#2306; &#2319;&#2341;&#2354;&#2375;&#2335;&#2367;&#2325;&#2381;&#2360; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2366; &#2346;&#2361;&#2354;&#2366; &#2323;&#2354;&#2306;&#2346;&#2367;&#2325; &#2346;&#2342;&#2325; &#2332;&#2368;&#2340;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; India won a total of two medals at the 2016 Rio Olympics. P.V. Sindhu created history by becoming the first Indian woman to win an Olympic Silver medal. </p><p>&#183; The other medal was a Bronze won by Sakshi Malik in wrestling.</p><p><b>Further Insights: </b></p><p>India did not win any gold medals in 2016. The first Olympic medal in athletics was won later, at the 2020 Tokyo Olympics, by Neeraj Chopra.</p>",
    "question_index": 32
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following rivers forms an estuary rather than a delta while entering the sea?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2344;&#2342;&#2368; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2375; &#2360;&#2350;&#2351; &#2337;&#2375;&#2354;&#2381;&#2335;&#2366; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2350;&#2369;&#2361;&#2366;&#2344;&#2366; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Ganga</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Godavari</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Narmada</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2381;&#2350;&#2342;&#2366;</span>",
      "<span class=\"eqt\">Krishna</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2381;&#2339;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Most east-flowing rivers (Ganga, Godavari, Krishna) have long courses and carry heavy silt, forming large deltas. However, the Narmada (and Tapti) are west-flowing rivers that flow through narrow rift valleys. Because of the steep gradient and the hard rocky bed, they flow with great speed and carry little silt, preventing the formation of a delta. Instead, they form a clear, funnel-shaped estuary.</p>",
    "question_index": 33
  },
  {
    "question": "<span class=\"eqt\"><p>What was the primary objective of the Subsidiary Alliance System introduced by Lord Wellesley?</p></span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2357;&#2375;&#2354;&#2375;&#2360;&#2381;&#2354;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2360;&#2361;&#2366;&#2351;&#2325; &#2327;&#2336;&#2348;&#2306;&#2343;&#2344; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">To expand British territory by annexing Indian states</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; &#2309;&#2343;&#2368;&#2344; &#2325;&#2352;&#2325;&#2375; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To create buffer states for the defence of British territories</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2347;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2348;&#2344;&#2366;&#2344;&#2375; &#2361;&#2375;&#2340;&#2369;</span>",
      "<span class=\"eqt\">To promote trade between Indian states and Britain</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2324;&#2352; &#2348;&#2381;&#2352;&#2367;&#2335;&#2375;&#2344; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">To establish direct British administration over all princely states</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2352;&#2367;&#2351;&#2366;&#2360;&#2340;&#2379;&#2306; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Introduced by Lord Wellesley (1798 - 1805), the primary strategic aim was to make the British the paramount power in India and exclude French influence. </p><p>By forcing Indian rulers to maintain British troops within their territory, the British shifted the cost of their military to the Indian states and turned those states into buffers that protected British core territories from external invasion.</p>",
    "question_index": 34
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements with reference to Article 32 of the Indian Constitution:</p><p>1) It empowers citizens to move the Supreme Court for the enforcement of Fundamental Rights.</p><p>2) The right under Article 32 can be suspended during a National Emergency.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32 &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2351;&#2361; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2379;&#2306; &#2325;&#2379; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32 &#2325;&#2375; &#2340;&#2361;&#2340; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2379; &#2344;&#2367;&#2354;&#2306;&#2348;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement 1 is correct: Article 32 (Right to Constitutional Remedies) allows citizens to approach the Supreme Court directly for the enforcement of Fundamental Rights. Dr. B.R. Ambedkar called it the \"Heart and Soul\" of the Constitution.</p><p>Statement 2 is correct: Under Article 359, when a National Emergency is in operation, the President may by order suspend the right to move any court for the enforcement of such rights (including the remedy under Art 32), except for Articles 20 and 21.</p>",
    "question_index": 35
  },
  {
    "question": "<span class=\"eqt\"><p>Read the statements regarding human blood circulation:</p><p>1) The pulmonary artery carries deoxygenated blood.</p><p>2) The pulmonary vein carries oxygenated blood.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2357; &#2352;&#2325;&#2381;&#2340; &#2346;&#2352;&#2367;&#2360;&#2306;&#2330;&#2352;&#2339; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306;:</p><p>1) &#2347;&#2369;&#2347;&#2381;&#2347;&#2369;&#2360;&#2368;&#2351; &#2343;&#2350;&#2344;&#2368; &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2352;&#2361;&#2367;&#2340; &#2352;&#2325;&#2381;&#2340; &#2354;&#2375; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2347;&#2369;&#2347;&#2381;&#2347;&#2369;&#2360;&#2368;&#2351; &#2358;&#2367;&#2352;&#2366; &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2325;&#2381;&#2340; &#2354;&#2375; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 only is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2361;&#2368; &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">2 only is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2361;&#2368; &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both 1 and 2 are correct</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2 is correct</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2 &#2360;&#2361;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In the human body, arteries generally carry oxygenated blood and veins carry deoxygenated blood. However, the pulmonary circuit is the exception:</p><p>Statement 1 is correct: The pulmonary artery carries deoxygenated blood from the right ventricle of the heart to the lungs for purification.</p><p>Statement 2 is correct: The pulmonary vein carries newly oxygenated blood from the lungs back to the left atrium of the heart.</p>",
    "question_index": 36
  },
  {
    "question": "<span class=\"eqt\"><p>Read the below statements marked as Assertion (A) and Reason (R). Mark the correct option: </p><p>Assertion (A): The Buddhist Chaitya halls were primarily meant for congregational worship.</p><p>Reason (R): They typically housed a stupa at the apsidal end.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A) &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; (R) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;: </p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2348;&#2380;&#2342;&#2381;&#2343; &#2330;&#2376;&#2340;&#2381;&#2351; &#2361;&#2377;&#2354; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2366;&#2350;&#2370;&#2361;&#2367;&#2325; &#2346;&#2370;&#2332;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2341;&#2375;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2311;&#2344;&#2350;&#2375;&#2306; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2309;&#2352;&#2381;&#2343;&#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2331;&#2379;&#2352; &#2346;&#2352; &#2319;&#2325; &#2360;&#2381;&#2340;&#2370;&#2346; &#2361;&#2379;&#2340;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",

      "<span class=\"eqt\">A is false, but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Assertion (A) is true: Unlike Viharas (which were residential monasteries), Chaityas were prayer halls meant for congregational worship.</p><p>Reason (R) is true: These halls were typically rectangular with an apsidal (semicircular) end that housed a Stupa, which served as the object of veneration. The Reason explains the Assertion because the architectural layout (a hall with a path for circumambulation around the stupa) was specifically designed to facilitate group worship.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Seventh Schedule of the Indian Constitution:</p><p>1) The Union List includes subjects of national importance requiring uniform laws across the country.</p><p>2) The State List contains subjects on which only State Legislatures can normally legislate.</p><p>3) The Concurrent List was borrowed from the Constitution of the United States.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2368; &#2360;&#2366;&#2340;&#2357;&#2368;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2360;&#2306;&#2328; &#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2350;&#2361;&#2340;&#2381;&#2357; &#2325;&#2375; &#2357;&#2367;&#2359;&#2351; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344; &#2346;&#2352; &#2346;&#2370;&#2352;&#2375; &#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2344;&#2370;&#2344; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2320;&#2360;&#2375; &#2357;&#2367;&#2359;&#2351; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344; &#2346;&#2352; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2325;&#2375;&#2357;&#2354; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354; &#2361;&#2368; &#2325;&#2366;&#2344;&#2370;&#2344; &#2348;&#2344;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>3) &#2360;&#2350;&#2357;&#2352;&#2381;&#2340;&#2368; &#2360;&#2370;&#2330;&#2368; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2309;&#2350;&#2375;&#2352;&#2367;&#2325;&#2366; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2375; &#2354;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is correct: The Union List contains subjects like Defense, Atomic Energy, and Foreign Affairs, which require a uniform national policy.</p><p>Statement 2 is correct: The State List contains local subjects like Police, Agriculture, and Public Health, where states have exclusive jurisdiction under normal circumstances.</p><p>Statement 3 is incorrect because the concept of the Concurrent List was borrowed from the Australian Constitution, not the US Constitution.</p>",

    "question": "<span class=\"eqt\"><p>Read the below statements marked as Assertion (A) and Reason (R). Mark the correct option:</p><p>Assertion (A): The Alvars and Nayanars played a key role in the Bhakti movement of South India.</p><p>Reason (R): They emphasized personal devotion over ritualistic practices.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A) &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; (R) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2309;&#2354;&#2357;&#2366;&#2352;&#2379;&#2306; &#2324;&#2352; &#2344;&#2351;&#2344;&#2366;&#2352; &#2360;&#2306;&#2346;&#2381;&#2352;&#2342;&#2366;&#2351;&#2379;&#2306; &#2344;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2349;&#2325;&#2381;&#2340;&#2367; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2350;&#2375;&#2306; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2344;&#2367;&#2349;&#2366;&#2312;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2325;&#2352;&#2381;&#2350;&#2325;&#2366;&#2306;&#2337;&#2368;&#2351; &#2346;&#2381;&#2352;&#2341;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2349;&#2325;&#2381;&#2340;&#2367; &#2346;&#2352; &#2332;&#2379;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Assertion (A) is true: The Alvars (devotees of Vishnu) and Nayanars (devotees of Shiva) initiated the Bhakti movement in South India between the 6th and 9th centuries.</p><p>Reason (R) is true: They composed hymns in the local language (Tamil) rather than Sanskrit and preached that salvation was attainable through intense personal devotion (Bhakti) rather than through complex Vedic rituals or caste-based barriers. This shift in focus is precisely why they were so instrumental in popularizing the movement.</p>",
    "question_index": 39

    "question": "<span class=\"eqt\"><p>In Indian classical dance terminology, the concept of \"Angahara\" refers to:</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2344;&#2371;&#2340;&#2381;&#2351; &#2358;&#2348;&#2381;&#2342;&#2366;&#2357;&#2354;&#2368; &#2350;&#2375;&#2306;, \"&#2309;&#2306;&#2327;&#2361;&#2366;&#2352;&#2366;\" &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2360;&#2375; &#2340;&#2366;&#2340;&#2381;&#2346;&#2352;&#2381;&#2351; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2375; &#2361;&#2376;:</span>",
    "options": [
      "<span class=\"eqt\">Facial expressions conveying emotions</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2375;&#2361;&#2352;&#2375; &#2325;&#2375; &#2361;&#2366;&#2357;-&#2349;&#2366;&#2357; &#2349;&#2366;&#2357;&#2344;&#2366;&#2323;&#2306; &#2325;&#2379; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Combined movement of several Karnas</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2375;&#2325; &#2325;&#2352;&#2381;&#2339;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2327;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Rhythmic syllables recited by the dancer</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2381;&#2340;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2351;&#2348;&#2342;&#2381;&#2343; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2366; &#2313;&#2330;&#2381;&#2330;&#2366;&#2352;&#2339; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Decorative costume elements</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2332;&#2366;&#2357;&#2335;&#2368; &#2346;&#2379;&#2358;&#2366;&#2325; &#2325;&#2375; &#2340;&#2340;&#2381;&#2357;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; In the Natya Shastra (the foundational text of Indian performing arts), the basic unit of dance movement is called a Karana. </p><p>&#183; An Angahara is a sequence or a combination of several Karanas (usually six to nine) performed in a specific rhythmic pattern.</p><p><b>Further Insights: </b></p><p>Facial expressions are referred to as Mukha-Abhinaya, and rhythmic syllables are called Sollukattu or Bol.</p>",
    "question_index": 40
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the PM-DAKSH Scheme:</p><p>Statement 1: PM-DAKSH (Pradhan Mantri Dakshta Aur Kushalta Sampann Hitgrahi) Yojana is a Central Sector Scheme launched by the Ministry of Social Justice and Empowerment to provide skill training to marginalized communities.</p><p>Statement 2: Under the PM-DAKSH Scheme, there is an income limit of &#8377;3 lakh per annum for candidates belonging to Scheduled Castes (SCs) and De-Notified Tribes (DNTs) to avail training benefits.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;-&#2342;&#2325;&#2381;&#2359; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;-&#2342;&#2325;&#2381;&#2359; (&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2342;&#2325;&#2381;&#2359;&#2340;&#2366; &#2324;&#2352; &#2325;&#2380;&#2358;&#2354; &#2360;&#2306;&#2346;&#2344;&#2381;&#2344; &#2361;&#2367;&#2340;&#2327;&#2381;&#2352;&#2366;&#2361;&#2368;) &#2351;&#2379;&#2332;&#2344;&#2366; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2344;&#2381;&#2351;&#2366;&#2351; &#2324;&#2352; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2340;&#2366; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2361;&#2366;&#2358;&#2367;&#2319; &#2346;&#2352; &#2346;&#2337;&#2364;&#2375; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351;&#2379;&#2306; &#2325;&#2379; &#2325;&#2380;&#2358;&#2354; &#2346;&#2381;&#2352;&#2358;&#2367;&#2325;&#2381;&#2359;&#2339; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2319;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2351;&#2379;&#2332;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;-&#2342;&#2325;&#2381;&#2359; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2340;&#2361;&#2340;, &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2366;&#2340;&#2367; (&#2319;&#2360;&#2360;&#2368;) &#2324;&#2352; &#2327;&#2376;&#2352;-&#2309;&#2343;&#2367;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367; (&#2337;&#2368;&#2319;&#2344;&#2335;&#2368;) &#2325;&#2375; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2358;&#2367;&#2325;&#2381;&#2359;&#2339; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2361;&#2375;&#2340;&#2369; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &le;3 &#2354;&#2366;&#2326; &#2325;&#2368; &#2310;&#2351; &#2360;&#2368;&#2350;&#2366; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only Statement 1 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 1 &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only Statement 2 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 2 &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both Statement 1 and Statement 2 are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2324;&#2352; &#2325;&#2341;&#2344; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Neither Statement 1 nor Statement 2 is correct</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2325;&#2341;&#2344; 1 &#2324;&#2352; &#2344; &#2361;&#2368; &#2325;&#2341;&#2344; 2 &#2360;&#2361;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>PM-DAKSH (Pradhan Mantri Dakshta Aur Kushalta Sampann Hitgrahi) Yojana is a National Action Plan designed to skill marginalized communities. This scheme focuses on Scheduled Castes (SCs), Other Backward Classes (OBCs), Economically Backward Classes (EBCs), DeNotified, Nomadic, and Semi-Nomadic Tribes (DNTs), as well as sanitation workers including waste pickers.</p><p>This Central Sector Scheme was launched by the Ministry of Social Justice and Empowerment in 2020-21.</p><p>Most of the persons from the target group are having minimal economic assets; therefore, provision of training and enhancing their competencies is essential for economic empowerment/ upliftment of these marginalized target groups.</p><p>Under the scheme, any Other Backward Caste's (OBCs) and Economically Weaker Section (EWS) candidates whose annual family income is less than Rs. 3.0 lakh is eligible to get training whereas there is no income limit for the candidates belonging to Scheduled Caste's (SCs)/De-notified Tribes (DNTs), Safai Karamcharis including Waste Pickers.</p><p>The scheme has been approved for an amount of Rs. 450 Cr. from the years 2021-22 to 2025-26. There has been no change in Budget Estimate of 2025-26, which is Rs. 130 Crore under PM-DAKSH Scheme.</p>",
    "question_index": 41
  },

      "<span class=\"eqt\">A Bend in the River</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2342;&#2368; &#2350;&#2375;&#2306; &#2319;&#2325; &#2350;&#2379;&#2337;&#2364;</span>",
      "<span class=\"eqt\">In a Free State</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306;</span>",
      "<span class=\"eqt\">The Enigma of Arrival</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2327;&#2350;&#2344; &#2325;&#2366; &#2352;&#2361;&#2360;&#2381;&#2351;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>V.S. Naipaul (born August 17, 1932, Trinidad - died August 11, 2018, London, England) was a Trinidadian writer of Indian descent known for his pessimistic novels set in developing countries. For these revelations of what the Swedish Academy called \"suppressed histories,\" Naipaul won the Nobel Prize for Literature in 2001.</p><p>The three stories in <b>In a Free State (1971), which won Britain's Booker Prize</b>, are set in various countries; Guerrillas (1975) is a despairing look at an abortive uprising on a Caribbean island; and A Bend in the River (1979) pessimistically examines the uncertain future of a newly independent state in Central Africa. A Way in the World (1994) is an essaylike novel examining how history forms individuals' characters. Naipaul's other novels include The Mimic Men (1967) and The Enigma of Arrival (1987). </p><p>Among Naipaul's nonfiction works are three studies of India, An Area of Darkness (1965), India: A Wounded Civilization (1977), and India: A Million Mutinies Now (1990); The Five Societies - British, French, and Dutch - in the West Indies (1963); and Among the Believers: An Islamic Journey (1981). Naipaul was knighted in 1989.</p>",
    "question_index": 42
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following correctly describes disinvestment in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2357;&#2367;&#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2366; &#2360;&#2361;&#2368; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Complete closure of public sector enterprises</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2313;&#2342;&#2381;&#2351;&#2350;&#2379;&#2306; &#2325;&#2379; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2348;&#2306;&#2342; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Transfer of ownership from private to public sector</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2366;&#2350;&#2367;&#2340;&#2381;&#2357; &#2325;&#2366; &#2344;&#2367;&#2332;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2375; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Sale of government equity in public sector enterprises</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2313;&#2342;&#2381;&#2351;&#2350;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2311;&#2325;&#2381;&#2357;&#2367;&#2335;&#2368; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Merging of public sector enterprises</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2313;&#2342;&#2381;&#2351;&#2350;&#2379;&#2306; &#2325;&#2366; &#2357;&#2367;&#2354;&#2351;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Disinvestment refers to the action of the government selling or liquidating its assets or stakes in Public Sector Undertakings (PSUs). The goal is typically to reduce the fiscal burden, raise money for social welfare schemes, or introduce private-sector efficiency into the management of these enterprises.</p>",
    "question_index": 43
  },

    "question": "<span class=\"eqt\"><p>Which vitamin deficiency leads to night blindness?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360; &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2325;&#2368; &#2325;&#2350;&#2368; &#2360;&#2375; &#2352;&#2340;&#2380;&#2306;&#2343;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Vitamin B&#8321;</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; B&#8321;</span>",
      "<span class=\"eqt\">Vitamin C</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; C</span>",
      "<span class=\"eqt\">Vitamin A</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; A</span>",
      "<span class=\"eqt\">Vitamin D</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; D</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Vitamin A (Retinol) is essential for the production of rhodopsin, the pigment in the retina that allows the eye to see in low-light conditions. A deficiency leads to Xerophthalmia and its early symptom, Nyctalopia (night blindness).</p><p>Further Insights:</p><p>B1 deficiency causes Beriberi; C causes Scurvy; D causes Rickets.</p>",
    "question_index": 44
  },

    "question": "<span class=\"eqt\"><p>Fill in the blank:</p><p>The Indian Hockey Federation was incorporated on ____________, and was later replaced by Hockey India in 2009.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344; &#2349;&#2352;&#2375;&#2306;:</p><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2361;&#2377;&#2325;&#2368; &#2350;&#2361;&#2366;&#2360;&#2306;&#2328; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; ____________ &#2325;&#2379; &#2361;&#2369;&#2312; &#2341;&#2368;, &#2324;&#2352; &#2348;&#2366;&#2342; &#2350;&#2375;&#2306; 2009 &#2350;&#2375;&#2306; &#2311;&#2360;&#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2361;&#2377;&#2325;&#2368; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2344;&#2375; &#2354;&#2375; &#2354;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">7 November 1925</span><span class=\"hqt\" style=\"display:none\">7 &#2344;&#2357;&#2306;&#2348;&#2352; 1925</span>",
      "<span class=\"eqt\">2 October 1927</span><span class=\"hqt\" style=\"display:none\">2 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 1927</span>",
      "<span class=\"eqt\">15 August 1947</span><span class=\"hqt\" style=\"display:none\">15 &#2309;&#2327;&#2360;&#2381;&#2340; 1947</span>",

    "correct_option_id": 0,
    "solution": "<p><b>The Indian Hockey Federation was established on 7 November 1925 and was later replaced by Hockey India in 2009.</b></p><p><b>In news:</b></p><p>Union Sports Minister Dr Mansukh Mandaviya recalled India's glorious hockey legacy and unveiled the trophy for the FIH Hockey Men's Junior World Cup. The tournament was held from 28 November to 10 December, 2025 in Chennai and Madurai, featuring 24 matches with participation of over 11,500 players.</p><p>Exhibition Match:</p><p>To mark 100 years of Indian Hockey, an exhibition match between the Sports Minister's XI and Hockey India's XI was played in New Delhi. Former Indian hockey stars attended the event. The Sports Minister's XI won 3-1.</p><p></p><p><b>India's Hockey Achievements (1925-2024)</b></p><p>Olympic Dominance:</p><p>India is the most successful nation in men's Olympic hockey with 13 medals, including a record 8 gold medals.</p><p>-Six consecutive Olympic golds (1928-1956), remaining unbeaten and scoring 178 goals, conceding only 7.</p><p>- Notable highlights include:</p><p>1928 Amsterdam: First gold without conceding a goal; Major Dhyan Chand scored 14 goals.</p><p>1932 Los Angeles: Record 24-1 win over the USA.</p><p>1936 Berlin: Beat Germany 8-1 in the final.</p><p>1948 London: First post-independence gold.</p><p>1952 Helsinki: Balbir Singh Sr. scored five goals in the final.</p><p>1956 Melbourne: Gold by defeating Pakistan 1-0.</p><p>- Additional golds in Tokyo 1964 and Moscow 1980.</p><p>- Recent resurgence: Bronze medals at Tokyo 2020 and Paris 2024 after a long Olympic drought.</p><p></p><p><b>Other Major Achievements:</b></p><p>World Cup: Won the 1975 FIH Hockey World Cup in Kuala Lumpur.</p><p>Asian Games: Men's team gold in 1966, 1998, 2014, 2022; women's team gold in 1982.</p><p>Women's Hockey: Fourth place at the 1974 World Cup and Tokyo 2020 Olympics.</p><p>Asian Champions Trophy: Men's team won a record five titles (2011, 2016, 2018, 2023, 2024).</p><p></p>",
    "question_index": 45
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the India International Science Festival (IISF):</p><p>1) The IISF was started in the year 2020.</p><p>2) The 6th edition of the India International Science Festival (IISF) was held in Chandigarh from 6th to 9th December 2025.</p><p>3) The official theme for IISF 2025 was \"Vigyan se Samruddhi: For Atma Nirbhar Bharat\" (Prosperity Through Science for a Self-Reliant India).</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2350;&#2361;&#2379;&#2340;&#2381;&#2360;&#2357; (IISF) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) IISF &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2357;&#2352;&#2381;&#2359; 2020 &#2350;&#2375;&#2306; &#2361;&#2369;&#2312; &#2341;&#2368;&#2404;</p><p>2) &#2349;&#2366;&#2352;&#2340; &#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2350;&#2361;&#2379;&#2340;&#2381;&#2360;&#2357; (IISF) &#2325;&#2366; &#2331;&#2336;&#2366; &#2360;&#2306;&#2360;&#2381;&#2325;&#2352;&#2339; 6 &#2360;&#2375; 9 &#2342;&#2367;&#2360;&#2306;&#2348;&#2352; 2025 &#2340;&#2325; &#2330;&#2306;&#2337;&#2368;&#2327;&#2338;&#2364; &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>3) IISF 2025 &#2325;&#2366; &#2310;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2325; &#2357;&#2367;&#2359;&#2351; \"&#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2360;&#2375; &#2360;&#2350;&#2371;&#2342;&#2381;&#2343;&#2367;: &#2310;&#2340;&#2381;&#2350;&#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2349;&#2366;&#2352;&#2340;\" &#2341;&#2366;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The <b>India International Science Festival (IISF)</b> was <b>launched in 2015</b>, not in 2020.</p><p>The <b>6th edition of IISF was held in 2020</b>, and it was conducted in <b>virtual mode</b> due to the COVID-19 pandemic.</p><p>The India International Science Festival (IISF) 2025 was the 11th edition, held from December 6-9, 2025, in Panchkula, Haryana, with the theme \"Vigyan Se Samruddhi: for Aatmanirbhar Bharat\" (Science for Prosperity: for a Self-Reliant India).</p><p><b><u>Further Insights </u></b></p><p>&#183; IISF acts as a bridge between scientists, students, industry, and citizens.</p><p>&#183; It supports India's transition to a knowledge-driven economy.</p><p>&#183; The festival promotes indigenous research and innovation ecosystems.</p><p>&#183; IISF reinforces Article 51A(h) - development of scientific temper.</p>",
    "question_index": 46
  },
