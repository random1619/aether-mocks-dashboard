    "question": "<span class=\"eqt\"><p>Arrange the following Indian music treatises in chronological order:</p><p>1) Natya Shastra</p><p>2) Brihaddeshi</p><p>3) Sangita Ratnakara</p><p>4) Chaturdandi Prakashika</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2327;&#2368;&#2340; &#2327;&#2381;&#2352;&#2306;&#2341;&#2379;&#2306; &#2325;&#2379; &#2325;&#2366;&#2354;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2344;&#2366;&#2335;&#2381;&#2351; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;</p><p>2) &#2348;&#2371;&#2361;&#2342;&#2342;&#2375;&#2358;&#2368;</p><p>3) &#2360;&#2306;&#2327;&#2368;&#2340;&#2366; &#2352;&#2340;&#2381;&#2344;&#2366;&#2325;&#2352;</p><p>4) &#2330;&#2340;&#2369;&#2352;&#2381;&#2342;&#2306;&#2337;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2325;&#2366;</p></span>",
    "options": [
      "<span class=\"eqt\">1 - 2 - 3 - 4</span><span class=\"hqt\" style=\"display:none\">1 - 2 - 3 - 4</span>",
      "<span class=\"eqt\">1 - 3 - 2 - 4</span><span class=\"hqt\" style=\"display:none\">1 - 3 - 2 - 4</span>",
      "<span class=\"eqt\">2 - 1 - 3 - 4</span><span class=\"hqt\" style=\"display:none\">2 - 1 - 3 - 4</span>",

    "correct_option_id": 0,
    "solution": "<p>&#183; Natya Shastra (Bharata Muni): Roughly 2nd century BCE  -  2nd century CE. It is the earliest comprehensive work on performing arts.</p><p>&#183; Brihaddeshi (Matanga Muni): Roughly 6th - 8th century CE. It is the first text to speak directly about \"Ragas.\"</p><p>&#183; Sangita Ratnakara (Sarangadeva): 13th century. A definitive text written during the medieval period.</p><p>&#183; Chaturdandi Prakashika (Venkatamakhin): 17th century. This text laid the foundation for the Melakarta system in Carnatic music.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about Shola - Grassland ecosystems:</p><p>1) They are confined to high-altitude regions of the Western Ghats.</p><p>2) They are maintained partly due to climatic conditions and fire resistance of grasslands.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2379;&#2354;&#2366; &#2328;&#2366;&#2360; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2351;&#2375; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335; &#2325;&#2375; &#2313;&#2330;&#2381;&#2330; &#2314;&#2306;&#2330;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2340;&#2325; &#2361;&#2368; &#2360;&#2368;&#2350;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2328;&#2366;&#2360; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2325;&#2368; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369; &#2346;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2309;&#2327;&#2381;&#2344;&#2367; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;&#2325; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2311;&#2344;&#2325;&#2366; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2310;&#2306;&#2358;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2349;&#2357; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement 1 is correct: Sholas are stunted tropical montane forest patches found in the valleys of high-altitude grasslands, primarily in the higher reaches of the Nilgiris, Anaimalai, and Palani hills in the Western Ghats.</p><p>Statement 2 is correct: This is a \"mosaic\" ecosystem. The grasslands are maintained by a combination of high-altitude frost and periodic fires, which prevent the Shola trees (which are sensitive to fire and frost) from expanding into the open grasslands.</p>",

  },

    "question": "<span class=\"eqt\"><p>After 7 tests, a student's average is 45. What must be the score in the 8th test to raise the average by 20% of the current average?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2340; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2319;&#2325; &#2331;&#2366;&#2340;&#2381;&#2352; &#2325;&#2366; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; 45 &#2361;&#2376;&#2404; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; &#2350;&#2375;&#2306; 20% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2336;&#2357;&#2368;&#2306; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2309;&#2306;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2366; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Chitra and Deepak invest in a business in the ratio 5: 3. After 8 months, Deepak withdraws half his investment. At year-end, profit is &#8377;120,000, and Deepak receives a 10% commission before sharing the remainder. What is Chitra's share?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2367;&#2340;&#2381;&#2352;&#2366; &#2324;&#2352; &#2342;&#2368;&#2346;&#2325; &#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2350;&#2375;&#2306; 5:3 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; 8 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342;, &#2342;&#2368;&#2346;&#2325; &#2309;&#2346;&#2344;&#2366; &#2310;&#2343;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2344;&#2367;&#2325;&#2366;&#2354; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306;, &#2354;&#2366;&#2349; &#8377;120,000 &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2342;&#2368;&#2346;&#2325; &#2358;&#2375;&#2359; &#2352;&#2366;&#2358;&#2367; &#2348;&#2366;&#2305;&#2335;&#2344;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; 10% &#2325;&#2350;&#2368;&#2358;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2330;&#2367;&#2340;&#2381;&#2352;&#2366; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>A company spends its monthly transport budget on fuel, maintenance, and toll charges in the ratio 3 : 5 : 2. In the next month, fuel cost increases by 20%, maintenance cost decreases by 10%, and toll charges increase by 5%. What is the overall percentage change in the total transport expenditure?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2309;&#2346;&#2344;&#2375; &#2350;&#2366;&#2360;&#2367;&#2325; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344; &#2348;&#2332;&#2335; &#2325;&#2379; &#2312;&#2306;&#2343;&#2344;, &#2352;&#2326;&#2352;&#2326;&#2366;&#2357; &#2324;&#2352; &#2335;&#2379;&#2354; &#2358;&#2369;&#2354;&#2381;&#2325; &#2346;&#2352; 3:5:2 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2326;&#2352;&#2381;&#2330; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2309;&#2327;&#2354;&#2375; &#2350;&#2361;&#2368;&#2344;&#2375;, &#2312;&#2306;&#2343;&#2344; &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; &#2350;&#2375;&#2306; 20% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2352;&#2326;&#2352;&#2326;&#2366;&#2357; &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; &#2350;&#2375;&#2306; 10% &#2325;&#2368; &#2325;&#2350;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2335;&#2379;&#2354; &#2358;&#2369;&#2354;&#2381;&#2325; &#2350;&#2375;&#2306; 5% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; &#2325;&#2369;&#2354; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344; &#2357;&#2381;&#2351;&#2351; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">2% decrease</span><span class=\"hqt\" style=\"display:none\">2% &#2325;&#2368; &#2325;&#2350;&#2368;</span>",

      "<span class=\"eqt\">3% decrease</span><span class=\"hqt\" style=\"display:none\">3% &#2325;&#2368; &#2325;&#2350;&#2368;</span>",
      "<span class=\"eqt\">3% increase</span><span class=\"hqt\" style=\"display:none\">3% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let, the monthly transport budget be divided in the ratio 3 : 5 : 2.</p><p>Let, total expenditure = &#8377;10000</p><p>Fuel cost = 3/10 of 10000 = &#8377;3000</p><p>Maintenance cost = 5/10 of 10000 = &#8377;5000</p><p>Toll charges = 2/10 of 10000 = &#8377;2000</p><p>New fuel cost = 3000 + 20% of 3000 = &#8377;3600</p><p>New maintenance cost = 5000 - 10% of 5000 = &#8377;4500</p><p>New toll charges = 2000 + 5% of 2000 = &#8377;2100</p><p>Total new expenditure = 3600 + 4500 + 2100 = &#8377;10200</p><p>Percentage change = [(10200 - 10000)/10000]  100 = 2% increase</p>",
    "question_index": 61
  },

    "question": "<span class=\"eqt\"><p>Cheap and best, a kirana shop bought some apples at 4 per rupee and an equal number at 5 per rupee. He then sold the entire quantity at 9 for 2 rupee. What is his percentage profit or loss?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2367;&#2352;&#2366;&#2344;&#2366; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2344;&#2375; &#2360;&#2360;&#2381;&#2340;&#2375; &#2324;&#2352; &#2313;&#2340;&#2381;&#2340;&#2350; &#2360;&#2375;&#2348; &#2326;&#2352;&#2368;&#2342;&#2375;, &#2332;&#2361;&#2366;&#2305; &#2325;&#2369;&#2331; &#2360;&#2375;&#2348; 4 &#2360;&#2375;&#2348; &#2346;&#2381;&#2352;&#2340;&#2367; &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2324;&#2352; &#2360;&#2350;&#2366;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2360;&#2375;&#2348; 5 &#2360;&#2375;&#2348; &#2346;&#2381;&#2352;&#2340;&#2367; &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2326;&#2352;&#2368;&#2342;&#2375; &#2324;&#2352; &#2311;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2313;&#2360;&#2344;&#2375; &#2360;&#2349;&#2368; &#2360;&#2375;&#2348; 2 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; 9 &#2360;&#2375;&#2348; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2348;&#2375;&#2330;&#2375;&#2404; &#2313;&#2360;&#2325;&#2366; &#2354;&#2366;&#2349; &#2351;&#2366; &#2361;&#2366;&#2344;&#2367; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",

      "<span class=\"eqt\">6.66% loss</span><span class=\"hqt\" style=\"display:none\">6.66% &#2361;&#2366;&#2344;&#2367;</span>",

    "question": "<span class=\"eqt\"><p>A dealer imports tea at &#8377;200/kg, pays 15% import duty and 5% transport on cost price, marks at &#8377;400/kg, sells at 10% discount. What is his profit %?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2368; &#8377;200/&#2325;&#2367;&#2354;&#2379; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2330;&#2366;&#2351; &#2310;&#2351;&#2366;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2354;&#2366;&#2327;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 15% &#2310;&#2351;&#2366;&#2340; &#2358;&#2369;&#2354;&#2381;&#2325; &#2324;&#2352; 5% &#2346;&#2352;&#2367;&#2357;&#2361;&#2344; &#2358;&#2369;&#2354;&#2381;&#2325; &#2309;&#2342;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#8377;400/&#2325;&#2367;&#2354;&#2379; &#2325;&#2366; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2354;&#2327;&#2366;&#2325;&#2352; 10% &#2325;&#2368; &#2331;&#2370;&#2335; &#2346;&#2352; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2366; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</span>",
    "options": [

      "<span class=\"eqt\">55%</span><span class=\"hqt\" style=\"display:none\">55%</span>",
      "<span class=\"eqt\">60%</span><span class=\"hqt\" style=\"display:none\">60%</span>"

    "correct_option_id": 1,
    "solution": "<p>Cost price per kg = Rs. 200</p><p>Import duty = 15% of 200 = Rs. 30</p><p>Transport charges = 5% of 200 = Rs. 10</p><p>Total cost price per kg = 200 + 30 + 10 = Rs. 240</p><p>Marked price per kg = Rs. 400</p><p>Discount = 10% of 400 = Rs. 40</p><p>Selling price per kg = 400 - 40 = Rs. 360</p><p>Profit per kg = 360 - 240 = Rs. 120</p><p>Profit percentage = (120 / 240)  100 = 50%</p>",

    "question": "<p>Identify the segment in the sentence that contains a grammatical error. </p><p>Not only the kids but also the mother were enjoying the peaceful afternoon picnic by the lake. </p>",
    "options": [
      "Not only the kids but",
      "also the mother were",
      "enjoying the peaceful afternoon",
      "picnic by the lake"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in segment (b) \"also the mother were.\" The phrase \"Not only...but also\" is a correlative conjunction pair that connects two subjects. When using \"Not only...but also,\" the verb should agree with the subject closest to it. In this sentence, \"the mother\" is closer to the verb \"were\" than \"the kids.\" Since \"the mother\" is a singular subject, the singular verb \"was\" should have been used in place of plural verb \"were\". Hence, (b) is the correct answer. </p><p>Note: A correlative conjunction is a pair of conjunctions that work together to link balanced or parallel words, phrases, or clauses in a sentence. They are used to join equal grammatical elements and ensure the sentence is clear and logically structured. </p><p>The corrected sentence: Not only the kids but also the mother <b>was</b> enjoying the peaceful afternoon picnic by the lake.</p>",

  },
