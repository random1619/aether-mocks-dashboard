    "question": "<span class=\"eqt\"><p>Which of the following best describes the \"Liquidity Trap\" in an economy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; \"&#2340;&#2352;&#2354;&#2340;&#2366; &#2332;&#2366;&#2354;\" &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A situation where the central bank increases interest rates to curb hyperinflation, leading to a sudden halt in consumer spending.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2320;&#2360;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325; &#2309;&#2340;&#2367; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2379; &#2352;&#2379;&#2325;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366; &#2326;&#2352;&#2381;&#2330; &#2350;&#2375;&#2306; &#2309;&#2330;&#2366;&#2344;&#2325; &#2336;&#2361;&#2352;&#2366;&#2357; &#2310; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A condition where commercial banks refuse to lend money to the public despite having excess reserves due to high Non-Performing Assets (NPAs).</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2320;&#2360;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2332;&#2361;&#2366;&#2306; &#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351;&#2367;&#2325; &#2348;&#2376;&#2306;&#2325; &#2313;&#2330;&#2381;&#2330; &#2327;&#2376;&#2352;-&#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; (&#2319;&#2344;&#2346;&#2368;&#2319;) &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2349;&#2306;&#2337;&#2366;&#2352; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2357;&#2332;&#2370;&#2342; &#2332;&#2344;&#2340;&#2366; &#2325;&#2379; &#2346;&#2376;&#2360;&#2366; &#2313;&#2343;&#2366;&#2352; &#2342;&#2375;&#2344;&#2375; &#2360;&#2375; &#2311;&#2344;&#2325;&#2366;&#2352; &#2325;&#2352; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">A situation where nominal interest rates are so low that people prefer to hold cash rather than invest in bonds, making monetary policy ineffective.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2320;&#2360;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2332;&#2361;&#2366;&#2306; &#2344;&#2366;&#2350;&#2350;&#2366;&#2340;&#2381;&#2352; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352;&#2375;&#2306; &#2311;&#2340;&#2344;&#2368; &#2325;&#2350; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306; &#2325;&#2367; &#2354;&#2379;&#2327; &#2348;&#2366;&#2306;&#2337; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2344;&#2325;&#2342;&#2368; &#2352;&#2326;&#2344;&#2366; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367; &#2309;&#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A scenario where the government's fiscal deficit exceeds the growth rate of the GDP, leading to a \"crowding out\" of private investment</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2320;&#2360;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2332;&#2361;&#2366;&#2306; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2366; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2325;&#2368; &#2357;&#2367;&#2325;&#2366;&#2360; &#2342;&#2352; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2344;&#2367;&#2332;&#2368; &#2344;&#2367;&#2357;&#2375;&#2358; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368; &#2310;&#2344;&#2375; &#2354;&#2327;&#2340;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A Liquidity Trap occurs when interest rates are very low (near zero) and savings rates are high, rendering monetary policy ineffective. In this state, consumers and investors avoid bonds and keep their funds in cash or bank accounts because they believe interest rates will soon rise (causing bond prices to fall).</p><p></p><p>Further Insights:</p><p>Keynesian Concept: This phenomenon was first described by John Maynard Keynes.</p><p>Monetary Policy Failure: In a liquidity trap, even if the Central Bank (like the RBI) increases the money supply to stimulate the economy, it fails to lower interest rates further or stimulate borrowing/spending.</p><p>Fiscal Policy: Economists generally suggest that during a liquidity trap, Fiscal Policy (government spending) is more effective than monetary policy to revive demand.</p>",
    "question_index": 42
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding India's performance at the 4th Thailand Open International Boxing Tournament:</p><p>1. Deepak won the gold medal in the 75 kg category by defeating Abdurakhimov Javokhir of Uzbekistan with a 5:0 decision.</p><p>2. Kiran won the gold medal in the women's 80 kg category by defeating Kazakhstan's Yeldana Talipova.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>4&#2357;&#2375;&#2306; &#2341;&#2366;&#2312;&#2354;&#2376;&#2306;&#2337; &#2323;&#2346;&#2344; &#2309;&#2306;&#2340;&#2352;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2350;&#2369;&#2325;&#2381;&#2325;&#2375;&#2348;&#2366;&#2332;&#2368; &#2335;&#2370;&#2352;&#2381;&#2344;&#2366;&#2350;&#2375;&#2306;&#2335; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2342;&#2368;&#2346;&#2325; &#2344;&#2375; 75 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2350;&#2375;&#2306; &#2313;&#2332;&#2381;&#2348;&#2375;&#2325;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344; &#2325;&#2375; &#2309;&#2348;&#2381;&#2342;&#2369;&#2352;&#2366;&#2326;&#2367;&#2350;&#2379;&#2357; &#2332;&#2366;&#2357;&#2379;&#2326;&#2367;&#2352; &#2325;&#2379; 5:0 &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2360;&#2375; &#2361;&#2352;&#2366;&#2325;&#2352; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2346;&#2342;&#2325; &#2332;&#2368;&#2340;&#2366;&#2404;</p><p>2. &#2325;&#2367;&#2352;&#2339; &#2344;&#2375; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; 80 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2350;&#2375;&#2306; &#2325;&#2332;&#2366;&#2325;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344; &#2325;&#2368; &#2351;&#2375;&#2354;&#2342;&#2366;&#2344;&#2366; &#2340;&#2354;&#2368;&#2346;&#2379;&#2357;&#2366; &#2325;&#2379; &#2361;&#2352;&#2366;&#2325;&#2352; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2346;&#2342;&#2325; &#2332;&#2368;&#2340;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Deepak won the gold medal in the 75 kg category after defeating Uzbekistan's Abdurakhimov Javokhir with a unanimous 5:0 decision.</p><p>However, Kiran did not win gold; she lost the women's 80 kg final 2:3 to Kazakhstan's Yeldana Talipova and secured a silver medal.</p><p>Hence, statement 1 is correct while statement 2 is incorrect.</p><p></p><p><b>Further insights</b></p><p>In the 4th Thailand Open International Boxing Tournament, Deepak and Naman Tanwar spearheaded India's campaign, securing two golds as part of an impressive eight-medal haul. Deepak clinched the gold with a 5:0 win over Abdurakhimov Javokhir of Uzbekistan in the 75 kg final, while Naman got the better of China's Han Xuezhen 4:1 in the 90 kg category. In the women's 80 kg final, Kiran went down 2:3 to Kazakhstan's Yeldana Talipova in a keenly fought bout to settle for a silver. Five Indian women boxers, Tamanna (51kg), Priya (57kg), Sanju (60kg), Saneh (70kg), and Lalfakmawii Ralte (80kg), came up with strong performances to win bronze medals.</p>",
    "question_index": 43
  },

    "question": "<span class=\"eqt\"><p>12 districts of Chhattisgarh have earned national recognition for their efforts in water conservation and community-driven initiatives in November 2025. Which district was honoured for its work under the Jal Sanchaay Janbhagidari Abhiyan?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2331;&#2340;&#2381;&#2340;&#2368;&#2360;&#2327;&#2338;&#2364; &#2325;&#2375; 12 &#2332;&#2367;&#2354;&#2379;&#2306; &#2344;&#2375; &#2344;&#2357;&#2306;&#2348;&#2352; 2025 &#2350;&#2375;&#2306; &#2332;&#2354; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2324;&#2352; &#2360;&#2366;&#2350;&#2369;&#2342;&#2366;&#2351;&#2367;&#2325;-&#2360;&#2306;&#2330;&#2366;&#2354;&#2367;&#2340; &#2346;&#2361;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2375; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2368; &#2361;&#2376;&#2404; &#2332;&#2354; &#2360;&#2306;&#2330;&#2351; &#2332;&#2344;&#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2368; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; &#2325;&#2375; &#2340;&#2361;&#2340; &#2309;&#2346;&#2344;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2332;&#2367;&#2354;&#2375; &#2325;&#2379; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Raigarh</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2351;&#2327;&#2338;&#2364;</span>",
      "<span class=\"eqt\">Raipur</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2351;&#2346;&#2369;&#2352;</span>",
      "<span class=\"eqt\">Durg</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2369;&#2352;&#2381;&#2327;</span>",
      "<span class=\"eqt\">Surajpur</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2352;&#2332;&#2346;&#2369;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Raipur</b> district was honoured for its outstanding work under the <b>Jal Sanchaay Janbhagidari Abhiyan (Water Conservation Public Participation Campaign).</b></p><p></p><p>Marking a major milestone in water conservation and community-driven initiatives, 12 districts of Chhattisgarh have earned national recognition for their efforts. President Droupadi Murmu felicitated these districts during the 6th National Water Awards and Jal Sanchay Jan Bhagidari 1.0 Awards.</p><p>The districts include Raipur, Gariaband, Mahasamund, Rajnandgaon, Balodabazar'Bhatapara, Dhamtari, Balod, Balrampur, Bilaspur, Raigarh, Durg and Surajpur. Raipur district was honoured for its outstanding work under the Jal Sanchaay Janbhagidari Abhiyan (Water Conservation Public Participation Campaign).</p><p>Among municipal corporations across the country, Raipur Municipal Corporation secured the first position, while Raipur district ranked third in the Eastern Zone Category 01.</p><p>Rajnandgaon district secured the first position in the National Water Awards under the East Zone and second place in the Public Participation Category 01, earning an incentive of Rs. 2 crore. Mahasamund district took first place in Category 02 with 35,182 water structures built.</p><p>Balodabazar'Bhatapara secured second place in the same category and received Rs.1 crore for completing 30,927 structures. Balod district ranked first in Category 01 for best performing district and also received Rs.2 crore in incentives, constructing 92,742 new water structures. Bilaspur district secured first position in Category 03 and received Rs. 25 lakh for constructing 21,058 structures.</p><p>Durg district ranked 16th in the category and received Rs. 25 lakh for completing 5,010 projects. Balrampur district was ranked sixth in Category 03, also receiving Rs. 25 lakh, having completed 8,644 water conservation projects.</p>",
    "question_index": 44
  },

    "question": "<span class=\"eqt\"><p>Which act replaced the Foreign Exchange Regulation Act (FERA) as part of the 1991 economic reforms?</p></span><span class=\"hqt\" style=\"display:none\"><p>1991 &#2325;&#2375; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2340;&#2361;&#2340; &#2325;&#2367;&#2360; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2344;&#2375; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (FERA) &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2354;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Foreign Exchange Management Act (FEMA)</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (FEMA)</span>",
      "<span class=\"eqt\">Foreign Trade Act (FTA)</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (FTA)</span>",
      "<span class=\"eqt\">International Investment Act (IIA)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2344;&#2367;&#2357;&#2375;&#2358; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (IIA)</span>",
      "<span class=\"eqt\">Foreign Exchange Reform Act (FERA)</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2360;&#2369;&#2343;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (FERA)</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The <b>Foreign Exchange Management Act (FEMA) replaced FERA, aiming to liberalize and simplify foreign exchange regulations.</b></p><p><b>Further Insight:</b></p> <h3 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt;page-break-after:auto'>&bull; <b>FERA (Foreign Exchange Regulation Act, 1973)</b></h3><p>&#9675; Year of Implementation: 1974</p><p>&#9675; Objectives:</p><p>&#9632; To regulate and control foreign exchange transactions.</p><p>&#9632; To ensure proper utilization of foreign exchange resources.</p><p>&#9632; To prevent capital flight from India.</p><p>&#9632; Placed strict restrictions on foreign investments, aiming to conserve foreign exchange reserves.</p><p>&#9632; Imposed stringent controls on payments and remittances to foreign countries.</p> <h3 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt;page-break-after:auto'>&bull; <b>FEMA (Foreign Exchange Management Act, 1999)</b></h3><p>&bull; Year of Implementation: 2000 (replaced FERA)</p><p>&bull; Key Objectives:</p><p>&#9675; To facilitate external trade and payments.</p><p>&#9675; To promote the orderly development and maintenance of the foreign exchange market in India.</p><p>&#9675; <b>Replaced the stringent FERA with more relaxed provisions to align with India's liberalized economic environment.</b></p><p>&#9675; Focused on management rather than regulation of foreign exchange, with a shift from enforcement to facilitation.</p>",
    "question_index": 45
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements is incorrect about boxing?</p><p>I. An 'uppercut' is a punch thrown upwards, typically aimed at the opponent's chin.</p><p>II. 'Throwing in the towel' is a legal move where a boxer can use a towel to momentarily block a punch.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2369;&#2325;&#2381;&#2325;&#2375;&#2348;&#2366;&#2332;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p><p>I. '&#2309;&#2346;&#2352;&#2325;&#2335;' &#2314;&#2346;&#2352; &#2325;&#2368; &#2323;&#2352; &#2347;&#2375;&#2306;&#2325;&#2366; &#2327;&#2351;&#2366; &#2319;&#2325; &#2350;&#2369;&#2325;&#2381;&#2325;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2342;&#2381;&#2357;&#2306;&#2342;&#2381;&#2357;&#2368; &#2325;&#2368; &#2336;&#2379;&#2337;&#2364;&#2368; &#2346;&#2352; &#2344;&#2367;&#2358;&#2366;&#2344;&#2366; &#2360;&#2366;&#2343;&#2325;&#2352; &#2350;&#2366;&#2352;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. '&#2340;&#2380;&#2354;&#2367;&#2351;&#2366; &#2347;&#2375;&#2306;&#2325;&#2344;&#2366;' &#2319;&#2325; &#2357;&#2376;&#2343; &#2330;&#2366;&#2354; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2350;&#2369;&#2325;&#2381;&#2325;&#2375;&#2348;&#2366;&#2332;&#2364; &#2350;&#2369;&#2325;&#2381;&#2325;&#2375; &#2325;&#2379; &#2325;&#2381;&#2359;&#2339; &#2349;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2379;&#2325;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2340;&#2380;&#2354;&#2367;&#2351;&#2375; &#2325;&#2366; &#2311;&#2360;&#2381;&#2340;&#2375;&#2350;&#2366;&#2354; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Only statement II is incorrect.</p><p>Statement I gives a perfect description of an 'uppercut'.</p><p>Statement II is incorrect; 'throwing in the towel' is a colloquial term for a corner conceding the fight on behalf of their boxer. It is not a defensive move.</p>",
    "question_index": 46
  },

    "question": "<span class=\"eqt\"><p>Which element is located in Group 1 and Period 2 of the periodic table? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; 1 &#2324;&#2352; &#2310;&#2357;&#2352;&#2381;&#2340; 2 &#2350;&#2375;&#2306; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2340;&#2340;&#2381;&#2357; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Helium</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2368;&#2354;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Lithium</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2367;&#2341;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Sodium</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Beryllium</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2352;&#2367;&#2354;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The periodic table is organized based on the electronic structure of atoms, and elements with similar chemical properties are grouped together. In this context:</p><p>&#183; <b>Group 1</b> elements are known as alkali metals. They have one electron in their outermost shell and are highly reactive.</p><p>&#183; <b>Period 2</b> refers to the second horizontal row of the periodic table.</p><p><b>Lithium (Li)</b> is in Group 1 and Period 2. It has atomic number 3, and it is the first element in the alkali metal group.</p>",
    "question_index": 47
  },

    "question": "<span class=\"eqt\"><p>In the following question, two statements are given as Assertion (A) and Reason (R). Read the statements and choose the correct option from the codes given below.</p><p>Assertion (A): The office of the Vice-President of India is considered to be a part of both the Executive and Legislative branches of the government.</p><p>Reason (R): The Vice-President is the ex-officio Chairman of the Rajya Sabha and also discharges the functions of the President in the event of a vacancy in that office.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2342;&#2379; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;: &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A) &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; (R)&#2404; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2367;&#2319; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2370;&#2335; &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2367;&#2319;&#2404;</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2366; &#2346;&#2342; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2324;&#2352; &#2357;&#2367;&#2343;&#2366;&#2351;&#2368;, &#2342;&#2379;&#2344;&#2379;&#2306; &#2358;&#2366;&#2326;&#2366;&#2323;&#2306; &#2325;&#2366; &#2319;&#2325; &#2309;&#2306;&#2327; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2325;&#2366; &#2346;&#2342;&#2375;&#2344; &#2360;&#2349;&#2366;&#2346;&#2340;&#2367; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360; &#2346;&#2342; &#2325;&#2375; &#2352;&#2367;&#2325;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2325;&#2366; &#2349;&#2368; &#2344;&#2367;&#2352;&#2381;&#2357;&#2361;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2340;&#2341;&#2366; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, but R is false.</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true.</span><span class=\"hqt\" style=\"display:none\">A &#2327;&#2354;&#2340; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Assertion (A) is true.</b> The Vice-President holds a unique dual role.</p><p><b>Reason (R) is also true.</b> It accurately describes the two primary functions of the Vice-President.</p><p><b>R is the correct explanation of A.</b> The reason provides the specific evidence for the assertion. The Vice-President's role as the ex-officio Chairman of the Rajya Sabha (the upper house of Parliament) places them firmly within the <b>Legislative</b> branch.</p><p>Simultaneously, their constitutional duty to act as President (the head of the Executive) during a vacancy places them within the <b>Executive</b> branch. Therefore, the functions described in the Reason (R) are precisely why the Assertion (A) is correct.</p>",
    "question_index": 48
  },

    "question": "<span class=\"eqt\"><p>'Aligarh Movement' was started by</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2309;&#2354;&#2368;&#2327;&#2338;&#2364; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;------------ ' &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;</p></span>",
    "options": [
      "<span class=\"eqt\">Sir Syed Ahmed Khan</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352; &#2360;&#2376;&#2351;&#2342; &#2309;&#2361;&#2350;&#2342; &#2326;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Mirza Ghulam Ahmed</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2352;&#2381;&#2332;&#2366; &#2327;&#2369;&#2354;&#2366;&#2350; &#2309;&#2361;&#2350;&#2342;</span>",
      "<span class=\"eqt\">Sayyid Ahmed Raebarelvi</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2376;&#2351;&#2342; &#2309;&#2361;&#2350;&#2342; &#2352;&#2366;&#2351;&#2348;&#2352;&#2375;&#2354;&#2357;&#2368;</span>",
      "<span class=\"eqt\">Shah Walliullah</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2361; &#2357;&#2366;&#2354;&#2367;&#2354;&#2381;&#2354;&#2366;&#2361;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The 'Aligarh Movement' was started by <b>Sir Syed Ahmed Khan</b> in the latter half of the 19th century.</p><p>It was a significant socio-religious and educational reform movement among Muslims in India.</p><p>The movement aimed to promote modern Western education, scientific thought, and social reforms within the Muslim community to enable them to adapt to the changing political and social landscape of British India.</p><p>Explanation of Other Options:</p><p>(b) Mirza Ghulam Ahmed: He was the founder of the Ahmadiyya Movement in Islam in the late 19th century.</p><p>(c) Sayyid Ahmed Raebarelvi (Syed Ahmad Barelvi): He was a key figure in the Wahhabi Movement in India in the early 19th century, which was a revivalist religious movement.</p><p>(d) Shah Waliullah Dehlawi: An 18th-century Islamic scholar and reformer who sought to revitalize Islamic thought and practice in India.</p><p>Further insights:</p><p>The centerpiece of the Aligarh Movement was the establishment of the Muhammadan Anglo-Oriental (MAO) College in Aligarh in 1875, which aimed to provide modern education along with Islamic studies.</p><p>The MAO College later developed into the Aligarh Muslim University (AMU) in 1920.</p><p>The movement also published journals like \"Tahdhib-ul-Akhlaq\" (Refinement of Morals) to spread its ideas of social reform and rationalism.</p>",
    "question_index": 49
  },

    "question": "<span class=\"eqt\"><p>The average of 27 scores is 65. Each score is increased by 40% and then decreased by 13. Find the new average.</p></span><span class=\"hqt\" style=\"display:none\"><p>27 &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 65 &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2306;&#2325; &#2325;&#2379; 40% &#2348;&#2338;&#2364;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2347;&#2367;&#2352; 13 &#2328;&#2335;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2351;&#2366; &#2324;&#2360;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">80</span><span class=\"hqt\" style=\"display:none\">80</span>",
      "<span class=\"eqt\">78</span><span class=\"hqt\" style=\"display:none\">78</span>",
      "<span class=\"eqt\">76</span><span class=\"hqt\" style=\"display:none\">76</span>",
      "<span class=\"eqt\">82</span><span class=\"hqt\" style=\"display:none\">82</span>"

    "correct_option_id": 1,
    "solution": "<p>a = 65 * 140/100 = 65 * 1.4, b = 13 </p><p>Transformation of each value = a * 65  -  b</p><p>New average = 1.4 * 65 &#8722; 13 = 91 &#8722; 13 = 78</p>",
    "question_index": 50

    "correct_option_id": 3,

    "question": "<span class=\"eqt\"><p>On a particular day in a school, the number of present students was 50% more than the number of absent students. Among the present students, 40% were girls. 108 boys were absent that day. If 40% of the girls were absent that day, what is the total number of students in the school?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359; &#2342;&#2367;&#2344; &#2360;&#2381;&#2325;&#2370;&#2354; &#2350;&#2375;&#2306;, &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2309;&#2344;&#2369;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 50% &#2309;&#2343;&#2367;&#2325; &#2341;&#2368;&#2404; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; 40% &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2366;&#2306; &#2341;&#2368;&#2306;&#2404; &#2313;&#2360; &#2342;&#2367;&#2344; 108 &#2354;&#2337;&#2364;&#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2341;&#2375;&#2404; &#2351;&#2342;&#2367; &#2313;&#2360; &#2342;&#2367;&#2344; 40% &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2366;&#2306; &#2309;&#2344;&#2369;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2341;&#2368;&#2306;, &#2340;&#2379; &#2360;&#2381;&#2325;&#2370;&#2354; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>If commission C = r% of (profit &#8722; C), then C = [r/(100 + r)]  X  profit.</p><p>Here r = 20 =&gt; C = [20/120]  X  1,20,000 = 20,000.</p><p>Distributable profit = 1,20,000 &#8722; 20,000 = 1,00,000.</p><p>Profit share &#8733; Capital  X  Time =&gt; ratio 60,000 : 40,000 = 3 : 2.</p><p>Aarav's profit share = (3/5)  X  1,00,000 = 60,000.</p><p>Total earning = 20,000 + 60,000 = 80,000.</p>",
    "question_index": 61
  },

    "question": "<span class=\"eqt\"><p>The volume of a cylinder is 90% of the volume of a cone, and height of cylinder is 1.2 times of that of cone. If radius of the base of the cone is 72 cm, then find the radius of the cylinder.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344;, &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2325;&#2366; 90% &#2361;&#2376; &#2324;&#2352; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312;, &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2366; 1.2 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 72 cm &#2361;&#2376;, &#2340;&#2379; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">18 cm</span><span class=\"hqt\" style=\"display:none\">18 cm</span>",
      "<span class=\"eqt\">36 cm</span><span class=\"hqt\" style=\"display:none\">36 cm</span>",
      "<span class=\"eqt\">42 cm</span><span class=\"hqt\" style=\"display:none\">42 cm</span>",
      "<span class=\"eqt\">30 cm</span><span class=\"hqt\" style=\"display:none\">30 cm</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let height of the cone = h cm, then height of cylinder = 1.2h cm</p><p>According to the question,</p><p>(&#960;r<sup>2</sup>(1.2h))/(1/3 * &#960; * 72<sup>2</sup> * h) = 90/100</p><p>=&gt; 3.6r<sup>2</sup> /(72 * 72) = 90/100</p><p>=&gt; r<sup>2</sup> = 9/10 * (72 * 72)/3.6</p><p>=&gt; r<sup>2</sup> = 1296</p><p>=&gt; r = 36</p><p>Hence, radius of the cylinder = 36 cm</p>",
    "question_index": 64
  },

    "question": "<span class=\"eqt\"><p>Two traders A and B have mixtures of sugar and impurity in the ratios 3:2 and 4:1 respectively. They mix these mixtures in the ratio 1:1. The resulting mixture contains 32 kg more sugar than impurity. What is the total mass of sugar in the final mixture? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2368; A &#2324;&#2352; B &#2325;&#2375; &#2346;&#2366;&#2360; &#2330;&#2368;&#2344;&#2368; &#2324;&#2352; &#2309;&#2358;&#2369;&#2342;&#2381;&#2343;&#2367; &#2325;&#2375; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3:2 &#2324;&#2352; 4:1 &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2357;&#2375; &#2311;&#2344; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339;&#2379;&#2306; &#2325;&#2379; 1:1 &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2368; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2309;&#2358;&#2369;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 32 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2309;&#2343;&#2367;&#2325; &#2330;&#2368;&#2344;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; &#2309;&#2306;&#2340;&#2367;&#2350; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2330;&#2368;&#2344;&#2368; &#2325;&#2366; &#2325;&#2369;&#2354; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">48 kg</span><span class=\"hqt\" style=\"display:none\">48 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">56 kg</span><span class=\"hqt\" style=\"display:none\">56 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">64 kg</span><span class=\"hqt\" style=\"display:none\">64 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">72 kg</span><span class=\"hqt\" style=\"display:none\">72 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the quantity of mixture taken from each trader be x kg.</p><p>So, total final mixture = x + x = 2x kg</p><p>From trader A -</p><p>Ratio of sugar &amp; impurity = 3 : 2</p><p>Quantity of Sugar = (3/5)x kg</p><p>Quantity of Impurity = (2/5)x kg</p><p>From trader B -</p><p>Ratio of sugar &amp; impurity = 4 : 1</p><p>Quantity of Sugar = (4/5)x kg</p><p>Quantity of Impurity = (1/5)x kg</p><p>Now, total sugar in final mixture = (3/5)x + (4/5)x = (7/5)x kg</p><p>Total impurity in final mixture = (2/5)x + (1/5)x = (3/5)x kg</p><p>According to the question,</p><p>Sugar  -  Impurity = 32 kg</p><p>=&gt; (7/5)x &#8722; (3/5)x = 32</p><p>=&gt; (4/5)x = 32</p><p>=&gt; x = (32  X  5)/4 = 40</p><p>Total sugar = (7/5)  X  x = (7/5)  X  40 = 56 kg</p>",
    "question_index": 65
  },

    "question": "<span class=\"eqt\"><p>A can do a work in 12 days and B in 25 days. If they work together for 6 days, then the fraction of the work that is left is:</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2325;&#2367;&#2360;&#2368; &#2325;&#2366;&#2350; &#2325;&#2379; 12 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2324;&#2352; B, 25 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2375; 6 &#2342;&#2367;&#2344;&#2379;&#2306; &#2340;&#2325; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2325;&#2366;&#2350; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2349;&#2366;&#2327; &#2358;&#2375;&#2359; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">11/50</span><span class=\"hqt\" style=\"display:none\">11/50</span>",
      "<span class=\"eqt\">13/50</span><span class=\"hqt\" style=\"display:none\">13/50</span>",
      "<span class=\"eqt\">13/25</span><span class=\"hqt\" style=\"display:none\">13/25</span>",
      "<span class=\"eqt\">11/25</span><span class=\"hqt\" style=\"display:none\">11/25</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the total work = LCM of 12 and 25 = 300 units</p><p>Efficiency of A = 300/12 = 25 units/day</p><p>Efficiency of B = 300/25 = 12 units/day</p><p>Total work done after 6 days = 6 * (25 + 12) = 222 units</p><p>Remaining work = 300 - 222 = 78 units</p><p>Required fraction = 78/300 = 26/100 = 13/50</p><p></p>",
    "question_index": 66
  },

    "question": "<span class=\"eqt\"><p><div>&nbsp;If a<sup>2 </sup>+ b<sup>2</sup> = 45 and a - b = 9, then what is the value of&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a</span></div>&nbsp;-&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">b</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; a<sup>2 </sup>+ b<sup>2</sup> = 45 &#2324;&#2352; a - b = 9 &#2361;&#2376;, &#2340;&#2379; <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a</span></div>&nbsp;-&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">b</span></div> &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</div></p></span>",

    "solution": "<p>(a -b) = 9</p><p>(a -b)<sup>2</sup> = 81</p><p>a<sup>2 </sup>+ b<sup>2 </sup> -  2ab = 81</p><p>45 -2ab = 81</p><p>-2ab = 36</p><p>ab = -18</p><p>((1/a)  -  (1/b)) = ((b-a)/(ab)) = (-(a-b)/(ab)) = ((-9)/ (-18)) = 1/2</p>",

    "question": "<span class=\"eqt\"><p> A can do 10% of a work in 4 days, whereas B can do 40 % of the same work in 8 days. Both work together for 10 days. C completes the remaining work alone in 5 days. A and C together will complete 60% of the same work in:</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2366; 10%, 4 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; B &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2366; 40%, 8 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2379;&#2344;&#2379;&#2306; 10 &#2342;&#2367;&#2344;&#2379;&#2306; &#2340;&#2325; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; C &#2358;&#2375;&#2359; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2309;&#2325;&#2375;&#2354;&#2375; 5 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; A &#2324;&#2352; C &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2366; 60% &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2375;&#2306;&#2327;&#2375;?</p></span>",

    "correct_option_id": 1,
    "solution": "\"<p>A can do 10% of work in 4 days</p><p>so, A can do complete work i.e. 100% in 40 days</p><p>similarly, B can do complete work in 20 days</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/80a8c8a788183f63cf767a7667c9bdc1.png\" style=\"background-color: initial;\"><span style=\"background-color: initial;\"> <br></p><p>In 8 days work done by both A &amp; B together = 10&#215;(1+2)</p><p>= 30</p><p>Remaining work = 40-30</p><p>= 10</p><p>C did remaining work in 5 days</p><p> C's 1 Day work = 10/5 =2 units</p><p>Now, (A+C)'s 1 day work=1+2=3 units</p><p>60% of the work= 24 units</p><p>time required by A &amp; C to do 60% of the work=24/3=8 days</p>\"",

    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>Had the makeup been put on by the actress?</p>",

    "correct_option_id": 1,
    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the helping verb [been] and the preposition 'by' is necessary while changing the voice of the sentence from Passive to Active.</p><p>In Active voice (look at the options), it should be an <b>interrogative sentence</b>. The answer to this question will be either \"yes\" or \"no\".</p><p>These types of sentences usually begin with a helping verb like:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Have</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Has</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Had</b></td></tr></table></p><p>In Passive voice, the format is: <b>Have/Has/Had + Subject (Objective case) + been + V3 + by + Object (Subjective case)</b>.</p><p>Thus, the format of the sentence which begins with \"Have\", \"Has\" or \"Had\" in Active voice is: <b>Have/Has/Had + Subject + V3 + Object?</b></p><p>For example:</p><p>Had the letter been written by Rohit? (Passive)</p><p>Had Rohit written the letter? (Active)</p><p>The options except (b) don't follow the correct grammatical format of the Active Voice.</p><p>Thus, the correct answer is: <b>(b) Had the actress put on the makeup?</b></p>",
    "question_index": 81
