<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../../css/mock-main.css">

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Eight people were seated around a square table facing inwards such that one person was seated at each edge and one at each corner. K was seated third to the left of R. Two people were seated between S and K. J was seated to the immediate right of T but not adjacent to R. L was seated second to the right of J and third to the left of V. N was seated at an edge.</p><p>Who was seated opposite to N?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2336; &#2354;&#2379;&#2327; &#2319;&#2325; &#2330;&#2380;&#2325;&#2379;&#2352; &#2350;&#2375;&#2332; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2309;&#2306;&#2342;&#2352; &#2325;&#2368; &#2323;&#2352; &#2348;&#2376;&#2336;&#2375; &#2341;&#2375;, &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2367; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2325;&#2367;&#2344;&#2366;&#2352;&#2375; &#2346;&#2352; &#2324;&#2352; &#2319;&#2325; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2325;&#2379;&#2344;&#2375; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2341;&#2366;&#2404; K, R &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2340;&#2368;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2341;&#2366;&#2404; S &#2324;&#2352; K &#2325;&#2375; &#2348;&#2368;&#2330; &#2342;&#2379; &#2354;&#2379;&#2327; &#2348;&#2376;&#2336;&#2375; &#2341;&#2375;&#2404; J, T &#2325;&#2375; &#2340;&#2369;&#2352;&#2306;&#2340; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2348;&#2376;&#2336;&#2366; &#2341;&#2366; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2325;&#2375; &#2346;&#2366;&#2360; &#2344;&#2361;&#2368;&#2306; &#2341;&#2366;&#2404; L, J &#2325;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2324;&#2352; V &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2340;&#2368;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2341;&#2366;&#2404; N &#2319;&#2325; &#2325;&#2367;&#2344;&#2366;&#2352;&#2375; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2341;&#2366;&#2404;</p><p>N &#2325;&#2375; &#2360;&#2366;&#2350;&#2344;&#2375; &#2325;&#2380;&#2344; &#2348;&#2376;&#2336;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">J</span><span class=\"hqt\" style=\"display:none\">J</span>",
      "<span class=\"eqt\">S</span><span class=\"hqt\" style=\"display:none\">S</span>",
      "<span class=\"eqt\">T</span><span class=\"hqt\" style=\"display:none\">T</span>",
      "<span class=\"eqt\">R</span><span class=\"hqt\" style=\"display:none\">R</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>K was seated third to the left of R. Two people were seated between S and K.</p><p><b>Case 1:</b></p><p><img width=238 height=215 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11930/image001.jpg\"></p><p><b>Case 2:</b></p><p><img width=238 height=217 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11930/image002.jpg\"></p><p>J was seated to the immediate right of T but not adjacent to R.</p><p>Case 1:</p><p><b><img width=293 height=241 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11930/image003.png\"></b></p><p><b>Case 2:</b></p><p><b><img width=280 height=251 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11930/image004.png\"></b></p><p>L was seated second to the right of J and third to the left of V. N was seated at an edge.</p><p><b>So case 1 is invalid.</b></p><p><b><img width=267 height=247 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11930/image005.png\"></b></p><p>So T was seated opposite to N.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Find the missing term in the following series  - </p><p>456, ?, 708, 834, 960</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2354;&#2369;&#2346;&#2381;&#2340; &#2346;&#2342; &#2326;&#2379;&#2332;&#2375;&#2306; - </p><p>456, ?, 708, 834, 960</p></span>",
    "options": [
      "<span class=\"eqt\">596</span><span class=\"hqt\" style=\"display:none\">596</span>",
      "<span class=\"eqt\">554</span><span class=\"hqt\" style=\"display:none\">554</span>",
      "<span class=\"eqt\">602</span><span class=\"hqt\" style=\"display:none\">602</span>",
      "<span class=\"eqt\">582</span><span class=\"hqt\" style=\"display:none\">582</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Logic for the given series  -  </p><p>456 + 126 = <b>582</b></p><p>582 + 126 = 708</p><p>708 + 126 = 834</p><p>834 + 126 = 960</p><p>Hence, missing term = 582</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Find the missing term in the following series.</p><p>32 257 193 418 ? 579</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2354;&#2369;&#2346;&#2381;&#2340; &#2346;&#2342; &#2326;&#2379;&#2332;&#2375;&#2306;&#2404;</p><p>32 257 193 418 ? 579</p></span>",
    "options": [
      "<span class=\"eqt\">354</span><span class=\"hqt\" style=\"display:none\">354</span>",
      "<span class=\"eqt\">376</span><span class=\"hqt\" style=\"display:none\">376</span>",
      "<span class=\"eqt\">328</span><span class=\"hqt\" style=\"display:none\">328</span>",
      "<span class=\"eqt\">344</span><span class=\"hqt\" style=\"display:none\">344</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Pattern of the series  -  </p><p>32 + 225 = 257</p><p>257  -  64 = 193</p><p>193 + 225 = 418</p><p>418  -  64 = 354</p><p>354 + 225 = 579</p><p>354 Is the missing number in the series.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Two workers P and Q can finish a work in 150 minutes and 600 minutes respectively. In how much time the work will be finished if they work together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2350;&#2332;&#2342;&#2370;&#2352; P &#2324;&#2352; Q &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 150 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 600 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2366;&#2350; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2357;&#2375; &#2360;&#2366;&#2341; &#2350;&#2375;&#2306; &#2325;&#2366;&#2350; &#2325;&#2352;&#2375;&#2306; &#2340;&#2379; &#2325;&#2366;&#2350; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">175 minutes</span><span class=\"hqt\" style=\"display:none\">175 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">120 minutes</span><span class=\"hqt\" style=\"display:none\">120 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">100 minutes</span><span class=\"hqt\" style=\"display:none\">100 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">90 minutes</span><span class=\"hqt\" style=\"display:none\">90 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total work (LCM of 150 and 600) = 600 units</p><p>Efficiency of P = 600/150 = 4 units/minute</p><p>Efficiency of Q = 600/600 = 1 units/minute</p><p>Time taken by both P and Q together = 600/(1 + 4) = 120 minutes</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the best option that best completes the analogy</p><p>ADB : GJE :: CEL : IKO</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2326;&#2379;&#2332;&#2375;&#2306; &#2332;&#2379; &#2360;&#2350;&#2366;&#2344;&#2340;&#2366; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</p><p>ADB : GJE :: CEL : IKO</p></span>",
    "options": [
      "<span class=\"eqt\">BFM : LHO</span><span class=\"hqt\" style=\"display:none\">BFM : LHO</span>",
      "<span class=\"eqt\">HKL : OET</span><span class=\"hqt\" style=\"display:none\">HKL : OET</span>",
      "<span class=\"eqt\">HWT : NCW</span><span class=\"hqt\" style=\"display:none\">HWT : NCW</span>",
      "<span class=\"eqt\">LMT : QRD</span><span class=\"hqt\" style=\"display:none\">LMT : QRD</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>For ADB: A(1)+6=G(7), D(4)+6=J(10); B(2) + 3 = E(5)</p><p>For CEL: C(3)+6=I(9), E(5)+6=K(11); L(12) + 3 = O(15)</p><p>For HWT: H(8)+6=N(14), W(23)+6=C(29&rarr;3); T(20) + 3 = W(23)</p><p>Only HWT : NCW matches</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option that shows the given words arranged as they appear in an English dictionary.</p><p>I. Indicate</p><p>II. Indifferent</p><p>III. Indigenous</p><p>IV. Indict</p><p>V. Indigent</p><p>VI. Indiscreet</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306; &#2332;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2379; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2364;&#2368; &#2358;&#2348;&#2381;&#2342;&#2325;&#2379;&#2358; &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2375; &#2325;&#2381;&#2352;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2342;&#2367;&#2326;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>I. Indicate</p><p>II. Indifferent</p><p>III. Indigenous</p><p>IV. Indict</p><p>V. Indigent</p><p>VI. Indiscreet</p></span>",
    "options": [
      "<span class=\"eqt\">IV, I, II, V, III, VI</span><span class=\"hqt\" style=\"display:none\">IV, I, II, V, III, VI</span>",
      "<span class=\"eqt\">I, II, IV, III, V, VI</span><span class=\"hqt\" style=\"display:none\">I, II, IV, III, V, VI</span>",
      "<span class=\"eqt\">I, IV, II, III, V, VI</span><span class=\"hqt\" style=\"display:none\">I, IV, II, III, V, VI</span>",
      "<span class=\"eqt\">II, I, IV, V, III, VI</span><span class=\"hqt\" style=\"display:none\">II, I, IV, V, III, VI</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>(I) Indicate</p><p>(IV) Indict</p><p>(II) Indifferent</p><p>(III) Indigenous</p><p>(V) Indigent</p><p>(VI) Indiscreet</p><p>So, the dictionary order is (I), (IV), (II), (III), (V), (VI).</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In a code language, LANDSCAPE becomes RBCRGCBOM. How would CLOCKWISE be written?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, LANDSCAPE &#2325;&#2379; RBCRGCBOM &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; CLOCKWISE &#2325;&#2379; &#2325;&#2376;&#2360;&#2375; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">JVBUGKMPB</span><span class=\"hqt\" style=\"display:none\">JVBUGKMPB</span>",
      "<span class=\"eqt\">JVBUGKMPD</span><span class=\"hqt\" style=\"display:none\">JVBUGKMPD</span>",
      "<span class=\"eqt\">JVBUFKMPD</span><span class=\"hqt\" style=\"display:none\">JVBUFKMPD</span>",
      "<span class=\"eqt\">JVBUGKMPE</span><span class=\"hqt\" style=\"display:none\">JVBUGKMPE</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Make 3 blocks of 3 letters each.</p><p>In each block, rotate left by 1 letter.</p><p>Block 1 shift +1, Block 2 shift &#8722;1, Block 3 shift +2.</p><p>Finally, write blocks in order: Block 2, Block 3, Block 1.</p><p>LANDSCAPE &rarr; LAN | DSC | APE</p><p>Rotate left: ANL | SCD | PEA</p><p>Shift: ANL(+1)=BOM, SCD(&#8722;1)=RBC, PEA(+2)= RGC</p><p>Order 2,3,1 &rarr; RBC + RGC + BOM = RBCRGCBOM</p><p>CLOCKWISE &rarr; CLO | CKW | ISE</p><p>Rotate left: LOC | KWC | SEI</p><p>Shift: LOC(+1)=MPD, KWC(&#8722;1)=JVB, SEI(+2)=UGK</p><p>Order 2,3,1 &rarr; JVB + UGK + MPD = JVBUGKMPD</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>There are 40 parcels kept in a single line for scanning. Parcel P is 14th from the front. Parcel Q is 6 positions ahead of P, and parcel R is 9 positions behind P. What is R's position from the back?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2325;&#2376;&#2344;&#2367;&#2306;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2361;&#2368; &#2354;&#2366;&#2311;&#2344; &#2350;&#2375;&#2306; 40 &#2346;&#2366;&#2352;&#2381;&#2360;&#2354; &#2352;&#2326;&#2375; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2346;&#2366;&#2352;&#2381;&#2360;&#2354; P &#2360;&#2366;&#2350;&#2344;&#2375; &#2360;&#2375; 14&#2357;&#2366;&#2306; &#2361;&#2376;&#2404; &#2346;&#2366;&#2352;&#2381;&#2360;&#2354; Q, P &#2360;&#2375; 6 &#2360;&#2381;&#2341;&#2366;&#2344; &#2310;&#2327;&#2375; &#2361;&#2376;, &#2324;&#2352; &#2346;&#2366;&#2352;&#2381;&#2360;&#2354; R, P &#2360;&#2375; 9 &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2368;&#2331;&#2375; &#2361;&#2376;&#2404; R &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2346;&#2368;&#2331;&#2375; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">18th</span><span class=\"hqt\" style=\"display:none\">18&#2357;&#2366;&#2306;</span>",
      "<span class=\"eqt\">17th</span><span class=\"hqt\" style=\"display:none\">17&#2357;&#2366;&#2306;</span>",
      "<span class=\"eqt\">19th</span><span class=\"hqt\" style=\"display:none\">19&#2357;&#2366;&#2306;</span>",
      "<span class=\"eqt\">16th</span><span class=\"hqt\" style=\"display:none\">16&#2357;&#2366;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>P's position from front = 14</p><p>R is 9 positions behind P, so R's position from front = 14 + 9 = 23</p><p>R's position from back = 40 &#8722; 23 + 1 = 18</p>",
    "question_index": 7

      "<span class=\"eqt\">Only conclusion 1 follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; 1 &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",

    "solution": "<p><b>Statements:</b></p><p>Some Tablet is Medicine</p><p>No Medicine is Pill</p><p>All Pill are Capsule</p><p><b><img width=490 height=209 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24831/image025.jpg\"></b></p><p>Some Capsule is not Medicine: No Medicine is Pill. All Pill are Capsule. Thus, the Capsule which is Pill is not Medicine. So, conclusion 1 is true.</p><p>All Tablet being Capsule is a possibility: There is no direct relationship between Tablet and Capsule. Thus, there is a possibility of all Tablet being Capsule. So, conclusion 2 is true.</p><p>Hence, both conclusions 1 and 2 follow.</p>",

    "question": "<span class=\"eqt\"><p>The supreme court of India is bound to give its opinion in case of Advisory Jurisdiction under ____________ of the constitution.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; ____________ &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2354;&#2366;&#2361;&#2325;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2375; &#2350;&#2366;&#2350;&#2354;&#2375; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2368; &#2352;&#2366;&#2351; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2366;&#2343;&#2381;&#2351; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Article 135</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 135</span>",
      "<span class=\"eqt\">Article 138</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 138</span>",
      "<span class=\"eqt\">Article 143</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 143</span>",
      "<span class=\"eqt\">Article 148</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 148</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Constitution (Article 143) authorises the president to seek the opinion of the Supreme Court in the two categories of matters:</p><p>On any question of law or fact of public importance which has arisen or which is likely to arise.</p><p>On any dispute arising out of any pre-constitution treaty, agreement, covenant, engagement, sanador other similar instruments. In the first case, the Supreme Court may tender or may refuse to tender its opinion to the president. But, in the second case, the Supreme Court 'must' tender its opinion to the president.</p><p></p><p>Article 135: Jurisdiction and powers of the Supreme Court in certain cases.</p><p>Article 138: Enlargement of the jurisdiction of the Supreme Court.</p><p>Article 148: Comptroller and Auditor-General of India (CAG).</p>",

  },

    "question": "<span class=\"eqt\"><p>Regarding the Durand Cup:</p><p>I. It is the oldest existing football tournament in Asia and the third oldest in the world.</p><p>II. The tournament is unique because the winners are presented with three trophies: the Durand Cup, the Shimla Trophy, and the President's Cup.</p><p>Which of the statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2369;&#2352;&#2306;&#2337; &#2325;&#2346; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;:</p><p>I. &#2351;&#2361; &#2319;&#2358;&#2367;&#2351;&#2366; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2346;&#2369;&#2352;&#2366;&#2344;&#2366; &#2350;&#2380;&#2332;&#2370;&#2342;&#2366; &#2347;&#2369;&#2335;&#2348;&#2377;&#2354; &#2335;&#2370;&#2352;&#2381;&#2344;&#2366;&#2350;&#2375;&#2306;&#2335; &#2361;&#2376; &#2324;&#2352; &#2342;&#2369;&#2344;&#2367;&#2351;&#2366; &#2325;&#2366; &#2340;&#2368;&#2360;&#2352;&#2366; &#2360;&#2348;&#2360;&#2375; &#2346;&#2369;&#2352;&#2366;&#2344;&#2366; &#2335;&#2370;&#2352;&#2381;&#2344;&#2366;&#2350;&#2375;&#2306;&#2335; &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2361; &#2335;&#2370;&#2352;&#2381;&#2344;&#2366;&#2350;&#2375;&#2306;&#2335; &#2311;&#2360;&#2354;&#2367;&#2319; &#2309;&#2344;&#2379;&#2326;&#2366; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2357;&#2367;&#2332;&#2375;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2340;&#2368;&#2344; &#2335;&#2381;&#2352;&#2377;&#2347;&#2367;&#2351;&#2366;&#2306; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;: &#2342;&#2369;&#2352;&#2306;&#2337; &#2325;&#2346;, &#2358;&#2367;&#2350;&#2354;&#2366; &#2335;&#2381;&#2352;&#2377;&#2347;&#2368; &#2324;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2346;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2350;&#2376;&#2306; &#2324;&#2352; &#2344; &#2361;&#2368; &#2342;&#2370;&#2360;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Durand Cup is Asia's oldest and the world's third oldest football tournament, in which top Indian football clubs from across the country participate.</p><p>Organised by the Indian Armed Forces, the Durand Cup has been the breeding ground for India's best footballing talent over the years.</p><p>The inaugural edition took place in Shimla in 1888, when it started off as an Army Cup, open only to the British Indian Army troops in India, but soon opened up to civilian teams as well.</p><p>The Durand Cup tournament is unique where in the winning team walks away with three trophies, i.e the Durand Cup (a rolling trophy and the original prize), the Shimla Trophy (also a rolling trophy and first given by the residents of Shimla in 1904) and the President's Cup (for permanent keep and first presented by Dr. Rajendra Prasad, Indias first President, in 1956).</p><p></p><p></p><p></p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>Veto Power of the President allows him to ____________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; &#2357;&#2368;&#2335;&#2379; &#2358;&#2325;&#2381;&#2340;&#2367; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; ____________ &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">declare emergency</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2328;&#2379;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">give statutory grants to states</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2309;&#2344;&#2369;&#2342;&#2366;&#2344; &#2342;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">declare war with other nations</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2381;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2351;&#2369;&#2342;&#2381;&#2343; &#2325;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">withhold his assent to the bills</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2343;&#2375;&#2351;&#2325;&#2379;&#2306; &#2346;&#2352; &#2309;&#2346;&#2344;&#2368; &#2360;&#2361;&#2350;&#2340;&#2367; &#2352;&#2379;&#2325;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The President can assent or withhold his assent to a Bill (veto power) or he can return a Bill, other than a Money Bill, for reconsideration.</p><p>If the Bill is again passed by the Houses, with or without amendment made by the President, he shall not withhold assent there from. But, when a Bill amending the Constitution passed by each House with the requisite majority is presented to the President, he shall give his assent thereto.</p><p>A Bill becomes an Act of Parliament after being passed by both the Houses of Parliament and assented to by the President.</p>",
    "question_index": 27
  },

    "question": "<span class=\"eqt\"><p>According to the fourth edition of the Top Cities for Women in India (TCWI) Report, which evaluates 125 Indian cities using the City Inclusion Score (CIS), consider the following statements regarding rankings, inclusion dimensions, and regional trends, Identify the CORRECT Statement(s) regarding this.</p><p>I. Bengaluru ranked first overall despite not leading social inclusion.</p><p>II. Chennai ranked third in industrial inclusion and first in social inclusion.</p><p>III. Tamil Nadu contributed seven cities to the top 25 list.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2368;&#2352;&#2381;&#2359; &#2358;&#2361;&#2352;&#2379;&#2306; (TCWI) &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335; &#2325;&#2375; &#2330;&#2380;&#2341;&#2375; &#2360;&#2306;&#2360;&#2381;&#2325;&#2352;&#2339; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2332;&#2379; &#2360;&#2367;&#2335;&#2368; &#2311;&#2306;&#2325;&#2381;&#2354;&#2370;&#2332;&#2344; &#2360;&#2381;&#2325;&#2379;&#2352; (CIS) &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; 125 &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2358;&#2361;&#2352;&#2379;&#2306; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2352;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327;, &#2360;&#2350;&#2366;&#2357;&#2375;&#2358;&#2344; &#2310;&#2351;&#2366;&#2350;&#2379;&#2306; &#2324;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2368;&#2351; &#2352;&#2369;&#2333;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;, &#2311;&#2360;&#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344;(&#2323;&#2306;) &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2348;&#2375;&#2306;&#2327;&#2354;&#2369;&#2352;&#2369; &#2344;&#2375; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2360;&#2350;&#2366;&#2357;&#2375;&#2358;&#2344; &#2350;&#2375;&#2306; &#2309;&#2327;&#2381;&#2352;&#2339;&#2368; &#2344; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2357;&#2332;&#2370;&#2342; &#2325;&#2369;&#2354; &#2350;&#2367;&#2354;&#2366;&#2325;&#2352; &#2346;&#2361;&#2354;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>II. &#2330;&#2375;&#2344;&#2381;&#2344;&#2312; &#2344;&#2375; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2360;&#2350;&#2366;&#2357;&#2375;&#2358;&#2344; &#2350;&#2375;&#2306; &#2340;&#2368;&#2360;&#2352;&#2366; &#2324;&#2352; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2360;&#2350;&#2366;&#2357;&#2375;&#2358;&#2344; &#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>III. &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2344;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; 25 &#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2360;&#2366;&#2340; &#2358;&#2361;&#2352;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2342;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Bengaluru and Chennai have retained their top positions among top Indian cities for women's safety and inclusivity, according to the fourth edition of the Top Cities for Women in India (TCWI) report by workplace culture consulting firm Avtar Group.</p><p>TCWI is a year-long study that ranks 125 Indian cities based on women's participation, safety, and career growth, and identifies role-model cities and emerging best practices.</p><p>It uses a City Inclusion Score (CIS), which combines social inclusion factors such as safety, quality infrastructure, and health, alongside industrial inclusion factors such as robust employment opportunities, inclusive work environments, and a supportive ecosystem for female entrepreneurs.</p><p>Bengaluru posted a CIS of 53.29, ranking first ahead of Chennai with a Score of 49.86.</p><p></p><p><b>Inclusion scores</b></p><p>Bengaluru, though reflecting sustained strength in Industrial Inclusion and career enablement, ranked only third in social inclusion.</p><p>Chennai, on the other hand, secured the top position in social inclusion, continuing to lead in safety mechanisms, public services, mobility initiatives, and access to health and'education. The city ranked third in industrial inclusion.</p><p>Pune (46.27), Hyderabad (46.04), and Mumbai (44.49) complete the top five.</p><p>Meanwhile,'Delhi'dropped out of the top ten for the first time, ranking eleventh, while the nearby industrial hub of Gurugram climbed to sixth place- a significant improvement from 2022, when it was outside the top 20.</p><p>Interestingly, Tamil Nadu has emerged as one of the most inclusive states for women, with seven of the top 25 cities in the list from the state, including Chennai, Coimbatore, Thiruchirapalli, Madurai, Salem, Vellore, and Erode.</p><p>Overall, the Southern region emerged as the most inclusive, recording the highest scores across all three indices, with a regional average CIS of 21.60, while the Central and Eastern regions trailed across both inclusion dimensions.</p>",
    "question_index": 28
  },

    "question": "<span class=\"eqt\"><p>Consider the below statements regarding the XPoSat mission and its payloads:</p><p>I. The POLIX (Polarimeter Instrument in X-rays) payload is designed to measure the degree and angle of polarization of X-rays in the medium energy range (8-30 keV) from astronomical sources.</p><p>II. The XSPECT (X-ray Spectroscopy and Timing) payload provides spectroscopic and timing information in the soft X-ray range, complementing the observations made by the main POLIX instrument.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>XPoSat &#2350;&#2367;&#2358;&#2344; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2346;&#2375;&#2354;&#2379;&#2337; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. POLIX (&#2319;&#2325;&#2381;&#2360;-&#2352;&#2375; &#2350;&#2375;&#2306; &#2346;&#2379;&#2354;&#2352;&#2367;&#2350;&#2368;&#2335;&#2352; &#2313;&#2346;&#2325;&#2352;&#2339;) &#2346;&#2375;&#2354;&#2379;&#2337; &#2325;&#2379; &#2326;&#2327;&#2379;&#2354;&#2368;&#2351; &#2360;&#2381;&#2352;&#2379;&#2340;&#2379;&#2306; &#2360;&#2375; &#2350;&#2343;&#2381;&#2351;&#2350; &#2314;&#2352;&#2381;&#2332;&#2366; &#2352;&#2375;&#2306;&#2332; (8-30 keV) &#2350;&#2375;&#2306; &#2319;&#2325;&#2381;&#2360;-&#2352;&#2375; &#2325;&#2375; &#2343;&#2381;&#2352;&#2369;&#2357;&#2368;&#2325;&#2352;&#2339; &#2325;&#2368; &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2324;&#2352; &#2325;&#2379;&#2339; &#2325;&#2379; &#2350;&#2366;&#2346;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2367;&#2332;&#2364;&#2366;&#2311;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>II. XSPECT (&#2319;&#2325;&#2381;&#2360;-&#2352;&#2375; &#2360;&#2381;&#2346;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2360;&#2381;&#2325;&#2379;&#2346;&#2368; &#2324;&#2352; &#2335;&#2366;&#2311;&#2350;&#2367;&#2306;&#2327;) &#2346;&#2375;&#2354;&#2379;&#2337; &#2360;&#2377;&#2347;&#2381;&#2335; &#2319;&#2325;&#2381;&#2360;-&#2352;&#2375; &#2352;&#2375;&#2306;&#2332; &#2350;&#2375;&#2306; &#2360;&#2381;&#2346;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2360;&#2381;&#2325;&#2379;&#2346;&#2367;&#2325; &#2324;&#2352; &#2335;&#2366;&#2311;&#2350;&#2367;&#2306;&#2327; &#2325;&#2368; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2350;&#2369;&#2326;&#2381;&#2351; POLIX &#2313;&#2346;&#2325;&#2352;&#2339; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2319; &#2327;&#2319; &#2309;&#2357;&#2354;&#2379;&#2325;&#2344;&#2379;&#2306; &#2325;&#2366; &#2346;&#2370;&#2352;&#2325; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements regarding India's first dedicated polarimetry mission, XPoSat (X-ray Polarimeter Satellite), are correct.</p><p>Statement 1 is correct. POLIX is the primary scientific payload of the XPoSat mission. Its main objective is to perform polarimetry measurements (studying the orientation of light waves) in the medium X-ray energy band of 8-30 keV. By studying the polarization of X-rays emitted from cosmic sources like black holes, neutron stars, and pulsars, scientists can gain insights into the complex physics of these extreme environments.</p><p>Statement 2 is also correct. XSPECT is the co-passenger payload. It operates in the soft X-ray band (0.8-15 keV) and provides valuable spectroscopic data (information about the composition and physical state of the source) and timing information. This data is crucial for a comprehensive understanding of the sources being observed by POLIX, making the two payloads complementary.</p><p><b>Further insights:</b></p><p>XPoSat was successfully launched on January 1, 2024.</p><p>With this mission, India became the second country in the world (after the United States) to have a dedicated polarimetry observatory to study astronomical X-ray sources.</p>",
    "question_index": 29
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1. The Pallava ruler Narasimhavarman I assumed the title 'Vatapikonda' after defeating the Chalukyas and sacking their capital, Vatapi (Badami).</p><p>2. The Chinese pilgrim-traveller Hieun Tsang visited the Pallava capital Kanchipuram in 640, during the reign of Narasimhavarman I (625-685) who succeeded Mahendravarman. .</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2346;&#2354;&#2381;&#2354;&#2357; &#2358;&#2366;&#2360;&#2325; &#2344;&#2352;&#2360;&#2367;&#2306;&#2361;&#2357;&#2352;&#2381;&#2350;&#2344; &#2346;&#2381;&#2352;&#2341;&#2350; &#2344;&#2375; &#2330;&#2366;&#2354;&#2369;&#2325;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2361;&#2352;&#2366;&#2344;&#2375; &#2324;&#2352; &#2313;&#2344;&#2325;&#2368; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2357;&#2366;&#2340;&#2366;&#2346;&#2368; (&#2348;&#2366;&#2342;&#2366;&#2350;&#2368;) &#2325;&#2379; &#2354;&#2370;&#2335;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; '&#2357;&#2366;&#2340;&#2366;&#2346;&#2368;&#2325;&#2379;&#2306;&#2337;&#2366;' &#2325;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2343;&#2366;&#2352;&#2339; &#2325;&#2368;&#2404;</p><p>2. &#2330;&#2368;&#2344;&#2368; &#2340;&#2368;&#2352;&#2381;&#2341;&#2351;&#2366;&#2340;&#2381;&#2352;&#2368; &#2361;&#2381;&#2357;&#2375;&#2344; &#2340;&#2381;&#2360;&#2366;&#2306;&#2327; &#2344;&#2375; 640 &#2350;&#2375;&#2306; &#2344;&#2352;&#2360;&#2367;&#2306;&#2361;&#2357;&#2352;&#2381;&#2350;&#2344; &#2346;&#2381;&#2352;&#2341;&#2350; (625-685) &#2325;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2346;&#2354;&#2381;&#2354;&#2357; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2325;&#2366;&#2306;&#2330;&#2368;&#2346;&#2369;&#2352;&#2350; &#2325;&#2366; &#2342;&#2380;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366;, &#2332;&#2379; &#2350;&#2361;&#2375;&#2306;&#2342;&#2381;&#2352;&#2357;&#2352;&#2381;&#2350;&#2344; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368; &#2348;&#2344;&#2375;&#2404; .</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only 1</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">Only 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Narasimhavarman I defeated the Chalukya king Pulakeshin II and captured Vatapi (Badami) around 642 CE.</p><p>After this victory, he assumed the title \"Vatapikonda\" (Conqueror of Vatapi).</p><p>The Chinese Buddhist pilgrim Hieun Tsang (Xuanzang) visited Kanchipuram in 640 CE.</p><p>At that time, the ruling Pallava king was Narasimhavarman I (625685 CE), who had succeeded his father Mahendravarman I.</p>",
    "question_index": 30
  },

    "question": "<span class=\"eqt\"><p>Hojagiri dance is performed by Reang community of </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2379;&#2332;&#2366;&#2327;&#2367;&#2352;&#2368; &#2344;&#2371;&#2340;&#2381;&#2351; &#2325;&#2366; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; ________ &#2325;&#2375; &#2352;&#2367;&#2351;&#2366;&#2306;&#2327; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Assam</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2350;</span>",
      "<span class=\"eqt\">Nagaland</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2327;&#2366;&#2354;&#2376;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Mizoram</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2332;&#2379;&#2352;&#2350;</span>",
      "<span class=\"eqt\">Tripura</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2346;&#2369;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Hojagiri dance is a traditional folk dance performed by the Reang (or Riang) community, primarily in the state of <b>Tripura</b> in Northeast India.</p><p>The dance is performed by women and young girls, usually in a group of four to six members.</p><p>Explanation of Other Options:</p><p>(a) Assam: Known for folk dances like Bihu, Bagurumba, and the classical dance Sattriya.</p><p>(b) Nagaland: Known for various tribal dances like the Hornbill festival dances, War Dance, and dances specific to its many Naga tribes.</p><p>(c) Mizoram: Known for folk dances like Cheraw (bamboo dance) and Chapchar Kut festivities. While there is a significant Reang (Bru) population in Mizoram as well, the Hojagiri dance is most famously and culturally rooted in Tripura.</p><p>Further insights:</p><p>The Hojagiri dance is known for its unique and intricate body movements, requiring incredible balance and flexibility.</p><p>Dancers balance on an earthen pitcher and manage other props like a bottle on the head with a lighted lamp on it, while moving only the lower half of their body.</p><p>The dance is typically performed during festivals like Laxmi Puja, Durga Puja, or during the Hojagiri festival itself.</p>",
    "question_index": 31
  },

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true about SVAMITVA scheme?</p><p>I. It stands for 'Survey of Villages and Mapping with Improvised Technology in Village Areas'</p><p>II. It was launched by the Prime Minister on April 24, 2021, on National Panchayati Raj Day.</p><p>III. SVAMITVA provides legal ownership of rural residential land using drone-based surveys.</p><p>IV. The SVAMITVA Scheme is implemented by the Survey of India (SoI).</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2357;&#2366;&#2350;&#2367;&#2340;&#2381;&#2357; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2311;&#2360;&#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; '&#2327;&#2366;&#2306;&#2357;&#2379;&#2306; &#2325;&#2366; &#2360;&#2352;&#2381;&#2357;&#2375;&#2325;&#2381;&#2359;&#2339; &#2324;&#2352; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2375;&#2361;&#2340;&#2352; &#2340;&#2325;&#2344;&#2368;&#2325; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2366;&#2344;&#2330;&#2367;&#2340;&#2381;&#2352;&#2339;'&#2404;</p><p>II. &#2311;&#2360;&#2375; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2344;&#2375; 24 &#2309;&#2346;&#2381;&#2352;&#2376;&#2354;, 2021 &#2325;&#2379; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2346;&#2306;&#2330;&#2366;&#2351;&#2340;&#2368; &#2352;&#2366;&#2332; &#2342;&#2367;&#2357;&#2360; &#2346;&#2352; &#2354;&#2377;&#2344;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>III. &#2360;&#2381;&#2357;&#2366;&#2350;&#2367;&#2340;&#2381;&#2357; &#2337;&#2381;&#2352;&#2379;&#2344;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2360;&#2352;&#2381;&#2357;&#2375;&#2325;&#2381;&#2359;&#2339;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2310;&#2357;&#2366;&#2360;&#2368;&#2351; &#2349;&#2370;&#2350;&#2367; &#2325;&#2366; &#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2360;&#2381;&#2357;&#2366;&#2350;&#2367;&#2340;&#2381;&#2357; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>IV. &#2360;&#2381;&#2357;&#2366;&#2350;&#2367;&#2340;&#2381;&#2357; &#2351;&#2379;&#2332;&#2344;&#2366; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2352;&#2381;&#2357;&#2375;&#2325;&#2381;&#2359;&#2339; &#2357;&#2367;&#2349;&#2366;&#2327; (SoI) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2367;&#2340; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I,II,III and IV</span><span class=\"hqt\" style=\"display:none\">I,II,III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">I,III and IV</span><span class=\"hqt\" style=\"display:none\">I, III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">III and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The SVAMITVA (Survey of Villages and Mapping with Improvised Technology in Village Areas) Scheme was launched by the Prime Minister on April 24, 2020, on National Panchayati Raj Day.</p><p>This year, SVAMITVA celebrated its 5th anniversary.</p><p>SVAMITVA provides legal ownership of rural residential land using drone-based surveys.</p><p>The SVAMITVA Scheme is implemented by the Survey of India (SoI) with the National Informatics Centre Services Inc. (NICSI) as the technology partner.</p><p>The total cost is &#8377;566.23 crores from Financial Year (FY) 2020-21 to FY 2024-25, with an extension until FY 2025-26.</p><p></p><p></p>",

    "question": "<span class=\"eqt\"><p>Consider the following about Chhau dance forms and choose the correct option.</p><p>Statement 1. Mayurbhanj Chhau of Odisha is a masked form with elaborate painted visors and minimal martial movement.</p><p>Statement 2. SeraikellaChhau of Jharkhand is the only Chhau style performed without masks.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2331;&#2314; &#2344;&#2371;&#2340;&#2381;&#2351; &#2358;&#2376;&#2354;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 1. &#2323;&#2337;&#2367;&#2358;&#2366; &#2325;&#2366; &#2350;&#2351;&#2370;&#2352;&#2349;&#2306;&#2332; &#2331;&#2314; &#2319;&#2325; &#2350;&#2369;&#2326;&#2380;&#2335;&#2366; &#2344;&#2371;&#2340;&#2381;&#2351; &#2358;&#2376;&#2354;&#2368; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2357;&#2367;&#2360;&#2381;&#2340;&#2371;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2330;&#2367;&#2340;&#2381;&#2352;&#2367;&#2340; &#2350;&#2369;&#2326;&#2380;&#2335;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2350;&#2366;&#2352;&#2381;&#2358;&#2354; &#2350;&#2370;&#2357;&#2350;&#2375;&#2306;&#2335; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 2. &#2333;&#2366;&#2352;&#2326;&#2306;&#2337; &#2325;&#2366; &#2360;&#2375;&#2352;&#2366;&#2311;&#2325;&#2375;&#2354;&#2366; &#2331;&#2314; &#2319;&#2325;&#2350;&#2366;&#2340;&#2381;&#2352; &#2331;&#2314; &#2358;&#2376;&#2354;&#2368; &#2361;&#2376; &#2332;&#2379; &#2348;&#2367;&#2344;&#2366; &#2350;&#2369;&#2326;&#2380;&#2335;&#2375; &#2325;&#2375; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only statement 1 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 1 &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only statement 2 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 2 &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both statements 1 and 2 are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Neither statement 1 nor 2 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2361;&#2368; &#2360;&#2361;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Statement 1 is incorrect; Mayurbhanj Chhau is performed without masks and has strong martial elements.</p><p>Statement 2 is incorrect; SeraikellaChhau uses masks; Mayurbhanj is the non-masked style.</p><p>Further Insights:</p><p>- Three major Chhau styles: Purulia (West Bengal, masked), Seraikella (Jharkhand, masked), Mayurbhanj (Odisha, unmasked).</p><p>- Chhau was inscribed on UNESCO's Representative List of the Intangible Cultural Heritage in 2010.</p><p>- Themes often derive from epics (Ramayana, Mahabharata) and local folklore with akhara-style training.</p><p>- Musical accompaniment commonly includes dhol, dhamsa, shehnai/mohuri.</p><p></p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about Alluvial Soil:</p><p>A. They are generally rich in potash but poor in phosphorous.</p><p>B. Bhangar is the new alluvium and is deposited by floods annually while Khadar represents a system of older alluvium, deposited away from the flood plains.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2354;&#2379;&#2338;&#2364; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>A. &#2311;&#2344;&#2350;&#2375;&#2306; &#2310;&#2350; &#2340;&#2380;&#2352; &#2346;&#2352; &#2346;&#2379;&#2335;&#2366;&#2358; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2347;&#2377;&#2360;&#2381;&#2347;&#2379;&#2352;&#2360; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2350; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>B. &#2349;&#2366;&#2306;&#2327;&#2352; &#2344;&#2351;&#2366; &#2332;&#2354;&#2379;&#2338;&#2364; &#2361;&#2376; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2338;&#2364; &#2360;&#2375; &#2344;&#2367;&#2325;&#2381;&#2359;&#2375;&#2346;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2326;&#2366;&#2342;&#2352; &#2346;&#2369;&#2352;&#2366;&#2344;&#2375; &#2332;&#2354;&#2379;&#2338;&#2364; &#2325;&#2368; &#2319;&#2325; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2348;&#2366;&#2338;&#2364; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2342;&#2370;&#2352; &#2344;&#2367;&#2325;&#2381;&#2359;&#2375;&#2346;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">A only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Alluvial soils are widespread in the northern plains and the river valleys. They are depositional soils, transported and deposited by rivers and streams. They are generally rich in potash but poor in phosphorous.</p><p>Khadar is the new alluvium and is deposited by floods annually, which enriches the soil by depositing fine silts.</p><p>Bhangar represents a system of older alluvium, deposited away from the flood plains.</p><p>Both the Khadar and Bhangar soils contain calcareous concretions.</p>",
    "question_index": 34
  },

    "question": "<span class=\"eqt\"><p>Read the following statements:</p><p>I.Vitamin C is essential for the absorption of iron in the body and its deficiency causes Scurvy.</p><p>II.Vitamin D is a fat-soluble vitamin that helps regulate calcium and its deficiency can lead to Rickets in children.</p><p>III.Vitamin B1 (Thiamine) deficiency is the cause of the disease Beriberi.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306;:</p><p>I. &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2360;&#2368; &#2358;&#2352;&#2368;&#2352; &#2350;&#2375;&#2306; &#2310;&#2351;&#2352;&#2344; &#2325;&#2375; &#2309;&#2357;&#2358;&#2379;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2368; &#2325;&#2350;&#2368; &#2360;&#2375; &#2360;&#2381;&#2325;&#2352;&#2381;&#2357;&#2368; &#2352;&#2379;&#2327; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2337;&#2368; &#2319;&#2325; &#2357;&#2360;&#2366; &#2350;&#2375;&#2306; &#2328;&#2369;&#2354;&#2344;&#2358;&#2368;&#2354; &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2361;&#2376; &#2332;&#2379; &#2325;&#2376;&#2354;&#2381;&#2358;&#2367;&#2351;&#2350; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2368; &#2325;&#2350;&#2368; &#2360;&#2375; &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2367;&#2325;&#2375;&#2335;&#2381;&#2360; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2348;&#2368;1 (&#2341;&#2366;&#2351;&#2350;&#2367;&#2344;) &#2325;&#2368; &#2325;&#2350;&#2368; &#2348;&#2375;&#2352;&#2368;&#2348;&#2375;&#2352;&#2368; &#2352;&#2379;&#2327; &#2325;&#2366; &#2325;&#2366;&#2352;&#2339; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only Statement III is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; III &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Statements I and II are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2324;&#2352; II &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Statements II and III are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; II &#2324;&#2352; III &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">All three statements I, II and III are correct</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2340;&#2368;&#2344; &#2325;&#2341;&#2344; I, II &#2324;&#2352; III &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All three statements are factually correct.</p><p>Statement I: Vitamin C (ascorbic acid) is crucial for collagen synthesis and iron absorption. Its deficiency leads to Scurvy, characterized by bleeding gums and poor wound healing.</p><p>Statement II: Vitamin D is vital for bone health by regulating calcium and phosphate. A lack of it causes Rickets (softening of bones) in children.</p><p>Statement III: Vitamin B1 (Thiamine) is essential for carbohydrate metabolism. Its severe deficiency results in Beriberi, a neurological and cardiovascular disease.</p>",
    "question_index": 35
  },

    "question": "<span class=\"eqt\"><p>Which among the following ecological pyramid/s is/are always in the upward direction?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2361;&#2350;&#2375;&#2358;&#2366; &#2314;&#2346;&#2352; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pyramid of numbers</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337;</span>",
      "<span class=\"eqt\">Pyramid of biomass</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2351;&#2379;&#2350;&#2366;&#2360; &#2325;&#2366; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337;</span>",
      "<span class=\"eqt\">Pyramid of energy</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2366; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337;</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>pyramid of energy</b> is always upright (upward direction).</p><p>This is because energy flows from one trophic level to the next, and at each transfer, a significant amount of energy (about 80-90%) is lost as heat due to metabolic activities, according to the second law of thermodynamics.</p><p>Therefore, the energy available at each successive trophic level is always less than the energy at the preceding level.</p><p><b>Explanation of Other Options:</b></p><p>Pyramid of numbers: This pyramid can be inverted. For example, a single large tree (producer) can support a large number of herbivorous insects (primary consumers). In this case, the base (producer level) is smaller in number than the level above it.</p><p>Pyramid of biomass: This pyramid can also be inverted, particularly in aquatic ecosystems. For example, in a pond or ocean, the biomass of phytoplankton (producers) at any given time may be less than the biomass of zooplankton (primary consumers) that feed on them. This is because phytoplankton have a very short lifespan and reproduce rapidly, so their standing crop (biomass at a point in time) can be small despite high productivity over time.</p><p><b>Further insights:</b></p><p>- Ecological pyramids are graphical representations of the trophic structure of an ecosystem, showing the relationship between different organisms in a food chain.</p><p>- The pyramid of energy provides the most accurate representation of energy flow and trophic relationships in an ecosystem because it accounts for the rate of energy production, not just standing crop or numbers.</p><p>- The \"10% law\" of energy transfer, proposed by Raymond Lindeman, states that only about 10% of the energy from one trophic level is transferred to the next trophic level. The rest is lost.</p>",
    "question_index": 38
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements about India's Five-Year Plans is/are correct?</p><p>a.The first Five-Year Plan focused on the development of the agricultural sector.</p><p>b.The concept of Five-Year Plans was borrowed from the USA.</p><p>c.The Planning Commission was replaced by NITI Aayog in 2015.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>a. &#2346;&#2361;&#2354;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2371;&#2359;&#2367; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2357;&#2367;&#2325;&#2366;&#2360; &#2346;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2341;&#2368;&#2404;</p><p>b. &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2309;&#2350;&#2375;&#2352;&#2367;&#2325;&#2366; &#2360;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p><p>c. &#2351;&#2379;&#2332;&#2344;&#2366; &#2310;&#2351;&#2379;&#2327; &#2325;&#2379; 2015 &#2350;&#2375;&#2306; &#2344;&#2368;&#2340;&#2367; &#2310;&#2351;&#2379;&#2327; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">a and b only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">b and c only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">a and c only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">a, b and c</span><span class=\"hqt\" style=\"display:none\">a, b, c</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statements 'a' and 'c' are correct.</p><p>Statement a is correct: The first Five-Year Plan (1951-1956) was based on the Harrod-Domar model and gave top priority to the agricultural sector, including investments in irrigation and dams, to address the country's food crisis and lay the foundation for economic development.</p><p>Statement c is correct: The Planning Commission, which had formulated the Five-Year Plans since 1950, was officially replaced by the NITI Aayog (National Institution for Transforming India) on January 1, 2015.</p><p>Explanation of Incorrect Statement:</p><p>Statement b is incorrect: The concept of centralized, five-year planning was borrowed from the Soviet Union (USSR), not the USA. India's first Prime Minister, Jawaharlal Nehru, was deeply influenced by the Soviet model of economic planning.</p>",
    "question_index": 39
  },

    "question": "<span class=\"eqt\"><p>Match the following.</p><p><img width=347 height=121 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23514/image001.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2379; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"347\" height=\"121\" id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23514/image001.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">A-1, B-2, C-3, D-4</span><span class=\"hqt\" style=\"display:none\">A-1, B-2, C-3, D-4</span>",
      "<span class=\"eqt\">A-3, B-1, C-4, D-2</span><span class=\"hqt\" style=\"display:none\">A-3, B-1, C-4, D-2</span>",

      "<span class=\"eqt\">A-2, B-4, C-1, D-3</span><span class=\"hqt\" style=\"display:none\">A-2, B-4, C-1, D-3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Correct code is <b>A-4, B-3, C-2, D-1.</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rivers</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tributaries</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ganga</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ramganga, Gomti, Ghaghara, Gandak, Kosi and Mahananda from left bank and Yamuna, Tamsa, Son and Punpun from right bank</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Krishna</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ghataprabha River, Malaprabha River, Bhima River, Tungabhadra River, and Musi River</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cauvery</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tributaries joining from left are the Harangi, the Hemavati, the Shimsha and the Arkavati whereas the Lakshmantirtha, the Kabbani, the Suvarnavati, the Bhavani, the Noyil and the Amaravati joins from right</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Brahmaputra</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Subansiri, Kameng (Jiabharali), Dhansiri, Buri-Dihing, Kopili, Manas, Sankosh,Jaldhaka, Torsa and Teesta</td></tr></table>",
    "question_index": 40
  },

    "question": "<span class=\"eqt\"><p>Which of the following country signed a Joint Declaration of Intent (JDI) with India to deepen cooperation in telecommunications and Information and Communication Technologies in January 2026?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2344;&#2375; &#2332;&#2344;&#2357;&#2352;&#2368; 2026 &#2350;&#2375;&#2306; &#2342;&#2370;&#2352;&#2360;&#2306;&#2330;&#2366;&#2352; &#2324;&#2352; &#2360;&#2370;&#2330;&#2344;&#2366; &#2319;&#2357;&#2306; &#2360;&#2306;&#2330;&#2366;&#2352; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2361;&#2351;&#2379;&#2327; &#2325;&#2379; &#2327;&#2361;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2328;&#2379;&#2359;&#2339;&#2366; &#2346;&#2340;&#2381;&#2352; (JDI) &#2346;&#2352; &#2361;&#2360;&#2381;&#2340;&#2366;&#2325;&#2381;&#2359;&#2352; &#2325;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">Germany</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2352;&#2381;&#2350;&#2344;&#2368;</span>",
      "<span class=\"eqt\">South Korea</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2325;&#2379;&#2352;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Japan</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2346;&#2366;&#2344;</span>",
      "<span class=\"eqt\">France</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2352;&#2366;&#2306;&#2360;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>India and Germany have signed a Joint Declaration of Intent (JDI) on Telecommunications Cooperation during the official visit of Mr. Friedrich Merz, Federal Chancellor of the Federal Republic of Germany, to India from 12-13 January 2026. The JDI was signed as one of the key outcomes of the engagements between the Prime Minister of India and the Federal Chancellor of Germany.</p><p>The Declaration was concluded between Department of Telecommunications (DoT), Government of India, and the Federal Ministry for Digital Transformation and Government Modernisation (BMDS), Government of the Federal Republic of Germany. The Joint Declaration reflects the shared commitment of both countries to deepen bilateral cooperation in the fields of telecommunications and Information and Communication Technologies (ICTs), building upon the strong momentum in India-Germany relations and sustained high-level engagements.</p>",
    "question_index": 41
  },
