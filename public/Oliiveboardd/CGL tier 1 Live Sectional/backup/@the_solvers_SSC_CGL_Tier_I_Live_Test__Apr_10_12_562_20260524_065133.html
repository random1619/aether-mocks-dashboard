    "question": "<span class=\"eqt\"><p>Who among the following was the chairman of the committee formed in 1928 to draft a constitution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2350;&#2360;&#2380;&#2342;&#2366; &#2340;&#2376;&#2351;&#2366;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 1928 &#2350;&#2375;&#2306; &#2327;&#2336;&#2367;&#2340; &#2360;&#2350;&#2367;&#2340;&#2367; &#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Jawaharlal Nehru</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2357;&#2366;&#2361;&#2352; &#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</span>",
      "<span class=\"eqt\">Subash Chandra Bose</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2349;&#2366;&#2359; &#2330;&#2306;&#2342;&#2381;&#2352; &#2348;&#2379;&#2360;</span>",
      "<span class=\"eqt\">C Rajagopalachari</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368; &#2352;&#2366;&#2332;&#2327;&#2379;&#2346;&#2366;&#2354;&#2366;&#2330;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Motilal Nehru</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2340;&#2368;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>- On 19 May 1928, a committee was constituted to draft the Constitution.</p><p>- Some of the notable members of this Committee were:<b> Motilal Nehru</b> (<b>Chairman</b>) , Sir Ali Imam, Tej Bahadur Sapru and Subash Chandra Bose. M.R. Jayakar and Annie Besant joined the Committee later.</p><p>- Jawaharlal Nehru was appointed the secretary to the Committee.</p><p>- The Nehru Report was a constitutional proposal outlining a framework for India's future, advocating for dominion status within the British Commonwealth and a federal government with a bicameral legislature</p>",
    "question_index": 47
  },
  {
    "question": "<span class=\"eqt\"><p>Which physical phenomenon causes bones to generate an electrical charge when subjected to mechanical stress, thereby stimulating new bone formation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2380;&#2340;&#2367;&#2325; &#2328;&#2335;&#2344;&#2366; &#2361;&#2337;&#2381;&#2337;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2351;&#2366;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325; &#2342;&#2348;&#2366;&#2357; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2310;&#2357;&#2375;&#2358; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2325;&#2366;&#2352;&#2339; &#2348;&#2344;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2344;&#2312; &#2361;&#2337;&#2381;&#2337;&#2368; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Conductivity</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2354;&#2325;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Piezoelectricity</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2332;&#2379;&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2367;&#2360;&#2367;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Magnetism</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2369;&#2306;&#2348;&#2325;&#2340;&#2381;&#2357;</span>",
      "<span class=\"eqt\">Thermoelectricity</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2352;&#2381;&#2350;&#2379;&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2367;&#2360;&#2367;&#2335;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Certain materials generate an electric charge when mechanical pressure is applied to them. Bone contains collagen, which shows piezoelectric properties.</p><p>When bones are stressed (like during walking or exercise), small electric signals are produced. These signals stimulate bone-forming cells (osteoblasts) to strengthen and repair the bone.</p><p><b><u>Further Insights </u></b></p><p>&#8226; Wolff's Law: Bone adapts to the stress placed on it.</p><p>&#8226; Weight-bearing exercise increases bone density.</p><p>&#8226; Osteoblasts build bone; osteoclasts break bone.</p><p>&#8226; Astronauts lose bone density in zero gravity due to lack of mechanical stress.</p><p>&#8226; Piezoelectric materials are also used in ultrasound devices.</p>",
    "question_index": 48
  },

    "question": "<span class=\"eqt\"><p>Arrange the following ISRO missions in the correct chronological order of launch from earliest to latest:</p><p>A. NVS-02 navigation satellite launched aboard GSLV-F15</p><p>B. SPADEX Space Docking Experiment mission</p><p>C. CMS-03 communication satellite mission</p><p>D. EOS-09 earth observation mission</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2312;&#2319;&#2360;&#2310;&#2352;&#2323; &#2350;&#2367;&#2358;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2325;&#2381;&#2359;&#2375;&#2346;&#2339; &#2325;&#2375; &#2325;&#2366;&#2354;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2360;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2366;&#2342; &#2340;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2332;&#2368;&#2319;&#2360;&#2319;&#2354;&#2357;&#2368;-&#2319;&#2347;15 &#2346;&#2352; &#2346;&#2381;&#2352;&#2325;&#2381;&#2359;&#2375;&#2346;&#2339;&#2367;&#2340; &#2319;&#2344;&#2357;&#2368;&#2319;&#2360;-02 &#2344;&#2375;&#2357;&#2367;&#2327;&#2375;&#2358;&#2344; &#2313;&#2346;&#2327;&#2381;&#2352;&#2361;</p><p>b. &#2319;&#2360;&#2346;&#2368;&#2319;&#2337;&#2375;&#2325;&#2381;&#2360; &#2309;&#2306;&#2340;&#2352;&#2367;&#2325;&#2381;&#2359; &#2337;&#2377;&#2325;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2350;&#2367;&#2358;&#2344;</p><p>c. &#2360;&#2368;&#2319;&#2350;&#2319;&#2360;-03 &#2360;&#2306;&#2330;&#2366;&#2352; &#2313;&#2346;&#2327;&#2381;&#2352;&#2361; &#2350;&#2367;&#2358;&#2344;</p><p>d. &#2312;&#2323;&#2319;&#2360;-09 &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2309;&#2357;&#2354;&#2379;&#2325;&#2344; &#2350;&#2367;&#2358;&#2344;</p></span>",
    "options": [
      "<span class=\"eqt\">A-B-D-C</span><span class=\"hqt\" style=\"display:none\">A-B-D-C</span>",
      "<span class=\"eqt\">B-A-D-C</span><span class=\"hqt\" style=\"display:none\">B-A-D-C</span>",
      "<span class=\"eqt\">A-D-B-C</span><span class=\"hqt\" style=\"display:none\">A-D-B-C</span>",
      "<span class=\"eqt\">B-A-C-D</span><span class=\"hqt\" style=\"display:none\">B-A-C-D</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>B. SPADEX (Space Docking Experiment): Launched on December 30, 2024, aboard the PSLV-C60. This mission was a major milestone, demonstrating the ability of two spacecraft (Chaser and Target) to dock in orbit, which is crucial for future space stations.</p><p></p><p>A. NVS-02 (GSLV-F15): Launched on January 29, 2025. This was ISRO's first launch of 2025 and marked its 100th spaceflight launch from the Satish Dhawan Space Centre. It is a second-generation navigation satellite intended to bolster India's NavIC system.</p><p></p><p>D. EOS-09 (Earth Observation Mission): Attempted on May 18, 2025, aboard the PSLV-C61. While the first and second stages performed nominally, the mission was unfortunately not accomplished due to an anomaly in the third stage.</p><p></p><p>C. CMS-03 (Communication Satellite): Launched on November 2, 2025, aboard the LVM3-M5. Weighing approximately 4,400 kg, it is one of India's heaviest communication satellites launched from Indian soil to date.</p>",
    "question_index": 49
  },
  {
    "question": "<span class=\"eqt\"><p>The inner circumference of a circular track is 176 cm. If the track is 6 cm wide, what is the diameter of the outer circle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2346;&#2341; &#2325;&#2368; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2346;&#2352;&#2367;&#2343;&#2367; 176 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2341; 6 &#2360;&#2375;&#2350;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2366;&#2361;&#2352;&#2368; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">64 cm</span><span class=\"hqt\" style=\"display:none\">64 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">66 cm</span><span class=\"hqt\" style=\"display:none\">66 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">68 cm</span><span class=\"hqt\" style=\"display:none\">68 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">70 cm</span><span class=\"hqt\" style=\"display:none\">70 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let, radius of the inner circle be 'r' cm.</p><p>176 = 2  X  (22/7)  X  r</p><p>=&gt; 176 = (44/7)  X  r</p><p>=&gt; r = (176  X  7) / 44 = 28 cm</p><p>Radius of the outer circle = 28 + 6 = 34 cm</p><p>Diameter of the outer circle = 2  X  34 = 68 cm</p>",
    "question_index": 50
  },

    "question": "<span class=\"eqt\"><p>X attempts 94 questions and gets 141 marks. If for every correct answer 4 marks is given, and for every wrong answer 1 mark is deducted, then the number of questions wrongly answered by X is ____.</p></span><span class=\"hqt\" style=\"display:none\"><p>X 94 &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2361;&#2354; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2375; 141 &#2309;&#2306;&#2325; &#2350;&#2367;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; 4 &#2309;&#2306;&#2325; &#2342;&#2367;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2327;&#2354;&#2340; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; 1 &#2309;&#2306;&#2325; &#2325;&#2366;&#2335;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; X &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2327;&#2354;&#2340; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; ____ &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">47</span><span class=\"hqt\" style=\"display:none\">47</span>",
      "<span class=\"eqt\">57</span><span class=\"hqt\" style=\"display:none\">57</span>",
      "<span class=\"eqt\">40</span><span class=\"hqt\" style=\"display:none\">40</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let number of questions wrongly answered by X is 'n'.</p><p>Number of questions correctly answered by X = 94  -  n</p><p>Total marks = 141</p><p>4(94  -  n)  -  1*n = 141</p><p>376  -  4n  -  n = 141</p><p>5n = 235</p><p>n = 47</p>",
    "question_index": 51
  },

    "question": "<span class=\"eqt\"><p>Three pipes A, B, and C together can fill a tank in 1 hour 40 minutes. If pipe A can fill the tank in 45 minutes and pipe C can empty the tank in 3 hours, then which of the following statement is true for pipe B?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2340;&#2368;&#2344; &#2346;&#2366;&#2311;&#2346; A, B &#2324;&#2352; C &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 1 &#2328;&#2306;&#2335;&#2375; 40 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; A &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 45 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; C &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 3 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2366;&#2311;&#2346; B &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">pipe B can empty the tank in 2.5 hours.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2346; B &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 2.5 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">pipe B can fill the tank in 3.5 hours.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2346; B &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 3.5 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">pipe B can fill the tank in 2.5 hours.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2346; B &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 2.5 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">pipe B can empty the tank in 3.5 hours.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2346; B &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 3.5 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>According to the question,</p><p>1/A + 1/B + 1/C = 1/100</p><p>=&gt; 1/45 + 1/B  -  1/180 = 1/100</p><p>=&gt; 1/B = 1/100 + 1/180  -  1/45</p><p>=&gt; 1/B = -1/150</p><p>Hence, pipe B can empty the tank in 2.5 hours.</p>",
    "question_index": 52

    "question": "<span class=\"eqt\"><p>If the price of petrol increases by 30% and A intends to spend only an additional 20% on petrol. By how much % will he reduce the quantity of petrol purchased? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2346;&#2375;&#2335;&#2381;&#2352;&#2379;&#2354; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; 30% &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; A &#2346;&#2375;&#2335;&#2381;&#2352;&#2379;&#2354; &#2346;&#2352; &#2325;&#2375;&#2357;&#2354; 20% &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2326;&#2352;&#2381;&#2330; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2311;&#2352;&#2366;&#2342;&#2366; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2361; &#2326;&#2352;&#2368;&#2342;&#2368; &#2332;&#2366;&#2344;&#2375;&#2357;&#2366;&#2354;&#2368; &#2346;&#2375;&#2335;&#2381;&#2352;&#2379;&#2354; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2368; &#2325;&#2350;&#2368; &#2325;&#2352;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">7.14%</span><span class=\"hqt\" style=\"display:none\">7.14%</span>",
      "<span class=\"eqt\">8.33%</span><span class=\"hqt\" style=\"display:none\">8.33%</span>",
      "<span class=\"eqt\">7.69%</span><span class=\"hqt\" style=\"display:none\">7.69%</span>",
      "<span class=\"eqt\">5.55%</span><span class=\"hqt\" style=\"display:none\">5.55%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the initial spending be 100.</p> <p>So price rise will take it to 130.</p> <p>Now he spends 120, so reduction in consumption is 10 on 130.</p> <p>Required % = 10/130 x 100 = 7.69%</p>",

  },

    "question": "<span class=\"eqt\"><p>Find the greatest four-digit number which is divisible by 12, 20 and 25.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2366;&#2352; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2357;&#2361; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; 12, 20 &#2324;&#2352; 25 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2404;</p></span>",
    "options": [

    "solution": "<p>From statement I:</p><p>Side length of equilateral triangle = 6&radic;3 cm</p><p>Area of triangle = (&radic;3/4) * (6&radic;3)<sup>2</sup></p><p>= (&radic;3/4) * 36 * 3</p><p>= 27&radic;3 sq. cm</p><p>From Statement II:</p><p>Length of diagonal of square = 3&radic;6 cm</p><p>Side * &radic;2 = 3 * &radic;3 * &radic;2</p><p>Side of square = 3&radic;3 cm</p><p>Area of square = (3&radic;3)<sup>2</sup> = 27 sq. cm</p><p>So, triangle has more area.</p>",

    "question": "<span class=\"eqt\"><p>Find the value of k if the points A(2, 3), B(4, k) and C(6, -3) are collinear.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2348;&#2367;&#2306;&#2342;&#2369; A(2, 3), B(4, k) &#2324;&#2352; C(6, -3) &#2360;&#2350;&#2352;&#2375;&#2326;&#2368;&#2351; &#2361;&#2376;, &#2340;&#2379; k &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;|</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Since the points A, B, and C are collinear, the slope of line segment A(2, 3) to B(4, k) is the equal to the slope of the line segment from A(2, 3) to C(6, -3).</p> <p>To calculate slope, the formula is (y2 - y1)/(x2 - x1).</p> <p>=&gt; (k - 3)/(4 - 2) = (-3 - 3)/(6 - 2)</p> <p>=&gt; (k - 3)/2 = -6/4</p> <p>=&gt; (k - 3) = -3</p> <p>=&gt; k = 0</p>",
    "question_index": 64
  },

    "question": "<span class=\"eqt\"><p>The cost price and the selling price of wheat are the same. Due to a faulty weighing machine, the seller earns a 35% profit. If Rs. X is the cost price of 1000 gm wheat and the machine is changed which shows 1000 gm instead of 900 gm, what should be the selling price (in Rs.) now to get the same percentage of profit?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2375;&#2361;&#2370;&#2305; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2324;&#2352; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306;&#2404; &#2326;&#2352;&#2366;&#2348; &#2340;&#2380;&#2354; &#2350;&#2358;&#2368;&#2344; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339;, &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2325;&#2379; 35% &#2325;&#2366; &#2354;&#2366;&#2349; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 1000 &#2327;&#2381;&#2352;&#2366;&#2350; &#2327;&#2375;&#2361;&#2370;&#2305; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; X &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376; &#2324;&#2352; &#2350;&#2358;&#2368;&#2344; &#2348;&#2342;&#2354; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2332;&#2379; 900 &#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; 1000 &#2327;&#2381;&#2352;&#2366;&#2350; &#2342;&#2367;&#2326;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2344; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2348; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; (&#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;     "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. When we're doing science, we have to find terms that can be operationalised or things that can be measured.</p><p>B. We can measure how hormonal levels go up in both dogs and their owners when they look into each other's eyes.</p><p>C. These things can be studied if science and psychology are used effectively.</p><p>D. We can measure whether a dog chooses to go for a bowl of food or its owner when it's separated from both food and its owner for many hours.</p>",

      "ADBC",
      "ABCD",

    "correct_option_id": 1,
