    "question": "<span class=\"eqt\"><p>If \"-\" replaced by \"+\",\"+\" replaced by \" x \",\"x\" replaced by \"&div;\",\"&div;\" replaced by \"-\" then 12+2 &div; 10-4 is equal to</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; \"-\" &#2325;&#2379; \"+\" &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, \"+\" &#2325;&#2379; \" x \" &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, \"x\" &#2325;&#2379; \"&div;\" &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, \"&div;\" &#2325;&#2379; \"-\" &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; 12+2 &div; 10-4 &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;-</p></span>",

  {
    "question": "<span class=\"eqt\"><p>If WE = 30 and HEN = 29 then, how will you code RHYME?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; WE = 30 &#2324;&#2352; HEN = 29 &#2361;&#2376; &#2340;&#2379;, &#2310;&#2346; RHYME &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2375; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">73</span><span class=\"hqt\" style=\"display:none\">73</span>",
      "<span class=\"eqt\">67</span><span class=\"hqt\" style=\"display:none\">67</span>",

  },

  {

    "solution": "<p>The information given in (b) is similar to the information given in the question while rest of (a), (c) and (d) have some errors like:</p><p>Option (a):</p><p>Evergreen Medical <b>Center</b>, Building No. 14B, 2nd Floor, Near City Metro Station Exit Gate, Tsim Sha Tsui, Kowloon, Hong Kong------(Spelling mistake)</p><p>Option (c):</p><p>Evergreen Medical Centre, Building No. 14B, 2nd Floor, Near City Metro Station <b>Entry</b> Gate, Tsim Sha Tsui, Kowloon, Hong Kong------(Word is wrong)</p><p>Option (d):</p><p>Evergreen Medical Centre, Building No. 14B, 2nd Floor, <b>Opposite</b> City Metro Station Exit Gate, Tsim Sha Tsui, Kowloon, Hong Kong------(Word is wrong)</p>",

    "question": "<span class=\"eqt\"><p>In the questions below, two statements are given, followed by two conclusions. You have to consider the given statements as true, even if they are at variance from commonly known facts. From the given options, choose the one that provides the correct combination of conclusions that follow/ can be derived from the given statements.</p><p>Statement A: His head was full of ideas of great machines.</p><p>Statement B: If you heard him talk, it seemed not at all difficult to make a profitable invention.</p><p>Conclusions:</p><p>I. He had made several profitable inventions.</p><p>II. He only had ideas for inventing great machines.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2342;&#2379; &#2325;&#2341;&#2344;&#2379; &#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2344;&#2366; &#2361;&#2376;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2357;&#2375; &#2310;&#2350; &#2340;&#2380;&#2352; &#2346;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2379;&#2306;&#2404; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375;, &#2357;&#2361; &#2330;&#2369;&#2344;&#2375;&#2306; &#2332;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; A: &#2313;&#2360;&#2325;&#2366; &#2350;&#2360;&#2381;&#2340;&#2367;&#2359;&#2381;&#2325; &#2350;&#2361;&#2366;&#2344; &#2350;&#2358;&#2368;&#2344;&#2379;&#2306; &#2325;&#2375; &#2357;&#2367;&#2330;&#2366;&#2352;&#2379;&#2306; &#2360;&#2375; &#2349;&#2352;&#2366; &#2341;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; B: &#2351;&#2342;&#2367; &#2310;&#2346;&#2344;&#2375; &#2313;&#2360;&#2375; &#2348;&#2366;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2360;&#2369;&#2344;&#2366; &#2361;&#2379;, &#2340;&#2379; &#2320;&#2360;&#2366; &#2354;&#2327; &#2352;&#2361;&#2366; &#2341;&#2366; &#2325;&#2367; &#2319;&#2325; &#2354;&#2366;&#2349;&#2325;&#2366;&#2352;&#2368; &#2310;&#2357;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366; &#2348;&#2367;&#2354;&#2325;&#2369;&#2354; &#2350;&#2369;&#2358;&#2381;&#2325;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;|</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>I. &#2313;&#2360;&#2344;&#2375; &#2325;&#2312; &#2354;&#2366;&#2349;&#2342;&#2366;&#2351;&#2325; &#2310;&#2357;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352; &#2325;&#2367;&#2319; &#2341;&#2375;&#2404;</p><p>II. &#2313;&#2360;&#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2375;&#2357;&#2354; &#2350;&#2361;&#2366;&#2344; &#2350;&#2358;&#2368;&#2344;&#2379;&#2306; &#2325;&#2366; &#2310;&#2357;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2330;&#2366;&#2352; &#2341;&#2375;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>If the following interchanges are made in signs and numbers, then which equation would be correct?</p><p>Interchanges:</p><p>Signs:  -  and &div;</p><p>Numbers: 6 and 4</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2330;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306; &#2324;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2352;&#2360;&#2346;&#2352; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2379;&#2327;&#2366;?</p><p>&#2346;&#2352;&#2360;&#2346;&#2352; &#2348;&#2342;&#2354;&#2344;&#2366;:</p><p>&#2330;&#2367;&#2344;&#2381;&#2361;: - &#2324;&#2352; &div;</p><p>&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;: 6 &#2324;&#2352; 4</p></span>",
    "options": [
      "<span class=\"eqt\">9 x 4  -  12 &div; 6 + 8 = 21</span><span class=\"hqt\" style=\"display:none\">9 x 4 - 12 &div; 6 + 8 = 21</span>",
      "<span class=\"eqt\">18  -  4 &div; 9 + 6 x 5 = 14</span><span class=\"hqt\" style=\"display:none\">18 - 4 &div; 9 + 6 x 5 = 14</span>",
      "<span class=\"eqt\">27 &div; 9 + 6  -  24 x 4 = 37</span><span class=\"hqt\" style=\"display:none\">27 &div; 9 + 6 - 24 x 4 = 37</span>",
      "<span class=\"eqt\">20 x 5  -  4 + 12 &div; 6 = 23</span><span class=\"hqt\" style=\"display:none\">20 x 5 - 4 + 12 &div; 6 = 23</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Checking the interchanges by each option:</p><p>LHS = 9 x 6 &div; 12  -  4 + 8 = 9 x 1/2  -  4 + 8 = 9/2  -  4 + 8 = (9/2)+4 = 17/2</p><p>RHS = 21</p><p>So, (a) is not correct.</p><p>LHS = 18 &div; 6  -  9 + 4 x 5 = 3  -  9 + 4 x 5 = 3  -  9 + 20 = 14</p><p>RHS = 14</p><p>So, (b) is correct.</p><p>LHS = 27  -  9 + 4 &div; 24 x 6 = 27  -  9 + 1/6 x 6 = 27  -  9 + 1 = 19</p><p>RHS = 37</p><p>So, (c) is not correct.</p><p>LHS = 20 x 5 &div; 6 + 12  -  4 = 20 x 5/6 + 12  -  4 = 50/3 + 12  -  4 = 74/3</p><p>RHS = 23</p><p>So, (d) is not correct.</p>",
    "question_index": 24
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about Muharram and choose correct option:</p><p>Statement 1: It commemorates the martyrdom of Imam Hussain at the Battle of Karbala.</p><p>Statement 2: Ashura, the day of Imam Hussain's martyrdom, is marked on the 8th day of Muharram.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2369;&#2361;&#2352;&#2381;&#2352;&#2350; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2351;&#2361; &#2325;&#2352;&#2381;&#2348;&#2354;&#2366; &#2325;&#2368; &#2354;&#2337;&#2364;&#2366;&#2312; &#2350;&#2375;&#2306; &#2311;&#2350;&#2366;&#2350; &#2361;&#2369;&#2360;&#2376;&#2344; &#2325;&#2368; &#2358;&#2361;&#2366;&#2342;&#2340; &#2325;&#2368; &#2351;&#2366;&#2342; &#2342;&#2367;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2310;&#2358;&#2370;&#2352;&#2366;, &#2311;&#2350;&#2366;&#2350; &#2361;&#2369;&#2360;&#2376;&#2344; &#2325;&#2368; &#2358;&#2361;&#2366;&#2342;&#2340; &#2325;&#2366; &#2342;&#2367;&#2344;, &#2350;&#2369;&#2361;&#2352;&#2381;&#2352;&#2350; &#2325;&#2368; 8&#2357;&#2368;&#2306; &#2340;&#2366;&#2352;&#2368;&#2326; &#2325;&#2379; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both 1 and 2 are correct</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2 is correct</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2 &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Only 1</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Statement 1 is correct, while Statement 2 is incorrect.</p><p>Explanation of Statements:</p><p>Statement 1 is correct: Muharram is a month of solemn remembrance in the Islamic calendar. Its most significant event is the commemoration of the martyrdom of Imam Hussain, the grandson of the Prophet Muhammad, along with his family and companions. This tragic event occurred during the Battle of Karbala in 680 CE and is the central focus of the observance, especially for Shia Muslims.</p><p>Statement 2 is incorrect: Ashura, the day of Imam Hussain's martyrdom, is marked on the <b>10th day</b> of Muharram, not the 8th. The name 'Ashura' is derived from the Arabic word for ten. While Muharram is indeed the first month of the Islamic calendar, the date mentioned in the statement is factually wrong.</p><p>Further insights:</p><p>Muharram is observed as a period of intense mourning and grief by Shia Muslims, who hold processions (often called taziya) and assemblies (majlis) to recount the tragedy of Karbala.</p><p>Sunni Muslims also hold Imam Hussain in high regard and may observe Ashura with voluntary fasting and prayer, but the nature of the observance is different and not characterized by the same degree of public mourning.</p><p>The Islamic calendar is a lunar calendar, so the month of Muharram shifts relative to the Gregorian (solar) calendar each year.</p>",
    "question_index": 25
  },

    "question": "<span class=\"eqt\"><p>Match List I with List II and select the correct answer using the code given below the lists:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Type of Inflation</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Meaning</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A) Tottering Inflation</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Inflation Rises Slowly but it has the positive trend</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B) Creeping Inflation</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Sudden Rise of Inflation</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C) Core Inflation</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Base effect is considered while measuring Inflation.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D) Headline Inflation</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Inflation is measured without considering the base effect</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2330;&#2368; I &#2325;&#2379; &#2360;&#2370;&#2330;&#2368; II &#2360;&#2375; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2360;&#2370;&#2330;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2309;&#2352;&#2381;&#2341;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A) &#2335;&#2377;&#2335;&#2352;&#2367;&#2306;&#2327; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2343;&#2368;&#2352;&#2375;-&#2343;&#2368;&#2352;&#2375; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2311;&#2360;&#2325;&#2366; &#2352;&#2369;&#2333;&#2366;&#2344; &#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B) &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366;&#2348;&#2342;&#2381;&#2343; / &#2325;&#2381;&#2352;&#2350;&#2367;&#8205;&#2325;/&#2350;&#2306;&#2342; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2350;&#2375;&#2306; &#2309;&#2330;&#2366;&#2344;&#2325; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C) &#2350;&#2370;&#2354; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2375; &#2360;&#2350;&#2351; &#2310;&#2343;&#2366;&#2352; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D) &#2361;&#2375;&#2337;&#2354;&#2366;&#2311;&#2344; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2379; &#2310;&#2343;&#2366;&#2352; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2367;&#2319; &#2348;&#2367;&#2344;&#2366; &#2350;&#2366;&#2346;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">A(i); B(ii); C(iii); D(iv)</span><span class=\"hqt\" style=\"display:none\">A(i); B(ii); C(iii); D(iv)</span>",

    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Type of Inflation</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Meaning</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A) Tottering Inflation</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Sudden Rise of Inflation.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B) Creeping Inflation</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Inflation Rises Slowly but it has the positive trend.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C) Core Inflation</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Inflation is measured without considering the base effect.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D) Headline Inflation</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Base effect is considered while measuring Inflation.</td></tr></table>",

    "question": "<span class=\"eqt\"><p>As per census 2011, what is the percentage of Scheduled Castes among the total population in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>2011 &#2325;&#2368; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2325;&#2369;&#2354; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">15.8%</span><span class=\"hqt\" style=\"display:none\">15.8%</span>",
      "<span class=\"eqt\">20.5%</span><span class=\"hqt\" style=\"display:none\">20.5%</span>",

      "<span class=\"eqt\">17.7%</span><span class=\"hqt\" style=\"display:none\">17.7%</span>"

    "correct_option_id": 2,
    "solution": "<p>The Scheduled Castes comprise about <b>16.6 percent</b> (201 million), of India's population (according to the 2011 census).</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">State with highest population of Scheduled Castes</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Uttar Pradesh (201,378,372)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">State with highest proportion of Scheduled Castes</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Punjab (31.9 %)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">State with lowest proportion of Scheduled Castes</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Mizoram (0.1 %)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">UT with highest proportion of Scheduled Castes</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Chandigarh (18.9%)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">UT with lowest proportion of Scheduled Castes</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D &amp; N Haveli (1.8%)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">District with highest proportion of Scheduled Castes</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Koch-Bihar (50.1%)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">District with lowest proportion of Scheduled Castes</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lawngtlai Mizoram (0.01%)</td></tr></table>",

    "question": "<span class=\"eqt\"><p>Assume a situation where A has gone to a cinema hall with her friends to watch a movie. In the next seat she realises that it is her maid who is also watching the movie.</p><p>Now A asks her maid to leave the cinema hall. In the above scenario, which of the following Article of the Constitution of India can provide relief to the maid?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344; &#2354;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; A &#2309;&#2346;&#2344;&#2368; &#2360;&#2361;&#2375;&#2354;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2367;&#2344;&#2375;&#2350;&#2366; &#2361;&#2377;&#2354; &#2350;&#2375;&#2306; &#2347;&#2367;&#2354;&#2381;&#2350; &#2342;&#2375;&#2326;&#2344;&#2375; &#2327;&#2312; &#2361;&#2376;&#2404; &#2313;&#2360;&#2375; &#2346;&#2340;&#2366; &#2330;&#2354;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2309;&#2327;&#2354;&#2368; &#2360;&#2368;&#2335; &#2346;&#2352; &#2313;&#2360;&#2325;&#2368; &#2344;&#2380;&#2325;&#2352;&#2366;&#2344;&#2368; &#2349;&#2368; &#2347;&#2367;&#2354;&#2381;&#2350; &#2342;&#2375;&#2326; &#2352;&#2361;&#2368; &#2361;&#2376;&#2404;</p><p>&#2309;&#2348; A &#2309;&#2346;&#2344;&#2368; &#2344;&#2380;&#2325;&#2352;&#2366;&#2344;&#2368; &#2325;&#2379; &#2360;&#2367;&#2344;&#2375;&#2350;&#2366; &#2361;&#2377;&#2354; &#2360;&#2375; &#2348;&#2366;&#2361;&#2352; &#2332;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404; &#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2346;&#2352;&#2367;&#2342;&#2371;&#2358;&#2381;&#2351; &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2344;&#2380;&#2325;&#2352;&#2366;&#2344;&#2368; &#2325;&#2379; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 16</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 16</span>",
      "<span class=\"eqt\">Article 15</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 15</span>",
      "<span class=\"eqt\">Article 18</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 18</span>",
      "<span class=\"eqt\">Article 17</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 17</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In this scenario, the maid can seek relief under Article 15 of the Indian Constitution.</p><p></p><p>Article 15 prohibits discrimination on grounds including:</p><p>- Religion</p><p>- Race</p><p>- Caste</p><p>- Sex</p><p>- Place of Birth</p><p>Here, A asks the maid to leave simply because of her occupation (maid) which can be seen as a form of discrimination based on social status. Article 15 protects the maid from such discrimination and allows her to enjoy the same right to access public places like a cinema hall as anyone else.</p>",
    "question_index": 28
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about the Himalayan Outpost for Planetary Exploration (HOPE):</p><p>a. HOPE, located in Ladakh's Tso Kar Valley, is designed as a Mars-analogue station to test life-support systems and technologies for lunar and Martian missions.</p><p>b. The project is led by ISRO's Human Space Flight Centre, with support from industry partners and research institutions.</p><p>c. The HOPE facility consists of a single underground module designed for storage and equipment testing only.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2381;&#2352;&#2361; &#2309;&#2344;&#2381;&#2357;&#2375;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351;&#2344; &#2310;&#2313;&#2335;&#2346;&#2379;&#2360;&#2381;&#2335; (HOPE) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2354;&#2342;&#2381;&#2342;&#2366;&#2326; &#2325;&#2368; &#2340;&#2381;&#2360;&#2379; &#2325;&#2366;&#2352; &#2328;&#2366;&#2335;&#2368; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; HOPE &#2325;&#2379; &#2330;&#2306;&#2342;&#2381;&#2352; &#2324;&#2352; &#2350;&#2306;&#2327;&#2354; &#2350;&#2367;&#2358;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2368;&#2357;&#2344;-&#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2306;&#2327;&#2354;-&#2319;&#2344;&#2366;&#2354;&#2377;&#2327; &#2360;&#2381;&#2335;&#2375;&#2358;&#2344; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2337;&#2367;&#2332;&#2364;&#2366;&#2311;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>b. &#2311;&#2360; &#2346;&#2352;&#2367;&#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2366; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2311;&#2360;&#2352;&#2379; &#2325;&#2375; &#2350;&#2366;&#2344;&#2357; &#2309;&#2306;&#2340;&#2352;&#2367;&#2325;&#2381;&#2359; &#2313;&#2337;&#2364;&#2366;&#2344; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2352;&#2361;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2379;&#2306; &#2324;&#2352; &#2309;&#2344;&#2369;&#2360;&#2306;&#2343;&#2366;&#2344; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2361;&#2376;&#2404;</p><p>c. HOPE &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2350;&#2375;&#2306; &#2319;&#2325; &#2349;&#2370;&#2350;&#2367;&#2327;&#2340; &#2350;&#2377;&#2337;&#2381;&#2351;&#2370;&#2354; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; &#2325;&#2375;&#2357;&#2354; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339; &#2324;&#2352; &#2313;&#2346;&#2325;&#2352;&#2339; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2367;&#2332;&#2364;&#2366;&#2311;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>Marking a significant leap in India's space exploration efforts, the Indian Space Research Organisation (ISRO) has set up the Himalayan Outpost for Planetary Exploration (HOPE) in Ladakh's Tso Kar Valley.</p><p>It is a high-altitude, Mars-like environment selected to test life-support systems and technologies for future lunar and Martian missions.</p><p>The HOPE station, inaugurated on July 31 by ISRO chairman Dr V Narayanan, will be used to test systems for future space missions. The project is led by ISRO's Human Space Flight Centre, along with support from an industry partner and top research institutions.</p><p>The analogue mission is part of a growing international movement to study how humans might survive and thrive in extra-terrestrial environments by replicating the harsh conditions of other planets on Earth.</p><p>The Tso Kar Valley was chosen for its environmental similarities to Mars, which include high UV radiation, low atmospheric pressure, extreme cold and saline permafrost.</p><p>The HOPE facility has two connected units. One is an eight-metre wide living space for the crew, while the other is a five-metre utility module housing equipment and support systems. A 10-day trial mission is being held from August 1 to 10, where two crew members will stay inside and take part in various physical, mental and task-based tests.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following is not a type of capital account which is a part of balance of payment?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2325;&#2375; &#2319;&#2325; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375; &#2346;&#2370;&#2305;&#2332;&#2368;&#2327;&#2340; &#2354;&#2375;&#2326;&#2366; &#2325;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Foreign direct investment</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2344;&#2367;&#2357;&#2375;&#2358;</span>",
      "<span class=\"eqt\">External commercial borrowing</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2361;&#2381;&#2351; &#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351;&#2367;&#2325; &#2313;&#2343;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Foreign portfolio investment</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2346;&#2379;&#2352;&#2381;&#2335;&#2347;&#2379;&#2354;&#2367;&#2351;&#2379; &#2344;&#2367;&#2357;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Net remittances</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2357;&#2354; &#2357;&#2367;&#2346;&#2381;&#2352;&#2375;&#2359;&#2339;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Capital account which is a part of balance of payment consists of: foreign direct investment, foreign portfolio investment, external commercial borrowing, non-financial asset transfers.</p><p>Net remittances:</p><p>- These are transfers of money by individuals working abroad to their home countries.</p><p>- Remittances are recorded in the current account of the balance of payments, not the capital account.</p><p>- They are considered current transfers.</p><p></p><p>Foreign direct investment (FDI):</p><p>- This involves long-term investments where an investor gains control over a foreign company or asset.</p><p>- It's a core component of the capital account. </p><p>External commercial borrowing (ECB):</p><p>- This refers to loans raised by domestic entities from foreign commercial lenders. </p><p>- It's also a part of the capital account. </p><p>Foreign portfolio investment (FPI):</p><p>- This involves investments in foreign financial assets like stocks and bonds, without gaining control over the underlying companies. </p><p>- It is a part of the capital account. </p><p></p>",
    "question_index": 34
  },

    "question": "<span class=\"eqt\"><p>Which of the following is true about the Abel Prize 2025?</p><p>I. Japanese mathematician Masaki Kashiwara received the Abel Prize 2025 for his contributions to algebraic analysis and representation theory.</p><p>II. The Abel Prize was established by the Norwegian Parliament in 2002 and is awarded by the Norwegian Academy of Science and Letters.</p><p>III. Srinivasa S. R. Varadhan, an Indian-American mathematician, received the Abel Prize in 2010.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2348;&#2375;&#2354; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; 2025 &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p><p>I. &#2332;&#2366;&#2346;&#2366;&#2344;&#2368; &#2327;&#2339;&#2367;&#2340;&#2332;&#2381;&#2334; &#2350;&#2360;&#2366;&#2325;&#2368; &#2325;&#2366;&#2358;&#2368;&#2357;&#2366;&#2352;&#2366; &#2325;&#2379; &#2348;&#2368;&#2332;&#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2357;&#2367;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2375; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2348;&#2375;&#2354; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; 2025 &#2350;&#2367;&#2354;&#2366;&#2404;</p><p>II. &#2319;&#2348;&#2375;&#2354; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; 2002 &#2350;&#2375;&#2306; &#2344;&#2377;&#2352;&#2381;&#2357;&#2375;&#2332;&#2367;&#2351;&#2344; &#2360;&#2306;&#2360;&#2342; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368; &#2324;&#2352; &#2311;&#2360;&#2375; &#2344;&#2377;&#2352;&#2381;&#2357;&#2375;&#2332;&#2367;&#2351;&#2344; &#2319;&#2325;&#2375;&#2337;&#2350;&#2368; &#2321;&#2347; &#2360;&#2366;&#2311;&#2306;&#2360; &#2319;&#2306;&#2337; &#2354;&#2375;&#2335;&#2352;&#2381;&#2360; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2349;&#2366;&#2352;&#2340;&#2368;&#2351;-&#2309;&#2350;&#2375;&#2352;&#2367;&#2325;&#2368; &#2327;&#2339;&#2367;&#2340;&#2332;&#2381;&#2334; &#2358;&#2381;&#2352;&#2368;&#2344;&#2367;&#2357;&#2366;&#2360; &#2319;&#2360;. &#2310;&#2352;. &#2357;&#2352;&#2381;&#2343;&#2344; &#2325;&#2379; 2010 &#2350;&#2375;&#2306; &#2319;&#2348;&#2375;&#2354; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2350;&#2367;&#2354;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Indian-American mathematician Srinivasa S. R. Varadhan was awarded the Abel Prize in <b>2007(Hence statement III is incorrect.)</b> for his fundamental contributions to probability theory and in particular for creating a unified theory of large deviation.</p><p>He is the first and only person of Indian origin to have received this honor so far.</p><p>The Japanese mathematician Masaki Kashiwara has been awarded the Abel Prize 2025 for his fundamental contributions to algebraic analysis and representation theory, particularly the development of D-modules theory and the discovery of crystal bases.</p><p>The Abel Prize recognises pioneering scientific achievements in mathematics.</p><p>The prize includes a monetary award of 7.5 million kroner (roughly $720,000) and a glass plaque designed by Norwegian artist Henrik Haugan.</p><p>It is named after Norwegian mathematician Niels Henrik Abel (1802-29), who in his short life made pioneering contributions to multiple fields.</p><p>The prize was established by the Norwegian Parliament in 2002, on Abel's 200th anniversary.</p><p>The Abel Prize is awarded and administered by the Norwegian Academy of Science and Letters on behalf of the Norwegian government.</p><p></p>",
    "question_index": 36
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct about the Qutub Minar?</p><p>I. It is an evenly circular tower built during Sultanate period.</p><p>II. It is largely built of red sandstone.</p><p>Select the correct answer using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2369;&#2340;&#2369;&#2348; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2351;&#2361; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2319;&#2325; &#2360;&#2350;&#2366;&#2344; &#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2350;&#2368;&#2344;&#2366;&#2352; &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2361; &#2348;&#2337;&#2364;&#2375; &#2346;&#2376;&#2350;&#2366;&#2344;&#2375; &#2346;&#2352; &#2354;&#2366;&#2354; &#2348;&#2354;&#2369;&#2310; &#2346;&#2340;&#2381;&#2341;&#2352; &#2360;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Qutub Minar was built in the thirteenth century during Sultanate period. It is a 234-feet-high tapering tower divided into five storeys. The construction of the minar was started by <b>Qutub-din Aibak.</b></p><p>The minar is a <b>mix of polygonal and circular shapes</b>. It is largely built of <b>red and buff sandstone</b> with some use of marble in the upper storeys. It is characterized by highly decorated balconies and bands of inscriptions intertwined with foliated designs. <b>So, statement I is incorrect and statement II is correct.</b></p><p>Source- NCERT- Art and Culture</p>",
    "question_index": 37
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the distribution of tax proceeds between the Union and the States in India:</p><p>i) Under Article 270, all taxes and duties referred to in the Union List, including cesses and surcharges, must be distributed between the Union and the States.</p><p>ii) The specific ratio of vertical devolution of taxes is decided by the President of India at his discretion without any external recommendation.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2360;&#2306;&#2328; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2352; &#2310;&#2351; &#2325;&#2375; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i) &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 270 &#2325;&#2375; &#2340;&#2361;&#2340;, &#2360;&#2306;&#2328; &#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2313;&#2354;&#2381;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2349;&#2368; &#2325;&#2352; &#2324;&#2352; &#2358;&#2369;&#2354;&#2381;&#2325;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2360;&#2375;&#2360; &#2324;&#2352; &#2309;&#2343;&#2367;&#2349;&#2366;&#2352; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;, &#2360;&#2306;&#2328; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2367;&#2340;&#2352;&#2367;&#2340; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p>ii) &#2325;&#2352;&#2379;&#2306; &#2325;&#2375; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2366; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2346;&#2344;&#2368; &#2350;&#2352;&#2381;&#2332;&#2368; &#2360;&#2375; &#2348;&#2367;&#2344;&#2366; &#2325;&#2367;&#2360;&#2368; &#2348;&#2366;&#2361;&#2352;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358; &#2325;&#2375; &#2340;&#2351; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i</span>",
      "<span class=\"eqt\">ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii</span>",
      "<span class=\"eqt\">Both i and ii</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">Neither i nor ii</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; i &#2324;&#2352; &#2344; &#2361;&#2368; ii</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Statement i is incorrect</b></p><p>Under Article 270 of the Constitution, taxes mentioned in the Union List are shared between the Union and the States.</p><p>BUT  -  cesses and surcharges are NOT shareable.</p><p>They are kept exclusively by the Union government.</p><p><b>Statement ii is incorrect</b></p><p>The vertical devolution ratio (how much % States get from the divisible pool) is not decided independently by the President.</p><p>It is recommended by the Finance Commission under Article 280.</p><p>The President only appoints the Finance Commission.</p><p>He does not personally decide the percentage.</p><p><b><u>Further Insights </u></b></p><p>&#8226; Cess is imposed for a specific purpose (e.g., education cess).</p><p>&#8226; Surcharge is an additional charge on existing tax.</p><p>&#8226; States have repeatedly raised concern over increasing use of cess &amp; surcharge by the Centre.</p><p>&#8226; Vertical devolution = Centre vs States share.</p><p>&#8226; Horizontal devolution = Distribution among States.</p>",
    "question_index": 38
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements are INCORRECT?</p><p>a) The Judge of the Supreme Court shall hold office until he attains the age of sixty-five years</p><p>b) Supreme Court by issuing notice can increase the number of Judges in the Supreme Court.</p><p>c) Judge of the Supreme Court give resignation to Prime Minister of India</p><p>d) Ground for the removal of Supreme Court Judge are Proved Misbehaviour or incapacity</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; <b>&#2327;&#2354;&#2340;</b> &#2361;&#2376;?</p><p>a) &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; 65 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2340;&#2325; &#2346;&#2342; &#2346;&#2352; &#2352;&#2361;&#2375;&#2327;&#2366;&#2404;</p><p>b) &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2344;&#2379;&#2335;&#2367;&#2360; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2325;&#2375; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2348;&#2338;&#2364;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>c) &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2379; &#2311;&#2360;&#2381;&#2340;&#2368;&#2347;&#2366; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>d) &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2379; &#2361;&#2335;&#2366;&#2344;&#2375; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2360;&#2367;&#2342;&#2381;&#2343; &#2342;&#2369;&#2352;&#2381;&#2357;&#2381;&#2351;&#2357;&#2361;&#2366;&#2352; &#2351;&#2366; &#2309;&#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only c and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; a</span>",
      "<span class=\"eqt\">Only a and d</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; d</span>",
      "<span class=\"eqt\">Only b and d</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; d</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The Judge of the Supreme Court shall hold office until he attains the age of sixty-five years</p><p>&bull; Only Parliament by law can increase the Number of Supreme Court Judges</p><p>&bull; The Judge of the Supreme Court gave resignation to the President of India</p><p>&bull; Ground for the removal of Supreme Court Judge are Proved Misbehaviour or incapacity</p><p>Further Insight:</p><p>&bull; <b>Article 124: Establishment and Constitution of the Supreme Court</b></p><p>&#9675; Composition:</p><p>&#9632; The Supreme Court consists of the Chief Justice of India (CJI) and up to seven other judges unless Parliament prescribes a larger number.</p><p>&#9632; Maximum no. of Judges till Nov 2024 is 34 (1 CJI + 33 Judges)</p><p>&#9675; Appointment of Judges:</p><p>&#9632; Judges appointed by the President on the recommendation of the National Judicial Appointments Commission (Article 124A).</p><p>&#9632; Article 124A(Added in 99th Amendment Act,2014) struck down by the Supreme Court in Case of Supreme Court Advocates-on-Record Association and another Vs Union of India in its judgment dated 16-10-2015,AIR 2016 SC 117.</p><p>&#9675; Tenure:</p><p>&#9632; Judges hold office until 65 years of age.</p><p>&#9632; A Judge can resign by addressing the President.</p><p>&#9675; Removal:</p><p>&#9632; Removal requires an order by the President after an address by each House of Parliament with a two-thirds majority for misbehavior or incapacity (Clause 4).</p><p>&#9675; Qualifications:</p><p>&#9632; Indian citizen and:</p><p>(a) At least 5 years as High Court Judge; or</p><p>(b) 10 years as High Court advocate; or</p><p>(c) Distinguished jurist in President's opinion.</p><p>&#9675; Oath:</p><p>&#9632; Judges must take an oath before the President (Third Schedule).</p><p>&#9675; Restrictions:</p><p>&#9632; Former Supreme Court judges cannot plead or act in any court in India.</p>",
    "question_index": 39
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements are correct about Raga system in Indian Music?</p><p>I. Raga Bhairavi is usually sung in the morning.</p><p>II. Raga Yaman is traditionally performed in the evening.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2327;&#2368;&#2340; &#2350;&#2375;&#2306; &#2352;&#2366;&#2327; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>I. &#2352;&#2366;&#2327; &#2349;&#2376;&#2352;&#2357;&#2368; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2360;&#2369;&#2348;&#2361; &#2350;&#2375;&#2306; &#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2352;&#2366;&#2327; &#2351;&#2350;&#2344; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2358;&#2366;&#2350; &#2325;&#2379; &#2348;&#2332;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Both statements I and II are correct.</p><p>Explanation:</p><p>Statement I is correct. Raga Bhairavi is a quintessential morning raga. In the tradition of Hindustani classical music, it is often performed at the conclusion of a morning concert.</p><p>Statement II is correct. Raga Yaman is one of the most prominent evening ragas. It is traditionally performed during the first prahar (a three-hour period) of the night, right after sunset.</p><p>Further insights:</p><p>Hindustani classical music follows a time theory known as samay chakra, where specific ragas are associated with particular times of the day or seasons to evoke the appropriate mood (rasa).</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following best describes the 'Package Technology' approach adopted during the Green Revolution in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2361;&#2352;&#2367;&#2340; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2309;&#2346;&#2344;&#2366;&#2312; &#2327;&#2312; '&#2346;&#2376;&#2325;&#2375;&#2332; &#2340;&#2325;&#2344;&#2368;&#2325;' &#2342;&#2371;&#2359;&#2381;&#2335;&#2367;&#2325;&#2379;&#2339; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It focused only on using High-Yielding Variety (HYV) seeds of wheat and rice to increase food production.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2344;&#2375; &#2325;&#2375;&#2357;&#2354; &#2326;&#2366;&#2342;&#2381;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2375;&#2361;&#2370;&#2306; &#2324;&#2352; &#2330;&#2366;&#2357;&#2354; &#2325;&#2375; &#2313;&#2330;&#2381;&#2330; &#2313;&#2346;&#2332; &#2357;&#2366;&#2354;&#2368; &#2325;&#2367;&#2360;&#2381;&#2350; (HYV) &#2325;&#2375; &#2348;&#2368;&#2332;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2343;&#2381;&#2351;&#2366;&#2344; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">It followed a combined approach using HYV seeds along with fertilizers, irrigation, credit facilities, and price support to make farming successful.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2344;&#2375; HYV &#2348;&#2368;&#2332;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2313;&#2352;&#2381;&#2357;&#2352;&#2325;, &#2360;&#2367;&#2306;&#2330;&#2366;&#2312;, &#2315;&#2339; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366;&#2319;&#2306;, &#2324;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2366; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2342;&#2371;&#2359;&#2381;&#2335;&#2367;&#2325;&#2379;&#2339; &#2309;&#2346;&#2344;&#2366;&#2351;&#2366; &#2340;&#2366;&#2325;&#2367; &#2326;&#2375;&#2340;&#2368; &#2360;&#2347;&#2354; &#2361;&#2379; &#2360;&#2325;&#2375;&#2404;</span>",
      "<span class=\"eqt\">It aimed to reduce the role of the central government by giving states one-time financial help for buying farm machines.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2366; &#2341;&#2366;, &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2325;&#2371;&#2359;&#2367; &#2350;&#2358;&#2368;&#2344;&#2375;&#2306; &#2326;&#2352;&#2368;&#2342;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2348;&#2366;&#2352; &#2325;&#2368; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2342;&#2375;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">It mainly targeted land reforms by redistributing land from large farmers in return for modern farming tools.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2344;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2349;&#2370;&#2350;&#2367; &#2360;&#2369;&#2343;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2354;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;, &#2348;&#2337;&#2364;&#2375; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2349;&#2370;&#2350;&#2367; &#2346;&#2369;&#2344;&#2352;&#2381;&#2357;&#2367;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352;&#2325;&#2375; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2325;&#2371;&#2359;&#2367; &#2313;&#2346;&#2325;&#2352;&#2339; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2348;&#2342;&#2354;&#2375;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Package Technology approach was not limited to a single input. It was designed as an integrated agricultural strategy, where multiple components worked together:</p><p>High-Yielding Variety (HYV) seeds</p><p>Chemical fertilizers and pesticides</p><p>Assured irrigation</p><p>Institutional credit</p><p>Price support mechanisms (like MSP) and procurement systems</p><p>All these elements were introduced simultaneously to ensure that farmers could actually benefit from new technology and increase productivity sustainably.</p><p>Further Insights</p><p>&#8226; The Package Technology approach was initially successful mainly in Punjab, Haryana, and western Uttar Pradesh.</p><p>&#8226; HYV seeds are input-intensive and require assured irrigation and fertilizers.</p><p>&#8226; Institutional credit reduced farmers' dependence on moneylenders.</p><p>&#8226; Price support encouraged farmers to adopt riskier but high-yield crops.</p><p>&#8226; The approach increased food production but also led to regional and social inequalities.</p>",
    "question_index": 41
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements about PM JUGA (Pradhan Mantri Janjatiya Unnat Gram Abhiyan) is/are correct?</p><p>I. PM JUGA was launched on October 2, 2024, from Hazaribagh, Jharkhand, to promote comprehensive socio-economic development of tribal communities across India.</p><p>II. The scheme is exclusively limited to the development of Particularly Vulnerable Tribal Groups (PVTGs) and does not include other Scheduled Tribe populations residing in tribal-majority villages.</p><p>III. PM JUGA is implemented through 17 line ministries and supports flagship programmes to improve infrastructure, education, healthcare, livelihoods and connectivity in tribal-majority villages and aspirational districts.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2332;&#2344;&#2332;&#2366;&#2340;&#2368;&#2351; &#2313;&#2344;&#2381;&#2344;&#2340; &#2327;&#2381;&#2352;&#2366;&#2350; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; (&#2346;&#2368;&#2319;&#2350; &#2332;&#2369;&#2327;&#2366;) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2346;&#2368;&#2319;&#2350; &#2332;&#2369;&#2327;&#2366; &#2325;&#2379; 2 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;, 2024 &#2325;&#2379; &#2333;&#2366;&#2352;&#2326;&#2306;&#2337; &#2325;&#2375; &#2361;&#2332;&#2366;&#2352;&#2368;&#2348;&#2366;&#2327; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2349;&#2352; &#2350;&#2375;&#2306; &#2310;&#2342;&#2367;&#2357;&#2366;&#2360;&#2368; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351;&#2379;&#2306; &#2325;&#2375; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325;-&#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>II. &#2351;&#2361; &#2351;&#2379;&#2332;&#2344;&#2366; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2350;&#2332;&#2379;&#2352; &#2310;&#2342;&#2367;&#2357;&#2366;&#2360;&#2368; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; (&#2346;&#2368;&#2357;&#2368;&#2335;&#2368;&#2332;&#2368;) &#2325;&#2375; &#2357;&#2367;&#2325;&#2366;&#2360; &#2340;&#2325; &#2360;&#2368;&#2350;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2350;&#2375;&#2306; &#2310;&#2342;&#2367;&#2357;&#2366;&#2360;&#2368;-&#2348;&#2361;&#2369;&#2360;&#2306;&#2326;&#2381;&#2351;&#2325; &#2327;&#2366;&#2306;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2309;&#2344;&#2381;&#2351; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367; &#2310;&#2348;&#2366;&#2342;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p><p>III. &#2346;&#2368;&#2319;&#2350; &#2332;&#2369;&#2327;&#2366; &#2325;&#2379; 17 &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351;&#2379;&#2306; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2351;&#2361; &#2310;&#2342;&#2367;&#2357;&#2366;&#2360;&#2368;-&#2348;&#2361;&#2369;&#2360;&#2306;&#2326;&#2381;&#2351;&#2325; &#2327;&#2366;&#2306;&#2357;&#2379;&#2306; &#2324;&#2352; &#2310;&#2325;&#2366;&#2306;&#2325;&#2381;&#2359;&#2368; &#2332;&#2367;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2369;&#2344;&#2367;&#2351;&#2366;&#2342;&#2368; &#2338;&#2366;&#2306;&#2330;&#2375;, &#2358;&#2367;&#2325;&#2381;&#2359;&#2366;, &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2360;&#2375;&#2357;&#2366;, &#2310;&#2332;&#2368;&#2357;&#2367;&#2325;&#2366; &#2324;&#2352; &#2325;&#2344;&#2375;&#2325;&#2381;&#2335;&#2367;&#2357;&#2367;&#2335;&#2368; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350;&#2379;&#2306; &#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I and II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2350;&#2376;&#2306; &#2324;&#2352; II &#2350;&#2376;&#2306;</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">Only I and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2350;&#2376;&#2306; &#2324;&#2352; III &#2350;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Statement I is correct: PM JUGA (also known as Dharti Aaba Janjatiya Gram Utkarsh Abhiyan) was inaugurated on October 2, 2024 at Hazaribagh, Jharkhand with the goal of uplifting tribal communities on a broad socio-economic front.</p><p>Statement II is incorrect: While PM JUGA builds upon the earlier PM Janjati Adivasi Nyaya Maha Abhiyan (PM JANMAN) that focused on PVTGs, PM JUGA's scope is broader - it covers all Scheduled Tribes living in tribal-majority villages and aspirational districts, not just PVTGs.</p><p>Statement III is correct: The mission is implemented through 17 line ministries, coordinating flagship schemes that address gaps in housing, education, healthcare, livelihood, roads and connectivity for tribal populations and their villages.</p>",
    "question_index": 42
  },

    "question": "<span class=\"eqt\"><p>Read the following statement carefully one is marked as Assertion(A) and other is marked as Reason (R).</p><p>Assertion (A): Akbar's Din-i Ilahi (1582) functioned as a small, court-centric fellowship of spiritual disciples rather than a mass religion.</p><p>Reason (R): Its focus was loyalty and ethical conduct among a select nobility, not conversion of the general population.</p><p>Choose the correct option from below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344; &#2360;&#2375; &#2346;&#2338;&#2364;&#2375;&#2306;, &#2319;&#2325; &#2325;&#2379; &#2342;&#2366;&#2357;&#2375; (A) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2325;&#2366;&#2352;&#2339; (R) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>&#2342;&#2366;&#2357;&#2366; (A): &#2309;&#2325;&#2348;&#2352; &#2325;&#2366; &#2342;&#2368;&#2344;-&#2319; &#2311;&#2354;&#2366;&#2361;&#2368; (1582) &#2319;&#2325; &#2348;&#2337;&#2364;&#2375; &#2343;&#2352;&#2381;&#2350; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2310;&#2343;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2367;&#2325; &#2358;&#2367;&#2359;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2319;&#2325; &#2331;&#2379;&#2335;&#2375;, &#2342;&#2352;&#2348;&#2366;&#2352;&#2368; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2360;&#2306;&#2328; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2341;&#2366;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2311;&#2360;&#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2343;&#2352;&#2381;&#2350;&#2366;&#2306;&#2340;&#2352;&#2339; &#2346;&#2352; &#2344;&#2361;&#2368;&#2306;, &#2348;&#2354;&#2381;&#2325;&#2367; &#2319;&#2325; &#2330;&#2351;&#2344;&#2367;&#2340; &#2325;&#2369;&#2354;&#2368;&#2344; &#2357;&#2352;&#2381;&#2327; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2344;&#2367;&#2359;&#2381;&#2336;&#2366; &#2324;&#2352; &#2344;&#2376;&#2340;&#2367;&#2325; &#2310;&#2330;&#2352;&#2339; &#2346;&#2352; &#2341;&#2366;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2360;&#2375; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; A &#2324;&#2352; R &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; A &#2324;&#2352; R &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is true, but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2361;&#2368; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2327;&#2354;&#2340; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is false, but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2327;&#2354;&#2340; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2361;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A is true: the Tauhid-i Ilahi had very few initiates (e.g., Birbal) and lacked institutional structures of a religion.</p><p>R is true and gives the rationale: it was aimed at binding a circle of nobles through ethical vows and loyalty.</p><p>Further Insights:</p><p>- Akbar's Ibadat Khana debates at Fatehpur Sikri began in 1575; scholars of multiple faiths were invited.</p><p>- The \"Mahzar\" (1579) enhanced Akbar's role in adjudicating religious matters.</p><p>- Akbar abolished the jizya in 1564 and the pilgrim tax in 1563; Aurangzeb reinstated jizya in 1679.</p><p>- Abul Fazl authored Akbarnama and Ain-i Akbari; \"sulh-ikul\" (peace with all) underpinned Akbar's policy.</p><p>- The Maktab Khana oversaw translations (e.g., Mahabharata as Razmnama) into Persian.</p>",
    "question_index": 43
  },
  {
    "question": "<span class=\"eqt\"><p>Which dance is typified by women moving in circles around a centrally placed earthen lamp or an image of the goddess during Navratri?</p><p></p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2357;&#2352;&#2366;&#2340;&#2381;&#2352;&#2367; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2371;&#2340;&#2381;&#2351; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2343;&#2381;&#2351; &#2350;&#2375;&#2306; &#2352;&#2326;&#2375; &#2327;&#2319; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2375; &#2342;&#2368;&#2346;&#2325; &#2351;&#2366; &#2342;&#2375;&#2357;&#2368; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2350;&#2366; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2327;&#2340;&#2367; &#2350;&#2375;&#2306; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Garba</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2352;&#2348;&#2366;</span>",
      "<span class=\"eqt\">Bihu</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2361;&#2369;</span>",
      "<span class=\"eqt\">Lavani</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2357;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Giddha</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2367;&#2342;&#2381;&#2343;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Garba</b> of Gujarat features circular movements around a lamp (garbo/deep) or the image of Amba, especially during Navratri.</p><p>Bihu (Assam) is a spring-harvest dance; Lavani (Maharashtra) uses the dholki; Giddha is a Punjabi women's dance.</p><p>Further Insights:</p><p>- In 2023, \"Garba of Gujarat\" entered UNESCO's Representative List of Intangible Cultural Heritage.</p><p>- Dandiya Raas, often alongside Garba, uses decorated sticks (dandiyas).</p><p>- Major Garba venues include Vadodara's Navlakhi and Ahmedabad's University Ground.</p><p>- Other UNESCO-inscribed Indian performing arts include Koodiyattam (2008), Chhau (2010), Ramlila (2008).</p><p></p>",
    "question_index": 44
  },
  {
    "question": "<span class=\"eqt\"><p>In March 2026, who became the first woman to head a functional nuclear power plant in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2352;&#2381;&#2330; 2026 &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2306;&#2351;&#2306;&#2340;&#2381;&#2352; &#2325;&#2368; &#2346;&#2361;&#2354;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2325;&#2380;&#2344; &#2348;&#2344;&#2368;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ritu Karidhal</span><span class=\"hqt\" style=\"display:none\">&#2315;&#2340;&#2369; &#2325;&#2352;&#2367;&#2343;&#2354;</span>",
      "<span class=\"eqt\">Tessy Thomas</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2376;&#2360;&#2368; &#2341;&#2377;&#2350;&#2360;</span>",
      "<span class=\"eqt\">Gagandeep Kang</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2327;&#2344;&#2342;&#2368;&#2346; &#2325;&#2366;&#2306;&#2327;</span>",
      "<span class=\"eqt\">RM Nachammai</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2319;&#2350; &#2344;&#2330;&#2350;&#2381;&#2350;&#2312;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>RM Nachammai became the first woman Chief Superintendent of a functional nuclear power plant in India, heading operations at the Kaiga Generating Station (Units 3 & 4) under Nuclear Power Corporation of India Ltd (NPCIL).</p><p>Her appointment marks a breakthrough not only for the organisation but also for India's broader push to expand clean, reliable nuclear energy as the country targets 100 gigawatts of nuclear capacity by 2047.</p><p>Nachammai took charge as Chief Superintendent of Karnataka's Kaiga Generating Station Units 3 and 4, effective March 15, placing her at the helm of the Operations, Maintenance and Engineering Support divisions of the operational nuclear reactor complex.</p><p>The role is considered one of the most technically intense and responsibility-laden positions in the nuclear power ecosystem, involving round-the-clock oversight of reactor operations, safety systems and plant performance.</p>",
    "question_index": 45
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the climate of India:</p><p>1) The Indian climate is primarily influenced by the monsoon winds.</p><p>2) The Himalayas play a crucial role in preventing cold continental winds from entering India.</p><p>3) India experiences uniform rainfall throughout the year in all regions.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344;&#2368; &#2361;&#2357;&#2366;&#2323;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2336;&#2306;&#2337;&#2368; &#2350;&#2361;&#2366;&#2342;&#2381;&#2357;&#2368;&#2346;&#2368;&#2351; &#2361;&#2357;&#2366;&#2323;&#2306; &#2325;&#2379; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352;&#2344;&#2375; &#2360;&#2375; &#2352;&#2379;&#2325;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2344;&#2367;&#2349;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2349;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2319;&#2325;&#2360;&#2350;&#2366;&#2344; &#2357;&#2352;&#2381;&#2359;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Solution:</b><b></p><p></b>Statements <b>1 and 2</b> are correct.</p><p>Statement <b>3</b> is incorrect because <b>rainfall in India is highly uneven and seasonal</b>, largely dependent on the monsoon system.</p>",
    "question_index": 46
