<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="60">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The Guntur inspection was held 6 days after the Nellore inspection. The Kurnool inspection was held 8 days before the Nellore inspection. The Tirupati inspection was held 3 days after the Guntur inspection. If the Tirupati inspection was held on 29th July, on what date was the Kurnool inspection held?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2306;&#2335;&#2370;&#2352; &#2344;&#2367;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2344;&#2375;&#2354;&#2381;&#2354;&#2379;&#2352; &#2344;&#2367;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2375; 6 &#2342;&#2367;&#2344; &#2348;&#2366;&#2342; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404; &#2325;&#2352;&#2381;&#2344;&#2370;&#2354; &#2344;&#2367;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2344;&#2375;&#2354;&#2381;&#2354;&#2379;&#2352; &#2344;&#2367;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2360;&#2375; 8 &#2342;&#2367;&#2344; &#2346;&#2361;&#2354;&#2375; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404; &#2340;&#2367;&#2352;&#2369;&#2346;&#2340;&#2367; &#2344;&#2367;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2327;&#2369;&#2306;&#2335;&#2370;&#2352; &#2344;&#2367;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2375; 3 &#2342;&#2367;&#2344; &#2348;&#2366;&#2342; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404; &#2351;&#2342;&#2367; &#2340;&#2367;&#2352;&#2369;&#2346;&#2340;&#2367; &#2344;&#2367;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; 29 &#2332;&#2369;&#2354;&#2366;&#2312; &#2325;&#2379; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;, &#2340;&#2379; &#2325;&#2352;&#2381;&#2344;&#2370;&#2354; &#2344;&#2367;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2367;&#2360; &#2340;&#2366;&#2352;&#2368;&#2326; &#2325;&#2379; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">13th July</span><span class=\"hqt\" style=\"display:none\">13 &#2332;&#2369;&#2354;&#2366;&#2312;</span>",
      "<span class=\"eqt\">11th July</span><span class=\"hqt\" style=\"display:none\">11 &#2332;&#2369;&#2354;&#2366;&#2312;</span>",
      "<span class=\"eqt\">12th July</span><span class=\"hqt\" style=\"display:none\">12 &#2332;&#2369;&#2354;&#2366;&#2312;</span>",
      "<span class=\"eqt\">14th July</span><span class=\"hqt\" style=\"display:none\">14 &#2332;&#2369;&#2354;&#2366;&#2312;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Tirupati inspection = 29th July</p><p>Guntur inspection = 29th July &#8722; 3 days = 26th July</p><p>Nellore inspection = 26th July &#8722; 6 days = 20th July</p><p>Kurnool inspection = 20th July &#8722; 8 days = 12th July</p><p>Hence, the required date is 12th July.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain letter-number code, CE = 24, FH = 84, and IK = 180. What is the value of DJ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379;&#2337; &#2350;&#2375;&#2306;, CE = 24, FH = 84, &#2324;&#2352; IK = 180 &#2361;&#2376;&#2404; DJ &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">62</span><span class=\"hqt\" style=\"display:none\">62</span>",
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">56</span><span class=\"hqt\" style=\"display:none\">56</span>",
      "<span class=\"eqt\">60</span><span class=\"hqt\" style=\"display:none\">60</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let p = position of the first letter and q = position of the second letter in the English alphabet.</p><p>Code = p  X  (p + q)</p><p>For CE:</p><p>C = 3, E = 5</p><p>3  X  (3 + 5)</p><p>= 3  X  8</p><p>= 24</p><p>For FH:</p><p>F = 6, H = 8</p><p>6  X  (6 + 8)</p><p>= 6  X  14</p><p>= 84</p><p>For IK:</p><p>I = 9, K = 11</p><p>9  X  (9 + 11)</p><p>= 9  X  20</p><p>= 180</p><p>For DJ:</p><p>D = 4, J = 10</p><p>4  X  (4 + 10)</p><p>= 4  X  14</p><p>= 56</p><p>Hence, DJ = 56</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statement and choose the option that follows.</p><p>Problem: Complaints of loud music from banquet halls near hospitals are increasing at night.</p><p>Course of Action:</p><p>1) Permanently cancel all event bookings in every banquet hall of the city.</p><p>2) Stop issuing marriage certificates during the wedding season.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2379; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2360;&#2350;&#2360;&#2381;&#2351;&#2366;: &#2309;&#2360;&#2381;&#2346;&#2340;&#2366;&#2354;&#2379;&#2306; &#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2375; &#2348;&#2376;&#2306;&#2325;&#2381;&#2357;&#2375;&#2335; &#2361;&#2377;&#2354; &#2360;&#2375; &#2352;&#2366;&#2340; &#2350;&#2375;&#2306; &#2340;&#2375;&#2332; &#2360;&#2306;&#2327;&#2368;&#2340; &#2325;&#2368; &#2358;&#2367;&#2325;&#2366;&#2351;&#2340;&#2375;&#2306; &#2348;&#2338;&#2364; &#2352;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2366;&#2352;&#2381;&#2352;&#2357;&#2366;&#2312; &#2325;&#2366; &#2350;&#2366;&#2352;&#2381;&#2327;:</p><p>1) &#2358;&#2361;&#2352; &#2325;&#2375; &#2361;&#2352; &#2348;&#2376;&#2306;&#2325;&#2381;&#2357;&#2375;&#2335; &#2361;&#2377;&#2354; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2348;&#2369;&#2325;&#2367;&#2306;&#2327; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2352;&#2342;&#2381;&#2342; &#2325;&#2352; &#2342;&#2375;&#2306;&#2404;</p><p>2) &#2358;&#2366;&#2342;&#2368; &#2325;&#2375; &#2350;&#2380;&#2360;&#2350; &#2350;&#2375;&#2306; &#2357;&#2367;&#2357;&#2366;&#2361; &#2346;&#2381;&#2352;&#2350;&#2366;&#2339; &#2346;&#2340;&#2381;&#2352; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2366; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only 1 follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only 2 follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both 1 and 2 follow</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; 1 &#2324;&#2352; 2 &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2 follows</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2 &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Course of Action 1 does not follow because permanent cancellation of all event bookings in the entire city is extreme and unrelated in many places.</p><p>Course of Action 2 also does not follow because marriage certificates have no direct connection with controlling sound pollution near hospitals.</p><p>The problem needs regulation of noise, not unrelated blanket restrictions.</p><p>Therefore, neither 1 nor 2 follows.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If \"+\" means division, \"-\" means addition, \"x\" means multiplication, and \"&div;\" means subtraction, then solve:</p><p>48 - 12 + 6 x 3 &div; 9 = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; \"+\" &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2349;&#2366;&#2327; &#2361;&#2376;, \"-\" &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2332;&#2379;&#2337;&#2364; &#2361;&#2376;, \"x\" &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2327;&#2369;&#2339;&#2366; &#2361;&#2376;, &#2324;&#2352; \"&div;\" &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2328;&#2335;&#2366;&#2357; &#2361;&#2376;, &#2340;&#2379; &#2361;&#2354; &#2325;&#2352;&#2375;&#2306;:</p><p>48 - 12 + 6 x 3 &div; 9 = ?</p></span>",
    "options": [
      "<span class=\"eqt\">39</span><span class=\"hqt\" style=\"display:none\">39</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">51</span><span class=\"hqt\" style=\"display:none\">51</span>",
      "<span class=\"eqt\">42</span><span class=\"hqt\" style=\"display:none\">42</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Using the new meanings and applying BODMAS,</p><p>48 - 12 + 6 x 3 &div; 9</p><p>= 48 + 12 &div; 6  X  3 - 9</p><p>= 48 + 2  X  3 - 9</p><p>= 48 + 6 - 9</p><p>= 54 - 9</p><p>= 45</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, FARMING is written as ELGKPYD. How will TEACHER be written in that code language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, FARMING &#2325;&#2379; ELGKPYD &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; TEACHER &#2325;&#2379; &#2325;&#2376;&#2360;&#2375; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">PCFAYRC</span><span class=\"hqt\" style=\"display:none\">PCFAYRC</span>",
      "<span class=\"eqt\">PCFZYCR</span><span class=\"hqt\" style=\"display:none\">PCFZYCR</span>",
      "<span class=\"eqt\">PCFAYCR</span><span class=\"hqt\" style=\"display:none\">PCFAYCR</span>",
      "<span class=\"eqt\">PCEAYCR</span><span class=\"hqt\" style=\"display:none\">PCEAYCR</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The rule is:</p><p>Write the letters in reversible order, i.e. 7th, 6th, 5th, 4th, 3rd, 2nd, 1st</p><p>After rearranging, subtract 2 from each obtained letter.</p><p>The alphabet is taken cyclically wherever needed.</p><p>FARMING</p><p>F A R M I N G</p><p>Rearranged</p><p>G N I M R A F</p><p>Now subtract 2 from each letter</p><p>G - 2 = E</p><p>N - 2 = L</p><p>I - 2 = G</p><p>M - 2 = K</p><p>R - 2 = P</p><p>A - 2 = Y</p><p>F - 2 = D</p><p>So, FARMING = ELGKPYD</p><p>TEACHER</p><p>T E A C H E R</p><p>Rearranged</p><p>R E H C A E T</p><p>Now subtract 2 from each letter</p><p>R - 2 = P</p><p>E - 2 = C</p><p>H - 2 = F</p><p>C - 2 = A</p><p>A - 2 = Y</p><p>E - 2 = C</p><p>T - 2 = R</p><p>So, TEACHER = PCFAYCR</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which pair logically completes the series?</p><p>BA, ZC, XE, VG, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2332;&#2379;&#2337;&#2364;&#2366; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p><p>BA, ZC, XE, VG, ?</p></span>",
    "options": [
      "<span class=\"eqt\">TJ</span><span class=\"hqt\" style=\"display:none\">TJ</span>",
      "<span class=\"eqt\">SI</span><span class=\"hqt\" style=\"display:none\">SI</span>",
      "<span class=\"eqt\">TI</span><span class=\"hqt\" style=\"display:none\">TI</span>",
      "<span class=\"eqt\">SJ</span><span class=\"hqt\" style=\"display:none\">SJ</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>First letters: B, Z, X, V</p><p>Each step is -2</p><p>So, the next first letter is T</p><p>Second letters: A, C, E, G</p><p>Each step is +2</p><p>So, the next second letter is I</p><p>Hence, the next term is TI.</p><p></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>A private hospital provides home consultation only to patients residing in selected wealthy colonies. Which inference follows?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2332;&#2368; &#2309;&#2360;&#2381;&#2346;&#2340;&#2366;&#2354; &#2325;&#2375;&#2357;&#2354; &#2330;&#2351;&#2344;&#2367;&#2340; &#2343;&#2344;&#2368; &#2325;&#2377;&#2354;&#2379;&#2344;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2350;&#2352;&#2368;&#2332;&#2379;&#2306; &#2325;&#2379; &#2361;&#2368; &#2328;&#2352; &#2346;&#2352; &#2346;&#2352;&#2366;&#2350;&#2352;&#2381;&#2358; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2344;&#2367;&#2325;&#2354;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Patients in wealthy colonies usually recover more quickly</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2344;&#2368; &#2325;&#2377;&#2354;&#2379;&#2344;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2350;&#2352;&#2368;&#2332; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2340;&#2375;&#2332;&#2368; &#2360;&#2375; &#2336;&#2368;&#2325; &#2361;&#2379; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Patients from other colonies refused home consultation service</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2381;&#2351; &#2325;&#2377;&#2354;&#2379;&#2344;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2350;&#2352;&#2368;&#2332; &#2361;&#2379;&#2350; &#2325;&#2306;&#2360;&#2354;&#2381;&#2335;&#2375;&#2358;&#2344; &#2360;&#2375;&#2357;&#2366; &#2360;&#2375; &#2311;&#2344;&#2325;&#2366;&#2352; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",

    "solution": "<p>The statement shows that home consultation is allowed only on the basis of residence.</p><p>Hence, the valid inference is that the hospital is distinguishing patients by place of residence.</p><p>Option (1) assumes better recovery.</p><p>Option (2) assumes refusal.</p><p>Option (3) assumes an unstated infrastructural reason.</p><p>Therefore, option (4) follows.</p>",

    "question": "<span class=\"eqt\"><p>Pointing to a girl, Prital said \"She is the daughter of my mother's only brother\". How is Prital related to the girl?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2354;&#2337;&#2364;&#2325;&#2368; &#2325;&#2368; &#2323;&#2352; &#2311;&#2358;&#2366;&#2352;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2346;&#2381;&#2352;&#2367;&#2340;&#2354; &#2344;&#2375; &#2325;&#2361;&#2366; &#2325;&#2367; \"&#2357;&#2361; &#2350;&#2375;&#2352;&#2368; &#2350;&#2366;&#2340;&#2366; &#2325;&#2375; &#2311;&#2325;&#2354;&#2380;&#2340;&#2375; &#2349;&#2366;&#2312; &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;\"&#2404; &#2346;&#2381;&#2352;&#2367;&#2340;&#2354; &#2325;&#2366; &#2354;&#2337;&#2364;&#2325;&#2368; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">Brother</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2312;</span>",

    "question": "<span class=\"eqt\"><p>In phylum Annelida, the body is externally divided into segments called </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2320;&#2344;&#2375;&#2354;&#2367;&#2337;&#2366; &#2360;&#2306;&#2328; &#2350;&#2375;&#2306;, &#2358;&#2352;&#2368;&#2352; &#2348;&#2366;&#2361;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2326;&#2306;&#2337;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; _______ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [

    ],
    "correct_option_id": 2,
    "solution": "<p>Phylum Annelida (Segmented worms) are bilaterally symmetrical, triploblastic, first true coelomate animals with organ-system grade of organization. Body is externally divided into segments called <b>metameres</b> joined by <b>ring-like structures </b>called annuli. It is covered by a moist thin cuticle. Setae and parapodia are locomotor organs. Sexes may be separate or united (hermaphrodites) . e. g- Nereis, Earthworm, Leech. </p>",

    "question": "<span class=\"eqt\"><p>Which of the following is/are correct about the Twelfth Five-Year Plan (2012 - 2017)?</p><p><b>a.</b> It aimed for faster, more inclusive, and sustainable growth.</p><p><b>b.</b> It achieved a higher growth rate than the targeted 8%.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2366;&#2352;&#2361;&#2357;&#2368;&#2306; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; (2012 - 2017) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p><b>a.</b> &#2311;&#2360;&#2325;&#2366; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2340;&#2375;&#2332;&#2364;, &#2309;&#2343;&#2367;&#2325; &#2360;&#2350;&#2366;&#2357;&#2375;&#2358;&#2368; &#2324;&#2352; &#2335;&#2367;&#2325;&#2366;&#2314; &#2357;&#2367;&#2325;&#2366;&#2360; &#2341;&#2366;&#2404;</p><p><b>b.</b> &#2311;&#2360;&#2344;&#2375; &#2354;&#2325;&#2381;&#2359;&#2367;&#2340; 8% &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2342;&#2352; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both a and b</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; b &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",

      "<span class=\"eqt\">Neither a nor b</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; a &#2324;&#2352; &#2344; &#2361;&#2368; b</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The <b>Twelfth Five-Year Plan</b> aimed at <b>faster, more inclusive, and sustainable growth</b>. </p><p>&bull; The plan <b>did not achieve the targeted growth rate of 8%</b>, as it ended with a growth rate of <b>7.5%</b>. </p><p>&bull; <b>Good governance</b> and <b>transparency</b> were indeed important focus areas of the plan.</p><p><b>Further Insight:</b></p><p>&bull; <b>Twelfth Five-Year Plan (2012-2017)</b></p><p>&#9675; <b>Target Growth</b>: 8%</p><p>&#9675; <b>Actual Growth</b>: 7.5% (initial years saw lower growth due to domestic and global economic challenges)</p><p>&#9675; <b>Key Focus</b>: Faster, more inclusive, and sustainable growth</p><p>&#9675; <b>Key Events</b>:</p><p>&#9632; Focus on improving health, education, infrastructure, and industrial growth</p><p>&#9632; Significant improvements in energy and infrastructure</p><p>&#9632; Poverty reduction, rural development, and technology-driven innovation.</p>",

    "question": "<span class=\"eqt\"><p>The Unique Identification Authority of India (UIDAI) has announced a new Aadhaar mobile application for iOS and Android devices. Which of the following is NOT a feature or capability highlighted by UIDAI for the new early-access Aadhaar mobile application made available in November 2025?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2346;&#2361;&#2330;&#2366;&#2344; &#2346;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2352;&#2339; (UIDAI) &#2344;&#2375; iOS &#2324;&#2352; Android &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2344;&#2351;&#2366; &#2310;&#2343;&#2366;&#2352; &#2350;&#2379;&#2348;&#2366;&#2311;&#2354; &#2319;&#2346;&#2381;&#2354;&#2367;&#2325;&#2375;&#2358;&#2344; &#2328;&#2379;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; UIDAI &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2357;&#2306;&#2348;&#2352; 2025 &#2350;&#2375;&#2306; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2325;&#2352;&#2366;&#2319; &#2327;&#2319; &#2344;&#2319; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325;-&#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2310;&#2343;&#2366;&#2352; &#2350;&#2379;&#2348;&#2366;&#2311;&#2354; &#2319;&#2346;&#2381;&#2354;&#2367;&#2325;&#2375;&#2358;&#2344; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2351;&#2366; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Adding up to five Aadhaar profiles on one device if linked to the same registered mobile number</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2361;&#2368; &#2346;&#2306;&#2332;&#2368;&#2325;&#2371;&#2340; &#2350;&#2379;&#2348;&#2366;&#2311;&#2354; &#2344;&#2306;&#2348;&#2352; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2319;&#2325; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2346;&#2352; &#2346;&#2366;&#2306;&#2330; &#2310;&#2343;&#2366;&#2352; &#2346;&#2381;&#2352;&#2379;&#2347;&#2366;&#2311;&#2354; &#2332;&#2379;&#2337;&#2364;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Biometric locking and unlocking that persists until intentionally changed</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2351;&#2379;&#2350;&#2375;&#2335;&#2381;&#2352;&#2367;&#2325; &#2354;&#2377;&#2325;&#2367;&#2306;&#2327; &#2324;&#2352; &#2309;&#2344;&#2354;&#2377;&#2325;&#2367;&#2306;&#2327; &#2332;&#2379; &#2332;&#2366;&#2344;&#2348;&#2370;&#2333;&#2325;&#2352; &#2348;&#2342;&#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2340;&#2325; &#2348;&#2344;&#2368; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Sharing Aadhaar via masked QR code and as verifiable credentials</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2360;&#2381;&#2325;&#2381;&#2337; &#2325;&#2381;&#2351;&#2370;&#2310;&#2352; &#2325;&#2379;&#2337; &#2324;&#2352; &#2360;&#2340;&#2381;&#2351;&#2366;&#2346;&#2344; &#2351;&#2379;&#2327;&#2381;&#2351; &#2325;&#2381;&#2352;&#2375;&#2337;&#2375;&#2306;&#2358;&#2367;&#2351;&#2354; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2310;&#2343;&#2366;&#2352; &#2360;&#2366;&#2333;&#2366; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Automatic storage and auto-fill of bank passbook statements from multiple banks</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2312; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2360;&#2375; &#2348;&#2376;&#2306;&#2325; &#2346;&#2366;&#2360;&#2348;&#2369;&#2325; &#2360;&#2381;&#2335;&#2375;&#2335;&#2350;&#2375;&#2306;&#2335; &#2325;&#2366; &#2360;&#2381;&#2357;&#2330;&#2366;&#2354;&#2367;&#2340; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2339; &#2324;&#2352; &#2321;&#2335;&#2379;-&#2347;&#2367;&#2354;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Unique Identification Authority of India (UIDAI) has announced a new Aadhaar mobile application for iOS and Android devices. The authority has announced an early access that will allow residents to test the service and share feedback before its final rollout.</p><p>As per the announcement, the app is available on the Google Play Store and Apple App Store, offering users a digital option to carry their Aadhaar and use it for instant verification. The new app enables residents to use Aadhaar digitally without relying on physical documents. While the government continues to issue physical Aadhaar cards, the digital copy helps streamline verification for banking, admissions, driving licences, passports and other services.</p><p><b>UIDAI New Aadhaar App Key Features</b></p><p>Users can share their Aadhaar digitally, removing the need for physical copies.</p><p>Aadhaar details can be shared using a QR code or as verifiable credentials.</p><p>Shared Aadhaar data is masked, so users do not reveal the full 12-digit number.</p><p>Up to five Aadhaar profiles can be added on one device if they are linked to the same registered mobile number.</p><p>The feature supports parents who manage their children's Aadhaar profiles on their number.</p><p>The app includes biometric locking and unlocking.</p><p>Once locked, biometric data remains secure until it is intentionally unlocked or disabled.</p>",
    "question_index": 27
  },

    "question": "<span class=\"eqt\"><p>Identify the correct statement.</p><p>I.  The first woman hockey player to receive Arjuna Award was Anne Lumsden.</p><p>II. She was awarded in the year 1971.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2309;&#2352;&#2381;&#2332;&#2369;&#2344; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2361;&#2354;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366; &#2361;&#2377;&#2325;&#2368; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2368; &#2320;&#2344;&#2368; &#2354;&#2350;&#2381;&#2360;&#2337;&#2375;&#2344; &#2341;&#2368;&#2306;&#2404;</p><p>II. &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2357;&#2352;&#2381;&#2359; 1971 &#2350;&#2375;&#2306; &#2351;&#2361; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",

      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p> The first woman hockey player to receive this award was Anne Lumsden (also spelled Ann Lumsden) in 1961 for her outstanding contributions to Indian women's hockey.</p><p> Named after Arjuna, the main protagonist from the ancient Indian epic Mahabharata, the Arjuna Award was set up in 1961. It was India's highest sporting honour before the Khel Ratna came into being.</p><p> Given out for consistent good performance over a period of four years, the winners of the Arjuna Award receive a statuette of Arjuna, a certificate and a cash prize.</p><p> India's football Olympian PK Banerjee was among the 20 recipients of the Arjuna Award in its inaugural edition in 1961. Hockey player Anna Lumsden was the first woman to win the Arjuna Award.</p><p> As per current rules, a Khel Ratna winner cannot be nominated for the Arjuna Award. However, an Arjuna winner can be nominated for the Khel Ratna.</p>",
    "question_index": 28
  },

    ],
    "correct_option_id": 0,
    "solution": "<p>Pairs 1 and 2 are correctly matched.</p><p>The Cholas built magnificent Dravida-style temples, with Brihadeeswara (Thanjavur) being the finest example.</p><p>The Chandelas of Bundelkhand built the Khajuraho temples in the Nagara style.</p><p>Pair 3 is wrong - the Hoysalas built temples in the Vesara (or distinctively Hoysala) style, not Nagara. Hoysala temples like Belur and Halebidu are known for their star-shaped plans and intricate sculptures.</p><p></p><p><b>Further Insights:</b></p><p>Nagara Style: Characterized by a beehive-shaped tower (Shikhara) and is found primarily in North India.</p><p>Dravida Style: Characterized by a stepped pyramid tower (Vimana) and is found primarily in South India.</p><p>Vesara Style: A \"hybrid\" or \"mixed\" style that gained prominence under the Chalukyas and Rashtrakutas, reaching its decorative peak under the Hoysalas. It often incorporates the Dravidian Vimana shape with the Nagara-style ornamentation.</p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following festivals.</p><p>I. Chamliyal Mela</p><p>II. Kheerbhawani Mela</p><p>III. Singhey Khababs Sindhu festival</p><p>IV. Ambubachi Mela</p><p>Which of the following is/are celebrated in erstwhile Jammu and Kashmir state?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2330;&#2350;&#2354;&#2367;&#2351;&#2366;&#2354; &#2350;&#2375;&#2354;&#2366;</p><p>II. &#2326;&#2368;&#2352;&#2349;&#2357;&#2366;&#2344;&#2368; &#2350;&#2375;&#2354;&#2366;</p><p>III. &#2360;&#2367;&#2306;&#2328;&#2375; &#2326;&#2348;&#2366;&#2348;&#2381;&#2360; &#2360;&#2367;&#2306;&#2343;&#2369; &#2313;&#2340;&#2381;&#2360;&#2357;</p><p>IV. &#2309;&#2306;&#2348;&#2369;&#2348;&#2366;&#2330;&#2368; &#2350;&#2375;&#2354;&#2366;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357;&#2357;&#2352;&#2381;&#2340;&#2368; &#2332;&#2350;&#2381;&#2350;&#2370; &#2324;&#2352; &#2325;&#2358;&#2381;&#2350;&#2368;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II, III and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II, III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Mela Kheerbhawani:</b></p><p>The Kheer Bhawani mela starting on Zeasht Ashtami is one of the biggest religious functions of the displaced community Kashmiri Pundit who fled their homes for their life in the 1990s.</p><p>It is held at the famous Ragnya Devi temple in Jammu and Kashmir's Ganderbal district.</p><p>During this festival, Kashmiri Pandits visit five other temples of Tulmulla in Ganderbal district, Tikker in Kupwara, Laktipora Aishmuqam in Anantnag and Mata Tripursundri Devsar and Mata Kheerbhawani Manzgam in Kulgam district.</p><p><b>Singhey Khababs Sindhu Festival:</b></p><p>It is tourist's promotional festival- Ladakh Singhey Khababs Sindhu Festivals was celebrated on the bank of Indus River at Leh.</p><p><b>Chamliyal Mela:</b></p><p>It is celebrated at Chamliyal border shrine along the International Border (IB) in <b>Jammu and Kashmir</b>. The fair takes place at the shrine of Baba Dalip Singh Manhas, a saint popularly known as Baba Chamliyal, in Samba district.</p><p><b>Ambubachi Mela:</b></p><p>It is an annual festival held at Kamakhya temple, atop Nilachal hills of <b>Guwahati, Assam</b> on the bank of Brahmaputra river. It is one of the 51 shakti shrines representing the different body parts of Shiva's consort Sati. It is considered as one of the prime seats of Tantric cult. It is believed to be the site where Hindu deity Sati's womb and genitals fell after she burned to death.</p><p>Source: News on air, The Hindu</p>",
    "question_index": 30
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding deciduous forests:</p><p>I. Deciduous forests are characterized by trees that shed their leaves seasonally, usually in response to dry or cold conditions.</p><p>II. Deciduous forests remain green throughout the year and do not experience leaf fall.</p><p>III. Tropical deciduous forests in India are also known as monsoon forests.</p><p>IV. They are typically found in regions with moderate rainfall and distinct wet and dry seasons.</p><p>Which of the statements given above is/are incorrect?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2346;&#2340;&#2333;&#2337;&#2364;&#2368; &#2357;&#2344;&#2379;&#2306; (Deciduous Forests) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;:</p><p>I. &#2346;&#2340;&#2333;&#2337;&#2364;&#2368; &#2357;&#2344; &#2320;&#2360;&#2375; &#2357;&#2371;&#2325;&#2381;&#2359;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2361;&#2330;&#2366;&#2344;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2379; &#2350;&#2380;&#2360;&#2350;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375;, &#2346;&#2381;&#2352;&#2366;&#2351;&#2307; &#2358;&#2369;&#2359;&#2381;&#2325; &#2351;&#2366; &#2336;&#2306;&#2337;&#2368; &#2346;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339;, &#2309;&#2346;&#2344;&#2368; &#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2366;&#2305; &#2327;&#2367;&#2352;&#2366; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2346;&#2340;&#2333;&#2337;&#2364;&#2368; &#2357;&#2344; &#2346;&#2370;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2361;&#2352;&#2375;-&#2349;&#2352;&#2375; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2311;&#2344;&#2350;&#2375;&#2306; &#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2333;&#2337;&#2364;&#2344;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2366;&#2404;</p><p>III. &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2346;&#2340;&#2333;&#2337;&#2364;&#2368; &#2357;&#2344;&#2379;&#2306; &#2325;&#2379; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344;&#2368; &#2357;&#2344; &#2349;&#2368; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>IV. &#2351;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2350;&#2343;&#2381;&#2351;&#2350; &#2357;&#2352;&#2381;&#2359;&#2366; &#2357;&#2366;&#2354;&#2375; &#2340;&#2341;&#2366; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2310;&#2352;&#2381;&#2342;&#2381;&#2352; (&#2327;&#2368;&#2354;&#2375;) &#2324;&#2352; &#2358;&#2369;&#2359;&#2381;&#2325; &#2315;&#2340;&#2369;&#2323;&#2306; &#2357;&#2366;&#2354;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only (IV)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (IV)</span>",
      "<span class=\"eqt\">Only (I)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (I)</span>",
      "<span class=\"eqt\">Only (II)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (II)</span>",
      "<span class=\"eqt\">Only (III) and (IV)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (III) &#2324;&#2352; (IV)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement I is correct: Deciduous trees shed their leaves annually to conserve water and survive harsh weather, such as the dry season or winter.</p><p>Statement II is incorrect: This describes evergreen forests. Deciduous forests are defined by their seasonal leaf fall, meaning they do not remain green year-round.</p><p>Statement III is correct: In the Indian subcontinent, tropical deciduous forests are widely referred to as monsoon forests because their cycle is closely tied to the seasonal monsoon rains.</p><p>Statement IV is correct: These forests thrive in areas with moderate rainfall (typically between 70 cm and 200 cm) and clearly defined wet and dry periods.</p>",
    "question_index": 31
  },

    "question": "<span class=\"eqt\"><p>What is the standard height of a basketball hoop (ring) from the floor?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2352;&#2381;&#2358; &#2360;&#2375; &#2348;&#2366;&#2360;&#2381;&#2325;&#2375;&#2335;&#2348;&#2377;&#2354; &#2361;&#2370;&#2346; (&#2352;&#2367;&#2306;c) &#2325;&#2368; &#2350;&#2366;&#2344;&#2325; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2.74 m (9 ft)</span><span class=\"hqt\" style=\"display:none\">2.74 &#2350;&#2368; (9 &#2347;&#2368;&#2335;)</span>",
      "<span class=\"eqt\">3.05 m (10 ft)</span><span class=\"hqt\" style=\"display:none\">3.05 &#2350;&#2368; (10 &#2347;&#2368;&#2335;)</span>",
      "<span class=\"eqt\">3.35 m (11 ft)</span><span class=\"hqt\" style=\"display:none\">3.35 &#2350;&#2368; (11 &#2347;&#2368;&#2335;)</span>",
      "<span class=\"eqt\">2.44 m (8 ft)</span><span class=\"hqt\" style=\"display:none\">2.44 &#2350;&#2368; (8 &#2347;&#2368;&#2335;)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The standard height for a basketball hoop (the top of the rim) is exactly 10 feet (3.05 meters) above the floor.</p><p>This measurement has remained the standard since the game was invented by Dr. James Naismith in 1891.</p><p>Whether in the NBA, FIBA, or NCAA, this height is uniform for all professional and high-level competitive play.</p><p></p><p><b>Other Measurements:</b></p><p>The backboard typically measures 6 feet (1.83 m) wide by 3.5 feet (1.07 m) tall.</p><p>The inner diameter of the rim is 18 inches (45.72 cm).</p><p>The three-point line distance varies (e.g., 23.75 ft in the NBA vs. 22.15 ft in FIBA), but the hoop height never changes.</p>",
    "question_index": 32
  },

    "question": "<span class=\"eqt\"><p>Read the below statements marked as Assertion(A) and Reason(R) about 2025 Global Innovation Index. Mark the correct options:</p><p>Assertion(A): India leads the pack among the 37 lower middle-income group economies and also ranks first among the 10 economies in Central and Southern Asia.</p><p>Reason(R): Strong policy support, growing R&D investment, and a vibrant startup ecosystem have propelled India's rise as a global innovation hub.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; 2025 &#2327;&#2381;&#2354;&#2379;&#2348;&#2354; &#2311;&#2344;&#2379;&#2357;&#2375;&#2358;&#2344; &#2311;&#2306;&#2337;&#2375;&#2325;&#2381;&#2360; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2325;&#2341;&#2344; &#2332;&#2379; &#2325;&#2367; &#2309;&#2360;&#2352;&#2381;&#2358;&#2344; (A) &#2324;&#2352; &#2352;&#2368;&#2332;&#2344; (R) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2361;&#2376;&#2306;, &#2346;&#2338;&#2364;&#2375;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2325;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2309;&#2360;&#2352;&#2381;&#2358;&#2344; (A): &#2349;&#2366;&#2352;&#2340; 37 &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2343;&#2381;&#2351;&#2350;-&#2310;&#2351; &#2360;&#2350;&#2370;&#2361; &#2325;&#2368; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2309;&#2327;&#2381;&#2352;&#2339;&#2368; &#2361;&#2376; &#2324;&#2352; &#2360;&#2366;&#2341; &#2361;&#2368; &#2350;&#2343;&#2381;&#2351; &#2324;&#2352; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2368; &#2319;&#2358;&#2367;&#2351;&#2366; &#2325;&#2368; 10 &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2361;&#2376;&#2404;</p><p>&#2352;&#2368;&#2332;&#2344; (R): &#2350;&#2332;&#2348;&#2370;&#2340; &#2344;&#2368;&#2340;&#2367; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344;, &#2348;&#2338;&#2364;&#2340;&#2368; R&D &#2344;&#2367;&#2357;&#2375;&#2358;, &#2324;&#2352; &#2319;&#2325; &#2332;&#2368;&#2357;&#2306;&#2340; &#2360;&#2381;&#2335;&#2366;&#2352;&#2381;&#2335;&#2309;&#2346; &#2311;&#2325;&#2379;&#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2325;&#2379; &#2319;&#2325; &#2357;&#2376;&#2358;&#2381;&#2357;&#2367;&#2325; &#2344;&#2357;&#2366;&#2330;&#2366;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2313;&#2349;&#2366;&#2352;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true and, R is the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; A &#2324;&#2352; R &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true and, R is not the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; A &#2324;&#2352; R &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, but R is false.</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2361;&#2368; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2327;&#2354;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true.</span><span class=\"hqt\" style=\"display:none\">A &#2327;&#2354;&#2340; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2361;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Global Innovation Index (GII) ranks 139 world economies according to their innovation capabilities. In its 18th edition, India ranks 38th overall, from 39th last year, and a 10-place jump from 2020 (48).</p><p>The country leads the pack among the 37 lower middle-income group economies and also ranks first among the 10 economies in Central and Southern Asia.</p><p>Strong policy support, growing R&D investment, and a vibrant startup ecosystem have propelled India's rise as a global innovation hub.</p><p>Consisting of roughly 80 indicators, grouped into innovation inputs and outputs, the GII aims to capture the multi-dimensional facets of innovation.</p><p>India performed better in innovation outputs than innovation inputs in 2025. The country's R&D investments fell to 7.8% in 2019-20, However, in the decade (2010-20) it rose 3.1%.</p><p>India's technology adoption ' fuelled by robust digital infrastructure, AI uptake, and government initiatives ' has propelled it to 39th place, a significant leap from 81st in 2015.</p>",
    "question_index": 33
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct about 'Din Ilahi' religion?</p><p>I. It was aimed at bridging the gulf that separated different religions.</p><p>II. It believed in Polytheism.</p><p>III. It was promulgated by Akbar.</p><p>Select the correct answer using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; '&#2342;&#2368;&#2344; &#2311;&#2354;&#2366;&#2361;&#2368;' &#2343;&#2352;&#2381;&#2350; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2311;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2343;&#2352;&#2381;&#2350;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2326;&#2366;&#2312; &#2325;&#2379; &#2346;&#2366;&#2335;&#2344;&#2366; &#2341;&#2366;&#2404;</p><p>II. &#2351;&#2361; &#2348;&#2361;&#2369;&#2342;&#2375;&#2357;&#2357;&#2366;&#2342; &#2350;&#2375;&#2306; &#2357;&#2367;&#2358;&#2381;&#2357;&#2366;&#2360; &#2325;&#2352;&#2340;&#2366; &#2341;&#2366;&#2404;</p><p>III. &#2311;&#2360;&#2375; &#2309;&#2325;&#2348;&#2352; &#2344;&#2375; &#2346;&#2381;&#2352;&#2326;&#2381;&#2351;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>King Akbar</b> promulgated a new religion called <b>Din Ilahi (Divine Faith)</b> in 1582. It believed in one God and <b>rejected polytheism</b>. So, statement II is incorrect and III is correct.</p><p>It contained good points of all religions. Its basis was rational. It upholds no dogma. It was aimed at bridging the gulf that separated different religions. So, statement I is correct.</p><p></p>",
    "question_index": 34
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Navroz festival:</p><p>I. The festival is celebrated as Persian new year.</p><p>II. The festival is linked to the King Jamshed.</p><p>III. It is one of UNESCO's Intangible Cultural Heritages in India.</p><p>Which of the above statements is / are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2357;&#2352;&#2379;&#2332;&#2364; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2351;&#2361; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2347;&#2366;&#2352;&#2360;&#2368; &#2344;&#2357; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2361; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2352;&#2366;&#2332;&#2366; &#2332;&#2350;&#2358;&#2375;&#2342; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;&#2404;</p><p>III. &#2351;&#2361; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2325;&#2368; &#2309;&#2350;&#2370;&#2352;&#2381;&#2340; &#2360;&#2366;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367;&#2325; &#2357;&#2367;&#2352;&#2366;&#2360;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I &amp; II Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II &amp; III Only.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2319;&#2357;&#2306; III.</span>",
      "<span class=\"eqt\">I &amp; III Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II &amp; III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All Statements are correct</p><p>Navroz is a 3,000-year-old Zoroastrian tradition, a ritual celebration that signals the start of Spring and the Persian new year. In more modern times, in A.D. 1079, a king of Iran named Jalaluddin Malekshah started observing it on March 21.</p><p>It is connected to Jamshed, the illustrious king of Iran. Thus, the day came to be known as Jamshedi Navroz.</p><p>The scriptures state that in the realm of King Jamshed, there was no excessive heat or cold, there were no premature deaths, and everyone lived happily.</p><p>It was inscribed in 2016 in Intangible cultural Heritages by UNESCO.</p><p>Source: The Hindu.</p>",
    "question_index": 35
  },
  {

      "<span class=\"eqt\">Judge George Claus Rankin</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2332;&#2377;&#2352;&#2381;&#2332; &#2325;&#2381;&#2354;&#2377;&#2360; &#2352;&#2376;&#2306;&#2325;&#2367;&#2344;</span>"

    "question": "<span class=\"eqt\"><p>Consider the following statement about Writs. </p><p>a. It is issued by Supreme Court under Article 226</p><p>b. It is issued by the High Court under Article 32</p><p>c. The Writ Power of the High Court is more broader than the Supreme Court.</p><p>Choose the correct statement based on option below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2367;&#2335; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>a. &#2351;&#2361; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 226 &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2332;&#2366;&#2352;&#2368; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>b. &#2351;&#2361; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32 &#2325;&#2375; &#2340;&#2361;&#2340; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2332;&#2366;&#2352;&#2368; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>c. &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2352;&#2367;&#2335; &#2358;&#2325;&#2381;&#2340;&#2367; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2361;&#2376;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Only c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The provisions of Write are under Article 32 for Supreme Court and under Article 226 for High Court.</p><p>&bull; The Writ Power of the High court is more broader than the Supreme Court.</p><p>Further Insight:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Type of Writ</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Purpose</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Can Be Issued Against</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Cannot Be Issued Against</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Habeas Corpus</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"To have the body of.\"</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Enforces the fundamental right of individual liberty against unlawful detention.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Both private and public authorities.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lawful detention, contempt proceedings, competent court detention, detention outside jurisdiction.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Mandamus</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"We command.\"</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Orders a public official or body to perform a duty they have failed or refused to perform.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Public officials, bodies, corporations, inferior courts.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Private individuals, discretionary work, contractual obligations, Indian President, State Governors, Chief Justice acting in a judicial capacity.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Prohibition</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"To forbid.\"</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Prevents a lower court or tribunal from exceeding its jurisdiction.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Judicial and quasi-judicial authorities.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Administrative authorities, legislative bodies, private individuals.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Certiorari</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"To be certified.\"</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Orders a lower court or tribunal to transfer a case or quash its order.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Judicial, quasi-judicial authorities, and administrative authorities (post-1991).</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Legislative bodies, private individuals.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Quo-Warranto</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"By what authority or warrant.\"</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Prevents illegal usurpation of public office; questions the legality of a person's claim to public office.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Permanent public office holders (created by statute or Constitution).</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Private or ministerial offices.</td></tr></table>",
    "question_index": 37
  },

    "question": "<span class=\"eqt\"><p>What is the most important feature and central symbol of the Oriah festival celebrated by the Wancho people of Arunachal Pradesh?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2325;&#2375; &#2357;&#2366;&#2306;&#2330;&#2379; &#2354;&#2379;&#2327;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2344;&#2366;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2323;&#2352;&#2367;&#2351;&#2366; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2324;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The ritual dance called 'Vaanlam' by children as a tribute to the almighty Jowan Rang (God in the sky).</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; '&#2357;&#2366;&#2344;&#2354;&#2350;' &#2344;&#2366;&#2350;&#2325; &#2309;&#2344;&#2369;&#2359;&#2381;&#2336;&#2366;&#2344;&#2367;&#2325; &#2344;&#2371;&#2340;&#2381;&#2351;, &#2332;&#2379; &#2360;&#2352;&#2381;&#2357;&#2358;&#2325;&#2381;&#2340;&#2367;&#2350;&#2366;&#2344; &#2332;&#2379;&#2357;&#2366;&#2344; &#2352;&#2306;&#2327; (&#2310;&#2360;&#2350;&#2366;&#2344; &#2325;&#2375; &#2349;&#2327;&#2357;&#2366;&#2344;) &#2325;&#2379; &#2360;&#2350;&#2352;&#2381;&#2346;&#2367;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The erection of a sacred bamboo post with seven branches called the Zangvaan, which is procured, decorated, and erected at a sacred platform called the Zangvaan Tong.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2340; &#2358;&#2366;&#2326;&#2366;&#2323;&#2306; &#2357;&#2366;&#2354;&#2375; &#2346;&#2357;&#2367;&#2340;&#2381;&#2352; &#2348;&#2366;&#2306;&#2360; &#2325;&#2375; &#2326;&#2306;&#2349;&#2375; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2332;&#2367;&#2360;&#2375; &#2332;&#2366;&#2306;&#2327;&#2357;&#2366;&#2344; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2360;&#2332;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2332;&#2366;&#2306;&#2327;&#2357;&#2366;&#2344; &#2335;&#2379;&#2306;&#2327; &#2344;&#2366;&#2350;&#2325; &#2346;&#2357;&#2367;&#2340;&#2381;&#2352; &#2350;&#2306;&#2330; &#2346;&#2352; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The preparation of a special indigenous rice beer called 'taap' in a ceremonial clay pot by the women of the village.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2306;&#2357; &#2325;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2309;&#2344;&#2369;&#2359;&#2381;&#2336;&#2366;&#2344;&#2367;&#2325; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2375; &#2348;&#2352;&#2381;&#2340;&#2344; &#2350;&#2375;&#2306; '&#2340;&#2366;&#2346;' &#2344;&#2366;&#2350;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359; &#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2330;&#2366;&#2357;&#2354; &#2325;&#2368; &#2348;&#2368;&#2351;&#2352; &#2325;&#2368; &#2340;&#2376;&#2351;&#2366;&#2352;&#2368;&#2404;</span>",
      "<span class=\"eqt\">The construction of a small ceremonial hut called 'Ju' in the centre of the village, which is decorated with flowers made from wild grass.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2306;&#2357; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2350;&#2375;&#2306; '&#2332;&#2370;' &#2344;&#2366;&#2350;&#2325; &#2319;&#2325; &#2331;&#2379;&#2335;&#2366; &#2309;&#2344;&#2369;&#2359;&#2381;&#2336;&#2366;&#2344;&#2367;&#2325; &#2333;&#2379;&#2346;&#2337;&#2364;&#2368; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339;, &#2332;&#2367;&#2360;&#2375; &#2332;&#2306;&#2327;&#2354;&#2368; &#2328;&#2366;&#2360; &#2360;&#2375; &#2348;&#2344;&#2375; &#2347;&#2370;&#2354;&#2379;&#2306; &#2360;&#2375; &#2360;&#2332;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Wanchos are a tribal community inhabiting the south-western Tirap District of Arunachal Pradesh. Their primary livelihood is jhum (shifting) cultivation, and their society is governed by a chieftaincy system with the Ngowang as the village council. They believe in one omnipotent God called Jowan Rang (God in the sky) and follow a code of living called vaanlam.</p><p>Oriah is the most important festival of the Wanchos - an agricultural festival celebrated at the beginning of spring, after the completion of jhum preparatory work like jungle clearing, burning, and sowing. The word itself breaks into 'O' (sacred offering and prayers) and 'Riah' (leisure and celebration). Dates vary by village according to their lunar calendar, announced by the Ngowang council.</p><p>The defining symbol of Oriah is the Zangvaan - a sacred bamboo post with seven branches erected at a platform called the Zangvaan Tong. Offerings of rice beer (Ju), cattle, and pigs are made to Jowan, with prayers for good harvest, health, and prosperity.</p><p>At Longding, Oriah has been celebrated every 16th February since 1975, with the broader purpose of unifying all Wancho villages, healing past inter-village feuds, and preserving ancestral culture. Modern additions like community feasts, cultural programmes, and literary competitions have been incorporated, while the core spirit of the festival remains intact.</p><p></p>",
    "question_index": 38
  },

k;padding:5px;\">B. &#2327;&#2379;&#2342;&#2366;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2358;&#2352;&#2340; &#2330;&#2306;&#2342;&#2381;&#2352; &#2330;&#2335;&#2381;&#2335;&#2379;&#2346;&#2366;&#2343;&#2381;&#2351;&#2366;&#2351;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2342;&#2375;&#2357;&#2342;&#2366;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2352;&#2357;&#2368;&#2306;&#2342;&#2381;&#2352;&#2344;&#2366;&#2341; &#2335;&#2376;&#2327;&#2379;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2325;&#2306;&#2341;&#2366;&#2346;&#2369;&#2352;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2352;&#2366;&#2332;&#2366; &#2352;&#2366;&#2357;</td></tr></table></p></span>",

      "<span class=\"eqt\">A-3, B-1, C-2, D-4</span><span class=\"hqt\" style=\"display:none\">A-3, B-1, C-2, D-4</span>",

    "solution": "<p>A. Gora &#8594; Rabindranath Tagore - A philosophical novel on identity and religion.</p><p></p><p>B. Godan &#8594; Munshi Premchand - Depicts peasant struggles and social realism.</p><p></p><p>C. Devdas &#8594; Sarat Chandra Chattopadhyay - A tragic love story.</p><p></p><p>D. Kanthapura &#8594; Raja Rao - A Gandhian narrative of rural Indias awakening.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following statements about Gross National Product (GNP) is <b>correct</b>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2325;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (GNP) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It includes net factor income from abroad.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2358;&#2369;&#2342;&#2381;&#2343; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351; &#2349;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It excludes consumption of fixed capital.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; &#2325;&#2368; &#2326;&#2346;&#2340; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It only measures production within domestic territory.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2325;&#2375;&#2357;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It does not account for depreciation.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2350;&#2375;&#2306; &#2350;&#2370;&#2354;&#2381;&#2351;&#2361;&#2381;&#2352;&#2366;&#2360; &#2325;&#2379; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The correct statement about Gross National Product (GNP) is that <b>it includes net factor income from abroad (NFIA)</b>. </p><p>&#183; GNP measures the total monetary value of all final goods and services produced by the residents of a country, regardless of whether the production takes place within the domestic territory or abroad.</p><p>&#183; The formula is: GNP = GDP + NFIA.</p><p>&#183; NFIA is the difference between factor income earned by residents from abroad and factor income paid to non-residents working in the domestic territory.</p><p><b>Explanation of Other Options:</b></p><p>&#183; <b>It excludes consumption of fixed capital:</b> This is incorrect. \"Gross\" in GNP means it includes the consumption of fixed capital (depreciation). Net National Product (NNP) excludes depreciation (NNP = GNP - Depreciation).</p><p>&#183; <b>It only measures production within domestic territory:</b> This describes Gross Domestic Product (GDP). GNP includes income from abroad.</p><p>&#183; <b>It does not account for depreciation:</b> This is misleading. \"Gross\" means depreciation <i>is</i> included. If depreciation were \"accounted for\" by subtracting it, it would become Net National Product.</p><p><b>Further insights:</b></p><p>&#183; GNP provides a measure of the economic well-being of the residents of a country.</p><p>&#183; If NFIA is positive (residents earn more from abroad than non-residents earn domestically), GNP will be greater than GDP. If NFIA is negative, GNP will be less than GDP.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct?</p><p>1) When a ball starts falling from a height in vacuum, the potential energy is maximum initially.</p><p>2) The potential energy of the ball gets converted into heat energy while falling.</p><p>Select the correct answer using the code given below:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p><p>1) &#2332;&#2348; &#2325;&#2379;&#2312; &#2327;&#2375;&#2306;&#2342; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2340; &#2350;&#2375;&#2306; &#2314;&#2305;&#2330;&#2366;&#2312; &#2360;&#2375; &#2327;&#2367;&#2352;&#2344;&#2375; &#2354;&#2327;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2369;&#2352;&#2370; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2327;&#2375;&#2306;&#2342; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2327;&#2367;&#2352;&#2340;&#2375; &#2360;&#2350;&#2351; &#2313;&#2359;&#2381;&#2350;&#2368;&#2351; &#2314;&#2352;&#2381;&#2332;&#2366; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 or 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>When a body starts falling (in vacuum) from a height, then it is at rest, so it does not have any kinetic energy. However due to the height it gains potential energy and is stored in it. While falling, the height decreases and the potential energy gets converted into kinetic energy.</p>",
    "question_index": 41
  },
