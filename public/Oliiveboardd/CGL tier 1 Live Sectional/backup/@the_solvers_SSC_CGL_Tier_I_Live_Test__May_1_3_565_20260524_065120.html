    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Peaty and Marshy soils in India:</p><p>Statement I: These soils are characterized by a black color and high acidity due to the accumulation of a large amount of dead organic matter.</p><p>Statement II: Peaty soils are typically found in regions with low rainfall and sparse vegetation, such as the deserts of Rajasthan.</p><p>Which of the following is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2368;&#2335;&#2368; &#2324;&#2352; &#2342;&#2354;&#2342;&#2354;&#2368; &#2350;&#2367;&#2335;&#2381;&#2335;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; I: &#2351;&#2375; &#2350;&#2367;&#2335;&#2381;&#2335;&#2367;&#2351;&#2366;&#2305; &#2350;&#2371;&#2340; &#2332;&#2376;&#2357;&#2367;&#2325; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2368; &#2348;&#2337;&#2364;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2360;&#2306;&#2330;&#2351; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2325;&#2366;&#2354;&#2375; &#2352;&#2306;&#2327; &#2324;&#2352; &#2313;&#2330;&#2381;&#2330; &#2309;&#2350;&#2381;&#2354;&#2340;&#2366; &#2357;&#2366;&#2354;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2346;&#2368;&#2335;&#2368; &#2350;&#2367;&#2335;&#2381;&#2335;&#2367;&#2351;&#2366;&#2305; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2350; &#2357;&#2352;&#2381;&#2359;&#2366; &#2324;&#2352; &#2357;&#2367;&#2352;&#2354; &#2357;&#2344;&#2360;&#2381;&#2346;&#2340;&#2367; &#2357;&#2366;&#2354;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2332;&#2376;&#2360;&#2375; &#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2375; &#2352;&#2375;&#2327;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct </p><p>Peaty and marshy soils are rich in organic matter due to the accumulation of partially decomposed plant material. This gives them a dark (often black) color and makes them acidic in nature.</p><p>Statement II is incorrect </p><p>Peaty soils are found in areas with high rainfall, waterlogging, and dense vegetation, such as parts of Kerala, West Bengal, and coastal regions. They are not found in dry desert regions like Rajasthan.</p><p>Further insights:</p><p>&#183; Peaty soils are rich in organic content called humus. </p><p>&#183; They are usually found in marshy and swampy areas. </p><p>&#183; These soils are poor in potash and phosphate. </p><p>&#183; They are suitable for crops like rice due to water retention. </p><p>&#183; Excess acidity may require treatment for agriculture.</p>",
    "question_index": 42
  },

    "question": "<span class=\"eqt\"><p>Which of following statements are correct.</p><p>A. Pradhan Mantri Jeevan Jyoti Bima Yojana (PMJJBY) is available to people in the age group of 18 to 50.</p><p>B. It has a premium of Rs. 436 per annum.</p><p>C. It has a Risk Coverage of Rs.2 Lakh in case of death for any reason.</p><p></p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2404;</p><p>A. &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2332;&#2368;&#2357;&#2344; &#2332;&#2381;&#2351;&#2379;&#2340;&#2367; &#2348;&#2368;&#2350;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366; (PMJJBY) 18 &#2360;&#2375; 50 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2361;&#2376;&#2404;</p><p>B. &#2311;&#2360;&#2325;&#2366; &#2346;&#2381;&#2352;&#2368;&#2350;&#2367;&#2351;&#2350; &#2352;&#2369;. 436 &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;&#2404;</p><p>C. &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2325;&#2366;&#2352;&#2339; &#2360;&#2375; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2311;&#2360;&#2350;&#2375;&#2306; &#2352;&#2369;. 2 &#2354;&#2366;&#2326; &#2325;&#2366; &#2332;&#2379;&#2326;&#2367;&#2350; &#2325;&#2357;&#2352;&#2375;&#2332; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">B and C only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B &#2324;&#2352; C</span>",
      "<span class=\"eqt\">A, B and C</span><span class=\"hqt\" style=\"display:none\">A, B &#2324;&#2352; C</span>",
      "<span class=\"eqt\">A and B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2324;&#2352; B</span>",
      "<span class=\"eqt\">A and C only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2324;&#2352; C</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Pradhan Mantri Jeevan Jyoti Bima Yojana (PMJJBY) is a one-year life insurance scheme renewable from year to year offering coverage for death due to any reason.</p><p>Available to people in the age group of 18 to 50 and having a bank account or a post office account. People who join the scheme before completing 50 years can, however, continue to have the risk of life cover up to the age of 55 years subject to payment of premium.</p><p>Premium - Rs. 436 per annum.  It will be auto-debited in one instalment.</p><p>Risk Coverage - Rs.2 Lakh in case of death for any reason.</p><p></p><p></p><p></p>",
    "question_index": 43
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct about an Urban Agglomeration (UA) as per Census 2011?</p><p>I. A UA is defined as a continuous urban spread having at least one statutory town.</p><p>II. It needs to have physical contiguity with adjoining outgrowths and/or other towns.</p><p>III. It should be with total population not less than 20,000.</p></span><span class=\"hqt\" style=\"display:none\"><p>2011 &#2325;&#2368; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2358;&#2361;&#2352;&#2368; &#2360;&#2350;&#2370;&#2361; (UA) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2319;&#2325; UA &#2325;&#2379; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2319;&#2325; &#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2358;&#2361;&#2352; &#2357;&#2366;&#2354;&#2375; &#2344;&#2367;&#2352;&#2306;&#2340;&#2352; &#2358;&#2361;&#2352;&#2368; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2311;&#2360;&#2325;&#2366; &#2310;&#2360;&#2346;&#2366;&#2360; &#2325;&#2375; &#2357;&#2367;&#2325;&#2366;&#2360; &#2324;&#2352;/&#2351;&#2366; &#2309;&#2344;&#2381;&#2351; &#2358;&#2361;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2349;&#2380;&#2340;&#2367;&#2325; &#2344;&#2367;&#2325;&#2335;&#2340;&#2366; &#2361;&#2379;&#2344;&#2366; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;&#2404;</p><p>III. &#2311;&#2360;&#2325;&#2368; &#2325;&#2369;&#2354; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 20,000 &#2360;&#2375; &#2325;&#2350; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III</span><span class=\"hqt\" style=\"display:none\">II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I,II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A UA is defined as a continuous urban spread having (i) at least one statutory town, and (ii) physical contiguity with adjoining outgrowths and/or other towns, with total population not less than 20,000 as per 2001 Census. This definition distinguishes UAs from individual census towns and emphasizes contiguity.</p><p>Further Insights:</p><p>&#8226; A statutory town is notified by state law (municipal corporation, municipality, etc.); a census town meets demographic/economic criteria but lacks statutory status.</p><p>&#8226; An outgrowth (OG) is a viable urban unit contiguous to a statutory town (e.g., university campus, port area) recognized in Census for delineating UAs.</p><p>&#8226; Census 2011 significantly increased the number of census towns, changing India's urban footprint without immediate municipal conversion.</p>",
    "question_index": 44
  },

    "question": "<span class=\"eqt\"><p>Identify the true statements.</p><p>I. Mohiniyattam is a classical dance form from Kerala.</p><p>II. It is associated with the Tandava style of dance.</p><p>III. The Tandava style is characterized by graceful, feminine movements and expressions, which are a key feature of Mohiniyattam.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2350;&#2379;&#2361;&#2367;&#2344;&#2368;&#2309;&#2335;&#2381;&#2335;&#2350; &#2325;&#2375;&#2352;&#2354; &#2325;&#2366; &#2319;&#2325; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2344;&#2371;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2361; &#2340;&#2366;&#2306;&#2337;&#2357; &#2344;&#2371;&#2340;&#2381;&#2351; &#2358;&#2376;&#2354;&#2368; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2340;&#2366;&#2306;&#2337;&#2357; &#2358;&#2376;&#2354;&#2368; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2360;&#2369;&#2306;&#2342;&#2352;, &#2360;&#2381;&#2340;&#2381;&#2352;&#2367;&#2351;&#2379;&#2330;&#2367;&#2340; &#2327;&#2340;&#2367; &#2324;&#2352; &#2349;&#2366;&#2357; &#2361;&#2376;&#2306;, &#2332;&#2379; &#2350;&#2379;&#2361;&#2367;&#2344;&#2368;&#2309;&#2335;&#2381;&#2335;&#2350; &#2325;&#2368; &#2319;&#2325; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>I. Mohiniyattam is a classical dance form from Kerala: This is correct. Mohiniyattam is one of the eight recognized classical Indian dance forms and it originates from the state of Kerala.</p><p>II. It is associated with the Tandava style of dance: This is incorrect. In Indian classical dance, there are two primary aspects: Tandava (vigorous, masculine) and Lasya (graceful, feminine). Mohiniyattam is known for its gentle and graceful movements, making it a prominent example of the Lasya style.</p><p>III. The Tandava style is characterized by graceful, feminine movements and expressions, which are a key feature of Mohiniyattam: This is also incorrect. The statement accurately defines the Lasya style and hence is incorrect.</p>",
    "question_index": 45

    "solution": "<p>Air Marshal Tejbir Singh assumed the appointment of Director General (Inspection and Safety) [DG (I&S)] at Air HQ on 01 December 2025. He succeeds Air Marshal Makarand Bhaskar Ranade, who superannuated on 30 Nov 2025.</p><p>In his illustrious career spanning 37 years, the Air Officer has held varied command and staff assignments including our Air Attach' to Bangladesh, Senior Directing Staff (Air), National Defence College, New Delhi and Assistant Chief of Air Staff Operations (T&H) at Air HQ. He is an alumnus of the Royal College of Defence Studies, UK. In recognition of his distinguished service, Air Marshal Tejbir Singh was awarded Vayu Sena Medal in 2010, and Ati Vishisht Seva Medal in 2018.</p>",

    "question": "<span class=\"eqt\"><p>Identify which of the following statements are correct.</p><p>1.Hindustan Copper Limited(HCL) was incorporated on 9 November 1967.</p><p>2. The Khetri Copper Complex(KCC) is located in Rajasthan.</p><p>3. The headquarters of Mineral Exploration Consultancy Ltd. is located in Jaipur.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2361;&#2330;&#2366;&#2344;&#2375;&#2306; &#2325;&#2367; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>1.&#2361;&#2367;&#2306;&#2342;&#2369;&#2360;&#2381;&#2340;&#2366;&#2344; &#2325;&#2377;&#2346;&#2352; &#2354;&#2367;&#2350;&#2367;&#2335;&#2375;&#2337; (HCL) &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; 9 &#2344;&#2357;&#2306;&#2348;&#2352; 1967 &#2325;&#2379; &#2361;&#2369;&#2312; &#2341;&#2368;&#2404;</p><p>2. &#2326;&#2375;&#2340;&#2337;&#2364;&#2368; &#2325;&#2377;&#2346;&#2352; &#2325;&#2377;&#2350;&#2381;&#2346;&#2381;&#2354;&#2375;&#2325;&#2381;&#2360; (KCC) &#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>3. &#2350;&#2367;&#2344;&#2352;&#2354; &#2319;&#2325;&#2381;&#2360;&#2346;&#2381;&#2354;&#2379;&#2352;&#2375;&#2358;&#2344; &#2325;&#2306;&#2360;&#2354;&#2381;&#2335;&#2375;&#2306;&#2360;&#2368; &#2354;&#2367;&#2350;&#2367;&#2335;&#2375;&#2337; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351;&#2366;&#2354;&#2351; &#2332;&#2351;&#2346;&#2369;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",

    "solution": "<p>Only 1 and 2 are correct.</p><p>Mineral Exploration and Consultancy Limited (MECL) headquarters is located in Nagpur, Maharashtra.</p><p></p><p>- Mineral Exploration and Consultancy Limited (MECL)(Formerly Mineral Exploration Corporation Ltd.) was established as an autonomous Public Sector Company in October 1972, under the administrative control of Ministry of Mines, Government of India for systematic exploration of minerals, to bridge the gap between the initial discovery of a prospect and its eventual exploitation.</p><p></p><p>- Hindustan Copper Limited (HCL), a Public Sector Undertaking under the administrative control of the Ministry of Mines, was incorporated on 9th November 1967. It is the only vertically integrated copper producing company in India with presence in mining, beneficiation, and smelting, refining and downstream saleable products. HCL holds all the operating mining leases of copper in India.</p><p></p><p>- HCL's mines and plants are spread across four operating units - Khetri Copper Complex (KCC) at Khetrinagar, Rajasthan; Indian Copper Complex (ICC) at Ghatsila, Jharkhand; Malanjkhand Copper Project (MCP) at Malanjkhand, Madhya Pradesh; and Taloja Copper Project (TCP) at Taloja, Maharashtra and a newly acquired Gujarat Copper Project (GCP) at Bharuch, Gujarat.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following are direct taxes?</p><p>i) Income tax</p><p>ii) Goods and services tax</p><p>iii) Gift Tax</p><p>iv) Capital Gains Tax</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2361;&#2376;&#2306;?</p><p>i) &#2310;&#2351; &#2325;&#2352;</p><p>ii) &#2357;&#2360;&#2381;&#2340;&#2369; &#2319;&#2357;&#2306; &#2360;&#2375;&#2357;&#2366; &#2325;&#2352;</p><p>iii) &#2313;&#2346;&#2361;&#2366;&#2352; &#2325;&#2352;</p><p>iv) &#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2354;&#2366;&#2349; &#2325;&#2352;</p></span>",
    "options": [
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>",
      "<span class=\"eqt\">ii, iii and iv</span><span class=\"hqt\" style=\"display:none\">ii, iii &#2324;&#2352; iv</span>",
      "<span class=\"eqt\">i, iii and iv</span><span class=\"hqt\" style=\"display:none\">i, iii &#2324;&#2352; iv</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Direct Taxes</b></p><p>&bull; These are levied on an individual's income or wealth.</p><p>&bull; In India Progressive tax system in function (More income more tax you have to pay and vice versa). Examples:</p><p>&bull; Income Tax</p><p>&bull; Corporate Tax</p><p>&bull; Capital Gains Tax</p><p>&bull; Property Tax</p><p>&bull; Wealth Tax (where applicable)</p><p><b>Indirect taxes</b>:</p><p>&bull; These are the taxes on goods and services. It levied on the transaction not on individual.</p><p>&bull; Indirect tax is same for all, it is not based on individuals' income.</p><p>&bull; Example</p><p>&bull; GST</p><p>&bull; Sales tax</p><p>&bull; Excise Duty</p><p>&bull; Customs Duty</p><p>&bull; Stamp Duty</p><p>&bull; Registration Fees</p><p>&bull; Entertainment tax </p>",
    "question_index": 48
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Public Interest Litigation (PIL) in the Indian judicial system:</p><p>Statement I: The concept of PIL was introduced in India by Justice P.N. Bhagwati to provide the poor and marginalized groups access to the judiciary.</p><p>Statement II: PIL relaxed the traditional rule of Locus Standi, allowing any public-spirited citizen to file a case on behalf of those unable to approach the court.</p><p>Which of the following is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2350;&#2375;&#2306; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2361;&#2367;&#2340; &#2351;&#2366;&#2330;&#2367;&#2325;&#2366; (PIL) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; I: PIL &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2366;&#2351;&#2350;&#2370;&#2352;&#2381;&#2340;&#2367; &#2346;&#2368;.&#2319;&#2344;. &#2349;&#2366;&#2327;&#2357;&#2340;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2327;&#2352;&#2368;&#2348; &#2324;&#2352; &#2361;&#2366;&#2358;&#2367;&#2319; &#2346;&#2352; &#2352;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2325;&#2379; &#2344;&#2381;&#2351;&#2366;&#2351;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2340;&#2325; &#2346;&#2361;&#2369;&#2306;&#2330; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p><p>&#2325;&#2341;&#2344; II: PIL &#2344;&#2375; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2354;&#2379;&#2325;&#2360; &#2360;&#2381;&#2335;&#2376;&#2306;&#2337;&#2368; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2325;&#2379; &#2358;&#2367;&#2341;&#2367;&#2354; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2332;&#2344;&#2361;&#2367;&#2340;&#2376;&#2359;&#2368; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2313;&#2344; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2323;&#2352; &#2360;&#2375; &#2350;&#2366;&#2350;&#2354;&#2366; &#2342;&#2366;&#2351;&#2352; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2309;&#2342;&#2366;&#2354;&#2340; &#2340;&#2325; &#2346;&#2361;&#2369;&#2306;&#2330;&#2344;&#2375; &#2350;&#2375;&#2306; &#2309;&#2360;&#2350;&#2352;&#2381;&#2341; &#2361;&#2376;&#2306;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement I is correct </p><p>Public Interest Litigation (PIL) was developed in India through judicial activism, particularly by Justice P.N. Bhagwati (along with Justice V.R. Krishna Iyer). The objective was to make justice accessible to weaker sections of society who could not approach courts due to poverty, illiteracy, or social disadvantage.</p><p>Statement II is also correct </p><p>PIL relaxed the traditional rule of locus standi. Earlier, only the affected person could file a case, but under PIL, any concerned citizen or organization can approach the court on behalf of others.</p><p>Further insights:</p><p>&#183; PIL can be filed under Article 32 in the Supreme Court and Article 226 in High Courts. </p><p>&#183; It played a key role in environmental protection cases in India. </p><p>&#183; Courts even accept letters as PIL petitions (epistolary jurisdiction). </p><p>&#183; It expanded the scope of Fundamental Rights, especially Article 21. </p><p>&#183; Misuse of PIL has led courts to impose penalties in frivolous cases.</p>",
    "question_index": 49
  },

    "question": "<span class=\"eqt\"><p>A number 45189 is to be increased by the least possible integer so that it becomes divisible by 16, 27 and 35. Find that integer.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 45189 &#2325;&#2379; &#2360;&#2348;&#2360;&#2375; &#2325;&#2350; &#2360;&#2306;&#2349;&#2357; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; &#2360;&#2375; &#2348;&#2338;&#2364;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2361;&#2376; &#2340;&#2366;&#2325;&#2367; &#2357;&#2361; 16, 27 &#2324;&#2352; 35 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379; &#2332;&#2366;&#2319;&#2404; &#2357;&#2361; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">181</span><span class=\"hqt\" style=\"display:none\">181</span>",
      "<span class=\"eqt\">171</span><span class=\"hqt\" style=\"display:none\">171</span>",
      "<span class=\"eqt\">161</span><span class=\"hqt\" style=\"display:none\">161</span>",
      "<span class=\"eqt\">191</span><span class=\"hqt\" style=\"display:none\">191</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A number divisible by 16, 27 and 35 must be divisible by their least common multiple.</p><p>Let A = required value to be added.</p><p>Least common multiple of 16, 27 and 35</p><p>16 = 2<sup>4</sup></p><p>27 = 3<sup>3</sup></p><p>35 = 5  X  7</p><p>LCM = 2<sup>4</sup>  X  3<sup>3</sup>  X  5  X  7</p><p>LCM = 15120</p><p>45189 &div; 15120 gives remainder 14949</p><p>Least value to be added</p><p>A = 15120 &#8722; 14949</p><p>A = 171</p>",
    "question_index": 50
  },
  {
    "question": "<span class=\"eqt\"><p>An 11  -  digit number 1755384562X is divisible by 18. What is the value of X?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; 11 &#2309;&#2306;&#2325;&#2368;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 1755384562X, 18 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2404; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>By the composite rule of divisibility, given number is also divisible by 9 and 2.</p><p>To be divisible by 9, sum of digits of the given number should be divisible by 9.</p><p>Sum of digits of 1755384562X = 46 + X</p><p>So, the value of X = 8</p>",
    "question_index": 51
  },

    "question": "<span class=\"eqt\"><p><div>&nbsp;If&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">a<sup>80</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">b<sup>64</sup></span></div>&nbsp;-&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">b<sup>64</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a<sup>80</sup></span></div>&nbsp;= 34, then find the value of&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">a<sup>80</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">b<sup>64</sup></span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">b<sup>64</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a<sup>80</sup></span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><div>&#2351;&#2342;&#2367;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">a<sup>80</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">b<sup>64</sup></span></div>&nbsp;-&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">b<sup>64</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a<sup>80</sup></span></div>&nbsp;= 34, &#2340;&#2379;&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">a<sup>80</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">b<sup>64</sup></span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">b<sup>64</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a<sup>80</sup></span></div>&nbsp;= ?&nbsp;</div></span>",

    "correct_option_id": 0,
    "solution": "<p>a<sup>80</sup>/b<sup>64</sup>  -  b<sup>64</sup>/a<sup>80</sup> = 34</p><p>Squaring both sides  -</p><p>(a<sup>80</sup>/b<sup>64</sup>)<sup>2</sup> + (b<sup>64</sup>/a<sup>80</sup>)<sup>2</sup> - 2 = 1156</p><p>(a<sup>80</sup>/b<sup>64</sup>)<sup>2</sup> + (b<sup>64</sup>/a<sup>80</sup>)<sup>2</sup>  -  2 + 4 = 1156 + 4</p><p>(a<sup>80</sup>/b<sup>64</sup>)<sup>2</sup> + (b<sup>64</sup>/a<sup>80</sup>)<sup>2</sup> + 2 = 1160</p><p>[(a<sup>80</sup>/b<sup>64</sup>) + (b<sup>64</sup>/a<sup>80</sup>)]<sup>2</sup> = 1160</p><p>[(a<sup>80</sup>/b<sup>64</sup>) + (b<sup>64</sup>/a<sup>80</sup>)] = 2&radic;290</p><p></p>",

    "question": "<span class=\"eqt\"><p>A square pyramid is placed on top of a cube of side 10 cm such that the base of the pyramid coincides with the top face of the cube. If the lateral surface area of the pyramid is 200 cm<sup>2</sup>, find the height of the pyramid.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2352;&#2381;&#2327; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2379; 10 &#2360;&#2375;&#2350;&#2368; &#2325;&#2375; &#2346;&#2325;&#2381;&#2359; &#2357;&#2366;&#2354;&#2375; &#2328;&#2344; &#2325;&#2375; &#2314;&#2346;&#2352; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2352;&#2326;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2328;&#2344; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2330;&#2375;&#2361;&#2352;&#2375; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2375;&#2354; &#2326;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2366; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2360;&#2340;&#2361; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 200 &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2361;&#2376;, &#2340;&#2379; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "correct_option_id": 0,

    "question": "<span class=\"eqt\"><p><div>&nbsp;If&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">cosec&#945; + cos&#945;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cosec&#945; - cos&#945;</span></div>&nbsp;=&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">161</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">93</span></div>&nbsp;, then what is the value of sin2&#945;?&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div> &#2351;&#2342;&#2367; <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">cosec&#945; + cos&#945;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cosec&#945; - cos&#945;</span></div> = <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">161</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">93</span></div> , &#2340;&#2379; sin2&#945; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;? </div></p></span>",

    "question": "<span class=\"eqt\"><p>Apu is twice as efficient as Bart who is twice as efficient as Carl. If all of them work together, the work will be completed in 12 days. Apu and Bart worked together for 8 days and then Apu was replaced by Carl. Apu was paid &#8377;2,000 for his work. How many more days are required to complete the work?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2346;&#2381;&#2346;&#2370;, &#2348;&#2366;&#2352;&#2381;&#2335; &#2360;&#2375; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2325;&#2369;&#2358;&#2354; &#2361;&#2376; &#2332;&#2379; &#2325;&#2366;&#2352;&#2381;&#2354; &#2360;&#2375; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2325;&#2369;&#2358;&#2354; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2375; &#2360;&#2349;&#2368; &#2319;&#2325;-&#2360;&#2366;&#2341; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2325;&#2366;&#2350; 12 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404; &#2309;&#2346;&#2381;&#2346;&#2370; &#2324;&#2352; &#2348;&#2366;&#2352;&#2381;&#2335; &#2344;&#2375; 8 &#2342;&#2367;&#2344;&#2379;&#2306; &#2340;&#2325; &#2319;&#2325;-&#2360;&#2366;&#2341; &#2325;&#2366;&#2350; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2347;&#2367;&#2352; &#2309;&#2346;&#2381;&#2346;&#2370; &#2325;&#2368; &#2332;&#2327;&#2361; &#2325;&#2366;&#2352;&#2381;&#2354; &#2310; &#2327;&#2351;&#2366;&#2404; &#2309;&#2346;&#2381;&#2346;&#2370; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2325;&#2366;&#2350; &#2325;&#2375; &#2354;&#2367;&#2319; 2,000 &#2352;&#2370;&#2346;&#2351;&#2375; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404; &#2325;&#2366;&#2350; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2342;&#2367;&#2344; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",

    "correct_option_id": 2,
    "solution": "<p>Assume Carl, Bart, and Apu can do x, 2x, and 4x work in 1 day respectively.</p><p>All of them together can complete the work in 12 days.</p><p>&#8756; Total work = 12 * (x + 2x + 4x) = 84x</p><p>Apu and Bart worked together for 8 days.</p><p>=&gt; 8 * (2x + 4x) = 48x work will be completed.</p><p>&#8756; Remaining work = 84x - 48x = 36x</p><p>Bart and Carl can do 3x work in 1 day.</p><p>=&gt; The remaining 36x can be completed in 36x/3x = 12 days.</p>",

    "options": [

    "question": "<span class=\"eqt\"><p>The midpoint of the line segment joining A(1, 9) and B(7, 3) lies on a line whose slope is -1. If the line passes through that midpoint, what is its equation in general form?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2375;&#2326;&#2366; &#2326;&#2306;&#2337; A(1, 9) &#2324;&#2352; B(7, 3) &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2350;&#2343;&#2381;&#2351;&#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2368; &#2338;&#2366;&#2354; -1 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2352;&#2375;&#2326;&#2366; &#2313;&#2360; &#2350;&#2343;&#2381;&#2351;&#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2366; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">x - y + 10 = 0</span><span class=\"hqt\" style=\"display:none\">x - y + 10 = 0</span>",

      "<span class=\"eqt\">x + y - 10 = 0</span><span class=\"hqt\" style=\"display:none\">x + y - 10 = 0</span>",
      "<span class=\"eqt\">y = x - 10</span><span class=\"hqt\" style=\"display:none\">y = x - 10</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Coordinates of midpoint of a line segment = {(sum of x-coordinates of the endpoints)/2, (sum of y-coordinates of the endpoints)/2}</p><p>Midpoint of A(1, 9) and B(7, 3)</p><p>={[(1 + 7)/2], [(9 + 3)/2]}</p><p>=(4, 6)</p><p>Equation of a line passing through the point (x<sub>1</sub>, y<sub>1</sub>) and having slope m =&gt;</p><p>y  -  y<sub>1</sub> = m(x  -  x<sub>1</sub>)</p><p>Here, x<sub>1</sub> = 4, y<sub>1</sub> = 6, and m = -1</p><p>y - 6 = -1(x - 4)</p><p>y - 6 = -x + 4</p><p>x + y - 10 = 0</p>",

    "question": "<span class=\"eqt\"><p>Pipe A can fill a tank in 18 hours. Pipe B can empty it in 54 hours. Find the time taken to fill the tank if both pipes are opened alternately for 1 hour each starting with pipe A.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 18 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2366;&#2311;&#2346; B &#2311;&#2360;&#2375; 54 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; A &#2360;&#2375; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325;&#2366;&#2306;&#2340;&#2352; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; 1 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",

    "question": "<p>Choose the most suitable option to replace the bold part of the sentence. If the sentence is already correct, select 'No improvement'.</p><p>As soon as the mountain weather station transmits the revised coordinates, the rescue pilot <b>had altered</b> the descent path accordingly.</p>",
    "options": [
      "alters",
      "will have altered",
      "will alter",
      "No improvement"
    ],
    "correct_option_id": 2,
    "solution": "<p>The alteration of the descent path will happen after the station transmits the revised coordinates, so WILL ALTER is the correct choice. The clause introduced by \"as soon as\" takes simple present for the future trigger, while the main clause takes future simple for the later action. Rule-based deduction: English says, \"As soon as he calls, I will leave,\" not \"I had left.\"</p><p>&bull; Option (a): ALTERS gives a simple present form, which does not clearly express the later future action intended here.</p><p>&bull; Option (b): WILL HAVE ALTERED suggests that the alteration will already be complete before the coordinates are transmitted, which is illogical in this context.</p><p>&bull; Option (c): WILL ALTER is correct because it shows the main future action after the trigger.</p><p>&bull; Option (d): No improvement is incorrect because HAD ALTERED is a past perfect form and does not fit the future sequence.</p>",
    "question_index": 75

    "question": "<p>The figure of speech used in \"The angry storm pounded on the door of the village\"?</p>",
    "options": [
      "Metaphor",
      "Simile",
      "Personification",
      "Hyperbole"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct answer is option <b>c) Personification</b>. </p><p><b>Personification</b> is a figure of speech where human qualities, emotions, actions, or characteristics are given to inanimate objects, animals, or abstract ideas.</p><p>The sentence gives the storm (an inanimate natural event) two human attributes:</p><p>The emotion of being \"angry.\"</p><p>The physical action of \"pounding,\" as if it had fists.</p><p>This makes the storm seem like a living, menacing creature with a will of its own, creating a more vivid and threatening image for the reader.</p><p>A <b>metaphor</b> is a figure of speech that makes a direct comparison between two unlike things by stating that one thing is another. It does not use \"like\" or \"as.\" The sentence does not say the storm is something else. It describes what the storm is doing in human terms.</p><p>A <b>simile</b> is a figure of speech that compares two unlike things using the words \"like\" or \"as.\" The sentence does not use \"like\" or \"as\" to make a comparison.</p><p><b>Hyperbole</b> is an extreme and deliberate exaggeration used for emphasis or humorous effect. It is not meant to be taken literally. While the phrase \"pounded on the door of the village\" is figurative, its primary function isn't exaggeration. The core literary device is attributing human action (pounding) and emotion (anger) to the storm. The phrase isn't exaggerating a quantity or quality to an impossible degree.</p>",
    "question_index": 76
  },

    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>There is a lot of work to do before we can finally launch the new product in the international market.</p>",
    "options": [
      "There is a lot of work that must be done by us before the new product can be finally launched.",
      "A lot of work is there that we must do before the new product could be launched in the market.",
      "There is a lot of work to be done before the new product can be finally launched by us in the international market.",
      "A lot of work had to be done by us before the new product will be finally launched in the international market."
    ],
    "correct_option_id": 2,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The given sentence contains an infinitive phrase ('to do') following the structure 'There is...'.</p><p>The format in Active voice is: There is/are + Noun + to + V1.</p><p>The format in Passive voice is: There is/are + Noun + to be + V3.</p><p>For example:</p><p>There is no time to lose. (Active)</p><p>There is no time to be lost. (Passive)</p><p>Option (c) correctly changes 'to do' to 'to be done' while also correctly passivizing the second clause [conversion of \"we can finally launch the new product\" to \"the new product can be finally launched by us\"].</p><p>The options except (c) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is option (c): There is a lot of work to be done before the new product can be finally launched by us in the international market.</p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 79
  },

    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>My cousin whispered to me during the ceremony, \"I am feeling a bit unwell and I think I need some fresh air.\"</p>",
    "options": [
      "My cousin whispered to me during the ceremony that he is feeling a bit unwell and he thinks he needs some fresh air.",
      "My cousin whispered to me during the ceremony that he has been feeling a bit unwell and he thought he needed some fresh air.",
      "My cousin whispered to me during the ceremony that he was feeling a bit unwell and he was thinking he needed some fresh air.",
      "My cousin whispered to me during the ceremony that he was feeling a bit unwell and he thought he needed some fresh air."
    ],
    "correct_option_id": 3,
    "solution": "<p>The first part of the sentence in the Direct Speech is in <b>Present Continuous Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Past Continuous Tense</b>.</p><p>Present Continuous (Subject + is/am/are + V1 + ing + Object) should be converted into Past Continuous (Subject + was/were + V1 + ing + Object).</p><p>For example:</p><p>He said, \"I am checking the assignment.\" (Direct Speech)</p><p>He said that he was checking the assignment. (Indirect Speech)</p><p>The second part of the sentence in the Direct Speech is in <b>Present Simple Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Past Simple Tense</b>.</p><p>Present Simple (Subject + V1/V5 + Object) should be converted into Past Simple (Subject + V2 + Object).</p><p>For example:</p><p>He said, \"I check the assignments.\" (Direct Speech)</p><p>He said that he checked the assignments. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>\"I\" changes to \"he\".</p><p>\"am feeling\" changes to \"was feeling\".</p><p>\"think\" [Present Indefinite in direct speech] changes to \"thought\" [Past Indefinite in indirect speech].</p><p>\"need\" [Present Indefinite in direct speech] changes to \"needed\" [Past Indefinite in indirect speech].</p><p>Therefore, the correct answer is: \"My cousin whispered to me during the ceremony that he was feeling a bit unwell and he thought he needed some fresh air.\"</p><p>Hence, option (d) is correct.</p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
