    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct about the Dravida style of Temple architecture?</p><p>I. It has curvilinear top or Shikhara.</p><p>II. This type of temples are found in Thanjavur and Kanchipuram.</p><p>Select the correct answer using the code given below:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2306;&#2342;&#2367;&#2352; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2354;&#2366; &#2325;&#2368; &#2342;&#2381;&#2352;&#2357;&#2367;&#2337;&#2364; &#2358;&#2376;&#2354;&#2368; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2311;&#2360;&#2325;&#2366; &#2358;&#2368;&#2352;&#2381;&#2359; &#2351;&#2366; &#2358;&#2367;&#2326;&#2352; &#2357;&#2325;&#2381;&#2352;&#2368;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2350;&#2306;&#2342;&#2367;&#2352; &#2340;&#2306;&#2332;&#2366;&#2357;&#2369;&#2352; &#2324;&#2352; &#2325;&#2366;&#2306;&#2330;&#2368;&#2346;&#2369;&#2352;&#2350; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;:</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement I is INCORRECT. Dravida style temples have <b>Pyramidal top</b>. Nagara style temples have a curvilinear top.</p><p>Statement II is correct. This type of temples were built by <b>Chola &amp; Pallava Kings</b>.</p><p>Dravida temples have huge Gopuram or gate. Each main temple has many subsidiary temples; this style is known as <b>Panchayatana.</b> <b> The temples of Thanjavur and Kanchipuram are built in the Dravida style.</b></p><p>Source: NCERT- Introduction to Fine Arts Class XI</p>",
    "question_index": 42
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements</p><p>1) Intracellular digestion takes place within the cell in food vacuoles with the help of lysosomal enzymes.</p><p>2) This type of digestion is commonly observed in multicellular organisms such as Paramecium.</p><p>3) Cnidaria & Ctenophora show both intracellular and extracellular digestion.</p><p>Which of the statements given above are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;</p><p>1) &#2354;&#2366;&#2311;&#2360;&#2379;&#2360;&#2379;&#2350;&#2354; &#2319;&#2306;&#2332;&#2366;&#2311;&#2350;&#2379;&#2306; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2360;&#2375; &#2326;&#2366;&#2342;&#2381;&#2351; &#2352;&#2367;&#2325;&#2381;&#2340;&#2367;&#2325;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2309;&#2306;&#2340;&#2307;&#2325;&#2379;&#2358;&#2367;&#2325;&#2368;&#2351; &#2346;&#2366;&#2330;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2346;&#2366;&#2330;&#2344; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2346;&#2376;&#2352;&#2366;&#2350;&#2368;&#2358;&#2367;&#2351;&#2350; &#2332;&#2376;&#2360;&#2375; &#2348;&#2361;&#2369;&#2325;&#2379;&#2358;&#2367;&#2325;&#2368;&#2351; &#2332;&#2368;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2375;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2344;&#2367;&#2337;&#2366;&#2352;&#2367;&#2351;&#2366; &#2324;&#2352; &#2360;&#2368;&#2335;&#2375;&#2344;&#2379;&#2347;&#2379;&#2352;&#2366; &#2342;&#2379;&#2344;&#2379;&#2306; &#2309;&#2306;&#2340;&#2307;&#2325;&#2379;&#2358;&#2367;&#2325;&#2368;&#2351; &#2324;&#2352; &#2348;&#2366;&#2361;&#2381;&#2351;&#2325;&#2379;&#2358;&#2367;&#2325;&#2368;&#2351; &#2346;&#2366;&#2330;&#2344; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Intracellular digestion occurs inside the cell, mainly in food vacuoles, using enzymes supplied by lysosomes.</p><p>Cnidaria (e.g., Hydra) and Ctenophora perform extracellular digestion in the gastrovascular cavity followed by intracellular digestion inside cells.</p><p>Paramecium is unicellular, not multicellular</p><p>Further insights</p><p> Intracellular digestion occurs inside the cell.</p><p> Food vacuole is the site of intracellular digestion.</p><p> Lysosomes provide digestive enzymes.</p><p> Intracellular digestion is common in unicellular organisms.</p><p> Paramecium is unicellular, not multicellular</p><p> Intracellular digestion is evolutionarily primitive.</p><p> White blood cells digest pathogens intracellularly.</p><p> Most higher animals rely mainly on extracellular digestion.</p><p></p>",
    "question_index": 43

    "question": "<span class=\"eqt\"><p>In the following question, a statement of Assertion (A) is followed by a statement of Reason (R). Mark the correct option:</p><p>Assertion (A): The Ministry of External Affairs, in partnership with the Government of Maharashtra, organized the inaugural BIMSTEC Young Professionals Exchange Programme in Mumbai and Pune in March 2026.</p><p>Reason (R): India seeks to strengthen regional ties and foster innovation by providing a platform for young professionals from the Bay of Bengal region to engage with its development model and technology ecosystem.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2325;&#2341;&#2344; &#2361;&#2376; - &#2342;&#2366;&#2357;&#2375; (A) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2325;&#2366;&#2352;&#2339; (R) &#2325;&#2366; &#2325;&#2341;&#2344; &#2361;&#2376;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:</p><p>&#2342;&#2366;&#2357;&#2366; (A): &#2357;&#2367;&#2342;&#2375;&#2358; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2344;&#2375; &#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2350;&#2375;&#2306; &#2350;&#2366;&#2352;&#2381;&#2330; 2026 &#2350;&#2375;&#2306; &#2350;&#2369;&#2306;&#2348;&#2312; &#2324;&#2352; &#2346;&#2369;&#2339;&#2375; &#2350;&#2375;&#2306; &#2313;&#2342;&#2381;&#2328;&#2366;&#2335;&#2344; BIMSTEC &#2351;&#2369;&#2357;&#2366; &#2346;&#2375;&#2358;&#2375;&#2357;&#2352; &#2357;&#2367;&#2344;&#2367;&#2350;&#2351; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2325;&#2366; &#2310;&#2351;&#2379;&#2332;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2349;&#2366;&#2352;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2368;&#2351; &#2360;&#2306;&#2348;&#2306;&#2343;&#2379;&#2306; &#2325;&#2379; &#2350;&#2332;&#2348;&#2370;&#2340; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2368; &#2326;&#2366;&#2337;&#2364;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2351;&#2369;&#2357;&#2366; &#2346;&#2375;&#2358;&#2375;&#2357;&#2352;&#2379;&#2306; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2357;&#2367;&#2325;&#2366;&#2360; &#2350;&#2377;&#2337;&#2354; &#2324;&#2352; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; &#2332;&#2369;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2350;&#2306;&#2330; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2325;&#2375; &#2344;&#2357;&#2366;&#2330;&#2366;&#2352; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366; &#2330;&#2366;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",

    "correct_option_id": 0,
    "solution": "<p>The 1st BIMSTEC Young Professionals Exchange Programme took place from 9 to 15 March 2026, hosted in Mumbai and Pune through a partnership between the Ministry of External Affairs(MEA) and the Maharashtra government.</p><p>The program was aimed at promoting knowledge exchange and strengthening cooperation in line with Indias \"Neighborhood First\" and \"Act East\" policies.</p><p></p><p>The program brought together 30 young innovators, technology developers, entrepreneurs and other professionals from BIMSTEC member countries.</p><p>The program was announced by Prime Minister Modi during the 6th BIMSTEC Summit, as part of Indias commitment to strengthen engagement among the young people of the Bay of Bengal region. The programme was aimed to promote knowledge exchange, strengthen cooperation, and provide exposure to Indias rapidly growing innovation, start-up, knowledge, research and technology ecosystem.</p><p>The participants visited several premier institutions including the Indian Institute of Technology Bombay, Jawaharlal Nehru Port Authority, Bharat Diamond Bourse, National Stock Exchange, Infosys, Symbiosis, etc. which provided the participants an opportunity to interact with industry leaders, and understand the functioning of major institutions driving innovation and economic growth in India.</p><p>India, in the spirit of its Neighborhood First and Act East policies, sees the importance of creating such platforms for young professionals, entrepreneurs, and innovators to interact, learn from each other, and build long-term partnerships. The initiative would play an important role in strengthening regional ties, fostering innovation, and building lasting networks among emerging leaders across the BIMSTEC region.</p>",

    "solution": "<p>Census 2011 defines main workers (&ge;6 months) and marginal workers (&lt;6 months); 3 - 6 months falls under marginal.</p><p>Non-workers comprise those not engaged in any economic activity, including the listed categories; but this does not explain Statement I.</p><p><b>Further Insights:</b></p><p>- Census also reports marginal workers who worked for less than 3 months as a subcategory.</p><p>- Worker types: cultivators, agricultural laborers, household industry workers, and other workers.</p><p>- Work Participation Rate (WPR) = (Workers / Total population)  X  100.</p>",

    "question": "<span class=\"eqt\"><p>How many minutes is a standard professional Football (Soccer) match, excluding stoppage time and extra time?</p><p></p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2350;&#2366;&#2344;&#2325; &#2346;&#2375;&#2358;&#2375;&#2357;&#2352; &#2347;&#2369;&#2335;&#2348;&#2377;&#2354; (&#2360;&#2377;&#2325;&#2352;) &#2350;&#2376;&#2330; &#2350;&#2375;&#2306; &#2360;&#2381;&#2335;&#2377;&#2346;&#2375;&#2332; &#2335;&#2366;&#2311;&#2350; &#2324;&#2352; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2350;&#2351; &#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2367;&#2344;&#2335; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">80 minutes</span><span class=\"hqt\" style=\"display:none\">80 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">90 minutes</span><span class=\"hqt\" style=\"display:none\">90 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">60 minutes</span><span class=\"hqt\" style=\"display:none\">60 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">100 minutes</span><span class=\"hqt\" style=\"display:none\">100 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A standard professional football (soccer) match lasts for a total of 90 minutes.</p><p></p><p>Breakdown of Match Duration:</p><p>Two Halves: The game is divided into two equal halves of 45 minutes each.</p><p>Half-time Interval: There is a break between the two halves, which usually lasts 15 minutes.</p><p>Stoppage Time (Added Time): At the end of each 45-minute half, the referee adds \"stoppage time\" to compensate for time lost due to substitutions, injuries, or other interruptions. This is not included in the regulation 90 minutes.</p><p>Extra Time: In certain \"knockout\" tournament matches where a winner must be decided and the score is tied after 90 minutes, two additional periods of 15 minutes each are played (totaling 30 minutes).</p>",

  },

    "question": "<span class=\"eqt\"><p>Which of the following assumptions was central to the Mahalanobis Model used in India's Second Five-Year Plan?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2361;&#2366;&#2354;&#2344;&#2379;&#2348;&#2367;&#2360; &#2350;&#2377;&#2337;&#2354; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rapid growth through export-led industrialisation</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2340;&#2368;&#2357;&#2381;&#2352; &#2357;&#2367;&#2325;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Immediate agricultural modernisation as the primary growth engine</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2311;&#2306;&#2332;&#2344; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2340;&#2340;&#2381;&#2325;&#2366;&#2354; &#2309;&#2346;&#2344;&#2366;&#2344;&#2366; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Long-term growth driven by expansion of capital goods capacity</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2325;&#2375; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2360;&#2375; &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2342;&#2368;&#2352;&#2381;&#2328;&#2325;&#2366;&#2354;&#2367;&#2325; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Priority to consumer goods industries for quick demand expansion</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2325;&#2379; &#2350;&#2366;&#2306;&#2327; &#2350;&#2375;&#2306; &#2340;&#2375;&#2332;&#2368; &#2360;&#2375; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366; &#2342;&#2368; &#2332;&#2366;&#2319;&#2327;&#2368;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Mahalanobis Model, formulated by Prasanta Chandra Mahalanobis, argued that investment in capital goods industries (steel, heavy machinery, engineering) increases an economy's future productive capacity.</p><p>This assumption guided the Second Five-Year Plan (1956-61) toward heavy industrialisation to achieve long-term self-reliant growth.</p><p></p><p><b>Further Insights</b></p><p>The Mahalanobis Model underpinned the Second Five-Year Plan (1956-61).</p><p>Capital goods investment was seen as the engine of long-term growth.</p><p>The model justified a dominant public sector role in heavy industries.</p><p>It aimed at reducing dependence on imported machinery.</p><p>The approach assumed limited foreign trade in the early stages.</p><p>Steel, heavy engineering, and machine tools were priority sectors.</p><p>Critics argue it led to consumer goods shortages in the short run.</p><p>Agriculture's relative neglect later contributed to policy rebalancing.</p><p>Despite criticism, the model laid the industrial base for Indias economy.</p><p></p>",

  },

; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350;</td></tr></table></span>",

    "solution": "<p>Lithosphere is the outer solid part of Earth where soils form and nutrients are cycled, so 1-c.</p><p>Hydrosphere provides water medium and dissolves nutrients, so 2-d.</p><p>Atmosphere enables weather and gas exchange (O2, CO2), so 3-a.</p><p>Cryosphere's ice/snow strongly affects albedo and sea level, so 4-b.</p><p>Further Insights:</p><p>- Troposphere (lowest layer) holds ~75% of atmospheric mass and most weather.</p><p>- The stratospheric ozone layer peaks around 20 - 30 km and absorbs UV-B.</p><p>- About 97% of Earth's water is saline; only a small fraction is accessible freshwater.</p><p>- Cryosphere stores most of Earth's freshwater in glaciers and ice sheets.</p>",

    "question": "<span class=\"eqt\"><p>In April 2026, India surpassed which country to top the Athletics Integrity Unit's (AIU) list of ineligible persons due to doping violations?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2346;&#2381;&#2352;&#2376;&#2354; 2026 &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2325;&#2379; &#2346;&#2368;&#2331;&#2375; &#2331;&#2379;&#2337;&#2364;&#2340;&#2375; &#2361;&#2369;&#2319; &#2319;&#2341;&#2354;&#2375;&#2335;&#2367;&#2325;&#2381;&#2360; &#2311;&#2306;&#2335;&#2375;&#2327;&#2381;&#2352;&#2367;&#2335;&#2368; &#2351;&#2370;&#2344;&#2367;&#2335; (AIU) &#2325;&#2368; &#2337;&#2379;&#2346;&#2367;&#2306;&#2327; &#2313;&#2354;&#2381;&#2354;&#2306;&#2328;&#2344;&#2379;&#2306; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2309;&#2351;&#2379;&#2327;&#2381;&#2351; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2358;&#2368;&#2352;&#2381;&#2359; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366;?</p></span>",

    "solution": "<p>India has surpassed Kenya to top the Athletics Integrity Unit's (AIU) list of ineligible persons due to doping violations with 148 suspended track and field athletes, which is two more than the African nation. The latest updated list is for the period up to April 1 this year. Russia took the third spot with 66 suspended athletes.</p><p>Prominent Indian athletes in the list include women's 100m national record holder Dutee Chand, who has been serving a four-year suspension since December 2022, middle distance runner Parvej Khan, whose six-year suspension will run till July 2030, and Tamil Nadu sprinter Sekar Dhanalakshmi who was suspended for eight years in 2025.</p><p>The list includes persons serving a period of ineligibility as a result of national level cases and decisions.</p><p>It also includes persons who have committed non-doping violations such as tampering, evading testing, trafficking, or missing whereabouts, which carry the same penalties as a doping offence.</p><p>The Athletics Integrity Unit is an independent anti-doping watchdog established by the World Athletics. It has jurisdiction over international level athletes and their support persons.</p><p>In order to tackle the doping menace, the Athletics Federation of India (AFI) has taken up strict measures, including tracking down those centres in the country which are linked to the menace.</p><p>After the 2024 Paris Olympics, the AFI has decentralised the national camps. Currently, the AFI is only conducting national camps for relay teams.</p><p>All other elite athletes have chosen private organisations like Reliance, JSW, Tatas or government departments like Army, and Navy for training.</p>",

    "question": "<span class=\"eqt\"><p>A coastal ferry completes its run in 10 h at 36 km/h. To finish the same run in 8 h, by what percent must the speed be increased?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2340;&#2335;&#2368;&#2351; &#2344;&#2380;&#2325;&#2366; 36 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; 10 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2313;&#2360;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2379; 8 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;, &#2327;&#2340;&#2367; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2352;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368;?</p></span>",

    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>The driver said to me, \"Don't park your vehicle in front of the gate.\"</p>",
    "options": [
      "The driver advised me that did not park my vehicle in front of the gate.",
      "The driver suggested to me that I should not park my vehicle in front of the gate.",
      "The driver told me to not to park my vehicle in front of the gate.",
      "The driver told me not to park my vehicle in front of the gate."
    ],
    "correct_option_id": 3,
    "solution": "<p>Imperative Sentences sometimes begin with Negative Commands like \"Don't\".</p><p>The reporting verbs like \"said/say\", etc. are changed into \"asked/ask\", \"told/tell\", \"advised/ advise\" etc.</p><p>\"Not + To + V1\" is used in these sentences. For example, \"don't go\" should be changed to \"not to go\" in Indirect speech.</p><p>In this context, \"Don't ......\" changes into \"not to ......\".</p><p>For example:</p><p>My friend said to me, \"Don't go to Kolkata.\" (Direct Speech)</p><p>My friend advised me not to go to Kolkata. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The reporting verb 'said to' is changed into 'told'. </p><p>&#183; The verb 'don't park' is changed into 'not to park'. </p><p>&#183; The possessive determiner 'your' is changed into 'my'. </p><p>Therefore, the correct answer is option (d): <b>The driver told me not to park my vehicle in front of the gate.</b></p>",
    "question_index": 80
  },

    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>But her eyes, blue as a southern sea / with a noonday sun above it, / is marvellously clear / and full of light</p>",

      "and full of light",
      "But her eyes, blue as a southern sea",
      "with a noonday sun above it",
      "is marvellously clear"
    ],
    "correct_option_id": 3,
    "solution": "<p>The subject of the given sentence is 'her eyes' which is plural in nature. So, the helping verb associated with it should be plural. The verb 'is' is used with singular subjects. So, it should be replaced with the corresponding plural verb 'are' to rectify the given sentence. Hence, option (d) is the correct answer.</p><p><b>The correct sentence is:</b> But her eyes, blue as a southern sea with a noonday sun above it, are marvellously clear and full of light.</p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 83
  },

    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If no substitution is required, select 'No improvement required' as your answer.</p><p>As humans, we often are so focused on our future dreams or are agonizing about the past mistakes that <b><u>we frequently forget along</u></b> the present.</p>",

    "correct_option_id": 1,
    "solution": "<p>The underlined phrase is incorrect because the adverb 'along' when used with the verb 'forget' renders the sentence meaningless. The correct word to be used with 'forget' is 'about'; hence, 'we frequently forget about' is the correct phrase to be used in the sentence. Hence, option (b) is the correct answer.</p><p>The phrase in option (a) is incorrect because the pronoun 'us' is used with object of the sentence, but it has been used to refer to the subject of the sentence. The phrase in option (c) is incorrect because the adjective 'frequent' has been used to modify the verb 'forget', which makes the phrase grammatically incorrect.</p>",

    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>The accused had been let to go scot-free by the court because of lack of evidence.</p>",

    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the helping verb and the preposition 'by' is necessary while changing the voice of the sentence from Passive to Active.</p><p>The Passive voice in this question is in <b>Past Perfect</b>. Thus, the Active voice will also be in <b>Past Perfect</b>.</p><p>In Passive voice, the format is: <b>Subject (Objective case) + had + been + V3 + by + Object (Subjective case)</b>.</p><p>Thus, the format of Active voice is: <b>Subject + had + V3 + Object</b>.</p><p>For example:</p><p>She had been called by me. (Passive Voice)</p><p>I had called her. (Active Voice)</p><p>The options except (c) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is: <b>(c) The court had let the accused go scot-free because of lack of evidence.</b></p>",
