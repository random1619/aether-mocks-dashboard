  {
    "question": "<span class=\"eqt\"><p>A digital lock shows the sequence 12, 14, 17, 22, 29, 40, ?. What will replace the question mark?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2354;&#2377;&#2325; &#2309;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350; 12, 14, 17, 22, 29, 40, ? &#2342;&#2367;&#2326;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; &#2325;&#2368; &#2332;&#2327;&#2361; &#2325;&#2381;&#2351;&#2366; &#2310;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">57</span><span class=\"hqt\" style=\"display:none\">57</span>",
      "<span class=\"eqt\">55</span><span class=\"hqt\" style=\"display:none\">55</span>",
      "<span class=\"eqt\">59</span><span class=\"hqt\" style=\"display:none\">59</span>",
      "<span class=\"eqt\">53</span><span class=\"hqt\" style=\"display:none\">53</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>12 to 14 = +2</p><p>14 to 17 = +3</p><p>17 to 22 = +5</p><p>22 to 29 = +7</p><p>29 to 40 = +11</p><p>These are successive prime numbers, 2, 3, 5, 7, 11</p><p>The next prime after 11 is 13</p><p>Required next term = 40 + 13 = 53</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Statement: A company should provide a secure bicycle parking area to employees</p><p>Which of the following arguments is weak mainly because it is based on personal opinion rather than fact-based support?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2351;&#2366;&#2344;: &#2319;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2379; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2360;&#2366;&#2311;&#2325;&#2367;&#2354; &#2346;&#2366;&#2352;&#2381;&#2325;&#2367;&#2306;&#2327; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2340;&#2352;&#2381;&#2325; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2311;&#2360;&#2354;&#2367;&#2319; &#2325;&#2350;&#2332;&#2379;&#2352; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2351;&#2361; &#2340;&#2341;&#2381;&#2351;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2352;&#2366;&#2351; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A secure parking area will take some space, but it can be created by reallocating part of the existing visitor parking</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2346;&#2366;&#2352;&#2381;&#2325;&#2367;&#2306;&#2327; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2369;&#2331; &#2332;&#2327;&#2361; &#2354;&#2375;&#2327;&#2366;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2311;&#2360;&#2375; &#2350;&#2380;&#2332;&#2370;&#2342;&#2366; &#2310;&#2327;&#2306;&#2340;&#2369;&#2325; &#2346;&#2366;&#2352;&#2381;&#2325;&#2367;&#2306;&#2327; &#2325;&#2375; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375; &#2325;&#2379; &#2346;&#2369;&#2344;&#2307; &#2310;&#2357;&#2306;&#2335;&#2367;&#2340; &#2325;&#2352;&#2325;&#2375; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Bicycles look untidy near the entrance, so the company should build a separate area</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2311;&#2325;&#2367;&#2354;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2342;&#2381;&#2357;&#2366;&#2352; &#2325;&#2375; &#2346;&#2366;&#2360; &#2309;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2342;&#2367;&#2326;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2311;&#2360;&#2354;&#2367;&#2319; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2379; &#2319;&#2325; &#2309;&#2354;&#2327; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2348;&#2344;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;</span>",
      "<span class=\"eqt\">Providing secure parking can reduce bicycle theft complaints reported by employees and may encourage cycling to work</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2346;&#2366;&#2352;&#2381;&#2325;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2360;&#2375; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335; &#2325;&#2368; &#2327;&#2312; &#2360;&#2366;&#2311;&#2325;&#2367;&#2354; &#2330;&#2379;&#2352;&#2368; &#2325;&#2368; &#2358;&#2367;&#2325;&#2366;&#2351;&#2340;&#2375;&#2306; &#2325;&#2350; &#2361;&#2379; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306; &#2324;&#2352; &#2351;&#2361; &#2325;&#2366;&#2350; &#2346;&#2352; &#2360;&#2366;&#2311;&#2325;&#2367;&#2354; &#2330;&#2354;&#2366;&#2344;&#2375; &#2325;&#2379; &#2346;&#2381;&#2352;&#2379;&#2340;&#2381;&#2360;&#2366;&#2361;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">If bicycles are left outside without locks and monitoring, theft risk is higher, so secure parking improves safety of employees' property</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2360;&#2366;&#2311;&#2325;&#2367;&#2354;&#2375;&#2306; &#2348;&#2367;&#2344;&#2366; &#2340;&#2366;&#2354;&#2375; &#2324;&#2352; &#2344;&#2367;&#2327;&#2352;&#2366;&#2344;&#2368; &#2325;&#2375; &#2348;&#2366;&#2361;&#2352; &#2331;&#2379;&#2337;&#2364; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2330;&#2379;&#2352;&#2368; &#2325;&#2366; &#2332;&#2379;&#2326;&#2367;&#2350; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2311;&#2360;&#2354;&#2367;&#2319; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2346;&#2366;&#2352;&#2381;&#2325;&#2367;&#2306;&#2327; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>An argument becomes weak when it rests mainly on personal preference and does not give a solid, objective reason</p><p>Option C is based on appearance (\"look untidy\"), which is subjective and does not strongly justify the policy</p><p>The other options connect to theft risk, complaints, practical space planning, and property safety, which can be supported with facts</p><p>Answer: Bicycles look untidy near the entrance, so the company should build a separate area</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Read the given statement and courses of action carefully. Assuming that the information given in the statement is true, decide which of the given courses of action logically follows for pursuing.</p><p>Statement: A banking fraud review shows a rise in phishing scams targeting senior citizens, with complaints indicating many victims were tricked into sharing OTPs and remote-access permissions.</p><p>Course of action I: Run targeted awareness drives in branches, enable optional transaction limits for seniors, and set up a dedicated helpline for suspicious activity reporting.</p><p>Course of action II: Disable all online banking services for customers above 60 years and allow only branch transactions to \"eliminate risk.\"</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; &#2325;&#2375; &#2346;&#2366;&#2336;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344; &#2360;&#2375; &#2346;&#2338;&#2364;&#2375;&#2306;&#2404; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2367; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2354;&#2375;&#2306; &#2325;&#2367; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; &#2325;&#2375; &#2346;&#2366;&#2336;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2340;&#2352;&#2381;&#2325;&#2360;&#2306;&#2327;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344;: &#2319;&#2325; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2343;&#2379;&#2326;&#2366;&#2343;&#2337;&#2364;&#2368; &#2360;&#2350;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2357;&#2352;&#2367;&#2359;&#2381;&#2336; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2379;&#2306; &#2325;&#2379; &#2354;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2347;&#2364;&#2367;&#2358;&#2367;&#2306;&#2327; &#2328;&#2379;&#2335;&#2366;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2342;&#2367;&#2326;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;, &#2358;&#2367;&#2325;&#2366;&#2351;&#2340;&#2379;&#2306; &#2360;&#2375; &#2346;&#2340;&#2366; &#2330;&#2354;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2312; &#2346;&#2368;&#2337;&#2364;&#2367;&#2340;&#2379;&#2306; &#2325;&#2379; OTP &#2324;&#2352; &#2352;&#2367;&#2350;&#2379;&#2335;-&#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367;&#2351;&#2366;&#2305; &#2360;&#2366;&#2333;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2343;&#2379;&#2326;&#2366; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>&#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; &#2325;&#2366; &#2346;&#2366;&#2336;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; I: &#2358;&#2366;&#2326;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2354;&#2325;&#2381;&#2359;&#2367;&#2340; &#2332;&#2366;&#2327;&#2352;&#2370;&#2325;&#2340;&#2366; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; &#2330;&#2354;&#2366;&#2319;&#2306;, &#2357;&#2352;&#2367;&#2359;&#2381;&#2336; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2376;&#2325;&#2354;&#2381;&#2346;&#2367;&#2325; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2360;&#2368;&#2350;&#2366;&#2319;&#2305; &#2360;&#2325;&#2381;&#2359;&#2350; &#2325;&#2352;&#2375;&#2306;, &#2324;&#2352; &#2360;&#2306;&#2342;&#2367;&#2327;&#2381;&#2343; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367; &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335;&#2367;&#2306;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2360;&#2350;&#2352;&#2381;&#2346;&#2367;&#2340; &#2361;&#2375;&#2354;&#2381;&#2346;&#2354;&#2366;&#2311;&#2344; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>&#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; &#2325;&#2366; &#2346;&#2366;&#2336;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; II: 60 &#2357;&#2352;&#2381;&#2359; &#2360;&#2375; &#2314;&#2346;&#2352; &#2325;&#2375; &#2327;&#2381;&#2352;&#2366;&#2361;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2349;&#2368; &#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2379; &#2309;&#2325;&#2381;&#2359;&#2350; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2325;&#2375;&#2357;&#2354; &#2358;&#2366;&#2326;&#2366; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2306; &#2340;&#2366;&#2325;&#2367; \"&#2332;&#2379;&#2326;&#2367;&#2350; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340;\" &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Either course of action I or II follows</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2366; &#2340;&#2379; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; I &#2351;&#2366; II &#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both course of action I and II follow</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; I &#2324;&#2352; II &#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only course of action II follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; II &#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only course of action I follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; I &#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Course of action I directly reduces fraud risk by improving awareness, adding safeguards, and enabling quick reporting without blocking legitimate users.</p><p>Course of action II is an extreme blanket restriction that unfairly penalizes an age group and is impractical as a universal solution; it does not logically follow as the correct response.</p>",
    "question_index": 2
  },
  {

    "question": "<span class=\"eqt\"><p>In a certain number system, % stands for 1 and @ stands for 0. What is the representation of the decimal number 37 in this system?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2350;&#2375;&#2306;, % &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 1 &#2361;&#2376; &#2324;&#2352; @ &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 0 &#2361;&#2376;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2350;&#2375;&#2306; &#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 37 &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">% @ % % @ %</span><span class=\"hqt\" style=\"display:none\">% @ % % @ %</span>"

    "solution": "<p>Convert 37 to binary:</p><p>37  2 = 18 remainder 1</p><p>18  2 = 9 remainder 0</p><p>9  2 = 4 remainder 1</p><p>4  2 = 2 remainder 0</p><p>2  2 = 1 remainder 0</p><p>1  2 = 0 remainder 1</p><p>Write remainders in reverse (from last to first): 1 0 0 1 0 1 &#8594; binary = 100101.</p><p>Now replace 1 &#8594; % and 0 &#8594; @:</p><p>100101 &#8594; % @ @ % @ % &#8594; % @ @ % @ %.</p>",

    "question": "<span class=\"eqt\"><p>Which two signs should be interchanged to make the given equation correct?</p><p>25  X  5  -  140 &div; 35 + 70 = 59</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2360;&#2367;&#2342;&#2381;&#2343; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>25 X 5 - 140 &div; 35 + 70 = 59</p></span>",

      "<span class=\"eqt\">-  and &div;</span><span class=\"hqt\" style=\"display:none\">- &#2324;&#2352; &div;</span>",
      "<span class=\"eqt\">X  and &div;</span><span class=\"hqt\" style=\"display:none\">X &#2324;&#2352; &div;</span>",

    "correct_option_id": 3,
    "solution": "<p>Option (a): Interchange  X  and +</p><p>25 + 5  -  140 &div; 35  X  70 = 59</p><p>25 + 5  -  280 = 59</p><p>30  -  280 = 59</p><p>-250 &#8800; 59</p><p>LHS is not equal to RHS.</p><p>Thus, option (a) is incorrect.</p><p>Option (b): Interchange  -  and &div;</p><p>25  X  5 &div; 140  -  35 + 70 = 59</p><p>0.89  -  35 + 70 = 59</p><p>35.89 &#8800; 59</p><p>LHS is not equal to RHS.</p><p>Thus, option (b) is incorrect.</p><p>Option (c): Interchange  X  and &div;</p><p>25 &div; 5  -  140  X  35 + 70 = 59</p><p>5  -  4900 + 70 = 59</p><p>-4825 &#8800; 59</p><p>LHS is not equal to RHS.</p><p>Thus, option (c) is incorrect.</p><p>Option (d): Interchange + and  - </p><p>25  X  5 + 140 &div; 35  -  70 = 59</p><p>125 + 4  -  70 = 59</p><p>129  -  70 = 59</p><p><b>59 = 59</b></p><p>LHS is equal to RHS.</p><p>Thus, option (d) is correct.</p>",

    "question": "<span class=\"eqt\"><p>'M 1 N' means 'M is the father of N'</p><p>'M 8 N' means 'M is the brother of N'</p><p>'M 7 N' means 'M is the spouse of N'</p><p>'M 9 N' means 'M is the daughter of N'</p><p>As per which of the following expressions 'X is the niece of Q'?</p></span><span class=\"hqt\" style=\"display:none\"><p>'M 1 N' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'M, N &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;'</p><p>'M 8 N' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'M, N &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;'</p><p>'M 7 N' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'M, N &#2325;&#2366;/&#2325;&#2368; &#2332;&#2368;&#2357;&#2344;&#2360;&#2366;&#2341;&#2368; &#2361;&#2376;'</p><p>'M 9 N' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'M, N &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;'</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; 'X, Q &#2325;&#2368; &#2349;&#2340;&#2368;&#2332;&#2368;/&#2349;&#2366;&#2306;&#2332;&#2368; &#2361;&#2376;'?</p></span>",
    "options": [

      "<span class=\"eqt\">D 7 X 1 B 8 W 1 Q</span><span class=\"hqt\" style=\"display:none\">D 7 X 1 B 8 W 1 Q</span>",

    "solution": "<p>Option (a): X 9 C 7 K 8 Q 1 D</p><p>X 9 C means 'X is the daughter of C'</p><p>C 7 K means 'C is the spouse of K'</p><p>K 8 Q means 'K is the brother of Q'</p><p>Q 1 D means 'Q is the father of D'</p><p><img width=287 height=114 id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25851/image025.png\"></p><p><b>X is the niece of Q.</b></p><p>Option (b): D 7 X 1 B 8 W 1 Q</p><p>D 7 X means 'D is the spouse of X'</p><p>X 1 B means 'X is the father of B'</p><p>B 8 W means 'B is the brother of W'</p><p>W 1 Q means 'W is the father of Q'</p><p><img width=234 height=171 id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25851/image026.png\"></p><p>X is the grandfather of Q.</p><p>Option (c): Q 8 E 7 V 1 P 8 X</p><p>Q 8 E means 'Q is the brother of E'</p><p>E 7 V means 'E is the spouse of V'</p><p>V 1 P means 'V is the father of P'</p><p>P 8 X means 'P is the brother of X'</p><p><img width=304 height=97 id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25851/image027.png\"></p><p>X is either a niece or nephew of Q.</p><p>Option (d): X 7 H 9 K 8 Q 7 S</p><p>X 7 H means 'X is the spouse of H'</p><p>H 9 K means 'H is the daughter of K'</p><p>K 8 Q means 'K is the brother of Q'</p><p>Q 7 S means 'Q is the spouse of S'</p><p><img width=316 height=103 id=\"Picture 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25851/image028.png\"></p><p>X is the husband of Q's niece.</p><p>Thus, the answer is option (a).</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the book 'Knife: Meditations After an Attempted Murder':</p><p>1. It is an autobiographical memoir written by the Nobel laureate Amartya Sen.</p><p>2. The book recounts the author's survival and recovery following a stabbing attack in 2022.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2369;&#2360;&#2381;&#2340;&#2325; '&#2330;&#2366;&#2325;&#2370;: &#2361;&#2340;&#2381;&#2351;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2325;&#2375; &#2348;&#2366;&#2342; &#2330;&#2367;&#2306;&#2340;&#2344;' &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2351;&#2361; &#2344;&#2379;&#2348;&#2375;&#2354; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2357;&#2367;&#2332;&#2375;&#2340;&#2366; &#2309;&#2350;&#2352;&#2381;&#2340;&#2381;&#2351; &#2360;&#2375;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2326;&#2367;&#2340; &#2319;&#2325; &#2310;&#2340;&#2381;&#2350;&#2325;&#2341;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2306;&#2360;&#2381;&#2350;&#2352;&#2339; &#2361;&#2376;&#2404;</p><p>2. &#2351;&#2361; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 2022 &#2350;&#2375;&#2306; &#2361;&#2369;&#2319; &#2330;&#2366;&#2325;&#2370; &#2361;&#2350;&#2354;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2354;&#2375;&#2326;&#2325; &#2325;&#2375; &#2332;&#2368;&#2357;&#2367;&#2340; &#2352;&#2361;&#2344;&#2375; &#2324;&#2352; &#2336;&#2368;&#2325; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2325;&#2361;&#2366;&#2344;&#2368; &#2348;&#2351;&#2366;&#2306; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319;     "question": "<span class=\"eqt\"><p>With reference to the Gandhi-Nehru-Das Pact and the Indian National Congress, consider the following statements:</p><p>I. The Gandhi-Nehru-Das Pact helped bring the Swarajists closer to the Indian National Congress.</p><p>II. The pact of unity was ratified at the 39th session of the Indian National Congress held at Belgaum.</p><p>III. At this session, Gandhiji announced the immediate launch of the Civil Disobedience Movement.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2366;&#2306;&#2343;&#2368;-&#2344;&#2375;&#2361;&#2352;&#2370;&#2342;&#2366;&#2360; &#2360;&#2350;&#2333;&#2380;&#2340;&#2375; &#2324;&#2352; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><p>I. &#2327;&#2366;&#2306;&#2343;&#2368;-&#2344;&#2375;&#2361;&#2352;&#2370;&#2342;&#2366;&#2360; &#2360;&#2350;&#2333;&#2380;&#2340;&#2375; &#2344;&#2375; &#2360;&#2381;&#2357;&#2352;&#2366;&#2332;&#2357;&#2366;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2375; &#2325;&#2352;&#2368;&#2348; &#2354;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2368;&#2404;</p><p>II. &#2311;&#2360; &#2319;&#2325;&#2340;&#2366; &#2360;&#2350;&#2333;&#2380;&#2340;&#2375; &#2325;&#2368; &#2346;&#2369;&#2359;&#2381;&#2335;&#2367; &#2348;&#2375;&#2354;&#2327;&#2366;&#2350; &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2375; 39&#2357;&#2375;&#2306; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344; &#2350;&#2375;&#2306; &#2361;&#2369;&#2312; &#2341;&#2368;&#2404;</p><p>III. &#2311;&#2360; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344; &#2350;&#2375;&#2306; &#2327;&#2366;&#2306;&#2343;&#2368;&#2332;&#2368; &#2344;&#2375; &#2360;&#2357;&#2367;&#2344;&#2351; &#2309;&#2357;&#2332;&#2381;&#2334;&#2366; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2379; &#2340;&#2369;&#2352;&#2306;&#2340; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2368; &#2341;&#2368;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2324;&#2352; &#2340;&#2371;&#2340;&#2368;&#2351;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement 1 is Correct.</p><p>In 1924, there was a significant internal rift in the Congress between the \"No-Changers\" (who followed Gandhi's path of constructive work and boycotted legislatures) and the \"Pro-Changers\" or Swarajists (led by C.R. Das and Motilal Nehru, who wanted to enter councils to wreck the government from within). The Gandhi-Das Pact (also involving Nehru) was a compromise. Gandhi agreed to allow the Swarajists to work in the councils as an integral part of the Congress, while the Swarajists agreed to support Gandhi's constructive program (like Khadi promotion).</p><p></p><p>Statement 2 is Correct.</p><p>The Belgaum Session of 1924 is historically unique because it was the only Congress session ever presided over by Mahatma Gandhi. At this session, the Gandhi-Das Pact was formally ratified, reunifying the two wings of the Congress and preventing a split similar to the 1907 Surat Split.</p><p></p><p>Statement 3 is incorrect.</p><p>The Belgaum session (1924) was actually a period of decline in active mass struggle. After the withdrawal of the Non-Cooperation Movement in 1922, Gandhi focused on \"Constructive Work\" (spinning, untouchability removal, Hindu-Muslim unity). The Civil Disobedience Movement (Salt Satyagraha) was not launched until 1930, following the Lahore Session of 1929 where \"Purna Swaraj\" was declared.</p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Vice-President of India:</p><p>i. The Vice-President is the ex-officio Chairman of the Rajya Sabha.</p><p>ii. The Vice-President can vote in the Rajya Sabha only in the case of a tie.</p><p>iii. The Vice-President is removed through an impeachment process similar to that of the President.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2325;&#2375; &#2346;&#2342;&#2375;&#2344; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>ii. &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2348;&#2352;&#2366;&#2348;&#2352;&#2368; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2361;&#2368; &#2350;&#2340;&#2342;&#2366;&#2344; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>iii. &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2350;&#2361;&#2366;&#2349;&#2367;&#2351;&#2379;&#2327; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2342; &#2360;&#2375; &#2361;&#2335;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i and ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">i only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">ii and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is Correct. Under Article 64 and Article 89 of the Constitution, the Vice-President of India holds the office of Chairman of the Rajya Sabha by virtue of their position (ex-officio). In this capacity, their powers and functions are similar to those of the Speaker of the Lok Sabha.</p><p></p><p>Statement 2 is Correct. Since the Vice-President is not a member of the Rajya Sabha, they do not have a right to vote in the first instance. However, under Article 100, they can exercise a \"Casting Vote\" in the case of an equality of votes (a tie) to resolve the deadlock.</p><p></p><p>Statement 3 is Incorrect. The process for removing the Vice-President is significantly simpler than the formal \"impeachment\" required for the President (Article 61). According to Article 67(b):</p><p>-The removal resolution can only be initiated in the Rajya Sabha.</p><p>-It must be passed by the Rajya Sabha by an Effective Majority (a majority of all the then members of the House).</p><p>-It must be agreed to by the Lok Sabha by a Simple Majority.</p><p>- No formal impeachment (charges of \"violation of the constitution\") is required; a 14-day advance notice is the only procedural mandate.</p>",
    "question_index": 27
  },

    "question": "<span class=\"eqt\"><p>In November 2025, who among the following clinched the men's 10-meter air pistol gold at the ISSF World Championship in Cairo, becoming the first Indian to win an individual air pistol world title?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2357;&#2306;&#2348;&#2352; 2025 &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2366;&#2361;&#2367;&#2352;&#2366; &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2310;&#2312;&#2319;&#2360;&#2319;&#2360;&#2319;&#2347; &#2357;&#2367;&#2358;&#2381;&#2357; &#2330;&#2376;&#2306;&#2346;&#2367;&#2351;&#2344;&#2358;&#2367;&#2346; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; 10 &#2350;&#2368;&#2335;&#2352; &#2319;&#2351;&#2352; &#2346;&#2367;&#2360;&#2381;&#2335;&#2354; &#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2346;&#2342;&#2325; &#2332;&#2368;&#2340;&#2366; &#2324;&#2352; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2319;&#2351;&#2352; &#2346;&#2367;&#2360;&#2381;&#2335;&#2354; &#2357;&#2367;&#2358;&#2381;&#2357; &#2326;&#2367;&#2340;&#2366;&#2348; &#2332;&#2368;&#2340;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2361;&#2354;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2344;&#2375;?</span>",
    "options": [
      "<span class=\"eqt\">Saurabh Chaudhary</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2380;&#2352;&#2349; &#2330;&#2380;&#2343;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Abhishek Verma</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2349;&#2367;&#2359;&#2375;&#2325; &#2357;&#2352;&#2381;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Varun Tomar</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2369;&#2339; &#2340;&#2379;&#2350;&#2352;</span>",
      "<span class=\"eqt\">Samrat Rana</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2381;&#2352;&#2366;&#2335; &#2352;&#2366;&#2339;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In shooting, Samrat Rana clinched the men's 10-meter air pistol gold at the ISSF World Championship in Cairo, becoming the first Indian to win an individual air pistol world title.</p><p>Rana won the men's 10 meter air pistol gold with a score of 243.7, edging out China's Hu Kai by just 0.4 points. His compatriot Varun Tomar claimed bronze, completing a double podium for India.</p>",
    "question_index": 28
  },

    "question": "<span class=\"eqt\"><p>Election-related provisions under the Constitution of India are mainly contained in which of the following Parts?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2330;&#2369;&#2344;&#2366;&#2357; &#2360;&#2306;&#2348;&#2306;&#2343;&#2368; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2350;&#2369;&#2326;&#2381;&#2351;&#2340;&#2307; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2349;&#2366;&#2327; &#2350;&#2375;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2306;?</span>",
    "options": [
      "<span class=\"eqt\">Part XIII</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; XIII</span>",
      "<span class=\"eqt\">Part XIV</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; XIV</span>",
      "<span class=\"eqt\">Part XV</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; XV</span>",
      "<span class=\"eqt\">Part XVII</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; &#2360;&#2340;&#2381;&#2352;&#2361;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Part XV of the Constitution is exclusively devoted to Elections.</p><p>It provides the constitutional basis for:</p><p>-The powers and independence of the Election Commission of India</p><p>-Preparation of electoral rolls</p><p>-Adult suffrage</p><p>-Conduct and regulation of elections</p><p>-Limited judicial interference in electoral matters</p><p></p><p>Part XIII</p><p>Deals with Trade, Commerce and Intercourse across India.</p><p></p><p>Part XIV</p><p>Concerns Services under the Union and the States.</p><p>Focuses on recruitment and service conditions</p><p></p><p>Part XVII</p><p>Deals with Official Language of the Union and States.</p><p></p><p>Further Insights</p><p> Article 324 vests the control of elections in an independent Election Commission.</p><p> The Election Commission conducts elections to Parliament, State Legislatures, and the offices of President and Vice-President.</p><p> Article 325 ensures one general electoral roll without discrimination.</p><p> Article 326 establishes elections based on adult suffrage (18+).</p><p> The voting age was reduced from 21 to 18 by the 61st Constitutional Amendment Act, 1988.</p><p> Parliament's power to enact election laws flows from Article 327.</p><p> States can regulate elections only until Parliament legislates, as per Article 328.</p><p> Article 329(b) bars courts from interfering in elections except through election petitions.</p><p> The Representation of the People Acts, 1950 and 1951 give statutory shape to constitutional election provisions.</p><p></p><p></p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>Which statement about Firoz Shah Tughlaq (r. 1351 - 1388) is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2367;&#2352;&#2379;&#2332; &#2358;&#2366;&#2361; &#2340;&#2369;&#2327;&#2354;&#2325; (&#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; 1351 - 1388) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">He abolished jizya on all peasantry to encourage cultivation.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2325;&#2371;&#2359;&#2367; &#2325;&#2379; &#2346;&#2381;&#2352;&#2379;&#2340;&#2381;&#2360;&#2366;&#2361;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2349;&#2368; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2346;&#2352; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2332;&#2332;&#2367;&#2351;&#2366; &#2325;&#2352; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">He shifted the capital from Delhi to Daulatabad.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2325;&#2379; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2375; &#2342;&#2380;&#2354;&#2340;&#2366;&#2348;&#2366;&#2342; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">He levied jizya on Brahmanas explicitly for the first time under the Delhi Sultanate.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2325;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2368; &#2348;&#2366;&#2352; &#2348;&#2381;&#2352;&#2366;&#2361;&#2381;&#2350;&#2339;&#2379;&#2306; &#2346;&#2352; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2332;&#2332;&#2381;&#2351;&#2366; &#2325;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">He created the Diwan-i-Riyasat to enforce price controls.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2368;&#2357;&#2366;&#2344;-&#2319;-&#2352;&#2367;&#2351;&#2366;&#2360;&#2340; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Under earlier Sultans, Brahmanas were generally exempt from Jizya (a poll tax on non-Muslims) as they were considered \"men of learning\" and non-combatants. However, Firoz Shah Tughlaq was a deeply orthodox ruler who sought to bring the states administration strictly in line with Sharia (Islamic law). He argued that since the Sharia did not explicitly exempt Brahmanas, they must pay the tax. This was the first time in the history of the Delhi Sultanate that Brahmanas were forced to pay Jizya.</p><p></p><p>- \"He abolished jizya on all peasantry\": Incorrect; Firoz Shah upheld jizya collection.</p><p>- \"Shifted capital to Daulatabad\": Action of Muhammad bin Tughlaq, not Firoz.</p><p>- \"Created Diwan-i-Riyasat\": The market-control department is associated with Alauddin Khalji, not Firoz.</p><p>Further Insights:</p><p>- Firoz Shah established the Diwan-i-Bandagan for managing slaves and Diwan-i-Khairat for charity.</p><p>- He repaired older monuments (e.g., Ashokan pillars were transported and re-erected in Delhi).</p>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>A body moving in a circular path with constant speed has:</p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2367;&#2352; &#2327;&#2340;&#2367; &#2360;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2346;&#2341; &#2346;&#2352; &#2327;&#2340;&#2367;&#2350;&#2366;&#2344; &#2346;&#2367;&#2306;&#2337; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2319;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Acceleration directed towards the centre</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2325;&#2368; &#2323;&#2352; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2367;&#2340; &#2340;&#2381;&#2357;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Zero acceleration</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2370;&#2344;&#2381;&#2351; &#2340;&#2381;&#2357;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Constant velocity</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352; &#2357;&#2375;&#2327;</span>",
      "<span class=\"eqt\">Acceleration along the tangent</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2342;&#2367;&#2358; &#2340;&#2381;&#2357;&#2352;&#2339;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Even when a body moves in a circle at a constant speed, its velocity is constantly changing. This is because velocity is a vector quantity that includes both speed and direction. As the object moves along the circular path, its direction of motion changes at every single point.</p><p>Since acceleration is defined as the rate of change of velocity, a change in direction-even without a change in speed-results in acceleration. This specific type of acceleration is called Centripetal Acceleration.</p><p>The word \"centripetal\" literally means \"center-seeking.\" The acceleration vector always points perpendicular to the velocity vector.</p><p>-It is always directed toward the center of the circle.</p><p>-Without this inward acceleration, the object would fly off in a straight line (along the tangent) due to inertia.</p><p></p>",
    "question_index": 31
  },

    "question": "<span class=\"eqt\"><p>Consider the following regarding soils and crops:</p><p>1) The black soil belt of Maharashtra is noted for cotton.</p><p>2) Red loamy soils of Tamil Nadu commonly support millets and groundnut.</p><p>3) Laterite soils of the Western Ghats are naturally very fertile for paddy without any manure or irrigation.</p><p>Which statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2324;&#2352; &#2347;&#2360;&#2354;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2325;&#2368; &#2325;&#2366;&#2354;&#2368; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2346;&#2335;&#2381;&#2335;&#2368; &#2325;&#2346;&#2366;&#2360; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2376;&#2404;</p><p>2) &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2325;&#2368; &#2354;&#2366;&#2354; &#2342;&#2379;&#2350;&#2335; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2350;&#2375;&#2306; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2348;&#2366;&#2332;&#2352;&#2366; &#2324;&#2352; &#2350;&#2370;&#2306;&#2327;&#2347;&#2354;&#2368; &#2313;&#2327;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>3) &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335; &#2325;&#2368; &#2354;&#2375;&#2335;&#2352;&#2366;&#2311;&#2335; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2348;&#2367;&#2344;&#2366; &#2326;&#2366;&#2342; &#2351;&#2366; &#2360;&#2367;&#2306;&#2330;&#2366;&#2312; &#2325;&#2375; &#2343;&#2366;&#2344; &#2325;&#2368; &#2326;&#2375;&#2340;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2381;&#2357;&#2366;&#2349;&#2366;&#2357;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2348;&#2361;&#2369;&#2340; &#2313;&#2346;&#2332;&#2366;&#2314; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct. Black cotton soils favor cotton; red loams in TN support millets/groundnut under appropriate management.</p><p>Statement 3 is incorrect. Laterites are generally poor in fertility and require manuring/irrigation; paddy is grown where waterlogging and management permit.</p><p>Further Insights:</p><p>- Laterite soils are leached under high rainfall; tea, coffee, cashew are notable in lateritic tracts with inputs.</p><p>- Alluvial soils in deltas favor paddy and jute (in the Ganga - Brahmaputra delta).</p><p>- Soil management (lime, FYM, fertilizers) is crucial for red and lateritic soils to reach good yields.</p>",
    "question_index": 32
  },

    "question": "<span class=\"eqt\"><p>Consider the statements below marked as Assertion(A) and Reason(R) and choose the correct option.</p><p>A: In every ecosystem, the energy pyramid is upright; energy available to higher trophic levels declines. Even where biomass pyramids invert (e.g., some oceans), energy still drops up the chain.</p><p>R: This occurs because transfer is constrained by the second law and respiration losses; ecological efficiency is low (often near 10%), so much energy dissipates as heat between levels.</p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A) &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; (R) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>A: &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306;, &#2314;&#2352;&#2381;&#2332;&#2366; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2360;&#2368;&#2343;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;; &#2313;&#2330;&#2381;&#2330; &#2346;&#2379;&#2359;&#2339; &#2360;&#2381;&#2340;&#2352;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2314;&#2352;&#2381;&#2332;&#2366; &#2328;&#2335;&#2340;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2361;&#2366;&#2306; &#2340;&#2325; &#8203;&#8203;&#2325;&#2367; &#2332;&#2361;&#2366;&#2306; &#2332;&#2376;&#2357; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2313;&#2354;&#2335;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; (&#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319;, &#2325;&#2369;&#2331; &#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352;), &#2357;&#2361;&#2366;&#2306; &#2349;&#2368; &#2314;&#2352;&#2381;&#2332;&#2366; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2314;&#2346;&#2352; &#2325;&#2368; &#2323;&#2352; &#2328;&#2335;&#2340;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>R: &#2320;&#2360;&#2366; &#2311;&#2360;&#2354;&#2367;&#2319; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2339; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2344;&#2367;&#2351;&#2350; &#2324;&#2352; &#2358;&#2381;&#2357;&#2360;&#2344; &#2361;&#2366;&#2344;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2366;&#2343;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2342;&#2325;&#2381;&#2359;&#2340;&#2366; &#2325;&#2350; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; (&#2309;&#2325;&#2381;&#2360;&#2352; &#2354;&#2327;&#2349;&#2327; 10%), &#2311;&#2360;&#2354;&#2367;&#2319; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2360;&#2381;&#2340;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2348;&#2361;&#2369;&#2340; &#2360;&#2368; &#2314;&#2352;&#2381;&#2332;&#2366; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2344;&#2359;&#2381;&#2335; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In ecology, while pyramids of numbers or biomass can sometimes be inverted (e.g., in a marine ecosystem where a small biomass of rapidly-reproducing phytoplankton supports a larger biomass of zooplankton), the pyramid of energy is always upright.</p><p>- Energy is measured as a rate (energy per unit area per unit time).</p><p>- At each level, there is a necessary reduction in the total amount of energy available to be passed on to the next consumer.</p><p>Statement R provides the \"why\" behind the shape of the energy pyramid.</p><p>The Second Law of Thermodynamics: States that whenever energy is transformed, some of it is dissipated as degraded heat.</p><p>Respiration & Metabolism: Most of the energy an organism consumes is used for its own life processes (respiration, movement, growth) and is \"lost\" to the environment as heat.</p><p>Ecological Efficiency (10% Rule): On average, only about 10% of the energy at one trophic level is actually converted into biomass that can be consumed by the next level.</p>",
    "question_index": 33
  },

    "question": "<span class=\"eqt\"><p>With reference to 'Khuallam dance' consider the following statements and select the correct option.</p><p>a) Khuallam literary means 'Dance of the Guests'.</p><p>b) It is a dance usually performed in the ceremony called 'Khuangchawi'.</p><p>c) It is performed during significant cultural events to celebrate fellowship and unity.</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2326;&#2369;&#2309;&#2354;&#2381;&#2354;&#2350; &#2344;&#2371;&#2340;&#2381;&#2351;' &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>a) &#2326;&#2369;&#2354;&#2381;&#2354;&#2350; &#2325;&#2366; &#2358;&#2366;&#2348;&#2381;&#2342;&#2367;&#2325; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; '&#2350;&#2375;&#2361;&#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2366; &#2344;&#2371;&#2340;&#2381;&#2351;'&#2404;</p><p>b) &#2351;&#2361; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; '&#2326;&#2369;&#2310;&#2306;&#2327;&#2330;&#2357;&#2368;' &#2344;&#2366;&#2350;&#2325; &#2360;&#2350;&#2366;&#2352;&#2379;&#2361; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2344;&#2371;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</p><p>c) &#2351;&#2361; &#2349;&#2366;&#2312;&#2330;&#2366;&#2352;&#2375; &#2324;&#2352; &#2319;&#2325;&#2340;&#2366; &#2325;&#2366; &#2332;&#2358;&#2381;&#2344; &#2350;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2366;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350;&#2379;&#2306; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">a, b, c</span><span class=\"hqt\" style=\"display:none\">a, b, c</span>",
      "<span class=\"eqt\">Both b and c</span><span class=\"hqt\" style=\"display:none\">b &#2324;&#2352; c &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Both a and c</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; c &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Both a and b</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; b &#2342;&#2379;&#2344;&#2379;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Khuallam is a traditional dance of the Mizo community. It is performed during significant cultural events to celebrate fellowship and unity.</p><p>Khuallam literary means 'Dance of the Guests'.</p><p>It is a dance usually performed in the ceremony called 'Khuangchawi'.</p><p>In order to claim a distinguished place in the society and to have a place in paradise or Pialral one has to attain the coveted title of 'Thangchhuah'.</p><p>There are two ways of attaining this title. Firstly one could attain the title Thangchhuah by proving one's mettle in war or in hunting by killing many animals which should include animals like barking,deer, wild boar, bear, wild gayal, viper, hawk etc.</p><p>Secondly one could also get the title of Thangchhuah by performing feats and dances. Thangchhuah therefore could be attained only by the brave or by the rich. The ceremonies performed in the second method are known as Khuangchawi.</p><p></p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding India's performance in the Asian Youth Games and identify which are correct:</p><p>1. India achieved its best-ever performance at the 2025 Asian Youth Games in Manama, Bahrain, securing 6th place in the overall standings with 48 medals.</p><p>2. In the 2025 edition, female athletes from India won more than half of the country's total medals and nearly 70% of the gold medals.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2319;&#2358;&#2367;&#2351;&#2366;&#2312; &#2351;&#2370;&#2341; &#2327;&#2375;&#2350;&#2381;&#2360; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2346;&#2361;&#2330;&#2366;&#2344;&#2375;&#2306; &#2325;&#2367; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;:</p><p>1. &#2349;&#2366;&#2352;&#2340; &#2344;&#2375; 2025 &#2325;&#2375; &#2319;&#2358;&#2367;&#2351;&#2366;&#2312; &#2351;&#2370;&#2341; &#2327;&#2375;&#2350;&#2381;&#2360; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2350;&#2366;, &#2348;&#2361;&#2352;&#2368;&#2344; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2366; &#2309;&#2348; &#2340;&#2325; &#2325;&#2366; &#2360;&#2352;&#2381;&#2357;&#2358;&#2381;&#2352;&#2375;&#2359;&#2381;&#2336; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2367;&#2351;&#2366;, &#2325;&#2369;&#2354; &#2346;&#2342;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; 48 &#2346;&#2342;&#2325; &#2325;&#2375; &#2360;&#2366;&#2341; &#2325;&#2369;&#2354; &#2352;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2350;&#2375;&#2306; 6&#2357;&#2366;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>2. 2025 &#2360;&#2306;&#2360;&#2381;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2344;&#2375; &#2342;&#2375;&#2358; &#2325;&#2375; &#2325;&#2369;&#2354; &#2346;&#2342;&#2325;&#2379;&#2306; &#2325;&#2366; &#2310;&#2343;&#2375; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2324;&#2352; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2346;&#2342;&#2325;&#2379;&#2306; &#2325;&#2366; &#2354;&#2327;&#2349;&#2327; 70% &#2332;&#2368;&#2340; &#2354;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only 1 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only 2 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both 1 and 2 are correct</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; 1 &#2324;&#2352; 2 &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2 are correct</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2360;&#2361;&#2368; &#2361;&#2376; &#2324;&#2352; &#2344; &#2361;&#2368; 2 &#2360;&#2361;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>India's performance in 2025 Asian Youth Games at Manama, Bahrain was a historic milestone. The country won 48 medals (13 Gold, 18 Silver, and 17 Bronze), which placed it 6th overall. This was a significant jump from 11th place in 2009 and 10th place in 2013.</p><p>The 2025 Games highlighted a major trend in gender parity. Female athletes accounted for 26 out of the 48 medals (approx. 54.17%) and 9 out of the 13 gold medals (approx. 69.23%). This was the first time women outnumbered men in the Indian contingent for a major multi-sport event (122 women to 107 men).</p>",

    "question": "<span class=\"eqt\"><p>Which ISRO launch vehicle employs the indigenously developed C25 cryogenic upper stage and is now designated LVM3?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2312;&#2319;&#2360;&#2310;&#2352;&#2323; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2352;&#2325;&#2381;&#2359;&#2375;&#2346;&#2339; &#2351;&#2366;&#2344; &#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2360;&#2368;25 &#2325;&#2381;&#2352;&#2366;&#2351;&#2379;&#2332;&#2375;&#2344;&#2367;&#2325; &#2314;&#2346;&#2352;&#2368; &#2330;&#2352;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2348; &#2311;&#2360;&#2375; &#2319;&#2354;&#2357;&#2368;&#2319;&#2350;3 &#2344;&#2366;&#2350; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">PSLV</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2319;&#2360;&#2319;&#2354;&#2357;&#2368;</span>",
      "<span class=\"eqt\">GSLV Mk II</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2319;&#2360;&#2319;&#2354;&#2357;&#2368; &#2319;&#2350;&#2325;&#2375; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">SSLV</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360;&#2319;&#2360;&#2319;&#2354;&#2357;&#2368;</span>",
      "<span class=\"eqt\">GSLV Mk III</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2319;&#2360;&#2319;&#2354;&#2357;&#2368; &#2319;&#2350;&#2325;&#2375; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>LVM3 (earlier GSLV Mk III) uses the C25 cryogenic upper stage burning LOX-LH2.</p><p>GSLV Mk II uses a different cryogenic upper stage; PSLV and SSLV do not use cryogenic stages.</p><p>Further Insights:</p><p>- LVM3 has launched missions like Chandrayaan 3 and is used for heavier payloads and GTO missions.</p><p>- PSLV is the \"workhorse\" for sun-synchronous/LEO missions and multiple satellite deployments.</p><p>- SSLV is designed for small satellites; it emphasizes quick turnaround.</p><p>- Cryogenic stages improve payload capacity by using high specific impulse propellants.</p><p></p>",
    "question_index": 36
  },

    "question": "<span class=\"eqt\"><p>Under which Article of the Constitution of India does the President have the power to consult the Supreme Court on a question of law or fact that is of significant public importance?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2375; &#2340;&#2361;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357; &#2325;&#2375; &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2343;&#2367; &#2351;&#2366; &#2340;&#2341;&#2381;&#2351; &#2360;&#2306;&#2348;&#2306;&#2343;&#2368; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2346;&#2352; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2360;&#2375; &#2346;&#2352;&#2366;&#2350;&#2352;&#2381;&#2358; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Article 131</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 131</span>",
      "<span class=\"eqt\">Article 137</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 137</span>",
      "<span class=\"eqt\">Article 143</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 143</span>",
      "<span class=\"eqt\">Article 145</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 145</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Article 143 of the Constitution of India grants the President the power to consult the Supreme Court. This power is known as the Advisory Jurisdiction of the Supreme Court.</p><p>The article specifies two categories of matters on which the President can seek the Supreme Court's opinion:</p><p>-On any question of law or fact of public importance that has arisen or is likely to arise. In this case, the Supreme Court may or may not tender its opinion to the President.</p><p>-On any dispute arising out of any pre-constitution treaty, agreement, covenant, sanad, or other similar instruments. In this case, it is obligatory for the Supreme Court to tender its opinion to the President.</p><p>In both cases, the opinion expressed by the Supreme Court is only advisory and not a judicial pronouncement. Hence, it is not binding on the President.</p><p></p><p>Other options:</p><p>Article 131: This deals with the Original Jurisdiction of the Supreme Court, which covers disputes between the Government of India and the states, or between states.</p><p>Article 137: This grants the Supreme Court the power to review its own judgements or orders (Review Jurisdiction).</p><p>Article 145: This deals with the power of the Supreme Court to make its own rules of court for regulating its practice and procedure.</p><p>Further Insights:</p>",
    "question_index": 37
  },
  {
    "question": "<span class=\"eqt\"><p>The Tapti Valley is located between which of the following mountain ranges?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2346;&#2381;&#2340;&#2368; &#2328;&#2366;&#2335;&#2368; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2352;&#2381;&#2357;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Vindhya Range and Satpura Range</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2306;&#2343;&#2381;&#2351; &#2352;&#2375;&#2306;&#2332; &#2324;&#2352; &#2360;&#2340;&#2346;&#2369;&#2337;&#2364;&#2366; &#2352;&#2375;&#2306;&#2332;</span>",
      "<span class=\"eqt\">Satpura Range and Ajanta Range</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2346;&#2369;&#2337;&#2364;&#2366; &#2352;&#2375;&#2306;&#2332; &#2324;&#2352; &#2309;&#2332;&#2306;&#2340;&#2366; &#2352;&#2375;&#2306;&#2332;</span>",
      "<span class=\"eqt\">Aravalli Range and Vindhya Range</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2366;&#2357;&#2354;&#2368; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366; &#2324;&#2352; &#2357;&#2367;&#2306;&#2343;&#2381;&#2351; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Western Ghats and Eastern Ghats</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335; &#2324;&#2352; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2328;&#2366;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Tapti Valley, formed by the Tapti River, lies between the Satpura Range to the north and the Ajanta Range to the south.</p><p>This positioning explains its rift valley nature and westward flow.</p><p></p><p>Vindhya Range and Satpura Range: This describes the Narmada Valley</p><p></p><p>Further Insights</p><p>Tapti Valley is a rift valley in Peninsular India.</p><p>Tapti flows east to west, unlike most peninsular rivers.</p><p>Tapti drains into the Arabian Sea.</p><p>Tapti and Narmada flow parallel to each other.</p><p>Surat is an important city on the Tapti River.</p><p>Tapti is part of India's western drainage system.</p>",
    "question_index": 38
  },

    "question": "<span class=\"eqt\"><p>Given below are two statements marked as Assertion and Reason. Choose the correct option.</p><p>Assertion (A): An increase in repo rate may reduce inflation.</p><p>Reason (R): It increases borrowing cost and reduces money supply.</p><p></p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2325;&#2341;&#2344; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2352;&#2375;&#2346;&#2379; &#2342;&#2352; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2325;&#2366;&#2352;&#2339; (R): &#2311;&#2360;&#2360;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2375;&#2344;&#2375; &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true and R explains A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2324;&#2352; R, A &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true but R does not explain A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is false but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Assertion (A): An increase in repo rate may reduce inflation (True)</p><p>The Repo Rate is the interest rate at which the central bank (like the RBI in India) lends money to commercial banks. It is the primary tool used in Contractonary Monetary Policy to control rising prices (inflation).</p><p>When inflation exceeds the target range, the central bank raises the repo rate to \"cool down\" the economy.</p><p>Higher rates discourage excess spending and investment, which leads to a decrease in the general price level over time.</p><p></p><p>Reason (R): It increases borrowing cost and reduces money supply (True)</p><p>This statement correctly identifies the transmission mechanism (how the change actually works):</p><p>Cost of Funds: When the repo rate increases, it becomes more expensive for commercial banks to borrow from the central bank.</p><p>Passing the Cost: Banks pass this increased cost to their customers by raising interest rates on home, car, and personal loans.</p><p>Reduced Liquidity: As borrowing becomes costlier, people and businesses take fewer loans. This directly reduces the money supply (liquidity) circulating in the market.</p><p>Lower Demand: With less money in hand and higher EMIs, consumer demand for goods and services drops. When demand falls, the pressure on prices eases, thereby reducing inflation.</p>",
    "question_index": 39
  },

    "question": "<span class=\"eqt\"><p>Ketones on reduction give</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2368;&#2335;&#2379;&#2344;&#2381;&#2360; &#2325;&#2375; &#2309;&#2346;&#2330;&#2351;&#2344; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Primary alcohols</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2309;&#2354;&#2381;&#2325;&#2379;&#2361;&#2354;</span>",
      "<span class=\"eqt\">Secondary alcohols</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2309;&#2354;&#2381;&#2325;&#2379;&#2361;&#2354;</span>",
      "<span class=\"eqt\">Tertiary alcohols</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2371;&#2340;&#2368;&#2351;&#2325; &#2309;&#2354;&#2381;&#2325;&#2379;&#2361;&#2354;</span>",
      "<span class=\"eqt\">Ethers</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2341;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The reduction of a carbonyl group (&gt;C=O) involves the addition of hydrogen across the double bond. When a <b>Ketone</b> undergoes reduction, the oxygen atom becomes a hydroxyl group (-OH) and a hydrogen atom attaches to the carbonyl carbon.</p><p>In a ketone, the carbonyl carbon is already bonded to <b>two other carbon atoms</b> (alkyl or aryl groups). After reduction, that same carbon is now bonded to those two carbon atoms plus one hydroxyl group. By definition, a carbon atom bonded to two other carbons and one -OH group forms a <b>secondary (</b><b>2&deg;</b><b>) alcohol</b>.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>Chindu Bhagavatham, a performance similar to Yakshagana, is performed in the state of _____ </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2367;&#2339;&#2381;&#2337;&#2370; &#2349;&#2366;&#2327;&#2357;&#2340;&#2350;, &#2351;&#2325;&#2381;&#2359;&#2327;&#2366;&#2344; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2319;&#2325; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2344;&#2366;&#2335;&#2381;&#2351; &#2325;&#2354;&#2366; &#2361;&#2376;, &#2311;&#2360;&#2325;&#2366; &#2350;&#2306;&#2330;&#2344; _____ &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Telangana</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2375;&#2354;&#2306;&#2327;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Goa</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2357;&#2366;</span>",
      "<span class=\"eqt\">Kerala</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2352;&#2354;</span>",
      "<span class=\"eqt\">Tamil Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Chindu Bhagavatham is performed widely across <b>Telangana</b>. It is similar to Yakshagana.</p><p>It is a unique theatre art form that combines many elements such as dance, music, dialogue, costume, make-up and stage techniques.</p><p>The word 'Chindu' in Telugu means 'jump'. As the presentation is interspersed with leaps and jumps by the performers, it gained the name of Chindu Bhagavatam. Most of the stories are from 'Bhagavatam'.</p>",
    "question_index": 41
  },
