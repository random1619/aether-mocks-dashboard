    "correct_option_id": 1,
    "solution": "<p>The correct answer is B) a-i, b-iv, c-ii, d-iii.</p><p>Pakke Paga Hornbill Festival (Arunachal Pradesh):</p><p>-The festival focuses on wildlife conservation, with a particular emphasis on hornbills. Four species of the birds  -  Wreathed, Great Indian, Oriental Pied and the endangered Rufous-necked  -  are found in the Pakke Tiger Reserve (PTR) of Arunachal Pradesh.</p><p>-The area is also home to the Nyishi, the largest tribal group in Arunachal Pradesh.</p><p>Losar (Ladakh):</p><p>-The Tibetan New Year celebrated in Ladakh.</p><p>-A time for family gatherings, prayers, and traditional rituals.</p><p>-Involves colorful processions, masked dances, and feasts.</p><p>Gangasagar Mela (West Bengal):</p><p>-One of the largest religious gatherings in India, held annually on Makar Sankranti (usually in January).</p><p>-Pilgrims from across the country and beyond converge at the confluence of the Ganges and Sagar rivers.</p><p>-Believed to be a sacred site for purification and spiritual enlightenment.</p><p>Pongal (Tamil Nadu):</p><p>-A harvest festival celebrated over four days in January.</p><p>-Honors the Sun God and the bountiful harvest.</p><p>-Involves cooking pongal (a sweet rice dish), decorating homes with sugarcane, and engaging in traditional games and rituals.</p>",

    "options": [
      "<span class=\"eqt\">Rio Olympic Games in 2016</span><span class=\"hqt\" style=\"display:none\">2016 &#2350;&#2375;&#2306; &#2352;&#2367;&#2351;&#2379; &#2323;&#2354;&#2367;&#2306;&#2346;&#2367;&#2325; &#2326;&#2375;&#2354;</span>",

    "solution": "<p>India's first individual gold medallist at the Olympic Games, Abhinav Bindra has been selected as a torch bearer for the upcoming 2024 Paris Olympic Games to be held in the French capital from July 26 to August 11. Bindra, who won gold in the men's 10m air rifle in the Beijing Olympic Games in 2008, will be part of the Olympic torch relay that will be held from April 16 to July 26.</p>",

    "question": "<span class=\"eqt\"><p>According to FIDE( World Chess Federation), time controls for each player in a game of rapid chess are</p></span><span class=\"hqt\" style=\"display:none\"><p>FIDE (&#2357;&#2367;&#2358;&#2381;&#2357; &#2358;&#2340;&#2352;&#2306;&#2332; &#2350;&#2361;&#2366;&#2360;&#2306;&#2328;) &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2352;&#2376;&#2346;&#2367;&#2337; &#2358;&#2340;&#2352;&#2306;&#2332; &#2325;&#2375; &#2326;&#2375;&#2354; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2351; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; ___ &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">more than 10 minutes but less than 60 minutes</span><span class=\"hqt\" style=\"display:none\">10 &#2350;&#2367;&#2344;&#2335; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2375;&#2325;&#2367;&#2344; 60 &#2350;&#2367;&#2344;&#2335; &#2360;&#2375; &#2325;&#2350;</span>",
      "<span class=\"eqt\">more than 20 minutes but less than 60 minutes</span><span class=\"hqt\" style=\"display:none\">20 &#2350;&#2367;&#2344;&#2335; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2375;&#2325;&#2367;&#2344; 60 &#2350;&#2367;&#2344;&#2335; &#2360;&#2375; &#2325;&#2350;</span>",
      "<span class=\"eqt\">more than 5 minutes but less than 30 minutes</span><span class=\"hqt\" style=\"display:none\">5 &#2350;&#2367;&#2344;&#2335; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2375;&#2325;&#2367;&#2344; 30 &#2350;&#2367;&#2344;&#2335; &#2360;&#2375; &#2325;&#2350;</span>",
      "<span class=\"eqt\">more than 10 minutes but less than 30 minutes</span><span class=\"hqt\" style=\"display:none\">10 &#2350;&#2367;&#2344;&#2335; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2375;&#2325;&#2367;&#2344; 30 &#2350;&#2367;&#2344;&#2335; &#2360;&#2375; &#2325;&#2350;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The World Chess Federation (FIDE) divides time controls for chess into \"classical\" time controls, and the fast chess time controls.</p><p>Fast chess is subdivided, by decreasing time controls, into rapid chess, blitz chess, and bullet chess.</p><p>Time controls for each player in a game of rapid chess are, according to FIDE, more than 10 minutes but less than 60 minutes.</p><p>Time controls for each player in a game of blitz chess are, according to FIDE, 10 minutes or less per player.</p><p>Bullet chess games have less than three minutes per player, based on a 40-move game;some chess servers rate one-minute-per-player games separately.</p><p>Lower time controls are called \"hyperbullet\" and \"ultrabullet\" for 30-second-per-player and 15-second-per-player games, respectively.</p><p></p>",
    "question_index": 44
  },

    "question": "<span class=\"eqt\"><p>Symbolizing the victory of good over evil, Dussehra is celebrated on the 10th day of the month of _________ of the Hindu calendar.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2369;&#2352;&#2366;&#2312; &#2346;&#2352; &#2309;&#2330;&#2381;&#2331;&#2366;&#2312; &#2325;&#2368; &#2332;&#2368;&#2340; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325;, &#2342;&#2358;&#2361;&#2352;&#2366; &#2361;&#2367;&#2306;&#2342;&#2370; &#2325;&#2376;&#2354;&#2375;&#2306;&#2337;&#2352; &#2325;&#2375; _________ &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; 10&#2357;&#2375;&#2306; &#2342;&#2367;&#2344; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">Ashada</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2359;&#2366;&#2338;&#2364;</span>",
      "<span class=\"eqt\">Kartika</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2340;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Ashwina</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2358;&#2381;&#2357;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Symbolizing the victory of good over evil, Dussehra is celebrated on the 10th day of the month of Ashwina (September-October), the seventh month of the Hindu calendar, with the appearance of the full moon, an event called the \"bright fortnight\" (shukla paksha).</p><p>Dussehra, in Hinduism, holiday marking the triumph of Rama, an avatar of Vishnu, over the 10-headed demon king Ravana, who abducted Rama's wife, Sita.</p>",

75; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2379; &#2346;&#2340;&#2381;&#2352; &#2354;&#2367;&#2326;&#2325;&#2352; &#2309;&#2346;&#2344;&#2375; &#2346;&#2342; &#2360;&#2375; &#2311;&#2360;&#2381;&#2340;&#2368;&#2347;&#2366; &#2342;&#2375; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I and III are NOT correct.</p><p></p><p>Statement II is correct.</p><p></p><p>The Constitution has not fixed the tenure of a judge of the Supreme Court. However, it makes the following three provisions in this regard:</p><p></p><p>1. He holds office until he attains the age of 65 years. Any question regarding his age is to be determined by such authority and in such manner as provided by Parliament.</p><p></p><p>2. He can resign his office by writing to the president.</p><p></p><p>3. He can be removed from his office by the President on the recommendation of the Parliament.</p>",
    "question_index": 46
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following groups consists of elements that are non-reactive, monoatomic elements with extremely low boiling points?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2360;&#2350;&#2370;&#2361; &#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2325;&#2350; &#2325;&#2381;&#2357;&#2341;&#2344;&#2366;&#2306;&#2325; &#2357;&#2366;&#2354;&#2375; &#2309;&#2344;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2358;&#2368;&#2354;, &#2319;&#2325;&#2346;&#2352;&#2350;&#2366;&#2339;&#2381;&#2357;&#2367;&#2325; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2360;&#2375; &#2351;&#2369;&#2325;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Group 18</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 18</span>",
      "<span class=\"eqt\">Group 16</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 16</span>",
      "<span class=\"eqt\">Group 15</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 15</span>",
      "<span class=\"eqt\">Group 13</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 13</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The noble gases (<b>Group 18</b>) are located in the far right of the periodic table and were previously referred to as the \"inert gases\" due to the fact that their filled valence shells (octets) make them extremely nonreactive. </p><p>The noble gases were characterized relatively late compared to other element groups. </p><p>They are all monotomic gases under standard conditions.</p><p>Overall, noble gases have weak interatomic forces, and therefore very low boiling and melting points compared with elements of other groups.</p>",
    "question_index": 47
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following books with their authors: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Column II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Gulbadan Begum</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Humayun Nama</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Amir Khusrau</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Khazain-ul-Futuh</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Firdausi</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Shah Namah</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Ibn Battuta</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Rihla</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2354;&#2375;&#2326;&#2325;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2340;&#2306;&#2349; II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2327;&#2369;&#2354;&#2348;&#2342;&#2344; &#2348;&#2375;&#2327;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2361;&#2369;&#2350;&#2366;&#2351;&#2370;&#2305; &#2344;&#2366;&#2350;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2309;&#2350;&#2368;&#2352; &#2326;&#2369;&#2360;&#2352;&#2379;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2326;&#2332;&#2364;&#2366;&#2311;&#2344;-&#2313;&#2354;-&#2347;&#2364;&#2369;&#2340;&#2370;&#2361;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2347;&#2364;&#2367;&#2352;&#2342;&#2380;&#2360;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2358;&#2366;&#2361; &#2344;&#2366;&#2350;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2311;&#2348;&#2381;&#2344; &#2348;&#2340;&#2370;&#2340;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2352;&#2367;&#2361;&#2354;&#2366;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-a, ii-b, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-a, ii-b, iii-c, iv-d</span>",
      "<span class=\"eqt\">i-b, ii-a, iii-d, iv-c</span><span class=\"hqt\" style=\"display:none\">i-b, ii-a, iii-d, iv-c</span>",

      "<span class=\"eqt\">i-d, ii-c, iii-b, iv-a</span><span class=\"hqt\" style=\"display:none\">i-d, ii-c, iii-b, iv-a</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Gulbadan Begum authored Humayun Nama, a biography of Emperor Humayun. </p><p>&bull; Amir Khusrau wrote Khazain-ul-Futuh, describing the military campaigns of Alauddin Khalji. </p><p>&bull; Firdausi is the author of Shah Namah, an epic Persian poem. </p><p>&bull; Ibn Battuta wrote Rihla, detailing his travels across the Islamic world. </p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Books </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Authors </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Fatuhat-i-Firoz </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Firoz Shah Tughlaq </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Khamsab </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Amir Khusrau </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Khazain-ul-Futuh </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Amir Khusrau </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Kitab-fi-Tahqiq </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Alberuni </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Nuh-Siphir </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Amir Khusrau </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Kitab-ul-Raha </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Ibn Battuta </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Shah Namah </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Firdausi </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Tabaqat-i-Nasiri </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Minhaj-us-Siraj </b></td></tr></table>",

    "question": "<span class=\"eqt\"><p>Which of the following statement is INCORRECT about Raja Rammohan Roy? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2352;&#2366;&#2332;&#2366; &#2352;&#2366;&#2350;&#2350;&#2379;&#2361;&#2344; &#2352;&#2366;&#2351; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; <b>&#2327;&#2354;&#2340;</b> &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">He is regarded as father of Indian Renaissance.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2369;&#2344;&#2352;&#2381;&#2332;&#2366;&#2327;&#2352;&#2339; &#2325;&#2366; &#2332;&#2344;&#2325; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">He advocated monotheism.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2319;&#2325;&#2375;&#2358;&#2381;&#2357;&#2352;&#2357;&#2366;&#2342; &#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">He was the founder of Arya Samaj.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2310;&#2352;&#2381;&#2351; &#2360;&#2350;&#2366;&#2332; &#2325;&#2375; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325; &#2341;&#2375;&#2404;</span>",
      "<span class=\"eqt\">He was the pioneer of anti-sati struggle.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2360;&#2340;&#2368; &#2357;&#2367;&#2352;&#2379;&#2343;&#2368; &#2360;&#2306;&#2328;&#2352;&#2381;&#2359; &#2325;&#2375; &#2346;&#2381;&#2352;&#2339;&#2375;&#2340;&#2366; &#2341;&#2375;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#61623; Raja rammohan Roy believed in modern scientific approach and principles of human dignity and social equality. Hence, he is regarded as father of Indian Renaissance. </p><p>&#61623; He denounced polytheism and had put faith in monotheism. </p><p>&#61623; He founded Brahmo Sabha later renamed as Brahmo Samaj. </p><p>&#61623; His efforts in anti-sati struggle resulted in abolition of practice of sati. </p><p>&#61623; Dayanand Saraswati was the founder of Arya Samaj.</p>",
    "question_index": 49
  },

    "question": "<span class=\"eqt\"><p>If cot &#968; = 5/12 and &#968; is acute, what is the value of 4 sec &#968; &#8722; 3 cot &#968;?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; cot &#968; = 5/12 &#2324;&#2352; &#968; &#2344;&#2381;&#2351;&#2370;&#2344; &#2325;&#2379;&#2339; &#2361;&#2376;, &#2340;&#2379; 4 sec &#968; &#8722; 3 cot &#968; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">23/5</span><span class=\"hqt\" style=\"display:none\">23/5</span>",
      "<span class=\"eqt\">183/20</span><span class=\"hqt\" style=\"display:none\">183/20</span>",
      "<span class=\"eqt\">169/25</span><span class=\"hqt\" style=\"display:none\">169/25</span>",
      "<span class=\"eqt\">41/20</span><span class=\"hqt\" style=\"display:none\">41/20</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>cot &#968; = 5/12</p><p>tan &#968; = 12/5</p><p>sec &#968; = &radic; (1 + tan<sup>2</sup> &#968;)</p><p>sec &#968; = &radic; (1 + 144/25)</p><p>sec &#968; = 13/5</p><p>Now,</p><p>4sec &#968; - 3 cot &#968;</p><p>= 4 x 13/5 - 3 x 5/12</p><p>= 52/5 - 5/4</p><p>= 183/20</p>",
    "question_index": 50
  },
  {
    "question": "<span class=\"eqt\"><p>If p = (&radic;6  -  &radic;5) and q = (&radic;10 + &radic;3), then what is the value of (p<sup>2</sup> + q<sup>2</sup>)/4?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; p = (&radic;6 - &radic;5) &#2361;&#2376; &#2340;&#2341;&#2366; q = (&radic;10 + &radic;3) &#2361;&#2376;, &#2340;&#2379; (p<sup>2</sup> + q<sup>2</sup>)/4 &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>p = (&radic;6  -  &radic;5)</p><p>p<sup>2</sup> = (&radic;6  -  &radic;5)<sup>2</sup></p><p>p<sup>2</sup> = 6 + 5  -  2&radic;30</p><p>p<sup>2</sup> = (11  -  2&radic;30)</p><p>q = (&radic;10 + &radic;3)</p><p>q<sup>2</sup> = (&radic;10 + &radic;3)<sup>2</sup></p><p>q<sup>2</sup> = 10 + 3 + 2&radic;30</p><p>q<sup>2</sup> = (13 + 2&radic;30)</p><p>= (p<sup>2</sup> + q<sup>2</sup>)/4</p><p>= (11  -  2&radic;30 + 13 + 2&radic;30)/4</p><p>= 24/4</p><p>= 6</p>",
    "question_index": 51
  },
  {
    "question": "<span class=\"eqt\"><p>If the distance between two points A(7, 3) and B(15, 2X) is 17 unit, then find the value of X, where X is a positive integer.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2342;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; A(7, 3) &#2324;&#2352; B(15, 2X) &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 17 &#2311;&#2325;&#2366;&#2312; &#2361;&#2376;, &#2340;&#2379; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;, &#2332;&#2361;&#2366;&#2305; X &#2319;&#2325; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>s = &radic;[(15  -  7)<sup>2</sup> + (2X  -  3)<sup>2</sup>]</p><p>17<sup>2</sup> = 64 + (2X  -  3)<sup>2</sup></p><p>289 = 64 + (2X  -  3)<sup>2</sup></p><p>225 = (2X  -  3)<sup>2</sup></p><p>2X  -  3 = 15</p><p>2X = 18</p><p>X = 9</p>",
    "question_index": 52
  },
  {
    "question": "<span class=\"eqt\"><p>9/25<sup>th</sup> part of the work done by Garva and Sarva together in 18 days, while Alok alone can complete the whole work in 300 days. If Sarva is 33<sup>1</sup>&frasl;<sub>3</sub>% more efficient than Alok, then Garva alone can complete 7/10<sup>th</sup> part of the work in how many days?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2327;&#2352;&#2381;&#2357; &#2324;&#2352; &#2360;&#2352;&#2381;&#2357; &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2366; 9/25&#2357;&#2366;&#2305; &#2349;&#2366;&#2327; 18 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2348;&#2325;&#2367; &#2309;&#2325;&#2375;&#2354;&#2375; &#2310;&#2354;&#2379;&#2325; &#2346;&#2370;&#2352;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 300 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2352;&#2381;&#2357;, &#2310;&#2354;&#2379;&#2325; &#2360;&#2375; 33(1/3)% &#2309;&#2343;&#2367;&#2325; &#2325;&#2369;&#2358;&#2354; &#2361;&#2376;, &#2340;&#2379; &#2309;&#2325;&#2375;&#2354;&#2375; &#2327;&#2352;&#2381;&#2357; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2375; 7/10&#2357;&#2375;&#2306; &#2349;&#2366;&#2327; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">45 days</span><span class=\"hqt\" style=\"display:none\">45 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">40 days</span><span class=\"hqt\" style=\"display:none\">40 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">30 days</span><span class=\"hqt\" style=\"display:none\">30 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">54 days</span><span class=\"hqt\" style=\"display:none\">54 &#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Garva and Sarva together can complete the whole work in = 25/9 * 18 = 50 days</p><p>Sarva alone can complete the whole work in = 300 * 3/4 = 225 days</p><p>Hence, Garva alone can complete the whole work in = 7/10 * 1/(1/50  -  1/225) = 45 days</p>",
    "question_index": 53
  },
  {

;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>If a person invested Rs. 20000 in a compound interest at a 12% rate of interest compounded annually for 2 years, then find the compound interest received by the person.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; 12% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; 2 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2350;&#2375;&#2306; Rs. 20000 &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2319;, &#2340;&#2379; &#2313;&#2360; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>In a regular polygon, the ratio of each exterior angle to each interior angle is 2: 13. How many sides does the polygon have?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2348;&#2366;&#2361;&#2352;&#2368; &#2325;&#2379;&#2339; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2325;&#2379;&#2339; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2: 13 &#2361;&#2376;&#2404; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2349;&#2369;&#2332;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let I = each interior angle (in degrees)</p><p>Let E = each exterior angle (in degrees)</p><p>Given, E: I = 2: 13</p><p>So, I = 13k and E = 2k for some k</p><p>I + E = 180</p><p>13k + 2k = 180</p><p>15k = 180</p><p>k = 12</p><p>E = 2k = 24</p><p>E = 360/n</p><p>360/n = 24</p><p>n = 15</p>",
    "question_index": 58

    "question": "<span class=\"eqt\"><p>In &#8710;UST, A and B are points on sides ST and SU, respectively, such that &#8736;UTS is equal to &#8736;ABS, and length of SA = 6/5 times of length of AT. If length of SU = 44 cm, and length of SB = 18 cm, then find the length of ST.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#8710;UST &#2350;&#2375;&#2306;, &#2348;&#2367;&#2306;&#2342;&#2369; A &#2324;&#2352; B &#2325;&#2381;&#2352;&#2350;&#2358;: &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; ST &#2324;&#2352; SU &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2348;&#2367;&#2306;&#2342;&#2369; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306; &#2325;&#2367; &#8736;UTS, &#8736;ABS &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376; &#2324;&#2352; SA &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; = AT &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2368; 6/5 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; SU &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; = 44 cm &#2324;&#2352; SB &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; = 18 cm &#2361;&#2376;, &#2340;&#2379; ST &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "correct_option_id": 2,
    "solution": "<p><img width=159 height=223 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18681/image007.jpg\"></p><p>Given, &#8736;UTS: &#8736;ABS = 1: 1, SA: AT = 6: 5, US = 44 cm, and SB = 18 cm.</p><p>Let SA = 6x cm and AT = 5x cm, So, ST = 11x</p><p>In &#8710;UTS, and &#8710;ABS</p><p>&#8736;UST = &#8736;BSA (common angle)</p><p>&#8736;UTS = &#8736;ABS (Given)</p><p>So, &#8710;UTS, and &#8710;ABS are similar triangles (By A-A Similarity)</p><p>Thus, ST/SB = US/SA</p><p>=&gt; 11x/18 = 44/6x</p><p>=&gt; x<sup>2</sup> = 44/6 * 18/11 = 12</p><p>=&gt; x = 2&radic;3</p><p>Hence, ST = 11x = 11 * 2&radic;3 = 22&radic;3 cm</p>",

    "question": "<span class=\"eqt\"><p>If 5 is added to each of (2p  -  4), (2p  -  2), (2p + 2) and (2p + 8), then the numbers obtained in this order, are in proportion. What is the value of (3p + 7)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 5 &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; (2p - 4), (2p - 2), (2p + 2) &#2324;&#2352; (2p + 8) &#2325;&#2375; &#2360;&#2366;&#2341; &#2332;&#2379;&#2396;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; (3p + 7) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>"

    "correct_option_id": 2,
    "solution": "<p>According to the question,</p><p>(2p  -  4 + 5) : (2p  -  2 + 5) :: (2p + 2 + 5) : (2p + 8 + 5)</p><p>=> (2p + 1)(2p + 13) = (2p + 7)(2p + 3)</p><p>=> 4p<sup>2</sup> + 28p + 13 = 4p<sup>2</sup> + 20p + 21</p><p>=> p = 1</p><p>Therefore, 3p + 7 = 3 * 1 + 7 = <b>10</b></p>",

    "question": "<span class=\"eqt\"><p>A vessel contains 15 L of a mixture of milk and water in the ratio 2:3. If 6 L of this mixture is removed and replaced with pure milk, then find the percentage of milk in the final mixture.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2366;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2375; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2375; 15 &#2354;&#2368;&#2335;&#2352; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2:3 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2311;&#2360; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2375; 6 &#2354;&#2368;&#2335;&#2352; &#2344;&#2367;&#2325;&#2366;&#2354;&#2375; &#2332;&#2366;&#2319;&#2306; &#2324;&#2352; &#2313;&#2360;&#2325;&#2368; &#2332;&#2327;&#2361; &#2358;&#2369;&#2342;&#2381;&#2343; &#2342;&#2370;&#2343; &#2337;&#2366;&#2354;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2309;&#2306;&#2340;&#2367;&#2350; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">55%</span><span class=\"hqt\" style=\"display:none\">55%</span>",
      "<span class=\"eqt\">64%</span><span class=\"hqt\" style=\"display:none\">64%</span>",
      "<span class=\"eqt\">65%</span><span class=\"hqt\" style=\"display:none\">65%</span>",
      "<span class=\"eqt\">70%</span><span class=\"hqt\" style=\"display:none\">70%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Initial quantity is taken as 15 L.</p><p>Milk and water are in the ratio 2:3,</p><p>so, milk = 15/5 X 2 =  6 L and water =15/5 X 3 = 9 L.</p><p>After removal,</p><p>Milk removed from 15 L of mixture = (2/5)  X  6 = 2.4 L</p><p>Water removed from 15 L of mixture = (3/5)  X  6 = 3.6 L</p><p>Addition of 6L of milk,</p><p>Quantity of milk in new mixture = 6 - 2.4 + 6 = 9.6 L</p><p>Final percentage of milk = (9.6/15)  X  100 = 64%.</p><p>Thus, the final percentage of milk is 64%.</p>",
    "question_index": 64

    "question": "<span class=\"eqt\"><p>What is the smallest positive number that must be added to the product of any two consecutive multiples of 4 to make the result a perfect square?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2342;&#2379; &#2354;&#2327;&#2366;&#2340;&#2366;&#2352; 4 &#2325;&#2375; &#2327;&#2369;&#2339;&#2325;&#2379;&#2306; &#2325;&#2375; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2350;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2332;&#2379;&#2337;&#2364;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319; &#2340;&#2366;&#2325;&#2367; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2319;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339; &#2357;&#2352;&#2381;&#2327; &#2361;&#2379;?</p></span>",
    "options": [
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the two consecutive multiples of 4 be 4n and 4(n+1), where n is a positive integer.</p><p>Product = 4n  X  4(n+1) = 16n(n+1)</p><p>Required the smallest positive number be k, such that 16n(n+1) + k is a perfect square for all n.</p><p>16n(n+1) + 4 = 16n<sup>2</sup> + 16n + 4</p><p>= (4n + 2)<sup>2</sup></p><p>So, k = 4 works for every n.</p><p>Hence, the smallest such positive number is 4.</p><p><b> Express Method </b></p><p>We have to find the smallest number.</p><p>Take 4 and 8,</p><p>Product = 32</p><p>To make it a perfect square, we have to add 4 to 32.</p><p>Required answer = 4</p>",
    "question_index": 65
  },

    "question": "<span class=\"eqt\"><p>In a &#8710;KLM, points P and Q are on KL and KM, respectively, such that KP = 16 cm, PL = 4 cm, KQ = 10 cm and QM = 2.5 cm. If PQ = 8 cm, then the value of LM. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#8710;KLM &#2350;&#2375;&#2306;, &#2348;&#2367;&#2306;&#2342;&#2369; P &#2324;&#2352; Q &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; KL &#2324;&#2352; KM &#2346;&#2352; &#2361;&#2376;&#2306;, &#2320;&#2360;&#2375; &#2325;&#2367; KP = 16 &#2360;&#2375;&#2350;&#2368;, PL = 4 &#2360;&#2375;&#2350;&#2368;, KQ = 10 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; QM = 2.5 &#2360;&#2375;&#2350;&#2368;&#2404; &#2351;&#2342;&#2367; PQ = 8 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; LM &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404; </p></span>",

    "solution": "<p><img width=148 height=108 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p29940/image009.png\"></p><p>In &#8710;KLM and &#8710;KPQ,</p><p>KP/KL = 16/(16 + 4) = 16/20 = 4/5</p><p>KQ/KM = 10/(10 + 2.5) = 10/12.5 = 4/5</p><p>KL/KP = KM/KQ</p><p>So, &#8710;KLM ~ &#8710;KPQ</p><p>PQ/LM = KP/KL</p><p>8/LM = 4/5</p><p>LM = 10 cm</p>",

    "question": "<p>In the following question, one of the parts of the sentence may have error. Find out which part of the sentence has an error and select the appropriate option. If the sentence is free from error, select answer option accordingly.</p><p>Both Monika as well as Raechel 1)/ couldn't state what Chandler's job was 2)/ and lost the bet to Joey and Chandler. 3)/ No error 4)</p>",

      "1",
      "2",
      "3",
      "4"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>\"Both..and\"</b> is a correlative conjunction.</p><p><b>\"Both..as well as\"</b> are grammatically <b>incorrect</b> because <b>\"Both..and\"</b> are used together.</p><p>In the question, <b>\"as well as\"</b> is used with <b>\"Both\".</b> Thus, <b>\"and\"</b> will replace <b>\"as well as\"</b> in part 1) of the sentence.</p><p>Thus, the correct answer is: <b>(a) 1.</b></p><p>Therefore, the corrected form of the sentence should be: Both Monika <b>and</b> Raechel couldn't state what Chandler's job was and lost the bet to Joey and Chandler.</p><p>Additional Information:</p><p><b>Correlative conjunctions</b> are sort of like tag-team conjunctions. They come in <b>pairs</b>, and you have to use both of them in different places in a sentence to make them work. They get their name from the fact that they work together (co-) and relate one sentence element to another. Correlative conjunctions include pairs as given in the table below:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Either...or</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Neither...nor</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hardly...when</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Scarcely...when</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Both..and</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">If..then</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Not only...but also</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rather...than</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Whether..or</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">No sooner..than</td></tr></table>",

    "question": "<p>Identify the segment in the sentence which contains a grammatical error.</p><p>When the officer caught the clerk taking a bribe, the latter was down on his knees and promised that he wouldn't do these kind of act.</p>",
    "options": [
      "clerk taking a bribe,",
      "these kind of act",
      "on his knees and promised",
      "the latter was down"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Don't</b> use 'these' and 'those' with singular nouns like:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Kind</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Type</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sort</td></tr></table><p>Instead use, example: I will not do <b>this</b> kind of act.</p><p>In the question, <b>\"these\"</b> precedes <b>\"kind\"</b>, which is grammatically incorrect. Thus, <b>\"this\"</b> should replace <b>\"these\"</b> in the sentence.</p><p>Thus, the error is in <b>option (b)</b> - these kind of act.</p><p>Therefore, the corrected form of the sentence is: When the officer caught the clerk taking a bribe, the latter was down on his knees and promised that he wouldn't do <b>this</b> kind of act.</p><p>Additional Information:</p><p>Generally speaking, we use <b>this/these</b> to refer to people and things, situations and experiences that are close to the speaker or very close in time. We use <b>that/those</b> to refer to people and things, situations and experiences that are more distant, either in time or physically.</p>",
    "question_index": 82
  },

    "question": "<p>Select the word segment that can substitute the bracketed word segment correctly and complete the sentence meaningfully. </p><p>The new batch of students, along with their instructor, (are planning a trip) soon.</p>",
    "options": [
      "is planning a trip",
      "are plan a trip",
      "were planning a trip",
      "is planned a trip"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error in the bracketed segment \"are planning a trip\" is related to subject-verb agreement. The main subject of the sentence is \"The new batch of students.\" Phrases like \"along with,\" \"together with,\" \"as well as,\" etc., that introduce an additional noun do not change the number of the subject. \"Batch\" is a singular collective noun, and in this context, it acts as a single unit. Therefore, it requires a singular verb.</p><p>a) \"is planning a trip\"  -  This option correctly uses the singular verb \"is\" (to agree with the singular subject \"batch\") and maintains the present continuous tense appropriate for a future plan.</p><p>b) \"are plan a trip\"  -  The verb \"are\" is plural and incorrect. Also, \"plan\" is the base form and doesn't fit the continuous tense.</p><p>c) \"were planning a trip\"  -  The verb \"were\" is plural and incorrect. Also, this changes the tense to past continuous, which might not be intended if the planning is current or for the future.</p><p>d) \"is planned a trip\"  -  This structure is passive (\"is planned\") and is not meaningful here. \"A trip is planned\" would be passive, but \"batch is planned a trip\" is incorrect. Since the focus of the sentence is on the doer \"the new batch of students\", the active voice construction fits better here. </p><p>The correct sentence is: The new batch of students, along with their instructor, <b>is</b> planning a trip soon.</p><p>Hence, the most appropriate choice is option a).</p><p><b>Note: Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p><p><b>Collective Noun:</b> It is the name given to a number (or collection) of persons or things taken together and spoken of as one whole. Examples could be <b>crowd, fleet, committee, family, army, jury, heard,</b> etc.</p><p><b>Voice of a sentence</b> - Depending upon the emphasis we want to lay we use a particular voice in a particular context. We use <b>active voice </b>to lay emphasis on the doer of the action while we use <b>passive voice </b>to lay emphasis on the receiver of the action.</p><p>Example:</p><p>Active- Radha will work. (emphasis on Radha)</p><p>Passive- Work will be done by Radha. (emphasis on Work)</p>",
    "question_index": 83
  },

    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>Doctor Patil told me to <u>cut up</u> my sweet consumption as I have been diagnosed with diabetes.</p>",

    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>Was the historical manuscript translated by the linguists last year?</p>",

    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the \"to be\" verb ['was'] and the preposition \"by\" is necessary while changing the voice of the sentence from Passive to Active.</p><p>The Passive voice is an interrogative sentence in Past Indefinite tense, so the Active voice begins with \"Did.\"</p><p>In Passive voice, the format is: Was/Were + Object of the Active voice (Subjective case) + V3 + by + Subject of the Active voice (Objective case).</p><p>Therefore, the format of the sentence which begins with \"Did\" in Active voice is: Did + Subject + V1 + Object?</p><p>For example:</p><p>Were you beaten by him? (Passive)</p><p>Did he beat you? (Active)</p><p>Only option a) matches the structure.</p><p><b>Correct answer:</b> a) <i>Did the linguists translate the historical manuscript last year?</i></p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",

    "question": "<p>Select the most appropriate preposition to fill in the blank. </p><p>The hikers trekked ____ the mountain trail, marvelling at the breathtaking vistas that unfolded before them.</p>",
    "options": [
      "For",
      "Along",

      "With"

    "solution": "<p>The most appropriate preposition to fill in the blank is \"along.\" \"Along\" is used to indicate movement in a line or direction, especially following a path or route. In the given context, it suggests that the hikers were walking or travelling beside or parallel to the mountain trail. Other prepositions are not suitable for the blank. 'For' indicates purpose, benefit, or intended recipient. 'Of' indicates possession, origin, or relationship. 'With' typically indicates accompaniment or association. Hence, (b) is the correct answer. </p><p><b>The complete sentence is:</b> \"The hikers trekked along the mountain trail, marvelling at the breathtaking vistas that unfolded before them.\"</p><p><b>NOTE:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object. </p>",

d wastage and ensures food availability. The key challenge lies in maintaining proper storage standards and encouraging balanced consumption of fresh and stored foods. By improving food handling practices and increasing public awareness about safe storage methods, societies can benefit from cold storage technology while minimizing potential health risks.</p>",
