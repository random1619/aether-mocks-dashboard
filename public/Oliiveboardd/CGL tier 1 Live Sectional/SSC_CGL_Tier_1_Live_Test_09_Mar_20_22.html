<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">

                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Identify the roll number that does not follow the given rule.</p><p>Last three digits = First three digits + sum of digits of the first three digits</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2352;&#2379;&#2354; &#2344;&#2306;&#2348;&#2352; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2344;&#2367;&#2351;&#2350; &#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2309;&#2306;&#2340;&#2367;&#2350; &#2340;&#2368;&#2344; &#2309;&#2306;&#2325; = &#2346;&#2361;&#2354;&#2375; &#2340;&#2368;&#2344; &#2309;&#2306;&#2325; + &#2346;&#2361;&#2354;&#2375; &#2340;&#2368;&#2344; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327;</p></span>",
    "options": [
      "<span class=\"eqt\">123K129</span><span class=\"hqt\" style=\"display:none\">123K129</span>",
      "<span class=\"eqt\">145K155</span><span class=\"hqt\" style=\"display:none\">145K155</span>",
      "<span class=\"eqt\">210K214</span><span class=\"hqt\" style=\"display:none\">210K214</span>",
      "<span class=\"eqt\">134K142</span><span class=\"hqt\" style=\"display:none\">134K142</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>For A: 1 + 2 + 3 = 6 &#8594; 123 + 6 = 129</p><p>For B: 1 + 4 + 5 = 10 &#8594; 145 + 10 = 155</p><p>For D: 1 + 3 + 4 = 8 &#8594; 134 + 8 = 142</p><p>But for C: 2 + 1 + 0 = 3 &#8594; 210 + 3 = 213, not 214</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A sum of Rs. 2880 becomes Rs. 3888 after 7 years at certain rate of interest on simple interest, what is the rate of interest?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2352;&#2366;&#2358;&#2367; &#2352;&#2369;. 2880 7 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342; &#2360;&#2352;&#2354; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2352; &#2346;&#2352; &#2352;&#2369;. 3888 &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">8(1/3)%</span><span class=\"hqt\" style=\"display:none\">8(1/3)%</span>",
      "<span class=\"eqt\">8%</span><span class=\"hqt\" style=\"display:none\">8%</span>",
      "<span class=\"eqt\">12%</span><span class=\"hqt\" style=\"display:none\">12%</span>",
      "<span class=\"eqt\">5%</span><span class=\"hqt\" style=\"display:none\">5%</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Amount = 3888</p><p>Principal = 2880</p><p>SI = 3888  -  2880 = 1008</p><p>Time period = 7 years</p><p>Let R% be the rate of interest.</p><p>1008 = (2880 * R * 7)/100</p><p>=&gt; R = 100800/(2880 * 7)</p><p>=&gt; R = 5%</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Find the missing term in the following series  - </p><p>274, 398, 522, 646, 770, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2354;&#2369;&#2346;&#2381;&#2340; &#2346;&#2342; &#2326;&#2379;&#2332;&#2375;&#2306; - </p><p>274, 398, 522, 646, 770, ?</p></span>",
    "options": [
      "<span class=\"eqt\">875</span><span class=\"hqt\" style=\"display:none\">875</span>",
      "<span class=\"eqt\">912</span><span class=\"hqt\" style=\"display:none\">912</span>",
      "<span class=\"eqt\">924</span><span class=\"hqt\" style=\"display:none\">924</span>",
      "<span class=\"eqt\">894</span><span class=\"hqt\" style=\"display:none\">894</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Logic for the given series  - </p><p>274 + 124 = 398</p><p>398 + 124 = 522</p><p>522 + 124 = 646</p><p>646 + 124 = 770</p><p>770 + 124 = <b>894</b></p><p>Hence, missing term = 894</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Find the missing term in the following series.</p><p>40 ? 170 250 340</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2354;&#2369;&#2346;&#2381;&#2340; &#2346;&#2342; &#2326;&#2379;&#2332;&#2375;&#2306;&#2404;</p><p>40 ? 170 250 340</p></span>",
    "options": [
      "<span class=\"eqt\">80</span><span class=\"hqt\" style=\"display:none\">80</span>",
      "<span class=\"eqt\">100</span><span class=\"hqt\" style=\"display:none\">100</span>",
      "<span class=\"eqt\">120</span><span class=\"hqt\" style=\"display:none\">120</span>",
      "<span class=\"eqt\">130</span><span class=\"hqt\" style=\"display:none\">130</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Pattern of the series  -  </p><p>40 + 60 = <b>100</b></p><p>100 + 70 = 170</p><p>170 + 80 = 250</p><p>250 + 90 = 340</p><p>100 Is the missing term in the series.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the missing term in the following series.</p><p>640 320 160 ? 40</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2354;&#2369;&#2346;&#2381;&#2340; &#2346;&#2342; &#2326;&#2379;&#2332;&#2375;&#2306;&#2404;</p><p>640 320 160 ? 40</p></span>",
    "options": [
      "<span class=\"eqt\">120</span><span class=\"hqt\" style=\"display:none\">120</span>",
      "<span class=\"eqt\">90</span><span class=\"hqt\" style=\"display:none\">90</span>",
      "<span class=\"eqt\">100</span><span class=\"hqt\" style=\"display:none\">100</span>",
      "<span class=\"eqt\">80</span><span class=\"hqt\" style=\"display:none\">80</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Pattern of the series  -  </p><p>640 &div; 2 = 320</p><p>320 &div; 2 = 160</p><p>160 &div; 2 = <b>80</b></p><p>80 &div; 2 = 40</p><p>80 Is the missing term in the series.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Neha is the daughter of Anjali, who has only one son-in-law, Rajesh. Rajesh's sister is Priya.</p><p>How is Priya related to Neha?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2375;&#2361;&#2366; &#2309;&#2306;&#2332;&#2354;&#2367; &#2325;&#2368; &#2348;&#2375;&#2335;&#2368; &#2361;&#2376;, &#2332;&#2367;&#2344;&#2325;&#2366; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2342;&#2366;&#2350;&#2366;&#2342; &#2361;&#2376;, &#2352;&#2366;&#2332;&#2375;&#2358;&#2404; &#2352;&#2366;&#2332;&#2375;&#2358; &#2325;&#2368; &#2348;&#2361;&#2344; &#2346;&#2381;&#2352;&#2367;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>&#2346;&#2381;&#2352;&#2367;&#2351;&#2366; &#2344;&#2375;&#2361;&#2366; &#2360;&#2375; &#2325;&#2376;&#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mother's son-in-law's sister</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2305; &#2325;&#2375; &#2342;&#2366;&#2350;&#2366;&#2342; &#2325;&#2368; &#2348;&#2361;&#2344;</span>",
      "<span class=\"eqt\">Aunt</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2330;&#2368;</span>",
      "<span class=\"eqt\">Cousin</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2330;&#2375;&#2352;&#2366; &#2349;&#2366;&#2312;/&#2348;&#2361;&#2344;</span>",
      "<span class=\"eqt\">Spouse's sister</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2367;/&#2346;&#2340;&#2381;&#2344;&#2368; &#2325;&#2368; &#2348;&#2361;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Neha is the daughter of Anjali, who has only one son-in-law, Rajesh. Rajesh's sister is Priya.</p><p><img width=391 height=106 id=\"Picture 26\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28449/image026.png\"></p><p>Priya is the sister of Neha's spouse. </p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option that is related to the third word in the same way as the second word is related to the first word.</p><p>(The words must be considered as meaningful English words and must not be related to each other based on the number of letters/consonants/vowels in the word).</p><p>Book : Chapter :: Album : ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306; &#2332;&#2379; &#2340;&#2368;&#2360;&#2352;&#2375; &#2358;&#2348;&#2381;&#2342; &#2360;&#2375; &#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2379; &#2332;&#2376;&#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2366; &#2358;&#2348;&#2381;&#2342; &#2346;&#2361;&#2354;&#2375; &#2358;&#2348;&#2381;&#2342; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>(&#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2379; &#2309;&#2352;&#2381;&#2341;&#2346;&#2370;&#2352;&#2381;&#2339; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2358;&#2348;&#2381;&#2342; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2324;&#2352; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306;/&#2357;&#2381;&#2351;&#2306;&#2332;&#2344;&#2379;&#2306;/&#2360;&#2381;&#2357;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;)</p><p>Book : Chapter :: Album : ?</p></span>",
    "options": [
      "<span class=\"eqt\">Cover</span><span class=\"hqt\" style=\"display:none\">Cover</span>",
      "<span class=\"eqt\">Track</span><span class=\"hqt\" style=\"display:none\">Track</span>",
      "<span class=\"eqt\">Singer</span><span class=\"hqt\" style=\"display:none\">Singer</span>",
      "<span class=\"eqt\">Label</span><span class=\"hqt\" style=\"display:none\">Label</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Chapters are parts of a book.</p><p>Tracks are parts of an album.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If 8 &rarr; 59, 10 &rarr; 95, 12 &rarr; 139, then 14 &rarr; ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 8 &rarr; 59, 10 &rarr; 95, 12 &rarr; 139, &#2340;&#2379; 14 &rarr; ?</p></span>",
    "options": [
      "<span class=\"eqt\">187</span><span class=\"hqt\" style=\"display:none\">187</span>",
      "<span class=\"eqt\">191</span><span class=\"hqt\" style=\"display:none\">191</span>",
      "<span class=\"eqt\">193</span><span class=\"hqt\" style=\"display:none\">193</span>",
      "<span class=\"eqt\">181</span><span class=\"hqt\" style=\"display:none\">181</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let n = given number.</p><p>The relation follows the pattern n<sup>2</sup> &#8722; 5.</p><p>For n = 8: 8<sup>2</sup> &#8722; 5 = 64 &#8722; 5 = 59,</p><p>For n = 10: 10<sup>2</sup> &#8722; 5 = 100 &#8722; 5 = 95,</p><p>For n = 12: 12<sup>2</sup> &#8722; 5 = 144 &#8722; 5 = 139.</p><p>Using the same rule for n = 14: 14<sup>2</sup> &#8722; 5 = 196 &#8722; 5 = 191.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>What comes next in the series?</p><p>D, G, L, S, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2309;&#2327;&#2354;&#2366; &#2325;&#2381;&#2351;&#2366; &#2310;&#2340;&#2366; &#2361;&#2376;?</p><p>D, G, L, S, ?</p></span>",
    "options": [
      "<span class=\"eqt\">O</span><span class=\"hqt\" style=\"display:none\">O</span>",
      "<span class=\"eqt\">J</span><span class=\"hqt\" style=\"display:none\">J</span>",
      "<span class=\"eqt\">V</span><span class=\"hqt\" style=\"display:none\">V</span>",
      "<span class=\"eqt\">D</span><span class=\"hqt\" style=\"display:none\">D</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>D + 3 = G</p><p>G + 5 = L</p><p>L + 7 = S</p><p>S + 11 = D</p><p>So, the next term in the series is D.</p>",
    "question_index": 8
  },

    "question": "<span class=\"eqt\"><p>Read the following statement carefully and identify the assumption(s) that is/are implicit.</p><p>Statement: A supermarket chain has reduced the price of its private-label rice by Rs 4 per kg to increase its market share in the budget segment.</p><p>Assumptions:</p><p>I. Reducing price always guarantees an increase in market share.</p><p>II. Budget-segment customers are likely to shift purchases when they see a meaningful price difference.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344; &#2360;&#2375; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360;/&#2313;&#2344; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;(&#2323;&#2306;) &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344;: &#2319;&#2325; &#2360;&#2369;&#2346;&#2352;&#2350;&#2366;&#2352;&#2381;&#2325;&#2375;&#2335; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2344;&#2375; &#2348;&#2332;&#2335; &#2360;&#2375;&#2327;&#2350;&#2375;&#2306;&#2335; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2368; &#2348;&#2366;&#2332;&#2366;&#2352; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375;&#2342;&#2366;&#2352;&#2368; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2346;&#2344;&#2375; &#2346;&#2381;&#2352;&#2366;&#2311;&#2357;&#2375;&#2335;-&#2354;&#2375;&#2348;&#2354; &#2330;&#2366;&#2357;&#2354; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; 4 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2350; &#2325;&#2352; &#2342;&#2368; &#2361;&#2376;&#2404;</p><p>&#2309;&#2344;&#2369;&#2350;&#2366;&#2344;:</p><p>I. &#2325;&#2368;&#2350;&#2340; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2360;&#2375; &#2361;&#2350;&#2375;&#2358;&#2366; &#2348;&#2366;&#2332;&#2366;&#2352; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375;&#2342;&#2366;&#2352;&#2368; &#2348;&#2338;&#2364;&#2344;&#2375; &#2325;&#2368; &#2327;&#2366;&#2352;&#2306;&#2335;&#2368; &#2350;&#2367;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2348;&#2332;&#2335;-&#2360;&#2375;&#2327;&#2350;&#2375;&#2306;&#2335; &#2325;&#2375; &#2327;&#2381;&#2352;&#2366;&#2361;&#2325; &#2332;&#2348; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2350;&#2370;&#2354;&#2381;&#2351; &#2309;&#2306;&#2340;&#2352; &#2342;&#2375;&#2326;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2379; &#2326;&#2352;&#2368;&#2342;&#2366;&#2352;&#2368; &#2348;&#2342;&#2354;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2352;&#2326;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both Assumption I and Assumption II are implicit</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2352;&#2366; I &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only Assumption II is implicit</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2343;&#2366;&#2352;&#2366; II &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Neither Assumption I nor Assumption II is implicit</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366; &#2340;&#2379; &#2343;&#2366;&#2352;&#2366; I &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2344;&#2366; &#2361;&#2368; &#2343;&#2366;&#2352;&#2366; II &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only Assumption I is implicit</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2343;&#2366;&#2352;&#2366; I &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement: The supermarket chain has reduced the price by Rs 4 per kg with the objective of increasing its market share in the budget segment. This means the action is based on what the chain believes is likely to influence budget customers.</p><p>Assumption I: The statement does not assume a guarantee. It only shows an intention or expectation that reducing price may help increase market share. The word \"to increase\" indicates an attempt, not a certainty. Hence, this assumption is too strong and is not implicit.</p><p>Assumption II: This assumption is necessary for the action to make sense. If budget customers are not price-sensitive or do not shift purchases based on price differences, reducing the price would not help increase market share. Therefore, this belief is clearly taken for granted.</p><p>Only Assumption II is implicit.</p>",

&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;, &#2340;&#2379; &#2327;&#2379;&#2343;&#2352;&#2366; &#2350;&#2375;&#2306; &#2360;&#2340;&#2381;&#2352; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2325;&#2375; &#2325;&#2367;&#2360; &#2342;&#2367;&#2344; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>The sum of two numbers is 16 and the sum of their squares is 160. Find the difference between the numbers.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 16 &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2357;&#2352;&#2381;&#2327;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 160 &#2361;&#2376;&#2404; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",

    ],
    "correct_option_id": 3,
    "solution": "<p>a<sup>2</sup> + b<sup>2</sup> = (a + b)<sup>2</sup> &#8722; 2ab</p><p>160 = 16<sup>2</sup> &#8722; 2ab</p><p>160 = 256 &#8722; 2ab</p><p>2ab = 96</p><p>ab = 48</p><p>Now numbers with:</p><p>Sum = 16</p><p>Product = 48</p><p>12 and 4</p><p>Difference = <b>8</b></p>",

    "question": "<span class=\"eqt\"><p>The ratio of ages of A and B is 4 : 5. After 6 years, the ratio becomes 5 : 6. Find the present age of A. </p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 4 : 5 &#2361;&#2376;&#2404; 6 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 5 : 6 &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; A &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404; </p></span>",
    "options": [
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">28</span><span class=\"hqt\" style=\"display:none\">28</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let present ages be</p><p>A = 4x</p><p>B = 5x</p><p>After 6 years:</p><p>A = 4x + 6</p><p>B = 5x + 6</p><p>Given:</p><p>(4x + 6) / (5x + 6) = 5 / 6</p><p>6(4x + 6) = 5(5x + 6)</p><p>24x + 36 = 25x + 30</p><p>25x &#8722; 24x = 36 &#8722; 30</p><p>x = 6</p><p>A = 4x = 4  X  6</p><p>= 24 years</p>",
    "question_index": 13
  },

    "question": "<span class=\"eqt\"><p>In each question below is given a statement followed by two courses of action numbered I and II. You have to assume everything in the statement to be true and on the basis of the information given in the statement, decide which of the suggested courses of action logically follow(s) for pursuing.</p><p>Statement: A particular road junction has seen repeated accidents due to a faulty signal and illegal parking that blocks visibility, as confirmed by traffic police reports.</p><p>Course of action I: Ban all vehicles from using any road in the entire district permanently.</p><p>Course of action II: Remove traffic signals from all junctions across the city so that drivers \"stay alert.\"</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2341;&#2344; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; I &#2324;&#2352; II &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2360;&#2349;&#2368; &#2348;&#2366;&#2340;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2344;&#2366; &#2361;&#2376; &#2324;&#2352; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2354;&#2375;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2360;&#2369;&#2333;&#2366;&#2312; &#2327;&#231 404;</p><p>&#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; II: &#2346;&#2370;&#2352;&#2375; &#2358;&#2361;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368; &#2330;&#2380;&#2352;&#2366;&#2361;&#2379;&#2306; &#2360;&#2375; &#2335;&#2381;&#2352;&#2376;&#2347;&#2367;&#2325; &#2360;&#2367;&#2327;&#2381;&#2344;&#2354; &#2361;&#2335;&#2366; &#2342;&#2375;&#2306; &#2340;&#2366;&#2325;&#2367; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;&#2352; \"&#2360;&#2340;&#2352;&#2381;&#2325; &#2352;&#2361;&#2375;&#2306;&#2404;\"</p></span>",
    "options": [
      "<span class=\"eqt\">Only course of action II follows.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; II &#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both courses of action I and II follow.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; I &#2324;&#2352; II &#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Only course of action I follows.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; I &#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Neither course of action I nor II follows.</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; I &#2325;&#2366; &#2324;&#2352; &#2344; &#2361;&#2368; II &#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"

    "correct_option_id": 3,
    "solution": "<p>Course of action I is far too extreme and unrelated to the specific junction issue; it punishes the entire district without solving the local causes.</p><p>Course of action II is also not logical because removing signals citywide increases confusion and risk; it does not fix the faulty signal and illegal parking at the junction.</p><p>Therefore, neither course of action I nor II follows, so option d.</p>",

    "question": "<span class=\"eqt\"><p>In a certain code language, MAGIC is coded as 13527363, RUN is coded as 181214. How will HOUR be coded in the same code language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, MAGIC &#2325;&#2379; 13527363 &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, RUN &#2325;&#2379; 181214 &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; HOUR &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">8281218</span><span class=\"hqt\" style=\"display:none\">8281218</span>",
      "<span class=\"eqt\">8201218</span><span class=\"hqt\" style=\"display:none\">8201218</span>",
      "<span class=\"eqt\">8241218</span><span class=\"hqt\" style=\"display:none\">8241218</span>",
      "<span class=\"eqt\">8261218</span><span class=\"hqt\" style=\"display:none\">8261218</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The consonants are coded with their alphabetical position.</p><p>The vowels are coded with twice the position of the reverse letter corresponding to that vowel.</p><p>For e.g. - The reverse letter of A is Z. Position of Z = 26, 26 x 2 = 52</p><p>So, the code for A = 52</p><p>So, MAGIC = 13527363</p><p>RUN = 181214</p><p>HOUR = 8241218</p>",

    "question": "<span class=\"eqt\"><p>If each vowel in the word 'HANDPICK' is changed to the second following letter in the English alphabetical order and each consonant is changed to the second preceding letter in the English alphabetical order. How many letters are there in the English alphabetical order between the letter which is the third from the left end and the first from the right end in the group of letters thus formed? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2358;&#2348;&#2381;&#2342; 'HANDPICK' &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2381;&#2357;&#2352; &#2325;&#2379; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2342;&#2370;&#2360;&#2352;&#2375; &#2309;&#2327;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2381;&#2351;&#2306;&#2332;&#2344; &#2325;&#2379; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2342;&#2370;&#2360;&#2352;&#2375; &#2346;&#2367;&#2331;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2348;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2305; &#2331;&#2379;&#2352; &#2360;&#2375; &#2340;&#2368;&#2360;&#2352;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2324;&#2352; &#2342;&#2366;&#2319;&#2305; &#2331;&#2379;&#2352; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2361;&#2376;&#2306;? </p></span>",

    "correct_option_id": 2,
    "solution": "<p>The word is HANDPICK</p><p>If each vowel in the word 'HANDPICK' is changed to the second following letter in the English alphabetical order and each consonant is changed to the second preceding letter in the English alphabetical order, </p><p>H  -  2 = F</p><p>A + 2 = C</p><p>N  -  2 = L</p><p>D  -  2 = B</p><p>P  -  2 = N</p><p>I + 2 = K</p><p>C  -  2 = A</p><p>K  -  2 = I</p><p>Then we get: FCLBNKAI</p><p>The third letter from left end is L.</p><p>The first letter from right end is I.</p><p>So, letters between L and I are J and K. So, there are total 2 letters. </p>",

    "correct_option_id": 2,
    "solution": "<p>Option (a) If 15 and 6 are interchanged, then the equation will be: </p><p>6 + 24 &div; (3 x 15 + 2)  -  40 &div; 8</p><p>= 6 + 24 &div; (45 + 2)  -  5</p><p>= 6 + 24 &div; 47  -  5</p><p>= 6 + 0.5  -  5</p><p>= 6.5  -  5</p><p>= 1.5</p><p>So, option (a) is incorrect. </p><p>Option (b) If 2 and 8 are interchanged, then the equation will be: </p><p>15 + 24 &div; (3 x 6 + 8)  -  40 &div; 2</p><p>= 15 + 24 &div; (18 + 8)  -  20</p><p>= 15 + 24 &div; 26  -  20</p><p>= 15 + 0.92  -  20</p><p>= 15.92  -  20</p><p>= -4.08</p><p>So, option (b) is incorrect. </p><p>Option (c) If 24 and 40 are interchanged, then the equation will be: </p><p>15 + 40 &div; (3 x 6 + 2)  -  24 &div; 8</p><p>= 15 + 40 &div; (18 + 2)  -  3</p><p>= 15 + 40 &div; 20  -  3</p><p>== 15 + 2  -  3</p><p>= 17  -  3</p><p>= 14</p><p>So, option (c) is correct. </p><p>Option (d) If 6 and 8 are interchanged, then the equation will be: </p><p>15 + 24 &div; (3 x 8 + 2)  -  40 &div; 6</p><p>= 15 + 24 &div; (24 + 2)  -  40 &div; 6</p><p>= 15 + 24 &div; 26  -  6.66</p><p>= 15 + 0.92  -  6.66</p><p>= 15.92  -  6.66</p><p>= 9.26</p><p>So, option (d) is incorrect. </p>",

    "question": "<span class=\"eqt\"><p>Which of the following is NOT a specialized agency of the United Nations?</p><p>A.World Health Organization</p><p>B.International Labour Organization</p><p>C.Organization of the Petroleum Exporting Countries</p><p>D.International Atomic Energy Agency</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359; &#2319;&#2332;&#2375;&#2306;&#2360;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p><p>A.&#2357;&#2367;&#2358;&#2381;&#2357; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2360;&#2306;&#2327;&#2336;&#2344;</p><p>B.&#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2358;&#2381;&#2352;&#2350; &#2360;&#2306;&#2327;&#2336;&#2344;</p><p>C.&#2346;&#2375;&#2335;&#2381;&#2352;&#2379;&#2354;&#2367;&#2351;&#2350; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340;&#2325; &#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2366; &#2360;&#2306;&#2327;&#2336;&#2344;</p><p>D.&#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2314;&#2352;&#2381;&#2332;&#2366; &#2319;&#2332;&#2375;&#2306;&#2360;&#2368;</p></span>",

    "question": "<span class=\"eqt\"><p>Who was the ambassador of Selcus Nicator in Chandragupta Maurya court?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2350;&#2380;&#2352;&#2381;&#2351; &#2325;&#2375; &#2342;&#2352;&#2348;&#2366;&#2352; &#2350;&#2375;&#2306; &#2360;&#2375;&#2354;&#2381;&#2325;&#2360; &#2344;&#2367;&#2325;&#2375;&#2335;&#2352; &#2325;&#2366; &#2352;&#2366;&#2332;&#2342;&#2370;&#2340; &#2325;&#2380;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Magasthenes</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2327;&#2360;&#2381;&#2341;&#2344;&#2368;&#2332;</span>",
      "<span class=\"eqt\">Herodotus</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2352;&#2379;&#2337;&#2379;&#2335;&#2360;</span>",
      "<span class=\"eqt\">Erotosthenes</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2352;&#2379;&#2335;&#2379;&#2360;&#2381;&#2341;&#2344;&#2368;&#2332;</span>",
      "<span class=\"eqt\">Aristotle</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2360;&#2381;&#2340;&#2370;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Magasthenes was the ambassador of Sekcus Nicator in Chandragupta Maurya Court.</p><p>Further Insight:</p><p>&bull; Megasthenes</p><p>&#9675; Megasthenes was a Greek ambassador sent by Seleucus I Nicator to the court of Chandragupta Maurya in Pataliputra (modern-day Patna).</p><p>&#9675; Indica</p><p>&#9632; Indica' is Megasthenes' account of his observations during his stay in India</p><p>&#9632; Detailed descriptions of India's landscape, rivers, and cities.</p><p>&#9632; Insights into the caste system, customs, and daily life.</p><p>&#9632; Information on governance, military, and economy.</p><p>&#9632; Observations on Indian philosophical thought and religious practices.</p><p>&#9675; 'Indica' serves as a crucial source for understanding ancient India from a foreign perspective</p><p>&#9675; The original text is lost, fragments preserved by later writers like Strabo, Arrian, and Diodorus have been instrumental in reconstructing India's history.</p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>Which article of the Constitution of India states that 'all authorities, civil and judicial, in the territory of India shall act in aid of the Supreme Court'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2350;&#2375;&#2306; &#2325;&#2361;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; '&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2346;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2352;&#2339;, &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2324;&#2352; &#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325;, &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2375;&#2306;&#2327;&#2375;'?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 137</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 137</span>",
      "<span class=\"eqt\">Article 121</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 121</span>",
      "<span class=\"eqt\">Article 144</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 144</span>",
      "<span class=\"eqt\">Article 157</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 157</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Article 144</b> of the Constitution mandates that \"all authorities civil and judicial, in the territory of India shall act in aid of the Supreme Court.</p><p>These authorities are legally obliged not only to act in aid of the Supreme Court for the enforcement of the law declared by the Supreme Court but also in aid of all its orders, decrees or directions.</p><p>Consequence of deliberate flouting and non-compliance with the orders of the Supreme Court is penal.</p><p></p><p>Further insights:</p><p>Article 137: Review of Judgments or Orders by the Supreme Court</p><p>Article 121: Restriction on Discussion in Parliament</p><p>Article 157: Conditions of Governors Office</p><p></p>",
    "question_index": 27
  },

    "question": "<span class=\"eqt\"><p>Consider the following statement about Pradhan Mantri Garib Kalyan Anna Yojana</p><p>a) Household that are part of the Antyodaya Anna Yojana are eligible</p><p>b) Each family receives 5 kg of food grain per person per month. AAY households receive 35 kg per month.</p><p>c) Scheme provides rice, wheat and coarse grains.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2327;&#2352;&#2368;&#2348; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339; &#2309;&#2344;&#2381;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>a) &#2309;&#2306;&#2340;&#2381;&#2351;&#2379;&#2342;&#2351; &#2309;&#2344;&#2381;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2348;&#2344;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2311;&#2360;&#2325;&#2375; &#2346;&#2366;&#2340;&#2381;&#2352; &#2361;&#2376;&#2306;&#2404;</p><p>b) &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2366;&#2361; 5 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2326;&#2366;&#2342;&#2381;&#2351;&#2366;&#2344;&#2381;&#2344; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404; AAY &#2346;&#2352;&#2367;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2366;&#2361; 35 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>c) &#2351;&#2379;&#2332;&#2344;&#2366; &#2330;&#2366;&#2357;&#2354;, &#2327;&#2375;&#2361;&#2370;&#2306; &#2324;&#2352; &#2350;&#2379;&#2335;&#2375; &#2309;&#2344;&#2366;&#2332; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only c and a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c &#2324;&#2352; a</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>a) is correct: PM-GKAY covers all beneficiaries under the National Food Security Act (NFSA), 2013, which includes households covered by Antyodaya Anna Yojana (AAY) and Priority Households (PHH).</p><p>b) is correct: The scheme provides an additional 5 kg of free food grain per person per month, over and above their regular NFSA entitlement. The statement correctly describes this benefit and also correctly states the regular entitlement for AAY families (35 kg per family per month).</p><p>c) is correct: The scheme provides food grains which include wheat, rice, and, under the broader NFSA framework which it supplements, coarse grains are also provisioned.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about the planning in India.</p><p>1) First plan was based on the Mahalanobis model.</p><p>2) After the Fourth Plan India has seen the three annual plans.</p><p>3) The specific objective of the second plan was the development of agriculture.</p><p>4) The third plan was based on the Gadgil Strategy.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2379;&#2332;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1) &#2346;&#2361;&#2354;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2350;&#2361;&#2366;&#2354;&#2344;&#2379;&#2348;&#2367;&#2360; &#2350;&#2377;&#2337;&#2354; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2341;&#2368;&#2404;</p><p>2) &#2330;&#2380;&#2341;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2348;&#2366;&#2342; &#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2340;&#2368;&#2344; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2351;&#2379;&#2332;&#2344;&#2366;&#2319;&#2306; &#2342;&#2375;&#2326;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>3) &#2342;&#2370;&#2360;&#2352;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2366; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2371;&#2359;&#2367; &#2325;&#2366; &#2357;&#2367;&#2325;&#2366;&#2360; &#2341;&#2366;&#2404;</p><p>4) &#2340;&#2368;&#2360;&#2352;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2327;&#2366;&#2337;&#2327;&#2367;&#2354; &#2352;&#2339;&#2344;&#2368;&#2340;&#2367; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2341;&#2368;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1, 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The plan was based on the Mahalanobis model.</p><p>After the third Plan, India has seen the three annual plans.</p><p>The specific objective of the third plan was the development of agriculture along with balanced regional development.</p><p>The fourth plan was based on the Gadgil Strategy.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Harappan Civilization:</p><p>1.The Great Bath has been discovered at Lothal.</p><p>2.The inhabitants were aware of the use of iron.</p><p>3.It was primarily an urban civilization.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2337;&#2364;&#2346;&#2381;&#2346;&#2366; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2354;&#2379;&#2341;&#2354; &#2350;&#2375;&#2306; &#2350;&#2361;&#2366;&#2344; &#2360;&#2381;&#2344;&#2366;&#2344;&#2366;&#2327;&#2366;&#2352; &#2325;&#2368; &#2326;&#2379;&#2332; &#2325;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404;</p><p>2. &#2344;&#2367;&#2357;&#2366;&#2360;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2354;&#2379;&#2361;&#2375; &#2325;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2346;&#2340;&#2366; &#2341;&#2366;&#2404;</p><p>3. &#2351;&#2361; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2319;&#2325; &#2358;&#2361;&#2352;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2341;&#2368;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3 are correct</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3 &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Only statement 3 is correct. The Harappan Civilization is renowned for its well-planned cities like Harappa and Mohenjo-daro, characterized by grid-like street patterns, advanced drainage systems, and large public structures, making it a primarily urban civilization.</p><p>Explanation of Incorrect Statements:</p><p>Statement 1 is incorrect: The Great Bath, a large public bathing structure, was discovered at Mohenjo-daro, not Lothal. Lothal is famous for its large dockyard.</p><p>Statement 2 is incorrect: The Harappan Civilization was a Bronze Age civilization. The inhabitants used copper and bronze but were not aware of the use of iron. The Iron Age in India began much later, around 1000 BCE.</p><p>Further insights:</p><p>The Harappan civilization, also known as the Indus Valley Civilization, flourished around 2500-1900 BCE in the northwestern regions of South Asia.</p>",
    "question_index": 30
  },

    "solution": "<p>The 13th edition of the India - Kyrgyzstan Joint Special Forces Exercise \"Khanjar\" was held at Missamari in Assam from 4 to 17 February 2026. The exercise is conducted annually and alternates between India and Kyrgyzstan. It aims to enhance interoperability, tactical coordination, and combat readiness between the special forces of the two countries, focusing on counter-terrorism operations and urban warfare scenarios.</p><p>Further insights:</p><p>&bull; Exercise Khanjar started in 2011 and is conducted alternately in India and Kyrgyzstan.</p><p>&bull; The exercise focuses on counter-terrorism and urban warfare operations.</p><p>&bull; Indian participation usually includes troops from the Parachute Regiment (Special Forces).</p><p>&bull; The exercise improves defence cooperation and interoperability between the two countries.</p>",

    "question": "<span class=\"eqt\"><p>Which Indian institution was officially nominated as the United Nations Centre of Excellence (CoE) for Artificial Intelligence (AI) in September 2025?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2367;&#2340;&#2306;&#2348;&#2352; 2025 &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2379; &#2310;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2325;&#2371;&#2340;&#2381;&#2352;&#2367;&#2350; &#2348;&#2369;&#2342;&#2381;&#2343;&#2367;&#2350;&#2340;&#2381;&#2340;&#2366; (&#2319;&#2310;&#2312;) &#2313;&#2340;&#2381;&#2325;&#2371;&#2359;&#2381;&#2335;&#2340;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; (CoE) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2344;&#2366;&#2350;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">IIT Bombay</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2312;&#2310;&#2312;&#2335;&#2368; &#2348;&#2377;&#2350;&#2381;&#2348;&#2375;</span>",
      "<span class=\"eqt\">IIT Madras</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2312;&#2310;&#2312;&#2335;&#2368; &#2350;&#2342;&#2381;&#2352;&#2366;&#2360;</span>",

      "<span class=\"eqt\">IIT Delhi</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2312;&#2310;&#2312;&#2335;&#2368; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Indian Institute of Technology, Madras (IIT Madras) has been nominated by the Government of India as a United Nations Centre of Excellence (CoE) for Artificial Intelligence. This announcement was made by the Ministry of Electronics and Information Technology (MeitY) during a UN event in New York.</p><p>The initiative is part of a global effort led by the United Nations Office for Digital and Emerging Technologies to build AI capacity, develop skills, and promote responsible use of artificial intelligence, especially in developing countries and the Global South.</p><p>Further insights </p><p>&bull; The nomination was announced at a high-level UN event on the sidelines of the United Nations General Assembly.</p><p>&bull; The initiative is linked to strengthening AI capacity building and ethical AI governance globally.</p><p>&bull; IIT Madras hosts the Wadhwani School of Data Science and AI, one of India's major AI research hubs.</p><p>&bull; The project supports India's broader IndiaAI Mission aimed at strengthening AI innovation.</p><p>&bull; The Centre of Excellence will help provide AI training and technological support to developing countries.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following is the best definition of ecological efficiency?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2342;&#2325;&#2381;&#2359;&#2340;&#2366; &#2325;&#2368; &#2360;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2350; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The amount of energy utilised at different trophic levels in a food chain</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2366;&#2342;&#2381;&#2351; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2379;&#2359;&#2368; &#2360;&#2381;&#2340;&#2352;&#2379;&#2306; &#2346;&#2352; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">The amount of energy stored at different trophic levels in a food chain</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2366;&#2342;&#2381;&#2351; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2379;&#2359;&#2368; &#2360;&#2381;&#2340;&#2352;&#2379;&#2306; &#2346;&#2352; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">The ratio between the mass and the energy flow at different trophic levels in a food chain</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2366;&#2342;&#2381;&#2351; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2379;&#2359;&#2368; &#2360;&#2381;&#2340;&#2352;&#2379;&#2306; &#2346;&#2352; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2324;&#2352; &#2314;&#2352;&#2381;&#2332;&#2366; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</span>",
      "<span class=\"eqt\">The ratio between energy flows at different points in a food chain</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2366;&#2342;&#2381;&#2351; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2346;&#2352; &#2314;&#2352;&#2381;&#2332;&#2366; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The best definition of ecological efficiency is the ratio between energy flows at different points in a food chain.</p><p>Ecological efficiency refers to the efficiency with which energy is transferred from one trophic level to the next in an ecosystem.</p><p>It is typically expressed as a percentage and is calculated by comparing the amount of energy available at one trophic level to the amount of energy that is transferred to the next trophic level.</p><p>This concept helps ecologists understand the flow of energy through ecosystems and the limitations on the number of trophic levels that can be supported.</p>",
    "question_index": 34
  },

,

    "question": "<span class=\"eqt\"><p>The purpose of setting up the NARCL is to _______.</p></span><span class=\"hqt\" style=\"display:none\"><p>NARCL &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; _______ &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Acquire stressed assets of banks.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2342;&#2348;&#2366;&#2357;&#2327;&#2381;&#2352;&#2360;&#2381;&#2340; &#2310;&#2360;&#2381;&#2340;&#2367;&#8205;&#2351;&#2366;&#2306;/&#2346;&#2352;&#2367;&#8205;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#8205;&#2351;&#2366;&#2306; &#2309;&#2343;&#2367;&#2327;&#2371;&#2361;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Give loans for infrastructure projects.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2346;&#2352;&#2367;&#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2315;&#2339; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Provide financial support to agriculture.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2325;&#2379; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Facilitate good governance in public sector banks.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2369;&#2358;&#2366;&#2360;&#2344; &#2325;&#2368; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Government of India in the Union Budget 2021 announced the formation of National Asset Reconstruction Company Limited (NARCL) for <b>aggregation and resolution of Non-Performing Assets (NPAs) in the Banking Industry. For any resolution of NPAs it acquires stressed assets of banks.</b></p><p><b>Additional Information</b></p><p>NARCL, a government entity, was incorporated with majority stake held by Public Sector Banks and balance by private banks with Canara Bank being the sponsor bank. It is registered with the Reserve Bank of India as an Asset Reconstruction Company under Securitisation and Reconstruction of Financial Assets and Enforcement of Security Interest Act, 2002.</p>",
    "question_index": 37
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is <b>NOT</b> a Himalayan river?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351;&#2368; &#2344;&#2342;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Beas</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2351;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Ravi</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;</span>",
      "<span class=\"eqt\">Wainganga</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2376;&#2344;&#2327;&#2306;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Teesta</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2360;&#2381;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The <b>Wainganga River</b> is NOT a Himalayan river. </p><p>&#183; It is a major peninsular river that originates in the Satpura Range in Madhya Pradesh, Central India, and flows south to join the Godavari River system. </p><p>&#183; Himalayan rivers originate from the glaciers and ranges of the Himalayas.</p><p><b>Explanation of Other Options:</b></p><p>&#183; <b>Beas River:</b> This river originates in the Himalayas in central Himachal Pradesh, India, specifically from the Beas Kund near Rohtang Pass. It is a tributary of the Sutlej River (Indus system).</p><p>&#183; <b>Ravi River:</b> This river also originates in the Himalayas, in the Chamba district of Himachal Pradesh, India. It is one of the five rivers of Punjab and a tributary of the Indus.</p><p>&#183; <b>Teesta River:</b> This river originates from the Pauhunri (or Teesta Kangse) glacier in the Himalayas in Sikkim, India. It flows through Sikkim and West Bengal before entering Bangladesh, where it joins the Brahmaputra River (Jamuna).</p><p><b>Further insights:</b></p><p>&#183; Indian rivers are broadly classified into Himalayan rivers (perennial, fed by glaciers and rain) and Peninsular rivers (mostly seasonal, rain-fed, though some larger ones are perennial).</p><p>&#183; The Wainganga is part of the Godavari basin, which is the largest peninsular river system in India.</p>",
    "question_index": 38
  },
  {
    "question": "<span class=\"eqt\"><p>Read the statements given below and the select the correct option:</p><p>I. Fiscal Deficit = Difference between country's expenditure and earnings</p><p>II. Gross Fiscal Deficit = Total expenditure - Revenue Receipts</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; :</p><p>I. &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2366; = &#2342;&#2375;&#2358; &#2325;&#2375; &#2357;&#2381;&#2351;&#2351; &#2340;&#2341;&#2366; &#2310;&#2351; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352;</p><p>II. &#2360;&#2325;&#2354; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2366; = &#2325;&#2369;&#2354; &#2357;&#2381;&#2351;&#2351; - &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2366;&#2305;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I is true</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only II is true</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Neither I nor II is true</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both I and II are true</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Fiscal Deficit = Difference between country's expenditure and earnings.</p><p>Fiscal Deficit is the difference between the government's total expenditure and its total revenue (excluding borrowings). It represents the amount the government needs to borrow to meet its expenses.</p><p>Gross Fiscal Deficit = Total expenditure - (Revenue Receipts + Non-debt creating capital receipts)</p><p>Non-debt creating capital receipts: Those receipts which are not borrowings, hence does not give rise to debt.</p>",
    "question_index": 39
  },

    "question": "<span class=\"eqt\"><p>With reference to the newly inaugurated Integrated Neuro-Rehabilitation Centre \"Prayas\", consider the following statements:</p><p>Statement I: The \"Prayas\" centre is a flagship initiative launched under the aegis of the Ministry of Health and Family Welfare to promote modern pediatrics.</p><p>Statement II: The inauguration of this centre took place in 2026 to coincide with the celebration of the 10th Ayurveda Day.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2357;&#2368;&#2344; &#2313;&#2342;&#2381;&#2328;&#2366;&#2335;&#2367;&#2340; &#2319;&#2325;&#2368;&#2325;&#2371;&#2340; &#2344;&#2381;&#2351;&#2370;&#2352;&#2379;-&#2352;&#2367;&#2361;&#2376;&#2348;&#2367;&#2354;&#2367;&#2335;&#2375;&#2358;&#2344; &#2360;&#2375;&#2306;&#2335;&#2352; \"&#2346;&#2381;&#2352;&#2351;&#2366;&#2360;\" &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; I: \"&#2346;&#2381;&#2352;&#2351;&#2366;&#2360;\" &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2324;&#2352; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2325;&#2375; &#2340;&#2340;&#2381;&#2357;&#2366;&#2357;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2348;&#2366;&#2354; &#2330;&#2367;&#2325;&#2367;&#2340;&#2381;&#2360;&#2366; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2346;&#2361;&#2354; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2311;&#2360; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2325;&#2366; &#2313;&#2342;&#2381;&#2328;&#2366;&#2335;&#2344; 2026 &#2350;&#2375;&#2306; 10&#2357;&#2375;&#2306; &#2310;&#2351;&#2369;&#2352;&#2381;&#2357;&#2375;&#2342; &#2342;&#2367;&#2357;&#2360; &#2325;&#2375; &#2360;&#2350;&#2366;&#2352;&#2379;&#2361; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2375;&#2354; &#2326;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only Statement I is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; I &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only Statement II is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; II &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both Statement I and Statement II are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2324;&#2352; &#2325;&#2341;&#2344; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Neither Statement I nor Statement II are correct</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2325;&#2341;&#2344; I &#2360;&#2361;&#2368; &#2361;&#2376; &#2324;&#2352; &#2344; &#2361;&#2368; &#2325;&#2341;&#2344; II &#2360;&#2361;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Statement I is incorrect.</p><p>The \"Prayas\" Integrated Neuro-Rehabilitation Centre was launched by the Ministry of AYUSH, not the Ministry of Health and Family Welfare. The centre was established at the All India Institute of Ayurveda (AIIA), Goa, to integrate Ayurveda, Yoga, physiotherapy, speech therapy, occupational therapy, and modern paediatrics for neuro-rehabilitation, especially for children with neurological and developmental disorders.</p><p>Statement II is also incorrect.</p><p>The centre was inaugurated in 2025, not in 2026, and the launch coincided with the celebration of the 10th Ayurveda Day.</p><p>Further insights </p><p>&bull; The centre was inaugurated by Union Minister of State for AYUSH Prataprao Jadhav.</p><p>&bull; Prayas is located at the All India Institute of Ayurveda (AIIA) campus in Goa.</p><p>&bull; It focuses mainly on paediatric neurological and developmental disorders.</p><p>&bull; The centre integrates traditional systems like Ayurveda and Yoga with modern rehabilitation sciences.</p><p>&bull; It aims to serve as a research and training hub for integrative neuro-rehabilitation in India.</p>",

    "question": "<span class=\"eqt\"><p>The phenomenon of total internal reflection occurs when: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2370;&#2352;&#2381;&#2339; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2346;&#2352;&#2366;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2368; &#2328;&#2335;&#2344;&#2366; &#2340;&#2348; &#2360;&#2306;&#2349;&#2357; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2332;&#2348;:</p></span>",
    "options": [
      "<span class=\"eqt\">Light passes from a denser medium to a rarer medium.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2328;&#2344; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2357;&#2367;&#2352;&#2354; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Light passes from a rarer medium to a denser medium.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2357;&#2367;&#2352;&#2354; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2360;&#2328;&#2344; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Light passes through a transparent medium.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2319;&#2325; &#2346;&#2366;&#2352;&#2342;&#2352;&#2381;&#2358;&#2368; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2327;&#2369;&#2332;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Light encounters an opaque object.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2319;&#2325; &#2309;&#2346;&#2366;&#2352;&#2342;&#2352;&#2381;&#2358;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2346;&#2352; &#2346;&#2396;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Total internal reflection occurs when light passes from a denser medium to a rarer medium.</p><p>When light travels from a denser medium (like water or glass) to a rarer medium (like air), it bends away from the normal (the line perpendicular to the surface).  As the angle of incidence increases, the angle of refraction also increases.</p><p>At a certain angle (the critical angle), the angle of refraction becomes 90 degrees, and the refracted ray travels along the interface between the two media.</p><p>Beyond this critical angle, the light is no longer refracted but is instead reflected back into the denser medium. This is total internal reflection. </p><p></p><p></p>",
    "question_index": 41
  },

    "question": "<span class=\"eqt\"><p>Match the following statements:</p><p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List I </td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List II </td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a . Pakke Paga Hornbill festival</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Arunachal Pradesh</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Losar </td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. West Bengal </td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Gangasagar Mela </td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Tamil Nadu. </td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Pongal</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.Ladakh.</td></tr></table></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2346;&#2325;&#2381;&#2325;&#2375; &#2346;&#2366;&#2327;&#2366; &#2361;&#2377;&#2352;&#2381;&#2344;&#2348;&#2367;&#2354; &#2347;&#2375;&#2360;&#2381;&#2335;&#2367;&#2357;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2354;&#2379;&#2360;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2348;&#2306;&#2327;&#2366;&#2354;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2327;&#2306;&#2327;&#2366;&#2360;&#2366;&#2327;&#2352; &#2350;&#2375;&#2354;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2346;&#2379;&#2306;&#2327;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2354;&#2342;&#2381;&#2342;&#2366;&#2326;</td></tr></table></span>",
