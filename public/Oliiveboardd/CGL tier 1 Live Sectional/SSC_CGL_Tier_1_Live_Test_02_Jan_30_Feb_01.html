    "question": "<span class=\"eqt\"><p>With reference to the Dongria Kondh tribe of Odisha, which of the following statements best describes their cultural and religious practices?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2323;&#2337;&#2367;&#2358;&#2366; &#2325;&#2375; &#2337;&#2379;&#2306;&#2327;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379;&#2306;&#2343; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2313;&#2344;&#2325;&#2368; &#2360;&#2366;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367;&#2325; &#2324;&#2352; &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2346;&#2381;&#2352;&#2341;&#2366;&#2323;&#2306; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2360;&#2335;&#2368;&#2325; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">They are a nomadic community that migrates across the Eastern Ghats and worships a sun deity called \"Niyam Raja\" through fire rituals.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2319;&#2325; &#2326;&#2366;&#2344;&#2366;&#2348;&#2342;&#2379;&#2358; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2361;&#2376;&#2306; &#2332;&#2379; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2328;&#2366;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2366;&#2360; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2309;&#2327;&#2381;&#2344;&#2367; &#2309;&#2344;&#2369;&#2359;&#2381;&#2336;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; \"&#2344;&#2367;&#2351;&#2350; &#2352;&#2366;&#2332;&#2366;\" &#2344;&#2366;&#2350;&#2325; &#2360;&#2370;&#2352;&#2381;&#2351; &#2342;&#2375;&#2357;&#2340;&#2366; &#2325;&#2368; &#2346;&#2370;&#2332;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They live in the Niyamgiri hills and worship the mountain as their supreme deity, \"Niyam Raja,\" considering nature sacred.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2344;&#2367;&#2351;&#2350;&#2327;&#2367;&#2352;&#2367; &#2346;&#2361;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367; &#2325;&#2379; &#2346;&#2357;&#2367;&#2340;&#2381;&#2352; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319; &#2346;&#2352;&#2381;&#2357;&#2340; &#2325;&#2379; &#2309;&#2346;&#2344;&#2366; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2342;&#2375;&#2357;&#2340;&#2366;, \"&#2344;&#2367;&#2351;&#2350; &#2352;&#2366;&#2332;&#2366;\" &#2350;&#2366;&#2344;&#2325;&#2352; &#2313;&#2360;&#2325;&#2368; &#2346;&#2370;&#2332;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They are mainly known for metal casting and producing Kapdaganda shawls as symbols of industrial development.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2343;&#2366;&#2340;&#2369; &#2338;&#2354;&#2366;&#2312; &#2324;&#2352; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2346;&#2342;&#2366;&#2327;&#2306;&#2337;&#2366; &#2358;&#2377;&#2354; &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They live in urban plains and avoid worshipping natural elements like hills and forests.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2358;&#2361;&#2352;&#2368; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2346;&#2361;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2332;&#2306;&#2327;&#2354;&#2379;&#2306; &#2332;&#2376;&#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2368; &#2346;&#2370;&#2332;&#2366; &#2325;&#2352;&#2344;&#2375; &#2360;&#2375; &#2346;&#2352;&#2361;&#2375;&#2332; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Dongria Kondh are a Particularly Vulnerable Tribal Group (PVTG) living in the Niyamgiri hills of Odisha.</p><p>They worship Niyam Raja, who is believed to reside in the Niyamgiri mountain. For them, the mountain itself is sacred. Their culture is deeply connected to forests, hills, and natural resources.</p><p>Their festivals and rituals focus on protecting nature and maintaining ecological balance.</p><p><b><u>Further Insights </u></b></p><p>Dongria Kondh are classified as a Particularly Vulnerable Tribal Group (PVTG).</p><p>The Niyamgiri mining case became a landmark tribal rights issue in India.</p><p>The Supreme Court allowed Gram Sabhas to decide on mining in their sacred hills (2013).</p><p>They practice shifting cultivation called Podu cultivation.</p><p>Kapdaganda is a traditional shawl symbolizing their identity and culture.</p>",
    "question_index": 43
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following government scheme is a key part of India's coastal management, focusing specifically on the plantation of mangroves along the shoreline?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2340;&#2335;&#2368;&#2351; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2366; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2340;&#2335;&#2352;&#2375;&#2326;&#2366; &#2325;&#2375; &#2325;&#2367;&#2344;&#2366;&#2352;&#2375; &#2350;&#2376;&#2306;&#2327;&#2381;&#2352;&#2379;&#2357; &#2357;&#2371;&#2325;&#2381;&#2359;&#2366;&#2352;&#2379;&#2346;&#2339; &#2346;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">PM-PRANAM</span><span class=\"hqt\" style=\"display:none\">PM-PRANAM</span>",
      "<span class=\"eqt\">MISHTI</span><span class=\"hqt\" style=\"display:none\">MISHTI</span>",
      "<span class=\"eqt\">PM-KUSUM</span><span class=\"hqt\" style=\"display:none\">PM-KUSUM</span>",
      "<span class=\"eqt\">SAGAR</span><span class=\"hqt\" style=\"display:none\">SAGAR</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>MISHTI stands for Mangrove Initiative for Shoreline Habitats &amp; Tangible Incomes.</p><p>It was announced in the Union Budget 2023 - 24.</p><p>The scheme focuses on:</p><p>Mangrove plantation along India's coastline</p><p>Restoration of mangrove ecosystems</p><p>Enhancing coastal resilience</p><p>Supporting livelihoods of coastal communities</p><p><b>PM-PRANAM</b></p><p>Full form: Programme for Restoration, Awareness, Nourishment and Amelioration of Mother Earth.</p><p>Focuses on reducing chemical fertilizer usage.</p><p><b>PM-KUSUM</b></p><p>Promotes solar pumps and renewable energy in agriculture.</p><p><b>SAGAR</b></p><p>Stands for Security and Growth for All in the Region.</p><p>It is India's maritime security vision.</p><p><b><u>Further Insights</u></b> </p><p>Mangroves protect coastlines from cyclones and storm surges.</p><p>India has major mangrove areas in Sundarbans, Gujarat, and Andhra Pradesh.</p><p>Mangroves act as significant carbon sinks (blue carbon ecosystems).</p><p>MISHTI complements India's climate adaptation strategies.</p><p>Mangroves support fisheries and biodiversity.</p>",
    "question_index": 44
  },
  {
    "question": "<span class=\"eqt\"><p>The \"Sagar Maitri\" mission, which focuses on oceanographic research and cooperation in the Indian Ocean, is conducted by which organization?</p></span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2306;&#2342; &#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352; &#2350;&#2375;&#2306; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2309;&#2344;&#2369;&#2360;&#2306;&#2343;&#2366;&#2344; &#2324;&#2352; &#2360;&#2361;&#2351;&#2379;&#2327; &#2346;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; \"&#2360;&#2366;&#2327;&#2352; &#2350;&#2376;&#2340;&#2381;&#2352;&#2368;\" &#2350;&#2367;&#2358;&#2344; &#2325;&#2366; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2367;&#2360; &#2360;&#2306;&#2327;&#2336;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Indian Space Research Organisation (ISRO)</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2309;&#2306;&#2340;&#2352;&#2367;&#2325;&#2381;&#2359; &#2309;&#2344;&#2369;&#2360;&#2306;&#2343;&#2366;&#2344; &#2360;&#2306;&#2327;&#2336;&#2344; (&#2310;&#2312;&#2319;&#2360;&#2310;&#2352;&#2323;)</span>",
      "<span class=\"eqt\">Defence Research and Development Organisation (DRDO)</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2325;&#2381;&#2359;&#2366; &#2309;&#2344;&#2369;&#2360;&#2306;&#2343;&#2366;&#2344; &#2319;&#2357;&#2306; &#2357;&#2367;&#2325;&#2366;&#2360; &#2360;&#2306;&#2327;&#2336;&#2344; (&#2337;&#2368;&#2310;&#2352;&#2337;&#2368;&#2323;)</span>",
      "<span class=\"eqt\">Geological Survey of India (GSI)</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2349;&#2370;&#2357;&#2376;&#2332;&#2381;&#2334;&#2366;&#2344;&#2367;&#2325; &#2360;&#2352;&#2381;&#2357;&#2375;&#2325;&#2381;&#2359;&#2339; (&#2332;&#2368;&#2319;&#2360;&#2310;&#2312;)</span>",
      "<span class=\"eqt\">National Institute of Oceanography (NIO)</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344; (&#2319;&#2344;&#2310;&#2312;&#2323;)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Sagar Maitri mission is a specialized initiative of the Defence Research and Development Organisation (DRDO). It uses the research ship INS Sagardhwani to promote scientific cooperation and strategic partnerships with Indian Ocean Rim (IOR) countries.</p><p><b><u>Further Insights</u></b>:</p><p>\"MAITRI\" stands for Marine &amp; Allied Interdisciplinary Training and Research Initiative.</p><p>The mission visits 8 countries, including Maldives, Sri Lanka, Thailand, Malaysia, Myanmar, Indonesia, Mauritius, and Seychelles.</p><p>The 5th edition (SM-5) was started from the Southern Naval Command in Kochi, Kerala.</p>",
    "question_index": 45
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding ISRO's ground and space stations:</p><p>I. The Indian Deep Space Network (IDSN) at Byalalu has a 32-metre antenna to communicate with deep-space missions like the Moon and Mars.</p><p>II. The IDSN facility is meant to control the Bharatiya Antariksh Station (BAS) in Low Earth Orbit (LEO).</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2312;&#2319;&#2360;&#2310;&#2352;&#2323; &#2325;&#2375; &#2360;&#2381;&#2341;&#2354;&#2368;&#2351; &#2324;&#2352; &#2309;&#2306;&#2340;&#2352;&#2367;&#2325;&#2381;&#2359; &#2360;&#2381;&#2335;&#2375;&#2358;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2348;&#2381;&#2351;&#2366;&#2354;&#2366;&#2354;&#2370; &#2360;&#2381;&#2341;&#2367;&#2340; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2337;&#2368;&#2346; &#2360;&#2381;&#2346;&#2375;&#2360; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; (&#2310;&#2312;&#2337;&#2368;&#2319;&#2360;&#2319;&#2344;) &#2350;&#2375;&#2306; &#2330;&#2306;&#2342;&#2381;&#2352;&#2350;&#2366; &#2324;&#2352; &#2350;&#2306;&#2327;&#2354; &#2332;&#2376;&#2360;&#2375; &#2327;&#2361;&#2352;&#2375; &#2309;&#2306;&#2340;&#2352;&#2367;&#2325;&#2381;&#2359; &#2350;&#2367;&#2358;&#2344;&#2379;&#2306; &#2360;&#2375; &#2360;&#2306;&#2330;&#2366;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 32 &#2350;&#2368;&#2335;&#2352; &#2325;&#2366; &#2319;&#2306;&#2335;&#2368;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2310;&#2312;&#2337;&#2368;&#2319;&#2360;&#2319;&#2344; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2344;&#2367;&#2350;&#2381;&#2344; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2325;&#2381;&#2359;&#2366; (&#2319;&#2354;&#2312;&#2323;) &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2309;&#2306;&#2340;&#2352;&#2367;&#2325;&#2381;&#2359; &#2360;&#2381;&#2335;&#2375;&#2358;&#2344; (&#2348;&#2368;&#2319;&#2319;&#2360;) &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Indian Deep Space Network (IDSN) located at Byalalu (near Bengaluru) has a 32-metre antenna (along with an 18-metre antenna).</p><p>It is specifically designed to communicate with deep-space missions, such as:</p><p>Chandrayaan (Moon missions)</p><p>Mangalyaan (Mars mission)</p><p>Deep-space missions require large antennas because signals become very weak over long distances.</p><p>The Bharatiya Antariksh Station (BAS) will orbit in Low Earth Orbit (LEO).</p><p>LEO missions are much closer to Earth and are generally handled by:</p><p>ISTRAC (ISRO Telemetry, Tracking and Command Network)</p><p>Other satellite tracking systems</p><p>IDSN is meant for deep-space communication, not for managing a nearby space station.</p><p><b><u>Further Insights</u></b> </p><p>IDSN became operational in 2008.</p><p>Chandrayaan-1 was among the first missions supported by IDSN.</p><p>ISTRAC handles most Earth-orbiting satellite missions.</p><p>Deep-space missions require high-gain antennas due to signal delay and weakness.</p><p>The Bharatiya Antariksh Station is planned to be operational by around 2035.</p>",
    "question_index": 46
  },
  {
    "question": "<span class=\"eqt\"><p>A 100 W electric heater is operated for 8 hours daily. Calculate the total energy consumed by the heater in a month of 31 days.</p></span><span class=\"hqt\" style=\"display:none\"><p>100 &#2357;&#2366;&#2335; &#2325;&#2366; &#2319;&#2325; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2367;&#2325; &#2361;&#2368;&#2335;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2342;&#2367;&#2344; 8 &#2328;&#2306;&#2335;&#2375; &#2330;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404; 31 &#2342;&#2367;&#2344;&#2379;&#2306; &#2325;&#2375; &#2319;&#2325; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2361;&#2368;&#2335;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2326;&#2346;&#2340; &#2325;&#2368; &#2327;&#2312; &#2325;&#2369;&#2354; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">24.8 kWh</span><span class=\"hqt\" style=\"display:none\">24.8 &#2325;&#2367;&#2354;&#2379;&#2357;&#2366;&#2335; &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">31.0 kWh</span><span class=\"hqt\" style=\"display:none\">31.0 &#2325;&#2367;&#2354;&#2379;&#2357;&#2366;&#2335; &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">248.0 kWh</span><span class=\"hqt\" style=\"display:none\">248.0 &#2325;&#2367;&#2354;&#2379;&#2357;&#2366;&#2335;-&#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">100.0 kWh</span><span class=\"hqt\" style=\"display:none\">100.0 &#2325;&#2367;&#2354;&#2379;&#2357;&#2366;&#2335;-&#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Energy = Power  X  Time</p><p>Power in kW&#224;100 W = 0.1 kW</p><p>Daily Energy:&#224;0.1 kW  X  8 hours</p><p>= 0.8 kWh per day</p><p>Total Energy for 31 days&#224;0.8 kWh  X  31 days</p><p>= 24.8 kWh</p><p><b><u>Further Insights</u></b> </p><p>1 kWh is commonly called one unit of electricity.</p><p>Electricity bills are calculated based on kWh consumed.</p><p>Energy = Power  X  Time is the basic formula for electrical consumption.</p><p>Higher wattage appliances consume more electricity per hour.</p>",
    "question_index": 47
  },

    "question": "<span class=\"eqt\"><p>The following question consists of two statements  -  Assertion (A) and Reason (R). Examine these two statements carefully and select the correct answer using the codes given below.</p><p>Assertion (A): Modern currency notes and coins in India are considered \"commodity money\" because they have no intrinsic value of their own.</p><p>Reason (R): Commodity money serves as \"Legal Tender\" because its value is derived from a government decree and the public's trust in the issuing authority.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2342;&#2379; &#2325;&#2341;&#2344; &#2361;&#2376;&#2306; - &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A) &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; (R)&#2404; &#2311;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344; &#2360;&#2375; &#2342;&#2375;&#2326;&#2375;&#2306; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2325;&#2352;&#2375;&#2306;&#2360;&#2368; &#2344;&#2379;&#2335; &#2324;&#2352; &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2379; \"&#2325;&#2350;&#2379;&#2337;&#2367;&#2335;&#2368; &#2350;&#2344;&#2368;\" &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2313;&#2344;&#2325;&#2366; &#2309;&#2346;&#2344;&#2366; &#2325;&#2379;&#2312; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2350;&#2370;&#2354;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2325;&#2350;&#2379;&#2337;&#2367;&#2335;&#2368; &#2350;&#2344;&#2368; \"&#2354;&#2368;&#2327;&#2354; &#2335;&#2375;&#2306;&#2337;&#2352;\" &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2311;&#2360;&#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2310;&#2342;&#2375;&#2358; &#2324;&#2352; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2341;&#2377;&#2352;&#2367;&#2335;&#2368; &#2346;&#2352; &#2332;&#2344;&#2340;&#2366; &#2325;&#2375; &#2349;&#2352;&#2379;&#2360;&#2375; &#2360;&#2375; &#2340;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both (A) and (R) are true and (R) is the correct explanation of (A).</span><span class=\"hqt\" style=\"display:none\">(A) &#2324;&#2352; (R) &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2324;&#2352; (R) (A) &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both (A) and (R) are true but (R) is NOT the correct explanation of (A).</span><span class=\"hqt\" style=\"display:none\">(A) &#2324;&#2352; (R) &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; (R) (A) &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">(A) is true but (R) is false.</span><span class=\"hqt\" style=\"display:none\">(A) &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; (R) &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">(A) is false also (R) is false.</span><span class=\"hqt\" style=\"display:none\">(A) &#2327;&#2354;&#2340; &#2361;&#2376; &#2324;&#2352; (R) &#2349;&#2368; &#2327;&#2354;&#2340; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Assertion (A): False</p><p>Modern currency notes and coins are not commodity money.</p><p>They are Fiat Money.</p><p>Commodity money has intrinsic value (e.g., gold, silver, salt).</p><p>Fiat money has no intrinsic value but is accepted because the government declares it legal tender.</p><p>Indian currency is fiat money, not commodity money.</p><p>Reason (R): False</p><p>Commodity money does not derive its value from government decree.</p><p>Commodity money has value because the material itself has value (like gold).</p><p>What derives value from government decree and public trust is fiat money, not commodity money.</p><p>Also, \"legal tender\" status comes from government law, not from being commodity money.</p><p><b><u>Further Insights</u></b> </p><p>RBI issues currency notes under the Minimum Reserve System.</p><p>Fiat money has value because it is declared legal tender.</p><p>Commodity money includes gold, silver, copper, etc.</p><p>Representative money is backed by a commodity (e.g., gold certificates).</p><p>Legal tender means it must be accepted for payment of debts.</p>",
    "question_index": 48
  },

    "solution": "<p>The National Disaster Response Force (NDRF) celebrates its Raising Day on <b>19 January every year.</b></p><p>The NDRF was formally raised in 2006 under the provisions of the Disaster Management Act, 2005.</p><p><b>15 January</b></p><p>This is celebrated as Army Day in India.</p><p><b><u>Further Insights</u></b> </p><p>NDRF operates under the National Disaster Management Authority (NDMA).</p><p>It specializes in disaster response like floods, earthquakes, and cyclones.</p><p>NDRF battalions are drawn from various paramilitary forces.</p><p>The Disaster Management Act was enacted in 2005.</p><p>NDRF also conducts community awareness and mock drills.</p>",

    "question": "<span class=\"eqt\"><p>If a sphere of radius 14 cm is cut into 343 identical spheres, then what is the increase in the total surface area?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 14 &#2360;&#2375;&#2350;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2327;&#2379;&#2354;&#2375; &#2325;&#2379; 343 &#2360;&#2350;&#2366;&#2344; &#2327;&#2379;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2366;&#2335;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">5844&#960; cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">5844&#960; cm<sup>2</sup></span>",
      "<span class=\"eqt\">4980&#960; cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">4980&#960; cm<sup>2</sup></span>",
      "<span class=\"eqt\">4704&#960; cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">4704&#960; cm<sup>2</sup></span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>When we cut the sphere into 343 identical spheres, then also the total volume will remain same in both the cases.</p><p>As we know that volume of sphere = 4/3 &#960;R<sup>3</sup></p><p>And its surface area = 4&#960; R<sup>2</sup></p><p>Let the radius of each of the small sphere be r.</p><p>Therefore, 4/3 &#960; x 14<sup>3 </sup> = 343  x 4/3 &#960; x r<sup>3</sup></p><p>=&gt; 14<sup>3</sup> = 7<sup>3</sup>  X  r<sup>3</sup></p><p>=&gt; r = 2 cm</p><p>Now total surface area of all the 343 spheres = 343  X  4&#960;  X  2<sup>2</sup> = 5488&#960; cm<sup>2</sup></p><p>Initial surface area of the sphere = 4&#960; x 14<sup>2</sup> = 784&#960; cm<sup>2</sup></p><p>Therefore, total change in the surface area = (5488  -  784)&#960; cm<sup>2</sup> = 4704 &#960; cm<sup>2</sup></p>",

    "question": "<span class=\"eqt\"><p>If you choose to walk diagonally, instead of on the two neighboring sides of a square, how much approximate percentage of the original distance can you save?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2310;&#2346; &#2357;&#2352;&#2381;&#2327; &#2325;&#2368; &#2342;&#2379; &#2346;&#2337;&#2364;&#2379;&#2360;&#2368; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2346;&#2352; &#2330;&#2354;&#2344;&#2375; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2340;&#2367;&#2352;&#2331;&#2375; &#2330;&#2354;&#2344;&#2366; &#2330;&#2369;&#2344;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2310;&#2346; &#2350;&#2370;&#2354; &#2342;&#2370;&#2352;&#2368; &#2325;&#2366; &#2354;&#2327;&#2349;&#2327; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2348;&#2330;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p><img width=154 height=134 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p908/image002.jpg\"></p><p>Let the person has to travel from A to C</p><p>Case 1: Travelling along the sides, AB+BC = 2x</p><p>(Assuming each side to be x meters)</p><p>And case 2: Travelling along diagonal</p><p>AC = &radic;(AB<sup>2</sup> + BC<sup>2</sup>) = &radic;(x<sup>2</sup>+x<sup>2</sup>)= &radic;2x</p><p>Saved distance = 2x - &radic;2x</p><p>= 0.59x</p><p>Percentage saved = 0.59x*100/2x = 29.5 = 30% approx</p><p></p>",

    "question": "<span class=\"eqt\"><p>M and N walk along a circular track. They start at 7:00 a.m. from the same point in opposite directions. M and N walk at speeds of 4 rounds per hour and 3 rounds per hour, respectively. How many times will they cross each other before 8:30 a.m. on the same day?</p></span><span class=\"hqt\" style=\"display:none\"><p>M &#2324;&#2352; N &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2346;&#2341; &#2346;&#2352; &#2330;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2357;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344; 7:00 &#2348;&#2332;&#2375; &#2360;&#2350;&#2366;&#2344; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2342;&#2367;&#2358;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2330;&#2354;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; M &#2324;&#2352; N &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 4 &#2330;&#2325;&#2381;&#2325;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 3 &#2330;&#2325;&#2381;&#2325;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2330;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2360;&#2350;&#2366;&#2344; &#2342;&#2367;&#2344; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344; 8:30 &#2348;&#2332;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2357;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; &#2348;&#2366;&#2352; &#2319;&#2325;-&#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2346;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>Since M and N are walking in opposite directions, their relative speed is the sum of their individual speeds:</p><p>Relative speed=4+3=7 rounds per hour</p><p>Total distance they will cover together in 1.5 hours is: Relative speed  X  Time = 7  X  1.5 = 10.5 rounds</p><p>M and N will cross each other once every time they complete one round together. Since they cover a total of 10.5 rounds, the number of times they cross each other is the integer part of the total rounds, which is 10.</p>",

    "question": "<span class=\"eqt\"><p>Shikha bought a purse at 29% discount on its listed price. If no discount was given, then she would have to pay Rs.667 more. How much did she pay for the purse?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2367;&#2326;&#2366; &#2344;&#2375; &#2360;&#2370;&#2330;&#2368;&#2348;&#2342;&#2381;&#2343; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 29% &#2331;&#2370;&#2335; &#2346;&#2352; &#2319;&#2325; &#2346;&#2352;&#2381;&#2360; &#2326;&#2352;&#2368;&#2342;&#2366;&#2404; &#2351;&#2342;&#2367; &#2325;&#2379;&#2312; &#2331;&#2370;&#2335; &#2344;&#2361;&#2368;&#2306; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368;, &#2340;&#2379; &#2313;&#2360;&#2375; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; 667 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;&#2404; &#2313;&#2360;&#2344;&#2375; &#2346;&#2352;&#2381;&#2360; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2340;&#2344;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>5 men and 8 women can complete a work in 12 days working together, while 3 men and 7 women together can complete the same work in 15 days. In how many days will 11 women complete the same work?</p></span><span class=\"hqt\" style=\"display:none\"><p>5 &#2346;&#2369;&#2352;&#2369;&#2359; &#2324;&#2352; 8 &#2350;&#2361;&#2367;&#2354;&#2366;&#2319;&#2305; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 12 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2348;&#2325;&#2367; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; 3 &#2346;&#2369;&#2352;&#2369;&#2359; &#2324;&#2352; 7 &#2350;&#2361;&#2367;&#2354;&#2366;&#2319;&#2305; 15 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; 11 &#2350;&#2361;&#2367;&#2354;&#2366;&#2319;&#2305; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2375;&#2306;&#2327;&#2368;?</p></span>",

    "comp": "<p><b>Directions :</b>   Read the following passage carefully and answer the questions that follow.</p><p>In recent years, organisations across sectors have rapidly adopted artificial intelligence tools to improve efficiency, automate processes, and gain competitive advantage. From chatbots and predictive analytics to automated recruitment and decision-support systems, AI technologies promise speed and accuracy. However, the mere presence of AI tools does not guarantee meaningful transformation. Without structured oversight and strategic alignment, AI adoption often becomes fragmented, underutilised, or even risky. This growing complexity highlights the need for an AI Coordinator, an individual or role dedicated to managing, integrating, and governing AI use within organisations. AI tools are frequently introduced at the departmental level, with different teams selecting solutions based on immediate needs rather than long-term organisational goals. As a result, organisations may face duplication of tools, inconsistent data practices, and conflicting outcomes. An AI Coordinator acts as a central link, ensuring that AI initiatives align with the organisation's vision, policies, and ethical standards. By coordinating efforts across departments, this role helps transform isolated experiments into a cohesive AI strategy. Beyond coordination, ethical governance has become a critical concern in AI deployment. Issues such as algorithmic bias, data privacy, transparency, and accountability can have serious legal and reputational consequences if left unmanaged. An AI Coordinator plays a crucial role in establishing ethical frameworks, monitoring compliance, and ensuring that AI systems remain fair and explainable. This human oversight is essential, as AI tools alone cannot evaluate the social and moral implications of their own outputs. Workforce adaptation is another area where AI tools fall short without guidance. Employees often experience anxiety about job displacement or struggle to understand how AI fits into their daily responsibilities. An AI Coordinator facilitates communication, training, and change management, helping employees view AI as a collaborative partner rather than a threat. By bridging the gap between technical teams and non-technical staff, the coordinator fosters a culture of informed and responsible AI use. Furthermore, effective AI adoption requires continuous evaluation. AI systems must be regularly assessed for accuracy, relevance, and return on investment. An AI Coordinator ensures that tools are updated, risks are managed, and outcomes are measured against organisational objectives. This proactive approach prevents over-reliance on automated decisions and encourages thoughtful human intervention when necessary. In essence, while AI tools provide technological capability, they lack strategic judgment and contextual understanding. Organisations need an AI Coordinator to guide implementation, uphold ethical standards, manage human-AI interaction, and ensure sustainable value creation. In an era where AI is increasingly embedded in decision-making, coordination, not mere automation, becomes the key to responsible and effective organisational transformation.</p>",

      "Employees resist technological change"

    "solution": "<p>&#183; The correct answer is <b>(a) This task should be done by you or we will fire you.</b></p><p>&#183; The <b>subject</b> of the Active Voice is changed into <b>object</b> of the Passive voice. Also, the <b>object</b> of the Active Voice is changed is changed into <b>subject</b> of the Passive Voice.</p><p>&#183; The usage of a <b>helping verb</b> is necessary while changing the voice of the sentence from Active to Passive.</p><p>&#183; Preposition <b>\"by\"</b> is used before the object made in Passive Voice. However, it is optional in some cases.</p><p>&#183; These types of questions contain <b>Modal verbs</b> and they should be used correctly as stated below.</p><p>&#183; <b>Modal verbs</b> can be identified by the following:</p><p>o Can</p><p>o Could</p><p>o May</p><p>o Might</p><p>o Shall</p><p>o Should</p><p>o Will</p><p>o Would</p><p>o Must</p><p>o Ought to</p><p>&#183; The format of sentences containing Modal verbs in Active voice is: <b>Subject + Modal + V1 + Object.</b></p><p>&#183; Thus, in Passive voice, the format will be: <b>Subject (Objective case) + Modal + be + V3 + by + Object (Subjective case).</b></p><p>&#183; For example:</p><p>o You can do this. (Active Voice)</p><p>o This can be done by you. (Passive Voice)</p><p>&#183; The options except <b>(a)</b> don't follow the correct grammatical format of the Passive Voice.</p><p>&#183; Therefore, the correct answer is: <b>This task should be done by you or we will fire you.</b></p><p>V1 -&gt; Base form/simple form of verb, V2 -&gt; Past form of verb (-ed form or irregular verb), V3 -&gt; Past participle form of verb (-ed, -d, -t, -en, or -n), V4 -&gt; Continuous form of verb / Present participle form of verb (-ing form), V5 -&gt; Third person singular (V1+ -es or -s)</p>",

    "correct_option_id": 0,
    "solution": "<p>The most appropriate option to fill in the blank is 'have been collaborating'. \"Have been collaborating\" is the present perfect continuous tense, which is used to describe an action that started in the past and is still ongoing in the present. In the given sentence, it indicates that the team members started collaborating on the project in the past and are still collaborating on it. </p><p>Option (b) is grammatically incorrect. \"Had collaborating\" is not a valid verb form in English. The correct form is \"had collaborated,\" which is the past perfect tense. It indicates an action completed before another past action. However, this tense is not suitable for the given sentence because it doesn't convey the ongoing nature of the collaboration. </p><p>Option (c) is incorrect because \"has\" is singular, but \"team members\" is plural. The subject and verb must agree in number. </p><p>Option (d) is grammatically incorrect because \"collaborate\" is in the base form of the verb, and it should be in the present participle form \"collaborating\" to match the tense of \"have been\" (the present perfect continuous tense is formed using \"have been\" followed by the present participle (-ing form) of the verb). </p><p>Hence, (a) is the correct answer. </p><p>Note:</p><p><b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
