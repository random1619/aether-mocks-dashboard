    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In word \"ENLIGHTEN\" how many letters are there in which there is a consonant between two vowels or a vowel between two consonants.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2348;&#2381;&#2342; \"ENLIGHTEN\" &#2350;&#2375;&#2306; &#2320;&#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2342;&#2379; &#2360;&#2381;&#2357;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2381;&#2351;&#2306;&#2332;&#2344; &#2351;&#2366; &#2342;&#2379; &#2357;&#2381;&#2351;&#2306;&#2332;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2381;&#2357;&#2352; &#2350;&#2380;&#2332;&#2370;&#2342; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">One</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;</span>",
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>",
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>",
      "<span class=\"eqt\">More than Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In the word ENLIGHTEN, only the letters I and E are vowels positioned between two consonants. No consonant is placed between two vowels.</p><p>LIG, TEN.</p><p>Therefore, the required number of letters is 2.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Select the term that breaks the pattern.</p><p>288, 360, 528, 840, 968</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2379; &#2340;&#2379;&#2337;&#2364;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2342; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>288, 360, 528, 840, 968</p></span>",
    "options": [
      "<span class=\"eqt\">288</span><span class=\"hqt\" style=\"display:none\">288</span>",
      "<span class=\"eqt\">360</span><span class=\"hqt\" style=\"display:none\">360</span>",
      "<span class=\"eqt\">968</span><span class=\"hqt\" style=\"display:none\">968</span>",
      "<span class=\"eqt\">528</span><span class=\"hqt\" style=\"display:none\">528</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Logic for the given series- </p><p>17<sup>2</sup>  -  1 = 288</p><p>19<sup>2</sup>  -  1 = 360</p><p>23<sup>2</sup>  -  1 = 528</p><p>29<sup>2</sup>  -  1 = 840</p><p>31<sup>2</sup>  -  1 =<b> 960 (not 968)</b></p><p>Hence, wrong term = 968</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In a library, 20 books are arranged in a single row from left to right. The book 'Economics' is 7th from the right end. What is its position from the left end?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306;, 20 &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2375;&#2306; &#2319;&#2325; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2366;&#2319;&#2305; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2352;&#2326;&#2368; &#2361;&#2376;&#2306;&#2404; '&#2309;&#2352;&#2381;&#2341;&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;' &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2342;&#2366;&#2319;&#2305; &#2331;&#2379;&#2352; &#2360;&#2375; 7&#2357;&#2368;&#2306; &#2361;&#2376;&#2404; &#2348;&#2366;&#2319;&#2305; &#2331;&#2379;&#2352; &#2360;&#2375; &#2311;&#2360;&#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total books = 20</p><p>Position of the book from left = total &#8722; position from right + 1</p><p>=&gt; 20 &#8722; 7 + 1 = 14</p><p>So, the book is 14th from the left end.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Shweta said, \"The girl is the daughter of my mother's brother's wife.\" How is the girl related to Shweta?</p></span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2357;&#2375;&#2340;&#2366; &#2344;&#2375; &#2325;&#2361;&#2366;, \"&#2351;&#2361; &#2354;&#2337;&#2364;&#2325;&#2368; &#2350;&#2375;&#2352;&#2368; &#2350;&#2366;&#2306; &#2325;&#2375; &#2349;&#2366;&#2312; &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2325;&#2368; &#2348;&#2375;&#2335;&#2368; &#2361;&#2376;&#2404;\" &#2311;&#2360; &#2354;&#2337;&#2364;&#2325;&#2368; &#2325;&#2366; &#2358;&#2381;&#2357;&#2375;&#2340;&#2366; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2352;&#2367;&#2358;&#2381;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Niece</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2340;&#2368;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Cousin</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2330;&#2375;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Aunt</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2330;&#2368;</span>",
      "<span class=\"eqt\">Sister-in-law</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Shweta said, \"The girl is the daughter of my mother's brother's wife.\"</p><p><img width=416 height=116 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p30431/image001.png\"></p><p>That girl is the cousin of Shweta.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Eight persons- A, B, C, D, E, F, G and H are sitting around a circular table facing inside the centre. B sits second to the left of F. H sits third to the right of B. C is an immediate neighbour of H and A. G sits immediate left of E. Which of the following statement/s is/are true?</p><p>I. D is an immediate neighbour of B and F.</p><p>II. E sits second to the right of A.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2336; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; - A, B, C, D, E, F, G &#2324;&#2352; H &#2319;&#2325; &#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2350;&#2375;&#2332; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2325;&#2368; &#2323;&#2352; &#2350;&#2369;&#2326; &#2325;&#2352;&#2325;&#2375; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; B, F &#2325;&#2375; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; H, B &#2325;&#2375; &#2342;&#2366;&#2319;&#2305; &#2360;&#2375; &#2340;&#2368;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; C, H &#2324;&#2352; A &#2325;&#2366; &#2344;&#2367;&#2325;&#2335;&#2340;&#2350; &#2346;&#2337;&#2364;&#2379;&#2360;&#2368; &#2361;&#2376;&#2404; G, E &#2325;&#2375; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2336;&#2368;&#2325; &#2348;&#2366;&#2319;&#2305; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. D, B &#2324;&#2352; F &#2325;&#2366; &#2344;&#2367;&#2325;&#2335;&#2340;&#2350; &#2346;&#2337;&#2364;&#2379;&#2360;&#2368; &#2361;&#2376;&#2404;</p><p>II. E, A &#2325;&#2375; &#2342;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Eight persons- A, B, C, D, E, F, G and H are sitting around a circular table facing inside the centre.</p><p>B sits second to the left of F.</p><p>H sits third to the right of B.</p><p><img width=187 height=199 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p30431/image011.png\"></p><p>C is an immediate neighbour of H and A.</p><p><img width=192 height=215 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p30431/image012.png\"></p><p>G sits immediate left of E.</p><p><img width=208 height=218 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p30431/image013.png\"></p><p>Now, only D is remaining.</p><p><img width=216 height=217 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p30431/image014.png\"></p><p>I. D is an immediate neighbour of B and F.</p><p>II. E sits second to the right of A.</p><p>Both statements I and II are true.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 'EARTH' is coded as '1040', 'METAL' is coded as '1020'. What is code for 'SCORE' in the code language?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'EARTH' &#2325;&#2379; '1040' &#2324;&#2352; 'METAL' &#2325;&#2379; '1020' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2368; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'SCORE' &#2325;&#2366; &#2325;&#2379;&#2337; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">1200</span><span class=\"hqt\" style=\"display:none\">1200</span>",
      "<span class=\"eqt\">1160</span><span class=\"hqt\" style=\"display:none\">1160</span>",
      "<span class=\"eqt\">1080</span><span class=\"hqt\" style=\"display:none\">1080</span>",
      "<span class=\"eqt\">1310</span><span class=\"hqt\" style=\"display:none\">1310</span>"
    ],
    "correct_option_id": 0,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A (1)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B (2)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C (3)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D (4)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E (5)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">F (6)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">G (7)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">H (8)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I (9)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">J (10)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">K (11)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">L (12)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">M (13)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Z (26)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Y (25)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">X (24)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">W (23)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">V (22)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">U (21)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T (20)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S (19)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R (18)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Q (17)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P (16)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">O (15)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N (14)</td></tr></table><p>'EARTH' is coded as '1040'</p><p>E (5) + A (1) + R (18) + T (20) + H (8) = 52</p><p>52  X  20 = 1040</p><p>'METAL' is coded as '25'</p><p>M (13) + E (5) + T (20) + A (1) + L (12) = 51 </p><p>51  X  20 = 1020</p><p>For 'SCORE'-</p><p>S (19) + C (3) + O (15) + R (18) + E (5) = 60</p><p>60  X  20 = <b>1200</b></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 'FRUIT' is coded as '&#937;&#8734;&#934;&#8710;&#936;', 'LOTUS' is coded as '&copy;&#936;&#955;&#937;&#177;' and 'FROST' is coded as '&#8734;&copy;&#8710;&#937;&#955;'. What is the code for 'LIFT' in the code language?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'FRUIT' &#2325;&#2379; '&#937;&#8734;&#934;&#8710;&#936;' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306;, 'LOTUS' &#2325;&#2379; '&copy;&#936;&#955;&#937;&#177;' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2324;&#2352; 'FROST' &#2325;&#2379; '&#8734;&copy;&#8710;&#937;&#955;' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'LIFT' &#2325;&#2366; &#2325;&#2379;&#2337; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">&#934;&#177;&#8734;&#937;</span><span class=\"hqt\" style=\"display:none\">&#934;&#177;&#8734;&#937;</span>",

      "<span class=\"eqt\">&#934;&#937;&#955;&copy;</span><span class=\"hqt\" style=\"display:none\">&#934;&#937;&#955;&copy;</span>"

    "question": "<span class=\"eqt\"><p>Read the following statement carefully and identify the assumption(s) that is/are implicit.</p><p>Statement: A public library has installed self-checkout kiosks to make the book-issuing process faster.</p><p>Assumptions:</p><p>I. The librarians are slow and are the main reason for delays in issuing books.</p><p>II. The kiosks will never malfunction and will always work smoothly.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360;&#2350;&#2375;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366;&#2323;&#2306; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344;: &#2319;&#2325; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2366;&#2354;&#2351; &#2344;&#2375; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2340;&#2375;&#2332; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2375;&#2354;&#2381;&#2347;-&#2330;&#2375;&#2325;&#2310;&#2313;&#2335; &#2325;&#2367;&#2351;&#2379;&#2360;&#2381;&#2325; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2319; &#2361;&#2376;&#2306;&#2404;</p><p>&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366;&#2319;&#2306;:</p><p>I. &#2354;&#2366;&#2311;&#2348;&#2381;&#2352;&#2375;&#2352;&#2367;&#2351;&#2344; &#2343;&#2368;&#2350;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2379; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2342;&#2375;&#2352;&#2368; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2325;&#2366;&#2352;&#2339; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2325;&#2367;&#2351;&#2379;&#2360;&#2381;&#2325; &#2325;&#2349;&#2368; &#2326;&#2352;&#2366;&#2348; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2306;&#2327;&#2375; &#2324;&#2352; &#2361;&#2350;&#2375;&#2358;&#2366; &#2360;&#2369;&#2330;&#2366;&#2352;&#2370; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2366;&#2350; &#2325;&#2352;&#2375;&#2306;&#2327;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only Assumption I is implicit</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2343;&#2366;&#2352;&#2339;&#2366; I &#2361;&#2368; &#2309;&#2306;&#2340;&#2352;&#2381;&#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both Assumption I and Assumption II are implicit</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2352;&#2339;&#2366; I &#2324;&#2352; &#2343;&#2366;&#2352;&#2339;&#2366; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2309;&#2306;&#2340;&#2352;&#2381;&#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Neither Assumption I nor Assumption II is implicit</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2343;&#2366;&#2352;&#2339;&#2366; I &#2324;&#2352; &#2344; &#2361;&#2368; &#2343;&#2366;&#2352;&#2339;&#2366; II &#2309;&#2306;&#2340;&#2352;&#2381;&#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only Assumption II is implicit</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2343;&#2366;&#2352;&#2339;&#2366; II &#2361;&#2368; &#2309;&#2306;&#2340;&#2352;&#2381;&#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement: The public library has installed self-checkout kiosks to make the book-issuing process faster. This indicates that the library wants to speed up the process, not necessarily to blame anyone or guarantee perfection.</p><p>Assumption I: The statement does not assume that librarians are the main cause of delays. The kiosks could be introduced to reduce waiting time regardless of who or what causes delays. Hence, this assumption is not implicit.</p><p>Assumption II: The statement does not assume perfect functioning of kiosks. It only implies that kiosks are intended to make the process faster, even if occasional malfunctions occur. Therefore, this assumption is not implicit.</p><p>So, neither Assumption I nor Assumption II is implicit.</p>",
    "question_index": 7
  },

    "question": "<span class=\"eqt\"><p>Consider the following statement and choose the option that follows.</p><p>Statement: A company has declared 26 January as a paid holiday for all employees and the office will remain closed on that day.</p><p>Conclusions:</p><p>I. Employees will not be required to attend office on 26 January.</p><p>II. Employees will receive salary for 26 January.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2379; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344;: &#2319;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2344;&#2375; 26 &#2332;&#2344;&#2357;&#2352;&#2368; &#2325;&#2379; &#2360;&#2349;&#2368; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2357;&#2376;&#2340;&#2344;&#2367;&#2325; &#2309;&#2357;&#2325;&#2366;&#2358; &#2328;&#2379;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360; &#2342;&#2367;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2354;&#2351; &#2348;&#2306;&#2342; &#2352;&#2361;&#2375;&#2327;&#2366;&#2404;</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>I. &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; 26 &#2332;&#2344;&#2357;&#2352;&#2368; &#2325;&#2379; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2327;&#2368;&#2404;</p><p>II. &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; 26 &#2332;&#2344;&#2357;&#2352;&#2368; &#2325;&#2366; &#2357;&#2375;&#2340;&#2344; &#2350;&#2367;&#2354;&#2375;&#2327;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only conclusion II follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2361;&#2368; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Neither conclusion I nor II follows</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; &#2344; &#2361;&#2368; II &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both conclusions I and II follow</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2361;&#2368; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Only conclusion I follows</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2306; &#2325;&#2375;&#2357;&#2354; &#2311;&#2360;&#2368; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2346;&#2352; &#2346;&#2361;&#2369;&#2306;&#2330;&#2366; &#2361;&#2370;&#2305;&#2404;</span>"

    "correct_option_id": 2,
    "solution": "<p>Conclusion I follows because the office remains closed, so employees are not required to attend office that day.</p><p>Conclusion II follows because it is explicitly a paid holiday, which means salary is paid for that day.</p>",

    "question": "<span class=\"eqt\"><p><b>In a certain code language:</b></p><p>A 1 B means A is the sister of B</p><p>A 2 B means A is the paternal grandfather of B</p><p>A 5 B means A is the wife of B</p><p>A 7 B means A is the son of B</p><p>If D 1 H 7 K 5 N 2 O 7 V 5 H, then which of the following statements is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;:</b></p><p>A 1 B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; A, B &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;&#2404;</p><p>A 2 B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; A, B &#2325;&#2366; &#2342;&#2366;&#2342;&#2366; &#2361;&#2376;&#2404;</p><p>A 5 B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; A, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;&#2404;</p><p>A 7 B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; A, B &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;&#2404;</p><p>&#2351;&#2342;&#2367; D 1 H 7 K 5 N 2 O 7 V 5 H &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",

    "solution": "<p><img width=305 height=177 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23566/image037.png\"></p><p><b><img width=432 height=274 id=\"Picture 308036084\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23566/image034.png\"></b></p><p>D 1 H 7 K 5 N 2 O 7 V 5 H</p><p>D 1 H means D is the sister of H</p><p>H 7 K means H is the son of K</p><p>K 5 N means K is the wife of N</p><p>N 2 O means N is the paternal grandfather of O</p><p>O 7 V means O is the son of V</p><p>V 5 H means V is the wife of H</p><p><img width=305 height=177 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23566/image037.png\"></p><p>D is the paternal aunt of O.</p>",

    "question": "<span class=\"eqt\"><p>Which specific Article was inserted into the Indian Constitution to provide constitutional status to the NCBC (National Commission for Backward Classes)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2332;&#2379;&#2337;&#2364;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366; &#2332;&#2367;&#2360;&#2325;&#2375; &#2340;&#2361;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2346;&#2367;&#2331;&#2337;&#2364;&#2366; &#2357;&#2352;&#2381;&#2327; &#2310;&#2351;&#2379;&#2327; (&#2319;&#2344;&#2360;&#2368;&#2348;&#2368;&#2360;&#2368;) &#2325;&#2379; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2342;&#2352;&#2381;&#2332;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 338B</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 338&#2348;&#2368;</span>",
      "<span class=\"eqt\">Article 338</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 338</span>",
      "<span class=\"eqt\">Article 338A</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 338&#2319;</span>",
      "<span class=\"eqt\">Article 340</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 340</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The 102nd Constitutional Amendment Act, 2018 inserted <b>Article 338B</b> into the Constitution.</p><p>This article provides constitutional status to the National Commission for Backward Classes (NCBC).</p><p>Before this amendment, NCBC was only a statutory body (created by an Act of Parliament in 1993).</p><p><b>Article 338</b></p><p>Deals with the National Commission for Scheduled Castes (NCSC).</p><p><b>Article 338A</b></p><p>Deals with the National Commission for Scheduled Tribes (NCST).</p><p><b>Article 340</b></p><p>Provides for the appointment of a commission to investigate conditions of backward classes.</p><p><b><u>Further Insights</u></b> </p><p>The 102nd Amendment also inserted Article 342A related to SEBCs(Socially and Educationally Backward Classes)</p><p>NCBC now has powers similar to NCSC and NCST.</p><p>The President appoints the Chairperson of NCBC.</p><p>The Supreme Court interpreted the 102nd Amendment in the Maratha reservation case (2021).</p><p>The 105th Constitutional Amendment (2021) restored states' power to identify OBCs.</p>",
    "question_index": 25
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Siddi community and their traditional dance:</p><p>I. The \"Dhamal\" or \"Mashira Nritya\" is a traditional dance performed by the Siddi community, who are descendants of East Africans settled in Gujarat.</p><p>II. The dance is characterized by the use of animal skins, feathers, and a specific drum known as the Dhamal.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2367;&#2342;&#2381;&#2342;&#2368; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2344;&#2371;&#2340;&#2381;&#2351; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. \"&#2343;&#2350;&#2366;&#2354;\" &#2351;&#2366; \"&#2350;&#2358;&#2368;&#2352;&#2366; &#2344;&#2371;&#2340;&#2381;&#2351;\" &#2360;&#2367;&#2342;&#2381;&#2342;&#2368; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2344;&#2371;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2332;&#2379; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340; &#2350;&#2375;&#2306; &#2348;&#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2309;&#2347;&#2381;&#2352;&#2368;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2357;&#2306;&#2358;&#2332; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2311;&#2360; &#2344;&#2371;&#2340;&#2381;&#2351; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2346;&#2358;&#2369; &#2325;&#2368; &#2326;&#2366;&#2354;, &#2346;&#2306;&#2326; &#2324;&#2352; &#2343;&#2350;&#2366;&#2354; &#2344;&#2366;&#2350;&#2325; &#2319;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359; &#2338;&#2379;&#2354; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Siddi community are descendants of East Africans who came to India through trade, , or military service centuries ago.</p><p>They are mainly settled in:</p><p>Gujarat</p><p>Karnataka</p><p>Maharashtra</p><p>Their traditional dance is called Dhamal, also known as Mashira Nritya.</p><p>The Dhamal dance is known for:</p><p>Use of animal skins and feathers in costumes</p><p>Energetic movements</p><p>Rhythmic drumming</p><p>A special drum often referred to as the Dhamal drum</p><p>The performance reflects strong African cultural roots blended with Indian traditions.</p><p><b><u>Further Insights</u></b> </p><p>Siddis are recognized as a Scheduled Tribe in Gujarat.</p><p>Their culture reflects a mix of African and Indian traditions.</p><p>Dhamal is often performed during festivals and social gatherings.</p><p>Some Siddis historically served in royal armies of Indian rulers.</p><p>Their music strongly features drum-based rhythms.</p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>In Rajput history, what were the unique codes of chivalry where women performed self-immolation and men fought to the death during an invasion?</p></span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2346;&#2370;&#2340; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360; &#2350;&#2375;&#2306;, &#2357;&#2368;&#2352;&#2340;&#2366; &#2325;&#2375; &#2357;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2309;&#2344;&#2370;&#2336;&#2375; &#2344;&#2367;&#2351;&#2350; &#2341;&#2375;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2310;&#2325;&#2381;&#2352;&#2350;&#2339; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2344;&#2375; &#2310;&#2340;&#2381;&#2350;&#2342;&#2366;&#2361; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2344;&#2375; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2340;&#2325; &#2354;&#2337;&#2364;&#2366;&#2312; &#2354;&#2337;&#2364;&#2368;?</span>",
    "options": [
      "<span class=\"eqt\">Bhakti and Sufism</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2325;&#2381;&#2340;&#2367; &#2324;&#2352; &#2360;&#2370;&#2347;&#2368;&#2357;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Jauhar and Saka</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2380;&#2361;&#2352; &#2324;&#2352; &#2360;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Mansab and Jagir</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2344;&#2360;&#2348; &#2324;&#2352; &#2332;&#2366;&#2327;&#2368;&#2352;</span>",
      "<span class=\"eqt\">Din-i-Ilahi and Sulh-i-kul</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2368;&#2344;-&#2319;-&#2311;&#2354;&#2366;&#2361;&#2368; &#2324;&#2352; &#2360;&#2369;&#2354;&#2361;-&#2319;-&#2325;&#2369;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In medieval Rajput tradition:</p><p><b>Jauhar</b> referred to the act of mass self-immolation by Rajput women to avoid capture during enemy invasions.</p><p><b>Saka</b> referred to the act where Rajput men dressed in saffron robes and fought to the death in the final battle after Jauhar was performed.</p><p>These practices were associated with Rajput ideals of honor, bravery, and sacrifice during sieges.</p><p><b>Bhakti and Sufism</b></p><p>These were religious reform movements focused on devotion and spirituality.</p><p><b>Mansab and Jagir</b></p><p>These were administrative systems of the Mughal Empire.</p><p>Mansab = military rank system.</p><p>Jagir = land revenue assignment.</p><p><b>Din-i-Ilahi and Sulh-i-kul</b></p><p>Both were associated with Emperor Akbar.</p><p>Din-i-Ilahi was a religious experiment.</p><p>Sulh-i-kul meant universal tolerance.</p><p><b><u>Further Insights</u></b> </p><p>Jauhar was notably performed during the sieges of Chittorgarh.</p><p>Rani Padmini is often associated (though debated historically) with a famous Jauhar episode.</p><p>Saka warriors wore saffron (kesariya) as a symbol of sacrifice.</p>",
    "question_index": 27
  },
  {
    "question": "<span class=\"eqt\"><p>During the Mahajanapada period, what was the standard tax paid by farmers from their total crop production called?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2361;&#2366;&#2332;&#2344;&#2346;&#2342; &#2325;&#2366;&#2354; &#2350;&#2375;&#2306;, &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2346;&#2344;&#2368; &#2325;&#2369;&#2354; &#2347;&#2360;&#2354; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2346;&#2352; &#2309;&#2342;&#2366; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2350;&#2366;&#2344;&#2325; &#2325;&#2352; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kara</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2337;&#2364;&#2366;</span>",
      "<span class=\"eqt\">Bali</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Bhaga</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Shulka</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2354;&#2381;&#2325;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>During the Mahajanapada period (c. 600 BCE onwards), the main source of revenue for the state was land revenue.</p><p>The standard share of produce collected from farmers was called <b>Bhaga</b>.</p><p>It usually amounted to one-sixth of the total produce.</p><p><b>Kara</b></p><p>Kara was a general term for tax or tribute, often paid by subjects or conquered territories.</p><p><b>Bali</b></p><p>Bali originally meant offering or tribute, sometimes voluntary in early Vedic times.</p><p><b>Shulka</b></p><p>Shulka referred to custom duties, tolls, or trade taxes.</p><p>It was collected on goods during trade and transportation.</p><p><b><u>Further Insights </u></b></p><p>The Mahajanapada period saw the rise of territorial states with organized taxation.</p><p>Magadha became powerful partly due to efficient revenue collection.</p><p>Land revenue became the backbone of early Indian state systems.</p><p>Officials were appointed to collect taxes in organized kingdoms.</p><p>The shift from tribal assemblies to monarchies increased systematic taxation.</p>",
    "question_index": 28
  },
  {

      "<span class=\"eqt\">Centrally Sponsored Scheme</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2366;&#2351;&#2379;&#2332;&#2367;&#2340; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Public-Private Partnership</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2344;&#2367;&#2332;&#2368; &#2325;&#2306;&#2346;&#2344;&#2368; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Central Sector Scheme</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">State-funded Scheme</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2340;&#2381;&#2340; &#2346;&#2379;&#2359;&#2367;&#2340; &#2351;&#2379;&#2332;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Tex-RAMPS (Textile Sector Reforms, Assistance and Modernization for Policy Support) is a <b>Central Sector Scheme</b> launched by the Ministry of Textiles.</p><p>In a Central Sector Scheme:</p><p>The entire funding is provided by the Central Government.</p><p>Implementation is directly overseen by the Union Ministry.</p><p>Tex-RAMPS is fully funded by the Centre (with assistance from international financial institutions like the World Bank), making it a Central Sector Scheme.</p><p><b><u>Further Insights</u></b> </p><p>Tex-RAMPS aims to improve the competitiveness of the Indian textile sector.</p><p>It focuses on policy reforms and institutional strengthening.</p><p>The scheme supports research, innovation, and sustainability in textiles.</p><p>Central Sector Schemes are fully funded by the Union Government.</p><p>Centrally Sponsored Schemes require cost-sharing between Centre and States.</p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>What is the primary function of the finger-like outgrowths called \"Villi\" found on the inner walls of the small intestine?</p></span><span class=\"hqt\" style=\"display:none\">&#2331;&#2379;&#2335;&#2368; &#2310;&#2306;&#2340; &#2325;&#2368; &#2349;&#2368;&#2340;&#2352;&#2368; &#2342;&#2368;&#2357;&#2366;&#2352;&#2379;&#2306; &#2346;&#2352; &#2346;&#2366;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2313;&#2306;&#2327;&#2354;&#2368; &#2332;&#2376;&#2360;&#2375; &#2313;&#2349;&#2366;&#2352;&#2379;&#2306;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; \"&#2357;&#2367;&#2354;&#2368;\" &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">To increase the surface area for rapid absorption of digested food</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2330;&#2375; &#2361;&#2369;&#2319; &#2349;&#2379;&#2332;&#2344; &#2325;&#2375; &#2340;&#2375;&#2332;&#2368; &#2360;&#2375; &#2309;&#2357;&#2358;&#2379;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2340;&#2361; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To secrete bile for the breakdown of large fat globules</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2337;&#2364;&#2375; &#2357;&#2360;&#2366; &#2325;&#2339;&#2379;&#2306; &#2325;&#2379; &#2340;&#2379;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2367;&#2340;&#2381;&#2340; &#2325;&#2366; &#2360;&#2381;&#2352;&#2366;&#2357; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To produce pancreatic juice for the digestion of proteins</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2325;&#2375; &#2346;&#2366;&#2330;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2327;&#2381;&#2344;&#2366;&#2358;&#2351;&#2368; &#2352;&#2360; &#2325;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To move the food quickly into the large intestine through contraction</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2325;&#2369;&#2330;&#2344; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2349;&#2379;&#2332;&#2344; &#2325;&#2379; &#2358;&#2368;&#2328;&#2381;&#2352;&#2340;&#2366; &#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2310;&#2306;&#2340; &#2350;&#2375;&#2306; &#2346;&#2361;&#2369;&#2305;&#2330;&#2366;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Villi are tiny finger-like projections present in the inner lining of the small intestine.</p><p>Their main function is to:</p><p>Increase surface area</p><p>Help in rapid absorption of digested nutrients into the bloodstream</p><p><b>Each villus contains:</b></p><p>Blood capillaries (for glucose, amino acids, etc.)</p><p>Lacteals (for absorption of fats)</p><p><b>To secrete bile</b></p><p>Bile is produced by the liver and stored in the gallbladder,</p><p><b>To produce pancreatic juice</b></p><p>Pancreatic juice is produced by the pancreas, </p><p><b>To move food quickly</b></p><p>Movement of food happens due to peristalsis (muscle contractions),</p><p><b><u>Further Insights</u></b> </p><p>Microvilli are even smaller projections on villi.</p><p>The small intestine is about 6 - 7 meters long in adults.</p><p>Most digestion and absorption occur in the small intestine.</p><p>Lacteals inside villi absorb fats.</p><p>Damage to villi (e.g., in celiac disease) reduces nutrient absorption.</p>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>The northern part of the delta where river channels have shifted away is known as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2337;&#2375;&#2354;&#2381;&#2335;&#2366; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2349;&#2366;&#2327;, &#2332;&#2361;&#2366;&#2305; &#2344;&#2342;&#2368; &#2325;&#2375; &#2350;&#2366;&#2352;&#2381;&#2327; &#2348;&#2342;&#2354; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2313;&#2360;&#2375; &#2311;&#2360; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">The Upper Plains</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352;&#2368; &#2350;&#2376;&#2342;&#2366;&#2344;</span>",
      "<span class=\"eqt\">The Active Delta</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2337;&#2375;&#2354;&#2381;&#2335;&#2366;</span>",
      "<span class=\"eqt\">The Bhangar Land</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2306;&#2327;&#2352; &#2325;&#2368; &#2349;&#2370;&#2350;&#2367;</span>",
      "<span class=\"eqt\">The Moribund Delta</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2352;&#2339;&#2366;&#2360;&#2344;&#2381;&#2344; &#2337;&#2375;&#2354;&#2381;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The northern part of the Ganga - Brahmaputra delta, especially in West Bengal, is called the <b>Moribund Delta.</b></p><p>\"Moribund\" means dying or inactive.</p><p>In this region:</p><p>River channels have shifted southward.</p><p>Water flow has reduced.</p><p>Old river courses remain.</p><p>Stagnant water bodies like bils and jheels are common.</p><p><b>The Upper Plains</b></p><p>Refers to the Ganga plains, </p><p><b>The Active Delta</b></p><p>The active delta is mainly in Bangladesh, where rivers are still depositing sediments.</p><p><b>The Bhangar Land</b></p><p>Bhangar is old alluvial soil found in the northern plains.</p><p><b><u>Further Insights</u></b> </p><p>The southern part of the delta is the active delta region.</p><p>The moribund delta has poor drainage and waterlogging.</p><p>The Hooghly River flows through the western part of the delta.</p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>Where was the Ghadar Party officially founded in 1913 by Indian revolutionaries?</p></span><span class=\"hqt\" style=\"display:none\"><p>1913 &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367;&#2325;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2327;&#2364;&#2342;&#2352; &#2346;&#2366;&#2352;&#2381;&#2335;&#2368; &#2325;&#2368; &#2310;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2325; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2361;&#2366;&#2305; &#2361;&#2369;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">London</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2306;&#2342;&#2344;</span>",
      "<span class=\"eqt\">Berlin</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2352;&#2381;&#2354;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Tokyo</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2379;&#2325;&#2381;&#2351;&#2379;</span>",
      "<span class=\"eqt\">San Francisco</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2376;&#2344; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2367;&#2360;&#2381;&#2325;&#2379;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Ghadar Party was founded in 1913 in <b>San Francisco, USA</b> by Indian revolutionaries, mainly Punjabi immigrants.</p><p>It was established at the Yugantar Ashram and aimed at overthrowing British rule in India through armed revolution.</p><p>Key leaders included:</p><p>Lala Hardayal</p><p>Sohan Singh Bhakna</p><p>Kartar Singh Sarabha</p><p><b><u>Further Insights</u></b> </p><p>\"Ghadar\" means rebellion.</p><p>The party published a newspaper called Ghadar in multiple languages.</p><p>The Ghadar movement planned uprisings during World War I.</p><p>Many members returned to India to incite rebellion in 1915.</p>",
    "question_index": 32
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following pairs of Indian artists and their respective fields is NOT correctly matched?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2325;&#2354;&#2366;&#2325;&#2366;&#2352;&#2379;&#2306; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2360;&#2361;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2350;&#2375;&#2354; &#2344;&#2361;&#2368;&#2306; &#2326;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tyeb Mehta  -  Painting</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2376;&#2351;&#2348; &#2350;&#2375;&#2361;&#2340;&#2366; - &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Kelucharan Mohapatra  -  Odissi Dance</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2354;&#2369;&#2330;&#2352;&#2339; &#2350;&#2379;&#2361;&#2346;&#2366;&#2340;&#2381;&#2352;&#2366; - &#2323;&#2337;&#2367;&#2360;&#2368; &#2344;&#2371;&#2340;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Pt. Shivkumar Sharma  -  Sarod</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;. &#2358;&#2367;&#2357;&#2325;&#2369;&#2350;&#2366;&#2352; &#2358;&#2352;&#2381;&#2350;&#2366; - &#2360;&#2352;&#2379;&#2342;</span>",
      "<span class=\"eqt\">Alarmel Valli  -  Bharatanatyam</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2366;&#2352;&#2381;&#2350;&#2375;&#2354; &#2357;&#2354;&#2381;&#2354;&#2368; - &#2349;&#2352;&#2340;&#2344;&#2366;&#2335;&#2381;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Pt. Shivkumar Sharma was a legendary Santoor player, not a Sarod player.</p><p>He popularized the Santoor in Indian classical music and brought it to the Hindustani classical mainstream.</p><p><b>Tyeb Mehta  -  Painting</b></p><p>Tyeb Mehta was a renowned modern Indian painter, associated with the Progressive Artists' Group.</p><p><b>Kelucharan Mohapatra  -  Odissi Dance</b></p><p>Guru Kelucharan Mohapatra was one of the greatest exponents of Odissi classical dance.</p><p><b>Alarmel Valli  -  Bharatanatyam</b></p><p>Alarmel Valli is a distinguished Bharatanatyam dancer.</p><p><b><u>Further Insights</u></b> </p><p>The Sarod is associated with musicians like Ustad Amjad Ali Khan.</p><p>The Santoor originates from the Kashmir region.</p><p>Kelucharan Mohapatra played a key role in reviving Odissi after independence.</p><p>Tyeb Mehta's paintings are among the most expensive in Indian art auctions.</p><p>Bharatanatyam originated in Tamil Nadu.</p>",
    "question_index": 33
  },
  {
    "question": "<span class=\"eqt\"><p>Who was responsible for drafting the Indian Penal Code (IPC) in 1860, which included the first Age of Consent law?</p></span><span class=\"hqt\" style=\"display:none\"><p>1860 &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2342;&#2306;&#2337; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366; (&#2310;&#2312;&#2346;&#2368;&#2360;&#2368;) &#2325;&#2366; &#2350;&#2360;&#2380;&#2342;&#2366; &#2340;&#2376;&#2351;&#2366;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2341;&#2366;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2360;&#2361;&#2350;&#2340;&#2367; &#2325;&#2368; &#2310;&#2351;&#2369; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2361;&#2354;&#2366; &#2325;&#2366;&#2344;&#2370;&#2344; &#2358;&#2366;&#2350;&#2367;&#2354; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lord Dalhousie</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2337;&#2354;&#2361;&#2380;&#2332;&#2364;&#2368;</span>",
      "<span class=\"eqt\">Lord Curzon</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2352;&#2381;&#2332;&#2364;&#2344;</span>",
      "<span class=\"eqt\">Lord Bentinck</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2348;&#2375;&#2306;&#2335;&#2367;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Lord Macaulay</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2350;&#2376;&#2325;&#2366;&#2354;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Indian Penal Code (IPC) was drafted under the chairmanship of <b>Lord Thomas Babington Macaulay.</b></p><p>He was the head of the First Law Commission of India (1834).</p><p>Although the IPC was drafted in 1837, it was officially enacted in 1860.</p><p>The IPC included provisions related to the Age of Consent, making it one of the earliest legal frameworks addressing such issues in colonial India.</p><p><b>Lord Dalhousie</b></p><p>Known for the Doctrine of Lapse and expansion of British territories.</p><p><b>Lord Bentinck</b></p><p>Abolished Sati in 1829.</p><p>Introduced social reforms,</p><p><b>Lord Curzon</b></p><p>Known for the Partition of Bengal (1905).</p><p><b><u>Further Insights</u></b> </p><p>The IPC came into force on 1 January 1862.</p><p>It was inspired partly by English criminal law but adapted to Indian conditions.</p><p>The IPC remained in force in India until being replaced by the Bharatiya Nyaya Sanhita (2023).</p><p>Section 375 of IPC deals with rape laws.</p><p>The Age of Consent Act was later amended in 1891 to raise the age.</p>",
    "question_index": 34
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following architectural styles was primarily introduced by the Portuguese in India, especially in the churches of Goa?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2340;&#2381;&#2351; &#2358;&#2376;&#2354;&#2368; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2369;&#2352;&#2381;&#2340;&#2327;&#2366;&#2354;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306;, &#2357;&#2367;&#2358;&#2375;&#2359;&#2325;&#2352; &#2327;&#2379;&#2357;&#2366; &#2325;&#2375; &#2327;&#2367;&#2352;&#2332;&#2366;&#2328;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2354;&#2366;&#2312; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Gothic Revival and Indo-Saracenic</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2377;&#2341;&#2367;&#2325; &#2346;&#2369;&#2344;&#2352;&#2369;&#2342;&#2381;&#2343;&#2366;&#2352; &#2324;&#2352; &#2311;&#2306;&#2337;&#2379;-&#2360;&#2366;&#2352;&#2366;&#2360;&#2375;&#2344;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Baroque and Iberian</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2352;&#2379;&#2325; &#2324;&#2352; &#2311;&#2348;&#2375;&#2352;&#2367;&#2351;&#2344;</span>",
      "<span class=\"eqt\">Neoclassical and Victorian</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2357;&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2324;&#2352; &#2357;&#2367;&#2325;&#2381;&#2335;&#2379;&#2352;&#2367;&#2351;&#2344;</span>",
      "<span class=\"eqt\">Romanesque and Palladian</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2379;&#2350;&#2344;&#2360;&#2381;&#2325; &#2324;&#2352; &#2346;&#2376;&#2354;&#2375;&#2337;&#2367;&#2351;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Portuguese introduced <b>Baroque</b> architecture, which became prominent in churches of Goa such as the Basilica of Bom Jesus and S&#233; Cathedral.</p><p>Baroque style is known for:</p><p>&#183; Grand facades</p><p>&#183; Decorative interiors</p><p>&#183; Heavy ornamentation</p><p>&#183; Dramatic artistic elements</p><p>\"<b>Iberian</b>\" refers to architectural traditions from the Iberian Peninsula (Spain and Portugal). Portuguese colonial architecture in Goa reflected these influences.</p><p><b>Gothic Revival and Indo-Saracenic</b></p><p>Gothic Revival was introduced by the British in the 19th century (e.g., Mumbai University, Victoria Terminus).</p><p>Indo-Saracenic was a British fusion style combining Indian and Islamic elements.</p><p><b>Neoclassical and Victorian</b></p><p>Both styles were introduced mainly by the British during colonial rule.</p><p>Seen in buildings like Government Houses and administrative structures.</p><p><b>Romanesque and Palladian</b></p><p>These are European styles, but they were not the dominant architectural forms introduced by the Portuguese in India.</p><p>Palladian style became popular in Britain, not specifically in Portuguese India.</p><p><b><u>Further Insights </u></b></p><p>Portuguese rule in Goa began in 1510 under Afonso de Albuquerque.</p><p>Baroque architecture emphasizes movement, grandeur, and emotional appeal.</p><p>Goa was the capital of Portuguese India.</p><p>UNESCO has declared several Goa churches as World Heritage Sites.</p>",
    "question_index": 35
  },
  {
    "question": "<span class=\"eqt\"><p>What is the official weight range for a Category 3 handball used by Men's senior teams?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2368;&#2344;&#2367;&#2351;&#2352; &#2335;&#2368;&#2350;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2311;&#2360;&#2381;&#2340;&#2375;&#2350;&#2366;&#2354; &#2325;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2325;&#2376;&#2335;&#2375;&#2327;&#2352;&#2368; 3 &#2361;&#2376;&#2306;&#2337;&#2348;&#2377;&#2354; &#2325;&#2366; &#2310;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2325; &#2357;&#2332;&#2344; &#2360;&#2368;&#2350;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">325 - 375 g</span><span class=\"hqt\" style=\"display:none\">325 - 375 &#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">425 - 475 g</span><span class=\"hqt\" style=\"display:none\">425 - 475 &#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">290 - 330 g</span><span class=\"hqt\" style=\"display:none\">290 - 330 &#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">525 - 575 g</span><span class=\"hqt\" style=\"display:none\">525 - 575 &#2327;&#2381;&#2352;&#2366;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to the International Handball Federation (IHF) regulations, the size 3 handballused by men's senior and male youth teams over 16 years old must weigh between <b>425 g and 475 g.</b></p><p><b><u>Further Insights</u></b> </p><p>Handball size 3 also has a circumference of 58 - 60 cm. </p><p>Size 2 balls (325 - 375 g) are used in women's senior and men's youth categories. </p><p>Size 1 balls (290 - 330 g) are for younger youth players. </p><p>The ball surface must not be shiny or slippery to prevent loss of grip. </p><p>At least two match balls must be available during official games. </p>",
    "question_index": 36

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Responsible Nations Index (RNI) 2026:</p><p>I. It evaluates nations based on four distinct pillars, including Digital Responsibility.</p><p>II. In the inaugural edition, India has secured a position within the top 10 globally.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2340;&#2381;&#2340;&#2352;&#2342;&#2366;&#2351;&#2368; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; (&#2310;&#2352;&#2319;&#2344;&#2310;&#2312;) 2026 &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2351;&#2361; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2313;&#2340;&#2381;&#2340;&#2352;&#2342;&#2366;&#2351;&#2367;&#2340;&#2381;&#2357; &#2360;&#2361;&#2367;&#2340; &#2330;&#2366;&#2352; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2340;&#2306;&#2349;&#2379;&#2306; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2379;&#2306; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2346;&#2361;&#2354;&#2375; &#2360;&#2306;&#2360;&#2381;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2357;&#2376;&#2358;&#2381;&#2357;&#2367;&#2325; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2358;&#2368;&#2352;&#2381;&#2359; 10 &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Both statements provided are factually incorrect based on the RNI 2026 report.</p><p>Statement I mentions four pillars including \"Digital Responsibility,\" but the index actually uses three pillars: Internal, Environmental, and External Responsibility.</p><p>Statement II claims India is in the \"top 10,\" but India actually ranked 16th globally.</p><p><b><u>Further Insights:</u></b></p><p>Singapore is the world leader, holding the 1st rank in this 1st edition.</p><p>The index was launched by former President Ram Nath Kovind in New Delhi.</p><p>It aims to shift the focus of \"success\" from GDP and military power to ethical responsibility.</p><p>Major economies like the USA (66th) and China (68th) rank much lower than India.</p><p>Central African Republic is the lowest-ranked nation (154th) in the index.</p>",
    "question_index": 37

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the El Ni&#241;o and La Ni&#241;a weather patterns:</p><p>i) El Ni&#241;o is characterized as the \"Warm Phase,\" which typically results in weakened monsoons and drought-like conditions in India.</p><p>ii) La Ni&#241;a is the \"Cool Phase\" of the cycle and is generally considered unfavorable for Indian agriculture due to the extreme lack of rainfall it causes.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2354; &#2344;&#2368;&#2344;&#2379; &#2324;&#2352; &#2354;&#2366; &#2344;&#2368;&#2344;&#2366; &#2350;&#2380;&#2360;&#2350; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i) &#2309;&#2354; &#2344;&#2368;&#2344;&#2379; &#2325;&#2379; \"&#2327;&#2352;&#2381;&#2350; &#2330;&#2352;&#2339;\" &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2350;&#2332;&#2379;&#2352; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2360;&#2370;&#2326;&#2375; &#2332;&#2376;&#2360;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>ii) &#2354;&#2366; &#2344;&#2368;&#2344;&#2366; &#2330;&#2325;&#2381;&#2352; &#2325;&#2366; \"&#2358;&#2368;&#2340; &#2330;&#2352;&#2339;\" &#2361;&#2376; &#2324;&#2352; &#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2325;&#2350; &#2357;&#2352;&#2381;&#2359;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2311;&#2360;&#2375; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2325;&#2371;&#2359;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">ii only</span><span class=\"hqt\" style=\"display:none\">ii &#2325;&#2375;&#2357;&#2354;</span>",
      "<span class=\"eqt\">Both i and ii</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">Neither i nor ii</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; i &#2324;&#2352; &#2344; &#2361;&#2368; ii</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>El Ni&#241;o is the warm phase of the ENSO (El Ni&#241;o - Southern Oscillation) cycle.</p><p>It involves warming of surface waters in the central and eastern Pacific Ocean.</p><p>It usually weakens the Indian summer monsoon.</p><p>This can lead to below-normal rainfall and drought conditions in India.</p><p>La Ni&#241;a is the cool phase of ENSO.</p><p>It generally strengthens the Indian monsoon.</p><p>It often brings above-normal rainfall.</p><p>This can sometimes lead to floods, but not lack of rainfall.</p><p>So it is not associated with extreme lack of rainfall in India.</p><p><b><u>Further Insights</u></b> </p><p>ENSO stands for El Ni&#241;o - Southern Oscillation.</p><p>El Ni&#241;o years are often linked to global temperature rise.</p><p>La Ni&#241;a can increase the chances of floods in India.</p><p>ENSO affects weather patterns worldwide, not just India.</p><p>The Southern Oscillation refers to changes in air pressure patterns across the Pacific.</p>",
    "question_index": 38
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Uniform Civil Code (UCC) in India:</p><p>I. The provision for a Uniform Civil Code is enshrined under Article 48 in Part IV of the Indian Constitution.</p><p>II. Unlike Fundamental Rights, the UCC is a Directive Principle of State Policy and is therefore not enforceable by any court.</p><p>III. As of early 2026, Goa and Uttarakhand are the only Indian states to have implemented their own versions of a Uniform Civil Code.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366; (&#2351;&#2370;&#2360;&#2368;&#2360;&#2368;) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2360;&#2350;&#2366;&#2344; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2349;&#2366;&#2327; IV &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 48 &#2350;&#2375;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>II. &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340;, &#2351;&#2370;&#2360;&#2368;&#2360;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2344;&#2368;&#2340;&#2367; &#2325;&#2366; &#2319;&#2325; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2325; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2354;&#2367;&#2319; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2311;&#2360;&#2375; &#2354;&#2366;&#2327;&#2370; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. 2026 &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2340;&#2325;, &#2327;&#2379;&#2357;&#2366; &#2324;&#2352; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2326;&#2306;&#2337; &#2361;&#2368; &#2320;&#2360;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2360;&#2350;&#2366;&#2344; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366; &#2325;&#2375; &#2309;&#2346;&#2344;&#2375;-&#2309;&#2346;&#2344;&#2375; &#2360;&#2306;&#2360;&#2381;&#2325;&#2352;&#2339; &#2354;&#2366;&#2327;&#2370; &#2325;&#2367;&#2319; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II, and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Uniform Civil Code is mentioned under Article 44, not Article 48.</p><p>Article 44 (Part IV  -  Directive Principles of State Policy) says that the State shall endeavour to secure a Uniform Civil Code for citizens.</p><p>Article 48 deals with agriculture and animal husbandry.</p><p>The UCC is part of the Directive Principles of State Policy (DPSPs).</p><p>DPSPs are not enforceable by courts.</p><p>Unlike Fundamental Rights, you cannot directly approach a court to demand implementation of UCC.</p><p>Goa follows a form of Uniform Civil Code (based on the Portuguese Civil Code).</p><p>Uttarakhand became the first state post-independence to pass and implement its own UCC (2024 - 25 period).</p><p><b><u>Further Insights</u></b> </p><p>DPSPs are contained in Part IV (Articles 36 - 51) of the Constitution.</p><p>UCC relates to personal laws like marriage, divorce, inheritance, and adoption.</p><p>The Supreme Court has repeatedly emphasized the desirability of UCC in various judgments (e.g., Shah Bano case).</p><p>Goa's civil code applies uniformly to all communities.</p><p>Article 37 states that DPSPs are non-justiciable but fundamental in governance.</p>",
    "question_index": 39
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Siachen Glacier dispute:</p><p>i) The 1949 and 1972 border agreements explicitly demarcated the entire glacier territory beyond the point NJ9842.</p><p>ii) India launched \"Operation Meghdoot\" in 1984 to secure control over the Saltoro Ridge.</p><p>Which of the above statement is/are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2367;&#2351;&#2366;&#2330;&#2367;&#2344; &#2327;&#2381;&#2354;&#2375;&#2358;&#2367;&#2351;&#2352; &#2357;&#2367;&#2357;&#2366;&#2342; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i) 1949 &#2324;&#2352; 1972 &#2325;&#2375; &#2360;&#2368;&#2350;&#2366; &#2360;&#2350;&#2333;&#2380;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2367;&#2306;&#2342;&#2369; NJ9842 &#2360;&#2375; &#2310;&#2327;&#2375; &#2325;&#2375; &#2360;&#2306;&#2346;&#2370;&#2352;&#2381;&#2339; &#2327;&#2381;&#2354;&#2375;&#2358;&#2367;&#2351;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2366; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2368;&#2350;&#2366;&#2306;&#2325;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>ii) &#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2360;&#2366;&#2354;&#2381;&#2335;&#2379;&#2352;&#2379; &#2352;&#2367;&#2332; &#2346;&#2352; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 1984 &#2350;&#2375;&#2306; \"&#2321;&#2346;&#2352;&#2375;&#2358;&#2344; &#2350;&#2375;&#2328;&#2342;&#2370;&#2340;\" &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">ii only</span><span class=\"hqt\" style=\"display:none\">ii &#2325;&#2375;&#2357;&#2354;</span>",
      "<span class=\"eqt\">Both i and ii</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">Neither i nor ii</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; i &#2324;&#2352; &#2344; &#2361;&#2368; ii</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Karachi Agreement (1949) and the Shimla Agreement (1972) demarcated the Line of Control (LoC) only up to the point NJ9842.</p><p>Beyond NJ9842, the agreement mentioned:</p><p>\"thence north to the glaciers\"</p><p>It did not clearly demarcate the Siachen Glacier area.</p><p>This ambiguity later became the root cause of the Siachen dispute.</p><p>India launched Operation Meghdoot in April 1984.</p><p>The objective was to:</p><p>Preempt Pakistan's moves</p><p>Secure strategic heights along the Saltoro Ridge overlooking the Siachen Glacier</p><p>India successfully gained control over key passes like Bilafond La and Sia La.</p><p><b><u>Further Insights</u></b> </p><p>Siachen is the world's highest battlefield.</p><p>The Saltoro Ridge gives strategic advantage over the glacier.</p><p>Most casualties in Siachen are due to extreme weather, not combat.</p><p>The area lies in the eastern Karakoram Range.</p><p>The dispute is linked to differing interpretations of the LoC beyond NJ9842.</p>",
    "question_index": 40
  },

    "question": "<span class=\"eqt\"><p>Which team did Vidarbha defeat in the final to win their first-ever Vijay Hazare Trophy (2025 - 26)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2342;&#2352;&#2381;&#2349; &#2344;&#2375; &#2347;&#2366;&#2311;&#2344;&#2354; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2335;&#2368;&#2350; &#2325;&#2379; &#2361;&#2352;&#2366;&#2325;&#2352; &#2346;&#2361;&#2354;&#2368; &#2348;&#2366;&#2352; &#2357;&#2367;&#2332;&#2351; &#2361;&#2332;&#2366;&#2352;&#2375; &#2335;&#2381;&#2352;&#2377;&#2347;&#2368; (2025-26) &#2332;&#2368;&#2340;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Karnataka</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;</span>",
      "<span class=\"eqt\">Mumbai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2306;&#2348;&#2312;</span>",
      "<span class=\"eqt\">Saurashtra</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2380;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Tamil Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Vidarbha clinched their maiden Vijay Hazare Trophy title in the 2025 - 26 season by defeating Saurashtra in the final match.</p><p><b><u>Further Insights</u></b> </p><p>The final was played on 18 January 2026. </p><p>Vidarbha won by 38 runs in the final. </p><p>Atharva Taide scored a century in the final to lead Vidarbha's victory. </p><p>Aman Mokhade was the Player of the Series for the tournament. </p><p>Saurashtra finished as runner-up in the competition. </p>",
