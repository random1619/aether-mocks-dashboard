    "options": [

  {
    "question": "<span class=\"eqt\"><p>What comes next in the series?</p><p>C, E, I, Q, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2309;&#2327;&#2354;&#2366; &#2325;&#2381;&#2351;&#2366; &#2310;&#2340;&#2366; &#2361;&#2376;?</p><p>C, E, I, Q, ?</p></span>",

      "<span class=\"eqt\">T</span><span class=\"hqt\" style=\"display:none\">T</span>",

x solid black;padding:5px;\">N (14)</td></tr></table><p>Reverse value of a letter = 27 &#8722; (normal value)</p><p>All letters are taken in reverse values.</p><p>Final value = obtained sum  X  2</p><p>OCEAN: 12 + 24 + 22 + 26 + 13 = 97</p><p>97  X  2 = 194</p><p>BRISK: 25 + 9 + 18 + 8 + 16 = 76</p><p>76  X  2 = 152</p><p>PLANET: 11 + 15 + 26 + 13 + 22 + 7 = 94</p><p>94  X  2 = 188</p>",

    "question": "<span class=\"eqt\"><p>In an Inter-school Robotics Demo held daily from 4th Oct 2023 to 11th Oct 2023, the schedule (with a printing error) was:</p><p>Amravati  -  4th Oct 2023, Bastar  -  5th Oct 2023, Chennai  -  6th Oct 2023, Kalimpong  -  7th Oct 2023, Lakhisarai  -  8th Oct 2023, Mirzapur  -  9th Oct 2023, Jorapokhar  -  10th Oct 2023, Neyveli  -  11th Oct 2023.</p><p>Later it was found that the dates for Kalimpong and Jorapokhar were accidentally interchanged.</p><p>After correction, how many days after the demo in Jorapokhar did the demo in Kalimpong occur?</p></span><span class=\"hqt\" style=\"display:none\"><p>4 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2023 &#2360;&#2375; 11 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2023 &#2340;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2342;&#2367;&#2344; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2319;&#2325; &#2311;&#2306;&#2335;&#2352;-&#2360;&#2381;&#2325;&#2370;&#2354; &#2352;&#2379;&#2348;&#2379;&#2335;&#2367;&#2325;&#2381;&#2360; &#2337;&#2375;&#2350;&#2379; &#2350;&#2375;&#2306;, &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; (&#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2367;&#2306;&#2327; &#2340;&#2381;&#2352;&#2369;&#2335;&#2367; &#2325;&#2375; &#2360;&#2366;&#2341;) &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2341;&#2366;:</p><p>&#2309;&#2350;&#2352;&#2366;&#2357;&#2340;&#2368; - 4 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2023, &#2348;&#2360;&#2381;&#2340;&#2352; - 5 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2023, &#2330;&#2375;&#2344;&#2381;&#2344;&#2312; - 6 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2023, &#2325;&#2366;&#2354;&#2367;&#2350;&#2381;&#2346;&#2379;&#2306;&#2327; - 7 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2023, &#2354;&#2326;&#2368;&#2360;&#2352;&#2366;&#2351; - 8 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2023, &#2350;&#2367;&#2352;&#2381;&#2332;&#2366;&#2346;&#2369;&#2352; - 9 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2023, &#2332;&#2379;&#2352;&#2366;&#2346;&#2379;&#2326;&#2352; - 10 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2023, &#2344;&#2375;&#2351;&#2357;&#2375;&#2354;&#2368; - 11 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2023&#2404;</p><p>&#2348;&#2366;&#2342; &#2350;&#2375;&#2306; &#2346;&#2340;&#2366; &#2330;&#2354;&#2366; &#2325;&#2367; &#2325;&#2366;&#2354;&#2367;&#2350;&#2381;&#2346;&#2379;&#2306;&#2327; &#2324;&#2352; &#2332;&#2379;&#2352;&#2366;&#2346;&#2379;&#2326;&#2352; &#2325;&#2368; &#2340;&#2367;&#2341;&#2367;&#2351;&#2366;&#2305; &#2327;&#2354;&#2340;&#2368; &#2360;&#2375; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354; &#2327;&#2312; &#2341;&#2368;&#2306;&#2404;</p><p>&#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2332;&#2379;&#2352;&#2366;&#2346;&#2379;&#2326;&#2352; &#2350;&#2375;&#2306; &#2337;&#2375;&#2350;&#2379; &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344; &#2348;&#2366;&#2342; &#2325;&#2366;&#2354;&#2367;&#2350;&#2381;&#2346;&#2379;&#2306;&#2327; &#2350;&#2375;&#2306; &#2337;&#2375;&#2350;&#2379; &#2361;&#2369;&#2310;?</p></span>",
    "options": [
      "<span class=\"eqt\">5 days</span><span class=\"hqt\" style=\"display:none\">5 &#2342;&#2367;&#2344;</span>",

    "question": "<span class=\"eqt\"><p>______ is expenditure incurred for purposes other than the creation of physical or financial assets of the central government.</p></span><span class=\"hqt\" style=\"display:none\"><p>______ &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2349;&#2380;&#2340;&#2367;&#2325; &#2351;&#2366; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2360;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2375; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2309;&#2344;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2357;&#2381;&#2351;&#2351; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Capital Expenditure</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351;</span>",
      "<span class=\"eqt\">Revenue Expenditure</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351;</span>",
      "<span class=\"eqt\">Plan Expenditure</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2379;&#2332;&#2344;&#2366;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351;</span>",
      "<span class=\"eqt\">Non-plan Expenditure</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2379;&#2332;&#2344;&#2375;&#2340;&#2352; &#2357;&#2381;&#2351;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Revenue Expenditure</b> is expenditure incurred for purposes other than the creation of physical or financial assets of the central government.</p><p>It relates to those expenses incurred for the normal functioning of the government departments and various services, interest payments on debt incurred by the government, and grants given to state governments and other parties (even though some of the grants may be meant for creation of assets).</p><p></p><p>Further insights:</p><p>Capital Expenditure: This is spent on creating physical or financial assets, such as infrastructure development, building construction, or purchasing machinery.</p><p>Plan Expenditure: This refers to spending outlined in the government's five-year plans, which can include both capital and revenue expenditures.</p><p>Non-plan Expenditure: This includes expenses that are not part of the five-year plans, such as interest payments, pensions, and subsidies, but it is a broader term and not specifically defined by the absence of asset creation.</p><p></p>",
    "question_index": 25
  },

    "question": "<span class=\"eqt\"><p>Which one of the following pairs is not correctly matched?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2360;&#2361;&#2368; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Manjra  -  Godavari</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2306;&#2332;&#2352;&#2366; - &#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Tungbhadra  -  Krishna</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2369;&#2306;&#2327;&#2349;&#2342;&#2381;&#2352;&#2366; - &#2325;&#2371;&#2359;&#2381;&#2339;&#2366;</span>",
      "<span class=\"eqt\">Bhavani  -  Kaveri</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2357;&#2366;&#2344;&#2368; - &#2325;&#2366;&#2357;&#2375;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Bhima  -  Godavari</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2368;&#2350; - &#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Koyna, the Tungbhadra and the Bhima are the major tributaries of the river Krishna. It is the second largest eastflowing Peninsular river which rises near Mahabaleshwar in Sahyadri.</p><p>The Godavari is the largest Peninsular river system. It is also called the Dakshin Ganga. It rises in the Nasik district of Maharashtra and discharges its water into the Bay of Bengal. The Penganga, the Indravati, the Pranhita, and the Manjra are its principal tributaries.</p><p>The Kaveri rises in Brahmagiri hills of Kogadu district in Karnataka. Its important tributaries are the Kabini, the Bhavani and the Amravati.</p>",
    "question_index": 27
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about Group of Monuments at Hampi:</p><p>I. It is located on the banks of the Tungabhadra River.</p><p>II. The Virupaksha Temple within the site is the oldest functioning temple, dating back to the 7th century CE.</p><p>III. The Stone Chariot at Hampi served as a ceremonial vehicle that was actually moved during royal processions.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2350;&#2381;&#2346;&#2368; &#2350;&#2375;&#2306; &#2360;&#2381;&#2350;&#2366;&#2352;&#2325;&#2379;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2351;&#2361; &#2340;&#2369;&#2306;&#2327;&#2349;&#2342;&#2381;&#2352;&#2366; &#2344;&#2342;&#2368; &#2325;&#2375; &#2340;&#2335; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>II. &#2311;&#2360; &#2360;&#2381;&#2341;&#2354; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2357;&#2367;&#2352;&#2369;&#2346;&#2366;&#2325;&#2381;&#2359; &#2350;&#2306;&#2342;&#2367;&#2352; &#2360;&#2348;&#2360;&#2375; &#2346;&#2369;&#2352;&#2366;&#2344;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2352;&#2340; &#2350;&#2306;&#2342;&#2367;&#2352; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; 7&#2357;&#2368;&#2306; &#2358;&#2340;&#2366;&#2348;&#2381;&#2342;&#2368; &#2312;. &#2325;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2361;&#2350;&#2381;&#2346;&#2368; &#2350;&#2375;&#2306; &#2346;&#2340;&#2381;&#2341;&#2352; &#2325;&#2366; &#2352;&#2341; &#2319;&#2325; &#2324;&#2346;&#2330;&#2366;&#2352;&#2367;&#2325; &#2357;&#2366;&#2361;&#2344; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2341;&#2366; &#2332;&#2367;&#2360;&#2375; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357; &#2350;&#2375;&#2306; &#2358;&#2366;&#2361;&#2368; &#2332;&#2369;&#2354;&#2370;&#2360;&#2379;&#2306; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2354;&#2375; &#2332;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements I and II are correct.</p><p>Statement III is incorrect because the Stone Chariot is a stationary shrine and was not designed to be moved.</p><p>Statement I is Correct. The Group of Monuments at Hampi are the ruins of Vijayanagara, which was the capital of the historic Vijayanagara Empire (c. 1336-1646 CE). The vast and impressive site is located in the state of Karnataka, on the southern bank of the Tungabhadra River.</p><p>Statement II is Correct. 2 is Correct. The Virupaksha Temple, dedicated to a form of Lord Shiva, is the main center of pilgrimage at Hampi and has been an active, uninterrupted place of worship for centuries. While the current grand temple complex was extensively built by the Vijayanagara rulers, historical evidence and inscriptions indicate that the shrine's origins predate the empire, with a history of worship at the site tracing back to as early as the 7th century CE.</p><p>Statement III is Incorrect. The famous Stone Chariot, located in the courtyard of the Vittala Temple complex, is one of Hampi's most iconic monuments. However, it is a shrine dedicated to Garuda (the vehicle of Lord Vishnu), built in the form of a chariot. It is a stationary architectural feature and was not a ceremonial vehicle intended to be moved. While its stone wheels were ingeniously carved to be able to rotate, the structure itself was never pulled or used in processions.</p><p><b>Further Insights:</b></p><p>Hampi is a UNESCO World Heritage Site, recognized for its exceptional Dravidian temple architecture, monolithic sculptures, and royal complexes.</p><p>The site is spread over a large area and is known for its unique boulder-strewn landscape, which was integrated into the city's design and fortifications.</p><p>The Vittala Temple complex, which houses the Stone Chariot, is particularly renowned for its musical pillars, which are carved stone columns that produce musical notes when tapped.</p><p></p><p></p><p></p><p></p>",
    "question_index": 28
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following group is also called alkali metals?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2350;&#2370;&#2361; &#2325;&#2379; &#2325;&#2381;&#2359;&#2366;&#2352; &#2343;&#2366;&#2340;&#2369; &#2349;&#2368; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">7A</span><span class=\"hqt\" style=\"display:none\">7A</span>",
      "<span class=\"eqt\">8A</span><span class=\"hqt\" style=\"display:none\">8A</span>",
      "<span class=\"eqt\">2A</span><span class=\"hqt\" style=\"display:none\">2A</span>",
      "<span class=\"eqt\">1A</span><span class=\"hqt\" style=\"display:none\">1A</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Group 1A is also known as the alkali metals. Although most metals tend to be very hard, these metals are actually soft and can be easily cut.</p><p>Group 2A is also called the alkaline earth metals.</p><p>Group 7A (or 17) elements are also called halogens.</p><p>The noble gases are in group 8A.</p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a group of primitive vertebrates having a large jawless sucking mouth, no limbs or paired fins and a completely cartilaginous skeleton with a persistent notochord?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2310;&#2342;&#2367;&#2350; &#2325;&#2358;&#2375;&#2352;&#2369;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2361;&#2376; &#2332;&#2367;&#2344;&#2325;&#2366; &#2350;&#2369;&#2306;&#2361; &#2348;&#2367;&#2344;&#2366; &#2332;&#2348;&#2396;&#2379;&#2306; &#2325;&#2366; &#2319;&#2325; &#2348;&#2337;&#2364;&#2366; &#2330;&#2370;&#2359;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2325;&#2379;&#2312; &#2346;&#2366;&#2342; (&#2346;&#2376;&#2352;) &#2351;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350;&#2367;&#2340; &#2346;&#2306;&#2326; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2319;&#2325; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2346;&#2371;&#2359;&#2381;&#2336;&#2352;&#2332;&#2381;&#2332;&#2369; &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2313;&#2346;&#2366;&#2360;&#2381;&#2341;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2306;&#2325;&#2366;&#2354; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cyclostomata</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2311;&#2325;&#2381;&#2354;&#2379;&#2360;&#2381;&#2335;&#2379;&#2350;&#2375;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Aschelminthes</span><span class=\"hqt\" style=\"display:none\">&#2320;&#2360;&#2381;&#2325;&#2375;&#2354;&#2350;&#2367;&#2344;&#2381;&#2341;&#2368;&#2332;&#2364;</span>",
      "<span class=\"eqt\">Hemichordata</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2350;&#2368;&#2325;&#2377;&#2352;&#2381;&#2337;&#2375;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Arthropoda</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2381;&#2352;&#2379;&#2346;&#2379;&#2337;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183;<b>Cyclostomata</b> is a class or order of primitive vertebrates that have a large jawless sucking mouth, no limbs or paired fins, a wholly cartilaginous skeleton with persistent notochord, and 6 to 14 pairs of gill pouches and that include the lampreys and the hagfishes.</p><p>&#183;All living members of this class are ectoparasites on some fishes. Circulation is of closed type. Cyclostomes are marine but migrate for spawning to fresh water.</p><p>&#183;After spawning, within a few days, they die. Their larvae, after metamorphosis, return to the ocean.</p><p></p><p>Further insights:</p><p>&#183;Aschelminthes: Also known as roundworms, they are unsegmented, bilaterally symmetrical, and pseudocoelomate animals with a simple body structure.</p><p>&#183; Hemichordata: Marine organisms with a body divided into proboscis, collar, and trunk, exhibiting features intermediate between non-chordates and chordates.</p><p>&#183; Arthropoda: The largest animal phylum, characterized by a segmented body, jointed appendages, and an exoskeleton made of chitin.</p>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the correct option regarding the Vijayanagara empire during medieval times. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2343;&#2381;&#2351;&#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rayas were the rulers and Nayakas were the priestly class.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2351;&#2366; &#2358;&#2366;&#2360;&#2325; &#2341;&#2375; &#2324;&#2352; &#2344;&#2366;&#2351;&#2325; &#2346;&#2369;&#2352;&#2379;&#2361;&#2367;&#2340; &#2357;&#2352;&#2381;&#2327; &#2341;&#2375;&#2404;</span>",
      "<span class=\"eqt\">Rayas were the rulers and Nayakas were military chiefs.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2351;&#2366; &#2358;&#2366;&#2360;&#2325; &#2341;&#2375; &#2324;&#2352; &#2344;&#2366;&#2351;&#2325; &#2360;&#2376;&#2344;&#2381;&#2351; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2341;&#2375;&#2404;</span>",
      "<span class=\"eqt\">Rayas were treasurers and Nayakas were court historians.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2351;&#2366; &#2325;&#2379;&#2359;&#2366;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2341;&#2375; &#2324;&#2352; &#2344;&#2366;&#2351;&#2325; &#2342;&#2352;&#2348;&#2366;&#2352;&#2368; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360;&#2325;&#2366;&#2352; &#2341;&#2375;&#2404;</span>",
      "<span class=\"eqt\">Rayas were court historians and Nayakas were treasurers.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2351;&#2366; &#2342;&#2352;&#2348;&#2366;&#2352;&#2368; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360;&#2325;&#2366;&#2352; &#2341;&#2375; &#2324;&#2352; &#2344;&#2366;&#2351;&#2325; &#2325;&#2379;&#2359;&#2366;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2341;&#2375;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to tradition and epigraphic evidence two brothers, Harihara and Bukka, founded the Vijayanagara Empire in 1336. This empire included within its fluctuating frontiers peoples who spoke different languages and followed different religious traditions. <b>The rulers of Vijayanagara called themselves Rayas.</b></p><p>Among those who exercised power in the empire were <b>military chiefs </b>who usually controlled forts and had armed supporters. These chiefs often moved from one area to another, and in many cases were accompanied by peasants looking for fertile land on which to settle. <b>These chiefs were known as Nayakas,</b> and they usually spoke Telugu or Kannada. Many Nayakas submitted to the authority of the kings of Vijayanagara but they often rebelled and had to be subdued by military action. </p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not a part of the original jurisdiction of the Supreme Court?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2350;&#2370;&#2354; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Disputes between the center and the states.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2367;&#2357;&#2366;&#2342;&#2404;</span>",
      "<span class=\"eqt\">Disputes between two or more states.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2351;&#2366; &#2342;&#2379; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2367;&#2357;&#2366;&#2342;&#2404;</span>",
      "<span class=\"eqt\">Enforcement of Fundamental Rights.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2357;&#2352;&#2381;&#2340;&#2344;&#2404;</span>",
      "<span class=\"eqt\">Recovery of damages by a state against the Centre.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2325;&#2375; &#2357;&#2367;&#2352;&#2369;&#2342;&#2381;&#2343; &#2325;&#2381;&#2359;&#2340;&#2367;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Recovery of damages by a state against the Centre is not a part of the original jurisdiction of the Supreme Court.</p><p>The Supreme Court has original, appellate and advisory jurisdiction.</p><p>Its exclusive original jurisdiction extends to</p><p>- any dispute between the Government of India and one or more States or between the Government of India and any State or States on one side and one or more States on the other or between two or more States, if and insofar as the dispute involves any question (whether of law or of fact) on which the existence or extent of a legal right depends.</p><p>- In addition, Article 32 of the Constitution gives an extensive original jurisdiction to the Supreme Court in regard to enforcement of Fundamental Rights.</p><p></p><p>Source: Supreme Court Website.</p>",
    "question_index": 32
  },

    "question": "<span class=\"eqt\"><p>Hemis festival is celebrated in the Hemis monastery in Ladakh during ___ period.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2375;&#2350;&#2367;&#2360; &#2350;&#2361;&#2379;&#2340;&#2381;&#2360;&#2357; ___ &#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2354;&#2342;&#2381;&#2342;&#2366;&#2326; &#2325;&#2375; &#2361;&#2375;&#2350;&#2367;&#2360; &#2350;&#2336; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">Autumn</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2352;&#2342;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Hemis festival is celebrated in the Hemis monastery in Ladakh during the <b>monsoon</b> period. It is celebrated to mark the birth of Guru Padmasambhava and the festivities last for a period of two days.</p><p>The entire monastery is adorned with flowers and drapes for this celebration and the handicrafts of the area are showcased during this time. The festivities include singing, handicrafts and the famous Chham Dance.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following Mahajanapadas was monarchical in nature?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2361;&#2366;&#2332;&#2344;&#2346;&#2342; &#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2340;&#2306;&#2340;&#2381;&#2352;&#2368;&#2351; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Assaka</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2366;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Gandhara</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2306;&#2343;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Malla</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2354;&#2381;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Vajji</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2332;&#2381;&#2332;&#2367;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>There were sixteen Mahajanapadas out of which some were monarcheal in nature and some were republics. The sixteen mahajanapadas are - Anga, Magadha, Kasi, Kosala, Yajji, Malla, Chhedi, Yamsa, Kuru, Pancala, Maccha, Surasena, Assaka, Avanti, Gandhara, and Kamboja. </p><p>&bull; <b>Mahajanapadas which were monarchial in nature- Gandhara</b>, Kamboja, Kashi, Vatsa, Avanti, Chedi, Kuru, Panchala, Matsya, Anga, Kosala, Magadha and Surasena.</p><p>&bull; Mahajanapadas which were republics -Assaka, Malla &amp; Vajji.</p>",
    "question_index": 35
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is/are the impact(s) of Green revolution in India?</p><p>I. Self-sufficiency in food grain production.</p><p>II. Mono-cropping pattern.</p><p>III. Reduction in regional disparities.</p><p>Select the correct answer using the code below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2361;&#2352;&#2367;&#2340; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367; &#2325;&#2366;/&#2325;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2326;&#2366;&#2342;&#2381;&#2351;&#2366;&#2344;&#2381;&#2344; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2350;&#2375;&#2306; &#2310;&#2340;&#2381;&#2350;&#2344;&#2367;&#2352;&#2381;&#2349;&#2352;&#2340;&#2366;&#2404;</p><p>II. &#2350;&#2379;&#2344;&#2379;-&#2325;&#2381;&#2352;&#2377;&#2346;&#2367;&#2306;&#2327; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344;&#2404;</p><p>III. &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2368;&#2351; &#2309;&#2360;&#2350;&#2366;&#2344;&#2340;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Food production increased in such a way (wheat in 1960s and rice, by 1970s) that many countries became self-sufficient.</p><p>Green revolution was concentrated in North west India (Punjab, Haryana, UP) due to availability of rich water sources. Thus, it increased the income of farmers in this region especially the large farmers than small farmers as it required huge input cost. This increased the inter-personal as well as inter-regional disparities/inequalities in India. <b>Hence, statement III is incorrect.</b> </p><p>Also, High Yield variety seeds were available only to wheat and rice, this marginalised the crop rotation practice and promoted the mono-cropping of wheat and rice. This also had ecological impacts on the soil as well. <b>Hence, statement I and II are correct.</b></p><p>Source: Indian Economy by Ramesh Singh.</p>",
    "question_index": 36
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is true regarding 'primary deficit' in budgeting?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2332;&#2335;&#2344; &#2350;&#2375;&#2306; '&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2328;&#2366;&#2335;&#2375;' &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Primary deficit = Fiscal deficit  -  interest payments</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2328;&#2366;&#2335;&#2366; = &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2366; - &#2348;&#2381;&#2351;&#2366;&#2332; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Primary deficit = Capital expenditure  -  Capital receipts</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2328;&#2366;&#2335;&#2366; = &#2346;&#2370;&#2305;&#2332;&#2368;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351; - &#2346;&#2370;&#2305;&#2332;&#2368;&#2327;&#2340; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2366;&#2305;</span>",
      "<span class=\"eqt\">Primary deficit = Total expenditure  -  (Revenue receipts + Non-debt creating capital receipts)</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2328;&#2366;&#2335;&#2366; = &#2325;&#2369;&#2354; &#2357;&#2381;&#2351;&#2351; - (&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2366;&#2306; + &#2327;&#2376;&#2352; &#2315;&#2339;-&#2360;&#2352;&#2381;&#2332;&#2325; &#2346;&#2370;&#2305;&#2332;&#2368;&#2327;&#2340; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2366;&#2305;)</span>",
      "<span class=\"eqt\">Primary deficit = Total Expenditure  -  Total Revenue</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2328;&#2366;&#2335;&#2366; = &#2325;&#2369;&#2354; &#2357;&#2381;&#2351;&#2351; - &#2325;&#2369;&#2354; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Primary Deficit is the difference between the current year's fiscal deficit and the interest paid on the borrowings of the previous year. </p><p>&#183; <b>Primary deficit = Fiscal deficit  -  interest payments</b>.</p><p>&#183; It indicates the borrowing requirements of the government, by not taking into account the expenditure incurred on interest payments. </p><p>&#183; Fiscal deficit = Total expenditure  -  (Revenue receipts + Non-debt creating capital receipts).</p>",
    "question_index": 37
  },

    "question": "<span class=\"eqt\"><p>When was the first ever cricket ODI match played?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2361;&#2354;&#2366; &#2319;&#2325; &#2342;&#2367;&#2357;&#2360;&#2368;&#2351; &#2309;&#2306;&#2340;&#2352;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; (ODI) &#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2350;&#2376;&#2330; &#2325;&#2348; &#2326;&#2375;&#2354;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",

    "solution": "<p>The first ODI was played on 5 January 1971 between Australia and England at the Melbourne Cricket Ground. When the first three days of the third Test were washed out officials decided to abandon the match and, instead, play a one-off one day game consisting of 40 eight-ball overs per side.</p>",

    "question": "<span class=\"eqt\"><p>Part XV of the constitution of India deals with:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2349;&#2366;&#2327; XV ___ &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",

    "solution": "<p>Part XV (Article 324 - 329) of the constitution of India deals with the <b>Elections and the Election Commission of India.</b> </p><p>The elections to the House of the People and to the Legislative Assembly of every State shall be on the basis of adult suffrage; that is to say, every person who is a citizen of India and who is not less than eighteen years of age on such date as may be fixed in that behalf by or under any law made by the parliament.</p>",

    "question": "<span class=\"eqt\"><p>In September 2025, where did the Border Security Force (BSF) establish India's first dedicated drone warfare school?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2367;&#2340;&#2306;&#2348;&#2352; 2025 &#2350;&#2375;&#2306;, &#2360;&#2368;&#2350;&#2366; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2348;&#2354; (BSF) &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2360;&#2350;&#2352;&#2381;&#2346;&#2367;&#2340; &#2337;&#2381;&#2352;&#2379;&#2344; &#2351;&#2369;&#2342;&#2381;&#2343; &#2360;&#2381;&#2325;&#2370;&#2354; &#2325;&#2361;&#2366;&#2305; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>India's first dedicated School of Drone Warfare for the Border Security Force (BSF) has been established at the BSF Officers' Training Academy in Tekanpur, near Gwalior in Madhya Pradesh. It was inaugurated in 2025 and will train personnel in drone operations, counter-drone tactics, surveillance, and related technology as part of modern border security preparedness.</p><p></p><p><b>Further Insights</b></p><p>The BSF school equips officers and jawans with training in UAV operations and counter-drone tactics.</p><p>It includes facilities for simulators, live flying zones, and night operations.</p><p>The school was opened in response to evolving UAV threats along borders after incidents like Operation Sindoor.</p><p>India is strengthening drone capabilities across all armed and paramilitary forces.</p><p>The BSF also raised a dedicated drone squadron alongside the school.</p><p></p>",

    "question": "<span class=\"eqt\"><p>Given below are the statements in Assertion (A) and Reason (R). Choose the correct option:</p><p>Assertion (A): The 'Bharat-VISTAAR' platform, launched in February 2026, is designed as a \"Voice-First AI\" digital public infrastructure to ensure inclusivity for farmers across India.</p><p>Reason (R): By utilizing a telephonic helpline (155261) and voice input-output features, the platform enables farmers with simple feature phones to access critical agricultural data without needing a smartphone or internet.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344; Assertion (A) &#2324;&#2352; Reason (R) &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:</p><p>Assertion (A): '&#2349;&#2366;&#2352;&#2340;-&#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352;' &#2346;&#2381;&#2354;&#2375;&#2335;&#2347;&#2377;&#2352;&#2381;&#2350;, &#2332;&#2379; &#2347;&#2352;&#2357;&#2352;&#2368; 2026 &#2350;&#2375;&#2306; &#2354;&#2377;&#2344;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;, &#2319;&#2325; \"&#2357;&#2377;&#2311;&#2360;-&#2347;&#2352;&#2381;&#2360;&#2381;&#2335; &#2319;&#2310;&#2312;\" &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2309;&#2357;&#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2337;&#2367;&#2332;&#2364;&#2366;&#2311;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2340;&#2366;&#2325;&#2367; &#2346;&#2370;&#2352;&#2375; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2366;&#2357;&#2375;&#2358;&#2344; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2375;&#2404;</p><p>Reason (R): &#2335;&#2375;&#2354;&#2368;&#2347;&#2379;&#2344;&#2367;&#2325; &#2361;&#2375;&#2354;&#2381;&#2346;&#2354;&#2366;&#2311;&#2344; (155261) &#2324;&#2352; &#2357;&#2377;&#2311;&#2360; &#2311;&#2344;&#2346;&#2369;&#2335;-&#2310;&#2313;&#2335;&#2346;&#2369;&#2335; &#2347;&#2368;&#2330;&#2352;&#2381;&#2360; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375;, &#2351;&#2361; &#2346;&#2381;&#2354;&#2375;&#2335;&#2347;&#2377;&#2352;&#2381;&#2350; &#2360;&#2352;&#2354; &#2347;&#2368;&#2330;&#2352; &#2347;&#2379;&#2344; &#2357;&#2366;&#2354;&#2375; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2381;&#2350;&#2366;&#2352;&#2381;&#2335;&#2347;&#2379;&#2344; &#2351;&#2366; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2325;&#2371;&#2359;&#2367; &#2337;&#2375;&#2335;&#2366; &#2340;&#2325; &#2346;&#2361;&#2369;&#2306;&#2330;&#2344;&#2375; &#2350;&#2375;&#2306; &#2360;&#2325;&#2381;&#2359;&#2350; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; A &#2324;&#2352; R &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; A &#2324;&#2352; R &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, but R is false.</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2361;&#2368; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2327;&#2354;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true.</span><span class=\"hqt\" style=\"display:none\">A &#2327;&#2354;&#2340; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2361;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Assertion is correct because Bharat-VISTAAR aims for a \"digital revolution\" that is accessible to all. The Reason correctly explains how it achieves this inclusivity-by removing the barrier of high-end technology (smartphones/apps) and allowing access through basic telephony, which is crucial for reaching the \"last mile\" farmer.</p><p></p><p>Union Minister Shivraj Singh Chouhan launched the AI-based digital platform 'Bharat-VISTAAR' in Jaipur, Rajasthan, on February 17, 2026. Developed under the guidance of Narendra Modi, the platform aims to make Indian agriculture smarter by providing farmers with integrated information on weather, market prices, pests and diseases, soil health, crop management, and major government schemes.</p><p>Designed as a farmer-centric, AI-powered Digital Public Infrastructure (DPI), Bharat-VISTAAR operates on a Voice-First AI model, allowing even feature phone users to access services through a telephonic helpline (155261), chatbots, website, and a forthcoming mobile app. In Phase-1, the platform will be available in Hindi and English and will initially cover states such as Maharashtra, Bihar, and Gujarat.</p><p>Bharat-VISTAAR integrates data from agencies like the India Meteorological Department (IMD), AgMarkNet, and the National Pest Surveillance System (NPSS), enabling farmers to access reliable, secure, and consolidated agricultural information on a single platform.</p><p>On the same occasion, the 'AI for Agriculture Roadmap' was launched, and announcements regarding 'AI Hackathon' and 'AgriKosh' were made.</p><p></p>",
    "question_index": 41
  },

    "question": "<span class=\"eqt\"><p>Which article of the Indian Constitution establishes the Supreme Court of India?</p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 345</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 345</span>",
      "<span class=\"eqt\">Article 124</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 124</span>",
      "<span class=\"eqt\">Article 248</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 248</span>",
      "<span class=\"eqt\">Article 370</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 370</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Article 124 of the Indian Constitution establishes the Supreme Court of India as the highest judicial body in the country.</p><p>- It defines the composition, appointment, and jurisdiction of the Supreme Court.</p><p>- It states the number of judges, qualifications for appointment, and the procedure for appointment, including the roles of the President and the Chief Justice of India.</p><p>- Additionally, Article 124 outlines the powers and functions of the Supreme Court, including its authority to interpret the Constitution and act as the guardian of fundamental rights.</p><p></p><p>Further insights:</p><p>Article 345: This article empowers state legislatures to adopt any one or more of the languages in use in the state or Hindi as their official language.</p><p>Article 248: This article grants Parliament the exclusive power to make laws on any matter not enumerated in the Concurrent List or State List.</p><p>Article 370:Special Status for Jammu and Kashmir: This article, now repealed, granted special autonomous status to the state of Jammu and Kashmir.</p>",
    "question_index": 43
  },
  {
    "question": "<span class=\"eqt\"><p>In October 2025, which country announced the 'K Visa' to attract global science and technology professionals without requiring a prior job invitation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2025 &#2350;&#2375;&#2306;, &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2344;&#2375; &#2357;&#2376;&#2358;&#2381;&#2357;&#2367;&#2325; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2324;&#2352; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2346;&#2375;&#2358;&#2375;&#2357;&#2352;&#2379;&#2306; &#2325;&#2379; &#2348;&#2367;&#2344;&#2366; &#2346;&#2370;&#2352;&#2381;&#2357; &#2344;&#2380;&#2325;&#2352;&#2368; &#2344;&#2367;&#2350;&#2306;&#2340;&#2381;&#2352;&#2339; &#2325;&#2375; &#2310;&#2325;&#2352;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 'K &#2357;&#2368;&#2332;&#2366;' &#2325;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Germany</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2352;&#2381;&#2350;&#2344;&#2368;</span>",
      "<span class=\"eqt\">United States</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351;</span>",
      "<span class=\"eqt\">China</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Japan</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2346;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>China has introduced a new K Visa programme aimed at attracting foreign science, technology, engineering, and mathematics (STEM) professionals from around the world. This visa allows eligible applicants to enter and stay in China to pursue scientific and technological work without needing a prior job offer or employer sponsorship - a significant departure from traditional visa requirements.</p><p></p><p><b>Further Insights </b></p><p>China's K Visa is targeted especially at STEM professionals to help boost innovation and retain global talent.</p><p>The visa allows foreigners to enter China and explore employment or research without a local sponsor.</p><p>It was launched amid tighter visa rules for the US tech workforce, prompting global talent to consider alternatives.</p><p>The K Visa expands Chinas efforts to internationalise its scientific workforce.</p><p>This initiative also reflects Chinas broader strategy to compete in global technology leadership.</p><p></p>",
    "question_index": 44

    "question": "<span class=\"eqt\"><p>Which of the following statements regarding the cloud forms is/are correct</p><p>A. Cirrus are high altitude detached clouds.</p><p>B. Altostratus are thin sheets of grey or blue coloured clouds.</p><p>C. Altocumulus are characterized by wavy layers of round form.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2375;&#2328;&#2379;&#2306; &#2325;&#2375; &#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;:</p><p>A. &#2346;&#2325;&#2381;&#2359;&#2366;&#2349; &#2350;&#2375;&#2328; &#2313;&#2330;&#2381;&#2330; &#2314;&#2305;&#2330;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; &#2348;&#2367;&#2326;&#2352;&#2375; &#2361;&#2369;&#2319; &#2348;&#2366;&#2342;&#2354; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>B. &#2350;&#2343;&#2381;&#2351;&#2360;&#2381;&#2340;&#2352;&#2368; &#2350;&#2375;&#2328; (&#2310;&#2354;&#2381;&#2335;&#2379;&#2360;&#2381;&#2335;&#2381;&#2352;&#2375;&#2335;&#2360;) &#2349;&#2370;&#2352;&#2375; &#2351;&#2366; &#2344;&#2368;&#2354;&#2375; &#2352;&#2306;&#2327; &#2325;&#2375; &#2348;&#2366;&#2342;&#2354;&#2379;&#2306; &#2325;&#2368; &#2346;&#2340;&#2354;&#2368; &#2330;&#2366;&#2342;&#2352; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>C. &#2350;&#2343;&#2381;&#2351;&#2325;&#2346;&#2366;&#2360;&#2368; &#2350;&#2375;&#2328; (&#2310;&#2354;&#2381;&#2335;&#2379;&#2325;&#2381;&#2351;&#2370;&#2350;&#2381;&#2351;&#2354;&#2360;) &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2327;&#2379;&#2354; &#2310;&#2325;&#2366;&#2352; &#2325;&#2368; &#2354;&#2361;&#2352;&#2342;&#2366;&#2352; &#2346;&#2352;&#2340;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404;</p></span>",

    "solution": "<p><b>Cirrus</b> - They are high altitude detached clouds.</p><p><b>Altostratus</b> - They are thin sheets of grey or blue coloured clouds having uniform appearance.</p><p><b>Altocumulus</b> - They are characterized by wavy layers of round form.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following about soil formation.</p><p></p><p>I. Soils don't contain the organic matter at all.</p><p></p><p>II. Dissimilar bedrocks may have similar soils.</p><p></p><p>Which of the above statements is/are incorrect?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2371;&#2342;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>I. &#2350;&#2371;&#2342;&#2366; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2348;&#2367;&#2354;&#2381;&#2325;&#2369;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2310;&#2343;&#2366;&#2352; &#2358;&#2376;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2350;&#2371;&#2342;&#2366; &#2361;&#2379; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is incorrect and II is correct: Soil is a mixture of organic matter, minerals, gases, liquids, and organisms that together support life. There can be differences in soil over similar bedrock and dissimilar bedrocks may have similar soils above them.</p><p></p><p>Nature of weathering, rate and depth of weathering, parent materials are important factors in soil formation, which affects the soils over the bedrocks.</p>",

    "question": "<span class=\"eqt\"><p>According to which law, the force of attraction between two charges is inversely proportional to the square of the distance between them?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2342;&#2379; &#2310;&#2357;&#2375;&#2358;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2310;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; &#2313;&#2344; &#2310;&#2357;&#2375;&#2358;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Boyle's law</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2377;&#2351;&#2354; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Coulomb's law</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2370;&#2354;&#2366;&#2373;&#2350; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Charle's law</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;&#2381;&#2354;&#2381;&#2360; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Ideal gas law</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2342;&#2352;&#2381;&#2358; &#2327;&#2376;&#2360; &#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Coulomb's law: </b>The force of attraction or repulsion acting along a straight line between two electric charges is directly proportional to the product of the charges and inversely to the square of the distance between them.</p><p></p><p>Boyle's Law: At a constant temperature, the pressure (&#119875;) of a gas is inversely proportional to its volume (V).</p><p>Charles's Law:: At constant pressure, the volume (V) of a gas is directly proportional to its absolute temperature (T).</p><p>Ideal Gas Law: Combines Boyle's, Charles's, and Avogadro's laws into one equation that describes the state of an ideal gas.</p>",
    "question_index": 48
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Indian tea industry and recent government announcements:</p><p>i) India is currently the third-largest exporter of tea in the world.</p><p>ii) The government has launched the 'Chai Sahyog' app specifically for the welfare and support of tea industry labour.</p><p>Which of the statements given above is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2330;&#2366;&#2351; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2324;&#2352; &#2361;&#2366;&#2354; &#2325;&#2368; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i) &#2349;&#2366;&#2352;&#2340; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2357;&#2367;&#2358;&#2381;&#2357; &#2350;&#2375;&#2306; &#2330;&#2366;&#2351; &#2325;&#2366; &#2340;&#2368;&#2360;&#2352;&#2366; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340;&#2325; &#2361;&#2376;&#2404;</p><p>ii) &#2360;&#2352;&#2325;&#2366;&#2352; &#2344;&#2375; &#2330;&#2366;&#2351; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2325;&#2375; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339; &#2324;&#2352; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; '&#2330;&#2366;&#2351; &#2360;&#2361;&#2351;&#2379;&#2327;' &#2320;&#2346; &#2354;&#2377;&#2344;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i</span>",
      "<span class=\"eqt\">ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii</span>",
      "<span class=\"eqt\">Both i and ii</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">Neither i nor ii</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; i &#2324;&#2352; &#2344; &#2361;&#2368; ii</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement (ii) is Correct</p><p>The government has initiated the 'Chai Sahyog' mobile app aimed at providing welfare support to tea workers and small growers, including better price information and market access.</p><p></p><p>The app is being developed as a digital tool to help people working in the tea industry - especially labourers and small growers - get better information and get a fair deal for their produce.</p><p></p><p>Statement (i) is Incorrect</p><p></p><p>Statement (i) says that India is currently the third-largest exporter of tea.</p><p></p><p>Recent reports indicate that India is second-largest exporter of tea globally, trailing only Kenya.</p><p></p><p>India exports a huge amount of tea, but it is ranked second, not third, in world tea exports based on the most up-to-date government and trade data.</p><p></p><p><b>Further Insights</b></p><p>India is the second-largest producer and one of the largest consumers of tea globally.</p><p>Tea exports from India have risen in recent years, with strong demand from the Middle East and Western markets.</p><p>The Tea Board of India is the principal body managing welfare, exports, and industry development.</p><p>Small tea growers contribute over 50% of total tea production in India.</p><p>Government support packages include &#8377;1,000 crore assistance for tea workers alongside digital initiatives like Chai Sahyog.</p><p></p><p></p>",

  },

    "question": "<span class=\"eqt\"><p>Denis and Nadia bought a jeans each, paying an average amount of Rs. 650. Each of them also bought a trouser at an average price of Rs. 900. If Denis paid Rs. 100 more than Nadia, then how much did Nadia spend on her shopping?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2337;&#2375;&#2344;&#2367;&#2360; &#2324;&#2352; &#2344;&#2366;&#2342;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2344;&#2375; &#2324;&#2360;&#2340;&#2344; 650 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2325;&#2375; &#2319;&#2325; &#2332;&#2368;&#2306;&#2360; &#2326;&#2352;&#2368;&#2342;&#2368;&#2404; &#2313;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2344;&#2375; 900 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2324;&#2360;&#2340; &#2325;&#2368;&#2350;&#2340; &#2346;&#2352; &#2319;&#2325; &#2335;&#2381;&#2352;&#2377;&#2313;&#2395;&#2352; &#2349;&#2368; &#2326;&#2352;&#2368;&#2342;&#2366;&#2404; &#2351;&#2342;&#2367; &#2337;&#2375;&#2344;&#2367;&#2360; &#2344;&#2375; &#2344;&#2366;&#2342;&#2367;&#2351;&#2366; &#2360;&#2375; 100 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2343;&#2367;&#2325; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366;, &#2340;&#2379; &#2344;&#2366;&#2342;&#2367;&#2351;&#2366; &#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2326;&#2352;&#2368;&#2342;&#2366;&#2352;&#2368; &#2346;&#2352; &#2325;&#2367;&#2340;&#2344;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2326;&#2352;&#2381;&#2330; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 1100</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1100</span>",
      "<span class=\"eqt\">Rs. 1200</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1200</span>",
      "<span class=\"eqt\">Rs. 1500</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1500</span>",
      "<span class=\"eqt\">Rs. 1600</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1600</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let Nadia spend Rs. 'x' on her shopping</p><p>Denis's shopping = Rs. (x + 100)</p><p>Total price of 2 jeans = 2  X  650 = Rs. 1300</p><p>Total price of 2 trousers = 2  X  900 = Rs. 1800</p><p>Total amount paid = 1300 + 1800 = Rs. 3100</p><p>Hence, we can write,</p><p>=&gt; x + x + 100 = 3100</p><p>=&gt; 2x = 3100  -  100</p><p>=&gt; x = 3000/2 = Rs. 1500</p><p>&#8756; Nadia spend Rs. 1500 on her shopping</p>",
    "question_index": 50
  },

    "question": "<span class=\"eqt\"><p>The volumes of a sphere and a right circular cylinder having the same radius are equal. The ratio of the diameter of the sphere to that of the height of the cylinder is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2324;&#2352; &#2354;&#2350;&#2381;&#2348; &#2357;&#2371;&#2340;&#2368;&#2351; &#2348;&#2375;&#2354;&#2344; &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376; | &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2324;&#2352; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306; ?</p></span>",
    "options": [
      "<span class=\"eqt\">3 : 2</span><span class=\"hqt\" style=\"display:none\">3 : 2</span>",
      "<span class=\"eqt\">2 : 3</span><span class=\"hqt\" style=\"display:none\">2 : 3</span>",

      "<span class=\"eqt\">2 : 1</span><span class=\"hqt\" style=\"display:none\">2 : 1</span>"

    "correct_option_id": 0,
    "solution": "<p>Volume of sphere = 4/3 &#960;r<sup>3</sup></p><p>Volume of cylinder = &#960;r<sup>2</sup> h</p><p>As given, &#960;r<sup>2</sup> h= 4/3 &#960;r<sup>3</sup></p><p>=&gt; h = 4/3 r</p><p>=&gt; h/r = 4/3</p><p>=&gt; h/2r = 4/(3 X 2) = 2/3</p><p>=&gt; d/h = 3/2 [where d = 2r]</p>",

    "question": "<span class=\"eqt\"><p>A toy is made by joining two equal semi - circle on one of the lengths of a rectangle. The length of the rectangle is equal to the sum of diameter of the semi - circles. If the perimeter of the toy is 182 cm and the breadth of the rectangle is 5 cm more than the radius of semi-circle, then what is the area of the toy? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2326;&#2367;&#2354;&#2380;&#2344;&#2366; &#2319;&#2325; &#2310;&#2351;&#2340; &#2325;&#2368; &#2319;&#2325; &#2354;&#2306;&#2348;&#2366;&#2312; &#2346;&#2352; &#2342;&#2379; &#2360;&#2350;&#2366;&#2344; &#2309;&#2352;&#2381;&#2343;-&#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2325;&#2352; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2310;&#2351;&#2340; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2309;&#2352;&#2381;&#2343;-&#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2357;&#2381;&#2351;&#2366;&#2360; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2326;&#2367;&#2354;&#2380;&#2344;&#2375; &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; 182 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2324;&#2352; &#2310;&#2351;&#2340; &#2325;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2309;&#2352;&#2381;&#2343;-&#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2360;&#2375; 5 &#2360;&#2375;&#2350;&#2368; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; &#2326;&#2367;&#2354;&#2380;&#2344;&#2375; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1720 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">1720 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">1680 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">1680 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">1750 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">1750 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">1640 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">1640 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=195 height=129 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p30631/image001.png\"></p><p>Let radius of semi-circle = R cm</p><p>Length of the rectangle = 2R + 2R = 4R cm</p><p>Breadth of the rectangle = R + 5 cm</p><p>Perimeter of the toy = 182 cm</p><p>4R + 2(R + 5) + 2 * 22/7 * R = 182</p><p>6R + 10 + 44R/7 = 182</p><p>86R/7 = 172</p><p>R = 14 cm</p><p>Area of the toy = 4R(R + 5) + 22/7 * R<sup>2</sup></p><p>= 4*14(14 + 5) + 22/7 * 14<sup>2</sup></p><p>= 1064 + 616</p><p>= 1680 cm<sup>2</sup></p>",
    "question_index": 55
  },

    "question": "<span class=\"eqt\"><p>In a bag, there are certain number of coins of Rs. 3, Rs. 5 and Rs. 7 in the ratio of 4: 9: 5. If in the bag, total amount of money is Rs. 552, then what is the total number of coins of Rs. 7?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2341;&#2376;&#2354;&#2375; &#2350;&#2375;&#2306;, Rs. 3, Rs. 5 &#2324;&#2352; Rs. 7 &#2325;&#2375; &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 4: 9: 5 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2341;&#2376;&#2354;&#2375; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2352;&#2366;&#2358;&#2367; Rs. 552 &#2361;&#2376;, &#2340;&#2379; Rs. 7 &#2325;&#2375; &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>",
      "<span class=\"eqt\">55</span><span class=\"hqt\" style=\"display:none\">55</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let number of coins of Rs. 3, Rs. 5 and Rs. 7 in the bag are 4x, 9x, and 5x, respectively.</p><p>According to the question,</p><p>4x * 3 + 9x * 5 + 5x * 7 = 552</p><p>=&gt; 92x = 552</p><p>=&gt; x = 552/92</p><p>=&gt; x = 6</p><p>So, total number of coins of Rs. 7 = 5 * 6 = 30</p>",
    "question_index": 56

    "question": "<span class=\"eqt\"><p>The square root of any prime number greater than 3 is:</p></span><span class=\"hqt\" style=\"display:none\"><p>3 &#2360;&#2375; &#2348;&#2337;&#2364;&#2375; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2357;&#2352;&#2381;&#2327;&#2350;&#2370;&#2354; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Integer</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Irrational</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2352;&#2367;&#2350;&#2375;&#2351;</span>",
      "<span class=\"eqt\">Whole</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2339;</span>",
      "<span class=\"eqt\">Rational</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2367;&#2350;&#2375;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let p be a prime number greater than 3.</p><p>If &radic;p is rational, then p would have to be a perfect square.</p><p>A perfect square has a prime factorisation where every prime exponent is even.</p><p>But p has prime factorisation p<sup>1</sup>, exponent is odd.</p><p>So p is not a perfect square.</p><p>Therefore, &radic;p is irrational.</p>",
    "question_index": 62
  },

    "question": "<span class=\"eqt\"><p>On Monday, Chintu gave some of his candies to his little brother and therefore he left with 24% of total number of candies he had initially. On Tuesday, he bought 20% more candies than he had initially on Monday and gave 25% more candies to his little brother than he gave on Monday and thus he left with x% more candies than on Monday. The value of X is closet to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2325;&#2379;, &#2330;&#2367;&#2306;&#2335;&#2370; &#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2325;&#2369;&#2331; &#2325;&#2376;&#2306;&#2337;&#2368; &#2309;&#2346;&#2344;&#2375; &#2331;&#2379;&#2335;&#2375; &#2349;&#2366;&#2312; &#2325;&#2379; &#2342;&#2368;&#2306; &#2311;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2313;&#2360;&#2325;&#2375; &#2346;&#2366;&#2360; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2325;&#2376;&#2306;&#2337;&#2368; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2368; 24% &#2325;&#2376;&#2306;&#2337;&#2368; &#2348;&#2330;&#2368;&#2404; &#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352; &#2325;&#2379;, &#2313;&#2360;&#2344;&#2375; &#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2346;&#2366;&#2360; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2325;&#2376;&#2306;&#2337;&#2368; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 20% &#2309;&#2343;&#2367;&#2325; &#2325;&#2376;&#2306;&#2337;&#2368; &#2326;&#2352;&#2368;&#2342;&#2368; &#2324;&#2352; &#2309;&#2346;&#2344;&#2375; &#2331;&#2379;&#2335;&#2375; &#2349;&#2366;&#2312; &#2325;&#2379; &#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 25% &#2309;&#2343;&#2367;&#2325; &#2325;&#2376;&#2306;&#2337;&#2368; &#2342;&#2368; &#2324;&#2352; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2309;&#2348; &#2313;&#2360;&#2325;&#2375; &#2346;&#2366;&#2360; &#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; x% &#2309;&#2343;&#2367;&#2325; &#2325;&#2376;&#2306;&#2337;&#2368; &#2348;&#2330;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2360;&#2325;&#2375; &#2344;&#2367;&#2325;&#2335; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">4.2</span><span class=\"hqt\" style=\"display:none\">4.2</span>",
      "<span class=\"eqt\">5.7</span><span class=\"hqt\" style=\"display:none\">5.7</span>"

    "correct_option_id": 2,
    "solution": "<p>Let number of candies Chintu has initially on Monday = 100</p><p>Number of candies he left with = 24</p><p>Then number of candies he gave to his brother = 100  -  24 = 76</p><p>On Tuesday,</p><p>Number of candies he has initially = 100 * 120/100 = 120</p><p>Number of candies he gave to his brother = 76 * 125/100 = 95</p><p>Number of candies he left with = 25</p><p>Therefore,</p><p>X = (25  -  24) * 100/24 = 100/24 = 4.16% = 4.2%</p>",

    "question": "<span class=\"eqt\"><p>A car covers 46 km in 1/6<sup>th</sup> of an hour, 50 km in 2/3<sup>rd</sup> of that hour, and 25 km in 1/12<sup>th</sup> of that hours. The average speed of the car (in km/h) over the entire journey is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2366;&#2352; &#2319;&#2325; &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; 1/6&#2357;&#2375;&#2306; &#2349;&#2366;&#2327; &#2350;&#2375;&#2306; 46 km, &#2360;&#2350;&#2366;&#2344; &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; 2/3&#2357;&#2375;&#2306; &#2349;&#2366;&#2327; &#2350;&#2375;&#2306; 50 km &#2340;&#2341;&#2366; &#2360;&#2350;&#2366;&#2344; &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; 1/12&#2357;&#2375;&#2306; &#2349;&#2366;&#2327; &#2350;&#2375;&#2306; 25 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2360;&#2350;&#2381;&#2346;&#2370;&#2352;&#2381;&#2339; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352; &#2325;&#2368; &#2324;&#2360;&#2340; &#2330;&#2366;&#2354; (km/h &#2350;&#2375;&#2306;) &#2361;&#2376;:</p></span>",
    "options": [

    "question": "<span class=\"eqt\"><p>Two circles of equal radii are intersecting each other such that both the circles are passes through the centres of each other. If the length of the common chord to the circles is 42 cm, then find the radius of each circle.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2371;&#2340;&#2381;&#2340; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2379;&#2306; &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2327;&#2369;&#2332;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2313;&#2349;&#2351;&#2344;&#2367;&#2359;&#2381;&#2336; &#2332;&#2368;&#2357;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 42 cm &#2361;&#2376;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">14/&radic;3 cm</span><span class=\"hqt\" style=\"display:none\">14/&radic;3 cm</span>",

    "correct_option_id": 2,
    "solution": "<p>Let the radius of each circle = r cm</p><p>Then, according to the question:</p><p><img width=271 height=180 id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19511/image004.png\"></p><p>Using Pythagoras theorem, we get</p><p>r<sup>2 </sup>= (r/2)<sup>2 </sup>+ (42/2)<sup>2</sup></p><p>3r<sup>2</sup>/4 = (21)<sup>2</sup></p><p>&radic;3r/2 = 21</p><p>r = 42/&radic;3</p><p><b>r = 14&radic;3</b></p><p><b> Express Method </b></p><p>When two circles of equal radii (X cm) intersect each other such that both circles pass through the centres of each other, then the length of the common chord will be X&radic;3 cm.</p><p>We have given,</p><p>Length of common chord = 42 cm</p><p>Radius x &radic;3 = 42 cm</p><p>Radius = 14&radic;3 cm</p>",

    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The video which has been largely shared over social media has also accumulated over 14,000 likes for its release date.</p>",

    "correct_option_id": 3,
    "solution": "<p>The word 'for' is used to show a period of time, be it in the past, present or future. We cannot use 'for' with a point of time (its release date) in the past. The word 'since' is used to refer to a time that has begun in the past and is still continuing. So, 'for' should be replaced with 'since' to rectify the given sentence. Therefore, the error is in the part in option (d). </p><p>The correct sentence is: The video which has been largely shared over social media has also accumulated over 14,000 likes since its release date. </p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 81
