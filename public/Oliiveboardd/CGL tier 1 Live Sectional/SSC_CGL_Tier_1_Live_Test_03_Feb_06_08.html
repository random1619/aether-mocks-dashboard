    ],
    "correct_option_id": 2,
    "solution": "<p><b>Statement 1  -  Correct</b></p><p>Matangini Hazra was an active participant in the Quit India Movement (1942) in the Midnapore district (now Purba Medinipur), Bengal. She mobilized people against British rule and became a key local figure in the movement.</p><p><b>Statement 2  -  Correct</b></p><p>She led a peaceful procession toward the Tamluk Police Station while holding the Indian national flag. Even after being shot by British police, she reportedly continued chanting \"Vande Mataram\" and kept the flag raised until she collapsed.</p><p>This act made her a symbol of courage and sacrifice.</p><p><b><u>Further Insights</u></b></p><p>She was affectionately called \"Gandhi Buri\" (Old Lady Gandhi).</p><p>She was over 70 years old at the time of her martyrdom in 1942.</p><p>The Tamluk region later formed a parallel government known as the Tamralipta Jatiya Sarkar.</p><p>She was one of the earliest women martyrs of the Quit India Movement.</p><p>A statue of Matangini Hazra stands in Kolkata in her honor.</p>",
    "question_index": 36
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following bodies is NOT established or governed under the provisions of Article 263 of the Indian Constitution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2367;&#2325;&#2366;&#2351; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 263 &#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2351;&#2366; &#2358;&#2366;&#2360;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Central Council of Health and Family Welfare</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2324;&#2352; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339; &#2346;&#2352;&#2367;&#2359;&#2342;</span>",
      "<span class=\"eqt\">Central Council of Local Government</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2346;&#2352;&#2367;&#2359;&#2342;</span>",
      "<span class=\"eqt\">Zonal Councils</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2368;&#2351; &#2346;&#2352;&#2367;&#2359;&#2342;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Inter-State Council</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2352;-&#2352;&#2366;&#2332;&#2381;&#2351; &#2346;&#2352;&#2367;&#2359;&#2342;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Article 263 provides for the establishment of an Inter-State Council to:</p><p>Inquire into and advise upon disputes between States</p><p>Investigate and discuss subjects of common interest</p><p>Make recommendations for better coordination between States</p><p>It is meant to promote Centre - State and inter-State coordination.</p><p><b><u>Further Insights</u></b></p><p>The Inter-State Council was established in 1990 based on the Sarkaria Commission's recommendation.</p><p>The Prime Minister is the Chairman of the Inter-State Council.</p><p>Zonal Councils are chaired by the Union Home Minister.</p><p>There are five Zonal Councils (excluding North-East, which has NEC).</p><p>Article 263 uses the word \"may\", making the Inter-State Council optional, not mandatory.</p>",
    "question_index": 37
  },
  {
    "question": "<span class=\"eqt\"><p>Who was the court poet of Pulakeshin II who composed the famous Aihole Inscription?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2369;&#2354;&#2325;&#2375;&#2358;&#2367;&#2344; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2325;&#2375; &#2342;&#2352;&#2348;&#2366;&#2352;&#2368; &#2325;&#2357;&#2367; &#2325;&#2380;&#2344; &#2341;&#2375; &#2332;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2320;&#2361;&#2379;&#2354;&#2367; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326; &#2325;&#2368; &#2352;&#2330;&#2344;&#2366; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Banabhatta</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2339;&#2349;&#2335;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Ravikirti</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2325;&#2367;&#2352;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Kalidasa</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2354;&#2367;&#2342;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Harisena</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2367;&#2360;&#2375;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Aihole Inscription (634 CE) was composed by Ravikirti, the court poet of Pulakeshin II, the great ruler of the Chalukya dynasty.</p><p>The inscription, written in Sanskrit and engraved at Aihole (in present-day Karnataka), glorifies Pulakeshin II's achievements, including his victory over Harshavardhana.</p><p>Banabhatta was the court poet of Harshavardhana,</p><p>Kalidasa was a classical Sanskrit poet and playwright associated with the Gupta period, traditionally linked to Chandragupta II (Vikramaditya).</p><p>Harisena was the court poet of Samudragupta. He composed the famous Allahabad Pillar Inscription (Prayag Prashasti).</p><p><b><u>Further Insights</u></b></p><p>The Aihole Inscription is dated to 634 CE.</p><p>It provides evidence of Pulakeshin II's victory over Harshavardhana.</p><p>The inscription is written in Sanskrit using Kannada script.</p><p>Pulakeshin II was one of the greatest rulers of the Badami Chalukya dynasty.</p><p>Aihole is often called the \"Cradle of Indian Temple Architecture.</p>",
    "question_index": 38
  },
  {
    "question": "<span class=\"eqt\"><p>When a stationary bus suddenly starts moving, the passengers tend to fall backwards. This phenomenon is a direct illustration of which of the following?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2319;&#2325; &#2360;&#2381;&#2341;&#2367;&#2352; &#2348;&#2360; &#2309;&#2330;&#2366;&#2344;&#2325; &#2330;&#2354;&#2344;&#2375; &#2354;&#2327;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2351;&#2366;&#2340;&#2381;&#2352;&#2368; &#2346;&#2368;&#2331;&#2375; &#2325;&#2368; &#2323;&#2352; &#2327;&#2367;&#2352;&#2344;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2361; &#2328;&#2335;&#2344;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Inertia of Motion</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2340;&#2367; &#2325;&#2368; &#2332;&#2337;&#2364;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Inertia of Rest</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2381;&#2352;&#2366;&#2350; &#2325;&#2368; &#2332;&#2337;&#2364;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Inertia of Direction</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2358;&#2366; &#2325;&#2368; &#2332;&#2337;&#2364;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Conservation of Momentum</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2375;&#2327; &#2325;&#2366; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to Newton's First Law of Motion, a body at rest tends to remain at rest unless acted upon by an external force.</p><p>When the bus suddenly starts moving forward, the lower part of the passenger's body (in contact with the bus) moves with the bus, but the upper body tends to remain at rest due to inertia. This makes the passenger appear to fall backward.</p><p>Inertia of motion applies when a moving body continues moving at the same speed unless acted upon by an external force.</p><p>Inertia of direction refers to the tendency of a body to maintain its direction of motion unless acted upon by a force.</p><p>The law of conservation of momentum applies to collisions and interactions between bodies,</p><p><b><u>Further Insights</u></b></p><p>Inertia is directly proportional to mass.</p><p>Seat belts reduce injury by countering inertia effects.</p><p>Newton's First Law is also called the Law of Inertia.</p><p>Inertia has three types: rest, motion, and direction.</p>",
    "question_index": 39
  },
  {
    "question": "<span class=\"eqt\"><p>Read the following statement carefully one is marked as Assertion(A) and other is marked as Reason (R)</p><p><b>Assertion (A):</b> The greenhouse effect is essential for the existence of life on Earth.</p><p><b>Reason (R):</b> Without the greenhouse effect, the Earth's average surface temperature would drop to approximately -27&deg;C.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344; &#2360;&#2375; &#2346;&#2338;&#2364;&#2375;&#2306;, &#2319;&#2325; &#2325;&#2379; &#2342;&#2366;&#2357;&#2375; (A) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2325;&#2366;&#2352;&#2339; (R) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;</p><p><b>&#2342;&#2366;&#2357;&#2366; (A):</b> &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2346;&#2352; &#2332;&#2368;&#2357;&#2344; &#2325;&#2375; &#2309;&#2360;&#2381;&#2340;&#2367;&#2340;&#2381;&#2357; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2381;&#2352;&#2368;&#2344;&#2361;&#2366;&#2313;&#2360; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;&#2404;</p><p><b>&#2325;&#2366;&#2352;&#2339; (R):</b> &#2327;&#2381;&#2352;&#2368;&#2344;&#2361;&#2366;&#2313;&#2360; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366;, &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2366; &#2324;&#2360;&#2340; &#2360;&#2340;&#2361;&#2368; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2354;&#2327;&#2349;&#2327; -27&deg;C &#2340;&#2325; &#2327;&#2367;&#2352; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are correct, and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; A &#2324;&#2352; R &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both A and R are correct, but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; A &#2324;&#2352; R &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is correct, but R is incorrect</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2361;&#2368; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2327;&#2354;&#2340; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is incorrect, but R is correct</span><span class=\"hqt\" style=\"display:none\">A &#2327;&#2354;&#2340; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2361;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Assertion (A) is correct.</p><p>The natural greenhouse effect keeps Earth warm enough to sustain life. Without it, Earth would be a frozen planet.</p><p>However, the Reason (R) is incorrect.</p><p>Without the greenhouse effect, Earth's average surface temperature would drop to approximately  - 18&deg;C, not  - 27&deg;C.</p><p><b><u>Further Insights</u></b></p><p>Major greenhouse gases include CO&#8322;, methane, water vapor, and nitrous oxide.</p><p>The greenhouse effect is a natural process; global warming refers to its enhancement.</p><p>Venus experiences an extreme greenhouse effect.</p><p>Water vapor is the most abundant greenhouse gas.</p><p>Human activities have intensified the greenhouse effect since the Industrial Revolution.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>With reference to the economic critiques of Romesh Chunder Dutt (R.C. Dutt), consider the following statements:</p><p>i) R.C. Dutt argued that the British administration significantly lowered land revenue taxes to encourage Indian peasants to invest in modern farming equipment.</p><p>ii) In his analysis of Indian industry, he praised the British for providing heavy subsidies that helped the Indian textile sector compete effectively with Manchester factories.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2379;&#2350;&#2375;&#2358; &#2330;&#2306;&#2342;&#2381;&#2352; &#2342;&#2340;&#2381;&#2340; (&#2310;&#2352;.&#2360;&#2368;. &#2342;&#2340;&#2381;&#2340;) &#2325;&#2368; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2310;&#2354;&#2379;&#2330;&#2344;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i) &#2310;&#2352;.&#2360;&#2368;. &#2342;&#2340;&#2381;&#2340; &#2344;&#2375; &#2340;&#2352;&#2381;&#2325; &#2342;&#2367;&#2351;&#2366; &#2325;&#2367; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2325;&#2371;&#2359;&#2367; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2379;&#2340;&#2381;&#2360;&#2366;&#2361;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2349;&#2370;&#2350;&#2367; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2325;&#2352;&#2379;&#2306; &#2325;&#2379; &#2325;&#2366;&#2347;&#2368; &#2325;&#2350; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>ii) &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2325;&#2375; &#2309;&#2346;&#2344;&#2375; &#2357;&#2367;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2350;&#2375;&#2306;, &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358;&#2379;&#2306; &#2325;&#2368; &#2346;&#2381;&#2352;&#2358;&#2306;&#2360;&#2366; &#2325;&#2368; &#2325;&#2367; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2349;&#2366;&#2352;&#2368; &#2360;&#2348;&#2381;&#2360;&#2367;&#2337;&#2368; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2368; &#2332;&#2367;&#2360;&#2360;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2357;&#2360;&#2381;&#2340;&#2381;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2376;&#2344;&#2330;&#2375;&#2360;&#2381;&#2335;&#2352; &#2325;&#2368; &#2347;&#2376;&#2325;&#2381;&#2335;&#2381;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2325;&#2352; &#2360;&#2325;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i</span>",
      "<span class=\"eqt\">ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii</span>",
      "<span class=\"eqt\">Both i and ii</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">Neither i nor ii</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; i &#2324;&#2352; &#2344; &#2361;&#2368; ii</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Dutt argued that land revenue taxes were too high, not lowered. He believed heavy taxation prevented peasants from investing in agriculture and worsened poverty.</p><p>Dutt criticized British policies for destroying Indian handicrafts and promoting British manufactured goods. He did not say Indian industries received subsidies; rather, he argued that British policies favored Manchester textiles over Indian producers.</p><p><b><u>Further Insights</u></b></p><p>R.C. Dutt was associated with the Moderate phase of the Indian National Congress.</p><p>He supported the Drain of Wealth theory, originally articulated by Dadabhai Naoroji.</p><p>He linked recurring famines to exploitative land revenue policies.</p><p>His major work includes The Economic History of India.</p><p>Economic critique of British rule formed the foundation of early Indian nationalism.</p>",
    "question_index": 41
  },
  {
    "question": "<span class=\"eqt\"><p>During the Sarhul festival in Jharkhand, the tribal communities worship the Sal tree as it is believed to be the sacred abode of which protector deity?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2333;&#2366;&#2352;&#2326;&#2306;&#2337; &#2350;&#2375;&#2306; &#2360;&#2352;&#2361;&#2369;&#2354; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2332;&#2344;&#2332;&#2366;&#2340;&#2368;&#2351; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2360;&#2366;&#2354; &#2325;&#2375; &#2346;&#2375;&#2337;&#2364; &#2325;&#2368; &#2346;&#2370;&#2332;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2351;&#2361; &#2325;&#2367;&#2360; &#2352;&#2325;&#2381;&#2359;&#2325; &#2342;&#2375;&#2357;&#2340;&#2366; &#2325;&#2366; &#2346;&#2357;&#2367;&#2340;&#2381;&#2352; &#2310;&#2357;&#2366;&#2360; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sarna Devi</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2344;&#2366; &#2342;&#2375;&#2357;&#2368;</span>",
      "<span class=\"eqt\">Aranyani</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2339;&#2381;&#2351;&#2366;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Marang Buru</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2352;&#2306;&#2327; &#2348;&#2369;&#2352;&#2369;</span>",
      "<span class=\"eqt\">Singbonga</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2306;&#2327;&#2348;&#2379;&#2306;&#2327;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>During Sarhul, tribal communities (especially the Oraon, Munda, and Ho tribes) worship the Sal tree in the sacred grove known as the Sarna. The Sal tree is believed to be the dwelling place of Sarna Devi, the village guardian deity.</p><p>Sarhul literally celebrates the flowering of the Sal tree and marks the beginning of the new year. The priest (Pahan) performs rituals under the Sal tree to seek protection and prosperity for the village.</p><p><b><u>Further Insights</u></b></p><p>Sarhul marks the beginning of the tribal new year in Jharkhand.</p><p>The sacred grove (Sarna) is central to tribal religious practices.</p><p>The village priest performing Sarhul rituals is called the Pahan.</p><p>Sarhul reflects animistic traditions centered on nature worship.</p><p>The festival usually takes place in the Hindu month of Chaitra (March - April).</p>",
    "question_index": 42
  },
  {
    "question": "<span class=\"eqt\"><p>What was the name of Asia's first nuclear research reactor, commissioned at Trombay in 1956?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2358;&#2367;&#2351;&#2366; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2309;&#2344;&#2369;&#2360;&#2306;&#2343;&#2366;&#2344; &#2352;&#2367;&#2319;&#2325;&#2381;&#2335;&#2352; &#2325;&#2366; &#2344;&#2366;&#2350; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;, &#2332;&#2367;&#2360;&#2375; 1956 &#2350;&#2375;&#2306; &#2335;&#2381;&#2352;&#2377;&#2350;&#2381;&#2348;&#2375; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;&#2358;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Apsara</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2381;&#2360;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Dhruva</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2352;&#2369;&#2357;</span>",
      "<span class=\"eqt\">Pokhran</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Purnima</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2339;&#2367;&#2350;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Apsara was Asia's first nuclear research reactor.</p><p>Commissioned in 1956 at Trombay (Mumbai).</p><p>Built under the leadership of Dr. Homi J. Bhabha.</p><p>It was a swimming pool-type reactor.</p><p>It marked the beginning of India's nuclear research programme and demonstrated India's early technological capability in atomic energy.</p><p><b><u>Further Insights</u></b></p><p>India's nuclear programme was founded by Homi Bhabha.</p><p>The Atomic Energy Commission was established in 1948.</p><p>India follows a three-stage nuclear power programme.</p><p>Trombay houses the Bhabha Atomic Research Centre (BARC).</p><p>India conducted its first nuclear test, Pokhran-I, in 1974.</p>",
    "question_index": 43
  },
  {
    "question": "<span class=\"eqt\"><p>If the temperature of a gas is increased while the volume is held constant, what happens to the pressure?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2327;&#2376;&#2360; &#2325;&#2366; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2348;&#2338;&#2364;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2310;&#2351;&#2340;&#2344; &#2360;&#2381;&#2341;&#2367;&#2352; &#2352;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2348;&#2366;&#2357; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It decreases</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It disappears</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2327;&#2366;&#2351;&#2348; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It stays the same</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2360;&#2350;&#2366;&#2344; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It increases</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>This situation follows Gay-Lussac's Law (Pressure - Temperature Law).</p><p>It states:</p><p>At constant volume, pressure of a gas is directly proportional to its absolute temperature.</p><p>So, when temperature increases and volume is fixed, pressure must increase.</p><p>Mathematically:</p><p>P &#8733; T (when V is constant)</p><p><b><u>Further Insights</u></b></p><p>Gay-Lussac's Law applies only when temperature is measured in Kelvin.</p><p>Pressure cookers work based on this principle.</p><p>If volume increases instead, Charles's Law applies.</p><p>Ideal Gas Law: PV = nRT combines all gas laws.</p><p>At absolute zero (0 K), molecular motion theoretically stops.</p>",
    "question_index": 44
  },

    "solution": "<p>Pulikkali, performed during the Onam festival in Kerala, is accompanied by traditional percussion instruments, the primary percussion instrument is the Chenda, is one of the key instruments used to provide rhythmic beats during the performance.</p><p>Pulikkali performances typically involve energetic drumming to match the vigorous tiger dance movements.</p><p><b><u>Further Insights</u></b></p><p>Pulikkali is performed during Onam, Kerala's harvest festival.</p><p>Performers paint their bodies like tigers and hunters.</p><p>The dance is especially famous in Thrissur district.</p><p>Traditional percussion in Kerala also includes instruments like Chenda.</p><p>Pulikkali reflects Kerala's vibrant folk art traditions.</p>",

    "question": "<span class=\"eqt\"><p>When tax revenue increases more quickly than the growth of the country's GDP, the \"Tax Buoyancy\" is said to be:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2325;&#2352; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2342;&#2375;&#2358; &#2325;&#2368; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2340;&#2375;&#2332;&#2368; &#2360;&#2375; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; \"&#2325;&#2352; &#2313;&#2331;&#2366;&#2354;\" &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Less than 1</span><span class=\"hqt\" style=\"display:none\">1 &#2360;&#2375; &#2325;&#2350;</span>",
      "<span class=\"eqt\">Exactly 0</span><span class=\"hqt\" style=\"display:none\">&#2336;&#2368;&#2325; 0</span>",
      "<span class=\"eqt\">Greater than 1</span><span class=\"hqt\" style=\"display:none\">1 &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Negative</span><span class=\"hqt\" style=\"display:none\">&#2315;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Tax Buoyancy =</p><p>% change in Tax Revenue &div; % change in GDP</p><p>If tax revenue grows faster than GDP, then the numerator is larger than the denominator.</p><p>So the ratio becomes greater than 1.</p><p>If buoyancy is less than 1, tax revenue is growing slower than GDP.</p><p>Tax Buoyancy = 0 would mean tax revenue does not increase at all despite GDP growth  -  which is practically unrealistic in normal conditions.</p><p>Negative buoyancy would occur only if tax revenue decreases while GDP increases.</p><p><b><u>Further Insights</u></b></p><p>Tax Buoyancy &gt; 1 indicates a responsive and expanding tax system.</p><p>High buoyancy may result from improved compliance or rate increases.</p><p>Economic slowdowns often reduce buoyancy below 1.</p><p>Buoyancy includes policy effects; elasticity excludes them.</p>",
    "question_index": 46
  },

    "question": "<span class=\"eqt\"><p>Which of the following major ports in India is not a natural harbour?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mumbai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2306;&#2348;&#2312;</span>",
      "<span class=\"eqt\">Marmugao</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2352;&#2381;&#2350;&#2369;&#2327;&#2366;&#2323;</span>",
      "<span class=\"eqt\">Chennai</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2375;&#2344;&#2381;&#2344;&#2312;</span>",
      "<span class=\"eqt\">Visakhapatnam</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2366;&#2326;&#2366;&#2346;&#2340;&#2381;&#2340;&#2344;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Chennai Port is not a natural harbour.</p><p>It is an artificial port, constructed by building breakwaters to create a sheltered area for ships because the Coromandel Coast is generally straight and lacks natural protection.</p><p><b><u>Further Insights</u></b></p><p>Natural harbours are common on the West Coast due to its indented coastline.</p><p>The East Coast has fewer natural harbours because the coastline is more straight.</p><p>Chennai is one of the oldest artificial ports in India.</p><p>Mumbai and Visakhapatnam are examples of excellent natural harbours.</p><p>Artificial ports require breakwaters to reduce wave action.</p>",
    "question_index": 48
  },

    "question": "<span class=\"eqt\"><p>The Bharatiya SakshyaAdhiniyam (BSA), which came into effect in 2024, has replaced which of the following colonial-era laws?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2366;&#2325;&#2381;&#2359;&#2381;&#2351; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (BSA), &#2332;&#2379; 2024 &#2350;&#2375;&#2306; &#2354;&#2366;&#2327;&#2370; &#2361;&#2369;&#2310;, &#2344;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2313;&#2346;&#2344;&#2367;&#2357;&#2375;&#2358;&#2325;&#2366;&#2354;&#2368;&#2344; &#2325;&#2366;&#2344;&#2370;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Indian Penal Code (IPC)</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2342;&#2306;&#2337; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366; (&#2310;&#2312;&#2346;&#2368;&#2360;&#2368;)</span>",
      "<span class=\"eqt\">Code of Criminal Procedure (CrPC)</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2306;&#2337; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366; (&#2360;&#2368;&#2310;&#2352;&#2346;&#2368;&#2360;&#2368;)</span>",
      "<span class=\"eqt\">Indian Evidence Act (IEA)</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2366;&#2325;&#2381;&#2359;&#2381;&#2351; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (&#2310;&#2312;&#2312;&#2319;)</span>",
      "<span class=\"eqt\">Police Act, 1861</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2354;&#2367;&#2360; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1861</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Bharatiya SakshyaAdhiniyam (BSA), 2023 replaced the Indian Evidence Act, 1872.</p><p>The Indian Evidence Act governed:</p><p>Admissibility of evidence</p><p>Documentary and oral evidence</p><p>Confessions and statements</p><p>Burden of proof</p><p>BSA modernizes these provisions and gives greater recognition to electronic and digital evidence.</p><p><b>Indian Penal Code (IPC)</b></p><p>The IPC has been replaced by the Bharatiya Nyaya Sanhita (BNS).</p><p><b>Code of Criminal Procedure (CrPC)</b></p><p>CrPC has been replaced by the Bharatiya Nagarik Suraksha Sanhita (BNSS).</p><p><b><u>Further Insights</u></b></p><p>The three new laws came into force on 1 July 2024.</p><p>BNS replaced IPC (substantive criminal law).</p><p>BNSS replaced CrPC (criminal procedure).</p><p>BSA replaced the Indian Evidence Act (rules of evidence).</p><p>BSA gives special importance to electronic records and digital evidence.</p>",
    "question_index": 49
  },

    "question": "<span class=\"eqt\"><p>In triangles MNO and STU, MN = ST and &#8736;N = &#8736;T. The two triangles are congruent by the <b>ASA (Angle-Side-Angle)</b> criterion if:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; MNO &#2324;&#2352; STU &#2350;&#2375;&#2306;, MN = ST &#2324;&#2352; &#8736;N = &#8736;T &#2361;&#2376;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; <b>ASA (&#2325;&#2379;&#2339;-&#2349;&#2369;&#2332;&#2366;-&#2325;&#2379;&#2339;)</b> &#2350;&#2366;&#2344;&#2342;&#2306;&#2337; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2360;&#2306;&#2327;&#2366;&#2350;&#2368; &#2361;&#2376;&#2306;, &#2351;&#2342;&#2367;:</p></span>",

    "question": "<span class=\"eqt\"><p>Simplify the following expression.</p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">(3x - 5y)<sup>3</sup> + (5y - 7z)<sup>3</sup> + (7z - 3x)<sup>3</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(3x - 5y)(5y - 7z)(7z - 3x)</span></div></div></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2379; &#2360;&#2352;&#2354;&#2368;&#2325;&#2371;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">(3x - 5y)<sup>3</sup> + (5y - 7z)<sup>3</sup> + (7z - 3x)<sup>3</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(3x - 5y)(5y - 7z)(7z - 3x)</span></div></div></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "solution": "<p>We know that if a + b + c = 0, then a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup> = 3abc</p><p>Here a = (3x - 5y), b = (5y - 7z) and c = (7z - 3x)</p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">(3x - 5y)<sup>3</sup> + (5y - 7z)<sup>3</sup> + (7z - 3x)<sup>3</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(3x - 5y)(5y - 7z)(7z - 3x)</span></div></div><p>= [3(3x - 5y)(5y - 7z)(7z - 3x)]/[(3x - 5y)(5y - 7z)(7z - 3x)] = 3</p>",
    "question_index": 51
  },

    "question": "<span class=\"eqt\"><p>A person drives with speed 80 km/hr reaches his destination in 5 hrs. If his speed is increased by a certain percentage, he reaches his destination 50 minutes earlier. By what percentage was his speed increased?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; 80 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2327;&#2366;&#2337;&#2364;&#2368; &#2330;&#2354;&#2366;&#2325;&#2352; 5 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2375; &#2327;&#2306;&#2340;&#2357;&#2381;&#2351; &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2313;&#2360;&#2325;&#2368; &#2330;&#2366;&#2354; &#2350;&#2375;&#2306; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2357;&#2361; &#2309;&#2346;&#2344;&#2375; &#2327;&#2306;&#2340;&#2357;&#2381;&#2351; &#2346;&#2352; 50 &#2350;&#2367;&#2344;&#2335; &#2346;&#2361;&#2354;&#2375; &#2346;&#2361;&#2369;&#2305;&#2330; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2368; &#2330;&#2366;&#2354; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",

    "question": "<span class=\"eqt\"><p>If 1/5 of a tank is filled in the morning, and 1/15 in the evening, what is the decimal of the tank that is not filled?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2369;&#2348;&#2361; &#2335;&#2376;&#2306;&#2325; &#2325;&#2366; 1/5 &#2349;&#2352;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2358;&#2366;&#2350; &#2325;&#2379; 1/15 &#2349;&#2352;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2349;&#2366;&#2327; &#2349;&#2352;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">0.266..</span><span class=\"hqt\" style=\"display:none\">0.266..</span>",
      "<span class=\"eqt\">0.733..</span><span class=\"hqt\" style=\"display:none\">0.733..</span>",
      "<span class=\"eqt\">0.333..</span><span class=\"hqt\" style=\"display:none\">0.333..</span>",
      "<span class=\"eqt\">0.466..</span><span class=\"hqt\" style=\"display:none\">0.466..</span>"
    ],
    "solution": "<p>Total tank filled = 1/5 + 1/15 = [3 + 1]/15 = 4/15</p><p>Tank that is not filled = 1  -  4/15 = 11/15</p><p>Hence, the required decimal = 11/15 = 0.733..</p>",
    "question_index": 53

    "question": "<span class=\"eqt\"><p>If the equations 5x + (k - 3)y + 5 = 0 and (k - 3)x + 5y  -  7 = 0 are parallel, then find the value of 3k + 2 (k &gt; 0).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; 5x + (k -3)y + 5 = 0 &#2324;&#2352; (k-3)x + 5y - 7 = 0 &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2361;&#2376;, &#2340;&#2379; 3k + 2 (k&gt;0) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">26</span><span class=\"hqt\" style=\"display:none\">26</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>"
    ],
    "solution": "<p>If two lines are parallel, then they do not intersect.</p><p>Therefore, they have no solution.</p><p>And for two equations ax + by + c = 0 and mx + ny + p = 0 the condition for which there is no solution, is:</p><p>(a/m) = (b/n) &#8800; (c/p)</p><p>So,</p><p>5/(k-3) = (k-3)/5 &#8800; 5/-7</p><p>(k-3)<sup>2</sup> = 25</p><p>k  -  3 = 5</p><p>k = 8</p><p>Now,</p><p>3k + 2 = 24 + 2 = 26</p>",
    "question_index": 54
  },

    "question": "<span class=\"eqt\"><p>In a watch shop, 62.5% of total watches are analogue watches and the rest are digital watches. If 30 digital watches are sold by the shopkeeper, then the number of analogue watches in the shop becomes 64% of total watches. How many watches were there in the shop initially?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2337;&#2364;&#2368; &#2325;&#2368; &#2342;&#2369;&#2325;&#2366;&#2344; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2328;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; 62.5% &#2319;&#2344;&#2366;&#2354;&#2377;&#2327; &#2328;&#2396;&#2367;&#2351;&#2366;&#2306; &#2361;&#2376;&#2306; &#2324;&#2352; &#2358;&#2375;&#2359; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2328;&#2396;&#2367;&#2351;&#2366;&#2306; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 30 &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2328;&#2396;&#2367;&#2351;&#2366;&#2306; &#2348;&#2375;&#2330;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2342;&#2369;&#2325;&#2366;&#2344; &#2350;&#2375;&#2306; &#2319;&#2344;&#2366;&#2354;&#2377;&#2327; &#2328;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2325;&#2369;&#2354; &#2328;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; 64% &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2310;&#2352;&#2306;&#2349; &#2350;&#2375;&#2306; &#2342;&#2369;&#2325;&#2366;&#2344; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2328;&#2396;&#2367;&#2351;&#2366;&#2306; &#2341;&#2368;?</p></span>",

    "solution": "<p>Let analogue watches = 5x and digital watches = 3x</p><p>According to the question,</p><p>(5x)/(8x  -  30) = 64/100</p><p>=&gt; 500x = 512x  -  1920</p><p>=&gt; 12x = 1920</p><p>=&gt; x = 160</p><p>So, initially number of watches in the shop = 8x = 8 * 160 = 1280</p>",

    "question": "<span class=\"eqt\"><p>The area of a rectangle is 3x<sup>2</sup> + 11x + 10. Find the perimeter of rectangle.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2351;&#2340; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 3x<sup>2</sup> + 11x + 10 &#2361;&#2376;&#2404; &#2310;&#2351;&#2340; &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",

      "<span class=\"eqt\">8x + 20</span><span class=\"hqt\" style=\"display:none\">8x + 20</span>",

    "solution": "<p>Given Area = 3x<sup>2</sup> + 11x + 10</p><p>L * W = 3x<sup>2</sup> + 6x + 5x + 10</p><p>L * W = (x + 2) (3x + 5)</p><p>Perimeter of rectangle = 2 * (L + W)</p><p>= 2 * (x + 2 + 3x + 5)</p><p>= 2 * (4x + 7)</p><p>= 8x + 14</p>",

    "question": "<span class=\"eqt\"><p>Angle made by a 16 cm long chord PQ at the centre of a circle is 60&deg;. Find the diameter of the circle.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; 16 cm &#2354;&#2306;&#2348;&#2368; &#2332;&#2368;&#2357;&#2366; PQ &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2352; &#2309;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2379;&#2339; 60&deg; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "solution": "<p><img width=179 height=161 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21678/image014.png\"></p><p>PQ = 16 cm</p><p>&#8736; POQ = 60&deg;</p><p>Since OP = OQ so &#8736; OPQ = &#8736; OQP = X (let)</p><p>In &#916; POQ,</p><p>60 + X + X = 180</p><p>X = 60&deg;</p><p>Therefore, &#916; POQ is an equilateral triangle.</p><p>So, OP = PQ = 16 cm</p><p>Diameter of circle = 16 * 2 = 32 cm</p>",

    "question": "<span class=\"eqt\"><p>A vessel contains a 240 L mixture of milk and water in a ratio of 5: 3. If 30 L of water is mixed then 45 L of the mixture is taken out and 5 L of milk is mixed, then find the ratio of the milk and water in the final mixture.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2366;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; 240 &#2354;&#2368;&#2335;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; 5:3 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 30 &#2354;&#2368;&#2335;&#2352; &#2346;&#2366;&#2344;&#2368; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2347;&#2367;&#2352; 45 &#2354;&#2368;&#2335;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2344;&#2367;&#2325;&#2366;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 5 &#2354;&#2368;&#2335;&#2352; &#2342;&#2370;&#2343; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2309;&#2306;&#2340;&#2367;&#2350; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Find the range of the values of l, if the length of the sides of the triangle are 2l, (l-2) and 7 respectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>l &#2325;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2352;&#2375;&#2306;&#2332; &#2325;&#2366; &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2319;&#2305;, &#2351;&#2342;&#2367; &#2340;&#2381;&#2352;&#2367;&#2325;&#2379;&#2339; &#2325;&#2375; &#2325;&#2367;&#2344;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 2l, (l-2) &#2324;&#2352; 7 &#2361;&#2376;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>A retailer offers a discount of 22% on the marked price of a table. Even after giving the discount, he earns a profit of 5.3%. If he gives 12% discount instead of 22% on the table marked for Rs. 5400, then what will be his profit percent? (correct to 1 decimal place)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2326;&#2369;&#2342;&#2352;&#2366; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2319;&#2325; &#2335;&#2375;&#2348;&#2354; &#2325;&#2375; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 22% &#2325;&#2368; &#2331;&#2370;&#2335; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2331;&#2370;&#2335; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2349;&#2368; &#2357;&#2361; 5.3% &#2325;&#2366; &#2354;&#2366;&#2349; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; 5400 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2357;&#2366;&#2354;&#2368; &#2350;&#2375;&#2332; &#2346;&#2352; 22% &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; 12% &#2325;&#2368; &#2331;&#2370;&#2335; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2325;&#2366; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;? (&#2342;&#2358;&#2350;&#2354;&#2357; &#2325;&#2375; &#2319;&#2325; &#2309;&#2306;&#2325; &#2340;&#2325;)</p></span>",
    "options": [
      "<span class=\"eqt\">16.6%</span><span class=\"hqt\" style=\"display:none\">16.6%</span>",
      "<span class=\"eqt\">22.2%</span><span class=\"hqt\" style=\"display:none\">22.2%</span>",

      "<span class=\"eqt\">17.4%</span><span class=\"hqt\" style=\"display:none\">17.4%</span>"

    "correct_option_id": 2,
    "solution": "<p>Marked price = Rs. 5400</p><p>We know that,</p><p>Marked price/Cost price = (100 + P%)/ (100 - D%)</p><p>5400/CP = 105.3/78</p><p>CP = Rs.4000</p><p>The cost price of the table is Rs. 4000</p><p>Then, selling price when discount is 12% = 5400 * 88/100 = Rs. 4752</p><p>Profit % = (4752 - 4000)/4000 * 100 = 18.8%</p>",
    "question_index": 65

    "correct_option_id": 0,

    "question": "<span class=\"eqt\"><p>Two metallic spherical balls A and B are such that the radius of ball A is equal to two times of diameter of ball B. What is the ratio between the surface areas of A and B respectively?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2343;&#2366;&#2340;&#2381;&#2357;&#2367;&#2325; &#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2327;&#2375;&#2306;&#2342;&#2375;&#2306; A &#2324;&#2352; B &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306; &#2325;&#2367; &#2327;&#2375;&#2306;&#2342; A &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2327;&#2375;&#2306;&#2342; B &#2325;&#2375; &#2357;&#2381;&#2351;&#2366;&#2360; &#2325;&#2375; &#2342;&#2379; &#2327;&#2369;&#2344;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404; A &#2324;&#2352; B &#2325;&#2375; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">4: 1</span><span class=\"hqt\" style=\"display:none\">4: 1</span>",
      "<span class=\"eqt\">1: 4</span><span class=\"hqt\" style=\"display:none\">1: 4</span>",
      "<span class=\"eqt\">16: 1</span><span class=\"hqt\" style=\"display:none\">16: 1</span>",
      "<span class=\"eqt\">1: 16</span><span class=\"hqt\" style=\"display:none\">1: 16</span>"

    "correct_option_id": 2,
    "solution": "<p>Radius of ball A = 2 * diameter of ball B</p><p>Radius of ball A = 2 * 2 * radius of ball B</p><p>Radius of ball A = 4 * radius of ball B</p><p>Radius of ball A/radius of ball B = 4/1</p><p>Ratio between the surface areas of ball A and B = (4/1)<sup>2</sup> = 16: 1</p>",

    "question": "<span class=\"eqt\"><p>A and B together can do a piece of work in 40 days, B and C together can do the same piece of work in 48 days while A and C together can do the same piece of work in 60 days to complete the work. Find the time taken by B to do the same piece of work, if B work with 1/7th time more efficiency, than actual efficiency.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; A &#2324;&#2352; B &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 40 &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2319;&#2325; &#2360;&#2366;&#2341; B &#2324;&#2352; C &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 48 &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2319;&#2325; &#2360;&#2366;&#2341; A &#2324;&#2352; C &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 60 &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; B &#2309;&#2346;&#2344;&#2368; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2360;&#2375; 1/7 &#2327;&#2369;&#2344;&#2366; &#2309;&#2343;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2325;&#2375; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">40 days</span><span class=\"hqt\" style=\"display:none\">40 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">48 days</span><span class=\"hqt\" style=\"display:none\">48 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">60 days</span><span class=\"hqt\" style=\"display:none\">60 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">72 days</span><span class=\"hqt\" style=\"display:none\">72 &#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Total work = L.C.M of time taken = L.C.M of 40, 48 and 60 = 240</p><p>Efficiency = total work / time taken</p><p>Efficiency of A and B together =240/ 40 = 6</p><p>Efficiency of B and C together =240/ 48 =5</p><p>Efficiency of C and A together = 240/ 60 = 4</p><p>Efficiency of A, B, and C together = (6 + 5 + 4)/2 = 15/2</p><p>Efficiency of B = Efficiency of A, B, and C together - Efficiency of C and A together </p><p>= 15/2  -  4 = 7/2</p><p>Efficiency of B (new) = 7/2 + 1/7 *7/2 = 4</p><p>The time taken by B to do the work alone = 240/4 = 60 days</p>",
    "question_index": 69
  },

    "question": "<span class=\"eqt\"><p>A, B and C invest Rs.200000, Rs.150000 and Rs.100000 respectively. After 6 months C retires. If profit is Rs.120000 for a year, what is C's share?</p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2324;&#2352; C &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; Rs.200000, Rs.150000 &#2324;&#2352; Rs.100000 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; 6 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342; C &#2360;&#2375;&#2357;&#2366;&#2344;&#2367;&#2357;&#2371;&#2340;&#2381;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2354;&#2366;&#2349; Rs.120000 &#2361;&#2376;, &#2340;&#2379; C &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",

    "solution": "<p>The sentence in the Direct Speech is in <b>Simple Present Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Simple Past Tense</b>.</p><p>Simple Present (Subject + V1 + Object) should be converted into Simple Past (Subject +V2 + Object).</p><p>\"That\" is used in place of Inverted Commas while transforming the sentence from Direct Speech to Indirect Speech.</p><p>For example:</p><p>He said, \"I never go to the village.\" (Direct Speech)</p><p>He said that he never went to the village. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The reporting verb 'said to' is changed into 'told'.</p><p>&#183; The verb 'don't want' (present simple) is changed into 'did not want' (past simple).</p><p>&#183; The pronoun 'I' is changed into 'he', and the possessive determiner 'your' is changed to 'my'. </p><p>Therefore, the correct answer is option (c): <b>The salesperson told me that he did not want to take up all my time.</b></p>",

    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Four-fifths / of the pillar were / destroyed due to the landslides and inundation / that occurred yesterday.</p>",

    "solution": "<p>With fractions and percentages, the verb agrees with the preceding noun/clause. In the given sentence, the verb agrees with the noun 'pillar' which is singular in nature. So, the plural verb 'were' should be replaced by the corresponding singular verb 'was' to rectify the given sentence. Hence, option (d) is the correct answer. </p><p><b>The correct sentence is: </b>Four-fifths of the pillar was destroyed due to the landslides and inundation that occurred yesterday.</p><p><b>NOTE-</b></p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",

  },

    "correct_option_id": 1,
    "solution": "<p>Both the blanks follow the infinitive marker 'to' and so the verbs have to be only in the base form (V1). Among the options, 'missing' in option (a) and 'missed' in option (c) are in continuous/present participle form (V4) and past participle form (V3) respectively. So, they both are negated. 'Took' in option (d) is in Past form of the verb (V2) and so, this option is also negated. In option (b) 'miss' and 'take' are verbs in base form (V1) and they both match the context of the given sentence.</p><p>Hence, the correct answer is option (b).</p><p>Note:</p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p><p><b>Infinitive:</b> The infinitive is the base form of a verb, often preceded by to.</p><p>Consider the sentences given below:</p><p>&#183; To err is human. [like a noun, the infinitive 'to err' is the subject of the verb 'is']</p><p>&#183; My father likes to cook. [like a noun, the infinitive 'to cook' is the object of the verb 'likes']</p><p>&#183; To vote in elections is our right. [the infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p>&#183; Radha went to the lake to fetch water. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p>&#183; The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.</p>",
