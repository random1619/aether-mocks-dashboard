<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="60">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Select the option that shows the given words arranged as they appear in an English dictionary.</p><p>a) Change</p><p>b) Chain</p><p>c) Chalk</p><p>d) Chance</p><p>e) Chair</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306; &#2332;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2379; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2364;&#2368; &#2358;&#2348;&#2381;&#2342;&#2325;&#2379;&#2358; &#2350;&#2375;&#2306; &#2342;&#2367;&#2326;&#2366;&#2312; &#2342;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>a) Change</p><p>b) Chain</p><p>c) Chalk</p><p>d) Chance</p><p>&#2329;) Chair</p></span>",
    "options": [
      "<span class=\"eqt\">cdabe</span><span class=\"hqt\" style=\"display:none\">cdabe</span>",
      "<span class=\"eqt\">becda</span><span class=\"hqt\" style=\"display:none\">becda</span>",
      "<span class=\"eqt\">bceda</span><span class=\"hqt\" style=\"display:none\">bceda</span>",
      "<span class=\"eqt\">becad</span><span class=\"hqt\" style=\"display:none\">becad</span>"
    ],
    "solution": "<p>(b) Chain</p><p>(e) Chair</p><p>(c) Chalk</p><p>(d) Chance</p><p>(a) Change</p><p>So, the dictionary order is (b), (e), (c), (d), (a).</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If '&div;' means '+', '-' means 'x', 'x' means '-' and '+' means '&div;', then what will come in the place of the question mark (?) in the following equation?</p><p>40 x 16 + 8 &div; 6 - 5 = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; '&div;' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '+' &#2361;&#2376;, '-' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'x' &#2361;&#2376;, 'x' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '-' &#2361;&#2376; &#2324;&#2352; '+' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&div;' &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2368; &#2332;&#2327;&#2361; &#2325;&#2381;&#2351;&#2366; &#2310;&#2319;&#2327;&#2366;?</p><p>40 x 16 + 8 &div; 6 - 5 = ?</p></span>",
    "options": [
      "<span class=\"eqt\">64</span><span class=\"hqt\" style=\"display:none\">64</span>",
      "<span class=\"eqt\">62</span><span class=\"hqt\" style=\"display:none\">62</span>",
      "<span class=\"eqt\">68</span><span class=\"hqt\" style=\"display:none\">68</span>",
      "<span class=\"eqt\">66</span><span class=\"hqt\" style=\"display:none\">66</span>"
    ],
    "solution": "<p>40 x 16 + 8 &div; 6 - 5 = ?</p><p>After interchange:</p><p>40  -  16 &div; 8 + 6 x 5 = ?</p><p>40  -  2 + 30 = ?</p><p>38 + 30 = ?</p><p>? = 68</p><p>So, option (c) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If 10 &rarr; 89, 12 &rarr; 131, 14 &rarr; 179, then 16 &rarr; ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 10 &rarr; 89, 12 &rarr; 131, 14 &rarr; 179, &#2340;&#2379; 16 &rarr; ?</p></span>",
    "options": [
      "<span class=\"eqt\">241</span><span class=\"hqt\" style=\"display:none\">241</span>",
      "<span class=\"eqt\">229</span><span class=\"hqt\" style=\"display:none\">229</span>",
      "<span class=\"eqt\">239</span><span class=\"hqt\" style=\"display:none\">239</span>",
      "<span class=\"eqt\">247</span><span class=\"hqt\" style=\"display:none\">247</span>"
    ],
    "solution": "<p>The relation follows the pattern n<sup>2</sup> &#8722; (next prime after n).</p><p>For n = 10: 10<sup>2</sup> &#8722; 11 = 100 &#8722; 11 = 89,</p><p>For n = 12: 12<sup>2</sup> &#8722; 13 = 144 &#8722; 13 = 131,</p><p>For n = 14: 14<sup>2</sup> &#8722; 17 = 196 &#8722; 17 = 179.</p><p>Using the same rule for n = 16: 16<sup>2</sup> &#8722; 17 = 256 &#8722; 17 = 239.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In a row, Rohan is 9th from the left and Meera is 8th from the right. After they exchange their positions, Rohan becomes 28th from the left. How many students are there in the row?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306;, &#2352;&#2379;&#2361;&#2344; &#2348;&#2366;&#2319;&#2306; &#2360;&#2375; 9&#2357;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2361;&#2376; &#2324;&#2352; &#2350;&#2368;&#2352;&#2366; &#2342;&#2366;&#2319;&#2306; &#2360;&#2375; 8&#2357;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2361;&#2376;&#2404; &#2313;&#2344;&#2325;&#2368; &#2332;&#2327;&#2361; &#2348;&#2342;&#2354;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2352;&#2379;&#2361;&#2344; &#2348;&#2366;&#2319;&#2306; &#2360;&#2375; 28&#2357;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">33</span><span class=\"hqt\" style=\"display:none\">33</span>",
      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>",
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>",
      "<span class=\"eqt\">34</span><span class=\"hqt\" style=\"display:none\">34</span>"
    ],
    "solution": "<p>After swapping, Rohan takes Meera's former place. Meera was 8th from the right.</p><p>If total is N, Meera's position from the left was N &#8722; 8 + 1 = N &#8722; 7.</p><p>Given this equals Rohan's new position 28:</p><p>N &#8722; 7 = 28</p><p>N = 35</p><p>So, total number of students = 35</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language:</p><p>'python java csharp' =&gt; 'p1 j8 c5'</p><p>'java kotlin ruby' =&gt; 'j8 k2 r8'</p><p>'ruby python swift' =&gt; 'r8 p1 s7'</p><p>How is 'swift' written in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;:</p><p>'python java csharp' =&gt; 'p1 j8 c5'</p><p>'java kotlin ruby' =&gt; 'j8 k2 r8'</p><p>'ruby python swift' =&gt; 'r8 p1 s7'</p><p>'swift' &#2313;&#2360; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; &#2325;&#2376;&#2360;&#2375; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">j8</span><span class=\"hqt\" style=\"display:none\">j8</span>",
      "<span class=\"eqt\">k2</span><span class=\"hqt\" style=\"display:none\">k2</span>",
      "<span class=\"eqt\">c5</span><span class=\"hqt\" style=\"display:none\">c5</span>",
      "<span class=\"eqt\">s7</span><span class=\"hqt\" style=\"display:none\">s7</span>"
    ],
    "solution": "<p>1) Comparing the first and second phrases, the common word is 'java' and the common code is 'j8'. So, <b>java = j8</b>.</p><p>2) Comparing the second and third phrases, the common word is 'ruby' and the common code is 'r</p><p>'.So,ruby=r8</p><p>3) Comparing the first and third phrases, the common word is 'python' and the common code is 'p1'. So, <b>python = p1</b>.</p><p>4) In the third phrase, the only remaining word is 'swift', and the only remaining code is 's7'. Therefore, <b>swift = s7</b>.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Read the following statement carefully and identify the assumption(s) that is/are implicit.</p><p>Statement: The station management will start issuing tokens at the enquiry counter to reduce crowding during evening rush hours.</p><p>Assumptions:</p><p>I. Every passenger query at the enquiry counter takes exactly the same amount of time.</p><p>II. Issuing tokens alone will eliminate crowding completely during rush hours.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344; &#2360;&#2375; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360;/&#2313;&#2344; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;(&#2323;&#2306;) &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344;: &#2360;&#2381;&#2335;&#2375;&#2358;&#2344; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2358;&#2366;&#2350; &#2325;&#2375; &#2349;&#2368;&#2337;&#2364; &#2325;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2349;&#2368;&#2337;&#2364; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2370;&#2331;&#2340;&#2366;&#2331; &#2325;&#2366;&#2313;&#2306;&#2335;&#2352; &#2346;&#2352; &#2335;&#2379;&#2325;&#2344; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2375;&#2327;&#2366;&#2404;</p><p>&#2309;&#2344;&#2369;&#2350;&#2366;&#2344;:</p><p>I. &#2346;&#2370;&#2331;&#2340;&#2366;&#2331; &#2325;&#2366;&#2313;&#2306;&#2335;&#2352; &#2346;&#2352; &#2361;&#2352; &#2351;&#2366;&#2340;&#2381;&#2352;&#2368; &#2325;&#2368; &#2346;&#2370;&#2331;&#2340;&#2366;&#2331; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2325;&#2375;&#2357;&#2354; &#2335;&#2379;&#2325;&#2344; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2360;&#2375; &#2349;&#2368;&#2337;&#2364; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only Assumption II is implicit</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; II &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both Assumption I and Assumption II are implicit</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; I &#2324;&#2352; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; II &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Neither Assumption I nor Assumption II is implicit</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; I &#2324;&#2352; &#2344; &#2361;&#2368; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; II &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only Assumption I is implicit</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; I &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;</span>"
    ],
    "solution": "<p>Statement: The station management plans to issue tokens at the enquiry counter to reduce crowding during evening rush hours. This indicates that the management believes tokens will help manage crowding better than the current system.</p><p>Assumption I: The statement does not assume uniform time for each query. Tokens may help organize the queue regardless of how long each query takes. Therefore, this assumption is not implicit.</p><p>Assumption II: The statement only aims to reduce crowding, not claim complete elimination. Assuming total removal of crowding is too strong and not implied. Hence, this assumption is not implicit.</p><p>So, neither Assumption I nor Assumption II is implicit.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statement and choose the option that follows.</p><p>Statement: The e-commerce app has extended its return window from 7 days to 15 days and added free pick-up for returns.</p><p>Conclusions:</p><p>I. Customers now have more time to return eligible items than earlier.</p><p>II. Returned items will be collected without charging a pick-up fee.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2379; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344;: &#2312;-&#2325;&#2377;&#2350;&#2352;&#2381;&#2360; &#2320;&#2346; &#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2352;&#2367;&#2335;&#2352;&#2381;&#2344; &#2357;&#2367;&#2306;&#2337;&#2379; 7 &#2342;&#2367;&#2344;&#2379;&#2306; &#2360;&#2375; &#2348;&#2338;&#2364;&#2366;&#2325;&#2352; 15 &#2342;&#2367;&#2344; &#2325;&#2352; &#2342;&#2368; &#2361;&#2376; &#2324;&#2352; &#2352;&#2367;&#2335;&#2352;&#2381;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2369;&#2347;&#2381;&#2340; &#2346;&#2367;&#2325;-&#2309;&#2346; &#2332;&#2379;&#2337;&#2364;&#2366; &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>I. &#2327;&#2381;&#2352;&#2366;&#2361;&#2325;&#2379;&#2306; &#2325;&#2375; &#2346;&#2366;&#2360; &#2309;&#2348; &#2346;&#2361;&#2354;&#2375; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2346;&#2366;&#2340;&#2381;&#2352; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2379; &#2354;&#2380;&#2335;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2343;&#2367;&#2325; &#2360;&#2350;&#2351; &#2361;&#2376;&#2404;</p><p>II. &#2354;&#2380;&#2335;&#2366;&#2312; &#2327;&#2312; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2379; &#2348;&#2367;&#2344;&#2366; &#2346;&#2367;&#2325;-&#2309;&#2346; &#2358;&#2369;&#2354;&#2381;&#2325; &#2354;&#2367;&#2319; &#2319;&#2325;&#2340;&#2381;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only conclusion II follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both conclusions I and II follow</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only conclusion I follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Neither conclusion I nor II follows</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2360;&#2361;&#2368; &#2361;&#2376; &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],

    "question": "<span class=\"eqt\"><p>If G + H means G is the daughter of H, G &div; H means G is the husband of H, G  X  H means G is the daughter-in-law of H, G  -  H means G is the mother of H, which of the following shows that B is the father of N?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; G + H &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; G, H &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;, G &div; H &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; G, H &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;, G X H &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; G, H &#2325;&#2368; &#2348;&#2361;&#2370; &#2361;&#2376;, G - H &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; G, H &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2351;&#2361; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; B, N &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">N &div; T  X  Q  -  C + B</span><span class=\"hqt\" style=\"display:none\">N &div; T X Q - C + B</span>",
      "<span class=\"eqt\">B  -  L  -  R &div; D + N</span><span class=\"hqt\" style=\"display:none\">B - L - R &div; D + N</span>",
      "<span class=\"eqt\">N  X  Q &div; V + S  -  B</span><span class=\"hqt\" style=\"display:none\">N X Q &div; V + S - B</span>",
      "<span class=\"eqt\">B &div; D  -  J &div; R + N</span><span class=\"hqt\" style=\"display:none\">B &div; D - J &div; R + N</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Option (a): N &div; T  X  Q  -  C + B</p><p>N &div; T means N is the husband of T</p><p>T  X  Q means T is the daughter-in-law of Q</p><p>Q  -  C means Q is the mother of C</p><p>C + B means C is the daughter of B</p><p><img width=268 height=105 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26471/image005.png\"></p><p><b>B is the father of N.</b></p><p>So, <b>option (a)</b> is correct.</p><p>Option (b): B  -  L - R &div; D + N</p><p>B  -  L means B is the mother of L</p><p>L - R means L is the mother of R</p><p>R &div; D means R is the husband of D</p><p>D + N means D is the daughter of N</p><p><img width=171 height=178 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26471/image006.png\"></p><p>B is the mother of N's daughter's mother-in-law.</p><p>So, option (b) is incorrect.</p><p>Option (c): N  X  Q &div; V + S  -  B</p><p>N  X  Q means N is the daughter-in-law of Q</p><p>Q &div; V means Q is the husband of V</p><p>V + S means V is the daughter of S</p><p>S  -  B means S is the mother of B</p><p><img width=314 height=173 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26471/image007.png\"></p><p>B is the sibling of N's mother-in-law.</p><p>So, option (c) is incorrect.</p><p>Option (d): B &div; D  -  J &div; R + N</p><p>B &div; D means B is the husband of D</p><p>D  -  J means D is the mother of J</p><p>J &div; R means J is the husband of R</p><p>R + N means R is the daughter of N</p><p><img width=231 height=120 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26471/image008.png\"></p><p>B is the father-in-law of N's daughter.</p><p>So, option (d) is incorrect.</p>",
    "question_index": 15
  },

 &#2348;&#2354;&#2381;&#2348;, &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2361;&#2376;&#2306;</p><p>&#2325;&#2379;&#2312; &#2325;&#2381;&#2352;&#2379;&#2350;, &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</p><p>&#2360;&#2349;&#2368; &#2360;&#2344;&#2368;, &#2325;&#2381;&#2352;&#2379;&#2350; &#2361;&#2376;&#2306;</p><p><b>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</b></p><p>I. &#2325;&#2369;&#2331; &#2348;&#2354;&#2381;&#2348;, &#2325;&#2381;&#2352;&#2379;&#2350; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;</p><p>II. &#2325;&#2379;&#2312; &#2360;&#2344;&#2368;, &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</p><p>III. &#2325;&#2369;&#2331; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;, &#2325;&#2381;&#2352;&#2379;&#2350; &#2361;&#2376;&#2306;</p></span>",

      "<span class=\"eqt\">Both conclusions I and II follow</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",

    "question": "<span class=\"eqt\"><p>The Government of India consolidated 29 central labor laws into four comprehensive codes. Which of the following is one of those four Labor Codes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2344;&#2375; 29 &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2358;&#2381;&#2352;&#2350; &#2325;&#2366;&#2344;&#2370;&#2344;&#2379;&#2306; &#2325;&#2379; &#2330;&#2366;&#2352; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2375;&#2325;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2313;&#2344; &#2330;&#2366;&#2352; &#2358;&#2381;&#2352;&#2350; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The Code on Working Hours</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2351; &#2360;&#2350;&#2351; &#2346;&#2352; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;</span>",
      "<span class=\"eqt\">The Code on Social Security</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2346;&#2352; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;</span>",
      "<span class=\"eqt\">The Code on foreign services</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2346;&#2352; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;</span>",
      "<span class=\"eqt\">The Code on International Migration</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2346;&#2381;&#2352;&#2357;&#2366;&#2360;&#2344; &#2346;&#2352; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;</span>"
    ],
    "solution": "<p>The Code on Social Security, 2020 is one of the four Labour Codes enacted by the Government of India to consolidate and rationalize 29 existing central labour laws.</p><p>The four Labour Codes are:</p><p>Code on Wages, 2019</p><p>Industrial Relations Code, 2020</p><p>Occupational Safety, Health and Working Conditions Code, 2020</p><p>Code on Social Security, 2020</p><p><b><u>Further Insights</u></b></p><p>The Labour Codes aim to simplify compliance and improve ease of doing business.</p><p>The Code on Wages introduced the concept of a universal minimum wage.</p><p>The Code on Social Security extends benefits to gig and platform workers.</p><p>The Industrial Relations Code changed rules related to strikes and layoffs.</p><p>The new codes replaced 29 central labour laws between 2019 and 2020.</p>",
    "question_index": 25
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Parliamentary Committees has a tradition/convention where the Chairman is appointed from the leading Opposition party in the Lok Sabha?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2306;&#2360;&#2342;&#2368;&#2351; &#2360;&#2350;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2368; &#2346;&#2352;&#2306;&#2346;&#2352;&#2366;/&#2352;&#2367;&#2357;&#2366;&#2332; &#2361;&#2376; &#2325;&#2367; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2354;&#2379;&#2325; &#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2357;&#2367;&#2346;&#2325;&#2381;&#2359;&#2368; &#2346;&#2366;&#2352;&#2381;&#2335;&#2368; &#2360;&#2375; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Estimates Committee</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2350;&#2366;&#2344; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Committee on Public Undertakings</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2313;&#2346;&#2325;&#2381;&#2352;&#2350;&#2379;&#2306; &#2346;&#2352; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Public Accounts Committee</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2354;&#2375;&#2326;&#2366; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Ethics Committee</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2376;&#2340;&#2367;&#2325;&#2340;&#2366; &#2360;&#2350;&#2367;&#2340;&#2367;</span>"
    ],
    "solution": "<p>The Public Accounts Committee (PAC) has a well-established convention that its Chairperson is appointed from the leading Opposition party in the Lok Sabha.</p><p>Although not mandated by the Constitution, this convention developed to ensure financial accountability of the government. Since PAC examines reports of the Comptroller and Auditor General (CAG) and scrutinizes government expenditure, having an Opposition chair enhances neutrality and oversight.</p><p><b><u>Further Insights</u></b></p><p>PAC has 22 members (15 from Lok Sabha, 7 from Rajya Sabha).</p><p>Ministers cannot be members of the PAC.</p><p>PAC examines CAG audit reports.</p><p>The convention of Opposition chair for PAC began in 1967.</p><p>Financial Committees of Parliament include PAC, Estimates Committee, and Committee on Public Undertakings.</p>",
    "question_index": 26
  },
  {
    "question": "<span class=\"eqt\"><p>The Pentavalent Vaccine, introduced under India's Universal Immunization Programme (UIP), provides combined protection to children against which of the following five diseases?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2375;&#2306;&#2335;&#2366;&#2357;&#2376;&#2354;&#2375;&#2344;&#2381;&#2335; &#2357;&#2376;&#2325;&#2381;&#2360;&#2368;&#2344;, &#2332;&#2379; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2351;&#2370;&#2344;&#2367;&#2357;&#2352;&#2381;&#2360;&#2354; &#2311;&#2350;&#2381;&#2351;&#2370;&#2344;&#2366;&#2311;&#2332;&#2375;&#2358;&#2344; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; (UIP) &#2325;&#2375; &#2340;&#2361;&#2340; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2361;&#2376;, &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2366;&#2306;&#2330; &#2348;&#2368;&#2350;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Diphtheria, Pertussis, Tetanus, Typhoid, and Hepatitis C</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2346;&#2381;&#2341;&#2368;&#2352;&#2367;&#2351;&#2366;, &#2325;&#2366;&#2354;&#2368; &#2326;&#2366;&#2306;&#2360;&#2368;, &#2335;&#2375;&#2335;&#2344;&#2360;, &#2335;&#2366;&#2311;&#2347;&#2366;&#2311;&#2337;, &#2324;&#2352; &#2361;&#2375;&#2346;&#2375;&#2335;&#2366;&#2311;&#2335;&#2367;&#2360; &#2360;&#2368;</span>",
      "<span class=\"eqt\">Diphtheria, Polio, Tetanus, Hepatitis A, and Tuberculosis</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2346;&#2381;&#2341;&#2368;&#2352;&#2367;&#2351;&#2366;, &#2346;&#2379;&#2354;&#2367;&#2351;&#2379;, &#2335;&#2375;&#2335;&#2344;&#2360;, &#2361;&#2375;&#2346;&#2375;&#2335;&#2366;&#2311;&#2335;&#2367;&#2360; &#2319;, &#2324;&#2352; &#2340;&#2346;&#2375;&#2342;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Measles, Mumps, Rubella, Chickenpox, and Tetanus</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2360;&#2352;&#2366;, &#2350;&#2350;&#2381;&#2346;&#2381;&#2360;, &#2352;&#2370;&#2348;&#2375;&#2354;&#2366;, &#2330;&#2367;&#2325;&#2344;&#2346;&#2377;&#2325;&#2381;&#2360;, &#2324;&#2352; &#2335;&#2375;&#2335;&#2344;&#2360;</span>",
      "<span class=\"eqt\">Diphtheria, Pertussis, Tetanus, Hepatitis B, and Haemophilus influenzae type b (Hib)</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2346;&#2381;&#2341;&#2368;&#2352;&#2367;&#2351;&#2366;, &#2325;&#2366;&#2354;&#2368; &#2326;&#2366;&#2306;&#2360;&#2368;, &#2335;&#2375;&#2335;&#2344;&#2360;, &#2361;&#2375;&#2346;&#2375;&#2335;&#2366;&#2311;&#2335;&#2367;&#2360; &#2348;&#2368;, &#2324;&#2352; &#2361;&#2368;&#2350;&#2379;&#2347;&#2367;&#2354;&#2360; &#2311;&#2344;&#2381;&#2347;&#2381;&#2354;&#2369;&#2319;&#2306;&#2332;&#2366; &#2335;&#2366;&#2311;&#2346; &#2348;&#2368; (Hib)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Pentavalent Vaccine protects against five diseases:</p><p>Diphtheria</p><p>Pertussis (Whooping cough)</p><p>Tetanus</p><p>Hepatitis B</p><p>Haemophilus influenzae type b (Hib)</p><p>It combines the traditional DPT vaccine with protection against Hepatitis B and Hib.</p><p><b><u>Further Insights</u></b></p><p>Pentavalent vaccine was introduced in India in 2011 under UIP.</p><p>It reduces the number of injections required for infants.</p><p>Hib infection can cause meningitis and pneumonia in children.</p><p>UIP is one of the largest public health programmes in the world.</p><p>The vaccine is administered in three primary doses during infancy.</p>",
    "question_index": 27
  },
  {
    "question": "<span class=\"eqt\"><p>On which of the following dates is \"World Wetlands Day\" celebrated annually to mark the adoption of the Ramsar Convention?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2340;&#2366;&#2352;&#2368;&#2326; &#2325;&#2379; \"&#2357;&#2367;&#2358;&#2381;&#2357; &#2357;&#2375;&#2335;&#2354;&#2376;&#2306;&#2337; &#2342;&#2367;&#2357;&#2360;\" &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2352;&#2376;&#2350;&#2360;&#2352; &#2325;&#2344;&#2381;&#2357;&#2375;&#2306;&#2358;&#2344; &#2325;&#2379; &#2309;&#2346;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">February 2</span><span class=\"hqt\" style=\"display:none\">2 &#2347;&#2352;&#2357;&#2352;&#2368;</span>",
      "<span class=\"eqt\">June 5</span><span class=\"hqt\" style=\"display:none\">5 &#2332;&#2370;&#2344;</span>",
      "<span class=\"eqt\">April 22</span><span class=\"hqt\" style=\"display:none\">22 &#2309;&#2346;&#2381;&#2352;&#2376;&#2354;</span>",
      "<span class=\"eqt\">March 22</span><span class=\"hqt\" style=\"display:none\">22 &#2350;&#2366;&#2352;&#2381;&#2330;</span>"
    ],
    "solution": "<p>World Wetlands Day is celebrated every year on February 2.</p><p>It marks the adoption of the Ramsar Convention on Wetlands, which was signed on 2 February 1971 in Ramsar, Iran.</p><p><b><u>Further Insights</u></b></p><p>The Ramsar Convention is an international treaty for wetland conservation.</p><p>India became a signatory to the Ramsar Convention in 1982.</p><p>India has over 75 Ramsar sites (and the number continues to grow).</p><p>Wetlands act as natural water filters and flood buffers.</p><p>The Montreux Record lists threatened Ramsar sites.</p>",
    "question_index": 28
  },
  {
    "question": "<span class=\"eqt\"><p>Regarding India's debut at the 1948 London Olympics, consider the following statements:</p><p>i) The Indian football team played their match against Spain primarily barefoot or with bandaged feet.</p><p>ii) Despite playing barefoot or in bandages, India lost narrowly (2 - 1) after missing two penalties.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>1948 &#2354;&#2306;&#2342;&#2344; &#2323;&#2354;&#2306;&#2346;&#2367;&#2325;&#2381;&#2360; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i) &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2347;&#2369;&#2335;&#2348;&#2377;&#2354; &#2335;&#2368;&#2350; &#2344;&#2375; &#2309;&#2346;&#2344;&#2366; &#2350;&#2376;&#2330; &#2360;&#2381;&#2346;&#2375;&#2344; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2306;&#2327;&#2375; &#2346;&#2366;&#2306;&#2357; &#2351;&#2366; &#2346;&#2335;&#2381;&#2335;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2326;&#2375;&#2354;&#2366;&#2404;</p><p>ii) &#2344;&#2306;&#2327;&#2375; &#2346;&#2366;&#2306;&#2357; &#2351;&#2366; &#2346;&#2335;&#2381;&#2335;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2326;&#2375;&#2354;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2357;&#2332;&#2370;&#2342;, &#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2342;&#2379; &#2346;&#2375;&#2344;&#2354;&#2381;&#2335;&#2368; &#2350;&#2367;&#2360; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2360;&#2306;&#2325;&#2369;&#2330;&#2367;&#2340; (2 - 1) &#2360;&#2375; &#2361;&#2366;&#2352; &#2327;&#2351;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i</span>",
      "<span class=\"eqt\">ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii</span>",
      "<span class=\"eqt\">Both i and ii</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">Neither i nor ii</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; i &#2324;&#2352; &#2344; &#2361;&#2368; ii</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>India did not play against Spain in the 1948 Olympics.</p><p>They played against France in their debut match.</p><p>It is true that several Indian players played barefoot or with bandaged feet  -  but the opponent mentioned (Spain) is wrong.</p><p>India lost the match 2 - 1 to France.</p><p>They missed two penalty kicks, which could have changed the result.</p><p><b><u>Further Insights</u></b></p><p>1948 was India's first Olympic appearance as an independent nation.</p><p>The match was played at Cricklefield Stadium, London.</p><p>India's football golden era came in the 1950s - 60s.</p><p>India won Asian Games gold in 1951 and 1962.</p><p>The barefoot story became symbolic of India's determination despite limited infrastructure.</p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>In November 2025, which officer was given the additional charge as the Director General (DG) of the Border Security Force (BSF)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2357;&#2306;&#2348;&#2352; 2025 &#2350;&#2375;&#2306;, &#2325;&#2367;&#2360; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368; &#2325;&#2379; &#2360;&#2368;&#2350;&#2366; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2348;&#2354; (&#2348;&#2368;&#2319;&#2360;&#2319;&#2347;) &#2325;&#2375; &#2350;&#2361;&#2366;&#2344;&#2367;&#2342;&#2375;&#2358;&#2325; (&#2337;&#2368;&#2332;&#2368;) &#2325;&#2375; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2346;&#2381;&#2352;&#2349;&#2366;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Daljit Singh Chaudhary</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2354;&#2332;&#2368;&#2340; &#2360;&#2367;&#2306;&#2361; &#2330;&#2380;&#2343;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Praveen Kumar</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2357;&#2368;&#2339; &#2325;&#2369;&#2350;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Nitin Agrawal</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2340;&#2367;&#2344; &#2309;&#2327;&#2381;&#2352;&#2357;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Pankaj Kumar Singh</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2325;&#2332; &#2325;&#2369;&#2350;&#2366;&#2352; &#2360;&#2367;&#2306;&#2361;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In November 2025, the Government of India assigned the additional charge of Director General of the Border Security Force (BSF) to Praveen Kumar, who was then serving as Director General of the Indo-Tibetan Border Police (ITBP).</p><p>This change occurred following the retirement (superannuation) of Daljit Singh Chaudhary as DG, BSF on 30 November 2025. Praveen Kumar was given the additional responsibility until a regular appointment is made.</p><p><b><u>Further Insights</u></b></p><p>The Border Security Force (BSF) guards India's borders with Pakistan and Bangladesh and is one of the largest paramilitary forces in the country.</p><p>The DG of BSF is appointed by the Government of India and reports to the Ministry of Home Affairs.</p><p>Praveen Kumar is a 1993 batch IPS officer of the West Bengal cadre.</p><p>The incumbent DG often represents the force at national and international security forums.</p><p>Interim additional charges are given when a post becomes vacant until a full-time appointment is made.</p>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>Which term was declared as the \"Word of the Year 2025\" by the Oxford University Press (OUP)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2321;&#2325;&#2381;&#2360;&#2347;&#2379;&#2352;&#2381;&#2337; &#2351;&#2370;&#2344;&#2367;&#2357;&#2352;&#2381;&#2360;&#2367;&#2335;&#2368; &#2346;&#2381;&#2352;&#2375;&#2360; (OUP) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; \"&#2357;&#2352;&#2381;&#2337; &#2321;&#2347; &#2342; &#2312;&#2351;&#2352; 2025\" &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2358;&#2348;&#2381;&#2342; &#2328;&#2379;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Parasocial</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2376;&#2352;&#2366;&#2360;&#2379;&#2358;&#2354;</span>",
      "<span class=\"eqt\">Rage bait</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2360;&#2381;&#2360;&#2366; &#2349;&#2337;&#2364;&#2325;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Brain rot</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2360;&#2381;&#2340;&#2367;&#2359;&#2381;&#2325; &#2325;&#2381;&#2359;&#2351;</span>",
      "<span class=\"eqt\">Hallucinate</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2361;&#2367;&#2340; &#2361;&#2379;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The term \"rage bait\" was declared as the Oxford Word of the Year 2025 by the Oxford University Press. It refers to online content that is deliberately designed to provoke anger or outrage in order to increase engagement  -  a trend that spiked significantly in 2025.</p><p><b><u>Further Insights</u></b></p><p>\"Rage bait\" reflects digital culture's shift toward outrage-driven engagement.</p><p>Oxford's Word of the Year highlights trends in language and society.</p><p>Cambridge and Oxford sometimes choose different Words of the Year.</p><p>Public voting can contribute to the selection process for Oxford's choice.</p><p>Words of the Year often reflect cultural, social, or technological shifts.</p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>Arrange the following dynasties of the Delhi Sultanate in the correct chronological order of their rule:</p><p>i) Lodi Dynasty</p><p>ii) Mamluk Dynasty</p><p>iii) Tughlaq Dynasty</p><p>iv) Khalji Dynasty</p><p>v) Sayyid Dynasty</p><p>Select the correct answer using the codes given below:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2306;&#2358;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2360;&#2361;&#2368; &#2325;&#2366;&#2354;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><p>i) &#2354;&#2379;&#2342;&#2368; &#2357;&#2306;&#2358;</p><p>ii) &#2350;&#2350;&#2354;&#2369;&#2325; &#2357;&#2306;&#2358;</p><p>iii) &#2340;&#2369;&#2327;&#2354;&#2325; &#2357;&#2306;&#2358;</p><p>iv) &#2326;&#2367;&#2354;&#2332;&#2368; &#2357;&#2306;&#2358;</p><p>v) &#2360;&#2351;&#2381;&#2351;&#2342; &#2357;&#2306;&#2358;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">ii  -  iv  -  iii  -  v  -  i</span><span class=\"hqt\" style=\"display:none\">ii - iv - iii - v - i</span>",
      "<span class=\"eqt\">ii  -  iii  -  iv  -  v  -  i</span><span class=\"hqt\" style=\"display:none\">ii - iii - iv - v - i</span>",
      "<span class=\"eqt\">iv  -  ii  -  iii  -  v  -  i</span><span class=\"hqt\" style=\"display:none\">iv - ii - iii - v - i</span>",
      "<span class=\"eqt\">ii  -  iv  -  v  -  iii  -  i</span><span class=\"hqt\" style=\"display:none\">ii - iv - v - iii - i</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct chronological order of the Delhi Sultanate dynasties is:</p><p>Mamluk (Slave) Dynasty (1206 - 1290)</p><p>Khalji Dynasty (1290 - 1320)</p><p>Tughlaq Dynasty (1320 - 1414)</p><p>Sayyid Dynasty (1414 - 1451)</p><p>Lodi Dynasty (1451 - 1526)</p><p><b><u>Further Insights</u></b></p><p>The Delhi Sultanate was founded in 1206 by Qutb-ud-din Aibak.</p><p>Alauddin Khalji introduced strict market control measures.</p><p>Muhammad bin Tughlaq is known for shifting the capital to Daulatabad.</p><p>Timur invaded Delhi during the later Tughlaq period (1398).</p><p>The Lodi dynasty ended with the First Battle of Panipat (1526), paving the way for the Mughal Empire</p>",
    "question_index": 32
  },
  {
    "question": "<span class=\"eqt\"><p>With reference to Financial Bills in the Indian Parliament, consider the following statements:</p><p>i. Financial Bills (Category I) under Article 117(1) can be introduced in either House of Parliament provided they have the President's recommendation.</p><p>ii. Financial Bills (Category II) under Article 117(3) are treated like ordinary bills in terms of the powers of Rajya Sabha to reject or amend them.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2360;&#2342; &#2350;&#2375;&#2306; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 117(1) &#2325;&#2375; &#2340;&#2361;&#2340; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; (&#2358;&#2381;&#2352;&#2375;&#2339;&#2368; I) &#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2360;&#2342;&#2344; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2367;&#2319; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2348;&#2358;&#2352;&#2381;&#2340;&#2375; &#2313;&#2344;&#2325;&#2375; &#2346;&#2366;&#2360; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358; &#2361;&#2379;&#2404;</p><p>ii. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 117(3) &#2325;&#2375; &#2340;&#2361;&#2340; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; (&#2358;&#2381;&#2352;&#2375;&#2339;&#2368; II) &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2325;&#2375; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2309;&#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2352;&#2344;&#2375; &#2351;&#2366; &#2360;&#2306;&#2358;&#2379;&#2343;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;&#2379;&#2306; &#2325;&#2368; &#2340;&#2352;&#2361; &#2350;&#2366;&#2344;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i</span>",
      "<span class=\"eqt\">ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii</span>",
      "<span class=\"eqt\">Both i and ii</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">Neither i nor ii</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; i &#2324;&#2352; &#2344; &#2361;&#2368; ii</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Statement 2 is correct.</b></p><p>Financial Bill (Category II) under Article 117(3) does not exclusively deal with matters listed in Article 110 (Money Bill provisions). It is treated like an ordinary bill, except that it requires the President's recommendation before passing.</p><p>The Rajya Sabha has full powers to amend, reject, or delay such a bill, just like an ordinary bill.</p><p><b>Statement 1 is incorrect:</b></p><p>Financial Bill (Category I) under Article 117(1) contains matters mentioned in Article 110 (like a Money Bill), along with other provisions.</p><p>Such bills:</p><p>Can be introduced only in the Lok Sabha, not in either House.</p><p>Require prior recommendation of the President.</p><p><b><u>Further Insights</u></b></p><p>All Money Bills are Financial Bills, but all Financial Bills are not Money Bills.</p><p>Money Bills can be introduced only in Lok Sabha (Article 110).</p><p>Rajya Sabha cannot reject a Money Bill; it can only make recommendations.</p><p>The Speaker of Lok Sabha certifies whether a bill is a Money Bill.</p><p>Financial Bill Category I has features of both Money Bill and Ordinary Bill.</p>",
    "question_index": 33
  },

    "question": "<span class=\"eqt\"><p>With reference to Chittorgarh Fort, consider the following statements:</p><p>1. It is the second-largest fort in India by area, ranking just behind Kumbhalgarh Fort.</p><p>2. The fort was originally constructed by the Gupta rulers during the peak of the Gupta Empire in the 7th century.</p><p>3. To reach the main fort area, one must pass through seven massive limestone gates, including Padan Pol, Bhairon Pol, and Ram Pol.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2367;&#2340;&#2381;&#2340;&#2380;&#2337;&#2364;&#2327;&#2338;&#2364; &#2325;&#2367;&#2354;&#2375; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2351;&#2361; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2375; &#2361;&#2367;&#2360;&#2366;&#2348; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2342;&#2370;&#2360;&#2352;&#2366; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2325;&#2367;&#2354;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2325;&#2375;&#2357;&#2354; &#2325;&#2369;&#2350;&#2381;&#2349;&#2354;&#2327;&#2338;&#2364; &#2325;&#2367;&#2354;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2310;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2351;&#2361; &#2325;&#2367;&#2354;&#2366; &#2350;&#2370;&#2354; &#2352;&#2370;&#2346; &#2360;&#2375; &#2327;&#2369;&#2346;&#2381;&#2340; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2358;&#2367;&#2326;&#2352; &#2325;&#2366;&#2354; &#2350;&#2375;&#2306; 7&#2357;&#2368;&#2306; &#2360;&#2342;&#2368; &#2350;&#2375;&#2306; &#2327;&#2369;&#2346;&#2381;&#2340; &#2358;&#2366;&#2360;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>3. &#2350;&#2369;&#2326;&#2381;&#2351; &#2325;&#2367;&#2354;&#2375; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;, &#2360;&#2366;&#2340; &#2357;&#2367;&#2358;&#2366;&#2354; &#2330;&#2370;&#2344;&#2366; &#2346;&#2340;&#2381;&#2341;&#2352; &#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2379;&#2306; &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2344;&#2366; &#2346;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2346;&#2342;&#2344; &#2346;&#2379;&#2354;, &#2349;&#2376;&#2352;&#2379;&#2306; &#2346;&#2379;&#2354;, &#2324;&#2352; &#2352;&#2366;&#2350; &#2346;&#2379;&#2354; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Statement 3</b> is correct.</p><p>Chittorgarh Fort has seven massive gates (pols) that one must cross to reach the main fort complex. These include Padan Pol, Bhairon Pol, Hanuman Pol, Ganesh Pol, Jodla Pol, Laxman Pol, and Ram Pol. These gates were strategically constructed for defense purposes.</p><p><b>Statement 1 is incorrect.</b></p><p>Chittorgarh Fort is actually considered the largest fort in India by area, not the second-largest.</p><p>Kumbhalgarh Fort is massive and has the second-longest continuous wall in the world, but it is not larger than Chittorgarh in terms of area.</p><p><b>Statement 2 is incorrect.</b></p><p>The fort was not built by the Guptas in the 7th century. It is traditionally attributed to Chitrangada Mori, a ruler of the Maurya dynasty (of Mewar), around the 7th century. Later it came under the control of the Guhila (Sisodia) Rajputs.</p><p><b><u>Further Insights</u></b></p><p>Chittorgarh Fort is a UNESCO World Heritage Site under \"Hill Forts of Rajasthan.\"</p><p>It witnessed three major sieges: by Alauddin Khilji (1303), Bahadur Shah of Gujarat (1535), and Akbar (1568).</p><p>The fort is associated with the legend of Rani Padmini.</p><p>Vijay Stambha was built by Rana Kumbha to commemorate victory over the Sultan of Malwa.</p><p>The concept of Jauhar is historically associated with Chittorgarh.</p>",
    "question_index": 34
  },
  {
    "question": "<span class=\"eqt\"><p>In Lakshadweep, what best describes the traditional \"Lava\" performance?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2325;&#2381;&#2359;&#2342;&#2381;&#2357;&#2368;&#2346; &#2350;&#2375;&#2306;, &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; \"&#2354;&#2366;&#2357;&#2366;\" &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A fast devotional dance performed only by women during monsoon festivals.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2340;&#2375;&#2332;&#2364; &#2349;&#2325;&#2381;&#2340;&#2367; &#2344;&#2371;&#2340;&#2381;&#2351; &#2332;&#2379; &#2325;&#2375;&#2357;&#2354; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A fast and energetic group performance by men using sticks and shields, showing strength and sea-warrior skills.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2336;&#2368; &#2324;&#2352; &#2338;&#2366;&#2354; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2340;&#2375;&#2332;&#2364; &#2324;&#2352; &#2314;&#2352;&#2381;&#2332;&#2366;&#2357;&#2366;&#2344; &#2360;&#2350;&#2370;&#2361; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344;, &#2332;&#2379; &#2358;&#2325;&#2381;&#2340;&#2367; &#2324;&#2352; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2368; &#2351;&#2379;&#2342;&#2381;&#2343;&#2366; &#2325;&#2380;&#2358;&#2354; &#2342;&#2367;&#2326;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A puppet show used to tell stories from the Ramayana and Mahabharata.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2350;&#2366;&#2351;&#2339; &#2324;&#2352; &#2350;&#2361;&#2366;&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2325;&#2361;&#2366;&#2344;&#2367;&#2351;&#2366;&#2305; &#2348;&#2340;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2325;&#2336;&#2346;&#2369;&#2340;&#2354;&#2368; &#2358;&#2379;&#2404;</span>",
      "<span class=\"eqt\">A recently introduced modern dance with no link to traditional island culture.</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2354; &#2361;&#2368; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2344;&#2371;&#2340;&#2381;&#2351; &#2332;&#2367;&#2360;&#2325;&#2366; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2342;&#2381;&#2357;&#2368;&#2346; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367; &#2360;&#2375; &#2325;&#2379;&#2312; &#2360;&#2306;&#2348;&#2306;&#2343; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Lava performance of Lakshadweep is a vigorous, rhythmic group dance performed by men.</p><p>Key features:</p><p>Performed in groups</p><p>Involves mock combat movements</p><p>Use of sticks and shields</p><p>Symbolizes strength, agility, and martial readiness</p><p>Since Lakshadweep is an island territory with a maritime tradition, the performance reflects the physical coordination and warrior-like discipline needed in sea-faring life.</p><p><b><u>Further Insights</u></b></p><p>Lakshadweep culture has strong maritime and martial influences.</p><p>Kolkali and Parichakali are other traditional performances with combat-style movements.</p><p>Cultural practices in Minicoy differ slightly due to Maldivian influence.</p><p>Martial dance traditions are common in coastal and island societies.</p>",
    "question_index": 35
  },

&#2323;&#2352; &#2358;&#2366;&#2306;&#2340;&#2367;&#2346;&#2370;&#2352;&#2381;&#2339; &#2332;&#2369;&#2354;&#2370;&#2360; &#2325;&#2366; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343;&#2367; &#2350;&#2367;&#2354;&#2368;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2327;&#2379;&#2354;&#2368; &#2350;&#2366;&#2352;&#2368; &#2327;&#2312; &#2361;&#2379;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [

      "<span class=\"eqt\">ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii</span>",
