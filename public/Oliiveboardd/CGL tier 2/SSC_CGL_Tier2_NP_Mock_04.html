  {
    "question": "<span class=\"eqt\"><p>The curved surface area of a circular cone is 1540 sq. cm and radius of the base is 4.9 cm. Find the slant height of cone.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2352;&#2381;&#2340;&#2381;&#2340;&#2369;&#2354; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 1540 sq. cm &#2361;&#2376; &#2324;&#2352; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 4.9 cm &#2361;&#2376;, &#2340;&#2379; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2340;&#2367;&#2352;&#2381;&#2351;&#2325; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">100 cm</span><span class=\"hqt\" style=\"display:none\">100 cm</span>",
      "<span class=\"eqt\">140 cm</span><span class=\"hqt\" style=\"display:none\">140 cm</span>",
      "<span class=\"eqt\">136 cm</span><span class=\"hqt\" style=\"display:none\">136 cm</span>"

    "correct_option_id": 1,
    "solution": "<p>Curved surface area = 1540</p><p>&#928; * radius * slant height = 1540</p><p>(22/7) * 4.9 * l = 1540</p><p>l = 1540 * 7 * 10/ (22 * 49)</p><p>l = 70 * 70/49</p><p>l = 100 cm</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A 440-liter container contains pure milk and 40 liters of the container is empty. From the container 20% of the content is replaced with water, then 25% of the content is replaced with water and then 10% of the content is replaced with water. What is the quantity (in liters) of water in the final mixture?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; 440 &#2354;&#2368;&#2335;&#2352; &#2325;&#2375; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; &#2350;&#2375;&#2306; &#2358;&#2369;&#2342;&#2381;&#2343; &#2342;&#2370;&#2343; &#2361;&#2376; &#2324;&#2352; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; &#2325;&#2366; 40 &#2354;&#2368;&#2335;&#2352; &#2349;&#2366;&#2327; &#2326;&#2366;&#2354;&#2368; &#2361;&#2376;&#2404; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; &#2360;&#2375; 20% &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2325;&#2379; &#2346;&#2366;&#2344;&#2368; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2347;&#2367;&#2352; 25% &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2325;&#2379; &#2346;&#2366;&#2344;&#2368; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2347;&#2367;&#2352; 10% &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2325;&#2379; &#2346;&#2366;&#2344;&#2368; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2309;&#2306;&#2340;&#2367;&#2350; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; (&#2354;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">148 liters</span><span class=\"hqt\" style=\"display:none\">148 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">156 liters</span><span class=\"hqt\" style=\"display:none\">156 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">184 liters</span><span class=\"hqt\" style=\"display:none\">184 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">178 liters</span><span class=\"hqt\" style=\"display:none\">178 &#2354;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Milk initially = 440  -  40 = 400 liters</p><p>Milk in the final mixture = 400 * 0.8 * 0.75 * 0.9 = 216 liters</p><p>Water in the final mixture = 400  -  216 = 184 liters</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>50% of (X + Y) - 48% of X = 70% of Y, then what is the ratio of X and Y?</p></span><span class=\"hqt\" style=\"display:none\"><p>(X + Y) &#2325;&#2366; 50% - X &#2325;&#2366; 48% = Y &#2325;&#2366; 70% &#2361;&#2376; , &#2340;&#2379; X &#2324;&#2352; Y &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">9: 2</span><span class=\"hqt\" style=\"display:none\">9 : 2</span>",
      "<span class=\"eqt\">10: 1</span><span class=\"hqt\" style=\"display:none\">10 : 1</span>",
      "<span class=\"eqt\">11: 4</span><span class=\"hqt\" style=\"display:none\">11 : 4</span>",
      "<span class=\"eqt\">10: 3</span><span class=\"hqt\" style=\"display:none\">10 : 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>50% of (X + Y) - 48% of X = 70% of Y</p><p>=&gt; 50/100 * (X + Y) - 48/100 * X = 70/100 * Y</p><p>=&gt; X/Y = 10/1</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If x = 1 + 2&radic;3 and y = 2  -  &radic;3, then find that which of the following expression given below is true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; x = 1 + 2&radic;3 &#2324;&#2352; y = 2 - &radic;3 &#2361;&#2376;, &#2340;&#2379; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">x<sup>2</sup> + y<sup>2</sup> = 20</span><span class=\"hqt\" style=\"display:none\">x<sup>2</sup> + y<sup>2</sup> = 20</span>",
      "<span class=\"eqt\">xy = (3&radic;3 + 4)</span><span class=\"hqt\" style=\"display:none\">xy = (3&radic;3 + 4)</span>",
      "<span class=\"eqt\">x<sup>2</sup>  -  y<sup>2</sup> = 20</span><span class=\"hqt\" style=\"display:none\">x<sup>2</sup> - y<sup>2</sup> = 20</span>",
      "<span class=\"eqt\">x<sup>2</sup>  -  y<sup>2</sup> = (6  -  8&radic;3)</span><span class=\"hqt\" style=\"display:none\">x<sup>2</sup> - y<sup>2</sup> = (6 - 8&radic;3)</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>x = 1 + 2&radic;3</p><p>(x)<sup>2</sup> = (1 + 2&radic;3)<sup>2</sup> = 1 + 12 + 4&radic;3 = 13 + 4&radic;3</p><p>y = 2  -  &radic;3</p><p>(y)<sup>2</sup> = (2  -  &radic;3)<sup>2</sup> = 4 + 3  -  4&radic;3 = 7  -  4&radic;3</p><p>x<sup>2</sup> + y<sup>2</sup> = 13 + 4&radic;3 + 7  -  4&radic;3 = 20</p><p>x<sup>2</sup>  -  y<sup>2</sup> = 13 + 4&radic;3  -  7 + 4&radic;3 = 6 + 8&radic;3</p><p>(xy) = (1 + 2&radic;3)(2  -  &radic;3) = 2  -  &radic;3 + 4&radic;3  -  6 = 3&radic;3  -  4</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A certain sum amounts to &#8377;4056 in six months at the rate of 16% per annum compounded quarterly. Find the value of sum.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2340;&#2381;&#2352;&#2376;&#2350;&#2366;&#2360;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; 16% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2331;&#2361; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#8377;4056 &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;3250</span><span class=\"hqt\" style=\"display:none\">&#8377;3250</span>",
      "<span class=\"eqt\">&#8377;3000</span><span class=\"hqt\" style=\"display:none\">&#8377;3000</span>",
      "<span class=\"eqt\">&#8377;3600</span><span class=\"hqt\" style=\"display:none\">&#8377;3600</span>",
      "<span class=\"eqt\">&#8377;3750</span><span class=\"hqt\" style=\"display:none\">&#8377;3750</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A = &#8377;4056, n = 6/3 = 2, R = 16/4 = 4%</p><p>4056 = P * (1 + 4/100)<sup>2</sup></p><p>4056 = P * (26/25)<sup>2</sup></p><p>P = &#8377;3750</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A person bought 12 dozens apples for Rs. 504 and sold 800 apples for Rs. 3840. Find the approximate profit/loss percentage of the person.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; 504 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; 12 &#2342;&#2352;&#2381;&#2332;&#2344; &#2360;&#2375;&#2348; &#2326;&#2352;&#2368;&#2342;&#2375; &#2324;&#2352; 3840 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; 800 &#2360;&#2375;&#2348; &#2348;&#2375;&#2330;&#2375;&#2404; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2354;&#2366;&#2349;/&#2361;&#2366;&#2344;&#2367; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">28% loss</span><span class=\"hqt\" style=\"display:none\">28% &#2361;&#2366;&#2344;&#2367;</span>",
      "<span class=\"eqt\">37% profit</span><span class=\"hqt\" style=\"display:none\">37% &#2354;&#2366;&#2349;</span>",
      "<span class=\"eqt\">40% loss</span><span class=\"hqt\" style=\"display:none\">40% &#2361;&#2366;&#2344;&#2367;</span>",
      "<span class=\"eqt\">54% profit</span><span class=\"hqt\" style=\"display:none\">54% &#2354;&#2366;&#2349;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Cost price of 1 apple = 504/(12 * 12) = Rs. 3.5</p><p>Selling price of 1 apple = 3840/800 = Rs. 4.8</p><p>Profit percentage = (4.8  -  3.5)/3.5 * 100 = 37.14% (approx. 37%)</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The probability that a student likes both cricket and badminton is 0.55 and the probability of liking neither is 0.15. If the probability of liking cricket is 0.75, what is the probability of liking badminton? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2331;&#2366;&#2340;&#2381;&#2352; &#2325;&#2379; &#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2324;&#2352; &#2348;&#2376;&#2337;&#2350;&#2367;&#2306;&#2335;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2360;&#2306;&#2342; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; 0.55 &#2361;&#2376; &#2324;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2369;&#2331; &#2349;&#2368; &#2346;&#2360;&#2306;&#2342; &#2344; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; 0.15 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2346;&#2360;&#2306;&#2342; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; 0.75 &#2361;&#2376;, &#2340;&#2379; &#2348;&#2376;&#2337;&#2350;&#2367;&#2306;&#2335;&#2344; &#2346;&#2360;&#2306;&#2342; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">0.35</span><span class=\"hqt\" style=\"display:none\">0.35</span>",
      "<span class=\"eqt\">0.55</span><span class=\"hqt\" style=\"display:none\">0.55</span>",
      "<span class=\"eqt\">0.45</span><span class=\"hqt\" style=\"display:none\">0.45</span>",
      "<span class=\"eqt\">0.65</span><span class=\"hqt\" style=\"display:none\">0.65</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A = Cricket, B = Badminton </p><p>P (A &#1352; B) = 0.55, P (<img width=48 height=24 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25981/image006.png\"> = 0.15, P (B) = 0.75 </p><p>P (<img width=48 height=24 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25981/image006.png\"> = 1  -  P (A U B) = 1  -  [P (A) + P (B)  -  P (A &#1352; B)]</p><p>0.15 = 1  -  [0.75 + P(B)  -  0.55] </p><p>P (B) = 1  -  0.20  -  0.15 </p><p>P (B) = 0.65 </p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Two persons observed the top of a tree at an angle of elevation of 30&deg; and 60&deg; respectively, from two different points B and C. If the distance between points B and C is 84 meters and both lie on opposite sides of the tree, then find the height of the tree.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2342;&#2379; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; B &#2324;&#2352; C &#2360;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 30&deg; &#2324;&#2352; 60&deg; &#2325;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; &#2346;&#2352; &#2319;&#2325; &#2346;&#2375;&#2337;&#2364; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2379; &#2342;&#2375;&#2326;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2348;&#2367;&#2306;&#2342;&#2369; B &#2324;&#2352; C &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 84 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376; &#2324;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2348;&#2367;&#2306;&#2342;&#2369; &#2357;&#2371;&#2325;&#2381;&#2359; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2342;&#2367;&#2358;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2346;&#2375;&#2337;&#2364; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "solution": "<p><img width=239 height=114 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25819/image002.png\"></p><p>AD = The height of the tree</p><p>BD = Distance of one person from tree</p><p>CD = Distance of other person from tree</p><p>Let the distance between BD be 'X'</p><p>1 = X m </p><p>AD = &radic;3 = &radic;3X m </p><p>&radic;3 = 84  -  X </p><p>AD = 1 = (84  -  X)/&radic;3 m</p><p>&radic;3X = (84  -  X)/ &radic;3</p><p>=&gt; 3X = 84  -  X </p><p>=&gt; 4X = 84 </p><p>=&gt; X = 21 m </p><p>Hence, the height of the tree = 21&radic;3 meters </p>",

307; 8: 9: 8 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;, &#2340;&#2379; (q + p) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>A person covers a total journey of 558 km in a total of 27 hours. Part of which he covers by foot at speed of 14 km/hr and rest by bike at speed of 26 km/hr. Find the distance covered by bike.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2369;&#2354; 27 &#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; 558 km &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2366; &#2325;&#2369;&#2331; &#2349;&#2366;&#2327; &#2357;&#2361; 14 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2346;&#2376;&#2342;&#2354; &#2324;&#2352; &#2358;&#2375;&#2359; &#2349;&#2366;&#2327; 26 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2348;&#2366;&#2311;&#2325; &#2360;&#2375; &#2340;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2348;&#2366;&#2311;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2340;&#2351; &#2325;&#2368; &#2327;&#2312; &#2342;&#2370;&#2352;&#2368; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

      "<span class=\"eqt\">24 cm</span><span class=\"hqt\" style=\"display:none\">24 cm</span>",

    "solution": "<p><img width=353 height=102 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24210/image001.png\"></p><p>According to the triangle similarity property,</p><p>CA/FD = AB/DE</p><p>=> 56/60 = 28/DE</p><p>=> DE = 28 * 60/56</p><p>=> DE = 30 cm</p>",

    "question": "<span class=\"eqt\"><p>Worker A is 35% more efficient than worker B. Working together, they can do a work in 10 days. A started the work and left after 15 days. Worker B and C together completed the remaining work in next 2 days. C alone can do 25/47<sup>th</sup> of the original work in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2381;&#2352;&#2350;&#2367;&#2325; A, &#2358;&#2381;&#2352;&#2350;&#2367;&#2325; B &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 35% &#2309;&#2343;&#2367;&#2325; &#2325;&#2369;&#2358;&#2354; &#2361;&#2376;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2357;&#2375; &#2325;&#2367;&#2360;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 10 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; A &#2344;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; 15 &#2342;&#2367;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342; &#2313;&#2360;&#2344;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2331;&#2379;&#2337;&#2364; &#2342;&#2367;&#2351;&#2366;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325; B &#2324;&#2352; C &#2344;&#2375; &#2358;&#2375;&#2359; &#2325;&#2366;&#2352;&#2381;&#2351; &#2309;&#2327;&#2354;&#2375; 2 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366;&#2404; &#2309;&#2325;&#2375;&#2354;&#2375; C &#2350;&#2370;&#2354; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2366; 25/47&#2357;&#2366;&#2305; &#2349;&#2366;&#2327; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>Ratio in the efficiency of A and B = 135: 100 = 27: 20</p><p>Let efficiencies of A and B be 27X and 20X respectively.</p><p>Total work = (27X + 20X) * 10 = 470X units</p><p>Work done by A in 15 days = 27X * 15 = 405X units</p><p>Let the efficiency of C be C units/day.</p><p>Therefore,</p><p>(20X + C) * 2 = 65X</p><p>2C = 25X</p><p>C = 25X/2</p><p>Now 25/47<sup>th</sup> of work = 470X * 25/47 = 250X units</p><p>Required time = 250X * 2/25X = 20 days</p>",

    "question": "<span class=\"eqt\"><div>&nbsp;If (X<sup>6</sup> - 5&radic;5Y<sup>6</sup>) = (X<sup>2</sup> + AY<sup>2</sup>)(X<sup>4</sup> + BX<sup>2</sup>Y<sup>2</sup> + CY<sup>4</sup>), then what is the value of&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">(A<sup>2</sup> + B<sup>2</sup>  -  C<sup>2</sup>)</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">5</span></div>&nbsp;&quest;&nbsp;</div></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (X<sup>6</sup> - 5&radic;5Y<sup>6</sup>) = (X<sup>2</sup> + AY<sup>2</sup>)(X<sup>4</sup> + BX<sup>2</sup>Y<sup>2</sup> + CY<sup>4</sup>) &#2361;&#2376;, &#2340;&#2379;</p><p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">(A<sup>2</sup> + B<sup>2</sup>  -  C<sup>2</sup>)</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">5</span></div> &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</div></p></span>",

    "solution": "<p>(X<sup>6</sup> - 5&radic;5Y<sup>6</sup>)</p><p>= (X<sup>2</sup>)<sup>3</sup>  -  (&radic;5Y<sup>2</sup>)<sup>3</sup></p><p>= (X<sup>2</sup> - &radic;5Y<sup>2</sup>)(X<sup>4</sup> + 5Y<sup>4</sup> + &radic;5X<sup>2</sup>Y<sup>2</sup>)</p><p>= (X<sup>2</sup> + AY<sup>2</sup>)(X<sup>4</sup> + BX<sup>2</sup>Y<sup>2</sup> + CY<sup>4</sup>)</p><p>Therefore, A = -&radic;5, B = &radic;5, and C = 5</p><p>Now, (A<sup>2</sup> + B<sup>2</sup>  -  C<sup>2</sup>)/5 = (5 + 5  -  25)/5 = -15/5 = -3</p>",

    "question": "<span class=\"eqt\"><p>When an article is sold at 35 percent discount, then there is a loss of 9 percent. What should be the discount percent to earn a profit of 12 percent?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; 35 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2331;&#2370;&#2335; &#2346;&#2352; &#2348;&#2375;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; 9 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2368; &#2361;&#2366;&#2344;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; 12 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2366; &#2354;&#2366;&#2349; &#2325;&#2350;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2331;&#2370;&#2335; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [

      "<span class=\"eqt\">24%</span><span class=\"hqt\" style=\"display:none\">24%</span>",
      "<span class=\"eqt\">16%</span><span class=\"hqt\" style=\"display:none\">16%</span>",

    "solution": "<p>Let cost price of article be Rs.100</p><p>Selling price at 9% loss = Rs.91</p><p>Marked price at 35% discount = 91 * 100/65 = Rs.140</p><p>New selling price = 100 * 112/100 = Rs.112</p><p>Discount% = (140 - 112) * 100/140</p><p>= 28 * 10/14</p><p>= 20%</p><p></p>",

    "question": "<span class=\"eqt\"><p>Read the given information carefully and answer the following question.</p><p>In certain code language:</p><p>'D@E' means 'D is to the north of E'</p><p>'D#E' means 'D is to the south of E'</p><p>'D%E' means 'D is to the east of E'</p><p>'D$E' means 'D is to the west of E'</p><p>'D@%E' means 'D is to the north-east of E'</p><p>NOTE: 'D4m@E' means 'D is 4 m to the north of E' and so on.</p><p>V1m#U8m%T; S3m$R4m#Q2m%P; S3m@T</p><p>In which direction is V with respect to P?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404;</p><p>&#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;:</p><p>'D@E' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'D, E &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;'</p><p>'D#E' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'D, E &#2325;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;'</p><p>'D%E' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'D, E &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;'</p><p>'D$E' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'D, E &#2325;&#2375; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;'</p><p>'D@%E' &#2325;&#2366; &     "question": "<span class=\"eqt\"><p>Each item describes a situation and is followed by four possible responses. Indicate the response you find most appropriate. Choose only one response for each item. The responses will be evaluated based on the level of appropriateness for the given situation.</p><p>A student feels very nervous before an important exam, even though they have prepared most of the syllabus. What should be the best strategy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2330;&#2366;&#2352; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2332;&#2379; &#2313;&#2340;&#2381;&#2340;&#2352; &#2360;&#2348;&#2360;&#2375; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2354;&#2327;&#2375;, &#2313;&#2360;&#2375; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404; &#2313;&#2340;&#2381;&#2340;&#2352;&#2379;&#2306; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2342;&#2368; &#2327;&#2312; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2344;&#2325;&#2368; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340;&#2340;&#2366; &#2325;&#2375; &#2360;&#2381;&#2340;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404;</p><p>&#2319;&#2325; &#2331;&#2366;&#2340;&#2381;&#2352; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2348;&#2361;&#2369;&#2340; &#2328;&#2348;&#2352;&#2366;&#2351;&#2366; &#2361;&#2369;&#2310; &#2350;&#2361;&#2360;&#2370;&#2360; &#2325;&#2352; &#2352;&#2361;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2313;&#2360;&#2344;&#2375; &#2346;&#2366;&#2336;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2349;&#2366;&#2327; &#2340;&#2376;&#2351;&#2366;&#2352; &#2325;&#2352; &#2354;&#2367;&#2351;&#2366; &#2361;&#2376;&#2404; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2368; &#2352;&#2339;&#2344;&#2368;&#2340;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [

      "<span class=\"eqt\">Revise important topics calmly and take short breaks</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2357;&#2367;&#2359;&#2351;&#2379;&#2306; &#2325;&#2379; &#2358;&#2366;&#2306;&#2340;&#2367;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2342;&#2379;&#2361;&#2352;&#2366;&#2319;&#2306; &#2324;&#2352; &#2348;&#2368;&#2330;-&#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2331;&#2379;&#2335;&#2375;-&#2331;&#2379;&#2335;&#2375; &#2348;&#2381;&#2352;&#2375;&#2325; &#2354;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Stop studying completely and hope for the best</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2338;&#2364;&#2366;&#2312; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2379; &#2324;&#2352; &#2309;&#2330;&#2381;&#2331;&#2375; &#2325;&#2368; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342; &#2325;&#2352;&#2379;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The student has already prepared most of the syllabus, so the main problem is nervousness, not lack of preparation. In such a situation, the best strategy is to stay calm and revise smartly.</p><p></p><p>Revising important topics helps in strengthening confidence and improves recall during the exam. Taking short breaks prevents mental fatigue and helps the mind stay fresh. This balanced approach reduces anxiety and ensures effective use of the remaining time.</p>",

    "question": "<span class=\"eqt\"><p>The volume V of a gas is inversely proportional to its pressure P. If V = 1000 ml at P = 4 atm, what is V at P = 5 atm?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2327;&#2376;&#2360; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; V &#2313;&#2360;&#2325;&#2375; &#2342;&#2366;&#2348; P &#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2366;&#2348; P = 4 atm &#2346;&#2352; V = 1000 ml &#2361;&#2376;, &#2340;&#2379; &#2342;&#2366;&#2348; P = 5 atm &#2346;&#2352; V &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">800 ml</span><span class=\"hqt\" style=\"display:none\">800 &#2350;&#2367;&#2354;&#2368;&#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">750 ml</span><span class=\"hqt\" style=\"display:none\">750 &#2350;&#2367;&#2354;&#2368;&#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">900 ml</span><span class=\"hqt\" style=\"display:none\">900 &#2350;&#2367;&#2354;&#2368;&#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">500 ml</span><span class=\"hqt\" style=\"display:none\">500 &#2350;&#2367;&#2354;&#2368;&#2354;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>V &#8733; 1/P </p><p>&rarr; V = k/P</p><p>1000 = k/4 </p><p>&rarr; k = 4000</p><p>V at P = 5 </p><p>&rarr; V = 4000/5 = 800 ml</p>",

    "question": "<span class=\"eqt\"><p>If A &#165; B means A is the mother-in-law of B, A % B means A is the father of B and A ! B means A is daughter of B, then which of the following expression shows that G is the husband of D is definitely true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A &#165; B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; A, B &#2325;&#2368; &#2360;&#2366;&#2360; &#2361;&#2376;, A % B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; A ! B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2351;&#2361; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376; &#2325;&#2367; G, D &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;, &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",

    "solution": "<p>It is given that: </p><p>A &#165; B means A is the mother-in-law of B.</p><p>A % B means A is the father of B.</p><p>A ! B means A is daughter of B. </p><p>Option (a) M ! G % D</p><p>G is the father of D.</p><p>M is daughter of G. </p><p><img width=82 height=63 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20645/image006.jpg\"></p><p>Here, G is not the husband of D. </p><p>So, option (a) is incorrect. </p><p>Option (b) D &#165; M % G</p><p>D is the mother-in-law of M.</p><p>M is the father of G.</p><p><img width=117 height=97 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20645/image007.jpg\"></p><p>Here, G is not the husband of D. </p><p>So, option (b) is incorrect. </p><p>Option (c) G ! M &#165; D</p><p>M is the mother-in-law of D.</p><p>G is daughter of M. </p><p><img width=374 height=72 id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20645/image008.jpg\"></p><p>Here, G cannot be the husband of D. </p><p>So, option (c) is incorrect. </p><p>Option (d) G % M ! D</p><p>G is the father of M.</p><p>M is daughter of D. </p><p><img width=106 height=71 id=\"Picture 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20645/image009.jpg\"></p><p>Here, G is the husband of D. </p><p>So, option (d) is correct. </p><p><img width=106 height=71 id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20645/image009.jpg\"></p>",

    "comp": "<p><b>Directions :</b>Read the following passage and answer the questions based on the passage:</p><p>A comprehensive ecological survey conducted in the Eastern Ghats has brought to light several significant findings, underscoring the region's underestimated biodiversity. Among the most notable discoveries was the first confirmed photographic evidence of the rusty-spotted cat in the northern stretches of the range, a species previously believed to be confined largely to central and southern India. In addition to this rare feline, the survey recorded the presence of Indian pangolin, dhole, four-horned antelope, slender loris, and several endemic bird species at elevations exceeding 1,200 metres, highlighting the ecological complexity of the landscape. The survey was carried out in 2023 by the Wildlife Research and Conservation Society (WRCS) in collaboration with state forest departments and local conservation groups as part of the project \"Restoring Eastern Ghats Ecosystems: A Community-Centred Conservation Initiative\". Funded by an international biodiversity trust, the project aimed to integrate scientific monitoring with indigenous ecological knowledge. The research team, led by ecologists Meera Joshi and Arvind Menon, worked closely with tribal communities whose familiarity with the terrain proved indispensable. Over a period of six months, the team deployed 112 camera traps across 76 sites covering approximately 1,500 square kilometres. The terrain posed considerable challenges, including dense forest cover, steep slopes, unpredictable monsoon conditions, and limited road access. Despite these constraints, the camera traps remained operational for extended durations, some functioning continuously for more than 200 days. Data collection was further supplemented by indirect evidence such as pugmarks, burrows, and vocalisation records. The findings revealed unusually high-altitude records for several species, including the Indian pangolin at 1,340 metres and the four-horned antelope at 1,280 metres - both of which exceed previously documented regional limits. These observations suggest possible shifts in species distribution, potentially influenced by habitat fragmentation and changing climatic conditions. While the rusty-spotted cat is currently classified as Near Threatened on the IUCN Red List, its elusive behaviour and nocturnal habits have resulted in limited ecological data. Importantly, the survey emphasised the role of community participation in conservation success. Local trackers assisted in identifying wildlife corridors and seasonal movement patterns, enabling more accurate placement of camera traps. By combining scientific methodology with local expertise, the project demonstrates a sustainable model for long-term biodiversity monitoring in ecologically sensitive regions.</p>",

    "solution": "<p>The sentence in option (d) is in the passive voice because the subject (\"The survey\") receives the action (\"was carried out\") rather than performing it. The structure uses a form of the verb \"to be\" (\"was\") followed by the past participle (\"carried out\"), with the agent (\"by the Wildlife Research and Conservation Society...\") introduced later. This construction shifts focus from the doer to the action and its recipient, which is characteristic of passive voice.</p><p>Option (a): This is not in the passive voice, as the main clause (\"The research team... worked closely...\") is active - the subject (\"The research team\") performs the action (\"worked\"). The phrase \"led by\" is a reduced passive relative clause modifying \"team,\" but it does not make the entire sentence passive.</p><p>Option (b): This is active voice, with the subject (\"The findings\") directly performing the action (\"revealed\"). The relative clause (\"both of which exceed...\") is also active, as \"both\" performs \"exceed.\"</p><p>Option (c): This is not passive; \"remained operational\" uses a linking verb (\"remained\") to describe a state, not an action received by the subject (\"the camera traps\"). The participle \"functioning\" describes an ongoing active process, not a passive construction.</p><p>Hence, (d) is the correct answer.</p><p>Note:</p><p>Active and Passive Voice: When the person doing the action is the subject, the sentence is said to be in active form/voice. When the subject is what the action is directed at, then the sentence is said to be in passive form/voice. For example: Active Voice: Rita and her friends performed a skit. Here, Rita and her friends (subject) perform the action. Passive Voice: A skit was performed by Rita and her friends. Here, 'skit' is the subject (at which the action is directed).</p><p>\"Participle: A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p>Dancing at the party, the woman fell on the ground.</p><p>Encouraged by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.\"</p><p>\"Relative Clause: A relative clause is one thats connected to the main clause of the sentence by a word such as who, whom, which, that, or whose.</p><p>Example: He adopted a puppy that had brown eyes and black fur. The highlighted part is the relative clause.\"</p><p>Linking verb: A verb that connects the qualities of an object or person to that object or person. Example: The girl we met at the conference was intelligent and beautiful. Here, was is the linking verb. It connects the qualities (intelligent and beautiful) with the person (girl).'</p>",

    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>He <u>rigorously worked,</u> day and night.</p>",

    "solution": "<p>When an adverb modifies an intransitive verb, it usually comes after it, but in the phrase, the adverb 'rigorously' precedes the verb 'worked' which is incorrect. Among the options, 'worked rigorously' is the most appropriate phrase that is contextually and grammatically correct to replace the phrase in the sentence. Options (b) and (c) suggest adjectives instead of an adverb to modify the verb 'worked' and so they are negated.</p><p>The correct sentence is: He worked rigorously, day and night.</p><p>Hence, the correct answer is option (a).</p><p>Note:</p><p><b>Transitive and intransitive verbs: </b>Some verbs always need an object (a noun, phrase, or pronoun that refers to the person or thing that is affected by the action of the verb). These are called transitive verbs. Some verbs never have an object. These are called intransitive verbs. Examples: 1. Transitive verb: \"Do you<b> believe </b>in <u>miracles</u>\"; the boldened part is the transitive verb and underlined part is the object. 2. Intransitive verb: \"It was snowing heavily.\"; here 'snowing' is the intransitive verb (contains no object).</p><p><b>Qualifiers: </b>A word or phrase that limits the meaning of another word or phrase or makes it less general. 'Adverbs' and 'adjectives' are qualifiers.</p>",

    "solution": "<p>The task involves converting a sentence from direct speech to indirect (reported) speech. </p><p>Key Rules for Reported Speech (Indirect Speech)</p><p>When converting direct speech to indirect speech:</p><p>Change pronouns: First-person pronouns (I, my, our) shift based on the reporter's perspective. Here, assuming the speaker is male (as options use \"he\"), it becomes \"he\" and \"his/their.\"</p><p>Adjust time/place words: \"Tomorrow\" becomes \"the next day\" to reflect the shift in time reference.</p><p>Backshift tenses: Future simple (\"will travel\") shifts to conditional (\"would travel\") because the reporting verb (\"said\") is in the past tense. This is a standard backshift rule unless the statement is a general truth or still future at the time of reporting.</p><p>No changes needed for: Adverbs like \"in style\" or the infinitive \"to celebrate\" (purpose clause remains unchanged).</p><p>Structure: Use \"that\" to introduce the clause, and maintain the overall meaning.</p><p>Option (a) correctly applies all rules: Pronouns shift (\"I\" &rarr; \"he,\" \"my/our\" &rarr; \"his/their\"), \"tomorrow\" &rarr; \"the next day,\" and \"will travel\" &rarr; \"would travel\" (backshift). The sentence preserves the original meaning without errors.</p><p>Hence, the correct answer is option (a).</p>",

    "solution": "<p>The sentence in the Indirect Speech is in Simple Past Tense. Therefore, the sentence in the Direct Speech will be in Simple Present Tense.</p><p>Simple Past (Subject + V2 + Object) will be converted into Simple Present (Subject +V1 + Object).</p><p>For example:</p><p>He said that he never went to the village. (Indirect Speech)</p><p>He said, \"I never go to the village.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>She  -  I </p><p>Attended  -  attend </p><p>So, the sentence in direct speech is: She said, \"I never attend the lecture.\"</p><p>Hence, (d) is the correct answer. </p>",

    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>I do whatever the high command tells me.</p>",

    ],
    "correct_option_id": 0,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of the verb ('is' in this case) is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in this question is in <b>Present Indefinite</b>. Thus, the Passive voice will also be in Present Indefinite.</p><p>The format of Active voice is: Subject + V1/V5 + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + am/is/are + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>She likes you. (Active Voice)</p><p>You are liked by her. (Passive Voice)</p><p>The options except (a) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is option (a): <b>Whatever the high command tells me is done by me.</b></p>",

      "<span class=\"eqt\">SSLV-D3</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360;&#2319;&#2360;&#2319;&#2354;&#2357;&#2368;-&#2337;&#2368;3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Indian Space Research Organisation (ISRO) successfully launched a next-generation US communication satellite BlueBird Block-2 onboard its heaviest vehicle <b>LVM3-M6</b> from Sriharikota in Andhra Pradesh.</p><p>The launch took place from the Satish Dhawan Space Station at 8:55 AM Indian Standard Time on December 24,2025.</p><p>After a flight journey of about 15 minutes, the spacecraft Bluebird Block-2 was separated from the vehicle and it was successfully placed into its intended orbit.</p><p>The Bluebird Block-2 mission is part of a global LEO (Low Earth Orbit) constellation to provide direct-to-mobile connectivity through satellite. This constellation would enable 4G and 5G voice and video calls, texts, streaming and data for everyone, everywhere at all times.</p><p>The mission was undertaken as part of the commercial agreement signed between NewSpace India Ltd (NSIL) and US-based AST SpaceMobile (AST and Science, LLC). NewSpace India Ltd is the commercial arm of ISRO.</p><p>The LVM3-M6 is the sixth operational flight of LVM3 and the third dedicated commercial mission to launch the Bluebird Block-2 spacecraft. The LVM3 has a spectacular pedigree of completing eight consecutive successful launches, including the ambitious Chandrayaan-2 and Chandrayaan-3 missions.</p><p></p><p></p><p></p>",
    "question_index": 107
  },
  {
    "question": "<span class=\"eqt\"><p>A site may qualify as a Ramsar Wetland of International Importance under the \"1% rule\" if it:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2379;&#2312; &#2360;&#2381;&#2341;&#2354; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2352;&#2381;&#2340;&#2379;&#2306; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2357;&#2361; \"1% &#2344;&#2367;&#2351;&#2350;\" &#2325;&#2375; &#2340;&#2361;&#2340; &#2352;&#2366;&#2350;&#2360;&#2352; &#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2350;&#2361;&#2340;&#2381;&#2357; &#2325;&#2368; &#2310;&#2352;&#2381;&#2342;&#2381;&#2352;&#2349;&#2370;&#2350;&#2367; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2309;&#2352;&#2381;&#2361;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Regularly supports at least 1% of the individuals in a biogeographic population of a waterbird species</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2332;&#2354;&#2346;&#2325;&#2381;&#2359;&#2368; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2325;&#2368; &#2332;&#2376;&#2357;-&#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2310;&#2348;&#2366;&#2342;&#2368; &#2350;&#2375;&#2306; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; 1% &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2361;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Has a surface area of at least 10,000 hectares</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; 10,000 &#2361;&#2375;&#2325;&#2381;&#2335;&#2375;&#2351;&#2352; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Stores at least 1% of the annual discharge of its river basin</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2344;&#2342;&#2368; &#2348;&#2375;&#2360;&#2367;&#2344; &#2325;&#2375; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2332;&#2354; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2325;&#2366; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; 1% &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Has mean water depth under 1 metre in the dry season</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2359;&#2381;&#2325; &#2350;&#2380;&#2360;&#2350; &#2350;&#2375;&#2306; &#2311;&#2360;&#2325;&#2368; &#2324;&#2360;&#2340; &#2332;&#2354; &#2327;&#2361;&#2352;&#2366;&#2312; 1 &#2350;&#2368;&#2335;&#2352; &#2360;&#2375; &#2325;&#2350; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Ramsar Criterion 6 (the \"1% rule\") focuses on supporting at least 1% of a waterbird's biogeographic population.</p><p>Area, storage volume, or depth alone are not qualifying criteria under this rule.</p><p><b>Further Insights:</b></p><p>- Ramsar Convention was signed in 1971 at Ramsar, Iran; India acceded in 1982.</p><p>- Ramsar Criterion 5 is for sites regularly supporting &ge;20,000 waterbirds.</p><p>- The Montreux Record lists sites where ecological character has changed; Chilika was removed from it in 2002.</p><p>- Many Indian Ramsar sites lie on the Central Asian Flyway, e.g., Keoladeo and Nal Sarovar.</p>",
    "question_index": 108
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Gandhi's era.</p><p>I. Non-Cooperation (1920 - 22) included surrender of titles and boycott of councils, courts, and foreign cloth.</p><p>II. Civil Disobedience began with the Dandi March (March 1930), after the Purna Swaraj resolution.</p><p>III. Khilafat leaders opposed Gandhi's non-cooperation call from the start.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2366;&#2306;&#2343;&#2368; &#2351;&#2369;&#2327; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2309;&#2360;&#2361;&#2351;&#2379;&#2327; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; (1920-22) &#2350;&#2375;&#2306; &#2313;&#2346;&#2366;&#2343;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2340;&#2381;&#2351;&#2366;&#2327; &#2324;&#2352; &#2346;&#2352;&#2367;&#2359;&#2342;&#2379;&#2306;, &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2324;&#2352; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2357;&#2360;&#2381;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2366; &#2348;&#2361;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352; &#2358;&#2366;&#2350;&#2367;&#2354; &#2341;&#2366;&#2404;</p><p>II. &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2381;&#2357;&#2352;&#2366;&#2332; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2366;&#2306;&#2337;&#2368; &#2350;&#2366;&#2352;&#2381;&#2330; (&#2350;&#2366;&#2352;&#2381;&#2330; 1930) &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2357;&#2367;&#2344;&#2351; &#2309;&#2357;&#2332;&#2381;&#2334;&#2366; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2361;&#2369;&#2312;&#2404;</p><p>III. &#2326;&#2367;&#2354;&#2366;&#2347;&#2340; &#2325;&#2375; &#2344;&#2375;&#2340;&#2366;&#2323;&#2306; &#2344;&#2375; &#2327;&#2366;&#2306;&#2343;&#2368; &#2325;&#2375; &#2309;&#2360;&#2361;&#2351;&#2379;&#2327; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2375; &#2310;&#2361;&#2381;&#2357;&#2366;&#2344; &#2325;&#2366; &#2358;&#2369;&#2352;&#2370; &#2360;&#2375; &#2361;&#2368; &#2357;&#2367;&#2352;&#2379;&#2343; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2324;&#2352; &#2340;&#2371;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>I is correct: non-cooperation tactics included these boycotts.</p><p>II is correct: Dandi March launched civil disobedience.</p><p>III is incorrect: Ali brothers and other Khilafat leaders initially supported non-cooperation.</p><p><b>Further Insights:</b></p><p>- Chauri Chaura (1922) led to the withdrawal of Non-Cooperation.</p><p>- Gandhi-Irwin Pact (1931) preceded the Second Round Table Conference.</p><p>- Salt Satyagraha spread nationwide with multiple coastal salt raids.</p><p>- 1932 Poona Pact followed the Communal Award controversy.</p>",
    "question_index": 109
  },

    "question": "<span class=\"eqt\"><p>Which polysaccharide consists of &#946;-1,4 glycosidic linkages and is the major structural component of plant cell walls?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2377;&#2354;&#2368;&#2360;&#2375;&#2325;&#2375;&#2352;&#2366;&#2311;&#2337; &#945;-1,4 &#2327;&#2381;&#2354;&#2366;&#2311;&#2325;&#2379;&#2360;&#2367;&#2337;&#2367;&#2325; &#2354;&#2367;&#2306;&#2325;&#2375;&#2332; &#2360;&#2375; &#2348;&#2344;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2368; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2349;&#2367;&#2340;&#2381;&#2340;&#2367; &#2325;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2328;&#2335;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Glycogen</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2354;&#2366;&#2311;&#2325;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Amylopectin</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;&#2366;&#2311;&#2354;&#2379;&#2346;&#2375;&#2325;&#2381;&#2335;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Chitin</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2311;&#2335;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Cellulose</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2354;&#2381;&#2351;&#2370;&#2354;&#2379;&#2332;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Cellulose is a linear polymer of &#946;-D-glucose linked by &#946;-1,4 bonds and forms plant cell walls.</p><p>Glycogen and amylopectin have &#945;-linked glucose with branching; chitin (&#946;-1,4) is found in arthropod exoskeletons, not plant walls.</p><p>Therefore, cellulose is correct.</p><p><b>Further Insights:</b></p><p>- Humans lack cellulase; herbivores rely on symbiotic microbes to digest cellulose.</p><p>- Amylose (&#945;-1,4) and amylopectin (&#945;-1,4 with &#945;-1,6 branches) form plant starch.</p><p>- Glycogen is highly branched (&#945;-1,6) and is the animal storage polysaccharide.</p><p>- Lignin is another plant cell wall component that adds rigidity and decreases digestibility.</p>",
    "question_index": 110
  },

    "question": "<span class=\"eqt\"><p>India's nominal GDP grows by 11% in a year, while the GDP deflator inflation is 6%. What is the approximate real GDP growth?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2344;&#2366;&#2350;&#2350;&#2366;&#2340;&#2381;&#2352; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2350;&#2375;&#2306; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; 11% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2369;&#2312; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2309;&#2346;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; 6% &#2361;&#2376;&#2404; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2354;&#2327;&#2349;&#2327; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">4.7%</span><span class=\"hqt\" style=\"display:none\">4.7%</span>",
      "<span class=\"eqt\">5.5%</span><span class=\"hqt\" style=\"display:none\">5.5%</span>",
      "<span class=\"eqt\">6.0%</span><span class=\"hqt\" style=\"display:none\">6.0%</span>",
      "<span class=\"eqt\">17.0%</span><span class=\"hqt\" style=\"display:none\">17.0%</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Real growth &#8776; (1 + nominal growth)/(1 + inflation) &#8722; 1 = 1.11/1.06 &#8722; 1 &#8776; 0.0472.</p><p>That is about 4.7%.</p><p><b>Further Insights:</b></p><p>- GDP deflator = (Nominal GDP/Real GDP)  X  100; it covers all domestically produced goods and services.</p><p>- CPI measures retail price inflation; WPI measures wholesale price inflation; GDP deflator is broader than both.</p><p>- India currently reports GDP at constant (2011 - 12) prices for real GDP.</p><p>- GVA at basic prices + net product taxes = GDP at market prices.</p><p>- NSO (under MoSPI) compiles national accounts in India.</p>",
    "question_index": 111
  },
  {
    "question": "<span class=\"eqt\"><p>Under the Constitution, which statement about the Comptroller and Auditor General (CAG) after demitting office is correct?</p></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2346;&#2342; &#2331;&#2379;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2325; &#2319;&#2357;&#2306; &#2350;&#2361;&#2366;&#2354;&#2375;&#2326;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2325; (&#2360;&#2368;&#2319;&#2332;&#2368;) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">He may be appointed as a Governor of a State.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">He is not eligible for any further office under the Union or a State.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2351;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2309;&#2344;&#2381;&#2351; &#2346;&#2342; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2366;&#2340;&#2381;&#2352; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">He can accept any office in Parliament after a cooling-off of two years.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2360;&#2366;&#2354; &#2325;&#2368; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2348;&#2366;&#2342; &#2357;&#2361; &#2360;&#2306;&#2360;&#2342; &#2350;&#2375;&#2306; &#2325;&#2379;&#2312; &#2349;&#2368; &#2346;&#2342; &#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">He may join the board of a public sector undertaking within one year.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2325;&#2367;&#2360;&#2368; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2313;&#2346;&#2325;&#2381;&#2352;&#2350; &#2325;&#2375; &#2348;&#2379;&#2352;&#2381;&#2337; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The CAG is barred from holding any further office under the Government of India or any State to preserve independence and impartiality.</p><p>This safeguard prevents conflicts of interest with entities that the CAG audits.</p><p><b>Further Insights:</b></p><p>- The CAG is appointed by the President under Article 148.</p><p>- Tenure: 6 years or until 65 years of age, whichever is earlier.</p><p>- Removal: In the same manner and on like grounds as a Supreme Court Judge (by Parliament via special majority on proven misbehavior or incapacity).</p><p>- CAG's oath is made and subscribed before the President.</p><p>- CAG's salary and conditions cannot be varied to his disadvantage after appointment.</p>",
    "question_index": 112
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following features belongs mainly to the Later Vedic period (c. 1000 - 600 BCE)?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2357;&#2376;&#2342;&#2367;&#2325; &#2325;&#2366;&#2354; (&#2354;&#2327;&#2349;&#2327; 1000 - 600 &#2312;&#2360;&#2366; &#2346;&#2370;&#2352;&#2381;&#2357;) &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Use of iron tools and ploughshares became common</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2361;&#2375; &#2325;&#2375; &#2324;&#2332;&#2366;&#2352;&#2379;&#2306; &#2324;&#2352; &#2361;&#2354; &#2325;&#2375; &#2347;&#2366;&#2354;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2310;&#2350; &#2361;&#2379; &#2327;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Tribe-based assemblies (sabha and samiti) retained decisive authority</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2332;&#2366;&#2340;&#2367; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2360;&#2349;&#2366;&#2323;&#2306; (&#2360;&#2349;&#2366; &#2324;&#2352; &#2360;&#2350;&#2367;&#2340;&#2367;) &#2325;&#2375; &#2346;&#2366;&#2360; &#2344;&#2367;&#2352;&#2381;&#2339;&#2366;&#2351;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2348;&#2344;&#2366; &#2352;&#2361;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Pastoral life dominated over settled agriculture</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2325;&#2371;&#2359;&#2367; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2346;&#2358;&#2369;&#2346;&#2366;&#2354;&#2344; &#2332;&#2368;&#2357;&#2344; &#2325;&#2366; &#2346;&#2381;&#2352;&#2349;&#2369;&#2340;&#2381;&#2357; &#2309;&#2343;&#2367;&#2325; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Most hymns addressed to Indra and Agni as chief deities</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2349;&#2332;&#2344; &#2311;&#2306;&#2342;&#2381;&#2352; &#2324;&#2352; &#2309;&#2327;&#2381;&#2344;&#2367; &#2325;&#2379; &#2350;&#2369;&#2326;&#2381;&#2351; &#2342;&#2375;&#2357;&#2340;&#2366; &#2350;&#2366;&#2344;&#2325;&#2352; &#2360;&#2350;&#2352;&#2381;&#2346;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Iron (shyamaayas) appears in the Later Vedic period, aiding agricultural expansion.</p><p>The other features are characteristic of the Early Vedic period.</p><p><b>Further Insights:</b></p><p>- Painted Grey Ware culture aligns with Later Vedic settlements in Ganga - Yamuna doab.</p><p>- Later Vedic society saw stronger monarchy, hereditary kingship, and varna stratification.</p><p>- Important rituals: Ashvamedha and Rajasuya grew in prominence in the Later Vedic age.</p><p>- Brahmanas, Aranyakas, and early Upanishads are largely Later Vedic texts.</p>",
    "question_index": 113
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements are correct regarding Atal Pension Yojana (APY)?</p><p>1) APY is administered by PFRDA and targets unorganized sector workers.</p><p>2) APY allows subscribers to choose a guaranteed pension of Rs 1,000 to Rs 5,000 per month from age 60.</p><p>3) APY permits exit at any time with full refund and guaranteed interest without conditions.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2335;&#2354; &#2346;&#2375;&#2306;&#2358;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; (&#2319;&#2346;&#2368;&#2357;&#2366;&#2312;) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p><p>1) &#2319;&#2346;&#2368;&#2357;&#2366;&#2312; &#2325;&#2366; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2346;&#2368;&#2319;&#2347;&#2310;&#2352;&#2337;&#2368;&#2319; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2366; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2309;&#2360;&#2306;&#2327;&#2336;&#2367;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2319;&#2346;&#2368;&#2357;&#2366;&#2312; &#2327;&#2381;&#2352;&#2366;&#2361;&#2325;&#2379;&#2306; &#2325;&#2379; 60 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2366;&#2361; 1,000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2360;&#2375; 5,000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2340;&#2325; &#2325;&#2368; &#2327;&#2366;&#2352;&#2306;&#2335;&#2368;&#2325;&#2371;&#2340; &#2346;&#2375;&#2306;&#2358;&#2344; &#2330;&#2369;&#2344;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2319;&#2346;&#2368;&#2357;&#2366;&#2312; &#2348;&#2367;&#2344;&#2366; &#2325;&#2367;&#2360;&#2368; &#2358;&#2352;&#2381;&#2340; &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2339; &#2343;&#2344;&#2357;&#2366;&#2346;&#2360;&#2368; &#2324;&#2352; &#2327;&#2366;&#2352;&#2306;&#2335;&#2368;&#2325;&#2371;&#2340; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2375; &#2360;&#2366;&#2341; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2360;&#2350;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2360;&#2375; &#2348;&#2366;&#2361;&#2352; &#2344;&#2367;&#2325;&#2354;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct: APY is under PFRDA; guaranteed pension choices exist.</p><p>Statement 3 is incorrect: Premature exit is restricted (allowed mainly on death/terminal illness; otherwise at 60).</p><p><b>Further Insights:</b></p><p>- APY contributions depend on entry age and chosen pension slab.</p><p>- Government co-contribution (for eligible early enrollees) was available for a limited period.</p><p>- National Pension System (NPS) is also regulated by PFRDA but is market-linked, not guaranteed.</p><p>- PM-SYM (Pradhan Mantri Shram Yogi Maandhan) is another pension scheme for unorganized workers.</p><p>- Stand-Up India and MUDRA support credit to enterprises; different from pension/insurance schemes.</p>",
    "question_index": 114
  },
  {
    "question": "<span class=\"eqt\"><p>Choose the correct statement(s) regarding Census 2011definitions on worker categories:</p><p>Statement I: A person who worked 3 months or more but less than 6 months is treated as a marginal worker.</p><p>Statement II: Non-workers include students, homemakers, dependents, and those seeking/available for work.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2327;&#2339;&#2344;&#2366; 2011 &#2350;&#2375;&#2306; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325; &#2358;&#2381;&#2352;&#2375;&#2339;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2330;&#2369;&#2344;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2357;&#2361; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2332;&#2367;&#2360;&#2344;&#2375; 3 &#2350;&#2361;&#2368;&#2344;&#2375; &#2351;&#2366; &#2313;&#2360;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2375;&#2325;&#2367;&#2344; 6 &#2350;&#2361;&#2368;&#2344;&#2375; &#2360;&#2375; &#2325;&#2350; &#2325;&#2366;&#2350; &#2325;&#2367;&#2351;&#2366; &#2361;&#2376;, &#2313;&#2360;&#2375; &#2360;&#2368;&#2350;&#2366;&#2306;&#2340; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2327;&#2376;&#2352;-&#2358;&#2381;&#2352;&#2350;&#2367;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2331;&#2366;&#2340;&#2381;&#2352;, &#2327;&#2371;&#2361;&#2367;&#2339;&#2368;, &#2310;&#2358;&#2381;&#2352;&#2367;&#2340; &#2324;&#2352; &#2325;&#2366;&#2350; &#2325;&#2368; &#2340;&#2354;&#2366;&#2358; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375;/&#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2354;&#2379;&#2327; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2350;&#2376;&#2306; &#2324;&#2352; &#2344; &#2361;&#2368; &#2342;&#2370;&#2360;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Census 2011 defines main workers (&ge;6 months) and marginal workers (&lt;6 months); 3 - 6 months falls under marginal.</p><p>Non-workers comprise those not engaged in any economic activity, including the listed categories; but this does not explain Statement I.</p><p><b>Further Insights:</b></p><p>- Census also reports marginal workers who worked for less than 3 months as a subcategory.</p><p>- Worker types: cultivators, agricultural laborers, household industry workers, and other workers.</p><p>- Work Participation Rate (WPR) = (Workers / Total population)  X  100.</p>",
    "question_index": 115
  },
