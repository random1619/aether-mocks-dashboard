  {
    "question": "<span class=\"eqt\"><p>What is the mode of 1,1, 2, 3, 7, 10, 5, 5, 8, 9, 3, 7, 10, 7, 5, 3, 5, 9, 7, 3, 4, 5, 7, 5?</p></span><span class=\"hqt\" style=\"display:none\"><p>1,1, 2, 3, 7, 10, 5, 5, 8, 9, 3, 7, 10, 7, 5, 3, 5, 9, 7, 3, 4, 5, 7, 5 &#2325;&#2366; &#2348;&#2361;&#2369;&#2354;&#2325; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",

    "correct_option_id": 1,
    "solution": "<p>Frequency of term 5 is 6 and it is highest among the given terms.</p><p>So, mode of the data is 5.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>From a cube whose edge is 40 cm, N number of cubes of edge 10 cm each, can be cut. Which of the following statements is/are true?</p><p>A) The value of N is a perfect square.</p><p>B) The sum of the digits of N is 10.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344; &#2332;&#2367;&#2360;&#2325;&#2368; &#2349;&#2369;&#2332;&#2366; 40 cm &#2361;&#2376;, &#2313;&#2360;&#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; 10 cm &#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2375; N &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2328;&#2344; &#2325;&#2366;&#2335;&#2375; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A) N &#2325;&#2366; &#2350;&#2366;&#2344; &#2319;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339; &#2357;&#2352;&#2381;&#2327; &#2361;&#2376;&#2404;</p><p>B) N &#2325;&#2375; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; 10 &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>N = Volume of large cube/Volume of small cube</p><p>= (40*40*40)/(10*10*10) = 64</p><p>Statement A: 64 is a perfect square number.</p><p>Statement B: The sum of digits of 64 is 6 +4 = 10.</p><p>So, Both A and B are true.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If A + B + C = 180&deg; and A = 30&deg;, find the value of tan A x&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">tan A + tan B + tan C</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">tan A tan B tan C</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; A + B + C = 180&deg; &#2324;&#2352; A = 30&deg; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; :</div></p><p><div>tan A x&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">tan A + tan B + tan C</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">tan A tan B tan C</span></div></div></p></span>",
    "options": [
      "<span class=\"eqt\">1/&radic;3</span><span class=\"hqt\" style=\"display:none\">1/&radic;3</span>",
      "<span class=\"eqt\">2/&radic;3</span><span class=\"hqt\" style=\"display:none\">2/&radic;3</span>",
      "<span class=\"eqt\">&radic;3</span><span class=\"hqt\" style=\"display:none\">&radic;3</span>",
      "<span class=\"eqt\">2&radic;3</span><span class=\"hqt\" style=\"display:none\">2&radic;3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=181 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20757/image032.png\"></p><p><img width=152 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20757/image033.png\"></p><p><img width=400 height=23 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20757/image034.png\"></p><p>Therefore,</p><p><img width=308 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20757/image035.png\"></p><p>= 1/&radic;3</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Find the greatest four-digit number which is divisible by 12, 20 and 25.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2366;&#2352; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2357;&#2361; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; 12, 20 &#2324;&#2352; 25 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">9900</span><span class=\"hqt\" style=\"display:none\">9900</span>",
      "<span class=\"eqt\">9300</span><span class=\"hqt\" style=\"display:none\">9300</span>",
      "<span class=\"eqt\">9600</span><span class=\"hqt\" style=\"display:none\">9600</span>",
      "<span class=\"eqt\">9960</span><span class=\"hqt\" style=\"display:none\">9960</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>LCM of 12, 20 and 25 = 300</p><p>Greatest four-digit number = 9999</p><p>9999 = 300 *33 + 99</p><p>So, the required number = 9999  -  99 = 9900</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What is the approximate distance between the points A(3, -2) and B(-7, 5)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; A(3, -2) &#2324;&#2352; B(-7, 5) &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12 units</span><span class=\"hqt\" style=\"display:none\">12 &#2311;&#2325;&#2366;&#2312;</span>",
      "<span class=\"eqt\">10 units</span><span class=\"hqt\" style=\"display:none\">10 &#2311;&#2325;&#2366;&#2312;</span>",
      "<span class=\"eqt\">14 units</span><span class=\"hqt\" style=\"display:none\">14 &#2311;&#2325;&#2366;&#2312;</span>",
      "<span class=\"eqt\">8 units</span><span class=\"hqt\" style=\"display:none\">8 &#2311;&#2325;&#2366;&#2312;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Distance between points A and B = &radic;((-7  -  3)<sup>2</sup> + (5  -  (-2))<sup>2</sup>) = <b>12 units (approx.)</b></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The inner circumference of a circular track is 176 cm. If the track is 6 cm wide, what is the diameter of the outer circle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2346;&#2341; &#2325;&#2368; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2346;&#2352;&#2367;&#2343;&#2367; 176 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2341; 6 &#2360;&#2375;&#2350;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2366;&#2361;&#2352;&#2368; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">64 cm</span><span class=\"hqt\" style=\"display:none\">64 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">66 cm</span><span class=\"hqt\" style=\"display:none\">66 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">68 cm</span><span class=\"hqt\" style=\"display:none\">68 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">70 cm</span><span class=\"hqt\" style=\"display:none\">70 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let, radius of the inner circle be 'r' cm.</p><p>176 = 2  X  (22/7)  X  r</p><p>=&gt; 176 = (44/7)  X  r</p><p>=&gt; r = (176  X  7) / 44 = 28 cm</p><p>Radius of the outer circle = 28 + 6 = 34 cm</p><p>Diameter of the outer circle = 2  X  34 = 68 cm</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Find the radius of the hemisphere (in cm) which is moulded from a cuboid of dimensions 49*33*12 cm<sup>3</sup>.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; (cm &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; 49*33*12 cm<sup>3 </sup> &#2357;&#2367;&#2350;&#2366; &#2357;&#2366;&#2354;&#2375; &#2328;&#2344;&#2366;&#2349; &#2360;&#2375; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>",
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Volume remains constant.</p><p> (2/3) &#960;r<sup>3</sup> = 49*33*12</p><p>r<sup>3</sup> = 49*33*12*3/2 &#960;</p><p>r<sup>3</sup> = 49*33*12*3*7/2*22</p><p>r<sup>3</sup> = 3<sup>3</sup>*7<sup>3</sup></p><p>r = 3*7</p><p>= 21 cm</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>In &#8710;PQR, PS, QU and RT are medians, G is the centroid, QU = 13.5 cm, RT = 27 cm and PS = 36 cm. Find the perimeter (in cm) of &#8710;GSR, if &#8736;QGS = 90&deg;</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/30eb38d6b2e0e5ae0eb7fd58aaa064db.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#8710;PQR &#2350;&#2375;&#2306;, PS, QU &#2324;&#2352; RT &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; &#2361;&#2376;&#2306;, G &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2325; &#2361;&#2376;, QU = 13.5 cm, RT = 27 cm &#2324;&#2352; PS = 36 cm &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736;QGS = 90&deg; &#2361;&#2376;, &#2340;&#2379; &#8710;GSR &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; (cm &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/30eb38d6b2e0e5ae0eb7fd58aaa064db.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">42</span><span class=\"hqt\" style=\"display:none\">42</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Given</p><p>PS = 36, QU = 13.5 cm</p><p>GS = 36 * 1/3 = 12 cm</p><p>QG = RG = 13.5 * (2/3) = 9 cm</p><p>In right angled triangle QGS,</p><p>Using Pythagoras theorem,</p><p>&#8658;QS<sup>2</sup> = QG<sup>2</sup> + GS<sup>2</sup></p><p>&#8658;QS<sup>2</sup> = 144 + 81</p><p>&#8658; QS = 15 cm</p><p>&#8658; QR = 15 * 2 = 30 cm</p><p>&#8658; SR = QR/2 = 15 cm</p><p>RT = 27 cm</p><p>GR = 27 * (2/3) = 18 cm</p><p>Perimeter of &#8710;GSR = GS + GR + SR = 12 + 18 + 15 = 45 cm</p>",
    "question_index": 7
  },

    "question": "<span class=\"eqt\"><p><div>&nbsp;Two taps A and B can fill a cistern together in 3&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">11</span></div>&nbsp;hours while tap A alone can fill it in 10 hours. When tap A opened at 3: 00 am and then tap B opened at 7: 30 am, then the cistern will be filled by  -&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2379; &#2344;&#2354; A &#2324;&#2352; B &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 3 2/11 &#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2348;&#2325;&#2367; &#2309;&#2325;&#2375;&#2354;&#2375; &#2344;&#2354; A &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 10 &#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; &#2344;&#2354; A &#2325;&#2379; &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 3 : 00 &#2348;&#2332;&#2375; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2347;&#2367;&#2352; &#2344;&#2354; B &#2325;&#2379; &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 7 : 30 &#2348;&#2332;&#2375; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; ________ &#2348;&#2332;&#2375; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",

    "question": "<span class=\"eqt\"><p>If (&radic;2x + 3y + z)<sup>2</sup>  -  z<sup>2</sup>  -  2x<sup>2</sup>  -  9y<sup>2</sup> = (Axy + Byz + Czx), then what is the value of (&radic;2B + 3C  -  2A)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (&radic;2x + 3y + z)<sup>2</sup> - z<sup>2</sup> - 2x<sup>2</sup> - 9y<sup>2</sup> = (Axy + Byz + Czx) &#2361;&#2376;, &#2340;&#2379; (&radic;2B + 3C - 2A) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">3&radic;2</span><span class=\"hqt\" style=\"display:none\">3&radic;2</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>We know, (a + b + c)<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup> + 2(ab + bc + ca)</p><p>So, (&radic;2x + 3y + z)<sup>2</sup>  -  z<sup>2</sup>  -  2x<sup>2</sup>  -  9y<sup>2</sup> = 2((&radic;2x * 3y) + (3y * z) + (z * &radic;2x))</p><p>Axy + Byz + Czx = 6&radic;2xy + 6yz + &radic;2zx</p><p>Hence, equating the coefficients, we get</p><p>A = 6&radic;2</p><p>B = 6</p><p>C = 2&radic;2</p><p>Hence, &radic;2B + 3C  -  2A = 6&radic;2 + 6&radic;2  -  12&radic;2 = 0</p>",
    "question_index": 14

    "question": "<span class=\"eqt\"><p>What is the discount that a shopkeeper should offer on the remaining Rs.14000 of a phone priced at Rs.55000 given that, he has already given a 11% discount of the first Rs.28000 and 5% discount on the next Rs.13000 to match the discount amount of 11.2% given on the total price?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2344;&#2375; 55000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2347;&#2379;&#2344; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; 28000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2352; 11% &#2325;&#2368; &#2331;&#2370;&#2335; &#2342;&#2368; &#2361;&#2376; &#2324;&#2352; &#2309;&#2327;&#2354;&#2375; 13000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2352; 5% &#2325;&#2368; &#2331;&#2370;&#2335; &#2342;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2369;&#2354; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2342;&#2368; &#2327;&#2312; 11.2% &#2325;&#2368; &#2331;&#2370;&#2335; &#2352;&#2366;&#2358;&#2367; &#2360;&#2375; &#2350;&#2375;&#2354; &#2326;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2347;&#2379;&#2344; &#2325;&#2375; &#2358;&#2375;&#2359; 14000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2352; &#2325;&#2367;&#2340;&#2344;&#2368; &#2331;&#2370;&#2335; &#2342;&#2375;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",

    "question": "<span class=\"eqt\"><p>A sum is divided among four friends P, Q, R and S such that P got 60% of what R and S got together. R got 80% of what S received alone and Q received 25% more than P. Which of the following statement is true? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2379; &#2330;&#2366;&#2352; &#2342;&#2379;&#2360;&#2381;&#2340;&#2379;&#2306; P, Q, R &#2324;&#2352; S &#2350;&#2375;&#2306; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; P &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367;, &#2319;&#2325; &#2360;&#2366;&#2341; R &#2324;&#2352; S &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2366; 60% &#2361;&#2376;&#2404; R &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367;, &#2309;&#2325;&#2375;&#2354;&#2375; S &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2366; 80% &#2361;&#2376; &#2324;&#2352; Q &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367;, P &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 25% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2340;&#2379;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Q got more than 35% of the total sum.</span><span class=\"hqt\" style=\"display:none\">Q &#2325;&#2379; &#2325;&#2369;&#2354; &#2343;&#2344;&#2352;&#2366;&#2358;&#2368; &#2325;&#2366; 35% &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2310;&#2404;</span>",
      "<span class=\"eqt\">S and R together received less than 40% of the total sum.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2366;&#2341; S &#2324;&#2352; R &#2325;&#2379; &#2325;&#2369;&#2354; &#2343;&#2344;&#2352;&#2366;&#2358;&#2368; &#2325;&#2366; 40% &#2360;&#2375; &#2325;&#2350; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2310;&#2404;</span>",
      "<span class=\"eqt\">P got 8% more than S.</span><span class=\"hqt\" style=\"display:none\">P &#2325;&#2379; S &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 8% &#2309;&#2343;&#2367;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2368; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2310;&#2404;</span>",
      "<span class=\"eqt\">Q got 75% more than R.</span><span class=\"hqt\" style=\"display:none\">Q &#2325;&#2379; R &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 75% &#2309;&#2343;&#2367;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2368; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2310;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Here, R = 80% of S = 4S/5</p><p>P = 60% of (R + S) = (60/100) * (4S/5 + S) = 27S/25</p><p>Q = (100 + 25)% of P = (125/100) * 27S/25 = 27S/20</p><p>Now, sum = P + Q + R + S </p><p>= 27S/20 + 27S/25 + 4S/5 + S </p><p>= 423S/100</p><p>So, percentage of Q in total sum = (27S/20)/(423S/100) * 100 = 31.91% &lt; 35%</p><p>Percentage of S and R in total sum = (S + 4S/5)/(423S/100) * 100 = 42.55% &gt; 40%</p><p>Amount received by P as a percentage of S = P/S * 100 = (27/25) * 100 = 108%</p><p>This means P got 8% more than S.</p><p>Amount received by Q as a percentage of R = Q/R = (27S/20)/(4S/5) * 100 = 168.75%</p><p>This means Q got 68.75% more than R. </p><p>Hence, option (3) is true. </p>",
    "question_index": 21
  },

    "question": "<span class=\"eqt\"><p>In the figure given below, AB || CD, PQRS is a cyclic quadrilateral. If &#8736;PUS = 48&deg; and &#8736;SPQ = &#8736;STR, then find the measure of &#8736;PQR.</p><p><img width=272 height=172 id=\"Picture 95\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13590/image042.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, AB || CD, PQRS &#2319;&#2325; &#2330;&#2325;&#2381;&#2352;&#2368;&#2351; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736;PUS = 48&deg; &#2324;&#2352; &#8736;SPQ = &#8736;STR &#2361;&#2376;, &#2340;&#2379; &#8736;PQR &#2325;&#2366; &#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"272\" height=\"172\" id=\"Picture 95\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13590/image042.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">96&deg;</span><span class=\"hqt\" style=\"display:none\">96&deg;</span>",
      "<span class=\"eqt\">72&deg;</span><span class=\"hqt\" style=\"display:none\">72&deg;</span>",
      "<span class=\"eqt\">84&deg;</span><span class=\"hqt\" style=\"display:none\">84&deg;</span>",
      "<span class=\"eqt\">78&deg;</span><span class=\"hqt\" style=\"display:none\">78&deg;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#8736;PUS = 48&deg;</p><p>&#8736;PUS = &#8736;SRT = 48&deg; [Alternate angles]</p><p>&#8736;SRT + &#8736;SRQ = 180&deg;</p><p>&#8736;SRQ = 180&deg;  -  48&deg; = 132&deg;</p><p>Since PQRS is a cyclic quadrilateral which means &#8736;SRQ + &#8736;SPQ = 180&deg;</p><p>&#8736;SPQ = 180&deg;  -  132&deg; = 48&deg;</p><p>&#8736;SPQ = &#8736;STR = 48&deg;</p><p>In &#8710;SRT:</p><p>&#8736;SRT + &#8736;STR + &#8736;RST = 180&deg;</p><p>48&deg; + 48&deg; + &#8736;RST = 180&deg;</p><p>&#8736;RST = 84&deg;</p><p>&#8736;PSR = 180&deg;  -  &#8736;RST</p><p>&#8736;PSR = 180&deg;  -  84&deg;</p><p>&#8736;PSR = 96&deg;</p><p>Since PQRS is a cyclic quadrilateral which means &#8736;PSR + &#8736;PQR = 180&deg;</p><p>&#8736;PQR = 180&deg;  -  96&deg; = 84&deg;</p>",
    "question_index": 25
  },

    "question": "<span class=\"eqt\"><p>Five years ago, the ratio of Surya's age and Narasi's age was 5: 7. The ratio of Narasi's age seven years hence and Surya's age three years hence, will be 10: 7. What will be Surya's age after 4 years?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2305;&#2330; &#2357;&#2352;&#2381;&#2359; &#2346;&#2361;&#2354;&#2375;, &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2368; &#2310;&#2351;&#2369; &#2324;&#2352; &#2344;&#2352;&#2360;&#2368; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 5: 7 &#2341;&#2366;&#2404; &#2360;&#2366;&#2340; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2344;&#2352;&#2360;&#2368; &#2325;&#2368; &#2310;&#2351;&#2369; &#2324;&#2352; &#2340;&#2368;&#2344; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 10: 7 &#2361;&#2379;&#2327;&#2366;&#2404; 4 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [

      "<span class=\"eqt\">29 years</span><span class=\"hqt\" style=\"display:none\">29 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">31 years</span><span class=\"hqt\" style=\"display:none\">31 &#2357;&#2352;&#2381;&#2359;</span>",

    "correct_option_id": 1,
    "solution": "<p>Let Surya's present age = (5x + 5) years and Narasi's present age = (7x + 5) years.</p><p>According to the question,</p><p>(7x + 5 + 7)/(5x + 5 + 3) = 10/7</p><p>=&gt; 49x + 84 = 50x + 80</p><p>=&gt; x = 4</p><p>Hence, Surya's age after 4 years = 5 * 4 + 5 + 4 = 29 years</p>",

ble style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Row 2</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">M</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Row 1</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table><p>So, statement I alone is not sufficient.</p><p><b>From statement II alone:</b></p><p>O is not neighbour of M. B sits to the second right of D. </p><p>Case I:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Row 2</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Row 1</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table><p>Case II:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Row 2</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Row 1</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td></tr></table><p>So, statement II alone is not sufficient. </p><p><b>Combining statements I and II together:</b></p><p>O is not neighbour of M. Thus, case 1 and case 2 are invalid. </p><p>Case 3:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Row 2</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">M</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">O</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Row 1</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table><p>B sits to the second right of D.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Row 2</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">M</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">O</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Row 1</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td></tr></table><p>Thus, A faces N. </p>",

    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>The research team has published a groundbreaking study that challenges many long-held assumptions in the field of modern neuroscience.</p>",
    "options": [
      "A groundbreaking study that challenges many long-held assumptions in the field of modern neuroscience was published by the research team.",
      "A groundbreaking study that challenges many long-held assumptions in the field of modern neuroscience had been published by the research team.",
      "A groundbreaking study that challenges many long-held assumptions in the field of modern neuroscience is being published by the research team.",
      "A groundbreaking study that challenges many long-held assumptions in the field of modern neuroscience has been published by the research team."
    ],
    "correct_option_id": 3,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The question is in the Present Perfect Tense.</p><p>The format in the Active voice is: Subject + has/have + V3 + Object.</p><p>Thus, the format in Passive voice will be: Object of the active voice (Subjective case) + has/have + been + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>He has bought a car. (Active)</p><p>A car has been bought by him. (Passive)</p><p>The options except (d) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is option (d): A groundbreaking study that challenges many long-held assumptions in the field of modern neuroscience has been published by the research team.</p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 60
  },
  {
    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>The manager was known to all his colleagues for his strict discipline and unwavering commitment to his work.</p>",
    "options": [
      "All his colleagues have known the manager for his strict discipline and unwavering commitment to his work.",
      "The manager's strict discipline and unwavering commitment to his work was known to all his colleagues.",
      "All his colleagues know the manager for his strict discipline and unwavering commitment to his work.",
      "All his colleagues knew the manager for his strict discipline and unwavering commitment to his work."
    ],
    "correct_option_id": 3,
    "solution": "<p>There are certain verbs that don't agree with the preposition \"by\" in the Passive form. They take the preposition which is appropriate to them. In the Active voice, the preposition is sometimes removed.</p><p>Some of the verbs along with the prepositions (in Passive voice) are given in the table below:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Verb</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Preposition</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Known</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Surprised</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">at</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Amazed</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">at</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Annoyed (somebody)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">with</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Annoyed (something)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">at</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Included</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">in</td></tr></table></p><p>The sentence in the Passive voice is in <b>Past Indefinite</b>. So, the sentence in the Active voice should be in <b>Past Indefinite</b>.</p><p>For example:</p><p>I was annoyed with her. (Passive)</p><p>She annoyed me. (Active)</p><p>The options except (d) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is option (d): All his colleagues knew the manager for his strict discipline and unwavering commitment to his work.</p>",
    "question_index": 61
  },

    "solution": "<p>Option (a): Incorrect. \"Far\" is an irregular adjective. Its comparative form is \"farther\" (for physical distance) or \"further\" (for metaphorical or physical distance). We do not form the comparative by adding \"more.\"</p><p>Option (b): Incorrect. This sentence uses the correct comparative adjective \"farther,\" but it uses the wrong word for comparison. \"Then\" is an adverb of time (e.g., \"First do this, then do that\"). The correct conjunction for making a comparison is \"than.\"</p><p>Option (c): Correct. This sentence correctly uses the comparative adjective \"farther\" because it compares the distances of two cities. It also correctly uses the conjunction \"than\" to link the two parts of the comparison.</p><p>Option (d): Incorrect. \"Farthest\" is the superlative degree. The superlative is used to compare three or more items. Since this sentence only compares two cities (Mumbai and Agra), the comparative degree is required.</p><p>Hence, option (c) is the answer.</p><p><b>Note: </b>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p><p><b>Adverb of Time: </b>It tells us when an action is done or occurs.</p><p>Examples: after, early, now, soon, then.</p><p>A conjunction is a word that connects words, phrases, or clauses and shows their relationship.</p><p>Examples:</p><p>and  She bought apples and oranges.</p><p>but  He wanted to go out, but it was raining.</p><p>because  I stayed home because I was sick.</p><p>or  Do you want tea or coffee?</p>",

    "comp": "<p><b>Directions :</b>     Read the given passage and answer the questions that follow.</p><p>Giovanni Pierluigi da Palestrina, born around 1526 in the ancient town of Palestrina, Italy, emerged as a towering figure in sacred music during the Renaissance. His parents provided him with a modest but supportive background. Palestrina showed early promise in music, leading his mother to invest in his training. His innate talent and the beauty of his hometown, with its rich historical and artistic atmosphere, shaped his future. At eighteen, Palestrina began working at the Cathedral of Saint Agapitus in his hometown, where he devoted himself to teaching and performing liturgical music. In 1548, he married Lucrezia, and although this choice may have limited his career opportunities, it reflected his commitment to both his art and personal life. By 1551, Palestrina had moved to Rome and secured a position as master of the Capella Giulia, and soon after, became a singer in the Sistine Chapel. However, he faced setbacks when Pope Paul IV, implementing reforms, dismissed married singers, including Palestrina. Despite this blow, he was appointed Chapel Master of Saint John Lateran, where he found stability and continued composing. Over the next decades, Palestrina became a central figure in the Roman music scene, working at major basilicas including Santa Maria Maggiore and Saint Peter's. His compositions, including the renowned \"Mass of Pope Marcellus,\" were celebrated for their purity and spiritual depth, earning him accolades from several popes. Palestrina's music played a crucial role in reforming church music, preserving sacred tradition amidst growing secular influences. His prolific output included ninety-three masses and numerous motets, which are still esteemed today. Despite personal tragedies, including the loss of his wife and children, Palestrina's legacy endured. He died in Rome on February 2, 1594, and was honoured with the title \"Prince of Music.     "solution": "<p>The past modal verb 'could' in indirect speech is changed back to the present modal verb 'can' in direct speech when referring to a present ability.</p><p>Example: She said that she could speak ten languages. (Indirect Speech)</p><p>She said, \"I can speak ten languages\". (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>'told' is changed into 'said to'.</p><p>'she' is changed into 'I'.</p><p>'could speak' is changed into 'can speak'.</p><p>'had certificates' [simple past] is changed into 'have certificates' [simple present].</p><p>Also, inverted commas (\"...\") are placed in direct speech.</p><p>Therefore, the correct answer is: The candidate said to the interviewer, \"I can speak three different foreign languages fluently and have certificates for all of them.\"</p><p>Hence, (b) is the correct answer.</p>",

    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>The driving instructor told the learner, \"Carefully check your mirrors and blind spots before you change lanes on this busy highway.\"</p>",

      "The driving instructor advised the learner to carefully check your mirrors and blind spots before you changed lanes on that busy highway."
    ],
    "correct_option_id": 0,
    "solution": "<p>Imperative Sentences are used to demonstrate Request, Order, Command, etc. The reporting verbs are changed to reflect the mood (e.g., advised, ordered). \"To\" is used before the Principal Verb.</p><p>For example:</p><p>John said to his assistant, \"Bring me a glass of water.\" (Direct Speech)</p><p>John ordered his assistant to bring him a glass of water. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&bull; \"told\" can be changed to \"advised\".</p><p>&bull; The verb \"check\" is preceded by \"to\".</p><p>&bull; \"your\" changes to \"his\".</p><p>&bull; \"you change\" [Simple Present] changes to \"he changed\" [Simple Past].</p><p>&bull; \"this\" changes to \"that\".</p><p>Also, inverted commas (\"...\") are removed in indirect speech.</p><p>Therefore, the correct answer is: \"The driving instructor advised the learner to carefully check his mirrors and blind spots before he changed lanes on that busy highway.\"</p><p>Hence, option (a) is correct.</p>",

    "question": "<span class=\"eqt\"><p>In May 2024, Dipa Karmakar scripted history clinching India's first-ever gold medal in which sport at the Asian Championships in Tashkent, Uzbekistan?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2312; 2024 &#2350;&#2375;&#2306;, &#2342;&#2368;&#2346;&#2366; &#2325;&#2352;&#2350;&#2366;&#2325;&#2352; &#2344;&#2375; &#2313;&#2332;&#2381;&#2348;&#2375;&#2325;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344; &#2325;&#2375; &#2340;&#2366;&#2358;&#2325;&#2306;&#2342; &#2350;&#2375;&#2306; &#2319;&#2358;&#2367;&#2351;&#2366;&#2312; &#2330;&#2376;&#2306;&#2346;&#2367;&#2351;&#2344;&#2358;&#2367;&#2346; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2326;&#2375;&#2354; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2361;&#2354;&#2366; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2346;&#2342;&#2325; &#2332;&#2368;&#2340;&#2325;&#2352; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360; &#2352;&#2330; &#2342;&#2367;&#2351;&#2366;?</p></span>",

      "<span class=\"eqt\">Pole Vault</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2354; &#2357;&#2377;&#2354;&#2381;&#2335;</span>",

    "correct_option_id": 1,
    "solution": "<p>India's Dipa Karmakar scripted history by winning the gold medal in the women's vault apparatus at the Asian Gymnastics Championships 2024 in Tashkent, Uzbekistan.</p><p>- The 30-year-old Olympian registered an average score of 13.566 in the women's Vault final. This is the first time that an Indian gymnast has won a gold medal in any event at the Asian Championships.</p><p>- She is the first female gymnast from India to compete in the Olympics, and at Rio 2016.</p><p>- She also became the first Indian to ever win a gold medal at an international gymnastics competition when she won the women's vault gold medal at the 2018 FIG World Cup in Mersin, Turkey.</p>",

    "correct_option_id": 3,
    "solution": "<p>Morarji Desai was the Prime Minister of India when the first demonetization took place in 1978:</p><p></p><p>On 16 January 1978, the Janata Party-led government demonetised Rs 1,000, Rs 5,000 and Rs 10,000 banknotes to weed out black money. The Morarji Desai government had brought in the High Denomination Bank Notes (Demonetisation) Act, 1978 to implement the exercise.</p><p></p><p>Desai was aided by his finance minister H.M. Patel. Former prime minister Manmohan Singh was finance secretary at the time.</p><p></p><p>In 2016, the Narendra Modi government demonetised high-value currency notes of Rs 500 and Rs 1,000 overnight.</p><p></p><p></p>",

    "question": "<span class=\"eqt\"><p>Select the <b>incorrect</b> statement about the United Nations General Assembly (UNGA)</p><p>I. It was established in 1945 under the Charter of the United Nations.</p><p>II. Vijaya Lakshmi Pandit became the first woman to be elected president of the UN General Assembly.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2350;&#2361;&#2366;&#2360;&#2349;&#2366; (UNGA) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; <b>&#2327;&#2354;&#2340;</b> &#2325;&#2341;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><p>I. &#2311;&#2360;&#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2357;&#2352;&#2381;&#2359; 1945 &#2350;&#2375;&#2306; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2325;&#2375; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2325;&#2375; &#2340;&#2361;&#2340; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p><p>II. &#2357;&#2367;&#2332;&#2351;&#2366; &#2354;&#2325;&#2381;&#2359;&#2381;&#2350;&#2368; &#2346;&#2306;&#2337;&#2367;&#2340; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2350;&#2361;&#2366;&#2360;&#2349;&#2366; &#2325;&#2368; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2330;&#2369;&#2344;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2361;&#2354;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366; &#2348;&#2344;&#2368;&#2306;&#2404;</p></span>",

      "<span class=\"eqt\">ONLY I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true?</p><p>A. In January 2024, Nitish Kumar took oath as Chief Minister of Bihar for a record ninth time.</p><p>B. He is the President of Janata Dal(United).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A. &#2332;&#2344;&#2357;&#2352;&#2368; 2024 &#2350;&#2375;&#2306;, &#2344;&#2368;&#2340;&#2368;&#2358; &#2325;&#2369;&#2350;&#2366;&#2352; &#2344;&#2375; &#2352;&#2367;&#2325;&#2377;&#2352;&#2381;&#2337; &#2344;&#2380;&#2357;&#2368;&#2306; &#2348;&#2366;&#2352; &#2348;&#2367;&#2361;&#2366;&#2352; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2358;&#2346;&#2341; &#2354;&#2368;&#2404;</p><p>B. &#2357;&#2361; &#2332;&#2344;&#2340;&#2366; &#2342;&#2354; (&#2351;&#2370;&#2344;&#2366;&#2311;&#2335;&#2375;&#2337;) &#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>JD(U) president Nitish Kumar took oath as Chief Minister of Bihar for a record ninth time. Kumar was sworn in by Bihar Governor Rajendra Arlekar at Raj Bhavan. BJP leaders -- Samrat Choudhary and former Speaker Vijay Kumar Sinha- were among those who took oath of office. The two are named as Deputy Chief Ministers. <b>Nitish Kumar's previous eight terms as Chief Minister:</b></p><p>&#183; <b>First term (2000): March 3, 2000 ' March 10, 2000</b></p><p>&#183; Second term (2005'2010): November 24, 2005 ' November 24, 2010</p><p>&#183; Third term (2010'2014): November 26, 2010 ' May 17, 2014</p><p>&#183; Fourth term (2015): February 22, 2015 ' November 19, 2015</p><p>&#183; Fifth term (2015 - 2017): November 20, 2015 ' July 26, 2017</p><p>&#183; Sixth term (2017 - 2020): July 27, 2017 ' November 2020</p><p>&#183; Seventh term (2020-2022): November 16, 2020 ' 2022</p><p>&#183; Eighth term (August 9, 2022 - January 28, 2024)</p>",

    "question": "<span class=\"eqt\"><p>Which of the following is considered as Revenue expenditure?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pension</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2306;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Construction of School</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2325;&#2370;&#2354; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339;</span>",
      "<span class=\"eqt\">Repayment of Loans</span><span class=\"hqt\" style=\"display:none\">&#2315;&#2339;&#2379;&#2306; &#2325;&#2366; &#2346;&#2369;&#2344;&#2352;&#2381;&#2349;&#2369;&#2327;&#2340;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Purchase of Machinery</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2358;&#2368;&#2344;&#2352;&#2368; &#2325;&#2368; &#2326;&#2352;&#2368;&#2342;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Revenue Expenditure</p><p>&#9675; Revenue expenditure are those expenses which neither create assets nor reduce liabilities of the government.</p><p>&#9675; They are regular and recurring expenditures.</p><p>&#9675; Examples: Payment of salaries, Maintenance of Roads and Street Light, Paying Pensions, Interest Paid on National debt</p><p>Further Insight:</p><p>&bull; Capital Expenditure</p><p>&#9675; These are those expenses which create assets and reduce the liabilities of the government.</p><p>&#9675; They are not regular and recurring in nature.</p><p>&#9675; They are done for longterm.</p><p>&#9675; Examples: Construction of Skills, Purchase of Machinery, Repayment of loans, Loans given to state or Union territories.</p>",
    "question_index": 112
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is correct about the qualification of a Governor to hold the office?</p><p>a) He must be citizen of India</p><p>b) He must attain the age of 35</p><p>c) He has qualifications to be a member of the Legislative Assembly of the state.</p><p>Choose the correct option</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2375; &#2346;&#2342; &#2346;&#2352; &#2348;&#2344;&#2375; &#2352;&#2361;&#2344;&#2375; &#2325;&#2368; &#2351;&#2379;&#2327;&#2381;&#2351;&#2340;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>a) &#2313;&#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;</p><p>b) &#2313;&#2360;&#2325;&#2368; &#2310;&#2351;&#2369; 35 &#2357;&#2352;&#2381;&#2359; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;</p><p>c) &#2313;&#2360;&#2325;&#2375; &#2346;&#2366;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2366; &#2360;&#2342;&#2360;&#2381;&#2351; &#2348;&#2344;&#2344;&#2375; &#2325;&#2368; &#2351;&#2379;&#2327;&#2381;&#2351;&#2340;&#2366; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only c and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c &#2324;&#2352; b</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Governor</p><p>&#9675; The Governor is the constitutional head of a state.</p><p>&#9675; Appointed by the President of India for a 5-year term (Article 155).</p><p>&#9675; Holds office at the pleasure of the President (Article 156).</p><p>&#9675; Qualifications and Oath</p><p>&#9632; Must be an Indian citizen and at least 35 years old (Article 157).</p><p>&#9632; Takes an oath of office to preserve, protect, and defend the Constitution (Article 159).</p><p>&#9675; Powers and Functions</p><p>&#9632; Executive Powers:</p><p>&bull; Appoints the Chief Minister and Council of Ministers.</p><p>&bull; Exercises administrative control over the state.</p><p>&#9632; Legislative Powers:</p><p>&bull; Can summon, prorogue, or dissolve the State Legislative Assembly.</p><p>&bull; Can reserve certain bills for Presidential consideration (Article 200).</p><p>&#9632; Judicial Powers:</p><p>&bull; Holds the power to grant pardons and reprieves for state offenses (Article 161).</p><p>&#9632; Discretionary Powers:</p><p>&bull; Can act independently in certain situations, such as recommending President's Rule (Article 356).</p><p>&#9675; Role as Centre's Representative</p><p>&#9632; The Governor acts as a link between the central and state governments, ensuring central directives are implemented.</p>",
    "question_index": 113
  },

    "question": "<span class=\"eqt\"><p>Which of the following reactions is an example of a redox reaction?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2352;&#2375;&#2337;&#2377;&#2325;&#2381;&#2360; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2366; &#2319;&#2325; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">AgNO&#8323; + NaCl &rarr; AgCl + NaNO&#8323;</span><span class=\"hqt\" style=\"display:none\">AgNO&#8323; + NaCl &#8594; AgCl + NaNO&#8323;</span>",
      "<span class=\"eqt\">CaCO&#8323; &rarr; CaO + CO&#8322;</span><span class=\"hqt\" style=\"display:none\">CaCO&#8323; &#8594; CaO + CO&#8322;</span>",
      "<span class=\"eqt\">2H&#8322; + O&#8322; &rarr; 2H&#8322;O</span><span class=\"hqt\" style=\"display:none\">2H&#8322; + O&#8322; &#8594; 2H&#8322;O</span>",
      "<span class=\"eqt\">CH&#8324; + 2O&#8322; &rarr; CO&#8322; + 2H&#8322;O</span><span class=\"hqt\" style=\"display:none\">CH&#8324; + 2O&#8322; &#8594; CO&#8322; + 2H&#8322;O</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>AgNO&#8323; + NaCl &rarr; AgCl + NaNO&#8323;</p><p>A redox (oxidation-reduction) reaction involves the transfer of electrons between reactants. In this reaction, silver ions (Ag&#8314;) are reduced to silver (Ag), while sodium (Na) is oxidized to sodium ions (Na&#8314;), making it a redox reaction.</p>",
    "question_index": 114
  },
  {
    "question": "<span class=\"eqt\"><p>Which phylum includes organisms with a notochord, a dorsal nerve cord, pharyngeal slits, and a post-anal tail at some stage of their life cycle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2360;&#2306;&#2328; &#2350;&#2375;&#2306; &#2320;&#2360;&#2375; &#2332;&#2368;&#2357; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2332;&#2368;&#2357;&#2344; &#2330;&#2325;&#2381;&#2352; &#2325;&#2375; &#2325;&#2367;&#2360;&#2368; &#2330;&#2352;&#2339; &#2350;&#2375;&#2306; &#2344;&#2379;&#2335;&#2379;&#2325;&#2377;&#2352;&#2381;&#2337;, &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2340;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366; &#2352;&#2332;&#2381;&#2332;&#2369;, &#2327;&#2381;&#2352;&#2360;&#2344;&#2368; &#2331;&#2367;&#2342;&#2381;&#2352; &#2324;&#2352; &#2346;&#2379;&#2360;&#2381;&#2335;-&#2327;&#2369;&#2342;&#2366; &#2346;&#2369;&#2330;&#2381;&#2331; &#2350;&#2380;&#2332;&#2370;&#2342; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Arthropoda</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2381;&#2352;&#2379;&#2346;&#2379;&#2337;&#2364;&#2366;</span>",
      "<span class=\"eqt\">Chordata</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2377;&#2352;&#2381;&#2337;&#2375;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Mollusca</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2354;&#2360;&#2381;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Platyhelminthes</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2375;&#2335;&#2368;&#2361;&#2375;&#2354;&#2381;&#2350;&#2367;&#2341;&#2368;&#2332;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Animals in the phylum Chordata share four key features that appear at some stage during their development: a notochord, a dorsal hollow nerve cord, pharyngeal slits, and a post-anal tail. In some groups, some of these are present only during embryonic development. Examples: Fish, amphibians, reptiles, birds, mammals.</p><p></p><p>Characteristics of others:</p><p>- Phylum Arthropoda: Jointed appendages, exoskeleton made of chitin, segmented body. Examples: Insects, spiders, crabs, lobsters, centipedes, millipedes.</p><p></p><p>- Phylum Mollusca: Soft body, muscular foot, mantle, often with a shell. Examples: Snails, slugs, clams, oysters, octopuses, squid.</p><p></p><p>- Phylum Platyhelminthes: Flat, unsegmented body, bilateral symmetry, often parasitic. Examples: Tapeworms, flukes, planarians.</p><p></p>",
    "question_index": 115
  },

    "question": "<span class=\"eqt\"><p>Match the following.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List-I (Enzymes)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List-II (Function)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) Amylase</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) Completes conversion of starch into maltose.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Lipase</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) Act on peptides to produce small peptides and amino acids</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Nucleases</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) Digest nucleic acids.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) Carboxypeptidases</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) Acts on emulsified fats to produce fatty acids.</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2379; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368;-I (&#2319;&#2306;&#2332;&#2366;&#2311;&#2350; )</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368;-II (&#2325;&#2366;&#2352;&#2381;&#2351;)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) &#2319;&#2350;&#2367;&#2354;&#2375;&#2332;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) &#2360;&#2381;&#2335;&#2366;&#2352;&#2381;&#2330; &#2325;&#2366; &#2350;&#2366;&#2354;&#2381;&#2335;&#2379;&#2332;&#2364; &#2350;&#2375;&#2306; &#2352;&#2370;&#2346;&#2366;&#2306;&#2340;&#2352;&#2339; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2354;&#2366;&#2311;&#2346;&#2375;&#2332;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) &#2331;&#2379;&#2335;&#2375; &#2346;&#2375;&#2346;&#2381;&#2335;&#2366;&#2311;&#2337; &#2324;&#2352; &#2309;&#2350;&#2368;&#2344;&#2379; &#2309;&#2350;&#2381;&#2354; &#2325;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2375;&#2346;&#2381;&#2335;&#2366;&#2311;&#2337; &#2346;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2344;&#2381;&#2351;&#2370;&#2325;&#2381;&#2354;&#2367;&#2319;&#2332;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) &#2344;&#2381;&#2351;&#2370;&#2325;&#2381;&#2354;&#2367;&#2325; &#2309;&#2350;&#2381;&#2354; &#2325;&#2366; &#2346;&#2366;&#2330;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2325;&#2381;&#2360;&#2367;&#2346;&#2375;&#2346;&#2381;&#2335;&#2367;&#2337;&#2375;&#2332;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) &#2357;&#2360;&#2368;&#2351; &#2309;&#2350;&#2381;&#2354; &#2325;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2311;&#2350;&#2354;&#2381;&#2360;&#2368;&#2347;&#2366;&#2311;&#2337; &#2357;&#2360;&#2366; &#2346;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">(i)-b, (ii)-c, (iii)-a, (iv)-d</span><span class=\"hqt\" style=\"display:none\">(i)-b, (ii)-c, (iii)-a, (iv)-d</span>",
      "<span class=\"eqt\">(i)-c, (ii)-a, (iii)-d, (iv)-b</span><span class=\"hqt\" style=\"display:none\">(i)-c, (ii)-a, (iii)-d, (iv)-b</span>",
      "<span class=\"eqt\">(i)-d, (ii)-c, (iii)-a, (iv)-b</span><span class=\"hqt\" style=\"display:none\">(i)-d, (ii)-c, (iii)-a, (iv)-b</span>",
      "<span class=\"eqt\">(i)-a, (ii)-d, (iii)-c, (iv)-b</span><span class=\"hqt\" style=\"display:none\">(i)-a, (ii)-d, (iii)-c, (iv)-b</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The pancreatic juice contains six major categories of enzymes, which act in an alkaline medium. </p><p>(a) Amylase  -  completes conversion of starch (polysaccharide) into maltose (disaccharide). </p><p>(b) Lipase  -  also called steapsin, acts on emulsified fats to produce fatty acids and glycerol. </p><p>(c) Nucleases  -  digest nucleic acids, i.e., DNA and RNA content of the food. </p><p>(d) Trypsinogen  -  the inactive precursor (proenzyme) of trypsin. It is activated into trypsin by the enzyme enterokinase secreted by the lining of duodenum. Trypsin acts on remaining proteins (not digested by pepsin) and the proteoses and peptones to produce peptides and amino acids. </p><p>(e) Chymotrypsin  -  acts on milk protein casein to produce paracasein (curd), and also converts other proteins into peptides. </p><p>(f) Carboxypeptidases  -  act on peptides to produce small peptides and amino acids.</p>",
    "question_index": 116
  },

    "question": "<span class=\"eqt\"><p>Which of the following factor(s) contributes to the <b>appreciation</b> of Indian rupee?</p><p>I. Rise in interest rates in India.</p><p>II. Increasing imports</p><p>III. More Indians travelling abroad for vacation.</p><p>Select the correct answer using the code below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2366;&#2352;&#2325; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; <b>&#2350;&#2370;&#2354;&#2381;&#2351; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; </b>&#2350;&#2375;&#2306; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;/&#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;?</p><p>I. &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2344;&#2366;&#2404;</p><p>II. &#2310;&#2351;&#2366;&#2340; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2344;&#2366;&#2404;</p><p>III. &#2309;&#2343;&#2367;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351;&#2379;&#2306; &#2325;&#2366; &#2331;&#2369;&#2335;&#2381;&#2335;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2342;&#2375;&#2358; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2366;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I is correct:</b></p><p>Consider that government bonds in US pay 8 per cent rate of interest whereas equally safe bonds in India yield 10 per cent. Investors from US will be attracted by the high interest rates in India and will buy rupee selling their Us dollars. At the same time investors in India will also find investing domestically more attractive and will therefore demand less of US dollar. This results in appreciation of Indian rupee due to increased demand. Thus, a rise in the interest rates at home often leads to an appreciation of the domestic currency.</p><p><b>Statement II and III are incorrect:</b></p><p>Increasing imports will reduce the demand of the importing country's currency and results in depreciation.</p><p>Similarly, when more and more Indians travel abroad it will increase the demand for foreign services and currency which again will result in depreciation.</p><p>Source: NCERT</p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct?</p><p>1) When a ball starts falling from a height in vacuum, the potential energy is maximum initially.</p><p>2) The potential energy of the ball gets converted into heat energy while falling.</p><p>Select the correct answer using the code given below:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p><p>1) &#2332;&#2348; &#2325;&#2379;&#2312; &#2327;&#2375;&#2306;&#2342; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2340; &#2350;&#2375;&#2306; &#2314;&#2305;&#2330;&#2366;&#2312; &#2360;&#2375; &#2327;&#2367;&#2352;&#2344;&#2375; &#2354;&#2327;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2369;&#2352;&#2370; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2327;&#2375;&#2306;&#2342; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2327;&#2367;&#2352;&#2340;&#2375; &#2360;&#2350;&#2351; &#2313;&#2359;&#2381;&#2350;&#2368;&#2351; &#2314;&#2352;&#2381;&#2332;&#2366; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 or 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>When a body starts falling (in vacuum) from a height, then it is at rest, so it does not have any kinetic energy. However due to the height it gains potential energy and is stored in it. While falling, the height decreases and the potential energy gets converted into kinetic energy.</p>",
    "question_index": 118
  },

    "question": "<span class=\"eqt\"><p>Who was the viceroy of India during the announcement of the communal award?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2350;&#2381;&#2346;&#2381;&#2352;&#2342;&#2366;&#2351;&#2367;&#2325; &#2309;&#2343;&#2367;&#2344;&#2367;&#2352;&#2381;&#2339;&#2351; (&#2325;&#2350;&#2381;&#2351;&#2369;&#2344;&#2354; &#2309;&#2357;&#2366;&#2352;&#2381;&#2337;) &#2325;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2375; &#2360;&#2350;&#2351; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2357;&#2366;&#2351;&#2360;&#2352;&#2366;&#2351; &#2325;&#2380;&#2344; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lord Curzon</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2352;&#2381;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Lord Chelmsford</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2330;&#2375;&#2350;&#2381;&#2360;&#2347;&#2379;&#2352;&#2381;&#2337;</span>",
      "<span class=\"eqt\">Lord Willingdon</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2357;&#2367;&#2354;&#2367;&#2306;&#2327;&#2337;&#2344;</span>",
      "<span class=\"eqt\">Lord Irwin</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2311;&#2352;&#2357;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Lord Willingdon</b> was the viceroy of India during the announcement of the communal award. The Communal Award was created by the British prime minister Ramsay MacDonald on 16 August 1932. Also known as the MacDonald Award, it was announced after the Round Table Conference and extended the separate electorate to depressed Classes and other minorities.</p>",

  },

    "correct_option_id": 1,
    "solution": "<p>About 80 per cent of the coal deposits in India is of bituminous type and is of non-coking grade. The most important Gondwana coal fields of India are located in Damodar Valley. They lie in the Jharkhand-Bengal coal belt and the important coal fields in this region are Raniganj, Jharia, Bokaro, Giridih, Karanpura. Jharia is the largest coal field followed by Raniganj. The other river valleys associated with coal are Godavari, Mahanadi and Sone. The most important coal mining centres are Singrauli in Madhya Pradesh (part of Singrauli coal field lies in Uttar Pradesh), Korba in Chhattisgarh, Talcher and Rampur in Odisha, Chanda - Wardha, Kamptee and Bander in Maharashtra and Singareni in Telangana and Pandur in Andhra Pradesh</p>",

  },

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are <b>CORRECT</b> about the \"Palaeolithic Age\"?</p><p>(I) The term Palaeolithic is derived from the Greek word 'palaeo' which means old and 'lithic' meaning stone. The term Palaeolithic age refers to the old stone age.</p><p>(II) The main tools of lower Palaeolithic phase were hand axes, cleavers and choppers</p><p>(III) The geographical distribution of the Palaeolithic sites was spread only in the north region of the Indian subcontinent.</p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2346;&#2369;&#2352;&#2366;&#2346;&#2366;&#2359;&#2366;&#2339; &#2351;&#2369;&#2327;\" &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; <b>&#2360;&#2361;&#2368;</b> &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>(I) &#2346;&#2369;&#2352;&#2366;&#2346;&#2366;&#2359;&#2366;&#2339; &#2358;&#2348;&#2381;&#2342; &#2327;&#2381;&#2352;&#2368;&#2325; &#2358;&#2348;&#2381;&#2342; '&#2346;&#2376;&#2354;&#2367;&#2351;&#2379;' (palaeo) &#2360;&#2375; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2324;&#2352; '&#2354;&#2367;&#2341;&#2367;&#2325;' (lithic) &#2332;&#2367;&#2360;&#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2346;&#2340;&#2381;&#2341;&#2352;&#2404; &#2358;&#2348;&#2381;&#2342; '&#2346;&#2369;&#2352;&#2366;&#2346;&#2366;&#2359;&#2366;&#2339; &#2351;&#2369;&#2327;' &#2325;&#2366; &#2340;&#2366;&#2340;&#2381;&#2346;&#2352;&#2381;&#2351; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2346;&#2366;&#2359;&#2366;&#2339; &#2351;&#2369;&#2327; &#2360;&#2375; &#2361;&#2376;&#2404;</p><p>(II) &#2346;&#2370;&#2352;&#2381;&#2357;- &#2346;&#2369;&#2352;&#2366;&#2346;&#2366;&#2359;&#2366;&#2339; &#2325;&#2366;&#2354; &#8203;&#8203;&#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2313;&#2346;&#2325;&#2352;&#2339; &#2361;&#2366;&#2341; &#2325;&#2368; &#2325;&#2369;&#2354;&#2381;&#2361;&#2366;&#2337;&#2364;&#2367;&#2351;&#2366;&#2305;, &#2325;&#2381;&#2354;&#2368;&#2357;&#2352; &#2324;&#2352; &#2330;&#2377;&#2346;&#2352; &#2341;&#2375;</p><p>(III) &#2346;&#2369;&#2352;&#2366;&#2346;&#2366;&#2359;&#2366;&#2339;&#2325;&#2366;&#2354;&#2368;&#2344; &#2360;&#2381;&#2341;&#2354;&#2379;&#2306; &#2325;&#2366; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2375;&#2357;&#2354; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2313;&#2346;&#2350;&#2361;&#2366;&#2342;&#2381;&#2357;&#2368;&#2346; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2340;&#2325; &#2361;&#2368; &#2347;&#2376;&#2354;&#2366; &#2361;&#2369;&#2310; &#2341;&#2366;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">(I), (II) and (III)</span><span class=\"hqt\" style=\"display:none\">(I), (II) &#2324;&#2352; (III)</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The term Palaeolithic is derived from the Greek word 'palaeo', which means old and 'lithic' meaning stone. Therefore, the term Palaeolithic age refers to the old stone age.</p><p>&#183; The main tools of lower Palaeolithic phase were hand axes, cleavers and choppers. These are called chopping tools. These were rough and heavy and were made by chipping the sides of the stones. </p><p>&#183; The geographical distribution of the Palaeolithic sites suggests that this culture was spread throughout the length and breadth of the Indian subcontinent. In the north, Kashmir Valley and the Sohan Valley in Rawalpindi (now in Pakistan) have yielded Palaeolithic tools.</p><p>&#183; In Rajasthan, Palaeolithic tools were found at the sites along the river Luni. In Western India, the Palaeolithic tools were also discovered from the sites of the rivers Sabarmati, Mahi and their tributaries in Gujarat. </p><p>&#183; In Maharashtra, the most important sites are Nevasa on a tributary of Godavari and Patne in the Tapti River system.</p>",
    "question_index": 121
  },
