    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct about National Agricultural Cooperative Marketing Federation of India (NAFED)?</p><p>I. It is registered under the Societies Registration Act, 1860.</p><p>II. It promotes co-operative marketing of agricultural produce to benefit the farmers.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2371;&#2359;&#2367; &#2360;&#2361;&#2325;&#2366;&#2352;&#2368; &#2357;&#2367;&#2346;&#2339;&#2344; &#2360;&#2306;&#2328; (NAFED) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2351;&#2361; &#2360;&#2379;&#2360;&#2366;&#2351;&#2335;&#2368; &#2346;&#2306;&#2332;&#2368;&#2325;&#2352;&#2339; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1860 &#2325;&#2375; &#2340;&#2361;&#2340; &#2346;&#2306;&#2332;&#2368;&#2325;&#2371;&#2340; &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2361; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2354;&#2366;&#2349; &#2346;&#2361;&#2369;&#2306;&#2330;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2371;&#2359;&#2367; &#2313;&#2346;&#2332; &#2325;&#2375; &#2360;&#2361;&#2325;&#2366;&#2352;&#2368; &#2357;&#2367;&#2346;&#2339;&#2344; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both statements I and II are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only statement II is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; II &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both Statements I and II are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only statement I is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; I &#2360;&#2361;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Statement I is not correct: National Agricultural Cooperative Marketing Federation of India Ltd. (NAFED)</b> was established on the auspicious day of Gandhi Jayanti on 2nd October 1958. <b>It is registered under the Multi-State Co-operative Societies Act, 2002.</b></p><p><b>Statement II is correct: NAFED was set up with the objective to promote Cooperative marketing of agricultural produce to benefit the farmers</b>. Agricultural farmers are the main members of NAFED, who have the authority to say in the form of members of the General Body in the working of NAFED. </p><p>The objectives of the NAFED shall be to organize, promote and develop marketing, processing and storage of agricultural, horticultural and forest produce.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following statements is INCORRECT with respect to the power of a high court?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The original jurisdiction of a high court is wider than its appellate jurisdiction.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2350;&#2370;&#2354; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2313;&#2360;&#2325;&#2375; &#2309;&#2346;&#2368;&#2354;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2361;&#2376;</span>",
      "<span class=\"eqt\">High court has original jurisdiction regarding disputes relating to the election of members of Parliament and state legislatures.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2346;&#2366;&#2360; &#2360;&#2306;&#2360;&#2342; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2360;&#2349;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2330;&#2369;&#2344;&#2366;&#2357; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2357;&#2367;&#2357;&#2366;&#2342;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2350;&#2370;&#2354; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2361;&#2376;</span>",
      "<span class=\"eqt\">High court has original jurisdiction in matters of admirality and contempt of court.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2346;&#2366;&#2360; &#2346;&#2381;&#2352;&#2358;&#2306;&#2360;&#2366; &#2324;&#2352; &#2309;&#2342;&#2366;&#2354;&#2340; &#2325;&#2368; &#2309;&#2357;&#2350;&#2366;&#2344;&#2344;&#2366; &#8203;&#8203;&#2325;&#2375; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2350;&#2370;&#2354; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2361;&#2376;</span>",
      "<span class=\"eqt\">All are correct</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Original Jurisdiction means the power of a high court to hear disputes in the first instance, not by way of appeal. It extends to the following:</p><p>(a)<b>Matters of admirality and contempt of court</b>. </p><p>(b)<b>Disputes relating to the election of members of Parliament and state legislatures</b>.</p><p>(c)Regarding revenue matters or an act ordered or done in revenue collection.</p><p>(d)Enforcement of fundamental rights of citizens.</p><p>(e)Cases ordered to be transferred from a subordinate court involving the interpretation of the Constitution to its own file.</p><p>(f) The four high courts (i.e., Calcutta, Bombay, Madras and Delhi High Courts) have original civil jurisdiction in cases of higher value.</p><p>Before 1973, the Calcutta, Bombay and Madras High Courts also had original criminal jurisdiction. This was fully abolished by the Criminal Procedure Code, 1973. A high court is primarily a court of appeal. It hears appeals against the judgments of subordinate courts functioning in its territorial jurisdiction. It has appellate jurisdiction in both civil and criminal matters. Hence, the <b>appellate jurisdiction of a high court is wider than its original jurisdiction. </b></p>",
    "question_index": 123
  },

    "question": "<span class=\"eqt\"><p>Which of the following is not true about the mansabdar system of Mughals?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2369;&#2327;&#2354;&#2379;&#2306; &#2325;&#2368; &#2350;&#2344;&#2360;&#2348;&#2342;&#2366;&#2352; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The term mansabdar refers to an individual who holds a mansab, meaning a position or rank.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2344;&#2360;&#2348;&#2342;&#2366;&#2352; &#2358;&#2348;&#2381;&#2342; &#2319;&#2325; &#2320;&#2360;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2366;&#2360; &#2350;&#2344;&#2360;&#2348; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2351;&#2361;&#2366;&#2305; &#2350;&#2344;&#2360;&#2348; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2346;&#2342; &#2351;&#2366; &#2352;&#2376;&#2306;&#2325; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It was a grading system used by the Mughals to fix rank, salary and military responsibilities.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2319;&#2325; &#2327;&#2381;&#2352;&#2375;&#2337;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2341;&#2368; &#2332;&#2367;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2350;&#2369;&#2327;&#2354;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2352;&#2376;&#2306;&#2325;, &#2357;&#2375;&#2340;&#2344; &#2324;&#2352; &#2360;&#2376;&#2344;&#2381;&#2351; &#2313;&#2340;&#2381;&#2340;&#2352;&#2342;&#2366;&#2351;&#2367;&#2340;&#2381;&#2357; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Rank and salary were determined by a numerical value called zat.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2376;&#2306;&#2325; &#2324;&#2352; &#2357;&#2375;&#2340;&#2344; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2339; &#2332;&#2364;&#2366;&#2335; &#2344;&#2366;&#2350;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2350;&#2366;&#2344; &#2360;&#2375; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Mansabdars received their salaries as revenue assignments called zabtas.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2344;&#2360;&#2348;&#2342;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2366; &#2357;&#2375;&#2340;&#2344; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2325;&#2366;&#2352;&#2381;&#2351;&#2349;&#2366;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2340;&#2366; &#2341;&#2366; &#2332;&#2367;&#2360;&#2375; &#2332;&#2364;&#2348;&#2381;&#2340;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The term mansabdar refers to an individual who holds a mansab, meaning a position or rank. It was a grading system used by the Mughals to fix (1) rank, (2) salary and (3) military responsibilities. Rank and salary were determined by a numerical value called zat. </p><p>The higher the zat, the more prestigious was the noble's position in court and the larger his salary. The mansabdar's military responsibilities required him to maintain a specified number of sawar or cavalrymen. The mansabdar brought his cavalrymen for review, got them registered, their horses branded and then received money to pay them as salary. Mansabdars received their salaries as revenue assignments called <b>jagirs</b> which were somewhat like iqtas. But unlike muqtis, most mansabdars did not actually reside in or administer their jagirs. They only had rights to the revenue of their assignments which was collected for them by their servants while the mansabdars themselves served in some other part of the country.</p>",
    "question_index": 124
  },

    "question": "<span class=\"eqt\"><p>Below are the few statements given about the wetlands</p><p>A. Wetlands can store floodwater and reduce the frequency and intensity of the floods. </p><p>B. Wetlands can protect shorelines and stream banks from erosion.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2310;&#2352;&#2381;&#2342;&#2381;&#2352;&#2349;&#2370;&#2350;&#2367; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404;</p><p>A. &#2310;&#2352;&#2381;&#2342;&#2381;&#2352;&#2349;&#2370;&#2350;&#2367; &#2348;&#2366;&#2338;&#2364; &#2325;&#2375; &#2346;&#2366;&#2344;&#2368; &#2325;&#2379; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2348;&#2366;&#2338;&#2364; &#2325;&#2368; &#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2324;&#2352; &#2340;&#2368;&#2357;&#2381;&#2352;&#2340;&#2366; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>B. &#2310;&#2352;&#2381;&#2342;&#2381;&#2352;&#2349;&#2370;&#2350;&#2367; &#2340;&#2335;&#2352;&#2375;&#2326;&#2366;&#2323;&#2306; &#2324;&#2352; &#2344;&#2342;&#2368; &#2325;&#2375; &#2325;&#2367;&#2344;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2325;&#2335;&#2366;&#2357; &#2360;&#2375; &#2348;&#2330;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and B are incorrect</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2364;&#2354;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2319;&#2325;</span>",
      "<span class=\"eqt\">Both A and B are correct</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Wetlands can store floodwater and reduce the frequency and intensity of the floods. </p><p>&bull; Wetlands can protect shorelines and stream banks from erosion.</p><p>Further Insight:</p><p>&bull; Wetlands are ecosystems with water that is present seasonally or permanently, including marshes, swamps, and bogs.</p><p>&#9675; Benefits:</p><p>&#9675; Biodiversity:</p><p>&#9632; Habitat for diverse species, including migratory birds and aquatic life.</p><p>&#9675; Water Quality:</p><p>&#9632; Natural filters that trap pollutants and sediments.</p><p>&#9675; Flood Control:</p><p>&#9632; Absorb excess rainwater, reducing flood risks.</p><p>&#9675; Carbon Sequestration:</p><p>&#9632; Store CO&#8322;, aiding in climate change mitigation.</p><p>&#9675; Recreation and Tourism:</p><p>&#9632; Opportunities for ecotourism and recreational activities.</p><p>&#9675; Livelihoods:</p><p>&#9632; Support local communities through fishing and resource harvesting.</p>",
    "question_index": 125
  },

    "question": "<span class=\"eqt\"><p>Which of the following is not the objective of the Atal Bhujal Yojana?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2335;&#2354; &#2349;&#2370;&#2332;&#2354; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To improve the management of groundwater resources in water stressed areas.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2354; &#2360;&#2306;&#2325;&#2335;&#2327;&#2381;&#2352;&#2360;&#2381;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2370;&#2332;&#2354; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To encourage community participation in groundwater management through water budgeting.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2354; &#2348;&#2332;&#2335; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2349;&#2370;&#2332;&#2354; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2350;&#2375;&#2306; &#2360;&#2366;&#2350;&#2369;&#2342;&#2366;&#2351;&#2367;&#2325; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2368; &#2325;&#2379; &#2346;&#2381;&#2352;&#2379;&#2340;&#2381;&#2360;&#2366;&#2361;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To promote the use of groundwater as much as possible for farming and other activities.</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2375;&#2340;&#2368; &#2324;&#2352; &#2309;&#2344;&#2381;&#2351; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2349;&#2370;&#2332;&#2354; &#2325;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2379; &#2351;&#2341;&#2366;&#2360;&#2306;&#2349;&#2357; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To improve the croppings patterns</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2360;&#2354; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; It aims to promote the efficient and equitable use of groundwater resources, not the use of groundwater as much as possible for farming and other activities.</p><p>Further Insight:</p><p>&bull; Atal Bhujal Yojana (Atal Jal)</p><p>&#9675; Launched on December 25, 2019, by PM Narendra Modi, Atal Bhujal Yojana (ATAL JAL) is a central scheme aiming to improve groundwater management across India's water-stressed regions.</p><p>&#9675; Total budget: &#8377;6,000 crore for 2020-2025, with half funded by a World Bank loan and the other half through central government assistance&#8203;</p><p>&#9675; Key Components:</p><p>&#9632; Institutional Strengthening:</p><p>&bull; Improves monitoring networks and capacity-building at local levels, focusing on sustainable groundwater management.</p><p>&#9632; Promotes Water User Associations and the creation of community-led Water Security Plans.</p><p>&#9632; Incentives for States:</p><p>&bull; Provides rewards for states demonstrating effective groundwater management through data transparency, water budgeting, and efficient resource use&#8203;</p><p>&#9675; Implementation Regions:</p><p>&#9632; Targeted at 8,562 gram panchayats across 80 districts in seven states: Gujarat, Haryana, Karnataka, Madhya Pradesh, Maharashtra, Rajasthan, and Uttar Pradesh.</p><p>&#9675; Focus Areas:</p><p>&#9632; Community Participation: Emphasizes local involvement in water budgeting and management to ensure collective responsibility.</p><p>&#9632; Efficiency and Sustainability:</p><p>&#9632; Promotes efficient groundwater use and crop diversification.</p><p>&#9632; Aligns with the Jal Jeevan Mission to enhance water security and contribute to farmers' income growth&#8203;.</p><p>&#9675; Expected Impact:</p><p>&#9632; Increased groundwater sustainability, improved cropping patterns, and mass-scale water-use efficiency.</p><p>&#9632; Encourages behavioral changes within communities toward sustainable water practices&#8203;</p>",
    "question_index": 126
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct regarding the 106th Constitution Amendment Act?</p><p>A. It is known as Mahila Saman Bill.</p><p>B. It seeks to provide reservation to women in Lok Sabha, Rajya Sabha and State Assemblies.</p></span><span class=\"hqt\" style=\"display:none\"><p>106&#2357;&#2375;&#2306; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A. &#2311;&#2360;&#2375; &#2350;&#2361;&#2367;&#2354;&#2366; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>B. &#2351;&#2361; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366;, &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2360;&#2349;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2379; &#2310;&#2352;&#2325;&#2381;&#2359;&#2339; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Both a and b</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; b &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Both a and b are incorrect</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; b &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p></p><p>&bull; 106th Amendment of the Constitution of India (Women's Reservation Act, 2023)</p><p>&#9675; Purpose:</p><p>&#9632; Reserves 33% of seats in Lok Sabha, state legislative assemblies, and Delhi legislative assembly for women.</p><p>&#9632; Aims to empower women by addressing gender disparities in political representation.</p><p>&#9675; Key Features:</p><p>&#9632; Article 332A: One-third of seats reserved for Scheduled Caste and Scheduled Tribe candidates must be for women.</p><p>&#9632; Seat Rotation: Reserved seats for women will be rotated after each delimitation, as decided by Parliament through legislation.</p><p>&#9675; Timeline:</p><p>&#9632; Introduced in Lok Sabha on September 19, 2023, and passed on September 21, 2023.</p><p>&#9632; Implementation date to be announced by the central government via an official gazette notification.</p><p>&#9675; International Alignment:</p><p>&#9632; The amendment aligns with the Convention on the Elimination of All Forms of Discrimination Against Women (CEDAW), which advocates for equality in political and public life.</p>",
    "question_index": 127
  },
  {
    "question": "<span class=\"eqt\"><p>The Shyok and the Hunza are tributaries of which river?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2381;&#2351;&#2379;&#2325; &#2324;&#2352; &#2361;&#2369;&#2306;&#2332;&#2366; &#2325;&#2367;&#2360; &#2344;&#2342;&#2368; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2367;&#2351;&#2366;&#2305; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ganga</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Indus</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2306;&#2343;&#2369;</span>",
      "<span class=\"eqt\">Kaveri</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2357;&#2375;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Mahanadi</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2344;&#2342;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Shyok and Hunza rivers are tributaries of the Indus River. The Indus River originates in Tibet, near Lake Mansarovar.</p><p>Tributaries:</p><p>Several tributaries, the Zaskar, the Nubra, the Shyok and the Hunza, join it in the Kashmir region. The Indus flows through Baltistan and Gilgit and emerges from the mountains at Attock. The Satluj, the Beas, the Ravi, the Chenab and the Jhelum join together to enter the Indus near Mithankot in Pakistan.</p>",
    "question_index": 128
  },

    "question": "<span class=\"eqt\"><p>Arrange the following coastal regions of India from North to South direction.</p><p>I. Gulf of Khambhat</p><p>II. Gulf of Mannar</p><p>III. Coramandel coast</p><p>IV. Konkan Coast</p><p>Select the correct answer using codes below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2340;&#2335;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2313;&#2340;&#2381;&#2340;&#2352; &#2360;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2342;&#2367;&#2358;&#2366; &#2325;&#2375; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2326;&#2306;&#2349;&#2366;&#2340; &#2325;&#2368; &#2326;&#2366;&#2337;&#2364;&#2368;</p><p>II. &#2350;&#2344;&#2381;&#2344;&#2366;&#2352; &#2325;&#2368; &#2326;&#2366;&#2337;&#2364;&#2368;</p><p>III. &#2325;&#2379;&#2352;&#2366;&#2350;&#2306;&#2337;&#2354; &#2340;&#2335;</p><p>IV. &#2325;&#2379;&#2306;&#2325;&#2339; &#2340;&#2335;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I  -  IV  -  III  -  II</span><span class=\"hqt\" style=\"display:none\">I - IV - III - II</span>",
      "<span class=\"eqt\">I  -  III  -  IV  -  II</span><span class=\"hqt\" style=\"display:none\">I - III - IV - II</span>",
      "<span class=\"eqt\">III  -  I  -  II  -  IV</span><span class=\"hqt\" style=\"display:none\">III - I - II - IV</span>",
      "<span class=\"eqt\">I  -  II  -  III  -  IV</span><span class=\"hqt\" style=\"display:none\">I - II - III - IV</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p></p><p>Correct Answer:</p><p>Gulf of Khambhat - Konkan Coast  -  Coromandel Coast  -  Gulf of Mannar</p><p></p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er251227st2003.png\"></p><p></p><p>Coastal Regions - North to South  -  Western Coast</p><p>1. Gulf of Kuchchh</p><p>2. Gulf of Khambhat</p><p>3. Konkan Coast</p><p>4. Malabar Coast</p><p>Coastal Regions - North to South  -  Eastern Coast</p><p>1. Mouths of Ganga (Including Sundarbans)</p><p>2. Utkal Coast</p><p>3. Northern Circars</p><p>4. Coromandel Coast.</p><p>5. Palk Strait</p><p>6. Gulf of Manner</p><p></p><p>Source: NCERT</p>",
    "question_index": 129
  },

    "question": "<span class=\"eqt\"><p>Which of the following is an example of a polymorphic virus? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2346;&#2377;&#2354;&#2368;&#2350;&#2377;&#2352;&#2381;&#2347;&#2367;&#2325; &#2357;&#2366;&#2351;&#2352;&#2360; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">ILOVEYOU</span><span class=\"hqt\" style=\"display:none\">ILOVEYOU</span>",
      "<span class=\"eqt\">Sasser</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2376;&#2360;&#2352;</span>",
      "<span class=\"eqt\">Code Red</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2337; &#2352;&#2375;&#2337;</span>",
      "<span class=\"eqt\">Storm Worm</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2377;&#2352;&#2381;&#2350; &#2357;&#2352;&#2381;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Storm Worm is an example of a polymorphic virus. Polymorphic viruses are a type of malware that can change their code or appearance every time they infect a new system, making it challenging for traditional antivirus programs to detect and remove them. This ability to morph or change their code helps them evade detection and continue to infect systems. The Storm Worm was known for its polymorphic nature and its ability to rapidly spread through email attachments. The other options listed, ILOVEYOU, Sasser, and Code Red, were also notable computer worms or viruses, but they were not primarily polymorphic in nature.</p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following storage is used to hold the Instruction address?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2311;&#2306;&#2360;&#2381;&#2335;&#2381;&#2352;&#2325;&#2381;&#2358;&#2344; &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2352;&#2326;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Instruction Register</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2360;&#2381;&#2335;&#2381;&#2352;&#2325;&#2381;&#2358;&#2344; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Program counter</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2366;&#2313;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Accumulator</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2381;&#2351;&#2369;&#2350;&#2369;&#2354;&#2375;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Stack Pointer</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2376;&#2325; &#2346;&#2377;&#2311;&#2306;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Instruction Register holds the Opcode.</p><p>Program counter is used to hold the Instruction address.</p><p>Accumulator holds the ALU I/P and ALU O/P.</p><p>Stack Pointer holds the instruction of status register.</p><p>Hence (b) is the correct option.</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following printers uses a Light Emitting Diode instead of a Laser?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352; &#2354;&#2375;&#2332;&#2352; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2354;&#2366;&#2311;&#2335; &#2319;&#2350;&#2367;&#2335;&#2367;&#2306;&#2327; &#2337;&#2366;&#2351;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Inkjet printer</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2325;&#2332;&#2375;&#2335; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Solid Ink Printer</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2377;&#2354;&#2367;&#2337; &#2311;&#2306;&#2325; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">LED Printer</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2354;&#2312;&#2337;&#2368; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Line Printer</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2311;&#2344; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Printers are output devices that prints information in the form of text/images on a paper.</p><p><b>LED Printer</b> is a type of printer which used Light Emitting Diode instead of a Laser. It starts by creating a line-by-line image of the page.</p>",
    "question_index": 132
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a key feature of Instant messages?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2340;&#2381;&#2357;&#2352;&#2367;&#2340; &#2360;&#2306;&#2342;&#2375;&#2358; (&#2311;&#2306;&#2360;&#2381;&#2335;&#2375;&#2306;&#2335; &#2350;&#2376;&#2360;&#2375;&#2332;) &#2325;&#2368; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Text Messages can be sent to one or more person</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2350;&#2376;&#2360;&#2375;&#2332; &#2319;&#2325; &#2351;&#2366; &#2319;&#2325; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2349;&#2375;&#2332;&#2375; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Audio-Video calling and conferencing</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2337;&#2367;&#2351;&#2379;-&#2357;&#2368;&#2337;&#2367;&#2351;&#2379; &#2325;&#2377;&#2354;&#2367;&#2306;&#2327; &#2324;&#2352; &#2325;&#2377;&#2344;&#2381;&#2347;&#2381;&#2352;&#2375;&#2306;&#2360;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">File transfers</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2366;&#2311;&#2354; &#2335;&#2381;&#2352;&#2366;&#2344;&#2381;&#2360;&#2347;&#2352; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Instant messaging (IM) is a form of communication over the Internet that offers an instantaneous transmission of text-based messages from sender to receiver. Most instant messaging software include the option for performing file transfers, audio chat, video calling and conferencing, sharing desktops, etc. apart from standard text chat. Instant messaging software is widely used for personal and commercial use.</p><p>Key Features of an instant messaging are as follows: </p><p>&bull; Text Messages can be sent to one or more person </p><p>&bull; Audio calling and conferencing.</p><p>&bull; Video calling and conferencing.</p><p>&bull; File transfers</p>",
    "question_index": 133
  },

    "question": "<span class=\"eqt\"><p>Read the following statement about Plotters and choose the correct option.</p><p>a. Plotter is an output device used to produce hard copies of graphs and designs on the paper.</p><p>b. Drum plotter is also known as a table plotter. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2354;&#2377;&#2335;&#2352; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344; &#2325;&#2379; &#2346;&#2338;&#2364;&#2367;&#2319; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>a. &#2346;&#2381;&#2354;&#2377;&#2335;&#2352; &#2319;&#2325; &#2310;&#2313;&#2335;&#2346;&#2369;&#2335; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2366;&#2327;&#2332; &#2346;&#2352; &#2327;&#2381;&#2352;&#2366;&#2347; &#2324;&#2352; &#2337;&#2367;&#2332;&#2366;&#2311;&#2344; &#2325;&#2368; &#2361;&#2366;&#2352;&#2381;&#2337; &#2325;&#2377;&#2346;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>b. &#2337;&#2381;&#2352;&#2350; &#2346;&#2381;&#2354;&#2377;&#2335;&#2352; &#2325;&#2379; &#2335;&#2375;&#2348;&#2354; &#2346;&#2381;&#2354;&#2377;&#2335;&#2352; &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">a is true and b is false</span><span class=\"hqt\" style=\"display:none\">a &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2324;&#2352; b &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">a is true and b is true</span><span class=\"hqt\" style=\"display:none\">a &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2324;&#2352; b &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">a is false and b is false</span><span class=\"hqt\" style=\"display:none\">a &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2324;&#2352; b &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">a is false and b is true</span><span class=\"hqt\" style=\"display:none\">a &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2324;&#2352; b &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Plotter is an output device used to produce hard copies of graphs and designs on the paper. Plotters are used to print the drawings by using a special pen. Plotters are of two types: drum plotters and flatbed plotters.</p><p>Drum plotter is also known as a <b>rollerplotter</b>.</p><p>Flatbed plotter is also known as a table plotter.</p>",
    "question_index": 134
  },
  {
    "question": "<span class=\"eqt\"><p>In which kind of topology all the nodes are connected with all the other nodes via a network channel?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2344;&#2379;&#2337; &#2319;&#2325; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2330;&#2376;&#2344;&#2354; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2309;&#2344;&#2381;&#2351; &#2360;&#2349;&#2368; &#2344;&#2379;&#2337;&#2381;&#2360; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mesh topology</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2358; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Ring topology</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2306;&#2327; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Star topology</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2366;&#2352; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Bus topology</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2360; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Mesh topology is the kind of topology in which all the nodes are connected with all the other nodes via a network channel. </p><p>&#183; Mesh topology is a point-to-point connection. It has n(n-1)/2 network channels to connect n nodes.</p><p>&#183; Mesh topology has two techniques for transmission of data, i.e., routing and flooding. </p><p>&#183; In the routing technique, the nodes possess a routing logic, like the logic for the shortest distance to the destination node or the logic to avoid routes with broken connections. </p><p>&#183; In the flooding technique, all the network nodes receive the same data. </p><p>&#183; This leaves us no need for routing logic. This technique makes the network robust but results in unwanted load on the network.</p>",
    "question_index": 135
  },

#2351; &#2349;&#2357;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2319;&#2350;&#2319;&#2319;&#2344; (MAN)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2351;&#2361; &#2319;&#2325; &#2348;&#2337;&#2364;&#2375; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; &#2325;&#2357;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2309;&#2325;&#2381;&#2360;&#2352; &#2325;&#2312; &#2358;&#2361;&#2352;&#2379;&#2306; &#2351;&#2366; &#2342;&#2375;&#2358;&#2379;&#2306; &#2340;&#2325; &#2347;&#2376;&#2354;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</td></tr></table></span>",

    "solution": "<p>&bull; All of the following are the functions are the Function of Run</p><p>&bull; Other functions of Run</p><p>&#9675; can quickly open tools like Task Manager (taskmgr), where you can see which apps are running, or Command Prompt (cmd), which is like a text-based control center for your computer.</p><p>&#9675; Open apps like Calculator (calc), Notepad (notepad), or Paint (mspaint) without searching for them</p><p>&#9675; Open specific settings directly, like Network Connections (ncpa.cpl) to manage Wi-Fi or Power Options (powercfg.cpl) to adjust your laptop's battery settings.</p><p>&#9675; Go to specific folders like Temporary Files (%temp%) or App Data (%appdata%), where your apps save their settings.</p><p>&#9675; Use shutdown /r to restart your computer or logoff to log out of your account quickly.</p><p>&#9675; Type something like chrome www.google.com to open a website directly in your browser.</p><p>Further Insight:</p><p><img width=408 height=210 id=image11.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26744/image006.png\"></p>",

    "question": "<span class=\"eqt\"><p>In general, how many parts does a packet - the fundamental unit of information transmitted over the internet- contain?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307;, &#2319;&#2325; &#2346;&#2376;&#2325;&#2375;&#2335; - &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2346;&#2352; &#2346;&#2381;&#2352;&#2375;&#2359;&#2367;&#2340; &#2360;&#2370;&#2330;&#2344;&#2366; &#2325;&#2368; &#2350;&#2370;&#2354;&#2349;&#2370;&#2340; &#2311;&#2325;&#2366;&#2312; - &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2349;&#2366;&#2327; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">One</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;</span>",
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>",
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Four</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A packet is the fundamental unit of information transmitted over the internet. It's like a small envelope containing data that travels across the network.</p><p></p><p>Packets consist of two portions: the header and the payload.</p><p>- The header contains information about the packet, such as its origin and destination IP addresses (an IP address is like a computer's mailing address).</p><p>- The payload is the actual data. Referring back to the photo example, the thousands of packets that make up the image each have a payload, and the payload carries a little piece of the image.</p><p></p><p></p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>The maximum number of hosts that can be addressed in a /24 network? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2379;&#2360;&#2381;&#2335; &#2325;&#2368; &#2357;&#2361; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; '/24 &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325;' &#2350;&#2375;&#2306; &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">254</span><span class=\"hqt\" style=\"display:none\">254</span>",
      "<span class=\"eqt\">512</span><span class=\"hqt\" style=\"display:none\">512</span>",
      "<span class=\"eqt\">1024</span><span class=\"hqt\" style=\"display:none\">1024</span>",
      "<span class=\"eqt\">2048</span><span class=\"hqt\" style=\"display:none\">2048</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In networking, the term \"/24 network\" refers to a network with a subnet mask of 255.255.255.0, which indicates that the first three octets of the IP address represent the network portion and the last octet represents the host portion. To calculate the maximum number of hosts that can be addressed in a /24 network, we need to determine the number of bits that are available for the host portion of the IP address. In a /24 network, there are 8 bits available for the host portion (32 bits - 24 bits = 8 bits). </p><p>The number of available host addresses can be calculated using the formula: 2^n - 2 where n is the number of bits available for the host portion of the IP address. The \"- 2\" accounts for the network and broadcast addresses, which cannot be assigned to hosts. </p><p><b>Substituting n = 8 in the formula, we get: 2^8 - 2 = 256 - 2 = 254 </b></p>",
    "question_index": 139
  },

    "correct_option_id": 2,
    "solution": "<p>The hierarchy of storage capacity is as follows:</p><p><b>Bit &lt; Nibble &lt; Byte &lt; KB &lt; MB &lt; GB &lt; TB &lt; PB &lt; EB &lt; ZB &lt; YB</b></p><p>Bit  -  Binary Digit has the logical representation of 0 and 1.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Nibble</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4 Bits</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Byte</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8 Bits</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">KB (Kilobyte)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1024 Bits</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">MB (Megabyte)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1024 KB</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">GB (Gigabyte)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1024 MB</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">TB (Terabyte)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1024 GB</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">PB (Petabyte)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1024 TB</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">EB (Exabyte)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1024 PB</td></tr></table>",

    "solution": "<p>&#183; Most internet systems use SMTP as a method to transfer mail from one user to another. </p><p>&#183; <u>Statement I is correct</u>: SMTP is a push protocol and is used to send the mail whereas POP (post office protocol) or IMAP (internet message access protocol) are used to retrieve those emails at the receiver's side. </p><p>&#183; The SMTP model is of two types: End-to-end method and Store-and- forward method.</p><p>&#183; <u>Statement II is correct</u>: The end-to-end model is used to communicate between different organizations whereas the store and forward method is used within an organization. </p>",
    "question_index": 143
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a  technology used to connect storage devices like hard drives and solid-state drives (SSDs) to your computer's motherboard?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2340;&#2325;&#2344;&#2368;&#2325; &#2361;&#2366;&#2352;&#2381;&#2337; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357; &#2324;&#2352; &#2360;&#2377;&#2354;&#2367;&#2337;-&#2360;&#2381;&#2335;&#2375;&#2335; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357; (SSD) &#2332;&#2376;&#2360;&#2375; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2325;&#2379; &#2310;&#2346;&#2325;&#2375; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2375; &#2350;&#2342;&#2352;&#2348;&#2379;&#2352;&#2381;&#2337; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">SATA</span><span class=\"hqt\" style=\"display:none\">SATA</span>",
      "<span class=\"eqt\">UATA</span><span class=\"hqt\" style=\"display:none\">UATA</span>",
      "<span class=\"eqt\">RATA</span><span class=\"hqt\" style=\"display:none\">RATA</span>",
      "<span class=\"eqt\">BATA</span><span class=\"hqt\" style=\"display:none\">BATA</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Serial Advanced Technology Attachment (SATA)is a technology used to connect storage devices like hard drives and solid-state drives (SSDs) to your computer's motherboard.</p><p>SATA uses a serial communication method, which means it transfers data one bit at a time over a single data line.</p><p>This is different from parallel communication methods where multiple bits are sent simultaneously over separate lines. This serial approach allows for higher data transfer rates and more efficient use of cables and connectors.</p><p>SATA replaced older technologies like integrated drive electronics (IDE) and parallel ATA (PATA) by offering faster data transfer rates and a more streamlined connection process.</p><p></p><p></p><p></p>",
    "question_index": 144
  },
  {
    "question": "<span class=\"eqt\"><p>Which types of Cookies are used as tracking files and can recreate themselves after being deleted from a user's browsers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2335;&#2381;&#2352;&#2376;&#2325;&#2367;&#2306;&#2327; &#2347;&#2364;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2325;&#2375; &#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2364;&#2352; &#2360;&#2375; &#2337;&#2367;&#2354;&#2368;&#2335; &#2325;&#2367;&#2351;&#2375; &#2332;&#2366;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2357;&#2375; &#2326;&#2369;&#2342; &#2325;&#2379; &#2347;&#2367;&#2352; &#2360;&#2375; &#2325;&#2381;&#2352;&#2367;&#2319;&#2335; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [

    "correct_option_id": 2,
    "solution": "<p>&bull; Zombie is a type of Cookies that are used as tracking files and these cookies can recreate themselves after being deleted from user's browsers.</p><p>Further Insight:</p><p>&bull; Zombie Cookies</p><p>&#9675; Zombie cookies are a type of HTTP cookie that are created by a web server and placed on a user's device by their web browser.</p><p>&#9675; They are also known as persistent cookies or evercookies</p><p>&#9675; Zombie cookies are stored in multiple locations, including the browser's local storage, HTML5 storage, RGB color code values, and Silverlight storage</p><p>&#9675; Zombie cookies can be used to: </p><p>&#9632; Track user behavior online </p><p>&#9632; Understand user preferences </p><p>&#9632; Serve targeted ads </p><p>&#9632; Collect information about what websites a user visits </p><p>&#9632; Collect information about what a user looks at on different sites </p>",
