    "question": "<span class=\"eqt\"><p>Preeti sold 5 candles for &#8377;360 at 10% loss. For what price should she sell the all 5 candles to gain 12% profit?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2368;&#2340;&#2367; &#2344;&#2375; 10% &#2325;&#2368; &#2361;&#2366;&#2344;&#2367; &#2346;&#2352; 5 &#2350;&#2379;&#2350;&#2348;&#2340;&#2381;&#2340;&#2367;&#2351;&#2366;&#2305; &#8377;360 &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2368;&#2306;&#2404; 12% &#2325;&#2366; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2360;&#2375; &#2360;&#2349;&#2368; 5 &#2350;&#2379;&#2350;&#2348;&#2340;&#2381;&#2340;&#2367;&#2351;&#2366;&#2305; &#2325;&#2367;&#2360; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2348;&#2375;&#2330;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",

  {
    "question": "<span class=\"eqt\"><p>Find the value of (sin<sup>2</sup>&#952; + cos<sup>2</sup>&#952;) * (sin<sup>2</sup>45&deg;  -  cos<sup>2</sup>60&deg;) + 1</p></span><span class=\"hqt\" style=\"display:none\"><p>(sin<sup>2</sup>&#952; + cos<sup>2</sup>&#952;) * (sin<sup>2</sup>45&deg; - cos<sup>2</sup>60&deg;) + 1 &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

      "<span class=\"eqt\">5/3</span><span class=\"hqt\" style=\"display:none\">5/3</span>",
      "<span class=\"eqt\">2/3</span><span class=\"hqt\" style=\"display:none\">2/3</span>",
      "<span class=\"eqt\">3/5</span><span class=\"hqt\" style=\"display:none\">3/5</span>"

    "correct_option_id": 0,
    "solution": "<p>(sin<sup>2</sup>&#952; + cos<sup>2</sup>&#952;) = 1</p><p>Sin 45&deg; = 1/&radic;2</p><p>Cos 60&deg; = 1/2</p><p>(sin<sup>2</sup>&#952; + cos<sup>2</sup>&#952;) * (sin<sup>2</sup>45&deg;  -  cos<sup>2</sup>60&deg;) + 1 = 1 * [(&radic;2/2)<sup>2</sup>  -  (1/2)<sup>2</sup>] + 1</p><p>=&gt; 1 * [(1/&radic;2)<sup>2</sup>  -  1/4] + 1 = (1/2  -  1/4) + 1</p><p>=&gt; 1/4 + 1 = 5/4</p>",

  {
    "question": "<span class=\"eqt\"><p>Pipe P and pipe Q together can fill a tank in 30 hours. Pipe P, pipe Q, and Pipe R together can fill the tank in 20 hours. Pipe R and pipe Q together can fill the same tank in 36 hours. If the efficiency of pipe S is 125% more than the efficiency of pipe P, then find the time pipe S takes to fill the same tank.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2346;&#2366;&#2311;&#2346; P &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; Q &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 30 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; &#2346;&#2366;&#2311;&#2346; P, &#2346;&#2366;&#2311;&#2346; Q &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; R &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 20 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; &#2346;&#2366;&#2311;&#2346; R &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; Q &#2360;&#2350;&#2366;&#2344; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 36 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; S &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;-&#2325;&#2381;&#2359;&#2350;&#2340;&#2366;, &#2346;&#2366;&#2311;&#2346; P &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;-&#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2360;&#2375; 125% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2366;&#2311;&#2346; S &#2325;&#2379; &#2360;&#2350;&#2366;&#2344; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",

      "<span class=\"eqt\">30 hours</span><span class=\"hqt\" style=\"display:none\">30 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">40 hours</span><span class=\"hqt\" style=\"display:none\">40 &#2328;&#2306;&#2335;&#2375;</span>"

    "correct_option_id": 0,
    "solution": "<p>Capacity of the tank = L.C.M of 30, 20, and 36 = 180</p><p>Efficiency = Capacity of tank/Time taken</p><p>Efficiency of P and Q = 180/30 = 6</p><p>The efficiency of P, Q, and R = 180/20 = 9</p><p>Efficiency of R = 9  -  6 = 3</p><p>Efficiency of R and Q = 180/36 = 5</p><p>Efficiency of Q = 5  -  3 = 2</p><p>Efficiency of P = 6  -  2 = 4</p><p>Efficiency of S = 4 * 225/100 = 9</p><p>Hence, the required time = 180/9 = 20 hours</p>",

    "question_index": 4

    "question": "<span class=\"eqt\"><p>In a quadrilateral ABCD, angle A is half the angle B. Angle B is 12&deg; more than angle C and angle C is double of the angle D. What is the sum of angle A and D?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2348;&#2368;&#2360;&#2368;&#2337;&#2368; &#2344;&#2366;&#2350;&#2325; &#2319;&#2325; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2350;&#2375;&#2306; &#2325;&#2379;&#2339; &#2319;, &#2325;&#2379;&#2339; &#2348;&#2368; &#2325;&#2366; &#2310;&#2343;&#2366; &#2361;&#2376;&#2404; &#2325;&#2379;&#2339; &#2348;, &#2325;&#2379;&#2339; &#2360;&#2368; &#2360;&#2375; 12<sup>0</sup> &#2309;&#2343;&#2367;&#2325; &#2361;&#2376; &#2324;&#2352; &#2325;&#2379;&#2339; &#2360;&#2368;, &#2325;&#2379;&#2339; &#2337;&#2368; &#2325;&#2366; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2325;&#2379;&#2339; &#2319; &#2324;&#2352; &#2337;&#2368; &#2325;&#2366; &#2332;&#2379;&#2337;&#2364; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>Simple interest on Rs.5600 at 9% rate of interest in 4 years is Rs.__ more than the simple interest on Rs.4800 at 12% rate of interest in 3 years.</p></span><span class=\"hqt\" style=\"display:none\"><p>5600 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2352; 9% &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2346;&#2352; 4 &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332;, 4800 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2352; 12% &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2346;&#2352; 3 &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306;______ &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>The mean of 16 observations is 32 and the coefficient of variation (C.V.) is 15%. Find the variance of the data.</p></span><span class=\"hqt\" style=\"display:none\">16 &#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2339;&#2379;&#2306; &#2325;&#2366; &#2350;&#2366;&#2343;&#2381;&#2351; 32 &#2361;&#2376; &#2324;&#2352; &#2357;&#2367;&#2330;&#2352;&#2339; &#2327;&#2369;&#2339;&#2366;&#2306;&#2325; (&#2360;&#2368;.&#2357;&#2368;.) 15% &#2361;&#2376;&#2404; &#2310;&#2306;&#2325;&#2337;&#2364;&#2379;&#2306; &#2325;&#2366; &#2357;&#2367;&#2330;&#2352;&#2339; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",

      "<span class=\"eqt\">23.04</span><span class=\"hqt\" style=\"display:none\">23.04</span>",
      "<span class=\"eqt\">21.76</span><span class=\"hqt\" style=\"display:none\">21.76</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Coefficient of Variation formula: C.V. = (&#963; / mean)  X  100</p><p>Let &#963; = standard deviation, mean = 32</p><p>15 = (&#963; / 32)  X  100 =&gt; &#963; = 0.15  X  32 = 4.8</p><p>Variance formula: variance = &#963;<sup>2</sup></p><p>variance = 4.8<sup>2</sup> = 23.04</p><p>Express solution:</p><p>variance = (C.V.% / 100)<sup>2</sup>  X  (mean)<sup>2</sup> =&gt; (0.15)<sup>2</sup>  X  32<sup>2</sup> = 23.04</p>",

    "question": "<span class=\"eqt\"><p>'P &div; Q' means 'P is the husband of Q'</p><p>'P  X  Q' means 'P is the sister of Q'</p><p>'P + Q' means 'P is the brother of Q'</p><p>'P * Q' means 'P is the son of Q'</p><p>As per which of the following expressions 'A is the nephew of D'?</p></span><span class=\"hqt\" style=\"display:none\"><p>'P &div; Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;'</p><p>'P X Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;'</p><p>'P + Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;'</p><p>'P * Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;'</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; 'A, D &#2325;&#2366; &#2349;&#2340;&#2368;&#2332;&#2366; &#2361;&#2376;'?</p></span>",
    "options": [
      "<span class=\"eqt\">A * B &div; C  X  D</span><span class=\"hqt\" style=\"display:none\">A * B &div; C  X  D</span>",
      "<span class=\"eqt\">D &div; B  X  F + A</span><span class=\"hqt\" style=\"display:none\">D &div; B  X  F + A</span>",
      "<span class=\"eqt\">A  X  E + M &div; D</span><span class=\"hqt\" style=\"display:none\">A  X  E + M &div; D</span>",
      "<span class=\"eqt\">C + A &div; B * D</span><span class=\"hqt\" style=\"display:none\">C + A &div; B * D</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Option (a): A * B &div; C  X  D</p><p>A * B means 'A is the son of B'</p><p>B &div; C means 'B is the husband of C'</p><p>C  X  D means 'C is the sister of D'</p><p><img width=245 height=96 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p30155/image003.png\"></p><p>A is the nephew of D.</p><p>So, <b>option (a)</b> is correct.</p><p>Option (b): D &div; B  X  F + A</p><p>D &div; B means 'D is the husband of B'</p><p>B  X  F means 'B is the sister of F'</p><p>F + A means 'F is the brother of A'</p><p><img width=331 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p30155/image004.png\"></p><p>A is either brother-in-law or sister-in-law of D.</p><p>So, option (b) is incorrect.</p><p>Option (c): A  X  E + M &div; D</p><p>A  X  E means 'A is the sister of E'</p><p>E + M means 'E is the brother of M'</p><p>M &div; D means 'M is the husband of D'</p><p><img width=328 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p30155/image005.png\"></p><p>A is the sister-in-law of D.</p><p>So, option (c) is incorrect.</p><p>Option (d): C + A &div; B * D</p><p>C + A means 'C is the brother of A'</p><p>A &div; B means 'A is the husband of B'</p><p>B  X  D means 'B is the sister of D'</p><p><img width=339 height=33 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p30155/image006.png\"></p><p>A is the brother-in-law of D.</p><p>So, option (d) is incorrect.</p>",
    "question_index": 38
  },

    "solution": "<p>Six people have different heights when compared to each other. No two people are of the same height.</p><p><b>From statement I:</b></p><p>&#183; Only two people are taller than Ram. </p><p>_____ &gt; ____ &gt; Ram &gt; ____ &gt; ____ &gt; ____ </p><p>&#183; John is taller than Tinu but shorter than Ram. </p><p>&#183; So, there are three cases possible i.e., Case 1, Case 2 and Case 3.</p><p>Case 1:</p><p>_____ &gt; ____ &gt; Ram &gt; John &gt; Tinu &gt; ____ </p><p>Case 2:</p><p>_____ &gt; ____ &gt; Ram &gt; John &gt; ____ &gt; Tinu</p><p>Case 3:</p><p>_____ &gt; ____ &gt; Ram &gt; ____ &gt; John &gt; Tinu </p><p>&#183; Geeta is taller than John but shorter than Ram. </p><p>&#183; Jia is taller than Ram.</p><p>&#183; So, Case 1 and Case 2 will be invalid but Case 3 will have two further cases i.e., Case 3(a) and Case 3(b).</p><p>Case 1: (invalid)</p><p>_____ &gt; ____ &gt; Ram &gt; John &gt; Tinu &gt; ____ </p><p>Case 2: (Invalid)</p><p>_____ &gt; ____&gt; Ram &gt; John &gt; ____ &gt; Tinu</p><p>Case 3(a):</p><p>Jia &gt; ____ &gt; Ram &gt;Geeta &gt; John &gt; Tinu </p><p>Case 3(b):</p><p>_____ &gt; Jia &gt; Ram &gt;Geeta &gt; John &gt; Tinu </p><p>So, we can not determine who is the tallest.</p><p><b>From Statement II:</b></p><p>&#183; At least four people are shorter than Jia. </p><p>&#183; So, there are two cases possible i.e., Case 1 and Case 2. </p><p>Case 1:</p><p>_____ &gt; Jia &gt; ____ &gt; ____ &gt; ____ &gt; ____</p><p>Case 2:</p><p>Jia &gt; ____ &gt; ____ &gt; ____ &gt; ____ &gt; ____</p><p>&#183; Geeta is taller than John and Tinu. </p><p>Geeta &gt; John/Tinu &gt; Tinu/John</p><p>&#183; Ram is taller than Geeta but shorter than Jia.</p><p>Case 1:</p><p>_____ &gt; Jia &gt; Ram &gt; Geeta &gt; John/Tinu &gt; Tinu/John</p><p>Case 2 (a):</p><p>Jia &gt; ____ &gt; Ram &gt; Geeta &gt; John/Tinu &gt; Tinu/John</p><p>There are more cases possible.</p><p>So, we can not determine who is the tallest.</p><p><b>From statements I and II:</b></p><p>(I     "question": "<span class=\"eqt\"><p>Which two numbers(not digits) and two signs should be interchanged to make the given equation correct?</p><p>928 &div; 4 - 24 x 8 + 86 = 126</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; (&#2309;&#2306;&#2325; &#2344;&#2361;&#2368;&#2306;) &#2324;&#2352; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>928 &div; 4 - 24 x 8 + 86 = 126</p></span>",
    "options": [
      "<span class=\"eqt\">+ and - , 8 and 4</span><span class=\"hqt\" style=\"display:none\">+ &#2324;&#2352; - , 8 &#2324;&#2352; 4</span>",

      "<span class=\"eqt\">+ and - , 24 and 4</span><span class=\"hqt\" style=\"display:none\">+ &#2324;&#2352; - , 24 &#2324;&#2352; 4</span>",

    "solution": "<p>Option (a): </p><p>928 &div; 4 - 24 x 8 + 86 = 126</p><p>After interchanging:</p><p>928 &div; 8 + 24 x 4  -  86 =126</p><p>116 + 96  -  86 = 126</p><p>116 + 10 = 126</p><p>126 = 126</p><p>Option (b):</p><p>928 &div; 4 - 24 x 8 + 86 = 126</p><p>After interchanging:</p><p>928 &div; 8 - 24 + 4 x 86 = 126</p><p>116  -  24 + 344 = 126</p><p>436 is not equal to 126</p><p>Option (c):</p><p>928 &div; 4 - 24 x 8 + 86 = 126</p><p>After interchanging:</p><p>928 &div; 24 + 4 x 8 - 86 = 126</p><p>38.67 + 32  -  86 = 126</p><p>-15.33 is not equal to 126</p><p>Option (d):</p><p>928 &div; 4 - 24 x 8 + 86 = 126</p><p>After interchanging:</p><p>928 &div; 24 - 4 + 8 x 86 = 126</p><p>38.67  -  4 + 688 = 126</p><p>722.67 is not equal to 126</p><p>So, option (a) is the correct answer. </p>",

8;&#2366;&#2325; &#2346;&#2361;&#2344;&#2344;&#2375; &#2360;&#2375; &#2360;&#2381;&#2325;&#2370;&#2354; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2309;&#2346;&#2344;&#2375;&#2346;&#2344; &#2324;&#2352; &#2327;&#2352;&#2381;&#2357; &#2325;&#2368; &#2349;&#2366;&#2357;&#2344;&#2366; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only argument I is strong</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2340;&#2352;&#2381;&#2325; I &#2350;&#2332;&#2348;&#2370;&#2340; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only argument II is strong</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2340;&#2352;&#2381;&#2325; II &#2350;&#2332;&#2348;&#2370;&#2340; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both arguments I and II are strong</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2340;&#2352;&#2381;&#2325; &#2350;&#2332;&#2348;&#2370;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Neither argument I nor argument II is strong</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2340;&#2352;&#2381;&#2325; I &#2324;&#2352; &#2344; &#2361;&#2368; &#2340;&#2352;&#2381;&#2325; II &#2350;&#2332;&#2348;&#2370;&#2340; &#2361;&#2376;</span>"

8;&#2344;&#2366; &#2325;&#2375; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2330;&#2380;&#2341;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2368; &#2361;&#2376;&#2404; &#2357;&#2368;&#2344;&#2366; &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2325;&#2375;&#2357;&#2354; &#2342;&#2379; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; &#2361;&#2367;&#2344;&#2366;, &#2350;&#2368;&#2344;&#2366; &#2325;&#2375; &#2344;&#2367;&#2325;&#2335;&#2360;&#2381;&#2341; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2348;&#2376;&#2336;&#2368; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I) &#2344;&#2368;&#2344;&#2366; &#2324;&#2352; &#2350;&#2368;&#2344;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>II) &#2335;&#2368;&#2344;&#2366;, &#2352;&#2368;&#2344;&#2366; &#2324;&#2352; &#2361;&#2367;&#2344;&#2366; &#2325;&#2375; &#2310;&#2360;&#2344;&#2381;&#2344; &#2348;&#2376;&#2336;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I is true</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",

    "correct_option_id": 0,
    "solution": "<p>Mina sits third to the right of Vina.</p><p>Only two persons sit to the left of Vina.</p><p><img width=551 height=66 id=\"Picture 28\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20975/image032.jpg\"></p><p>Two persons sit between Hina and Rina.</p><p>Hina sits immediate right of Mina.</p><p><img width=571 height=59 id=\"Picture 29\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20975/image033.jpg\"></p><p>Lina sits fourth to the left of Tina.</p><p><img width=575 height=59 id=\"Picture 30\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20975/image034.jpg\"></p><p>Now, only Nina is remaining.</p><p><img width=580 height=62 id=\"Picture 31\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20975/image035.jpg\"></p><p>Three persons are sitting between Nina and Mina. Thus, only statement I is true.</p>",

    "question": "<p>Choose the sentence that uses a homonym of the underlined word:</p><p>He broke a <u>nail</u> while fixing the chair.</p>",
    "options": [
      "She painted a nail of hers with red polish.",
      "The carpenter hammered the nail into the wood.",
      "He pulled the rusty nail out of the wall.",
      "They bought a box of nails from the hardware store."
    ],
    "correct_option_id": 0,
    "solution": "<p>Homonyms are words that are spelled the same and sound the same but have different meanings.</p><p>In the original sentence, \"nail\" is a noun meaning a small, thin piece of metal used for fastening things.</p><p>Options b), c), and d) also use \"nail\" as a metal fastener, so the meaning is similar.</p><p>Option a) uses \"nail\" as a noun meaning the hard covering on the tip of a finger or toe, which is completely unrelated to the original meaning. This makes it a homonym.</p><p>Hence, option (a) is the correct answer.</p>",
    "question_index": 60

    "question": "<p>The word \"buzz\" in \"The bee's buzz filled the air\" is an example of _.</p>",
    "options": [
      "onomatopoeia",
      "assonance",
      "personification",
      "pun"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct answer is (a) Onomatopoeia. </p><p>Onomatopoeia uses words that phonetically imitate the sounds they describe, like \"buzz\" echoing a bee's hum for auditory vividness.</p><p>Assonance is incorrect because it repeats vowel sounds within words (e.g., \"fleet feet\"), not mimicking external noises.</p><p>Personification is incorrect as it humanizes objects (e.g., \"The bee buzzed a tune\"), but here the focus is on the sound word itself.</p><p>Pun is incorrect since it plays on word meanings or sounds for humour (e.g., \"bee buzzed because it was busy\"), not direct imitation.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 61
  },

    "question": "<p>Spot the error in the given sentence and select the sentence that is error free from the given options. </p><p>Unfortunate incidents always happens at the unexpected time. </p>",
    "options": [
      "Unfortunate incidents always happen at the unexpected time.",
      "Unfortunate incidents always happening at the unexpected time",
      "Unfortunate incidents sometimes happens at the unexpected time",
      "Unfortunate incidents sometimes happening at the unexpected time"
    ],
    "correct_option_id": 0,
    "solution": "<p>In the given sentence, the singular verb 'happens' incorrectly follows the plural noun 'incidents', which leads to an error in subject-verb agreement. In options (b) and (d), the verb in the continuous form (V4), 'happening' requires an auxiliary verb in the sentence and since the sentences do not have it, they are incorrect and negated. In option (c), the singular verb 'happens' is suggested again and so, it is also negated.</p><p>Option (a), 'Unfortunate incidents always happen at the unexpected time', is the correct sentence that has the plural verb 'happen' and matches the context of the given sentence.</p><p>Hence, the correct answer is option (a).</p><p>Note:</p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p><p><b>Auxiliary verb:</b> A verb that gives grammatical information that is not given by the main verb of a sentence. It supports the main verb. Auxiliary verbs help to form the various tenses, moods, and voices of other verbs. The principal ones are be, do, and have. Example: She will sing a song tomorrow. Here, 'will' is the auxiliary verb that supports the main verb 'sing'.</p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 65
  },
  {
    "question": "<p>The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If you don't find any error, mark 'No error' as your answer. </p><p>Despite numerous meetings, the board/ members hasn't reached a consensus/ on the proposed budgetary adjustments.</p>",
    "options": [
      "Despite numerous meetings, the board",
      "on the proposed budgetary adjustments",
      "members hasn't reached a consensus",
      "No error"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error in this sentence is a subject-verb agreement mistake. The subject is \"the board members,\" which is plural, but the verb \"hasn't\" (a contraction of \"has not\") is singular. The verb \"haven't\" (a contraction of \"have not\") agrees with the plural subject \"the board members.\" Hence, (c) is the correct answer.</p><p>The final corrected sentence: Despite numerous meetings, the board members haven't reached a consensus on the proposed budgetary adjustments.</p><p><b>Note: Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",

    "comp": "<p><b>Directions :</b> Read the following passage and answer the questions based on the passage:</p><p>In the digital age, credibility is increasingly shaped by visibility rather than by formal qualifications. The rapid expansion of social media platforms has enabled influencers to emerge as powerful voices capable of shaping public opinion across domains such as health, finance, education, and lifestyle. As a result, influencer credibility often rivals, and sometimes surpasses, traditional expertise, marking a significant shift in how authority is perceived and trusted in contemporary society.</p><p>Unlike experts, whose authority is built through years of training, research, and institutional validation, influencers derive credibility from relatability, consistency, and audience engagement. Their perceived authenticity, informal tone, and personal storytelling create a sense of intimacy that makes followers feel emotionally connected. This parasocial relationship fosters trust, even when influencers lack formal knowledge in the fields they discuss. In contrast, experts are often seen as distant, technical, or inaccessible, which can weaken their appeal in fast-paced digital environments.</p><p>Algorithms further amplify this shift by rewarding content that attracts attention rather than accuracy. Posts that are simplified, emotionally charged, or visually appealing are more likely to circulate widely, regardless of their factual reliability. As a result, influencers who communicate confidently and frequently often gain greater visibility than specialists who rely on cautious, evidence-based explanations. Over time, repeated exposure transforms familiarity into perceived authority, blurring the boundary between opinion and expertise.</p><p>The consequences of this trend are particularly visible in areas such as health advice, financial guidance, and political commentary, where misinformation can have serious implications. When popularity replaces quali able intervals, allowing focus without mental fatigue. These practices rest on the belief that action can generate motivation, not the other way around. Environmental and social support also play a crucial role. Simplified surroundings, predictable routines, and gentle social interaction help reduce anxiety and restore structure. Counselling centres and community programmes further assist individuals in reconnecting with society at their own pace.</p>",

    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>My teacher gave me a very difficult problem to solve.</p>",

    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a helping verb(was) is necessary while changing the voice of the sentence from Active to Passive.</p><p>The preposition \"by\" is used before the object made in Passive Voice. However, it is optional in some cases.</p><p>The Active voice in this question is in past indefinite. Thus, the Passive voice will also be in past indefinite tense.</p><p>The format of Active voice is: <b>Subject + second form of verb+ object.</b></p><p>Thus, in Passive voice, the format will be: <b>Object of the active voice (Subjective case) + was/were + V3 + by + Subject of the active voice (Objective case).</b></p><p>For example:</p><p>He surprised me. (Active Voice)</p><p>I was surprised by him. (Passive Voice)</p><p>The options except (d) don't follow the correct grammatical format of the Passive Voice. Option a) is incorrect because the plural verb 'were' does not agree with the singular subject 'I'.</p><p>Hence, option (d) is correct.</p><p>NOTE/-</p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",

    "solution": "<p>'More better' is double comparative which is grammatically incorrect. So, option (a) is eliminated. We cannot use the superlative degree 'most' with the comparative degree 'better'. So, option (b) is eliminated. 'Far' and 'much' can be used with the comparative degree adjective 'better' (far better, much better). But these cannot be used with the superlative adjective 'best'. Therefore, among the given options, 'much better' is the correct choice. </p><p>Hence, option (c) is the correct answer. </p><p>The correct sentence is: Anil coming into play channelled it much better in terms of his experience.</p><p><b>Note:</b></p><p><b>Adjectives:</b> Words which are used with a noun/pronoun to describe or point out, the person, animal, place, or thing which the noun names, or to tell the number or quantity, are called Adjectives.</p><p>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",

    "comp": "<p><b>Directions :</b>   Read the given passage and answer the questions that follow.</p><p>A geomagnetic storm is a disturbance in Earth's magnetic field caused by solar activity. There's a reaction called nuclear fusion that occurs continuously deep within the Sun's core. This generates massive amounts of energy. Some of the energy is released as light, some as radiation, and some as charged particles. The Sun also continuously emits a stream of charged particles known as the solar wind. Occasionally, the Sun releases larger bursts of energy, called coronal mass ejections. It sends clouds of these charged particles, or plasma, hurtling through space. These emissions don't always hit us. But when they do, they collide with Earth's magnetic field, disrupt it, and lead to a geomagnetic storm. Earth's magnetic field is an invisible force that surrounds our planet, acting like a giant magnet with a north and south pole. It helps protect us from harmful solar radiation by deflecting charged particles from the Sun. Geomagnetic storms occur fairly often. Minor ones happen multiple times per year. The severity of a storm depends on how strong the solar event was that caused it. Larger, more intense storms are less common but can happen every few years. Solar events are closely tied to the Sun's 11-year solar cycle, which has periods of high and low activity. During the peak of the cycle, called solar maximum, more sunspots and solar flares occur, increasing the likelihood of solar storms. Geomagnetic storms are not typically harmful to humans directly, but they can pose risks to modern technology and infrastructure. One of the most notable dangers is for power grids. Powerful storms can induce electric currents in power lines, potentially overloading transformers and causing blackouts. Satellites in space are also vulnerable. A strong storm can damage electronics onboard, disrupt communication signals, and shorten the lifespan of the satellites themselves. In     "question": "<span class=\"eqt\"><p>Which of the following processes occurs during the S-phase of the cell cycle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2330;&#2325;&#2381;&#2352; &#2325;&#2375; S &#2330;&#2352;&#2339; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2328;&#2335;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Protein synthesis</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339;</span>",
      "<span class=\"eqt\">DNA replication</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2368;&#2319;&#2344;&#2319; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2371;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Chromosome segregation</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2339;&#2360;&#2370;&#2340;&#2381;&#2352; &#2346;&#2371;&#2341;&#2325;&#2381;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Cytokinesis</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2311;&#2335;&#2379;&#2325;&#2366;&#2311;&#2344;&#2375;&#2360;&#2367;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>DNA replication occurs during the S-phase. </p><p><b>Explanation:</b></p><p>The S-phase (Synthesis Phase) is the part of the cell cycle during which DNA is replicated, occurring between G1 phase and G2 phase. By the end of this phase, the amount of DNA in the cell is doubled, though the chromosome number remains the same.</p><p><b>Further Insights:</b></p><p>Protein synthesis occurs primarily during the G1 and G2 phases. Cytokinesis is the final division of the cytoplasm after mitosis.</p>",
    "question_index": 106
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following compounds shows covalent bonding?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2351;&#2380;&#2327;&#2367;&#2325; &#2360;&#2361;&#2360;&#2306;&#2351;&#2379;&#2332;&#2325; &#2348;&#2306;&#2343;&#2344; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Sodium chloride</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2325;&#2381;&#2354;&#2379;&#2352;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Magnesium oxide</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2327;&#2381;&#2344;&#2368;&#2358;&#2367;&#2351;&#2350; &#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Ammonia</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2379;&#2344;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Calcium fluoride</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2354;&#2381;&#2358;&#2367;&#2351;&#2350; &#2347;&#2381;&#2354;&#2379;&#2352;&#2366;&#2311;&#2337;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Ammonia (NH<sub>3</sub>)is formed by the sharing of electrons between Nitrogen and Hydrogen atoms, which is the definition of a covalent bond.</p><p>Sodium chloride (NaCl), Magnesium oxide (MgO), and Calcium fluoride (CaF<sub>2</sub>) are all formed by the transfer of electrons from a metal to a non-metal, resulting in ionic bonds.</p><p><b>Further Insights:</b></p><p>Ammonia has a trigonal pyramidal shape due to the presence of three bond pairs and one lone pair of electrons on the nitrogen atom.</p>",
    "question_index": 107
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Laterite soil:</p><p>1) It is rich in iron and aluminium oxides.</p><p>2) It develops under conditions of high rainfall and temperature.</p><p>3) It is highly fertile without manuring.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2375;&#2335;&#2352;&#2366;&#2311;&#2335; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2351;&#2361; &#2354;&#2380;&#2361; &#2324;&#2352; &#2319;&#2354;&#2381;&#2351;&#2369;&#2350;&#2368;&#2344;&#2367;&#2351;&#2350; &#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2360;&#2375; &#2349;&#2352;&#2346;&#2370;&#2352; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2351;&#2361; &#2313;&#2330;&#2381;&#2330; &#2357;&#2352;&#2381;&#2359;&#2366; &#2324;&#2352; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2325;&#2368; &#2346;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3) &#2351;&#2361; &#2348;&#2367;&#2344;&#2366; &#2326;&#2366;&#2342; &#2337;&#2366;&#2354;&#2375; &#2349;&#2368; &#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2313;&#2346;&#2332;&#2366;&#2314; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"

    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct. </p><p>Statement 3 is incorrect because Laterite soils are generally poor in nutrients due to intense leaching. </p><p><b>Explanation of Statements:</b></p><p>1) is Correct. Due to the process of leaching, silica is removed, leaving the soil rich in iron and aluminium oxides (giving it a red color).</p><p>2) is Correct. These soils develop in tropical and subtropical areas with high temperatures and high seasonal rainfall.</p><p>3) is Incorrect. They are generally low in fertility, organic matter, and nitrogen. However, they can be made productive for crops like cashew nuts with the heavy application of manures and fertilizers.</p><p><b>Further Insights:</b></p><p>The word 'Laterite' comes from the Latin word 'Later,' meaning brick, as these soils harden like bricks when dried.</p>",
    "question_index": 108
  },

    "question": "<span class=\"eqt\"><p>Match the Articles with their respective provisions:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I (Article)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II (Provision)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Article 32</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Freedom of religion</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Article 226</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Right to constitutional remedies</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Article 25</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Writ jurisdiction of High Courts</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Article 368</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Amendment of Constitution</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2305;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; I (&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342;)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; II (&#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;. &#2343;&#2352;&#2381;&#2350; &#2325;&#2368; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 226</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2326;. &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2313;&#2346;&#2330;&#2366;&#2352;&#2379;&#2306; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 25</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2327;. &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2325;&#2366; &#2352;&#2367;&#2335; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 368</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2328;. &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">1-b, 2-c, 3-a, 4-d</span><span class=\"hqt\" style=\"display:none\">1-b, 2-c, 3-a, 4-d</span>",
      "<span class=\"eqt\">1-a, 2-b, 3-c, 4-d</span><span class=\"hqt\" style=\"display:none\">1-a, 2-b, 3-c, 4-d</span>",
      "<span class=\"eqt\">1-d, 2-c, 3-a, 4-b</span><span class=\"hqt\" style=\"display:none\">1-d, 2-c, 3-a, 4-b</span>",
      "<span class=\"eqt\">1-b, 2-a, 3-d, 4-c</span><span class=\"hqt\" style=\"display:none\">1-b, 2-a, 3-d, 4-c</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>1-b (Article 32): Known as the \"Heart and Soul\" of the Constitution, it provides the right to move the Supreme Court for the enforcement of Fundamental Rights.</p><p>2-c (Article 226): This empowers High Courts to issue writs for the enforcement of Fundamental Rights and for \"any other purpose.\"</p><p>3-a (Article 25): Guarantees the freedom of conscience and the right to freely profess, practice, and propagate religion.</p><p>4-d (Article 368): Sets out the procedure for the Amendment of the Constitution by Parliament.</p><p><b>Further Insights:</b></p><p>Article 226 has a wider scope than Article 32 because it allows High Courts to issue writs for legal rights other than just Fundamental Rights.</p>",
    "question_index": 109
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following best describes a \"pioneer species\"?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; \"&#2346;&#2366;&#2351;&#2344;&#2367;&#2351;&#2352; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;\" &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2360;&#2335;&#2368;&#2325; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Species that dominate climax communities</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2352;&#2350;&#2379;&#2340;&#2381;&#2325;&#2352;&#2381;&#2359; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351;&#2379;&#2306; &#2346;&#2352; &#2361;&#2366;&#2357;&#2368; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2366;&#2305;</span>",
      "<span class=\"eqt\">Species that invade disturbed areas and initiate ecological succession</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2366;&#2305; &#2332;&#2379; &#2309;&#2358;&#2366;&#2306;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306; &#2324;&#2352; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2309;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Species that exist only in tropical forests</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2366;&#2305; &#2332;&#2379; &#2325;&#2375;&#2357;&#2354; &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2332;&#2306;&#2327;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Species that require stable environmental conditions</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2366;&#2305; &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2352; &#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339;&#2368;&#2351; &#2346;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Pioneer species are those that initiate ecological succession. Therefore, the correct option is (b) Species that invade disturbed areas and initiate ecological succession.</p><p><b>Explanation:</b></p><p>A pioneer species is the first to colonize bare rock or a disturbed ecosystem (like after a volcanic eruption or a forest fire). In primary succession on rocks, lichens are typical pioneers because they can break down rock into soil, paving the way for more complex plants.</p><p><b>Further Insights:</b></p><p>These species are usually hardy, fast-growing, and have high dispersal rates.</p>",
    "question_index": 110
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the book Unhappy India:</p><p>Statement I: Unhappy India was written by Lala Lajpat Rai.</p><p>Statement II: The book was written as a response to the Simon Commission.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2369;&#2360;&#2381;&#2340;&#2325; '&#2309;&#2344;&#2361;&#2376;&#2346;&#2381;&#2346;&#2368; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366;' &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: '&#2309;&#2344;&#2361;&#2376;&#2346;&#2381;&#2346;&#2368; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366;' &#2354;&#2366;&#2354;&#2366; &#2354;&#2366;&#2332;&#2346;&#2340; &#2352;&#2366;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2326;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2351;&#2361; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2360;&#2366;&#2311;&#2350;&#2344; &#2310;&#2351;&#2379;&#2327; &#2325;&#2375; &#2332;&#2357;&#2366;&#2348; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>I. is Correct. Unhappy India was written by the prominent nationalist leader Lala Lajpat Rai and published in 1928.</p><p>II. is Correct. The book was written as a stinging rebuttal to Katherine Mayo's Mother India and served as a nationalist critique of British policies and the Simon Commission, which was visiting India at the time.</p><p><b>Further Insights:</b></p><p>Lala Lajpat Rai is also known as 'Punjab Kesari' (Lion of Punjab).</p>",
    "question_index": 111
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the powers of the Rajya Sabha:</p><p>1) The Rajya Sabha can authorize Parliament to legislate on a State List subject.</p><p>2) It can create All India Services by a resolution.</p><p>3) It can introduce Money Bills.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2360;&#2306;&#2360;&#2342; &#2325;&#2379; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2370;&#2330;&#2368; &#2325;&#2375; &#2357;&#2367;&#2359;&#2351; &#2346;&#2352; &#2325;&#2366;&#2344;&#2370;&#2344; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2343;&#2367;&#2325;&#2371;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2351;&#2361; &#2319;&#2325; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2326;&#2367;&#2354; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2360;&#2371;&#2332;&#2344; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3) &#2351;&#2361; &#2343;&#2344; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct. </p><p>Statement 3 is incorrect because Money Bills can only be introduced in the Lok Sabha. </p><p><b>Explanation of Statements:</b></p><p>1) is Correct. Under Article 249, the Rajya Sabha can pass a resolution (supported by two-thirds of members present and voting) declaring it necessary in the national interest for Parliament to make laws regarding the State List.</p><p>2) is Correct. Under Article 312, the Rajya Sabha alone can initiate the process of creating a new All India Service by passing a resolution with a special majority.</p><p>3) is Incorrect. According to Article 110 and Article 109, a Money Bill can only be introduced in the Lok Sabha on the recommendation of the President. The Rajya Sabha has limited powers regarding Money Bills (it can only suggest recommendations within 14 days).</p><p><b>Further Insights:</b></p><p>These special powers reflect the Rajya Sabha's role as the representative of the States in the Indian federal structure.</p>",
    "question_index": 112
  },

    "question": "<span class=\"eqt\"><p>The phenomenon of temperature inversion is commonly associated with:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2339; &#2325;&#2368; &#2328;&#2335;&#2344;&#2366; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Increased rainfall</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2338;&#2364;&#2368; &#2361;&#2369;&#2312; &#2357;&#2352;&#2381;&#2359;&#2366;</span>",
      "<span class=\"eqt\">Air pollution episodes</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2369; &#2346;&#2381;&#2352;&#2342;&#2370;&#2359;&#2339; &#2325;&#2368; &#2328;&#2335;&#2344;&#2366;&#2319;&#2306;</span>",
      "<span class=\"eqt\">Cyclone formation</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2325;&#2381;&#2352;&#2357;&#2366;&#2340; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339;</span>",
      "<span class=\"eqt\">Ocean currents</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2327;&#2352; &#2325;&#2368; &#2354;&#2361;&#2352;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Temperature inversion is commonly associated with air pollution episodes. </p><p><b>Explanation:</b></p><p>Normally, temperature decreases with altitude. In an inversion, a layer of warm air sits on top of a layer of cooler air near the surface. This warm \"lid\" traps pollutants, smoke, and dust near the ground, preventing them from dispersing upward. This often leads to severe smog and respiratory issues in urban areas.</p><p><b>Further Insights:</b></p><p>Surface inversions are very common on clear, calm winter nights when the ground cools rapidly by radiation.</p>",
    "question_index": 113
  },

      "<span class=\"eqt\">17.0 to 18.3 years</span><span class=\"hqt\" style=\"display:none\">17.0 &#2360;&#2375; 18.3 &#2357;&#2352;&#2381;&#2359;</span>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Gross Value Added (GVA):</p><p>Statement I: GVA measures the contribution of each producer to the economy.</p><p>Statement II: Indirect taxes and subsidies are included while calculating GVA at market prices.</p><p>Which of the above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2325;&#2354; &#2350;&#2370;&#2354;&#2381;&#2351; &#2357;&#2352;&#2381;&#2343;&#2367;&#2340; (GVA) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; I: GVA &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325; &#2325;&#2375; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; GVA &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2340;&#2375; &#2360;&#2350;&#2351; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2324;&#2352; &#2360;&#2348;&#2381;&#2360;&#2367;&#2337;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct. </p><p>Statement II is incorrect because standard GVA (at basic prices) excludes product taxes and includes product subsidies. </p><p><b>Explanation of Statements:</b></p><p>I. is Correct. GVA is defined as the value of output minus the value of intermediate consumption. It measures the individual contribution of a sector, industry, or producer to the economy.</p><p>II. is Incorrect. In India's current national accounting framework, GVA at basic prices includes \"production taxes\" and excludes \"production subsidies,\" but it excludes \"product taxes\" (like GST) and includes \"product subsidies.\" Including indirect taxes (product taxes) results in the Market Price (GDP), not the standard GVA.</p><p><b>Further Insights:</b></p><p>The relationship is defined as: </p><p>GDP=GVA+Product Taxes&#8722;Product Subsidies.</p>",
    "question_index": 115
  },

    "question": "<span class=\"eqt\"><p>According to Time Out's City Life Index 2025, which city has been ranked as Asia's happiest city?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2335;&#2366;&#2311;&#2350; &#2310;&#2313;&#2335; &#2325;&#2375; &#2360;&#2367;&#2335;&#2368; &#2354;&#2366;&#2311;&#2347; &#2311;&#2306;&#2337;&#2375;&#2325;&#2381;&#2360; 2025 &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2319;&#2358;&#2367;&#2351;&#2366; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2326;&#2369;&#2358;&#2361;&#2366;&#2354; &#2358;&#2361;&#2352; &#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Beijing</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;&#2332;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Mumbai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2306;&#2348;&#2312;</span>",
      "<span class=\"eqt\">Chiang Mai</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2367;&#2351;&#2366;&#2306;&#2327; &#2350;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Singapore</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2306;&#2327;&#2366;&#2346;&#2369;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Mumbai takes the crown as Asia's happiest city, beating Beijing, Shanghai, Chiang Mai, and Hanoi. Time Out's City Life Index 2025 asked residents to rate their hometowns on culture, nightlife, food, quality of life, and whether their city makes them happy and locals seem positive.</p><p>A whopping 94 per cent of Mumbaikars say the city makes them happy. Beyond the statistics, it's the city's infectious energy, buzzing social scene, and endless opportunities that keep residents smiling. Other statistics include:</p><p>&#183; 89 per cent feel happier in Mumbai than anywhere else.</p><p>&#183; 88 per cent say people in the city seem positive.</p><p>&#183; 87 per cent believe happiness in Mumbai has grown recently.</p><p>The report attributes Mumbai's top ranking to its vibrant entertainment scene, bustling social life, abundant career opportunities, and its reputation as one of Asia's best street food cities.</p><p>&#183; Beijing and Shanghai rank second and third, with 93 per cent and 92 per cent of residents reporting happiness. These megacities score high on safety, convenience, cost, and culture, and remain top choices for Gen Z seeking dynamic, future-forward cities.</p><p>&#183; Thailand's Chiang Mai and Vietnam's Hanoi round out the top five, each with 88 per cent saying their city makes them happy. Hanoi edged slightly ahead in residents' reports of everyday happiness. Both Hanoi and Chiang Mai are well-known for their green spaces, relaxed pace, and tight-knit communities, ideal for those seeking peace and connection.</p><p><b>Asia's Top 10 Happiest Cities, 2025:</b></p><p>&#183; Mumbai, India</p><p>&#183; Beijing, China</p><p>&#183; Shanghai, China</p><p>&#183; Chiang Mai, Thailand</p><p>&#183; Hanoi, Vietnam</p><p>&#183; Jakarta, Indonesia</p><p>&#183; Hong Kong</p><p>&#183; Bangkok, Thailand</p><p>&#183; Singapore</p><p>&#183; Seoul, South Korea</p><p><b>World's Top 10 Happiest Cities, 2025:</b></p><p>&#183; Abu Dhabi, UAE</p><p>&#183; Medell'n, Colombia</p><p>&#183; Cape Town, South Africa</p><p>&#183; Mexico City, Mexico</p><p>&#183; Mumbai, India</p><p>&#183; Beijing, China</p><p>&#183; Shanghai, China</p><p>&#183; Chicago, US</p><p>&#183; Seville, Spain</p><p>&#183; Melbourne, Australia</p>",
    "question_index": 116
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Fiscal Deficit:</p><p>1) It represents the total borrowing requirement of the government.</p><p>2) It includes interest payments on past debt.</p><p>3) A high fiscal deficit necessarily leads to inflation.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2375; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2351;&#2361; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2325;&#2369;&#2354; &#2313;&#2343;&#2366;&#2352;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2311;&#2360;&#2350;&#2375;&#2306; &#2346;&#2367;&#2331;&#2354;&#2375; &#2315;&#2339;&#2379;&#2306; &#2346;&#2352; &#2348;&#2381;&#2351;&#2366;&#2332; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</p><p>3) &#2313;&#2330;&#2381;&#2330; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2366; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2368; &#2323;&#2352; &#2354;&#2375; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct. </p><p>Statement 3 is incorrect because a high fiscal deficit does not \"necessarily\" lead to inflation; its impact depends on how the money is spent and the state of the economy. </p><p><b>Explanation of Statements:</b></p><p>1) is Correct. The Fiscal Deficit is the difference between the government's total expenditure and its total non-debt receipts, representing the total amount the government needs to borrow.</p><p>2) is Correct. It is a comprehensive measure that includes all expenditures, including interest payments on the accumulated debt from previous years.</p><p>3) is Incorrect. While a high deficit can cause inflation (if it leads to excess money supply or demand), it may not be inflationary if the expenditure is used for productive asset creation or during a recession when there is idle capacity in the economy.</p><p><b>Further Insights:</b></p><p>Primary Deficit is calculated by subtracting interest payments from the Fiscal Deficit.</p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Bhakti Movement:</p><p>Statement I: It emphasized personal devotion over ritualism.</p><p>Statement II: It rejected the authority of the Vedas completely.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2325;&#2381;&#2340;&#2367; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; I: &#2311;&#2360;&#2344;&#2375; &#2325;&#2352;&#2381;&#2350;&#2325;&#2366;&#2306;&#2337;&#2379;&#2306; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2349;&#2325;&#2381;&#2340;&#2367; &#2346;&#2352; &#2332;&#2379;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2311;&#2360;&#2344;&#2375; &#2357;&#2375;&#2342;&#2379;&#2306; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2379; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2309;&#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct. </p><p>Statement II is incorrect because most Bhakti saints did not reject the Vedas completely; they emphasized devotion as a simpler path. </p><p><b>Explanation of Statements:</b></p><p>Statement I: Emphasis on Devotion (Correct)</p><p>The core philosophy of the Bhakti movement was the idea of <b>unconditional love and personal devotion</b> (<i>Bhakti</i>) to a specific deity (such as Vishnu or Shiva) as the primary path to salvation (<i>Moksha</i>).</p><p>&#183; It prioritized the \"heart\" over \"head,\" suggesting that God could be reached through singing, dancing, and intense personal emotion rather than through complex priestly rituals or the performance of expensive sacrifices.</p><p>&#183; It promoted the use of <b>vernacular languages</b> (like Hindi, Marathi, Tamil, and Bengali) so that common people could understand and participate, breaking the monopoly of Sanskrit.</p><p>Statement II: Rejection of the Vedas (Incorrect)</p><p>The Bhakti movement was not a monolithic block; it was divided into two main traditions, and their stance on the Vedas differed:</p><p>1) <b>Saguna Bhakti:</b> Saints like <b>Tulsidas, Ramanuja, and Meerabai</b> believed in a God with attributes and forms. They generally <b>accepted the authority of the Vedas</b> and worked within the framework of traditional Hinduism, though they sought to reform it from within.</p><p>2) <b>Nirguna Bhakti:</b> Saints like <b>Kabir and Guru Nanak</b> believed in an abstract, formless God. While they were much more critical of Vedic rituals and caste hierarchies, it is historically inaccurate to say the <i>entire</i> Bhakti movement rejected the Vedas \"completely.\"</p>",
    "question_index": 118
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding PM-SVANidhi:</p><p>1)It targets urban street vendors.</p><p>2)It provides collateral-free working capital loans.</p><p>3)It is implemented by the Ministry of Labour.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2368;&#2319;&#2350;-&#2360;&#2381;&#2357;&#2344;&#2367;&#2343;&#2367; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2311;&#2360;&#2325;&#2366; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2358;&#2361;&#2352;&#2368; &#2360;&#2381;&#2335;&#2381;&#2352;&#2368;&#2335; &#2357;&#2375;&#2306;&#2337;&#2352; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2351;&#2361; &#2348;&#2367;&#2344;&#2366; &#2325;&#2367;&#2360;&#2368; &#2327;&#2366;&#2352;&#2306;&#2335;&#2368; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2358;&#2368;&#2354; &#2346;&#2370;&#2306;&#2332;&#2368; &#2315;&#2339; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2311;&#2360;&#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2351;&#2344; &#2358;&#2381;&#2352;&#2350; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct. </p><p>Statement 3 is incorrect because the scheme is implemented by the Ministry of Housing and Urban Affairs. </p><p><b>Explanation of Statements:</b></p><p>1) is Correct. The PM Street Vendor's AtmaNirbhar Nidhi (PM-SVANidhi) was launched to help urban street vendors recover from the economic impact of the COVID-19 pandemic.</p><p>2) is Correct. It provides a collateral-free working capital loan of up to &#8377;10,000 (with subsequent higher tranches) to vendors.</p><p>3) is Incorrect. The implementing agency is the Ministry of Housing and Urban Affairs (MoHUA), not the Ministry of Labour.</p><p><b>Further Insights:</b></p><p>The scheme also provides incentives for digital transactions through monthly cashback.</p>",
    "question_index": 119

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding vitamins:</p><p>Statement I: Vitamin D is fat-soluble.</p><p>Statement II: Vitamin D deficiency causes scurvy.</p><p>Which is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2337;&#2368; &#2357;&#2360;&#2366; &#2350;&#2375;&#2306; &#2328;&#2369;&#2354;&#2344;&#2358;&#2368;&#2354; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2337;&#2368; &#2325;&#2368; &#2325;&#2350;&#2368; &#2360;&#2375; &#2360;&#2381;&#2325;&#2352;&#2381;&#2357;&#2368; &#2352;&#2379;&#2327; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct. </p><p>Statement II is incorrect because Vitamin D deficiency causes Rickets, not Scurvy. </p><p><b>Explanation of Statements:</b></p><p>I. is Correct. Vitamins A, D, E, and K are fat-soluble, meaning they are stored in the body's fatty tissue and liver.</p><p>II. is Incorrect. Scurvy is caused by a deficiency of Vitamin C (ascorbic acid). Vitamin D deficiency in children leads to Rickets (softening of bones) and Osteomalacia in adults.</p><p><b>Further Insights:</b></p><p>Vitamin D is unique because the body can synthesize it when the skin is exposed to sunlight.</p>",
    "question_index": 120
  },
