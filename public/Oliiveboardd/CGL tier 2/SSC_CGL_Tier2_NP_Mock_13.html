    "question": "<span class=\"eqt\"><p>Which scheme aims to promote natural farming through cluster-based approach?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2354;&#2360;&#2381;&#2335;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2342;&#2371;&#2359;&#2381;&#2335;&#2367;&#2325;&#2379;&#2339; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2326;&#2375;&#2340;&#2368; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2367;&#2360; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Paramparagat Krishi Vikas Yojana</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2381;&#2346;&#2352;&#2366;&#2327;&#2340; &#2325;&#2371;&#2359;&#2367; &#2357;&#2367;&#2325;&#2366;&#2360; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">PM-KUSUM</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2319;&#2350;-&#2325;&#2369;&#2360;&#2369;&#2350;</span>",
      "<span class=\"eqt\">Soil Health Card Scheme</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2371;&#2342;&#2366; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2325;&#2366;&#2352;&#2381;&#2337; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">RKVY</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2371;&#2359;&#2367; &#2357;&#2367;&#2325;&#2366;&#2360; &#2351;&#2379;&#2332;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Paramparagat Krishi Vikas Yojana (PKVY)</b> is a sub-component of the National Mission on Sustainable Agriculture (NMSA). It is the flagship scheme of the Government of India for promoting <b>organic and natural farming</b>.</p><p>Key Features of PKVY:</p><p>&#183; <b>Cluster-Based Approach:</b> The scheme is implemented through clusters of 20 hectares (50 acres) each. In these clusters, farmers are encouraged to adopt traditional organic methods.</p><p>&#183; <b>Participatory Guarantee System (PGS):</b> It utilizes the PGS-India organic certification system, where a group of farmers (the cluster) monitors and certifies each other's produce as organic, making it cost-effective for smallholders.</p><p>&#183; <b>Financial Assistance:</b> Farmers receive financial support of <b>&#8377;50,000 per hectare</b> for a period of three years, primarily for organic inputs (seeds, fertilizers), harvesting, and marketing.</p><p><b>Further Insights:</b></p><p>A sub-scheme under PKVY specifically dedicated to chemical-free natural farming is the Bhartiya Prakritik Krishi Paddhati (BPKP).</p>",
    "question_index": 121
  },
  {
    "question": "<span class=\"eqt\"><p>Which physical quantity remains constant during refraction of light?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2375; &#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2380;&#2344; &#2360;&#2368; &#2349;&#2380;&#2340;&#2367;&#2325; &#2352;&#2366;&#2358;&#2367; &#2360;&#2381;&#2341;&#2367;&#2352; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Speed</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2347;&#2364;&#2381;&#2340;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Wavelength</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2357;&#2354;&#2375;&#2306;&#2341;</span>",
      "<span class=\"eqt\">Frequency</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Amplitude</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2366;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The frequency of light remains constant during refraction. </p><p>When light passes from one medium to another (refraction), its speed changes, which in turn causes its wavelength to change (v=f&#955;). However, the frequency of the light depends solely on the source and does not change when the medium changes.</p><p><b>Further Insights:</b></p><p>Because frequency stays the same while speed decreases (in a denser medium), the wavelength must also decrease proportionally.</p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following events is correctly matched with the year?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2328;&#2335;&#2344;&#2366; &#2357;&#2352;&#2381;&#2359; &#2360;&#2375; &#2360;&#2361;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2350;&#2375;&#2354; &#2326;&#2366;&#2340;&#2368; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Simon Commission  -  1925</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2311;&#2350;&#2344; &#2310;&#2351;&#2379;&#2327; - 1925</span>",
      "<span class=\"eqt\">Quit India Movement  -  1942</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2331;&#2379;&#2337;&#2364;&#2379; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; - 1942</span>",
      "<span class=\"eqt\">Cabinet Mission  -  1944</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2350;&#2306;&#2337;&#2354; &#2350;&#2367;&#2358;&#2344; - 1944</span>",
      "<span class=\"eqt\">Poona Pact  -  1930</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2344;&#2366; &#2360;&#2350;&#2333;&#2380;&#2340;&#2366; - 1930</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Based on the timeline of the Indian National Movement, the correctly matched event is <b>Quit India Movement  -  1942</b>.</p><p>Detailed Analysis</p><p>&#183; <b>Simon Commission  -  1925(Incorrect):</b> The Simon Commission was <b>appointed</b> in November 1927 in London, but it <b>arrived in India</b> in February <b>1928</b>. In many Indian history contexts, 1928 is the recognized year of its impact on the ground, but 1927 is its official formation date.</p><p>&#183; <b>Quit India Movement  -  1942 (Correct):</b> Launched by Mahatma Gandhi at the Bombay session of the All India Congress Committee on <b>August 8, 1942</b>, demanding an end to British rule in India.</p><p>&#183; <b>Cabinet Mission  -  1944 (Incorrect):</b> The Cabinet Mission was sent to India in <b>1946</b> to discuss the transfer of power from the British government to Indian leadership.</p><p>&#183; <b>Poona Pact  -  1930 (Incorrect):</b> The Poona Pact was signed on September 24, <b>1932</b>, between B.R. Ambedkar and Mahatma Gandhi in Yerwada Central Jail, Pune.</p>",
    "question_index": 123
  },
  {
    "question": "<span class=\"eqt\"><p>Given below are two statements marked as Assertion and Reason. Choose the correct option.</p><p>Assertion (A): Capital formation is essential for long-term economic growth.</p><p>Reason (R): Capital formation increases productive capacity of the economy.</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2325;&#2341;&#2344; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2342;&#2368;&#2352;&#2381;&#2328;&#2325;&#2366;&#2354;&#2367;&#2325; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2370;&#2306;&#2332;&#2368; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;&#2404; &#2325;&#2366;&#2352;&#2339; (R): &#2346;&#2370;&#2306;&#2332;&#2368; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2368; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true and R explains A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2324;&#2352; R, A &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true but R does not explain A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is false but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Assertion (A) is Correct. Capital formation (investment in physical assets like machinery, infrastructure, etc.) is the primary driver of economic expansion over time.</p><p>Reason (R) is Correct. By adding to the stock of capital, the economy increases its \"production possibility frontier,\" allowing for a higher volume of goods and services to be produced. Since R explains why capital formation leads to growth, the link is valid.</p><p><b>Further Insights:</b></p><p>The Incremental Capital-Output Ratio (ICOR) is often used to measure the efficiency of capital formation in an economy.</p>",
    "question_index": 124
  },

    "question": "<span class=\"eqt\"><p>Which of the following landforms is primarily formed due to the process of river rejuvenation?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2349;&#2370;-&#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2342;&#2368; &#2325;&#2375; &#2346;&#2369;&#2344;&#2352;&#2381;&#2332;&#2368;&#2357;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2348;&#2344;&#2340;&#2368; &#2361;&#2376;?</span>",

      "<span class=\"eqt\">Flood plain</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2338;&#2364; &#2325;&#2366; &#2350;&#2376;&#2342;&#2366;&#2344;</span>",

      "<span class=\"eqt\">Natural levee</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2340;&#2335;&#2348;&#2306;&#2343;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Incised meanders are the primary landform associated with river rejuvenation. </p><p><b>Explanation:</b></p><p>Incised (or entrenched) meanders occur when a river that is already meandering is \"rejuvenated\" by a sudden tectonic uplift of the land or a fall in sea level. This gives the river renewed vertical erosive power, causing it to cut its existing meandering pattern deep into the bedrock.</p><p>Ox-bow lakes and flood plains are features of a river's mature/old stage under stable conditions.</p><p><b>Further Insights:</b></p><p>Other rejuvenation features include river terraces and \"knickpoints\" (waterfalls).</p>",
    "question_index": 125
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Ryotwari system:</p><p>1) It was introduced by Thomas Munro.</p><p>2) Land revenue was collected directly from peasants.</p><p>3) Revenue demand was fixed permanently.</p><p>Which of the statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2376;&#2351;&#2340;&#2357;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2311;&#2360;&#2375; &#2341;&#2377;&#2350;&#2360; &#2350;&#2369;&#2344;&#2352;&#2379; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>2) &#2349;&#2370;-&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2360;&#2368;&#2343;&#2375; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2357;&#2360;&#2370;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404;</p><p>3) &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2350;&#2366;&#2306;&#2327; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2341;&#2368;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct. </p><p>Statement 3 is incorrect because the revenue in the Ryotwari system was subject to periodic revision, not fixed permanently. </p><p><b>Explanation of Statements:</b></p><p>1) is Correct. The system was primarily devised by Captain Alexander Read and Sir Thomas Munro at the end of the 18th century and introduced in the Madras Presidency.</p><p>2) is Correct. Unlike the Zamindari system, the government made a direct settlement with the individual cultivators (Ryots).</p><p>3) is Incorrect. The land revenue was not fixed forever; it was generally revised every 20 to 30 years after a fresh survey of the land.</p><p><b>Further Insights:</b></p><p>The Ryotwari system was implemented in most of southern and western India (Madras, Bombay, and parts of Assam).</p>",
    "question_index": 126
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Article 143 of the Constitution:</p><p>Statement I: Article 143 empowers the President to seek advisory opinions from the Supreme Court.</p><p>Statement II: The opinion given by the Supreme Court under Article 143 is binding on all courts.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 143 &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 143 &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2360;&#2375; &#2346;&#2352;&#2366;&#2350;&#2352;&#2381;&#2358; &#2354;&#2375;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 143 &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2360;&#2349;&#2368; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2346;&#2352; &#2348;&#2366;&#2343;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct. Statement II is incorrect because the advisory opinion provided by the Supreme Court is not a binding judgment but rather a non-binding opinion. Therefore, the correct option is Only I.</p><p><b>Explanation of Statements:</b></p><p>I. is Correct. Article 143 of the Constitution authorizes the President to refer to the Supreme Court a question of law or fact that is of such a nature and such public importance that it is expedient to obtain the court's opinion.</p><p>II. is Incorrect. The Supreme Court is not \"bound\" to give an opinion on every matter (except in certain pre-constitutional matters), and the opinion it does provide is not legally binding on the President or other courts, although it carries high persuasive authority.</p><p><b>Further Insights:</b></p><p>There are two categories under Article 143: questions of public importance and disputes arising out of pre-constitution treaties/agreements.</p><p>The first instance of its use was the In re Delhi Laws Act case in 1951.</p>",
    "question_index": 127
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the RBI's banknote microsite and features of Mahatma Gandhi (New) Series banknotes launched  in September 2025:</p><p>1)The microsite provides a 360-degree interactive view of banknotes.</p><p>2)All denominations in the Mahatma Gandhi (New) Series carry a reverse motif representing India's cultural or scientific heritage.</p><p>3)Colour-changing ink (green to blue) for the denominational numeral is a common security feature across all denominations of the Mahatma Gandhi (New) Series.</p><p>Which of the statements given above are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2352;&#2348;&#2368; &#2325;&#2368; &#2348;&#2376;&#2306;&#2325;&#2344;&#2379;&#2335; &#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2360;&#2366;&#2311;&#2335; &#2324;&#2352; &#2360;&#2367;&#2340;&#2306;&#2348;&#2352; 2025 &#2350;&#2375;&#2306; &#2354;&#2377;&#2344;&#2381;&#2330; &#2325;&#2367;&#2319; &#2327;&#2319; &#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; (&#2344;&#2312;) &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2375; &#2348;&#2376;&#2306;&#2325;&#2344;&#2379;&#2335;&#2379;&#2306; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2360;&#2366;&#2311;&#2335; &#2348;&#2376;&#2306;&#2325;&#2344;&#2379;&#2335;&#2379;&#2306; &#2325;&#2366; 360-&#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2311;&#2306;&#2335;&#2352;&#2376;&#2325;&#2381;&#2335;&#2367;&#2357; &#2342;&#2371;&#2358;&#2381;&#2351; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; (&#2344;&#2312;) &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2375; &#2360;&#2349;&#2368; &#2350;&#2370;&#2354;&#2381;&#2351;&#2357;&#2352;&#2381;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2360;&#2366;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367;&#2325; &#2351;&#2366; &#2357;&#2376;&#2332;&#2381;&#2334;&#2366;&#2344;&#2367;&#2325; &#2357;&#2367;&#2352;&#2366;&#2360;&#2340; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2330;&#2367;&#2340;&#2381;&#2352; &#2361;&#2376;&#2404;</p><p>3) &#2350;&#2370;&#2354;&#2381;&#2351;&#2357;&#2352;&#2381;&#2327; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2306;&#2327; &#2348;&#2342;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2381;&#2351;&#2366;&#2361;&#2368; (&#2361;&#2352;&#2375; &#2360;&#2375; &#2344;&#2368;&#2354;&#2375; &#2352;&#2306;&#2327; &#2350;&#2375;&#2306;) &#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; (&#2344;&#2312;) &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2375; &#2360;&#2349;&#2368; &#2350;&#2370;&#2354;&#2381;&#2351;&#2357;&#2352;&#2381;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is correct: The new RBI microsite, launched in September 2025, provides a 360-degree view of banknotes, multimedia content (videos, audio, animations), interactive games, and a dedicated section on the note exchange procedure.</p><p>Statement 2 is correct: Banknotes in the Mahatma Gandhi (New) Series feature various motifs on the reverse side that reflect India's rich cultural heritage and scientific achievements.</p><p>&#8377;500 note features the Red Fort.</p><p>&#8377;200 note features the Sanchi Stupa.</p><p>&#8377;100 note features Rani ki Vav.</p><p>&#8377;2000 note features Mangalyaan (India's Mars Orbiter Mission), symbolizing scientific achievement.</p><p>Statement 3 is incorrect: Colour-changing (colour-shifting) ink is a security feature present in several higher denominations (like &#8377;200, &#8377;500, &#8377;2000) but not uniformly across all denominations (e.g., it is absent in lower denominations like &#8377;10 and &#8377;20).</p>",
    "question_index": 128
  },

    "question": "<span class=\"eqt\"><p>The 2025 Nobel Prize in Economic Sciences was awarded for contributions related to:</p></span><span class=\"hqt\" style=\"display:none\"><p>2025 &#2325;&#2366; &#2344;&#2379;&#2348;&#2375;&#2354; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2309;&#2352;&#2381;&#2341;&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Innovation-driven economic growth and creative destruction</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2357;&#2366;&#2330;&#2366;&#2352;-&#2360;&#2306;&#2330;&#2366;&#2354;&#2367;&#2340; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2324;&#2352; &#2352;&#2330;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2357;&#2367;&#2344;&#2366;&#2358;</span>",
      "<span class=\"eqt\">The role of institutions in long-term economic development</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2368;&#2352;&#2381;&#2328;&#2325;&#2366;&#2354;&#2367;&#2325; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2350;&#2375;&#2306; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2325;&#2368; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Behavioural economics and decision-making under uncertainty</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2351;&#2357;&#2361;&#2366;&#2352;&#2367;&#2325; &#2309;&#2352;&#2381;&#2341;&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352; &#2324;&#2352; &#2309;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340;&#2340;&#2366; &#2325;&#2375; &#2340;&#2361;&#2340; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2354;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Inequality and redistribution in developing economies</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2325;&#2366;&#2360;&#2358;&#2368;&#2354; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2309;&#2360;&#2350;&#2366;&#2344;&#2340;&#2366; &#2324;&#2352; &#2346;&#2369;&#2344;&#2352;&#2381;&#2357;&#2367;&#2340;&#2352;&#2339;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The 2025 Nobel Prize in Economic Sciences was awarded to Joel Mokyr, Philippe Aghion, and Peter Howitt for their work on innovation-driven economic growth, including Mokyr's historical analysis of technological progress and Aghion-Howitt's theory of creative destruction.</p><p></p><p>&#183; 'Over the last two centuries, for the first time in history, the world has seen sustained economic growth. This has lifted vast numbers of people out of poverty and laid the foundation of our prosperity. This year's laureates in economic sciences... explain how innovation provides the impe'tus for further progress,' said The Royal Swedish Academy of Sciences, which is responsible for selecting Nobel laureates in physics, chemistry and economic sciences.</p><p>&#183; The economics prize is formally known as the Sveriges Riksbank Prize in Economic Sciences and is presented along with other Nobel Prizes on December 10 in Stockholm, Sweden.</p><p>&#183; Economic historian Mokyr, the committee said, 'Used historical sources as one means to uncover the causes of sustained growth becoming the new normal.' He stressed that in order for innovations to succeed one another in a self-generating process, it is not enough to know that something works, but understanding the scientific reasons why it works is also essential. Before the industrial revolution, such explanations were often missing, making it difficult to build on new discoveries and inventions, the committee said.</p><p>&#183; Meanwhile, Aghion and Howitt developed a mathematical model of 'creative destruction', describing it as a process in which new and better products enter the market, causing companies selling older products to lose out, the committee said.</p><p>&#183; They argued that creative destruction creates conflicts that must be managed in a constructive manner. Otherwise, established companies and interest groups threatened by change can hinder innovation.</p><p>&#183; John Hassler, chair of the Committee for the prize, said, 'The laureates' work shows that economic growth cannot be taken for granted. We must uphold the mechanisms that underly creative destruction, so that we do not fall back into stagnation,'</p><p>&#183; Last year, the Nobel Prize in Economic Sciences was awarded to US-based scholars Simon Johnson, James Robinson, and Daron Acemoglu for their research examining how colonisation and the establishment of public institutions help explain why some countries have remained trapped in poverty for decades.</p>",
    "question_index": 129
  },
  {
    "question": "<span class=\"eqt\"><p>SCSI port allows data transmission in a \"daisy chain\" to up to 7 devices. In daisy chain several devices are connected in _________.</p></span><span class=\"hqt\" style=\"display:none\"><p>SCSI &#2346;&#2379;&#2352;&#2381;&#2335; &#2319;&#2325; \"&#2337;&#2375;&#2332;&#2364;&#2368; &#2330;&#2375;&#2344;\" &#2350;&#2375;&#2306; 7 &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2340;&#2325; &#2337;&#2375;&#2335;&#2366; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2350;&#2367;&#2358;&#2344; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2337;&#2375;&#2332;&#2364;&#2368; &#2330;&#2375;&#2344; &#2350;&#2375;&#2306; &#2325;&#2312; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; _________ &#2350;&#2375;&#2306; &#2332;&#2369;&#2337;&#2364;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Parallel</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2376;&#2352;&#2375;&#2354;&#2354;</span>",
      "<span class=\"eqt\">Series</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2352;&#2368;&#2332;</span>",
      "<span class=\"eqt\">Mesh</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Any of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Small Computer System Interface (SCSI) Port: SCSI port allows data transmission in a \"daisy chain\" to up to 7 devices at a speed (32 bits at a time) much higher than serial and parallel ports. The devices that may be connected to SCSI ports are hard-disk drives, CD-ROM drives, scanners, backup units, network adapters etc. In daisy chain several devices are connected in <b>series</b>. If data has to reach the seventh device, then it needs to go through all the six devices first.</p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not a Boot sector Virus?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2319;&#2325; &#2348;&#2370;&#2335; &#2360;&#2375;&#2325;&#2381;&#2335;&#2352; &#2357;&#2366;&#2351;&#2352;&#2360; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Form</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2377;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Monkey</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2325;&#2368;</span>",
      "<span class=\"eqt\">Tiger</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2366;&#2311;&#2327;&#2352;</span>",
      "<span class=\"eqt\">Stoned</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2379;&#2344;&#2381;&#2337;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A boot virus (also known as a boot infector, an MBR virus or DBR virus) targets and infects a specific, physical section of a computer system that contains information crucial to the proper operation of the computer's operating system (OS). </p><p>Some common boot sector viruses include <b>Monkey, NYB (also known as B1), Stoned, and Form. </b></p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>What message will be shown in your web browser when you try to access a resource on a web server that doesn't exist?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2310;&#2346; &#2325;&#2367;&#2360;&#2368; &#2320;&#2360;&#2375; &#2357;&#2375;&#2348; &#2360;&#2352;&#2381;&#2357;&#2352; &#2346;&#2352; &#2352;&#2367;&#2360;&#2379;&#2352;&#2381;&#2360; &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330;&#2344;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2379; &#2350;&#2380;&#2332;&#2370;&#2342; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;, &#2340;&#2379; &#2310;&#2346;&#2325;&#2375; &#2357;&#2375;&#2348; &#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2364;&#2352; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2350;&#2376;&#2360;&#2375;&#2332; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Error 404</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2352;&#2352; 404</span>",
      "<span class=\"eqt\">Error 401</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2352;&#2352; 401</span>",
      "<span class=\"eqt\">Error 400</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2352;&#2352; 400</span>",
      "<span class=\"eqt\">Error 403</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2352;&#2352; 403</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A <b>404 error</b> happens when you try to access a resource on a web server that doesn't exist. Some reasons for this happening can for example be a broken link, a mistyped URL, or that the webmaster has moved the requested page somewhere else (or deleted it). To counter the ill effect of broken links, some websites set up custom pages for them.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Error 400    (Bad request)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Error message from the web server saying that the application you are using accessed it incorrectly/ that the request was somehow corrupted on the way.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Error 401   (Unauthorized)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">This error happens when a website visitor tries to access a restricted web page but isn't authorized to do so, usually because of a failed login attempt.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Error 403   (Forbidden)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">In this case no login opportunity was available. This can happen, for example, if you try to access a forbidden directory on a website.</td></tr></table>",
    "question_index": 132
  },
  {
    "question": "<span class=\"eqt\"><p>Which number system is the foundation of digital computers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2368; &#2344;&#2368;&#2306;&#2357; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Binary</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2311;&#2344;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Decimal</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2360;&#2368;&#2350;&#2354;</span>",
      "<span class=\"eqt\">Hexadecimal</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2325;&#2381;&#2360;&#2366;&#2337;&#2375;&#2360;&#2368;&#2350;&#2354;</span>",
      "<span class=\"eqt\">Octal</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2335;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The foundation of digital computers is the binary number system. Computers use a base-2 numbering system, which consists of only two digits, 0 and 1. In binary, each digit represents a power of 2, making it ideal for representing the on/off states of electronic switches, which form the basis of digital logic in computing.</p>",
    "question_index": 133
  },
  {

    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1) A scanner is an input device.</p><p>2) A plotter is mainly used for printing large graphics.</p><p>3) Speakers function as both input and output devices.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2360;&#2381;&#2325;&#2376;&#2344;&#2352; &#2319;&#2325; &#2311;&#2344;&#2346;&#2369;&#2335; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2361;&#2376;&#2404;</p><p>2) &#2346;&#2381;&#2354;&#2377;&#2335;&#2352; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2348;&#2337;&#2364;&#2375; &#2327;&#2381;&#2352;&#2366;&#2347;&#2367;&#2325;&#2381;&#2360; &#2325;&#2379; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2360;&#2381;&#2346;&#2368;&#2325;&#2352; &#2311;&#2344;&#2346;&#2369;&#2335; &#2324;&#2352; &#2310;&#2313;&#2335;&#2346;&#2369;&#2335; &#2342;&#2379;&#2344;&#2379;&#2306; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",

      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Statement 1  -  Correct:</b> Scanner inputs physical documents into digital form.</p><p>&#183; <b>Statement 2  -  Correct:</b> Plotters are used for CAD drawings and large graphics.</p><p>&#183; <b>Statement 3  -  Incorrect:</b> Speakers are <b>output-only</b> devices.</p>",
    "question_index": 135
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about cache memory:</p><p>1) Cache memory reduces the average time required to access data from main memory.</p><p>2) Cache memory has a larger storage capacity than RAM.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2325;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2350;&#2369;&#2326;&#2381;&#2351; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2360;&#2375; &#2337;&#2375;&#2335;&#2366; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2324;&#2360;&#2340; &#2360;&#2350;&#2351; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2325;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2368; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2352;&#2376;&#2350; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Statement 1  -  Correct:</b> Cache stores frequently used data close to the CPU, reducing access time.</p><p>&#183; <b>Statement 2  -  Incorrect:</b> Cache memory is <b>much smaller</b> than RAM but faster.</p>",
    "question_index": 136
  },

    "question": "<span class=\"eqt\"><p>Which of the following is used to create a bulleted list in Microsoft Word?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2360;&#2377;&#2347;&#2381;&#2335; &#2357;&#2352;&#2381;&#2337; &#2350;&#2375;&#2306; &#2348;&#2369;&#2354;&#2375;&#2335;&#2375;&#2337; &#2360;&#2370;&#2330;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ctrl + B</span><span class=\"hqt\" style=\"display:none\">Ctrl + B</span>",
      "<span class=\"eqt\">Ctrl + U</span><span class=\"hqt\" style=\"display:none\">Ctrl + U</span>",
      "<span class=\"eqt\">Ctrl + L</span><span class=\"hqt\" style=\"display:none\">Ctrl + L</span>",
      "<span class=\"eqt\">Ctrl + 1</span><span class=\"hqt\" style=\"display:none\">Ctrl + 1</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>To create a bulleted list in Microsoft Word, you can use the keyboard shortcut Ctrl + L. This shortcut applies bullet points to the selected text or the current paragraph, making it part of a bulleted list. You can also use the \"Bullets\" button in the toolbar or go to the \"Home\" tab and click the \"Bullets\" button in the \"Paragraph\" group to achieve the same result.</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>Match List-I with List-II:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List-I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List-II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. RAM</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) Non-volatile</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. ROM</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) Volatile</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Cache</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) Fastest access</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Hard Disk</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4) Secondary storage</td></tr></table><p>Choose the correct answer:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2330;&#2368;-I &#2325;&#2366; &#2360;&#2370;&#2330;&#2368;-II &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368;-I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368;-II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. RAM</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) &#2344;&#2377;&#2344;-&#2357;&#2379;&#2354;&#2375;&#2335;&#2366;&#2311;&#2354;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. ROM</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) &#2309;&#2360;&#2381;&#2341;&#2367;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2325;&#2376;&#2358;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) &#2360;&#2348;&#2360;&#2375; &#2340;&#2375;&#2332;&#2364; &#2346;&#2361;&#2369;&#2305;&#2330;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2361;&#2366;&#2352;&#2381;&#2337; &#2337;&#2367;&#2360;&#2381;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4) &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339;</td></tr></table><p>&#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">A-2, B-1, C-3, D-4</span><span class=\"hqt\" style=\"display:none\">A-2, B-1, C-3, D-4</span>",
      "<span class=\"eqt\">A-1, B-2, C-4, D-3</span><span class=\"hqt\" style=\"display:none\">A-1, B-2, C-4, D-3</span>",
      "<span class=\"eqt\">A-3, B-1, C-2, D-4</span><span class=\"hqt\" style=\"display:none\">A-3, B-1, C-2, D-4</span>",
      "<span class=\"eqt\">A-2, B-3, C-1, D-4</span><span class=\"hqt\" style=\"display:none\">A-2, B-3, C-1, D-4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A - 2 is Correct. RAM (Random Access Memory) is the primary memory used by the computer to store data and instructions that are currently being processed. It is volatile, meaning all data stored in it is lost immediately when the power supply is turned off.</p><p>B - 1 is Correct. ROM (Read-Only Memory) is a type of memory used to store permanent data and instructions, such as the system's BIOS (Basic Input/Output System). It is non-volatile because it retains its information even after the power is switched off.</p><p>C - 3 is Correct. Cache memory is a small-capacity, extremely high-speed memory unit located between the CPU and RAM. It stores frequently used data to provide the fastest access to the processor, significantly reducing wait times.</p><p>D - 4 is Correct. A Hard Disk is a high-capacity, non-volatile storage device used for permanent data storage (operating system, files, applications). It is classified as secondary storage because it is not directly accessible by the CPU and acts as a long-term repository.</p><p><b>Further Insights:</b></p><p>The computer memory hierarchy is designed to balance speed, cost, and capacity. As you move from Registers &#8594; Cache &#8594; RAM &#8594; Hard Disk, the access speed decreases while the storage capacity and cost-effectiveness increase.</p><p>While both RAM and Cache are volatile, Cache is much faster because it is typically integrated directly onto the CPU chip or placed very close to it.</p><p>Modern computers often use SSDs (Solid State Drives) as secondary storage instead of traditional Hard Disks for significantly faster read/write speeds.</p><p></p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>Which MS Word feature allows users to automatically correct commonly misspelled words while typing?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2357;&#2352;&#2381;&#2337; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2347;&#2368;&#2330;&#2352; &#2335;&#2366;&#2311;&#2346; &#2325;&#2352;&#2340;&#2375; &#2360;&#2350;&#2351; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2327;&#2354;&#2340; &#2357;&#2352;&#2381;&#2340;&#2344;&#2368; &#2357;&#2366;&#2354;&#2375; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2379; &#2360;&#2381;&#2357;&#2330;&#2366;&#2354;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2336;&#2368;&#2325; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">AutoFormat</span><span class=\"hqt\" style=\"display:none\">AutoFormat</span>",
      "<span class=\"eqt\">Spell Check</span><span class=\"hqt\" style=\"display:none\">Spell Check</span>",
      "<span class=\"eqt\">AutoCorrect</span><span class=\"hqt\" style=\"display:none\">AutoCorrect</span>",
      "<span class=\"eqt\">Thesaurus</span><span class=\"hqt\" style=\"display:none\">Thesaurus</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>AutoCorrect</b> automatically replaces predefined incorrect spellings (e.g., \"teh\" &rarr; \"the\") as you type.</p><p><b>Key Functions of AutoCorrect:</b></p><p>Common Misspellings: It has a built-in list of common errors (e.g., it automatically changes \"teh\" to \"the\" or \"recieve\" to \"receive\").</p><p>Capitalization: It automatically capitalizes the first letter of a sentence or the names of days.</p><p>Symbols: You can use it as a shortcut; for example, typing (c) will automatically be replaced by the copyright symbol .</p><p>Customization: Users can add their own unique shorthand. For example, you can set Word to replace \"ASAP\" with \"as soon as possible\" every time you type it.</p><p></p><p>Difference Between AutoCorrect and Spell Check</p><p>While both deal with spelling, they function differently:</p><p><table style=\"border-collapse:collapse;\"></p><p><tr></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">Feature</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">Function</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">User Action</th></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">AutoCorrect</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Fixes errors instantly while you are typing.</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">No action needed (Automatic).</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Spell Check</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Identifies errors by underlining them (usually in red).</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">User must right-click to choose a correction.</td></p><p></tr></p><p></table></p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a property of a virus program? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2319;&#2325; &#2357;&#2366;&#2351;&#2352;&#2360; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It never spreads across any network</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2325;&#2349;&#2368; &#2349;&#2368; &#2325;&#2367;&#2360;&#2368; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2346;&#2352; &#2344;&#2361;&#2368;&#2306; &#2347;&#2376;&#2354;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Virus doesn't infect an executable file or program</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2352;&#2360; &#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2344; &#2351;&#2379;&#2327;&#2381;&#2351; (&#2319;&#2327;&#2381;&#2332;&#2368;&#2325;&#2381;&#2351;&#2370;&#2335;&#2375;&#2348;&#2354;) &#2347;&#2364;&#2366;&#2311;&#2354; &#2351;&#2366; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2379; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It can never be attached to other healthy programs</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2375; &#2325;&#2349;&#2368; &#2349;&#2368; &#2309;&#2344;&#2381;&#2351; &#2361;&#2375;&#2354;&#2381;&#2342;&#2368; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2366; &#2344;&#2361;&#2368;&#2306; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">It is difficult to trace a virus after it has spread across a network</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2346;&#2352; &#2311;&#2360;&#2325;&#2375; &#2347;&#2376;&#2354; &#2332;&#2366;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2357;&#2366;&#2351;&#2352;&#2360; &#2325;&#2366; &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2344;&#2366; &#2325;&#2336;&#2367;&#2344; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; A computer virus is a type of malicious software, or malware, that spreads between computers and causes damage to data and software. </p><p>&#183; Computer viruses aim to disrupt systems, cause major operational issues, and result in data loss and leakage. </p><p>&#183; A key thing to know about computer viruses is that they are designed to spread across programs and systems and networks and it is difficult to trace it. </p><p>&#183; Computer viruses typically attach to an executable host file, which results in their viral codes executing when a file is opened. </p><p>&#183; The code then spreads from the document or software it is attached to via networks, drives, file-sharing programs, or infected email attachments.</p>",
    "question_index": 142
  },
  {
    "question": "<span class=\"eqt\"><p>What is the most common method of spreading malware? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2376;&#2354;&#2357;&#2375;&#2351;&#2352; &#2347;&#2376;&#2354;&#2366;&#2344;&#2375; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2340;&#2352;&#2368;&#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pop-up ads</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2330;&#2366;&#2344;&#2325; &#2360;&#2366;&#2350;&#2344;&#2375; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2346;&#2344; (Pop-up ads)</span>",
      "<span class=\"eqt\">Downloading software from official websites</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2325; &#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335;&#2379;&#2306; &#2360;&#2375; &#2360;&#2377;&#2347;&#2364;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2337;&#2366;&#2313;&#2344;&#2354;&#2379;&#2337; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Email attachments and links</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2350;&#2375;&#2354; &#2309;&#2335;&#2376;&#2330;&#2350;&#2375;&#2306;&#2335; &#2324;&#2352; &#2354;&#2367;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Using a firewall</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2366;&#2351;&#2352;&#2357;&#2377;&#2354; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most common method of spreading malware is through email attachments and links. Cybercriminals often send phishing emails with malicious attachments or links that, when opened or clicked, can install malware on the recipient's device. These emails are designed to trick users into taking actions that compromise the security of their systems. It's essential to be cautious when opening email attachments and clicking on links, especially if the email is unsolicited or appears suspicious.</p>",
    "question_index": 143
  },
  {
    "question": "<span class=\"eqt\"><p>Which unit of the CPU is responsible for controlling and coordinating all operations of the computer system?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2375; &#2360;&#2349;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2324;&#2352; &#2360;&#2350;&#2344;&#2381;&#2357;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2325;&#2368; &#2325;&#2380;&#2344; &#2360;&#2368; &#2311;&#2325;&#2366;&#2312; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Arithmetic Logic Unit</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2325;&#2327;&#2339;&#2367;&#2340; &#2340;&#2352;&#2381;&#2325; &#2311;&#2325;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Control Unit</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2351;&#2370;&#2344;&#2367;&#2335;</span>",
      "<span class=\"eqt\">Main Memory</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2326;&#2381;&#2351; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Input - Output Unit</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2346;&#2369;&#2335; - &#2310;&#2313;&#2335;&#2346;&#2369;&#2335; &#2351;&#2370;&#2344;&#2367;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p></b>The <b>Control Unit (CU)</b> directs the operation of the processor. It fetches instructions from memory, decodes them, and controls data flow between CPU components and peripherals. The ALU only performs calculations, not control.</p>",
    "question_index": 144
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an operating system known to give maximum time for each of the critical operations that it performs?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2319;&#2325; &#2320;&#2360;&#2366; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2361;&#2376; &#2332;&#2379; &#2309;&#2346;&#2344;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2321;&#2346;&#2352;&#2375;&#2358;&#2344; &#2325;&#2379; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2360;&#2350;&#2351; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Multiprocessor Operating System</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2354;&#2381;&#2335;&#2368;&#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2352; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>",
      "<span class=\"eqt\">Real time Operating System</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2351;&#2354; &#2335;&#2366;&#2311;&#2350; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>",
      "<span class=\"eqt\">Simple Batch Operating System</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2306;&#2346;&#2354; &#2348;&#2376;&#2330; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>",
      "<span class=\"eqt\">Distributed Operating System</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2360;&#2381;&#2335;&#2381;&#2352;&#2367;&#2348;&#2381;&#2351;&#2370;&#2335;&#2375;&#2337; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Real time Operating System</b> is known to give maximum time for each of the critical operations that it performs, like OS calls and interrupt handling. The Real-Time Operating system which guarantees the maximum time for critical operations and complete them on time are referred to as Hard Real-Time Operating Systems.</p><p>While the real-time operating systems that can only guarantee a maximum of the time, i.e., the critical task will get priority over other tasks, but no assurity of completing it in a defined time. These systems are referred to as Soft Real-Time Operating Systems.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Multiprocessor OS</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Capable of running many programs simultaneously.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Simple Batch OS</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">No direct interaction between user and the computer.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Distributed OS</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A model where distributed applications are running on multiple computers linked by communications.</td></tr></table>",
    "question_index": 145
  },
  {
    "question": "<span class=\"eqt\"><p>What is a \"financial aggregator\" in e-banking? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2312;-&#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2350;&#2375;&#2306; \"&#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2319;&#2327;&#2381;&#2352;&#2368;&#2327;&#2375;&#2335;&#2352;\" &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A type of digital currency</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">A service that gathers financial data from multiple sources and presents it in one place for users</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2375;&#2357;&#2366; &#2332;&#2379; &#2325;&#2312; &#2360;&#2381;&#2352;&#2379;&#2340;&#2379;&#2306; &#2360;&#2375; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2337;&#2375;&#2335;&#2366; &#2319;&#2325;&#2340;&#2381;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2361;&#2368; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">An online banking platform</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2346;&#2381;&#2354;&#2375;&#2335;&#2347;&#2364;&#2377;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">A physical bank branches</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2349;&#2380;&#2340;&#2367;&#2325; &#2348;&#2376;&#2306;&#2325; &#2358;&#2366;&#2326;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A \"financial aggregator\" in e-banking is a service or tool that gathers financial data from multiple sources, such as different bank accounts, investment accounts, credit cards, and other financial instruments, and presents all of this information in one place for users. </p><p>&#183; This allows users to have a comprehensive view of their financial information and transactions without having to log in to each individual financial institution's website or access multiple accounts separately. </p><p>&#183; Financial aggregators often provide a consolidated dashboard or interface that helps users manage their finances more efficiently and make informed financial decisions. They can also offer insights, budgeting tools, and analysis to help users better understand their financial situation.</p>",
    "question_index": 146
  },
  {
    "question": "<span class=\"eqt\"><p>___________ is a state of low-power and inactivity in computer.</p></span><span class=\"hqt\" style=\"display:none\"><p>_______ &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2350;&#2375;&#2306; &#2325;&#2350; &#2313;&#2352;&#2381;&#2332;&#2366; &#2324;&#2352; &#2344;&#2367;&#2359;&#2381;&#2325;&#2381;&#2352;&#2367;&#2351;&#2340;&#2366; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Shut down</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2335; &#2337;&#2366;&#2313;&#2344;</span>",
      "<span class=\"eqt\">Log off</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2327; &#2321;&#2347;&#2364;</span>",
      "<span class=\"eqt\">Sleep</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2354;&#2368;&#2346;</span>",
      "<span class=\"eqt\">Hibernate</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2348;&#2352;&#2344;&#2375;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Sleep</b> is a state of low-power inactivity commonly found on many computers and peripherals.</p>",
    "question_index": 147
  },
  {
    "question": "<span class=\"eqt\"><p>In MS excel the numbers in table column are usually?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2350;&#2375;&#2306; &#2335;&#2375;&#2348;&#2354; &#2325;&#2377;&#2354;&#2350; &#2350;&#2375;&#2306; &#2344;&#2306;&#2348;&#2352; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; ______ &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Right aligned</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2311;&#2335; &#2309;&#2354;&#2366;&#2311;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Left aligned</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2375;&#2347;&#2381;&#2335; &#2309;&#2354;&#2366;&#2311;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Centrally aligned</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2306;&#2335;&#2381;&#2352;&#2354;&#2368; &#2309;&#2354;&#2366;&#2311;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Justified</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2360;&#2381;&#2335;&#2368;&#2398;&#2366;&#2311;&#2337;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The numbers in table column are usually <b>left aligned. </b>Alignment determines the appearance and orientation of the edges of the paragraph: left-aligned text, right-aligned text, centred text, or justified text, which is aligned evenly along the left and right margins. <b>For example</b>, in a paragraph that is left-aligned (the most common alignment) , the left edge of the paragraph is flush with the left margin. </p>",
    "question_index": 148
  },
  {
    "question": "<span class=\"eqt\"><p>Which Excel formula will return the value 0 instead of an error when a division formula results in #DIV/0!?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2325;&#2380;&#2344; &#2360;&#2366; &#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2347;&#2364;&#2377;&#2352;&#2381;&#2350;&#2370;&#2354;&#2366; &#2361;&#2376; &#2332;&#2379; &#2349;&#2366;&#2327;&#2347;&#2354; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2350;&#2375;&#2306; #DIV/0! &#2310;&#2344;&#2375; &#2346;&#2352; &#2340;&#2381;&#2352;&#2369;&#2335;&#2367; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; 0 &#2350;&#2366;&#2344; &#2354;&#2380;&#2335;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">=IF(A1/B1,0)</span><span class=\"hqt\" style=\"display:none\">=IF(A1/B1,0)</span>",
      "<span class=\"eqt\">=IFERROR(A1/B1,0)</span><span class=\"hqt\" style=\"display:none\">=IFERROR(A1/B1,0)</span>",
      "<span class=\"eqt\">=IF(ISBLANK(B1),0,A1/B1)</span><span class=\"hqt\" style=\"display:none\">=IF(ISBLANK(B1),0,A1/B1)</span>",
      "<span class=\"eqt\">=IF(A1/B1=0,0,A1/B1)</span><span class=\"hqt\" style=\"display:none\">=IF(A1/B1=0,0,A1/B1)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>IFERROR()</b> catches <b>any Excel error</b> and replaces it with a specified value.</p><p>&#183; Options (a), (c), and (d) either don't handle errors or work only in limited cases.</p><p>Hence, <b>IFERROR(A1/B1,0)</b> is the correct formula.</p>",
    "question_index": 149
  }
