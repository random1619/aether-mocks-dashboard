    "question": "<span class=\"eqt\"><p>Which of the following cities was officially declared India's first beggar-free city after the successful implementation of a rehabilitation campaign recognized by the Union Ministry of Social Justice and Empowerment and the World Bank in May 2025?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2358;&#2361;&#2352; &#2325;&#2379; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2344;&#2381;&#2351;&#2366;&#2351; &#2319;&#2357;&#2306; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2340;&#2366; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2324;&#2352; &#2357;&#2367;&#2358;&#2381;&#2357; &#2348;&#2376;&#2306;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2346;&#2369;&#2344;&#2352;&#2381;&#2357;&#2366;&#2360; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; &#2325;&#2375; &#2360;&#2347;&#2354; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2351;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2350;&#2312; 2025 &#2350;&#2375;&#2306; &#2310;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2325; &#2340;&#2380;&#2352; &#2346;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2349;&#2367;&#2326;&#2366;&#2352;&#2368;-&#2350;&#2369;&#2325;&#2381;&#2340; &#2358;&#2361;&#2352; &#2328;&#2379;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Hyderabad</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2376;&#2342;&#2352;&#2366;&#2348;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Pune</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2339;&#2375;</span>",
      "<span class=\"eqt\">Indore</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2342;&#2380;&#2352;</span>",
      "<span class=\"eqt\">Surat</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2352;&#2340;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Indore</b> has been declared India's first beggar-free city following a year-long campaign (starting Feb 2024) under the Union Ministry's SMILE project, rehabilitating around 5,000 beggars by providing jobs and schooling for children, while banning begging and alms, with rewards for reporting violations, a model recognized by the Ministry and World Bank.</p><p>&#183; Begging as well as giving money to beggars or buying anything from them has been banned in the city, and so far three FIRs have been registered for violations.</p><p>&#183; A reward of Rs 1,000 is given to anyone providing information about begging, and many people have claimed the reward so far.</p>",
    "question_index": 115
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the incorrect statement(s).</p><p>I. The Chief Election Commissioner (CEC) can be removed by the President on the recommendation of the Prime Minister.</p><p>II. The removal process for the CEC is the same as for a Supreme Court judge and requires a special majority in Parliament.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2354;&#2340; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>I. &#2350;&#2369;&#2326;&#2381;&#2351; &#2330;&#2369;&#2344;&#2366;&#2357; &#2310;&#2351;&#2369;&#2325;&#2381;&#2340; (&#2360;&#2368;&#2312;&#2360;&#2368;) &#2325;&#2379; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358; &#2346;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2361;&#2335;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2360;&#2368;&#2312;&#2360;&#2368; &#2325;&#2379; &#2361;&#2335;&#2366;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2306;&#2360;&#2342; &#2350;&#2375;&#2306; &#2357;&#2367;&#2358;&#2375;&#2359; &#2348;&#2361;&#2369;&#2350;&#2340; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; I is Incorrect. The CEC cannot be removed by the President simply on the recommendation of the Prime Minister or the Council of Ministers. To ensure the independence of the Election Commission, the Constitution provides the CEC with a high level of protection. He can only be removed from office in the same manner and on the same grounds as a Judge of the Supreme Court.</p><p>&#183; II is Correct. According to Article 324 of the Constitution, the removal of the CEC requires a resolution passed by both Houses of Parliament (Lok Sabha and Rajya Sabha) with a special majority - that is, a majority of the total membership of each House and a majority of not less than two-thirds of the members of that House present and voting - on the grounds of \"proved misbehaviour or incapacity.\"</p><p><b>Further Insights:</b></p><p>- Article 324 establishes the Election Commission of India.</p><p>- An Election Commissioner (other than the CEC) can be removed only on the CEC's recommendation.</p><p>- The ECI has been a multi-member body (CEC + ECs) since 1993 (with brief earlier expansions).</p><p>- Tenure and service conditions of CEC/ECs are set by law; their independence is protected by secured tenure and removal safeguards.</p><p>- The ECI conducts elections to Parliament, State Legislatures, and to the offices of President and Vice-President.</p>",
    "question_index": 116
  },
  {
    "question": "<span class=\"eqt\"><p>In the long run, a perfectly competitive firm produces at a point where</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368;&#2352;&#2381;&#2328;&#2325;&#2366;&#2354; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2368; &#2347;&#2352;&#2381;&#2350; &#2313;&#2360; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2332;&#2361;&#2366;&#2305;</p></span>",
    "options": [
      "<span class=\"eqt\">Price = Marginal Cost = minimum Average Cost</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354;&#2381;&#2351; = &#2360;&#2368;&#2350;&#2366;&#2306;&#2340; &#2354;&#2366;&#2327;&#2340; = &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2324;&#2360;&#2340; &#2354;&#2366;&#2327;&#2340;</span>",
      "<span class=\"eqt\">Price &gt; Marginal Cost and both exceed Average Cost</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354;&#2381;&#2351; &gt; &#2360;&#2368;&#2350;&#2366;&#2306;&#2340; &#2354;&#2366;&#2327;&#2340; &#2324;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2324;&#2360;&#2340; &#2354;&#2366;&#2327;&#2340; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Price = Marginal Revenue &gt; Average Cost at its minimum</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354;&#2381;&#2351; = &#2360;&#2368;&#2350;&#2366;&#2306;&#2340; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &gt; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2324;&#2360;&#2340; &#2354;&#2366;&#2327;&#2340;</span>",
      "<span class=\"eqt\">Price = Average Variable Cost &lt; Average Cost</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354;&#2381;&#2351; = &#2324;&#2360;&#2340; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;&#2368;&#2351; &#2354;&#2366;&#2327;&#2340; &lt; &#2324;&#2360;&#2340; &#2354;&#2366;&#2327;&#2340;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Free entry and exit drive economic profits to zero, so Price = Marginal Cost and Price = minimum Average Cost in long-run competitive equilibrium.</p><p>Other options contradict zero-profit equilibrium and cost conditions in perfect competition.</p><p><b>Further Insights:</b></p><p>- In perfect competition, each firm is a price taker: P = MR = AR.</p><p>- Long-run supply in a constant-cost industry is perfectly elastic at minimum AC.</p><p>- With increasing costs, industry expansion raises input prices and long-run supply slopes upward.</p><p>- Short-run equilibrium requires P = MC but can be above or below AC.</p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Blind Women's T20 World Cup:</p><p>Statement I: India won the first-ever Blind Women's T20 World Cup by defeating Nepal in the final held at the P Sara Oval, Colombo.</p><p>Statement II: Blind cricket is played with a white plastic ball containing ball bearings, which helps players locate the ball through sound.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2306;&#2343; &#2350;&#2361;&#2367;&#2354;&#2366; &#2335;&#2368;20 &#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2346; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2325;&#2379;&#2354;&#2306;&#2348;&#2379; &#2325;&#2375; &#2346;&#2368; &#2360;&#2366;&#2352;&#2366; &#2323;&#2357;&#2354; &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2347;&#2366;&#2311;&#2344;&#2354; &#2350;&#2375;&#2306; &#2344;&#2375;&#2346;&#2366;&#2354; &#2325;&#2379; &#2361;&#2352;&#2366;&#2325;&#2352; &#2346;&#2361;&#2354;&#2366; &#2344;&#2375;&#2340;&#2381;&#2352;&#2361;&#2368;&#2344; &#2350;&#2361;&#2367;&#2354;&#2366; &#2335;&#2368;20 &#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2346; &#2332;&#2368;&#2340;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2344;&#2375;&#2340;&#2381;&#2352;&#2361;&#2368;&#2344; &#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2360;&#2347;&#2375;&#2342; &#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2335;&#2367;&#2325; &#2325;&#2368; &#2327;&#2375;&#2306;&#2342; &#2360;&#2375; &#2326;&#2375;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2348;&#2377;&#2354; &#2348;&#2367;&#2351;&#2352;&#2367;&#2306;&#2327; &#2354;&#2327;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2379; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2327;&#2375;&#2306;&#2342; &#2325;&#2366; &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Statement I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2325;&#2375;&#2357;&#2354;</span>",
      "<span class=\"eqt\">Statement II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; II</span>",
      "<span class=\"eqt\">Both Statement I and Statement II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2324;&#2352; &#2325;&#2341;&#2344; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither Statement I nor Statement II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2325;&#2341;&#2344; I &#2324;&#2352; &#2344; &#2361;&#2368; &#2325;&#2341;&#2344; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Statement I is correct:</b> India defeated <b>Nepal by seven wickets</b> in the final at <b>P Sara Oval, Colombo</b>, to win the <b>first-ever Blind Women's T20 World Cup</b>.</p><p>&#183; <b>Statement II is correct:</b> Blind cricket uses a <b>white plastic ball with ball bearings</b> that produce sound, enabling visually impaired players to track the ball.</p>",

    "question": "<span class=\"eqt\"><p>Identify the correct statement(s).</p><p>Statement I: Cnidarians have tissue-level organization and are diploblastic animals. </p><p>Statement II: Diploblasty means only ectoderm and endoderm are present, separated by a non-cellular mesoglea rather than a true mesoderm.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2344;&#2367;&#2337;&#2375;&#2352;&#2367;&#2351;&#2344; &#2350;&#2375;&#2306; &#2314;&#2340;&#2325;-&#2360;&#2381;&#2340;&#2352;&#2368;&#2351; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2357;&#2375; &#2342;&#2381;&#2357;&#2367;&#2357;&#2367;&#2350;&#2368;&#2351; &#2332;&#2368;&#2357; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2342;&#2381;&#2357;&#2367;&#2357;&#2367;&#2350;&#2368;&#2351;&#2340;&#2366; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325;&#2381;&#2335;&#2379;&#2337;&#2352;&#2381;&#2350; &#2324;&#2352; &#2319;&#2306;&#2337;&#2379;&#2337;&#2352;&#2381;&#2350; &#2350;&#2380;&#2332;&#2370;&#2342; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2379; &#2319;&#2325; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2350;&#2375;&#2360;&#2379;&#2337;&#2352;&#2381;&#2350; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2319;&#2325; &#2327;&#2376;&#2352;-&#2325;&#2379;&#2358;&#2367;&#2325;&#2368;&#2351; &#2350;&#2375;&#2360;&#2379;&#2327;&#2381;&#2354;&#2367;&#2351;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2354;&#2327; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are correct. </p><p>Diploblasty is correctly defined in Statement II and explains the tissue-level organization seen in cnidarians such as Hydra and jellyfish.</p><p><b>Further Insights:</b></p><p>- Cnidarians show radial symmetry and possess stinging cells called cnidocytes (nematocysts).</p><p>- They exhibit two body forms: polyp (sessile) and medusa (free-swimming).</p><p>- Sponges (Porifera) lack true tissues; Platyhelminthes are triploblastic acoelomates.</p><p>- Echinoderms are triploblastic, coelomate deuterostomes with pentaradial adult symmetry.</p>",
    "question_index": 119
  },

    "question": "<span class=\"eqt\"><p>Who wrote the novel \"A Passage to India\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; \"&#2309; &#2346;&#2376;&#2360;&#2375;&#2332; &#2335;&#2370; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366;\" &#2325;&#2367;&#2360;&#2344;&#2375; &#2354;&#2367;&#2326;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">R. K. Narayan</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;. &#2325;&#2375;. &#2344;&#2366;&#2352;&#2366;&#2351;&#2339;</span>",
      "<span class=\"eqt\">E. M. Forster</span><span class=\"hqt\" style=\"display:none\">&#2312;. &#2319;&#2350;. &#2347;&#2379;&#2352;&#2381;&#2360;&#2381;&#2335;&#2352;</span>",

    "solution": "<p>\"A Passage to India\" (1924) is by E. M. Forster and is set in British India around the Marabar Caves episode.</p><p>The other authors are notable novelists but not linked to this title.</p><p><b>Further Insights:</b></p><p>- E. M. Forster also wrote \"A Room with a View\" and \"Howards End.\"</p><p>- R. K. Narayan's celebrated novels include \"The Guide\" and \"Swami and Friends.\"</p><p>- V. S. Naipaul's \"A House for Mr Biswas\" is a major postcolonial work.</p><p>- Salman Rushdie won the Booker Prize for \"Midnight's Children\" (1981), a frequent SSC favorite.</p>",

  {
    "question": "<span class=\"eqt\"><p>Match the situation with the dominant effect or purpose.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. A steel spoon's handle gets hot while its other end is in boiling water</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Radiation to the body</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. Silvered inner walls of a vacuum flask</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Natural convection</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. Sea breeze on a sunny afternoon</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Conduction</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. Feeling warmth near a bonfire without touching it</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Reduced heat transfer by reflecting thermal radiation</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2379; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2351;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2305;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2381;&#2340;&#2306;&#2349; I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2381;&#2340;&#2306;&#2349; II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. &#2319;&#2325; &#2360;&#2381;&#2335;&#2368;&#2354; &#2325;&#2375; &#2330;&#2350;&#2381;&#2350;&#2330; &#2325;&#2366; &#2361;&#2376;&#2306;&#2337;&#2354; &#2327;&#2352;&#2381;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2313;&#2360;&#2325;&#2366; &#2342;&#2370;&#2360;&#2352;&#2366; &#2360;&#2367;&#2352;&#2366; &#2313;&#2348;&#2354;&#2340;&#2375; &#2346;&#2366;&#2344;&#2368; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2358;&#2352;&#2368;&#2352; &#2346;&#2352; &#2357;&#2367;&#2325;&#2367;&#2352;&#2339;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. &#2357;&#2376;&#2325;&#2381;&#2351;&#2370;&#2350; &#2347;&#2381;&#2354;&#2366;&#2360;&#2381;&#2325; &#2325;&#2368; &#2330;&#2366;&#2306;&#2342;&#2368; &#2330;&#2338;&#2364;&#2368; &#2349;&#2368;&#2340;&#2352;&#2368; &#2342;&#2368;&#2357;&#2366;&#2352;&#2375;&#2306;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2360;&#2306;&#2357;&#2361;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. &#2343;&#2370;&#2346; &#2357;&#2366;&#2354;&#2368; &#2342;&#2379;&#2346;&#2361;&#2352; &#2350;&#2375;&#2306; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2368; &#2361;&#2357;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2330;&#2366;&#2354;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. &#2309;&#2354;&#2366;&#2357; &#2325;&#2379; &#2331;&#2369;&#2319; &#2348;&#2367;&#2344;&#2366; &#2313;&#2360;&#2325;&#2375; &#2346;&#2366;&#2360; &#2327;&#2352;&#2381;&#2350;&#2366;&#2361;&#2335; &#2350;&#2361;&#2360;&#2370;&#2360; &#2325;&#2352;&#2344;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2314;&#2359;&#2381;&#2350;&#2368;&#2351; &#2357;&#2367;&#2325;&#2367;&#2352;&#2339; &#2325;&#2379; &#2346;&#2352;&#2366;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2325;&#2375; &#2314;&#2359;&#2381;&#2350;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2339; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2366;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">I-A, II-B, III-C, IV-D</span><span class=\"hqt\" style=\"display:none\">I-A, II-B, III-C, IV-D</span>",
      "<span class=\"eqt\">I-C, II-D, III-B, IV-A</span><span class=\"hqt\" style=\"display:none\">I-C, II-D, III-B, IV-A</span>",
      "<span class=\"eqt\">I-B, II-A, III-D, IV-C</span><span class=\"hqt\" style=\"display:none\">I-B, II-A, III-D, IV-C</span>",
      "<span class=\"eqt\">I-D, II-C, III-A, IV-B</span><span class=\"hqt\" style=\"display:none\">I-D, II-C, III-A, IV-B</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>I: Heat flows along the metal &rarr; conduction &rarr; I-C.</p><p>II: Silvering reduces radiative exchange &rarr; II-D.</p><p>III: Warm air rises, cool air from sea replaces it &rarr; natural convection &rarr; III-B.</p><p>IV: Radiative heating dominates at a distance &rarr; IV-A.</p><p><b>Further Insights:</b></p><p>- Conduction rate: Q/t = k A &#916;T / L; k_high for metals (e.g., copper).</p><p>- Newton's law of cooling (convection): Q/t = h A (Ts &#8722; T&#8734;).</p><p>- Stefan - Boltzmann law (radiation): j* = &#949;&#963;T^4; &#963; = 5.67 X 10^-8 W&#183;m^-2&#183;K^-4.</p><p>- In vacuum, only radiation can transfer heat.</p><p>- Black, matte surfaces have high emissivity; polished, shiny surfaces have low emissivity.</p>",
    "question_index": 121
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct?</p><p>I. Energy flow in ecosystems is unidirectional. </p><p>II. Significant energy is lost as heat at each trophic transfer. So the pyramid of energy can never be inverted.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2319;&#2325;&#2342;&#2367;&#2358;&#2368;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2379;&#2359;&#2339; &#2360;&#2381;&#2340;&#2352; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2339; &#2350;&#2375;&#2306; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2347;&#2368; &#2314;&#2352;&#2381;&#2332;&#2366; &#2344;&#2359;&#2381;&#2335; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360;&#2354;&#2367;&#2319; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2366; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2349;&#2368; &#2313;&#2354;&#2381;&#2335;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are correct: energy flows from primary producers upward and dissipates as heat at each step. </p><p><b>Further Insights:</b></p><p>- The \"10% law\" is a rule of thumb; transfer efficiencies vary (about 5 - 20%).</p><p>- Pyramids of biomass or numbers may be inverted in some systems; the energy pyramid cannot be.</p><p>- Second law of thermodynamics underpins the decrease in usable energy across trophic levels.</p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>Which activity is generally classified under the tertiary (services) sector in national accounts?</p></span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2354;&#2375;&#2326;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367; &#2325;&#2379; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2340;&#2371;&#2340;&#2368;&#2351;&#2325; (&#2360;&#2375;&#2357;&#2366;) &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Cold storage and warehousing of farm produce</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2379;&#2354;&#2381;&#2337; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2324;&#2352; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Generation of electricity at a thermal power plant</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2346;&#2368;&#2351; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2360;&#2306;&#2351;&#2306;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2348;&#2367;&#2332;&#2354;&#2368; &#2325;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344;</span>",
      "<span class=\"eqt\">Iron ore mining</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2380;&#2361; &#2309;&#2351;&#2360;&#2381;&#2325; &#2326;&#2344;&#2344;</span>",
      "<span class=\"eqt\">Cement manufacturing</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2350;&#2375;&#2306;&#2335; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Storage, logistics, and warehousing are service activities and part of the tertiary sector.</p><p>Electricity generation and cement manufacturing are secondary (industry), and mining is primary.</p><p>Sectoral classification follows the nature of activity: extraction, transformation, or services.</p><p><b>Further Insights:</b></p><p>- Primary: agriculture, forestry, fishing, mining, quarrying.</p><p>- Secondary: manufacturing, construction, electricity, gas, water supply.</p><p>- Tertiary: trade, hotels, transport, communications, finance, real estate, public administration, and other services.</p><p>- Structural change often moves value added and employment from primary to secondary/tertiary sectors.</p>",
    "question_index": 123
  },
  {
    "question": "<span class=\"eqt\"><p>Regarding NavIC (IRNSS), which of the statement is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2375;&#2357;&#2368;&#2310;&#2312;&#2360;&#2368; (&#2310;&#2312;&#2310;&#2352;&#2319;&#2344;&#2319;&#2360;&#2319;&#2360;) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It offers worldwide coverage similar to GPS</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2332;&#2368;&#2346;&#2368;&#2319;&#2360; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2381;&#2351;&#2366;&#2346;&#2368; &#2325;&#2357;&#2352;&#2375;&#2332; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It primarily serves India and a region up to about 1,500 km beyond its borders</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2324;&#2352; &#2311;&#2360;&#2325;&#2368; &#2360;&#2368;&#2350;&#2366;&#2323;&#2306; &#2360;&#2375; &#2354;&#2327;&#2349;&#2327; 1,500 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352; &#2342;&#2370;&#2352; &#2340;&#2325; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; &#2360;&#2375;&#2357;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It works only over the Indian mainland, not islands</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2325;&#2375;&#2357;&#2354; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2369;&#2326;&#2381;&#2351; &#2349;&#2370;&#2350;&#2367; &#2346;&#2352; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2342;&#2381;&#2357;&#2368;&#2346;&#2379;&#2306; &#2346;&#2352; &#2344;&#2361;&#2368;&#2306;&#2404;</span>",
      "<span class=\"eqt\">It is restricted to military use only</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2375;&#2357;&#2354; &#2360;&#2376;&#2344;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2361;&#2368; &#2360;&#2368;&#2350;&#2367;&#2340; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>NavIC provides regional coverage focused on India with ~1,500 km extension beyond the boundary.</p><p>It supports both Standard Positioning Service (civil) and Restricted Service (authorized).</p><p><b>Further Insights:</b></p><p>- NavIC signals are in L5 and S&#8209;band; newer smartphones are adopting NavIC support.</p><p>- The constellation includes GEO and GSO satellites for high availability over India.</p><p>- NavIC enhances resilience and strategic autonomy for navigation/timing.</p><p>- Applications: vehicle tracking, disaster management, maritime navigation, and timing services.</p>",
    "question_index": 124
  },
  {
    "question": "<span class=\"eqt\"><p>After the 44th Constitutional Amendment, within what time must a Proclamation of National Emergency be approved by both Houses of Parliament?</p></span><span class=\"hqt\" style=\"display:none\"><p>44&#2357;&#2375;&#2306; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2379; &#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2342;&#2344;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2309;&#2344;&#2369;&#2350;&#2379;&#2342;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 month</span><span class=\"hqt\" style=\"display:none\">1 &#2350;&#2361;&#2368;&#2344;&#2366;</span>",
      "<span class=\"eqt\">2 months</span><span class=\"hqt\" style=\"display:none\">2 &#2350;&#2361;&#2368;&#2344;&#2375;</span>",
      "<span class=\"eqt\">6 months</span><span class=\"hqt\" style=\"display:none\">6 &#2350;&#2361;&#2368;&#2344;&#2375;</span>",
      "<span class=\"eqt\">1 month, but by Rajya Sabha only</span><span class=\"hqt\" style=\"display:none\">1 &#2350;&#2361;&#2368;&#2344;&#2366;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2325;&#2375;&#2357;&#2354; &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The 44th Amendment reduced the initial approval window from two months to one month.</p><p>Approval must be by both Houses by special majority conditions specified.</p><p><b>Further Insights:</b></p><p>- A National Emergency can be proclaimed for war, external aggression, or armed rebellion.</p><p>- Once approved, it lasts for six months and can be extended by further resolutions every six months.</p><p>- A minimum number of Lok Sabha members can requisition a special sitting to consider revocation (post-44th changes).</p><p>- Effects include changes to Centre - State relations and certain impacts on Fundamental Rights.</p>",
    "question_index": 125
  },
  {
    "question": "<span class=\"eqt\"><p>Given below are two statements marked as Assertion and Reason. Choose the correct option.</p><p>Assertion (A): If a country's net factor income from abroad (NFIA) is positive, its GNP (at market prices) will be higher than its GDP (at market prices).</p><p>Reason (R): NFIA equals the value of exports minus the value of imports.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2379; &#2360;&#2381;&#2335;&#2375;&#2335;&#2350;&#2375;&#2306;&#2335; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2366;&#2352;&#2381;&#2325; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2360;&#2361;&#2368; &#2321;&#2346;&#2381;&#2358;&#2344; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2309;&#2327;&#2352; &#2325;&#2367;&#2360;&#2368; &#2342;&#2375;&#2358; &#2325;&#2368; &#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2344;&#2375;&#2335; &#2347;&#2376;&#2325;&#2381;&#2335;&#2352; &#2311;&#2344;&#2325;&#2350; (NFIA) &#2346;&#2377;&#2332;&#2367;&#2335;&#2367;&#2357; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2325;&#2366; GNP (&#2348;&#2366;&#2332;&#2366;&#2352; &#2325;&#2368;&#2350;&#2340;&#2379;&#2306; &#2346;&#2352;) &#2313;&#2360;&#2325;&#2375; GDP (&#2348;&#2366;&#2332;&#2366;&#2352; &#2325;&#2368;&#2350;&#2340;&#2379;&#2306; &#2346;&#2352;) &#2360;&#2375; &#2332;&#2364;&#2381;&#2351;&#2366;&#2342;&#2366; &#2361;&#2379;&#2327;&#2366;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): NFIA &#2319;&#2325;&#2381;&#2360;&#2346;&#2379;&#2352;&#2381;&#2335; &#2325;&#2368; &#2357;&#2376;&#2354;&#2381;&#2351;&#2370; &#2350;&#2375;&#2306; &#2360;&#2375; &#2311;&#2350;&#2381;&#2346;&#2379;&#2352;&#2381;&#2335; &#2325;&#2368; &#2357;&#2376;&#2354;&#2381;&#2351;&#2370; &#2328;&#2335;&#2366;&#2344;&#2375; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A is true: GNP = GDP + NFIA; a positive NFIA makes GNP exceed GDP.</p><p>R is false: NFIA is factor income from abroad minus factor income paid to non-residents; exports minus imports is net exports, not NFIA.</p><p><b>Further Insights:</b></p><p>- India reports GDP at market prices and GVA at basic prices; GDP = sum of GVAs + net product taxes.</p><p>- NFIA covers wages, interest, rent, and profits; remittances are current transfers, not factor income.</p><p>- The National Statistical Office (NSO) under MOSPI compiles national accounts; base year currently 2011 - 12.</p><p>- GDP deflator = (Nominal GDP/Real GDP)  X  100; it captures price movement across the entire economy.</p>",
    "question_index": 126
  },
  {
    "question": "<span class=\"eqt\"><p>Which pass lies near Badrinath and connects Uttarakhand to Tibet, historically used by caravans?</p></span><span class=\"hqt\" style=\"display:none\">&#2348;&#2342;&#2381;&#2352;&#2368;&#2344;&#2366;&#2341; &#2325;&#2375; &#2346;&#2366;&#2360; &#2360;&#2381;&#2341;&#2367;&#2340; &#2357;&#2361; &#2325;&#2380;&#2344; &#2360;&#2366; &#2342;&#2352;&#2381;&#2352;&#2366; &#2361;&#2376; &#2332;&#2379; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2326;&#2306;&#2337; &#2325;&#2379; &#2340;&#2367;&#2348;&#2381;&#2348;&#2340; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2320;&#2340;&#2367;&#2361;&#2366;&#2360;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2366;&#2352;&#2357;&#2366;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2352;&#2361;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Mana Pass</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2344;&#2366; &#2346;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Lipulekh Pass</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2367;&#2346;&#2369;&#2354;&#2375;&#2326; &#2342;&#2352;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Nathu La</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2341;&#2370; &#2354;&#2366;</span>",
      "<span class=\"eqt\">Rohtang Pass</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2379;&#2361;&#2340;&#2366;&#2306;&#2327; &#2342;&#2352;&#2381;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Mana Pass (Dungri La) is close to Badrinath in Uttarakhand and links to Tibet.</p><p>Lipulekh is in eastern Uttarakhand (Pithoragarh), Nathu La is in Sikkim, and Rohtang is in Himachal Pradesh.</p><p><b>Further Insights:</b></p><p>- Niti Pass is another Uttarakhand - Tibet pass but lies northeast of Joshimath.</p><p>- Lipulekh is on the Kailash - Mansarovar route.</p><p>- Rohtang Pass connects Kullu with Lahaul; now bypassed by the Atal Tunnel (Rohtang).</p><p>- High mountain passes were traditional trade routes; strategic roads now follow many of these alignments.</p><p>- Mana Pass altitude is over 5,000 m, making it snowbound in winters.</p>",
    "question_index": 127
  },
  {
    "question": "<span class=\"eqt\"><p>Match the schemes with their launch year.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List-I(Schemes)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List-II(Launch year)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Pradhan Mantri Jan Dhan Yojana (PMJDY)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. 2019</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Pradhan Mantri Ujjwala Yojana (PMUY)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. 2016</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Ayushman Bharat  -  PM-JAY</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. 2018</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. PM-KISAN</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. 2014</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2358;&#2369;&#2349;&#2366;&#2352;&#2306;&#2349; &#2357;&#2352;&#2381;&#2359; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368;-I (&#2351;&#2379;&#2332;&#2344;&#2366;&#2319;&#2306;)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368;-II (&#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2357;&#2352;&#2381;&#2359;)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2332;&#2344; &#2343;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; (PMJDY)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. 2019</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2313;&#2332;&#2381;&#2332;&#2381;&#2357;&#2354;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366; (PMUY)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. 2016</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2310;&#2351;&#2369;&#2359;&#2381;&#2350;&#2366;&#2344; &#2349;&#2366;&#2352;&#2340; - PM-JAY</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. 2018</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2346;&#2368;&#2319;&#2350;-&#2325;&#2367;&#2360;&#2366;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. 2014</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">1-b, 2-d, 3-a, 4-c</span><span class=\"hqt\" style=\"display:none\">1-b, 2-d, 3-a, 4-c</span>",
      "<span class=\"eqt\">1-d, 2-c, 3-b, 4-a</span><span class=\"hqt\" style=\"display:none\">1-d, 2-c, 3-b, 4-a</span>",
      "<span class=\"eqt\">1-a, 2-b, 3-c, 4-d</span><span class=\"hqt\" style=\"display:none\">1-a, 2-b, 3-c, 4-d</span>",
      "<span class=\"eqt\">1-d, 2-b, 3-c, 4-a</span><span class=\"hqt\" style=\"display:none\">1-d, 2-b, 3-c, 4-a</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>PMJDY launched in 2014 (1-d).</p><p>PM Ujjwala launched in 2016 (2-b).</p><p>Ayushman Bharat  -  PM-JAY launched in 2018 (2-c).</p><p>PM-KISAN launched in 2019 (4-a).</p><p><b>Further Insights:</b></p><p>- PMJDY provides basic savings accounts, RuPay card, overdraft facility; accident cover via RuPay.</p><p>- PMUY provides deposit-free LPG connections to eligible women; refill subsidies vary by policy.</p><p>- PM-JAY offers cashless coverage up to Rs 5 lakh per family per year; portability across empanelled hospitals.</p><p>- PM-KISAN provides Rs 6,000/year in three equal installments to eligible landholding farmers.</p><p>- Stand Up India launched in 2016 to promote entrepreneurship among SC/ST and women (bank loans Rs 10 - 100 lakh).</p>",
    "question_index": 128
  },
  {
    "question": "<span class=\"eqt\"><p>Which mineral plays a direct role in blood clotting by enabling activation of several clotting factors?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2326;&#2344;&#2367;&#2332; &#2325;&#2312; &#2341;&#2325;&#2381;&#2325;&#2375; &#2348;&#2344;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2325;&#2379; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2325;&#2352;&#2325;&#2375; &#2352;&#2325;&#2381;&#2340; &#2325;&#2375; &#2341;&#2325;&#2381;&#2325;&#2375; &#2332;&#2350;&#2344;&#2375; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2344;&#2367;&#2349;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Calcium</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2354;&#2381;&#2358;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Sodium</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Potassium</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2335;&#2375;&#2358;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Iron</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2361;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Calcium ions (Factor IV) bridge negatively charged phospholipids and &#947;-carboxyglutamate residues on clotting factors, enabling activation.</p><p>Sodium and potassium are key for fluid balance and nerve impulses; iron is central in hemoglobin, not coagulation.</p><p>Thus calcium is correct.</p><p><b>Further Insights:</b></p><p>- Vitamin K is required for &#947;-carboxylation of factors II, VII, IX, X and proteins C and S.</p><p>- Warfarin inhibits vitamin K recycling, reducing clotting factor activation.</p><p>- Prothrombin is Factor II; fibrinogen is Factor I.</p><p>- Normal serum calcium: about 8.5 - 10.5 mg/dL; hypocalcemia can prolong clotting time.</p>",
    "question_index": 129
  },
  {
    "question": "<span class=\"eqt\"><p>During the booting process, which one of the following looks for system files?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2370;&#2335;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2347;&#2366;&#2311;&#2354; &#2325;&#2368; &#2326;&#2379;&#2332; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">BIOS</span><span class=\"hqt\" style=\"display:none\">BIOS</span>",
      "<span class=\"eqt\">CPU</span><span class=\"hqt\" style=\"display:none\">CPU</span>",
      "<span class=\"eqt\">Monitor</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2377;&#2344;&#2367;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Keyboard</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>BIOS looks for the system files during a boot process. The BIOS is special software that interfaces the major hardware components of your computer with the operating system. It is usually stored on a Flash memory chip on the motherboard, but sometimes the chip is another type of ROM.</p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>Which type of cable is used to connect a computer to a network switch? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2379; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2360;&#2381;&#2357;&#2367;&#2330; &#2360;&#2375; &#2325;&#2344;&#2375;&#2325;&#2381;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2325;&#2375;&#2348;&#2354; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Coaxial cable</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2319;&#2325;&#2381;&#2360;&#2367;&#2309;&#2354; &#2325;&#2375;&#2348;&#2354;</span>",
      "<span class=\"eqt\">Fiber-optic cable</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2366;&#2311;&#2348;&#2352;-&#2321;&#2346;&#2381;&#2335;&#2367;&#2325; &#2325;&#2375;&#2348;&#2354;</span>",
      "<span class=\"eqt\">crossover cable</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2377;&#2360;&#2323;&#2357;&#2352; &#2325;&#2375;&#2348;&#2354;</span>",
      "<span class=\"eqt\">USB cable Solution</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2319;&#2360;&#2348;&#2368; &#2325;&#2375;&#2348;&#2354; &#2360;&#2379;&#2354;&#2381;&#2351;&#2370;&#2358;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>An Ethernet <b>crossover cable</b> is a crossover cable for Ethernet used to connect computing devices together directly. It is most often used to connect two devices of the same type, e.g. two computers (via their network interface controllers) or two switches to each other.</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>What is the process of converting plain text to cipher text?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2354;&#2375;&#2344; &#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2325;&#2379; &#2360;&#2367;&#2347;&#2352; &#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2354;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Encryption</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Decryption</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Decoding</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2325;&#2379;&#2337;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Coding</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2337;&#2367;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Encryption is the process of converting plain text to cipher text, using an encryption algorithm.</p><p>&#183; It is the method by which information is converted into secret code that hides the information's true meaning. </p><p>&#183; In computing, unencrypted data is also known as plaintext, and encrypted data is called ciphertext.</p>",
    "question_index": 132
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following types of virus is also known as spacefiller virus that infects a file using empty sections?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2357;&#2366;&#2351;&#2352;&#2360; &#2325;&#2379; &#2360;&#2381;&#2346;&#2375;&#2360;&#2347;&#2367;&#2354;&#2352; &#2357;&#2366;&#2351;&#2352;&#2360; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2326;&#2366;&#2354;&#2368; &#2309;&#2344;&#2369;&#2349;&#2366;&#2327;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2347;&#2364;&#2366;&#2311;&#2354; &#2325;&#2379; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cavity Virus</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2357;&#2367;&#2335;&#2368; &#2357;&#2366;&#2351;&#2352;&#2360;</span>",
      "<span class=\"eqt\">Void Virus</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2377;&#2311;&#2337; &#2357;&#2366;&#2351;&#2352;&#2360;</span>",
      "<span class=\"eqt\">Overwrite Virus</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2357;&#2352;&#2352;&#2366;&#2312;&#2335; &#2357;&#2366;&#2351;&#2352;&#2360;</span>",
      "<span class=\"eqt\">Resident Virus</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2332;&#2367;&#2337;&#2375;&#2306;&#2335; &#2357;&#2366;&#2351;&#2352;&#2360;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Alternatively referred to as a cavity virus, a spacefiller virus is a rare type of computer virus that tries to install itself by filling in empty sections of a file. By only using empty sections of a file, the virus can infect a file without the size of the file changing, making it more difficult to detect.</p>",
    "question_index": 133
  },
  {
    "question": "<span class=\"eqt\"><p>Which term refers to a small and fleeting error in a system that occurs due to unknown causes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344;-&#2360;&#2366; &#2358;&#2348;&#2381;&#2342; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2350;&#2375;&#2306; &#2319;&#2325; &#2320;&#2360;&#2368; &#2331;&#2379;&#2335;&#2368; &#2324;&#2352; &#2325;&#2381;&#2359;&#2339;&#2367;&#2325; &#2340;&#2381;&#2352;&#2369;&#2335;&#2367; &#2325;&#2379; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2309;&#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2366;&#2352;&#2339;&#2379;&#2306; &#2360;&#2375; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Glitch</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2354;&#2367;&#2330;</span>",
      "<span class=\"eqt\">Hiccup</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2325;&#2381;&#2325;&#2346;</span>",
      "<span class=\"eqt\">Slug</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2354;&#2327;</span>",
      "<span class=\"eqt\">Leech</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2368;&#2330;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A <b>glitch</b>, in technical terms, refers to a small and fleeting error in a system that occurs due to unknown causes. While the actual cause of a glitch is unknown, it can potentially cause serious harm to the system, including power failure, temporary loss of service or data loss.</p>",
    "question_index": 134
  },
  {
    "question": "<span class=\"eqt\"><p>What is called for the unsolicited bulk messages sent through email?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2312;&#2350;&#2375;&#2354; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2349;&#2375;&#2332;&#2375; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2357;&#2366;&#2306;&#2331;&#2367;&#2340; &#2348;&#2354;&#2381;&#2325; &#2360;&#2306;&#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mail Clutter</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2354; &#2325;&#2381;&#2354;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Default Mail</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2347;&#2364;&#2377;&#2354;&#2381;&#2335; &#2350;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Trash Data</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2376;&#2358; &#2337;&#2375;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Email Spam</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2350;&#2375;&#2354; &#2360;&#2381;&#2346;&#2376;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Email spam</b>, also known as junk email, is unsolicited bulk messages sent through email.Spam email is a form of commercial advertising which is economically viable because email is a very cost-effective medium for the sender. If just a fraction of the recipients of a spam message purchase the advertised product, the spammers are making money and the spam problem is perpetuated.</p>",
    "question_index": 135
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1) OS manages CPU scheduling and memory allocation.</p><p>2) OS converts high-level language into machine code.</p><p>3) OS acts as an interface between user and hardware.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2358;&#2375;&#2337;&#2381;&#2351;&#2370;&#2354;&#2367;&#2306;&#2327; &#2324;&#2352; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2310;&#2357;&#2306;&#2335;&#2344; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2313;&#2330;&#2381;&#2330;-&#2360;&#2381;&#2340;&#2352;&#2368;&#2351; &#2349;&#2366;&#2359;&#2366; &#2325;&#2379; &#2350;&#2358;&#2368;&#2344; &#2325;&#2379;&#2337; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2324;&#2352; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2311;&#2306;&#2335;&#2352;&#2347;&#2364;&#2375;&#2360; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Statement 1  -  Correct:</b> One of the primary functions of an Operating System is <b>CPU scheduling</b>, <b>process management</b>, and <b>memory allocation</b> to ensure efficient use of hardware resources.</p><p>&#183; <b>Statement 2  -  Incorrect:</b> Conversion of high-level language into machine code is done by <b>compilers or interpreters</b>, not by the operating system.</p><p>&#183; <b>Statement 3  -  Correct:</b> The OS provides a <b>user - hardware interface</b>, allowing users and applications to interact with hardware without dealing with hardware-level details.</p>",
    "question_index": 136
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was the first electronic computer used for general purposes like solving numerical problems?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2361;&#2354;&#2366; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2367;&#2325; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2341;&#2366; &#2332;&#2367;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351;&#2379;&#2306; &#2332;&#2376;&#2360;&#2375; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2361;&#2354; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">EDVAC</span><span class=\"hqt\" style=\"display:none\">EDVAC</span>",
      "<span class=\"eqt\">EDSAC</span><span class=\"hqt\" style=\"display:none\">EDSAC</span>",
      "<span class=\"eqt\">Mark I</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2352;&#2381;&#2325; I</span>",
      "<span class=\"eqt\">ENIAC</span><span class=\"hqt\" style=\"display:none\">ENIAC</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Electronic Numerical Integrator and Computer, the ENIAC</b> was the first electronic computer used for general purposes, such as solving numerical problems. </p><p>It was invented by John Presper Eckert and John Mauchly.</p><p>The ENIAC was created to help with the war effort against German forces.</p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is <b>NOT </b>a component of the Windows Registry? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2381;&#2352;&#2368; &#2325;&#2366; &#2319;&#2325; &#2328;&#2335;&#2325; <b>&#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">HKEY_CLASSES_ROOT</span><span class=\"hqt\" style=\"display:none\">HKEY_CLASSES_ROOT</span>",
      "<span class=\"eqt\">HKEY_CURRENT_CONFIG</span><span class=\"hqt\" style=\"display:none\">HKEY_CURRENT_CONFIG</span>",
      "<span class=\"eqt\">HKEY_NETWORK</span><span class=\"hqt\" style=\"display:none\">HKEY_NETWORK</span>",
      "<span class=\"eqt\">HKEY_CURRENT_USER</span><span class=\"hqt\" style=\"display:none\">HKEY_CURRENT_USER</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>HKEY_NETWORK</b> is not a component of the Windows Registry. </p><p>The Windows Registry is a hierarchical database that stores configuration settings and other important information for the Windows operating system and installed applications. There are several different types of Windows Registry keys, including:</p><p>HKEY_CLASSES_ROOT: Contains information about registered file types and the applications that can open them.</p><p>HKEY_CURRENT_USER: Contains configuration information for the current user, including settings for the desktop, taskbar, and other personal preferences.</p><p>HKEY_LOCAL_MACHINE: Contains configuration information for the local machine, including settings for hardware, software, and system components.</p><p>HKEY_USERS: Contains configuration information for all user accounts on the system.</p><p>HKEY_CURRENT_CONFIG: Contains information about the current hardware configuration, including settings for devices and drivers.</p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following shortcut key shows the bookmarks in Firefox?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2358;&#2377;&#2352;&#2381;&#2335;&#2325;&#2335; &#2325;&#2368; (key) &#2347;&#2364;&#2366;&#2351;&#2352;&#2347;&#2364;&#2377;&#2325;&#2381;&#2360; &#2350;&#2375;&#2306; &#2348;&#2369;&#2325;&#2350;&#2366;&#2352;&#2381;&#2325; &#2342;&#2367;&#2326;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ctrl + S</span><span class=\"hqt\" style=\"display:none\">Ctrl + S</span>",
      "<span class=\"eqt\">Ctrl + B</span><span class=\"hqt\" style=\"display:none\">Ctrl + B</span>",
      "<span class=\"eqt\">Ctrl + Alt + S</span><span class=\"hqt\" style=\"display:none\">Ctrl + Alt + S</span>",
      "<span class=\"eqt\">Alt + D</span><span class=\"hqt\" style=\"display:none\">Alt + D</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>Ctrl+B </b>keyboard shortcut can serve different purposes depending on the Internet browser. In Firefox and Netscape, Ctrl+B displays the bookmarks. In Internet Explorer, Ctrl+B displays the favorites folder.</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>The System which uses HTTP protocol on Internet is called ____. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2346;&#2352; HTTP &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2379; ____ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Web Server</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2348; &#2360;&#2352;&#2381;&#2357;&#2352;</span>",
      "<span class=\"eqt\">Browser</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2352;</span>",
      "<span class=\"eqt\">HTML</span><span class=\"hqt\" style=\"display:none\">HTML</span>",
      "<span class=\"eqt\">Notepad</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2379;&#2335;&#2346;&#2376;&#2337;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>A web server</b> is software and hardware that uses HTTP (Hypertext Transfer Protocol) and other protocols to respond to client requests made over the World Wide Web. The main job of a web server is to display website content through storing, processing and delivering webpages to users. </p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about magnetic tape:</p><p>1) Magnetic tape is a sequential access storage medium.</p><p>2) Magnetic tape allows faster random access to data than hard disks.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2335;&#2375;&#2346; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2335;&#2375;&#2346; &#2319;&#2325; &#2309;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2361;&#2376;&#2404;</p><p>2) &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2335;&#2375;&#2346; &#2361;&#2366;&#2352;&#2381;&#2337; &#2337;&#2367;&#2360;&#2381;&#2325; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2337;&#2375;&#2335;&#2366; &#2340;&#2325; &#2340;&#2375;&#2332;&#2364; &#2351;&#2366;&#2342;&#2371;&#2330;&#2381;&#2331;&#2367;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Solution:</b></p><p>&#183; <b>Statement 1  -  Correct:</b> Magnetic tape stores data sequentially, so data must be read in order.</p><p>&#183; <b>Statement 2  -  Incorrect:</b> Random access is very slow in magnetic tape compared to hard disks; hence it is mainly used for backups and archival storage.</p>",
    "question_index": 141
  },

  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is the most common form of IP addressing?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; IP &#2319;&#2337;&#2381;&#2352;&#2375;&#2360;&#2367;&#2306;&#2327; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2352;&#2370;&#2346; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Broadcast Address</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2377;&#2337;&#2325;&#2366;&#2360;&#2381;&#2335; &#2319;&#2337;&#2381;&#2352;&#2375;&#2360;</span>",
      "<span class=\"eqt\">Unicast Address</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2344;&#2367;&#2325;&#2366;&#2360;&#2381;&#2335; &#2319;&#2337;&#2381;&#2352;&#2375;&#2360;</span>",
      "<span class=\"eqt\">Multicast Address</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2354;&#2381;&#2335;&#2368;&#2325;&#2366;&#2360;&#2381;&#2335; &#2319;&#2337;&#2381;&#2352;&#2375;&#2360;</span>",
      "<span class=\"eqt\">Podcast Address</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2377;&#2337;&#2325;&#2366;&#2360;&#2381;&#2335; &#2319;&#2337;&#2381;&#2352;&#2375;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>A unicast address</b> is an address that identifies a unique node on a network. Unicast addressing is available in IPv4 and Ipv6 and typically refers to a single sender or a single receiver, although it can be used in both sending and receiving.</p><p><b>Unicast</b> is the most common form of IP addressing.</p>",
    "question_index": 143
  },
  {
    "question": "<span class=\"eqt\"><p>The multiprocessing systems often use a single processing unit to link which of the following terminals?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2335;&#2352;&#2381;&#2350;&#2367;&#2344;&#2354; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2354;&#2381;&#2335;&#2368;&#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2309;&#2325;&#2381;&#2360;&#2352; &#2319;&#2325;&#2354; &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2367;&#2306;&#2327; &#2351;&#2370;&#2344;&#2367;&#2335; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Dumb terminal</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2306;&#2348; &#2335;&#2352;&#2381;&#2350;&#2367;&#2344;&#2354;</span>",
      "<span class=\"eqt\">Assisted terminal</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2367;&#2360;&#2381;&#2335;&#2375;&#2337; &#2335;&#2352;&#2381;&#2350;&#2367;&#2344;&#2354;</span>",
      "<span class=\"eqt\">Access terminal</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2335;&#2352;&#2381;&#2350;&#2367;&#2344;&#2354;</span>",
      "<span class=\"eqt\">Terminal</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2352;&#2381;&#2350;&#2367;&#2344;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The multiprocessing systems often use a single processing unit to link <b>Dumb terminal</b>.</p><p>Dumb terminal is a display device that is used for any other purpose than processing data. It can only accept data from the CPU but it does not have any processing capability. In this regard, multi processing systems often use a single processing unit to link multiple dumb terminals so that all the systems can work simultaneously.</p>",
    "question_index": 144
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement regarding LAN is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>LAN &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Installation cost is low.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2354;&#2366;&#2327;&#2340; (&#2311;&#2306;&#2360;&#2381;&#2335;&#2377;&#2354;&#2375;&#2358;&#2344; &#2325;&#2377;&#2360;&#2381;&#2335;) &#2325;&#2350; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Communication range is upto 10 Km</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2368; &#2360;&#2306;&#2330;&#2366;&#2352; &#2360;&#2368;&#2350;&#2366; 10 Km &#2340;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Data rate is relatively faster</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2335;&#2366; &#2325;&#2368; &#2342;&#2352; &#2309;&#2346;&#2375;&#2325;&#2381;&#2359;&#2366;&#2325;&#2371;&#2340; &#2340;&#2375;&#2332; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>LAN stands for Loan Area Network, a communication network (generally a private network) that connects computers and devices within a limited area like, office, residence. etc. Its range is upto 10 Km and speed is upto 10-100 Mbps. It comes with low installation cost and high security features as compared to other communication models.</p><p>The area covered by LAN is limited and when the number of nodes in the network nodes increases, performance Decreases.</p>",
    "question_index": 145
  },
  {

    "question": "<span class=\"eqt\"><p>In the H-Lookup function of MS Excel, H stands for?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2325;&#2375; H-&#2354;&#2369;&#2325;&#2309;&#2346; &#2347;&#2306;&#2325;&#2381;&#2358;&#2344; &#2350;&#2375;&#2306;, H &#2325;&#2366; &#2346;&#2370;&#2352;&#2381;&#2339; &#2352;&#2370;&#2346; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

  {
    "question": "<span class=\"eqt\"><p>What is the purpose of a cache in a web browser? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2375;&#2348; &#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2352; &#2350;&#2375;&#2306; &#2325;&#2376;&#2358; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To display pop-up ads on web pages</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2348; &#2346;&#2371;&#2359;&#2381;&#2336;&#2379;&#2306; &#2346;&#2352; &#2346;&#2377;&#2346;-&#2309;&#2346; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2346;&#2344; &#2337;&#2367;&#2360;&#2381;&#2346;&#2381;&#2354;&#2375; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">for faster loading times it stores copies of web pages that have been accessed recently</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2375;&#2332;&#2368; &#2360;&#2375; &#2354;&#2379;&#2337; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2360;&#2350;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2351;&#2361; &#2313;&#2344; &#2357;&#2375;&#2348; &#2346;&#2375;&#2332;&#2379;&#2306; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2351;&#2366;&#2306; &#2360;&#2381;&#2335;&#2379;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2361;&#2366;&#2354; &#2361;&#2368; &#2350;&#2375;&#2306; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">it protects your computer from viruses and malware</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2310;&#2346;&#2325;&#2375; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2379; &#2357;&#2366;&#2351;&#2352;&#2360; &#2324;&#2352; &#2350;&#2376;&#2354;&#2357;&#2375;&#2351;&#2352; &#2360;&#2375; &#2348;&#2330;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">To manage and store your passwords for different websites</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2346;&#2344;&#2375; &#2346;&#2366;&#2360;&#2357;&#2352;&#2381;&#2337; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2367;&#2340; &#2324;&#2352; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>For faster loading times it stores copies of web pages that have been accessed recently.</p><p>A cache is a type of temporary storage used by web browsers to store copies of web pages that have been accessed recently. This allows the browser to load the page more quickly the next time it is accessed, as it can retrieve the page from the cache rather than downloading it again. </p>",
    "question_index": 148
  },
