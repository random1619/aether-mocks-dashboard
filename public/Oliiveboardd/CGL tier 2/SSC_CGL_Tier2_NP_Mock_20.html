        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Rupesh purchased raw materials for a certain price to manufacture a product. However, due to labor shortage, 27.5% of the raw materials could not be utilized and was wasted. 60% of the cost of raw materials used was added as the manufacturing cost. If Rupesh could sell his product at a price to earn an overall profit of 40% after offering a discount of 20%, how many times (round off 3 decimal places) the total cost of the raw materials purchased was the marked price of the product?</p></span><span class=\"hqt\" style=\"display:none\">&#2352;&#2370;&#2346;&#2375;&#2358; &#2344;&#2375; &#2319;&#2325; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2368;&#2350;&#2340; &#2346;&#2352; &#2325;&#2330;&#2381;&#2330;&#2366; &#2350;&#2366;&#2354; &#2326;&#2352;&#2368;&#2342;&#2366;&#2404; &#2361;&#2366;&#2354;&#2366;&#2306;&#2325;&#2367;, &#2358;&#2381;&#2352;&#2350; &#2325;&#2368; &#2325;&#2350;&#2368; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339;, 27.5% &#2325;&#2330;&#2381;&#2330;&#2366; &#2350;&#2366;&#2354; &#2313;&#2346;&#2351;&#2379;&#2327; &#2350;&#2375;&#2306; &#2344;&#2361;&#2368;&#2306; &#2310; &#2360;&#2325;&#2366; &#2324;&#2352; &#2348;&#2352;&#2381;&#2348;&#2366;&#2342; &#2361;&#2379; &#2327;&#2351;&#2366;&#2404; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2319; &#2327;&#2319; &#2325;&#2330;&#2381;&#2330;&#2375; &#2350;&#2366;&#2354; &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; &#2325;&#2366; 60% &#2357;&#2367;&#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2354;&#2366;&#2327;&#2340; &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2352;&#2370;&#2346;&#2375;&#2358; &#2309;&#2346;&#2344;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2325;&#2379; 20% &#2325;&#2368; &#2331;&#2370;&#2335; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; 40% &#2325;&#2366; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; &#2325;&#2350;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2375;&#2330; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2326;&#2352;&#2368;&#2342;&#2375; &#2327;&#2319; &#2325;&#2330;&#2381;&#2330;&#2375; &#2350;&#2366;&#2354; &#2325;&#2368; &#2325;&#2369;&#2354; &#2354;&#2366;&#2327;&#2340; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2325;&#2375; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2375; &#2327;&#2369;&#2344;&#2366; &#2361;&#2376; (3 &#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2340;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;)?</span>",
    "options": [
      "<span class=\"eqt\">2.511</span><span class=\"hqt\" style=\"display:none\">2.511</span>",
      "<span class=\"eqt\">2.421</span><span class=\"hqt\" style=\"display:none\">2.421</span>",
      "<span class=\"eqt\">2.342</span><span class=\"hqt\" style=\"display:none\">2.342</span>",
      "<span class=\"eqt\">2.652</span><span class=\"hqt\" style=\"display:none\">2.652</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let Rupesh purchase 100 kg of raw material at Rs. 1 per kg.</p><p>Total C.P = 100 * 1 = Rs. 100</p><p>C.P of used raw material = 100 * 72.5/100 = Rs. 72.5 </p><p>Manufacturing cost = 100 + (72.5 * 60/100) = Rs. 143.5 </p><p>S.P = 143.5 * 140/100 = Rs. 200.9</p><p>M.P = 200.9 * 100/80 = Rs. 251.125 </p><p>Hence, the required value = 251.125/100 = 2.511</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In a cohort, 70% passed Quantitative Aptitude, 45% passed General Intelligence, and 20% failed both subjects. If a student is known to have passed Quantitative Aptitude, find the probability that the student also passed General Intelligence.</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306;, 70% &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2344;&#2375; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2351;&#2379;&#2327;&#2381;&#2351;&#2340;&#2366; (&#2325;&#2381;&#2357;&#2366;&#2306;&#2335;&#2367;&#2335;&#2375;&#2335;&#2367;&#2357; &#2319;&#2346;&#2381;&#2335;&#2368;&#2335;&#2381;&#2351;&#2370;&#2337;) &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2368;, 45% &#2344;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2348;&#2369;&#2342;&#2381;&#2343;&#2367;&#2350;&#2340;&#2381;&#2340;&#2366; (&#2332;&#2344;&#2352;&#2354; &#2311;&#2306;&#2335;&#2375;&#2354;&#2367;&#2332;&#2375;&#2306;&#2360;) &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2368; &#2324;&#2352; 20% &#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2367;&#2359;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2361;&#2379; &#2327;&#2319;&#2404; &#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2331;&#2366;&#2340;&#2381;&#2352; &#2344;&#2375; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2351;&#2379;&#2327;&#2381;&#2351;&#2340;&#2366; (&#2325;&#2381;&#2357;&#2366;&#2306;&#2335;&#2367;&#2335;&#2375;&#2335;&#2367;&#2357; &#2319;&#2346;&#2381;&#2335;&#2368;&#2335;&#2381;&#2351;&#2370;&#2337;) &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2354;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360; &#2348;&#2366;&#2340; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2331;&#2366;&#2340;&#2381;&#2352; &#2344;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2348;&#2369;&#2342;&#2381;&#2343;&#2367;&#2350;&#2340;&#2381;&#2340;&#2366; (&#2332;&#2344;&#2352;&#2354; &#2311;&#2306;&#2335;&#2375;&#2354;&#2367;&#2332;&#2375;&#2306;&#2360;) &#2350;&#2375;&#2306; &#2349;&#2368; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2354;&#2368; &#2361;&#2379;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">0.65</span><span class=\"hqt\" style=\"display:none\">0.65</span>",
      "<span class=\"eqt\">0.40</span><span class=\"hqt\" style=\"display:none\">0.40</span>",
      "<span class=\"eqt\">0.55</span><span class=\"hqt\" style=\"display:none\">0.55</span>",
      "<span class=\"eqt\">0.50</span><span class=\"hqt\" style=\"display:none\">0.50</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let Q = \"student passed Quantitative Aptitude\"</p><p>Let G = \"student passed General Intelligence\"</p><p>We need P(G | Q) = P(Q &#8745; G) / P(Q)</p><p>P(Q) = 70% = 0.70</p><p>P(G) = 45% = 0.45</p><p>P(failed both) = 20% = 0.20</p><p>So, P(Q &#8746; G) = 1  -  0.20 = 0.80</p><p>Using formula,</p><p>P(Q &#8746; G) = P(Q) + P(G)  -  P(Q &#8745; G)</p><p>0.80 = 0.70 + 0.45  -  P(Q &#8745; G)</p><p>0.80 = 1.15  -  P(Q &#8745; G)</p><p>P(Q &#8745; G) = 1.15  -  0.80 = 0.35</p><p>Now,</p><p>P(G | Q) = P(Q &#8745; G) / P(Q) = 0.35 / 0.70 = 0.50</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A person distributed 860 chocolates among four friends A, B, C, and D. If the ratio of chocolates received by A to B is 2: 3, C to D is 4: 5, and B to C is 15:8, then the chocolates received by B is how much more than that received by D?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2330;&#2366;&#2352; &#2350;&#2367;&#2340;&#2381;&#2352;&#2379;&#2306; A, B, C &#2324;&#2352; D &#2350;&#2375;&#2306; 860 &#2330;&#2377;&#2325;&#2354;&#2375;&#2335; &#2348;&#2366;&#2306;&#2335;&#2368;&#2306;&#2404; &#2351;&#2342;&#2367; A &#2324;&#2352; B &#2325;&#2379; &#2350;&#2367;&#2354;&#2368; &#2330;&#2377;&#2325;&#2354;&#2375;&#2335; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2:3 &#2361;&#2376;, C &#2324;&#2352; D &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 4:5 &#2361;&#2376;, &#2324;&#2352; B &#2324;&#2352; C &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 15:8 &#2361;&#2376;, &#2340;&#2379; B &#2325;&#2379; &#2350;&#2367;&#2354;&#2368; &#2330;&#2377;&#2325;&#2354;&#2375;&#2335; D &#2325;&#2379; &#2350;&#2367;&#2354;&#2368; &#2330;&#2377;&#2325;&#2354;&#2375;&#2335; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">80</span><span class=\"hqt\" style=\"display:none\">80</span>",
      "<span class=\"eqt\">100</span><span class=\"hqt\" style=\"display:none\">100</span>",
      "<span class=\"eqt\">120</span><span class=\"hqt\" style=\"display:none\">120</span>",
      "<span class=\"eqt\">90</span><span class=\"hqt\" style=\"display:none\">90</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The ratio of chocolates received by A: B: C: D = 2*5: 3*5: 4*2: 5*2</p><p>= 10: 15: 8: 10</p><p>Hence, the required value = 860 * (15  -  10)/(10 + 15 + 8 + 10)</p><p>= 100</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A invests &#8377;20 000 for 6 months, B invests &#8377;30 000 for 4 months, and C invests &#8377;25 000 for 5 months. In what ratio will they share the profit?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#8377;20,000 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; 6 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, B &#8377;30,000 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; 4 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; C &#8377;25,000 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; 5 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2375; &#2354;&#2366;&#2349; &#2325;&#2379; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2348;&#2366;&#2305;&#2335;&#2375;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">24 : 24 : 25</span><span class=\"hqt\" style=\"display:none\">24 : 24 : 25</span>",
      "<span class=\"eqt\">4 : 4 : 5</span><span class=\"hqt\" style=\"display:none\">4 : 4 : 5</span>",
      "<span class=\"eqt\">96 : 120 : 125</span><span class=\"hqt\" style=\"display:none\">96 : 120 : 125</span>",
      "<span class=\"eqt\">8 : 10 : 10</span><span class=\"hqt\" style=\"display:none\">8 : 10 : 10</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Capital X time: A = 20 000 X 6 = 120 000, B = 30 000 X 4 = 120 000, C = 25 000 X 5 = 125 000</p><p>Ratio = 120 000 : 120 000 : 125 000 = 24 : 24 : 25</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A student got 112 marks in English, 132 marks in Hindi, 108 marks in Biology, and 126 marks in Maths. If the maximum marks of each subject are 160, then find the overall percentage of marks get.</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2331;&#2366;&#2340;&#2381;&#2352; &#2325;&#2379; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2350;&#2375;&#2306; 112 &#2309;&#2306;&#2325;, &#2361;&#2367;&#2306;&#2342;&#2368; &#2350;&#2375;&#2306; 132 &#2309;&#2306;&#2325;, &#2332;&#2368;&#2357; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2350;&#2375;&#2306; 108 &#2309;&#2306;&#2325; &#2324;&#2352; &#2327;&#2339;&#2367;&#2340; &#2350;&#2375;&#2306; 126 &#2309;&#2306;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2319;&#2404; &#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2367;&#2359;&#2351; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2309;&#2306;&#2325; 160 &#2361;&#2376;&#2306;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">74.68%</span><span class=\"hqt\" style=\"display:none\">74.68%</span>",
      "<span class=\"eqt\">78.84%</span><span class=\"hqt\" style=\"display:none\">78.84%</span>",
      "<span class=\"eqt\">72.96%</span><span class=\"hqt\" style=\"display:none\">72.96%</span>",
      "<span class=\"eqt\">76.16%</span><span class=\"hqt\" style=\"display:none\">76.16%</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Total marks = 112 + 132 + 108 + 126</p><p>= 478</p><p>Hence, the required percentage = 478 * 100/ (160 * 4) = 74.68%</p>",

  {
    "question": "<span class=\"eqt\"><p>The length and breadth of the base of regular pyramid with rectangular base is 36 cm, and 14 cm, respectively. If the slant height of the pyramid is 24 cm, then what is the lateral surface area of the regular pyramid?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2310;&#2343;&#2366;&#2352; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2360;&#2350; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 36 cm &#2324;&#2352; 14 cm &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2368; &#2340;&#2367;&#2352;&#2381;&#2351;&#2325; &#2314;&#2305;&#2330;&#2366;&#2312; 24 cm &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2366; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p><img width=231 height=244 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20135/image004.jpg\"></p><p>Tan 30&deg; = y/150</p><p>=&gt; 1/&radic;3 = y/150</p><p>=&gt; y = 150/&radic;3</p><p>And tan 45&deg; = (x + y)/150</p><p>=&gt; 150 = x + 150/&radic;3</p><p>=&gt; x = 150  -  150/&radic;3 = 150(1  -  1/&radic;3)</p><p>=&gt; x = 150(&radic;3  -  1)/&radic;3</p>",

    "question": "<span class=\"eqt\"><p>The three sides of a triangle are 6, 8 and 12. Which of the following is not true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2368; &#2340;&#2368;&#2344; &#2349;&#2369;&#2332;&#2366;&#2319;&#2306; 6,8 &#2324;&#2352; 12 &#2361;&#2376;&#2306;, &#2311;&#2344;&#2350;&#2375; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2340;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The triangle is not a right angled triangle.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2319;&#2325; &#2360;&#2350;&#2325;&#2379;&#2339; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The triangle is an acute angled triangle.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2319;&#2325; &#2344;&#2381;&#2351;&#2370;&#2344; &#2325;&#2379;&#2339; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Two angles of the triangle are acute.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2375; &#2342;&#2379; &#2325;&#2379;&#2339; &#2344;&#2381;&#2351;&#2370;&#2344; &#2325;&#2379;&#2339; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">One angle of the triangle is obtuse.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2366; &#2319;&#2325; &#2325;&#2379;&#2339; &#2309;&#2343;&#2367;&#2325; &#2325;&#2379;&#2339; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The three sides of the triangle are 6, 8 and 12.</p><p>6<sup>2</sup> = 36</p><p>8<sup>2</sup> = 64</p><p>12<sup>2</sup> = 144</p><p>So 12<sup>2</sup> &gt; 64 + 36</p><p>144 &gt; 100</p><p>=&gt; The angle opposite to the side 12m is obtuse i.e &gt; 90 degrees.</p><p>=&gt; The triangle is obtuse angled.</p><p>=&gt; Option 4 is true.</p><p>=&gt; Option 1 is true.</p><p>=&gt; Option 3 is true, because if one angle is obtuse then the other two angles will be acute.</p><p>Option 2 is not true, because any triangle is called acute angled triangle only when all three of its angles are acute.</p>",

    "question": "<span class=\"eqt\"><p>Rahim goes from A to B with a speed of 60 km/h while coming back from B to A he passed through C. His speed from B to C is 30 km/h while from C to A his speed is 45 km/h (AC = BC), then find average speed of Rahim.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2361;&#2368;&#2350; A &#2360;&#2375; B &#2340;&#2325; 60 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; B &#2360;&#2375; A &#2357;&#2366;&#2346;&#2360; &#2310;&#2340;&#2375; &#2360;&#2350;&#2351; &#2357;&#2361; C &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; B &#2360;&#2375; C &#2340;&#2325; &#2313;&#2360;&#2325;&#2368; &#2327;&#2340;&#2367; 30 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; C &#2360;&#2375; A &#2340;&#2325; &#2313;&#2360;&#2325;&#2368; &#2327;&#2340;&#2367; 45 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; (AC = BC) &#2361;&#2376;, &#2347;&#2367;&#2352; &#2352;&#2361;&#2368;&#2350; &#2325;&#2368; &#2324;&#2360;&#2340; &#2327;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">39 km/h</span><span class=\"hqt\" style=\"display:none\">39 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">48 km/h</span><span class=\"hqt\" style=\"display:none\">48 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">42 km/h</span><span class=\"hqt\" style=\"display:none\">42 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">45 km/h</span><span class=\"hqt\" style=\"display:none\">45 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let AB = 2x</p><p>AC = BC = x</p><p>Average speed = Total distance/Total time</p><p>Total distance = AB + BC + AC = 2x + x + x = 4x</p><p><img width=319 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11720/image001.png\"></p><p>Average speed = 4x/(16x/180)</p><p>= 45 km/h</p>",
    "question_index": 29
  },

    "question": "<span class=\"eqt\"><p>In the following question, the symbols @, #, $, &copy; and % are used with the following meaning as illustrated below:</p><p>P @ Q =&gt; P &ge; Q</p><p>P # Q =&gt; P &le; Q</p><p>P $ Q =&gt; P &lt; Q</p><p>P &copy; Q =&gt; P &gt; Q</p><p>P % Q =&gt; P = Q</p><p>Assuming the given statements to be true, find which of the conclusion(s) is/are definitely true.</p><p>Statements:</p><p>L # M</p><p>M % N</p><p>N &copy; O</p><p>Conclusions:</p><p>I. L @ O</p><p>II. M &copy; O</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, @, #, $, &copy; &#2324;&#2352; % &#2346;&#2381;&#2352;&#2340;&#2368;&#2325;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2352;&#2381;&#2341;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;:</p><p>P @ Q =&gt; P &ge; Q</p><p>P # Q =&gt; P &le; Q</p><p>P $ Q =&gt; P &lt; Q</p><p>P &copy; Q =&gt; P &gt; Q</p><p>P % Q =&gt; P = Q</p><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>L # M</p><p>M % N</p><p>N &copy; O</p><p>&#2344;&#2367;&#2359;&#2381;&#2       "<span class=\"eqt\">Only conclusion II follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2361;&#2368; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",

    "question": "<span class=\"eqt\"><p>A school decides to reduce the number of high-pressure examinations and focus more on continuous assessment to minimize student stress and improve learning outcomes. Which of the following would be the most logical assumption underlying this decision?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; &#2344;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2340;&#2344;&#2366;&#2357; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2360;&#2368;&#2326;&#2344;&#2375; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2354;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2330;&#2381;&#2330; &#2342;&#2348;&#2366;&#2357; &#2357;&#2366;&#2354;&#2368; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2360;&#2340;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2346;&#2352; &#2309;&#2343;&#2367;&#2325; &#2343;&#2381;&#2351;&#2366;&#2344; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2354;&#2367;&#2351;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2311;&#2360; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2310;&#2343;&#2366;&#2352; &#2361;&#2379;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Students generally dislike appearing for formal examinations.</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2366;&#2340;&#2381;&#2352; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2324;&#2346;&#2330;&#2366;&#2352;&#2367;&#2325; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2348;&#2376;&#2336;&#2344;&#2375; &#2360;&#2375; &#2325;&#2340;&#2352;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Traditional examinations do not measure intelligence at all.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2306;&#2346;&#2352;&#2366;&#2327;&#2340; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366;&#2319;&#2306; &#2348;&#2369;&#2342;&#2381;&#2343;&#2367;&#2350;&#2340;&#2381;&#2340;&#2366; &#2325;&#2366; &#2350;&#2366;&#2346;&#2344; &#2348;&#2367;&#2354;&#2381;&#2325;&#2369;&#2354; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2368;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Continuous assessment helps lower stress levels and supports better understanding of subjects.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2306;&#2340;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2340;&#2344;&#2366;&#2357; &#2325;&#2375; &#2360;&#2381;&#2340;&#2352; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2357;&#2367;&#2359;&#2351;&#2379;&#2306; &#2325;&#2368; &#2348;&#2375;&#2361;&#2340;&#2352; &#2360;&#2350;&#2333; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Teachers are unwilling to conduct frequent evaluations.</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2325;&#2381;&#2359;&#2325; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2311;&#2330;&#2381;&#2331;&#2369;&#2325; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;&#2404;</span>"

    "correct_option_id": 2,
    "solution": "<p>Option (a): While true for some students, dislike is not the main factor driving the policy. The aim is stress reduction and learning improvement. So, option (a) is incorrect.</p><p>Option (b): This is an extreme assumption. The school is not rejecting exams completely, just reducing high-pressure ones. So, option (b) is incorrect.</p><p>Option (c): The school assumes that replacing high-pressure exams with ongoing assessment will reduce stress and improve comprehension, which is the core reasoning. So, <b>option (c)</b> is correct.</p><p>Option (d): Teacher preference is irrelevant; the policy is student-focused. So, option (d) is incorrect.</p>",

    "question": "<span class=\"eqt\"><p>Some problem or solution of the problem is given in the statement. You have to choose the appropriate logical deduction for given statement.</p><p>Statement:</p><p>A city piloted a congestion fee on one central corridor during peak hours. Traffic volume on that corridor dropped, and average travel speed improved in the same weeks. However, many commuters shifted to parallel local roads, creating new bottlenecks there. Planners recommend expanding feeder buses and adjusting signal timings on parallel routes to prevent spillover congestion.</p><p>Conclusions:</p><p>I. A congestion fee can reduce traffic volume on the charged corridor.</p><p>II. Improving feeder buses and signals can help manage congestion shifted to nearby roads.</p><p>III. If a congestion fee is introduced, congestion will reduce everywhere in the city.</p><p>Which conclusion(s) necessarily follow(s)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2325;&#2379;&#2312; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2351;&#2366; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2325;&#2366; &#2360;&#2350;&#2366;&#2343;&#2366;&#2344; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2310;&#2346;&#2325;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2330;&#2369;&#2344;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>&#2319;&#2325; &#2358;&#2361;&#2352; &#2344;&#2375; &#2357;&#2381;&#2351;&#2360;&#2381;&#2340; &#2360;&#2350;&#2351; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2319;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2327;&#2354;&#2367;&#2351;&#2366;&#2352;&#2375; &#2346;&#2352; &#2349;&#2368;&#2337;&#2364;&#2349;&#2366;&#23 ;&#2376;&#2306;?</p></span>",

    "question": "<span class=\"eqt\"><p>Some problem or solution of the problem is given in the statement. You have to choose the appropriate logical deduction for given statement.</p><p>Statement:</p><p>A city implemented smart signal coordination on a busy corridor. Average waiting time at signals reduced, but pollution near key intersections did not reduce much because heavy trucks continued idling for long periods at loading points nearby. Experts recommend enforcing no-idling rules and rerouting freight loading to off-peak windows to reduce hotspot emissions.</p><p>Conclusions:</p><p>I. Better signal coordination can reduce waiting time at signals.</p><p>II. Enforcing no-idling and managing freight loading times can help reduce intersection pollution hotspots.</p><p>III. Reducing signal waiting time guarantees a large fall in intersection pollution.</p><p>Which conclusion(s) necessarily follow(s)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2325;&#2379;&#2312; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2351;&#2366; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2325;&#2366; &#2360;&#2350;&#2366;&#2343;&#2366;&#2344; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2310;&#2346;&#2325;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2330;&#2369;&#2344;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>&#2319;&#2325; &#2358;&#2361;&#2352; &#2344;&#2375; &#2319;&#2325; &#2357;&#2381;&#2351;&#2360;&#2381;&#2340; &#2327;&#2354;&#2367;&#2351;&#2366;&#2352;&#2375; &#2346;&#2352; &#2360;&#2381;&#2350;&#2366;&#2352;&#2381;&#2335; &#2360;&#2367;&#2327;&#2381;&#2344;&#2354; &#2360;&#2350;&#2344;&#2381;&#2357;&#2351; &#2354;&#2366;&#2327;&#2370; &#2325;&#2367;&     "comp": "<p><b>Directions :</b>   Read the following passage and answer the questions based on the passage:</p><p>In contemporary debates on urban development, the resurgence of public spaces has emerged as a critical counterweight to data-driven \"smart city\" paradigms. While digital infrastructures promise efficiency through surveillance systems, algorithmic traffic management, and sensor-based utilities, critics argue that such approaches often marginalize the social textures that make cities habitable. Public spaces such as parks, libraries, sidewalks, and marketplaces function not merely as physical infrastructures but as arenas of civic interaction, cultural expression, and informal economic exchange. Their value lies less in quantifiable outputs and more in the intangible networks of trust, belonging, and shared identity they foster.</p><p>Historically, urban commons evolved organically, shaped by patterns of human congregation rather than centralized planning. These spaces enabled spontaneous encounters across socio-economic strata, facilitating what urban theorists describe as \"social permeability.\" In contrast, hyper-optimized smart city models tend to prioritize predictability, efficiency, and control, frequently resulting in environments that are technologically sophisticated yet socially fragmented. The emphasis on optimization can inadvertently suppress the improvisational and pluralistic character of urban life, rendering cities functionally efficient but experientially impoverished.</p><p>Moreover, the governance of public spaces plays a decisive role in determining their inclusivity. When management is devolved to private entities or governed by rigid regulatory frameworks, access is often conditioned by surveillance, consumption, or behavioral conformity. Such arrangements risk transforming commons into quasi-private zones, where participation is subtly restricted. Conversely, municipally supported and community-governed spaces tend to encourage diverse forms of use, from political assembly to leisure, thereby reinforcing democratic engagement. This distinction underscores that the question is not merely one of spatial design but of institutional intent and civic philosophy.</p><p>Empirical studies in urban sociology indicate that neighborhoods with accessible and well-maintained public spaces demonstrate higher levels of social cohesion, lower crime perception, and improved mental well-being among residents. These outcomes are attributed to repeated face-to-face interactions and a sense of collective ownership that discourages neglect and alienation. Importantly, such benefits often accrue independently of advanced technological interventions, suggesting that social infrastructure can be as consequential as digital infrastructure in shaping urban resilience.</p><p>Consequently, a growing body of urban scholarship advocates for a recalibration of development priorities, wherein technological innovation is subordinated to, rather than substituted for, human-centered design. This approach does not reject smart technologies outright but situates them within a broader framework that acknowledges cities as lived environments rather than abstract systems. In an era marked by rapid urbanization and increasing social polarization, the revitalization of public spaces emerges as a pragmatic strategy for cultivating inclusive, adaptive, and socially sustainable cities.</p>",

      "Qualitative adjective",
      "Distributive adjective"

    "correct_option_id": 2,

    "question": "<p>Select the most appropriate option to fill in the blank. </p><p>By the time the sun sets, we ______ the summit of the mountain.</p>",
    "options": [
      "Will have reaching",
      "Reaching",
      "Will reached",
      "Will have reached"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most appropriate option to fill in the blank is 'will have reached'. \"Will have reached\" is the future perfect tense. The future perfect tense is used to emphasise the completion of an action before another future event or time. In the given sentence, it indicates that the action of reaching the summit of the mountain will be completed before a specified future time (by the time the sun sets).</p><p>Option (a) is not correct because it uses an incorrect verb form for the future perfect tense. When forming the future perfect tense, the verb \"have\" is followed by the past participle form of the main verb. The past participle form of \"reach\" is \"reached.\" Therefore, the correct form of the verb should be \"will have reached\" instead of \"will have reaching.\"</p><p>Option (b) is incomplete and grammatically incorrect. It lacks a helping verb such as \"will\" to form a complete verb phrase. Additionally, the present participle \"reaching\" on its own does not convey the future perfect tense required in the sentence.</p><p>Option (c) is incorrect because it does not use the correct structure for forming the future perfect tense. The future perfect tense is formed with the auxiliary verb \"will have\" followed by the past participle form of the main verb.</p><p>Complete sentence: By the time the sun sets, we will have reached the summit of the mountain.</p><p>Hence, (d) is the correct answer.</p><p>Note:</p><p><b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 70
  },

    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>You enjoy playing video games, _________?</p>",
    "options": [
      "Aren't you",
      "Don't you",
      "Hasn't you",
      "Do you"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct option to fill in the blank is 'don't you'. When the main sentence/clause is positive, the question tag should be negative, and vice versa. In the given case, the main sentence/clause is positive. Therefore, the question tag should be negative. Also, if the main clause lacks an auxiliary verb (be, have etc.), a suitable form of \"do\" (does, do, did) is introduced in the question tag. Accordingly, option (b) is the correct choice as it maintains the opposite polarity (positive main sentence, negative question tag) and uses the appropriate form of 'do.'</p><p>Options (a) and (c) are not correct as they do not adhere to the grammatical rules. In the given sentence, there is no auxiliary verb. Accordingly, a suitable form of 'do' (does, do, did) should be used (not aren't or hasn't).</p><p>Option (d) is also not correct because it does not adhere to the grammatical rule that a positive main clause should have a negative question tag ('do you' is again positive).</p><p>Hence, (b) is the correct answer.</p><p><b>The complete sentence is: </b>\"You enjoy playing video games, don't you?\" </p><p><b>NOTE:</b></p><p>Auxiliary verb: A verb that gives grammatical information that is not given by the main verb of a sentence. It supports the main verb. Auxiliary verbs help to form the various tenses, moods, and voices of other verbs. The principal ones are be, do, and have. Example: She will sing a song tomorrow. Here, 'will' is the auxiliary verb that supports the main verb 'sing'.</p><p><b>\"Clause: </b>A clause is a group of words that contains a verb (and usually other components too). A clause may form part of a sentence, or it may be a complete sentence in itself. Example: </p><p>I. \"His products weren't selling\"; this is an example of a sentence containing one clause. </p><p>II. \"After we had had dinner, we went for a walk\"; here, the sentence contains two clauses that are separated by a comma.</p><p>A clause can be categorised as: </p><p>I. Main/independent clause</p><p>II. Subordinate/dependent clause</p><p><b>Main/independent clause:</b> In the example 2 given above, the clause \"we went for a walk\" can be said as the main clause (a clause that is not dependent on any other clause for its meaning, it makes sense on its own; a sentence contains at least one main clause.) </p><p><b>Subordinate/dependent clause:</b> In example 2 given above, the clause \"After we had had dinner\" is a subordinate clause: it depends on the main clause for its meaning and cannot exist as a sentence on its own. </p>",
    "question_index": 72
  },

    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>Aravind said that while he was asleep, the courier arrived.</p>",
    "options": [
      "Aravind said, \"While I was asleep, the courier arrived.\"",
      "Aravind said, \"While I had slept, the courier had arrived.\"",

      "Aravind said, \"While he had slept, the courier has to arrive.\""
    ],
    "correct_option_id": 0,
    "solution": "<p>If the sentence is in the <b>Past tense</b>, the form of tense doesn't change when it is used in the <b>time clause</b>.</p><p>One way of identifying the time clause is that the Time clause always begins with the following:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">When</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Whenever</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>While</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">As</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Since</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">After</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Before</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Until</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">As soon as</td></tr></table></p><p>For example:</p><p>Arun told him that when George called him, he responded. (Indirect speech)</p><p>Arun told him, \"When George called me, I responded.\" (Direct speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>Said that-> said</p><p>He-> I</p><p>From the given options, one that follows the above-mentioned conditions for Direct speech is option (a) \"Aravind said, \"While I was asleep, the courier arrived\".\"</p><p>Hence, the correct answer is option (a).</p>",

    "solution": "<p>The correct answer is (c) Hyperbole.</p><p>Hyperbole - uses extreme exaggeration to emphasize a point, here inflating \"a million times\" to stress frustration over repetition.</p><p>Simile - is incorrect because it requires \"like\" or \"as\" for comparison (e.g., \"I've told you as often as a broken record\"), which is absent here.</p><p>Oxymoron - is incorrect as it combines contradictory terms (e.g., \"deafening silence\"), but this is pure overstatement, not contradiction.</p><p>Alliteration - is incorrect since it involves sound repetition (e.g., \"Muddy mess, monstrous mess\"), and the emphasis is on quantity, not phonetics.</p><p>Hence, the correct answer is option (c).</p>",

    "solution": "<p>&#183;The error lies in <b>Option (c).</b></p><p>&#183;<b>\"to\"</b> should replace <b>\"than\"</b>.</p><p>&#183;The word <b>\"junior\"</b> is followed by the preposition <b>\"to\".</b></p><p>&#183;For example:</p><p>o Rangeet is junior <b>to</b> me.</p><p>&#183;Therefore, the corrected form of the sentence is: My elder brother looks so young that people think he is junior <b>to</b> me.</p><p>Additional Information:</p><p>&#183;The preposition \"to\" is used with the following words, in the case of the comparative degree:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Senior</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Junior</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Inferior</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Superior</td></tr></table></p><p>Note:</p><p>\"A Preposition is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p>Examples</p><p>I. The teacher scolded the child for being late.</p><p>II. We're going to a party.</p><p> The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p> The noun/pronoun which is used with a preposition is called its Object.\"</p>",

    "solution": "<p>In the case of Interrogative sentences like this, \"said\" in Direct Speech is changed into \"enquired (of)\", \"wanted to know\", \"asked\", etc.</p><p>In Indirect speech, the verb is always placed after the subject, unlike in Direct Speech.</p><p>For example:</p><p>The teacher said to him, \"What is your name?\" (Direct Speech)</p><p>The teacher asked him what his name was. (Indirect Speech)</p><p>Also, the sentence in the Direct Speech is in the Past Simple tense. So, the tense in the Indirect Speech should be in the Past Perfect tense.</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The reporting verb 'said to' is changed into 'asked'.</p><p>&#183; The verb 'did get' (past simple) is changed into 'had gotten' (past perfect).</p><p>&#183; The possessive determiner 'my' is changed into 'his'. </p><p>None of the options except (b) follows these changes. Hence, option (b) is the correct answer. </p><p>Therefore, the correct answer is: <b>James asked me how they had gotten his cell.</b></p><p><b>Note:-</b></p><p><b>Possessive Determiners/Adjectives:</b> Words like <b><i>'my', 'our', 'your', 'his', 'her', 'its'</i></b>, and <b><i>'their'</i></b> are known as possessive adjectives (or possessive determiners). They come before nouns and <b>indicate ownership</b> of the noun. <b>Example:</b> \"The teacher asked the students to open <b><i>their</i></b> drawing books.\"</p>",

    "correct_option_id": 1,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of the verb [being] is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in this question is in <b>Past Continuous</b>. Thus, the Passive voice will also be in Past Continuous.</p><p>The format of Active voice is: Subject + was/were + V1 + ing + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + was/were + being + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>Amit was practising Math. (Active Voice)</p><p>Math was being practised by Amit. (Passive Voice)</p><p>The options except (b) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is option (b).</p>",

    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>The nun said to the child, \"May the Lord be with you!\"</p>",

    "correct_option_id": 3,
    "solution": "<p>The correct answer is<b>(d) The nun wished the child that the Lord might be with him.</b></p><p>Key points:</p><p>&#183;These kinds of sentences are called <b>Optative Sentences</b>.</p><p>&#183;<b>Optative Sentences</b> are usually <b>prayer or wish</b>.</p><p>&#183;In these kinds of sentences, <b>\"said\"</b> in the Direct Speech is changed into <b>\"prayed\", \"wished\",</b> etc.</p><p>&#183;<b>\"That\"</b> is used in place of Inverted Commas while transforming the sentence from Direct Speech to Indirect Speech.</p><p>&#183;While changing from Direct Speech to Indirect Speech, the sentence is changed into its <b>Assertive form</b> i.e <b>Subject + Verb + Object</b>.</p><p>&#183;For example:</p><p>o The father said to his son, \"May God bless you!\"</p><p>o The father wished his son that God might bless him.</p><p>&#183;The following things in the sentence will change when changed from Direct speech to Indirect Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said to the child</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">wished the child that</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">May the Lord</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">the Lord might</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">you</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">him</td></tr></table><p>&#183;Therefore, the correct answer is:<b>The nun wished the child that the Lord might be with him.</b></p>",

      "<span class=\"eqt\">A special postage stamp and a commemorative book</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359; &#2337;&#2366;&#2325; &#2335;&#2367;&#2325;&#2335; &#2324;&#2352; &#2319;&#2325; &#2360;&#2381;&#2350;&#2366;&#2352;&#2325; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;</span>",

    "question": "<span class=\"eqt\"><p>Identify the correct statement(s).</p><p>Statement I: Mir Jafar's defection at Plassey fatally weakened Siraj-ud-Daulah's forces.</p><p>Statement II: Clive won his support by promising him the Diwani rights of Bengal.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2346;&#2381;&#2354;&#2366;&#2360;&#2368; &#2350;&#2375;&#2306; &#2350;&#2368;&#2352; &#2332;&#2366;&#2347;&#2352; &#2325;&#2375; &#2342;&#2354;-&#2348;&#2342;&#2354; &#2344;&#2375; &#2360;&#2367;&#2352;&#2366;&#2332;-&#2313;&#2342;-&#2342;&#2380;&#2354;&#2366; &#2325;&#2368; &#2360;&#2375;&#2344;&#2366; &#2325;&#2379; &#2348;&#2369;&#2352;&#2368; &#2340;&#2352;&#2361; &#2325;&#2350;&#2332;&#2379;&#2352; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2325;&#2381;&#2354;&#2366;&#2311;&#2357; &#2344;&#2375; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2375; &#2342;&#2368;&#2357;&#2366;&#2344;&#2368; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2366; &#2357;&#2366;&#2342;&#2366; &#2325;&#2352;&#2325;&#2375; &#2313;&#2344;&#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is true; Mir Jafar's betrayal was decisive.</p><p>Statement II is false; Clive promised to make Mir Jafar the Nawab, not to grant him the Diwani (which the Company obtained formally in 1765).</p><p><b>Further Insights:</b></p><p>- Treaty of Alinagar (1757) preceded Plassey, restoring Company privileges.</p><p>- After Mir Jafar, Mir Qasim became Nawab; conflicts led to the Battle of Buxar (1764).</p><p>- Diwani of Bengal, Bihar, Orissa granted to the Company by Shah Alam II in 1765.</p><p>- \"Dual Government\" in Bengal began under Clive post-1765.</p><p>- Robert Clive served twice in Bengal; associated with early Company ascendancy.</p>",
    "question_index": 107
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements are correct regarding Brahmaputra in India?</p><p>I. The river enters India near Gelling (Arunachal Pradesh) through a deep gorge after turning around Namche Barwa.</p><p>II. In Assam, the river develops a wide braided channel due to very high sediment load.</p><p>III. Majuli is a deltaic island located at the river's mouth on the Bay of Bengal.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2346;&#2369;&#2340;&#2381;&#2352; &#2344;&#2342;&#2368; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p><p>I. &#2351;&#2361; &#2344;&#2342;&#2368; &#2344;&#2366;&#2350;&#2330;&#2375; &#2348;&#2352;&#2357;&#2366; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2350;&#2369;&#2337;&#2364;&#2325;&#2352; &#2327;&#2375;&#2354;&#2367;&#2306;&#2327; (&#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;) &#2325;&#2375; &#2346;&#2366;&#2360; &#2319;&#2325; &#2327;&#2361;&#2352;&#2368; &#2328;&#2366;&#2335;&#2368; &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2309;&#2360;&#2350; &#2350;&#2375;&#2306;, &#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2327;&#2366;&#2342; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2344;&#2342;&#2368; &#2319;&#2325; &#2330;&#2380;&#2337;&#2364;&#2368;, &#2327;&#2369;&#2306;&#2341;&#2368; &#2361;&#2369;&#2312; &#2343;&#2366;&#2352;&#2366; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>III. &#2350;&#2366;&#2332;&#2369;&#2354;&#2368; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2368; &#2326;&#2366;&#2337;&#2364;&#2368; &#2350;&#2375;&#2306; &#2344;&#2342;&#2368; &#2325;&#2375; &#2350;&#2369;&#2361;&#2366;&#2344;&#2375; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2319;&#2325; &#2337;&#2375;&#2354;&#2381;&#2335;&#2366; &#2342;&#2381;&#2357;&#2368;&#2346; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2324;&#2352; &#2340;&#2371;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>I is correct: The Great Bend near Namche Barwa precedes entry into Arunachal.</p><p>II is correct: The Assam valley reach is markedly braided.</p><p>III is incorrect: Majuli is a mid-channel riverine island in upper Assam, not deltaic nor at the mouth.</p><p><b>Further Insights:</b></p><p>- Local names upstream include YarlungTsangpo (Tibet) and Siang/Dihang (Arunachal).</p><p>- Major Assam tributaries include Subansiri, Jia-Bharali (Kameng), Manas, and Dhansiri.</p><p>- Flooding is frequent due to monsoon rains, high sediment flux, and bank erosion.</p><p>- Riverine islands (chars/saporis) are dynamic and shift with channel changes.</p>",
    "question_index": 108
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding The Revolt of 1857.</p><p>1) The immediate spark was the greased cartridges rumor leading to the Meerut outbreak (May 1857).</p><p>2) Rani Lakshmibai died fighting near Gwalior in 1858.</p><p>3) The rebellion was centrally coordinated with a single detailed program from the start.</p><p>Which of the above statement is/are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>1857 &#2325;&#2375; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1) &#2327;&#2381;&#2352;&#2368;&#2360; &#2354;&#2327;&#2375; &#2325;&#2366;&#2352;&#2340;&#2370;&#2360;&#2379;&#2306; &#2325;&#2368; &#2309;&#2347;&#2357;&#2366;&#2361; &#2344;&#2375; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361; &#2325;&#2379; &#2340;&#2369;&#2352;&#2306;&#2340; &#2349;&#2337;&#2364;&#2325;&#2366;&#2351;&#2366;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2350;&#2375;&#2352;&#2336; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361; &#2361;&#2369;&#2310; (&#2350;&#2312; 1857)&#2404;</p><p>2) &#2352;&#2366;&#2344;&#2368; &#2354;&#2325;&#2381;&#2359;&#2381;&#2350;&#2368;&#2348;&#2366;&#2312; 1858 &#2350;&#2375;&#2306; &#2327;&#2381;&#2357;&#2366;&#2354;&#2367;&#2351;&#2352; &#2325;&#2375; &#2346;&#2366;&#2360; &#2354;&#2337;&#2364;&#2340;&#2375; &#2361;&#2369;&#2319; &#2358;&#2361;&#2368;&#2342; &#2361;&#2379; &#2327;&#2312;&#2306;&#2404;</p><p>3) &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361; &#2358;&#2369;&#2352;&#2370; &#2360;&#2375; &#2361;&#2368; &#2319;&#2325; &#2357;&#2367;&#2360;&#2381;&#2340;&#2371;&#2340; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2325;&#2375; &#2360;&#2366;&#2341; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2350;&#2344;&#2381;&#2357;&#2367;&#2340; &#2341;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statements 1 and 2 are correct; 3 is incorrect (the revolt was diffuse with regional leaderships).</p><p><b>Further Insights:</b></p><p>- Key centers: Delhi, Kanpur, Lucknow, Jhansi, Arrah; varying timelines and leaders.</p><p>- Bahadur Shah II was proclaimed as a symbolic figurehead at Delhi.</p><p>- After 1858, the Crown took over; the army was reorganized with higher British proportion.</p><p>- Land policies were reviewed; zamindari allies were cultivated thereafter.</p><p>- Doctrine of Lapse was withdrawn post-1858 as a conciliatory move.</p>",
    "question_index": 109
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Newton's Laws of Motion:</p><p>1)Newton's First Law is also known as the law of inertia.</p><p>2)According to Newton's Second Law, force is equal to the rate of change of momentum.</p><p>3)Newton's Third Law applies only when bodies are in contact with each other.</p><p>4)A body moving with constant velocity has zero net external force acting on it.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2381;&#2351;&#2370;&#2335;&#2344; &#2325;&#2375; &#2327;&#2340;&#2367; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2344;&#2381;&#2351;&#2370;&#2335;&#2344; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2344;&#2367;&#2351;&#2350; &#2332;&#2337;&#2364;&#2340;&#2381;&#2357; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350; &#2325;&#2361;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2344;&#2381;&#2351;&#2370;&#2335;&#2344; &#2325;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2348;&#2354; &#2360;&#2306;&#2357;&#2375;&#2327; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2368; &#2342;&#2352; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2344;&#2381;&#2351;&#2370;&#2335;&#2344; &#2325;&#2366; &#2340;&#2368;&#2360;&#2352;&#2366; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375;&#2357;&#2354; &#2340;&#2349;&#2368; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2305; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2375; &#2360;&#2306;&#2346;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2361;&#2379;&#2306;&#2404;</p><p>4) &#2360;&#2381;&#2341;&#2367;&#2352; &#2357;&#2375;&#2327; &#2360;&#2375; &#2327;&#2340;&#2367;&#2350;&#2366;&#2344; &#2357;&#2360;&#2381;&#2340;&#2369; &#2346;&#2352; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2325;&#2369;&#2354; &#2348;&#2366;&#2361;&#2381;&#2351; &#2348;&#2354; &#2358;&#2370;&#2344;&#2381;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1, 2 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">1, 2, 3 and 4</span><span class=\"hqt\" style=\"display:none\">1, 2, 3 &#2324;&#2352; 4</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement 1 - Correct: The First Law describes inertia, the tendency of a body to resist changes in its state of motion.</p><p></p><p>Statement 2 - Correct: Newton's Second Law in its general form states that force equals the rate of change of momentum.</p><p></p><p>Statement 3 - Incorrect: Newton's Third Law applies to both contact and non-contact forces (e.g., gravitational interaction).</p><p></p><p>Statement 4 - Correct: Constant velocity implies zero acceleration, hence the net external force is zero.</p>",
    "question_index": 110
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about Election Commission of India (ECI).</p><p>I. The Constitution mandates the ECI to be a multi-member body.</p><p>II. The ECI conducts elections to the offices of President and Vice-President of India.</p><p>III. The ECI prepares electoral rolls for Panchayat and Municipal elections.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2344; &#2310;&#2351;&#2379;&#2327; (&#2312;&#2360;&#2368;&#2310;&#2312;) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2312;&#2360;&#2368;&#2310;&#2312; &#2319;&#2325; &#2348;&#2361;&#2369;&#2360;&#2342;&#2360;&#2381;&#2351;&#2368;&#2351; &#2344;&#2367;&#2325;&#2366;&#2351; &#2361;&#2376;&#2404;</p><p>II. &#2312;&#2360;&#2368;&#2310;&#2312; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2324;&#2352; &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2346;&#2342;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2330;&#2369;&#2344;&#2366;&#2357; &#2325;&#2352;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2312;&#2360;&#2368;&#2310;&#2312; &#2346;&#2306;&#2330;&#2366;&#2351;&#2340; &#2324;&#2352; &#2344;&#2327;&#2352;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2330;&#2369;&#2344;&#2366;&#2357;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2340;&#2342;&#2366;&#2340;&#2366; &#2360;&#2370;&#2330;&#2368; &#2340;&#2376;&#2351;&#2366;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only I and II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Only I and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>I. is Incorrect. Article 324(2) of the Constitution states that the Election Commission shall consist of the Chief Election Commissioner and such number of other Election Commissioners, if any, as the President may from time to time fix. This means the Constitution does not mandate a multi-member body. Historically, the ECI was a single-member body from its inception in 1950 until 1989.</p><p>II. is Correct. Under Article 324, the ECI is specifically tasked with the superintendence, direction, and control of elections to the Parliament, the Legislatures of every State, and to the offices of the President and the Vice-President of India.</p><p>III. is Incorrect. The Election Commission of India is not concerned with elections to Panchayats and Municipalities in the states. For this purpose, the 73rd and 74th Constitutional Amendment Acts provided for separate State Election Commissions (SECs).</p><p><b>Further Insights:</b></p><p>- Removal of the CEC is like that of an SC Judge; other Election Commissioners can be removed only on the CEC's recommendation.</p><p>- ECI supervises elections to Parliament and State Legislatures as well.</p><p>- Article 324 vests the superintendence, direction and control of elections in the ECI.</p><p>- After the 2023 appointments law, the selection committee comprises the PM (Chair), LoP in Lok Sabha (or leader of the single largest opposition party), and a Union Cabinet Minister nominated by the PM.</p>",
    "question_index": 111
  },

    "question": "<span class=\"eqt\"><p>Evaluate the following statements regarding Gupta Empire.</p><p>1) Harisena composed the Prayaga Prashasti (Allahabad Pillar Inscription) in praise of Samudragupta.</p><p>2) Gupta gold coins depict themes like the king playing the veena and Ashvamedha sacrifice.</p><p>3) Gupta administration used the Ashokan title \"Dhamma-Mahamatra\" for moral policing.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2346;&#2381;&#2340; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>1) &#2361;&#2352;&#2367;&#2360;&#2375;&#2344; &#2344;&#2375; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2325;&#2368; &#2346;&#2381;&#2352;&#2358;&#2306;&#2360;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2351;&#2366;&#2327; &#2346;&#2381;&#2352;&#2358;&#2360;&#2381;&#2340;&#2367; (&#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342; &#2360;&#2381;&#2340;&#2306;&#2349; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326;) &#2325;&#2368; &#2352;&#2330;&#2344;&#2366; &#2325;&#2368;&#2404;</p><p>2) &#2327;&#2369;&#2346;&#2381;&#2340; &#2325;&#2366;&#2354; &#2325;&#2375; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2346;&#2352; &#2352;&#2366;&#2332;&#2366; &#2325;&#2379; &#2357;&#2368;&#2339;&#2366; &#2348;&#2332;&#2366;&#2340;&#2375; &#2361;&#2369;&#2319; &#2324;&#2352; &#2309;&#2358;&#2381;&#2357;&#2350;&#2375;&#2343; &#2351;&#2332;&#2381;&#2334; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2327;&#2369;&#2346;&#2381;&#2340; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2344;&#2375; &#2344;&#2376;&#2340;&#2367;&#2325; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2358;&#2379;&#2325; &#2325;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; \"&#2343;&#2350;&#2381;&#2350;-&#2350;&#2361;&#2366;&#2350;&#2366;&#2340;&#2381;&#2352;\" &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is correct: Harisena's prashasti eulogizes Samudragupta's conquests.</p><p>Statement 2 is correct: Samudragupta's \"Veena\" type and the Ashvamedha coin type are known.</p><p>Statement 3 is incorrect: \"Dhamma-Mahamatra\" is Ashokan; not a Gupta designation.</p><p><b>Further Insights:</b></p><p>- Kumaragupta I is often linked with Nalanda's rise as a mahavihara.</p><p>- Chandragupta II (Vikramaditya) defeated the Western Kshatrapas.</p><p>- Fahien visited during Chandragupta II; he wrote about society and Buddhism.</p><p>- The iron pillar at Mehrauli shows high metallurgical skill and corrosion resistance.</p>",
    "question_index": 112
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements.</p><p>I. In May - June, a strong thermal low develops over northwest India, helping trigger the southwest monsoon.</p><p>II. Intraseasonal oscillations such as the Madden - Julian Oscillation (MJO) modulate monsoon rainfall over India.</p><p>Which of the above statement is/are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2350;&#2312;-&#2332;&#2370;&#2344; &#2350;&#2375;&#2306;, &#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2319;&#2325; &#2346;&#2381;&#2352;&#2348;&#2354; &#2340;&#2366;&#2346;&#2368;&#2351; &#2344;&#2367;&#2350;&#2381;&#2344; &#2342;&#2348;&#2366;&#2357; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2379; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2366;&#2351;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2350;&#2376;&#2337;&#2375;&#2344;-&#2332;&#2370;&#2354;&#2367;&#2351;&#2344; &#2342;&#2379;&#2354;&#2344; (MJO) &#2332;&#2376;&#2360;&#2375; &#2309;&#2306;&#2340;&#2352;&#2350;&#2380;&#2360;&#2350;&#2368; &#2342;&#2379;&#2354;&#2344; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The pre-monsoon heating over northwest India creates a thermal low that draws moist winds toward the subcontinent; this aids monsoon onset (true).</p><p>The MJO does modulate active/break spells of rainfall (true).</p><p><b>Further Insights:</b></p><p>- Normal onset of the southwest monsoon over Kerala is around 1 June (&#177; about a week); normal withdrawal from northwest India begins in mid-September.</p><p>- Cross-equatorial flow, deflected by the Coriolis force, becomes southwesterly winds over the Arabian Sea and Bay of Bengal.</p><p>- The low-level Somali Jet strengthens in early summer and feeds moisture to the west coast.</p><p>- Monsoon trough typically aligns from Punjab - Haryana to the head Bay of Bengal during the core season.</p>",
    "question_index": 113
  },

    "question": "<span class=\"eqt\"><p>Identify the correct statement(s). </p><p>Statement I: In Census terms, the sex ratio is defined as the number of females per 1000 males. </p><p>Statement II: In Census 2011, India's sex ratio was above 1000.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; </p><p>&#2325;&#2341;&#2344; 1: &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2354;&#2367;&#2306;&#2327; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367; 1000 &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2346;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; </p><p>&#2325;&#2341;&#2344; 2: &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; 2011 &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2354;&#2367;&#2306;&#2327; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 1000 &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct: sex ratio = females per 1000 males.</p><p>Statement II is false: India's sex ratio in Census 2011 was 943, which is below 1000.</p><p><b>Further Insights:</b></p><p>- Child Sex Ratio (0 - 6 years) in 2011: 919 females per 1000 males.</p><p>- Kerala had one of the highest sex ratios (1084) in 2011; Haryana was among the lowest (879).</p><p>- Census 2011 total population: 121.08 crore.</p><p>- Sex ratio is a key demographic indicator used for gender balance analysis at national and state levels.</p>",
    "question_index": 114
  },
