    "question": "<span class=\"eqt\"><p>Consider the following statements regarding appointments in July 2025.</p><p>I. In July 2025, Senior IPS officer Sonali Mishra was named as the first woman director general of the Railway Protection Force (RPF).</p><p>II. Former India player Khalid Jamil has been appointed the head coach of the Indian national football team, becoming the first Indian in 13 years to claim the position.</p><p>III. : Utpal Kumar Singh, Secretary-General, Lok Sabha, replaced Rajit Punhani as the CEO of Sansad TV.</p><p>Which of the above statement is/are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2369;&#2354;&#2366;&#2312; 2025 &#2350;&#2375;&#2306; &#2361;&#2369;&#2312; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2332;&#2369;&#2354;&#2366;&#2312; 2025 &#2350;&#2375;&#2306;, &#2357;&#2352;&#2367;&#2359;&#2381;&#2336; &#2310;&#2312;&#2346;&#2368;&#2319;&#2360; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368; &#2360;&#2379;&#2344;&#2366;&#2354;&#2368; &#2350;&#2367;&#2358;&#2381;&#2352;&#2366; &#2325;&#2379; &#2352;&#2375;&#2354;&#2357;&#2375; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2348;&#2354; (&#2310;&#2352;&#2346;&#2368;&#2319;&#2347;) &#2325;&#2368; &#2346;&#2361;&#2354;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366; &#2350;&#2361;&#2366;&#2344;&#2367;&#2342;&#2375;&#2358;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>II. &#2346;&#2370;&#2352;&#2381;&#2357; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2368; &#2326;&#2366;&#2354;&#2367;&#2342; &#2332;&#2350;&#2368;&#2354; &#2325;&#2379; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2347;&#2369;&#2335;&#2348;&#2377;&#2354; &#2335;&#2368;&#2350; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2325;&#2379;&#2330; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2357;&#2375; 13 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2311;&#2360; &#2346;&#2342; &#2346;&#2352; &#2310;&#2360;&#2368;&#2344; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2361;&#2354;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2344; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404;</p><p>III. &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2325;&#2375; &#2350;&#2361;&#2366;&#2360;&#2330;&#2367;&#2357; &#2313;&#2340;&#2381;&#2346;&#2354; &#2325;&#2369;&#2350;&#2366;&#2352; &#2360;&#2367;&#2306;&#2361; &#2344;&#2375; &#2360;&#2306;&#2360;&#2342; &#2335;&#2368;&#2357;&#2368; &#2325;&#2375; &#2360;&#2368;&#2312;&#2323; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2367;&#2340; &#2346;&#2369;&#2344;&#2381;&#2361;&#2366;&#2344;&#2368; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2354;&#2367;&#2351;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I,II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2324;&#2352; &#2340;&#2371;&#2340;&#2368;&#2351;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Statement I is true:</b> Senior IPS officer Sonali Mishra has been named as the first woman director general of the Railway Protection Force (RPF), officials said. She is a 1993 batch Indian Police Service (IPS) officer of the Madhya Pradesh cadre. The Appointments Committee of the Cabinet has approved Mishra's appointment as DG, RPF, until her superannuation on October 31, 2026, said an order issued by the Personnel Ministry. She took charge of the post from incumbent Manoj Yadava, who superannuated on July 31.The RPF was constituted by an Act of Parliament in 1957 for providing security to railway property. Subsequently, the force was empowered to enquire, arrest and prosecute the offenders involved in unlawful possession of railway property in 1966.</p><p><b>Statement II is true:</b> Former India player Khalid Jamil has been appointed the head coach of the Indian national football team, becoming the first Indian in 13 years to claim the position. Jamil, who famously guided the unheralded Aizawl Football Club to the I-League title in 2017, is currently in charge of Indian Super League (ISL) team Jamshedpur FC. He was selected for India's top post by the All India Football Federation's (AIFF) executive committee from a three-man shortlist.</p><p><b>Statement III is true: </b>Utpal Kumar Singh, Secretary-General, Lok Sabha, is set to replace Rajit Punhani as the CEO of Sansad TV, a public broadcaster that telecasts parliamentary proceedings live. Mr. Singh will replace Rajit Punhani, a 1991 IAS officer of Bihar cadre, who was appointed as the CEO of Sansad TV during former Vice-President Jagdeep Dhankhar's chairmanship. 'The Governing Council of Sansad TV decided that Shri Utpal Kumar Singh, IAS (Retd), presently holding the charge of Secretary General Lok Sabha, will additionally discharge the function of the Sansad TV with immediate effect and until further orders,' an order of Parliament of India, issued on Wednesday (July 23, 2025) said.</p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Article 356 of the Constitution of India:</p><p>1)The satisfaction of the President under Article 356 is subject to judicial review.</p><p>2)A proclamation under Article 356 must be approved by both Houses of Parliament within two months.</p><p>3)During the operation of President's Rule, the Legislative Assembly of the State is automatically dissolved.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 356 &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 356 &#2325;&#2375; &#2340;&#2361;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; &#2360;&#2306;&#2340;&#2369;&#2359;&#2381;&#2335;&#2367; &#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2360;&#2350;&#2368;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2361;&#2376;&#2404;</p><p>2) &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 356 &#2325;&#2375; &#2340;&#2361;&#2340; &#2332;&#2366;&#2352;&#2368; &#2325;&#2368; &#2327;&#2312; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2379; &#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2342;&#2344;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2379; &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2309;&#2344;&#2369;&#2350;&#2379;&#2342;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p>3) &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2358;&#2366;&#2360;&#2344; &#2354;&#2366;&#2327;&#2370; &#2352;&#2361;&#2344;&#2375; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2360;&#2381;&#2357;&#2340;&#2307; &#2349;&#2306;&#2327; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct.</p><p>Statement 3 is incorrect because the Legislative Assembly is not \"automatically\" dissolved; it may be suspended or dissolved at the President's discretion. Therefore, the correct option is 1 and 2 only.</p><p><b>Explanation of Statements:</b></p><p>1) is Correct. Following the S.R. Bommai case (1994), the Supreme Court held that the President's satisfaction is not beyond judicial scrutiny.</p><p>2) is Correct. A proclamation of President's Rule must be approved by both the Rajya Sabha and Lok Sabha within two months from the date of its issue.</p><p>3) is Incorrect. Upon the imposition of Article 356, the President can either suspend the Assembly or dissolve it. Dissolution is not automatic and usually happens only after Parliamentary approval of the proclamation.</p><p><b>Further Insights:</b></p><p>If the Lok Sabha is dissolved within those two months without approving the proclamation, the proclamation survives until 30 days from the first sitting of the newly reconstituted Lok Sabha.</p>",
    "question_index": 118
  },

    "question": "<span class=\"eqt\"><p>Which of the following books is correctly matched with its author?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2313;&#2360;&#2325;&#2375; &#2354;&#2375;&#2326;&#2325; &#2360;&#2375; &#2360;&#2361;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2350;&#2375;&#2354; &#2326;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The Idea of India  -  Ramachandra Guha</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2357;&#2367;&#2330;&#2366;&#2352; - &#2352;&#2366;&#2350;&#2330;&#2306;&#2342;&#2381;&#2352; &#2327;&#2369;&#2361;&#2366;</span>",
      "<span class=\"eqt\">The Argumentative Indian  -  Amartya Sen</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2352;&#2381;&#2325;&#2358;&#2368;&#2354; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; - &#2309;&#2350;&#2352;&#2381;&#2340;&#2381;&#2351; &#2360;&#2375;&#2344;</span>",
      "<span class=\"eqt\">Why I Am an Atheist  -  Jawaharlal Nehru</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2306; &#2344;&#2366;&#2360;&#2381;&#2340;&#2367;&#2325; &#2325;&#2381;&#2351;&#2379;&#2306; &#2361;&#2370;&#2305; - &#2332;&#2357;&#2366;&#2361;&#2352;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</span>",
      "<span class=\"eqt\">India After Gandhi  -  Sunil Khilnani</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2306;&#2343;&#2368; &#2325;&#2375; &#2348;&#2366;&#2342; &#2325;&#2366; &#2349;&#2366;&#2352;&#2340; - &#2360;&#2369;&#2344;&#2368;&#2354; &#2326;&#2367;&#2354;&#2344;&#2366;&#2344;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Argumentative Indian is correctly matched with Amartya Sen. </p><p>The Argumentative Indian is a famous collection of essays by Nobel laureate Amartya Sen.</p><p><b>Explanation of Statements:</b></p><p>Ideas of India: The Idea of India is a 1997 non-fiction book by Sunil Khilnani which describes the economic and political history of India in the fifty years since Partition. </p><p>Why I Am an Atheist: This was written by Bhagat Singh, not Jawaharlal Nehru.</p><p>India After Gandhi: This was written by Ramachandra Guha, not Sunil Khilnani.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Census Towns:</p><p>1) They satisfy population, density, and workforce criteria.</p><p>2) They are notified under municipal laws.</p><p>Which is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2344;&#2327;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2357;&#2375; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2328;&#2344;&#2340;&#2381;&#2357; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351;&#2348;&#2354; &#2350;&#2366;&#2344;&#2342;&#2306;&#2337;&#2379;&#2306; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2344;&#2327;&#2352;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2325;&#2366;&#2344;&#2370;&#2344;&#2379;&#2306; &#2325;&#2375; &#2340;&#2361;&#2340; &#2309;&#2343;&#2367;&#2360;&#2370;&#2330;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only 1</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">Only 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is correct. </p><p>Statement 2 is incorrect because Census Towns are governed as rural units (Panchayats) and are not notified under municipal laws. </p><p><b>Explanation of Statements:</b></p><p>1) is Correct. A Census Town must have: a minimum population of 5,000; at least 75% of the male main working population engaged in non-agricultural pursuits; and a density of at least 400 persons per sq. km.</p><p>2) is Incorrect. Unlike \"Statutory Towns,\" Census Towns do not have a municipality. They are administratively treated as villages/Panchayats.</p><p><b>Further Insights:</b></p><p>The number of Census Towns in India increased significantly between the 2001 and 2011 censuses.</p><p>Between Census 2001 and Census 2011, the number of Census Towns increased from 1,362 to 3,894. </p><p>This indicates that people in rural areas are quitting farming or joining non-farm livelihoods.</p><p>Millions of farmers have quit agriculture and, worryingly, very few from the current generation are entering the sector. </p>",
    "question_index": 120
  },

    "question": "<span class=\"eqt\"><p>Which of the following rivers shows a reversal of drainage during tectonic uplift?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2344;&#2342;&#2368; &#2357;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;&#2367;&#2325; &#2313;&#2340;&#2381;&#2341;&#2366;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2332;&#2354; &#2344;&#2367;&#2325;&#2366;&#2360;&#2368; &#2350;&#2375;&#2306; &#2313;&#2354;&#2335;&#2347;&#2375;&#2352; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Narmada</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2381;&#2350;&#2342;&#2366;</span>",
      "<span class=\"eqt\">Indus</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2306;&#2343;&#2369;</span>",
      "<span class=\"eqt\">Kosi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Tapi</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2346;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Indus is an \"antecedent river.\" As the Himalayas rose due to tectonic uplift, the river maintained its original course by cutting through the rising mountains, creating deep gorges. It does not show a \"reversal\" in the sense of changing its entire flow direction like some rift valley rivers, but it is the classic example of drainage responding to tectonic uplift.</p><p><b>Further Insights:</b></p><p>The Narmada and Tapi flow in rift valleys created by tectonic activity, but they flow West due to the rift, not because of a reversal during the Himalayan uplift.</p>",
    "question_index": 121
  },

    "question": "<span class=\"eqt\"><p>Match the following constitutional bodies with their primary functions:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1)Finance Commission</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Inter-State coordination</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) Election Commission</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Fiscal federalism</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) Inter-State Council</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Conduct of elections</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4) GST Council</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Indirect tax harmonisation</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2344;&#2367;&#2325;&#2366;&#2351;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) &#2357;&#2367;&#2340;&#2381;&#2340; &#2310;&#2351;&#2379;&#2327;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2309;&#2306;&#2340;&#2352;-&#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2350;&#2344;&#2381;&#2357;&#2351;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) &#2330;&#2369;&#2344;&#2366;&#2357; &#2310;&#2351;&#2379;&#2327;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2360;&#2306;&#2328;&#2357;&#2366;&#2342;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) &#2309;&#2306;&#2340;&#2352;-&#2352;&#2366;&#2332;&#2381;&#2351; &#2346;&#2352;&#2367;&#2359;&#2342;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2330;&#2369;&#2344;&#2366;&#2357;&#2379;&#2306; &#2325;&#2366; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4) &#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2346;&#2352;&#2367;&#2359;&#2342;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2360;&#2366;&#2350;&#2306;&#2332;&#2360;&#2381;&#2351;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">1-b, 2-c, 3-a, 4-d</span><span class=\"hqt\" style=\"display:none\">1-b, 2-c, 3-a, 4-d</span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>1-b (Finance Commission): Article 280 defines its role in recommending the distribution of financial resources between the Union and States (Fiscal Federalism).</p><p>2-c (Election Commission): Article 324 mandates the superintendence, direction, and control of elections.</p><p>3-a (Inter-State Council): Article 263 provides for this council to support coordination and resolve disputes between states.</p><p>4-d (GST Council): Article 279A establishes this body to harmonize indirect tax rates (GST) across India.</p><p><b>Further Insights:</b></p><p>The GST Council is a unique federal body where the Centre and States must reach a consensus on tax matters.</p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding enzymes:</p><p>Statement I: Enzymes reduce activation energy.</p><p>Statement II: Enzymes alter the equilibrium of reactions.</p><p>Which is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2306;&#2332;&#2366;&#2311;&#2350;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2319;&#2306;&#2332;&#2366;&#2311;&#2350; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351;&#2339; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2319;&#2306;&#2332;&#2366;&#2311;&#2350; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2325;&#2379; &#2348;&#2342;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct. </p><p>Statement II is incorrect because enzymes only speed up the rate of reaction; they do not change the position of equilibrium. </p><p>I. is Correct. Enzymes act as biological catalysts by lowering the \"activation energy\" required for a reaction to proceed.</p><p>II. is Incorrect. Enzymes do not change the equilibrium constant or the final ratio of products to reactants; they only help the system reach that equilibrium faster.</p><p><b>Further Insights:</b></p><p>Most enzymes are proteins, though some (ribozymes) are RNA molecules.</p>",
    "question_index": 123
  },
  {
    "question": "<span class=\"eqt\"><p>In November 2025, Which three countries announced a new trilateral technology and innovation partnership on the sidelines of the G20 Leaders' Summit in Johannesburg?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2357;&#2306;&#2348;&#2352; 2025 &#2350;&#2375;&#2306;, &#2332;&#2379;&#2361;&#2366;&#2344;&#2381;&#2360;&#2348;&#2352;&#2381;&#2327; &#2350;&#2375;&#2306; &#2332;&#2368;20 &#2344;&#2375;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2358;&#2367;&#2326;&#2352; &#2360;&#2350;&#2381;&#2350;&#2375;&#2354;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2367;&#2344; &#2340;&#2368;&#2344; &#2342;&#2375;&#2358;&#2379;&#2306; &#2344;&#2375; &#2319;&#2325; &#2344;&#2312; &#2340;&#2381;&#2352;&#2367;&#2346;&#2325;&#2381;&#2359;&#2368;&#2351; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2324;&#2352; &#2344;&#2357;&#2366;&#2330;&#2366;&#2352; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2325;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">India, Australia and Canada</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;, &#2321;&#2360;&#2381;&#2335;&#2381;&#2352;&#2375;&#2354;&#2367;&#2351;&#2366; &#2324;&#2352; &#2325;&#2344;&#2366;&#2337;&#2366;</span>",
      "<span class=\"eqt\">India, Japan and Australia</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;, &#2332;&#2366;&#2346;&#2366;&#2344; &#2324;&#2352; &#2321;&#2360;&#2381;&#2335;&#2381;&#2352;&#2375;&#2354;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">India, Canada and United Kingdom</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;, &#2325;&#2344;&#2366;&#2337;&#2366; &#2324;&#2352; &#2351;&#2370;&#2344;&#2366;&#2311;&#2335;&#2375;&#2337; &#2325;&#2367;&#2306;&#2327;&#2337;&#2350;</span>",
      "<span class=\"eqt\">India, France and Australia</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;, &#2347;&#2381;&#2352;&#2366;&#2306;&#2360; &#2324;&#2352; &#2321;&#2360;&#2381;&#2335;&#2381;&#2352;&#2375;&#2354;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A new trilateral technology and innovation partnership between <b>India, Australia and Canada</b> was announced by Prime Minister Narendra Modi after a meeting with his Australian and Canadian counterparts on the sidelines of the G20 Leaders' Summit in Johannesburg. According to a joint statement by the governments of India, Australia and Canada, the three sides agreed to 'strengthen their ambition in cooperation on critical and emerging technologies to complement existing bilateral initiatives'.</p><p>The initiative will draw on the natural strengths of the three countries and have an emphasis on green energy innovation and building resilient supply chains, including in critical minerals, it said.</p><p>It will deepen their respective ambition and strategic collaboration towards net zero and drive further diversification of supply chains towards a secure, sustainable, and resilient future.</p><p>Officials from the three countries would convene in the first quarter of 2026 to take the initiative forward.</p><p>Separately, PM Modi on November 22, 2025 met his British counterpart Keir Starmer and UN Secretary-General Ant'nio Guterres.</p><p>The Prime Minister said he had a 'very productive' conversation with UN chief Guterres.</p><p>Addressing the opening session of the G20 Leaders' Meeting, PM Modi called for a profound rethink of the global development parameters and proposed setting up a G20 initiative to counter the drug-terror nexus and a global healthcare response team.</p>",
    "question_index": 124
  },
  {
    "question": "<span class=\"eqt\"><p>Which process increases genetic variability without altering gene sequence?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2332;&#2368;&#2344; &#2309;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350; &#2325;&#2379; &#2348;&#2342;&#2354;&#2375; &#2348;&#2367;&#2344;&#2366; &#2310;&#2344;&#2369;&#2357;&#2306;&#2358;&#2367;&#2325; &#2357;&#2367;&#2357;&#2367;&#2343;&#2340;&#2366; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mutation</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Crossing over</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2342;&#2354;&#2340;&#2375; &#2361;&#2369;&#2319;</span>",
      "<span class=\"eqt\">Translation</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2357;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Replication</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2371;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Crossing over increases variability without altering the gene sequence. </p><p>Crossing over occurs during meiosis (Prophase I). It involves the exchange of genetic material between non-sister chromatids. This reshuffles existing alleles into new combinations, increasing genetic diversity without changing the actual chemical code of the DNA (unlike a mutation).</p><p><b>Further Insights:</b></p><p>Mutation does alter the gene sequence. Translation and Replication are standard processes of protein synthesis and DNA copying.</p>",
    "question_index": 125
  },
  {
    "question": "<span class=\"eqt\"><p>At the 87th Senior National Badminton Championships held in Vijayawada in December 2025, who clinched the Women's Singles title?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2360;&#2306;&#2348;&#2352; 2025 &#2350;&#2375;&#2306; &#2357;&#2367;&#2332;&#2351;&#2357;&#2366;&#2337;&#2364;&#2366; &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; 87&#2357;&#2368;&#2306; &#2360;&#2368;&#2344;&#2367;&#2351;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2348;&#2376;&#2337;&#2350;&#2367;&#2306;&#2335;&#2344; &#2330;&#2376;&#2306;&#2346;&#2367;&#2351;&#2344;&#2358;&#2367;&#2346; &#2350;&#2375;&#2306; &#2350;&#2361;&#2367;&#2354;&#2366; &#2319;&#2325;&#2354; &#2325;&#2366; &#2326;&#2367;&#2340;&#2366;&#2348; &#2325;&#2367;&#2360;&#2344;&#2375; &#2332;&#2368;&#2340;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Surya Charishma Tamiri</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2352;&#2367;&#2358;&#2381;&#2350;&#2366; &#2340;&#2366;&#2350;&#2367;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Tanvi Patri</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2344;&#2381;&#2357;&#2368; &#2346;&#2366;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Anupama Upadhyaya</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2346;&#2350;&#2366; &#2313;&#2346;&#2366;&#2343;&#2381;&#2351;&#2366;&#2351;</span>",
      "<span class=\"eqt\">Malvika Bansod</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2354;&#2357;&#2367;&#2325;&#2366; &#2348;&#2306;&#2360;&#2379;&#2342;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Surya Charishma Tamiri</b> clinched the Women's Singles title at the 87th Senior National Badminton Championships in Vijayawada with her victory over Tanvi Patri today. After losing the opening game, Tamiri staged a strong comeback to win the final 17 -21, 21-12, 21-14. In the Men's Singles, Rithvik Sanjeevi S defeated Bharat Raghav in straight games, 21-16, 22-20, to win the title. In Men's doubles, the pair of A. Hariharan and Ruban Kumar emerged champions after defeating Mithilesh Krishnan and Prejan 24-22, 21-17 in the final. In the women's doubles final, former champions Shikha Gautam and Ashwini Bhat K overcame Priya Devi Konjengban and Shruti Mishra 21-14, 21-18 to reclaim the title. Meanwhile, in the mixed doubles final, Sathwik Reddy K and Radhika Sharma secured the championship with a convincing 21-9, 21-15 win over Ashith Surya and Amrutha P.</p>",
    "question_index": 126
  },
  {
    "question": "<span class=\"eqt\"><p>The term \"Inselberg\" is associated with:</p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2311;&#2306;&#2360;&#2354;&#2348;&#2352;&#2381;&#2327;\" &#2358;&#2348;&#2381;&#2342; &#2325;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2375; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Glacial erosion</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2350;&#2344;&#2342; &#2309;&#2346;&#2352;&#2342;&#2344;</span>",
      "<span class=\"eqt\">Aeolian deposition</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2369;&#2332;&#2344;&#2367;&#2340; &#2344;&#2367;&#2325;&#2381;&#2359;&#2375;&#2346;&#2339;</span>",
      "<span class=\"eqt\">Residual landforms in arid regions</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2359;&#2381;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2357;&#2358;&#2367;&#2359;&#2381;&#2335; &#2349;&#2370;-&#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2366;&#2305;</span>",
      "<span class=\"eqt\">Karst topography</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2360;&#2381;&#2335; &#2360;&#2381;&#2341;&#2354;&#2366;&#2325;&#2371;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The term is associated with residual landforms in arid regions. </p><p>An Inselberg (German for \"island mountain\") is an isolated hill or mountain that rises abruptly from a gently sloping or virtually level surrounding plain. They are typically made of hard rock (like granite) that has resisted erosion in arid or semi-arid environments.</p><p><b>Further Insights:</b></p><p>The famous \"Uluru\" (Ayers Rock) in Australia is a world-renowned example of an inselberg.</p>",
    "question_index": 127
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Permanent Settlement:</p><p>1)It fixed land revenue permanently with zamindars.</p><p>2)It aimed to create a loyal landed aristocracy.</p><p>3)It led to increased investment in agriculture.</p><p>Which of the statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2348;&#2306;&#2342;&#2379;&#2348;&#2360;&#2381;&#2340; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2311;&#2360;&#2344;&#2375; &#2332;&#2350;&#2368;&#2306;&#2342;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2349;&#2370;-&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2325;&#2379; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2340;&#2351; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>2) &#2311;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2319;&#2325; &#2357;&#2347;&#2366;&#2342;&#2366;&#2352; &#2349;&#2370;-&#2357;&#2352;&#2381;&#2327;&#2368;&#2351; &#2309;&#2349;&#2367;&#2332;&#2366;&#2340; &#2357;&#2352;&#2381;&#2327; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2352;&#2344;&#2366; &#2341;&#2366;&#2404;</p><p>3) &#2311;&#2360;&#2360;&#2375; &#2325;&#2371;&#2359;&#2367; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2369;&#2312;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct. </p><p>Statement 3 is incorrect because the system led to \"absentee landlordism\" and exploitation rather than agricultural investment. </p><p><b>Explanation of Statements:</b></p><p>1) is Correct. Lord Cornwallis fixed the land revenue demand permanently; it could not be increased in the future.</p><p>2) is Correct. The British hoped to create a class of \"loyalist\" zamindars who would act as a social base for their rule.</p><p>3) is Incorrect. Zamindars had no incentive to invest in land improvement as they were more interested in extracting maximum rent from tenants.</p><p><b>Further Insights:</b></p><p>This system was primarily implemented in Bengal, Bihar, and Odisha.</p>",
    "question_index": 128
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Ecological Pyramids:</p><p>Statement I: Inverted pyramids of biomass are commonly found in aquatic ecosystems.</p><p>Statement II: Pyramids of energy can never be inverted under natural conditions.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368;&#2351; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2332;&#2354;&#2368;&#2351; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2340;&#2306;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2332;&#2376;&#2357; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2325;&#2375; &#2313;&#2354;&#2381;&#2335;&#2375; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2346;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2375; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2349;&#2368; &#2349;&#2368; &#2313;&#2354;&#2381;&#2335;&#2375; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379; &#2360;&#2325;&#2340;&#2375;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2350;&#2376;&#2306; &#2324;&#2352; &#2344; &#2361;&#2368; &#2342;&#2370;&#2360;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>I. is Correct. In aquatic ecosystems (like the ocean), the biomass of consumers (fishes) at any given time can far exceed the biomass of the primary producers (phytoplankton), which have high turnover rates.</p><p>II. is Correct. The Pyramid of Energy is always upright because energy is lost as heat at each trophic level (10% law), and it can never be regenerated or inverted in a natural ecosystem.</p><p><b>Further Insights:</b></p><p>The Pyramid of Numbers can be inverted (e.g., many insects living on a single large tree).</p>",
    "question_index": 129
  },
  {
    "question": "<span class=\"eqt\"><p>While managing an E-mail account, what does the 'Archive' action typically do? </p></span><span class=\"hqt\" style=\"display:none\">&#2312;&#2350;&#2375;&#2354; &#2326;&#2366;&#2340;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2352;&#2340;&#2375; &#2360;&#2350;&#2351;, '&#2310;&#2352;&#2381;&#2325;&#2366;&#2311;&#2357;' &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Permanently deletes the email.</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2350;&#2375;&#2354; &#2325;&#2379; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2361;&#2335;&#2366; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Moves the email out of the Inbox but keeps it in the account for later retrieval.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2312;&#2350;&#2375;&#2354; &#2325;&#2379; &#2311;&#2344;&#2348;&#2377;&#2325;&#2381;&#2360; &#2360;&#2375; &#2348;&#2366;&#2361;&#2352; &#2354;&#2375; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2348;&#2366;&#2342; &#2350;&#2375;&#2306; &#2346;&#2369;&#2344;&#2307; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2311;&#2360;&#2375; &#2326;&#2366;&#2340;&#2375; &#2350;&#2375;&#2306; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Marks the email as Spam and blocks the sender.</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2350;&#2375;&#2354; &#2325;&#2379; &#2360;&#2381;&#2346;&#2376;&#2350; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2381;&#2352;&#2375;&#2359;&#2325; &#2325;&#2379; &#2348;&#2381;&#2354;&#2377;&#2325; &#2325;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Forwards the email to a secondary backup address.</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2350;&#2375;&#2354; &#2325;&#2379; &#2319;&#2325; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2348;&#2376;&#2325;&#2309;&#2346; &#2346;&#2340;&#2375; &#2346;&#2352; &#2309;&#2327;&#2381;&#2352;&#2375;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"

    "correct_option_id": 1,
    "solution": "<p>Archiving helps clean the inbox without deleting messages. You can still find archived mail via search or in the \"All Mail\" folder.</p>",

  {
    "question": "<span class=\"eqt\"><p>Which of the following shortcut keys are used to close PowerPoint?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2357;&#2352; &#2346;&#2377;&#2311;&#2306;&#2335; &#2325;&#2379; &#2348;&#2306;&#2342; (&#2325;&#2381;&#2354;&#2379;&#2332;) &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2358;&#2377;&#2352;&#2381;&#2335;&#2325;&#2335; &#2325;&#2368; (key) &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

  {
    "question": "<span class=\"eqt\"><p>What is the name of the attack where a hacker floods a website or network with so much traffic that it becomes unavailable to legitimate users? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2361;&#2350;&#2354;&#2375; &#2325;&#2366; &#2344;&#2366;&#2350; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2319;&#2325; &#2361;&#2376;&#2325;&#2352; &#2325;&#2367;&#2360;&#2368; &#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335; &#2351;&#2366; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2346;&#2352; &#2311;&#2340;&#2344;&#2366; &#2309;&#2343;&#2367;&#2325; &#2335;&#2381;&#2352;&#2376;&#2347;&#2367;&#2325; &#2349;&#2375;&#2332; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2357;&#2361; &#2357;&#2376;&#2343; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2344;&#2369;&#2346;&#2354;&#2348;&#2381;&#2343; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">Distributed Denial of Service (DDoS)</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2340;&#2352;&#2367;&#2340; &#2360;&#2375;&#2357;&#2366; &#2360;&#2375; &#2311;&#2344;&#2325;&#2366;&#2352; (&#2337;&#2368;&#2337;&#2368;&#2323;&#2319;&#2360;)</span>",
      "<span class=\"eqt\">Spoofing</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2370;&#2347;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Man-in-the-Middle (MitM)</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351;&#2350;&#2366;&#2352;&#2381;&#2327;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; (MitM)</span>"

    "correct_option_id": 1,
    "solution": "<p>A DDoS attack uses multiple compromised computer systems (a botnet) to overwhelm a target server, causing it to crash or slow down significantly.</p>",

  },
  {
    "question": "<span class=\"eqt\"><p>What is the maximum zoom percentage allowed in a Microsoft Word document?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2360;&#2377;&#2347;&#2381;&#2335; &#2357;&#2352;&#2381;&#2337; &#2337;&#2377;&#2325;&#2381;&#2351;&#2370;&#2350;&#2375;&#2306;&#2335; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2332;&#2364;&#2370;&#2350; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2361;&#2376;?</p></span>",
