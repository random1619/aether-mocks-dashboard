  {
    "question": "<span class=\"eqt\"><p>In Microsoft PowerPoint, the ________ feature allows you to rehearse and time your presentation.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2360;&#2377;&#2347;&#2381;&#2335; &#2346;&#2366;&#2357;&#2352;&#2346;&#2377;&#2311;&#2306;&#2335; &#2350;&#2375;&#2306;, ________ &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2310;&#2346;&#2325;&#2379; &#2309;&#2346;&#2344;&#2368; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340;&#2367; &#2325;&#2366; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2349;&#2381;&#2351;&#2366;&#2360; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340;&#2367; &#2346;&#2352; &#2360;&#2350;&#2351; &#2360;&#2368;&#2350;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Slide Sorter</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2354;&#2366;&#2311;&#2337; &#2360;&#2377;&#2352;&#2381;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Slide Master</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2354;&#2366;&#2311;&#2337; &#2350;&#2366;&#2360;&#2381;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Presenter View</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2375;&#2360;&#2375;&#2306;&#2335;&#2352; &#2357;&#2381;&#2351;&#2370;</span>",
      "<span class=\"eqt\">Transitions</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2366;&#2306;&#2395;&#2367;&#2358;&#2344;&#2381;&#2360;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Presenter View is a powerful feature in Microsoft PowerPoint that enables you to rehearse and time your presentation effectively. When using Presenter View, you can display your presentation on one screen while having access to additional tools and features on another screen. This view allows you to see your speaker notes, upcoming slides, and a timer, enabling you to rehearse your presentation and ensure that it fits within a specified time frame. Presenter View also provides convenient controls for navigating through your slides, zooming in on specific areas, and even using a virtual laser pointer to emphasize key points during your presentation. It's an invaluable tool for presenters who want to deliver their presentations smoothly and with confidence.</p>",
    "question_index": 135
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is <b>not </b>an example of computer worm? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2357;&#2352;&#2381;&#2350; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; <b>&#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Code Red</span><span class=\"hqt\" style=\"display:none\">Code Red</span>",
      "<span class=\"eqt\">Rootkit</span><span class=\"hqt\" style=\"display:none\">Rootkit</span>",
      "<span class=\"eqt\">ILOVEYOU</span><span class=\"hqt\" style=\"display:none\">ILOVEYOU</span>",
      "<span class=\"eqt\">Nimda</span><span class=\"hqt\" style=\"display:none\">Nimda</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; A computer worm is a type of malware that spreads copies of itself from computer to computer. A worm can replicate itself without any human interaction, and it does not need to attach itself to a software program in order to cause damage.</p><p>&#183; Examples: Code Red, ILOVEYOU, Nimda, Mydoom, Melissa, Stuxnet etc.</p><p>&#183; A <b>rootkit</b> is a secret computer program designed to provide continued access to a computer while actively hiding its presence.</p>",
    "question_index": 136
  },
  {
    "question": "<span class=\"eqt\"><p>Which technology is commonly used to connect peripheral devices, such as keyboards and mice, to a computer? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2340;&#2325;&#2344;&#2368;&#2325; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2346;&#2352;&#2367;&#2343;&#2368;&#2351; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; (&#2346;&#2375;&#2352;&#2367;&#2347;&#2375;&#2352;&#2354; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360;) &#2332;&#2376;&#2360;&#2375; &#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337; &#2324;&#2352; &#2350;&#2366;&#2311;&#2325; &#2325;&#2379; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">USB (Universal Serial Bus)</span><span class=\"hqt\" style=\"display:none\">USB (&#2351;&#2370;&#2344;&#2367;&#2357;&#2352;&#2381;&#2360;&#2354; &#2360;&#2368;&#2352;&#2367;&#2351;&#2354; &#2348;&#2360;)</span>",
      "<span class=\"eqt\">HDMI (High-Definition Multimedia Interface)</span><span class=\"hqt\" style=\"display:none\">HDMI (&#2361;&#2366;&#2312;-&#2337;&#2375;&#2347;&#2367;&#2344;&#2367;&#2358;&#2344; &#2350;&#2354;&#2381;&#2335;&#2368;&#2350;&#2368;&#2337;&#2367;&#2351;&#2366; &#2311;&#2306;&#2335;&#2352;&#2398;&#2375;&#2360;)</span>",
      "<span class=\"eqt\">Wi-Fi (Wireless Fidelity)</span><span class=\"hqt\" style=\"display:none\">Wi-Fi (&#2357;&#2366;&#2351;&#2352;&#2354;&#2375;&#2360; &#2347;&#2367;&#2337;&#2375;&#2354;&#2367;&#2335;&#2368;)</span>",
      "<span class=\"eqt\">Bluetooth</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2354;&#2370;&#2335;&#2370;&#2341;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>USB is a widely used technology for connecting peripheral devices to a computer. It provides a standardized interface that allows various devices like keyboards, mice, printers, external hard drives, and many others to be easily connected and recognized by the computer. USB ports are available on most computers and laptops, and they provide power and data transfer capabilities. USB cables come in different versions, such as USB 2.0, USB 3.0, and USB 3.1, each offering different data transfer speeds. </p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>Which MIPS instruction is used to load a 32-bit immediate value into a register?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352; &#2350;&#2375;&#2306; 32-&#2348;&#2367;&#2335; &#2357;&#2366;&#2354;&#2366; &#2340;&#2340;&#2381;&#2325;&#2366;&#2354; &#2350;&#2366;&#2344; &#2354;&#2379;&#2337; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; MIPS &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">ADDI</span><span class=\"hqt\" style=\"display:none\">ADDI</span>",
      "<span class=\"eqt\">LUI</span><span class=\"hqt\" style=\"display:none\">LUI</span>",
      "<span class=\"eqt\">LW</span><span class=\"hqt\" style=\"display:none\">LW</span>",
      "<span class=\"eqt\">OR</span><span class=\"hqt\" style=\"display:none\">OR</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The LUI (Load Upper Immediate) instruction is used to load a 32-bit immediate value into the upper 16 bits of a register, with the lower 16 bits set to zero. This instruction is commonly used to load constants or addresses into a register. The ADDI (Add Immediate) instruction is used to add a 16-bit immediate value to a register. The LW (Load Word) instruction is used to load a 32-bit value from memory into a register. The OR instruction performs a bitwise OR operation between two registers. Therefore, LUI is the appropriate instruction for loading a 32-bit immediate value into a register.</p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not a feature in MS Excel?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; MS &#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2350;&#2375;&#2306; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Text Box</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2376;&#2325;&#2381;&#8205;&#2360;&#2381;&#8205;&#2335; &#2348;&#2377;&#2325;&#2381;&#8205;&#2360;</span>",
      "<span class=\"eqt\">Header and Footer</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2376;&#2337;&#2352; &#2324;&#2352; &#2347;&#2369;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Word Art</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2337; &#2310;&#2352;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Autograph</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2335;&#2379;&#2327;&#2381;&#2352;&#2366;&#2347;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Autograph</b> is not a feature in MS Excel. MS Excel has a feature called 'Signature Line'. A signature line resembles a typical signature placeholder that might appear in a printed document. However, it works differently. When a signature line is inserted into an Excel file, the author can specify information about the intended signer, and instructions for the signer. When an electronic copy of the file is sent to the intended signer, this person sees the signature line and a notification that their signature is requested.</p><p>Other options are features in MS Excel.</p><p>In the Ribbon, Insert &gt; Text &gt; Text Box.</p><p>In the Ribbon, Insert &gt; Text &gt;Header and Footer.</p><p>In the Ribbon, Insert &gt; Text &gt;Word Art.</p><p>In the Ribbon, Insert &gt; Charts</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>_________ allows users to upload files to an online site so they can be viewed and edited from another location.</p></span><span class=\"hqt\" style=\"display:none\"><p>_________ &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2360;&#2366;&#2311;&#2335; &#2346;&#2352; &#2347;&#2364;&#2366;&#2311;&#2354;&#2375;&#2306; &#2309;&#2346;&#2354;&#2379;&#2337; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2340;&#2366;&#2325;&#2367; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2325;&#2367;&#2360;&#2368; &#2309;&#2344;&#2381;&#2351; &#2360;&#2381;&#2341;&#2366;&#2344; &#2360;&#2375; &#2342;&#2375;&#2326;&#2366; &#2324;&#2352; &#2360;&#2306;&#2346;&#2366;&#2342;&#2367;&#2340; (&#2319;&#2337;&#2367;&#2335;) &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">General-purpose applications</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2352;&#2354;-&#2346;&#2352;&#2381;&#2346;&#2360; &#2319;&#2346;&#2381;&#2354;&#2368;&#2325;&#2375;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Microsoft Outlook</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2360;&#2377;&#2347;&#2381;&#2335; &#2310;&#2313;&#2335;&#2354;&#2369;&#2325;</span>",
      "<span class=\"eqt\">Web-hosted technology</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2348;-&#2361;&#2379;&#2360;&#2381;&#2335;&#2375;&#2337; &#2335;&#2375;&#2325;&#2381;&#2344;&#2379;&#2354;&#2377;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Office Live</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2347;&#2367;&#2360; &#2354;&#2366;&#2311;&#2357;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A web hosting service is a type of Internet hosting service that allows individuals and organizations to make their website accessible via the World Wide Web. Web hosts are companies that provide space on a server owned or leased for use by clients, as well as providing Internet connectivity, typically in a data center. Web hosts can also provide data center space and connectivity to the Internet for other servers located in their data center, called colocation, also known as Housing in Latin America or France.</p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an example of Sponsored Top-Level Domains?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2360;&#2381;&#2346;&#2377;&#2344;&#2381;&#2360;&#2352;&#2381;&#2337; &#2335;&#2377;&#2346;-&#2354;&#2375;&#2357;&#2354; &#2337;&#2379;&#2350;&#2375;&#2344; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">.com</span><span class=\"hqt\" style=\"display:none\">.com</span>",
      "<span class=\"eqt\">.net</span><span class=\"hqt\" style=\"display:none\">.net</span>",
      "<span class=\"eqt\">.gov</span><span class=\"hqt\" style=\"display:none\">.gov</span>",
      "<span class=\"eqt\">.org</span><span class=\"hqt\" style=\"display:none\">.org</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A top-level domain (TLD) is the last segment of text in a domain name, such as .com, .net., .org etc. Sponsored top-level domains are a specialized TLD sponsored by private agencies and organizations. These top-level domains are reserved for groups and organizations that share common themes and criteria. Examples of sTLDs include .gov, .museum, .edu, .mil etc. </p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>Hyper Text Mark-up Language (HTML) is used to design which of the following?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2366;&#2311;&#2346;&#2352;&#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2350;&#2366;&#2352;&#2381;&#2325;&#2309;&#2346; &#2354;&#2376;&#2306;&#2327;&#2381;&#2357;&#2375;&#2332; (HTML) &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2337;&#2367;&#2332;&#2366;&#2311;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Computer Hardware</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Supercomputer</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2346;&#2352; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Mobile Phones</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2348;&#2366;&#2311;&#2354; &#2347;&#2379;&#2344;</span>",
      "<span class=\"eqt\">Web Pages</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2348; &#2346;&#2375;&#2332;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>First developed by Tim Berners-Lee in 1990, HTML is short for Hypertext Mark-up Language. </p><p>HTML is used to create <b>electronic documents (called pages)</b> that are displayed on the World Wide Web. Each page contains a series of connections to other pages called hyperlinks.</p><p>HTML is the combination of Hypertext and Mark-up language. Hypertext defines the link between the web pages. </p><p>A mark-up language is used to define the text document within tag which defines the structure of web pages.</p>",
    "question_index": 142
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following E-banking terms with their features:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A.RTGS</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) Batch processing of transactions</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B.NEFT</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) Real-time high-value transfer</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C.OTP</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) Time-sensitive security code</td></tr></table><p>Codes:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2312;-&#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2323;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2305;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A.RTGS</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) &#2354;&#2375;&#2344;-&#2342;&#2375;&#2344; &#2325;&#2368; &#2348;&#2376;&#2330; &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2367;&#2306;&#2327;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B.NEFT</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) &#2352;&#2367;&#2351;&#2354;-&#2335;&#2366;&#2311;&#2350; &#2361;&#2366;&#2312;-&#2357;&#2376;&#2354;&#2381;&#2351;&#2370; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2347;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C.OTP</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) &#2360;&#2350;&#2351;-&#2360;&#2306;&#2357;&#2375;&#2342;&#2344;&#2358;&#2368;&#2354; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2379;&#2337;</td></tr></table><p>&#2325;&#2379;&#2337;:</p></span>",
    "options": [
      "<span class=\"eqt\">A-2, B-1, C-3</span><span class=\"hqt\" style=\"display:none\">A-2, B-1, C-3</span>",
      "<span class=\"eqt\">A-1, B-2, C-3</span><span class=\"hqt\" style=\"display:none\">A-1, B-2, C-3</span>",
      "<span class=\"eqt\">A-3, B-2, C-1</span><span class=\"hqt\" style=\"display:none\">A-3, B-2, C-1</span>",
      "<span class=\"eqt\">A-2, B-3, C-1</span><span class=\"hqt\" style=\"display:none\">A-2, B-3, C-1</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>RTGS (2) is for immediate high-value transfers. NEFT (1) works in batches. OTP (3) is for two-factor authentication.</p>",
    "question_index": 143
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about Virtual Memory:</p><p>1) Virtual memory is a space on the Hard Disk that the CPU uses as if it were additional RAM.</p><p>2) Increasing the size of virtual memory is always as effective as adding more physical RAM. </p><p>Which of the above statements is/are correct? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2352;&#2381;&#2330;&#2369;&#2309;&#2354; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2357;&#2352;&#2381;&#2330;&#2369;&#2309;&#2354; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2361;&#2366;&#2352;&#2381;&#2337; &#2337;&#2367;&#2360;&#2381;&#2325; &#2346;&#2352; &#2319;&#2325; &#2320;&#2360;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; CPU &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; RAM &#2325;&#2368; &#2340;&#2352;&#2361; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2357;&#2352;&#2381;&#2330;&#2369;&#2309;&#2354; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2348;&#2338;&#2364;&#2366;&#2344;&#2366; &#2361;&#2350;&#2375;&#2358;&#2366; &#2349;&#2380;&#2340;&#2367;&#2325; RAM &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2332;&#2367;&#2340;&#2344;&#2366; &#2361;&#2368; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is correct. Statement 2 is incorrect; physical RAM is much faster than virtual memory (stored on a disk). Virtual memory prevents \"out of memory\" errors but slows down the system if used excessively (thrashing).</p>",
    "question_index": 144
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about Windows Operating System:</p><p>1) Windows 10 is an example of an open-source operating system.</p><p>2) The 'Taskbar' in Windows can be moved to the top, left, or right sides of the screen. Which of the above statements is/are correct? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2357;&#2367;&#2306;&#2337;&#2379;&#2332; 10 &#2319;&#2325; &#2323;&#2346;&#2344;-&#2360;&#2379;&#2352;&#2381;&#2360; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;&#2404;</p><p>2) &#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2350;&#2375;&#2306; '&#2335;&#2366;&#2360;&#2381;&#2325;&#2348;&#2366;&#2352;' &#2325;&#2379; &#2360;&#2381;&#2325;&#2381;&#2352;&#2368;&#2344; &#2325;&#2375; &#2314;&#2346;&#2352;, &#2348;&#2366;&#2312;&#2306; &#2351;&#2366; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2354;&#2375; &#2332;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement 1 is incorrect; Windows is proprietary (closed-source) software; Linux is open-source. Statement 2 is correct.</p>",
    "question_index": 145
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following option is NOT a characteristic of primary memory?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2346;&#2381;&#2352;&#2366;&#2311;&#2350;&#2352;&#2368; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2368; &#2319;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; <b>&#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Volatility</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2379;&#2354;&#2376;&#2335;&#2367;&#2354;&#2367;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Non-volatility</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2377;&#2344;-&#2357;&#2379;&#2354;&#2376;&#2335;&#2367;&#2354;&#2367;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Fast access speed</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2357;&#2381;&#2352; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2360;&#2381;&#2346;&#2368;&#2337;</span>",
      "<span class=\"eqt\">Limited capacity</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2350;&#2367;&#2340; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Primary memory, also known as main memory or RAM (Random Access Memory), is an essential component of a computer system. It is responsible for temporarily storing data and instructions that the CPU (Central Processing Unit) needs to process. </p><p>&#61623; Volatility: This is a correct characteristic of primary memory. It means that the data stored in primary memory is lost when the computer is powered off.</p><p>&#61623; Non-volatility: This is the incorrect option. Primary memory is volatile, meaning it loses its contents when power is removed.</p><p>&#61623; Fast access speed: This is a correct characteristic of primary memory. It allows the CPU to quickly retrieve data and instructions for processing.</p><p>&#61623; Limited capacity: This is a correct characteristic of primary memory. Compared to secondary storage devices (e.g., hard drives), primary memory has a relatively smaller capacity.</p>",
    "question_index": 146
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following protocols is commonly used with \"www\" in a URL?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; URL &#2350;&#2375;&#2306; \"www\" &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">FTP</span><span class=\"hqt\" style=\"display:none\">FTP</span>",
      "<span class=\"eqt\">HTTP</span><span class=\"hqt\" style=\"display:none\">HTTP</span>",
      "<span class=\"eqt\">SMTP</span><span class=\"hqt\" style=\"display:none\">SMTP</span>",
      "<span class=\"eqt\">SSH</span><span class=\"hqt\" style=\"display:none\">SSH</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Hypertext Transfer Protocol (HTTP) is the foundation of the World Wide Web and is used to load web pages using hypertext links. HTTP is an application layer protocol designed to transfer information between networked devices and runs on top of other layers of the network protocol stack. A typical flow over HTTP involves a client machine making a request to a server, which then sends a response message. </p><p>Each HTTP request made across the Internet carries with it a series of encoded data that carries different types of information. A typical HTTP request contains the HTTP version type, a URL, an HTTP method, HTTP request headers, and an Optional HTTP body.</p>",
    "question_index": 147
  },
  {
    "question": "<span class=\"eqt\"><p>The cell that is in use in a Microsoft spreadsheet is known as?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2360;&#2377;&#2347;&#2381;&#2335; &#2360;&#2381;&#2346;&#2381;&#2352;&#2375;&#2337;&#2358;&#2368;&#2335; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2350;&#2375;&#2306; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2375;&#2354; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Main Cell</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2344; &#2360;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Highlighted Cell</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2354;&#2366;&#2311;&#2335;&#2375;&#2337; &#2360;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Formula Cell</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2377;&#2352;&#2381;&#2350;&#2370;&#2354;&#2366; &#2360;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Active Cell</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2381;&#2335;&#2367;&#2357; &#2360;&#2375;&#2354;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Cell pointer/current cell/selected cell/an active cell is a rectangular box that highlights the cell in a spreadsheet. An active cell helps identify what cell is being worked with and where data will be entered. At the starting of Excel the active cell is the first cell, which is always A1. The cell can be moved by pressing the arrow keys or Enter on the keyboard, or can click on any cell using computer mouse. Pressing the F2 key will help to edit the active cell.The address of the active cell is shown in the formula bar.</p>",
    "question_index": 148
  },
  {
    "question": "<span class=\"eqt\"><p>The Secure Sockets Layer (SSL) is a protocol, uses________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2367;&#2325;&#2381;&#2351;&#2379;&#2352; &#2360;&#2377;&#2325;&#2375;&#2335; &#2354;&#2375;&#2351;&#2352; (SSL) &#2319;&#2325; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2361;&#2376;, &#2332;&#2379; &#2325;&#2367; _______ &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Domain Name Services</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2379;&#2350;&#2375;&#2344; &#2344;&#2375;&#2350; &#2360;&#2352;&#2381;&#2357;&#2367;&#2360;&#2375;&#2360;</span>",
      "<span class=\"eqt\">Transport Control Protocol</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2346;&#2379;&#2352;&#2381;&#2335; &#2325;&#2306;&#2335;&#2381;&#2352;&#2379;&#2354; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354;</span>",
      "<span class=\"eqt\">Internet Protocol</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Secure Sockets Layer (SSL) is a protocol, uses<b> Hypertext Transfer Protocol (HTTP) and Transport Control Protocol (TCP)</b> for managing the security of a message transmission on the Internet. The \"sockets\" term refers to the sockets method of passing data back and forth between a client and a server program in a network or between program layers in the same computer. SSL uses the public-and-private key encryption system, which also includes the use of a digital certificate.</p>",
    "question_index": 149
  }
