  {
    "question": "<span class=\"eqt\"><p>If (3a  -  4b): (8a  -  7b) = 3: 4, then what is the value of (6a<sup>2</sup> + 4b<sup>2</sup>): (15a<sup>2</sup>  -  b<sup>2</sup>)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (3a - 4b): (8a - 7b) = 3: 4 &#2361;&#2376;, &#2340;&#2379; (6a<sup>2</sup> + 4b<sup>2</sup>): (15a<sup>2</sup> - b<sup>2</sup>) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">33: 13</span><span class=\"hqt\" style=\"display:none\">33: 13</span>",
      "<span class=\"eqt\">30: 11</span><span class=\"hqt\" style=\"display:none\">30: 11</span>",
      "<span class=\"eqt\">28: 9</span><span class=\"hqt\" style=\"display:none\">28: 9</span>",
      "<span class=\"eqt\">22: 7</span><span class=\"hqt\" style=\"display:none\">22: 7</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Given; (3a  -  4b): (8a  -  7b) = 3: 4</p><p>4(3a  -  4b) = 3(8a  -  7b)</p><p>a = 5b/12</p><p>Therefore, (6a<sup>2</sup> + 4b<sup>2</sup>): (15a<sup>2</sup>  -  b<sup>2</sup>)</p><p>= (6 * (5b/12)<sup>2</sup> + 4b<sup>2</sup>): (15 * (5b/12)<sup>2</sup>  -  b<sup>2</sup>)</p><p>= <b>22: 7</b></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A thief is spotted by a policeman from a distance of 200 m. When the policeman starts to chase, the thief also starts running. If the speed of thief is 25 km/hour and that of the policeman is 30 km/hour, then how far will the thief run before he is caught?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2319;&#2325; &#2330;&#2379;&#2352; &#2325;&#2379; 200 m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2360;&#2375; &#2342;&#2375;&#2326; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2330;&#2379;&#2352; &#2325;&#2366; &#2346;&#2368;&#2331;&#2366; &#2325;&#2352;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2330;&#2379;&#2352; &#2349;&#2368; &#2349;&#2366;&#2327;&#2344;&#2375; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2330;&#2379;&#2352; &#2325;&#2368; &#2330;&#2366;&#2354; 25 km/h &#2361;&#2376; &#2324;&#2352; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2325;&#2368; &#2330;&#2366;&#2354; 30 km/h &#2361;&#2376;, &#2340;&#2379; &#2330;&#2379;&#2352; &#2346;&#2325;&#2337;&#2364;&#2375; &#2332;&#2366;&#2344;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352; &#2340;&#2325; &#2349;&#2366;&#2327;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1.2 km</span><span class=\"hqt\" style=\"display:none\">1.2 km</span>",
      "<span class=\"eqt\">1 km</span><span class=\"hqt\" style=\"display:none\">1 km</span>",
      "<span class=\"eqt\">1.5 km</span><span class=\"hqt\" style=\"display:none\">1.5 km</span>",
      "<span class=\"eqt\">1.8 km</span><span class=\"hqt\" style=\"display:none\">1.8 km</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Distance = speed &#215; time</p><p>Let, the time taken by policeman to catch the thief be T hours.</p><p>Distance travelled by thief in T hours = 25T</p><p>Distance travelled by policeman in T hours = 30T</p><p>According to question,</p><p>Distance travelled by policeman = distance travelled by thief&nbsp;&nbsp;+&nbsp;&nbsp;200/1000</p><p><span>&#8658;</span><span>&nbsp;30T = 25T + 1/5</span></p><p>So, T = 1/25 hour</p><p>So, distance travelled by thief = 25 &#215; 1/25 = 1 km</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If 2x  -  3y = 4 and 8x<sup>3</sup>  -  27y<sup>3</sup> = 208, then the value of the product of x and y is </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 2x - 3y = 4 &#2324;&#2352; 8x<sup>3</sup> - 27y<sup>3</sup> = 208 &#2361;&#2376;, &#2340;&#2379; x &#2324;&#2352; y &#2325;&#2375; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:____</p></span>",
    "options": [
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>formula of a<sup>3</sup>  -  b<sup>3 </sup>= (a  -  b)<sup>3</sup> + 3ab(a  -  b)</p> <p>So 8x<sup>3</sup>  -  27y<sup>3</sup> = (2x  -  3y)<sup>3</sup> + 3 (2x)(3y) (2x  -  3y)</p> <p>208= 64 + 72xy</p> <p>xy = 2</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The average of 7 numbers is 190. The average of first 3 numbers is 120 and the average of last 3 numbers is 275. Find 4th number.</p></span><span class=\"hqt\" style=\"display:none\"><p>7 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 190 &#2361;&#2376;&#2404; &#2346;&#2361;&#2354;&#2368; 3 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 120 &#2361;&#2376; &#2324;&#2352; &#2309;&#2306;&#2340;&#2367;&#2350; 3 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 275 &#2361;&#2376;, &#2340;&#2379; &#2330;&#2380;&#2341;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">155</span><span class=\"hqt\" style=\"display:none\">155</span>",
      "<span class=\"eqt\">152</span><span class=\"hqt\" style=\"display:none\">152</span>",
      "<span class=\"eqt\">148</span><span class=\"hqt\" style=\"display:none\">148</span>",
      "<span class=\"eqt\">145</span><span class=\"hqt\" style=\"display:none\">145</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Average of 7 numbers = 190</p><p>Total of 7 numbers = 190*7 = 1330</p><p>Average of first 3 numbers = 120</p><p>Total of first 3 numbers = 120*3 = 360</p><p>Average of last 3 numbers = 275</p><p>Total of last 3 numbers = 275*3 = 825</p><p>4<sup>th</sup> number = 1330  -  (360 + 825)</p><p>= 145</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Y and Z are mean and median of a data respectively and mode of the data is 51. If Y is 7 less than Z, then find the mean of the data.</p></span><span class=\"hqt\" style=\"display:none\"><p>Y &#2324;&#2352; Z &#2325;&#2367;&#2360;&#2368; &#2337;&#2375;&#2335;&#2366; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351; &#2324;&#2352; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; &#2361;&#2376;&#2306;, &#2324;&#2352; &#2337;&#2375;&#2335;&#2366; &#2325;&#2366; &#2348;&#2361;&#2369;&#2354;&#2325; 51 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; Y, Z &#2360;&#2375; 7 &#2325;&#2350; &#2361;&#2376;, &#2340;&#2379; &#2337;&#2375;&#2335;&#2366; &#2325;&#2366; &#2350;&#2366;&#2343;&#2381;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">40</span><span class=\"hqt\" style=\"display:none\">40</span>",
      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Z = Y + 7</p><p>Since, mode = 3 * median  -  2 * mean</p><p>3Z  -  2Y = 51</p><p>3(Y + 7)  -  2Y = 51</p><p>Y + 21 = 51</p><p>Y = 30</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A sum of money becomes Rs 72900 after 2 years and Rs 100000 after 5 years at a certain rate of compound interest. Find the principal? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2352; &#2346;&#2352; 2 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; 72900 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; 5 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; 100000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2350;&#2370;&#2354;&#2343;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs 59049</span><span class=\"hqt\" style=\"display:none\">59049 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs 59820</span><span class=\"hqt\" style=\"display:none\">59820 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs 59640</span><span class=\"hqt\" style=\"display:none\">59640 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs 59442</span><span class=\"hqt\" style=\"display:none\">59442 &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=300 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23242/image002.png\"></p><p>Difference between the years = 3 years, </p><p>So, R = &#8731;(100000/72900) = 10/9</p><p>P * 10/9 * 10/9 = 72900 </p><p>P = Rs 59049</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The difference between the greatest and the least four-digit numbers that begins with 7 and ends with 2 is:</p></span><span class=\"hqt\" style=\"display:none\"><p>7 &#2360;&#2375; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2324;&#2352; 2 &#2346;&#2352; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2330;&#2366;&#2352; &#2309;&#2306;&#2325;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2324;&#2352; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">980</span><span class=\"hqt\" style=\"display:none\">980</span>",
      "<span class=\"eqt\">900</span><span class=\"hqt\" style=\"display:none\">900</span>",
      "<span class=\"eqt\">908</span><span class=\"hqt\" style=\"display:none\">908</span>",
      "<span class=\"eqt\">990</span><span class=\"hqt\" style=\"display:none\">990</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Greatest four-digit number that begin with 7 and ends with 2 = 7992</p><p>Least four-digit number that begin with 7 and ends with 2 = 7002</p><p>Required difference = 7992  -  7002 = 990</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The difference between the circumference and diameter of a circular park is 300 m. A car goes round the park in exactly a minute. What is the speed of the car in Km/h?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2346;&#2366;&#2352;&#2381;&#2325; &#2325;&#2368; &#2346;&#2352;&#2367;&#2343;&#2367; &#2324;&#2352; &#2357;&#2381;&#2351;&#2366;&#2360; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 300 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;&#2404; &#2319;&#2325; &#2325;&#2366;&#2352; &#2336;&#2368;&#2325; &#2319;&#2325; &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2346;&#2366;&#2352;&#2381;&#2325; &#2325;&#2366; &#2330;&#2325;&#2381;&#2325;&#2352; &#2354;&#2327;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>",
      "<span class=\"eqt\">28</span><span class=\"hqt\" style=\"display:none\">28</span>",
      "<span class=\"eqt\">27.55</span><span class=\"hqt\" style=\"display:none\">27.55</span>",
      "<span class=\"eqt\">26.4</span><span class=\"hqt\" style=\"display:none\">26.4</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>2&#960;R - 2R = 300 (given), where R is radius</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/6e25e7af981105d0d2f358fb0c06810d.png\" /></p><p>The circumference is therefore = 2&#960;R = 2&#960; * 70 = 440 m</p><p>Thus in 1 minute the car travels 440 m. Therefore in 60 minutes the car travels = 60 &#215; 440 = 26,400 m.</p><p>Speed of car is 26.4 km/h.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>If (x + 21) and (3x  -  8) both are factors of px<sup>2</sup> + 55x  -  q = 0, then</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (x + 21) &#2324;&#2352; (3x - 8) &#2342;&#2379;&#2344;&#2379;&#2306; px<sup>2</sup> + 55x - q = 0 &#2325;&#2375; &#2327;&#2369;&#2339;&#2344;&#2326;&#2306;&#2337; &#2361;&#2376;&#2306;, &#2340;&#2379;</p></span>",
    "options": [
      "<span class=\"eqt\">28p = 11q</span><span class=\"hqt\" style=\"display:none\">28p = 11q</span>",
      "<span class=\"eqt\">p = 56q</span><span class=\"hqt\" style=\"display:none\">p = 56q</span>",
      "<span class=\"eqt\">23p = q</span><span class=\"hqt\" style=\"display:none\">23p = q</span>",
      "<span class=\"eqt\">56p = q</span><span class=\"hqt\" style=\"display:none\">56p = q</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>According to question,</p><p>(x + 21)(3x  -  8) = px<sup>2</sup> + 55x  -  q</p><p>3x<sup>2</sup> + 63x  -  8x  -  168 = px<sup>2</sup> + 55x  -  q</p><p>3x<sup>2</sup> + 55x  -  168 = px<sup>2</sup> + 55x  -  q</p><p>Comparing both sides we get,</p><p>p = 3, q = 168</p>",
    "question_index": 8

    "question": "<span class=\"eqt\"><p>The numbers 5, 7, 10, 12, 14, 18 and N are arranged in ascending order. If the mean of these numbers is equal to the median, find the value of N.</p></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; 5, 7, 10, 12, 14, 18 &#2324;&#2352; N &#2310;&#2352;&#2379;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2311;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2350;&#2366;&#2343;&#2381;&#2351;, &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;, &#2340;&#2379; N &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [

      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",

    "correct_option_id": 2,
    "solution": "<p>There are 7 numbers given and they are arranged in ascending order.</p><p>When the total number of observations is odd, the median is the middle term.</p><p>So, the median will be the 4th term.</p><p>From the given sequence, the 4th term is 12.</p><p>Hence, the median of the numbers is 12.</p><p>Now, find the mean.</p><p>First add all the known numbers: 5 + 7 + 10 + 12 + 14 + 18 = 66</p><p>Including N, the total sum becomes 66 + N.</p><p>Mean is equal to total sum divided by total number of observations, that is:</p><p>Mean = (66 + N) / 7</p><p>According to the question, the mean is equal to the median.</p><p>So, (66 + N) / 7 = 12</p><p>66 + N = 84</p><p>N = 18</p><p></p>",

    "question": "<span class=\"eqt\"><p>Roohi and Shreya working separately can do a piece of work in 18 days and 24 days, respectively. If Shreya leaves 3 days before the actual completion of the work, in how many days the work would get completed?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2370;&#2361;&#2368; &#2324;&#2352; &#2358;&#2381;&#2352;&#2375;&#2351;&#2366; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2319;&#2325; &#2325;&#2366;&#2350; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 18 &#2342;&#2367;&#2344; &#2324;&#2352; 24 &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2358;&#2381;&#2352;&#2375;&#2351;&#2366; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379;&#2344;&#2375; &#2360;&#2375; 3 &#2342;&#2367;&#2344; &#2346;&#2361;&#2354;&#2375; &#2330;&#2354;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",

    "correct_option_id": 2,

68; &#2310;&#2351;&#2369; &#2344;&#2367;&#2351;&#2366; &#2325;&#2368; &#2310;&#2351;&#2369; &#2360;&#2375; 60% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404;</p><p>(II) &#2340;&#2366;&#2352;&#2366; &#2344;&#2367;&#2351;&#2366; &#2360;&#2375; 18 &#2357;&#2352;&#2381;&#2359; &#2348;&#2337;&#2364;&#2368; &#2361;&#2376;&#2404; &#2325;&#2366;&#2332;&#2354; &#2325;&#2368; &#2310;&#2351;&#2369; 54 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;, &#2332;&#2379; &#2344;&#2367;&#2351;&#2366; &#2325;&#2368; &#2310;&#2351;&#2369; &#2360;&#2375; 80% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>In a school, 55% of the students are boys. Of the boys, 40% are in Class X and the rest are in Class IX. If there are 198 boys in Class X, what is the total number of students in the school?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; 55% &#2331;&#2366;&#2340;&#2381;&#2352; &#2354;&#2337;&#2364;&#2325;&#2375; &#2361;&#2376;&#2306;&#2404; &#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; 40% &#2354;&#2337;&#2364;&#2325;&#2375; &#2325;&#2325;&#2381;&#2359;&#2366; 10 &#2350;&#2375;&#2306; &#2324;&#2352; &#2358;&#2375;&#2359; &#2325;&#2325;&#2381;&#2359;&#2366; 9 &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2325;&#2325;&#2381;&#2359;&#2366; 10 &#2350;&#2375;&#2306; 198 &#2354;&#2337;&#2364;&#2325;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">720</span><span class=\"hqt\" style=\"display:none\">720</span>",
      "<span class=\"eqt\">810</span><span class=\"hqt\" style=\"display:none\">810</span>",
      "<span class=\"eqt\">880</span><span class=\"hqt\" style=\"display:none\">880</span>",
      "<span class=\"eqt\">900</span><span class=\"hqt\" style=\"display:none\">900</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let T = total number of students.</p><p>Number of boys = 55% of T = 0.55T.</p><p>Boys in Class X = 40% of boys = 0.40  X  0.55T = 0.22T.</p><p>0.22T = 198 =&gt; T = 198 / 0.22 = 900.</p>",
    "question_index": 42
  },

    "question": "<span class=\"eqt\"><p>In the following question below are given some statements followed by some conclusions based on those statements. Take the given statements to be true even if they seem to be at variance from commonly known facts. Read all the conclusions and then decide which of the given conclusions logically follows the given statements. </p><p><b>Statements: </b></p><p>Some flowers are fruits. </p><p>All flowers are buds. </p><p>No walnuts are fruits. </p><p><b>Conclusions: </b></p><p>I. Some flowers are not fruits. </p><p>II. All walnuts are flowers. </p><p>III. Some buds are flowers. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306; &#2324;&#2352; &#2313;&#2344; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2325;&#2369;&#2331; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2367;&#2319; &#2349;&#2354;&#2375; &#2361;&#2368; &#2357;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2340;&#2368;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2379;&#2306;&#2404; &#2360;&#2349;&#2368; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2379; &#2346;&#2397;&#2367;&#2319; &#2324;&#2352; &#2347;&#2367;&#2352; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;     "question": "<span class=\"eqt\"><p>The question below has a statement followed by two conclusions numbered I and II. You have to assume everything in the statement to be true, then consider the two conclusions together and decide which of them logically follow(s) beyond a reasonable doubt from the information given in the statement.</p><p></p><p><b>Statement: </b>The best way to face anxiety is to face our fears.</p><p><b>Conclusion:</b></p><p>I. Life is beautiful without any fears.</p><p>II. Fear is the only reason for anxiety in people.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2341;&#2344; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2360;&#2349;&#2368; &#2348;&#2366;&#2340;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2344;&#2366; &#2361;&#2376;, &#2347;&#2367;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2346;&#2352; &#2319;&#2325; &#2360;&#2366;&#2341; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306; &#2325;&#2367; &#2313;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2340;&#2352;&#2381;&#2325;&#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2342;&#2375;&#2361; &#2360;&#2375; &#2346;&#2352;&#2375; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366; &#2309;&#234     "options": [

    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>Who is reviewing the detailed report on urban development before submission to the municipal authorities?</p>",
    "options": [
      "By whom is the detailed report on urban development being reviewed before submission to the municipal authorities?",
      "The detailed report on urban development is reviewing by whom before submission to the municipal authorities?",
      "Whom is reviewing the detailed report on urban development before submission to the municipal authorities?",
      "The detailed report on urban development has been reviewed by whom before submission to the municipal authorities?"
    ],
    "correct_option_id": 0,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of verb is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object.</p><p>The Active voice in this question is in Present Continuous Interrogative. Thus, the Passive voice will also be in Present Continuous Interrogative.</p><p>The format of the Active voice is: Subject + is/are + V1-ing + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice + is/are + being + V3 + by + Subject of the active voice.</p><p>Example:</p><p>Active: Who is reviewing the detailed report on urban development?</p><p>Passive: By whom is the detailed report on urban development being reviewed?</p><p>Options (b), (c), and (d) are incorrect:</p><p>2) makes the object incorrectly the doer.</p><p>3) keeps active structure and is ungrammatical.</p><p>4) changes the tense to Present Perfect incorrectly.</p><p>The options except (a) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is: (a).</p>",
    "question_index": 60
  },

    "comp": "<p><b>Directions :</b>Read the following passage and answer the questions based on the passage.</p><p>Traditional water management practices in India demonstrate a harmonious relationship between human needs, geography, and community cooperation. Developed over centuries, these systems emphasise rainwater harvesting, groundwater recharge, and equitable distribution of water resources. Rather than treating water as a commodity, such practices regard it as a shared responsibility essential for social stability and ecological balance.</p><p>Across different regions, communities constructed tanks, stepwells, johads, and canals suited to local terrain and rainfall patterns. These structures were maintained collectively, ensuring sustainable usage and reducing dependence on distant water sources. In rural settings, shared water management strengthened social cohesion while supporting agriculture and daily life.</p><p>Moreover, traditional water systems encouraged conservation and disciplined consumption. Practices such as regulated irrigation, seasonal water storage, and restrictions during scarcity prevented overuse and environmental degradation. At a time when modern infrastructure often overlooks ecological limits, these methods offer valuable insights into sustainable resource management.</p><p>However, these indigenous systems face serious threats. Urban expansion, neglect of traditional knowledge, and reliance on centralised water supply have led to their decline. Climate change and erratic rainfall further intensify water stress. Reviving these practices therefore requires community participation, policy intervention, and awareness. When adapted to contemporary needs, traditional water management can play a vital role in ensuring water security and environmental resilience.</p>",

    "question": "<p>Choose the most suitable option to replace the highlighted part of the sentence:</p><p>The manager insisted that every member <b><i>submits their annual appraisal by Friday</i></b>.</p>",
    "options": [
      "submits his or their annual appraisals by Friday",
      "submitted their annual appraisal by Friday",
      "should submit their annual appraisal by Friday",
      "submit his or her annual appraisal by Friday"
    ],
    "correct_option_id": 3,
    "solution": "<p>The grammar concept of \"mandative subjunctive and pronoun - antecedent agreement\" applies here. After verbs like \"insist\" (mandative verbs), we use \"that + subject + base verb (bare infinitive) (subjunctive)\". Also, \"every member\" is singular, so the pronoun must be singular.</p><p>The highlighted part is wrong because \"submits\" uses a present indicative (not the subjunctive) and \"their\" disagrees in number with every member (singular).</p><p>Option (a) - incorrect</p><p>Mixes singular/plural pronouns awkwardly; \"submits\" is indicative (not subjunctive). Also, \"his or their\" is clumsy and mismatched.</p><p>Option (b) - incorrect</p><p>The past tense \"submitted\" conflicts with the present mandative context; \"their\" still disagrees with the singular subject.</p><p>Option (c) - incorrect</p><p>Uses \"should + infinitive\"  -  acceptable in some varieties but deviates from the classical mandative subjunctive that requires the bare verb. Also, \"their\" still mismatches the singular antecedent.</p><p>Option (d) - correct</p><p>Uses the bare infinitive \"submit\" after \"insisted that\", matching the mandative subjunctive. Replaces plural \"their\" with singular \"his or her\" to agree with \"every member\"; also makes the noun singular \"appraisal\" to match. This resolves both errors.</p><p><b>Note: </b>Mandative subjunctive = use of base verb (no -s) after verbs expressing demand, insistence, suggestion (e.g., The committee recommended that he go). Pronoun - antecedent agreement requires pronouns to match their antecedent in number.</p>",
    "question_index": 78

    "question": "<p>Choose the most suitable option to replace the highlighted part of the sentence:</p><p>Rarely in his career <b><i>he has performed so poorly</i></b> in front of stakeholders.</p>",
    "options": [
      "has he performed so little poorly",
      "he had performed so poorly",
      "has he performed so poorly",
      "he performed so poorly"
    ],
    "correct_option_id": 2,
    "solution": "<p>The grammar concept of \"subject - auxiliary inversion after negative adverbials\" applies here. When a clause begins with a negative or limiting adverbial such as \"rarely,\" the auxiliary verb must precede the subject to maintain formal grammar and emphasis.</p><p>The highlighted part is wrong because \"Rarely ... he has performed\" violates this inversion; the auxiliary \"has\" must come before the subject \"he.\"</p><p>Option (a) - incorrect</p><p>\"so little poorly\" is ungrammatical and awkward; the meaning is distorted.</p><p>Option (b) - incorrect</p><p>Fails to invert; \"had performed\" changes tense unnecessarily, making it contextually inaccurate.</p><p>Option (c) - correct</p><p>Performs the required inversion (\"has\" before \"he\"), retains present perfect to reflect recent relevance, and maintains intended meaning.</p><p>Option (d) - incorrect</p><p>Simple past \"he performed\" fails to invert and removes the present perfect aspect, weakening emphasis.</p><p>Corrected sentence: Rarely in his career has he performed so poorly in front of stakeholders.</p><p>Hence, option (c) is correct.</p><p><b>Note:</b> Inversion after negative adverbials is common in formal styles: Never have I seen..., Seldom will you find.... Inversion here signals emphasis and is grammatically required in many contexts.</p>",

    "question": "<p>Fill in the blank with an appropriate degree of comparison.</p><p>Of all the players on the team, he is ____________.</p>",
    "options": [
      "the taller",
      "tallest",
      "the most tall",
      "the tallest"
    ],
    "correct_option_id": 3,
    "solution": "<p>The phrase \"Of all the players\" indicates that one player is being compared to the entire group, which requires the superlative degree. For a short, one-syllable adjective like \"tall,\" the superlative is formed by adding \"-est\" and is preceded by the definite article \"the.\"</p><p>&#183; <b>Option a) the taller:</b> This is the comparative degree, used for comparing two players.</p><p>&#183; <b>Option b) tallest:</b> This is the correct superlative adjective, but it is missing the required definite article \"the.\"</p><p>&#183; <b>Option c) the most tall:</b> For short adjectives, we add \"-est,\" not \"most.\"</p><p>&#183; <b>Option d) the tallest:</b> Correct. This correctly uses the superlative form with the definite article.</p><p><b>The complete sentence is:</b> Of all the players on the team, he is <b>the tallest</b>.</p><p>Hence, option (d) is the correct answer. </p><p><b>Note: </b>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",

    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>The coach shouted at the players, \"Run two laps around the field immediately and then start your stretching exercises without delay.\"</p>",
    "options": [
      "The coach ordered the players to run two laps around the field immediately and then to start their stretching exercises without delay.",
      "The coach told the players that they should run two laps around the field immediately and then start their stretching exercises without delay.",
      "The coach requested the players to run two laps around the field immediately and then to start their stretching exercises without delay.",
      "The coach shouted at the players that run two laps around the field immediately and then start your stretching exercises without delay."
    ],
    "correct_option_id": 0,
    "solution": "<p>Imperative Sentences are used to demonstrate Request, Order, Command, etc. The reporting verbs like \"said\", \"say\", etc. in direct speech are changed into \"begged\", \"ordered\", etc. \"To\" is used before the Principal Verbs in the Indirect Speech.</p><p>For example:</p><p>John said to his assistant, \"Bring me a glass of water.\" (Direct Speech)</p><p>John ordered his assistant to bring him a glass of water. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>\"shouted at\" changes to \"ordered\" (as it implies a command).</p><p>The imperative verb \"Run\" changes to \"to run\".</p><p>\"start\" changes to \"to start\".</p><p>\"your\" changes to \"their\".</p><p>Therefore, the correct answer is: \"The coach ordered the players to run two laps around the field immediately and then to start their stretching exercises without delay.\"</p><p>Hence, option (a) is correct.</p>",
    "question_index": 101
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>The customer asked the manager if the bank was providing locker facility.</p>",
    "options": [
      "The customer said to the manager, \"Was bank providing locker facility?\"",
      "The customer said to the manager, \"Will bank providing locker facility?\"",
      "The customer said to the manager, \"Is bank providing locker facility?\"",
      "The customer said to the manager, \"Bank is providing locker facility?\""
    ],
    "correct_option_id": 2,
    "solution": "<p>In the case of sentences like this where the sentence takes an <b>Interrogative form</b> in Direct Speech, \"enquired (of)\", \"wanted to know\", \"asked\", etc. in Indirect Speech is changed into \"said\" in Direct Speech.</p><p>In Direct speech, the <b>verb</b> is always placed <b>before</b> the <b>subject</b>, unlike in Indirect Speech.</p><p>If there is a question whose answer can come as \"Yes\" or \"No\", we should use \"If\" or \"Whether\" before the Indirect Speech and \"Is/are/am/was/were\" before the Direct Speech.</p><p>For example:</p><p>Kane asked him if he was doing well. (Indirect Speech)</p><p>Kane said to him, \"Are you doing well?\" (Direct Speech)</p><p>The tense of the Indirect Speech is in the <b>Past Continuous Tense</b>. So, the tense in the Direct Speech will be in the <b>Present Continuous Tense</b>.</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">asked.. if</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">bank was providing</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Is bank providing</td></tr></table><p>From the given options, one that follows the above mentioned conditions for Direct speech is option (c) \"The customer said to the manager, \"Is bank providing locker facility?\"\"</p><p>Hence, the correct answer is option (c). </p>",
    "question_index": 102
  },

    "correct_option_id": 1,

    "question": "<span class=\"eqt\"><p>Which of the following shows the highest degree of ionisation in water?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2332;&#2354; &#2350;&#2375;&#2306; &#2313;&#2330;&#2381;&#2330;&#2340;&#2350; &#2310;&#2351;&#2344;&#2368;&#2325;&#2352;&#2339; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Acetic acid</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360;&#2368;&#2335;&#2367;&#2325; &#2309;&#2350;&#2381;&#2354;</span>",
      "<span class=\"eqt\">Hydrochloric acid</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2325;&#2381;&#2354;&#2379;&#2352;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337;</span>",
      "<span class=\"eqt\">Ammonia</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2379;&#2344;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Carbonic acid</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2344;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Hydrochloric acid shows the highest degree of ionisation. </p><p><b>Explanation:</b></p><p>&#183; Hydrochloric acid (HCl) is a strong acid. In water, it dissociates (ionises) almost 100% into H<sup>+</sup> and Cl<sup>&#8722;</sup> ions.</p><p>&#183; Acetic acid and Carbonic acid are weak acids and only partially ionise. Ammonia is a weak base that also ionises only slightly in water.</p><p><b>Further Insights:</b></p><p>The strength of an acid is measured by its acid dissociation constant (Ka). Strong acids have very high Ka values.</p>",
    "question_index": 105
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the doctrine of separation of powers in India:</p><p>Statement I: The Constitution of India explicitly provides for a rigid separation of powers among the Legislature, Executive, and Judiciary.</p><p>Statement II: Judicial review in India has evolved mainly through constitutional interpretation rather than explicit textual separation.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2346;&#2371;&#2341;&#2325;&#2381;&#2325;&#2352;&#2339; &#2325;&#2375; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; I: &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2357;&#2367;&#2343;&#2366;&#2351;&#2367;&#2325;&#2366;, &#2325;&#2366;&#2352;&#2381;&#2351;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2324;&#2352; &#2344;&#2381;&#2351;&#2366;&#2351;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2325;&#2336;&#2379;&#2352; &#2346;&#2371;&#2341;&#2325;&#2381;&#2325;&#2352;&#2339; &#2325;&#2366; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2360;&#2350;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2361;&#2369;&#2312; &#2361;&#2376;, &#2344; &#2325;&#2367; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2358;&#2366;&#2348;&#2381;&#2342;&#2367;&#2325; &#2346;&#2371;&#2341;&#2325;&#2381;&#2325;&#2352;&#2339; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement II is correct. </p><p>Statement I is incorrect because the Indian Constitution follows a system of \"Checks and Balances\" rather than a rigid separation of powers.</p><p><b>Explanation of Statements:</b></p><p>I. is Incorrect. Unlike the US Constitution, the Indian Constitution does not provide for a rigid separation of powers. While the three organs are distinct, they overlap. For example, the Executive is part of the Legislature (Parliamentary form), and the Judiciary can strike down laws.</p><p>II. is Correct. The concept of \"Separation of Powers\" is not explicitly mentioned in the text of the Constitution as a titled doctrine. It has been recognized as part of the \"Basic Structure\" of the Constitution primarily through landmark Supreme Court judgments (e.g., Kesavananda Bharati case).</p><p><b>Further Insights:</b></p><p>Article 50 (Directive Principles) suggests the separation of the Judiciary from the Executive in public services, but this is a directional principle, not a rigid structural mandate for all three branches.</p>",
    "question_index": 106
  },

    "question": "<span class=\"eqt\"><p>Which of the following are treated as leakages in the circular flow of income?</p><p>1)Taxes</p><p>2)Savings</p><p>3)Government expenditure</p><p>4)Exports</p><p>Select the correct answer using the code below:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2310;&#2351; &#2325;&#2375; &#2330;&#2325;&#2381;&#2352;&#2368;&#2351; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2350;&#2375;&#2306; &#2352;&#2367;&#2360;&#2366;&#2357; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p><p>1) &#2325;&#2352;</p><p>2) &#2348;&#2330;&#2340;</p><p>3) &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2357;&#2381;&#2351;&#2351;</p><p>4) &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1, 2 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1, 2 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">3 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 3 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">1, 2, 3 and 4</span><span class=\"hqt\" style=\"display:none\">1, 2, 3 &#2324;&#2352; 4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In the <b>Circular Flow of Income</b>, the economy is viewed as a continuous loop of money between households and firms. However, this flow is affected by \"Injections\" and \"Leakages.\"</p><p>1) Leakages (Withdrawals)</p><p>Leakages are variables that <b>reduce</b> the flow of money in the economy. When money is leaked, it is not spent on domestic goods and services immediately.</p><p>&#183; <b>Savings (S):</b> Money kept aside by households instead of being spent on consumption.</p><p>&#183; <b>Taxes (T):</b> Money paid to the government, which reduces the disposable income of households and firms.</p><p>&#183; <b>Imports (M):</b> Money spent on foreign goods, which leaves the domestic circular flow.</p><p>2) Injections</p><p>Injections are variables that <b>increase</b> the flow of money in the economy from outside the basic household-firm relationship.</p><p>&#183; <b>Investment (I):</b> Firms spending on capital goods.</p><p>&#183; <b>Government Expenditure (G):</b> Money spent by the government on infrastructure, salaries, etc.</p><p>&#183; <b>Exports (X):</b> Money coming into the country from foreign buyers.</p><p><b>Further Insights:</b></p><p>Leakages (S+T+M) must equal Injections (I+G+X) for the economy to be in equilibrium.</p>",
    "question_index": 107
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding inflation targeting in India:</p><p>Statement I: Flexible inflation targeting was formally adopted after the 2016 amendment to the RBI Act.</p><p>Statement II: Under this framework, growth objectives are explicitly prioritised over inflation control.</p><p>Which of the above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; I: &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2367;&#2332;&#2364;&#2352;&#2381;&#2357; &#2348;&#2376;&#2306;&#2325; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2350;&#2375;&#2306; 2016 &#2325;&#2375; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2354;&#2330;&#2368;&#2354;&#2375; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2324;&#2346;&#2330;&#2366;&#2352;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2346;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2311;&#2360; &#2338;&#2366;&#2306;&#2330;&#2375; &#2325;&#2375; &#2340;&#2361;&#2340;, &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2357;&#2367;&#2325;&#2366;&#2360; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct. </p><p>Statement II is incorrect because under the Flexible Inflation Targeting (FIT) framework, price stability is the primary objective, while growth is a secondary objective. Therefore, the correct option is Only I.</p><p><b>Explanation of Statements:</b></p><p>I. is Correct. The Reserve Bank of India (RBI) Act, 1934, was amended in 2016 to provide a statutory basis for the implementation of the flexible inflation targeting framework.</p><p>II. is Incorrect. The primary mandate is to maintain price stability (targeting 4% +/- 2%) while \"keeping in mind the objective of growth.\" Growth is not prioritized over inflation control.</p><p><b>Further Insights:</b></p><p>The Monetary Policy Committee (MPC) consists of six members and meets at least four times a year to decide the policy repo rate.</p>",
    "question_index": 108
  },

    "question": "<span class=\"eqt\"><p>Who among the following won the junior women's air pistol gold at the 16th Asian Shooting Championship in Shymkent, Kazakhstan, in August 2025?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2327;&#2360;&#2381;&#2340; 2025 &#2350;&#2375;&#2306; &#2325;&#2332;&#2366;&#2325;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344; &#2325;&#2375; &#2358;&#2367;&#2350;&#2325;&#2375;&#2306;&#2335; &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; 16&#2357;&#2368;&#2306; &#2319;&#2358;&#2367;&#2351;&#2366;&#2312; &#2358;&#2370;&#2335;&#2367;&#2306;&#2327; &#2330;&#2376;&#2306;&#2346;&#2367;&#2351;&#2344;&#2358;&#2367;&#2346; &#2350;&#2375;&#2306; &#2332;&#2370;&#2344;&#2367;&#2351;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366; &#2319;&#2351;&#2352; &#2346;&#2367;&#2360;&#2381;&#2335;&#2354; &#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2346;&#2342;&#2325; &#2325;&#2367;&#2360;&#2344;&#2375; &#2332;&#2368;&#2340;&#2366;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p>In the 16th Asian Shooting Championship, <b>Rashmika Sahgal</b> won gold, India's third individual yellow medal on day two of the competition at Shymkent in Kazakhstan. Rashmika clinched the junior women's air pistol crown with her impressive score of 241.9, a yawning 4.3 ahead of silver-winning Korean Han Seunghyun.</p><p>Earlier, Manu Bhaker, a double Olympic bronze medallist, bagged another individual international medal as she shot 219.7 in the women's 10m air pistol final to finish third. It was double delight for Rashmika (qualification score 582), as she combined with Vanshika Chaudhary (573) and Mohini Singh (565) to win the team gold in the event.</p><p>Manu (583) also won a team bronze in women's air pistol alongside reigning Asian Games champ Palak (573) and Suruchi Phogat (574).</p>",

    "question": "<span class=\"eqt\"><p>Which of the following pair of schemes is an Integrated Nutrition Support Programme?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2332;&#2379;&#2337;&#2364;&#2368; &#2319;&#2325;&#2368;&#2325;&#2371;&#2340; &#2346;&#2379;&#2359;&#2339; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">PM-POSHAN and Mission Indradhanush</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2319;&#2350;-&#2346;&#2379;&#2359;&#2339; &#2324;&#2352; &#2350;&#2367;&#2358;&#2344; &#2311;&#2306;&#2342;&#2381;&#2352;&#2343;&#2344;&#2369;&#2359;</span>",
      "<span class=\"eqt\">Saksham Anganwadi and Poshan 2.0</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2381;&#2359;&#2350; &#2310;&#2306;&#2327;&#2344;&#2357;&#2366;&#2337;&#2364;&#2368; &#2324;&#2352; &#2346;&#2379;&#2359;&#2339; 2.0</span>",
      "<span class=\"eqt\">Poshan Abhiyaan and ICDS</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2359;&#2339; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; &#2324;&#2352; &#2310;&#2312;&#2360;&#2368;&#2337;&#2368;&#2319;&#2360;</span>",
      "<span class=\"eqt\">Mission Indradhanush and Poshan</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2358;&#2344; &#2311;&#2306;&#2342;&#2381;&#2352;&#2343;&#2344;&#2369;&#2359; &#2324;&#2352; &#2346;&#2379;&#2359;&#2339;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Saksham Anganwadi and Poshan 2.0 is an Integrated Nutrition Support Programme. It seeks to address the challenges of malnutrition in children, adolescent girls, pregnant women and lactating mothers through a strategic shift in nutrition content and delivery and by creation of a convergent eco-system to develop and promote practices that nurture health, wellness and immunity.</p><p>Ministry of Women and Child Development has issued Operational Guidelines regarding implementation of 'Saksham Anganwadi and Poshan 2.0'. The scheme has been approved by the Government of India for implementation during the 15<sup>th</sup> Finance Commission period 202l-22 to 2025-26.</p>",
    "question_index": 110
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following pairs is/are correctly matched?</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Movement</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Associated Leader</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) Indigo Revolt</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Digambar Biswas</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) Deccan Riots</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Jyotiba Phule</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) Wahabi Movement</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Syed Ahmed Barelvi</td></tr></table><p>Select the correct answer:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2366; &#2360;&#2361;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2350;&#2375;&#2354; &#2326;&#2366;&#2340;&#2366; &#2361;&#2376;/&#2326;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2361;&#2351;&#2379;&#2327;&#2368; &#2344;&#2375;&#2340;&#2366;</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) &#2344;&#2368;&#2354; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2342;&#2367;&#2327;&#2306;&#2348;&#2352; &#2348;&#2367;&#2360;&#2381;&#2357;&#2366;&#2360;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) &#2342;&#2325;&#2381;&#2325;&#2344; &#2342;&#2306;&#2327;&#2375;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2332;&#2381;&#2351;&#2379;&#2340;&#2367;&#2348;&#2366; &#2347;&#2369;&#2354;&#2375;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) &#2357;&#2361;&#2366;&#2348;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2376;&#2351;&#2342; &#2309;&#2361;&#2350;&#2342; &#2348;&#2352;&#2375;&#2354;&#2357;&#2368;</td></tr></table><p>&#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Matches 1 and 3 are correct. </p><p>Match 2 is incorrect because the Deccan Riots were a spontaneous peasant uprising against moneylenders, not led specifically by Jyotiba Phule. </p><p><b>Explanation of Statements:</b></p><p>1) (Indigo Revolt) is Correct. Led by Digambar Biswas and Bishnu Biswas in 1859 in Bengal.</p><p>2) (Deccan Riots) is Incorrect. While Phule's Satyashodhak Samaj supported peasant causes, the 1875 riots were a widespread social boycott and uprising against \"Sowkars\" (moneylenders).</p><p>3) (Wahabi Movement) is Correct. Syed Ahmed Barelvi was the key leader who sought to return to original Islam and fought against the British and Sikhs.</p><p><b>Further Insights:</b></p><p>The Indigo Revolt was famous for being supported by the intelligentsia (e.g., Dinabandhu Mitra's Neel Darpan).</p>",
    "question_index": 111
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding PM-KUSUM:</p><p>I. It aims to promote solar pumps in agriculture.</p><p>II. It reduces dependence on diesel and grid electricity.</p><p>III. It is implemented solely by the Ministry of Power.</p><p>Which are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2368;&#2319;&#2350;-&#2325;&#2369;&#2360;&#2369;&#2350; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2311;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2371;&#2359;&#2367; &#2350;&#2375;&#2306; &#2360;&#2380;&#2352; &#2346;&#2306;&#2346;&#2379;&#2306; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2361; &#2337;&#2368;&#2332;&#2354; &#2324;&#2352; &#2327;&#2381;&#2352;&#2367;&#2337; &#2348;&#2367;&#2332;&#2354;&#2368; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352;&#2340;&#2366; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2311;&#2360;&#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2351;&#2344; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2324;&#2352; &#2340;&#2371;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements I and II are correct. Statement III is incorrect because it is implemented by the Ministry of New and Renewable Energy (MNRE). </p><p><b>Explanation of Statements:</b></p><p>I. is Correct. The scheme aims to provide energy security to farmers by installing solar pumps and grid-connected solar power plants.</p><p>II. is Correct. By using solar energy, it significantly reduces the need for expensive diesel pumps and eases the burden on the electricity grid.</p><p>III. is Incorrect. It is the flagship scheme of the Ministry of New and Renewable Energy, not the Ministry of Power.</p><p><b>Further Insights:</b></p><p>KUSUM stands for Kisan Urja Suraksha evam Utthaan Mahabhiyan.</p>",
    "question_index": 112
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding El Ni&#241;o:</p><p>i. It weakens Walker circulation.</p><p>ii. It leads to warming of eastern Pacific waters.</p><p>iii. It invariably causes drought in India.</p><p>Which of the above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2354; &#2344;&#2368;&#2344;&#2379; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. &#2351;&#2361; &#2357;&#2377;&#2325;&#2352; &#2346;&#2352;&#2367;&#2360;&#2306;&#2330;&#2352;&#2339; &#2325;&#2379; &#2325;&#2350;&#2332;&#2379;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>ii. &#2351;&#2361; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2346;&#2381;&#2352;&#2358;&#2366;&#2306;&#2340; &#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352; &#2325;&#2375; &#2332;&#2354; &#2325;&#2375; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>iii. &#2351;&#2361; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2361;&#2350;&#2375;&#2358;&#2366; &#2360;&#2370;&#2326;&#2366; &#2354;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i and ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">ii and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements i and ii are correct. Statement iii is incorrect because while El Ni&#241;o often correlates with poor monsoons, it does not \"invariably\" cause drought. </p><p><b>Explanation of Statements:</b></p><p>i. is Correct. El Ni&#241;o disrupts the standard Pacific pressure gradient, thereby weakening the Walker Circulation.</p><p>ii. is Correct. It is characterized by the unusual warming of surface waters in the eastern tropical Pacific Ocean.</p><p>iii. is Incorrect. India has had El Ni&#241;o years with normal rainfall (e.g., 1997), and some droughts occur without El Ni&#241;o.</p><p><b>Further Insights:</b></p><p>The reverse phenomenon (cooling of eastern Pacific) is called La Ni&#241;a, which generally benefits the Indian monsoon.</p>",
    "question_index": 113
  },
  {
    "question": "<span class=\"eqt\"><p>Given below are two statements marked as Assertion and Reason. Choose the correct option.</p><p>Assertion (A): An increase in repo rate does not immediately reduce inflation.</p><p>Reason (R): Monetary transmission in India is affected by structural rigidities in banking.</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2325;&#2341;&#2344; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2352;&#2375;&#2346;&#2379; &#2342;&#2352; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2360;&#2375; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2340;&#2369;&#2352;&#2306;&#2340; &#2325;&#2350; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; &#2325;&#2366;&#2352;&#2339; (R): &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2360;&#2306;&#2330;&#2352;&#2339; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2350;&#2375;&#2306; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2325;&#2336;&#2379;&#2352;&#2340;&#2366;&#2323;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true and R explains A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2324;&#2352; R, A &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true but R does not explain A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is false but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Assertion (A) is Correct. Monetary policy changes usually have a \"time lag.\" An increase in repo rate takes months to reflect in the retail inflation rate.</p><p>Reason (R) is Correct. Structural rigidities (like the slow adjustment of deposit rates and high NPA levels) hinder the smooth \"transmission\" of RBI's rate cuts or hikes to the end consumers.</p><p><b>Further Insights:</b></p><p>The transition from MCLR to External Benchmark Linked Rates (EBLR) was intended to improve this transmission.</p>",
    "question_index": 114
  },
  {
    "question": "<span class=\"eqt\"><p>Which phenomenon explains bending of sound around obstacles?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2328;&#2335;&#2344;&#2366; &#2348;&#2366;&#2343;&#2366;&#2323;&#2306; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2375; &#2350;&#2369;&#2337;&#2364;&#2344;&#2375; &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Reflection</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348;</span>",
      "<span class=\"eqt\">Refraction</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Diffraction</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Interference</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2326;&#2354; &#2309;&#2306;&#2342;&#2366;&#2332;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Diffraction is the bending of waves around the corners of an obstacle or through an aperture. Because sound waves have relatively long wavelengths, they can easily bend around doors, walls, and other large obstacles.</p><p>Reflection causes echoes. Refraction involves sound bending due to temperature or medium changes.</p>",
    "question_index": 115
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Sangam polity:</p><p>Statement I: Kingship was hereditary but constrained by assemblies.</p><p>Statement II: Sabhas exercised military command.</p><p>Which is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2327;&#2350; &#2358;&#2366;&#2360;&#2344; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2352;&#2366;&#2332;&#2340;&#2381;&#2357; &#2357;&#2306;&#2358;&#2366;&#2344;&#2369;&#2327;&#2340; &#2341;&#2366;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2360;&#2349;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2341;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2360;&#2349;&#2366;&#2323;&#2306; &#2325;&#2375; &#2346;&#2366;&#2360; &#2360;&#2376;&#2344;&#2381;&#2351; &#2325;&#2350;&#2366;&#2344; &#2341;&#2368;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct. Statement II is incorrect because Sabhas were assemblies for judicial and local administration, not specialized military commands. </p><p><b>Explanation of Statements:</b></p><p>I. is Correct. Kingship was hereditary (the \"Vendars\"), but the king's power was balanced by councils like the Aimperunguzhu (Five-member council).</p><p>II. is Incorrect. The army was a separate professional entity with its own commanders (Enadi); Sabhas were general assemblies.</p><p><b>Further Insights:</b></p><p>The three great dynasties of the Sangam period were the Cheras, Cholas, and Pandyas.</p>",
    "question_index": 116
  },
