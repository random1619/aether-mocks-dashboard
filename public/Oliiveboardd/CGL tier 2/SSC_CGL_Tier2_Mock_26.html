        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If the equation of lines 6x + 9y = 15 and 8x + ay = b are coincident, then the value of (a  -  b) is -</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2352;&#2375;&#2326;&#2366;&#2323;&#2306; 6x + 9y = 15 &#2324;&#2352; 8x + ay = b &#2325;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2306;&#2346;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; (a - b) &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376; -</p></span>",
    "options": [
      "<span class=\"eqt\">-8</span><span class=\"hqt\" style=\"display:none\">-8</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">-9</span><span class=\"hqt\" style=\"display:none\">-9</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>When a<sub>1</sub>x + b<sub>1</sub>y + c<sub>1</sub> = 0 and a<sub>2</sub>x + b<sub>2</sub>y + c<sub>2</sub> = 0 are coincident, then</p><p>a<sub>1</sub>/a<sub>2</sub> = b<sub>1</sub>/b<sub>2</sub> = c<sub>1</sub>/c<sub>2</sub></p><p>Now, equation of lines 6x + 9y  -  15 = 0 and 8x + ay  -  b = 0 are coincident, then</p><p>6/8 = 9/a = -15/-b</p><p>a = 8*9/6 = 12</p><p>b = 15*8/6 = 20</p><p>a  -  b = 12  -  20 = -8</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If (2 sin<sup>2</sup> 43&deg; + 3 sin<sup>2</sup> 47&deg;) sec<sup>2</sup> 43&deg;  -  3 = tan<sup>2</sup> 43&deg;/3k, then find the value of 'k'.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (2 sin<sup>2</sup> 43&deg; + 3 sin<sup>2</sup> 47&deg;) sec<sup>2</sup> 43&deg; - 3 = tan<sup>2</sup> 43&deg;/3k &#2361;&#2376;, &#2340;&#2379; 'k' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1/4</span><span class=\"hqt\" style=\"display:none\">1/4</span>",
      "<span class=\"eqt\">1/6</span><span class=\"hqt\" style=\"display:none\">1/6</span>",
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>",
      "<span class=\"eqt\">1/3</span><span class=\"hqt\" style=\"display:none\">1/3</span>"

    "correct_option_id": 1,
    "solution": "<p>(2 sin<sup>2</sup> 43&deg; + 3 sin<sup>2</sup> 47&deg;) sec<sup>2</sup> 43&deg;  -  3 = tan<sup>2</sup> 43&deg;/3k</p><p>(2 sin<sup>2</sup> 43&deg; + 3 sin<sup>2</sup> (90  -  43)&deg;) sec<sup>2</sup> 43&deg;  -  3 = tan<sup>2</sup> 43&deg;/3k</p><p>(2 sin<sup>2</sup> 43&deg; + 3 cos<sup>2</sup> 43&deg;) sec<sup>2</sup> 43&deg;  -  3 = tan<sup>2</sup> 43&deg;/3k</p><p>(2 sin<sup>2</sup> 43&deg; + 2 cos<sup>2</sup> 43&deg; + cos<sup>2</sup> 43&deg;) sec<sup>2</sup> 43&deg;  -  3 = tan<sup>2</sup> 43&deg;/3k</p><p>(2 (sin<sup>2</sup> 43&deg; + cos<sup>2</sup> 43&deg;) + cos<sup>2</sup> 43&deg;) sec<sup>2</sup> 43&deg;  -  3 = tan<sup>2</sup> 43&deg;/3k</p><p>(2 + cos<sup>2</sup> 43&deg;) sec<sup>2</sup> 43&deg;  -  3 = tan<sup>2</sup> 43&deg;/3k</p><p>(2 sec<sup>2</sup> 43&deg; + cos<sup>2</sup> 43&deg; sec<sup>2</sup> 43&deg;)  -  3 = tan<sup>2</sup> 43&deg;/3k</p><p>(2 sec<sup>2</sup> 43&deg; + 1)  -  3 = tan<sup>2</sup> 43&deg;/3k</p><p>2 sec<sup>2</sup> 43&deg; + 1  -  3 = tan<sup>2</sup> 43&deg;/3k</p><p>2 sec<sup>2</sup> 43&deg;  -  2 = tan<sup>2</sup> 43&deg;/3k</p><p>2 (sec<sup>2</sup> 43&deg;  -  1) = tan<sup>2</sup> 43&deg;/3k</p><p>2 tan<sup>2</sup> 43&deg; = tan<sup>2</sup> 43&deg;/3k</p><p>2 = 1/3k</p><p>6k = 1</p><p>k = 1/6</p>",

    "question": "<span class=\"eqt\"><p>Find the area of largest triangle that can be inscribed in a semicircle of radius 7 cm.</p></span><span class=\"hqt\" style=\"display:none\"><p>7 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2309;&#2352;&#2381;&#2343;&#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2375; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">49 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">49 cm<sup>2</sup></span>",
      "<span class=\"eqt\">98 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">98 cm<sup>2</sup></span>",

    "correct_option_id": 0,
    "solution": "<p>For the triangle to be largest, AD = DB and angle ADB = 90</p><p><img width=217 height=112 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p930/image009.jpg\"></p><p>Area of triangle ADB = (1/2)*AB*OD</p><p>The line joining midpoint of hypotenuse to the right angled vertex has length equal to half the length of hypotenuse.</p><p>OD = radius = 7 cm</p><p>Area = 1*14*7/2 = 7*7 = 49 cm<sup>2</sup></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What is the mode and median of the given set?</p><p></p><p>12, 18, 14, 20, 14, 16, 18, 15, 23, 18, 12</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2370;&#2361; &#2325;&#2366; &#2348;&#2361;&#2369;&#2354;&#2325; &#2324;&#2352; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p>12, 18, 14, 20, 14, 16, 18, 15, 23, 18, 12</p></span>",
    "options": [
      "<span class=\"eqt\">16, 12</span><span class=\"hqt\" style=\"display:none\">16, 12</span>",
      "<span class=\"eqt\">18, 16</span><span class=\"hqt\" style=\"display:none\">18, 16</span>",
      "<span class=\"eqt\">18, 23</span><span class=\"hqt\" style=\"display:none\">18, 23</span>",
      "<span class=\"eqt\">16, 20</span><span class=\"hqt\" style=\"display:none\">16, 20</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>20,  15, 23,</p><p></p><p>Arranging the set in ascending order -</p><p>12, 12, 14, 14, 15, 16, 18, 18, 18, 20, 23</p><p></p><p>Median is 16 and the mode is 18.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the volume and curved surface area of a cone if radius of the base and height of the cone is 7 cm and 24 cm, respectively. (Take &#960; = 22/7)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 7 cm &#2324;&#2352; 24 cm &#2361;&#2376;, &#2340;&#2379; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2324;&#2352; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; (&#960; = 22/7 &#2354;&#2368;&#2332;&#2367;&#2319;)</p></span>",
    "options": [
      "<span class=\"eqt\">Volume = 1432 cm<sup>3</sup>, and Curved surface area = 550 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2340;&#2344; = 1432 cm<sup>3 </sup>&#2324;&#2352; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; = 550 cm<sup>2</sup></span>",
      "<span class=\"eqt\">Volume = 1342 cm<sup>3</sup>, and Curved surface area = 440 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2340;&#2344; = 1342 cm<sup>3 </sup>&#2324;&#2352; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; = 440 cm<sup>2</sup></span>",
      "<span class=\"eqt\">Volume = 1232 cm<sup>3</sup>, and Curved surface area = 550 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2340;&#2344; = 1232 cm<sup>3 </sup>&#2324;&#2352; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;= 550 cm<sup>2</sup></span>",
      "<span class=\"eqt\">Volume = 1232 cm<sup>3</sup>, and Curved surface area = 540 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2340;&#2344; = 1232 cm<sup>3 </sup>&#2324;&#2352; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; = 540 cm<sup>2</sup></span>"

    "correct_option_id": 2,
    "solution": "<p>The radius of the base and height of the cone is 7 cm and 24 cm, respectively.</p><p>So, slant height of the cone = &radic;(49 + 576) = &radic;625 = 25 cm</p><p>Thus, volume of the cone = 1/3 * 22/7 * 7 * 7 * 24 = 1232 cm<sup>3</sup></p><p>And curved surface area of the cone = 22/7 * 7 * 25 = 550 cm<sup>2</sup></p>",
    "question_index": 4

  {
    "question": "<span class=\"eqt\"><p>The mean of five numbers (a+13), 29, (2a-15), (7+a) and 21 is 19, find the value of a.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2305;&#2330; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; (a+13), 29, (2a-15), (7+a) &#2324;&#2352; 21 &#2325;&#2366; &#2350;&#2366;&#2343;&#2381;&#2351; 19 &#2361;&#2376;, a &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",

  {
    "question": "<span class=\"eqt\"><p>In a circle of radius 21 cm, an arc subtends an angle of 72&#186; at the centre. The length of the arc is</p></span><span class=\"hqt\" style=\"display:none\"><p>21 &#2360;&#2375;&#2350;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2350;&#2375;&#2306; &#2319;&#2325; &#2330;&#2366;&#2346;, &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2352; 72&#186; &#2325;&#2366; &#2325;&#2379;&#2339; &#2309;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2330;&#2366;&#2346; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">21.6 cm</span><span class=\"hqt\" style=\"display:none\">21.6 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">25 cm</span><span class=\"hqt\" style=\"display:none\">25 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">26.4 cm</span><span class=\"hqt\" style=\"display:none\">26.4 &#2360;&#2375;&#2350;&#2368;</span>",

    "question": "<span class=\"eqt\"><p>Mamata bought a laptop at Rs. 2 lakhs from a shop and made a down payment of Rs. 4900 and she paid rest of the amount in 3 equal quarterly installments at the rate of 16% compound interest, then what amount did she pay in each installment?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2350;&#2340;&#2366; &#2344;&#2375; &#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344; &#2360;&#2375; 2 &#2354;&#2366;&#2326; &#2352;&#2369; &#2350;&#2375;&#2306; &#2319;&#2325; &#2354;&#2376;&#2346;&#2335;&#2377;&#2346; &#2326;&#2352;&#2368;&#2342;&#2366; &#2324;&#2352; 4900 &#2352;&#2369; &#2325;&#2366; &#2309;&#2327;&#2381;&#2352;&#2367;&#2350; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2340;&#2341;&#2366; &#2313;&#2360;&#2344;&#2375; 16% &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 3 &#2360;&#2350;&#2366;&#2344; &#2340;&#2381;&#2352;&#2376;&#2350;&#2366;&#2360;&#2367;&#2325; &#2325;&#2367;&#2358;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2358;&#2375;&#2359; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366;, &#2340;&#2348; &#2313;&#2360;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2325;&#2367;&#2358;&#2381;&#2340; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366;?</p></span>",

    "solution": "<p>Remaining amount paid by Mamata after down payment = 200000  -  4900 = Rs. 195100</p><p>Let each instalment = Rs. X</p><p>195100 = X/(1 + 16/400) + X/(1 + 16/400)<sup>2</sup> + X/(1 + 16/400)<sup>3</sup></p><p>=&gt; X = Rs. 70304</p>",

    "question": "<span class=\"eqt\"><p>Average age of 8 persons of a team is 22.5 years, out which A is 4 years older to B. 2 years ago the average age of team excluding the age of A and B is 20 years. Find the ratio of ages of A and B respectively after 6 years from present.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2335;&#2368;&#2350; &#2325;&#2375; 8 &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2310;&#2351;&#2369; 22.5 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; A, B &#2360;&#2375; &#2310;&#2351;&#2369; &#2350;&#2375;&#2306; 4 &#2357;&#2352;&#2381;&#2359; &#2348;&#2337;&#2364;&#2366; &#2361;&#2376;&#2404; 2 &#2357;&#2352;&#2381;&#2359; &#2346;&#2361;&#2354;&#2375; A &#2324;&#2352; B &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352; &#2335;&#2368;&#2350; &#2325;&#2368; &#2324;&#2360;&#2340; &#2310;&#2351;&#2369; 20 &#2357;&#2352;&#2381;&#2359; &#2341;&#2368;&#2404; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2360;&#2375; 6 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2325;&#2368; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; A &#2324;&#2352; B &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">7: 6</span><span class=\"hqt\" style=\"display:none\">7: 6</span>",
      "<span class=\"eqt\">9: 8</span><span class=\"hqt\" style=\"display:none\">9: 8</span>",
      "<span class=\"eqt\">7: 8</span><span class=\"hqt\" style=\"display:none\">7: 8</span>",
      "<span class=\"eqt\">8: 7</span><span class=\"hqt\" style=\"display:none\">8: 7</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the present age of B = P years and present age of A = (P + 4) years.</p><p>Total age of 8 persons at present = 22.5 * 8 = 180</p><p>Average age of 6 persons before 2 years = 20 years. So, average of those 6 persons at present = 20 + 2 = 22 years.</p><p>Total age of 6 persons at present = 22 * 6 = 132</p><p>Sum of ages of A and B = P + P + 4 = 180  -  132 = 48</p><p>=&gt; 2P = 44</p><p>=&gt; P = 22</p><p>Age of A after 6 years = P + 4 + 6 = 22 + 10 = 32 years</p><p>Age of B after 6 years = P + 6 = 22 + 6 = 28 years</p><p>Required ratio = 32: 28 = 8: 7</p>",
    "question_index": 8
  },

    "question": "<span class=\"eqt\"><p>Anil is 1.8 times as efficient as Naman. Working together the duo can complete a piece of work in 30 days. In how many days can Naman alone complete the same piece of work?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2367;&#2354; &#2344;&#2350;&#2344; &#2360;&#2375; 1.8 &#2327;&#2369;&#2344;&#2366; &#2309;&#2343;&#2367;&#2325; &#2325;&#2369;&#2358;&#2354; &#2361;&#2376;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2342;&#2379;&#2344;&#2379;&#2306; &#2319;&#2325; &#2325;&#2366;&#2350; &#2325;&#2379; 30 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2344;&#2350;&#2344; &#2309;&#2325;&#2375;&#2354;&#2375; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Two circles C1 and C2 of different radii cut each other at point AB, length of AB is 16 cm and radius of bigger circle is 7 cm more than that of smaller circle. If distance between centres of both the circle is 21 cm, then what is the length of diameter of larger circle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; C1 &#2324;&#2352; C2 &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; AB &#2346;&#2352; &#2325;&#2366;&#2335;&#2340;&#2375; &#2361;&#2376;&#2306;, AB &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 16 cm &#2324;&#2352; &#2348;&#2337;&#2364;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2331;&#2379;&#2335;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2360;&#2375; 7 cm &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 21 cm &#2361;&#2376;, &#2340;&#2379; &#2348;&#2337;&#2364;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2357;&#2381;&#2351;&#2366;&#2360; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">39 cm</span><span class=\"hqt\" style=\"display:none\">39 cm</span>",
      "<span class=\"eqt\">33 cm</span><span class=\"hqt\" style=\"display:none\">33 cm</span>",
      "<span class=\"eqt\">34 cm</span><span class=\"hqt\" style=\"display:none\">34 cm</span>",
      "<span class=\"eqt\">42 cm</span><span class=\"hqt\" style=\"display:none\">42 cm</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=311 height=215 id=\"Picture 23\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8617/image015.png\"></p><p>Let O`A = r and OA = (r + 7) [Consider OA &gt; O`A]</p><p>Let OC = x and O`C = (21  -  x)</p><p>AC = AB/2 = 8 cm</p><p>In &#8710;AOC:</p><p>AO<sup>2</sup> = AC<sup>2</sup> + OC<sup>2</sup></p><p>(r + 7)<sup>2</sup> = 8<sup>2</sup> + x<sup>2</sup></p><p>(r<sup>2</sup> + 49 + 14r) = 64 + x<sup>2</sup> ..... (1)</p><p>In &#8710;AO`C:</p><p>AO`<sup>2</sup> = AC<sup>2</sup> + O`C<sup>2</sup></p><p>r<sup>2</sup> = 8<sup>2</sup> + (21  -  x)<sup>2</sup></p><p>r<sup>2</sup> = 64 + x<sup>2</sup> + 441  -  42x ..... (2)</p><p>From (1) and (2) we get,</p><p>49 + 14r = 42x  -  441</p><p>7 + 2r = 6x  -  63</p><p>2r = 6x  -  70</p><p>r = (3x  -  35)</p><p>Now,</p><p>r<sup>2</sup> = 8<sup>2</sup> + (21  -  x)<sup>2</sup></p><p>(3x  -  35)<sup>2</sup> = 8<sup>2</sup> + (21  -  x)<sup>2</sup></p><p>9x<sup>2</sup> + 1225  -  210x = 64 + x<sup>2</sup> + 441  -  42x</p><p>8x<sup>2</sup>  -  168x + 720 = 0</p><p>x<sup>2</sup>  -  21x + 90 = 0</p><p>x = 6 and 15</p><p>When x = 6;</p><p>r = (3x  -  35) = -17 cm (Not possible)</p><p>When x = 15;</p><p>r = (3x  -  35) = 10 cm</p><p>Hence, diameter of larger circle = 2(r + 7) = 34 cm</p>",
    "question_index": 10
  },

    "question": "<span class=\"eqt\"><p>25/3 litres of chemical M which costs Rs. 12 per litre was mixed with a certain quantity of chemical N, which costs Rs. 9 per litre. If a shopkeeper sold the mixture at Rs. 17.6 per litre and earned a profit of 60%, then what was the quantity of chemical N (in litres) to be mixed in the mixture (nearest to an integer)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2369;. 12 &#2346;&#2381;&#2352;&#2340;&#2367; &#2354;&#2368;&#2335;&#2352; &#2325;&#2368;&#2350;&#2340; &#2357;&#2366;&#2354;&#2375; &#2352;&#2360;&#2366;&#2351;&#2344; M &#2325;&#2375; 25/3 &#2354;&#2368;&#2335;&#2352; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2379; &#2352;&#2369;. 9 &#2346;&#2381;&#2352;&#2340;&#2367; &#2354;&#2368;&#2335;&#2352; &#2325;&#2368;&#2350;&#2340; &#2357;&#2366;&#2354;&#2375; &#2352;&#2360;&#2366;&#2351;&#2344; N &#2325;&#2368; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2344;&#2375; &#2311;&#2360; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2379; &#2352;&#2369;. 17.6 &#2346;&#2381;&#2352;&#2340;&#2367; &#2354;&#2368;&#2335;&#2352; &#2346;&#2352; &#2348;&#2375;&#2330;&#2366; &#2324;&#2352; 60% &#2325;&#2366; &#2354;&#2366;&#2349; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;, &#2340;&#2379; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2366;&#2319; &#2327;&#2319; &#2352;&#2360;&#2366;&#2351;&#2344; N &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; (&#2354;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2368; (&#2344;&#2367;&#2325;&#2335;&#2340;&#2350; &#2319;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; &#2340;&#2325;) &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let x litre of chemical N is mixed.</p><p>The mixture was sold at Rs. 17.6 per litre and 60% profit was earned.</p><p>(160/100) * CP = 17.6</p><p>=&gt; CP = (17.6 * 100)/160</p><p>=&gt; CP = Rs. 11 per litre</p><p>So, (25/3 * 12 + x * 9)/(25/3 + x) = 11</p><p>=&gt; 100 + 9x = 275/3 + 11x</p><p>=&gt; 2x = 25/3</p><p>=&gt; x = 25/6</p><p>=&gt; x = 4.16 </p><p>=&gt; x = 4 litres</p>",
    "question_index": 12
  },

    "question": "<span class=\"eqt\"><p>A contractor started the work with 40 people working 12 hours a day. But due to excessive working hours 5 people left the work each day from 1<sup>st</sup> day onwards. In this fashion, it took 6 days for work to be completed. If contractor now employs only 50 men and asks them to work for 8 hours a day then it which day work will be completed?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2336;&#2375;&#2325;&#2375;&#2342;&#2366;&#2352; &#2344;&#2375; &#2319;&#2325; &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; 12 &#2328;&#2306;&#2335;&#2375; &#2325;&#2366;&#2350; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; 40 &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2325;&#2366;&#2350; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;&#2404; &#2354;&#2375;&#2325;&#2367;&#2344; &#2325;&#2366;&#2350; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2328;&#2306;&#2335;&#2379;&#2306; &#2325;&#2368; &#2309;&#2343;&#2367;&#2325;&#2340;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; 5 &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2344;&#2375; 1 &#2342;&#2367;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2342;&#2367;&#2344; &#2325;&#2366;&#2350; &#2331;&#2379;&#2337;&#2364; &#2342;&#2367;&#2351;&#2366;&#2404; &#2311;&#2360; &#2340;&#2352;&#2361; &#2325;&#2366;&#2350; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379;&#2344;&#2375; &#2350;&#2375;&#2306; 6 &#2342;&#2367;&#2344; &#2354;&#2327;&#2375;&#2404; &#2351;&#2342;&#2367; &#2336;&#2375;&#2325;&#2375;&#2342;&#2366;&#2352; &#2309;&#2348; &#2325;&#2375;&#2357;&#2354; 50 &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2379; &#2325;&#2366;&#2350; &#2346;&#2352; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2342;&#2367;&#2344; 8 &#2328;&#2306;&#2335;&#2375; &#2325;&#2366;&#2350; &#2325;&#2352;&#2344;&#2375; &#2325;&#2379; &#2325;&#2361;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2367;&#2360; &#2342;&#2367;&#2344; &#2325;&#2366;&#2350; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">8<sup>th</sup></span><span class=\"hqt\" style=\"display:none\">&#2310;&#2336;&#2357;&#2375;&#2306;</span>",
      "<span class=\"eqt\">4<sup>th</sup></span><span class=\"hqt\" style=\"display:none\">&#2330;&#2380;&#2341;&#2375;</span>",
      "<span class=\"eqt\">6<sup>th</sup></span><span class=\"hqt\" style=\"display:none\">&#2331;&#2336;&#2375;</span>",
      "<span class=\"eqt\">5<sup>th</sup></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2306;&#2330;&#2357;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Total number of men worked till 6 days = (40 + 35 + 30 + 25 + 20 + 15) men = 165 men</p><p>Hence total work = (165  X  12) Man hours (MH) = 1980</p><p>Now total number of Man hours produced each day = (50  X  8) MH</p><p>= 400 MH</p><p>Therefore, number of days required to complete the work = 1980/400</p><p>= 4.95</p><p>Therefore, work will be completed in 5<sup>th</sup> day.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>In a business P invests 1/5<sup>th</sup> of the total investment for 1/3<sup>rd</sup> of the time. Q invests 2/5<sup>th</sup> of the total investment for half of the time and R invests the remaining investment for the whole time. What is the share of Q in the total profit of Rs.13680?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2350;&#2375;&#2306; P &#2325;&#2369;&#2354; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2366; 1/5 &#2349;&#2366;&#2327; 1/3 &#2360;&#2350;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; Q &#2325;&#2369;&#2354; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2366; 2/5 &#2349;&#2366;&#2327; &#2310;&#2343;&#2375; &#2360;&#2350;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; R &#2358;&#2375;&#2359; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2379; &#2360;&#2306;&#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2350;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2352;&#2369;.13680 &#2325;&#2375; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; &#2350;&#2375;&#2306; Q &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.4254</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.4254</span>",
      "<span class=\"eqt\">Rs.4752</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.4752</span>",
      "<span class=\"eqt\">Rs.4104</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.4104</span>",
      "<span class=\"eqt\">Rs.4056</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.4056</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Profit ratio of P, Q, and R = (1/5) * (1/3): (2/5) * (1/2): [1 - (1/5)  -  (2/5)] * 1</p><p>= (1/15): (1/5): (2/5)</p><p>= 1: 3: 6</p><p>Share of Q = 13680 * 3/10</p><p>= 1368 * 3 = Rs.4104</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>P is 12% less than Q which is 15% more than R. T is 25% more than R. By approximately what percent P is less/more than T?</p></span><span class=\"hqt\" style=\"display:none\"><p>P, Q &#2360;&#2375; 12% &#2325;&#2350; &#2361;&#2376; &#2332;&#2379; R &#2360;&#2375; 15% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; T, R &#2360;&#2375; 25% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; P, T &#2360;&#2375; &#2354;&#2327;&#2349;&#2327; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2350;/&#2309;&#2343;&#2367;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">13%</span><span class=\"hqt\" style=\"display:none\">13%</span>",
      "<span class=\"eqt\">19%</span><span class=\"hqt\" style=\"display:none\">19%</span>",
      "<span class=\"eqt\">15%</span><span class=\"hqt\" style=\"display:none\">15%</span>",
      "<span class=\"eqt\">17%</span><span class=\"hqt\" style=\"display:none\">17%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>P = (100  -  12)% of Q</p><p>P = 22Q/25</p><p>Q = (100 + 15)% of R</p><p>R = 20Q/23</p><p>T = (100 + 25)% of R</p><p>T = 5R/4 = (5/4) * 20Q/23 = 25Q/23</p><p>Now, difference between P and T = (25Q/23)  -  (22Q/25) = 119Q/575</p><p>Therefore, percentage = ((119Q/575)/(25Q/23)) * 100 = <b>19% (approx.)</b></p>",
    "question_index": 15

    "question": "<span class=\"eqt\"><p>Diya and Shreya appear for an interview for two vacancies in the same post. The probability of Diya's selection is 2/9 and that of Shreya's selection is 3/8. Find the probability that only one of them is selected. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368;&#2351;&#2366; &#2324;&#2352; &#2358;&#2381;&#2352;&#2375;&#2351;&#2366; &#2360;&#2350;&#2366;&#2344; &#2346;&#2342; &#2325;&#2368; &#2342;&#2379; &#2352;&#2367;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2366;&#2325;&#2381;&#2359;&#2366;&#2340;&#2381;&#2325;&#2366;&#2352; &#2350;&#2375;&#2306; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2342;&#2368;&#2351;&#2366; &#2325;&#2375; &#2330;&#2351;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; 2/9 &#2361;&#2376; &#2324;&#2352; &#2358;&#2381;&#2352;&#2375;&#2351;&#2366; &#2325;&#2375; &#2330;&#2351;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; 3/8 &#2361;&#2376;&#2404; &#2313;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2325;&#2375; &#2330;&#2351;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Santosh was walking to and from on a railway platform. He was walking at a uniform speed of 4 km/ hr in a straight path and he reverses his direction of motion at the end of fourth, seventh, ninth and thirteenth minutes, how far will he be from the starting point at the end of the tenth minute?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2340;&#2379;&#2359; &#2352;&#2375;&#2354;&#2357;&#2375; &#2346;&#2381;&#2354;&#2375;&#2335;&#2347;&#2377;&#2352;&#2381;&#2350; &#2346;&#2352; &#2330;&#2354; &#2352;&#2361;&#2366; &#2341;&#2366;&#2404; &#2357;&#2361; &#2360;&#2368;&#2343;&#2375; &#2352;&#2366;&#2360;&#2381;&#2340;&#2375; &#2350;&#2375;&#2306; 4 km/ hr &#2325;&#2368; &#2319;&#2325;&#2360;&#2350;&#2366;&#2344; &#2330;&#2366;&#2354; &#2360;&#2375; &#2330;&#2354; &#2352;&#2361;&#2366; &#2341;&#2366; &#2324;&#2352; &#2330;&#2380;&#2341;&#2375;, &#2360;&#2366;&#2340;&#2357;&#2375;&#2306;, &#2344;&#2380;&#2357;&#2375;&#2306; &#2324;&#2352; &#2340;&#2375;&#2352;&#2361;&#2357;&#2375;&#2306; &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2357;&#2361; &#2309;&#2346;&#2344;&#2368; &#2330;&#2366;&#2354; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2325;&#2379; &#2313;&#2354;&#2335; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2357;&#2361; &#2342;&#2360;&#2357;&#2375;&#2306; &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2310;&#2352;&#2306;&#2349;&#2367;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352; &#2361;&#2379;&#2327;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>A factory has three assembly lines, X, Y, and Z, producing electronic components. Line X produces 40% of the components, Y produces 35%, and Z produces 25%. The defect rates for the lines are 2% for X, 1.5% for Y, and 4% for Z. If a component is selected at random, what is the probability that it is defective?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2366;&#2352;&#2326;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2309;&#2360;&#2375;&#2306;&#2348;&#2354;&#2368; &#2354;&#2366;&#2311;&#2344;&#2375;&#2306; &#2361;&#2376;&#2306;, X, Y &#2324;&#2352; Z, &#2332;&#2379; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2367;&#2325; &#2346;&#2369;&#2352;&#2381;&#2332;&#2375; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2354;&#2366;&#2311;&#2344; X 40% &#2346;&#2369;&#2352;&#2381;&#2332;&#2375; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;, Y 35% &#2324;&#2352; Z 25%&#2404; &#2311;&#2344; &#2354;&#2366;&#2311;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2326;&#2352;&#2366;&#2348;&#2368; &#2325;&#2368; &#2342;&#2352; X &#2325;&#2375; &#2354;&#2367;&#2319; 2%, Y &#2325;&#2375; &#2354;&#2367;&#2319; 1.5% &#2324;&#2352; Z &#2325;&#2375; &#2354;&#2367;&#2319; 4% &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2379;&#2312; &#2346;&#2369;&#2352;&#2381;&#2332;&#2366; &#2351;&#2366;&#2342;&#2371;&#2330;&#2381;&#2331;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2330;&#2369;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2325;&#2375; &#2326;&#2352;&#2366;&#2348; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2325;&#2381;&#2351;&#2366; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">2.86%</span><span class=\"hqt\" style=\"display:none\">2.86%</span>"

    "correct_option_id": 0,
    "solution": "<p>Given,</p><p>P(X) = 0.40, P(Y) = 0.35, P(Z) = 0.25</p><p>P(Defective|X) = 0.02, P(Defective|Y) = 0.015, P(Defective|Z) = 0.04</p><p>Use the law of total probability:</p><p>P(Defective) = P(Defective|X)*P(X) + P(Defective|Y)*P(Y) + P(Defective|Z)*P(Z)</p><p>P(Defective) = (0.02)<i>(0.40) + (0.015)</i>(0.35) + (0.04)*(0.25)</p><p>P(Defective) = 0.008 + 0.00525 + 0.01 = 0.02325</p><p>The probability that a randomly selected component is defective is 0.02325 or approximately 2.33%.</p>",

    "question": "<span class=\"eqt\"><p>If ratio of volume of sphere to volume of cylinder is 2 : 3 and radius of cylinder is equal to the side of square whose perimeter is 84 cm then find the curved surface area of cylinder(in cm&#178;). Given that radius of sphere is equal to radius of cylinder.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2327;&#2379;&#2354;&#2375; &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2324;&#2352; &#2348;&#2375;&#2354;&#2344; &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2:3 &#2361;&#2376; &#2340;&#2341;&#2366; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;, &#2357;&#2352;&#2381;&#2327; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; 84 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2340;&#2379; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (&#2360;&#2375;&#2350;&#2368;&#178; &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; &#2327;&#2379;&#2354;&#2375; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404;</p></span>",

;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p><p>I. &#2342;&#2367;&#2354;&#2346;&#2381;&#2352;&#2368;&#2340; &#2325;&#2368; &#2350;&#2366;&#2305;, &#2332;&#2360;&#2346;&#2381;&#2352;&#2368;&#2340; &#2325;&#2375; &#2346;&#2340;&#2367; &#2360;&#2375; &#2357;&#2367;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>II. &#2350;&#2344;&#2346;&#2381;&#2352;&#2368;&#2340;, &#2342;&#2367;&#2354;&#2346;&#2381;&#2352;&#2368;&#2340; &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376; &#2324;&#2352; &#2340;&#2357;&#2344;&#2368;&#2340;, &#2342;&#2367;&#2354;&#2346;&#2381;&#2352;&#2368;&#2340; &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;&#2404;</p><p>III. &#2332;&#2360;&#2346;&#2381;&#2352;&#2368;&#2340; &#2325;&#2366; &#2319;&#2325; &#2348;&#2375;&#2335;&#2366; &#2324;&#2352; &#2342;&#2379; &#2348;&#2375;&#2335;&#2367;&#2351;&#2366;&#2305; &#2361;&#2376;&#2306;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>In a code:</p><p>'A &#9642; B' means 'A is the sister of B'</p><p>'A &#9643; B' means 'A is the father of B'</p><p>'A &#9650; B' means 'A is the mother of B'</p><p>'A &#9660; B' means 'A is the brother of B'</p><p>'A &#10084; B' means 'A is the daughter of B'</p><p>'A &#9733; B' means 'A is the son of B'</p><p>Which expression means that M is the niece of D?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2379;&#2337; &#2350;&#2375;&#2306;:</p><p>'A &#9642; B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;'</p><p>'A &#9643; B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;'</p><p>'A &#9650; B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;'</p><p>'A &#9660; B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;'</p><p>'A &#10084; B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;'</p><p>'A &#9733; B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;'</p><p>&#2325;&#2367;&#2360; &#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; M, D &#2325;&#2368; &#2349;&#2340;&#2368;&#2332;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">M &#10084; N &#9642; D</span><span class=\"hqt\" style=\"display:none\">M &#10084; N &#9642; D</span>",

    "correct_option_id": 0,
    "solution": "<p><img width=630 height=256 id=\"Picture 79\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28899/image026.jpg\"></p><p>It is given that,</p><p>'A &#9642; B' means 'A is the sister of B'</p><p>'A &#9643; B' means 'A is the father of B'</p><p>'A &#9650; B' means 'A is the mother of B'</p><p>'A &#9660; B' means 'A is the brother of B'</p><p>'A &#10084; B' means 'A is the daughter of B'</p><p>'A &#9733; B' means 'A is the son of B'</p><p>1) M &#10084; N &#9642; D</p><p>M is the daughter of N. N is the sister of D.</p><p><img width=109 height=87 id=\"Picture 27\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28899/image032.jpg\"></p><p>M is niece of D. So, option (a) is correct.</p><p>2) M &#9650; N &#9660; D</p><p>M is the mother of N. N is the brother of D.</p><p><img width=103 height=77 id=\"Picture 28\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28899/image033.jpg\"></p><p>M is mother of D.</p><p>3) D &#10084; N &#9642; M</p><p>D is the daughter of N. N is the sister of M.</p><p><img width=95 height=81 id=\"Picture 29\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28899/image034.jpg\"></p><p>M is uncle/aunt of D.</p><p>4) M &#9643; N &#9733; D</p><p>M is the father of N. N is the son of D.</p><p><img width=137 height=80 id=\"Picture 30\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28899/image035.jpg\"></p><p>M is husband of D.</p>",

    "question": "<span class=\"eqt\"><p>Read the situation and choose the best judgment:</p><p>As club treasurer, you receive a cash-only quote from a vendor who proposes \"no invoice, lower rate\" to avoid taxes for event equipment. Your charter mandates proper bills for all expenses.</p><p>Given this situation, which of the following is the most ethical and responsible action?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344; &#2360;&#2375; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2360;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2350; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2354;&#2375;&#2306;:</p><p>&#2325;&#2381;&#2354;&#2348; &#2325;&#2379;&#2359;&#2366;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306;, &#2310;&#2346;&#2325;&#2379; &#2319;&#2325; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2360;&#2375; &#2325;&#2375;&#2357;&#2354; &#2344;&#2325;&#2342; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2366; &#2325;&#2379;&#2335;&#2375;&#2358;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2310;&#2351;&#2379;&#2332;&#2344; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2346;&#2352; &#2325;&#2352;&#2379;&#2306; &#2360;&#2375; &#2348;&#2330;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; \"&#2348;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306;, &#2325;&#2350; &#2342;&#2352;\" &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404; &#2310;&#2346;&#2325;&#2375; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2326;&#2352;&#2381;&#2330;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2330;&#2367;&#2340; &#2348;&#2367;&#2354; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2361;&#2376;&#2306;&#2404;</p><p>&#2311;&#2360; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2348;&#2360;&#2375; &#2344;&#2376;&#2340;&#2367;&#2325; &#2324;&#2352; &#2332;&#2364;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352;&#2366;&#2344;&#2366; &#2325;&#2342;&#2350; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Accept the deal to save funds and note it as a donation.</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2344; &#2348;&#2330;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2311;&#2360; &#2360;&#2380;&#2342;&#2375; &#2325;&#2379; &#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2311;&#2360;&#2375; &#2342;&#2366;&#2344; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2344;&#2379;&#2335; &#2325;&#2352;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Split the amount: invoice for half, cash for the rest.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2358;&#2367; &#2325;&#2379; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;: &#2310;&#2343;&#2366; &#2348;&#2367;&#2354;, &#2358;&#2375;&#2359; &#2344;&#2325;&#2342;&#2404;</span>",
      "<span class=\"eqt\">Take the cash deal but record an internal memo about it.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2325;&#2342; &#2360;&#2380;&#2342;&#2366; &#2325;&#2352;&#2375;&#2306; &#2354;&#2375;&#2325;&#2367;&#2344; &#2311;&#2360;&#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2319;&#2325; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2332;&#2381;&#2334;&#2366;&#2346;&#2344; &#2342;&#2352;&#2381;&#2332; &#2325;&#2352;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Decline the cash-only proposal; insist on a proper tax invoice or select a compliant vendor and brief the committee.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2325;&#2342; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2375; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2325;&#2379; &#2309;&#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;; &#2313;&#2330;&#2367;&#2340; &#2325;&#2352; &#2330;&#2366;&#2354;&#2366;&#2344; &#2346;&#2352; &#2332;&#2379;&#2352; &#2342;&#2375;&#2306; &#2351;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2354;&#2344; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2350;&#2367;&#2340;&#2367; &#2325;&#2379; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2342;&#2375;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The vendor's \"no invoice, lower rate\" proposal violates both tax laws and the club's financial charter, which requires proper documentation for all transactions. Accepting such a deal would be unethical and could lead to accountability issues. The responsible action is to uphold transparency and compliance.</p><p>Hence, the correct answer is:</p><p>Decline the cash-only proposal; insist on a proper tax invoice or select a compliant vendor and brief the committee.</p>",

    "question": "<span class=\"eqt\"><p>In the following question, four statements are given and four conclusions are given below these statements. Choose the option which shows the conclusions which logically follow from the given statements, disregarding the commonly known facts.</p><p><b>Statements:</b></p><p>All Thesis are Essay</p><p>Some Essay is Article</p><p>All Article is Report</p><p>No Report is Script</p><p><b>Conclusions:</b></p><p>I. Some Essay is not Script</p><p>II. No Article is Script</p><p>III. Some Essay is Report</p><p>IV. No Essay is Report</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2330;&#2366;&#2352; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306; &#2324;&#2352; &#2311;&#2344; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2375; &#2344;&#2368;&#2330;&#2375; &#2330;&#2366;&#2352; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2379; &#2330;&#2369;&#2344;&#2375;&#2306; &#2332;&#2379; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2309;&#2357;&#2361;&#2375;&#2354;&#2344;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;/&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><b>&#2325;&#2341;&#2344;:</b></p><p>&#2360;&#2349;&#2368; &#2341;&#2368;&#2360;&#2367;&#2360;, &#2344;&#2367;&#2348;&#2306;&#2343; &#2361;&#2376;&#2306;</p><p>&#2325;&#2369;&#2331; &#2344;&#2367;&#2348;&#2306;&#2343;, &#2354;&#2375;&#2326; &#2361;&#2376;&#2306;</p><p>&#2360;&#2349;&#2368; &#2354;&#2375;&#2326;, &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335; &#2361;&#2376;&#2306;</p><p>&#2325;&#2379;&#2312; &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335;, &#2360;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</p><p><b>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</b></p><p>I. &#2325;&#2369;&#2331; &#2344;&#2367;&#2348;&#2306;&#2343;, &#2360;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;</p><p>II. &#2325;&#2379;&#2312; &#2354;&#2375;&#2326;, &#2360;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</p><p>III. &#2325;&#2369;&#2331; &#2344;&#2367;&#2348;&#2306;&#2343;, &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335; &#2361;&#2376;&#2306;</p><p>IV. &#2325;&#2379;&#2312; &#2344;&#2367;&#2348;&#2306;&#2343;, &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Both conclusions I and II follow</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only conclusions I, II and III follow</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I, II &#2324;&#2352; III &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Both conclusions II and IV follow</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2324;&#2352; IV &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only conclusions I, III and IV follow</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I, III &#2324;&#2352; IV &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Statements:</b></p><p>All Thesis are Essay</p><p>Some Essay is Article</p><p>All Article is Report</p><p>No Report is Script</p><p><img width=449 height=171 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26255/image004.png\"></p><p>Some Essay is not Script: Some Essay is Article. All Article is Report. No Report is Script. Thus, Some Essay which is Report is not Script. So, conclusion I is true.</p><p>No Article is Script: All Article is Report. No Report is Script. Thus, No Article is Script. So, conclusion II is true.</p><p>Some Essay is Report: Some Essay is Article. All Article is Report. Thus, Some Essay is Report. So, conclusion III is true.</p><p>No Essay is Report: Some Essay is Article. All Article is Report. Thus, Some Essay is Report. So, conclusion IV is false.</p><p>Hence, only conclusions I, II and III follow.</p>",

    "question": "<span class=\"eqt\"><p>Given below is a statement followed by two possible reasons numbered I and II. Read the statement carefully and decide which of the two explain(s) the event/observation/information given in the statement.</p><p>Statement:</p><p>In many parts of the world, the literacy rate of girls is significantly lower compared to boys. This is especially prevalent in rural and underdeveloped areas.</p><p>Reasons:</p><p>I: Societal norms and gender discrimination often prioritize boys' education over girls'.</p><p>II: Girls prefer to engage in household chores instead of attending school.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2319;&#2325; &#2325;&#2341;&#2344; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; I &#2324;&#2352; II &#2360;&#2375; &#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; &#2342;&#2379; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2325;&#2366;&#2352;&#2339; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2325;&#2341;&#2344; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344; &#2360;&#2375; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306; &#2325;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2328;&#2335;&#2344;&#2366;/&#2309;&#2357;&#2354;&#2379;&#2325;&#2344;/&#2360;&#2370;&#2330;&#2344;&#2366; &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><b>&#2325;&#2341;&#2344;:</b></p><p>&#2342;&#2369;&#2344;&#2367;&#2351;&#2366; &#2325;&#2375; &#2325;&#2312; &#2361;&#2367;&#2360;&#2381;&#2360;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2354;&#     "comp": "<p><b>Directions :</b>Read the following passage and answer the questions based on the passage. </p><p>Nala, the king of Nishadha, was known for his bravery, generosity, and remarkable skills in governance and warfare. His life took a fateful turn when he encountered Damayanti, the daughter of King Bhima of Vidarbha. Damayanti, renowned for her beauty and grace, heard of Nala's virtues and became captivated by him even before meeting him. Similarly, Nala, upon hearing of Damayanti, felt an immediate and deep connection, as if destiny itself had intertwined their lives. Their love, pure and profound, was marked by admiration and mutual respect, setting the stage for a union blessed by the gods themselves. The tale unfolds with the famous <b>Swayamvara</b>, a ceremony in which Damayanti was to choose her husband from among several kings and princes. Though the gods themselves, led by Indra, wished to win her hand, Damayanti's heart remained steadfastly with Nala. Guided by her unwavering devotion and insight, she recognized Nala among the divine disguises and chose him, thus honouring love over wealth, power, or divine influence. Their marriage was celebrated with joy, and they enjoyed a period of happiness marked by harmony and shared responsibilities in ruling their kingdom.</p><p>However, destiny tested them severely. Nala, who was an expert in dice, fell victim to a game of chance manipulated by the malevolent Kali. Losing his kingdom and wealth, he was forced into exile, while Damayanti, loyal and courageous, chose to follow him, enduring hardships alongside her husband. Their separation and struggles illustrated not only the strength of love but also human resilience in the face of adversity. Through forests and trials, they faced hunger, fear, and despair, yet their bond remained unbroken. Eventually, with wisdom, perseverance, and divine intervention, Nala regained his kingdom and fortune. The reunion of Nala and Damayanti symbolized the triumph o     "comp": "<p><b>Directions :</b>Read the following passage and answer the questions based on the passage. </p><p>The Problem of Induction is a central issue in epistemology and the philosophy of science, first articulated in its modern form by the Scottish philosopher David Hume in the eighteenth century. Induction refers to the process of reasoning from specific observations to general conclusions or laws. For example, observing that the sun has risen every day in recorded history leads us to conclude that it will rise again tomorrow. While such reasoning is essential for everyday life and scientific inquiry, Hume questioned its logical justification, highlighting a fundamental epistemic problem: the future may not necessarily resemble the past. Hume argued that no amount of empirical observation can guarantee the truth of a general statement. Just because something has always occurred under certain conditions does not logically entail that it must occur in the future. In other words, inductive reasoning presupposes a principle of uniformity in nature, the idea that patterns observed in the past will continue, but this principle itself cannot be proven without relying on induction, creating a circular argument. This challenge undermines the certainty of scientific laws and predictions that rely on repeated observation and generalisation.</p><p>The Problem of Induction has profound implications for both science and philosophy. Scientists rely on induction to formulate hypotheses, design experiments, and predict outcomes, yet Hume's sceptical insight reminds us that such predictions, however reliable, can never achieve absolute certainty. Philosophers have offered various responses to this problem. Some, like Karl Popper, reject induction altogether in favour of falsification, arguing that scientific theories can never be conclusively proven but can be rigorously tested and potentially falsified. Others, such as Nelson Goodman, highlight the \"new riddle of induction,\" showing that the criteria for selecting which generalisations are justified are themselves philosophically complex. Despite centuries of debate, the Problem of Induction remains unresolved. It forces us to acknowledge the limits of human knowledge and the provisional nature of empirical generalisations. Rather than rendering science or daily reasoning meaningless, it encourages a careful, critical approach to evidence and inference. By recognising that inductive conclusions are always contingent, we cultivate intellectual humility and a deeper understanding of the uncertainty inherent in knowledge, while continuing to rely pragmatically on patterns to navigate the world.</p>",

    "comp": "<p><b>Directions :</b>Read the following passage and answer the questions based on the passage. </p><p>G&#246;del's Incompleteness Theorems, formulated by the Austrian logician Kurt G&#246;del in 1931, are among the most profound results in mathematical logic and the philosophy of mathematics. They demonstrate inherent limitations in formal axiomatic systems, showing that no consistent system powerful enough to encapsulate arithmetic can be both complete and consistent. In other words, within any such system, there will always exist true statements that cannot be proven using the system's own rules. This discovery challenged the long-held belief, prevalent among mathematicians such as David Hilbert, that mathematics could be fully formalized and reduced to a complete and self-contained set of axioms. G&#246;del's First Incompleteness Theorem states that in any consistent formal system capable of expressing basic arithmetic, there exist propositions that are true but unprovable within the system. G&#246;del constructed these propositions using a method called arithmetization, encoding statements and proofs as numerical codes. The essence of his approach is self-reference, analogous to the famous \"liar paradox,\" where a statement declares its own unprovability. This demonstrates that completeness, where every true statement is provable, is unattainable in sufficiently expressive systems.</p><p>The Second Incompleteness Theorem takes the argument further, proving that no such system can demonstrate its own consistency. If a system could prove its own consistency, it would necessarily be inconsistent, implying that formal arithmetic cannot internally establish its reliability. Together, these theorems revealed fundamental limits to what formal mathematical reasoning can achieve, reshaping the philosophical understanding of truth, proof, and certainty. The implications of G&#246;del's theorems extend beyond pure mathematics. In computer science, they inform the limits of algorithmic computation and formal verification, highlighting that certain problems are inherently undecidable. In philosophy, they challenge the notion of absolute certainty in rational systems and illuminate the distinction between truth and provability. Additionally, G&#246;del's work has inspired reflection on human cognition, intuition, and the nature of mathematical insight, raising questions about whether human reasoning transcends formal systems. Ultimately, G&#246;del's Incompleteness Theorems demonstrate that mathematics, while extraordinarily powerful, is not omnipotent. They remind us that formal systems have inherent boundaries, and that the pursuit of knowledge must reckon with the distinction between what can be proven and what is simply true.</p>",

    "question": "<p>Convert the sentence provided below from its passive voice structure to an active voice structure:</p><p>The priceless manuscript, which was severely damaged in the recent museum flood, was to be painstakingly restored by a world-renowned art conservator.</p>",
    "options": [
      "A world-renowned art conservator is to painstakingly restore the priceless manuscript, which was severely damaged in the recent museum flood.",
      "A world-renowned art conservator has to painstakingly restore the priceless manuscript, which was severely damaged in the recent museum flood.",
      "A world-renowned art conservator had to painstakingly restore the priceless manuscript which was severely damaged in the recent museum flood.",
      "A world-renowned art conservator was to painstakingly restore the priceless manuscript, which was severely damaged in the recent museum flood."
    ],
    "correct_option_id": 3,
    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the \"to be\" verb ['be'] and the preposition \"by\" is necessary while changing the voice of the sentence from Passive to Active.</p><p>In Active voice, the sentence should be in <b>Infinitive form (to + V1)</b>.</p><p>The format in Passive voice is: Object of the Active voice (Subjective case) + am/is/are/was/were + to + be + V3 + by + Subject of the Active voice (Objective case).</p><p>Thus, the format in Active voice is: Subject + am/is/are/was/were + to + V1 + Object.</p><p>For example:</p><p>She is to be helped by you. (Passive)</p><p>You are to help her (Active)</p><p>The options except (d) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is option (d): A world-renowned art conservator was to painstakingly restore the priceless manuscript, which was severely damaged in the recent museum flood.</p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 99
  },

    "question": "<p>Choose the correct direct speech form of the following sentence:</p><p>The tourist asked the local guide how long it would take to reach the breathtaking mountaintop viewpoint from their current location in the valley.</p>",
    "options": [
      "The tourist said to the local guide, \"How long it will take to reach the breathtaking mountaintop viewpoint from our current location in the valley?\"",
      "The tourist said to the local guide, \"How long will it take to reach the breathtaking mountaintop viewpoint from our current location in the valley?\"",
      "The tourist said to the local guide, \"How long it would take to reach the breathtaking mountaintop viewpoint from your current location in the valley?\"",
      "The tourist asked the local guide, \"How long it will take to reach the breathtaking mountaintop viewpoint from our current location in the valley?\""
    ],
    "correct_option_id": 1,
    "solution": "<p>In the case of Interrogative sentences like this, \"asked\", etc., in Indirect Speech is changed into \"said\" in Direct Speech. In Direct speech, the verb is always placed before the subject, unlike in Indirect Speech.</p><p>The tense of the Indirect Speech is in the <b>Present Conditional</b> (Subject + would/should + V1 + object). So, the tense in the Direct Speech will be in the <b>Simple Future </b>(Subject + will/shall + V1 + object).</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>'Asked' is changed to 'said to'.</p><p>'How long it would take' is changed to 'How long will it take'.</p><p>'Their' is changed to 'our'.</p><p>Therefore, the correct answer is: The tourist said to the local guide, \"How long will it take to reach the breathtaking mountaintop viewpoint from our current location in the valley?\"</p><p>Hence, (b) is the correct answer.</p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 104
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about the Finance Commission:</p><p>I. Finance Commission is a quasi-judicial body.</p><p>II. The recommendations made by the Finance Commission are binding on the government.</p><p>III. The members of the Finance Commission are not eligible for reappointment.</p><p>Select the correct statements using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2340;&#2381;&#2340; &#2310;&#2351;&#2379;&#2327; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2357;&#2367;&#2340;&#2381;&#2340; &#2310;&#2351;&#2379;&#2327; &#2319;&#2325; &#2309;&#2352;&#2381;&#2343;-&#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2344;&#2367;&#2325;&#2366;&#2351; &#2361;&#2376;&#2404;</p><p>II. &#2357;&#2367;&#2340;&#2381;&#2340; &#2310;&#2351;&#2379;&#2327; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2312; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358;&#2375;&#2306; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2366;&#2343;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>III. &#2357;&#2367;&#2340;&#2381;&#2340; &#2310;&#2351;&#2379;&#2327; &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351; &#2346;&#2369;&#2344;&#2352;&#2381;&#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2346;&#2366;&#2340;&#2381;&#2352; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Statement I is correct.</b></p><p><b>Statement II and III are incorrect.</b></p><p><u>Finance Commission:</u></p><p>Article 280 of the Constitution of India provides for a Finance Commission. <b>It is a quasi-judicial body. </b></p><p>It is constituted by the President of India every fifth year or at such earlier time as he considers necessary. The recommendations made by the Finance Commission are only of advisory nature and hence, not binding on the government.</p><p>It is up to the Union government to implement its recommendations on granting money to the states.</p><p>Constitution had not mentioned anywhere that the recommendations of the commission shall be binding upon the Government of India or that it would give rise to a legal right in favour of the beneficiary states to receive the money recommended by the Commission.</p><p>The Finance Commission consists of a chairman and four other members to be appointed by the president. They hold office for such period as specified by the president in his order. <b>They are eligible for reappointment.</b></p><p></p>",

    "question": "<span class=\"eqt\"><p>Which of the following are Non-tax revenue receipts of the Government of India?</p><p>I. Profits from Public sector units</p><p>II. Investment dividends</p><p>III. Cess</p><p>IV. Grants from abroad</p><p>Select the correct answer using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2327;&#2376;&#2352;-&#2325;&#2352; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2366;&#2306; &#2361;&#2376;&#2306;?</p><p>I. &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2311;&#2325;&#2366;&#2311;&#2351;&#2379;&#2306; &#2360;&#2375; &#2354;&#2366;&#2349;</p><p>II. &#2344;&#2367;&#2357;&#2375;&#2358; &#2354;&#2366;&#2349;&#2366;&#2306;&#2358;</p><p>III. &#2313;&#2346;&#2325;&#2352;</p><p>IV. &#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2309;&#2344;&#2369;&#2342;&#2366;&#2344;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">I, II, III and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II, III &#2324;&#2352; IV</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Government receipts are divided into two groups - <b> Revenue Receipts and Capital Receipts </b>.</p><p>Revenue receipts neither create any liability nor cause any reduction in the assets of the government. These receipts are classified into (a) Tax Revenue and (b) Non-tax Revenue.</p><p><b> Tax Revenue </b>: A tax is a legal compulsory payment by the people and firms to the government of a country without reference to any direct benefit in return. It is imposed on the people by the government. A government collects revenue from various taxes like income tax, sales tax, service tax, excise duty, customs duty, cess and surcharge.</p><p>The incomes accruing to government from sources other than taxes are non-tax revenues. E.g. electricity bills, postal stamps, toll, passport fees, court fee, fines and penalties, Interest receipts, investment dividends, profits of public sector undertakings, grants, interest and dividend on government investment.</p><p></p>",
    "question_index": 106
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding 'Substitutes' and 'Complementary' goods.</p><p>I. Demand for a good move in the inverse direction of the price of its complementary goods.</p><p>II. Coffee and tea are examples of substitute goods.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344;' &#2324;&#2352; '&#2346;&#2370;&#2352;&#2325;' &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2368; &#2350;&#2366;&#2306;&#2327; &#2313;&#2360;&#2325;&#2375; &#2346;&#2370;&#2352;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2325;&#2377;&#2347;&#2368; &#2324;&#2352; &#2330;&#2366;&#2351; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2346;&#2344;&#2381;&#2344; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;&#2306;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Both statements are correct</b>.</p><p>Goods which are consumed together are called <b>complementary goods</b>. For example, if price of petrol falls then the demand for cars will increase as it will be relatively cheaper to use both the goods together. Thus, demand for a given commodity is <b>inversely affected</b> by change in price of complementary goods.</p><p>Goods which are not consumed together and act as substitute for each other are called <b>substitute goods</b>. Example: Tea and Coffee. Here, if price of one good increases, then people can shift to its substitute and thus demand of alternative good increases. Thus, demand for a given commodity is <b>directly affected</b> by change in price of substitute goods.</p><p></p>",

  },
