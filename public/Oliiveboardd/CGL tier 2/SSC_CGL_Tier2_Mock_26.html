    "question": "<span class=\"eqt\"><p>In the context of classical magnetism, consider the following statements.</p><p>I. A magnetic dipole placed in a uniform magnetic field experiences a net force but no torque.</p><p>II. In a paramagnetic material the magnetic susceptibility is positive and the material is attracted into regions of higher magnetic field.</p><p>Which among the given statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2330;&#2369;&#2306;&#2348;&#2325;&#2340;&#2381;&#2357; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2319;&#2325; &#2360;&#2350;&#2366;&#2344; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2352;&#2326;&#2366; &#2327;&#2351;&#2366; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2342;&#2381;&#2357;&#2367;&#2343;&#2381;&#2352;&#2369;&#2357; &#2319;&#2325; &#2358;&#2369;&#2342;&#2381;&#2343; &#2348;&#2354; &#2325;&#2366; &#2309;&#2344;&#2369;&#2349;&#2357; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2325;&#2379;&#2312; &#2335;&#2377;&#2352;&#2381;&#2325; &#2344;&#2361;&#2368;&#2306;&#2404;</p><p>II. &#2319;&#2325; &#2309;&#2344;&#2369;&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2350;&#2375;&#2306; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2360;&#2306;&#2357;&#2375;&#2342;&#2344;&#2358;&#2368;&#2354;&#2340;&#2366; &#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2313;&#2330;&#2381;&#2330; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2310;&#2325;&#2352;&#2381;&#2359;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement II is correct, while Statement I is incorrect.</p><p>A magnetic dipole in a uniform magnetic field experiences a net torque (unless aligned with the field) but zero net force.</p><p>Paramagnetic materials, by definition, have a small positive magnetic susceptibility and are attracted to stronger magnetic fields.</p><p>Explanation of Statements:</p><p>Statement I is incorrect. A magnetic dipole (like a small bar magnet) in a uniform magnetic field experiences two equal and opposite forces on its poles. The vector sum of these forces is zero, so there is no net force on the dipole. However, these two forces form a couple, which exerts a net torque on the dipole, tending to align it with the direction of the magnetic field. The torque is only zero when the dipole is perfectly aligned with the field. The statement has both claims reversed.</p><p>Statement II is correct. Paramagnetic materials are composed of atoms or molecules with permanent magnetic dipole moments. When placed in an external magnetic field, these dipoles tend to align with the field, weakly magnetizing the material in the same direction as the external field. This property is described by a small, positive magnetic susceptibility (&#967;). Because the material is magnetized in the direction of the field, it is weakly attracted towards regions where the magnetic field is stronger.</p><p>Further insights:</p><p>It is useful to contrast the three main types of magnetic materials:</p><p>Paramagnetic: Weakly attracted to magnetic fields. Susceptibility (&#967;) is small and positive. Example: Aluminum, Platinum.</p><p>Diamagnetic: Weakly repelled by magnetic fields. Susceptibility (&#967;) is small and negative. Example: Copper, Water, Gold.</p><p>Ferromagnetic: Strongly attracted to magnetic fields and can be permanently magnetized. Susceptibility (&#967;) is large and positive. Example: Iron, Nickel, Cobalt.</p>",
    "question_index": 110
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about ISRO / Indian launches in 2024:</p><p>I. XPoSat, an X-ray polarimeter observatory, was launched on 1 January 2024 aboard PSLV-C58.</p><p>II. INSAT-3DS, a meteorology / climate satellite, was launched on 17 February 2024 by a GSLV.</p><p>III. Proba-3 (an ESA Sun-observation two-satellite coronagraph mission) was launched on ISRO's PSLV in December 2024.</p><p>Which of the above given statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>2024 &#2350;&#2375;&#2306; &#2311;&#2360;&#2352;&#2379;/&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2381;&#2352;&#2325;&#2381;&#2359;&#2375;&#2346;&#2339;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2319;&#2325;&#2381;&#2360;-&#2352;&#2375; &#2346;&#2379;&#2354;&#2352;&#2367;&#2350;&#2368;&#2335;&#2352; &#2357;&#2375;&#2343;&#2358;&#2366;&#2354;&#2366;, &#2319;&#2325;&#2381;&#2360;&#2346;&#2379;&#2360;&#2376;&#2335;, 1 &#2332;&#2344;&#2357;&#2352;&#2368; 2024 &#2325;&#2379; PSLV-C58 &#2346;&#2352; &#2346;&#2381;&#2352;&#2325;&#2381;&#2359;&#2375;&#2346;&#2367;&#2340; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p><p>II. &#2350;&#2380;&#2360;&#2350; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344;/&#2332;&#2354;&#2357;&#2366;&#2351;&#2369; &#2313;&#2346;&#2327;&#2381;&#2352;&#2361;, &#2311;&#2344;&#2360;&#2376;&#2335;-3&#2337;&#2368;&#2319;&#2360;, 17 &#2347;&#2352;&#2357;&#2352;&#2368; 2024 &#2325;&#2379; GSLV &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2325;&#2381;&#2359;&#2375;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>III. &#2346;&#2381;&#2352;&#2379;&#2348;&#2366;-3 (&#2319;&#2325; &#2312;&#2319;&#2360;&#2319; &#2360;&#2370;&#2352;&#2381;&#2351;-&#2309;&#2357;&#2354;&#2379;&#2325;&#2344; &#2342;&#2379;-&#2313;&#2346;&#2327;&#2381;&#2352;&#2361; &#2325;&#2379;&#2352;&#2379;&#2344;&#2366;&#2327;&#2381;&#2352;&#2366;&#2347; &#2350;&#2367;&#2358;&#2344;) &#2342;&#2367;&#2360;&#2306;&#2348;&#2352; 2024 &#2350;&#2375;&#2306; &#2311;&#2360;&#2352;&#2379; &#2325;&#2375; &#2346;&#2368;&#2319;&#2360;&#2319;&#2354;&#2357;&#2368; &#2346;&#2352; &#2346;&#2381;&#2352;&#2325;&#2381;&#2359;&#2375;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Statement I is Correct.</p><p>Yes, ISRO launched the XPoSat satellite on January 1, 2024, aboard the PSLV-C58 rocket. It was India's first dedicated mission to study X-ray emissions from celestial sources and became the second country to do so.</p><p>Statement II is Correct.</p><p>INSAT-3DS is a dedicated meteorology and climate monitoring satellite. It was successfully launched on 17 February 2024 aboard the Geosynchronous Satellite Launch Vehicle (GSLV-F14) rocket from the Satish Dhawan Space Centre in Sriharikota, India.</p><p>Statement III is Correct. The European Space Agency's Proba-3 mission was launched on PSLV-C59 from India in December 2024.</p><p>The Proba (PRoject for OnBoard Autonomy) missions are a series of in-orbit demonstration (IOD) missions from the European Space Agency, for demonstrating and validating new technologies and concepts in orbit.</p><p></p><p></p>",
    "question_index": 111
  },

    "question": "<span class=\"eqt\"><p>In foreign exchange market if a government increases the exchange rate of its currency against any foreign currency. It is called as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2375;&#2306; &#2351;&#2342;&#2367; &#2325;&#2379;&#2312; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2325;&#2375; &#2350;&#2369;&#2325;&#2366;&#2348;&#2354;&#2375; &#2309;&#2346;&#2344;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2325;&#2368; &#2357;&#2367;&#2344;&#2367;&#2350;&#2351; &#2342;&#2352; &#2348;&#2338;&#2364;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Appreciation</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2358;&#2306;&#2360;&#2366;</span>",
      "<span class=\"eqt\">Revaluation</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2344;&#2352;&#2381;&#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344;</span>",
      "<span class=\"eqt\">Depreciation</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354;&#2381;&#2351;&#2361;&#2381;&#2352;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Devaluation</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2350;&#2370;&#2354;&#2381;&#2351;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Revaluation</b> is a term used in the foreign exchange market which means a government increasing the exchange rate of its currency against any foreign currency.</p><p><b>Currency depreciation</b> is the loss of value of a country's currency with respect to one or more foreign reference currencies, typically in a floating exchange rate system in which no official currency value is maintained. Currency appreciation in the same context is an increase in the value of the currency.</p><p><b>Currency appreciation</b> is an increase in the value of one currency in relation to another currency. Currencies appreciate against each other for a variety of reasons, including the government policy, interest rates, trade balances and business cycles.</p><p><b>Devaluation</b> is the deliberate downward adjustment to the value of a country's currency relative to another currency, group of currencies.</p><p></p>",
    "question_index": 112
  },

    "question": "<span class=\"eqt\"><p>Patau's syndrome is caused by trisomy of chromosome _________</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2335;&#2366;&#2314; &#2360;&#2367;&#2306;&#2337;&#2381;&#2352;&#2379;&#2350; &#2327;&#2369;&#2339;&#2360;&#2370;&#2340;&#2381;&#2352; _________ &#2325;&#2375; &#2335;&#2381;&#2352;&#2366;&#2311;&#2360;&#2377;&#2350;&#2368; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Patau's syndrome is a severe genetic disorder caused by the presence of an extra copy of chromosome 13 in some or all of a person's cells. This condition is therefore also known as Trisomy 13.</p><p>Explanation of Options:</p><p>Trisomy of chromosome 18 causes Edwards' syndrome.</p><p>Trisomy of chromosome 21 causes Down's syndrome.</p><p>Trisomy of chromosome 13 causes Patau's syndrome. This is the correct answer.</p><p>Trisomy of chromosome 16 is the most common trisomy leading to miscarriage and is not typically compatible with life beyond the first trimester.</p><p>Further insights:</p><p>Trisomy is a type of aneuploidy (an abnormal number of chromosomes) where there are three instances of a particular chromosome, instead of the usual two.</p><p>Patau's syndrome is associated with serious physical and intellectual abnormalities, including heart defects, brain or spinal cord abnormalities, poorly developed eyes, extra fingers or toes, and cleft lip.</p><p>The risk of having a child with a trisomy, including Patau's syndrome, increases with maternal age.</p><p></p>",
    "question_index": 113
  },

;&#2367;&#2325; &#2309;&#2350;&#2381;&#2354;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2360;&#2367;&#2352;&#2325;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) &#2335;&#2366;&#2352;&#2381;&#2335;&#2352;&#2367;&#2325; &#2309;&#2350;&#2381;&#2354;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2311;&#2350;&#2354;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) &#2360;&#2367;&#2335;&#2381;&#2352;&#2367;&#2325; &#2309;&#2350;&#2381;&#2354;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) &#2309;&#2306;&#2327;&#2370;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) &#2321;&#2325;&#2381;&#2360;&#2366;&#2354;&#2367;&#2325; &#2309;&#2350;&#2381;&#2354;</td></tr></table><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",

    "solution": "<p>&bull; <b>Lemon</b> contains <b>citric acid</b> (Answer: (i)-c).</p><p>&bull; <b>Vinegar</b> is rich in <b>acetic acid</b> (Answer: (ii)-a).</p><p>&bull; <b>Tamarind</b> contains <b>oxalic acid</b> (Answer: (iii)-d).</p><p>&bull; <b>Grapes</b> are a source of <b>tartaric acid</b> (Answer: (iv)-b).</p><p>Further Insight:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Food Source</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Acid Present</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Citrus Fruits</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Citric Acid</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Tomatoes</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Citric Acid, Malic Acid</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Vinegar</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Acetic Acid</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Fermented Dairy</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lactic Acid</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Apples</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Malic Acid</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Grapes</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tartaric Acid</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Pickles</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Acetic Acid</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Berries</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ascorbic Acid (Vitamin C)</td     "question": "<span class=\"eqt\"><p>Consider the following statements about High Courts:</p><p>I. Chief Justice of a High Court is appointed by the President in consultation with the Governor of the state only.</p><p>II. Judges of High Court hold their office till they attain the age of 62 years.</p><p>Select the correct statements using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2325;&#2367;&#2360;&#2368; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2375; &#2346;&#2352;&#2366;&#2350;&#2352;&#2381;&#2358; &#2360;&#2375; &#2361;&#2368; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; 62 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2340;&#2325; &#2309;&#2346;&#2344;&#2375; &#2346;&#2342; &#2346;&#2352; &#2348;&#2344;&#2375; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2370;&#2335; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Statement I is incorrect.</b></p><p><b>Statement II is correct.</b></p><p><b>High Courts</b></p><p>Each High Court comprises a Chief Justice and such other Judges as the President may, from time to time, appoint.</p><p>The Chief Justice of a High Court is appointed by the <b>President in consultation with the Chief Justice of India and the Governor of the state.</b></p><p>The procedure for appointing the High Court judges is the same except that the recommendation for the appointment of Judges in the High Court is initiated by the Chief Justice of the High Court concerned.</p><p>They hold <b>office up to 62 years of age.</b></p><p>To be eligible for appointment as a judge, one must be a citizen of India and should have held a judicial office in India for 10 years or must have practised as an advocate of a High Court or two or more such Courts in succession for a similar period.</p><p>Recently Chief Justice of India said that he proposed to the government of India to increase the retirement age of High Court judges to 65 years from 62 years. However, it is not implemented yet.</p><p></p>",
    "question_index": 115
  },

    "question": "<span class=\"eqt\"><p>Which of the following events took place during the Lord Canning period?</p><p>I. Enactment of Vernacular Press Act</p><p>II. Enactment of Indian Penal Code</p><p>III. Suppression of Wahabi Movement</p><p>Select the correct code.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2376;&#2344;&#2367;&#2306;&#2327; &#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2328;&#2335;&#2344;&#2366; &#2328;&#2335;&#2368;?</p><p>I. &#2357;&#2352;&#2381;&#2344;&#2366;&#2325;&#2381;&#2351;&#2370;&#2354;&#2352; &#2346;&#2381;&#2352;&#2375;&#2360; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2366; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344;</p><p>II. &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2342;&#2306;&#2337; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366; &#2325;&#2366; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344;</p><p>III. &#2357;&#2361;&#2366;&#2348;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2366; &#2342;&#2350;&#2344;</p><p>&#2360;&#2361;&#2368; &#2325;&#2379;&#2337; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III</span><span class=\"hqt\" style=\"display:none\">II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Lord Canning</b> was the Governor-General of India and Viceroy during the period <b>1856- 1862.</b></p><p>His period saw the suppression of <b>Wahabi movement,</b> white mutiny, Enactment of the various acts e.g. Government of India Act 1858, Indian Council Act 1861, <b>Indian Penal Code</b> etc.</p><p><b>Vernacular Press Act 1878</b> was enacted during the period of <b>Lord Lytton.</b></p><p>The Wahabi movement was a revivalist movement which tried to purify Islam by eliminating all the un-Islamic practices which had crept into Muslim society through the ages. It was led by Syed Ahmad of Rae Bareli. Jihad was declared against the Sikh kingdom of Punjab. After the overthrow of the Sikh ruler and incorporation of Punjab into the East India Companys dominion in 1849, the sole target of the Wahabis attack became the English dominion in India.</p><p><b>White Mutiny</b> was the unrest that occurred at the dissolution of the <b>\"European Forces\"</b> of the British East India Company in India during the mid-19th century in the wake of the Indian Rebellion of 1857.</p><p></p>",
    "question_index": 116
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding coalfields of India.</p><p>I. The Jharia coalfield is located in Jharkhand and is famous for its metallurgical coal.</p><p>II. Neyveli in Tamil Nadu produces lignite (brown coal).</p><p>III. The Raniganj coalfield is located in Odisha.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2325;&#2379;&#2351;&#2354;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2333;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379;&#2351;&#2354;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2333;&#2366;&#2352;&#2326;&#2306;&#2337; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2309;&#2346;&#2344;&#2375; &#2343;&#2366;&#2340;&#2369;&#2325;&#2352;&#2381;&#2350; &#2325;&#2379;&#2351;&#2354;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2376;&#2404;</p><p>II. &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2350;&#2375;&#2306; &#2344;&#2375;&#2357;&#2375;&#2354;&#2368; &#2354;&#2367;&#2327;&#2381;&#2344;&#2366;&#2311;&#2335; (&#2349;&#2370;&#2352;&#2366; &#2325;&#2379;&#2351;&#2354;&#2366;) &#2325;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2352;&#2366;&#2344;&#2368;&#2327;&#2306;&#2332; &#2325;&#2379;&#2351;&#2354;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2323;&#2337;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I - Correct. Jharia (Dhanbad district, Jharkhand) is Indias richest coalfield for coking (metallurgical) coal, essential for steel production.</p><p>Statement II - Correct. Neyveli (Cuddalore district, Tamil Nadu) is known for lignite mining and power generation.</p><p>Statement III - Incorrect. The Raniganj coalfield is located in West Bengal, not Odisha.</p><p>Further insights:</p><p>Major coalfields: Jharia (Jharkhand), Raniganj (West Bengal), Bokaro (Jharkhand), Talcher (Odisha).</p><p>India's coal types: Anthracite (rare), Bituminous, Lignite, Peat.</p>",
    "question_index": 118
  },

    "question": "<span class=\"eqt\"><p>What does an alpha particle represent in the process of alpha decay?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2354;&#2381;&#2347;&#2366; &#2325;&#2381;&#2359;&#2351; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2309;&#2354;&#2381;&#2347;&#2366; &#2325;&#2339; &#2325;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Hydrogen</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Lithium</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2367;&#2341;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Helium</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2368;&#2354;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Deuterium</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2381;&#2351;&#2370;&#2335;&#2375;&#2352;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>An alpha particle is identical to the nucleus of a Helium atom. Therefore, in the process of alpha decay, an alpha particle represents a Helium nucleus.</p><p>Explanation of Options:</p><p>An alpha particle consists of two protons and two neutrons bound together. This composition is exactly the same as the nucleus of a Helium-4 atom (&#8308;He).</p><p>Hydrogen: A typical hydrogen nucleus consists of a single proton.</p><p>Lithium: A lithium nucleus consists of three protons and typically three or four neutrons.</p><p>Helium: A helium nucleus consists of two protons and two neutrons. This is the correct answer.</p><p>Deuterium: Deuterium is an isotope of hydrogen. Its nucleus contains one proton and one neutron.</p><p>Further insights:</p><p>Alpha Decay: This is a type of radioactive decay in which an atomic nucleus emits an alpha particle, thereby transforming or 'decaying' into an atom with a mass number that is 4 less and an atomic number that is 2 less.</p><p>Equation: The process can be represented as:</p><p>&#7468;&#8339;Z &#8594; &#7468;&#8315;&#8308;&#7527;(Z-2) + &#8308;He&#8322;</p><p>Where X is the parent nucleus, Y is the daughter nucleus, A is the mass number, and Z is the atomic number. The emitted particle, &#8308;He&#8322;, is the alpha particle.</p><p>Example: The alpha decay of Uranium-238 into Thorium-234:</p><p>&#8312;U&#8329;&#8322; &#8594; &#8308;Th&#8329;&#8320; + &#8308;He&#8322;</p>",
    "question_index": 119
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the National Mission on Edible Oils - Oilseeds (NMEO-Oilseeds):</p><p>I. The Mission aims to make India self-reliant in edible oils by boosting domestic oilseed production.</p><p>II. It will be implemented from 2024-25 to 2030-31 with a total outlay of Rs.10,103 crore.</p><p>III. Under the Mission, the 'SATHI' portal will be used to monitor edible oil imports and exports.</p><p>Which of the above statement(s) is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2326;&#2366;&#2342;&#2381;&#2351; &#2340;&#2375;&#2354; &#2350;&#2367;&#2358;&#2344; - &#2340;&#2367;&#2354;&#2361;&#2344; (NMEO-&#2340;&#2367;&#2354;&#2361;&#2344;) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2350;&#2367;&#2358;&#2344; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2328;&#2352;&#2375;&#2354;&#2370; &#2340;&#2367;&#2354;&#2361;&#2344; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2325;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2379; &#2326;&#2366;&#2342;&#2381;&#2351; &#2340;&#2375;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2310;&#2340;&#2381;&#2350;&#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2348;&#2344;&#2366;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2311;&#2360;&#2375; 2024-25 &#2360;&#2375; 2030-31 &#2340;&#2325; 10,103 &#2325;&#2352;&#2379;&#2337;&#2364; &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2325;&#2369;&#2354; &#2346;&#2352;&#2367;&#2357;&#2381;&#2351;&#2351; &#2325;&#2375; &#2360;&#2366;&#2341; &#2354;&#2366;&#2327;&#2370; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404;</p><p>III. &#2350;&#2367;&#2358;&#2344; &#2325;&#2375; &#2340;&#2361;&#2340;, 'SATHI' &#2346;&#2379;&#2352;&#2381;&#2335;&#2354; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2326;&#2366;&#2342;&#2381;&#2351; &#2340;&#2375;&#2354; &#2325;&#2375; &#2310;&#2351;&#2366;&#2340; &#2324;&#2352; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; &#2325;&#2368; &#2344;&#2367;&#2327;&#2352;&#2366;&#2344;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement III is incorrect. The 'SATHI' portal is designed for Seed Authentication, Traceability & Holistic Inventory, not for tracking imports/exports.</p><p></p><p>The Union Cabinet, chaired by the Prime Minister Shri Narendra Modi, has approved the National Mission on Edible Oils - Oilseeds (NMEO-Oilseeds), a landmark initiative aimed at boosting domestic oilseed production and achieving self-reliance (Atmanirbhar Bharat) in edible oils.</p><p>The Mission will be implemented over a seven-year period, from 2024-25 to 2030-31, with a financial outlay of Rs 10,103 crore.</p><p>The mission aims to increase primary oilseed production from 39 million tonnes (2022-23) to 69.7 million tonnes by 2030-31.</p><p>To ensure the timely availability of quality seeds, the Mission will introduce an Online 5-year rolling seed plan through the 'Seed Authentication, Traceability & Holistic Inventory (SATHI)' Portal, enabling states to establish advance tie-ups with seed-producing agencies, including cooperatives, Farmer Producer Organizations (FPOs), and government or private seed corporations. 65 new seed hubs and 50 seed storage units will be set up in public sector to improve the seed production infrastructure.</p><p></p><p></p><p></p><p></p>",
    "question_index": 120
  },

    "question": "<span class=\"eqt\"><p>Arrange the rule of various dynasties of Vijayanagar Empire chronologically.</p><p>I. Tuluva</p><p>II. Sangama</p><p>III. Aravidu</p><p>IV. Saluva</p><p>Select the correct answer using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;&#2379;&#2306; &#2325;&#2375; &#2358;&#2366;&#2360;&#2344; &#2325;&#2379; &#2325;&#2366;&#2354;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2340;&#2369;&#2354;&#2369;&#2357;&#2366;</p><p>II. &#2360;&#2306;&#2327;&#2350;&#2366;</p><p>III. &#2309;&#2352;&#2366;&#2357;&#2367;&#2337;&#2369;</p><p>IV. &#2360;&#2366;&#2354;&#2369;&#2357;&#2366;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I- III- IV- II</span><span class=\"hqt\" style=\"display:none\">I- III- IV- II</span>",
      "<span class=\"eqt\">I- IV- III- II</span><span class=\"hqt\" style=\"display:none\">I- IV- III- II</span>",
      "<span class=\"eqt\">II- III- IV- I</span><span class=\"hqt\" style=\"display:none\">II- III- IV- I</span>",
      "<span class=\"eqt\">II- IV- I- III</span><span class=\"hqt\" style=\"display:none\">II- IV- I- III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Vijayanagar empire was one of the most powerful regional powers in the medieval India. It constituted four dynasties,</p><p>i) <b>Sangama</b> (c.1336 - 1485 CE)</p><p>ii) <b>Saluva </b>(c.1485 - 1503 CE)</p><p>iii) <b>Tuluva</b> (c.1503 - 1570 CE)</p><p>iv) <b>Aravidu</b> (Till the end of the 17th century)</p><p></p>",
    "question_index": 121

    "question": "<span class=\"eqt\"><p>Consider the following pairs with species and endemic region in India.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Species</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Endemic Regions</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. Pygmy Hogg</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Himalayan Foothills</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. Malabar Civet</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Western Ghats</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. Hangul</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Arunachal Pradesh</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. Sangai Deer</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vindhya range</td></tr></table><p>Which among the above pairs is/are correctly matched?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2379;&#2337;&#2364;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2366;&#2305;</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. &#2346;&#2367;&#2327;&#2381;&#2350;&#2368; &#2361;&#2377;&#2327;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2361;&#2367;&#2350;&#2366;&#2354;&#2351;&#2368; &#2340;&#2354;&#2361;&#2335;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. &#2350;&#2366;&#2354;&#2366;&#2348;&#2366;&#2352; &#2360;&#2367;&#2357;&#2375;&#2335;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. &#2361;&#2306;&#2327;&#2369;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. &#2360;&#2306;&#2327;&#2366;&#2312; &#2361;&#2367;&#2352;&#2339;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2357;&#2367;&#2306;&#2343;&#2381;&#2351; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366;</td></tr></table><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2351;&#2369;&#2327;&#2381;&#2350; &#2360;&#2361;&#2368; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p><b>Pygmy Hogg:</b> The smallest member of the pig family, <b>the pygmy hog</b>, is a <b>critically endangered species</b>. Once found along a narrow strip of tall and wet grassland plains on the Himalayan foothills  -  from Uttar Pradesh to Assam, through Nepal's Terai areas and Bengal's duars but now found only near the Himalaya foothills of Assam, especially Manas Tiger Reserve region.</p><p>It is indicative species. Its presence reflects the health of its primary habitat, the tall, wet grasslands of the region.</p><p><b>Malabar Civet:</b> Malabar Large Spotted Civets are the largest species of viverrid. It is endemic to the Western Ghats. Malabar Civet are<b> nocturnal</b> and listed as <b>critically endangered </b>by IUCN.</p><p><b>Hangul:</b> It is also known as <b>Kashmir Stag</b>. It is the only species of elk native to India and found in dense riverine forests of Dachigam National Park of Jammu &amp; Kashmir and Chamba in Himachal Pradesh.</p><p><b>Sangai Deer:</b> Sangai is endemic and endangered species of deer, found only in Keibul Lamjao National Park of <b>Manipur</b>. The Keibul Lamjao park is a marshy wetland located at the south parts of the Loktak Lake.</p><p>Source: Down to Earth and IUCN website</p>",
    "question_index": 122
  },

    "question": "<span class=\"eqt\"><p>Which of the following schedule is related to the oath and affirmation of ministers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2358;&#2346;&#2341; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p><b>The Third Schedule</b> of the Indian Constitution contains the forms of Oaths or Affirmations for various constitutional functionaries, including Union Ministers, Ministers for States, Members of Parliament, Members of State Legislatures, Judges of the Supreme Court and High Courts, and the Comptroller and Auditor-General of India.</p><p>Explanation of Other Options:</p><p> Fourth Schedule: Deals with the allocation of seats in the Rajya Sabha (Council of States) to the States and Union Territories.</p><p> Second Schedule: Contains provisions as to the salaries, allowances, privileges, etc., of the President, Governors of States, Speaker and Deputy Speaker of the Lok Sabha, Chairman and Deputy Chairman of the Rajya Sabha, Speaker and Deputy Speaker of Legislative Assemblies, Chairman and Deputy Chairman of Legislative Councils, Judges of the Supreme Court and High Courts, and the Comptroller and Auditor-General of India.</p><p> Eighth Schedule: Lists the officially recognized languages of India.</p><p>Further insights:</p><p> The oath for a Union Minister includes an oath of office (to faithfully and conscientiously discharge duties) and an oath of secrecy (not to directly or indirectly communicate or reveal any matter brought under consideration).</p><p> Taking an oath or making an affirmation is a mandatory requirement before assuming office for these constitutional posts.</p>",

    "question": "<span class=\"eqt\"><p>In the context of the Ganga river system, consider the following statements.</p><p>I. The Son River is a right-bank tributary of the Ganga.</p><p>II. The Gandak (Gandaki) is a left-bank tributary that joins the Ganga from the north (Nepal side) in Bihar.</p><p>Which among the given statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2306;&#2327;&#2366; &#2344;&#2342;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2360;&#2379;&#2344; &#2344;&#2342;&#2368; &#2327;&#2306;&#2327;&#2366; &#2325;&#2368; &#2342;&#2366;&#2361;&#2367;&#2344;&#2368; &#2340;&#2335;&#2357;&#2352;&#2381;&#2340;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2327;&#2306;&#2337;&#2325; (&#2327;&#2306;&#2337;&#2325;&#2368;) &#2319;&#2325; &#2348;&#2366;&#2351;&#2368;&#2306; &#2340;&#2335;&#2357;&#2352;&#2381;&#2340;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2368; &#2361;&#2376; &#2332;&#2379; &#2348;&#2367;&#2361;&#2366;&#2352; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2340;&#2352; (&#2344;&#2375;&#2346;&#2366;&#2354; &#2325;&#2368; &#2323;&#2352;) &#2360;&#2375; &#2327;&#2306;&#2327;&#2366; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements I and II are correct. They accurately describe the geographical characteristics of the Son and Gandak rivers in relation to the main Ganga river.</p><p>Explanation of Statements:</p><p>Statement I is correct. The Son River originates from the Amarkantak Plateau in central India and flows north-northeast before joining the Ganga from the south, near Patna in Bihar. As the Ganga flows from west to east in this region, any river joining it from the south is a right-bank tributary. The Yamuna is the other major right-bank tributary.</p><p>Statement II is correct. The Gandak River (also known as the Gandaki or Narayani in Nepal) originates in the Himalayas in Nepal. It flows southwards, enters India in Bihar, and joins the Ganga from the north, near Sonpur (opposite Patna). As the Ganga flows from west to east, any river joining from the north is a left-bank tributary.</p><p>Further insights:</p><p>A simple way to remember left-bank and right-bank tributaries is to imagine yourself standing in the river, facing the direction of its flow. The tributaries joining from your left are left-bank, and those joining from your right are right-bank.</p><p>Most of the major left-bank tributaries of the Ganga are Himalayan rivers, such as the Ramganga, Gomti, Ghaghara, Gandak, and Kosi. These are generally snow-fed and perennial.</p><p>The major right-bank tributaries, like the Yamuna and the Son, originate in the Himalayas and the Peninsular Plateau, respectively.</p><p></p>",
    "question_index": 125
  },

    "question": "<span class=\"eqt\"><p>Match column A (books/poem collections) with column B (their authors).</p><p><table style=\"border-collapse:collapse;\"></p><p><tr></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">Column A</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">Column B</th></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Summer in Calcutta</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Nirmal Verma</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Parinde</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Arun Kolatkar</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Cry, the Peacock</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Anita Desai</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Jejuri</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Kamala Das</td></p><p></tr></p><p></table></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2340;&#2306;&#2349; A (&#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2375;&#2306;/&#2325;&#2357;&#2367;&#2340;&#2366; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;) &#2325;&#2379; &#2360;&#2381;&#2340;&#2306;&#2349; B (&#2313;&#2344;&#2325;&#2375; &#2354;&#2375;&#2326;&#2325;) &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2305;&#2404;</p><p><table style=\"border-collapse:collapse;\"><tr></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2325;&#2354;&#2325;&#2340;&#2381;&#2340;&#2366; &#2350;&#2375;&#2306; &#2327;&#2381;&#2352;&#2368;&#2359;&#2381;&#2350;&#2325;&#2366;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2344;&#2367;&#2352;&#2381;&#2350;&#2354; &#2357;&#2352;&#2381;&#2350;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2346;&#2352;&#2367;&#2306;&#2342;&#2375;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2309;&#2352;&#2369;&#2339; &#2325;&#2379;&#2354;&#2335;&#2325;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2325;&#2381;&#2352;&#2366;&#2312;, &#2342; &#2346;&#2368;&#2325;&#2377;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2309;&#2344;&#2368;&#2340;&#2366; &#2342;&#2375;&#2360;&#2366;&#2312;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2332;&#2375;&#2332;&#2369;&#2352;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2325;&#2350;&#2354;&#2366; &#2342;&#2366;&#2360;</td></tr></table></p></span>",
    "options": [
      "<span class=\"eqt\">i-a, ii-b, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-a, ii-b, iii-c, iv-d</span>",
      "<span class=\"eqt\">i-d, ii-a, iii-b, iv-c</span><span class=\"hqt\" style=\"display:none\">i-d, ii-a, iii-b, iv-c</span>",
      "<span class=\"eqt\">i-a, ii-d, iii-c, iv-b</span><span class=\"hqt\" style=\"display:none\">i-a, ii-d, iii-c, iv-b</span>",
      "<span class=\"eqt\">i-d, ii-a, iii-c, iv-b</span><span class=\"hqt\" style=\"display:none\">i-d, ii-a, iii-c, iv-b</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Summer in Calcutta by Kamala Das:</p><p>Summer in Calcutta (1965) is a seminal collection of poetry by Kamala Das (also known as Kamala Surayya). The collection is celebrated for its confessional style, intense honesty, and bold exploration of female sexuality, love, and longing, which was groundbreaking for its time in Indian English literature.</p><p>Parinde by Nirmal Verma:</p><p>Parinde (Birds), a 1960 collection of short stories by Nirmal Verma, is considered a landmark in Hindi literature. It is credited with pioneering the 'Nai Kahani' (New Story) movement, which moved away from traditional storytelling to focus on the inner lives, alienation, and existential angst of modern individuals.</p><p>Cry, the Peacock by Anita Desai:</p><p>This was the debut novel of Anita Desai, published in 1963. A classic of Indian psychological fiction, the novel delves into the fractured psyche of its protagonist, Maya, exploring themes of marital discord, loneliness, and obsession. It established Desai as a powerful voice in Indian English fiction.</p><p>Jejuri by Arun Kolatkar:</p><p>Jejuri (1976) is an iconic collection of poems by the bilingual poet Arun Kolatkar. Written in English, the sequence of poems chronicles a visit to the pilgrimage town of Jejuri in Maharashtra. The work is lauded for its modernist sensibility, detached observational tone, and the way it juxtaposes faith and skepticism. It won the Commonwealth Poetry Prize in 1977.</p><p></p>",
    "question_index": 126
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about Pradhan Mantri Gramin Digital Saksharta Abhiyan' (PMGDISHA).</p><p>I. It aims to improve digital literacy in the country.</p><p>II. It is implemented through the Common services centres under the Ministry of science and technology.</p><p>Which of the above statements is/are <b>incorrect</b>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2360;&#2366;&#2325;&#2381;&#2359;&#2352;&#2340;&#2366; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; (&#2346;&#2368;&#2319;&#2350;&#2332;&#2368;&#2342;&#2367;&#2358;&#2366;) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2311;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2360;&#2366;&#2325;&#2381;&#2359;&#2352;&#2340;&#2366; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2311;&#2360;&#2375; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2324;&#2352; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2360;&#2375;&#2357;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; <b>&#2327;&#2354;&#2340;</b> &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",

    "question": "<span class=\"eqt\"><p>A user can also mark an undetected unsolicited email as _____, thereby ensuring that such type of email is not delivered into the inbox as normal email in future. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2319;&#2325; &#2309;&#2332;&#2381;&#2334;&#2366;&#2340; &#2309;&#2357;&#2366;&#2306;&#2331;&#2367;&#2340; &#2312;&#2350;&#2375;&#2354; &#2325;&#2379; _____ &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2368; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; (&#2350;&#2366;&#2352;&#2381;&#2325;) &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2351;&#2361; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2361;&#2379; &#2360;&#2325;&#2375; &#2325;&#2367; &#2349;&#2357;&#2367;&#2359;&#2381;&#2351; &#2350;&#2375;&#2306; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2312;&#2350;&#2375;&#2354; &#2325;&#2379; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2312;&#2350;&#2375;&#2354; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2311;&#2344;&#2348;&#2377;&#2325;&#2381;&#2360; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">spoof</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2370;&#2347;&#2364;</span>",

    "correct_option_id": 1,
    "solution": "<p>Spam is a broad term and applies to various digital platforms like messaging, forums, chatting, emailing, advertisement, etc. However, the widely recognised form is email spam. Depending on their requirements, organisations or individuals buy or create a mailing list (list of email addresses) and repeatedly send advertisement links and invitation emails to a large number of users. This creates unnecessary junk in the inbox of the receiver's email and often tricks a user into buying something or downloading a paid software or malware. </p><p>Nowadays, email services like Gmail, Hotmail, etc. have an automatic spam detection algorithm that filters emails and makes things easier for the end users. A user can also mark an undetected unsolicited email as \"<b>spam</b>\", thereby ensuring that such type of email is not delivered into the inbox as normal email in future. </p>",
    "question_index": 130

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding input and output devices:</p><p>i. A digitizer converts analog information into a digital form usable by the computer.</p><p>ii. A plotter produces hard copies of line drawings and is mainly vector-based.</p><p>iii. A light pen can be used with LED monitors for precision drawing tasks.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2344;&#2346;&#2369;&#2335; &#2324;&#2352; &#2310;&#2313;&#2335;&#2346;&#2369;&#2335; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. &#2319;&#2325; &#2337;&#2367;&#2332;&#2367;&#2335;&#2366;&#2311;&#2332;&#2364;&#2352; &#2319;&#2344;&#2366;&#2354;&#2377;&#2327; &#2360;&#2370;&#2330;&#2344;&#2366; &#2325;&#2379; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2351;&#2379;&#2327;&#2381;&#2351; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>ii. &#2319;&#2325; &#2346;&#2381;&#2354;&#2377;&#2335;&#2352; &#2354;&#2366;&#2311;&#2344; &#2337;&#2381;&#2352;&#2377;&#2311;&#2306;&#2327; &#2325;&#2368; &#2361;&#2366;&#2352;&#2381;&#2337; &#2325;&#2377;&#2346;&#2368; &#2340;&#2376;&#2351;&#2366;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2357;&#2375;&#2325;&#2381;&#2335;&#2352;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>iii. &#2319;&#2325; &#2354;&#2366;&#2311;&#2335; &#2346;&#2375;&#2344; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2360;&#2335;&#2368;&#2325; &#2337;&#2381;&#2352;&#2366;&#2311;&#2306;&#2327; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2354;&#2312;&#2337;&#2368; &#2350;&#2377;&#2344;&#2367;&#2335;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i and ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">ii and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statements i and ii are correct descriptions of a digitizer and a plotter, respectively.</p><p>Statement iii is incorrect because light pens are an older technology designed to work with Cathode Ray Tube (CRT) monitors and are not compatible with modern LED/LCD screens.</p><p>Explanation of Statements:</p><p>Statement i is correct. A digitizer, also known as a graphics tablet, is an input device that converts analog movements and drawings made with a special pen (stylus) on a flat surface into digital signals that a computer can process. It is widely used by artists, designers, and architects to create digital illustrations and blueprints.</p><p>Statement ii is correct. A plotter is an output device that prints vector graphics. Unlike a standard printer that creates images from dots (raster graphics), a plotter draws continuous lines using a pen or other instrument. This makes it ideal for producing high-quality, large-format line drawings such as architectural plans, engineering blueprints, and circuit diagrams.</p><p>Statement iii is incorrect. A light pen is an input device that works by detecting the change in brightness when the scanning electron beam of a Cathode Ray Tube (CRT) monitor passes over the point where the pen is touching the screen. Modern displays like LCD, LED, and OLED monitors do not use a scanning electron beam to refresh the image; they illuminate pixels directly. Therefore, a traditional light pen is incompatible with these modern screens. Modern stylus pens (like those used with tablets) use different technologies, such as active digitizers or capacitive touch sensing.</p><p>Further insights:</p><p>The term \"digitizer\" can also refer more broadly to any device that converts an analog signal (like sound, video, or a physical trace) into a digital format.</p><p>Plotters have been largely replaced in many applications by wide-format inkjet and laser printers, but they are still valued in specialized fields for their precision in line work.</p><p></p>",
    "question_index": 131
  },

    ],
    "correct_option_id": 2,
    "solution": "<p>When you open a Powerpoint presentation, you can notice Slides and <b>Outline</b> boxes on the left panel of the presentation whereas 'Notes' is located at the bottom panel of the presentation.</p>",

  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following in MS Excel:</p><p>1. The INDIRECT() function returns a reference specified by a text string.</p><p>2. OFFSET() can be used to dynamically reference cells based on a starting point.</p><p>3. The TRANSPOSE() function converts text to columns.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. INDIRECT() &#2347;&#2364;&#2306;&#2325;&#2381;&#2358;&#2344; &#2319;&#2325; &#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2360;&#2381;&#2335;&#2381;&#2352;&#2367;&#2306;&#2327; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2342;&#2367;&#2359;&#2381;&#2335; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. OFFSET() &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2379; &#2327;&#2340;&#2367;&#2358;&#2368;&#2354; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3. TRANSPOSE() &#2347;&#2364;&#2306;&#2325;&#2381;&#2358;&#2344; &#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2325;&#2379; &#2325;&#2377;&#2354;&#2350; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct as they accurately describe the functions of INDIRECT() and OFFSET(). Statement 3 is incorrect; it confuses the TRANSPOSE() function with the \"Text to Columns\" feature. Therefore, the correct option is (a).</p><p>Explanation of Statements:</p><p>Statement 1 is correct. The INDIRECT() function is a powerful lookup and reference function that interprets a text string as a cell reference and returns its content. For example, if cell A1 contains the text \"C5\", and cell C5 contains the number 100, the formula =INDIRECT(A1) will return 100. It is extremely useful for creating dynamic references that can be changed by editing a text cell.</p><p>Statement 2 is correct. The OFFSET() function returns a reference to a range that is a specified number of rows and columns from a starting cell or range. Its syntax is OFFSET(reference, rows, cols, [height], [width]). This allows it to create dynamic ranges that can expand, contract, or move based on other calculations, making it a cornerstone of advanced dashboard and model building in Excel.</p><p>Statement 3 is incorrect. This statement describes the \"Text to Columns\" feature, which is a tool on the \"Data\" tab used to split the content of a single cell into multiple columns based on a delimiter (like a comma or space). The TRANSPOSE() function, on the other hand, is used to switch the orientation of a range of data. It converts a vertical range of cells into a horizontal range, and vice-versa.</p><p>Further insights:</p><p>Volatile Functions: Both INDIRECT() and OFFSET() are known as volatile functions. This means they recalculate every time any change is made to the worksheet, not just when their precedent cells change. On large spreadsheets, overuse of these functions can lead to slow performance.</p><p>TRANSPOSE as an Array Formula: In older versions of Excel, TRANSPOSE() had to be entered as an array formula (using Ctrl+Shift+Enter). In modern Excel with dynamic arrays, the function \"spills\" the results automatically.</p><p>Alternatives: For many dynamic range tasks where OFFSET() was traditionally used, modern Excel offers a more efficient alternative using structured references within an Excel Table.</p>",
    "question_index": 134
  },
  {
    "question": "<span class=\"eqt\"><p>What is the main advantage of SSDs (Solid-State Drives) over HDDs (Hard Disk Drives)? </p></span><span class=\"hqt\" style=\"display:none\"><p>HDD (&#2361;&#2366;&#2352;&#2381;&#2337; &#2337;&#2367;&#2360;&#2381;&#2325; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;) &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; SSD (&#2360;&#2377;&#2354;&#2367;&#2337;-&#2360;&#2381;&#2335;&#2375;&#2335; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;) &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2354;&#2366;&#2349; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Higher capacity</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Faster data access times</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2375;&#2332;&#2364; &#2337;&#2375;&#2335;&#2366; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2360;&#2350;&#2351;</span>",
      "<span class=\"eqt\">Lower cost</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350; &#2325;&#2368;&#2350;&#2340;</span>",
      "<span class=\"eqt\">Greater durability</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2325; &#2335;&#2367;&#2325;&#2366;&#2314;&#2346;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The main advantage of SSDs (Solid-State Drives) over HDDs (Hard Disk Drives) is their significantly <b>faster data access times</b>. SSDs use flash memory technology to store data, and unlike HDDs, they have no moving mechanical parts. This lack of moving parts allows SSDs to access and retrieve data much more quickly, resulting in faster boot times, application load times, and overall system responsiveness. </p>",
    "question_index": 135
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a commonly used web search operator for exact phrase matching?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2335;&#2368;&#2325; &#2347;&#2381;&#2352;&#2375;&#2332; &#2350;&#2376;&#2330;&#2367;&#2306;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2311;&#2360;&#2381;&#2340;&#2375;&#2350;&#2366;&#2354; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2357;&#2375;&#2348; &#2360;&#2352;&#2381;&#2330; &#2321;&#2346;&#2352;&#2375;&#2335;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">AND</span><span class=\"hqt\" style=\"display:none\">AND</span>",
      "<span class=\"eqt\">OR</span><span class=\"hqt\" style=\"display:none\">OR</span>",
      "<span class=\"eqt\">NOT</span><span class=\"hqt\" style=\"display:none\">NOT</span>",
      "<span class=\"eqt\">\" \"</span><span class=\"hqt\" style=\"display:none\">\" \"</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The commonly used web search operator for exact phrase matching is enclosing the phrase in quotation marks, like <b>\"search term.\"</b> This tells the search engine to look for the exact phrase within the quotation marks rather than treating the words individually. This is useful when you want to find web pages or documents that contain an exact sequence of words in a specific order.</p>",
    "question_index": 136
  },
  {
    "question": "<span class=\"eqt\"><p>What does the \"Track Changes\" feature in Microsoft Word allow users to do?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2360;&#2377;&#2347;&#2381;&#2335; &#2357;&#2352;&#2381;&#2337; &#2350;&#2375;&#2306; \"&#2335;&#2381;&#2352;&#2376;&#2325; &#2330;&#2375;&#2306;&#2332;&#2375;&#2360;\" &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;?</p></span>",
