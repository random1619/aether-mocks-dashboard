      "<span class=\"eqt\">Automatically correct spelling errors in the document</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2377;&#2325;&#2381;&#2351;&#2370;&#2350;&#2375;&#2306;&#2335; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2340;&#2307; &#2361;&#2368; &#2357;&#2352;&#2381;&#2340;&#2344;&#2368; &#2340;&#2381;&#2352;&#2369;&#2335;&#2367; &#2325;&#2379; &#2360;&#2361;&#2368; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Highlight text in different colours for emphasis</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;&#2381;&#2347;&#2375;&#2360;&#2367;&#2360; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2352;&#2306;&#2327;&#2379;&#2306; &#2360;&#2375; &#2335;&#2375;&#2325;&#2381;&#2360;&#2335; &#2325;&#2379; &#2361;&#2366;&#2311;&#2354;&#2366;&#2311;&#2335; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Collaboratively edit a document with change tracking and comments</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2335;&#2381;&#2352;&#2376;&#2325;&#2367;&#2306;&#2327; &#2324;&#2352; &#2335;&#2367;&#2346;&#2381;&#2346;&#2339;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2319;&#2325; &#2337;&#2377;&#2325;&#2381;&#2351;&#2370;&#2350;&#2375;&#2306;&#2335; &#2325;&#2379; &#2360;&#2361;&#2351;&#2379;&#2327;&#2366;&#2340;&#2381;&#2350;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2346;&#2366;&#2342;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Create a table of contents for the document</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2377;&#2325;&#2381;&#2351;&#2370;&#2350;&#2375;&#2306;&#2335; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2359;&#2351;&#2360;&#2370;&#2330;&#2368; (&#2335;&#2375;&#2348;&#2354; &#2321;&#2347; &#2325;&#2306;&#2335;&#2375;&#2306;&#2335;) &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The \"Track Changes\" feature in Microsoft Word allows multiple users to make edits to a document while tracking each change, making it easy to review and accept or reject those changes collaboratively.</p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>Specialised program(s) designed to allow input or output device(s) to communicate with the rest of the computer system is called _____.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2344;&#2346;&#2369;&#2335; &#2351;&#2366; &#2310;&#2313;&#2335;&#2346;&#2369;&#2335; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; (&#2337;&#2367;&#2357;&#2366;&#2311;&#2360;&#2379;&#2306;) &#2325;&#2379; &#2358;&#2375;&#2359; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2306;&#2330;&#2366;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2367;&#2332;&#2364;&#2366;&#2311;&#2344; &#2325;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; (&#2360;&#2381;&#2346;&#2375;&#2358;&#2354;&#2366;&#2311;&#2360;&#2381;&#2337;) &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; (&#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;&#2379;&#2306;) &#2325;&#2379; _____ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Utility Software's</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2335;&#2367;&#2354;&#2367;&#2335;&#2368; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Operating system</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>",
      "<span class=\"eqt\">Device Driver</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;&#2352;</span>",
      "<span class=\"eqt\">Language Translator</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2376;&#2306;&#2327;&#2381;&#2357;&#2375;&#2332; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2354;&#2375;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; A <b>device driver</b> or hardware driver is a group of files that enable one or more hardware devices to communicate with the computer's operating system. </p><p>&#183; Without drivers, the computer would not be able to send and receive data correctly to hardware devices, such as a printer. </p><p>&#183; If problems or conflicts are encountered with a driver, the computer manufacturer or hardware manufacturer releases a driver update to fix the problems.</p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>Which software is used to make a copy of the information stored on a disk? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2337;&#2367;&#2360;&#2381;&#2325; &#2350;&#2375;&#2306; &#2360;&#2381;&#2335;&#2379;&#2352; &#2325;&#2368; &#2327;&#2312; &#2360;&#2370;&#2330;&#2344;&#2366; &#2325;&#2379; &#2325;&#2377;&#2346;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">System software</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Registry manager</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2381;&#2352;&#2368; &#2350;&#2376;&#2344;&#2375;&#2332;&#2352;</span>",
      "<span class=\"eqt\">File Explorer</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2366;&#2311;&#2354; &#2319;&#2325;&#2381;&#2360;&#2346;&#2381;&#2354;&#2379;&#2352;&#2352;</span>",
      "<span class=\"eqt\">Backup utilities</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2325;&#2309;&#2346; &#2351;&#2370;&#2335;&#2367;&#2354;&#2367;&#2335;&#2368;&#2332;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; <b>Backup utility</b>/software is any application that enables the backup of files, folders, documents, software data, most data types and the computer/server as a whole. </p><p>&#183; Backup software enables the creation of an exact duplicate of computer files that can be used for restoring the original files in case of file corruption, accidental/intentional deletion or a disaster.</p><p>&#183; Backup software is primarily used as means to keep a backup of important data residing on computer or server hard drives. </p><p>&#183; It can be used for local/individual computers or for an enterprise's computers, servers and networking devices.</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>Which networking device regenerates the signal over the same network before the signal becomes too weak or corrupted?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325;&#2367;&#2306;&#2327; &#2313;&#2346;&#2325;&#2352;&#2339; &#2360;&#2367;&#2327;&#2381;&#2344;&#2354; &#2325;&#2375; &#2348;&#2361;&#2369;&#2340; &#2357;&#2368;&#2325; &#2351;&#2366; &#2325;&#2352;&#2346;&#2381;&#2335; &#2361;&#2379;&#2344;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2360;&#2350;&#2366;&#2344; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2346;&#2352; &#2360;&#2367;&#2327;&#2381;&#2344;&#2354; &#2325;&#2379; &#2352;&#2367;&#2332;&#2375;&#2344;&#2375;&#2352;&#2375;&#2335; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Switch</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2367;&#2330;</span>",
      "<span class=\"eqt\">Repeater</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2346;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Hub</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2348;</span>",
      "<span class=\"eqt\">Router</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2313;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A repeater operates at the physical layer. It regenerates the signal over the same network before the signal becomes too weak or corrupted to extend the length to which the signal can be transmitted over the same network. When the signal becomes weak, they copy it bit by bit and regenerate it at its star topology connectors connecting following the original strength. It is a 2-port device.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Networking Device</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Function</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Switch</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Performs error checking before forwarding data</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hub</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Connects multiple wires coming from different branches</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Router</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Routes the data packets</td></tr></table>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a correct representation of IPv4 address?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; IPv4 &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2325;&#2379; &#2360;&#2361;&#2368; &#2340;&#2352;&#2368;&#2325;&#2375; &#2360;&#2375; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">189.90.30.11</span><span class=\"hqt\" style=\"display:none\">189.90.30.11</span>",
      "<span class=\"eqt\">ABC:256:90:10</span><span class=\"hqt\" style=\"display:none\">ABC:256:90:10</span>",
      "<span class=\"eqt\">250:80:57:12</span><span class=\"hqt\" style=\"display:none\">250:80:57:12</span>",
      "<span class=\"eqt\">199.33.21.ABC</span><span class=\"hqt\" style=\"display:none\">199.33.21.ABC</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>IPv4 address consists of two things that are the network address and the host address. It stands for Internet Protocol version four. It was introduced in 1981 by DARPA and was the first deployed version in 1982 for production on SATNET and on the ARPANET in January 1983.</p><p>IPv4 addresses are 32-bit integers that must be expressed in Decimal Notation. It is represented by 4 numbers separated by dots in the range of 0-255, which must be converted to 0 and 1, to be understood by Computers. For Example, An IPv4 Address can be written as 189.90.30.11.</p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an example of non-volatile memory?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2344;&#2377;&#2344;-&#2357;&#2379;&#2354;&#2375;&#2335;&#2366;&#2311;&#2354; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2366; &#2319;&#2325; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cache</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2358;</span>",
      "<span class=\"eqt\">RAM</span><span class=\"hqt\" style=\"display:none\">RAM</span>",
      "<span class=\"eqt\">Flip-flops</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2354;&#2367;&#2346;-&#2347;&#2381;&#2354;&#2377;&#2346;</span>",
      "<span class=\"eqt\">EPROM</span><span class=\"hqt\" style=\"display:none\">EPROM</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Non volatile memory - </p><p>&#8226; Non-volatile memory keeps its contents even if the power is lost. </p><p>&#8226; Example: ROM or EPROM is a good example of a non-volatile memory.</p>",

    "question": "<span class=\"eqt\"><p>Which networking protocol is used to remotely manage and monitor network devices, such as routers and switches, and retrieve information about their status and performance?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2352;&#2366;&#2313;&#2335;&#2352; &#2324;&#2352; &#2360;&#2381;&#2357;&#2367;&#2330; &#2332;&#2376;&#2360;&#2375; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2379; &#2342;&#2370;&#2352;&#2360;&#2381;&#2341; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2367;&#2340; &#2324;&#2352; &#2350;&#2377;&#2344;&#2367;&#2335;&#2352; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2313;&#2344;&#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2324;&#2352; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2370;&#2330;&#2344;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">SNMP</span><span class=\"hqt\" style=\"display:none\">SNMP</span>",
      "<span class=\"eqt\">DNS</span><span class=\"hqt\" style=\"display:none\">DNS</span>",
      "<span class=\"eqt\">HTTP</span><span class=\"hqt\" style=\"display:none\">HTTP</span>",
      "<span class=\"eqt\">FTP</span><span class=\"hqt\" style=\"display:none\">FTP</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The networking protocol used to remotely manage and monitor network devices, such as routers and switches, and retrieve information about their status and performance is <b>Simple Network Management Protocol (SNMP).</b> SNMP is a widely used application layer protocol that facilitates the exchange of management information between network devices and a network management system (NMS).</p><p>&#61623; SNMP allows network administrators to monitor the health and performance of devices, collect data, and receive alerts or notifications about issues or changes on the network. It provides a standardized way for gathering various types of information, such as device status, interface statistics, CPU usage, memory utilization, and more.</p>",
    "question_index": 144
  },
  {
    "question": "<span class=\"eqt\"><p>Which type of operating system uses more than one CPU for the execution of resources?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2319;&#2325; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Multi-Programming OS</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2354;&#2381;&#2335;&#2368;-&#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;&#2367;&#2306;&#2327; OS</span>",
      "<span class=\"eqt\">Batch Operating System</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2330; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>",
      "<span class=\"eqt\">Multi-Processing OS</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2354;&#2381;&#2335;&#2368;-&#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2367;&#2306;&#2327; OS</span>",
      "<span class=\"eqt\">Time-Sharing OS</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2366;&#2311;&#2350;-&#2358;&#2375;&#2351;&#2352;&#2367;&#2306;&#2327; OS</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Multi-Processing Operating System uses more than one CPU for the execution of resources. It betters the throughput of the System. Time-sharing systems allow multiple users to share hardware resources such as the CPU, memory, and peripherals, reducing the cost of hardware and increasing efficiency.</p><p>Batch operating system does not interact with the computer directly. There is an operator which takes similar jobs having the same requirement and groups them into batches. It is the responsibility of the operator to sort jobs with similar needs. Multiprogramming Operating Systems can be simply illustrated as more than one program is present in the main memory and any one of them can be kept in execution.</p>",
    "question_index": 145
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1. The control bus carries timing and control signals among system components.</p><p>2. The address bus is bidirectional in most microprocessors.</p><p>3. The accumulator register temporarily holds data for arithmetic and logic operations.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2348;&#2360; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2328;&#2335;&#2325;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2350;&#2351; &#2324;&#2352; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2360;&#2306;&#2325;&#2375;&#2340;&#2379;&#2306; &#2325;&#2379; &#2357;&#2361;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2. &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2348;&#2360; &#2342;&#2381;&#2357;&#2367;&#2342;&#2367;&#2358;&#2366;&#2340;&#2381;&#2350;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3. &#2360;&#2306;&#2330;&#2366;&#2351;&#2325; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352; &#2309;&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2306;&#2325;&#2327;&#2339;&#2367;&#2340; &#2324;&#2352; &#2340;&#2352;&#2381;&#2325; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2375;&#2335;&#2366; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statements 1 and 3 are correct, while statement 2 is incorrect. The control bus manages system operations, and the accumulator is a workspace for the ALU. However, the address bus is unidirectional, not bidirectional. Therefore, the correct option is (b).</p><p>Explanation of Statements:</p><p>Statement 1 is correct. The control bus is a part of the system bus used by the CPU to communicate with other devices within the computer. It carries command and control signals, such as read/write signals, clock signals, and interrupt requests, to manage and coordinate the activities of all system components.</p><p>Statement 2 is incorrect. The address bus is unidirectional. The CPU uses the address bus to specify a physical address in memory or for an I/O port. The information flows in one direction only: from the CPU to the memory or I/O devices. The devices receive an address; they do not send one back to the CPU via the address bus. The data bus, in contrast, is bidirectional, as data can be read from or written to memory.</p><p>Statement 3 is correct. The accumulator is a special-purpose register within the CPU's Arithmetic Logic Unit (ALU). It serves as a temporary storage location for holding an intermediate operand or the result of an arithmetic or logic operation. For example, in an addition operation, one number might be stored in the accumulator, the second number is added to it, and the final sum is then stored back in the accumulator.</p><p>Further insights:</p><p>The three main system buses in a computer architecture have distinct roles and directionalities:</p><p>Address Bus: Unidirectional. Carries memory addresses from the CPU to other components.</p><p>Data Bus: Bidirectional. Carries the actual data between the CPU and other components.</p><p>Control Bus: A collection of various signals that control the system's operation. Some signals are output from the CPU (e.g., memory read/write), while others are input to the CPU (e.g., interrupt request).</p><p></p>",
    "question_index": 146
  },

    "question": "<span class=\"eqt\"><p>While using Microsoft PowerPoint, pressing the shortcut keys Ctrl + D will:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2360;&#2377;&#2347;&#2381;&#2335; &#2346;&#2366;&#2357;&#2352;&#2346;&#2377;&#2311;&#2306;&#2335; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2375; &#2360;&#2350;&#2351;, &#2358;&#2377;&#2352;&#2381;&#2335;&#2325;&#2335; &#2325;&#2368; (key) Ctrl + D &#2342;&#2348;&#2366;&#2344;&#2375; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Download the slide</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2354;&#2366;&#2311;&#2337; &#2337;&#2366;&#2313;&#2344;&#2354;&#2379;&#2337; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",

      "<span class=\"eqt\">Insert a duplicate chosen slide</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2369;&#2344;&#2368; &#2327;&#2312; &#2337;&#2369;&#2346;&#2381;&#2354;&#2367;&#2325;&#2375;&#2335; &#2360;&#2381;&#2354;&#2366;&#2311;&#2337; &#2311;&#2344;&#2381;&#2360;&#2352;&#2381;&#2335; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Activate dictation</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2325;&#2381;&#2335;&#2375;&#2358;&#2344; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351;/&#2319;&#2325;&#2381;&#2335;&#2367;&#2357;&#2375;&#2335; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The shortcut Ctrl + D has different functions depending upon the program being used.</p><p>&#8226; Internet browsers: Used to add the current site to a bookmark or favorite. </p><p>&#8226; <b>Microsoft PowerPoint: Inserts a duplicate of the chosen slide</b>.</p><p>&#8226; MS Excel: To duplicate the data from the cell selected above.</p>",
    "question_index": 147

    "question": "<span class=\"eqt\"><p>Which of the following is not true about a Touch screen device?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2335;&#2330; &#2360;&#2381;&#2325;&#2381;&#2352;&#2368;&#2344; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It is an input device.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2319;&#2325; &#2311;&#2344;&#2346;&#2369;&#2335; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is an output device.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2319;&#2325; &#2310;&#2313;&#2335;&#2346;&#2369;&#2335; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">When a touch screen is touched it registers the event and sends it to controller for processing.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2348; &#2335;&#2330; &#2360;&#2381;&#2325;&#2381;&#2352;&#2368;&#2344; &#2325;&#2379; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2351;&#2361; &#2328;&#2335;&#2344;&#2366; &#2325;&#2379; &#2346;&#2306;&#2332;&#2368;&#2325;&#2371;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2375; &#2346;&#2381;&#2352;&#2360;&#2306;&#2360;&#2381;&#2325;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2325; &#2325;&#2379; &#2349;&#2375;&#2332;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It can be touched only by a finger.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2375; &#2325;&#2375;&#2357;&#2354; &#2313;&#2306;&#2327;&#2354;&#2368; &#2360;&#2375; &#2361;&#2368; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Touch Screen is both an input and output device. When a touch screen is touched it registers the event and sends it to controller for processing. <b>It can be touched by a finger or a stylus.</b> It does not require an intermediate device like a mouse to connect to a touch screen.</p>",
    "question_index": 148
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>I. SATA and NVMe are interface standards used for connecting storage devices.</p><p>II. USB 3.2 Gen 22 can theoretically achieve up to 20 Gbps transfer speed.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. SATA &#2324;&#2352; NVMe &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2311;&#2306;&#2335;&#2352;&#2347;&#2364;&#2375;&#2360; &#2350;&#2366;&#2344;&#2325; &#2361;&#2376;&#2306;&#2404;</p><p>II. USB 3.2 Gen 22 &#2360;&#2376;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; 20 Gbps &#2340;&#2325; &#2325;&#2368; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2347;&#2352; &#2327;&#2340;&#2367; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are correct. Statement I accurately identifies SATA and NVMe as storage interface standards, and Statement II correctly states the theoretical maximum speed of the USB 3.2 Gen 2x2 specification.</p><p>Explanation of Statements:</p><p>Statement I is correct.</p><p>SATA (Serial ATA) is an interface standard primarily used to connect traditional Hard Disk Drives (HDDs) and 2.5-inch Solid-State Drives (SSDs) to the motherboard. It has been the standard for consumer drives for many years.</p><p>NVMe (Non-Volatile Memory Express) is a newer, more advanced interface protocol designed specifically for high-speed flash-based storage like M.2 SSDs. It connects directly to the PCIe (Peripheral Component Interconnect Express) bus, allowing for much higher speeds and lower latency compared to SATA.</p><p>Statement II is correct. The USB (Universal Serial Bus) standard has evolved through several versions. USB 3.2 Gen 2x2 is a specific standard that uses two lanes of 10 Gbps simultaneously to achieve a theoretical maximum transfer speed of 20 Gbps (Gigabits per second). It is a significant improvement over previous generations like USB 3.2 Gen 2 (10 Gbps) and USB 3.2 Gen 1 (5 Gbps).</p><p>Further insights:</p><p>SATA vs. NVMe: The key difference is performance. SATA III, the latest version, has a maximum theoretical bandwidth of 6 Gbps. Modern NVMe PCIe 4.0 SSDs can achieve speeds of over 50 Gbps (7,000+ MB/s), making them over ten times faster for sequential read/write operations.</p><p>USB Naming: The naming convention for USB standards has become complex. USB 3.2 Gen 1 was formerly known as USB 3.0, and USB 3.2 Gen 2 was formerly USB 3.1. The \"x2\" in Gen 2x2 signifies the use of two data lanes. The latest standard, USB4, can achieve speeds of up to 40 Gbps.</p><p></p>",
    "question_index": 149
  }
