    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>I. A URL (Uniform Resource Locator) specifies the address of a web resource.</p><p>II. HTTP and HTTPS are protocols used for transferring web data.</p><p>III. IP address uniquely identifies a device connected to a network.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2319;&#2325; URL (&#2351;&#2370;&#2344;&#2367;&#2347;&#2364;&#2377;&#2352;&#2381;&#2350; &#2352;&#2367;&#2360;&#2379;&#2352;&#2381;&#2360; &#2354;&#2379;&#2325;&#2375;&#2335;&#2352;) &#2319;&#2325; &#2357;&#2375;&#2348; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344; &#2325;&#2366; &#2346;&#2340;&#2366; &#2344;&#2367;&#2352;&#2381;&#2342;&#2367;&#2359;&#2381;&#2335; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. HTTP &#2324;&#2352; HTTPS &#2357;&#2375;&#2348; &#2337;&#2375;&#2335;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2361;&#2376;&#2306;&#2404;</p><p>III. IP &#2346;&#2340;&#2366; &#2325;&#2367;&#2360;&#2368; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2325;&#2368; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All three statements are correct. They accurately describe three fundamental and interconnected concepts of how the internet and the World Wide Web function: URLs for addressing resources, IP addresses for identifying devices, and HTTP/HTTPS as the protocols for communication.</p><p>Explanation of Statements:</p><p>Statement I is correct. A URL (Uniform Resource Locator) is the human-readable address of a resource on the internet. It provides a way to locate a resource, such as a webpage, image, or file, and specifies the protocol to use to access it. For example, in the URL https://www.example.com/page, https is the protocol and www.example.com/page is the location.</p><p>Statement II is correct. HTTP (Hypertext Transfer Protocol) is the foundational protocol used for data communication on the World Wide Web. It defines the rules for how web browsers and web servers request and transmit information. HTTPS (HTTP Secure) is an extension of HTTP that uses encryption (SSL/TLS) to secure the communication, protecting the privacy and integrity of the exchanged data.</p><p>Statement III is correct. An IP (Internet Protocol) address is a unique numerical label assigned to every device (like a computer, smartphone, or server) connected to a computer network that uses the Internet Protocol for communication. This address serves two main functions: identifying the device and providing its location on the network, which is essential for routing data packets to the correct destination.</p><p>Further insights:</p><p>These three concepts work together seamlessly. When you type a URL into your web browser:</p><p>Your computer uses the Domain Name System (DNS) to translate the human-readable domain name (e.g., www.example.com) into the machine-readable IP address of the web server.</p><p>Your browser then uses the HTTP or HTTPS protocol to send a request to that specific IP address, asking the server to send back the web page or resource you requested.</p><p></p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>What does the \"COUNTIF\" function in Excel do? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2350;&#2375;&#2306; \"COUNTIF\" &#2347;&#2364;&#2306;&#2325;&#2381;&#2358;&#2344; &#2325;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Calculates the average of a range of numbers</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2319;&#2325; &#2352;&#2375;&#2306;&#2332; &#2325;&#2375; &#2324;&#2360;&#2340; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Counts the number of cells in a range that meet a specific condition</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2352;&#2375;&#2306;&#2332; &#2350;&#2375;&#2306; &#2313;&#2344; &#2360;&#2375;&#2354; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2358;&#2352;&#2381;&#2340;/&#2325;&#2306;&#2337;&#2368;&#2358;&#2344; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Multiplies values in a range</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2352;&#2375;&#2306;&#2332; &#2350;&#2375;&#2306; &#2350;&#2366;&#2344;&#2379;&#2306;/&#2357;&#2376;&#2354;&#2381;&#2351;&#2370; &#2325;&#2379; &#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Finds the maximum value in a range</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2352;&#2375;&#2306;&#2332; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2350;&#2366;&#2344;/&#2357;&#2376;&#2354;&#2381;&#2351;&#2370; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The \"COUNTIF\" function in Excel is used to count the number of cells within a range that meet a specific condition or criteria. You specify the range of cells to be evaluated and the condition to be met, and the function returns the count of cells that satisfy that condition. </p><p>&#183; This function is handy for various data analysis tasks, such as counting the number of sales above a certain threshold or the number of students with scores greater than a particular value.</p>",
    "question_index": 138
  },

    "question": "<span class=\"eqt\"><p>Regarding operating systems and software, consider the following:</p><p>I. An Operating System (OS) acts as an interface between user and hardware.</p><p>II. System software includes compilers, assemblers, and operating systems.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2324;&#2352; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2319;&#2325; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; (OS) &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2324;&#2352; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2311;&#2306;&#2335;&#2352;&#2347;&#2375;&#2360; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2350;&#2375;&#2306; &#2325;&#2306;&#2346;&#2366;&#2311;&#2354;&#2352;, &#2309;&#2360;&#2375;&#2306;&#2348;&#2354;&#2352; &#2324;&#2352; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements I and II are correct. Statement I defines the fundamental role of an OS, and Statement II correctly places the OS and other essential tools within the broader category of system software.</p><p>Explanation of Statements:</p><p>Statement I is correct. The Operating System (OS) is the most critical piece of software on a computer. It manages all the hardware resources (like the CPU, memory, and disk drives) and provides a platform on which application programs can run. It serves as the essential intermediary or interface that allows the user and their applications to interact with the physical hardware of the computer without needing to know the low-level details of how the hardware works.</p><p>Statement II is correct. System software is a category of software designed to operate and control the computer hardware and to provide a platform for running application software. This category includes:</p><p>The Operating System itself (e.g., Windows, macOS, Linux).</p><p>Device Drivers, which control specific hardware devices.</p><p>Utility Software, which helps maintain the computer (e.g., antivirus programs, disk formatters).</p><p>Programming Tools like compilers and assemblers, which are used to translate human-readable source code into machine-executable code.</p><p>Further insights:</p><p>The other major category of software is Application Software. This is the software that users interact with directly to perform specific tasks, such as word processors (MS Word), web browsers (Chrome), or games. Application software runs on top of the system software.</p><p></p>",
    "question_index": 141
  },

    "options": [

    "question": "<span class=\"eqt\"><p>Which storage device is most suitable for frequent data backups?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2366;&#2352;-&#2348;&#2366;&#2352; &#2337;&#2375;&#2335;&#2366; &#2348;&#2376;&#2325;&#2309;&#2346; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2360;&#2348;&#2360;&#2375; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">DVD-RM</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2368;&#2357;&#2368;&#2337;&#2368;-&#2310;&#2352;&#2319;&#2350;</span>",
      "<span class=\"eqt\">USB Flash Drive</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2319;&#2360;&#2348;&#2368; &#2347;&#2381;&#2354;&#2376;&#2358; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;</span>",
      "<span class=\"eqt\">External Hard Disk Drive (HDD)</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2381;&#2335;&#2352;&#2344;&#2354; &#2361;&#2366;&#2352;&#2381;&#2337; &#2337;&#2367;&#2360;&#2381;&#2325; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357; (HDD)</span>",
      "<span class=\"eqt\">Floppy Disk</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2354;&#2377;&#2346;&#2368; &#2337;&#2367;&#2360;&#2381;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>An external hard drive is a piece of equipment that can be connected to the computer to increase the storage space. External Hard drives are easy to use, convenient, and a incredibly safe way to backup your most important files. External hard drives can be used as supplemental storage. External hard drives are also great for moving files between computers, regardless of their operating system. Most external hard drives can hold at least one terabyte of data. </p>",
    "question_index": 143

    "question": "<span class=\"eqt\"><p>Which of the following is a topological network design? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2367;&#2325;&#2354; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2337;&#2367;&#2332;&#2364;&#2366;&#2311;&#2344; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Star</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Linear</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2368;&#2344;&#2367;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Circular</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2325;&#2369;&#2354;&#2352;</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Topological network design refers to the physical or logical layout of a network. Each option listed (Star, Linear, Circular, and Mesh) represents a different type of network topology:</p><p>&#183; Star: In a star topology, all devices are connected to a central hub or switch. Communication between devices typically occurs through this central point.</p><p>&#183; Linear: A linear topology, also known as a bus topology, consists of devices connected along a single communication line. Data travels in both directions along the line.</p><p>&#183; Circular: A circular topology is similar to a ring topology, where each device is connected to exactly two other devices, forming a closed loop.</p><p>&#183; Mesh: In a mesh topology, every device is connected to every other device in the network, creating multiple paths for data to travel.</p>",
    "question_index": 144
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>I. Secondary storage is non-volatile, meaning data is retained even when power is off.</p><p>II. Secondary storage is typically slower but has a higher capacity than primary memory.</p><p>III. Cache memory is a type of secondary storage.</p><p>Which of the above statement is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2360;&#2375;&#2325;&#2375;&#2306;&#2337;&#2352;&#2368; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2327;&#2376;&#2352;-&#2357;&#2366;&#2359;&#2381;&#2346;&#2358;&#2368;&#2354; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; &#2348;&#2367;&#2332;&#2354;&#2368; &#2348;&#2306;&#2342; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2349;&#2368; &#2337;&#2375;&#2335;&#2366; &#2348;&#2352;&#2325;&#2352;&#2366;&#2352; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2360;&#2375;&#2325;&#2375;&#2306;&#2337;&#2352;&#2368; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2343;&#2368;&#2350;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2311;&#2360;&#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>III. &#2325;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2360;&#2375;&#2325;&#2375;&#2306;&#2337;&#2352;&#2368; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements I and II are correct, while statement III is incorrect.</p><p>Secondary storage is indeed permanent and characterized by its large capacity and slower speed compared to primary memory.</p><p>Cache memory, however, is a form of very fast primary memory, not secondary storage.</p><p>Explanation of Statements:</p><p>Statement I is correct. The defining characteristic of secondary storage (like Hard Disk Drives, Solid-State Drives, and USB drives) is that it is non-volatile. This means it does not require power to maintain the stored information. Your files and operating system remain on the drive even after you shut down your computer.</p><p>Statement II is correct. There is a trade-off between speed, capacity, and cost in computer memory systems. Secondary storage devices are designed for large-capacity, long-term storage and are much cheaper per gigabyte. However, they are significantly slower to access than primary memory (RAM), which is designed for fast, temporary storage of data that the CPU is actively using.</p><p>Statement III is incorrect. Cache memory is a small, extremely fast, volatile memory that is located on or very close to the CPU. It is a type of primary memory, sitting at the top of the memory hierarchy. Its purpose is to store frequently accessed data and instructions from the main RAM to reduce the time the CPU has to wait for data, thereby speeding up overall system performance. It is the opposite of secondary storage in terms of speed, capacity, and volatility.</p><p>Further insights:</p><p>The computer's memory is organized in a hierarchy based on speed and cost:</p><p>CPU Registers: Fastest, smallest, most expensive. Located inside the CPU.</p><p>Cache Memory: Very fast, small, expensive. Located on or next to the CPU.</p><p>Primary Memory (RAM): Fast, medium capacity, less expensive than cache.</p><p>Secondary Storage (SSD/HDD): Slowest, largest capacity, cheapest.</p><p>Data is moved up this hierarchy as it is needed by the CPU for processing.</p><p></p>",
    "question_index": 145
  },
  {
    "question": "<span class=\"eqt\"><p>What is the use of drop cap in MS Word? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2357;&#2352;&#2381;&#2337; &#2350;&#2375;&#2306; &#2337;&#2381;&#2352;&#2377;&#2346; &#2325;&#2376;&#2346; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It is used to select an alignment.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2319;&#2325; &#2309;&#2354;&#2366;&#2311;&#2344;&#2350;&#2375;&#2344;&#2381;&#2335; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is a feature that replaces the traditional file menu.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2319;&#2325; &#2320;&#2360;&#2368; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2361;&#2376; &#2332;&#2379; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2347;&#2364;&#2366;&#2311;&#2354; &#2350;&#2375;&#2344;&#2370; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2354;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is used to move the cursor to the next line in a paragraph.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2346;&#2376;&#2352;&#2366;&#2327;&#2381;&#2352;&#2366;&#2347; &#2350;&#2375;&#2306; &#2325;&#2352;&#2381;&#2360;&#2352; &#2325;&#2379; &#2309;&#2327;&#2354;&#2368; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2346;&#2352; &#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is used to make the first character of the first paragraph larger.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2346;&#2361;&#2354;&#2375; &#2346;&#2376;&#2352;&#2366;&#2327;&#2381;&#2352;&#2366;&#2347; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2379; &#2348;&#2337;&#2364;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A <b>drop cap</b> is where the first character of the first paragraph is made larger, taking up several lines of text or the first few sentences. Drop caps are used in various media, including books, newspaper articles, documents, and webpages. Drop caps add style or grab a reader's attention. </p>",
    "question_index": 146
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>I. Email attachments can contain viruses or malicious software.</p><p>II. It is safe to open attachments from unknown senders if the file format looks familiar.</p><p>III. Cloud-based email services like Gmail often scan attachments for malware.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2312;&#2350;&#2375;&#2354; &#2309;&#2335;&#2376;&#2330;&#2350;&#2375;&#2306;&#2335; &#2350;&#2375;&#2306; &#2357;&#2366;&#2351;&#2352;&#2360; &#2351;&#2366; &#2342;&#2369;&#2352;&#2381;&#2349;&#2366;&#2357;&#2344;&#2366;&#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2377;&#2347;&#2364;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2361;&#2379; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2351;&#2342;&#2367; &#2347;&#2364;&#2366;&#2311;&#2354; &#2346;&#2381;&#2352;&#2366;&#2352;&#2370;&#2346; &#2346;&#2352;&#2367;&#2330;&#2367;&#2340; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2309;&#2332;&#2381;&#2334;&#2366;&#2340; &#2346;&#2381;&#2352;&#2375;&#2359;&#2325;&#2379;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2309;&#2335;&#2376;&#2330;&#2350;&#2375;&#2306;&#2335; &#2325;&#2379; &#2326;&#2379;&#2354;&#2344;&#2366; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>III. &#2332;&#2368;&#2350;&#2375;&#2354; &#2332;&#2376;&#2360;&#2368; &#2325;&#2381;&#2354;&#2366;&#2313;&#2337;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2312;&#2350;&#2375;&#2354; &#2360;&#2375;&#2357;&#2366;&#2319;&#2305; &#2309;&#2325;&#2381;&#2360;&#2352; &#2350;&#2376;&#2354;&#2357;&#2375;&#2351;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2335;&#2376;&#2330;&#2350;&#2375;&#2306;&#2335; &#2325;&#2379; &#2360;&#2381;&#2325;&#2376;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I, II, and III</span><span class=\"hqt\" style=\"display:none\">I, II, &#2324;&#2352; III</span>"

    "solution": "<p>Statements I and III are correct, while statement II is incorrect.</p><p>Email attachments are a primary vector for malware distribution, and major email providers do scan for them.</p><p>However, it is never safe to open attachments from unknown senders, regardless of the file type, as this is a common tactic used by attackers.</p><p>Therefore, the correct option is a.</p><p>Explanation of Statements:</p><p>Statement I is correct. Email attachments are one of the most common methods for spreading malware, including viruses, worms, Trojans, and ransomware. Malicious code can be hidden in various file types, including executable files (.exe), compressed archives (.zip), and even seemingly harmless documents like Word files or PDFs that exploit vulnerabilities or use malicious macros.</p><p>Statement II is incorrect. This is dangerous advice and a common mistake that leads to security breaches. Attackers frequently disguise malicious files to look like familiar and safe file types (e.g., 'invoice.pdf' or 'photo.jpg'). The sender's identity is a much more critical factor than the file's apparent format. Opening attachments from unknown or unsolicited emails is a major security risk.</p><p>Statement III is correct. Major cloud-based email providers like Gmail, Outlook.com, and Yahoo Mail have robust, built-in security features that automatically scan all incoming (and often outgoing) email attachments for known viruses and malware. If a malicious attachment is detected, the service will typically block it and warn the user, preventing it from ever reaching their inbox.</p><p>Further insights:</p><p>Phishing: Be wary of phishing emails, which are designed to trick you into opening attachments or clicking malicious links, often by impersonating a trusted person or organization.</p><p>Known Senders: Exercise caution even with attachments from known senders. Their email account could have been compromised and used to send malware to their contacts.</p><p>Red Flags: Look for other red flags in suspicious emails, such as poor grammar, a sense of urgency, unexpected requests for information, or mismatched sender names and email addresses.</p><p>Security Best Practice: The best practice is to never open an attachment you were not expecting, regardless of who sent it. If in doubt, contact the sender through a separate, verified communication channel (like a phone call) to confirm they sent the attachment and it is legitimate.</p><p></p>",
