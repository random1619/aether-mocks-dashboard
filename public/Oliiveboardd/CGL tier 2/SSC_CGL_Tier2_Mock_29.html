    ],
    "correct_option_id": 0,
    "solution": "<p>Statement A is correct, but statement B is incorrect. Sangam literature vividly describes flourishing urban centers. However, the Velir were minor chieftains, not poets. The poets were known as Pulavars.</p><p>Explanation of Statements:</p><p>A is Correct. Sangam literature, particularly works like the Maduraikkanchi and Pattinappalai, provides rich descriptions of the bustling life in major urban centers. Madurai, the capital of the Pandyas, and Kaveripattinam (also known as Puhar), the port capital of the Cholas, are celebrated for their vibrant markets, grand buildings, and extensive maritime trade. These poems are invaluable sources for understanding the urban economy and society of the Sangam period.</p><p>B is Incorrect. This statement confuses the roles of patrons and poets. The Velir were influential minor chieftains who ruled over smaller territories, often as feudatories to the three great crowned kings (the Cholas, Cheras, and Pandyas). They were renowned for their generosity and were important patrons of the Sangam poets. The poets themselves were known as Pulavars. They were the bards and scholars who composed the Sangam poems and performed them in the courts of kings and chieftains.</p><p>Further insights:</p><p>The Sangam Age refers to the period of ancient Tamil history, roughly from c. 300 BCE to 300 CE, named after the legendary Sangams (academies of Tamil poets) said to have been held in Madurai.</p><p>The literature is broadly divided into two main categories: Akam (dealing with the inner world of love and relationships) and Puram (dealing with the outer world of war, heroism, and governance).</p><p></p>",
    "question_index": 114
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following elements has the smallest atomic radius?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2340;&#2340;&#2381;&#2357; &#2325;&#2368; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sodium (Na)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; (Na)</span>",
      "<span class=\"eqt\">Magnesium (Mg)</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2327;&#2381;&#2344;&#2368;&#2358;&#2367;&#2351;&#2350; (Mg)</span>",
      "<span class=\"eqt\">Aluminum (Al)</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2354;&#2381;&#2351;&#2369;&#2350;&#2367;&#2344;&#2367;&#2351;&#2350; (Al)</span>",
      "<span class=\"eqt\">Silicon (Si)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2354;&#2367;&#2325;&#2377;&#2344; (Si)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Silicon (Si) has the smallest atomic radius among the given options.</p><p>Explanation:</p><p>All four elements-Sodium (Na), Magnesium (Mg), Aluminum (Al), and Silicon (Si)-belong to the same period (Period 3) of the periodic table.</p><p>The general trend for atomic radius across a period is that it decreases from left to right.</p><p>This happens because as we move from left to right across a period:</p><p>1. The number of protons in the nucleus increases (Na=11, Mg=12, Al=13, Si=14).</p><p>2. This increase in protons leads to a stronger positive charge in the nucleus.</p><p>3. The electrons are being added to the same outermost energy shell (the third shell in this case).</p><p>4. The stronger nuclear charge pulls the electrons in this outermost shell closer to the nucleus, causing the overall size of the atom (atomic radius) to shrink.</p><p>Therefore, the order of decreasing atomic radius is:</p><p>Na > Mg > Al > Si</p><p>Silicon (Si), being the rightmost element among the choices in Period 3, will have the smallest atomic radius.</p>",
    "question_index": 115
  },
  {
    "question": "<span class=\"eqt\"><p>According to Census of India 2011, in rural India, which state has the maximum female workforce participation rate?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; 2011 &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306;, &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2350;&#2361;&#2367;&#2354;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2348;&#2354; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2368; &#2342;&#2352; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Arunachal Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Uttar Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2366;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;&#2404;</span>",
      "<span class=\"eqt\">Himachal Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2350;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Andhra Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Based on the data from the Census of India 2011, Himachal Pradesh had the highest female work participation rate in rural areas among the given options, and one of the highest in the country.</p><p>Explanation of Data from Census 2011:</p><p>The female work participation rate in rural areas of Himachal Pradesh was exceptionally high, often cited as being close to or above 50%, reflecting the significant role of women in the state's agrarian and horticultural economy.</p><p>Himachal Pradesh (HP) and other hilly states like Nagaland and Sikkim consistently show high rates of female labor force participation.</p><p>In contrast, states in the Indo-Gangetic plains, such as Uttar Pradesh, historically have some of the lowest female work participation rates in the country.</p><p>While Andhra Pradesh and Arunachal Pradesh have moderate to high rates, the figures for Himachal Pradesh were notably the highest among these choices for the rural sector in the 2011 census.</p><p>Further insights:</p><p>Work Participation Rate (WPR): This is defined as the percentage of total workers (main and marginal) to the total population.</p><p>Reasons for High WPR in Hilly Regions: The high participation rate of women in the workforce in hilly states is often attributed to the nature of the local economy (agriculture, horticulture, animal husbandry), where women play a central and active role. Socio-cultural factors also contribute to this trend.</p><p>Overall Trend: The overall female work participation rate in India is a subject of concern, as it is low and has been declining according to some surveys, although the methodology and definitions can affect the numbers.</p><p></p>",
    "question_index": 116
  },
  {
    "question": "<span class=\"eqt\"><p>On demand and supply concepts, consider the following:</p><p>1. For a straight-line demand curve, elasticity equals 1 at the midpoint and varies along the curve.</p><p>2. Cross elasticity of demand for complements is positive.</p><p>3. With inelastic demand relative to supply, buyers bear a larger share of an indirect tax.</p><p>4. For a Giffen good, substitution and income effects both act to raise quantity demanded when price rises.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2306;&#2327; &#2324;&#2352; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366;&#2323;&#2306; &#2346;&#2352;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2319;&#2325; &#2360;&#2368;&#2343;&#2368; &#2352;&#2375;&#2326;&#2366; &#2350;&#2366;&#2306;&#2327; &#2357;&#2325;&#2381;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319;, &#2354;&#2379;&#2330; &#2350;&#2343;&#2381;&#2351; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; 1 &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2357;&#2325;&#2381;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; &#2348;&#2342;&#2354;&#2340;&#2368; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2. &#2346;&#2370;&#2352;&#2325; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2366;&#2306;&#2327; &#2325;&#2368; &#2325;&#2381;&#2352;&#2377;&#2360; &#2354;&#2379;&#2330; &#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2361;&#2376;&#2404;</p><p>3. &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2375; &#2360;&#2366;&#2346;&#2375;&#2325;&#2381;&#2359; &#2309;&#2354;&#2379;&#2330;&#2342;&#2366;&#2352; &#2350;&#2366;&#2306;&#2327; &#2325;&#2375; &#2360;&#2366;&#2341;, &#2326;&#2352;&#2368;&#2342;&#2366;&#2352; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2325;&#2366; &#2319;&#2325; &#2348;&#2337;&#2364;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2357;&#2361;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>4. &#2319;&#2325; &#2327;&#2367;&#2347;&#2375;&#2344; &#2309;&#2330;&#2381;&#2331;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;, &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344; &#2324;&#2352; &#2310;&#2351; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2368;&#2350;&#2340; &#2348;&#2338;&#2364;&#2344;&#2375; &#2346;&#2352; &#2350;&#2366;&#2306;&#2327; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statements 1 and 3 are correct.</p><p>Statement 2 is incorrect because the cross elasticity for complements is negative.</p><p>Statement 4 is incorrect because for a Giffen good, the substitution effect works in the opposite direction to the income effect. Therefore, the correct option is b.</p><p>Explanation of Statements:</p><p>1 is Correct. This statement accurately describes the price elasticity of demand along a linear (straight-line) demand curve.</p><p>The elasticity is not constant. It is elastic (greater than 1) in the upper half of the curve, unitary elastic (equal to 1) exactly at the midpoint, and inelastic (less than 1) in the lower half of the curve.</p><p>2 is Incorrect. Cross price elasticity of demand measures how the quantity demanded of one good responds to a change in the price of another good.</p><p>For substitutes (e.g., tea and coffee), the cross elasticity is positive (if the price of coffee rises, the demand for tea increases).</p><p>For complements (e.g., cars and gasoline), the cross elasticity is negative (if the price of gasoline rises, the demand for cars decreases). The statement incorrectly says it is positive.</p><p>3 is Correct. This statement correctly describes the incidence of an indirect tax (like GST or excise duty). The burden of the tax is shared between buyers and sellers, and the share depends on the relative elasticities of demand and supply.</p><p>If demand is more inelastic than supply, consumers are less responsive to price changes. They will continue to buy the product even at a higher price, so they will bear a larger share of the tax burden.</p><p>Conversely, if supply is more inelastic than demand, producers will bear the larger share.</p><p>4 is Incorrect. A Giffen good is a rare type of inferior good for which the quantity demanded increases as the price rises, violating the law of demand. This happens because of the interplay between the substitution and income effects.</p><p>Substitution Effect: When the price of a good rises, the substitution effect always acts to decrease the quantity demanded (consumers switch to cheaper alternatives).</p><p>Income Effect: For an inferior good, a price rise reduces real income, which increases the quantity demanded.</p><p>For a G-good, the income effect is so strong that it outweighs the substitution effect. The two effects act in opposite directions, not the same direction as the statement claims.</p><p>Further insights:</p><p>The concept of tax incidence is crucial for understanding who really pays a tax. For essential goods with inelastic demand (like medicine or salt), consumers end up bearing almost the entire tax burden. For luxury goods with elastic demand, producers may have to absorb more of the tax to avoid losing customers.</p><p>Giffen goods are largely a theoretical curiosity in economics, with very few real-world examples that are not subject to debate. The classic (though disputed) example is the Irish potato famine, where a rise in the price of potatoes (the main staple) left poor families with so little money that they had to give up more expensive foods (like meat) and buy even more potatoes to survive.</p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>Regarding the Union Public Service Commission (UPSC), consider the following statements:</p><p>1. States must consult UPSC on all State civil services recruitment matters.</p><p>2. A UPSC member holds office for six years or until the age of 65 years, whichever is earlier.</p><p>3. The UPSC submits an annual report to the President, who lays it before Parliament with a memorandum explaining cases of non-acceptance of advice.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2328; &#2354;&#2379;&#2325; &#2360;&#2375;&#2357;&#2366; &#2310;&#2351;&#2379;&#2327; (&#2351;&#2370;&#2346;&#2368;&#2319;&#2360;&#2360;&#2368;) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2360;&#2349;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2367;&#2357;&#2367;&#2354; &#2360;&#2375;&#2357;&#2366; &#2349;&#2352;&#2381;&#2340;&#2368; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2346;&#2352; &#2351;&#2370;&#2346;&#2368;&#2319;&#2360;&#2360;&#2368; &#2360;&#2375; &#2346;&#2352;&#2366;&#2350;&#2352;&#2381;&#2358; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p>2. &#2351;&#2370;&#2346;&#2368;&#2319;&#2360;&#2360;&#2368; &#2360;&#2342;&#2360;&#2381;&#2351; &#2331;&#2361; &#2360;&#2366;&#2354; &#2351;&#2366; 65 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2340;&#2325;, &#2332;&#2379; &#2349;&#2368; &#2346;&#2361;&#2354;&#2375; &#2361;&#2379;, &#2340;&#2325; &#2346;&#2342; &#2343;&#2366;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3. &#2351;&#2370;&#2346;&#2368;&#2319;&#2360;&#2360;&#2368; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2319;&#2325; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2311;&#2360;&#2375; &#2360;&#2354;&#2366;&#2361; &#2325;&#2368; &#2309;&#2360;&#2381;&#2357;&#2368;&#2325;&#2371;&#2340;&#2367; &#2325;&#2375; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2325;&#2379; &#2360;&#2350;&#2333;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2332;&#2381;&#2334;&#2366;&#2346;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2360;&#2350;&#2325;&#2381;&#2359; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statements 2 and 3 are correct. Statement 1 is incorrect because states have their own Public Service Commissions (SPSCs) for state services; they do not consult the UPSC for this purpose.</p><p>Explanation of Statements:</p><p>1 is Incorrect. The UPSC is the central recruiting agency responsible for appointments to the All-India services and central civil services. Each state has its own State Public Service Commission (SPSC), such as the UPPSC or MPSC, which is responsible for recruitment to the state's civil services. States consult their respective SPSCs, not the UPSC, for these matters. The UPSC's role is limited to Union services, though it can assist a state if the Governor of that state requests it and the President of India approves.</p><p>2 is Correct. Article 316(2) of the Constitution specifies the term of office for the Chairman and other members of the UPSC. They hold office for a term of six years from the date on which they enter upon their office or until they attain the age of 65 years, whichever is earlier.</p><p>3 is Correct. Article 323 of the Constitution mandates that the UPSC shall present an annual report on its performance to the President. The President then causes this report to be laid before both Houses of Parliament. The report is accompanied by a memorandum from the government explaining the cases, if any, where the advice of the Commission was not accepted and the reasons for such non-acceptance. This ensures accountability.</p>",
    "question_index": 118
  },
  {
    "question": "<span class=\"eqt\"><p>For a region to qualify as a biodiversity hotspot, it must contain at least how many endemic vascular plant species?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; &#2332;&#2376;&#2357; &#2357;&#2367;&#2357;&#2367;&#2343;&#2340;&#2366; &#2361;&#2377;&#2335;&#2360;&#2381;&#2346;&#2377;&#2335; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2309;&#2352;&#2381;&#2361;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;, &#2313;&#2360;&#2350;&#2375;&#2306; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2325;&#2367;&#2340;&#2344;&#2368; &#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325; &#2360;&#2306;&#2357;&#2361;&#2344;&#2368; &#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2368; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2366;&#2306; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">500</span><span class=\"hqt\" style=\"display:none\">500</span>",
      "<span class=\"eqt\">1,000</span><span class=\"hqt\" style=\"display:none\">1,000</span>",
      "<span class=\"eqt\">1,500</span><span class=\"hqt\" style=\"display:none\">1,500</span>",
      "<span class=\"eqt\">2,000</span><span class=\"hqt\" style=\"display:none\">2,000</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>To qualify as a global biodiversity hotspot, a region must meet two strict criteria. One of these criteria is that it must contain at least 1,500 species of vascular plants as endemics.</p><p>Explanation:</p><p>The concept of biodiversity hotspots was developed by scientist Norman Myers and later refined by Conservation International. The two defining criteria are:</p><p>High Endemism: The region must have a high percentage of plant life found nowhere else on the planet. The specific threshold is that it must contain at least 1,500 endemic species of vascular plants, which is equivalent to > 0.5% of the world's total.</p><p>High Threat Level: The region must have lost at least 70% of its original natural vegetation, indicating it is under severe threat.</p><p>These two criteria ensure that conservation efforts are focused on regions that are both biologically irreplaceable and in immediate danger of being lost.</p><p>Further insights:</p><p>There are currently 36 recognized biodiversity hotspots around the world.</p><p>These hotspots represent just 2.4% of Earth's land surface, but they support more than half of the world's plant species as endemics and nearly 43% of bird, mammal, reptile, and amphibian species as endemics.</p><p>India is home to four of these hotspots: The Himalayas, the Western Ghats, the Indo-Burma region, and Sundaland.</p><p></p>",
    "question_index": 119
  },

    "question": "<span class=\"eqt\"><p>With reference to Vedic culture, which of the following statements is/are true?</p><p>1) In the early Vedic period, cattle were a measure of wealth; nishka functioned as a metallic ornament-cum-medium of exchange.</p><p>2) The later Vedic period saw the spread into the middle Gangetic plains with the use of iron (krishna ayas).</p><p>3) The Sabha and Samiti vanish entirely in later Vedic literature, giving way to a fully centralized monarchy devoid of any assemblies.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2376;&#2342;&#2367;&#2325; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>1) &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2357;&#2376;&#2342;&#2367;&#2325; &#2325;&#2366;&#2354; &#2350;&#2375;&#2306;, &#2350;&#2357;&#2375;&#2358;&#2368; &#2343;&#2344; &#2325;&#2366; &#2319;&#2325; &#2350;&#2366;&#2346; &#2341;&#2375;; &#2344;&#2367;&#2359;&#2381;&#2325;&#2366; &#2344;&#2375; &#2343;&#2366;&#2340;&#2369; &#2325;&#2375; &#2310;&#2349;&#2370;&#2359;&#2339;-&#2360;&#2361;-&#2357;&#2367;&#2344;&#2367;&#2350;&#2351; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>2) &#2313;&#2340;&#2381;&#2340;&#2352; &#2357;&#2376;&#2342;&#2367;&#2325; &#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2354;&#2379;&#2361;&#2375; (&#2325;&#2371;&#2359;&#2381;&#2339; &#2309;&#2351;&#2366;&#2360;) &#2325;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2343;&#2381;&#2351; &#2327;&#2306;&#2327;&#2366; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352; &#2361;&#2369;&#2310;&#2404;</p><p>3) &#2360;&#2349;&#2366; &#2324;&#2352; &#2360;&#2350;&#2367;&#2340;&#2367; &#2313;&#2340;&#2381;&#2340;&#2352; &#2357;&#2376;&#2342;&#2367;&#2325; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2327;&#2366;&#2351;&#2348; &#2361;&#2379; &#2327;&#2319;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2360;&#2349;&#2366; &#2360;&#2375; &#2352;&#2361;&#2367;&#2340; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2325;&#2371;&#2340; &#2352;&#2366;&#2332;&#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2366; &#2350;&#2366;&#2352;&#2381;&#2327; &#2346;&#2381;&#2352;&#2358;&#2360;&#2381;&#2340; &#2361;&#2369;&#2310;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statements 1 and 2 are historically correct.</p><p>Statement 3 is incorrect because the Sabha and Samiti, while their power diminished, did not vanish entirely in the later Vedic period. The monarchy was not devoid of assemblies.</p><p>Therefore, the correct option is b.</p><p>Explanation of Statements:</p><p>1 is Correct. This statement accurately describes the economy of the Early Vedic (or Rigvedic) period. The society was predominantly pastoral, and cattle were the primary form of wealth. A wealthy person was known as a gomat (one who possesses cows), and the term for war was gavishti (search for cows). The nishka, mentioned in the Rigveda, was initially a gold ornament (like a necklace) but also came to be used as a unit of value in transactions, functioning as a proto-currency or a valuable item for barter and exchange.</p><p>2 is Correct. This statement correctly highlights two defining features of the Later Vedic period (c. 1000-600 BCE). There was a significant eastward geographical expansion of the Indo-Aryans from the Sapta Sindhu region into the fertile middle Gangetic plains. This expansion was facilitated by the widespread use of iron technology. Iron is referred to in later Vedic texts as krishna ayas (black metal), distinguishing it from ayas (copper/bronze) of the Rigvedic period. Iron tools like axes helped in clearing dense forests, and iron ploughshares improved agriculture, leading to a more settled, agrarian economy.</p><p>3 is Incorrect. This statement makes an absolute claim that is not supported by evidence. The popular tribal assemblies of the Rigvedic period, the Sabha (assembly of elders/elites) and the Samiti (general assembly of the tribe), did not \"vanish entirely.\" While their character changed and their influence waned as the power of the king grew, they continued to be mentioned in later Vedic texts like the Atharvaveda. They became more aristocratic and lost some of their deliberative power, but they still existed as advisory bodies. The monarchy became more powerful and territorial, but it was not \"devoid of any assemblies.\"</p><p>Further insights:</p><p>The transition from the Early to the Later Vedic period marks a significant shift from a semi-nomadic, pastoral society to a settled, agricultural one.</p><p>The political structure also evolved from a tribal chief (rajan) whose power was checked by assemblies, to a more hereditary and powerful king whose authority was bolstered by elaborate royal consecration ceremonies like the Ashvamedha (horse sacrifice) and Rajasuya.</p><p>The social structure also became more rigid in the Later Vedic period, with the four-fold varna system becoming more defined and hereditary, as described in texts like the Brahmanas.</p>",
    "question_index": 120
  },

    "question": "<span class=\"eqt\"><p>A 6 V ideal battery is connected in series with two resistors of 2 &#937; and 4 &#937;.</p><p>Consider the statements:</p><p>1. The same current flows through both resistors.</p><p>2. The circuit current is 1 A.</p><p>3. The potential difference across the 2 &#937; resistor is 2 V.</p><p>Which of the above is/are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; 6 V &#2310;&#2342;&#2352;&#2381;&#2358; &#2348;&#2376;&#2335;&#2352;&#2368; 2 &#937; &#2324;&#2352; 4 &#937; &#2325;&#2375; &#2342;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;&#2325;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2332;&#2369;&#2337;&#2364;&#2368; &#2361;&#2369;&#2312; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;&#2325;&#2379;&#2306; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2360;&#2350;&#2366;&#2344; &#2343;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2. &#2360;&#2352;&#2381;&#2325;&#2367;&#2335; &#2343;&#2366;&#2352;&#2366; 1 A &#2361;&#2376;&#2404;</p><p>3. 2 &#937; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;&#2325; &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2367;&#2349;&#2357;&#2366;&#2306;&#2340;&#2352; 2 V &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All three statements are correct based on the fundamental principles of DC circuits (Ohm's Law and the properties of series circuits).</p><p>Explanation and Calculations:</p><p>Given Data:</p><p>Voltage of the battery (V) = 6 V</p><p>Resistor 1 (R&#8321;) = 2 &#937;</p><p>Resistor 2 (R&#8322;) = 4 &#937;</p><p>The resistors are connected in series.</p><p>Statement 1: The same current flows through both resistors.</p><p>This is correct. It is a defining characteristic of a series circuit. In a series connection, there is only one path for the current to flow, so the current (I) is the same through every component in the circuit.</p><p>Statement 2: The circuit current is 1 A.</p><p>This is correct. To find the total current, we first need the total equivalent resistance (R_eq) of the series circuit.</p><p>For resistors in series: R_eq = R&#8321; + R&#8322;</p><p>R_eq = 2 &#937; + 4 &#937; = 6 &#937;</p><p>Now, using Ohm's Law (V = I * R), we can find the total current (I):</p><p>I = V / R_eq</p><p>I = 6 V / 6 &#937; = 1 A</p><p>So, the total current flowing through the circuit is 1 Ampere.</p><p>Statement 3: The potential difference across the 2 &#937; resistor is 2 V.</p><p>This is correct. The potential difference (voltage drop) across an individual resistor is found using Ohm's Law with the current flowing through that resistor.</p><p>Voltage across R&#8321; (V&#8321;) = I * R&#8321;</p><p>Since I = 1 A and R&#8321; = 2 &#937;:</p><p>V&#8321; = 1 A * 2 &#937; = 2 V</p><p>So, the potential difference across the 2 &#937; resistor is 2 Volts.</p><p>Conclusion:</p><p>Since all three statements are verified to be correct, the correct option is (D).</p><p>Further insights:</p><p>We can also verify the voltage drop across the 4 &#937; resistor:</p><p>Voltage across R&#8322; (V&#8322;) = I * R&#8322;</p><p>V&#8322; = 1 A * 4 &#937; = 4 V</p><p>According to Kirchhoff's Voltage Law for a series circuit, the sum of the voltage drops across the resistors must equal the total voltage supplied by the battery:</p><p>V&#8321; + V&#8322; = 2 V + 4 V = 6 V</p><p>This matches the battery voltage, confirming our calculations.</p><p></p>",
    "question_index": 121
  },

    "question": "<span class=\"eqt\"><p>The novel \"A House for Mr Biswas\" was authored by which of the following writers?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; \"&#2319; &#2361;&#2366;&#2313;&#2360; &#2347;&#2377;&#2352; &#2350;&#2367;&#2360;&#2381;&#2335;&#2352; &#2348;&#2367;&#2360;&#2381;&#2357;&#2366;&#2360;\" &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2354;&#2375;&#2326;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2326;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">R. K. Narayan</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;. &#2325;&#2375;. &#2344;&#2366;&#2352;&#2366;&#2351;&#2339;</span>",
      "<span class=\"eqt\">V. S. Naipaul</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2368;. &#2319;&#2360;. &#2344;&#2366;&#2351;&#2346;&#2377;&#2354;</span>",
      "<span class=\"eqt\">Mulk Raj Anand</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2354;&#2381;&#2325; &#2352;&#2366;&#2332; &#2310;&#2344;&#2306;&#2342;</span>",
      "<span class=\"eqt\">Salman Rushdie</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2354;&#2350;&#2366;&#2344; &#2352;&#2369;&#2358;&#2381;&#2342;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A House for Mr Biswas is a 1961 novel written by the Nobel Prize-winning author V. S. Naipaul. It is considered his most significant and acclaimed work.</p><p>Explanation of Options:</p><p>a) R. K. Narayan: An iconic Indian writer known for his novels set in the fictional South Indian town of Malgudi, such as The Guide and Swami and Friends.</p><p>b) V. S. Naipaul: This is the correct answer. Vidiadhar Surajprasad Naipaul was a Trinidadian-British writer of Indian descent. A House for Mr Biswas is a semi-autobiographical novel that draws on the life of his father and explores the struggle for identity and independence of an Indo-Trinidadian man.</p><p>c) Mulk Raj Anand: A pioneering Indian writer in English, known for his social realist novels like Untouchable and Coolie, which depict the lives of the poor and oppressed in India.</p><p>d) Salman Rushdie: A celebrated British-Indian novelist known for his works of magical realism, such as the Booker Prize-winning Midnight's Children.</p><p>Further insights:</p><p>A House for Mr Biswas is a landmark of postcolonial literature. The novel's central theme is the protagonist Mohun Biswas's relentless and often tragic quest to own his own house, which symbolizes his search for a stable identity, dignity, and a place to belong in a displaced community.</p><p>The novel is praised for its rich characterization, dark humor, and detailed portrayal of the Indo-Trinidadian community's life and culture.</p><p>V. S. Naipaul was awarded the Nobel Prize in Literature in 2001 for his body of work.</p><p></p>",
    "question_index": 122
  },

    "question": "<span class=\"eqt\"><p>With reference to the Brahmaputra, consider:</p><p>i. In Tibet it is known as the Yarlung Tsangpo.</p><p>ii. It enters India as the Siang/Dihang in Arunachal Pradesh.</p><p>iii. Subansiri is the largest south-bank tributary of the Brahmaputra.</p><p>Which of the statements given above is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2346;&#2369;&#2340;&#2381;&#2352; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. &#2340;&#2367;&#2348;&#2381;&#2348;&#2340; &#2350;&#2375;&#2306; &#2311;&#2360;&#2375; &#2351;&#2366;&#2352;&#2354;&#2369;&#2306;&#2327; &#2340;&#2381;&#2360;&#2366;&#2306;&#2327;&#2346;&#2379; &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>ii. &#2351;&#2361; &#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2360;&#2367;&#2351;&#2366;&#2306;&#2327;/&#2342;&#2367;&#2361;&#2366;&#2306;&#2327; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>iii. &#2360;&#2369;&#2348;&#2344;&#2360;&#2367;&#2352;&#2368; &#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2346;&#2369;&#2340;&#2381;&#2352; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2340;&#2335;&#2368;&#2351; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">ii and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i and ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statements i and ii are correct, while statement iii is incorrect. The river is called Yarlung Tsangpo in Tibet and enters India as the Siang/Dihang. However, the Subansiri is a north-bank tributary, not a south-bank one.</p><p>Explanation of Statements:</p><p>i is Correct. The Brahmaputra river originates from the Chemayungdung Glacier in the Kailash Range, near Mansarovar Lake in Tibet. In Tibet, where it flows eastward for about 1,200 km, it is known as the Yarlung Tsangpo.</p><p>ii is Correct. After its long journey across the Tibetan plateau, the river makes a dramatic hairpin bend around the Namcha Barwa peak and enters India through a deep gorge in the state of Arunachal Pradesh. In this mountainous region, it is known as the Siang or Dihang.</p><p>iii is Incorrect. The Subansiri is indeed the largest tributary of the Brahmaputra in terms of water volume. However, it originates in the Himalayas to the north and flows south to join the Brahmaputra. Therefore, it is a north-bank (or right-bank) tributary, not a south-bank tributary. The largest south-bank (or left-bank) tributary is the Dhansiri.</p><p>Further insights:</p><p>The river is only called the Brahmaputra after it is joined by its two major tributaries, the Dibang and the Lohit, as it enters the plains of Assam.</p><p>In Bangladesh, the river splits into two main branches. The main branch is known as the Jamuna, which joins the Ganga (known as the Padma in Bangladesh).</p><p>The Brahmaputra is a unique river, known for its massive discharge, tendency to form river islands (like Majuli, the world's largest river island), and causing devastating floods during the monsoon season.</p>",
    "question_index": 123
  },

    "question": "<span class=\"eqt\"><p>An object is placed 30 cm in front of a convex lens, and the image is formed 60 cm on the other side of the lens. What is the focal length of the lens?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; &#2313;&#2340;&#2381;&#2340;&#2354; &#2354;&#2375;&#2306;&#2360; &#2325;&#2375; &#2360;&#2366;&#2350;&#2344;&#2375; 30 &#2360;&#2375;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2352;&#2326;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348; &#2354;&#2375;&#2306;&#2360; &#2325;&#2375; &#2342;&#2370;&#2360;&#2352;&#2368; &#2323;&#2352; 60 &#2360;&#2375;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;&#2404; &#2354;&#2375;&#2306;&#2360; &#2325;&#2368; &#2347;&#2379;&#2325;&#2360; &#2342;&#2370;&#2352;&#2368; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">10 cm</span><span class=\"hqt\" style=\"display:none\">10 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">15 cm</span><span class=\"hqt\" style=\"display:none\">15 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">20 cm</span><span class=\"hqt\" style=\"display:none\">20 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">30 cm</span><span class=\"hqt\" style=\"display:none\">30 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The focal length of the lens is 20 cm. This can be calculated using the lens formula.</p><p>Given Data:</p><p>Object distance (u) = -30 cm (By sign convention, the distance to an object placed in front of the lens is negative).</p><p>Image distance (v) = +60 cm (The image is formed on the other side of the lens, which is the direction of light, so it is positive. A positive image distance for a lens indicates a real image).</p><p>Focal length (f) = ?</p><p>Applying the Lens Formula:</p><p>The lens formula relates the object distance (u), image distance (v), and focal length (f):</p><p>1/f = 1/v - 1/u</p><p>Calculation:</p><p>1/f = 1/60 - 1/(-30)</p><p>1/f = 1/60 + 1/30</p><p>To add the fractions, find a common denominator, which is 60:</p><p>1/f = 1/60 + 2/60</p><p>1/f = (1 + 2) / 60</p><p>1/f = 3 / 60</p><p>Simplify the fraction:</p><p>1/f = 1 / 20</p><p>Therefore, the focal length (f) is:</p><p>f = 20 cm</p><p>Since the focal length is positive, it confirms that the lens is a convex lens, as expected.</p><p>The correct option is 20 cm.</p><p></p>",
    "question_index": 124
  },

    "question": "<span class=\"eqt\"><p>Regarding RBI's monetary policy instruments, consider the following:</p><p>1. An increase in CRR immediately reduces banks' lendable resources and does not earn interest.</p><p>2. SLR can be maintained in cash, gold, and specified approved securities, typically earning interest on G-Secs.</p><p>Which of the above is true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2325;&#2375; &#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2360;&#2368;&#2310;&#2352;&#2310;&#2352; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2360;&#2375; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2313;&#2343;&#2366;&#2352; &#2342;&#2375;&#2344;&#2375; &#2351;&#2379;&#2327;&#2381;&#2351; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344; &#2340;&#2369;&#2352;&#2306;&#2340; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2348;&#2381;&#2351;&#2366;&#2332; &#2344;&#2361;&#2368;&#2306; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2319;&#2360;&#2319;&#2354;&#2310;&#2352; &#2325;&#2379; &#2344;&#2325;&#2342;&#2368;, &#2360;&#2379;&#2344;&#2375; &#2324;&#2352; &#2344;&#2367;&#2352;&#2381;&#2342;&#2367;&#2359;&#2381;&#2335; &#2309;&#2344;&#2369;&#2350;&#2379;&#2342;&#2367;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367;&#2349;&#2370;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2332;&#2368;-&#2360;&#2375;&#2325; &#2346;&#2352; &#2348;&#2381;&#2351;&#2366;&#2332; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are correct. They accurately describe the nature and impact of two of the Reserve Bank of India's key statutory reserve requirements: the Cash Reserve Ratio (CRR) and the Statutory Liquidity Ratio (SLR).</p><p>Explanation of Statements:</p><p>1 is Correct. The Cash Reserve Ratio (CRR) is the percentage of a commercial bank's Net Demand and Time Liabilities (NDTL) that it must mandatorily keep as cash reserves with the RBI.</p><p>Reduces Lendable Resources: When the RBI increases the CRR, banks have to set aside a larger portion of their deposits, which directly reduces the amount of money they have available to lend to customers. This is a direct tool to contract the money supply.</p><p>Does Not Earn Interest: The reserves kept with the RBI under the CRR requirement do not earn any interest for the commercial banks. This makes CRR a powerful but blunt instrument, as it directly impacts bank profitability.</p><p>2 is Correct. The Statutory Liquidity Ratio (SLR) is the percentage of NDTL that a commercial bank must maintain in the form of safe and liquid assets before providing credit to customers.</p><p>Forms of Assets: Statement correctly lists the eligible forms. SLR can be maintained as cash (in the bank's own vault), gold, or investments in unencumbered, approved securities. These approved securities are predominantly Government Securities (G-Secs) and State Development Loans (SDLs).</p><p>Earns Interest: Unlike CRR, the assets held under SLR, particularly government securities, do earn interest for the banks. This makes SLR a less punitive tool than CRR, as it does not directly hit bank profitability in the same way.</p><p>Further insights:</p><p>Quantitative Tools: Both CRR and SLR are quantitative (or general) tools of monetary policy. By adjusting these ratios, the RBI can directly influence the credit-creating capacity of the banking system, thereby controlling the overall money supply in the economy.</p><p>Current Status: Over the years, the RBI has progressively lowered the SLR to align with market-based reforms and to free up more funds for banks to lend to the commercial sector. The CRR is used more actively to manage short-term liquidity conditions in the system.</p><p></p>",
    "question_index": 125
  },

    "question": "<span class=\"eqt\"><p>With reference to major peaks in India, consider:</p><p>1. K2 is the highest peak in the Indian subcontinent but does not lie entirely within Indian territory.</p><p>2. Nanda Devi is the highest peak located entirely within India.</p><p>3. Anamudi is the highest peak of the Eastern Ghats.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2330;&#2379;&#2335;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. K2 &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2313;&#2346;&#2350;&#2361;&#2366;&#2342;&#2381;&#2357;&#2368;&#2346; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2314;&#2305;&#2330;&#2368; &#2330;&#2379;&#2335;&#2368; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2351;&#2361; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p><p>2. &#2344;&#2306;&#2342;&#2366; &#2342;&#2375;&#2357;&#2368; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2360;&#2348;&#2360;&#2375; &#2314;&#2305;&#2330;&#2368; &#2330;&#2379;&#2335;&#2368; &#2361;&#2376;&#2404;</p><p>3. &#2309;&#2344;&#2366;&#2350;&#2369;&#2337;&#2368; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2328;&#2366;&#2335; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2314;&#2305;&#2330;&#2368; &#2330;&#2379;&#2335;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct, while statement 3 is incorrect. K2 is the highest peak in the region but is located in Pakistan-occupied Kashmir. Nanda Devi is the highest peak that is fully within undisputed Indian territory. Anamudi is the highest peak of the Western Ghats, not the Eastern Ghats.</p><p>Explanation of Statements:</p><p>1 is Correct. K2 (also known as Mount Godwin-Austen), at 8,611 meters, is the second-highest peak in the world and the highest in the Karakoram Range and the Indian subcontinent. It is located in Pakistan-occupied Kashmir (PoK), which India claims as its integral part but does not currently administer. Hence, the statement that it does not lie entirely within Indian-administered territory is accurate.</p><p>2 is Correct. This statement is also correct. While Kangchenjunga (8,586 m) is the highest peak in India's undisputed territory, its summit lies on the border between Sikkim, India, and Nepal. Nanda Devi (7,816 m), located in Uttarakhand, is the highest peak that is located entirely within the undisputed territory of India (i.e., not on an international border).</p><p>3 is Incorrect. Anamudi (2,695 m), located in Kerala, is the highest peak of the Western Ghats and of Peninsular India. The highest peak of the Eastern Ghats is Jindhagada Peak (1,690 m) in Andhra Pradesh.</p><p>Further insights:</p><p>The hierarchy of the highest peaks is as follows:</p><p>Highest in the world: Mount Everest (Nepal/China)</p><p>Highest in the Indian Subcontinent: K2 (PoK)</p><p>Highest in undisputed India: Kangchenjunga (Sikkim/Nepal border)</p><p>Highest peak entirely within undisputed India: Nanda Devi (Uttarakhand)</p><p>Highest peak in South India: Anamudi (Kerala, Western Ghats)</p><p></p>",
    "question_index": 126
  },

    "question": "<span class=\"eqt\"><p>Consider the statements and choose the correct one(s).</p><p>1. Arthropods possess jointed appendages and an exoskeleton composed largely of chitin.</p><p>2. Annelids typically have a true coelom and many exhibit a closed circulatory system.</p><p>3. Both arthropods and annelids are segmented, but segmentation is more clearly metameric in annelids.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>1. &#2310;&#2352;&#2381;&#2341;&#2381;&#2352;&#2379;&#2346;&#2379;&#2337;&#2381;&#2360; &#2350;&#2375;&#2306; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2313;&#2346;&#2366;&#2306;&#2327; &#2324;&#2352; &#2319;&#2325; &#2319;&#2325;&#2381;&#2360;&#2379;&#2360;&#2381;&#2325;&#2375;&#2354;&#2375;&#2335;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2348;&#2337;&#2364;&#2375; &#2346;&#2376;&#2350;&#2366;&#2344;&#2375; &#2346;&#2352; &#2325;&#2366;&#2311;&#2335;&#2367;&#2344; &#2360;&#2375; &#2348;&#2344;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2319;&#2344;&#2375;&#2354;&#2367;&#2337;&#2381;&#2360; &#2350;&#2375;&#2306; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2319;&#2325; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2368;&#2354;&#2379;&#2350; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2325;&#2312; &#2319;&#2325; &#2348;&#2306;&#2342; &#2346;&#2352;&#2367;&#2360;&#2306;&#2330;&#2352;&#2339; &#2340;&#2306;&#2340;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>3. &#2310;&#2352;&#2381;&#2341;&#2381;&#2352;&#2379;&#2346;&#2379;&#2337;&#2381;&#2360; &#2324;&#2352; &#2319;&#2344;&#2375;&#2354;&#2367;&#2337;&#2381;&#2360; &#2342;&#2379;&#2344;&#2379;&#2306; &#2326;&#2306;&#2337;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2319;&#2344;&#2375;&#2354;&#2367;&#2337;&#2381;&#2360; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2309;&#2343;&#2367;&#2325; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2350;&#2375;&#2335;&#2366;&#2350;&#2375;&#2352;&#2367;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All three statements are correct. They accurately describe the key defining characteristics of the phyla Arthropoda and Annelida and the nature of segmentation in both groups.</p><p>Explanation of Statements:</p><p>1 is Correct. This statement lists the two most distinctive features of the phylum Arthropoda. The name itself means \"jointed foot,\" referring to their jointed appendages (legs, antennae, mouthparts). Their body is covered by a hard, protective outer layer called an exoskeleton, which is primarily composed of chitin, a tough polysaccharide.</p><p>2 is Correct. This statement accurately describes key features of the phylum Annelida (segmented worms like earthworms and leeches). They are coelomates, meaning they possess a true coelom (a body cavity completely lined with mesoderm). This allows for more complex organ systems. Many annelids, particularly active ones like earthworms, have a closed circulatory system, where blood is confined within vessels, allowing for more efficient transport of oxygen and nutrients compared to an open system.</p><p>3 is Correct. Both phyla exhibit segmentation, the division of the body into a series of repeating units. However, the nature of this segmentation differs.</p><p>In annelids, the segmentation is metameric, meaning the segments are largely identical and there is a serial repetition of internal organs (like nephridia and ganglia) in each segment. This is very clear externally and internally.</p><p>In arthropods, while the body is fundamentally segmented, there is a strong tendency for segments to fuse into specialized body regions called tagmata (e.g., the head, thorax, and abdomen of an insect). This process, known as tagmosis, makes the segmentation less uniform and repetitive than in annelids. Therefore, the statement that segmentation is more clearly metameric in annelids is correct.</p><p>Further insights:</p><p>The presence of segmentation in both annelids and arthropods was once thought to indicate a close evolutionary relationship. However, modern genetic and molecular evidence suggests that they belong to different major clades of protostomes (Annelida to Lophotrochozoa, and Arthropoda to Ecdysozoa) and that segmentation likely evolved independently in the two lineages (convergent evolution).</p><p>Arthropods have an open circulatory system, where blood (hemolymph) is pumped into a body cavity (hemocoel), which is a key difference from the closed system of many annelids.</p>",
    "question_index": 127
  },

      "<span class=\"eqt\">Offer 1 crore internships over five years in top companies to bridge academia-industry gap</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2325;&#2381;&#2359;&#2366;-&#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2340;&#2352; &#2325;&#2379; &#2346;&#2366;&#2335;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2366;&#2306;&#2330; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; 1 &#2325;&#2352;&#2379;&#2337;&#2364; &#2311;&#2306;&#2335;&#2352;&#2381;&#2344;&#2358;&#2367;&#2346; &#2325;&#2368; &#2346;&#2375;&#2358;&#2325;&#2358;</span>",
      "<span class=\"eqt\">Provide paid internships only to postgraduate students</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2360;&#2381;&#2344;&#2366;&#2340;&#2325;&#2379;&#2340;&#2381;&#2340;&#2352; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2360;&#2358;&#2369;&#2354;&#2381;&#2325; &#2311;&#2306;&#2335;&#2352;&#2381;&#2344;&#2358;&#2367;&#2346; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;</span>"

    "solution": "<p>The Prime Minister Internship Scheme (PMIS), launched in October 2024 by the Ministry of Corporate Affairs,  aims to provide one crore young Indians with 12-month paid internships in the nation's top companies over the next five years, thereby bridging the gap between academic learning and industry demands.</p><p>By integrating classroom knowledge with practical experience, PMIS aspires to cultivate a workforce that is both skilled and adaptable to the evolving global economic landscape.</p><p></p>",

    "question": "<span class=\"eqt\"><p>Who was honoured with the Medal of Honour by the World Jurist Association at the World Law Congress 2025 for pioneering legal efforts in combating child marriage and forced labour in May 2025?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2312; 2025 &#2350;&#2375;&#2306; &#2348;&#2366;&#2354; &#2357;&#2367;&#2357;&#2366;&#2361; &#2324;&#2352; &#2332;&#2348;&#2352;&#2344; &#2358;&#2381;&#2352;&#2350; &#2360;&#2375; &#2344;&#2367;&#2346;&#2335;&#2344;&#2375; &#2350;&#2375;&#2306; &#2309;&#2327;&#2381;&#2352;&#2339;&#2368; &#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2358;&#2381;&#2357; &#2357;&#2367;&#2343;&#2367; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; 2025 &#2350;&#2375;&#2306; &#2357;&#2367;&#2358;&#2381;&#2357; &#2344;&#2381;&#2351;&#2366;&#2351;&#2357;&#2366;&#2342;&#2368; &#2360;&#2306;&#2328; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2375;&#2337;&#2354; &#2321;&#2347; &#2321;&#2344;&#2352; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bhuwan Ribhu</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2369;&#2357;&#2344; &#2352;&#2367;&#2349;&#2369;</span>",

    "correct_option_id": 0,
    "solution": "<p>For over two decades, Bhuwan Ribhu has harnessed the rule of law to dismantle systemic violence against children - leading India's fight against child marriage, trafficking, sexual abuse, and forced labour.</p><p>On May 5, his relentless efforts were recognised globally as he became the first Indian lawyer to receive the prestigious Medal of Honour from the World Jurist Association at the World Law Congress 2025 in the Dominican Republic.</p><p>This global recognition is more than a personal honour'it reflects a lifelong journey of dedicated service to children and the strategic use of courts and the rule of law to secure justice for those who have been silenced, exploited, and forgotten.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following key of the keyboard is used for cancelling or aborting an operation being executed?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337; &#2325;&#2368; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2325;&#2368; (key) &#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2325;&#2367;&#2319; &#2332;&#2366; &#2352;&#2361;&#2375; &#2321;&#2346;&#2352;&#2375;&#2358;&#2344; &#2325;&#2379; &#2352;&#2342;&#2381;&#2342; &#2325;&#2352;&#2344;&#2375; &#2351;&#2366; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Control Key</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2335;&#2381;&#2352;&#2379;&#2354; &#2325;&#2368; (key)</span>",
      "<span class=\"eqt\">Enter Key</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2335;&#2352; &#2325;&#2368; (key)</span>",
      "<span class=\"eqt\">Escape Key</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360;&#2381;&#2325;&#2375;&#2346; &#2325;&#2368; (key)</span>",
      "<span class=\"eqt\">Shift Key</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2347;&#2381;&#2335; &#2325;&#2368; (key)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Escape Key (Esc) allows a user to cancel or abort operations, which are running at present. It opens Start menu with the combination of Ctrl key.</p><p>The Esc key, or Escape key, is a versatile tool on your keyboard with a wide range of uses:</p><p>- Cancelling Operations: Its primary function is to stop or abort an ongoing action. This could be closing a dialog box, stopping a download, or exiting a full-screen mode.</p><p>- Exiting Menus: In many programs, pressing Esc can close open menus or submenus.</p><p>- Pausing Games: In many games, Esc often acts as a pause button, allowing you to temporarily halt gameplay.</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>____________occurs when a program attempts to access a block of memory that is not stored in the physical memory, or RAM.</p></span><span class=\"hqt\" style=\"display:none\"><p>____________&#2340;&#2348; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348; &#2325;&#2379;&#2312; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2375; &#2325;&#2367;&#2360;&#2368; &#2320;&#2360;&#2375; &#2348;&#2381;&#2354;&#2377;&#2325; &#2340;&#2325; &#2346;&#2361;&#2369;&#2306;&#2330;&#2344;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2349;&#2380;&#2340;&#2367;&#2325; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2351;&#2366; RAM &#2350;&#2375;&#2306; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Page fault</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2332; &#2347;&#2364;&#2377;&#2354;&#2381;&#2335;</span>",
      "<span class=\"eqt\">OS fault</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2319;&#2360; &#2347;&#2364;&#2377;&#2354;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Program fault</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2347;&#2364;&#2377;&#2354;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Memory fault</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2347;&#2364;&#2377;&#2354;&#2381;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A <b>page fault</b> occurs when a program attempts to access a block of memory that is not stored in the physical memory, or RAM. The fault notifies the operating system that it must locate the data in virtual memory, then transfer it from the storage device, such as an HDD or SSD, to the system RAM.</p>",
    "question_index": 132
  },

    "correct_option_id": 3,
    "solution": "<p>The <b>fourth-generation computers</b> are used Very Large Scale Integrated (VLSI) circuits. Semi-conductor devices are used as primary memory. Magnetic disks are used as secondary storage. Problem-oriented fourth generation languages (4GL) are used. Multi-processing and multiprogramming operating systems are used. Example  -  Apple series  -  I &amp; II, IBM 4341, DEC 10, STAR 1000, PUP 11.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following input devices is commonly used in interactive whiteboards?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2311;&#2344;&#2346;&#2369;&#2335; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2311;&#2306;&#2335;&#2352;&#2376;&#2325;&#2381;&#2335;&#2367;&#2357; &#2357;&#2381;&#2361;&#2366;&#2311;&#2335;&#2348;&#2379;&#2352;&#2381;&#2337; &#2350;&#2375;&#2306; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Webcam</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2348;&#2325;&#2376;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Interactive whiteboards are designed to facilitate collaboration and engagement in various settings such as classrooms, boardrooms, and presentations. A touchscreen interface allows users to interact directly with the display surface using their fingers or a stylus pen. This direct interaction enables intuitive control and engagement with the content displayed on the whiteboard. </p><p>Touchscreens enhance the uses of interactive whiteboards in many ways: - </p><p>&#183; Drawing and writing</p><p>&#183; Manipulating content</p><p>&#183; Interactivity</p><p>&#183; Ease of use</p><p>&#183; Integration with digital tools</p>",
    "question_index": 134
  },

    "question": "<span class=\"eqt\"><p>In Excel, which graphical representation of data is used for quantitative data, and ranges of values known as classes are listed at the bottom, and the types with greater frequencies have the taller bars?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2350;&#2375;&#2306;, &#2350;&#2366;&#2340;&#2381;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2337;&#2375;&#2335;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2375;&#2335;&#2366; &#2325;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2375; &#2327;&#2381;&#2352;&#2366;&#2347;&#2367;&#2325;&#2354; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2368; &#2358;&#2381;&#2352;&#2375;&#2339;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2357;&#2352;&#2381;&#2327; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2344;&#2368;&#2330;&#2375; &#2360;&#2370;&#2330;&#2368;&#2348;&#2342;&#2381;&#2343; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2343;&#2367;&#2325; &#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2357;&#2366;&#2354;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2354;&#2306;&#2348;&#2375; &#2342;&#2306;&#2337; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bar chart</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2306;&#2337; &#2310;&#2352;&#2375;&#2326;</span>",
      "<span class=\"eqt\">Pie chart</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326;</span>",
      "<span class=\"eqt\">Histogram</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2340;&#2330;&#2367;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Line graph</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The bar graph represents the qualitative data visually. The pie chart is used to represent the numerical proportions of a dataset.</p><p>The histogram is another kind of graph that uses bars in its display. The histogram is used for quantitative data, and ranges of values known as classes are listed at the bottom, and the types with greater frequencies have the taller bars.</p><p>Line graph uses lines and points to represent change over time.</p><p>Therefore, (c) is the correct option.</p>",
    "question_index": 135
  },

    "question": "<span class=\"eqt\"><p>Which of the following network connects two or more computers apart residing in same cities?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2319;&#2325; &#2361;&#2368; &#2358;&#2361;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2342;&#2379; &#2351;&#2366; &#2342;&#2379; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352;&#2379;&#2306; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">LAN</span><span class=\"hqt\" style=\"display:none\">LAN</span>",
      "<span class=\"eqt\">MAN</span><span class=\"hqt\" style=\"display:none\">MAN</span>",
      "<span class=\"eqt\">WAN</span><span class=\"hqt\" style=\"display:none\">WAN</span>",
      "<span class=\"eqt\">PAN</span><span class=\"hqt\" style=\"display:none\">PAN</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>MAN or Metropolitan Area Network</b> covers a larger area than that of a LAN and smaller area as compared to WAN. It connects two or more computers that are apart but resides in the same or different cities. It covers a large geographical area and may serve as an ISP (Internet Service Provider). MAN is designed for customers who need a high-speed connectivity. It's hard to design and maintain a Metropolitan Area Network.</p><p>Examples of a MAN are the part of the telephone company network that can provide a high-speed DSL line to the customer or the cable TV network in a city.</p>",
    "question_index": 136
  },
