;&#2368; &#2361;&#2376; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2349;&#2366;&#2327; &#2325;&#2379; &#2360;&#2350;&#2366;&#2344; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2352;&#2325;&#2375; 8(<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">3</span></div>)% &#2346;&#2381;&#2352;&#2340;&#2367;&#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2346;&#2352; &#2313;&#2343;&#2366;&#2352; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2369;&#2354; &#2348;&#2381;&#2351;&#2366;&#2332; &#2352;&#2369;.<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">25690</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">3</span></div> &#2361;&#2376;, &#2340;&#2379; &#2346;&#2361;&#2354;&#2375; &#2349;&#2366;&#2327; &#2340;&#2341;&#2366; &#2342;&#2370;&#2360;&#2352;&#2375; &#2349;&#2366;&#2327; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</div></p></span>",

    "question": "<span class=\"eqt\"><p>A boat takes T hours to travel 252 km upstream and takes T/2 hours to travel 260.4 km downstream. The speed of boat in still water is 8 km/hr more than its upstream speed. What is the value of T?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2325;&#2379; 252 &#2325;&#2367;.&#2350;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; T &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; 260.4 &#2325;&#2367;&#2350;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; T/2 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2311;&#2360;&#2325;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2327;&#2340;&#2367; &#2360;&#2375; 8 &#2325;&#2367;&#2350;&#2368; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; T &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>According to the Question,</p><p>Number = 24A24</p><p>Divisibility by 4: If the last two digits of the number are divisible by 4, then whole number is divisible by 4</p><p>Here, 24 is divisible by 4</p><p>Divisibility by 11: Difference between the sum of the digits at all the even places and sum of the digits at all the odd places must be 0 or divisible by 11.</p><p>In the number 24A24</p><p>Sum of the digits at all the even places = 4+2 =6</p><p>Sum of the digits at all the odd places = 2+A+4 = 6+A</p><p>(6+A)-6= 0 or 11</p><p>A = 0</p><p>&#8756; 3<sup>A</sup>-A<sup>2</sup>-A = 3<sup>0</sup> - 0 - 0 = 1</p>",
    "question_index": 16

    "question": "<span class=\"eqt\"><p>If 3&radic;3x<sup>3</sup> - 2&radic;2y<sup>3</sup> = (&radic;3x - &radic;2y)(Ax<sup>2</sup> - Bxy + Cy<sup>2</sup>), then the value of (A<sup>2</sup> - B<sup>2</sup> + C<sup>2</sup>) is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 3&radic;3x<sup>3</sup> - 2&radic;2y<sup>3</sup> = (&radic;3x - &radic;2y)(Ax<sup>2</sup>-Bxy+Cy<sup>2</sup>), &#2340;&#2379; (A<sup>2 - </sup> B<sup>2 </sup>+ C<sup>2</sup>) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">17</span><span class=\"hqt\" style=\"display:none\">17</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>We know that,</p><p>A<sup>3</sup>  -  B<sup>3</sup> = (A  -  B)(A<sup>2</sup> + AB + B<sup>2</sup>)</p><p>Thus, 3&radic;3x<sup>3</sup> - 2&radic;2y<sup>3</sup> = (&radic;3x - &radic;2y)(Ax<sup>2</sup>-Bxy+Cy<sup>2</sup>)</p><p>=&gt; (&radic;3x)<sup>3</sup>  -  (&radic;2y)<sup>3</sup> = (&radic;3x - &radic;2y)(Ax<sup>2</sup>-Bxy+Cy<sup>2</sup>)</p><p>=&gt; (&radic;3x  -  &radic;2y){(&radic;3x)<sup>2</sup> + &radic;3x * &radic;2y + (&radic;2y)<sup>2</sup>} = (&radic;3x - &radic;2y)(Ax<sup>2</sup>-Bxy+Cy<sup>2</sup>)</p><p>=&gt; (&radic;3x  -  &radic;2y){3x<sup>2</sup> + &radic;6xy + 2y<sup>2</sup>} = (&radic;3x - &radic;2y)(Ax<sup>2</sup>-Bxy+Cy<sup>2</sup>)</p><p>Hence, A = 3, B = -&radic;6 and C = 2</p><p>Thus, (A<sup>2</sup> - B<sup>2</sup> + C<sup>2</sup>) = 9 - (-&radic;6)<sup>2</sup> + 4 = 9  -  6 + 4 = 7</p>",
    "question_index": 17
  },

/span>",

    "question": "<span class=\"eqt\"><p>The number of batsmen that has played for country X is 162 and the number of batsmen that has played for country Y is 126. The ratio of the average runs scored by all the batsmen of country X to the average runs scored by all the batsmen of country Y is 35:27 respectively. If the average runs scored by the batsmen of both the countries is 63, then what is the average runs scored by all the batsmen of country Y?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2375;&#2358; X &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2375;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2348;&#2354;&#2381;&#2354;&#2375;&#2348;&#2366;&#2332;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 162 &#2361;&#2376; &#2324;&#2352; &#2342;&#2375;&#2358; Y &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2375;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2348;&#2354;&#2381;&#2354;&#2375;&#2348;&#2366;&#2332;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 126 &#2361;&#2376;&#2404; &#2342;&#2375;&#2358; X &#2325;&#2375; &#2360;&#2349;&#2368; &#2348;&#2354;&#2381;&#2354;&#2375;&#2348;&#2366;&#2332;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2366;&#2319; &#2327;&#2319; &#2324;&#2360;&#2340; &#2352;&#2344;&#2379;&#2306; &#2324;&#2352; &#2342;&#2375;&#2358; Y &#2325;&#2375; &#2360;&#2349;&#2368; &#2348;&#2354;&#2381;&#2354;&#2375;&#2348;&#2366;&#2332;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2366;&#2319; &#2327;&#2319; &#2324;&#2360;&#2340; &#2352;&#2344;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 35:27 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2375; &#2348;&#2354;&#2381;&#2354;&#2375;&#2348;&#2366;&#2332;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2366;&#2319; &#2327;&#2319; &#2324;&#2360;&#2340; &#2352;&#2344; 63 &#2361;&#2376;&#2306;, &#2340;&#2379; &#2342;&#2375;&#2358; Y &#2325;&#2375; &#2360;&#2349;&#2368; &#2348;&#2354;&#2381;&#2354;&#2375;&#2348;&#2366;&#2332;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2366;&#2319; &#2327;&#2319; &#2324;&#2360;&#2340; &#2352;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;&#2306;?</p></span>",

    "correct_option_id": 2,
    "solution": "<p>Let average runs scored by all the batsmen of country X and country Y be 35r and 27r respectively.</p><p>By the rule of alligation,</p><p><img width=177 height=188 id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12148/image010.jpg\"></p><p>(35r  -  63)/(63  -  27r) = 126/162 = 7/9</p><p>(5r  -  9)/(7  -  3r) = 1</p><p>5r  -  9 = 7  -  3r</p><p>8r = 16</p><p>r = 2</p><p>So, average runs scored by all the batsmen of country Y = 2 * 27 = 54.</p>",

    "question": "<span class=\"eqt\"><p>Rahul bought two items A and B together at Rs.2400. He sold item A at 6% loss and item B at 16% profit. If he sold both the items together at Rs.2608, then at what price did Rahul buy item A.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2361;&#2369;&#2354; &#2344;&#2375; &#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2379; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2305; A &#2324;&#2352; B, 2400 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2326;&#2352;&#2368;&#2342;&#2368;&#2306;&#2404; &#2313;&#2360;&#2344;&#2375; &#2357;&#2360;&#2381;&#2340;&#2369; A &#2325;&#2379; 6% &#2361;&#2366;&#2344;&#2367; &#2346;&#2352; &#2324;&#2352; &#2357;&#2360;&#2381;&#2340;&#2369; B &#2325;&#2379; 16% &#2354;&#2366;&#2349; &#2346;&#2352; &#2348;&#2375;&#2330;&#2366;&#2404; &#2351;&#2342;&#2367; &#2313;&#2360;&#2344;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; 2608 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2366;, &#2340;&#2379; &#2352;&#2366;&#2361;&#2369;&#2354; &#2344;&#2375; &#2357;&#2360;&#2381;&#2340;&#2369; A &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2368; &#2325;&#2368;&#2350;&#2340; &#2350;&#2375;&#2306; &#2326;&#2352;&#2368;&#2342;&#2366; &#2341;&#2366;?</p></span>",

      "<span class=\"eqt\">Rs.600</span><span class=\"hqt\" style=\"display:none\">600 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",

    "correct_option_id": 0,
    "solution": "<p>Let the Cost price (CP) of item A = a</p><p>Then, CP of item B = 2400  -  a</p><p>Selling Price (SP) of item A = (100  -  6)% of a = (94/100) * a = 47a/50</p><p>SP of item B = (100 + 16)% of (2400  -  a) = (116/100) * 2400  -  (116/100) * a = 2784  -  29a/25</p><p>Total SP = 47a/50 + 2784  -  29a/25</p><p>Also, total SP = 2608</p><p>Then, 2608 = 47a/50 + 2784  -  29a/25</p><p>2608  -  2784 = (47  -  58)a/50</p><p>176 = 11a/50</p><p>a = 50 * 16</p><p>a = 800</p><p>So, Rahul bought item A at <b>Rs.800</b>.</p>",

;&#2351; &#2360;&#2380;&#2306;&#2346; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2340;&#2379;, &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2375; &#2327;&#2319; &#2325;&#2369;&#2354; &#2342;&#2367;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Two secants XYZ and XST is drawn from an external point X to the circle with centre U, secant XYZ intersecting at point Y and Z and, secant XST intersecting at point S and T such that ST is the diameter. If UX = 34 cm XY = 24 cm, and XZ = 45 cm, then the radius of the circle is equal to: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2331;&#2375;&#2342;&#2325; XYZ &#2324;&#2352; XST &#2325;&#2379; &#2319;&#2325; &#2348;&#2366;&#2361;&#2352;&#2368; &#2348;&#2367;&#2306;&#2342;&#2369; X &#2360;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; U &#2357;&#2366;&#2354;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2346;&#2352; &#2326;&#2368;&#2306;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2331;&#2375;&#2342;&#2325; &#2352;&#2375;&#2326;&#2366; XYZ &#2348;&#2367;&#2306;&#2342;&#2369; Y &#2324;&#2352; Z &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2331;&#2375;&#2342;&#2325; &#2352;&#2375;&#2326;&#2366; XST &#2348;&#2367;&#2306;&#2342;&#2369; S &#2324;&#2352; T &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2332;&#2376;&#2360;&#2375; &#2325;&#2367; ST &#2357;&#2381;&#2351;&#2366;&#2360; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; UX = 34 cm XY = 24 cm &#2324;&#2352; XZ = 45 cm &#2361;&#2376;, &#2340;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;:</p></span>",

    "solution": "<p><img width=398 height=234 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19877/image003.jpg\"></p><p>Let SU = UT = r cm</p><p>Intersecting Secants Theorem, </p><p>XS * XT = XY * XZ</p><p>=&gt; (34  -  r) * (34 + r) = 24 * 45</p><p>=&gt; 1156  -  r<sup>2</sup> = 1080</p><p>=&gt; r<sup>2</sup> = 76</p><p>=&gt; r = 2&radic;19 cm</p>",

    "question": "<span class=\"eqt\"><p>A bag contains 9 orange shirts, Y green shirts and (Y  -  1) red shirts. A shirt is selected randomly and the probability of selecting the shirt of green colour is 1/4, then find the value of Y.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2376;&#2327; &#2350;&#2375;&#2306; 9 &#2344;&#2366;&#2352;&#2306;&#2327;&#2368; &#2352;&#2306;&#2327; &#2325;&#2375; &#2358;&#2352;&#2381;&#2335;, Y &#2361;&#2352;&#2375; &#2352;&#2306;&#2327; &#2325;&#2368; &#2358;&#2352;&#2381;&#2335; &#2324;&#2352; (Y - 1) &#2354;&#2366;&#2354; &#2352;&#2306;&#2327; &#2325;&#2375; &#2358;&#2352;&#2381;&#2335; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2358;&#2352;&#2381;&#2335; &#2325;&#2379; &#2351;&#2366;&#2342;&#2371;&#2330;&#2381;&#2331;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2330;&#2369;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2361;&#2352;&#2375; &#2352;&#2306;&#2327; &#2325;&#2368; &#2358;&#2352;&#2381;&#2335; &#2325;&#2379; &#2330;&#2369;&#2344;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; 1/4 &#2361;&#2376;, &#2340;&#2379; Y &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",

    "correct_option_id": 1,
    "solution": "<p>Total number of shirts = 9 + Y + Y  -  1 = 2Y + 8</p><p>Probability = &#188;</p><p>Y/(2Y+8) = &#188;</p><p>4Y = 2Y + 8</p><p>Y = 4</p>",

    "question": "<span class=\"eqt\"><p>The mean of (X + 8), (X + 1), (X + 2), X, (X + 8), (X + 6), (X + 1), and (X + 2) is 1.5 times X more than the median of the given numbers. Find the value of X.</p></span><span class=\"hqt\" style=\"display:none\"><p>(X + 8), (X + 1), (X + 2), X, (X + 8), (X + 6), (X + 1) &#2324;&#2352; (X + 2) &#2325;&#2366; &#2350;&#2366;&#2343;&#2381;&#2351;, &#2342;&#2368; &#2327;&#2312; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2368; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; &#2360;&#2375; X &#2325;&#2366; 1.5 &#2327;&#2369;&#2339;&#2366; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

    "solution": "<p>Given number = (X + 8), (X + 1), (X + 2), X, (X + 8), (X + 6), (X + 1), and (X + 2)</p><p>Mean of the given number = (8X + 28)/8</p><p>Numbers in ascending order = X, (X + 1), (X + 1), (X + 2), (X + 2), (X + 6), (X + 8), and (X + 8)</p><p>Median = (4<sup>th</sup> term + 5<sup>th</sup> term)/2 = (X + 2 + X + 2)/2 = (X + 2)</p><p>Given,</p><p>[(8X + 28)/8]  -  (X + 2) = 1.5X</p><p>=> 12 = 12X</p><p>=> X = 1</p>",

    "question": "<span class=\"eqt\"><p>In the following question, the question is followed by two statements. Read all the statements carefully and find that which of the following statement(s) is/are sufficient to answer the question.</p><p>What is the value of 80% of the number?</p><p><b>Statement I: </b>When a number is decreased by 20, then it becomes 75% of itself.</p><p><b>Statement II: </b>When a number is increased by 25%, then it becomes 5/4 times of itself.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2360;&#2349;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2346;&#2338;&#2364;&#2367;&#2319; &#2324;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;&#2404;</p><p>&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; 80% &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p><b>&#2325;&#2341;&#2344; I: </b>&#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; 20 &#2325;&#2368; &#2325;&#2350;&#2368; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2368; 75% &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p><b>&#2325;&#2341;&#2344; II: </b>&#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; 25% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2368; 5/4 &#2327;&#2369;&#2344;&#2366; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Either statement I or II alone is sufficient.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2366; &#2340;&#2379; &#2325;&#2341;&#2344; I &#2351;&#2366; II &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Only statement I alone is sufficient.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; I &#2361;&#2368; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Only statement II alone is sufficient.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; II &#2361;&#2368; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both statement I and II together are sufficient.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2319;&#2325; &#2360;&#2366;&#2341; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the number = n</p><p><b>From statement I:</b> When a number is decreased by 20, then it becomes 75% of itself.</p><p>Here, n  -  20 = 75% of n</p><p>n  -  20 = (75/100) * n</p><p>n  -  20 = 3n/4</p><p>20 = n/4</p><p>n = 80</p><p>So, 80% of n = (80/100) * 80</p><p>= 64</p><p>Therefore, this statement alone is sufficient to find the answer.</p><p><b>From statement II:</b> When a number is increased by 25%, then it becomes 5/4 times of itself.</p><p>Here, (100 + 25)% of n = (5/4) * n</p><p>From the above equation, value of n cannot be determined.</p><p>So, this statement alone is not sufficient.</p>",
    "question_index": 30
  },

    "question": "<span class=\"eqt\"><p>Study the following information carefully and answer the question given below.</p><p>A!B: A is the son of B</p><p>A@B: A is the father of B</p><p>A#B: A is the husband of B</p><p>A$B: A is the sister of B</p><p>A?B: A is the mother of B</p><p>If O#P?M@Q$R!N, then which of the following statements are incorrect?</p><p>I: Q is the daughter of N</p><p>II: P is the grandmother of R</p><p>III: O is the father of R</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404;</p><p>A!B: A, B &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;</p><p>A@B: A, B &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;</p><p>A#B: A, B &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;</p><p>A$B: A, B &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;</p><p>A?B: A, B &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p>&#2351;&#2342;&#2367; O#P?M@Q$R!N &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p><p>I: Q, N &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;</p><p>II: P, R &#2325;&#2368; &#2342;&#2366;&#2342;&#2368; &#2361;&#2376;</p><p>III: O, R &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;</p></span>",

    "correct_option_id": 3,
    "solution": "<p>O#P: O is the husband of P</p><p>P?M: P is the mother of M</p><p>M@Q: M is the father of Q</p><p><img width=482 height=218 id=\"Picture 21\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p29106/image012.png\" ></p><p>Q$R: Q is the sister of R</p><p>R!N: R is the son of N</p><p><img width=623 height=243 id=\"Picture 22\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p29106/image013.png\" ></p><p>I: Q is the daughter of N ----- True</p><p>II: P is the grandmother of R ----- True</p><p>III: O is the father of R ---- false</p><p>So, only III is incorrect. </p>",

      "<span class=\"eqt\">Keep the extra item because \"shipping errors are the company's problem\"</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2366;&#2350;&#2366;&#2344; &#2352;&#2326;&#2375;&#2306; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; \"&#2358;&#2367;&#2346;&#2367;&#2306;&#2327; &#2340;&#2381;&#2352;&#2369;&#2335;&#2367;&#2351;&#2366;&#2305; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2368; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2361;&#2376;&#2306;\"</span>",
      "<span class=\"eqt\">Offer to pay later if they do not respond within 24 hours</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2357;&#2375; 24 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2332;&#2357;&#2366;&#2348; &#2344;&#2361;&#2368;&#2306; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2379; &#2348;&#2366;&#2342; &#2350;&#2375;&#2306; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2375;&#2358;&#2325;&#2358; &#2325;&#2352;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Gift the item to a friend since it is not your fault</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2367;&#2360;&#2368; &#2350;&#2367;&#2340;&#2381;&#2352; &#2325;&#2379; &#2313;&#2346;&#2361;&#2366;&#2352; &#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2342;&#2375; &#2342;&#2375;&#2306; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2351;&#2361; &#2310;&#2346;&#2325;&#2368; &#2327;&#2354;&#2340;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>"

    "correct_option_id": 0,
    "solution": "<p>Keeping or gifting unintended goods treats an error as entitlement and may violate policy and law. The proper course is to notify through official channels and follow the return process.</p>",

    "question": "<span class=\"eqt\"><p>Read the situation and choose the most appropriate first action: Your move-out inspection is scheduled in 50 minutes. Removing the last trash bags and wiping the counters will take about 15 minutes. Key handover occurs only after a clear inspection. An online utility bill is due tomorrow. What should you do first?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2379; &#2360;&#2350;&#2333;&#2375;&#2306; &#2324;&#2352; &#2360;&#2348;&#2360;&#2375; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2346;&#2361;&#2354;&#2366; &#2325;&#2342;&#2350; &#2330;&#2369;&#2344;&#2375;&#2306;: &#2310;&#2346;&#2325;&#2366; &#2328;&#2352; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2344;&#2367;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; 50 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2361;&#2379;&#2344;&#2366; &#2361;&#2376;&#2404; &#2310;&#2326;&#2367;&#2352;&#2368; &#2325;&#2370;&#2337;&#2364;&#2375; &#2325;&#2375; &#2341;&#2376;&#2354;&#2375; &#2361;&#2335;&#2366;&#2344;&#2375; &#2324;&#2352; &#2325;&#2366;&#2313;&#2306;&#2335;&#2352;&#2379;&#2306; &#2325;&#2379; &#2346;&#2379;&#2306;&#2331;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2349;&#2327; 15 &#2350;&#2367;&#2344;&#2335; &#2354;&#2327;&#2375;&#2306;&#2327;&#2375;&#2404; &#2330;&#2366;&#2348;&#2367;&#2351;&#2366;&#2305; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2344;&#2367;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2375; &#2348;&#2366;&#2342; &#2361;&#2368; &#2360;&#2380;&#2306;&#2346;&#2368; &#2332;&#2366;&#2319;&#2305;&#2327;&#2368;&#2404; &#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2348;&#2367;&#2332;&#2354;&#2368; &#2348;&#2367;&#2354; &#2325;&#2354; &#2332;&#2350;&#2366; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376;&#2404; &#2310;&#2346;&#2325;&#2379; &#2360;&#2348;&#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2325;&#2381;&#2351;&#2366; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",

      "<span class=\"eqt\">Finish the final cleanup so the apartment is inspection-ready</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2367;&#2350; &#2360;&#2347;&#2366;&#2312; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2375;&#2306; &#2340;&#2366;&#2325;&#2367; &#2309;&#2346;&#2366;&#2352;&#2381;&#2335;&#2350;&#2375;&#2306;&#2335; &#2344;&#2367;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2340;&#2376;&#2351;&#2366;&#2352; &#2361;&#2379; &#2332;&#2366;&#2319;</span>",

    "question": "<span class=\"eqt\"><p>How many triangles are there in the given figure?</p><p><img width=205 height=126 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3322/image012.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2361;&#2376;&#2306; ?</p><p><img width=\"205\" height=\"126\" id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3322/image012.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">32</span><span class=\"hqt\" style=\"display:none\">32</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">28</span><span class=\"hqt\" style=\"display:none\">28</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=299 height=205 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3322/image013.png\"></p><p>Triangles = MRV, NRW, NMA, VAZ, OSX, NSW, NOA, XAZ, OTX, OPA, TPU, AXY, PQU, QVM, AVY, APM, RNS, SOT, TPQ, RMQ, VZX, YZX, VYX, YZV, MNO, NOP, OPM and MNP.</p><p><b>Alternatively: -</b></p><p>Figure is symmetrical in 4 quadrants. So, let us count triangles in one of the quadrant and multiply it by 4.</p><p>In 1<sup>st</sup> quadrant: - MRV, NRW, NMA, VAZ there are 4 triangles.</p><p>So, in 4 quadrants there are 16 triangles.</p><p>Combining 2 quadrants we get 3 triangles viz. RNS, VZX and MNO.</p><p>So, total there are 12 triangles.</p><p>Total number of triangles = 16 + 12 = 28</p>",
    "question_index": 41

    "question": "<span class=\"eqt\"><p>A question is given, followed by two statements labelled I and II. Identify which of the statements is/are sufficient to answer the question.</p><p><b>Question:</b></p><p>Six persons- A, D, I, K, O and R are living in a six-storeyed building but not necessarily in the same order. The bottommost floor is 1 above that 2 and so on. On which floor does R lives?</p><p><b>Statements:</b></p><p>(I) Two floors are between I and K. D lives immediate above R. Only one person lives between O and K. A does not lives on a floor.</p><p>(II) K lives immediate below A. O lives above D but below I. Three floors are between K and R. A lives above I.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; I &#2324;&#2352; II &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2375;&#2348;&#2354; &#2325;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2342;&#2379; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;&#2404;</p><p><b>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;:</b></p><p>&#2331;&#2361; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; A, D, I, K, O &#2324;&#2352; R &#2331;&#2361; &#2350;&#2306;&#2332;&#2367;&#2354;&#2366; &#2311;&#2350;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325     "solution": "<p>Six persons- A, D, I, K, O and R are living in a six-storeyed building but not necessarily in the same order. The bottommost floor is 1 above that 2 and so on. </p><p><b>Statement I:</b> Two floors are between I and K. D lives immediate above R. Only one person lives between O and K. A does not lives on a floor.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Floor</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Person</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Person</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Person</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">O</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">K</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">K</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">O</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border  fact. The Norse had indeed reached and settled in North America, establishing a foothold, however brief, nearly 500 years before Columbus. This convergence of legendary text and scientific discovery irrevocably rewrote the history of trans-Atlantic contact.</p>",

    "comp": "<p><b>Directions :</b>Read the following passage and answer the questions based on the passage. </p><p>Non-Euclidean geometries are systems of geometry that arise from modifying or rejecting Euclid's fifth postulate, also known as the parallel postulate. For centuries, Euclidean geometry, based on the axioms formulated by the ancient Greek mathematician Euclid, dominated mathematical thought. Its fifth postulate states that given a line and a point not on it, exactly one line parallel to the given line can pass through the point. Attempts to prove this postulate from the other axioms consistently failed, leading mathematicians to explore what would happen if it were replaced or modified. This exploration gave rise to Non-Euclidean geometries, which fundamentally altered the understanding of space and mathematical structure.</p><p>There are two primary types of Non-Euclidean geometry: hyperbolic and elliptic. Hyperbolic geometry, developed by Nikolai Lobachevsky and J&#225;nos Bolyai in the 19th century, assumes that through a point not on a line, there are infinitely many lines parallel to the given line. This geometry produces a \"saddle-shaped\" space where the sum of the angles of a triangle is always less than 180 degrees. Elliptic geometry, on the other hand, assumes no parallel lines exist at all, as in the surface of a sphere, where great circles eventually intersect. In this system, the sum of the angles of a triangle exceeds 180 degrees. Both geometries are internally consistent, demonstrating that the parallel postulate is not a necessary truth but a choice that defines the nature of the space being studied.</p><p>The advent of Non-Euclidean geometries had profound implications for mathematics, physics, and philosophy. It challenged the long-held notion that Euclidean space was the only \"true\" geometry of the physical world. In the 20th century, Albert Einstein's general theory of relativity employed the concepts of curved space-time, drawin     "question": "<p>Convert the sentence provided below from its passive voice structure to an active voice structure:</p><p>By the end of the next fiscal year, the construction of the new state-of-the-art international airport will have been completed by the consortium of companies.</p>",

    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the \"to be\" verb ['been'] and the preposition \"by\" is necessary while changing the voice of the sentence from Passive to Active.</p><p>The Passive voice in this question is in <b>Past Perfect</b>. Thus, the Active voice will also be in Past Perfect.</p><p>In Passive voice, the format is: Object of the Active voice (Subjective case) + had + been + V3 + by + Subject of the Active voice (Objective case).</p><p>Thus, the format of Active voice is: Subject + had + V3 + Object.</p><p>For example:</p><p>She had been called by me. (Passive Voice)</p><p>I had called her. (Active Voice)</p><p>The options except (b) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is option (b): The previous management had already initiated a comprehensive restructuring of the entire department before the new CEO took charge.</p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 103
  },

    "question": "<p>Choose the correct direct speech form of the following sentence:</p><p>The chef explained that he prepared the marinade for the chicken and his assistant chopped all the required vegetables for the delicious continental dish simultaneously.</p>",
    "options": [
      "The chef said, \"I had prepared the marinade for the chicken and my assistant had chopped all the required vegetables for the delicious continental dish simultaneously.\"",
      "The chef explained, \"He prepared the marinade for the chicken and his assistant chopped all the required vegetables for the delicious continental dish simultaneously.\"",
      "The chef said, \"I prepared the marinade for the chicken and my assistant chopped all the required vegetables for the delicious continental dish simultaneously.\"",
      "The chef said, \"I prepare the marinade for the chicken and my assistant chops all the required vegetables for the delicious continental dish simultaneously.\""
    ],
    "correct_option_id": 2,
    "solution": "<p>If the sentence is in <b>Simple Past</b>, the form of tense doesn't change when two actions happened simultaneously.</p><p>For example:</p><p>Rekha said that she cooked the food and he set up the table. (Indirect Speech)</p><p>Rekha said, \"I cooked the food and he set up the table\". (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>'Explained that' is changed into 'said'.</p><p>'He' is changed into 'I'.</p><p>'His' is changed into 'my'.</p><p>The tense remains unchanged.</p><p>Therefore, the correct answer is: The chef said, \"I prepared the marinade for the chicken and my assistant chopped all the required vegetables for the delicious continental dish simultaneously.\"</p><p>Hence, (c) is the correct answer.</p>",
    "question_index": 104
  },

    "question": "<span class=\"eqt\"><p>Which of the following is a characteristic feature of prokaryotic cells?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2346;&#2381;&#2352;&#2379;&#2325;&#2376;&#2352;&#2367;&#2351;&#2379;&#2335;&#2367;&#2325; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2368; &#2319;&#2325; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">They have a well-defined nucleus.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2325;&#2366; &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2325; &#2360;&#2369;&#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">They contain membrane-bound organelles.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375;&#2306; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368;-&#2348;&#2342;&#2381;&#2343; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2306;&#2327; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Their DNA lies freely in the cytoplasm.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2325;&#2366; &#2337;&#2368;&#2319;&#2344;&#2319; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2342;&#2381;&#2352;&#2357;&#2381;&#2351; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2381;&#2341;&#2367;&#2340; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">They have large and complex cell structures.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375;&#2306; &#2348;&#2337;&#2364;&#2368; &#2324;&#2352; &#2332;&#2335;&#2367;&#2354; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most defining characteristic of prokaryotic cells among the given options is that their genetic material (DNA) is not enclosed within a membrane-bound nucleus but lies freely in the cytoplasm in a region called the nucleoid.</p><p>Explanation of Options:</p><p>a) They have a well-defined nucleus: This is incorrect. This is the defining feature of eukaryotic cells. Prokaryotic cells lack a true nucleus.</p><p>b) They contain membrane-bound organelles: This is incorrect. Prokaryotic cells lack membrane-bound organelles like mitochondria, Golgi apparatus, and endoplasmic reticulum. These are characteristic of eukaryotic cells.</p><p>c) Their DNA lies freely in the cytoplasm: This is the correct statement. The genetic material of a prokaryote is a single circular chromosome that is located in a region of the cytoplasm called the nucleoid. It is not separated from the rest of the cell by a nuclear membrane.</p><p>d) They have large and complex cell structures: This is incorrect. Prokaryotic cells are typically much smaller and structurally simpler than eukaryotic cells.</p><p>Further insights:</p><p>The word \"prokaryote\" comes from the Greek words pro (meaning 'before') and karyon (meaning 'nut' or 'kernel'), referring to the fact that they existed before cells with a true nucleus.</p><p>Examples of prokaryotes include bacteria and archaea.</p><p>Despite their simplicity, prokaryotes are the most abundant and widespread organisms on Earth and are incredibly diverse metabolically.</p><p></p>",
    "question_index": 106
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct?</p><p>i. Warren Hastings abolished the Dual Government in Bengal and worked under the Supreme Council created by the Regulating Act (1773).</p><p>ii. Lord Cornwallis introduced the Permanent Settlement (1793) and reorganized the civil service to curb corruption.</p><p>iii. Lord Ripon repealed the Vernacular Press Act and introduced the Ilbert Bill.</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>i. &#2357;&#2377;&#2352;&#2375;&#2344; &#2361;&#2375;&#2360;&#2381;&#2335;&#2367;&#2306;&#2327;&#2381;&#2360; &#2344;&#2375; &#2348;&#2306;&#2327;&#2366;&#2354; &#2350;&#2375;&#2306; &#2342;&#2381;&#2357;&#2376;&#2343; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2324;&#2352; &#2352;&#2375;&#2327;&#2369;&#2354;&#2375;&#2335;&#2367;&#2306;&#2327; &#2319;&#2325;&#2381;&#2335; (1773) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2366;&#2312; &#2327;&#2312; &#2360;&#2369;&#2346;&#2381;&#2352;&#2368;&#2350; &#2325;&#2366;&#2313;&#2306;&#2360;&#2367;&#2354; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2325;&#2366;&#2350; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>ii. &#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2366;&#2352;&#2381;&#2344;&#2357;&#2366;&#2354;&#2367;&#2360; &#2344;&#2375; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2348;&#2306;&#2342;&#2379;&#2348;&#2360;&#2381;&#2340; (1793) &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2368; &#2324;&#2352; &#2349;&#2381;&#2352;&#2359;&#2381;&#2335;&#2366;&#2330;&#2366;&#2352; &#2346;&#2352; &#2309;&#2306;&#2325;&#2369;&#2358; &#2354;&#2327;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2367;&#2357;&#2367;&#2354; &#2360;&#2375;&#2357;&#2366; &#2325;&#2366; &#2346;&#2369;&#2344;&#2352;&#2381;&#2327;&#2336;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>iii. &#2354;&#2377;&#2352;&#2381;&#2337; &#2352;&#2367;&#2346;&#2344; &#2344;&#2375; &#2357;&#2352;&#2381;&#2344;&#2366;&#2325;&#2381;&#2351;&#2369;&#2354;&#2352; &#2346;&#2381;&#2352;&#2375;&#2360; &#2319;&#2325;&#2381;&#2335; &#2325;&#2379; &#2344;&#2367;&#2352;&#2360;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2324;&#2352; &#2311;&#2354;&#2381;&#2348;&#2352;&#2381;&#2335; &#2348;&#2367;&#2354; &#2346;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">i and ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">ii only</span><span class=\"hqt\" style=\"display:none\">ii &#2325;&#2375;&#2357;&#2354;</span>",
      "<span class=\"eqt\">i and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All three statements are historically correct. Each one accurately pairs a significant Governor-General or Viceroy with some of their most notable administrative, economic, or legislative actions.</p><p>Explanation of Statements:</p><p>i is Correct. Warren Hastings, the first Governor-General of Bengal (1772-1785), is credited with ending the disastrous Dual Government system in Bengal that had been established by Robert Clive. The Regulating Act of 1773 was a landmark piece of legislation that attempted to bring the East India Company's affairs under the control of the British Parliament. It established the post of Governor-General of Bengal and created a Supreme Council of four members to assist (and often oppose) him, marking the beginning of centralized administration.</p><p>ii is Correct. Lord Cornwallis (Governor-General 1786-1793) introduced major reforms. His most famous economic measure was the Permanent Settlement of land revenue in Bengal in 1793, which fixed the land revenue demand in perpetuity on the zamindars. He is also regarded as the \"Father of the Civil Service in India\" for reorganizing and professionalizing the administration, separating commercial and administrative functions, and introducing measures like higher salaries to curb the widespread corruption among Company officials.</p><p>iii is Correct. Lord Ripon (Viceroy 1880-1884) is known as one of the more liberal and popular Viceroys. In 1882, he repealed the controversial Vernacular Press Act of 1878 (enacted by his predecessor, Lord Lytton), which had imposed severe restrictions on the non-English press in India. He also introduced the Ilbert Bill in 1883, which sought to remove racial discrimination by allowing Indian judges to try Europeans. Although the bill was heavily modified due to intense opposition from the European community, it was a significant, albeit failed, step towards legal equality.</p><p>Further insights:</p><p>These three figures represent different phases of British rule in India: Hastings represents the transition from a trading company to a territorial power, Cornwallis represents the consolidation of British administration, and Ripon represents a period of liberal reform within the established empire.</p><p>Lord Ripon is also celebrated for his resolution on local self-government in 1882, which is considered a key milestone in the development of municipal governance in India.</p>",
    "question_index": 107
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the below statements regarding Article 19 of the Constitution.</p><p>i. The right to form associations includes a fundamental right to strike and to be recognized by an employer.</p><p>ii. Article 19 rights are available only to citizens and not to foreign companies.</p><p>iii. Reasonable restrictions on speech may be imposed in the interests of defamation, contempt of court, and friendly relations with foreign States.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 19 &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>i. &#2360;&#2306;&#2328; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2350;&#2375;&#2306; &#2361;&#2337;&#2364;&#2340;&#2366;&#2354; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2344;&#2367;&#2351;&#2379;&#2325;&#2381;&#2340;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</p><p>ii. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 19 &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2375;&#2357;&#2354; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2361;&#2376;&#2306;, &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2361;&#2368;&#2306;&#2404;</p><p>iii. &#2350;&#2366;&#2344;&#2361;&#2366;&#2344;&#2367;, &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2309;&#2357;&#2350;&#2366;&#2344;&#2344;&#2366; &#8203;&#8203;&#2324;&#2352; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2376;&#2340;&#2381;&#2352;&#2368;&#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2348;&#2306;&#2343;&#2379;&#2306; &#2325;&#2375; &#2361;&#2367;&#2340; &#2350;&#2375;&#2306; &#2349;&#2366;&#2359;&#2339; &#2346;&#2352; &#2313;&#2330;&#2367;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2306;&#2343; &#2354;&#2327;&#2366;&#2319; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">ii and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">ii only</span><span class=\"hqt\" style=\"display:none\">ii &#2325;&#2375;&#2357;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statements ii and iii are correct. Statement i is incorrect because the Supreme Court has held that the right to strike is a legal right, not a fundamental right, and there is no fundamental right to recognition.</p><p>Explanation of Statements:</p><p>i is Incorrect. The Supreme Court of India, in various judgments, has clarified the scope of the right to form associations or unions under Article 19(1)(c). While this includes the right to form an association, it does not include a fundamental right to strike. The right to strike is a legal right that is subject to statutory restrictions (e.g., under the Industrial Disputes Act). Similarly, there is no fundamental right for an association to be recognized by the employer.</p><p>ii is Correct. The six freedoms guaranteed under Article 19-speech and expression, assembly, association, movement, residence, and profession-are explicitly available only to citizens of India. Foreigners and legal persons, such as corporations or companies, cannot claim these rights.</p><p>iii is Correct. The right to freedom of speech and expression under Article 19(1)(a) is not absolute. Article 19(2) lays down the grounds on which \"reasonable restrictions\" can be imposed on this right. These grounds include the sovereignty and integrity of India, the security of the State, friendly relations with foreign States, public order, decency or morality, contempt of court, defamation, and incitement to an offence. The statement correctly lists some of these grounds.</p><p></p>",
    "question_index": 108
  },

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true?</p><p>i. The Twelfth Plan (2012-17) was the last Five Year Plan.</p><p>ii. Five Year Plans had statutory backing from an Act of Parliament.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>i. &#2348;&#2366;&#2352;&#2361;&#2357;&#2368;&#2306; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; (2012-17) &#2309;&#2306;&#2340;&#2367;&#2350; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2341;&#2368;&#2404;</p><p>ii. &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2325;&#2379; &#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2360;&#2375; &#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only i</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only ii</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii</span>",
      "<span class=\"eqt\">Both i and ii</span><span class=\"hqt\" style=\"display:none\">i &#2324;&#2352; ii &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither i nor ii</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; i &#2324;&#2352; &#2344; &#2361;&#2368; ii</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement i is true, but statement ii is false. The Twelfth Plan was indeed the final Five-Year Plan before the system was discontinued. However, the Five-Year Plans were formulated by the Planning Commission, which was an executive, not a statutory, body.</p><p>Explanation of Statements:</p><p>i is True. The Twelfth Five-Year Plan, which ran from 2012 to 2017, was the last of its kind in India. In 2015, the Government of India dissolved the Planning Commission and replaced it with a new institution, the NITI Aayog (National Institution for Transforming India). With the dissolution of the Planning Commission, the practice of formulating centralized Five-Year Plans was brought to an end. NITI Aayog's role is that of a policy think tank, focusing on fostering cooperative federalism and developing a long-term strategic vision rather than detailed five-year resource allocations.</p><p>ii is False. The Five-Year Plans did not have statutory backing. The Planning Commission, which formulated the plans, was established in March 1950 by a resolution of the Government of India's cabinet. This means it was an executive body or a non-constitutional, non-statutory body. Its plans were policy documents approved by the cabinet and the National Development Council (NDC), but they were not laws passed by an Act of Parliament. This gave the plans significant political and economic weight but not the force of law in a legalistic sense.</p><p>Further insights:</p><p>The transition from the Planning Commission to NITI Aayog represents a major shift in India's approach to economic planning, moving from a top-down, centralized model to a more collaborative and strategic one.</p><p>The main theme of the Twelfth and final Five-Year Plan was \"Faster, More Inclusive and Sustainable Growth.\"</p><p>While the Five-Year Plans are no longer formulated, the government continues to use other planning horizons, such as the 15-year \"Vision Document,\" a 7-year \"Strategy Document,\" and a 3-year \"Action Agenda\" developed by NITI Aayog.</p>",
    "question_index": 109
  },

    "question": "<span class=\"eqt\"><p>Read the below statements marked as Assertion (A) and Reason (R). Mark the correct options:</p><p>Assertion (A): India's summer monsoon rainfall often weakens during El Nio years.</p><p>Reason (R): El Nio suppresses convection over the western Pacific and can shift the Walker circulation eastward, reducing moisture transport toward the Indian subcontinent.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A) &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; (R) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2325;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2327;&#2381;&#2352;&#2368;&#2359;&#2381;&#2350;&#2325;&#2366;&#2354;&#2368;&#2344; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366; &#2309;&#2325;&#2381;&#2360;&#2352; &#2309;&#2354; &#2344;&#2368;&#2344;&#2379; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2350;&#2332;&#2379;&#2352; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2309;&#2354; &#2344;&#2368;&#2344;&#2379; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2358;&#2366;&#2306;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2360;&#2306;&#2357;&#2361;&#2344; &#2325;&#2379; &#2342;&#2348;&#2366; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2357;&#2377;&#2325;&#2352; &#2346;&#2352;&#2367;&#2360;&#2306;&#2330;&#2352;&#2339; &#2325;&#2379; &#2346;&#2370;&#2352;&#2381;&#2357; &#2325;&#2368; &#2323;&#2352; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2313;&#2346;&#2350;&#2361;&#2366;&#2342;&#2381;&#2357;&#2368;&#2346; &#2325;&#2368; &#2323;&#2352; &#2344;&#2350;&#2368; &#2325;&#2366; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2340;&#2341;&#2366; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, but R is false.</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true.</span><span class=\"hqt\" style=\"display:none\">A &#2327;&#2354;&#2340; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Both the Assertion (A) and the Reason (R) are true, and the Reason (R) provides the correct scientific explanation for the Assertion (A). The link between El Nio and a weaker Indian monsoon is a well-established teleconnection in climate science.</p><p>Explanation of Statements:</p><p>Assertion (A) is true. There is a strong and historically documented negative correlation between El Nio events and the performance of the Indian summer monsoon. El Nio years are frequently associated with deficient or below-average rainfall over large parts of India, which can lead to drought conditions.</p><p>Reason (R) is true. This statement accurately describes the atmospheric mechanism behind El Nio's impact. El Nio is characterized by the abnormal warming of the sea surface in the central and eastern tropical Pacific Ocean. This warming shifts the region of warm, rising, moist air (convection) eastward. This disrupts the normal Walker Circulation, an atmospheric circulation cell over the tropical Pacific. The descending limb of this altered circulation, which is associated with high pressure and suppressed rainfall, tends to shift over the western Pacific and the Indian Ocean region. This change in pressure patterns weakens the monsoon winds and reduces the flow of moisture from the ocean to the Indian subcontinent.</p><p>Relationship:</p><p>The mechanism described in the Reason (R)-the eastward shift of the Walker circulation and suppression of convection in the west-is the direct cause of the weakened moisture transport that leads to the weaker monsoon rainfall mentioned in the Assertion (A). Therefore, R is the correct explanation of A.</p><p></p>",

  },

    "question": "<span class=\"eqt\"><p>Under Article 368, consider the following statements:</p><p>I. An amendment changing the manner of election of the President requires ratification by not less than half of the States.</p><p>II. An amendment altering the Seventh Schedule (e.g., adding a subject to the Concurrent List) requires ratification by not less than half of the States.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 368 &#2325;&#2375; &#2340;&#2361;&#2340;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2330;&#2369;&#2344;&#2366;&#2357; &#2325;&#2375; &#2340;&#2352;&#2368;&#2325;&#2375; &#2325;&#2379; &#2348;&#2342;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2310;&#2343;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2344;&#2369;&#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2360;&#2366;&#2340;&#2357;&#2368;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; (&#2332;&#2376;&#2360;&#2375;, &#2360;&#2350;&#2357;&#2352;&#2381;&#2340;&#2368; &#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2319;&#2325; &#2357;&#2367;&#2359;&#2351; &#2332;&#2379;&#2337;&#2364;&#2344;&#2366;) &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2310;&#2343;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2344;&#2369;&#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are correct. Both the election of the President and any change to the distribution of legislative powers in the Seventh Schedule are considered to be part of the federal structure of the Constitution. Therefore, any amendment to these provisions requires the more rigid procedure of ratification by the states in addition to a special majority in Parliament.</p><p>Explanation of Statements:</p><p>I is Correct. The procedure for the election of the President (Article 54 and 55) is one of the provisions that affects the federal character of the Constitution, as both the Union and the States participate in the election. According to Article 368(2), any amendment to these articles must be passed by a special majority in both Houses of Parliament and must also be ratified by the legislatures of not less than one-half of the states by a simple majority.</p><p>II is Correct. The Seventh Schedule contains the Union List, State List, and Concurrent List, which define the distribution of legislative powers between the Union and the States. This is a core element of India's federal system. Any amendment that seeks to alter this distribution (e.g., by moving a subject from one list to another) falls under the purview of Article 368(2) and requires the same procedure of ratification by at least half of the states after being passed by a special majority in Parliament.</p>",
    "question_index": 111
  },

    "question": "<span class=\"eqt\"><p>Which mission is a joint collaboration between ISRO and NASA, aimed at Earth observation using dual-band Synthetic Aperture Radar to monitor surface changes and natural disasters?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2367;&#2358;&#2344; &#2311;&#2360;&#2352;&#2379; &#2324;&#2352; &#2344;&#2366;&#2360;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2361;&#2351;&#2379;&#2327; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2360;&#2340;&#2361; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2324;&#2352; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2310;&#2346;&#2342;&#2366;&#2323;&#2306; &#2325;&#2368; &#2344;&#2367;&#2327;&#2352;&#2366;&#2344;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2379;&#2361;&#2352;&#2375; &#2348;&#2376;&#2306;&#2337; &#2360;&#2367;&#2306;&#2341;&#2375;&#2335;&#2367;&#2325; &#2319;&#2346;&#2352;&#2381;&#2330;&#2352; &#2352;&#2337;&#2366;&#2352; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2366; &#2309;&#2357;&#2354;&#2379;&#2325;&#2344; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Aditya-L1</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2342;&#2367;&#2340;&#2381;&#2351;-&#2319;&#2354;1</span>",
      "<span class=\"eqt\">Chandrayaan-1</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2306;&#2342;&#2381;&#2352;&#2351;&#2366;&#2344;-1</span>",
      "<span class=\"eqt\">NISAR Mission</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2360;&#2366;&#2352; &#2350;&#2367;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Mars Orbiter Mission</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354; &#2321;&#2352;&#2381;&#2348;&#2367;&#2335;&#2352; &#2350;&#2367;&#2358;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The NISAR mission is the correct answer. The name itself is an acronym for NASA-ISRO Synthetic Aperture Radar, highlighting the collaboration and the key technology of the mission.</p><p>Explanation of Options:</p><p>a) Aditya-L1: This is ISRO's dedicated mission to study the Sun. It is not a collaboration with NASA for Earth observation.</p><p>b) Chandrayaan-1: This was ISRO's first lunar probe, launched in 2008. While it carried an instrument from NASA (the Moon Mineralogy Mapper, which famously discovered water molecules on the Moon), its primary objective was lunar science, not Earth observation using SAR.</p><p>c) NISAR (NASA-ISRO Synthetic Aperture Radar): This is the correct answer. NISAR is a major collaborative Earth observation satellite being jointly developed by the National Aeronautics and Space Administration (NASA) and the Indian Space Research Organisation (ISRO). Its primary goal is to use advanced radar imaging to measure changes in Earth's ecosystems, ice mass, vegetation, sea level rise, and natural hazards like earthquakes, tsunamis, and volcanoes.</p><p>d) Mars Orbiter Mission (Mangalyaan): This was ISRO's first interplanetary mission to Mars. It was an indigenous mission, not a joint collaboration with NASA for this specific purpose.</p><p>Further insights:</p><p>Dual-Band Radar: NISAR is unique because it will be the first satellite to use two different radar frequencies (L-band and S-band) to measure changes in our planet's surface. NASA is providing the L-band SAR, while ISRO is providing the S-band SAR and the spacecraft bus.</p><p>Scientific Goals: By repeatedly imaging the Earth's surface with high resolution, NISAR will provide unprecedented data on land surface deformation, ice sheet collapse, and ecosystem changes, which are crucial for understanding climate change and managing disasters.</p><p>The mission is scheduled for launch from India, and it represents a significant milestone in the partnership between the two space agencies.</p>",
    "question_index": 112
  },

    "question": "<span class=\"eqt\"><p>The Waqf (Amendment) Act, 2025, which received Presidential assent on April 5, 2025, primarily amends which previous legislation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2325;&#2381;&#2347; (&#2360;&#2306;&#2358;&#2379;&#2343;&#2344;) &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 2025, &#2332;&#2367;&#2360;&#2375; 5 &#2309;&#2346;&#2381;&#2352;&#2376;&#2354;, 2025 &#2325;&#2379; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; &#2360;&#2381;&#2357;&#2368;&#2325;&#2371;&#2340;&#2367; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2312;, &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2370;&#2352;&#2381;&#2357;&#2357;&#2352;&#2381;&#2340;&#2368; &#2325;&#2366;&#2344;&#2370;&#2344; &#2350;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The Waqf Act, 1955</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2325;&#2381;&#2347; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1955</span>",
      "<span class=\"eqt\">The Waqf Act, 1995</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2325;&#2381;&#2347; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1995</span>",
      "<span class=\"eqt\">The Dargah Khwaja Saheb Act, 1955</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2352;&#2327;&#2366;&#2361; &#2326;&#2381;&#2357;&#2366;&#2332;&#2366; &#2360;&#2366;&#2361;&#2348; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1955</span>",
      "<span class=\"eqt\">The Mussalman Wakf Act, 1923</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2360;&#2354;&#2350;&#2366;&#2344; &#2357;&#2325;&#2381;&#2347; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1923</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Waqf (Amendment) Act, 2025, is a significant piece of legislation aimed at reforming the administration of Waqf properties. It specifically introduces changes to the framework established by the Waqf Act of 1995, intending to improve the regulation, prevent encroachment, and ensure better management of these properties.</p><p><b>Further Insight:</b></p><p>A 'Waqf' is a permanent dedication of movable or immovable properties for religious, pious, or charitable purposes as recognized by Muslim law. The Waqf Act, 1995, provides the legal framework for the administration of these properties through state-level Waqf Boards. The 2025 amendment, also known as the UMEED Act, seeks to address long-standing issues of corruption, mismanagement, and illegal transfer of Waqf lands.</p>",
    "question_index": 113
  },
