  {
    "question": "<span class=\"eqt\"><p>The value of the expression &radic;7  - &radic;(12 - 2&radic;35) is closest to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &radic;7 - &radic;(12 - 2&radic;35) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2360;&#2325;&#2375; &#2344;&#2367;&#2325;&#2335; &#2361;&#2376;?</p></span>",
    "options": [

    "correct_option_id": 1,
    "solution": "<p><img width=112 height=27 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13744/image098.gif\"></p><p><img width=249 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13744/image099.gif\"></p><p><img width=127 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13744/image100.gif\"></p><p><img width=100 height=23 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13744/image101.gif\"></p><p><img width=35 height=23 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13744/image102.gif\"></p><p><img width=44 height=17 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13744/image103.gif\"></p><p>The value is close to 2.2</p>",

  {
    "question": "<span class=\"eqt\"><p>The ratio of efficiency of Sunita to that of Vinita is 2: 1 and Sunita and Vinita together can complete the whole work in 20 days. If Radha is 50% more efficient than Sunita, then which of the following statement is true regarding Radha?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2369;&#2344;&#2368;&#2340;&#2366; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2324;&#2352; &#2357;&#2367;&#2344;&#2368;&#2340;&#2366; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2 : 1 &#2361;&#2376; &#2340;&#2341;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2369;&#2344;&#2368;&#2340;&#2366; &#2324;&#2352; &#2357;&#2367;&#2344;&#2368;&#2340;&#2366; &#2346;&#2370;&#2352;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 20 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2352;&#2366;&#2343;&#2366;, &#2360;&#2369;&#2344;&#2368;&#2340;&#2366; &#2360;&#2375; 50% &#2309;&#2343;&#2367;&#2325; &#2325;&#2369;&#2358;&#2354; &#2361;&#2376;, &#2340;&#2379; &#2352;&#2366;&#2343;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Radha alone can complete the whole work in 20 days</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2375;&#2354;&#2375; &#2352;&#2366;&#2343;&#2366; &#2346;&#2370;&#2352;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 20 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Radha alone can complete the whole work in 15 days</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2375;&#2354;&#2375; &#2352;&#2366;&#2343;&#2366; &#2346;&#2370;&#2352;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 15 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Radha alone can complete the whole work in 25 days</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2375;&#2354;&#2375; &#2352;&#2366;&#2343;&#2366; &#2346;&#2370;&#2352;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 25 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Radha alone can complete the whole work in 30 days</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2375;&#2354;&#2375; &#2352;&#2366;&#2343;&#2366; &#2346;&#2370;&#2352;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 30 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let Vinita take 2x days to complete the work alone, then Sunita will take x days to complete the work alone.</p><p>So, from the question,</p><p>1/2x + 1/x = 1/20</p><p>=&gt; (1 + 2)/2x = 1/20</p><p>=&gt; 3/x = 1/10</p><p>=&gt; x = 30</p><p>So, time in which Radha alone can complete the whole work = 1/(1/30 * 150/100) = 30 * 100/150 = 20 days</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What will be the cost of tiling a 1.5m deep and 5m  X  10m rectangular swimming pool at rate of Rs.800/m<sup>2</sup>. Base area of the pool is 50m<sup>2</sup></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2381;&#2357;&#2367;&#2350;&#2367;&#2306;&#2327; &#2346;&#2370;&#2354; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 50m<sup>2</sup> &#2361;&#2376;, &#2340;&#2379; &#2352;&#2369;. 800/m<sup>2</sup> &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 1.5m &#2327;&#2361;&#2352;&#2375; &#2324;&#2352; 5m X 10m &#2310;&#2325;&#2366;&#2352; &#2357;&#2366;&#2354;&#2375; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2360;&#2381;&#2357;&#2367;&#2350;&#2367;&#2306;&#2327; &#2346;&#2370;&#2354; &#2346;&#2352; &#2335;&#2366;&#2311;&#2354; &#2354;&#2327;&#2366;&#2344;&#2375; &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.96000</span><span class=\"hqt\" style=\"display:none\">96000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs.76000</span><span class=\"hqt\" style=\"display:none\">76000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs.86000</span><span class=\"hqt\" style=\"display:none\">86000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs.66000</span><span class=\"hqt\" style=\"display:none\">66000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Base area of the pool = 5  X  10 = 50m<sup>2</sup></p><p>Area of walls = (2 X 5 X 1.5 + 2 X 10 X 1.5) = 45m<sup>2</sup></p><p>Cost of tiling the pool = (50+45)  X  800 = Rs.76000</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p><span>I</span><span>f G is centroid and AD, BE, CF are three medians of &#9651; ABC with area 108 cm&#178;, then the area of &#9651;BDG is:</span></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; G &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2325; &#2361;&#2376; &#2324;&#2352; AD, BE, CF &#9651;ABC &#2325;&#2368; &#2340;&#2368;&#2344; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 108 cm&#178; &#2361;&#2376;, &#2340;&#2379; &#9651;BDG &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">24 sq. cm</span><span class=\"hqt\" style=\"display:none\">24 sq. cm</span>",
      "<span class=\"eqt\">16 sq. cm</span><span class=\"hqt\" style=\"display:none\">16 sq. cm</span>",
      "<span class=\"eqt\">28 sq. cm</span><span class=\"hqt\" style=\"display:none\">28 sq. cm</span>",
      "<span class=\"eqt\">18 sq. cm</span><span class=\"hqt\" style=\"display:none\">18 sq. cm</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Area of &#9651; BDG = (1/6) * Area of &#9651;ABC</p><p>Area of &#9651; BDG = 108/6 = 18 sq. cm</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>How many numbers from 150 to 200 are divisible by 2 or 3?</p></span><span class=\"hqt\" style=\"display:none\"><p>150 &#2360;&#2375; 200 &#2340;&#2325; &#2325;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; 2 &#2351;&#2366; 3 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">33</span><span class=\"hqt\" style=\"display:none\">33</span>",
      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>",
      "<span class=\"eqt\">34</span><span class=\"hqt\" style=\"display:none\">34</span>",
      "<span class=\"eqt\">32</span><span class=\"hqt\" style=\"display:none\">32</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Total numbers from 150 to 200, divisible by 2 = [(200 - 150)/2] + 1 = 26</p><p>Total number from 150 to 200, divisible by 3 but not by 2 = [(195 - 153)/6] + 1 = 8</p><p>Required answer = 26 + 8 = 34</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A man going away from a lighthouse at a speed of 4&radic;3 m/s. He observes that it takes him 1 minute to change the angle of elevation of the top of the lighthouse from 60&deg; to 30&deg;. What is the height (in m) of the lighthouse?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2342;&#2350;&#2368; 4&radic;3 m/s &#2325;&#2368; &#2360;&#2381;&#2346;&#2368;&#2337; &#2360;&#2375; &#2319;&#2325; &#2354;&#2366;&#2311;&#2335;&#2361;&#2366;&#2313;&#2360; &#2360;&#2375; &#2342;&#2370;&#2352; &#2332;&#2366; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404; &#2357;&#2361; &#2342;&#2375;&#2326;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2354;&#2366;&#2311;&#2335;&#2361;&#2366;&#2313;&#2360; &#2325;&#2375; &#2335;&#2377;&#2346; &#2325;&#2366; &#2319;&#2354;&#2367;&#2357;&#2375;&#2358;&#2344; &#2319;&#2306;&#2327;&#2354; 60&deg; &#2360;&#2375; 30&deg; &#2348;&#2342;&#2354;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; 1 &#2350;&#2367;&#2344;&#2335; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;&#2404; &#2354;&#2366;&#2311;&#2335;&#2361;&#2366;&#2313;&#2360; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; (&#2350;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">320 m</span><span class=\"hqt\" style=\"display:none\">320 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">310 m</span><span class=\"hqt\" style=\"display:none\">310 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">340 m</span><span class=\"hqt\" style=\"display:none\">340 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">360 m</span><span class=\"hqt\" style=\"display:none\">360 &#2350;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let, the height of the lighthouse be h meters.</p><p>Let, the initial horizontal distance be x meters.</p><p>Distance travelled = 4&radic;3  X  60 = 240&radic;3 m</p><p>New horizontal distance = (x + 240&radic;3) m</p><p>tan 60&deg; = h / x</p><p>&radic;3 = h / x</p><p>x = h / &radic;3 ..... (i)</p><p>tan 30&deg; = h / (x + 240&radic;3)</p><p>1 / &radic;3 = h / (x + 240&radic;3)</p><p>x + 240&radic;3 = h&radic;3 ..... (ii)</p><p>Substituting (i) into (ii),</p><p>h/&radic;3 + 240&radic;3 = h&radic;3</p><p>240&radic;3 = h (&radic;3 &#8722; 1/&radic;3)</p><p>240&radic;3 = h  X  (2/&radic;3)</p><p>240  X  3 = 2h</p><p>h = 360 m</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Two circles touch each other externally; the distance between their centres is 12 cm and the sum of their areas (in cm<sup>2</sup>) is 74&#960;. What is the radius of the smaller circle(in cm)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2348;&#2366;&#2361;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;; &#2313;&#2344;&#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 12 cm &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; (cm<sup>2 </sup>&#2350;&#2375;&#2306;) 74&#960; &#2361;&#2376;&#2404; &#2331;&#2379;&#2335;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; (cm &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2.8</span><span class=\"hqt\" style=\"display:none\">2.8</span>",
      "<span class=\"eqt\">4.5</span><span class=\"hqt\" style=\"display:none\">4.5</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let radius of the smaller circle = r</p><p>Radius of the larger circle = 12  -  r</p><p>Sum of areas = 74&#960;</p><p>&#928;r<sup>2</sup> + &#960;(12 - r)<sup>2</sup> = 74&#960;</p><p>r<sup>2</sup> + 144 + r<sup>2</sup>  -  24r = 74</p><p>2r<sup>2</sup>  -  24r + 70 = 0</p><p>(r  -  7)(r  -  5) = 0</p><p>r = 5, 7</p><p>Hence, the radius of the smaller circle = 5cm</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The value of [cot<sup>2</sup>44&deg; - sin<sup>2</sup>46&deg;]cosec<sup>2</sup>46&deg;tan<sup>2</sup>44&deg; is:</p></span><span class=\"hqt\" style=\"display:none\"><p>[cot<sup>2</sup>44&deg; - sin<sup>2</sup>46&deg;]cosec<sup>2</sup>46&deg;tan<sup>2</sup>44&deg; &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</p></span>",

    "question": "<span class=\"eqt\"><p>A marksman has probability 4/9 of hitting a target. He fires 6 shots. What is the probability that he hits exactly 3 times?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2344;&#2367;&#2358;&#2366;&#2344;&#2375;&#2348;&#2366;&#2332; &#2325;&#2375; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2325;&#2379; &#2349;&#2375;&#2342;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; 4/9 &#2361;&#2376;&#2404; &#2357;&#2361; 6 &#2327;&#2379;&#2354;&#2367;&#2351;&#2366;&#2306; &#2330;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2336;&#2368;&#2325; 3 &#2348;&#2366;&#2352; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2349;&#2375;&#2342;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [

    "question": "<span class=\"eqt\"><p>A train can travel a certain distance in 16 hours. If the speed of the train is increased by 1/15th time, then the train will cover 96 km more in that same time. Find the original speed (in km/h) of the train.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2335;&#2381;&#2352;&#2375;&#2344; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2370;&#2352;&#2368; 16 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2335;&#2381;&#2352;&#2375;&#2344; &#2325;&#2368; &#2330;&#2366;&#2354; &#2350;&#2375;&#2306; 1/15 &#2327;&#2369;&#2344;&#2366; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2335;&#2381;&#2352;&#2375;&#2344; &#2360;&#2350;&#2366;&#2344; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; 96 km &#2309;&#2343;&#2367;&#2325; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2375;&#2327;&#2368;&#2404; &#2335;&#2381;&#2352;&#2375;&#2344; &#2325;&#2368; &#2350;&#2370;&#2354; &#2330;&#2366;&#2354; (km/h &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">96 km/h</span><span class=\"hqt\" style=\"display:none\">96 km/h</span>",
      "<span class=\"eqt\">108 km/h</span><span class=\"hqt\" style=\"display:none\">108 km/h</span>",
      "<span class=\"eqt\">90 km/h</span><span class=\"hqt\" style=\"display:none\">90 km/h</span>",
      "<span class=\"eqt\">112 km/h</span><span class=\"hqt\" style=\"display:none\">112 km/h</span>"

    "correct_option_id": 2,
    "solution": "<p>Let the speed of the train be '15a' km/h.</p><p>Distance = Speed * Time</p><p>Distance, when original speed = 15a * 16</p><p>Distance, when speed increases = 15a * 16/15 * 16 = 16a * 16</p><p>Difference between both distances = 96</p><p>16a * 16  -  15a * 16 = 96</p><p>16a = 96</p><p>a = 6</p><p>Hence, the original speed = 15 * 6 = 90 km/h</p>",

    "solution": "<p>Let n = 5, data x<sub>i</sub>: 1, 7, 10, 13, 19</p><p>Mean formula: <b>x&#772;</b> = (&#931;x<sub>i</sub>) / n</p><p><b>x&#772;</b> = (1 + 7 + 10 + 13 + 19) / 5 = 50 / 5 = 10</p><p>Compute (x<sub>i</sub> &#8722;<b> x&#772;</b>)<sup>2</sup>:</p><p>(1 &#8722; 10)<sup>2</sup> = 9<sup>2</sup> = 81</p><p>(7 &#8722; 10)<sup>2</sup> = 3<sup>2</sup> = 9</p><p>(10 &#8722; 10)<sup>2</sup> = 0<sup>2</sup> = 0</p><p>(13 &#8722; 10)<sup>2</sup> = 3<sup>2</sup> = 9</p><p>(19 &#8722; 10)<sup>2</sup> = 9<sup>2</sup> = 81</p><p>&#931;(x<sub>i</sub> &#8722; <b>x&#772;</b>)<sup>2</sup> = 81 + 9 + 0 + 9 + 81 = 180</p><p>Population variance formula: variance = &#931;(x<sub>i</sub> &#8722; <b>x&#772;</b>)<sup>2</sup> / n</p><p>variance = 180 / 5 = 36</p><p>Standard deviation formula: &#963; = &radic;variance</p><p>&#963; = &radic;36 = 6</p><p>Express solution:</p><p>Deviations from 10 are &#8722;9, &#8722;3, 0, 3, 9 (symmetric)</p><p>Sum of squares = 2(9<sup>2</sup> + 3<sup>2</sup>) + 0 = 2(81 + 9) = 180</p><p>variance = 180/5 = 36 =&gt; &#963; = 6</p>",
    "question_index": 17
  },

    "question": "<span class=\"eqt\"><p>A cone has a slant height of 20 cm. If its lateral surface area is 320&#960; cm<sup>2</sup>, find its volume in cm<sup>3</sup>.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2340;&#2367;&#2352;&#2331;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 20 cm &#2361;&#2376;&#2404; &#2309;&#2327;&#2352; &#2311;&#2360;&#2325;&#2366; &#2354;&#2375;&#2335;&#2352;&#2354; &#2360;&#2352;&#2347;&#2375;&#2360; &#2319;&#2352;&#2367;&#2351;&#2366; 320&#960; cm&#178; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2366; &#2357;&#2377;&#2354;&#2381;&#2351;&#2370;&#2350; cm&ge; &#2350;&#2375;&#2306; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Which of the following statement is true?</p><p>I. (-72)<sup>18</sup> + (-73)<sup>27 </sup>is negative.</p><p>II. (-83)<sup>34</sup>  -  (-83)<sup>17</sup> is negative.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p><p>I. (-72)<sup>18</sup> + (-73)<sup>27 </sup>&#2315;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325; &#2361;&#2376;&#2404;</p><p><sup></sup></p><p>II. (-83)<sup>34</sup> - (-83)<sup>17</sup> &#2315;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>I. If power of a negative number is even, then its value will be positive. So, (-72)<sup>18</sup> is positive. Similarly, if power of a negative number is odd, then its value will be negative. So, (-73)<sup>27</sup> is negative.</p><p>Now, numerical value of (-72)<sup>18</sup> is less than numerical value of (-73)<sup>27</sup>. When a large number is subtracted from a small number, then the value obtained is negative. So, (-72)<sup>18</sup> + (-73)<sup>27 </sup>is negative.</p><p>Hence, this statement is correct.</p><p>II. If power of a negative number is even, then its value will be positive. So, (-83)<sup>34</sup> is positive. Similarly, if power of a negative number is odd, then its value will be negative. So, (-83)<sup>17</sup> is negative.</p><p>Now, numerical value of (-83)<sup>34 </sup>is more than the numerical value of (-83)<sup>17</sup>. When a negative number is subtracted from a positive number, then the value obtained is positive. So, (-83)<sup>34</sup>  -  (-83)<sup>17 </sup>is positive.</p><p>Hence, this statement is wrong.</p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>The population of a village is 6000. The next year, the number of male increases by 10% and the number of female increases by 20% and the population becomes 6840. What is the initial population of Male?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2366;&#2305;&#2357; &#2325;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 6000 &#2361;&#2376;&#2404; &#2309;&#2327;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359;, &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; 10% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; 20% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 6840 &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3600</span><span class=\"hqt\" style=\"display:none\">3600</span>",
      "<span class=\"eqt\">4800</span><span class=\"hqt\" style=\"display:none\">4800</span>",
      "<span class=\"eqt\">1200</span><span class=\"hqt\" style=\"display:none\">1200</span>",
      "<span class=\"eqt\">2400</span><span class=\"hqt\" style=\"display:none\">2400</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the initial population of Males and Females be 100x and 100y respectively.</p><p>Given, 100x + 100y = 6000</p><p>=&gt; x + y = 60..(i)</p><p>And, 110x + 120y = 6840</p><p>=&gt; 11x + 12y = 684..(ii)</p><p>12*(i)  -  (ii), gives</p><p>x = 36</p><p>Initial population of Males = 3600</p>",
    "question_index": 27

    "question": "<span class=\"eqt\"><p>A tank can be filled by pipe A in 3 hours and pipe B in 5 hours. At 11 am pipe A was opened. At what time will the tank be filled if pipe B is opened at 12 pm?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 3 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 5 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344; 11 &#2348;&#2332;&#2375; &#2346;&#2366;&#2311;&#2346; A &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; B &#2325;&#2379; &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 12 &#2348;&#2332;&#2375; &#2326;&#2379;&#2354;&#2366; &#2327;&#2351;&#2366;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; &#2325;&#2367;&#2360; &#2360;&#2350;&#2351; &#2340;&#2325; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 pm</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 1</span>",
      "<span class=\"eqt\">12: 45 pm</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 12 : 45</span>",
      "<span class=\"eqt\">1: 15 pm</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 1 : 15</span>",
      "<span class=\"eqt\">1: 30 pm</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 1 : 30</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the total capacity of tank = LCM of 3 and 5 = 15 units</p><p>Efficiency of pipe A = 15/3 = 5 units per hour</p><p>Efficiency of pipe B = 15/5 = 3 units per hour</p><p>Part of tank filled by pipe A in one hour = 1 * 5 = 5 units</p><p>Remaining part of tank that will be filled by both pipes = 15  -  5 = 10 units</p><p>Time taken by pipe A and B to fill 10 units = 10/8 = 5/4 hours = 1 hour 15 min</p><p>Required time = 11 am + 1 hour + 1 hour 15 min = 1: 15 pm.</p>",
    "question_index": 28
  },

    "question": "<span class=\"eqt\"><p>The mean and mode of a frequency distribution are in the ratio of 4:5 respectively. If the median of the frequency distribution is 104, then find the mode of the frequency distribution.</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351; &#2324;&#2352; &#2348;&#2361;&#2369;&#2354;&#2325; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 4:5 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2368; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; 104 &#2361;&#2376;, &#2340;&#2379; &#2348;&#2361;&#2369;&#2354;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">116</span><span class=\"hqt\" style=\"display:none\">116</span>",
      "<span class=\"eqt\">108</span><span class=\"hqt\" style=\"display:none\">108</span>",
      "<span class=\"eqt\">120</span><span class=\"hqt\" style=\"display:none\">120</span>",
      "<span class=\"eqt\">128</span><span class=\"hqt\" style=\"display:none\">128</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let mean and mode of the frequency distribution are 4m and 5m respectively.</p><p>Median = 104</p><p>Mode = 3 * median  -  2 * mean</p><p>5m = 3 * 104  -  2 * 4m</p><p>13m = 312</p><p>m = 24 </p><p>Hence, mode of the frequency distribution = 5 * 24 = 120</p>",

    "question": "<span class=\"eqt\"><p>The '&amp;' represents a set of calculations that are common across all the equations. Identify the calculation involved and solve the fourth equation on the same basis:</p><p>7 &amp; 9 = 137</p><p>5 &amp; 6 = 61</p><p>8 &amp; 4 = 40</p><p>a &amp; b = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&' &#2313;&#2344; &#2327;&#2339;&#2344;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2360;&#2349;&#2368; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306;&#2404; &#2311;&#2360;&#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2327;&#2339;&#2344;&#2366; &#2325;&#2379; &#2346;&#2361;&#2330;&#2366;&#2344;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360;&#2368; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2330;&#2380;&#2341;&#2375; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2361;&#2354; &#2325;&#2352;&#2375;&#2306;:</p><p>7 & 9 = 137</p><p>5 & 6 = 61</p><p>8 & 4 = 40</p><p>a & b = ?</p></span>",
    "options": [
      "<span class=\"eqt\">(a + b)b - a</span><span class=\"hqt\" style=\"display:none\">(a + b)b - a</span>",
      "<span class=\"eqt\">(a - b)b + a</span><span class=\"hqt\" style=\"display:none\">(a - b)b + a</span>",
      "<span class=\"eqt\">(a + b)a - b</span><span class=\"hqt\" style=\"display:none\">(a + b)a - b</span>",
      "<span class=\"eqt\">(a - b)a + b</span><span class=\"hqt\" style=\"display:none\">(a - b)a + b</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>7 &amp; 9 = (7 + 9)9  -  7 = 16 x 9  -  7 = 144  -  7 = 137</p><p>5 &amp; 6 = (5+6)6  -  5 = 11 x 6  -  5 = 66  -  5 = 61</p><p>8 &amp; 4 = (8 + 4)4  -  8 = 12 x 4  -  8 = 48  -  8 = 40</p><p>a &amp; b = (a + b)b - a</p><p>So, option (a) is the correct answer.</p>",
    "question_index": 31

    "question": "<span class=\"eqt\"><p>'P(n X m)Q' means 'P stands (n X m)&#8239;km east of Q.'</p><p>'P(n&div;m)Q' means 'P stands (n&div;m)&#8239;km south of Q.'</p><p>'P(n - m)Q' means 'P stands (n - m)&#8239;km west of Q.'</p><p>'P!Q!R' means 'Points P, Q and R form an isosceles right triangle with right angle at Q.'</p><p>If W(2 X 2)V;&#8194;V(4&div;1)U;&#8194;X(3 - 1)W;&#8194;U!V!W, then what is the length of WU?</p></span><span class=\"hqt\" style=\"display:none\"><p>'P(n X m)Q' &#2325;&#2366; &#2350;&#2340;&#2354;&#2348; &#2361;&#2376; 'P, Q &#2360;&#2375; (n X m) &#2325;&#2367;&#2350;&#2368; &#2346;&#2370;&#2352;&#2381;&#2357; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404;'</p><p>'P(n&div;m)Q' &#2325;&#2366; &#2350;&#2340;&#2354;&#2348; &#2361;&#2376; 'P, Q &#2360;&#2375; (n&div;m) &#2325;&#2367;&#2350;&#2368; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404;'</p><p>'P(n - m)Q' &#2325;&#2366; &#2350;&#2340;&#2354;&#2348; &#2361;&#2376; 'P, Q &#2360;&#2375; (n - m) &#2325;&#2367;&#2350;&#2368; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404;'</p><p>'P!Q!R' &#2325;&#2366; &#2350;&#2340;&#2354;&#2348; &#2361;&#2376; '&#2346;&#2377;&#2311;&#2306;&#2335; P, Q &#2324;&#2352; R &#2350;&#2367;&#2354;&#2325;&#2352; &#2319;&#2325; &#2360;&#2350;&#2342;&#2381;&#2357;&#2367;&#2348;&#2366;&#2361;&#2369; &#2360;&#2350;&#2325;&#2379;&#2339; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2348;&#2344;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2367;&#2360;&#2325;&#2366; &#2360;&#2350;&#2325;&#2379;&#2339; Q &#2346;&#2352; &#2361;&#2376;&#2404;'</p><p>&#2309;&#2327;&#2352; W(2 X 2)V; V(4&div;1)U; X(3 - 1)W; U!V!W &#2361;&#2376;, &#2340;&#2379; WU &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">8&#8239;km</span><span class=\"hqt\" style=\"display:none\">8 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">2&radic;2&#8239;km</span><span class=\"hqt\" style=\"display:none\">2&frac12; &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">4&radic;2&#8239;km</span><span class=\"hqt\" style=\"display:none\">4&deg;2&deg;&#2325;&#2367;&#2350;&#2368;</span>"

    "correct_option_id": 3,
    "solution": "<p>Given expression:</p><p>W(2 X 2)V;&#8194;V(4&div;1)U;&#8194;X(3 - 1)W;&#8194;U!V!W</p><p>W(2 X 2)V means W stands 4km east of V</p><p>V(4&div;1)U means V stands 4km south of U</p><p>X(3 - 1)W means X stands 2km west of W</p><p>U!V!W means 'Points U, V and W form an isosceles right triangle with right angle at V.</p><p><img width=401 height=273 id=\"Picture 42\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28877/image005.png\"></p><p>WU<sup>2</sup> = 4<sup>2</sup> + 4<sup>2</sup> = 16 + 16 = 32</p><p>=> WU = &#8730;(16  2)</p><p>=> WU = 4&#8730;2 km</p>",

    "question": "<span class=\"eqt\"><p>Some problem or solution of the problem is given in the statement. You have to choose the appropriate logical deduction for given statement.</p><p>Statement:</p><p>A retailer replaced plastic mailers with biodegradable packaging for online deliveries. After the switch, the company reported a clear reduction in non-degradable waste volume, but the percentage of customers who properly segregated waste did not improve. Experts recommend adding disposal instructions and running short awareness prompts at checkout.</p><p>Conclusions:</p><p>I. Switching to biodegradable packaging will reduce non-degradable waste volume.</p><p>II. Awareness prompts will surely make all customers segregate waste correctly.</p><p>III. Customer segregation improved after the packaging change.</p><p>Which conclusion(s) necessarily follow(s)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2325;&#2379;&#2312; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2351;&#2366; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2325;&#2366; &#2360;&#2350;&#2366;&#2343;&#2366;&#2344; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2310;&#2346;&#2325;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2330;&#2369;&#2344;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>&#2319;&#2325; &#2326;&#2369;&#2342;&#2352;&#2366; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2344;&#2375; &#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2337;&#2367;&#2354;&#2368;&#2357;&#2352;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2335;&#2367;&#2325; &#2350;&#2375;&#2354;&#2352; &#2325;&#2379; &#2348;&#2366;&#2351;&#2379;&#2337;&#2367;&#2327;&#2381;&#2352;&#2375;&#2337;&#2375;&#2348;&#2354; &#2346;&#2376;&#2325;&#2375;&#2332;&#2367;&#2306;&#2327; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366;&#2404; &#2311;&#2360; &#2348;&#2342;&#2354;&#2366;&#2357; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2325;&#2306;&#2346;&#2344;&#2368; &#2344;&#2375; &#2327;&#2376;&#2352;-&#2348;&#2366;&#2351;&#2379;&#2337;&#2367;&#2327;&#2381;&#2352;&#2375;&#2337;&#2375;&#2348;&#2354; &#2325;&#2330;&#2352;&#2375; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2325;&#2350;&#2368; &#2342;&#2352;&#2381;&#2332; &#2325;&#2368;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2325;&#2330;&#2352;&#2375; &#2325;&#2379; &#2336;&#2368;&#2325; &#2360;&#2375; &#2309;&#2354;&#2327; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2327;&#2381;&#2352;&#2366;&#2361;&#2325;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2344;&#2361;&#2368;&#2306; &#2348;&#2338;&#2364;&#2366;&#2404; &#2357;&#2367;&#2358;&#2375;&#2359;&#2332;&#2381;&#2334; &#2330;&#2375;&#2325;&#2310;&#2313;&#2335; &#2325;&#2375; &#2360;&#2350;&#2351; &#2344;&#2367;&#2346;&#2335;&#2366;&#2344; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2324;&#2352; &#2360;&#2306;&#2325;&#2381;&#2359;&#2367;&#2346;&#2381;&#2340; &#2332;&#2366;&#2327;&#2352;&#2370;&#2325;&#2340;&#2366; &#2360;&#2306;&#2342;&#2375;&#2358; &#2330;&#2354;&#2366;&#2344;&#2375; &#2325;&#2368; &#2360;&#2354;&#2366;&#2361; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>I. &#2348;&#2366;&#2351;&#2379;&#2337;&#2367;&#2327;&#2381;&#2352;&#2375;&#2337;&#2375;&#2348;&#2354; &#2346;&#2376;&#2325;&#2375;&#2332;&#2367;&#2306;&#2327; &#2346;&#2352; &#2360;&#2381;&#2357;&#2367;&#2330; &#2325;&#2352;&#2344;&#2375; &#2360;&#2375; &#2327;&#2376;&#2352;-&#2348;&#2366;&#2351;&#2379;&#2337;&#2367;&#2327;&#2381;&#2352;&#2375;&#2337;&#2375;&#2348;&#2354; &#2325;&#2330;&#2352;&#2375; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;&#2404;</p><p>II. &#2332;&#2366;&#2327;&#2352;&#2370;&#2325;&#2340;&#2366; &#2360;&#2306;&#2342;&#2375;&#2358; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2349;&#2368; &#2327;&#2381;&#2352;&#2366;&#2361;&#2325;&#2379;&#2306; &#2325;&#2379; &#2325;&#2330;&#2352;&#2375; &#2325;&#2379; &#2360;&#2361;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2309;&#2354;&#2327; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2327;&#2375;&#2404;</p><p>III. &#2346;&#2376;&#2325;&#2375;&#2332;&#2367;&#2306;&#2327; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2366;&#2357; &#2325;&#2375; &#2348;&#2366;&#2342; &#2327;&#2381;&#2352;&#2366;&#2361;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2330;&#2352;&#2375; &#2325;&#2379; &#2309;&#2354;&#2327; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2361;&#2369;&#2310;&#2404;</p><p>&#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2325;&#2354;&#2340;&#2366; &#2361;&#2376;/&#2346;&#2338;&#2364;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",

      "<span class=\"eqt\">Only I and III follow</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2350;&#2376;&#2306; &#2324;&#2352; &#2340;&#2368;&#2360;&#2352;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only I follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2350;&#2376;&#2306; &#2361;&#2368; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2370;&#2305;</span>",
      "<span class=\"eqt\">Only II and III follow</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III &#2361;&#2368; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>"

    "solution": "<p>Conclusion I: <b>Switching to biodegradable packaging will reduce non-degradable waste volume.</b></p><p>The statement explicitly says that after the switch, the company reported a clear reduction in non-degradable waste volume. So, conclusion I necessarily follows.</p><p>Conclusion II: <b>Awareness prompts will surely make all customers segregate waste correctly.</b></p><p>The statement only says experts recommend adding awareness prompts. There is no guarantee stated, and words like 'surely' and 'all customers' are extreme. So, conclusion II does not follow.</p><p>Conclusion III: <b>Customer segregation improved after the packaging change.</b></p><p>The statement clearly says that the percentage of customers who properly segregated waste did not improve. So, Conclusion III does not follow.</p>",

    "question": "<span class=\"eqt\"><p>A $ B means A is the father of B; A @ B means A is the daughter of B; A # B means A is the husband of B. Which expression shows that B is the son-in-law of A?</p></span><span class=\"hqt\" style=\"display:none\"><p>A $ B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; A, B &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;; A @ B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; A, B &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;; A # B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; A, B &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;&#2404; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; B, A &#2325;&#2366; &#2342;&#2366;&#2350;&#2366;&#2342; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">B # P @ A</span><span class=\"hqt\" style=\"display:none\">B # P @ A</span>",
      "<span class=\"eqt\">P # B @ A</span><span class=\"hqt\" style=\"display:none\">P # B @ A</span>",
      "<span class=\"eqt\">B @ P # A</span><span class=\"hqt\" style=\"display:none\">B @ P # A</span>",
      "<span class=\"eqt\">B # A @ P</span><span class=\"hqt\" style=\"display:none\">B # A @ P</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>B # P: B is the husband of P</p><p>P @ A: P is the daughter of A</p><p>Thus, B is husband of A's daughter = A's son-in-law</p><p><img width=502 height=282 id=image11.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p30245/image024.jpg\"></p><p>Hence, expression <b>B # P @ A</b> implies that B is the son-in-law of A.</p>",

    "question": "<span class=\"eqt\"><p>A question is given, followed by two statements labelled I and II. Identify which of the statements is/are sufficient to answer the question.</p><p><b>Question:</b></p><p>Eight persons- A, B, C, D, E, F, G and H are sitting around a square table facing the centre. Four persons are sitting at the corner of the table and four persons are sitting at the middle side of the table. ______ sits third to the left of C.</p><p><b>Statements:</b></p><p>I. B sits third to the left of G. A sits second to the right of H but not in the middle of the table. B is an immediate neighbour of H.</p><p>II. F sits third to the left of A. C sits immediate right of D. C sits adjacent to F. D does not sit at the corner of the table.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; I &#2324;&#2352; II &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2375;&#2348;&#2354; &#2325;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;&#2404;</p><p><b>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;:</b></p><p>&#2310;&#2336; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; A, B, C, D, E, F, G &#2324;&#2352; H &#2319;&#2325; &#2357;&#2352;&#2381;&#2327;&#2366;&#2325;&#2366;&#2352; &#2350;&#2375;&#2332; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2325;&#     "solution": "<p>Eight persons- A, B, C, D, E, F, G and H are sitting around a square table facing the centre.</p><p><b>Statement I: </b>B sits third to the left of G. A sits second to the right of H but not in the middle of the table. B is an immediate neighbour of H.</p><p><b><img width=280 height=275 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image009.png\"></b></p><p>There is no information about C.</p><p>So, statement I is not sufficient.</p><p><b>Statement II: </b>F sits third to the left of A. C sits immediate right of D. C sits adjacent to F. D does not sit at the corner of the table.</p><p><img width=282 height=271 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image010.png\"></p><p>We cannot determine who sits third to the left of C.</p><p>So, statement II is not sufficient.</p><p>Combining statement I and statement II:</p><p><b>Statement I: </b>B sits third to the left of G. A sits second to the right of H but not in the middle of the table. B is an immediate neighbour of H.</p><p><b>Statement II: </b>F sits third to the left of A. C sits immediate right of D. C sits adjacent to F. D does not sit at the corner of the table.</p><p><b><img width=303 height=281 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image011.png\"></b></p><p>Now, E is remaining.</p><p><b><img width=284 height=286 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image012.png\"></b></p><p>E sits third to the left of C.</p><p>Hence, Statement I and II together are sufficient to answer the question.</p>",

    "solution": "<p>It is given that: </p><p>Six persons T, U, V, W, X and Y are sitting around a triangular table facing towards centre. One person sits at each corner and one sits in the middle of each side. </p><p><b>From statement I alone:</b></p><p>V sits opposite to X. T sits at the corner. </p><p>So, no definite arrangement can be established.</p><p>So, statement I alone is not sufficient. </p><p><b>From statement II alone:</b></p><p>X sits to the second right of T. W sits to the immediate right of Y. </p><p>So, no definite arrangement can be established.</p><p>So, statement II alone is not sufficient. </p><p><b>From statements I and II together:</b></p><p>V sits opposite to X. T sits at the corner. </p><p>X sits to the second right of T. </p><p><img width=166 height=146 id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23033/image012.jpg\"></p><p>W sits to the immediate right of Y. </p><p><img width=170 height=159 id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23033/image013.jpg\"></p><p>So, we get:</p><p><img width=162 height=163 id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23033/image014.jpg\"></p><p>So, U sits to the second left or fourth right of Y. </p>",

    "question": "<span class=\"eqt\"><p>What day of the week was 18th October, 1999?</p></span><span class=\"hqt\" style=\"display:none\"><p>18 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 1999 &#2325;&#2379; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2367;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tuesday</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Friday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>18th October, 1999 = 1998 years + Period from 1.1.1999 to 18.10.1999</p><p>Odd days in 1600 years = 0</p><p>Odd days in 300 years = 5 * 3 = 15 = 1</p><p>98 years has 24 leap years + 74 ordinary years.</p><p>Number of odd days in 98 years (24 * 2 + 74) = 122 = 3 odd days</p><p>No. of odd days from Jan to Oct = 31 + 28 + 31 + 30 + 31 + 30 + 31 + 31 + 30 + 18 = 291 days</p><p>Now, 291 days = 41 weeks 4 days = 4 odd days</p><p>Total number of odd days = (0 + 1 + 3 + 4) = 8, i.e., 1 odd day</p><p>So, 18th October, 1999 was a Monday.</p>",
    "question_index": 51
  },

    "solution": "<p>The correct answer is option (d).</p><p>The subject of the Active Voice is changed into the object of the Passive voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a 'to be' form of verb is necessary while changing the voice of the sentence from Active to Passive.</p><p>The preposition \"by\" is used before the object made in Passive Voice. However, it is optional in some cases.</p><p>The question in Active voice is an interrogative sentence. The answer to this question will be either \"yes\" or \"no\".</p><p>These types of sentences usually begin with a Modal Auxiliary verb.</p><p>The format of the sentence which begins with Modals in Active voice is: Modal + Subject + V1 + Object?</p><p>Therefore, in Passive voice, the format will be: Modal + Object of the active voice (Subjective case) + be + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>Can you do this? (Active)</p><p>Can this be done by you? (Passive)</p><p>The options except (d) don't follow the correct grammatical format of the Passive Voice.</p><p>Thus, the correct answer is (d): <b>Can the movie premier be seen by me?</b></p>",

    "question": "<p>Fill in the blank with the most appropriate adverb.</p><p>The students listened _____ to the guest speaker's lecture.</p>",

    "correct_option_id": 3,
    "solution": "<p>The correct answer is (d) attentively.</p><p>\"Attentively\" is an adverb that modifies the verb \"listened,\" describing how the students performed the action (with close focus and interest), and it fits the sentence structure to indicate manner. Adverbs typically end in \"-ly\" when derived from adjectives like \"attentive\".</p><p>(a) attentive - is incorrect because \"attentive\" is an adjective, which would modify a noun (e.g., \"attentive students\"), not the verb \"listened.\" Using it here would result in a grammatical error.</p><p>(b) attention - is incorrect because \"attention\" is a noun referring to focus (e.g., \"with attention\"), not an adverb to modify the verb.</p><p>(c) more attentive - is incorrect because \"more attentive\" is a comparative adjective (used for comparisons, e.g., \"more attentive than before\"), not an adverb, and it doesn't fit the context of manner.</p><p>Complete sentence: The students listened attentively to the guest speaker's lecture.</p><p>Note:</p><p>         The Positive Degree is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>         The Comparative degree denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>         The Superlative degree indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",

    "question": "<p>Fill in the blanks with the correct article.</p><p>_______ love conquers _______ obstacles.</p>",
    "options": [
      "A, an",
      "The, the",
      "An, a",
      "No article, No article"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct answer is (d) No article, No article.</p><p>The completed sentence is: \"Love conquers obstacles.\" No article is needed before \"love\" as it is an uncountable abstract noun in a general proverb, while \"no article\" before 'obstacles' is used to mean every obstacle universally.</p><p>(a) A, an - is incorrect because \"a\" is for singular countable nouns, but \"love\" is uncountable and general; \"an\" is appropriate for singular countable nouns, but \"obstacles\" is a plural noun, which makes the article an incorrect fit.</p><p>(b) The, the - is incorrect because \"the love\" implies specific instances (e.g., \"the love in this story\"), but here it's a broad truth; \"the all\" is non-idiomatic.</p><p>(c) An, a - is incorrect because \"an\" fits vowel sounds, but \"love\" starts with /l/ consonant, and \"a\" is appropriate for singular countable nouns, but \"obstacles\" is a plural noun, which makes the article an incorrect fit.</p><p>Complete sentence: Love conquers obstacles.</p><p>Note:</p><p>Definite and indefinite articles: In the English language, we have one definite article, the; it refers to or introduces a particular, specific noun. An and a are indefinite articles; they refer to, or introduce, an unspecified noun.</p><p>Countable and uncountable nouns: 1. Countable nouns are the class of nouns that can be counted, for example, table  one table, two tables, three tables, etc. 2. Uncountable nouns are the nouns that cannot be counted or usually are not counted, for example, light, water, milk, information, furniture, etc. They do not generally have a plural form and can't be preceded by a or an. Many abstract nouns are typically uncountable. Some uncountable nouns can be used in the plural as well, depending on the meaning or context of the word.</p>",
    "question_index": 63

    "comp": "<p><b>Directions :</b> Read the given passage and answer the questions that follow.</p><p>Sometimes, personnel, bound by the necessity of their livelihood, find themselves coerced into actions that conflict with their personal ethics and, at times, the law. This coercion can take many forms, from subtle pressure to outright directives. In some industries, sales teams might be urged to manipulate data or mislead customers to meet targets. Financial departments may be instructed to \"adjust\" figures to present a more favourable picture to investors. In more extreme cases, employees might be pushed into outright illegal activities, such as falsifying documents or engaging in fraudulent schemes. The psychological toll on the workforce forced into such actions is profound. Torn between the fear of losing their jobs and the burden of compromising their morals, these individuals often experience significant stress, guilt, and anxiety. The workplace, ideally a realm of professional growth and ethical practice, becomes a battleground of inner conflict and ethical erosion. When workers are forced into unethical or illegal work, not only is the integrity of the workforce being compromised, but it also erodes public trust and the moral foundations of business.</p><p>This erosion extends beyond the individual, infiltrating organisational culture and perpetuating a cycle of complicity. Colleagues witnessing such behaviours may normalise them, leading to a broader desensitisation where ethical boundaries blur into obscurity. Productivity suffers as fear supplants innovation; employees disengage, channelling energy into self-preservation rather than creative problem-solving. Moreover, the ripple effects touch families and communities, as burdened workers carry home their turmoil, straining personal relationships and diminishing societal cohesion.</p><p>Corporate scandals, from Enron's accounting fraud to Volkswagen's emissions cheating, underscore how unchecked coercion can precipitate catastrophic failures, resulting in massive financial losses, regulatory crackdowns, and reputational ruin. Governments and watchdogs have responded with stringent laws like the Sarbanes-Oxley Act, mandating accountability, yet enforcement remains uneven, leaving vulnerable workers exposed.</p><p>To counter this, organisations must prioritise ethical leadership, embedding integrity through comprehensive training, transparent policies, and robust whistleblower protections. Anonymous hotlines and independent audits can empower voices silenced by reprisal fears, fostering environments where morality aligns with metrics. Ultimately, reclaiming the workplace as a sanctuary of principled pursuit demands collective vigilance from executives modeling candor to society valuing ethics over expediency. Only then can livelihoods be sustained without sacrificing souls, restoring faith in commerce as a force for communal good.</p>",

    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p><u>It is me whom is</u> so sorry for putting you in this position. </p>",

    "solution": "<p>In the given sentence, 'it' is a dummy subject. So, the sentence requires a real subject. 'Me' is an objective pronoun. So, we cannot use it in place of a subject. Therefore, the underlined part of the sentence is grammatically incorrect. Option (a) is also incorrect. The relative pronoun 'whom' refers to the object of the sentence. It cannot be used with the subjective pronoun 'I'. So, option (b) is also eliminated. The relative pronoun 'who' refers to the subject of the sentence. Among the given options, option (c) is the correct choice.</p><p>Corrected sentence: It is I who am so sorry for putting you in this position.</p><p><b>Note:</b></p><p><b>Subjective Pronouns:</b> The pronouns I, you, we, he, she, it, and they are known as subjective pronouns because they act as the subjects of verbs: We went to the party.</p><p><b>Objective Pronouns:</b> The pronouns me, you, us, him, her, it, and them are called objective pronouns because they act as the objects of verbs and prepositions: Anjali drove us home.</p><p><b>Relative pronouns: </b>A relative pronoun is used to connect a clause or phrase to a noun or pronoun. The clause modifies or describes the noun. The most common relative pronouns are who, whom, whose, which, and that. For example: She is the girl who received the award for bravery from our Home Minister.</p>",

    "correct_option_id": 1,
    "solution": "<p>The sentence in the Indirect Speech is in Past Perfect Tense.</p><p>There are three cases when the Indirect Speech is in Past Perfect Tense.</p><p>- Tense remains same</p><p>- Past perfect changes to Present Perfect</p><p>- Past perfect changes to Simple Past</p><p></p><p>Case 1: Past Perfect (Subject + had + V3 + Object) tense will be kept intact.</p><p>For example:</p><p>He said that he had just finished the movie. (Indirect Speech)</p><p>He said, \"I had just finished the movie.\" (Direct Speech)</p><p></p><p>Case 2: Past Perfect (Subject + had + V3 +Object) will be converted into Present Perfect (Subject + has/have + V3 +Object).</p><p>For example:</p><p>He said that he had got a new job. (Indirect Speech)</p><p>He said, \"I have got a new job.\" (Direct Speech)</p><p></p><p>Case 3: Past Perfect (Subject + had + V3 + Object) will be converted into Past Simple (Subject + V2 + Object).</p><p>For example:</p><p>He said that Arya had sent him a book. (Indirect Speech)</p><p>He said, \"Arya sent me a book.\" (Direct Speech)</p><p>In such questions, we have to take help of options and resort to elimination method.</p><p>As per the given options, Case 1 applies in the given question and hence the tense will remain intact.</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>- 'That' will be removed from the sentence.</p><p>- Inverted commas will be added to the sentence.</p><p>- 'He' will be changed to 'I'.</p><p>Therefore, the correct answer is option (b): The architect said, \"I had just made the blueprint.\"</p><p></p>",

    "comp": "<p><b>Directions :</b>   Read the given passage and answer the questions that follow.</p><p>In an era defined by digital banking, cryptocurrency booms, and economic volatility, financial literacy and financial inclusion stand as twin pillars supporting equitable prosperity. Financial literacy equips individuals with the knowledge and skills to make informed decisions about saving, investing, budgeting, and managing debt. It transforms abstract concepts like compound interest or credit scores into actionable tools, empowering people to navigate life's financial hurdles - from buying a home to retiring comfortably. Conversely, financial inclusion ensures that underserved populations, such as low-income families, rural communities, or marginalized groups, have access to affordable financial services like bank accounts, loans, and insurance. Without inclusion, literacy remains a privilege for the few, leaving billions in a cycle of exclusion.</p><p>The synergy between these two is undeniable. Literacy without inclusion is like handing someone a map in a locked room; they understand the paths but can't traverse them. Inclusion without literacy risks exploitation - predatory loans or unchecked spending can deepen poverty. Together, they foster resilience. For instance, programs like India's Jan Dhan Yojana have opened over 500 million bank accounts since 2014, but pairing this with literacy workshops has boosted savings rates and reduced reliance on informal moneylenders. Globally, the World Bank's data shows that a 10% rise in financial literacy correlates with a 2-3% increase in GDP per capita, particularly in emerging markets where women and youth benefit most from targeted inclusion efforts.</p><p>Yet challenges persist. Digital divides exacerbate inequalities; in sub-Saharan Africa, only 43% of adults have basic financial accounts, as per the 2023 Findex reports, often due to illiteracy in both numbers and technology. Misinformation, cultural stigmas aro
