    "question": "<span class=\"eqt\"><p>Consider the following statements with reference to the 16 Mahajanapadas of the 6th century BCE:</p><p>i. The <b>Anguttara Nikaya</b>, a Buddhist scripture, is the primary source that provides the most frequently cited list of the 16 Mahajanapadas.</p><p>ii. The <b>Jain text Bhagavati Sutra</b> also provides a list of sixteen states, though it differs slightly in names from the Buddhist version.</p><p>iii. While states like <b>Magadha</b> and <b>Vatsa</b> followed a <b>Monarchical</b> form of government, the <b>Vajji</b> and <b>Malla</b> confederacies were governed as <b>Gana-Sanghas (Republics)</b>.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2331;&#2336;&#2368; &#2358;&#2340;&#2366;&#2348;&#2381;&#2342;&#2368; &#2312;&#2360;&#2366; &#2346;&#2370;&#2352;&#2381;&#2357; &#2325;&#2375; 16 &#2350;&#2361;&#2366;&#2332;&#2344;&#2346;&#2342;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. &#2348;&#2380;&#2342;&#2381;&#2343; &#2343;&#2352;&#2381;&#2350;&#2327;&#2381;&#2352;&#2306;&#2341; &#2309;&#2306;&#2327;&#2369;&#2340;&#2381;&#2340;&#2352;&#2366; &#2344;&#2367;&#2325;&#2351;&#2366; &#2357;&#2361; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2360;&#2381;&#2352;&#2379;&#2340; &#2361;&#2376; &#2332;&#2379; 16 &#2350;&#2361;&#2366;&#2332;&#2344;&#2346;&#2342;&#2379;&#2306; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2313;&#2342;&#2381;&#2343;&#2371;&#2340; &#2360;&#2370;&#2330;&#2368; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>ii. &#2332;&#2376;&#2344; &#2327;&#2381;&#2352;&#2306;&#2341; &#2349;&#2327;&#2357;&#2340;&#2368; &#2360;&#2370;&#2340;&#2381;&#2352; &#2349;&#2368; &#2360;&#2379;&#2354;&#2361; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2370;&#2330;&#2368; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2361;&#2366;&#2354;&#2366;&#2306;&#2325;&#2367; &#2351;&#2361; &#2348;&#2380;&#2342;&#2381;&#2343; &#2360;&#2306;&#2360;&#2381;&#2325;&#2352;&#2339; &#2360;&#2375; &#2344;&#2366;&#2350;&#2379;&#2306; &#2350;&#2375;&#2306; &#2341;&#2379;&#2337;&#2364;&#2366; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2376;&#2404;</p><p>iii. &#2332;&#2348;&#2325;&#2367; &#2350;&#2327;&#2343; &#2324;&#2352; &#2357;&#2340;&#2381;&#2360; &#2332;&#2376;&#2360;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2358;&#2366;&#2361;&#2368; &#2358;&#2366;&#2360;&#2344; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2346;&#2381;&#2352;&#2330;&#2354;&#2367;&#2340; &#2341;&#2368;, &#2357;&#2361;&#2368;&#2306; &#2357;&#2332;&#2381;&#2332;&#2368; &#2324;&#2352; &#2350;&#2354;&#2381;&#2354; &#2360;&#2306;&#2328;&#2379;&#2306; &#2350;&#2375;&#2306; &#2327;&#2339;-&#2360;&#2306;&#2328;&#2379;&#2306; (&#2327;&#2339;&#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306;) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2358;&#2366;&#2360;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404; &#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i and ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">ii and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Anguttara Nikaya (Buddhist Pali text) provides the most widely accepted and frequently cited list of the 16 Mahajanapadas, this list is the primary source used by historians.</p><p>The Bhagavati Sutra (Jain text) also mentions sixteen great states, though some names differ from the Buddhist canon,It is an important alternative source</p><p>Magadha and Vatsa were monarchies ruled by kings.</p><p>Vajji Confederacy (headed by Licchavis) and Malla were Gana-Sanghas, meaning republican or oligarchic forms of governance.</p><p>Decision-making was usually via assemblies or councils.</p><p><b><u>Further Insights:</u></b></p><p>The rise of Mahajanapadas marks the Second Urbanisation phase in India.</p><p>Rajgir (Girivraja) was the early capital of Magadha.</p><p>Gana-Sanghas often had clan-based or oligarchic systems, not modern democracies.</p><p>Kashi, Kosala, Magadha were among the most powerful Mahajanapadas.</p><p>Iron technology and fertile plains helped Magadha's territorial expansion.</p>",
    "question_index": 123
  },

    "question": "<span class=\"eqt\"><p>On December 24, 2025, during the Vijay Hazare Trophy, which Indian cricketer became the fastest to reach 16,000 runs in List A cricket, a landmark that reset the pace benchmark for limited-overs domestic records?</p></span><span class=\"hqt\" style=\"display:none\"><p>24 &#2342;&#2367;&#2360;&#2306;&#2348;&#2352; 2025 &#2325;&#2379; &#2357;&#2367;&#2332;&#2351; &#2361;&#2332;&#2366;&#2352;&#2375; &#2335;&#2381;&#2352;&#2377;&#2347;&#2368; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335;&#2352; &#2354;&#2367;&#2360;&#2381;&#2335; &#2319; &#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2350;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2340;&#2375;&#2332; 16,000 &#2352;&#2344; &#2348;&#2344;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2368; &#2348;&#2344;&#2366;, &#2332;&#2367;&#2360;&#2344;&#2375; &#2360;&#2368;&#2350;&#2367;&#2340; &#2323;&#2357;&#2352;&#2379;&#2306; &#2325;&#2375; &#2328;&#2352;&#2375;&#2354;&#2370; &#2352;&#2367;&#2325;&#2377;&#2352;&#2381;&#2337; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2340;&#2367; &#2325;&#2366; &#2344;&#2351;&#2366; &#2350;&#2366;&#2344;&#2342;&#2306;&#2337; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Virat Kohli</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2352;&#2366;&#2335; &#2325;&#2379;&#2361;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Rohit Sharma</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2379;&#2361;&#2367;&#2340; &#2358;&#2352;&#2381;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Shikhar Dhawan</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2326;&#2352; &#2343;&#2357;&#2344;</span>",
      "<span class=\"eqt\">Sachin Tendulkar</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2330;&#2367;&#2344; &#2340;&#2375;&#2306;&#2337;&#2369;&#2354;&#2325;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; India batting star <b>Virat Kohli</b> on December 24, 2025 went past the iconic Sachin Tendulkar as the fastest to reach 16,000 runs in List A cricket, achieving the milestone in his 330th innings in the ongoing Vijay Hazare Trophy.</p><p>&#183; Tendulkar had achieved the landmark in 391 innings. The 37-year-old Kohli touched the mark during his team Delhi's opening Vijay Hazare game against Andhra in Bangalore. at the BCCI Centre of Excellence.</p><p>&#183; Kohli now holds the record for being the fastest to each block of 1000 List A runs from 10,000 runs onwards. Kohli is playing the Vijay Hazare Trophy after a gap of 15 years, but the former India skipper has a stellar record in the tournament.</p><p>&#183; In the premier domestic one-day competition, he has made 819 runs from 13 matches at an average of 68.25 and a strike-rate of 106 with four centuries and three fifties.</p>",
    "question_index": 124
  },
  {
    "question": "<span class=\"eqt\"><p>With reference to Greenhouse Gases (GHGs) and their Global Warming Potential (GWP), consider the following statements:</p><p>1) Methane (CH&#8324;) possesses a significantly higher heat-trapping efficiency than Carbon Dioxide over a century-long horizon, despite its relatively short atmospheric lifespan of approximately 12 years.</p><p>2) Nitrous Oxide (N&#8322;O) is nearly 273 times more powerful than CO&#8322; in terms of warming potential and is primarily emitted through industrial processes and the use of synthetic fertilizers.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2381;&#2352;&#2368;&#2344;&#2361;&#2366;&#2313;&#2360; &#2327;&#2376;&#2360;&#2379;&#2306; (&#2332;&#2368;&#2319;&#2330;&#2332;&#2368;) &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2357;&#2376;&#2358;&#2381;&#2357;&#2367;&#2325; &#2340;&#2366;&#2346;&#2344; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; (&#2332;&#2368;&#2337;&#2348;&#2381;&#2354;&#2381;&#2351;&#2370;&#2346;&#2368;) &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2350;&#2368;&#2341;&#2375;&#2344; (CH&#8324;) &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2342;&#2368; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2379; &#2352;&#2379;&#2325;&#2344;&#2375; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2325;&#2366;&#2347;&#2368; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2361;&#2366;&#2354;&#2366;&#2306;&#2325;&#2367; &#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2350;&#2375;&#2306; &#2311;&#2360;&#2325;&#2366; &#2332;&#2368;&#2357;&#2344;&#2325;&#2366;&#2354; &#2354;&#2327;&#2349;&#2327; 12 &#2357;&#2352;&#2381;&#2359; &#2361;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2360; &#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; (N&#8322;O) &#2325;&#2366; &#2340;&#2366;&#2346;&#2344; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; CO&#8322; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2354;&#2327;&#2349;&#2327; 273 &#2327;&#2369;&#2344;&#2366; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376; &#2324;&#2352; &#2351;&#2361; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2324;&#2352; &#2325;&#2371;&#2340;&#2381;&#2352;&#2367;&#2350; &#2313;&#2352;&#2381;&#2357;&#2352;&#2325;&#2379;&#2306; &#2325;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327; &#2360;&#2375; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Methane doesn't stay in the air for very long, but while it is there, it traps much more heat than carbon dioxide.</p><p>Methane has an atmospheric lifetime of about 12 years, which is much shorter than CO&#8322;.</p><p>However, over a 100-year time horizon, methane's Global Warming Potential (GWP) is around 28 - 34 times higher than CO&#8322;.</p><p>This means methane traps far more heat per molecule than CO&#8322;, even though it does not stay long in the atmosphere.</p><p>Nitrous oxide is extremely powerful in warming the Earth, and fertilizers used in farming release a lot of it.</p><p>Nitrous Oxide has a GWP of about 273 times CO&#8322; over 100 years.</p><p>Major sources include:</p><p>Agricultural activities, especially synthetic fertilizers</p><p>Industrial processes</p><p>Combustion and waste management (secondary sources)</p><p><b><u>Further Insights:</u></b></p><p>CO&#8322; has a low GWP but a very long atmospheric lifetime (centuries).</p><p>Methane reduction gives quick climate benefits due to its short lifespan.</p><p>Nitrous oxide also contributes to ozone layer depletion.</p><p>Agriculture is the largest source of N&#8322;O emissions globally.</p><p>GWP values are usually compared over a 100-year time horizon in exams.</p>",
    "question_index": 125
  },
  {
    "question": "<span class=\"eqt\"><p>The human backbone is divided into five regions. Which of the following shows the correct number of vertebrae in order from Cervical &rarr; Thoracic &rarr; Lumbar &rarr; Sacral &rarr; Coccygeal?</p></span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2344;&#2357; &#2352;&#2368;&#2338;&#2364; &#2325;&#2368; &#2361;&#2337;&#2381;&#2337;&#2368; &#2325;&#2379; &#2346;&#2366;&#2305;&#2330; &#2349;&#2366;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2327; &#2327;&#2381;&#2352;&#2368;&#2357;&#2366; (&#2360;&#2352;&#2381;&#2357;&#2366;&#2311;&#2325;&#2354;) &#2357;&#2325;&#2381;&#2359;&#2368;&#2351; (&#2341;&#2379;&#2352;&#2375;&#2360;&#2367;&#2325;) &#2325;&#2366;&#2336; (&#2354;&#2350;&#2381;&#2348;&#2352;) &#2340;&#2381;&#2352;&#2367;&#2325;&#2366;&#2360;&#2381;&#2341;&#2367; (&#2360;&#2376;&#2325;&#2381;&#2352;&#2354;) &#2324;&#2352; &#2346;&#2358;&#2381;&#2330;&#2325;&#2346;&#2366;&#2354; (&#2325;&#2379;&#2325;&#2381;&#2360;&#2368;&#2332;&#2367;&#2351;&#2354;) &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2325;&#2358;&#2375;&#2352;&#2369;&#2325;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2361;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">12 - 7 - 5 - 5  -  4</span><span class=\"hqt\" style=\"display:none\">12 - 7 - 5 - 5  -  4</span>",
      "<span class=\"eqt\">7 - 12 - 5 - 5  -  4</span><span class=\"hqt\" style=\"display:none\">7 - 12 - 5 - 5  -  4</span>",
      "<span class=\"eqt\">7 - 12 - 5 - 4  -  5</span><span class=\"hqt\" style=\"display:none\">7 - 12 - 5 - 4  -  5</span>",
      "<span class=\"eqt\">12 - 5 - 7 - 5  -  4</span><span class=\"hqt\" style=\"display:none\">12 - 5 - 7 - 5  -  4</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The human vertebral column has 33 vertebrae, arranged as:</p><p>Cervical  -  7</p><p>Thoracic  -  12</p><p>Lumbar  -  5</p><p>Sacral  -  5 (fused)</p><p>Coccygeal  -  4 (fused)</p><p>Top of your backbone has 7 bones, middle has 12, lower back has 5, then 5 fused bones (sacrum), and 4 fused bones (tailbone).</p><p><b><u>Further Insights:</u></b></p><p>The cervical region supports the head and allows maximum movement.</p><p>Thoracic vertebrae connect to the ribs, forming the ribcage.</p><p>Lumbar vertebrae are the strongest, carrying most body weight.</p><p>Sacral vertebrae fuse to form the sacrum, part of the pelvis.</p><p>The coccyx (tailbone) helps in balance and muscle attachment.</p>",
    "question_index": 126
  },
  {
    "question": "<span class=\"eqt\"><p>In September 2025, India's first overseas defence manufacturing facility was inaugurated at Berrechid. In which country is this landmark facility located?</p></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2340;&#2306;&#2348;&#2352; 2025 &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2346;&#2361;&#2354;&#2368; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2352;&#2325;&#2381;&#2359;&#2366; &#2357;&#2367;&#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2325;&#2366; &#2348;&#2375;&#2352;&#2381;&#2352;&#2375;&#2330;&#2367;&#2342; &#2350;&#2375;&#2306; &#2313;&#2342;&#2381;&#2328;&#2366;&#2335;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; &#2351;&#2361; &#2320;&#2340;&#2367;&#2361;&#2366;&#2360;&#2367;&#2325; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Egypt</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2360;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Morocco</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2352;&#2325;&#2381;&#2325;&#2379;</span>",
      "<span class=\"eqt\">Vietnam</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2351;&#2340;&#2344;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Philippines</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2367;&#2354;&#2367;&#2346;&#2368;&#2306;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>India opened its first defence factory outside of India in the city of Berrechid, and that city is in Morocco, a country in North-West Africa.</p><p><b><u>Further Insights:</u></b></p><p>Tata Advanced Systems Maroc inaugurated its new manufacturing facility at Berrechid during the visit.</p><p>The facility will produce the Wheeled Armoured Platform for defence purposes.</p>",
    "question_index": 127
  },

    "question": "<span class=\"eqt\"><p>Which of the following schemes aims to provide assured income support to pregnant and lactating women for wage loss compensation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2327;&#2352;&#2381;&#2349;&#2357;&#2340;&#2368; &#2324;&#2352; &#2360;&#2381;&#2340;&#2344;&#2346;&#2366;&#2344; &#2325;&#2352;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2379; &#2357;&#2375;&#2340;&#2344; &#2361;&#2366;&#2344;&#2367; &#2325;&#2381;&#2359;&#2340;&#2367;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2310;&#2351; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2352;&#2326;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pradhan Mantri Matru Vandana Yojana</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2350;&#2366;&#2340;&#2371; &#2357;&#2306;&#2342;&#2344;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Beti Bachao Beti Padhao</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2335;&#2368; &#2348;&#2330;&#2366;&#2323; &#2348;&#2375;&#2335;&#2368; &#2346;&#2338;&#2364;&#2366;&#2323;</span>",
      "<span class=\"eqt\">Sukanya Samriddhi Yojana</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2325;&#2344;&#2381;&#2351;&#2366; &#2360;&#2350;&#2371;&#2342;&#2381;&#2343;&#2367; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Mahila E-Haat</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2367;&#2354;&#2366; &#2312;-&#2361;&#2366;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Pradhan Mantri Matru Vandana Yojana (PMMVY)</b> is a Maternity Benefit Programme.</p><p>&#183; <b>Objective:</b> It is a Centrally Sponsored Scheme that provides a cash incentive of <b>&#8377;5,000</b> (in installments) directly to the bank accounts of Pregnant Women and Lactating Mothers (PW&amp;LM) for the first living child of the family.</p><p>&#183; <b>Purpose:</b> The incentive is intended to provide partial compensation for <b>wage loss</b> so that the woman can take adequate rest before and after delivery. It also encourages health-seeking behavior, such as institutional delivery and immunization.</p><p>&#183; <b>Other options:</b></p><p>o <b>Beti Bachao Beti Padhao:</b> Focuses on preventing gender-biased sex selection and ensuring the education of the girl child.</p><p>o <b>Sukanya Samriddhi Yojana:</b> A small deposit savings scheme for the girl child.</p><p>o <b>Mahila E-Haat:</b> An online marketing platform for women entrepreneurs.</p>",
    "question_index": 128
  },
  {
    "question": "<span class=\"eqt\"><p>India is developing high-capacity railway tracks dedicated exclusively to the movement of goods and freight traffic. What are these specialized corridors known as?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2350;&#2366;&#2354; &#2324;&#2352; &#2350;&#2366;&#2354; &#2338;&#2369;&#2354;&#2366;&#2312; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2350;&#2352;&#2381;&#2346;&#2367;&#2340; &#2313;&#2330;&#2381;&#2330; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2357;&#2366;&#2354;&#2368; &#2352;&#2375;&#2354;&#2357;&#2375; &#2346;&#2335;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2352; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404; &#2311;&#2344; &#2357;&#2367;&#2358;&#2375;&#2359; &#2327;&#2354;&#2367;&#2351;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Integrated Freight Corridors (IFC)</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2368;&#2325;&#2371;&#2340; &#2350;&#2366;&#2354; &#2338;&#2369;&#2354;&#2366;&#2312; &#2327;&#2354;&#2367;&#2351;&#2366;&#2352;&#2375; (&#2310;&#2312;&#2319;&#2347;&#2360;&#2368;)</span>",
      "<span class=\"eqt\">Dedicated Freight Corridors (DFC)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2352;&#2381;&#2346;&#2367;&#2340; &#2350;&#2366;&#2354; &#2338;&#2369;&#2354;&#2366;&#2312; &#2327;&#2354;&#2367;&#2351;&#2366;&#2352;&#2375; (&#2337;&#2368;&#2319;&#2347;&#2360;&#2368;)</span>",
      "<span class=\"eqt\">National Logistics Arteries (NLA)</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2352;&#2360;&#2342; &#2343;&#2350;&#2344;&#2367;&#2351;&#2366;&#2306; (&#2319;&#2344;&#2319;&#2354;&#2319;)</span>",
      "<span class=\"eqt\">Rapid Cargo Pathways (RCP)</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2376;&#2346;&#2367;&#2337; &#2325;&#2366;&#2352;&#2381;&#2327;&#2379; &#2346;&#2366;&#2341;&#2357;&#2375; (&#2310;&#2352;&#2360;&#2368;&#2346;&#2368;)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>These are high-capacity, electrified rail corridors designed purely for freight trains, separating them from passenger traffic.</p><p>They allow faster, heavier, and more efficient goods movement across India.</p><p>Examples:</p><p>Eastern DFC</p><p>Western DFC</p><p>DFC = special railway tracks made only for goods trains, so cargo moves faster without getting stuck behind passenger trains.</p><p><b><u>Further Insights:</u></b></p><p>DFCs allow freight trains to run at speeds up to 100 km/h.</p><p>They reduce transportation time for goods by 40 - 60%.</p><p>DFCs significantly lower logistics costs and improve supply chain efficiency.</p><p>They free existing railway lines for more passenger trains.</p><p>The DFC project is a key component of India's Gati Shakti National Master Plan.</p>",
    "question_index": 129
  },
  {
    "question": "<span class=\"eqt\"><p>What is the name of the Windows feature that allows you to run older software or applications in compatibility mode? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2306;&#2337;&#2379;&#2332;&#2364; &#2347;&#2368;&#2330;&#2352; &#2325;&#2366; &#2344;&#2366;&#2350; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; &#2332;&#2379; &#2310;&#2346;&#2325;&#2379; &#2346;&#2369;&#2352;&#2366;&#2344;&#2375; &#2360;&#2377;&#2347;&#2364;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2351;&#2366; &#2319;&#2346;&#2381;&#2354;&#2367;&#2325;&#2375;&#2358;&#2344; &#2325;&#2379; &#2325;&#2350;&#2381;&#2346;&#2376;&#2335;&#2367;&#2348;&#2367;&#2354;&#2367;&#2335;&#2368; &#2350;&#2379;&#2337; &#2350;&#2375;&#2306; &#2330;&#2354;&#2366;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Windows Compatibility Center</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2306;&#2337;&#2379;&#2332;&#2364; &#2325;&#2350;&#2381;&#2346;&#2376;&#2335;&#2367;&#2348;&#2367;&#2354;&#2367;&#2335;&#2368; &#2360;&#2375;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Windows Sandbox</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2306;&#2337;&#2379;&#2332;&#2364; &#2360;&#2376;&#2306;&#2337;&#2348;&#2377;&#2325;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Windows Update</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2306;&#2337;&#2379;&#2332;&#2364; &#2309;&#2346;&#2337;&#2375;&#2335;</span>",
      "<span class=\"eqt\">Compatibility Mode</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350;&#2381;&#2346;&#2376;&#2335;&#2367;&#2348;&#2367;&#2354;&#2367;&#2335;&#2368; &#2350;&#2379;&#2337;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The feature in Windows that allows you to run older software or applications in compatibility mode is called <b>\"Compatibility Mode</b>.\" Compatibility Mode is a built-in Windows feature that adjusts the settings and behavior of an application to make it compatible with older software that may not run correctly on a newer version of Windows. </p><p>&#183; It can help resolve compatibility issues by emulating the environment of older Windows versions and adjusting settings like display resolutions or privilege levels to ensure that the application runs smoothly. </p><p>&#183; This feature can be accessed by right-clicking on the application's executable file, selecting \"Properties,\" and then navigating to the \"Compatibility\" tab to configure the compatibility settings.</p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>In text editing software, what does the \"font style\" typically refer to? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2319;&#2337;&#2367;&#2335;&#2367;&#2306;&#2327; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2350;&#2375;&#2306;, \"&#2347;&#2364;&#2377;&#2344;&#2381;&#2335; &#2360;&#2381;&#2335;&#2366;&#2311;&#2354;\" &#2310;&#2350; &#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The color of the font</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2377;&#2344;&#2381;&#2335; &#2325;&#2366; &#2352;&#2306;&#2327;</span>",
      "<span class=\"eqt\">The size of the font</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2377;&#2344;&#2381;&#2335; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">The boldness or italics of the font</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2377;&#2344;&#2381;&#2335; &#2325;&#2368; &#2348;&#2379;&#2354;&#2381;&#2337;&#2344;&#2375;&#2360; &#2351;&#2366; &#2311;&#2335;&#2376;&#2354;&#2367;&#2325;</span>",
      "<span class=\"eqt\">The alignment of the text</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2325;&#2366; &#2319;&#2354;&#2366;&#2311;&#2344;&#2350;&#2375;&#2306;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In text editing software, the \"font style\" typically refers to attributes related to the appearance of text, such as whether the text is in bold, italics, or underlined. These attributes affect the visual style of the text while keeping the same font type, size, and color. Users can apply font styles to emphasize or differentiate certain parts of the text within a document.</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>In which of the classes of IPv4 address the first eight bits are the network part of the address?</p></span><span class=\"hqt\" style=\"display:none\"><p>IPv4 &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2325;&#2368; &#2325;&#2367;&#2360; &#2325;&#2381;&#2354;&#2366;&#2360; &#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2375; &#2310;&#2336; &#2348;&#2367;&#2335; &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2325;&#2366; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Class A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2366;&#2360; A</span>",
      "<span class=\"eqt\">Class B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2366;&#2360; B</span>",
      "<span class=\"eqt\">Class C</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2366;&#2360; C</span>",
      "<span class=\"eqt\">Class D</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2366;&#2360; D</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The IPv4 address space was broken into five classes. In a Class A network, the first eight bits, or the first dotted decimal, is the network part of the address, with the remaining part of the address being the host part of the address. There are 128 possible Class A networks.</p>",
    "question_index": 132
  },
  {
    "question": "<span class=\"eqt\"><p>Which light-sensitive device converts drawing, printed text or other images into digital form?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344;-&#2360;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;-&#2360;&#2306;&#2357;&#2375;&#2342;&#2344;&#2358;&#2368;&#2354; &#2313;&#2346;&#2325;&#2352;&#2339; &#2337;&#2381;&#2352;&#2366;&#2311;&#2306;&#2327;, &#2350;&#2369;&#2342;&#2381;&#2352;&#2367;&#2340; &#2346;&#2366;&#2336; &#2351;&#2366; &#2309;&#2344;&#2381;&#2351; &#2331;&#2357;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Printer</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Keyboard</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337;</span>",
      "<span class=\"eqt\">Scanner</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2325;&#2376;&#2344;&#2352;</span>",
      "<span class=\"eqt\">OMR</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2319;&#2350;&#2310;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A <b>scanner</b> is an electronic device which can capture images from physical items and convert them into digital formats, which in turn can be stored in a computer, and viewed or modified using software applications.</p><p>Different types of scanners are available with different resolutions. In the world of electronic data transmission, scanning is considered to be the most cost-effective and reliable way of transmitting images.</p>",
    "question_index": 133
  },
  {
    "question": "<span class=\"eqt\"><p>Which feature of the PowerPoint allows you to add movement and sound to the presentations?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2357;&#2352;&#2346;&#2377;&#2311;&#2306;&#2335; &#2325;&#2368; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2310;&#2346;&#2325;&#2379; &#2346;&#2381;&#2352;&#2375;&#2332;&#2375;&#2306;&#2335;&#2375;&#2358;&#2344; &#2350;&#2375;&#2306; &#2327;&#2340;&#2367; &#2324;&#2352; &#2343;&#2381;&#2357;&#2344;&#2367; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Slide Transitions</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2354;&#2366;&#2311;&#2337; &#2335;&#2381;&#2352;&#2366;&#2306;&#2332;&#2367;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Slide Sorter</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2354;&#2366;&#2311;&#2337; &#2360;&#2377;&#2352;&#2381;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Slide Master</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2354;&#2366;&#2311;&#2337; &#2350;&#2366;&#2360;&#2381;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Slide Show</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2354;&#2366;&#2311;&#2337; &#2358;&#2379;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Slide transitions allow you apply an effect to slides as they move from one to the next. The slide sorter lets you see your slides on the screen in a grid that makes it easy to reorganize them, or organize them into sections, just by dragging and dropping them where you want them. A slide master is the top slide in a hierarchy of slides that stores information about the theme and slide layouts of a presentation. A slide show view in PowerPoint lets you show a presentation on or from your computer.</p>",
    "question_index": 134
  },
  {
    "question": "<span class=\"eqt\"><p>Which technology is commonly used to secure e-banking transactions?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2312;-&#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2325;&#2379; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2367;&#2360; &#2340;&#2325;&#2344;&#2368;&#2325; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Blockchain</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2354;&#2377;&#2325;&#2330;&#2375;&#2344;</span>",
      "<span class=\"eqt\">SSL (Secure Sockets Layer)</span><span class=\"hqt\" style=\"display:none\">SSL (&#2360;&#2367;&#2325;&#2381;&#2351;&#2379;&#2352; &#2360;&#2377;&#2325;&#2375;&#2335; &#2354;&#2375;&#2351;&#2352;)</span>",
      "<span class=\"eqt\">GPS (Global Positioning System)</span><span class=\"hqt\" style=\"display:none\">GPS (&#2327;&#2381;&#2354;&#2379;&#2348;&#2354; &#2346;&#2379;&#2332;&#2367;&#2358;&#2344;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;)</span>",
      "<span class=\"eqt\">QR codes</span><span class=\"hqt\" style=\"display:none\">QR &#2325;&#2379;&#2337;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>SSL <b>(Secure Sockets Layer)</b> technology is commonly used to secure e-banking transactions. It's a cryptographic protocol that encrypts the data transmitted between a user's web browser and the bank's web server. This encryption ensures that sensitive information, such as login credentials and financial transactions, remains confidential and secure during online banking sessions.</p>",
    "question_index": 135
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following window opens without the user selecting \"New Window\" from a program's File menu?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2357;&#2367;&#2306;&#2337;&#2379; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2375; &#2347;&#2366;&#2311;&#2354; &#2350;&#2375;&#2344;&#2381;&#2351;&#2370; &#2360;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; \"&#2344;&#2312; &#2357;&#2367;&#2306;&#2337;&#2379;\" &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2367;&#2319; &#2348;&#2367;&#2344;&#2366; &#2326;&#2369;&#2354;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pop-up window</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2377;&#2346; - &#2309;&#2346; &#2357;&#2367;&#2306;&#2337;&#2379;</span>",
      "<span class=\"eqt\">New tab in a web browser</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2348; &#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2364;&#2352; &#2350;&#2375;&#2306; &#2344;&#2351;&#2366; &#2335;&#2376;&#2348;</span>",
      "<span class=\"eqt\">Properties window of an icon in desktop</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2360;&#2381;&#2325;&#2335;&#2377;&#2346; &#2350;&#2375;&#2306; &#2319;&#2325; &#2310;&#2311;&#2325;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2346;&#2352;&#2381;&#2335;&#2368; &#2357;&#2367;&#2306;&#2337;&#2379;</span>",
      "<span class=\"eqt\">General system preferences</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2352;&#2354; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2346;&#2381;&#2352;&#2375;&#2347;&#2352;&#2375;&#2306;&#2360;&#2375;&#2332;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A <b>pop-up window </b>is a type of window that opens without the user selecting \"New Window\" from a program's File menu. Pop-up windows are often generated by websites that include pop-up advertisements. These ads are produced with JavaScript code that is inserted into the HTML of a Web page.</p><p>New tab in a web browser is opened when we click on some particular links. Properties window of an icon in desktop is opened when we right click and select the properties menu. General system preferences is opened by clicking its icon.</p>",
    "question_index": 136
  },
  {
    "question": "<span class=\"eqt\"><p>What is the daily sending limit of emails for a Gmail user?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2368;&#2350;&#2375;&#2354; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2312;&#2350;&#2375;&#2354; &#2349;&#2375;&#2332;&#2344;&#2375; &#2325;&#2368; &#2342;&#2376;&#2344;&#2367;&#2325; &#2360;&#2368;&#2350;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">100 Mails</span><span class=\"hqt\" style=\"display:none\">100 &#2350;&#2375;&#2354;</span>",
      "<span class=\"eqt\">500 Mails</span><span class=\"hqt\" style=\"display:none\">500 &#2350;&#2375;&#2354;</span>",
      "<span class=\"eqt\">1000 Mails</span><span class=\"hqt\" style=\"display:none\">1000 &#2350;&#2375;&#2354;</span>",
      "<span class=\"eqt\">200 Mails</span><span class=\"hqt\" style=\"display:none\">200 &#2350;&#2375;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Google provides a daily sending limit of 500 emails to its Gmail users and 2000 emails to its Gsuite users. If you access Gmail via POP or IMAP clients, you can send an email to a maximum of 100 people at a time. If you surpass the limit, your account may be suspended for a day with the error \"550 5.4.5 Daily sending quota exceeded.\"</p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>Which MS Excel function returns the current system date and automatically updates whenever the worksheet is recalculated?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2347;&#2364;&#2306;&#2325;&#2381;&#2358;&#2344; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2340;&#2367;&#2341;&#2367; &#2354;&#2380;&#2335;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2357;&#2352;&#2381;&#2325;&#2358;&#2368;&#2335; &#2325;&#2375; &#2346;&#2369;&#2344;&#2352;&#2381;&#2327;&#2339;&#2344;&#2366; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2360;&#2381;&#2357;&#2330;&#2366;&#2354;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2346;&#2337;&#2375;&#2335; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">DATE()</span><span class=\"hqt\" style=\"display:none\">DATE()</span>",
      "<span class=\"eqt\">TODAY()</span><span class=\"hqt\" style=\"display:none\">TODAY()</span>",
      "<span class=\"eqt\">NOW()</span><span class=\"hqt\" style=\"display:none\">NOW()</span>",
      "<span class=\"eqt\">DAY()</span><span class=\"hqt\" style=\"display:none\">DAY()</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; TODAY() returns only the current date and updates automatically.</p><p>&#183; NOW() returns both date and time.</p><p>&#183; DATE() constructs a date from year, month, and day values.</p><p>&#183; DAY() extracts the day from a given date.</p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Windows Explorer:</p><p>1) Libraries are virtual collections of folders.</p><p>2) A file can belong to multiple libraries without duplication.</p><p>3) Libraries store files physically inside them.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2319;&#2325;&#2381;&#2360;&#2346;&#2381;&#2354;&#2379;&#2352;&#2352; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2354;&#2366;&#2311;&#2348;&#2381;&#2352;&#2375;&#2352;&#2368; &#2347;&#2364;&#2379;&#2354;&#2381;&#2337;&#2352;&#2379;&#2306; &#2325;&#2366; &#2310;&#2349;&#2366;&#2360;&#2368; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2319;&#2325; &#2347;&#2364;&#2366;&#2311;&#2354; &#2348;&#2367;&#2344;&#2366; &#2342;&#2379;&#2361;&#2352;&#2366;&#2357; &#2325;&#2375; &#2325;&#2312; &#2354;&#2366;&#2311;&#2348;&#2381;&#2352;&#2375;&#2352;&#2368; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2379; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3) &#2354;&#2366;&#2311;&#2348;&#2381;&#2352;&#2375;&#2352;&#2368; &#2347;&#2364;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2379; &#2349;&#2380;&#2340;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2346;&#2344;&#2375; &#2309;&#2306;&#2342;&#2352; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Statement 1  -  Correct:</b> Libraries in Windows are virtual collections that aggregate files from multiple folders into a single view.</p><p>&#183; <b>Statement 2  -  Correct:</b> A file can appear in multiple libraries without being duplicated because libraries only reference file locations.</p><p>&#183; <b>Statement 3  -  Incorrect:</b> Libraries do <b>not</b> store files physically; they only organize references to files stored elsewhere.</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>Automatic page numbers can be inserted in the Google docs in which of the following places? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2327;&#2370;&#2327;&#2354; &#2337;&#2377;&#2325;&#2381;&#2360; &#2350;&#2375;&#2306; &#2310;&#2335;&#2379;&#2350;&#2375;&#2335;&#2367;&#2325; &#2346;&#2375;&#2332; &#2344;&#2306;&#2348;&#2352; &#2360;&#2350;&#2381;&#2350;&#2367;&#2354;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">In header only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2361;&#2375;&#2337;&#2352; &#2350;&#2375;&#2306;</span>",
      "<span class=\"eqt\">In footer only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2347;&#2370;&#2335;&#2352; &#2350;&#2375;&#2306;</span>",
      "<span class=\"eqt\">In both header and footer</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2337;&#2352; &#2324;&#2352; &#2347;&#2370;&#2335;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Anywhere in the doc</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2377;&#2325;&#2381; (doc) &#2350;&#2375;&#2306; &#2325;&#2361;&#2368;&#2306; &#2349;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Automatic page numbers can be inserted in the Google docs<b> in both header and footer</b>.</p><p>&#183; Automatic page numbering is done to make it easier to know your place in the document. </p><p>&#183; The page number will increment automatically for each page, while the other text and decoration will stay the same.</p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>The process in which a person access the address of a trusted website and steal the data or gain the IP address is known as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2325;&#2379;&#2312; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357;&#2360;&#2344;&#2368;&#2351; &#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335; &#2325;&#2375; &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330;&#2340;&#2366; (&#2319;&#2325;&#2381;&#2360;&#2375;&#2360;) &#2361;&#2376; &#2324;&#2352; &#2337;&#2375;&#2335;&#2366; &#2330;&#2379;&#2352;&#2368; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2351;&#2366; &#2310;&#2312;&#2346;&#2368; (IP) &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2313;&#2360;&#2375; ___ &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Sniffer-script</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2344;&#2367;&#2347;&#2352;-&#2360;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Spoofing</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2370;&#2347;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Spamming</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2376;&#2350;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Spooling</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2370;&#2354;&#2367;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Spoofing</b> is a cybercrime that happens when someone impersonates a trusted contact or brand, pretending to be someone you trust in order to access sensitive personal information. Spoofing attacks copy and exploit the identity of your contacts, or the addresses of trusted websites. </p><p><b>Email spoofing is the most common type of spoofing </b>Email spoofing is when the attacker makes the 'from address' in an email appear legitimate. Email spoofing usually aims to infect a user's device with malware, steal their information, or request money. </p>",
    "question_index": 141
  },
  {

      "<span class=\"eqt\">Padding</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2376;&#2337;&#2367;&#2306;&#2327;</span>"

    "correct_option_id": 3,
    "solution": "<p><b>Bit padding</b> is the addition of one or more extra bits to a transmission or storage unit to make it conform to a standard size. Typically, padding is done at the end of the structure to fill it up with data, with the padding usually consisting of 1 bits, blank characters or null characters.</p>",
    "question_index": 142
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is the tertiary memory of a computer?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2368; &#2340;&#2371;&#2340;&#2368;&#2351;&#2325; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">USB Drive</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2319;&#2360;&#2348;&#2368; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;</span>",
      "<span class=\"eqt\">Magnetic Cassette</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2327;&#2381;&#2344;&#2375;&#2335;&#2367;&#2325; &#2325;&#2376;&#2360;&#2375;&#2335;</span>",
      "<span class=\"eqt\">Random Access Memory</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2376;&#2306;&#2337;&#2350; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Hard Disk</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2352;&#2381;&#2337; &#2337;&#2367;&#2360;&#2381;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The primary storage of a computer system is its main memory. Temporary memory, often known as cache memory, is the primary store. Primary memory has a relatively limited capacity, and it is always smaller than secondary memory. </p><p>Primary storage examples are - Read-only memory (ROM) and RAM (Random Access Memory). </p><p>A secondary storage device has more storage capacity and can save data for a longer period. Compact discs (CDs), USB drives, hard discs, and other devices can be external or inside a computer.</p><p>The primary goal of tertiary storage is to provide massive storage capacity at a reasonable cost. In Hierarchical Storage Systems, the tertiary storage level (HSS) may employ several storage devices. They are as follows: Magnetic cassette, Disks (optical), Optical tapes are a type of optical tape.</p>",
    "question_index": 143
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1) IMAP allows email synchronization across multiple devices.</p><p>2) POP3 maintains a constant copy of emails on the server by default.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) IMAP &#2325;&#2312; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2346;&#2352; &#2312;&#2350;&#2375;&#2354; &#2360;&#2367;&#2306;&#2325;&#2381;&#2352;&#2379;&#2344;&#2366;&#2311;&#2332;&#2364;&#2375;&#2358;&#2344; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) POP3 &#2337;&#2367;&#2347;&#2364;&#2377;&#2354;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2352;&#2381;&#2357;&#2352; &#2346;&#2352; &#2312;&#2350;&#2375;&#2354; &#2325;&#2368; &#2319;&#2325; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Statement 1  -  Correct:</b> IMAP synchronizes emails across multiple devices by keeping messages on the server and reflecting changes on all connected devices.</p><p>&#183; <b>Statement 2  -  Incorrect:</b> By default, POP3 downloads emails to the local device and often removes them from the server, unless explicitly configured otherwise.</p>",
    "question_index": 144
  },

    "question": "<span class=\"eqt\"><p>Dial-up is the basic type of connection available from:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2337;&#2366;&#2351;&#2354;-&#2309;&#2346; _________ &#2360;&#2375; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2348;&#2375;&#2360;&#2367;&#2325; &#2325;&#2344;&#2375;&#2325;&#2381;&#2358;&#2344; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">ISD</span><span class=\"hqt\" style=\"display:none\">ISD</span>",

      "<span class=\"eqt\">STD</span><span class=\"hqt\" style=\"display:none\">STD</span>",
      "<span class=\"eqt\">IDC</span><span class=\"hqt\" style=\"display:none\">IDC</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Dial-up is the basic type of connection available from <b>ISPs</b>. In Dial-up connection, you use your computer, dial a phone number (provider by ISP) to get connected via modem to server at provider's end through which you access Internet. With this type of connection, you cannot use a phone line for phone calls while you are connected to the Internet. Dial-up connections are very slow (speed between 28 K and 56K) and are the oldest connections. The only real benefit of a dial up connection is that it is very economical for low amount of usage.</p>",
    "question_index": 145

    "question": "<span class=\"eqt\"><p>GIFs are a series of images or soundless videos that will loop continuously, 'I' in GIF stands for:</p></span><span class=\"hqt\" style=\"display:none\"><p>GIF &#2311;&#2350;&#2375;&#2332; &#2351;&#2366; &#2343;&#2381;&#2357;&#2344;&#2367; &#2352;&#2361;&#2367;&#2340; &#2357;&#2368;&#2337;&#2367;&#2351;&#2379; &#2325;&#2368; &#2319;&#2325; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2361;&#2376; &#2332;&#2379; &#2354;&#2327;&#2366;&#2340;&#2366;&#2352; &#2354;&#2370;&#2346; (&#2310;&#2357;&#2352;&#2381;&#2340;) &#2325;&#2352;&#2375;&#2327;&#2368;, GIF &#2350;&#2375;&#2306; 'I' &#2325;&#2366; &#2346;&#2370;&#2352;&#2381;&#2339; &#2352;&#2370;&#2346; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Image</span><span class=\"hqt\" style=\"display:none\">Image</span>",
      "<span class=\"eqt\">Interchange</span><span class=\"hqt\" style=\"display:none\">Interchange</span>",
      "<span class=\"eqt\">Information</span><span class=\"hqt\" style=\"display:none\">Information</span>",
      "<span class=\"eqt\">Internet</span><span class=\"hqt\" style=\"display:none\">Internet</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A GIF, <b>Graphical Interchange Format</b>, is an image format invented in 1987 by Steve Wilhite, a US software writer who was looking for a way to animate images in the smallest file size. In short, GIFs are a series of images or soundless videos that will loop continuously and doesn't require anyone to press play.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1) Cache memory stores copies of frequently accessed main memory data.</p><p>2) Cache memory is larger in size than RAM.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2325;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2350;&#2369;&#2326;&#2381;&#2351; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;-&#2348;&#2366;&#2352; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2337;&#2375;&#2335;&#2366; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2351;&#2366;&#2306; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2325;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2352;&#2376;&#2350; &#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Statement 1  -  Correct:</b> Cache memory stores copies of frequently accessed data and instructions from the main memory (RAM) to reduce access time and improve CPU performance.</p><p>&#183; <b>Statement 2  -  Incorrect:</b> Cache memory is much <b>smaller</b> in size than RAM. It is designed to be extremely fast, not large.</p>",
    "question_index": 147
  },

    "question": "<span class=\"eqt\"><p>Which among the following Internet protocol is used to synchronize the clocks of computers to time references?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2368; &#2328;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2360;&#2350;&#2351; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2367;&#2306;&#2325;&#2381;&#2352;&#2379;&#2344;&#2366;&#2311;&#2395; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">FTP</span><span class=\"hqt\" style=\"display:none\">FTP</span>",
      "<span class=\"eqt\">NTP</span><span class=\"hqt\" style=\"display:none\">NTP</span>",
      "<span class=\"eqt\">HTTP</span><span class=\"hqt\" style=\"display:none\">HTTP</span>",
      "<span class=\"eqt\">SMTP</span><span class=\"hqt\" style=\"display:none\">SMTP</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>NTP</b> stands for Network Time Protocol, and it is an Internet protocol used to synchronize the clocks of computers to time references. It belongs to and is one of the oldest parts of the TCP/IP protocol suite. The term NTP applies to both the protocol and the client-server programs that run on computers.</p>",
    "question_index": 148
  },
