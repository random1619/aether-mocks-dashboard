    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the functioning of the Indian political system:</p><p>1) The Cabinet meets almost every day during its scheduled sessions totaling roughly 60 - 100 sitting days a year.</p><p>2) The Parliament is a permanent body that meets much more frequently, often once a month or more, to take immediate executive decisions and handle emergencies.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2375; &#2325;&#2366;&#2350;&#2325;&#2366;&#2332; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2350;&#2306;&#2337;&#2354; &#2309;&#2346;&#2344;&#2375; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2360;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2354;&#2327;&#2349;&#2327; &#2361;&#2352; &#2342;&#2367;&#2344; &#2348;&#2376;&#2336;&#2325; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2325;&#2369;&#2354; &#2350;&#2367;&#2354;&#2366;&#2325;&#2352; &#2354;&#2327;&#2349;&#2327; 60-100 &#2348;&#2376;&#2336;&#2325;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2360;&#2306;&#2360;&#2342; &#2319;&#2325; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2344;&#2367;&#2325;&#2366;&#2351; &#2361;&#2376; &#2332;&#2379; &#2309;&#2343;&#2367;&#2325; &#2348;&#2366;&#2352;, &#2309;&#2325;&#2381;&#2360;&#2352; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2319;&#2325; &#2348;&#2366;&#2352; &#2351;&#2366; &#2313;&#2360;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325;, &#2340;&#2340;&#2381;&#2325;&#2366;&#2354; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2354;&#2375;&#2344;&#2375; &#2324;&#2352; &#2310;&#2346;&#2366;&#2340; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2344;&#2367;&#2346;&#2335;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2376;&#2336;&#2325; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Cabinet does NOT meet every day.</p><p>Meetings are held as needed, usually once a week, sometimes more frequently during crises.</p><p>Also, the 60 - 100 sitting days refers to Parliament's yearly sittings, <i>not the Cabinet</i>.</p><p>The Cabinet has no \"scheduled session days\" like Parliament.</p><p>Parliament is NOT a permanent body &rarr; The Rajya Sabha is, but the Lok Sabha is not.</p><p>Parliament does not meet every month.</p><p>It meets in 3 sessions a year:</p><p>Budget Session</p><p>Monsoon Session</p><p>Winter Session</p><p>These are NOT monthly and total around 60 - 100 days.</p><p>Parliament does not take executive decisions; that is the job of the Cabinet.</p><p>Parliament makes laws, discusses issues, and holds the government accountable.</p><p><b><u>Further Insights:</u></b></p><p>The Cabinet exercises real executive power in India, not Parliament.</p><p>Parliament's 60 - 100 sitting days are distributed across three annual sessions.</p><p>The Rajya Sabha is a continuous body, with one-third of its members retiring every two years.</p><p>Lok Sabha is dissolvable, especially after the end of its 5-year term or during political instability.</p><p>The Cabinet is collectively responsible to the Lok Sabha, not to the Rajya Sabha.</p>",
    "question_index": 105
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following substances exerts its bleaching action primarily through the process of oxidation?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2321;&#2325;&#2381;&#2360;&#2368;&#2325;&#2352;&#2339; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2352;&#2306;&#2332;&#2344; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Sulfur Dioxide (SO&#8322;)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2354;&#2381;&#2347;&#2352; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; (SO&#8322;)</span>",
      "<span class=\"eqt\">Hydrogen Sulfide (H&#8322;S)</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344; &#2360;&#2354;&#2381;&#2347;&#2366;&#2311;&#2337; (H&#8323;S)</span>",
      "<span class=\"eqt\">Sodium Hydrosulfite (Na&#8322;S&#8322;O&#8324;)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2360;&#2354;&#2381;&#2347;&#2366;&#2311;&#2335; (Na&#8322;S&#8322;O&#8324;)</span>",
      "<span class=\"eqt\">Chlorine (Cl&#8322;)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2379;&#2352;&#2368;&#2344; (Cl&#8315;)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Chlorine removes color by adding oxygen to colored substances, which destroys their color.</p><p>Chlorine bleaches by oxidation.</p><p>In the presence of moisture, chlorine forms hypochlorous acid (HOCl):</p><p><img width=160 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p30326/image001.png\">HOCl releases nascent oxygen, which oxidizes the colored organic substances, making them colorless.</p><p>SO&#8322; bleaches by reduction,</p><p>H&#8322;S is a strong reducing agent.</p><p>It causes reduction-based bleaching, often temporary.</p><p>Sodium hydrosulfite is a powerful reducing agent.</p><p>Widely used for reduction bleaching in textile industries.</p><p><b><u>Further Insights:</u></b></p><p>Oxidation bleaching is usually permanent.</p><p>Reduction bleaching is often temporary (color may return on exposure to air).</p><p>Chlorine is commonly used for bleaching cotton and linen.</p><p>SO&#8322; is used for bleaching wool and silk to avoid damage.</p>",
    "question_index": 106
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1) The Jet Stream theory explains the onset and withdrawal of the Indian monsoon.</p><p>2) The Tropical Easterly Jet becomes prominent over India during the summer monsoon season.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2332;&#2375;&#2335; &#2360;&#2381;&#2335;&#2381;&#2352;&#2368;&#2350; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2375; &#2310;&#2352;&#2306;&#2349; &#2324;&#2352; &#2357;&#2366;&#2346;&#2360;&#2368; &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2332;&#2375;&#2335; &#2360;&#2381;&#2335;&#2381;&#2352;&#2368;&#2350; &#2327;&#2381;&#2352;&#2368;&#2359;&#2381;&#2350; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2375; &#2350;&#2380;&#2360;&#2350; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2314;&#2346;&#2352; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are correct. The shift and behavior of jet streams are critical to the dynamics of the Indian Monsoon.</p><p>&#183; <b>Statement 1 is correct:</b> The Jet Stream theory, particularly the shift of the <b>Sub-Tropical Westerly Jet (STWJ)</b>, explains the timing of the monsoon. The \"burst\" of the monsoon occurs when the STWJ shifts from the south of the Himalayas to the north. Similarly, its return to the south of the Himalayas in October/November marks the withdrawal of the monsoon.</p><p>&#183; <b>Statement 2 is correct:</b> During the summer, the heating of the Tibetan Plateau leads to the formation of the <b>Tropical Easterly Jet (TEJ)</b>. This jet stream flows over the Indian Peninsula (around 14&deg;N) and is a hallmark of the established summer monsoon season; a strong TEJ is often associated with good monsoon rainfall.</p>",
    "question_index": 107
  },
  {
    "question": "<span class=\"eqt\"><p>With reference to the Indian Postal System and its history, consider the following statements:</p><p>1) October 10 is observed annually as National Post Day in India,</p><p>2) The modern Indian Postal Service, as a unified entity under a Director-General, was established in 1854 during the tenure of Lord William Bentinck.</p><p>3) The Postal Index Number (PIN) code system, a six-digit code used to simplify mail delivery, was introduced in India in 1972.</p><p>4) India Post operates as a subsidiary under the administrative jurisdiction of the Ministry of Home Affairs.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2337;&#2366;&#2325; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;&#2357;&#2352;&#2381;&#2359; 10 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; &#2325;&#2379; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2337;&#2366;&#2325; &#2342;&#2367;&#2357;&#2360; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2337;&#2366;&#2325; &#2360;&#2375;&#2357;&#2366;, &#2319;&#2325; &#2350;&#2361;&#2366;&#2344;&#2367;&#2342;&#2375;&#2358;&#2325; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2319;&#2325; &#2319;&#2325;&#2368;&#2325;&#2371;&#2340; &#2311;&#2325;&#2366;&#2312; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306;, &#2354;&#2377;&#2352;&#2381;&#2337; &#2357;&#2367;&#2354;&#2367;&#2351;&#2350; &#2348;&#2375;&#2306;&#2335;&#2367;&#2306;&#2325; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; 1854 &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p><p>3) &#2337;&#2366;&#2325; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2360;&#2352;&#2354; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2331;&#2361; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2325;&#2379;&#2337;, &#2346;&#2379;&#2360;&#2381;&#2335;&#2354; &#2311;&#2306;&#2337;&#2375;&#2325;&#2381;&#2360; &#2344;&#2306;&#2348;&#2352; (&#2346;&#2367;&#2344;) &#2325;&#2379;&#2337; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;, &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; 1972 &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p><p>4) &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2346;&#2379;&#2360;&#2381;&#2335; &#2327;&#2371;&#2361; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2325;&#2375; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2319;&#2325; &#2360;&#2361;&#2366;&#2351;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 3, and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1, 3 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">All the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>After World Post Day on Oct 9, India celebrates its own Post Day on Oct 10.</p><p>World Post Day is observed on October 9.</p><p>National Post Day in India is observed on October 10, extending the celebration to highlight India's postal services.</p><p>PIN codes were started in 1972 to make sure letters reach the right place quickly.</p><p>It is a six-digit numerical system to improve sorting and delivery efficiency.</p><p>Conceptualised by Shriram Bhikaji Velankar, a senior postal official.</p><p>The modern Indian Postal Service was established in 1854 during the tenure of Lord Dalhousie.</p><p>India Post functions under the Ministry of Communications, Department of Posts.</p><p><b><u>Further Insights:</u></b></p><p>India Post is one of the largest postal networks in the world.</p><p>PIN code's first digit represents the postal zone.</p><p>India is divided into 9 postal zones (including one for the Army).</p><p>Postal reforms were crucial for administrative integration during British rule.</p>",
    "question_index": 108
  },
  {
    "question": "<span class=\"eqt\"><p>Examine these two statements carefully marked as Assertion (A) and Reason (R). Select the correct answer.</p><p>Assertion (A): While the Indian Constitution is a mix of flexibility and rigidity, its federal features can only be amended with the joint consent of the Centre and the States. Such amendments require a special majority in Parliament and ratification by at least half of the State Legislatures.</p><p>Reason (R): Article 378 ensures that the Centre cannot unilaterally change the power-sharing agreement (the federal structure) without asking the States for their permission.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A) &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; (R) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2311;&#2344; &#2342;&#2379; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2351;&#2342;&#2381;&#2351;&#2346;&#2367; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2354;&#2330;&#2368;&#2354;&#2375;&#2346;&#2344; &#2324;&#2352; &#2325;&#2336;&#2379;&#2352;&#2340;&#2366; &#2325;&#2366; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2361;&#2376;, &#2347;&#2367;&#2352; &#2349;&#2368; &#2311;&#2360;&#2325;&#2375; &#2360;&#2306;&#2328;&#2368;&#2351; &#2360;&#2381;&#2357;&#2352;&#2370;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2375;&#2357;&#2354; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2361;&#2350;&#2340;&#2367; &#2360;&#2375; &#2361;&#2368; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2320;&#2360;&#2375; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2306;&#2360;&#2342; &#2350;&#2375;&#2306; &#2357;&#2367;&#2358;&#2375;&#2359; &#2348;&#2361;&#2369;&#2350;&#2340; &#2324;&#2352; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2310;&#2343;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2360;&#2349;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2344;&#2369;&#2350;&#2379;&#2342;&#2344; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 378 &#2351;&#2361; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366; &#2319;&#2325;&#2340;&#2352;&#2347;&#2366; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2340;&#2381;&#2340;&#2366;-&#2360;&#2366;&#2333;&#2366;&#2325;&#2352;&#2339; &#2360;&#2350;&#2333;&#2380;&#2340;&#2375; (&#2360;&#2306;&#2328;&#2368;&#2351; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;) &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both (A) and (R) are true, and (R) is the correct explanation of (A).</span><span class=\"hqt\" style=\"display:none\">(A) &#2324;&#2352; (R) &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2324;&#2352; (R) (A) &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both (A) and (R) are true, but (R) is NOT the correct explanation of (A).</span><span class=\"hqt\" style=\"display:none\">(A) &#2324;&#2352; (R) &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; (R) (A) &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">(A) is true, but (R) is false.</span><span class=\"hqt\" style=\"display:none\">(A) &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; (R) &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">(A) is false, but (R) is true.</span><span class=\"hqt\" style=\"display:none\">(A) &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; (R) &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>When changes affect the federal balance, both Parliament and States must agree.</p><p>The Indian Constitution is neither completely rigid nor completely flexible.</p><p>Amendments affecting federal provisions (e.g., Centre - State relations, Seventh Schedule, representation of States in Parliament) require:</p><p>Special majority in Parliament (Article 368), and</p><p>Ratification by at least 50% of State Legislatures</p><p>This ensures shared sovereignty between the Centre and the States.</p><p>Article 368 provides the procedure for constitutional amendments, including mandatory State ratification for federal provisions.</p><p>Article 378 does NOT deal with constitutional amendments or federal consent.</p><p>Article 378 relates to special provisions regarding the adaptation of laws, not Centre - State power sharing.</p><p>The requirement of State ratification comes from Article 368, not Article 378.</p><p><b><u>Further Insights:</u></b></p><p>Federal provisions include Articles 245 - 255, Seventh Schedule, and representation of States.</p><p>India is described as a \"Union of States\", not a classical federation.</p><p>The amendment process balances national unity and state autonomy.</p><p>The Constitution's rigidity increases when federalism is involved.</p>",
    "question_index": 109
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Broad Money (M3):</p><p>1) M3 includes currency with the public, demand deposits, time deposits and other deposits with RBI.</p><p>2) Broad money is considered a better indicator of liquidity in the economy than M1.</p><p>3) The Reserve Bank of India publishes data related to broad money supply.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2381;&#2352;&#2377;&#2337; &#2350;&#2344;&#2368; (&#2319;&#2350;3) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2319;&#2350;3 &#2350;&#2375;&#2306; &#2332;&#2344;&#2340;&#2366; &#2325;&#2375; &#2346;&#2366;&#2360; &#2350;&#2380;&#2332;&#2370;&#2342; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;, &#2350;&#2366;&#2306;&#2327; &#2332;&#2350;&#2366;, &#2360;&#2366;&#2357;&#2343;&#2367; &#2332;&#2350;&#2366; &#2324;&#2352; &#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2325;&#2375; &#2346;&#2366;&#2360; &#2332;&#2350;&#2366; &#2309;&#2344;&#2381;&#2351; &#2332;&#2350;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2348;&#2381;&#2352;&#2377;&#2337; &#2350;&#2344;&#2368; &#2325;&#2379; &#2319;&#2350;1 &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2340;&#2352;&#2354;&#2340;&#2366; &#2325;&#2366; &#2348;&#2375;&#2361;&#2340;&#2352; &#2360;&#2306;&#2325;&#2375;&#2340;&#2325; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2367;&#2332;&#2364;&#2352;&#2381;&#2357; &#2348;&#2376;&#2306;&#2325; &#2348;&#2381;&#2352;&#2377;&#2337; &#2350;&#2344;&#2368; &#2360;&#2346;&#2381;&#2354;&#2366;&#2312; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2310;&#2306;&#2325;&#2337;&#2364;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All three statements regarding Broad Money (M3) are correct.</p><p>&#183; <b>Statement 1 is correct:</b> In India, <b>Broad Money (M3)</b> is calculated as the sum of:</p><p>o Currency with the public.</p><p>o Demand deposits with the banking system (Current Account, Savings Account).</p><p>o <b>Time deposits</b> with the banking system (Fixed Deposits, Recurring Deposits).</p><p>o 'Other' deposits with the RBI.</p><p>&#183; <b>Statement 2 is correct:</b> While <b>M1 (Narrow Money)</b> is the most liquid form of money (consisting only of currency and demand deposits), <b>M3 (Broad Money)</b> is considered a more comprehensive and better indicator of the total <b>liquidity</b> and financial resources available in the economy because it includes time deposits which can be converted into liquid cash over a slightly longer period.</p><p>&#183; <b>Statement 3 is correct:</b> The <b>Reserve Bank of India (RBI)</b> is the official authority that compiles and publishes data related to money supply (M1, M2, M3, and M4) in India on a fortnightly and monthly basis.</p><p><b>Further Insights:</b></p><p>&#183; <b>Liquidity vs. Comprehensiveness:</b> Liquidity decreases as we move from M1 to M4 (M1 is the most liquid; M4 is the least liquid). Conversely, the range of financial assets included increases as we move from M1 to M4.</p><p>&#183; <b>M3 Formula:</b> M3 = M1 + Time deposits with the banking system.</p><p>&#183; <b>Significance:</b> M3 is the most commonly used measure for analyzing money supply and its impact on inflation and economic growth.</p>",
    "question_index": 110
  },
  {
    "question": "<span class=\"eqt\"><p>The executive power of a State is vested in the Governor but is exercised in accordance with the advice of the Chief Minister and Council of Ministers under which Article of the Constitution?</p></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2375; &#2340;&#2361;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2350;&#2375;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2324;&#2352; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2368; &#2360;&#2354;&#2366;&#2361; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2311;&#2360;&#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Article 154</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 154</span>",
      "<span class=\"eqt\">Article 163</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 163</span>",
      "<span class=\"eqt\">Article 164</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 164</span>",
      "<span class=\"eqt\">Article 167</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 167</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Article 163</b> of the Indian Constitution provides for a Council of Ministers with the Chief Minister at the head to aid and advise the Governor in the exercise of his functions.</p><p><b>Article 163(1):</b> Explicitly states that there shall be a Council of Ministers with the Chief Minister at the head to <b>aid and advise the Governor</b> in the exercise of his functions, except in so far as he is by or under this Constitution required to exercise his functions or any of them in his discretion.</p><p><b>Other options:</b></p><p><b>Article 154:</b> States that the <b>executive power of the State</b> shall be vested in the Governor and shall be exercised by him either directly or through officers subordinate to him in accordance with the Constitution. While this vests the power, it is Article 163 that specifies the \"advice\" mechanism for its exercise.</p><p><b>Article 164:</b> Deals with other provisions as to Ministers, such as their appointment by the Governor, their collective responsibility to the Legislative Assembly of the State, and their oath of office.</p><p><b>Article 167:</b> Defines the <b>duties of the Chief Minister</b> as respects the furnishing of information to the Governor.</p><p><b>Further Insights:</b></p><p>&#183; Unlike the President of India (under Article 74), the Governor has a wider scope of <b>discretionary powers</b>.</p><p>&#183; Article 163 specifically mentions that the Governor may act in his discretion where required by the Constitution.</p><p>&#183; If any question arises whether a matter falls within the Governor's discretion, the decision of the Governor is final.</p>",
    "question_index": 111
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following issues posed a major challenge during the final year (1984 - 85) of the Sixth Five Year Plan?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2331;&#2336;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2309;&#2306;&#2340;&#2367;&#2350; &#2357;&#2352;&#2381;&#2359; (1984-85) &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2369;&#2342;&#2381;&#2342;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2330;&#2369;&#2344;&#2380;&#2340;&#2368; &#2348;&#2344;&#2366;?</p></span>",

      "<span class=\"eqt\">External debt crisis</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2361;&#2381;&#2351; &#2315;&#2339; &#2360;&#2306;&#2325;&#2335;</span>",
      "<span class=\"eqt\">Famine conditions and reduced agricultural output</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2366;&#2354; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2324;&#2352; &#2325;&#2371;&#2359;&#2367; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Balance of payments crisis</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2360;&#2306;&#2325;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The Sixth Five Year Plan(1980-85) focussed on Increase in national income, modernization of technology, ensuring continuous decrease in poverty and unemployment through schemes for transferring skills(TRYSEM) and seets(IRDP) and providing slack season employment (NREP), controlling population explosion etc.</p><p>&#183; Broadly , the sixth Plan could be taken as a success as most of the target were realised even though during the last year (1984-85) many parts of the country faced <b>severe famine conditions and agricultural output was less than the record output of previous year.</b></p>",
    "question_index": 112

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the National Health Mission (NHM):</p><p>1) NHM was launched in 2013 by subsuming the National Rural Health Mission and National Urban Health Mission.</p><p>2) It aims to provide universal access to equitable, affordable and quality health care services.</p><p>3) NHM is a Centrally Sponsored Scheme implemented through State Governments.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2350;&#2367;&#2358;&#2344; (&#2319;&#2344;&#2319;&#2330;&#2319;&#2350;) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2350;&#2367;&#2358;&#2344; &#2324;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2358;&#2361;&#2352;&#2368; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2350;&#2367;&#2358;&#2344; &#2325;&#2379; &#2350;&#2367;&#2354;&#2366;&#2325;&#2352; 2013 &#2350;&#2375;&#2306; &#2319;&#2344;&#2319;&#2330;&#2319;&#2350; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p><p>2) &#2311;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2360;&#2349;&#2368; &#2325;&#2379; &#2360;&#2350;&#2366;&#2344;, &#2325;&#2367;&#2347;&#2366;&#2351;&#2340;&#2368; &#2324;&#2352; &#2327;&#2369;&#2339;&#2357;&#2340;&#2381;&#2340;&#2366;&#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2360;&#2375;&#2357;&#2366;&#2319;&#2305; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2319;&#2344;&#2319;&#2330;&#2319;&#2350; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2366;&#2351;&#2379;&#2332;&#2367;&#2340; &#2351;&#2379;&#2332;&#2344;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1, 2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1, 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Statement 1 is correct:</b> The National Health Mission (NHM) was launched by the Government of India in 2013. it encompasses its two sub-missions, the <b>National Rural Health Mission (NRHM)</b> (launched in 2005) and the <b>National Urban Health Mission (NUHM)</b> (launched in 2013).</p><p>&#183; <b>Statement 2 is correct:</b> The primary objective of the mission is to provide universal access to equitable, affordable, and quality health care services that are accountable and responsive to people's needs.</p><p>&#183; <b>Statement 3 is correct:</b> NHM is a <b>Centrally Sponsored Scheme (CSS)</b>. This means it is jointly funded by the Central and State Governments (usually in a 60:40 ratio for most states and 90:10 for North Eastern and Himalayan states) and is implemented by the respective State Governments.</p><p>Further insights:</p><p>&#183; <b>Key Components:</b> NHM includes various components such as Health System Strengthening, Reproductive-Maternal- Neonatal-Child and Adolescent Health (RMNCH+A), and Control of Communicable and Non-Communicable Diseases.</p><p>&#183; <b>Implementation:</b> It is governed by a National Level Steering Group chaired by the Union Minister for Health and Family Welfare and State Level Health Missions chaired by the respective Chief Ministers.</p>",
    "question_index": 113
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the fundamental forces of nature:</p><p>1) The gravitational force between two bodies is independent of the intervening medium, whereas the electromagnetic force is highly dependent on the properties of the medium.</p><p>2) While the gravitational force is exclusively attractive in nature, the electromagnetic force can manifest as either attractive or repulsive based on the polarity of the charges.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367; &#2325;&#2375; &#2350;&#2370;&#2354;&#2349;&#2370;&#2340; &#2348;&#2354;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2342;&#2379; &#2346;&#2367;&#2306;&#2337;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; &#2348;&#2368;&#2330; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2330;&#2369;&#2350;&#2381;&#2348;&#2325;&#2368;&#2351; &#2348;&#2354; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2325;&#2375; &#2327;&#2369;&#2339;&#2379;&#2306; &#2346;&#2352; &#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; &#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2310;&#2325;&#2352;&#2381;&#2359;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2330;&#2369;&#2350;&#2381;&#2348;&#2325;&#2368;&#2351; &#2348;&#2354; &#2310;&#2357;&#2375;&#2358;&#2379;&#2306; &#2325;&#2368; &#2343;&#2381;&#2352;&#2369;&#2357;&#2340;&#2366; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2310;&#2325;&#2352;&#2381;&#2359;&#2325; &#2351;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2352;&#2381;&#2359;&#2325; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2375; &#2346;&#2381;&#2352;&#2325;&#2335; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Gravity works the same everywhere, but electric and magnetic forces change depending on what is present between the objects.</p><p>Gravitational force does not depend on the medium between the interacting masses; it acts the same in vacuum, air, or any material medium.</p><p>Electromagnetic force, however, depends on the medium, as its magnitude is affected by the permittivity and permeability of the medium.</p><p>Masses always pull each other, but charges can either pull or push.</p><p>Gravity is always attractive; there is no such thing as gravitational repulsion in classical physics.</p><p>The electromagnetic force can be:</p><p>Attractive (opposite charges)</p><p>Repulsive (like charges)</p><p><b><u>Further Insights:</u></b></p><p>Gravity is the weakest but longest-range fundamental force.</p><p>Electromagnetic force is responsible for atomic structure and chemistry.</p><p>Strong and weak nuclear forces act at subatomic distances only.</p><p>Gravitational force cannot be shielded, unlike electromagnetic force.</p><p>The inverse-square law applies to both gravitational and electromagnetic forces.</p>",
    "question_index": 114
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1) Igneous rocks, formed at high temperatures, remain chemically stable when exposed to surface conditions and rainwater.</p><p>2) Sedimentary rocks are generally more stable at Earth's surface conditions compared to igneous rocks, although certain types like limestone are highly susceptible to carbonation.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2313;&#2330;&#2381;&#2330; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2310;&#2327;&#2381;&#2344;&#2375;&#2351; &#2330;&#2335;&#2381;&#2335;&#2366;&#2344;&#2375;&#2306;, &#2360;&#2340;&#2361;&#2368; &#2346;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2357;&#2352;&#2381;&#2359;&#2366; &#2332;&#2354; &#2325;&#2375; &#2360;&#2306;&#2346;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2310;&#2344;&#2375; &#2346;&#2352; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2381;&#2341;&#2367;&#2352; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2309;&#2357;&#2360;&#2366;&#2342;&#2368; &#2330;&#2335;&#2381;&#2335;&#2366;&#2344;&#2375;&#2306; &#2310;&#2350; &#2340;&#2380;&#2352; &#2346;&#2352; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2368; &#2360;&#2340;&#2361;&#2368; &#2346;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2310;&#2327;&#2381;&#2344;&#2375;&#2351; &#2330;&#2335;&#2381;&#2335;&#2366;&#2344;&#2379;&#2306; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325; &#2360;&#2381;&#2341;&#2367;&#2352; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2361;&#2366;&#2354;&#2366;&#2306;&#2325;&#2367; &#2330;&#2370;&#2344;&#2366; &#2346;&#2340;&#2381;&#2341;&#2352; &#2332;&#2376;&#2360;&#2368; &#2325;&#2369;&#2331; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2330;&#2335;&#2381;&#2335;&#2366;&#2344;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2344;&#2375;&#2358;&#2344; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2360;&#2306;&#2357;&#2375;&#2342;&#2344;&#2358;&#2368;&#2354; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Rocks formed in fire (igneous rocks) don't stay stable when exposed to air and rain - they break down more easily.</p><p>Igneous rocks (like basalt, granite) are formed at very high temperatures deep inside the Earth.</p><p>When exposed at the surface, they experience low temperature, water, oxygen, and CO&#8322; - conditions very different from where they formed.</p><p>This makes them chemically unstable at the surface.</p><p>They undergo rapid weathering, especially through:</p><p>Chemical weathering (hydrolysis, oxidation)</p><p>Physical weathering (exfoliation)</p><p>Sedimentary rocks usually handle surface conditions better, but some - like limestone - dissolve quickly in acidic rainwater.</p><p>Sedimentary rocks form under surface or near-surface conditions, so they are generally more stable at Earth's surface than igneous rocks.</p><p>However, some sedimentary rocks (like limestone) are highly reactive:</p><p>Limestone (CaCO&#8323;) easily undergoes carbonation with CO&#8322;-rich rainwater &rarr; dissolves fast.</p><p>This leads to karst topography, caves, sinkholes, etc.</p><p><b><u>Further Insights:</u></b></p><p>Granite weathers mainly through hydrolysis of feldspar into clay.</p><p>Basalt weathers faster than granite because it contains more iron and magnesium minerals.</p><p>Sandstone is one of the most stable sedimentary rocks.</p><p>Limestone weathering forms karst landscapes (caves, stalactites, sinkholes).</p><p>Weathering rate depends on climate, rock type, and mineral composition.</p>",
    "question_index": 115
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following rivers does NOT flow through the Deccan Trap region?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2344;&#2342;&#2368; &#2342;&#2325;&#2381;&#2325;&#2344; &#2332;&#2366;&#2354; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2344;&#2361;&#2368;&#2306; &#2348;&#2361;&#2340;&#2368; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Godavari</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Tapi</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2346;&#2368;</span>",
      "<span class=\"eqt\">Narmada</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2381;&#2350;&#2342;&#2366;</span>",
      "<span class=\"eqt\">Mahanadi</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2344;&#2342;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The <b>Mahanadi</b> river does NOT flow through the <b>Deccan Trap</b> region.</p><p><b>Geological Context:</b> The <b>Deccan Traps</b> are a large igneous province located on the Deccan Plateau of west-central India. They consist of multiple layers of solidified flood basalt. This region primarily covers modern-day <b>Maharashtra</b> and parts of Gujarat and Madhya Pradesh.</p><p>&#183; <b>Godavari :</b> Originates in the Trimbakeshwar (Nashik) region of Maharashtra, which is the heart of the Deccan Traps. It flows eastward across the basaltic plateau.</p><p>&#183; <b>Tapi :</b> Flows through the rift valley between the Satpura and Ajanta ranges, passing through the basaltic regions of Maharashtra and Gujarat.</p><p>&#183; <b>Narmada :</b> While its source (Amarkantak) is in the Maikal Hills, its middle and lower courses flow through the northern fringes of the Deccan Trap region in Madhya Pradesh and Gujarat.</p><p>&#183; <b>Mahanadi:</b> Originates from the <b>Sihawa</b> range in Chhattisgarh and flows through the <b>Chhattisgarh Plains</b> and Odisha. Geologically, this basin is part of the <b>Gondwana</b> formations and the Eastern Ghats, which are composed of older metamorphic and sedimentary rocks (like granite, phyllites, and quartzites) rather than the volcanic basalt of the Deccan Traps.</p>",
    "question_index": 116
  },

    "question": "<span class=\"eqt\"><p>Which of the following pairs of radioactive isotopes and their primary industrial or medical applications is <b>WRONGLY</b> matched?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2343;&#2352;&#2381;&#2350;&#2368; &#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325;&#2379;&#2306; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2351;&#2366; &#2330;&#2367;&#2325;&#2367;&#2340;&#2381;&#2360;&#2366; &#2309;&#2344;&#2369;&#2346;&#2381;&#2352;&#2351;&#2379;&#2327;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; <b>&#2327;&#2354;&#2340;</b> &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Americium-241  -  Ionization-type smoke detectors</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2375;&#2352;&#2367;&#2325;&#2367;&#2351;&#2350;-241 - &#2310;&#2351;&#2344;&#2368;&#2325;&#2352;&#2339;-&#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2343;&#2369;&#2319;&#2305; &#2325;&#2375; &#2337;&#2367;&#2335;&#2375;&#2325;&#2381;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Cobalt-60  -  Radiotherapy to kill cancer cells</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2348;&#2366;&#2354;&#2381;&#2335;-60 - &#2325;&#2376;&#2306;&#2360;&#2352; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2379; &#2344;&#2359;&#2381;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2341;&#2375;&#2352;&#2375;&#2346;&#2368;</span>",
      "<span class=\"eqt\">Iodine-131  -  Primary tracer for PET scans</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2379;&#2337;&#2368;&#2344;-131 - &#2346;&#2368;&#2312;&#2335;&#2368; &#2360;&#2381;&#2325;&#2376;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2335;&#2381;&#2352;&#2375;&#2360;&#2352;</span>",
      "<span class=\"eqt\">Carbon-14  -  Determining the age of organic remains</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344;-14 - &#2332;&#2376;&#2357;&#2367;&#2325; &#2309;&#2357;&#2358;&#2375;&#2359;&#2379;&#2306; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2339;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>I-131 is mainly used for:</p><p>Treatment of <b>thyroid cancer</b></p><p>Treatment of <b>hyperthyroidism</b></p><p><b><u>Further Insights:</u></b></p><p>PET scans detect positron emissions, not gamma or beta radiation.</p><p>Cobalt-60 teletherapy units were widely used before linear accelerators became common.</p><p>Americium-241 is produced from plutonium-241 decay.</p><p>Carbon-14 is naturally formed in the atmosphere when cosmic rays strike nitrogen.</p><p>I-131 has an 8-day half-life, making it effective for thyroid therapies.</p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>Consider the following pairs of Gandhian movements and their primary objectives:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Movement</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Primary Objective</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) Champaran Satyagraha</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Abolition of the Tinkathia system of Indigo cultivation</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) Ahmedabad Mill Strike</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">demand for a 35% wage increase</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) Kheda Satyagraha</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Remission of land revenue due to crop failure</td></tr></table><p>Which of the pairs given above are correctly matched?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2366;&#2306;&#2343;&#2368;&#2357;&#2366;&#2342;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;&#2379;&#2306; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351;</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) &#2330;&#2306;&#2346;&#2366;&#2352;&#2339; &#2360;&#2340;&#2381;&#2351;&#2366;&#2327;&#2381;&#2352;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2344;&#2368;&#2354; &#2325;&#2368; &#2326;&#2375;&#2340;&#2368; &#2325;&#2368; &#2340;&#2367;&#2344;&#2325;&#2336;&#2367;&#2351;&#2366; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2313;&#2344;&#2381;&#2350;&#2370;&#2354;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) &#2309;&#2361;&#2350;&#2342;&#2366;&#2348;&#2366;&#2342; &#2350;&#2367;&#2354; &#2361;&#2337;&#2364;&#2340;&#2366;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">35% &#2357;&#2375;&#2340;&#2344; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2350;&#2366;&#2306;&#2327;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) &#2326;&#2375;&#2337;&#2364;&#2366; &#2360;&#2340;&#2381;&#2351;&#2366;&#2327;&#2381;&#2352;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2347;&#2360;&#2354; &#2326;&#2352;&#2366;&#2348; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2349;&#2370;-&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2325;&#2368; &#2331;&#2370;&#2335;</td></tr></table><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2332;&#2379;&#2337;&#2364;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2350;&#2375;&#2354; &#2326;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Champaran Satyagraha (1917) was Gandhi's first Satyagraha in India.</p><p>Its purpose was to abolish the Tinkathia system, under which peasants were forced to grow indigo on 3/20th of their land.</p><p>Kheda Satyagraha (1918) targeted the British rule that demanded full land revenue despite major crop failure. Gandhi supported peasants in demanding complete remission of revenue.</p><p>Ahmedabad Mill Strike (1918) was about the demand for a 35% wage increase for mill workers.</p><p>The \"Plague Bonus\" was a temporary bonus earlier given during the plague outbreak. Mill owners later removed it, but the main issue Gandhi handled was wage disputes</p><p><b><u>Further Insights:</u></b></p><p>Champaran Satyagraha marked Gandhi's entry into mass Indian politics.</p><p>Ahmedabad Mill Strike introduced Gandhi's famous tactic of <b>fasting as a moral weapon</b>.</p><p>Kheda Satyagraha showcased cooperation between Gandhi, Sardar Patel, and Indulal Yagnik.</p><p>All three struggles laid the foundation of Gandhi's later nationwide mass movements.</p><p>These early satyagrahas helped develop Gandhi's core methods  -  <b>non-violence, truth, negotiation, and public mobilization</b>.</p>",
    "question_index": 118
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the economic policy tools used in India:</p><p>1) Monetary Policy involves the use of Government Expenditure and Taxation to influence the level of economic activity.</p><p>2) Fiscal Policy is managed by the Central Bank (RBI) using tools like the Repo Rate, Cash Reserve Ratio (CRR), and Open Market Operations.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2351;&#2369;&#2325;&#2381;&#2340; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367; &#2350;&#2375;&#2306; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367; &#2325;&#2375; &#2360;&#2381;&#2340;&#2352; &#2325;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2357;&#2381;&#2351;&#2351; &#2324;&#2352; &#2325;&#2352;&#2366;&#2343;&#2366;&#2344; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</p><p>2) &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2344;&#2368;&#2340;&#2367; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2348;&#2376;&#2306;&#2325; (&#2310;&#2352;&#2348;&#2368;&#2310;&#2312;) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2352;&#2375;&#2346;&#2379; &#2342;&#2352;, &#2344;&#2325;&#2342; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; (&#2360;&#2368;&#2310;&#2352;&#2310;&#2352;) &#2324;&#2352; &#2326;&#2369;&#2354;&#2375; &#2348;&#2366;&#2332;&#2366;&#2352; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2332;&#2376;&#2360;&#2375; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Government expenditure and taxation are tools of Fiscal Policy, not monetary policy.</p><p>Monetary Policy deals with money supply, interest rates, and credit control, managed by the RBI, not the government.</p><p>Repo Rate, CRR, SLR, Bank Rate, and OMOs are tools of Monetary Policy, not fiscal policy.</p><p>Fiscal Policy is handled by the Government of India (Ministry of Finance), not the RBI.</p><p><b><u>Further Insights:</u></b></p><p>The RBI announces its monetary policy through the Monetary Policy Committee (MPC).</p><p>Fiscal policy aims at growth and redistribution, while monetary policy aims at price stability and inflation control.</p><p>Fiscal policy effects are long-term, whereas monetary policy effects can be more immediate.</p><p>Monetary policy influences credit availability, affecting investment and consumption.</p><p>Fiscal deficits are managed through government borrowing, impacting overall economic stability.</p>",
    "question_index": 119
  },

    "question": "<span class=\"eqt\"><p>Which organ failure is most closely linked to the inability to clear lactate from the body?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2352;&#2368;&#2352; &#2360;&#2375; &#2354;&#2376;&#2325;&#2381;&#2335;&#2375;&#2335; &#2325;&#2379; &#2348;&#2366;&#2361;&#2352; &#2344;&#2367;&#2325;&#2366;&#2354;&#2344;&#2375; &#2350;&#2375;&#2306; &#2309;&#2360;&#2350;&#2352;&#2381;&#2341;&#2340;&#2366; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2360;&#2368;&#2343;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343; &#2325;&#2367;&#2360; &#2309;&#2306;&#2327; &#2325;&#2368; &#2357;&#2367;&#2347;&#2354;&#2340;&#2366; &#2360;&#2375; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Spleen failure</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2367;&#2354;&#2381;&#2354;&#2368; &#2325;&#2368; &#2357;&#2367;&#2347;&#2354;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Gallbladder failure</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2340;&#2381;&#2340;&#2366;&#2358;&#2351; &#2325;&#2368; &#2357;&#2367;&#2347;&#2354;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Brain failure</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2360;&#2381;&#2340;&#2367;&#2359;&#2381;&#2325; &#2325;&#2368; &#2357;&#2367;&#2347;&#2354;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Liver failure</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2325;&#2371;&#2340; &#2325;&#2366; &#2325;&#2366;&#2350; &#2325;&#2352;&#2344;&#2366; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2375;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The liver acts like a recycling center for lactate. If the liver stops working properly, lactate builds up in the body.</p><p>The liver is the primary organ responsible for clearing lactate from the blood.</p><p>Lactate is converted back into glucose in the liver through the Cori cycle.</p><p>When the liver fails, lactate accumulates in the blood, leading to lactic acidosis.</p><p>The spleen is involved in blood filtration and immune function,</p><p>The gallbladder stores bile and aids in fat digestion.</p><p><b><u>Further Insights:</u></b></p><p>Lactate is produced during anaerobic metabolism.</p><p>Lactic acidosis is common in liver failure and shock.</p><p>Kidneys also help clear lactate, but the liver plays the dominant role.</p><p>The Cori cycle links muscle activity with liver glucose production.</p><p>Elevated lactate is a marker of tissue hypoxia and organ dysfunction.</p>",
    "question_index": 120
  },

    "question": "<span class=\"eqt\"><p>With reference to the Sayyid Dynasty of the Delhi Sultanate, consider the following statements:</p><p>1) The Sayyid Dynasty (1414 - 1451) was the third dynasty of the Delhi Sultanate, succeeding the Tughlaq Dynasty.</p><p>2) The dynasty was founded by Mubarak Shah, the former Governor of Multan, who ruled as a deputy of Timur (Tamerlane) rather than assuming the title of Sultan.</p><p>3) Muhammad Shah, the nephew of Mubarak Shah, was a weak successor whose reign saw the rise of powerful nobles and threats from the Sultanate of Malwa.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2325;&#2375; &#2360;&#2376;&#2351;&#2381;&#2351;&#2342; &#2357;&#2306;&#2358; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2360;&#2376;&#2351;&#2381;&#2351;&#2342; &#2357;&#2306;&#2358; (1414 - 1451) &#2340;&#2369;&#2327;&#2354;&#2325; &#2357;&#2306;&#2358; &#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2325;&#2366; &#2340;&#2368;&#2360;&#2352;&#2366; &#2357;&#2306;&#2358; &#2341;&#2366;&#2404;</p><p>2) &#2311;&#2360; &#2357;&#2306;&#2358; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2350;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344; &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352; &#2350;&#2369;&#2348;&#2366;&#2352;&#2325; &#2358;&#2366;&#2361; &#2344;&#2375; &#2325;&#2368; &#2341;&#2368;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344; &#2325;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2343;&#2366;&#2352;&#2339; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2340;&#2376;&#2350;&#2370;&#2352; (&#2340;&#2376;&#2350;&#2370;&#2352;&#2354;&#2306;&#2327;) &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2358;&#2366;&#2360;&#2344; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>3) &#2350;&#2369;&#2348;&#2366;&#2352;&#2325; &#2358;&#2366;&#2361; &#2325;&#2375; &#2349;&#2340;&#2368;&#2332;&#2375; &#2350;&#2369;&#2361;&#2350;&#2381;&#2350;&#2342; &#2358;&#2366;&#2361; &#2319;&#2325; &#2325;&#2350;&#2332;&#2379;&#2352; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368; &#2341;&#2375;, &#2332;&#2367;&#2344;&#2325;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2358;&#2325;&#2381;&#2340;&#2367;&#2358;&#2366;&#2354;&#2368; &#2360;&#2352;&#2342;&#2366;&#2352;&#2379;&#2306; &#2325;&#2366; &#2313;&#2342;&#2351; &#2361;&#2369;&#2310; &#2324;&#2352; &#2350;&#2366;&#2354;&#2357;&#2366; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2360;&#2375; &#2326;&#2340;&#2352;&#2375; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2369;&#2319;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 3</span>",
      "<span class=\"eqt\">1,2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct sequence of Delhi Sultanate dynasties is:</p><p>Mamluk (Slave) Dynasty</p><p>Khalji Dynasty</p><p>Tughlaq Dynasty</p><p>Sayyid Dynasty</p><p>Lodi Dynasty</p><p>Thus, the Sayyids were the 4th dynasty, not the 3rd.</p><p>Khizr Khan founded the Dynasty; Mubarak Shah came after him.</p><p>Muhammad Shah couldn't control nobles or enemies - his rule was weak.</p><p><b><u>Further Insights:</u></b></p><p>The Sayyid rulers often acknowledged the Timurid overlordship.</p><p>Their actual territorial control was limited mostly to Delhi and its surroundings.</p><p>The last Sayyid ruler, Ala-ud-din Alam Shah, voluntarily abdicated in favor of Bahlul Lodi.</p><p>The Sayyid period marks the political fragmentation of North India.</p><p>Timur's 1398 invasion severely weakened the Delhi Sultanate, enabling the rise of the Sayyids.</p>",
    "question_index": 121
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1) Rich Like Us is a novel written by Nayantara Sahgal.</p><p>2) The novel critically examines the Emergency period in India.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2352;&#2367;&#2330; &#2354;&#2366;&#2311;&#2325; &#2309;&#2360; &#2344;&#2351;&#2344;&#2340;&#2366;&#2352;&#2366; &#2360;&#2361;&#2327;&#2354; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2326;&#2367;&#2340; &#2319;&#2325; &#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; &#2361;&#2376;&#2404;</p><p>2) &#2351;&#2361; &#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2366;&#2354; &#2325;&#2366; &#2310;&#2354;&#2379;&#2330;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2357;&#2367;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are correct regarding this significant piece of Indian English literature.</p><p>&#183; <b>Statement 1 is correct:</b> <i>Rich Like Us</i> is a historical and political novel written by <b>Nayantara Sahgal</b>, published in 1985. She is well-known for her works that blend personal stories with the political history of India. The book won the Sinclair Prize for fiction and the Sahitya Akademi Award.</p><p>&#183; <b>Statement 2 is correct:</b> The novel is set in New Delhi and is a scathing critique of <b>The Emergency (1975 - 1977)</b>. It examines the erosion of democratic values, the rise of corruption, and the impact of authoritarianism on different social classes through the lives of its protagonists, Rose and Sonali.</p>",
    "question_index": 122
