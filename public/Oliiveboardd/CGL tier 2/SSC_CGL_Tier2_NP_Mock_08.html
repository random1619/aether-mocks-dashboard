        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Present age of Khushi and Jitu are in the ratio of 6: 7 and five years ago, the ratio of their age was 7: 9, then what is the age of Jitu 8 years ago?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2326;&#2364;&#2369;&#2358;&#2368; &#2324;&#2352; &#2332;&#2368;&#2340;&#2370; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 6: 7 &#2361;&#2376; &#2340;&#2341;&#2366; &#2346;&#2366;&#2306;&#2330; &#2357;&#2352;&#2381;&#2359; &#2346;&#2361;&#2354;&#2375;, &#2313;&#2344;&#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 7: 9 &#2341;&#2366; , &#2340;&#2379; 8 &#2357;&#2352;&#2381;&#2359; &#2346;&#2361;&#2354;&#2375; &#2332;&#2368;&#2340;&#2370; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2367;&#2340;&#2344;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">5 years</span><span class=\"hqt\" style=\"display:none\">5 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">6 years</span><span class=\"hqt\" style=\"display:none\">6 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">12 years</span><span class=\"hqt\" style=\"display:none\">12 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">14 years</span><span class=\"hqt\" style=\"display:none\">14 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let present age of Khushi and Jitu are 6x years and 7x years respectively.</p><p>According to the question,</p><p>(6x  -  5)/(7x  -  5) = 7: 9 </p><p>=&gt; 54x  -  45 = 49x  -  35</p><p>=&gt; 5x = 10</p><p>=&gt; x = 2</p><p>So, age of Jitu after 8 years = 7*2 - 8 = 6 years</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Pipes A and B can fill a tub in 4 minutes and 5 minutes respectively, while a leak drains water at 10 litres per minute. When all three are operating together, the tub is just filled in 20 minutes. What is the capacity of the tub in litres?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; B &#2319;&#2325; &#2335;&#2348; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 4 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 5 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2352;&#2367;&#2360;&#2366;&#2357; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; 10 &#2354;&#2368;&#2335;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2367;&#2344;&#2335; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2346;&#2366;&#2344;&#2368; &#2348;&#2361; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; &#2340;&#2368;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2350; &#2325;&#2352; &#2352;&#2361;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2335;&#2348; 20 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2335;&#2348; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2354;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">20 litres</span><span class=\"hqt\" style=\"display:none\">20 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">25 litres</span><span class=\"hqt\" style=\"display:none\">25 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">30 litres</span><span class=\"hqt\" style=\"display:none\">30 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">35 litres</span><span class=\"hqt\" style=\"display:none\">35 &#2354;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let capacity = C L. </p><p>Rate of A = C/4 L/min </p><p>Rate of B = C/5 L/min </p><p>Leak =  - 10 L/min </p><p>Net fill rate = C/4 + C/5  -  10 = C/20 X (5 + 4)  -  10 = 9C/20  -  10 </p><p>In 20 min, net addition = 20 X (9C/20  -  10) = 9C  -  200 = C (whole tank) </p><p>9C  -  200 = C &rarr; 8C = 200 &rarr; C = 25 L </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which one of the following is the arithmetic mean of &radic;6 - &radic;5 and its reciprocal?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &radic;6 - &radic;5 &#2324;&#2352; &#2311;&#2360;&#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350; &#2325;&#2366; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2350;&#2366;&#2343;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;6</span><span class=\"hqt\" style=\"display:none\">&radic;6</span>",
      "<span class=\"eqt\">&radic;5</span><span class=\"hqt\" style=\"display:none\">&radic;5</span>",
      "<span class=\"eqt\">2&radic;6</span><span class=\"hqt\" style=\"display:none\">2&radic;6</span>",
      "<span class=\"eqt\">2&radic;5</span><span class=\"hqt\" style=\"display:none\">2&radic;5</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Reciprocal of (&radic;6 - &radic;5) = 1/ (&radic;6 - &radic;5) = 1 * (&radic;6 + &radic;5)/ [(&radic;6 - &radic;5) * (&radic;6 + &radic;5)]</p><p>= &radic;6 + &radic;5</p><p>Arithmetic mean = [(&radic;6 - &radic;5) + (&radic;6 + &radic;5)]/2</p><p>= 2&radic;6/2 </p><p>= &radic;6 </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A man sold a TV for a loss of 5%. Had it been sold for Rs200 more, he would have gained 5%. Find the price at which he should sell it to gain 15%</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2319;&#2325; TV 5% &#2325;&#2368; &#2361;&#2366;&#2344;&#2367; &#2346;&#2352; &#2348;&#2375;&#2330; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;| &#2351;&#2342;&#2367; &#2311;&#2360;&#2375; 200 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2343;&#2367;&#2325; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366;, &#2340;&#2379; &#2311;&#2360;&#2375; 5% &#2354;&#2366;&#2349; &#2350;&#2367;&#2354;&#2340;&#2366;| 15% &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2311;&#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;|</p></span>",
    "options": [
      "<span class=\"eqt\">2100</span><span class=\"hqt\" style=\"display:none\">2100</span>",
      "<span class=\"eqt\">2200</span><span class=\"hqt\" style=\"display:none\">2200</span>",
      "<span class=\"eqt\">2300</span><span class=\"hqt\" style=\"display:none\">2300</span>",
      "<span class=\"eqt\">2400</span><span class=\"hqt\" style=\"display:none\">2400</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>According to the question,</p><p>Let 'x' be the cost price of TV</p><p>1.05x-0.95x = 200</p><p>(10/100)x = 200</p><p>x = 2000</p><p>Now S.P = 115*2000/100</p><p>= 2300</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A box contains 3 red balls and 5 blue balls. Two balls are drawn one after another without replacement. If the second ball drawn is red, find the probability that the first ball drawn was also red</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2337;&#2367;&#2348;&#2381;&#2348;&#2375; &#2350;&#2375;&#2306; 3 &#2354;&#2366;&#2354; &#2327;&#2375;&#2306;&#2342;&#2375;&#2306; &#2324;&#2352; 5 &#2344;&#2368;&#2354;&#2368; &#2327;&#2375;&#2306;&#2342;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2342;&#2379; &#2327;&#2375;&#2306;&#2342;&#2375;&#2306; &#2348;&#2367;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344; &#2325;&#2375; &#2319;&#2325; &#2325;&#2375; &#2348;&#2366;&#2342; &#2319;&#2325; &#2344;&#2367;&#2325;&#2366;&#2354;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2344;&#2367;&#2325;&#2366;&#2354;&#2368; &#2327;&#2312; &#2342;&#2370;&#2360;&#2352;&#2368; &#2327;&#2375;&#2306;&#2342; &#2354;&#2366;&#2354; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360; &#2348;&#2366;&#2340; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2344;&#2367;&#2325;&#2366;&#2354;&#2368; &#2327;&#2312; &#2346;&#2361;&#2354;&#2368; &#2327;&#2375;&#2306;&#2342; &#2349;&#2368; &#2354;&#2366;&#2354; &#2341;&#2368;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">3/5</span><span class=\"hqt\" style=\"display:none\">3/5</span>",
      "<span class=\"eqt\">2/3</span><span class=\"hqt\" style=\"display:none\">2/3</span>",
      "<span class=\"eqt\">1/7</span><span class=\"hqt\" style=\"display:none\">1/7</span>",
      "<span class=\"eqt\">2/7</span><span class=\"hqt\" style=\"display:none\">2/7</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let,</p><p>A = First ball is red</p><p>B = Second ball is red</p><p>We need: P(A | B)</p><p>By Bayes' theorem:</p><p>P(A | B) = [P(A &#8745; B)] / P(B)</p><p>Probability that first ball is red = 3/8</p><p>After that, remaining red balls = 2</p><p>Remaining total balls = 7</p><p>So,</p><p>P(A &#8745; B) = (3/8)  (2/7) = 6/56 = 3/28</p><p>Second ball can be red in two ways:</p><p> First red, second red</p><p> First blue, second red</p><p>P(B) = P(RR) + P(BR)</p><p>Now,</p><p>P(RR) = (3/8)  (2/7) = 6/56</p><p>P(BR) = (5/8)  (3/7) = 15/56</p><p>So,</p><p>P(B) = (6 + 15) / 56 = 21/56 = 3/8</p><p>Now,</p><p>P(A | B) = (3/28)  (3/8)</p><p>P(A | B) = (3/28)  (8/3)</p><p>P(A | B) = 8/28 = 2/7</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If a<sup>2</sup> + b<sup>2</sup> = 145 and ab = 40, then find the value of a<sup>3</sup> + b<sup>3</sup>.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; a<sup>2</sup> + b<sup>2</sup> = 145 &#2361;&#2376; &#2324;&#2352; ab = 40 &#2361;&#2376;, &#2340;&#2379; a<sup>3</sup> + b<sup>3 </sup>&#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1230</span><span class=\"hqt\" style=\"display:none\">1230</span>",
      "<span class=\"eqt\">1275</span><span class=\"hqt\" style=\"display:none\">1275</span>",
      "<span class=\"eqt\">1400</span><span class=\"hqt\" style=\"display:none\">1400</span>",
      "<span class=\"eqt\">1575</span><span class=\"hqt\" style=\"display:none\">1575</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>a<sup>2</sup> + b<sup>2</sup> = 145 and ab = 40</p><p>(a + b)<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup> + 2ab = 145 + 2*40 = 225</p><p>a + b = 15</p><p>a<sup>3</sup> + b<sup>3</sup> = (a + b)<sup>3</sup>  -  3ab(a + b)</p><p>= 15<sup>3</sup>  -  3*40*15</p><p>= 3375 -  1800</p><p>= 1575</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Find the difference between the simple interest received on Rs. 8500 at 10% and 15% for 3 years.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2369;. 8500 &#2325;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 10% &#2324;&#2352; 15% &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 1385</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1385</span>",
      "<span class=\"eqt\">Rs. 1325</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1325</span>",
      "<span class=\"eqt\">Rs. 1280</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1280</span>",
      "<span class=\"eqt\">Rs. 1275</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1275</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>S.I. = (P * r * t)/100</p><p>Required difference = [P * t * (r<sub>2</sub>  -  r<sub>1</sub>)]/100</p><p>= (8500 * 5 * 3)/100 = 85 * 5 * 3 = Rs. 1275</p>",
    "question_index": 6

    "question": "<span class=\"eqt\"><p>A line is the perpendicular bisector of the line segment connecting points X(7, 5) and Y(-6, 4). What is the x-intercept of the line?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2352;&#2375;&#2326;&#2366;, &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; X(7, 5) &#2324;&#2352; Y(-6, 4) &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2352;&#2375;&#2326;&#2366;&#2326;&#2306;&#2337; &#2325;&#2366; &#2354;&#2306;&#2348; &#2360;&#2350;&#2342;&#2381;&#2357;&#2367;&#2349;&#2366;&#2332;&#2325; &#2361;&#2376;&#2404; &#2313;&#2360; &#2352;&#2375;&#2326;&#2366; &#2325;&#2366; x-&#2309;&#2306;&#2340;&#2307;&#2326;&#2306;&#2337; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [

      "<span class=\"eqt\">13/11</span><span class=\"hqt\" style=\"display:none\">13/11</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>Given: X(7, 5) and Y(-6, 4)</p><p>Mid-point of XY:</p><p>M = (x<sub>1</sub> + x<sub>2</sub>)/2, (y<sub>1</sub> + y<sub>2</sub>)/2</p><p>= [7 + (-6)]/2, (5 + 4)/2</p><p>= 1/2 , 9/2</p><p>Slope of XY = m = (y<sub>2</sub>  -  y<sub>1</sub>)/(x<sub>2</sub>  -  x<sub>1</sub>)</p><p>= (4  -  5)/(-6  -  7) = 1/13</p><p>Slope of perpendicular bisector = -1/m = -1/(1/13) = -13</p><p>Equation of line through M(1/2, 9/2) =&gt;</p><p>y  -  9/2 = -13(x  -  1/2)</p><p>y  -  9/2 = -13x + 13/2</p><p>y = -13x + 11</p><p>For x-intercept =&gt; y = 0</p><p>0 = -13x + 11</p><p>13x = 11</p><p>x = 11/13</p>",

    "question": "<span class=\"eqt\"><p>How many terms are there in the given A.P. series?</p><p>1 + &radic;2, 4 + 4&radic;2, 7 + 7&radic;2, ......., 37 + 37&radic;2</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2358;&#2381;&#2352;&#2375;&#2338;&#2364;&#2368; &#2358;&#2381;&#2352;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2342; &#2361;&#2376;&#2306;?</p><p>1 + &radic;2, 4 + 4&radic;2, 7 + 7&radic;2, ......., 37 + 37&radic;2</p></span>",

      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",

    "correct_option_id": 3,
    "solution": "<p>In the given A.P. series:</p><p>First term = 1 + &radic;2</p><p>Common difference = (4 + 4&radic;2)  -  (1 + &radic;2) = 3 + 3&radic;2</p><p>Last term = 37 + 37&radic;2</p><p>Let number of terms = n</p><p>Then, 37 + 37&radic;2 = (1 + &radic;2) + (n  -  1) * (3 + 3&radic;2)</p><p><b>n = 13</b></p>",

    "question": "<span class=\"eqt\"><p>The variance of 25 daily returns is 100. Each return x is transformed to y = &#8722;3x + 5. Find the new standard deviation.</p></span><span class=\"hqt\" style=\"display:none\">25 &#2342;&#2376;&#2344;&#2367;&#2325; &#2352;&#2367;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2357;&#2367;&#2330;&#2352;&#2339; 100 &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2352;&#2367;&#2335;&#2352;&#2381;&#2344; x &#2325;&#2379; y = -3x + 5 &#2350;&#2375;&#2306; &#2352;&#2370;&#2346;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2351;&#2366; &#2350;&#2366;&#2344;&#2325; &#2357;&#2367;&#2330;&#2354;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>",
      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Original standard deviation, &#963;&#8339; = &radic;variance = &radic;100 = 10</p><p>Standard deviation is affected only by multiplication or division. If a variable is multiplied by a constant, the standard deviation also gets multiplied by the absolute value of that constant. However, addition or subtraction of any number does not change the standard deviation.</p><p>In the given transformation, the original variable is multiplied by 3 and then 5 is added. The multiplication by 3 will affect the standard deviation, while the addition of 5 will have no effect.</p><p>Therefore, the new standard deviation = 10 x 3 = 30</p>",
    "question_index": 21
  },

    "question": "<span class=\"eqt\"><p>In the question given below, a statement/question is given followed by three arguments related to the statement/question. Choose the correct answer that follows.</p><p><b>Statement: </b>Should the Indian government stop spending money on sports and the players?</p><p><b>Arguments:</b></p><p>I. Yes, this would save the money which can otherwise be used in other sectors like education and agriculture.</p><p>II. Yes, the players are anyway not able to bring medals and accolades for the country.</p><p>III. No, this will not be fair to people who are good at sports but are not financially strong to invest on training.</p><p>Which of the above arguments is a/are strong argument(s)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2341;&#2344;/&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2325;&#2341;&#2344;/&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2340;&#2368;&#2344; &#2340;&#2352;&#2381;&#2325; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2340;&#2352;&#2381;&#2325;/&#2340;&#2352;&#2381;&#2325;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><b>&#2325;&#2341;&#2344;: </b>&#2325;&#2381;&#2351;&#2366; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2326;&#2375;&#2354; &#2319;&#2357;&#2306; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;  &#2340;&#2352;&#2381;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2346;&#2381;&#2352;&#2348;&#2354; &#2340;&#2352;&#2381;&#2325; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Arguments I and III are strong arguments</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2352;&#2381;&#2325; I &#2324;&#2352; III &#2350;&#2332;&#2348;&#2370;&#2340; &#2340;&#2352;&#2381;&#2325; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only argument III is a strong argument</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2340;&#2352;&#2381;&#2325; III &#2319;&#2325; &#2350;&#2332;&#2348;&#2370;&#2340; &#2340;&#2352;&#2381;&#2325; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only argument I is a strong argument</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2340;&#2352;&#2381;&#2325; I &#2319;&#2325; &#2350;&#2332;&#2348;&#2370;&#2340; &#2340;&#2352;&#2381;&#2325; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only argument II is a strong argument</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2340;&#2352;&#2381;&#2325; II &#2319;&#2325; &#2350;&#2332;&#2348;&#2370;&#2340; &#2340;&#2352;&#2381;&#2325; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Spending money on sports cannot be stopped so that it can be spent to uplift the society or the economy. Even though the players are not able to bring medals, it does not necessarily mean that they should be banned from participating (which will be the case if they are not able to get proper training which will happen when the investment on sports sector stops). If the expenses on sports are stopped, then the players who are good sportspersons will not be able to train due to the lack of facilities and training centres and will not be able to participate in sports globally. Only argument III is a strong argument.</p>",

 &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p><p>(I) Q, P &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; R, T &#2324;&#2352; S &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; P, R &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;&#2404;</p><p>(II) T, S &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;&#2404; P, T &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2324;&#2352; Q &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>In a certain language, ALMOND is coded as ZMNPME. How will CASHEWNUT be coded in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, ALMOND &#2325;&#2379; ZMNPME &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2368; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; CASHEWNUT &#2325;&#2379; &#2325;&#2376;&#2360;&#2375; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">XBIHVXMVG</span><span class=\"hqt\" style=\"display:none\">XBIHVXMVG</span>",
      "<span class=\"eqt\">XBHXVIMVG</span><span class=\"hqt\" style=\"display:none\">XBHXVIMVG</span>",
      "<span class=\"eqt\">XBHIVXNMG</span><span class=\"hqt\" style=\"display:none\">XBHIVXNMG</span>",
      "<span class=\"eqt\">XBHIVXMVG</span><span class=\"hqt\" style=\"display:none\">XBHIVXMVG</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In the word - ALMOND, the letters which are present at odd number places are replaced by the opposite alphabet as per the English alphabetical series.</p><p>The letters which are present at the even number places are replaced by the immediate next alphabet as per the English alphabetical series.</p><p>So, CASHEWNUT is converted into XBHIVXMVG.</p>",

    "question": "<span class=\"eqt\"><p>The question given below consists of two statements, one labelled as 'Assertion (A)' and the other labelled as the 'Reason (R)'. You have to examine these two statements carefully and decide if the Assertion (A) and the Reason (R) are individually true and if so, whether the Reason (R) is a correct explanation of the Assertion (A).</p><p>Assertion (A): Spring tides happen whenever there is a new moon or a full moon and have nothing to do with the season of spring.</p><p>Reason (R): When the sun, moon and Earth are all lined up, the sun's tidal force works with the moon's tidal force. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2342;&#2379; &#2325;&#2341;&#2344; &#2361;&#2376;&#2306;, &#2319;&#2325; &#2325;&#2379; '&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A)' &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; '&#2325;&#2366;&#2352;&#2339; (R)' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2375;&#2348;&#2354; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2310;&#2346;&#2325;&#2379; &#2311;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2366;&#2357;&#2343;&#2366;&#2344;&#2368;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2332;&#2366;&#2305;&#2330; &#2325;&#2352;&#2344;&#2368; &#2361;&#2376; &#2324;&#2352; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A) &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; (R) &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2324;&#2352; &#2351;&#2342;&#2367; &#2     "question": "<span class=\"eqt\"><p>In the question given below, a passage is given followed by two statements. From the options, choose the one that reflects the correct choice of assumption(s) that follows/follow.</p><p><b>Statement: </b>The people living in the area used the unoccupied piece of land to dump their garbage.</p><p><b>Assumptions:</b></p><p>I. There are no barricades or walls on the boundary of the unoccupied land.</p><p>II. All vacant sites in any residential locality are used for dumping garbage.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2327;&#2342;&#2381;&#2351;&#2366;&#2306;&#2358; &#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375;, &#2313;&#2360;&#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2343;&#2366;&#2352;&#2339;&#2366;(&#2343;&#2366;&#2352;&#2339;&#2366;&#2323;&#2306;) &#2325;&#2375; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><b>&#2325;&#2341;&#2344;: </b>&#2311;&#2360; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2352;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2354;&#2379;&#2327; &#2326;&#2366;&#2354;&#2368; &#2346;&#2337;&#2364;&#2368; &#2332;&#2350;&#2368;&#2344; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2309;&#2346;&#2344;&#2366; &#2325;&#2330;&#2352;&#2366; &#2347;&#2375;&#2306;&#2325;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p><b>&#2343;&#2366;&#2352;&#2339;&#2366;:</b></p><p>I. &#2326;&#2366;&#2354;&#2368; &#2346;&#2337;&#2364;&#2368; &#2332;&#2350;&#2368;&#2344; &#2325;&#2368; &#2360;&#2368;&#2350;&#2366; &#2346;&#2352; &#2325;&#2379;&#2312; &#2348;&#2376;&#2352;&#2367;&#2325;&#2375;&#2337; &#2351;&#2366; &#2342;&#2368;&#2357;&#2366;&#2352; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p><p>II. &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2310;&#2357;&#2366;&#2360;&#2368;&#2351; &#2311;&#2354;&#2366;&#2325;&#2375; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2326;&#2366;&#2354;&#2368; &#2332;&#2327;&#2361;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2330;&#2352;&#2366; &#2337;&#2366;&#2354;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only II is implicit</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both I and II are implicit</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only I is implicit</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Neither I nor II is implicit</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Neither I nor II is implicit. The statement cites one incident from which it cannot be assumed that all vacant sites turn into an area of garbage disposal. Also, it cannot be assumed that having no boundary lead to the garbage disposal by the people. People with no civic sense would do so even when there are barricades and people with civic sense would not dump garbage on any empty space of land where garbage is not supposed to be dumped. Hence, (d) is correct.</p>",

    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>The coach said to her, \"How did you perform in the last match?\"</p>",
    "options": [
      "The coach asked her how she performed in the last match.",
      "The coach asked her how she had performed in the last match.",
      "The coach asked her how had she performed in the last match.",
      "The coach asked her how she has performed in the last match."
    ],
    "correct_option_id": 1,
    "solution": "<p>In the case of Interrogative sentences like this, \"said\" in Direct Speech is changed into \"enquired (of)\", \"wanted to know\", \"asked\", etc.</p><p>In Indirect speech, the verb is always placed after the subject, unlike in Direct Speech. <b>So, option c) is incorrect as the verb \"had\" is placed before the subject. </b></p><p>For example:</p><p>The teacher said to him, \"What is your name?\" (Direct Speech)</p><p>The teacher asked him what his name was. (Indirect Speech)</p><p>Also, the sentence in the Direct Speech is in the <b>Simple Past tense</b>. So, the tense in the Indirect Speech should be in the <b>Past Perfect tense</b>.</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>\"Said to her\" will be changed to \"asked her\". </p><p>\"Did you perform\" will be changed to \"she had performed\". </p><p>Therefore, the correct answer is <b>option b)</b>: The coach asked her how she had performed in the last match.</p>",
    "question_index": 60
  },

    "comp": "<p><b>Directions :</b>   Read the given passage and answer the questions that follow.</p><p>Amidst the lush Western Ghats of India, there lived a young girl named Leela. Unlike other children, she possessed a peculiar gift  -  she could hear the whispers of ancient trees. One day, as she wandered deeper into the forest, the ancient banyan tree, venerable and wise, beckoned her closer. The tree revealed a secret: a hidden portal to a parallel world within its roots. Intrigued, Leela stepped through the portal and found herself in a vibrant realm of colours and melodies. The inhabitants were ethereal beings known as Vayuputras, guardians of the elements. They were in peril, as their world was losing its balance, causing natural disasters in Leela's world.</p><p>Leela, with her unique ability, became their hope. Guided by the mystical Vayuputras, she embarked on a quest to retrieve the lost Crystal of Elements, the source of their power. Through trials and tribulations, Leela faced formidable challenges, encountering shape-shifting serpents and benevolent forest spirits. In her journey, Leela learned the art of elemental manipulation, harnessing the power of earth, water, fire, and air. With newfound abilities, she confronted the malevolent Asura, a being of immense darkness who sought to harness the Crystal's power for evil.</p><p>In a climactic battle, Leela used her mastery over elements to defeat the Asura. With the Crystal of Elements restored, balance was reinstated in both worlds. The Vayuputras expressed their gratitude, offering Leela a choice: return to her world or become their eternal guardian. Choosing to return, Leela emerged from the portal, forever changed. She shared her incredible journey, inspiring her village with tales of bravery, friendship, and the unbreakable bond between different worlds. The villagers, enchanted by her story, planted saplings, believing that the ancient trees whispered their thanks through the wind.</p>",
    "question": "<p>Which statement best explains why the loss of balance in the Vayuputras' world is a serious concern?</p>",
    "options": [
      "It only affects the ethereal beings.",
      "It occurs mostly in parallel realms.",
      "It relies on elemental powers.",
      "It causes natural disasters in Leela's world."
    ],
    "correct_option_id": 3,
    "solution": "<p>Option (d) is correct because the passage highlights that the imbalance endangers both worlds by triggering natural disasters in Leela's reality, underscoring the interconnected peril and urgency of restoration.</p><p>Reference Line:</p><p>They were in peril, as their world was losing its balance, causing natural disasters in Leela's world. (Paragraph 2)</p><p>Option (a) ignores the cross-realm consequences.</p><p>Option (b) limits the issue to an isolated context.</p><p>Option (c) refers to a specific mechanism, not the core threat.</p><p>Hence, (d) is the correct answer.</p>",
    "question_index": 61
  },

    "solution": "<p>The helping verb 'have' in the given sentence indicates that the sentence is a present perfect one. The present perfect tense is an English verb tense used for past actions that are related to or continue into the present. It's easily recognized by the auxiliary verbs (or helper verbs) 'have' and 'has'. In the present perfect tense, the main verb takes the past participle form (V3). Hence, (d) is the correct answer.</p><p>Note:</p><p>Auxiliary verb: A verb that gives grammatical information that is not given by the main verb of a sentence. It supports the main verb. Auxiliary verbs help to form the various tenses, moods, and voices of other verbs. The principal ones are be, do, and have. Example: She will sing a song tomorrow. Here, will is the auxiliary verb that supports the main verb sing.</p><p>\"Participle: A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p>Dancing at the party, the woman fell on the ground.</p><p>Encouraged by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete, or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p></p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.\"</p>",

    "comp": "<p><b>Directions :</b> Read the given passage and answer the questions that follow:</p><p>A pupil once asked Chanakya, the ancient Indian strategist and philosopher, \"Who holds more power: a king or a kingmaker?\" Chanakya, with his piercing insight into human nature and governance, replied thoughtfully: \"A king's reign is temporary; anyone can rise to the throne, but over time, every king eventually loses his positionbe it through rebellion, age, or fate. A kingmaker, on the other hand, can create many kings and remain in control from the shadows. The king is always under the guidance and influence of the kingmaker, making the kingmaker far more powerful. He governs without an official title or authority, yet his influence shapes everythingfrom policies and alliances to the very destiny of empires.\"</p><p>This timeless wisdom transcends the dusty scrolls of antiquity and resonates deeply in our modern world. If we apply this idea today, the question evolves: Who is more important, a leader or a mentor? In the glare of spotlights and headlines, most people might assume a leader holds the pinnacle of importance. After all, they command boardrooms, steer nations, and make the high-stakes decisions that propel organisations forward or alter global landscapes. Figures like CEOs, presidents, or startup founders embody visible power, their every move scrutinised and celebrated.</p><p>However, a mentor, much like Chanakya's kingmaker, operates in the quiet corridors of influence, wielding a subtler yet far more enduring force. Mentors possess the rare gift of foresight and empathy, nurturing raw potential into polished leadership. They spot untapped talent, impart hard-earned lessons from failures and triumphs, and instill values that outlast any single tenure. Consider historical echoes: Aristotle shaping Alexander the Great's worldview, or in contemporary times, how Warren Buffett's guidance elevated protgs like Bill Gates, or how tech visionaries like Steve Jobs drew from mentors like Robert Noyce. Leaders often credit their mentors for the clarity to navigate crises, yet these guides rarely seek the throne themselves.</p><p>Leaders may burn brightly but briefly, their legacies vulnerable to successors or scandals. Mentors, by contrast, sow seeds across generations, fostering a ripple effect of empowered individuals. Though they lack official authorityno corner office or podiumtheir profound influence endures, quietly steering societies toward progress. In a world obsessed with titles, Chanakya reminds us: true power lies not in the crown, but in the hand that places it.</p>",

 mutual respect. Addressing psychological manipulation therefore requires awareness, critical thinking, and ethical accountability. By recognising manipulative techniques and promoting honest communication, individuals and institutions can reduce harm while preserving the constructive role of influence in human interaction.</p>",

    "comp": "<p><b>Directions : </b>Read the following passage and answer the questions based on the passage:</p><p>Psychological manipulation refers to the deliberate attempt to influence another person's thoughts, emotions, or behaviour through indirect, deceptive, or coercive means. Unlike open persuasion, which allows individuals to evaluate information freely, manipulation often operates subtly, shaping decisions without the target's full awareness. Such techniques are widely used in interpersonal relationships, workplaces, advertising, politics, and digital media, making them a significant concern in modern society. Common techniques of psychological manipulation include gaslighting, where a person is made to doubt their own perceptions or memories, and emotional blackmail, which relies on fear, guilt, or obligation to control behaviour. Other methods involve selective information, exaggeration, or the strategic use of praise and criticism to create dependence. In digital spaces, algorithms and targeted messaging further amplify manipulation by exploiting personal data and emotional vulnerabilities, often blurring the line between influence and control. The ethical concerns surrounding psychological manipulation stem from its impact on autonomy and consent. Manipulative practices undermine an individual's ability to make informed choices, replacing rational judgment with emotional pressure. Over time, such influence can lead to anxiety, reduced self-esteem, and loss of trust, particularly when manipulation occurs in close relationships or authoritative environments. From a societal perspective, large-scale manipulation can distort public opinion, weaken democratic processes, and normalise deception as a tool of power. However, ethical debates also recognise that influence itself is unavoidable in social interactions. The key distinction lies in intent and transparency. Persuasion becomes unethical when it prioritises control over understanding and benefit over mutual respect. Addressing psychological manipulation therefore requires awareness, critical thinking, and ethical accountability. By recognising manipulative techniques and promoting honest communication, individuals and institutions can reduce harm while preserving the constructive role of influence in human interaction.</p>",

    "question": "<span class=\"eqt\"><p>According to the Centre for Research on Energy and Clean Air (CREA) analysis, which city recorded the highest monthly average PM2.5 concentration in November 2025, making it the most polluted city in India?</p></span><span class=\"hqt\" style=\"display:none\">&#2314;&#2352;&#2381;&#2332;&#2366; &#2324;&#2352; &#2360;&#2381;&#2357;&#2330;&#2381;&#2331; &#2357;&#2366;&#2351;&#2369; &#2309;&#2344;&#2369;&#2360;&#2306;&#2343;&#2366;&#2344; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; (&#2360;&#2368;&#2310;&#2352;&#2312;&#2319;) &#2325;&#2375; &#2357;&#2367;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2344;&#2357;&#2306;&#2348;&#2352; 2025 &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2358;&#2361;&#2352; &#2350;&#2375;&#2306; &#2346;&#2368;&#2319;&#2350;2.5 &#2325;&#2368; &#2350;&#2366;&#2360;&#2367;&#2325; &#2324;&#2360;&#2340; &#2360;&#2366;&#2306;&#2342;&#2381;&#2352;&#2340;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2342;&#2352;&#2381;&#2332; &#2325;&#2368; &#2327;&#2312;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2357;&#2361; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2346;&#2381;&#2352;&#2342;&#2370;&#2359;&#2367;&#2340; &#2358;&#2361;&#2352; &#2348;&#2344; &#2327;&#2351;&#2366;?</span>",

    "question": "<span class=\"eqt\"><p>During a National Emergency, even if an order under Article 359 suspends the enforcement of Fundamental Rights, which rights remain enforceable by courts?</p></span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2351;&#2342;&#2367; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 359 &#2325;&#2375; &#2340;&#2361;&#2340; &#2332;&#2366;&#2352;&#2368; &#2310;&#2342;&#2375;&#2358; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2379; &#2344;&#2367;&#2354;&#2306;&#2348;&#2367;&#2340; &#2325;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2349;&#2368; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2344; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2354;&#2366;&#2327;&#2370; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Articles 20 and 21</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 20 &#2324;&#2352; 21</span>",
      "<span class=\"eqt\">All rights except Article 19</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 19 &#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352; &#2360;&#2349;&#2368; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">None; all Fundamental Rights stand suspended</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;; &#2360;&#2349;&#2368; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2344;&#2367;&#2354;&#2306;&#2348;&#2367;&#2340; &#2352;&#2361;&#2375;&#2306;&#2327;&#2375;&#2404;</span>",
      "<span class=\"eqt\">Only Article 14</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 14</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The 44th Constitutional Amendment ensured that Articles 20 and 21 cannot be suspended even by an Article 359 order.</p><p>Thus, protection in respect of conviction for offences and life and personal liberty remains enforceable.</p><p>Further Insights:</p><p>- Grounds for National Emergency (Article 352): war, external aggression, armed rebellion.</p><p>- Article 358 (post-44th Amendment): automatic suspension of Article 19 operates only during emergencies on war/external aggression, not armed rebellion.</p><p>- Approval timeline: within one month by both Houses; reviewable and revocable.</p><p>- Lok Sabha can override extension via a special sitting and resolution (Article 352(8)).</p>",
    "question_index": 109
  },
  {
    "question": "<span class=\"eqt\"><p>The Digital Agriculture Mission (DAM) launched by the Union Cabinet aims to:</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2350;&#2306;&#2337;&#2354; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2319; &#2327;&#2319; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2325;&#2371;&#2359;&#2367; &#2350;&#2367;&#2358;&#2344; (&#2337;&#2368;&#2319;&#2319;&#2350;) &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2361;&#2376;:</span>",
    "options": [
      "<span class=\"eqt\">Replace traditional farming with fully automated agriculture</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2326;&#2375;&#2340;&#2368; &#2325;&#2379; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2360;&#2381;&#2357;&#2330;&#2366;&#2354;&#2367;&#2340; &#2325;&#2371;&#2359;&#2367; &#2360;&#2375; &#2348;&#2342;&#2354;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Improve farmers' lives through the use of digital and data-driven technologies</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2324;&#2352; &#2337;&#2375;&#2335;&#2366;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2332;&#2368;&#2357;&#2344; &#2360;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2354;&#2366;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Provide minimum support prices for all agricultural commodities</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2325;&#2371;&#2359;&#2367; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2350;&#2370;&#2354;&#2381;&#2351; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Promote only organic farming across India</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2332;&#2376;&#2357;&#2367;&#2325; &#2326;&#2375;&#2340;&#2368; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The Digital Agriculture Mission (DAM) focuses on using technology and digital tools to improve decision-making, productivity, and overall livelihoods of farmers.</p><p>&#183; The Union Cabinet led by PM Narendra Modi announced the launch of Digital Agriculture Mission (DAM) with an outlay of Rs 2,817 crore, in an attempt to improve farmers' lives through technology.</p><p>&#183; The government has given its nod to total of seven agriculture projects worth Rs 13,966. 7 major decisions have been taken in the cabinet meeting for improving the lives of farmers. A major component of DAM mission is the creation of an Agri Stack, which includes a Farmers Registry, Village Land Maps Registry, and Crop Sown Registry.</p><p>&#183; The Agri Stack will serve as a comprehensive database through detailed records of farmers, land usage, and crop patterns.Another crucial aspect of the mission is the Krishi Decision Support System. This system will leverage geospatial data, drought and flood monitoring, weather and satellite data, and groundwater availability information to assist farmers in making informed decisions.</p>",
    "question_index": 110
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct?</p><p>Statement I: The gravitational force between Earth and Moon would double if the distance between them doubled.</p><p>Statement II: According to Newton's law, gravitational force is proportional to the product of masses and inversely proportional to the square of the separation.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344; 1: &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2324;&#2352; &#2330;&#2306;&#2342;&#2381;&#2352;&#2350;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2313;&#2344;&#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; &#2349;&#2368; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2344;&#2381;&#2351;&#2370;&#2335;&#2344; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2350;&#2376;&#2306; &#2324;&#2352; &#2344; &#2361;&#2368; &#2342;&#2370;&#2360;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Gravitational force varies as 1/r<sup>2</sup>; doubling r reduces force to one-fourth, not double; Statement I is false.</p><p>Statement II states the correct law: F = G m<sub>1</sub> m<sub>2</sub> / r<sup>2</sup>.</p><p>Further Insights:</p><p>- Kepler's third law for circular orbits: T<sup>2</sup> &#8733; r<sup>3</sup>; orbital speed v &#8733; 1/&radic;r for same central mass.</p><p>- G &#8776; 6.67 X 10<sup>&#8722;11</sup> N m<sup>2</sup> kg<sup>&#8722;2</sup>.</p><p>- Weight is mg near Earth; it decreases with altitude as g &#8733; 1/r<sup>2</sup> from Earth's center.</p>",
    "question_index": 111
  },

    "question": "<span class=\"eqt\"><p>In 2025, Sarwagya Singh Kushwaha became the youngest ever to gain an official FIDE rating at three years, seven months and 20 days. His debut FIDE rating stood at __________________.</p></span><span class=\"hqt\" style=\"display:none\">2025 &#2350;&#2375;&#2306;, &#2360;&#2352;&#2381;&#2357;&#2332;&#2381;&#2334; &#2360;&#2367;&#2306;&#2361; &#2325;&#2369;&#2358;&#2357;&#2366;&#2361;&#2366; &#2340;&#2368;&#2344; &#2360;&#2366;&#2354;, &#2360;&#2366;&#2340; &#2350;&#2361;&#2368;&#2344;&#2375; &#2324;&#2352; 20 &#2342;&#2367;&#2344; &#2325;&#2368; &#2313;&#2350;&#2381;&#2352; &#2350;&#2375;&#2306; &#2310;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2325; FIDE &#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2348; &#2340;&#2325; &#2325;&#2375; &#2360;&#2348;&#2360;&#2375; &#2325;&#2350; &#2313;&#2350;&#2381;&#2352; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2368; &#2348;&#2344; &#2327;&#2319;&#2404; &#2313;&#2344;&#2325;&#2368; &#2346;&#2361;&#2354;&#2368; FIDE &#2352;&#2375;&#2335;&#2367;&#2306;&#2327; __________________ &#2341;&#2368;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">1572</span><span class=\"hqt\" style=\"display:none\">1572</span>",
      "<span class=\"eqt\">1460</span><span class=\"hqt\" style=\"display:none\">1460</span>",
      "<span class=\"eqt\">1400</span><span class=\"hqt\" style=\"display:none\">1400</span>",
      "<span class=\"eqt\">1620</span><span class=\"hqt\" style=\"display:none\">1620</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Sarwagya Singh Kushwaha, 3, has created history in the chess world by becoming the youngest player ever to earn an official FIDE rating. He achieved this milestone at just three years, seven months and 20 days.</p><p>Born in 2022 and hailing from Sagar in Madhya Pradesh, Sarwagya has been officially listed by FIDE -- the global chess federation that requires players to score points against at least five rated opponents in recognised events.</p><p>His debut rating stands at <b>1,572,</b> well above the minimum threshold of 1,400. His victories came against older and higher-rated opponents, including 22-year-old Abhijeet Awasthi (rating 1,542), 29-year-old Shubham Chourasiya (1,559) and 20-year-old Yogesh Namdev (1,696). Sarwagya has surpassed the previous record set in November 2024 by another Indian player, Anish Sarkar, who earned his first FIDE rating at age of three years, 8 months and 19 days.</p>",
    "question_index": 112
  },

    "question": "<span class=\"eqt\"><p>With reference to the novel \"The Lowland\", consider the following statements:</p><p>1) The novel is written by Jhumpa Lahiri.</p><p>2) It draws inspiration from the Naxalite movement in West Bengal.</p><p>3) The book received the 2013 Man Booker Prize.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; \"&#2342; &#2354;&#2379; &#2354;&#2376;&#2306;&#2337;\" &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2351;&#2361; &#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; &#2333;&#2369;&#2350;&#2381;&#2346;&#2366; &#2354;&#2366;&#2361;&#2367;&#2337;&#2364;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2326;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2351;&#2361; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2375; &#2344;&#2325;&#2381;&#2360;&#2354;&#2357;&#2366;&#2342;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2360;&#2375; &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>3) &#2311;&#2360; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2325;&#2379; 2013 &#2325;&#2366; &#2350;&#2376;&#2344; &#2348;&#2369;&#2325;&#2352; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2350;&#2367;&#2354;&#2366;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Statement 1  -  Correct: The Lowland is the second novel by American author Jhumpa Lahiri, published by Alfred A. Knopf and Random House in 2013.</p><p>&#183; Statement 2  -  Correct: The Lowland is a poignant family saga about two Bengali brothers, Udayan and Subhash Mitra, whose drastically different paths-political radicalism in India and quiet academia in America-become tragically intertwined through love, duty, and a shared history rooted in the 1960s Naxalite movement, exploring themes of identity, exile, homecoming, and enduring bonds across generations and continents.</p><p>&#183; <b>Statement 3  -  Incorrect:</b> In September 2013, The Lowland was placed on the shortlist for the 2013 Man Booker Prize, which ultimately went to The Luminaries by Eleanor Catton.</p>",
    "question_index": 113
  },
  {
    "question": "<span class=\"eqt\"><p>In photosynthesis, which molecule is produced during the light reactions and then consumed in the Calvin cycle?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2339;&#2369; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2347;&#2367;&#2352; &#2325;&#2375;&#2354;&#2381;&#2357;&#2367;&#2344; &#2330;&#2325;&#2381;&#2352; &#2350;&#2375;&#2306; &#2313;&#2360;&#2325;&#2366; &#2313;&#2346;&#2349;&#2379;&#2327; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">O<sub>2</sub></span><span class=\"hqt\" style=\"display:none\">O<sub>2</sub></span>",
      "<span class=\"eqt\">Glucose</span><span class=\"hqt\" style=\"display:none\">Glucose</span>",
      "<span class=\"eqt\">NADPH</span><span class=\"hqt\" style=\"display:none\">NADPH</span>",
      "<span class=\"eqt\">H<sub>2</sub>O</span><span class=\"hqt\" style=\"display:none\">H<sub>2</sub>O</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Light reactions generate ATP and NADPH; the Calvin cycle (in stroma) uses ATP and NADPH to fix CO<sub>2</sub> into carbohydrates.</p><p>O<sub>2</sub> is released in light reactions; water is consumed in photolysis.</p><p>Hence NADPH is correct.</p><p>Further Insights:</p><p>- Light reactions occur in thylakoid membranes; photosystems II and I drive electron flow.</p><p>- The Calvin cycle occurs in the chloroplast stroma and produces triose phosphates (G3P).</p><p>- Rubisco catalyzes CO<sub>2</sub> fixation; photorespiration increases under high O<sub>2</sub>/low CO<sub>2</sub> and high temperature.</p><p>- C4 and CAM plants reduce photorespiration by concentrating CO<sub>2</sub> at rubisco via spatial or temporal separation.</p>",
    "question_index": 114
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about Indian soils:</p><p>1) Black soils show high shrink - swell behaviour due to montmorillonite-rich clay.</p><p>2) Red soils derive their colour mainly from ferric oxide hydrates.</p><p>3) In the Ganga plains, calcareous kankar in older alluvium commonly forms because of leaching.</p><p>4) Laterite soils on Western Ghats summits can support tea/coffee under proper management.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2371;&#2342;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2325;&#2366;&#2354;&#2368; &#2350;&#2371;&#2342;&#2366;&#2319;&#2306; &#2350;&#2379;&#2306;&#2335;&#2350;&#2379;&#2352;&#2367;&#2354;&#2379;&#2344;&#2366;&#2311;&#2335; &#2351;&#2369;&#2325;&#2381;&#2340; &#2330;&#2367;&#2325;&#2344;&#2368; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2360;&#2367;&#2325;&#2369;&#2337;&#2364;&#2344;-&#2347;&#2376;&#2354;&#2344;&#2375; &#2325;&#2366; &#2357;&#2381;&#2351;&#2357;&#2361;&#2366;&#2352; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2354;&#2366;&#2354; &#2350;&#2371;&#2342;&#2366;&#2323;&#2306; &#2325;&#2366; &#2352;&#2306;&#2327; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2347;&#2375;&#2352;&#2367;&#2325; &#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2375;&#2335;&#2381;&#2360; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2327;&#2306;&#2327;&#2366; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2346;&#2369;&#2352;&#2366;&#2344;&#2375; &#2332;&#2354;&#2379;&#2338;&#2364; &#2350;&#2375;&#2306; &#2330;&#2370;&#2344;&#2366;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2306;&#2325;&#2352; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2354;&#2368;&#2330;&#2367;&#2306;&#2327; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2348;&#2344;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>4) &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335; &#2325;&#2368; &#2330;&#2379;&#2335;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2354;&#2375;&#2335;&#2352;&#2366;&#2311;&#2335; &#2350;&#2371;&#2342;&#2366;&#2319;&#2306; &#2313;&#2330;&#2367;&#2340; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2375; &#2340;&#2361;&#2340; &#2330;&#2366;&#2351;/&#2325;&#2377;&#2347;&#2368; &#2325;&#2368; &#2326;&#2375;&#2340;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1, 2 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1, 2 &#2324;&#2352; 4</span>",

    "correct_option_id": 0,
    "solution": "<p>1 is correct: Vertisols (black soils) contain montmorillonite causing shrink - swell.</p><p>2 is correct: iron oxides/hydrates impart the red hue.</p><p>3 is incorrect: kankar accumulates due to calcification (precipitation/evaporation), not leaching.</p><p>4 is correct: laterites can support plantation crops with inputs and irrigation.</p><p>Further Insights:</p><p>- Black soils have high cation exchange capacity and retain moisture well.</p><p>- Red and yellow soils commonly form over crystalline rocks in Peninsular India.</p><p>- Laterite occurs in high rainfall zones; it is used for making building bricks.</p><p>- Old alluvium (bhangar) often contains kankar nodules at depth.</p>",

    "question": "<span class=\"eqt\"><p>Match List I (Stress categories) with List II (Days Past Due for term loans). Choose the correct code.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. SMA-0</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Overdue for 61 - 90 days</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. SMA-1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Overdue for 1 - 30 days</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. SMA-2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Overdue for more than 90 days</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. NPA (Non-Performing Asset)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Overdue for 31 - 60 days</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2330;&#2368; I (&#2340;&#2344;&#2366;&#2357; &#2358;&#2381;&#2352;&#2375;&#2339;&#2367;&#2351;&#2366;&#2305;) &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2360;&#2370;&#2330;&#2368; II (&#2335;&#2352;&#2381;&#2350; &#2354;&#2379;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2325;&#2366;&#2351;&#2366; &#2342;&#2367;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;) &#2360;&#2375; &#2325;&#2352;&#2375;&#2306;&#2404; &#2360;&#2361;&#2368; &#2325;&#2379;&#2337; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. SMA-0</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. 61 - 90 &#2342;&#2367;&#2344;&#2379;&#2306; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2348;&#2325;&#2366;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2319;&#2360;&#2319;&#2350;&#2319;-1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. 1 &#2360;&#2375; 30 &#2342;&#2367;&#2344;&#2379;&#2306; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2360;&#2350;&#2351; &#2360;&#2375; &#2348;&#2325;&#2366;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2319;&#2360;&#2319;&#2350;&#2319;-2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. 90 &#2342;&#2367;&#2344;&#2379;&#2306; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2360;&#2350;&#2351; &#2360;&#2375; &#2348;&#2325;&#2366;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2319;&#2344;&#2346;&#2368;&#2319; (&#2327;&#2376;&#2352;-&#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. 31 &#2360;&#2375; 60 &#2342;&#2367;&#2344;&#2379;&#2306; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2360;&#2350;&#2351; &#2360;&#2375; &#2348;&#2325;&#2366;&#2351;&#2366;</td></tr></table></span>",

    "solution": "<p>The Reserve Bank of India (RBI) classifies loan accounts into different categories based on their performance, particularly the number of days they are overdue. This helps banks identify early warning signs of stress and manage their asset quality.</p><p><b>1. SMA-0 (Special Mention Account - 0) matches with b. Overdue for 1 - 30 days.</b></p><p>This category identifies accounts where the principal or interest payment is overdue for a period of 1 to 30 days. It signifies the earliest signs of potential stress.</p><p><b>2. SMA-1 (Special Mention Account - 1) matches with d. Overdue for 31 - 60 days.</b></p><p>These are accounts where the principal or interest payment is overdue for more than 30 days but up to 60 days. The level of stress is increasing.</p><p><b>3. SMA-2 (Special Mention Account - 2) matches with a. Overdue for 61 - 90 days.</b></p><p>These are accounts where the principal or interest payment is overdue for more than 60 days but up to 90 days. This is the last stage before an account is classified as a Non-Performing Asset.</p><p><b>4. NPA (Non-Performing Asset) matches with c. Overdue for more than 90 days.</b></p><p>An asset becomes a Non-Performing Asset when the principal or interest payment remains overdue for a period of more than 90 days. For agricultural advances, the criteria are based on crop seasons (e.g., two crop seasons for short-duration crops).</p><p>Further Insights:</p><p>The SMA classification system was introduced by the RBI to provide an early warning mechanism for banks, allowing them to take proactive measures to prevent accounts from deteriorating into full-fledged NPAs.</p><p>Timely identification and resolution of stressed assets are crucial for maintaining the health and stability of the banking sector.</p>",
    "question_index": 116
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about Value Added:</p><p>Statement 1: Value added of a firm is obtained by subtracting intermediate consumption from the value of output.</p><p>Statement 2: Sum of value added by all firms in an economy gives Net Domestic Product (NDP).</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2370;&#2354;&#2381;&#2351;&#2357;&#2352;&#2381;&#2343;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2325;&#2367;&#2360;&#2368; &#2347;&#2352;&#2381;&#2350; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351;&#2357;&#2352;&#2381;&#2343;&#2344; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351; &#2350;&#2375;&#2306; &#2360;&#2375; &#2350;&#2343;&#2381;&#2351;&#2357;&#2352;&#2381;&#2340;&#2368; &#2313;&#2346;&#2349;&#2379;&#2327; &#2325;&#2379; &#2328;&#2335;&#2366;&#2325;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2325;&#2367;&#2360;&#2368; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2347;&#2352;&#2381;&#2350;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2319; &#2327;&#2319; &#2350;&#2370;&#2354;&#2381;&#2351;&#2357;&#2352;&#2381;&#2343;&#2344; &#2325;&#2366; &#2351;&#2379;&#2327; &#2358;&#2369;&#2342;&#2381;&#2343; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (&#2319;&#2344;&#2337;&#2368;&#2346;&#2368;) &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Both Statement 1 and Statement 2 are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2324;&#2352; &#2325;&#2341;&#2344; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Both Statement 1 and Statement 2 are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2324;&#2352; &#2325;&#2341;&#2344; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Statement 1 is correct, but Statement 2 is incorrect</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2360;&#2361;&#2368; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2325;&#2341;&#2344; 2 &#2327;&#2354;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Statement 1 is incorrect, but Statement 2 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2327;&#2354;&#2340; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2325;&#2341;&#2344; 2 &#2360;&#2361;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement 1: Calculation of Value Added (Correct)</p><p>In economics, Value Added represents the additional value created by a firm during the production process.</p><p>&#183; It is calculated by taking the total Value of Output (the market value of all goods and services produced) and subtracting Intermediate Consumption (the cost of raw materials, fuel, and services used up in the process).</p><p>&#183; The formula is: Value Added = Value of Output - Intermediate Consumption</p><p>Statement 2: Sum of Value Added (Incorrect)</p><p>The error here lies in the specific national income aggregate mentioned.</p><p>&#183; When you sum the gross value added by all firms in an economy, you get Gross Domestic Product (GDP) at market prices.</p><p>&#183; Net Domestic Product (NDP) is only obtained after subtracting Depreciation (consumption of fixed capital) from the GDP.</p><p>&#183; The correct relationship is: &#8721; Value Added = Gross Domestic Product (GDP)</p><p>NDP = GDP - Depreciation</p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true about Indian monsoon?</p><p>I. During a \"break\" in the southwest monsoon, rainfall decreases sharply over most of the Indian plains.</p><p>II. Such breaks are linked to a northward shift of the monsoon trough toward the Himalayan foothills.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2350;&#2375;&#2306; &#2357;&#2367;&#2352;&#2366;&#2350; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2376;&#2342;&#2366;&#2344;&#2368; &#2311;&#2354;&#2366;&#2325;&#2379;&#2306; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2349;&#2366;&#2327; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2340;&#2368;&#2357;&#2381;&#2352; &#2325;&#2350;&#2368; &#2310;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2357;&#2367;&#2352;&#2366;&#2350; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2327;&#2352;&#2381;&#2340; &#2325;&#2375; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2325;&#2368; &#2340;&#2354;&#2361;&#2335;&#2368; &#2325;&#2368; &#2323;&#2352; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2368; &#2323;&#2352; &#2326;&#2367;&#2360;&#2325;&#2344;&#2375; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2350;&#2376;&#2306; &#2324;&#2352; &#2344; &#2361;&#2368; &#2342;&#2370;&#2360;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Breaks in the monsoon are characterized by suppression of rain over central and peninsular India.</p><p>A break commonly occurs when the monsoon trough migrates close to the Himalayan foothills, concentrating convection there and reducing it elsewhere.</p><p>Further Insights:</p><p>- Breaks are more frequent in July - August; during breaks, rainfall often continues in the Himalayan foothills and NE India.</p><p>- The monsoon trough is a low-pressure zone extending from NW India to the Bay of Bengal.</p><p>- Madden - Julian Oscillation (MJO) phases can modulate active/break spells.</p>",
    "question_index": 118
  },
