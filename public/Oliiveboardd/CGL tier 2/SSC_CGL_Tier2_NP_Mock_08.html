    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true about PM-KISAN?</p><p>I. PM-KISAN provides Rs 6,000 per year to eligible landholding farmer families in three equal installments.</p><p>II. PM-KISAN is a Centrally Sponsored Scheme with equal cost-sharing by States.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2346;&#2368;&#2319;&#2350;-&#2325;&#2367;&#2360;&#2366;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2346;&#2368;&#2319;&#2350;-&#2325;&#2367;&#2360;&#2366;&#2344; &#2346;&#2366;&#2340;&#2381;&#2352; &#2349;&#2370;&#2350;&#2367;&#2343;&#2366;&#2352;&#2325; &#2325;&#2367;&#2360;&#2366;&#2344; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2340;&#2368;&#2344; &#2348;&#2352;&#2366;&#2348;&#2352; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; 6,000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2346;&#2368;&#2319;&#2350;-&#2325;&#2367;&#2360;&#2366;&#2344; &#2319;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2366;&#2351;&#2379;&#2332;&#2367;&#2340; &#2351;&#2379;&#2332;&#2344;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2350;&#2366;&#2344; &#2354;&#2366;&#2327;&#2340; &#2360;&#2366;&#2333;&#2366; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2350;&#2376;&#2306; &#2324;&#2352; &#2344; &#2361;&#2368; &#2342;&#2370;&#2360;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Rs 6,000/year is paid in three installments to eligible landholding farmer families.</p><p>It is a Central Sector Scheme, fully funded by the Government of India; not cost-shared with States.</p><p>Further Insights:</p><p>- Launched in 2019; Aadhaar-based payment to beneficiaries.</p><p>- Exclusions: institutional landholders; higher-income categories (e.g., income tax payers in relevant categories).</p><p>- Payment is released thrice a year (April - July, August - November, December - March).</p>",

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true?</p><p>A. Ozone in the lower atmosphere is a secondary pollutant harmful to human health and crops.</p><p>B. It forms mainly via sunlight-driven reactions of NOx and volatile organic compounds.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A. &#2344;&#2367;&#2330;&#2354;&#2375; &#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2350;&#2375;&#2306; &#2323;&#2332;&#2379;&#2344; &#2319;&#2325; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2346;&#2381;&#2352;&#2342;&#2370;&#2359;&#2325; &#2361;&#2376; &#2332;&#2379; &#2350;&#2366;&#2344;&#2357; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2324;&#2352; &#2347;&#2360;&#2354;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2361;&#2366;&#2344;&#2367;&#2325;&#2366;&#2352;&#2325; &#2361;&#2376;&#2404;</p><p>B. &#2351;&#2361; &#2350;&#2369;&#2326;&#2381;&#2351;&#2340;&#2307; &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2375; &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; NOx &#2324;&#2352; &#2357;&#2366;&#2359;&#2381;&#2346;&#2358;&#2368;&#2354; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2351;&#2380;&#2327;&#2367;&#2325;&#2379;&#2306; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are correct; ozone is harmful and is formed photochemically from NOx and VOCs.</p><p>Further Insights:</p><p>- Tropospheric ozone damages lung tissue and reduces crop yields (e.g., wheat, soybean).</p><p>- Controlling precursor emissions (vehicles, solvents, industry) reduces ozone.</p><p>- National Air Quality Index (AQI) in India includes O3 as a criterion pollutant.</p><p>- Stratospheric ozone (good ozone) absorbs UV-B; tropospheric ozone (bad ozone) is a pollutant.</p>",
    "question_index": 120
  },
  {
    "question": "<span class=\"eqt\"><p>Which tributary contributes the largest share of water to the Godavari?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368; &#2344;&#2342;&#2368; &#2350;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2332;&#2354; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2368; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pranhita</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2339;&#2361;&#2367;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Manjira</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2332;&#2367;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Wardha</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2343;&#2366;</span>",
      "<span class=\"eqt\">Indravati</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2342;&#2381;&#2352;&#2366;&#2357;&#2340;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Pranhita, formed by the confluence of Wardha and Wainganga, contributes the largest discharge to the Godavari.</p><p>Indravati is also a major contributor but less than Pranhita.</p><p>Further Insights:</p><p>- Godavari originates at Trimbak plateau (near Nashik) and empties into the Bay of Bengal.</p><p>- Other key Godavari tributaries: Penganga, Wainganga, Wardha, Manjira, Pranhita, Indravati, Sabari.</p><p>- The Godavari delta spans parts of Andhra Pradesh and is rice-rich.</p><p>- Polavaram Project is a major multipurpose project on the Godavari.</p>",
    "question_index": 121
  },

    "question": "<span class=\"eqt\"><p>Judge the statements about Infectious Disease Treatment and choose correctly.</p><p>Statement I: Antibiotics are ineffective against viral infections.</p><p>Statement II: Viruses lack the cellular targets (e.g., cell wall, 70S ribosomes) that common antibiotics act upon.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2325;&#2381;&#2352;&#2366;&#2350;&#2325; &#2352;&#2379;&#2327;&#2379;&#2306; &#2325;&#2375; &#2313;&#2346;&#2330;&#2366;&#2352; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2319;&#2306;&#2335;&#2368;&#2348;&#2366;&#2351;&#2379;&#2335;&#2367;&#2325;&#2381;&#2360; &#2357;&#2366;&#2351;&#2352;&#2354; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339;&#2379;&#2306; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2309;&#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2357;&#2366;&#2351;&#2352;&#2360; &#2350;&#2375;&#2306; &#2357;&#2375; &#2325;&#2379;&#2358;&#2367;&#2325;&#2368;&#2351; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; (&#2332;&#2376;&#2360;&#2375;, &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2349;&#2367;&#2340;&#2381;&#2340;&#2367;, 70S &#2352;&#2366;&#2311;&#2348;&#2379;&#2360;&#2379;&#2350;) &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2375; &#2332;&#2367;&#2344; &#2346;&#2352; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2319;&#2306;&#2335;&#2368;&#2348;&#2366;&#2351;&#2379;&#2335;&#2367;&#2325;&#2381;&#2360; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both statements are true.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Both statements are not true.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Only Statement I is true.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; I &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Only Statement II is true.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; II &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Antibiotics target bacterial structures/processes; viruses lack these targets.</p><p>Therefore, Statement II explains why antibiotics do not work on viruses.</p><p>Further Insights:</p><p>- Antivirals (e.g., acyclovir, oseltamivir) target viral replication mechanisms.</p><p>- Misuse of antibiotics promotes antimicrobial resistance.</p><p>- Some antibiotics target bacterial peptidoglycan (&#946;-lactams) or 70S ribosomes (macrolides, tetracyclines).</p>",
    "question_index": 122
  },

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct?</p><p>Statement I: The Mauryan Sannidhata supervised provincial revenue collection.</p><p>Statement II: The Sannidhata was in charge of the treasury and storehouses at the center.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344; I: &#2350;&#2380;&#2352;&#2381;&#2351; &#2360;&#2344;&#2381;&#2344;&#2367;&#2343;&#2366;&#2340; &#2346;&#2381;&#2352;&#2366;&#2306;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361; &#2325;&#2368; &#2342;&#2375;&#2326;&#2352;&#2375;&#2326; &#2325;&#2352;&#2340;&#2366; &#2341;&#2366;/&#2325;&#2352;&#2340;&#2368; &#2341;&#2368;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2360;&#2344;&#2381;&#2344;&#2367;&#2343;&#2366;&#2340; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2379;&#2359;&#2366;&#2327;&#2366;&#2352; &#2324;&#2352; &#2349;&#2306;&#2337;&#2366;&#2352;&#2327;&#2371;&#2361;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2349;&#2366;&#2352;&#2368; &#2341;&#2366;/&#2341;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Sannidhata was not the provincial revenue head; that was the role of the Samaharta. So Statement I is false.</p><p>Sannidhata was the treasurer responsible for the state's stores and treasury; Statement II is true.</p><p>Further Insights:</p><p>- Arthashastra mentions Samaharta (chief revenue-collector) and Sannidhata (treasurer).</p><p>- Ashoka appointed Dhamma-Mahamatras to propagate dhamma and oversee welfare.</p><p>- Megasthenes' \"Indika\" describes Pataliputra and administrative divisions.</p><p>- Mauryan state had a large spy network and regulated urban guilds.</p><p>- Provincial capitals included Taxila, Ujjain, and Tosali (per inscriptions and later sources).</p>",
    "question_index": 123
  },
  {
    "question": "<span class=\"eqt\"><p>Which oxide is amphoteric (reacts with both acids and bases)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2313;&#2349;&#2351;&#2343;&#2352;&#2381;&#2350;&#2368; &#2361;&#2376; (&#2309;&#2350;&#2381;&#2354; &#2324;&#2352; &#2325;&#2381;&#2359;&#2366;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;)?</p></span>",
    "options": [
      "<span class=\"eqt\">Al2O<sub>3</sub></span><span class=\"hqt\" style=\"display:none\">Al2O<sub>3</sub></span>",
      "<span class=\"eqt\">CaO</span><span class=\"hqt\" style=\"display:none\">CaO</span>",
      "<span class=\"eqt\">CO<sub>2</sub></span><span class=\"hqt\" style=\"display:none\">CO<sub>2</sub></span>",
      "<span class=\"eqt\">NO</span><span class=\"hqt\" style=\"display:none\">NO</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Al2O<sub>3</sub> reacts with acids to form salts and with bases to form aluminates.</p><p>CaO is basic; CO<sub>2</sub> is an acidic oxide; NO is neutral.</p><p>Further Insights:</p><p>- ZnO and PbO are also amphoteric oxides.</p><p>- Non-metal oxides like SO<sub>2</sub>, CO<sub>2</sub> are generally acidic in water.</p><p>- Metal oxides of highly electropositive metals (e.g., Na<sub>2</sub>O, CaO) are basic.</p><p>- Amphoterism indicates intermediate electronegativity/ionic - covalent character.</p>",
    "question_index": 124
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following was conferred the 58th Jnanpith Award by the President of India, Droupadi Murmu, for contributions to Sanskrit literature, at a ceremony held at Vigyan Bhavan in New Delhi in May 2025?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2342;&#2381;&#2352;&#2380;&#2346;&#2342;&#2368; &#2350;&#2369;&#2352;&#2381;&#2350;&#2370; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351; &#2350;&#2375;&#2306; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; 58&#2357;&#2366;&#2306; &#2332;&#2381;&#2334;&#2366;&#2344;&#2346;&#2368;&#2336; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;, &#2351;&#2361; &#2360;&#2350;&#2366;&#2352;&#2379;&#2361; &#2350;&#2312; 2025 &#2350;&#2375;&#2306; &#2344;&#2312; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2325;&#2375; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2349;&#2357;&#2344; &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Satya Vrat Shastri</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2381;&#2351; &#2357;&#2381;&#2352;&#2340; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Jagadguru Rambhadracharya</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2327;&#2342;&#2381;&#2327;&#2369;&#2352;&#2369; &#2352;&#2366;&#2350;&#2349;&#2342;&#2381;&#2352;&#2366;&#2330;&#2366;&#2352;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Karan Singh</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2344; &#2360;&#2367;&#2306;&#2361;</span>",
      "<span class=\"eqt\">Ramesh Chandra Dutt</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2350;&#2375;&#2358; &#2330;&#2306;&#2342;&#2381;&#2352; &#2342;&#2340;&#2381;&#2340;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The President of India, Smt Droupadi Murmu conferred the 58th Jnanpith Award on Sanskrit scholar <b>Jagadguru Rambhadracharya Ji</b> at a function held at Vigyan Bhavan in New Delhi today (May 16, 2025).</p><p>The President said that literature unites and awakens society. From the social awakening of the 19th century to our freedom struggle in the 20th century, poets and writers have played a great role in connecting people. The song 'Vande Mataram' composed by Bankim Chandra Chattopadhyay has been awakening the children of Mother India for almost 150 years, and will always do so. From Valmiki, Vyas, and Kalidas to the works of eternal poets like Rabindranath Tagore, we feel the pulse of a living India. This pulse is the voice of Indianness.</p><p>The President praised the Bharatiya Jnanpith Trust for awarding outstanding litterateurs of various Indian languages since 1965. She stated that in the process of awarding outstanding literary figures in Indian languages, the selectors of the Bharatiya Jnanpith Award have selected the best literary figures and have preserved and promoted the dignity of this award.</p><p>The President said that Jnanpith Awardee women writers like Ashapurna Devi, Amrita Pritam, Mahadevi Verma, Qurratul-Ain-Haider, Mahasweta Devi, Indira Goswami, Krishna Sobti and Pratibha Ray have observed and experienced Indian tradition and society with special sensitivity and have enriched our literature. She said that our sisters and daughters should actively participate in literary creation and make our social thinking more sensitive by taking inspiration from these great women writers.'</p>",
    "question_index": 125
  },
  {
    "question": "<span class=\"eqt\"><p>Given below are two statements marked as Assertion and Reason. Choose the correct option.</p><p>Assertion (A): The Nehru Report (1928) sought Dominion Status within the British Commonwealth and rejected separate electorates.</p><p>Reason (R): The Simon Commission (1927) had recommended immediate complete independence for India, which the Nehru Report endorsed.</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2325;&#2341;&#2344; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2344;&#2375;&#2361;&#2352;&#2370; &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335; (1928) &#2344;&#2375; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2350;&#2306;&#2337;&#2354; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2337;&#2379;&#2350;&#2367;&#2344;&#2367;&#2351;&#2344; &#2360;&#2381;&#2335;&#2375;&#2335;&#2360; &#2325;&#2368; &#2350;&#2366;&#2306;&#2327; &#2325;&#2368; &#2324;&#2352; &#2346;&#2371;&#2341;&#2325; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2325; &#2350;&#2306;&#2337;&#2354;&#2379;&#2306; &#2325;&#2379; &#2309;&#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404; &#2325;&#2366;&#2352;&#2339; (R): &#2360;&#2366;&#2311;&#2350;&#2344; &#2310;&#2351;&#2379;&#2327; (1927) &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2354;&#2367;&#2319; &#2340;&#2340;&#2381;&#2325;&#2366;&#2354; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2325;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358; &#2325;&#2368; &#2341;&#2368;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2344;&#2375;&#2361;&#2352;&#2370; &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335; &#2344;&#2375; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A is true: the Nehru Report (chaired by Motilal Nehru) asked for Dominion Status and joint electorates with some reservations.</p><p>R is false: the Simon Commission did not recommend immediate complete independence; it proposed constitutional reforms, and its all-British composition led to a boycott.</p><p>Further Insights:</p><p>- \"Simon Go Back\" became the nationwide slogan when the Commission arrived in 1928.</p><p>- Jinnah's Fourteen Points (1929) responded critically to the Nehru Report, reasserting separate electorates and safeguards.</p><p>- The Lahore Session of the INC (Dec 1929) declared Purna Swaraj; 26 January 1930 was observed as Independence Day.</p><p>- The Irwin Declaration (Oct 1929) spoke of eventual Dominion Status; Round Table Conferences followed (1930 - 32).</p><p>- The Government of India Act, 1935, owed partly to Simon Commission findings: provincial autonomy and dyarchy abolition at provinces.</p>",
    "question_index": 126
  },
  {
    "question": "<span class=\"eqt\"><p>Which ISRO mission achieved a soft landing on the Moon's south polar region?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2312;&#2319;&#2360;&#2310;&#2352;&#2323; &#2325;&#2375; &#2325;&#2367;&#2360; &#2350;&#2367;&#2358;&#2344; &#2344;&#2375; &#2330;&#2306;&#2342;&#2381;&#2352;&#2350;&#2366; &#2325;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2368; &#2343;&#2381;&#2352;&#2369;&#2357;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2346;&#2352; &#2360;&#2377;&#2347;&#2381;&#2335; &#2354;&#2376;&#2306;&#2337;&#2367;&#2306;&#2327; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chandrayaan-1</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2306;&#2342;&#2381;&#2352;&#2351;&#2366;&#2344;-1</span>",
      "<span class=\"eqt\">Chandrayaan-2</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2306;&#2342;&#2381;&#2352;&#2351;&#2366;&#2344;-2</span>",
      "<span class=\"eqt\">Mangalyaan</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354;&#2351;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Chandrayaan-3</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2306;&#2342;&#2381;&#2352;&#2351;&#2366;&#2344;-3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Chandrayaan-3 landed its Vikram lander near the lunar south pole on 23 August 2023, a world-first for that region.</p><p>Chandrayaan-2 attempted in 2019 but lost contact during descent.</p><p>Further Insights:</p><p>- Pragyan rover performed in-situ experiments and detected sulphur (S) using LIBS.</p><p>- Launch vehicle: LVM3 (GSLV Mk III) from Sriharikota in July 2023.</p><p>- Chandrayaan-1 (2008) confirmed lunar water signatures.</p><p>- The south polar region is targeted for its permanently shadowed craters and potential volatiles.</p>",
    "question_index": 127
  },
  {
    "question": "<span class=\"eqt\"><p>Read the two statements and choose the correct option:</p><p>Statement 1: The Finance Commission's devolution shares are legally binding on the Union Government.</p><p>Statement 2: Under Article 280, the Finance Commission recommends the distribution of the net proceeds of taxes between the Union and the States and the principles governing grant-in-aid.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2357;&#2367;&#2340;&#2381;&#2340; &#2310;&#2351;&#2379;&#2327; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2343;&#2344; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2339; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352; &#2346;&#2352; &#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2348;&#2366;&#2343;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 280 &#2325;&#2375; &#2340;&#2361;&#2340;, &#2357;&#2367;&#2340;&#2381;&#2340; &#2310;&#2351;&#2379;&#2327; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2352;&#2379;&#2306; &#2325;&#2368; &#2358;&#2369;&#2342;&#2381;&#2343; &#2310;&#2351; &#2325;&#2375; &#2357;&#2367;&#2340;&#2352;&#2339; &#2324;&#2352; &#2309;&#2344;&#2369;&#2342;&#2366;&#2344; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;&#2379;&#2306; &#2325;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both 1 and 2 are true and 2 is the correct explanation of 1</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2324;&#2352; 2, 1 &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both 1 and 2 are true but 2 is not the correct explanation of 1</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; 2, 1 &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">1 is true but 2 is false</span><span class=\"hqt\" style=\"display:none\">1 &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; 2 &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">1 is false but 2 is true</span><span class=\"hqt\" style=\"display:none\">1 &#2327;&#2354;&#2340; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; 2 &#2360;&#2361;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Statement 1 is false: Finance Commission recommendations are advisory; the Union decides acceptance and issues orders accordingly.</p><p>Statement 2 is true: These are constitutional functions under Article 280.</p><p>Further Insights:</p><p>- The Fifteenth Finance Commission recommended 41% vertical devolution of central taxes to states (maintaining 14th FC's 42% less 1% due to J&amp;K reorganization).</p><p>- FC also recommends revenue deficit grants, local body grants, and disaster risk management allocations.</p><p>- The President constitutes an FC every five years or earlier.</p><p>- The President's order under Article 270 implements tax devolution shares after the Union accepts recommendations.</p><p>- FCs use Census data (15th FC used 2011 population with demographic performance criteria).</p>",
    "question_index": 128
  },

    "question": "<span class=\"eqt\"><p>Consider the following regarding Delhi Sultanate measures.</p><p>I. Akbar abolished jizya and established the Ibadat Khana at Fatehpur Sikri.</p><p>II. Jahangir set up the \"Chain of Justice\" (Zar-i Adl) at Agra.</p><p>III. Shah Jahan first introduced the zabt measurement system of revenue.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2325;&#2375; &#2313;&#2346;&#2366;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2309;&#2325;&#2348;&#2352; &#2344;&#2375; &#2332;&#2332;&#2367;&#2351;&#2366; &#2325;&#2352; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2324;&#2352; &#2347;&#2340;&#2375;&#2361;&#2346;&#2369;&#2352; &#2360;&#2367;&#2325;&#2352;&#2368; &#2350;&#2375;&#2306; &#2311;&#2348;&#2366;&#2342;&#2340; &#2326;&#2366;&#2344;&#2366; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;&#2404;</p><p>II. &#2332;&#2361;&#2366;&#2306;&#2327;&#2368;&#2352; &#2344;&#2375; &#2310;&#2327;&#2352;&#2366; &#2350;&#2375;&#2306; \"&#2344;&#2381;&#2351;&#2366;&#2351; &#2325;&#2368; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366;\" (&#2332;&#2352;-&#2319;-&#2309;&#2342;&#2354;) &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2368;&#2404;</p><p>III. &#2358;&#2366;&#2361;&#2332;&#2361;&#2366;&#2305; &#2344;&#2375; &#2360;&#2348;&#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2325;&#2368; &#2332;&#2364;&#2348;&#2381;&#2340; &#2350;&#2366;&#2346;&#2344; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2324;&#2352; &#2340;&#2371;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>I is correct: Akbar abolished jizya (1564) and founded the Ibadat Khana (1575).</p><p>II is correct: Jahangir's chain allowed direct petitions to the emperor.</p><p>III is incorrect: systematic zabt under Todar Mal began in Akbar's reign.</p><p>Further Insights:</p><p>- Akbar's sulh-i kul sought universal tolerance.</p><p>- Mansabdari fixed zat (personal rank) and sawar (cavalry quota).</p><p>- Jahangir's memoir is Tuzuk-i-Jahangiri.</p><p>- Shah Jahan's era is marked by grand architecture, notably Taj Mahal.</p><p>- Aurangzeb reimposed jizya in 1679.</p>",
    "question_index": 129
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about browser cookies:</p><p>1. Cookies store user preferences and session information.</p><p>2. Cookies can execute programs on a user's computer.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2364;&#2352; &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366;&#2323;&#2306; &#2324;&#2352; &#2360;&#2340;&#2381;&#2352; &#2325;&#2368; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>2. &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2325;&#2375; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2346;&#2352; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2330;&#2354;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 (Correct): Cookies are small text files that remember your login state, language settings, and shopping cart items.</p><p>Statement 2 (Incorrect): Cookies are plain text data; they are not executable programs and cannot \"run\" or \"install\" anything on your PC.</p>",
    "question_index": 132

    "question": "<span class=\"eqt\"><p>The Transmission Control Protocol or the Internet Protocol is useful in: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2350;&#2367;&#2358;&#2344; &#2325;&#2306;&#2335;&#2381;&#2352;&#2379;&#2354; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2351;&#2366; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; ______ &#2350;&#2375;&#2306; &#2313;&#2346;&#2351;&#2379;&#2327;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">File transfer</span><span class=\"hqt\" style=\"display:none\">&#2398;&#2366;&#2311;&#2354; &#2335;&#2381;&#2352;&#2366;&#2344;&#2381;&#2360;&#2347;&#2352;</span>",

      "<span class=\"eqt\">Remote login service</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2350;&#2379;&#2335; &#2354;&#2377;&#2327;&#2367;&#2344; &#2360;&#2352;&#2381;&#2357;&#2367;&#2360;</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The Transmission Control Protocol or the Internet Protocol is a communication standard designed to enable computing devices and programs to exchange messages over a network. </p><p>&#183; It functions in such a manner that it sends packets across the internet and ensures the successful delivery of data and messages over networks. </p><p>&#183; Major internet applications such as the World Wide Web, <b>email, remote administration, and file transfer</b> rely on TCP, which is part of the Transport Layer of the TCP/IP suite.</p>",

  },

      "<span class=\"eqt\">A type of computer hardware</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">A programming language</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;&#2367;&#2306;&#2327; &#2354;&#2376;&#2306;&#2327;&#2381;&#2357;&#2375;&#2332;</span>",
      "<span class=\"eqt\">A set of tools used to develop operating systems</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2366; &#2319;&#2325; &#2360;&#2375;&#2335;</span>",
      "<span class=\"eqt\">A program designed to perform specific tasks for users</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2367;&#2332;&#2364;&#2366;&#2311;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A program designed to perform specific tasks for users. Application software refers to a category of computer programs that are designed to perform specific tasks or applications for users. Unlike system software, which manages and controls computer hardware and provides basic functionality, application software is created to address specific user needs, such as word processing, spreadsheet calculations, graphic design, or video editing. Examples of application software include Microsoft Office Suite (Word, Excel, PowerPoint), Adobe Photoshop, and Mozilla Firefox. It is through application software that users interact with computers to accomplish various tasks efficiently and effectively.</p>",
    "question_index": 136
  },
  {
    "question": "<span class=\"eqt\"><p>___________ is used for capitalizing letters and entering different types of symbols.</p></span><span class=\"hqt\" style=\"display:none\"><p>___________ &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2379; &#2325;&#2376;&#2346;&#2367;&#2335;&#2354; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2357;&#2367;&#2359;&#2381;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",

      "<span class=\"eqt\">Alt</span><span class=\"hqt\" style=\"display:none\">Alt</span>",

      "<span class=\"eqt\">Shift</span><span class=\"hqt\" style=\"display:none\">Shift</span>",

    "correct_option_id": 2,
    "solution": "<p><b>Shift - used for capitalizing letters and entering different types of symbols.</b></p><p>Function (Fn) - Other functions such as brightness and volume control.</p><p>Control (Ctrl) - used for entering keyboard shortcuts, such as Ctrl+S, Ctrl+P etc.</p><p>Alt - used in combination with the numeric keys and the Control key for entering keyboard shortcuts.</p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding a router:</p><p>1. A router connects different networks together.</p><p>2. A router uses IP addresses to forward data packets.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2313;&#2335;&#2352; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2352;&#2366;&#2313;&#2335;&#2352; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325;&#2379;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2352;&#2366;&#2313;&#2335;&#2352; &#2337;&#2375;&#2335;&#2366; &#2346;&#2376;&#2325;&#2375;&#2335;&#2379;&#2306; &#2325;&#2379; &#2309;&#2327;&#2381;&#2352;&#2375;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2312;&#2346;&#2368; &#2346;&#2340;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement 1 (Correct): A router acts as a bridge between different networks (e.g., connecting your Home LAN to the Public Internet).</p><p>Statement 2 (Correct): Unlike a switch (which uses MAC addresses), a router looks at the IP address in a data packet to determine the best path to its destination.</p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>Which network topology is known for its ability to provide high fault tolerance and redundancy by interconnecting all devices in a closed loop?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368; &#2325;&#2379; &#2348;&#2306;&#2342; &#2354;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2325;&#2352; &#2361;&#2366;&#2312; &#2347;&#2377;&#2354;&#2381;&#2335; &#2335;&#2377;&#2354;&#2352;&#2375;&#2306;&#2360; &#2324;&#2352; &#2309;&#2340;&#2367;&#2352;&#2375;&#2325; (&#2352;&#2367;&#2337;&#2344;&#2381;&#2337;&#2376;&#2306;&#2360;&#2368;) &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Star topology</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2366;&#2352; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Bus topology</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2360; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Mesh topology</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2358; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Ring topology</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2306;&#2327; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In a ring topology, each device is connected to exactly two neighboring devices, forming a closed loop. This arrangement ensures that if one device fails, the data can still flow through the network in the opposite direction. The circular nature of the topology eliminates the need for a central point of control, resulting in high fault tolerance and redundancy. However, it's important to note that this topology can suffer from performance degradation if the ring is broken or a device malfunctions, requiring careful monitoring and maintenance.</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>By default, the title slide offers ______ text box/es in Microsoft PowerPoint.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2337;&#2367;&#2347;&#2364;&#2377;&#2354;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2360;&#2377;&#2347;&#2381;&#2335; &#2346;&#2377;&#2357;&#2352;&#2346;&#2377;&#2311;&#2306;&#2335; &#2350;&#2375;&#2306; &#2358;&#2368;&#2352;&#2381;&#2359;&#2325;/&#2335;&#2366;&#2311;&#2335;&#2354; &#2360;&#2381;&#2354;&#2366;&#2311;&#2337; ______ &#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2348;&#2377;&#2325;&#2381;&#2360; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",

    "solution": "<p>A title slide in PowerPoint is the first slide in the slide deck and appears in the PowerPoint workspace when that presentation is opened. By default, in PowerPoint, the title slide offers <b>two</b> text boxes for a title and subtitle. The title slide sets the pace for the ensuing presentation.</p>",

  {
    "question": "<span class=\"eqt\"><p>Which of the following statement about computer monitors is correct ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2350;&#2377;&#2344;&#2368;&#2335;&#2352; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Monitors are only used for displaying images and videos.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2377;&#2344;&#2367;&#2335;&#2352; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2375;&#2357;&#2354; &#2311;&#2350;&#2375;&#2332; &#2324;&#2352; &#2357;&#2368;&#2337;&#2367;&#2351;&#2379; &#2325;&#2379; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Monitors are an output device that allows users to see computer-generated information.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2377;&#2344;&#2367;&#2335;&#2352; &#2319;&#2325; &#2310;&#2313;&#2335;&#2346;&#2369;&#2335; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2361;&#2376; &#2332;&#2379; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2375; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2379; &#2342;&#2375;&#2326;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Monitors are a type of input device used to interact with the computer.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2377;&#2344;&#2367;&#2335;&#2352; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2311;&#2344;&#2346;&#2369;&#2335; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; &#2311;&#2306;&#2335;&#2352;&#2376;&#2325;&#2381;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Monitors are responsible for processing data and executing commands.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2377;&#2344;&#2367;&#2335;&#2352; &#2337;&#2375;&#2335;&#2366; &#2325;&#2368; &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2367;&#2306;&#2327; &#2324;&#2352; &#2325;&#2350;&#2366;&#2306;&#2337; &#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2340;&#2381;&#2340;&#2352;&#2342;&#2366;&#2351;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Monitors are an output device that allows users to see computer-generated information. Computer monitors are display devices that provide visual output from the computer. They are used to view text, images, videos, and other graphical content. Monitors receive signals from the computer's graphics card and use technologies like LCD (Liquid Crystal Display) or LED (Light-Emitting Diode) to display the information. They do not have any processing capabilities or the ability to process data or execute commands.</p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following keyboard shortcut is used to create a new folder?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2351;&#2366; &#2347;&#2379;&#2354;&#2381;&#2337;&#2352; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337; &#2358;&#2377;&#2352;&#2381;&#2335;&#2325;&#2335; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ctrl + N</span><span class=\"hqt\" style=\"display:none\">Ctrl + N</span>",
      "<span class=\"eqt\">Ctrl + Shift + N</span><span class=\"hqt\" style=\"display:none\">Ctrl + Shift + N</span>",
      "<span class=\"eqt\">Shift + N</span><span class=\"hqt\" style=\"display:none\">Shift + N</span>",
      "<span class=\"eqt\">Tab + N</span><span class=\"hqt\" style=\"display:none\">Tab + N</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Ctrl + Shift + E: Display all folders above the selected folder.</p><p>&#183; <b>Ctrl + Shift + N</b>: Create a new folder.</p><p>&#183; Num Lock + asterisk (*): Display all subfolders under the selected folder.</p><p>&#183; Num Lock + plus (+): Display the contents of the selected folder.</p><p>&#183; Num Lock + minus (-): Collapse the selected folder.</p>",
    "question_index": 142
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about multitasking:</p><p>1. Multitasking allows multiple programs to run simultaneously.</p><p>2. Time-sharing is used by the OS to allocate CPU time.</p><p>3. Multitasking requires more than one processor.</p><p>Which of the above statements are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2354;&#2381;&#2335;&#2368;&#2335;&#2366;&#2360;&#2381;&#2325;&#2367;&#2306;&#2327; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2350;&#2354;&#2381;&#2335;&#2368;&#2335;&#2366;&#2360;&#2381;&#2325;&#2367;&#2306;&#2327; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2312; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2330;&#2354;&#2366;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2360;&#2350;&#2351; &#2310;&#2357;&#2306;&#2335;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2335;&#2366;&#2311;&#2350;-&#2358;&#2375;&#2351;&#2352;&#2367;&#2306;&#2327; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3. &#2350;&#2354;&#2381;&#2335;&#2368;&#2335;&#2366;&#2360;&#2381;&#2325;&#2367;&#2306;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2352; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 (Correct): It gives the illusion of simultaneous execution by switching between tasks incredibly fast.</p><p>Statement 2 (Correct): Time-sharing ensures each process gets a \"slice\" of CPU time so no single program freezes the system.</p><p>Statement 3 (Incorrect): Multitasking can happen on a single-core processor through rapid switching (context switching).</p>",
    "question_index": 143
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about worms:</p><p>1. Worms can spread across networks without human interaction.</p><p>2. Worms require a host program to replicate.</p><p>3. Worms can consume network bandwidth.</p><p>Which of the above statements are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2352;&#2381;&#2350;&#2381;&#2360; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2357;&#2352;&#2381;&#2350;&#2381;&#2360; &#2348;&#2367;&#2344;&#2366; &#2350;&#2366;&#2344;&#2357;&#2368;&#2351; &#2361;&#2360;&#2381;&#2340;&#2325;&#2381;&#2359;&#2375;&#2346; &#2325;&#2375; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2346;&#2352; &#2347;&#2376;&#2354; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2. &#2357;&#2352;&#2381;&#2350;&#2381;&#2360; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2371;&#2340;&#2367; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2361;&#2379;&#2360;&#2381;&#2335; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3. &#2357;&#2352;&#2381;&#2350;&#2381;&#2360; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2348;&#2376;&#2306;&#2337;&#2357;&#2367;&#2337;&#2381;&#2341; &#2325;&#2366; &#2313;&#2346;&#2349;&#2379;&#2327; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",

    "correct_option_id": 3,
    "solution": "<p>Statement 1 (Correct): Worms exploit security holes to move automatically from one computer to another over a network.</p><p>Statement 2 (Incorrect): Unlike a Virus (which needs a host file), a Worm is a standalone file that replicates itself.</p><p>Statement 3 (Correct): Because they replicate so fast across networks, they often \"clog\" the bandwidth, causing slow internet speeds.</p>",

    "question": "<span class=\"eqt\"><p>Match the Following Email Protocols</p><p><table style=\"border-collapse:collapse;\"></p><p><tr></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List-I (Protocol)</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List-II (Purpose)</th></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. SMTP</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Receiving emails</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. POP3</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Sending emails</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. IMAP</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Server-based email access</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. HTTPS</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Secure web browsing</td></p><p></tr></p><p></table></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2312;&#2350;&#2375;&#2354; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;</p><p><table style=\"border-collapse:collapse;\"><tr></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. SMTP</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2312;&#2350;&#2375;&#2354; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. POP3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2312;&#2350;&#2375;&#2354; &#2349;&#2375;&#2332;&#2344;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. IMAP</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2360;&#2352;&#2381;&#2357;&#2352;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2312;&#2350;&#2375;&#2354; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. HTTPS</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2357;&#2375;&#2348; &#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2364;&#2367;&#2306;&#2327;</td></tr></table></p></span>",

    "correct_option_id": 2,
    "solution": "<p>A-2 (SMTP): Simple Mail Transfer Protocol - used to send or push mail.</p><p>B-1 (POP3): Downloads mail to a local device and usually deletes it from the server.</p><p>C-3 (IMAP): Syncs mail across devices; the master copy stays on the server.</p><p>D-4 (HTTPS): Encrypts web traffic (used for Webmail interfaces).</p>",
