  {
    "question": "<span class=\"eqt\"><p>In a triangle ABC, AB is extended to E such that &#8736;CBE = 130&deg;. If 6&#8736;A = 7&#8736;C, find the value of &#8736;A.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; ABC &#2350;&#2375;&#2306;, AB &#2325;&#2379; E &#2340;&#2325; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2348;&#2338;&#2364;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2367; &#8736;CBE = 130<sup>0 </sup>&#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 6&#8736;A = 7&#8736;C &#2361;&#2376;, &#2340;&#2379; &#8736;A &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">90&deg;</span><span class=\"hqt\" style=\"display:none\">90<sup>0</sup></span>",
      "<span class=\"eqt\">60&deg;</span><span class=\"hqt\" style=\"display:none\">60<sup>0</sup></span>",
      "<span class=\"eqt\">70&deg;</span><span class=\"hqt\" style=\"display:none\">70<sup>0</sup></span>",
      "<span class=\"eqt\">45&deg;</span><span class=\"hqt\" style=\"display:none\">45<sup>0</sup></span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=366 height=158 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3789/image001.png\"></p><p>6&#8736;A = 7&#8736;C</p><p>&#8736;A : &#8736;C = 1/6 : 1/7 = 7:6</p><p>&#8736;A + &#8736;C = 130&deg; [ An exterior angle of a triangle is equal to the sum of the two opposite interior angles]</p><p>&#8736;A = 7/(7 + 6) x 130&deg;</p><p>=&gt; &#8736;A = 7/13 x 130&deg;</p><p>=&gt; &#8736;A = 70&deg;</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Find the unit digit in the given product 423<sup>31</sup> * 679<sup>67</sup>.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; 423<sup>31</sup> * 679<sup>67</sup> &#2350;&#2375;&#2306; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Unit digit of 423<sup>31</sup> = 3<sup>31</sup></p><p>Unit digit of 679<sup>67</sup> = 9<sup>67</sup></p><p>Unit digit of 3<sup>1</sup>, 3<sup>2</sup>, 3<sup>3</sup>, 3<sup>4</sup>, 3<sup>5</sup>, ...... are 3, 9, 7, 1, 3, ..... respectively.</p><p>Hence, unit digit of 3<sup>31</sup> = Unit digit of (3<sup>4</sup>)<sup>7</sup> * 3<sup>3</sup> = 1 * 7 = 7</p><p>Unit digit of 9<sup>1</sup>, 9<sup>2</sup>, 9<sup>3</sup>, ...... are 9, 1, 9, ..... respectively.</p><p>Hence, unit digit of 9<sup>67</sup> = Unit digit of (9<sup>2</sup>)<sup>33</sup> * 9 = 1 * 9 = 9</p><p>Required unit digit = 7 * 9 = 63</p><p>= 3</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A tangent MN at point M of a circle of radius 4&radic;3 cm meets a line through the centre O at point N. If ON = 8 cm, then the length of MN (in cm) is equal to:</p></span><span class=\"hqt\" style=\"display:none\"><p>4&radic;3 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; M &#2346;&#2352; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366; MN &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2352;&#2375;&#2326;&#2366; &#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; N &#2346;&#2352; &#2350;&#2367;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; ON = 8 cm &#2361;&#2376;, &#2340;&#2379; MN &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; (cm &#2350;&#2375;&#2306;) &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">6 cm</span><span class=\"hqt\" style=\"display:none\">6 cm</span>",
      "<span class=\"eqt\">4 cm</span><span class=\"hqt\" style=\"display:none\">4 cm</span>",
      "<span class=\"eqt\">2&radic;3 cm</span><span class=\"hqt\" style=\"display:none\">2&radic;3 cm</span>",
      "<span class=\"eqt\">3&radic;3 cm</span><span class=\"hqt\" style=\"display:none\">3&radic;3 cm</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=355 height=219 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22687/image008.png\"></p><p>We know that &#8736; OMN = 90&deg;</p><p>By Pythagoras theorem,</p><p>ON<sup>2</sup> = OM<sup>2</sup> + MN<sup>2</sup></p><p>64 = 48 + MN<sup>2</sup></p><p>MN = &radic;16 = 4 cm</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A shopkeeper purchased a bike for Rs. 96850 and spent Rs. 1650 on repair. If he sold the bike for Rs. 116230, then find the profit percent.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2344;&#2375; &#2319;&#2325; &#2348;&#2366;&#2311;&#2325; 96850 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2326;&#2352;&#2368;&#2342;&#2368; &#2324;&#2352; &#2313;&#2360;&#2325;&#2368; &#2350;&#2352;&#2350;&#2381;&#2350;&#2340; &#2346;&#2352; 1650 &#2352;&#2369;&#2346;&#2351;&#2375; &#2326;&#2352;&#2381;&#2330; &#2325;&#2367;&#2319;&#2404; &#2351;&#2342;&#2367; &#2313;&#2360;&#2344;&#2375; &#2348;&#2366;&#2311;&#2325; 116230 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2368;, &#2340;&#2379; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">24%</span><span class=\"hqt\" style=\"display:none\">24%</span>",
      "<span class=\"eqt\">20%</span><span class=\"hqt\" style=\"display:none\">20%</span>",
      "<span class=\"eqt\">15%</span><span class=\"hqt\" style=\"display:none\">15%</span>",
      "<span class=\"eqt\">18%</span><span class=\"hqt\" style=\"display:none\">18%</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>S.P = C.P * (100 + Profit %)/100</p><p>116230 = (96850 + 1650) * (100 + profit%)/100</p><p>100 + profit% = 116230 * 100/ 98500</p><p>100 + profit% = 118</p><p>Profit = 18%</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If a + b = 4 and ab = -21, then what is the value of a</span><span><sup>3</sup></span><span>&nbsp;+ b</span><span><sup>3</sup></span><span>?</span><span>&nbsp;</span></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; a + b = 4 &#2324;&#2352; ab = -21 &#2361;&#2376;, &#2340;&#2379; a<sup>3</sup> + b<sup>3 </sup>&#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">370</span><span class=\"hqt\" style=\"display:none\">370</span>",
      "<span class=\"eqt\">158</span><span class=\"hqt\" style=\"display:none\">158</span>",
      "<span class=\"eqt\">185</span><span class=\"hqt\" style=\"display:none\">185</span>",
      "<span class=\"eqt\">316</span><span class=\"hqt\" style=\"display:none\">316</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Given:&nbsp;a+b=4 and ab= -21</p><p><span><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-006457.png\"/>&nbsp;&nbsp;</span>\"</p>",
    "question_index": 4

  {
    "question": "<span class=\"eqt\"><p>A can prepare 40 cups of coffee in 2 hours. B can prepare 60 cups of coffee in 3 hours. How many cups of coffee they will prepare together in 6 hours?</p></span><span class=\"hqt\" style=\"display:none\"><p>A, 2 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; 40 &#2325;&#2346; &#2325;&#2377;&#2347;&#2364;&#2368; &#2348;&#2344;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; B, 3 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; 60 &#2325;&#2346; &#2325;&#2377;&#2347;&#2364;&#2368; &#2348;&#2344;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; &#2357;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; 6 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2325;&#2346; &#2325;&#2377;&#2347;&#2364;&#2368; &#2348;&#2344;&#2366;&#2319;&#2305;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">220</span><span class=\"hqt\" style=\"display:none\">220</span>",
      "<span class=\"eqt\">230</span><span class=\"hqt\" style=\"display:none\">230</span>",
      "<span class=\"eqt\">240</span><span class=\"hqt\" style=\"display:none\">240</span>",
      "<span class=\"eqt\">250</span><span class=\"hqt\" style=\"display:none\">250</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A's efficiency = 40/2 = 20 coffee/hr</p><p>B's efficiency = 60/3 = 20 coffee/hr</p><p>A and B can make (20 + 20) = 40 coffee/hr</p><p>Number of coffee made by them in 6 hours = 40 * 6 = 240 coffee</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If X alone can do a work in 14 days, Y alone can do the same work in 20 days, and Z alone can do the same work in 140 days. They jointly complete the work and earn Rs.3600. What is the share of Z?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2309;&#2325;&#2375;&#2354;&#2375; X &#2325;&#2367;&#2360;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 14 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2309;&#2325;&#2375;&#2354;&#2375; Y &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 20 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2309;&#2325;&#2375;&#2354;&#2375; Z &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 140 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2375; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; 3600 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2350;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; Z &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.200</span><span class=\"hqt\" style=\"display:none\">200 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs.400</span><span class=\"hqt\" style=\"display:none\">400 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs.800</span><span class=\"hqt\" style=\"display:none\">800 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",

    "correct_option_id": 0,
    "solution": "<p>Ratio of efficiencies of X, Y and Z respectively = (1/14): (1/20): (1/140)</p><p>= (20: 14: 2)/280</p><p>= 20: 14: 2</p><p>Share of Z = (2/36) * 3600 = Rs.200</p>",
    "question_index": 6

  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;Solve the expression: [&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">4 + &radic;15</span></div>&nbsp;-&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">4 - &radic;15</span></div>&nbsp;] + 5&radic;15&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2361;&#2354; &#2325;&#2352;&#2375;&#2306;: [{3/(4 + &radic;15)} - {2/(4 - &radic;15)}] + 5&radic;15?</p></span>",
    "options": [
      "<span class=\"eqt\">2<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">2<sup>3</sup></span>",
      "<span class=\"eqt\">2<sup>0</sup></span><span class=\"hqt\" style=\"display:none\">2<sup>0</sup></span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">2<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">2<sup>2</sup></span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>= [{3/(4 + &radic;15)}  -  {2/(4  -  &radic;15)}] + 5&radic;15</p><p>= [{3(4  -  &radic;15)}  -  2(4 + &radic;15)}/(4 + &radic;15)(4  -  &radic;15)] + 5&radic;15</p><p>= [12  -  3&radic;15  -  8  -  2&radic;15] + 5&radic;15</p><p>= 4  -  5&radic;15 + 5&radic;15</p><p>= 4</p><p>= 2<sup>2</sup></p>",
    "question_index": 7
  },

    "question": "<span class=\"eqt\"><p>What is the mean of first 62 natural numbers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2341;&#2350; 62 &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2350;&#2366;&#2343;&#2381;&#2351; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">31.5</span><span class=\"hqt\" style=\"display:none\">31.5</span>",
      "<span class=\"eqt\">31</span><span class=\"hqt\" style=\"display:none\">31</span>",
      "<span class=\"eqt\">32</span><span class=\"hqt\" style=\"display:none\">32</span>",
      "<span class=\"eqt\">32.5</span><span class=\"hqt\" style=\"display:none\">32.5</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Mean of first n natural numbers = (sum of first n natural numbers)/n</p><p>=[(n(n + 1)/2]/n</p><p>= (n + 1)/2</p><p>Here, n = 62</p><p>Therefore, mean of first 62 natural numbers = (62 + 1)/2 = <b>31.5</b></p>",

  {
    "question": "<span class=\"eqt\"><p>For which value of k will the following system of linear equations have infinitely many solutions?</p><p>7x + ky + 21 = 0</p><p>14x + 6y + 42 = 0</p></span><span class=\"hqt\" style=\"display:none\"><p>k &#2325;&#2375; &#2325;&#2367;&#2360; &#2350;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2376;&#2326;&#2367;&#2325; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2375; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2375; &#2309;&#2344;&#2306;&#2340; &#2361;&#2354; &#2361;&#2379;&#2306;&#2327;&#2375;?</p><p>7x + ky + 21 = 0</p><p>14x + 6y + 42 = 0</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>For a system of linear equations to have infinitely many solutions, the ratios of corresponding coefficients must be equal:</p><p>a&#8321; / a&#8322; = b&#8321; / b&#8322; = c&#8321; / c&#8322;</p><p>From the given equations:</p><p>Equation (1): 7x + ky + 21 = 0</p><p>Equation (2): 14x + 6y + 42 = 0</p><p>Comparing coefficients:</p><p>a&#8321; / a&#8322; = 7 / 14 = 1 / 2</p><p>c&#8321; / c&#8322; = 21 / 42 = 1 / 2</p><p>So, for infinite solutions:</p><p>b&#8321; / b&#8322; = k / 6 = 1 / 2</p><p>k / 6 = 1 / 2</p><p>k = 3</p>",
    "question_index": 10
  },

    "question": "<span class=\"eqt\"><p>The ratio of the present ages of Raj and Vikram is 7:4. Eight years ago, the ratio of their ages was 5:2. What is Vikram's present age?</p></span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332; &#2324;&#2352; &#2357;&#2367;&#2325;&#2381;&#2352;&#2350; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 7:4 &#2361;&#2376;&#2404; &#2310;&#2336; &#2357;&#2352;&#2381;&#2359; &#2346;&#2361;&#2354;&#2375; &#2313;&#2344;&#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 5:2 &#2341;&#2366;&#2404; &#2357;&#2367;&#2325;&#2381;&#2352;&#2350; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",

    "question": "<span class=\"eqt\"><p>Which of the following statement is true?</p><p>(A) 34408 is divisible by 3.</p><p>(B) 36508 is divisible by 3.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>(A) 34408, 3 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2404;</p><p>(B) 36508, 3 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Kishor was riding a bike and going towards a building at the speed of 4[&radic;3 - 1] m/s. He observes that it takes him 180 seconds to change the angle of elevation of the top of the building from 45&deg; to 60&deg;. What is the height (in meters) of the building?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2358;&#2379;&#2352; &#2348;&#2366;&#2311;&#2325; &#2330;&#2354;&#2366; &#2352;&#2361;&#2366; &#2341;&#2366; &#2324;&#2352; 4[&radic;3 - 1] m/s &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2319;&#2325; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2368; &#2323;&#2352; &#2332;&#2366; &#2352;&#2361;&#2366; &#2341;&#2366;&#2404; &#2357;&#2361; &#2342;&#2375;&#2326;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; &#2325;&#2379; 45&deg; &#2360;&#2375; 60&deg; &#2340;&#2325; &#2348;&#2342;&#2354;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; 180 &#2360;&#2375;&#2325;&#2306;&#2337; &#2325;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; (&#2350;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Eight persons  -  J, K, L, M, N, O, P and Q have different heights. K is taller than J and P. Q is shorter than P. L is taller than K and shorter than N. N is shorter than M and O. Neither Q is shortest nor is O tallest. Who is the fourth tallest person among all? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2336; &#2354;&#2379;&#2327; - J, K, L, M, N, O, P &#2324;&#2352; Q &#2325;&#2368; &#2361;&#2366;&#2311;&#2335; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2361;&#2376;&#2404; K, J &#2324;&#2352; P &#2360;&#2375; &#2354;&#2306;&#2348;&#2366; &#2361;&#2376;&#2404; Q, P &#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2361;&#2376;&#2404; L, K &#2360;&#2375; &#2354;&#2306;&#2348;&#2366; &#2324;&#2352; N &#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2361;&#2376;&#2404; N, M &#2324;&#2352; O &#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2361;&#2376;&#2404; &#2344; &#2340;&#2379; Q &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2361;&#2376; &#2324;&#2352; &#2344; &#2361;&#2368; O &#2360;&#2348;&#2360;&#2375; &#2354;&#2306;&#2348;&#2366; &#2361;&#2376;&#2404; &#2311;&#2344; &#2360;&#2348; &#2350;&#2375;&#2306; &#2330;&#2380;&#2341;&#2366; &#2360;&#2348;&#2360;&#2375; &#2354;&#2306;&#2348;&#2366; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2380;&#2344; &#2361;&#2376;?</p></span>",

    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>All the bugs will have been debugged by Asha, by tomorrow.</p>",
    "options": [
      "Asha will had debugged all the bugs, by tomorrow.",
      "Asha shall have debugged all the bugs, by tomorrow.",
      "Asha will have debugged all the bugs, by tomorrow.",
      "Asha have debugged all the bugs, by tomorrow."
    ],
    "correct_option_id": 2,
    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the \"to be\" verb ['been' here] and the preposition 'by' is necessary while changing the voice of the sentence from Passive to Active.</p><p>The Passive voice in this question is in <b>Future Perfect</b>. Thus, the Active voice will also be in Future Perfect.</p><p>In Passive voice, the format is: Object of the Active voice (Subjective case) + will/shall + have + been + V3 + by + Subject of the Active voice (Objective case)</p><p>Thus, the format of Active voice is: Subject + will/shall + have + V3 + Object.</p><p>For example:</p><p>The gold will have been bought by her. (Passive Voice)</p><p>She will have bought the gold. (Active Voice)</p><p>The options except (c) don't follow the correct grammatical format of the Active Voice.</p><p>Hence, the correct answer is option (c).</p><p>Note:</p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 61

    "solution": "<p>The correct answer is <b>(d) The General said to the soldier, \"We have been waiting for the orders from the king.\"</b></p><p>Key points:</p><p>&#183;The sentence in the Indirect Speech is in <b>Past Perfect Continuous Tense</b>. Therefore, the sentence in the Direct Speech will be in <b>Present Perfect Continuous Tense.</b></p><p>&#183;Past Perfect Continuous <b>(Subject + had been + V1 + ing + object)</b> will be converted into Present Perfect Continuous <b>(Subject + has/have been + V1 + ing + object)</b>.</p><p>&#183;For example:</p><p>o He said that they had been waiting for hours. (Indirect Speech)</p><p>o He said, \"We have been waiting for hours\" (Direct Speech)</p><p>&#183;The following things in the sentence will change when changed from Indirect Speech to Direct Speech:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">told..that</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">they</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">We</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">had been waiting</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">have been waiting</td></tr></table></p><p>&#183;Therefore, the correct answer is: <b>The General said to the soldier, \"We have been waiting for the orders from the king.\"</b></p>",

    "solution": "<p>The relative pronoun 'whom' should be used after the preposition 'by'. Therefore, 'whom' should replace 'who' to rectify the given sentence. This is because 'whom', and not 'who', takes the position of the object of a verb or preposition. Hence, option (d) is the correct answer.</p><p><b>The correct sentence is: </b>By whom were the wagons containing the wealth of the King escorted in 1848?</p><p><b>Note:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>1) The teacher scolded the child <b>for </b><u>being</u> late.</p><p>2) We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p><p><b>Relative pronouns: </b>A relative pronoun is used to connect a clause or phrase to a noun or pronoun. The clause modifies, or describes, the noun. The most common relative pronouns are who, whom, whose, which, and that. For example: She is the girl who received the award for bravery from our Home Minister.</p>",

    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Rajeev said to me, \"She is excited for her job and wants to share this with you.\"</p>",

    "solution": "<p>The sentence in the Direct Speech is in Simple Present Tense. Therefore, the sentence in the Indirect Speech should be in Simple Past Tense.</p><p>Simple Present (Subject +V1 + Object) should be converted into Simple Past (Subject +V2 + Object).</p><p>\"That\" is used in place of Inverted Commas while transforming the sentence from Direct Speech to Indirect Speech.</p><p>For example:</p><p>He said, \"I never go to the village.\" (Direct Speech)</p><p>He said that he never went to the village. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The reporting verb 'said to' is changed into 'told'.</p><p>&#183; The verb 'is excited' is changed into 'was excited'.</p><p>&#183; The verb 'wants' is changed into 'wanted'.</p><p>&#183; The determiner 'this' is changed into 'that'.</p><p>&#183; The pronoun 'you' is changed into 'me'.</p><p>Therefore, the correct answer is: <b>Rajeev told me that she was excited for her job and wanted to share that with me.</b></p><p>Hence, the answer is option d).</p><p><b>Note:</b></p><p><b>Determiner:</b> A modifying word that determines the kind of reference a noun or noun group has, for example,<b> '<i>a', 'the', 'every', 'much', 'many', </i></b><i>etc.</i></p>",

    "comp": "<p><b>Directions :</b>  Read the passage and answer the questions that follow.</p><p>New research into rural small-scale farms in South Africa's North West province has found that climate-smart farming techniques lead to a better maize yield, a more regular supply of food for the farmers, and a wider variety of crops. Small-scale farmers often produce primarily for their own consumption, but many also sell produce in local markets. Because small-scale farmers rely on their crops both to survive and as their only source of income, they are particularly vulnerable to the impacts of climate change. Some of the climate-smart techniques being successfully used are planting drought-tolerant maize seeds (a new variety of maize that grows well even when there is a drought), mulching (covering the soil with a layer of leaves or bark to keep the moisture in), cover cropping (planting grasses or legumes between the main crop to nourish and protect the soil), mixed cropping (growing two or more crops together to repel pests), and zero tillage (placing mulch over the soil and planting seeds in that layer instead of digging beds). The North West province of South Africa has a semi-arid climate with hot summers and mild winters. More frequent and intense droughts and unpredictable rain have created an unstable environment. Traditional farming practices have become less reliable, underscoring the urgent need for climate-smart agriculture. Across South Africa, rural small-scale farming families are very vulnerable to climate change. They do not own expensive irrigation systems. These days, rain is often delayed. This means small-scale farmers can no longer plant as early as they used to. This affects growing seasons and reduces their crop output, creating food insecurity in their households. To address these challenges, climate-smart farming techniques offer a crucial lifeline. These methods help conserve soil moisture, enhance soil fertility, and increase crop diversity, thereby reducing the risks associated with erratic weather patterns.</p>",

    "solution": "<p>Both Assertion (A) and Reason (R) are true, and R is the correct explanation for A. </p><p><b>Explanation of Statements:</b></p><p>Assertion (A) is Correct. When inflation is high, the Reserve Bank of India (RBI) increases the Repo Rate (the rate at which it lends to commercial banks) as a contractionary monetary policy tool.</p><p>Reason (R) is Correct. A higher repo rate makes borrowing expensive for banks, which they pass on to consumers. This discourages borrowing and spending, thereby reducing the money supply (liquidity) and cooling down inflation.</p><p><b>Further Insights:</b></p><p>This process is part of the \"Liquidity Adjustment Facility\" (LAF) used by the RBI to maintain price stability.</p>",
    "question_index": 110
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Articles 126 and 127 of the Constitution of India:</p><p>Statement I: Article 126 provides for the appointment of an Acting Chief Justice of India when the office of the Chief Justice is vacant or the Chief Justice is unable to perform duties.</p><p>Statement II: Article 127 empowers the President to appoint ad-hoc judges to the Supreme Court from among sitting High Court judges.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 126 &#2324;&#2352; 127 &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 126 &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2325; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2366; &#2346;&#2342; &#2352;&#2367;&#2325;&#2381;&#2340; &#2361;&#2379; &#2351;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2309;&#2346;&#2344;&#2375; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351;&#2379;&#2306; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2357;&#2361;&#2344; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2309;&#2360;&#2350;&#2352;&#2381;&#2341; &#2361;&#2379;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 127 &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2350;&#2380;&#2332;&#2370;&#2342;&#2366; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2340;&#2342;&#2352;&#2381;&#2341; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are correct.</p><p><b>Explanation of Statements:</b></p><p>&#183; <b>Statement I is Correct.</b></p><p>Article 126 authorises the <b>President</b> to appoint the <b>senior-most judge of the Supreme Court as Acting Chief Justice</b> when the CJI's office is vacant or when the CJI is unable to perform duties.</p><p>&#183; <b>Statement II is Correct.</b></p><p>Under <b>Article 127</b>, the President may appoint <b>ad-hoc judges</b> to the Supreme Court, after consultation with the CJI, from among <b>judges of High Courts</b>, when there is a lack of quorum.</p><p><b>Further Insight:</b></p><p>&#183; Ad-hoc judges appointed under Article 127 enjoy <b>all powers, privileges, and jurisdiction</b> of a Supreme Court judge during their tenure.</p><p>&#183; These provisions ensure <b>continuity of judicial functioning</b> without permanent appointments.</p>",
    "question_index": 112
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the books written by Kavita Kane:</p><p>Statement I: Sita's Sister is based on the life of Urmila from the Ramayana.</p><p>Statement II: Ahalya's Awakening retells the story of Draupadi from the Mahabharata.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2357;&#2367;&#2340;&#2366; &#2325;&#2366;&#2344;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2360;&#2368;&#2340;&#2366; &#2325;&#2368; &#2348;&#2361;&#2344; &#2352;&#2366;&#2350;&#2366;&#2351;&#2339; &#2325;&#2368; &#2313;&#2352;&#2381;&#2350;&#2367;&#2354;&#2366; &#2325;&#2375; &#2332;&#2368;&#2357;&#2344; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2309;&#2361;&#2354;&#2381;&#2351;&#2366; &#2325;&#2366; &#2332;&#2366;&#2327;&#2352;&#2339; &#2350;&#2361;&#2366;&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2342;&#2381;&#2352;&#2380;&#2346;&#2342;&#2368; &#2325;&#2368; &#2325;&#2361;&#2366;&#2344;&#2368; &#2325;&#2366; &#2346;&#2369;&#2344;&#2352;&#2381;&#2325;&#2341;&#2344; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct.</p><p>Statement II is incorrect because Ahalya's Awakening focuses on <b>Ahalya</b>, the wife of sage Gautama, not Draupadi.</p><p><b>Explanation of Statements:</b></p><p>I. is Correct. Sita's Sister focuses on Urmila, the wife of Lakshmana, exploring her perspective while her husband and sister were in exile for 14 years.</p><p>II. is Incorrect. Ahalya's Awakening retells the myth of Ahalya, who was turned to stone by a curse. Kavita Kane's book on Draupadi is titled The Fisher Queen's Dynasty (which focuses on Satyavati) or she touches upon Draupadi in other contexts, but Ahalya's Awakening is strictly about Ahalya.</p><p><b>Further Insight:</b></p><p>&#183; Karna's Wife and Menaka's Choice are other notable works by Kavita Kane.</p><p>&#183; Her writings typically <b>revisit lesser-heard female perspectives</b> from Indian epics.</p>",
    "question_index": 113
  },

    "question": "<span class=\"eqt\"><p>Which hormone regulates circadian rhythm?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2366;&#2352;&#2381;&#2350;&#2379;&#2344; &#2360;&#2352;&#2381;&#2325;&#2376;&#2337;&#2367;&#2351;&#2344; &#2352;&#2367;&#2342;&#2350; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Thyroxine</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2366;&#2311;&#2352;&#2377;&#2325;&#2381;&#2360;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Melatonin</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2354;&#2366;&#2335;&#2379;&#2344;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Insulin</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2360;&#2369;&#2354;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Cortisol</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2352;&#2381;&#2335;&#2367;&#2360;&#2379;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Melatonin is the primary hormone that regulates the sleep-wake cycle. </p><p>Melatonin is produced by the pineal gland in the brain. Its secretion increases in the dark, signaling the body that it is time to sleep, thereby maintaining the 24-hour internal clock (circadian rhythm).</p><p><b>Further Insights:</b></p><p>Insulin regulates blood sugar, and Thyroxine regulates basal metabolic rate.</p>",
    "question_index": 114
  },

    "question": "<span class=\"eqt\"><p>The India Post has rolled out Advanced Postal Technology across the country that will transform it into world-class public logistics organization by enabling mobile-ready services and real time decision making, in August 2025. Identify the total investment outlay for the Advanced Postal Technology (APT) initiative.</p></span><span class=\"hqt\" style=\"display:none\">&#2309;&#2327;&#2360;&#2381;&#2340; 2025 &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2337;&#2366;&#2325; &#2344;&#2375; &#2342;&#2375;&#2358; &#2349;&#2352; &#2350;&#2375;&#2306; &#2313;&#2344;&#2381;&#2344;&#2340; &#2337;&#2366;&#2325; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; (&#2319;&#2346;&#2368;&#2335;&#2368;) &#2325;&#2379; &#2354;&#2366;&#2327;&#2370; &#2325;&#2367;&#2351;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2350;&#2379;&#2348;&#2366;&#2311;&#2354;-&#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2360;&#2375;&#2357;&#2366;&#2319;&#2306; &#2324;&#2352; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2354;&#2375;&#2344;&#2375; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2360;&#2325;&#2381;&#2359;&#2350; &#2361;&#2379;&#2325;&#2352; &#2351;&#2361; &#2357;&#2367;&#2358;&#2381;&#2357; &#2360;&#2381;&#2340;&#2352;&#2368;&#2351; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2354;&#2377;&#2332;&#2367;&#2360;&#2381;&#2335;&#2367;&#2325;&#2381;&#2360; &#2360;&#2306;&#2327;&#2336;&#2344; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404; &#2313;&#2344;&#2381;&#2344;&#2340; &#2337;&#2366;&#2325; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; (&#2319;&#2346;&#2368;&#2335;&#2368;) &#2346;&#2361;&#2354; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2369;&#2354; &#2344;&#2367;&#2357;&#2375;&#2358; &#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [

      "<span class=\"eqt\">Rs. 5,000 crore</span><span class=\"hqt\" style=\"display:none\">5,000 &#2325;&#2352;&#2379;&#2337;&#2364; &#2352;&#2369;&#2346;&#2351;&#2375;</span>",

    "solution": "<p>The India Post has rolled out <b>Rs 5,800-crore</b> Advanced Postal Technology across the country that will transform it into world-class public logistics organization by enabling mobile-ready services and real time decision making, Union Minister Jyotiraditya Scindia said.</p><p>&#183; The Advanced Postal Technology (APT) based infrastructure gives India Post access to new technology layers like modern logistics companies.</p><p>&#183; The technology platform will enable India Post to support full fledged digital transactions and accept UPI payments for services from customers of any bank.</p><p>&#183; Earlier, UPI transactions of only India Post Payments Bank accounts were supported at post offices for purchase of services and other payments due to technical issues.</p><p>&#183; The minister said the new technology will \"Enable real-time decision making, boost e-commerce reach, cut operational costs through automation and deliver citizen-first, mobile-ready services anywhere-anytime.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Iqta system:</p><p>Statement I: The Iqta holder was entitled to collect revenue from assigned land.</p><p>Statement II: The Iqta was hereditary in nature during the Delhi Sultanate.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2325;&#2381;&#2340;&#2366; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; I: &#2311;&#2325;&#2381;&#2340;&#2366; &#2343;&#2366;&#2352;&#2325; &#2310;&#2357;&#2306;&#2335;&#2367;&#2340; &#2349;&#2370;&#2350;&#2367; &#2360;&#2375; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2319;&#2325;&#2340;&#2381;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2361;&#2325;&#2342;&#2366;&#2352; &#2341;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2311;&#2325;&#2381;&#2340;&#2366; &#2357;&#2306;&#2358;&#2366;&#2344;&#2369;&#2327;&#2340; &#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2341;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct. Statement II is incorrect because under the Delhi Sultanate, the Iqta was a transferable administrative assignment, not a hereditary land grant.</p><p><b>Explanation of Statements:</b></p><p>I. is Correct. The Muqti or Iqtadar was assigned a territory (Iqta) primarily to collect revenue, from which they were expected to maintain a required number of troops and pay themselves.</p><p>II. is Incorrect. In the early Sultanate (especially under Iltutmish and Balban), Iqtas were non-hereditary and frequently transferred to prevent local power bases from forming. It only became largely hereditary later during the reign of Firoz Shah Tughlaq.</p><p><b>Further Insights:</b></p><p>The system was first introduced in India by Muhammad Ghori, but Iltutmish gave it a formal institutional form.</p>",
    "question_index": 116
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding PM-FME Scheme:</p><p>Statement I: It supports micro food enterprises.</p><p>Statement II: It is centrally sponsored.</p><p>Correct answer:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2368;&#2319;&#2350;-&#2319;&#2347;&#2319;&#2350;&#2312; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2351;&#2361; &#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350; &#2326;&#2366;&#2342;&#2381;&#2351; &#2313;&#2342;&#2381;&#2351;&#2350;&#2379;&#2306; &#2325;&#2379; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2351;&#2361; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2366;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>&#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352;:</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>I. is Correct. The PM Formalisation of Micro food processing Enterprises (PM-FME) scheme provides financial, technical, and business support for the upgradation of existing micro-food processing units.</p><p>II. is Correct. It is a Centrally Sponsored Scheme with an expenditure sharing ratio of 60:40 between the Center and States (90:10 for North Eastern and Himalayan states).</p>",
    "question_index": 117

    "solution": "<p>Both statements are correct regarding the ecological interaction of commensalism. </p><p><b>Explanation of Statements:</b></p><p>I. is Correct. In commensalism, the relationship is (+/0), meaning one participant is benefited and the other is unaffected (neutral).</p><p>II. is Correct. Epiphytes (like orchids) grow on the branches of large trees to get closer to sunlight. They do not take water or nutrients from the tree, so the tree is neither harmed nor benefited.</p><p><b>Further Insight:</b></p><p>&#183; Epiphytes use trees only for <b>physical support</b>, not for nutrition.</p><p>&#183; Common examples include <b>orchids growing on mango trees</b>.</p><p>&#183; This interaction differs from <b>parasitism</b>, where one organism is harmed.</p>",
    "question_index": 124
  },

    "question": "<span class=\"eqt\"><p>Match the following Articles with their related provisions:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I (Article)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II (Provision)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Article 300A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Right to property</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Article 361</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Immunities of President and Governor</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Article 262</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Adjudication of inter-State water disputes</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Article 323A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Administrative Tribunals</td></tr></table><p><b>Codes:</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2305;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; I (&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342;)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; II (&#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 300A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 361</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2325;&#2381;&#2359;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 262</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2309;&#2306;&#2340;&#2352;-&#2352;&#2366;&#2332;&#2381;&#2351;&#2368;&#2351; &#2332;&#2354; &#2357;&#2367;&#2357;&#2366;&#2342;&#2379;&#2306; &#2325;&#2366; &#2344;&#2381;&#2351;&#2366;&#2351;&#2344;&#2367;&#2352;&#2381;&#2339;&#2351;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 323&#2319;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;&#2367;&#2325; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2367;&#2325;&#2352;&#2339;</td></tr></table><p><b>&#2360;&#2306;&#2361;&#2367;&#2340;&#2366;&#2319;&#2306;:</b></p></span>",
    "options": [
      "<span class=\"eqt\">A-1, B-2, C-3, D-4</span><span class=\"hqt\" style=\"display:none\">A-1, B-2, C-3, D-4</span>",

    "correct_option_id": 0,
    "solution": "<p>&#183; Article 300A  -  Guarantees the Right to Property as a constitutional (not fundamental) right.</p><p>&#183; Article 361  -  Provides immunity to the President and Governors from criminal proceedings during their term of office.</p><p>&#183; Article 262  -  Deals with adjudication of disputes relating to inter-State river waters.</p><p>&#183; Article 323A  -  Empowers Parliament to establish Administrative Tribunals for public service matters.</p><p><b> </b></p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Legislative Council (Vidhan Parishad):</p><p>1) It is a permanent body and cannot be dissolved.</p><p>2) One-third of its members retire every two years.</p><p>3) The Constitution mandates a Legislative Council for every State.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2343;&#2366;&#2344; &#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2351;&#2361; &#2319;&#2325; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2344;&#2367;&#2325;&#2366;&#2351; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2375; &#2349;&#2306;&#2327; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2311;&#2360;&#2325;&#2375; &#2319;&#2325; &#2340;&#2367;&#2361;&#2366;&#2312; &#2360;&#2342;&#2360;&#2381;&#2351; &#2361;&#2352; &#2342;&#2379; &#2360;&#2366;&#2354; &#2350;&#2375;&#2306; &#2360;&#2375;&#2357;&#2366;&#2344;&#2367;&#2357;&#2371;&#2340;&#2381;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>3) &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2357;&#2367;&#2343;&#2366;&#2344; &#2346;&#2352;&#2367;&#2359;&#2342; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Solution:</b></p><p>Statements 1 and 2 are correct. </p><p>Statement 3 is incorrect because the creation of a Legislative Council is optional and depends on the will of the respective State Assembly and Parliament.</p><p><b>Explanation of Statements:</b></p><p>1) is Correct. Similar to the Rajya Sabha at the center, the Vidhan Parishad is a permanent house that is not subject to dissolution.</p><p>2) is Correct. Members are elected for a six-year term, and one-third of the total membership retires every two years.</p><p>3) is Incorrect. Article 169 provides for the abolition or creation of Legislative Councils. Not every state has one; currently, only six states (Andhra Pradesh, Bihar, Karnataka, Maharashtra, Telangana, and Uttar Pradesh) have a bicameral legislature.</p><p><b>Further Insights:</b></p><p>The maximum strength of the Council is fixed at one-third of the total strength of the Assembly, but it cannot be less than 40 members.</p>",
    "question_index": 126
  },

    "correct_option_id": 0,
    "solution": "<p>(a) is Correct. Amuktamalyada is an epic poem in Telugu composed by the Vijayanagara Emperor Krishnadevaraya.</p><p>(b) is Incorrect. Tuzuk-i-Jahangiri was written by the Emperor Jahangir. Babur wrote the Baburnama.</p><p>(c) is Incorrect. Prithviraj Raso was written by Chand Bardai. Amir Khusrau wrote works like Khaza'in ul-Futuh.</p><p>(d) is Incorrect. Ain-i-Akbari was written by Abul Fazl. Badauni was known for Muntakhab-ut-Tawarikh.</p>",

    "question": "<span class=\"eqt\"><p>Which ISRO launch vehicle employs the indigenously developed C25 cryogenic upper stage and is now designated LVM3?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2312;&#2319;&#2360;&#2310;&#2352;&#2323; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2352;&#2325;&#2381;&#2359;&#2375;&#2346;&#2339; &#2351;&#2366;&#2344; &#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2360;&#2368;25 &#2325;&#2381;&#2352;&#2366;&#2351;&#2379;&#2332;&#2375;&#2344;&#2367;&#2325; &#2314;&#2346;&#2352;&#2368; &#2330;&#2352;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2348; &#2311;&#2360;&#2375; &#2319;&#2354;&#2357;&#2368;&#2319;&#2350;3 &#2344;&#2366;&#2350; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">PSLV</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2319;&#2360;&#2319;&#2354;&#2357;&#2368;</span>",
      "<span class=\"eqt\">GSLV Mk II</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2319;&#2360;&#2319;&#2354;&#2357;&#2368; &#2319;&#2350;&#2325;&#2375; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">SSLV</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360;&#2319;&#2360;&#2319;&#2354;&#2357;&#2368;</span>",
      "<span class=\"eqt\">GSLV Mk III</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2319;&#2360;&#2319;&#2354;&#2357;&#2368; &#2319;&#2350;&#2325;&#2375; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>LVM3 (earlier GSLV Mk III) uses the C25 cryogenic upper stage burning LOX-LH2.</p><p>GSLV Mk II uses a different cryogenic upper stage; PSLV and SSLV do not use cryogenic stages.</p><p>Further Insights:</p><p>- LVM3 has launched missions like Chandrayaan 3 and is used for heavier payloads and GTO missions.</p><p>- PSLV is the \"workhorse\" for sun-synchronous/LEO missions and multiple satellite deployments.</p><p>- SSLV is designed for small satellites; it emphasizes quick turnaround.</p><p>- Cryogenic stages improve payload capacity by using high specific impulse propellants.</p><p></p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Five Year Plans in India:</p><p>1) The First Five Year Plan focused primarily on agriculture.</p><p>2) The Second Five Year Plan was based on the Mahalanobis model.</p><p>3) The Planning Commission was abolished during the Twelfth Five Year Plan.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2346;&#2361;&#2354;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2371;&#2359;&#2367; &#2346;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2341;&#2368;&#2404;</p><p>2) &#2342;&#2370;&#2360;&#2352;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2350;&#2361;&#2366;&#2354;&#2344;&#2379;&#2348;&#2367;&#2360; &#2350;&#2377;&#2337;&#2354; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2341;&#2368;&#2404;</p><p>3) &#2348;&#2366;&#2352;&#2361;&#2357;&#2368;&#2306; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; &#2310;&#2351;&#2379;&#2327; &#2325;&#2379; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Solution:</b></p><p>Statements 1 and 2 are correct. </p><p>Statement 3 is incorrect because the Planning Commission was replaced by NITI Aayog while the 12th Plan was still in its operative period. </p><p><b>Explanation of Statements:</b></p><p>1) is Correct. The First Plan (1951 - 56) was based on the Harrod-Domar model and prioritized the agricultural sector to ensure food security after independence.</p><p>2) is Correct. The Second Plan (1956 - 61) focused on heavy industries and rapid industrialization, following the strategy proposed by statistician Prasanta Chandra Mahalanobis.</p><p>3) is Incorrect. The Planning Commission was abolished in August 2014 and replaced by NITI Aayog on January 1, 2015. The Twelfth Plan (2012 - 17) was technically the last five-year plan.</p>",
    "question_index": 129
  },
  {
    "question": "<span class=\"eqt\"><p>Which unit is larger than a gigabyte but smaller than a terabyte?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2311;&#2325;&#2366;&#2312; &#2327;&#2368;&#2327;&#2366;&#2348;&#2366;&#2311;&#2335; &#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2354;&#2375;&#2325;&#2367;&#2344; &#2335;&#2375;&#2352;&#2366;&#2348;&#2366;&#2311;&#2335; &#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Megabyte</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2327;&#2366;&#2348;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">Kilobyte</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2354;&#2379;&#2348;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">Petabyte</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2335;&#2366;&#2348;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In the standard hierarchy of binary storage units, there is no unit between a Gigabyte and a Terabyte. </p><p><b>Explanation:</b></p><p>The standard progression is:</p><p>1024 Kilobytes (KB) = 1 Megabyte (MB)</p><p>1024 Megabytes (MB) = 1 Gigabyte (GB)</p><p>1024 Gigabytes (GB) = 1 Terabyte (TB)</p><p>1024 Terabytes (TB) = 1 Petabyte (PB)</p><p><b>Further Insights:</b></p><p>While \"Gibibytes\" and \"Tebibytes\" are technical binary terms (IEC standards), they are equal in rank to GB and TB in the standard decimal-prefix hierarchy.</p><p>A Petabyte is larger than a Terabyte.</p>",
    "question_index": 130
  },
