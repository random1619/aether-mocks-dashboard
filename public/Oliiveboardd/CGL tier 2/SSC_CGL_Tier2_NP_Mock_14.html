    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1) Incremental backup is faster than full backup.</p><p>2) Incremental backup requires all previous backups for full restore.</p><p>Which of the above statements is/are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2311;&#2306;&#2325;&#2381;&#2352;&#2368;&#2350;&#2375;&#2306;&#2335;&#2354; &#2348;&#2376;&#2325;&#2309;&#2346;, &#2347;&#2369;&#2354; &#2348;&#2376;&#2325;&#2309;&#2346; &#2360;&#2375; &#2340;&#2375;&#2332;&#2364; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2311;&#2306;&#2325;&#2381;&#2352;&#2368;&#2350;&#2375;&#2306;&#2335;&#2354; &#2348;&#2376;&#2325;&#2309;&#2346; &#2325;&#2375; &#2354;&#2367;&#2319; &#2347;&#2369;&#2354; &#2352;&#2367;&#2360;&#2381;&#2335;&#2379;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2349;&#2368; &#2346;&#2367;&#2331;&#2354;&#2375; &#2348;&#2376;&#2325;&#2309;&#2346; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both are true</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2348;&#2366;&#2340;&#2375;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Neither are not true</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2361;&#2368; &#2348;&#2366;&#2340;&#2375;&#2306; &#2360;&#2330; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>1) is Correct. An incremental backup only copies data that has changed since the most recent backup (of any kind). Because it processes much less data than a \"Full\" backup, it is significantly faster.</p><p>2) is Correct. To perform a full restore using incremental backups, you must have the original Full backup PLUS every single incremental backup made in the sequence afterward. If one link in the chain is missing, the restore fails.</p><p><b>Further Insights:</b></p><p>&#183; The main advantage of incremental backup is reduced storage space and backup time.</p><p>&#183; The main disadvantage is the complexity and time required for data restoration.</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>Which technology ensures secure encrypted communication during online banking?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335;&#2375;&#2337; &#2360;&#2306;&#2330;&#2366;&#2352; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2340;&#2325;&#2344;&#2368;&#2325; &#2325;&#2380;&#2344; &#2360;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">HTTP</span><span class=\"hqt\" style=\"display:none\">HTTP</span>",
      "<span class=\"eqt\">HTTPS</span><span class=\"hqt\" style=\"display:none\">HTTPS</span>",
      "<span class=\"eqt\">FTP</span><span class=\"hqt\" style=\"display:none\">FTP</span>",
      "<span class=\"eqt\">SMTP</span><span class=\"hqt\" style=\"display:none\">SMTP</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>HTTPS is the protocol that provides encrypted communication for sensitive activities like online banking. </p><p><b>Explanation:</b></p><p>&#183; HTTPS (Hypertext Transfer Protocol Secure) is the secure version of HTTP. </p><p>&#183; It uses SSL/TLS encryption to protect the data being exchanged between the user's browser and the server, ensuring that hackers cannot \"eavesdrop\" on passwords or credit card numbers.</p><p><b>Further Insights:</b></p><p>&#183; The \"S\" in HTTPS stands for Secure.</p><p>&#183; Websites using HTTPS are verified by \"Digital Certificates\" issued by a Certificate Authority (CA).</p>",
    "question_index": 132
  },
  {
    "question": "<span class=\"eqt\"><p>Which term refers to sending files from a local system to a remote server?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2360;&#2375; &#2352;&#2367;&#2350;&#2379;&#2335; &#2360;&#2352;&#2381;&#2357;&#2352; &#2346;&#2352; &#2347;&#2364;&#2366;&#2311;&#2354;&#2375;&#2306; &#2349;&#2375;&#2332;&#2344;&#2375; &#2325;&#2379; &#2325;&#2367;&#2360; &#2358;&#2348;&#2381;&#2342; &#2360;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Downloading</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2366;&#2313;&#2344;&#2354;&#2379;&#2337;</span>",
      "<span class=\"eqt\">Uploading</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2354;&#2379;&#2337; &#2361;&#2379; &#2352;&#2361;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Streaming</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2381;&#2352;&#2368;&#2350;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Caching</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2358;&#2367;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Uploading is the term used for sending data from a local client to a remote server. </p><p><b>Explanation:</b></p><p>Uploading refers to data moving \"up\" from the user's computer to a central server (e.g., posting a photo to social media). Downloading is the reverse - moving data from a server \"down\" to the local device.</p><p><b>Further Insights:</b></p><p>Streaming involves consuming data (video/audio) in real-time as it is being transferred, without saving a permanent copy first.</p><p>Caching is the temporary storage of data to speed up future access.</p>",
    "question_index": 133
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about Windows OS:</p><p>1) Windows supports multitasking.</p><p>2) Windows provides GUI-based interaction.</p><p>3) Windows cannot manage hardware resources.</p><p>Which are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2350;&#2354;&#2381;&#2335;&#2368;&#2335;&#2366;&#2360;&#2381;&#2325;&#2367;&#2306;&#2327; &#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2327;&#2381;&#2352;&#2366;&#2347;&#2367;&#2325;&#2354; &#2351;&#2370;&#2332;&#2352; &#2311;&#2306;&#2335;&#2352;&#2347;&#2375;&#2360; (GUI) &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2311;&#2306;&#2335;&#2352;&#2376;&#2325;&#2381;&#2358;&#2344; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">All are correct</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct. </p><p>Statement 3 is incorrect because managing hardware is a core function of any Operating System.</p><p><b>Explanation of Statements:</b></p><p>1) is Correct. Windows is a multitasking OS, allowing the CPU to switch between multiple running programs (e.g., browsing the web while listening to music) so quickly that they appear to run simultaneously.</p><p>2) is Correct. Windows is famous for its Graphical User Interface (GUI), which uses visual elements like icons, menus, and pointers instead of just text-based commands.</p><p>3) is Incorrect. One of the primary roles of Windows is to manage hardware resources (CPU, Memory, Disk, I/O devices) using software called \"drivers.\"</p><p><b>Further Insights:</b></p><p>&#183; Windows uses a \"Kernel\" to handle the most basic hardware communication tasks.</p><p>&#183; The \"Desktop\" is the primary workspace in the Windows GUI environment.</p>",
    "question_index": 134
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1) Instruction Register stores the currently executing instruction.</p><p>2) Program Counter stores the result of arithmetic operations.</p><p>Which statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2361;&#2379; &#2352;&#2361;&#2375; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; &#2325;&#2379; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2366;&#2313;&#2306;&#2335;&#2352; &#2309;&#2306;&#2325;&#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2325;&#2379; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both are correct</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2 are correct</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2 &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is correct. Statement 2 is incorrect because the Program Counter tracks instruction addresses, not calculation results. </p><p><b>Explanation of Statements:</b></p><p>1) is Correct. The Instruction Register (IR) holds the specific instruction that the CPU is currently decoding or executing.</p><p>2) is Incorrect. The Program Counter (PC) stores the memory address of the next instruction to be fetched. Results of arithmetic operations are typically stored in the Accumulator or general-purpose registers.</p><p><b>Further Insights:</b></p><p>&#183; The PC is automatically incremented after each fetch so that the CPU knows where to go next in the program.</p><p>&#183; These registers are part of the CPU's internal architecture and are essential for the control flow of a program.</p>",
    "question_index": 135
  },
  {
    "question": "<span class=\"eqt\"><p>Which protocol automatically assigns IP addresses to devices?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2379; &#2360;&#2381;&#2357;&#2330;&#2366;&#2354;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2310;&#2312;&#2346;&#2368; &#2346;&#2340;&#2375; &#2310;&#2357;&#2306;&#2335;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">DNS</span><span class=\"hqt\" style=\"display:none\">DNS</span>",
      "<span class=\"eqt\">DHCP</span><span class=\"hqt\" style=\"display:none\">DHCP</span>",
      "<span class=\"eqt\">FTP</span><span class=\"hqt\" style=\"display:none\">FTP</span>",
      "<span class=\"eqt\">SMTP</span><span class=\"hqt\" style=\"display:none\">SMTP</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>DHCP is the protocol responsible for automatically assigning IP addresses to devices on a network. </p><p><b>Explanation:</b></p><p>DHCP (Dynamic Host Configuration Protocol) eliminates the need for manual IP configuration. When a device (like a smartphone) connects to a Wi-Fi network, the DHCP server (usually the router) automatically \"leases\" an available IP address to that device.</p><p><b>Further Insights:</b></p><p>&#183; DNS translates domain names (google.com) to IP addresses.</p><p>&#183; SMTP is used for sending outgoing emails.</p><p>&#183; Static IP addresses are the alternative to DHCP, where an IP is manually assigned and never changes.</p>",
    "question_index": 136
  },
  {
    "question": "<span class=\"eqt\"><p>Which device is primarily used to convert digital signals into analog signals for Internet connectivity?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2325;&#2344;&#2375;&#2325;&#2381;&#2335;&#2367;&#2357;&#2367;&#2335;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2360;&#2367;&#2327;&#2381;&#2344;&#2354;&#2379;&#2306; &#2325;&#2379; &#2319;&#2344;&#2366;&#2354;&#2377;&#2327; &#2360;&#2367;&#2327;&#2381;&#2344;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2367;&#2360; &#2313;&#2346;&#2325;&#2352;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Router</span><span class=\"hqt\" style=\"display:none\">Router</span>",
      "<span class=\"eqt\">Switch</span><span class=\"hqt\" style=\"display:none\">Switch</span>",
      "<span class=\"eqt\">Modem</span><span class=\"hqt\" style=\"display:none\">Modem</span>",
      "<span class=\"eqt\">Hub</span><span class=\"hqt\" style=\"display:none\">Hub</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Modem is the device designed to convert digital signals to analog and vice versa for data transmission. </p><p><b>Explanation:</b></p><p>Modem stands for Modulator-Demodulator. Computers process data in digital form (0s and 1s), but traditional communication lines (like telephone wires) carry analog waves. The modem bridges this gap by \"modulating\" digital data into analog for sending and \"demodulating\" incoming analog signals back into digital data.</p><p><b>Further Insights:</b></p><p>While a Router directs data traffic between networks, it does not perform the basic signal conversion required for the initial connection to the Internet Service Provider (ISP).</p><p>Modems can be internal (expansion cards) or external (standalone devices).</p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the instruction cycle of a CPU:</p><p>1) Instruction execution begins with the fetch cycle.</p><p>2) Decoding of an instruction is performed by the Control Unit.</p><p>3) The instruction cycle is independent of clock pulses.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; &#2330;&#2325;&#2381;&#2352; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; &#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2344; &#2347;&#2364;&#2375;&#2330; &#2330;&#2325;&#2381;&#2352; &#2360;&#2375; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; &#2325;&#2366; &#2337;&#2367;&#2325;&#2379;&#2337;&#2367;&#2306;&#2327; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2311;&#2325;&#2366;&#2312; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; &#2330;&#2325;&#2381;&#2352; &#2325;&#2381;&#2354;&#2377;&#2325; &#2346;&#2354;&#2381;&#2360; &#2360;&#2375; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct. </p><p>Statement 3 is incorrect because the instruction cycle is strictly synchronized with the system clock. </p><p><b>Explanation of Statements:</b></p><p>1) is Correct. The instruction cycle always begins with the \"Fetch\" phase, where the CPU retrieves the instruction from the primary memory (RAM) using the address stored in the Program Counter.</p><p>2) is Correct. Once fetched, the instruction is placed in the Instruction Register. The Control Unit (CU) then interprets or \"decodes\" the binary code to determine what operation needs to be performed.</p><p>3) is Incorrect. Every step of the instruction cycle (Fetch, Decode, Execute, Store) occurs in sync with the CPU's internal clock. The clock pulses determine the speed at which these cycles are completed.</p><p><b>Further Insights:</b></p><p>The complete sequence is often referred to as the FDE Cycle (Fetch-Decode-Execute).</p><p>Modern CPUs use \"Pipelining\" to execute multiple stages of different instruction cycles simultaneously to increase efficiency.</p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about memory hierarchy:</p><p>1) Access time increases as we move down the memory hierarchy.</p><p>2) Cost per bit decreases as memory size increases.</p><p>3) Registers are slower than cache memory.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2346;&#2342;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2346;&#2342;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2344;&#2368;&#2330;&#2375; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2360;&#2350;&#2351; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2348;&#2338;&#2364;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367; &#2348;&#2367;&#2335; &#2354;&#2366;&#2327;&#2340; &#2328;&#2335;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3) &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352; &#2325;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2360;&#2375; &#2343;&#2368;&#2350;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct. </p><p>Statement 3 is incorrect because registers are the fastest memory units in the hierarchy. </p><p><b>Explanation of Statements:</b></p><p>1) is Correct. As we move from the CPU toward secondary storage (Registers &rarr; Cache &rarr; RAM &rarr; Hard Disk), the physical distance and the technology used result in increased access time (slower speed).</p><p>2) is Correct. Smaller, faster memories like SRAM (used in Cache) are very expensive. Larger storage like HDDs or SSDs provide much more space at a significantly lower cost per bit.</p><p>3) is Incorrect. Registers are located directly inside the CPU core and operate at the same speed as the processor. They are faster than Cache memory.</p><p><b>Further Insights:</b></p><p>The purpose of the hierarchy is to balance the need for high speed with the need for large, affordable storage capacity.</p><p>\"Locality of Reference\" is the principle that allows this hierarchy to work effectively by keeping recently used data in faster levels.</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>Which storage medium is most suitable for long-term archival backup due to durability?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2366;&#2351;&#2367;&#2340;&#2381;&#2357; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2342;&#2368;&#2352;&#2381;&#2328;&#2325;&#2366;&#2354;&#2367;&#2325; &#2309;&#2349;&#2367;&#2354;&#2375;&#2326;&#2368;&#2351; &#2348;&#2376;&#2325;&#2309;&#2346; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2348;&#2360;&#2375; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Hard Disk</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2352;&#2381;&#2337; &#2337;&#2367;&#2360;&#2381;&#2325;</span>",
      "<span class=\"eqt\">Pen Drive</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2344; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;</span>",
      "<span class=\"eqt\">Magnetic Tape</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2335;&#2375;&#2346;</span>",
      "<span class=\"eqt\">Cache Memory</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2358; &#2350;&#2376;&#2350;&#2379;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Magnetic Tape is considered the most suitable medium for long-term archival due to its durability and cost-effectiveness. </p><p><b>Explanation:</b></p><p>Magnetic Tapes have a much longer shelf life (often 30+ years) compared to hard drives or flash media. They are highly resistant to physical shocks and do not require power to maintain data, making them ideal for \"cold storage\" archives that aren't accessed frequently.</p><p><b>Further Insights:</b></p><p>Although slow to access (sequential access), tapes offer the highest storage density for the lowest price.</p><p>Modern LTO (Linear Tape-Open) technology is standard in corporate data centers for disaster recovery.</p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>Match List - I (Virus Type) with List - II (Characteristic):</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List - I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List-II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Boot Sector Virus</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Infects documents using macro languages</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Polymorphic Virus</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Infects master boot record of storage media</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Macro Virus</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Changes its code to evade signature detection</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Spacefiller Virus</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Occupies unused space in files without increasing size</td></tr></table><p>Correct option:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2330;&#2368; - I (&#2357;&#2366;&#2351;&#2352;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;) &#2325;&#2366; &#2360;&#2370;&#2330;&#2368; - II (&#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;) &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; - I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368;-II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2348;&#2370;&#2335; &#2360;&#2375;&#2325;&#2381;&#2335;&#2352; &#2357;&#2366;&#2351;&#2352;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2350;&#2376;&#2325;&#2381;&#2352;&#2379; &#2349;&#2366;&#2359;&#2366;&#2323;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2342;&#2360;&#2381;&#2340;&#2366;&#2357;&#2375;&#2332;&#2364;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2346;&#2377;&#2354;&#2368;&#2350;&#2377;&#2352;&#2381;&#2347;&#2367;&#2325; &#2357;&#2366;&#2351;&#2352;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2350;&#2368;&#2337;&#2367;&#2351;&#2366; &#2325;&#2375; &#2350;&#2366;&#2360;&#2381;&#2335;&#2352; &#2348;&#2370;&#2335; &#2352;&#2367;&#2325;&#2377;&#2352;&#2381;&#2337; &#2325;&#2379; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2350;&#2376;&#2325;&#2381;&#2352;&#2379; &#2357;&#2366;&#2351;&#2352;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2361;&#2360;&#2381;&#2340;&#2366;&#2325;&#2381;&#2359;&#2352; &#2325;&#2366; &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2344;&#2375; &#2360;&#2375; &#2348;&#2330;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2346;&#2344;&#2375; &#2325;&#2379;&#2337; &#2325;&#2379; &#2348;&#2342;&#2354;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2360;&#2381;&#2346;&#2375;&#2360;&#2347;&#2367;&#2354;&#2352; &#2357;&#2366;&#2351;&#2352;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2347;&#2364;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2348;&#2338;&#2364;&#2366;&#2319; &#2348;&#2367;&#2344;&#2366; &#2313;&#2344;&#2350;&#2375;&#2306; &#2309;&#2346;&#2381;&#2352;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344; &#2349;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr></table><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</p></span>",
    "options": [
      "<span class=\"eqt\">A-2, B-3, C-1, D-4</span><span class=\"hqt\" style=\"display:none\">A-2, B-3, C-1, D-4</span>",
      "<span class=\"eqt\">A-3, B-2, C-4, D-1</span><span class=\"hqt\" style=\"display:none\">A-3, B-2, C-4, D-1</span>",
      "<span class=\"eqt\">A-1, B-3, C-2, D-4</span><span class=\"hqt\" style=\"display:none\">A-1, B-3, C-2, D-4</span>",
      "<span class=\"eqt\">A-2, B-1, C-3, D-4</span><span class=\"hqt\" style=\"display:none\">A-2, B-1, C-3, D-4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Boot Sector Virus &rarr; Infects master boot record</p><p>These viruses activate when the system boots from an infected disk.</p><p>Polymorphic Virus &rarr; Changes its code</p><p>Uses encryption or mutation to avoid antivirus signature detection.</p><p>Macro Virus &rarr; Infects documents</p><p>Written in macro languages like VBA in MS Word or Excel files.</p><p>Spacefiller Virus &rarr; Occupies unused space</p><p>Resides in slack space of files, making detection difficult as file size remains unchanged.</p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>Which option is used to change file name extensions visibility in Windows Explorer?</p></span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2319;&#2325;&#2381;&#2360;&#2346;&#2381;&#2354;&#2379;&#2352;&#2352; &#2350;&#2375;&#2306; &#2347;&#2364;&#2366;&#2311;&#2354; &#2344;&#2366;&#2350; &#2319;&#2325;&#2381;&#2360;&#2335;&#2375;&#2306;&#2358;&#2344; &#2325;&#2368; &#2342;&#2371;&#2358;&#2381;&#2351;&#2340;&#2366; &#2348;&#2342;&#2354;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">View &rarr; File name extensions</span><span class=\"hqt\" style=\"display:none\">View &rarr; File name extensions</span>",
      "<span class=\"eqt\">Edit &rarr; Rename</span><span class=\"hqt\" style=\"display:none\">Edit &rarr; Rename</span>",
      "<span class=\"eqt\">Tools &rarr; Options</span><span class=\"hqt\" style=\"display:none\">Tools &rarr; Options</span>",
      "<span class=\"eqt\">Properties</span><span class=\"hqt\" style=\"display:none\">Properties</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In Windows Explorer, the \"View\" tab contains the checkbox to toggle the visibility of file name extensions. </p><p><b>Explanation:</b></p><p>By default, Windows hides extensions for known file types (e.g., it shows \"Document\" instead of \"Document.docx\"). To see the full extension, the user must go to the View tab in the File Explorer ribbon and check the box labeled \"File name extensions.\"</p><p><b>Further Insights:</b></p><p>Showing file extensions is a good security practice as it helps users identify potentially malicious files (e.g., a file named \"Invoice.pdf.exe\").</p><p>This setting can also be changed via \"Folder Options\" in the Control Panel.</p>",
    "question_index": 142
  },
  {
    "question": "<span class=\"eqt\"><p>Which Windows Explorer option allows users to recover files deleted recently?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2319;&#2325;&#2381;&#2360;&#2346;&#2381;&#2354;&#2379;&#2352;&#2352; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2361;&#2366;&#2354; &#2361;&#2368; &#2350;&#2375;&#2306; &#2361;&#2335;&#2366;&#2312; &#2327;&#2312; &#2347;&#2364;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2379; &#2346;&#2369;&#2344;&#2352;&#2381;&#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Libraries</span><span class=\"hqt\" style=\"display:none\">Libraries</span>",
      "<span class=\"eqt\">Recycle Bin</span><span class=\"hqt\" style=\"display:none\">Recycle Bin</span>",
      "<span class=\"eqt\">File History</span><span class=\"hqt\" style=\"display:none\">File History</span>",
      "<span class=\"eqt\">OneDrive</span><span class=\"hqt\" style=\"display:none\">OneDrive</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Recycle Bin is the specific system feature that stores recently deleted files for potential recovery.</p><p><b>Explanation:</b></p><p>When a file is deleted in Windows using the \"Delete\" key, it is moved to the Recycle Bin rather than being immediately erased from the disk. This acts as a safety net, allowing users to \"Restore\" the file to its original location if deleted by mistake.</p><p><b>Further Insights:</b></p><p>Files deleted using Shift + Delete bypass the Recycle Bin and are permanently deleted.</p><p>Files stored on removable drives (like USB sticks) usually do not go to the Recycle Bin when deleted.</p>",
    "question_index": 143
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about routers:</p><p>1) Routers operate at the network layer.</p><p>2) Routers use MAC addresses for packet forwarding.</p><p>3) Routers can connect different networks.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2313;&#2335;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2352;&#2366;&#2313;&#2335;&#2352; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2354;&#2375;&#2351;&#2352; &#2346;&#2352; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2352;&#2366;&#2313;&#2335;&#2352; &#2346;&#2376;&#2325;&#2375;&#2335; &#2347;&#2377;&#2352;&#2357;&#2352;&#2381;&#2337;&#2367;&#2306;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; MAC &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>3) &#2352;&#2366;&#2313;&#2335;&#2352; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325;&#2379;&#2306; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 3 are correct. </p><p>Statement 2 is incorrect because routers use IP addresses, not MAC addresses, to forward data. </p><p><b>Explanation of Statements:</b></p><p>1) is Correct. Routers operate at the Network Layer (Layer 3) of the OSI model, where logical addressing and routing take place.</p><p>2) is Incorrect. Switches use MAC addresses (physical addresses) to move data within a local network. Routers use IP addresses (logical addresses) to move data between different networks.</p><p>3) is Correct. The primary job of a router is to act as a gateway, connecting different networks (such as your home LAN to the global Internet).</p><p><b>Further Insights:</b></p><p>Routers maintain a \"Routing Table\" to determine the most efficient path for a data packet to reach its destination.</p><p>Most home routers also include a built-in switch and wireless access point.</p>",
    "question_index": 144
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about cookies:</p><p>1) Cookies store session and preference data.</p><p>2) Cookies can execute malicious programs.</p><p>Which statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2360;&#2340;&#2381;&#2352; &#2324;&#2352; &#2357;&#2352;&#2368;&#2351;&#2340;&#2366; &#2337;&#2375;&#2335;&#2366; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2342;&#2369;&#2352;&#2381;&#2349;&#2366;&#2357;&#2344;&#2366;&#2346;&#2370;&#2352;&#2381;&#2339; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2330;&#2354;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is correct. </p><p>Statement 2 is incorrect because cookies are simple text files and lack the ability to execute code. </p><p><b>Explanation of Statements:</b></p><p>1) is Correct. Cookies are used by websites to remember \"state\" information - such as items in a shopping cart, login credentials, or user-selected themes/preferences.</p><p>2) is Incorrect. Cookies are passive data files. They cannot contain viruses or malware that \"run\" on your system because they are not executable programs.</p><p><b>Further Insights:</b></p><p>While not viruses, \"Tracking Cookies\" can be a privacy concern as they follow a user's browsing habits across different websites.</p><p>\"Session Cookies\" expire when the browser is closed, while \"Persistent Cookies\" remain until a set expiration date.</p>",
    "question_index": 145
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about RAM:</p><p>1) RAM is volatile in nature.</p><p>2) RAM stores data permanently even after power failure.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>RAM &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) RAM &#2309;&#2360;&#2381;&#2341;&#2367;&#2352; &#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367; &#2325;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) RAM &#2348;&#2367;&#2332;&#2354;&#2368; &#2327;&#2369;&#2354; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2349;&#2368; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement 1 is correct. </b></p><p><b>Statement 2 is incorrect because RAM is temporary storage and requires power to maintain data.</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct.</b> RAM (Random Access Memory) is <b>volatile</b>, meaning all data stored in it is lost immediately when the computer is turned off or loses power.</p><p>&#183; <b>2. is Incorrect.</b> Permanent storage is the role of <b>Secondary Memory</b> (like Hard Disks or SSDs). RAM is designed for high-speed, temporary access to data currently being used by the CPU.</p><p><b>Further Insights:</b></p><p>&#183; RAM is significantly faster than any Hard Disk or SSD.</p><p>&#183; Upgrading RAM is one of the most effective ways to improve a computer's ability to multitask.</p>",
    "question_index": 146
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding POP3:</p><p>1)POP3 downloads emails to the local system.</p><p>2)POP3 supports synchronization across multiple devices.</p><p>3)POP3 usually removes emails from server after download.</p><p>Correct statements are:</p></span><span class=\"hqt\" style=\"display:none\"><p>POP3 &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) POP3 &#2312;&#2350;&#2375;&#2354; &#2325;&#2379; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2346;&#2352; &#2337;&#2366;&#2313;&#2344;&#2354;&#2379;&#2337; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) POP3 &#2325;&#2312; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2367;&#2306;&#2325;&#2381;&#2352;&#2379;&#2344;&#2366;&#2311;&#2332;&#2364;&#2375;&#2358;&#2344; &#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) POP3 &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2337;&#2366;&#2313;&#2344;&#2354;&#2379;&#2337; &#2325;&#2375; &#2348;&#2366;&#2342; &#2360;&#2352;&#2381;&#2357;&#2352; &#2360;&#2375; &#2312;&#2350;&#2375;&#2354; &#2361;&#2335;&#2366; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">All</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 3 are correct. Statement 2 is incorrect because POP3 is not designed for multi-device synchronization. </p><p><b>Explanation of Statements:</b></p><p>1) is Correct. POP3 (Post Office Protocol version 3) is designed to download the entire email from the server to the user's local device.</p><p>2) is Incorrect. POP3 is not ideal for multiple devices. If you download an email on your PC, it may not appear on your phone because the protocol lacks a two-way sync feature. This is a feature of IMAP.</p><p>3) is Correct. By default, POP3 deletes the email from the mail server once it has been successfully downloaded to the local client.</p><p><b>Further Insights:</b></p><p>&#183; POP3 is useful for users with limited internet connectivity or small server storage limits.</p><p>&#183; Modern email users generally prefer IMAP because it keeps the server and all devices in sync.</p>",
    "question_index": 147
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about USB ports:</p><p>1) USB supports hot plugging of devices.</p><p>2) USB devices require system restart to be recognized.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2370;&#2319;&#2360;&#2348;&#2368; &#2346;&#2379;&#2352;&#2381;&#2335; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2351;&#2370;&#2319;&#2360;&#2348;&#2368; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2368; &#2361;&#2377;&#2335; &#2346;&#2381;&#2354;&#2327;&#2367;&#2306;&#2327; &#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2351;&#2370;&#2319;&#2360;&#2348;&#2368; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2379; &#2346;&#2361;&#2330;&#2366;&#2344;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2379; &#2352;&#2368;&#2360;&#2381;&#2335;&#2366;&#2352;&#2381;&#2335; &#2325;&#2352;&#2344;&#2366; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is correct. </p><p>Statement 2 is incorrect because USB devices are designed to be recognized instantly without a system reboot. </p><p><b>Explanation of Statements:</b></p><p>1) is Correct. \"Hot plugging\" is the ability to connect or disconnect peripheral devices while the computer is running without causing any damage or requiring a restart.</p><p>2) is Incorrect. USB is a \"Plug and Play\" (PnP) interface. The operating system identifies the device and loads the necessary drivers as soon as it is plugged in.</p><p><b>Further Insights:</b></p><p>USB (Universal Serial Bus) has evolved through versions (2.0, 3.0, 4.0), significantly increasing data transfer speeds over time.</p><p>A single USB port can theoretically support up to 127 devices using hubs.</p>",
    "question_index": 148
  },

      "<span class=\"eqt\">Control hardware components like CPU fan speed</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2347;&#2376;&#2344; &#2325;&#2368; &#2327;&#2340;&#2367; &#2332;&#2376;&#2360;&#2375; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352; &#2328;&#2335;&#2325;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;</span>"

    "correct_option_id": 1,
    "solution": "<p>Windows Copilot is an AI-powered assistant integrated into Windows 11 that helps users perform tasks such as adjusting system settings, summarizing content, answering queries, and improving productivity across apps. It does not manage hardware directly or replace security software.</p>",
