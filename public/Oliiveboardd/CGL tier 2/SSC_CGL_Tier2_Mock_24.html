    "question": "<span class=\"eqt\"><p>A boat goes 18 km upstream against a current and returns 18 km downstream. The upstream time is 3 hours and the downstream time is 1.5 hours. Find the boat's speed in still water and the speed of the current.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; 18 &#2325;&#2367;&#2350;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; 18 &#2325;&#2367;&#2350;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2357;&#2366;&#2346;&#2360; &#2310;&#2340;&#2368; &#2361;&#2376;&#2404; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2332;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; 3 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2332;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; 1.5 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

: block; padding: 0;border-top: thin solid black; text-align:center\">y<sup>3</sup></span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">27</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">z<sup>3</sup></span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">10 - 2x</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x</span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">5 - 3y</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">y</span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">15 - 4z</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">z</span></div> = -9 &#2324;&#2352; xyz = 9 &#2361;&#2376;, &#2340;&#2379; <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">8</span>     "question": "<span class=\"eqt\"><p>In triangle ABC, the orthocenter is at point (6, 0) and the centroid is at point (4, 2). Find the coordinates of the circumcenter.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; ABC &#2350;&#2375;&#2306;, &#2354;&#2306;&#2348;&#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369; (6, 0) &#2346;&#2352; &#2361;&#2376; &#2324;&#2352; &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; (4, 2) &#2346;&#2352; &#2361;&#2376;&#2404; &#2346;&#2352;&#2367;&#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2366;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">(2, 3)</span><span class=\"hqt\" style=\"display:none\">(2, 3)</span>",
      "<span class=\"eqt\">(2/3, 5/3)</span><span class=\"hqt\" style=\"display:none\">(2/3, 5/3)</span>",
      "<span class=\"eqt\">(3, 3)</span><span class=\"hqt\" style=\"display:none\">(3, 3)</span>",
      "<span class=\"eqt\">(1, 2/3)</span><span class=\"hqt\" style=\"display:none\">(1, 2/3)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In a triangle, the orthocenter, centroid, and circumcenter lie on the Euler line. The centroid divides the line joining the circumcenter and orthocenter into the ratio one is to two.</p><p>Using the section formula to find the centroid:</p><p>Given, orthocenter H = (A, B) and Circumcenter O = (M, N)</p><p>Centroid G (x, y) = [(2M + A)/3, (2N + B)/3]</p><p>Now,</p><p>4 = (2 x M + 6)/3</p><p>M = (12  -  6)/2 = 6/2 = 3</p><p>And,</p><p>2 = (2 x N + 0)/3</p><p>N = 6/2 = 3</p><p>Hence coordinate of circumcenter = (3, 3)</p>",
    "question_index": 6

    "question": "<span class=\"eqt\"><p>If the roots of kx<sup>2</sup> + 2(l + m)x + (k &#8722; m) = 0 are equal, then the value of k<sup>2</sup> &#8722; l<sup>2</sup> &#8722; m<sup>2</sup> is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; kx<sup>2</sup> + 2(l + m)x + (k &#8722; m) = 0 &#2325;&#2375; &#2350;&#2370;&#2354; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2306;, &#2340;&#2379; k<sup>2</sup> &#8722; l<sup>2</sup> &#8722; m<sup>2</sup> &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">l<sup>2</sup> + m<sup>2</sup> &#8722; km</span><span class=\"hqt\" style=\"display:none\">l<sup>2</sup> + m<sup>2</sup> &#8722; km</span>",
      "<span class=\"eqt\">(k + 2l)m</span><span class=\"hqt\" style=\"display:none\">(k + 2l)m</span>",
      "<span class=\"eqt\">k(l &#8722; 2m)</span><span class=\"hqt\" style=\"display:none\">k(l &#8722; 2m)</span>",
      "<span class=\"eqt\">k(l + m)</span><span class=\"hqt\" style=\"display:none\">k(l + m)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Equal roots =&gt; discriminant = 0 </p><p>[2(l + m)]<sup> 2</sup> &#8722; 4&#183;k&#183;(k &#8722; m) = 0 </p><p>4(l + m)<sup> 2</sup> &#8722; 4(k<sup>2</sup> &#8722; km) = 0 </p><p>(l + m)<sup> 2</sup> = k<sup>2</sup> &#8722; km </p><p>Expand: l<sup>2</sup> + 2lm + m<sup>2</sup> = k<sup>2</sup> &#8722; km </p><p>Rearrange: k<sup>2</sup> &#8722; l<sup>2</sup> &#8722; m<sup>2</sup> = 2lm + km = m(2l + k) </p><p>Therefore k<sup>2</sup> &#8722; l<sup>2</sup> &#8722; m<sup>2</sup> = (k + 2l)m</p>",
    "question_index": 16

    "question": "<span class=\"eqt\"><p>A shopkeeper marks his goods such that after giving a discount of 10%, he gains a profit of 6.67%. If the cost price of an article is Rs. 945, what is its marked price (in Rs.)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2309;&#2346;&#2344;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344; &#2346;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2309;&#2306;&#2325;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; 10% &#2325;&#2368; &#2331;&#2370;&#2335; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2313;&#2360;&#2375; 6.67% &#2325;&#2366; &#2354;&#2366;&#2349; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2352;&#2369;. 945 &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2366; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; (&#2352;&#2369;. &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>The number of workers in company A is 80% of that in company B and the average weight of workers of company A is 50% more than that of workers of company B. If the total weight of all the workers of both the companies together is 4840 kg, then what is the total weight of workers of company A?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2344;&#2368; A &#2350;&#2375;&#2306; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; B &#2325;&#2375; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; 80% &#2361;&#2376; &#2340;&#2341;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; A &#2325;&#2375; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2357;&#2332;&#2344; &#2325;&#2306;&#2346;&#2344;&#2368; B &#2325;&#2375; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2360;&#2375; 50% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2349;&#2368; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2325;&#2369;&#2354; &#2357;&#2332;&#2344; 4840 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2306;&#2346;&#2344;&#2368; A &#2325;&#2375; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2325;&#2369;&#2354; &#2357;&#2332;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 3,
    "solution": "<p>The ratio of the number of workers in company A to that of B = 4: 5</p><p>The ratio of the average weight of the workers in company A to that of B = 3: 2</p><p>The ratio of the total weight of the workers in company A to that of B = (4 x 3): (5 x 2) = 12: 10</p><p>Given,</p><p>12 + 10 = 22 units = 4840 kg</p><p>1 unit = 220 kg</p><p>12 units = 2640 kg</p><p>So, total weight of the workers in company A = 2640 kg</p>",

    "question": "<span class=\"eqt\"><p>A alone can complete a job in 40 days. He is twice as fast as B while B is thrice as fast as C. If all of them work together, in how many days would the job get completed?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2325;&#2375;&#2354;&#2375; A &#2325;&#2367;&#2360;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 40 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2361; B &#2360;&#2375; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2340;&#2375;&#2332;&#2364; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; B, C &#2360;&#2375; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2340;&#2375;&#2332;&#2364; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2375; &#2360;&#2349;&#2368; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>In the following figure, PS is the angle bisector. If &#8736; QPS = 30&deg;, PQ = 5 cm, and PR = 8 cm, then find the length of PS/2.</p><p><img width=223 height=181 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er231201img001.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, PS &#2325;&#2379;&#2339; &#2360;&#2350;&#2342;&#2381;&#2357;&#2367;&#2349;&#2366;&#2332;&#2325; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736; QPS = 30&deg;, PQ = 5 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; PR = 8 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; PS/2 &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p<p><img width=223 height=181 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er231201img001.png\"></p></span>",

    "question": "<span class=\"eqt\"><p>Each of the questions below consists of a question and two statements numbered 1 and 2 below it. You have to decide whether the data provided in the statements are sufficient to answer the question:</p><p>N is what % of M?</p><p>1- N is 5% of M<sup>2</sup>.</p><p>2- N is 40% of 2M.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2319;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2344;&#2368;&#2330;&#2375; 1 &#2324;&#2352; 2 &#2360;&#2375; &#2309;&#2306;&#2325;&#2367;&#2340; &#2342;&#2379; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2351;&#2361; &#2340;&#2351; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376; &#2351;&#2366; &#2344;&#2361;&#2368;&#2306;:</p><p>N, M &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; % &#2361;&#2376;?</p><p>1- N, M &#2325;&#2366; 5% &#2361;&#2376;<sup>2</sup>.</p><p>2- N, 2M &#2325;&#2366; 40% &#2361;&#2376;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Choose the conclusion(s) which logically follow from the given statements.</p><p>Statements:</p><p>A significant portion of the food produced globally is wasted before it reaches consumers.</p><p>Reducing food wastage can help in addressing global hunger issues.</p><p>Many organizations and governments are now taking steps to reduce food waste.</p><p>Conclusions:</p><p>I: Reducing food wastage can completely eradicate hunger worldwide.</p><p>II: Governments are actively involved in reducing food wastage.</p><p>III: The global food production system has inefficiencies that lead to wastage</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>&#2357;&#2367;&#2358;&#2381;&#2357; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2349;&#2379;&#2332;&#2344; &#2325;&#2366; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;&#2323;&#2306; &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330;&#2344;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2361;&#2368; &#2348;&#2352;&#2381;&#2348;&#2366;&#2342; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2326;&#2366;&#2342;&#2381;&#2351; &#2309;&#2346;&#2357;&#2381;&#2351;&#2351; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2360;&#2375; &#2357;&#2376;&#2358;&#2381;&#2357;&#2367;&#2325; &#2349;&#2370;&#     "question": "<span class=\"eqt\"><p>In a certain code language, if 'WORLD' is coded as 41291523, then what will be the code for 'QUICK' in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, &#2351;&#2342;&#2367; 'WORLD' &#2325;&#2379; 41291523 &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'QUICK' &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2379;&#2337; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>The positional values of alphabets in English series are:</p><p>A=1, B=2, C=3, ..., Z=26.</p><p>The reverse alphabets are A&#8596;Z, B&#8596;Y, C&#8596;X, and so on.</p><p>The pattern followed is that each letter is coded with the positional value of its reverse alphabet.</p><p>For 'WORLD':</p><p>The reverse of W is D, and its position is 4.</p><p>The reverse of O is L, and its position is 12.</p><p>The reverse of R is I, and its position is 9.</p><p>The reverse of L is O, and its position is 15.</p><p>The reverse of D is W, and its position is 23.</p><p>So, 'WORLD' is coded as 41291523.</p><p>Similarly, for 'QUICK':</p><p>The reverse of Q is J, and its position is 10.</p><p>The reverse of U is F, and its position is 6.</p><p>The reverse of I is R, and its position is 18.</p><p>The reverse of C is X, and its position is 24.</p><p>The reverse of K is P, and its position is 16.</p><p>So, 'QUICK' will be coded as 106182416.</p>",

    "solution": "<p>Let the value in blank = n</p><p>Then, 24 * 32 * 5 = 64 * n</p><p>n = 60</p><p>Now, in binary form:</p><p>60/2 = 30 + 0</p><p>30/2 = 15 + 0</p><p>15/2 = 7 + 1</p><p>7/2 = 3 + 1</p><p>3/2 = 1 + 1</p><p>1/2 = 0 + 1</p><p>Now, we will write the numbers given in bold in reverse order. Then,</p><p>(60)<sub>10 </sub><b>= (111100)<sub>2</sub></b></p>",

    "question": "<span class=\"eqt\"><p>4<sup>th</sup> January, 2009 was a Sunday. 4<sup>th</sup> January will be a Sunday again in the year:</p></span><span class=\"hqt\" style=\"display:none\"><p>4 &#2332;&#2344;&#2357;&#2352;&#2368; 2009 &#2325;&#2379; &#2352;&#2357;&#2367;&#2357;&#2366;&#2352; &#2341;&#2366;&#2404; _____&#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; 4 &#2332;&#2344;&#2357;&#2352;&#2368; &#2325;&#2379; &#2346;&#2369;&#2344;&#2307; &#2352;&#2357;&#2367;&#2357;&#2366;&#2352; &#2361;&#2379;&#2327;&#2366;&#2404;</p></span>",

    "question": "<p>Select the most appropriate word to fill in the blank.</p><p>I shall __________ Michael for taking leave without my permission.</p>",
    "options": [
      "voracity",
      "adroit",
      "laud",
      "upbraid"
    ],
    "correct_option_id": 3,
    "solution": "<p>Among the given options, \"upbraid\" fits the context of the sentence. It gives us the idea that the person is going to <b>scold</b> Michael for leaving without his approval.</p><p><b>Upbraid</b>: scold.</p><p>The word that must fit the blank should be a <b>verb</b> following the modal verb 'shall'. 'Voracity' is a <b>noun</b> and 'adroit' is an <b>adjective</b> and thus, they are the incorrect options.</p><p>'Laud' is a contextual misfit as Michael won't be praised for taking a leave without permission.</p><p>Thus, the correct option is <b>(d), upbraid</b>.</p><p>Thus, the correct sentence should be: I shall <u>upbraid</u> Michael for taking leave without my permission.</p><p>Additional Information:</p><p>The respective meanings of the other options are given below in the table:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Word</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Voracity</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">greed</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Adroit</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">clever or skilful</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Laud</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">praise</td></tr></table></p><p>Note:</p><p>Modal verb: A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here can expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb speak.</p>",
    "question_index": 60
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Scientists are just beginning to understand the <b>_______</b> role these cells play in protecting people from serious illness.</p>",
    "options": [
      "Under",
      "Reveal",
      "Crucial",
      "Danger"
    ],
    "correct_option_id": 2,
    "solution": "<p>The blank requires an adjective to meaningfully qualify the noun 'role'. Option a) is a preposition and can also be used as an adverb. It is eliminated as it is not an adjective. Options b) and d) are eliminated as they are 'verb' and 'noun', respectively. Option c) is an adjective that means 'very important'. </p><p>'Crucial' satisfies the grammatical condition mentioned above and is contextually appropriate too. </p><p>Thus, option c) is correct.</p>",
    "question_index": 61
  },

    "question": "<p>Select the correct homonym from the given options to fill in the blank. </p><p>After a long day of hiking, his tired feet began to ____. </p>",

      "Oil",

      "Hail",
      "Ail"

    "correct_option_id": 3,
    "solution": "<p>Among the given options, 'ail' fits in the blank appropriately as its usage conveys that the person had been walking for an extended period. As a result, their feet, likely due to fatigue or strain, started to pain. The word \"ail\" in this context means to be in a state of physical discomfort or to experience minor pain. </p><p>The complete sentence is: After a long day of hiking, his tired feet began to <b>ail</b>.</p><p>Hence, (d) is the correct answer. </p><p>'Oil' means a viscous liquid derived from petroleum, especially for use as a fuel or lubricant.</p><p>'Ale' means a type of beer with a bitter flavour and higher alcoholic content. </p><p>'Hail' means call out to (someone) to attract attention. </p>",
    "question_index": 62
  },

    "question": "<p>Some sentences are given below. While the first and the last sentences (S1 and S6) are in the correct order, the four sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p><b>S1.</b> The structure of a classic Greek tragedy, as outlined by Aristotle, follows a predictable yet powerful narrative arc.</p><p><b>A.</b> This is followed by the <i>anagnorisis</i>, a moment of critical discovery or recognition for the protagonist.</p><p><b>B.</b> This reversal, known as <i>peripeteia</i>, marks a significant turning point where the protagonist's fortunes dramatically change for the worse.</p><p><b>C.</b> In this moment, the protagonist often recognizes their own fatal flaw, or <i>hamartia</i>, which has led to their downfall.</p><p><b>D.</b> The plot typically builds towards a sudden and catastrophic reversal of fortune for the otherwise noble main character.</p><p><b>S6.</b> The play culminates in a final scene of suffering, or <i>catastrophe</i>, which is meant to evoke pity and fear in the audience.</p>",
    "options": [
      "ABDC",
      "CBAD",
      "DBAC",
      "ACBD"
    ],
    "correct_option_id": 2,
    "solution": "<p>The paragraph explains the sequential plot points of a Greek tragedy.</p><p><b>S1</b> introduces the topic: the narrative arc of a Greek tragedy.</p><p><b>D</b> describes the first major plot movement. It explains that the story \"builds towards a sudden and catastrophic reversal of fortune.\"</p><p><b>B</b> gives the technical term for the event described in <b>D</b>. \"This reversal, known as <i>peripeteia</i>,\" directly defines the concept introduced in the previous sentence.</p><p><b>A</b> describes the event that follows the reversal. \"This is followed by the <i>anagnorisis</i>,\" indicating a clear chronological sequence from the <i>peripeteia</i> in <b>B</b>.</p><p><b>C</b> elaborates on the nature of the discovery made in <b>A</b>. \"In this moment\" refers to the <i>anagnorisis</i>, explaining that the protagonist recognizes their \"fatal flaw, or <i>hamartia</i>.\"</p><p><b>S6</b> describes the final stage of the play, the \"<i>catastrophe</i>,\" which is the logical conclusion after the protagonist's downfall has been sealed by their flaw.</p><p>Therefore, the correct sequence is <b>DBAC</b>.</p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 63
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. This trust and openness begin with active listening from managers and colleagues, creating an environment where everyone feels valued and understood. </p><p>B. In the workplace, listening is more than just a nice-to-have skill; it's essential for fostering a culture of innovation and collaboration. </p><p>C. When employees believe they can speak up without fear of negative consequences, they are more inclined to share their thoughts and creative ideas, which can lead to groundbreaking solutions. </p><p>D. When employees feel truly heard, they become more engaged and empowered, which not only enhances individual contributions but also propels the organisation forward.</p>",
    "options": [
      "CDAB",
      "BCAD",
      "ADBC",
      "DCBA"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct order to form a coherent paragraph is BCAD.</p><p><b>Sentence B</b> comes first as it introduces the importance of listening in the workplace, setting the context for why it matters.</p><p><b>Sentence C</b> follows 'B' and explains the positive outcomes of effective listening, specifically how it encourages employees to contribute ideas without fear, thus supporting innovation and collaboration.</p><p><b>Sentence A</b> logically follows by addressing how to achieve the positive outcomes described in 'C'. It emphasises that active listening from managers and colleagues is key to creating a trusting environment. Accordingly, CA forms a logical pair.</p><p><b>Sentence D</b> concludes the paragraph by highlighting the benefits of feeling heard, showing how it leads to greater engagement and ultimately drives the organisation's success.</p><p>Hence, (b) is the correct answer.</p>",
    "question_index": 64

    "comp": "<p><b>Directions :</b>Read the following passage and answer the questions based on the passage:</p><p>Consider the deep, rich redness of a ripe tomato, the sharp sting of a papercut, or the nostalgic aroma of rain on hot pavement. These raw, subjective feelings, i.e., the \"what-it-is-like-ness\" of an experience, are known in philosophy as qualia. They are the private, qualitative characters of our mental states, constituting the very fabric of our conscious lives. Yet, they pose one of the most profound and persistent challenges to our scientific understanding of the universe, a puzzle so deep that philosopher David Chalmers famously dubbed it the \"hard problem of consciousness.\"</p><p>While neuroscience excels at mapping what Chalmers calls the \"easy problems\" - how the brain processes information, focuses attention, integrates sensory data, or controls behaviour, it falters completely before the hard problem. We can trace the full neurological pathway of seeing red: photons of a specific wavelength strike the retina, electrical signals travel the optic nerve, and specific neurons fire in the visual cortex. We can create a complete, third-person, physical account of the entire process. Yet, nowhere in this objective description of synapses, ion channels, and chemical reactions do we find the subjective experience of redness itself. An \"explanatory gap\" exists between the physical mechanics and the phenomenal feeling, a chasm that no amount of objective data seems able to cross.</p><p>This gap is famously illustrated by Frank Jackson's \"Mary's Room\" thought experiment. Imagine Mary, a brilliant neuroscientist who has lived her entire life in a black-and-white room but has learned everything there is to know about the physics and biology of colour vision. She knows exactly what happens in the brain when someone sees a red tomato. If Mary is finally released and sees the colour red for the first time, does she learn something new? The powerful i     "solution": "<p>The sentence in the Direct Speech is in <b>Past Simple Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Past Perfect Tense</b>.</p><p>Past Simple (Subject + V2 + Object) should be converted into Past Perfect (Subject + had + V3 + Object).</p><p>For example:</p><p>He said, \"Arya sent me a book.\" (Direct Speech)</p><p>He said that Arya had sent him a book. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&bull; \"I\" changes to \"he\".</p><p>&bull; \"planted\" changes to \"had planted\".</p><p>&bull; \"this\" changes to \"that\".</p><p>&bull; \"our\" changes to \"their\".</p><p>&bull; \"my\" changes to \"his\".</p><p>&bull; \"ago\" changes to \"before\".</p><p>Therefore, the correct answer is: \"My grandfather told me that he had planted that enormous banyan tree in their backyard with his own hands many decades before.\"</p><p>Hence, option (b) is correct.</p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",

    "comp": "<p><b>Directions :</b>Read the following passage carefully and answer the questions that follow by selecting the most appropriate option from the given alternatives.</p><p>Eco-tourism, as a paradigmatic intersection of environmental stewardship and cultural preservation, manifests a transformative potential for the economies of small towns. Unlike conventional tourism, which often precipitates ecological degradation and commodification of local customs, eco-tourism predicates itself upon a synergistic engagement with the natural milieu and indigenous heritage. Small towns endowed with ecological or anthropological singularities - be it pristine wetlands, undulating mountain ranges, or arcane artisanal traditions - possess latent capacities for economic revitalization that remain largely untapped.</p><p>The economic ramifications of eco-tourism are multifaceted. Firstly, the influx of conscientious visitors catalyzes microeconomic proliferation through patronage of local enterprises: artisanal crafts, gastronomic ventures rooted in endemic ingredients, and family-operated lodgings that eschew homogenized hospitality chains. Such engagement ensures a recirculation of capital within the community, attenuating economic leakage that typifies mass tourism. Secondly, eco-tourism engenders ancillary employment opportunities that are inherently symbiotic with environmental conservation, such as guided treks, wildlife monitoring, and participatory workshops elucidating traditional crafts. In doing so, it concomitantly mitigates youth outmigration by rendering local vocations both economically viable and socially valorized.</p><p>Equally salient is the role of eco-tourism in cultural perpetuation. Small towns often harbor intangible heritage - oral histories, ritualistic performances, vernacular architecture - that, when showcased judiciously, engenders a dialectic of appreciation rather than exploitation. The infusion of tourists incentivizes meticulous preservation and intergenerational transmission of such practices, imbuing the community with renewed cultural gravitas.</p><p>However, the efficacious implementation of eco-tourism necessitates a judicious equilibrium between accessibility and conservation. Unregulated visitation may precipitate ecological perturbation, commodification of rituals, and sociocultural dissonance. Strategic policy frameworks, community participatory planning, and environmental education are indispensable in orchestrating an eco-tourism paradigm that is both economically remunerative and ecologically consonant.</p><p>In sum, eco-tourism constitutes a potent instrument for the economic metamorphosis of small towns, wherein the confluence of nature and culture engenders sustainable prosperity. By valorizing local heritage while fostering ecological integrity, it delineates an alternative developmental trajectory that is simultaneously inclusive, resilient, and cognizant of the imperatives of global environmental stewardship. The judicious promotion of eco-tourism thus transcends mere economic stimulus, evolving into a conduit for holistic, place-based regeneration.</p>",

    "question": "<span class=\"eqt\"><p>The gradual and predictable change in the species composition of an area over time is known as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2351; &#2325;&#2375; &#2360;&#2366;&#2341; &#2325;&#2367;&#2360;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2324;&#2352; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2379; &#2311;&#2360; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Speciation</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2368;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Adaptation</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2325;&#2370;&#2354;&#2344;</span>",
      "<span class=\"eqt\">Ecological succession</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368;&#2351; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Mutation</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct term for the gradual and predictable change in the species composition of a given area is Ecological Succession. It describes the process by which an ecological community undergoes orderly and sequential changes following a disturbance or the colonization of a new habitat.</p><p>Explanation of Options:</p><p>Speciation: This is an evolutionary process by which new biological species arise. It is a long-term, evolutionary change, not the predictable, short-to-medium-term change in the community structure of a specific area.</p><p>Adaptation: This refers to the process by which a species or organism becomes better suited to its environment. It is a key mechanism of evolution that occurs at the individual or species level, not the community level, over evolutionary time scales.</p><p>Ecological succession: This is the correct answer. It is a fundamental concept in ecology. For example, after a forest fire, the bare ground is first colonized by pioneer species like grasses, which are then replaced by shrubs, and eventually, a mature forest community re-establishes itself.</p><p>Mutation: This is a change in the DNA sequence of an organism. Mutations are the ultimate source of genetic variation and are the raw material for evolution, but they do not describe the community-level changes of succession.</p><p>Further insights:</p><p>Ecological succession is generally of two types:</p><p>Primary Succession: This occurs in a completely barren area where no life (and no soil) existed before. Examples include colonization of bare rock, a newly formed volcanic island, or land exposed by a retreating glacier.</p><p>Secondary Succession: This occurs in an area where a previously existing community has been removed by a disturbance (like a fire, flood, or logging), but the soil and some life remain intact. Secondary succession is usually much faster than primary succession because the soil is already present.</p><p></p>",

  },

    "question": "<span class=\"eqt\"><p>Regarding the Air Quality Index (AQI) in India, consider the following statements:</p><p>I. The AQI categorizes air quality into six bands ranging from 'Good' to 'Severe'.</p><p>II. The National Air Quality Index in India is managed by the Central Pollution Control Board (CPCB).</p><p>Which of the above statement(s) is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2357;&#2366;&#2351;&#2369; &#2327;&#2369;&#2339;&#2357;&#2340;&#2381;&#2340;&#2366; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; (AQI) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. AQI &#2357;&#2366;&#2351;&#2369; &#2327;&#2369;&#2339;&#2357;&#2340;&#2381;&#2340;&#2366; &#2325;&#2379; '&#2309;&#2330;&#2381;&#2331;&#2375;' &#2360;&#2375; &#2354;&#2375;&#2325;&#2352; '&#2327;&#2306;&#2349;&#2368;&#2352;' &#2340;&#2325; &#2325;&#2375; &#2331;&#2361; &#2348;&#2376;&#2306;&#2337;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2357;&#2366;&#2351;&#2369; &#2327;&#2369;&#2339;&#2357;&#2340;&#2381;&#2340;&#2366; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2346;&#2381;&#2352;&#2342;&#2370;&#2359;&#2339; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2348;&#2379;&#2352;&#2381;&#2337; (CPCB) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are correct. Statement 1 accurately describes the classification system of the Air Quality Index, and Statement 2 correctly identifies the nodal agency responsible for its management in India.</p><p>Explanation of Statements:</p><p>Statement 1 is correct. The Air Quality Index (AQI) is a tool used to communicate the level of air pollution to the public. In India, it is categorized into six distinct bands, each with a specific color code to make it easily understandable. The categories are:</p><p>Good (0-50)</p><p>Satisfactory (51-100)</p><p>Moderate (101-200)</p><p>Poor (201-300)</p><p>Very Poor (301-400)</p><p>Severe (401-500)</p><p>Statement 2 is correct. The National Air Quality Index (NAQI) was launched in 2014 under the Swachh Bharat Abhiyan (Clean India Mission). It is managed and operated by the Central Pollution Control Board (CPCB), which is the apex organization in the country in the field of pollution control, under the Ministry of Environment, Forest and Climate Change (MoEFCC). The CPCB is responsible for setting standards, monitoring air quality through a network of stations, and disseminating the AQI data.</p><p>Further insights:</p><p>The AQI in India is calculated based on the concentration of eight major air pollutants:</p><p>Particulate Matter (PM10)</p><p>Particulate Matter (PM2.5)</p><p>Nitrogen Dioxide (NO&#8322;)</p><p>Sulphur Dioxide (SO&#8322;)</p><p>Carbon Monoxide (CO)</p><p>Ozone (O&#8323;)</p><p>Ammonia (NH&#8323;)</p><p>Lead (Pb)</p><p>The overall AQI value is determined by the highest sub-index value among these pollutants. For example, if the PM2.5 level corresponds to an AQI of 350 (\"Very Poor\") and all other pollutants are in the \"Moderate\" range, the final reported AQI for that location will be 350.</p><p></p>",
    "question_index": 106
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following are part of the Revenue expenditure of the Government of India?</p><p>I. Interest Payments.</p><p>II. Salaries and Pensions.</p><p>III. Grants-in-Aid to states and union territories</p><p>IV. Grants provided to local bodies by states.</p><p>Select the correct answer using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;&#2306;?</p><p>I. &#2348;&#2381;&#2351;&#2366;&#2332; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344;&#2404;</p><p>II. &#2357;&#2375;&#2340;&#2344; &#2324;&#2352; &#2346;&#2375;&#2306;&#2358;&#2344;&#2404;</p><p>III. &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2324;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2358;&#2366;&#2360;&#2367;&#2340; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2379; &#2309;&#2344;&#2369;&#2342;&#2366;&#2344; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366;&#2404;</p><p>IV. &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2344;&#2367;&#2325;&#2366;&#2351;&#2379;&#2306; &#2325;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2309;&#2344;&#2369;&#2342;&#2366;&#2344;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">I, II, III and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II, III &#2324;&#2352; IV</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The expenditure of the central government can be divided into revenue and capital expenditure</p><p><b>Revenue expenditure</b> is the expenditure incurred for purposes other than the creation of assets of the central government. They are either used in day to day functioning or of consumptive kind.</p><p>Revenue receipts consist of tax revenues and non-tax revenues. Tax revenues comprise proceeds of taxes and other duties levied. The expenditure incurred for normal running of government functionaries, which otherwise does not result in creation of assets is called revenue expenditure.</p><p>Examples of revenue expenditure are Interest Payments and Servicing of Debt, Pensions and expenditure on <b>Grants-in-Aid and contributions to States and Union Territories</b>, Defence, Police expenditure, subsidies, salaries and pensions. Revenue Social services (health, education, social security etc.) and other general services like tax collection etc.</p><p><b>Statement IV is incorrect</b>: State Governments incur expenditure towards Grants-in-Aid and contribution to their Local Bodies, which is not part of government of India expenditure rather respective state government.</p><p><b>Capital expenditure</b> is the expenditure which results in the creation of physical or financial assets.</p><p>This includes expenditure on the acquisition of land, building, machinery, equipment, investment in shares, and <b>loans and advances by the central government to state and union territories</b>, PSUs and others. Capital part of the Loan repayment by the government, defence equipment acquisition and modernization expenditure.</p><p></p>",
    "question_index": 107
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following best describes \"Quaternary Sector\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; \"&#2330;&#2340;&#2369;&#2352;&#2381;&#2341;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;\" &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Activities related communication, banking, trade and other essential services not linked to production of goods.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2330;&#2366;&#2352;, &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327;, &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2324;&#2352; &#2309;&#2344;&#2381;&#2351; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2366;&#2305; &#2332;&#2379; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Activities like interpretation of existing and new ideas, evaluation of new technologies and the creation of services with ultimate decision-making powers.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2332;&#2370;&#2342;&#2366; &#2324;&#2352; &#2344;&#2319; &#2357;&#2367;&#2330;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366;, &#2344;&#2312; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2324;&#2352; &#2309;&#2306;&#2340;&#2367;&#2350; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2354;&#2375;&#2344;&#2375; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2332;&#2376;&#2360;&#2368; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2366;&#2305;&#2404;</span>",
      "<span class=\"eqt\">Activities of changing natural products into other forms through ways of manufacturing.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2325;&#2379; &#2309;&#2344;&#2381;&#2351; &#2352;&#2370;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2375; &#2325;&#2368; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2366;&#2305;&#2404;</span>",
      "<span class=\"eqt\">Activities related to knowledge sector like statisticians, Programmers, consultancy, R&D.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2306;&#2326;&#2381;&#2351;&#2367;&#2325;&#2368;&#2357;&#2367;&#2342;&#2381;, &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;&#2352;, &#2346;&#2352;&#2366;&#2350;&#2352;&#2381;&#2358;, &#2309;&#2344;&#2369;&#2360;&#2306;&#2343;&#2366;&#2344; &#2319;&#2357;&#2306; &#2357;&#2367;&#2325;&#2366;&#2360; &#2332;&#2376;&#2360;&#2375; &#2332;&#2381;&#2334;&#2366;&#2344; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2366;&#2305;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Option (d) provides the best description of the Quaternary Sector. This sector is a further subdivision of the tertiary (service) sector and is specifically focused on knowledge-based and information-intensive activities.</p><p>Explanation of Options:</p><p>a) Activities related communication, banking, trade and other essential services not linked to production of goods.</p><p>This is a description of the Tertiary Sector (or the service sector) in general. It encompasses a broad range of services but doesn't specifically highlight the \"knowledge\" aspect that defines the Quaternary sector.</p><p>b) Activities like interpretation of existing and new ideas, evaluation of new technologies and the creation of services with ultimate decision-making powers.</p><p>This description is more closely aligned with the Quinary Sector. The Quinary sector is an even finer subdivision, representing the highest level of decision-makers in an economy, such as top executives in government, science, universities, and industry. These are the \"gold collar\" professions.</p><p>c) Activities of changing natural products into other forms through ways of manufacturing.</p><p>This is the definition of the Secondary Sector, which involves manufacturing and industrial activities that transform raw materials into finished goods.</p><p>d) Activities related to knowledge sector like statisticians, Programmers, consultancy, R&D.</p><p>This is the correct answer. The Quaternary Sector is the intellectual or knowledge-based part of the economy. It includes activities such as information and communication technology (ICT), research and development (R&D), education, financial planning, consultancy, and media. The examples givenstatisticians, programmers, consultancy, and R&Dare perfect illustrations of this sector.</p><p>Further insights:</p><p>The economic sectors can be summarized as:</p><p>Primary: Extraction of raw materials (e.g., farming, mining).</p><p>Secondary: Manufacturing and processing (e.g., factories, construction).</p><p>Tertiary: Providing services (e.g., retail, banking, transport).</p><p>Quaternary: Knowledge-based services (e.g., IT, R&D, education).</p><p>Quinary: High-level decision-making (e.g., CEOs, top government officials).</p><p></p>",
    "question_index": 108
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the retreating monsoon:</p><p>I. The retreating monsoon winds blow from the northeast to the southwest.</p><p>II. Tamil Nadu receives most of its rainfall during this season.</p><p>III. The retreating monsoon brings widespread rainfall to the entire northern plains.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2346;&#2360;&#2368;&#2358;&#2368;&#2354; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2357;&#2366;&#2346;&#2360;&#2368;&#2358;&#2368;&#2354; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2361;&#2357;&#2366;&#2319;&#2305; &#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2370;&#2352;&#2381;&#2357; &#2360;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2325;&#2368; &#2323;&#2352; &#2348;&#2361;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2350;&#2375;&#2306; &#2311;&#2360; &#2350;&#2380;&#2360;&#2350; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2357;&#2352;&#2381;&#2359;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>III. &#2357;&#2366;&#2346;&#2360;&#2368;&#2358;&#2368;&#2354; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2346;&#2370;&#2352;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2357;&#2352;&#2381;&#2359;&#2366; &#2354;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statements I and II are correct, while statement III is incorrect. The retreating monsoon involves a reversal of wind direction, and it is the primary rainy season for the Tamil Nadu coast. However, it marks the onset of the dry season for the northern plains.</p><p>Explanation of Statements:</p><p>Statement I is correct. During the retreating monsoon season (October-November), the monsoon trough or the low-pressure area over the northern plains becomes weaker and is replaced by a high-pressure system. This causes a reversal in the direction of the surface winds. The winds now blow from the northeast, moving from the land towards the sea (Bay of Bengal). This is why this season is also known as the Northeast Monsoon.</p><p>Statement II is correct. The northeast monsoon winds pick up moisture while passing over the Bay of Bengal. When these moisture-laden winds strike the eastern coast of India, they bring significant rainfall. The Coromandel Coast, particularly in Tamil Nadu, receives the bulk of its annual rainfall during this period. The southwest monsoon provides very little rain to this region as it lies in the rain shadow of the Western Ghats.</p><p>Statement III is incorrect. The retreating monsoon signifies the withdrawal of the main monsoon and the beginning of the dry winter season for the northern plains of India. The winds are blowing from land to sea, so they are generally dry and do not bring widespread rainfall to this region. The weather becomes clear and pleasant in North India during this time.</p><p>Further insights:</p><p>The retreating monsoon season is characterized by clear skies and a rise in temperature during the day, a phenomenon often referred to as \"October Heat.\"</p><p>This season is also associated with the formation of cyclonic depressions over the Andaman Sea. These cyclones often move westwards and cause heavy and widespread rain on the eastern coasts of India, particularly in the deltas of the Godavari, Krishna, and Kaveri rivers in Andhra Pradesh and Tamil Nadu.</p><p></p>",
    "question_index": 109
  },
  {
    "question": "<span class=\"eqt\"><p>Photoinhibition occurs due to which of the following reason(s)?</p><p>I. Too high or too low Photosynthetically active radiation.</p><p>II. Limited availability of nutrients or water.</p><p>III. Increase in salinity of the water.</p><p>Select the correct answer using the code given below:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2309;&#2357;&#2352;&#2379;&#2343;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2325;&#2366;&#2352;&#2339; &#2360;&#2375; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p><p>I. &#2348;&#2361;&#2369;&#2340; &#2309;&#2343;&#2367;&#2325; &#2351;&#2366; &#2348;&#2361;&#2369;&#2340; &#2325;&#2350; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2325; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2357;&#2367;&#2325;&#2367;&#2352;&#2339;&#2404;</p><p>II. &#2346;&#2379;&#2359;&#2325; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2351;&#2366; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2360;&#2368;&#2350;&#2367;&#2340; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2340;&#2366;&#2404;</p><p>III. &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2354;&#2357;&#2339;&#2340;&#2366; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Photoinhibition is defined as a persistent decrease in the efficiency of solar energy conversion into photosynthesis in combination with a decreased overall capacity for photosynthesis of plants.</p><p>Statement I is correct: Photosynthetically active radiation (PAR), designates the spectral range of solar radiation from 400 to 700 nanometers that photosynthetic organisms (green plants) are able to use in the process of photosynthesis. However, a too high or too low PAR intensity may become a stress factor, causing photoinhibition.</p><p>Statement II and III are correct: Environmental stresses that trigger photoinhibition include - adverse temperatures, limited nutrient or water availability, and salinity.</p><p>Source: XIIth biology NCERT and Sciencedirect.com</p>",
    "question_index": 110
  },
  {
    "question": "<span class=\"eqt\"><p>Atal Pension Yojana (APY) is targeted mainly towards:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2335;&#2354; &#2346;&#2375;&#2306;&#2358;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; (&#2319;&#2346;&#2368;&#2357;&#2366;&#2312;) &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2375; &#2354;&#2367;&#2319; &#2354;&#2325;&#2381;&#2359;&#2367;&#2340; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Government employees</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Workers in unorganised sector</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2306;&#2327;&#2336;&#2367;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;</span>",
      "<span class=\"eqt\">College students</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2377;&#2354;&#2375;&#2332; &#2325;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Retired servicemen</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2357;&#2366;&#2344;&#2367;&#2357;&#2371;&#2340;&#2381;&#2340; &#2360;&#2376;&#2344;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Atal Pension Yojana (APY) is a government-backed pension scheme primarily targeted at providing old-age income security to workers in the unorganised sector. This group typically lacks access to formal social security or pension plans.</p><p>Further insights:</p><p>Eligibility: Any Indian citizen between the ages of 18 and 40 years with a savings bank account is eligible to join APY.</p><p>Benefits: The scheme provides a guaranteed minimum monthly pension of &#8377;1,000, &#8377;2,000, &#8377;3,000, &#8377;4,000, or &#8377;5,000 to the subscriber upon reaching the age of 60.</p><p>Contribution: The subscriber's monthly contribution depends on their entry age and the desired pension amount.</p><p>Administering Body: The scheme is administered by the Pension Fund Regulatory and Development Authority (PFRDA).</p>",
    "question_index": 111
  },

    "question": "<span class=\"eqt\"><p>With reference to the High Courts in India, consider the following statements:</p><p>I. Article 214 provides that there shall be a High Court for each State.</p><p>II. The President appoints the Chief Justice and other judges of a High Court.</p><p>III. The High Court has both original and appellate jurisdiction.</p><p>Which of the above statement(s) is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 214 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2361;&#2376; &#2325;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2361;&#2379;&#2327;&#2366;&#2404;</p><p>II. &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2324;&#2352; &#2309;&#2344;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2346;&#2366;&#2360; &#2350;&#2370;&#2354; &#2324;&#2352; &#2309;&#2346;&#2368;&#2354;&#2368;&#2351; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>All three statements are correct. They accurately describe the constitutional provisions, appointment process, and jurisdictional powers of the High Courts in India.</p><p>Explanation of Statements:</p><p>Statement I is correct. Article 214 of the Indian Constitution lays down the foundational provision for the state judiciary by stating, \"There shall be a High Court for each State.\" However, it is important to note that Article 231 allows Parliament to establish a common High Court for two or more States or for two or more States and a Union Territory (e.g., the Punjab and Haryana High Court serves both states and the UT of Chandigarh).</p><p>Statement II is correct. According to Article 217, every Judge of a High Court shall be appointed by the President by warrant under his hand and seal. The appointment of the Chief Justice is made by the President after consultation with the Chief Justice of India and the Governor of the concerned State. For the appointment of other judges, the Chief Justice of the concerned High Court is also consulted.</p><p>Statement III is correct. High Courts in India have a wide range of powers and jurisdictions:</p><p>Original Jurisdiction: They can hear certain cases in the first instance. This includes matters relating to the enforcement of Fundamental Rights (under Article 226), disputes relating to marriage and divorce, and cases related to the election of Members of Parliament and State Legislatures.</p><p>Appellate Jurisdiction: This is the primary jurisdiction of a High Court. They hear appeals against the judgments of subordinate courts within their territorial jurisdiction, in both civil and criminal matters.</p><p>Further insights:</p><p>Writ Jurisdiction: A crucial aspect of the High Court's original jurisdiction is the power to issue writs (Habeas Corpus, Mandamus, Certiorari, Prohibition, and Quo Warranto) under Article 226 for the enforcement of Fundamental Rights and for any other purpose. This power is wider than the Supreme Court's writ jurisdiction under Article 32, which is limited to the enforcement of Fundamental Rights only.</p><p>Supervisory Jurisdiction: Under Article 227, every High Court has the power of superintendence over all courts and tribunals throughout the territories in relation to which it exercises jurisdiction.</p><p>Court of Record: A High Court is also a 'court of record' (Article 215), meaning its judgments are recorded for perpetual memory and testimony, and it has the power to punish for its own contempt.</p>",
    "question_index": 112
  },

    "question": "<span class=\"eqt\"><p>Which of the following individuals was honoured with the Padma Shri in 2025 for empowering women by teaching traditional Bengali folk percussion (dhak)?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2348;&#2306;&#2327;&#2366;&#2354;&#2368; &#2354;&#2379;&#2325; &#2357;&#2366;&#2342;&#2381;&#2351; (&#2338;&#2366;&#2325;) &#2360;&#2367;&#2326;&#2366;&#2325;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2379; &#2360;&#2358;&#2325;&#2381;&#2340; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 2025 &#2350;&#2375;&#2306; &#2346;&#2342;&#2381;&#2350; &#2358;&#2381;&#2352;&#2368; &#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;?</p></span>",

      "<span class=\"eqt\">Gokul Chandra Das</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2325;&#2369;&#2354; &#2330;&#2306;&#2342;&#2381;&#2352; &#2342;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Tushar Durgeshbhai Shukla</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2369;&#2359;&#2366;&#2352; &#2342;&#2369;&#2352;&#2381;&#2327;&#2375;&#2358;&#2349;&#2366;&#2312; &#2358;&#2369;&#2325;&#2381;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Harchandan Singh Bhatti</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2330;&#2306;&#2342;&#2344; &#2360;&#2367;&#2306;&#2361; &#2349;&#2335;&#2381;&#2335;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The individual honored with the Padma Shri in 2025 for empowering women by teaching traditional Bengali folk percussion (dhak) is Gokul Chandra Das.</p><p>Gokul Chandra Das, a renowned dhak player from West Bengal, was recognized for his groundbreaking work in breaking gender stereotypes by training over 150 women in playing the dhak, an instrument traditionally dominated by men. He even designed a lighter version of the instrument to encourage wider female participation.</p><p></p>",

    "question": "<span class=\"eqt\"><p>In the context of Pradhan Mantri Vaya Vandana Yojana (PMVVY), consider the following statements.</p><p>I. It is a pension scheme exclusively for senior citizens aged 60 years.</p><p>II. The scheme is exempted from Goods and Service Tax.</p><p>Which among the given statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2357;&#2351; &#2357;&#2306;&#2342;&#2344;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366; (&#2346;&#2368;&#2319;&#2350;&#2357;&#2368;&#2357;&#2368;&#2357;&#2366;&#2312;) &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2351;&#2361; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; 60 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2375; &#2357;&#2352;&#2367;&#2359;&#2381;&#2336; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2346;&#2375;&#2306;&#2358;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2311;&#2360; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2379; &#2350;&#2366;&#2354; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366; &#2325;&#2352; &#2360;&#2375; &#2331;&#2370;&#2335; &#2342;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404;</p><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements I and II are correct. They accurately describe the eligibility criteria and a key tax benefit of the Pradhan Mantri Vaya Vandana Yojana (PMVVY).</p><p>Explanation of Statements:</p><p>Statement I is correct. The PMVVY is a social security scheme specifically designed for senior citizens to provide them with a regular pension income during their old age. The minimum entry age to invest in the scheme is 60 years (completed). It is an immediate annuity plan where the pensioner starts receiving payments soon after purchasing the policy.</p><p>Statement II is correct. The Life Insurance Corporation of India (LIC), which implements the scheme, explicitly states that the PMVVY is exempt from the Goods and Services Tax (GST). This means no GST is levied on the purchase price (premium) paid by the senior citizen to buy the policy, making it more affordable.</p><p>Further insights:</p><p>Implementing Agency: The scheme is implemented through the Life Insurance Corporation of India (LIC).</p><p>Investment Limit: Under the modified scheme, an individual could invest a maximum of &#8377;15 lakh.</p><p>Assured Return: The scheme offered a guaranteed rate of return on the investment for a policy term of 10 years. Pension payments could be received on a monthly, quarterly, half-yearly, or yearly basis.</p><p>Purchase Price Return: At the end of the 10-year policy term, the full purchase price (the initial investment) is returned to the pensioner.</p><p>Scheme Availability: The PMVVY was a limited-period scheme. It was launched in 2017 and was available for subscription until March 31, 2023.</p><p></p>",

  },
