  },
  {
    "question": "<span class=\"eqt\"><p>What is the symbol used to indicate an attachment is sent with an email?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2312;&#2350;&#2375;&#2354; &#2325;&#2375; &#2360;&#2366;&#2341; &#2309;&#2344;&#2369;&#2354;&#2327;&#2381;&#2344;&#2325; &#2349;&#2375;&#2332;&#2375; &#2332;&#2366;&#2344;&#2375; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Arrow</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2352;&#2379;</span>",
      "<span class=\"eqt\">Paperclip</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2346;&#2352; &#2325;&#2381;&#2354;&#2367;&#2346;</span>",
      "<span class=\"eqt\">Envelope</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2357;&#2375;&#2354;&#2346;</span>",
      "<span class=\"eqt\">Thumbnail</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2306;&#2348;&#2344;&#2375;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The paperclip icon is the universal symbol for email attachments.</p><p>A paperclip icon next to an email in your inbox indicates that the message has an attachment.</p><p></p>",
    "question_index": 142
  },
  {
    "question": "<span class=\"eqt\"><p>What is the purpose of virtual memory in a computer system?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2330;&#2369;&#2309;&#2354; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To provide additional virtual space when physical ram is running low</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2380;&#2340;&#2367;&#2325; &#2352;&#2376;&#2350; &#2325;&#2350; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2357;&#2352;&#2381;&#2330;&#2369;&#2309;&#2354; &#2360;&#2381;&#2346;&#2375;&#2360; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2325;&#2352;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">To store temporary files generated during system updates</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2309;&#2346;&#2337;&#2375;&#2335; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2309;&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2347;&#2364;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">To create backup copies of data on secondary storage</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339; &#2346;&#2352; &#2337;&#2375;&#2335;&#2366; &#2325;&#2368; &#2348;&#2376;&#2325;&#2309;&#2346; &#2346;&#2381;&#2352;&#2340;&#2367;&#2351;&#2366;&#2306; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">To manage the allocation of CPU resources</span><span class=\"hqt\" style=\"display:none\">CPU &#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2325;&#2375; &#2310;&#2357;&#2306;&#2335;&#2344; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Virtual memory is a memory management technique used to provide additional virtual address space when physical RAM is running low. It allows the computer to use a portion of secondary storage (like a hard drive) as if it were additional RAM, thereby extending the available memory for running processes.</p>",
    "question_index": 143
  },
  {
    "question": "<span class=\"eqt\"><p>What is the difference between \"reply\" and \"reply all\" in an email?</p><p>A. \"Reply\" sends a response to the sender only, while \"reply all\" sends a response to everyone in the email thread</p><p>B. \"Reply\" sends a response to everyone in the email thread, while \"reply all\" sends a response to the sender only</p><p>C. \"Reply\" and \"reply all\" are the same thing</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2312;&#2350;&#2375;&#2354; &#2350;&#2375;&#2306; \"&#2352;&#2367;&#2346;&#2381;&#2354;&#2366;&#2312;\" &#2324;&#2352; \"&#2352;&#2367;&#2346;&#2381;&#2354;&#2366;&#2312; &#2321;&#2354;\" &#2350;&#2375;&#2306; &#2325;&#2381;&#2351;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p><p>A. \"&#2352;&#2367;&#2346;&#2381;&#2354;&#2366;&#2312;\" &#2325;&#2375;&#2357;&#2354; &#2346;&#2381;&#2352;&#2375;&#2359;&#2325; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2349;&#2375;&#2332;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; \"&#2352;&#2367;&#2346;&#2381;&#2354;&#2366;&#2312; &#2321;&#2354;\" &#2312;&#2350;&#2375;&#2354; &#2341;&#2381;&#2352;&#2375;&#2337; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2349;&#2375;&#2332;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>B. \"&#2352;&#2367;&#2346;&#2381;&#2354;&#2366;&#2312;\" &#2312;&#2350;&#2375;&#2354; &#2341;&#2381;&#2352;&#2375;&#2337; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2349;&#2375;&#2332;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; \"&#2352;&#2367;&#2346;&#2381;&#2354;&#2366;&#2312; &#2321;&#2354;\" &#2325;&#2375;&#2357;&#2354; &#2346;&#2381;&#2352;&#2375;&#2359;&#2325; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2349;&#2375;&#2332;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>C. \"&#2352;&#2367;&#2346;&#2381;&#2354;&#2366;&#2312;\" &#2324;&#2352; \"&#2352;&#2367;&#2346;&#2381;&#2354;&#2366;&#2312; &#2321;&#2354;\" &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">A and B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2324;&#2352; B</span>",
      "<span class=\"eqt\">B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">A only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">A and C only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2324;&#2352; C</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>When you receive an email with multiple recipients, you can choose to reply to only the sender or to reply to everyone in the email thread. Here is the difference between \"reply\" and \"reply all\":</p><p>\"Reply\": This option allows you to send a response to the original sender of the email only. The email will only be sent to the person who sent you the email.</p><p>\"Reply all\": This option allows you to send a response to everyone who received the original email. The email will be sent to the original sender as well as anyone else who was included in the email thread.</p>",
    "question_index": 144
  },
  {
    "question": "<span class=\"eqt\"><p>Read the following about Wi-Fi networks and choose the correct option:-</p><p>(i) Wi-Fi networks are relatively simple.</p><p>(ii) Wi-Fi networks use licensed spectrum generally.</p><p>(iii) Wi-Fi networking equipment provides internet access in a home or business.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2312;-&#2347;&#2366;&#2312; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:-</p><p>(i) &#2357;&#2366;&#2312;-&#2347;&#2366;&#2312; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2309;&#2346;&#2375;&#2325;&#2381;&#2359;&#2366;&#2325;&#2371;&#2340; &#2360;&#2352;&#2354; &#2361;&#2376;&#2306;&#2404;</p><p>(ii) &#2357;&#2366;&#2312;-&#2347;&#2366;&#2312; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2354;&#2366;&#2311;&#2360;&#2375;&#2306;&#2360; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2360;&#2381;&#2346;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2350; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>(iii) &#2357;&#2366;&#2312;-&#2347;&#2366;&#2312; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325;&#2367;&#2306;&#2327; &#2313;&#2346;&#2325;&#2352;&#2339; &#2328;&#2352; &#2351;&#2366; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2350;&#2375;&#2306; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",

      "<span class=\"eqt\">(i) is true, (ii) is false and (ii) is true</span><span class=\"hqt\" style=\"display:none\">(i) &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, (ii) &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2324;&#2352; (ii) &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">(i) is false, (ii) is false and (ii) is true</span><span class=\"hqt\" style=\"display:none\">(i) &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, (ii) &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2324;&#2352; (ii) &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",

    "correct_option_id": 1,
    "solution": "<p>Wi-Fi networks are relatively simple. Anyone can purchase Wi-Fi networking equipment in order to provide internet access in a home or business. Wi-Fi networks use unlicensed spectrum: electromagnetic frequencies that are available for anyone to use without charge. To prevent neighbours' networks from interfering with each other, there are strict limits on the power (and therefore the range) of Wi-Fi networks.</p>",

    "question": "<span class=\"eqt\"><p>What type of network attack floods a target system or network with excessive traffic to overwhelm its resources and cause disruption?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2361;&#2350;&#2354;&#2366; &#2325;&#2367;&#2360;&#2368; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2351;&#2366; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2335;&#2381;&#2352;&#2376;&#2347;&#2364;&#2367;&#2325; &#2349;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2360;&#2375; &#2313;&#2360;&#2325;&#2375; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2346;&#2352; &#2342;&#2348;&#2366;&#2357; &#2346;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2357;&#2381;&#2351;&#2357;&#2343;&#2366;&#2344; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Phishing</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2367;&#2358;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Spoofing</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2370;&#2398;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Denial of Service (DoS)</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2344;&#2366;&#2351;&#2354; &#2321;&#2398; &#2360;&#2352;&#2381;&#2357;&#2367;&#2360; (DoS)</span>",
      "<span class=\"eqt\">Man-in-the-Middle (MitM)</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2344;-&#2311;&#2344;-&#2342;-&#2350;&#2367;&#2337;&#2367;&#2354; (MitM)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The type of network attack that floods a target system or network with excessive traffic to overwhelm its resources and cause disruption is called a <b>\"Denial of Service\"</b> (DoS) attack. In a DoS attack, the attacker floods the target with a large volume of data, requests, or traffic in a short period, making it difficult for the target system to respond to legitimate requests from users. The purpose of a DoS attack is to deny access to the target's services or resources, causing service disruption or downtime for legitimate users.</p>",
    "question_index": 146
  },

    "question": "<span class=\"eqt\"><p>The viruses that typically infect files with .exe or .com extensions are called __________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2375; &#2357;&#2366;&#2351;&#2352;&#2360; &#2332;&#2379; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; .exe &#2351;&#2366; .com &#2319;&#2325;&#2381;&#2360;&#2335;&#2375;&#2306;&#2358;&#2344; &#2357;&#2366;&#2354;&#2368; &#2347;&#2364;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2379; &#2311;&#2344;&#2381;&#2347;&#2376;&#2325;&#2381;&#2335; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, __________ &#2325;&#2361;&#2354;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Boot Sector Virus</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2370;&#2335; &#2360;&#2375;&#2325;&#2381;&#2335;&#2352; &#2357;&#2366;&#2351;&#2352;&#2360;</span>",
      "<span class=\"eqt\">File-infecting Virus</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2366;&#2311;&#2354;-&#2311;&#2344;&#2381;&#2347;&#2375;&#2325;&#2381;&#2335;&#2367;&#2306;&#2327; &#2357;&#2366;&#2351;&#2352;&#2360;</span>",
      "<span class=\"eqt\">Polymorphic Virus</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2377;&#2354;&#2368;&#2350;&#2377;&#2352;&#2381;&#2347;&#2367;&#2325; &#2357;&#2366;&#2351;&#2352;&#2360;</span>",
      "<span class=\"eqt\">Macro Virus</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2325;&#2381;&#2352;&#2379; &#2357;&#2366;&#2351;&#2352;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>File-infecting Virus, also called a parasitic virus typically infects files with .exe or .com extensions. Some file infectors can overwrite host files and others can damage the hard drive's formatting. Macro Virus is commonly found in programs such as Microsoft Word or Excel. These viruses are usually stored as part of a document and can spread when the files are transmitted to other computers, often through email attachments.</p><p>Polymorphic virus has the capability to evade anti-virus programs since they can change codes every time an infected file is performed. Boot Sector virus hides out in a file on a USB drive or email attachment. When activated, it can infect the system's master boot record to damage the system.</p>",

    "question": "<span class=\"eqt\"><p>Which among the following is a cyberattack from an unknown source impersonating a trusted source?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357;&#2360;&#2344;&#2368;&#2351; &#2360;&#2381;&#2352;&#2379;&#2340; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2370;&#2346;&#2339; &#2325;&#2352;&#2325;&#2375; &#2325;&#2367;&#2360;&#2368; &#2309;&#2332;&#2381;&#2334;&#2366;&#2340; &#2360;&#2381;&#2352;&#2379;&#2340; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2366;&#2311;&#2348;&#2352; &#2361;&#2350;&#2354;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p><b>Spoofing</b> is the <b>act of disguising a communication from an unknown source as being from a known, trusted source</b>. Spoofing can apply to emails, phone calls, and websites, or can be more technical, such as a computer spoofing an IP address, Address Resolution Protocol (ARP) , or Domain Name System (DNS) server.</p>",
