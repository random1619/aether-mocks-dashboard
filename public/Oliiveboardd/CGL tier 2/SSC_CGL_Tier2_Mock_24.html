    "question": "<span class=\"eqt\"><p>Match the following Pardoning powers of the President with their respective meanings:</p><p><table style=\"border-collapse:collapse;\"></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. Pardon</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Reducing the period of sentence without changing its character.</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. Respite</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Awarding a lesser sentence in place of one originally awarded due to some special fact.</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. Reprieve</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Absolves the convict from all sentences, punishments, and disqualifications.</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. Remission</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Stay of the execution of a sentence for a temporary period.</td></p><p></tr></p><p></table></p><p>Choose the correct code from the options given below:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2381;&#2359;&#2350;&#2366; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2309;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. &#2325;&#2381;&#2359;&#2350;&#2366;&#2342;&#2366;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2360;&#2332;&#2366; &#2325;&#2368; &#2309;&#2357;&#2343;&#2367; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2367;&#2319; &#2348;&#2367;&#2344;&#2366; &#2325;&#2350; &#2325;&#2352;&#2344;&#2366;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. &#2352;&#2366;&#2361;&#2340;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359; &#2340;&#2341;&#2381;&#2351; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2350;&#2370;&#2354; &#2352;&#2370;&#2346; &#2360;&#2375; &#2342;&#2368; &#2327;&#2312; &#2360;&#2332;&#2366; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2325;&#2350; &#2360;&#2332;&#2366; &#2342;&#2375;&#2344;&#2366;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. &#2352;&#2366;&#2361;&#2340;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2342;&#2379;&#2359;&#2368; &#2325;&#2379; &#2360;&#2349;&#2368; &#2360;&#2332;&#2366;&#2323;&#2306;, &#2342;&#2306;&#2337;&#2379;&#2306; &#2324;&#2352; &#2309;&#2351;&#2379;&#2327;&#2381;&#2351;&#2340;&#2366;&#2323;&#2306; &#2360;&#2375; &#2350;&#2369;&#2325;&#2381;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. &#2325;&#2381;&#2359;&#2350;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2325;&#2367;&#2360;&#2368; &#2360;&#2332;&#2366; &#2325;&#2375; &#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2344; &#2346;&#2352; &#2309;&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2379;&#2325;&#2404;</td></tr></table></p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2361;&#2368; &#2325;&#2379;&#2337; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">I-A, II-B, III-C, IV-D</span><span class=\"hqt\" style=\"display:none\">I-A, II-B, III-C, IV-D</span>",
      "<span class=\"eqt\">I-C, II-B, III-D, IV-A</span><span class=\"hqt\" style=\"display:none\">I-C, II-B, III-D, IV-A</span>",
      "<span class=\"eqt\">I-C, II-D, III-B, IV-A</span><span class=\"hqt\" style=\"display:none\">I-C, II-D, III-B, IV-A</span>",
      "<span class=\"eqt\">I-A, II-C, III-B, IV-D</span><span class=\"hqt\" style=\"display:none\">I-A, II-C, III-B, IV-D</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Article 72 of the Constitution empowers the President to grant pardons to persons who have been tried and convicted of any offence in all cases where the:</p><p>Punishment or sentence is for an offence against a Union Law; Punishment or sentence is by a court martial (military court); and Sentence is a sentence of death</p><p>The pardoning power of the President includes the following:</p><p>Pardon: It removes both the sentence and the conviction and completely absolves the convict from all sentences, punishments, and disqualifications.</p><p>Commutation: It denotes the substitution of one form of punishment for a lighter form. For example, a death sentence may be commuted to rigorous imprisonment, which in turn may be commuted to a simple imprisonment.</p><p>Remission: It implies reducing the period of sentence without changing its character. For example, a sentence of rigorous imprisonment for two years may be remitted to rigorous imprisonment for one year.</p><p>Respite: It denotes awarding a lesser sentence in place of one originally awarded due to some special fact, such as the physical disability of a convict or the pregnancy of a woman offender.</p><p>Reprieve: It implies a stay of the execution of a sentence (especially that of death) for a temporary period. Its purpose is to enable the convict to have time to seek pardon or commutation from the President.</p><p></p>",
    "question_index": 115
  },

    "question": "<span class=\"eqt\"><p>On October 3, 2024, the Union Cabinet approved adding Marathi, Pali, Prakrit, Assamese, and Bengali to this category, expanding the recognised Classical Languages to eleven. The criteria for a language to be classified as a Classical Language include which of the following?</p><p>I. High antiquity of its early texts or recorded history, spanning a period of 1,500-2,000 years.</p><p>II. A body of ancient literature or texts that is considered heritage by generations of speakers.</p><p>III. Knowledge texts, especially prose texts, in addition to poetry, epigraphical and inscriptional evidence.</p><p>IV. The Classical Language and its literature may be distinct from its current form or show discontinuity with later forms derived from the original.</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>3 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;, 2024 &#2325;&#2379; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2350;&#2306;&#2337;&#2354; &#2344;&#2375; &#2350;&#2352;&#2366;&#2336;&#2368;, &#2346;&#2366;&#2354;&#2368;, &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;, &#2309;&#2360;&#2350;&#2367;&#2351;&#2366; &#2324;&#2352; &#2348;&#2306;&#2327;&#2366;&#2354;&#2368; &#2325;&#2379; &#2311;&#2360; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2325;&#2379; &#2350;&#2306;&#2332;&#2370;&#2352;&#2368; &#2342;&#2368;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2349;&#2366;&#2359;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2327;&#2381;&#2351;&#2366;&#2352;&#2361; &#2361;&#2379; &#2327;&#2312;&#2404; &#2325;&#2367;&#2360;&#2368; &#2349;&#2366;&#2359;&#2366; &#2325;&#2379; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2349;&#2366;&#2359;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2350;&#2366;&#2344;&#2342;&#2306;&#2337;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;?</p><p>I. &#2311;&#2360;&#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2327;&#2381;&#2352;&#2306;&#2341;&#2379;&#2306; &#2351;&#2366; &#2342;&#2352;&#2381;&#2332; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360; &#2325;&#2368; &#2313;&#2330;&#2381;&#2330; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344;&#2340;&#2366;, 1,500-2,000 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2368; &#2309;&#2357;&#2343;&#2367; &#2350;&#2375;&#2306; &#2347;&#2376;&#2354;&#2368; &#2361;&#2369;&#2312;&#2404;</p><p>II. &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351; &#2351;&#2366; &#2327;&#2381;&#2352;&#2306;&#2341;&#2379;&#2306; &#2325;&#2366; &#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2332;&#2367;&#2360;&#2375; &#2348;&#2379;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2379;&#2306; &#2325;&#2368; &#2346;&#2368;&#2338;&#2364;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2352;&#2366;&#2360;&#2340; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2332;&#2381;&#2334;&#2366;&#2344; &#2327;&#2381;&#2352;&#2306;&#2341;, &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2327;&#2342;&#2381;&#2351; &#2327;&#2381;&#2352;&#2306;&#2341;, &#2325;&#2366;&#2357;&#2381;&#2351;, &#2346;&#2369;&#2352;&#2366;&#2354;&#2375;&#2326;&#2368;&#2351; &#2324;&#2352; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326;&#2368;&#2351; &#2360;&#2366;&#2325;&#2381;&#2359;&#2381;&#2351; &#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366;&#2404;</p><p>IV. &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2349;&#2366;&#2359;&#2366; &#2324;&#2352; &#2313;&#2360;&#2325;&#2366; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351; &#2309;&#2346;&#2344;&#2375; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2354;&#2327; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2351;&#2366; &#2350;&#2370;&#2354; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2348;&#2366;&#2342; &#2325;&#2375; &#2352;&#2370;&#2346;&#2379;&#2306; &#2360;&#2375; &#2309;&#2354;&#2327; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II, III and IV</span><span class=\"hqt\" style=\"display:none\">I, II, III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">I, II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Six languages - Tamil, Sanskrit, Telugu, Kannada, Malayalam, and Odia - were recognised as Classical Languages between 2004 and 2014.</p><p>On October 3, 2024, the Union Cabinet approved adding Marathi, Pali, Prakrit, Assamese, and Bengali to this category, expanding the recognised Classical Languages to eleven.</p><p></p><p><b>What Makes a Language \"Classical\"</b></p><p>The Government of India, through the Ministry of Culture and in consultation with linguistic and historical experts, has established criteria for designating a language as a Classical Language.</p><p>The criteria for a language to be classified as a Classical Language include the following:</p><p>- High antiquity of its early texts or recorded history, spanning a period of 1,500-2,000 years.</p><p>- A body of ancient literature or texts that is considered heritage by generations of speakers.</p><p>- Knowledge texts, especially prose texts, in addition to poetry, epigraphical and inscriptional evidence.</p><p>- The Classical Language and its literature may be distinct from its current form or show discontinuity with later forms derived from the original.</p><p></p><p></p>",
    "question_index": 116
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>I. Delhi is the most populated metro followed by Mumbai.</p><p>II. There has been a continuous increase in absolute population figure between 1901-2011</p><p>Which of the above statement(s) is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2310;&#2348;&#2366;&#2342;&#2368; &#2357;&#2366;&#2354;&#2366; &#2350;&#2361;&#2366;&#2344;&#2327;&#2352; &#2361;&#2376;, &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2350;&#2369;&#2306;&#2348;&#2312; &#2361;&#2376;&#2404;</p><p>II. 1901-2011 &#2325;&#2375; &#2348;&#2368;&#2330; &#2346;&#2370;&#2352;&#2381;&#2339; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2310;&#2306;&#2325;&#2337;&#2364;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2306;&#2340;&#2352; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2369;&#2312; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement I is incorrect, but statement II is correct. According to the 2011 Census, Mumbai was the most populated metropolitan city, not Delhi. However, India's total population has indeed shown a continuous increase in every census from 1901 to 2011.</p><p><img width=624 height=356 id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p10830/image002.jpg\"></p><p>Statement II is Correct</p><p><img width=624 height=502 id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p10830/image003.jpg\"></p><p>Source: The Hindu</p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>In the context of Medieval India, what is the meaning of the term 'Turkan-i-Chahalgani'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2343;&#2381;&#2351;&#2325;&#2366;&#2354;&#2368;&#2344; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, '&#2340;&#2369;&#2352;&#2381;&#2325;&#2366;&#2344;-&#2319;-&#2330;&#2361;&#2354;&#2327;&#2366;&#2344;&#2368;' &#2358;&#2348;&#2381;&#2342; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tax imposed on Non-Muslims</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2352;-&#2350;&#2369;&#2360;&#2354;&#2350;&#2366;&#2344;&#2379;&#2306; &#2346;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2352;</span>",
      "<span class=\"eqt\">Newly created agriculture department</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2357; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2325;&#2371;&#2359;&#2367; &#2357;&#2367;&#2349;&#2366;&#2327;</span>",

    "correct_option_id": 2,
    "solution": "<p><b>Sultan Iltutmish</b> established '<b>Group of Forty' (Turkan-i-Chahalgani).</b> These were Turkish Amirs (nobles) who advised and helped the Sultan in administering the Sultanate. After the death of Iltutmish, this group assumed great power in its hands.</p><p>For a few years, they decided on the selection of Sultans one after the other. The group was finally eliminated by Balban.</p><p><b>Jizya</b> is a tax imposed on Non-Muslims for <b>security purposes.</b></p><p></p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding chromosomal disorders:</p><p>1.Klinefelter's syndrome is characterized by the presence of an additional X chromosome in males (XXY).</p><p>2.Turner's syndrome affects males and leads to infertility and tall stature.</p><p>3.Down's syndrome individuals show mental retardation and characteristic facial features.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2339;&#2360;&#2370;&#2340;&#2381;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2368; &#2357;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2325;&#2381;&#2354;&#2366;&#2311;&#2344;&#2347;&#2375;&#2354;&#2381;&#2335;&#2352; &#2360;&#2367;&#2306;&#2337;&#2381;&#2352;&#2379;&#2350; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2319;&#2325;&#2381;&#2360; &#2327;&#2369;&#2339;&#2360;&#2370;&#2340;&#2381;&#2352; (XXY) &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2335;&#2352;&#2381;&#2344;&#2352; &#2360;&#2367;&#2306;&#2337;&#2381;&#2352;&#2379;&#2350; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2348;&#2366;&#2306;&#2333;&#2346;&#2344; &#2324;&#2352; &#2354;&#2306;&#2348;&#2375; &#2325;&#2342; &#2325;&#2366; &#2325;&#2366;&#2352;&#2339; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3. &#2337;&#2366;&#2313;&#2344; &#2360;&#2367;&#2306;&#2337;&#2381;&#2352;&#2379;&#2350; &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2350;&#2366;&#2344;&#2360;&#2367;&#2325; &#2350;&#2306;&#2342;&#2340;&#2366; &#2324;&#2352; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2330;&#2375;&#2361;&#2352;&#2375; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2319;&#2306; &#2342;&#2367;&#2326;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 3 are correct, while statement 2 is incorrect. Klinefelter's syndrome is an XXY condition in males, and Down's syndrome has well-known characteristic features. Turner's syndrome, however, affects females (XO) and is associated with short stature, not tall stature.</p><p>Explanation of Statements:</p><p>Statement 1 is correct. Klinefelter's syndrome is a genetic condition caused by aneuploidy of the sex chromosomes in males. Instead of the typical XY karyotype, affected individuals have an extra X chromosome, resulting in a 47,XXY karyotype. This leads to features like underdeveloped testes, infertility, and often some female-like characteristics (e.g., breast development or gynecomastia).</p><p>Statement 2 is incorrect. This statement has two errors:</p><p>Sex Affected: Turner's syndrome affects females, not males. It is caused by the complete or partial absence of one X chromosome, resulting in a 45,XO karyotype.</p><p>Stature: A key characteristic of Turner's syndrome is short stature, not tall stature. Other features include rudimentary ovaries leading to infertility and a webbed neck.</p><p>Statement 3 is correct. Down's syndrome, also known as Trisomy 21, is a chromosomal disorder caused by the presence of a full or partial extra copy of chromosome 21. It is typically associated with a range of physical and intellectual characteristics, including developmental delays, mild to moderate intellectual disability, a flattened facial profile, an upward slant to the eyes, and a short neck.</p><p>Further insights:</p><p>These disorders are examples of aneuploidy, which is the presence of an abnormal number of chromosomes in a cell.</p><p>Klinefelter's (XXY) and Down's (Trisomy 21) are examples of trisomy (having three copies of a particular chromosome instead of the usual two).</p><p>Turner's (XO) is an example of monosomy (having only one copy of a particular chromosome instead of the usual two).</p><p></p>",
    "question_index": 119
  },

    "options": [
      "<span class=\"eqt\">The political essays of Arundhati Roy</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2369;&#2306;&#2343;&#2340;&#2367; &#2352;&#2377;&#2351; &#2325;&#2375; &#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2344;&#2367;&#2348;&#2306;&#2343;</span>",

      "<span class=\"eqt\">The fictional life of a saint named Mary</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2352;&#2368; &#2344;&#2366;&#2350;&#2325; &#2319;&#2325; &#2360;&#2306;&#2340; &#2325;&#2366; &#2325;&#2366;&#2354;&#2381;&#2346;&#2344;&#2367;&#2325; &#2332;&#2368;&#2357;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Mother Mary Comes to Me is a book that details Arundhati Roy's life journey through the lens of her complex relationship with her mother, Mary, who is portrayed as a powerful and influential figure who both sheltered and \"stormed\" her life.</p><p>It emphasizes the personal and emotional impact her mother's death had on Roy, prompting her to write this candid and revealing account.</p>",
    "question_index": 120

    "question": "<span class=\"eqt\"><p>Consider the following statements with reference to the Balance of Payment.</p><p>i. Current account transactions are two way and multiple transactions.</p><p>ii. Capital account transactions are single time and one way transactions.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>i. &#2330;&#2366;&#2354;&#2370; &#2326;&#2366;&#2340;&#2366; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2342;&#2379;&#2340;&#2352;&#2347;&#2366; &#2324;&#2352; &#2348;&#2361;&#2369;&#2346;&#2325;&#2381;&#2359;&#2368;&#2351; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>ii. &#2346;&#2370;&#2306;&#2332;&#2368; &#2326;&#2366;&#2340;&#2366; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2319;&#2325;&#2354; &#2360;&#2350;&#2351; &#2324;&#2352; &#2319;&#2325;&#2340;&#2352;&#2347;&#2366; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">ii only</span><span class=\"hqt\" style=\"display:none\">ii &#2325;&#2375;&#2357;&#2354;</span>",
      "<span class=\"eqt\">Both i and ii</span><span class=\"hqt\" style=\"display:none\">i &#2324;&#2352; ii &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither i nor ii</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; i &#2324;&#2352; &#2344; &#2361;&#2368; ii</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Current account transactions are single time and one way transactions. It means the transaction either receipt or payment happens once and the transaction ends there.</p><p>Capital account transactions are two way and multiple transactions. It means paid money can be recovered through periodical income and/or by disposal of the asset created.</p>",
    "question_index": 121
  },

    "question": "<span class=\"eqt\"><p>Which of the following changes to air mass causes rainfall?</p><p>I. Addition of moisture</p><p>II. Upliftment of the air</p><p>III. Downward movement of the air</p><p>Select the correct answer using the codes below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2357;&#2366;&#2351;&#2369; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2357;&#2352;&#2381;&#2359;&#2366; &#2325;&#2366; &#2325;&#2366;&#2352;&#2339; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;?</p><p>I. &#2344;&#2350;&#2368; &#2325;&#2366; &#2348;&#2338;&#2364;&#2344;&#2366;</p><p>II. &#2361;&#2357;&#2366; &#2325;&#2366; &#2314;&#2346;&#2352; &#2313;&#2336;&#2344;&#2366;</p><p>III. &#2361;&#2357;&#2366; &#2325;&#2366; &#2344;&#2368;&#2330;&#2375; &#2325;&#2368; &#2323;&#2352; &#2327;&#2340;&#2367;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III</span><span class=\"hqt\" style=\"display:none\">II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Precipitation process is caused due to relative humidity of the air mass with the surroundings.</p><p>Addition of moisture or reduction of moisture-holding capacity of the air packet will cause rainfall.</p><p>Examples:</p><p>Addition through evaporation</p><p>Reduction through upliftment of the air</p><p>Moreover, downward movement of the air will increase the water holding capacity and hence it will not cause rainfall.</p><p>Sources: Fundamentals of Physical Geography Textbook for Class XI by NCERT</p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>Given below are the Assertion and Reason, choose the correct option regarding both the statements.</p><p>Assertion (A): When an object is thrown vertically upward, its velocity becomes zero at the highest point.</p><p>Reason (R): Acceleration due to gravity becomes zero at the highest point of the motion.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2314;&#2346;&#2352; &#2325;&#2368; &#2323;&#2352; &#2347;&#2375;&#2306;&#2325;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2330;&#2381;&#2330;&#2340;&#2350; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2313;&#2360;&#2325;&#2366; &#2357;&#2375;&#2327; &#2358;&#2370;&#2344;&#2381;&#2351; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2327;&#2340;&#2367; &#2325;&#2375; &#2313;&#2330;&#2381;&#2330;&#2340;&#2350; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2340;&#2381;&#2357;&#2352;&#2339; &#2358;&#2370;&#2344;&#2381;&#2351; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">A is true, but R is false.</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2340;&#2341;&#2366; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true.</span><span class=\"hqt\" style=\"display:none\">A &#2327;&#2354;&#2340; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Assertion (A) is true, but the Reason (R) is false. An object thrown upwards does momentarily stop at its peak, making its velocity zero. However, the acceleration due to gravity is a constant force that continues to act on the object throughout its flight, including at the highest point.</p><p>Explanation of Statements:</p><p>Assertion (A) is true. When an object is thrown vertically upward, it travels against the force of gravity. This gravitational force causes a constant downward acceleration, which decelerates the object. The object's upward velocity continuously decreases until it reaches its maximum height. At this precise instant, the object's instantaneous velocity is zero before it begins to accelerate downwards.</p><p>Reason (R) is false. The acceleration due to gravity (g) is caused by the Earth's gravitational pull. This force does not switch off or become zero just because the object has reached its highest point. In fact, it is the constant, unceasing downward acceleration of approximately 9.8 m/s that causes the object to stop rising and start falling back to Earth. If the acceleration were zero at the highest point, the object would stop moving and simply remain there, which is contrary to experience.</p><p>Further insights:</p><p>It is a common misconception to think that if velocity is zero, acceleration must also be zero. This question highlights the difference between the two.</p><p>Throughout the entire projectile motion (on the way up, at the peak, and on the way down), the acceleration of the object is constant and is equal to 'g' (approximately 9.8 m/s), directed downwards (assuming air resistance is negligible).</p><p>The highest point of the trajectory is simply the point where the velocity vector changes direction from upward to downward, passing through a value of zero.</p><p></p>",
    "question_index": 123
  },

    "question": "<span class=\"eqt\"><p>Consider the following conditions.</p><p>I. Low birth rate and low death rate.</p><p>II. Majority of population is urbanized, literate and has high technical know-how.</p><p>These conditions are related to which stage of demographic transition theory?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2344;&#2367;&#2350;&#2381;&#2344; &#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352;&#2404;</p><p>II. &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2358;&#2361;&#2352;&#2368;&#2325;&#2371;&#2340;, &#2360;&#2366;&#2325;&#2381;&#2359;&#2352; &#2324;&#2352; &#2313;&#2330;&#2381;&#2330; &#2340;&#2325;&#2344;&#2368;&#2325;&#2368; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2357;&#2366;&#2354;&#2368; &#2361;&#2376;&#2404;</p><p>&#2351;&#2375; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2332;&#2344;&#2360;&#2366;&#2306;&#2326;&#2381;&#2351;&#2367;&#2325;&#2368;&#2351; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2375; &#2325;&#2367;&#2360; &#2330;&#2352;&#2339; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I<sup>st</sup> stage</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2341;&#2350; &#2330;&#2352;&#2339;</span>",
      "<span class=\"eqt\">II<sup>nd </sup>stage</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2330;&#2352;&#2339;</span>",
      "<span class=\"eqt\">III<sup>rd</sup> stage</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2371;&#2340;&#2368;&#2351; &#2330;&#2352;&#2339;</span>",
      "<span class=\"eqt\">IV<sup>th</sup> stage</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2340;&#2369;&#2352;&#2381;&#2341; &#2330;&#2352;&#2339;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=610 height=461 id=\"Picture 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p6882/image008.png\" ></p><p><b>Fourth Stage is characterized with both fertility and mortality decline considerably. The population is either stable or grows slowly. The population becomes urbanised, literate and has high technical knowhow </b>and deliberately controls the family size. This shows that human beings are extremely flexible and are able to adjust their fertility.</p><p>Source: India people and economy NCERT and Our World in Data</p>",
    "question_index": 124
  },

    "question": "<span class=\"eqt\"><p>Which among the following statements is/are features of 'Town Planning of Harappan Civilisation'?</p><p>I. Regional variations in the layout of the towns.</p><p>II. Criss-cross pattern in roadbuilding</p><p>III. Uniformity in sizes of Houses.</p><p>Select the correct answer using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; '&#2361;&#2337;&#2364;&#2346;&#2381;&#2346;&#2366; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2325;&#2368; &#2344;&#2327;&#2352; &#2344;&#2367;&#2351;&#2379;&#2332;&#2344;' &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2358;&#2361;&#2352;&#2379;&#2306; &#2325;&#2375; &#2354;&#2375;&#2310;&#2313;&#2335; &#2350;&#2375;&#2306; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2368;&#2351; &#2357;&#2367;&#2357;&#2367;&#2343;&#2340;&#2366;&#2319;&#2305;&#2404;</p><p>II. &#2360;&#2337;&#2364;&#2325; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2377;&#2360;-&#2325;&#2381;&#2352;&#2377;&#2360; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344;&#2404;</p><p>III. &#2328;&#2352;&#2379;&#2306; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2350;&#2375;&#2306; &#2319;&#2325;&#2352;&#2370;&#2346;&#2340;&#2366;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most interesting urban feature of Harappan civilization is its town-planning. It is marked by <b>considerable uniformity</b>, though there are evidences of <b>some regional variations </b>as well. The uniformity is noticed in the layout of the towns, streets, structures, brick size, drains, etc. <b>So, the statement I is correct.</b></p><p>The residential buildings are built in the lower town. The streets intersect each other at right angles in a <b>criss-cross pattern</b>. A crisscross is a pattern of lines that cross or intersect each other. It divides the city in several residential blocks. <b>So, the statement II is correct.</b></p><p>The houses of common people <b>differed in size</b> from a single-room house in Harappa to bigger structures. The houses were largely built of burnt bricks. The bigger houses had many rooms surrounding a square courtyard. These houses were provided with private wells, kitchens and bathing platforms. The difference in the size of the houses suggests that the <b>rich lived in the larger</b> houses whereas the <b>one-room buildings or barracks</b> might have been intended for the poorer section of the society. So, the statement III is incorrect.</p><p></p>",
    "question_index": 125
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding gubernatorial appointments in July 2025:</p><p>I. Kavinder Gupta was appointed as the new Lieutenant Governor of Ladakh, replacing Brig. (retd.) B.D. Mishra.</p><p>II. Pusapati Ashok Gajapathi Raju succeeded P.S. Sreedharan Pillai as the new Governor of Goa.</p><p>III. Ashim Kumar Ghosh was appointed as the new Governor of Haryana, succeeding Bandaru Dattatreya.</p><p>Which of the above statement is/are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2369;&#2354;&#2366;&#2312; 2025 &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2348;&#2381;&#2352;&#2367;&#2327;&#2375;&#2337;&#2367;&#2351;&#2352; (&#2360;&#2375;&#2357;&#2366;&#2344;&#2367;&#2357;&#2371;&#2340;&#2381;&#2340;) &#2348;&#2368;.&#2337;&#2368;. &#2350;&#2367;&#2358;&#2381;&#2352;&#2366; &#2325;&#2368; &#2332;&#2327;&#2361; &#2325;&#2357;&#2367;&#2306;&#2342;&#2352; &#2327;&#2369;&#2346;&#2381;&#2340;&#2366; &#2325;&#2379; &#2354;&#2342;&#2381;&#2342;&#2366;&#2326; &#2325;&#2366; &#2344;&#2351;&#2366; &#2313;&#2346;&#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>II. &#2346;&#2369;&#2360;&#2366;&#2346;&#2340;&#2367; &#2309;&#2358;&#2379;&#2325; &#2327;&#2332;&#2346;&#2340;&#2367; &#2352;&#2366;&#2332;&#2370; &#2344;&#2375; &#2346;&#2368;.&#2319;&#2360;. &#2358;&#2381;&#2352;&#2368;&#2343;&#2352;&#2344; &#2346;&#2367;&#2354;&#2381;&#2354;&#2312; &#2325;&#2368; &#2332;&#2327;&#2361; &#2327;&#2379;&#2357;&#2366; &#2325;&#2375; &#2344;&#2319; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2349;&#2366;&#2352; &#2360;&#2306;&#2349;&#2366;&#2354;&#2366;&#2404;</p><p>III. &#2348;&#2306;&#2337;&#2366;&#2352;&#2370; &#2342;&#2340;&#2381;&#2340;&#2366;&#2340;&#2381;&#2352;&#2375;&#2351; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2358;&#2367;&#2350; &#2325;&#2369;&#2350;&#2366;&#2352; &#2328;&#2379;&#2359; &#2325;&#2379; &#2361;&#2352;&#2367;&#2351;&#2366;&#2339;&#2366; &#2325;&#2366; &#2344;&#2351;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">III Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">I and III Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Former Deputy Chief Minister of Jammu and Kashmir Kavinder Gupta was appointed Lieutenant Governor of Ladakh (July 14, 2025) replacing B.D Mishra, a communication by the President's Secretariat said.</p><p>Former Civil Aviation Minister Pusapati Ashok Gajapathi Raju was appointed new Governor of Goa and senior Bharatiya Janata Party (BJP) leader from West Bengal, Ashim Kumar Ghosh, was appointed new Governor of Haryana. Brig. Mishra (87) was appointed to the post on February 12, 2023 on removal of R.K Mathur, a retired bureaucrat.</p><p>Mr. Raju,a senior Telugu Desam Party (TDP) leader from Andhra Pradesh, will succeed P.S Sreedharan Pillai as the Goa Governor. Mr. Pillai was sworn in as the Governor of Goa on July 15, 2021. Mr. Raju (74) served as the Civil Aviation Minister between May 27, 2014 and March 10, 2018 under Prime Minister Narendra Modi. He has also held ministerial posts in the AP Government.</p><p>Mr. Gupta belongs to Jammu and he served as the Mayor of Jammu for three consecutive terms from 2005 to 2010. He is also the national executive member of the BJP. Mr. Ghosh, who headed the party's West Bengal unit between 1999 and 2002, will succeed Bandaru Dattatreya as Haryana Governor.</p><p>Former Labour and Employment Minister Mr. Dattatreya assumed charge as Governor of Haryana on July 15, 2021. In 1996, Mr. Ghosh became the State Secretary of the BJP and in 1998, he was appointed State Vice-President. From 1999 to 2002, he served as the State president of West Bengal BJP.</p><p>From 2003 to 2005, he held the responsibility of Tripura Observer.</p>",
    "question_index": 126
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following was the Governor General of India when Awadh was annexed by the British East India company by deposing Wajid Ali Shah ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352; &#2332;&#2344;&#2352;&#2354; &#2341;&#2366; &#2332;&#2348; &#2309;&#2357;&#2343; &#2325;&#2379; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2344;&#2375; &#2357;&#2366;&#2332;&#2367;&#2342; &#2309;&#2354;&#2368; &#2358;&#2366;&#2361; &#2325;&#2379; &#2361;&#2335;&#2366;&#2325;&#2352; &#2309;&#2346;&#2344;&#2375; &#2309;&#2343;&#2368;&#2344; &#2325;&#2352; &#2354;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lord Canning.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2376;&#2344;&#2367;&#2306;&#2327;.</span>",
      "<span class=\"eqt\">Lord North Brook</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2344;&#2377;&#2352;&#2381;&#2341; &#2348;&#2381;&#2352;&#2369;&#2325;</span>",
      "<span class=\"eqt\">Lord Lytton</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2354;&#2367;&#2335;&#2344;</span>",
      "<span class=\"eqt\">Lord Dalhousie.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2337;&#2354;&#2361;&#2380;&#2332;&#2368;.</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Lord Dalhousie annexed Awadh in 1856 after deposing Nawab Wajid Ali Shah on grounds of misgovernment.</p><p>Dalhousie annexed eight states during his eight-year tenure (1848-56) as governor-general.</p><p>In these eight years, he annexed some quarter million square miles of the territory of India. His reign almost completed the process of expansion of British power in India,</p><p>The most important of these were Satara (1848), Jhansi and Nagpur (1854). The other small states included Jaitpur (Bundelkhand), Sambalpur (Orissa), and Baghat (Madhya Pradesh).</p><p></p>",
    "question_index": 127
  },

    "question": "<span class=\"eqt\"><p>With reference to the Parliament of India, consider the following statements:</p><p>Statement 1: Article 79 states that there shall be a Parliament for the Union consisting of the President, the Rajya Sabha, and the Lok Sabha.</p><p>Statement 2: The Rajya Sabha is a permanent body and is not subject to dissolution.</p><p>Statement 3: One-third of the members of the Rajya Sabha retire every two years.</p><p>Which of the above statement(s) is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 79 &#2350;&#2375;&#2306; &#2325;&#2361;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; &#2360;&#2306;&#2328; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2360;&#2306;&#2360;&#2342; &#2361;&#2379;&#2327;&#2368; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;, &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2324;&#2352; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2306;&#2327;&#2375;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2319;&#2325; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2344;&#2367;&#2325;&#2366;&#2351; &#2361;&#2376; &#2324;&#2352; &#2357;&#2367;&#2328;&#2335;&#2344; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 3: &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2325;&#2375; &#2319;&#2325;-&#2340;&#2367;&#2361;&#2366;&#2312; &#2360;&#2342;&#2360;&#2381;&#2351; &#2361;&#2352; &#2342;&#2379; &#2360;&#2366;&#2354; &#2350;&#2375;&#2306; &#2360;&#2375;&#2357;&#2366;&#2344;&#2367;&#2357;&#2371;&#2340;&#2381;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only 1</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3</span><span class=\"hqt\" style=\"display:none\">2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3 are correct</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3 &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All three statements are correct. They accurately describe the composition and nature of the Indian Parliament as laid down in the Constitution.</p><p>Explanation of Statements:</p><p>Statement 1 is correct. Article 79 of the Constitution of India explicitly defines the composition of the Parliament. It clearly states that the Parliament for the Union shall consist of the President and two Houses, to be known respectively as the Council of States (Rajya Sabha) and the House of the People (Lok Sabha). This means the President is an integral part of the legislature, even though they are not a member of either House.</p><p>Statement 2 is correct. Article 83(1) of the Constitution states that the Council of States (Rajya Sabha) shall not be subject to dissolution. This makes it a permanent or continuing chamber. Unlike the Lok Sabha, which is dissolved at the end of its five-year term (or earlier), the Rajya Sabha is a permanent body.</p><p>Statement 3 is correct. While the Rajya Sabha itself is a permanent body, its members have a fixed tenure. Article 83(1) also specifies that as nearly as possible, one-third of the members of the Rajya Sabha shall retire upon the expiration of every second year in accordance with the provisions made in that behalf by Parliament by law. This ensures continuity. The term of an individual member of the Rajya Sabha is six years.</p><p>Further insights:</p><p>The President's role in Parliament is crucial. A bill passed by both Houses of Parliament cannot become an act without the President's assent. The President also has the power to summon and prorogue the Houses and to dissolve the Lok Sabha.</p><p>The staggered retirement system of the Rajya Sabha ensures that the house is never empty and that there is always a mix of experienced and new members. This design provides stability and continuity to the legislative process.</p>",
    "question_index": 128
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the below statement is/are correct?</p><p>Statement 1: Neutralization reactions occur between an acid and a base to produce salt and water.</p><p>Statement 2: The reaction between HCl and NaOH forming NaCl and H&#8322;O is an example of a combination reaction.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344; 1: &#2309;&#2350;&#2381;&#2354; &#2324;&#2352; &#2325;&#2381;&#2359;&#2366;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2313;&#2342;&#2366;&#2360;&#2368;&#2344;&#2368;&#2325;&#2352;&#2339; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2354;&#2357;&#2339; &#2324;&#2352; &#2332;&#2354; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 2: HCl &#2324;&#2352; NaOH &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; NaCl &#2324;&#2352; H&#8322;O &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;, &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2366; &#2319;&#2325; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only Statement 1 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 1 &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only Statement 2 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 2 &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both 1 and 2 are correct</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2 is correct</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2 &#2360;&#2361;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is a correct and fundamental definition of a neutralization reaction. Statement 2 is incorrect because the reaction described is a double displacement reaction, not a combination reaction. Therefore, only the first statement is correct.</p><p>Explanation of Statements:</p><p>Statement 1 is correct. This is the classic definition of an Arrhenius neutralization reaction. An acid (like HCl) reacts with a base (like NaOH) to neutralize each other's properties. The products of this type of reaction are a salt (formed from the cation of the base and the anion of the acid) and water.</p><p>Statement 2 is incorrect. The reaction HCl + NaOH &#8594; NaCl + H&#8322;O is not a combination reaction. A combination reaction is one where two or more reactants combine to form a single product (General form: A + B &#8594; C). The given reaction produces two products (NaCl and H&#8322;O). This reaction is correctly classified as a double displacement reaction (where ions are exchanged) and, more specifically, a neutralization reaction.</p><p>Further insights:</p><p>It's important to be able to distinguish between the main types of chemical reactions:</p><p>Combination: Two or more reactants form one product (e.g., 2Mg + O&#8322; &#8594; 2MgO).</p><p>Decomposition: One compound breaks down into two or more substances (e.g., CaCO&#8323; &#8594; CaO + CO&#8322;).</p><p>Single Displacement: One element replaces another in a compound (e.g., Zn + CuSO&#8324; &#8594; ZnSO&#8324; + Cu).</p><p>Double Displacement: Ions of two compounds exchange places to form two new compounds (e.g., AgNO&#8323; + NaCl &#8594; AgCl + NaNO&#8323;). Neutralization is a specific type of this reaction.</p><p></p>",
    "question_index": 129
  },

    "question": "<span class=\"eqt\"><p>Identify the incorrect statement.</p><p>I.HTTP is principally a push protocol.</p><p>II.SMTP is primarily a pull protocol.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2354;&#2340; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. HTTP &#2350;&#2369;&#2326;&#2381;&#2351;&#2340;&#2307; &#2319;&#2325; &#2346;&#2369;&#2358; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2361;&#2376;&#2404;</p><p>II. SMTP &#2350;&#2369;&#2326;&#2381;&#2351;&#2340;&#2307; &#2319;&#2325; &#2346;&#2369;&#2354; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>HTTP (Hypertext Transfer Protocol):</p><p>Pull Protocol: In HTTP, the client (your web browser) initiates the connection to the server. It requests specific resources (like web pages, images, or videos) from the server. The server then sends the requested data back to the client.</p><p></p><p>SMTP (Simple Mail Transfer Protocol):</p><p>Push Protocol: In SMTP, the sending mail server initiates the connection to the receiving mail server. It sends the email message to the receiving server for delivery to the recipient's mailbox.</p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is the correct categorization of volatile semiconductor memory based on the data retention capability?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2337;&#2375;&#2335;&#2366; &#2352;&#2367;&#2335;&#2375;&#2306;&#2358;&#2344; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2357;&#2379;&#2354;&#2375;&#2335;&#2366;&#2311;&#2354; &#2360;&#2375;&#2350;&#2368;&#2325;&#2306;&#2337;&#2325;&#2381;&#2335;&#2352; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2366; &#2319;&#2325; &#2360;&#2361;&#2368; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">DRAM and ROM</span><span class=\"hqt\" style=\"display:none\">DRAM &#2324;&#2352; ROM</span>",
      "<span class=\"eqt\">SRAM and DRAM</span><span class=\"hqt\" style=\"display:none\">SRAM &#2324;&#2352; DRAM</span>",
      "<span class=\"eqt\">RAM and ROM</span><span class=\"hqt\" style=\"display:none\">RAM &#2324;&#2352; ROM</span>",
      "<span class=\"eqt\">SRAM and ROM</span><span class=\"hqt\" style=\"display:none\">SRAM &#2324;&#2352; ROM</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>SRAM</b> (Static Random-Access Memory) and <b>DRAM</b> (Dynamic Random-Access Memory) are both volatile types of semiconductor memory. Volatile memory means that the data stored in these types of memory is temporary and is lost when the power to the memory is turned off.</p><p>In contrast, ROM (Read-Only Memory) is a non-volatile semiconductor memory, meaning the data stored in it is retained even when the power is turned off.</p>",
    "question_index": 131
  },

    "question": "<span class=\"eqt\"><p>Which of the following function in Excel allows one to select and return a value from a list of options based on a specified index number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2347;&#2364;&#2306;&#2325;&#2381;&#2358;&#2344; &#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2352;&#2381;&#2342;&#2367;&#2359;&#2381;&#2335; &#2311;&#2306;&#2337;&#2375;&#2325;&#2381;&#2360; &#2344;&#2306;&#2348;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2325;&#2368; &#2360;&#2370;&#2330;&#2368; &#2360;&#2375; &#2350;&#2366;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2313;&#2360;&#2375; &#2357;&#2366;&#2346;&#2360; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">CHOOSE</span><span class=\"hqt\" style=\"display:none\">CHOOSE</span>",
      "<span class=\"eqt\">FIND</span><span class=\"hqt\" style=\"display:none\">FIND</span>",
      "<span class=\"eqt\">MATCH</span><span class=\"hqt\" style=\"display:none\">MATCH</span>",
      "<span class=\"eqt\">LOOKUP</span><span class=\"hqt\" style=\"display:none\">LOOKUP</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The CHOOSE function in Excel is a versatile tool that allows you to select and return a value from a list of options based on a specified index number.</p><p>The index_num must be a number between 1 and 254.</p><p>If the index_num is less than 1 or greater than the number of values in the list, the CHOOSE function will return the #VALUE! error.</p><p>Syntax: CHOOSE(index_num, value1, [value2], ...)</p><p>Example:</p><p>Let's say you have a list of fruits in cells A1 to A3:</p><p>A1: Apple</p><p>A2: Banana</p><p>A3: Orange</p><p>If you use the following formula in cell B1:</p><p>=CHOOSE(2, A1, A2, A3)</p><p>The formula will return \"Banana\" because 2 is the index_num, and \"Banana\" is the second value in the list.</p><p></p>",
    "question_index": 132
  },

    ],
    "correct_option_id": 0,
    "solution": "<p>When the system restarts or when the Reset button is pressed, we call it Warm Booting or Soft Booting.</p><p>The system does not start from the initial state and so all diagnostic tests need not be carried out in this case. There are chances of data loss and system damage as the data might not have been stored properly.</p><p>&bull; Cold Booting: When the system starts from the initial state i.e. it is switched on, we call it cold booting or Hard Booting.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following is connected to the data lines of the system bus and contains the value to be stored in memory or the last value read from the memory?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2348;&#2360; &#2325;&#2368; &#2337;&#2375;&#2335;&#2366; &#2354;&#2366;&#2311;&#2344;&#2379;&#2306; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2350;&#2375;&#2306; &#2360;&#2381;&#2335;&#2379;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2357;&#2376;&#2354;&#2381;&#2351;&#2370; &#2351;&#2366; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2360;&#2375; &#2352;&#2368;&#2337; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2309;&#2306;&#2340;&#2367;&#2350; &#2357;&#2376;&#2354;&#2381;&#2351;&#2370; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Memory address register</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Program counter</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2366;&#2313;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Memory buffer register</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2348;&#2347;&#2352; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Instruction register</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2360;&#2381;&#2335;&#2381;&#2352;&#2325;&#2381;&#2358;&#2344; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><u>Registers involved in each Instruction Cycle</u>:</p><p>&#183; Memory address registers (MAR): It is connected to the address lines of the system bus. It specifies the address in memory for a read or write operation.</p><p>&#183; <b>Memory Buffer Register</b> (MBR): It is connected to the data lines of the system bus. It contains the value to be stored in memory or the last value read from the memory.</p><p>&#183; Program Counter (PC): Holds the address of the next instruction to be fetched.</p><p>&#183; Instruction Register (IR): Holds the last instruction fetched.</p>",
    "question_index": 136
  },
  {
    "question": "<span class=\"eqt\"><p>Ethernet cables are used for which of the following purpose?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2312;&#2341;&#2352;&#2344;&#2375;&#2335; &#2325;&#2375;&#2348;&#2354; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To provide memory storage</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">To provide internet connection</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2325;&#2344;&#2375;&#2325;&#2381;&#2358;&#2344; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">To provide stable function</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2375;&#2348;&#2354; &#2347;&#2306;&#2325;&#2381;&#2358;&#2344; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">To provide protection for computer</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2379; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Ethernet cables are used to provide an internet connection, </b>connect devices to a local network. They plug into Ethernet ports on a variety of devices. The most common use for an Ethernet cable is connecting a WiFi router or modem to the internet entry port or telephone line. </p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is contained at the end of the file name and helps to determine the type of file?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2347;&#2364;&#2366;&#2311;&#2354; &#2344;&#2366;&#2350; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2347;&#2364;&#2366;&#2311;&#2354; &#2325;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">File property</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2366;&#2311;&#2354; &#2346;&#2381;&#2352;&#2377;&#2346;&#2352;&#2381;&#2335;&#2368;</span>",
      "<span class=\"eqt\">File vocation</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2366;&#2311;&#2354; &#2357;&#2379;&#2325;&#2375;&#2358;&#2344;</span>",
      "<span class=\"eqt\">File extrusion</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2366;&#2311;&#2354; &#2319;&#2325;&#2381;&#2360;&#2335;&#2381;&#2352;&#2370;&#2358;&#2344;</span>",
      "<span class=\"eqt\">File extension</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2366;&#2311;&#2354; &#2319;&#2325;&#2381;&#2360;&#2335;&#2375;&#2306;&#2358;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A filename extension is an identifier specified as a suffix to the name of a computer file. The extension indicates a characteristic of the file contents or its intended use. A file extension is typically delimited from the filename with a full stop (period)</p><p>Some file systems implement filename extensions as a feature of the file system itself, and may limit the length and format of the extension, while others treat filename extensions as part of the filename without special distinction.</p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>Which layer of OSI model defines the transmission rate?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>OSI &#2350;&#2377;&#2337;&#2354; &#2325;&#2368; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2354;&#2375;&#2351;&#2352; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2350;&#2367;&#2358;&#2344; &#2342;&#2352; &#2325;&#2379; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Physical layer</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2367;&#2332;&#2367;&#2325;&#2354; &#2354;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Presentation layer</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2375;&#2332;&#2375;&#2306;&#2335;&#2375;&#2358;&#2344; &#2354;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Transport layer</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2346;&#2379;&#2352;&#2381;&#2335; &#2354;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Network layer</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2354;&#2375;&#2351;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>OSI stands for Open Systems Interconnection. It was developed by ISO - 'International Organization of Standardization', in 1984. It is a 7 layer architecture (&#8203;&#8203;Physical, Data Link, Network, Transport, Session, Presentation, and Application.)with each layer having specific functionality to perform. All these 7 layers work collaboratively to transmit the data from one person to another across the globe.</p><p>One of the functions of the physical layer is the bit rate control.</p><p>Bit rate control: The Physical layer also defines the transmission rate i.e. the number of bits sent per second.</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>In MS Word, a number, figure, symbol, or indicator that is smaller than the normal line of type and is set slightly below it is called ____________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2357;&#2352;&#2381;&#2337; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2310;&#2306;&#2325;&#2337;&#2364;&#2366;, &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2351;&#2366; &#2360;&#2370;&#2330;&#2325; &#2332;&#2379; &#2335;&#2366;&#2311;&#2346; &#2325;&#2368; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2341;&#2379;&#2337;&#2364;&#2366; &#2344;&#2368;&#2330;&#2375; &#2360;&#2375;&#2335; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2313;&#2360;&#2375; ____________ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Subscript</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2348;&#2360;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Superscript</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2346;&#2352;&#2360;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Smallscript</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2350;&#2377;&#2354;&#2360;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Lowerscript</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2309;&#2352;&#2360;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A superscript or subscript is a number, figure, symbol, or indicator that is smaller than the normal line of type and is set slightly above it (superscript) or <b>below it (subscript).</b> When you add a trademark, copyright, or other symbol to your presentation, you might want the symbol to appear slightly above the rest of your text. If you're creating a footnote, you might also want to do this with a number.</p><p><img width=296 height=106 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18631/image003.jpg\" ></p><p>Source: Microsoft</p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>In MS Office 365, the Table of Contents box can be found under which of the following tabs?</p></span><span class=\"hqt\" style=\"display:none\"><p>MS &#2321;&#2347;&#2367;&#2360; 365 &#2350;&#2375;&#2306;, &#2325;&#2306;&#2335;&#2375;&#2306;&#2335; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2368; &#2340;&#2366;&#2354;&#2367;&#2325;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2335;&#2376;&#2348; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2346;&#2366;&#2312; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">View</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2351;&#2370;</span>",
      "<span class=\"eqt\">References</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2347;&#2375;&#2352;&#2375;&#2306;&#2360;</span>",
      "<span class=\"eqt\">Design</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2332;&#2364;&#2366;&#2311;&#2344;</span>",
      "<span class=\"eqt\">Layout</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2375;&#2310;&#2313;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er241230ckst2.png\" ></p><p>The Table of Contents box in MS Office 365 can be found under the References tab. A table of contents in Word is based on the headings in your document.</p><p></p><p></p>",
