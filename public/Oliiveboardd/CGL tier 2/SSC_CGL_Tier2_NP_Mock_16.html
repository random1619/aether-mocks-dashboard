    "question": "<span class=\"eqt\"><p>Consider the following regarding the Cabinet Mission Plan (1946): </p><p>I. It rejected the demand for a full-fledged Pakistan. </p><p>II. It proposed a weak center with powers limited to Foreign Affairs, Defence, and Communications. </p><p>Which of the statements given above is/are correct? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2376;&#2348;&#2367;&#2344;&#2375;&#2335; &#2350;&#2367;&#2358;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; (1946) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2311;&#2360;&#2344;&#2375; &#2346;&#2370;&#2352;&#2381;&#2339; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2346;&#2366;&#2325;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344; &#2325;&#2368; &#2350;&#2366;&#2306;&#2327; &#2325;&#2379; &#2309;&#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>II. &#2311;&#2360;&#2344;&#2375; &#2357;&#2367;&#2342;&#2375;&#2358; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306;, &#2352;&#2325;&#2381;&#2359;&#2366; &#2324;&#2352; &#2360;&#2306;&#2330;&#2366;&#2352; &#2340;&#2325; &#2360;&#2368;&#2350;&#2367;&#2340; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2325;&#2350;&#2332;&#2379;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2352;&#2326;&#2366;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>I. is Correct.</b> The Cabinet Mission (Pethick-Lawrence, Stafford Cripps, A.V. Alexander) rejected the Muslim League's demand for a separate, sovereign Pakistan, arguing it would not solve the communal problem.</p><p>&#183; <b>II. is Correct.</b> It proposed a three-tier structure with a weak federal center having jurisdiction only over Defence, Foreign Affairs, and Communications, leaving all other subjects and residuary powers to the provinces.</p>",

    "question": "<span class=\"eqt\"><p>According to the Sample Registration System (SRS) Report 2021, India's Maternal Mortality Ratio (MMR) in 2019 - 21 was:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2376;&#2306;&#2346;&#2354; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2381;&#2352;&#2375;&#2358;&#2344; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; (&#2319;&#2360;&#2310;&#2352;&#2319;&#2360;) &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335; 2021 &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; 2019-21 &#2350;&#2375;&#2306; &#2350;&#2366;&#2340;&#2371; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352; (&#2319;&#2350;&#2319;&#2350;&#2310;&#2352;) &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2341;&#2368;:</p></span>",
    "options": [
      "<span class=\"eqt\">130 per lakh live births</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367; &#2354;&#2366;&#2326; &#2332;&#2368;&#2357;&#2367;&#2340; &#2332;&#2344;&#2381;&#2350;&#2379;&#2306; &#2346;&#2352; 130</span>",
      "<span class=\"eqt\">113 per lakh live births</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367; &#2354;&#2366;&#2326; &#2332;&#2368;&#2357;&#2367;&#2340; &#2332;&#2344;&#2381;&#2350;&#2379;&#2306; &#2346;&#2352; 113</span>",
      "<span class=\"eqt\">93 per lakh live births</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367; &#2354;&#2366;&#2326; &#2332;&#2368;&#2357;&#2367;&#2340; &#2332;&#2344;&#2381;&#2350;&#2379;&#2306; &#2346;&#2352; 93</span>",
      "<span class=\"eqt\">37 per lakh live births</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367; &#2354;&#2366;&#2326; &#2332;&#2368;&#2357;&#2367;&#2340; &#2332;&#2344;&#2381;&#2350;&#2379;&#2306; &#2346;&#2352; 37</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; India has witnessed a steady downward trend in maternal and child mortality towards the achievement of Sustainable Development Goal 2030 targets, as per the Sample Registration System Report 2021 released by the Registrar General of India, on 07th May, 2025. </p><p>&#183; As per the Special Bulletin on Maternal Mortality in India, 2019-21 based on the Sample Registration System, the Maternal Mortality Ratio of the country has shown a marked reduction, declining by 37 points from 130 per lakh live births in 2014-16 to <b>93 in 2019-21.</b></p><p>&#183; Similarly, as per the Sample Registration System Statistical Report 2021, the downward trend of child mortality indicators continued.</p><p>&#183; The Infant Mortality Rate of the country has declined from 39 per 1000 live births in 2014 to 27 per 1000 live births in 2021. </p><p>&#183; Neonatal Mortality Rate (NMR) has declined from 26 per 1000 live births in 2014 to 19 per 1000 live births in 2021. </p><p>&#183; Under-Five Mortality Rate (U5MR) has declined from 45 per 1000 live births in 2014 to 31 per 1000 live births in 2021. </p><p>&#183; The Sex Ratio at Birth improves from 899 in 2014 to 913 in 2021. Total Fertility Rate is consistent at 2.0 in 2021, which is a significant improvement from 2.3 in 2014.</p>",
    "question_index": 120
  },

    "question": "<span class=\"eqt\"><p>Given below are two statements marked as Assertion and Reason. Choose the correct option. </p><p>Assertion (A): The Gandhi-Irwin Pact led to the suspension of the Civil Disobedience Movement. </p><p>Reason (R): The Congress agreed to participate in the Second Round Table Conference. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2325;&#2341;&#2344; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404; </p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2327;&#2366;&#2306;&#2343;&#2368;-&#2311;&#2352;&#2357;&#2367;&#2344; &#2360;&#2350;&#2333;&#2380;&#2340;&#2375; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2360;&#2357;&#2367;&#2344;&#2351; &#2309;&#2357;&#2332;&#2381;&#2334;&#2366; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2360;&#2381;&#2341;&#2327;&#2367;&#2340; &#2361;&#2379; &#2327;&#2351;&#2366;&#2404; </p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2327;&#2379;&#2354;&#2350;&#2375;&#2332; &#2360;&#2350;&#2381;&#2350;&#2375;&#2354;&#2344; &#2350;&#2375;&#2306; &#2349;&#2366;&#2327; &#2354;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2361;&#2350;&#2340; &#2361;&#2369;&#2312;&#2404; </p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true and R is the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true but R is NOT the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true but R is false.</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false but R is true.</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Assertion (A) is true:</b> The Gandhi-Irwin Pact (also known as the Delhi Pact), signed on March 5, 1931, between Mahatma Gandhi and Lord Irwin, officially led to the Congress agreeing to discontinue the Civil Disobedience Movement.</p><p>&#183; <b>Reason (R) is true:</b> One of the primary conditions of the pact was that the Indian National Congress would end its boycott and participate in the <b>Second Round Table Conference</b> in London to discuss constitutional reforms.</p>",
    "question_index": 121
  },
  {
    "question": "<span class=\"eqt\"><p>In the context of ISRO's Chandrayaan-3 mission, what were the names of the Lander and the Rover respectively? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2312;&#2319;&#2360;&#2310;&#2352;&#2323; &#2325;&#2375; &#2330;&#2306;&#2342;&#2381;&#2352;&#2351;&#2366;&#2344;-3 &#2350;&#2367;&#2358;&#2344; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2354;&#2376;&#2306;&#2337;&#2352; &#2324;&#2352; &#2352;&#2379;&#2357;&#2352; &#2325;&#2375; &#2344;&#2366;&#2350; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2325;&#2381;&#2351;&#2366; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Vikram and Pragyan</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2350; &#2324;&#2352; &#2346;&#2381;&#2352;&#2332;&#2381;&#2334;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Akash and Vijay</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2325;&#2366;&#2358; &#2324;&#2352; &#2357;&#2367;&#2332;&#2351;</span>",
      "<span class=\"eqt\">Dhruv and Kiran</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2352;&#2369;&#2357; &#2324;&#2352; &#2325;&#2367;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Pushpak and Aditya</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2359;&#2381;&#2346;&#2325; &#2324;&#2352; &#2310;&#2342;&#2367;&#2340;&#2381;&#2351;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The Lander was named <b>Vikram</b> (after Dr. Vikram Sarabhai) and the Rover was named <b>Pragyan</b> (meaning wisdom in Sanskrit). </p><p>&#183; On August 23, 2023, Chandrayaan-3 successfully touched down near the lunar south pole, making India the fourth country to achieve a soft landing on the Moon after the USA, former USSR, and China, and the first country to land near the lunar south pole.</p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Amendment of the Constitution: </p><p>I. An amendment bill can be introduced in either House of Parliament or State Legislatures. </p><p>II. The President must give his assent to a Constitutional Amendment Bill and cannot return it for reconsideration. </p><p>III. Amendments to the federal provisions of the Constitution require ratification by all the States in India. </p><p>Which of the statements given above is/are correct? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;: </p><p>I. &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2360;&#2342;&#2344; &#2351;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; </p><p>II. &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2346;&#2352; &#2309;&#2346;&#2344;&#2368; &#2360;&#2361;&#2350;&#2340;&#2367; &#2342;&#2375;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368; &#2324;&#2352; &#2357;&#2375; &#2311;&#2360;&#2375; &#2346;&#2369;&#2344;&#2352;&#2381;&#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2366;&#2346;&#2360; &#2344;&#2361;&#2368;&#2306; &#2349;&#2375;&#2332; &#2360;&#2325;&#2340;&#2375;&#2404; </p><p>III. &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2360;&#2306;&#2328;&#2368;&#2351; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2349;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2344;&#2369;&#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;&#2404; </p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;? </p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Statement II is correct. </b></p><p><b>Statements I and III are incorrect because amendment bills cannot be introduced in State Legislatures, and federal amendments require ratification by only half of the States.</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>I. is Incorrect.</b> Under Article 368, an amendment can be initiated only by the introduction of a bill in either House of Parliament, not in the State Legislatures.</p><p>&#183; <b>II. is Correct.</b> After the 24th Amendment Act of 1971, it is mandatory for the President to give his assent to a Constitutional Amendment Bill. He cannot withhold assent or return the bill for reconsideration.</p><p>&#183; <b>III. is Incorrect.</b> Amendments to federal provisions require ratification by the legislatures of <b>half</b> of the states by a simple majority, not all the states.</p>",
    "question_index": 123
  },
  {
    "question": "<span class=\"eqt\"><p>Which vitamin is also known as \"Calciferol\" and is synthesized in the skin when exposed to sunlight? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; \"&#2325;&#2376;&#2354;&#2381;&#2360;&#2368;&#2347;&#2375;&#2352;&#2379;&#2354;\" &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2332;&#2379; &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2368; &#2352;&#2379;&#2358;&#2344;&#2368; &#2325;&#2375; &#2360;&#2306;&#2346;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2310;&#2344;&#2375; &#2346;&#2352; &#2340;&#2381;&#2357;&#2330;&#2366; &#2350;&#2375;&#2306; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Vitamin A</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2319;</span>",
      "<span class=\"eqt\">Vitamin C</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2360;&#2368;</span>",
      "<span class=\"eqt\">Vitamin D</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2337;&#2368;</span>",
      "<span class=\"eqt\">Vitamin K</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2325;&#2375;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Vitamin D</b> (Calciferol) is a fat-soluble vitamin. It is unique because the body can synthesize it in the skin when triggered by UV-B radiation from sunlight. It is essential for calcium absorption and bone health.</p>",
    "question_index": 124
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements correctly describes friction?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2328;&#2352;&#2381;&#2359;&#2339; &#2325;&#2366; &#2360;&#2361;&#2368; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Friction always increases the speed of a moving object</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2352;&#2381;&#2359;&#2339; &#2360;&#2375; &#2327;&#2340;&#2367;&#2350;&#2366;&#2344; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2368; &#2327;&#2340;&#2367; &#2361;&#2350;&#2375;&#2358;&#2366; &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Friction acts only when objects are in motion</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2352;&#2381;&#2359;&#2339; &#2340;&#2349;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2305; &#2327;&#2340;&#2367; &#2350;&#2375;&#2306; &#2361;&#2379;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Friction opposes the relative motion or tendency of motion between surfaces in contact</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2352;&#2381;&#2359;&#2339;, &#2360;&#2306;&#2346;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2340;&#2361;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2366;&#2346;&#2375;&#2325;&#2381;&#2359; &#2327;&#2340;&#2367; &#2351;&#2366; &#2327;&#2340;&#2367; &#2325;&#2368; &#2346;&#2381;&#2352;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2325;&#2366; &#2357;&#2367;&#2352;&#2379;&#2343; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Friction is independent of the nature of surfaces in contact</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2352;&#2381;&#2359;&#2339; &#2360;&#2306;&#2346;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2340;&#2361;&#2379;&#2306; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367; &#2360;&#2375; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Friction is a force that <b>opposes the relative motion or the tendency of motion between two surfaces in contact.</b> </p><p>&#183; It depends on the nature of the surfaces and can act even when an object is at rest (static friction).</p>",
    "question_index": 125
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an example of an \"Ex-situ\" conservation method? </p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; \"&#2319;&#2325;&#2381;&#2360;-&#2360;&#2368;&#2335;&#2370;\" &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2357;&#2367;&#2343;&#2367; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">National Park</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2342;&#2381;&#2351;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Biosphere Reserve</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2357;&#2350;&#2306;&#2337;&#2354; &#2352;&#2367;&#2332;&#2364;&#2352;&#2381;&#2357;</span>",
      "<span class=\"eqt\">Wildlife Sanctuary</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2344;&#2381;&#2351;&#2332;&#2368;&#2357; &#2309;&#2349;&#2351;&#2366;&#2352;&#2339;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Seed Bank</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;&#2332; &#2348;&#2376;&#2306;&#2325;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; <b>In-situ</b> conservation involves protecting species in their natural habitat (National Parks, Sanctuaries, Biosphere Reserves).</p><p>&#183; <b>Ex-situ</b> conservation involves protecting species outside their natural habitats, such as in <b>Seed Banks</b>, Botanical Gardens, or Zoos.</p>",
    "question_index": 126
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a fundamental duty as per Article 51A of the Indian Constitution? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 51&#2319; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To safeguard public property and to abjure violence.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2368; &#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2361;&#2367;&#2306;&#2360;&#2366; &#2325;&#2366; &#2340;&#2381;&#2351;&#2366;&#2327; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To protect and improve the natural environment.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339; &#2325;&#2368; &#2352;&#2325;&#2381;&#2359;&#2366; &#2324;&#2352; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319;&#2404;</span>",
      "<span class=\"eqt\">To cast vote in elections to promote democracy.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2325;&#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2330;&#2369;&#2344;&#2366;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306; &#2350;&#2340;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To defend the country and render national service when called upon to do so.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2375;&#2358; &#2325;&#2368; &#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2310;&#2361;&#2381;&#2357;&#2366;&#2344; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2360;&#2375;&#2357;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Option (c) is the correct answer because casting a vote is a legal/constitutional right, but it is not listed as a Fundamental Duty under Article 51A.</b></p><p><b>Explanation of Options:</b></p><p>&#183; <b>(a), (b), and (d) </b>are explicitly listed under the 11 Fundamental Duties in Part IV-A of the Constitution.</p><p>&#183; <b>(c) is Incorrect.</b> While \"voting\" is a vital part of a democracy, the Swaran Singh Committee's recommendation to include the \"duty to pay taxes\" and the \"duty to vote\" was not accepted when the duties were added via the 42nd Amendment.</p>",
    "question_index": 127
  },
  {
    "question": "<span class=\"eqt\"><p>The \"SWAAMITVA\" scheme launched by the Ministry of Panchayati Raj is primarily concerned with: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2306;&#2330;&#2366;&#2351;&#2340;&#2368; &#2352;&#2366;&#2332; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; \"&#2360;&#2381;&#2357;&#2366;&#2350;&#2367;&#2340;&#2381;&#2357;\" &#2351;&#2379;&#2332;&#2344;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Providing solar pumps to farmers.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2380;&#2352; &#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2375; &#2330;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2306;&#2346; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2325;&#2352;&#2366;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Property validation and issuing \"Property Cards\" in rural areas using drone technology.</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2381;&#2352;&#2379;&#2344; &#2340;&#2325;&#2344;&#2368;&#2325; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2366; &#2360;&#2340;&#2381;&#2351;&#2366;&#2346;&#2344; &#2324;&#2352; \"&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2366;&#2352;&#2381;&#2337;\" &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Financial assistance to women self-help groups.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2367;&#2354;&#2366; &#2360;&#2381;&#2357;&#2351;&#2306; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2325;&#2379; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Electrification of every household in remote villages.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2370;&#2352;&#2360;&#2381;&#2341; &#2327;&#2366;&#2306;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306; &#2361;&#2352; &#2328;&#2352; &#2325;&#2366; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340;&#2368;&#2325;&#2352;&#2339;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>SWAAMITVA</b> (Survey of Villages and Mapping with Improvised Technology in Village Areas) uses drones to map land parcels in rural inhabited (Abadi) areas.</p><p>&#183; This allows villagers to use their <b>property</b> as a financial asset for taking loans and reduces property disputes.</p>",
    "question_index": 128
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Attorney General for India: </p><p>I. The Attorney General has the right of audience in all courts in the territory of India. </p><p>II. The Attorney General is a full-time counsel for the Government and falls in the category of a government servant. </p><p>Which of the statements given above is/are correct? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2309;&#2335;&#2377;&#2352;&#2381;&#2344;&#2368; &#2332;&#2344;&#2352;&#2354; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;: </p><p>I. &#2309;&#2335;&#2377;&#2352;&#2381;&#2344;&#2368; &#2332;&#2344;&#2352;&#2354; &#2325;&#2379; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2349;&#2368; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2369;&#2344;&#2357;&#2366;&#2312; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2361;&#2376;&#2404; </p><p>II. &#2309;&#2335;&#2377;&#2352;&#2381;&#2344;&#2368; &#2332;&#2344;&#2352;&#2354; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2339;&#2325;&#2366;&#2354;&#2367;&#2325; &#2357;&#2325;&#2368;&#2354; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2368; &#2325;&#2368; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2350;&#2375;&#2306; &#2310;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; </p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;? </p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2350;&#2376;&#2306; &#2324;&#2352; &#2344; &#2361;&#2368; &#2342;&#2370;&#2360;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I is correct. </b></p><p><b>Statement II is incorrect because the Attorney General (AG) is not a full-time counsel for the Government nor is he classified as a government servant.</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>I. is Correct.</b> Under Article 76 of the Constitution, the AG has the right of audience in all courts within the territory of India while performing his official duties.</p><p>&#183; <b>II. is Incorrect.</b> The AG does not fall into the category of a government servant. He is not debarred from private legal practice, provided he does not advise or appear against the Government of India.</p><p><b>Further Insights:</b></p><p>&#183; The AG is appointed by the President and holds office during the pleasure of the President.</p><p>&#183; The AG has the right to speak and take part in the proceedings of both Houses of Parliament (and their committees) but does not have the right to vote.</p>",
    "question_index": 129
  },
  {
    "question": "<span class=\"eqt\"><p>Which port is primarily associated with wired network connectivity?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2351;&#2352;&#2381;&#2337; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2325;&#2344;&#2375;&#2325;&#2381;&#2335;&#2367;&#2357;&#2367;&#2335;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2379;&#2352;&#2381;&#2335; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">HDMI</span><span class=\"hqt\" style=\"display:none\">HDMI</span>",
      "<span class=\"eqt\">VGA</span><span class=\"hqt\" style=\"display:none\">VGA</span>",
      "<span class=\"eqt\">RJ-45</span><span class=\"hqt\" style=\"display:none\">RJ-45</span>",
      "<span class=\"eqt\">PS/2</span><span class=\"hqt\" style=\"display:none\">PS/2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>The RJ-45 port is the standard interface for wired Ethernet networking.</b> </p><p><b>Explanation of Options:</b></p><p>&#183; <b> HDMI:</b> Used for transmitting high-definition digital video and audio.</p><p>&#183; <b>VGA:</b> An older analog port used solely for video output to monitors.</p><p>&#183; <b>RJ-45:</b> This port accepts an Ethernet cable to connect a computer to a local area network (LAN) or a router.</p><p>&#183; <b>PS/2:</b> A legacy port used for connecting older keyboards and mice.</p><p><b>Further Insights:</b></p><p>&#183; RJ-45 stands for \"Registered Jack 45.\" It looks like a telephone jack (RJ-11) but is slightly wider with eight pins instead of four or six.</p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding backup practices:</p><p>1) Incremental backup saves only changes since last backup.</p><p>2) Full backup requires less storage than incremental backup.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2376;&#2325;&#2309;&#2346; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2311;&#2306;&#2325;&#2381;&#2352;&#2368;&#2350;&#2375;&#2306;&#2335;&#2354; &#2348;&#2376;&#2325;&#2309;&#2346; &#2325;&#2375;&#2357;&#2354; &#2346;&#2367;&#2331;&#2354;&#2375; &#2348;&#2376;&#2325;&#2309;&#2346; &#2325;&#2375; &#2348;&#2366;&#2342; &#2360;&#2375; &#2361;&#2369;&#2319; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2361;&#2375;&#2332;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2347;&#2369;&#2354; &#2348;&#2376;&#2325;&#2309;&#2346; &#2325;&#2379; &#2311;&#2306;&#2325;&#2381;&#2352;&#2368;&#2350;&#2375;&#2306;&#2335;&#2354; &#2348;&#2376;&#2325;&#2309;&#2346; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2325;&#2350; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement 1 is correct. </b></p><p><b>Statement 2 is incorrect because a Full backup contains all the data, making it much larger than an incremental backup.</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct.</b> An <b>Incremental backup</b> identifies only the files that have been modified or created since the last backup (of any type) and saves only those changes, saving time and space.</p><p>&#183; <b>2. is Incorrect.</b> A <b>Full backup</b> creates a complete copy of all selected data. Consequently, it requires the most storage space and the longest time to complete compared to incremental or differential methods.</p><p><b>Further Insights:</b></p><p>&#183; While incremental backups are faster to create, they take longer to <b>restore</b> because you need the last full backup plus every single incremental update in the chain.</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about primary memory:</p><p>1) Primary memory is directly accessible by the CPU.</p><p>2) Primary memory retains data even when power is off.</p><p>3) RAM is an example of primary memory.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; CPU &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2368;&#2343;&#2375; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2325;&#2368; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2348;&#2367;&#2332;&#2354;&#2368; &#2348;&#2306;&#2342; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2349;&#2368; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2352;&#2326;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3) RAM &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2366; &#2319;&#2325; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">All</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements 1 and 3 are correct. </b></p><p><b>Statement 2 is incorrect because RAM (the most common primary memory) is volatile and loses its data when power is lost.</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct.</b> Primary memory is located close to the CPU on the motherboard, allowing the processor to access it directly and rapidly via the data bus.</p><p>&#183; <b>2. is Incorrect.</b> Most primary memory, specifically <b>RAM</b>, is volatile. It requires a constant electrical charge to maintain the data stored within it. Permanent storage is the role of secondary memory (like SSDs).</p><p>&#183; <b>3. is Correct.</b> RAM (Random Access Memory) is the quintessential example of primary memory used to store data currently being used by active programs.</p><p><b>Further Insights:</b></p><p>&#183; ROM (Read Only Memory) is also a type of primary memory, but unlike RAM, it is non-volatile and holds boot-up instructions.</p>",
    "question_index": 132
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1) POP3 downloads emails to the local system.</p><p>2) IMAP deletes emails from server after download.</p><p>Which are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) POP3 &#2312;&#2350;&#2375;&#2354; &#2325;&#2379; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2346;&#2352; &#2337;&#2366;&#2313;&#2344;&#2354;&#2379;&#2337; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) IMAP &#2337;&#2366;&#2313;&#2344;&#2354;&#2379;&#2337; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2360;&#2352;&#2381;&#2357;&#2352; &#2360;&#2375; &#2312;&#2350;&#2375;&#2354; &#2361;&#2335;&#2366; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement 1 is correct. </b></p><p><b>Statement 2 is incorrect because IMAP is designed to keep emails on the server so they can be synced across multiple devices.</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct. POP3</b> (Post Office Protocol) downloads the email to your device and, by default, removes it from the server.</p><p>&#183; <b>2. is Incorrect. IMAP</b> (Internet Message Access Protocol) leaves the email on the server. If you read an email on your phone, it appears as \"read\" on your laptop because both are viewing the same server-side data.</p>",
    "question_index": 133
  },
  {
    "question": "<span class=\"eqt\"><p>Which protocol ensures reliable data transmission over the Internet?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2346;&#2352; &#2357;&#2367;&#2358;&#2381;&#2357;&#2360;&#2344;&#2368;&#2351; &#2337;&#2375;&#2335;&#2366; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2350;&#2367;&#2358;&#2344; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">UDP</span><span class=\"hqt\" style=\"display:none\">UDP</span>",
      "<span class=\"eqt\">IP</span><span class=\"hqt\" style=\"display:none\">IP</span>",
      "<span class=\"eqt\">TCP</span><span class=\"hqt\" style=\"display:none\">TCP</span>",
      "<span class=\"eqt\">HTTP</span><span class=\"hqt\" style=\"display:none\">HTTP</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>TCP (Transmission Control Protocol) is designed specifically to ensure that data is delivered reliably and in the correct order.</b> </p><p><b>Explanation of Options:</b></p><p>&#183; <b>UDP:</b> Faster but \"unreliable\"; it sends data without checking if it was received (common in video streaming).</p><p>&#183; <b>IP:</b> Responsible for addressing and routing packets but does not guarantee their delivery.</p><p>&#183; <b>TCP:</b> It uses a \"three-way handshake\" and acknowledgments to ensure every packet reaches its destination without errors.</p><p>&#183; <b>HTTP:</b> An application-layer protocol for web traffic, which actually sits on top of TCP.</p><p><b>Further Insights:</b></p><p>&#183; If a packet is lost, TCP automatically requests a retransmission, making it essential for web browsing and emails.</p>",
    "question_index": 134
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1) Bridges reduce network traffic by filtering data.</p><p>2) Bridges operate at the physical layer of OSI model.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2348;&#2381;&#2352;&#2367;&#2332; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2347;&#2364;&#2367;&#2354;&#2381;&#2335;&#2352; &#2325;&#2352;&#2325;&#2375; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2335;&#2381;&#2352;&#2376;&#2347;&#2364;&#2367;&#2325; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2348;&#2381;&#2352;&#2367;&#2332; OSI &#2350;&#2377;&#2337;&#2354; &#2325;&#2368; &#2349;&#2380;&#2340;&#2367;&#2325; &#2346;&#2352;&#2340; &#2346;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement 1 is correct. </b></p><p><b>Statement 2 is incorrect because bridges operate at the Data Link Layer (Layer 2) of the OSI model.</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct.</b> A bridge connects two different network segments and filters traffic by reading the MAC addresses. It ensures that a message intended for a local user stays within that segment, reducing overall congestion.</p><p>&#183; <b>2. is Incorrect.</b> Bridges deal with physical addresses (MAC addresses), which places them in the <b>Data Link Layer</b>. The Physical Layer (Layer 1) only deals with raw bitstreams and hardware like hubs or repeaters.</p>",
    "question_index": 135
  },
  {
    "question": "<span class=\"eqt\"><p>Uploading data refers to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2337;&#2375;&#2335;&#2366; &#2309;&#2346;&#2354;&#2379;&#2337; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2340;&#2366;&#2340;&#2381;&#2346;&#2352;&#2381;&#2351; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Copying data to a USB drive</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2319;&#2360;&#2348;&#2368; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357; &#2346;&#2352; &#2337;&#2375;&#2335;&#2366; &#2325;&#2377;&#2346;&#2368; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Transferring data from Internet to local system</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2360;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2350;&#2375;&#2306; &#2337;&#2375;&#2335;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Sending data from local system to server</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2360;&#2375; &#2360;&#2352;&#2381;&#2357;&#2352; &#2346;&#2352; &#2337;&#2375;&#2335;&#2366; &#2349;&#2375;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Encrypting data</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Uploading refers to the process of sending data from a local device to a remote server.</b> </p><p><b>Explanation of Options:</b></p><p>&#183; <b>(a):</b> This is simply a local file transfer or \"copying.\"</p><p>&#183; <b>(b):</b> This is defined as <b>Downloading</b>.</p><p>&#183; <b>(c):</b> This is <b>Uploading</b> (e.g., posting a photo to social media).</p><p>&#183; <b>(d):</b> This is a security or compression process, not a transfer direction.</p>",
    "question_index": 136
  },
  {
    "question": "<span class=\"eqt\"><p>Which feature allows Windows to allocate CPU time among multiple tasks?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2325;&#2368; &#2325;&#2380;&#2344; &#2360;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2313;&#2360;&#2375; &#2319;&#2325;&#2366;&#2343;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2360;&#2350;&#2351; &#2310;&#2357;&#2306;&#2335;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Paging</span><span class=\"hqt\" style=\"display:none\">Paging</span>",
      "<span class=\"eqt\">Scheduling</span><span class=\"hqt\" style=\"display:none\">Scheduling</span>",
      "<span class=\"eqt\">Spooling</span><span class=\"hqt\" style=\"display:none\">Spooling</span>",
      "<span class=\"eqt\">Buffering</span><span class=\"hqt\" style=\"display:none\">Buffering</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>The Operating System uses Scheduling to decide which task gets the CPU's attention and for how long.</b> </p><p><b>Explanation of Options:</b></p><p>&#183; <b>Paging:</b> A memory management scheme.</p><p>&#183; <b>Scheduling:</b> The process by which the OS manages the execution of multiple processes, ensuring that the CPU is utilized efficiently.</p><p>&#183; <b>Spooling:</b> Used primarily for managing printer queues.</p><p>&#183; <b>Buffering:</b> Storing data temporarily while it is being moved from one place to another.</p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about cookies:</p><p>1) Cookies store user preferences on websites.</p><p>2) Cookies can be used for session tracking.</p><p>3) Cookies can directly damage hardware.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335;&#2379;&#2306; &#2346;&#2352; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2360;&#2340;&#2381;&#2352; &#2335;&#2381;&#2352;&#2376;&#2325;&#2367;&#2306;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352; &#2325;&#2379; &#2360;&#2368;&#2343;&#2375; &#2344;&#2369;&#2325;&#2360;&#2366;&#2344; &#2346;&#2361;&#2369;&#2306;&#2330;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">All</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements 1 and 2 are correct. </b></p><p><b>Statement 3 is incorrect because cookies are simple text files and do not have the capability to execute code or damage hardware.</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct.</b> Cookies store small pieces of data like your preferred language or theme for a specific website.</p><p>&#183; <b>2. is Correct.</b> They allow websites to remember you are logged in as you navigate from one page to another (session management).</p><p>&#183; <b>3. is Incorrect.</b> Cookies are non-executable text data. They cannot contain viruses, run programs, or physically affect the computer's components.</p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>Which tool is commonly used to encrypt data during online transactions?</p></span><span class=\"hqt\" style=\"display:none\">&#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2367;&#2360; &#2335;&#2370;&#2354; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">SSL/TLS</span><span class=\"hqt\" style=\"display:none\">SSL/TLS</span>",
      "<span class=\"eqt\">FTP</span><span class=\"hqt\" style=\"display:none\">FTP</span>",
      "<span class=\"eqt\">SMTP</span><span class=\"hqt\" style=\"display:none\">SMTP</span>",
      "<span class=\"eqt\">DNS</span><span class=\"hqt\" style=\"display:none\">DNS</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>SSL/TLS is the standard technology for establishing an encrypted link between a web server and a browser.</b> </p><p><b>Explanation of Options:</b></p><p>&#183; <b>SSL/TLS:</b> This ensures that all data passed between the web server and browsers remains private (indicated by the \"HTTPS\" and the padlock icon).</p><p>&#183; <b>FTP:</b> Used for file transfers, often unencrypted.</p><p>&#183; <b>SMTP:</b> Used for sending emails.</p><p>&#183; <b>DNS:</b> Translates domain names to IP addresses; standard DNS is not encrypted.</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1) OS acts as an interface between user and hardware.</p><p>2) OS is responsible for virus removal.</p><p>Which are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2324;&#2352; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2311;&#2306;&#2335;&#2352;&#2347;&#2364;&#2375;&#2360; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2357;&#2366;&#2351;&#2352;&#2360; &#2361;&#2335;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 and 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement 1 is correct. </b></p><p><b>Statement 2 is incorrect because virus removal is the function of specialized utility software called Antivirus.</b></p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct.</b> The OS provides a Graphical User Interface (GUI) or Command Line Interface (CLI) that allows users to communicate with the complex electronic hardware of the computer.</p><p>&#183; <b>2. is Incorrect.</b> While modern operating systems (like Windows) may include built-in security tools, \"virus removal\" is technically a function of <b>security software</b>, not a core requirement of the operating system itself.</p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding file search in Windows Explorer:</p><p>1) File search can be refined using file size filters.</p><p>2) Search results always include hidden files by default.</p><p>3) Search indexing improves search speed.</p><p>Which are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2319;&#2325;&#2381;&#2360;&#2346;&#2381;&#2354;&#2379;&#2352;&#2352; &#2350;&#2375;&#2306; &#2347;&#2364;&#2366;&#2311;&#2354; &#2326;&#2379;&#2332; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2347;&#2364;&#2366;&#2311;&#2354; &#2310;&#2325;&#2366;&#2352; &#2347;&#2364;&#2367;&#2354;&#2381;&#2335;&#2352; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2347;&#2364;&#2366;&#2311;&#2354; &#2326;&#2379;&#2332; &#2325;&#2379; &#2346;&#2352;&#2367;&#2359;&#2381;&#2325;&#2371;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2326;&#2379;&#2332; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2379;&#2306; &#2350;&#2375;&#2306; &#2337;&#2367;&#2347;&#2364;&#2377;&#2354;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2361;&#2350;&#2375;&#2358;&#2366; &#2331;&#2367;&#2346;&#2368; &#2361;&#2369;&#2312; &#2347;&#2364;&#2366;&#2311;&#2354;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>3) &#2326;&#2379;&#2332; &#2309;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2339; &#2360;&#2375; &#2326;&#2379;&#2332; &#2325;&#2368; &#2327;&#2340;&#2367; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">All</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements 1 and 3 are correct. </b></p><p><b>Statement 2 is incorrect because Windows Explorer excludes hidden files from search results by default to protect system stability.</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct.</b> Users can refine searches by typing specific syntax like size:large or size:&gt;100MB to find specific files.</p><p>&#183; <b>2. is Incorrect.</b> By default, hidden files and system files are not shown in search results. To include them, users must manually change the \"Folder Options\" to \"Show hidden files, folders, and drives.\"</p><p>&#183; <b>3. is Correct. Indexing</b> creates a catalog of files and their properties. When you search, Windows looks at the index instead of scanning the whole drive, making the process much faster.</p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the basic organization of a computer system:</p><p>1) Control Unit interprets program instructions and directs operations.</p><p>2) Arithmetic operations are primarily handled by the Memory Unit.</p><p>3) Output Unit presents processed data in human-readable form.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2368; &#2348;&#2369;&#2344;&#2367;&#2351;&#2366;&#2342;&#2368; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2325;&#2306;&#2335;&#2381;&#2352;&#2379;&#2354; &#2351;&#2370;&#2344;&#2367;&#2335; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2379; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2309;&#2306;&#2325;&#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2306; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2351;&#2370;&#2344;&#2367;&#2335; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>3) &#2310;&#2313;&#2335;&#2346;&#2369;&#2335; &#2351;&#2370;&#2344;&#2367;&#2335; &#2360;&#2306;&#2360;&#2366;&#2343;&#2367;&#2340; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2350;&#2366;&#2344;&#2357;-&#2346;&#2336;&#2344;&#2368;&#2351; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements 1 and 3 are correct. </b></p><p><b>Statement 2 is incorrect because arithmetic operations are performed by the Arithmetic Logic Unit (ALU), not the Memory Unit.</b></p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct.</b> The Control Unit (CU) acts as the \"manager\" of the CPU. It fetches instructions from memory, decodes them to understand what needs to be done, and sends signals to other units to execute them.</p><p>&#183; <b>2. is Incorrect.</b> The Memory Unit is responsible for storing data and instructions. All mathematical calculations (addition, subtraction) and logical comparisons are carried out by the <b>Arithmetic Logic Unit (ALU)</b>.</p><p>&#183; <b>3. is Correct.</b> The Output Unit (comprising devices like monitors and printers) takes the binary results processed by the CPU and converts them into a form that humans can understand, such as text, images, or sound.</p><p><b>Further Insights:</b></p><p>&#183; The CU and ALU together are often referred to as the Central Processing Unit (CPU).</p><p>&#183; The speed at which the CU manages these operations is determined by the system clock.</p>",
    "question_index": 142
  },
  {

    "options": [

      "<span class=\"eqt\">Saving passwords in browser</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2364;&#2352; &#2350;&#2375;&#2306; &#2346;&#2366;&#2360;&#2357;&#2352;&#2381;&#2337; &#2360;&#2361;&#2375;&#2332;&#2344;&#2366;</span>"

    "solution": "<p><b>Enabling transaction alerts is a critical proactive security measure for online banking.</b> </p><p><b>Explanation of Options:</b></p><p>&#183; <b>(a) Public Wi-Fi:</b> Unsafe as hackers can intercept data on open networks.</p><p>&#183; <b>(b) Reusing passwords:</b> Dangerous; if one account is compromised, all are at risk.</p><p>&#183; <b>(c) Transaction alerts:</b> Provides immediate notification of any movement in your account, allowing you to report unauthorized activity instantly.</p><p>&#183; <b>(d) Saving passwords:</b> Not recommended on shared computers as others can access your sensitive accounts.</p>",

      "<span class=\"eqt\">CONCAT</span><span class=\"hqt\" style=\"display:none\">CONCAT</span>",
      "<span class=\"eqt\">FORMAT</span><span class=\"hqt\" style=\"display:none\">FORMAT</span>"

    "correct_option_id": 1,
    "solution": "<p><b>The TEXT function is used to convert a number to text while applying a specific format.</b> </p><p><b>Explanation of Functions:</b></p><p>&#183; <b>VALUE:</b> Converts a text string that represents a number into an actual number.</p><p>&#183; <b>TEXT:</b> Allows you to take a number (like 0.5) and display it as text in a specific format (like \"50%\").</p><p>&#183; <b>CONCAT:</b> Joins two or more strings together.</p><p>&#183; <b>FORMAT:</b> This is not a standard function in Excel (it is used in VBA or other languages).</p><p><b>Further Insights:</b></p><p>&#183; Example: =TEXT(TODAY(), \"DDDD\") will return the current day of the week as a text string (e.g., \"Monday\").</p>",

    "question": "<span class=\"eqt\"><p>Which memory is used to bridge the speed gap between CPU and RAM?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2324;&#2352; &#2352;&#2376;&#2350; &#2325;&#2375; &#2348;&#2368;&#2330; &#2327;&#2340;&#2367; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352; &#2325;&#2379; &#2346;&#2366;&#2335;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cache</span><span class=\"hqt\" style=\"display:none\">Cache</span>",
      "<span class=\"eqt\">ROM</span><span class=\"hqt\" style=\"display:none\">ROM</span>",
      "<span class=\"eqt\">Hard Disk</span><span class=\"hqt\" style=\"display:none\">Hard Disk</span>",
      "<span class=\"eqt\">Flash memory</span><span class=\"hqt\" style=\"display:none\">Flash memory</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Cache memory is used to bridge the speed gap between the high-speed CPU and the relatively slower RAM.</b> </p><p><b>Explanation of Options:</b></p><p>&#183; <b>Cache:</b> This is extremely fast, expensive memory built into or very near the CPU. It stores frequently used data so the CPU doesn't have to wait for the slower RAM.</p><p>&#183; <b>ROM:</b> Used for permanent firmware storage, not for speed optimization during processing.</p><p>&#183; <b>Hard Disk:</b> This is secondary storage and is significantly slower than both RAM and Cache.</p><p>&#183; <b>Flash memory:</b> Used in USB drives and SSDs; while faster than hard disks, it is not used to bridge the CPU-RAM speed gap.</p><p><b>Further Insights:</b></p><p>&#183; Cache is organized into levels: <b>L1</b> (fastest/smallest), <b>L2</b>, and <b>L3</b> (largest/slowest cache level).</p>",
    "question_index": 145
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about spyware:</p><p>1) Spyware secretly monitors user activity.</p><p>2) Spyware is mainly used to improve system performance.</p><p>3) Spyware can collect personal information.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2346;&#2366;&#2311;&#2357;&#2375;&#2351;&#2352; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2360;&#2381;&#2346;&#2366;&#2311;&#2357;&#2375;&#2351;&#2352; &#2327;&#2369;&#2346;&#2381;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367; &#2346;&#2352; &#2344;&#2332;&#2364;&#2352; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2360;&#2381;&#2346;&#2366;&#2311;&#2357;&#2375;&#2351;&#2352; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2375; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2379; &#2348;&#2375;&#2361;&#2340;&#2352; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2360;&#2381;&#2346;&#2366;&#2311;&#2357;&#2375;&#2351;&#2352; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2319;&#2325;&#2340;&#2381;&#2352; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding CPU clock speed:</p><p>1) Higher clock speed generally allows more instructions per second.</p><p>2) Clock speed alone determines overall computer performance.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2325;&#2381;&#2354;&#2377;&#2325; &#2360;&#2381;&#2346;&#2368;&#2337; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2313;&#2330;&#2381;&#2330; &#2325;&#2381;&#2354;&#2377;&#2325; &#2360;&#2381;&#2346;&#2368;&#2337; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367; &#2360;&#2375;&#2325;&#2306;&#2337; &#2309;&#2343;&#2367;&#2325; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2325;&#2381;&#2354;&#2377;&#2325; &#2360;&#2381;&#2346;&#2368;&#2337; &#2361;&#2368; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2375; &#2360;&#2350;&#2327;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2379; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement 1 is correct. </b></p><p><b>Statement 2 is incorrect because overall performance is influenced by several factors, including the number of cores, cache size, and IPC (Instructions Per Cycle).</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct.</b> Clock speed, measured in Gigahertz (GHz), refers to how many cycles a CPU can execute per second. Generally, a higher clock speed means the processor can fetch and execute instructions faster.</p><p>&#183; <b>2. is Incorrect.</b> Performance is not a one-dimensional metric. A CPU with a lower clock speed but a better <b>architecture</b> (more instructions executed per cycle) or more <b>cores</b> (allowing multitasking) can outperform a high-clock-speed processor with inefficient design.</p><p><b>Further Insights:</b></p><p>&#183; Modern CPUs use \"Turbo Boost\" technology to temporarily increase clock speed when running demanding applications.</p><p>&#183; Thermal throttling can lower clock speed if the CPU gets too hot, which degrades performance.</p>",
    "question_index": 149
  }
