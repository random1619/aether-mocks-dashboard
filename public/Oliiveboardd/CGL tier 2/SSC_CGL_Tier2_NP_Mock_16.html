  {
    "question": "<span class=\"eqt\"><p>Read the data carefully and answer the following questions. The line graph shows the rainfall in Patna and Mumbai from Monday to Friday.</p><p><img width=576 height=336 id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p29144/image007.png\"></p><p>What is the total rainfall of Patna and Mumbai together from Monday to Friday?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2306;&#2325;&#2337;&#2364;&#2379;&#2306; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404; &#2352;&#2375;&#2326;&#2366; &#2327;&#2381;&#2352;&#2366;&#2347; &#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2360;&#2375; &#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352; &#2340;&#2325; &#2346;&#2335;&#2344;&#2366; &#2324;&#2352; &#2350;&#2369;&#2306;&#2348;&#2312; &#2350;&#2375;&#2306; &#2361;&#2369;&#2312; &#2357;&#2352;&#2381;&#2359;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=576 height=336 id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p29144/image007.png\"></p><p>&#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2360;&#2375; &#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352; &#2340;&#2325; &#2346;&#2335;&#2344;&#2366; &#2324;&#2352; &#2350;&#2369;&#2306;&#2348;&#2312; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366; &#2361;&#2369;&#2312;?</p></span>",

  {
    "question": "<span class=\"eqt\"><p>A can do a work in 72 days and B and C together can do the same work in 35(5/9) days. If A and C together can do the same work in 720/19 days, then find the ratio of efficiencies of A, B and C respectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2319;&#2325; &#2325;&#2366;&#2350; &#2325;&#2379; 72 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2319;&#2325; &#2360;&#2366;&#2341; B &#2324;&#2352; C &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2350; &#2325;&#2379; 35(5/9) &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2366;&#2341; A &#2324;&#2352; C &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 720/19 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; A, B &#2324;&#2352; C &#2325;&#2368; &#2342;&#2325;&#2381;&#2359;&#2340;&#2366;&#2323;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",

    "solution": "<p>A = 72 days</p><p>(1/A) + (1/C) = 19/720</p><p>(1/72) + (1/C) = 19/720</p><p>C = 80 days</p><p>Then, (1/B) + (1/C) = 9/320</p><p>(1/B) + (1/80) = 9/320</p><p>B = 64 days</p><p>Then, efficiency ratio, A: B: C = (1/72): (1/64): (1/80)</p><p>= <b>40: 45: 36</b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The number of 50 paise coins is 3 times that of &#8377;1 coins, and the number of &#8377;2 coins is half the number of &#8377;1 coins. If the total value is &#8377;217, then find the number of &#8377;1 coins.</p></span><span class=\"hqt\" style=\"display:none\">50 &#2346;&#2376;&#2360;&#2375; &#2325;&#2375; &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 1 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;, &#2324;&#2352; 2 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 1 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2368; &#2310;&#2343;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2369;&#2354; &#2350;&#2370;&#2354;&#2381;&#2351; 217 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; 1 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">62</span><span class=\"hqt\" style=\"display:none\">62</span>",
      "<span class=\"eqt\">65</span><span class=\"hqt\" style=\"display:none\">65</span>",
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">43</span><span class=\"hqt\" style=\"display:none\">43</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the number of Rs. 1coins be x</p><p>Number of 50 paise coins = 3x</p><p>Number of Rs. 2 coins = x/2</p><p>According to question,</p><p>x * 1 + 3x * 0.5 + x/2 * 2 = 217</p><p>x + 3x/2 + x = 217</p><p>7x/2 = 217</p><p>x = 62 </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If sinA + sin<sup>2</sup>A = 1, then cos<sup>2</sup>A + cos<sup>4</sup>A = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; sinA + sin<sup>2</sup>A = 1 &#2361;&#2376;, &#2340;&#2379; cos<sup>2</sup>A + cos<sup>4</sup>A = ?</p></span>",
    "options": [
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>"

    "correct_option_id": 1,
    "solution": "<p>sinA=1-sin<sup>2</sup> A = cos<sup>2</sup> A</p> <p>sin<sup>2</sup> A = cos<sup>4</sup> A</p> <p>Now, cos<sup>2</sup> A+ cos<sup>4</sup> A </p> <p>= cos<sup>2</sup> A + sin<sup>2</sup> A</p> <p>=1</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>During a weekend audit, Meera resized a rectangular hoarding. If its length was increased by 50%, breadth was reduced by 20% and the renovated area is 6480 m<sup>2</sup>, then what was the original area?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2346;&#2381;&#2340;&#2366;&#2361;&#2366;&#2306;&#2340; &#2321;&#2337;&#2367;&#2335; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2350;&#2368;&#2352;&#2366; &#2344;&#2375; &#2319;&#2325; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2361;&#2379;&#2352;&#2381;&#2337;&#2367;&#2306;&#2327; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2348;&#2342;&#2354;&#2366;&#2404; &#2351;&#2342;&#2367; &#2311;&#2360;&#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 50% &#2348;&#2338;&#2364;&#2366; &#2342;&#2368; &#2327;&#2312;, &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; 20% &#2328;&#2335;&#2366; &#2342;&#2368; &#2327;&#2312; &#2324;&#2352; &#2344;&#2357;&#2368;&#2344;&#2368;&#2325;&#2371;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 6480 &#2357;&#2352;&#2381;&#2327; &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2350;&#2370;&#2354; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">5600 m<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">5600 &#2357;&#2352;&#2381;&#2327; &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">5200 m<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">5200 &#2357;&#2352;&#2381;&#2327; &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">5400 m<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">5400 &#2357;&#2352;&#2381;&#2327; &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">6000 m<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">6000 &#2357;&#2352;&#2381;&#2327; &#2350;&#2368;&#2335;&#2352;</span>"

    "correct_option_id": 2,
    "solution": "<p>New area = 150%  X  80%  X  original area</p><p>Original area = 2/3 * 5/4 * 6480 = 5400 m<sup>2</sup></p>",
    "question_index": 4

  {
    "question": "<span class=\"eqt\"><p>Kunal marked an antique piece above its cost price and on selling it at 10% discount on marked price, he earned a profit of 17%. What is the markup percentage?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2369;&#2339;&#2366;&#2354; &#2344;&#2375; &#2319;&#2325; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; (&#2319;&#2306;&#2335;&#2368;&#2325;) &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351; &#2313;&#2360;&#2325;&#2375; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2309;&#2306;&#2325;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2340;&#2341;&#2366; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 10% &#2331;&#2370;&#2335; &#2346;&#2352; &#2348;&#2375;&#2330;&#2344;&#2375; &#2346;&#2352; &#2313;&#2360;&#2375; 17% &#2325;&#2366; &#2354;&#2366;&#2349; &#2361;&#2369;&#2310;&#2404; &#2350;&#2370;&#2354;&#2381;&#2351;&#2357;&#2352;&#2381;&#2342;&#2381;&#2343;&#2344; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">30%</span><span class=\"hqt\" style=\"display:none\">30%</span>",
      "<span class=\"eqt\">40%</span><span class=\"hqt\" style=\"display:none\">40%</span>",
      "<span class=\"eqt\">20%</span><span class=\"hqt\" style=\"display:none\">20%</span>",
      "<span class=\"eqt\">50%</span><span class=\"hqt\" style=\"display:none\">50%</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let C.P. of the antique piece = Rs. 100X and marked price = Rs. Y</p><p>So, selling price = 100X * 117/100 = Rs. 117X</p><p>=&gt; Y * 90/100 = 117X</p><p>=&gt; Y = 117X * 100/90 = Rs. 130X</p><p>Hence, marked up percentage = (130X  -  100X)/100X * 100 = 30%</p><p>Therefore, Required percent is 30% above C.P.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If A and B are two events such that P(A) = 0.81, P (B) = 0.72, and P (A &#1352; B) = 0.3, then find P (B but not A).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A &#2324;&#2352; B &#2342;&#2379; &#2328;&#2335;&#2344;&#2366;&#2319;&#2305; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306; &#2325;&#2367; P(A) = 0.81, P (B) = 0.72 &#2340;&#2341;&#2366; P (A &#1352; B) = 0.3 &#2361;&#2376;, &#2340;&#2379; P (B &#2346;&#2352;&#2344;&#2381;&#2340;&#2369; A &#2344;&#2361;&#2368;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">0.42</span><span class=\"hqt\" style=\"display:none\">0.42</span>",
      "<span class=\"eqt\">0.51</span><span class=\"hqt\" style=\"display:none\">0.51</span>",
      "<span class=\"eqt\">0.55</span><span class=\"hqt\" style=\"display:none\">0.55</span>",
      "<span class=\"eqt\">0.41</span><span class=\"hqt\" style=\"display:none\">0.41</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>P(A) = 0.81, P (B) = 0.72, and P (A &#1352; B) = 0.3</p><p>P (B but not A) = P (B &#1352; <img width=21 height=24 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25981/image005.png\"></p><p>= P (B)  -  P (B &#1352; A)</p><p>= 0.72  -  0.30</p><p>= 0.42</p>",
    "question_index": 6

    "question": "<span class=\"eqt\"><p>Triangle XYZ is inscribed inside a circle and there is a point W on the arc YZ opposite to X such that YW=ZW. If &ang;XYW = 72&deg and &ang;YXZ = 68&deg;, then find the measure of &ang;YZX.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; XYZ &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2361;&#2376; &#2324;&#2352; &#2330;&#2366;&#2346; YZ &#2346;&#2352; X &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; W &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376; &#2325;&#2367; YW=ZW &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736;XYW = 72&deg; &#2324;&#2352; &#8736;YXZ = 68&deg; &#2361;&#2376;, &#2340;&#2379; &#8736;YZX &#2325;&#2366; &#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "solution": "<p><img width=121 height=117 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19643/image010.jpg\"></p><p>Since opposite angles in a cyclic quadrilateral are supplementary.</p><p>&ang;YXZ+ &ang;YWZ = 180&deg;</p><p>&ang;YWZ= 180&deg;  -  68&deg; = 112&deg;</p><p>&ang;XYW+ &ang;XZW = 180&deg;</p><p>&ang;XZW = 180&deg; - 72&deg; = 108&deg;</p><p>In Triangle YWZ:</p><p>&ang;YZW = &ang;ZYW [YW = ZW]</p><p>&ang;YZW + &ang;ZYW + &ang;YWZ = 180&deg;</p><p>&ang;YZW = (180&deg; - 112&deg;)/2 = 34&deg;</p><p>&ang;YZX = 108&deg;  -  34&deg; = 74&deg;</p>",

    "question": "<span class=\"eqt\"><p>The selling price of an article is Rs.7040 and the actual profit earned is 28 percent. Calculate the profit as a percent of selling price. (To the nearest whole number)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; 7040 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376; &#2324;&#2352; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2354;&#2366;&#2349; 28 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;&#2404; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2366;&#2349; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; (&#2344;&#2367;&#2325;&#2335;&#2340;&#2350; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2340;&#2325;)</p></span>",

    "question": "<span class=\"eqt\"><p>Efficiencies of A and B are in the ratio 3: 5 respectively. Time taken by A and B together to complete a work is 'N' days. When B start work alone and left after 10 days, the remaining work is completed by A alone in 23<sup>1</sup>&frasl;<sub>3</sub> days. What is the value of 'N'?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366;&#2319;&#2305; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3:5 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; A &#2324;&#2352; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; 'N' &#2342;&#2367;&#2344; &#2361;&#2376;&#2404; &#2332;&#2348; B &#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 10 &#2342;&#2367;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342; &#2325;&#2366;&#2352;&#2381;&#2351; &#2331;&#2379;&#2337;&#2364; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359; &#2325;&#2366;&#2352;&#2381;&#2351; A &#2309;&#2325;&#2375;&#2354;&#2375; 23(1/3) &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; 'N' &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Efficiency ratio, A: B = 3: 5</p><p>Then, time ratio, A: B = 5: 3</p><p>Now, A = 5B/3</p><p>10 days' work done by B alone = 10/B</p><p>Remaining work = 1  -  10/B = (B  -  10)/B</p><p>Now, ((B  -  10)/B) * A = 70/3</p><p>((B  -  10)/B) * (5B/3) = 70/3</p><p>B = 24 days</p><p>And, A = 24 * 5/3 = 40 days</p><p>Therefore, 1/N = (1/24) + (1/40)</p><p><b>N = 15</b></p>",
    "question_index": 15
  },

    "question": "<span class=\"eqt\"><p>There are 280 litres of pure milk in a container. One-fifth of the milk is replaced by water in the container. Again one-fifth of the mixture is extracted and an equal amount of water is added. What is the ratio of milk to water in the new mixture?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2366;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; 280 &#2354;&#2368;&#2335;&#2352; &#2358;&#2369;&#2342;&#2381;&#2343; &#2342;&#2370;&#2343; &#2361;&#2376;&#2404; &#2346;&#2366;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2325;&#2366; &#2319;&#2325;-&#2346;&#2366;&#2306;&#2330;&#2357;&#2366;&#2306; &#2349;&#2366;&#2327; &#2346;&#2366;&#2344;&#2368; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2347;&#2367;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2366; &#2319;&#2325;-&#2346;&#2366;&#2306;&#2330;&#2357;&#2366;&#2306; &#2349;&#2366;&#2327; &#2344;&#2367;&#2325;&#2366;&#2354; &#2354;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2340;&#2344;&#2368; &#2361;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2350;&#2367;&#2354;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2319; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",

    "question": "<span class=\"eqt\"><p>A rectangle represents a set of calculations that are common across all the given equations. Identify the calculations involved and solve the fourth equation on the same basis:</p><p><img width=127 height=100 id=\"Picture 24\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24237/image002.jpg\"></p><p><img width=308 height=83 id=\"Picture 22\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24237/image003.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2351;&#2340; &#2327;&#2339;&#2344;&#2366;&#2323;&#2306; &#2325;&#2375; &#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2349;&#2368; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2404; &#2311;&#2360;&#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2327;&#2339;&#2344;&#2366;&#2323;&#2306; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2360;&#2350;&#2366;&#2344; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2330;&#2380;&#2341;&#2375; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2361;&#2354; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><p><img width=\"127\" height=\"100\" id=\"Picture 24\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24237/image002.jpg\"></p><p><img width=\"308\" height=\"83\" id=\"Picture 22\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24237/image003.jpg\"></p></span>",

    "solution": "<p><b>Formula given in (I)</b></p><p>If a = 9 and b = 11</p><p>Then, (9+11)/9*11 = 20/99</p><p>If a = 3 and b = 8</p><p>Then, (3+8)/3*8 = 11/24</p><p>If a = 5 and b = 13</p><p>Then, (5+13)/5*13 = 18/65</p><p>Here, the answers are not satisfied. So, option (a) is incorrect. </p><p><b>Formula given in (II)</b></p><p>If a = 9 and b = 11</p><p>Then, (9*11  -  11)/(9+11) = 88/20 = 22/5</p><p>If a = 3 and b = 8</p><p>Then, (3*8  -  8)/(3+8) = 16/11</p><p>If a = 5 and b = 13</p><p>Then, (5*13  -  13)/(5+13) = 52/18 = 26/9</p><p>Here, the answers are not satisfied. So, option (b) is incorrect. </p><p><b>Formula given in (III)</b></p><p>If a = 9 and b = 11</p><p>Then, (9+11)/(11-9) = 20/ 2 = 10</p><p>If a = 3 and b = 8</p><p>Then, (3+8)/(8-3) = 11/5</p><p>If a = 5 and b = 13</p><p>Then, (5+13)/(13-5) = 18/8 = 9/4</p><p>Here, the answers are satisfied. So, option (c) is correct. </p><p><b>Formula given in (IV)</b></p><p>If a = 9 and b = 11</p><p>Then, (9<sup>2</sup>  -  11)/(9+11) = 70/20 = 7/2</p><p>If a = 3 and b = 8</p><p>Then, (3<sup>2 </sup> -  8)/(3+8) = 1/11</p><p>If a = 5 and b = 13</p><p>Then, (5<sup>2 </sup> -  13)/(5+13) = 12/18 = 2/3</p><p>Here, the answers are not satisfied. So, option (d) is incorrect. </p>",

    "question": "<span class=\"eqt\"><p>If Kaira celebrated her birthday 32 days after Natasha, whose birthday was on Saturday, then on which day of the week Kaira celebrated her birthday?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2366;&#2351;&#2352;&#2366; &#2309;&#2346;&#2344;&#2366; &#2332;&#2344;&#2381;&#2350;&#2342;&#2367;&#2344; &#2344;&#2340;&#2366;&#2358;&#2366; &#2325;&#2375; 32 &#2342;&#2367;&#2344; &#2348;&#2366;&#2342; &#2350;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2344;&#2340;&#2366;&#2358;&#2366; &#2325;&#2366; &#2332;&#2344;&#2381;&#2350;&#2342;&#2367;&#2344; &#2358;&#2344;&#2367;&#2357;&#2366;&#2352; &#2325;&#2379; &#2361;&#2376;, &#2340;&#2379; &#2351;&#2361; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2325;&#2366;&#2351;&#2352;&#2366; &#2344;&#2375; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2325;&#2375; &#2325;&#2367;&#2360; &#2342;&#2367;&#2344; &#2309;&#2346;&#2344;&#2366; &#2332;&#2344;&#2381;&#2350;&#2342;&#2367;&#2344; &#2350;&#2344;&#2366;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tuesday</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Saturday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2344;&#2367;&#2357;&#2366;&#2352;</span>",

    "solution": "<p>Natasha celebrated her birthday on Saturday</p><p>To find the day after 32 days</p><p>Nearest multiple of 7 = 28</p><p>So, after 28 there will be Saturday</p><p>32  -  28 = 4</p><p>Saturday + 4 = Wednesday</p>",

    "solution": "<p>It is given that: </p><p>A, B, C, D and E are sitting around a circular table as in the given order and facing the centre.</p><p><b>From statement I alone:</b></p><p>A faces C. Only two persons sit between A and C when counted in the clockwise direction from C.</p><p>From the given data, we cannot conclude the definite direction of A and C. </p><p>So, the direction of E cannot be defined.</p><p>So, statement I alone is not sufficient.</p><p><b>From statement II alone</b>:</p><p>C faces south. D faces B, who is facing in the east direction.</p><p><img width=227 height=150 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23033/image001.jpg\"></p><p>So, statement II alone is not sufficient. </p><p><b>From statements I and II together:</b></p><p>A faces C. </p><p><img width=232 height=171 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23033/image002.jpg\"></p><p>Only two persons sit between A and C when counted in the clockwise direction from C. </p><p><img width=234 height=171 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23033/image003.jpg\"></p><p>So, E faces in the northwest direction. </p>",
    "question_index": 38
  },

    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>Not a word was spoken by the student who had broken the glass. </p>",
    "options": [
      "The student who have broken the glass had not spoken a word.",
      "The student who had broken the glass had not spoken a word.",
      "The student who had broken the glass not spoken a word.",
      "The student who had broken the glass did not speak a word."
    ],
    "correct_option_id": 3,
    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the helping verb and the preposition 'by' is necessary while changing the voice of the sentence from Passive to Active.</p><p>The Passive voice in this question is in Past Indefinite. Thus, the Active voice will also be in Past Indefinite.</p><p>In Passive voice, the format is: Object of the Active voice (Subjective case) + was/were + V3 + by + Subject of the Active voice (Objective case).</p><p>Thus, the format of Active voice is: Subject + V2 + Object.</p><p>For example:</p><p>The Champions League was won by Real Madrid. (Passive Voice)</p><p>Real Madrid won the Champions League. (Active Voice)</p><p>Options (a) and (b) are eliminated because the verb (had not spoken) is in past perfect tense. Option (c) is eliminated because 'not spoken' is grammatically incorrect. The correct form is 'did + not + V1'. The options except (d) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is option (d): <b>The student who had broken the glass did not speak a word.</b></p>",
    "question_index": 60
  },

    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Ipshita said to me, \"Are you checking the analytics?\"</p>",
    "options": [
      "Ipshita asked me if I had been checking the analytics.",
      "Ipshita asked me if I was being checked the analytics.",
      "Ipshita asked me if I was checking the analytics.",
      "Ipshita asked me if I were being checking the analytics."
    ],
    "correct_option_id": 2,
    "solution": "<p>In the case of Interrogative sentences like this, \"said\" in Direct Speech is changed into \"enquired (of)\", \"wanted to know\", \"asked\", etc.</p><p>In Indirect speech, the verb is always placed after the subject, unlike in Direct Speech.</p><p>If there is a question in the Direct Speech whose answer can come as \"Yes\" or \"No\" in the Indirect Speech, we should use \"If\" or \"Whether\" before the Indirect Speech.</p><p>For example:</p><p>Ravi said to me, \"Is she studying?\" (Direct Speech)</p><p>Ravi asked me if she was studying. (Indirect Speech)</p><p>Also, the sentence in the Direct Speech is in the Present continuous tense. So, the tense in the Indirect Speech should be in the Past continuous tense.</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The reporting verb 'said to' is changed into 'asked'. </p><p>&#183; 'If' is added before the Indirect speech. </p><p>&#183; 'Are checking' (present continuous) is changed to 'was checking' (past continuous).</p><p>&#183; The pronoun 'you' is changed into 'I'. </p><p>None of the options except (c) follows these changes. Hence, option (c) is the correct answer. </p><p>Therefore, the correct answer is: <b>Ipshita asked me if I was checking the analytics.</b></p>",
    "question_index": 61
  },

    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>The driver ordered the man to find him a pharmacy nearby. </p>",
    "options": [
      "The driver said to the man, \"To find me a pharmacy nearby.\"",
      "The driver said to the man, \"Please find him a pharmacy nearby.\"",
      "The driver said to the man, \"Find me a pharmacy nearby.\"",
      "The driver said to the man, \"Find a nearby pharmacy for him.\""
    ],
    "correct_option_id": 2,
    "solution": "<p>Imperative Sentences in Direct Speech are used to demonstrate Request, Order, Command, etc. Imperative Sentences in Direct Speech begin with Principal verbs like Go, Make, etc.</p><p>The reporting verbs like \"begged\", \"beg\", etc. in indirect speech are changed into \"said\", \"say\", etc. in direct speech. </p><p>\"To\" is used before the Principal Verbs in Indirect Speech.</p><p>Thus, going by the options is one of the best techniques to solve these questions.</p><p>For example:</p><p>John ordered his assistant to bring him a glass of water. (Indirect Speech)</p><p>John said to his assistant, \"Bring me a glass of water.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>&#183; The reporting verb 'ordered' is changed into 'said to'. </p><p>&#183; The infinitive 'to find' is changed into the verb 'find'. </p><p>&#183; The pronoun 'him' is changed into 'me'. </p><p>Therefore, the correct answer is option (c): The driver said to the man, \"Find me a pharmacy nearby.\"</p>",
    "question_index": 63
  },

    "question": "<p><b> </b>Select the most appropriate synonym of the underlined word.</p><p>The beauty of the sunset was <u>ineffable</u>, leaving everyone speechless with its sublime colours.</p>",
    "options": [
      "Unforgettable",
      "Indescribable",
      "Explicable",
      "Insufferable"
    ],
    "correct_option_id": 1,
    "solution": "<p>\"Ineffable\" means something that is too great or beautiful to be expressed or described in words.</p><p>Unforgettable: Something that cannot be forgotten; memorable.</p><p>Indescribable: Impossible to describe adequately in words; beyond description.</p><p>Explicable: Capable of being explained or understood.</p><p>Insufferable: Intolerable or unbearable; difficult to endure.</p><p>The most appropriate synonym from the given options is \"indescribable,\" which means impossible to adequately describe in words. Hence, (b) is the correct answer.</p>",
    "question_index": 64
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Naveen said to his friend, \"I've been trying to work that one out myself.\"</p>",
    "options": [
      "Naveen told his friend that he had been trying to work that one out himself.",
      "Naveen told his friend that he had tried to work that one out myself.",
      "Naveen asked his friend that he was trying to work that one out himself.",
      "Naveen told his friend that he has been trying to work this one out himself."
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence in the Direct Speech is in Present Perfect Continuous Tense. Therefore, the sentence in the Indirect Speech should be in Past Perfect Continuous Tense.</p><p>Present Perfect Continuous (Subject + has/have been + Present participle + Object) should be converted into Past Perfect Continuous (Subject + had been + Present Participle + Object).</p><p>For example:</p><p>He said, \"We have been waiting for hours\" (Direct Speech)</p><p>He said that they had been waiting for hours. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The reporting verb 'said to' is changed into 'told'. </p><p>&#183; The pronoun 'I' is changed into 'he'. </p><p>&#183; The verb 'have been trying' (present perfect continuous) is changed into 'had been trying' (past perfect continuous). </p><p>&#183; The reflexive pronoun 'myself' is changed into 'himself'. </p><p>None of the options except (a) follows these changes. Hence, option (a) is the correct answer. </p><p>Therefore, the correct answer is: <b>Naveen told his friend that he had been trying to work that one out himself.</b></p><p><b>Note:</b></p><p><b>Reflexive Pronouns: </b>Reflexive pronouns include myself, himself, herself, itself, ourselves, yourselves, and themselves. These are used to refer back to the subject of the clause in which they are used: She hurt herself in the eye.</p>",
    "question_index": 65
  },

    "question": "<p>Find the part of the sentence that contains an error:</p><p>Most of the innovations introduced this year (1)/ have not only reduced operational delays (2)/ but also enhanced the accuracy of data processing (3)/ and thereby improving overall system efficiency. (4)</p>",

    "correct_option_id": 2,
    "solution": "<p>The correct answer is (c) Simile. A simile employs \"like\" or \"as\" to liken one thing to another, here comparing the storm's fury to \"an angry giant\" to vividly illustrate its destructive power and scale.</p><p>Hyperbole is incorrect because it overstates for dramatic effect (e.g., \"The storm destroyed everything in a single breath\"), but this uses a measured comparison rather than impossible exaggeration.</p><p>Personification is incorrect as it would directly give human qualities to the storm (e.g., \"The storm pounded its fists\"), without the \"like\" that separates the storm from the giant.</p><p>Onomatopoeia is incorrect since it mimics sounds (e.g., \"The storm roared and crashed\"), focusing on noise imitation, not visual or emotional analogy.</p><p>Hence, the correct answer is option (c).</p>",

ucing uncertainty and building trust through familiarity. Consumers are more likely to choose products that reconnect them with earlier, emotionally secure phases of life. Unlike aggressive advertising, nostalgia operates quietly, embedding itself in long-term memory. The Japanese example illustrates how nostalgia can be cultivated intentionally over time, turning cultural resistance into acceptance. It also demonstrates how marketing can influence taste by shaping emotional associations rather than relying solely on persuasion. Ultimately, nostalgia-based marketing reveals that consumer choices are not driven only by rational need but by remembered feelings, childhood experiences, and the desire for continuity in an ever-changing world.</p>",

    "comp": "<p><b>Directions :</b>   Read the given passage and answer the questions that follow.</p><p>A rugged land of glaciers, mountains and fjords, South Georgia is one of the remotest places on Earth. \"Stay at least 200m away from the whaling stationit's filled with asbestos and the roofs could literally blow off,\" warned expedition leader Nate Small, as we stepped gingerly out of our Zodiac and into the fizzing surf at Stromness Bay, South Georgia. I picked a careful route across the grey-pebble beach, eyeing warily the growling fur seals and slumbering elephant seals, their gargantuan bodies emitting a series of burps, bellows and rumbling bass notes.</p><p>At the far end of the bay, set against a mountain slope and surrounded by bog land, was a cluster of dilapidated, rusty, corrugated iron buildings. Huge sections of the roofs and walls were missing, and those that remained rattled incessantly in the near gale-force wind. It looked as if a natural disaster had struck. I stopped at an 'AsbestosKeep Out' sign and peered through the encroaching mist, my extremities numb from the sub-zero conditions. It was a struggle to picture the station as a thriving community, yet a century ago Stromness was part of a highly profitableand brutalindustry that transformed South Georgia into the whaling capital of the South Atlantic.</p><p>Back then, fleets of Norwegian and British whalers processed up to 30,000 whales annually, their carcasses boiled down in massive try-pots for oil that fueled lamps and machinery worldwide. The air would have reeked of blubber and blood, with workersoften immigrants enduring 18-hour shifts in freezing squalorchurning out fortunes amid the ceaseless grind of harpoons and steam winches. Today, the ruins whisper of that exploitation's toll: not just on whales, hunted to near-extinction, but on the land itself, scarred by oil slicks and derelict machinery leaching toxins into the peat. Amid the desolation, a flicker of restoration stirsUNES     "comp": "<p><b>Directions :</b> Read the given passage carefully and answer the questions that follow.</p><p>This is a story about a boy. His name was Anansi. There was a great famine in the country where Anansi lived. Anansi and his little brothers and sisters were very hungry. The boy could not think of anything but food. \"This hunger will kill me!\" he often said. One day he went out of the house and walked to the seashore. \"I shall try to catch a little fish,\" he thought. He sat on the seashore watching, watching, watching - but nothing came. Then suddenly he saw a green island in the sea. Anansi climbed into a little red boat. And soon he came to the green island. He got out of the boat, stood under the tree and looked up at big nuts high above him. He tried to climb up the tree and get the nuts, but that was not easy. He tried again and again. But he could not get the nuts. The nuts were laughing at him! \"I'll get you, my dear nuts!\" he said. And he tried again and again to get the nuts. At last, he got one nut. \"Now I have you!\" he cried. He tried to throw it into his little boat, but the nut fell into the sea. \"Well, there are many more nuts in the tree,\" said Anansi. But the second nut fell into the sea, too. Seven times that happened. Seven good big nuts were in the sea! The wind carried them far away. The boy cried. But nuts have no ears! They did not come back. Then Anansi went to the forest. He saw a little house there. An old man came out of the house. \"What do you want here, my boy?\" asked the old man. \"Do not be afraid of me. Tell me everything.\" So, Anansi told him about the famine and his hungry people. Then he told the old man about the nuts and cried again. The old man took Anansi's hand and said, \"Don't cry, my boy! I have something for you.\"</p>",

    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>The lottery winner has been located by the media after two weeks. </p>",
    "options": [
      "The media has located the lottery winner after two weeks.",
      "The media had located the lottery winner after two weeks.",
      "The media has located the lottery winner before two weeks.",
      "The media have located the lottery winner after two weeks."
    ],
    "correct_option_id": 0,
    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the helping verb ['been'] and the preposition 'by' is necessary while changing the voice of the sentence from Passive to Active.</p><p>The Passive voice in this question is in Present Perfect. Thus, the Active voice will also be in Present Perfect.</p><p>In Passive voice, the format is: Object of the Active voice (Subjective case) + has/have + been + V3 + by + Subject of the Active voice (Objective case).</p><p>Thus, the format of Active voice is: Subject + has/have + V3 + Object.</p><p>For example:</p><p>A new horse has been bought by Arya. (Passive Voice)</p><p>Arya has bought a new horse. (Active Voice)</p><p>Option (b) is eliminated because it is in Past Perfect tense. Option (c) is eliminated because 'before' is used instead of 'after'. The noun 'media' is singular in nature. So, the plural verb 'have' should not be used with 'media'. So, option (d) is eliminated. The options except (a) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is option (a): <b>The media has located the lottery winner after two weeks.</b></p><p>Note: Subject-Verb Agreement: Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 102
  },

    "question": "<span class=\"eqt\"><p>Match the following stages of the Demographic Transition Model with their corresponding characteristics: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I(Stage)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II(Characteristic)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Stage I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Low birth rate and low death rate; population stabilizes</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Stage II</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. High birth rate and high death rate; slow population growth</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Stage III</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. High birth rate and rapidly falling death rate; population explosion</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Stage IV</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Falling birth rate and low death rate; population growth slows</td></tr></table><p>Correct code: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2360;&#2366;&#2306;&#2326;&#2381;&#2351;&#2367;&#2325;&#2368;&#2351; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339; &#2350;&#2377;&#2337;&#2354; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2330;&#2352;&#2339;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2323;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; I (&#2330;&#2352;&#2339;)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; II (&#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2330;&#2352;&#2339; I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2325;&#2350; &#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2325;&#2350; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352;; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2381;&#2341;&#2367;&#2352; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2330;&#2352;&#2339; II</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2313;&#2330;&#2381;&#2330; &#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2313;&#2330;&#2381;&#2330; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352;; &#2343;&#2368;&#2350;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2330;&#2352;&#2339; III</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2313;&#2330;&#2381;&#2330; &#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2340;&#2375;&#2332;&#2368; &#2360;&#2375; &#2327;&#2367;&#2352;&#2340;&#2368; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352;; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2367;&#2360;&#2381;&#2347;&#2379;&#2335;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2330;&#2352;&#2339; IV</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2327;&#2367;&#2352;&#2340;&#2368; &#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2325;&#2350; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352;; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2343;&#2368;&#2350;&#2368; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;</td></tr></table><p>&#2360;&#2361;&#2368; &#2325;&#2379;&#2337;: </p></span>",

    "question": "<span class=\"eqt\"><p>Which of the following is NOT a right-bank tributary of the River Yamuna? </p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2344;&#2342;&#2368; &#2351;&#2350;&#2369;&#2344;&#2366; &#2344;&#2342;&#2368; &#2325;&#2368; &#2342;&#2366;&#2361;&#2367;&#2344;&#2368; &#2323;&#2352; &#2348;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Chambal</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2306;&#2348;&#2354;</span>",
      "<span class=\"eqt\">Betwa</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2340;&#2357;&#2366;</span>",
      "<span class=\"eqt\">Ken</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2344;</span>",
      "<span class=\"eqt\">Hindon</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2306;&#2337;&#2379;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>The Hindon is a left-bank tributary.</b> </p><p><b>Explanation of Options:</b></p><p>&#183; <b>Chambal, Betwa, and Ken</b> are the major right-bank tributaries that flow from the peninsular plateau and join the Yamuna.</p><p>&#183; <b>Hindon</b> originates in the Saharanpur district (Upper Shivaliks) and joins the Yamuna from its <b>left bank</b> in Noida.</p>",
    "question_index": 109
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Mitochondria: </p><p>I. They are known as the \"Powerhouse of the cell\" as they produce ATP. </p><p>II. They possess their own DNA and ribosomes. </p><p>III. They are found in both Prokaryotic and Eukaryotic cells. </p><p>Which of the statements given above are correct? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2311;&#2335;&#2379;&#2325;&#2377;&#2344;&#2381;&#2337;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;: </p><p>I. &#2311;&#2344;&#2381;&#2361;&#2375;&#2306; \"&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2325;&#2366; &#2314;&#2352;&#2381;&#2332;&#2366; &#2349;&#2306;&#2337;&#2366;&#2352;\" &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2351;&#2375; &#2319;&#2335;&#2368;&#2346;&#2368; &#2325;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; </p><p>II. &#2311;&#2344;&#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2366; &#2337;&#2368;&#2319;&#2344;&#2319; &#2324;&#2352; &#2352;&#2366;&#2311;&#2348;&#2379;&#2360;&#2379;&#2350; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; </p><p>III. &#2351;&#2375; &#2346;&#2381;&#2352;&#2379;&#2325;&#2376;&#2352;&#2367;&#2351;&#2379;&#2335;&#2367;&#2325; &#2324;&#2352; &#2351;&#2370;&#2325;&#2376;&#2352;&#2367;&#2351;&#2379;&#2335;&#2367;&#2325; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; </p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;? </p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2324;&#2352; &#2340;&#2371;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements I and II are correct. </b></p><p><b>Statement III is incorrect because prokaryotes lack membrane-bound organelles</b>.</p><p><b>Explanation of Statements:</b></p><p>&#183; <b>I. is Correct.</b> They produce energy in the form of ATP through cellular respiration.</p><p>&#183; <b>II. is Correct.</b> Mitochondria are \"semi-autonomous\" as they have their own circular DNA and 70S ribosomes.</p><p>&#183; <b>III. is Incorrect.</b> Mitochondria are membrane-bound organelles found only in <b>Eukaryotic</b> cells. Prokaryotes (like bacteria) perform respiration at the plasma membrane (mesosomes).</p>",
    "question_index": 110
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding \"Black Soil\" in India: </p><p>I. It is predominantly found in the Deccan Trap region and is formed from the weathering of basaltic rocks. </p><p>II. It is characterized by high water-retaining capacity and self-ploughing property. </p><p>III. It is chemically rich in nitrogen, phosphorus, and organic matter. </p><p>IV. It is also known as 'Regur' soil and is ideal for the cultivation of cotton. </p><p>Which of the statements given above are correct? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2366;&#2312; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; \"&#2325;&#2366;&#2354;&#2368; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368;\" &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;: </p><p>I. &#2351;&#2361; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2342;&#2325;&#2381;&#2325;&#2344; &#2335;&#2381;&#2352;&#2376;&#2346; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2346;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2348;&#2375;&#2360;&#2366;&#2354;&#2381;&#2335;&#2367;&#2325; &#2330;&#2335;&#2381;&#2335;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2309;&#2346;&#2325;&#2381;&#2359;&#2351; &#2360;&#2375; &#2348;&#2344;&#2340;&#2368; &#2361;&#2376;&#2404; </p><p>II. &#2311;&#2360;&#2350;&#2375;&#2306; &#2313;&#2330;&#2381;&#2330; &#2332;&#2354; &#2343;&#2366;&#2352;&#2339; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2324;&#2352; &#2360;&#2381;&#2357;&#2340;&#2307; &#2332;&#2369;&#2340;&#2366;&#2312; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; </p><p>III. &#2351;&#2361; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344;, &#2347;&#2366;&#2360;&#2381;&#2347;&#2379;&#2352;&#2360; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2360;&#2375; &#2349;&#2352;&#2346;&#2370;&#2352; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; </p><p>IV. &#2311;&#2360;&#2375; '&#2352;&#2375;&#2327;&#2369;&#2352;' &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2351;&#2361; &#2325;&#2346;&#2366;&#2360; &#2325;&#2368; &#2326;&#2375;&#2340;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2342;&#2352;&#2381;&#2358; &#2361;&#2376;&#2404; </p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;? </p></span>",
    "options": [
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and IV</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">II, III and IV</span><span class=\"hqt\" style=\"display:none\">II, III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">I, III and IV</span><span class=\"hqt\" style=\"display:none\">I, III &#2324;&#2352; IV</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Statements I, II, and IV are correct. </b></p><p><b>Statement III is incorrect because Black soil is generally poor in nitrogen and phosphorus.</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>I. is Correct.</b> Formed by the weathering of lava (basalt), it is primarily found in the Deccan Trap.</p><p>&#183; <b>II. is Correct.</b> It swells and becomes sticky when wet and develops deep cracks when dry, a phenomenon known as \"self-ploughing.\"</p><p>&#183; <b>IV. is Correct.</b> It is famously called <b>Regur</b> or \"Black Cotton Soil\" because it is the most suitable soil for cotton cultivation.</p><p>&#183; <b>III. is Incorrect.</b> It is rich in lime, iron, magnesium, and alumina, but lacks nitrogen, phosphorus, and organic matter (humus).</p>",
    "question_index": 111
  },

    "question": "<span class=\"eqt\"><p>Jasprit Bumrah became only the second Indian bowler to take 100 wickets in Twenty20 Internationals after dismissing which player during the first T20I against South Africa?</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2309;&#2347;&#2381;&#2352;&#2368;&#2325;&#2366; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2346;&#2361;&#2354;&#2375; &#2335;&#2368;20 &#2309;&#2306;&#2340;&#2352;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2350;&#2376;&#2330; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2368; &#2325;&#2379; &#2310;&#2313;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2332;&#2360;&#2346;&#2381;&#2352;&#2368;&#2340; &#2348;&#2369;&#2350;&#2352;&#2366;&#2361; &#2335;&#2381;&#2357;&#2375;&#2306;&#2335;&#2368;20 &#2309;&#2306;&#2340;&#2352;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2350;&#2376;&#2330;&#2379;&#2306; &#2350;&#2375;&#2306; 100 &#2357;&#2367;&#2325;&#2375;&#2335; &#2354;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2327;&#2375;&#2306;&#2342;&#2348;&#2366;&#2332; &#2348;&#2344; &#2327;&#2319;?</span>",
    "options": [
      "<span class=\"eqt\">Quinton de Kock</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2357;&#2367;&#2306;&#2335;&#2344; &#2337;&#2368; &#2325;&#2377;&#2325;</span>",
      "<span class=\"eqt\">Aiden Markram</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2337;&#2375;&#2344; &#2350;&#2366;&#2352;&#2381;&#2325;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Dewald Brevis</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2357;&#2366;&#2354;&#2381;&#2337; &#2348;&#2381;&#2352;&#2375;&#2357;&#2367;&#2360;</span>",
      "<span class=\"eqt\">David Miller</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2357;&#2367;&#2337; &#2350;&#2367;&#2354;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Jasprit Bumrah became only the second Indian bowler to complete 100 wickets in Twenty20 Internationals , achieving the feat after dismissing <b>Dewald Brevis</b> during the first T20I against South Africa in Cuttack. </p><p>Bumrah achieved the feat after returning to the attack shortly after the halfway stage of the Proteas' chase, with Brevis getting a thick top-edge while attempting a pull, with India skipper Suryakumar Yadav charging in from extra cover to complete the catch.</p><p>Bumrah thus became only the second Indian after Arshdeep Singh to achieve the feat of 100 or more wickets for India in the shortest form of the game. He also became only the fifth bowler to collect 100 or more wickets in all three formats after Sri Lanka's Lasith Malinga, New Zealand's Tim Southee, Bangladesh's Shakib Al Hasan and Pakistan's Shaheen Shah Afridi.</p>",
    "question_index": 112
  },

    "question": "<span class=\"eqt\"><p>Which of the following best describes \"Gresham's Law\" in economics? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2309;&#2352;&#2381;&#2341;&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; \"&#2327;&#2381;&#2352;&#2375;&#2359;&#2350; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350;\" &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A decrease in the price of a good leads to an increase in demand.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368; &#2310;&#2344;&#2375; &#2360;&#2375; &#2313;&#2360;&#2325;&#2368; &#2350;&#2366;&#2306;&#2327; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">\"Bad money drives out good money\" from circulation.</span><span class=\"hqt\" style=\"display:none\">\"&#2326;&#2352;&#2366;&#2348; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2309;&#2330;&#2381;&#2331;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2325;&#2379; &#2346;&#2381;&#2352;&#2330;&#2354;&#2344; &#2360;&#2375; &#2348;&#2366;&#2361;&#2352; &#2325;&#2352; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404;\"</span>",
      "<span class=\"eqt\">Tax rates increase up to a point, after which tax revenue begins to fall.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352; &#2325;&#2368; &#2342;&#2352;&#2375;&#2306; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2368;&#2350;&#2366; &#2340;&#2325; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2325;&#2352; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2350;&#2375;&#2306; &#2327;&#2367;&#2352;&#2366;&#2357;&#2335; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">High inflation leads to high unemployment in the short run.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2346;&#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2313;&#2330;&#2381;&#2330; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2360;&#2375; &#2313;&#2330;&#2381;&#2330; &#2348;&#2375;&#2352;&#2379;&#2332;&#2327;&#2366;&#2352;&#2368; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>(a) is Incorrect.</b> This describes the Law of Demand.</p><p>&#183; <b>(b) is Correct.</b> Gresham's Law states that \"bad money\" (money with lower intrinsic value or depreciated value) drives \"good money\" (money with higher intrinsic value) out of circulation because people hoard the \"good\" coins.</p><p>&#183; <b>(c) is Incorrect.</b> This describes the Laffer Curve.</p><p>&#183; <b>(d) is Incorrect.</b> This relates to the Phillips Curve.</p>",
    "question_index": 113
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Cuckold, a novel by Kiran Nagarkar:</p><p>1) Cuckold is a historical novel set in 16th-century Mewar.</p><p>2) The novel narrates the story from the perspective of Bhoj Raj, the husband of Mirabai.</p><p>3) Cuckold won the Sahitya Akademi Award for English literature.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2352;&#2339; &#2344;&#2366;&#2327;&#2352;&#2325;&#2352; &#2325;&#2375; &#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; &#2325;&#2369;&#2325;&#2379;&#2354;&#2381;&#2337; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2325;&#2369;&#2325;&#2379;&#2354;&#2381;&#2337; 16&#2357;&#2368;&#2306; &#2358;&#2340;&#2366;&#2348;&#2381;&#2342;&#2368; &#2325;&#2375; &#2350;&#2375;&#2357;&#2366;&#2337;&#2364; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2319;&#2325; &#2320;&#2340;&#2367;&#2361;&#2366;&#2360;&#2367;&#2325; &#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; &#2361;&#2376;&#2404;</p><p>2) &#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; &#2350;&#2368;&#2352;&#2366;&#2348;&#2366;&#2312; &#2325;&#2375; &#2346;&#2340;&#2367; &#2349;&#2379;&#2332; &#2352;&#2366;&#2332; &#2325;&#2375; &#2342;&#2371;&#2359;&#2381;&#2335;&#2367;&#2325;&#2379;&#2339; &#2360;&#2375; &#2325;&#2361;&#2366;&#2344;&#2368; &#2348;&#2340;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2325;&#2369;&#2325;&#2379;&#2354;&#2381;&#2337; &#2344;&#2375; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351; &#2309;&#2325;&#2366;&#2342;&#2350;&#2368; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2332;&#2368;&#2340;&#2366;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; Cuckold is a 1997 book by Kiran Nagarkar and his third novel.</p><p>&#183; It is a historical novel set in the Rajput kingdom of Mewar, India during the 16th century that follows the life of Maharaj Kumar, a fictional character based upon the Mewar prince Bhoj Raj whose wife Mirabai thinks of Krishna as her husband and refuses to accept Bhoj Raj. </p><p>&#183; Cuckold published in 1997 is considered his magnum opus, and won the Sahitya Akademi award for 2000.</p>",
    "question_index": 114

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the SWAYATT initiative:</p><p>Statement 1: Government e Marketplace (GeM) commemorated six years of Startups, Women &amp; Youth Advantage through eTransactions (SWAYATT) initiative in 2025.</p><p>Statement 2: It was first launched on 19<sup>th</sup> February 2019.</p><p>Which of the above statement is/are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2357;&#2351;&#2335;&#2381;&#2335; &#2346;&#2361;&#2354; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2312;-&#2350;&#2366;&#2352;&#2381;&#2325;&#2375;&#2335;&#2346;&#2381;&#2354;&#2375;&#2360; (GeM) &#2344;&#2375; 2025 &#2350;&#2375;&#2306; &#2360;&#2381;&#2335;&#2366;&#2352;&#2381;&#2335;&#2309;&#2346;&#2381;&#2360;, &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2324;&#2352; &#2351;&#2369;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2312;-&#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2354;&#2366;&#2349; (&#2360;&#2381;&#2357;&#2351;&#2335;&#2381;&#2335;) &#2346;&#2361;&#2354; &#2325;&#2375; &#2331;&#2361; &#2357;&#2352;&#2381;&#2359; &#2346;&#2370;&#2352;&#2375; &#2361;&#2379;&#2344;&#2375; &#2325;&#2366; &#2332;&#2358;&#2381;&#2344; &#2350;&#2344;&#2366;&#2351;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2311;&#2360;&#2375; &#2346;&#2361;&#2354;&#2368; &#2348;&#2366;&#2352; 19 &#2347;&#2352;&#2357;&#2352;&#2368; 2019 &#2325;&#2379; &#2354;&#2377;&#2344;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Statement I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2325;&#2375;&#2357;&#2354;</span>",
      "<span class=\"eqt\">Statement II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; II</span>",
      "<span class=\"eqt\">Both Statement I and Statement II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2324;&#2352; &#2325;&#2341;&#2344; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither Statement I nor Statement II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2325;&#2341;&#2344; I &#2324;&#2352; &#2344; &#2361;&#2368; &#2325;&#2341;&#2344; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Government e Marketplace (GeM) commemorated six years of Startups, Women &amp; Youth Advantage through eTransactions (SWAYATT) initiative at its New Delhi headquarter (HQ) on 19 February 2025. </p><p>Launched on 19th February, 2019, SWAYATT was conceptualised with a clear objective of invigorating participation of women-led enterprises and youth in public procurement. </p><p>Rooted in GeM's foundational pillar of social inclusion, SWAYATT is portal's commitment to enhance ease of doing business and establish direct market linkages to annual public procurement for startups, women entrepreneurs, Micro &amp; Small Enterprises (MSEs), Self Help Groups (SHGs) and youth, especially those from backward sections of the society. </p><p>On the occasion, GeM signed a Memorandum of Understanding (MoU) with Federation of Indian Chambers of Commerce &amp; Industry (FICCI) Ladies Organisation (FICCI-FLO) ' an all-India forum representing over 9,500 women entrepreneurs. By means of this partnership, GeM intends to provide direct access for women entrepreneurs with government buyers, sans intermediaries.</p>",
    "question_index": 115
  },

    "question": "<span class=\"eqt\"><p>Which gas is primarily responsible for the \"Hardness of Water\" when present as bicarbonates, chlorides, or sulfates of Calcium and Magnesium? </p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2354;&#2381;&#2358;&#2367;&#2351;&#2350; &#2324;&#2352; &#2350;&#2376;&#2327;&#2381;&#2344;&#2368;&#2358;&#2367;&#2351;&#2350; &#2325;&#2375; &#2348;&#2366;&#2311;&#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2344;&#2375;&#2335;, &#2325;&#2381;&#2354;&#2379;&#2352;&#2366;&#2311;&#2337; &#2351;&#2366; &#2360;&#2354;&#2381;&#2347;&#2375;&#2335; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2325;&#2380;&#2344; &#2360;&#2368; &#2327;&#2376;&#2360; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2325;&#2336;&#2379;&#2352;&#2340;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Carbon Dioxide</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2312;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Nitrogen</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Methane</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2368;&#2341;&#2375;&#2344;</span>",
      "<span class=\"eqt\">Hydrogen</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Carbon dioxide (CO<sub>2</sub>)</b> is the gas primarily responsible for the formation of water hardness, particularly <b>temporary hardness</b>.</p><p>While <b>CO<sub>2</sub></b> itself does not make water \"hard,\" its interaction with environmental elements does:</p><p>1) <b>Interaction:</b> As rainwater falls through the atmosphere and seeps through soil, it absorbs CO<sub>2</sub>,forming a very weak <b>carbonic acid</b>(H<sub>2</sub>CO<sub>3</sub>)</p><p>2) <b>Dissolution:</b> This slightly acidic water passes over rocks containing <b>calcium carbonate</b> (limestone) or <b>magnesium carbonate</b> (dolomite).</p><p>3) <b>Chemical Reaction:</b> The carbonic acid reacts with these carbonates to form <b>calcium bicarbonate [Ca(HCO<sub>3</sub></b><b>)<sub>2</sub>]</b> or <b>magnesium bicarbonate[Mg(HCO<sub>3</sub>)<sub>2</sub>],</b> which are soluble in water.</p><p><b>Key points on Hardness:</b></p><p>&#183; <b>Temporary Hardness:</b> Caused by the <b>bicarbonates</b> of calcium and magnesium. It is called \"temporary\" because it can be removed simply by boiling the water.</p><p>&#183; <b>Permanent Hardness:</b> Caused by the <b>chlorides and sulfates</b> of calcium and magnesium. This cannot be removed by boiling and requires chemical treatments like the addition of washing soda or ion-exchange methods.</p>",
    "question_index": 116
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Monetary Policy Committee (MPC):</p><p>I. The MPC is a 6-member body, with three members from the RBI and three nominated by the Central Government.</p><p>II. The Governor of the RBI serves as the ex-officio Chairman of the committee.</p><p>III. Decisions are taken by a simple majority, and the Governor does not have a casting vote in case of a tie.</p><p>IV. It is required to meet at least four times a year.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367; &#2360;&#2350;&#2367;&#2340;&#2367; (&#2319;&#2350;&#2346;&#2368;&#2360;&#2368;) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2319;&#2350;&#2346;&#2368;&#2360;&#2368; 6 &#2360;&#2342;&#2360;&#2381;&#2351;&#2368;&#2351; &#2344;&#2367;&#2325;&#2366;&#2351; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2325;&#2375; &#2340;&#2368;&#2344; &#2360;&#2342;&#2360;&#2381;&#2351; &#2324;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2344;&#2379;&#2344;&#2368;&#2340; &#2340;&#2368;&#2344; &#2360;&#2342;&#2360;&#2381;&#2351; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2325;&#2375; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352; &#2360;&#2350;&#2367;&#2340;&#2367; &#2325;&#2375; &#2346;&#2342;&#2375;&#2344; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>III. &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2361;&#2369;&#2350;&#2340; &#2360;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2324;&#2352; &#2335;&#2366;&#2312; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352; &#2325;&#2375; &#2346;&#2366;&#2360; &#2344;&#2367;&#2352;&#2381;&#2339;&#2366;&#2351;&#2325; &#2357;&#2379;&#2335; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>IV. &#2311;&#2360;&#2325;&#2368; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2330;&#2366;&#2352; &#2348;&#2366;&#2352; &#2348;&#2376;&#2336;&#2325; &#2325;&#2352;&#2344;&#2366; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II, III and IV</span><span class=\"hqt\" style=\"display:none\">I, II, III &#2324;&#2352; IV</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Statements I, II, and IV are correct. </b></p><p><b>Statement III is incorrect because the Governor of the RBI does possess a casting vote.</b> </p><p><b>Explanation of Statements: </b></p><p>&#183; <b>I. is Correct.</b> The MPC consists of 6 members: 3 from the RBI (including the Governor) and 3 appointed by the Central Government.</p><p>&#183; <b>II. is Correct.</b> The RBI Governor is the ex-officio Chairperson of the MPC.</p><p>&#183; <b>III. is Incorrect.</b> Each member has one vote. In the event of an equality of votes (a tie), the Governor has a second or <b>casting vote</b>.</p><p>&#183; <b>IV. is Correct.</b> The RBI Act requires the MPC to meet at least four times a year</p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>Which of the following are components of the Capital Account of the Balance of Payments? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2375; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2325;&#2375; &#2346;&#2370;&#2306;&#2332;&#2368; &#2326;&#2366;&#2340;&#2375; &#2325;&#2375; &#2328;&#2335;&#2325; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Foreign Direct Investment (FDI)</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2344;&#2367;&#2357;&#2375;&#2358; (&#2319;&#2347;&#2337;&#2368;&#2310;&#2312;)</span>",
      "<span class=\"eqt\">Portfolio Investment</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2352;&#2381;&#2335;&#2347;&#2379;&#2354;&#2367;&#2351;&#2379; &#2344;&#2367;&#2357;&#2375;&#2358;</span>",
      "<span class=\"eqt\">External Commercial Borrowings (ECB)</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2361;&#2381;&#2351; &#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351;&#2367;&#2325; &#2313;&#2343;&#2366;&#2352; (&#2312;&#2360;&#2368;&#2348;&#2368;)</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>All the mentioned items (FDI, Portfolio Investment, and ECB) are components of the Capital Account.</b> </p><p><b>Explanation of Components:</b></p><p>&#183; <b>Capital Account</b> records all international transactions of assets.</p><p>&#183; <b>FDI and Portfolio Investment</b> represent the flow of investment capital into or out of a country.</p><p>&#183; <b>External Commercial Borrowings (ECB)</b> represent loans taken by Indian entities from foreign sources, which also fall under capital transfers.</p>",
