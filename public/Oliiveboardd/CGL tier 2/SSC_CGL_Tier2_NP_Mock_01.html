    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the 'SAKSHAM' Anti-Drone Grid inducted by the Indian Army:</p><p>1. It is an indigenous system developed by Bharat Electronics Limited (BEL).</p><p>2. It uses a combination of \"Soft Kill\" (jamming) and \"Hard Kill\" (kinetic destruction) capabilities.</p><p>3. It is designed specifically for high-altitude operations along the Northern borders.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2375;&#2344;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2325;&#2367;&#2319; &#2327;&#2319; '&#2360;&#2325;&#2381;&#2359;&#2350;' &#2319;&#2306;&#2335;&#2368;-&#2337;&#2381;&#2352;&#2379;&#2344; &#2327;&#2381;&#2352;&#2367;&#2337; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2351;&#2361; &#2349;&#2366;&#2352;&#2340; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2367;&#2325;&#2381;&#2360; &#2354;&#2367;&#2350;&#2367;&#2335;&#2375;&#2337; (&#2348;&#2368;&#2312;&#2319;&#2354;) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2319;&#2325; &#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2361;&#2376;&#2404;</p><p>2. &#2351;&#2361; \"&#2360;&#2377;&#2347;&#2381;&#2335; &#2325;&#2367;&#2354;\" (&#2332;&#2376;&#2350;&#2352;&#2367;&#2306;&#2327;) &#2324;&#2352; \"&#2361;&#2366;&#2352;&#2381;&#2337; &#2325;&#2367;&#2354;\" (&#2325;&#2366;&#2311;&#2344;&#2375;&#2335;&#2367;&#2325; &#2337;&#2367;&#2360;&#2381;&#2335;&#2381;&#2352;&#2325;&#2381;&#2358;&#2344;) &#2325;&#2381;&#2359;&#2350;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3. &#2311;&#2360;&#2375; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2360;&#2368;&#2350;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2313;&#2330;&#2381;&#2330; &#2314;&#2306;&#2330;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2367;&#2332;&#2364;&#2366;&#2311;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1, 2, and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>As part of its ongoing efforts to strengthen national security and enhance operational preparedness against evolving aerial threats, the Indian Army has begun procuring an indigenously developed Counter-Unmanned Aerial System (UAS) Grid System named Saksham.</p><p>The Saksham Counter-UAS System is fully indigenous, designed and developed by BEL; the system incorporates AI-driven fusion technologies for future combat systems, enabling scalability and upgradation as threat environments evolve.</p><p>It is designed to operate in various battlefield environments, including the \"Air Littoral\" (airspace up to 3,000 meters or 10,000 feet above ground level), which is highly relevant for securing India's northern border areas.</p><p>Elaborating on Saksham, the Army said it was conceived as a high-end, modular Command and Control System. Saksham, short for Situational Awareness for Kinetic Soft and Hard Kill Assets Management, has been developed in collaboration with Bharat Electronics Limited (BEL), Ghaziabad.</p><p>The system operates over the secure Army Data Network (ADN) to provide an integrated, recognised UAS picture to all formations and arms in real time, covering both the surface and the Air Littoral layer of the Tactical Battlefield Space.</p><p>Elaborating further on the system, the Army said it can integrate its own as well as hostile UAS data, C-UAS sensors, and soft- and hard-kill systems on a common GIS-based platform.</p><p></p><p></p><p></p><p></p><p></p><p></p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a component of money supply (M3)?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; (M3) &#2325;&#2366; &#2328;&#2335;&#2325; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Currency with the public</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2340;&#2366; &#2325;&#2375; &#2346;&#2366;&#2360; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Post-office savings</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2366;&#2325;&#2328;&#2352; &#2348;&#2330;&#2340;</span>",
      "<span class=\"eqt\">Demand deposits</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2350;&#2366;&#2306;&#2337; &#2337;&#2367;&#2346;&#2377;&#2332;&#2364;&#2367;&#2335;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Time deposits with banks</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2366;&#2357;&#2343;&#2367; &#2332;&#2350;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In India, the Reserve Bank of India (RBI) classifies the money supply into four aggregates: M1, M2, M3, and M4. These are categorized based on their liquidity (how easily they can be converted into cash).</p><p>M3 is the most commonly used measure of the money supply in an economy. It includes the most liquid assets from M1 and adds less liquid \"time\" assets from the banking system.</p><p>M3=M1+Net Time Deposits with the Banking System</p><p>-Where M1 (Narrow Money) = Currency with the public + Demand deposits (Savings/Current accounts) + Other deposits with the RBI.</p><p>Post-office deposits are deliberately excluded from the M3 aggregate to keep it focused on the banking sector's liquidity. Instead, they are included in M2 and M4:</p><p>M2 = M1 + Savings deposits with Post Office savings banks.</p><p>M4 = M3 + Total deposits with Post Office savings organizations (excluding National Savings Certificates).</p>",
    "question_index": 123
  },
  {
    "question": "<span class=\"eqt\"><p>A body moving in a circular path with constant speed has:</p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2367;&#2352; &#2327;&#2340;&#2367; &#2360;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2346;&#2341; &#2346;&#2352; &#2327;&#2340;&#2367;&#2350;&#2366;&#2344; &#2346;&#2367;&#2306;&#2337; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2319;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Acceleration directed towards the centre</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2325;&#2368; &#2323;&#2352; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2367;&#2340; &#2340;&#2381;&#2357;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Zero acceleration</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2370;&#2344;&#2381;&#2351; &#2340;&#2381;&#2357;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Constant velocity</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352; &#2357;&#2375;&#2327;</span>",
      "<span class=\"eqt\">Acceleration along the tangent</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2342;&#2367;&#2358; &#2340;&#2381;&#2357;&#2352;&#2339;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Even when a body moves in a circle at a constant speed, its velocity is constantly changing. This is because velocity is a vector quantity that includes both speed and direction. As the object moves along the circular path, its direction of motion changes at every single point.</p><p>Since acceleration is defined as the rate of change of velocity, a change in direction-even without a change in speed-results in acceleration. This specific type of acceleration is called Centripetal Acceleration.</p><p>The word \"centripetal\" literally means \"center-seeking.\" The acceleration vector always points perpendicular to the velocity vector.</p><p>-It is always directed toward the center of the circle.</p><p>-Without this inward acceleration, the object would fly off in a straight line (along the tangent) due to inertia.</p><p></p>",
    "question_index": 124
  },

    "question": "<span class=\"eqt\"><p>Which treaty formally ceded Malwa to the Marathas following Baji Rao I's campaign (1737 - 38) and forced the Nizam to pay war indemnity?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2366;&#2332;&#2368; &#2352;&#2366;&#2357; &#2346;&#2381;&#2352;&#2341;&#2350; &#2325;&#2375; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; (1737-38) &#2325;&#2375; &#2348;&#2366;&#2342; &#2325;&#2367;&#2360; &#2360;&#2306;&#2343;&#2367; &#2325;&#2375; &#2340;&#2361;&#2340; &#2324;&#2346;&#2330;&#2366;&#2352;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2350;&#2366;&#2354;&#2357;&#2366; &#2350;&#2352;&#2366;&#2336;&#2379;&#2306; &#2325;&#2379; &#2360;&#2380;&#2306;&#2346; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2324;&#2352; &#2344;&#2367;&#2332;&#2364;&#2366;&#2350; &#2325;&#2379; &#2351;&#2369;&#2342;&#2381;&#2343; &#2325;&#2381;&#2359;&#2340;&#2367;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2366;&#2343;&#2381;&#2351; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Treaty of Warna (1731)</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2352;&#2381;&#2344;&#2366; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367; (1731)</span>",
      "<span class=\"eqt\">Treaty of Mungi-Shevgaon (1728)</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2306;&#2327;&#2368;-&#2358;&#2375;&#2357;&#2327;&#2366;&#2305;&#2357; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367; (1728)</span>",
      "<span class=\"eqt\">Treaty of Salbai (1782)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2354;&#2348;&#2366;&#2312; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367; (1782)</span>",
      "<span class=\"eqt\">Treaty of Bhopal (1738)</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2379;&#2346;&#2366;&#2354; &#2360;&#2306;&#2343;&#2367; (1738)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The \"Treaty of Bhopal (1738)\", concluded after Baji Rao I's decisive maneuvering around Bhopal, compelled Nizam-ul-Mulk to recognize Maratha claims over Malwa and pay a substantial indemnity. It marked a watershed in Maratha expansion north of the Narmada and consolidation of their revenue rights.</p><p>- \"A. Treaty of Warna (1731):\" Ended the Maratha civil conflict between Shahu and Sambhaji II of Kolhapur; unrelated to Malwa or the Nizam.</p><p>- \"B. Treaty of Mungi-Shevgaon (1728):\" Followed Baji Rao's victory over the Nizam; it checked the Nizam's influence but did not cede Malwa.</p><p>- \"C. Treaty of Salbai (1782):\" Ended the First Anglo-Maratha War; regulated relations with the East India Company, not the Nizam.</p><p>Further Insights:</p><p>- Post-Bhopal, the Marathas secured chauth and sardeshmukhi in Malwa, building the base for further northern expeditions.</p><p>- Baji Rao I's 1737 dash to Delhi and subsequent campaign showcased rapid cavalry warfare and strategic envelopment.</p>",
    "question_index": 125
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the book 'Knife: Meditations After an Attempted Murder':</p><p>1. It is an autobiographical memoir written by the Nobel laureate Amartya Sen.</p><p>2. The book recounts the author's survival and recovery following a stabbing attack in 2022.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2369;&#2360;&#2381;&#2340;&#2325; '&#2330;&#2366;&#2325;&#2370;: &#2361;&#2340;&#2381;&#2351;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2325;&#2375; &#2348;&#2366;&#2342; &#2330;&#2367;&#2306;&#2340;&#2344;' &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2351;&#2361; &#2344;&#2379;&#2348;&#2375;&#2354; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2357;&#2367;&#2332;&#2375;&#2340;&#2366; &#2309;&#2350;&#2352;&#2381;&#2340;&#2381;&#2351; &#2360;&#2375;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2326;&#2367;&#2340; &#2319;&#2325; &#2310;&#2340;&#2381;&#2350;&#2325;&#2341;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2306;&#2360;&#2381;&#2350;&#2352;&#2339; &#2361;&#2376;&#2404;</p><p>2. &#2351;&#2361; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 2022 &#2350;&#2375;&#2306; &#2361;&#2369;&#2319; &#2330;&#2366;&#2325;&#2370; &#2361;&#2350;&#2354;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2354;&#2375;&#2326;&#2325; &#2325;&#2375; &#2332;&#2368;&#2357;&#2367;&#2340; &#2352;&#2361;&#2344;&#2375; &#2324;&#2352; &#2336;&#2368;&#2325; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2325;&#2361;&#2366;&#2344;&#2368; &#2348;&#2351;&#2366;&#2306; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The book Knife: Meditations After an Attempted Murder is Salman Rushdie's autobiographical account of the 2022 stabbing attack and its aftermath.</p><p>Salman Rushdie was attacked while on stage at the Chautauqua Institution in New York.</p><p>The book was a finalist for the National Book Award(U.S. literary award) for Nonfiction in 2024.</p><p></p>",

    "question": "<span class=\"eqt\"><p>Consider the following regarding the 'Capital Adequacy Ratio' (CAR):</p><p>i. It is the ratio of a bank's capital to its risk-weighted assets.</p><p>ii. It is maintained to protect depositors and promote stability in the financial system.</p><p>iii. Under Basel III norms, Indian public sector banks are required to maintain a higher CAR than the minimum global requirement.</p><p>Which of the statements above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2370;&#2306;&#2332;&#2368; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340;&#2340;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; (CAR) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. &#2351;&#2361; &#2325;&#2367;&#2360;&#2368; &#2348;&#2376;&#2306;&#2325; &#2325;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; &#2324;&#2352; &#2313;&#2360;&#2325;&#2368; &#2332;&#2379;&#2326;&#2367;&#2350;-&#2349;&#2366;&#2352;&#2367;&#2340; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2361;&#2376;&#2404;</p><p>ii. &#2311;&#2360;&#2375; &#2332;&#2350;&#2366;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2324;&#2352; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2352;&#2340;&#2366; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>iii. &#2348;&#2375;&#2360;&#2354; III &#2350;&#2366;&#2344;&#2342;&#2306;&#2337;&#2379;&#2306; &#2325;&#2375; &#2340;&#2361;&#2340;, &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2357;&#2376;&#2358;&#2381;&#2357;&#2367;&#2325; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; CAR &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2344;&#2366; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i and ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">i and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">ii and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i, ii, and iii</span><span class=\"hqt\" style=\"display:none\">i, ii, &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All statements are correct. CAR ensures banks have enough \"cushion\" to absorb losses.</p><p>RBI typically mandates a 9% CAR for Indian banks, higher than the Basel III minimum of 8%.</p><p>Further Insights:</p><p>Tier 1 Capital is the core capital (equity), while Tier 2 is supplementary capital (debt).</p><p>The Prompt Corrective Action (PCA) framework is triggered if a bank's CAR falls below certain thresholds.</p>",
    "question_index": 127
  },

    ],
    "correct_option_id": 2,
    "solution": "<p>V-Shaped Valleys are formed by the vertical erosion of a river as it flows swiftly through mountainous terrain. Ox-bow lakes and Deltas are features of the middle/mature and old stages, respectively, primarily involving deposition.</p><p></p><p>Further Insights:</p><p>Potholes: Small, circular depressions in the rocky bed of mountain streams formed by abrasion.</p><p>Meanders: S-shaped loops in a river's course; erosion occurs on the outer bank (cut bank) and deposition on the inner bank (point bar).</p><p>Levees: Elevated banks formed by the deposition of sediments during floods.</p><p>Delta: A triangular feature formed at the mouth of a river where it enters a sea or lake, dropping its total load due to the loss of velocity.</p>",
    "question_index": 128
  },
  {
    "question": "<span class=\"eqt\"><p>The \"effective literacy rate\" excludes population in the age group of:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2360;&#2366;&#2325;&#2381;&#2359;&#2352;&#2340;&#2366; &#2342;&#2352;\" &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2351;&#2369; &#2357;&#2352;&#2381;&#2327; &#2325;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">0-4 years</span><span class=\"hqt\" style=\"display:none\">0-4 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">0-5 years</span><span class=\"hqt\" style=\"display:none\">0-5 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">0-6 years</span><span class=\"hqt\" style=\"display:none\">0-6 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">0-7 years</span><span class=\"hqt\" style=\"display:none\">0-7 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In the Indian Census, literacy rates are calculated in two ways: Crude Literacy Rate and Effective Literacy Rate.</p><p>1. Crude Literacy Rate</p><p>This is calculated by taking the total number of literate persons and dividing it by the total population of the country. This includes infants and toddlers who are biologically and developmentally too young to read or write.</p><p>2. Effective Literacy Rate</p><p>To get a more accurate picture of a country's educational progress, the \"effective\" rate is used.</p><p>-It is calculated by dividing the number of literate persons by the population aged 7 years and above.</p><p>-Therefore, the entire population in the <b>0-6 age group is excluded</b> from the denominator, as children in this group are treated as illiterate by default in the census, regardless of whether they can read or write.</p>",
    "question_index": 129
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following topology has a central hub which connects all the devices?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2361;&#2348; &#2360;&#2375; &#2360;&#2349;&#2368; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2332;&#2369;&#2396;&#2375; (&#2325;&#2344;&#2375;&#2325;&#2381;&#2335;) &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bus Topology</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2360; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Ring Topology</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2306;&#2327; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Mesh Topology</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2359; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Star Topology</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2366;&#2352; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Star Topology - </p><p>In this topology, all the devices are connected to a central hub, and communication takes place through this hub. The hub manages the traffic and ensures that the data is sent to the correct destination. If any device wants to transmit data, it sends it to the hub, which then sends the data to the destination device.</p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>RAM can be divided into how many category?</p></span><span class=\"hqt\" style=\"display:none\"><p>RAM &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2358;&#2381;&#2352;&#2375;&#2339;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>RAM can be divided into <b>two</b> broad categories:</p><p>SRAM: Static RAM is much faster and more expensive than DRAM. It often functions as cache memory. Information in SRAM is volatile. It stores a bit of data using six transistor memory cell.</p><p>DRAM: Dynamic RAM is slower than SRAM. It stores a bit of data using a transistor and capacitor pair. As it is less expensive, most computers use DRAM. It is also a volatile memory.</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1. Downloading refers to receiving data from the internet to a local device.</p><p>2. Uploading refers to sending data from a local device to the internet.</p><p>3. Upload speed is generally higher than download speed for home users.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2337;&#2366;&#2313;&#2344;&#2354;&#2379;&#2337;&#2367;&#2306;&#2327; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2360;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2346;&#2352; &#2337;&#2375;&#2335;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</p><p>2. &#2309;&#2346;&#2354;&#2379;&#2337;&#2367;&#2306;&#2327; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2360;&#2375; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2346;&#2352; &#2337;&#2375;&#2335;&#2366; &#2349;&#2375;&#2332;&#2344;&#2366;&#2404;</p><p>3. &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2346;&#2354;&#2379;&#2337; &#2327;&#2340;&#2367; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2337;&#2366;&#2313;&#2344;&#2354;&#2379;&#2337; &#2327;&#2340;&#2367; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1: Downloading refers to receiving data from the internet to a local device (Correct)Downloading is the process of retrieving data from a remote server (the internet) and saving it to your computer, smartphone, or tablet.</p><p>Common examples: Saving an image from a website, opening an email attachment, or streaming a movie (which involves a continuous download of data).</p><p>Data Flow: From the Server to Client Device.</p><p></p><p>Statement 2: Uploading refers to sending data from a local device to the internet (Correct)Uploading is the reverse process of downloading. It involves sending data from your local device to a remote server.</p><p>Common examples: Posting a photo on Instagram, sending an email, or attaching a file to a cloud storage service like Google Drive.</p><p>Data Flow: From the Client Device to Server.</p><p></p><p>Statement 3: Upload speed is generally higher than download speed for home users (Incorrect)</p><p>For most home internet users (using technologies like ADSL, Cable, or standard Fiber), the connection is Asymmetric. This means:</p><p>Download speeds are significantly higher than upload speeds. ISPs (Internet Service Providers) design it this way because the average home user consumes far more content (watching videos, browsing) than they create (uploading files).</p><p>Symmetric connections (where upload and download speeds are equal) are typically reserved for high-end business plans or specialized fiber-optic services.</p><p></p>",
    "question_index": 132
  },
  {
    "question": "<span class=\"eqt\"><p>Shortcut Menu is also known as______</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2377;&#2352;&#2381;&#2335;&#2325;&#2335; &#2350;&#2375;&#2344;&#2370; &#2325;&#2379; ______ &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Main Menu</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2326;&#2381;&#2351; &#2350;&#2375;&#2344;&#2381;&#2351;&#2370;</span>",
      "<span class=\"eqt\">Context Menu</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2377;&#2344;&#2381;&#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2350;&#2375;&#2344;&#2370;</span>",
      "<span class=\"eqt\">End Menu</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2337; &#2350;&#2375;&#2344;&#2370;</span>",
      "<span class=\"eqt\">Refresh Menu</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2398;&#2381;&#2352;&#2375;&#2358; &#2350;&#2375;&#2344;&#2370;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A <b>context menu</b> (also know as a contextual menu, shortcut menu or pop-up menu) is the menu that appears when you right-click and offers a set of choices that are available for, or in context of, whatever it was you clicked.</p>",
    "question_index": 133
  },
  {
    "question": "<span class=\"eqt\"><p>What is the shortcut key that is used to close MS PowerPoint?</p></span><span class=\"hqt\" style=\"display:none\"><p>MS &#2346;&#2366;&#2357;&#2352;&#2346;&#2377;&#2311;&#2306;&#2335; &#2325;&#2379; &#2348;&#2306;&#2342; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2358;&#2377;&#2352;&#2381;&#2335;&#2325;&#2335; &#2325;&#2368; (key) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Alt+H</span><span class=\"hqt\" style=\"display:none\">Alt+H</span>",
      "<span class=\"eqt\">Ctrl+M</span><span class=\"hqt\" style=\"display:none\">Ctrl+M</span>",
      "<span class=\"eqt\">Alt+G</span><span class=\"hqt\" style=\"display:none\">Alt+G</span>",
      "<span class=\"eqt\">Ctrl+Q</span><span class=\"hqt\" style=\"display:none\">Ctrl+Q</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Some of the shortcut keys used in MS Powerpoint:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ctrl+ M</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Add a new slide</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Alt+ H</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Home Tab</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Alt + G</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Design Tab</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ctrl+ Q</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Close Powerpoint</td></tr></table>",
    "question_index": 134
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following options is not present in the insert tab of MS Powerpoint?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2319;&#2350;&#2319;&#2360; &#2346;&#2366;&#2357;&#2352;&#2346;&#2377;&#2311;&#2306;&#2335; &#2325;&#2375; &#2311;&#2344;&#2381;&#2360;&#2352;&#2381;&#2335; &#2335;&#2376;&#2348; &#2350;&#2375;&#2306; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tables</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2348;&#2354;</span>",
      "<span class=\"eqt\">Illustrations</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2360;&#2381;&#2335;&#2381;&#2352;&#2375;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Pages</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2332;</span>",
      "<span class=\"eqt\">Text</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The option that is not present in the Insert tab of MS PowerPoint is Pages. The other options - Tables, Illustrations, and Text - are all available in the Insert tab.</p><p></p><p>In Microsoft PowerPoint, there isn't a specific \"Pages\" option in the Insert tab. However, if user is looking for ways to manage slides or pages, you can find options related to slides in the Slide Sorter view or by right-clicking in the slide pane. One can add new slides from the Home tab under the \"Slides\" group, where user can find options like \"New Slide\" and \"Reuse Slides.\"</p><p></p>",
    "question_index": 135
  },
  {
    "question": "<span class=\"eqt\"><p>What is the function of the \"Undo\" button in MS Office applications? </p></span><span class=\"hqt\" style=\"display:none\"><p>MS &#2321;&#2347;&#2367;&#2360; &#2319;&#2346;&#2381;&#2354;&#2368;&#2325;&#2375;&#2358;&#2344; &#2350;&#2375;&#2306; \"&#2309;&#2344;&#2337;&#2370;\" &#2348;&#2335;&#2344; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Redo the last action</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2367;&#2350; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; (&#2352;&#2368;&#2337;&#2370;) &#2346;&#2369;&#2344;&#2307; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Save the document</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2377;&#2325;&#2381;&#2351;&#2370;&#2350;&#2375;&#2306;&#2335; &#2360;&#2375;&#2357; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Exit the application</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2346;&#2381;&#2354;&#2367;&#2325;&#2375;&#2358;&#2344; &#2360;&#2375; &#2348;&#2366;&#2361;&#2352; &#2344;&#2367;&#2325;&#2354;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Reverse the last action</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2367;&#2350; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; (&#2352;&#2367;&#2357;&#2352;&#2381;&#2360;) &#2352;&#2342;&#2381;&#2342; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The function of the \"Undo\" button in MS Office applications is to <b>reverse the last action</b> performed by the user. It allows you to go back in the sequence of actions and undo the most recent change made to the document or content. For example, if you delete a paragraph, apply a formatting change, or move an object, clicking the \"Undo\" button will revert that action and restore the document to the state it was in before the action was performed.</p>",
    "question_index": 136
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Computer Memory and CPU:</p><p>I. Cache memory is faster than Main Memory (RAM) because it is located closer to the CPU core and uses Static RAM (SRAM) technology.</p><p>II. The Address Bus in a computer system is bidirectional, allowing the CPU to both send and receive memory addresses from I/O devices.</p><p>III. ROM is considered \"volatile\" memory because its contents are lost when the power supply is switched off.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2324;&#2352; &#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2325;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2350;&#2369;&#2326;&#2381;&#2351; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; (RAM) &#2360;&#2375; &#2340;&#2375;&#2332;&#2364; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2351;&#2361; CPU &#2325;&#2379;&#2352; &#2325;&#2375; &#2344;&#2367;&#2325;&#2335; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2360;&#2381;&#2335;&#2376;&#2335;&#2367;&#2325; RAM (SRAM) &#2340;&#2325;&#2344;&#2368;&#2325; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2350;&#2375;&#2306; &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2348;&#2360; &#2342;&#2381;&#2357;&#2367;&#2342;&#2367;&#2358;&#2366;&#2340;&#2381;&#2350;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; CPU I/O &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2360;&#2375; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2349;&#2375;&#2332; &#2324;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. ROM &#2325;&#2379; \"&#2309;&#2360;&#2381;&#2341;&#2367;&#2352;\" &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2348;&#2367;&#2332;&#2354;&#2368; &#2348;&#2306;&#2342; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2311;&#2360;&#2325;&#2368; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2344;&#2359;&#2381;&#2335; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2324;&#2352; &#2340;&#2371;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">I, II, and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Address Bus in a computer system is unidirectional, not bidirectional. It is used by the CPU to specify the memory address of the data or instruction it wants to read from or write to. The flow of information (the address) is always from the CPU to the memory and I/O devices. The CPU dictates the address; it does not receive addresses from other components via the address bus. The Data Bus, on the other hand, is bidirectional, as data needs to flow both from memory to the CPU (read operation) and from the CPU to memory (write operation).</p><p>ROM (Read-Only Memory) is a type of non-volatile memory, not volatile. \"Non-volatile\" means that it retains its contents even when the power is turned off. This is its essential characteristic, as ROM is used to store the firmware (like the BIOS/UEFI) that the computer needs to boot up. The type of memory that is \"volatile\" (loses its contents when power is off) is RAM (Random Access Memory).</p><p></p><p>Cache memory is a crucial component that bridges the speed gap between the ultra-fast CPU and the slower main memory (RAM). Its superior speed is due to two main factors:</p><p>Proximity: It is physically located on or very close to the CPU chip, which significantly reduces the latency of data access.</p><p>Technology: Cache is made of Static RAM (SRAM), which is much faster (and more expensive) than the Dynamic RAM (DRAM) used for main memory. SRAM does not need to be constantly refreshed, unlike DRAM, leading to faster access times.</p>",
    "question_index": 137
  },
  {

    "question": "<span class=\"eqt\"><p>In a personal computer, all the software and hardware is managed by </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2352;&#2381;&#2360;&#2344;&#2354; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2324;&#2352; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2367;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Operating system</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>",

      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Operating Systems has become essential to enable the users to design applications without the knowledge of the computer's internal structure of hardware.</p><p>The Operating System manages all the Software and Hardware. Most of the time there are many different computer programmes running at the same time, they all need to access the Computers, CPU, Memory and Storage. The need of an Operating System is basically - an interface between the user and hardware.</p>",

  {
    "question": "<span class=\"eqt\"><p>Which Windows feature allows viewing and restoring previous versions of files and folders?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2347;&#2368;&#2330;&#2352; &#2347;&#2366;&#2311;&#2354;&#2379;&#2306; &#2324;&#2352; &#2347;&#2379;&#2354;&#2381;&#2337;&#2352;&#2379;&#2306; &#2325;&#2375; &#2346;&#2367;&#2331;&#2354;&#2375; &#2360;&#2306;&#2360;&#2381;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2379; &#2342;&#2375;&#2326;&#2344;&#2375; &#2324;&#2352; &#2346;&#2369;&#2344;&#2352;&#2381;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Disk Cleanup</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2360;&#2381;&#2325; &#2360;&#2347;&#2366;&#2312;</span>",
      "<span class=\"eqt\">File History</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2366;&#2311;&#2354; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360;</span>",
      "<span class=\"eqt\">System Restore</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2352;&#2375;&#2360;&#2381;&#2335;&#2379;&#2352;</span>",
      "<span class=\"eqt\">Task Scheduler</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2351; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368;&#2325;&#2352;&#2381;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>File History is a specialized backup feature in Windows designed to protect your personal files (documents, photos, music, and videos). Unlike other system tools, it focuses specifically on the data you create rather than the operating system itself.</p><p>How File History Works:</p><p>Versioning: It takes \"snapshots\" of your files at regular intervals (default is once an hour). If a file is modified, it saves the new version alongside the older ones.</p><p>Restoration: You can \"go back in time\" using a timeline interface to find a version of a file from a specific date and restore it to its original location or a new one.</p><p>Target Drive: It typically requires an external drive or a network location to store the backup data, ensuring your files are safe even if your main drive fails.</p>",
    "question_index": 144
  },

    "correct_option_id": 0,
    "solution": "<p>The default port for Telnet client connections is <b>23.</b></p><p>The default port for Telnet, a protocol for remote terminal connections, is TCP port 23, used for establishing a virtual terminal session to a device for command execution. When you use the telnet command without specifying a port, it automatically tries to connect to port 23 on the target host.</p><p></p>",

  {
    "question": "<span class=\"eqt\"><p>Match the following MS Office Keyboard Shortcuts with their respective functions:</p><p><table style=\"border-collapse:collapse;\"></p><p><tr></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List A (Shortcut)</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List B (Function)</th></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Ctrl + K</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Open the Print Preview window</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Ctrl + F2</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Insert a Hyperlink</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. F12</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Repeat the last action (Redo)</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Ctrl + Y</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Open the 'Save As' dialog box</td></p><p></tr></p><p></table></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2319;&#2350;&#2319;&#2360; &#2321;&#2347;&#2367;&#2360; &#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337; &#2358;&#2377;&#2352;&#2381;&#2335;&#2325;&#2335; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2305;:</p><p><table style=\"border-collapse:collapse;\"><tr></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Ctrl + K</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2346;&#2381;&#2352;&#2367;&#2306;&#2335; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2357;&#2354;&#2379;&#2325;&#2344; &#2357;&#2367;&#2306;&#2337;&#2379; &#2326;&#2379;&#2354;&#2375;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Ctrl + F2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2319;&#2325; &#2361;&#2366;&#2311;&#2346;&#2352;&#2354;&#2367;&#2306;&#2325; &#2337;&#2366;&#2354;&#2375;&#2306;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. F12</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2346;&#2367;&#2331;&#2354;&#2368; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2342;&#2379;&#2361;&#2352;&#2366;&#2319;&#2305; (&#2352;&#2368;&#2337;&#2370;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Ctrl + Y</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. '&#2360;&#2375;&#2357; &#2320;&#2332;&#2364;' &#2337;&#2366;&#2351;&#2354;&#2377;&#2327; &#2348;&#2377;&#2325;&#2381;&#2360; &#2326;&#2379;&#2354;&#2375;&#2306;</td></tr></table></p></span>",
    "options": [
      "<span class=\"eqt\">A-1,B-2,C-3,D-4</span><span class=\"hqt\" style=\"display:none\">A-1,B-2,C-3,D-4</span>",
      "<span class=\"eqt\">A-2,B-1,C-3,D-4</span><span class=\"hqt\" style=\"display:none\">A-2,B-1,C-3,D-4</span>",
      "<span class=\"eqt\">A-3,B-4,C-2,D-1</span><span class=\"hqt\" style=\"display:none\">A-3,B-4,C-2,D-1</span>",
      "<span class=\"eqt\">A-2,B-1,C-4,D-3</span><span class=\"hqt\" style=\"display:none\">A-2,B-1,C-4,D-3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Ctrl + K (Hyperlink): This is a universal shortcut across Word, PowerPoint, and Excel. It opens a dialog box allowing you to link selected text or objects to a website, a file, or a specific place in your current document.</p><p></p><p>Ctrl + F2 (Print Preview): While Ctrl + P opens the full Print menu, Ctrl + F2 is the classic shortcut that takes you directly to the Print Preview mode in Word and Excel, showing exactly how your document will look on paper.</p><p></p><p>F12 (Save As): This is one of the most efficient shortcuts in MS Office. Unlike Ctrl + S (which just saves changes to the current file), F12 immediately triggers the 'Save As' window, allowing you to change the file name, location, or file type (e.g., saving a Word doc as a PDF).</p><p></p><p>Ctrl + Y (Redo/Repeat): This works in two ways. If you have just used Undo (Ctrl + Z), then Ctrl + Y will \"Redo\" that action. If you haven't used Undo, it simply repeats your last formatting action (like applying bold or a specific color) to a new selection.</p>",
    "question_index": 147
  },

    "options": [
      "<span class=\"eqt\">Solid State Drive (SSD)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2377;&#2354;&#2367;&#2337; &#2360;&#2381;&#2335;&#2375;&#2335; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357; (&#2319;&#2360;&#2319;&#2360;&#2337;&#2368;)</span>",
      "<span class=\"eqt\">Hard Disk Drive (HDD)</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2352;&#2381;&#2337; &#2337;&#2367;&#2360;&#2381;&#2325; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357; (&#2319;&#2330;&#2337;&#2368;&#2337;&#2368;)</span>",
      "<span class=\"eqt\">DVD</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2368;&#2357;&#2368;&#2337;&#2368;</span>",
      "<span class=\"eqt\">Magnetic Tape</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2335;&#2375;&#2346;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>An optical storage device uses light-specifically lasers-to read and write data on a reflective disc. This technology is fundamentally different from magnetic or electronic storage.</p><p>How it Works: Pits and Lands</p><p>The surface of an optical disc like a DVD contains billions of microscopic bumps called pits and flat areas called lands.</p><p>-Reading: A low-power laser beam is shone onto the spinning disc. When the light hits a \"land,\" it reflects back cleanly to a sensor. When it hits a \"pit,\" the light scatters. The sensor translates these changes in reflection into binary data (0s and 1s).</p><p>-Writing (Burning): For recordable DVDs (DVD-R), a high-power laser physically \"burns\" or chemically alters a layer of the disc to create non-reflective spots that mimic pits.</p><p></p><p>Comparison of Storage Technologies</p><p><table style=\"border-collapse:collapse;\"></p><p><tr></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">Device</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">Technology Type</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">Mechanism</th></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">DVD (and CD/Blu-ray)</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Optical</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Uses lasers to detect reflective changes on a disc surface.</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hard Disk Drive (HDD)</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Magnetic</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Uses a moving read/write head to magnetize tiny spots on spinning platters.</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Solid State Drive (SSD)</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Electronic</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Uses flash memory (floating gate transistors) to store data as electrical charges; no moving parts.</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Magnetic Tape</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Magnetic</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Uses a magnetic read/write head on a long strip of plastic film (sequential access).</td></p><p></tr></p><p></table></p><p></p>",
    "question_index": 148
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following file extensions is commonly associated with web pages?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2347;&#2364;&#2366;&#2311;&#2354; &#2319;&#2325;&#2381;&#2360;&#2335;&#2375;&#2306;&#2358;&#2344; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2357;&#2375;&#2348; &#2346;&#2375;&#2332;&#2379;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>HTML (HyperText Markup Language) is the code that is used to structure a web page and its content. HTML is a formal recommendation by the World Wide Web Consortium (W3C) and is generally adhered to by all major web browsers, including both desktop and mobile web browsers. .html is the file extension of the HTML files. .jpg represents a JPG image file, .doc is a word file, and .pdf is an Adobe PDF file.</p>",
