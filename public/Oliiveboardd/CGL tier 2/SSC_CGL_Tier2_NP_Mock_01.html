  {
    "question": "<span class=\"eqt\"><p>Aarav has an amount of &#8377;5400. He submits 10% of his amount as school fee and then spends 30% of his remaining money in stationary. After spending the money, how much money does Aarav have?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2352;&#2357; &#2325;&#2375; &#2346;&#2366;&#2360; &#8377;5400 &#2325;&#2368; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2361;&#2376;&#2404; &#2357;&#2361; &#2309;&#2346;&#2344;&#2368; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; 10% &#2360;&#2381;&#2325;&#2370;&#2354; &#2358;&#2369;&#2354;&#2381;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2350;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2347;&#2367;&#2352; &#2358;&#2375;&#2359; &#2343;&#2344; &#2325;&#2366; 30% &#2360;&#2381;&#2335;&#2375;&#2358;&#2344;&#2352;&#2368; &#2350;&#2375;&#2306; &#2326;&#2352;&#2381;&#2330; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2326;&#2352;&#2381;&#2330; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2310;&#2352;&#2357; &#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2367;&#2340;&#2344;&#2368; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2358;&#2375;&#2359; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;3500</span><span class=\"hqt\" style=\"display:none\">&#8377;3500</span>",
      "<span class=\"eqt\">&#8377;2954</span><span class=\"hqt\" style=\"display:none\">&#8377;2954</span>",

      "<span class=\"eqt\">&#8377;3402</span><span class=\"hqt\" style=\"display:none\">&#8377;3402</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Amount with Aarav = &#8377;5400</p><p>Money left with Aarav = (100  -  30)% * (100  -  10)% * 5400 = &#8377;3402</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If mean of the observations 33, 73, 74, 75, x, 35, 83, and 33 is 60, then find the mode of the observations.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2339;&#2379;&#2306; 33, 73, 74, 75, x, 35, 83 &#2324;&#2352; 33 &#2325;&#2366; &#2350;&#2366;&#2343;&#2381;&#2351; 60 &#2361;&#2376;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2339;&#2379;&#2306; &#2325;&#2366; &#2348;&#2361;&#2369;&#2354;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">33</span><span class=\"hqt\" style=\"display:none\">33</span>",
      "<span class=\"eqt\">74</span><span class=\"hqt\" style=\"display:none\">74</span>",
      "<span class=\"eqt\">Both 33 and 74</span><span class=\"hqt\" style=\"display:none\">33 &#2324;&#2352; 74 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Other than 33 and 74</span><span class=\"hqt\" style=\"display:none\">33 &#2324;&#2352; 74 &#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366; &#2325;&#2379;&#2312; &#2309;&#2344;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Mean = (33 + 73 + 74 + 75 + x + 35 + 83 + 33)/8</p><p>60 * 8 = 406 + x</p><p>x = 480  -  406 = 74</p><p>Hence, mode of the observations is 33 and 74 both.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A four-digit number, when successively divided by 6, 8, and 9, leaves remainders of 3, 2, and 1 respectively. What could be the remainder when the number is divided by 108?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2319;&#2325; &#2330;&#2366;&#2352;-&#2309;&#2306;&#2325;&#2368;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; 6, 8 &#2324;&#2352; 9 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3, 2 &#2324;&#2352; 1 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; 108 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "question_index": 2

  {
    "question": "<span class=\"eqt\"><p>If Shikha gains 132% by selling a dress for Rs. 1856, then what would be her gain or loss percentage if she sells it for Rs. 924?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2358;&#2367;&#2326;&#2366; &#2319;&#2325; &#2337;&#2381;&#2352;&#2375;&#2360; &#2325;&#2379; &#2352;&#2369;.1856 &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2325;&#2352; 132% &#2325;&#2366; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; &#2311;&#2360;&#2375; &#2352;&#2369;.924 &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2325;&#2366; &#2354;&#2366;&#2349; &#2351;&#2366; &#2361;&#2366;&#2344;&#2367; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366; ?</p></span>",

    "correct_option_id": 1,
    "solution": "<p>Selling price = Rs. 1856</p><p>P% = 132%</p><p>Cost price of dress = 1856 * 100/232 = Rs.800</p><p>Second selling price of dress = Rs. 924</p><p>Profit% = (924  -  800) * 100/800</p><p>= 124 * 1/8 = 15.5%</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If Moong dal and toor dal of prices Rs.200 and Rs.300 per kg are mixed in the ratio 7: 20, then what is the price (in Rs.) of this mixture (correct to the nearest rupee)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 200 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; 300 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2368;&#2350;&#2340; &#2357;&#2366;&#2354;&#2368; &#2350;&#2370;&#2306;&#2327; &#2342;&#2366;&#2354; &#2324;&#2352; &#2340;&#2370;&#2352; &#2342;&#2366;&#2354; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;: 7:20 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; (&#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306;) (&#2344;&#2367;&#2325;&#2335;&#2340;&#2350; &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352;) &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>A man, a woman, and a boy can complete a work in 28 days, 40 days, and 20 days respectively. How many women (consider the nearest integer value) must assist 6 men and 10 boys to complete the work in 14/25<sup>th</sup> of a day?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2369;&#2352;&#2369;&#2359;, &#2319;&#2325; &#2350;&#2361;&#2367;&#2354;&#2366; &#2324;&#2352; &#2319;&#2325; &#2354;&#2337;&#2364;&#2325;&#2366; &#2319;&#2325; &#2325;&#2366;&#2350; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 28 &#2342;&#2367;&#2344;, 40 &#2342;&#2367;&#2344; &#2324;&#2352; 20 &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2342;&#2367;&#2344; &#2325;&#2375; 14/25&#2357;&#2375;&#2306; &#2349;&#2366;&#2327; &#2350;&#2375;&#2306; &#2325;&#2366;&#2350; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; (&#2344;&#2367;&#2325;&#2335;&#2340;&#2350; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325;&#2367;&#2340; &#2350;&#2366;&#2344; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;) &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2379; 6 &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2324;&#2352; 10 &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2352;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368;?</p></span>",

      "<span class=\"eqt\">52</span><span class=\"hqt\" style=\"display:none\">52</span>",

    "correct_option_id": 1,
    "solution": "<p>Let the total work = LCM of 28, 40, and 20 = 280 units</p><p>Efficiency of a man = 280/28 = 10 units per day</p><p>Efficiency of a woman = 280/40 = 7 units per day</p><p>Efficiency of a boy = 280/20 = 14 units per day</p><p>Let the number of women required be X.</p><p>So,</p><p>(14/25) * (6 * 10 + 7 * X + 10 * 14) = 280</p><p>60 + 7X + 140 = 500</p><p>7X = 300</p><p>X = 43 [nearest integer]</p>",

    "question": "<span class=\"eqt\"><p>Toshu invested some amount of money at simple interest at R% per annum for 3 years. If the sum was invested (R  -  4)% rate of interest for same period at simple interest, interest had fetched Rs. 864 less. What is the sum of money?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2379;&#2358;&#2369; &#2344;&#2375; R% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2346;&#2352; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2379; (R - 4)% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2346;&#2352; &#2360;&#2350;&#2366;&#2344; &#2360;&#2350;&#2351;&#2366;&#2357;&#2343;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2379;&#2340;&#2366;, &#2340;&#2379; &#2348;&#2381;&#2351;&#2366;&#2332; &#2352;&#2369;.864 &#2325;&#2350; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366;&#2404; &#2357;&#2361; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "correct_option_id": 2,

    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Marks</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Number of students (f)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>c.f</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>5 - 15</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>15 - 25</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">12</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>25 - 35</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">28</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>35 - 25</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">11</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">39</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>45 - 55</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">48</td></tr></table><p>We know that the median class is the class at middle frequency = 48/2= 24</p><p>As 24 lies in the interval 25-35, it is the median class.</p><p>Median = L + {(N/2 - c.f)/f} * h</p><p>= 25 + {(48/2 - 20)/8}*10</p><p>=25 + (4/8)*10</p><p>= 25 + 5</p><p>= 30</p>",

    "question": "<span class=\"eqt\"><p>Read the following passage and answer the items that follow. Your answer to these items should be based on the passage only.</p><p>Speech recognition has significant race and gender biases. As with facial recognition, web searches, and even soap dispensers, speech recognition is another form of AI that performs worse for women and non-white people. It's doubtful if these biases are intentional, but they are still problematic. Hence, the use of speech recognition has been falling.</p><p>With reference to the above passage, the following assumptions have been made:</p><p>1. Facial recognition performs worse for women and non-white people.</p><p>2. Speech recognition works on AI.</p><p>3. People reduce usage of problematic things.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404; &#2310;&#2346;&#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2375;&#2357;&#2354; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p>&#2357;&#2366;&#2325;&#2381; &#2346;&#2361;&#2330;&#2366;&#2344; &#2350;&#2375;&#2306; &#2344;&#2360;&#2381;&#2354; &#2324;&#2352; &#2354;&#2367;&#2306;&#2327; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2327;&#2381;&#2352;&#2361; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2330;&#2375;&#2361;&#2352;&#2375; &#232     "question": "<span class=\"eqt\"><p>When 20% of X is subtracted from 80% of Y then it becomes 30% of X. What is the value of (2X + Y) : (2X - Y) ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; Y &#2325;&#2375; 80% &#2350;&#2375;&#2306; &#2360;&#2375; X &#2325;&#2366; 20% &#2328;&#2335;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2351;&#2361; X &#2325;&#2366; 30% &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; (2X + Y) : (2X - Y) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">16 : 13</span><span class=\"hqt\" style=\"display:none\">16 : 13</span>",
      "<span class=\"eqt\">11 : 8</span><span class=\"hqt\" style=\"display:none\">11 : 8</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>20% of X = 0.2 X, 80% of Y = 0.8Y and 30% of X = 0.3X</p><p>0.8Y - 0.2X = 0.3X</p><p>0.8Y = 0.5X</p><p>X : Y = 8 : 5</p><p>Hence, X = 8a and Y = 5a.</p><p>(2X + Y) : (2X - Y) = (16a + 5a) : (16a - 5a) = 21a : 11a = 21 : 11</p>",

    "question": "<span class=\"eqt\"><p>Which two signs should be interchanged to make the given equation correct?</p><p>87 + {[15 &div; 3]  -  6} x 13 = 90</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>87 + {[15 &div; 3] - 6} x 13 = 90</p></span>",

      "<span class=\"eqt\">&div; and x</span><span class=\"hqt\" style=\"display:none\">&div; &#2324;&#2352; x</span>",

    "question": "<span class=\"eqt\"><p>The following question consists of a statement and two contradictory arguments. Decide which of the argument is strong.</p><p>Should house rent allowances be provided by all private sector employers?</p><p>I. No, apart from the basic salary, gratuity and provident fund is included in a private sector employee's salary.</p><p>II. Yes, it would take a big financial stress off the shoulders of the employees as a major portion of their monthly salary is spent on house rent.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2341;&#2344; &#2324;&#2352; &#2342;&#2379; &#2357;&#2367;&#2352;&#2379;&#2343;&#2366;&#2340;&#2381;&#2350;&#2325; &#2340;&#2352;&#2381;&#2325; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306; &#2325;&#2367; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2340;&#2352;&#2381;&#2325; &#2350;&#2332;&#2348;&#2370;&#2340; &#2361;&#2376;&#2404;</p><p>&#2325;&#2381;&#2351;&#2366; &#2360;&#2349;&#2368; &#2344;&#2367;&#2332;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2344;&#2367;&#2351;&#2379;&#2325;&#2381;&#2340;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2325;&#2366;&#2344; &#2325;&#2367;&#2352;&#2366;&#2351;&#2366; &#2349;&#2340;&#2381;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>I. &#2344;&#2361;&#2368;&#2306;, &#2350;&#2370;&#2354; &#2357;&#2375;&#2340;&#2344; &#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366;, &#2313;&#2346;&#2342;&#2366;&#2344; &#2324;&#2352; &#2349;&#2357;&#2367;&#2359;&#2381;&#2351; &#2344;&#2367;&#2343;&#2367; &#2344;&#2367;&#2332;&#2368; &#2325;&#2381;&#2359;&#       "<span class=\"eqt\">Ministers are individually accountable to the Prime Minister</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2332;&#2357;&#2366;&#2348;&#2342;&#2375;&#2361; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Ministers are removable only by impeachment</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2325;&#2375;&#2357;&#2354; &#2350;&#2361;&#2366;&#2349;&#2367;&#2351;&#2379;&#2327; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2361;&#2368; &#2346;&#2342; &#2360;&#2375; &#2361;&#2335;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Council of Ministers is answerable to the Rajya Sabha</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2346;&#2352;&#2367;&#2359;&#2342; &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2313;&#2340;&#2381;&#2340;&#2352;&#2342;&#2366;&#2351;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Collective responsibility is the cornerstone of the parliamentary system of government. In India, this principle is enshrined in Article 75(3) of the Constitution, which states that the Council of Ministers shall be collectively responsible to the Lok Sabha (the lower house).</p><p>It means that the Government must maintain a majority in the Lok Sabha as a condition of its survival.</p><p>The collective responsibility under Article 75 of the Constitution of India has two meanings:</p><p>(I) All members of a Government are unanimous in support of its policies,</p><p>(II) The ministers, who had an opportunity to speak for or against the policies in the cabinet are thereby personally and morally responsible for its success and failure.</p><p>What it means in practice:</p><p>Unanimity: Once a decision is taken in a Cabinet meeting, it becomes a joint decision of the entire Council of Ministers.</p><p>Public Support: Every minister is duty-bound to support and defend that decision both inside and outside Parliament. A minister cannot criticize a government decision in public.</p><p>Resignation: If a minister disagrees with a Cabinet decision and is not prepared to defend it, he or she must resign. A famous example is Dr. B.R. Ambedkar's resignation due to differences over the Hindu Code Bill.</p><p>\"Swim or Sink Together\": If the Lok Sabha passes a No-Confidence Motion against the Council of Ministers, the entire ministryincluding ministers from the Rajya Sabhamust resign.</p>",
    "question_index": 105
  },
  {
    "question": "<span class=\"eqt\"><p>Arrange the following Himalayan peaks from West to East:</p><p>1.Nanda Devi</p><p>2.Annapurna</p><p>3.Mount Everest</p><p>4.Namcha Barwa</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351;&#2368; &#2330;&#2379;&#2335;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357; &#2325;&#2368; &#2323;&#2352; &#2325;&#2381;&#2352;&#2350;&#2348;&#2342;&#2381;&#2343; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2344;&#2306;&#2342;&#2366; &#2342;&#2375;&#2357;&#2368;</p><p>2. &#2309;&#2344;&#2381;&#2344;&#2346;&#2370;&#2352;&#2381;&#2339;&#2366;</p><p>3. &#2350;&#2366;&#2313;&#2306;&#2335; &#2319;&#2357;&#2352;&#2375;&#2360;&#2381;&#2335;</p><p>4. &#2344;&#2366;&#2350;&#2330;&#2366; &#2348;&#2352;&#2357;&#2366;</p></span>",
    "options": [
      "<span class=\"eqt\">1-2-3-4</span><span class=\"hqt\" style=\"display:none\">1-2-3-4</span>",
      "<span class=\"eqt\">1-3-2-4</span><span class=\"hqt\" style=\"display:none\">1-3-2-4</span>",
      "<span class=\"eqt\">2-1-3-4</span><span class=\"hqt\" style=\"display:none\">2-1-3-4</span>",
      "<span class=\"eqt\">1-4-2-3</span><span class=\"hqt\" style=\"display:none\">1-4-2-3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The sequence from West to East is: Nanda Devi (Uttarakhand), Annapurna (Nepal), Everest (Nepal/Tibet) and Namcha Barwa (Arunachal/Tibet border).</p><p>The Syntaxial Bends occur at the western (Nanga Parbat) and eastern (Namcha Barwa) extremities of the Himalayas.</p><p>List of Himalayan Peaks from west to east direction includes: Nanda Devi, followed by Dhaulagiri, Annapurna, Manasalu, Mount Everest, Makalu, Kanchenjunga, and finally Namcha Barwa.</p><p>Namcha Barwa is considered the easternmost section of the Himalaya in southeastern Tibet, making it the eastern anchor of the entire mountain chain.</p>",
    "question_index": 106
  },
  {
    "question": "<span class=\"eqt\"><p>Regarding the powers of the Governor and the legislative process, which statements are correct?</p><p>I. If a Governor withholds assent to a Bill, they must return it to the State Legislature as soon as possible.</p><p>II. If the Assembly passes the same Bill again, the Governor is constitutionally required to give their assent.</p><p>III. In a 2025 ruling, the Supreme Court declared that 10 long-delayed Bills from Tamil Nadu were \"deemed to have received assent.\"</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2357;&#2367;&#2343;&#2366;&#2351;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;, &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p><p>I. &#2351;&#2342;&#2367; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2346;&#2352; &#2309;&#2346;&#2344;&#2368; &#2360;&#2361;&#2350;&#2340;&#2367; &#2352;&#2379;&#2325; &#2354;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2351;&#2341;&#2366;&#2358;&#2368;&#2328;&#2381;&#2352; &#2313;&#2360;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354; &#2325;&#2379; &#2357;&#2366;&#2346;&#2360; &#2349;&#2375;&#2332;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;&#2404;</p><p>II. &#2351;&#2342;&#2367; &#2357;&#2367;&#2343;&#2366;&#2344;&#2360;&#2349;&#2366; &#2313;&#2360;&#2368; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2379; &#2346;&#2369;&#2344;&#2307; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2346;&#2344;&#2368; &#2360;&#2361;&#2350;&#2340;&#2367; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2366;&#2343;&#2381;&#2351; &#2361;&#2376;&#2306;&#2404;</p><p>III. 2025 &#2325;&#2375; &#2319;&#2325; &#2347;&#2376;&#2360;&#2354;&#2375; &#2350;&#2375;&#2306;, &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2344;&#2375; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2368; &#2325;&#2367; &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2325;&#2375; 10 &#2354;&#2306;&#2348;&#2375; &#2360;&#2350;&#2351; &#2360;&#2375; &#2354;&#2306;&#2348;&#2367;&#2340; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;&#2379;&#2306; &#2325;&#2379; \"&#2360;&#2361;&#2350;&#2340;&#2367; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2350;&#2366;&#2344; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;\"</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2324;&#2352; &#2340;&#2371;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II, and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Statement I: Correct. Article 200 says the Governor cannot simply \"sit\" on a Bill; they must return it if they don't sign it.</p><p>Statement II: Correct. The Constitution clearly states that a Governor \"shall not withhold assent\" if the Bill is sent back a second time.</p><p>Statement III: Correct. On April 8, 2025, the Supreme Court took the historic step of considering the 10 Tamil Nadu Bills as \"approved\" because the Governor had delayed them for years.</p><p>In a landmark ruling on April 8, 2025, a bench of Justices J.B. Pardiwala and R. Mahadevan found the Governor's delay \"erroneous\" and \"illegal.\" For the first time, the Court used Article 142 to grant \"deemed assent\" to 10 Bills to ensure \"complete justice\" and prevent a collapse of governance.</p>",
    "question_index": 107
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements about 'Isotopes' and 'Isobars' is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2311;&#2360;&#2379;&#2335;&#2379;&#2346; &#2324;&#2352; &#2310;&#2311;&#2360;&#2379;&#2348;&#2366;&#2352; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Isotopes have the same mass number but different atomic numbers.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325;&#2379;&#2306; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325; &#2349;&#2367;&#2344;&#2381;&#2344;-&#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Isobars have the same chemical properties because they have the same number of protons.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2342;&#2366;&#2348;&#2368;&#2351; &#2346;&#2335;&#2381;&#2335;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2327;&#2369;&#2339; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2313;&#2344;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2379;&#2335;&#2377;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Isotopes have the same number of protons but different numbers of neutrons.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2379;&#2335;&#2377;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Carbon-14 and Nitrogen-14 are examples of isotopes.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344;-14 &#2324;&#2352; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344;-14 &#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Isotopes are atoms of the same chemical element. Because they are the same element, they must have the same number of protons (which defines the atomic number, Z).</p><p>However, they have different numbers of neutrons in their nuclei. This difference in neutron count results in a different mass number (A = protons + neutrons).</p><p>For example, Carbon-12 and Carbon-14 are isotopes of carbon; both have 6 protons, but Carbon-12 has 6 neutrons while Carbon-14 has 8 neutrons.</p>",
    "question_index": 108
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following groups of plants is commonly referred to as the 'Amphibians of the Plant Kingdom' because they live on soil but depend on water for sexual reproduction?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; '&#2346;&#2366;&#2342;&#2346; &#2332;&#2327;&#2340; &#2325;&#2375; &#2313;&#2349;&#2351;&#2330;&#2352;' &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2357;&#2375; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2346;&#2352; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306; &#2354;&#2375;&#2325;&#2367;&#2344; &#2354;&#2376;&#2306;&#2327;&#2367;&#2325; &#2346;&#2381;&#2352;&#2332;&#2344;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2366;&#2344;&#2368; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Thallophyta</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2376;&#2354;&#2379;&#2347;&#2366;&#2311;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Bryophyta</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2366;&#2351;&#2379;&#2347;&#2366;&#2311;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Pteridophyta</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2352;&#2367;&#2337;&#2379;&#2347;&#2366;&#2311;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Gymnosperms</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2367;&#2350;&#2381;&#2344;&#2379;&#2360;&#2381;&#2346;&#2352;&#2381;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Bryophytes (e.g., Mosses and Liverworts) are called amphibians of the plant kingdom. While they are terrestrial plants, they lack a vascular system and require a thin film of water for their flagellated sperm to swim to the egg.</p><p>Further Insights:</p><p>Thallophyta: Simplest plants (Algae) with no differentiated body parts; mostly aquatic.</p><p>Pteridophyta: The first terrestrial plants to possess vascular tissues (Xylem and Phloem), like Ferns.</p><p>Gymnosperms: \"Naked seed\" plants (e.g., Pine, Cycas) where seeds are not enclosed in a fruit.</p><p>Angiosperms: Flowering plants where seeds are enclosed within ovaries (fruits).</p>",
    "question_index": 109
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Inter-State Council (ISC):</p><p>i. It is a constitutional body under Article 263 of the Constitution.</p><p>ii. It is chaired by the Prime Minister of India.</p><p>iii. Its recommendations are binding on the Union and the States.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2306;&#2340;&#2352;&#2352;&#2366;&#2332;&#2381;&#2351;&#2368;&#2351; &#2346;&#2352;&#2367;&#2359;&#2342; (&#2310;&#2312;&#2319;&#2360;&#2360;&#2368;) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. &#2351;&#2361; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 263 &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2319;&#2325; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2344;&#2367;&#2325;&#2366;&#2351; &#2361;&#2376;&#2404;</p><p>ii. &#2311;&#2360;&#2325;&#2368; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;&#2340;&#2366; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>iii. &#2311;&#2360;&#2325;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358;&#2375;&#2306; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2346;&#2352; &#2348;&#2366;&#2343;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i and ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">ii and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement i: It is a constitutional body under Article 263 (Correct)</p><p>The Inter-State Council (ISC) is established under Article 263 of the Indian Constitution. It is a constitutional body because its provision is explicitly mentioned in the Constitution, although it is not a \"permanent\" body in the sense that the President can establish it whenever he or she deems it necessary for the public interest. It was first set up in 1990 following the recommendations of the Sarkaria Commission.</p><p></p><p>Statement ii: It is chaired by the Prime Minister (Correct)</p><p>The Prime Minister of India serves as the ex-officio Chairman of the Inter-State Council. The composition includes:</p><p>Chairman: Prime Minister.</p><p>Members: Chief Ministers of all States and Union Territories with Legislative Assemblies, Administrators of UTs without Assemblies, and Governors of States under President's Rule.</p><p>Cabinet Ministers: Six Union Cabinet Ministers (including the Home Minister) nominated by the Prime Minister.</p><p></p><p>Statement iii: Its recommendations are binding (Incorrect)</p><p>The Inter-State Council is primarily an advisory and recommendatory body. Its function is to inquire into, discuss, and advise on subjects of common interest or disputes between states. Unlike the Supreme Court's decisions under Article 131, the recommendations of the ISC are not binding on either the Union or the State governments.</p>",
    "question_index": 110
  },
  {
    "question": "<span class=\"eqt\"><p>The traditional musical instruments Tungbuk and Pumtong Pulit, which recently received Geographical Indication (GI) registration, belong to which tribal community?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2366;&#2354; &#2361;&#2368; &#2350;&#2375;&#2306; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2360;&#2306;&#2325;&#2375;&#2340; (&#2332;&#2368;&#2310;&#2312;) &#2346;&#2306;&#2332;&#2368;&#2325;&#2352;&#2339; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2357;&#2366;&#2342;&#2381;&#2351; &#2351;&#2306;&#2340;&#2381;&#2352; &#2340;&#2369;&#2306;&#2327;&#2348;&#2369;&#2325; &#2324;&#2352; &#2346;&#2369;&#2350;&#2335;&#2379;&#2306;&#2327; &#2346;&#2369;&#2354;&#2367;&#2340; &#2325;&#2367;&#2360; &#2310;&#2342;&#2367;&#2357;&#2366;&#2360;&#2368; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lepcha</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2375;&#2346;&#2330;&#2366;</span>",
      "<span class=\"eqt\">Santhal</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2341;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Gond</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Bhutia</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2335;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Government of India granted Geographical Indication (GI) registration for two traditional Lepcha musical instruments - Tungbuk and Pumtong Pulit - giving a major cultural boost to the Lepcha community of Sikkim. They were officially registered under the Musical Instrument category of the Geographical Indication Registry, Government of India, on the 5th of November, 2025.</p><p>The GI registration certificates were formally presented during the 1st Tribal Business Conclave held in New Delhi organised by the Ministries of Culture, Tribal Affairs, and Commerce & Industry. The Tungbuk is a three-string instrument, while the Pumtong Pulit is a bamboo flute. Both are integral to Lepcha folk music and hold deep cultural and spiritual significance. Ugen Palzor Lepcha and Namgyal Lepcha, who had submitted the GI tag applications for the Sikkim Lepcha Tungbuk and Sikkim Lepcha Pumtong Pulit respectively, received the certificates at the event.</p><p></p>",
    "question_index": 111
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following portals has been launched by the Ministry of MSME to facilitate the registration of Micro, Small, and Medium Enterprises through a fully online and paperless process?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350;, &#2354;&#2328;&#2369; &#2324;&#2352; &#2350;&#2343;&#2381;&#2351;&#2350; &#2313;&#2342;&#2381;&#2351;&#2350;&#2379;&#2306; &#2325;&#2375; &#2346;&#2306;&#2332;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2324;&#2352; &#2325;&#2366;&#2327;&#2332; &#2352;&#2361;&#2367;&#2340; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2360;&#2369;&#2327;&#2350; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2354;&#2328;&#2369; &#2319;&#2357;&#2306; &#2350;&#2343;&#2381;&#2351;&#2350; &#2313;&#2342;&#2381;&#2351;&#2350; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2379;&#2352;&#2381;&#2335;&#2354; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">e-Shram</span><span class=\"hqt\" style=\"display:none\">&#2312;-&#2358;&#2381;&#2352;&#2350;</span>",
      "<span class=\"eqt\">CHAMPIONS</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2376;&#2306;&#2346;&#2367;&#2351;&#2344;</span>",
      "<span class=\"eqt\">SAMARTH</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2352;&#2381;&#2341;</span>",
      "<span class=\"eqt\">Udyam</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2342;&#2381;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Udyam Registration portal is the official platform for MSME registration. It is integrated with income tax and GST systems, allowing for automatic data verification.</p><p>The Ministry of MSME launched the Udyam Registration portal on July 1, 2020, to provide a fully online, paperless, and self-declaration-based process for the registration of Micro, Small, and Medium Enterprises. The process requires no documentation uploads and is free of cost.</p><p></p><p></p><p>Why the other options are incorrect:</p><p>e-Shram: This is a portal launched by the Ministry of Labour & Employment to create a national database of unorganized workers, not for registering MSME businesses.</p><p>CHAMPIONS: This is also an initiative of the MSME Ministry, but it is a grievance redressal and management portal. It stands for \"Creation and Harmonious Application of Modern Processes for Increasing the Output and National Strength.\" It helps MSMEs in various ways but is not the primary registration platform.</p><p>SAMARTH: This is a scheme of the Ministry of Textiles aimed at capacity building and skill development in the textile sector.</p>",
    "question_index": 112
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about 'El Nino Southern Oscillation' (ENSO):</p><p>1.During El Nino, the trade winds weaken, leading to warm water moving towards the coast of South America.</p><p>2.La Nina typically results in better-than-normal monsoon rainfall in India.</p><p>3.The Indian Ocean Dipole (IOD) always acts in synchronization with ENSO.</p><p>Which of the statements above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2319;&#2354; &#2344;&#2368;&#2344;&#2379; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2368; &#2342;&#2379;&#2354;&#2344;' (ENSO) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2319;&#2354; &#2344;&#2368;&#2344;&#2379; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2367;&#2325; &#2361;&#2357;&#2366;&#2319;&#2305; &#2325;&#2350;&#2332;&#2379;&#2352; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2327;&#2352;&#2381;&#2350; &#2346;&#2366;&#2344;&#2368; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2309;&#2350;&#2375;&#2352;&#2367;&#2325;&#2366; &#2325;&#2375; &#2340;&#2335; &#2325;&#2368; &#2323;&#2352; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2354;&#2366; &#2344;&#2368;&#2344;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2360;&#2375; &#2348;&#2375;&#2361;&#2340;&#2352; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2357;&#2352;&#2381;&#2359;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3. &#2361;&#2367;&#2306;&#2342; &#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352; &#2342;&#2381;&#2357;&#2367;&#2343;&#2381;&#2352;&#2369;&#2357; (IOD) &#2361;&#2350;&#2375;&#2358;&#2366; ENSO &#2325;&#2375; &#2360;&#2366;&#2341; &#2340;&#2366;&#2354;&#2350;&#2375;&#2354; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct.</p><p>Statement 3 is incorrect because the Indian Ocean Dipole (IOD) is a separate phenomenon from ENSO and does not always act in synchronization with it.</p><p>1 is Correct. This statement accurately describes the core mechanism of an El Nio event. Under normal conditions, strong trade winds blow from east to west across the tropical Pacific, piling up warm surface water in the western Pacific. During El Nio, these trade winds weaken or even reverse. This allows the accumulated warm water to flow back eastward, towards the coast of South America, suppressing the usual upwelling of cold, deep-ocean water.</p><p>2 is Correct. La Nia is the opposite phase of ENSO, characterized by stronger-than-normal trade winds. This intensifies the piling up of warm water in the western Pacific Ocean (closer to the Indian subcontinent). The resulting atmospheric circulation patterns generally strengthen the Indian summer monsoon, often leading to better-than-normal or above-average rainfall across India.</p><p>3 is Incorrect. The Indian Ocean Dipole (IOD) is an ocean-atmosphere phenomenon that occurs in the Indian Ocean, distinct from ENSO which occurs in the Pacific Ocean. While statistical analysis shows a correlation between the two phenomena (e.g., El Nio often coincides with a positive IOD), they do not always act in synchronization. The IOD can occur independently of an El Nio or La Nia event, and their combined effect on the Indian monsoon can be complex. For instance, a strong positive IOD can sometimes mitigate the drought-inducing effects of an El Nio.</p><p>Further insights:</p><p>El Nio translates to \"The Boy Child\" in Spanish, referring to the Christ Child as it often peaks around December.</p><p>Peru experiences heavy floods during El Nio years, while Australia and Indonesia face droughts.</p>",
    "question_index": 113
  },
  {
    "question": "<span class=\"eqt\"><p>Under which Article of the Constitution of India does the President have the power to consult the Supreme Court on a question of law or fact that is of significant public importance?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2375; &#2340;&#2361;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357; &#2325;&#2375; &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2343;&#2367; &#2351;&#2366; &#2340;&#2341;&#2381;&#2351; &#2360;&#2306;&#2348;&#2306;&#2343;&#2368; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2346;&#2352; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2360;&#2375; &#2346;&#2352;&#2366;&#2350;&#2352;&#2381;&#2358; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Article 131</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 131</span>",
      "<span class=\"eqt\">Article 137</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 137</span>",
      "<span class=\"eqt\">Article 143</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 143</span>",
      "<span class=\"eqt\">Article 145</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 145</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Article 143 of the Constitution of India grants the President the power to consult the Supreme Court. This power is known as the Advisory Jurisdiction of the Supreme Court.</p><p>The article specifies two categories of matters on which the President can seek the Supreme Court's opinion:</p><p>-On any question of law or fact of public importance that has arisen or is likely to arise. In this case, the Supreme Court may or may not tender its opinion to the President.</p><p>-On any dispute arising out of any pre-constitution treaty, agreement, covenant, sanad, or other similar instruments. In this case, it is obligatory for the Supreme Court to tender its opinion to the President.</p><p>In both cases, the opinion expressed by the Supreme Court is only advisory and not a judicial pronouncement. Hence, it is not binding on the President.</p><p></p><p>Other options:</p><p>Article 131: This deals with the Original Jurisdiction of the Supreme Court, which covers disputes between the Government of India and the states, or between states.</p><p>Article 137: This grants the Supreme Court the power to review its own judgements or orders (Review Jurisdiction).</p><p>Article 145: This deals with the power of the Supreme Court to make its own rules of court for regulating its practice and procedure.</p><p>Further Insights:</p>",
    "question_index": 114
  },
  {
    "question": "<span class=\"eqt\"><p>Which statement about Firoz Shah Tughlaq (r. 1351 - 1388) is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2367;&#2352;&#2379;&#2332; &#2358;&#2366;&#2361; &#2340;&#2369;&#2327;&#2354;&#2325; (&#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; 1351 - 1388) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">He abolished jizya on all peasantry to encourage cultivation.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2325;&#2371;&#2359;&#2367; &#2325;&#2379; &#2346;&#2381;&#2352;&#2379;&#2340;&#2381;&#2360;&#2366;&#2361;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2349;&#2368; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2346;&#2352; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2332;&#2332;&#2367;&#2351;&#2366; &#2325;&#2352; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">He shifted the capital from Delhi to Daulatabad.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2325;&#2379; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2375; &#2342;&#2380;&#2354;&#2340;&#2366;&#2348;&#2366;&#2342; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">He levied jizya on Brahmanas explicitly for the first time under the Delhi Sultanate.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2325;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2368; &#2348;&#2366;&#2352; &#2348;&#2381;&#2352;&#2366;&#2361;&#2381;&#2350;&#2339;&#2379;&#2306; &#2346;&#2352; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2332;&#2332;&#2381;&#2351;&#2366; &#2325;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">He created the Diwan-i-Riyasat to enforce price controls.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2368;&#2357;&#2366;&#2344;-&#2319;-&#2352;&#2367;&#2351;&#2366;&#2360;&#2340; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Under earlier Sultans, Brahmanas were generally exempt from Jizya (a poll tax on non-Muslims) as they were considered \"men of learning\" and non-combatants. However, Firoz Shah Tughlaq was a deeply orthodox ruler who sought to bring the states administration strictly in line with Sharia (Islamic law). He argued that since the Sharia did not explicitly exempt Brahmanas, they must pay the tax. This was the first time in the history of the Delhi Sultanate that Brahmanas were forced to pay Jizya.</p><p></p><p>- \"He abolished jizya on all peasantry\": Incorrect; Firoz Shah upheld jizya collection.</p><p>- \"Shifted capital to Daulatabad\": Action of Muhammad bin Tughlaq, not Firoz.</p><p>- \"Created Diwan-i-Riyasat\": The market-control department is associated with Alauddin Khalji, not Firoz.</p><p>Further Insights:</p><p>- Firoz Shah established the Diwan-i-Bandagan for managing slaves and Diwan-i-Khairat for charity.</p><p>- He repaired older monuments (e.g., Ashokan pillars were transported and re-erected in Delhi).</p>",
    "question_index": 115
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is considered a 'Secondary Pollutant' because it is not emitted directly but forms in the atmosphere?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; '&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2346;&#2381;&#2352;&#2342;&#2370;&#2359;&#2325;' &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2351;&#2361; &#2360;&#2368;&#2343;&#2375; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2366; &#2348;&#2354;&#2381;&#2325;&#2367; &#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2350;&#2375;&#2306; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Carbon Monoxide (CO)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2350;&#2379;&#2344;&#2379;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; (CO)</span>",
      "<span class=\"eqt\">Ground-level Ozone (O<sub>3</sub>)</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2350;&#2368;&#2344;&#2368; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2323;&#2332;&#2379;&#2344; (O&#8323;)</span>",
      "<span class=\"eqt\">Sulfur Dioxide (SO<sub>2</sub></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2354;&#2381;&#2347;&#2352; &#2337;&#2366;&#2311;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; (SO&#8322;)</span>",
      "<span class=\"eqt\">Particulate Matter (PM 10)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2339; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; (&#2346;&#2368;&#2319;&#2350; 10)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Ground-level ozone is formed by chemical reactions between oxides of nitrogen (NOx) and volatile organic compounds (VOC) in the presence of sunlight.</p><p>Primary Pollutants: These are substances that are emitted directly into the atmosphere from a source. Examples include:</p><p>Carbon Monoxide (CO) from incomplete combustion.</p><p>Sulfur Dioxide (SO&#8322;) from burning fossil fuels containing sulfur.</p><p>Particulate Matter (PM) from dust, smoke, and industrial processes.</p><p>Nitrogen oxides (NOx) from vehicle exhaust.</p><p>Secondary Pollutants: These are pollutants that are not emitted directly from a source. Instead, they form in the atmosphere when primary pollutants react with each other or with other naturally occurring substances in the presence of sunlight.</p><p></p><p></p><p>Further Insights:</p><p>While ozone in the stratosphere protects us from UV rays, ground-level ozone is a major component of smog and is harmful to human health.</p><p>PAN (Peroxyacetyl Nitrate) is another common example of a secondary pollutant.</p>",
    "question_index": 116
  },

    "question": "<span class=\"eqt\"><p>Consider the following pairs:</p><p><table style=\"border-collapse:collapse;\"></p><p><tr></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">Movement</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">Leader</th></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1.Indigo Revolt</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Digambar Biswas</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2.Santhal Rebellion</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sidhu and Kanhu</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3.Deccan Riots</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Kunwar Singh</td></p><p></tr></p><p></table></p><p>Which of the pairs are correctly matched?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2379;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p><table style=\"border-collapse:collapse;\"><tr></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2344;&#2368;&#2354; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2342;&#2367;&#2327;&#2366;&#2306;&#2348;&#2352; &#2348;&#2367;&#2360;&#2381;&#2357;&#2366;&#2360;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2360;&#2306;&#2341;&#2366;&#2354; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2367;&#2343;&#2370; &#2324;&#2352; &#2325;&#2366;&#2344;&#2381;&#2361;&#2370;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2342;&#2325;&#2381;&#2325;&#2344; &#2342;&#2306;&#2327;&#2375;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2369;&#2306;&#2357;&#2352; &#2360;&#2367;&#2306;&#2361;</td></tr></table></p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2375; &#2360;&#2361;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2350;&#2375;&#2354; &#2326;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",

    "solution": "<p>Indigo Revolt (Blue Mutiny)</p><p>This was a peasant uprising against the British planters who forced farmers to grow indigo under extremely exploitative terms.</p><p>Leaders: The brothers Digambar Biswas and Bishnu Biswas provided the initial leadership.</p><p>Impact: It was one of the most successful revolts, immortalized in the play Neel Darpan by Dinabandhu Mitra.</p><p></p><p>Santhal Rebellion (Santhal Hool)</p><p>This was a major tribal revolt against the Diku (outsiders like moneylenders and British officials).</p><p>Leaders: Four brothers-Sidhu, Kanhu, Chand, and Bhairav-claimed they had divine blessings to end British rule.</p><p>Impact: Though suppressed with great violence, it led to the creation of the Santhal Pargana district to protect tribal interests.</p><p></p><p>The Deccan Riots were a series of spontaneous peasant uprisings against the high land revenue of the Ryotwari system and the exploitation by moneylenders (Sahukars).</p><p>Leader: There was no single prominent leader like Kunwar Singh. It was a mass social boycott that turned into a revolt.</p><p>Kunwar Singh's Role: Kunwar Singh was actually a prominent leader of the Revolt of 1857 from Jagdispur (Bihar). He is famous for leading the struggle against the British in the Bihar region during the Great Mutiny.</p>",

    "question": "<span class=\"eqt\"><p>In June 2025, India reached a major climate milestone by achieving what percentage of its total installed power capacity from non-fossil fuel sources?</p></span><span class=\"hqt\" style=\"display:none\">&#2332;&#2370;&#2344; 2025 &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2332;&#2368;&#2357;&#2366;&#2358;&#2381;&#2350; &#2312;&#2306;&#2343;&#2344; &#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366; &#2309;&#2344;&#2381;&#2351; &#2360;&#2381;&#2352;&#2379;&#2340;&#2379;&#2306; &#2360;&#2375; &#2309;&#2346;&#2344;&#2368; &#2325;&#2369;&#2354; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2325;&#2375; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2367; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2368;?</span>",
    "options": [
      "<span class=\"eqt\">50%</span><span class=\"hqt\" style=\"display:none\">50%</span>",

      "<span class=\"eqt\">40%</span><span class=\"hqt\" style=\"display:none\">40%</span>",
      "<span class=\"eqt\">60%</span><span class=\"hqt\" style=\"display:none\">60%</span>"

    "correct_option_id": 0,
    "solution": "<p>India has achieved a landmark in its energy transition journey by reaching 50% of its installed electricity capacity from non-fossil fuel sources-five years ahead of the target set under its Nationally Determined Contributions (NDCs) to the Paris Agreement.</p><p>This significant milestone was achieved five years ahead of 2030 target.</p><p>India's achievement of 50% non-fossil fuel installed capacity ahead of the target year is a testament to its ambition, innovation, and commitment to sustainable development. It affirms that development and decarbonisation are not contradictory goals, but can in fact reinforce each other.</p><p></p><p></p><p></p><p></p>",

3 &#2325;&#2352;&#2379;&#2337;&#2364; &#2325;&#2352; &#2342;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",

    "correct_option_id": 2,
    "solution": "<p>Lakhpati Didi initiative is to empower and enable Self-Help Groups (SHG) Women, earn a minimum income of Rupees one lakh per annum on a sustainable basis, with an average monthly income of at least Rs. 10,000 (Rupees Ten Thousand) sustained for at least 4 agricultural seasons and/or business cycles.</p><p>While presenting the Interim Budget 2024-25 in Parliament, Union Minister for Finance & Corporate Affairs, Smt. Nirmala Sitharaman announced that it has been decided to enhance the target for Lakhpati Didi from  2 crore to 3 crore.</p><p>There is no separate budget allocated for the Lakhpati Didi initiative. All activities of Lakhpati Didi initiative for e.g. training and capacity building, financial assistance including seed funding, are funded under the DAY-NRLM Scheme.</p><p></p><p></p>",

    "question": "<span class=\"eqt\"><p>Given below are two statements marked as Assertion and Reason. Choose the correct option.</p><p>Assertion (A): An increase in repo rate may reduce inflation.</p><p>Reason (R): It increases borrowing cost and reduces money supply.</p><p></p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2325;&#2341;&#2344; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2352;&#2375;&#2346;&#2379; &#2342;&#2352; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2325;&#2366;&#2352;&#2339; (R): &#2311;&#2360;&#2360;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2375;&#2344;&#2375; &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true and R explains A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2324;&#2352; R, A &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true but R does not explain A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is false but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Assertion (A): An increase in repo rate may reduce inflation (True)</p><p>The Repo Rate is the interest rate at which the central bank (like the RBI in India) lends money to commercial banks. It is the primary tool used in Contractonary Monetary Policy to control rising prices (inflation).</p><p>When inflation exceeds the target range, the central bank raises the repo rate to \"cool down\" the economy.</p><p>Higher rates discourage excess spending and investment, which leads to a decrease in the general price level over time.</p><p></p><p>Reason (R): It increases borrowing cost and reduces money supply (True)</p><p>This statement correctly identifies the transmission mechanism (how the change actually works):</p><p>Cost of Funds: When the repo rate increases, it becomes more expensive for commercial banks to borrow from the central bank.</p><p>Passing the Cost: Banks pass this increased cost to their customers by raising interest rates on home, car, and personal loans.</p><p>Reduced Liquidity: As borrowing becomes costlier, people and businesses take fewer loans. This directly reduces the money supply (liquidity) circulating in the market.</p><p>Lower Demand: With less money in hand and higher EMIs, consumer demand for goods and services drops. When demand falls, the pressure on prices eases, thereby reducing inflation.</p>",
    "question_index": 120
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding cell organelles:</p><p>I. Mitochondria and Plastids are known as semi-autonomous organelles because they contain their own DNA.</p><p>II. Ribosomes are the sites of protein synthesis and are not bound by any membrane.</p><p>III. Lysosomes are called \"suicide bags\" because they contain digestive enzymes that can destroy the cell.</p><p>IV. The Golgi apparatus is primarily involved in the synthesis of lipids and detoxification of drugs.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2309;&#2306;&#2327;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2350;&#2366;&#2311;&#2335;&#2379;&#2325;&#2377;&#2344;&#2381;&#2337;&#2381;&#2352;&#2367;&#2351;&#2366; &#2324;&#2352; &#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2335;&#2367;&#2337; &#2325;&#2379; &#2309;&#2352;&#2381;&#2343;-&#2360;&#2381;&#2357;&#2366;&#2351;&#2340;&#2381;&#2340; &#2309;&#2306;&#2327; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2311;&#2344;&#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2366; &#2337;&#2368;&#2319;&#2344;&#2319; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2352;&#2366;&#2311;&#2348;&#2379;&#2360;&#2379;&#2350; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2375; &#2360;&#2381;&#2341;&#2354; &#2361;&#2376;&#2306; &#2324;&#2352; &#2325;&#2367;&#2360;&#2368; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2375; &#2328;&#2367;&#2352;&#2375; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>III. &#2354;&#2366;&#2311;&#2360;&#2379;&#2360;&#2379;&#2350; &#2325;&#2379; \"&#2310;&#2340;&#2381;&#2350;&#2328;&#2366;&#2340;&#2368; &#2341;&#2376;&#2354;&#2368;\" &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2311;&#2344;&#2350;&#2375;&#2306; &#2346;&#2366;&#2330;&#2325; &#2319;&#2306;&#2332;&#2366;&#2311;&#2350; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2379; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2325;&#2379; &#2344;&#2359;&#2381;&#2335; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>IV. &#2327;&#2379;&#2354;&#2381;&#2332;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2357;&#2360;&#2366; &#2325;&#2375; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2324;&#2352; &#2324;&#2359;&#2343;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2357;&#2367;&#2359;&#2361;&#2352;&#2339; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I, II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II, III and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;, &#2340;&#2371;&#2340;&#2368;&#2351; &#2324;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2341;</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II, III and IV</span><span class=\"hqt\" style=\"display:none\">I, II, III &#2324;&#2352; IV</span>"

    "correct_option_id": 0,
    "solution": "<p>Statement IV is incorrect. The Smooth Endoplasmic Reticulum (SER) is responsible for lipid synthesis and detoxification. The Golgi apparatus is involved in packaging and secretional activities. Further Insights:</p><p>The coordinated action of the Endoplasmic Reticulum, Golgi apparatus, and Lysosomes forms the endomembrane system of the cell, which is responsible for protein and lipid synthesis and transport.</p><p>The semi-autonomous nature of mitochondria and chloroplasts makes them unique among the organelles in a eukaryotic cell.</p><p></p>",

  },
