    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The number 123123123123 is divisible by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 123123123123 &#2325;&#2367;&#2360;&#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">All of these</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>7 * 11 * 13 = 1001</p><p>We know that numbers like, ABCABCABC are always divisible by 1001.</p><p>Therefore 123123123123 is always divisible by 1001 and hence all of these is correct.</p><p></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The simple interest on a sum for 2 years at 5% p.a. and for 3 years at 7% p.a. amounts to Rs.930. Find the sum. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 2 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; 5% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2324;&#2352; 3 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; 7% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; 930 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;&#2404; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.2500</span><span class=\"hqt\" style=\"display:none\">2500</span>",
      "<span class=\"eqt\">Rs.3000</span><span class=\"hqt\" style=\"display:none\">3000</span>",
      "<span class=\"eqt\">Rs.3500</span><span class=\"hqt\" style=\"display:none\">3500</span>",
      "<span class=\"eqt\">Rs.4000</span><span class=\"hqt\" style=\"display:none\">4000</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Formula: SI = P * R * T / 100 </p><p>Let P = principal. </p><p>SI for 2yr@5% = (P * 5 * 2) / 100 = 0.10 P </p><p>SI for 3yr@7% = (P * 7 * 3) / 100 = 0.21 P </p><p>Total SI = 0.10P + 0.21P = 0.31P = 930 =&gt; P = 930 / 0.31 = 3000 </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If Arun sells an item to Bhanu at profit of 5% then Bhanu sells that item to Ritesh at profit of 6%, then Ritesh sells that item to Samarth at loss of 4%, find the cost price of Samarth if the cost price of Arun was Rs.6000?<b> </b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2309;&#2352;&#2369;&#2339; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2349;&#2366;&#2344;&#2369; &#2325;&#2379; 5% &#2354;&#2366;&#2349; &#2346;&#2352; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;, &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2349;&#2366;&#2344;&#2369; &#2313;&#2360; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; &#2352;&#2367;&#2340;&#2375;&#2358; &#2325;&#2379; 6% &#2354;&#2366;&#2349; &#2346;&#2352; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;, &#2347;&#2367;&#2352; &#2352;&#2367;&#2340;&#2375;&#2358; &#2313;&#2360; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; &#2360;&#2350;&#2352;&#2381;&#2341; &#2325;&#2379; 4% &#2361;&#2366;&#2344;&#2367; &#2346;&#2352; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;| &#2351;&#2342;&#2367; &#2309;&#2352;&#2369;&#2339; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; 6000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2341;&#2366;, &#2340;&#2379; &#2360;&#2350;&#2352;&#2381;&#2341; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;?<b> </b></p></span>",
    "options": [
      "<span class=\"eqt\">Rs.6410</span><span class=\"hqt\" style=\"display:none\">6410 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs.7450</span><span class=\"hqt\" style=\"display:none\">7450 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs.8900</span><span class=\"hqt\" style=\"display:none\">8900 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs.4600</span><span class=\"hqt\" style=\"display:none\">4600 &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Cost Price of Samarth = 6000 x (105/100) x (106/100) x (96/100) = Rs.6410.88 = Rs.6410</p><p></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is true? </p><p>I. 13/28 &gt; 17/36 &gt; 12/25 </p><p>II. 9/22 &lt; 10/23 &lt; 7/15 </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p><p>I. 13/28 &gt; 17/36 &gt; 12/25 </p><p>II. 9/22 &lt; 10/23 &lt; 7/15 </p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>I: </p><p>13/28 &#8776; 0.4643 </p><p>17/36 &#8776; 0.4722 </p><p>12/25 = 0.48 </p><p>So actually 13/28 &lt; 17/36 &lt; 12/25. Statement I is false. </p><p>II: </p><p>9/22 &#8776; 0.4091 </p><p>10/23 &#8776; 0.4348 </p><p>7/15 &#8776; 0.4667 </p><p>And indeed 0.4091 &lt; 0.4348 &lt; 0.4667. Statement II is true. </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A and B together can complete a piece of work in 12 days, B and C together can complete it in 45 days, and C and A together can complete the work in 15 days. Find the time taken by C alone to complete the work.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; A &#2324;&#2352; B &#2325;&#2367;&#2360;&#2368; &#2325;&#2366;&#2350; &#2325;&#2379; 12 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2319;&#2325; &#2360;&#2366;&#2341; B &#2324;&#2352; C &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2350; &#2325;&#2379; 45 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; C &#2324;&#2352; A &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2350; &#2325;&#2379; 15 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2309;&#2325;&#2375;&#2354;&#2375; C &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2366;&#2350; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">300 days</span><span class=\"hqt\" style=\"display:none\">300 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">240 days</span><span class=\"hqt\" style=\"display:none\">240 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">280 days</span><span class=\"hqt\" style=\"display:none\">280 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">360 days</span><span class=\"hqt\" style=\"display:none\">360 &#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Total work = LCM of 12, 45 and 15 = 180 unit</p><p>Efficiency of A + B = 180/12 = 15 unit/day............(i)</p><p>Efficiency of B + C = 180/45 = 4 unit/day..............(ii)</p><p>Efficiency of C + A = 180/15 = 12 unit/day........(iii)</p><p>Adding eq(i), (ii) and (iii) we get,</p><p>2(A + B + C) = 15 + 4 + 12 = 31 </p><p>Efficiency of A + B + C = 31/2 unit/day...........(iv)</p><p>Subtract eq(i) from (iv) we get,</p><p>Time taken by C alone to complete the work = 180/(31/2  -  15)</p><p>=&gt; 180/(1/2) = 360 days</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In a group, there are M number of men. Group decided to do a job in 15 days, but the number of men worked on day1 is 10 less than M, and number of men worked on day 2 is 10 less than that of worked on day1 and so on. The work, as a result, was completed in 30 days. Find the value of M.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306;, M &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359; &#2361;&#2376;&#2306;&#2404; &#2360;&#2350;&#2370;&#2361; &#2344;&#2375; 15 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2366;&#2350; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2347;&#2376;&#2360;&#2354;&#2366; &#2325;&#2367;&#2351;&#2366; &#2354;&#2375;&#2325;&#2367;&#2344; &#2346;&#2361;&#2354;&#2375; &#2342;&#2367;&#2344; &#2325;&#2366;&#2350; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; M &#2360;&#2375; 10 &#2325;&#2350; &#2361;&#2376; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2342;&#2367;&#2344; &#2325;&#2366;&#2350; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2346;&#2361;&#2354;&#2375; &#2342;&#2367;&#2344; &#2325;&#2366;&#2350; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 10 &#2325;&#2350; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2310;&#2327;&#2375; &#2325;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2368; &#2346;&#2369;&#2352;&#2369;&#2359; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346;, &#2325;&#2366;&#2350; 30 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379; &#2346;&#2366;&#2351;&#2366;&#2404; M &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">282</span><span class=\"hqt\" style=\"display:none\">282</span>",
      "<span class=\"eqt\">312</span><span class=\"hqt\" style=\"display:none\">312</span>",
      "<span class=\"eqt\">310</span><span class=\"hqt\" style=\"display:none\">310</span>",
      "<span class=\"eqt\">292</span><span class=\"hqt\" style=\"display:none\">292</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Total work = 15M units</p><p>Also, total work = (M  -  10) + (M  -  20) + ..... + [M  -  (10 * 30)] units</p><p>= 30M  -  (10 + 20 + .... + 300];
    </script>
