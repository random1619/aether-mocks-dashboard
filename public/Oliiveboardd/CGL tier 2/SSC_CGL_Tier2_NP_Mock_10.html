    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Supreme Court and High Courts' writs and review.</p><p>1) The Supreme Court is a court of record and can punish for contempt of itself.</p><p>2) High Courts under Article 226 can issue writs not only for enforcement of Fundamental Rights but also for any other purpose.</p><p>3) Parliament may suspend the Supreme Court's Article 32 jurisdiction by passing an ordinary law.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2324;&#2352; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2325;&#2368; &#2352;&#2367;&#2335; &#2324;&#2352; &#2360;&#2350;&#2368;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1) &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2319;&#2325; &#2309;&#2349;&#2367;&#2354;&#2375;&#2326; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2361;&#2376; &#2324;&#2352; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2368; &#2309;&#2357;&#2350;&#2366;&#2344;&#2344;&#2366; &#8203;&#8203;&#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2306;&#2337; &#2342;&#2375; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 226 &#2325;&#2375; &#2340;&#2361;&#2340; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2344; &#2325;&#2375;&#2357;&#2354; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2354;&#2381;&#2325;&#2367; &#2325;&#2367;&#2360;&#2368; &#2309;&#2344;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2349;&#2368; &#2352;&#2367;&#2335; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>3) &#2360;&#2306;&#2360;&#2342; &#2319;&#2325; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2325;&#2366;&#2344;&#2370;&#2344; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2325;&#2375; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32 &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; &#2344;&#2367;&#2354;&#2306;&#2348;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct (Articles 129 and 226).</p><p>Statement 3 is incorrect: Article 32 is itself a Fundamental Right; only a Presidential order under Article 359 (with limits) can suspend enforcement of specified rights, not an ordinary law.</p><p>Further Insights:</p><p>- Article 32 is called the \"heart and soul\" of the Constitution (B. R. Ambedkar).</p><p>- HCs have wider writ scope than SC (they can issue for \"any other purpose\").</p><p>- Review and curative petitions exist under SC practice (review: Article 137).</p><p>- HC's superintendence power under Article 227 extends over subordinate courts/tribunals.</p><p>- Tribunals are subject to judicial review by HCs and SC (L. Chandra Kumar, 1997).</p>",
    "question_index": 115
  },
  {
    "question": "<span class=\"eqt\"><p>In August 2025, in which Indian city was the country's first-ever FIFA Talent Academy for girls launched?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2327;&#2360;&#2381;&#2340; 2025 &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2325;&#2367;&#2360; &#2358;&#2361;&#2352; &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2375;&#2358; &#2325;&#2368; &#2346;&#2361;&#2354;&#2368; &#2347;&#2368;&#2347;&#2366; &#2335;&#2376;&#2354;&#2375;&#2306;&#2335; &#2309;&#2325;&#2366;&#2342;&#2350;&#2368; &#2325;&#2366; &#2358;&#2369;&#2349;&#2366;&#2352;&#2306;&#2349; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bhubaneswar</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2369;&#2357;&#2344;&#2375;&#2358;&#2381;&#2357;&#2352;</span>",
      "<span class=\"eqt\">Bengaluru</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2306;&#2327;&#2354;&#2369;&#2352;&#2369;</span>",
      "<span class=\"eqt\">Kolkata</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2354;&#2325;&#2366;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Hyderabad</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2376;&#2342;&#2352;&#2366;&#2348;&#2366;&#2342;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>India's first FIFA Talent Academy for girls was launched in <b>Hyderabad</b> after the All India Football Federation (AIFF) and the Government of Telangana signed a landmark Memorandum of Understanding (MoU) during the first Telangana Sports Conclave at the Hyderabad International Convention Centre. </p><p>The initiative is a key component of FIFA's Talent Development Scheme (TDS), and will help provide elite training to talented footballers who have been scouted from various parts of the country, reinforcing India's commitment to inclusive and structured grassroots development. </p><p>This initiative aligns with: -FIFA's global TDS mandate: Give every talent a chance -AIFF's Vision 2047: Build India into a leading footballing nation. -Telangana's Sports Policy 2025: Develop Hyderabad as a national sports hub.</p>",
    "question_index": 116
  },
  {
    "question": "<span class=\"eqt\"><p>Which scheme aims to provide institutional credit up to &#8377;10 lakh to non-corporate, non-farm small enterprises?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2327;&#2376;&#2352;-&#2325;&#2377;&#2352;&#2381;&#2346;&#2379;&#2352;&#2375;&#2335;, &#2327;&#2376;&#2352;-&#2325;&#2371;&#2359;&#2367; &#2354;&#2328;&#2369; &#2313;&#2342;&#2381;&#2351;&#2350;&#2379;&#2306; &#2325;&#2379; &#8377;10 &#2354;&#2366;&#2326; &#2340;&#2325; &#2325;&#2366; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2327;&#2340; &#2315;&#2339; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2352;&#2326;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Stand-Up India</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2376;&#2306;&#2337;-&#2309;&#2346; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">PM-SVANidhi</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2319;&#2350;-&#2360;&#2381;&#2357;&#2366;&#2344;&#2367;&#2343;&#2367;</span>",
      "<span class=\"eqt\">MUDRA Yojana</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Startup India</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2366;&#2352;&#2381;&#2335;&#2309;&#2346; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Pradhan Mantri MUDRA Yojana (PMMY)</b> was launched on April 8, 2015, to \"fund the unfunded.\" It provides collateral-free institutional credit to small and micro-enterprises that are <b>non-corporate</b> and <b>non-farm</b> in nature.</p><p>Key Features of MUDRA Yojana</p><p>&#183; <b>Target Group:</b> Small manufacturing units, service sector units, shopkeepers, fruits/vegetable vendors, truck operators, and food-service units.</p><p>&#183; <b>Loan Limit:</b> Initially up to <b>&#8377;10 lakh</b>. (Note: In the Union Budget 2024-25, the limit for successful \"Tarun\" borrowers was enhanced to <b>&#8377;20 lakh</b> under a new \"Tarun Plus\" category).</p><p>&#183; <b>Lending Institutions:</b> Loans are provided by Commercial Banks, RRBs, Small Finance Banks, MFIs, and NBFCs.</p><p><b>MUDRA Loan Categories</b></p><p>&#183; The scheme classifies loans into three (now four) categories based on the stage of growth and funding requirement of the beneficiary:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Category</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Loan Amount</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Target Stage</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Shishu</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Up to <b>&#8377;50,000</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">For entrepreneurs just starting out.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Kishor</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#8377;50,001 to &#8377;5 lakh</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">For those who have started their business and want to expand.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Tarun</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#8377;5,00,001 to &#8377;10 lakh</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">For established businesses seeking higher growth.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Tarun Plus</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#8377;10 lakh to &#8377;20 lakh</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">For those who successfully repaid a \"Tarun\" loan (New for 2024-25).</td></tr></table><p>Other Options</p><p>&#183; <b>A. Stand-Up India:</b> Focuses on SC/ST and women entrepreneurs for setting up <b>greenfield</b> (new) enterprises, with loan amounts ranging from <b>&#8377;10 lakh to &#8377;1 crore</b>.</p><p>&#183; <b>B. PM-SVANidhi:</b> A micro-credit scheme specifically for <b>street vendors</b> to provide affordable working capital loans (initially up to <b>&#8377;10,000</b>).</p><p>&#183; <b>D. Startup India:</b> An initiative to provide a platform for startups to get tax benefits, networking, and capital; it is not primarily a credit-delivery scheme for non-corporate micro-units.</p>",
    "question_index": 117
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the SHANTI Bill.</p><p>I. It stands for Sustainable Harnessing and Advancement of Nuclear Energy for Transforming India.</p><p>II. The SHANTI Bill aims to open the civil nuclear power sector to private participation.</p><p>III. The Bill proposes allowing up to 71% foreign direct investment in the nuclear power sector.</p><p>Which of the above statements is/are correct ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2366;&#2306;&#2340;&#2367; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2311;&#2360;&#2325;&#2366; &#2346;&#2370;&#2352;&#2366; &#2344;&#2366;&#2350; &#2361;&#2376; \"&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2370;&#2346;&#2366;&#2306;&#2340;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2366; &#2360;&#2340;&#2340; &#2342;&#2379;&#2361;&#2344; &#2324;&#2352; &#2357;&#2367;&#2325;&#2366;&#2360;\"&#2404;</p><p>II. &#2358;&#2366;&#2306;&#2340;&#2367; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; &#2344;&#2367;&#2332;&#2368; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; 71% &#2340;&#2325; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2344;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The Union cabinet approved a bill which <b>seeks to open the highly restricted nuclear power sector to private companies</b> and also crucial for the country's goal of achieving 100 gigawatt nuclear power capacity by 2047. </p><p>&#183; The approval of the <b>Sustainable Harnessing and Advancement of Nuclear Energy for Transforming India (SHANTI) Bill</b>, paves the way for its introduction in the ongoing winter session of Parliament. </p><p>&#183; Officials said the Bill proposes amending the civil liability law to shield plant operators and cap equipment suppliers' liability, along with redesigning operator insurance to &#8377;1,500 crore per incident under the Indian Nuclear Insurance Pool. </p><p>&#183; The <b>Bill proposes allowing up to 49% foreign direct investment</b> in the sector and creating a unified legal framework for atomic energy, including a specialised nuclear tribunal for all nuclear-related disputes. </p><p>&#183; Private-sector entry will be governed by clear rules under govt oversight, while the Department of Atomic Energy will retain control over core functions such as nuclear material production, heavy water, and waste management. </p><p>&#183; Finance minister Nirmala Sitharaman had announced the govt's intent to open the nuclear power sector to private participation in her Feb budget speech. She had also unveiled a Nuclear Energy Mission with Rs 20,000 crore for R&amp;D on small modular reactors (SMRs), and a plan to operationalise five indigenously developed SMRs by 2033.</p><p>&#183; The Atomic Energy Act currently bars private entities and even state govts from operating nuclear power plants. Only the central govt and its entities can run them. The Nuclear Power Corporation of India Limited (NPCIL), a PSU under the Department of Atomic Energy, is the sole operator and currently runs all 24 commercial reactors in the country. </p><p>&#183; Officials said the SHANTI Bill aims to address long-standing concerns across the nuclear energy chain  -  from private-sector participation and liability issues to fuel supply, spent fuel management, and dispute resolution. They pointed to rising domestic energy demand, the growth of data centres, and India's 2070 net-zero target as factors driving renewed global interest in nuclear power.</p>",
    "question_index": 118
  },
  {

    "options": [
      "<span class=\"eqt\">Refraction of sound waves</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2366; &#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;</span>",

      "<span class=\"eqt\">Interference of sound waves</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2366; &#2357;&#2381;&#2351;&#2340;&#2367;&#2325;&#2352;&#2339;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>An <b>echo</b> is simply the repetition of sound caused by its reflection off a hard surface. To hear a distinct echo, two specific conditions must be met:</p><p>1) <b>Reflection:</b> Sound waves must hit a rigid obstacle (like a wall, mountain, or large hall) and bounce back toward the source.</p><p>2) <b>Persistence of Hearing:</b> The human ear can only distinguish two sounds as separate if they reach the ear at least <b>0.1 seconds</b> apart.</p><p>o Since sound travels at approximately <b>344 m/s</b> (in air at room temperature), the reflecting surface must be at a minimum distance of about <b>17.2 meters</b> from the source to produce a clear echo.</p><p><b>Why the other options are incorrect:</b></p><p>&#183; <b>Refraction:</b> This is the bending of sound waves as they pass through layers of air with different temperatures or densities (like hearing sounds more clearly over water at night).</p><p>&#183; <b>Diffraction:</b> This is the ability of sound waves to bend around corners or spread through small openings (this is why you can hear someone talking in the next room even if you can't see them).</p><p>&#183; <b>Interference:</b> This occurs when two or more sound waves overlap, leading to an increase (constructive) or decrease (destructive) in the sound's volume.</p>",
    "question_index": 119
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the statements on gastric contents.</p><p>Statement I: The pH of stomach contents typically lies between about 1 and 3.</p><p>Statement II: The main acid secreted by the stomach is acetic acid produced by gastric glands.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2375;&#2335; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2350;&#2380;&#2332;&#2370;&#2342; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2346;&#2375;&#2335; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2350;&#2380;&#2332;&#2370;&#2342; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2366; pH &#2350;&#2366;&#2344; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; 1 &#2360;&#2375; 3 &#2325;&#2375; &#2348;&#2368;&#2330; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2346;&#2375;&#2335; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2381;&#2352;&#2366;&#2357;&#2367;&#2340; &#2350;&#2369;&#2326;&#2381;&#2351; &#2309;&#2350;&#2381;&#2354; &#2319;&#2360;&#2367;&#2335;&#2367;&#2325; &#2309;&#2350;&#2381;&#2354; &#2361;&#2376;, &#2332;&#2379; &#2327;&#2376;&#2360;&#2381;&#2335;&#2381;&#2352;&#2367;&#2325; &#2327;&#2381;&#2352;&#2306;&#2341;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Onlt I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Gastric acid is primarily HCl secreted by parietal cells; acetic acid is not the gastric acid.</p><p>Thus Statement I is true and Statement II is false.</p><p>Further Insights:</p><p>- Pepsinogen is activated to pepsin in acidic conditions for protein digestion.</p><p>- Mucus and bicarbonate protect the stomach lining from acid.</p><p>- Antacids and H2 blockers/PPIs reduce acidity of the gastric environment.</p>",
    "question_index": 120
  },

    "question": "<span class=\"eqt\"><p>In February 2025, Kalpana Avijan scheme was launched by which among the following state to achieve the aims and goals of BBBP scheme?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2352;&#2357;&#2352;&#2368; 2025 &#2350;&#2375;&#2306;, &#2348;&#2368;&#2348;&#2368;&#2348;&#2368;&#2346;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351;&#2379;&#2306; &#2324;&#2352; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2354;&#2381;&#2346;&#2344;&#2366; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Gujarat</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2332;&#2352;&#2366;&#2340;</span>",
      "<span class=\"eqt\">Chhattisgarh</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2340;&#2381;&#2340;&#2368;&#2360;&#2327;&#2338;</span>",
      "<span class=\"eqt\">Jharkhand</span><span class=\"hqt\" style=\"display:none\">&#2333;&#2366;&#2352;&#2326;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Odisha</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2337;&#2367;&#2358;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Odisha government has implemented a series of initiatives under the 'Beti Bachao Beti Padhao' scheme, which aims to address the alarming gender imbalance and declining child sex ratio in India. Key programs such as \"Nirbhaya Kadhi\" (Fearless Bud), \"Mo Gelha Jiya\" (My Dear Daughter) in Ganjam, \"Kalpana Avijan\" in Dhenkanal, \"Swarna Kalika\" in Keonjhar, and \"Veerangana Yojana\" in Deogarh district are designed to empower adolescent girls. These initiatives focus on preventing child marriage, combating sex selection and female foeticide, promoting higher education, and building self-esteem and confidence through martial arts and self-defense, according to a press release issued by the Ministry of Women and Child Development.</p><p>\"Beti Bachao Beti Padhao\" (BBBP) scheme was launched on 22nd January, 2015 to address the alarming gender imbalance and declining child sex ratio in India. </p>",
    "question_index": 121
  },

    "question": "<span class=\"eqt\"><p>Identify the correct statement(s).</p><p>1) A statutory town is one with a municipality, corporation, cantonment board, or notified town area committee.</p><p>2) In 2011, the proportion of India's population living in urban areas exceeded 40%.</p><p>3) Slum households were counted in both notified and non-notified slums.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2346;&#2361;&#2330;&#2366;&#2344;&#2375;&#2306;&#2404;</p><p>1) &#2319;&#2325; &#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2344;&#2327;&#2352; &#2357;&#2361; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2344;&#2327;&#2352;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366;, &#2344;&#2367;&#2327;&#2350;, &#2331;&#2366;&#2357;&#2344;&#2368; &#2348;&#2379;&#2352;&#2381;&#2337; &#2351;&#2366; &#2309;&#2343;&#2367;&#2360;&#2370;&#2330;&#2367;&#2340; &#2344;&#2327;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2350;&#2367;&#2340;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) 2011 &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; 40% &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2358;&#2361;&#2352;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2361;&#2340;&#2366; &#2341;&#2366;&#2404;</p><p>3) &#2333;&#2369;&#2327;&#2381;&#2327;&#2368;-&#2333;&#2379;&#2346;&#2337;&#2364;&#2368; &#2357;&#2366;&#2354;&#2375; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2309;&#2343;&#2367;&#2360;&#2370;&#2330;&#2367;&#2340; &#2324;&#2352; &#2327;&#2376;&#2352;-&#2309;&#2343;&#2367;&#2360;&#2370;&#2330;&#2367;&#2340; &#2342;&#2379;&#2344;&#2379;&#2306; &#2333;&#2369;&#2327;&#2381;&#2327;&#2368;-&#2333;&#2379;&#2346;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is correct by definition of statutory town.</p><p>Statement 2 is incorrect: Urban share was 31.16%, not above 40%.</p><p>Statement 3 is correct: Census covers notified, recognized/identified slums.</p><p>Further Insights:</p><p>- Census Town criteria include minimum population 5,000; at least 75% male main workers in non-agriculture; density &ge; 400 persons/km^2.</p><p>- Class I cities are urban centers with population &ge; 100,000.</p><p>- Million-plus cities in 2011: 53; Mega cities (10 million+): 3 (Delhi, Mumbai UA, Kolkata UA).</p><p>- Slum definitions include \"notified,\" \"recognized,\" and \"identified\" categories</p>",
    "question_index": 122
  },

    "question": "<span class=\"eqt\"><p>Match the prokaryotic structure with its correct description.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Nucleoid</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Short appendages involved in adhesion</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Plasmid</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Plasma membrane infolding linked to respiration/DNA segregation</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Mesosome</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Region of circular DNA not bounded by a nuclear envelope</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Pili (fimbriae)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Small extrachromosomal DNA often carrying resistance genes</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2379;&#2325;&#2375;&#2352;&#2367;&#2351;&#2379;&#2335;&#2367;&#2325; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2325;&#2366; &#2313;&#2360;&#2325;&#2375; &#2360;&#2361;&#2368; &#2357;&#2367;&#2357;&#2352;&#2339; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2344;&#2381;&#2351;&#2370;&#2325;&#2381;&#2354;&#2367;&#2351;&#2379;&#2311;&#2337;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2310;&#2360;&#2306;&#2332;&#2344; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2331;&#2379;&#2335;&#2375; &#2313;&#2346;&#2366;&#2306;&#2327;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2346;&#2381;&#2354;&#2366;&#2360;&#2381;&#2350;&#2367;&#2337;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2358;&#2381;&#2357;&#2360;&#2344;/&#2337;&#2368;&#2319;&#2344;&#2319; &#2346;&#2371;&#2341;&#2325;&#2381;&#2325;&#2352;&#2339; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2346;&#2381;&#2354;&#2366;&#2332;&#2381;&#2350;&#2366; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352;&#2381;&#2357;&#2354;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2350;&#2375;&#2360;&#2379;&#2360;&#2379;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2344;&#2366;&#2349;&#2367;&#2325;&#2368;&#2351; &#2310;&#2357;&#2352;&#2339; &#2360;&#2375; &#2328;&#2367;&#2352;&#2366; &#2361;&#2369;&#2310; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2337;&#2368;&#2319;&#2344;&#2319; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2346;&#2367;&#2354;&#2368; (&#2347;&#2367;&#2350;&#2381;&#2348;&#2381;&#2352;&#2367;&#2351;&#2366;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2331;&#2379;&#2335;&#2366; &#2348;&#2366;&#2361;&#2381;&#2351; &#2327;&#2369;&#2339;&#2360;&#2370;&#2340;&#2381;&#2352; &#2337;&#2368;&#2319;&#2344;&#2319; &#2332;&#2379; &#2309;&#2325;&#2381;&#2360;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2332;&#2368;&#2344; &#2354;&#2375; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">1-c, 2-d, 3-b, 4-a</span><span class=\"hqt\" style=\"display:none\">1-c, 2-d, 3-b, 4-a</span>",
      "<span class=\"eqt\">1-d, 2-c, 3-a, 4-b</span><span class=\"hqt\" style=\"display:none\">1-d, 2-c, 3-a, 4-b</span>",
      "<span class=\"eqt\">1-a, 2-b, 3-c, 4-d</span><span class=\"hqt\" style=\"display:none\">1-a, 2-b, 3-c, 4-d</span>",
      "<span class=\"eqt\">1-b, 2-a, 3-d, 4-c</span><span class=\"hqt\" style=\"display:none\">1-b, 2-a, 3-d, 4-c</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The nucleoid is the non-membrane-bound DNA region (1-c). Plasmids are small extrachromosomal DNA (2-d).</p><p>Mesosomes are membrane infoldings seen in preparations, linked to respiration/replication (3-b). Pili/fimbriae aid attachment (4-a).</p><p>Further Insights:</p><p>- Bacterial ribosomes are 70S (50S + 30S); eukaryotic cytosolic ribosomes are 80S.</p><p>- Sex pili mediate conjugation; common fimbriae mediate adhesion to host surfaces.</p><p>- Plasmids are key tools in recombinant DNA vectors (e.g., pBR322).</p><p>- Many now view mesosomes as artifacts of chemical fixation; prokaryotic respiration occurs on the plasma membrane.</p><p>- Prokaryotic cell walls: Gram-positive (thick peptidoglycan, teichoic acids); Gram-negative (thin peptidoglycan, outer membrane with LPS).</p><p>- Bacterial DNA is typically supercoiled and associated with nucleoid-associated proteins (NAPs).</p>",
    "question_index": 123
  },
  {
    "question": "<span class=\"eqt\"><p>Which port is attested in Sangam sources as a Pandyan port famous for the pearl fishery?</p></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2327;&#2350; &#2327;&#2381;&#2352;&#2306;&#2341;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2325;&#2366; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2346;&#2366;&#2306;&#2337;&#2381;&#2351;&#2325;&#2366;&#2354;&#2368;&#2344; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2350;&#2379;&#2340;&#2368; &#2346;&#2366;&#2354;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Tamralipti</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2350;&#2381;&#2352;&#2354;&#2367;&#2346;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Muziris (Muchiri)</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2332;&#2364;&#2367;&#2352;&#2367;&#2360; (&#2350;&#2369;&#2330;&#2367;&#2352;&#2368;)</span>",
      "<span class=\"eqt\">Korkai</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2352;&#2325;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Puhar (Kaveripattinam)</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2361;&#2366;&#2352; (&#2325;&#2366;&#2357;&#2375;&#2352;&#2368;&#2346;&#2335;&#2381;&#2335;&#2367;&#2344;&#2350;)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Korkai (near modern Thoothukudi) was a Pandyan port renowned for pearls.</p><p>Muziris was a Chera port; Puhar (Kaveripattinam) a Chola port; Tamralipti was in eastern India.</p><p>Further Insights:</p><p>- Sangam anthologies include Ettuthokai and Pattuppattu; Tolkappiyam is a grammar work.</p><p>- \"Muvendhar\" refers to the three crowned kings: Chera, Chola, Pandya.</p><p>- Roman coins and amphorae found in Tamilakam indicate active Indo-Roman trade.</p><p>- Kaveripattinam (Puhar) is linked to the Cholas and Periplus references.</p>",
    "question_index": 124
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements are correct?</p><p>I. Simon Commission (1927) had no Indian members and later recommended provincial autonomy.</p><p>II. Cripps Mission (1942) proposed immediate transfer of power to an Interim National Government.</p><p>III. Poona Pact (1932) replaced separate electorates for the Depressed Classes with reserved seats in joint electorates.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p><p>I. &#2360;&#2366;&#2311;&#2350;&#2344; &#2310;&#2351;&#2379;&#2327; (1927) &#2350;&#2375;&#2306; &#2325;&#2379;&#2312; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2342;&#2360;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2341;&#2375; &#2324;&#2352; &#2348;&#2366;&#2342; &#2350;&#2375;&#2306; &#2311;&#2360;&#2344;&#2375; &#2346;&#2381;&#2352;&#2366;&#2306;&#2340;&#2368;&#2351; &#2360;&#2381;&#2357;&#2366;&#2351;&#2340;&#2381;&#2340;&#2340;&#2366; &#2325;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358; &#2325;&#2368;&#2404;</p><p>II. &#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2360; &#2350;&#2367;&#2358;&#2344; (1942) &#2344;&#2375; &#2309;&#2306;&#2340;&#2352;&#2367;&#2350; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2340;&#2340;&#2381;&#2325;&#2366;&#2354; &#2360;&#2340;&#2381;&#2340;&#2366; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2339; &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2352;&#2326;&#2366;&#2404;</p><p>III. &#2346;&#2370;&#2344;&#2366; &#2360;&#2350;&#2333;&#2380;&#2340;&#2366; (1932) &#2344;&#2375; &#2342;&#2354;&#2367;&#2340; &#2357;&#2352;&#2381;&#2327;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2354;&#2327; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2325; &#2350;&#2306;&#2337;&#2354;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2325; &#2350;&#2306;&#2337;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2360;&#2368;&#2335;&#2379;&#2306; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2324;&#2352; &#2340;&#2371;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>I is correct: boycott arose due to all-British composition; provincial autonomy was among recommendations.</p><p>II is incorrect: it offered a Constituent Assembly and post-war Dominion status, not immediate transfer.</p><p>III is correct: it provided reserved seats in joint electorates with more seats than in the Communal Award.</p><p>Further Insights:</p><p>- The Nehru Report (1928) proposed Dominion Status and joint electorates.</p><p>- The 1929 Lahore session declared Purna Swaraj; 26 January observed as Independence Day.</p><p>- August Offer (1940) and Wavell Plan (1945) preceded Cabinet Mission (1946).</p><p>- Cabinet Mission Plan proposed a Union with limited subjects and groupings of provinces.</p>",
    "question_index": 125
  },
  {
    "question": "<span class=\"eqt\"><p>Most of coastal Tamil Nadu's annual rainfall is received during:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2325;&#2375; &#2340;&#2335;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2357;&#2352;&#2381;&#2359;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">June - August</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2370;&#2344; - &#2309;&#2327;&#2360;&#2381;&#2340;</span>",
      "<span class=\"eqt\">September - October</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2340;&#2306;&#2348;&#2352; - &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;</span>",
      "<span class=\"eqt\">October - December</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; - &#2342;&#2367;&#2360;&#2306;&#2348;&#2352;</span>",
      "<span class=\"eqt\">January - March</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2357;&#2352;&#2368; - &#2350;&#2366;&#2352;&#2381;&#2330;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Coastal Tamil Nadu receives major rainfall from the northeast (retreating) monsoon from October to December.</p><p>The Western Ghats create a rain shadow for the SW monsoon, making the NE monsoon crucial here.</p><p>Further Insights:</p><p>- The NE monsoon winds pick moisture from the Bay of Bengal and bring rain to TN, south AP, and parts of Sri Lanka.</p><p>- Cyclonic disturbances in the Bay often enhance NE monsoon rainfall.</p><p>- The SW monsoon (June - September) is dominant for most of India but relatively weak over TN's coast.</p><p>- Chennai's peak rainfall month is typically November.</p>",
    "question_index": 126
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following schemes was launched to provide old-age protection, disability cover and life insurance to unorganised workers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2309;&#2360;&#2306;&#2327;&#2336;&#2367;&#2340; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;&#2379;&#2306; &#2325;&#2379; &#2357;&#2371;&#2342;&#2381;&#2343;&#2366;&#2357;&#2360;&#2381;&#2341;&#2366; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366;, &#2357;&#2367;&#2325;&#2354;&#2366;&#2306;&#2327;&#2340;&#2366; &#2348;&#2368;&#2350;&#2366; &#2324;&#2352; &#2332;&#2368;&#2357;&#2344; &#2348;&#2368;&#2350;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pradhan Mantri Jeevan Jyoti Bima Yojana</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2332;&#2368;&#2357;&#2344; &#2332;&#2381;&#2351;&#2379;&#2340;&#2367; &#2348;&#2368;&#2350;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Atal Pension Yojana</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2335;&#2354; &#2346;&#2375;&#2306;&#2358;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Pradhan Mantri Shram Yogi Maandhan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2358;&#2381;&#2352;&#2350; &#2351;&#2379;&#2327;&#2368; &#2350;&#2366;&#2344;&#2343;&#2344;</span>",
      "<span class=\"eqt\">Pradhan Mantri Suraksha Bima Yojana</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2348;&#2368;&#2350;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Pradhan Mantri Shram Yogi Maandhan(PM-SYM)</b> is a voluntary and contributory pension scheme specifically designed for <b>unorganized workers</b> (such as street vendors, rickshaw pullers, construction workers, etc.) whose monthly income is &#8377;15,000 or less.</p><p>&#183; <b>Old-Age Protection:</b> It ensures a minimum assured pension of <b>&#8377;3,000 per month</b> after attaining the age of 60 years.</p><p>&#183; <b>Disability Cover:</b> If the beneficiary becomes permanently disabled before 60 and is unable to continue in the scheme, their spouse can continue it or they can exit with accumulated interest.</p><p>&#183; <b>Family Pension:</b> If the pensioner dies, the spouse is entitled to receive 50% of the pension as a family pension</p><p>Key Comparison: PM-SYM vs. APY</p><p>While both provide pensions, <b>PM-SYM</b> is strictly for unorganized workers with an income cap, whereas <b>Atal Pension Yojana (APY)</b> is open to all Indian citizens (though primarily targeted at the unorganized sector) and allows for different pension tiers (&#8377;1,000 to &#8377;5,000).</p>",
    "question_index": 127
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Constitutional Schedule with the content</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) First Schedule</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Languages recognized by the Constitution.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) Seventh Schedule</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Names and territorial extent of States and Union Territories.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) Eighth Schedule</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Division of powers into Union, State and Concurrent Lists.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4) Tenth Schedule</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Anti-defection law.</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368; &#2325;&#2366; &#2357;&#2367;&#2359;&#2351;&#2357;&#2360;&#2381;&#2340;&#2369; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) &#2346;&#2361;&#2354;&#2368; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2349;&#2366;&#2359;&#2366;&#2319;&#2305;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) &#2360;&#2366;&#2340;&#2357;&#2368;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2326;. &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2324;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2358;&#2366;&#2360;&#2367;&#2340; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2375; &#2344;&#2366;&#2350; &#2324;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2368;&#2351; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) &#2310;&#2336;&#2357;&#2368;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2327;. &#2360;&#2306;&#2328;, &#2352;&#2366;&#2332;&#2381;&#2351; &#2324;&#2352; &#2360;&#2350;&#2357;&#2352;&#2381;&#2340;&#2368; &#2360;&#2370;&#2330;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344;&#2404;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4) &#2342;&#2360;&#2357;&#2368;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2342;&#2354;&#2348;&#2342;&#2354; &#2357;&#2367;&#2352;&#2379;&#2343;&#2368; &#2325;&#2366;&#2344;&#2370;&#2344;&#2404;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">1-d, 2-a, 3-c, 4-b</span><span class=\"hqt\" style=\"display:none\">1-d, 2-a, 3-c, 4-b</span>",
      "<span class=\"eqt\">1-c, 2-d, 3-b, 4-a</span><span class=\"hqt\" style=\"display:none\">1-c, 2-d, 3-b, 4-a</span>",
      "<span class=\"eqt\">1-a, 2-b, 3-d, 4-c</span><span class=\"hqt\" style=\"display:none\">1-a, 2-b, 3-d, 4-c</span>",
      "<span class=\"eqt\">1-b, 2-c, 3-a, 4-d</span><span class=\"hqt\" style=\"display:none\">1-b, 2-c, 3-a, 4-d</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>First Schedule lists States/UTs and their territories.</p><p>Seventh Schedule distributes legislative subjects across three lists.</p><p>Eighth Schedule enumerates recognized languages.</p><p>Tenth Schedule contains the anti-defection provisions.</p><p>Further Insights:</p><p>- The Eighth Schedule currently lists 22 languages (last added: Bodo, Dogri, Maithili, Santali in 2003).</p><p>- Anti-defection law (Tenth Schedule, 1985; strengthened by 91st Amendment, 2003) sets disqualification for defection.</p><p>- Union, State, Concurrent Lists contain 97, 66, and 47 subjects respectively originally; counts have changed over time.</p><p>- First Schedule also includes the list of UTs and outlines territorial changes after reorganization.</p><p>- Constitutional Schedules now total 12 (Twelfth added by 74th Amendment for municipalities).</p>",
    "question_index": 128
  },
  {
    "question": "<span class=\"eqt\"><p>Which component is included while calculating National Income by the income method?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2351; &#2357;&#2367;&#2343;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2340;&#2375; &#2360;&#2350;&#2351; &#2325;&#2380;&#2344; &#2360;&#2366; &#2328;&#2335;&#2325; &#2358;&#2366;&#2350;&#2367;&#2354; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Transfer payments</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2339; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Corporate tax</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2327;&#2350;&#2367;&#2340; &#2325;&#2352;</span>",
      "<span class=\"eqt\">Wages and salaries</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2332;&#2342;&#2370;&#2352;&#2368; &#2324;&#2352; &#2357;&#2375;&#2340;&#2344;</span>",
      "<span class=\"eqt\">Capital gains</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2354;&#2366;&#2349;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Income Method calculates National Income by adding up all the factor incomes earned by the residents of a country for their productive services during a year.</p><p><b>Why Wages and Salaries?</b></p><p>Under the Income Method, National Income (specifically NNP_FC) is the sum of:</p><p>&#183; Compensation of Employees (CoE): This includes wages and salaries (both in cash and kind) and employers' contributions to social security.</p><p>&#183; Operating Surplus: Rent, Interest, and Profit.</p><p>&#183; Mixed Income: Income of self-employed individuals (like farmers or doctors).</p>",
    "question_index": 129
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about Browsing:</p><p>1)'Incognito' mode hides your browsing history from the websites you visit.</p><p>2)'Cookies' are used by websites to remember your login information and site preferences.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2364;&#2367;&#2306;&#2327; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) '&#2311;&#2344;&#2325;&#2377;&#2327;&#2381;&#2344;&#2367;&#2335;&#2379;' &#2350;&#2379;&#2337; &#2310;&#2346;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2375;&#2326;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335;&#2379;&#2306; &#2360;&#2375; &#2310;&#2346;&#2325;&#2368; &#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2364;&#2367;&#2306;&#2327; &#2361;&#2367;&#2360;&#2381;&#2335;&#2381;&#2352;&#2368; &#2325;&#2379; &#2331;&#2369;&#2346;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335;&#2375;&#2306; &#2310;&#2346;&#2325;&#2368; &#2354;&#2377;&#2327;&#2367;&#2344; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2324;&#2352; &#2360;&#2366;&#2311;&#2335; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2351;&#2366;&#2342; &#2352;&#2326;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; '&#2325;&#2369;&#2325;&#2368;&#2332;&#2364;' &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement 1 is incorrect; Incognito only hides history locally on your PC; the website and your ISP can still track you. Statement 2 is correct.</p>",
    "question_index": 130
  },

    "question": "<span class=\"eqt\"><p>Match the following Malware types with their behavior:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A.Keylogger</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) Disguises as useful software</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B.Trojan Horse</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) Records everything you type</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C.Adware</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) Displays unwanted pop-up advertisements</td></tr></table><p>Codes:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2376;&#2354;&#2357;&#2375;&#2351;&#2352; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2357;&#2381;&#2351;&#2357;&#2361;&#2366;&#2352; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; II</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2325;&#2368;&#2354;&#2377;&#2327;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) &#2313;&#2346;&#2351;&#2379;&#2327;&#2368; &#2360;&#2377;&#2347;&#2364;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2331;&#2367;&#2346;&#2366; &#2361;&#2369;&#2310;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2361;&#2377;&#2352;&#2381;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) &#2310;&#2346;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2335;&#2366;&#2311;&#2346; &#2325;&#2368; &#2327;&#2312; &#2361;&#2352; &#2330;&#2368;&#2332;&#2364; &#2325;&#2379; &#2352;&#2367;&#2325;&#2377;&#2352;&#2381;&#2337; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C.Adware</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) &#2309;&#2357;&#2366;&#2306;&#2331;&#2367;&#2340; &#2346;&#2377;&#2346;-&#2309;&#2346; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2346;&#2344; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr></table><p>&#2325;&#2379;&#2337;:</p></span>",
    "options": [

    "solution": "<p>Keyloggers (2) steal passwords. Trojans (1) trick you into installing them. Adware (3) is for marketing.</p>",

  {
    "question": "<span class=\"eqt\"><p>Which of the following was the first electronic digital computing device?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2361;&#2354;&#2366; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2367;&#2325; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2367;&#2306;&#2327; &#2313;&#2346;&#2325;&#2352;&#2339; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">ENIAC</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2367;&#2319;&#2325;</span>",
      "<span class=\"eqt\">ABC (Atanasoff-Berry Computer)</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2348;&#2368;&#2360;&#2368; (&#2309;&#2340;&#2366;&#2344;&#2366;&#2360;&#2377;&#2347;-&#2348;&#2375;&#2352;&#2368; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352;)</span>",
      "<span class=\"eqt\">UNIVAC</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2344;&#2367;&#2357;&#2376;&#2325;</span>",
      "<span class=\"eqt\">Mark-I</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2352;&#2381;&#2325;-&#2350;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>While ENIAC was a significant and widely recognized early computer, the Atanasoff-Berry Computer (ABC) is generally considered the first <i>electronic digital</i> computing device. It was developed by John Vincent Atanasoff and Clifford Berry in the late 1930s, though it wasn't fully programmable in the way later computers were.<sup> </sup>ENIAC, while not the first, was the first <i>general-purpose electronic digital computer</i>.</p>",
    "question_index": 132
  },

    "question": "<span class=\"eqt\"><p>What is a key difference between the decimal system and the binary system? </p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2358;&#2350;&#2354;&#2357; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2324;&#2352; &#2348;&#2366;&#2311;&#2344;&#2352;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2369;&#2326;&#2381;&#2351; &#2309;&#2306;&#2340;&#2352; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Decimal system is used by the computer for processing, and binary is for output.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2367;&#2306;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2358;&#2350;&#2354;&#2357; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2310;&#2313;&#2335;&#2346;&#2369;&#2335; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2366;&#2311;&#2344;&#2352;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Decimal system has only 2 digits 0 and 1, while binary has 10 digits from 0 to 9.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2358;&#2350;&#2354;&#2357; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; 2 &#2309;&#2306;&#2325; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, 0 &#2324;&#2352; 1, &#2332;&#2348;&#2325;&#2367; &#2348;&#2366;&#2311;&#2344;&#2352;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2350;&#2375;&#2306; 0 &#2360;&#2375; 9 &#2340;&#2325; 10 &#2309;&#2306;&#2325; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Computers use binary for processing, and the decimal system is for human understanding.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2346;&#2381;&#2352;&#2360;&#2306;&#2360;&#2381;&#2325;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2366;&#2311;&#2344;&#2352;&#2368; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2324;&#2352; &#2342;&#2358;&#2350;&#2354;&#2357; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2350;&#2366;&#2344;&#2357; &#2360;&#2350;&#2333; &#2325;&#2375; &#2354;&#2367;&#2319; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Binary system is the basis of all calculations and decimal is only a convenient way for humans to count.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2311;&#2344;&#2352;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2360;&#2349;&#2368; &#2327;&#2339;&#2344;&#2366;&#2323;&#2306; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2361;&#2376; &#2324;&#2352; &#2342;&#2358;&#2350;&#2354;&#2357; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2350;&#2344;&#2369;&#2359;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2367;&#2344;&#2344;&#2375; &#2325;&#2366; &#2325;&#2375;&#2357;&#2354; A &#2360;&#2369;&#2357;&#2367;&#2343;&#2366;&#2332;&#2344;&#2325; &#2340;&#2352;&#2368;&#2325;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>While humans use the decimal system, computers use the binary system for processing calculations.</p><p>The binary system (base-2) uses only two digits: 0 and 1. Computers operate using electrical signals that are either on (1) or off (0), which makes binary a natural choice for them. </p><p>The decimal system (base-10) is what humans use for everyday calculations, while the computer processes data using binary, and then converts the result to decimal for human use.</p>",
    "question_index": 134
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a toggle key on a keyboard? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2325;&#2369;&#2306;&#2332;&#2368; &#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337; &#2346;&#2352; &#2335;&#2377;&#2327;&#2354; &#2325;&#2369;&#2306;&#2332;&#2368; &#2361;&#2376;?</p></span>",

;&#2352; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2346;&#2377;&#2311;&#2306;&#2335;&#2367;&#2306;&#2327; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360;&#2404;</td></tr></table></span>",

  {
    "question": "<span class=\"eqt\"><p>________ contains data that is stored for a short amount of time, typically in the computer's memory.</p></span><span class=\"hqt\" style=\"display:none\"><p>____ &#2350;&#2375;&#2306; &#2357;&#2361; &#2337;&#2375;&#2335;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2341;&#2379;&#2337;&#2364;&#2375; &#2360;&#2350;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2368; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2350;&#2375;&#2306; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340;/&#2360;&#2381;&#2335;&#2379;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Concentrator</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2377;&#2344;&#2381;&#2360;&#2375;&#2306;&#2335;&#2381;&#2352;&#2375;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Buffer</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2347;&#2352;</span>",
      "<span class=\"eqt\">ALU</span><span class=\"hqt\" style=\"display:none\">ALU</span>",
      "<span class=\"eqt\">Control Unit</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2335;&#2381;&#2352;&#2379;&#2354; &#2351;&#2370;&#2344;&#2367;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A <b>buffer</b> contains data that is stored for a short amount of time, typically in the computer's memory (RAM). The purpose of a buffer is to hold data right before it is used. Most hard disks use a buffer to enable more efficient access to the data on the disk.</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following unit is specifically responsible to convert binary numbers to decimal? </p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2311;&#2325;&#2366;&#2312; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2348;&#2366;&#2311;&#2344;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2342;&#2358;&#2350;&#2354;&#2357; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Multiplexer</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2369;&#2360;&#2306;&#2325;&#2375;&#2340;&#2325;</span>",
      "<span class=\"eqt\">Decoder</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2325;&#2379;&#2337;&#2352;</span>",
      "<span class=\"eqt\">Encoder</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2325;&#2379;&#2337;&#2352;</span>",
      "<span class=\"eqt\">Adder</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2337;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A <b>Decoder</b> converts binary numbers to decimal. While other components might be <i>involved</i> in the overall process, the decoder is the specific unit responsible for that conversion.</p><p>Here's why:</p><p>&#183; <b>Decoder:</b> A decoder takes a binary input (a combination of 0s and 1s) and activates a specific output line corresponding to that binary value. In the context of binary to decimal conversion, the binary input would be the binary number, and the output would represent the decimal equivalent. </p><p>&#183; <b>Encoder:</b> An encoder does the opposite; it takes a decimal (or other) input and converts it to a binary representation.</p><p>&#183; <b>Multiplexer:</b> A multiplexer selects one of several input signals and forwards it to a single output line. It's not directly involved in the number system conversion itself. </p><p>&#183; <b>Adder:</b> An adder performs arithmetic addition. While adders are crucial for binary arithmetic within the CPU, they don't handle the conversion between binary and decimal representations.</p>",
    "question_index": 140
  },
  {

    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Hard Disk Drive (HDD) and Floppy Disk Drive (FDD) are examples of <b>Magnetic memory</b>.</p><p>&#183; Hard disk drive: It is a non-removable storage device containing magnetic disks or platters rotating at high speeds. The hard drives store data in segments of concentric circles. It may spin at 5,400 to 15,000 RPM. </p><p>&#183; Floppy Disk drive: Floppy disk is composed of a thin, flexible magnetic disk sealed in a square plastic carrier. Floppy disks were widely used to distribute software, transfer files, and create backup copies of data. To read and write data from a floppy disk, a computer system must have a floppy disk drive (FDD).</p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>What does OCR technology primarily recognize? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2323;&#2360;&#2368;&#2310;&#2352; &#2340;&#2325;&#2344;&#2368;&#2325; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2367;&#2344; &#2330;&#2368;&#2332;&#2379;&#2306; &#2325;&#2379; &#2346;&#2361;&#2330;&#2366;&#2344;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Marks on a form</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2346;&#2340;&#2381;&#2352; &#2346;&#2352; &#2344;&#2367;&#2358;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Barcodes</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2352;&#2325;&#2379;&#2337;</span>",
      "<span class=\"eqt\">Text within a digital image</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2331;&#2357;&#2367; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2346;&#2366;&#2336;</span>",
      "<span class=\"eqt\">Magnetic ink characters</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2360;&#2381;&#2351;&#2366;&#2361;&#2368; &#2309;&#2325;&#2381;&#2359;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>OCR (Optical Character Recognition) technology is designed to convert images of text (whether scanned documents, photos of text, or text within a larger image) into machine-readable text data. </p><p>It essentially \"reads\" the characters in the image and turns them into text that a computer can understand and manipulate.</p>",
    "question_index": 142
  },
  {
    "question": "<span class=\"eqt\"><p>In MS Excel, which of the following is NOT present in the alignment group on the Home Tab?</p></span><span class=\"hqt\" style=\"display:none\"><p>MS &#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2361;&#2379;&#2350; &#2335;&#2376;&#2348; &#2346;&#2352; &#2319;&#2354;&#2366;&#2311;&#2344;&#2350;&#2375;&#2306;&#2335; &#2327;&#2381;&#2352;&#2369;&#2346; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; <b>&#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Text Orientation</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2323;&#2352;&#2367;&#2319;&#2306;&#2335;&#2375;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Wrap Text</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2376;&#2346; &#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Merge &amp; Center</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2352;&#2381;&#2332; &#2319;&#2306;&#2337; &#2360;&#2375;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Borders</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2377;&#2352;&#2381;&#2337;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In MS Excel, Borders are present in the <b>Font group</b> on the Home Tab.</p><p><img width=349 height=138 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18700/image005.png\"></p><p>The Orientation option in Excel helps you rotate text in a cell.</p><p>Wrap Text: Text inside the cell wraps to fit the column width. When you change the column width, text wrapping adjusts automatically.</p><p>Merge &amp; Center is a feature in excel that combines multiple cells and centers the contents of the first cell.</p>",
    "question_index": 143
  },
  {
    "question": "<span class=\"eqt\"><p>Which unit of the CPU is responsible for coordinating the timing of all computer operations and the flow of data between the processor and peripherals?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2350;&#2351; &#2324;&#2352; &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2352; &#2340;&#2341;&#2366; &#2346;&#2352;&#2367;&#2343;&#2368;&#2351; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2337;&#2375;&#2335;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2325;&#2375; &#2360;&#2350;&#2344;&#2381;&#2357;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2325;&#2368; &#2325;&#2380;&#2344; &#2360;&#2368; &#2311;&#2325;&#2366;&#2312; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Arithmetic Logic Unit (ALU)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2325;&#2327;&#2339;&#2367;&#2340; &#2340;&#2352;&#2381;&#2325; &#2311;&#2325;&#2366;&#2312; (ALU)</span>",
      "<span class=\"eqt\">Control Unit (CU)</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2311;&#2325;&#2366;&#2312; (&#2360;&#2368;&#2351;&#2370;)</span>",
      "<span class=\"eqt\">Memory Management Unit (MMU)</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2350;&#2376;&#2344;&#2375;&#2332;&#2350;&#2375;&#2306;&#2335; &#2351;&#2370;&#2344;&#2367;&#2335; (&#2319;&#2350;&#2319;&#2350;&#2351;&#2370;)</span>",
      "<span class=\"eqt\">Instruction Register</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Control Unit (CU) acts as the \"manager\" of the CPU, generating timing signals and directing the flow of data. While the ALU handles calculations, the CU ensures instructions are fetched and decoded in the correct order.</p>",
    "question_index": 144
  },
  {
    "question": "<span class=\"eqt\"><p>Which generation of computers first introduced the concept of artificial intelligence and parallel processing?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2368; &#2325;&#2367;&#2360; &#2346;&#2368;&#2338;&#2364;&#2368; &#2344;&#2375; &#2360;&#2352;&#2381;&#2357;&#2346;&#2381;&#2352;&#2341;&#2350; &#2325;&#2371;&#2340;&#2381;&#2352;&#2367;&#2350; &#2348;&#2369;&#2342;&#2381;&#2343;&#2367;&#2350;&#2340;&#2381;&#2340;&#2366; &#2324;&#2352; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2346;&#2381;&#2352;&#2360;&#2306;&#2360;&#2381;&#2325;&#2352;&#2339; &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2368;?</span>",
    "options": [
      "<span class=\"eqt\">Third Generation</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2360;&#2352;&#2368; &#2346;&#2368;&#2338;&#2364;&#2368;</span>",
      "<span class=\"eqt\">Fourth Generation</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2380;&#2341;&#2368; &#2346;&#2368;&#2338;&#2364;&#2368;</span>",
      "<span class=\"eqt\">Fifth Generation</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2306;&#2330;&#2357;&#2368;&#2306; &#2346;&#2368;&#2338;&#2364;&#2368;</span>",
      "<span class=\"eqt\">Second Generation</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2332;&#2344;&#2352;&#2375;&#2358;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The fifth generation of computers (1980-onwards) first introduced artificial intelligence (AI) and parallel processing as key features. This generation focuses on developing true AI, natural language processing, and advancement in parallel processing capabilities. Earlier generations focused on different technological improvements.</p><p><b>Fifth Generation (Present and Beyond): ULSI and Artificial Intelligence</b></p><p>&#183; <b>Key Technology:</b> Ultra Large-Scale Integration (ULSI) allows for the creation of chips with billions of transistors. This generation is also characterized by advancements in artificial intelligence (AI), machine learning, natural language processing, and quantum computing.</p><p>&#183; <b>Characteristics:</b> The focus is on creating intelligent systems that can learn, reason, and solve problems like humans. This includes the development of expert systems, robotics, and natural language understanding. It's an ongoing era with rapid advancements.</p>",
    "question_index": 145
  },
