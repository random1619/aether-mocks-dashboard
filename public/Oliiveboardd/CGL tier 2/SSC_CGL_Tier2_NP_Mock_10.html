  {
    "question": "<span class=\"eqt\"><p>13 &div; {4 of 2 &#8211; 3 + 4 &#215; (6 &#8211; 4)} is equal to :</p></span><span class=\"hqt\" style=\"display:none\"><p>13 &div; {4 of 2 - 3 + 4 X (6 - 4)} &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">-2(1/3)</span><span class=\"hqt\" style=\"display:none\">-2(1/3)</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">1.3</span><span class=\"hqt\" style=\"display:none\">1.3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>\"</p><p> 13  {4 of 2 &#8211; 3 + 4 &#215; (6 &#8211; 4)}</p><p> = 13  {4 &#215; 2 &#8211; 3 + 4 &#215; 2}</p><p> = 13  {8 &#8211; 3 + 8}</p><p> = 13  13</p><p>= 1\"</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If a = 8  -  3&radic;7, then find the value of:</p><p><table style=\"border:none\"><tr><td style=\"border-bottom:1px solid black;padding:5px;text-align:center\"><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a<sup>2</sup></span></div>&nbsp;- a<sup>2</sup>&nbsp;</div></td></tr><tr><td style=\"text-align:center\"><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a<sup>2</sup></span></div>&nbsp;+ a<sup>2</sup>&nbsp;</div></td></tr></table></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; a = 8 - 3&radic;7 &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><p><table style=\"border:none\"><tr><td style=\"border-bottom:1px solid black;padding:5px;text-align:center\"><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a<sup>2</sup></span></div>&nbsp;- a<sup>2</sup>&nbsp;</div></td></tr><tr><td style=\"text-align:center\"><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a<sup>2</sup></span></div>&nbsp;+ a<sup>2</sup>&nbsp;</div></td></tr></table></p></span>",
    "options": [
      "<span class=\"eqt\">16&radic;7/49</span><span class=\"hqt\" style=\"display:none\">16&radic;7/49</span>",
      "<span class=\"eqt\">48&radic;7/127</span><span class=\"hqt\" style=\"display:none\">48&radic;7/127</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Given, a = 8  -  3&radic;7</p><p>So, 1/a = 1/(8  -  3&radic;7) = (8 + 3&radic;7)</p><p>So, 1/a + a = 16</p><p>And 1/a  -  a = 6&radic;7</p><p>Thus, (1/a<sup>2</sup>  -  a<sup>2</sup>) = 16 * 6&radic;7</p><p>And (1/a  -  a)<sup>2</sup> = (6&radic;7)<sup>2</sup> = 36 * 7</p><p>=&gt; (1/a<sup>2</sup>  -  2 + a<sup>2</sup>) = 252</p><p>=&gt; 1/a<sup>2</sup> + a<sup>2</sup> = 254</p><p>Now,</p><p><img width=75 height=181 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11649/image015.png\"></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A train of length 1200 m crosses a tunnel in 51 sec. If the speed of train is 108 km/h, then find the length of the tunnel.</p></span><span class=\"hqt\" style=\"display:none\"><p>1200 m &#2354;&#2306;&#2348;&#2368; &#2319;&#2325; &#2335;&#2381;&#2352;&#2375;&#2344; &#2319;&#2325; &#2360;&#2369;&#2352;&#2306;&#2327; &#2325;&#2379; 51 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2346;&#2366;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2335;&#2381;&#2352;&#2375;&#2344; &#2325;&#2368; &#2330;&#2366;&#2354; 108 km/h &#2361;&#2376;, &#2340;&#2379; &#2360;&#2369;&#2352;&#2306;&#2327; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">450 m</span><span class=\"hqt\" style=\"display:none\">450 m</span>",
      "<span class=\"eqt\">300 m</span><span class=\"hqt\" style=\"display:none\">300 m</span>",
      "<span class=\"eqt\">420 m</span><span class=\"hqt\" style=\"display:none\">420 m</span>",
      "<span class=\"eqt\">330 m</span><span class=\"hqt\" style=\"display:none\">330 m</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the length of the tunnel = 'l' meters</p><p>Speed of the train = 108 km/h = 108* 5/18 = 30 m/s</p><p>Now,</p><p>1200 + l = 30*51</p><p>=&gt; l = 1530  -  1200</p><p>=&gt; l = 330 m</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A circle is inscribed in a right angled triangle, right-angled at B, such that it touches the sides of the triangle AB, BC and AC at D, E and F respectively. If AB = 5 cm and BC = 12 cm, then the radius of the circle is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2319;&#2325; &#2360;&#2350;&#2325;&#2379;&#2339; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2350;&#2375;&#2306; &#2309;&#2306;&#2325;&#2367;&#2340; &#2361;&#2376;, &#2324;&#2352; B &#2346;&#2352; &#2360;&#2350;&#2325;&#2379;&#2339; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376; &#2325;&#2367; &#2351;&#2361; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; AB, BC &#2324;&#2352; AC &#2325;&#2368; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; D, E &#2324;&#2352; F &#2346;&#2352; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; AB = 5 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; BC = 12 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2 cm</span><span class=\"hqt\" style=\"display:none\">2 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">2.5 cm</span><span class=\"hqt\" style=\"display:none\">2.5 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">1.6 cm</span><span class=\"hqt\" style=\"display:none\">1.6 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">3 cm</span><span class=\"hqt\" style=\"display:none\">3 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=406 height=180 id=\"Picture 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11924/image016.png\"></p><p>We know that,</p><p>AC<sup>2</sup> = AB<sup>2</sup> + BC<sup>2</sup> = 5<sup>2</sup> + 12<sup>2</sup> = 25 + 144 = 169</p><p>AC = 13 cm</p><p>Formula for inradius for right angle triangle, with a and b perpendicular sides and c hypotenuse.</p><p>r = (a + b  -  c)/2</p><p>Therefore, inradius = (5 + 12  -  13)/2 = 2cm</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If the mode of k, 33, 15, 56, k, 18, 33, 18 and 29 is 15, then calculate their median.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; k, 33, 15, 56, k, 18, 33, 18 &#2324;&#2352; 29 &#2325;&#2366; &#2348;&#2361;&#2369;&#2354;&#2325; 15 &#2361;&#2376;, &#2340;&#2379; &#2313;&#2344;&#2325;&#2368; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">Cannot be determined</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">29</span><span class=\"hqt\" style=\"display:none\">29</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Given data: of k, 33, 15, 56, k, 18, 33, 18, 29</p><p>Mode = most frequently occurred data = 15</p><p>Since 15 is the most frequently occurred data. So, k = 15</p><p>Now, data in ascending order:</p><p>15, 15, 15, 18, 18, 29, 33, 33, 56</p><p>Total observations = 9 (odd)</p><p>So, median = ((9 + 1)/2)th term = 5<sup>th</sup> term = <b>18</b></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Find the slope of the line perpendicular to y = 3x  -  8.</p></span><span class=\"hqt\" style=\"display:none\"><p>y = 3x - 8 &#2346;&#2352; &#2354;&#2306;&#2348;&#2357;&#2340; &#2352;&#2375;&#2326;&#2366; &#2325;&#2368; &#2338;&#2354;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">-1/3</span><span class=\"hqt\" style=\"display:none\">-1/3</span>",
      "<span class=\"eqt\">-3</span><span class=\"hqt\" style=\"display:none\">-3</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">1/3</span><span class=\"hqt\" style=\"display:none\">1/3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>y = 3x  -  8</p><p>Comparing with y = mx + c</p><p>m = 3</p><p>For the line perpendicular to the given line =&gt;</p><p>Slope = -1/m = -1/3</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;What is the difference between the simple interest earned on a sum of Rs. 6800 at 20% per annum for 4 years and at 33( <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>3</span></div> )&percnt; per annuum for 3 years?&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2369;.6800 &#2325;&#2368; &#2319;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 20% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 4 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2324;&#2352; 33(1/3)% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 1330</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1330</span>",
      "<span class=\"eqt\">Rs. 850</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 850</span>",
      "<span class=\"eqt\">Rs. 1020</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1020</span>",
      "<span class=\"eqt\">Rs. 1360</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1360</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>P = Rs. 6800</p><p>R1 = 25% per annum</p><p>T1 = 4 years</p><p>R2 = 33(1/3)% per annum</p><p>T2 = 3 years</p><p>So, difference between interest = (6800 * 100/3 * 3)/100 - (6800 * 20 * 4)/100 = Rs. 1360</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Tanya can do a piece of work in 18 days. Tanya and Prateek complete the work together and were paid Rs 68 and Rs 102 respectively based on their works done. How many days must they have taken to complete the work together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2366;&#2344;&#2381;&#2351;&#2366; &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2375; &#2349;&#2366;&#2327; &#2325;&#2379; 18 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2340;&#2366;&#2344;&#2381;&#2351;&#2366; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2344;&#2375; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2346;&#2370;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2325;&#2367;&#2351;&#2375; &#2327;&#2319; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 68 &#2324;&#2352; 102 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;, &#2340;&#2379; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344; &#2354;&#2367;&#2319; &#2361;&#2379;&#2306;&#2327;&#2375;?</p></span>",

    "question": "<span class=\"eqt\"><p>A factory has three machines A, B and C. Machine A produces 30% of the total items and 2% of its items are defective. Machine B produces 45% of the total items and 4% of its items are defective. Machine C produces 25% of the total items and 5% of its items are defective. An item is selected at random and is found to be defective. What is the probability that the item was manufactured by Machine B?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2325;&#2366;&#2352;&#2326;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2350;&#2358;&#2368;&#2344;&#2375;&#2306; A, B &#2324;&#2352; C &#2361;&#2376;&#2306;&#2404; &#2350;&#2358;&#2368;&#2344; A &#2325;&#2369;&#2354; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2366; 30% &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; 2% &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2305; &#2342;&#2379;&#2359;&#2346;&#2370;&#2352;&#2381;&#2339; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2350;&#2358;&#2368;&#2344; B &#2325;&#2369;&#2354; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2366; 45% &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; 4% &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2305; &#2342;&#2379;&#2359;&#2346;&#2370;&#2352;&#2381;&#2339; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2350;&#2358;&#2368;&#2344; C &#2325;&#2369;&#2354; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2366; 25% &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; 5% &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2305; &#2342;&#2379;&#2359;&#2346;&#2370;&#2352;&#2381;&#2339; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; &#2351;&#2366;&#2342;&#2371;&#2330;&#2381;&#2331;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2330;&#2369;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2357;&#2361; &#2342;&#2379;&#2359;&#2346;&#2370;&#2352;&#2381;&#2339; &#2346;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360; &#2348;&#2366;&#2340; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; &#2357;&#2361; &#2357;&#2360;&#2381;&#2340;&#2369; &#2350;&#2358;&#2368;&#2344; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</span>",
    "options": [

      "<span class=\"eqt\">29/42</span><span class=\"hqt\" style=\"display:none\">29/42</span>",
      "<span class=\"eqt\">36/73</span><span class=\"hqt\" style=\"display:none\">36/73</span>"

    "correct_option_id": 3,
    "solution": "<p>Let</p><p>A = item produced by Machine A</p><p>B = item produced by Machine B</p><p>C = item produced by Machine C</p><p>D = item is defective</p><p>Given probabilities</p><p>P(A) = 30% = 0.30</p><p>P(B) = 45% = 0.45</p><p>P(C) = 25% = 0.25</p><p>P(D | A) = 2% = 0.02</p><p>P(D | B) = 4% = 0.04</p><p>P(D | C) = 5% = 0.05</p><p></p><p>Total probability of defective item P(D) = P(A)P(D|A) + P(B)P(D|B) + P(C)P(D|C)</p><p>= (0.300.02) + (0.450.04) + (0.250.05)</p><p>= 0.006 + 0.018 + 0.0125</p><p>= 0.0365</p><p>Apply Bayes' Theorem</p><p>P(B | D) = [P(B)P(D|B)] / P(D)</p><p>= (0.450.04) / 0.0365</p><p>= 0.018 / 0.0365</p><p>= 36 / 73</p>",
    "question_index": 9

    "question": "<span class=\"eqt\"><p><div>&nbsp;If (p + q)&percnt; of 180 = p&percnt; of 60 + 39 and q&percnt; of 80 = p&percnt; of 120, then what is the value of&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">(p + q)</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">5</span></div>&nbsp;&quest;&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; 180 &#2325;&#2366; (p + q)% = 60 &#2325;&#2366; p% + 39 &#2324;&#2352; 80 &#2325;&#2366; q% = 120 &#2325;&#2366; p% &#2361;&#2376;, &#2340;&#2379; <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">(p + q)</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">5</span></div> &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</div></p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here, q% of 80 = p% of 120</p><p>(q/100) * 80 = (p/100) * 120</p><p>q = 3p/2</p><p>Now, (p + q)% of 180 = p% of 60 + 39</p><p>((p + 3p/2)/100) * 180 = (p/100) * 60 + 39</p><p>p = 10</p><p>Then, q = 3 * 10/2 = 15</p><p>Therefore, (p + q)/5</p><p>= (10 + 15)/5</p><p>= <b>5</b></p>",
    "question_index": 12

    "question": "<span class=\"eqt\"><p>The present age of Ashok and present age of Mintu are in the ratio of 6: 5. Seven years ago, the ratio of age of Ashok and age of Mintu is 5: 4. What will the age of Pooja after two years if Pooja is two years younger than Mintu?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2358;&#2379;&#2325; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2324;&#2352; &#2350;&#2367;&#2306;&#2335;&#2370; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 6: 5 &#2361;&#2376;&#2404; &#2360;&#2366;&#2340; &#2357;&#2352;&#2381;&#2359; &#2346;&#2370;&#2352;&#2381;&#2357;, &#2309;&#2358;&#2379;&#2325; &#2325;&#2368; &#2310;&#2351;&#2369; &#2324;&#2352; &#2350;&#2367;&#2306;&#2335;&#2370; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 5: 4 &#2341;&#2366;&#2404; &#2351;&#2342;&#2367; &#2346;&#2370;&#2332;&#2366;, &#2350;&#2367;&#2306;&#2335;&#2370; &#2360;&#2375; &#2342;&#2379; &#2357;&#2352;&#2381;&#2359; &#2331;&#2379;&#2335;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2379; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2346;&#2370;&#2332;&#2366; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368; ?</p></span>",
    "options": [
      "<span class=\"eqt\">36 years</span><span class=\"hqt\" style=\"display:none\">36 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">33 years</span><span class=\"hqt\" style=\"display:none\">33 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">32 years</span><span class=\"hqt\" style=\"display:none\">32 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">35 years</span><span class=\"hqt\" style=\"display:none\">35 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let present age of Ashok = 6x years and present age of Mintu = 5x years</p><p>=&gt; (6x  -  7)/(5x  -  7) = 5/4</p><p>=&gt; 24x  -  28 = 25x  -  35</p><p>=&gt; x = 7</p><p>So, the age of Pooja after two years = 5 * 7  -  2 + 2 = 35 years</p>",

    "question": "<span class=\"eqt\"><p>A and B together complete 3/5 of a job in 6 days. If A alone can complete the whole job in 30 days, find the additional time required for B alone to finish the remaining work.</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2350;&#2367;&#2354;&#2325;&#2352; &#2319;&#2325; &#2325;&#2366;&#2350; &#2325;&#2366; 3/5 &#2349;&#2366;&#2327; 6 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; A &#2309;&#2325;&#2375;&#2354;&#2375; &#2361;&#2368; &#2346;&#2370;&#2352;&#2375; &#2325;&#2366;&#2350; &#2325;&#2379; 30 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359; &#2325;&#2366;&#2350; &#2325;&#2379; &#2309;&#2325;&#2375;&#2354;&#2375; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">8 days</span><span class=\"hqt\" style=\"display:none\">8 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">10 days</span><span class=\"hqt\" style=\"display:none\">10 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">7 days</span><span class=\"hqt\" style=\"display:none\">7 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">6 days</span><span class=\"hqt\" style=\"display:none\">6 &#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Time taken by A and B together to complete the work = 6 * 5/3 = 10 days</p><p>Total work = LCM of 30 and 10 = 30 units</p><p>Efficiency of A = 30/30 = 1 unit/day</p><p>Efficiency of A and B = 30/10 = 3 units/day</p><p>Efficiency of B = 3  -  1 = 2 unit/day</p><p>Time taken by B = (2/5 of 30)/2 = 12/2 = 6 days</p>",

    "question": "<span class=\"eqt\"><p>The given histogram represents the frequency distribution of average runs scored by 50 selected players from a district in a local cricket tournament.</p><p><img width=493 height=322 id=\"Picture 32\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p9862/image011.png\"></p><p>What is the overall average score of the 50 players?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2310;&#2351;&#2340;&#2330;&#2367;&#2340;&#2381;&#2352;/&#2361;&#2367;&#2360;&#2381;&#2335;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2367;&#2360;&#2368; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2335;&#2370;&#2352;&#2381;&#2344;&#2366;&#2350;&#2375;&#2306;&#2335; &#2350;&#2375;&#2306; &#2319;&#2325; &#2332;&#2367;&#2354;&#2375; &#2325;&#2375; 50 &#2330;&#2351;&#2344;&#2367;&#2340; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2366;&#2319; &#2327;&#2319; &#2324;&#2360;&#2340; &#2352;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2306;&#2348;&#2366;&#2352;&#2340;&#2366; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"493\" height=\"322\" id=\"Picture 32\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p9862/image011.png\"></p><p>50 &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2366;&#2319; &#2327;&#2319; &#2325;&#2369;&#2354; &#2324;&#2360;&#2340; &#2352;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>Total run scored between 10.5 to 20.5 = (10.5 + 20.5)/2 * 6 = 93</p><p>Total run scored between 20.5 to 30.5 = (20.5 + 30.5)/2 * 10 = 255</p><p>Total run scored between 30.5 to 40.5 = (30.5 + 40.5)/2 * 12 = 426</p><p>Total run scored between 40.5 to 50.5 = (40.5 + 50.5)/2 * 16 = 728</p><p>Total run scored between 50.5 to 60.5 = (50.5 + 60.5)/2 * 4 = 222</p><p>Total run scored between 60.5 to 70.5 = (60.5 + 70.5)/2 * 2 = 131</p><p>So, overall average = (93 + 255 + 426 + 728 + 222 + 131)/50 = 37.1</p>",

    "question": "<span class=\"eqt\"><p>The angle of elevation from the top of a pole to the top of a tower is 45&#730; and the angle of elevation of the top of the pole from the foot of a tower is 60&#730; . The height of the pole is 50m. Find the height of the tower.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2326;&#2350;&#2381;&#2349;&#2375; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2360;&#2375; &#2319;&#2325; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2340;&#2325; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 45&#730; &#2361;&#2376; &#2340;&#2341;&#2366; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2360;&#2375; &#2326;&#2350;&#2381;&#2349;&#2375; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 60&#730; &#2361;&#2376;&#2404; &#2326;&#2350;&#2381;&#2349;&#2375; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; 50m &#2361;&#2376;, &#2340;&#2379; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>In a class, the average age of 15 students are 24 years. When 3 students shifted into another class, the average age increased by 1 year, then what is the average age of 3 students who shifted to another class?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306;, 15 &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2310;&#2351;&#2369; 24 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;&#2404; &#2332;&#2348; 3 &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2368; &#2342;&#2370;&#2360;&#2352;&#2368; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2324;&#2360;&#2340; &#2310;&#2351;&#2369; &#2350;&#2375;&#2306; 1 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2368; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; 3 &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2310;&#2351;&#2369; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">22 years</span><span class=\"hqt\" style=\"display:none\">22 &#2357;&#2352;&#2381;&#2359;</span>",

    "solution": "<p>The total age of the class = 15 * 24 = 360 years</p><p>When 3 students shifted to another class, then total age of 12 students = 12 * (24 + 1) = 300 years</p><p>So, total age of 3 students = 360  -  300 = 60 years</p><p>Hence, average age of 3 students = 60/3 = 20 years</p>",

    "question": "<span class=\"eqt\"><p>Question below consists of a question and two statements numbered I and II given below it. You have to decide whether the data provided in the statements are sufficient to answer the question. Read both the statements and give answer:</p><p>Find the total cost of item A, B and C together.</p><p>Statement I: Average cost of item A and B together is &#8377;40.</p><p>Statement II: The ratio of cost of item A and C is 3:2 respectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2319;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2344;&#2368;&#2330;&#2375; &#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; &#2342;&#2379; &#2325;&#2341;&#2344; (I &#2324;&#2352; II) &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2351;&#2361; &#2340;&#2351; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376; &#2351;&#2366; &#2344;&#2361;&#2368;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;:</p><p>&#2357;&#2360;&#2381;&#2340;&#2369; A, B &#2324;&#2352; C &#2325;&#2368; &#2325;&#2369;&#2354; &#2354;&#2366;&#2327;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344; I: &#2357;&#2360;&#2381;&#2340;&#2369; A &#2324;&#2352; B &#2325;&#2368; &#2324;&#2360;&#2340; &#2354;&#2366;&#2327;&#2340; &#8377;40 &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2357;&#2360;&#2381;&#2340;&#2369; A &#2324;&#2352; C &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3:2 &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Statement I alone is sufficient while statement II alone is not sufficient.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; I &#2361;&#2368; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; II &#2361;&#2368; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Statement II alone is sufficient while statement I alone is not sufficient.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; II &#2309;&#2325;&#2375;&#2354;&#2366; &#2361;&#2368; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2325;&#2341;&#2344; I &#2309;&#2325;&#2375;&#2354;&#2366; &#2361;&#2368; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Neither Statement I alone nor statement II alone is sufficient.</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 1 &#2324;&#2352; &#2344; &#2361;&#2368; &#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 2 &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Statement I and II together are sufficient.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2361;&#2368; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>From I:</p><p>Average cost of item A and B together = &#8377;40 </p><p>Total cost of item A and B together = 2*40 = &#8377;80</p><p>Data given is not sufficient.</p><p>From II:</p><p>Cost of item A/Cost of item C = 3/2</p><p>Data given is not sufficient.</p><p>From I and II together:</p><p>A + B = &#8377;80</p><p>A = 3C/2</p><p>3C/2 + B = 80</p><p>3C + 2B = 160</p><p>Data given is not sufficient.</p><p>Hence, option 'c' is correct.</p>",

    "question": "<span class=\"eqt\"><p>12 is related to 30 following a certain logic. Following the same logic, 18 is related to 45. To which of the following is 21 related following the same logic?</p><p>(NOTE: Operations should be performed on the whole numbers, without breaking down the numbers into its constituent digits. E.g. 13 Operations on 13 such as adding /subtracting /multiplying etc. to 13 can be performed. Breaking down 13 into 1 and 3 and then performing mathematical operations on 1 and 3 is not allowed)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2352;&#2381;&#2325; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; 12, 30 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2340;&#2352;&#2381;&#2325; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319;, 18, 45 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2340;&#2352;&#2381;&#2325; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; 21 &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p><p>(<b>&#2344;&#2379;&#2335;:</b> &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2328;&#2335;&#2325; &#2309;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2319; &#2348;&#2367;&#2344;&#2366;, &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2346;&#2352; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2325;&#2368; &#2332;&#2366;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; 13 - 13 &#2346;&#2352; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2332;&#2376;&#2360;&#2375; 13 &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2344;&#2366;/&#2328;&#2335;&#2366;&#2344;&#2366;/&#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2344;&#2366; &#2310;&#2342;&#2367; &#2325;&#2368; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; 13 &#2325;&#2379; 1 &#2324;&#2352; 3 &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2347;&#2367;&#2352; 1 &#2324;&#2352; 3 &#2346;&#2352; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;)&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">52.5</span><span class=\"hqt\" style=\"display:none\">52.5</span>",
      "<span class=\"eqt\">42</span><span class=\"hqt\" style=\"display:none\">42</span>",
      "<span class=\"eqt\">105</span><span class=\"hqt\" style=\"display:none\">105</span>",
      "<span class=\"eqt\">10.5</span><span class=\"hqt\" style=\"display:none\">10.5</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The logic is:</p><p>12/2= 6; 6 x 5 = 30</p><p>18/2 = 9; 9 x 5 = 45</p><p>Similarly,</p><p>21/2 = 10.5; 10.5 x 5 = 52.5</p>",
    "question_index": 40
  },

    "question": "<span class=\"eqt\"><p>Kirti said to her mother, \"My friend Ayesha left her hometown today and will reach our home tomorrow. Her job interview is day after tomorrow, which is Friday. She had applied for the job day before yesterday.\" On which day did Ayesha apply for the job?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2368;&#2352;&#2381;&#2340;&#2367; &#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2350;&#2366;&#2340;&#2366; &#2360;&#2375; &#2325;&#2361;&#2366;, \"&#2350;&#2375;&#2352;&#2368; &#2342;&#2379;&#2360;&#2381;&#2340; &#2310;&#2351;&#2358;&#2366; &#2310;&#2332; &#2309;&#2346;&#2344;&#2375; &#2358;&#2361;&#2352; &#2360;&#2375; &#2352;&#2357;&#2366;&#2344;&#2366; &#2361;&#2379; &#2330;&#2369;&#2325;&#2368; &#2361;&#2376; &#2324;&#2352; &#2325;&#2354; &#2361;&#2350;&#2366;&#2352;&#2375; &#2328;&#2352; &#2346;&#2361;&#2369;&#2305;&#2330; &#2332;&#2366;&#2319;&#2327;&#2368;&#2404; &#2313;&#2360;&#2325;&#2366; &#2332;&#2377;&#2348; &#2311;&#2306;&#2335;&#2352;&#2357;&#2381;&#2351;&#2370; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2325;&#2354; &#2325;&#2375; &#2319;&#2325; &#2342;&#2367;&#2344; &#2348;&#2366;&#2342; (&#2337;&#2375; &#2310;&#2347;&#2381;&#2335;&#2352; &#2335;&#2369;&#2350;&#2380;&#2352;&#2379;) &#2309;&#2352;&#2381;&#2341;&#2366;&#2340;&#2381; &#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352; &#2325;&#2379; &#2361;&#2376;&#2404; &#2313;&#2360;&#2344;&#2375; &#2348;&#2368;&#2340;&#2375; &#2325;&#2354; &#2360;&#2375; &#2319;&#2325; &#2342;&#2367;&#2344; &#2346;&#2361;&#2354;&#2375; (&#2337;&#2375; &#2348;&#2367;&#2347;&#2379;&#2352; &#2351;&#2360;&#2381;&#2335;&#2352;&#2337;&#2375;) &#2332;&#2377;&#2348; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2375;&#2342;&#2344; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;'' &#2310;&#2351;&#2358;&#2366; &#2344;&#2375; &#2332;&#2377;&#2348; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2342;&#2367;&#2344; &#2310;&#2357;&#2375;&#2342;&#2344; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Tuesday</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Thursday</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2369;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Day after tomorrow is Friday.</p><p>So, today is Wednesday.</p><p>Hence, day before yesterday was Monday.</p><p>Ayesha applied for the job on Monday.</p>",
    "question_index": 41
  },

    "question": "<span class=\"eqt\"><p>In the question a statement is given and is followed by two conclusions. You have to take the given statements to be true even if they seem to be at variance from commonly known facts, then select the proper alternative. </p><p><b>Statement: </b>The heavy rains will probably flood the city by tomorrow. </p><p><b>Conclusions: </b></p><p><b>I: </b>There would be a flood in the city. </p><p><b>II: </b>The city would not be flooded. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2341;&#2344; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2344;&#2366; &#8203;&#8203;&#2361;&#2376; &#2349;&#2354;&#2375; &#2361;&#2368; &#2357;&#2375; &#2360;&#2352;&#2381;&#2357;&#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2340;&#2368;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2379;&#2306;, &#2347;&#2367;&#2352; &#2313;&#2330;&#2367;&#2340; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><b>&#2325;&#2341;&#2344; : </b>&#2349;&#2366;&#2352;&#2368; &#2348;&#2366;&#2352;&#2367;&#2358; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2358;&#2361;&#2352; &#2350;&#2375;&#2306; &#2325;&#2354; &#2340;&#2325; &#2348;&#2366;&#2397; &#2310;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p><b>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; : </b></p><p><b>I: </b>&#2358;&#2361;&#2352; &#2350;&#2375;&#2306; &#2348;&#2366;&#2338;&#2364; &#2310;&#2319;&#2327;&#2368;&#2404;</p><p><b>II: </b>&#2358;&#2361;&#2352; &#2350;&#2375;&#2306; &#2348;&#2366;&#2338;&#2364; &#2344;&#2361;&#2368;&#2306; &#2310;&#2319;&#2327;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only conclusion I follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only conclusion II follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Either conclusion I or II follows</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2366; &#2340;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2351;&#2366; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Neither conclusion I nor II follows</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; &#2344; &#2361;&#2368; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Here, the conclusions are a pair of complementary sentences. Hence, either conclusion I or II follows. </p>",
    "question_index": 42

    "question": "<span class=\"eqt\"><p>Select the number pair in which two numbers are related in the same way as are the two numbers of the following number pair.</p><p>9 : 90</p><p>7: 56</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306; &#2332;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2350;&#2375;&#2306; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</p><p>9 : 90</p></span>",

      "<span class=\"eqt\">14 : 210</span><span class=\"hqt\" style=\"display:none\">14 : 210</span>",
      "<span class=\"eqt\">12 : 154</span><span class=\"hqt\" style=\"display:none\">12 : 154</span>",
      "<span class=\"eqt\">11 : 99</span><span class=\"hqt\" style=\"display:none\">11 : 99</span>",

    "comp": "<p><b>Directions :</b>Read the following passage and answer the questions based on the passage.</p><p>Among the many dimensions of human intelligence, metacognition is often regarded as the highest and most refined form. Derived from the Greek word meta, meaning \"beyond,\" metacognition refers to the ability to think about one's own thinking. It involves awareness, control, and evaluation of cognitive processes such as learning, reasoning, and decision-making. While basic intelligence enables a person to acquire knowledge, metacognition empowers them to understand how that knowledge is acquired, used, and improved. Scientific research suggests that metacognitive ability distinguishes effective learners from passive ones. Individuals with strong metacognitive skills can plan their approach to tasks, monitor their understanding in real time, and adjust strategies when faced with difficulty. This self-regulatory capacity allows them to learn more efficiently, avoid repeated mistakes, and adapt to complex or unfamiliar situations. In contrast, those lacking metacognitive awareness may continue using ineffective methods without recognising their limitations. Metacognition also plays a crucial role in critical thinking and problem-solving. By reflecting on assumptions, biases, and reasoning patterns, individuals can evaluate the quality of their own thoughts rather than accepting them uncritically. This reflective distance is essential in scientific inquiry, ethical reasoning, and creative pursuits, where questioning one's own conclusions often leads to deeper insight. Importantly, metacognition is not limited to academic contexts. In everyday life, it influences emotional regulation, decision-making, and interpersonal understanding. Being aware of one's thought patterns helps individuals respond rather than react, fostering emotional intelligence and self-control. Thus, metacognition represents intelligence at its most evolved level - not merely the accumulation of information, but the conscious mastery of the mind itself. By enabling individuals to observe, guide, and refine their thinking, metacognition transforms intelligence from a static trait into a dynamic, self-improving process.</p>",

    "solution": "<p>The sentence in the Direct Speech is in Future Continuous Tense. Therefore, the sentence in the Indirect Speech should be in Conditional Continuous.</p><p>Future Continuous (Subject + will/shall + be + V1 + ing + Object) should be converted into Conditional Continuous (Subject + would/should + be + V1 +ing + Object).</p><p>For example:</p><p>He said, \"I will be using the book next Friday.\" (Direct Speech)</p><p>He said that he would be using the book the following Friday. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>I  -  she </p><p>Your - my </p><p>Tomorrow  -  the next day</p><p>So, the sentence in indirect speech is: Sarah said that she would be teaching my son the next day.</p><p>Hence, (a) is the correct answer. </p><p>Note: When converting a sentence from direct speech to indirect speech, time expressions like \"tomorrow\" are often changed to more general or relative terms. In the case of \"tomorrow,\" it is typically changed to \"the next day.\"</p>",

    "comp": "<p><b>Directions :</b>   Read the given passage and answer the questions that follow.</p><p>Eating low-carbon foods helps reduce emissions, but some foods actually suck up carbon from the atmosphere, leaving the climate in a better place. We all know that producing most foods creates greenhouse gas emissions, driving climate change. These emissions come from hundreds of different sources, including tractors burning fuel, manufacturing fertiliser and the bacteria in cow's guts. Overall, food production contributes a quarter of human-caused greenhouse gas emissions.</p><p>However, there are some foods that remove more greenhouse gases than they emit, often referred to as \"carbon-negative\" foods. These foods leave the climate better than they found it. Producing and eating more of these could help reduce the carbon impact of our food and, in some cases, restore ecosystems in the process.</p><p>When plants grow, they take carbon dioxide (CO2) from the air, but when we (or animals) metabolise these plants, this CO2 usually gets released straight back into the air. Due to ongoing emissions, however, we need to permanently remove carbon from the atmosphere, storing it deep in the sea, rocks, soil or in trees. There are a few food products and production practices that do this. In fact, it's already possible to make your entire diet carbon-negative, although, in today's world, it would require substantial changes to how most people eat.</p>",

    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>The allegations of financial mismanagement were thoroughly looked into by the audit committee before the annual general meeting.</p>",

      "The audit committee had thoroughly looked into the allegations of financial mismanagement before the annual general meeting."
    ],
    "correct_option_id": 2,
    "solution": "<p>The subject of the Passive Voice (\"the audit committee\") becomes the subject of the Active Voice, and the object (\"the allegations of financial mismanagement\") remains the object.</p><p>The verb \"looked into\" is a phrasal verb with its preposition intact, so the preposition \"into\" stays with the verb in Active Voice.</p><p>The Passive Voice is in Past Simple tense: were thoroughly looked into. Therefore, the Active Voice should also be in Past Simple tense: thoroughly looked into.</p><p>Passive voice: The allegations of financial mismanagement were thoroughly looked into by the audit committee before the annual general meeting.</p><p>Active voice: The audit committee thoroughly looked into the allegations of financial mismanagement before the annual general meeting.</p><p>Options (a), (b), and (d) are incorrect:</p><p>1) wrongly assigns the action to the object.</p><p>2) changes the tense to Present Continuous.</p><p>4) changes the tense to Past Perfect.</p><p>The options except (c) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is option (c).</p>",

      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are correct (Articles 243K and 243G read with the Eleventh Schedule). However, Statement 2 does not explain Statement 1; they cover different provisions.</p><p>Further Insights:</p><p>- Gram Sabha is recognised at the village level; its powers are defined by State law.</p><p>- Reservation: not less than one-third of seats (including chairpersons) for women; proportionate reservation for SCs/STs.</p><p>- State Finance Commissions are to be set up every five years (Article 243I).</p><p>- Panchayat terms are typically five years; dissolution requires elections within six months.</p><p>- Devolution varies across states; the Eleventh Schedule is illustrative, not mandatory.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following statements regarding Prokaryotic vs eukaryotic features are correct?</p><p>1) Bacterial ribosomes are 70S, whereas cytosolic ribosomes of eukaryotes are 80S.</p><p>2) Prokaryotes lack a membrane-bound nucleus and membrane-bound organelles.</p><p>3) Mitochondria in eukaryotes contain 70S ribosomes.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2379;&#2325;&#2376;&#2352;&#2367;&#2351;&#2379;&#2335;&#2367;&#2325; &#2324;&#2352; &#2351;&#2370;&#2325;&#2376;&#2352;&#2367;&#2351;&#2379;&#2335;&#2367;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p><p>1) &#2332;&#2368;&#2357;&#2366;&#2339;&#2369;&#2323;&#2306; &#2325;&#2375; &#2352;&#2366;&#2311;&#2348;&#2379;&#2360;&#2379;&#2350; 70S &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2351;&#2370;&#2325;&#2376;&#2352;&#2367;&#2351;&#2379;&#2335;&#2381;&#2360; &#2325;&#2375; &#2360;&#2366;&#2311;&#2335;&#2379;&#2360;&#2379;&#2354;&#2367;&#2325; &#2352;&#2366;&#2311;&#2348;&#2379;&#2360;&#2379;&#2350; 80S &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2346;&#2381;&#2352;&#2379;&#2325;&#2376;&#2352;&#2367;&#2351;&#2379;&#2335;&#2381;&#2360; &#2350;&#2375;&#2306; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368;-&#2348;&#2342;&#2381;&#2343; &#2344;&#2366;&#2349;&#2367;&#2325; &#2324;&#2352; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368;-&#2348;&#2342;&#2381;&#2343; &#2309;&#2306;&#2327;&#2325; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>3) &#2351;&#2370;&#2325;&#2376;&#2352;&#2367;&#2351;&#2379;&#2335;&#2381;&#2360; &#2325;&#2375; &#2350;&#2366;&#2311;&#2335;&#2379;&#2325;&#2377;&#2344;&#2381;&#2337;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; 70S &#2352;&#2366;&#2311;&#2348;&#2379;&#2360;&#2379;&#2350; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only 1 and 2 are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2 &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only 2 and 3 are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3 &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only 1 and 3 are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3 &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">1, 2 and 3 are correct</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3 &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All three statements are correct: (1) ribosome sedimentation values differ, (2) prokaryotes have no true nucleus, (3) mitochondria retain bacterial-type 70S ribosomes (endosymbiotic origin).</p><p>Further Insights:</p><p>- Eukaryotic 80S ribosomes dissociate into 60S and 40S subunits; prokaryotic 70S into 50S and 30S.</p><p>- Archaea share some features with eukaryotes (e.g., histone-like proteins).Archaea are prokaryotes, but in some ways they behave like eukaryotes.</p><p>- Chloroplasts also have 70S ribosomes and circular DNA.</p><p>- Plasmids are extra-chromosomal DNA mainly in bacteria.</p>",
    "question_index": 108
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements on the Godavari:</p><p>1) It rises near Trimbakeshwar in the Western Ghats (Maharashtra).</p><p>2) Indravati joins it as a left-bank tributary.</p><p>3) The Godavari basin does not include any part of Madhya Pradesh.</p><p>4) Purna and Manjra are its tributaries.</p><p>Which statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368; &#2344;&#2342;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2351;&#2361; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335; (&#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;) &#2350;&#2375;&#2306; &#2340;&#2381;&#2352;&#2381;&#2351;&#2306;&#2348;&#2325;&#2375;&#2358;&#2381;&#2357;&#2352; &#2325;&#2375; &#2346;&#2366;&#2360; &#2360;&#2375; &#2344;&#2367;&#2325;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2311;&#2306;&#2342;&#2381;&#2352;&#2366;&#2357;&#2340;&#2368; &#2344;&#2342;&#2368; &#2348;&#2366;&#2319;&#2305; &#2325;&#2367;&#2344;&#2366;&#2352;&#2375; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2368; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2311;&#2360;&#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3) &#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368; &#2348;&#2375;&#2360;&#2367;&#2344; &#2350;&#2375;&#2306; &#2350;&#2343;&#2381;&#2351; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2325;&#2366; &#2325;&#2379;&#2312; &#2349;&#2368; &#2349;&#2366;&#2327; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p><p>4) &#2346;&#2370;&#2352;&#2381;&#2339;&#2366; &#2324;&#2352; &#2350;&#2306;&#2332;&#2352;&#2366; &#2311;&#2360;&#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2367;&#2351;&#2366;&#2305; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1, 2 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1, 2 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">1, 3 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1, 3 &#2324;&#2352; 4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>1 is correct: origin is near Trimbak (Nashik district).</p><p>2 is correct: Indravati joins from the left bank.</p><p>3 is incorrect: the basin includes small parts of Madhya Pradesh (and Karnataka).</p><p>4 is correct: both Purna and Manjra are tributaries of the Godavari.</p><p>Further Insights:</p><p>- The Godavari (~1465 km) is often called the Dakshin Ganga (Ganga of the South).</p><p>- Major right-bank tributary: Sabari; key left-bank tributaries include Pranhita system, Purna, Manjra.</p><p>- The river forms a prominent delta on the Bay of Bengal near Antarvedi.</p><p>- Polavaram is a major multipurpose project on the Godavari.</p>",

    "question": "<span class=\"eqt\"><p><b>Which of the following is the correct sequence in the circular flow of income in a two-sector economy?</b></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2342;&#2379;-&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2368;&#2351; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2310;&#2351; &#2325;&#2375; &#2330;&#2325;&#2381;&#2352;&#2368;&#2351; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2361;&#2376;?</b></p></span>",
    "options": [
      "<span class=\"eqt\">Households &rarr; Government &rarr; Firms &rarr; Households</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &rarr; &#2360;&#2352;&#2325;&#2366;&#2352; &rarr; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2366;&#2305; &rarr; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Firms &rarr; Households &rarr; Firms</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2352;&#2381;&#2350;&#2379;&#2306; & &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; & &#2347;&#2352;&#2381;&#2350;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Households &rarr; Firms &rarr; Households</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2367;&#2357;&#2366;&#2352; & &#2347;&#2352;&#2381;&#2350; & &#2346;&#2352;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Firms &rarr; Government &rarr; Households</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2366;&#2306; &rarr; &#2360;&#2352;&#2325;&#2366;&#2352; &rarr; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The circular flow of income in a simple two-sector economy describes the continuous movement of money between the two main economic agents: Households and Firms.</p><p>Here's how the cycle works:</p><p>&#183; Households are the owners of the factors of production (land, labor, capital). They are also the consumers of goods and services.</p><p>&#183; Firms are the producers of goods and services. They hire the factors of production from households.</p><p>The flow of money occurs in two main ways:</p><p>&#183; Expenditure Flow: Households spend money to buy goods and services from firms. This is the consumption expenditure. (Flow: Households &rarr; Firms)</p><p>&#183; Income Flow: Firms use the money they receive from sales to pay households for their factors of production in the form of wages, rent, interest, and profit. This is the factor income. (Flow: Firms &rarr; Households)</p><p>These two flows create a continuous circle. The sequence in option (C) correctly captures this cycle:</p><p>&#183; Households &rarr; Firms: Households spend money (consumption expenditure).</p><p>&#183; Firms &rarr; Households: Firms pay this money back to households (factor income).</p><p>&#183; The cycle repeats.</p>",
    "question_index": 111
  },

    "question": "<span class=\"eqt\"><p>Concerning Salman Rushdie's Midnight's Children, consider the pair of statements:</p><p>Statement I: Midnight's Children won the Jnanpith Award in 1981.</p><p>Statement II: The novel allegorically links the protagonist Saleem Sinai's birth with India's independence.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2354;&#2350;&#2366;&#2344; &#2352;&#2369;&#2358;&#2381;&#2342;&#2368; &#2325;&#2375; &#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; '&#2350;&#2367;&#2337;&#2344;&#2366;&#2311;&#2335;&#2381;&#2360; &#2330;&#2367;&#2354;&#2381;&#2337;&#2381;&#2352;&#2375;&#2344;' &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: '&#2350;&#2367;&#2337;&#2344;&#2366;&#2311;&#2335;&#2381;&#2360; &#2330;&#2367;&#2354;&#2381;&#2337;&#2381;&#2352;&#2375;&#2344;' &#2325;&#2379; 1981 &#2350;&#2375;&#2306; &#2332;&#2381;&#2334;&#2366;&#2344;&#2346;&#2368;&#2336; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2350;&#2367;&#2354;&#2366; &#2341;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2351;&#2361; &#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325;&#2366;&#2340;&#2381;&#2350;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2366;&#2351;&#2325; &#2360;&#2354;&#2368;&#2350; &#2360;&#2367;&#2344;&#2366;&#2312; &#2325;&#2375; &#2332;&#2344;&#2381;&#2350; &#2325;&#2379; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2350;&#2376;&#2306; &#2324;&#2352; &#2344; &#2361;&#2368; &#2342;&#2370;&#2360;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Jnanpith is India's premier literary award for Indian authors; Rushdie's novel did not win it. It won the Booker Prize (1981).</p><p>The narrative indeed ties Saleem's birth to midnight, 15 August 1947, functioning as a national allegory.</p><p>Further Insights:</p><p>- Midnight's Children won the \"Booker of Bookers\" (1993) and \"Best of the Booker\" (2008).</p><p>- Jnanpith: instituted in 1961; first award (1965) to G. Sankara Kurup (Malayalam).</p><p>- Other major Indian Booker winners: Arundhati Roy (The God of Small Things, 1997); Aravind Adiga (The White Tiger, 2008).</p>",
    "question_index": 112
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Vijayanagara Empire's nayaka system.</p><p>Statement I: In Vijayanagara, nayakas were granted revenue rights in return for military service and local administration.</p><p>Statement II: Like Mughal jagirdari, the nayaka grants were strictly non-hereditary and regularly transferred.</p><p>Which of the above statement is/are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2344;&#2366;&#2351;&#2325;&#2366; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2350;&#2375;&#2306;, &#2344;&#2366;&#2351;&#2325;&#2379;&#2306; &#2325;&#2379; &#2360;&#2376;&#2344;&#2381;&#2351; &#2360;&#2375;&#2357;&#2366; &#2324;&#2352; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2348;&#2342;&#2354;&#2375; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2342;&#2367;&#2319; &#2332;&#2366;&#2340;&#2375; &#2341;&#2375;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2350;&#2369;&#2327;&#2354; &#2332;&#2366;&#2327;&#2368;&#2352;&#2342;&#2366;&#2352;&#2368; &#2325;&#2368; &#2340;&#2352;&#2361;, &#2344;&#2366;&#2351;&#2325;&#2379;&#2306; &#2325;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2309;&#2344;&#2369;&#2342;&#2366;&#2344; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2357;&#2306;&#2358;&#2366;&#2344;&#2369;&#2327;&#2340; &#2344;&#2361;&#2368;&#2306; &#2341;&#2375; &#2324;&#2352; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2341;&#2375;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Both statements are true.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Both statements are not true.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Only Statement I is true.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; I &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Only Statement II is true.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; II &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement I is correct about nayankara.</p><p>Statement II is false; nayaka offices often tended toward heredity and were less uniformly transferable.</p><p>Further Insights:</p><p>- Vijayanagara was founded by Harihara and Bukka (14th century).</p><p>- Krishnadevaraya (Tuluva dynasty) is its most celebrated ruler; Ashta-diggajas adorned his court.</p><p>- The Battle of Talikota (1565) led to the empire's decline.</p><p>- Hampi's architecture includes the Vitthala and Hazara Rama temples.</p><p>- The economy was agrarian with extensive irrigation works (e.g., canals, tanks).</p>",
    "question_index": 113
  },

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true? </p><p>1) India's services sector contributes over half of Gross Value Added (GVA) but employs a smaller share of the workforce than agriculture.</p><p>2) This indicates higher average labor productivity in services than in agriculture.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;? </p><p>1) &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2360;&#2375;&#2357;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2325;&#2354; &#2350;&#2370;&#2354;&#2381;&#2351; &#2357;&#2352;&#2381;&#2343;&#2367;&#2340; (GVA) &#2350;&#2375;&#2306; &#2310;&#2343;&#2375; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2325;&#2366; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2325;&#2371;&#2359;&#2367; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2311;&#2360;&#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2348;&#2354; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2350; &#2361;&#2376;&#2404;</p><p>2) &#2351;&#2361; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2324;&#2360;&#2340; &#2358;&#2381;&#2352;&#2350; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366; &#2325;&#2371;&#2359;&#2367; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only 1</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">Only 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Services share in GVA exceeds 50%, while agriculture still has a high share in employment.</p><p>Higher output share with lower employment share implies higher output per worker in services relative to agriculture.</p><p>Further Insights:</p><p>- Manufacturing's share in GVA is roughly in the mid-teens, with a modest employment share.</p><p>- Disguised unemployment is common in agriculture, lowering measured productivity.</p><p>- Modern services (IT, finance, business services) have high value addition per worker.</p><p>- Structural transformation typically moves labor from agriculture to manufacturing/services over time.</p>",
    "question_index": 114
  },
