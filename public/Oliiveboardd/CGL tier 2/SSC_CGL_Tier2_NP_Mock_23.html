  {
    "question": "<span class=\"eqt\"><p>To complete a certain task Q would take three times as long as P and R together and R takes three times as long as Q and P together. If all the three work together then they take 5 days to complete the work. How long would P take if he worked alone?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; Q &#2319;&#2325; &#2360;&#2366;&#2341; P &#2324;&#2352; R &#2360;&#2375; &#2340;&#2367;&#2327;&#2369;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; R &#2319;&#2325; &#2360;&#2366;&#2341; Q &#2324;&#2352; P &#2360;&#2375; &#2340;&#2367;&#2327;&#2369;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2366;&#2341; &#2340;&#2368;&#2344;&#2379;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 5 &#2342;&#2367;&#2344; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; P &#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2375;, &#2340;&#2379; &#2357;&#2361; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">5 days</span><span class=\"hqt\" style=\"display:none\">5 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">8 days</span><span class=\"hqt\" style=\"display:none\">8 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">10 days</span><span class=\"hqt\" style=\"display:none\">10 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">6 days</span><span class=\"hqt\" style=\"display:none\">6 &#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Three times Q's daily work = (P+R)'s daily work</p><p>3Q=P+R</p><p>Add Q's daily work on both the sides = 4Q = P + Q + R = 1/5</p><p>Q's daily work is = 1/20</p><p>Three times R's daily work = (Q+P)'s daily work</p><p>3R = Q + P</p><p>Add R on both the sides = 4R = P + Q + R = 1/5</p><p>R's daily work = 1/20</p><p>By substituting Q and R's daily work in P + Q + R = 1/5 we get:</p><p>P + 1/20 + 1/20 = 1/5</p><p>P = (1/5) - (2 X 1/20) = 1/10</p><p>Therefore P would take 10 days to complete the work alone.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The graph of the linear equation 4X + 6Y  -  18 = 0 cuts the y-axis at the point is: </p></span><span class=\"hqt\" style=\"display:none\">&#2352;&#2376;&#2326;&#2367;&#2325; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; 4X + 6Y - 18 = 0 &#2325;&#2366; &#2327;&#2381;&#2352;&#2366;&#2347; y-&#2309;&#2325;&#2381;&#2359; &#2325;&#2379; &#2325;&#2367;&#2360; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2325;&#2366;&#2335;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>Cuts on the y-axis, so put X = 0</p><p>4X + 6Y  -  18 = 0</p><p>4*0 + 6Y  -  18 = 0 </p><p>6Y = 18</p><p>Y = 3</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The value of the expression 2cos &#952;[cos<sup>2</sup> &#952;(4cos<sup>2</sup> &#952; - 3)  -  sin<sup>2</sup> &#952;(3  -  4sin<sup>2</sup> &#952;)] is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2381;&#2351;&#2306;&#2332;&#2325; 2cos &#952;[cos<sup>2</sup> &#952;(4cos<sup>2</sup> &#952; - 3) - sin<sup>2</sup> &#952;(3 - 4sin<sup>2</sup> &#952;)] &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376; :</p></span>",
    "options": [

      "<span class=\"eqt\">sin 5&#952;  -  sin 3&#952;</span><span class=\"hqt\" style=\"display:none\">sin 5&#952; - sin 3&#952;</span>",
      "<span class=\"eqt\">cos 5&#952; + cos 3&#952;</span><span class=\"hqt\" style=\"display:none\">cos 5&#952; + cos 3&#952;</span>",
      "<span class=\"eqt\">sin 5&#952; + sin 3&#952;</span><span class=\"hqt\" style=\"display:none\">sin 5&#952; + sin 3&#952;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>2cos &#952;[cos<sup>2</sup> &#952;(4cos<sup>2</sup> &#952; - 3)  -  sin<sup>2</sup> &#952;(3  -  4sin<sup>2</sup> &#952;)]</p><p>= 2[cos &#952;(4cos<sup>3</sup> &#952;  -  3cos &#952;) - sin &#952;(3sin &#952;  -  4sin<sup>3</sup> &#952;)]cos &#952;</p><p>= 2[cos &#952; cos 3&#952; - sin &#952; sin3&#952;]cos &#952;</p><p>= 2cos(3&#952; + &#952;) cos &#952;</p><p>= 2cos 4&#952; cos &#952;</p><p>= cos 5&#952; + cos 3&#952;</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A person takes 8 hours to cover a certain distance by train, same distance takes 4 hours by bus and 2 hours by car. If the ratio of speed of car : bus : train is 4 : 2 : 1. Find the total distance covered if sum of speed is 315 km/hr.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2335;&#2381;&#2352;&#2375;&#2344; &#2360;&#2375; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 8 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; &#2325;&#2379; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2348;&#2360; &#2360;&#2375; 4 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; &#2325;&#2366;&#2352; &#2360;&#2375; 2 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2325;&#2366;&#2352; &#2325;&#2368; &#2330;&#2366;&#2354;: &#2348;&#2360; &#2325;&#2368; &#2330;&#2366;&#2354;: &#2335;&#2381;&#2352;&#2375;&#2344; &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 4: 2: 1 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2330;&#2366;&#2354; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; 315 km/hr &#2361;&#2376;, &#2340;&#2379; &#2340;&#2351; &#2325;&#2368; &#2327;&#2312; &#2325;&#2369;&#2354; &#2342;&#2370;&#2352;&#2368; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1080 km</span><span class=\"hqt\" style=\"display:none\">1080 km</span>",
      "<span class=\"eqt\">1200 km</span><span class=\"hqt\" style=\"display:none\">1200 km</span>",
      "<span class=\"eqt\">1120 km</span><span class=\"hqt\" style=\"display:none\">1120 km</span>",
      "<span class=\"eqt\">1050 km</span><span class=\"hqt\" style=\"display:none\">1050 km</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the speed of car, bus and train be 4x, 2x and x respectively</p><p>According to question,</p><p>Sum of speed = 4x + 2x + x = 315</p><p>7x = 315</p><p>x = 45 </p><p>Speed of car = 45 * 4 = 180 km/hr</p><p>Speed of bus = 45 * 2 = 90 km/hr</p><p>Speed of train = 45 km/hr</p><p>Let the distance covered = D km</p><p>D/180 + D/90 + D/45 = 14</p><p>D(1/180 + 1/90 + 1/45) = 14</p><p>D(1 + 2 + 4)/180 = 14</p><p>7D = 14 * 180</p><p>D = (14 * 180)/7 = 360 km</p><p>Total distance covered = 360 * 3 = 1080 km</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Alpha invests &#8377;60,000 throughout the year. Beta invests &#8377;48,000 for the first 4 months, &#8377;60,000 for the next 4 months, and &#8377;48,000 for the last 4 months. Gamma invests &#8377;36,000 for the first 6 months and &#8377;18,000 for the next 6 months. If total profit is &#8377;139,000, what is Beta's share?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2354;&#2381;&#2347;&#2366; &#2346;&#2370;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#8377;60,000 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2348;&#2368;&#2335;&#2366; &#2346;&#2361;&#2354;&#2375; 4 &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;48,000, &#2309;&#2327;&#2354;&#2375; 4 &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;60,000 &#2324;&#2352; &#2309;&#2306;&#2340;&#2367;&#2350; 4 &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;48,000 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2327;&#2366;&#2350;&#2366; &#2346;&#2361;&#2354;&#2375; 6 &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;36,000 &#2324;&#2352; &#2309;&#2327;&#2354;&#2375; 6 &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;18,000 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; &#8377;139,000 &#2361;&#2376;, &#2340;&#2379; &#2348;&#2368;&#2335;&#2366; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;48,000</span><span class=\"hqt\" style=\"display:none\">&#8377;48,000</span>",
      "<span class=\"eqt\">&#8377;54,000</span><span class=\"hqt\" style=\"display:none\">&#8377;54,000</span>",
      "<span class=\"eqt\">&#8377;52,000</span><span class=\"hqt\" style=\"display:none\">&#8377;52,000</span>",
      "<span class=\"eqt\">&#8377;50,000</span><span class=\"hqt\" style=\"display:none\">&#8377;50,000</span>"

    "correct_option_id": 2,
    "solution": "<p>Alpha's investment * Time = 60000  X  12</p><p>Beta's investment * Time = 48000  X  4 + 60000  X  4 + 48000  X  4</p><p>Gamma's investment * Time = 36000  X  6 + 18000  X  6</p><p>Ratio = (60000  X  12): (48000  X  4 + 60000  X  4 + 48000  X  4): (36000  X  6 + 18000  X  6)</p><p>= (60): (8 * 2 + 10 * 2 + 8 * 2): (6 * 3 + 3 * 3)</p><p>= 60: 52: 27</p><p>Hence, Beta's share = 52/139  X  139000 = &#8377;52,000</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If the probability of MONA solving a riddle is 0.6 and that of TONY solving the same riddle is 0.7, what is the probability that both of them do not solve the riddle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2350;&#2379;&#2344;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2361;&#2375;&#2354;&#2368; &#2361;&#2354; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; 0.6 &#2361;&#2376; &#2324;&#2352; &#2335;&#2379;&#2344;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2350;&#2366;&#2344; &#2346;&#2361;&#2375;&#2354;&#2368; &#2325;&#2379; &#2361;&#2354; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; 0.7 &#2361;&#2376;, &#2340;&#2379; &#2313;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2375; &#2311;&#2360; &#2346;&#2361;&#2375;&#2354;&#2368; &#2325;&#2379; &#2361;&#2354; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2346;&#2366;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">0.42</span><span class=\"hqt\" style=\"display:none\">0.42</span>",
      "<span class=\"eqt\">0.18</span><span class=\"hqt\" style=\"display:none\">0.18</span>",
      "<span class=\"eqt\">0.12</span><span class=\"hqt\" style=\"display:none\">0.12</span>",
      "<span class=\"eqt\">0.28</span><span class=\"hqt\" style=\"display:none\">0.28</span>"

    "correct_option_id": 2,
    "solution": "<p>Probability that both of them do not solve the riddle = P(A') * P(B')</p><p>= 0.4 * 0.3</p><p>= 0.12</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If the arithmetic mean of t and 1/t is P, then the arithmetic mean of t<sup>2</sup> and 1/t<sup>2</sup> equals:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; t &#2324;&#2352; 1/t &#2325;&#2366; &#2309;&#2306;&#2325;&#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2350;&#2366;&#2343;&#2381;&#2351; P &#2361;&#2376;, &#2340;&#2379; t&#178; &#2324;&#2352; 1/t&#178; &#2325;&#2366; &#2309;&#2306;&#2325;&#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2350;&#2366;&#2343;&#2381;&#2351; &#2325;&#2367;&#2360;&#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2327;&#2366;?</p></span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>Let t be a non-zero real number and P = arithmetic mean of t and 1/t.</p><p>Arithmetic mean formula: AM(a, b) = (a + b)/2.</p><p>(t + 1/t)/2 = P =&gt; t + 1/t = 2P.</p><p>Identity: t<sup>2</sup> + 1/t<sup>2</sup> = (t + 1/t)<sup>2</sup> &#8722; 2.</p><p>t<sup>2</sup> + 1/t<sup>2</sup> = (2P)<sup>2</sup> &#8722; 2 = 4P<sup>2</sup> &#8722; 2.</p><p>Arithmetic mean of t<sup>2</sup> and 1/t<sup>2</sup> = (t<sup>2</sup> + 1/t<sup>2</sup>)/2 = (4P<sup>2</sup> &#8722; 2)/2 = 2P<sup>2</sup> &#8722; 1.</p><p>Express solution:</p><p>AM(t<sup>2</sup>, 1/t<sup>2</sup>) = [(2P)<sup>2</sup> &#8722; 2]/2 = (4P<sup>2</sup> &#8722; 2)/2 = 2P<sup>2</sup> &#8722; 1.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>A, B and C run a 600&#8239;m race. If A gives B a start of 100&#8239;m and 150&#8239;m start to C, how many metres start can B give C?</p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2324;&#2352; C 600 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2380;&#2337;&#2364; &#2350;&#2375;&#2306; &#2349;&#2366;&#2327; &#2354;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; A, B &#2325;&#2379; 100 &#2350;&#2368;&#2335;&#2352; &#2324;&#2352; C &#2325;&#2379; 150 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2348;&#2338;&#2364;&#2340; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; B, C &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2348;&#2338;&#2364;&#2340; &#2342;&#2375; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">50&#8239;m</span><span class=\"hqt\" style=\"display:none\">50&#8239;&#2350;&#2368;</span>",
      "<span class=\"eqt\">60&#8239;m</span><span class=\"hqt\" style=\"display:none\">60&#8239;&#2350;&#2368;</span>",
      "<span class=\"eqt\">55&#8239;m</span><span class=\"hqt\" style=\"display:none\">55&#8239;&#2350;&#2368;</span>",
      "<span class=\"eqt\">65&#8239;m</span><span class=\"hqt\" style=\"display:none\">65&#8239;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let a m/s, b m/s, and c m/s be the speeds of A, B, and C respectively.</p><p>When A runs 600&#8239;m, B runs (600 &#8722; 100) = 500&#8239;m</p><p>b/a = 500 / 600 = 5 / 6</p><p>When A runs 600&#8239;m, C runs (600 &#8722; 150) = 450&#8239;m</p><p>c/a = 450 / 600 = 3 / 4</p><p>c/b = (c/a) &div; (b/a) = (3/4) &div; (5/6) = (3/4)  X  (6/5) = 18 / 20 = 9 / 10</p><p>This means when B runs 10&#8239;m, C runs 9&#8239;m.</p><p>So, in a 600&#8239;m race,</p><p>Distance covered by C = (9/10)  X  600 = 540&#8239;m</p><p>B gives C a start of (600 &#8722; 540 =) 60&#8239;m.</p>",
    "question_index": 7
  },

    "question": "<span class=\"eqt\"><p>Anusha sells dupattas in the streets of Lajpat Nagar. Due to recent shortage in the supply of dupattas, she doubles her selling price despite the cost price remains same for her due to a fixed price contract. She realizes that her profit has tripled. Find the original profit percent.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2359;&#2366; &#2354;&#2366;&#2332;&#2346;&#2340; &#2344;&#2327;&#2352; &#2325;&#2368; &#2327;&#2354;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2369;&#2346;&#2335;&#2381;&#2335;&#2375; &#2348;&#2375;&#2330;&#2340;&#2368; &#2361;&#2376;&#2404; &#2361;&#2366;&#2354; &#2361;&#2368; &#2350;&#2375;&#2306; &#2342;&#2369;&#2346;&#2335;&#2381;&#2335;&#2379;&#2306; &#2325;&#2368; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339;, &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2309;&#2344;&#2369;&#2348;&#2306;&#2343; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2350;&#2366;&#2344; &#2352;&#2361;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2357;&#2332;&#2370;&#2342;, &#2357;&#2361; &#2309;&#2346;&#2344;&#2366; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2325;&#2352; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404; &#2313;&#2360;&#2375; &#2351;&#2361; &#2332;&#2381;&#2334;&#2366;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2313;&#2360;&#2325;&#2366; &#2354;&#2366;&#2349; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2361;&#2379; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2366; &#2350;&#2370;&#2354; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">90%</span><span class=\"hqt\" style=\"display:none\">90%</span>",
      "<span class=\"eqt\">100%</span><span class=\"hqt\" style=\"display:none\">100%</span>",
      "<span class=\"eqt\">10%</span><span class=\"hqt\" style=\"display:none\">10%</span>",
      "<span class=\"eqt\">80%</span><span class=\"hqt\" style=\"display:none\">80%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the C.P. be x and S.P. be y.</p><p>According to the question,</p><p>3(y - x) = 2y  -  x</p><p>=&gt; 3y  -  3x = 2y  -  x</p><p>=&gt; y = 2x</p><p>Original profit = Rs (y  -  x) = Rs. (2x  -  x) = Rs. x (Since, y = 2x)</p><p>So, original profit % = x/x &#8727; 100 = 100 %</p>",

: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a</span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">b</span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">c</span></div>&nbsp;=&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">13</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">35</span></div> &nbsp;&#2361;&#2376;, &#2340;&#2379; ab - c &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;&nbsp;</div></p></span>",

    "question": "<span class=\"eqt\"><p>A certain sum amounts to &#8377;25800 after 4 years and &#8377;31200 after 6 years at certain rate of simple interest. Find the rate of interest.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2352; &#2346;&#2352; 4 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2352;&#2369;. 25800 &#2324;&#2352; 6 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2352;&#2369;. 31200 &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Pipe A can fill a tank in 48 minutes while pipe B can empty it in 192 minutes. If both are opened together for 36 minutes, what percentage of the tank remains unfilled?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 48 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2311;&#2346; B &#2313;&#2360;&#2375; 192 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; 36 &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2349;&#2366;&#2327; &#2326;&#2366;&#2354;&#2368; &#2352;&#2361; &#2332;&#2366;&#2319;&#2327;&#2366;?</span>",
    "options": [

      "<span class=\"eqt\">45%</span><span class=\"hqt\" style=\"display:none\">45%</span>",
      "<span class=\"eqt\">43.75%</span><span class=\"hqt\" style=\"display:none\">43.75%</span>",

    "correct_option_id": 2,
    "solution": "<p>Let tank = 1 unit. </p><p>Rate of A = 1/48 per min </p><p>Rate of B =  - 1/192 per min </p><p>Net rate = 1/48  -  1/192 = (4  -  1)/192 = 3/192 = 1/64 per min </p><p>In 36 min, filled = 36/64 = 9/16 </p><p>Remaining = 1  -  9/16 = 7/16 = 0.4375 = 43.75% </p>",

    "question": "<span class=\"eqt\"><p>In the following question, the symbols @, #, $, &copy; and % are used with the following meaning as illustrated below:</p><p>P @ Q =&gt; P &ge; Q</p><p>P # Q =&gt; P &le; Q</p><p>P $ Q =&gt; P &lt; Q</p><p>P &copy; Q =&gt; P &gt; Q</p><p>P % Q =&gt; P = Q</p><p>Assuming the given statements to be true, find which of the conclusion(s) is/are definitely true.</p><p>Statements:</p><p>A # B</p><p>B % C</p><p>C &copy; D</p><p>Conclusions:</p><p>I. B &copy; D</p><p>II. D $ B</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, @, #, $, &copy; &#2324;&#2352; % &#2346;&#2381;&#2352;&#2340;&#2368;&#2325;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;:</p><p>P @ Q =&gt; P &ge; Q</p><p>P # Q =&gt; P &le; Q</p><p>P $ Q =&gt; P &lt; Q</p><p>P &copy; Q =&gt; P &gt; Q</p><p>P % Q =&gt; P = Q</p><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2319;&#2305; &#2325;&#2367; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>A # B</p><p>B % C</p><p>C &copy; D</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>I. B &copy; &#2337;&#2368;</p><p>II. D $ B</p></span>",

    "question": "<span class=\"eqt\"><p>Consider the given question and decide which of the following statements is sufficient to answer the question.</p><p><b>Question:</b></p><p>Five persons - P, Q, R, S, and T were born in different months viz., January, February, March, April and May but not in the same order. In which month T was born?</p><p><b>Statements:</b></p><p>1) Only two persons were born before S. P was born immediately after T.</p><p>2) Q was not born in May. Only one person was born between S and Q.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306; &#2325;&#2367; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;&#2404;</p><p><b>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;:</b></p><p>&#2346;&#2366;&#2305;&#2330; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; - P, Q, R, S &#2324;&#2352; T &#2325;&#2366; &#2332;&#2344;&#2381;&#2350; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2309;&#2352;&#2381;&#2341;&#2366;&#2340; &#2332;&#2344;&#2357;&#2352;&#2368;, &#2347;&#2352;&#2357;&#2352;&#2368;, &#2350;&#2366;&#2352;&#2381;&#2330;, &#2309;&#2346;&#2381;&#2352;&#2376;&#2354; &#2324;&#2352; &#2350;&#2312; &#2350;&#2375;&#2306; &#2361;&#2369;&#2310; &#2341;&#2366;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2360;&#2350;&#2366;&#2344; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2344;&#2361;&#2368;&#2306; &#2361;&#2369;&#2310; &#2341;&#2366;&#2404; T &#2325;&#2366; &#2332;&#2344;&#2381;&#2350; &#2325;&#2367;&#2360; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2361;&#2369;&#2310; &#2341;&#2366;?</p><p><b>&#2325;&#2341;&#2344;:</b></p><p>1) S &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2325;&#2375;&#2357;&#2354; &#2342;&#2379; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2332;&#2344;&#2381;&#2350; &#2361;&#2369;&#2310; &#2341;&#2366;&#2404; P &#2325;&#2366; &#2332;&#2344;&#2381;&#2350; T &#2325;&#2375; &#2336;&#2368;&#2325; &#2348;&#2366;&#2342; &#2361;&#2369;&#2310; &#2341;&#2366;&#2404;</p><p>2) Q &#2325;&#2366; &#2332;&#2344;&#2381;&#2350; &#2350;&#2312; &#2350;&#2375;&#2306; &#2344;&#2361;&#2368;&#2306; &#2361;&#2369;&#2310; &#2341;&#2366;&#2404; S &#2324;&#2352; Q &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366; &#2332;&#2344;&#2381;&#2350; &#2361;&#2369;&#2310; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Statement 1 alone is sufficient while statement 2 alone is not sufficient to answer the given question.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2341;&#2344; 1 &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2325;&#2341;&#2344; 2 &#2309;&#2325;&#2375;&#2354;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",

    "question": "<span class=\"eqt\"><p>In the following question, a statement is followed by two conclusions. Assuming the given statement to be true, find which of the conclusion(s) is/are true and then give your answer accordingly. </p><p><b>Statement: </b>V &le; Z &le; J &ge; X &le; D; K &lt; L &le; O = V</p><p><b>Conclusions: </b></p><p>I. J &gt; K</p><p>II. L &le; J</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2325;&#2341;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306; &#2324;&#2352; &#2347;&#2367;&#2352; &#2313;&#2360;&#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2309;&#2346;&#2344;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><b>&#2325;&#2341;&#2344;: </b>V &le; Z &le; J &ge; X &le; D; K &lt; L &le; O = V</p><p><b>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;: </b></p><p>I. J &gt; K</p><p>II. L &le; J</p></span>",

    "solution": "<p>If the sentence is in the <b>Past tense</b>, the form of tense doesn't change when it is used in the <b>time clause</b>.</p><p>One way of identifying the time clause is that the Time clause always begins with the following:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>When</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Whenever</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">While</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">As</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Since</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">After</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Before</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Until</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">As soon as</td></tr></table><p>For example:</p><p>Mannat told me that when she called him, he was sleeping.</p><p>Mannat said to me, \"When I called him, he was sleeping.\"</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">told.. that</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">She, her</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I, me</td></tr></table><p>Hence, option (b) is the correct answer.</p>",

    "question": "<p> The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error free, mark 'No error' as your answer.</p><p>I would like to / known your thoughts / on this proposal.</p>",
    "options": [

      "I would like to",
      "Known your thoughts",
      "On this proposal"

    "correct_option_id": 2,
    "solution": "<p>The error is in option (c). The error is related to the verb form 'known'. \"Known\" is the past participle form of the verb \"know\" (base form) and is not suitable here because the infinitive marker 'to' requires the base form of the verb, not the past participle. Hence, (c) is the correct answer. </p><p><b>The correct sentence is:</b> I would like to know your thoughts on this proposal.</p><p><b>NOTE:</b></p><p>Participle: A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",

    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Ripon said, \"I will be burning the papers tomorrow.\"</p>",

      "Ripon said that he would be burning the papers tomorrow.",
      "Ripon said that he would burn the papers the next day."
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence in the Direct Speech is in <b>Future Continuous Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Conditional Continuous Tense</b>.</p><p>Future Continuous <b>(Subject + will/shall + be + V1 + ing + Object)</b> should be converted into Conditional Continuous <b>(Subject + would + be +V1 +ing + Object)</b>.</p><p>For example:</p><p>He said, \"I will be using the book next Friday\" (Direct Speech)</p><p>He said that he would be using the book the following Friday. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said that</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">he</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">will be</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">would be</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">tomorrow</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">the next day</td></tr></table><p>Therefore, the correct answer is: <b>(b) Ripon said that he would be burning the papers the next day</b>.</p>",

    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a helping verb 'was' is necessary while changing the voice of the sentence from Active to Passive.</p><p>The preposition \"by\" is used before the object made in Passive Voice. However, it is optional in some cases.</p><p>The Active voice in this question is in Past Indefinite. Thus, the Passive voice will also be in Past Indefinite.</p><p>The format of Active voice is: Subject + V2 + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + was/were + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>Real Madrid won the Champions League. (Active Voice)</p><p>The Champions League was won by Real Madrid. (Passive Voice)</p><p>The options except (c) don't follow the correct grammatical format of the Passive Voice.</p><p>Hence, the correct answer is option (c).</p>",

    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>I asked my father if he was willing to lend me some money.</p>",
    "options": [
      "I said to my father, \"Are you willing to lend me some money?\"",
      "I said to my father, \"Were you willing to lend me some money?\"",
      "I said to my father, \"Would you be lending me some money?\"",
      "I said to my father, \"Will he lend me some money?\""
    ],
    "correct_option_id": 0,
    "solution": "<p>In such cases where the sentence takes an Interrogative form in Direct Speech, \"enquired (of)\", \"wanted to know\", \"asked\", etc., in Indirect Speech, are changed into \"said\" in Direct Speech.</p><p>In Direct speech, the verb is always placed before the subject, unlike in Indirect Speech.</p><p>If there is a question whose answer can come as \"Yes\" or \"No\", we remove the inverted commas and add the conjunction \"If\" or \"Whether\" in the Indirect Speech and the verb/s \"Is/are/am/was/were\" before the subject, in Direct Speech.</p><p>For example:</p><p>Ravi asked me if she was studying. (Indirect Speech)</p><p>Ravi said to me, \"Is she studying?\" (Direct Speech)</p><p>The tense of the Indirect Speech is in the Simple Past. So, the tense in the Direct Speech will be in the Simple Present tense.</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>'Asked' will be changed to 'said to'</p><p>'If' will be omitted.</p><p>'he was' will be changed to 'are you'</p><p>The correct sentence in passive voice is: I said to my father, \"Are you willing to lend me some money?\"</p><p>Therefore, the correct answer is: option (a).</p>",
    "question_index": 100
  },

    "question": "<p>Select the most appropriate tense form to fill in the blank.</p><p>We ___ the concert together next weekend.</p>",
    "options": [
      "Will attends",
      "Would attending",
      "Will attended",
      "Will attend"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most appropriate option to fill in the blank is 'will attend'. The sentence describes something that will happen in the future (next weekend). 'Will attend' is correct as it is in the simple future tense, indicating the planned attendance at the concert next weekend. Option (a) is grammatically incorrect. In the future tense, we use \"will\" with the base form of the verb, not with \"s\" at the end. Option (b) is incorrect. \"Would\" is used for conditional statements or polite requests, not for future tense statements. 'Would' does not indicate a definite future event. Also, it is not appropriate to use 'would' directly with 'attending'. 'Would be attending' is the appropriate expression. It indicates an ongoing or continuous action in the future. \"Would\" should be followed by \"be\" and the present participle form of the verb (\"attending\") to indicate an ongoing future action. Option (c) is incorrect. \"Attended\" is the past tense form of the verb \"to attend\", and it doesn't fit with the future tense context of the sentence. Hence, (d) is the correct answer.</p><p><b>The complete sentence is:</b> We will attend the concert together next weekend.</p><p><b>NOTE:</b></p><p><b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the woman fell on the ground.</p><p><b>Encouraged </b>by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 101
  },

      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement 1 is correct: First Carnatic War (1746 - 48) mirrored the European conflict.</p><p>Statement 2 is incorrect: the Arcot episode belongs to the Second Carnatic War (1749 - 54).</p><p>Statement 3 is correct: Treaty of Paris confirmed French as primarily commercial with limited forts/factories.</p><p>Further Insights:</p><p>- Dupleix was key to early French success; later recalled.</p><p>- Second Carnatic War saw Anglo-French rivalry via Indian allies (e.g., Chanda Sahib vs. Muhammad Ali).</p><p>- Third Carnatic War (1756 - 63) decisively favored the British in India.</p><p>- The fall of Pondicherry (1761) weakened French power before the 1763 settlement.</p>",
    "question_index": 108
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements are correct?</p><p>1) GDP at market prices includes net indirect taxes in valuing output.</p><p>2) GNP at market prices equals GDP at market prices plus net factor income from abroad.</p><p>3) GDP at factor cost equals GDP at market prices plus net indirect taxes.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p><p>1) &#2348;&#2366;&#2332;&#2364;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (&#2332;&#2368;&#2337;&#2368;&#2346;&#2368;) &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2350;&#2375;&#2306; &#2358;&#2369;&#2342;&#2381;&#2343; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352;&#2379;&#2306; &#2325;&#2379; &#2358;&#2366;&#2350;&#2367;&#2354; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2348;&#2366;&#2332;&#2364;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2360;&#2325;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (&#2332;&#2368;&#2319;&#2344;&#2346;&#2368;) &#2348;&#2366;&#2332;&#2364;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (&#2332;&#2368;&#2337;&#2368;&#2346;&#2368;) &#2324;&#2352; &#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2358;&#2369;&#2342;&#2381;&#2343; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2325;&#2366;&#2352;&#2325; &#2354;&#2366;&#2327;&#2340; &#2346;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (&#2332;&#2368;&#2337;&#2368;&#2346;&#2368;) &#2348;&#2366;&#2332;&#2364;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (&#2332;&#2368;&#2337;&#2368;&#2346;&#2368;) &#2324;&#2352; &#2358;&#2369;&#2342;&#2381;&#2343; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352;&#2379;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct: market prices include taxes less subsidies; GNP adds NFIA to GDP.</p><p>Statement 3 is incorrect: GDP at factor cost = GDP at market prices &#8722; net indirect taxes.</p><p>Further Insights:</p><p>- Factor cost excludes product taxes/subsidies; market prices include them.</p><p>- NFIA = income earned by residents from abroad minus income paid to non-residents domestically.</p><p>- NDP/NNP are net concepts after subtracting depreciation.</p><p>- GVA at basic prices aggregates sectoral value added; GDP is sum of GVAs plus product taxes &#8722; subsidies.</p>",
    "question_index": 109
  },

    "question": "<span class=\"eqt\"><p>Consider the following about soils and crop associations:</p><p>I. Cotton and sorghum (jowar) commonly grow on the black soils of the Deccan.</p><p>II. Tea prefers well-drained acidic soils on hill slopes in high rainfall zones, including lateritic profiles.</p><p>III. Wheat is widely grown on alluvial soils in the Ganga - Satluj plains under cool, dry winters.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2324;&#2352; &#2347;&#2360;&#2354; &#2360;&#2306;&#2348;&#2306;&#2343;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2325;&#2346;&#2366;&#2360; &#2324;&#2352; &#2332;&#2381;&#2357;&#2366;&#2352; (&#2360;&#2379;&#2352;&#2328;&#2350;) &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2342;&#2325;&#2381;&#2325;&#2344; &#2325;&#2368; &#2325;&#2366;&#2354;&#2368; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2346;&#2352; &#2313;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2330;&#2366;&#2351; &#2313;&#2330;&#2381;&#2330; &#2357;&#2352;&#2381;&#2359;&#2366; &#2357;&#2366;&#2354;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2361;&#2366;&#2337;&#2364;&#2368; &#2338;&#2354;&#2366;&#2344;&#2379;&#2306; &#2346;&#2352; &#2309;&#2330;&#2381;&#2331;&#2368; &#2332;&#2354; &#2344;&#2367;&#2325;&#2366;&#2360;&#2368; &#2357;&#2366;&#2354;&#2368; &#2309;&#2350;&#2381;&#2354;&#2368;&#2351; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2379; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2354;&#2375;&#2335;&#2352;&#2366;&#2311;&#2335; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2349;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</p><p>III. &#2327;&#2375;&#2361;&#2370;&#2306; &#2327;&#2306;&#2327;&#2366;-&#2360;&#2340;&#2354;&#2369;&#2332; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2336;&#2306;&#2337;&#2368;, &#2358;&#2369;&#2359;&#2381;&#2325; &#2360;&#2352;&#2381;&#2342;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2332;&#2354;&#2379;&#2338;&#2364; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2346;&#2352; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2313;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All three statements are correct and reflect standard soil - crop associations in India.</p><p>Further Insights:</p><p>- Rice thrives in clayey alluvium with assured water; sugarcane in deep fertile loams.</p><p>- Coffee prefers lateritic/red loams at elevations in Karnataka, Kerala, Tamil Nadu.</p><p>- Millets (bajra, ragi) are suited to light soils in semi-arid tracts.</p><p>- Oilseeds like groundnut often grow on well-drained red and black soils.</p>",
    "question_index": 110
  },

    "question": "<span class=\"eqt\"><p>Under Article 14, a legislative classification is valid only if it satisfies which combination?</p></span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 14 &#2325;&#2375; &#2340;&#2361;&#2340;, &#2357;&#2367;&#2343;&#2366;&#2351;&#2368; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2352;&#2339; &#2340;&#2349;&#2368; &#2357;&#2376;&#2343; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348; &#2357;&#2361; &#2325;&#2367;&#2360; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Intelligible differentia and equal application to all persons</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2309;&#2306;&#2340;&#2352; &#2324;&#2352; &#2360;&#2349;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2360;&#2350;&#2366;&#2344; &#2309;&#2344;&#2369;&#2346;&#2381;&#2352;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">Rational nexus and strict proportionality</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2352;&#2381;&#2325;&#2360;&#2306;&#2327;&#2340; &#2360;&#2306;&#2348;&#2306;&#2343; &#2324;&#2352; &#2360;&#2326;&#2381;&#2340; &#2310;&#2344;&#2369;&#2346;&#2366;&#2340;&#2367;&#2325;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Nexus with executive policy and parliamentary approval</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2344;&#2368;&#2340;&#2367; &#2324;&#2352; &#2360;&#2306;&#2360;&#2342;&#2368;&#2351; &#2309;&#2344;&#2369;&#2350;&#2379;&#2342;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2306;&#2348;&#2306;&#2343;</span>",
      "<span class=\"eqt\">Intelligible differentia and a rational nexus with the law's objective</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2379;&#2343;&#2327;&#2350;&#2381;&#2351; &#2349;&#2375;&#2342; &#2324;&#2352; &#2325;&#2366;&#2344;&#2370;&#2344; &#2325;&#2375; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2375; &#2360;&#2366;&#2341; &#2319;&#2325; &#2340;&#2352;&#2381;&#2325;&#2360;&#2306;&#2327;&#2340; &#2360;&#2306;&#2348;&#2306;&#2343;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The two-fold test is: (i) intelligible differentia distinguishing grouped persons/things, and (ii) a rational nexus between the differentia and the objective of the law.</p><p>Strict proportionality is a test commonly used in rights like privacy (Article 21) contexts.</p><p>Further Insights:</p><p>- The \"reasonable classification\" doctrine was elaborated in cases like State of West Bengal v. Anwar Ali Sarkar and Ram Krishna Dalmia.</p><p>- Article 14 also bars manifest arbitrariness; this was emphasized in later Supreme Court jurisprudence.</p><p>- Affirmative action and reasonable classification are not hostile discrimination if linked to legislative goals.</p><p>- Article 14's equality before law (British concept) and equal protection of laws (American concept) co-exist in India.</p>",
    "question_index": 111
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was reported for the first time in Census 2011?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; 2011 &#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2368; &#2348;&#2366;&#2352; &#2342;&#2352;&#2381;&#2332; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Urban population exceeding rural population</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2361;&#2352;&#2368; &#2310;&#2348;&#2366;&#2342;&#2368; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2310;&#2348;&#2366;&#2342;&#2368; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Decline in the population growth rate of rural India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2342;&#2352; &#2350;&#2375;&#2306; &#2327;&#2367;&#2352;&#2366;&#2357;&#2335;</span>",
      "<span class=\"eqt\">Reduction in number of Census Towns</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2344;&#2327;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Rural population falling below 50 per cent</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2310;&#2348;&#2366;&#2342;&#2368; 50 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2360;&#2375; &#2344;&#2368;&#2330;&#2375; &#2327;&#2367;&#2352; &#2352;&#2361;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>For the first time in history, the Census 2011 reported a decline in the population growth rate of rural India.</p><p>However, at that time India was still predominantly rural, with the urban population being just 30 per cent.</p><p>Between Census 2001 and Census 2011, the number of Census Towns increased from 1,362 to 3,894.</p>",
    "question_index": 112

    "question": "<span class=\"eqt\"><p>Consider the following statements about Brahmaputra and its feature. </p><p>Statement I: In Assam, the Brahmaputra shows a braided channel with many mid-channel sand bars (chars).</p><p>Statement II: High sediment load and large seasonal discharge variation promote braiding.</p><p>Which of the above statement is/are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2346;&#2369;&#2340;&#2381;&#2352; &#2344;&#2342;&#2368; &#2324;&#2352; &#2313;&#2360;&#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404; </p><p>&#2325;&#2341;&#2344; 1: &#2309;&#2360;&#2350; &#2350;&#2375;&#2306;, &#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2346;&#2369;&#2340;&#2381;&#2352; &#2344;&#2342;&#2368; &#2325;&#2312; &#2350;&#2343;&#2381;&#2351;-&#2330;&#2376;&#2344;&#2354; &#2352;&#2375;&#2340; &#2325;&#2375; &#2335;&#2368;&#2354;&#2379;&#2306; (&#2330;&#2352;) &#2325;&#2375; &#2360;&#2366;&#2341; &#2319;&#2325; &#2327;&#2369;&#2306;&#2341;&#2368; &#2361;&#2369;&#2312; &#2343;&#2366;&#2352;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2313;&#2330;&#2381;&#2330; &#2340;&#2354;&#2331;&#2335; &#2349;&#2366;&#2352; &#2324;&#2352; &#2348;&#2337;&#2364;&#2375; &#2350;&#2380;&#2360;&#2350;&#2368; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2327;&#2369;&#2306;&#2341;&#2368; &#2361;&#2369;&#2312; &#2343;&#2366;&#2352;&#2366; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Brahmaputra in Assam is a classic braided river (true).</p><p>High sediment supply and fluctuating discharge cause unstable bars and multiple channels (true and explanatory).</p><p>Further Insights:</p><p>- The river enters India near Pasighat (Siang) and exits to Bangladesh near Dhubri.</p><p>- Major tributaries in Assam include the Subansiri (north bank) and Manas (north bank), and the Dhansiri (south bank).</p><p>- The river is called Yarlung Tsangpo in Tibet and Jamuna in Bangladesh (local names vary along its course).</p><p>- Frequent floods and bank erosion are major hazards in the Assam valley.</p>",
    "question_index": 113
  },
  {
    "question": "<span class=\"eqt\"><p>After highway renumbering, which National Highway connects Srinagar to Kanyakumari as India's longest NH?</p></span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2350;&#2366;&#2352;&#2381;&#2327;&#2379;&#2306; &#2325;&#2375; &#2346;&#2369;&#2344;&#2307; &#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2358;&#2381;&#2352;&#2368;&#2344;&#2327;&#2352; &#2325;&#2379; &#2325;&#2344;&#2381;&#2351;&#2366;&#2325;&#2369;&#2350;&#2366;&#2352;&#2368; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2352;&#2366;&#2332;&#2350;&#2366;&#2352;&#2381;&#2327; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2354;&#2306;&#2348;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2352;&#2366;&#2332;&#2350;&#2366;&#2352;&#2381;&#2327; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">NH 27</span><span class=\"hqt\" style=\"display:none\">NH 27</span>",
      "<span class=\"eqt\">NH 44</span><span class=\"hqt\" style=\"display:none\">NH 44</span>",
      "<span class=\"eqt\">NH 48</span><span class=\"hqt\" style=\"display:none\">NH 48</span>",
      "<span class=\"eqt\">NH 16</span><span class=\"hqt\" style=\"display:none\">NH 16</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>NH 44 is the longest north - south corridor, integrating stretches of old NH 7 and others, linking Srinagar to Kanyakumari.</p><p>NH 27 is the major east - west corridor; NH 48 links Delhi - Mumbai - Bengaluru; NH 16 runs along the east coast (Kolkata - Chennai).</p><p>Further Insights:</p><p>- NH 44 length is over 3,700 km after renumbering.</p><p>- Renumbering rationalized NHs in 2010 - 2011; odd numbers run north - south, even numbers east - west.</p><p>- NH 27 (east - west) runs from Porbandar (Gujarat) to Silchar (Assam).</p><p>- BharatmalaPariyojana focuses on economic corridors and feeder routes to enhance freight efficiency.</p><p>- Delhi - Mumbai Expressway is a greenfield, access-controlled corridor distinct from NH 48 alignment.</p>",
    "question_index": 114
  },

    "question": "<span class=\"eqt\"><p>Consider the following regarding Atomic structure and periodic trends:</p><p>I. Atomic radius generally decreases across a period due to increasing effective nuclear charge.</p><p>II. First ionization enthalpy generally increases down a group.</p><p>III. Among isoelectronic species, the one with higher nuclear charge has a smaller radius.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2324;&#2352; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2325;&#2375; &#2352;&#2369;&#2333;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2344;&#2366;&#2349;&#2367;&#2325;&#2368;&#2351; &#2310;&#2357;&#2375;&#2358; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2310;&#2357;&#2352;&#2381;&#2340; &#2350;&#2375;&#2306; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2328;&#2335;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2344;&#2368;&#2330;&#2375; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2341;&#2350; &#2310;&#2351;&#2344;&#2368;&#2325;&#2352;&#2339; &#2319;&#2344;&#2381;&#2341;&#2376;&#2354;&#2381;&#2346;&#2368; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>III. &#2360;&#2350;&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2313;&#2330;&#2381;&#2330; &#2344;&#2366;&#2349;&#2367;&#2325;&#2368;&#2351; &#2310;&#2357;&#2375;&#2358; &#2357;&#2366;&#2354;&#2368; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2331;&#2379;&#2335;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>I is correct: stronger attraction pulls electrons closer.</p><p>II is incorrect: ionization enthalpy generally decreases down a group due to increased shielding and size.</p><p>III is correct: more protons pull the same number of electrons more tightly (e.g., O^2&#8722; &gt; F^&#8722; &gt; Na^+ in radius).</p><p>Further Insights:</p><p>- Across a period: metallic character decreases, electronegativity generally increases.</p><p>- Down a group: atomic radius increases; electron affinity trends are less regular for some groups.</p><p>- Noble gases have very high ionization enthalpies.</p><p>- d- and f-block show irregular trend due to poor shielding.</p>",
    "question_index": 115
  },

    "question": "<span class=\"eqt\"><p>Which of the following Indian citys' municipal corporation in 2025 launched the country's first digital house address project using QR-coded plates to connect households with smart governance and citizen services?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2358;&#2361;&#2352; &#2325;&#2375; &#2344;&#2327;&#2352; &#2344;&#2367;&#2327;&#2350; &#2344;&#2375; 2025 &#2350;&#2375;&#2306; &#2325;&#2381;&#2351;&#2370;&#2310;&#2352; &#2325;&#2379;&#2337; &#2357;&#2366;&#2354;&#2368; &#2346;&#2381;&#2354;&#2375;&#2335;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2328;&#2352;&#2379;&#2306; &#2325;&#2379; &#2360;&#2381;&#2350;&#2366;&#2352;&#2381;&#2335; &#2358;&#2366;&#2360;&#2344; &#2324;&#2352; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2375;&#2358; &#2325;&#2368; &#2346;&#2361;&#2354;&#2368; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2361;&#2366;&#2313;&#2360; &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2346;&#2352;&#2367;&#2351;&#2379;&#2332;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Indore</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2342;&#2380;&#2352;</span>",
      "<span class=\"eqt\">Bhopal</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2379;&#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Jaipur</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2351;&#2346;&#2369;&#2352;</span>",
      "<span class=\"eqt\">Nagpur</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2327;&#2346;&#2369;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The <b>Indore Municipal Corporation (IMC)</b> in Madhya Pradesh has launched a digital house address project, with officials claiming it to be the first such initiative in the country. </p><p>The project involves the installation of special digital plates with unique QR codes outside every house in the city, the officials said. It was launched on a pilot basis from ward number 82 in Sudama Nagar area. </p><p>The project aims to empower 'smart' administration by connecting citizen services with digital technology, an official said. Necessary changes will be made in the digital address project based on the people's suggestions, he added.</p>",
    "question_index": 116
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Mission Vatsalya:</p><p>1) Mission Vatsalya aligns India's child protection priorities with the Sustainable Development Goals (SDGs) and is implemented within the framework of the Juvenile Justice Act, 2015 and the POCSO Act, 2012.</p><p>2) The Integrated Child Protection Scheme (ICPS), implemented since 2009 - 10, was renamed as Child Protection Services in 2017 and later subsumed under Mission Vatsalya from 2021-22.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2367;&#2358;&#2344; &#2357;&#2366;&#2340;&#2381;&#2360;&#2354;&#2381;&#2351; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2350;&#2367;&#2358;&#2344; &#2357;&#2366;&#2340;&#2381;&#2360;&#2354;&#2381;&#2351; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2348;&#2366;&#2354; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2360;&#2340;&#2340; &#2357;&#2367;&#2325;&#2366;&#2360; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351;&#2379;&#2306; (&#2319;&#2360;&#2337;&#2368;&#2332;&#2368;) &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2306;&#2352;&#2375;&#2326;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2375; &#2325;&#2367;&#2358;&#2379;&#2352; &#2344;&#2381;&#2351;&#2366;&#2351; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 2015 &#2324;&#2352; &#2346;&#2368;&#2323;&#2360;&#2368;&#2319;&#2360;&#2323; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 2012 &#2325;&#2375; &#2338;&#2366;&#2306;&#2330;&#2375; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2319;&#2325;&#2368;&#2325;&#2371;&#2340; &#2348;&#2366;&#2354; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2351;&#2379;&#2332;&#2344;&#2366; (&#2310;&#2312;&#2360;&#2368;&#2346;&#2368;&#2319;&#2360;), &#2332;&#2379; 2009-10 &#2360;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2367;&#2340; &#2341;&#2368;, &#2325;&#2366; &#2344;&#2366;&#2350; 2017 &#2350;&#2375;&#2306; &#2348;&#2366;&#2354; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2324;&#2352; &#2348;&#2366;&#2342; &#2350;&#2375;&#2306; 2021-22 &#2360;&#2375; &#2311;&#2360;&#2375; &#2350;&#2367;&#2358;&#2344; &#2357;&#2366;&#2340;&#2381;&#2360;&#2354;&#2381;&#2351; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2358;&#2366;&#2350;&#2367;&#2354; &#2325;&#2352; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Mission Vatsalya is a roadmap to achieve development and child protection priorities aligned with the Sustainable Development Goals (SDGs).It lays emphasis on child rights, advocacy and awareness along with strengthening of the juvenile justice care and protection system with the motto to 'leave no child behind'. The Juvenile Justice (Care and Protection of Children) Act, 2015 provisions and the Protection of Children from Sexual Offences Act, 2012 form the basic framework for implementation of the Mission. </p><p>Prior to 2009-10, there were three schemes being implemented under the Ministry namely, i) Programme for Juvenile Justice for Children in need of care and protection, and Children in conflict with Law; </p><p>ii) Integrated Programme for street children; and </p><p>iii) Scheme for assistance to homes for children (Shishu Greh). </p><p>All the three schemes were incorporated in a single centrally sponsored scheme called the Integrated Child Protection Scheme (ICPS). The ICPS was implemented by the Ministry since 2009-2010. The scheme was then renamed as \"Child Protection Services\" Scheme in 2017. The CPS Scheme has been now subsumed under Mission Vatsalya from 2021-22 onwards.</p>",
    "question_index": 117
  },
