    "question": "<span class=\"eqt\"><p>Read the Assertion (A)and Reason (R) and choose the correct option</p><p>Assertion (A): Sponges (Porifera) lack true tissues and organs.</p><p>Reason (R): Sponges are diploblastic animals with distinct ectoderm and endoderm layers.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2341;&#2344; (A) &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; (R) &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;</p><p>&#2325;&#2341;&#2344; (A): &#2360;&#2381;&#2346;&#2306;&#2332; (&#2346;&#2379;&#2352;&#2368;&#2347;&#2375;&#2352;&#2366;) &#2350;&#2375;&#2306; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2314;&#2340;&#2325; &#2324;&#2352; &#2309;&#2306;&#2327; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2360;&#2381;&#2346;&#2306;&#2332; &#2342;&#2381;&#2357;&#2367;&#2357;&#2367;&#2350;&#2368;&#2351; &#2332;&#2368;&#2357; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2319;&#2325;&#2381;&#2335;&#2379;&#2337;&#2352;&#2381;&#2350; &#2324;&#2352; &#2319;&#2306;&#2337;&#2379;&#2337;&#2352;&#2381;&#2350; &#2325;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2346;&#2352;&#2340;&#2375;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sponges indeed lack true tissues; they have cellular-level organization.</p><p>They are not diploblastic; sponges do not form germ layers like ectoderm and endoderm, so the Reason is false.</p><p>Further Insights:</p><p>- Porifera possess choanocytes (collar cells) that drive water flow and capture food.</p><p>- Skeletal elements are spicules (CaCO3 or silica) and/or spongin fibers.</p><p>- Canal systems: asconoid, syconoid, leuconoid (increasing complexity).</p><p>- Most sponges are asymmetrical; some show radial symmetry.</p><p>- Freshwater genus Spongilla; marine genus Sycon are standard examples used in exams.</p>",
    "question_index": 118
  },
  {
    "question": "<span class=\"eqt\"><p>What was an immediate outcome of the Treaty of Purandar (1665) between Shivaji and the Mughals (via Jai Singh)?</p></span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2324;&#2352; &#2350;&#2369;&#2327;&#2354;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; (&#2332;&#2351; &#2360;&#2367;&#2306;&#2361; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375;) &#2361;&#2369;&#2312; &#2346;&#2369;&#2352;&#2306;&#2342;&#2352; &#2360;&#2306;&#2343;&#2367; (1665) &#2325;&#2366; &#2340;&#2366;&#2340;&#2381;&#2325;&#2366;&#2354;&#2367;&#2325; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Shivaji was recognized as an independent sovereign by the Mughals.</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2325;&#2379; &#2350;&#2369;&#2327;&#2354;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2358;&#2366;&#2360;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2342;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Shivaji pledged never to raid Surat again.</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2344;&#2375; &#2347;&#2367;&#2352; &#2325;&#2349;&#2368; &#2360;&#2370;&#2352;&#2340; &#2346;&#2352; &#2361;&#2350;&#2354;&#2366; &#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2332;&#2381;&#2334;&#2366; &#2325;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Shivaji was appointed as Peshwa of the Deccan by Aurangzeb.</span><span class=\"hqt\" style=\"display:none\">&#2324;&#2352;&#2306;&#2327;&#2332;&#2375;&#2348; &#2344;&#2375; &#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2325;&#2379; &#2342;&#2325;&#2381;&#2325;&#2344; &#2325;&#2366; &#2346;&#2375;&#2358;&#2357;&#2366; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Shivaji ceded several forts, accepted a mansab, and agreed to serve the Mughal emperor.</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2344;&#2375; &#2325;&#2312; &#2325;&#2367;&#2354;&#2375; &#2360;&#2380;&#2306;&#2346; &#2342;&#2367;&#2319;, &#2319;&#2325; &#2350;&#2344;&#2360;&#2348; &#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2350;&#2369;&#2327;&#2354; &#2360;&#2350;&#2381;&#2352;&#2366;&#2335; &#2325;&#2368; &#2360;&#2375;&#2357;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2361;&#2350;&#2340; &#2361;&#2379; &#2327;&#2319;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Shivaji accepted a mansab and ceded territory (including many forts); Sambhaji entered Mughal service. Full sovereignty was not recognized at this stage.</p><p>The Surat raids occurred earlier (1664) and later (1670), not tied to this treaty.</p><p>Further Insights:</p><p>- After Purandar, Shivaji's visit to Aurangzeb's court at Agra (1666) ended with house arrest and his famous escape.</p><p>- Shivaji's coronation as Chhatrapati took place in 1674 at Raigad.</p><p>- Forts were central to Maratha strategy; control of ghats was crucial for mobility.</p><p>- Jai Singh I (Mirza Raja) was a leading Rajput general in Mughal service.</p>",
    "question_index": 119
  },

    "question": "<span class=\"eqt\"><p>Read the Assertion (A)and Reason (R) and choose the correct option.</p><p>Assertion (A): Reverse repo rate is the rate at which the RBI lends long-term funds to banks for project finance.</p><p>Reason (R): In liquidity absorption, the RBI uses reverse repo to take short-term funds from banks.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A) &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; (R) &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2352;&#2367;&#2357;&#2352;&#2381;&#2360; &#2352;&#2375;&#2346;&#2379; &#2352;&#2375;&#2335; &#2357;&#2361; &#2342;&#2352; &#2361;&#2376; &#2332;&#2367;&#2360; &#2346;&#2352; RBI &#2346;&#2381;&#2352;&#2379;&#2332;&#2375;&#2325;&#2381;&#2335; &#2347;&#2366;&#2311;&#2344;&#2375;&#2306;&#2360; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2354;&#2377;&#2344;&#2381;&#2327;-&#2335;&#2352;&#2381;&#2350; &#2347;&#2306;&#2337; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2354;&#2367;&#2325;&#2381;&#2357;&#2367;&#2337;&#2367;&#2335;&#2368; &#2319;&#2348;&#2381;&#2332;&#2377;&#2352;&#2381;&#2346;&#2381;&#2358;&#2344; &#2350;&#2375;&#2306;, RBI &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2360;&#2375; &#2358;&#2377;&#2352;&#2381;&#2335;-&#2335;&#2352;&#2381;&#2350; &#2347;&#2306;&#2337; &#2354;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2367;&#2357;&#2352;&#2381;&#2360; &#2352;&#2375;&#2346;&#2379; &#2325;&#2366; &#2311;&#2360;&#2381;&#2340;&#2375;&#2350;&#2366;&#2354; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",

    "solution": "<p>A is false: reverse repo is the rate at which RBI borrows from banks, not lends for projects.</p><p>R is true: reverse repo is used to absorb liquidity by taking funds from banks for a short period.</p><p>Further Insights:</p><p>- Repo rate is the policy rate for injecting liquidity; banks borrow from RBI against collateral.</p><p>- The Liquidity Adjustment Facility (LAF) operates within a corridor; the Standing Deposit Facility (SDF) currently acts as the floor.</p><p>- Marginal Standing Facility (MSF) is an overnight borrowing window above the repo rate.</p><p>- RBI also conducts variable rate repo/reverse repo (VRR/VRRR) auctions to manage liquidity.</p>",

&#2361;&#2376;&#2404;</p></span>",

    "solution": "<p>During the 6th century BCE, ancient India was divided into <b>sixteen large states</b> known as <b>Mahajanapadas</b>. These states were primarily located in the Indo-Gangetic plains. The matching for the given Mahajanapadas and their capitals is as follows:</p><p><b>A. Magadha  -  2. Rajagriha:</b> Magadha was the most powerful Mahajanapada. Its first capital was <b>Rajagriha</b> (also known as Girivraja), which was surrounded by five hills. Later, the capital was shifted to Pataliputra.</p><p><b>B. Avanti  -  1. Ujjayini:</b> Avanti was a significant kingdom in western India (modern Malwa). It was divided into two parts: the northern part had its capital at <b>Ujjayini</b>, while the southern part had its capital at Mahishmati.</p><p><b>C. Kosala  -  3. Shravasti:</b> Kosala was located in modern-day Uttar Pradesh. Its famous capital was <b>Shravasti</b>. King Prasenajit, a contemporary of the Buddha, ruled here.</p><p><b>D. Vatsa  -  4. Kaushambi:</b> Located on the banks of the Yamuna river, its capital <b>Kaushambi</b> was a major Buddhist center and a hub for trade.</p><p><b>List of Important Mahajanapadas and Capitals</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Mahajanapada</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Capital</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Modern Location</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Magadha</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rajagriha / Pataliputra</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bihar (Patna/Gaya)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Kashi</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Varanasi</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Uttar Pradesh</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Vajji</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vaishali</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bihar</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Gandhara</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Taxila</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Pakistan (Rawalpindi)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Kuru</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Indraprastha</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Delhi/Meerut</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Matsya</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Viratnagar</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rajasthan (Jaipur)</td></tr></table>",
    "question_index": 122

    "question": "<span class=\"eqt\"><p>Which of the following statements are incorrect?</p><p>1) I Too Had a Love Story is by Chetan Bhagat.</p><p>2) Gora is a novel by Rabindranath Tagore.</p><p>3) The Satanic Verses won the Booker Prize.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;?</p><p>1) &#2310;&#2312; &#2335;&#2370; &#2361;&#2376;&#2337; &#2309; &#2354;&#2357; &#2360;&#2381;&#2335;&#2379;&#2352;&#2368; &#2330;&#2375;&#2340;&#2344; &#2349;&#2327;&#2340; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2326;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>2) &#2327;&#2379;&#2352;&#2366; &#2352;&#2357;&#2368;&#2306;&#2342;&#2381;&#2352;&#2344;&#2366;&#2341; &#2335;&#2376;&#2327;&#2379;&#2352; &#2325;&#2366; &#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; &#2361;&#2376;&#2404;</p><p>3) &#2342; &#2360;&#2376;&#2335;&#2376;&#2344;&#2367;&#2325; &#2357;&#2352;&#2381;&#2360;&#2375;&#2332; &#2344;&#2375; &#2348;&#2369;&#2325;&#2352; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2332;&#2368;&#2340;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">All three are correct</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">All three are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;&#2379;&#2306; &#2361;&#2368; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"

    "solution": "<p>Statement 1 is incorrect: I Too Had a Love Story is by Ravinder Singh.</p><p>Statement 2 is correct: Gora is by Rabindranath Tagore.</p><p>Statement 3 is incorrect: The Satanic Verses did not win the Booker Prize.</p><p>Further Insights:</p><p>- Vikram Seth's A Suitable Boy is among the longest novels in English.</p><p>- Kiran Desai's The Inheritance of Loss won the 2006 Booker Prize.</p><p>- Arundhati Roy's The God of Small Things won the 1997 Booker Prize.</p><p>- Amrita Pritam wrote Pinjar; Khushwant Singh wrote Train to Pakistan.</p>",

    "question": "<span class=\"eqt\"><p>In December 2025, which franchise clinched its maiden Global Chess League (GCL) Season 3 title in the Mumbai finals, marking a significant triumph in franchise chess?</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2360;&#2306;&#2348;&#2352; 2025 &#2350;&#2375;&#2306;, &#2325;&#2367;&#2360; &#2347;&#2381;&#2352;&#2375;&#2306;&#2330;&#2366;&#2311;&#2332;&#2368; &#2344;&#2375; &#2350;&#2369;&#2306;&#2348;&#2312; &#2347;&#2366;&#2311;&#2344;&#2354; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2366; &#2346;&#2361;&#2354;&#2366; &#2327;&#2381;&#2354;&#2379;&#2348;&#2354; &#2330;&#2375;&#2360; &#2354;&#2368;&#2327; (&#2332;&#2368;&#2360;&#2368;&#2319;&#2354;) &#2360;&#2368;&#2332;&#2344; 3 &#2326;&#2367;&#2340;&#2366;&#2348; &#2332;&#2368;&#2340;&#2325;&#2352; &#2347;&#2381;&#2352;&#2375;&#2306;&#2330;&#2366;&#2311;&#2332;&#2368; &#2358;&#2340;&#2352;&#2306;&#2332; &#2350;&#2375;&#2306; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2367; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2368;?</span>",

      "<span class=\"eqt\">Triveni Continental Kings</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2357;&#2375;&#2344;&#2368; &#2350;&#2361;&#2366;&#2342;&#2381;&#2357;&#2368;&#2346;&#2368;&#2351; &#2352;&#2366;&#2332;&#2366;</span>",

    "solution": "<p>In Chess, Indian Grandmasters R Praggnanandhaa and Anish Giri's <b>Alpine SG Pipers</b> clinched the Global Chess League 2025 Season 3 title, beating defending Champions Triveni Continental Kings in the finals in Mumbai. </p><p>Alpine SG Pipers defeated Triveni Continental Kings 4-2 in match one, and 4.5-1.5 in the second match to claim their maiden GCL title. </p><p>In the first match, Pipers surged to a 4-2 victory. Alireza Firouzja outplayed Fabiano Caruana in a sharp tactical battle. </p><p>However, the Pipers responded emphatically through Anish Giri, who orchestrated a masterclass against Wei Yi. In the second match, Praggnanandhaa delivered when his team needed him most, defeating Vidit Gujrathi in a crisp 35-move tactical showcase. Anish Giri emerged as the most valuable player in the finals, winning both his games with Black.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about Constitutional Amendments.</p><p>I. The 42nd Amendment added the words \"Socialist\" and \"Secular\" to the Preamble.</p><p>II. The 44th Amendment restored \"internal disturbance\" as a ground for National Emergency.</p><p>III. The 86th Amendment inserted Article 21A making education a Fundamental Right for children aged 6 - 14 years.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. 42&#2357;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2344;&#2375; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;&#2344;&#2366; &#2350;&#2375;&#2306; \"&#2360;&#2350;&#2366;&#2332;&#2357;&#2366;&#2342;&#2368;\" &#2324;&#2352; \"&#2343;&#2352;&#2381;&#2350;&#2344;&#2367;&#2352;&#2346;&#2375;&#2325;&#2381;&#2359;\" &#2358;&#2348;&#2381;&#2342; &#2332;&#2379;&#2337;&#2364;&#2375;&#2404;</p><p>II. 44&#2357;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2344;&#2375; \"&#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2309;&#2358;&#2366;&#2306;&#2340;&#2367;\" &#2325;&#2379; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2348;&#2361;&#2366;&#2354; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>III. 86&#2357;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2344;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 21&#2319; &#2325;&#2379; &#2358;&#2366;&#2350;&#2367;&#2354; &#2325;&#2367;&#2351;&#2366;, &#2332;&#2367;&#2360;&#2360;&#2375; 6 &#2360;&#2375; 14 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2375; &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2319;&#2325; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2348;&#2344; &#2327;&#2312;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">All I, II and III</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>I is correct. \"Socialist\" and \"Secular\" were added to the Preamble in 1976; \"Integrity\" was also added.</p><p>II is incorrect. The 44th replaced \"internal disturbance\" with \"armed rebellion.\"</p><p>III is correct. The 86th made elementary education a Fundamental Right and added a related Fundamental Duty for parents/guardians.</p><p>Further Insights:</p><p>- 73rd and 74th Amendments gave constitutional status to Panchayats and Municipalities.</p><p>- 97th Amendment dealt with cooperative societies.</p><p>- 91st Amendment capped the size of Councils of Ministers and addressed defection provisions.</p>",
    "question_index": 125
  },

    "question": "<span class=\"eqt\"><p>ISRO's Aditya-L1 is stationed around the Sun - Earth L1 point primarily to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2312;&#2319;&#2360;&#2310;&#2352;&#2323; &#2325;&#2366; &#2310;&#2342;&#2367;&#2340;&#2381;&#2351;-&#2319;&#2354;1 &#2360;&#2370;&#2352;&#2381;&#2351;-&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2340;&#2376;&#2344;&#2366;&#2340; &#2361;&#2376; &#2324;&#2352; &#2319;&#2354;1 &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Stay in Earth's shadow to avoid heating</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2368; &#2331;&#2366;&#2351;&#2366; &#2350;&#2375;&#2306; &#2352;&#2361;&#2325;&#2352; &#2327;&#2352;&#2381;&#2350;&#2368; &#2360;&#2375; &#2348;&#2330;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Enable gravity assists toward Jupiter</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2371;&#2361;&#2360;&#2381;&#2346;&#2340;&#2367; &#2325;&#2368; &#2323;&#2352; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2379; &#2360;&#2325;&#2381;&#2359;&#2350; &#2325;&#2352;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Map the Moon's surface continuously</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2306;&#2342;&#2381;&#2352;&#2350;&#2366; &#2325;&#2368; &#2360;&#2340;&#2361; &#2325;&#2366; &#2354;&#2327;&#2366;&#2340;&#2366;&#2352; &#2350;&#2366;&#2344;&#2330;&#2367;&#2340;&#2381;&#2352;&#2339; &#2325;&#2352;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Get an uninterrupted view of the Sun with minimal Earth occultation</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2375; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2309;&#2357;&#2352;&#2379;&#2343; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2366; &#2309;&#2348;&#2366;&#2343;&#2367;&#2340; &#2342;&#2371;&#2358;&#2381;&#2351; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Sun - Earth L1 point (~1.5 million km from Earth) allows a near-continuous, unobstructed view of the Sun for real-time solar observations.</p><p>Further Insights:</p><p>- Aditya-L1 was launched by PSLV-C57 on 2 September 2023 and inserted into a halo orbit around L1.</p><p>- L1 missions monitor space weather; NASA - ESA's SOHO also operates near L1.</p><p>- Key Aditya-L1 payloads include VELC (coronagraph) and SUIT (UV imaging of the Sun).</p><p>- L1 enables early warnings of solar storms affecting satellites and power grids.</p>",
    "question_index": 126
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the correct statement(s).</p><p>1) The biosphere includes all regions of the lithosphere, hydrosphere, and lower atmosphere that support life.</p><p>2) Most living processes are confined to the troposphere; higher layers rarely permit sustained life.</p><p>3) Chemoautotrophs at deep-sea vents show that an ecosystem can function without sunlight.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1) &#2332;&#2368;&#2357;&#2350;&#2306;&#2337;&#2354; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2354;&#2350;&#2306;&#2337;&#2354;, &#2332;&#2354;&#2350;&#2306;&#2337;&#2354; &#2324;&#2352; &#2344;&#2367;&#2330;&#2354;&#2375; &#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2325;&#2375; &#2357;&#2375; &#2360;&#2349;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306; &#2332;&#2379; &#2332;&#2368;&#2357;&#2344; &#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2332;&#2368;&#2357;&#2367;&#2340; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2306; &#2325;&#2381;&#2359;&#2379;&#2349;&#2350;&#2306;&#2337;&#2354; &#2340;&#2325; &#2361;&#2368; &#2360;&#2368;&#2350;&#2367;&#2340; &#2361;&#2376;&#2306;; &#2314;&#2346;&#2352;&#2368; &#2346;&#2352;&#2340;&#2375;&#2306; &#2358;&#2366;&#2351;&#2342; &#2361;&#2368; &#2325;&#2349;&#2368; &#2360;&#2340;&#2340; &#2332;&#2368;&#2357;&#2344; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>3) &#2327;&#2361;&#2352;&#2375; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2325;&#2375; &#2331;&#2367;&#2342;&#2381;&#2352;&#2379;&#2306; &#2346;&#2352; &#2346;&#2366;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2352;&#2360;&#2366;&#2351;&#2344;-&#2360;&#2381;&#2357;&#2346;&#2379;&#2359;&#2368; &#2351;&#2361; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367; &#2319;&#2325; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366; &#2349;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Statement 1 is correct: the biosphere spans life-supporting portions of lithosphere, hydrosphere, and atmosphere.</p><p>Statement 2 is correct: life is overwhelmingly within the troposphere where temperature, pressure, and moisture allow biological activity.</p><p>Statement 3 is correct: chemosynthetic bacteria drive vent ecosystems without sunlight, using chemical energy.</p><p>Further Insights:</p><p>- The troposphere extends roughly 8 - 18 km (lower at poles, higher at equator).</p><p>- The deepest known marine life is found in hadal trenches (&gt;6,000 m).</p><p>- Subsurface microbes (endoliths) inhabit rock pores several kilometers below Earth's surface.</p><p>- Photosynthesis is the dominant global primary productivity driver; chemosynthesis is locally significant.</p>",
    "question_index": 127
  },

    "question": "<span class=\"eqt\"><p>\"India, that is Bharat, shall be a Union of States.\" What is the main constitutional implication of this phrase?</p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2349;&#2366;&#2352;&#2340;, &#2351;&#2366;&#2344;&#2368; &#2349;&#2366;&#2352;&#2340;, &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2366; &#2360;&#2306;&#2328; &#2361;&#2379;&#2327;&#2366;&#2404;\" &#2311;&#2360; &#2357;&#2366;&#2325;&#2381;&#2351;&#2366;&#2306;&#2358; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2344;&#2367;&#2361;&#2367;&#2340;&#2366;&#2352;&#2381;&#2341; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">States have no right to secede from the Union</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2328; &#2360;&#2375; &#2309;&#2354;&#2327; &#2361;&#2379;&#2344;&#2375; &#2325;&#2366; &#2325;&#2379;&#2312; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">India is a confederation where states can withdraw at will</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2319;&#2325; &#2346;&#2352;&#2367;&#2360;&#2306;&#2328; &#2361;&#2376; &#2332;&#2361;&#2366;&#2305; &#2352;&#2366;&#2332;&#2381;&#2351; &#2309;&#2346;&#2344;&#2368; &#2311;&#2330;&#2381;&#2331;&#2366; &#2360;&#2375; &#2309;&#2354;&#2327; &#2361;&#2379; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">States can unilaterally change their boundaries</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2319;&#2325;&#2340;&#2352;&#2347;&#2366; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2346;&#2344;&#2368; &#2360;&#2368;&#2350;&#2366;&#2323;&#2306; &#2325;&#2379; &#2348;&#2342;&#2354; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">States can dissolve the Union by majority vote</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2348;&#2361;&#2369;&#2350;&#2340; &#2360;&#2375; &#2360;&#2306;&#2328; &#2325;&#2379; &#2349;&#2306;&#2327; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>\"Union of States\" signifies an indestructible Union, i.e., no right to secede.</p><p>Boundaries and names of states can be altered by Parliament by law, not unilaterally by states.</p><p>Further Insights:</p><p>- Article 3 empowers Parliament to form new states, alter areas, boundaries, or names of existing states.</p><p>- India has a strong federal system with a unitary tilt in emergencies.</p><p>- The Seventh Schedule distributes powers between Union, State, and Concurrent Lists.</p><p>- The Supreme Court in SR Bommai emphasized federalism as part of the basic structure.</p>",
    "question_index": 128
  },

    "question": "<span class=\"eqt\"><p>Arrange the following events involved in the translocation of organic food in flowering plants in the correct chronological order, starting from the source and ending at the sink, as per the pressure flow hypothesis.</p><p>1. Increase in osmotic pressure within phloem sieve tube elements at the source</p><p>2. Active loading of sucrose into phloem companion cells</p><p>3. Entry of water into phloem from adjacent xylem</p><p>4. Development of mass flow of phloem sap toward sink tissues</p><p>5. Unloading of sugars at the sink region</p><p>Which one of the following is the correct sequence?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2370;&#2354;&#2379;&#2306; &#2357;&#2366;&#2354;&#2375; &#2346;&#2380;&#2343;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2326;&#2366;&#2342;&#2381;&#2351; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2339; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2328;&#2335;&#2344;&#2366;&#2323;&#2306; &#2325;&#2379;, &#2342;&#2366;&#2348; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2346;&#2352;&#2367;&#2325;&#2354;&#2381;&#2346;&#2344;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2360;&#2381;&#2352;&#2379;&#2340; &#2360;&#2375; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2325;&#2352; &#2360;&#2367;&#2306;&#2325; &#2340;&#2325;, &#2360;&#2361;&#2368; &#2325;&#2366;&#2354;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1. &#2360;&#2381;&#2352;&#2379;&#2340; &#2346;&#2352; &#2347;&#2381;&#2354;&#2379;&#2319;&#2350; &#2331;&#2354;&#2344;&#2368; &#2344;&#2354;&#2367;&#2325;&#2366; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2346;&#2352;&#2366;&#2360;&#2352;&#2339; &#2342;&#2366;&#2348; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</p><p>2. &#2347;&#2381;&#2354;&#2379;&#2319;&#2350; &#2360;&#2361;&#2330;&#2352; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2369;&#2325;&#2381;&#2352;&#2379;&#2332; &#2325;&#2366; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358;</p><p>3. &#2360;&#2350;&#2368;&#2346;&#2360;&#2381;&#2341; &#2332;&#2366;&#2311;&#2354;&#2350; &#2360;&#2375; &#2347;&#2381;&#2354;&#2379;&#2319;&#2350; &#2350;&#2375;&#2306; &#2332;&#2354; &#2325;&#2366; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358;</p><p>4. &#2360;&#2367;&#2306;&#2325; &#2314;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2323;&#2352; &#2347;&#2381;&#2354;&#2379;&#2319;&#2350; &#2352;&#2360; &#2325;&#2366; &#2360;&#2366;&#2350;&#2370;&#2361;&#2367;&#2325; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;</p><p>5. &#2360;&#2367;&#2306;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2358;&#2352;&#2381;&#2325;&#2352;&#2366; &#2325;&#2366; &#2344;&#2367;&#2359;&#2381;&#2325;&#2366;&#2360;&#2344;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2 &#8594; 1 &#8594; 3 &#8594; 4 &#8594; 5</span><span class=\"hqt\" style=\"display:none\">2 &#8594; 1 &#8594; 3 &#8594; 4 &#8594; 5</span>",
      "<span class=\"eqt\">1 &#8594; 2 &#8594; 3 &#8594; 4 &#8594; 5</span><span class=\"hqt\" style=\"display:none\">1 &#8594; 2 &#8594; 3 &#8594; 4 &#8594; 5</span>",
      "<span class=\"eqt\">2 &#8594; 3 &#8594; 1 &#8594; 4 &#8594; 5</span><span class=\"hqt\" style=\"display:none\">2 &#8594; 3 &#8594; 1 &#8594; 4 &#8594; 5</span>",
      "<span class=\"eqt\">3 &#8594; 2 &#8594; 1 &#8594; 5 &#8594; 4</span><span class=\"hqt\" style=\"display:none\">3 &#8594; 2 &#8594; 1 &#8594; 5 &#8594; 4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>First, sucrose is actively loaded into phloem companion cells (2)</p><p>This causes an increase in osmotic pressure (1)</p><p>Water enters from xylem due to osmosis (3)</p><p>A pressure gradient develops, driving mass flow toward sinks (4)</p><p>Finally, sugars are unloaded at the sink (5)</p><p>This sequence represents the pressure flow (mass flow) mechanism of phloem transport.</p>",
    "question_index": 129
  },

    "question": "<span class=\"eqt\"><p>______ is a collection of circuitry functions that together makes an important part of a computer system.</p></span><span class=\"hqt\" style=\"display:none\"><p>______ &#2360;&#2352;&#2381;&#2325;&#2367;&#2335;&#2352;&#2368; &#2347;&#2364;&#2306;&#2325;&#2381;&#2358;&#2306;&#2360; &#2325;&#2366; &#2319;&#2325; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361; &#2361;&#2376; &#2332;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2366; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">The platform</span><span class=\"hqt\" style=\"display:none\">&#2342; &#2346;&#2381;&#2354;&#2375;&#2335;&#2347;&#2377;&#2352;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Application software</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2346;&#2381;&#2354;&#2368;&#2325;&#2375;&#2358;&#2344; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Operating system</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>",
      "<span class=\"eqt\">The motherboard</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2342;&#2352;&#2348;&#2379;&#2352;&#2381;&#2337;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A motherboard is the main printed circuit board (PCB) found in general purpose microcomputers and other expandable systems.</p><p>It is the main printed circuit board of a computer that carries the central processing unit (CPU) chip, Read Only Memory (ROM), Random Access Memory (RAM) and the basic input output system (BIOS) chip.</p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>In macOS, what is the keyboard shortcut to open the Spotlight search?</p></span><span class=\"hqt\" style=\"display:none\"><p>MacOS &#2350;&#2375;&#2306;, &#2360;&#2381;&#2346;&#2377;&#2335;&#2354;&#2366;&#2311;&#2335; &#2360;&#2352;&#2381;&#2330; &#2326;&#2379;&#2354;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337; &#2358;&#2377;&#2352;&#2381;&#2335;&#2325;&#2335; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Command + Spacebar</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350;&#2366;&#2306;&#2337; + &#2360;&#2381;&#2346;&#2375;&#2360;&#2348;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Command + C</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350;&#2366;&#2306;&#2337; + C</span>",
      "<span class=\"eqt\">Command + Q</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350;&#2366;&#2306;&#2337; + Q</span>",
      "<span class=\"eqt\">Command + W</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350;&#2366;&#2306;&#2337; + W</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In macOS, the keyboard shortcut to open the Spotlight search is <b>Command + Spacebar.</b> This combination opens the Spotlight search bar at the top right corner of the screen, allowing you to quickly search for files, applications, documents, and perform other system-related tasks.</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>Encryption and decryption are the functions of which layer?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2358;&#2344; &#2324;&#2352; &#2337;&#2367;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2358;&#2344; &#2325;&#2367;&#2360; &#2354;&#2375;&#2351;&#2352; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Network Layer</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2354;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Data Link Layer</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2335;&#2366; &#2354;&#2367;&#2306;&#2325; &#2354;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Presentation Layer</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2375;&#2332;&#2375;&#2306;&#2335;&#2375;&#2358;&#2344; &#2354;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Application Layer</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2346;&#2381;&#2354;&#2368;&#2325;&#2375;&#2358;&#2344; &#2354;&#2375;&#2351;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Data encryption and decryption take place in the presentation layer. Presentation Layer is the 6th layer in the Open System Interconnection (OSI) model. This layer is also known as Translation layer, as this layer serves as a data translator for the network. The data which this layer receives from the Application Layer is extracted and manipulated here as per the required format to transmit over the network. The main responsibility of this layer is to provide or define the data format and encryption. The presentation layer is also called as Syntax layer since it is responsible for maintaining the proper syntax of the data which it either receives or transmits to other layer(s) .</p>",
    "question_index": 132
  },
  {

      "<span class=\"eqt\">Spreadsheet</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2381;&#2352;&#2375;&#2337;&#2358;&#2368;&#2335;</span>",
      "<span class=\"eqt\">Presentation</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2375;&#2332;&#2375;&#2306;&#2335;&#2375;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Desktop Publishing</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2360;&#2381;&#2325;&#2335;&#2377;&#2346; &#2346;&#2348;&#2381;&#2354;&#2367;&#2358;&#2367;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Application software includes programs that direct the computer to carry out specific tasks. Often, multiple programs are integrated to create an application. For example: To write error free documents, Word Processors are used such as OpenOffice.org Writer, MS Word etc. For calculations, Spreadsheets are used such as OpenOffice.org Spreadsheet, MS Excel etc. For making presentations, Presentation Software are used such as OpenOffice.org Impress, MS PowerPoint etc. For designing images, Desktop publishing software are used such as Gimp, Adobe Photoshop, Corel Draw, Picasa etc.</p>",
    "question_index": 133
  },
  {
    "question": "<span class=\"eqt\"><p>What was the first computer virus called?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2361;&#2354;&#2375; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2357;&#2366;&#2351;&#2352;&#2360; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2344;&#2366;&#2350; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ransomware</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2376;&#2344;&#2360;&#2350;&#2357;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">ILOVEYOU</span><span class=\"hqt\" style=\"display:none\">ILOVEYOU</span>",
      "<span class=\"eqt\">GOTOHELL</span><span class=\"hqt\" style=\"display:none\">GOTOHELL</span>",
      "<span class=\"eqt\">Brain</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2375;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Brain</b>, the first computer virus, was developed in 1986 by two brothers from Pakistan to prevent piracy of medical software. In 1986, the first PC virus, Brain, began infecting 5.2-inch floppy disks. According to Securelist, it was the work of Basit and Amjad Farooq Alvi, brothers who owned a computer store in Pakistan.</p>",
    "question_index": 134
  },
  {

    "correct_option_id": 0,
    "solution": "<p>Domain names are required in order to identify one or more IP addresses over the world wide web.</p><p>A domain name serves as an address which is used to access the website. It can be universally understood by Web servers and online organizations.</p><p>.com, .edu, .org, .gov are some top level domain names.</p>",

  {
    "question": "<span class=\"eqt\"><p>If one wants to copy the content of the cell present in the left cell, then which keyboard combination can be used?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2379;&#2312; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375;&#2354; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2360;&#2375;&#2354; &#2325;&#2368; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2325;&#2379; &#2325;&#2377;&#2346;&#2368; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2367;&#2360; &#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p>To copy the left cell, click a right cell beside the data which one wants to copy, and then press<b> Ctrl + R</b> keys, and the left cell value has been pasted into the right cell immediately. Ctrl +D is used to copy the content of the cell present above.</p>",
    "question_index": 136
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about polymorphic viruses:</p><p>1)Polymorphic viruses change their code signature to avoid detection.</p><p>2)Polymorphic viruses do not require a host file to spread.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2377;&#2354;&#2368;&#2350;&#2377;&#2352;&#2381;&#2347;&#2367;&#2325; &#2357;&#2366;&#2351;&#2352;&#2360; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2346;&#2377;&#2354;&#2368;&#2350;&#2377;&#2352;&#2381;&#2347;&#2367;&#2325; &#2357;&#2366;&#2351;&#2352;&#2360; &#2346;&#2361;&#2330;&#2366;&#2344; &#2360;&#2375; &#2348;&#2330;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2346;&#2344;&#2375; &#2325;&#2379;&#2337; &#2360;&#2367;&#2327;&#2381;&#2344;&#2375;&#2330;&#2352; &#2325;&#2379; &#2348;&#2342;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2346;&#2377;&#2354;&#2368;&#2350;&#2377;&#2352;&#2381;&#2347;&#2367;&#2325; &#2357;&#2366;&#2351;&#2352;&#2360; &#2325;&#2379; &#2347;&#2376;&#2354;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2361;&#2379;&#2360;&#2381;&#2335; &#2347;&#2364;&#2366;&#2311;&#2354; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1  -  Correct: Polymorphic viruses alter their code to evade antivirus signature-based detection.</p><p>Statement 2  -  Incorrect: They are still viruses, hence require a host file to spread (unlike worms).</p>",
    "question_index": 137
  },

  {
    "question": "<span class=\"eqt\"><p>In stack data structure, the elements are added and removed based on: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2335;&#2376;&#2325; &#2337;&#2375;&#2335;&#2366; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2350;&#2375;&#2306; &#2340;&#2340;&#2381;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2379; &#2325;&#2367;&#2360;&#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2332;&#2379;&#2337;&#2364;&#2366; &#2324;&#2352; &#2361;&#2335;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">LIFO principle</span><span class=\"hqt\" style=\"display:none\">LIFO &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;</span>",
      "<span class=\"eqt\">FIFO principle</span><span class=\"hqt\" style=\"display:none\">FIFO &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;</span>",
      "<span class=\"eqt\">FEFO principle</span><span class=\"hqt\" style=\"display:none\">FEFO &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;</span>",
      "<span class=\"eqt\">LEFO principle</span><span class=\"hqt\" style=\"display:none\">LEFO &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The stack is a simple data structure in which elements are added and removed based on the <b>LIFO (Last in First Out) principle</b>.</p><p>&#8226; Open parenthesis is pushed into the stack and a closed parenthesis pops out elements till the top element of the stack is its corresponding open parenthesis.</p><p>&#8226; If the stack is empty, parenthesis is balanced otherwise it is unbalanced.</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>What is the port number used for Hypertext Transfer Protocol Secure (HTTPS)? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2366;&#2311;&#2346;&#2352;&#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2347;&#2352; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2360;&#2367;&#2325;&#2381;&#2351;&#2379;&#2352; (HTTPS) &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2346;&#2379;&#2352;&#2381;&#2335; &#2344;&#2306;&#2348;&#2352; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Port 179</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2352;&#2381;&#2335; 179</span>",
      "<span class=\"eqt\">Port 443</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2352;&#2381;&#2335; 443</span>",
      "<span class=\"eqt\">Port 123</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2352;&#2381;&#2335; 123</span>",
      "<span class=\"eqt\">Port 500</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2352;&#2381;&#2335; 500</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Port number used for Hypertext Transfer Protocol Secure (HTTPS) is Port 443.</p><p><b>Port 443</b> is a virtual point &#8288;through which data transmissions are sent and received. This communication endpoint is used by transport layer protocols, like the Transmission Control Protocol (TCP), to divert different types of web traffic to its destination.</p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the OSI model:</p><p>1)The Session layer is responsible for establishing, managing, and terminating communication sessions.</p><p>2)The Presentation layer handles data encryption, compression, and format translation.</p><p>3)The Transport layer is responsible for routing packets between different networks.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>OSI &#2350;&#2377;&#2337;&#2354; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2360;&#2375;&#2358;&#2344; &#2354;&#2375;&#2351;&#2352; &#2360;&#2306;&#2330;&#2366;&#2352; &#2360;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375;, &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;&#2404;</p><p>2) &#2346;&#2381;&#2352;&#2375;&#2332;&#2375;&#2306;&#2335;&#2375;&#2358;&#2344; &#2354;&#2375;&#2351;&#2352; &#2337;&#2375;&#2335;&#2366; &#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2358;&#2344;, &#2360;&#2306;&#2346;&#2368;&#2337;&#2364;&#2344; &#2324;&#2352; &#2346;&#2381;&#2352;&#2366;&#2352;&#2370;&#2346; &#2309;&#2344;&#2369;&#2357;&#2366;&#2342; &#2325;&#2379; &#2360;&#2306;&#2349;&#2366;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3) &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2346;&#2379;&#2352;&#2381;&#2335; &#2354;&#2375;&#2351;&#2352; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2346;&#2376;&#2325;&#2375;&#2335;&#2379;&#2306; &#2325;&#2379; &#2352;&#2370;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement 1 - Correct: The Session layer (Layer 5) manages sessions between communicating applications.</p><p></p><p>Statement 2 - Correct: The Presentation layer (Layer 6) ensures proper data representation, including encryption, compression, and translation.</p><p></p><p>Statement 3 - Incorrect: Routing is performed by the Network layer (Layer 3), not the Transport layer.</p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>Where are the instructions for booting process of a computer are housed in?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2368; &#2348;&#2370;&#2335;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; &#2325;&#2361;&#2366;&#2305; &#2360;&#2327;&#2381;&#2352;&#2361;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">DRAM</span><span class=\"hqt\" style=\"display:none\">DRAM</span>",
      "<span class=\"eqt\">SRAM</span><span class=\"hqt\" style=\"display:none\">SRAM</span>",
      "<span class=\"eqt\">ROM</span><span class=\"hqt\" style=\"display:none\">ROM</span>",
      "<span class=\"eqt\">CD-ROM</span><span class=\"hqt\" style=\"display:none\">CD-ROM</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>From the very beginning, when the power button is pressed to turn the computer on, the power supply unit gives power to the motherboard and its components so that they can play their part in the whole system. The first part of the next step of the boot process is controlled by BIOS and it is stored in the non-volatile memory- ROM.</p>",
    "question_index": 142
  },
  {
    "question": "<span class=\"eqt\"><p>Which programming language is widely used for developing web applications? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2375;&#2348; &#2319;&#2346;&#2381;&#2354;&#2367;&#2325;&#2375;&#2358;&#2344; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;&#2367;&#2306;&#2327; &#2354;&#2376;&#2306;&#2327;&#2381;&#2357;&#2375;&#2332; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Java</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2357;&#2366;</span>",
      "<span class=\"eqt\">C++</span><span class=\"hqt\" style=\"display:none\">C++</span>",
      "<span class=\"eqt\">HTML</span><span class=\"hqt\" style=\"display:none\">HTML</span>",
      "<span class=\"eqt\">Python</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2341;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>HTML (Hypertext Markup Language) is the standard markup language for creating web pages and web applications. HTML is a key component of the World Wide Web and is used in conjunction with other technologies such as CSS (Cascading Style Sheets) and JavaScript to create interactive and visually appealing web pages. CSS is used to control the presentation and layout of the HTML content, while JavaScript is used to add dynamic behavior and interactivity to the web pages.</p>",
    "question_index": 143

    "question": "<span class=\"eqt\"><p>Unsolicited Commercial Email (UCE) is referred to as_______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2360;&#2377;&#2354;&#2367;&#2360;&#2367;&#2335;&#2375;&#2337; &#2325;&#2350;&#2352;&#2381;&#2358;&#2367;&#2351;&#2354; &#2312;&#2350;&#2375;&#2354; (UCE) &#2325;&#2379; _______ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Spam</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2376;&#2350;</span>",
      "<span class=\"eqt\">Trash</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2376;&#2358;</span>",
      "<span class=\"eqt\">Virus</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2352;&#2360;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>The term \"spam\" refers to unsolicited commercial email (UCE) or unsolicited bulk email (UBE).</b> It is flooding the Internet with many copies of the same message, in an attempt to force the message on people who would not otherwise choose to receive it. It is also referred to as junk email. Unsolicited email mostly contains advertisements for services or products. However most of the spams are from marketers or users who are trying to deceive the users. </p>",
    "question_index": 145
  },
  {
    "question": "<span class=\"eqt\"><p>What type of error does the compiler show if illegal operations are performed in a program?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2350;&#2375;&#2306; &#2309;&#2357;&#2376;&#2343; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2325;&#2306;&#2346;&#2366;&#2311;&#2354;&#2352; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2319;&#2352;&#2352; &#2342;&#2367;&#2326;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Syntax error</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2306;&#2335;&#2375;&#2325;&#2381;&#2360; &#2319;&#2352;&#2352;</span>",
      "<span class=\"eqt\">Semantic error</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2350;&#2375;&#2306;&#2335;&#2367;&#2325; &#2319;&#2352;&#2352;</span>",
      "<span class=\"eqt\">Logical error</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2332;&#2367;&#2325;&#2354; &#2319;&#2352;&#2352;</span>",
      "<span class=\"eqt\">Runtime error</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2344;&#2335;&#2366;&#2311;&#2350; &#2319;&#2352;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Syntax Error When the rules of the programming language are not followed, the compiler will show syntax error.</p><p>Semantic Error: Semantic errors are reported by the compiler when the statements written in the program are not meaningful to the compiler.</p><p>Logical Error: Logical errors are those errors that occur in the output of the program. The presence of logical errors leads to undesired or incorrect output.</p><p>Runtime Error: Runtime errors are those errors that occur during the execution of a program. It generally occurs due to some illegal operation performed in the program.</p>",
    "question_index": 146
  },
  {
    "question": "<span class=\"eqt\"><p>Which feature allows you to protect a worksheet from being edited in MS Excel? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2310;&#2346;&#2325;&#2379; &#2357;&#2352;&#2381;&#2325;&#2358;&#2368;&#2335; &#2325;&#2379; &#2319;&#2350;&#2319;&#2360; &#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2350;&#2375;&#2306; &#2319;&#2337;&#2367;&#2335; &#2361;&#2379;&#2344;&#2375; &#2360;&#2375; &#2348;&#2330;&#2366;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Data Validation</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2335;&#2366; &#2357;&#2375;&#2354;&#2367;&#2337;&#2375;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Conditional Format</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2337;&#2368;&#2358;&#2344;&#2354; &#2347;&#2377;&#2352;&#2381;&#2350;&#2375;&#2335;</span>",
      "<span class=\"eqt\">Password Protection</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2360;&#2357;&#2352;&#2381;&#2337; &#2346;&#2381;&#2352;&#2379;&#2335;&#2375;&#2325;&#2381;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Lock Panes</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2325; &#2346;&#2376;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Password Protection</b> is a Microsoft Excel feature that prevents editing of a worksheet.</p><p>Data Validation: Based on predetermined criteria, this feature is utilized to restrict the kind of data that can be entered into a cell or range of cells.</p><p>Conditional Format: Based on particular conditions, such as whether a value is above or below a certain threshold, this feature is utilized to highlight particular cells or ranges of cells.</p><p>Lock Panes: When scrolling through a worksheet, this feature is used to lock particular rows or columns so that they remain visible on the screen.</p><p>Note: You can set a password that must be entered to edit or change a worksheet's contents with Password Protection. It protects the worksheet from being altered without authorization.</p>",
    "question_index": 147
  },
  {
    "question": "<span class=\"eqt\"><p>Which among the following can be called as a frame buffer?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2347;&#2364;&#2381;&#2352;&#2375;&#2350; &#2348;&#2347;&#2364;&#2352; &#2325;&#2361;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Secondary memory</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2325;&#2375;&#2306;&#2337;&#2352;&#2368; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Arithmetic and logic unit</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2352;&#2367;&#2341;&#2350;&#2375;&#2335;&#2367;&#2325; &#2319;&#2306;&#2337; &#2354;&#2377;&#2332;&#2367;&#2325; &#2351;&#2370;&#2344;&#2367;&#2335;</span>",
      "<span class=\"eqt\">Programme counter</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2366;&#2313;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Video Random Access Memory</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2337;&#2367;&#2351;&#2379; &#2352;&#2376;&#2306;&#2337;&#2350; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>VRAM (video RAM) is a reference to any type of random-access memory (RAM) used to store image data for a computer display. All types of VRAM are special arrangements of dynamic RAM (DRAM). VRAM is a buffer between the computer processor and the display andis often calledas the frame buffer. The information in the buffer typically consists of colour values for every pixel to be shown on the display. Modern video cards contain framebuffer circuitry in their cores. </p>",
    "question_index": 148
  },

    "question": "<span class=\"eqt\"><p>_____ is a specialized, high-speed network that provides network access to storage devices.</p></span><span class=\"hqt\" style=\"display:none\"><p>_____ &#2319;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359;&#2368;&#2325;&#2371;&#2340; &#2324;&#2352; &#2361;&#2366;&#2312;-&#2360;&#2381;&#2346;&#2368;&#2337; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2361;&#2376; &#2332;&#2379; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2325;&#2379; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Network File System</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2347;&#2366;&#2311;&#2354; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>",
      "<span class=\"eqt\">Network Attached Storage</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2309;&#2335;&#2376;&#2330;&#2381;&#2337; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332;</span>",
      "<span class=\"eqt\">Storage Area Network</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2319;&#2352;&#2367;&#2351;&#2366; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325;</span>",
      "<span class=\"eqt\">Redundant Arrays of Independent Disks</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2337;&#2306;&#2337;&#2375;&#2344;&#2381;&#2335; &#2320;&#2352;&#2375; &#2321;&#2347; &#2311;&#2306;&#2337;&#2367;&#2346;&#2375;&#2306;&#2337;&#2375;&#2306;&#2335; &#2337;&#2367;&#2360;&#2381;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; A <b>Storage Area Network</b> (SAN) is a specialized, high-speed network that provides network access to storage devices. </p><p>&#183; SANs are typically composed of hosts, switches, storage elements, and storage devices that are interconnected using a variety of technologies, topologies, and protocols. SANs may span multiple sites.</p><p>&#183; A SAN presents storage devices to a host such that the storage appears to be locally attached.</p><p>&#183; This simplified presentation of storage to a host is accomplished through the use of different types of virtualization.</p>",

  }
