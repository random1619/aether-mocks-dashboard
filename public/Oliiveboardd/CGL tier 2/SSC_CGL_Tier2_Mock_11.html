    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>A. The consent of the assembly of the state is mandatory for altering its boundaries.</p><p>B. Every amendment to a bill proposing bifurcation of a state needs to be approved by the legislature of the state concerned.</p><p>Which of the above statements is / are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>A. &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2360;&#2368;&#2350;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2357;&#2367;&#2343;&#2366;&#2344;&#2360;&#2349;&#2366; &#2325;&#2368; &#2360;&#2361;&#2350;&#2340;&#2367; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2361;&#2376;&#2404;</p><p>B. &#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2379; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2357;&#2367;&#2343;&#2366;&#2351;&#2367;&#2325;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2344;&#2369;&#2350;&#2379;&#2342;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only Statement A is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; A &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only Statement B is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; B &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both Statements A and B correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Both statements A and B incorrect</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Both the statements are incorrect.</p><p>Article 3 authorises the Parliament to:</p><p>(a) form a new state by separation of territory from any state or by uniting two or more states or parts of states or by uniting any territory to a part of any state</p><p>(b) increase the area of any state,</p><p>(c) diminish the area of any state,</p><p>(d) alter the boundaries of any state, and</p><p>(e) alter the name of any state.</p><p>However, Article 3 lays down two conditions in this regard: one, a bill contemplating the above changes can be introduced in the Parliament only with the prior recommendation of the President; and two, before recommending the bill, the President has to refer the same to the state legislature concerned for expressing its views within a specified period.</p><p>The President (or Parliament) is not bound by the views of the state legislature and may either accept or reject them, even if the views are received in time. Further, it is not necessary to make a fresh reference to the state legislature every time an amendment to the bill is moved and accepted in Parliament.</p><p>Source: Indian Polity, Laxmikanth.</p>",
    "question_index": 114
  },
  {
    "question": "<span class=\"eqt\"><p>Read the following statements and choose the correct option.</p><p>Statement I: Cotton grows well in drier parts of the black cotton soil of the Deccan plateau.</p><p>Statement II: Cotton requires high temperature, heavy rainfall or irrigation, 365 frost-free days and bright sun-shine for its growth.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2367;&#2319; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344; I: &#2342;&#2325;&#2381;&#2325;&#2344; &#2325;&#2375; &#2346;&#2336;&#2366;&#2352; &#2325;&#2368; &#2325;&#2366;&#2354;&#2368; &#2325;&#2346;&#2366;&#2360;&#2368; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2375; &#2360;&#2370;&#2326;&#2375; &#2349;&#2366;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2346;&#2366;&#2360; &#2309;&#2330;&#2381;&#2331;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2313;&#2327;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2325;&#2346;&#2366;&#2360; &#2325;&#2379; &#2311;&#2360;&#2325;&#2375; &#2313;&#2327;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2330;&#2381;&#2330; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344;, &#2349;&#2366;&#2352;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366; &#2351;&#2366; &#2360;&#2367;&#2306;&#2330;&#2366;&#2312;, 365 &#2336;&#2306;&#2338;-&#2350;&#2369;&#2325;&#2381;&#2340; &#2342;&#2367;&#2344; &#2324;&#2352; &#2340;&#2375;&#2332; &#2343;&#2370;&#2346; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Statement I is FALSE and Statement II is TRUE</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2324;&#2352; &#2325;&#2341;&#2344; II &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Statement I is TRUE and Statement II is FALSE</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2324;&#2352; &#2325;&#2341;&#2344; II &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Statement I is FALSE and Statement II is FALSE</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2324;&#2352; &#2325;&#2341;&#2344; II &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Statement I is TRUE and Statement II is TRUE</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2324;&#2352; &#2325;&#2341;&#2344; II &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>India is believed to be the original home of the cotton plant. Cotton is one of the main raw materials for the cotton textile industry.</p><p>Cotton grows well in drier parts of the black cotton soil of the Deccan plateau.</p><p>It requires high temperature, light rainfall or irrigation, <b>210 frost-free days</b> and bright sun-shine for its growth. Hence Statement II is false.</p><p>It is a kharif crop and requires 6 to 8 months to mature.</p><p>Major cotton-producing states are -  Maharashtra, Gujarat, Madhya Pradesh, Karnataka, Andhra Pradesh, Telangana, Tamil Nadu, Punjab, Haryana and Uttar Pradesh.</p>",
    "question_index": 115
  },
  {
    "question": "<span class=\"eqt\"><p>The Constitution(Scheduled Tribes)Order(Amendment)Bill, 2024 intended to amend the Constitution (Scheduled Tribes) Order, 1950 to modify the list of Scheduled Tribes regarding Andhra Pradesh was passed by the Lok Sabha on 8th February 2024. It included which of the following Particularly Vulnerable Tribal Groups (PVTGs) in the ST list of Andhra Pradesh?</p><p>I. Bondo Porja</p><p>II. Khond Porja</p><p>III. Konda Savaras</p></span><span class=\"hqt\" style=\"display:none\"><p>8 &#2347;&#2352;&#2357;&#2352;&#2368; 2024 &#2325;&#2379; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2319; &#2327;&#2319; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; (&#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367;) &#2310;&#2342;&#2375;&#2358; (&#2360;&#2306;&#2358;&#2379;&#2343;&#2344;) &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;, 2024 &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2370;&#2330;&#2368; &#2325;&#2379; &#2360;&#2306;&#2358;&#2379;&#2343;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; (&#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367;) &#2310;&#2342;&#2375;&#2358;, 1950 &#2350;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2352;&#2344;&#2366; &#2341;&#2366;&#2404; &#2311;&#2360; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2325;&#2368; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367; &#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;/&#2325;&#2367;&#2344; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2350;&#2332;&#2379;&#2352; &#2332;&#2344;&#2332;&#2366;&#2340;&#2368;&#2351; &#2360;&#2350;&#2370;&#2361;/&#2360;&#2350;&#2370;&#2361;&#2379;&#2306; (PVTG) &#2325;&#2379; &#2358;&#2366;&#2350;&#2367;&#2354; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p><p>I. &#2348;&#2379;&#2306;&#2337;&#2379; &#2346;&#2379;&#2352;&#2332;&#2366;</p><p>II. &#2326;&#2379;&#2306;&#2337; &#2346;&#2379;&#2352;&#2332;&#2366;</p><p>III. &#2325;&#2379;&#2306;&#2337;&#2366; &#2360;&#2357;&#2366;&#2352;&#2360;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III</span><span class=\"hqt\" style=\"display:none\">II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Constitution (Scheduled Tribes) Order (Amendment) Bill, 2024 in respect of Andhra Pradesh and the Constitution (Scheduled Castes and Scheduled Tribes) Orders (Amendment) Bill, 2024 in respect of Odisha were passed by the Lok Sabha on 8th February 2024, in order to effect inclusions in their respective lists of Scheduled Tribes.</p><p>The Constitution (Scheduled Tribes) Order (Amendment) Bill, 2024 is intended to amend the Constitution (Scheduled Tribes) Order, 1950 to modify the list of Scheduled Tribes regarding Andhra Pradesh. The following inclusions will be made in list of Scheduled Tribes of Andhra Pradesh: -</p><p></p><p>- Inclusion of 'Bondo Porja' and 'Khond Porja', that are Particularly Vulnerable Tribal Groups (PVTGs), at entry 25 in the ST list of Andhra Pradesh.</p><p>- Inclusion of 'Konda Savaras', that are Particularly Vulnerable Tribal Groups (PVTGs), at entry 28 in the ST list of Andhra Pradesh.</p>",

  },

    "solution": "<p>After being awarded the Padma Shri, Padma Bhushan, Padma Subrahmanyam has now been conferred with Padma Vibhushan, one of the highest civilian award in India. She is an eminent Bharatnatyam dancer whose ghungroos have wooed people all across the globe. She is an Indian classical dancer, scholar, and choreographer who has made significant contributions to the field of Bharatanatyam.</p><p></p>",

      "<span class=\"eqt\">S is the symbol of Sodium</span><span class=\"hqt\" style=\"display:none\">S &#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2361;&#2376;</span>",

    "question": "<span class=\"eqt\"><p>Consider the following statements with regard to Money supply:</p><p>I. M4 is more liquid than M1.</p><p>II. The interbank deposits are not considered a part of money supply.</p><p>III. M3 is the most commonly used measure of money supply.</p><p>Which of the above statements is/are correct? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. M4, M1 &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2309;&#2352;&#2381;&#2341;&#2360;&#2369;&#2354;&#2349;/&#2340;&#2352;&#2354; &#2361;&#2376;&#2404;</p><p>II. &#2309;&#2306;&#2340;&#2352;-&#2348;&#2376;&#2306;&#2325; &#2332;&#2350;&#2366; &#2325;&#2379; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2344;&#2361;&#2368;&#2306; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III .M3, &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2311;&#2360;&#2381;&#2340;&#2375;&#2350;&#2366;&#2354; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2350;&#2366;&#2346; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>RBI publishes figures for four alternative measures of money supply, viz. M1, M2, M3 and M4. They are defined as follows </p><p>M1 = CU + DD </p><p>M2 = M1 + Savings deposits with Post Office savings banks </p><p>M3 = M1 + Net time deposits of commercial banks </p><p>M4 = M3 + Total deposits with Post Office savings organisations (excluding National Savings Certificates) </p><p>where, CU is currency (notes plus coins) held by the public and DD is net demand deposits held by commercial banks. The word 'net' implies that only deposits of the public held by the banks are to be included in money supply. </p><p>Statement II is correct. The interbank deposits, which a commercial bank holds in other commercial banks, are not to be regarded as part of money supply. </p><p>Statement I is incorrect. M1 and M2 are known as narrow money. M3 and M4 are known as broad money. These measures are in decreasing order of liquidity. M1 is most liquid and easiest for transactions whereas M4 is least liquid of all. </p><p>Statement III is correct. M3 is the most commonly used measure of money supply. It is also known as aggregate monetary resources. </p><p>Source: NCERT</p>",
    "question_index": 119
  },

    "question": "<span class=\"eqt\"><p>Why is the Hydrogen element considered the anomaly of the Periodic table?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344; &#2340;&#2340;&#2381;&#2357; &#2325;&#2379; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2325;&#2368; &#2357;&#2367;&#2360;&#2306;&#2327;&#2340;&#2367; &#2325;&#2381;&#2351;&#2379;&#2306; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It is the first element of the periodic table.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2325;&#2366; &#2346;&#2381;&#2352;&#2341;&#2350; &#2340;&#2340;&#2381;&#2357; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It shows the property of alkali metals.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2325;&#2381;&#2359;&#2366;&#2352; &#2343;&#2366;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2327;&#2369;&#2339;&#2343;&#2352;&#2381;&#2350; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It shows the property of Halogens</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2361;&#2376;&#2354;&#2379;&#2332;&#2344; &#2325;&#2375; &#2327;&#2369;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It shows the properties of alkali metals and Halogens.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2325;&#2381;&#2359;&#2366;&#2352; &#2343;&#2366;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2361;&#2376;&#2354;&#2379;&#2332;&#2344; &#2325;&#2375; &#2327;&#2369;&#2339;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Hydrogen is considered an anomaly in the periodic table because it has properties similar to both alkali metals and halogens</p><p>&bull; It can lose one electron, as do alkali metals, and gain one electron, as do halogens.</p><p>&bull; While all group 1 metals are present in mono-atomic state Hydrogen as found in diatomic molecules similar to Halogens.</p><p>Further Insight:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Group 1 </b>   <b>Elements</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Atomic </b>   <b>Number</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Group 17 </b>   <b>Elements</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Atomic Number</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hydrogen (H)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Fluorine (F)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lithium (Li)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Chlorine (Cl)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">17</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sodium (Na)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">11</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bromine (Br)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">35</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Potassium (K)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">19</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Iodine (I)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">53</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rubidium (Rb)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">37</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Astatine (At)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">85</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cesium (Cs)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">55</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tennessine (Ts)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">117</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Francium (Fr)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">87</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table>",
    "question_index": 120
  },

    "question": "<span class=\"eqt\"><p>Which of the following is not true about the Gandhi-Irwin Pact?</p><p>(a) It is also known as Poona Pact.</p><p>(b) It was signed in 1932.</p><p>(c) The Pact led to the suspension of the civil disobedience movement.</p><p>Options:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368;-&#2311;&#2352;&#2357;&#2367;&#2344; &#2360;&#2306;&#2343;&#2367; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p><p>(a) &#2311;&#2360;&#2375; &#2346;&#2370;&#2344;&#2366; &#2346;&#2376;&#2325;&#2381;&#2335; &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>(b) &#2351;&#2361; 1932 &#2350;&#2375;&#2306; &#2361;&#2360;&#2381;&#2340;&#2366;&#2325;&#2381;&#2359;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>(c) &#2360;&#2306;&#2343;&#2367; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2360;&#2357;&#2367;&#2344;&#2351; &#2309;&#2357;&#2332;&#2381;&#2334;&#2366; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2379; &#2360;&#2381;&#2341;&#2327;&#2367;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346; :</p></span>",
    "options": [
      "<span class=\"eqt\">All (a) , (b) &amp; (c)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; (a) , (b) &#2324;&#2352; (c)</span>",
      "<span class=\"eqt\">Only (a)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (a)</span>",
      "<span class=\"eqt\">Only (c)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (c)</span>",
      "<span class=\"eqt\">Both (a) &amp; (b)</span><span class=\"hqt\" style=\"display:none\">(a) &#2324;&#2352; (b) &#2342;&#2379;&#2344;&#2379;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let's analyze each statement:</p><p>(a) It is also known as Poona Pact: This is not true. The Poona Pact was a separate agreement signed between B.R. Ambedkar and Mahatma Gandhi in 1932 regarding electoral seats for the depressed classes. The Gandhi-Irwin Pact is also sometimes called the Delhi Pact.</p><p>(b) It was signed in 1932: This is not true. The Gandhi-Irwin Pact was signed on March 5, 1931.</p><p>(c) The Pact led to the suspension of the civil disobedience movement: This is true. One of the key outcomes of the pact was that the Indian National Congress agreed to discontinue the Civil Disobedience Movement and participate in the Second Round Table Conference in London.</p><p>Since statements (a) and (b) are not true, the correct option is (d) Both (a) & (b).</p><p>Further insights:</p><p>The Gandhi-Irwin Pact was a political agreement signed by Mahatma Gandhi and the then Viceroy of India, Lord Irwin.</p><p>Other key provisions included the release of all political prisoners not convicted of violence and the withdrawal of ordinances that curbed the activities of the Congress.</p><p>The pact was seen as a truce, but it did not meet all of Congress's demands, and the Civil Disobedience Movement was later resumed.</p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following animals do not fall under the category of invertebrates?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2375; &#2332;&#2366;&#2344;&#2357;&#2352; &#2309;&#2325;&#2358;&#2375;&#2352;&#2369;&#2325;&#2368; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2344;&#2361;&#2368;&#2306; &#2310;&#2340;&#2375; &#2361;&#2376;&#2306; ?</p></span>",
    "options": [
      "<span class=\"eqt\">Crustaceans</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2360;&#2335;&#2375;&#2358;&#2367;&#2351;&#2344;</span>",
      "<span class=\"eqt\">Insects</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2368;&#2337;&#2364;&#2375;</span>",
      "<span class=\"eqt\">Annelids</span><span class=\"hqt\" style=\"display:none\">&#2320;&#2344;&#2375;&#2354;&#2367;&#2337;</span>",
      "<span class=\"eqt\">Amphibians</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2349;&#2351;&#2330;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Amphibians <b>do not</b> fall under the category of Invertebrates. Invertebrates do not have backbones. More than 98% animal species in the world are invertebrates. Invertebrates don't have an internal skeleton made of bone. Many invertebrates have a fluid-filled, hydrostatic skeleton, like the jelly fish or worm. Others have a hard-outer shell, like insects and crustaceans.</p><p>Amphibians are Cold blooded animals, Living on land &amp; water. They have Webbed feet and breathe with lungs and gills.</p>",
    "question_index": 123
  },
  {
    "question": "<span class=\"eqt\"><p>In the context of Mauryan Administration, what was role of the official 'Sannidhata'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2380;&#2352;&#2381;&#2351; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2310;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2325; '&#2360;&#2344;&#2381;&#2344;&#2368;&#2343;&#2366;&#2340;&#2366;' &#2325;&#2368; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">He was the chief custodian of the state treasury and storehouse.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2326;&#2332;&#2366;&#2344;&#2375; &#2324;&#2352; &#2349;&#2306;&#2337;&#2366;&#2352;&#2327;&#2371;&#2361; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2325; &#2341;&#2375;&#2404;</span>",
      "<span class=\"eqt\">He was the highest officer in charge of assessment and collection.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2325;&#2352; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2339; &#2324;&#2352; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2339; &#2325;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2352;&#2368; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368; &#2341;&#2375;&#2404;</span>",
      "<span class=\"eqt\">He was the chief of armed forces.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2360;&#2358;&#2360;&#2381;&#2340;&#2381;&#2352; &#2360;&#2375;&#2344;&#2366;&#2323;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2341;&#2375;&#2404;</span>",
      "<span class=\"eqt\">He was the chief of chariots department</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2352;&#2341; &#2357;&#2367;&#2349;&#2366;&#2327; &#2325;&#2375; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2341;&#2375;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Maurya period constituted a landmark in the system of taxation in ancient India. Arthashastra names many taxes which were collected from peasants, artisans, and traders.</p><p>This required a strong and efficient machinery for assessment, collection, and storage. The Maurya attached greater importance to assessment than to storage and deposit.</p><p>The <b>Samaharta</b> was <b>the highest officer in charge of assessment and collection</b>.</p><p>The <b>Sannidhata</b> was <b>the chief custodian of the state treasury and storehouse.</b></p><p>The <b>Senapati was the chief of Armed forces</b>. There were many departments under him controlled by chiefs or Adhyaksha.</p><p>a) Infantry- Padadhyaksha</p><p>b) Cavalry- Asvadhyaksha</p><p>c) War elephants- Hastyadhyaksha</p><p>d) Navy- Navadhyaksha</p><p>e) <b>Chariots- Rathadhyaksha</b></p><p>f) Armoury- Ayudhagaradhyaksha</p><p>Source- Shodhganga</p>",
    "question_index": 124
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not true about saline soils?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2354;&#2357;&#2339;&#2368;&#2351; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2340;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Saline Soils are also known as Usara soils.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2357;&#2339;&#2368;&#2351; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2379; &#2313;&#2360;&#2366;&#2352;&#2366; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Saline soils contain a larger proportion of sodium, potassium and magnesium, and thus, they are very fertile.</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2357;&#2339;&#2368;&#2351; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2350;&#2375;&#2306; &#2360;&#2379;&#2337;&#2367;&#2351;&#2350;, &#2346;&#2379;&#2335;&#2375;&#2358;&#2367;&#2351;&#2350; &#2324;&#2352; &#2350;&#2376;&#2327;&#2381;&#2344;&#2368;&#2358;&#2367;&#2351;&#2350; &#2325;&#2366; &#2319;&#2325; &#2348;&#2337;&#2364;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;, &#2357;&#2375; &#2348;&#2361;&#2369;&#2340; &#2313;&#2346;&#2332;&#2366;&#2314; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They lack nitrogen and calcium</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2350;&#2375;&#2306; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2324;&#2352; &#2325;&#2376;&#2354;&#2381;&#2358;&#2367;&#2351;&#2350; &#2325;&#2368; &#2325;&#2350;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Their structure ranges from sandy to loamy.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2325;&#2368; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2352;&#2375;&#2340;&#2368;&#2354;&#2368; &#2360;&#2375; &#2342;&#2379;&#2350;&#2335; &#2340;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Saline Soils are also known as Usara soils.</p><p>Saline soils contain a larger proportion of sodium, potassium and magnesium, and thus, they are infertile, and do not support any vegetative growth.</p><p>They have more salts, largely because of the dry climate and poor drainage.</p><p>They occur in arid and semi-arid regions, and in waterlogged and swampy areas.</p><p>Their structure ranges from sandy to loamy. They lack nitrogen and calcium. Saline soils are more widespread in western Gujarat, deltas of the eastern coast and in Sunderban areas of West Bengal.</p>",
    "question_index": 125
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct?</p><p>I.Only marketed goods are considered while estimating Gross Domestic Product (GDP). </p><p>II. The work done by a woman at her home is outside the purview of Gross Domestic Product. </p><p>III. In estimating GDP, only final goods and services are considered.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (GDP) &#2325;&#2366; &#2310;&#2325;&#2354;&#2344; &#2325;&#2352;&#2340;&#2375; &#2360;&#2350;&#2351; &#2325;&#2375;&#2357;&#2354; &#2357;&#2367;&#2346;&#2339;&#2344; &#2351;&#2379;&#2327;&#2381;&#2351; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2319;&#2325; &#2350;&#2361;&#2367;&#2354;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2346;&#2344;&#2375; &#2328;&#2352; &#2346;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2325;&#2375; &#2342;&#2366;&#2351;&#2352;&#2375; &#2360;&#2375; &#2348;&#2366;&#2361;&#2352; &#2361;&#2376;&#2404;</p><p>III. GDP &#2325;&#2366; &#2310;&#2325;&#2354;&#2344; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2309;&#2306;&#2340;&#2367;&#2350; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only II and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only I and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Gross domestic product (GDP) is the standard measure of the value added created through the production of goods and services in a country during a certain period.</p><p>It also measures the income earned from that production, or the total amount spent on final goods and services (less imports).While GDP is the single most important indicator to capture economic activity, it falls short of providing a suitable measure of people's material well-being for which alternative indicators may be more appropriate. This indicator is based on nominal GDP (also called GDP at current prices or GDP in value) and is available in different measures.</p>",
    "question_index": 126
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is incorrect about the properties of the image formed by a plane mirror?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2340;&#2354; &#2342;&#2352;&#2381;&#2346;&#2339; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2350;&#2381;&#2348; &#2325;&#2375; &#2327;&#2369;&#2339;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Image formed by a plane mirror is always virtual and erect.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2340;&#2354; &#2342;&#2352;&#2381;&#2346;&#2339; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2350;&#2381;&#2348; &#2361;&#2350;&#2375;&#2358;&#2366; &#2310;&#2349;&#2366;&#2360;&#2368; &#2324;&#2352; &#2360;&#2368;&#2343;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The size of the image is enlarged to that of the object.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2360;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2348;&#2337;&#2364;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The image formed is as far behind the mirror as the object is in front of it.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348; &#2342;&#2352;&#2381;&#2346;&#2339; &#2325;&#2375; &#2346;&#2368;&#2331;&#2375; &#2313;&#2340;&#2344;&#2366; &#2361;&#2368; &#2342;&#2370;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2340;&#2344;&#2366; &#2357;&#2360;&#2381;&#2340;&#2369; &#2313;&#2360;&#2325;&#2375; &#2360;&#2366;&#2350;&#2344;&#2375; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The image is laterally inverted.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2313;&#2354;&#2381;&#2335;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The following are the properties of an image formed by a plane mirror.</p><p>a. Image formed by a plane mirror is always virtual and erect.</p><p>b. The size of the image is <b>equal to that of the object</b>.</p><p>c. The image formed is as far behind the mirror as the object is in front of it.</p><p>d. The image is laterally inverted.</p>",
    "question_index": 127
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following was the author of the book 'Kitab-ul-Rehla'? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; '&#2325;&#2367;&#2340;&#2366;&#2348;-&#2313;&#2354;-&#2352;&#2375;&#2361;&#2354;&#2366;' &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2325;&#2375; &#2354;&#2375;&#2326;&#2325; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Alberuni</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2348;&#2352;&#2370;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Ibn Battutah</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2348;&#2381;&#2344; &#2348;&#2340;&#2370;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Ziauddin Barani</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2367;&#2351;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2348;&#2352;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Amir khusrau</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2368;&#2352; &#2326;&#2369;&#2360;&#2352;&#2379;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Kitab-ul-Rehla was written by Ibn Battutah.</p><p>&#183; Alberuni was the author of Tahqiq-i-Hind, Kitab-fi-Tahqiq and Jawahar-fil-Jawahir.</p><p>&#183; Tarikha-i-Firoz Shahi was written by Ziauddin Barani.</p><p>&#183; Amir Khusrau was the author of Laila Majnu, Tughlaq-Nama and Nuh-Siphir.</p>",
    "question_index": 128
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following article of the Indian Constitution allows citizens to conserve their culture, language or script?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2368; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367;, &#2349;&#2366;&#2359;&#2366; &#2351;&#2366; &#2354;&#2367;&#2346;&#2367; &#2325;&#2375; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 30</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 30</span>",
      "<span class=\"eqt\">Article 28</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 28</span>",
      "<span class=\"eqt\">Article 29</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 29</span>",
      "<span class=\"eqt\">Article 26</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 26</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Article 12 to 35 contained in Part III of the Constitution deal with Fundamental Rights.</p><p>Article 29 provides for the Protection of interests of minorities.</p><p>Clause 1 to Article 29 states that any section of the citizens residing in the territory of India or any part thereof having a distinct language, script or culture of its own shall have the right to conserve the same.</p><p>Clause 2 to Article 29 states that no citizen shall be denied admission into any educational institution maintained by the State or receiving aid out of State funds on grounds only of religion, race, caste, language or any of them.</p>",
    "question_index": 129
  },
  {
    "question": "<span class=\"eqt\"><p>A ________ virus is a type of malware specifically designed to conceal its presence from antivirus software by using advanced techniques like polymorphism, rootkits, and system call interception.</p></span><span class=\"hqt\" style=\"display:none\"><p>________ &#2357;&#2366;&#2351;&#2352;&#2360; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2350;&#2376;&#2354;&#2357;&#2375;&#2351;&#2352; &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2377;&#2354;&#2368;&#2350;&#2377;&#2352;&#2381;&#2347;&#2367;&#2332;&#2381;&#2350;, &#2352;&#2370;&#2335;&#2325;&#2367;&#2335; &#2324;&#2352; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2377;&#2354; &#2311;&#2306;&#2335;&#2352;&#2360;&#2375;&#2346;&#2381;&#2358;&#2344; &#2332;&#2376;&#2360;&#2368; &#2313;&#2344;&#2381;&#2344;&#2340; &#2340;&#2325;&#2344;&#2368;&#2325;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2319;&#2306;&#2335;&#2368;&#2357;&#2366;&#2351;&#2352;&#2360; &#2360;&#2377;&#2347;&#2364;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2360;&#2375; &#2309;&#2346;&#2344;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2331;&#2367;&#2346;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2367;&#2332;&#2364;&#2366;&#2311;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">file infector</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2366;&#2311;&#2354; &#2311;&#2344;&#2381;&#2347;&#2375;&#2325;&#2381;&#2335;&#2352;</span>",
      "<span class=\"eqt\">stealth</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2368;&#2354;&#2381;&#2341;</span>",
      "<span class=\"eqt\">polymorphic</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2377;&#2354;&#2368;&#2350;&#2377;&#2352;&#2381;&#2347;&#2367;&#2325;</span>",
      "<span class=\"eqt\">metamorphic</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2335;&#2366;&#2350;&#2377;&#2352;&#2381;&#2347;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>- A stealth virus is a type of malware specifically designed to conceal its presence from antivirus software, making it one of the most dangerous threats in cybersecurity today.</p><p>- By using advanced techniques like polymorphism, rootkits, and system call interception, stealth viruses evade detection and carry out malicious activities without triggering security alerts.</p><p></p><p></p>",
    "question_index": 130
  },

    "question": "<span class=\"eqt\"><p>What is the primary purpose of cookies in web browsing?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2375;&#2348; &#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2364;&#2367;&#2306;&#2327; &#2350;&#2375;&#2306; &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To enhance website design</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335; &#2337;&#2367;&#2332;&#2364;&#2366;&#2311;&#2344; &#2325;&#2379; &#2348;&#2375;&#2361;&#2340;&#2352; &#2348;&#2344;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To track user preferences</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2335;&#2381;&#2352;&#2376;&#2325; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To improve search engine rankings</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2330; &#2311;&#2306;&#2332;&#2344; &#2352;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To secure website connections</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335; &#2325;&#2344;&#2375;&#2325;&#2381;&#2358;&#2344; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Cookies are used to track user preferences, such as login information, site settings, and shopping cart contents, to improve the browsing experience.</p>",
    "question_index": 131

    "question": "<span class=\"eqt\"><p>Which of the following OSI model layer translates data to transmit from or send to the application layer?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; OSI &#2350;&#2377;&#2337;&#2354; &#2354;&#2375;&#2351;&#2352; &#2319;&#2346;&#2381;&#2354;&#2367;&#2325;&#2375;&#2358;&#2344; &#2354;&#2375;&#2351;&#2352; &#2360;&#2375; &#2337;&#2375;&#2335;&#2366; &#2360;&#2306;&#2330;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2351;&#2366; &#2349;&#2375;&#2332;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2360;&#2325;&#2379; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2354;&#2375;&#2335; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">Presentation layer</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2375;&#2332;&#2375;&#2306;&#2335;&#2375;&#2358;&#2344; &#2354;&#2375;&#2351;&#2352;</span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>The presentation layer is the sixth layer within the open systems interconnection (OSI) model. It is located next to the application layer and translates data to transmit from or send to the application layer. It does this by converting, compressing, encrypting, and serializing data into different forms that can be more easily transmitted through a network.</p><p></p><p></p>",

  },

    "question": "<span class=\"eqt\"><p>Which of the following register stores status flags that indicate the result of operations?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352; &#2360;&#2381;&#2335;&#2375;&#2335;&#2360; &#2347;&#2381;&#2354;&#2376;&#2327; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2321;&#2346;&#2352;&#2375;&#2358;&#2344; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2325;&#2379; &#2311;&#2306;&#2327;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Flag Register</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2354;&#2376;&#2327; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Instruction register</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2360;&#2381;&#2335;&#2381;&#2352;&#2325;&#2381;&#2358;&#2344; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Stack Pointer</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2376;&#2325; &#2346;&#2377;&#2311;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Address Register</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Registers are small, high-speed storage locations within the CPU (Central Processing Unit) that hold data temporarily during processing.</p><p>Flag Register: Stores status flags (e.g., zero flag, carry flag, overflow flag) that indicate the result of operations.</p><p></p><p>Instruction Register (IR): Stores the current instruction being executed. </p><p>Memory Address Register (MAR): Holds the memory address of the data to be accessed.</p><p>Memory Data Register (MDR): Holds the data to be written to or read from memory.</p><p>Stack Pointer (SP): Points to the top of the stack in memory.</p><p></p>",
    "question_index": 135
  },
  {
    "question": "<span class=\"eqt\"><p>In MS Excel, =ROUND(3.7) results in ___________</p></span><span class=\"hqt\" style=\"display:none\"><p>MS &#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2350;&#2375;&#2306;, =ROUND(3.7) &#2325;&#2366; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; ___________ &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3.5</span><span class=\"hqt\" style=\"display:none\">3.5</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The ROUND function in Excel rounds a number to a specified number of digits.</p><p>Syntax:</p><p>ROUND(number, num_digits)</p><p>number: The value you want to round.</p><p>num_digits: The number of digits to which you want to round the number.</p><p></p><p></p><p>Positive num_digits: Rounds the number to the specified number of decimal places.</p><p>Example: =ROUND(3.14159, 2) results in 3.14</p><p>num_digits = 0: Rounds the number to the nearest integer.</p><p>Example: =ROUND(3.7) results in 4</p><p>Negative num_digits: Rounds the number to the left of the decimal point.</p><p>Example: =ROUND(123.456, -1) results in 120 (rounds to the nearest ten)</p><p></p>",
    "question_index": 136
  },

    "question": "<span class=\"eqt\"><p>Which of the following is bigger than a bit but smaller than a byte?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2348;&#2367;&#2335; &#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2354;&#2375;&#2325;&#2367;&#2344; &#2348;&#2366;&#2311;&#2335; &#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Which of the following states that the amount of time required for a person to move a pointer (e.g., mouse cursor) to a target area is a function of the distance to the target divided by the size of the target?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2351;&#2361; &#2348;&#2340;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2367;&#2360;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2346;&#2377;&#2311;&#2306;&#2335;&#2352; (&#2332;&#2376;&#2360;&#2375;, &#2350;&#2366;&#2313;&#2360; &#2325;&#2352;&#2381;&#2360;&#2352;) &#2325;&#2379; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2360;&#2350;&#2351; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366;, &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2379; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2347;&#2354;&#2344; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Hick's Law</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2325;&#2381;&#2360; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Miller's Law</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2354;&#2352; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Parkinson's Law</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2381;&#2325;&#2367;&#2306;&#2360;&#2344; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Fitts' Law</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2367;&#2335;&#2381;&#2360; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Fitts' law states thatthe amount of time required for a person to move a pointer (e.g., mouse cursor) to a target area is a function of the distance to the target divided by the size of the target. Thus, the longer the distance and the smaller the target's size, the longer it takes.</p><p>- Fitts' Law is a fundamental principle in user experience (UX) and human-computer interaction (HCI) design.</p><p>- The name of Fitts' Law comes from Paul Morris Fitts Jr. who was a psychologist at the Ohio State University where he developed a model that describes how quickly people can select a target.</p><p>- Fitts's Law states that the time to acquire a target is a function of the size of the target and the distance to the target.</p>",
    "question_index": 139
  },
  {

      "<span class=\"eqt\">'@' symbol</span><span class=\"hqt\" style=\"display:none\">'@' &#2346;&#2381;&#2352;&#2340;&#2368;&#2325;</span>",

      "<span class=\"eqt\">Photo</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2379;&#2335;&#2379;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A <b>photo</b> is not a part of an email address. An email address typically consists of three components:</p><p>1) Email service provider's domain: This is the part that comes after the '@' symbol and represents the email service provider's server where the email is hosted (e.g., gmail.com, yahoo.com).</p><p>2) '@' symbol: This symbol is used to separate the username from the email service provider's domain.</p><p>3) Username: This is the unique identifier of the user and comes before the '@' symbol. It is the part that identifies the specific email account.</p>",
    "question_index": 140
  },

    "question": "<span class=\"eqt\"><p>What is the purpose of applying bullet points or numbering to a list in a word processing document?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2352;&#2381;&#2337; &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2367;&#2306;&#2327; &#2337;&#2377;&#2325;&#2381;&#2351;&#2370;&#2350;&#2375;&#2306;&#2335; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2368; &#2360;&#2370;&#2330;&#2368; &#2346;&#2352; &#2348;&#2369;&#2354;&#2375;&#2335; &#2346;&#2377;&#2311;&#2306;&#2335; &#2351;&#2366; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">To increase font size</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2377;&#2344;&#2381;&#2335; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2348;&#2338;&#2364;&#2366;&#2344;&#2366;</span>",

      "<span class=\"eqt\">To organize and structure information</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2379; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2324;&#2352; &#2360;&#2306;&#2352;&#2330;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To change the page orientation</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2359;&#2381;&#2336; &#2309;&#2349;&#2367;&#2357;&#2367;&#2344;&#2381;&#2351;&#2366;&#2360; &#2348;&#2342;&#2354;&#2344;&#2366;</span>"

    "correct_option_id": 2,
    "solution": "<p>Applying bullet points or numbering to a list in a word processing document is used to organize and structure information. It helps make the content more readable and allows readers to easily identify and follow a list of items or ideas. Options A, B, and D are unrelated to this specific purpose.</p>",

    ],
    "correct_option_id": 2,
    "solution": "<p>Solid State Drives (SSDs) work on the principle of non-volatile flash memory. This means they can store data even when they're not powered on. </p><p>SSD is a storage device that retains data in flash memory as opposed to a magnetic-based system like a hard disk drive. By definition, \"flash memory is an electronic (solid-state) non-volatile computer memory storage medium which can be electrically erased and reprogrammed.\"</p><p></p><p></p><p></p>",
    "question_index": 142
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements about memory organization in computers is correct?</p><p>Statement 1: Registers are the slowest and largest storage units in a computer system.</p><p>Statement 2: Cache memory is typically slower than main memory (RAM) but much larger.</p><p>Statement 3: Virtual memory allows a computer to use part of its storage as additional RAM when the physical RAM is full.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2350;&#2375;&#2306; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2360;&#2306;&#2327;&#2336;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>&#2325;&#2341;&#2344; 1: &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2350;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2343;&#2368;&#2350;&#2368; &#2324;&#2352; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339; &#2311;&#2325;&#2366;&#2311;&#2351;&#2366;&#2305; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2325;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2350;&#2369;&#2326;&#2381;&#2351; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; (RAM) &#2360;&#2375; &#2343;&#2368;&#2350;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2348;&#2361;&#2369;&#2340; &#2348;&#2337;&#2364;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 3: &#2357;&#2352;&#2381;&#2330;&#2369;&#2309;&#2354; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2325;&#2375; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375; &#2325;&#2379; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; RAM &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2348; &#2349;&#2380;&#2340;&#2367;&#2325; RAM &#2349;&#2352; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Statement 1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 1</span>",
      "<span class=\"eqt\">Statement 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 3</span>",
      "<span class=\"eqt\">Statement 1 and Statement 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2324;&#2352; &#2325;&#2341;&#2344; 2</span>",
      "<span class=\"eqt\">Statement 2 and Statement 3</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 2 &#2324;&#2352; &#2325;&#2341;&#2344; 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement 3 is correct. Virtual memory allows a computer to use part of its storage as additional RAM when the physical RAM is full, thus extending the available memory. Statements 1 and 2 are both incorrect; registers are the fastest and smallest storage units, and cache memory is faster but smaller than main memory.</p>",
    "question_index": 143
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following information is NOT included in an IP Header?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2370;&#2330;&#2344;&#2366; &#2310;&#2312;&#2346;&#2368; &#2361;&#2375;&#2337;&#2352; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Header length</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2376;&#2337;&#2352; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Transport protocol is being used</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2346;&#2379;&#2352;&#2381;&#2335; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2325;&#2366; &#2311;&#2360;&#2381;&#2340;&#2375;&#2350;&#2366;&#2354; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Time To Live (TTL)</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2366;&#2311;&#2350; &#2335;&#2370; &#2354;&#2367;&#2357; (&#2335;&#2368;&#2335;&#2368;&#2319;&#2354;)</span>",
      "<span class=\"eqt\">All of these are included</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2375; &#2360;&#2349;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>An IP header is a series of bits, and it records several pieces of information about the packet, including the sending and receiving IP address. IP headers also report:</p><p>&#183; <b>Header length</b></p><p>&#183; <b>Packet length</b></p><p>&#183; <b>Time To Live (TTL)</b>, or the number of network hops a packet can make before it is discarded</p><p>&#183; <b>Transport protocol is being used</b></p>",
    "question_index": 144
  },
  {
    "question": "<span class=\"eqt\"><p>Which Excel feature allows you to quickly copy the contents of one cell to another cell or range of cells in a worksheet?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344;-&#2360;&#2368; &#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2310;&#2346;&#2325;&#2379; &#2357;&#2352;&#2381;&#2325;&#2358;&#2368;&#2335; &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2375;&#2354; &#2325;&#2368; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2325;&#2379; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2375;&#2354; &#2351;&#2366; &#2360;&#2375;&#2354; &#2325;&#2368; &#2352;&#2375;&#2306;&#2332; &#2350;&#2375;&#2306; &#2358;&#2368;&#2328;&#2381;&#2352;&#2340;&#2366; &#2360;&#2375; &#2325;&#2377;&#2346;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Paste Special</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2360;&#2381;&#2335; &#2360;&#2381;&#2346;&#2375;&#2358;&#2354;</span>",
      "<span class=\"eqt\">AutoSum</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2335;&#2379;&#2360;&#2350;</span>",
      "<span class=\"eqt\">Fill Handle</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2367;&#2354; &#2361;&#2376;&#2306;&#2337;&#2354;</span>",
      "<span class=\"eqt\">Conditional Formatting</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2337;&#2368;&#2358;&#2344;&#2354; &#2347;&#2377;&#2352;&#2381;&#2350;&#2375;&#2335;&#2367;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Fill Handle in Excel is a feature that allows you to quickly copy the contents of one cell to another cell or range of cells by dragging the fill handle (a small square at the lower-right corner of the selected cell). This is a handy tool for replicating data or creating sequences.</p>",
    "question_index": 145
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a type of hardware interrupt that cannot be ignored by the processor and should be processed immediately?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352; &#2311;&#2306;&#2335;&#2352;&#2346;&#2381;&#2335; &#2325;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2344;&#2342;&#2375;&#2326;&#2366; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2375; &#2340;&#2369;&#2352;&#2306;&#2340; &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">Timer interrupt</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2366;&#2311;&#2350;&#2352; &#2311;&#2306;&#2335;&#2352;&#2346;&#2381;&#2335;</span>",
      "<span class=\"eqt\">INT interrupt</span><span class=\"hqt\" style=\"display:none\">INT &#2311;&#2306;&#2335;&#2352;&#2346;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Non-maskable interrupt</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2377;&#2344;-&#2350;&#2366;&#2360;&#2381;&#2325;&#2375;&#2348;&#2354; &#2311;&#2306;&#2335;&#2352;&#2346;&#2381;&#2335;</span>",
      "<span class=\"eqt\">External interrupt</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2381;&#2360;&#2335;&#2352;&#2381;&#2344;&#2354; &#2311;&#2306;&#2335;&#2352;&#2346;&#2381;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A non-maskable interrupt (NMI) is a type of hardware interrupt (or signal to the processor) that prioritizes a certain thread or process. Unlike other types of interrupts, the non-maskable interrupt cannot be ignored through the use of interrupt masking techniques.</p><p>NMIs are typically used for critical events like hardware failures or system errors. The processor must handle them promptly to prevent data loss or system instability. </p><p></p><p></p>",
    "question_index": 146
  },
  {
    "question": "<span class=\"eqt\"><p>What is the IP address range for Class C networks?</p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2354;&#2366;&#2360; C &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2325;&#2375; &#2354;&#2367;&#2319; IP &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2352;&#2375;&#2306;&#2332; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1-127</span><span class=\"hqt\" style=\"display:none\">1-127</span>",
      "<span class=\"eqt\">128-191</span><span class=\"hqt\" style=\"display:none\">128-191</span>",
      "<span class=\"eqt\">192-223</span><span class=\"hqt\" style=\"display:none\">192-223</span>",
      "<span class=\"eqt\">224-255</span><span class=\"hqt\" style=\"display:none\">224-255</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Class C networks range from 192.0. 0.0 through 223.255. 255.0, with the network number contained in the first three octets. This class allows for nearly 2 million networks with up to 254 hosts.</p><p></p><p>Class A</p><p>Class A comprises networks 1.0.0.0 through 127.0.0.0. The network number is contained in the first octet. This class provides for a 24-bit host part, allowing roughly 1.6 million hosts per network.</p><p></p><p>Class B</p><p>Class B contains networks 128.0.0.0 through 191.255.0.0; the network number is in the first two octets. This class allows for 16,320 nets with 65,024 hosts each.</p><p></p><p>Classes D, E, and F</p><p>Addresses falling into the range of 224.0.0.0 through 254.0.0.0 are either experimental or are reserved for special purpose use and don't specify any network. IP Multicast, which is a service that allows material to be transmitted to many points on an internet at one time, has been assigned addresses from within this range.</p>",
    "question_index": 147
  },
  {
    "question": "<span class=\"eqt\"><p>What is the purpose of the \"Slide Master\" in Microsoft PowerPoint?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2360;&#2377;&#2347;&#2381;&#2335; &#2346;&#2366;&#2357;&#2352;&#2346;&#2377;&#2311;&#2306;&#2335; &#2350;&#2375;&#2306; \"&#2360;&#2381;&#2354;&#2366;&#2311;&#2337; &#2350;&#2366;&#2360;&#2381;&#2335;&#2352;\" &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To insert audio and video files into individual slides</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2354;&#2366;&#2311;&#2337;&#2379;&#2306; &#2350;&#2375;&#2306; &#2321;&#2337;&#2367;&#2351;&#2379; &#2324;&#2352; &#2357;&#2368;&#2337;&#2367;&#2351;&#2379; &#2347;&#2364;&#2366;&#2311;&#2354;&#2375;&#2306; &#2311;&#2344;&#2381;&#2360;&#2352;&#2381;&#2335; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To define the transition effects between slides</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2354;&#2366;&#2311;&#2337;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;/&#2335;&#2381;&#2352;&#2366;&#2306;&#2332;&#2367;&#2358;&#2344; &#2311;&#2398;&#2375;&#2325;&#2381;&#2335; &#2325;&#2379; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To design the overall layout and formatting for all slides in a presentation</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340;&#2367; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2360;&#2381;&#2354;&#2366;&#2311;&#2337;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2327;&#2381;&#2352; &#2354;&#2375;&#2310;&#2313;&#2335; &#2324;&#2352; &#2347;&#2377;&#2352;&#2381;&#2350;&#2375;&#2335;&#2367;&#2306;&#2327; &#2337;&#2367;&#2332;&#2364;&#2366;&#2311;&#2344; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To add speaker notes to each slide</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2381;&#2354;&#2366;&#2311;&#2337; &#2350;&#2375;&#2306; &#2360;&#2381;&#2346;&#2368;&#2325;&#2352; &#2344;&#2379;&#2335; &#2319;&#2337; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Slide Master in PowerPoint allows to define the consistent layout, design elements, and formatting for all slides in a presentation. It ensures a uniform look and feel throughout the presentation. A slide master controls the overall appearance, such as formatting and design, of each slide layout, and therefore each slide in your presentation.</p>",
    "question_index": 148
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following synhronises the memory speed with CPU clock speed so that the memory controller knows the exact clock cycle when the requested data will be ready?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2360;&#2381;&#2346;&#2368;&#2337; &#2325;&#2379; CPU &#2325;&#2381;&#2354;&#2377;&#2325; &#2360;&#2381;&#2346;&#2368;&#2337; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2350;&#2344;&#2381;&#2357;&#2351;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2340;&#2366;&#2325;&#2367; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2306;&#2335;&#2381;&#2352;&#2379;&#2354;&#2352; &#2325;&#2379; &#2360;&#2335;&#2368;&#2325; &#2325;&#2381;&#2354;&#2377;&#2325; &#2360;&#2366;&#2311;&#2325;&#2367;&#2354; &#2325;&#2366; &#2346;&#2340;&#2366; &#2330;&#2354; &#2360;&#2325;&#2375; &#2325;&#2367; &#2309;&#2344;&#2369;&#2352;&#2379;&#2343;&#2367;&#2340; &#2337;&#2375;&#2335;&#2366; &#2325;&#2348; &#2340;&#2376;&#2351;&#2366;&#2352; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">DRSAM</span><span class=\"hqt\" style=\"display:none\">DRSAM</span>",
      "<span class=\"eqt\">RPROM</span><span class=\"hqt\" style=\"display:none\">RPROM</span>",
      "<span class=\"eqt\">EPROM</span><span class=\"hqt\" style=\"display:none\">EPROM</span>",
      "<span class=\"eqt\">SDRAM</span><span class=\"hqt\" style=\"display:none\">SDRAM</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Synchronous Dynamic Random-Access Memory (SDRAM) synchronizes the memory speed with CPU clock speed so that the memory controller knows the exact clock cycle when the requested data will be ready. This allows the CPU to perform more instructions at a given time. Typical SDRAM transfers data at speeds up to 133 MHz.</p><p></p>",
    "question_index": 149
  }
