  {
    "question": "<span class=\"eqt\"><p>The equation of a straight line passing through (1, 2) and perpendicular to the line 3x + 4y = 7 is:</p></span><span class=\"hqt\" style=\"display:none\"><p>(1, 2) &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2324;&#2352; &#2352;&#2375;&#2326;&#2366; 3x + 4y = 7 &#2346;&#2352; &#2354;&#2306;&#2348;&#2357;&#2340; &#2319;&#2325; &#2360;&#2368;&#2343;&#2368; &#2352;&#2375;&#2326;&#2366; &#2325;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">4x - 3y + 2 = 0</span><span class=\"hqt\" style=\"display:none\">4x - 3y + 2 = 0</span>",
      "<span class=\"eqt\">3x + 4y = 7</span><span class=\"hqt\" style=\"display:none\">3x + 4y = 7</span>",
      "<span class=\"eqt\">4x - 3y + 7 = 0</span><span class=\"hqt\" style=\"display:none\">4x - 3y + 7 = 0</span>",
      "<span class=\"eqt\">None of these</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Given line, 3x + 4y = 7</p><p>Or y = -3x/4 + 7/4</p><p>Comparing this equation with y = mx + c, m = -3/4</p><p>The slope of the line perpendicular to this line, m1 = -1/m = 4/3</p><p>The equation of a line passing through (x1, x2) and a slope of m is given by the formula (y - y1) = m(x - x1).</p><p>The equation of the line passing through (1, 2) and as slope of 4/3 is:</p><p>(y - 2) = 4/3 * (x - 1)</p><p>So, 4x - 3y + 2 = 0</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The diagonals of a cyclic quadrilateral ABCD intersect at P and the area of the triangle APB is 63 cm<sup>2</sup>. If AB = 12 cm and CD = 8 cm, then find the area of &#8710;CPD.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2330;&#2325;&#2381;&#2352;&#2368;&#2351; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; ABCD &#2325;&#2375; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; P &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; APB &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 63 &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; AB = 12 &#2360;&#2375;&#2350;&#2368; &#2340;&#2341;&#2366; CD = 8 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#8710;CPD &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">32 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">32 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">24 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">24 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">36 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">36 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">28 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">28 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=184 height=161 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26815/image017.png\"></p><p>In &#8710;APB and &#8710;PDC</p><p>&#8736;APB = &#8736;DPC [Vertically opposite angle]</p><p>&#8736;BAP = &#8736;PDC [Angle subtended by chord BC at any point on the circle is same]</p><p>&#8710;APB ~ &#8710;PDC</p><p>Area of &#8710;APB/ Area of &#8710;PDC = (AB/CD)<sup>2</sup></p><p>63/Area of &#8710;PDC = (12 * 12/ 8 * 8)</p><p>Area of &#8710;PDC = 28 cm<sup>2</sup></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Find the values of m and n for which the following system of equations has infinite solutions.</p><p>(11 + m)x + (m  -  1)y = (2m  -  3) and (7n - 5)x + 6y = 10</p></span><span class=\"hqt\" style=\"display:none\"><p>m &#2324;&#2352; n &#2325;&#2375; &#2357;&#2375; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2344;&#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2309;&#2344;&#2306;&#2340; &#2361;&#2354; &#2361;&#2376;&#2306;&#2404;</p><p>(11 + m)x + (m - 1)y = (2m - 3) &#2324;&#2352; (7n - 5)x + 6y = 10</p></span>",
    "options": [
      "<span class=\"eqt\">m = 4 and n = 5</span><span class=\"hqt\" style=\"display:none\">m = 4 &#2324;&#2352; n = 5</span>",
      "<span class=\"eqt\">m = 2 and n = 3</span><span class=\"hqt\" style=\"display:none\">m = 2 &#2324;&#2352; n = 3</span>",
      "<span class=\"eqt\">m = 7 and n = 4</span><span class=\"hqt\" style=\"display:none\">m = 7 &#2324;&#2352; n = 4</span>",
      "<span class=\"eqt\">m = 5 and n = 8</span><span class=\"hqt\" style=\"display:none\">m = 5 &#2324;&#2352; n = 8</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>(11 + m)x + (m  -  1)y = (2m  -  3)</p><p>(7n - 5)x + 6y = 10</p><p>For infinite solution  -  </p><p>a<sub>1</sub>/a<sub>2</sub> = b<sub>1</sub>/b<sub>2</sub> = c<sub>1</sub>/c<sub>2</sub></p><p>(m  -  1)/6 = (2m  -  3)/10</p><p>10m  -  10 = 12m  -  18</p><p>m = 4</p><p>(11 + m)/(7n  -  5) = (m  -  1)/6</p><p>15/(7n  -  5) = 3/6 = &frac12;</p><p>7n  -  5 = 30</p><p>n = 5</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A, B, and C are three positive numbers such that A: B = 4: 5 and A: C = 2: 3. The average of the reciprocals of A, B, and C is 74/135. The average of 4 times of B and 2 times of C is:</p></span><span class=\"hqt\" style=\"display:none\"><p>A, B, &#2324;&#2352; C &#2340;&#2368;&#2344; &#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306; &#2332;&#2376;&#2360;&#2375; A: B = 4: 5 &#2324;&#2352; A: C = 2: 3 &#2361;&#2376;&#2404; A, B &#2324;&#2352; C &#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350; &#2325;&#2366; &#2324;&#2360;&#2340; 74/135 &#2361;&#2376;&#2404; B &#2325;&#2366; 4 &#2327;&#2369;&#2344;&#2366; &#2324;&#2352; C &#2325;&#2366; 2 &#2327;&#2369;&#2344;&#2366; &#2325;&#2366; &#2324;&#2360;&#2340; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Given,</p><p>A: B = 4: 5 and A: C = 2: 3</p><p>Then, A: B: C = 4: 5: 6</p><p>Let A = 4X, B = 5X, and C = 6X</p><p>According To Question,</p><p>(1/4X) + (1/5X) + (1/6X) = 3 * 74/135</p><p>37/60X = 74/45</p><p>1/4X = 2/3</p><p>X = 3/8</p><p>Therefore, B = 15/8, and C = 18/8 = 9/4</p><p>Required average = [(4 * 15/8) + (2 * 9/4)]/2</p><p>= [(15/2) + (9/2)]/2</p><p>= 12/2 = 6</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A certain amount invested at a certain rate, compounded annually grows to an amount in seven years, which is 1.3225 times to what it would have grown in five years. What is rate percentage?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340;, &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2352; &#2346;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367;, &#2360;&#2366;&#2340; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2340;&#2325; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2379; &#2325;&#2367; &#2346;&#2366;&#2306;&#2330; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2338;&#2364;&#2368; &#2361;&#2369;&#2312; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2366; 1.3225 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2340;&#2379;, &#2342;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">15%</span><span class=\"hqt\" style=\"display:none\">15%</span>",
      "<span class=\"eqt\">13%</span><span class=\"hqt\" style=\"display:none\">13%</span>",
      "<span class=\"eqt\">12%</span><span class=\"hqt\" style=\"display:none\">12%</span>",
      "<span class=\"eqt\">11%</span><span class=\"hqt\" style=\"display:none\">11%</span>"
    ],
    "correct_option_id": 0,
    "solution": "\"<p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/9282888.png\"><br></p>\"",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Let, M = 7 + 77 + 777 + 7777. The value of M is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2366;, M = 7 + 77 + 777 + 7777. M &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">8638</span><span class=\"hqt\" style=\"display:none\">8638</span>",
      "<span class=\"eqt\">8745</span><span class=\"hqt\" style=\"display:none\">8745</span>",
      "<span class=\"eqt\">8826</span><span class=\"hqt\" style=\"display:none\">8826</span>",
      "<span class=\"eqt\">8523</span><span class=\"hqt\" style=\"display:none\">8523</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>M = 7 + 77 + 777 + 7777</p><p>= 7 * (1 + 11 + 111 + 1111)</p><p>= 7 * 1234</p><p>= 8638</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If A: B =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">4</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">5</span></div>&nbsp;:&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">8</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">9</span></div>&nbsp;, and B: C = 2: 3, then what is the value of&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2A + 3B</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">4A  -  3C</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; A: B = &nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">4</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">5</span></div>&nbsp;:&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">8</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">9</span></div>&nbsp; &#2324;&#2352; B: C = 2: 3 &#2361;&#2376;, &#2340;&#2379; &nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2A + 3B</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">4A  -  3C</span></div> &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</div></p></span>",
    "options": [
      "<span class=\"eqt\">-22/3</span><span class=\"hqt\" style=\"display:none\">-22/3</span>",
      "<span class=\"eqt\">-11/9</span><span class=\"hqt\" style=\"display:none\">-11/9</span>",
      "<span class=\"eqt\">-16/3</span><span class=\"hqt\" style=\"display:none\">-16/3</span>",
      "<span class=\"eqt\">-23/6</span><span class=\"hqt\" style=\"display:none\">-23/6</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A: B = 4/5: 8/9 = 9: 10</p><p>And B: C = 2: 3 = 10: 15</p><p>So, A: B: C = 9: 10: 15</p><p>Let A = 9k, B = 10k, and C = 15k</p><p>Thus, (2A + 3B)/(4A  -  3C) = (2 * 9k + 3 * 10k)/(4 * 9k  -  3 * 15k) = 48k/-9k = -48/9 = -16/3</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If 2 tan X + cot X = &radic;5 cot (90 - X), then find the value of tan<sup>2</sup> X.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 2 tan X + cot X = &radic;5 cot (90 - X) &#2361;&#2376;, &#2340;&#2379; tan<sup>2</sup> X &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;5 + 2</span><span class=\"hqt\" style=\"display:none\">&radic;5 + 2</span>",
      "<span class=\"eqt\">&radic;5 - 2</span><span class=\"hqt\" style=\"display:none\">&radic;5 - 2</span>",
      "<span class=\"eqt\">&radic;5</span><span class=\"hqt\" style=\"display:none\">&radic;5</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>2 tan X + cot X = &radic;5 cot (90 - X)</p><p>=&gt; 2 tan X + cot X = &radic;5 tan X</p><p>=&gt; cot X = (&radic;5 - 2) tan X</p><p>=&gt; cot<sup>2</sup> X = &radic;5  -  2</p><p>=&gt; tan<sup>2</sup> X = &radic;5 + 2</p>",
    "question_index": 7

    "question": "<span class=\"eqt\"><p>Vishal and Vinod started a busines with Rs.12000 and Rs.15000 respectively. After one year, Vishal withdrew p% of his capital while Vinod added Rs.3000 to his capital. If the profit received by Vishal and Vinod after 3 years partnership is in the ratio 8: 17 respectively, then find the value of p.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2358;&#2366;&#2354; &#2324;&#2352; &#2357;&#2367;&#2344;&#2379;&#2342; &#2344;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 12000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; 15000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2360;&#2366;&#2341; &#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;&#2404; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2357;&#2367;&#2358;&#2366;&#2354; &#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; &#2325;&#2366; p% &#2357;&#2366;&#2346;&#2360; &#2354;&#2375; &#2354;&#2367;&#2351;&#2366;, &#2332;&#2348;&#2325;&#2367; &#2357;&#2367;&#2344;&#2379;&#2342; &#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; &#2350;&#2375;&#2306; 3000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2332;&#2379;&#2337;&#2364;&#2375;&#2404; &#2351;&#2342;&#2367; 3 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2325;&#2375; &#2348;&#2366;&#2342; &#2357;&#2367;&#2358;&#2366;&#2354; &#2324;&#2352; &#2357;&#2367;&#2344;&#2379;&#2342; &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2354;&#2366;&#2349; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 8: 17 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;, &#2340;&#2379; p &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "correct_option_id": 0,
    "solution": "<p>Amount invested by Vishal = Rs.12000</p><p>Amount invested by Vinod = Rs.15000</p><p>Then, profit ratio, Vishal: Vinod = (1 * 12000 + (3  -  1) * (100  -  p)% of 12000): (1 * 15000 + (3  -  1) * (15000 + 3000))</p><p>= (1200  -  8p): 1700</p><p>Also, profit ratio, Vishal: Vinod = 8: 17</p><p>Then, (1200  -  8p): 1700 = 8: 17</p><p><b>p = 50</b></p>",

    "question": "<span class=\"eqt\"><p>Point R is a centre of a circle which is inscribe in a quadrilateral STUV. If length of sides ST, UV, and VS of the quadrilateral STUV are 12 cm, 10 cm, and 14 cm, respectively, then what is the length of the side TU of the quadrilateral? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2367;&#2306;&#2342;&#2369; R &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352; &#2361;&#2376; &#2332;&#2379; &#2319;&#2325; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; STUV &#2325;&#2375; &#2309;&#2306;&#2342;&#2352; &#2309;&#2306;&#2325;&#2367;&#2340; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; STUV &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; ST, UV, &#2324;&#2352; VS &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 12 &#2360;&#2375;&#2350;&#2368;, 10 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 14 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; TU &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p>By property of two tangents from a single external point to a circle, the tangent segment lengths are equal. </p><p><img width=329 height=268 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15575/image030.jpg\"></p><p>So, 12  -  x + 10  -  y = 14</p><p>=&gt; 22  -  14 = x + y</p><p>=&gt; x + y = 8 cm</p><p>Hence, TU = x + y = 8 cm</p>",

    "question": "<span class=\"eqt\"><p>From two pointsC and D, located X meters and Y meters away respectively from the base of a building on the same straight line, the angles of elevation to the top of the building are supplementary. If the angle of elevation from the point C is 45&deg; and the height of the building is h meters, find the value of the product X * Y.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2375; &#2340;&#2354; &#2360;&#2375; &#2360;&#2350;&#2366;&#2344; &#2360;&#2368;&#2343;&#2368; &#2352;&#2375;&#2326;&#2366; &#2346;&#2352; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; X &#2350;&#2368;&#2335;&#2352; &#2324;&#2352; Y &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2342;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; C &#2324;&#2352; D &#2360;&#2375; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; &#2346;&#2370;&#2352;&#2325; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2348;&#2367;&#2306;&#2342;&#2369; C &#2360;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 45&deg; &#2361;&#2376; &#2324;&#2352; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; h &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; X * Y &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>What is the greatest value of 'p' if a 6-digit number 5p756p is divisible by 6?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 6 &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 5p756p, 6 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; 'p' &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",

    "solution": "<p>A number should be divisible by 6 if it is divisible by 3 and its last digit is even</p><p>As it is known divisibility of 3 is that the sum of all digits must be divisible by 3</p><p>Possible value of 'p' = 2, 4, 6 and 8</p><p>(5 + p + 7 + 5 + 6 + p) must be divisible by 3</p><p>(23 + 2p) must be divisible by 3</p><p>Greatest value of 'p' = 8</p><p>(23 + 2 X 8) = 23 + 16 = 39</p><p>39 is divisible by 3</p>",

    "question": "<span class=\"eqt\"><p>3 men and 4 women can construct a road in 60 days while 10 men and 12 boys can construct 75% of the road in 18 days. It will take how much time to 4 men, 2 women and 3 boys to construct the complete road? </p></span><span class=\"hqt\" style=\"display:none\"><p>3 &#2346;&#2369;&#2352;&#2369;&#2359; &#2324;&#2352; 4 &#2350;&#2361;&#2367;&#2354;&#2366;&#2319;&#2306; 60 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2337;&#2364;&#2325; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2348;&#2325;&#2367; 10 &#2346;&#2369;&#2352;&#2369;&#2359; &#2324;&#2352; 12 &#2354;&#2337;&#2364;&#2325;&#2375; 18 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; 75% &#2360;&#2337;&#2364;&#2325; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; 4 &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306;, 2 &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2324;&#2352; 3 &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2325;&#2379; &#2346;&#2370;&#2352;&#2368; &#2360;&#2337;&#2364;&#2325; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",

      "<span class=\"eqt\">160/3 days</span><span class=\"hqt\" style=\"display:none\">160/3 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">65/6 days</span><span class=\"hqt\" style=\"display:none\">65/6 &#2342;&#2367;&#2344;</span>",

    "correct_option_id": 1,
    "solution": "<p>Let one man, one woman and one boy can construct the road in m days, w days and b days respectively.</p><p>3/m + 4/w = 1/60..(i)</p><p>10/m + 12/b = 1/((100/75) * 18))</p><p>10/m + 12/b = 1/24..(ii)</p><p>By taking 2(i) + (ii), we get</p><p>6/m + 8/w + 10/m + 12/b = 2/60 + 1/24</p><p>16/m + 8/w + 12/b = 1/30 + 1/24</p><p>4/m + 2/w + 3/b = 3/160</p><p>So, 4 men, 2 women and 3 boys can together construct the complete road in 160/3 days.</p>",

    "question": "<span class=\"eqt\"><p><div>&nbsp;The base area of a cylinder is&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2710.62</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">7</span></div>&nbsp;sq. cm and height is 35 cm. What is the curved surface area (in sq. cm) of the cylinder? (Take &pi; =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">22</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">7</span></div>&nbsp;)&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;  <div style=\"display: inline-block;position: relative;vertical-align: middle;\"> <span style=\"text-align:center;display: block; padding: 0;\">2710.62</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">7</span></div>&nbsp;sq. cm &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; 35 cm &#2361;&#2376;&#2404; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (sq. cm &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;? (&#960; =;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">22</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">7</span></div> &#2350;&#2366;&#2344;&#2375;&#2306;)</div></p></span>",
    "options": [
      "<span class=\"eqt\">2442</span><span class=\"hqt\" style=\"display:none\">2442</span>",
      "<span class=\"eqt\">2892</span><span class=\"hqt\" style=\"display:none\">2892</span>",
      "<span class=\"eqt\">2424</span><span class=\"hqt\" style=\"display:none\">2424</span>",
      "<span class=\"eqt\">2282</span><span class=\"hqt\" style=\"display:none\">2282</span>"

    "correct_option_id": 0,
    "solution": "<p>Base area = 2710.62/7</p><p>&#928; * (R)<sup>2</sup> = 271062/700</p><p>(22/7) * R<sup>2</sup> = 271062/700</p><p>R<sup>2</sup> = 12321/100</p><p>R = 111/10</p><p>R = 11.1 cm</p><p>Height = 35 cm</p><p>Curved surface area = 2 * &#928; * R * H</p><p>= 2 * (22/7) * 11.1 * 35</p><p>= 22 * 111 = 2442 sq. cm</p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>The average cost price of 7 books and 13 pens together is &#8377;24 and the average cost price of 12 books and 3 pens is &#8377;42. What is the average cost price of a book and a pen?</p></span><span class=\"hqt\" style=\"display:none\"><p>7 &#2325;&#2367;&#2340;&#2366;&#2348;&#2375;&#2306; &#2324;&#2352; 13 &#2325;&#2354;&#2350;&#2379;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#8377;24 &#2361;&#2376; &#2340;&#2341;&#2366; 12 &#2325;&#2367;&#2340;&#2366;&#2348;&#2375;&#2306; &#2324;&#2352; 3 &#2325;&#2354;&#2350;&#2379;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#8377;42 &#2361;&#2376;, &#2340;&#2379; &#2319;&#2325; &#2325;&#2367;&#2340;&#2366;&#2348; &#2324;&#2352; &#2319;&#2325; &#2325;&#2354;&#2350; &#2325;&#2366; &#2324;&#2360;&#2340; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;54</span><span class=\"hqt\" style=\"display:none\">&#8377;54</span>",
      "<span class=\"eqt\">&#8377;18</span><span class=\"hqt\" style=\"display:none\">&#8377;18</span>",
      "<span class=\"eqt\">&#8377;30</span><span class=\"hqt\" style=\"display:none\">&#8377;30</span>",
      "<span class=\"eqt\">&#8377;27</span><span class=\"hqt\" style=\"display:none\">&#8377;27</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the cost price of a book and a pen is &#8377;'a' and &#8377;'b' respectively.</p><p>According to the question:</p><p>7a + 13b = 20*24 ------(1)</p><p>12a + 3b = 15*42 --------(2)</p><p>On solving eqn (1) and (2)-</p><p>a = &#8377;50 and b = &#8377;10</p><p>So, average cost price of a book and a pen = (50 + 10)/2 = &#8377;30</p>",
    "question_index": 27
  },

    "question": "<span class=\"eqt\"><p>Pratibha scored 80% marks in five subjects together viz., Hindi, Science, Maths, English, and Sanskrit, wherein the maximum marks of each subject were 105. She scored 89 marks in English, 92 marks in Hindi, 81 marks in Science and 98 marks in Sanskrit. Did she pass in the Maths subject and by how many marks if each subject had a pass mark of 65 marks?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2340;&#2367;&#2349;&#2366; &#2344;&#2375; &#2346;&#2366;&#2306;&#2330; &#2357;&#2367;&#2359;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2354;&#2327;&#2349;&#2327; 80% &#2309;&#2306;&#2325; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2375; &#2351;&#2341;&#2366; &#2361;&#2367;&#2306;&#2342;&#2368;, &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344;, &#2327;&#2339;&#2367;&#2340;, &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2324;&#2352; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2367;&#2359;&#2351; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2309;&#2306;&#2325; 105 &#2341;&#2375;&#2404; &#2313;&#2360;&#2344;&#2375; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2350;&#2375;&#2306; 89 &#2309;&#2306;&#2325;, &#2361;&#2367;&#2306;&#2342;&#2368; &#2350;&#2375;&#2306; 92 &#2309;&#2306;&#2325;, &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2350;&#2375;&#2306; 81 &#2309;&#2306;&#2325; &#2324;&#2352; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340; &#2350;&#2375;&#2306; 98 &#2309;&#2306;&#2325; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2375; | &#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2367;&#2359;&#2351; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2309;&#2306;&#2325; 65 &#2341;&#2366;, &#2340;&#2379; &#2325;&#2381;&#2351;&#2366; &#2357;&#2361; &#2327;&#2339;&#2367;&#2340; &#2357;&#2367;&#2359;&#2351; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2361;&#2369;&#2312; &#2324;&#2352; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2306;&#2325;&#2379;&#2306; &#2360;&#2375; ?</p></span>",
    "options": [
      "<span class=\"eqt\">Pass by 10 marks</span><span class=\"hqt\" style=\"display:none\">10 &#2309;&#2306;&#2325;&#2379;&#2306; &#2360;&#2375; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339;</span>",
      "<span class=\"eqt\">Fail by 10 marks</span><span class=\"hqt\" style=\"display:none\">10 &#2309;&#2306;&#2325;&#2379;&#2306; &#2360;&#2375; &#2309;&#2360;&#2347;&#2354;</span>",
      "<span class=\"eqt\">Fail by 5 marks</span><span class=\"hqt\" style=\"display:none\">5 &#2309;&#2306;&#2325;&#2379;&#2306; &#2360;&#2375; &#2309;&#2360;&#2347;&#2354;</span>",
      "<span class=\"eqt\">Pass by 8 marks</span><span class=\"hqt\" style=\"display:none\">8 &#2309;&#2306;&#2325;&#2379;&#2306; &#2360;&#2375; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Maximum marks of the examination = 5  X  105 = 525</p><p>Pratibha's score = 525  X  80/100 = 420</p><p>Pratibha's score in Maths = 420  -  (81 + 98 + 92 + 89)</p><p>= 420  -  360</p><p>= 60</p><p>Therefore, she fails by 5 marks as the passing marks in each subject is 65.</p>",
    "question_index": 29

    "question": "<span class=\"eqt\"><p>Each of the questions below consists of a question and two statements numbered I and II given below it. You have to decide whether the data provided in the statements are sufficient to answer the question. Read both the statements and give the answer.</p><p>Farm producing Turmeric is in which direction with respect to farm of Sugarcane?</p><p>I. Farms of orange are north of rice fields which are west of turmeric farm.</p><p>II. Rice fields are northeast to the farms of wheat. Wheat is growing to the south of Sugarcane.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2319;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; I &#2324;&#2352; II &#2360;&#2375; &#2309;&#2306;&#2325;&#2367;&#2340; &#2342;&#2379; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376; &#2351;&#2366; &#2344;&#2361;&#2368;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2367;&#2319; &#2324;&#2352; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2361;&#2354;&#2381;&#2342;&#2368; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325; &#2326;&#2375;&#2340;, &#2327;&#2344;&#2381;&#2344;&#2375; &#2325;&#2375; &#2326;&#2375;&#2340; &#2325;&#2375; &#2360;&#2344;&#2381;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2361;&#2376;?</p><p>I. &#2360;&#2306;&#2340;&#2352;&#2375; &#2325;&#2375; &#2326;&#2375;&#2340; &#2330;&#2366;&#2357;&#2354; &#2325;&#2375; &#2326;&#2375;&#2340;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;, &#2332;&#2379; &#2361;&#2354;&#2381;&#2342;&#2368; &#2325;&#2375; &#2326;&#2375;&#2340; &#2325;&#2375; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2330;&#2366;&#2357;&#2354; &#2325;&#2375; &#2326;&#2375;&#2340; &#2327;&#2375;&#2361;&#2370;&#2305; &#2325;&#2375; &#2326;&#2375;&#2340;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2370;&#2352;&#2381;&#2357; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2327;&#2375;&#2361;&#2370;&#2305; &#2327;&#2344;&#2381;&#2344;&#2375; &#2325;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2350;&#2375;&#2306; &#2313;&#2327; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">If the data in statement I alone are sufficient to answer the question.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2325;&#2341;&#2344; I &#2350;&#2375;&#2306; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2337;&#2366;&#2335;&#2366; &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">If the data in the statement II alone are sufficient to answer the question.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2325;&#2341;&#2344; II &#2350;&#2375;&#2306; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2337;&#2366;&#2335;&#2366; &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">If the data either in statement I alone or in statement II alone are sufficient to answer the question.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2351;&#2366; &#2340;&#2379; &#2325;&#2341;&#2344; I &#2351;&#2366; &#2325;&#2341;&#2344; II &#2350;&#2375;&#2306; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2337;&#2366;&#2335;&#2366; &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">If the data in both statement I and statement II together are not sufficient to answer the question.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2325;&#2341;&#2344; I &#2324;&#2352; &#2325;&#2341;&#2344; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2337;&#2366;&#2335;&#2366; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>From statement I alone: </b></p><p>Farms of orange are north of the rice fields which are west of turmeric farm.</p><p><img width=270 height=139 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er251008st2erimg001.jpg\"></p><p>Here, there is no reference of sugarcane farm.</p><p>So, statement I alone is not sufficient.</p><p><b>From statement II alone: </b></p><p>Rice fields are northeast of the farms of wheat. Wheat is growing to the south of Sugarcane.</p><p><img width=327 height=138 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er251008st2erimg002.jpg\"></p><p>Here, the sugarcane farms can be to the west or southwest or northeast of the rice fields.</p><p>Also, there is no reference of turmeric farm.</p><p>So, statement II alone is not sufficient.</p><p><b>From statements I and II together: </b></p><p><img width=390 height=197 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er251008st2erimg003.jpg\"></p><p>Here, the position of sugarcane farms is not fixed. Sugarcane farm can be to the west or southwest or northeast of the turmeric farms.</p><p>So, statements I and II together are not sufficient.</p><p></p>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>Six persons- Ana, Chloe, Mark, Steve, Eddie and Lucas were born in different months viz., March, April, May, June, July and August but not in the same order. Mark was born in the month having 30 days. Three persons were born between Mark and Ana. Steve was born immediately after Chloe but not in July month. Lucas was not born in March month. In which month Eddie was born?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2331;&#2361; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; - &#2319;&#2344;&#2366;, &#2325;&#2381;&#2354;&#2379;, &#2350;&#2366;&#2352;&#2381;&#2325;, &#2360;&#2381;&#2335;&#2368;&#2357;, &#2319;&#2337;&#2368; &#2324;&#2352; &#2354;&#2369;&#2325;&#2366;&#2360; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2350;&#2361;&#2368;&#2344;&#2379;&#2306;, &#2351;&#2366;&#2344;&#2368; &#2350;&#2366;&#2352;&#2381;&#2330;, &#2309;&#2346;&#2381;&#2352;&#2376;&#2354;, &#2350;&#2312;, &#2332;&#2370;&#2344;, &#2332;&#2369;&#2354;&#2366;&#2312; &#2324;&#2352; &#2309;&#2327;&#2360;&#2381;&#2340; &#2350;&#2375;&#2306; &#2346;&#2376;&#2342;&#2366; &#2361;&#2369;&#2319; &#2341;&#2375;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2311;&#2360;&#2368; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2344;&#2361;&#2368;&#2306;&#2404; &#2350;&#2366;&#2352;&#2381;&#2325; &#2325;&#2366; &#2332;&#2344;&#2381;&#2350; 30 &#2342;&#2367;&#2344;&#2379;&#2306; &#2357;&#2366;&#2354;&#2375; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2361;&#2369;&#2310; &#2341;&#2366;&#2404; &#2350;&#2366;&#2352;&#2381;&#2325; &#2324;&#2352; &#2319;&#2344;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2340;&#2368;&#2344; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2346;&#2376;&#2342;&#2366; &#2361;&#2369;&#2319; &#2341;&#2375;&#2404; &#2360;&#2381;&#2335;&#2368;&#2357; &#2325;&#2366; &#2332;&#2344;&#2381;&#2350; &#2325;&#2381;&#2354;&#2379; &#2325;&#2375; &#2336;&#2368;&#2325; &#2348;&#2366;&#2342; &#2361;&#2369;&#2310; &#2341;&#2366;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2332;&#2369;&#2354;&#2366;&#2312; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2344;&#2361;&#2368;&#2306;&#2404; &#2354;&#2369;&#2325;&#2366;&#2360; &#2325;&#2366; &#2332;&#2344;&#2381;&#2350; &#2350;&#2366;&#2352;&#2381;&#2330; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2344;&#2361;&#2368;&#2306; &#2361;&#2369;&#2310; &#2341;&#2366;&#2404; &#2319;&#2337;&#2368; &#2325;&#2366; &#2332;&#2344;&#2381;&#2350; &#2325;&#2367;&#2360; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2361;&#2369;&#2310; &#2341;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>Read the situation and choose the best judgment:</p><p>An ATM dispenses five notes more than the amount requested. The guard outside is busy directing a queue, and the bank branch is open for the next 15 minutes.</p><p>Question: Given this situation, which of the following is the most ethical and responsible action?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2360;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2350; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2330;&#2369;&#2344;&#2375;&#2306;:</p><p>&#2319;&#2325; &#2319;&#2335;&#2368;&#2319;&#2350; &#2360;&#2375; &#2350;&#2366;&#2306;&#2327;&#2368; &#2327;&#2312; &#2352;&#2366;&#2358;&#2367; &#2360;&#2375; &#2346;&#2366;&#2305;&#2330; &#2344;&#2379;&#2335; &#2332;&#2364;&#2381;&#2351;&#2366;&#2342;&#2366; &#2344;&#2367;&#2325;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2348;&#2366;&#2361;&#2352; &#2326;&#2337;&#2364;&#2366; &#2327;&#2366;&#2352;&#2381;&#2337; &#2325;&#2340;&#2366;&#2352; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2360;&#2381;&#2340; &#2361;&#2376;, &#2324;&#2352; &#2348;&#2376;&#2306;&#2325; &#2358;&#2366;&#2326;&#2366; &#2309;&#2327;&#2354;&#2375; 15 &#2350;&#2367;&#2344;&#2335; &#2340;&#2325; &#2326;&#2369;&#2354;&#2368; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;: &#2311;&#2360; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2342;&#2350; &#2360;&#2348;&#2360;&#2375; &#2344;&#2376;&#2340;&#2367;&#2325; &#2324;&#2352; &#2332;&#2364;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352;&#23     "question": "<span class=\"eqt\"><p>In a class of 84 students, Tanvi's rank from the back is 23rd. Rahul stands 11 positions ahead of Tanvi, and Pooja stands 18 positions behind Tanvi. How many students are between Rahul and Pooja?</p></span><span class=\"hqt\" style=\"display:none\"><p>84 &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306;, &#2340;&#2344;&#2381;&#2357;&#2368; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2368;&#2331;&#2375; &#2360;&#2375; 23&#2357;&#2366;&#2305; &#2361;&#2376;&#2404; &#2352;&#2366;&#2361;&#2369;&#2354;, &#2340;&#2344;&#2381;&#2357;&#2368; &#2360;&#2375; 11 &#2360;&#2381;&#2341;&#2366;&#2344; &#2310;&#2327;&#2375; &#2361;&#2376; &#2324;&#2352; &#2346;&#2370;&#2332;&#2366;, &#2340;&#2344;&#2381;&#2357;&#2368; &#2360;&#2375; 18 &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2368;&#2331;&#2375; &#2361;&#2376;&#2404; &#2352;&#2366;&#2361;&#2369;&#2354; &#2324;&#2352; &#2346;&#2370;&#2332;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2367;&#2340;&#2344;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352; &#2361;&#2376;&#2306;?</p></span>",
    "options": [

      "<span class=\"eqt\">27</span><span class=\"hqt\" style=\"display:none\">27</span>",

    "correct_option_id": 3,
    "solution": "<p>Tanvi's position from front = 84 &#8722; 23 + 1 = 62</p><p>Rahul's position from front = 62 &#8722; 11 = 51</p><p>Pooja's position from front = 62 + 18 = 80</p><p>Between them = 80 &#8722; 51 &#8722; 1 = 28</p>",

    "question": "<span class=\"eqt\"><p>In a school, roll numbers are divided into two batches based on the sum of their last two digits:</p><p>If the sum of the last two digits is even, the roll number belongs to Batch 1.</p><p>If the sum of the last two digits is odd, the roll number belongs to Batch 2.</p><p></p><p>Which of the following pairs correctly represent one roll number from Batch 1 and one from Batch 2?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2381;&#2325;&#2370;&#2354; &#2350;&#2375;&#2306;, &#2352;&#2379;&#2354; &#2344;&#2306;&#2348;&#2352; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2309;&#2306;&#2340;&#2367;&#2350; &#2342;&#2379; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2342;&#2379; &#2348;&#2376;&#2330;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;:</p><p>&#2351;&#2342;&#2367; &#2309;&#2306;&#2340;&#2367;&#2350; &#2342;&#2379; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2360;&#2350; &#2361;&#2376;, &#2340;&#2379; &#2352;&#2379;&#2354; &#2344;&#2306;&#2348;&#2352; &#2348;&#2376;&#2330; 1 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>&#2351;&#2342;&#2367; &#2309;&#2306;&#2340;&#2367;&#2350; &#2342;&#2379; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2357;&#2367;&#2359;&#2350; &#2361;&#2376;, &#2340;&#2379; &#2352;&#2379;&#2354; &#2344;&#2306;&#2348;&#2352; &#2348;&#2376;&#2330; 2 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2332;&#2379;&#2337;&#2364;&#2366; &#2348;&#2376;&#2330; 1 &#2360;&#2375; &#2319;&#2325; &#2352;     "question": "<span class=\"eqt\"><p>In this questions, a statement is followed by two courses of action, numbered I and II. You must assume everything in the statement to be true and on the basis if the information given in the statement, decide which course of action/s logically follows for pursuing.</p><p>Statement: The addition of disciplines like entrepreneurship, management and humanities along with academics is incorporated in the revised education policy. </p><p>Course of Action: </p><p>I. The school/organization must recruit teachers to facilitate all students' academics and extracurricular activities. </p><p>II. The extracurricular activities for developing physical health should receive the majority of attention.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2341;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2325;&#2366;&#2352;&#2381;&#2352;&#2357;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; I &#2324;&#2352; II &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2360;&#2349;&#2368; &#2348;&#2366;&#2340;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2344;&#2366; &#2361;&#2376; &#2324;&#2352; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2360;&#2370;&#2330;&#2344;&#2366; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2325;&#2366;&#2352;&#2381;&#2352;&#2357;&#2366;&#2312; &#2309;&#2344;&#2369;&#2325;&#2352;&#2339; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2340;     "solution": "<p>The correct choice is 'two easy little'. When we use more than one adjective to describe a noun, the adjectives are either cumulative or coordinative.</p><p>Example of cumulative adjective- An attractive young American lady.</p><p>Example of coordinative adjective- You are very cruel, heartless person.</p><p>Cumulative adjectives are adjectives that must appear in a special order to express the meaning that we want to express while coordinative adjectives do not follow a special order.</p><p>These are cumulative adjectives and the order of cumulative adjectives is as follows: quantity, opinion, size, age, colour, shape, origin, material and purpose.</p><p>Here, 'two' is the quantity, 'easy' is the opinion and 'little' is the size.</p><p>Hence, option (b) is correct.</p>",

    "comp": "<p><b>Directions :</b>   Read the passage and answer the questions that follow.</p><p>The Hubble tension is a significant puzzle in modern cosmology, one that has puzzled scientists for years and has even led some to declare a \"crisis\" in the field. At the heart of the tension is the discrepancy between two different methods of measuring the rate at which the Universe is expanding. Both methods, while carefully executed, yield results that are in conflict, leaving cosmologists grappling with how to reconcile them.</p><p>The first method, known as the \"early relic\" approach, relies on observing the cosmic microwave background (CMB) radiation. The CMB is a faint afterglow from the hot Big Bang, a relic of the Universe's infancy. By studying this radiation, scientists can make predictions about the expansion rate of the Universe based on conditions during its early moments. This approach estimates the Hubble constant to be approximately 67 kilometres per second per megaparsec (km/s/Mpc), with an uncertainty of just 1 km/s/Mpc. This value is derived from a theoretical model of cosmology, known as Lambda Cold Dark Matter (&#923;CDM), which has been remarkably successful in explaining many aspects of the Universe's behaviour.</p><p>On the other hand, the \"distance ladder\" method involves measuring distances to astronomical objects such as Cepheid variables and Type Ia supernovae. By measuring the brightness of these objects and their redshift, astronomers can determine how fast the Universe is expanding. This method, however, leads to a higher value of around 73 km/s/Mpc, also with an uncertainty of just 1 km/s/Mpc. This discrepancy of about 6 km/s/Mpc between the two measurements is significant, and it raises the question: which method is correct, or is there some new physics that we have yet to uncover? The Hubble tension is not just a small discrepancy but a potential indication that our understanding of the Universe, especially at its largest scales, might need to be reconsidered. Resolving this tension could be one of the most exciting challenges in cosmology today, as it may point to new physics beyond our current models.</p>",

    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the \"to be\" verb ['were' and 'was' respectively] and the preposition 'by' is necessary while changing the voice of the sentence from Passive to Active.</p><p>The Passive voice in this question is in <b>Past Indefinite</b>. Thus, the Active voice will also be in Past Indefinite.</p><p>In Passive voice, the format is: Object of the Active voice (Subjective case) + was/were + V3 + by + Subject of the Active voice (Objective case).</p><p>Thus, the format of Active voice is: Subject + V2 + Object.</p><p>For example:</p><p>The Champions League was won by Real Madrid. (Passive Voice)</p><p>Real Madrid won the Champions League. (Active Voice)</p><p>The options except (b) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is <b>option b)</b>: The chef <b>baked</b> the cookies for the charity event. The participants <b>provided</b> the feedback after the workshop.</p>",

    "comp": "<p><b>Directions :</b>Read the given passage and answer the questions that follow.</p><p>Methanol is an alcohol, like the familiar ethanol we consume in alcoholic beverages. Like ethanol, methanol is a colourless, flammable liquid. It has a smell similar to ethanol as well. But the two have different chemical structures. Methanol is composed of only one carbon atom, while ethanol has two. That one carbon atom makes all the difference. It means methanol is processed differently in our bodies and is much more toxic than ethanol. Methanol is used in a variety of industrial and household products, such as windshield cleaning fluids, antifreeze and fuel. It's not safe for human consumption.</p><p>Ethanol is metabolised into a chemical compound called acetaldehyde. Acetaldehyde is toxic, but is rapidly converted to acetate (also known as acetic acid, found in vinegar). Generating an acid may sound bad, but acetate actually produces energy and makes important molecules in the body. By contrast, methanol is metabolised into formaldehyde (a chemical used in industrial glues and for embalming corpses, for example) and then to formic acid (the chemical in some ant bites that makes them hurt so much).</p><p>Unlike acetate, which the body uses, formic acid poisons the mitochondria, the powerhouses of the cells. As a result, a person exposed to methanol can go into severe metabolic acidosis, which is when too much acid builds up in the body. Methanol poisoning can cause nausea, vomiting, and abdominal pain. The acidosis then causes depression of the central nervous system, which can cause people with methanol poisoning to fall unconscious and go into a coma, as well as retinal damage leading to vision loss. This is because the retinas are full of active mitochondria and sensitive to them being damaged. Methanol can turn up in any alcoholic beverage, but it's most likely in beverages with higher alcohol content, such as spirits, and traditionally brewed drinks, such as fruit wines.</p>",

    "question": "<span class=\"eqt\"><p>According to Census 2011, which of the following languages is spoken by the least population in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2327;&#2339;&#2344;&#2366; 2011 &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2349;&#2366;&#2359;&#2366; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2325;&#2350; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2379;&#2354;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Dogri</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2379;&#2327;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Assamese</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2350;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Konkani</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2306;&#2325;&#2339;&#2368;</span>",

    ],
    "correct_option_id": 3,
    "solution": "<p>Sanskrit is the language with the least number of speakers in India according to the 2011 Census.</p><p>India boasts a rich linguistic diversity with over 22 official languages and hundreds of dialects. Let's see the top languages based on the 2011 Census:</p><p>Hindi: With over 52.8 crore speakers, Hindi is the most widely spoken language in India.</p><p>Bengali: Primarily spoken in West Bengal and parts of Tripura, Bengali has around 8.3 crore speakers.</p><p>Marathi: Predominantly spoken in Maharashtra, Marathi has around 7.9 crore speakers.</p><p>Telugu: A Dravidian language primarily spoken in Andhra Pradesh and Telangana, Telugu has around 7.4 crore speakers.</p><p>Tamil: Another Dravidian language, Tamil is spoken primarily in Tamil Nadu and parts of Kerala and Puducherry, with around 6.9 crore speakers.</p><p></p><p></p><p></p><p></p><p></p>",

    "question": "<span class=\"eqt\"><p>Atal Mission for Rejuvenation and Urban Transformation(AMRUT) mission was launched in _______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2335;&#2354; &#2325;&#2366;&#2351;&#2366;&#2325;&#2354;&#2381;&#2346; &#2324;&#2352; &#2358;&#2361;&#2352;&#2368; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2350;&#2367;&#2358;&#2344; (AMRUT) &#2350;&#2367;&#2358;&#2344; _______ &#2350;&#2375;&#2306; &#2354;&#2377;&#2344;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2013</span><span class=\"hqt\" style=\"display:none\">2013</span>",
      "<span class=\"eqt\">2012</span><span class=\"hqt\" style=\"display:none\">2012</span>",
      "<span class=\"eqt\">2014</span><span class=\"hqt\" style=\"display:none\">2014</span>",
      "<span class=\"eqt\">2015</span><span class=\"hqt\" style=\"display:none\">2015</span>"

    "correct_option_id": 3,
    "solution": "<p>The Atal Mission for Rejuvenation and Urban Transformation (AMRUT) is a flagship initiative by the Government of India aimed at transforming urban areas by ensuring basic infrastructure and services.</p><p>Launched on <b>June 25, 2015,</b> it focuses on improving the quality of life in cities through better water supply, sewerage systems, urban transport, and green spaces.</p><p>The mission targets 500 cities and towns with a population above 100,000, emphasizing sustainable and efficient urban development.</p><p>AMRUT replaced the earlier Jawaharlal Nehru National Urban Renewal Mission (JNNURM) and was named after former Prime Minister Atal Bihari Vajpayee.</p><p>It encourages state and local governments to plan and execute projects, with funding shared between the central and state governments, prioritizing universal access to water and sanitation while promoting urban reforms like e-governance and energy efficiency.</p>",

  },

    "question": "<span class=\"eqt\"><p>Which of the following statements is/are incorrect regarding the PM Vishwakarma Yojana (PMVY), an initiative that aims to empower and enhance the skills of the craftsman community?</p><p>A. It was launched on 17th December, 2023 by the Prime Minister.</p><p>B. The Scheme covers artisans and craftspeople engaged in 18 trades</p><p>C. Monetary support of collateral free 'Enterprise Development Loans' of upto Rs. 3 lakh in two tranches of Rs. 1 lakh and Rs. 2 lakh with tenures of 18 months and 30 months, respectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357;&#2325;&#2352;&#2381;&#2350;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366;, &#2319;&#2325; &#2346;&#2361;&#2354; &#2332;&#2367;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2358;&#2367;&#2354;&#2381;&#2346;&#2325;&#2366;&#2352; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2325;&#2375; &#2325;&#2380;&#2358;&#2354; &#2325;&#2379; &#2360;&#2358;&#2325;&#2381;&#2340; &#2348;&#2344;&#2366;&#2344;&#2366; &#2324;&#2352; &#2348;&#2338;&#2364;&#2366;&#2344;&#2366; &#2361;&#2376;, &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A. &#2311;&#2360;&#2375; 17 &#2342;&#2367;&#2360;&#2306;&#2348;&#2352;, 2023 &#2325;&#2379; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2377;&#2344;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>B. &#2311;&#2360; &#2351;&#2379;&#2332;&#2344;&#2366; &#2350;&#2375;&#2306; 18 &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2354;&#2327;&#2375; &#2325;&#2366;&#2352;&#2368;&#2327;&#2352;&#2379;&#2306; &#2324;&#2352; &#2358;&#2367;&#2354;&#2381;&#2346;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2358;&#2366;&#2350;&#2367;&#2354; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;</p><p>C. &#2352;&#2369;&#2346;&#2351;&#2375; &#2340;&#2325; &#2325;&#2375; &#2360;&#2306;&#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357;&#2367;&#2325; &#2350;&#2369;&#2325;&#2381;&#2340; '&#2313;&#2342;&#2381;&#2351;&#2350; &#2357;&#2367;&#2325;&#2366;&#2360; &#2315;&#2339;' &#2325;&#2366; &#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344;&#2404; &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2342;&#2379; &#2325;&#2367;&#2358;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; 3 &#2354;&#2366;&#2326;&#2404; 1 &#2354;&#2366;&#2326; &#2324;&#2352; &#2352;&#2369;. &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 18 &#2350;&#2361;&#2368;&#2344;&#2375; &#2324;&#2352; 30 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2325;&#2375; &#2360;&#2366;&#2341; 2 &#2354;&#2366;&#2326;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">A only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">C only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; C</span>",
      "<span class=\"eqt\">A and B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2324;&#2352; B</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Jammu and Kashmir has become the first Union Territory (UT) to implement the PM Vishwakarma Yojana (PMVY), an initiative that aims to empower and enhance the skills of the craftsman community, officials said. The inauguration of the training programme for the first batch of 30 trainees (Viswakarmas) in 'darzi craft' was virtually conducted. PM Vishwakarma, a Central Sector Scheme, was launched on 17th September, 2023 by the Prime Minister to provide end-to-end support to artisans and craftspeople who work with their hands and tools. The Scheme covers artisans and craftspeople engaged in 18 trades, viz. Carpenter (Suthar/Badhai), Boat Maker, Armourer, Blacksmith (Lohar), Hammer and Tool Kit Maker, Locksmith, Goldsmith (Sonar), Potter (Kumhaar), Sculptor (Moortikar, stone carver), Stone breaker, Cobbler (Charmkar)/ Shoesmith/Footwear artisan, Mason (Rajmistri), Basket/Mat/Broom Maker/Coir Weaver, Doll & Toy Maker (Traditional), Barber (Naai), Garland maker (Malakaar), Washerman (Dhobi), Tailor (Darzi) and Fishing Net Maker.</p><p>BENEFITS TO THE ARTISANS AND CRAFTS PERSONS The Scheme envisages provisioning of the following benefits to the artisans and crafts persons:</p><p>\tRecognition: Recognition of artisans and craftspeople through PM Vishwakarma certificate and ID card.</p><p>\tSkill Upgradation: Basic Training of 5-7 days and Advanced Training of 15 days or more, with a stipend of Rs. 500 per day.</p><p>\tToolkit Incentive: A toolkit incentive of upto Rs. 15,000 in the form of e-vouchers at the beginning of Basic Skill Training.</p><p>\tCredit Support: Collateral free 'Enterprise Development Loans' of upto Rs. 3 lakhs in two tranches of Rs. 1 lakh and Rs. 2 lakhs with tenures of 18 months and 30 months, respectively, at a concessional rate of interest fixed at 5%, with Government of India subvention to the extent of 8%. Beneficiaries who have completed Basic Training will be eligible to avail the first tranche of credit support of upto Rs. 1 lakh. The second loan tranche will be available to beneficiaries who have availed the 1st tranche and maintained a standard loan account and have adopted digital transactions in their business or have undergone Advanced Training.</p><p>\tIncentive for Digital Transaction: An amount of Re. 1 per digital transaction, upto maximum 100 transactions monthly will be credited to the beneficiary's account for each digital pay-out or receipt.</p><p>\tMarketing Support: Marketing support will be provided to the artisans and craftspeople in the form of quality certification, branding, onboarding on e-commerce platforms such as GeM, advertising, publicity and other marketing activities to improve linkage to value chain.</p>",
    "question_index": 110
  },

      "<span class=\"eqt\">Velocity and acceleration are always equal.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2327; &#2319;&#2357;&#2306; &#2340;&#2381;&#2357;&#2352;&#2339; &#2360;&#2342;&#2376;&#2357; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Velocity and acceleration are always in the same direction.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2327; &#2319;&#2357;&#2306; &#2340;&#2381;&#2357;&#2352;&#2339; &#2360;&#2342;&#2376;&#2357; &#2360;&#2350;&#2366;&#2344; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Velocity and acceleration are always in opposite directions.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2327; &#2319;&#2357;&#2306; &#2340;&#2381;&#2357;&#2352;&#2339; &#2360;&#2342;&#2376;&#2357; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Velocity and acceleration can have any relationship depending on the situation.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2357;&#2375;&#2327; &#2319;&#2357;&#2306; &#2340;&#2381;&#2357;&#2352;&#2339; &#2350;&#2375;&#2306; &#2325;&#2379;&#2312; &#2349;&#2368; &#2360;&#2306;&#2348;&#2306;&#2343; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The relationship between velocity and acceleration can vary depending on the specific scenario.</p><p>In some cases, velocity and acceleration may have the same direction, such as when an object is speeding up in a straight line.</p><p>In other cases, they may have opposite directions, such as when an object is slowing down or changing direction.</p><p>Additionally, velocity and acceleration can be independent of each other or have more complex relationships, depending on factors like the object's motion, forces acting on it, and the nature of the path it follows.</p><p>Therefore, the relationship between velocity and acceleration is not fixed and can differ from one situation to another.</p>",
    "question_index": 111
  },
  {
    "question": "<span class=\"eqt\"><p>_____ is a functional unit of nature, where living organisms interact among themselves and also with the surrounding physical environment. </p></span><span class=\"hqt\" style=\"display:none\"><p>_____ &#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367; &#2325;&#2368; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2311;&#2325;&#2366;&#2312; &#2361;&#2376;, &#2332;&#2361;&#2366;&#2305; &#2360;&#2332;&#2368;&#2357; &#2332;&#2368;&#2357; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2324;&#2352; &#2309;&#2346;&#2344;&#2375; &#2310;&#2360;&#2346;&#2366;&#2360; &#2325;&#2375; &#2349;&#2380;&#2340;&#2367;&#2325; &#2357;&#2366;&#2340;&#2366;&#2357;&#2352;&#2339; &#2360;&#2375; &#2346;&#2352;&#2367;&#2330;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Biodiversity</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2376;&#2357; &#2357;&#2367;&#2357;&#2367;&#2343;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Ecosystem</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Biosphere</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2376;&#2357;&#2350;&#2306;&#2337;&#2354;</span>",
      "<span class=\"eqt\">Niche</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2330;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; An <b>ecosystem</b> can be visualised as a functional unit of nature, where living organisms interact among themselves and also with the surrounding physical environment. </p><p>&#183; Ecosystem varies greatly in size from a small pond to a large forest or a sea. </p><p>&#183; Many ecologists regard the entire biosphere as a global ecosystem, as a composite of all local ecosystems on Earth.</p><p>&#183; Forest, grassland and desert are some examples of terrestrial ecosystems; pond, lake, wetland, river and estuary are some examples of aquatic ecosystems. </p><p>&#183; Crop fields and an aquarium may also be considered as man-made ecosystems.</p>",
    "question_index": 112
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following features of the Indian Constitution and the sources they have been borrowed from:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Features of the Constitution</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Borrowed from</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. Federation with a strong Centre.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Australia Constitution</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. Joint sitting of the two Houses of Parliament.</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Government of India act 1935</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. Public Service Commissions</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Irish Constitution</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. Method of election of President</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Canadian Constitution</td></tr></table><p>Choose the correct answer from the codes given below:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2368; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2323;&#2306; &#2324;&#2352; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2332;&#2367;&#2344; &#2360;&#2381;&#2352;&#2379;&#2340;&#2379;&#2306; &#2360;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2325;&#2379; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306; :</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2319;&#2305;</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368; &#2327;&#2312;</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. &#2319;&#2325; &#2350;&#2332;&#2348;&#2370;&#2340; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2306;&#2328;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2321;&#2360;&#2381;&#2335;&#2381;&#2352;&#2375;&#2354;&#2367;&#2351;&#2366;&#2312; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. &#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2342;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2348;&#2376;&#2336;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; 1935</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. &#2354;&#2379;&#2325; &#2360;&#2375;&#2357;&#2366; &#2310;&#2351;&#2379;&#2327;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2310;&#2351;&#2352;&#2367;&#2358; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2330;&#2369;&#2344;&#2366;&#2357; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2325;&#2344;&#2366;&#2337;&#2366; &#2325;&#2366; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344;</td></tr></table><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2360;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; :</p></span>",
    "options": [
      "<span class=\"eqt\">I-c, II-d, III-b, IV-a</span><span class=\"hqt\" style=\"display:none\">I-c, II-d, III-b, IV-a</span>",
      "<span class=\"eqt\">I-c, II-d, III-a, IV-b</span><span class=\"hqt\" style=\"display:none\">I-c, II-d, III-a, IV-b</span>",
      "<span class=\"eqt\">I-d, II-a, III-b, IV-c</span><span class=\"hqt\" style=\"display:none\">I-d, II-a, III-b, IV-c</span>",
      "<span class=\"eqt\">I-d, II-c, III-b, IV-a</span><span class=\"hqt\" style=\"display:none\">I-d, II-c, III-b, IV-a</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Features borrowed from Government of India Act of 1935</b></p><p>1) Federal Scheme</p><p>2) Office of Governor</p><p>3) Judiciary</p><p>4) Public Service Commissions</p><p>5) Emergency provisions</p><p>6) Administrative details</p><p><b>Features borrowed from the Australia's Constitution: </b></p><p>1) Concurrent List</p><p>2) Freedom of trade</p><p>3) Commerce and intercourse</p><p>4) Joint sitting of the two Houses of Parliament</p><p>5) The language used in the Preamble</p><p><b>Features borrowed from the Canadian constitution: </b></p><p>1) Federation with a strong Centre</p><p>2) Vesting of residuary powers in the Centre</p><p>3) Appointment of state governors by the Centre</p><p>4) Advisory jurisdiction of the Supreme Court</p><p><b>Features borrowed from </b><b>Ireland's Constitution:</b></p><p>1) Concept of Directive Principles of State Policy (Ireland had borrowed it from Spain)</p><p>2) Nomination of members to Rajya Sabha by the President</p><p>3) Method of election of President</p><p>Source: Indian Polity, Laxmikanth.</p>",
    "question_index": 113
  },
