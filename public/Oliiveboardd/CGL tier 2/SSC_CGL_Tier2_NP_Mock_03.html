        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Simplify the following expression:</p><p>(1846 &div; 71) * (121 - 14 * 5) + 310</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2379; &#2360;&#2352;&#2354;&#2368;&#2325;&#2371;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><p>(1846 &div; 71) * (121 - 14 * 5) + 310</p></span>",
    "options": [
      "<span class=\"eqt\">1636</span><span class=\"hqt\" style=\"display:none\">1636</span>",
      "<span class=\"eqt\">1626</span><span class=\"hqt\" style=\"display:none\">1626</span>",

      "<span class=\"eqt\">1616</span><span class=\"hqt\" style=\"display:none\">1616</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>(1846 &div; 71) * (121 - 14 * 5) + 310</p><p>= 26 * (121-70) + 310</p><p>= 26 * 51 + 310</p><p>= 1326 + 310</p><p>= 1636</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p><span>The value of a for which the expression</span>&nbsp;<span>x</span><span><sup>3</sup></span>&nbsp;<span>+</span>&nbsp;<span>x</span><span><sup>2</sup></span><span>&nbsp;&#8211; 5x + a will be divisible by (x &#8211; 2) is</span><span>:</span></p></span><span class=\"hqt\" style=\"display:none\"><p>'a' &#2325;&#2366; &#2357;&#2361; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2360;&#2375; x<sup>3</sup> + x<sup>2</sup> - 5x + a, (x - 2) &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;:</p></span>",
    "options": [
      "<span class=\"eqt\">-2</span><span class=\"hqt\" style=\"display:none\">-2</span>",
      "<span class=\"eqt\">-4</span><span class=\"hqt\" style=\"display:none\">-4</span>",

      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>"
    ],
    "correct_option_id": 0,
    "solution": "\"<p>(x &#8211; 2) is a factor of polynomial&nbsp;</p><p><span>f(x) = x</span><span><sup>3</sup></span>&nbsp;<span>+</span>&nbsp;<span>x</span><span><sup>2</sup></span><span>&nbsp;&#8211;&nbsp;</span><span>5x</span>&nbsp;<span>+</span>&nbsp;a<span>&nbsp; &nbsp;</span></p><p><span>&#8756;</span>&nbsp;<span>f(2)</span>&nbsp;<span>=</span>&nbsp;<span>0 &nbsp;&nbsp;&nbsp;</span></p><p><span>&#8658;</span>&nbsp;<span>2</span><span><sup>3</sup></span>&nbsp;<span>+</span>&nbsp;<span>2</span><span><sup>2</sup></span><span>&nbsp;&#8211;&nbsp;</span><span>5</span>&nbsp;<span>&#215;</span>&nbsp;<span>2</span>&nbsp;<span>+</span>&nbsp;a&nbsp;<span>=</span>&nbsp;<span>0 &nbsp;&nbsp;&nbsp;</span></p><p><span>&#8658;</span>&nbsp;a&nbsp;<span>=</span><span>&nbsp;&#8211;</span><span>2 &nbsp;&nbsp;&nbsp;</span></p>\"",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Train A of length 104 m crosses train B which is moving in same direction in 54 seconds. If the speed of train A and train B are 20 m/s and 16 m/s respectively, then find the length of train B. </p></span><span class=\"hqt\" style=\"display:none\"><p>104 m &#2354;&#2306;&#2348;&#2368; &#2335;&#2381;&#2352;&#2375;&#2344; A &#2360;&#2350;&#2366;&#2344; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352; &#2352;&#2361;&#2368; &#2335;&#2381;&#2352;&#2375;&#2344; B &#2325;&#2379; 54 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2346;&#2366;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2335;&#2381;&#2352;&#2375;&#2344; A &#2324;&#2352; &#2335;&#2381;&#2352;&#2375;&#2344; B &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 20 m/s &#2324;&#2352; 16 m/s &#2361;&#2376;, &#2340;&#2379; &#2335;&#2381;&#2352;&#2375;&#2344; B &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">126 m</span><span class=\"hqt\" style=\"display:none\">126 m</span>",
      "<span class=\"eqt\">118 m</span><span class=\"hqt\" style=\"display:none\">118 m</span>",
      "<span class=\"eqt\">120 m</span><span class=\"hqt\" style=\"display:none\">120 m</span>",
      "<span class=\"eqt\">112 m</span><span class=\"hqt\" style=\"display:none\">112 m</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Since both the trains are moving in same direction, so, their relative speed = 20  -  16 = 4 m/s</p><p>Now, time taken by train A to cross train B = (sum of length of train A and train B)/relative speed</p><p>54 = (104 + length of train B)/4</p><p>216 = 104 + length of train B</p><p>Length of train B = <b>112 m</b></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If the median of below data is 37.5, then what is the value of a?</p><p>19, 22, 28, 32, a, a + 5, 41, 55, 60, 72</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2310;&#2305;&#2325;&#2337;&#2364;&#2375; &#2325;&#2368; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; 37.5 &#2361;&#2376;, &#2340;&#2379; a &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p><p>19, 22, 28, 32, a, a + 5, 41, 55, 60, 72</p></span>",
    "options": [
      "<span class=\"eqt\">34</span><span class=\"hqt\" style=\"display:none\">34</span>",

      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>",
      "<span class=\"eqt\">37</span><span class=\"hqt\" style=\"display:none\">37</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>n = 10, which is even.</p><p>So, median = [Value of {(n/2)<sup>th</sup> + (n/2 + 1)<sup>th</sup>} term]/2 </p><p>=&gt; 37.5 = (a + a + 5)/2</p><p>=&gt; 75 = 2a + 5</p><p>=&gt; a = 70/2</p><p>=&gt; a = 35</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The following tables shows the result of a survey about people who like tea or coffee of 4 different group  -  A, B, C, and D.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\" rowspan=\"2\">Result</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\" colspan=\"4\">Number of people</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Group A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Group B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Group C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Group D</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">People who like both tea and coffee</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">24</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">24</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">People who like only tea</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">28</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">18</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">People who like only Coffee</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">14</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">10</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">People who neither like tea nor coffee</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">72</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">50</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">18</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td></tr></table><p>What is the ratio of number of people who like only tea in group B and D together to that of who neither like tea nor coffee in group A and C together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2368; &#2327;&#2312; &#2340;&#2366;&#2354;&#2367;&#2325;&#2366; 4 &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; - A, B, C &#2324;&#2352; D &#2350;&#2375;&#2306; &#2330;&#2366;&#2351; &#2351;&#2366; &#2325;&#2377;&#2398;&#2368; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2319;&#2325; &#2360;&#2352;&#2381;&#2357;&#2375;&#2325;&#2381;&#2359;&#2339; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td rowspan=\"2\" align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2346;&#2352;&#2367;&#2339;&#2366;&#2350;</td><td colspan=\"4\" align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2350;&#2370;&#2361; A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2350;&#2370;&#2361; B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2350;&#2370;&#2361; C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2350;&#2370;&#2361; D</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2330;&#2366;&#2351; &#2324;&#2352; &#2325;&#2377;&#2398;&#2368; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">24</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">24</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2375;&#2357;&#2354; &#2330;&#2366;&#2351; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">28</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">18</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2377;&#2398;&#2368; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">14</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">10</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2344; &#2340;&#2379; &#2330;&#2366;&#2351; &#2324;&#2352; &#2344; &#2361;&#2368; &#2325;&#2377;&#2398;&#2368; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">72</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">50</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">18</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td></tr></table><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2350;&#2370;&#2361; B &#2324;&#2352; D &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2330;&#2366;&#2351; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2340;&#2341;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2350;&#2370;&#2361; A &#2324;&#2352; C &#2350;&#2375;&#2306; &#2344; &#2340;&#2379; &#2330;&#2366;&#2351; &#2324;&#2352; &#2344; &#2361;&#2368; &#2325;&#2377;&#2398;&#2368; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1: 3</span><span class=\"hqt\" style=\"display:none\">1: 3</span>",
      "<span class=\"eqt\">2: 1</span><span class=\"hqt\" style=\"display:none\">2: 1</span>",

    "solution": "<p>Number of people who like only tea in group B and D together = 15 + 15 = 30</p><p>Number of people who neither like tea nor coffee in group A and C together = 72 + 18 = 90</p><p>Required ratio = 30: 90 = 1: 3</p>",

  {
    "question": "<span class=\"eqt\"><p>The terms 4X, 5X + 3, 9X  -  1, and 2Y are in proportion. Find the value of Y if X = 3.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2342; 4X, 5X + 3, 9X - 1 &#2324;&#2352; 2Y &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; X = 3 &#2361;&#2376;, &#2340;&#2379; Y &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">17.5</span><span class=\"hqt\" style=\"display:none\">17.5</span>",
      "<span class=\"eqt\">21.5</span><span class=\"hqt\" style=\"display:none\">21.5</span>",
      "<span class=\"eqt\">19.5</span><span class=\"hqt\" style=\"display:none\">19.5</span>",

    "correct_option_id": 2,
    "solution": "<p>Terms: 4X, 5X + 3, 9X  -  1, and 2Y</p><p>Or after putting the value of X terms are 12, 18, 26, and 2Y</p><p>According to the question, terms are in proportion,</p><p>So, 12 * 2Y = 18 * 26</p><p>Y = 18 * 26/24</p><p>Y = 3 * 13/2</p><p>Y = 39/2 = 19.5</p>",
    "question_index": 5

    "question": "<span class=\"eqt\"><p><div>&nbsp;If&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">5 + 4&radic;3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">2&radic;3 + 3</span></div>&nbsp;= a -&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">b</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&radic;3</span></div>&nbsp;, then the value of (a + b) is&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">5 + 4&radic;3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">2&radic;3 + 3</span></div>&nbsp;= a -&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">b</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&radic;3</span></div> &#2361;&#2376;, &#2340;&#2379; (a + b) &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376; :</div></p></span>",

    "solution": "<p>=<img width=57 height=43 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15367/image041.png\"></p><p>On rationalization, we multiply and divide it with (2&radic;3  -  3)</p><p>=<img width=116 height=43 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15367/image042.png\"></p><p>=<img width=128 height=57 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15367/image043.png\"></p><p>=<img width=155 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15367/image044.png\"></p><p>=<img width=56 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15367/image045.png\"></p><p>=<img width=48 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15367/image046.png\"></p><p>On comparing it with a  -  b/&radic;3</p><p>We get a = 3, b = 2</p><p>Therefore, a + b = 3 + 2 = 5</p>",

    "question": "<span class=\"eqt\"><p>What is the probability that an even number appears on both dice together when two dice are rolled?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2346;&#2366;&#2360;&#2379;&#2306; &#2325;&#2379; &#2347;&#2376;&#2306;&#2325;&#2344;&#2375; &#2346;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2360;&#2379;&#2306; &#2346;&#2352; &#2319;&#2325; &#2360;&#2366;&#2341; &#2319;&#2325; &#2360;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2310;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>In a set of 39 numbers, average of first 18 numbers is 11 while the average of last 20 numbers is 26. If 19<sup>th</sup> number is replaced with 65, then the actual average is decreased by 2. What is the value (upto 1 decimal place) of actual average of 39 numbers? </p></span><span class=\"hqt\" style=\"display:none\"><p>39 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306;, &#2346;&#2361;&#2354;&#2368; 18 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 11 &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2309;&#2306;&#2340;&#2367;&#2350; 20 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 26 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 19&#2357;&#2368;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; 65 &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2324;&#2360;&#2340; 2 &#2360;&#2375; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2340;&#2379; 39 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2324;&#2360;&#2340; &#2325;&#2366; &#2350;&#2366;&#2344; (1 &#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2381;&#2341;&#2366;&#2344; &#2340;&#2325;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">22.1</span><span class=\"hqt\" style=\"display:none\">22.1</span>",
      "<span class=\"eqt\">25.7</span><span class=\"hqt\" style=\"display:none\">25.7</span>",
      "<span class=\"eqt\">19.3</span><span class=\"hqt\" style=\"display:none\">19.3</span>",
      "<span class=\"eqt\">28.5</span><span class=\"hqt\" style=\"display:none\">28.5</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Average = sum of observations/number of observations </p><p>Let the actual average = a </p><p>Then, sum of 39 numbers = 39a </p><p>Sum of first 18 numbers = 18 * 11 = 198</p><p>Sum of last 20 numbers = 20 * 26 = 520</p><p>Now, Sum of 39 numbers = Sum of first 18 numbers + 19<sup>th</sup> number + Sum of last 20 numbers</p><p>39a = 198 + 19<sup>th</sup> number + 520</p><p>19<sup>th</sup> number = 39a  -  718</p><p>New average = a  -  2 </p><p>Now, 39a  -  19<sup>th</sup> number + 65 = 39(a  -  2)</p><p>39a  -  19<sup>th</sup> number + 65 = 39a  -  78 </p><p>19<sup>th</sup> number = 143</p><p>So, 39a  -  718 = 143 </p><p>39a = 861</p><p><b>a = 22.1 (approx.)</b></p>",
    "question_index": 24
  },

    "correct_option_id": 3,
    "solution": "<p>Cube volume = 28<sup>3</sup> = 21952</p><p>Cylinder volume = &#960;r<sup>2</sup>h, with r = 7 and h = 28</p><p>cylinder volume = (22/7)  X  49  X  28</p><p>=&gt; 22  X  7  X  28 = 4312</p><p>Remaining volume = 21952 &#8722; 4312 = 17640</p>",

    "question": "<span class=\"eqt\"><p>Kiya started a business with Rs. 4000. After 8 months from Kiya joining, Pia joined him with a capital of Rs. 8000. After 4 months from Pia joining, Tiya joined them with a capital of Rs. 6000. At the end of two years, the profit share of Pia is Rs. 5120. Find the profit share of Kiya and Tiya.</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2351;&#2366; &#2344;&#2375; 4000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2360;&#2375; &#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;&#2404; &#2325;&#2367;&#2351;&#2366; &#2325;&#2375; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; 8 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342;, &#2346;&#2367;&#2351;&#2366; 8000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; &#2325;&#2375; &#2360;&#2366;&#2341; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379; &#2327;&#2312;&#2404; &#2346;&#2367;&#2351;&#2366; &#2325;&#2375; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; 4 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342;, &#2335;&#2367;&#2351;&#2366; 6000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; &#2325;&#2375; &#2360;&#2366;&#2341; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379; &#2327;&#2312;&#2404; &#2342;&#2379; &#2360;&#2366;&#2354; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306;, &#2346;&#2367;&#2351;&#2366; &#2325;&#2366; &#2354;&#2366;&#2349; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; 5120 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;&#2404; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2335;&#2367;&#2351;&#2366; &#2325;&#2366; &#2354;&#2366;&#2349; &#2361;&#2367;&#2360;&#238     "question": "<span class=\"eqt\"><p>Two numbers are in the ratio 3:8. If 6 is added to each, the new ratio is 1:2. What is the smaller number? </p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; 3:8 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2350;&#2375;&#2306; 6 &#2332;&#2379;&#2337;&#2364; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2344;&#2351;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 1:2 &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2380;&#2344; &#2360;&#2368; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let numbers be 3n and 8n. </p><p>Then, (3n + 6)/(8n + 6) = 1/2. </p><p>2(3n + 6) = (8n + 6) </p><p>=&gt; 6n + 12 = 8n + 6 </p><p>=&gt; 2n = 6 </p><p>=&gt; n = 3. </p><p>Smaller number = 3n = 9.</p>",
    "question_index": 31
  },

    "question": "<span class=\"eqt\"><p>In this question, a question is followed by two statements numbered (I) and (II). You have to decide whether the data provided in the statements/s are sufficient to answer the question. Read both the statements and choose your answer carefully.</p><p><b>Question:</b> Four girls - A, F, T, Y and four boys - P, Q, W and X are sitting in two parallel rows. Girls are sitting in row 1 facing south and boys are sitting in row 2 facing north. Who faces Y?</p><p><b>Statements:</b></p><p>(I) A is second to the right of Y and faces Q. W and X are neighbours of Q. The neighbour of P faces T.</p><p>(II) F is to the immediate right of T, who faces X. Two boys sit between P and X.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2325;&#2341;&#2344; &#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; (I) &#2324;&#2352; (II) &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376; &#2351;&#2366; &#2344;&#2361;&#2368;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2309;&#2346;&#2344;&#2366; &#2313;&#2340;&#2381;&#2340;     "solution": "<p>It is given that:</p><p>Four girls - A, F, T, Y and four boys - P, Q, W and X are sitting in two parallel rows. Girls are sitting in row 1 facing south and boys are sitting in row 2 facing north.</p><p><b>From statement (I) alone:</b></p><p>A is second to the right of Y and faces Q. W and X are neighbours of Q.</p><p><img width=277 height=118 id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25709/image012.jpg\"></p><p>The neighbour of P faces T.</p><p>Thus, we get:</p><p><img width=281 height=120 id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25709/image013.jpg\"></p><p>So, P faces Y.</p><p>Thus, statement (I) alone is sufficient to answer the question.</p><p><b>From statement (II) alone:</b></p><p>F is to the immediate right of T, who faces X. Two boys sit between P and X.</p><p><img width=282 height=121 id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25709/image014.jpg\"></p><p>So, we get:</p><p><img width=290 height=121 id=\"Picture 33\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25709/image015.jpg\"></p><p>Therefore, statement (II) alone is not sufficient to answer the question.</p>",

    "solution": "<p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A (1)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B (2)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C (3)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D (4)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E (5)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">F (6)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">G (7)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">H (8)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I (9)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">J (10)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">K (11)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">L (12)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">M (13)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Z (26)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Y (25)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">X (24)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">W (23)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">V (22)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">U (21)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T (20)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S (19)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R (18)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Q (17)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P (16)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">O (15)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N (14)</td></tr></table></p><p>Option (a): # = BFN, % = HLV</p><p>B + 2 = D</p><p>F  -  7 = Y</p><p>N + 4 = R</p><p>Similarly,</p><p>F + 2 = H</p><p>P  -  4 = L</p><p>T + 2 = V</p><p>Same pattern is not followed between right side and left side. So, option (a) is incorrect.</p><p>Option (b): # = AEO, % = IJW</p><p>A + 3 = D</p><p>E  -  6 = Y</p><p>O + 3 = R</p><p>Similarly,</p><p>F + 3 = I</p><p>P  -  6 = J</p><p>T + 3 = W</p><p>Same pattern is followed between right side and left side. So, option (<b>b</b>) is correct.</p><p>Option (c): # = CDN, % = JHX</p><p>C + 1 = D</p><p>D  -  5 = Y</p><p>N + 4 = R</p><p>Similarly,</p><p>F + 4 = J</p><p>P  -  8 = H</p><p>T + 4 = X</p><p>Same pattern is not followed between right side and left side. So, option (c) is incorrect.</p><p>Option (d): # = BEN, % = HJW</p><p>B + 2 = D</p><p>E  -  6 = Y</p><p>N + 4 = R</p><p>Similarly,</p><p>F + 2 = H</p><p>P  -  6 = J</p><p>T + 3 = W</p><p>Same pattern is not followed between right side and left side. So, option (d) is incorrect.</p><p>Hence, the answer is option (b).</p>",

    "question": "<span class=\"eqt\"><p>A statement is given followed by two inferences I and II. You have to consider the statements to be true even if it seems to be at variance with commonly known facts. You have to decide which of the given inferences, if any, follow from the given statement. </p><p><b>Statement:</b> Use of computers and display devices with a screen decreases the number of eye blinks, leading to incomplete blinking, evaporation of tears, and subsequently to dry eye disease. </p><p><b>Inference: </b></p><p>I. Poor blinking habits causes dry eyes. </p><p>II. Screen exposure is the cause of all eye problems.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2341;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2344;&#2366; &#2361;&#2376;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2357;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2340;&#2368;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2379;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;, &#2351;&#2342;&#2367; &#2325;&#2379;&#2312; &#2361;&#2379;, &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366;/&#2325;&#2352;&#2340;&#2375; &#2361;&#2376;/&#2361;&#2376;&#2306;&#2404;</p><p><b>&#2325;&#2341;&#2344;: </b>&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2324;&#2352; &#2360;&#2381;&#2325;&#2381;&#2352;&#2368;&#2344; &#2357;&#2366;&#2354;&#2375; &#2337;&#2367;&#2360;&#2381;&#2346;&#2381;&#2354;&#2375; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327; &#2360;&#2375; &#2310;&#2306;&#2326;&#2379;&#2306; &#2325;&#2375; &#2333;&#2346;&#2325;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2309;&#2346;&#2370;&#2352;&#2381;&#2339; &#2346;&#2354;&#2325; &#2333;&#2346;&#2325;&#2344;&#2366;, &#2310;&#2306;&#2360;&#2369;&#2323;&#2306; &#2325;&#2366; &#2357;&#2366;&#2359;&#2381;&#2346;&#2368;&#2325;&#2352;&#2339; &#2324;&#2352; &#2309;&#2306;&#2340;&#2340;&#2307; &#2358;&#2369;&#2359;&#2381;&#2325; &#2344;&#2375;&#2340;&#2381;&#2352; &#2352;&#2379;&#2327; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><b>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</b></p><p>I. &#2346;&#2354;&#2325; &#2325;&#2350; &#2333;&#2346;&#2325;&#2344;&#2375; &#2325;&#2368; &#2310;&#2342;&#2340; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2310;&#2305;&#2326;&#2375;&#2306; &#2360;&#2370;&#2326; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2360;&#2381;&#2325;&#2381;&#2352;&#2368;&#2344; &#2319;&#2325;&#2381;&#2360;&#2346;&#2379;&#2332;&#2352; &#2310;&#2305;&#2326;&#2379;&#2306; &#2325;&#2368; &#2360;&#2349;&#2368; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2325;&#2366;&#2352;&#2339; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">If only I follows</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2325;&#2375;&#2357;&#2354; I &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">If only II follows</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2325;&#2375;&#2357;&#2354; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">If both I and II follow</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">If neither I nor II follows</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2344; &#2340;&#2379; I &#2344; &#2361;&#2368; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>From the statement, it can be concluded that, less blinking causes evaporation of tears. </p><p>Dry eyes can occur when tear production is not balanced. People with dry eyes either do not produce enough tears or their tears are of a poor quality. So, evaporation of tears leads to dry eyes. So, I follows. </p><p>We cannot definitely say that all eye defects are due to the exposure to screens because some eye defects may be due to the deficiency of vitamins and essential nutrients. So, II do not follow. </p>",
    "question_index": 38
  },

    "question": "<span class=\"eqt\"><p>'D % E' means 'D is the sister-in-law of E and D is unmarried'.</p><p>'D $ E' means 'D is the father of E'.</p><p>'D &amp; E' means 'D is the brother of E's mother'.</p><p>'D @ E' means 'D is the daughter of E'. </p><p>If A &amp; M @ K $ L % P and K has only two children, then how is P related to K? </p></span><span class=\"hqt\" style=\"display:none\"><p>'D % E' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'D, E &#2325;&#2368; &#2360;&#2367;&#2360;&#2381;&#2335;&#2352;-&#2311;&#2344;-&#2354;&#2377; &#2361;&#2376; &#2324;&#2352; D &#2309;&#2357;&#2367;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2376;&#2404;'</p><p>'D $ E' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'D, E &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;'&#2404;</p><p>'D &amp; E' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'D, E &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;'&#2404;</p><p>'D @ E' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'D, E &#2325;&#2368; &#2348;&#2375;&#2335;&#2368; &#2361;&#2376;'&#2404;</p><p>&#2351;&#2342;&#2367; A &amp; M @ K $ L % P &#2361;&#2376; &#2324;&#2352; K &#2325;&#2368; &#2325;&#2375;&#2357;&#2354; &#2342;&#2379; &#2360;&#2306;&#2340;&#2366;&#2344; &#2361;&#2376;&#2306;, &#2340;&#2379; P, K &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Brother</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Wife</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2381;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Son-in-law</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2366;&#2350;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Brother-in-law</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2342;&#2352;-&#2311;&#2344;-&#2354;&#2377;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>It is given that,</p><p>'D % E' means 'D is the sister-in-law of E and D is unmarried'.</p><p>'D $ E' means 'D is the father of E'.</p><p>'D &amp; E' means 'D is the brother of E's mother'.</p><p>'D @ E' means 'D is the daughter of E'. </p><p>The expression is A &amp; M @ K $ L % P. After decoding, we get: </p><p>A is the brother of M's mother. </p><p>M is the daughter of K.</p><p>K is the father of L.</p><p><img width=218 height=71 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22075/image002.jpg\"></p><p>L is the sister-in-law of P and L is unmarried. </p><p><img width=217 height=74 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22075/image003.jpg\"></p><p>Thus, P is the son-in-law of K. </p>",
    "question_index": 40

    "options": [

    "correct_option_id": 0,
    "solution": "<p>In a row of 49 students, Ankur is 19<sup>th</sup> from the right end and ninth to the right of Ayushi. If eight persons sit between Ayushi and Amar<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">'N'</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Amar</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8 persons</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ayushi</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8 persons</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ankur</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">18 students</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(19<sup>th</sup> from right end)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table></p><p>Total = N + 1 (Amar) + 8 + 1 (Ayushi) + 8 + 1 (Ankur) + 18</p><p>=> 49 = N + 1 + 8 + 1 + 8 + 1 + 18</p><p>=> N = 49  -  37</p><p>=> N = 12</p><p>12 persons sit to the left of Amar.</p><p>Thus, position of Amar is <b>13<sup>th</sup></b> from the left end.</p>",

    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>The entire neighbourhood is being decorated by the residents for the grand celebration of the annual street festival.</p>",

    ],
    "correct_option_id": 3,
    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the \"to be\" verb ['being'] and the preposition 'by' is necessary while changing the voice of the sentence from Passive to Active.</p><p>The Passive voice in this question is in <b>Present Continuous tense</b>. Thus, the Active voice will also be in Present Continuous.</p><p>In Passive voice, the format is: Object of the Active voice (Subjective case) + am/is/are + being + V3 + by + Subject of the Active voice (Objective case).</p><p>Thus, the format of Active voice is: Subject + am/is/are + V1 + ing + Object.</p><p>For example:</p><p>A document is being typed by Arnab. (Passive Voice)</p><p>Arnab is typing a document. (Active Voice)</p><p>The options except (d) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is option (d): The residents are decorating the entire neighbourhood for the grand celebration of the annual street festival.</p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 63

    "solution": "<p>The grammar concept of \"countability and comparative determiners\" applies here.</p><p>The highlighted part is wrong because \"options\" is a plural, countable noun and therefore cannot take \"less,\" which must be used only with uncountable (mass) nouns. The correct comparative determiner is \"fewer.\"</p><p>Option (a)  -  incorrect</p><p>\"Fewer\" requires a plural countable noun, but the noun is singular (\"option\"), producing number disagreement.</p><p>Option (b)  -  correct</p><p>\"Fewer options\" properly uses the comparative determiner for plural count nouns and preserves the intended meaning.</p><p>Option (c)  -  incorrect</p><p>Incorrect on two counts: uses \"less\" with a count noun and keeps the noun singular, further compounding the error.</p><p>Option (d)  -  incorrect</p><p>Uses the superlative \"least\" rather than the comparative \"fewer,\" changing meaning entirely.</p><p>Hence, option (b) is correct.</p><p><b>Note: </b>Use fewer with countable items (\"fewer books,\" \"fewer choices\") and less with uncountable mass nouns (\"less water,\" \"less time\"). A quick rule: if the noun can be counted individually, \"fewer\" is required.</p>",

    "solution": "<p>The grammar concept of \"ellipsis and gapping in coordinated clauses\" applies here.</p><p>The highlighted part attempts gapping by omitting the verb in the second clause, but the structure \"and Ravi the one for research\" becomes incomplete and stylistically unacceptable in formal contexts. Ellipsis must maintain clarity and syntactic completeness even when material is omitted.</p><p>Option (a)  -  incorrect</p><p>Uses a present participle without an auxiliary, producing a fragment, not a clause.</p><p>Option (b)  -  incorrect</p><p>Missing the article \"the,\" which makes the phrase vague and non-parallel with the first clause.</p><p>Option (c)  -  correct</p><p>Repeats the full predicate \"approved the budget for research.\" This restores complete parallelism and clarity.</p><p>Option (d)  -  incorrect</p><p>\"was approve\" is an impossible verb sequence. Violates basic inflection rules.</p><p>Hence, option (c) is correct.</p><p><b>Note:</b></p><p>Ellipsis in coordinated clauses is permissible only when the remaining elements form a grammatically intact structure. Poorly executed gapping leads to ambiguity and formal inaccuracy.</p>",

    "solution": "<p>The sentence in the Indirect Speech is in <b>Past Perfect Tense</b>. </p><p>There are three cases when the Indirect Speech is in Past Perfect Tense.</p><p>&#183; Tense remains same</p><p>&#183; Past perfect changes to Present Perfect</p><p>&#183; Past perfect changes to Simple Past</p><p><b>Case 1: </b>Past Perfect (Subject + had + V3 + Object) tense will be kept intact.</p><p>For example:</p><p>He said that he had just finished the movie. (Indirect Speech)</p><p>He said, \"I had just finished the movie\" (Direct Speech)</p><p><b>Case 2: </b>Past Perfect (Subject + had + V3 +Object) will be converted into Present Perfect (Subject + has/have + V3 +Object).</p><p>For example:</p><p>He said that he had got a new job. (Indirect Speech)</p><p>He said, \"I have got a new job.\" (Direct Speech)</p><p><b>Case 3: </b>Past Perfect (Subject + had + V3 + Object) will be converted into Past Simple (Subject + V2 + Object).</p><p>For example:</p><p>He said that Arya had sent him a book. (Indirect Speech)</p><p>He said, \"Arya sent me a book\" (Direct Speech)</p><p>So, here case II is applied.</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>\"He\" changes to \"I\".</p><p>\"Had\" changes to \"have\".</p><p>Therefore, the correct answer is: He mentioned, \"I have planned a trip to France.\"</p><p>Hence, option (c) is correct.</p>",

    "question": "<p>Select the most appropriate option to fill in the blanks. </p><p>Many people want to move to Western countries like Europe, the US, Canada, or London. They think these places ____ better jobs, a better life, and exciting experiences. Social media shows them a perfect picture of life abroad, making them want to ____ their homes and start fresh in these dream destinations. </p>",

    "correct_option_id": 0,
    "solution": "<p>Blank 1  -  'Offer' means to provide or make available, which accurately describes the perception that Western countries provide better jobs, a better life, and exciting experiences.</p><p>Blank 2  -  'Leave' means to go away from a place, which fits the context of wanting to abandon their homes and start fresh in new destinations.</p><p>Hence, (a) is the correct answer.</p><p>(b): \"Buy\" (to purchase) doesn't fit well in the context of countries and better jobs, and better life, as \"buy\" implies purchasing rather than offering. While people might want to \"live\" in a new place, the context of the sentence focuses on leaving their current location, making \"leave\" a more fitting choice.</p><p>(c): \"Cell\" (a small compartment) is incorrect grammatically as it is a noun, whereas we require a verb to denote the relationship between Western countries and better jobs, better life and exciting experiences, and \"left\" (past tense of leave) does not fit the blank grammatically as the blank follows the infinitive marker \"to\" which should be followed by the base verb only.</p><p>(d): \"Sale\" (the act of selling) does not fit the blank as it is a noun, not verb. While people might make sacrifices when moving, the sentence is focusing on the action of leaving, not the consequences.</p><p><b>Note: Infinitive marker: </b>A word or affix attached to the stem of a verb in order to form the full infinitive. In English, to is the infinitive marker.</p><p><b>Infinitive: </b>The infinitive is the base form of a verb, often preceded by to.</p><p>Consider the sentences given below:</p><p>&#183; To err is human. [like a noun, the infinitive 'to err' is the subject of the verb 'is']</p><p>&#183; My father likes to cook. [like a noun, the infinitive 'to cook' is the object of the verb 'likes']</p><p>&#183; To vote in elections is our right. [the infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p>&#183; Radha went to the lake to fetch water. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p>&#183; The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.</p>",

ish. Example: \"Everybody enjoyed her dancing and singing at the party.\" The words 'dancing' and 'singing' are gerunds. </p>",

    "comp": "<p><b>Directions :</b>Read the given passage and answer the questions that follow.</p><p>The historical evolution of general anaesthesia marks one of the most transformative developments in medical science, fundamentally altering the practice of surgery. Prior to the nineteenth century, surgical procedures were performed with little more than physical restraint, alcohol, or herbal sedatives, making surgery a traumatic and often life-threatening experience. The modern era of general anaesthesia began in 1846 with William T. G. Morton's public demonstration of ether anaesthesia at the Massachusetts General Hospital. Ether allowed surgeons to perform operations without pain, inaugurating a new phase in operative medicine.</p><p>Following ether, chloroform was introduced by James Young Simpson in 1847. Although chloroform acted more rapidly and was easier to administer, its narrow safety margin and cardiac toxicity eventually limited its use. By the late nineteenth and early twentieth centuries, nitrous oxide emerged as a safer adjunct, often combined with oxygen and ether to improve anaesthetic control. These developments reflected a growing emphasis on balancing efficacy with patient safety.</p><p>The twentieth century witnessed rapid advancements in anaesthetic pharmacology. Intravenous agents such as thiopentone sodium enabled smoother induction, while muscle relaxants revolutionised surgical access and airway management. The introduction of halogenated inhalational agents, including halothane, followed by isoflurane, sevoflurane, and desflurane, significantly improved cardiovascular stability and recovery profiles.</p><p>In recent decades, modern agents like propofol have transformed anaesthetic practice through rapid onset, precise titration, and faster recovery. Advances in monitoring, delivery systems, and pharmacological understanding have further enhanced safety and efficacy. From ether-soaked sponges to sophisticated, target-controlled anaesthesia, the evolution of general anaesthesia reflects continuous innovation driven by the pursuit of painless, safe, and controlled surgery.</p>",

    "comp": "<p><b>Directions :</b>Read the given passage and answer the questions that follow.</p><p>The historical evolution of general anaesthesia marks one of the most transformative developments in medical science, fundamentally altering the practice of surgery. Prior to the nineteenth century, surgical procedures were performed with little more than physical restraint, alcohol, or herbal sedatives, making surgery a traumatic and often life-threatening experience. The modern era of general anaesthesia began in 1846 with William T. G. Morton's public demonstration of ether anaesthesia at the Massachusetts General Hospital. Ether allowed surgeons to perform operations without pain, inaugurating a new phase in operative medicine.</p><p>Following ether, chloroform was introduced by James Young Simpson in 1847. Although chloroform acted more rapidly and was easier to administer, its narrow safety margin and cardiac toxicity eventually limited its use. By the late nineteenth and early twentieth centuries, nitrous oxide emerged as a safer adjunct, often combined with oxygen and ether to improve anaesthetic control. These developments reflected a growing emphasis on balancing efficacy with patient safety.</p><p>The twentieth century witnessed rapid advancements in anaesthetic pharmacology. Intravenous agents such as thiopentone sodium enabled smoother induction, while muscle relaxants revolutionised surgical access and airway management. The introduction of halogenated inhalational agents, including halothane, followed by isoflurane, sevoflurane, and desflurane, significantly improved cardiovascular stability and recovery profiles.</p><p>In recent decades, modern agents like propofol have transformed anaesthetic practice through rapid onset, precise titration, and faster recovery. Advances in monitoring, delivery systems, and pharmacological understanding have further enhanced safety and efficacy. From ether-soaked sponges to sophisticated, target-controlled anaesthesia, the evolution of general anaesthesia reflects continuous innovation driven by the pursuit of painless, safe, and controlled surgery.</p>",

    "question": "<span class=\"eqt\"><p>Given below are two statements marked as Assertion and Reason. Choose the correct option.</p><p>Assertion (A): Since the 1990s, the services sector's share in India's Gross Value Added (GVA) has risen faster than manufacturing's share.</p><p>Reason (R): Services are classified under the primary sector together with agriculture in national accounts, which inflates the services share.</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2325;&#2341;&#2344; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): 1990 &#2325;&#2375; &#2342;&#2358;&#2325; &#2360;&#2375;, &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2325;&#2354; &#2350;&#2370;&#2354;&#2381;&#2351; &#2357;&#2352;&#2381;&#2343;&#2367;&#2340; (GVA) &#2350;&#2375;&#2306; &#2360;&#2375;&#2357;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375;&#2342;&#2366;&#2352;&#2368; &#2357;&#2367;&#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375;&#2342;&#2366;&#2352;&#2368; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2340;&#2375;&#2332;&#2368; &#2360;&#2375; &#2348;&#2338;&#2364;&#2368; &#2361;&#2376;&#2404; &#2325;&#2366;&#2352;&#2339; (R): &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2354;&#2375;&#2326;&#2366; &#2350;&#2375;&#2306; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2379; &#2325;&#2371;&#2359;&#2367; &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2381;&#2352;&#2366;&     "question": "<span class=\"eqt\"><p>Which ministry is the nodal ministry for the implementation of the Pradhan Mantri Garib Kalyan Anna Yojana (PMGKAY)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2327;&#2352;&#2368;&#2348; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339; &#2309;&#2344;&#2381;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; (&#2346;&#2368;&#2319;&#2350;&#2332;&#2368;&#2325;&#2375;&#2319;&#2357;&#2366;&#2312;) &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2351;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2379;&#2337;&#2354; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>PMGKAY is implemented through the Department of Food and Public Distribution, under the <b>Ministry of Consumer Affairs, Food and Public Distribution</b>, using the Public Distribution System (PDS) to provide free foodgrains.</p><p><b>Further insights:</b></p><p>The Pradhan Mantri Garib Kalyan Anna Yojana (PMGKAY) was launched with the specific purpose of ameliorating the hardships faced by the poor and needy due to economic disruptions caused by the COVID-19 outbreak in the country. </p><p>In view of COVID crisis, the allocation of free food grains, under PMGKAY was in addition to regular allocation done. A total quantity of approx. 1118 LMT food grains had been allocated under PMGKAY (Phase I-VII) for 28 months with a total planned financial outlay was about 3.91 lakh crore.</p><p>The Central Government, in order to remove the financial burden of the poor beneficiaries and to ensure nationwide uniformity and effective implementation of the Act, had decided to provide food grains free of cost to NFSA beneficiaries i.e. AAY households and PHH beneficiaries, for a period of one year beginning from 1st January 2023 under the Pradhan Mantri Garib Kalyan Anna Yojana (PMGKAY). </p><p>Prior to that, under NFSA, subsidized food grains were distributed at Rs 3 per kg for rice, Rs 2 per kg for wheat and at Rs 1 per kg for coarse grains to beneficiaries. The period for distribution for free of cost food grains under the PMGKAY has been extended for five years w.e.f. 1st January, 2024.</p>",

  },

    "question": "<span class=\"eqt\"><p>Who inaugurated the NIELIT Digital University (NDU) platform in New Delhi in October 2025?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2025 &#2350;&#2375;&#2306; &#2344;&#2312; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2350;&#2375;&#2306; &#2319;&#2344;&#2310;&#2312;&#2312;&#2319;&#2354;&#2310;&#2312;&#2335;&#2368; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2351;&#2370;&#2344;&#2367;&#2357;&#2352;&#2381;&#2360;&#2367;&#2335;&#2368; (&#2319;&#2344;&#2337;&#2368;&#2351;&#2370;) &#2346;&#2381;&#2354;&#2375;&#2335;&#2347;&#2377;&#2352;&#2381;&#2350; &#2325;&#2366; &#2313;&#2342;&#2381;&#2328;&#2366;&#2335;&#2344; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ashwini Vaishnaw</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2358;&#2381;&#2357;&#2367;&#2344;&#2368; &#2357;&#2376;&#2359;&#2381;&#2339;&#2357;</span>",
      "<span class=\"eqt\">Mansukh Mandaviya</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2344;&#2360;&#2369;&#2326; &#2350;&#2366;&#2306;&#2337;&#2357;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Dharmendra Pradhan</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2352;&#2381;&#2350;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Rajeev Chandrasekhar</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2368;&#2357; &#2330;&#2306;&#2342;&#2381;&#2352;&#2358;&#2375;&#2326;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Hon'ble Union Minister of Railways, Electronics and Information Technology, and Information and Broadcasting Shri Ashwini Vaishnaw inaugurated the NIELIT Digital University (NDU) platform in New Delhi. The platform has been designed to democratize access to high-quality digital education. The platform will offer industry-focused programs in niche technologies such as AI, Cybersecurity, Data Science, Semiconductors, and allied fields. It will provide flexible digital learning modes and virtual labs to equip youth with future-ready skills.</p><p></p><p>The Hon'ble Union Minister also virtually inaugurated five new NIELIT Centres at Muzaffarpur (Bihar), Balasore (Odisha), Tirupati (Andhra Pradesh), Daman (Dadra and Nagar Haveli and Daman and Diu), and Lunglei (Mizoram). With the addition of these new Centres, NIELIT continues to play a pivotal role in shaping India's technological future. During the launch event, Memorandum of Understanding (MoUs) were also exchanged between NIELIT and Microsoft, Zscaler, CCRYN, Dixon Tech and Future Crime.</p><p>Making a special mention of the North-East location, Lunglei in Mizoram, the Union Minister highlighted that the region is now digitally connected, following the addition of railway connectivity to the state a few months earlier.</p><p>Over 1,500 participants took part in the event, including NIELIT students from across India, eminent academicians, and technological experts. The event also featured dedicated stalls showcasing NIELIT's strengths in skilling and learning models across various verticals of Electronics and Information Technology.</p><p>The launch event was followed by an insightful panel discussion on 'Role of AI in Digitalization of Education'.'</p><p>NIELIT Digital University Platform</p><p>The NIELIT Digital University Platform (ndu.digital) has been developed with the vision of creating a world-class, inclusive, affordable, and employment-oriented digital learning ecosystem. Its purpose is to democratize access to high-quality digital education, support the goals of Digital India, NEP 2020, and Skill India, and build a globally competitive workforce in emerging technologies such as Artificial Intelligence, Semiconductors, Cyber Security, and Cloud Computing.</p><p>The platform offers NCVET-approved, NSQF-aligned programmes with credit transfer through the Academic Bank of Credit (ABC), industry-integrated courses, virtual labs, multilingual learning, and verifiable digital certificates. With AI-driven tools like career pathways, mentors, interview simulators, and interactive modules, the platform aims to empower learners across India, targeting 40 lakh learners by 2030.</p><p>About NIELIT</p><p>National Institute of Electronics & Information Technology (NIELIT), an Autonomous Scientific Society of the Ministry of Electronics and Information Technology (MeitY), Government of India, has been a pioneer in skill development and digital empowerment.</p><p>With its extensive presence through 56 NIELIT centers, over 750 accredited institutes, and 9,000 facilitation centers, NIELIT has skilled and certified millions of students in emerging technologies in the E&ICT domain.</p><p>NIELIT has been conferred the status of \"Deemed to be University\" under the distinct category by the Ministry of Education having its main campus at Ropar (Punjab) and eleven constituent campuses located in Aizawl, Agartala, Aurangabad, Calicut, Gorakhpur, Imphal, Itanagar, Ajmer (Kekri), Kohima, Patna, and Srinagar, aims to revolutionize higher education in E&ICT domain using digital technologies.</p>",
    "question_index": 108

    "question": "<span class=\"eqt\"><p>Identify the true statement(s).</p><p>Statement I: The Kosi is often called the \"Sorrow of Bihar\" due to its shifting courses and floods.</p><p>Statement II: The Teesta is a right&#8209;bank tributary of the Ganga within India.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2346;&#2361;&#2330;&#2366;&#2344;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2325;&#2379;&#2360;&#2368; &#2344;&#2342;&#2368; &#2325;&#2379; &#2309;&#2325;&#2381;&#2360;&#2352; &#2311;&#2360;&#2325;&#2375; &#2348;&#2342;&#2354;&#2340;&#2375; &#2350;&#2366;&#2352;&#2381;&#2327; &#2324;&#2352; &#2348;&#2366;&#2338;&#2364; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; \"&#2348;&#2367;&#2361;&#2366;&#2352; &#2325;&#2366; &#2342;&#2369;&#2326;\" &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2340;&#2368;&#2360;&#2381;&#2340;&#2366; &#2344;&#2342;&#2368; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2327;&#2306;&#2327;&#2366; &#2325;&#2368; &#2342;&#2366;&#2361;&#2367;&#2344;&#2368; &#2323;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both statements are .</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Both statements are not true.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Only Statement I is true.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; I &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Only Statement II is true.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; II &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Kosi's frequent avulsions and heavy silt load cause devastating floods in Bihar.</p><p>Teesta is a tributary of the Brahmaputra (Jamuna) in Bangladesh; it is not a right&#8209;bank tributary of the Ganga.</p><p><b>Further Insights:</b></p><p>- Kosi fans out into a mega alluvial fan north of the Ganga.</p><p>- Teesta originates near Tso Lhamo (Sikkim) and flows through the Teesta Gorge.</p><p>- Flood management in Kosi basin involves embankments and barrage regulation (e.g., Kosi Barrage at Bhimnagar).</p>",
    "question_index": 109
  },

    "question": "<span class=\"eqt\"><p>Who among the following is NOT a member of the Selection Committee for appointing the Lokpal?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2354;&#2379;&#2325;&#2346;&#2366;&#2354; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2336;&#2367;&#2340; &#2330;&#2351;&#2344; &#2360;&#2350;&#2367;&#2340;&#2367; &#2325;&#2366; &#2360;&#2342;&#2360;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Prime Minister</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Speaker of the Lok Sabha</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;</span>",
      "<span class=\"eqt\">Chief Justice of India or a Judge nominated by him</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2351;&#2366; &#2313;&#2344;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2344;&#2379;&#2344;&#2368;&#2340; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>",
      "<span class=\"eqt\">Comptroller and Auditor General of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2325; &#2319;&#2357;&#2306; &#2350;&#2361;&#2366;&#2354;&#2375;&#2326;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2325;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Lokpal Selection Committee consists of the Prime Minister (Chairperson), Speaker of Lok Sabha, Leader of Opposition in Lok Sabha (or leader of largest opposition party), Chief Justice of India or a Judge nominated by him, and one eminent jurist nominated by the President.</p><p>The CAG has no role in this Selection Committee.</p><p><b>Further Insights:</b></p><p>- The Lokpal and Lokayuktas Act, 2013 created the Lokpal at the Union and Lokayuktas in States.</p><p>- Jurisdiction includes the Prime Minister with specific exceptions (e.g., national security, international relations) and other public servants.</p><p>- Complaints: Preliminary inquiry, investigation, and prosecution timelines are envisaged in the Act.</p><p>- Lokpal bench composition: Chairperson plus up to eight members, of whom 50% must be judicial members; and 50% from SC/ST/OBC/women/minorities collectively.</p>",
    "question_index": 110
  },

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct?</p><p>Statement I: MOM succeeded in placing a probe into Martian orbit on India's first attempt.</p><p>Statement II: It was launched using the GSLV Mk III heavy-lift launcher.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344; 1: &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2361;&#2368; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2350;&#2375;&#2306; &#2350;&#2306;&#2327;&#2354; &#2327;&#2381;&#2352;&#2361; &#2325;&#2368; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2319;&#2325; &#2346;&#2381;&#2352;&#2379;&#2348; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2306;&#2327;&#2354; &#2327;&#2381;&#2352;&#2361; &#2350;&#2367;&#2358;&#2344; &#2360;&#2347;&#2354; &#2352;&#2361;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2311;&#2360;&#2375; GSLV Mk III &#2361;&#2375;&#2357;&#2368;-&#2354;&#2367;&#2347;&#2381;&#2335; &#2354;&#2377;&#2344;&#2381;&#2330;&#2352; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2354;&#2377;&#2344;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2350;&#2376;&#2306; &#2324;&#2352; &#2344; &#2361;&#2368; &#2342;&#2370;&#2360;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>MOM entered Mars orbit on 24 September 2014 on India's first attempt.</p><p>It was launched by PSLV-XL (C25), not GSLV Mk III.</p><p><b>Further Insights:</b></p><p>- Approximate mission cost: ~Rs 450 crore.</p><p>- Scientific payloads included MCC, MSM, TIS, MENCA, and LAP.</p><p>- First Asian mission to reach Mars orbit on maiden attempt.</p>",
    "question_index": 111
  },
