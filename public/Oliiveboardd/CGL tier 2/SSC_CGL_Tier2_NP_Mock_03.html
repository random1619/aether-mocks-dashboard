    "question": "<span class=\"eqt\"><p>The term 'pixels' is an indicator of which feature of the computer?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2348;&#2381;&#2342; '&#2346;&#2367;&#2325;&#2381;&#2360;&#2375;&#2354;' &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2368; &#2325;&#2367;&#2360; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; (&#2347;&#2368;&#2330;&#2352;) &#2325;&#2366; &#2360;&#2370;&#2330;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Display size</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2360;&#2381;&#2346;&#2381;&#2354;&#2375; &#2310;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Screen resolution</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2325;&#2381;&#2352;&#2368;&#2344; &#2352;&#2375;&#2332;&#2364;&#2379;&#2354;&#2381;&#2351;&#2370;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Memory</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2350;&#2379;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Graphics</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2366;&#2347;&#2364;&#2367;&#2325;&#2381;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Resolution is the image quality produced by a printer or displayed on a monitor. With monitors, the <b>screen resolution</b> is measured by the number of pixels horizontal by pixels vertically.</p><p>A pixel, also known as a picture element, is the smallest unit of a digital image or graphic that can be displayed and represented on a digital display device. A pixel is represented by a dot or square on a computer monitor display screen. Pixels are the basic building blocks of a digital image or display and are created using geometric coordinates.</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding CC and BCC fields in email:</p><p>1. Recipients added in the CC field are visible to all recipients.</p><p>2. Recipients added in the BCC field are hidden from other recipients.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2312;&#2350;&#2375;&#2354; &#2350;&#2375;&#2306; CC &#2324;&#2352; BCC &#2347;&#2364;&#2368;&#2354;&#2381;&#2337; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. CC &#2347;&#2364;&#2368;&#2354;&#2381;&#2337; &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2375; &#2327;&#2319; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2325;&#2352;&#2381;&#2340;&#2366; &#2360;&#2349;&#2368; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2342;&#2367;&#2326;&#2366;&#2312; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2. BCC &#2347;&#2364;&#2368;&#2354;&#2381;&#2337; &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2375; &#2327;&#2319; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2325;&#2352;&#2381;&#2340;&#2366; &#2309;&#2344;&#2381;&#2351; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2360;&#2375; &#2331;&#2367;&#2346;&#2375; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The terms CC and BCC are derived from the days of physical typewriters when \"carbon paper\" was used to create duplicates of documents. In digital communication, they serve as tools for managing recipient visibility and privacy.</p><p></p><p>Statement 1: CC (Carbon Copy) is Visible (Correct)</p><p>When you place email addresses in the CC field:</p><p>Transparency: All recipients (those in the \"To\" field and other \"CC\" recipients) can see everyone else's email address.</p><p>Purpose: It is used to keep people \"in the loop\" who are not the primary targets of the email but need to be informed of the conversation.</p><p>Collaboration: Because the addresses are visible, any recipient can use \"Reply All\" to include the entire group in a follow-up discussion.</p><p></p><p>Statement 2: BCC (Blind Carbon Copy) is Hidden (Correct)</p><p>When you place email addresses in the BCC field:</p><p>Privacy: Recipients in the \"To\" or \"CC\" fields cannot see anyone listed in the BCC field.</p><p>Anonymity between BCCs: Even multiple recipients within the BCC field itself cannot see each other; each BCC recipient only sees their own name and the \"To/CC\" recipients.</p><p>Purpose: It is ideal for mass emails (like newsletters) where you want to protect the privacy of the recipients' contact information, or for discreetly informing a third party (like a manager) without alerting the primary recipient.</p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>Dot-Matrix Printers, and Line Printers printers are examples of which type of Printers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2337;&#2377;&#2335;-&#2350;&#2376;&#2335;&#2381;&#2352;&#2367;&#2325;&#2381;&#2360; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352; &#2324;&#2352; &#2354;&#2366;&#2311;&#2344; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352; &#2325;&#2375; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Non-Impact Printers</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2377;&#2344;-&#2311;&#2350;&#2381;&#2346;&#2376;&#2325;&#2381;&#2335; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Impact Printers</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2350;&#2381;&#2346;&#2376;&#2325;&#2381;&#2335; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Solid Ink Printers</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2377;&#2354;&#2367;&#2337; &#2311;&#2306;&#2325; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">LED Printers</span><span class=\"hqt\" style=\"display:none\">LED &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Dot-Matrix Printers, Line Printers, Daisy wheel printer, Drum printer, Chain printer, and Band printer are examples of Impact Printers.</p><p>The impact printers print the characters by striking them on the ribbon which is then pressed on the paper.</p><p>Dot-Matrix Printers- It prints characters as a combination of dots. They have a matrix of pins on the print head of the printer which form the character. They generally have 9-24 pins. Their speed is measured in cps (Character per second).</p><p>Line Printers- A line printer is an impact printer which can print one line of text at a time. It is also known as a bar printer.</p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>Which one of the following is not an input device?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2319;&#2325; &#2311;&#2344;&#2346;&#2369;&#2335; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Scanner</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2325;&#2376;&#2344;&#2352;</span>",
      "<span class=\"eqt\">Magnetic Ink Character Recognition</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2327;&#2381;&#2344;&#2375;&#2335;&#2367;&#2325; &#2311;&#2344;&#2381;&#2325; &#2325;&#2376;&#2352;&#2375;&#2325;&#2381;&#2335;&#2352; &#2352;&#2367;&#2325;&#2377;&#2327;&#2381;&#2344;&#2368;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Optical Mark Recognition</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2346;&#2381;&#2335;&#2367;&#2325;&#2354; &#2350;&#2366;&#2352;&#2381;&#2325; &#2352;&#2367;&#2325;&#2377;&#2327;&#2381;&#2344;&#2368;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Plotters</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2377;&#2335;&#2352;&#2381;&#2360;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A plotter is an output device used to produce hard copies of large graphs and designs on paper, such as construction drawings, architectural plans, and business charts. </p><p>Types of Plotters: Drum plotters, and Flatbed plotters.</p>",
    "question_index": 142

  {

      "<span class=\"eqt\">Information</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2381;&#2347;&#2377;&#2352;&#2381;&#2350;&#2375;&#2358;&#2344;</span>",

  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT an example of a hardware?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>&#183; Hardware includes the Physical features, which are every part that you can either see or touch, for example: monitor, case, keyboard, mouse, and printer. </p><p>&#183; The part which activates the physical components is called software. </p><p>&#183; It includes the features that responsible for directing the work to the hardware.</p>",
