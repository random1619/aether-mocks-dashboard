    "question": "<span class=\"eqt\"><p>Consider the following statements regarding State Emergency (Article 356) and Financial Emergency (Article 360).</p><p>1) Under Article 356, the President may assume functions of the State Government and declare that State legislative powers shall be exercised by Parliament.</p><p>2) A Proclamation under Article 360 must be approved by both Houses within two months.</p><p>3) No Financial Emergency has been proclaimed in India so far.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; (&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 356) &#2324;&#2352; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; (&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 360) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1) &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 356 &#2325;&#2375; &#2340;&#2361;&#2340;, &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; &#2361;&#2366;&#2341; &#2350;&#2375;&#2306; &#2354;&#2375; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2351;&#2361; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2357;&#2367;&#2343;&#2366;&#2351;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2360;&#2306;&#2360;&#2342; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404;</p><p>2) &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 360 &#2325;&#2375; &#2340;&#2361;&#2340; &#2332;&#2366;&#2352;&#2368; &#2325;&#2368; &#2327;&#2312; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2379; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2342;&#2344;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2379; &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2309;&#2344;&#2369;&#2350;&#2379;&#2342;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p>3) &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2309;&#2349;&#2368; &#2340;&#2325; &#2325;&#2379;&#2312; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2328;&#2379;&#2359;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>1) State Emergency / President's Rule (Correct)</p><p>Under <b>Article 356</b>, if the President is satisfied that a situation has arisen in which the government of a state cannot be carried on in accordance with the provisions of the Constitution, he may issue a proclamation.</p><p>&#183; <b>Executive Power:</b> The President can assume to himself all or any of the functions of the State Government and all or any of the powers vested in the Governor.</p><p>&#183; <b>Legislative Power:</b> He can declare that the powers of the State Legislature shall be exercisable by or under the authority of <b>Parliament</b>.</p><p>2) Approval of Financial Emergency (Correct)</p><p>According to <b>Article 360</b>, a proclamation of Financial Emergency must be approved by both the Lok Sabha and the Rajya Sabha.</p><p>&#183; <b>Timeline:</b> The approval must be obtained within <b>two months</b> from the date of its issue.</p><p>&#183; <b>Majority:</b> Unlike a National Emergency (which requires a special majority), a Financial Emergency can be approved by a <b>simple majority</b> (majority of members present and voting).</p><p>3) Historical Application of Article 360 (Correct)</p><p>Despite several economic crises in India's history - most notably the balance of payments crisis in <b>1991</b> - a Financial Emergency has <b>never been proclaimed</b> in India so far.</p><p><b>Further Insights:</b></p><p>- Article 356 is subject to judicial review (S. R. Bommai v. Union of India, 1994).</p><p>- President's Rule can operate for a maximum of three years with periodic parliamentary approvals.</p><p>- During Financial Emergency, directions can include reduction of salaries/allowances of all or any class of persons serving the Union/States, including judges.</p><p>- Under Article 356, Parliament can delegate legislative power for the State to the President.</p><p>- Frequent use of Article 356 in earlier decades led to stricter judicial scrutiny.</p>",
    "question_index": 112
  },
  {
    "question": "<span class=\"eqt\"><p>A copper wire of length L and resistance R is uniformly stretched to double its length without any loss of material. What is its new resistance?</p></span><span class=\"hqt\" style=\"display:none\"><p>L &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; R &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2340;&#2366;&#2306;&#2348;&#2375; &#2325;&#2375; &#2340;&#2366;&#2352; &#2325;&#2379; &#2348;&#2367;&#2344;&#2366; &#2325;&#2367;&#2360;&#2368; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2368; &#2361;&#2366;&#2344;&#2367; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2352;&#2370;&#2346; &#2360;&#2375; &#2326;&#2368;&#2306;&#2330;&#2325;&#2352; &#2313;&#2360;&#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2325;&#2352; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2366; &#2344;&#2351;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">4R</span><span class=\"hqt\" style=\"display:none\">4R</span>",
      "<span class=\"eqt\">2R</span><span class=\"hqt\" style=\"display:none\">2R</span>",
      "<span class=\"eqt\">R/2</span><span class=\"hqt\" style=\"display:none\">R/2</span>",
      "<span class=\"eqt\">R/4</span><span class=\"hqt\" style=\"display:none\">R/4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>When the length doubles at constant volume, cross-sectional area halves.</p><p>New resistance R' = &#961;(L')/A' = &#961;(2L)/(A/2) = 4(&#961;L/A) = 4R.</p><p><b>Further Insights:</b></p><p>- Resistance depends on geometry (R = &#961;L/A); resistivity &#961; depends only on material and temperature.</p><p>- Stretching to double length reduces diameter by 1/&radic;2 for a circular wire.</p><p>- Resistivity of copper is about 1.68 X 10^-8 &#937;&#183;m at 20&deg;C.</p><p>- Metals have positive temperature coefficient of resistance; semiconductors typically have negative.</p>",
    "question_index": 113
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct?</p><p>I. The Second Battle of Tarain (1192) opened the way for Ghurid expansion into north India.</p><p>II. Iltutmish consolidated the Sultanate and received Caliphal investiture.</p><p>III. Arabic was the official language of revenue administration.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2340;&#2352;&#2366;&#2311;&#2344; &#2325;&#2366; &#2342;&#2370;&#2360;&#2352;&#2366; &#2351;&#2369;&#2342;&#2381;&#2343; (1192) &#2344;&#2375; &#2328;&#2369;&#2352;&#2367;&#2342; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2325;&#2366; &#2350;&#2366;&#2352;&#2381;&#2327; &#2346;&#2381;&#2352;&#2358;&#2360;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>II. &#2311;&#2354;&#2381;&#2340;&#2369;&#2340;&#2350;&#2367;&#2358; &#2344;&#2375; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2325;&#2379; &#2360;&#2369;&#2342;&#2371;&#2338;&#2364; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2326;&#2354;&#2368;&#2347;&#2366; &#2325;&#2366; &#2346;&#2342; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>III. &#2309;&#2352;&#2348;&#2368; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2368; &#2310;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2325; &#2349;&#2366;&#2359;&#2366; &#2341;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Only III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">Only I and II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2350;&#2376;&#2306; &#2324;&#2352; &#2350;&#2376;&#2306;</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>I is correct: 1192 Tarain defeat of Prithviraj Chauhan was decisive.</p><p>II is correct: Iltutmish is seen as the real consolidator and had Caliphal recognition.</p><p>III is incorrect: Persian, not Arabic, was the state/revenue language.</p><p><b>Further Insights:</b></p><p>- Five dynasties: Mamluk (Slave), Khilji, Tughluq, Sayyid, Lodi.</p><p>- Alauddin Khalji introduced price/market control and military reforms.</p><p>- Muhammad bin Tughluq attempted token currency and capital shift experiments.</p><p>- Balban emphasized a strong monarchy and Persian courtly etiquette (sijda/paibos).</p><p>- Coins included the silver tanka and copper jital.</p>",
    "question_index": 114
  },
  {
    "question": "<span class=\"eqt\"><p>Which Indian soil shows \"self-ploughing\" due to wide shrink - swell cracks in dry summers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2326;&#2375; &#2327;&#2381;&#2352;&#2368;&#2359;&#2381;&#2350;&#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2330;&#2380;&#2337;&#2364;&#2368; &#2360;&#2367;&#2325;&#2369;&#2337;&#2364;&#2344;-&#2347;&#2376;&#2354;&#2366;&#2357; &#2342;&#2352;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2325;&#2380;&#2344; &#2360;&#2368; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; \"&#2360;&#2381;&#2357;&#2351;&#2306; &#2332;&#2369;&#2340;&#2366;&#2312;\" &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Red loam</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2354; &#2342;&#2379;&#2350;&#2335;</span>",
      "<span class=\"eqt\">Laterite</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2375;&#2335;&#2352;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">Alluvial khadar</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2354;&#2379;&#2338;&#2364; &#2326;&#2366;&#2342;&#2352;</span>",
      "<span class=\"eqt\">Black cotton soil (regur)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2354;&#2368; &#2325;&#2346;&#2366;&#2360; &#2325;&#2368; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; (&#2352;&#2375;&#2327;&#2369;&#2352;)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Black soil has high clay content (montmorillonite), which swells when wet and cracks deeply when dry.</p><p>These cracks aerate the soil naturally, giving the \"self-ploughing\" effect.</p><p><b>Further Insights:</b></p><p>- Black soils are typical over Deccan Trap basalts in Maharashtra, Madhya Pradesh, Gujarat, and parts of Karnataka, Telangana.</p><p>- Crops: cotton, soybean, sorghum, groundnut.</p><p>- Alluvial khadar is the newer floodplain soil; bhangar is older alluvium with kankar.</p><p>- Laterite soils form under intense leaching in high rainfall areas; used as building stone in some regions.</p>",
    "question_index": 115
  },
  {
    "question": "<span class=\"eqt\"><p>Match List-I (Census term) with List-II (Definition). Choose the correct combination.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List-I: </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List-II: </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) Effective Literacy Rate</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Number of females per 1000 males in the population</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) Sex Ratio</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Percentage of workers (main + marginal) in total population</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) Work Participation Rate</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Settlement with &ge;5,000 population, &ge;400 persons/km^2 density, and &ge;75% male main workers in non-agriculture</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4) Census Town</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Literates aged 7+ as percent of population aged 7+</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2330;&#2368;-I (&#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2309;&#2357;&#2343;&#2367;) &#2325;&#2366; &#2360;&#2370;&#2330;&#2368;-II (&#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2366;) &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404; &#2360;&#2361;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368;-I: </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b> ) &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2344;&#2327;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. 7 &#2357;&#2352;&#2381;&#2359; &#2324;&#2352; &#2313;&#2360;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2310;&#2351;&#2369; &#2325;&#2375; &#2360;&#2366;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2366; 7 &#2357;&#2352;&#2381;&#2359; &#2324;&#2352; &#2313;&#2360;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2310;&#2351;&#2369; &#2325;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306;</td></tr></table></span>",

    "solution": "<p>Effective Literacy Rate counts literates 7+ over population 7+ (1-d).</p><p>Sex Ratio is females per 1000 males (2-a).</p><p>Work Participation Rate is share of workers (main + marginal) in total population (3-b).</p><p>A Census Town meets the specified population, density, and workforce criteria (4-c).</p><p><b>Further Insights:</b></p><p>- India's effective literacy rate (2011): 74.04% (Male 82.14%, Female 65.46%).</p><p>- Sex ratio (2011): 943 females per 1000 males.</p><p>- Work Participation Rate (2011): about 39.8%.</p><p>- Number of Census Towns rose sharply to 3,894 in 2011 (from 1,362 in 2001).</p><p>- \"Statutory town\" is declared by state law (e.g., Municipal Corporation, Municipality), distinct from \"Census Town.\"</p>",

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true?</p><p>Statement I: Lord Canning served as the last Governor-General and became the first Viceroy of India.</p><p>Statement II: The Government of India Act, 1858, ended Company rule and vested authority in the Crown, changing the title.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344; I: &#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2376;&#2344;&#2367;&#2306;&#2327; &#2309;&#2306;&#2340;&#2367;&#2350; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352;-&#2332;&#2344;&#2352;&#2354; &#2341;&#2375; &#2324;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2357;&#2366;&#2351;&#2360;&#2352;&#2366;&#2351; &#2348;&#2344;&#2375;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1858 &#2344;&#2375; &#2325;&#2306;&#2346;&#2344;&#2368; &#2358;&#2366;&#2360;&#2344; &#2325;&#2366; &#2309;&#2306;&#2340; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2325;&#2381;&#2352;&#2366;&#2313;&#2344; &#2325;&#2379; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2360;&#2380;&#2306;&#2346;&#2325;&#2352; &#2313;&#2346;&#2366;&#2343;&#2367; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I is true.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2350;&#2376;&#2306; &#2361;&#2368; &#2360;&#2340;&#2381;&#2351; &#2361;&#2370;&#2305;&#2404;</span>",
      "<span class=\"eqt\">Only II is true.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2361;&#2368; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both I and II are true.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2361;&#2354;&#2366; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2366; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Neither I nor II are true.</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2346;&#2361;&#2354;&#2366; &#2324;&#2352; &#2344; &#2361;&#2368; &#2342;&#2370;&#2360;&#2352;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement I: Lord Canning's Transition (True)</p><p>Lord Canning served in a dual capacity during a pivotal moment in Indian history.</p><p>&#183; <b>Last Governor-General:</b> He was appointed as the Governor-General of India in 1856 under the East India Company's rule.</p><p>&#183; <b>First Viceroy:</b> Following the Revolt of 1857, the British Parliament passed the Act of 1858. Under this new structure, Canning was appointed as the first Viceroy, acting as the direct representative of the British Crown in India.</p><p>Statement II: The Government of India Act, 1858 (True)</p><p>This Act, also known as the <b>Act for the Good Government of India</b>, brought about significant structural changes:</p><p>&#183; <b>End of Company Rule:</b> It abolished the East India Company and transferred the powers of government, territories, and revenues to the British Crown.</p><p>&#183; <b>New Office:</b> It created a new office, the <b>Secretary of State for India</b>, who was a member of the British Cabinet and was assisted by a 15-member Council of India.</p><p>&#183; <b>Title Change:</b> To signify the direct link to the monarch, the designation of the Governor-General of India was changed to that of the <b>Viceroy</b>.</p><p><b>Further Insights:</b></p><p>- The Queen's Proclamation (1858) assured non-interference in religious matters and equal protection.</p><p>- Under Canning, the Indian Penal Code (drafted earlier by Macaulay) was finally enacted in 1860.</p><p>- The Indian Councils Act, 1861, introduced the portfolio system.</p><p>- Lord Canning also initiated the policy of post-1857 conciliation in some respects.</p><p>- The office of Secretary of State for India was created in Britain under the 1858 Act.</p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about PM SVANidhi.</p><p>Statement I: PM SVANidhi incentivizes digital transactions by offering cash-back to beneficiary street vendors.</p><p>Statement II: The cash-back is linked to the frequency/value of digital payments to promote formalization.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2368;&#2319;&#2350; &#2360;&#2381;&#2357;&#2344;&#2367;&#2343;&#2367; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2346;&#2368;&#2319;&#2350; &#2360;&#2381;&#2357;&#2344;&#2367;&#2343;&#2367; &#2354;&#2366;&#2349;&#2366;&#2352;&#2381;&#2341;&#2368; &#2360;&#2381;&#2335;&#2381;&#2352;&#2368;&#2335; &#2357;&#2375;&#2306;&#2337;&#2352;&#2379;&#2306; &#2325;&#2379; &#2325;&#2376;&#2358;&#2348;&#2376;&#2325; &#2342;&#2375;&#2325;&#2352; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2325;&#2379; &#2346;&#2381;&#2352;&#2379;&#2340;&#2381;&#2360;&#2366;&#2361;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2324;&#2346;&#2330;&#2366;&#2352;&#2367;&#2325;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2376;&#2358;&#2348;&#2376;&#2325; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344;&#2379;&#2306; &#2325;&#2368; &#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;/&#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both statements I and II are correct.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Both statements are incorrect.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Only Statement I is correct.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 1 &#2360;&#2361;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Only Statement II is correct.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; II &#2360;&#2361;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The scheme includes monthly cash-back incentives for digital transactions by vendors.</p><p>Those incentives exist precisely to encourage digital payments and formal financial behavior, explaining Statement I.</p><p><b>Further Insights:</b></p><p>- Launched in June 2020; initial working capital loan up to Rs 10,000, with enhanced limits (Rs 20,000, then Rs 50,000) on good repayment.</p><p>- Interest subsidy of 7% per annum; no collateral required.</p><p>- Vendors can obtain a Certificate of Vending/Provisional Certificate from ULBs for eligibility.</p>",

    "question": "<span class=\"eqt\"><p>In a landmark for Indian women's cricket during the first Women's T20I against Sri Lanka at Visakhapatnam, who became the first Indian to breach the 4,000-run mark in Women's T20 Internationals?</p></span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2366;&#2326;&#2366;&#2346;&#2340;&#2381;&#2340;&#2344;&#2350; &#2350;&#2375;&#2306; &#2358;&#2381;&#2352;&#2368;&#2354;&#2306;&#2325;&#2366; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2326;&#2375;&#2354;&#2375; &#2327;&#2319; &#2346;&#2361;&#2354;&#2375; &#2350;&#2361;&#2367;&#2354;&#2366; &#2335;&#2368;20 &#2309;&#2306;&#2340;&#2352;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2350;&#2376;&#2330; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2361;&#2367;&#2354;&#2366; &#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2325;&#2375; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360; &#2350;&#2375;&#2306; &#2319;&#2325; &#2320;&#2340;&#2367;&#2361;&#2366;&#2360;&#2367;&#2325; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2367; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2350;&#2361;&#2367;&#2354;&#2366; &#2335;&#2368;20 &#2309;&#2306;&#2340;&#2352;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2350;&#2376;&#2330;&#2379;&#2306; &#2350;&#2375;&#2306; 4,000 &#2352;&#2344; &#2325;&#2366; &#2310;&#2306;&#2325;&#2337;&#2364;&#2366; &#2346;&#2366;&#2352; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2361;&#2354;&#2368; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2368; &#2325;&#2380;&#2344; &#2348;&#2344;&#2368;&#2306;?</span>",
    "options": [
      "<span class=\"eqt\">Smriti Mandhana</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2350;&#2371;&#2340;&#2367; &#2350;&#2306;&#2343;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Mithali Raj</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2340;&#2366;&#2354;&#2368; &#2352;&#2366;&#2332;</span>",
      "<span class=\"eqt\">Shafali Verma</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2375;&#2347;&#2366;&#2354;&#2368; &#2357;&#2352;&#2381;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Jemimah Rodrigues</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2375;&#2350;&#2367;&#2350;&#2366; &#2352;&#2379;&#2337;&#2381;&#2352;&#2367;&#2327;&#2381;&#2360;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Star batter <b>Smriti Mandhana</b> shattered a huge India record during the 1st Women's T20I against Sri Lanka in Visakhapatnam. The 29-year-old became the first Indian to breach the 4,000-run mark in women's T20Is. Overall, she is the second after New Zealand's Suzie Bates, who has scored 4,716 runs in 177 matches.</p><p>In the first T20I against Sri Lanka, Mandhana scored a run-a-ball 25 before holing out in the ninth over of India's 122-run chase. However, Mandhana is quickest to do so in terms of balls taken (3227) than Bates, who took 3675 balls to reach the 4000 runs milestone.</p>",
    "question_index": 119
  },
  {
    "question": "<span class=\"eqt\"><p>In flowering plants, which event directly leads to formation of the endosperm?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2359;&#2381;&#2346;&#2368;&#2351; &#2346;&#2380;&#2343;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2325;&#2380;&#2344; &#2360;&#2368; &#2328;&#2335;&#2344;&#2366; &#2360;&#2368;&#2343;&#2375; &#2309;&#2306;&#2340;&#2307;&#2358;&#2369;&#2325;&#2381;&#2352;&#2366;&#2339;&#2369; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2368; &#2323;&#2352; &#2354;&#2375; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Fusion of one male gamete with the egg cell</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2344;&#2352; &#2351;&#2369;&#2327;&#2381;&#2350;&#2325; &#2325;&#2366; &#2309;&#2306;&#2337;&#2366;&#2339;&#2369; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2306;&#2354;&#2351;&#2344;</span>",
      "<span class=\"eqt\">Fusion of a male gamete with two polar nuclei</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2343;&#2381;&#2352;&#2369;&#2357;&#2368;&#2351; &#2344;&#2366;&#2349;&#2367;&#2325;&#2379;&#2306; &#2357;&#2366;&#2354;&#2375; &#2344;&#2352; &#2351;&#2369;&#2327;&#2381;&#2350;&#2325; &#2325;&#2366; &#2360;&#2306;&#2354;&#2351;&#2344;</span>",
      "<span class=\"eqt\">Fusion of two synergids</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2360;&#2367;&#2344;&#2352;&#2381;&#2332;&#2367;&#2337; &#2325;&#2366; &#2360;&#2306;&#2354;&#2351;&#2344;</span>",
      "<span class=\"eqt\">Fusion of antipodal cells</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2343;&#2381;&#2352;&#2369;&#2357;&#2379;&#2306; &#2325;&#2368; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2366; &#2360;&#2306;&#2354;&#2351;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Double fertilization is characteristic of angiosperms: one male gamete fuses with the egg (zygote) and the other fuses with two polar nuclei to form the primary endosperm nucleus (usually triploid).</p><p>Thus option b is correct.</p><p><b>Further Insights:</b></p><p>- Endosperm typically is triploid (3n) in angiosperms; it nourishes the developing embryo.</p><p>- Double fertilization is unique to angiosperms; gymnosperms lack this process.</p><p>- Ovule becomes seed; ovary becomes fruit after fertilization.</p><p>- Self-incompatibility prevents self-pollination in many species, promoting outcrossing.</p>",
    "question_index": 120
  },
  {
    "question": "<span class=\"eqt\"><p>Ketones on reduction give</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2368;&#2335;&#2379;&#2344;&#2381;&#2360; &#2325;&#2375; &#2309;&#2346;&#2330;&#2351;&#2344; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Primary alcohols</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2309;&#2354;&#2381;&#2325;&#2379;&#2361;&#2354;</span>",
      "<span class=\"eqt\">Secondary alcohols</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2309;&#2354;&#2381;&#2325;&#2379;&#2361;&#2354;</span>",
      "<span class=\"eqt\">Tertiary alcohols</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2371;&#2340;&#2368;&#2351;&#2325; &#2309;&#2354;&#2381;&#2325;&#2379;&#2361;&#2354;</span>",
      "<span class=\"eqt\">Ethers</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2341;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The reduction of a carbonyl group (&gt;C=O) involves the addition of hydrogen across the double bond. When a <b>Ketone</b> undergoes reduction, the oxygen atom becomes a hydroxyl group (-OH) and a hydrogen atom attaches to the carbonyl carbon.</p><p>In a ketone, the carbonyl carbon is already bonded to <b>two other carbon atoms</b> (alkyl or aryl groups). After reduction, that same carbon is now bonded to those two carbon atoms plus one hydroxyl group. By definition, a carbon atom bonded to two other carbons and one -OH group forms a <b>secondary (</b><b>2&deg;</b><b>) alcohol</b>.</p>",
    "question_index": 121
  },

    "question": "<span class=\"eqt\"><p>Identify the correct statements.</p><p>1) All enzymes are proteins; no RNA can act as an enzyme.</p><p>2) The primary structure of a protein is its linear amino acid sequence.</p><p>3) Insulin is a peptide hormone.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>1) &#2360;&#2349;&#2368; &#2319;&#2306;&#2332;&#2366;&#2311;&#2350; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;; &#2325;&#2379;&#2312; &#2349;&#2368; &#2310;&#2352;&#2319;&#2344;&#2319; &#2319;&#2306;&#2332;&#2366;&#2311;&#2350; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366;&#2404;</p><p>2) &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2313;&#2360;&#2325;&#2368; &#2352;&#2375;&#2326;&#2368;&#2351; &#2309;&#2350;&#2368;&#2344;&#2379; &#2309;&#2350;&#2381;&#2354; &#2309;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3) &#2311;&#2306;&#2360;&#2369;&#2354;&#2367;&#2344; &#2319;&#2325; &#2346;&#2375;&#2346;&#2381;&#2335;&#2366;&#2311;&#2337; &#2361;&#2366;&#2352;&#2381;&#2350;&#2379;&#2344; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only 1 and 2 are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2 &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only 2 and 3 are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3 &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only 1 and 3 are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3 &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">1, 2 and 3 are correct</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3 &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement 1 is incorrect because some RNAs are catalytic (ribozymes).</p><p>Statements 2 and 3 are correct: primary structure is the amino acid sequence; insulin is a peptide.</p><p><b>Further Insights:</b></p><p>- Secondary structure includes &#945;-helix and &#946;-sheet stabilized by hydrogen bonds.</p><p>- Tertiary structure is stabilized by interactions including disulfide bonds (e.g., cystine).</p><p>- Many hormones are peptides (e.g., insulin, glucagon), but steroid hormones (e.g., cortisol) are lipids.</p><p>- Enzymes lower activation energy but do not alter equilibrium.</p>",

    "question": "<span class=\"eqt\"><p>Which is the best example of a progressive direct tax measure?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2327;&#2340;&#2367;&#2358;&#2368;&#2354; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2313;&#2346;&#2366;&#2351; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">A uniform GST rate of 12% on a product</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2346;&#2352; 12% &#2325;&#2368; &#2319;&#2325;&#2360;&#2350;&#2366;&#2344; &#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2342;&#2352;&#2404;</span>",
      "<span class=\"eqt\">A fixed professional tax of Rs 200 per month on all salaried employees</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2357;&#2375;&#2340;&#2344;&#2349;&#2379;&#2327;&#2368; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2366;&#2361; 200 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2357;&#2381;&#2351;&#2366;&#2357;&#2360;&#2366;&#2351;&#2367;&#2325; &#2325;&#2352; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2327;&#2366;&#2404;</span>",
      "<span class=\"eqt\">A surcharge only on very high-income taxpayers</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2309;&#2343;&#2367;&#2349;&#2366;&#2352; &#2325;&#2375;&#2357;&#2354; &#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2310;&#2351; &#2357;&#2366;&#2354;&#2375; &#2325;&#2352;&#2342;&#2366;&#2340;&#2366;&#2323;&#2306; &#2346;&#2352; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2327;&#2366;&#2404;</span>",
      "<span class=\"eqt\">A flat stamp duty of 7% on property values</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2350;&#2370;&#2354;&#2381;&#2351;&#2379;&#2306; &#2346;&#2352; 7% &#2325;&#2368; &#2319;&#2325; &#2360;&#2350;&#2366;&#2344; &#2360;&#2381;&#2335;&#2366;&#2306;&#2346; &#2337;&#2381;&#2351;&#2370;&#2335;&#2368;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A surcharge on only high-income slabs increases average tax rate with income, i.e., progressive.</p><p>GST and flat charges are not progressive; they are proportional or regressive in effect.</p><p><b>Further Insights:</b></p><p>- Direct taxes (income tax, corporate tax) are generally progressive; indirect taxes often regressive.</p><p>- Health and Education Cess is levied on the income tax plus surcharge amount.</p><p>- TDS is a mechanism to collect tax at source for specified payments under the Income-tax Act, 1961.</p><p>- Corporate tax regimes include special rates for certain domestic manufacturing units (subject to conditions).</p>",
    "question_index": 123
  },

    "solution": "<p>The novel's protagonists are Raju and Rosie; the 1965 film \"Guide\" starred Dev Anand and Waheeda Rehman.</p><p>Narayan won the Sahitya Akademi Award (1960) for The Guide; this does not explain the film adaptation.</p><p><b>Further Insights:</b></p><p>- The Guide is set in the fictional town of Malgudi, central to Narayan's oeuvre.</p><p>- Other notable Narayan works: Swami and Friends (1935), The English Teacher (1945), The Man-Eater of Malgudi (1961).</p><p>- Sahitya Akademi (founded 1954) confers awards annually in 24 Indian languages.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about the Indian summer monsoon:</p><p>1) Withdrawal usually begins from northwest India in late September.</p><p>2) A strong cross-equatorial low-level jet off Somalia helps feed moist westerlies into the Arabian Sea branch.</p><p>3) In June, the Bay of Bengal branch winds generally blow from northeast to southwest across the Bay.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2327;&#2381;&#2352;&#2368;&#2359;&#2381;&#2350;&#2325;&#2366;&#2354;&#2368;&#2344; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2368; &#2357;&#2366;&#2346;&#2360;&#2368; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2360;&#2367;&#2340;&#2306;&#2348;&#2352; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2349;&#2366;&#2352;&#2340; &#2360;&#2375; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2360;&#2379;&#2350;&#2366;&#2354;&#2367;&#2351;&#2366; &#2325;&#2375; &#2340;&#2335; &#2346;&#2352; &#2330;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2350;&#2332;&#2348;&#2370;&#2340; &#2349;&#2370;&#2350;&#2343;&#2381;&#2351;&#2352;&#2375;&#2326;&#2368;&#2351; &#2344;&#2367;&#2350;&#2381;&#2344;-&#2360;&#2381;&#2340;&#2352;&#2368;&#2351; &#2332;&#2375;&#2335; &#2361;&#2357;&#2366; &#2309;&#2352;&#2348; &#2360;&#2366;&#2327;&#2352; &#2358;&#2366;&#2326;&#2366; &#2350;&#2375;&#2306; &#2344;&#2350; &#2346;&#2331;&#2369;&#2310; &#2361;&#2357;&#2366;&#2323;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2366;&#2351;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3) &#2332;&#2370;&#2344; &#2350;&#2375;&#2306;, &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2368; &#2326;&#2366;&#2337;&#2364;&#2368; &#2358;&#2366;&#2326;&#2366; &#2325;&#2368; &#2361;&#2357;&#2366;&#2319;&#2305; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2370;&#2352;&#2381;&#2357; &#2360;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2326;&#2366;&#2337;&#2364;&#2368; &#2325;&#2375; &#2346;&#2366;&#2352; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statements 1 and 2 are correct. Withdrawal typically commences from northwest India in the last week of September. The Somali Jet transports moisture northward into the Arabian Sea, strengthening the Arabian Sea branch.</p><p>Statement 3 is incorrect. In June, monsoon winds over the Bay blow predominantly from the southwest toward the northeast (southwesterlies), not from northeast to southwest.</p><p><b>Further Insights:</b></p><p>- Normal monsoon onset over Kerala is around 1 June; withdrawal from southern peninsular India is typically completed by mid-October.</p><p>- The monsoon trough's latitudinal position modulates rain belts over the Indo-Gangetic Plain.</p><p>- Low-pressure systems from the North Bay of Bengal often travel west - northwest, bringing widespread rain to central India.</p><p>- Cross-equatorial flow is a key monsoon driver, with distinct branches in the Arabian Sea and Bay of Bengal.</p>",
    "question_index": 125
  },

    "question": "<span class=\"eqt\"><p>On direct taxes in India, consider the statements:</p><p>1) Corporate income tax is a direct tax.</p><p>2) Goods and Services Tax (GST) is a direct tax.</p><p>3) Tax Deducted at Source (TDS) is a method of collection of income tax, not a separate tax.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2325;&#2377;&#2352;&#2381;&#2346;&#2379;&#2352;&#2375;&#2335; &#2310;&#2351;&#2325;&#2352; &#2319;&#2325; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2361;&#2376;&#2404;</p><p>2) &#2357;&#2360;&#2381;&#2340;&#2369; &#2319;&#2357;&#2306; &#2360;&#2375;&#2357;&#2366; &#2325;&#2352; (&#2332;&#2368;&#2319;&#2360;&#2335;&#2368;) &#2319;&#2325; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2361;&#2376;&#2404;</p><p>3) &#2360;&#2381;&#2352;&#2379;&#2340; &#2346;&#2352; &#2325;&#2352; &#2325;&#2335;&#2380;&#2340;&#2368; (&#2335;&#2368;&#2337;&#2368;&#2319;&#2360;) &#2310;&#2351;&#2325;&#2352; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361; &#2325;&#2368; &#2319;&#2325; &#2357;&#2367;&#2343;&#2367; &#2361;&#2376;, &#2344; &#2325;&#2367; &#2319;&#2325; &#2309;&#2354;&#2327; &#2325;&#2352;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Statement 1: Corporate Income Tax (Correct)</b></p><p>A <b>Direct Tax</b> is one where the incidence (the burden) and the impact (the responsibility to pay) fall on the same person or entity. It cannot be shifted to someone else.</p><p>&#183; <b>Corporate Tax</b> is levied on the net income or profit that companies make from their business.</p><p>&#183; Since the company pays this tax directly from its profits to the government, it is a primary example of a direct tax.</p><p>Statement 2: Goods and Services Tax (Incorrect)</p><p><b>GST</b> is the quintessential example of an <b>Indirect Tax</b>.</p><p>&#183; While the shopkeeper or service provider pays the tax to the government, the actual burden of the tax is shifted to the final consumer.</p><p>&#183; Whenever you buy a product and see \"Inclusive of all taxes\" or a GST breakdown on your bill, you are paying an indirect tax.</p><p>Statement 3: Tax Deducted at Source (Correct)</p><p><b>TDS</b> is frequently misunderstood as a separate tax, but it is actually a <b>mechanism for tax collection</b>.</p><p>&#183; Instead of waiting for a person to pay their income tax at the end of the year, the government mandates that the person making a payment (like an employer paying salary or a bank paying interest) deducts a portion of the tax \"at the source\" itself.</p><p>&#183; This amount is then credited against the individual's total income tax liability for the year.</p><p><b>Further Insights:</b></p><p>- Personal income tax and corporate tax are administered by CBDT.</p><p>- Customs duties are indirect taxes on imports/exports, administered by CBIC.</p><p>- Surcharge and cess may apply over and above income tax.</p><p>- MAT and AMT are special direct tax provisions for companies and non-corporates respectively.</p>",
    "question_index": 126
  },

    "question": "<span class=\"eqt\"><p>Read the two statements and choose the correct option:</p><p>I. Advisory opinions of the Supreme Court under Article 143 are binding on the President.</p><p>II. Under Article 142, the Supreme Court may pass such decree or order as is necessary for doing complete justice in any cause or matter before it.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:</p><p>I. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 143 &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2360;&#2354;&#2366;&#2361;&#2325;&#2366;&#2352;&#2368; &#2352;&#2366;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2346;&#2352; &#2348;&#2366;&#2343;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 142 &#2325;&#2375; &#2340;&#2361;&#2340;, &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2350;&#2366;&#2350;&#2354;&#2375; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2381;&#2339; &#2344;&#2381;&#2351;&#2366;&#2351; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2351;&#2366; &#2310;&#2342;&#2375;&#2358; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I is true.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2350;&#2376;&#2306; &#2361;&#2368; &#2360;&#2340;&#2381;&#2351; &#2361;&#2370;&#2305;&#2404;</span>",
      "<span class=\"eqt\">Only II is true.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2361;&#2368; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both I and II are true.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2361;&#2354;&#2366; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2366; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Neither I nor II are true.</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2346;&#2361;&#2354;&#2366; &#2324;&#2352; &#2344; &#2361;&#2368; &#2342;&#2370;&#2360;&#2352;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement I: Advisory Jurisdiction (False)</p><p>Under <b>Article 143</b>, the President of India can seek the opinion of the Supreme Court on questions of law or fact that are of public importance. However:</p><p>&#183; <b>Not a Judgment:</b> The opinion delivered by the Supreme Court is strictly <b>advisory</b> in nature.</p><p>&#183; <b>Non-Binding:</b> The President is <b>not bound</b> to act according to the opinion. Similarly, the Supreme Court (in the first category of references) is not duty-bound to give an opinion if it chooses not to.</p><p>Statement II: Extraordinary Powers for Complete Justice (True)</p><p><b>Article 142</b> provides the Supreme Court with a unique and wide-ranging power to ensure equity.</p><p>&#183; <b>Complete Justice:</b> It allows the Court to pass any order or decree necessary for doing \"complete justice\" in any cause or matter pending before it.</p><p>&#183; <b>Overriding Power:</b> This power is often used when existing laws are silent or inadequate to provide a fair solution to a specific problem. Famous examples include the <b>Ayodhya Dispute</b> verdict and the <b>Bhopal Gas Tragedy</b> compensation.</p><p><b>Further Insights:</b></p><p>- Article 143 enables the President to refer questions of law or fact of public importance to the Supreme Court.</p><p>- Famous references include the Berubari Union case (1960) and the Ayodhya reference (withdrawn later).</p><p>- Article 32 gives the SC original jurisdiction for enforcement of Fundamental Rights.</p><p>- Article 136 confers special leave to appeal, a wide appellate discretion.</p><p>- The SC is also a court of record (Article 129).</p>",
    "question_index": 127
  },
  {
    "question": "<span class=\"eqt\"><p>The Department of Science and Technology (DST) has launched a pioneering initiative to establish five Carbon Capture and Utilisation (CCU) testbeds in the cement sector to support India's net-zero goals by 2070. Which of the following statements is/are correct?</p><p>I. Testbed-1 captures 2 tonnes of CO<sub>2</sub> daily for lightweight concrete blocks.</p><p>II. Testbed-3 involves IIT Kanpur and Dalmia Cement for catalyst-driven capture.</p><p>III. Testbed-5 includes IIT Madras and Ultratech Cement for carbon-lowering innovations.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2319;&#2357;&#2306; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2357;&#2367;&#2349;&#2366;&#2327; (&#2337;&#2368;&#2319;&#2360;&#2335;&#2368;) &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; 2070 &#2340;&#2325; &#2325;&#2375; &#2344;&#2375;&#2335;-&#2332;&#2364;&#2368;&#2352;&#2379; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2368;&#2350;&#2375;&#2306;&#2335; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2346;&#2366;&#2306;&#2330; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2325;&#2376;&#2346;&#2381;&#2330;&#2352; &#2319;&#2306;&#2337; &#2351;&#2370;&#2335;&#2367;&#2354;&#2366;&#2311;&#2332;&#2364;&#2375;&#2358;&#2344; (&#2360;&#2368;&#2360;&#2368;&#2351;&#2370;) &#2335;&#2375;&#2360;&#2381;&#2335;&#2348;&#2375;&#2337; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2319;&#2325; &#2309;&#2327;&#2381;&#2352;&#2339;&#2368; &#2346;&#2361;&#2354; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2335;&#2375;&#2360;&#2381;&#2335;&#2348;&#2375;&#2337;-1 &#2361;&#2354;&#2381;&#2325;&#2375; &#2325;&#2306;&#2325;&#2381;&#2352;&#2368;&#2335; &#2348;&#2381;&#2354;&#2377;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2340;&#2367;&#2342;&#2367;&#2344; 2 &#2335;&#2344; CO&#8322; &#2325;&#2376;&#2346;&#2381;&#2330;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2335;&#2375;&#2360;&#2381;&#2335;&#2348;&#2375;&#2337;-3 &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2346;&#2381;&#2352;&#2375;&#2352;&#2325;-&#2330;&#2366;&#2354;&#2367;&#2340; &#2325;&#2376;&#2346;&#2381;&#2330;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; IIT &#2325;&#2366;&#2344;&#2346;&#2369;&#2352; &#2324;&#2352; &#2337;&#2366;&#2354;&#2350;&#2367;&#2351;&#2366; &#2360;&#2368;&#2350;&#2375;&#2306;&#2335; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</p><p>III. &#2335;&#2375;&#2360;&#2381;&#2335;&#2348;&#2375;&#2337;-5 &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2344; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2344;&#2357;&#2366;&#2330;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; IIT &#2350;&#2342;&#2381;&#2352;&#2366;&#2360; &#2324;&#2352; &#2309;&#2354;&#2381;&#2335;&#2381;&#2352;&#2366;&#2335;&#2375;&#2325; &#2360;&#2368;&#2350;&#2375;&#2306;&#2335; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I,II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2324;&#2352; &#2340;&#2371;&#2340;&#2368;&#2351;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Department of Science and Technology (DST) recently unveiled a pioneering national initiative: five Carbon Capture and Utilisation (CCU) testbeds in the cement sector, forming a first-of-its-kind research and innovation cluster to combat industrial carbon emissions.</p><p>This is a significant step towards India's Climate Action for fostering National Determined Contributions (NDCs) targets and to achieve net zero decarbonisation pathways for Industry Transition., towards the Government's goal to achieve a carbon-neutral economy by 2070.</p><p>As a unique initiative and one of its first kind in India, DST has approved setting up of five CCU testbeds for translational R&D, to be set up in Academia-Industry collaboration under this significant initiative of DST in PPP mode, engaging with premier research laboratories as knowledge partners and top Cement companies as the industry partner.</p><p>Testbed-1: Ballabhgarh, Haryana: At the National Council for Cement and Building Materials, a pilot plant aims to capture 2 tonnes per day of CO<sub>2</sub> using oxygen-enhanced calcination and transform it into lightweight concrete blocks and olefins.'Partner: JK Cement Ltd.</p><p>Testbed-2: IIT Kanpur JSW Cement: This testbed will showcase carbon-negative mineralization, a method that locks CO<sub>2</sub> into solid minerals - literally turning pollution into rock.</p><p>Testbed-3: IIT Bombay + Dalmia Cement: Developing a catalyst-driven CO<sub>2</sub> capture process, this project will be installed at an actual cement plant - a bold move toward scaling indigenous clean tech.</p><p>Testbed-4: CSIR-IIP, IIT Tirupati, IISc JSW Cement: Using a Vacuum Swing Adsorption process, this testbed will separate CO<sub>2</sub> from cement kiln gases and integrate it back into construction materials - closing the loop.</p><p>Testbed-5: IIT Madras & BITS Pilani, Goa Ultratech Cement: Focused on innovative carbon-lowering interventions, this initiative pushes the envelope in blending research with real-world impact.</p>",
    "question_index": 128
  },
  {
    "question": "<span class=\"eqt\"><p>In the chain grass &rarr; grasshopper &rarr; frog &rarr; snake &rarr; eagle, the removal of which organism will most likely cause the grasshopper population to rise sharply?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2328;&#2366;&#2360;, &#2335;&#2367;&#2337;&#2381;&#2337;&#2366;, &#2350;&#2375;&#2306;&#2338;&#2325;, &#2360;&#2366;&#2306;&#2346; &#2324;&#2352; &#2330;&#2368;&#2354; &#2325;&#2368; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306;, &#2325;&#2367;&#2360; &#2332;&#2368;&#2357; &#2325;&#2379; &#2361;&#2335;&#2366;&#2344;&#2375; &#2360;&#2375; &#2335;&#2367;&#2337;&#2381;&#2337;&#2379;&#2306; &#2325;&#2368; &#2310;&#2348;&#2366;&#2342;&#2368; &#2350;&#2375;&#2306; &#2340;&#2375;&#2332;&#2368; &#2360;&#2375; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Frog</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2306;&#2338;&#2325;</span>",
      "<span class=\"eqt\">Snake</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2305;&#2346;</span>",
      "<span class=\"eqt\">Eagle</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2352;&#2369;&#2337;&#2364;</span>",
      "<span class=\"eqt\">Grass</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2366;&#2360;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In this food chain, each organism occupies a specific <b>trophic level</b>. To determine which removal causes the grasshopper population to rise, we must look at its <b>direct predator</b>.</p><p>The chain Grass &rarr; Grasshopper &rarr; Frog &rarr; Snake &rarr; Eagle</p><p><b>Direct Interaction:</b> The <b>frog</b> is the primary predator of the grasshopper.</p><p><b>The Consequence:</b> If the frogs are removed, the natural check on the grasshopper population is gone. With fewer predators hunting them, and assuming the food source (grass) remains available, the grasshopper population will increase rapidly due to a lack of predation.</p><p><b>Further Insights:</b></p><p>- This scenario is a simple example of a <b>top-down control</b> or a <b>trophic cascade</b>, where the suppression of a population at one level (the frog) leads to the release of the population at the level below it (the grasshopper).</p><p>- Keystone predators can regulate herbivore numbers; their loss often destabilizes food webs.</p><p>- Real ecosystems are webs, not chains; indirect effects and omnivory can buffer or amplify cascades.</p>",
    "question_index": 129
  },
  {
    "question": "<span class=\"eqt\"><p>Which keyboard shortcut opens Task Manager directly in Windows?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2350;&#2375;&#2306; &#2335;&#2366;&#2360;&#2381;&#2325; &#2350;&#2376;&#2344;&#2375;&#2332;&#2352; &#2325;&#2379; &#2360;&#2368;&#2343;&#2375; &#2326;&#2379;&#2354;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337; &#2358;&#2377;&#2352;&#2381;&#2335;&#2325;&#2335; &#2311;&#2360;&#2381;&#2340;&#2375;&#2350;&#2366;&#2354; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ctrl + Alt + Delete</span><span class=\"hqt\" style=\"display:none\">Ctrl + Alt + Delete</span>",
      "<span class=\"eqt\">Alt + Tab</span><span class=\"hqt\" style=\"display:none\">Alt + Tab</span>",
      "<span class=\"eqt\">Ctrl + Shift + Esc</span><span class=\"hqt\" style=\"display:none\">Ctrl + Shift + Esc</span>",
      "<span class=\"eqt\">Windows + R</span><span class=\"hqt\" style=\"display:none\">Windows + R</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Ctrl + Shift + Esc opens Task Manager immediately.</p><p>Ctrl + Alt + Delete only shows a security screen from which Task Manager must be selected.</p><p>Alt + Tab - Allows you to quickly toggle between your currently open windows and applications.</p><p>Windows + R - Opens the Run dialog box.</p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>Which MS Word feature allows viewing two documents side by side simultaneously for comparison?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2357;&#2352;&#2381;&#2337; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2347;&#2368;&#2330;&#2352; &#2342;&#2379; &#2342;&#2360;&#2381;&#2340;&#2366;&#2357;&#2375;&#2332;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2340;&#2369;&#2354;&#2344;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2375;&#2326;&#2344;&#2375; &#2325;&#2368; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Split</span><span class=\"hqt\" style=\"display:none\">Split</span>",
      "<span class=\"eqt\">View Side by Side</span><span class=\"hqt\" style=\"display:none\">View Side by Side</span>",
      "<span class=\"eqt\">Arrange All</span><span class=\"hqt\" style=\"display:none\">Arrange All</span>",
      "<span class=\"eqt\">Compare</span><span class=\"hqt\" style=\"display:none\">Compare</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The View Side by Side feature (under the View tab) enables users to open and scroll through two documents simultaneously.</p><p>\tSplit divides the same document into two panes.</p><p>\tCompare highlights differences but does not show live side-by-side scrolling.</p><p></p><p>Other options:</p><p>Split: This feature allows you to view two different parts of the same document in a single window. It does not help with comparing two separate files.</p><p>Arrange All: This stacks all currently open Word documents on your screen. While it allows you to see multiple documents, it doesn't align them specifically for side-by-side comparison like the \"View Side by Side\" tool does.</p><p>Compare: This is a powerful utility under the Review tab. It doesn't just show them side by side; it actually creates a third document that highlights the legal/textual differences (redlines) between an original and a revised version.</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about the IFERROR() function in MS Excel:</p><p>1. IFERROR() returns a specified value if a formula results in an error.</p><p>2. IFERROR() permanently replaces the original formula with the error-handling value.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2350;&#2375;&#2306; IFERROR() &#2347;&#2364;&#2306;&#2325;&#2381;&#2358;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2347;&#2364;&#2377;&#2352;&#2381;&#2350;&#2370;&#2354;&#2375; &#2350;&#2375;&#2306; &#2340;&#2381;&#2352;&#2369;&#2335;&#2367; &#2310;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; IFERROR() &#2319;&#2325; &#2344;&#2367;&#2352;&#2381;&#2342;&#2367;&#2359;&#2381;&#2335; &#2350;&#2366;&#2344; &#2354;&#2380;&#2335;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. IFERROR() &#2350;&#2370;&#2354; &#2347;&#2364;&#2377;&#2352;&#2381;&#2350;&#2370;&#2354;&#2375; &#2325;&#2379; &#2340;&#2381;&#2352;&#2369;&#2335;&#2367;-&#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2350;&#2366;&#2344; &#2360;&#2375; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1: IFERROR() returns a specified value if a formula results in an error (Correct)</p><p>IFERROR(formula, value_if_error) handles errors such as #DIV/0!, #N/A, etc.</p><p>Statement 2: IFERROR() permanently replaces the original formula(Incorrect)</p><p>The formula remains intact; IFERROR only controls the output when an error occurs.</p><p></p>",
    "question_index": 132
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following storage devices is most suitable for long-term archival data backup?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2339; &#2313;&#2346;&#2325;&#2352;&#2339; &#2342;&#2368;&#2352;&#2381;&#2328;&#2325;&#2366;&#2354;&#2367;&#2325; &#2309;&#2349;&#2367;&#2354;&#2375;&#2326;&#2368;&#2351; &#2337;&#2375;&#2335;&#2366; &#2348;&#2376;&#2325;&#2309;&#2346; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2348;&#2360;&#2375; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pen drive</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2344; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;</span>",
      "<span class=\"eqt\">SSD</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360;&#2319;&#2360;&#2337;&#2368;</span>",
      "<span class=\"eqt\">DVD</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2368;&#2357;&#2368;&#2337;&#2368;</span>",
      "<span class=\"eqt\">Magnetic tape</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2335;&#2375;&#2346;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>While it may seem like an \"old\" technology, magnetic tape remains the gold standard for large-scale, long-term archival storage for several critical reasons.</p><p><b>Why Magnetic Tape is Best for Archival</b></p><p>Longevity: High-quality magnetic tapes (like LTO - Linear Tape-Open) have a shelf life of 30 years or more if stored in a controlled environment. In contrast, SSDs and Pen drives can lose data over a few years if left unpowered (due to charge leakage).</p><p>Cost Efficiency: For petabytes of data, tape is significantly cheaper per gigabyte than SSDs or Hard Drives.</p><p>Air-Gapped Security: Tapes are offline storage. Once a backup is complete, the tape is physically removed from the drive. This \"air gap\" makes the data immune to ransomware and cyberattacks.</p><p>Durability: Unlike DVDs, which are prone to \"disc rot\" and surface scratches, or SSDs, which have a limited number of write cycles, magnetic tape is very robust for data that is written once and stored.</p>",
    "question_index": 133
  },
  {
    "question": "<span class=\"eqt\"><p>1 byte consist of ____. </p></span><span class=\"hqt\" style=\"display:none\"><p>1 &#2348;&#2366;&#2311;&#2335; &#2350;&#2375;&#2306; ____ &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">32 bit</span><span class=\"hqt\" style=\"display:none\">32 &#2348;&#2367;&#2335;</span>",
      "<span class=\"eqt\">8 bit</span><span class=\"hqt\" style=\"display:none\">8 &#2348;&#2367;&#2335;</span>",
      "<span class=\"eqt\">320 kb</span><span class=\"hqt\" style=\"display:none\">320 kb</span>",
      "<span class=\"eqt\">16 mb</span><span class=\"hqt\" style=\"display:none\">16 mb</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>1 byte = 8 bit </b></p><p>Memory unit is the amount of data that can be stored in the storage unit. This storage capacity is expressed in terms of Bytes. <b>A binary digit (Bit) </b>is logical 0 and 1 representing a passive or an active state of a component in an electric circuit. </p>",
    "question_index": 134
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding an Operating System (OS):</p><p>1. The OS manages hardware resources such as CPU and memory.</p><p>2. The OS acts as an interface between the user and the hardware.</p><p>3. The OS is an application software designed for user productivity.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; (&#2323;&#2319;&#2360;) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2323;&#2319;&#2360; &#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2324;&#2352; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2332;&#2376;&#2360;&#2375; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2323;&#2319;&#2360; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2324;&#2352; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2311;&#2306;&#2335;&#2352;&#2347;&#2364;&#2375;&#2360; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3. &#2323;&#2319;&#2360; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2325;&#2368; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2367;&#2332;&#2364;&#2366;&#2311;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2319;&#2325; &#2319;&#2346;&#2381;&#2354;&#2367;&#2325;&#2375;&#2358;&#2344; &#2360;&#2377;&#2347;&#2364;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1: Resource Management (Correct)</p><p>An Operating System is often referred to as a Resource Manager. It manages and allocates the physical components of the computer to ensure that multiple programs can run simultaneously without interfering with each other.</p><p>CPU Management: The OS decides which process gets the processor when and for how much time (Process Scheduling).</p><p>Memory Management: It keeps track of every byte of memory and manages the allocation/deallocation of RAM to different programs.</p><p></p><p>Statement 2: Interface between User and Hardware (Correct)</p><p>The OS acts as a bridge or intermediary. Computer hardware only understands binary (0s and 1s), which is impossible for most humans to interact with directly.</p><p>The OS provides a User Interface (UI) - either a Graphical User Interface (GUI) like Windows/macOS icons or a Command Line Interface (CLI)- that translates user actions into instructions the hardware can execute.</p><p></p><p>Statement 3: Application Software (Incorrect)</p><p>This statement is false because an Operating System is classified as System Software, not Application Software.</p><p>System Software: Essential software that runs the computer itself and provides a platform for other programs (e.g., Windows, Linux, Android).</p><p>Application Software: Optional programs designed for specific user tasks or productivity (e.g., MS Word, Google Chrome, Photoshop). You can use a computer without MS Word, but you cannot use it without an Operating System.</p>",
    "question_index": 135
  },
  {
    "question": "<span class=\"eqt\"><p>Which among the following type of computers is also known informally as Number crunchier?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2379; &#2309;&#2344;&#2380;&#2346;&#2330;&#2366;&#2352;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2306;&#2348;&#2352; &#2325;&#2381;&#2352;&#2306;&#2330;&#2367;&#2351;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Minicomputer</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2344;&#2368; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Supercomputer</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2346;&#2352; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Micro computer</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Mainframe computer</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2344;&#2398;&#2381;&#2352;&#2375;&#2350; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Supercomputers</b> are sometimes called number crunchier. </p><p>&#183; They can do a great deal of arithmetic very quickly, have a great deal of high-speed storage (main memory) and have very fast internal communications. </p><p>&#183; The term number crunchier is sometimes applied to programs. </p><p>&#183; For example, statistical programs are number crunchers because their main task is to perform mathematical calculations.</p>",
    "question_index": 136
  },
