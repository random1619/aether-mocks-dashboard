    "options": [
      "<span class=\"eqt\">Both the Supreme Court and High Courts can issue writs only for enforcing Fundamental Rights</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2324;&#2352; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2342;&#2379;&#2344;&#2379;&#2306; &#2361;&#2368; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2361;&#2368; &#2352;&#2367;&#2335; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">High Courts can issue writs for Fundamental Rights and for any other purpose; the Supreme Court only for Fundamental Rights</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2324;&#2352; &#2325;&#2367;&#2360;&#2368; &#2309;&#2344;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2367;&#2335; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375;&#2357;&#2354; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2361;&#2368; &#2352;&#2367;&#2335; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The Supreme Court can issue writs to private bodies but High Courts cannot</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2344;&#2367;&#2332;&#2368; &#2344;&#2367;&#2325;&#2366;&#2351;&#2379;&#2306; &#2325;&#2379; &#2352;&#2367;&#2335; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2320;&#2360;&#2366; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375;&#2404;</span>",
      "<span class=\"eqt\">High Courts cannot issue habeas corpus</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2348;&#2306;&#2342;&#2368; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359;&#2368;&#2325;&#2352;&#2339; &#2351;&#2366;&#2330;&#2367;&#2325;&#2366; &#2332;&#2366;&#2352;&#2368; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Article 226 empowers High Courts to issue writs for FRs and \"for any other purpose\"; Article 32 confines the Supreme Court's writs to FR enforcement.</p><p>Habeas corpus can be issued by both courts.</p><p><b>Further Insights:</b></p><p>- Writs include habeas corpus, mandamus, prohibition, certiorari, and quo warranto.</p><p>- High Courts' wider scope often makes them the first resort for service and administrative law matters.</p><p>- Article 32 is itself a Fundamental Right; Article 226 is discretionary but broader in subject-matter.</p><p>- Tribunals and authorities performing public duties can be amenable to writs.</p>",
    "question_index": 116
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the correct statement(s). </p><p>Statement I: Revenue deficit arises when revenue expenditure exceeds revenue receipts in the budget.</p><p>Statement II: Primary deficit equals fiscal deficit minus interest payments.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; </p><p>&#2325;&#2341;&#2344; I: &#2348;&#2332;&#2335; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2328;&#2366;&#2335;&#2366; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2328;&#2366;&#2335;&#2366; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2366; &#2350;&#2375;&#2306; &#2360;&#2375; &#2348;&#2381;&#2351;&#2366;&#2332; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2328;&#2335;&#2366;&#2344;&#2375; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Revenue deficit is defined as revenue expenditure minus revenue receipts; if positive, there is a deficit.</p><p>Primary deficit is a different concept: fiscal deficit less interest payments. Both are true but II does not explain I.</p><p><b>Further Insights:</b></p><p>- Fiscal deficit measures the overall resource gap requiring borrowing.</p><p>- Primary deficit highlights current-year fiscal stance excluding past interest burdens.</p><p>- Revenue expenditure includes salaries, subsidies, interest, pensions; capital expenditure creates assets/loans.</p><p>- FRBM targets have aimed to reduce revenue deficit and anchor fiscal consolidation.</p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct?</p><p>Statement I: In the Mughal mansab system, zat fixed the noble's personal status and base salary.</p><p>Statement II: Sawar fixed the number of cavalry to be maintained and related allowances for horsemen.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344; 1: &#2350;&#2369;&#2327;&#2354; &#2350;&#2344;&#2360;&#2348; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2350;&#2375;&#2306;, &#2332;&#2364;&#2366;&#2340; (&#2309;&#2350;&#2368;&#2352; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2324;&#2352; &#2350;&#2370;&#2354; &#2357;&#2375;&#2340;&#2344;) &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2341;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2360;&#2357;&#2366;&#2352; (&#2328;&#2369;&#2337;&#2364;&#2360;&#2357;&#2366;&#2352;) &#2352;&#2326;&#2375; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2328;&#2369;&#2337;&#2364;&#2360;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2328;&#2369;&#2337;&#2364;&#2360;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2349;&#2340;&#2381;&#2340;&#2375; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are true, but II is not an explanation of I; they describe two distinct components of the mansab.</p><p>Zat determined rank/status and personal pay; sawar determined cavalry obligations and associated pay.</p><p><b>Further Insights:</b></p><p>- Mansabs could be increased or decreased; ranks were fluid under the emperor.</p><p>- Dagh (branding) and chehra (rolls) checked false muster of horses.</p><p>- Jagirs (revenue assignments) paid mansabdars; cash salary was often not fully realized.</p><p>- Under Akbar, mansab ranks ranged broadly (e.g., 10 to 10,000 and above).</p><p>- Ain-i Akbari gives detailed data on revenue units and administration.</p>",
    "question_index": 118
  },

    "question": "<span class=\"eqt\"><p>Identify the correct statement(s).</p><p>Statement I: Himalayan rivers are perennial due to a combination of snowmelt and monsoon rainfall.</p><p>Statement II: Peninsular rivers like the Godavari are entirely rain-fed and therefore run dry in summer.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2361;&#2367;&#2350;&#2346;&#2367;&#2328;&#2354;&#2344;&#2375; &#2324;&#2352; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366; &#2325;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351;&#2368; &#2344;&#2342;&#2367;&#2351;&#2366;&#2305; &#2348;&#2366;&#2352;&#2361;&#2350;&#2366;&#2360;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368; &#2332;&#2376;&#2360;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2342;&#2381;&#2357;&#2368;&#2346;&#2368;&#2351; &#2344;&#2342;&#2367;&#2351;&#2366;&#2305; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2357;&#2352;&#2381;&#2359;&#2366; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306; &#2324;&#2352; &#2311;&#2360;&#2354;&#2367;&#2319; &#2327;&#2352;&#2381;&#2350;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2370;&#2326; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Himalayan rivers have reliable flow from snow/ice melt plus monsoon rains (true).</p><p>Many peninsular rivers retain baseflow and are regulated by reservoirs; they are not \"entirely rain-fed\" nor do they all dry up in summer (false).</p><p><b>Further Insights:</b></p><p>- Peninsular rivers generally have shorter, more seasonal regimes and broader, older valleys.</p><p>- Narmada and Tapi flow west into the Arabian Sea; Godavari, Krishna, and Kaveri flow east to the Bay of Bengal.</p><p>- Monsoon-fed storage in large dams helps maintain lean-season flows in peninsular basins.</p><p>- Himalayan rivers typically have greater sediment loads due to active tectonics and youthful topography.</p>",
    "question_index": 119
  },

    "question": "<span class=\"eqt\"><p>Under the Stand-Up India Scheme, each bank branch is expected to facilitate at least:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2335;&#2376;&#2306;&#2337;-&#2309;&#2346; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2340;&#2361;&#2340;, &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2348;&#2376;&#2306;&#2325; &#2358;&#2366;&#2326;&#2366; &#2360;&#2375; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2375;&#2357;&#2366;&#2319;&#2306; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2346;&#2375;&#2325;&#2381;&#2359;&#2366; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">One loan between &#8377;10 lakh and &#8377;1 crore to any startup</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2360;&#2381;&#2335;&#2366;&#2352;&#2381;&#2335;&#2309;&#2346; &#2325;&#2379; &#8377;10 &#2354;&#2366;&#2326; &#2360;&#2375; &#8377;1 &#2325;&#2352;&#2379;&#2337;&#2364; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2354;&#2379;&#2344;</span>",
      "<span class=\"eqt\">One loan between &#8377;10 lakh and &#8377;1 crore exclusively to SC entrepreneurs</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2352;&#2381;&#2347; SC &#2313;&#2342;&#2381;&#2351;&#2350;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#8377;10 &#2354;&#2366;&#2326; &#2360;&#2375; &#8377;1 &#2325;&#2352;&#2379;&#2337;&#2364; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2354;&#2379;&#2344;</span>",
      "<span class=\"eqt\">Two loans between &#8377;10 lakh and &#8377;1 crore - one to an SC/ST and one to a woman entrepreneur</span><span class=\"hqt\" style=\"display:none\">&#8377;10 &#2354;&#2366;&#2326; &#2360;&#2375; &#8377;1 &#2325;&#2352;&#2379;&#2337;&#2364; &#2325;&#2375; &#2348;&#2368;&#2330; &#2342;&#2379; &#2354;&#2379;&#2344; - &#2319;&#2325; SC/ST &#2325;&#2379; &#2324;&#2352; &#2319;&#2325; &#2350;&#2361;&#2367;&#2354;&#2366; &#2313;&#2342;&#2381;&#2351;&#2350;&#2368; &#2325;&#2379;</span>",
      "<span class=\"eqt\">Unlimited loans without any borrower profile constraints</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2344;&#2366; &#2325;&#2367;&#2360;&#2368; &#2325;&#2352;&#2381;&#2332;&#2342;&#2366;&#2352; &#2346;&#2381;&#2352;&#2379;&#2347;&#2366;&#2311;&#2354; &#2325;&#2368; &#2358;&#2352;&#2381;&#2340; &#2325;&#2375; &#2309;&#2344;&#2354;&#2367;&#2350;&#2367;&#2335;&#2375;&#2337; &#2354;&#2379;&#2344;</span>"

    "correct_option_id": 2,
    "solution": "<p>Stand-Up India mandates at least two loans per branch: one to an SC/ST and one to a woman entrepreneur (&#8377;10 lakh - &#8377;1 crore).</p><p>The scheme is specifically targeted; it is not an open-ended unlimited loan program.</p><p><b>Further Insights:</b></p><p>- Purpose: Greenfield enterprises in manufacturing, services, or trading.</p><p>- Margin money can be partly supported via CGTMSE credit guarantee coverage.</p><p>- Launched in 2016; works through Scheduled Commercial Bank branches.</p><p>- Distinct from MUDRA (Shishu/Kishor/Tarun) and PMEGP which target different ticket sizes/processes.</p>",

  },

    "question": "<span class=\"eqt\"><p>Which metal is commonly anodized to build a thick, protective oxide layer for cookware and architectural parts?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2326;&#2366;&#2344;&#2366; &#2346;&#2325;&#2366;&#2344;&#2375; &#2325;&#2375; &#2348;&#2352;&#2381;&#2340;&#2344;&#2379;&#2306; &#2324;&#2352; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2358;&#2367;&#2354;&#2381;&#2346;&#2368;&#2351; &#2349;&#2366;&#2327;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2350;&#2379;&#2335;&#2368;, &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366;&#2340;&#2381;&#2350;&#2325; &#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2346;&#2352;&#2340; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2367;&#2360; &#2343;&#2366;&#2340;&#2369; &#2325;&#2379; &#2319;&#2344;&#2379;&#2337;&#2366;&#2311;&#2332;&#2381;&#2337; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Aluminium</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2351;&#2369;&#2350;&#2368;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Iron</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2361;&#2366;</span>",
      "<span class=\"eqt\">Copper</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2305;&#2348;&#2366;</span>",
      "<span class=\"eqt\">Zinc</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2360;&#2381;&#2340;&#2366;</span>"

    "correct_option_id": 0,
    "solution": "<p>Anodizing is applied primarily to Al to thicken Al2O3, improving corrosion and wear resistance and allowing dyeing for color.</p><p><b>Further Insights:</b></p><p>- Galvanization protects steel by coating with zinc (sacrificial anode behavior).</p><p>- Stainless steel resists corrosion due to a passive Cr2O3 film.</p><p>- Cathodic protection (sacrificial anodes like Mg/Zn) protects buried/immersed steel structures.</p>",

  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding cell organelles:</p><p>I. The nucleolus is the site of rRNA synthesis and early ribosome assembly.</p><p>II. The inner mitochondrial membrane is folded into cristae, increasing surface area for ATP generation.</p><p>III. Ribosomes bound to rough ER primarily synthesize proteins for the cytosol.</p><p>Which of the above statement is/are incorrect?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2309;&#2306;&#2327;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2325; &#2310;&#2352;&#2310;&#2352;&#2319;&#2344;&#2319; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2324;&#2352; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2352;&#2366;&#2311;&#2348;&#2379;&#2360;&#2379;&#2350; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2366; &#2360;&#2381;&#2341;&#2354; &#2361;&#2376;&#2404;</p><p>II. &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2350;&#2366;&#2311;&#2335;&#2379;&#2325;&#2377;&#2344;&#2381;&#2337;&#2381;&#2352;&#2367;&#2351;&#2354; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368; &#2325;&#2381;&#2352;&#2367;&#2360;&#2381;&#2335;&#2368; &#2350;&#2375;&#2306; &#2350;&#2369;&#2337;&#2364;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2319;&#2335;&#2368;&#2346;&#2368; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2340;&#2361; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2326;&#2369;&#2352;&#2342;&#2352;&#2375; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2309;&#2306;&#2327; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2352;&#2366;&#2311;&#2348;&#2379;&#2360;&#2379;&#2350; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2366;&#2311;&#2335;&#2379;&#2360;&#2379;&#2354; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2325;&#2366; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">None are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2327;&#2354;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>I is correct; rRNA synthesis/assembly occur at nucleoli.</p><p>II is correct; cristae house ETC and ATP synthase.</p><p>III is incorrect; rough ER ribosomes synthesize secretory, membrane, or lysosomal proteins; free ribosomes make cytosolic proteins.</p><p><b>Further Insights:</b></p><p>- 80S ribosomes (40S+60S) in cytosol; 70S in mitochondria/chloroplasts.</p><p>- Nucleolar organizer regions (NORs) carry rDNA.</p><p>- Mitochondria have their own circular DNA; maternal inheritance.</p><p>- Signal peptides target nascent polypeptides to the ER (SRP-mediated).</p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>In Sangam literature, what do the Aham and Puram themes primarily signify?</p></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2327;&#2350; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351; &#2350;&#2375;&#2306; &#2309;&#2361;&#2350; &#2324;&#2352; &#2346;&#2369;&#2352;&#2350; &#2357;&#2367;&#2359;&#2351; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</span>",
    "options": [
      "<span class=\"eqt\">Aham deals with love/private life; Puram with war, public life, and values.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2361;&#2350; &#2346;&#2381;&#2352;&#2375;&#2350;/&#2344;&#2367;&#2332;&#2368; &#2332;&#2368;&#2357;&#2344; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;; &#2346;&#2369;&#2352;&#2350; &#2351;&#2369;&#2342;&#2381;&#2343;, &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2332;&#2368;&#2357;&#2344; &#2324;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Aham concerns agriculture; Puram concerns maritime trade.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2361;&#2350; &#2325;&#2371;&#2359;&#2367; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;; &#2346;&#2369;&#2352;&#2350; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2368; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Aham is ritual hymns; Puram is grammar.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2361;&#2350; &#2309;&#2344;&#2369;&#2359;&#2381;&#2336;&#2366;&#2344;&#2367;&#2325; &#2349;&#2332;&#2344; &#2361;&#2376;&#2306;; &#2346;&#2369;&#2352;&#2350; &#2357;&#2381;&#2351;&#2366;&#2325;&#2352;&#2339; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Aham is Buddhist; Puram is Jaina in content.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2361;&#2350; &#2348;&#2380;&#2342;&#2381;&#2343; &#2343;&#2352;&#2381;&#2350; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;; &#2346;&#2369;&#2352;&#2350; &#2332;&#2376;&#2344; &#2343;&#2352;&#2381;&#2350; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Aham (akam) poetry focuses on love and inner emotions; Puram addresses war, heroism, generosity, and public virtues.</p><p>The themes are literary, not religious denominations or economic specializations.</p><p><b>Further Insights:</b></p><p>- Major Sangam anthologies include Ettuthokai and Pattuppattu.</p><p>- Tolkappiyam is the earliest extant Tamil grammar on language and poetics.</p><p>- Muvendar refers to the Chera, Chola, and Pandya polities.</p><p>- Roman trade evidence includes amphorae and coins on the Tamil coast.</p>",
    "question_index": 123
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following regarding Godavari river.</p><p>1) The Godavari originates near Trimbakeshwar in the Western Ghats (Nashik district).</p><p>2) Manjira and Indravati are left-bank tributaries of the Godavari.</p><p>3) The Godavari forms an estuary and enters the Arabian Sea near the Gulf of Khambhat.</p><p>Which of the above statement is/are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368; &#2344;&#2342;&#2368; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1) &#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368; &#2344;&#2342;&#2368; &#2325;&#2366; &#2313;&#2342;&#2381;&#2327;&#2350; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335; (&#2344;&#2366;&#2360;&#2367;&#2325; &#2332;&#2367;&#2354;&#2366;) &#2350;&#2375;&#2306; &#2340;&#2381;&#2352;&#2381;&#2351;&#2306;&#2348;&#2325;&#2375;&#2358;&#2381;&#2357;&#2352; &#2325;&#2375; &#2344;&#2367;&#2325;&#2335; &#2361;&#2376;&#2404;</p><p>2) &#2350;&#2306;&#2332;&#2367;&#2352;&#2366; &#2324;&#2352; &#2311;&#2306;&#2342;&#2381;&#2352;&#2366;&#2357;&#2340;&#2368; &#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368; &#2325;&#2368; &#2348;&#2366;&#2319;&#2305; &#2325;&#2367;&#2344;&#2366;&#2352;&#2375; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2367;&#2351;&#2366;&#2305; &#2361;&#2376;&#2306;&#2404;</p><p>3) &#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368; &#2344;&#2342;&#2368; &#2326;&#2306;&#2349;&#2366;&#2340; &#2325;&#2368; &#2326;&#2366;&#2337;&#2364;&#2368; &#2325;&#2375; &#2344;&#2367;&#2325;&#2335; &#2319;&#2325; &#2350;&#2369;&#2361;&#2366;&#2344;&#2366; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2309;&#2352;&#2348; &#2360;&#2366;&#2327;&#2352; &#2350;&#2375;&#2306; &#2327;&#2367;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only 1</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">Only 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Only 3</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 3</span>",
      "<span class=\"eqt\">Only 1 and 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement 1 is correct: Source near Trimbak, Maharashtra.</p><p>Statement 2 is incorrect: Manjira and Indravati join from the south; they are right-bank tributaries.</p><p>Statement 3 is incorrect: The Godavari debouches into the Bay of Bengal near Rajamahendravaram (Rajahmundry) with a large delta.</p><p><b>Further Insights:</b></p><p>- Major Godavari tributaries: Right bank - Pranhita, Indravati, Sabari, Manjira; Left bank - Pravara, Purna, Penganga (joins Wardha&rarr;Pranhita).</p><p>- Godavari is called Dakshin Ganga due to its length and basin size in peninsular India.</p><p>- Polavaram (Indira Sagar) Project is a key multipurpose dam on the Godavari.</p><p>- The delta supports aquaculture and paddy cultivation.</p>",
    "question_index": 124
  },
  {
    "question": "<span class=\"eqt\"><p>Which statement about Himalayan divisions is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2367;&#2350;&#2366;&#2354;&#2351;&#2368; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366; &#2325;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The Greater Himalaya lies north of the Trans-Himalaya and is mainly basaltic.</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2375;&#2335;&#2352; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351;, &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;-&#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2348;&#2375;&#2360;&#2366;&#2354;&#2381;&#2335;&#2367;&#2325; &#2330;&#2335;&#2381;&#2335;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2348;&#2344;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The Trans-Himalaya forms the southern edge of the Indo-Gangetic plain.</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2366;&#2306;&#2360;-&#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366; &#2311;&#2306;&#2337;&#2379;-&#2327;&#2306;&#2327;&#2366; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344; &#2325;&#2368; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2368; &#2360;&#2368;&#2350;&#2366; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The Trans-Himalaya and the Lesser Himalaya are the same feature.</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2366;&#2306;&#2360;-&#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2324;&#2352; &#2354;&#2328;&#2369; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2319;&#2325; &#2361;&#2368; &#2349;&#2370;-&#2310;&#2325;&#2371;&#2340;&#2367; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The Trans-Himalaya comprises the Karakoram, Ladakh and Zanskar ranges located north of the Greater Himalaya.</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2366;&#2306;&#2360;-&#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2327;&#2381;&#2352;&#2375;&#2335;&#2352; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2366;&#2352;&#2366;&#2325;&#2379;&#2352;&#2350;, &#2354;&#2342;&#2381;&#2342;&#2366;&#2326; &#2324;&#2352; &#2332;&#2364;&#2366;&#2306;&#2360;&#2381;&#2325;&#2352; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366;&#2319;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Trans-Himalaya (Karakoram - Ladakh - Zanskar) lies to the north of the Greater Himalaya (Himadri).</p><p>Options (1) - (3) contradict known positioning and composition; the Greater Himalaya is not basaltic.</p><p><b>Further Insights:</b></p><p>- The Greater Himalaya (Himadri) hosts many of India's loftiest peaks and glaciers.</p><p>- The Lesser Himalaya (Himachal) lies south of the Greater Himalaya; the Shivaliks form the outermost belt.</p><p>- Important glaciers of the Karakoram include Siachen and Baltoro (outside Indian territory).</p><p>- Geological structure is dominated by folded sedimentary and metamorphic rocks.</p><p>- Major passes like Zoji La lie between the Kashmir Valley and Ladakh (Trans-Himalaya beyond).</p>",
    "question_index": 125
  },
  {
    "question": "<span class=\"eqt\"><p>In April 2025, the Union Cabinet approved the Vibrant Villages Programme-II (VVP-II). Which of the following statements is/are correct regarding this?</p><p>I. The Programme would help in the comprehensive development of the villages located in the blocks abutting international land borders (ILBs), other than the Northern border already covered under VVP-I.</p><p>II. The scheme includes support for smart classes and tourism circuit development.</p><p>III. The scheme, with an outlay of Rs. 6,839 crore, will be implemented from FY 2024-25 to 2028-29.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2346;&#2381;&#2352;&#2376;&#2354; 2025 &#2350;&#2375;&#2306;, &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2350;&#2306;&#2337;&#2354; &#2344;&#2375; &#2332;&#2368;&#2357;&#2306;&#2340; &#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350;-II (VVP-II) &#2325;&#2379; &#2350;&#2306;&#2332;&#2370;&#2352;&#2368; &#2342;&#2368;&#2404; &#2311;&#2360; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2351;&#2361; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; VVP-I &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2346;&#2361;&#2354;&#2375; &#2360;&#2375; &#2361;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2360;&#2368;&#2350;&#2366; &#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352;, &#2309;&#2306;&#2340;&#2352;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2349;&#2370;&#2350;&#2367; &#2360;&#2368;&#2350;&#2366;&#2323;&#2306; (ILB) &#2360;&#2375; &#2360;&#2335;&#2375; &#2348;&#2381;&#2354;&#2377;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2327;&#2366;&#2306;&#2357;&#2379;&#2306; &#2325;&#2375; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2350;&#2375;&#2306; &#2360;&#2361;&#2366;&#2351;&#2325; &#2361;&#2379;&#2327;&#2366;&#2404;</p><p>II. &#2311;&#2360; &#2351;&#2379;&#2332;&#2344;&#2366; &#2350;&#2375;&#2306; &#2360;&#2381;&#2350;&#2366;&#2352;&#2381;&#2335; &#2325;&#2325;&#2381;&#2359;&#2366;&#2323;&#2306; &#2324;&#2352; &#2346;&#2352;&#2381;&#2351;&#2335;&#2344; &#2360;&#2352;&#2381;&#2325;&#2367;&#2335; &#2325;&#2375; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</p><p>III. 6,839 &#2325;&#2352;&#2379;&#2337;&#2364; &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2346;&#2352;&#2367;&#2357;&#2381;&#2351;&#2351; &#2357;&#2366;&#2354;&#2368; &#2351;&#2361; &#2351;&#2379;&#2332;&#2344;&#2366; &#2357;&#2367;&#2340;&#2381;&#2340; &#2357;&#2352;&#2381;&#2359; 2024-25 &#2360;&#2375; 2028-29 &#2340;&#2325; &#2354;&#2366;&#2327;&#2370; &#2325;&#2368; &#2332;&#2366;&#2319;&#2327;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II, and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The Union Cabinet chaired by Prime Minister Shri Narendra Modi, approved the Vibrant Villages Programme -II (VVP-II) as a Central Sector Scheme (100% Centre funding), furthering its commitment for the vision of Viksit Bharat@2047 for 'Safe, Secured &amp; Vibrant land borders'. </p><p>&#183; <b>The Programme would help in the comprehensive development of the villages located in the blocks abutting international land borders (ILBs), other than the Northern border already covered under VVP-I. </b></p><p>&#183; <b>With a total outlay of Rs.6,839 crore, the programme </b>shall be implemented in select strategic villages in the States/UTs of Arunachal Pradesh, Assam, Bihar, Gujarat, J&amp;K (UT), Ladakh (UT), Manipur, Meghalaya, Mizoram, Nagaland, Punjab, Rajasthan, Sikkim, Tripura, Uttarakhand, Uttar Pradesh and West Bengal till the<b> FY 2028-29. </b></p><p>&#183; The objective of the programme is to create better living conditions and adequate livelihood opportunities to ensure prosperous and safe borders, control trans-border crime and assimilate the border population with the nation and inculcate them 'as eyes and ears of the border guarding forces', crucial for internal security. </p><p>&#183; The programme shall provide funds for infrastructure development within the village or a cluster of villages, value chain development (through cooperatives, SHGs, etc), border specific outreach activity, education infrastructure like <b>SMART classes, development of tourism circuits</b> and works/projects to create diverse &amp; sustainable livelihood opportunities in the border areas. </p><p>&#183; The interventions would be border-specific, state and village specific, based on Village Action Plans prepared in a collaborative approach. </p><p>&#183; All-weather road connectivity for these villages shall be undertaken under the already approved PMGSY-IV under the MoRD. </p><p>&#183; A High-Powered Committee chaired by the Cabinet Secretary shall consider suitable relaxations in schematic guidelines for effective implementation of schemes in the border areas. </p><p>&#183; VVP-II along with VVP-I is a transformative initiative to make the border villages self-reliant and vibrant.</p>",
    "question_index": 126
  },
  {
    "question": "<span class=\"eqt\"><p>As per Census 2011, who would NOT be counted as a \"usual resident\" of City X?</p></span><span class=\"hqt\" style=\"display:none\"><p>2011 &#2325;&#2368; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2358;&#2361;&#2352; X &#2325;&#2375; \"&#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2344;&#2367;&#2357;&#2366;&#2360;&#2368;\" &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2375; &#2344;&#2361;&#2368;&#2306; &#2327;&#2367;&#2344;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">A student who has stayed in a hostel in City X for 7 months</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2331;&#2366;&#2340;&#2381;&#2352; &#2332;&#2379; &#2358;&#2361;&#2352; X &#2325;&#2375; &#2319;&#2325; &#2331;&#2366;&#2340;&#2381;&#2352;&#2366;&#2357;&#2366;&#2360; &#2350;&#2375;&#2306; 7 &#2350;&#2361;&#2368;&#2344;&#2375; &#2360;&#2375; &#2352;&#2361; &#2352;&#2361;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A seasonal worker who arrived 2 months ago but plans to stay 5 more months</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2350;&#2380;&#2360;&#2350;&#2368; &#2325;&#2366;&#2350;&#2327;&#2366;&#2352; &#2332;&#2379; 2 &#2350;&#2361;&#2368;&#2344;&#2375; &#2346;&#2361;&#2354;&#2375; &#2310;&#2351;&#2366; &#2341;&#2366; &#2354;&#2375;&#2325;&#2367;&#2344; 5 &#2350;&#2361;&#2368;&#2344;&#2375; &#2324;&#2352; &#2352;&#2369;&#2325;&#2344;&#2375; &#2325;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2348;&#2344;&#2366; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A trader who stays 3 months in City X and 9 months in Town Y every year</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2368; &#2332;&#2379; &#2361;&#2352; &#2360;&#2366;&#2354; &#2358;&#2361;&#2352; X &#2350;&#2375;&#2306; 3 &#2350;&#2361;&#2368;&#2344;&#2375; &#2324;&#2352; &#2325;&#2360;&#2381;&#2348;&#2375; Y &#2350;&#2375;&#2306; 9 &#2350;&#2361;&#2368;&#2344;&#2375; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A 3&#8209;month&#8209;old infant living with parents in City X</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2361;&#2352; X &#2350;&#2375;&#2306; &#2350;&#2366;&#2340;&#2366;-&#2346;&#2367;&#2340;&#2366; &#2325;&#2375; &#2360;&#2366;&#2341; &#2352;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; 3 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2366; &#2358;&#2367;&#2358;&#2369;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Usual resident: stayed for at least 6 months or intends to stay for at least 6 months.</p><p>The trader spends 9 months in Town Y, so usual residence is Town Y, not City X.</p><p><b>Further Insights:</b></p><p>- Census reference moment (most of India): 00:00 hours on 1 March 2011.</p><p>- Population Enumeration in snow-bound areas referenced 1 October 2010.</p><p>- Institutional households include hostels, jails, ashrams; \"normal\" households are typical family units.</p><p>- De facto enumeration counts persons present at the reference moment, with rules to avoid double counting.</p>",
    "question_index": 127
  },
  {
    "question": "<span class=\"eqt\"><p>Arrange in chronological order the following regarding nationalist organizations.</p><p>1) Poona Sarvajanik Sabha founded</p><p>2) Indian Association formed</p><p>3) First session of Indian National Congress</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2357;&#2366;&#2342;&#2368; &#2360;&#2306;&#2327;&#2336;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2379; &#2325;&#2366;&#2354;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1) &#2346;&#2370;&#2344;&#2366; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2360;&#2349;&#2366; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;</p><p>2) &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2328; &#2325;&#2366; &#2327;&#2336;&#2344;</p><p>3) &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344;</p></span>",
    "options": [
      "<span class=\"eqt\">1  -  2  -  3</span><span class=\"hqt\" style=\"display:none\">1  -  2  -  3</span>",
      "<span class=\"eqt\">2  -  1  -  3</span><span class=\"hqt\" style=\"display:none\">2  -  1  -  3</span>",
      "<span class=\"eqt\">2  -  3  -  1</span><span class=\"hqt\" style=\"display:none\">2  -  3  -  1</span>",
      "<span class=\"eqt\">3  -  2  -  1</span><span class=\"hqt\" style=\"display:none\">3  -  2  -  1</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Poona Sarvajanik Sabha (1870) precedes the Indian Association (1876).</p><p>The first INC session was in 1885 at Bombay under W.C. Bonnerjee.</p><p>Hence the order is 1 - 2 - 3.</p><p><b>Further Insights:</b></p><p>- A.O. Hume was instrumental in convening the INC (1885); 72 delegates attended.</p><p>- The Indian Association was led by Surendranath Banerjee and Ananda Mohan Bose.</p><p>- Early INC sessions rotated among major cities: Calcutta (1886), Madras (1887), etc.</p><p>- Moderates led the INC till the Surat Split (1907) with the Extremists.</p>",
    "question_index": 128
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the correct statement(s).</p><p>1) The burden of a direct tax is borne and paid by the same person.</p><p>2) GST is an indirect tax levied on value added at each stage of the supply chain.</p><p>3) Corporate income tax is an indirect tax.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1) &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2325;&#2366; &#2349;&#2366;&#2352; &#2324;&#2352; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2319;&#2325; &#2361;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2319;&#2325; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2361;&#2376; &#2332;&#2379; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2330;&#2352;&#2339; &#2350;&#2375;&#2306; &#2350;&#2370;&#2354;&#2381;&#2351;&#2357;&#2352;&#2381;&#2343;&#2344; &#2346;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2325;&#2377;&#2352;&#2381;&#2346;&#2379;&#2352;&#2375;&#2335; &#2310;&#2351;&#2325;&#2352; &#2319;&#2325; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only 1 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only 2 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only 1 and 3 are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3 &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only 1 and 2 are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2 &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>1) is Correct. In the case of a direct tax, the person who pays the tax to the government (the impact) is also the one who bears the economic cost of the tax (the incidence). For example, if you earn an income, you pay the income tax directly to the government from your earnings; you cannot shift this burden to someone else.</p><p>2) is Correct. GST (Goods and Services Tax) is an indirect tax because the seller collects it from the consumer and then pays it to the government (the burden is shifted). It is described as a multi-stage, value-added tax because it is levied at every step of the production and distribution process where value is added, providing a credit for taxes paid at previous stages (Input Tax Credit).</p><p>3) is Incorrect. Corporate Income Tax is a direct tax. It is a levy placed on the net profile or income of corporations. Since the company pays the tax directly to the government based on its own earnings and cannot shift the immediate legal liability to a third party, it falls under the category of direct taxation.</p><p><b>Further Insights:</b></p><p>&#183; <b>Shifting of Burden:</b> The primary difference between direct and indirect taxes is the ability to shift the tax burden. Direct taxes are non-shiftable, while indirect taxes are shiftable to the end-consumer.</p><p>&#183; <b>Progressive vs. Regressive:</b> Direct taxes (like Income Tax) are usually <b>progressive</b>, meaning the rate increases as income increases. Indirect taxes (like GST) are often considered <b>regressive</b> because the tax rate is the same for everyone, meaning it takes a larger percentage of income from low-income earners than from high-income earners.</p><p>&#183; <b>GST Structure:</b> GST in India is a dual-structured tax (CGST and SGST/UTGST) with an integrated tax (IGST) for inter-state trade, designed to create a \"One Nation, One Tax\" system.</p>",
    "question_index": 129
  },
  {
    "question": "<span class=\"eqt\"><p>Which option in word processing software allows you to make text or objects appear lighter and more transparent in the background? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2352;&#2381;&#2337; &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2367;&#2306;&#2327; &#2360;&#2377;&#2347;&#2364;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2310;&#2346;&#2325;&#2379; &#2348;&#2376;&#2325;&#2327;&#2381;&#2352;&#2366;&#2313;&#2306;&#2337; &#2350;&#2375;&#2306; &#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2351;&#2366; &#2321;&#2348;&#2381;&#2332;&#2375;&#2325;&#2381;&#2335; &#2325;&#2379; &#2361;&#2354;&#2381;&#2325;&#2366; &#2340;&#2341;&#2366; &#2309;&#2343;&#2367;&#2325; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2346;&#2376;&#2352;&#2375;&#2306;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bold</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2379;&#2354;&#2381;&#2337;</span>",
      "<span class=\"eqt\">Italics</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2335;&#2376;&#2354;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Underline</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2337;&#2352;&#2354;&#2366;&#2311;&#2344;</span>",
      "<span class=\"eqt\">Watermark</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2335;&#2352;&#2350;&#2366;&#2352;&#2381;&#2325;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In word processing software, the option that allows you to make text or objects appear lighter and more transparent in the background is \"Watermark.\" </p><p>&#183; Watermarks are often used for various purposes, such as adding a logo, a stamp of \"Confidential,\" or other background elements to documents to indicate their status, purpose, or branding. </p><p>&#183; Watermarks are typically semi-transparent and do not interfere with the readability of the main content.</p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>The rules and regulations of any computer digital messages are called as_____</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2350;&#2376;&#2360;&#2375;&#2332;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2319;&#2357;&#2306; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2379;&#2306; &#2325;&#2379; __________ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Internet Protocol</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354;</span>",
      "<span class=\"eqt\">Communication protocol</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350;&#2381;&#2351;&#2369;&#2344;&#2367;&#2325;&#2375;&#2358;&#2344; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354;</span>",
      "<span class=\"eqt\">WAP</span><span class=\"hqt\" style=\"display:none\">WAP</span>",
      "<span class=\"eqt\">Analysing</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2366;&#2354;&#2366;&#2311;&#2332;&#2367;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The proper descriptions of digital message formats as well as rules are known <b>communication protocols</b>. The main function of these protocols is to exchange messages from one computer system to another. These are significant in telecommunications systems as they consistently send and receive messages. These protocols cover error detection &amp; correction, signalling, and authentication. They can also explain the semantics, syntax &amp; brings analog &amp; digital communications together</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>What is considered as Half byte?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2361;&#2366;&#2347; &#2348;&#2366;&#2311;&#2335; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bit</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2335;</span>",
      "<span class=\"eqt\">Nibble</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2348;&#2354;</span>",
      "<span class=\"eqt\">Kilobyte</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2354;&#2379;&#2348;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">Mb</span><span class=\"hqt\" style=\"display:none\">Mb</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In computers and digital technology, a <b>nibble</b> is four binary digits or half of an eight-bit byte.</p>",
    "question_index": 132
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Printers can only print the characters and Symbols?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352; &#2325;&#2375;&#2357;&#2354; &#2325;&#2352;&#2376;&#2325;&#2381;&#2335;&#2352; &#2324;&#2352; &#2360;&#2367;&#2306;&#2348;&#2354; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Laser Printer</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2375;&#2395;&#2352; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Daisy wheel Printer</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2332;&#2364;&#2368; &#2357;&#2381;&#2361;&#2368;&#2354; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Inkjet Printer</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2325;&#2332;&#2375;&#2335; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A <b>daisy wheel printer</b> is a specific type of mechanical impact printer popular in the 1970s that used individual letter, number and symbol keys to imprint text on paper. This innovation on the electric typewriter became popular for its speed and quality, but later fell out of fashion in the 1990s.</p>",
    "question_index": 133
  },
  {
    "question": "<span class=\"eqt\"><p>Which device is used to carry digital data on analog lines? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2344;&#2366;&#2354;&#2377;&#2327; &#2354;&#2366;&#2311;&#2344;&#2379;&#2306; &#2346;&#2352; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2337;&#2375;&#2335;&#2366; &#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Router</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2313;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Multiplexer</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2354;&#2381;&#2335;&#2368;&#2346;&#2381;&#2354;&#2375;&#2325;&#2381;&#2360;&#2352;</span>",
      "<span class=\"eqt\">Repeater</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2346;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Modem</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2377;&#2337;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Modem is a short term for modulator-demodulator. A <b>modem</b> is a device or program that enables a computer to transmit data over, for example, telephone or cable lines. Computer information is stored digitally, whereas information transmitted over telephone lines is transmitted in the form of analog waves.</p>",
    "question_index": 134
  },
  {
    "question": "<span class=\"eqt\"><p>What is the primary purpose of antivirus software? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2344;&#2381;&#2335;&#2368;&#2357;&#2366;&#2351;&#2352;&#2360; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To create viruses</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2352;&#2360; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To remove all files from a computer</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2375; &#2360;&#2349;&#2368; &#2347;&#2364;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2366; &#2361;&#2335;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To protect a computer from malware and viruses</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2379; &#2350;&#2376;&#2354;&#2357;&#2375;&#2351;&#2352; &#2324;&#2352; &#2357;&#2366;&#2351;&#2352;&#2360; &#2360;&#2375; &#2348;&#2330;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To optimize computer performance</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2375; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2379; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The primary purpose of antivirus software is to protect a computer from malware and viruses. Antivirus programs are designed to detect, prevent, and remove malicious software (malware) such as viruses, worms, Trojans, spyware, adware, and other threats that can harm a computer, compromise data, or steal sensitive information. They work by scanning files and monitoring system activity to identify and eliminate malicious code and prevent it from infecting the computer. Creating viruses or removing all files from a computer are not the intended functions of antivirus software, and optimizing computer performance is a different task altogether.</p>",
    "question_index": 135
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not an example of Operating system?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2366; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">DuckDuckgo</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2325;&#2337;&#2325;&#2327;&#2379;</span>",
      "<span class=\"eqt\">Windows</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2306;&#2337;&#2379;&#2395;</span>",
      "<span class=\"eqt\">Linux</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2367;&#2344;&#2325;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Android</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2337;&#2381;&#2352;&#2377;&#2311;&#2337;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>An operating system (OS) is the program that, after being initially loaded into the computer by a boot program, manages all of the other application programs in a computer. The application programs make use of the operating system by making requests for services through a defined application program interface (API).</p><p><b>Windows</b>, <b>Linux</b>, and <b>Android</b> are examples of operating systems that enable the user to use programs like MS Office, Notepad, and games on the computer or mobile phone.</p>",
    "question_index": 136
  },
  {
    "question": "<span class=\"eqt\"><p>Antivirus software can also be called as _____. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2306;&#2335;&#2368;&#2357;&#2366;&#2351;&#2352;&#2360; &#2360;&#2377;&#2347;&#2364;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2325;&#2379; _____ &#2349;&#2368; &#2325;&#2361;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Security utility</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2325;&#2381;&#2351;&#2379;&#2352;&#2367;&#2335;&#2368; &#2351;&#2370;&#2335;&#2367;&#2354;&#2367;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Office suite</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2347;&#2367;&#2360; &#2360;&#2370;&#2335;</span>",
      "<span class=\"eqt\">Business software</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2395;&#2344;&#2360; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">System software</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Antivirus software can also be called a <b>security utility</b>. </p><p>&#183; Antivirus software guards against viruses entering into the computer. </p><p>&#183; It scans, detects and deletes such viruses from the computer. </p><p>&#183; Once installed, they run automatically in the background to facilitate real-time protection against virus attacks.</p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>Which part of CPU reads and interprets (decodes) the program instructions and transform them into control signals? </p></span><span class=\"hqt\" style=\"display:none\"><p>CPU &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2349;&#2366;&#2327; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2379; &#2352;&#2368;&#2337; &#2325;&#2352;&#2340;&#2366; &#2324;&#2352; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2311;&#2344;&#2381;&#2335;&#2352;&#2346;&#2381;&#2352;&#2375;&#2335; (&#2337;&#2368;&#2325;&#2379;&#2337;) &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2360;&#2306;&#2325;&#2375;&#2340;&#2379;&#2306; (&#2325;&#2306;&#2335;&#2381;&#2352;&#2379;&#2354; &#2360;&#2367;&#2327;&#2381;&#2344;&#2354;) &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 2,
    "solution": "<p>&#183; The <b>control unit</b> manages the computer's various components. </p><p>&#183; It reads and interprets (decodes) the program instructions, transforming them into control signals that activate other parts of the computer.</p>",

  {
    "question": "<span class=\"eqt\"><p>Which measure helps prevent phishing attacks?</p></span><span class=\"hqt\" style=\"display:none\">&#2347;&#2367;&#2358;&#2367;&#2306;&#2327; &#2361;&#2350;&#2354;&#2379;&#2306; &#2325;&#2379; &#2352;&#2379;&#2325;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2313;&#2346;&#2366;&#2351; &#2360;&#2361;&#2366;&#2351;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Sharing OTP</span><span class=\"hqt\" style=\"display:none\">OTP &#2360;&#2366;&#2333;&#2366; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Clicking unknown links</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2332;&#2381;&#2334;&#2366;&#2340; &#2354;&#2367;&#2306;&#2325; &#2346;&#2352; &#2325;&#2381;&#2354;&#2367;&#2325; &#2325;&#2352;&#2344;&#2366;</span>",

      "<span class=\"eqt\">Using public Wi-Fi</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2357;&#2366;&#2312;-&#2347;&#2366;&#2312; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Option a  -  Incorrect:</b> Sharing OTPs can lead to account compromise; attackers often ask for OTPs during phishing attempts.</p><p>&#183; <b>Option b  -  Incorrect:</b> Clicking unknown or suspicious links is a common way phishing attacks succeed.</p><p>&#183; <b>Option c  -  Correct:</b> Verifying the website URL (checking spelling, HTTPS, domain name) helps identify fake or malicious websites and is a key preventive measure against phishing.</p><p>&#183; <b>Option d  -  Incorrect:</b> Using public Wi-Fi can increase security risks rather than prevent phishing.</p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Following - Virus Types</p><p><table style=\"border-collapse:collapse;\"></p><p><tr></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List-I</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List-II</th></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Boot sector virus</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Changes its code</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Macro virus</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Infects MBR</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Polymorphic virus</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Uses macro language</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Spacefiller virus</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Occupies unused file space</td></p><p></tr></p><p></table></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306; - &#2357;&#2366;&#2351;&#2352;&#2360; &#2325;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;</p><p><table style=\"border-collapse:collapse;\"><tr></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2348;&#2370;&#2335; &#2360;&#2375;&#2325;&#2381;&#2335;&#2352; &#2357;&#2366;&#2351;&#2352;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2311;&#2360;&#2325;&#2366; &#2325;&#2379;&#2337; &#2348;&#2342;&#2354;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2350;&#2376;&#2325;&#2381;&#2352;&#2379; &#2357;&#2366;&#2351;&#2352;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. MBR &#2325;&#2379; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2346;&#2377;&#2354;&#2368;&#2350;&#2377;&#2352;&#2381;&#2347;&#2367;&#2325; &#2357;&#2366;&#2351;&#2352;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2350;&#2376;&#2325;&#2381;&#2352;&#2379; &#2349;&#2366;&#2359;&#2366; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2360;&#2381;&#2346;&#2375;&#2360;&#2347;&#2367;&#2354;&#2352; &#2357;&#2366;&#2351;&#2352;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2309;&#2346;&#2381;&#2352;&#2351;&#2369;&#2325;&#2381;&#2340; &#2347;&#2364;&#2366;&#2311;&#2354; &#2360;&#2381;&#2341;&#2366;&#2344; &#2328;&#2375;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr></table></p></span>",
    "options": [
      "<span class=\"eqt\">A-2, B-3, C-1, D-4</span><span class=\"hqt\" style=\"display:none\">A-2, B-3, C-1, D-4</span>",
      "<span class=\"eqt\">A-3, B-1, C-2, D-4</span><span class=\"hqt\" style=\"display:none\">A-3, B-1, C-2, D-4</span>",

    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Boot sector virus:</b> Attacks the <b>Master Boot Record (MBR)</b> or boot sector of storage devices, activating when the system starts.</p><p>&#183; <b>Macro virus:</b> Written using <b>macro languages</b> (like VBA) and spreads through documents such as Word or Excel files.</p><p>&#183; <b>Polymorphic virus:</b> Continuously <b>changes its code/signature</b> to evade antivirus detection.</p><p>&#183; <b>Spacefiller virus:</b> Occupies <b>unused spaces within files</b>, so the file size does not change, making detection difficult.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1) Multitasking allows execution of multiple programs.</p><p>2) Paging is related to memory management.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2350;&#2354;&#2381;&#2335;&#2368;&#2335;&#2366;&#2360;&#2381;&#2325;&#2367;&#2306;&#2327; &#2319;&#2325;&#2366;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2346;&#2375;&#2332;&#2367;&#2306;&#2327; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Statement 1  -  Correct:</b> Multitasking is an operating system feature that allows multiple programs or processes to be executed seemingly at the same time by sharing CPU time.</p><p>&#183; <b>Statement 2  -  Correct:</b> Paging is a <b>memory management technique</b> in which memory is divided into fixed-size pages to efficiently manage RAM and secondary storage.</p>",
    "question_index": 143
  },

    "question": "<span class=\"eqt\"><p>Which of the following is/are benefits of an email application?</p><p>I. Reliability</p><p>II. Speed</p><p>III. Printable</p><p>IV. Expensive</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2375; &#2312;&#2350;&#2375;&#2354; &#2319;&#2346;&#2381;&#2354;&#2367;&#2325;&#2375;&#2358;&#2344; &#2325;&#2375; &#2354;&#2366;&#2349; &#2361;&#2376;&#2306;?</p><p>I. &#2357;&#2367;&#2358;&#2381;&#2357;&#2360;&#2344;&#2368;&#2351;&#2340;&#2366;</p><p>II. &#2327;&#2340;&#2367;</p><p>III. &#2346;&#2381;&#2352;&#2367;&#2306;&#2335; &#2325;&#2352;&#2344;&#2375; &#2351;&#2379;&#2327;&#2381;&#2351;</p><p>IV. &#2348;&#2361;&#2369;&#2350;&#2370;&#2354;&#2381;&#2351;/&#2326;&#2352;&#2381;&#2330;&#2368;&#2354;&#2366;</p></span>",

    "solution": "<p>E-mail has proved to be powerful and reliable medium of communication. Here are the benefits of E-mail:</p><p>&#183; Reliable</p><p>&#183; Convenience</p><p>&#183; Speed</p><p>&#183; Inexpensive</p><p>&#183; Printable</p><p>&#183; Global</p><p>&#183; Generality</p>",

  {
    "question": "<span class=\"eqt\"><p>Which feature allows you to organize and structure your document in a hierarchical manner?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2310;&#2346;&#2325;&#2379; &#2309;&#2346;&#2344;&#2375; &#2342;&#2360;&#2381;&#2340;&#2366;&#2357;&#2375;&#2332;&#2364; &#2325;&#2379; &#2346;&#2342;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2367;&#2340; (hierarchical) &#2340;&#2352;&#2368;&#2325;&#2375; &#2360;&#2375; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2324;&#2352; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tables</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2348;&#2354;&#2381;&#2360; (Tables)</span>",
      "<span class=\"eqt\">Styles</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2366;&#2311;&#2354;&#2381;&#2360; (Styles)</span>",
      "<span class=\"eqt\">Bulleted lists</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2354;&#2375;&#2335;&#2375;&#2337; &#2354;&#2367;&#2360;&#2381;&#2335;&#2381;&#2360; (Bulleted lists)</span>",
      "<span class=\"eqt\">Page breaks</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2332; &#2348;&#2381;&#2352;&#2375;&#2325;&#2381;&#2360; (Page breaks)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The \"Styles\" feature in word processing software allows you to organize and structure your document in a hierarchical manner. Styles are sets of formatting options that can be applied to various elements of your document, such as headings, paragraphs, and lists. By using styles, you can create a consistent and organized document structure, making it easier to navigate and maintain. You can define styles for different levels of headings and subheadings, making it a powerful tool for structuring complex documents like reports, theses, or manuals.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following is a formatting tool that makes all of the cell's content visible without adding to the overall width of the worksheet? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2319;&#2325; &#2347;&#2377;&#2352;&#2381;&#2350;&#2375;&#2335;&#2367;&#2306;&#2327; &#2335;&#2370;&#2354; &#2361;&#2376; &#2332;&#2379; &#2357;&#2352;&#2381;&#2325;&#2358;&#2368;&#2335; &#2325;&#2368; &#2360;&#2350;&#2327;&#2381;&#2352; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2375; &#2348;&#2367;&#2344;&#2366; &#2360;&#2375;&#2354; &#2325;&#2368; &#2360;&#2349;&#2368; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2325;&#2379; &#2342;&#2371;&#2358;&#2381;&#2351;&#2350;&#2366;&#2344; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Wrap text</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2352;&#2376;&#2346; &#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335;</span>",

    "correct_option_id": 2,
    "solution": "<p>&#183; Excel's <b>wrap text</b> feature is a formatting tool that allows you to control the look of cell entries (also called labels) and headings in a worksheet. </p><p>&#183; When the content of a cell is wrapped, all of its content is visible without adding to the overall width of the worksheet.</p>",
