  {
    "question": "<span class=\"eqt\"><p>When the side of a square is made four times the original side, then the perimeter of the square will become -</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2357;&#2352;&#2381;&#2327; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; &#2325;&#2375; &#2350;&#2366;&#2344; &#2325;&#2379; &#2349;&#2369;&#2332;&#2366; &#2325;&#2375; &#2350;&#2370;&#2354; &#2350;&#2366;&#2344; &#2360;&#2375; &#2330;&#2366;&#2352; &#2327;&#2369;&#2344;&#2366; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2352;&#2381;&#2327; &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2366; -</p></span>",

    "question": "<span class=\"eqt\"><p>(1! + 2! + 3! + 4! + .. + 20!) is divided by 15, then find the remainder.</p></span><span class=\"hqt\" style=\"display:none\"><p>(1! + 2! + 3! + 4! + .. + 20!) &#2325;&#2379; 15 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2358;&#2375;&#2359;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "correct_option_id": 0,
    "solution": "<p>15 = 3 * 5</p><p>So, (5! + 6!  .. + 20!) is completely divisible by 15.</p><p>((1! + 2! + 3! + 4! + .. + 20!)/15</p><p>(1! + 2! + 3! + 4!)/15 + (5! + 6!  .. + 20!)/15</p><p>(1 + 2 + 6 + 24)/15</p><p>= 33/15</p><p>So, remainder = 3</p>",

  {
    "question": "<span class=\"eqt\"><p>A box has 10 bulbs of which 3 are defective. Two bulbs are drawn at random without replacement. Given that at least one bulb is defective, what is the probability that exactly one is defective?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2337;&#2367;&#2348;&#2381;&#2348;&#2375; &#2350;&#2375;&#2306; 10 &#2348;&#2354;&#2381;&#2348; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; 3 &#2326;&#2352;&#2366;&#2348; &#2361;&#2376;&#2306;&#2404; &#2348;&#2367;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344; &#2325;&#2375; &#2342;&#2379; &#2348;&#2354;&#2381;&#2348; &#2351;&#2366;&#2342;&#2371;&#2330;&#2381;&#2331;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2325;&#2366;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2361; &#2342;&#2375;&#2326;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2367; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2319;&#2325; &#2348;&#2354;&#2381;&#2348; &#2326;&#2352;&#2366;&#2348; &#2361;&#2376;, &#2311;&#2360; &#2348;&#2366;&#2340; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; &#2336;&#2368;&#2325; &#2319;&#2325; &#2348;&#2354;&#2381;&#2348; &#2326;&#2352;&#2366;&#2348; &#2361;&#2379;?</span>",

      "<span class=\"eqt\">3/4</span><span class=\"hqt\" style=\"display:none\">3/4</span>"

    "solution": "<p>Total ways = <sup>10</sup>C<sub>2</sub>= 45.</p><p>Ways with no defective = <sup>7</sup>C<sub>2</sub> = 21.</p><p>Let A = \"at least one defective\" = 45 &#8722; 21 = 24 outcomes.</p><p>Ways with exactly one defective = choose defective  X  choose good = 3  X  7 = 21.</p><p>Conditional probability = 21 / 24 = 7 / 8.</p>",

  {
    "question": "<span class=\"eqt\"><p>A person finds that a certain principal invested at simple interest at x% per annum for 5 years yields the same interest as at (x+2)% per annum for 4 years. What is x? </p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2346;&#2340;&#2366; &#2330;&#2354;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2367;&#2360;&#2368; &#2350;&#2370;&#2354;&#2343;&#2344; &#2325;&#2379; x% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; 5 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2313;&#2340;&#2344;&#2366; &#2361;&#2368; &#2348;&#2381;&#2351;&#2366;&#2332; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2340;&#2344;&#2366; &#2325;&#2367; (x+2)% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; 4 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404; x &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",

    "question_index": 3

  {

    "question": "<span class=\"eqt\"><p>If (&#8722;1, 3) and (3, 6) are two consecutive vertices of a square, find the length of each side of the square.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (-1, 3) &#2324;&#2352; (3, 6) &#2319;&#2325; &#2357;&#2352;&#2381;&#2327; &#2325;&#2375; &#2342;&#2379; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2358;&#2368;&#2352;&#2381;&#2359; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2357;&#2352;&#2381;&#2327; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2349;&#2369;&#2332;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>A can do 60% work in 18 days and the whole work together with B in 17<sup>1</sup>&frasl;<sub>7</sub> days. When B works for the first 12 days, then the remaining work is completed by C in 24.5 days. How much time will A and C spend completing the whole work together?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>A, 18 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; 60% &#2325;&#2366;&#2350; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; B &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2350;&#2381;&#2346;&#2370;&#2352;&#2381;&#2339; &#2325;&#2366;&#2350; 17 1/7 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; B &#2346;&#2361;&#2354;&#2375; 12 &#2342;&#2367;&#2344;&#2379;&#2306; &#2340;&#2325; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359; &#2325;&#2366;&#2350; C &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 24.5 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; A &#2324;&#2352; C &#2311;&#2360; &#2325;&#2366;&#2350; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2375;&#2306;&#2327;&#2375;?</p></span>",

      "<span class=\"eqt\">15(9/13) days</span><span class=\"hqt\" style=\"display:none\">15(9/13) &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">16(2/13) days</span><span class=\"hqt\" style=\"display:none\">16(2/13) &#2342;&#2367;&#2344;</span>",

    "correct_option_id": 1,
    "solution": "<p>A = 18 * 100/60 = 30 days</p><p>And, (1/A) + (1/B) = 7/120</p><p>(1/30) + (1/B) = 7/120</p><p>B = 40 days</p><p>12 days' work done by B = 12/40 = 3/10</p><p>Remaining work = 1  -  3/10 = 7/10</p><p>Now, 24.5 = (7/10) * C</p><p>C = 35 days</p><p>Therefore, time taken by A and C together = 1/((1/30) + (1/35)) = <b>16(2/13) days</b></p>",

    "solution": "<p><img width=140 height=153 id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/465568/image004.jpg\"></p><p>Let PQ be the length of the tower</p><p>In rPQS,</p><p>tan 60&deg; = PQ/QS</p><p>QS = PQ/&radic;3 --- (1)</p><p>In rPQR,</p><p>tan 30&deg; = PQ/QR = PQ/(RS+QS)</p><p>using (1), 1/&radic;3 = PQ/(30 + PQ/&radic;3)</p><p>30 + PQ/&radic;3 = &radic;3PQ</p><p>30&radic;3 + PQ = 3PQ</p><p>2PQ = 30&radic;3</p><p>PQ = 15&radic;3 m</p><p></p>",

    "question": "<span class=\"eqt\"><p>A person sold an article at a loss of 19%. Had he sold it for Rs.732 more, he would have gained 5%. What should be the selling price to gain a profit of 12%?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; 19% &#2361;&#2366;&#2344;&#2367; &#2346;&#2352; &#2348;&#2375;&#2330;&#2368;&#2404; &#2351;&#2342;&#2367; &#2313;&#2360;&#2344;&#2375; &#2311;&#2360;&#2375; &#2352;&#2369;.732 &#2309;&#2343;&#2367;&#2325; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2348;&#2375;&#2330;&#2366; &#2361;&#2379;&#2340;&#2366;, &#2340;&#2379; &#2313;&#2360;&#2375; 5% &#2325;&#2366; &#2354;&#2366;&#2349; &#2361;&#2379;&#2340;&#2366;&#2404; 12% &#2325;&#2366; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",

    "question": "<span class=\"eqt\"><p>In the following figure AB = AC, find the measure of &#8736;ADB.</p><p><img width=236 height=252 id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p4017/image007.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; AB = AC &#2361;&#2376;, &#2340;&#2379; &#8736;ADB &#2325;&#2366; &#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"236\" height=\"252\" id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p4017/image007.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">90&deg;</span><span class=\"hqt\" style=\"display:none\">90&deg;</span>",
      "<span class=\"eqt\">91&deg;</span><span class=\"hqt\" style=\"display:none\">91&deg;</span>",
      "<span class=\"eqt\">92&deg;</span><span class=\"hqt\" style=\"display:none\">92&deg;</span>",
      "<span class=\"eqt\">93&deg;</span><span class=\"hqt\" style=\"display:none\">93&deg;</span>"

    "correct_option_id": 3,
    "solution": "<p>AB = AC</p><p>&#8736;ABC = &#8736;ACB</p><p>&#8736;ABC + &#8736;ACB + &#8736;BAC = 180&deg;</p><p>=&gt; 2&#8736;ABC = 180&deg;  -  58&deg;</p><p>=&gt; &#8736;ABC = 61&deg;</p><p>&#8736;BOC = 2*&#8736;BAC = 2*58&deg; = 116&deg; [angle subtended at the circumference is half the angle subtended at the centre by an arc of a circle on the same side of it]</p><p>OB = OC</p><p>=&gt; &#8736;OBC = &#8736;OCB</p><p>&#8736;OBC + &#8736;OCB + &#8736;BOC =180</p><p>=&gt; 2&#8736;OBC = 180&deg;  -  116 &deg;</p><p>=&gt; &#8736;OBC = 32&deg;</p><p>&#8756; &#8736;ABD = &#8736;ABC &#8722; &#8736;OBC = 61&deg;  -  32&deg; = 29&deg;</p><p>&#8756; &#8736;ADB = 180&deg; &#8722; &#8736;ABD &#8722; &#8736;BAD = 180&deg;  -  29&deg;  -  58&deg; = 93&deg;</p>",
    "question_index": 23

  {
    "question": "<span class=\"eqt\"><p>A shopkeeper gains 9% while buying and gains 12% while selling. What is the overall profit percentage?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2325;&#2379; &#2326;&#2352;&#2368;&#2342;&#2340;&#2375; &#2360;&#2350;&#2351; 9% &#2325;&#2366; &#2354;&#2366;&#2349; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2348;&#2375;&#2330;&#2340;&#2375; &#2360;&#2350;&#2351; 12% &#2325;&#2366; &#2354;&#2366;&#2349; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2350;&#2327;&#2381;&#2352; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">22.08%</span><span class=\"hqt\" style=\"display:none\">22.08%</span>",
      "<span class=\"eqt\">19.24%</span><span class=\"hqt\" style=\"display:none\">19.24%</span>",
      "<span class=\"eqt\">24.66%</span><span class=\"hqt\" style=\"display:none\">24.66%</span>",
      "<span class=\"eqt\">21%</span><span class=\"hqt\" style=\"display:none\">21%</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>While buying, if he gives Rs.100 and gets Rs.109, he would gain 9%.</p><p>This Rs.109 worth of goods is sold at a profit of 12%.</p><p>Therefore,</p><p>Selling price = 109 * 1.12 = Rs.122.08</p><p>Profit% = (122.08 - 100) * 100/100 = 22.08%</p>",

    "question": "<span class=\"eqt\"><p>What is the LCM of two expressions a<sup>2</sup> + 2a  -  3 and a<sup>2</sup> + a  -  2?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325;&#2379;&#2306; a<sup>2</sup> + 2a - 3 &#2324;&#2352; a<sup>2</sup> + a - 2 &#2325;&#2366; &#2354;&#2328;&#2369;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2381;&#2351; (LCM) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>In a class of 120 students, 65 take Biology, 52 take Chemistry, and 24 take both. How many students take exactly one of these two subjects?</p></span><span class=\"hqt\" style=\"display:none\">120 &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306;, 65 &#2331;&#2366;&#2340;&#2381;&#2352; &#2332;&#2368;&#2357; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344;, 52 &#2331;&#2366;&#2340;&#2381;&#2352; &#2352;&#2360;&#2366;&#2351;&#2344; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2324;&#2352; 24 &#2331;&#2366;&#2340;&#2381;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2367;&#2359;&#2351; &#2346;&#2338;&#2364;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2325;&#2367;&#2340;&#2344;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352; &#2311;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2367;&#2359;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2357;&#2367;&#2359;&#2351; &#2346;&#2338;&#2364;&#2340;&#2375; &#2361;&#2376;&#2306;?</span>",
    "options": [
      "<span class=\"eqt\">73</span><span class=\"hqt\" style=\"display:none\">73</span>",
      "<span class=\"eqt\">69</span><span class=\"hqt\" style=\"display:none\">69</span>",
      "<span class=\"eqt\">61</span><span class=\"hqt\" style=\"display:none\">61</span>",
      "<span class=\"eqt\">77</span><span class=\"hqt\" style=\"display:none\">77</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Exactly one = (Biology only) + (Chemistry only).</p><p>Biology only = 65 &#8722; 24 = 41.</p><p>Chemistry only = 52 &#8722; 24 = 28.</p><p>Exactly one = 41 + 28 = 69.</p><p>Exactly one = n(Bio) + n(Chem) &#8722; 2  X  n(Both) </p><p>=&gt; 65 + 52 &#8722; 48 = 69.</p>",

;&#2366;&#2312;&#2306; &#2323;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; N &#2324;&#2352; O &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; W &#2324;&#2352; Z &#2346;&#2337;&#2364;&#2379;&#2360;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;&#2404; X, Y &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404;</p><p>&#2342;&#2368; &#2327;&#2312; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. M, P &#2324;&#2352; W &#2325;&#2366; &#2346;&#2337;&#2364;&#2379;&#2360;&#2368; &#2361;&#2376;&#2404;</p><p>II. Z, Y &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2340;&#2368;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404;</p><p>III. N &#2324;&#2352; M &#2325;&#2375; &#2336;&#2368;&#2325; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2348;&#2376;&#2336;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2348;&#2368;&#2330; &#2342;&#2379; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Input: 53 apple 11 cherry 68 berry 34 date</p><p>Step I: 11 53 apple cherry 68 berry 34 date</p><p>Step II: 11 53 cherry 68 berry 34 date apple</p><p>Step III: 11 34 53 cherry 68 berry date apple</p><p>Step IV: 11 34 53 cherry 68 date apple berry</p><p>Question: What is the logic behind the arrangement?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2344;&#2346;&#2369;&#2335;: 53 apple 11 cherry 68 berry 34 date</p><p>&#2330;&#2352;&#2339; I: 11 53 apple cherry 68 berry 34 date</p><p>&#2330;&#2352;&#2339; II: 11 53 cherry 68 berry 34 date apple</p><p>&#2330;&#2352;&#2339; III: 11 34 53 cherry 68 berry date apple</p><p>&#2330;&#2352;&#2339; IV: 11 34 53 cherry 68 date apple berry</p><p>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;: &#2311;&#2360; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2375; &#2346;&#2368;&#2331;&#2375; &#2325;&#2381;&#2351;&#2366; &#2340;&#2352;&#2381;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Numbers form a right block in descending order; words form a left block in reverse alphabetical order</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2309;&#2357;&#2352;&#2379;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2342;&#2366;&#2319;&#2305; &#2348;&#2381;&#2354;&#2377;&#2325; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;; &#2358;&#2348;&#2381;&#2342; &#2313;&#2354;&#2381;&#2335;&#2375; &#2357;&#2352;&#2381;&#2339;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2305; &#2348;&#2381;&#2354;&#2377;&#2325; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Numbers build a left ascending block by placing the smallest remaining number at the next left slot; words are appended to the right by moving the smallest remaining word each even step (ascending alphabetical at the far right)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2348;&#2338;&#2364;&#2340;&#2375; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2319;&#2325; &#2348;&#2381;&#2354;&#2377;&#2325; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2358;&#2375;&#2359; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2309;&#2327;&#2354;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2352;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2379; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;, &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2375; &#2358;&#2375;&#2359; &#2358;&#2348;&#2381;&#2342; &#2325;&#2379; &#2310;&#2327;&#2375; &#2348;&#2338;&#2364;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; (&#2360;&#2348;&#2360;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2348;&#2338;&#2364;&#2340;&#2375; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2339;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;)&#2404;</span>",
      "<span class=\"eqt\">Words and numbers alternate strictly by original positions</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2348;&#2381;&#2342; &#2324;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2350;&#2370;&#2354; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2361;&#2368; &#2348;&#2366;&#2352;&#2368;-&#2348;&#2366;&#2352;&#2368; &#2360;&#2375; &#2310;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Alternating adjacent swaps within like types only</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2361;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2361;&#2368; &#2310;&#2360;&#2344;&#2381;&#2344; &#2309;&#2342;&#2354;&#2366;-&#2348;&#2342;&#2354;&#2368; &#2325;&#2379; &#2348;&#2366;&#2352;&#2368;-&#2348;&#2366;&#2352;&#2368; &#2360;&#2375; &#2325;&#2352;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Odd steps: smallest remaining number =&gt; next slot in the growing left number-block. Even steps: word which occur first in the alphabetical order word =&gt; extreme right (building an ascending right word-block).</p><p>Start: 53 apple 11 cherry 68 berry 34 date</p><p>Step I (smallest number 11 =&gt; left slot 1): 11 53 apple cherry 68 berry 34 date</p><p>Step II (smallest word apple =&gt; right): 11 53 cherry 68 berry 34 date apple</p><p>Step III (next number 34 =&gt; left slot 2): 11 34 53 cherry 68 berry date apple</p><p>Step IV (next word berry =&gt; right): 11 34 53 cherry 68 date apple berry</p><p>Step V (next number 53 =&gt; left slot 3): 11 34 53 cherry 68 date apple berry</p><p>Step VI (next word cherry =&gt; right): 11 34 53 68 date apple berry cherry</p><p>Step VII (next number 68 =&gt; left slot 4): 11 34 53 68 date apple berry cherry</p><p>Step VIII (next word date =&gt; right): 11 34 53 68 apple berry cherry date</p><p>Final left number-block ascends; right word-block (apple, berry, cherry, date) ascends left to right.</p>",
    "question_index": 37
  },

    "question": "<span class=\"eqt\"><p>A company launches a mental health support program for its employees to reduce workplace stress and increase job satisfaction. Which of the following would be the most logical assumption underlying this decision?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2360;&#2381;&#2341;&#2354; &#2346;&#2352; &#2340;&#2344;&#2366;&#2357; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2360;&#2306;&#2340;&#2369;&#2359;&#2381;&#2335;&#2367; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2346;&#2344;&#2375; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2366;&#2344;&#2360;&#2367;&#2325; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2311;&#2360; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2310;&#2343;&#2366;&#2352; &#2361;&#2379;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Employees do not like interacting with their colleagues.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; &#2360;&#2361;&#2325;&#2352;&#2381;&#2350;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2348;&#2366;&#2340;&#2330;&#2368;&#2340; &#2325;&#2352;&#2344;&#2366; &#2346;&#2360;&#2306;&#2342; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Mental health support can positively impact employee well-being and performance.</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2344;&#2360;&#2367;&#2325; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2349;&#2354;&#2366;&#2312; &#2324;&#2352; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2346;&#2352; &#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2337;&#2366;&#2354; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The company wants to promote its brand image.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2346;&#2344;&#2368; &#2309;&#2346;&#2344;&#2368; &#2348;&#2381;&#2352;&#2366;&#2306;&#2337; &#2331;&#2357;&#2367; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366; &#2330;&#2366;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Employees prefer shorter working hours.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2368; &#2325;&#2350; &#2325;&#2366;&#2352;&#2381;&#2351; &#2328;&#2306;&#2335;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>"

    "correct_option_id": 1,
    "solution": "<p>Option (a): The initiative is aimed at reducing stress and improving well-being. While poor social interactions could cause stress, this is not the direct assumption behind launching a mental health program. So, option (a) is incorrect.</p><p>Option (b): The very purpose of the program is to reduce stress and improve satisfaction. It assumes that providing mental health support will have a beneficial effect on employees' well-being and performance. So, <b>option (b)</b> is correct.</p><p>Option (c): Brand image is not mentioned as a reason; the focus is internal - employee well-being - not external perception. So, option (c) is incorrect.</p><p>Option (d): The program targets mental health, not working hours. Employees could have long hours but still benefit from mental health support. So, option (d) is incorrect.</p>",

    "question": "<span class=\"eqt\"><p>Here some problem or solution of the problem is given in the statement you have to choose the appropriate logical deduction for given statement.</p><p>Statement:</p><p>A dedicated bus lane was created on a main arterial road. Bus travel time reduced and bus ridership increased, while private-car counts on that corridor declined slightly over the next few weeks. However, a nearby parallel road saw heavier car traffic during peak time because some drivers shifted routes. Planners propose extending bus lanes to connected stretches and improving junction design to reduce diversion effects.</p><p>Conclusions:</p><p>I. Dedicated bus lanes can improve bus travel time and increase ridership.</p><p>II. A shift of some drivers to parallel roads can increase congestion there.</p><p>III. Dedicated bus lanes always increase car congestion on all roads.</p><p>Which conclusion(s) necessarily follow(s)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2361;&#2366;&#2305; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2325;&#2379;&#2312; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2351;&#2366; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2325;&#2366; &#2360;&#2350;&#2366;&#2343;&#2366;&#2344; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;; &#2310;&#2346;&#2325;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2330;&#2369;&#2344;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>&#2319;&#2325; &#2350;&#2369;&#2326;&#2381;&#2351; &#2343;&#2350;&#2344;&#2368; &#2360;&#2337;&#2364;&#2325; &#2346;&#2352; &#2319;&#2325; &#2360;&#2350;&#2352;&#2381;&#2346;&#2367;&#2340; &#2348;&#2360; &#2354;&#2375;&#2344; &#2348;&#2344;&#2366;&#2312; &#2327;&#2312;&#2404; &#2348;&#2360; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2366; &#2360;&#2350;&#2351; &#2325;&#2350; &#2361;&#2379; &#2327;&#2351;&#2366; &#2324;&#2352; &#2348;&#2360; &#2351;&#2366;&#2340;&#2381;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2348;&#2338;&#2364; &#2327;&#2312;, &#2332;&#2348;&#2325;&#2367; &#2309;&#2327;&#2354;&#2375; &#2325;&#2369;&#2331; &#2361;&#2347;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2313;&#2360; &#2350;&#2366;&#2352;&#2381;&#2327; &#2346;&#2352; &#2344;&#2367;&#2332;&#2368; &#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2341;&#2379;&#2337;&#2364;&#2368; &#2325;&#2350;&#2368; &#2310;&#2312;&#2404; &#2361;&#2366;&#2354;&#2366;&#2305;&#2325;&#2367;, &#2346;&#2366;&#2360; &#2325;&#2368; &#2319;&#2325; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2360;&#2337;&#2364;&#2325; &#2346;&#2352; &#2357;&#2381;&#2351;&#2360;&#2381;&#2340; &#2360;&#2350;&#2351; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2366; &#2351;&#2366;&#2340;&#2366;&#2351;&#2366;&#2340; &#2348;&#2338;&#2364; &#2327;&#2351;&#2366; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2325;&#2369;&#2331; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;&#2352;&#2379;&#2306; &#2344;&#2375; &#2350;&#2366;&#2352;&#2381;&#2327; &#2348;&#2342;&#2354; &#2342;&#2367;&#2319;&#2404; &#2351;&#2379;&#2332;&#2344;&#2366;&#2325;&#2366;&#2352;&#2379;&#2306; &#2344;&#2375; &#2337;&#2366;&#2351;&#2357;&#2352;&#2381;&#2332;&#2344; &#2325;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2379;&#2306; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2360; &#2354;&#2375;&#2344; &#2325;&#2379; &#2332;&#2369;&#2337;&#2364;&#2375; &#2361;&#2369;&#2319; &#2361;&#2367;&#2360;&#2381;&#2360;&#2379;&#2306; &#2340;&#2325; &#2357;&#2367;&#2360;&#2381;&#2 #2354;&#2340;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Only II follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2361;&#2368; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only I and II follow</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II &#2361;&#2368; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only I follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2361;&#2368; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only I and III follow</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III &#2361;&#2368; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>"

    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>Alice said to Bob, \"I think it's going to rain today, so don't forget to take your umbrella.\"</p>",

    "solution": "<p>Option (a) is the correct answer.</p><p>The sentence in the Direct Speech is in the Simple Present Tense. Therefore, the sentence in the Indirect Speech should be in the Simple Past Tense.</p><p>Simple Present (Subject + V1 + Object) should be converted into Simple Past (Subject +V2 + Object).</p><p>\"That\" is used in place of Inverted Commas while transforming the sentence from Direct Speech to Indirect Speech.</p><p>For example:</p><p>He said, \"I never go to the village.\" (Direct Speech)</p><p>He said that he never went to the village. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The reporting verb 'said to' is changed into 'told'.</p><p>&#183; The verb 'think' is changed into 'thought', and 'is going to' is changed into 'was going to'</p><p>&#183; Here, 'don't forget' is advice. So, it is changed into 'shouldn't forget'.</p><p>Therefore, the correct answer is option (a): Alice told Bob that she thought it was going to rain that day, so he shouldn't forget to take his umbrella.</p>",

. Experiences gain significance when they are situated within longer narratives, not isolated moments of achievement. A life measured solely by rapid outcomes risks becoming fragmented, its achievements disconnected from purpose. By contrast, a life attentive to duration recognizes that some forms of understanding emerge only after endurance, repetition, and waiting. To reclaim time as a dimension of learning rather than an adversary of productivity is not to reject progress but to recalibrate its pace. It is an acknowledgement that acceleration without orientation leads to exhaustion rather than insight. Time does not merely pass; it instructs. Those who learn to inhabit it patiently discover that depth often resides not at the point of arrival but in the extended journey toward it.</p>",

    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the \"to be\" verb (\"is\" in this question) and the preposition \"by\" is necessary while changing the voice of the sentence from Passive to Active.</p><p>The Passive voice in this question is in <b>Present Indefinite tense</b>. Thus, the Active voice will also be in Present Indefinite.</p><p>In Passive voice, the format is: Object of the Active voice (Subjective case) + am/is/are + V3 + by + Subject of the Active voice (Objective case).</p><p>Thus, the format of Active voice is: Subject + V1/V5 + Object.</p><p>For example:</p><p>You are liked by her. (Passive Voice)</p><p>She likes you. (Active Voice)</p><p>The options except (c) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is (c): The law clearly states the condition that the adopter should be childless and old enough to be a father.</p>",

    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>He said to himself, \"How can I crack the entrance exam being conducted tomorrow?\"</p>",

    "solution": "<p>In the case of Interrogative sentences like this, \"said\" in Direct Speech is changed into \"enquired (of)\", \"wanted to know\", \"asked\", etc.</p><p>In Indirect speech, the verb is always placed after the subject, unlike in Direct Speech.</p><p>For example:</p><p>The teacher said to him, \"What is your name?\" (Direct Speech)</p><p>The teacher asked him what his name was. (Indirect Speech)</p><p>Also, when converting direct speech into indirect speech, the present modal verbs (can/may/must/will/shall) should be changed into past modal verbs (could/might/had to/would/should). </p><p>Example: She said, \"I can speak ten languages.\" (Direct Speech)</p><p>She said that she could speak ten languages. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The reporting verb 'said to' is changed into 'asked'. </p><p>&#183; 'Can' is changed into 'could'. </p><p>&#183; The pronoun 'I' is changed into 'he'. </p><p>&#183; 'Tomorrow' is changed into 'the next day'. </p><p>Therefore, the correct answer is option (c): <b>He asked himself how he could crack the entrance exam being conducted the next day.</b></p>",

    "question": "<p>Select the most appropriate tense form to fill in the blank.</p><p>They did not ____ the meeting.</p>",
    "options": [
      "Attended",
      "Attend",
      "Attending",
      "Attends"
    ],
    "correct_option_id": 1,
    "solution": "<p>The most appropriate option to fill in the blank is 'attend'. When we use \"did\" as an auxiliary verb in a sentence, it is usually followed by the base form of the main verb. This is because \"did\" is already marking the past tense, so the main verb that follows does not need to be conjugated for tense. Accordingly, the base form 'attend' is suitable for the blank. 'Attended' is the past tense form of the verb \"attend\". But we need to use the base form of the verb \"attend\" after \"did\". 'Attending' is the present participle form of the verb \"attend\", used to indicate that the action is ongoing or in progress. It is not appropriate here because the sentence is in the past tense (did not). 'Attends' is the present tense form of the verb \"attend\", used with third-person singular subjects (he, she, it). It is not appropriate here because the sentence is in the past tense (\"did not\"), and we are referring to a past action (not a present action). Hence, (b) is the correct answer. </p><p><b>The complete sentence is:</b> They did not attend the meeting.</p><p><b>NOTE:</b></p><p>Participle: A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p><p><b>Auxiliary verb: </b>A verb that gives grammatical information that is not given by the main verb of a sentence. It supports the main verb. Auxiliary verbs help to form the various tenses, moods, and voices of other verbs. The principal ones are be, do, and have. Example: She will sing a song tomorrow. Here, 'will' is the auxiliary verb that supports the main verb 'sing'.</p>",
    "question_index": 92
  },

    "question": "<p>Select the most appropriate word to fill in the blank.</p><p>__________ the general ordered to open fire on the protestors than there was large scale bloodshed.</p>",
    "options": [
      "Hardly",
      "No sooner had",
      "No sooner did",
      "Scarcely"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>No sooner...than</b> are <b>correlative conjunctions</b>.</p><p><b>Correlative conjunctions</b> are sort of like tag-team conjunctions. They come in <b>pairs</b>, and you have to use both of them in different places in a sentence to make them work. They get their name from the fact that they work together (co-) and relate one sentence element to another.</p><p>The format of <b>No sooner..than</b> is: <b>No sooner + had + Subject </b>(the general)<b> + V3 </b>(ordered to open fire on the protestors)<b> + than + rest of the sentence </b>(there was large scale bloodshed)<b>.</b></p><p>For example: <b>No sooner</b> had I reached the station <b>than</b> the train left.</p><p>In this context, 'ordered' is the <b>V3</b> form of the verb. So, 'No sooner did' is an incorrect option as 'did' is the <b>V1</b> form of the verb.</p><p>'Hardly' and 'Scarcely' are incorrect options because they pair up with 'when' instead of 'than'.</p><p>Thus, the correct option is <b>(b) No sooner had</b></p><p>Thus, the correct sentence should be: <u>No sooner had</u> the general ordered to open fire on the protestors than there was large scale bloodshed.</p><p>Additional Information:</p><p>Some of the important <b>Correlative Conjunctions</b> are:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Either...or</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Neither...nor</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hardly...when</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Scarcely...when</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Both..and</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">If..then</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Not only...but also</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rather...than</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Whether..or</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>No sooner..than</b></td></tr></table>",

    "question": "<p>Select the option that expresses the given sentence in passive voice. </p><p>The diligent researcher discovered a groundbreaking solution, revolutionizing the field. </p>",
    "options": [

      "The diligent researcher was discovered a groundbreaking solution, revolutionizing the field.",

      "A groundbreaking solution was discovered by the diligent researcher, revolutionizing the field."
    ],
    "correct_option_id": 3,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of verb is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in this question is in Past Indefinite. Thus, the Passive voice will also be in Past Indefinite.</p><p>The format of the active voice is: Subject + V2 + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + was/were + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>Real Madrid won the Champions League. (Active Voice)</p><p>The Champions League was won by Real Madrid. (Passive Voice)</p><p>The options except (d) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is: A groundbreaking solution was discovered by the diligent researcher, revolutionizing the field.</p><p>Hence, option (d) is the answer.</p>",

    "question": "<p>What was the nature of the bones found in the crib?</p>",
    "options": [
      "Large bones from a small animal.",
      "Human bones.",
      "Snail shells were mistaken as bones.",
      "Small bones most likely from mice."
    ],
    "correct_option_id": 3,
    "solution": "<p>The passage states that \"The next morning, we found a pile of bones. These were small bones, almost certainly from mice.\"</p><p>The bones found in the crib were small and almost certainly from mice. The parents ran their hands through the pile of bones, marvelling at the existence of such things in the world around them.</p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 104
  },

    "question": "<span class=\"eqt\"><p>Identify the correct statement(s) regarding 103rd Constitutional Amendment (EWS).</p><p>1) It provides up to 10% reservation for Economically Weaker Sections in education and public employment, excluding SC/ST/OBC.</p><p>2) It inserted clauses (6) to Articles 15 and 16.</p><p>3) It requires EWS quota to remain within the 50% ceiling recognized in earlier case law.</p></span><span class=\"hqt\" style=\"display:none\"><p>103&#2357;&#2375;&#2306; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; (&#2312;&#2337;&#2348;&#2381;&#2354;&#2381;&#2351;&#2370;&#2319;&#2360;) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1) &#2351;&#2361; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2324;&#2352; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2350;&#2375;&#2306; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2350;&#2332;&#2379;&#2352; &#2357;&#2352;&#2381;&#2327;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; 10% &#2340;&#2325; &#2310;&#2352;&#2325;&#2381;&#2359;&#2339; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2366;&#2340;&#2367;/&#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367;/&#2309;&#2344;&#2381;&#2351; &#2346;&#2367;&#2331;&#2337;&#2364;&#2366; &#2357;&#2352;&#2381;&#2327; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2311;&#2360;&#2344;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 15 &#2324;&#2352; 16 &#2350;&#2375;&#2306; &#2326;&#2306;&#2337; (6) &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2366;&#2404;</p><p>3) &#2351;&#2361; &#2346;&#2370;&#2352;&#2381;&#2357; &#2325;&#2375; &#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; 50% &#2325;&#2368; &#2360;&#2368;&#2350;&#2366; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2312;&#2337;&#2348;&#2381;&#2354;&#2381;&#2351;&#2370;&#2319;&#2360; &#2325;&#2379;&#2335;&#2366; &#2325;&#2379; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2344;&#2375; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>"

    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct and reflect the text of the amendment.</p><p>Statement 3 is incorrect; the 2022 Supreme Court verdict upheld EWS even when it breaches the 50% ceiling.</p><p><b>Further Insights:</b></p><p>- Article 15(6) and 16(6) are enabling provisions; States frame implementing rules.</p><p>- EWS excludes SC/ST/OBC beneficiaries of existing reservations.</p><p>- The criteria for EWS are notified by the Government and can vary within policy.</p><p>- Reservation cannot be claimed as a fundamental right; it is a policy instrument.</p><p>- Other major amendments: 101st (GST), 73rd/74th (local bodies), 61st (voting age).</p>",

    "question": "<span class=\"eqt\"><p>In May 2025, union Sports Minister Mansukh Mandaviya inaugurated the first-ever Khelo India Beach Games at which among the following beach in the Union territory of Diu?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2312; 2025 &#2350;&#2375;&#2306;, &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2326;&#2375;&#2354; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2350;&#2344;&#2360;&#2369;&#2326; &#2350;&#2366;&#2306;&#2337;&#2357;&#2367;&#2351;&#2366; &#2344;&#2375; &#2342;&#2368;&#2357; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2358;&#2366;&#2360;&#2367;&#2340; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2340;&#2335; &#2346;&#2352; &#2346;&#2381;&#2352;&#2341;&#2350; &#2326;&#2375;&#2354;&#2379; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2348;&#2368;&#2330; &#2327;&#2375;&#2350;&#2381;&#2360; &#2325;&#2366; &#2313;&#2342;&#2381;&#2328;&#2366;&#2335;&#2344; &#2325;&#2367;&#2351;&#2366;?</p></span>",

      "<span class=\"eqt\">Nagoa Beach</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2327;&#2379;&#2357;&#2366; &#2348;&#2368;&#2330;</span>"

    "solution": "<p>&#183; Union Sports Minister Mansukh Mandaviya inaugurated the first-ever Khelo India Beach Games at <b>Ghoghla Beach</b> in the Union territory of Diu. </p><p>&#183; More than 1000 athletes from across the country will compete in six medal events and two demonstration sports over the next six days. </p><p>&#183; This is the first time the Beach Games are being held under the ever-expanding Khelo India umbrella. </p><p>&#183; The medal events include beach soccer, beach volleyball, beach kabaddi, beach sepak takraw, pencak silat, and open water swimming. Two traditional demonstration sports ' mallakhamb and tug-of-war will also be staged during the games.</p>",

    "question": "<span class=\"eqt\"><p>Consider the two statements given below about refraction.</p><p>Statement I: When light passes from water into glass, it bends away from the normal.</p><p>Statement II: The refractive index of glass is greater than that of water for visible light.</p><p>Which of the above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2332;&#2348; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2332;&#2354; &#2360;&#2375; &#2325;&#2366;&#2306;&#2330; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; &#2309;&#2349;&#2367;&#2354;&#2306;&#2348; &#2360;&#2375; &#2342;&#2370;&#2352; &#2350;&#2369;&#2337;&#2364; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2342;&#2371;&#2358;&#2381;&#2351; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2366;&#2306;&#2330; &#2325;&#2366; &#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;&#2366;&#2306;&#2325; &#2332;&#2354; &#2325;&#2375; &#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344;&#2366;&#2306;&#2325; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement I is incorrect. Refraction is the bending of light as it passes from one medium to another. When light passes from a rarer medium (lower refractive index) to a denser medium (higher refractive index), it slows down and bends towards the normal.</p><p>Water has a refractive index of approximately 1.33.</p><p>Glass has a refractive index of approximately 1.50. Since glass is optically denser than water, light passing from water into glass will bend towards the normal, not away from it.</p><p></p><p>Statement II is correct. The refractive index of a material is a measure of how much it slows down light. For visible light, the refractive index of most types of glass (typically 1.5 to 1.6) is significantly higher than that of water (approximately 1.33).</p><p><b>Summary of Bending Rules:</b></p><p>Rarer to Denser: Bends Towards the normal (Speed decreases).</p><p>Denser to Rarer: Bends Away from the normal (Speed increases).</p><p></p><p><b>Further Insights:</b></p><p>- Snell's law: n1 sin i = n2 sin r; larger index implies smaller refraction angle.</p><p>- Critical angle for water - air ~ 48.8&deg;, for glass - air ~ 41&deg;.</p><p>- Total internal reflection occurs only from denser to rarer medium beyond the critical angle.</p><p>- Dispersion arises because refractive index depends on wavelength.</p>",
    "question_index": 108
  },

    "question": "<span class=\"eqt\"><p>Identify the correct statement(s).</p><p>1) In a grazing food chain, producers &rarr; herbivores &rarr; carnivores, with about 10% of energy moving to the next trophic level on average.</p><p>2) In a detritus food chain, energy flows from dead organic matter to decomposers/detritivores.</p><p>3) Ecological energy pyramids can be inverted in productive lakes.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2346;&#2361;&#2330;&#2366;&#2344;&#2375;&#2306;&#2404;</p><p>1) &#2330;&#2352;&#2366;&#2312; &#2357;&#2366;&#2354;&#2368; &#2326;&#2366;&#2342;&#2381;&#2351; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306;, &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325; &#8594; &#2358;&#2366;&#2325;&#2366;&#2361;&#2366;&#2352;&#2368; &#8594; &#2350;&#2366;&#2306;&#2360;&#2366;&#2361;&#2366;&#2352;&#2368; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2324;&#2352; &#2324;&#2360;&#2340;&#2344; &#2354;&#2327;&#2349;&#2327; 10% &#2314;&#2352;&#2381;&#2332;&#2366; &#2309;&#2327;&#2354;&#2375; &#2346;&#2379;&#2359;&#2339; &#2360;&#2381;&#2340;&#2352; &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2360;&#2337;&#2364;&#2375;-&#2327;&#2354;&#2375; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2326;&#2366;&#2342;&#2381;&#2351; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306;, &#2314;&#2352;&#2381;&#2332;&#2366; &#2350;&#2371;&#2340; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2360;&#2375; &#2309;&#2346;&#2328;&#2335;&#2325;/&#2360;&#2337;&#2364;&#2375;-&#2327;&#2354;&#2375; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2379; &#2326;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2332;&#2368;&#2357;&#2379;&#2306; &#2325;&#2368; &#2323;&#2352; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3) &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325; &#2333;&#2368;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2314;&#2352;&#2381;&#2332;&#2366; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2313;&#2354;&#2335;&#2375; &#2361;&#2379; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statements 1 and 2 are correct: the 10% law is a rule of thumb; detritus chains start from detritus and decomposers.</p><p>Statement 3 is incorrect: energy pyramids are always upright due to the Second Law; biomass or numbers pyramids may be inverted.</p><p><b>Further Insights:</b></p><p>- Detritus pathways dominate in many forests where leaf litter feeds decomposer webs.</p><p>- Energy transfer efficiency varies (~5 - 20%) depending on ecosystem and trophic interactions.</p><p>- Number pyramids can be inverted in parasitic chains (many parasites per host).</p><p>- Primary productivity constraints limit the maximum number of trophic levels.</p>",
    "question_index": 109
  },

    "question": "<span class=\"eqt\"><p>Identify the correct statements:</p><p>1) Under PM Jan Dhan Yojana, eligible RuPay cardholders get accident insurance cover of Rs 2 lakh.</p><p>2) Ayushman Bharat - PM-JAY provides up to Rs 5 lakh per family per year and has national portability.</p><p>3) PM-KISAN transfers Rs 6,000 per year to farmers in two equal instalments.</p><p>4) Atal Pension Yojana allows any resident above 60 years to open a new APY account.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2332;&#2344; &#2343;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2340;&#2361;&#2340;, &#2346;&#2366;&#2340;&#2381;&#2352; RuPay &#2325;&#2366;&#2352;&#2381;&#2337;&#2343;&#2366;&#2352;&#2325;&#2379;&#2306; &#2325;&#2379; 2 &#2354;&#2366;&#2326; &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2342;&#2369;&#2352;&#2381;&#2328;&#2335;&#2344;&#2366; &#2348;&#2368;&#2350;&#2366; &#2325;&#2357;&#2352; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2310;&#2351;&#2369;&#2359;&#2381;&#2350;&#2366;&#2344; &#2349;&#2366;&#2352;&#2340; - &#2346;&#2368;&#2319;&#2350;-&#2332;&#2375;&#2319;&#2357;&#2366;&#2312; &#2346;&#2381;&#2352;&#2340;&#2367; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; 5 &#2354;&#2366;&#2326; &#2352;&#2369;&#2346;&#2351;&#2375; &#2340;&#2325; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2346;&#2379;&#2352;&#2381;&#2335;&#2375;&#2348;&#2367;&#2354;&#2367;&#2335;&#2368; &#2325;&#2368; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2346;&#2368;&#2319;&#2350;-&#2325;&#2367;&#2360;&#2366;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2342;&#2379; &#2348;&#2352;&#2366;&#2348;&#2352; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; 6,000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>4) &#2309;&#2335;&#2354; &#2346;&#2375;&#2306;&#2358;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; 60 &#2357;&#2352;&#2381;&#2359; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2310;&#2351;&#2369; &#2325;&#2375; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2344;&#2367;&#2357;&#2366;&#2360;&#2368; &#2325;&#2379; &#2344;&#2351;&#2366; &#2319;&#2346;&#2368;&#2357;&#2366;&#2312; &#2326;&#2366;&#2340;&#2366; &#2326;&#2379;&#2354;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1, 2 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1, 2 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 3 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1, 3 &#2324;&#2352; 4</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>1 is correct: PMJDY RuPay card-linked accident cover is Rs 2 lakh (conditions apply).</p><p>2 is correct: PM-JAY offers Rs 5 lakh per family (floater) with portability.</p><p>3 is incorrect: PM-KISAN pays in three instalments of Rs 2,000 each (total Rs 6,000/year).</p><p>4 is incorrect: APY entry age is 18 - 40; above 60 cannot open a new APY account.</p><p><b>Further Insights:</b></p><p>- PMJDY offers overdraft facility (up to Rs 10,000) for eligible account holders.</p><p>- PM-KISAN covers all landholding farmer families subject to exclusions (e.g., institutional landholders, higher-income categories).</p><p>- APY guarantees pension slabs of Rs 1,000 - 5,000 per month from age 60.</p><p>- PM-JAY is implemented by National Health Authority; e-card based, cashless at empanelled hospitals.</p><p>- PM Ujjwala Yojana provides deposit-free LPG connections to eligible women beneficiaries (Ministry of Petroleum &amp; Natural Gas).</p>",
    "question_index": 110
  },

    "question": "<span class=\"eqt\"><p>In October 2025, who was honoured as a 'Top Agri-Food Pioneer' by the World Food Prize Foundation, held in Des Moines, Iowa?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2025 &#2350;&#2375;&#2306;, &#2310;&#2351;&#2379;&#2357;&#2366; &#2325;&#2375; &#2337;&#2375;&#2360; &#2350;&#2379;&#2311;&#2344;&#2381;&#2360; &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2357;&#2367;&#2358;&#2381;&#2357; &#2326;&#2366;&#2342;&#2381;&#2351; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2347;&#2366;&#2313;&#2306;&#2337;&#2375;&#2358;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; '&#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2371;&#2359;&#2367;-&#2326;&#2366;&#2342;&#2381;&#2351; &#2309;&#2327;&#2381;&#2352;&#2339;&#2368;' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sanjeev Kapoor</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2332;&#2368;&#2357; &#2325;&#2346;&#2370;&#2352;</span>",
      "<span class=\"eqt\">Vikas Khanna</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2325;&#2366;&#2360; &#2326;&#2344;&#2381;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Ranveer Brar</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2339;&#2357;&#2368;&#2352; &#2348;&#2352;&#2366;&#2337;&#2364;</span>",
      "<span class=\"eqt\">Gaggan Anand</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2327;&#2344; &#2310;&#2344;&#2306;&#2342;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Sanjeev Kapoor has been honoured as a Top Agri-Food Pioneer by the World Food Prize Foundation. The ceremony was held in Des Moines, Iowa. </p><p>The event brings together global leaders, scientists, policy makers, and innovators to discuss key issues related to food security, climate resilience, and nutrition. </p><p>The recognition marks Kapoor's transformative contribution to improving the global food ecosystem by promoting healthy and sustainable eating, supporting Indian agriculture, and encouraging the use of local, nutrient-rich ingredients. </p><p>The award was presented during the Borlaug Dialogue Week, hosted annually by the World Food Prize Foundation.</p>",
    "question_index": 111
  },

    "question": "<span class=\"eqt\"><p>Identify the correct statement(s).</p><p>1) Northeast Frontier Railway (NFR) has its headquarters at Maligaon, Guwahati.</p><p>2) East Coast Railway (ECoR) is headquartered at Visakhapatnam.</p><p>3) West Central Railway (WCR) has its headquarters at Jabalpur.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2346;&#2361;&#2330;&#2366;&#2344;&#2367;&#2319;&#2404;</p><p>1) &#2346;&#2370;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2352; &#2360;&#2368;&#2350;&#2366;&#2306;&#2340; &#2352;&#2375;&#2354;&#2357;&#2375; (&#2319;&#2344;&#2319;&#2347;&#2310;&#2352;) &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351;&#2366;&#2354;&#2351; &#2350;&#2366;&#2354;&#2367;&#2327;&#2366;&#2306;&#2357;, &#2327;&#2369;&#2357;&#2366;&#2361;&#2366;&#2335;&#2368; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404;</p><p>2) &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2340;&#2335; &#2352;&#2375;&#2354;&#2357;&#2375; (&#2312;&#2360;&#2368;&#2310;&#2352;) &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351;&#2366;&#2354;&#2351; &#2357;&#2367;&#2358;&#2366;&#2326;&#2366;&#2346;&#2340;&#2381;&#2340;&#2344;&#2350; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404;</p><p>3) &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2343;&#2381;&#2351; &#2352;&#2375;&#2354;&#2357;&#2375; (&#2337;&#2348;&#2381;&#2354;&#2381;&#2351;&#2370;&#2360;&#2368;&#2310;&#2352;) &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351;&#2366;&#2354;&#2351; &#2332;&#2348;&#2354;&#2346;&#2369;&#2352; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 3 are correct. Statement 2 is incorrect; ECoR HQ is at Bhubaneswar. Visakhapatnam is the HQ of South Coast Railway (notified in 2019).</p><p><b>Further Insights:</b></p><p>- NFR's jurisdiction covers the Northeast region; a key division is Katihar.</p><p>- ECoR major divisions include Khurda Road, Sambalpur, and Waltair (now with SCoR adjustments).</p><p>- WCR divisions: Jabalpur, Bhopal, Kota.</p>",
    "question_index": 112

    "question": "<span class=\"eqt\"><p>Given below are two statements marked as Assertion and Reason. Choose the correct option.</p><p>Assertion (A): NITI Aayog is a non-constitutional, non-statutory body.</p><p>Reason (R): It was created by an executive resolution in 2015 to replace the Planning Commission as the government's policy think tank.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2379; &#2360;&#2381;&#2335;&#2375;&#2335;&#2350;&#2375;&#2306;&#2335; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2366;&#2352;&#2381;&#2325; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2360;&#2361;&#2368; &#2321;&#2346;&#2381;&#2358;&#2344; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2344;&#2368;&#2340;&#2367; &#2310;&#2351;&#2379;&#2327; &#2319;&#2325; &#2327;&#2376;&#2352;-&#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325;, &#2327;&#2376;&#2352;-&#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2311;&#2360;&#2375; 2015 &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366; &#2310;&#2351;&#2379;&#2327; &#2325;&#2368; &#2332;&#2327;&#2361; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2346;&#2377;&#2354;&#2367;&#2360;&#2368; &#2341;&#2367;&#2306;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A is true: NITI Aayog is not a constitutional or statutory body.</p><p>R is true: It was set up via executive resolution on 1 January 2015, succeeding the Planning Commission.</p><p>R explains A because an executive resolution creates a non-statutory body.</p><p><b>Further Insights:</b></p><p>- The Prime Minister is the Chairperson; there is a Vice-Chairperson and full-time members.</p><p>- Governing Council includes Chief Ministers and Lt. Governors of UTs.</p><p>- NITI Aayog does not allocate plan funds to States; it acts as a policy think tank and fosterer of cooperative federalism.</p><p>- Anchors DMEO and Atal Innovation Mission.</p><p>- Flagship initiatives include Aspirational Districts Programme and SDG localization.</p><p>- Issues reports such as \"Strategy for New India @ 75\" and sectoral roadmaps.</p>",
    "question_index": 113
  },
  {
    "question": "<span class=\"eqt\"><p>An \"ad valorem\" indirect tax is one that</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; \"&#2350;&#2370;&#2354;&#2381;&#2351;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340;\" &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2357;&#2361; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379;</p></span>",
    "options": [
      "<span class=\"eqt\">Is charged as a fixed amount per unit, regardless of price</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2368;&#2350;&#2340; &#2325;&#2368; &#2346;&#2352;&#2357;&#2366;&#2361; &#2325;&#2367;&#2319; &#2348;&#2367;&#2344;&#2366;, &#2346;&#2381;&#2352;&#2340;&#2367; &#2351;&#2370;&#2344;&#2367;&#2335; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2366;&#2358;&#2367; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2358;&#2369;&#2354;&#2381;&#2325; &#2354;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Is charged as a percentage of the value of the taxed good or service</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352; &#2351;&#2379;&#2327;&#2381;&#2351; &#2357;&#2360;&#2381;&#2340;&#2369; &#2351;&#2366; &#2360;&#2375;&#2357;&#2366; &#2325;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Applies only to imported goods at the border</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2344;&#2367;&#2351;&#2350; &#2325;&#2375;&#2357;&#2354; &#2360;&#2368;&#2350;&#2366; &#2346;&#2352; &#2310;&#2351;&#2366;&#2340;&#2367;&#2340; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2346;&#2352; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Can be collected only by municipal authorities</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2375; &#2325;&#2375;&#2357;&#2354; &#2344;&#2327;&#2352;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2361;&#2368; &#2319;&#2325;&#2340;&#2381;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Ad valorem means the tax is a percentage of value; GST rates are ad valorem.</p><p>A fixed per-unit tax is a specific duty. Import-only taxes are customs; ad valorem can apply to domestic transactions too.</p><p>Local bodies levy own taxes but ad valorem is a general concept not limited to them.</p><p><b>Further Insights:</b></p><p>- Specific duties (e.g., per liter, per kg) do not vary with price and can stabilize revenue amid price changes.</p><p>- GST is a destination-based, value-added tax with input tax credit features.</p><p>- Excise (now subsumed for most goods under GST) was typically ad valorem.</p><p>- Customs duties can be ad valorem, specific, or mixed.</p>",
    "question_index": 114
  },
  {
    "question": "<span class=\"eqt\"><p>In animal evolution, which group is deuterostome, shows radial, indeterminate cleavage, and typically forms the coelom by enterocoely?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2368;&#2357;&#2379;&#2306; &#2325;&#2375; &#2357;&#2367;&#2325;&#2366;&#2360; &#2350;&#2375;&#2306;, &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2350;&#2370;&#2361; &#2337;&#2381;&#2351;&#2370;&#2335;&#2375;&#2352;&#2379;&#2360;&#2381;&#2335;&#2379;&#2350; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2352;&#2375;&#2337;&#2367;&#2351;&#2354;, &#2309;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2357;&#2367;&#2326;&#2306;&#2337;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2332;&#2379; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2319;&#2306;&#2335;&#2352;&#2379;&#2325;&#2379;&#2319;&#2354;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2379;&#2311;&#2354;&#2379;&#2350; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Echinodermata</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2368;&#2344;&#2379;&#2337;&#2352;&#2350;&#2366;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Annelida</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2375;&#2354;&#2367;&#2337;&#2366;</span>",
      "<span class=\"eqt\">Arthropoda</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2381;&#2352;&#2379;&#2346;&#2379;&#2337;&#2364;&#2366;</span>",
      "<span class=\"eqt\">Platyhelminthes</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2376;&#2335;&#2368;&#2361;&#2375;&#2354;&#2381;&#2350;&#2367;&#2344;&#2381;&#2341;&#2375;&#2360;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Deuterostomes include echinoderms and chordates; they have radial, indeterminate cleavage and enterocoelous coelom formation.</p><p>Annelida, Arthropoda, and Platyhelminthes are protostomes with spiral, determinate cleavage.</p><p><b>Further Insights:</b></p><p>- Chordata are also deuterostomes; Protostomes include Arthropoda, Mollusca, Annelida, and Platyhelminthes.</p><p>- In deuterostomes, the blastopore becomes the anus; in protostomes, it forms the mouth.</p><p>- Indeterminate cleavage allows identical twinning; determinate cleavage does not.</p><p>- Echinoderm larvae are bilateral; adults often become pentaradial.</p>",
    "question_index": 115
  },
