    "correct_option_id": 2,
    "solution": "<p>Numbers given: (1/<sup>3</sup>&radic;13), (1/<sup>2</sup>&radic;8) and (1/<sup>4</sup>&radic;19)</p><p><sup>3</sup>&radic;13 = (13)<sup>1/3</sup> = (13<sup>4</sup>)<sup>1/12</sup></p><p><sup>2</sup>&radic;8 = (8)<sup>1/2</sup> = (8<sup>6</sup>)<sup>1/12</sup></p><p><sup>4</sup>&radic;19 = (19)<sup>1/4</sup> = (19<sup>3</sup>)<sup>1/12</sup></p><p>Since, 8<sup>6</sup> &gt; 13<sup>4</sup> &gt; 19<sup>3</sup></p><p>So, (1/<sup>4</sup>&radic;19) &gt; (1/<sup>3</sup>&radic;13) &gt; (1/<sup>2</sup>&radic;8)</p>",

    "question": "<span class=\"eqt\"><p>The cost of 4 desks and 2 stools together is &#8377;3200, while the cost of 2 desks and 5 stools together is &#8377;2800. Find the total cost of 1 desk and 4 stools.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2366;&#2352; &#2337;&#2375;&#2360;&#2381;&#2325; &#2324;&#2352; &#2342;&#2379; &#2360;&#2381;&#2335;&#2370;&#2354; &#2325;&#2368; &#2325;&#2369;&#2354; &#2325;&#2368;&#2350;&#2340; &#8377;3200 &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2342;&#2379; &#2337;&#2375;&#2360;&#2381;&#2325; &#2324;&#2352; &#2346;&#2366;&#2306;&#2330; &#2360;&#2381;&#2335;&#2370;&#2354; &#2325;&#2368; &#2325;&#2369;&#2354; &#2325;&#2368;&#2350;&#2340; &#8377;2800 &#2361;&#2376;&#2404; &#2319;&#2325; &#2337;&#2375;&#2360;&#2381;&#2325; &#2324;&#2352; &#2330;&#2366;&#2352; &#2360;&#2381;&#2335;&#2370;&#2354; &#2325;&#2368; &#2325;&#2369;&#2354; &#2325;&#2368;&#2350;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "solution": "<p>Let the cost of 1 desk and 1 stool be Rs. A, and Rs. B respectively.</p><p>Given that</p><p>4A + 2B = 3200</p><p>2A + B = 1600 ... (1)</p><p>And</p><p>2A + 5B = 2800 ... (2)</p><p>After solving equations (1) and (2),</p><p>B = 300 and A = 650</p><p>Total cost of 1 desk and 4 stools = 650 + 4 * 300 = 650 + 1200 = Rs.1850</p>",

    "question": "<span class=\"eqt\"><p>There are two pipes U and V are attached to fill a cistern. The cistern can be filled in 104 minutes if both pipes are opened together. The same cistern can be filled in 156 minutes if pipe U alone is opened. How much time (in hours) will pipe V alone take, to fill up the same cistern?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2379; &#2346;&#2366;&#2311;&#2346; U &#2324;&#2352; V &#2332;&#2369;&#2337;&#2364;&#2375; &#2361;&#2369;&#2319; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; 104 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2366;&#2311;&#2346; U &#2325;&#2379; &#2326;&#2379;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2344; &#2335;&#2306;&#2325;&#2368; 156 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2366;&#2311;&#2346; V &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; (&#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306;) &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">5.5 hours</span><span class=\"hqt\" style=\"display:none\">5.5 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">5.2 hours</span><span class=\"hqt\" style=\"display:none\">5.2 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">5.4 hours</span><span class=\"hqt\" style=\"display:none\">5.4 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">5.3 hours</span><span class=\"hqt\" style=\"display:none\">5.3 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Pipe U alone fills the cistern in 156 minutes.</p><p>The part filled by pipe U in 1 min = 1/156</p><p>Let pipe V alone fill the cistern in V minutes.</p><p>The part filled by V in 1 min = 1/V</p><p>Pipe U and V together can fill in 104 minutes.</p><p>[(1/156) + (1/V)] = 1/104</p><p>=&gt; (1/V) = (1/104) - (1/156)</p><p>=&gt; 1/V = 1/312</p><p>=&gt; V = 312</p><p>Pipe V alone takes 312 minutes = 5.2 hours to fill the cistern.</p>",
    "question_index": 8
  },

    "question": "<span class=\"eqt\"><p>An article is sold at a certain price. If it is sold at 70% of this price, then there is a loss of 10%. What is the percentage profit when it is sold at the original selling price?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2348;&#2375;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; &#2311;&#2360; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2375; 70% &#2346;&#2352; &#2348;&#2375;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; 10% &#2325;&#2368; &#2361;&#2366;&#2344;&#2367; &#2313;&#2346;&#2327;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; &#2332;&#2348; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; &#2350;&#2370;&#2354; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2348;&#2375;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [

      "<span class=\"eqt\">(300/7)%</span><span class=\"hqt\" style=\"display:none\">(300/7)%</span>",
      "<span class=\"eqt\">(100/7)%</span><span class=\"hqt\" style=\"display:none\">(100/7)%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let original selling price = Rs.100</p><p>Second selling price = 100 * 70/100 = Rs.70</p><p>Loss% = 10%</p><p>Cost price = 70 * 100/ (100  -  10) = Rs. (700/9)</p><p>Profit% when it is sold at Rs.100 = [100  -  (700/9)] * 100/ (700/9)</p><p>= (200/9)/ (7/9)</p><p>= (200/7) %</p>",

    "question": "<span class=\"eqt\"><p>The speeds of A and B are in the ratio 3 : 5. A takes 30 minutes more than B to reach the destination. In how much time does A reach the destination?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3 : 5 &#2361;&#2376;&#2404; A &#2325;&#2379; &#2327;&#2306;&#2340;&#2357;&#2381;&#2351; &#2340;&#2325; &#2346;&#2361;&#2369;&#2306;&#2330;&#2344;&#2375; &#2350;&#2375;&#2306; B &#2360;&#2375; 30 &#2350;&#2367;&#2344;&#2335; &#2309;&#2343;&#2367;&#2325; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; A &#2327;&#2306;&#2340;&#2357;&#2381;&#2351; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2346;&#2361;&#2369;&#2305;&#2330;&#2340;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">1 hour</span><span class=\"hqt\" style=\"display:none\">1 &#2328;&#2306;&#2335;&#2366;</span>",

    "correct_option_id": 0,
    "solution": "<p>Let the speed of A and B is '3x' and '5x' respectively.</p><p>Let the time taken by A and B to reach the destination is 't' hours and 't  -  0.5' hours respectively.</p><p>Total distance = 3x * t = 5x * (t  -  0.5)</p><p>3t = 5t  -  2.5</p><p>2t = 2.5</p><p>t = 1.25 hours = 1 hour 15 minutes</p>",

    "question": "<span class=\"eqt\"><p>A mixture of 600 L contains milk and water in the ratio of 1: 2 respectively. If X L of the mixture is taken out and 60 L milk is mixed, then the ratio of the mixture of milk to water is 7: 10. Find the value of X</p></span><span class=\"hqt\" style=\"display:none\">600 &#2354;&#2368;&#2335;&#2352; &#2325;&#2375; &#2319;&#2325; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 1:2 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2360;&#2375; X &#2354;&#2368;&#2335;&#2352; &#2344;&#2367;&#2325;&#2366;&#2354;&#2325;&#2352; &#2313;&#2360;&#2350;&#2375;&#2306; 60 &#2354;&#2368;&#2335;&#2352; &#2342;&#2370;&#2343; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2375; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 7:10 &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [

    "question": "<span class=\"eqt\"><p>A circle with centre R has two chords KL and MN such that they intersect each other inside the circle at point S and LN is the diameter of the circle. If &#8736;MRL = 28&deg; and &#8736;KRN = 34&deg;, then what is the measure of &#8736;KSN?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; R &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2342;&#2379; &#2332;&#2368;&#2357;&#2366;&#2319;&#2305; KL &#2324;&#2352; MN &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306; &#2325;&#2367; &#2357;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2309;&#2306;&#2342;&#2352; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; S &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306; &#2324;&#2352; LN &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736;MRL = 28&deg; &#2324;&#2352; &#8736;KRN = 34&deg; &#2361;&#2376;, &#2340;&#2379; &#8736;KSN &#2325;&#2366; &#2350;&#2366;&#2346; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">30&deg;</span><span class=\"hqt\" style=\"display:none\">30&deg;</span>"

    "solution": "<p><img width=303 height=269 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23108/image021.jpg\"></p><p>The angle subtended at the centre of the circle by a chord is double the angle subtended at the circumference.</p><p>&#8736;KRN = 2 * &#8736;KMN</p><p>=&gt; &#8736;KMN = 34/2</p><p>=&gt; &#8736;KMN = 17&deg;</p><p>Similarly, &#8736;MRL = 2 * &#8736;MKL</p><p>=&gt; &#8736;MKL = 28/2</p><p>=&gt; &#8736;MKL = 14&deg;</p><p>In &#8710;MKS,</p><p>&#8736;KSN = &#8736;KMS + &#8736;MKS</p><p>=&gt; &#8736;KSN = 17&deg; + 14&deg;</p><p>=&gt; &#8736;KSN = 31&deg;</p>",
    "question_index": 19
  },

    "question": "<span class=\"eqt\"><p>A question is given, followed by two statements labelled I and II. Identify which of the statements is/are sufficient to answer the question.</p><p><b>Question:</b></p><p>Seven persons- H, I, J, K, L, M and N are living in a seven-storeyed building but not necessarily in the same order. The bottommost floor is 1 above that 2 and so on. Who among the following lives on the fourth floor?</p><p><b>Statements:</b></p><p>(I) Two floors are between J and N. I lives immediate above M and immediate below K. J lives above N but not below K.</p><p>(II) H lives above N and immediate below L. Three floors are between L and I. N does not lives on odd numbered floor.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; I &#2324;&#2352; II &#2360;&#2375; &#2354;&#2375;&#2348;&#2354; &#2325;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2346;&#2361;&#2330;&#2366;&#2344;&#2375;&#2306; &#2325;&#2367; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;&#2404;</p><p><b>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;:</b></p><p>&#2360;&#2366;&#2340; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;- H, I, J, K, L, M &#2324;&#2352; N &#2319;&#2325; &#2360;&#2366;&#2340; &#2350;&#2306;&#2332;&#2367;&#2354;&#2366; &#2311;&#2350;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2344;&#2361;&#     "solution": "<p>Seven persons- H, I, J, K, L, M and N are living in a seven-storeyed building but not necessarily in the same order. The bottommost floor is 1 above that 2 and so on.</p><p><b>Statement (I): </b>Two floors are between J and N. I lives immediate above M and immediate below K. J lives above N but not below K.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Floor</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Person</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">J</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">K</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">M</td></tr></table><p>N lives on the fourth floor.</p><p><b>Statement (II):</b> H lives above N and immediate below L. Three floors are between L and I. N does not lives on an odd numbered floor.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Floor</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Person</b><     "solution": "<p>In this format;</p><p><img width=153 height=120 id=\"Picture 38\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24963/image051.jpg\"></p><p>Face having number 1 lies opposite to the face having number 3.</p><p>Face having number 2 lies opposite to the face having number 4.</p><p>Face having number 5 lies opposite to the face having number 6.</p><p>Thus, the face having <b>to</b> lies opposite to the face having <b>so</b>; the face having <b>on</b> lies opposite to the face having <b>do</b> and the face having <b>or</b> lies opposite to the face having <b>ok</b>.</p><p>Figure (I): <b>on</b> lies opposite to <b>do</b>. So, faces having <b>on</b> and <b>do</b> should not be adjacent to each other.</p><p>Figure (II): <b>ok</b> lies opposite to <b>or</b>. So, faces having <b>ok</b> and <b>or</b> should not be adjacent to each other.</p><p>Figure (III): <b>to</b> lies opposite to <b>so</b>. So, faces having <b>to</b> and <b>so</b> should not be adjacent to each other.</p>",

    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The guests have arrived at the party, __________? </p>",
    "options": [

    "correct_option_id": 3,
    "solution": "<p>The most appropriate option to fill in the blank is 'haven't they'. When the main sentence/clause is positive, the question tag should be negative, and vice versa. In the given case, the main sentence/clause is positive. Therefore, the question tag should be negative. Additionally, there is an auxiliary verb 'have' in the main sentence/clause, so the question tag should also contain the same auxiliary verb. Accordingly, option (d) is correct because it maintains the opposite polarity (positive main sentence, negative question tag) and uses the same auxiliary verb (\"have\").</p><p>Option (a) is incorrect as it uses \"didn't,\" which is not consistent with the original auxiliary verb 'have'. The forms of 'do' (does, do, did) are used when there is no auxiliary verb in the main clause.</p><p>Option (b) is not correct because it does not adhere to the grammatical rule that a positive main clause should have a negative question tag (\"do they\" is an affirmative question tag).</p><p>Option (c) is incorrect as it uses \"isn't,\" which is not consistent with the original auxiliary verb 'have'.</p><p>Hence, (d) is the correct answer.</p><p><b>The complete sentence is:</b> \"The guests have arrived at the party, haven't they?\"</p><p><b>NOTE:</b></p><p>Auxiliary verb: A verb that gives grammatical information that is not given by the main verb of a sentence. It supports the main verb. Auxiliary verbs help to form the various tenses, moods, and voices of other verbs. The principal ones are be, do, and have. Example: She will sing a song tomorrow. Here, 'will' is the auxiliary verb that supports the main verb 'sing'.</p><p><b>\"Clause: </b>A clause is a group of words that contains a verb (and usually other components too). A clause may form part of a sentence, or it may be a complete sentence in itself. Example: </p><p>I. \"His products weren't selling\"; this is an example of a sentence containing one clause. </p><p>II. \"After we had had dinner, we went for a walk\"; here, the sentence contains two clauses that are separated by a comma.</p><p>A clause can be categorised as: </p><p>I. Main/independent clause</p><p>II. Subordinate/dependent clause</p><p><b>Main/independent clause:</b> In the example 2 given above, the clause \"we went for a walk\" can be said as the main clause (a clause that is not dependent on any other clause for its meaning, it makes sense on its own; a sentence contains at least one main clause.) </p><p><b>Subordinate/dependent clause:</b> In example 2 given above, the clause \"After we had had dinner\" is a subordinate clause: it depends on the main clause for its meaning and cannot exist as a sentence on its own\"</p>",

    "question": "<p>Which among the following sentences uses the article (if required) before the word 'Seine' correctly?</p>",
    "options": [
      "The city of Paris is located on the Seine River.",
      "The city of Paris is located on a Seine River.",

    ],
    "correct_option_id": 0,
    "solution": "<p>The correct sentence is <b>option a)</b>. </p><p>Rule for \"the\" with geographical features: We generally use the definite article \"the\" before names of rivers, oceans, seas, mountain ranges, and groups of islands.</p><p>a): Correct. \"Seine River\" is a specific river, and thus requires \"the.\"</p><p>b): Incorrect. \"A\" is used for non-specific singular countable nouns. The Seine is a specific, unique river.</p><p>c): Incorrect. Aside from the incorrect choice of article, \"Seine\" starts with a consonant sound, so \"an\" would never be used.</p><p>d): Incorrect. Missing the definite article \"the.\"</p><p><b>Note: Countable and uncountable nouns: 1. Countable nouns</b> are the class of nouns that can be counted, for example, 'table'  -  one table, two tables, three tables, etc. <b>2. Uncountable nouns </b>are the nouns that cannot be counted or usually are not counted, for example, light, water, milk, information, furniture, etc. They do not generally have a plural form and can't be preceded by<b> 'a' </b>or <b>'an'. </b>Many abstract nouns are typically uncountable. Some uncountable nouns can be used in the plural as well, depending on the meaning or context of the word.</p><p><b>Definite and indefinite articles:</b> In the English language, we have one definite article, 'the'; it refers to or introduces a particular, specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",
    "question_index": 100
  },

    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. In case no substitution is needed, select 'No substitution required'.</p><p>This is the limited edition watch <u>which I</u> was searching.</p>",
    "options": [
      "that I",
      "who I",
      "whom me",
      "No substitution required"
    ],
    "correct_option_id": 0,
    "solution": "<p>'That' is used to introduce a <b>restrictive clause</b>. A restrictive clause is one that is essential to the meaning of a sentence. If it is removed, it will alter the meaning of the sentence.</p><p>For example: This is the laptop <b>that</b> I was searching. ('that I was searching' is the restrictive clause. If it is removed, the meaning of the sentence will change.)</p><p>'Which' is used to introduce a <b>non-restrictive clause</b>. A non-restrictive clause is one that is not essential to the meaning of a sentence. Even if it is removed, it will not have an effect on the sentence.</p><p>For example: Laptops, which are used to do work, are available in this market. (Here, 'which are used to do work' is the non-restrictive clause. It is not essential to the sentence.)</p><p>Similarly, in this context, 'that I was searching' should be a <b>restrictive clause</b>. So, 'that I' is appropriate and hence, the sentence needs an improvement.</p><p>'Who' is used to introduce a clause giving further information about a person or people previously mentioned. As 'watch' is a thing, the use of 'who' is wrong. So, option (b) is incorrect.</p><p>Also, 'whom' is used instead of 'who' as the object of a verb or preposition and thus, option (c) is an incorrect option.</p><p>Thus, 'that I' should replace 'which I'.</p><p>Therefore, the correct answer is: <b>(a) that I</b>.</p><p>The corrected form of the sentence is: This is the limited edition watch <b><u>that I</u></b> was searching.</p>",
    "question_index": 102
  },

    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Jonah know the way to the hospital even though he's never been there.</p>",
    "options": [

      "even though he's",
      "never been there",
      "way to the hospital"
    ],
    "correct_option_id": 0,
    "solution": "<p>There is an error in the subject-verb agreement. </p><p>The subject 'Jonah' is a 'singular noun'. The verb following it should also be singular. But 'know' is a plural verb (third person plural). Replace it with the singular verb 'knows' (third person singular) to rectify the error. </p><p><b>Correct Sentence: </b>Jonah <b>knows</b> the way to the hospital even though he's never been there.</p><p>So, option a) is the segment that contains a grammatical error. </p><p>Hence, option a) is correct.</p><p><b>Note: </b></p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 103
  },

    "question": "<p>Select the option that expresses the following sentence in superlative degree of comparison.</p><p>He is less friendly than his sister.</p>",
    "options": [
      "He is not friendly like his sister.",
      "His sister is more friendly than he is.",
      "He and his sister have equal friendliness.",
      "He is the least friendly among his siblings."
    ],
    "correct_option_id": 3,
    "solution": "<p>The adjective is 'friendly' and it is in the comparative degree with the use of 'less', which means it compares one thing or person with another and shows that it has a higher or lower degree of quality. To change a sentence from the comparative degree to the superlative degree, we need to use 'least' before an adjective and use the word 'the' before it. The superlative degree shows that something or someone has the lowest degree of quality among all the others in a group.</p><p>Hence, option (d) is the correct answer. </p><p>Options (a) and (c) are in positive degree. </p><p>Option (b) is in comparative degree.</p><p><b>Note:</b></p><p><b>Adjectives:</b> Words which are used with a noun/pronoun to describe or point out, the person, animal, place, or thing which the noun names, or to tell the number or quantity, are called Adjectives.</p><p>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 104
  },

    "correct_option_id": 2,
    "solution": "<p><b>Explanation of Statements:</b></p><p>&#183; <b>I. is Correct.</b> Nominal GDP is calculated at current market prices. If prices rise (inflation) while the physical quantity of goods produced remains the same, the Nominal GDP will still increase.</p><p>&#183; <b>II. is Correct.</b> Inflation affects Nominal GDP because it is price-sensitive. Real GDP is adjusted for inflation (calculated at base-year prices), meaning it only reflects changes in the actual volume of output.</p><p><b>Further Insights:</b></p><p>&#183; The ratio of Nominal GDP to Real GDP is known as the <b>GDP Deflator</b>, which serves as a measure of the level of prices of all new, domestically produced, final goods and services in an economy.</p>",

    "question": "<span class=\"eqt\"><p>In the 4th Thailand Open International Boxing Tournament, Deepak and Naman Tanwar securing two golds for India, in June 2025. How many total medals did India win at the 4th Thailand Open International Boxing Tournament?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2370;&#2344; 2025 &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2330;&#2380;&#2341;&#2375; &#2341;&#2366;&#2312;&#2354;&#2376;&#2306;&#2337; &#2323;&#2346;&#2344; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2358;&#2344;&#2354; &#2348;&#2377;&#2325;&#2381;&#2360;&#2367;&#2306;&#2327; &#2335;&#2370;&#2352;&#2381;&#2344;&#2366;&#2350;&#2375;&#2306;&#2335; &#2350;&#2375;&#2306; &#2342;&#2368;&#2346;&#2325; &#2324;&#2352; &#2344;&#2350;&#2344; &#2340;&#2344;&#2357;&#2352; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2379; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2346;&#2342;&#2325; &#2332;&#2368;&#2340;&#2375;&#2404; &#2330;&#2380;&#2341;&#2375; &#2341;&#2366;&#2312;&#2354;&#2376;&#2306;&#2337; &#2323;&#2346;&#2344; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2358;&#2344;&#2354; &#2348;&#2377;&#2325;&#2381;&#2360;&#2367;&#2306;&#2327; &#2335;&#2370;&#2352;&#2381;&#2344;&#2366;&#2350;&#2375;&#2306;&#2335; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2342;&#2325; &#2332;&#2368;&#2340;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>"

    "correct_option_id": 2,
    "solution": "<p>In the 4th Thailand Open International Boxing Tournament, Deepak and Naman Tanwar spearheaded India's campaign, securing two golds as part of an impressive <b>eight-medal</b> haul.</p><p>Deepak clinched the gold with a 5:0 win over Abdurakhimov Javokhir of Uzbekistan in the 75 kg final, while Naman got the better of China's Han Xuezhen 4:1 in the 90 kg category. In the women's 80 kg final, Kiran went down 2:3 to Kazakhstan's Yeldana Talipova in a keenly fought bout to settle for a silver. </p><p>Five Indian women boxers, Tamanna (51kg), Priya (57kg), Sanju (60kg), Saneh (70kg), and Lalfakmawii Ralte (80kg), came up with strong performances to win bronze medals.</p>",

  },

    "question": "<span class=\"eqt\"><p>In July 2025, which village in Sikkim's Pakyong district was declared India's first digital nomad village under the 'Nomad Sikkim' initiative?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2369;&#2354;&#2366;&#2312; 2025 &#2350;&#2375;&#2306;, &#2360;&#2367;&#2325;&#2381;&#2325;&#2367;&#2350; &#2325;&#2375; &#2346;&#2366;&#2325;&#2351;&#2379;&#2306;&#2327; &#2332;&#2367;&#2354;&#2375; &#2325;&#2375; &#2325;&#2367;&#2360; &#2327;&#2366;&#2306;&#2357; &#2325;&#2379; '&#2344;&#2379;&#2350;&#2376;&#2337; &#2360;&#2367;&#2325;&#2381;&#2325;&#2367;&#2350;' &#2346;&#2361;&#2354; &#2325;&#2375; &#2340;&#2361;&#2340; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2344;&#2379;&#2350;&#2376;&#2337; &#2327;&#2366;&#2306;&#2357; &#2328;&#2379;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Yakten</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2366;&#2325;&#2340;&#2375;&#2344;</span>",
      "<span class=\"eqt\">Ravangla</span><span class=\"hqt\" style=\"display:none\">Ravangla</span>",
      "<span class=\"eqt\">Dzongu</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2379;&#2306;&#2327;&#2370;</span>",
      "<span class=\"eqt\">Namchi</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2350;&#2330;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Yakten</b>, a village in Sikkim's Pakyong district, was officially declared India's first digital nomad village. </p><p>A collaboration between the district administration and NGO Sarvahitey under the 'Nomad Sikkim' initiative, the project aims to transform strategic locations in the Himalayan State into year-round hubs for digital professionals across India and abroad,while ensuring sustainable income opportunities for homestay owners. </p><p>Officials said the initiative was fuelled by Chief Minister Prem Singh Tamang's concern over the lack of steady income for homestay operators during the off-season, which may stretch for six months from April-May.</p>",
    "question_index": 111
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article empowers Parliament to create new All-India Services?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2360;&#2306;&#2360;&#2342; &#2325;&#2379; &#2344;&#2312; &#2309;&#2326;&#2367;&#2354; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2371;&#2332;&#2344; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 249</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 249</span>",
      "<span class=\"eqt\">Article 312</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 312</span>",
      "<span class=\"eqt\">Article 315</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 315</span>",
      "<span class=\"eqt\">Article 320</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 320</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Article 312 empowers Parliament to create new All-India Services.</b> </p><p><b>Explanation of Articles:</b></p><p>&#183; <b>Article 249:</b> Relates to the power of Parliament to legislate with respect to a matter in the State List in the national interest.</p><p>&#183; <b>Article 312:</b> States that if the Rajya Sabha declares by resolution (supported by two-thirds of the members present and voting) that it is necessary in the national interest, Parliament may by law provide for the creation of one or more all-India services common to the Union and the States.</p><p>&#183; <b>Article 315:</b> Deals with the Public Service Commissions for the Union and the States.</p><p>&#183; <b>Article 320:</b> Enumerates the functions of the Public Service Commissions.</p><p><b>Further Insights:</b></p><p>&#183; Currently, there are three All-India Services: Indian Administrative Service (IAS), Indian Police Service (IPS), and Indian Forest Service (IFoS).</p>",
    "question_index": 112
  },
  {

      "<span class=\"eqt\">Rural reconstruction through Gandhian methods</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2306;&#2343;&#2368;&#2357;&#2366;&#2342;&#2368; &#2346;&#2342;&#2381;&#2343;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2346;&#2369;&#2344;&#2352;&#2381;&#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339;</span>",
      "<span class=\"eqt\">Spiritual philosophy of Vedanta</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2342;&#2366;&#2306;&#2340; &#2325;&#2366; &#2310;&#2343;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2367;&#2325; &#2342;&#2352;&#2381;&#2358;&#2344;</span>"

    "correct_option_id": 1,
    "solution": "<p>&#183; Anandamath by <b>Bankim Chandra Chattopadhyay</b> revolves around <b>ascetic revolutionaries</b>, the <b>Santhal rebellion background</b>, and the emergence of <b>nationalist consciousness</b>.</p><p>&#183; The novel also introduced <b>\"Vande Mataram\"</b>, later becoming a national song.</p>",

    "question": "<span class=\"eqt\"><p>Which ecological pyramid is always upright?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368;&#2351; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2361;&#2350;&#2375;&#2358;&#2366; &#2360;&#2368;&#2343;&#2366; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Number</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Biomass</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2351;&#2379;&#2350;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Energy</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2352;&#2381;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Population</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>The Pyramid of Energy is always upright. </b></p><p>&#183; According to the 10% law of energy transfer, energy is lost as heat at each trophic level.</p><p>&#183; Therefore, the energy available at a higher level is always less than the level below it, making the pyramid impossible to invert.</p>",
    "question_index": 114
  },

    "question": "<span class=\"eqt\"><p>Match the Following</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I (Wind)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II (Region)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Chinook</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Argentina</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B.Loo</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. North America</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C.Pampero</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Indo-Gangetic plains</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Sirocco</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Mediterranean</td></tr></table><p>Correct code:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; I (&#2346;&#2357;&#2344;)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; II (&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2330;&#2367;&#2344;&#2370;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2309;&#2352;&#2381;&#2332;&#2375;&#2306;&#2335;&#2368;&#2344;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2354;&#2370;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2309;&#2350;&#2375;&#2352;&#2367;&#2325;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2346;&#2376;&#2350;&#2381;&#2346;&#2375;&#2352;&#2379;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2311;&#2306;&#2337;&#2379;-&#2327;&#2306;&#2327;&#2366; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2360;&#2367;&#2352;&#2379;&#2325;&#2379;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2349;&#2370;&#2350;&#2343;&#2381;&#2351;&#2360;&#2366;&#2327;&#2352;&#2368;&#2351;</td></tr></table><p>&#2360;&#2361;&#2368; &#2325;&#2379;&#2337;:</p></span>",
    "options": [
      "<span class=\"eqt\">A-3, B-2, C-1, D-4</span><span class=\"hqt\" style=\"display:none\">A-3, B-2, C-1, D-4</span>",
      "<span class=\"eqt\">A-2, B-1, C-3, D-4</span><span class=\"hqt\" style=\"display:none\">A-2, B-1, C-3, D-4</span>",
      "<span class=\"eqt\">A-2, B-3, C-1, D-4</span><span class=\"hqt\" style=\"display:none\">A-2, B-3, C-1, D-4</span>",

    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Chinook:</b> Warm dry wind in North America (Rocky Mountains).</p><p>&#183; <b>Loo:</b> Hot, dry summer wind in the Indo-Gangetic plains.</p><p>&#183; <b>Pampero:</b> Cold wind in the Pampas of Argentina.</p><p>&#183; <b>Sirocco:</b> Mediterranean wind blowing from the Sahara.</p>",

  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following about Oceanic Salinity:</p><p>I. Highest salinity occurs near subtropical highs</p><p>II. Salinity decreases near equator due to rainfall</p><p>III. Baltic Sea has high salinity</p><p>IV. Evaporation increases salinity</p><p>Correct answer:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352;&#2368;&#2351; &#2354;&#2357;&#2339;&#2340;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2313;&#2346;&#2379;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2313;&#2330;&#2381;&#2330; &#2342;&#2348;&#2366;&#2357; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2346;&#2366;&#2360; &#2313;&#2330;&#2381;&#2330;&#2340;&#2350; &#2354;&#2357;&#2339;&#2340;&#2366; &#2346;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;</p><p>II. &#2357;&#2352;&#2381;&#2359;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2349;&#2370;&#2350;&#2343;&#2381;&#2351; &#2352;&#2375;&#2326;&#2366; &#2325;&#2375; &#2346;&#2366;&#2360; &#2354;&#2357;&#2339;&#2340;&#2366; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;</p><p>III. &#2348;&#2366;&#2354;&#2381;&#2335;&#2367;&#2325; &#2360;&#2366;&#2327;&#2352; &#2350;&#2375;&#2306; &#2313;&#2330;&#2381;&#2330; &#2354;&#2357;&#2339;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;</p><p>IV. &#2357;&#2366;&#2359;&#2381;&#2346;&#2368;&#2325;&#2352;&#2339; &#2360;&#2375; &#2354;&#2357;&#2339;&#2340;&#2366; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2376;</p><p>&#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352;:</p></span>",
    "options": [
      "<span class=\"eqt\">I, II and IV</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II, III and IV</span><span class=\"hqt\" style=\"display:none\">I, II, III &#2324;&#2352; IV</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements I, II, and IV are correct. </b></p><p><b>Statement III is incorrect because the Baltic Sea has very low salinity.</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>I. is Correct.</b> Subtropical highs experience high evaporation and low rainfall, leading to high salt concentration.</p><p>&#183; <b>II. is Correct.</b> High rainfall at the equator dilutes the seawater, lowering salinity.</p><p>&#183; <b>III. is Incorrect.</b> The Baltic Sea has very low salinity due to high river inflow and low evaporation.</p><p>&#183; <b>IV. is Correct.</b> Evaporation removes freshwater, leaving minerals behind and increasing salinity.</p>",
    "question_index": 116
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT included while calculating GDP at market prices?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2340;&#2375; &#2360;&#2350;&#2351; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Compensation of employees</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2350;&#2369;&#2310;&#2357;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Consumption of fixed capital</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2352; &#2346;&#2370;&#2306;&#2332;&#2368; &#2325;&#2366; &#2313;&#2346;&#2349;&#2379;&#2327;</span>",
      "<span class=\"eqt\">Net indirect taxes</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2342;&#2381;&#2343; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352;</span>",
      "<span class=\"eqt\">Transfer payments</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2339; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Transfer payments are NOT included in the calculation of GDP.</b> </p><p><b>Explanation of Components:</b></p><p>&#183; <b>Compensation of employees:</b> Included as it represents the income earned by labor for productive services.</p><p>&#183; <b>Consumption of fixed capital:</b> (Depreciation) included in the \"Gross\" part of GDP.</p><p>&#183; <b>Net indirect taxes:</b> Included to convert factor cost to market prices.</p><p>&#183; <b>Transfer payments:</b> Incorrect to include because these are payments (like pensions or subsidies) made without any corresponding production of goods or services. GDP only counts productive economic activity.</p>",
    "question_index": 117
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the correct statement(s).</p><p>Statement I: Work done by centripetal force in circular motion is zero.</p><p>Statement II: Centripetal force is always perpendicular to velocity.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2327;&#2340;&#2367; &#2350;&#2375;&#2306; &#2309;&#2349;&#2367;&#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352; &#2348;&#2354; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2358;&#2370;&#2344;&#2381;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2309;&#2349;&#2367;&#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352; &#2348;&#2354; &#2361;&#2350;&#2375;&#2358;&#2366; &#2357;&#2375;&#2327; &#2325;&#2375; &#2354;&#2306;&#2348;&#2357;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>I. is Correct.</b> Work is defined as F&#8901;d&#8901;cos(&#952;).Since the force and displacement are perpendicular (&#952;=90&#8728;), the work done is zero.</p><p>&#183; <b>II. is Correct.</b> In uniform circular motion, the centripetal force acts towards the center, while the velocity is tangential, making them always perpendicular.</p>",

    "question": "<span class=\"eqt\"><p>Identify the true statement regarding census 2011.</p><p>Statement I: Literacy rate excludes 0 - 6 age group.</p><p>Statement II: Work participation rate includes main and marginal workers.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2327;&#2339;&#2344;&#2366; 2011 &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2360;&#2366;&#2325;&#2381;&#2359;&#2352;&#2340;&#2366; &#2342;&#2352; &#2350;&#2375;&#2306; 0-6 &#2310;&#2351;&#2369; &#2357;&#2352;&#2381;&#2327; &#2358;&#2366;&#2350;&#2367;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2325;&#2366;&#2352;&#2381;&#2351; &#2360;&#2361;&#2349;&#2366;&#2327;&#2367;&#2340;&#2366; &#2342;&#2352; &#2350;&#2375;&#2306; &#2350;&#2369;&#2326;&#2381;&#2351; &#2324;&#2352; &#2360;&#2368;&#2350;&#2366;&#2306;&#2340; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>I. is Correct.</b> In the Indian Census, a person aged 7 and above who can read and write with understanding is treated as literate. Children in the 0 - 6 age group are treated as illiterate by default.</p><p>&#183; <b>II. is Correct.</b> The Work Participation Rate includes both \"Main Workers\" (those who worked for 6 months or more) and \"Marginal Workers\" (those who worked for less than 6 months).</p>",

    "question": "<span class=\"eqt\"><p>The Lok Sabha passed The Promotion and Regulation of Online Gaming Bill, 2025, by a voice vote August 20, 2025. Identify the CORRECT Statement(s) Regarding this.</p><p>I. The Bill classifies any game involving an entry fee or monetary deposit as an 'online money game,' regardless of whether it is skill-based or chance-based.</p><p>II. Repeat offences of online real-money games can lead to 3-5 years imprisonment with fines.</p><p>III. Banks, payment providers, or intermediaries processing RMG payments face up to Five years in prison and a fine of Rs. 50 lakh.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2344;&#2375; 20 &#2309;&#2327;&#2360;&#2381;&#2340;, 2025 &#2325;&#2379; &#2343;&#2381;&#2357;&#2344;&#2367; &#2350;&#2340; &#2360;&#2375; &#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2327;&#2375;&#2350;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2379;&#2340;&#2381;&#2360;&#2366;&#2361;&#2344; &#2319;&#2357;&#2306; &#2357;&#2367;&#2344;&#2367;&#2351;&#2350;&#2344; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;, 2025 &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404; &#2311;&#2360; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2346;&#2361;&#2330;&#2366;&#2344;&#2375;&#2306;&#2404;</p><p>I. &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2320;&#2360;&#2375; &#2326;&#2375;&#2354; &#2325;&#2379; '&#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2350;&#2344;&#2368; &#2327;&#2375;&#2350;' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2358;&#2369;&#2354;&#2381;&#2325; &#2351;&#2366; &#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2332;&#2350;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;, &#2330;&#2366;&#2361;&#2375; &#2357;&#2361; &#2325;&#2380;&#2358;&#2354;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2361;&#2379; &#2351;&#2366; &#2360;&#2306;&#2351;&#2379;&#2327;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340;&#2404;</p><p>II. &#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2352;&#2367;&#2351;&#2354;-&#2350;&#2344;&#2368; &#2327;&#2375;&#2350;&#2381;&#2360; &#2325;&#2375; &#2348;&#2366;&#2352;-&#2348;&#2366;&#2352; &#2313;&#2354;&#2381;&#2354;&#2306;&#2328;&#2344; &#2325;&#2375; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; 3-5 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2325;&#2376;&#2342; &#2324;&#2352; &#2332;&#2369;&#2352;&#2381;&#2350;&#2366;&#2344;&#2366; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2352;&#2367;&#2351;&#2354;-&#2350;&#2344;&#2368; &#2327;&#2375;&#2350;&#2367;&#2306;&#2327; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2360;&#2366;&#2343;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306;, &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2346;&#2381;&#2352;&#2342;&#2366;&#2340;&#2366;&#2323;&#2306; &#2351;&#2366; &#2350;&#2343;&#2381;&#2351;&#2360;&#2381;&#2341;&#2379;&#2306; &#2325;&#2379; &#2346;&#2366;&#2306;&#2330; &#2357;&#2352;&#2381;&#2359; &#2340;&#2325; &#2325;&#2368; &#2325;&#2376;&#2342; &#2324;&#2352; 50 &#2354;&#2366;&#2326; &#2352;&#2369;&#2346;&#2351;&#2375; &#2340;&#2325; &#2325;&#2366; &#2332;&#2369;&#2352;&#2381;&#2350;&#2366;&#2344;&#2366; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">II Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">III Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">I and III Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and II Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Lok Sabha passed The Promotion and Regulation of Online Gaming Bill, 2025, by a voice vote August 20, 2025. The Bill seeks 'to prohibit the offering, operation, facilitation, advertisement, promotion and participation in online money games', targeting firms that offer fantasy sports and card games where users can deposit and risk money. Online real-money gaming (RMG) refers to digital platforms where players pay to participate in games and can win cash rewards. These include any online games involving cash stakes and monetary winnings. Banks and payment providers will also be prohibited from processing RMG transactions. Under the draft Bill, all online real-money gaming services are covered. This means any game where users stake or win money would be banned, as the Bill makes it an offence to 'offer, aid, abet, induce, or otherwise promote' such games.</p><p>&#183; The Bill specifically distinguishes e-sports and online social games (where players spend on in-app purchases or ads but do not win cash rewards).</p><p>&#183; A new authority (or an existing one) will be tasked with promoting and regulating e-sports, while banning RMG.</p><p>The'Promotion and Regulation of Online Gaming Bill, 2025, cleared by the Union Cabinet, seeks to:</p><p>&#183; Ban any person or company from offering, aiding, or promoting online money games.</p><p>&#183; Classify any game involving an entry fee or monetary deposit as an 'online money game,' regardless of whether it is skill- or chance-based.</p><p>&#183; Prohibit advertisements for such games.</p><p>&#183; Bar banks and financial institutions from processing payments linked to these platforms.</p><p><b>Penalties and non-compliance under new online gaming bill</b> The Bill also seeks to impose heavy penalties for those caught breaking the rule. These penalties include:</p><p>&#183; Up to three years' imprisonment and fines of Rs.1 crore for hosting such games.</p><p>&#183; Up to two years' imprisonment and fines of Rs.50 lakh for promoting them.</p><p>Other legal provisions in the bill include:</p><p>&#183; <b>Repeat offences</b>: Hosting or facilitating RMG a second time can draw a mandatory minimum of three years' imprisonment (up to five years) and fines between Rs.1 crore and Rs.2 crore. Repeat advertising violations carry 2-3 years' jail and fines between Rs.50 lakh and Rs.1 crore.</p><p>&#183; <b>Corporate liability</b>: If a company is involved, directors and managers can be prosecuted unless they prove the offence happened without their knowledge or despite due diligence. Independent/non-executive directors are exempt.</p><p>&#183; <b>Banks, payment providers, or intermediaries'who process RMG payments face up to 3 years in prison and a Rs.1 crore fine.</b></p><p>Failure to follow directions from the central government or the new authority may lead to Rs.10 lakh fine, suspension or cancellation of registration, and prohibition from operating. Offences related to hosting and financial facilitation are explicitly declared cognisable and non-bailable under the Bharatiya Nagarik Suraksha Sanhita (BNSS), 2023.</p><p>&#183; A new authority will be set up to oversee the enforcement of the Bill. It is expected to cost about Rs.50 crore initially and Rs.20 crore annually, funded from the Consolidated Fund of India.</p>",
    "question_index": 120
  },

    "question": "<span class=\"eqt\"><p>Ancillary industries differ from basic heavy industries because:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2366;&#2351;&#2325; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2350;&#2370;&#2354;&#2349;&#2370;&#2340; &#2349;&#2366;&#2352;&#2368; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2360;&#2375; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">They produce consumer goods meant for direct household consumption</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2346;&#2349;&#2379;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2306; &#2348;&#2344;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Their final products serve as inputs or components for other manufacturing industries</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2325;&#2375; &#2309;&#2306;&#2340;&#2367;&#2350; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2309;&#2344;&#2381;&#2351; &#2357;&#2367;&#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2311;&#2344;&#2346;&#2369;&#2335; &#2351;&#2366; &#2328;&#2335;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They exclusively depend on agricultural raw materials</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2325;&#2371;&#2359;&#2367; &#2325;&#2330;&#2381;&#2330;&#2375; &#2350;&#2366;&#2354; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They are always located near ports for export purposes</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2311;&#2344;&#2381;&#2361;&#2375;&#2306; &#2361;&#2350;&#2375;&#2358;&#2366; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;&#2379;&#2306; &#2325;&#2375; &#2346;&#2366;&#2360; &#2361;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Ancillary industries manufacture <b>parts, components, and intermediate goods</b> (such as tyres, nails, iron sheets, engine parts) which are <b>used as raw material or inputs</b> by other industries producing heavy articles like trucks, railway engines, tractors, etc.</p><p>&#183; They <b>do not produce final consumer goods</b>, nor are they necessarily agro-based or port-oriented.</p>",
    "question_index": 121
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct?</p><p>Statement I: The Governor can reserve a state bill for the President even if it is not unconstitutional.</p><p>Statement II: Reservation of a bill by the Governor is discretionary in nature.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344; 1: &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2379; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2357;&#2361; &#2309;&#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2344; &#2361;&#2379;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2379; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2357;&#2367;&#2357;&#2375;&#2325;&#2366;&#2343;&#2368;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I is correct. </b></p><p><b>Statement II is incorrect because while the Governor enjoys constitutional discretion in many matters, the reservation of certain bills (specifically those that derogate from the powers of the High Court) is mandatory, not discretionary.</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>I. is Correct.</b> Under Article 200, the Governor can reserve a bill for the consideration of the President. This is not limited to unconstitutional bills; the Governor may reserve a bill if it is against the Directive Principles of State Policy, against the larger interest of the country, or of grave national importance.</p><p>&#183; <b>II. is Incorrect.</b> Generally, the Governor's power to reserve a bill for the President is a discretionary power. However, Article 200 states that the Governor <b>must</b> reserve any bill which, in his opinion, would so derogate from the powers of the High Court as to endanger the position which that Court is by the Constitution designed to fill.</p><p><b>Further Insights:</b></p><p>&#183; Once a bill is reserved for the President, the Governor has no further role in its enactment. The President can give his assent, withhold it, or direct the Governor to return the bill to the State Legislature for reconsideration.</p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the true statement.</p><p>Statement I: Ayushman Bharat has both insurance and wellness components.</p><p>Statement II: PM-JAY is funded fully by States.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2310;&#2351;&#2369;&#2359;&#2381;&#2350;&#2366;&#2344; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2348;&#2368;&#2350;&#2366; &#2324;&#2352; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2342;&#2379;&#2344;&#2379;&#2306; &#2328;&#2335;&#2325; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2346;&#2368;&#2319;&#2350;-&#2332;&#2375;&#2319;&#2357;&#2366;&#2312; &#2325;&#2366; &#2346;&#2370;&#2352;&#2366; &#2357;&#2367;&#2340;&#2381;&#2340;&#2346;&#2379;&#2359;&#2339; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I is correct. </b></p><p><b>Statement II is incorrect because PM-JAY is a Centrally Sponsored Scheme funded by both the Centre and the States.</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>I. is Correct.</b> Ayushman Bharat has two components: Health and Wellness Centres (HWCs) and the Pradhan Mantri Jan Arogya Yojana (PM-JAY).</p><p>&#183; <b>II. is Incorrect.</b> PM-JAY is funded in a ratio of 60:40 for most states and 90:10 for North-Eastern and Himalayan states. It is not fully funded by the States.</p>",
    "question_index": 123
  },
