    "question": "<span class=\"eqt\"><p>Consider the following about Money Multiplier:</p><p>I. It is inversely related to Cash Reserve Ratio</p><p>II. Higher excess reserves reduce the multiplier</p><p>III. It depends only on RBI policy rates</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2327;&#2369;&#2339;&#2325; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2351;&#2361; &#2344;&#2325;&#2342; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;</p><p>II. &#2313;&#2330;&#2381;&#2330; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2349;&#2306;&#2337;&#2366;&#2352; &#2327;&#2369;&#2339;&#2325; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</p><p>III. &#2351;&#2361; &#2325;&#2375;&#2357;&#2354; &#2310;&#2352;&#2348;&#2368;&#2310;&#2312; &#2325;&#2368; &#2344;&#2368;&#2340;&#2367;&#2327;&#2340; &#2342;&#2352;&#2379;&#2306; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2324;&#2352; &#2340;&#2371;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements I and II are correct. </b></p><p><b>Statement III is incorrect because the money multiplier is influenced by public behavior, not just RBI policy.</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>I. is Correct.</b> The money multiplier formula is 1/Reserve Ratio. Therefore, if the Cash Reserve Ratio (CRR) increases, the multiplier decreases, and vice versa.</p><p>&#183; <b>II. is Correct.</b> When banks hold higher excess reserves instead of lending them out, they create less credit, which reduces the overall money multiplier.</p><p>&#183; <b>III. is Incorrect.</b> The multiplier also depends on the \"Currency Deposit Ratio,\" which is determined by the public's preference for holding cash versus bank deposits.</p>",
    "question_index": 124
  },
  {
    "question": "<span class=\"eqt\"><p>Under the Pradhan Mantri Surakshit Matritva Abhiyan (PMSMA) antenatal care (ANC) services free of cost are provided to all pregnant women on the ________of every month, particularly during the second and third trimesters. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2350;&#2366;&#2340;&#2371;&#2340;&#2381;&#2357; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; (PMSMA) &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340;, &#2360;&#2349;&#2368; &#2327;&#2352;&#2381;&#2349;&#2357;&#2340;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2379; &#2361;&#2352; &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2368; ________ &#2340;&#2366;&#2352;&#2368;&#2326; &#2325;&#2379;, &#2357;&#2367;&#2358;&#2375;&#2359;&#2325;&#2352; &#2342;&#2370;&#2360;&#2352;&#2368; &#2324;&#2352; &#2340;&#2368;&#2360;&#2352;&#2368; &#2340;&#2367;&#2350;&#2366;&#2361;&#2368; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2344;&#2367;:&#2358;&#2369;&#2354;&#2381;&#2325; &#2346;&#2381;&#2352;&#2360;&#2357;&#2346;&#2370;&#2352;&#2381;&#2357; &#2342;&#2375;&#2326;&#2349;&#2366;&#2354; (ANC) &#2360;&#2375;&#2357;&#2366;&#2319;&#2306; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4th</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">6th</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">9th</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">2nd</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Launched in June 2016, the Pradhan Mantri Surakshit Matritva Abhiyan (PMSMA) is a flagship initiative of the Ministry of Health and Family Welfare, Government of India. </p><p>&#183; It was designed to provide assured, comprehensive, and quality antenatal care (ANC) services free of cost to all pregnant women on the <b>9th of every month</b>, particularly during the second and third trimesters. </p><p>&#183; The core aim is to reduce maternal and neonatal mortality by facilitating early detection and prompt management of high-risk pregnancies.</p>",
    "question_index": 125
  },
  {
    "question": "<span class=\"eqt\"><p>In June 2025, ISRO conducted hot tests of the Gaganyaan Service Module Propulsion System (SMPS). Which of the following correctly describes this system?</p></span><span class=\"hqt\" style=\"display:none\">&#2332;&#2370;&#2344; 2025 &#2350;&#2375;&#2306;, &#2311;&#2360;&#2352;&#2379; &#2344;&#2375; &#2327;&#2327;&#2344;&#2351;&#2366;&#2344; &#2360;&#2352;&#2381;&#2357;&#2367;&#2360; &#2350;&#2377;&#2337;&#2381;&#2351;&#2370;&#2354; &#2346;&#2381;&#2352;&#2339;&#2379;&#2342;&#2344; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; (&#2319;&#2360;&#2319;&#2350;&#2346;&#2368;&#2319;&#2360;) &#2325;&#2366; &#2361;&#2377;&#2335; &#2335;&#2375;&#2360;&#2381;&#2335; &#2325;&#2367;&#2351;&#2366;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2311;&#2360; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2360;&#2361;&#2368; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">It is used only during launch phase and consists solely of solid fuel engines</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2375;&#2357;&#2354; &#2346;&#2381;&#2352;&#2325;&#2381;&#2359;&#2375;&#2346;&#2339; &#2330;&#2352;&#2339; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2336;&#2379;&#2360; &#2312;&#2306;&#2343;&#2344; &#2311;&#2306;&#2332;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">It supports orbital manoeuvring and abort scenarios using liquid propulsion</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2340;&#2352;&#2354; &#2346;&#2381;&#2352;&#2339;&#2379;&#2342;&#2344; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2325;&#2325;&#2381;&#2359;&#2368;&#2351; &#2346;&#2376;&#2306;&#2340;&#2352;&#2375;&#2348;&#2366;&#2332;&#2364;&#2368; &#2324;&#2352; &#2344;&#2367;&#2352;&#2360;&#2381;&#2340; &#2346;&#2352;&#2367;&#2342;&#2371;&#2358;&#2381;&#2351;&#2379;&#2306; &#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is part of the Crew Module and operates only during re-entry</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2325;&#2381;&#2352;&#2370; &#2350;&#2377;&#2337;&#2381;&#2351;&#2370;&#2354; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376; &#2324;&#2352; &#2325;&#2375;&#2357;&#2354; &#2346;&#2369;&#2344;&#2307; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2361;&#2368; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is designed exclusively for satellite deployment missions</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2375; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2313;&#2346;&#2327;&#2381;&#2352;&#2361; &#2346;&#2352;&#2367;&#2344;&#2367;&#2351;&#2379;&#2332;&#2344; &#2350;&#2367;&#2358;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2367;&#2332;&#2364;&#2366;&#2311;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The Gaganyaan Service Module Propulsion System (SMPS) is a critical component of the Gaganyaan Orbital Module.</p><p>&#183; It uses <b>liquid propulsion</b>, comprising five Liquid Apogee Motor (LAM) engines and sixteen Reaction Control System (RCS) thrusters, which are regulated bi-propellant systems.</p><p>&#183; Its primary functions include <b>orbital manoeuvring</b> (orbit circularisation, on-orbit control, de-boost manoeuvres) and providing abort capability during the ascent phase and other specific <b>abort scenarios.</b></p>",
    "question_index": 126
  },
  {
    "question": "<span class=\"eqt\"><p>Given below are two statements marked as Assertion and Reason. Choose the correct option.</p><p>Assertion (A): Ryotwari system directly settled land revenue with cultivators.</p><p>Reason (R): It eliminated intermediaries like zamindars.</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2325;&#2341;&#2344; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2352;&#2376;&#2351;&#2340;&#2357;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2350;&#2375;&#2306; &#2349;&#2370;-&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2325;&#2366; &#2344;&#2367;&#2346;&#2335;&#2366;&#2352;&#2366; &#2360;&#2368;&#2343;&#2375; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404; &#2325;&#2366;&#2352;&#2339; (R): &#2311;&#2360;&#2344;&#2375; &#2332;&#2350;&#2368;&#2306;&#2342;&#2366;&#2352;&#2379;&#2306; &#2332;&#2376;&#2360;&#2375; &#2348;&#2367;&#2330;&#2380;&#2354;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">Both are true and R explains A</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2324;&#2352; R, A &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both are true, R does not explain A</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, R, A &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is false, R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Both Assertion (A) and Reason (R) are true, and R is the correct explanation of A.</b></p><p>&#183; <b>Assertion (A) is Correct.</b> In the Ryotwari system, the land revenue was settled directly between the government and the individual cultivators (ryots).</p><p>&#183; <b>Reason (R) is Correct.</b> Unlike the Permanent Settlement, the British sought to remove the \"middleman\" (Zamindar) to ensure they received a larger share of the revenue and to provide better security to the cultivator.</p><p><b>Further Insights:</b></p><p>&#183; This system was introduced primarily in the Madras and Bombay Presidencies by Thomas Munro and Alexander Read.</p>",
    "question_index": 127
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the below statements. </p><p>Statement I: The Indian National Congress session that formally accepted the demand for Purna Swaraj was held on the banks of the Ravi River.</p><p>Statement II: The decision to observe 26 January 1930 as Independence Day was taken in the same session.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404; </p><p>&#2325;&#2341;&#2344; 1: &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2381;&#2357;&#2352;&#2366;&#2332; &#2325;&#2368; &#2350;&#2366;&#2306;&#2327; &#2325;&#2379; &#2324;&#2346;&#2330;&#2366;&#2352;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2366; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344; &#2352;&#2366;&#2357;&#2368; &#2344;&#2342;&#2368; &#2325;&#2375; &#2340;&#2335; &#2346;&#2352; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404; </p><p>&#2325;&#2341;&#2344; 2: 26 &#2332;&#2344;&#2357;&#2352;&#2368; 1930 &#2325;&#2379; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2342;&#2367;&#2357;&#2360; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2344;&#2375; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2313;&#2360;&#2368; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404; </p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>I. is Correct.</b> The 1929 session of the Indian National Congress was held in Lahore on the banks of the Ravi River.</p><p>&#183; <b>II. is Correct.</b> Under the presidency of Jawaharlal Nehru, the Congress declared 'Purna Swaraj' (Complete Independence) and decided to observe January 26, 1930, as Independence Day.</p>",
    "question_index": 128
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following regarding Parliamentary Committees:</p><p>I. Estimates Committee consists only of Lok Sabha members</p><p>II. Public Accounts Committee includes members from both Houses</p><p>III. Committee on Public Undertakings is chaired only by a ruling party MP</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2360;&#2342;&#2368;&#2351; &#2360;&#2350;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; &#2360;&#2350;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2360;&#2342;&#2360;&#2381;&#2351; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;</p><p>II. &#2354;&#2379;&#2325; &#2354;&#2375;&#2326;&#2366; &#2360;&#2350;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2342;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;</p><p>III. &#2354;&#2379;&#2325; &#2313;&#2346;&#2325;&#2381;&#2352;&#2350; &#2360;&#2350;&#2367;&#2340;&#2367; &#2325;&#2368; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;&#2340;&#2366; &#2325;&#2375;&#2357;&#2354; &#2360;&#2340;&#2381;&#2340;&#2366;&#2343;&#2366;&#2352;&#2368; &#2342;&#2354; &#2325;&#2375; &#2360;&#2366;&#2306;&#2360;&#2342; &#2361;&#2368; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements I and II are correct. </b></p><p><b>Statement III is incorrect because the chairmanship of the Committee on Public Undertakings (COPU) is not exclusively reserved for the ruling party.</b> </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>I. is Correct.</b> The Estimates Committee is the largest committee of Parliament, consisting of 30 members, all of whom are elected from the Lok Sabha only.</p><p>&#183; <b>II. is Correct.</b> The Public Accounts Committee (PAC) consists of 22 members (15 from Lok Sabha and 7 from Rajya Sabha). Its primary function is to examine the audit reports of the CAG.</p><p>&#183; <b>III. is Incorrect.</b> The Chairman of the Committee on Public Undertakings is appointed by the Speaker from amongst the members of the Lok Sabha. Unlike the PAC (where the chair is usually from the opposition by convention), COPU chairmanship follows the Speaker's appointment and is not restricted by constitutional text to the ruling party only.</p><p><b>Further Insights:</b></p><p>&#183; A Minister cannot be elected as a member of these financial committees. If a member is appointed as a Minister after election to the committee, they cease to be a member.</p>",
    "question_index": 129
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding files and folders in Windows:</p><p>1) A folder can contain files and subfolders.</p><p>2) Two files in the same folder can have identical names.</p><p>3) File extensions indicate file type.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2306;&#2337;&#2379;&#2332;&#2364; &#2350;&#2375;&#2306; &#2347;&#2364;&#2366;&#2311;&#2354;&#2379;&#2306; &#2324;&#2352; &#2347;&#2364;&#2379;&#2354;&#2381;&#2337;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2319;&#2325; &#2347;&#2364;&#2379;&#2354;&#2381;&#2337;&#2352; &#2350;&#2375;&#2306; &#2347;&#2364;&#2366;&#2311;&#2354;&#2375;&#2306; &#2324;&#2352; &#2313;&#2346;&#2347;&#2364;&#2379;&#2354;&#2381;&#2337;&#2352; &#2361;&#2379; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2319;&#2325; &#2361;&#2368; &#2347;&#2364;&#2379;&#2354;&#2381;&#2337;&#2352; &#2350;&#2375;&#2306; &#2342;&#2379; &#2347;&#2364;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>3) &#2347;&#2364;&#2366;&#2311;&#2354; &#2319;&#2325;&#2381;&#2360;&#2335;&#2375;&#2306;&#2358;&#2344; &#2347;&#2364;&#2366;&#2311;&#2354; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2311;&#2306;&#2327;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">All 1, 2 and 3 are correct</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3 &#2340;&#2368;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 3 are correct. </p><p>Statement 2 is incorrect because Windows does not allow two files with the exact same name (and extension) to exist in the same folder. </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct.</b> A folder is a digital container that can hold any number of files as well as other folders (known as subfolders).</p><p>&#183; <b>2. is Incorrect.</b> Every file in a single directory must have a unique identity. If you try to save a file with an existing name, Windows will ask to overwrite it or rename the new file.</p><p>&#183; <b>3. is Correct.</b> File extensions (e.g., .docx, .jpg, .exe) tell the operating system and the user what kind of data the file contains and which program should open it.</p><p><b>Further Insights:</b></p><p>&#183; Folders are used to create a \"Directory Tree\" or hierarchical structure to organize data efficiently.</p>",
    "question_index": 130
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about Network Topology:</p><p>i. In a 'Star' topology, all devices are connected to a central hub or switch.</p><p>ii. In a 'Bus' topology, if the central cable (backbone) fails, the entire network fails.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. '&#2360;&#2381;&#2335;&#2366;&#2352;' &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368; &#2350;&#2375;&#2306;, &#2360;&#2349;&#2368; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2319;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2361;&#2348; &#2351;&#2366; &#2360;&#2381;&#2357;&#2367;&#2330; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>ii. '&#2348;&#2360;' &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368; &#2350;&#2375;&#2306;, &#2351;&#2342;&#2367; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2325;&#2375;&#2348;&#2354; (&#2348;&#2376;&#2325;&#2348;&#2379;&#2344;) &#2357;&#2367;&#2347;&#2354; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2370;&#2352;&#2366; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2357;&#2367;&#2347;&#2354; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">ii only</span><span class=\"hqt\" style=\"display:none\">ii &#2325;&#2375;&#2357;&#2354;</span>",
      "<span class=\"eqt\">Both i and ii</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">Neither i nor ii</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; i &#2324;&#2352; &#2344; &#2361;&#2368; ii</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>i. is Correct.</b> In a Star topology, every computer is connected to a central device (Hub or Switch). If one cable breaks, only that computer goes offline.</p><p>&#183; <b>ii. is Correct.</b> In a Bus topology, all devices share a single main cable (backbone). If this central cable fails or is cut, the entire network is paralyzed.</p><p><b>Further Insights:</b></p><p>&#183; Star is the most common topology used in modern offices and homes because of its reliability.</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>Which security feature uses a \"Public Key\" to encrypt data and a \"Private Key\" to decrypt it?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2347;&#2368;&#2330;&#2352; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; \"&#2346;&#2348;&#2381;&#2354;&#2367;&#2325; &#2325;&#2368;\" &#2324;&#2352; &#2313;&#2360;&#2375; &#2337;&#2367;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; \"&#2346;&#2381;&#2352;&#2366;&#2311;&#2357;&#2375;&#2335; &#2325;&#2368;\" &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Symmetric Encryption</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2350;&#2367;&#2340; &#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Asymmetric Encryption</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2350;&#2350;&#2367;&#2340; &#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Hashing</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2376;&#2358;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Firewalling</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2366;&#2351;&#2352;&#2357;&#2377;&#2354;&#2367;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The use of a Public Key for encryption and a Private Key for decryption is known as <b>Asymmetric Encryption.</b> </p><p><b>Explanation of Terms:</b></p><p>&#183; <b>Symmetric Encryption:</b> Uses the same single key for both encryption and decryption.</p><p>&#183; <b>Asymmetric Encryption:</b> Also known as Public Key Cryptography. The Public key is shared with everyone to encrypt data, but only the owner of the matching Private key can decrypt it.</p><p>&#183; <b>Hashing:</b> A one-way process that turns data into a fixed-length string; it cannot be decrypted.</p><p><b>Further Insights:</b></p><p>&#183; RSA is the most famous algorithm for asymmetric encryption, used widely in securing web browsing (HTTPS).</p>",
    "question_index": 132
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1) A plotter is mainly used for high-quality vector graphics.</p><p>2) A plotter is faster than a laser printer for bulk printing.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2346;&#2381;&#2354;&#2377;&#2335;&#2352; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2313;&#2330;&#2381;&#2330; &#2327;&#2369;&#2339;&#2357;&#2340;&#2381;&#2340;&#2366; &#2357;&#2366;&#2354;&#2375; &#2357;&#2375;&#2325;&#2381;&#2335;&#2352; &#2327;&#2381;&#2352;&#2366;&#2347;&#2367;&#2325;&#2381;&#2360; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2341;&#2379;&#2325; &#2350;&#2369;&#2342;&#2381;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2354;&#2377;&#2335;&#2352; &#2354;&#2375;&#2332;&#2352; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352; &#2360;&#2375; &#2340;&#2375;&#2332;&#2364; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 and 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is correct. </p><p>Statement 2 is incorrect because a plotter is generally much slower than a laser printer, as it uses pens to draw continuous lines rather than printing in dots or toner layers. </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct.</b> Plotters are specialized output devices designed to produce high-quality vector graphics. They are widely used in engineering and architecture for printing blueprints and technical drawings.</p><p>&#183; <b>2. is Incorrect.</b> Laser printers are optimized for bulk printing of text and raster images at high speeds. Plotters are precision-driven and move a pen across paper, making them unsuitable for rapid, high-volume document printing.</p><p><b>Further Insights:</b></p><p>&#183; Plotters can draw on very large sheets of paper while maintaining high resolution, which standard office printers cannot handle.</p><p>&#183; Common applications for plotters include CAD (Computer-Aided Design) and CAM (Computer-Aided Manufacturing) outputs.</p>",
    "question_index": 133
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding CPU registers:</p><p>1) Registers provide the fastest access to data for the CPU.</p><p>2) Registers are part of secondary memory.</p><p>3) The Program Counter stores the address of the next instruction.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352; &#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2325;&#2379; &#2337;&#2375;&#2335;&#2366; &#2340;&#2325; &#2360;&#2348;&#2360;&#2375; &#2340;&#2375;&#2332;&#2364; &#2346;&#2361;&#2369;&#2305;&#2330; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>3) &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2366;&#2313;&#2306;&#2335;&#2352; &#2309;&#2327;&#2354;&#2375; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; &#2325;&#2366; &#2346;&#2340;&#2366; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 3 are correct. </p><p>Statement 2 is incorrect because registers are high-speed storage locations internal to the CPU, not part of secondary memory. </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct.</b> Registers are located directly inside the processor. Because of their proximity and hardware design, they provide the fastest data access speed in the entire memory hierarchy.</p><p>&#183; <b>2. is Incorrect.</b> Secondary memory refers to external storage like Hard Disks or SSDs. Registers are considered internal CPU memory and are volatile.</p><p>&#183; <b>3. is Correct.</b> The Program Counter (PC) is a specific register that holds the memory address of the next instruction to be fetched and executed, ensuring the program flows in the correct sequence.</p><p><b>Further Insights:</b></p><p>&#183; Common types of registers include the Accumulator (for arithmetic results), Instruction Register (IR), and Memory Address Register (MAR).</p><p>&#183; The number and size of registers (e.g., 32-bit or 64-bit) significantly impact a processor's performance.</p>",
    "question_index": 134
  },

td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(2) &#2350;&#2377;&#2344;&#2367;&#2335;&#2352; &#2337;&#2367;&#2360;&#2381;&#2346;&#2381;&#2354;&#2375;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(C) PS/2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(3) &#2354;&#2375;&#2327;&#2375;&#2360;&#2368; &#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337;/Mouse</td></tr></table><p>&#2325;&#2379;&#2337;:</p></span>",
    "options": [
      "<span class=\"eqt\">A-1, B-2, C-3</span><span class=\"hqt\" style=\"display:none\">A-1, B-2, C-3</span>",
      "<span class=\"eqt\">A-2, B-1, C-3</span><span class=\"hqt\" style=\"display:none\">A-2, B-1, C-3</span>",

      "<span class=\"eqt\">A-3, B-1, C-2</span><span class=\"hqt\" style=\"display:none\">A-3, B-1, C-2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>A-2 (VGA/HDMI):</b> These are video ports used to connect monitors, projectors, or TVs.</p><p>&#183; <b>B-1 (RJ-45):</b> This is the standard \"Registered Jack\" for Ethernet cables used in networking.</p><p>&#183; <b>C-3 (PS/2):</b> A legacy, round 6-pin port used for older keyboards (purple) and mice (green).</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding USB ports:</p><p>1) USB supports hot plugging.</p><p>2) USB devices require system reboot before use.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2370;&#2319;&#2360;&#2348;&#2368; &#2346;&#2379;&#2352;&#2381;&#2335; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2351;&#2370;&#2319;&#2360;&#2348;&#2368; &#2361;&#2377;&#2335; &#2346;&#2381;&#2354;&#2327;&#2367;&#2306;&#2327; &#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2351;&#2370;&#2319;&#2360;&#2348;&#2368; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2379; &#2313;&#2346;&#2351;&#2379;&#2327; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2352;&#2368;&#2348;&#2370;&#2335; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is correct. </p><p>Statement 2 is incorrect because USB is a \"Plug and Play\" technology that does not require a system restart for devices to be recognized. </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct.</b> \"Hot plugging\" (or hot swapping) allows users to connect or disconnect peripherals while the computer is running without causing damage or requiring a reboot.</p><p>&#183; <b>2. is Incorrect.</b> USB devices are designed for immediate use. The operating system automatically detects the hardware and loads the necessary drivers as soon as it is plugged in.</p><p><b>Further Insights:</b></p><p>&#183; USB (Universal Serial Bus) has evolved through various versions (USB 2.0, 3.0, USB-C) to provide higher data transfer speeds and power delivery.</p>",
    "question_index": 136
  },

    "question": "<span class=\"eqt\"><p>Which feature in MS Word automatically moves text to the next line when it reaches the right margin?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2357;&#2352;&#2381;&#2337; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2347;&#2368;&#2330;&#2352; &#2361;&#2376; &#2332;&#2379; &#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2325;&#2375; &#2342;&#2366;&#2361;&#2367;&#2344;&#2375; &#2350;&#2366;&#2352;&#2381;&#2332;&#2367;&#2344; &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330;&#2344;&#2375; &#2346;&#2352; &#2313;&#2360;&#2375; &#2360;&#2381;&#2357;&#2330;&#2366;&#2354;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2327;&#2354;&#2368; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2354;&#2375; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Word Wrap</span><span class=\"hqt\" style=\"display:none\">Word Wrap</span>",
      "<span class=\"eqt\">Auto-Text</span><span class=\"hqt\" style=\"display:none\">Auto-Text</span>",
      "<span class=\"eqt\">Line Break</span><span class=\"hqt\" style=\"display:none\">Line Break</span>",
      "<span class=\"eqt\">Page Break</span><span class=\"hqt\" style=\"display:none\">Page Break</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The feature that automatically moves text to the next line is <b>Word Wrap.</b> </p><p><b>Explanation of Features:</b></p><p>&#183; <b>Word Wrap:</b> A standard word-processing feature that forces text to the next line when it reaches the right margin, so the user doesn't have to press 'Enter' manually.</p><p>&#183; <b>Auto-Text:</b> A feature that stores frequently used text for quick insertion.</p><p>&#183; <b>Line Break:</b> A manual break inserted by the user (Shift + Enter).</p><p>&#183; <b>Page Break:</b> Ends the current page and starts a new one.</p>",
    "question_index": 137
  },

    "question": "<span class=\"eqt\"><p>Which symbol in a browser indicates a secure website connection?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2364;&#2352; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335; &#2325;&#2344;&#2375;&#2325;&#2381;&#2358;&#2344; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Red cross</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2337; &#2325;&#2381;&#2352;&#2377;&#2360;</span>",
      "<span class=\"eqt\">Lock icon</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2325; &#2310;&#2311;&#2325;&#2344;</span>",
      "<span class=\"eqt\">Star icon</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2352;&#2366; &#2330;&#2367;&#2361;&#2381;&#2344;</span>",
      "<span class=\"eqt\">Arrow icon</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2352; &#2310;&#2311;&#2325;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>(a) is Incorrect.</b> A <b>Red cross</b> or a shield with a red \"X\" usually indicates a security warning, a certificate error, or that a website is being blocked because it is considered dangerous or malicious.</p><p>&#183; <b>(b) is Correct.</b> The <b>Lock icon</b> in the address bar is the universal symbol indicating that the website is using a secure, encrypted connection (HTTPS). It signifies that an SSL/TLS certificate is active, ensuring that data transferred between your browser and the server (like passwords or credit card numbers) is private.</p><p>&#183; <b>(c) is Incorrect.</b> A <b>Star icon</b> is typically used for \"Bookmarks\" or \"Favorites.\" Clicking it allows a user to save the URL for quick access in the future.</p><p>&#183; <b>(d) is Incorrect.</b> An <b>Arrow icon</b> is generally used for navigation, such as the \"Back\" and \"Forward\" buttons, or the \"Refresh\" (curved arrow) button to reload a page.</p><p><b>Further Insights:</b></p><p>&#183; <b>HTTPS vs. HTTP:</b> Secure websites use <b>HTTPS</b> (Hypertext Transfer Protocol Secure), while insecure ones use <b>HTTP</b>. The \"S\" stands for \"Secure.\"</p><p>&#183; <b>Certificate Information:</b> If you click on the lock icon, most browsers will show you details about the security certificate, including the issuing authority and the encryption level.</p><p>&#183; <b>Modern Browser Changes:</b> While the \"Lock\" has been the standard for years, some modern browsers (like Google Chrome) have started replacing it with a \"tune\" or \"settings\" icon to encourage users to check site-specific permissions, though the underlying encryption remains indicated within that menu.</p><p>&#183; <b>Phishing Caution:</b> Having a lock icon means the connection is <i>encrypted</i>, but it doesn't always mean the website is <i>trustworthy</i>. Phishing sites can also obtain SSL certificates to appear legitimate, so users should still verify the domain name.</p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>Which function is used to calculate the remainder after a number is divided by a divisor?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2349;&#2366;&#2332;&#2325; &#2360;&#2375; &#2349;&#2366;&#2327; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2358;&#2375;&#2359;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2347;&#2354;&#2344; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">=DIV()</span><span class=\"hqt\" style=\"display:none\">=DIV()</span>",
      "<span class=\"eqt\">=REM()</span><span class=\"hqt\" style=\"display:none\">=REM()</span>",
      "<span class=\"eqt\">=MOD()</span><span class=\"hqt\" style=\"display:none\">=MOD()</span>",
      "<span class=\"eqt\">=FACT()</span><span class=\"hqt\" style=\"display:none\">=FACT()</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The function used to find the remainder of a division is MOD. Therefore, the correct option is <b>=MOD()</b>.</p><p><b>Explanation of Functions:</b></p><p>&#183; <b>=DIV():</b> Not a standard Excel function for division (the forward slash / is used).</p><p>&#183; <b>=REM():</b> Not a standard Excel function.</p><p>&#183; <b>=MOD(number, divisor):</b> Returns the remainder after division. For example, =MOD(10, 3) returns 1.</p><p>&#183; <b>=FACT():</b> Calculates the factorial of a number.</p><p><b>Further Insights:</b></p><p>&#183; The MOD function is often used in logical tests, such as determining if a number is even or odd (=MOD(A1, 2)=0).</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>Which keyboard shortcut is used to apply \"Double Line Spacing\" to a paragraph?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2376;&#2352;&#2366;&#2327;&#2381;&#2352;&#2366;&#2347; &#2350;&#2375;&#2306; \"&#2337;&#2348;&#2354; &#2354;&#2366;&#2311;&#2344; &#2360;&#2381;&#2346;&#2375;&#2360;&#2367;&#2306;&#2327;\" &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337; &#2358;&#2377;&#2352;&#2381;&#2335;&#2325;&#2335; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Ctrl + 1</span><span class=\"hqt\" style=\"display:none\">Ctrl + 1</span>",
      "<span class=\"eqt\">Ctrl + 2</span><span class=\"hqt\" style=\"display:none\">Ctrl + 2</span>",
      "<span class=\"eqt\">Ctrl + 5</span><span class=\"hqt\" style=\"display:none\">Ctrl + 5</span>",
      "<span class=\"eqt\">Ctrl + D</span><span class=\"hqt\" style=\"display:none\">Ctrl + D</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The shortcut for double line spacing is <b>Ctrl + 2</b>.</p><p><b>Explanation of Options:</b></p><p>&#183; <b>Ctrl + 1:</b> Applies single line spacing to the selected paragraph.</p><p>&#183; <b>Ctrl + 2:</b> Applies double line spacing (2.0) to the selected paragraph.</p><p>&#183; <b>Ctrl + 5:</b> Applies 1.5 line spacing.</p><p>&#183; <b>(4) Ctrl + D:</b> In MS Word, this typically opens the Font dialog box.</p><p><b>Further Insights:</b></p><p>&#183; These shortcuts are standard in Microsoft Word and several other word-processing applications to speed up formatting.</p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>Which file type is most likely compressed for faster downloading?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2375;&#2332;&#2364; &#2337;&#2366;&#2313;&#2344;&#2354;&#2379;&#2337;&#2367;&#2306;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2347;&#2364;&#2366;&#2311;&#2354; &#2325;&#2379; &#2360;&#2306;&#2346;&#2368;&#2337;&#2364;&#2367;&#2340; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">.txt</span><span class=\"hqt\" style=\"display:none\">.txt</span>",
      "<span class=\"eqt\">.zip</span><span class=\"hqt\" style=\"display:none\">.zip</span>",
      "<span class=\"eqt\">.bmp</span><span class=\"hqt\" style=\"display:none\">.bmp</span>",
      "<span class=\"eqt\">.wav</span><span class=\"hqt\" style=\"display:none\">.wav</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The file type most likely to be compressed for size reduction is <b>.zip</b>.</p><p><b>Explanation of Extensions:</b></p><p>&#183; <b>.txt:</b> A plain text file.</p><p>&#183; <b>.zip:</b> An archive file format that supports lossless data compression. It \"zips\" one or more files into a smaller container.</p><p>&#183; <b>.bmp:</b> A bitmap image file, which is usually uncompressed and very large.</p><p>&#183; <b>.wav:</b> A standard audio file format, typically uncompressed.</p><p><b>Further Insights:</b></p><p>&#183; Compression helps in saving storage space and reducing the time required to send files over the internet.</p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about E-mail:</p><p>1) The 'Bcc' (Blind Carbon Copy) field allows you to send an email to multiple people without them seeing each other's addresses.</p><p>2) The 'Spam' folder is where deleted emails are stored before they are permanently erased.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2312;-&#2350;&#2375;&#2354; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) '&#2348;&#2368;&#2360;&#2368;&#2360;&#2368;' (&#2348;&#2381;&#2354;&#2366;&#2311;&#2306;&#2337; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2325;&#2377;&#2346;&#2368;) &#2347;&#2364;&#2368;&#2354;&#2381;&#2337; &#2310;&#2346;&#2325;&#2379; &#2319;&#2325; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2379; &#2312;&#2350;&#2375;&#2354; &#2349;&#2375;&#2332;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2348;&#2367;&#2344;&#2366; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2319;&#2325;-&#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2375; &#2312;&#2350;&#2375;&#2354; &#2346;&#2340;&#2375; &#2342;&#2367;&#2326;&#2366;&#2319;&#2404;</p><p>2) '&#2360;&#2381;&#2346;&#2376;&#2350;' &#2347;&#2364;&#2379;&#2354;&#2381;&#2337;&#2352; &#2357;&#2361; &#2332;&#2327;&#2361; &#2361;&#2376; &#2332;&#2361;&#2366;&#2305; &#2361;&#2335;&#2366;&#2319; &#2327;&#2319; &#2312;&#2350;&#2375;&#2354; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2350;&#2367;&#2335;&#2366;&#2319; &#2332;&#2366;&#2344;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is correct. </p><p><b>Statement 2 is incorrect</b> because the Spam folder is for junk/unsolicited mail, while deleted emails go to the Trash or Bin. </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct.</b> Bcc stands for Blind Carbon Copy. Recipients in this field cannot see each other's email addresses, protecting the privacy of the list.</p><p>&#183; <b>2. is Incorrect.</b> The \"Spam\" folder is where the email system filters suspected junk mail. Deleted emails are stored in the \"Trash\" (or \"Bin\") folder for a certain period before being permanently wiped.</p><p><b>Further Insights:</b></p><p>&#183; Using Bcc is highly recommended when sending an email to a large group of people who do not know each other.</p>",
    "question_index": 142
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about virtual memory:</p><p>I. Virtual memory uses secondary storage as an extension of RAM.</p><p>II. Virtual memory completely eliminates the need for RAM.</p><p>III. Virtual memory helps in executing larger programs than physical memory.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2349;&#2366;&#2360;&#2368; &#2360;&#2381;&#2350;&#2371;&#2340;&#2367; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2310;&#2349;&#2366;&#2360;&#2368; &#2360;&#2381;&#2350;&#2371;&#2340;&#2367;, RAM &#2325;&#2375; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2339; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2310;&#2349;&#2366;&#2360;&#2368; &#2360;&#2381;&#2350;&#2371;&#2340;&#2367; RAM &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2325;&#2379; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>III. &#2310;&#2349;&#2366;&#2360;&#2368; &#2360;&#2381;&#2350;&#2371;&#2340;&#2367;, &#2349;&#2380;&#2340;&#2367;&#2325; &#2360;&#2381;&#2350;&#2371;&#2340;&#2367; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2348;&#2337;&#2364;&#2375; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2366;&#2351;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">All I, II and III are correct</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III &#2340;&#2368;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements I and III are correct. </p><p>Statement II is incorrect because virtual memory is a management technique that complements RAM, not a replacement for it. </p><p><b>Explanation of Statements:</b></p><p>&#183; <b>I. is Correct.</b> Virtual memory creates an illusion for the CPU that it has more RAM than it physically does by using a portion of the hard drive (secondary storage) as a swap space.</p><p>&#183; <b>II. is Incorrect.</b> A computer must have physical RAM to function. Virtual memory is much slower than RAM and is only used to handle the overflow of data.</p><p>&#183; <b>III. is Correct.</b> It allows a system to run programs that are larger than the physical RAM capacity by loading only the necessary parts of the program into memory at any given time.</p><p><b>Further Insights:</b></p><p>&#183; The process of moving data between RAM and the virtual memory on the disk is called \"Paging\" or \"Swapping.\"</p><p>&#183; Excessive use of virtual memory can lead to \"Thrashing,\" where the system spends more time moving data than executing instructions, causing a significant slowdown.</p>",
    "question_index": 143
  },
  {
    "question": "<span class=\"eqt\"><p>Which networking device is used to connect two different types of networks that use different protocols (e.g., a LAN and the Internet)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325;&#2379;&#2306; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325;&#2367;&#2306;&#2327; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; (&#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319;, &#2319;&#2325; &#2354;&#2376;&#2344; &#2324;&#2352; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335;)?</p></span>",
    "options": [
      "<span class=\"eqt\">Hub</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Switch</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2342;&#2354;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Gateway</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Repeater</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2352;&#2366;&#2343;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A Gateway is the device used to connect networks with different protocols. </p><p><b>Explanation of Devices:</b></p><p>&#183; <b>Hub:</b> A basic device that broadcasts data to all ports in a LAN.</p><p>&#183; <b>Switch:</b> Connects devices in a LAN and sends data to specific MAC addresses.</p><p>&#183; <b>Gateway:</b> Acts as a \"gate\" or translator between two networks that use different protocols or architectures.</p><p>&#183; <b>Repeater:</b> Simply amplifies or regenerates a signal to extend its range.</p><p><b>Further Insights:</b></p><p>&#183; In home networking, the router often acts as the \"Default Gateway\" to the Internet.</p>",
    "question_index": 144
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1) Routers operate at the network layer of OSI model.</p><p>2) Switches assign IP addresses to devices.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2352;&#2366;&#2313;&#2335;&#2352; OSI &#2350;&#2377;&#2337;&#2354; &#2325;&#2368; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2346;&#2352;&#2340; &#2346;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2360;&#2381;&#2357;&#2367;&#2330; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2379; IP &#2346;&#2340;&#2375; &#2310;&#2357;&#2306;&#2335;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is correct. </p><p><b>Statement 2 is incorrect</b> because switches operate using MAC addresses; IP addresses are typically assigned by a DHCP server, often residing in a router.</p><p><b>Explanation of Statements:</b></p><p>&#183; <b>1. is Correct.</b> Routers function at Layer 3 (Network Layer) of the OSI model. They route data packets between different networks using IP addresses.</p><p>&#183; <b>2. is Incorrect.</b> A switch operates at Layer 2 (Data Link Layer). Its job is to connect devices within a single local network using their physical MAC addresses, not to assign IP addresses.</p><p><b>Further Insights:</b></p><p>&#183; Modern \"Layer 3 Switches\" exist, but in standard networking terminology, the distinction between a Router (IP/Layer 3) and a Switch (MAC/Layer 2) is fundamental.</p>",
    "question_index": 145
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following represents the largest unit of data storage?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2337;&#2375;&#2335;&#2366; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2311;&#2325;&#2366;&#2312; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [

    "question": "<span class=\"eqt\"><p>Which protocol is primarily responsible for ensuring that data packets are delivered reliably and in the correct order over the internet?</p></span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2346;&#2352; &#2337;&#2375;&#2335;&#2366; &#2346;&#2376;&#2325;&#2375;&#2335;&#2379;&#2306; &#2325;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357;&#2360;&#2344;&#2368;&#2351; &#2324;&#2352; &#2360;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2337;&#2367;&#2354;&#2368;&#2357;&#2352;&#2368; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">IP</span><span class=\"hqt\" style=\"display:none\">IP</span>",
      "<span class=\"eqt\">UDP</span><span class=\"hqt\" style=\"display:none\">UDP</span>",
      "<span class=\"eqt\">TCP</span><span class=\"hqt\" style=\"display:none\">TCP</span>",
      "<span class=\"eqt\">HTTP</span><span class=\"hqt\" style=\"display:none\">HTTP</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>TCP</b> is responsible for reliable, ordered delivery of data. </p><p><b>Explanation of Protocols:</b></p><p>&#183; <b> IP (Internet Protocol):</b> Handles the addressing and routing of packets but does not guarantee delivery.</p><p>&#183; <b>UDP (User Datagram Protocol):</b> Faster than TCP but \"unreliable\"; it does not check if packets arrived or are in order (common in streaming).</p><p>&#183; <b>TCP (Transmission Control Protocol):</b> Establishes a connection and uses acknowledgments to ensure every packet arrives correctly and is reassembled in the right order.</p><p>&#183; <b>HTTP:</b> An application-layer protocol for web traffic.</p><p><b>Further Insights:</b></p><p>&#183; TCP/IP is the foundational suite of protocols for the entire Internet.</p>",
