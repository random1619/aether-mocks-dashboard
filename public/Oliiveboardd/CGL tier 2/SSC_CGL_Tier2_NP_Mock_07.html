    "question": "<span class=\"eqt\"><p>If Y and Z are events with P(Y) = 5/8, P(Y &#8899; Z) = 3/5, P(Y &#8898; Z) = 1/4, then find P(Z&#773;).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; Y &#2324;&#2352; Z &#2328;&#2335;&#2344;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306; &#2332;&#2361;&#2366;&#2305; P(Y) = 5/8, P(Y &#8899; Z) = 3/5, P(Y &#8898; Z) = 1/4 &#2361;&#2376;, &#2340;&#2379; P(Z&#773;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

    "correct_option_id": 2,
    "solution": "<p>P(Y) = 5/8, P(Y &#8899; Z) = 3/5, P(Y &#8898; Z) = 1/4</p><p>P(Y &#8899; Z) = P(Y) + P(Z)  -  P(Y &#8898; Z)</p><p>3/5 = 5/8 + P(Z)  -  &#188;</p><p>P(Z) = 9/40</p><p>P(Z&#773;) = 1  -  9/40 = 31/40</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>How many times digit 6 comes in the numbers from 0 to 700?</p></span><span class=\"hqt\" style=\"display:none\"><p>0 &#2360;&#2375; 700 &#2340;&#2325; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2348;&#2366;&#2352; &#2309;&#2306;&#2325; 6 &#2310;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">230</span><span class=\"hqt\" style=\"display:none\">230</span>",
      "<span class=\"eqt\">240</span><span class=\"hqt\" style=\"display:none\">240</span>",
      "<span class=\"eqt\">250</span><span class=\"hqt\" style=\"display:none\">250</span>",

    "correct_option_id": 1,
    "solution": "<p>Number of times 6 comes on either units or tens place, from 0 to 100 = 10 + 10 = 20</p><p>Similarly, up to 700 it comes = 20 x 7 = 140 times</p><p>6 comes 100 times at hundreds place from 601 to 699</p><p>So, required answer = 100 + 140 = 240</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The minimum value of some observation is 79 and range is 21, then what is the maximum value?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2369;&#2331; &#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2350;&#2366;&#2344; 79 &#2361;&#2376; &#2324;&#2352; &#2346;&#2352;&#2367;&#2360;&#2352; 21 &#2361;&#2376;, &#2340;&#2379; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">58</span><span class=\"hqt\" style=\"display:none\">58</span>",

  {
    "question": "<span class=\"eqt\"><p>If A: B: C = 8: 3: 9, then which of the following is TRUE?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A: B: C = 8: 3: 9 &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [

    "solution": "<p>Since,</p><p>A: B: C = 8: 3: 9</p><p>Let A = 8k, B = 3k and C = 9k</p><p>9A = 24B = 8C =&gt; 72k = 72k = 72k</p><p>Hence, option (c) is correct.</p>",

  {
    "question": "<span class=\"eqt\"><p>The marked price of two boxes A and B is same. The discount on box A and B are 25% and 40% respectively. Find the ratio of selling price of boxes A and B respectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2337;&#2367;&#2348;&#2381;&#2348;&#2379;&#2306; - A &#2324;&#2352; B &#2325;&#2366; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2404; &#2337;&#2367;&#2348;&#2381;&#2348;&#2366; A &#2324;&#2352; B &#2346;&#2352; &#2331;&#2370;&#2335; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 25% &#2324;&#2352; 40% &#2361;&#2376;&#2404; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2337;&#2367;&#2348;&#2381;&#2348;&#2366; A &#2324;&#2352; B &#2325;&#2375; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",

    "correct_option_id": 3,
    "solution": "<p>Discount% = 25% and 40%</p><p>Ratio of selling price o boxes A and B = (100 - 25)% : (100 - 40)%</p><p>= 75% : 60%</p><p>= 5: 4</p>",
    "question_index": 4

  {
    "question": "<span class=\"eqt\"><p>If sec 3A = cosec (2A + 30&deg;), then sec 5A is equal to?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; sec 3A = cosec (2A + 30&deg;) &#2361;&#2376;, &#2340;&#2379; sec 5A &#2348;&#2352;&#2366;&#2348;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",

    "solution": "<p>sec 3A = cosec (2A + 30)</p><p>sec 3A = sec (90 - 2A - 30)</p><p>3A + 2A = 60</p><p>A = 12&deg;</p><p>So, sec 5A = sec60&deg; = 2</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If all the E's are removed from the word ETHYLENEACETATE, then the total number of vowels in the new formed word are what percentage of the total number of letters in the original word?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2358;&#2348;&#2381;&#2342; ETHYLENEACETATE &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2349;&#2368; E &#2361;&#2335;&#2366; &#2342;&#2367;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2348;&#2344;&#2375; &#2344;&#2319; &#2358;&#2348;&#2381;&#2342; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2350;&#2370;&#2354; &#2358;&#2348;&#2381;&#2342; &#2350;&#2375;&#2306; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">6.67%</span><span class=\"hqt\" style=\"display:none\">6.67%</span>",
      "<span class=\"eqt\">26.67%</span><span class=\"hqt\" style=\"display:none\">26.67%</span>"

    "correct_option_id": 1,
    "solution": "<p>According to the Question,</p><p>Word given: ETHYLENEACETATE</p><p>Number of letters in the word ETHYLENEACETATE = 15</p><p>When all the E's are removed from the word, the word becomes = THYLNACTAT</p><p>Number of vowels in the word THYLNACTAT = 2</p><p>Required percentage = 2/15 x 100%</p><p>= 13.33%</p>",

  {
    "question": "<span class=\"eqt\"><p>Ankit buys a watch for Rs.1200, sells it for Rs.1400, buys it again for Rs.1600, and sells it back for Rs.1800. Find the amount of loss/profit.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2306;&#2325;&#2367;&#2340; 1200 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2319;&#2325; &#2328;&#2337;&#2364;&#2368; &#2326;&#2352;&#2368;&#2342;&#2340;&#2366; &#2361;&#2376;, &#2311;&#2360;&#2375; 1400 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;, &#2311;&#2360;&#2375; &#2347;&#2367;&#2352; &#2360;&#2375; 1600 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2326;&#2352;&#2368;&#2342;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2375; 1800 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2357;&#2366;&#2346;&#2360; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2361;&#2366;&#2344;&#2367;/&#2354;&#2366;&#2349; &#2325;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

  {
    "question": "<span class=\"eqt\"><p>In an examination a candidate got 42% of the marks and failed by 63 marks. If the passing marks are 51% of the maximum marks, then find the maximum marks. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2319;&#2325; &#2309;&#2349;&#2381;&#2351;&#2352;&#2381;&#2341;&#2368; &#2325;&#2379; 42% &#2309;&#2306;&#2325; &#2350;&#2367;&#2354;&#2375; &#2324;&#2352; &#2357;&#2361; 63 &#2309;&#2306;&#2325;&#2379;&#2306; &#2360;&#2375; &#2309;&#2344;&#2369;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2361;&#2379; &#2327;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2309;&#2306;&#2325; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2309;&#2306;&#2325; &#2325;&#2366; 51% &#2361;&#2376;, &#2340;&#2379; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",

      "<span class=\"eqt\">900</span><span class=\"hqt\" style=\"display:none\">900</span>",

    "solution": "<p>Let the maximum marks be 'X'</p><p>The passing marks = X * 51/100 </p><p>X * 42/100 + 63 = 51X/100 </p><p>51X/100 = 42X/100 = 63 </p><p>9X/100 = 63 </p><p>X = 700 </p>",

    "question": "<span class=\"eqt\"><p>An alloy is made by mixing metal A costing Rs 800/kg and metal B costing Rs 650/kg in the ratio A: B = 9: 13. What is the cost (in Rs) of 44 kilograms of this alloy?</p></span><span class=\"hqt\" style=\"display:none\"><p>800 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2357;&#2366;&#2354;&#2368; &#2343;&#2366;&#2340;&#2369; A &#2324;&#2352; 650 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2357;&#2366;&#2354;&#2368; &#2343;&#2366;&#2340;&#2369; B &#2325;&#2379; A:B = 9:13 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2366;&#2325;&#2352; &#2319;&#2325; &#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2366;&#2340;&#2369; &#2348;&#2344;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360; &#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2366;&#2340;&#2369; &#2325;&#2375; 44 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; (&#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Study the following information and answer the question given below:</p><p>'Y ! Z' means 'Z is the sister of Y'</p><p>'Y + Z' means 'Z is the daughter of Y's son'</p><p>'Y % Z' means 'Z is the mother of Y.</p><p>'Y &amp; Z' means 'Y is married to Z'</p><p>If 'N ! K % G &amp; E + O % T ! V' and K has only one brother, then how is O related to V?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;:</p><p>'Y ! Z' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'Z, Y &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;&#2404;'</p><p>'Y + Z' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'Z, Y &#2325;&#2375; &#2346;&#2369;&#2340;&#2381;&#2352; &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;&#2404;'</p><p>'Y % Z' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'Z, Y &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;'</p><p>'Y &amp; Z' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'Y, Z &#2360;&#2375; &#2357;&#2367;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2376;&#2404;'</p><p>&#2351;&#2342;&#2367; 'N ! K % G &amp; E + O % T ! V' &#2324;&#2352; K &#2325;&#2366; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2349;&#2366;&#2312; &#2361;&#2376;, &#2340;&#2379; O, V &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",

    "solution": "<p>It is given that,</p><p>'Y ! Z' means 'Z is the sister of Y'</p><p>'Y + Z' means 'Z is the daughter of Y's son'</p><p>'Y % Z' means 'Z is the mother of Y.</p><p>'Y &amp; Z' means 'Y is married to Z'</p><p>The given statement is: 'N ! K % G &amp; E + O % T ! V'</p><p>After decoding the statement, we get:</p><p>K is the sister of N.</p><p>K has only one brother.</p><p>G is the mother of K.</p><p>G is married to E.</p><p>O is the daughter of E's son.</p><p>T is the mother of O.</p><p>V is the sister of T.</p><p><img width=235 height=131 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19506/image003.jpg\"></p><p>Thus, O is the niece of V.</p>",

    "comp": "<p><b>Directions :</b>   In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</p><p>Phenomenology seeks to understand the structure of consciousness and the objects of direct experience. It posits that reality is not an objective, external world independent of us, but is instead constituted by our lived experiences. This approach requires a methodological <b>(1)______</b> of preconceived notions and scientific theories about the world - a process termed 'epoche' or bracketing. By setting aside these assumptions, the phenomenologist can focus purely on the phenomena as they are presented to consciousness. This is not a denial of the external world's existence but rather a strategic move to prevent theoretical biases from <b>(2)______</b> the analysis of experience. The ultimate aim is to arrive at the essential structures, or 'eideia', of what is experienced. <b>(3)______</b>, phenomenology is a descriptive enterprise rather than an explanatory one; it asks \"what it is like\" to experience something, not \"why\" it occurs. This rigorous introspection has profoundly influenced not just philosophy but also fields like sociology, psychology, and cognitive science, offering a potent <b>(4)______</b> to purely objectivist and materialist accounts of the mind and reality.</p>",

    "correct_option_id": 0,
    "solution": "<p>The sentence given in option (a) is grammatically correct. After the infinitive marker \"to\", we usually use the base form of the verb. 'Invest' (used in option a) is the base form of the verb. 'Invests' (third-person singular form) and 'invested' (past tense form) are not the base forms of the verb. Option (d) is incorrect because of the incorrect preposition 'on'. The preposition \"on\" typically indicates physical contact with a surface or position, or it denotes being supported or held up by something. It is not used to specify the category or field of an investment. Using \"on\" in this context would imply a physical presence on top of real estate, which is not the intended meaning. To convey that savings are being directed towards real estate as an investment category, the correct preposition is \"in\". Hence, (a) is the correct answer. </p><p><b>The correct sentence is: </b>They decided to invest their savings in real estate.</p><p><b>NOTE:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p><p><b>\"Infinitive:</b> The infinitive is the base form of a verb, often preceded by to.</p><p>Consider the sentences given below:</p><p>&#183; To err is human. [like a noun, the infinitive 'to err' is the subject of the verb 'is']</p><p>&#183; My father likes to cook. [like a noun, the infinitive 'to cook' is the object of the verb 'likes']</p><p>&#183; To vote in elections is our right. [the infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p>&#183; Radha went to the lake to fetch water. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p>&#183; The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.\"</p>",

    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Rahul is fit and healthy because he is abstemious ___________ his food habits.</p>",
    "options": [
      "in",
      "to",
      "by",
      "with"
    ],
    "correct_option_id": 0,
    "solution": "<p>Among the given options, \"in\" fits the blank.</p><p>The word 'abstemious' means indulging only very moderately in something.</p><p>The preposition 'in' is used to express a state or condition. In this case, it is expressing the state of being abstemious.</p><p>'To' denotes in the direction of; as far as. 'By' denotes beside; very near. 'With' denotes in the company of somebody/something; in or to the same place as somebody/something.</p><p>The rest of the options are grammatically incorrect.</p><p>Thus, the correct option is <b>(a) in</b>.</p><p>Thus, the correct sentence should be: Rahul is fit and healthy because he is abstemious <u>in</u> his food habits.</p><p><b>Note:</b></p><p>\"A Preposition is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p>Examples</p><p>I. The teacher scolded the child for being late.</p><p>II. We're going to a party.</p><p> The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p> The noun/pronoun which is used with a preposition is called its Object.\"</p>",

    "solution": "<p>Among the given options, \"am\" fits the blank.</p><p>When 'who' refers to a <b>personal pronoun</b> (I, you, he, she, we, they), it takes the verb that agrees with that pronoun.</p><p>For example: It is <b>I</b> who <b>am</b> responsible for this mess.</p><p>In this case, 'am' (verb) agrees with 'I' (personal pronoun) and hence, 'am' is the correct verb used here.</p><p>The rest of the options are grammatically incorrect as they don't agree with 'I'.</p><p>Thus, the correct option is <b>(b) am</b>.</p><p>Thus, the correct sentence should be: It is I who <u>am</u> going to be diplomatic in the upcoming meeting.</p><p>Additional Information:</p><p>Personal Pronouns:</p><p><b>First person</b>- The person speaking.</p><p><b>Second person</b>- The person spoken to.</p><p><b>Third person</b>- The person spoken about.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Personal Pronoun</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Singular</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Plural</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>First person</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I, me, my, mine</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">We, us, our, ours</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Second person</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">You, your, yours</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">You, your, yours</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Third person</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">He, she, him, her</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">They, them, their, theirs</td></tr></table>",

    "question": "<p>  Select the option that expresses the given sentence in passive voice.</p><p>What do you do in the evening?</p>",

    "solution": "<p>The correct answer is option (b).</p><p>The subject of the Active Voice is changed into the object of the Passive voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The preposition \"by\" is used before the object made in Passive Voice. However, it is optional in some cases.</p><p>The question in Active voice is in interrogative form. These are \"wh\" questions that don't take \"yes\" or \"no\" as an answer.</p><p>\"Which/ What\" etc. are placed as they are.</p><p>For example:</p><p>What are you doing? (Active)</p><p>What is being done by you? (Passive)</p><p>Also, the sentence is in the Present Simple tense in the Active voice. So, in the Passive voice, the Present Simple tense should be used.</p><p>The options except (b) don't follow the correct grammatical format of the Passive Voice.</p><p>Thus, the correct answer is: <b>What is done by you in the evening?</b></p>",

    "comp": "<p><b>Directions :</b><b> </b>Read the given passage and answer the questions that follow:</p><p>Cultivating authenticity in restaurants has become an essential aspect of the dining experience, as diners increasingly seek genuine and meaningful interactions with their food and the establishments they visit. In an era of social media and instant gratification, the pursuit of authenticity has emerged as a significant trend in the culinary world. From traditional family-run eateries to modern farm-to-table concepts, restaurants cultivate authenticity as a way to connect with customers, provide a unique dining experience, and differentiate themselves in a competitive market.</p><p>At the heart of the concept of cultivating authenticity in restaurants is the celebration of culinary roots and cultural heritage. Authentic restaurants take pride in preserving traditional recipes, cooking techniques, and ingredients that have been passed down through generations. By staying true to their cultural origins, these establishments offer diners a genuine taste of the region's cuisine and a window into its rich culinary history. For instance, an Italian trattoria may source ingredients directly from Italy, while a Mexican taqueria may make its own tortillas from scratch. These efforts not only enhance the dining experience but also demonstrate a commitment to the authenticity of the cuisine.</p><p>Beyond heritage, authenticity extends to sustainable practices and personal storytelling, fostering deeper emotional connections. Chefs often share narratives of their journeysperhaps a family recipe revived from a grandmother's kitchen or partnerships with local farmers that emphasize seasonal, ethical sourcing. This transparency counters the homogenization of global chains, allowing independent spots to thrive by highlighting hyper-local flavors, like a Pacific Northwest seafood shack grilling wild-caught salmon over alderwood fires. Yet, challenges persist: rising costs for heirloom ingredients and the pressure of viral trends can dilute genuine efforts. Still, when done right, authenticity builds loyalty, turning one-time meals into lifelong memories. In a world craving substance over spectacle, these restaurants remind us that true flavor blooms from roots deeply planted in tradition and community, inviting diners to savor not just the plate, but the story it tells.</p>",

    "solution": "<p><b>i. Proclamation under Article 356 (Incorrect)</b></p><p>Article 356 deals with the imposition of President's Rule in a State due to the failure of constitutional machinery.</p><p>While the Article states the President can act on a report of the Governor, it also explicitly includes the phrase \"or otherwise.\"</p><p>This means the President can take action even without a Governor's report if they are satisfied (via the Union Cabinet) that the State government cannot be carried on in accordance with the Constitution.</p><p></p><p><b>ii. Salaries during Financial Emergency (Incorrect)</b></p><p>Article 360 deals with Financial Emergency. During this period, the President's powers to direct the reduction of salaries are very broad:</p><p>It is not limited to Union Government employees.</p><p>The President may issue directions for the reduction of salaries and allowances of all or any class of persons serving in connection with the affairs of a State.</p><p>Most importantly, this power also extends to the Judges of the Supreme Court and the High Courts, whose salaries are otherwise protected under normal circumstances.</p><p></p><p>Further Insights:</p><p>- Article 356 proclamation must be approved by both Houses within two months; it can continue for six months at a time up to a maximum of three years (with conditions).</p><p>- Financial Emergency (Article 360) has never been proclaimed to date.</p><p>- Under Article 356, the President may assume functions of the State Government and the powers of the Governor/ministries (excluding powers of the High Court).</p><p>- Under Financial Emergency, all Money Bills must receive the President's directions regarding reduction of sums and other financial measures.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct?</p><p>Statement I: The critical angle is defined only for light traveling from an optically denser medium to a rarer medium.</p><p>Statement II: Brewster's angle is the angle of incidence at which reflected light is completely plane-polarized.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344; 1: &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367;&#2325; &#2325;&#2379;&#2339; &#2325;&#2375;&#2357;&#2354; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2368;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2328;&#2344; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2357;&#2367;&#2352;&#2354; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2350;&#2375;&#2306; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2348;&#2381;&#2352;&#2370;&#2360;&#2381;&#2335;&#2352; &#2325;&#2379;&#2339; &#2357;&#2361; &#2310;&#2346;&#2340;&#2344; &#2325;&#2379;&#2339; &#2361;&#2376; &#2332;&#2367;&#2360; &#2346;&#2352; &#2346;&#2352;&#2366;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2360;&#2350;&#2340;&#2354; &#2343;&#2381;&#2352;&#2369;&#2357;&#2368;&#2325;&#2371;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Critical angle c satisfies sin c = n2/n1 with n1 &gt; n2; defined only for denser-to-rarer transition; true.</p><p>Brewster's angle i_p satisfies tan i_p = n2/n1 and gives complete polarization of reflected light; true.</p><p>Further Insights:</p><p>- Total internal reflection occurs for incidence &gt; c when going from denser to rarer medium.</p><p>- Optical fiber works by total internal reflection; cladding index &lt; core index.</p><p>- Dispersion: refractive index varies with wavelength, causing angular separation of colors in prisms.</p>",
    "question_index": 108
  },

    "question": "<span class=\"eqt\"><p>With reference to \"Sacred Games\", consider the following statements:</p><p>I. The novel was written by Vikram Chandra.</p><p>II. It combines crime fiction with social and political commentary on Mumbai.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2360;&#2375;&#2325;&#2381;&#2352;&#2375;&#2337; &#2327;&#2375;&#2350;&#2381;&#2360;\" &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2351;&#2361; &#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; &#2357;&#2367;&#2325;&#2381;&#2352;&#2350; &#2330;&#2306;&#2342;&#2381;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2326;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>II. &#2351;&#2361; &#2350;&#2369;&#2306;&#2348;&#2312; &#2346;&#2352; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2324;&#2352; &#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2335;&#2367;&#2346;&#2381;&#2346;&#2339;&#2368; &#2325;&#2375; &#2360;&#2366;&#2341; &#2309;&#2346;&#2352;&#2366;&#2343; &#2325;&#2341;&#2366; &#2325;&#2366; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",

      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",

    ],

    "solution": "<p>The Novel: Sacred Games is a critically acclaimed 2006 novel written by the Indian-American author Vikram Chandra.</p><p>On the surface, it is a \"police procedural\" and a \"gangster thriller\" set in the criminal underworld of Mumbai.</p><p>The book is famous for its massive scope (over 900 pages), following the lives of police officer Sartaj Singh and underworld don Ganesh Gaitonde.</p><p>It gained further global recognition after being adapted into India's first Netflix original series in 2018.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Vedic culture.</p><p>1. In the Rigvedic period, bodies called Sabha and Samiti had roles in political deliberation.</p><p>2. In the later Vedic age, iron (krishna-ayas) came into wider use.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2376;&#2342;&#2367;&#2325; &#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1. &#2315;&#2327;&#2381;&#2357;&#2376;&#2342;&#2367;&#2325; &#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2360;&#2349;&#2366; &#2324;&#2352; &#2360;&#2350;&#2367;&#2340;&#2367; &#2344;&#2366;&#2350;&#2325; &#2344;&#2367;&#2325;&#2366;&#2351;&#2379;&#2306; &#2325;&#2368; &#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2357;&#2367;&#2330;&#2366;&#2352;-&#2357;&#2367;&#2350;&#2352;&#2381;&#2358; &#2350;&#2375;&#2306; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2361;&#2379;&#2340;&#2368; &#2341;&#2368;&#2404;</p><p>2. &#2313;&#2340;&#2381;&#2340;&#2352; &#2357;&#2376;&#2342;&#2367;&#2325; &#2351;&#2369;&#2327; &#2350;&#2375;&#2306; &#2354;&#2379;&#2361;&#2375; (&#2325;&#2371;&#2359;&#2381;&#2339;&#2366;-&#2310;&#2351;&#2340;) &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2313;&#2346;&#2351;&#2379;&#2327; &#2361;&#2379;&#2344;&#2375; &#2354;&#2327;&#2366;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are correct.</p><p>1. Sabha and Samiti (Correct)</p><p>During the Early Vedic (Rigvedic) period, the tribal chief (Rajan) did not have absolute power. He was assisted by tribal assemblies that played a crucial role in decision-making:</p><p>Sabha: Smaller, more exclusive body, likely consisting of elders and elites.</p><p>Samiti: A larger, more popular assembly where the entire tribe gathered to discuss common matters and elect the Rajan.</p><p>Status of Women: In the Early Vedic period, women were allowed to attend the Sabha, a right that was lost in the later Vedic period.</p><p>2. Use of Iron (Correct)</p><p>The transition from the Early Vedic to the Later Vedic age (c. 1000600 BCE) is marked by a shift from a pastoral (nomadic) society to a settled, agricultural one.</p><p>Krishna-ayas: This term appears in later Vedic texts (like the Atharvaveda) to describe \"black metal,\" which historians identify as iron.</p><p>Impact: Iron tools allowed the Vedic people to clear the thick forests of the Ganges Valley, leading to the expansion of agriculture and the rise of larger territorial states known as Janapadas.</p><p></p><p>Further Insights:</p><p>- Early Vedic polity was tribal; the rajan ruled with counsel of priests and assemblies.</p><p>- Later Vedic society saw consolidation of the varna order and emergence of janapadas.</p><p>- Painted Grey Ware is associated with the later Vedic horizon in the Ganga - Yamuna doab.</p><p>- Important Vedic sacrifices included Rajasuya and Ashvamedha.</p><p>- Early Vedic economy was largely pastoral; agriculture grew in importance later.</p>",
    "question_index": 110
  },

    "question": "<span class=\"eqt\"><p>Identify the correct statement.</p><p>1) The Narmada and the Tapi flow through rift valleys and drain into the Arabian Sea.</p><p>2) Because of their steep gradients and high velocity, they form large deltas on the west coast.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>1) &#2344;&#2352;&#2381;&#2350;&#2342;&#2366; &#2324;&#2352; &#2340;&#2366;&#2346;&#2368; &#2344;&#2342;&#2367;&#2351;&#2366;&#2305; &#2342;&#2352;&#2366;&#2352; &#2328;&#2366;&#2335;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2348;&#2361;&#2340;&#2368; &#2361;&#2376;&#2306; &#2324;&#2352; &#2309;&#2352;&#2348; &#2360;&#2366;&#2327;&#2352; &#2350;&#2375;&#2306; &#2327;&#2367;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2309;&#2346;&#2344;&#2368; &#2340;&#2368;&#2357;&#2381;&#2352; &#2338;&#2354;&#2366;&#2344; &#2324;&#2352; &#2313;&#2330;&#2381;&#2330; &#2357;&#2375;&#2327; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339;, &#2357;&#2375; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2340;&#2335; &#2346;&#2352; &#2348;&#2337;&#2364;&#2375; &#2337;&#2375;&#2354;&#2381;&#2335;&#2366; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Narmada and Tapi indeed flow westward in rift valleys into the Arabian Sea.</p><p>They do not form large deltas; instead, estuaries are common on the west coast due to narrow shelf and energetic conditions.</p><p>Further Insights:</p><p>- The Narmada Rift Valley separates the Vindhya and Satpura ranges.</p><p>- Major projects: Sardar Sarovar (Narmada), Ukai (Tapi).</p><p>- The west&#8209;flowing Mahi and Sabarmati also drain into the Arabian Sea.</p>",
    "question_index": 111
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the FIDE Women's World Cup 2025:</p><p>I. The tournament witnessed the first-ever all-Indian final in the history of the Women's World Cup, also resulting in India's maiden title in the event.</p><p>II. Koneru Humpy won the final by defeating Divya Deshmukh.</p><p>III. During the tournament, Divya Deshmukh secured her first Grandmaster (GM) norm during the event, , defeating top players like Zhu Jiner, Harika Dronavalli, and Tan Zhongyi.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>2025 &#2347;&#2367;&#2337;&#2375; &#2350;&#2361;&#2367;&#2354;&#2366; &#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2346; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2311;&#2360; &#2335;&#2370;&#2352;&#2381;&#2344;&#2366;&#2350;&#2375;&#2306;&#2335; &#2350;&#2375;&#2306; &#2350;&#2361;&#2367;&#2354;&#2366; &#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2346; &#2325;&#2375; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360; &#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2368; &#2348;&#2366;&#2352; &#2325;&#2367;&#2360;&#2368; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2368; &#2344;&#2375; &#2347;&#2366;&#2311;&#2344;&#2354; &#2326;&#2375;&#2354;&#2366;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2311;&#2360; &#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2366; &#2346;&#2361;&#2354;&#2366; &#2326;&#2367;&#2340;&#2366;&#2348; &#2332;&#2368;&#2340;&#2366;&#2404;</p><p>II. &#2325;&#2379;&#2344;&#2375;&#2352;&#2370; &#2361;&#2350;&#2381;&#2346;&#2368; &#2344;&#2375; &#2342;&#2367;&#2357;&#2381;&#2351;&#2366; &#2342;&#2375;&#2358;&#2350;&#2369;&#2326; &#2325;&#2379; &#2361;&#2352;&#2366;&#2325;&#2352; &#2347;&#2366;&#2311;&#2344;&#2354; &#2332;&#2368;&#2340;&#2366;&#2404;</p><p>III. &#2335;&#2370;&#2352;&#2381;&#2344;&#2366;&#2350;&#2375;&#2306;&#2335; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2342;&#2367;&#2357;&#2381;&#2351;&#2366; &#2342;&#2375;&#2358;&#2350;&#2369;&#2326; &#2344;&#2375; &#2333;&#2370; &#2332;&#2367;&#2344;&#2352;, &#2361;&#2352;&#2367;&#2325;&#2366; &#2342;&#2381;&#2352;&#2379;&#2339;&#2366;&#2357;&#2354;&#2381;&#2354;&#2368; &#2324;&#2352; &#2335;&#2376;&#2344; &#2333;&#2379;&#2306;&#2327;&#2351;&#2368; &#2332;&#2376;&#2360;&#2368; &#2358;&#2368;&#2352;&#2381;&#2359; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2361;&#2352;&#2366;&#2325;&#2352; &#2309;&#2346;&#2344;&#2366; &#2346;&#2361;&#2354;&#2366; &#2327;&#2381;&#2352;&#2376;&#2306;&#2337;&#2350;&#2366;&#2360;&#2381;&#2335;&#2352; (&#2332;&#2368;&#2319;&#2350;) &#2344;&#2377;&#2352;&#2381;&#2350; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The FIDE Women's World Cup 2025, held from July 5-28 in Batumi, saw a historic all-Indian final between 19-year-old Divya Deshmukh and seasoned GM Koneru Humpy.</p><p>This marked the first time that two Indian women reached the final, and is also the first-ever Women's World Cup title for India.</p><p>Divya, hailing from Nagpur, defeated Humpy in a tense tiebreak after two drawn classical games.</p><p>She also secured her first GM norm during the event, defeating top players like Zhu Jiner, Harika Dronavalli, and Tan Zhongyi.</p>",
    "question_index": 112
  },

    "question": "<span class=\"eqt\"><p>The older, slightly elevated alluvial terraces in the northern plains with kankar nodules are called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2350;&#2376;&#2342;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2306;&#2325;&#2337;&#2364; &#2325;&#2375; &#2346;&#2367;&#2306;&#2337;&#2379;&#2306; &#2360;&#2375; &#2351;&#2369;&#2325;&#2381;&#2340; &#2346;&#2369;&#2352;&#2366;&#2344;&#2375;, &#2341;&#2379;&#2337;&#2364;&#2375; &#2314;&#2306;&#2330;&#2375; &#2332;&#2354;&#2379;&#2338;&#2364; &#2330;&#2348;&#2370;&#2340;&#2352;&#2375; &#2325;&#2361;&#2354;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Khadar</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2366;&#2342;&#2352;</span>",
      "<span class=\"eqt\">Terai</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2352;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Bhangar</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2306;&#2327;&#2352;</span>",
      "<span class=\"eqt\">Bhabar</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2348;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Bhangar is the older alluvium forming slightly elevated terraces with calcareous kankar concretions.</p><p>Khadar is the newer, annually renewed alluvium in active floodplains.</p><p>Further Insights:</p><p>- Bhabar is a pebble - gravel belt at the Himalayan foothills where streams disappear into porous beds.</p><p>- Terai south of bhabar is marshy with a high water table and tall grasses.</p><p>- Bhangar soils can be less fertile than khadar because they are older and may be leached.</p><p>- The Ganga plains show a west-to-east gradient in flood intensity and silt deposition.</p>",
    "question_index": 113
  },
  {
    "question": "<span class=\"eqt\"><p>In digestion, which hormone stimulates secretion of bicarbonate-rich pancreatic juice into the duodenum?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2330;&#2344; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306;, &#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2366;&#2352;&#2381;&#2350;&#2379;&#2344; &#2327;&#2381;&#2352;&#2361;&#2339;&#2368; &#2350;&#2375;&#2306; &#2348;&#2366;&#2311;&#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2344;&#2375;&#2335; &#2351;&#2369;&#2325;&#2381;&#2340; &#2309;&#2327;&#2381;&#2344;&#2366;&#2358;&#2351;&#2368; &#2352;&#2360; &#2325;&#2375; &#2360;&#2381;&#2352;&#2366;&#2357; &#2325;&#2379; &#2313;&#2340;&#2381;&#2340;&#2375;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Gastrin</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2360;&#2381;&#2335;&#2381;&#2352;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Secretin</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2325;&#2381;&#2352;&#2375;&#2335;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Insulin</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2360;&#2369;&#2354;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Thyroxine</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2366;&#2311;&#2352;&#2377;&#2325;&#2381;&#2360;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Secretin from duodenal S cells is released in response to acidic chyme and promotes bicarbonate secretion from the pancreas and bile ducts.</p><p>Gastrin stimulates gastric acid; insulin and thyroxine are not directly involved in pancreatic bicarbonate secretion.</p><p>Therefore, B is correct.</p><p>Further Insights:</p><p>- Cholecystokinin (CCK) stimulates enzyme-rich pancreatic secretion and gallbladder contraction.</p><p>- Pancreatic bicarbonate neutralizes gastric acid, optimizing pH for pancreatic enzymes (~pH 7 - 8).</p><p>- Enterokinase (enteropeptidase) activates trypsinogen to trypsin in the duodenum.</p><p>- Pancreatic enzymes: amylase (carbohydrates), lipase (fats), proteases (trypsin, chymotrypsin).</p>",
    "question_index": 114
  },
  {
    "question": "<span class=\"eqt\"><p>The Jawahar Rozgar Yojana (JRY), introduced in 1989, was primarily aimed at</p></span><span class=\"hqt\" style=\"display:none\"><p>1989 &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2332;&#2357;&#2366;&#2361;&#2352; &#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2351;&#2379;&#2332;&#2344;&#2366; (&#2332;&#2375;&#2310;&#2352;&#2357;&#2366;&#2312;) &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2341;&#2366;</p></span>",
    "options": [
      "<span class=\"eqt\">Providing urban self-employment to educated youth</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2325;&#2381;&#2359;&#2367;&#2340; &#2351;&#2369;&#2357;&#2366;&#2323;&#2306; &#2325;&#2379; &#2358;&#2361;&#2352;&#2368; &#2360;&#2381;&#2357;&#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Generating wage employment in rural areas through creation of durable assets</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2367;&#2325;&#2366;&#2314; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2375;&#2340;&#2344;&#2349;&#2379;&#2327;&#2368; &#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2360;&#2371;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Promoting entrepreneurship among women SHGs</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2367;&#2354;&#2366; &#2360;&#2381;&#2357;&#2351;&#2306; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2313;&#2342;&#2381;&#2351;&#2350;&#2367;&#2340;&#2366; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Ensuring food security through subsidised grains</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2351;&#2366;&#2351;&#2340;&#2368; &#2309;&#2344;&#2366;&#2332; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2326;&#2366;&#2342;&#2381;&#2351; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Jawahar Rozgar Yojana (JRY) was launched in April 1989 by Prime Minister Rajiv Gandhi, merging previous programs (NREP &amp; RLEGP) to provide wage employment to the rural poor, especially below the poverty line, women, SC/ST, creating community assets, with Centre-State funding (80:20) and Panchayati Raj Institutions (PRIs) handling implementation, aiming for 90-100 days of work, evolving into the Jawahar Gram Samridhi Yojana (JGSY), and later Sampoorna Grameen Rozgar Yojana (SGRY), eventually replaced by MGNREGA (2005).</p>",
    "question_index": 115
  },
  {
    "question": "<span class=\"eqt\"><p>Which city conferred the City Key of Honour upon President Droupadi Murmu in April 2025, recognizing her as an honorary citizen during her two-day state visit?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2346;&#2381;&#2352;&#2376;&#2354; 2025 &#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2342;&#2381;&#2352;&#2380;&#2346;&#2342;&#2368; &#2350;&#2369;&#2352;&#2381;&#2350;&#2370; &#2325;&#2379; &#2313;&#2344;&#2325;&#2368; &#2342;&#2379; &#2342;&#2367;&#2357;&#2360;&#2368;&#2351; &#2352;&#2366;&#2332;&#2325;&#2368;&#2351; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2350;&#2366;&#2344;&#2342; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2342;&#2375;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2367;&#2360; &#2358;&#2361;&#2352; &#2344;&#2375; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2360;&#2367;&#2335;&#2368; &#2325;&#2368; &#2321;&#2347; &#2321;&#2344;&#2352; &#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lisbon</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2367;&#2360;&#2381;&#2348;&#2344;</span>",
      "<span class=\"eqt\">Rome</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2379;&#2350;</span>",
      "<span class=\"eqt\">Vienna</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2351;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Braga</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2366;&#2327;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Lisbon Mayor Carlos Moedas welcomed President Droupadi Murmu in a ceremony to hand over the City Key of Honour, making her an honorary citizen of the City of Seven Hills.</p><p>The President, who is on a two-day state visit to Portugal, was given a Guard of Honour at the Camara Municipal de Lisboa, the historical building where the proclamation of the First Republic of Portugal had taken place from its Noble balcony in 1910.</p><p>Mr. Moedas said with the handing over of the City Key of Honour, President Murmu becomes an honorary citizen of Lisbon. She was taken to the Noble Salon where the ceremony to hand over the City Key of Honour took place with the room packed with Indians who had settled there.</p>",
    "question_index": 116
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements.</p><p>Statement 1: A \"tax expenditure\" refers to revenue foregone by the government due to exemptions, deductions, or credits in the tax law.</p><p>Statement 2: The Statement on the Revenue Impact of Tax Incentives is presented with Union Budget documents in India.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 1: \"&#2325;&#2352; &#2357;&#2381;&#2351;&#2351;\" &#2360;&#2375; &#2340;&#2366;&#2340;&#2381;&#2346;&#2352;&#2381;&#2351; &#2325;&#2352; &#2325;&#2366;&#2344;&#2370;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2331;&#2370;&#2335;&#2379;&#2306;, &#2325;&#2335;&#2380;&#2340;&#2367;&#2351;&#2379;&#2306; &#2351;&#2366; &#2325;&#2381;&#2352;&#2375;&#2337;&#2367;&#2335; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2360;&#2352;&#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2331;&#2379;&#2337;&#2364;&#2375; &#2327;&#2319; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2360;&#2375; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2325;&#2352; &#2346;&#2381;&#2352;&#2379;&#2340;&#2381;&#2360;&#2366;&#2361;&#2344;&#2379;&#2306; &#2325;&#2375; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2346;&#2352; &#2357;&#2367;&#2357;&#2352;&#2339; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2348;&#2332;&#2335; &#2342;&#2360;&#2381;&#2340;&#2366;&#2357;&#2375;&#2332;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Statement 1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 1</span>",
      "<span class=\"eqt\">Statement 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 2</span>",
      "<span class=\"eqt\">Both Statement 1 and Statement 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2324;&#2352; &#2325;&#2341;&#2344; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither Statement 1 nor Statement 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2325;&#2341;&#2344; 1 &#2324;&#2352; &#2344; &#2361;&#2368; &#2325;&#2341;&#2344; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Tax expenditure is a standard term for preferences in the tax code that reduce collections relative to the benchmark system.</p><p>India publishes an estimate of revenue impact of tax incentives in the Receipts Budget annexures.</p><p>Further Insights:</p><p>- Major corporate tax reforms introduced a lower optional rate with removal of many exemptions (2019).</p><p>- GST revenue foregone estimates are separate from direct tax expenditure statements.</p><p>- Direct tax exemptions include deductions under sections like 80C, 80D, and accelerated depreciation provisions.</p><p>- Sunset clauses are used to phase out tax incentives and broaden the base.</p><p>- Tax buoyancy measures responsiveness of tax revenue to GDP growth.</p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>Who among the following has won the UN Environment Programme's (UNEP) Champions of the Earth Award 2025 for her contributions to climate action?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2344;&#2375; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2325;&#2366;&#2352;&#2381;&#2352;&#2357;&#2366;&#2312; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2375; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; (&#2351;&#2370;&#2319;&#2344;&#2312;&#2346;&#2368;) &#2325;&#2366; &#2330;&#2376;&#2306;&#2346;&#2367;&#2351;&#2306;&#2360; &#2321;&#2347; &#2342; &#2309;&#2352;&#2381;&#2341; &#2309;&#2357;&#2366;&#2352;&#2381;&#2337; 2025 &#2332;&#2368;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sunita Narain</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2344;&#2368;&#2340;&#2366; &#2344;&#2366;&#2352;&#2366;&#2351;&#2339;</span>",
      "<span class=\"eqt\">Radhika Gupta</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2343;&#2367;&#2325;&#2366; &#2327;&#2369;&#2346;&#2381;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Harini Nagendra</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2367;&#2344;&#2368; &#2344;&#2366;&#2327;&#2375;&#2306;&#2342;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Supriya Sahu</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2346;&#2381;&#2352;&#2367;&#2351;&#2366; &#2360;&#2366;&#2361;&#2370;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Supriya Sahu,</b> additional chief secretary, Environment, Climate Change and Forests, has won the UN Environment Programme's 2025 Champions of the Earth award.</p><p>She is one of the climate forerunner tackling some of the most urgent challenges. According to UNEP, Ms. Sahu has been chosen for her inspiration and action.</p><p>She has positioned Tamil Nadu as a global leader in climate mitigation, adaptation and heat resilience. Her initiatives have showcased how integrated governance and nature-based solutions, along with a mix of low- and high-tech interventions, can protect vulnerable communities, while reducing greenhouse gas emissions, the UNEP said.</p><p></p><p></p>",
    "question_index": 118
  },

    "question": "<span class=\"eqt\"><p>Identify the true statements.</p><p>1) The Battle of Plassey (1757) brought political supremacy in Bengal after defeating Siraj-ud-Daulah.</p><p>2) The Battle of Buxar (1764) culminated in the grant of Diwani rights to the Company in 1765.</p><p>3) Subsidiary Alliance as a formal system was crafted by Lord Dalhousie.</p><p>4) The Doctrine of Lapse was aggressively applied by Lord Dalhousie.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>1) &#2346;&#2381;&#2354;&#2366;&#2360;&#2368; &#2325;&#2375; &#2351;&#2369;&#2342;&#2381;&#2343; (1757) &#2350;&#2375;&#2306; &#2360;&#2367;&#2352;&#2366;&#2332;-&#2313;&#2342;-&#2342;&#2380;&#2354;&#2366; &#2325;&#2379; &#2361;&#2352;&#2366;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2348;&#2306;&#2327;&#2366;&#2354; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2357;&#2352;&#2381;&#2330;&#2360;&#2381;&#2357; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2361;&#2369;&#2310;&#2404;</p><p>2) &#2348;&#2325;&#2381;&#2360;&#2352; &#2325;&#2375; &#2351;&#2369;&#2342;&#2381;&#2343; (1764) &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; 1765 &#2350;&#2375;&#2306; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2379; &#2342;&#2368;&#2357;&#2366;&#2344;&#2368; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2319; &#2327;&#2319;&#2404;</p><p>3) &#2360;&#2361;&#2366;&#2351;&#2325; &#2360;&#2306;&#2343;&#2367; &#2325;&#2379; &#2319;&#2325; &#2324;&#2346;&#2330;&#2366;&#2352;&#2367;&#2325; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2377;&#2352;&#2381;&#2337; &#2337;&#2354;&#2361;&#2380;&#2332;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2340;&#2376;&#2351;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>4) &#2357;&#2381;&#2351;&#2346;&#2327;&#2340; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2379; &#2354;&#2377;&#2352;&#2381;&#2337; &#2337;&#2354;&#2361;&#2380;&#2332;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2310;&#2325;&#2381;&#2352;&#2366;&#2350;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2354;&#2366;&#2327;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1, 2 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">1, 3 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1, 3 &#2324;&#2352; 4</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Plassey set the stage for Company dominance in Bengal via a puppet Nawab.</p><p>Buxar led to the Treaty of Allahabad (1765) granting Diwani of Bengal, Bihar, Orissa to the Company.</p><p>Subsidiary Alliance was developed by Lord Wellesley (not Dalhousie); statement 3 is wrong.</p><p>Dalhousie used the Doctrine of Lapse to annex states like Satara, Jhansi, Nagpur.</p><p>Further Insights:</p><p>- Mir Jafar and later Mir Qasim were Nawabs of Bengal after Plassey; Mir Qasim's conflict led to Buxar.</p><p>- Treaty of Allahabad also made Awadh a subsidised ally and recognized Shah Alam II's nominal authority.</p><p>- Subsidiary Alliance bound Indian states to host a British force and accept a Resident; Nizam of Hyderabad accepted early.</p><p>- Doctrine of Lapse annexed states without a natural male heir; Awadh (1856) was annexed on grounds of misgovernance, not lapse.</p><p>- Key annexations under Dalhousie: Satara (1848), Sambalpur (1849), Jhansi (1854), Nagpur (1853).</p><p>- The Carnatic Wars earlier established British military superiority in south India against the French.</p>",
    "question_index": 119
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Election Commission of India (ECI).</p><p>1) The Chief Election Commissioner (CEC) can be removed only in the same manner and on the same grounds as a Supreme Court judge.</p><p>2) An Election Commissioner (other than the CEC) may be removed by the President only on the recommendation of the CEC.</p><p>3) The Model Code of Conduct (MCC) is a law enacted by Parliament and non-compliance is punishable under it.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2344; &#2310;&#2351;&#2379;&#2327; (ECI) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1) &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2344; &#2310;&#2351;&#2369;&#2325;&#2381;&#2340; (CEC) &#2325;&#2379; &#2325;&#2375;&#2357;&#2354; &#2313;&#2360;&#2368; &#2340;&#2352;&#2368;&#2325;&#2375; &#2360;&#2375; &#2324;&#2352; &#2313;&#2360;&#2368; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2361;&#2335;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360; &#2340;&#2352;&#2361; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2379; &#2361;&#2335;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2325;&#2367;&#2360;&#2368; &#2309;&#2344;&#2381;&#2351; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2344; &#2310;&#2351;&#2369;&#2325;&#2381;&#2340; (CEC &#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366;) &#2325;&#2379; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2375;&#2357;&#2354; CEC &#2325;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358; &#2346;&#2352; &#2361;&#2368; &#2361;&#2335;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2310;&#2342;&#2352;&#2381;&#2358; &#2310;&#2330;&#2366;&#2352; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366; (MCC) &#2360;&#2306;&#2360;&#2342; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2325;&#2366;&#2344;&#2370;&#2344; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2366; &#2313;&#2354;&#2381;&#2354;&#2306;&#2328;&#2344; &#2342;&#2306;&#2337;&#2344;&#2368;&#2351; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Statements 1 and 2 are correct: removal protections safeguard the Commission's independence.</p><p>Statement 3 is incorrect: MCC is not a statute; ECI enforces it through directions and by invoking existing laws where applicable.</p><p>Further Insights:</p><p>- Constitutional base: Article 324 covers superintendence, direction, and control of elections.</p><p>- ECI conducts elections to Parliament, State Legislatures, and offices of President and Vice-President.</p><p>- The 2023 law on appointment/conditions of service of CEC/ECs provides a statutory framework (replacing earlier provisions).</p><p>- Delimitation is done by a separate Delimitation Commission, not by the ECI.</p><p>- ECI can countermand/re-poll in cases like large-scale violence or booth-capture backed by evidence.</p>",
    "question_index": 120
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements.</p><p>1) Group 17 elements are called chalcogens.</p><p>2) The oxygen family (Group 16) elements are known as chalcogens.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1) &#2360;&#2350;&#2370;&#2361; 17 &#2325;&#2375; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2379; &#2330;&#2376;&#2354;&#2381;&#2325;&#2379;&#2332;&#2375;&#2344; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; (&#2360;&#2350;&#2370;&#2361; 16) &#2325;&#2375; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2379; &#2330;&#2376;&#2354;&#2381;&#2325;&#2379;&#2332;&#2375;&#2344; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Group 17 are halogens (F, Cl, Br, I, At). Group 16 (O, S, Se, Te, Po) are chalcogens.</p><p>Further Insights:</p><p>- Group 17 = halogens (\"salt formers\"); Group 18 = noble gases.</p><p>- Group 1 = alkali metals; Group 2 = alkaline earth metals.</p><p>- Periodic trends: electronegativity decreases down a group, increases across a period.</p>",
    "question_index": 121
  },
  {
    "question": "<span class=\"eqt\"><p>The Poona Pact (1932) between M.K. Gandhi and B.R. Ambedkar primarily led to:</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;.&#2325;&#2375;. &#2327;&#2366;&#2306;&#2343;&#2368; &#2324;&#2352; &#2348;&#2368;.&#2310;&#2352;. &#2309;&#2306;&#2348;&#2375;&#2337;&#2325;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2346;&#2370;&#2344;&#2366; &#2360;&#2350;&#2333;&#2380;&#2340;&#2366; (1932) &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2348;&#2366;&#2340;&#2375;&#2306; &#2361;&#2369;&#2312;&#2306;:</span>",
    "options": [
      "<span class=\"eqt\">The British withdrawing the Communal Award altogether</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2352;&#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2366;&#2306;&#2346;&#2381;&#2352;&#2342;&#2366;&#2351;&#2367;&#2325; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2325;&#2379; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2357;&#2366;&#2346;&#2360; &#2354;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Replacement of separate electorates by reserved seats for the Depressed Classes in joint electorates</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2325; &#2350;&#2306;&#2337;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2354;&#2367;&#2340; &#2357;&#2352;&#2381;&#2327;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2360;&#2368;&#2335;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2371;&#2341;&#2325; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2325; &#2350;&#2306;&#2337;&#2354;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344;</span>",
      "<span class=\"eqt\">Creation of a separate province for the Depressed Classes</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2354;&#2367;&#2340; &#2357;&#2352;&#2381;&#2327;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2309;&#2354;&#2327; &#2346;&#2381;&#2352;&#2366;&#2306;&#2340; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339;</span>",
      "<span class=\"eqt\">Immediate introduction of adult male franchise across India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2349;&#2352; &#2350;&#2375;&#2306; &#2357;&#2351;&#2360;&#2381;&#2325; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2347;&#2381;&#2352;&#2375;&#2306;&#2330;&#2366;&#2311;&#2332;&#2368; &#2325;&#2368; &#2340;&#2340;&#2381;&#2325;&#2366;&#2354; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Pact ended separate electorates for the Depressed Classes and provided reserved seats within joint electorates, with increased seat numbers.</p><p>It did not withdraw the entire Communal Award or introduce universal male franchise.</p><p>Further Insights:</p><p>- Simon Commission (1927) had no Indian members; led to nationwide protests.</p><p>- Nehru Report (1928) proposed Dominion Status and rejected separate electorates (except for Muslims under certain conditions).</p><p>- Cripps Mission (1942) offered Dominion Status after the war; Congress rejected it.</p><p>- The Gandhi - Irwin Pact (1931) preceded the Second Round Table Conference.</p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>The biosphere is primarily confined to which atmospheric layer where most weather and life processes occur?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2368;&#2357;&#2350;&#2306;&#2337;&#2354; &#2350;&#2369;&#2326;&#2381;&#2351;&#2340;&#2307; &#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2325;&#2368; &#2325;&#2367;&#2360; &#2346;&#2352;&#2340; &#2340;&#2325; &#2360;&#2368;&#2350;&#2367;&#2340; &#2361;&#2376; &#2332;&#2361;&#2366;&#2305; &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2350;&#2380;&#2360;&#2350; &#2324;&#2352; &#2332;&#2368;&#2357;&#2344; &#2360;&#2306;&#2348;&#2306;&#2343;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2328;&#2335;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Thermosphere</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2352;&#2381;&#2350;&#2379;&#2360;&#2381;&#2347;&#2368;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Troposphere</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2359;&#2379;&#2349; &#2350;&#2306;&#2337;&#2354;</span>",
      "<span class=\"eqt\">Mesosphere</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2368;&#2360;&#2379;&#2360;&#2381;&#2347;&#2368;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Stratosphere</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2381;&#2352;&#2376;&#2335;&#2379;&#2360;&#2381;&#2347;&#2367;&#2351;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Life thrives where there is liquid water, moderate temperatures, and active gas exchange, which is mainly in the troposphere.</p><p>The troposphere contains most atmospheric water vapour and supports clouds, rainfall, and the conditions necessary for ecosystems.</p><p>Further Insights:</p><p>- The troposphere generally extends from the surface up to about 8 - 18 km, depending on latitude and season.</p><p>- The stratospheric ozone layer (above the troposphere) filters UV radiation, indirectly protecting life.</p><p>- The biosphere also includes the upper soil (lithosphere) and all aquatic systems (hydrosphere).</p><p>- Biodiversity peaks in the tropics due to higher energy input and climatic stability.</p>",
    "question_index": 123
  },
  {

    "options": [
      "<span class=\"eqt\">Haryana</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2351;&#2366;&#2339;&#2366;</span>",
      "<span class=\"eqt\">Delhi</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2354;&#2381;&#2354;&#2368;</span>",

      "<span class=\"eqt\">Uttarakhand</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2326;&#2306;&#2337;</span>"
