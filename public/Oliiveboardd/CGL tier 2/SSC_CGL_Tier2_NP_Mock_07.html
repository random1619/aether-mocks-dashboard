    "correct_option_id": 2,
    "solution": "<p>As per Census 2011, Sikhs constitute about 57.7% of the population of Punjab, making it the only Indian state where Sikhs form a majority and the state with the highest percentage of Sikh population.</p>",
    "question_index": 124
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Digestive system and enzymes.</p><p>1) Bile salts aid fat emulsification but contain no digestive enzymes.</p><p>2) Trypsin is activated from trypsinogen by enterokinase in the small intestine.</p><p>3) Most nutrient absorption occurs in the large intestine.</p><p>Which of the above statement is/are NOT correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2330;&#2344; &#2340;&#2306;&#2340;&#2381;&#2352; &#2324;&#2352; &#2319;&#2306;&#2332;&#2366;&#2311;&#2350;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1) &#2346;&#2367;&#2340;&#2381;&#2340; &#2354;&#2357;&#2339; &#2357;&#2360;&#2366; &#2325;&#2375; &#2346;&#2366;&#2351;&#2360;&#2368;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2354;&#2375;&#2325;&#2367;&#2344; &#2313;&#2344;&#2350;&#2375;&#2306; &#2325;&#2379;&#2312; &#2346;&#2366;&#2330;&#2325; &#2319;&#2306;&#2332;&#2366;&#2311;&#2350; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2331;&#2379;&#2335;&#2368; &#2310;&#2306;&#2340; &#2350;&#2375;&#2306; &#2319;&#2306;&#2335;&#2352;&#2379;&#2325;&#2366;&#2311;&#2344;&#2375;&#2332; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2335;&#2381;&#2352;&#2367;&#2346;&#2381;&#2360;&#2367;&#2344;&#2379;&#2332;&#2375;&#2344; &#2360;&#2375; &#2335;&#2381;&#2352;&#2367;&#2346;&#2381;&#2360;&#2367;&#2344; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2346;&#2379;&#2359;&#2325; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2366; &#2309;&#2357;&#2358;&#2379;&#2359;&#2339; &#2348;&#2337;&#2364;&#2368; &#2310;&#2306;&#2340; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 3</span>",
      "<span class=\"eqt\">Both 1 and 3</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 3 &#2342;&#2379;&#2344;&#2379;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statements 1 and 2 are correct.</p><p>Statement 3 is not correct; most absorption occurs in the small intestine (especially jejunum/ileum).The large intestine mainly absorbs water, salts, and vitamins (like vitamin K).</p><p>Further Insights:</p><p>- Gastric pepsin operates optimally at acidic pH.</p><p>- Pancreatic enzymes (lipase, amylase, proteases) act in the small intestine.</p><p>- Vitamin B12 absorption requires intrinsic factor; occurs in ileum.</p><p>- Bile is produced in the liver and stored in gallbladder.</p>",
    "question_index": 125
  },
  {
    "question": "<span class=\"eqt\"><p>Which statements are correct regarding Islands and channels.</p><p>1) Lakshadweep islands are coral atolls.</p><p>2) The Ten Degree Channel separates the Andaman group from the Nicobar group.</p><p>3) Barren Island, India's only active volcano, lies in the Arabian Sea.</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2381;&#2357;&#2368;&#2346;&#2379;&#2306; &#2324;&#2352; &#2332;&#2354;&#2350;&#2366;&#2352;&#2381;&#2327;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p><p>1) &#2354;&#2325;&#2381;&#2359;&#2342;&#2381;&#2357;&#2368;&#2346; &#2342;&#2381;&#2357;&#2368;&#2346; &#2360;&#2350;&#2370;&#2361; &#2346;&#2381;&#2352;&#2357;&#2366;&#2354; &#2349;&#2367;&#2340;&#2381;&#2340;&#2367;&#2351;&#2366;&#2305; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2342;&#2360; &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2332;&#2354;&#2350;&#2366;&#2352;&#2381;&#2327; &#2309;&#2306;&#2337;&#2350;&#2366;&#2344; &#2342;&#2381;&#2357;&#2368;&#2346; &#2360;&#2350;&#2370;&#2361; &#2325;&#2379; &#2344;&#2367;&#2325;&#2379;&#2348;&#2366;&#2352; &#2342;&#2381;&#2357;&#2368;&#2346; &#2360;&#2350;&#2370;&#2361; &#2360;&#2375; &#2309;&#2354;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2319;&#2325;&#2350;&#2366;&#2340;&#2381;&#2352; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2332;&#2381;&#2357;&#2366;&#2354;&#2366;&#2350;&#2369;&#2326;&#2368;, &#2348;&#2376;&#2352;&#2344; &#2342;&#2381;&#2357;&#2368;&#2346;, &#2309;&#2352;&#2348; &#2360;&#2366;&#2327;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statements 1 and 2 are correct. Lakshadweep are coral atolls; Ten Degree Channel divides Andaman and Nicobar groups.</p><p>Statement 3 is incorrect. Barren Island is in the Andaman Sea (to the east of Andaman Islands), not the Arabian Sea.</p><p>Further Insights:</p><p>- The Nine Degree Channel separates Minicoy from the main Lakshadweep.</p><p>- Narcondam is a dormant volcanic island in the Andaman Sea.</p><p>- Andaman &amp; Nicobar are largely forested with significant mangrove cover.</p>",
    "question_index": 126
  },
  {
    "question": "<span class=\"eqt\"><p>Which government scheme, launched in 1975, focuses on improving the nutritional and health status of children (0 - 6 years), pregnant women and lactating mothers, and is implemented through Anganwadi centres?</p></span><span class=\"hqt\" style=\"display:none\"><p>1975 &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; (0-6 &#2357;&#2352;&#2381;&#2359;), &#2327;&#2352;&#2381;&#2349;&#2357;&#2340;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2324;&#2352; &#2360;&#2381;&#2340;&#2344;&#2346;&#2366;&#2344; &#2325;&#2352;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2350;&#2366;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2346;&#2379;&#2359;&#2339; &#2324;&#2352; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2360;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2354;&#2366;&#2344;&#2375; &#2346;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2310;&#2306;&#2327;&#2344;&#2357;&#2366;&#2337;&#2364;&#2368; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2367;&#2340; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">National Health Mission</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2350;&#2367;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Mid-Day Meal Scheme</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351;&#2366;&#2361;&#2381;&#2344; &#2349;&#2379;&#2332;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Integrated Child Development Services(ICDS)</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2368;&#2325;&#2371;&#2340; &#2348;&#2366;&#2354; &#2357;&#2367;&#2325;&#2366;&#2360; &#2360;&#2375;&#2357;&#2366;&#2319;&#2305; (&#2310;&#2312;&#2360;&#2368;&#2337;&#2368;&#2319;&#2360;)</span>",
      "<span class=\"eqt\">Poshan Abhiyaan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2359;&#2339; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Integrated Child Development Services (ICDS) Scheme, now renamed as Anganwadi Services, was launched in 1975 with the objectives to improve the nutritional and health status of children in the age-group 0-6 years, to lay the foundation for proper psychological, physical and social development of the child, to reduce the incidence of mortality, morbidity, malnutrition and school dropout, to achieve effective co-ordination of policy and implementation amongst the various departments to promote child development; and to enhance the capability of the mother to look after the normal health and nutritional needs of the child through proper nutrition and health education.</p><p>Under the scheme six services namely Supplementary Nutrition, Health &amp; Nutrition Education, Pre-school Education, Immunization, Referral Services and Health Check-up are provided at the Anganwadi Centres (AWCs). The beneficiaries of the scheme are children 0-6 years old and Pregnant Women &amp; Lactating Mothers. It is Centrally Sponsored Scheme implemented by the States/UTs.</p>",
    "question_index": 127
  },
  {
    "question": "<span class=\"eqt\"><p>Regarding GST structure, evaluate the statements:</p><p>1) Intra-state supplies attract CGST and SGST.</p><p>2) Inter-state supplies and imports attract IGST.</p><p>3) Exports are zero-rated under GST.</p><p>Which statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><p>1) &#2309;&#2306;&#2340;&#2352;&#2352;&#2366;&#2332;&#2381;&#2351;&#2368;&#2351; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2360;&#2368;&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2324;&#2352; &#2319;&#2360;&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2309;&#2306;&#2340;&#2352;&#2352;&#2366;&#2332;&#2381;&#2351;&#2368;&#2351; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2310;&#2351;&#2366;&#2340;&#2379;&#2306; &#2346;&#2352; &#2310;&#2312;&#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2332;&#2368;&#2319;&#2360;&#2335;&#2368; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; &#2358;&#2370;&#2344;&#2381;&#2351;-&#2352;&#2375;&#2335;&#2375;&#2337; &#2361;&#2376;&#2306;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All three statements are correct; GST design uses CGST/SGST for intra-state, IGST for inter-state/imports, and exports are zero-rated.</p><p>Further Insights:</p><p>- IGST is levied by the Centre and apportioned between Centre and destination State.</p><p>- GST Council is chaired by the Union Finance Minister.</p><p>- Composition levy is available to eligible small taxpayers at concessional rates.</p><p>- Petroleum crude, HSD, petrol, natural gas and ATF are currently outside GST.</p>",
    "question_index": 128
  },

    "question": "<span class=\"eqt\"><p>Given below are two statements marked as Assertion and Reason. Choose the correct option.</p><p>Assertion (A): The Election Commission of India can cancel and re&#8209;poll an election in a constituency if there is credible evidence of large&#8209;scale booth capturing.</p><p>Reason (R): Section 58A of the Representation of the People Act, 1951 empowers the Commission to adjourn or countermand a poll where booth capturing has occurred.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2379; &#2360;&#2381;&#2335;&#2375;&#2335;&#2350;&#2375;&#2306;&#2335; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2366;&#2352;&#2381;&#2325; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2360;&#2361;&#2368; &#2321;&#2346;&#2381;&#2358;&#2344; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2309;&#2327;&#2352; &#2348;&#2337;&#2364;&#2375; &#2346;&#2376;&#2350;&#2366;&#2344;&#2375; &#2346;&#2352; &#2348;&#2370;&#2341; &#2325;&#2376;&#2346;&#2381;&#2330;&#2352;&#2367;&#2306;&#2327; &#2325;&#2366; &#2357;&#2367;&#2358;&#2381;&#2357;&#2360;&#2344;&#2368;&#2351; &#2360;&#2348;&#2370;&#2340; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2330;&#2369;&#2344;&#2366;&#2357; &#2310;&#2351;&#2379;&#2327; &#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2344; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2330;&#2369;&#2344;&#2366;&#2357; &#2352;&#2342;&#2381;&#2342; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2342;&#2379;&#2348;&#2366;&#2352;&#2366; &#2330;&#2369;&#2344;&#2366;&#2357; &#2325;&#2352;&#2357;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2332;&#2344;&#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1951 &#2325;&#2368; &#2343;&#2366;&#2352;&#2366; 58A &#2310;&#2351;&#2379;&#2327; &#2325;&#2379; &#2320;&#2360;&#2375; &#2330;&#2369;&#2344;&#2366;&#2357; &#2325;&#2379; &#2360;&#2381;&#2341;&#2327;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2351;&#2366; &#2352;&#2342;&#2381;&#2342; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2361;&#2366;&#2305; &#2348;&#2370;&#2341; &#2325;&#2376;&#2346;&#2381;&#2330;&#2352;&#2367;&#2306;&#2327; &#2361;&#2369;&#2312; &#2361;&#2379;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The power to countermand/re&#8209;poll for booth capturing is explicitly provided in Section 58A, RPA 1951.</p><p>Therefore A is true; R states the very legal basis and explains why ECI can act, so R is the correct explanation.</p><p>Further Insights:</p><p>- Article 324 vests the \"superintendence, direction and control\" of elections in the ECI.</p><p>- \"Booth capturing\" is defined as an offence in Section 135A of the RPA 1951.</p><p>- ECI may order fresh poll in specific polling stations or the entire constituency depending on the extent of malpractice.</p><p>- The Model Code of Conduct (MCC) has no statutory backing; ECI enforces it using Article 324 and existing laws.</p><p>- Mohinder Singh Gill v. Chief Election Commissioner (1978) affirmed ECI's plenary powers to ensure free and fair elections.</p>",
    "question_index": 129
  },
  {
    "question": "<span class=\"eqt\"><p>What is a CAPTCHA commonly used for in e-banking?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2312;-&#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2350;&#2375;&#2306; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; <b>&#2325;&#2376;&#2346;&#2381;&#2330;&#2366;</b> (CAPTCHA) &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2360;&#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Confirming account balances</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2366;&#2340;&#2375; &#2325;&#2368; &#2358;&#2375;&#2359; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2368; &#2346;&#2369;&#2359;&#2381;&#2335;&#2367; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Authenticating user identity</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2346;&#2381;&#2352;&#2350;&#2366;&#2339;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Encrypting sensitive data</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2375;&#2342;&#2344;&#2358;&#2368;&#2354; &#2337;&#2375;&#2335;&#2366; &#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Conducting market research</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2332;&#2366;&#2352; &#2309;&#2344;&#2369;&#2360;&#2306;&#2343;&#2366;&#2344; &#2325;&#2366; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A CAPTCHA (Completely Automated Public Turing test to tell Computers and Humans Apart) is commonly used in e-banking and other online services to <b>authenticate user</b> identity. CAPTCHAs typically present a challenge or puzzle, such as distorted text, images, or puzzles, that users must solve to prove they are human and not automated bots. This helps enhance security by preventing automated bots from attempting unauthorized access to e-banking accounts or other online services. By solving the CAPTCHA, users confirm their identity and prove that they are real humans attempting to access their accounts.</p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>In Computer, Operating System uses which of the following for paging virtual memory?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2350;&#2375;&#2306; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2357;&#2352;&#2381;&#2330;&#2369;&#2309;&#2354; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2368; &#2346;&#2375;&#2332;&#2367;&#2306;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Copy- write</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2377;&#2346;&#2368;-&#2352;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">Page break</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2332; &#2348;&#2381;&#2352;&#2375;&#2325;</span>",
      "<span class=\"eqt\">Page replacement</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2332; &#2352;&#2367;&#2346;&#2381;&#2354;&#2375;&#2360;&#2350;&#2375;&#2306;&#2335;</span>",
      "<span class=\"eqt\">Demand paging</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2350;&#2366;&#2306;&#2337; &#2346;&#2375;&#2332;&#2367;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Page Replacement</b></p><p>&#183; In order to make the most use of virtual memory, we load several processes into memory at the same time. Since we only load the pages that are actually needed by each process at any given time, there is room to load many more processes than if we had to load in the entire process.</p><p>&#183; However memory is also needed for other purposes ( such as I/O buffering ), and what happens if some process suddenly decides it needs more pages and there aren't any free frames available? There are several possible solutions to consider:</p><p>1) Adjust the memory used by I/O buffering, etc., to free up some frames for user processes. The decision of how to allocate memory for I/O versus user processes is a complex one, yielding different policies on different systems. ( Some allocate a fixed amount for I/O, and others let the I/O system contend for memory along with everything else. )</p><p>2) Put the process requesting more pages into a wait queue until some free frames become available.</p><p>3) Swap some process out of memory completely, freeing up its page frames.</p><p>4) Find some page in memory that isn't being used right now, and swap that page only out to disk, freeing up a frame that can be allocated to the process requesting it. This is known as <b><i>page replacement</i></b>, and is the most common solution. There are many different algorithms for page replacement</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following type of scanner would you not find typically in a library where books are scanned?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2360;&#2381;&#2325;&#2376;&#2344;&#2352; &#2310;&#2346;&#2325;&#2379; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2367;&#2360;&#2368; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2344;&#2361;&#2368;&#2306; &#2350;&#2367;&#2354;&#2375;&#2327;&#2366; &#2332;&#2361;&#2366;&#2305; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2375;&#2306; &#2360;&#2381;&#2325;&#2376;&#2344; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Flatbed Scanner</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2354;&#2376;&#2335;&#2348;&#2375;&#2337; &#2360;&#2381;&#2325;&#2376;&#2344;&#2352;</span>",
      "<span class=\"eqt\">Sheet fed Scanner</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2368;&#2335; &#2347;&#2375;&#2337; &#2360;&#2381;&#2325;&#2376;&#2344;&#2352;</span>",
      "<span class=\"eqt\">Handheld Scanner</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2376;&#2306;&#2337;&#2361;&#2375;&#2354;&#2381;&#2337; &#2360;&#2381;&#2325;&#2376;&#2344;&#2352;</span>",
      "<span class=\"eqt\">Integrated Scanner</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2335;&#2368;&#2327;&#2381;&#2352;&#2375;&#2335;&#2375;&#2337; &#2360;&#2381;&#2325;&#2376;&#2344;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Sheet-fed scanners</b> deal with only paper scanning and are <b>not used for scanning 3D objects or books</b>. These are <b>more business-oriented scanners</b> that are used in offices and workplaces as opposed to those used in libraries or archives.</p>",
    "question_index": 132
  },
  {
    "question": "<span class=\"eqt\"><p>Cold Boot in a computer is also called as?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2350;&#2375;&#2306; &#2325;&#2379;&#2354;&#2381;&#2337; &#2348;&#2370;&#2335; &#2325;&#2379; ____&#2349;&#2368; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;|</p></span>",
    "options": [
      "<span class=\"eqt\">Freeze Boot</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2352;&#2368;&#2332; &#2348;&#2370;&#2335;</span>",
      "<span class=\"eqt\">Hard Boot</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2352;&#2381;&#2337; &#2348;&#2370;&#2335;</span>",
      "<span class=\"eqt\">Chill Boot</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2367;&#2354; &#2348;&#2370;&#2335;</span>",
      "<span class=\"eqt\">Solid Boot</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2377;&#2354;&#2367;&#2337; &#2348;&#2370;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Cold boot is also called as <b>Hard Boot</b>. Cold boot is often used in contrast to a warm boot, which refers to restarting a computer once it has been turned on. A cold boot is typically performed by pressing the power button on the computer.</p><p>Both a cold boot and warm boot clear the system RAM and perform the boot sequence from scratch. However, unlike a cold boot, a warm boot may not clear all system caches, which store temporary information.</p>",
    "question_index": 133
  },
  {
    "question": "<span class=\"eqt\"><p>What does the red line in MS Word Indicate?</p></span><span class=\"hqt\" style=\"display:none\"><p>MS &#2357;&#2352;&#2381;&#2337; &#2350;&#2375;&#2306; &#2354;&#2366;&#2354; &#2352;&#2375;&#2326;&#2366; &#2325;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Grammar Error</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2366;&#2350;&#2352; &#2319;&#2352;&#2352;</span>",
      "<span class=\"eqt\">Spelling Error</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2375;&#2354;&#2367;&#2306;&#2327; &#2319;&#2352;&#2352;</span>",
      "<span class=\"eqt\">Contextual Error</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2377;&#2344;&#2381;&#2335;&#2375;&#2325;&#2381;&#2360;&#2330;&#2369;&#2309;&#2354; &#2319;&#2352;&#2352;</span>",
      "<span class=\"eqt\">Factual Error</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2376;&#2325;&#2381;&#2330;&#2369;&#2309;&#2354; &#2319;&#2352;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Red line is used for flagged spelling errors (or words that MS Word doesn't know).</p><p>&#183; Green line is used for flagged gramatical errors, such a subj/verb aggreement..</p><p>&#183; Blue line is used for flagged contextual errors. A word spelled correctly but used out of context.</p>",
    "question_index": 134
  },
  {
    "question": "<span class=\"eqt\"><p>What is the primary function of an output device?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2313;&#2335;&#2346;&#2369;&#2335; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To display information to the user</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2332;&#2352; &#2325;&#2379; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To process data and perform calculations</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2360;&#2306;&#2360;&#2366;&#2343;&#2367;&#2340;/&#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To store and retrieve files</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2324;&#2352; &#2346;&#2369;&#2344;&#2307; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; (&#2352;&#2367;&#2335;&#2381;&#2352;&#2368;&#2357;) &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To provide power supply to the computer</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350;&#2381;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2379; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Output devices, such as monitors or printers, present data or information to the user in a readable or visually discernible format.</p><p>Examples include monitors, printers, speakers, headphones, projectors, GPS devices, optical mark readers, and braille readers.</p>",

  },

    "options": [

      "<span class=\"eqt\">52 Mbps</span><span class=\"hqt\" style=\"display:none\">52 Mbps</span>",
      "<span class=\"eqt\">128 Kbps</span><span class=\"hqt\" style=\"display:none\">128 Kbps</span>",
      "<span class=\"eqt\">128 Mbps</span><span class=\"hqt\" style=\"display:none\">128 Mbps</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Dial-up modem connections offer data transfer speeds of up to 52 Kbps.</p><p><b>ISDN</b> digital telephone lines offer a faster connection to the Internet.</p><p>ISDN connections offer data transfer speeds of up to 128 Kbps.</p><p>Dialup modems and ISDN lines are gradually being replaced by <b>broadband</b> connections that use a system called <b>ADSL</b>.Broadband connections allow round-the-clock Internet access without having to dial a special telephone number and wait for a connection to be established.</p><p>ASDL is much faster than ISDN typically offering data transfer speeds of between 500 Kbps and 1,000 Kbps.</p>",
    "question_index": 136
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about optical storage devices:</p><p>1. Optical disks store data using laser technology.</p><p>2. Optical disks are faster than solid-state drives.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2321;&#2346;&#2381;&#2335;&#2367;&#2325;&#2354; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2321;&#2346;&#2381;&#2335;&#2367;&#2325;&#2354; &#2337;&#2367;&#2360;&#2381;&#2325; &#2354;&#2375;&#2332;&#2352; &#2340;&#2325;&#2344;&#2368;&#2325; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2337;&#2375;&#2335;&#2366; &#2360;&#2381;&#2335;&#2379;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>2. &#2321;&#2346;&#2381;&#2335;&#2367;&#2325;&#2354; &#2337;&#2367;&#2360;&#2381;&#2325; &#2360;&#2377;&#2354;&#2367;&#2337;-&#2360;&#2381;&#2335;&#2375;&#2335; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357; &#2360;&#2375; &#2340;&#2375;&#2332;&#2364; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 (Correct): Devices like CDs and DVDs use a laser beam to read \"pits\" and \"lands\" on a reflective surface.</p><p>Statement 2 (Incorrect): Solid-State Drives (SSDs) use flash memory and have no moving parts, making them significantly faster than optical disks.</p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>Which ribbon tab in MS Excel contains options for inserting charts, pictures, shapes, and other graphical elements? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2352;&#2367;&#2348;&#2344; &#2335;&#2376;&#2348; &#2350;&#2375;&#2306; &#2330;&#2366;&#2352;&#2381;&#2335;, &#2346;&#2367;&#2325;&#2381;&#2330;&#2352;, &#2358;&#2375;&#2346; &#2324;&#2352; &#2309;&#2344;&#2381;&#2351; &#2327;&#2381;&#2352;&#2366;&#2347;&#2367;&#2325;&#2354; &#2319;&#2354;&#2367;&#2350;&#2375;&#2306;&#2335;&#2381;&#2360; &#2346;&#2381;&#2352;&#2357;&#2367;&#2359;&#2381;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Insert</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2360;&#2352;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Data</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2375;&#2335;&#2366;</span>",
      "<span class=\"eqt\">View</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2351;&#2370;</span>",
      "<span class=\"eqt\">Review</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2357;&#2381;&#2351;&#2369;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The ribbon tab in MS Excel that contains options for inserting charts, pictures, shapes, and other graphical elements is the <b>\"Insert\"</b> tab. The \"Insert\" tab is one of the primary tabs in the Excel ribbon and is dedicated to various elements that you can add to your spreadsheet to enhance its visual appeal and convey information effectively.</p><p>Under the <b>\"Insert\"</b> tab, you'll find options for inserting various objects, such as:</p><p>&#61623; Charts: Different types of charts and graphs to visualize data.</p><p>&#61623; Pictures: Inserting images or graphics into the spreadsheet.</p><p>&#61623; Shapes: Adding shapes like rectangles, circles, arrows, etc., to the worksheet.</p><p>&#61623; SmartArt: Pre-designed graphic diagrams to represent information.</p><p>&#61623; Headers &amp; Footers: Adding headers and footers for printing purposes.</p><p>&#61623; Text Boxes: Inserting text boxes to add annotations or additional information.</p><p>This tab provides all the necessary tools to include graphical elements and other visual aids to make your data more understandable and engaging.</p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Following Network Devices(List I) with its Function(List II)</p><p><table style=\"border-collapse:collapse;\"></p><p><tr></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List-I</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List-II</th></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Hub</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Connects different networks</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Switch</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Broadcasts data</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Router</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Uses MAC address</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Firewall</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Filters network traffic</td></p><p></tr></p><p></table></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; (&#2360;&#2370;&#2330;&#2368; I) &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; (&#2360;&#2370;&#2330;&#2368; II) &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;</p><p><table style=\"border-collapse:collapse;\"><tr></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2361;&#2348;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325;&#2379;&#2306; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2360;&#2381;&#2357;&#2367;&#2330;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2337;&#2375;&#2335;&#2366; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2352;&#2366;&#2313;&#2335;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. MAC &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2347;&#2364;&#2366;&#2351;&#2352;&#2357;&#2377;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2335;&#2381;&#2352;&#2376;&#2347;&#2364;&#2367;&#2325; &#2325;&#2379; &#2347;&#2364;&#2367;&#2354;&#2381;&#2335;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr></table></p></span>",
    "options": [
      "<span class=\"eqt\">A-2, B-3, C-1, D-4</span><span class=\"hqt\" style=\"display:none\">A-2, B-3, C-1, D-4</span>",
      "<span class=\"eqt\">A-3, B-2, C-1, D-4</span><span class=\"hqt\" style=\"display:none\">A-3, B-2, C-1, D-4</span>",
      "<span class=\"eqt\">A-2, B-1, C-3, D-4</span><span class=\"hqt\" style=\"display:none\">A-2, B-1, C-3, D-4</span>",
      "<span class=\"eqt\">A-1, B-3, C-2, D-4</span><span class=\"hqt\" style=\"display:none\">A-1, B-3, C-2, D-4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A-2 (Hub): A \"dumb\" device that sends incoming data to every connected port (broadcast).</p><p>B-3 (Switch): An \"intelligent\" device that uses MAC addresses to send data only to the specific destination.</p><p>C-1 (Router): Acts as a gateway to connect different networks (like your home network to the Internet).</p><p>D-4 (Firewall): A security barrier that filters traffic based on safety rules.</p>",
    "question_index": 139
  },

      "<span class=\"eqt\">It can be used by a single user</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2375; &#2360;&#2367;&#2306;&#2327;&#2354; &#2351;&#2370;&#2332;&#2352; &#2311;&#2360;&#2381;&#2340;&#2375;&#2350;&#2366;&#2354; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</span>",

    "correct_option_id": 1,
    "solution": "<p>Mainframe Computers are powerful <b>multiuser</b> computer. It is capable of supporting thousands of users simultaneously. Moreover, capable of faster processing, greater storage area. </p><p>Usage: Research organisations, large industries, large businesses and government organisations, banks and airline reservation where a large database is required.</p>",

  {
    "question": "<span class=\"eqt\"><p>Which type of memory temporarily stores data and instructions that are currently being processed by the CPU?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2309;&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2313;&#2344; &#2337;&#2375;&#2335;&#2366; &#2324;&#2352; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2306;&#2360;&#2366;&#2343;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2352;&#2361;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">ROM</span><span class=\"hqt\" style=\"display:none\">ROM</span>",
      "<span class=\"eqt\">Cache Memory</span><span class=\"hqt\" style=\"display:none\">Cache Memory</span>",
      "<span class=\"eqt\">RAM</span><span class=\"hqt\" style=\"display:none\">RAM</span>",
      "<span class=\"eqt\">Secondary Memory</span><span class=\"hqt\" style=\"display:none\">Secondary Memory</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>RAM (Random Access Memory): Known as \"volatile\" memory, it stores the data and programs currently in use by the CPU. When you turn off the computer, this data is cleared.</p><p>Contrast: ROM is permanent, and Cache is a smaller, even faster buffer between RAM and the CPU.</p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an established set of rules that determine how data is transmitted between different devices in the same network?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2344;&#2367;&#2351;&#2350;&#2379;&#2306; &#2325;&#2366; &#2319;&#2325; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2360;&#2350;&#2370;&#2361; &#2361;&#2376; &#2332;&#2379; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2360;&#2350;&#2366;&#2344; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2337;&#2375;&#2335;&#2366; &#2325;&#2376;&#2360;&#2375; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Network design</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2337;&#2367;&#2395;&#2366;&#2311;&#2344;</span>",
      "<span class=\"eqt\">Network protocol</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354;</span>",
      "<span class=\"eqt\">Network algorithm</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2309;&#2354;&#2381;&#2327;&#2379;&#2352;&#2367;&#2342;&#2350;</span>",
      "<span class=\"eqt\">Network code</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2325;&#2379;&#2337;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A <b>network protocol</b> is an established set of rules that determine how data is transmitted between different devices in the same network. Essentially, it allows connected devices to communicate with each other, regardless of any differences in their internal processes, structure or design. </p>",
    "question_index": 142
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about pipelining in CPU:</p><p>1. Pipelining improves instruction throughput.</p><p>2. Pipelining allows overlapping of instruction execution.</p><p>3. Pipelining reduces the execution time of individual instructions.</p><p>Which of the above statements are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2350;&#2375;&#2306; &#2346;&#2366;&#2311;&#2346;&#2354;&#2366;&#2311;&#2344;&#2367;&#2306;&#2327; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2346;&#2366;&#2311;&#2346;&#2354;&#2366;&#2311;&#2344;&#2367;&#2306;&#2327; &#2360;&#2375; &#2311;&#2306;&#2360;&#2381;&#2335;&#2381;&#2352;&#2325;&#2381;&#2358;&#2344; &#2341;&#2381;&#2352;&#2370;&#2346;&#2369;&#2335; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2346;&#2366;&#2311;&#2346;&#2354;&#2366;&#2311;&#2344;&#2367;&#2306;&#2327; &#2360;&#2375; &#2311;&#2306;&#2360;&#2381;&#2335;&#2381;&#2352;&#2325;&#2381;&#2358;&#2344; &#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2344; &#2350;&#2375;&#2306; &#2323;&#2357;&#2352;&#2354;&#2376;&#2346;&#2367;&#2306;&#2327; &#2360;&#2306;&#2349;&#2357; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3. &#2346;&#2366;&#2311;&#2346;&#2354;&#2366;&#2311;&#2344;&#2367;&#2306;&#2327; &#2360;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2311;&#2306;&#2360;&#2381;&#2335;&#2381;&#2352;&#2325;&#2381;&#2358;&#2344; &#2325;&#2375; &#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2344; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368; &#2310;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement 1 (Correct): Throughput (the total number of tasks finished per second) increases.</p><p>Statement 2 (Correct): It works like an assembly line; while one instruction is being decoded, the next one is already being fetched.</p><p>Statement 3 (Incorrect): The time it takes for one specific instruction to travel through all stages (latency) does not decrease; it might actually increase slightly.</p>",
    "question_index": 143
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about ransomware:</p><p>1. Ransomware encrypts user data and demands payment.</p><p>2. Ransomware usually spreads through malicious links or attachments.</p><p>3. Paying ransom guarantees recovery of encrypted data.</p><p>Which of the above statements are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2376;&#2306;&#2360;&#2350;&#2357;&#2375;&#2351;&#2352; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2352;&#2376;&#2306;&#2360;&#2350;&#2357;&#2375;&#2351;&#2352; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2368; &#2350;&#2366;&#2306;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2352;&#2376;&#2306;&#2360;&#2350;&#2357;&#2375;&#2351;&#2352; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2342;&#2369;&#2352;&#2381;&#2349;&#2366;&#2357;&#2344;&#2366;&#2346;&#2370;&#2352;&#2381;&#2339; &#2354;&#2367;&#2306;&#2325; &#2351;&#2366; &#2309;&#2335;&#2376;&#2330;&#2350;&#2375;&#2306;&#2335; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2347;&#2376;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3. &#2347;&#2367;&#2352;&#2380;&#2340;&#2368; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335;&#2375;&#2337; &#2337;&#2375;&#2335;&#2366; &#2325;&#2368; &#2346;&#2369;&#2344;&#2352;&#2381;&#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367; &#2325;&#2368; &#2327;&#2366;&#2352;&#2306;&#2335;&#2368; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement 1 (Correct): It locks files using encryption and displays a note demanding money (usually Bitcoin) for the key.</p><p>Statement 2 (Correct): Most infections occur via Phishing emails or visiting compromised websites.</p><p>Statement 3 (Incorrect): Cybercriminals often do not provide the decryption key even after payment. Experts always advise against paying the ransom.</p>",
    "question_index": 144
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following keeps track of time and resources used by various users and processes in a computer system?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2324;&#2352; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; (&#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2350;&#2351; &#2324;&#2352; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2325;&#2379; &#2335;&#2381;&#2352;&#2376;&#2325; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Hard drive</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2352;&#2381;&#2337; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;</span>",
      "<span class=\"eqt\">SSD</span><span class=\"hqt\" style=\"display:none\">SSD</span>",
      "<span class=\"eqt\">Operating system</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>",
      "<span class=\"eqt\">Web browser</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2348; &#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2364;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The operating system is the manager of all system resources. The functions of operating systems are:</p><p>&#183; Memory Management</p><p>&#183; Process Management</p><p>&#183; Device Management</p><p>&#183; File Management</p><p>&#183; Storage Management</p><p>&#183; Security</p><p>&#183; Job Accounting (It keeps track of time and resources used by various users and processes)</p><p>&#183; Controls system performance</p><p>&#183; Error detecting aids</p><p>&#183; Coordination between other software and users</p>",
    "question_index": 145
  },
  {
    "question": "<span class=\"eqt\"><p>Which MS Word feature allows users to track changes made by different reviewers in a document?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2357;&#2352;&#2381;&#2337; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2347;&#2364;&#2368;&#2330;&#2352; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2325;&#2367;&#2360;&#2368; &#2342;&#2360;&#2381;&#2340;&#2366;&#2357;&#2375;&#2332;&#2364; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2360;&#2350;&#2368;&#2325;&#2381;&#2359;&#2325;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2319; &#2327;&#2319; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;&#2379;&#2306; &#2325;&#2379; &#2335;&#2381;&#2352;&#2376;&#2325; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Compare</span><span class=\"hqt\" style=\"display:none\">Compare</span>",
      "<span class=\"eqt\">Restrict Editing</span><span class=\"hqt\" style=\"display:none\">Restrict Editing</span>",
      "<span class=\"eqt\">Track Changes</span><span class=\"hqt\" style=\"display:none\">Track Changes</span>",
      "<span class=\"eqt\">Protect Document</span><span class=\"hqt\" style=\"display:none\">Protect Document</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Track Changes is a collaboration tool that highlights every edit (additions, deletions, and formatting) in a different color, allowing the author to \"Accept\" or \"Reject\" them later.</p>",
    "question_index": 146
  },
  {
    "question": "<span class=\"eqt\"><p>What is the main goal of a \"botnet\" in the context of hacking? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2376;&#2325;&#2367;&#2306;&#2327; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; \"&#2348;&#2377;&#2335;&#2344;&#2375;&#2335;\" &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To protect computer networks from cyberattacks</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2325;&#2379; &#2360;&#2366;&#2311;&#2348;&#2352; &#2361;&#2350;&#2354;&#2379;&#2306; &#2360;&#2375; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">To launch coordinated cyberattacks</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2344;&#2381;&#2357;&#2367;&#2340; &#2360;&#2366;&#2311;&#2348;&#2352; &#2361;&#2350;&#2354;&#2375; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">To perform automated system updates</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2330;&#2366;&#2354;&#2367;&#2340; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2309;&#2346;&#2337;&#2375;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>",
      "<span class=\"eqt\">To secure communication channels</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2330;&#2366;&#2352; &#2330;&#2376;&#2344;&#2354;&#2379;&#2306; &#2325;&#2379; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The main goal of a \"botnet\" (short for \"robot network\") in the context of hacking is to launch coordinated cyberattacks. A botnet is a network of compromised computers, often referred to as \"bots\" or \"zombies,\" that are controlled by a single entity or attacker. These compromised computers are typically infected with malicious software, allowing the attacker to use them collectively to carry out various cyberattacks, such as Distributed Denial of Service (DDoS) attacks, spam campaigns, data theft, and more. The botnet allows the attacker to control a large number of computers for malicious purposes, making it a potent tool for carrying out coordinated cyberattacks.</p>",
    "question_index": 147
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding incognito/private browsing mode:</p><p>1. It prevents the browser from saving history and cookies locally.</p><p>2. It completely hides user activity from websites and ISPs.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2346;&#2381;&#2340;/&#2344;&#2367;&#2332;&#2368; &#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2364;&#2367;&#2306;&#2327; &#2350;&#2379;&#2337; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2351;&#2361; &#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2364;&#2352; &#2325;&#2379; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360; &#2324;&#2352; &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2360;&#2361;&#2375;&#2332;&#2344;&#2375; &#2360;&#2375; &#2352;&#2379;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2351;&#2361; &#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335;&#2379;&#2306; &#2324;&#2352; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2360;&#2375;&#2357;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2340;&#2366;&#2323;&#2306; &#2360;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367; &#2325;&#2379; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2331;&#2369;&#2346;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 (Correct): This mode prevents your local device from saving history, search queries, or cookies after the session ends.</p><p>Statement 2 (Incorrect): It does not make you anonymous. Your ISP (Internet Service Provider), your employer, and the websites you visit can still see and track your activity.</p>",
