    "question": "<span class=\"eqt\"><p>What is the fourth proportion of 78, 36, and 117?</p></span><span class=\"hqt\" style=\"display:none\"><p>78, 36 &#2324;&#2352; 117 &#2325;&#2366; &#2330;&#2340;&#2369;&#2352;&#2381;&#2341;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

  {
    "question": "<span class=\"eqt\"><p>If (cosecA + sinA) = 3/&radic;2, then what is the value of (cosecA  -  sinA)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (cosecA + sinA) = 3/&radic;2 &#2361;&#2376;, &#2340;&#2379; (cosecA - sinA) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;2</span><span class=\"hqt\" style=\"display:none\">&radic;2</span>",
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>",
      "<span class=\"eqt\">1/&radic;2</span><span class=\"hqt\" style=\"display:none\">1/&radic;2</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>(cosecA + sinA) = 3/&radic;2</p><p>(cosecA + sinA)<sup>2</sup> = (3/&radic;2)<sup>2</sup></p><p>(cosec<sup>2</sup>A + sin<sup>2</sup>A + 2cosecA.sinA) = 9/2</p><p>[cosec<sup>2</sup>A + sin<sup>2</sup>A + 2.(1/sinA).sinA] = 9/2</p><p>(cosec<sup>2</sup>A + sin<sup>2</sup>A + 2) = 9/2</p><p>(cosec<sup>2</sup>A + sin<sup>2</sup>A) = (9/2)  -  2</p><p>(cosec<sup>2</sup>A + sin<sup>2</sup>A) = (5/2) .... (1)</p><p>(cosecA  -  sinA)<sup>2</sup> = (cosec<sup>2</sup>A + sin<sup>2</sup>A  -  2cosecA.sinA)</p><p>From (1)-</p><p>(cosecA  -  sinA)<sup>2 </sup>= (5/2)  -  2 * (1/sinA) * (sinA)</p><p>(cosecA  -  sinA)<sup>2 </sup>= (5/2)  -  2</p><p>(cosecA  -  sinA)<sup>2 </sup>= 1/2</p><p>(cosecA  -  sinA) = (1/&radic;2)</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A player score 30 runs in his 24th innings and his average decreased by 3 runs, then find the average of player in 23 innings.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2368; &#2344;&#2375; &#2309;&#2346;&#2344;&#2368; 24&#2357;&#2368;&#2306; &#2346;&#2366;&#2352;&#2368; &#2350;&#2375;&#2306; 30 &#2352;&#2344; &#2348;&#2344;&#2366;&#2319; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2324;&#2360;&#2340; &#2350;&#2375;&#2306; 3 &#2352;&#2344; &#2325;&#2368; &#2325;&#2350;&#2368; &#2361;&#2379; &#2327;&#2312;, &#2340;&#2379; 23&#2357;&#2368;&#2306; &#2346;&#2366;&#2352;&#2368; &#2350;&#2375;&#2306; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2368; &#2325;&#2366; &#2324;&#2360;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">100</span><span class=\"hqt\" style=\"display:none\">100</span>",
      "<span class=\"eqt\">102</span><span class=\"hqt\" style=\"display:none\">102</span>",
      "<span class=\"eqt\">97</span><span class=\"hqt\" style=\"display:none\">97</span>",
      "<span class=\"eqt\">105</span><span class=\"hqt\" style=\"display:none\">105</span>"
    ],
    "correct_option_id": 1,
    "solution": "\"<p><span>Let the Average of 23 innings =&nbsp;</span><span><i>x</i></span></p><p>ATQ,</p><p><span>23</span><span><i>x</i></span>&nbsp;<span>+</span>&nbsp;<span>30</span>&nbsp;<span>=</span>&nbsp;<span>(</span><span><i>x</i></span><span>&nbsp;&#8211;&nbsp;</span><span>3)</span>&nbsp;<span>&#215;</span>&nbsp;<span>24</span></p><p><span>23</span><span><i>x</i></span>&nbsp;<span>+</span>&nbsp;<span>30</span>&nbsp;<span>=</span>&nbsp;<span>24</span><span><i>x</i></span>&nbsp;<span>&#8211; 72</span></p><p><span>102=</span><span><i>x</i></span></p><p><span>Average of 23 innings&nbsp;</span><span><i>x</i></span><span>&nbsp;= 102</span></p>\"",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Find the value of &radic;(7+2&radic;12) - [1/ &radic;(7+2&radic;12)]</p></span><span class=\"hqt\" style=\"display:none\"><p>&radic;(7+2&radic;12) - 1/ &radic;(7+2&radic;12) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2&radic;3</span><span class=\"hqt\" style=\"display:none\">2&radic;3</span>",
      "<span class=\"eqt\">4&radic;3</span><span class=\"hqt\" style=\"display:none\">4&radic;3</span>",
      "<span class=\"eqt\">7&radic;3</span><span class=\"hqt\" style=\"display:none\">7&radic;3</span>",
      "<span class=\"eqt\">5&radic;3</span><span class=\"hqt\" style=\"display:none\">5&radic;3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>=&gt; &radic;(7+2&radic;12)</p><p>=&gt; &radic;(4+3+2&radic;(4*3))</p><p>=&gt; &radic;((&radic;4)<sup>2</sup>+(&radic;3)<sup>2</sup>+2&radic;4*&radic;3)</p><p>=&gt; &radic;(&radic;4+&radic;3)<sup>2</sup></p><p>=&gt; &radic;4+&radic;3</p><p>=&gt; And 1/(&radic;(7+2&radic;12))</p><p>= 1/(&radic;4+&radic;3)</p><p>=&gt; (&radic;4-&radic;3)/(4-3)</p><p>=&gt; &radic;4-&radic;3</p><p>Equation becomes</p><p>=&gt; &radic;4 + &radic;3 - &radic;4 + &radic;3</p><p>=&gt; 2 &radic;3</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In &#8710;KLM, point A is an incentre of the triangle and AB is perpendicular LM. If &#8736;LAB = 56&deg;, then what is the value of &#8736;KLM?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#8710;KLM &#2350;&#2375;&#2306;, &#2348;&#2367;&#2306;&#2342;&#2369; A &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2366; &#2309;&#2306;&#2340;&#2307;&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2361;&#2376; &#2324;&#2352; AB &#2354;&#2306;&#2348;&#2357;&#2340; LM &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736;LAB = 56&deg; &#2361;&#2376;, &#2340;&#2379; &#8736;KLM &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">66&deg;</span><span class=\"hqt\" style=\"display:none\">66&deg;</span>",
      "<span class=\"eqt\">68&deg;</span><span class=\"hqt\" style=\"display:none\">68&deg;</span>",
      "<span class=\"eqt\">64&deg;</span><span class=\"hqt\" style=\"display:none\">64&deg;</span>",
      "<span class=\"eqt\">72&deg;</span><span class=\"hqt\" style=\"display:none\">72&deg;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to the question,</p><p><img width=339 height=245 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23108/image027.jpg\"></p><p>Since point A is an incentre of the triangle. So, AL and AM are angle bisector.</p><p>Thus, in &#8710;LAB,</p><p>&#8736;LAB + &#8736;ABL + &#8736;BLA = 180&deg;</p><p>=&gt; 56 + 90 + &#8736;BLA = 180&deg;</p><p>=&gt; &#8736;BLA = 34&deg;</p><p>Hence, &#8736;KLM = 34 * 2 = 68&deg;</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Three years ago, the ratio of ages of nephew and his uncle was 3:7 respectively. If present age of uncle is twice that of his nephew, what is the present age of uncle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2344; &#2357;&#2352;&#2381;&#2359; &#2346;&#2370;&#2352;&#2381;&#2357;, &#2349;&#2340;&#2368;&#2332;&#2375;/&#2349;&#2366;&#2306;&#2332;&#2375; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2309;&#2306;&#2325;&#2354; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3:7 &#2341;&#2366;&#2404; &#2351;&#2342;&#2367; &#2309;&#2306;&#2325;&#2354; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369;, &#2313;&#2360;&#2325;&#2375; &#2349;&#2340;&#2368;&#2332;&#2375;/&#2349;&#2366;&#2306;&#2332;&#2375; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2368; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2309;&#2306;&#2325;&#2354; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">24 years</span><span class=\"hqt\" style=\"display:none\">24 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">20 years</span><span class=\"hqt\" style=\"display:none\">20 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">32 years</span><span class=\"hqt\" style=\"display:none\">32 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">28 years</span><span class=\"hqt\" style=\"display:none\">28 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the present ages of nephew and uncle be 'a' years and 'b' years respectively.</p><p>Given that: b = 2a</p><p>Also,</p><p><img width=63 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20632/image017.png\"></p><p><img width=71 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20632/image018.png\"></p><p>7a - 21 = 6a  -  9</p><p>a = 12 years</p><p>Present age of uncle = b = 12  X  2 = 24 years</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>A man sold a laptop for &#8377;77400 and gained four  -  fifth of its cost price. Find the cost price of the laptop and the percentage gain respectively.</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; &#2319;&#2325; &#2354;&#2376;&#2346;&#2335;&#2377;&#2346; &#2325;&#2379; &#8377;77400 &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2366; &#2324;&#2352; &#2313;&#2360;&#2325;&#2368; &#2354;&#2366;&#2327;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2366; &#2330;&#2366;&#2352;-&#2346;&#2366;&#2306;&#2330;&#2357;&#2366;&#2306; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2354;&#2366;&#2349; &#2325;&#2350;&#2366;&#2351;&#2366;&#2404; &#2354;&#2376;&#2346;&#2335;&#2377;&#2346; &#2325;&#2366; &#2354;&#2366;&#2327;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2354;&#2366;&#2349; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">&#8377;43000, 80%</span><span class=\"hqt\" style=\"display:none\">&#8377;43000, 80%</span>",
      "<span class=\"eqt\">&#8377;42000, 90%</span><span class=\"hqt\" style=\"display:none\">&#8377;42000, 90%</span>",
      "<span class=\"eqt\">&#8377;42800, 80%</span><span class=\"hqt\" style=\"display:none\">&#8377;42800, 80%</span>",
      "<span class=\"eqt\">&#8377;44500, 90%</span><span class=\"hqt\" style=\"display:none\">&#8377;44500, 90%</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Selling price of laptop = &#8377;77400</p><p>Cost price of laptop = 77400 * 5/(4+5) = &#8377;43000</p><p>Percentage gain = (4/5)*100 = 80%</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;A sum of money becomes <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>11</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>5</span></div> of itself in 3 years at a certain rate of simple interest. The rate per annum is &#58;&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2319;&#2325; &#2352;&#2366;&#2358;&#2367; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2366; <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>11</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>5</span></div> &#2327;&#2369;&#2344;&#2366; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</div></p></span>",
    "options": [
      "<span class=\"eqt\">25%</span><span class=\"hqt\" style=\"display:none\">25%</span>",
      "<span class=\"eqt\">30%</span><span class=\"hqt\" style=\"display:none\">30%</span>",
      "<span class=\"eqt\">40%</span><span class=\"hqt\" style=\"display:none\">40%</span>",
      "<span class=\"eqt\">20%</span><span class=\"hqt\" style=\"display:none\">20%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the principle be Rs. P.</p><p>Simple interest = (11P/5)  -  P = Rs. (6P/5)</p><p>Now,</p><p>(6P/5) = P * R * 3/100</p><p>R = 40%</p>",
    "question_index": 7

    "correct_option_id": 1,
    "solution": "<p>Let the required point on the X-axis be (x, 0).</p><p>Distance from (x, 0) to (4, &#8722;3)</p><p>= &#8730;[(x &#8722; 4) + (0 + 3)]</p><p>Distance from (x, 0) to (&#8722;6, 7)</p><p>= &#8730;[(x + 6) + (0 &#8722; 7)]</p><p>Since the point is equidistant from both points, the distances are equal:</p><p>(x &#8722; 4) + 9 = (x + 6) + 49</p><p>Expanding both sides:</p><p>x &#8722; 8x + 16 + 9 = x + 12x + 36 + 49</p><p>x &#8722; 8x + 25 = x + 12x + 85</p><p>Cancel x from both sides:</p><p>&#8722;8x + 25 = 12x + 85</p><p>&#8722;20x = 60</p><p>x = &#8722;3</p><p>The required point on the X-axis is (&#8722;3, 0).</p>",

    "question": "<span class=\"eqt\"><p>The ratio of efficiency of Kamal to that of Tapan is 12: 11 and the ratio of time taken by Tapan alone to that by Suman alone to complete a work is 9: 8. If Kamal alone can complete the whole work in 44 days, then Suman and Tapan together can complete 17/20<sup>th</sup> part of the work in how many days?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2350;&#2354; &#2324;&#2352; &#2340;&#2346;&#2344; &#2325;&#2368; &#2342;&#2325;&#2381;&#2359;&#2340;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 12:11 &#2361;&#2376; &#2340;&#2341;&#2366; &#2340;&#2346;&#2344; &#2324;&#2352; &#2360;&#2369;&#2350;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2325;&#2375;&#2354;&#2375; &#2360;&#2350;&#2381;&#2346;&#2370;&#2352;&#2381;&#2339; &#2325;&#2366;&#2350; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2351; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 9: 8 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2350;&#2354; &#2309;&#2325;&#2375;&#2354;&#2375; &#2360;&#2350;&#2381;&#2346;&#2370;&#2352;&#2381;&#2339; &#2325;&#2366;&#2350; &#2325;&#2379; 44 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2369;&#2350;&#2344; &#2324;&#2352; &#2340;&#2346;&#2344; &#2325;&#2366;&#2350; &#2325;&#2366; 17/20&#2357;&#2366;&#2306; &#2349;&#2366;&#2327; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>From I:</p><p>Cost price of the saris = Rs. 48000</p><p>But from these data we cannot find the answer.</p><p>From II:</p><p>Selling price of the saris = Rs. 64000</p><p>But from these data we cannot find the answer.</p><p>From I and II:</p><p>SP = 64000 and CP = 48000</p><p>So, profit % = (64000  -  48000)/48000 * 100 = 33.33%</p><p>Hence, statement I and II together are sufficient.</p>",

    "question": "<span class=\"eqt\"><p>Aman is managing time poorly because he keeps checking messages during study hours. He cannot switch off his phone fully because family may call for emergencies. Which action is most appropriate?</p></span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2344; &#2346;&#2338;&#2364;&#2366;&#2312; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2354;&#2327;&#2366;&#2340;&#2366;&#2352; &#2350;&#2376;&#2360;&#2375;&#2332; &#2330;&#2375;&#2325; &#2325;&#2352;&#2340;&#2366; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;, &#2311;&#2360;&#2354;&#2367;&#2319; &#2357;&#2361; &#2360;&#2350;&#2351; &#2325;&#2366; &#2360;&#2361;&#2368; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2346;&#2366; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404; &#2357;&#2361; &#2309;&#2346;&#2344;&#2366; &#2347;&#2379;&#2344; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2348;&#2306;&#2342; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2357;&#2366;&#2354;&#2375; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354;&#2368;&#2344; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2347;&#2379;&#2344; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2320;&#2360;&#2375; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2313;&#2346;&#2366;&#2351; &#2360;&#2348;&#2360;&#2375; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2361;&#2375;&#2327;&#2366;?</span>",
    "options": [

      "<span class=\"eqt\">Turn the phone off completely every study session</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2360;&#2340;&#2381;&#2352; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2347;&#2379;&#2344; &#2325;&#2379; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2375;&#2306;&#2404;</span>",

    "comp": "<p><b>Directions : </b>Read the following passage and answer the questions based on the passage:</p><p>Learned helplessness refers to a psychological condition in which individuals, after repeated exposure to uncontrollable and adverse circumstances, begin to believe that their actions have little or no impact on outcomes. This mindset gradually erodes motivation, initiative, and the ability to seek alternatives, making passive acceptance of hardship appear inevitable. In the context of begging behaviour, learned helplessness offers an important lens to understand why many individuals remain trapped in cycles of dependency despite the availability of limited opportunities for change.</p><p>For people who resort to begging, experiences such as chronic poverty, social exclusion, discrimination, physical disability, or repeated failure in the labour market often reinforce feelings of powerlessness. When efforts to secure employment, education, or social support repeatedly fail, individuals may internalise the belief that striving is futile. Begging then becomes not merely a survival strategy but a learned response to an environment perceived as hostile and unresponsive. Over time, this response solidifies into a behavioural pattern, reducing confidence in one's ability to alter circumstances through effort.</p><p>Learned helplessness also explains the persistence of begging across generations. Children raised in environments where begging is normalised may observe adults receiving immediate, albeit minimal, rewards without sustained effort. Such social conditioning reinforces passivity and discourages long-term planning or skill acquisition. Psychological distress, including anxiety and depression, further deepens this helplessness, narrowing the individual's perceived range of choices.</p><p>Addressing begging behaviour, therefore, requires more than legal restrictions or short-term charity. Effective interventions must focus on restoring a sense of agenc     "correct_option_id": 2,
    "solution": "<p>In the case of <b>Not only..but also</b>, always put the <b>verb</b> according to the <b>closest subject</b>.</p><p>For example: Not only the minister but also his <b>sons are</b> involved in the scam.</p><p>In this context, the closest <b>subject</b> is the 'principal'. As the <b>subject</b> (principal) is <b>singular</b> in form, the <b>verb</b> that must agree to it should also be <b>singular</b>. Thus, 'have' is incorrect.</p><p>'Might' and 'may' are grammatically incorrect in this context.</p><p>Thus, the correct option is <b>(c) 'has'</b>.</p><p>Thus, the correct sentence should be: Not only the students but also the principal <u>has</u> expressed his desire to set up a new playground at the campus.</p><p>Additional Information:</p><p><b>Not only...but also</b> are <b>correlative conjunctions</b>. Correlative conjunctions are sort of like tag-team conjunctions. They come in pairs, and you have to use both of them in different places in a sentence to make them work. They get their name from the fact that they work together (co-) and relate one sentence element to another.</p><p>Some of the important <b>Correlative Conjunctions</b> are:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Either...or</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Neither...nor</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hardly...when</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Scarcely...when</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Both..and</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">If..then</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Not only...but also</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rather...than</td></tr><tr><td align=\"left\" style=\"border:1     "comp": "<p><b>Directions : </b>Read the following passage and answer the questions based on the passage:</p><p>Translation plays a crucial role in enabling communication across linguistic and cultural boundaries, allowing ideas, literature, and knowledge to travel beyond their original contexts. However, while translation facilitates understanding, it often involves an unavoidable loss of cultural nuance. Language is not merely a system of words and grammar; it carries within it the history, values, emotions, and worldview of the culture that produces it. When a text moves from one language to another, these subtle layers frequently resist direct transfer. One major challenge lies in the absence of exact equivalents between languages. Words rooted in specific cultural experiences often carry meanings that cannot be fully captured through literal translation. Terms related to kinship, emotions, honour, or social hierarchy may require lengthy explanations rather than single-word substitutions. As a result, translations may convey the surface meaning of a statement while missing its emotional depth or social implication. Idioms, proverbs, and metaphors are particularly vulnerable to distortion, since they draw upon shared cultural references unfamiliar to outside readers. Cultural nuance is also embedded in tone, formality, and context. Many languages encode respect, age, or social distance directly into grammatical structures, whereas others rely on context or vocabulary choice. When such distinctions are flattened in translation, relationships between characters or speakers may appear altered. A respectful request may sound neutral, or a subtle insult may disappear entirely, reshaping how readers interpret intention and character. Literary translation further highlights this tension. Rhythm, wordplay, symbolism, and intertextual references often lose their resonance when transferred into another language. Translators must choose between fidelity to meaning and fidelity to style, a dilemma that makes complete equivalence impossible. Even the most skilled translation becomes an interpretation shaped by the translator's cultural awareness and linguistic priorities. Despite these limitations, translation remains indispensable. Rather than viewing loss as failure, many scholars regard it as transformation. Each translation becomes a negotiation between cultures, creating new meanings while approximating old ones. Awareness of cultural nuance encourages readers to approach translated texts with sensitivity and humility. Ultimately, translation reminds us that language is not a transparent medium but a cultural lens, and crossing linguistic borders always involves both gain and loss in understanding.</p>",

    "solution": "<p>The correct answer is<b>(b) The Prime Minister said that their country would be using that weapon when the time arrives.</b></p><p>Key points:</p><p>&#183;The sentence in the Direct Speech is in <b>Future Continuous Tense</b>. Therefore, the sentence in the Indirect Speech will be in <b>Conditional Continuous</b>.</p><p>&#183;Future Continuous <b>(Subject + will/shall + be + V1 + ing + Object)</b> will be converted into Conditional Continuous <b>(Subject + would + be +V1 +ing + Object)</b>.</p><p>&#183;For example:</p><p>o He said, \"I will be using the book next Friday\" (Direct Speech)</p><p>o He said that he would be using the book the following Friday. (Indirect Speech)</p><p>&#183;The following things in the sentence will change when changed from Direct speech to Indirect Speech:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said that</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Our</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">their</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">will</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">would</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">this</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">that</td></tr></table></p><p>&#183;Therefore, the correct answer is: <b>The Prime Minister said that their country would be using that weapon when the time arrived.</b></p>",

    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of the verb [are] is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in this question is in <b>Present Indefinite</b>. Thus, the Passive voice will also be in Present Indefinite.</p><p>The format of Active voice is: Subject + V1/V5 + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + am/is/are + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>She likes you. (Active Voice)</p><p>You are liked by her. (Passive Voice)</p><p>The options except (d) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is: Students are required to juxtapose two unrelated works of fiction in the final examination.</p><p>Hence, option (d) is the answer.</p>",

    "comp": "<p><b>Directions :</b>Read the given passage and answer the questions that follow.</p><p>Could radio collars, the crucial electronic devices that help track the movement of protected animals, be harmful to them? That is the question many are asking after the deaths last week of two cheetahs which were among the 20 big cats brought to India with much fanfare last year. Cheetahs, declared extinct in 1952 in India, were reintroduced as part of the world's first intercontinental relocation of a large carnivore. They are housed in Kuno national park in the central state of Madhya Pradesh. So far, eight cheetahs, including three cubs born in March, have died. Some of the deaths have been caused by unavoidable reasons, such as cardiac failure precipitated by stress or mating injuries. But several wildlife experts and veterinary doctors have told that the last two deaths were caused by maggot infestations following skin infections. And they say one of the reasons could be the radio collars that the animals are made to wear for their own protection.</p><p>It's a theory the environment and forests ministry has strongly rejected. In an official statement, the ministry insisted that the adult cheetahs all died \"due to natural causes\" and said reports blaming radio collars were \"speculative and lacking in scientific evidence\". We also contacted Rajesh Gopal, chairman of the cheetah project, but he hasn't responded yet. Wildlife experts, however, say such injuries are not uncommon among other big cats too, especially during India's humid rainy season. Alok Kumar, former chief conservator of forests in Madhya Pradesh, told that the deaths among big cats could be due to many reasons but radio collars - although key to their survival - could be a factor too. \"These collars carry chips that send information about the wearer through satellites and are necessary to monitor the movement of the animal for their safety and protection,\" Mr Kumar said, adding that he \"ha     "correct_option_id": 1,
    "solution": "<p>NITI Aayog released a report on 'India's Blue Economy: Strategy for Harnessing Deep-Sea and Offshore Fisheries'. </p><p>This report was formally launched by Prof. Ramesh Chand, Member (Agriculture), NITI Aayog, and Shri B.V.R. Subrahmanyam, CEO, NITI Aayog, in a special event attended by representatives from the fisheries sector, maritime states, and stakeholder organizations. India is the second-largest fish-producing country in the world, accounting for <b>8% of global production</b>. </p><p>India's fisheries sector supports nearly 30 million livelihoods and contributes significantly to exports, with fishery products earning Rs.60,523 crore in FY 2023'24.</p><p>&#183; India's Exclusive Economic Zone (EEZ) of over 2 million sq. km, deep waters beyond the continental shelf, and11,098 km coastline across nine coastal States and four Union Territories, provide immense potential to expand its marine fisheries into the deep seas. Despite a thriving fisheries sector, the deep-sea fishery resources beyond the continental shelf remain largely unexploited. The EEZ has an estimated potential yield of 7.16 million tonnes, including both conventional and non-conventional resources. The report highlights that responsible utilization of deep-sea and offshore fisheries can enhance seafood exports, generate employment opportunities, and reduce pressure on coastal fisheries, while ensuring ecological sustainability.</p><p>&#183; It presents a comprehensive framework covering the deep-sea fishing sector within India's Exclusive Economic Zone (EEZ) and international waters accessed through regional fisheries agreements. This framework adopts a science-based, technology-enabled, socially inclusive, and ecologically sustainable approach to harnessing India's deep-sea fisheries potential.</p><p>&#183; The report identifies six key policy interventions on overhauling policies and regulations; strengthening institutional and capacity building; modernizing fleets and upgrading infrastructure; promoting sustainable fisheries management; mobilizing resources and financing; and enhancing local community participation and partnerships. Recognizing the capital-intensive nature of deep-sea fishing, the report also emphasizes inclusive fleet development by supporting fisher cooperatives and cluster-based approaches, enabling collective ownership, operations, and access to modern technology. It also outlines investment priorities and monitoring mechanisms necessary to ensure long-term ecological and economic sustainability.</p><p>&#183; An indicative costing framework for the three phases has also been provided by considering the convergence of centrally sponsored and central sector schemes related to fisheries ' Phase 1: Laying the foundation and fostering early growth (3 years| 2025-28); Phase 2: Scaling up and achieving global competitiveness (4 years| 2029-32) and Phase 3: Global leadership in sustainable deep-sea fisheries (8 years and beyond | 2033 onwards).</p><p>&#183; Alongside the report release, NITI Aayog organized a workshop which witnessed the participation of 18 institutions. The technical session on 'Strategy of States and Way Forward towards Harnessing Deep-Sea Fisheries and Export' included presentations from coastal States such as Goa, Gujarat, Lakshadweep, Maharashtra, Odisha, and Tamil Nadu. This was followed by a panel discussion on 'Advancing Resource Management through Regulatory Reforms, Research, Financing and Capacity Building' with distinguished panelists.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding PM-AASHA:</p><p>I. It aims to ensure remunerative prices for farmers.</p><p>II.It replaces MSP system.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2368;&#2319;&#2350;-&#2310;&#2358;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2311;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2354;&#2366;&#2349;&#2325;&#2366;&#2352;&#2368; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2361; &#2319;&#2350;&#2319;&#2360;&#2346;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Statement I  -  Correct:</b> </p><p>&#183; <b>PM-AASHA</b> (Pradhan Mantri Annadata Aay Sanrakschan Abhiyan) aims to ensure that farmers receive the <b>Minimum Support Price (MSP)</b> for their produce, protecting their income.</p><p>&#183; Department of Agriculture &amp; Farmers Welfare implements the umbrella scheme of Pradhan Mantri Annadata Aay SanraksHan Abhiyan\" (PM-AASHA). The scheme is implemented for notified pulses, oilseeds &amp; copra. </p><p>&#183; The PM AASHA was launched in September 2018 with an aim to Provide price assurance for pulses, oilseeds and copra, ensuring financial stability for farmers, reduce post-harvest distress selling &amp; promote crop diversification towards pulses and oilseeds. </p><p>&#183; In September 2024, cabinet approved the continuation of Integrated scheme of PM AASHA with Price Support Scheme (PSS), price Deficiency Payment Scheme (PDPS) &amp; Market intervention Scheme (MIS) as its components.</p><p>&#183; <b>Statement II  -  Incorrect:</b> It does <b>not replace</b> the MSP system; rather, it is a mechanism to <b>implement</b> it more effectively through three sub-schemes: Price Support Scheme (PSS), Price Deficiency Payment Scheme (PDPS), and Private Procurement &amp; Stockist Scheme (PPPS).</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Ryotwari Settlement:</p><p>1)Revenue was directly collected from peasants.</p><p>2)Land ownership rights were vested in zamindars.</p><p>3)It was introduced by Thomas Munro.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2376;&#2351;&#2340;&#2357;&#2366;&#2352;&#2368; &#2348;&#2306;&#2342;&#2379;&#2348;&#2360;&#2381;&#2340; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2360;&#2368;&#2343;&#2375; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2319;&#2325;&#2340;&#2381;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404;</p><p>2) &#2349;&#2370;&#2350;&#2367; &#2360;&#2381;&#2357;&#2366;&#2350;&#2367;&#2340;&#2381;&#2357; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2332;&#2350;&#2368;&#2306;&#2342;&#2366;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2341;&#2375;&#2404;</p><p>3) &#2311;&#2360;&#2375; &#2341;&#2377;&#2350;&#2360; &#2350;&#2369;&#2344;&#2352;&#2379; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#61623; <b>Statement 1  -  Correct:</b> In the Ryotwari system, the government dealt directly with the individual peasant (<b>Ryot</b>). There was no middleman.</p><p>&#61623; <b>Statement 2  -  Incorrect:</b> Ownership rights were given to the <b>peasants</b>, not Zamindars. The Zamindari system (Permanent Settlement) was a different model used primarily in Bengal.</p><p>&#61623; <b>Statement 3  -  Correct:</b> It was introduced by <b>Thomas Munro</b> and Alexander Read in the early 19th century, primarily in the Madras and Bombay Presidencies.</p>",
    "question_index": 107
  },
  {
    "question": "<span class=\"eqt\"><p>Which ministry implements Jal Jeevan Mission?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2354; &#2332;&#2368;&#2357;&#2344; &#2350;&#2367;&#2358;&#2344; &#2325;&#2379; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ministry of Rural Development</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2357;&#2367;&#2325;&#2366;&#2360; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Ministry of Jal Shakti</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2354; &#2358;&#2325;&#2381;&#2340;&#2367; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Ministry of Housing</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2357;&#2366;&#2360; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Ministry of Environment</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The <b>Ministry of Jal Shakti</b> was created in 2019 (by merging the Ministry of Water Resources and Ministry of Drinking Water and Sanitation) specifically to handle water-related issues.</p><p>&#183; The <b>Jal Jeevan Mission (Rural)</b> aims to provide <b>Functional Household Tap Connections (FHTC)</b> to every rural household by 2024.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following has the highest pH?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2366; pH &#2350;&#2366;&#2344; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Distilled water</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2360;&#2369;&#2340; &#2332;&#2354;</span>",
      "<span class=\"eqt\">Lemon juice</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2306;&#2348;&#2370; &#2325;&#2366; &#2352;&#2360;</span>",
      "<span class=\"eqt\">Sodium hydroxide solution</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2377;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2357;&#2367;&#2354;&#2351;&#2344;</span>",
      "<span class=\"eqt\">Vinegar</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2352;&#2325;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The pH scale ranges from 0 to 14, where 7 is neutral, below 7 is acidic, and above 7 is basic (alkaline).</p><p>&#183; <b>Sodium hydroxide (NaOH):</b> This is a <b>strong base</b> with a pH typically around <b>13 - 14</b>.</p><p>&#183; <b>Distilled water:</b> Neutral, pH of <b>7</b>.</p><p>&#183; <b>Lemon juice:</b> Acidic, pH of <b>2 - 3</b>.</p><p>&#183; <b>Vinegar:</b> Acidic, pH of <b>2 - 3</b>.</p>",
    "question_index": 109
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Office of the Governor:</p><p>Statement I: The Governor can reserve a State Bill for the consideration of the President even if it is not a money bill.</p><p>Statement II: The Governor is bound by the aid and advice of the Council of Ministers while reserving a bill.</p><p>Which of the above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2379; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2357;&#2367;&#2330;&#2366;&#2352;&#2366;&#2352;&#2381;&#2341; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2357;&#2361; &#2343;&#2344; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2344; &#2361;&#2379;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2379; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2360;&#2350;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2324;&#2352; &#2360;&#2354;&#2366;&#2361; &#2360;&#2375; &#2348;&#2366;&#2343;&#2381;&#2351; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I: Reservation of Bills (Correct)</p><p>Under <b>Article 200</b> of the Indian Constitution, when a Bill passed by the State Legislature is presented to the Governor, they have four options:</p><p>1) Give assent to the Bill.</p><p>2) Withhold assent.</p><p>3) Return the Bill (if it is not a Money Bill) for reconsideration.</p><p>4) <b>Reserve the Bill for the consideration of the President.</b></p><p>The Governor can reserve <b>any type of Bill</b> (Ordinary or Money Bill) for the President. In fact, the Governor <b>must</b> reserve a Bill if it endangers the position of the State High Court.</p><p>Statement II: Discretionary Power (Incorrect)</p><p>The act of reserving a Bill for the President is considered one of the <b>discretionary powers</b> of the Governor.</p><p>&#183; Unlike most other functions where the Governor acts on the \"aid and advice\" of the Council of Ministers, the decision to reserve a bill for the President is made by the Governor using their own judgment.</p><p>&#183; If the Governor were bound by the Council of Ministers in this matter, the Ministry would never advise the Governor to reserve their own Bill for the President, as it would cause delays.</p>",
    "question_index": 110
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Anti-Defection Law:</p><p>1)The law applies to both Parliament and State Legislatures.</p><p>2)Independent members are disqualified if they join a political party after election.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2354;-&#2348;&#2342;&#2354; &#2357;&#2367;&#2352;&#2379;&#2343;&#2368; &#2325;&#2366;&#2344;&#2370;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2351;&#2361; &#2325;&#2366;&#2344;&#2370;&#2344; &#2360;&#2306;&#2360;&#2342; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354;&#2379;&#2306; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2352; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2360;&#2342;&#2360;&#2381;&#2351; &#2330;&#2369;&#2344;&#2366;&#2357; &#2325;&#2375; &#2348;&#2366;&#2342; &#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2342;&#2354; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2309;&#2351;&#2379;&#2327;&#2381;&#2351; &#2328;&#2379;&#2359;&#2367;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Anti-Defection Law</b> was added to the Indian Constitution via the <b>52nd Amendment Act, 1985</b>, and is contained in the <b>10th Schedule</b>. Its primary goal is to prevent political instability caused by \"floor crossing\" or switching parties for personal gain.</p><p>Statement 1: Scope of Application (Correct)</p><p>The law is comprehensive in its reach across India's legislative framework:</p><p>&#183; It applies to all members of the <b>Parliament</b> (Lok Sabha and Rajya Sabha).</p><p>&#183; It applies to all members of the <b>State Legislatures</b> (Vidhan Sabha and Vidhan Parishad).</p><p>Statement 2: Independent Members (Correct)</p><p>The 10th Schedule specifies different rules for different categories of members. For an <b>Independent Member</b> (one who contested the election without being set up by any political party):</p><p>&#183; They are allowed to support a government from the \"outside.\"</p><p>&#183; However, if they <b>formally join any political party</b> after the election, they are immediately disqualified from their seat.</p>",
    "question_index": 111
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following rivers form estuaries instead of deltas?</p><p>1)Narmada</p><p>2)Godavari</p><p>3)Tapi</p><p>Select the correct answer:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2344;&#2342;&#2367;&#2351;&#2366;&#2305; &#2337;&#2375;&#2354;&#2381;&#2335;&#2366; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2350;&#2369;&#2361;&#2366;&#2344;&#2366; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;?</p><p>1) &#2344;&#2352;&#2381;&#2350;&#2342;&#2366;</p><p>2) &#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368;</p><p>3) &#2340;&#2366;&#2346;&#2368;</p><p>&#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Rivers 1 &amp; 3 (Narmada and Tapi):</b> These are West-flowing rivers that flow through narrow <b>rift valleys</b>. Because they flow through hard rocky terrain, they carry very little silt. Furthermore, the steep gradient of the Western Ghats ensures the water flows too fast to deposit sediment at the mouth, forming <b>estuaries</b> instead of deltas.</p><p>&#183; <b>River 2 (Godavari):</b> This is an East-flowing river that travels across the vast Deccan plateau, carrying significant amounts of sediment. As it reaches the shallow Bay of Bengal, the water slows down and deposits silt, forming a large <b>delta</b>.</p>",
    "question_index": 112
  },

    "question": "<span class=\"eqt\"><p>The unit of electric potential difference is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2357;&#2367;&#2349;&#2357;&#2366;&#2306;&#2340;&#2352; &#2325;&#2368; &#2311;&#2325;&#2366;&#2312; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Ampere</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;&#2381;&#2346;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Coulomb</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2370;&#2354;&#2350;&#2381;&#2348;</span>",
      "<span class=\"eqt\">Volt</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2354;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Ohm</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Volt (V):</b> The SI unit of electric potential difference (voltage). It is defined as the work done per unit charge.</p><p>&#183; <b>Other Units:</b></p><p>o <b>Ampere (A):</b> Unit of electric <b>current</b>.</p><p>o <b>Coulomb (C):</b> Unit of electric <b>charge</b>.</p><p>o <b>Ohm (</b>&#937;<b>):</b> Unit of electrical <b>resistance</b>.</p>",
    "question_index": 113
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following movements was associated with Bardoli?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367; &#2348;&#2366;&#2352;&#2381;&#2337;&#2379;&#2354;&#2368; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Civil Disobedience</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2357;&#2367;&#2344;&#2351; &#2309;&#2357;&#2332;&#2381;&#2334;&#2366;</span>",
      "<span class=\"eqt\">Non-Cooperation</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2361;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">Kheda Satyagraha</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2375;&#2337;&#2364;&#2366; &#2360;&#2340;&#2381;&#2351;&#2366;&#2327;&#2381;&#2352;&#2361;</span>",
      "<span class=\"eqt\">Peasant Tax Resistance under Vallabhbhai Patel</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2354;&#2381;&#2354;&#2349;&#2349;&#2366;&#2312; &#2346;&#2335;&#2375;&#2354; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2325;&#2367;&#2360;&#2366;&#2344; &#2325;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The movement took place in <b>1928</b> in Bardoli, Gujarat.</p><p>&#183; <b>Reason:</b> It was a protest by farmers against a <b>30% increase in land revenue</b> by the British government during a period of financial distress.</p><p>&#183; <b>Result: Sardar Vallabhbhai Patel</b> led the non-violent resistance so successfully that the women of Bardoli gave him the title \"<b>Sardar</b>\" (Leader).</p>",
    "question_index": 114
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Election Commission of India:</p><p>i.The Constitution provides a fixed tenure for the Chief Election Commissioner.</p><p>ii.The removal procedure of the CEC is similar to that of a Supreme Court Judge.</p><p>iii.Other Election Commissioners can be removed by the President only on the recommendation of the CEC.</p><p>Which of the above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2330;&#2369;&#2344;&#2366;&#2357; &#2310;&#2351;&#2379;&#2327; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; &#2350;&#2369;&#2326;&#2381;&#2351; &#2330;&#2369;&#2344;&#2366;&#2357; &#2310;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>ii. &#2350;&#2369;&#2326;&#2381;&#2351; &#2330;&#2369;&#2344;&#2366;&#2357; &#2310;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2379; &#2361;&#2335;&#2366;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2379; &#2361;&#2335;&#2366;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2404;</p><p>iii. &#2309;&#2344;&#2381;&#2351; &#2330;&#2369;&#2344;&#2366;&#2357; &#2310;&#2351;&#2369;&#2325;&#2381;&#2340;&#2379;&#2306; &#2325;&#2379; &#2325;&#2375;&#2357;&#2354; &#2350;&#2369;&#2326;&#2381;&#2351; &#2330;&#2369;&#2344;&#2366;&#2357; &#2310;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358; &#2346;&#2352; &#2361;&#2368; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2361;&#2335;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i and ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">ii and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>i. Fixed Tenure (Technically Incorrect)</p><p>While the Chief Election Commissioner (CEC) serves for <b>6 years or until the age of 65</b>, this specific \"fixed tenure\" is <b>not</b> written in the Constitution.</p><p>&#183; <b>Article 324(5)</b> of the Constitution states that the tenure shall be determined by the <b>President</b>, subject to any law made by Parliament.</p><p>&#183; The 6-year/65-age rule was established by the <b>Election Commission Act, 1991</b>. Therefore, it is a <b>statutory</b> provision, not a <b>constitutional</b> one.</p><p>ii. Removal of the CEC (Correct)</p><p>To ensure the independence of the office, the Constitution provides the CEC with the same security of tenure as a <b>Supreme Court Judge</b>.</p><p>&#183; According to <b>Article 324</b>, the CEC can only be removed by the President following a resolution passed by <b>both Houses of Parliament</b> with a <b>special majority</b> on grounds of \"proved misbehaviour or incapacity.\"</p><p>iii. Removal of other Election Commissioners (Correct)</p><p>The Constitution protects other Election Commissioners (ECs) from arbitrary removal by the executive, but through a different mechanism than the CEC:</p><p>&#183; They can be removed by the President <b>only on the recommendation of the Chief Election Commissioner</b>.</p><p>&#183; This reinforces the CEC's position as the head of the multi-member body.</p>",
    "question_index": 115
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Census 2011:</p><p>1)Literacy rate exceeded 75%.</p><p>2)Sex ratio improved compared to 2001.</p><p>Which are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2327;&#2339;&#2344;&#2366; 2011 &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2360;&#2366;&#2325;&#2381;&#2359;&#2352;&#2340;&#2366; &#2342;&#2352; 75% &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379; &#2327;&#2312;&#2404;</p><p>2) &#2354;&#2367;&#2306;&#2327; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2001 &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2348;&#2375;&#2361;&#2340;&#2352; &#2361;&#2369;&#2310;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Statement 1  -  Incorrect:</b> According to Census 2011, the literacy rate of India was <b>74.04%</b>, which is just below the 75% mark.</p><p>&#183; <b>Statement 2  -  Correct:</b> The sex ratio in 2001 was <b>933</b> females per 1000 males. In 2011, it improved to <b>943</b> females per 1000 males.</p>",
    "question_index": 116
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the book \"Kayakalp\":</p><p>1)The book was written by Munshi Premchand.</p><p>2)It deals with the decline of feudalism and the transformation of rural society in colonial India.</p><p>3)The book received the Sahitya Akademi Award for Hindi literature.</p><p>4)The narrative reflects Premchand's shift towards realism and social critique.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2369;&#2360;&#2381;&#2340;&#2325; \"&#2325;&#2366;&#2351;&#2366;&#2325;&#2354;&#2381;&#2346;\" &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2351;&#2361; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2350;&#2369;&#2306;&#2358;&#2368; &#2346;&#2381;&#2352;&#2375;&#2350;&#2330;&#2306;&#2342; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2326;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p><p>2) &#2351;&#2361; &#2324;&#2346;&#2344;&#2367;&#2357;&#2375;&#2358;&#2367;&#2325; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2360;&#2366;&#2350;&#2306;&#2340;&#2357;&#2366;&#2342; &#2325;&#2375; &#2346;&#2340;&#2344; &#2324;&#2352; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2360;&#2350;&#2366;&#2332; &#2325;&#2375; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>3) &#2311;&#2360; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2325;&#2379; &#2361;&#2367;&#2306;&#2342;&#2368; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351; &#2309;&#2325;&#2366;&#2342;&#2350;&#2368; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2310;&#2404;</p><p>4) &#2351;&#2361; &#2325;&#2341;&#2366; &#2346;&#2381;&#2352;&#2375;&#2350;&#2330;&#2306;&#2342; &#2325;&#2375; &#2351;&#2341;&#2366;&#2352;&#2381;&#2341;&#2357;&#2366;&#2342; &#2324;&#2352; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2310;&#2354;&#2379;&#2330;&#2344;&#2366; &#2325;&#2368; &#2323;&#2352; &#2333;&#2369;&#2325;&#2366;&#2357; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1, 2 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1, 2 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2, 3 and 4</span><span class=\"hqt\" style=\"display:none\">1, 2, 3 &#2324;&#2352; 4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1, 2 and 4 are correct.</p><p>Statement 3 is incorrect.</p><p>Explanation of Statements:</p><p>Kayakalp(1926) was authored by Munshi Premchand, one of the pioneers of modern Hindi literature.</p><p>The novel critiques zamindari decay, moral degeneration, and social transformation in rural India under British rule.</p><p>Kayakalp did not receive the Sahitya Akademi Award. The award was instituted in 1954, while Premchand passed away in 1936.</p><p>The work reflects Premchand's mature realist phase, emphasizing social reform over romanticism.</p><p>Further Insight:</p><p>Kayakalp symbolically means \"transformation\" and is often read as an allegory of ethical and societal regeneration.</p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding vaccines:</p><p>1)They stimulate active immunity.</p><p>2)They provide immediate protection.</p><p>Which are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2335;&#2368;&#2325;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2351;&#2375; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2379; &#2313;&#2340;&#2381;&#2340;&#2375;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2351;&#2375; &#2340;&#2340;&#2381;&#2325;&#2366;&#2354; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Statement 1  -  Correct:</b> Vaccines stimulate <b>active immunity</b>. They introduce a weakened or inactive part of a particular organism (antigen) into the body, \"training\" the immune system to recognize and fight it by producing its own antibodies and memory cells.</p><p>&#183; <b>Statement 2  -  Incorrect:</b> Vaccines do <b>not</b> provide immediate protection. It typically takes a few weeks for the body to build up immunity after vaccination. Immediate protection is provided by <b>passive immunity</b> (like getting a pre-formed antibody injection or through breast milk).</p>",
    "question_index": 118
  },

    "question": "<span class=\"eqt\"><p>The phenomenon of temperature inversion is commonly associated with:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2339; &#2325;&#2368; &#2328;&#2335;&#2344;&#2366; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Cyclones</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2325;&#2381;&#2352;&#2357;&#2366;&#2340;</span>",
      "<span class=\"eqt\">Smog formation</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2369;&#2306;&#2343; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339;</span>",
      "<span class=\"eqt\">Cloudburst</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2360;&#2354;&#2343;&#2366;&#2352; &#2348;&#2366;&#2352;&#2367;&#2358;</span>",
      "<span class=\"eqt\">Ocean currents</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2327;&#2352; &#2325;&#2368; &#2354;&#2361;&#2352;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Phenomenon:</b> Normally, temperature decreases with altitude. In a <b>temperature inversion</b>, a layer of warm air sits on top of cold air near the ground.</p><p>&#183; <b>Smog Connection:</b> This warm \"lid\" traps pollutants (smoke, dust, and moisture) close to the surface, preventing them from dispersing upward. When these pollutants react with sunlight, they form <b>smog</b>, which is common in winter months in cities like Delhi.</p>",
    "question_index": 119
  },

    "question": "<span class=\"eqt\"><p>In which weight category did Linthoi Chanambam win the bronze medal at the Judo Junior World Championships 2025?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2367;&#2344;&#2381;&#2341;&#2379;&#2312; &#2330;&#2366;&#2344;&#2306;&#2348;&#2350; &#2344;&#2375; &#2332;&#2370;&#2337;&#2379; &#2332;&#2370;&#2344;&#2367;&#2351;&#2352; &#2357;&#2367;&#2358;&#2381;&#2357; &#2330;&#2376;&#2306;&#2346;&#2367;&#2351;&#2344;&#2358;&#2367;&#2346; 2025 &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2349;&#2366;&#2352; &#2357;&#2352;&#2381;&#2327; &#2350;&#2375;&#2306; &#2325;&#2366;&#2306;&#2360;&#2381;&#2351; &#2346;&#2342;&#2325; &#2332;&#2368;&#2340;&#2366;?</p></span>",
    "options": [

      "<span class=\"eqt\">Women's 52 kg</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2366; 52 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2357;&#2352;&#2381;&#2327;</span>",
      "<span class=\"eqt\">Women's 57 kg</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2366; 57 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Women's 63 kg</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2366; 63 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2357;&#2352;&#2381;&#2327;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Judo player Linthoi Chanambam created history by winning India's first-ever medal at the Judo Junior World Championships in Lima, Peru today. </p><p>19-year-old Chanambam clinched the bronze medal in <b>women's 63 kilogram category</b> with a win over Netherland's Joni Geilen. </p><p>Earlier, Chanambam had lost in her final Group D match to Japan's So Morichika. She made her way into the medal match through the repechage route after Morichika reached the women's 63 kilogram final.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true about North Western Railway (NWR) zone?</p><p>Statement I: North Western Railway has its headquarters at Jodhpur.</p><p>Statement II: North Western Railway was formed during the 2002 reorganization of zones.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2340;&#2381;&#2340;&#2352; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2352;&#2375;&#2354;&#2357;&#2375; (&#2319;&#2344;&#2337;&#2348;&#2381;&#2354;&#2381;&#2351;&#2370;&#2310;&#2352;) &#2332;&#2379;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344; 1: &#2313;&#2340;&#2381;&#2340;&#2352; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2352;&#2375;&#2354;&#2357;&#2375; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351;&#2366;&#2354;&#2351; &#2332;&#2379;&#2343;&#2346;&#2369;&#2352; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: 2002 &#2350;&#2375;&#2306; &#2332;&#2379;&#2344; &#2325;&#2375; &#2346;&#2369;&#2344;&#2352;&#2381;&#2327;&#2336;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2313;&#2340;&#2381;&#2340;&#2352; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2352;&#2375;&#2354;&#2357;&#2375; &#2325;&#2366; &#2327;&#2336;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>NWR HQ is at Jaipur, not Jodhpur, so Statement I is false.</p><p>NWR was constituted in 2002, carved primarily from Northern and Western Railways; Statement II is correct.</p><p>Further Insights:</p><p>- NWR divisions: Jaipur, Ajmer, Jodhpur, Bikaner.</p><p>- Indian Railways currently has 18 zones; South Coast Railway (Visakhapatnam HQ) was created in 2019.</p><p>- Metro Railway, Kolkata functions as a separate zone.</p>",
    "question_index": 121

    "question": "<span class=\"eqt\"><p>Given below are two statements marked as Assertion and Reason. Choose the correct option.</p><p>Assertion (A): India follows a flexible inflation targeting framework.</p><p>Reason (R): The RBI is mandated to target inflation while keeping growth as a secondary objective.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2379; &#2360;&#2381;&#2335;&#2375;&#2335;&#2350;&#2375;&#2306;&#2335; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2366;&#2352;&#2381;&#2325; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2360;&#2361;&#2368; &#2321;&#2346;&#2381;&#2358;&#2344; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2349;&#2366;&#2352;&#2340; &#2319;&#2325; &#2347;&#2381;&#2354;&#2375;&#2325;&#2381;&#2360;&#2367;&#2348;&#2354; &#2311;&#2344;&#2381;&#2347;&#2381;&#2354;&#2375;&#2358;&#2344; &#2335;&#2366;&#2352;&#2327;&#2375;&#2335;&#2367;&#2306;&#2327; &#2347;&#2381;&#2352;&#2375;&#2350;&#2357;&#2352;&#2381;&#2325; &#2325;&#2379; &#2347;&#2377;&#2354;&#2379; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): RBI &#2325;&#2379; &#2327;&#2381;&#2352;&#2379;&#2341; &#2325;&#2379; &#2360;&#2375;&#2325;&#2375;&#2306;&#2337;&#2352;&#2368; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319; &#2311;&#2344;&#2381;&#2347;&#2381;&#2354;&#2375;&#2358;&#2344; &#2325;&#2379; &#2335;&#2366;&#2352;&#2327;&#2375;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2310;&#2342;&#2375;&#2358; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p></span>",

      "<span class=\"eqt\">A is true but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",

    "solution": "<p>&#183; <b>Assertion (A)  -  True:</b> India adopted a <b>Flexible Inflation Targeting (FIT)</b> framework in 2016 following an agreement between the Government and the RBI. The target is set at <b>4% pm 2%</b> (a range of 2% to 6%).</p><p>&#183; <b>Reason (R)  -  True:</b> Under the <b>RBI Act, 1934</b>, the primary objective of monetary policy is to maintain price stability (inflation targeting) <b>while keeping in mind the objective of growth</b>.</p><p>&#183; <b>Explanation:</b> Because the mandate requires balancing price stability with growth, the framework is called \"flexible\" rather than \"strict.\"</p>",
