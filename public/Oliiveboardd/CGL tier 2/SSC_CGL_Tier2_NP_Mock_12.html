    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Vijayanagara administration:</p><p>Statement I: Amara Nayakas were military chiefs granted land assignments.</p><p>Statement II: They were directly appointed by local assemblies.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2309;&#2350;&#2352;&#2366; &#2344;&#2366;&#2351;&#2325; &#2360;&#2376;&#2344;&#2381;&#2351; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2341;&#2375; &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2349;&#2370;&#2350;&#2367; &#2310;&#2357;&#2306;&#2335;&#2344; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2313;&#2344;&#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2360;&#2381;&#2341;&#2366;&#2344;&#2368;&#2351; &#2360;&#2349;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2368;&#2343;&#2375; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2341;&#2368;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",

    "solution": "<p>&#183; <b>Statement I  -  Correct:</b> The <b>Amara-Nayaka system</b> was a major political innovation. The Nayakas were military commanders who were given territories (<b>Amaram</b>) by the Raya (King) to govern and collect taxes.</p><p>&#183; <b>Statement II  -  Incorrect:</b> They were <b>not</b> appointed by local assemblies. They were agents of the King and were accountable to him; they had to send a portion of their revenue to the central treasury and maintain a military contingent for the King.</p>",

    "question": "<span class=\"eqt\"><p>Match the following protected areas with their key ecological significance:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I (Protected Area) </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II (Ecological Significance)</b>   <b> </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) Keibul Lamjao National Park</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Only floating national park</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) Silent Valley National Park</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Tropical evergreen rainforest</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) Desert National Park</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Habitat of Great Indian Bustard</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4) Kaziranga National Park</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. One-horned rhinoceros conservation</td></tr></table><p>Select the correct answer using the code given below:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; I (&#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; II (&#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;)</b><b></b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1) &#2325;&#2375;&#2311;&#2348;&#2369;&#2354; &#2354;&#2366;&#2350;&#2332;&#2366;&#2323; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2342;&#2381;&#2351;&#2366;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2325;&#2375;&#2357;&#2354; &#2340;&#2376;&#2352;&#2340;&#2366; &#2361;&#2369;&#2310; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2342;&#2381;&#2351;&#2366;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2) &#2360;&#2366;&#2311;&#2354;&#2375;&#2306;&#2335; &#2357;&#2376;&#2354;&#2368; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2342;&#2381;&#2351;&#2366;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2360;&#2342;&#2366;&#2348;&#2361;&#2366;&#2352; &#2357;&#2352;&#2381;&#2359;&#2366;&#2357;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3) &#2352;&#2375;&#2327;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344;&#2368; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2342;&#2381;&#2351;&#2366;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2327;&#2381;&#2352;&#2375;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2344; &#2348;&#2360;&#2381;&#2335;&#2352;&#2381;&#2337; &#2325;&#2366; &#2310;&#2357;&#2366;&#2360;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4) &#2325;&#2366;&#2332;&#2368;&#2352;&#2306;&#2327;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2342;&#2381;&#2351;&#2366;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2319;&#2325; &#2360;&#2368;&#2306;&#2327; &#2357;&#2366;&#2354;&#2375; &#2327;&#2376;&#2306;&#2337;&#2375; &#2325;&#2366; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339;</td></tr></table><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",

    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Keibul Lamjao (Manipur):</b> Located on <b>Loktak Lake</b>, it is unique for its <b>Phumdis</b> - floating mats of decomposed plant material and soil. It is the last natural refuge for the endangered <b>Sangai</b> (brow-antlered deer).</p><p>&#183; <b>Silent Valley (Kerala):</b> Situated in the Nilgiri Hills of the Western Ghats, this park contains one of the last undisturbed tracts of <b>South Western Ghats moist deciduous forests</b> and tropical evergreen rainforests. It is famous for the <b>Lion-tailed Macaque</b>.</p><p>&#183; <b>Desert National Park (Rajasthan):</b> Representing the ecosystem of the <b>Thar Desert</b>, it is one of the most critical habitats for the <b>Great Indian Bustard</b> (<i>Godawan</i>), a bird currently on the brink of extinction.</p><p>&#183; <b>Kaziranga (Assam):</b> A UNESCO World Heritage site, it hosts roughly two-thirds of the world's population of <b>Great One-horned Rhinoceroses</b>. Its landscape is dominated by tall \"elephant grass\" and marshy wetlands.</p>",
    "question_index": 124

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Fiscal Deficit:</p><p>Statement I: Fiscal deficit represents the total borrowing requirement of the government.</p><p>Statement II: A high fiscal deficit always leads to inflation.</p><p>Which of the above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2375; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2366; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2325;&#2369;&#2354; &#2313;&#2343;&#2366;&#2352;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2313;&#2330;&#2381;&#2330; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2366; &#2361;&#2350;&#2375;&#2358;&#2366; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2368; &#2323;&#2352; &#2354;&#2375; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I  -  Correct:</b> Fiscal Deficit is the difference between the government's total expenditure and its total non-debt receipts (Revenue receipts + Capital receipts like disinvestments/loan recoveries). It fundamentally indicates how much the government needs to borrow to bridge the gap.</p><p><b>Formula:</b> Fiscal Deficit = Total Expenditure  -  (Revenue Receipts + Non-debt Capital Receipts).</p><p><b>Statement II  -  Incorrect:</b> While a high fiscal deficit <i>can</i> lead to inflation (if it increases the money supply or if the government borrows to fund consumption), it does <b>not always</b> do so. If the deficit is used to fund productive infrastructure that increases the supply of goods and services, it can actually stabilize prices in the long run.</p>",
    "question_index": 125
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Monsoon Burst:</p><p>1)It refers to sudden onset of heavy rainfall.</p><p>2)It occurs first over Kerala.</p><p>Which are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2357;&#2367;&#2360;&#2381;&#2347;&#2379;&#2335; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2311;&#2360;&#2325;&#2366; &#2340;&#2366;&#2340;&#2381;&#2346;&#2352;&#2381;&#2351; &#2309;&#2330;&#2366;&#2344;&#2325; &#2349;&#2366;&#2352;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366; &#2325;&#2375; &#2310;&#2327;&#2350;&#2344; &#2360;&#2375; &#2361;&#2376;&#2404;</p><p>2) &#2351;&#2361; &#2360;&#2348;&#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2325;&#2375;&#2352;&#2354; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Statement 1  -  Correct:</b> A \"Monsoon Burst\" is a sudden, significant increase in rainfall accompanied by thunder and lightning, marking the transition from the hot dry season to the rainy season.</p><p>&#183; <b>Statement 2  -  Correct:</b> The South-West monsoon traditionally hits the <b>Kerala coast</b> first, usually around June 1st. From there, it moves into the rest of the Indian subcontinent.</p>",
    "question_index": 126
  },
  {
    "question": "<span class=\"eqt\"><p>Which process occurs during Prophase-I of meiosis?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2352;&#2381;&#2343;&#2360;&#2370;&#2340;&#2381;&#2352;&#2368; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2325;&#2375; &#2346;&#2381;&#2352;&#2341;&#2350; &#2330;&#2352;&#2339; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2380;&#2344; &#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2328;&#2335;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">DNA replication</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2368;&#2319;&#2344;&#2319; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2371;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Crossing over</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2342;&#2354;&#2340;&#2375; &#2361;&#2369;&#2319;</span>",
      "<span class=\"eqt\">Cytokinesis</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2311;&#2335;&#2379;&#2325;&#2366;&#2311;&#2344;&#2375;&#2360;&#2367;&#2360;</span>",
      "<span class=\"eqt\">Translation</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2357;&#2366;&#2342;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Crossing over:</b> This is the most critical event of <b>Prophase-I</b>. Homologous chromosomes pair up (synapsis) and exchange genetic material. This process creates genetic diversity in offspring.</p><p>&#183; <b>Why others are incorrect:</b></p><p>o <b>DNA replication</b> occurs during the <b>S-phase of Interphase</b>, before meiosis begins.</p><p>o <b>Cytokinesis</b> is the physical division of the cytoplasm, which happens at the very end of the cell cycle.</p><p>o <b>Translation</b> is a protein synthesis process that occurs in the ribosomes, not specifically tied to a phase of meiosis.</p>",
    "question_index": 127

    "question": "<span class=\"eqt\"><p>Which of the following are components of Capital Expenditure?</p><p>I.Loan disbursement</p><p>II.Creation of infrastructure assets</p><p>III.Interest payments</p><p>IV.Purchase of shares</p><p>Select the correct answer:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2325;&#2380;&#2344; &#2360;&#2375; &#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351; &#2325;&#2375; &#2328;&#2335;&#2325; &#2361;&#2376;&#2306;?</p><p>I. &#2315;&#2339; &#2357;&#2367;&#2340;&#2352;&#2339;</p><p>II. &#2309;&#2357;&#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339;</p><p>III. &#2348;&#2381;&#2351;&#2366;&#2332; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344;</p><p>IV. &#2358;&#2375;&#2351;&#2352;&#2379;&#2306; &#2325;&#2368; &#2326;&#2352;&#2368;&#2342;</p><p>&#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">I, II and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; IV</span>",

      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II, III and IV</span><span class=\"hqt\" style=\"display:none\">I, II, III &#2324;&#2352; IV</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Capital expenditure (CapEx) is spending that either <b>creates an asset</b> or <b>reduces a liability</b>.</p><p>&#183; <b>I. Loan Disbursement  -  Correct:</b> When the Central government gives loans to State governments or foreign nations, it creates a financial asset (the right to receive repayment).</p><p>&#183; <b>II. Creation of infrastructure assets  -  Correct:</b> Building roads, bridges, and hospitals creates physical assets for the country.</p><p>&#183; <b>III. Interest payments  -  Incorrect:</b> This is a <b>Revenue Expenditure</b>. Paying interest does not reduce the original loan (liability) nor does it create a new asset; it is a recurring operational cost.</p><p>&#183; <b>IV. Purchase of shares  -  Correct:</b> Buying shares in a Public Sector Undertaking (PSU) or a private company creates a financial asset for the government.</p>",
    "question_index": 128

    "question": "<span class=\"eqt\"><p>What is the purpose of DNS in the context of the internet?</p><p>A. Encrypting data during transmission</p><p>B. Resolving domain names to IP addresses</p><p>C. Protecting against malware and viruses</p><p>D. Monitoring network traffic</p><p>Code:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; DNS &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p>A. &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2350;&#2367;&#2358;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2337;&#2375;&#2335;&#2366; &#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335; &#2325;&#2352;&#2344;&#2366;</p><p>B. &#2337;&#2379;&#2350;&#2375;&#2344; &#2344;&#2375;&#2350; (&#2344;&#2366;&#2350;&#2379;&#2306;) &#2325;&#2379; &#2310;&#2312;&#2346;&#2368; &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2346;&#2352; &#2352;&#2367;&#2332;&#2377;&#2354;&#2381;&#2357; &#2325;&#2352;&#2344;&#2366;</p><p>C. &#2350;&#2376;&#2354;&#2357;&#2375;&#2351;&#2352; &#2324;&#2352; &#2357;&#2366;&#2351;&#2352;&#2360; &#2360;&#2375; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366;</p><p>D. &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2335;&#2381;&#2352;&#2376;&#2347;&#2364;&#2367;&#2325; &#2325;&#2368; &#2344;&#2367;&#2327;&#2352;&#2366;&#2344;&#2368; &#2325;&#2352;&#2344;&#2366;</p><p>&#2325;&#2379;&#2337;:</p></span>",
    "options": [
      "<span class=\"eqt\">A and B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2324;&#2352; B</span>",
      "<span class=\"eqt\">B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>DNS stands for Domain Name System. DNS is a directory service that provides a mapping between the name of a host on the network and its numerical address. DNS is required for the functioning of the internet. DNS (Domain Name System) is <b>responsible for translating domain names (such as www.example.com) into their corresponding IP addresses.</b> This translation allows computers to locate and connect to specific servers on the internet.</p>",

    "question": "<span class=\"eqt\"><p>Which Excel formula will return the position of the first occurrence of \"A\" in the text \"DATA\", considering case sensitivity?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2347;&#2364;&#2377;&#2352;&#2381;&#2350;&#2370;&#2354;&#2366; \"DATA\" &#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2350;&#2375;&#2306; \"A\" &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2379; &#2325;&#2375;&#2360; &#2360;&#2375;&#2306;&#2360;&#2367;&#2335;&#2367;&#2357;&#2367;&#2335;&#2368; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344; &#2350;&#2375;&#2306; &#2352;&#2326;&#2340;&#2375; &#2361;&#2369;&#2319; &#2354;&#2380;&#2335;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">=SEARCH(\"A\",\"DATA\")</span><span class=\"hqt\" style=\"display:none\">=SEARCH(\"A\",\"DATA\")</span>",
      "<span class=\"eqt\">=FIND(\"A\",\"DATA\")</span><span class=\"hqt\" style=\"display:none\">=FIND(\"A\",\"DATA\")</span>",
      "<span class=\"eqt\">=LEFT(\"DATA\",1)</span><span class=\"hqt\" style=\"display:none\">=LEFT(\"DATA\",1)</span>",
      "<span class=\"eqt\">=MATCH(\"A\",\"DATA\",0)</span><span class=\"hqt\" style=\"display:none\">=MATCH(\"A\",\"DATA\",0)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>FIND()</b> is <b>case-sensitive</b> and returns the position of text.</p><p>&#183; <b>SEARCH()</b> is case-insensitive.</p><p>&#183; <b>LEFT()</b> extracts characters, not position.</p><p>&#183; <b>MATCH()</b> works on ranges, not text strings.</p><p>So, <b>FIND(\"A\",\"DATA\")</b> correctly returns <b>2</b>.</p>",
    "question_index": 134
  },

    "question": "<span class=\"eqt\"><p>Which backup device is known for its high durability and resistance to physical damage?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344;-&#2360;&#2366; &#2348;&#2376;&#2325;&#2309;&#2346; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2309;&#2346;&#2344;&#2375; &#2361;&#2366;&#2312; &#2337;&#2381;&#2351;&#2370;&#2352;&#2375;&#2348;&#2367;&#2354;&#2367;&#2335;&#2368; &#2324;&#2352; &#2349;&#2380;&#2340;&#2367;&#2325; &#2325;&#2381;&#2359;&#2340;&#2367; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343;/&#2352;&#2375;&#2332;&#2367;&#2360;&#2381;&#2335;&#2375;&#2306;&#2360; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">SSD</span><span class=\"hqt\" style=\"display:none\">SSD</span>",

    "correct_option_id": 2,
    "solution": "<p>Solid state drives (SSDs) are newer types of disks that store information on flash memory, which consists of individual memory cells storing bits that are instantly accessible by the controller. SSD speeds vastly outpace those of HDDs, and the rapid data transfer will improve your computer's performance drastically. In comparison to hard disk drives and similar electromechanical media which use moving parts, solid state drives are typically more resistant to physical shock.</p>",
    "question_index": 135
  },

    "question": "<span class=\"eqt\"><p>____ is a type of denial-of-service attack that relies on flooding a network with a large volume of traffic?</p></span><span class=\"hqt\" style=\"display:none\"><p>____,&#2319;&#2325; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2325;&#2379; &#2348;&#2337;&#2364;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2335;&#2381;&#2352;&#2376;&#2347;&#2367;&#2325; &#2360;&#2375; &#2349;&#2352;&#2344;&#2375; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2352;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2337;&#2367;&#2344;&#2366;&#2351;&#2354;-&#2321;&#2347;&#2364;-&#2360;&#2352;&#2381;&#2357;&#2367;&#2360; &#2309;&#2335;&#2376;&#2325; &#2361;&#2376;&#2404;</p></span>",

  {
    "question": "<span class=\"eqt\"><p>Which of the following protects web servers from attacks and can provide performance and reliability benefits?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2357;&#2375;&#2348; &#2360;&#2352;&#2381;&#2357;&#2352; &#2325;&#2379; &#2309;&#2335;&#2376;&#2325; &#2360;&#2375; &#2348;&#2330;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2324;&#2352; &#2357;&#2367;&#2358;&#2381;&#2357;&#2360;&#2344;&#2368;&#2351;&#2340;&#2366; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p>A reverse proxy is a server that sits in front of web servers and forwards client (e.g. web browser) requests to those web servers. Reverse proxies are typically implemented to help increase security, performance, and reliability. In order to better understand how a reverse proxy works and the benefits it can provide, let's first define what a proxy server is.</p>",

  },
  {
    "question": "<span class=\"eqt\"><p>The frequency and ability of the device to repaint or redraw the entire visible display on the screen each second is termed as _____</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2325;&#2381;&#2352;&#2368;&#2344; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2375; &#2342;&#2371;&#2358;&#2381;&#2351;&#2350;&#2366;&#2344; &#2337;&#2367;&#2360;&#2381;&#2346;&#2381;&#2354;&#2375; &#2325;&#2379; &#2352;&#2368;&#2346;&#2375;&#2306;&#2335; &#2351;&#2366; &#2352;&#2368;&#2337;&#2381;&#2352;&#2377; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2325;&#2368; &#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2324;&#2352; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2325;&#2379; _____ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Resolution</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2395;&#2379;&#2354;&#2369;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Distance</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2360;&#2381;&#2335;&#2375;&#2306;&#2360;</span>",
      "<span class=\"eqt\">Refresh rate</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2347;&#2381;&#2352;&#2375;&#2358; &#2352;&#2375;&#2335;</span>",
      "<span class=\"eqt\">Dot Pitch</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2377;&#2335; &#2346;&#2367;&#2330;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Refresh rate is a characteristic of computer display monitors and projection devices that defines the frequency and ability of the device to repaint or redraw the entire visible display on the screen each second. Refresh rate is measured in hertz and will vary according to the architecture of the display device.</p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>Which type of protocol is the result of the integration of modern protocols prior to the suit of TCP/IP protocols?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; TCP/IP &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2325;&#2375; &#2360;&#2369;&#2312;&#2335; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2325;&#2375; &#2319;&#2325;&#2368;&#2325;&#2352;&#2339; &#2325;&#2366; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">FTP</span><span class=\"hqt\" style=\"display:none\">FTP</span>",
      "<span class=\"eqt\">SLIP</span><span class=\"hqt\" style=\"display:none\">SLIP</span>",
      "<span class=\"eqt\">HTTP</span><span class=\"hqt\" style=\"display:none\">HTTP</span>",
      "<span class=\"eqt\">PPP</span><span class=\"hqt\" style=\"display:none\">PPP</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>SLIP: Serial Line Internet Protocol</b> is the result of the integration of modern protocols prior to the suit of TCP/IP protocols. It is a simple Internet link protocol conducting neither address or error control, this is the reason that it is quickly becoming obsolete in comparison to PPP.</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding e-mail services:</p><p>1) SMTP is mainly used for sending e-mails.</p><p>2) POP3 allows e-mails to be stored permanently on the mail server by default.</p><p>3) IMAP allows users to access the same mailbox from multiple devices.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2312;-&#2350;&#2375;&#2354; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) SMTP &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2312;-&#2350;&#2375;&#2354; &#2349;&#2375;&#2332;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) POP3 &#2337;&#2367;&#2347;&#2364;&#2377;&#2354;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2312;-&#2350;&#2375;&#2354; &#2325;&#2379; &#2350;&#2375;&#2354; &#2360;&#2352;&#2381;&#2357;&#2352; &#2346;&#2352; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) IMAP &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2319;&#2325; &#2361;&#2368; &#2350;&#2375;&#2354;&#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2379; &#2325;&#2312; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2360;&#2375; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Statement 1  -  Correct:</b> SMTP handles outgoing mail.</p><p>&#183; <b>Statement 2  -  Incorrect:</b> POP3 usually downloads mails to the local device and removes them from the server.</p><p>&#183; <b>Statement 3  -  Correct:</b> IMAP synchronizes emails across devices.</p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>What is the primary purpose of a secondary memory in a computer system?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2350;&#2375;&#2306; &#2360;&#2375;&#2325;&#2375;&#2306;&#2337;&#2352;&#2368; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">To store temporary data during program execution.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2375; &#2319;&#2325;&#2381;&#2360;&#2368;&#2325;&#2381;&#2351;&#2370;&#2358;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2309;&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To provide additional processing power to the CPU.</span><span class=\"hqt\" style=\"display:none\">CPU &#2325;&#2379; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2367;&#2306;&#2327; &#2346;&#2377;&#2357;&#2352; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To serve as a cache for frequently accessed data.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2352;-&#2348;&#2366;&#2352; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2325;&#2367;&#2319; &#2327;&#2319; &#2337;&#2375;&#2335;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2376;&#2358; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">To store data for long-term storage and retrieval.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2368;&#2352;&#2381;&#2328;&#2325;&#2366;&#2354;&#2367;&#2325; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339; &#2324;&#2352; &#2346;&#2369;&#2344;&#2352;&#2381;&#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367; (&#2352;&#2367;&#2335;&#2381;&#2352;&#2368;&#2357;&#2354;) &#2325;&#2375; &#2354;&#2367;&#2319; &#2337;&#2375;&#2335;&#2366; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Secondary memory, such as hard disk drives (HDDs) and solid-state drives (SSDs), is used to store data that needs to be retained even when the computer is powered off. Unlike primary memory (RAM), which is volatile and temporary, secondary memory provides non-volatile storage. It is commonly used to store operating system files, applications, user data, and other files that need to be accessed over an extended period. </p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>Which case is used to shift between two case views?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2325;&#2375;&#2360; &#2357;&#2381;&#2351;&#2370; &#2325;&#2375; &#2348;&#2368;&#2330; &#2358;&#2367;&#2347;&#2381;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2325;&#2375;&#2360; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Toggle Case</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2377;&#2327;&#2354; &#2325;&#2375;&#2360;</span>",
      "<span class=\"eqt\">Capital Case</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2346;&#2367;&#2335;&#2354; &#2325;&#2375;&#2360;</span>",
      "<span class=\"eqt\">Lower Case</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2309;&#2352; &#2325;&#2375;&#2360;</span>",

    "correct_option_id": 0,
    "solution": "<p>ToggleCase is text that is converted to mixed case version of the text. For instance, the word \"dictionary\" could be converted into \"dIctIOnAry\".</p><p><b>To shift between two case views </b>(for example, to shift between Capitalize Each Word and the opposite, cAPITALIZE eACH wORD), click tOGGLE cASE.</p>",

  {
    "question": "<span class=\"eqt\"><p>Which feature of Microsoft Word allows you to create fill-in-the-blank type multiple-choice questions?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2360;&#2377;&#2347;&#2381;&#2335; &#2357;&#2352;&#2381;&#2337; &#2325;&#2368; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2310;&#2346;&#2325;&#2379; &#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344; &#2349;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2348;&#2361;&#2369;&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2368;&#2351; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">WordArt</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2337;&#2310;&#2352;&#2381;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The feature in Microsoft Word that enables you to create fill-in-the-blank type multiple-choice questions is Form Fields. Form Fields are interactive elements that can be inserted into a Word document to collect information from the user. In the context of creating MCQs, Form Fields can be used to define areas where users can select their answers from predefined options.</p>",

  {

    "question": "<span class=\"eqt\"><p>Consider the following statements about Windows Explorer (File Explorer):</p><p>1) Windows Explorer is used to manage files and folders stored on a computer.</p><p>2) Windows Explorer can be used to install device drivers.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2319;&#2325;&#2381;&#2360;&#2346;&#2381;&#2354;&#2379;&#2352;&#2352; (&#2347;&#2364;&#2366;&#2311;&#2354; &#2319;&#2325;&#2381;&#2360;&#2346;&#2381;&#2354;&#2379;&#2352;&#2352;) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2319;&#2325;&#2381;&#2360;&#2346;&#2381;&#2354;&#2379;&#2352;&#2352; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2346;&#2352; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2347;&#2364;&#2366;&#2311;&#2354;&#2379;&#2306; &#2324;&#2352; &#2347;&#2364;&#2379;&#2354;&#2381;&#2337;&#2352;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2319;&#2325;&#2381;&#2360;&#2346;&#2381;&#2354;&#2379;&#2352;&#2352; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;&#2352; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Statement 1  -  Correct:</b> File Explorer is used for browsing, copying, moving, and deleting files/folders.</p><p>&#183; <b>Statement 2  -  Incorrect:</b> Device drivers are installed using setup programs or Device Manager, not File Explorer itself.</p>",

    ],
    "correct_option_id": 1,
    "solution": "<p>When renaming a file or folder, you can avoid having to use the roundabout method of right-clicking it and selecting the \"Rename\" option. Simply click on the file or folder while pressing the <b>F2 key</b>. This will launch the text field for you to enter a new name. </p>",
