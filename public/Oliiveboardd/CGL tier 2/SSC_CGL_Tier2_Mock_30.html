    "question": "<span class=\"eqt\"><p>Match the Following - Aditya-L1 Instruments</p><p><table style=\"border-collapse:collapse;\"></p><p><tr></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">Column A (Instrument)</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">Column B (Function)</th></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. VELC (Visible Emission Line Coronagraph)</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Measures solar irradiance and energy output</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. SUIT (Solar Ultraviolet Imaging Telescope)</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Observes the Sun in ultraviolet spectrum</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. ASPEX (Aditya Solar wind Particle Experiment)</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Measures the properties of solar wind and particles</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. PICARD (or equivalent Solar radiometer instrument)</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Captures images of the Sun's corona in visible light</td></p><p></tr></p><p></table></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306; - &#2310;&#2342;&#2367;&#2340;&#2381;&#2351;-&#2319;&#2354;1 &#2311;&#2306;&#2360;&#2381;&#2335;&#2381;&#2352;&#2370;&#2350;&#2375;&#2306;&#2335;&#2381;&#2360;</p><p><table style=\"border-collapse:collapse;\"><tr></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. VELC (&#2342;&#2371;&#2358;&#2381;&#2351; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2344; &#2352;&#2375;&#2326;&#2366; &#2325;&#2379;&#2352;&#2379;&#2344;&#2366;&#2327;&#2381;&#2352;&#2366;&#2347;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2360;&#2380;&#2352; &#2357;&#2367;&#2325;&#2367;&#2352;&#2339; &#2324;&#2352; &#2314;&#2352;&#2381;&#2332;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. SUIT (&#2360;&#2380;&#2352; &#2346;&#2352;&#2366;&#2348;&#2376;&#2306;&#2327;&#2344;&#2368; &#2311;&#2350;&#2375;&#2332;&#2367;&#2306;&#2327; &#2335;&#2375;&#2354;&#2368;&#2360;&#2381;&#2325;&#2379;&#2346;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2346;&#2352;&#2366;&#2348;&#2376;&#2306;&#2327;&#2344;&#2368; &#2360;&#2381;&#2346;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2366; &#2309;&#2357;&#2354;&#2379;&#2325;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. ASPEX (&#2310;&#2342;&#2367;&#2340;&#2381;&#2351; &#2360;&#2380;&#2352; &#2357;&#2366;&#2351;&#2369; &#2325;&#2339; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2360;&#2380;&#2352; &#2357;&#2366;&#2351;&#2369; &#2324;&#2352; &#2325;&#2339;&#2379;&#2306; &#2325;&#2375; &#2327;&#2369;&#2339;&#2379;&#2306; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. PICARD (&#2351;&#2366; &#2360;&#2350;&#2325;&#2325;&#2381;&#2359; &#2360;&#2380;&#2352; &#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2350;&#2368;&#2335;&#2352; &#2313;&#2346;&#2325;&#2352;&#2339;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2342;&#2371;&#2358;&#2381;&#2351; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2350;&#2375;&#2306; &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2375; &#2325;&#2379;&#2352;&#2379;&#2344;&#2366; &#2325;&#2368; &#2331;&#2357;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2325;&#2376;&#2346;&#2381;&#2330;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr></table></p></span>",
    "options": [
      "<span class=\"eqt\">1-a,2-b,3-c,4-d</span><span class=\"hqt\" style=\"display:none\">1-a,2-b,3-c,4-d</span>",
      "<span class=\"eqt\">1-b,2-a,3-d,4-c</span><span class=\"hqt\" style=\"display:none\">1-b,2-a,3-d,4-c</span>",
      "<span class=\"eqt\">1-c,2-d,3-a,4-b</span><span class=\"hqt\" style=\"display:none\">1-c,2-d,3-a,4-b</span>",
      "<span class=\"eqt\">1-d,2-b,3-c,4-a</span><span class=\"hqt\" style=\"display:none\">1-d,2-b,3-c,4-a</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>VELC (Visible Emission Line Coronagraph) - d. Captures images of the Sun's corona in visible light: VELC is the primary payload of Aditya-L1. It is a coronagraph, an instrument designed to block the bright light from the Sun's disk, allowing it to take high-resolution images of the much fainter outer atmosphere, the corona. It studies the dynamics and origin of coronal mass ejections.</p><p>SUIT (Solar Ultraviolet Imaging Telescope) - b. Observes the Sun in the ultraviolet spectrum: SUIT is an imaging telescope that captures images of the Sun's photosphere and chromosphere in the near-ultraviolet (UV) spectrum. This helps in studying the dynamic processes occurring in these layers.</p><p>ASPEX (Aditya Solar wind Particle Experiment) - c. Measures the properties of solar wind and particles: ASPEX is an in-situ instrument, meaning it directly samples the environment around the spacecraft. It is designed to study the solar wind and its properties, analyzing the distribution and characteristics of its constituent protons and heavier ions.</p><p>SOLEXS and HEL1OS - a. Measures solar irradiance and energy output: These are two X-ray spectrometer payloads. SOLEXS (Solar Low Energy X-ray Spectrometer) and HEL1OS (High Energy L1 Orbiting X-ray Spectrometer) are designed to study the X-ray flares from the Sun over a wide energy range. X-ray flux is a direct measure of the high-energy output from the sun and is a key component of solar irradiance. (Note: The original question used \"PICARD,\" which was a separate French satellite. The equivalent instruments on Aditya-L1 for measuring solar energy flux are the X-ray spectrometers.)</p><p>Further insights:</p><p>Aditya-L1 is India's first dedicated solar observatory, placed in a halo orbit around the Lagrange point 1 (L1) of the Sun-Earth system. This location provides an uninterrupted view of the Sun without any occultation or eclipses.</p><p>The mission's comprehensive suite of instruments allows for the simultaneous study of the Sun's photosphere, chromosphere, and corona, as well as the solar wind and energetic particles, providing a holistic understanding of solar phenomena and their impact on space weather.</p><p></p>",
    "question_index": 114
  },

    "question": "<span class=\"eqt\"><p>Identify the statement that is NOT correct about 'Vijayanagara Empire'.</p><p>i. Founded in 1336 by Harihara and Bukka, associated with Vidyaranya's guidance.</p><p>ii. The nayankara system assigned revenue villages to chiefs for military service.</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351;' &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p><p>i. 1336 &#2350;&#2375;&#2306; &#2361;&#2352;&#2367;&#2361;&#2352; &#2324;&#2352; &#2348;&#2369;&#2325;&#2381;&#2325;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340;, &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2339;&#2381;&#2351; &#2325;&#2375; &#2350;&#2366;&#2352;&#2381;&#2327;&#2342;&#2352;&#2381;&#2358;&#2344; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375;&#2404;</p><p>ii. &#2344;&#2351;&#2344;&#2325;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2344;&#2375; &#2360;&#2376;&#2344;&#2381;&#2351; &#2360;&#2375;&#2357;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326;&#2379;&#2306; &#2325;&#2379; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2327;&#2366;&#2305;&#2357; &#2360;&#2380;&#2306;&#2346;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">i only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">ii only</span><span class=\"hqt\" style=\"display:none\">ii &#2325;&#2375;&#2357;&#2354;</span>",
      "<span class=\"eqt\">Both i and ii</span><span class=\"hqt\" style=\"display:none\">i &#2324;&#2352; ii &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither i nor ii</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; i &#2324;&#2352; &#2344; &#2361;&#2368; ii</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both i and ii are correct.</p><p>Explanation of Statements:</p><p>i is Correct. The Vijayanagara Empire was founded in 1336 on the southern banks of the Tungabhadra river by two brothers, Harihara I and Bukka Raya I of the Sangama dynasty. According to tradition, they were inspired and guided in their endeavor by the sage Vidyaranya of the Sringeri Matha.</p><p>ii is Correct. The nayankara system was a key administrative feature of the Vijayanagara Empire. Under this system, the emperor, as the ultimate landowner, would assign territories (amaram) to military chiefs known as nayakas (or Nayaks). In return for the revenues from this territory, the nayaka was obligated to maintain a specified number of troops for the imperial army and to pay an annual tribute to the king. This system was similar in some respects to European feudalism.</p><p></p>",
    "question_index": 116
  },
  {
    "question": "<span class=\"eqt\"><p>In beta decay, a neutron in the nucleus transforms into:</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2368;&#2335;&#2366; &#2325;&#2381;&#2359;&#2351; &#2350;&#2375;&#2306;, &#2344;&#2366;&#2349;&#2367;&#2325; &#2350;&#2375;&#2306; &#2319;&#2325; &#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344; &#2325;&#2367;&#2360;&#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Proton and emits gamma photon</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2335;&#2377;&#2344; &#2324;&#2352; &#2327;&#2366;&#2350;&#2366; &#2347;&#2379;&#2335;&#2377;&#2344; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Proton and emits electron</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2335;&#2377;&#2344; &#2324;&#2352; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Proton and emits beta particle (electron)</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2335;&#2377;&#2344; &#2324;&#2352; &#2348;&#2368;&#2335;&#2366; &#2325;&#2339; (&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;) &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Proton and emits alpha particle</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2335;&#2377;&#2344; &#2324;&#2352; &#2309;&#2354;&#2381;&#2347;&#2366; &#2325;&#2339; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In beta-minus decay, a neutron converts into a proton, emitting a beta particle (electron) and an antineutrino.</p><p>Explanation:</p><p>Beta Decay (specifically &#946;&#8315; decay): This is a type of radioactive decay that occurs in neutron-rich nuclei.</p><p>The Transformation: A neutron (n&#8304;) within the nucleus changes into a proton (p&#8314;). This transformation conserves charge by creating and emitting a high-energy electron (e&#8315;).</p><p>Emitted Particle: The electron emitted in this process is called a beta particle (&#946;&#8315;).</p><p>Subatomic View: The full reaction at the subatomic level is:</p><p>n&#8304; &#8594; p&#8314; + e&#8315; + &#957;&#773;&#8337;</p><p>(A neutron decays into a proton, an electron, and an electron antineutrino.)</p><p>Effect on the Nucleus: Because a neutron becomes a proton, the mass number (A) of the nucleus remains the same, but the atomic number (Z) increases by one. The atom is thus transformed into the next element in the periodic table.</p><p>Analysis of Options:</p><p>a) Proton and emits gamma photon: Incorrect. Gamma decay is a separate process where an excited nucleus releases energy as a photon; it doesn't involve a neutron changing into a proton.</p><p>b) Proton and emits electron: This is correct, but option (c) is more precise because it uses the specific term \"beta particle\" for the emitted electron. In the context of nuclear physics, this is the preferred terminology.</p><p>c) Proton and emits beta particle (electron): This is the best and most accurate description. It correctly identifies the transformation and uses the specific name for the particle emitted during beta decay.</p><p>d) Proton and emits alpha particle: Incorrect. Alpha decay is the emission of an alpha particle (a helium nucleus), which involves the loss of two protons and two neutrons.</p><p></p>",
    "question_index": 117
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following plant belongs to the Bryophyte group?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2380;&#2343;&#2366; &#2348;&#2381;&#2352;&#2366;&#2351;&#2379;&#2347;&#2366;&#2311;&#2335; &#2360;&#2350;&#2370;&#2361; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Fern</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2352;&#2381;&#2344;</span>",
      "<span class=\"eqt\">Marchantia</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2352;&#2381;&#2330;&#2375;&#2306;&#2335;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Cycas</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2311;&#2325;&#2360;</span>",
      "<span class=\"eqt\">Mango</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Marchantia is a classic example of a plant belonging to the division Bryophyta. Bryophytes are non-vascular land plants.</p><p>Explanation of Options:</p><p>a) Fern: Ferns belong to the division Pteridophyta. Pteridophytes are vascular plants (they have xylem and phloem) but they do not produce flowers or seeds; they reproduce via spores.</p><p>b) Marchantia: This is the correct answer. Marchantia is a genus of liverworts, which, along with mosses and hornworts, make up the division Bryophyta. Bryophytes are characterized by their lack of a true vascular system, roots, stems, and leaves.</p><p>c) Cycas: Cycas is a genus of plants belonging to the division Gymnospermae. Gymnosperms are vascular plants that produce \"naked\" seeds (not enclosed in an ovary).</p><p>d) Mango: The mango tree (Mangifera indica) is a flowering plant and belongs to the division Angiospermae (also known as Magnoliophyta). Angiosperms are vascular plants that produce seeds enclosed within an ovary (a fruit).</p><p>Further insights:</p><p>Bryophytes are often referred to as the \"amphibians of the plant kingdom\" because, although they live on land, they require water for sexual reproduction.</p><p>The plant kingdom is broadly classified into several major divisions, showing an evolutionary progression:</p><p>Thallophyta (Algae)</p><p>Bryophyta (Mosses, Liverworts)</p><p>Pteridophyta (Ferns)</p><p>Gymnospermae (Conifers, Cycads)</p><p>Angiospermae (Flowering plants)</p><p></p>",
    "question_index": 118
  },
  {
    "question": "<span class=\"eqt\"><p>The Fourth Five-Year Plan (1969-74) gave special emphasis to:</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2380;&#2341;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; (1969-74) &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2358;&#2375;&#2359; &#2332;&#2379;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Service sector growth</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2357;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Poverty alleviation and self-reliance</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2352;&#2368;&#2348;&#2368; &#2313;&#2344;&#2381;&#2350;&#2370;&#2354;&#2344; &#2324;&#2352; &#2310;&#2340;&#2381;&#2350;&#2344;&#2367;&#2352;&#2381;&#2349;&#2352;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Only agriculture</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2371;&#2359;&#2367;</span>",
      "<span class=\"eqt\">Space research</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2352;&#2367;&#2325;&#2381;&#2359; &#2309;&#2344;&#2369;&#2360;&#2306;&#2343;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Fourth Five-Year Plan had two main objectives: \"Growth with Stability\" and \"Progressive Achievement of Self-Reliance.\" A key component of this was the focus on improving the conditions of the weaker sections of society and reducing inequalities, which is encapsulated in the goal of poverty alleviation (Garibi Hatao).</p><p>Explanation:</p><p>The plan was launched under the leadership of Prime Minister Indira Gandhi. The famous slogan \"Garibi Hatao\" (Remove Poverty) became the central theme of this plan and the subsequent political discourse.</p><p>The plan aimed to achieve self-reliance by reducing foreign aid and promoting exports. This was a response to the pressures faced during the wars of the 1960s (with China in 1962 and Pakistan in 1965) when foreign aid, especially from the US, was suspended.</p><p>While agriculture continued to be a focus to build on the gains of the Green Revolution, the plan was not limited to \"only agriculture.\" It also had ambitious targets for industrial growth.</p><p>Space research (d) and service sector growth (a) were components of the overall economic plan but were not the primary stated objectives in the way that self-reliance and poverty alleviation were.</p><p>The plan's ambitious targets were ultimately hampered by several challenges, including the Indo-Pak War of 1971 and the subsequent refugee crisis from Bangladesh, as well as the global oil shock of 1973.</p><p></p>",
    "question_index": 119
  },
  {
    "question": "<span class=\"eqt\"><p>What is the stated annual financial outlay for the PMDDKY(Prime Minister Dhan-Dhaanya Krishi Yojana), which is set to run for six years?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2368;&#2319;&#2350;&#2337;&#2368;&#2337;&#2368;&#2325;&#2375;&#2357;&#2366;&#2312; (&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2343;&#2344;-&#2343;&#2366;&#2344;&#2381;&#2351; &#2325;&#2371;&#2359;&#2367; &#2351;&#2379;&#2332;&#2344;&#2366;) &#2325;&#2375; &#2354;&#2367;&#2319; &#2328;&#2379;&#2359;&#2367;&#2340; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2346;&#2352;&#2367;&#2357;&#2381;&#2351;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2331;&#2361; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2340;&#2325; &#2330;&#2354;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;10,000 crore</span><span class=\"hqt\" style=\"display:none\">&#8377;10,000 &#2325;&#2352;&#2379;&#2337;&#2364;</span>",
      "<span class=\"eqt\">&#8377;15,000 crore</span><span class=\"hqt\" style=\"display:none\">&#8377;15,000 &#2325;&#2352;&#2379;&#2337;&#2364;</span>",
      "<span class=\"eqt\">&#8377;24,000 crore</span><span class=\"hqt\" style=\"display:none\">&#8377;24,000 &#2325;&#2352;&#2379;&#2337;&#2364;</span>",
      "<span class=\"eqt\">&#8377;36,000 crore</span><span class=\"hqt\" style=\"display:none\">&#8377;36,000 &#2325;&#2352;&#2379;&#2337;&#2364;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Prime Minister Dhan-Dhaanya Krishi Yojana is a long-term initiative planned to be implemented over six years, starting from the financial year 2025-26. The government has committed a substantial annual outlay of &#8377;24,000 crore for the scheme.</p><p><b>Further Insight:</b></p><p>A total outlay of &#8377;1,44,000 crore over six years (&#8377;24,000 crore annually) makes PMDDKY one of the most significant interventions in the agricultural sector. This funding is intended to support a wide range of activities, from providing modern farming technologies and high-yield seeds to improving credit availability and market linkages for farmers in the targeted districts.</p>",
    "question_index": 120
  },

    "question": "<span class=\"eqt\"><p>Read the below statements marked as Assertion (A) and Reason (R). Mark the correct options:</p><p>Assertion (A): HFCs, though non-ozone-depleting, are being phased down internationally because they are potent greenhouse gases.</p><p>Reason (R): The Kigali Amendment to the Montreal Protocol mandates a global, time-bound phasedown of HFCs precisely to address their climate-warming impact.</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A) &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; (R) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2325;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2319;&#2330;&#2319;&#2347;&#2360;&#2368;, &#2361;&#2366;&#2354;&#2366;&#2306;&#2325;&#2367; &#2323;&#2332;&#2379;&#2344; &#2346;&#2352;&#2340; &#2325;&#2379; &#2344;&#2369;&#2325;&#2360;&#2366;&#2344; &#2344;&#2361;&#2368;&#2306; &#2346;&#2361;&#2369;&#2306;&#2330;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2309;&#2306;&#2340;&#2352;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2330;&#2352;&#2339;&#2348;&#2342;&#2381;&#2343; &#2340;&#2352;&#2368;&#2325;&#2375; &#2360;&#2375; &#2325;&#2350; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2352;&#2361;&#2366; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2357;&#2375; &#2358;&#2325;&#2381;&#2340;&#2367;&#2358;&#2366;&#2354;&#2368; &#2327;&#2381;&#2352;&#2368;&#2344;&#2361;&#2366;&#2313;&#2360; &#2327;&#2376;&#2360;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2350;&#2377;&#2344;&#2381;&#2335;&#2381;&#2352;&#2367;&#2351;&#2354; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2350;&#2375;&#2306; &#2325;&#2367;&#2327;&#2366;&#2354;&#2368; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344;, &#2319;&#2330;&#2319;&#2347;&#2360;&#2368; &#2325;&#2375; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369;-&#2357;&#2366;&#2352;&#2381;&#2350;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2325;&#2379; &#2336;&#2368;&#2325; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;, &#2313;&#2344;&#2325;&#2375; &#2357;&#2376;&#2358;&#2381;&#2357;&#2367;&#2325;, &#2360;&#2350;&#2351;&#2348;&#2342;&#2381;&#2343; &#2330;&#2352;&#2339;&#2348;&#2342;&#2381;&#2343; &#2340;&#2352;&#2368;&#2325;&#2375; &#2360;&#2375; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2310;&#2342;&#2375;&#2358; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2340;&#2341;&#2366; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, but R is false.</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true.</span><span class=\"hqt\" style=\"display:none\">A &#2327;&#2354;&#2340; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Both the Assertion (A) and the Reason (R) are true, and the Reason (R) is the direct and correct explanation for the Assertion (A).</p><p>The international community is phasing down HFCs due to their climate impact, and the legal mechanism for this action is the Kigali Amendment.</p><p>Explanation of Statements:</p><p>Assertion (A) is true. Hydrofluorocarbons (HFCs) were developed and widely adopted as replacements for ozone-depleting substances like chlorofluorocarbons (CFCs) and hydrochlorofluorocarbons (HCFCs) in applications like refrigeration and air-conditioning. They are considered safe for the ozone layer because they do not contain chlorine. However, it was later discovered that HFCs are extremely potent greenhouse gases, with a global warming potential (GWP) hundreds to thousands of times greater than that of carbon dioxide (CO&#8322;). Because of this significant climate impact, there is a global effort to phase them down.</p><p>Reason (R) is true. The Montreal Protocol on Substances that Deplete the Ozone Layer is a landmark international treaty that successfully orchestrated the phase-out of CFCs and HCFCs. Recognizing the growing climate threat posed by their replacements (HFCs), the parties to the Montreal Protocol adopted the Kigali Amendment in 2016. This amendment explicitly adds HFCs to the list of controlled substances and creates a legally binding, time-bound schedule for all signatory countries to gradually reduce their production and consumption. The sole purpose of this amendment is to mitigate climate change by targeting these powerful greenhouse gases.</p><p>Relationship:</p><p>The Reason (R) perfectly explains the Assertion (A). The Kigali Amendment (Reason) is the specific international legal instrument that mandates the phasedown of HFCs (Assertion) because of their high global warming potential. The assertion describes the \"what\" and \"why\" of the action, and the reason provides the \"how\" through the specific international agreement. Therefore, R is the correct explanation for A.</p><p></p>",
    "question_index": 121
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about red soils:</p><p>1) The red color is primarily due to ferric oxides.</p><p>2) Red soils are typically rich in nitrogen and humus but poor in potash.</p><p>3) Red soils are widely found in Tamil Nadu, eastern Karnataka, and parts of Odisha.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2366;&#2354; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2354;&#2366;&#2354; &#2352;&#2306;&#2327; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2347;&#2375;&#2352;&#2367;&#2325; &#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2354;&#2366;&#2354; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2324;&#2352; &#2361;&#2381;&#2351;&#2370;&#2350;&#2360; &#2360;&#2375; &#2349;&#2352;&#2346;&#2370;&#2352; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2346;&#2379;&#2335;&#2366;&#2358; &#2350;&#2375;&#2306; &#2325;&#2350; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3) &#2354;&#2366;&#2354; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;, &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325; &#2324;&#2352; &#2323;&#2337;&#2367;&#2358;&#2366; &#2325;&#2375; &#2325;&#2369;&#2331; &#2361;&#2367;&#2360;&#2381;&#2360;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 3 are correct.</p><p>Statement 2 is incorrect because red soils are known to be deficient in nitrogen and humus, not rich in them.</p><p>Explanation of Statements:</p><p>1 is Correct. The characteristic red colour of these soils is a result of the wide diffusion of iron compounds, specifically ferric oxides (iron(III) oxide, Fe&#8322;O&#8323;), in the soil. The process of weathering of ancient crystalline and metamorphic rocks leads to the release of iron, which then oxidizes (rusts) in the soil, imparting the red hue. The soil often appears yellowish when it is in a hydrated form.</p><p>2 is Incorrect. This statement is the opposite of the actual nutrient profile of red soils. They are generally poor in nitrogen, phosphorus, and humus (organic matter). They are, however, often rich in potash and lime. This nutrient deficiency means they require the application of fertilizers and organic manure to be agriculturally productive.</p><p>3 is Correct. Red soils form the third-largest soil group in India. They are predominantly found in the eastern and southern parts of the Deccan Plateau. This includes large areas of Tamil Nadu, southern and eastern Karnataka, southeastern Maharashtra, eastern Andhra Pradesh and Telangana, parts of Odisha and Chhattisgarh, and the Chota Nagpur plateau in Jharkhand.</p><p>Further insights:</p><p>Red soils develop on crystalline igneous rocks like granite and gneiss in areas of relatively low rainfall.</p><p>They are generally light-textured (sandy to loamy) and have a porous structure.</p><p>With proper irrigation and the use of fertilizers, red soils can be cultivated to grow a variety of crops, including millets, pulses, oilseeds, tobacco, and vegetables.</p><p></p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the below statements about the Lucknow Session (1916).</p><p>1. It marked the reunion of Moderates and Extremists within the Indian National Congress (INC).</p><p>2. During this session, the Lucknow Pact was signed between the Congress and the Muslim League.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2326;&#2344;&#2314; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344; (1916) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1. &#2311;&#2360;&#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; (INC) &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2344;&#2352;&#2350;&#2346;&#2306;&#2341;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2327;&#2352;&#2350;&#2346;&#2306;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2346;&#2369;&#2344;&#2352;&#2381;&#2350;&#2367;&#2354;&#2344; &#2325;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>2. &#2311;&#2360; &#2360;&#2340;&#2381;&#2352; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2324;&#2352; &#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2354;&#2368;&#2327; &#2325;&#2375; &#2348;&#2368;&#2330; &#2354;&#2326;&#2344;&#2314; &#2360;&#2350;&#2333;&#2380;&#2340;&#2375; &#2346;&#2352; &#2361;&#2360;&#2381;&#2340;&#2366;&#2325;&#2381;&#2359;&#2352; &#2325;&#2367;&#2319; &#2327;&#2319; &#2341;&#2375;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are correct. The 1916 Lucknow session of the Indian National Congress was a landmark event for two major reasons: it healed the split within the Congress and it forged a historic, albeit temporary, alliance between the Congress and the Muslim League.</p><p>Explanation of Statements:</p><p>Statement 1 is correct. The Indian National Congress (INC) had split into two factions-the Moderates and the Extremists-at the Surat session in 1907. The Lucknow session of 1916 witnessed the readmission of the Extremists, led by Bal Gangadhar Tilak, back into the Congress fold. This reunion was facilitated by the efforts of leaders like Annie Besant and the realization that a united front was necessary for the nationalist movement to be effective.</p><p>Statement 2 is correct. A second, equally significant development at the Lucknow session was the signing of the Lucknow Pact. This was a joint agreement between the Indian National Congress and the All-India Muslim League. Under the pact, the two parties agreed to a common set of demands for constitutional reforms to present to the British government. As part of the agreement, the Congress accepted the principle of separate electorates for Muslims, a major concession that paved the way for Hindu-Muslim unity in the nationalist struggle for a short period, most notably during the Non-Cooperation and Khilafat Movements.</p><p>Further insights:</p><p>The Lucknow session was presided over by Ambica Charan Mazumdar.</p><p>While the Lucknow Pact was hailed as a symbol of Hindu-Muslim unity at the time, some historians later criticized the Congress's acceptance of separate electorates, arguing that it implicitly legitimized communal politics, which ultimately contributed to the path towards partition.</p><p></p>",
    "question_index": 123
  },

    "question": "<span class=\"eqt\"><p>Regarding the 1991 reforms (LPG/industrial policy), consider the following:</p><p>1. Industrial licensing was abolished for most industries, retaining a small negative list.</p><p>2. MRTP's pre-entry asset threshold for large firms was dismantled.</p><p>3. The rupee moved to a pure free float immediately in 1991.</p><p>4. The list of industries reserved for small-scale units expanded during the 1990s.</p><p>Which of the above statement are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>1991 &#2325;&#2375; &#2360;&#2369;&#2343;&#2366;&#2352;&#2379;&#2306; (&#2319;&#2354;&#2346;&#2368;&#2332;&#2368;/&#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367;) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2354;&#2366;&#2311;&#2360;&#2375;&#2306;&#2360;&#2367;&#2306;&#2327; &#2325;&#2379; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;, &#2319;&#2325; &#2331;&#2379;&#2335;&#2368; &#2344;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2370;&#2330;&#2368; &#2325;&#2379; &#2348;&#2352;&#2325;&#2352;&#2366;&#2352; &#2352;&#2326;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>2. &#2348;&#2337;&#2364;&#2368; &#2347;&#2352;&#2381;&#2350;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2350;&#2310;&#2352;&#2335;&#2368;&#2346;&#2368; &#2325;&#2368; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358;-&#2346;&#2370;&#2352;&#2381;&#2357; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2360;&#2368;&#2350;&#2366; &#2325;&#2379; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>3. 1991 &#2350;&#2375;&#2306; &#2352;&#2369;&#2346;&#2351;&#2366; &#2340;&#2369;&#2352;&#2306;&#2340; &#2358;&#2369;&#2342;&#2381;&#2343; &#2350;&#2369;&#2325;&#2381;&#2340; &#2347;&#2381;&#2354;&#2379;&#2335; &#2350;&#2375;&#2306; &#2330;&#2354;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>4. 1990 &#2325;&#2375; &#2342;&#2358;&#2325; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2354;&#2328;&#2369;-&#2360;&#2381;&#2340;&#2352;&#2368;&#2351; &#2311;&#2325;&#2366;&#2311;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2360;&#2370;&#2330;&#2368; &#2325;&#2366; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">2, 3, and 4</span><span class=\"hqt\" style=\"display:none\">2, 3, &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">1, 2, and 3</span><span class=\"hqt\" style=\"display:none\">1, 2, &#2324;&#2352; 3</span>"

    "correct_option_id": 0,
    "solution": "<p>Statements 1 and 2 are correct descriptions of the key liberalization measures undertaken as part of the 1991 New Industrial Policy.</p><p>Statements 3 and 4 are incorrect. The move to a floating exchange rate was gradual, not immediate, and the list of items reserved for the small-scale sector was progressively reduced, not expanded. Therefore, the correct option is (A).</p><p>Explanation of Statements:</p><p>1 is Correct. This was the cornerstone of the 1991 reforms, aimed at dismantling the \"Licence Raj.\" The New Industrial Policy of 1991 abolished industrial licensing for all industries, except for a short list of 18 industries (the \"negative list\") related to security, strategic concerns, social reasons, or hazardous materials. This list has been further pruned over the years.</p><p>2 is Correct. The Monopolies and Restrictive Trade Practices (MRTP) Act of 1969 required large industrial houses (defined by a certain asset threshold) to seek prior government approval for expansion, diversification, or mergers. The 1991 policy eliminated this pre-entry scrutiny and the concept of asset limits for defining a dominant firm. The focus of the MRTP Act was shifted to controlling monopolistic and restrictive trade practices, and the Act was eventually replaced by the Competition Act in 2002.</p><p>3 is Incorrect. The move towards a market-determined exchange rate was a key reform, but it was not an immediate switch to a \"pure free float.\" In 1991, the rupee was first devalued in two steps. Then, India moved to a dual exchange rate system (Liberalised Exchange Rate Management System - LERMS) in 1992, and finally to a unified, market-determined managed floating exchange rate system in 1993. Under a managed float, the central bank (RBI) intervenes in the foreign exchange market to manage volatility, so it is not a \"pure\" free float.</p><p>4 is Incorrect. The policy of reserving certain items for exclusive manufacture in the small-scale industries (SSI) sector was a feature of the pre-1991 era. The post-1991 reform process aimed at increasing competition and efficiency. As part of this, the list of items reserved for the SSI sector was progressively reduced (de-reserved) throughout the 1990s and 2000s, finally being completely abolished in 2015. The statement that the list expanded is the opposite of what happened.</p><p>Further insights:</p><p>The 1991 reforms were a paradigm shift for the Indian economy, moving it from a centrally planned, state-dominated model to a more open, market-oriented one. The key pillars were:</p><p>Liberalization: Reducing government control and regulation.</p><p>Privatization: Increasing the role of the private sector and disinvesting from public sector enterprises.</p><p>Globalization: Integrating the Indian economy with the global economy by reducing tariffs and encouraging foreign investment.</p><p></p>",
    "question_index": 124
  },

      "<span class=\"eqt\">Ashwini Bipin Patil</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2358;&#2381;&#2357;&#2367;&#2344;&#2368; &#2348;&#2367;&#2346;&#2367;&#2344; &#2346;&#2366;&#2335;&#2367;&#2354;</span>",
      "<span class=\"eqt\">Sudhanshu Mittal</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2343;&#2366;&#2306;&#2358;&#2369; &#2350;&#2367;&#2340;&#2381;&#2340;&#2354;</span>"

    "solution": "<p>In a significant development for Indian sports, the Kho Kho Federation of India (KKFI) has announced its newly elected Governing Body after successful elections held at its headquarters in New Delhi.</p><p>Sudhanshu Mittal has been re-elected as the President, while Upkar Singh Virk is the new General Secretary. The Governing Body also includes eight Vice Presidents, four Joint Secretaries, and 13 Executive Members. Athletes Ashwini Bipin Patil and Monika will represent the Athletes Commission.</p><p>Currently played in 58 countries, Kho Kho aims to expand to 90 nations this year.</p>",

    "question": "<span class=\"eqt\"><p>Regarding the Mauryan Empire, consider the following.</p><p>1) The Arthashastra, though ascribed to Kautilya, likely reached its extant form through later compilation; it details espionage and statecraft.</p><p>2) Ashoka appointed Dhamma-Mahamatras to propagate and oversee Dhamma.</p><p>3) The chief Mauryan land tax was known as bali.</p><p>4) Megasthenes describes seven \"classes\" in Indian society in his Indica.</p><p>Which of the above statement is/are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2380;&#2352;&#2381;&#2351; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1) &#2309;&#2352;&#2381;&#2341;&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;, &#2361;&#2366;&#2354;&#2366;&#2306;&#2325;&#2367; &#2325;&#2380;&#2335;&#2367;&#2354;&#2381;&#2351; &#2325;&#2379; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2336;&#2361;&#2352;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;, &#2360;&#2306;&#2349;&#2357;&#2340;&#2307; &#2348;&#2366;&#2342; &#2350;&#2375;&#2306; &#2360;&#2306;&#2325;&#2354;&#2344; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2309;&#2346;&#2344;&#2375; &#2350;&#2380;&#2332;&#2370;&#2342;&#2366; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2361;&#2369;&#2306;&#2330;&#2366;; &#2351;&#2361; &#2332;&#2366;&#2360;&#2370;&#2360;&#2368; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2354;&#2366; &#2325;&#2366; &#2357;&#2367;&#2357;&#2352;&#2339; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2309;&#2358;&#2379;&#2325; &#2344;&#2375; &#2343;&#2350;&#2381;&#2350; &#2325;&#2366; &#2346;&#2381;&#2352;&#2330;&#2366;&#2352; &#2324;&#2352; &#2342;&#2375;&#2326;&#2352;&#2375;&#2326; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2343;&#2350;&#2381;&#2350;-&#2350;&#2361;&#2366;&#2350;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>3) &#2350;&#2369;&#2326;&#2381;&#2351; &#2350;&#2380;&#2352;&#2381;&#2351; &#2349;&#2370;&#2350;&#2367; &#2325;&#2352; &#2325;&#2379; &#2348;&#2354;&#2367; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404;</p><p>4) &#2350;&#2375;&#2327;&#2360;&#2381;&#2341;&#2344;&#2368;&#2332; &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2311;&#2306;&#2337;&#2367;&#2325;&#2366; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2350;&#2366;&#2332; &#2350;&#2375;&#2306; &#2360;&#2366;&#2340; \"&#2357;&#2352;&#2381;&#2327;&#2379;&#2306;\" &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2367;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">1, 2 and 4 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1, 2 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statements 1, 2, and 4 are historically accurate descriptions of Mauryan polity, administration, and society.</p><p>Statement 3 is incorrect because the primary land tax during the Mauryan period was known as bhaga, not bali.</p><p>Explanation of Statements:</p><p>1 is True. The Arthashastra is a seminal treatise on statecraft, economic policy, and military strategy. While tradition ascribes it to Kautilya (also known as Chanakya), the prime minister of Chandragupta Maurya, modern scholarly consensus is that the text, as it exists today, is not the work of a single author from a single period. It was likely compiled and redacted over several centuries, with its final form being reached sometime after the Mauryan period (perhaps around the 2nd-3rd century CE). Nevertheless, its core principles are believed to reflect Mauryan-era statecraft, including its detailed discussion of a sophisticated system of espionage and governance.</p><p>2 is True. In his Major Rock Edict V, Emperor Ashoka explicitly mentions the creation of a new class of officials called the Dhamma-Mahamatras. Their specific duty was to travel throughout the empire to propagate Dhamma (Ashoka's moral and ethical code), attend to the welfare of various religious sects, and ensure that the principles of Dhamma were being followed by the populace and officials alike.</p><p>3 is False. This statement is incorrect. While bali was a type of tribute or tax, the primary and most important land tax during the Mauryan period was the bhaga. It was a share of the agricultural produce collected by the state, typically levied at a rate of one-fourth or one-sixth of the crop. The Samaharta was the chief officer in charge of revenue collection. Bali, in the Mauryan context, was a more general term for tribute or a tax that was not as systematically defined as the bhaga.</p><p>4 is True. Megasthenes, the Greek ambassador of Seleucus Nicator to the court of Chandragupta Maurya, wrote a detailed account of India in his book, the Indica. Although the original work is lost, extensive fragments survive in the writings of later Greek and Roman authors. In one of these fragments, Megasthenes describes the Indian population as being divided into seven distinct \"classes\" or occupational groups: (1) philosophers, (2) farmers, (3) soldiers, (4) herdsmen, (5) artisans, (6) magistrates, and (7) councillors. It is important to note that this was a foreigner's observation and does not perfectly align with the indigenous four-fold varna system (Brahmin, Kshatriya, Vaishya, Shudra).</p><p>Further insights:</p><p>The Mauryan state was highly centralized, and the Arthashastra provides a theoretical blueprint for such a state, with a vast bureaucracy, a standing army, and an extensive network of spies.</p><p>Ashoka's Dhamma was not a new religion but a moral code emphasizing non-violence, respect for elders, tolerance for all sects, and welfare of the people.</p><p>Megasthenes' account in the Indica, despite its limitations and potential misunderstandings of Indian society, remains one of the most important foreign sources for the history of the Mauryan period.</p><p></p>",
    "question_index": 126
  },

    "solution": "<p>In 38th National Games, Haryana's Suruchi Phogat won Gold medal in women's 10 metre air pistol scoring 245.7 points.</p><p>Haryana also bagged silver to secure the top position.</p><p>In rowing, Services secured the gold medal in the men's double sculls, and also claimed the top spot in the men's coxless four sculls event.</p><p>In the women's K-1 slalom event, Andhra Pradesh's Nagidi Gayatri put on a spectacular show, winning the gold medal and proving her mettle.</p><p>Uttarakhand delivered an outstanding performance in lawn bowls. In the Under-25 Boys category, Uttarakhand defeated Assam 21-20 to clinch the gold medal.</p><p>In the compound men's team archery event, Delhi won gold, Haryana took silver.</p>",

    "question": "<span class=\"eqt\"><p>Regarding tropical cyclones in the North Indian Ocean, consider the following:</p><p>1) The Bay of Bengal sees more cyclones than the Arabian Sea due to higher sea-surface temperatures and stronger stratification.</p><p>2) October-November is generally the most active cyclone season for India's east coast.</p><p>3) Landfalling cyclones are more frequent and intense on the west coast than on the east coast.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2361;&#2367;&#2306;&#2342; &#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352; &#2350;&#2375;&#2306; &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2330;&#2325;&#2381;&#2352;&#2357;&#2366;&#2340;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2368; &#2326;&#2366;&#2337;&#2364;&#2368; &#2350;&#2375;&#2306; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2325;&#2368; &#2360;&#2340;&#2361; &#2325;&#2375; &#2313;&#2330;&#2381;&#2330; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2324;&#2352; &#2350;&#2332;&#2348;&#2370;&#2340; &#2360;&#2381;&#2340;&#2352;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2309;&#2352;&#2348; &#2360;&#2366;&#2327;&#2352; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325; &#2330;&#2325;&#2381;&#2352;&#2357;&#2366;&#2340; &#2310;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;-&#2344;&#2357;&#2306;&#2348;&#2352; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2340;&#2335; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2348;&#2360;&#2375; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2330;&#2325;&#2381;&#2352;&#2357;&#2366;&#2340; &#2325;&#2366; &#2350;&#2380;&#2360;&#2350; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2340;&#2335; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2340;&#2335; &#2346;&#2352; &#2349;&#2370;&#2360;&#2381;&#2326;&#2354;&#2344; &#2357;&#2366;&#2354;&#2375; &#2330;&#2325;&#2381;&#2352;&#2357;&#2366;&#2340; &#2309;&#2343;&#2367;&#2325; &#2354;&#2327;&#2366;&#2340;&#2366;&#2352; &#2324;&#2352; &#2340;&#2368;&#2357;&#2381;&#2352; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [

    ],
    "correct_option_id": 1,
    "solution": "<p>Statements 1 and 2 are correct. Statement 3 is incorrect because the east coast is significantly more prone to frequent and intense landfalling cyclones than the west coast. Therefore, the correct option is b.</p><p>Explanation of Statements:</p><p>1) Correct. The Bay of Bengal is a much more active basin for tropical cyclone formation than the Arabian Sea. Climatologically, about four times as many cyclones form in the Bay of Bengal as in the Arabian Sea. The primary reasons for this are the higher sea-surface temperatures in the Bay of Bengal and a greater influx of freshwater from major rivers (Ganga, Brahmaputra, Irrawaddy), which leads to stronger oceanic stratification. This stratification means the warm surface water doesn't easily mix with the cooler, deeper water, keeping the surface layer warm and providing a continuous supply of heat and moisture, which is the fuel for cyclones.</p><p>2) Correct. The North Indian Ocean has two distinct cyclone seasons: a pre-monsoon season (AprilJune) and a post-monsoon season (OctoberDecember). The post-monsoon season, particularly the months of October and November, is the most active and dangerous period for the formation of intense cyclones, especially in the Bay of Bengal. During this time, the southwest monsoon has withdrawn, and the sea surface temperatures are still high, creating ideal conditions for cyclogenesis.</p><p>3) Incorrect. This statement is the opposite of the observed reality. The east coast of India (states like Odisha, Andhra Pradesh, Tamil Nadu, and West Bengal) is far more vulnerable to landfalling cyclones. The majority of cyclones that form in the Bay of Bengal tend to move west or northwest and make landfall on the east coast. Cyclones forming in the Arabian Sea are less frequent, and many of them tend to move west-northwest, away from the Indian west coast, towards the Arabian Peninsula or dissipate over the sea. Consequently, the frequency and intensity of landfalling cyclones are much higher on the east coast.</p><p>Further insights:</p><p>The shape of the Bay of Bengal (a semi-enclosed basin) also contributes to making cyclones more destructive. The funneling effect can cause higher storm surges when cyclones make landfall.</p><p>While the Arabian Sea is generally less active, recent trends suggest a possible increase in the frequency and intensity of cyclones in this basin, which scientists have linked to rising sea surface temperatures due to climate change.</p><p></p>",
    "question_index": 128
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about the Godavari river system:</p><p>1) The Godavari originates near Trimbakeshwar in Maharashtra.</p><p>2) Pranhita, formed by the confluence of Wardha and Wainganga, is a major left-bank tributary.</p><p>3) Manjira and Pravara are right-bank tributaries of the Godavari.</p><p>Which of the statements given above are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368; &#2344;&#2342;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368; &#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2350;&#2375;&#2306; &#2340;&#2381;&#2352;&#2381;&#2351;&#2306;&#2348;&#2325;&#2375;&#2358;&#2381;&#2357;&#2352; &#2325;&#2375; &#2346;&#2366;&#2360; &#2360;&#2375; &#2344;&#2367;&#2325;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2357;&#2352;&#2381;&#2343;&#2366; &#2324;&#2352; &#2357;&#2376;&#2344;&#2327;&#2306;&#2327;&#2366; &#2325;&#2375; &#2360;&#2306;&#2327;&#2350; &#2360;&#2375; &#2348;&#2344;&#2368; &#2346;&#2381;&#2352;&#2366;&#2339;&#2361;&#2367;&#2340;&#2366;, &#2319;&#2325; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2348;&#2366;&#2319;&#2306; &#2325;&#2367;&#2344;&#2366;&#2352;&#2375; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2368; &#2361;&#2376;&#2404;</p><p>3) &#2350;&#2306;&#2332;&#2368;&#2352;&#2366; &#2324;&#2352; &#2346;&#2381;&#2352;&#2357;&#2352; &#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368; &#2325;&#2368; &#2342;&#2366;&#2361;&#2367;&#2344;&#2375; &#2325;&#2367;&#2344;&#2366;&#2352;&#2375; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2367;&#2351;&#2366;&#2305; &#2361;&#2376;&#2306;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All three statements are correct. They accurately describe the origin of the Godavari river and identify its key left-bank and right-bank tributaries.</p><p>Explanation of Statements:</p><p>1 is Correct. The Godavari, the largest river system in Peninsular India, originates from the Brahmagiri hills near Trimbakeshwar in the Nashik district of Maharashtra. It flows eastward for about 1,465 kilometers before draining into the Bay of Bengal.</p><p>2 is Correct. The Pranhita is the largest tributary of the Godavari by discharge volume. It is a left-bank tributary, joining the Godavari from the north. The Pranhita itself is a combined flow of three rivers: the Wardha, the Wainganga, and the Penganga. The Wardha and Wainganga are the main streams that form it.</p><p>3 is Correct. The Manjira and Pravara are both significant tributaries that join the Godavari from the south. As the Godavari flows from west to east, tributaries joining from the south are right-bank tributaries. The Manjira is the longest tributary of the Godavari, while the Pravara is another important one that joins it in Maharashtra.</p><p>Further insights:</p><p>The Godavari is often referred to as the Dakshina Ganga (the Ganga of the South) due to its large size and extent.</p><p>Its river basin is one of the largest in India, covering parts of Maharashtra, Telangana, Andhra Pradesh, Chhattisgarh, and Odisha.</p><p>Other major left-bank tributaries include the Purna, Indravati, and Sabari.</p><p>The Godavari forms a large and fertile delta before emptying into the Bay of Bengal. The Godavari delta, along with the Krishna delta, is known as the \"Rice Bowl of South India.\"</p><p></p>",
    "question_index": 129
  },

    "solution": "<p><b>Vivaldi </b>is a freeware, cross-platform web browser developed by Vivaldi Technologies.</p><p>Ubuntu is the modern, open-source operating system on Linux for the enterprise server, desktop, cloud, and IoT.</p><p>Windows is a group of several proprietary graphical operating system families, all of which are developed and marketed by Microsoft.</p><p>Android is a mobile operating system based on a modified version of the Linux kernel and other open-source software.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following hardware was not used in the fourth generation of computers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2380;&#2341;&#2368; &#2346;&#2368;&#2338;&#2364;&#2368; &#2325;&#2375; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Integrated Circuits with VLSI technology</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2368;&#2319;&#2354;&#2319;&#2360;&#2310;&#2312; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2325;&#2375; &#2360;&#2366;&#2341; &#2311;&#2306;&#2335;&#2368;&#2327;&#2381;&#2352;&#2375;&#2335;&#2375;&#2337; &#2360;&#2352;&#2381;&#2325;&#2367;&#2335;</span>",
      "<span class=\"eqt\">Semiconductor memory</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2350;&#2368;&#2325;&#2306;&#2337;&#2325;&#2381;&#2335;&#2352; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Vacuum Tubes</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2376;&#2325;&#2381;&#2351;&#2370;&#2350; &#2335;&#2381;&#2351;&#2370;&#2348;</span>",
      "<span class=\"eqt\">Magnetic tapes and Floppy</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2327;&#2381;&#2344;&#2375;&#2335;&#2367;&#2325; &#2335;&#2375;&#2346; &#2324;&#2352; &#2347;&#2381;&#2354;&#2377;&#2346;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Hardware used in the fourth generation of computers were &#8722;</p><p>&#183; Integrated Circuits with Very Large-Scale Integration (VLSI) technology</p><p>&#183; Semiconductor memory</p><p>&#183; Magnetic tapes and Floppy</p><p>Vacuum tubes, on the other hand, were primarily used in the first and second generations of computers (1940s to early 1960s). They were replaced by transistors and then MOSFETs (Metal-Oxide-Semiconductor Field-Effect Transistors) in subsequent generations due to their large size, heat generation, and power consumption. Therefore, vacuum tubes were not used in the fourth generation of computers, making option C the correct answer.</p>",

    "question": "<span class=\"eqt\"><p>Windows XP is an operating system introduced in 2001 from Microsoft's Windows family. What does \"XP\" stand for?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2306;&#2337;&#2379;&#2332; XP &#2319;&#2325; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; 2001 &#2350;&#2375;&#2306; &#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2360;&#2377;&#2347;&#2381;&#2335; &#2325;&#2375; &#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2360;&#2375; &#2346;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404; \"XP\" &#2325;&#2366; &#2346;&#2370;&#2352;&#2381;&#2339; &#2352;&#2370;&#2346; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>Windows XP is an operating system introduced in 2001 from Microsoft's Windows family of operating systems, the previous version of Windows being Windows Me. The \"XP\" in Windows XP stands for <b>eXPerience</b>. Microsoft called the XP release its most important product since Windows 95.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>I. The Drafts folder stores unsent or incomplete emails.</p><p>II. The Outbox temporarily holds emails waiting to be sent.</p><p>III. The Spam or Junk folder stores legitimate messages that are archived.</p><p>Which statement(s) is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2337;&#2381;&#2352;&#2366;&#2347;&#2381;&#2335; &#2347;&#2364;&#2379;&#2354;&#2381;&#2337;&#2352;, &#2344; &#2349;&#2375;&#2332;&#2375; &#2327;&#2319; &#2351;&#2366; &#2309;&#2343;&#2370;&#2352;&#2375; &#2312;&#2350;&#2375;&#2354; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2310;&#2313;&#2335;&#2348;&#2377;&#2325;&#2381;&#2360;, &#2349;&#2375;&#2332;&#2375; &#2332;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325;&#2381;&#2359;&#2366;&#2352;&#2340; &#2312;&#2350;&#2375;&#2354; &#2325;&#2379; &#2309;&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2360;&#2381;&#2346;&#2376;&#2350; &#2351;&#2366; &#2332;&#2306;&#2325; &#2347;&#2364;&#2379;&#2354;&#2381;&#2337;&#2352;, &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2357;&#2376;&#2343; &#2360;&#2306;&#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II, and III</span><span class=\"hqt\" style=\"display:none\">I, II, &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements I and II are correct, while statement III is incorrect.</p><p>The Drafts and Outbox folders are correctly described as holding areas for unsent and waiting-to-be-sent emails, respectively.</p><p>The Spam folder, however, is for unsolicited or junk mail, not for archived legitimate messages. Therefore, the correct option is a.</p><p>Explanation of Statements:</p><p>Statement I is correct. The Drafts folder is a storage area for emails that you have started composing but have not yet sent. If you save an email without sending it, or if your email client auto-saves your work, it is stored in the Drafts folder so you can return to finish and send it later.</p><p>Statement II is correct. The Outbox is a temporary holding folder for emails that you have clicked \"Send\" on but have not yet been successfully delivered to your outgoing mail server. This often happens if you are working offline or have a poor internet connection. Once the email is successfully sent, it is moved from the Outbox to the \"Sent Items\" folder.</p><p>Statement III is incorrect. This statement misrepresents the purpose of the Spam folder. The Spam or Junk folder is where your email provider automatically filters messages that it identifies as unsolicited, unwanted, or potentially malicious. The function described - storing legitimate messages -is known as Archiving. An Archive folder is used to save important emails that you want to keep but remove from your main inbox to reduce clutter.</p><p>Further insights:</p><p>Sent Items: This folder contains a copy of every email that has been successfully sent.</p><p>Trash/Deleted Items: When you delete an email, it is moved to this folder, where it stays for a certain period before being permanently deleted.</p><p>It's a good practice to periodically check your Spam/Junk folder, as automated filters can sometimes make a mistake and incorrectly flag a legitimate email as spam (this is called a \"false positive\").</p><p></p>",
    "question_index": 134
  },
