  {
    "question": "<span class=\"eqt\"><p>&#916; STU is a right-angled triangle, right angle at T. If cot U = 12/5, then find the value of cos U + sin U + cos S.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#916; STU &#2319;&#2325; &#2360;&#2350;&#2325;&#2379;&#2339; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2361;&#2376; &#2332;&#2379; T &#2346;&#2352; &#2360;&#2350;&#2325;&#2379;&#2339; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; cot U = 12/5 &#2361;&#2376;, &#2340;&#2379; cos U + sin U + cos S &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">23/12</span><span class=\"hqt\" style=\"display:none\">23/12</span>",
      "<span class=\"eqt\">22/13</span><span class=\"hqt\" style=\"display:none\">22/13</span>",
      "<span class=\"eqt\">23/5</span><span class=\"hqt\" style=\"display:none\">23/5</span>",
      "<span class=\"eqt\">21/13</span><span class=\"hqt\" style=\"display:none\">21/13</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=170 height=173 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20923/image048.png\" ></p><p>By Pythagoras theorem,</p><p>SU = &radic; (144 + 25) = 13</p><p>Now,</p><p>Cos U + sin U + cos S</p><p>= (12/13) + (5/13) + (5/13)</p><p>= 22/13</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A solid cube is melted and recast into 9 small spheres each of radius 1 cm. What is the length of the edge of the cube?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2336;&#2379;&#2360; &#2328;&#2344; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2325;&#2352; 9 &#2331;&#2379;&#2335;&#2375; &#2327;&#2379;&#2354;&#2375; &#2348;&#2344;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 1 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2328;&#2344; &#2325;&#2375; &#2325;&#2367;&#2344;&#2366;&#2352;&#2375; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">(8&#960;)<sup>(1/3) </sup>cm</span><span class=\"hqt\" style=\"display:none\">(8&#960;)<sup>(1/3) </sup>&#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">(16&#960;)<sup>(1/3) </sup>cm</span><span class=\"hqt\" style=\"display:none\">(16&#960;)<sup>(1/3) </sup>&#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">(9&#960;)<sup>(1/3) </sup>cm</span><span class=\"hqt\" style=\"display:none\">(9&#960;)<sup>(1/3) </sup>&#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">(12&#960;)<sup>(1/3) </sup>cm</span><span class=\"hqt\" style=\"display:none\">(12&#960;)<sup>(1/3) </sup>&#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let s = edge length of the cube.</p><p>Volume of cube V_cube = s<sup>3</sup></p><p>Each small sphere has radius r = 1 cm.</p><p>Volume of one sphere V_s = (4/3)&#960; r<sup>3</sup> = (4/3)&#960;.</p><p>Volume of 9 spheres = 9  X  (4/3)&#960; = 12&#960;.</p><p>Set volumes equal:</p><p>s<sup>3</sup> = 12&#960;</p><p>s = (12&#960;)<sup>(1/3) </sup>cm.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In an equilateral triangle XYZ, XP is perpendicular to side YZ. If coordinates of Y and Z are (7,6) and (-3, -2) respectively, then what are the coordinates of point P?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; XYZ &#2350;&#2375;&#2306; , &#2349;&#2369;&#2332;&#2366; YZ, XP &#2346;&#2352; &#2354;&#2350;&#2381;&#2348; &#2361;&#2376; | &#2351;&#2342;&#2367; Y &#2324;&#2352; Z &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2366;&#2306;&#2325; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; (7,6) &#2324;&#2352; (-3, -2) &#2361;&#2376;, &#2340;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; P &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2366;&#2306;&#2325; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; ?</p></span>",
    "options": [
      "<span class=\"eqt\">(2,3).</span><span class=\"hqt\" style=\"display:none\">(2,3)</span>",
      "<span class=\"eqt\">(2,2).</span><span class=\"hqt\" style=\"display:none\">(2,2)</span>",
      "<span class=\"eqt\">(2,4).</span><span class=\"hqt\" style=\"display:none\">(2,4)</span>",
      "<span class=\"eqt\">(2,5).</span><span class=\"hqt\" style=\"display:none\">(2,5)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>As XP is perpendicular to the side YZ, so P is the mid-point of side YZ.</p><p>According to the mid-point formula coordinates of P = (((7 +(-3))/2), ((6 +(-2))/2))</p><p>= (2,2).</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>With a certain uniform speed, a car can cover a certain distance in a certain time. By increasing the speed by 18 kmph, the distance can be covered in 12 hours. By increasing the speed by 36 kmph, the distance can be covered in 10 hours. What is the distance?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2350;&#2366;&#2344; &#2327;&#2340;&#2367; &#2360;&#2375;, &#2319;&#2325; &#2325;&#2366;&#2352; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2370;&#2352;&#2368; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2327;&#2340;&#2367; 18 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366; &#2348;&#2338;&#2364;&#2366;&#2325;&#2352;, &#2351;&#2361; &#2342;&#2370;&#2352;&#2368; 12 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2368; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2327;&#2340;&#2367; 36 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366; &#2348;&#2338;&#2364;&#2366;&#2325;&#2352;, &#2351;&#2361; &#2342;&#2370;&#2352;&#2368; 10 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2368; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">800 km</span><span class=\"hqt\" style=\"display:none\">800 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">960 km</span><span class=\"hqt\" style=\"display:none\">960 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">1080 km</span><span class=\"hqt\" style=\"display:none\">1080 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">1200 km</span><span class=\"hqt\" style=\"display:none\">1200 &#2325;&#2367;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let 'v' kmph be the uniform speed.</p><p>Given that</p><p>10(v + 36) = 12(v + 18)</p><p>v = 72.</p><p>Distance = 12(72 + 18) = 1080 km.</p><p>Hence the correct option is (3).</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A candle of height 27 cm is kept on a table vertically. Angle of depression from its top is 45&deg; creating a shadow on the table. If the candle melts 0.5 cm every minute, then the angle of depression from its top after 6 minutes is 30&deg;, creating a shadow on the table. Find the difference in the length of the shadows cast by the candle on the table before and after melting.</p></span><span class=\"hqt\" style=\"display:none\"><p>27 &#2360;&#2375;&#2350;&#2368; &#2314;&#2305;&#2330;&#2368; &#2319;&#2325; &#2350;&#2379;&#2350;&#2348;&#2340;&#2381;&#2340;&#2368; &#2319;&#2325; &#2350;&#2375;&#2332;&#2364; &#2346;&#2352; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2352;&#2326;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2360;&#2375; &#2309;&#2357;&#2344;&#2350;&#2344; &#2325;&#2379;&#2339; 45&deg; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2350;&#2375;&#2332;&#2364; &#2346;&#2352; &#2319;&#2325; &#2331;&#2366;&#2351;&#2366; &#2348;&#2344; &#2352;&#2361;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2350;&#2379;&#2350;&#2348;&#2340;&#2381;&#2340;&#2368; &#2361;&#2352; &#2350;&#2367;&#2344;&#2335; 0.5 &#2360;&#2375;&#2350;&#2368; &#2346;&#2367;&#2328;&#2354;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; 6 &#2350;&#2367;&#2344;&#2335; &#2348;&#2366;&#2342; &#2311;&#2360;&#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2360;&#2375; &#2309;&#2357;&#2344;&#2350;&#2344; &#2325;&#2379;&#2339; 30&deg; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2350;&#2375;&#2332;&#2364; &#2346;&#2352; &#2319;&#2325; &#2331;&#2366;&#2351;&#2366; &#2348;&#2344; &#2352;&#2361;&#2368; &#2361;&#2376;&#2404; &#2346;&#2367;&#2328;&#2354;&#2344;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2324;&#2352; &#2348;&#2366;&#2342; &#2350;&#2375;&#2306; &#2350;&#2375;&#2332;&#2364; &#2346;&#2352; &#2350;&#2379;&#2350;&#2348;&#2340;&#2381;&#2340;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2337;&#2366;&#2354;&#2368; &#2327;&#2312; &#2331;&#2366;&#2351;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;3 (9&radic;3 + 8)</span><span class=\"hqt\" style=\"display:none\">&radic;3 (9&radic;3 + 8)</span>",
      "<span class=\"eqt\">3 (9&radic;3 - 8)</span><span class=\"hqt\" style=\"display:none\">3 (9&radic;3 - 8)</span>",
      "<span class=\"eqt\">3 (9&radic;3 + 8)</span><span class=\"hqt\" style=\"display:none\">3 (9&radic;3 + 8)</span>",
      "<span class=\"eqt\">&radic;3 (9&radic;3 - 8)</span><span class=\"hqt\" style=\"display:none\">&radic;3 (9&radic;3 - 8)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>According to the Question,</p><p>Before melting:</p><p>Height of the candle = 27 cm</p><p>Angle of elevation = 45&deg;</p><p>Let the length of the shadow be S</p><p><img width=209 height=173 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18188/image002.png\"></p><p>In the figure above, AB is the candle and is Perpendicular of a right-angled triangle</p><p>BC is Shadow of candle and is Base of a right-angled triangle</p><p>AC is hypotenuse</p><p>&#8736; ACB = 180  -  (90+45) = 45&deg; [Sum of all the angles in a triangle is 180&deg;]</p><p>Now, tan 45&deg; = Perpendicular/ Base = AB/BC</p><p>1 = 27/BC</p><p>BC = 27 cm = S</p><p>After melting for 6 minutes:</p><p>Height of the candle = 27cm  -  (6 x 0.5cm) = 24cm [&#8757; candle melts 0.5 cm every minute]</p><p>Angle of elevation = 30&deg;</p><p>Let the length of the shadow be S'</p><p><img width=215 height=178 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18188/image003.png\"></p><p>In the figure above, A'B is the candle and is Perpendicular of a right-angled triangle</p><p>BC' is shadow of candle and is Base of a right-angled triangle</p><p>A'C' is hypotenuse</p><p>&#8736; A'C'B = 180  -  (90+30) = 60&deg; [Sum of all the angles in a triangle is 180<sup>o</sup>]</p><p>Now, tan 60<sup>o</sup> = Perpendicular/ Base = A'B/BC'</p><p>&radic;3 = 24/BC'</p><p>BC' = 24/&radic;3 cm = S</p><p>Now, the difference in length of the shadows cast by candle on table before and after melting = S-S' = 27  -  24/&radic;3</p><p>= &radic;3 (9&radic;3 - 8) Ans.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Two cars race around a circular track at a constant speed starting from the same point. If they travel in the opposite directions, they meet in every 35 seconds. If they travel in the same direction, they meet in every 3 minutes and 30 seconds. How long would the faster car take to complete one round of the circular track?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2325;&#2366;&#2352;&#2375;&#2306; &#2319;&#2325; &#2361;&#2368; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2325;&#2352; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2335;&#2381;&#2352;&#2376;&#2325; &#2346;&#2352; &#2319;&#2325;&#2360;&#2350;&#2366;&#2344; &#2327;&#2340;&#2367; &#2360;&#2375; &#2342;&#2380;&#2337;&#2364;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2357;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2342;&#2367;&#2358;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2357;&#2375; &#2361;&#2352; 35 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2357;&#2375; &#2319;&#2325; &#2361;&#2368; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2357;&#2375; &#2361;&#2352; 3 &#2350;&#2367;&#2344;&#2335; 30 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2340;&#2375;&#2332;&#2364; &#2325;&#2366;&#2352; &#2325;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2335;&#2381;&#2352;&#2376;&#2325; &#2325;&#2366; &#2319;&#2325; &#2330;&#2325;&#2381;&#2325;&#2352; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">96s</span><span class=\"hqt\" style=\"display:none\">96s</span>",
      "<span class=\"eqt\">84s</span><span class=\"hqt\" style=\"display:none\">84 &#2325;&#2375; &#2342;&#2358;&#2325;</span>",
      "<span class=\"eqt\">60s</span><span class=\"hqt\" style=\"display:none\">60</span>",
      "<span class=\"eqt\">72s</span><span class=\"hqt\" style=\"display:none\">-72 &#2319;&#2360;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>When the cars travel in opposite directions, they meet in 35 seconds for the first time</p><p>So, let us suppose that the fraction of the circle travelled by slower car be f and the fraction of circle travelled by the faster car be k</p><p>So, that f+k=1... (1)</p><p>Now when they travel in same direction, they meet in 210 seconds</p><p>210 = 6 times 35</p><p>So now we see that in 210 seconds the faster car overtakes the slower car by one complete circumference of the circle</p><p>That means in 35 seconds, the faster car has covered 1/6 more distance than the distance covered by the slower car</p><p>=&gt; f-k = 1/6 ... (2)</p><p>=&gt; Solving (1) and (2) we get 2f = 7/6</p><p>=&gt; f = 7/12</p><p>Hence, distance covered by the faster car in 35 seconds is 7/12th of the circle</p><p>Solving by unitary method, we get that time taken by the faster car to complete one round = <b>60 seconds</b></p>",
    "question_index": 5
  },

    "question": "<span class=\"eqt\"><p>Find the equation of a line passing through the point (-2, 6) and parallel to the line y = -4x + 1.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2367;&#2306;&#2342;&#2369; (-2, 6) &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2324;&#2352; &#2352;&#2375;&#2326;&#2366; y = -4x + 1 &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2381;&#2340;&#2352; &#2352;&#2375;&#2326;&#2366; &#2325;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">y = -4x - 2</span><span class=\"hqt\" style=\"display:none\">y = -4x - 2</span>",
      "<span class=\"eqt\">y = -4x + 2</span><span class=\"hqt\" style=\"display:none\">y = -4x + 2</span>",
      "<span class=\"eqt\">y = 4x - 2</span><span class=\"hqt\" style=\"display:none\">y = 4x - 2</span>",
      "<span class=\"eqt\">y = 4x + 2</span><span class=\"hqt\" style=\"display:none\">y = 4x + 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The slope of the given line y = -4x + 1 is -4.</p><p>Since the required line is parallel to it, its slope will also be -4.</p><p></p><p>Using the point-slope form of the line:</p><p>y - y&#8321; = m(x - x&#8321;)</p><p></p><p>Substituting x&#8321; = -2, y&#8321; = 6, and m = -4, we get</p><p>y - 6 = -4(x - (-2))</p><p>y - 6 = -4(x + 2)</p><p>y - 6 = -4x - 8</p><p>y = -4x - 2</p>",
    "question_index": 16
  },

    "question": "<span class=\"eqt\"><p>A rectangular wooden frame has dimensions 84 cm by 64 cm. It surrounds a rectangular poster placed inside it, leaving a uniform width of w cm of the frame on all sides. If the area of the frame (only the border) is 1632 cm<sup>2</sup>, what is the value of w?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2354;&#2325;&#2337;&#2364;&#2368; &#2325;&#2375; &#2347;&#2381;&#2352;&#2375;&#2350; &#2325;&#2366; &#2350;&#2366;&#2346; 84 &#2360;&#2375;&#2350;&#2368; x 64 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2361; &#2309;&#2346;&#2344;&#2375; &#2309;&#2306;&#2342;&#2352; &#2352;&#2326;&#2375; &#2319;&#2325; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2346;&#2379;&#2360;&#2381;&#2335;&#2352; &#2325;&#2379; &#2328;&#2375;&#2352;&#2375; &#2361;&#2369;&#2319; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2347;&#2381;&#2352;&#2375;&#2350; &#2325;&#2368; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; w &#2360;&#2375;&#2350;&#2368; &#2325;&#2368; &#2319;&#2325; &#2360;&#2350;&#2366;&#2344; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2348;&#2344;&#2368; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2347;&#2381;&#2352;&#2375;&#2350; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (&#2325;&#2375;&#2357;&#2354; &#2348;&#2377;&#2352;&#2381;&#2337;&#2352;) 1632 &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2361;&#2376;, &#2340;&#2379; w &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>It is given that,</p><p>Five friends P, Q, R, S and T were born in consecutive years starting from 2001.</p><p>Statement I,</p><p>P was born in an even numbered year. Only two friends were born between S and P. T was born immediately after P.</p><p>We get,</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b> </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Case 1</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Case 2</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Year</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Name</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Name</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2001</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R/Q</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2002</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R/Q</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2003</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R/Q</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2004</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R/Q</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2005</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td></tr></table><p>We do not have further infor     "question": "<span class=\"eqt\"><p>You have a job that pays you well and you like your job but your boss has very different religious and political ideologies. Which of the following should be done by you?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2346; &#2319;&#2325; &#2344;&#2380;&#2325;&#2352;&#2368; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2379; &#2310;&#2346;&#2325;&#2379; &#2309;&#2330;&#2381;&#2331;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2310;&#2346;&#2325;&#2379; &#2309;&#2346;&#2344;&#2368; &#2344;&#2380;&#2325;&#2352;&#2368; &#2346;&#2360;&#2306;&#2342; &#2361;&#2376;&#2306; &#2354;&#2375;&#2325;&#2367;&#2344; &#2310;&#2346;&#2325;&#2375; &#2348;&#2377;&#2360; &#2325;&#2368; &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2324;&#2352; &#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2357;&#2367;&#2330;&#2366;&#2352;&#2343;&#2366;&#2352;&#2366;&#2319;&#2306; &#2348;&#2361;&#2369;&#2340; &#2309;&#2354;&#2327; &#2361;&#2376;&#2306;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2310;&#2346;&#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">You should start searching for another job</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2346;&#2325;&#2379; &#2342;&#2370;&#2360;&#2352;&#2368; &#2344;&#2380;&#2325;&#2352;&#2368; &#2325;&#2368; &#2340;&#2354;&#2366;&#2358; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352; &#2342;&#2375;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;</span>",
      "<span class=\"eqt\">You decide to turn a deaf ear to whatever your boss says</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2346; &#2309;&#2346;&#2344;&#2375; &#2348;&#2377;&#2360; &#2325;&#2368; &#2361;&#2352; &#2348;&#2366;&#2340; &#2346;&#2352; &#2343;&#2381;&#2351;&#2366;&#2344; &#2344; &#2342;&#2375;&#2344;&#2375; &#2325;&#2366; &#2347;&#2376;&#2360;&#2354;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">You agree with his ideologies as you do not want to lose your job</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2346; &#2313;&#2344;&#2325;&#2368; &#2357;&#2367;&#2330;&#2366;&#2352;&#2343;&#2366;&#2352;&#2366;&#2323;&#2306; &#2360;&#2375; &#2360;&#2361;&#2350;&#2340; &#2361;&#2376;&#2306; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2310;&#2346; &#2309;&#2346;&#2344;&#2368; &#2344;&#2380;&#2325;&#2352;&#2368; &#2344;&#2361;&#2368;&#2306; &#2326;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">You do not take it personally and respect their right to opinion</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2346; &#2311;&#2360;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2361;&#2368;&#2306; &#2354;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2366; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Everyone has different viewpoints. Our constitution gives us the freedom of speech and the right to have opinions as long as they do not cause harm to others. Just because a friend, relative, boss or an acquaintance has different ideologies, does not mean that we should take it personally. Hence, in this case too, you should keep your ideologies aside, respect your boss's right to opinion and carry on with your job without getting affected by other's religious and political ideologies.</p>",

    "question": "<p>The figure of speech used in \"The vehicle of my dreams, which I use for daily transportation, unfortunately met with an accident\" is:</p>",
    "options": [

      "Circumlocution",
      "Irony",
      "Antithesis"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct answer is option (b) Circumlocution.</p><p>Circumlocution is a figure of speech in which an idea is expressed in a roundabout or indirect manner, using more words than necessary to convey a simple point. In this sentence, instead of directly saying \"My car met with an accident,\" the speaker uses an elaborate description  -  \"The vehicle of my dreams, which I use for daily transportation, unfortunately met with an accident.\" This indirect phrasing exemplifies circumlocution.</p><p>Euphemism (option a) softens an unpleasant or harsh truth (e.g., \"passed away\" for \"died\"), which is not the purpose here.</p><p>Irony (option c) involves saying the opposite of what one means or highlighting an unexpected contrast between expectation and reality, which is not present.</p><p>Antithesis (option d) contrasts two opposing ideas in a single sentence (e.g., \"Many are called, but few are chosen\"), which does not occur here.</p>",
    "question_index": 60

    "question": "<p>Convert the sentence provided below from its active voice structure to a passive voice structure:</p><p>The manager is to announce the final decision regarding the new marketing strategy during the upcoming team meeting on Friday afternoon.</p>",
    "options": [
      "The final decision regarding the new marketing strategy will be announced by the manager during the upcoming team meeting on Friday afternoon.",

      "The final decision regarding the new marketing strategy should be announced by the manager during the upcoming team meeting on Friday afternoon."
    ],
    "correct_option_id": 2,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of verb ['be'] is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The question in Active voice is in <b>Infinitive form (to + V1 form)</b>.</p><p>The format in Active voice is: Subject + am/is/are/was/were + to + V1 + object</p><p>Thus, the format in Passive voice will be: Object of the active voice (Subjective case) + am/is/are/was/were + to + be + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>You are to help her (Active)</p><p>She is to be helped by you. (Passive)</p><p>The options except (c) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is option (c): The final decision regarding the new marketing strategy is to be announced by the manager during the upcoming team meeting on Friday afternoon.</p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 61
  },

    "question": "<p>Convert the sentence provided below from its passive voice structure to an active voice structure:</p><p>Had the formal invitations for the international science symposium been dispatched to all the esteemed speakers by the event committee?</p>",

    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the \"to be\" verb ['been'] and the preposition \"by\" is necessary while changing the voice of the sentence from Passive to Active.</p><p>In Active voice, it should be an interrogative sentence. The answer to this question will be either \"yes\" or \"no\".</p><p>These types of sentences usually begin with a helping verb like: <b>have, has, had.</b></p><p>In Passive voice, the format is: Have/Has/Had + Object of the Active voice (Subjective case) + been + V3 + by + Subject of the Active voice (Objective case).</p><p>Thus, the format such a sentence in Active voice is: Have/Has/Had + Subject + V3 + Object?</p><p>For example:</p><p>Had the letter been written by Rohit? (Passive)</p><p>Had Rohit written the letter? (Active)</p><p>The options except (b) don't follow the correct grammatical format of the Active Voice.</p><p>Thus, the correct answer is option (b): Had the event committee dispatched the formal invitations for the international science symposium to all the esteemed speakers?</p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",

    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>The old woman said that her daughter visited the orphanage every Sunday to teach the children new skills.</p>",

    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence in the Indirect Speech is in <b>Simple Past Tense</b>. Therefore, the sentence in the Direct Speech will be in <b>Simple Present Tense</b>.</p><p>Simple Past (Subject + V2 + Object) will be converted into Simple Present (Subject + V1 + Object).</p><p>For example:</p><p>He said that he never went to the village. (Indirect Speech)</p><p>He said, \"I never go to the village.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>'Said that' is changed into 'said'.</p><p>'Her daughter' is changed into 'My daughter'.</p><p>'visited' is changed into 'visits'.</p><p>Also, inverted commas (\"...\") are placed in direct speech.</p><p>Therefore, the correct answer is: The old woman said, \"My daughter visits the orphanage every Sunday to teach the children new skills.\"</p><p>Hence, (b) is the correct answer.</p>",

    "comp": "<p><b>Directions :</b>Read the following passage and answer the questions based on the passage. </p><p>The \"hard problem\" of consciousness, a term popularised by philosopher David Chalmers in the 1990s, addresses one of the most profound puzzles in philosophy of mind: why and how physical processes in the brain give rise to subjective experiences, what philosophers call qualia. Qualia refer to the felt qualities of experience: the redness of a rose, the sweetness of sugar, or the ache of longing. While neuroscience has made remarkable progress in mapping the brain's neural activity, it remains unable to explain why such activity should be accompanied by an inner, first-person awareness. This unbridgeable gap between objective mechanisms and subjective feelings is what Chalmers identified as the \"hard problem.\"</p><p>The \"easy problems\" of consciousness, such as perception, memory, and attention, can be approached through empirical methods. They concern the functional and behavioural aspects of the mind, which can, in principle, be explained in physical terms. The hard problem, however, asks a fundamentally different question: why should processing information feel like anything at all? For instance, scientists can trace how light of a certain wavelength activates neurons in the visual cortex, but that does not reveal why this results in the sensation of seeing red. Likewise, even if an artificial intelligence could replicate human responses perfectly, we would still wonder whether it genuinely experiences or merely simulates consciousness.</p><p>Philosophers remain deeply divided over how or whether the problem can be solved. Reductionists like Daniel Dennett argue that the hard problem arises from a misunderstanding of consciousness and that once the brain's functions are fully explained, the illusion of qualia will vanish. Others, such as panpsychists, claim that consciousness is a basic feature of the universe, present even in the smallest particles of matter. The persistence of the hard problem reveals not only the limits of current scientific understanding but also the enduring mystery of what it means to be aware. It compels us to confront the possibility that consciousness might never be fully explained within the existing framework of material science.</p>",

    "solution": "<p><b>Hyperbole</b> is a figure of speech that uses extreme and deliberate exaggeration for emphasis or effect. It is not meant to be taken literally.</p><p>a) He is as strong as an ox: This is a simile, a comparison using \"as.\" While it is also an exaggeration, its primary grammatical structure is a simile.</p><p>b) This bag weighs a ton: This is a perfect example of hyperbole. The speaker does not literally mean the bag weighs 2,000 pounds. They are using this extreme exaggeration to emphasize that the bag is very heavy.</p><p>c) The branches danced in the wind: This is personification. The inanimate branches are given the human quality of dancing.</p><p>d) The comedian was seriously funny: This is an oxymoron, a figure of speech where two contradictory terms (\"seriously\" and \"funny\") are used together for effect.</p><p>Hence, option (b) is the correct answer. </p>",

    "question": "<p>Choose the correct indirect speech form of the following sentence:</p><p>The diligent student said to his friend, \"By the time the professor arrives tomorrow, I will have completed the entire research paper and prepared the presentation slides.\"</p>",
    "options": [
      "The diligent student told his friend that by the time the professor arrived the next day, he would have completed the entire research paper and prepared the presentation slides.",
      "The diligent student told his friend that by the time the professor arrives the next day, he will have completed the entire research paper and prepared the presentation slides.",
      "The diligent student told his friend that by the time the professor arrived the next day, he would complete the entire research paper and prepare the presentation slides.",
      "The diligent student said to his friend that by the time the professor had arrived the next day, he would have been completing the entire research paper."
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence in the Direct Speech is in <b>Future Perfect Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Perfect Conditional Tense</b>.</p><p>Future Perfect tense (Subject + will/shall + have + V3 + Object) should be converted into Perfect Conditional (Subject + would/should + have + V3 + Object).</p><p>For example:</p><p>He said, \"I will have worked in this company.\" (Direct Speech)</p><p>He said that he would have worked in that company. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; <b>said to</b> changes to <b>told</b>.</p><p>&#183; <b>Arrives</b> [Simple present] changes to <b>arrived</b> [Simple Past].</p><p>&#183; <b>tomorrow</b> changes to <b>the next day</b>.</p><p>&#183; <b>I </b>changes to <b>he</b>.</p><p>&#183; <b>will have completed</b> changes to <b>would have completed</b>.</p><p>Therefore, the correct answer is: \"The diligent student told his friend that by the time the professor arrived the next day, he would have completed the entire research paper and prepared the presentation slides.\"</p><p>Hence, option (a) is correct.</p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",

    "question": "<p>Convert the sentence provided below from its passive voice structure to an active voice structure:</p><p>The fragile ecosystem of the national park, which is home to several endangered species, should be protected from human encroachment by the forest department.</p>",

    ],
    "correct_option_id": 2,
    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the \"to be\" verb [\"be\" here] and the preposition \"by\" is necessary while changing the voice of the sentence from Passive to Active.</p><p>These types of questions contain <b>Modal verbs</b> and they should be used correctly as stated below.</p><p>Some of the modal verbs are: <b>Can, could, may, might, shall, should, will, would, must, ought to.</b></p><p>In Passive voice, the format is: Object of the Active voice (Subjective case) + Modal + be + V3 + by + Subject of the Active voice (Objective case).</p><p>Thus, the format of such a sentence in the Active voice is: Subject + Modal + V1 + Object.</p><p>For example:</p><p>This can be done by you. (Passive Voice)</p><p>You can do this. (Active Voice)</p><p>The options except (c) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is option (c): The forest department should protect the fragile ecosystem of the national park, which is home to several endangered species, from human encroachment.</p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about Elasticity of Demand:</p><p>I. Elasticity of demand measures the responsiveness of quantity demanded to a change in price.</p><p>II. If demand is inelastic, a large change in price causes only a small change in quantity demanded.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2306;&#2327; &#2325;&#2368; &#2354;&#2379;&#2330; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2350;&#2366;&#2306;&#2327; &#2325;&#2368; &#2354;&#2379;&#2330; &#2325;&#2368;&#2350;&#2340; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2366;&#2306;&#2327; &#2325;&#2368; &#2327;&#2312; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2358;&#2368;&#2354;&#2340;&#2366; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2342;&#2367; &#2350;&#2366;&#2306;&#2327; &#2348;&#2375;&#2354;&#2379;&#2330;&#2342;&#2366;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2368;&#2350;&#2340; &#2350;&#2375;&#2306; &#2348;&#2337;&#2364;&#2366; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2350;&#2366;&#2306;&#2327; &#2325;&#2368; &#2327;&#2312; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2331;&#2379;&#2335;&#2375; &#2360;&#2375; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2366; &#2325;&#2366;&#2352;&#2339; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Both statements are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Both statements are correct</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only Statement I is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; I &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only Statement II is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; II &#2360;&#2361;&#2368; &#2361;&#2376;</span>"

    "correct_option_id": 1,
    "solution": "<p>Both statements I and II are correct. Statement I provides the fundamental definition of price elasticity of demand, and Statement II correctly describes the characteristic of inelastic demand.</p><p>Explanation:</p><p>Statement I is correct. Price Elasticity of Demand (PED) is a core concept in microeconomics. It is a numerical measure of how sensitive or responsive the quantity demanded of a good is to a change in its price. It is calculated as the percentage change in quantity demanded divided by the percentage change in price.</p><p>Statement II is correct. Inelastic demand occurs when the PED is less than 1 (in absolute value). This means that the percentage change in quantity demanded is smaller than the percentage change in price. In other words, consumers are not very responsive to price changes. For goods with inelastic demand (like essential medicines, salt, or gasoline in the short term), even a significant price increase will lead to only a small decrease in the quantity people buy.</p><p>Further insights:</p><p>The different types of price elasticity of demand are:</p><p>Perfectly Inelastic (PED = 0): Quantity demanded does not change at all when the price changes.</p><p>Inelastic (PED < 1): Percentage change in quantity demanded is less than the percentage change in price.</p><p>Unit Elastic (PED = 1): Percentage change in quantity demanded is equal to the percentage change in price.</p><p>Elastic (PED > 1): Percentage change in quantity demanded is greater than the percentage change in price.</p><p>Perfectly Elastic (PED = &#8734;): Any price increase causes the quantity demanded to drop to zero.</p><p></p>",

    "solution": "<p>The shape around each carbon atom in the ethene (C&#8322;H&#8324;) molecule is trigonal planar, and the entire molecule is planar.</p><p>Explanation:</p><p>Structure of Ethene: Ethene consists of two carbon atoms joined by a double bond (C=C). Each carbon atom is also bonded to two hydrogen atoms.</p><p>H   H</p><p>\\ /</p><p>C=C</p><p>/ \\</p><p>H   H</p><p>Hybridization: To form one double bond and two single bonds, each carbon atom undergoes sp hybridization. It uses one s-orbital and two p-orbitals to form three sp hybrid orbitals. The remaining p-orbital is unhybridized.</p><p>Geometry:</p><p>The three sp hybrid orbitals on each carbon atom arrange themselves in a trigonal planar geometry to minimize repulsion, with bond angles of approximately 120 degrees.</p><p>The C-H single bonds (sigma bonds) are formed by the overlap of a carbon sp orbital with a hydrogen 1s orbital.</p><p>The C=C double bond consists of one sigma (&#963;) bond (formed by the head-on overlap of sp orbitals from each carbon) and one pi (&#960;) bond (formed by the sideways overlap of the unhybridized p-orbitals).</p><p>Overall Molecular Shape: Because the geometry around both carbon atoms is trigonal planar, and the double bond restricts rotation, the entire molecule-both carbon atoms and all four hydrogen atoms-lies in the same plane.</p><p>Analysis of other options:</p><p>a) Linear: This shape is found in molecules like acetylene (C&#8322;H&#8322;) where the carbon atoms are sp hybridized and the bond angles are 180.</p><p>b) Tetrahedral: This shape is found in molecules like methane (CH&#8324;) or ethane (C&#8322;H&#8326;) where the carbon atoms are sp hybridized and the bond angles are 109.5.</p><p>d) Bent: This shape describes molecules with a central atom and two bonded atoms plus lone pairs, like water (H&#8322;O). It is not applicable to the geometry around the carbon atoms in ethene.</p>",

    "correct_option_id": 0,
    "solution": "<p>The correct answer is Vineet Narain & Others vs. Union of India (1997). This landmark judgment, arising from the \"Jain Hawala diaries\" case, issued a series of directives aimed at insulating investigative agencies like the Central Bureau of Investigation (CBI) and the Enforcement Directorate (ED) from political interference.</p><p>Explanation:</p><p>In its judgment, the Supreme Court expressed concern over the lack of autonomy of the CVC and CBI.</p><p>The Court directed that the Central Vigilance Commission (CVC), which had been functioning since 1964 based on an executive resolution, should be given statutory status.</p><p>The Court also laid down that the CVC should be made responsible for the effective functioning of the CBI, and it should have superintendence over the CBI's investigation of cases under the Prevention of Corruption Act, 1988.</p><p>It was in pursuance of these Supreme Court directives that the CVC Act was eventually passed by Parliament in 2003, giving the commission its current statutory backing.</p><p>Analysis of Other Options:</p><p>b) Maneka Gandhi vs. Union of India (1978): This case vastly expanded the scope of Article 21 (Right to Life and Personal Liberty), ruling that the \"procedure established by law\" must be fair, just, and reasonable.</p><p>c) Minerva Mills vs. Union of India (1980): This case reaffirmed the \"Basic Structure Doctrine\" and struck a balance between Fundamental Rights and Directive Principles.</p><p>d) Golaknath vs. State of Punjab (1967): In this case, the Supreme Court held that Parliament could not amend Fundamental Rights, a position that was later overruled in the Kesavananda Bharati case.</p><p></p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about sound waves:</p><p>Statement I: Sound waves require a material medium for their propagation.</p><p>Statement II: Sound waves can travel through vacuum.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; I: &#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2349;&#2380;&#2340;&#2367;&#2325; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2340; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Both statements are correct</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Both statements are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Statement I is correct, but Statement II is incorrect</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2360;&#2361;&#2368; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2325;&#2341;&#2344; II &#2327;&#2354;&#2340; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Statement I is incorrect, but Statement II is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2327;&#2354;&#2340; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2325;&#2341;&#2344; II &#2360;&#2361;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement I is correct, while Statement II is incorrect. The two statements are direct opposites, and only the first one accurately describes the nature of sound waves.</p><p>Explanation:</p><p>Statement I is correct. Sound waves are mechanical waves. This means they are disturbances that travel through a medium by causing the particles of that medium (whether it's a solid, liquid, or gas) to vibrate. The energy is transferred from particle to particle. Without a medium, there are no particles to vibrate, so the sound cannot travel.</p><p>Statement II is incorrect. A vacuum is a space devoid of matter. Since sound requires a medium (matter) for its propagation, it cannot travel through a vacuum. This is a fundamental difference between sound waves and electromagnetic waves (like light), which can travel through a vacuum. The classic experiment demonstrating this is the \"bell in a jar,\" where the sound of a ringing bell fades away as the air is pumped out of the jar, creating a vacuum.</p><p>Further insights:</p><p>The speed of sound varies depending on the medium it is traveling through. It is generally fastest in solids, slower in liquids, and slowest in gases, because the particles are packed more tightly in solids, allowing vibrations to be transmitted more quickly.</p><p>The fact that sound cannot travel through the vacuum of space is why space is silent (despite what is often depicted in science fiction movies).</p>",
    "question_index": 108
  },

    "question": "<span class=\"eqt\"><p>With reference to Article 21, consider the following statements:</p><p>1. After the 44th Amendment, Article 21 cannot be suspended even during a National Emergency.</p><p>2. The Supreme Court has held that the right to privacy is part of Article 21.</p><p>3. Protection under Article 21 is limited to citizens.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 21 &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. 44&#2357;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 21 &#2325;&#2379; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2349;&#2368; &#2344;&#2367;&#2354;&#2306;&#2348;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2344;&#2375; &#2350;&#2366;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2344;&#2367;&#2332;&#2340;&#2366; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 21 &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;&#2404;</p><p>3. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 21 &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2379;&#2306; &#2340;&#2325; &#2360;&#2368;&#2350;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statements 1 and 2 are correct, while statement 3 is incorrect. Article 21 is a non-suspendable right, and the right to privacy has been affirmed as part of it. However, its protection extends to all persons, not just citizens. Therefore, the correct option is c.</p><p>Explanation of Statements:</p><p>1 is Correct. The 44th Constitutional Amendment Act of 1978 was a crucial piece of legislation that reversed some of the more controversial provisions of the 42nd Amendment. It inserted Article 359(1A), which explicitly states that the President cannot issue an order to suspend the enforcement of the Fundamental Rights guaranteed by Article 20 (protection in respect of conviction for offences) and Article 21 (protection of life and personal liberty), even during a National Emergency proclaimed under Article 352.</p><p>2 is Correct. This statement is also correct. In the landmark judgment of Justice K.S. Puttaswamy (Retd.) vs. Union of India (2017), a nine-judge constitution bench of the Supreme Court unanimously affirmed that the right to privacy is a fundamental right, intrinsic to the right to life and personal liberty guaranteed under Article 21 of the Constitution. This judgment has had far-reaching implications for data protection and individual autonomy in India.</p><p>3 is Incorrect. This statement is false. Article 21 begins with the words, \"No person shall be deprived of his life or personal liberty except according to procedure established by law.\" The use of the word \"person\" is significant. Unlike some other Fundamental Rights (such as Article 19) which are explicitly available only to \"citizens,\" the protection of Article 21 is available to both citizens and non-citizens (foreigners) who are on Indian soil.</p><p>Further insights:</p><p>Article 21, \"Protection of Life and Personal Liberty,\" has been the most expansively interpreted article in the Indian Constitution.</p><p>Through a process of judicial activism, the Supreme Court has read numerous other rights into Article 21, including the right to a clean environment, the right to livelihood, the right to health, the right to education, and the right to a speedy trial, among others.</p><p>The only ground on which a person's life or personal liberty can be curtailed is through a \"procedure established by law,\" which, as per the Maneka Gandhi case, must be a procedure that is fair, just, and reasonable, not arbitrary.</p><p></p>",
    "question_index": 109
  },

    "question": "<span class=\"eqt\"><p>With reference to the Comptroller and Auditor General of India (CAG), consider the following:</p><p>1. The CAG is appointed by the President and can be removed in like manner and on like grounds as a judge of the Supreme Court.</p><p>2. The Constitution mandates the CAG to audit Panchayats and Municipalities across all States.</p><p>3. The CAG's term is six years or until the age of 65 years, whichever is earlier, under the CAG (Duties, Powers and Conditions of Service) Act, 1971.</p><p>Which of the above statements is/are NOT correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2325; &#2319;&#2357;&#2306; &#2350;&#2361;&#2366;&#2354;&#2375;&#2326;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2325; (CAG) &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. CAG &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2368; &#2340;&#2352;&#2361; &#2361;&#2368; &#2324;&#2352; &#2360;&#2350;&#2366;&#2344; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2361;&#2335;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; CAG &#2325;&#2379; &#2360;&#2349;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2306;&#2330;&#2366;&#2351;&#2340;&#2379;&#2306; &#2324;&#2352; &#2344;&#2327;&#2352; &#2346;&#2366;&#2354;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2366; &#2354;&#2375;&#2326;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3. CAG (&#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351;, &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2366;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366; &#2325;&#2368; &#2358;&#2352;&#2381;&#2340;&#2375;&#2306;) &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1971 &#2325;&#2375; &#2340;&#2361;&#2340; CAG &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2331;&#2361; &#2357;&#2352;&#2381;&#2359; &#2351;&#2366; 65 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2340;&#2325;, &#2332;&#2379; &#2349;&#2368; &#2346;&#2361;&#2354;&#2375; &#2361;&#2379;, &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement 2 is not correct. The Constitution does not mandate the CAG to audit local bodies; it only enables state legislatures to make such a provision.</p><p>Statements 1 and 3 are correct descriptions of the appointment, removal, and service conditions of the CAG. Therefore, the only incorrect statement is 2.</p><p>Explanation of Statements:</p><p>1 is Correct. This statement accurately describes the appointment and removal process for the CAG, ensuring the independence of the office.</p><p>Appointment: Article 148(1) of the Constitution states that the CAG shall be appointed by the President by warrant under his hand and seal.</p><p>Removal: The same article provides a high degree of security of tenure by stating that the CAG \"shall only be removed from office in like manner and on the like grounds as a Judge of the Supreme Court.\" This means removal requires a process of impeachment, involving a special majority in both Houses of Parliament on grounds of proved misbehaviour or incapacity.</p><p>2 is Not Correct. This statement is false. The Constitution does not mandate the CAG to audit the accounts of local bodies like Panchayats and Municipalities. Article 243J (for Panchayats) and Article 243Z (for Municipalities) state that the legislature of a State may, by law, make provisions with respect to the maintenance and audit of the accounts of these local bodies. The State Legislature can entrust this job to the CAG, but it is not a constitutional mandate for the CAG. The audit of local bodies is primarily the responsibility of state-level audit authorities.</p><p>3 is Correct. The term and other conditions of service of the CAG are not detailed in the Constitution itself but are determined by Parliament by law. This has been done through the CAG's (Duties, Powers and Conditions of Service) Act, 1971. This Act specifies that the CAG shall hold office for a term of six years or up to the age of 65 years, whichever is earlier.</p><p>Further insights:</p><p>The CAG is the head of the Indian Audit and Accounts Department and is the guardian of the public purse.</p><p>The primary role of the CAG is to audit all receipts and expenditure of the Government of India and the state governments, including those of bodies and authorities substantially financed by the government.</p><p>The CAG submits its audit reports to the President (for Union accounts) and the Governor (for State accounts), who in turn lay them before the Parliament and the State Legislature, respectively. These reports are then examined by the Public Accounts Committee (PAC).</p><p></p>",
    "question_index": 110
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about the SWAYATT initiative under the Government e-Marketplace (GeM):</p><p>I. SWAYATT was launched on 19th February 2019 to boost the participation of startups, women, and youth in public procurement.</p><p>II. It stands for Startups, Women &amp; Youth Advantage through eTransactions.</p><p>III. SWAYATT was conceptualised with a clear objective of invigorating participation of women-led enterprises and youth in public procurement.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2312;-&#2350;&#2366;&#2352;&#2381;&#2325;&#2375;&#2335;&#2346;&#2381;&#2354;&#2375;&#2360; (GeM) &#2325;&#2375; &#2340;&#2361;&#2340; SWAYATT &#2346;&#2361;&#2354; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. SWAYATT &#2325;&#2379; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2326;&#2352;&#2368;&#2342; &#2350;&#2375;&#2306; &#2360;&#2381;&#2335;&#2366;&#2352;&#2381;&#2335;&#2309;&#2346;&#2381;&#2360;, &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2324;&#2352; &#2351;&#2369;&#2357;&#2366;&#2323;&#2306; &#2325;&#2368; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2368; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 19 &#2347;&#2352;&#2357;&#2352;&#2368; 2019 &#2325;&#2379; &#2354;&#2377;&#2344;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>II. &#2311;&#2360;&#2325;&#2366; &#2346;&#2370;&#2352;&#2381;&#2339; &#2352;&#2370;&#2346; &#2360;&#2381;&#2335;&#2366;&#2352;&#2381;&#2335;&#2309;&#2346;&#2381;&#2360;, &#2357;&#2368;&#2350;&#2375;&#2344; &#2319;&#2306;&#2337; &#2351;&#2370;&#2341; &#2319;&#2337;&#2357;&#2366;&#2306;&#2335;&#2375;&#2332; &#2341;&#2381;&#2352;&#2370; &#2312;-&#2335;&#2381;&#2352;&#2366;&#2306;&#2332;&#2375;&#2325;&#2381;&#2358;&#2344;&#2381;&#2360; &#2361;&#2376;&#2404;</p><p>III. SWAYATT &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2326;&#2352;&#2368;&#2342; &#2350;&#2375;&#2306; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2375; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2357;&#2366;&#2354;&#2375; &#2313;&#2342;&#2381;&#2351;&#2350;&#2379;&#2306; &#2324;&#2352; &#2351;&#2369;&#2357;&#2366;&#2323;&#2306; &#2325;&#2368; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2368; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2375; &#2360;&#2366;&#2341; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Government e Marketplace (GeM) commemorated six years of Startups, Women & Youth Advantage through eTransactions (SWAYATT) initiative at its New Delhi headquarter (HQ) on 19 February 2025.</p><p>Launched on 19th February, 2019, SWAYATT was conceptualised with a clear objective of invigorating participation of women-led enterprises and youth in public procurement.</p><p>Rooted in GeM's foundational pillar of social inclusion, SWAYATT is portal's commitment to enhance ease of doing business and establish direct market linkages to annual public procurement for startups, women entrepreneurs, Micro & Small Enterprises (MSEs), Self Help Groups (SHGs) and youth, especially those from backward sections of the society.</p><p>Since inception, the initiative is focused at facilitating the training and onboarding of last-mile sellers, developing women entrepreneurship and encouraging participation and small-scale businesses in government procurement.</p><p></p><p></p><p></p><p></p>",
    "question_index": 111
  },

    "question": "<span class=\"eqt\"><p>Where is the Headquarter of North Central Railway?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2343;&#2381;&#2351; &#2352;&#2375;&#2354;&#2357;&#2375; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351;&#2366;&#2354;&#2351; &#2325;&#2361;&#2366;&#2305; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">New Delhi</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2312; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Prayagraj</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2351;&#2366;&#2327;&#2352;&#2366;&#2332;</span>",

    "solution": "<p>The North Central Railway (NCR) was first established on 1<sup>st</sup> April 2003.</p><p>Its headquarters is located in <b>Prayagraj(Allahabad)</b>.</p><p>It includes three divisions: Allahabad, Agra and Jhansi. Initially, Allahabad division was part of Northern Railway and Jhansi division was part of Central Railway, and new Agra division.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct?</p><p>Statement 1: Unsaturated fatty acids increase membrane fluidity at a given temperature due to kinks in their hydrocarbon chains.</p><p>Statement 2: Cholesterol always increases membrane fluidity at all temperatures.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344; 1: &#2309;&#2360;&#2306;&#2340;&#2371;&#2346;&#2381;&#2340; &#2347;&#2376;&#2335;&#2368; &#2319;&#2360;&#2367;&#2337; &#2309;&#2346;&#2344;&#2375; &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2325;&#2367;&#2306;&#2325; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2346;&#2352; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368; &#2325;&#2368; &#2340;&#2352;&#2354;&#2340;&#2366; &#2348;&#2338;&#2364;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2325;&#2379;&#2354;&#2375;&#2360;&#2381;&#2335;&#2381;&#2352;&#2377;&#2354; &#2361;&#2350;&#2375;&#2358;&#2366; &#2360;&#2349;&#2368; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344;&#2379;&#2306; &#2346;&#2352; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368; &#2325;&#2368; &#2340;&#2352;&#2354;&#2340;&#2366; &#2348;&#2338;&#2364;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only statement 1 is true.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 1 &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Only statement 2 is true.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 2 &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both statements 1 and 2 are true.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Both statements 1 and 2 are false.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; 1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is true, but statement 2 is false. Unsaturated fatty acids do increase membrane fluidity. However, cholesterol has a dual, temperature-dependent effect on membrane fluidity; it does not always increase it.</p><p>Explanation of Statements:</p><p>Statement 1 is true. The phospholipids that make up the cell membrane have fatty acid tails. Saturated fatty acids have straight hydrocarbon chains that can pack together tightly, leading to a more viscous and less fluid membrane. Unsaturated fatty acids contain one or more double bonds, which introduce kinks or bends in their hydrocarbon chains. These kinks prevent the fatty acid tails from packing closely together, thereby increasing the fluidity of the membrane.</p><p>Statement 2 is false. Cholesterol's effect on membrane fluidity is complex and temperature-dependent, acting as a \"fluidity buffer.\" It does not always increase fluidity.</p><p>At high temperatures (like normal body temperature), cholesterol decreases membrane fluidity. It fits into the gaps between phospholipids and its rigid steroid ring structure restricts the movement of the fatty acid chains, making the membrane less fluid and more stable.</p><p>At low temperatures, cholesterol increases membrane fluidity. It prevents the phospholipids from packing too closely together and crystallizing, thus maintaining the membrane's fluidity and preventing it from becoming too rigid.</p><p>Therefore, cholesterol's role is to moderate fluidity, keeping it within an optimal range across different temperatures. The statement that it always increases fluidity is incorrect.</p><p></p>",
    "question_index": 113
  },
