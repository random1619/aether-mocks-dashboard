      "<span class=\"eqt\">a flaw that has been discovered but has not yet been fixed;</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2320;&#2360;&#2366; &#2342;&#2379;&#2359; &#2332;&#2367;&#2360;&#2375; &#2326;&#2379;&#2332;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2309;&#2349;&#2368; &#2340;&#2325; &#2336;&#2368;&#2325; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;;</span>",
      "<span class=\"eqt\">a flaw that is so severe that it can cause a system to crash;</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2320;&#2360;&#2366; &#2342;&#2379;&#2359; &#2332;&#2379; &#2311;&#2340;&#2344;&#2366; &#2327;&#2306;&#2349;&#2368;&#2352; &#2361;&#2376; &#2325;&#2367; &#2351;&#2361; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2379; &#2325;&#2381;&#2352;&#2376;&#2358; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;;</span>",
      "<span class=\"eqt\">a flaw that can only be exploited by a skilled hacker</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2320;&#2360;&#2366; &#2342;&#2379;&#2359; &#2332;&#2367;&#2360;&#2325;&#2366; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2325;&#2369;&#2358;&#2354; &#2361;&#2376;&#2325;&#2352; &#2361;&#2368; &#2347;&#2366;&#2351;&#2342;&#2366; &#2313;&#2336;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A security flaw or weakness in a software or hardware system that the vendor or developer is unaware of and for which no patch or fix has been released is referred to as a \"zero-day\" vulnerability.</p>",
    "question_index": 136
  },
  {
    "question": "<span class=\"eqt\"><p>In which of the following types of storage, memory is stored online and not in physical drives?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2350;&#2375;&#2306; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2344; &#2325;&#2367; &#2349;&#2380;&#2340;&#2367;&#2325; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357; &#2350;&#2375;&#2306; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cloud</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2366;&#2313;&#2337;</span>",
      "<span class=\"eqt\">Rain</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2344;</span>",
      "<span class=\"eqt\">Thunder</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2306;&#2337;&#2352;</span>",
      "<span class=\"eqt\">Rainbow</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2344;&#2348;&#2379;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Cloud storage is a cloud computing model that stores data on the Internet through a cloud computing provider who manages and operates data storage as a service. It's delivered on demand with just-in-time capacity and costs, and eliminates buying and managing your own data storage infrastructure. This gives you agility, global scale and durability, with \"anytime, anywhere\" data access.</p><p>Source: AWS website.</p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following parts of a motherboard is known as memory controller hub?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2342;&#2352;&#2348;&#2379;&#2352;&#2381;&#2337; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2349;&#2366;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2379; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2306;&#2335;&#2381;&#2352;&#2379;&#2354;&#2352; &#2361;&#2348; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Southbridge</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2313;&#2341;&#2348;&#2381;&#2352;&#2367;&#2332;</span>",
      "<span class=\"eqt\">Northbridge</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2377;&#2352;&#2381;&#2341; &#2348;&#2381;&#2352;&#2367;&#2332;</span>",
      "<span class=\"eqt\">SATA</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360;&#2319;&#2335;&#2368;&#2319;</span>",
      "<span class=\"eqt\">BIOS</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2351;&#2379;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The two most important chips on the motherboard are known as the northbridge and the southbridge.</p><p>The <b>northbridge</b> also known as the memory controller hub is connected directly to the processor via the front-side bus to system memory via the memory bus, and to the southbridge via an internal bus.</p><p>It is also connected to a high-speed graphics card slot via either an Accelerated Graphics Port (AGP) bus or a PCI Express (PCI-E) bus, depending on the type of slot provided.</p><p>The southbridge also known as the I/O controller hub connects to the processor indirectly via the northbridge and controls slower devices such as the hard drive, USB, audio, video, LAN, PCI, I/O controller, and integrated device hardware, such as, sound card, video card, USB, PCI, Ethernet, IDE, ISA, BIOS. </p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>I. Cookies are small text files stored on a user's device by websites.</p><p>II. Cookies help websites remember user preferences and login information.</p><p>III. Cookies can execute programs and infect computers directly.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2331;&#2379;&#2335;&#2368; &#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2347;&#2364;&#2366;&#2311;&#2354;&#2375;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2325;&#2375; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2346;&#2352; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335; &#2325;&#2379; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366;&#2319;&#2305; &#2324;&#2352; &#2354;&#2377;&#2327;&#2367;&#2344; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2351;&#2366;&#2342; &#2352;&#2326;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>III. &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2330;&#2354;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306; &#2324;&#2352; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2379; &#2360;&#2368;&#2343;&#2375; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I, II, and III</span><span class=\"hqt\" style=\"display:none\">I, II, &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements I and II are correct, while statement III is incorrect. Cookies are passive text files used for storing information and cannot execute code or act as malware themselves. Therefore, the correct option is a.</p><p>Explanation of Statements:</p><p>Statement I is correct. A cookie (specifically an HTTP cookie) is a small piece of data that a website's server sends to a user's web browser. The browser then stores this data on the user's computer or device as a simple text file. When the user visits the same website again, the browser sends the cookie back to the server, allowing the site to recognize the user.</p><p>Statement II is correct. This is the primary purpose of cookies. Since the HTTP protocol is stateless, cookies are used to provide \"memory\" for a website. They help the site remember user-specific information, such as:</p><p>Session Management: Keeping a user logged in as they navigate different pages.</p><p>Personalization: Remembering user preferences like language, theme, or location.</p><p>Tracking: Remembering items in a shopping cart or tracking browsing behavior.</p><p>Statement III is incorrect. This is a common misconception. Cookies are data, not code. They are passive text files and cannot be executed like a program. Therefore, they cannot contain viruses or malware and cannot directly infect a computer. While cookies can be used in ways that raise privacy concerns (like tracking user activity across multiple sites), they are not themselves malicious software.</p><p>Further insights:</p><p>First-party vs. Third-party cookies: First-party cookies are set by the website you are directly visiting. Third-party cookies are set by a different domain (e.g., an advertiser on the site you are visiting) and are primarily used for cross-site tracking and online advertising. Privacy concerns have led many browsers to start blocking third-party cookies by default.</p><p>Session vs. Persistent cookies: Session cookies are temporary and are deleted when the user closes their browser. Persistent cookies have an expiration date and remain on the user's device until they expire or are manually deleted. They are used for functions like \"Remember me\" on login pages.</p><p>Security Risks: While cookies themselves are not malware, they can be a target for attackers. In a session hijacking attack, an attacker might steal a user's session cookie to gain unauthorized access to their account. This is why it's important to use secure (HTTPS) connections.</p><p></p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not true about RAM?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; RAM &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2340;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">RAM scores certain fixed routines such as the boot  -  up routines.</span><span class=\"hqt\" style=\"display:none\">RAM &#2325;&#2369;&#2331; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2370;&#2335;&#2368;&#2344; &#2332;&#2376;&#2360;&#2375; &#2348;&#2370;&#2335;-&#2309;&#2346; &#2352;&#2370;&#2335;&#2368;&#2344; &#2325;&#2379; &#2360;&#2381;&#2325;&#2379;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">RAM is volatile which means when the computer is switched off, the contents are lost.</span><span class=\"hqt\" style=\"display:none\">RAM &#2357;&#2379;&#2354;&#2375;&#2335;&#2366;&#2311;&#2354; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; &#2332;&#2348; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2348;&#2306;&#2342; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2368; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2344;&#2359;&#2381;&#2335; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The contents cannot be changed or deleted.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2325;&#2379; &#2348;&#2342;&#2354;&#2366; &#2351;&#2366; &#2337;&#2367;&#2354;&#2368;&#2335; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both (1) and (3)</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; (1) &#2324;&#2352; (3)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>RAM  -  Random Access Memory</p><p>The main function of RAM is to <b>store the currently active programs</b> and their data. </p><p><b>RAM is volatile</b> which means when the computer is switched off, the contents are lost.</p><p>The contents of RAM <b>can be changed or deleted</b>.</p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>I. A metamorphic virus rewrites its own code each time it infects a new system.</p><p>II. It does not rely on encryption but on code transformation.</p><p>III. It is more complex than a polymorphic virus.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2319;&#2325; &#2350;&#2375;&#2335;&#2366;&#2350;&#2377;&#2352;&#2381;&#2347;&#2367;&#2325; &#2357;&#2366;&#2351;&#2352;&#2360; &#2361;&#2352; &#2348;&#2366;&#2352; &#2332;&#2348; &#2351;&#2361; &#2319;&#2325; &#2344;&#2351;&#2366; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2309;&#2346;&#2344;&#2366; &#2325;&#2379;&#2337; &#2347;&#2367;&#2352; &#2360;&#2375; &#2354;&#2367;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2361; &#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2358;&#2344; &#2346;&#2352; &#2344;&#2361;&#2368;&#2306; &#2348;&#2354;&#2381;&#2325;&#2367; &#2325;&#2379;&#2337; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2351;&#2361; &#2319;&#2325; &#2346;&#2377;&#2354;&#2368;&#2350;&#2377;&#2352;&#2381;&#2347;&#2367;&#2325; &#2357;&#2366;&#2351;&#2352;&#2360; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2332;&#2335;&#2367;&#2354; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II, and III</span><span class=\"hqt\" style=\"display:none\">I, II, &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>All three statements are correct. They accurately describe the key characteristics of a metamorphic virus, highlighting how it rewrites its code, its reliance on transformation rather than just encryption, and its greater complexity compared to polymorphic malware.</p><p>Explanation of Statements:</p><p>Statement I is correct. This is the defining feature of a metamorphic virus. With each new infection, it generates a new version of its own executable code. It doesn't just change its appearance; it changes its actual structure and instructions while preserving its malicious functionality.</p><p>Statement II is correct. This statement highlights the key difference between polymorphic and metamorphic malware. A polymorphic virus typically uses encryption to hide a static, unchanging malicious payload. A metamorphic virus goes a step further by using code transformation techniques. It employs a \"mutation engine\" to disassemble its own code and then reassemble it in a different form, using techniques like instruction substitution, code permutation, and register renaming.</p><p>Statement III is correct. Creating a metamorphic virus is significantly more complex than creating a polymorphic one. A polymorphic virus only needs an encryption/decryption module. A metamorphic virus requires a highly sophisticated mutation engine that essentially acts like a compiler or assembler, capable of generating new, functionally equivalent versions of itself. This makes them much harder to write and, consequently, more difficult to detect.</p><p>Further insights:</p><p>Analogy: A polymorphic virus is like a criminal who wears a different disguise each time but is the same person underneath. A metamorphic virus is like a shapeshifter who can change their entire body structure while retaining their malicious intent.</p><p>Detection: Because metamorphic viruses have no static code signature and don't rely on a simple decryption loop, they are extremely difficult for traditional signature-based antivirus software to detect. Detection requires advanced methods like:</p><p>Heuristic analysis: Identifying suspicious code patterns and behaviors.</p><p>Behavioral monitoring: Observing what the program does when it runs (e.g., modifying system files, connecting to a command-and-control server).</p><p>Emulation/Sandboxing: Running the code in a safe, virtual environment to analyze its actions.</p><p></p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>_________refers to periods of time during which a computer system, server or network is shut off or unavailable for use.</p></span><span class=\"hqt\" style=\"display:none\"><p>__________ &#2313;&#2360; &#2309;&#2357;&#2343;&#2367; &#2325;&#2379; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2319;&#2325; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;, &#2360;&#2352;&#2381;&#2357;&#2352; &#2351;&#2366; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2348;&#2306;&#2342; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2351;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2344;&#2369;&#2346;&#2354;&#2348;&#2381;&#2343; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Lost time</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2360;&#2381;&#2335; &#2335;&#2366;&#2311;&#2350;</span>",
      "<span class=\"eqt\">Froze time</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2381;&#2352;&#2379;&#2332;&#2364; &#2335;&#2366;&#2311;&#2350;</span>",
      "<span class=\"eqt\">Cold time</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2354;&#2381;&#2337; &#2335;&#2366;&#2311;&#2350;</span>",
      "<span class=\"eqt\">Downtime</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2366;&#2313;&#2344; &#2335;&#2366;&#2311;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Downtime</b> refers to periods of time during which a computer system, server or network is shut off or unavailable for use. Systems go through periods of downtime for a variety of reasons, including power or hardware failure, system crashes, hacker attacks, system reboots, operating system and/or software updates, lack of network connectivity and more.</p>",
    "question_index": 142
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is used to identify one or more IP addresses?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2319;&#2325; &#2351;&#2366; &#2309;&#2343;&#2367;&#2325; IP &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Website</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">Universal Resource Locator</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2344;&#2367;&#2357;&#2352;&#2381;&#2360;&#2354; &#2352;&#2367;&#2360;&#2379;&#2352;&#2381;&#2360; &#2354;&#2379;&#2325;&#2375;&#2335;&#2352;</span>",
      "<span class=\"eqt\">E  -  mail Attachment</span><span class=\"hqt\" style=\"display:none\">&#2312; - &#2350;&#2375;&#2354; &#2309;&#2335;&#2376;&#2330;&#2350;&#2375;&#2306;&#2335;</span>",
      "<span class=\"eqt\">Domain names</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2379;&#2350;&#2375;&#2344; &#2344;&#2375;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Domain names</b> are used to identify one or more IP addresses<i>.</i> Every domain name has a suffix that indicates which top level domain (TLD) it belongs to. There are only a limited number of such domains.</p><p>For example: gov  -  Government Agencies</p>",
    "question_index": 143

  {
    "question": "<span class=\"eqt\"><p>Which type of Operating System run on a server and provide the capability to manage data, users, groups, security, and applications?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2319;&#2325; &#2360;&#2352;&#2381;&#2357;&#2352; &#2346;&#2352; &#2330;&#2354;&#2340;&#2366;/&#2352;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2337;&#2375;&#2335;&#2366;, &#2351;&#2370;&#2332;&#2352;, &#2360;&#2350;&#2370;&#2361;&#2379;&#2306;, &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2324;&#2352; &#2319;&#2346;&#2381;&#2354;&#2368;&#2325;&#2375;&#2358;&#2344; &#2325;&#2379; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Distributed operating System</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2360;&#2381;&#2335;&#2381;&#2352;&#2367;&#2348;&#2381;&#2351;&#2370;&#2335;&#2375;&#2337; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>",
      "<span class=\"eqt\">Time sharing operating System</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2366;&#2311;&#2350; &#2358;&#2375;&#2351;&#2352;&#2367;&#2306;&#2327; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>",
      "<span class=\"eqt\">Batch Operating System</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2330; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>",
      "<span class=\"eqt\">Network operating system</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Network operating systems run on a server and provide the capability to manage data, users, groups, security, applications, and other networking functions. These types of operating systems allow shared access of files, printers, security, applications, and other networking functions over a small private network. One more important aspect of Network Operating Systems is that all the users are well aware of the underlying configuration, of all other users within the network, their individual connections, etc. and that's why these computers are popularly known as tightly coupled systems.</p>",
    "question_index": 144
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about optical storage:</p><p>I. CD, DVD, and Blu-ray discs are examples of optical storage.</p><p>II. Data in optical storage is read using laser technology.</p><p>Which statement(s) is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2321;&#2346;&#2381;&#2335;&#2367;&#2325;&#2354; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2360;&#2368;&#2337;&#2368;, &#2337;&#2368;&#2357;&#2368;&#2337;&#2368; &#2324;&#2352; &#2348;&#2381;&#2354;&#2370;-&#2352;&#2375; &#2337;&#2367;&#2360;&#2381;&#2325; &#2321;&#2346;&#2381;&#2335;&#2367;&#2325;&#2354; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2325;&#2375; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2321;&#2346;&#2381;&#2335;&#2367;&#2325;&#2354; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2350;&#2375;&#2306; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2354;&#2375;&#2332;&#2352; &#2340;&#2325;&#2344;&#2368;&#2325; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2346;&#2338;&#2364;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements I and II are correct. They accurately describe the common examples and the fundamental working principle of optical storage technology.</p><p>Explanation of Statements:</p><p>Statement I is correct. Optical storage is a category of data storage where data is stored on a disc and read by a light source. The most common and well-known examples of optical storage media are the Compact Disc (CD), the Digital Versatile Disc (DVD), and the Blu-ray Disc (BD).</p><p>Statement II is correct. The defining characteristic of optical storage is the use of laser technology. Data is written to the disc by a laser that creates microscopic pits on its surface. To read the data, a lower-powered laser is shone on the disc, and a sensor detects the difference in reflection between the flat areas (\"lands\") and the pits. This pattern of reflections is then converted back into digital data (1s and 0s).</p><p>Further insights:</p><p>The main difference between CD, DVD, and Blu-ray is the storage capacity, which is determined by the wavelength of the laser used. CDs use an infrared laser, DVDs use a red laser, and Blu-ray discs use a shorter-wavelength \"blue\" (actually blue-violet) laser. The shorter wavelength allows for smaller pits and a tighter spiral track, enabling much more data to be stored in the same physical space.</p><p>There are different types of optical discs:</p><p>ROM (Read-Only Memory): Data is commercially pressed onto the disc and cannot be changed (e.g., a movie DVD).</p><p>R (Recordable): Blank discs that can be written to once (e.g., DVD-R).</p><p>RW (ReWritable): Discs that can be written to, erased, and rewritten multiple times (e.g., CD-RW).</p><p></p>",
    "question_index": 147
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not a step in the Data Processing Cycle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2337;&#2375;&#2335;&#2366; &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2367;&#2306;&#2327; &#2330;&#2325;&#2381;&#2352; &#2325;&#2366; &#2319;&#2325; &#2330;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Input</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2346;&#2369;&#2335;</span>",
      "<span class=\"eqt\">Processing</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Output</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2313;&#2335;&#2346;&#2369;&#2335;</span>",
      "<span class=\"eqt\">Transmitting</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2350;&#2367;&#2335;&#2367;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>To process data, we need to first input or capture the data. This is followed by its storage in a file or a database so that it can be used in the future. Whenever data is to be processed, it is first retrieved from the file or database so that we can perform further actions on it.</p><p>&#183; <b>Data Capturing:</b> - It involves the process of gathering data from different sources in the digital form. This capturing may vary from simple instruments like keyboard, barcode readers used at shopping outlets, comments or posts over social media, remote sensors on an earth orbiting satellite, etc.</p><p>&#183; <b>Data Storage:</b> - It is the process of storing the captured data for processing later. Now-a-days data is being produced at a very high rate, and therefore data storage has become a challenging task.</p><p>&#183; <b>Data Retrieval:</b> - It involves fetching data from the storage devices, for its processing as per the user requirement. As databases grow, the challenges involved in search and retrieval of the data in acceptable time, also increase.</p><p>Transmitting data is not a step in the Data Processing Cycle. Transmitting data involves sending data from one device to another over a network, such as the internet or a local area network (LAN). It's essential for sharing information between computers. It is not a fundamental steps in the traditional data processing cycle model. </p>",
    "question_index": 148
  },

    "solution": "<p>A device which is used to display result from a computer is called as output device. It Allows people to receive information from computers. An output device is any peripheral that receives or displays output from a computer. </p><p>Examples of output devices include Printer, Monitor, Plotter, Speaker, etc.</p>",
