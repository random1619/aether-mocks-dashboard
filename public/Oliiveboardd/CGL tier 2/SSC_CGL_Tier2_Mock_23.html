    "question": "<span class=\"eqt\"><p>Number of books sold by a shopkeeper on Monday is 2/3<sup>rd</sup> of number of books sold by him on Tuesday. Number of books sold by him on Wednesday is 1/5<sup>th</sup> of number of books sold by him on Monday. Total number of books sold by him on Monday, Tuesday and Wednesday together is 162. Find the number of books sold by him on Wednesday.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2325;&#2379; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2368; 2/3 &#2361;&#2376;&#2404; &#2348;&#2369;&#2343;&#2357;&#2366;&#2352; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2368; 1/5 &#2361;&#2376;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2379;&#2350;&#2357;&#2366;&#2352;, &#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352; &#2324;&#2352; &#2348;&#2369;&#2343;&#2357;&#2366;&#2352; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#235     "solution": "<p>Let number of books sold by him on Tuesday = X</p><p>Then number of books sold by him on Monday = 2X/3</p><p>And number of books sold by him on Wednesday = (1/5) * (2X/3) = 2X/15</p><p>Given,</p><p>X + (2X/3) + (2X/15) = 162</p><p>27X/15 = 162</p><p>X = 90</p><p>Number of books sold by him on Wednesday = 90 * 2/15 = 12</p>",

    "question": "<span class=\"eqt\"><p>The simple interest on a sum of money for 4 years is Rs.720. For what period will twice the sum earn Rs.1080 as simple interest at the same rate? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 4 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2366; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; 720 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;&#2404; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2360;&#2368; &#2342;&#2352; &#2360;&#2375; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2375; &#2342;&#2379;&#2327;&#2369;&#2344;&#2375; &#2346;&#2352; 1080 &#2352;&#2369;&#2346;&#2351;&#2375; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2327;&#2366;? </p></span>",

      "<span class=\"eqt\">5 years</span><span class=\"hqt\" style=\"display:none\">5 &#2360;&#2366;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Formula: SI = P * R * T / 100 </p><p>Let P = original sum; R = rate; t = required time. </p><p>720 = (P * R * 4) / 100 =&gt; P R = 72000 / 4 = 18000 </p><p>SI on 2P for t years = (2P * R * t) / 100 = (2 * 18000 * t) / 100 = 360 t = 1080 </p><p>360 t = 1080 =&gt; t = 1080 / 360 = 3 years </p>",

    "question": "<span class=\"eqt\"><p>PQRS is a rectangle. If &#8736; SPX = 40&deg; and &#8736; XZQ = 132&deg;, then find the measure of &#8736; PXZ.</p><p><img width=313 height=165 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22067/image014.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>PQRS &#2319;&#2325; &#2310;&#2351;&#2340; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736; SPX = 40&deg; &#2324;&#2352; &#8736; XZQ = 132&deg; &#2361;&#2376;, &#2340;&#2379; &#8736; PXZ &#2325;&#2366; &#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=313 height=165 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22067/image014.png\"></p></span>",

    "question": "<span class=\"eqt\"><p>If the numbers 10, 22, 38, m+6, 2m&#8722;4, and 90 are arranged in ascending order and their median is 47, find m. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; 10, 22, 38, m+6, 2m&#8722;4, &#2324;&#2352; 90 &#2325;&#2379; &#2310;&#2352;&#2379;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2324;&#2352; &#2313;&#2344;&#2325;&#2368; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; 47 &#2361;&#2379;, &#2340;&#2379; m &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>A man, a woman, and a boy can complete a work in 14 days, 20 days, and 10 days respectively. How many women must assist 3 men and 5 boys to complete the work in 14/17 days?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2369;&#2352;&#2369;&#2359;, &#2319;&#2325; &#2350;&#2361;&#2367;&#2354;&#2366; &#2324;&#2352; &#2319;&#2325; &#2354;&#2337;&#2364;&#2325;&#2366; &#2325;&#2367;&#2360;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 14 &#2342;&#2367;&#2344;, 20 &#2342;&#2367;&#2344; &#2324;&#2352; 10 &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 14/17 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2340;&#2344;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2379; 3 &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2324;&#2352; 5 &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2352;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the total work = LCM of 14, 20, and 10 = 140 units</p><p>Efficiency of a man = 140/10 = 10 units per day</p><p>Efficiency of a woman = 140/20 = 7 units per day</p><p>Efficiency of a boy = 140/10 = 14 units per day</p><p>Let the number of women required be X.</p><p>So,</p><p>(14/17) * (3 * 10 + 7 * X + 5 * 14) = 140</p><p>100 + 7X = 140 * 17/14</p><p>100 + 7X = 170</p><p>7X = 70</p><p>X = 10</p>",
    "question_index": 16

    "question": "<span class=\"eqt\"><p>In a school assessment, 75% of boys passed while 70% of girls passed. If there were 220 girls and the total number of failed candidates was 116, how many boys were there?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2381;&#2325;&#2370;&#2354; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2350;&#2375;&#2306;, 75% &#2354;&#2337;&#2364;&#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2361;&#2369;&#2319; &#2332;&#2348;&#2325;&#2367; 70% &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2366;&#2305; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2361;&#2369;&#2312;&#2306;&#2404; &#2351;&#2342;&#2367; &#2325;&#2369;&#2354; 220 &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2366;&#2305; &#2341;&#2368;&#2306; &#2324;&#2352; &#2309;&#2344;&#2369;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 116 &#2341;&#2368;, &#2340;&#2379; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2375; &#2354;&#2337;&#2364;&#2325;&#2375; &#2341;&#2375;?</p></span>",
    "options": [

    "question": "<span class=\"eqt\"><p>The loss percent when an article is sold at Rs.63 is the same as the profit% when it is sold at Rs. (63 + x). The cost price of article is Rs.36 more than the value of x. Find the cost price of the article.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; 63 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2361;&#2366;&#2344;&#2367; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;, &#2311;&#2360;&#2375; (63 + x) &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2375; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2354;&#2366;&#2349;% &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351;, x &#2325;&#2375; &#2350;&#2366;&#2344; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 36 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>A grocer buys rice at &#8377;30/kg and wheat at &#8377;20/kg. He sells rice at &#8377;36/kg and wheat at &#8377;18/kg. If he sells equal quantities, what is his overall profit %?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2306;&#2360;&#2366;&#2352;&#2368; &#2330;&#2366;&#2357;&#2354; &#8377;30/&#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2324;&#2352; &#2327;&#2375;&#2361;&#2370;&#2305; &#8377;20/&#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2326;&#2352;&#2368;&#2342;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2361; &#2330;&#2366;&#2357;&#2354; &#8377;36/&#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2324;&#2352; &#2327;&#2375;&#2361;&#2370;&#2305; &#8377;18/&#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; &#2348;&#2352;&#2366;&#2348;&#2352; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2325;&#2366; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; % &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>HCF and LCM of two numbers are 29 and 1015 respectively. If one number lies between 120 to 160, then find the value of other number.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2381;&#2340;&#2325; (HCF) &#2324;&#2352; &#2354;&#2328;&#2369;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2381;&#2351; (LCM) &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 29 &#2324;&#2352; 1015 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 120 &#2360;&#2375; 160 &#2325;&#2375; &#2348;&#2368;&#2330; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">155</span><span class=\"hqt\" style=\"display:none\">155</span>",
      "<span class=\"eqt\">203</span><span class=\"hqt\" style=\"display:none\">203</span>",
      "<span class=\"eqt\">145</span><span class=\"hqt\" style=\"display:none\">145</span>",
      "<span class=\"eqt\">213</span><span class=\"hqt\" style=\"display:none\">213</span>"

    "correct_option_id": 1,
    "solution": "<p>Let the numbers are 29a and 29b </p><p>LCM * HCF = product of two numbers</p><p>29 * 1015 = 29a * 29b</p><p>ab = (29 * 1015)/(29 * 29)</p><p>ab = 35</p><p>Two co- prime numbers with product 35 are 5 and 7</p><p>Therefore, the required number is (29 * 5, 29 * 7) = 145 and 203</p><p>Value of other number = 203</p>",

    "question": "<span class=\"eqt\"><p>If 3x<sup>3</sup> + 2x<sup>2</sup>  -  5x + 2k is divisible by (x  -  1), then what is the value of k?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 3x<sup>3</sup> + 2x<sup>2</sup> - 5x + 2k, (x - 1) &#2325;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2361;&#2376;, &#2340;&#2379; k &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Each of the questions below consists of a question followed by three statements numbered I, II and III. You have to decide the data provided in which of the statements are sufficient to answer the question.</p><p>Gargi loves reading. She recently finished reading a novel. How many pages did she read on Wednesday?</p><p>I. She read the last 1/10<sup>th</sup> of the book on Thursday.</p><p>II. The book has 240 pages. She finished 3/4<sup>th</sup> before Wednesday.</p><p>III. She read 12 more pages on Wednesday than on Thursday.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2319;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2340;&#2368;&#2344; &#2325;&#2341;&#2344; I, II &#2324;&#2352; III &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2404;</p><p>&#2327;&#2366;&#2352;&#2381;&#2327;&#2368; &#2325;&#2379; &#2346;&#2338;&#2364;&#2344;&#2366; &#2348;&#2361;&#2369;&#2340; &#2346;&#2360;&#2306;&#2342; &#2361;&#2376;&#2404; &#2313;&#2360;&#2344;&#2375; &#2361;&#2366;&#2354; &#2361;&#2368; &#2350;&#2375;&#2306; &#2319;&#2325; &#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; &#2346;&#2338;&#2364;&#2344;&#2366; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404; &#2313;&#2360;&#2344;&#2375; &#2348;&#2369;&#2343;&#2357;&#2366;&#2352; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2371;&#2359;&#2381;&#2336; &#2346;&#2338;&#2364;&#2375;?</p><p>I. &#2313;&#2360;&#2344;&#2375; &#2327;&#2369;&#2352;&#2369;&#2357;&#2366;&#2352; &#2325;&#2379; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2325;&#2366; &#2309;&#2306;&#2340;&#2367;&#2350; 1/10 &#2357;&#2366;&#2306; &#2349;&#2366;&#2327; &#2346;&#2338;&#2364;&#2366;&#2404;</p><p>II. &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2350;&#2375;&#2306; 240 &#2346;&#2371;&#2359;&#2381;&#2336; &#2361;&#2376;&#2306;&#2404; &#2313;&#2360;&#2344;&#2375; &#2348;&#2369;&#2343;&#2357;&#2366;&#2352; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; 3/4 &#2357;&#2366;&#2306; &#2349;&#2366;&#2327; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>III. &#2313;&#2360;&#2344;&#2375; &#2327;&#2369;&#2352;&#2369;&#2357;&#2366;&#2352; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2348;&#2369;&#2343;&#2357;&#2366;&#2352; &#2325;&#2379; 12 &#2346;&#2371;&#2359;&#2381;&#2336; &#2309;&#2343;&#2367;&#2325; &#2346;&#2338;&#2364;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Any two statements together</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2342;&#2379; &#2325;&#2341;&#2344; &#2319;&#2325; &#2360;&#2366;&#2341;</span>",
      "<span class=\"eqt\">Both I and III</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; III &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>From I:</p><p>The number of pages read on Wednesday cannot be determined.</p><p>From II:</p><p>Pages read before Wednesday = 180</p><p>From III:</p><p>Pages read on Wednesday = Pages read on Thursday + 12</p><p>From I and II:</p><p>Pages read on Thursday = 24</p><p>Pages read before Wednesday = 180</p><p>Hence, Pages read on Wednesday = 240  -  180  -  24 = 36</p><p>From I and III:</p><p>The number of pages is not known. Hence, the answer cannot be determined.</p><p>From II and III:</p><p>Pages read before Wednesday = 180</p><p>Pages read after Wednesday = 60</p><p>But it is not known when she finished reading the book. Hence, the answer cannot be determined.</p>",
    "question_index": 30

    "question": "<span class=\"eqt\"><p>If a % b = 42, where a % b = a - 3b, what is the value of a and b?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; a % b = 42, &#2332;&#2361;&#2366;&#2305; a % b = a - 3b, &#2340;&#2379; a &#2324;&#2352; b &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">33, 3</span><span class=\"hqt\" style=\"display:none\">33, 3</span>",
      "<span class=\"eqt\">51, 3</span><span class=\"hqt\" style=\"display:none\">51, 3</span>",
      "<span class=\"eqt\">45, 3</span><span class=\"hqt\" style=\"display:none\">45, 3</span>",
      "<span class=\"eqt\">42, 3</span><span class=\"hqt\" style=\"display:none\">42, 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Given, a % b = a - 3b</p><p>Also, a % b = 42</p><p>So, a - 3b = 42</p><p>For (33, 3): 33 - 33 = 33 - 9 = 24 &#8800; 42</p><p>For (51, 3): 51 - 33 = 51 - 9 = 42 [True]</p><p>For (45, 3): 45 - 33 = 45 - 9 = 36 &#8800; 42</p><p>For (42, 3): 42 - 33 = 42 - 9 = 33 &#8800; 42</p><p>Hence, (51, 3) is the correct answer.</p>",
    "question_index": 40
  },

    "question": "<span class=\"eqt\"><p>If P@Q means P is sister-in-law of Q; P#Q means P is mother of Q; P%Q means P is wife of Q; P^Q means P is daughter of Q, then which expression shows \"X is granddaughter of Z\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; P@Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; P, Q &#2325;&#2368; &#2360;&#2367;&#2360;&#2381;&#2335;&#2352;-&#2311;&#2344;-&#2354;&#2377; &#2361;&#2376;; P#Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; P, Q &#2325;&#2368; &#2350;&#2366;&#2305; &#2361;&#2376;; P%Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; P, Q &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;; P^Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; P, Q &#2325;&#2368; &#2348;&#2375;&#2335;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; \"X, Z &#2325;&#2368; &#2346;&#2379;&#2340;&#2368; &#2361;&#2376;\"?</p></span>",

      "<span class=\"eqt\">X@Y%Z</span><span class=\"hqt\" style=\"display:none\">X@Y%Z</span>",
      "<span class=\"eqt\">X#Y^Z</span><span class=\"hqt\" style=\"display:none\">X#Y^Z</span>"

    "correct_option_id": 0,
    "solution": "<p><img width=630 height=256 id=\"Picture 94\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28899/image061.jpg\"></p><p>1) X^Y^Z</p><p>X is daughter of Y. Y is daughter of Z.</p><p>Hence, X is granddaughter of Z.</p><p>2) X%Y#Z</p><p>X is wife of Y. Y is mother of Z.</p><p>Here, the relation is incorrect. So, option (b) is incorrect.</p><p>3) X@Y%Z</p><p>X is sister-in-law of Y. Y is wife of Z.</p><p>Here, X, Y and Z belong to the same generation. So, option (c) is incorrect.</p><p>4) X#Y^Z</p><p>X is mother of Y. Y is daughter of Z.</p><p>Here, X is the wife of Z. So, option (d) is incorrect.</p>",
