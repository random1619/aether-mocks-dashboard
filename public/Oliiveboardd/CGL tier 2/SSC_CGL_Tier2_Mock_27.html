      "<span class=\"eqt\">Right alignment</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2312;&#2335; &#2319;&#2354;&#2366;&#2311;&#2344;&#2350;&#2375;&#2306;&#2335;</span>",
      "<span class=\"eqt\">Center alignment</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2306;&#2335;&#2352; &#2319;&#2354;&#2366;&#2311;&#2344;&#2350;&#2375;&#2306;&#2335;</span>",
      "<span class=\"eqt\">Diagonal alignment</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2366;&#2351;&#2327;&#2379;&#2344;&#2354; &#2319;&#2354;&#2366;&#2311;&#2344;&#2350;&#2375;&#2306;&#2335;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Diagonal alignment is not a common type of text alignment used in word processing. The standard text alignments are left alignment, right alignment, and center alignment, which control the horizontal positioning of text within a paragraph. Diagonal alignment, where text is positioned diagonally across a page or paragraph, is not a standard alignment option in most word processing software and is typically used sparingly for artistic or specialized design purposes.</p>",
    "question_index": 141
  },

    "question": "<span class=\"eqt\"><p>What does the function \"=AVERAGE (A1:A5)\" do in Excel? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2350;&#2375;&#2306; &#2347;&#2306;&#2325;&#2381;&#2358;&#2344; \"=AVERAGE (A1:A5)\" &#2325;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Calculates the sum of values in cells A1 to A5</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2354; A1 &#2360;&#2375; A5 &#2325;&#2375; &#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327;&#2347;&#2354; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Computes the average of values in cells A1 to A5</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2354; A1 &#2360;&#2375; A5 &#2325;&#2375; &#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Finds the maximum value in cells A1 to A5</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2354; A1 &#2360;&#2375; A5 &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2350;&#2366;&#2344; &#2338;&#2370;&#2305;&#2338;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Multiplies the values in cells A1 to A5</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2354; A1 &#2360;&#2375; A5 &#2350;&#2375;&#2306; &#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The function \"=AVERAGE (A1:A5)\" in Excel calculates the average of the values in cells A1 through A5. It adds up the numeric values in those cells and then divides the sum by the number of cells with numeric values to give you the average.</p>",
    "question_index": 142
  },

    "solution": "<p>Juice jacking</p><p>&#10146; The charging port of a mobile, can also be used to transfer files / data.</p><p>&#10146; Fraudsters use public charging ports to transfer malware to customer phones connected</p><p>there and take control / access / steal data sensitive data such as emails, SMS, saved</p><p>passwords, etc. from the customers' mobile phones (Juice Jacking).</p>",

    "question": "<span class=\"eqt\"><p>Which of the following is not considered a generation of computer? </p><p>A. ENIAC</p><p>B. Mainframe computers </p><p>C. Supercomputers </p><p>D. Analog computers</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2368; &#2346;&#2368;&#2338;&#2364;&#2368; &#2344;&#2361;&#2368;&#2306; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p><p>A. ENIAC</p><p>B. &#2350;&#2375;&#2344;&#2347;&#2381;&#2352;&#2375;&#2350; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352;</p><p>C. &#2360;&#2369;&#2346;&#2352; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352;</p><p>D. &#2319;&#2344;&#2366;&#2354;&#2377;&#2327; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352;</p></span>",

      "<span class=\"eqt\">D only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; D</span>",

    "correct_option_id": 2,
    "solution": "<p>Analog computers are a type of computer that uses continuous physical phenomena, like electrical voltages or mechanical movements, to perform calculations. They are not a generation of computers. Whereas, ENIAC (Electronic Numerical Integrator and Computer) is first generation computer. Mainframe computers are considered as first and second generation computer. Supercomputers are as fifth generation computers. </p>",

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct?</p><p>I. Thunderbolt 4 supports up to 40 Gbps data transfer and can daisy-chain up to six devices.</p><p>II. HDMI transmits both digital audio and video signals through a single cable.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2341;&#2306;&#2337;&#2352;&#2348;&#2379;&#2354;&#2381;&#2335; 4, 40 Gbps &#2340;&#2325; &#2337;&#2375;&#2335;&#2366; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2347;&#2352; &#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2331;&#2361; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2340;&#2325; &#2337;&#2375;&#2332;&#2364;&#2368;-&#2330;&#2375;&#2344; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. HDMI &#2319;&#2325; &#2361;&#2368; &#2325;&#2375;&#2348;&#2354; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2321;&#2337;&#2367;&#2351;&#2379; &#2324;&#2352; &#2357;&#2368;&#2337;&#2367;&#2351;&#2379; &#2360;&#2367;&#2327;&#2381;&#2344;&#2354; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Both statements are correct. They accurately describe the key features and capabilities of the Thunderbolt 4 and HDMI interface standards.</p><p>Explanation of Statements:</p><p>Statement I is correct. Thunderbolt 4 is a high-speed interface standard developed by Intel. Its key features include:</p><p>- Data Transfer Speed: It supports a bidirectional bandwidth of 40 Gbps (Gigabits per second).</p><p>- Daisy-Chaining: It allows for the connection of multiple peripherals to a single port by linking them together in a chain. A single Thunderbolt 4 port can support a chain of up to six Thunderbolt devices.</p><p>It also supports power delivery and can drive multiple high-resolution displays.</p><p>Statement II is correct. HDMI (High-Definition Multimedia Interface) is the de facto standard for connecting high-definition and ultra-high-definition consumer electronics like Blu-ray players, gaming consoles, and streaming devices to TVs, monitors, and projectors. Its defining feature is the ability to transmit uncompressed digital video and compressed or uncompressed digital audio signals simultaneously over a single cable, greatly simplifying home theater and computer display setups.</p><p>Further insights:</p><p>Thunderbolt vs. USB-C: Thunderbolt 4 uses the same physical USB-C connector as many other standards, which can cause confusion. However, not all USB-C ports support the full Thunderbolt 4 feature set. A Thunderbolt port is a more capable \"superset\" of a standard USB-C port.</p><p>HDMI Evolution: HDMI has evolved through numerous versions. Early versions supported 1080p video, while newer versions like HDMI 2.1 can support resolutions up to 10K, higher refresh rates (e.g., 4K at 120Hz), and advanced audio formats like Dolby Atmos.</p><p>Daisy-Chaining vs. Hub: Daisy-chaining connects devices sequentially (computer -> monitor 1 -> monitor 2). An alternative is using a hub or dock, where multiple devices connect to a central hub, which then connects to the computer via a single cable. Thunderbolt supports both methods effectively.</p>",
    "question_index": 147
  },

    "question": "<span class=\"eqt\"><p>In MS Word and PowerPoint, consider:</p><p>1. SmartArt graphics allow creation of process, hierarchy, and relationship diagrams.</p><p>2. WordArt adds stylized decorative text effects in documents.</p><p>3. In PowerPoint, the Slide Master controls layout and formatting across all slides.</p><p>Select the correct code:</p></span><span class=\"hqt\" style=\"display:none\"><p>MS Word &#2324;&#2352; PowerPoint &#2350;&#2375;&#2306;, &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2360;&#2381;&#2350;&#2366;&#2352;&#2381;&#2335;&#2310;&#2352;&#2381;&#2335; &#2327;&#2381;&#2352;&#2366;&#2347;&#2364;&#2367;&#2325;&#2381;&#2360; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;, &#2346;&#2342;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343; &#2310;&#2352;&#2375;&#2326;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2357;&#2352;&#2381;&#2337;&#2310;&#2352;&#2381;&#2335; &#2342;&#2360;&#2381;&#2340;&#2366;&#2357;&#2375;&#2332;&#2364;&#2379;&#2306; &#2350;&#2375;&#2306; &#2358;&#2376;&#2354;&#2368;&#2327;&#2340; &#2360;&#2332;&#2366;&#2357;&#2335;&#2368; &#2346;&#2366;&#2336; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2332;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3. PowerPoint &#2350;&#2375;&#2306;, &#2360;&#2381;&#2354;&#2366;&#2311;&#2337; &#2350;&#2366;&#2360;&#2381;&#2335;&#2352; &#2360;&#2349;&#2368; &#2360;&#2381;&#2354;&#2366;&#2311;&#2337;&#2379;&#2306; &#2350;&#2375;&#2306; &#2354;&#2375;&#2310;&#2313;&#2335; &#2324;&#2352; &#2347;&#2364;&#2377;&#2352;&#2381;&#2350;&#2375;&#2335;&#2367;&#2306;&#2327; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2360;&#2361;&#2368; &#2325;&#2379;&#2337; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All three statements are correct. They accurately describe the functions of SmartArt, WordArt, and the Slide Master, which are key features for creating visually appealing and consistently formatted documents and presentations in Microsoft Office applications.</p><p>Explanation of Statements:</p><p>Statement 1 is correct. SmartArt is a feature in Microsoft Office that allows users to create visual representations of their information and ideas. It offers a wide gallery of layouts for various categories, including lists, processes (like a workflow), cycles, hierarchies (like an organization chart), and relationships (like a Venn diagram), making it easy to create professional-looking diagrams.</p><p>Statement 2 is correct. WordArt is a text-styling utility. It is used to create decorative text with special effects such as shadows, outlines, gradients, and 3D transformations. It is typically used for headlines, titles, and other text that needs to stand out, rather than for regular paragraph text.</p><p>Statement 3 is correct. In PowerPoint, the Slide Master is a feature that stores information about the theme and slide layouts of a presentation, including the background, color, fonts, effects, placeholder sizes, and positioning. Editing the Slide Master allows you to make global changes to the layout and formatting that will be applied consistently across all slides using that master, ensuring a uniform look and feel.</p><p>Further insights:</p><p>Both SmartArt and WordArt are available across multiple Microsoft Office applications, including Word, Excel, PowerPoint, and Outlook, providing consistent tools for visual design.</p><p>While SmartArt is for visualizing information and relationships, the Chart feature is used for visualizing numerical data.</p><p>A single PowerPoint presentation can have multiple slide masters. This is useful for creating different sections within a presentation that may require a distinct look (e.g., a title section with a different background from the main content section).</p>",
    "question_index": 148
  },
  {
    "question": "<span class=\"eqt\"><p>What is the term for a feature that allows you to view and edit two different parts of a document at the same time, such as different pages or sections? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2346;&#2375;&#2332; &#2351;&#2366; &#2360;&#2375;&#2325;&#2381;&#2358;&#2344; &#2350;&#2375;&#2306; &#2310;&#2346;&#2325;&#2379; &#2360;&#2350;&#2366;&#2344; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2337;&#2377;&#2325;&#2381;&#2351;&#2370;&#2350;&#2375;&#2306;&#2335; &#2325;&#2375; &#2342;&#2379; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2361;&#2367;&#2360;&#2381;&#2360;&#2379;&#2306; &#2325;&#2379; &#2357;&#2381;&#2351;&#2370; &#2324;&#2352; &#2319;&#2337;&#2367;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2313;&#2360; &#2347;&#2368;&#2330;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2346;&#2342; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Split view</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2381;&#2354;&#2367;&#2335; &#2357;&#2381;&#2351;&#2370;</span>",
      "<span class=\"eqt\">Zoom view</span><span class=\"hqt\" style=\"display:none\">&#2395;&#2370;&#2350; &#2357;&#2381;&#2351;&#2370;</span>",
      "<span class=\"eqt\">Page layout view</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2332; &#2354;&#2375;&#2310;&#2313;&#2335; &#2357;&#2381;&#2351;&#2370;</span>",
      "<span class=\"eqt\">Print preview</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2367;&#2306;&#2335; &#2346;&#2381;&#2352;&#2368;&#2357;&#2381;&#2351;&#2370;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The term for a feature that allows you to view and edit two different parts of a document at the same time, such as different pages or sections, is \"Split view.\" </p><p>&#183; Split view divides the document window into multiple panes, each displaying a different part of the document. </p><p>&#183; This can be particularly helpful when working with long documents or when you need to reference one part of the document while editing another. </p><p>&#183; Split view is commonly found in word processing and document editing software.</p>",
    "question_index": 149
  }
