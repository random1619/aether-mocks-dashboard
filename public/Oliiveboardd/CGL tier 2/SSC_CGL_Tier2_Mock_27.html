        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If a 30-sided polygon is transformed into a 13-sided polygon, then the sum of interior angles of 30-sided polygon is reduced by</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; 30-&#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2375; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2379; 13-&#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2375; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; 30-&#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2375; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2375; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2325;&#2379;&#2339;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2325;&#2367;&#2340;&#2344;&#2366; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1980&deg;</span><span class=\"hqt\" style=\"display:none\">1980<sup>o</sup></span>",
      "<span class=\"eqt\">3060&deg;</span><span class=\"hqt\" style=\"display:none\">3060<sup>o</sup></span>",
      "<span class=\"eqt\">4842&deg;</span><span class=\"hqt\" style=\"display:none\">4842<sup>o</sup></span>",
      "<span class=\"eqt\">5475&deg;</span><span class=\"hqt\" style=\"display:none\">5475<sup>o</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to the Question,</p><p>If N is the number of sides of the polygon, then sum of its interior angles = (N-2) x 180&deg;</p><p>Sum of interior angles of 30-sided polygon = (30-2) x 180&deg; = 5040&deg;</p><p>Sum of interior angles of 13-sided polygon = (13-2) x 180&deg; = 1980&deg;</p><p>If a 30-sided polygon is transformed into a 13-sided polygon, then the sum of interior angles of 30-sided polygon is reduced by = Sum of interior angles of 30-sided polygon - Sum of interior angles of 13-sided polygon</p><p>= 5040&deg;  -  1980&deg;</p><p>=3060&deg; Ans.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If cosecA = <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>11</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>5</span></div>, then the value of (tanA + secA) &times; cotA is &#58;&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; cosecA = <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>11</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>5</span></div>, &#2340;&#2379; (tanA + secA) X cotA &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; :</p></span>",
    "options": [
      "<span class=\"eqt\">16/5</span><span class=\"hqt\" style=\"display:none\">16/5</span>",
      "<span class=\"eqt\">6/5</span><span class=\"hqt\" style=\"display:none\">6/5</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">16/11</span><span class=\"hqt\" style=\"display:none\">16/11</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>(tanA + secA) * cot A</p><p>= 1 + secA * cot A</p><p>= 1 + (1/sinA)</p><p>= 1 + cosec A</p><p>= 1 + (11/5)</p><p>= 16/5</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following figure, if WX + XY + YW = 32 cm, XY = 8 cm, XV = 4.5 cm. Find the value of x, if WT = x cm.</p><p><img width=335 height=331 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20572/image001.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2368;&#2332;&#2367;&#2319;, &#2351;&#2342;&#2367; WX + XY + YW = 32 cm, XY = 8 cm, XV = 4.5 cm &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; WT = x cm &#2361;&#2376;, &#2340;&#2379; x &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"335\" height=\"331\" id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20572/image001.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">8 cm</span><span class=\"hqt\" style=\"display:none\">8 cm</span>",
      "<span class=\"eqt\">6 cm</span><span class=\"hqt\" style=\"display:none\">6 cm</span>",
      "<span class=\"eqt\">6.5 cm</span><span class=\"hqt\" style=\"display:none\">6.5 cm</span>",
      "<span class=\"eqt\">7.5 cm</span><span class=\"hqt\" style=\"display:none\">7.5 cm</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>XY = 8 cm</p><p>XV = 4.5 cm</p><p>So, VY = 8  -  4.5 = 3.5 cm</p><p>We know that tangents drawn from a single point on a circle are equal.</p><p>So,</p><p>WU = WT = x cm</p><p>XT = XV = 4.5 cm</p><p>VY = UY = 3.5 cm</p><p>Given,</p><p>XW + WY + XY = 32</p><p>x + 4.5 + x + 3.5 + 8 = 32</p><p>2x = 16</p><p>x = 8 cm</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p><span>Two men can do a piece of work in&nbsp;</span><span><i>x</i></span><span>&nbsp;days. But y women can do it in 3 days. Then the ratio of the work done by 1 woman and 1 man is:</span></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2346;&#2369;&#2352;&#2369;&#2359; &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; x &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2354;&#2375;&#2325;&#2367;&#2344; y &#2350;&#2361;&#2367;&#2354;&#2366;&#2319;&#2305; &#2311;&#2360;&#2375; 3 &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; 1 &#2350;&#2361;&#2367;&#2354;&#2366; &#2324;&#2352; 1 &#2346;&#2369;&#2352;&#2369;&#2359; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2375; &#2327;&#2319; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">3y: 2x</span><span class=\"hqt\" style=\"display:none\">3y: 2x</span>",
      "<span class=\"eqt\">2x: 3y</span><span class=\"hqt\" style=\"display:none\">2x: 3y</span>",
      "<span class=\"eqt\">x: y</span><span class=\"hqt\" style=\"display:none\">x: y</span>",
      "<span class=\"eqt\">2y: 3x</span><span class=\"hqt\" style=\"display:none\">2y: 3x</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>1 man's 1-day work = 1/2x</p><p>1 woman's 1-day work = 1/3y</p><p>Required ratio = (1/3y): (1/2x) = 2x: 3y</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The following data is given in ascending order. The median of the data is 138, then find the value of 'p'.</p><p>100, 118, 124, 3p + 10, 2(2p  -  7), 160, 170, 210</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2305;&#2325;&#2396;&#2375;&#2306; &#2310;&#2352;&#2379;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2342;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2361;&#2376;&#2306;&#2404; &#2310;&#2305;&#2325;&#2396;&#2379;&#2306; &#2325;&#2368; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; 138 &#2361;&#2376;, &#2340;&#2379; 'p' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><p>100, 118, 124, 3p + 10, 2(2p - 7), 160, 170, 210</p></span>",
    "options": [
      "<span class=\"eqt\">50</span><span class=\"hqt\" style=\"display:none\">50</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>",
      "<span class=\"eqt\">70</span><span class=\"hqt\" style=\"display:none\">70</span>",
      "<span class=\"eqt\">40</span><span class=\"hqt\" style=\"display:none\">40</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>100, 118, 124, 3p + 10, 2(p  -  7), 160, 170, 210</p><p>Number of terms = 8</p><p>Median = (4<sup>th</sup> + 5<sup>th</sup>)term/2 = 138</p><p>[3p + 10 + 2(2p  -  7)] = 2*138</p><p>7p  -  4 = 276</p><p>p = 40</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The angles of elevation of a light house from two boat are 45&#730; and 60&#730;. The boats are on same side of the light house. If the distance between the boats is 20 m, then find the height of the lighthouse.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2344;&#2366;&#2357;&#2379;&#2306; &#2360;&#2375; &#2319;&#2325; &#2354;&#2366;&#2311;&#2335; &#2361;&#2366;&#2313;&#2360; &#2325;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 45&deg; &#2324;&#2352; 60&deg; &#2361;&#2376;&#2306;&#2404; &#2344;&#2366;&#2357;&#2375;&#2306; &#2354;&#2366;&#2311;&#2335; &#2361;&#2366;&#2313;&#2360; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2323;&#2352; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2344;&#2366;&#2357;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 20 m &#2361;&#2376;, &#2340;&#2379; &#2354;&#2366;&#2311;&#2335; &#2361;&#2366;&#2313;&#2360; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">20(&radic;3 + 1) m</span><span class=\"hqt\" style=\"display:none\">20(&radic;3 + 1) m</span>",
      "<span class=\"eqt\">10(&radic;3  -  1) m</span><span class=\"hqt\" style=\"display:none\">10(&radic;3 - 1) m</span>",
      "<span class=\"eqt\">10&radic;3(&radic;3 + 1) m</span><span class=\"hqt\" style=\"display:none\">10&radic;3(&radic;3 + 1) m</span>",
      "<span class=\"eqt\">20&radic;3(&radic;3  -  1) m</span><span class=\"hqt\" style=\"display:none\">20&radic;3(&radic;3 - 1) m</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=200 height=187 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21402/image002.jpg\"></p><p>Let BD = a meter</p><p>In &#8710;ABD-</p><p>tan60&#730; = AB/BD</p><p>&radic;3 = AB/a</p><p>AB = a&radic;3 -----(1)</p><p>In &#8710;ABC-</p><p>tan45&#730; = AB/BC</p><p>1 = AB/(a+20)</p><p>AB = a + 20 ------(2)</p><p>From equation (1) and (2)-</p><p>a&radic;3 = a + 20</p><p>a = 20/(&radic;3  -  1)</p><p><img width=143 height=57 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21402/image003.png\"></p><p>a = 10(&radic;3 +1) m</p><p>So, AB = 10&radic;3(&radic;3+1) m</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The area of a circular park is 3850 m&#178;. A path of width 7 m surrounds the park. Find the area of the path.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2346;&#2366;&#2352;&#2381;&#2325; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 3850 &#2357;&#2352;&#2381;&#2327; &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;&#2404; &#2346;&#2366;&#2352;&#2381;&#2325; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; 7 &#2350;&#2368;&#2335;&#2352; &#2330;&#2380;&#2337;&#2364;&#2366; &#2319;&#2325; &#2346;&#2341; &#2348;&#2344;&#2366; &#2361;&#2376;&#2404; &#2346;&#2341; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1694 m&#178;</span><span class=\"hqt\" style=\"display:none\">1694 &#2350;&#2368;&#178;</span>",
      "<span class=\"eqt\">1720 m&#178;</span><span class=\"hqt\" style=\"display:none\">1720 &#2350;&#2368;&#178;</span>",
      "<span class=\"eqt\">1800 m&#178;</span><span class=\"hqt\" style=\"display:none\">1800 &#2350;&#2368;&#178;</span>",
      "<span class=\"eqt\">1600 m&#178;</span><span class=\"hqt\" style=\"display:none\">1600 &#2350;&#2368;&#178;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let, the inner radius be 'r' m.</p><p>(22/7)  X  r&#178; = 3850</p><p>=&gt; r&#178; = (3850  X  7) / 22 = 1225</p><p>=&gt; r = &radic;1225 = 35 m</p><p>Outer radius = 35 + 7 = 42 m</p><p>Area including the path = (22/7)  X  42&#178; = (22/7)  X  1764 = 5544 m&#178;</p><p>Area of the path = 5544 &#8722; 3850 = 1694 m&#178;</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>&#160;Find the sum of Radius of circumcircle and incircle of right-angled triangle whose perpendicular sides are x and y.</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2325;&#2379;&#2339; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2375; &#2346;&#2352;&#2367;&#2357;&#2371;&#2340;&#2381;&#2340; &#2324;&#2352; &#2309;&#2306;&#2340;&#2307;&#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;, &#2332;&#2367;&#2344;&#2325;&#2368; &#2354;&#2306;&#2348; &#2349;&#2369;&#2332;&#2366;&#2319;&#2305; x &#2324;&#2352; y &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;(x<sup>2</sup> + y<sup>2</sup>) / 2</span><span class=\"hqt\" style=\"display:none\">&radic;(x<sup>2</sup> + y<sup>2</sup>) / 2</span>",
      "<span class=\"eqt\">(x+y)/2</span><span class=\"hqt\" style=\"display:none\">(x+y)/2</span>",
      "<span class=\"eqt\">xy/2</span><span class=\"hqt\" style=\"display:none\">xy/2</span>",
      "<span class=\"eqt\">2xy</span><span class=\"hqt\" style=\"display:none\">2xy</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>\"</p><p>In circle radius = (P + B - H)/2</p><p>Circum radius = H/2</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/2815c5f73f5dee2dc6442f89b8acf5d6.png\" /></p><p>\"</p>",
    "question_index": 7

    "question": "<span class=\"eqt\"><p>If the average of 9 consecutive numbers starting with P is X. find the average of 8 consecutive numbers starting with P+ 5. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; P &#2360;&#2375; &#2358;&#2369;&#2352;&#2369; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; 9 &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; X &#2361;&#2376;, &#2340;&#2379; P+ 5 &#2360;&#2375; &#2358;&#2369;&#2352;&#2369; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; 8 &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Mohan, Keshav, and Madhav received some square feet land from their father in the ratio of 12: 35: 15 and Mohan, and Keshav sold some of the land in the ratio of 4: 7. If Mohan received 75% of land of what Keshav sold and Madhav sold 25% less land than what Mohan sold, then what is the ratio of land still have Mohan, Keshav, and Madhav?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2379;&#2361;&#2344;, &#2325;&#2375;&#2358;&#2357; &#2324;&#2352; &#2350;&#2366;&#2343;&#2357; &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; &#2346;&#2367;&#2340;&#2366; &#2360;&#2375; 12: 35: 15 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2357;&#2352;&#2381;&#2327; &#2347;&#2369;&#2335; &#2325;&#2368; &#2332;&#2350;&#2368;&#2344; &#2350;&#2367;&#2354;&#2368; &#2340;&#2341;&#2366; &#2350;&#2379;&#2361;&#2344; &#2324;&#2352; &#2325;&#2375;&#2358;&#2357; &#2344;&#2375; &#2325;&#2369;&#2331; &#2332;&#2350;&#2368;&#2344; 4: 7 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330; &#2342;&#2368;&#2404; &#2351;&#2342;&#2367; &#2350;&#2379;&#2361;&#2344; &#2325;&#2379; &#2325;&#2375;&#2358;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2332;&#2350;&#2368;&#2344; &#2325;&#2366; 75% &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2310; &#2324;&#2352; &#2350;&#2366;&#2343;&#2357; &#2344;&#2375; &#2350;&#2379;&#2361;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2332;&#2350;&#2368;&#2344; &#2360;&#2375; 25% &#2325;&#2350; &#2332;&#2350;&#2368;&#2344; &#2348;&#2375;&#2330;&#2368;, &#2340;&#2379; &#2350;&#2379;&#2361;&#2344;, &#2325;&#2375;&#2358;&#2357; &#2324;&#2352; &#2350;&#2366;&#2343;&#2357; &#2325;&#2375; &#2346;&#2366;&#2360; &#2358;&#2375;&#2359; (&#2309;&#2349;&#2368; &#2349;&#2368; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;) &#2332;&#2350;&#2368;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">20: 133: 57</span><span class=\"hqt\" style=\"display:none\">20: 133: 57</span>"

    "correct_option_id": 3,
    "solution": "<p>Let Mohan, Keshav, and Madhav received 12x square feet land, 35x square feet land, and 15x square feet land, respectively.</p><p>Let Mohan, and Keshav sold 4y square feet land, and 7y square feet land, respectively.</p><p>According to the question,</p><p>12x = 3/4 * 7y</p><p>=&gt; x = 7y/16</p><p>Madhav sold 25% less land than what Mohan sold</p><p>So, Madhav sold = 75/100 * 4y = 3y</p><p>So, Mohan still have = 12x  -  4y = 12 * 7y/16  -  4y = 5y/4 square feet</p><p>And Keshav still have = 35x  -  7y = 35 * 7y/16  -  7y = 133y/16 square feet</p><p>And Madhav still have = 15x  -  3y = 15 * 7y/16  -  3y = 57y/16</p><p>So, required ratio = 5y/4: 133y/16: 57y/16 = 20: 133: 57</p>",

    "question": "<span class=\"eqt\"><p><div>&nbsp;If a =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2 + &radic;3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">2 - &radic;3</span></div>&nbsp;and b =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2 - &radic;3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">2 + &radic;3</span></div>&nbsp;, then find a<sup>2</sup> + b<sup>2</sup> - ab&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; a =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2 + &radic;3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">2 - &radic;3</span></div>&nbsp; &#2324;&#2352;  b =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2 - &radic;3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">2 + &radic;3</span></div>&nbsp; &#2361;&#2376;, &#2340;&#2379; a<sup>2</sup> + b<sup>2</sup> - ab &#2350;&#2366;&#2344; &#2332;&#23     "question": "<span class=\"eqt\"><p>A train overtakes two students who are running at the rate of 30 km/hr and 24 km/hr in the same direction in which the train is running and passes them completely in 40 seconds and 36 seconds respectively. Find the length of the train and the speed of the train respectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2335;&#2381;&#2352;&#2375;&#2344; &#2360;&#2350;&#2366;&#2344; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; 30 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352;/&#2328;&#2306;&#2335;&#2366; &#2324;&#2352; 24 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2342;&#2380;&#2396; &#2352;&#2361;&#2375; &#2342;&#2379; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2310;&#2327;&#2375; &#2344;&#2367;&#2325;&#2354;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 40 &#2360;&#2375;&#2325;&#2306;&#2337; &#2324;&#2352; 36 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2346;&#2366;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2381;&#2352;&#2375;&#2344; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2327;&#2340;&#2367; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">600 meters, 42 km/hr</span><span class=\"hqt\" style=\"display:none\">600 &#2350;&#2368;&#2335;&#2352;, 42 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">300 meters 80 km/hr</span><span class=\"hqt\" style=\"display:none\">300 &#2350;&#2368;&#2335;&#2352;, 80 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">600 meters 84 km/hr</span><span class=\"hqt\" style=\"display:none\">600 &#2350;&#2368;&#2335;&#2352;, 84 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">300 meters, 84 km/hr</span><span class=\"hqt\" style=\"display:none\">300 &#2350;&#2368;&#2335;&#2352;, 84 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>\"</p><p>The speed of train be x km/hr and the length of train be y meters.</p><p>Now, A/Q,</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-000741.png\"/></p><p>&#8594; 18y = 200(x &#8211; 30)</p><p>&#8594; 9y = 100x &#8211; 3000</p><p>&#8594; 100x &#8211; 9y = 3000 &#8230;&#8230;.(i)</p><p>Also, <img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-000740.png\"/></p><p>&#8594; y = 10x &#8211; 240</p><p>&#8594; 10x &#8211; y = 240 &#8230;&#8230;.(ii)</p><p>Multiplying eqn (ii) by 9 and subtracting it from eqn (i), we get</p><p>&#8594; 10x = 840</p><p>&#8756; x = 84 km/hour</p><p>Putting it in eq (ii), we get</p><p>&#8594; y = 600 meters</p><p>&#8756; Required length of train = 600 meters and</p><p>Required speed of the train = 84 km/hour\"</p><p></p><p><b> Express Method </b></p><p>Let the speed of the train be v km/hr and the length of the train be L metres.</p><p>When both are moving in the same direction,</p><p>the ratio of times is equal to the ratio of relative speeds (reversed):</p><p>t&#8321; / t&#8322; = (v - s&#8322;) / (v - s&#8321;)</p><p>40 / 36 = (v - 24) / (v - 30)</p><p>10(v - 30) = 9(v - 24)</p><p>10v - 300 = 9v - 216</p><p>v = 84 km/hr</p><p>Now, the length of the train,</p><p>L = [(v - 24)  5/18]  36</p><p>L = [(84 - 24)  5/18]  36</p><p>L = (60  5/18)  36</p><p>L = (300/18)  36</p><p>L = 600 metres</p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>600 gm mixture of pepper powder and cumin powder, the percentage of cumin powder is only 35%, 100 gm of this mixture taken out and then added 100 gm of cumin powder to the remaining mixture. What is the percentage of cumin powder in the final mixture? (Nearest to an integer)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2354;&#2368; &#2350;&#2367;&#2352;&#2381;&#2330; &#2346;&#2366;&#2313;&#2337;&#2352; &#2324;&#2352; &#2332;&#2368;&#2352;&#2366; &#2346;&#2366;&#2313;&#2337;&#2352; &#2325;&#2375; 600 gm &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2332;&#2368;&#2352;&#2366; &#2346;&#2366;&#2313;&#2337;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2375;&#2357;&#2354; 35% &#2361;&#2376;, &#2311;&#2360; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2366; 100 gm &#2344;&#2367;&#2325;&#2366;&#2354; &#2354;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2347;&#2367;&#2352; &#2358;&#2375;&#2359; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; 100 gm &#2332;&#2368;&#2352;&#2366; &#2346;&#2366;&#2313;&#2337;&#2352; &#2350;&#2367;&#2354;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2309;&#2306;&#2340;&#2367;&#2350; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2332;&#2368;&#2352;&#2366; &#2346;&#2366;&#2313;&#2337;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;? (&#2319;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; &#2325;&#2375; &#2344;&#2367;&#2325;&#2335;&#2340;&#2350;)</p></span>",

    "solution": "<p>The concept of cyclicity is used to identify the last digit of the number.</p><p>Cyclicity chart:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\" rowspan=\"2\">Number</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\" rowspan=\"2\">Cyclicity</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\" colspan=\"4\">Unit digit values</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 4</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">0</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">0</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td ;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table><p>(Note: when remainder is 0, power = cyclicity)</p><p>In 112<sup>80</sup>:</p><p>Unit digit of 112 is 2.</p><p>From the cyclicity chart, cyclicity of 2 is 4.</p><p>So, we have to divide the power of 112 i.e.80 by 4.</p><p>After dividing 80 by 4, remainder = 0. So, power = cyclicity = 4</p><p>Unit digit of 2<sup>4</sup>=6</p><p>In 457<sup>104</sup>:</p><p>Unit digit of 457 is 7.</p><p>From the cyclicity chart, cyclicity of 7 is 4.</p><p>So, we have to divide the power of 457 i.e.104 by 4.</p><p>After dividing 104 by 4, remainder = 0. So, power = cyclicity = 4</p><p>Unit digit of 7<sup>4</sup>=1</p><p>In 293<sup>96</sup>:</p><p>Unit digit of 293 is 3.</p><p>From the cyclicity chart, cyclicity of 3 is 4.</p><p>So, we have to divide the power of 293 i.e.96 by 4.</p><p>After dividing 96 by 4, remainder = 0. So, power = cyclicity = 4</p><p>Unit digit of 3<sup>4</sup>=1</p><p>     "question": "<span class=\"eqt\"><p>Garima Garg deposited &#8377;5000 for 6 years, &#8377;4500 for 8 years, and &#8377;6500 for 4 years with same rate of simple interest. She received a total simple interest of &#8377;4600. What is the rate of interest per annum?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2352;&#2367;&#2350;&#2366; &#2327;&#2352;&#2381;&#2327; &#2344;&#2375; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2360;&#2350;&#2366;&#2344; &#2342;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; 6 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;5000, 8 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;4500 &#2324;&#2352; 4 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;6500 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;| &#2313;&#2360;&#2344;&#2375; &#2325;&#2369;&#2354; &#8377;4600 &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366;| &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">8%</span><span class=\"hqt\" style=\"display:none\">8%</span>",
      "<span class=\"eqt\">7%</span><span class=\"hqt\" style=\"display:none\">7%</span>",
      "<span class=\"eqt\">6%</span><span class=\"hqt\" style=\"display:none\">6%</span>",
      "<span class=\"eqt\">5%</span><span class=\"hqt\" style=\"display:none\">5%</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the rate of interest be r% per annum.</p><p>&#8756; 4600 = (5000 * 6 * r/100) + (4500 * 8 * r/100) + (6500 * 4 * r/100)</p><p>=&gt; 4600 = 300r + 360r + 260r</p><p>=&gt; 4600 = 920r</p><p>=&gt; r = 5%</p>",
    "question_index": 27

    "question": "<span class=\"eqt\"><p>In a class of 100 students, 36 take science, 52 take art, and 4 take both science and art. What are the odds against that a student in the class is not enrolled in either science or art?</p></span><span class=\"hqt\" style=\"display:none\"><p>100 &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306;, 36 &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344;, 52 &#2325;&#2354;&#2366; &#2340;&#2341;&#2366; 4 &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2324;&#2352; &#2325;&#2354;&#2366; &#2342;&#2379;&#2344;&#2379;&#2306; &#2354;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2368; &#2331;&#2366;&#2340;&#2381;&#2352; &#2325;&#2375; &#2351;&#2366; &#2340;&#2379; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2351;&#2366; &#2325;&#2354;&#2366; &#2350;&#2375;&#2306; &#2344;&#2366;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; &#2344; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2360;&#2306;&#2351;&#2379;&#2327;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">21/25</span><span class=\"hqt\" style=\"display:none\">21/25</span>",
      "<span class=\"eqt\">4/21</span><span class=\"hqt\" style=\"display:none\">4/21</span>",
      "<span class=\"eqt\">4/25</span><span class=\"hqt\" style=\"display:none\">4/25</span>",
      "<span class=\"eqt\">21/4</span><span class=\"hqt\" style=\"display:none\">21/4</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>P(Science) = 36/100</p><p>P(art) = 52/100</p><p>P(science &#8746; art) = 36/100 + 52/100 - 4/100</p><p>= 84/100</p><p>P(science &#8746; art)<sup>c</sup> = 1 - 84/100 = 16/100 = 4/25</p><p>We know that odds against of an event E = P(E<sup>c</sup>)/P(E)</p><p>Odds against that a student in the class is not enrolled in either science or art = (25 - 4)/4 = 21/4</p>",
    "question_index": 29

    "question": "<span class=\"eqt\"><p>Find the simple interest earned on a principal amount for 2 years.</p><p>Statements:</p><p>I. The principal amount is &#8377;5,000.</p><p>II. The rate of interest per annum is 8%.</p><p>III. Simple interest formula is SI = (P  X  R  X  T) / 100.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2350;&#2370;&#2354;&#2343;&#2344; &#2346;&#2352; 2 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>I. &#2350;&#2370;&#2354;&#2343;&#2344; &#8377;5,000 &#2361;&#2376;&#2404;</p><p>II. &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2342;&#2352; 8% &#2361;&#2376;&#2404;</p><p>III. &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2366; &#2360;&#2370;&#2340;&#2381;&#2352; SI = (P X R X T) / 100 &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only statements I and II are sufficient</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; I &#2324;&#2352; II &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only statement III is sufficient</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; III &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Statements II and III are sufficient</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; II &#2324;&#2352; III &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">All three statements are necessary</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>From I and II alone, the principal and rate are known but without the formula, interest cannot be computed.</p><p>From I and III alone, the principal and formula are given but the rate is unspecified.</p><p>From II and III alone, the rate and formula are given but the principal is unspecified.</p><p>All three statements together provide principal (&#8377;5,000), rate (8%) and formula, making it possible to calculate the simple interest.</p>",

    "question": "<span class=\"eqt\"><p>In a certain code language: </p><p>'A &gt; B' means 'A is the sister of B'. </p><p>'A &lt; B' means 'A is the brother of B'. </p><p>'A - B' means 'A is the daughter of B'. </p><p>'A + B' means 'A is the mother of B'.</p><p>'A * B' means 'A is the son of B'.</p><p>Which of the following expressions means that F is the niece of H?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;: </p><p>'A &gt; B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;'&#2404; </p><p>'A &lt; B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;'&#2404; </p><p>'A - B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2348;&#2375;&#2335;&#2368; &#2361;&#2376;'&#2404; </p><p>'A + B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2350;&#2366;&#2305; &#2361;&#2376;'&#2404;</p><p>'A * &#8203;&#8203;B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2348;&#2375;&#2335;&#2366; &#2361;&#2376;'&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; F, H &#2325;&#2368; &#2349;&#2340;&#2368;&#2332;&#2368; &#2361;&#2376;?</p></span>",

    "solution": "<p><img width=630 height=256 id=\"Picture 70\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28899/image010.jpg\"></p><p>It is given that,</p><p>'A &gt; B' means 'A is the sister of B'. </p><p>'A &lt; B' means 'A is the brother of B'. </p><p>'A - B' means 'A is the daughter of B'. </p><p>'A + B' means 'A is the mother of B'.</p><p>'A * B' means 'A is the son of B'.</p><p>After decoding we get:</p><p>1) F - G &gt; H</p><p>F is the daughter of G. G is the sister of H. </p><p><img width=88 height=86 id=\"Picture 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28899/image011.jpg\"></p><p>Thus, F is the niece of H. So, option (a) is correct. </p><p>2) F * G &lt; H </p><p>F is the son of G. G is the brother of H. </p><p><img width=107 height=81 id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28899/image012.jpg\"></p><p>Thus, F is the nephew of H. So, option (b) is incorrect. </p><p>3) H + G &gt; F </p><p>H is the mother of G. G is the sister of F. </p><p><img width=96 height=88 id=\"Picture 11\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28899/image013.jpg\"></p><p>So, F is the child of H. So, option (c) is incorrect. </p><p>4) H - G &lt; F </p><p>H is the daughter of G. G is the brother of F. </p><p><img width=114 height=83 id=\"Picture 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28899/image014.jpg\"></p><p>So, H is the niece of F. So, option (d) is incorrect. </p>",

    "question": "<span class=\"eqt\"><p>A question is given, followed by two statements numbers (I) and (II). You have to decide whether the data provided in the statements is sufficient to answer the question. Read both the statements and select the appropriate answer. </p><p>Question: Six people M, N, O, P, Q and R live in a building but not as stated. Only one person can live on one floor. Who is on the topmost floor? </p><p>Statements: </p><p>(I) M lives above N and R. O and Q lives below M. </p><p>(II) P lives above R. No one lives below O. One person lives between O and R. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2325;&#2341;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2306;&#2325;&#2367;&#2340; (I) &#2324;&#2352; (II) &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2370;&#2330;&#2344;&#2366; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376; &#2351;&#2366; &#2344;&#2361;&#2368;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2397;&#2367;&#2319; &#2324;&#2352; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><b>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;:</b> &#2331;: &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; M, N, O, P, Q &#2324;&#2352; R &#2319;&#2325; &#2311;&#2350;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2360;&#2350;&#2366;&#2344; &#2325;&#2381;&#2352;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2344;&#2361;&#2368;&#2306;&#2404; &#2319;&#2325; &#2350;&#2306;&#2332;&#2367;&#2354; &#2346;&#2352; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2352;&#2361; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2348;&#2360;&#2375; &#2314;&#2346;&#2352;&#2368; &#2350;&#2306;&#2332;&#2367;&#2354; &#2346;&#2352; &#2325;&#2380;&#2344; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;?</p><p><b>&#2325;&#2341;&#2344;: </b></p><p>(I) M, N &#2324;&#2352; R &#2325;&#2375; &#2314;&#2346;&#2352; &#2357;&#2366;&#2354;&#2368; &#2350;&#2306;&#2332;&#2367;&#2354; &#2346;&#2352; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404; O &#2324;&#2352; Q, M &#2325;&#2375; &#2344;&#2368;&#2330;&#2375; &#2357;&#2366;&#2354;&#2368; &#2350;&#2306;&#2332;&#2367;&#2354; &#2346;&#2352; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>(II) P, R &#2325;&#2375; &#2314;&#2346;&#2352; &#2357;&#2366;&#2354;&#2368; &#2350;&#2306;&#2332;&#2367;&#2354; &#2346;&#2352; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404; O &#2325;&#2375; &#2344;&#2368;&#2330;&#2375; &#2357;&#2366;&#2354;&#2368; &#2350;&#2306;&#2332;&#2367;&#2354; &#2346;&#2352; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404; O &#2324;&#2352; R &#2325;&#2375; &#2350;&#2306;&#2332;&#2367;&#2354;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Data in statements I and II together is not sufficient to answer the question.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2341;&#2344; I &#2324;&#2352; II &#2325;&#2368; &#2360;&#2370;&#2330;&#2344;&#2366; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Data in either statement I or statement II alone is sufficient to answer the question.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2366; &#2340;&#2379; &#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2341;&#2344; I &#2351;&#2366; &#2325;&#2341;&#2344; II &#2325;&#2368; &#2360;&#2370;&#2330;&#2344;&#2366; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Data in statement I alone is sufficient to answer the question while data in statement II is not.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2341;&#2344; I &#2325;&#2368; &#2360;&#2370;&#2330;&#2344;&#2366; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2325;&#2341;&#2344; II &#2325;&#2368; &#2360;&#2370;&#2330;&#2344;&#2366; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Data in statement II alone is sufficient to answer the question while data in statement I is not.</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2341;&#2344; II &#2325;&#2368; &#2360;&#2370;&#2330;&#2344;&#2366; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2325;&#2341;&#2344; I &#2325;&#2368; &#2360;&#2370;&#2330;&#2344;&#2366; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Six people M, N, O, P, Q and R live in a building but not as stated. Only one person can live on one floor.</p><p>Statement I: M lives above N and R. O and Q lives below M. </p><p>M &gt; N/R and M &gt; O/Q. </p><p>So, no definite arrangement can be established. </p><p>Thus, statement I alone is not sufficient. </p><p>Statement II: P lives above R. No one lives below O. One person lives between O and R. </p><p>P &gt; R &gt;__ &gt; O.</p><p>So, no definite arrangement can be established. </p><p>Thus, statement II alone is not sufficient. </p><p>From both statements I and II:</p><p>P &gt; M &gt; N/Q &gt; R &gt; N/Q &gt; O.</p><p>M &gt; P/N/Q &gt; P/N/Q &gt; R &gt; N/Q &gt; O.</p><p>Thus, both statements I and II together is not sufficient. </p>",
    "question_index": 46

    "question": "<span class=\"eqt\"><p>In this question, a statement is followed by two courses of action, numbered I and II. You must have to assume everything in the statement to be true and on the basis of the information given in the statement, decide which course of action/s logically follows for pursuing.</p><p>Statement: </p><p>The government is planting trees in between traffic dividers to boost the number of trees, but people in the surrounding areas are stealing them and growing them in their own homes.</p><p>Course of action:</p><p>I. The government should install \"Do not pick plants\" signs boards on traffic dividers. </p><p>II. The government should provide plants to residents at a very low or free of cost.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2341;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2357;&#2367;&#2343;&#2367; &#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325; I &#2324;&#2352; II &#2342;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2360;&#2349;&#2368; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2344;&#2366; &#8203;&#8203;&#2361;&#2379;&#2327;&#2366; &#2324;&#2352; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2354;&#2375;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366; &#2325;&#2367; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2357;&#2367;&#2343;&#2367; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>&#2360;&#2352;&#2325;&#2366;&#2352; &#2346;&#2375;&#2337;&#2364;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2335;&#2381;&#2352;&#2376;&#2347;&#2367;&#2325; &#2337;&#2367;&#2357;&#2366;&#2311;&#2337;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2346;&#2375;&#2337;&#2364; &#2354;&#2327;&#2366; &#2352;&#2361;&#2368; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2310;&#2360;-&#2346;&#2366;&#2360; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2354;&#2379;&#2327; &#2311;&#2344;&#2381;&#2361;&#2375;&#2306; &#2330;&#2369;&#2352;&#2366;&#2325;&#2352; &#2309;&#2346;&#2344;&#2375; &#2328;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2313;&#2327;&#2366; &#2352;&#2361;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2357;&#2367;&#2343;&#2367;:</p><p>I. &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2335;&#2381;&#2352;&#2376;&#2347;&#2367;&#2325; &#2337;&#2367;&#2357;&#2366;&#2311;&#2337;&#2352;&#2379;&#2306; &#2346;&#2352; \"&#2346;&#2380;&#2343;&#2375; &#2344; &#2354;&#2375;&#2306; &#2332;&#2366;&#2351;&#2375;&#2306;\" &#2360;&#2366;&#2311;&#2344; &#2348;&#2379;&#2352;&#2381;&#2337; &#2354;&#2327;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p>II. &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2344;&#2367;&#2357;&#2366;&#2360;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2348;&#2361;&#2369;&#2340; &#2325;&#2350; &#2309;&#2341;&#2357;&#2366; &#2350;&#2369;&#2347;&#2381;&#2340; &#2350;&#2375;&#2306; &#2346;&#2380;&#2343;&#2375; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2325;&#2352;&#2366;&#2344;&#2375; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p></span>",
    "options": [

    "correct_option_id": 2,

    "comp": "<p><b>Directions :</b>Read the following passage and answer the questions based on the passage. </p><p>The Halting Problem is a foundational concept in computer science and mathematical logic that illustrates intrinsic limits on computational predictability. First formulated by Alan Turing in 1936, the problem asks whether there exists a general algorithm capable of determining, for any arbitrary computer program and input, whether the program will eventually halt (terminate) or continue to run indefinitely. Turing demonstrated that no such universal algorithm can exist, revealing a fundamental boundary in the scope of computation and formal reasoning.</p><p>The Halting Problem addresses the question of decidability: the ability to devise a procedure that provides a definite answer for every possible case. Turing employed a method of self-reference, analogous to the logical constructions in G&#246;del's incompleteness theorems, to show that assuming the existence of such an algorithm leads to a contradiction. By considering a hypothetical program that halts if and only if it does not halt when given its own code as input, Turing exposed the impossibility of resolving the halting question universally. This result not only established the limits of computability but also highlighted the intricate connections between logic, mathematics, and computer science.</p><p>The implications of the Halting Problem are extensive. In software engineering, it underscores the impossibility of creating a program capable of perfectly predicting the behaviour of all other programs. Certain bugs, infinite loops, or runtime errors cannot be preemptively detected in general, illustrating why testing and verification, while essential, are inherently incomplete. In theoretical computer science, the Halting Problem serves as a prototype for undecidable problems, forming the basis for understanding complexity, algorithmic limitations, and the classification of problems according t     ],
    "correct_option_id": 1,
    "solution": "<p>The sentence given in option (b) is grammatically correct. </p><p>Options (a) and (d) are incorrect because of the subject-verb agreement issue. The subject \"Rajat\" is singular, so the correct verb form should be the singular \"has\" instead of plural \"have\". </p><p>Option (c) is also incorrect. The phrase \"since two weeks\" is incorrect. The word \"since\" is used to refer to a specific point in time when an action started. It is typically followed by a specific point in time (e.g., since Monday, since June). It is not used to indicate a duration of time like \"two weeks\". The correct preposition to use here is \"for\". \"For\" is used to indicate the duration of time something has been happening. Hence, (b) is the correct answer. </p><p><b>The correct sentence is:</b> Rajat has been working on this project for two weeks. </p><p><b>NOTE:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p><p><b>Subject-verb agreement</b> means that a subject and its verb must be both singular or both plural:</p><p>A singular subject takes a singular verb.</p><p>A plural subject takes a plural verb. </p><p>For example, in the sentence 'John lives in France', the subject John (singular 'he') 'agrees with' the third person singular form of the verb to live  -  lives.</p>",

    "question": "<p>Convert the sentence provided below from its active voice structure to a passive voice structure:</p><p>The construction workers were installing large solar panels on the rooftops of the entire residential complex to generate clean, renewable energy for the community.</p>",
    "options": [

      "Large solar panels were being installed on the rooftops of the entire residential complex by the construction workers to generate clean, renewable energy for the community.",
      "Large solar panels is being installed on the rooftops of the entire residential complex by the construction workers to generate clean, renewable energy for the community."
    ],
    "correct_option_id": 2,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of verb ['being'] is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in this question is in <b>Past Continuous</b>. Thus, the Passive voice will also be in Past Continuous.</p><p>The format of the Active voice is: Subject + was/were + V1 + ing + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + was/were + being + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>Amit was practising Math. (Active Voice)</p><p>Math was being practised by Amit. (Passive Voice)</p><p>The options except (c) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is option (c): Large solar panels were being installed on the rooftops of the entire residential complex by the construction workers to generate clean, renewable energy for the community.</p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",

    "options": [
      "Hypotenese",
      "Trigonometry",
      "Quadratic",
      "Pythagoras"
    ],
    "correct_option_id": 0,
    "solution": "<p>Hypotenese - This is the misspelled word. The correct spelling is \"Hypotenuse.\" The hypotenuse is the longest side of a right-angled triangle, opposite the right angle. Hence, (a) is the correct answer. </p><p>Trigonometry  -  It is a branch of mathematics that deals with the relationships between the angles and sides of triangles, particularly right triangles. </p><p>Quadratic  -  It refers to a mathematical expression or equation often having two solutions, known as roots.</p><p>Pythagoras - Pythagoras was an ancient Greek mathematician and philosopher, best known for the Pythagorean theorem. </p>",
    "question_index": 104
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about Dev Kumar Meena's performance at 38th National Games of India 2025:</p><p>a. He broke the national record in the men's pole vault event by clearing 5.32m.</p><p>b. He bettered the previous national mark of 5.31m set by Tamil Nadu's Subramani Siva in the 2022 edition of the meet.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; 38&#2357;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2326;&#2375;&#2354; 2025 &#2350;&#2375;&#2306; &#2342;&#2375;&#2357; &#2325;&#2369;&#2350;&#2366;&#2352; &#2350;&#2368;&#2339;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2346;&#2379;&#2354; &#2357;&#2377;&#2354;&#2381;&#2335; &#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2350;&#2375;&#2306; 5.32 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2331;&#2354;&#2366;&#2306;&#2327; &#2354;&#2327;&#2366;&#2325;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2352;&#2367;&#2325;&#2377;&#2352;&#2381;&#2337; &#2340;&#2379;&#2337;&#2364;&#2366;&#2404;</p><p>b. &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2350;&#2368;&#2335; &#2325;&#2375; 2022 &#2360;&#2306;&#2360;&#2381;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306; &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2325;&#2375; &#2360;&#2369;&#2348;&#2381;&#2352;&#2350;&#2339;&#2367; &#2358;&#2367;&#2357;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; 5.31 &#2350;&#2368;&#2335;&#2352; &#2325;&#2375; &#2346;&#2367;&#2331;&#2354;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2352;&#2367;&#2325;&#2377;&#2352;&#2381;&#2337; &#2325;&#2379; &#2348;&#2375;&#2361;&#2340;&#2352; &#2348;&#2344;&#2366;&#2351;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">a only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">b only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Both a and b</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; b &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither a nor b</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; a &#2324;&#2352; &#2344; &#2361;&#2368; b</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Madhya Pradesh's Dev Kumar Meena broke the national record in the men's pole vault event en route to winning the gold medal at the National Games 2025 in Uttarakhand.</p><p>The 19-year-old Meena managed a clearance of 5.32m to better the previous national mark of 5.31m set by Tamil Nadu's Subramani Siva in the 2022 edition of the meet.</p><p></p><p></p><p>Update:</p><p>Later in June 2025, he broke this men's pole vault national record in the qualifying rounds of the FISU World University Games 2025 in Rhine-Ruhr, Germany.</p><p>Dev Kumar Meena cleared a new personal best of 5.40m with his second attempt at the mark to surpass his own previous record of 5.35m registered at the Federation Cup in Kochi earlier this year.</p><p></p><p></p><p></p><p></p>",
    "question_index": 105
  },

    "question": "<span class=\"eqt\"><p>Which of the following helps in maintaining a healthy Reserve Deposit Ratio (RDR)?</p><p>I. Cash Reserve ratio</p><p>II. Statutory Liquidity ratio</p><p>III. Vault cash in banks</p><p>IV. Foreign exchange.</p><p>Select the correct answer using the code:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2381;&#2357;&#2360;&#2381;&#2341; &#2352;&#2367;&#2332;&#2352;&#2381;&#2357; &#2332;&#2350;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; (&#2310;&#2352;&#2337;&#2368;&#2310;&#2352;) &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p><p>I. &#2344;&#2325;&#2342; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</p><p>II. &#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2340;&#2352;&#2354;&#2340;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</p><p>III. &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2340;&#2367;&#2332;&#2379;&#2352;&#2368; &#2344;&#2325;&#2342;&#2368;</p><p>IV. &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2404;</p><p>&#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">III and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">I, II, III and IV.</span><span class=\"hqt\" style=\"display:none\">I, II, III &#2324;&#2352; IV.</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Banks hold a part of the money people keep in their bank deposits as reserve money and loan out the rest to various investment projects. Reserve money consists of two things  -  <b>vault cash in banks and deposits of commercial banks with RBI</b>.</p><p>Banks use this reserve to meet the demand for cash by account holders.</p><p>Reserve deposit ratio (RDR) is the proportion of the total deposits commercial banks keep as reserves.</p><p>RBI uses various policy instruments to bring forth a healthy RDR in commercial banks, like the <b>Cash Reserve Ratio and statutory liquidity ratio. Hence, statements 1,2 and 3 are correct.</b></p><p></p>",
    "question_index": 106
  },
  {
    "question": "<span class=\"eqt\"><p>Elements in the same group of the periodic table have the same:</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2325;&#2375; &#2319;&#2325; &#2361;&#2368; &#2360;&#2350;&#2370;&#2361; &#2325;&#2375; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2327;&#2369;&#2339; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Atomic number</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Valence electrons</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2339;&#2369; &#2325;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Atomic mass</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Electron affinity</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344; &#2310;&#2340;&#2381;&#2350;&#2368;&#2351;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Elements in the same group (vertical column) of the periodic table are defined by having the same number of valence electrons, which are the electrons in the outermost shell of an atom.</p><p>Explanation of Options:</p><p>Atomic number: This is incorrect. The atomic number (number of protons) increases as you move down a group. For example, in Group 1, Hydrogen has an atomic number of 1, Lithium has 3, and Sodium has 11.</p><p>Valence electrons: This is the correct answer. The number of valence electrons determines an element's chemical properties and bonding behavior. For example, all elements in Group 1 (the alkali metals) have 1 valence electron. All elements in Group 17 (the halogens) have 7 valence electrons. This similarity in valence electron configuration is the reason why elements in the same group exhibit similar chemical properties.</p><p>Atomic mass: This is incorrect. The atomic mass increases significantly as you move down a group, due to the addition of more protons and neutrons in the nucleus.</p><p>Electron affinity: This is incorrect. Electron affinity, the energy change when an electron is added to a neutral atom, generally decreases (becomes less negative) as you move down a group, although there are exceptions. It is not the same for all elements in a group.</p><p>Further insights:</p><p>The periodic table is a masterful organization of elements. Its structure allows us to predict the properties of elements based on their position. The group number itself often indicates the number of valence electrons for the main group elements (Groups 1-2 and 13-18). For example, elements in Group 14 (like Carbon and Silicon) have 4 valence electrons.</p><p></p>",
    "question_index": 107
  },
  {
    "question": "<span class=\"eqt\"><p>The focal length of a convex lens is:</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2340;&#2381;&#2340;&#2354; &#2354;&#2375;&#2306;&#2360; &#2325;&#2368; &#2347;&#2379;&#2325;&#2360; &#2342;&#2370;&#2352;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Positive</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325;</span>",
      "<span class=\"eqt\">Negative</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325;</span>",
      "<span class=\"eqt\">Zero</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2370;&#2344;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Infinite</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2306;&#2340;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>According to the standard sign convention used in optics (the Cartesian sign convention), the focal length of a convex lens is considered positive.</p><p>Explanation:</p><p>A convex lens is a converging lens. This means it brings parallel rays of light to a focus at a point on the opposite side of the lens from which the light originates.</p><p>In the Cartesian sign convention:</p><p>- The optical center of the lens is the origin (0,0).</p><p>- Light is assumed to travel from left to right.</p><p>- Distances measured in the direction of light (to the right of the optical center) are positive.</p><p>- Distances measured against the direction of light (to the left of the optical center) are negative.</p><p>Since the principal focus of a convex lens, where parallel rays converge, is on the right side of the lens, its focal length is measured as a positive distance.</p><p>Conversely, a concave lens is a diverging lens, and its principal focus is on the same side as the incoming light, making its focal length negative.</p><p></p>",
    "question_index": 108
  },
  {
    "question": "<span class=\"eqt\"><p>In which phylum are animals soft-bodied and often protected by a shell?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2360;&#2306;&#2328; &#2325;&#2375; &#2332;&#2366;&#2344;&#2357;&#2352; &#2325;&#2379;&#2350;&#2354; &#2358;&#2352;&#2368;&#2352; &#2357;&#2366;&#2354;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2309;&#2325;&#2381;&#2360;&#2352; &#2325;&#2357;&#2330; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Echinodermata</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2368;&#2344;&#2379;&#2337;&#2352;&#2350;&#2366;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Arthropoda</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2381;&#2352;&#2379;&#2346;&#2379;&#2337;&#2364;&#2366;</span>",
      "<span class=\"eqt\">Mollusca</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2354;&#2360;&#2381;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Annelida</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2375;&#2354;&#2367;&#2337;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Phylum Mollusca is characterized by animals that have a soft, unsegmented body, which in many species is protected by a hard, calcareous shell.</p><p>Explanation of Options:</p><p>a) Echinodermata: This phylum includes animals like starfish, sea urchins, and sea cucumbers. They are characterized by a spiny skin and radial symmetry in adults, not a soft body with a shell.</p><p>b) Arthropoda: This is the largest phylum and includes insects, spiders, and crustaceans. Their defining features are a hard exoskeleton made of chitin and jointed appendages, not a soft body.</p><p>c) Mollusca: This is the correct answer. It is the second-largest phylum of invertebrate animals. The body plan generally includes a muscular foot for locomotion, a visceral mass containing the organs, and a mantle that often secretes a shell. Examples include snails, clams, oysters, and octopuses (which have lost their external shell through evolution).</p><p>d) Annelida: This phylum consists of segmented worms, such as earthworms and leeches. Their key characteristic is a body made up of a series of repeating segments. They are soft-bodied but do not have a shell.</p>",
    "question_index": 109
  },

    "question": "<span class=\"eqt\"><p>Which of the following organizations was/were founded by Raja Rammohan Roy?</p><p>I. Tattvabodhini Sabha</p><p>II. Atmiya Sabha</p><p>III. Prarthana Samaj</p><p>Select the correct answer using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2306;&#2327;&#2336;&#2344; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2352;&#2366;&#2332;&#2366; &#2352;&#2366;&#2350;&#2350;&#2379;&#2361;&#2344; &#2352;&#2366;&#2351; &#2344;&#2375; &#2325;&#2368; &#2341;&#2368;/&#2341;&#2375;?</p><p>I. &#2340;&#2340;&#2381;&#2340;&#2381;&#2357;&#2348;&#2379;&#2343;&#2367;&#2344;&#2368; &#2360;&#2349;&#2366;</p><p>II. &#2310;&#2340;&#2381;&#2350;&#2368;&#2351; &#2360;&#2349;&#2366;</p><p>III. &#2346;&#2381;&#2352;&#2366;&#2352;&#2381;&#2341;&#2344;&#2366; &#2360;&#2350;&#2366;&#2332;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In 1839, <b> Devendranath Tagore </b> established the <b> Tattvabodhini Sabha </b> to carry on Rammohan's ideals independent of the Brahma Samaj. It aimed at counteracting the rapid progress of Christianity in India and advocated the development of Vedantism.</p><p>In 1867, <b> Prarthana Samaj </b> was founded in Bombay by <b> Dr. Atmaram Pandurang </b>. It was an offshoot of Brahmo Samaj. It was a reform movement within Hinduism and concentrated on social reforms like inter-dining, inter-marriage, widow remarriage and uplift of women and depressed classes.</p><p>In 1815, Raja Rammohan Roy established the <b> Atmiya Sabha </b>. Later, it was developed into the Brahmo Sabha on August 1828. Through this organization, he preached that there is only one God.</p><p></p>",
    "question_index": 110
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about Asteroid belt and Kuiper belt.</p><p>I. Asteroid belt falls between planet mars and planet Jupiter, whereas Kuiper belt is found beyond the planet Neptune.</p><p>II. Comets originates from both Asteroid belt and Kuiper belt.</p><p>Which among the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2359;&#2369;&#2342;&#2381;&#2352;&#2327;&#2381;&#2352;&#2361; &#2348;&#2375;&#2354;&#2381;&#2335; &#2324;&#2352; &#2325;&#2369;&#2311;&#2346;&#2352; &#2348;&#2375;&#2354;&#2381;&#2335; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2325;&#2381;&#2359;&#2369;&#2342;&#2381;&#2352;&#2327;&#2381;&#2352;&#2361; &#2348;&#2375;&#2354;&#2381;&#2335; &#2350;&#2306;&#2327;&#2354; &#2327;&#2381;&#2352;&#2361; &#2324;&#2352; &#2348;&#2371;&#2361;&#2360;&#2381;&#2346;&#2340;&#2367; &#2327;&#2381;&#2352;&#2361; &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2325;&#2369;&#2311;&#2346;&#2352; &#2348;&#2375;&#2354;&#2381;&#2335; &#2344;&#2375;&#2346;&#2330;&#2381;&#2351;&#2370;&#2344; &#2327;&#2381;&#2352;&#2361; &#2325;&#2375; &#2310;&#2327;&#2375; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>II. &#2343;&#2370;&#2350;&#2325;&#2375;&#2340;&#2369; &#2325;&#2381;&#2359;&#2369;&#2342;&#2381;&#2352;&#2327;&#2381;&#2352;&#2361; &#2348;&#2375;&#2354;&#2381;&#2335; &#2324;&#2352; &#2325;&#2369;&#2311;&#2346;&#2352; &#2348;&#2375;&#2354;&#2381;&#2335; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2375; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct: The asteroid belt is a region of the solar system falling roughly between the planets Mars and Jupiter where the greatest concentration of asteroid orbits can be found.</p><p>Whereas Kuiper Belt is a donut-shaped region of icy bodies beyond the orbit of Neptune. There may be millions of these icy objects, collectively referred to as Kuiper Belt objects (KBOs) or trans-Neptunian objects (TNOs), in this distant region of our solar system.</p><p>Statement II is Incorrect: The Oort Cloud and the Kuiper Belt are thought to be sources of comets.</p><p>The Oort Cloud is a much more distant region of icy, comet-like bodies that surrounds the solar system, including the Kuiper Belt.</p><p></p>",
    "question_index": 111
  },
