    "question": "<span class=\"eqt\"><p>Consider the following statements about the jurisdiction of the Supreme Court:</p><p>I. Cases involving fundamental rights violations can be taken up to the Supreme Court directly.</p><p>II. Supreme Court doesn't have exclusive original jurisdiction over the federal disputes.</p><p>Select the correct statements using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2313;&#2354;&#2381;&#2354;&#2306;&#2328;&#2344; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2325;&#2379; &#2360;&#2368;&#2343;&#2375; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2354;&#2375; &#2332;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2360;&#2306;&#2328;&#2368;&#2351; &#2357;&#2367;&#2357;&#2366;&#2342;&#2379;&#2306; &#2346;&#2352; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2357;&#2367;&#2358;&#2375;&#2359; &#2350;&#2370;&#2354; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements I is correct.</b></p><p><b>Statement II is incorrect.</b></p><p><b><u>Original Jurisdiction of the Supreme Court</u></b></p><p>It means the case can be taken up <b>by the Supreme Court without appeal in lower courts</b>. However, it does not restrict the High Court from hearing the case. Example: Violation of fundamental rights</p><p>As a federal court, the Supreme Court decides the disputes between different units of the Indian Federation.</p><p>Any dispute between:</p><p>(a) Centre and one or more states; or</p><p>(b) Centre and any state or states on one side and one or more states on</p><p>the other; or</p><p>(c) Between two or more states.</p><p>In the above federal disputes, the Supreme Court has <b>exclusive original jurisdiction</b>.</p><p><b>Exclusive original jurisdiction means</b>, no other court can decide such disputes and original means, the power to hear such disputes in the first instance, not by way of appeal.</p><p></p>",
    "question_index": 112
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about Atal Innovation Mission.</p><p>I. It fosters the collaboration of Industry, government and academia in the country to promote innovation in the country.</p><p>II. It is an initiative of the Department of science and technology.</p><p>Which of the statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2335;&#2354; &#2311;&#2344;&#2379;&#2357;&#2375;&#2358;&#2344; &#2350;&#2367;&#2358;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2351;&#2361; &#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2344;&#2357;&#2366;&#2330;&#2366;&#2352; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;, &#2360;&#2352;&#2325;&#2366;&#2352; &#2324;&#2352; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2332;&#2327;&#2340; &#2325;&#2375; &#2360;&#2361;&#2351;&#2379;&#2327; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2361; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2324;&#2352; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2357;&#2367;&#2349;&#2366;&#2327; &#2325;&#2368; &#2319;&#2325; &#2346;&#2361;&#2354; &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I is correct</b>: The Atal Innovation Mission (AIM) is a flagship initiative set up by <b>the NITI Aayog </b>to promote innovation and entrepreneurship across the country. Its objectives are to create and promote an ecosystem of innovation and entrepreneurship in school, university, research institutions, MSME and industry levels.</p><p>The Atal Innovation Mission has the following two core functions:</p><p>a. Entrepreneurship promotion through Self-Employment and Talent Utilization, wherein innovators would be supported and mentored to become successful entrepreneurs.</p><p>b. Innovation promotion: to provide a platform where innovative ideas are generated.</p><p>It has multiple programs to encourage and support innovation in the country, namely:</p><p>1. <b>Atal Tinkering Labs</b>: To promote creative, innovative mind set in schools by setting up state of the art Atal Tinkering Labs (ATL) in schools across all districts across the country.</p><p>2. <b>Atal Incubators</b>: for Promoting entrepreneurship in universities and industry. At the university, NGO, SME and Corporate industry levels, AIM is setting up world-class Atal Incubators (AICs) that would trigger and enable successful growth of sustainable startups in every sector /state of the country, thereby promoting entrepreneurs and job creators in the country addressing both commercial and social entrepreneurship opportunities in India and applicable globally.</p><p>3. <b>Atal New India Challenges and Atal Grand Challenges</b>: To promote technology driven innovations and product creation for social and commercial impact.</p><p>4. Fostering Industry, Academia, Government and Global Collaborations.</p><p></p>",
    "question_index": 113
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about the Rig Veda.</p><p>I. It contains treatment for various diseases.</p><p>II. It is known as the Brahma Veda.</p><p>III. It provides the knowledge about economic condition of ancient India.</p><p>Which among the above statements is/are INCORRECT?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2315;&#2327;&#2381;&#2357;&#2375;&#2342; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2311;&#2360;&#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2352;&#2379;&#2327;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2330;&#2366;&#2352; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</p><p>II. &#2311;&#2360;&#2375; &#2348;&#2381;&#2352;&#2361;&#2381;&#2350; &#2357;&#2375;&#2342; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2351;&#2361; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2332;&#2381;&#2334;&#2366;&#2344; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">None of the given statements are correct.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2360;&#2361;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Only I and II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Vedas are the earliest known literature in India. The Vedas were written in Sanskrit and were handed down orally from one generation to the other. There are four Vedas, namely, the- Rig Veda, Yajur Veda, Sama Veda, and Atharva Veda.</p><p><u>Rigveda</u></p><p>I. It is the earliest of the Vedas. It is a collection of 1028 hymns in Vedic Sanskrit. Many of these are beautiful descriptions of nature.</p><p>II. The prayers are largely for seeking worldly prosperity</p><p>III. It is believed that these recitations are the natural outpouring of Vedic rishis experiencing a mentally transcendental stage.</p><p>IV. Some of the well-known rishis associated with Rigveda are Vasishta, Gautama, Vishwamitra, and Atri, etc.</p><p>V. Rig Veda provides us knowledge about social, political and economic condition of ancient India. <b>So, statement III is correct.</b></p><p><u>Yajur Veda</u></p><p>I. Yajur means sacrifice or worship. This Veda is concerned mostly with rites and mantras of different sacrifices.</p><p>II. It gives directions for the performance of the yajnas.</p><p>III. Being a treatise on rituals, it is the most popular of the four Vedas.</p><p><u>Sama Veda</u></p><p>I. Sama Veda consists of 16,000 ragas and raginis or musical notes.</p><p>II. The Sama Veda prescribes the tunes for the recitation of the hymns of the Rig Veda.</p><p><u>Atharva Veda</u></p><p>I. The <b>Atharva Veda is also known as the Brahma Veda</b>. It contains treatment for around ninety-nine diseases. <b>So, statements I and II are not correct.</b></p><p>II. The source of this Veda is traced to two rishis called Atharva and Angiras.</p><p>III. The Atharva Veda is of immense value as it represents the religious ideas at an early period of civilization.</p><p></p>",
    "question_index": 114
  },
  {
    "question": "<span class=\"eqt\"><p>The western disturbances which cause winter rain in North India originate in:</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2340;&#2381;&#2340;&#2352; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2358;&#2368;&#2340;&#2325;&#2366;&#2354;&#2368;&#2344; &#2357;&#2352;&#2381;&#2359;&#2366; &#2325;&#2366; &#2325;&#2366;&#2352;&#2339; &#2348;&#2344;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2357;&#2367;&#2325;&#2381;&#2359;&#2379;&#2349; &#2325;&#2361;&#2366;&#2305; &#2360;&#2375; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Bay of Bengal</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2368; &#2326;&#2366;&#2337;&#2364;&#2368;</span>",
      "<span class=\"eqt\">Arabian Sea</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2348; &#2360;&#2366;&#2327;&#2352;</span>",
      "<span class=\"eqt\">Mediterranean Sea</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2350;&#2343;&#2381;&#2351; &#2360;&#2366;&#2327;&#2352;</span>",
      "<span class=\"eqt\">Indian Ocean</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2306;&#2342; &#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Western Disturbances are extratropical storms that originate in the Mediterranean Sea region. These are shallow cyclonic depressions that travel eastwards, bringing sudden winter rain and snow to the northwestern parts of the Indian subcontinent.</p><p>Explanation of Options:</p><p>Bay of Bengal: This is the source of the main monsoon currents and cyclones that affect the eastern coast and North-East India, primarily during the monsoon and post-monsoon seasons, not the western disturbances.</p><p>Arabian Sea: This is a branch of the main southwest monsoon.</p><p>Mediterranean Sea: This is the correct origin point. These low-pressure systems are carried towards India by subtropical westerly jet streams.</p><p>Indian Ocean: The Indian Ocean is the primary source of moisture for the main summer monsoon, not the winter disturbances in the north.</p><p>Further insights:</p><p>Western disturbances are crucial for the rabi crops, including wheat, which are grown in North India during the winter.</p><p>They are also responsible for the snowfall in the higher reaches of the Himalayas, which replenishes glaciers that feed the major North Indian rivers.</p>",
    "question_index": 115
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article of the Constitution deals with the appointment of the Governor?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 153</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 153</span>",
      "<span class=\"eqt\">Article 155</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 155</span>",
      "<span class=\"eqt\">Article 156</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 156</span>",
      "<span class=\"eqt\">Article 158</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 158</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Article 155 of the Indian Constitution is the specific article that deals with the appointment of the Governor of a State.</p><p>Explanation of Options:</p><p>Article 153: This article states that \"There shall be a Governor for each State.\" It establishes the office of the Governor but does not detail the appointment process.</p><p>Article 155: This is the correct answer. It explicitly states, \"The Governor of a State shall be appointed by the President by warrant under his hand and seal.\" This means the Governor is an appointee of the central government, acting through the President.</p><p>Article 156: This article deals with the \"Term of office of Governor.\" It specifies that the Governor holds office during the pleasure of the President and can resign by writing to the President. The standard term is five years.</p><p>Article 158: This article lays down the \"Conditions of Governor's office,\" such as that the Governor cannot be a member of Parliament or a State Legislature and is not allowed to hold any other office of profit.</p><p>Further insights:</p><p>The appointment of the Governor by the President (on the advice of the Union Council of Ministers) is a key feature of India's federal structure, reflecting a system where the Centre holds significant sway over the States. The Governor acts as a constitutional head of the state as well as an agent of the central government.</p><p></p>",
    "question_index": 116
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was/were the reforms made in public sector units under New economic policy,1991?</p><p>I. Increase in the number of reserved sectors.</p><p>II. Reducing the government stakes in public sector undertakings.</p><p>III. Promoting public and private partnerships.</p><p>Select the correct answer using the code given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2312; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2344;&#2368;&#2340;&#2367;, 1991 &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2311;&#2325;&#2366;&#2311;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p><p>I. &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;&#2404;</p><p>II. &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2375; &#2313;&#2346;&#2325;&#2381;&#2352;&#2350;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375;&#2342;&#2366;&#2352;&#2368; &#2325;&#2350; &#2325;&#2352;&#2344;&#2366;&#2404;</p><p>III. &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2324;&#2352; &#2344;&#2367;&#2332;&#2368; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2368; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b> The New Industrial policy 1991 </b> has been adopted under which far-reaching structural reforms have been initiated to lift excess direct controls and regulations on industries and to ensure a free-market-oriented economic system. The reforms undertaken in the public sector includes</p><p>a. <b> Deregulation of Industries </b>: Number of industries reserved for the public sector was reduced from 17 to 4.</p><p>b. <b> Sale of shares </b>: Indian Govt. has been selling shares of PSU's to public and financial institution e.g. Govt. sold shares of Maruti Udyog Ltd.</p><p>c. In financing and developing social and physical infrastructure, economic reforms laid considerable emphasis on public-private partnership (PPP). The PPP projects typically involve transfer or lease of public assets.</p><p></p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>The AMRIT Sarovar Mission was launched in which year?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2350;&#2371;&#2340; &#2360;&#2352;&#2379;&#2357;&#2352; &#2350;&#2367;&#2358;&#2344; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">2020</span><span class=\"hqt\" style=\"display:none\">2020</span>",
      "<span class=\"eqt\">2019</span><span class=\"hqt\" style=\"display:none\">2019</span>",
      "<span class=\"eqt\">2022</span><span class=\"hqt\" style=\"display:none\">2022</span>",
      "<span class=\"eqt\">2023</span><span class=\"hqt\" style=\"display:none\">2023</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Mission Amrit Sarovar was launched by the Prime Minister of India on April 24, 2022.</p><p>The launch took place at Palli Gram Panchayat in Jammu and Kashmir on National Panchayati Raj Day.</p><p>Further insights:</p><p>Objective: The primary objective of the Amrit Sarovar Mission is to develop and rejuvenate at least 75 water bodies in every district of the country. This initiative is part of the \"Azadi Ka Amrit Mahotsav,\" the celebration of 75 years of Indian Independence.</p><p>Purpose: The mission aims to conserve water for the future. Each Amrit Sarovar (pond) is intended to have a water storage capacity of about 10,000 cubic meters and cover an area of approximately 1 acre.</p><p>Implementation: The mission is a collaborative effort involving several ministries of the Government of India, including the Ministry of Rural Development, Ministry of Jal Shakti, Ministry of Panchayati Raj, and Ministry of Environment, Forest & Climate Change. It emphasizes a \"Whole of Government\" and \"People's Participation\" approach.</p><p></p>",
    "question_index": 118
  },

    "question": "<span class=\"eqt\"><p>How many railway zones currently exist in India (as of 2025)?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2352;&#2375;&#2354;&#2357;&#2375; &#2332;&#2379;&#2344; &#2361;&#2376;&#2306; (2025 &#2340;&#2325;)?</p></span>",
    "options": [
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>As of early 2025, Indian Railways is divided into 18 operational zones. This number has been stable since the establishment of the South Coast Railway zone.</p><p>Explanation of Options:</p><p>The number of railway zones has been updated over the years.</p><p>The number of zones was 17 before the creation of the South Coast Railway.</p><p>The 18th zone, the South Coast Railway (SCoR), was announced in 2019 with its headquarters at Visakhapatnam.</p><p>While a 19th zone, the Konkan Railway, is sometimes mentioned, it currently operates as a subsidiary and is not officially designated as a separate railway zone in the same administrative category as the other 18.</p><p>Therefore, the official number of railway zones is 18.</p>",
    "question_index": 119
  },

    "question": "<span class=\"eqt\"><p>Read the following statements carefully and choose the correct option regarding Assertion (A) and Reason (R).</p><p>Assertion (A): During 2001-2011, Indian states like Kerala and Goa recorded a negative decadal growth rate of the adolescent population.</p><p>Reason (R): This was mainly due to a decline in fertility during the last two decades.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A) &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; (R) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): 2001-2011 &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2325;&#2375;&#2352;&#2354; &#2324;&#2352; &#2327;&#2379;&#2357;&#2366; &#2332;&#2376;&#2360;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2344;&#2375; &#2325;&#2367;&#2358;&#2379;&#2352; &#2310;&#2348;&#2366;&#2342;&#2368; &#2325;&#2368; &#2344;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2342;&#2358;&#2325;&#2368;&#2351; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2342;&#2352; &#2342;&#2352;&#2381;&#2332; &#2325;&#2368;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2351;&#2361; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2367;&#2331;&#2354;&#2375; &#2342;&#2379; &#2342;&#2358;&#2325;&#2379;&#2306; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2346;&#2381;&#2352;&#2332;&#2344;&#2344; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2350;&#2375;&#2306; &#2327;&#2367;&#2352;&#2366;&#2357;&#2335; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true and R is the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2324;&#2352; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true but R is not the correct explanation of A.</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true but R is false.</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false but R is true.</span><span class=\"hqt\" style=\"display:none\">A &#2327;&#2354;&#2340; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The absolute number of adolescents aged 10-19 years in India is 25,31,60,473, as per Census 2011 comprising 20.9 per cent of the total population of the country.</p><p>The youth population aged 15-24 is 23,18,78,057 persons accounting for 19.2 per cent of the total population.</p><p>In absolute terms, the total population of India increased by 181.9 million during the decade 2001-2011, while the corresponding increase in the number of adolescents and youth is 28.1 million and 41.8 million respectively.</p><p>For the country as a whole, the decadal growth rate of the adolescent population is 12.5 per cent during 2001-2011, though many of the states witnessed a negative rate of growth of the adolescent population during this period.</p><p>Among the bigger states, Kerala showed the highest negative decadal growth (-9.0%), followed by Goa (-8.2%) and Himachal Pradesh (-3.9%). <b>The negative growth in these states is mainly due to decline in fertility during last two decades.</b></p><p>Among smaller states and Union Territories, Nagaland, Lakshadweep and the Andaman & Nicobar Islands, recorded a negative growth rate of adolescent population higher than that of Kerala during the period 2001-11.</p><p>Among the bigger states, the highest positive decadal growth rate of adolescent population is found in Bihar (28.2%), followed by Uttar Pradesh (27.5%). Other demographically backward states, namely Rajasthan, Jharkhand, Chhattisgarh and Madhya Pradesh, also recorded decadal growth rate higher than the national average, while all other bigger states have decadal growth of adolescent population lower than the national average.</p><p>A few smaller states such as Arunachal Pradesh and Meghalaya and some UTs, such as Dadra & Nagar Haveli and Daman & Diu, also showed rate of growth of adolescent population higher than the national average.</p><p>The decadal growth rate of the youth population in India was much higher at 22.1 per cent during the last decade as compared to the growth of the adolescent population.</p><p></p>",
    "question_index": 120
  },

    "question": "<span class=\"eqt\"><p>Which of the following is an example of a saturated hydrocarbon? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2360;&#2306;&#2340;&#2371;&#2346;&#2381;&#2340; &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2325;&#2366; &#2319;&#2325; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ethene (C<sub>2</sub>H<sub>4</sub>)</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2341;&#2368;&#2344; (C2H4)</span>",
      "<span class=\"eqt\">Ethyne (C<sub>2</sub>H<sub>2</sub>)</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2341;&#2366;&#2311;&#2344; (C2H2)</span>",
      "<span class=\"eqt\">Ethane (C<sub>2</sub>H<sub>6</sub>)</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2341;&#2375;&#2344; (C2H6)</span>",
      "<span class=\"eqt\">Ethanol (C<sub>2</sub>H<sub>5</sub>OH)</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2341;&#2375;&#2344;&#2377;&#2354; (C2H5OH)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Ethane (C2H6) is an example of a saturated hydrocarbon. A saturated hydrocarbon consists of carbon (C) and hydrogen (H) atoms bonded together by single covalent bonds, meaning they have the maximum number of hydrogen atoms possible for the given number of carbon atoms. Ethane has two carbon atoms bonded together by a single bond and is saturated with hydrogen atoms, with each carbon atom bonded to three hydrogen atoms. </p>",
    "question_index": 121
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following influences the oceanic currents?</p><p>I. Insolation</p><p>II. Marine organisms</p><p>III. Gravity</p><p>IV. Coriolis force</p><p>Select the correct answer using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2368; &#2343;&#2366;&#2352;&#2366;&#2323;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p><p>I. &#2360;&#2370;&#2352;&#2381;&#2351;&#2366;&#2340;&#2346;</p><p>II. &#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2368; &#2332;&#2368;&#2357;</p><p>III. &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339;</p><p>IV. &#2325;&#2379;&#2352;&#2367;&#2323;&#2354;&#2367;&#2360; &#2348;&#2354;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I, II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II, III and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II, III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">I, III and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">I, II and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; IV</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Ocean currents represent a regular volume of water in a definite path and direction. Forces that influences the oceanic currents are</p><p>1. <b>Insolation</b>: Heating by incoming solar radiation (insolation) causes the water to expand. Near the equator the ocean water is about 8 cm higher in level than in the middle latitudes because of expanded water. This causes a very slight gradient and water tends to flow down the slope.</p><p>2. <b>Wind:</b> Wind blowing on the surface of the ocean pushes the water to move. Friction between the wind and the water surface affects the movement of the water body in its course.</p><p>3. <b>Gravity:</b> Gravity tends to pull the water down the pile and create gradient variation.</p><p>4. <b>Coriolis force</b>: The Coriolis force intervenes and causes the water to move to the right in the northern hemisphere and to the left in the southern hemisphere.</p><p>Marine organisms don't influence ocean currents.</p><p>Source: NCERT</p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>When two species compete for the same resources, one of them is eliminated. This is known as:</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2342;&#2379; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2366;&#2305; &#2360;&#2350;&#2366;&#2344; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2313;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2357;&#2367;&#2354;&#2369;&#2346;&#2381;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360;&#2375; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Commensalism</span><span class=\"hqt\" style=\"display:none\">Commensalism</span>",
      "<span class=\"eqt\">Mutualism</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2360;&#2381;&#2346;&#2352;&#2367;&#2325; &#2310;&#2358;&#2381;&#2352;&#2351; &#2325;&#2366; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;</span>",
      "<span class=\"eqt\">Competitive exclusion principle</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2368; &#2348;&#2361;&#2367;&#2359;&#2381;&#2325;&#2352;&#2339; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;</span>",
      "<span class=\"eqt\">Predation</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2325;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct answer is the Competitive Exclusion Principle, also known as Gause's Law. This ecological principle states that two species competing for the exact same limited resources in a stable environment cannot coexist indefinitely.</p><p>One species will inevitably be more efficient at utilizing the resources and will eventually outcompete and eliminate the other.</p><p>Explanation of Options:</p><p>Commensalism: This is a symbiotic relationship where one species benefits, and the other is neither helped nor harmed.</p><p>Mutualism: This is a symbiotic relationship where both species benefit from the interaction.</p><p>Competitive exclusion principle: This is the correct term for the elimination of one species by another due to competition for the same niche.</p><p>Predation: This is an interaction where one organism (the predator) hunts and kills another organism (the prey) for food.</p>",
    "question_index": 123
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is/are the impact(s) of Green revolution in India?</p><p>I. Self-sufficiency in food grain production.</p><p>II. Mono-cropping pattern.</p><p>III. Reduction in regional disparities.</p><p>Select the correct answer using the code below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2361;&#2352;&#2367;&#2340; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367; &#2325;&#2366;/&#2325;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2326;&#2366;&#2342;&#2381;&#2351;&#2366;&#2344;&#2381;&#2344; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2350;&#2375;&#2306; &#2310;&#2340;&#2381;&#2350;&#2344;&#2367;&#2352;&#2381;&#2349;&#2352;&#2340;&#2366;&#2404;</p><p>II. &#2319;&#2325;&#2354;-&#2347;&#2360;&#2354; &#2346;&#2342;&#2381;&#2343;&#2340;&#2367;&#2404;</p><p>III. &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2368;&#2351; &#2309;&#2360;&#2350;&#2366;&#2344;&#2340;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Food production increased in such a way (wheat in 1960s and rice, by 1970s) that many countries became self-sufficient.</p><p>Green revolution was concentrated in North west India (Punjab, Haryana, UP) due to availability of rich water sources. Thus, it increased the income of farmers in this region especially the large farmers than small farmers as it required huge input cost. This increased the inter-personal as well as inter-regional disparities/inequalities in India. <b>Hence, statement III is incorrect.</b></p><p>Also, High Yield variety seeds were available only to wheat and rice, this marginalised the crop rotation practice and promoted the mono-cropping of wheat and rice. This also had ecological impacts on the soil as well. <b>Hence, statement I and II are correct.</b></p><p></p>",
    "question_index": 124
  },
  {
    "question": "<span class=\"eqt\"><p>After 1991, which of the following sectors was opened up for private participation?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>1991 &#2325;&#2375; &#2348;&#2366;&#2342; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2344;&#2367;&#2332;&#2368; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354;&#2366; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Railways</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2354;&#2357;&#2375;</span>",
      "<span class=\"eqt\">Banking and Insurance</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2324;&#2352; &#2348;&#2368;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Atomic Energy</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2314;&#2352;&#2381;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Defence Production</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2325;&#2381;&#2359;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Following the major economic reforms of 1991, the Banking and Insurance sectors were systematically opened up to private and foreign participation.</p><p>This was a key component of the Liberalization, Privatization, and Globalization (LPG) policy aimed at making the Indian economy more competitive and efficient.</p><p>Explanation of Options:</p><p>Railways: The core operations of Indian Railways, such as running passenger trains and managing tracks, have largely remained under government control. While there has been a gradual introduction of private participation in non-core areas like catering, station development, and freight corridors, the sector as a whole was not opened up in the same way as banking and insurance.</p><p>Banking and Insurance: This is the correct answer. Before 1991, banking was dominated by nationalized public sector banks, and insurance was a state monopoly under the Life Insurance Corporation (LIC) and the General Insurance Corporation (GIC). The post-1991 reforms, guided by the Narasimham Committee (for banking) and the Malhotra Committee (for insurance), paved the way for the entry of new private sector banks (like HDFC, ICICI) and private insurance companies.</p><p>Atomic Energy: This is a strategic sector and remains largely a government monopoly due to its national security implications. The Atomic Energy Act keeps most activities in this field under the purview of the Government of India.</p><p>Defence Production: Traditionally a public sector domain, defence production was opened to the Indian private sector in 2001, a decade after the initial wave of reforms. While this happened after 1991, it was not part of the immediate, sweeping reforms that transformed the financial sector.</p><p>Further insights:</p><p>The economic reforms of 1991 were a response to a severe balance of payments crisis. The goal was to dismantle the \"Licence Raj\" and integrate the Indian economy with the global economy.</p><p>The opening of the financial sector was crucial for bringing in new technology, capital, and competition, which led to a significant improvement in the quality and variety of financial services available to Indian consumers and businesses.</p>",
    "question_index": 125
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding 'Safety Valve Theory':</p><p>I. It aimed to provide an outlet to the rising dissatisfaction among Indians about British rule.</p><p>II. It was popularized by Mahatma Gandhi in his book 'Young India'.</p><p>Select the CORRECT statements using the codes given below:</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2360;&#2375;&#2347;&#2381;&#2335;&#2368; &#2357;&#2366;&#2354;&#2381;&#2357; &#2341;&#2381;&#2351;&#2379;&#2352;&#2368;' &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2311;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2338;&#2364;&#2340;&#2375; &#2309;&#2360;&#2306;&#2340;&#2379;&#2359; &#2325;&#2379; &#2348;&#2366;&#2361;&#2352; &#2344;&#2367;&#2325;&#2366;&#2354;&#2344;&#2366; &#2341;&#2366;&#2404;</p><p>II. &#2311;&#2360;&#2375; &#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; &#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; '&#2351;&#2306;&#2327; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366;' &#2350;&#2375;&#2306; &#2354;&#2379;&#2325;&#2346;&#2381;&#2352;&#2367;&#2351; &#2348;&#2344;&#2366;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Safety Valve Theory was associated with the origins of the Indian National Congress (INC). Proponents of this theory believed that the INC is the <b>brain-product of then Viceroy Lord Dufferin.</b> They thought that INC formation was a calculative step by the British Government to give outlet to the rising dissatisfaction against the British rule. <b>So, statement I is correct.</b></p><p><b>Lala Lajpat Rai</b> maintained that the INC was organised to serve as a '<b>Safety Valve'</b> for growing unrest in the country and strengthen the British Empire. He wrote about the theory in his book 'Young India'. <b>William Wedderburn,</b> Auto biographer of A. O. Hume, supported the views of Lala Lajpat Rai. <b>So, statement II is not correct.</b></p><p></p>",
    "question_index": 126
  },

    "question": "<span class=\"eqt\"><p>Which tournament did the India men's national cricket team win by defeating New Zealand national cricket team in the final on 9 March 2025?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>9 &#2350;&#2366;&#2352;&#2381;&#2330; 2025 &#2325;&#2379; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2346;&#2369;&#2352;&#2369;&#2359; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2335;&#2368;&#2350; &#2344;&#2375; &#2347;&#2366;&#2311;&#2344;&#2354; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2370;&#2332;&#2368;&#2354;&#2376;&#2306;&#2337; &#2325;&#2368; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2335;&#2368;&#2350; &#2325;&#2379; &#2361;&#2352;&#2366;&#2325;&#2352; &#2325;&#2380;&#2344; &#2360;&#2366; &#2335;&#2370;&#2352;&#2381;&#2344;&#2366;&#2350;&#2375;&#2306;&#2335; &#2332;&#2368;&#2340;&#2366;?</p></span>",
    "options": [

      "<span class=\"eqt\">ICC Champions Trophy 2025</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2312;&#2360;&#2368;&#2360;&#2368; &#2330;&#2376;&#2306;&#2346;&#2367;&#2351;&#2306;&#2360; &#2335;&#2381;&#2352;&#2377;&#2347;&#2368; 2025</span>"

    "correct_option_id": 3,
    "solution": "<p>India beat New Zealand in the final of the ICC Champions Trophy 2025.</p><p>The 2025 ICC Champions Trophy final was a One Day International (ODI) cricket match played at the Dubai International Cricket Stadium on 9 March 2025 to determine the winner of 2025 ICC Champions Trophy.</p><p>It was played between India and New Zealand. It was the second time that India and New Zealand played a Champions Trophy final against each other, after the 2000 final.</p><p>This was India's fifth Champions Trophy final after 2000, 2002, 2013 and 2017 while it was New Zealand's third final after 2000 and 2009</p><p></p>",

  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about interactions among species.</p><p>I. Predators help in maintaining species diversity in a community.</p><p>II. Competition occurs only when there are limited resources.</p><p>III. Parasites that feed on the external surface of the host organism are called ectoparasites.</p><p>Which among the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2340;&#2307;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2358;&#2367;&#2325;&#2366;&#2352;&#2368; &#2319;&#2325; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2357;&#2367;&#2357;&#2367;&#2343;&#2340;&#2366; &#2325;&#2379; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2325;&#2375;&#2357;&#2354; &#2340;&#2348; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2332;&#2348; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344; &#2360;&#2368;&#2350;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>III. &#2346;&#2352;&#2332;&#2368;&#2357;&#2368; &#2332;&#2379; &#2350;&#2375;&#2332;&#2348;&#2366;&#2344; &#2332;&#2368;&#2357; &#2325;&#2368; &#2348;&#2366;&#2361;&#2352;&#2368; &#2360;&#2340;&#2361; &#2346;&#2352; &#2349;&#2379;&#2332;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2348;&#2366;&#2361;&#2381;&#2351;&#2346;&#2352;&#2332;&#2368;&#2357;&#2368; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II, III and IV</span><span class=\"hqt\" style=\"display:none\">I, II, III &#2324;&#2352; IV</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement I is correct: Predators help in maintaining species diversity in a community, by reducing the intensity of competition among competing prey species.</p><p>For instance: In the rocky intertidal communities of the American Pacific Coast the starfish Pisaster is an important predator. In a field experiment, when all the starfish were removed from an enclosed intertidal area, more than 10 species of invertebrates became extinct within a year, because of interspecies competition.</p><p>Statement II is incorrect: Resources need not be limiting for competition to occur; in interference competition, the feeding efficiency of one species might be reduced due to the interfering and inhibitory presence of the other species, even if resources (food and space) are abundant.</p><p>Statement III is correct: Parasites that feed on the external surface of the host organism are called ectoparasites, and parasites that live inside the host body at different sites (liver, kidney, lungs, red blood cells, etc.) are called endoparasites.</p><p></p>",
    "question_index": 128
  },

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true?</p><p>A. India ranks 72nd on the 2024 Artificial Intelligence Preparedness Index (AIPI).</p><p>B. The International Monetary Fund (IMF) released the Index.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A. 2024 &#2310;&#2352;&#2381;&#2335;&#2367;&#2347;&#2367;&#2358;&#2367;&#2351;&#2354; &#2311;&#2306;&#2335;&#2375;&#2354;&#2367;&#2332;&#2375;&#2306;&#2360; &#2346;&#2381;&#2352;&#2367;&#2346;&#2375;&#2351;&#2352;&#2381;&#2337;&#2344;&#2375;&#2360; &#2311;&#2306;&#2337;&#2375;&#2325;&#2381;&#2360; (AIPI) &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; 72&#2357;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2361;&#2376;&#2404;</p><p>B. &#2309;&#2306;&#2340;&#2352;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2325;&#2379;&#2359; (IMF) &#2344;&#2375; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; &#2332;&#2366;&#2352;&#2368; &#2325;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">A only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>",
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The International Monetary Fund (IMF) released an Artificial Intelligence Preparedness Index (AIPI) Dashboard on their website on June 25, 2024, tracking 174 economies globally for AI readiness. The Index ranks India at the 72nd position, with Bangladesh (0.38) at 113, Sri Lanka (0.43) at 92, and China (0.63) at 31. The rating for each country is analysed based on their digital infrastructure, human capital, labour policies, innovation, integration and regulation.</p><p></p><p></p>",
    "question_index": 129
  },

    "question": "<span class=\"eqt\"><p>Which of the following is an example of computer worm?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2357;&#2352;&#2381;&#2350; &#2325;&#2366; &#2319;&#2325; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376; ?</p></span>",
    "options": [
      "<span class=\"eqt\">Melissa</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2354;&#2368;&#2360;&#2366;</span>",
      "<span class=\"eqt\">CryptoLocker</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335;&#2379;&#2354;&#2377;&#2325;&#2352;</span>",
      "<span class=\"eqt\">Adware</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2337;&#2357;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Conficker</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2377;&#2344;&#2381;&#2347;&#2364;&#2367;&#2325;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Some examples of well-known computer worms:</p><p>&#183; Blaster worm: This worm exploited a vulnerability in Microsoft Windows and caused infected computers to shut down and restart repeatedly.</p><p>&#183; Code Red worm: This worm was one of the first to exploit a vulnerability in Microsoft's Internet Information Services (IIS) web server software, leading to widespread infections and a significant amount of network traffic.</p><p>&#183; Nimda worm: This worm spread rapidly by exploiting multiple vulnerabilities, including ones in email and web servers.</p><p>&#183; <b>Conficker worm</b>: This worm was one of the largest and most persistent worms, infecting millions of computers and causing widespread disruption.</p><p>&#183; WannaCry ransomware worm: This worm infected computers running older versions of Microsoft Windows, encrypting users' files and demanding a ransom payment in order to restore access to the data.</p>",

  },

    "question": "<span class=\"eqt\"><p>Every host (computer linked to Internet) has a unique host number called:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2361;&#2379;&#2360;&#2381;&#2335; (&#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2369;&#2310; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352;) &#2325;&#2366; &#2319;&#2325; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2361;&#2379;&#2360;&#2381;&#2335; &#2344;&#2306;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2375; _______ &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">URL</span><span class=\"hqt\" style=\"display:none\">URL</span>",
      "<span class=\"eqt\">ISP</span><span class=\"hqt\" style=\"display:none\">ISP</span>",
      "<span class=\"eqt\">IP address</span><span class=\"hqt\" style=\"display:none\">IP &#2319;&#2337;&#2381;&#2352;&#2375;&#2360;</span>",
      "<span class=\"eqt\">Webpage</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2348;&#2346;&#2375;&#2332;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Every host (computer linked to Internet) has a unique host number <b>called IP address.</b> You can connect to any host through IP address only, but it is difficult to remember the 4-digit number of hosts. To resolve this, domain-name is the only solution. Domain name is a unique name of the individual host site on the Internet. With this every computer on the Internet now has both a domain name and IP address. To connect to any host through domain name requires some mechanism that will convert your domain name into IP address.</p>",

  {
    "question": "<span class=\"eqt\"><p>What is/are the information security goal(s) of Digital Signatures?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2360;&#2367;&#2327;&#2381;&#2344;&#2375;&#2330;&#2352; &#2325;&#2366;/&#2325;&#2375; &#2360;&#2370;&#2330;&#2344;&#2366; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Non-repudiation</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2376;&#2352;-&#2346;&#2352;&#2367;&#2340;&#2381;&#2351;&#2366;&#2327;</span>",
      "<span class=\"eqt\">Malware protection</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2354;&#2357;&#2375;&#2351;&#2352; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366;</span>",
      "<span class=\"eqt\">Phishing</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2367;&#2358;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Digital signatures are used to meet three important goals of information security: <b>integrity, authentication, and non-repudiation</b>. Message or Data integrity is particularly crucial during data transfers.</p><p>Digital signatures create a virtual fingerprint that is unique to a person or entity and are used to identify users and protect information in digital messages or documents. </p>",
    "question_index": 132
  },
  {
    "question": "<span class=\"eqt\"><p>Which is/are the transmission mode/s in the Physical layer of OSI network Model?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; OSI &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2350;&#2377;&#2337;&#2354; &#2325;&#2368; &#2349;&#2380;&#2340;&#2367;&#2325; &#2354;&#2375;&#2351;&#2352; &#2350;&#2375;&#2306; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2350;&#2367;&#2358;&#2344; &#2350;&#2379;&#2337; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Simplex</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2350;&#2381;&#2346;&#2354;&#2375;&#2325;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Half-duplex</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2347;-&#2337;&#2369;&#2346;&#2381;&#2354;&#2375;&#2325;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Full duplex</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2369;&#2354;-&#2337;&#2369;&#2346;&#2381;&#2354;&#2375;&#2325;&#2381;&#2360;</span>",
      "<span class=\"eqt\">All of these</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Physical layer deals with the bit-level transmission between the devices. It supports mechanical and electrical specifications of the interface and transmission medium. Hub, Repeater, Modem, Cables are Physical Layer devices. The data unit of this layer is Bit. It converts the signal into 0s and 1s and sends them to the next layer. <b>Simplex, half-duplex and full duplex are the transmission modes</b> for this layer.</p>",
    "question_index": 133
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct?</p><p>1. Polymorphic viruses change their code to evade signature-based antivirus detection.</p><p>2. Macro viruses target application-level files, especially in MS Office.</p><p>3. Boot sector viruses infect the MBR (Master Boot Record) of storage devices.</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>1. &#2346;&#2377;&#2354;&#2368;&#2350;&#2377;&#2352;&#2381;&#2347;&#2367;&#2325; &#2357;&#2366;&#2351;&#2352;&#2360; &#2361;&#2360;&#2381;&#2340;&#2366;&#2325;&#2381;&#2359;&#2352;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2319;&#2306;&#2335;&#2368;&#2357;&#2366;&#2351;&#2352;&#2360; &#2346;&#2361;&#2330;&#2366;&#2344; &#2360;&#2375; &#2348;&#2330;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2346;&#2344;&#2366; &#2325;&#2379;&#2337; &#2348;&#2342;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2. &#2350;&#2376;&#2325;&#2381;&#2352;&#2379; &#2357;&#2366;&#2351;&#2352;&#2360; &#2319;&#2346;&#2381;&#2354;&#2367;&#2325;&#2375;&#2358;&#2344;-&#2360;&#2381;&#2340;&#2352;&#2368;&#2351; &#2347;&#2364;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2379; &#2354;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2319;&#2350;&#2319;&#2360; &#2321;&#2347;&#2367;&#2360; &#2350;&#2375;&#2306;&#2404;</p><p>3. &#2348;&#2370;&#2335; &#2360;&#2375;&#2325;&#2381;&#2335;&#2352; &#2357;&#2366;&#2351;&#2352;&#2360; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2325;&#2375; &#2319;&#2350;&#2348;&#2368;&#2310;&#2352; (&#2350;&#2366;&#2360;&#2381;&#2335;&#2352; &#2348;&#2370;&#2335; &#2352;&#2367;&#2325;&#2377;&#2352;&#2381;&#2337;) &#2325;&#2379; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>All three statements are correct. They accurately describe the defining characteristics and targets of polymorphic, macro, and boot sector viruses, respectively.</p><p>Explanation of Statements:</p><p>Statement 1 is correct. A polymorphic virus is a type of malware that can change its own code or signature with each new infection. It typically uses an encryption engine to vary its appearance, making it difficult for signature-based antivirus software to create a stable \"fingerprint\" to detect it. The core malicious payload, however, remains the same.</p><p>Statement 2 is correct. A macro virus is written in a macro language, a programming language embedded within a software application. They are designed to infect documents and templates, most famously in Microsoft Office applications like Word and Excel. When an infected document is opened, the macro virus runs and can execute malicious commands, such as deleting files or spreading to other documents.</p><p>Statement 3 is correct. A boot sector virus is a type of virus that infects the boot record of storage devices, such as the Master Boot Record (MBR) of a hard drive or the boot sector of a floppy disk or USB drive. Because the boot sector is the first part of the drive that is read when a computer starts up, the virus is loaded into memory before the operating system, giving it deep control over the system.</p><p>Further insights:</p><p>Detection: Because polymorphic viruses evade simple signature matching, antivirus programs must use more advanced techniques like heuristic analysis (looking for suspicious behavior) and sandboxing (running the code in a safe, isolated environment) to detect them.</p><p>Decline and Resurgence: While boot sector viruses were very common in the era of floppy disks, they became less prevalent with the shift to CDs and network booting. Macro viruses were a major threat in the late 1990s and early 2000s, but their impact was reduced as Microsoft implemented better security features (like disabling macros by default). However, both types of threats can still appear in modern forms, often delivered via phishing emails.</p><p></p>",
    "question_index": 134
  },

    "question": "<span class=\"eqt\"><p>A computer can:</p><p>I: accepts the data &amp; process the data</p><p>II: store data and retrieve the stored data</p><p>III: print the desired result in format.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;:</p><p>I: &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360; &#2325;&#2352;&#2344;&#2366;</p><p>II: &#2337;&#2375;&#2335;&#2366; &#2360;&#2381;&#2335;&#2379;&#2352; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2360;&#2381;&#2335;&#2379;&#2352; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2346;&#2369;&#2344;&#2352;&#2381;&#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2366;</p><p>III: &#2347;&#2377;&#2352;&#2381;&#2350;&#2375;&#2335; &#2350;&#2375;&#2306; &#2357;&#2366;&#2306;&#2331;&#2367;&#2340; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335; &#2325;&#2352;&#2344;&#2366;</p></span>",

    "solution": "<p>A computer can accept data and process the data. This is the primary function of a computer. It accepts input from various input devices such as keyboard, mouse, microphone, etc., and processes the data to generate an output. </p><p>A computer can store data and retrieve the stored data. A computer can store data on various storage devices such as hard disk, solid-state drives, USB drives, etc., and retrieve the data when needed. </p><p>A computer can print the desired result in a format. A computer can send the output to various output devices such as printers, displays, projectors, etc., in a desired format. Therefore, all three statements are correct.</p><p>Computer can also be defined in terms of functions it can perform. A computer can <b>i) accepts the data, ii) process data, iii) store data, and iv) retrieve the stored data as and when required and v) print the desired result.</b></p>",

    "question": "<span class=\"eqt\"><p>In _______ topology each device is connected to every other device on the network through a dedicated point-to-point link.</p></span><span class=\"hqt\" style=\"display:none\"><p>_______ &#2335;&#2379;&#2346;&#2379;&#2354;&#2377;&#2332;&#2368; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2319;&#2325; &#2337;&#2375;&#2337;&#2367;&#2325;&#2375;&#2335;&#2375;&#2337; &#2346;&#2377;&#2311;&#2306;&#2335;-&#2335;&#2370;-&#2346;&#2377;&#2311;&#2306;&#2335; &#2354;&#2367;&#2306;&#2325; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Bus</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2360;</span>",

    "solution": "<p>In <b>mesh topology</b> each device is connected to every other device on the network through a dedicated point-to-point link. Dedicated link means that the link only carries data for the two connected devices only. For example, if there are n devices in the network then each device must relate to (n-1) devices of the network. Number of links in a mesh topology of n devices would be n(n-1)/2.</p>",

    "question": "<span class=\"eqt\"><p>Identify the correct statement.</p><p>i. Paging is a memory management scheme that eliminates external fragmentation.</p><p>ii. Segmentation divides processes into equal-sized memory blocks.</p><p>iii. Virtual memory allows execution of programs larger than physical RAM.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>i. &#2346;&#2375;&#2332;&#2367;&#2306;&#2327; &#2319;&#2325; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; &#2361;&#2376; &#2332;&#2379; &#2348;&#2366;&#2361;&#2352;&#2368; &#2357;&#2367;&#2326;&#2306;&#2337;&#2344; &#2325;&#2379; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>ii. &#2360;&#2375;&#2327;&#2350;&#2375;&#2306;&#2335;&#2375;&#2358;&#2344; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2360;&#2350;&#2366;&#2344; &#2310;&#2325;&#2366;&#2352; &#2325;&#2375; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2348;&#2381;&#2354;&#2377;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>iii. &#2357;&#2352;&#2381;&#2330;&#2369;&#2309;&#2354; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2349;&#2380;&#2340;&#2367;&#2325; RAM &#2360;&#2375; &#2348;&#2337;&#2364;&#2375; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">i and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">ii and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i and ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements i and iii are correct. Statement ii is incorrect because segmentation divides memory based on logical units of a program, which are of variable size, not equal-sized blocks.</p><p>Explanation of Statements:</p><p>Statement i is correct. Paging is a memory management technique where physical memory is divided into fixed-sized blocks called frames, and a process's logical memory is divided into blocks of the same size called pages. This allows a process's pages to be stored in non-contiguous physical memory frames. Since memory is allocated in fixed-size units, there is no external fragmentation (unused memory blocks of various sizes scattered throughout memory). However, paging can lead to internal fragmentation (unused space within the last allocated page of a process).</p><p>Statement ii is incorrect. Segmentation is a memory management scheme that supports the user's view of memory. A program is divided into variable-sized segments, where each segment is a logical unit such as the main program, a function, a data structure, or a stack. The key characteristic is that these segments are of unequal or variable size, reflecting the logical structure of the program. Dividing memory into equal-sized blocks is the defining feature of paging, not segmentation.</p><p>Statement iii is correct. Virtual memory is a memory management technique that provides an \"illusion\" of a very large main memory. It works by storing only the necessary parts of a program in the physical RAM at any one time, while the rest is kept in secondary storage (like an SSD or HDD). When a part of the program that is not in RAM is needed, the operating system swaps it in. This mechanism allows a program to be much larger than the actual physical RAM available, a crucial feature for modern multitasking operating systems.</p><p>Further insights:</p><p>Modern operating systems like Windows and Linux often use a hybrid approach that combines both paging and segmentation. In this model, a program is first divided into logical segments, and then each segment is further divided into fixed-size pages.</p><p>The primary problem with segmentation (when used alone) is that it suffers from external fragmentation, as the variable-sized segments can leave unusable \"holes\" in the memory over time. Paging solves this specific problem.</p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a type of alignment commonly used in word processing?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2319;&#2354;&#2366;&#2311;&#2344;&#2350;&#2375;&#2306;&#2335; &#2325;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376; &#2332;&#2379; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2357;&#2352;&#2381;&#2337; &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2367;&#2306;&#2327; &#2350;&#2375;&#2306; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
