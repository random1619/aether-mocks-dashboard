; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">1-b, 2-d, 3-a, 4-c</span><span class=\"hqt\" style=\"display:none\">1-b, 2-d, 3-a, 4-c</span>",
      "<span class=\"eqt\">1-c, 2-d, 3-a, 4-b</span><span class=\"hqt\" style=\"display:none\">1-c, 2-d, 3-a, 4-b</span>",
      "<span class=\"eqt\">1-d, 2-a, 3-b, 4-c</span><span class=\"hqt\" style=\"display:none\">1-d, 2-a, 3-b, 4-c</span>",
      "<span class=\"eqt\">1-a, 2-c, 3-d, 4-b</span><span class=\"hqt\" style=\"display:none\">1-a, 2-c, 3-d, 4-b</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Lithosphere is the outer solid part of Earth where soils form and nutrients are cycled, so 1-c.</p><p>Hydrosphere provides water medium and dissolves nutrients, so 2-d.</p><p>Atmosphere enables weather and gas exchange (O2, CO2), so 3-a.</p><p>Cryosphere's ice/snow strongly affects albedo and sea level, so 4-b.</p><p>Further Insights:</p><p>- Troposphere (lowest layer) holds ~75% of atmospheric mass and most weather.</p><p>- The stratospheric ozone layer peaks around 20 - 30 km and absorbs UV-B.</p><p>- About 97% of Earth's water is saline; only a small fraction is accessible freshwater.</p><p>- Cryosphere stores most of Earth's freshwater in glaciers and ice sheets.</p>",
    "question_index": 117
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a major non-fiction history book, not a novel?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2319;&#2325; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2327;&#2376;&#2352;-&#2325;&#2366;&#2354;&#2381;&#2346;&#2344;&#2367;&#2325; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360; &#2325;&#2368; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2361;&#2376;, &#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; &#2344;&#2361;&#2368;&#2306;?</span>",
    "options": [
      "<span class=\"eqt\">A Suitable Boy</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2354;&#2337;&#2364;&#2325;&#2366;</span>",
      "<span class=\"eqt\">India After Gandhi</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2306;&#2343;&#2368; &#2325;&#2375; &#2348;&#2366;&#2342; &#2325;&#2366; &#2349;&#2366;&#2352;&#2340;</span>",
      "<span class=\"eqt\">The Guide</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2341;&#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2325;</span>",
      "<span class=\"eqt\">The Shadow Lines</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2366;&#2351;&#2366; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>India After Gandhi by Ramachandra Guha is a comprehensive account of India post-1947.</p><p>The other titles are novels by Vikram Seth (1), R. K. Narayan (C), and Amitav Ghosh (D).</p><p>Further Insights:</p><p>- The Discovery of India  -  Jawaharlal Nehru; important for modern history prep.</p><p>- From Plassey to Partition  -  Shekhar Bandyopadhyay; widely referenced.</p><p>- The Argumentative Indian  -  Amartya Sen; essays on India's traditions and public reasoning.</p><p>- The Wonder That Was India  -  A. L. Basham; classic on ancient India.</p>",
    "question_index": 118
  },
  {
    "question": "<span class=\"eqt\"><p>The Saubhagya Scheme, launched by the Government of India, primarily aims to:</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2360;&#2380;&#2349;&#2366;&#2327;&#2381;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2361;&#2376;:</span>",
    "options": [
      "<span class=\"eqt\">Provide free electricity up to 300 units per month through solar rooftops</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2354;&#2352; &#2352;&#2370;&#2347;&#2335;&#2377;&#2346; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2366;&#2361; 300 &#2351;&#2370;&#2344;&#2367;&#2335; &#2340;&#2325; &#2350;&#2369;&#2347;&#2381;&#2340; &#2348;&#2367;&#2332;&#2354;&#2368; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Ensure last-mile household electricity connections, including for willing un-electrified households in rural and urban areas</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2324;&#2352; &#2358;&#2361;&#2352;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2367;&#2332;&#2354;&#2368; &#2360;&#2375; &#2357;&#2306;&#2330;&#2367;&#2340; &#2311;&#2330;&#2381;&#2331;&#2369;&#2325; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352;&#2379;&#2306; &#2360;&#2361;&#2367;&#2340; &#2309;&#2306;&#2340;&#2367;&#2350; &#2331;&#2379;&#2352; &#2340;&#2325; &#2348;&#2367;&#2332;&#2354;&#2368; &#2325;&#2344;&#2375;&#2325;&#2381;&#2358;&#2344; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Promote grid-scale renewable energy generation in villages</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2306;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306; &#2327;&#2381;&#2352;&#2367;&#2337;-&#2360;&#2381;&#2340;&#2352;&#2368;&#2351; &#2344;&#2357;&#2368;&#2325;&#2352;&#2339;&#2368;&#2351; &#2314;&#2352;&#2381;&#2332;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Replace conventional meters with smart prepaid meters</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2350;&#2368;&#2335;&#2352;&#2379;&#2306; &#2325;&#2379; &#2360;&#2381;&#2350;&#2366;&#2352;&#2381;&#2335; &#2346;&#2381;&#2352;&#2368;&#2346;&#2375;&#2337; &#2350;&#2368;&#2335;&#2352;&#2379;&#2306; &#2360;&#2375; &#2348;&#2342;&#2354;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Pradhan Mantri Sahaj Bijli Har Ghar Yojana  -  'Saubhagya' a new scheme was launched by the Hon'ble Prime Minister on 25th September 2017. </p><p>Under Saubhagya free electricity connections to all households (both APL and poor families) in rural areas and poor families in urban areas were to be provided. </p><p>There were around 4 Crore un-electrified households in the country and they were targeted for providing electricity connections by December 2018. </p><p>Rural Electrification Corporation (REC) has been designated as its nodal agency for the Saubhagya scheme.</p><p>The scheme was closed in March 2022 since the target of 100% electrification was met.</p>",
    "question_index": 119
  },
  {
    "question": "<span class=\"eqt\"><p>Which event formally granted the East India Company the Diwani (revenue rights) of Bengal, Bihar, and Orissa?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2328;&#2335;&#2344;&#2366; &#2344;&#2375; &#2324;&#2346;&#2330;&#2366;&#2352;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2379; &#2348;&#2306;&#2327;&#2366;&#2354;, &#2348;&#2367;&#2361;&#2366;&#2352; &#2324;&#2352; &#2313;&#2337;&#2364;&#2368;&#2360;&#2366; &#2325;&#2368; &#2342;&#2368;&#2357;&#2366;&#2344;&#2368; (&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;) &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Treaty of Salbai (1782)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2354;&#2348;&#2366;&#2312; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367; (1782)</span>",
      "<span class=\"eqt\">Treaty of Amritsar (1809)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2371;&#2340;&#2360;&#2352; &#2360;&#2306;&#2343;&#2367; (1809)</span>",
      "<span class=\"eqt\">Treaty of Srirangapatna (1792)</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2368;&#2352;&#2306;&#2327;&#2346;&#2335;&#2381;&#2335;&#2344;&#2366; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367; (1792)</span>",
      "<span class=\"eqt\">Treaty of Allahabad (1765)</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342; &#2360;&#2306;&#2343;&#2367; (1765)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>After the Battle of Buxar (1764), the Treaty of Allahabad (1765) made the Company the Diwan of Bengal, Bihar, and Orissa.</p><p>The other treaties relate to Marathas (Salbai), Ranjit Singh (Amritsar), and Mysore (Srirangapatna).</p><p>Further Insights:</p><p>- Plassey (1757) established British political supremacy in Bengal.</p><p>- Dual system of administration under Clive separated revenue and civil authority (1765 - 1772).</p><p>- Regulating Act (1773) was the first step towards parliamentary control of the Company.</p><p>- Pitt's India Act (1784) created the Board of Control.</p>",
    "question_index": 120
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Phylum Arthropoda:</p><p>Statement I: Arthropods possess an open circulatory system where blood (hemolymph) flows into a body cavity called the hemocoel.</p><p>Statement II: The exoskeleton of arthropods is made of calcium carbonate, which they shed periodically through a process called molting.</p><p>Which of the above statements is/are correct? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2352;&#2381;&#2341;&#2381;&#2352;&#2379;&#2346;&#2379;&#2337;&#2366; &#2360;&#2306;&#2328; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2310;&#2352;&#2381;&#2341;&#2381;&#2352;&#2379;&#2346;&#2379;&#2337;&#2381;&#2360; &#2350;&#2375;&#2306; &#2319;&#2325; &#2326;&#2369;&#2354;&#2366; &#2346;&#2352;&#2367;&#2360;&#2306;&#2330;&#2352;&#2339; &#2340;&#2306;&#2340;&#2381;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2361;&#2366;&#2305; &#2352;&#2325;&#2381;&#2340; (&#2361;&#2375;&#2350;&#2379;&#2354;&#2367;&#2350;&#2381;&#2347;) &#2361;&#2375;&#2350;&#2379;&#2325;&#2379;&#2319;&#2354; &#2344;&#2366;&#2350;&#2325; &#2319;&#2325; &#2358;&#2366;&#2352;&#2368;&#2352;&#2367;&#2325; &#2327;&#2369;&#2361;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2310;&#2352;&#2381;&#2341;&#2381;&#2352;&#2379;&#2346;&#2379;&#2337;&#2381;&#2360; &#2325;&#2366; &#2348;&#2366;&#2361;&#2381;&#2351; &#2325;&#2306;&#2325;&#2366;&#2354; &#2325;&#2376;&#2354;&#2381;&#2358;&#2367;&#2351;&#2350; &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2344;&#2375;&#2335; &#2360;&#2375; &#2348;&#2344;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2375; &#2357;&#2375; &#2360;&#2350;&#2351;-&#2360;&#2350;&#2351; &#2346;&#2352; &#2350;&#2379;&#2354;&#2381;&#2335;&#2367;&#2306;&#2327; &#2344;&#2366;&#2350;&#2325; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2340;&#2366;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2350;&#2376;&#2306; &#2324;&#2352; &#2344; &#2361;&#2368; &#2342;&#2370;&#2360;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I (Correct)</b></p><p>Arthropods (such as insects, spiders, and crabs) do not have a closed network of blood vessels like humans do. Instead, their heart pumps hemolymph into a large open space called the hemocoel, where it directly bathes the internal organs.</p><p><b>Statement II (Incorrect)</b></p><p>While arthropods do have an exoskeleton and they do undergo molting (ecdysis), their exoskeleton is primarily made of Chitin (a tough polysaccharide), not calcium carbonate. (Note: Some crustaceans like crabs do incorporate calcium into their chitinous shells, but the defining material for the phylum is chitin).</p>",
    "question_index": 121
  },
  {
    "question": "<span class=\"eqt\"><p>Examine the statements on blocks of the periodic table.</p><p>Statement I: The s-block of the periodic table contains transition metals.</p><p>Statement II: Transition metals predominantly occupy the d-block.</p><p>Which of the above statements is/are correct? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2325;&#2375; &#2348;&#2381;&#2354;&#2377;&#2325;&#2379;&#2306; &#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2325;&#2375; s-&#2348;&#2381;&#2354;&#2377;&#2325; &#2350;&#2375;&#2306; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339; &#2343;&#2366;&#2340;&#2369;&#2319;&#2305; &#2346;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339; &#2343;&#2366;&#2340;&#2369;&#2319;&#2305; &#2350;&#2369;&#2326;&#2381;&#2351;&#2340;&#2307; d-&#2348;&#2381;&#2354;&#2377;&#2325; &#2350;&#2375;&#2306; &#2346;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2350;&#2376;&#2306; &#2324;&#2352; &#2344; &#2361;&#2368; &#2342;&#2370;&#2360;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>s-block consists of Groups 1 and 2 (and helium), not transition metals.</p><p>Transition metals are d-block elements (Groups 3 - 12), so Statement II is true.</p><p>Further Insights:</p><p>- f-block elements are lanthanoids and actinoids (inner transition metals).</p><p>- s-block metals are highly reactive, form ionic compounds, and show +1/+2 oxidation states.</p><p>- d-block metals show variable oxidation states and form colored complexes.</p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>In May 2025, Anuradha Prasad, former Secretary to the Government of India, took the Oath of the Office and Secrecy as Member of ____________________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2312; 2025 &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2346;&#2370;&#2352;&#2381;&#2357; &#2360;&#2330;&#2367;&#2357; &#2309;&#2344;&#2369;&#2352;&#2366;&#2343;&#2366; &#2346;&#2381;&#2352;&#2360;&#2366;&#2342; &#2344;&#2375; ____________________ &#2325;&#2368; &#2360;&#2342;&#2360;&#2381;&#2351; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2342; &#2324;&#2352; &#2327;&#2379;&#2346;&#2344;&#2368;&#2351;&#2340;&#2366; &#2325;&#2368; &#2358;&#2346;&#2341; &#2354;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Finance Commission Secretariat</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2340;&#2381;&#2340; &#2310;&#2351;&#2379;&#2327; &#2360;&#2330;&#2367;&#2357;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Union Public Service Commission</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2328; &#2354;&#2379;&#2325; &#2360;&#2375;&#2357;&#2366; &#2310;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">NITI Aayog</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2340;&#2367; &#2310;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">National Human Rights Commission</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2350;&#2366;&#2344;&#2357;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2310;&#2351;&#2379;&#2327;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Ms. Anuradha Prasad, former Secretary to the Government of India, Inter State Council Secretariat, Ministry of Home Affairs, took the Oath of the Office and Secrecy as Member,<b> Union Public Service Commission</b>.</p><p>The Oath was administered by Lt. Gen. Raj Shukla (Retd.), the seniormost Member of the Commission. Ms. Anuradha Prasad belongs to the 1986 batch of the Indian Defence Accounts Service. She has extensive experience in public policy, public finance, and cooperative federalism.</p><p>In a career spanning over 37 years, she has worked in Union Ministries of Defence, Finance, Food Processing Industries, Labour & Employment and Home gaining in-depth experience in policy & programme formulation and implementation. As Secretary, Inter State Council Secretariat, Ministry of Home Affairs, she handled Centre-State and Inter-State relations and built consensus on many complex and sensitive issues resulting in key policy changes and expediting of infrastructure and other projects.</p><p></p>",
    "question_index": 123
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are correct?</p><p>Statement I: India moved toward a market-determined exchange rate by introducing a dual exchange rate under LERMS in 1992 - 93, then unifying the rate in 1993 - 94.</p><p>Statement II: This transition aimed to ease balance-of-payments pressures and integrate India's external sector with global markets after the 1991 crisis.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344; I: &#2349;&#2366;&#2352;&#2340; &#2344;&#2375; 1992-93 &#2350;&#2375;&#2306; &#2319;&#2354;&#2312;&#2310;&#2352;&#2319;&#2350;&#2319;&#2360; &#2325;&#2375; &#2340;&#2361;&#2340; &#2342;&#2379;&#2361;&#2352;&#2368; &#2357;&#2367;&#2344;&#2367;&#2350;&#2351; &#2342;&#2352; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2325;&#2375; &#2324;&#2352; &#2347;&#2367;&#2352; 1993-94 &#2350;&#2375;&#2306; &#2342;&#2352; &#2325;&#2379; &#2319;&#2325;&#2368;&#2325;&#2371;&#2340; &#2325;&#2352;&#2325;&#2375; &#2348;&#2366;&#2332;&#2366;&#2352;-&#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2357;&#2367;&#2344;&#2367;&#2350;&#2351; &#2342;&#2352; &#2325;&#2368; &#2323;&#2352; &#2325;&#2342;&#2350; &#2348;&#2338;&#2364;&#2366;&#2351;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2311;&#2360; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; 1991 &#2325;&#2375; &#2360;&#2306;&#2325;&#2335; &#2325;&#2375; &#2348;&#2366;&#2342; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2325;&#2375; &#2342;&#2348;&#2366;&#2357; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2348;&#2366;&#2361;&#2381;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; &#2357;&#2376;&#2358;&#2381;&#2357;&#2367;&#2325; &#2348;&#2366;&#2332;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2319;&#2325;&#2368;&#2325;&#2371;&#2340; &#2325;&#2352;&#2344;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">Only Statement I is true.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; I &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",

    "correct_option_id": 0,
    "solution": "<p>LERMS introduced a dual rate, later unified to a market-determined rate - part of external sector reforms.</p><p>The reform intent was to stabilize the external account, improve competitiveness, and deepen forex markets post-crisis.</p><p>Further Insights:</p><p>- FERA 1973 was replaced by FEMA 1999, signaling a shift from control to management of forex.</p><p>- Current account convertibility was adopted in 1994; capital account remains partially controlled.</p><p>- Import licensing was pruned and tariffs gradually reduced in the 1990s.</p><p>- Industrial licensing was largely abolished in 1991 except for a few sectors.</p>",

    "question": "<span class=\"eqt\"><p>Zanskar Range belongs to which physiographic division of the Himalaya?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2364;&#2366;&#2306;&#2360;&#2381;&#2325;&#2352; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2325;&#2375; &#2325;&#2367;&#2360; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2310;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Trans-Himalaya</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2366;&#2306;&#2360; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Shiwalik</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2357;&#2366;&#2354;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Purvanchal</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2306;&#2330;&#2354;</span>",
      "<span class=\"eqt\">Aravalli System</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2366;&#2357;&#2354;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Zanskar Range is part of the Trans-Himalayan system along with Karakoram and Ladakh ranges.</p><p>It lies to the north of the Great Himalaya and south of the Ladakh Range.</p><p>Further Insights:</p><p>- The Trans-Himalaya includes Karakoram (with K2, 8611 m), Ladakh, Zanskar, and Kailash ranges.</p><p>- Purvanchal includes Patkai, Naga, Lushai (Mizo) hills; they are the eastern extension of the Himalaya.</p><p>- Shiwaliks (Outer Himalaya) are composed of unconsolidated sediments and have duns (e.g., Dehradun).</p><p>- Important passes near this zone: Zoji La links Kashmir Valley with Ladakh on the NH-1.</p>",

    "question": "<span class=\"eqt\"><p>What is the maximum period for which President's Rule (Article 356) can remain in force in a State, subject to approvals and conditions?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2350;&#2379;&#2342;&#2344; &#2324;&#2352; &#2358;&#2352;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2352;&#2361;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2358;&#2366;&#2360;&#2344; (&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 356) &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2340;&#2325; &#2354;&#2366;&#2327;&#2370; &#2352;&#2361; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">6 months</span><span class=\"hqt\" style=\"display:none\">6 &#2350;&#2361;&#2368;&#2344;&#2375;</span>",
      "<span class=\"eqt\">2 years</span><span class=\"hqt\" style=\"display:none\">2 &#2360;&#2366;&#2354;</span>",
      "<span class=\"eqt\">3 years, with parliamentary approval every 6 months and special conditions</span><span class=\"hqt\" style=\"display:none\">3 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2309;&#2357;&#2343;&#2367;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; 6 &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2360;&#2306;&#2360;&#2342;&#2368;&#2351; &#2309;&#2344;&#2369;&#2350;&#2379;&#2342;&#2344; &#2324;&#2352; &#2357;&#2367;&#2358;&#2375;&#2359; &#2358;&#2352;&#2381;&#2340;&#2375;&#2306; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2306;&#2327;&#2368;&#2404;</span>",
      "<span class=\"eqt\">5 years</span><span class=\"hqt\" style=\"display:none\">5 &#2360;&#2366;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Article 356 allows extension beyond one year only if (i) a National Emergency is in operation in the whole or any part of the State and (ii) the Election Commission certifies that elections cannot be held.</p><p>With 6-monthly approvals, the total cannot exceed 3 years.</p><p>Further Insights:</p><p>- Initial approval must be within 2 months by both Houses.</p><p>- President's Rule may be proclaimed on Governor's report or otherwise if the constitutional machinery fails.</p><p>- The 44th Amendment added an additional condition (ECI certification) for extension beyond 1 year.</p><p>- Judicial review applies; landmark: S.R. Bommai v. Union of India (1994).</p>",

    "question": "<span class=\"eqt\"><p>Which of the following statement about red soil is/are correct? </p><p>a. Red soils generally have high humus and nitrogen content.</p><p>b. The red coloration is mainly due to ferric oxides in the soil.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2366;&#2354; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>a. &#2354;&#2366;&#2354; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2350;&#2375;&#2306; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2361;&#2381;&#2351;&#2370;&#2350;&#2360; &#2324;&#2352; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>b. &#2354;&#2366;&#2354; &#2352;&#2306;&#2327; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2347;&#2375;&#2352;&#2367;&#2325; &#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">Both a and b</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Neither a nor b</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; a &#2324;&#2352; &#2344; &#2361;&#2368; b</span>"

    "correct_option_id": 1,
    "solution": "<p>Red soils are typically poor in humus and nitrogen; Statement I is false.</p><p>Red color arises from iron oxides (hematite) coating particles; Statement II is true.</p><p>Further Insights:</p><p>- Red soils are widespread in Tamil Nadu, Andhra Plateau, parts of Odisha and Chotanagpur.</p><p>- They are often sandy to loamy and well&#8209;drained; respond well to fertilizers.</p><p>- Common crops: millets, groundnut, pulses, cotton, depending on irrigation and management.</p>",
    "question_index": 127

    "question": "<span class=\"eqt\"><p>With respect to Census 2011 concepts, which of the following statements are true?</p><p>1) Literacy rate is calculated for population aged 7 years and above.</p><p>2) \"Urban area\" includes statutory towns and census towns; a census town must meet population, density, and workforce criteria.</p><p>3) India's sex ratio (females per 1000 males) in 2011 was above 950.</p><p>4) A \"household\" is limited to a family related only by blood.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2327;&#2339;&#2344;&#2366; 2011 &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;?</p><p>1) &#2360;&#2366;&#2325;&#2381;&#2359;&#2352;&#2340;&#2366; &#2342;&#2352; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; 7 &#2357;&#2352;&#2381;&#2359; &#2324;&#2352; &#2313;&#2360;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2310;&#2351;&#2369; &#2325;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) \"&#2358;&#2361;&#2352;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;\" &#2350;&#2375;&#2306; &#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2325;&#2360;&#2381;&#2348;&#2375; &#2324;&#2352; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2325;&#2360;&#2381;&#2348;&#2375; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;; &#2319;&#2325; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2325;&#2360;&#2381;&#2348;&#2375; &#2325;&#2379; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2328;&#2344;&#2340;&#2381;&#2357; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351;&#2348;&#2354; &#2350;&#2366;&#2344;&#2342;&#2306;&#2337;&#2379;&#2306; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2366; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;&#2404;</p><p>3) 2011 &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2354;&#2367;&#2306;&#2327; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; (&#2346;&#2381;&#2352;&#2340;&#2367; 1000 &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2346;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;) 950 &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2341;&#2366;&#2404;</p><p>4) &#2319;&#2325; \"&#2346;&#2352;&#2367;&#2357;&#2366;&#2352;\" &#2325;&#2375;&#2357;&#2354; &#2352;&#2325;&#2381;&#2340; &#2360;&#2306;&#2348;&#2306;&#2343; &#2357;&#2366;&#2354;&#2375; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2340;&#2325; &#2361;&#2368; &#2360;&#2368;&#2350;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",

    "correct_option_id": 1,
    "solution": "<p>1 is true: Literacy is computed for 7+ population.</p><p>2 is true: Census towns require population &ge; 5,000, density &ge; 400/sq km, and &ge; 75% male main workers in non-agricultural activities.</p><p>3 is false: The national sex ratio in 2011 was below 950 (final 943).</p><p>4 is false: A household may include unrelated persons sharing a common kitchen.</p><p>Further Insights:</p><p>- India's population (2011): about 121.09 crore; decadal growth 17.64%.</p><p>- Density (2011): 382 persons/sq km.</p><p>- Child sex ratio (0 - 6 years) 2011: 919 girls per 1000 boys.</p><p>- Urban population share (2011): 31.16%; largest urban agglomeration: Mumbai UA.</p><p>- Highest literacy state (2011): Kerala; lowest: Bihar.</p><p>- Most populous state (2011): Uttar Pradesh.</p>",

    "question": "<span class=\"eqt\"><p>Identify the CORRECT Statement regarding 2026 QS World University Rankings for Asia.</p><p>I. IIT Delhi was India's top performer, placed jointly at 59th, down from 44th last year.</p><p>II. IIT Bombay fell from 48th to 71st this year.</p><p>III. They assess universities based on 11 indicators,</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2358;&#2367;&#2351;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; 2026 &#2325;&#2381;&#2351;&#2370;&#2319;&#2360; &#2357;&#2367;&#2358;&#2381;&#2357; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; &#2352;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2310;&#2312;&#2310;&#2312;&#2335;&#2368; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2358;&#2368;&#2352;&#2381;&#2359; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; &#2352;&#2361;&#2366;, &#2332;&#2379; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; 59&#2357;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2352;&#2361;&#2366;, &#2346;&#2367;&#2331;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; 44&#2357;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2360;&#2375; &#2344;&#2368;&#2330;&#2375;&#2404;</p><p>II. &#2310;&#2312;&#2310;&#2312;&#2335;&#2368; &#2348;&#2377;&#2350;&#2381;&#2348;&#2375; &#2311;&#2360; &#2357;&#2352;&#2381;&#2359; 48&#2357;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2360;&#2375; &#2327;&#2367;&#2352;&#2325;&#2352; 71&#2357;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310; &#2327;&#2351;&#2366;&#2404;</p><p>III. &#2357;&#2375; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; 11 &#2360;&#2306;&#2325;&#2375;&#2340;&#2325;&#2379;&#2306; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>India has lost its top spot as the most represented higher education system in the 2026 QS World University Rankings for Asia to China, after two years, with nine out of its ten highest-ranked institutions slipping in rank from last year. India now stands second in Asia.</p><p>The QS World University Rankings for Asia, released annually by Quacquarelli Symonds, <b>assess universities based on 11 indicators,</b> including research impact, academic reputation, employer reputation, internationalisation, and faculty qualifications. The parameters are tailored to highlight the unique characteristics of Asian higher education systems.</p><p>According to this year's rankings, 137 Indian universities entered the list, bringing the country's total to 294, while China added 261 institutions, reaching a total of 395. Overall, 1,529 universities featured in the rankings this year.</p><p>Institutions from Hong Kong, China, and Singapore dominated the top 10.</p><p><b>The Indian Institute of Technology (IIT) Delhi was India's top-performing university, placed jointly at 59th, a 15-place drop from its 44th position last year.</b></p><p><b>IIT Bombay also fell from 48th to 71st this year.</b></p><p>Seven of India's top 10 institutions are IITs ' Delhi, Madras, Bombay, Kanpur, Kharagpur, Roorkee, and Guwahati ' along with the Indian Institute of Science (IISc) Bengaluru, Delhi University, and Chandigarh University. Of these, only Chandigarh University improved its ranking, rising from 120th to 109th.</p><p>In total, seven Indian universities ranked in the top 100, 20 in the top 200, and 66 in the top 500.</p><p>While India fell behind China in overall entries, the country's representation has increased significantly over the decade ' from just 24 institutions in 2016 to 249 in 2026, marking a 1,125 per cent rise compared to China's 273 per cent increase, according to QS.</p><p>India dominated the 'papers per faculty' indicator ' a measure of research productivity ' with five universities ranked among Asia's top 10 and 28 among the top 50. This is more than double China's tally of two in the top 10 and 14 in the top 50.</p><p>India also had 45 institutions in Asia's top 100 for staff with doctorates, reflecting strong faculty credentials.</p><p></p>",
    "question_index": 129
  },

    "question": "<span class=\"eqt\"><p>Computer Memory is measured in terms of______</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2379; ______ &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; &#2350;&#2366;&#2346;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Bits</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2335;</span>",
      "<span class=\"eqt\">Nano</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2376;&#2344;&#2379;</span>",
      "<span class=\"eqt\">Bytes</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A <b>bit</b> is the smallest unit of computer information. It's essentially a single binary data point; either yes or no, on or off, up or down. A byte on the other hand is a unit of memory that usually contains 8 bits. This is because historically, 8 bits are needed to encode a single character of text</p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about IFERROR function in Excel:</p><p>1. IFERROR returns a specified value when a formula results in an error.</p><p>2. IFERROR can only handle #DIV/0! errors.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>Excel &#2350;&#2375;&#2306; IFERROR &#2347;&#2364;&#2306;&#2325;&#2381;&#2358;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2347;&#2364;&#2377;&#2352;&#2381;&#2350;&#2370;&#2354;&#2375; &#2350;&#2375;&#2306; &#2340;&#2381;&#2352;&#2369;&#2335;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; IFERROR &#2319;&#2325; &#2344;&#2367;&#2352;&#2381;&#2342;&#2367;&#2359;&#2381;&#2335; &#2350;&#2366;&#2344; &#2354;&#2380;&#2335;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. IFERROR &#2325;&#2375;&#2357;&#2354; #DIV/0! &#2340;&#2381;&#2352;&#2369;&#2335;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2361;&#2368; &#2360;&#2306;&#2349;&#2366;&#2354; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 (Correct): The syntax is =IFERROR(value, value_if_error). It allows you to display a clean message (like \"Not Found\") instead of a messy error code.</p><p>Statement 2 (Incorrect): It is a \"catch-all\" function. It handles all Excel errors, including #N/A, #VALUE!, #REF!, #DIV/0!, #NUM!, #NAME?, and #NULL!.</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>A computer gives consistent result for similar set of data. This characteristic of a computer is called ______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2337;&#2375;&#2335;&#2366; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2360;&#2350;&#2370;&#2361; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2306;&#2327;&#2340; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2368; &#2311;&#2360; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2325;&#2379; ______ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Accuracy</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2367;&#2358;&#2369;&#2342;&#2381;&#2343;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Reliability</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2381;&#2357;&#2360;&#2344;&#2368;&#2351;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Diligence</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2340;&#2381;&#2346;&#2352;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Versatility</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2369;&#2310;&#2351;&#2366;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>A computer is reliable </b>as it gives consistent result for similar set of data i.e., if we give same set of input any number of times, we will get the same result.</p><p>&#183; Versatility refers to the capability of a computer to perform different kinds of works with same accuracy and efficiency. </p>",
    "question_index": 132
  },
  {
    "question": "<span class=\"eqt\"><p>Which is a feature of Windows 10 that allows you to organize your applications across multiple virtual desktops?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2306;&#2337;&#2379;&#2332; 10 &#2325;&#2368; &#2357;&#2361; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2361;&#2376; &#2332;&#2379; &#2310;&#2346;&#2325;&#2379; &#2309;&#2346;&#2344;&#2375; &#2319;&#2346;&#2381;&#2354;&#2367;&#2325;&#2375;&#2358;&#2344; &#2325;&#2379; &#2325;&#2312; &#2357;&#2352;&#2381;&#2330;&#2369;&#2309;&#2354; &#2337;&#2375;&#2360;&#2381;&#2325;&#2335;&#2377;&#2346; &#2346;&#2352; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">App View</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2346; &#2357;&#2381;&#2351;&#2370;</span>",
      "<span class=\"eqt\">Work View</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2325; &#2357;&#2381;&#2351;&#2370;</span>",
      "<span class=\"eqt\">Task View</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2366;&#2360;&#2381;&#2325; &#2357;&#2381;&#2351;&#2370;</span>",
      "<span class=\"eqt\">Switch View</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2367;&#2330; &#2357;&#2381;&#2351;&#2370;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Task View</b> is a feature of Windows 10 that allows you to organize your applications across multiple virtual desktops.</p><p>You can enter Task View by clicking the Task View icon. It is on your Taskbar, to the right of the Cortana search bar. You can also hold down the Windows key and press Tab.</p><p>In the Task View, you will see an overview of the application windows you have open on your current desktop. Below that, you will see icons representing each of your desktops.</p>",
    "question_index": 133
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following email fields is not visible to other recipients and is mainly used to hide email addresses?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2312;&#2350;&#2375;&#2354; &#2347;&#2364;&#2368;&#2354;&#2381;&#2337; &#2309;&#2344;&#2381;&#2351; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2342;&#2367;&#2326;&#2366;&#2312; &#2344;&#2361;&#2368;&#2306; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2312;&#2350;&#2375;&#2354; &#2346;&#2340;&#2375; &#2331;&#2367;&#2346;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">BCC</span><span class=\"hqt\" style=\"display:none\">BCC</span>",
      "<span class=\"eqt\">Subject</span><span class=\"hqt\" style=\"display:none\">Subject</span>",
      "<span class=\"eqt\">CC</span><span class=\"hqt\" style=\"display:none\">CC</span>",
      "<span class=\"eqt\">To</span><span class=\"hqt\" style=\"display:none\">To</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>BCC (Blind Carbon Copy): Any email address placed in this field remains invisible to the \"To\" and \"CC\" recipients.</p><p>Privacy: It is essential for sending mass emails where you want to prevent recipients from seeing each other's contact details.</p>",
    "question_index": 134
  },

  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding a switch:</p><p>1. A switch forwards data based on MAC addresses.</p><p>2. A switch broadcasts data to all connected devices by default.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2357;&#2367;&#2330; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2319;&#2325; &#2360;&#2381;&#2357;&#2367;&#2330; MAC &#2346;&#2340;&#2379;&#2306; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2337;&#2375;&#2335;&#2366; &#2309;&#2327;&#2381;&#2352;&#2375;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2319;&#2325; &#2360;&#2381;&#2357;&#2367;&#2330; &#2337;&#2367;&#2347;&#2364;&#2377;&#2354;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2349;&#2368; &#2325;&#2344;&#2375;&#2325;&#2381;&#2335;&#2375;&#2337; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360;&#2379;&#2306; &#2325;&#2379; &#2337;&#2375;&#2335;&#2366; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 (Correct): A switch is an \"intelligent\" device that learns the MAC addresses of connected devices and sends data only to the specific intended port.</p><p>Statement 2 (Incorrect): A Hub broadcasts data to everyone. A Switch uses \"Unicast\" (point-to-point) communication, which significantly reduces network traffic and prevents collisions.</p>",
    "question_index": 136
  },

    "question": "<span class=\"eqt\"><p>Which Windows Explorer feature allows users to quickly access frequently used folders and recently opened files?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2319;&#2325;&#2381;&#2360;&#2346;&#2381;&#2354;&#2379;&#2352;&#2352; &#2325;&#2368; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2309;&#2325;&#2381;&#2360;&#2352; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2347;&#2364;&#2379;&#2354;&#2381;&#2337;&#2352;&#2379;&#2306; &#2324;&#2352; &#2361;&#2366;&#2354; &#2361;&#2368; &#2350;&#2375;&#2306; &#2326;&#2379;&#2354;&#2368; &#2327;&#2312; &#2347;&#2364;&#2366;&#2311;&#2354;&#2379;&#2306; &#2340;&#2325; &#2340;&#2381;&#2357;&#2352;&#2367;&#2340; &#2346;&#2361;&#2369;&#2306;&#2330; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">This PC</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2346;&#2368;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Libraries</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">File History</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2366;&#2311;&#2354; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Quick Access</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2357;&#2352;&#2367;&#2340; &#2346;&#2361;&#2369;&#2305;&#2330;</span>"

    "question": "<span class=\"eqt\"><p>In class A network of TCP/IP,the first______ bits represent the network part.</p></span><span class=\"hqt\" style=\"display:none\"><p>TCP/IP &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; A &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306;, &#2346;&#2361;&#2354;&#2375; ______ &#2348;&#2367;&#2335;&#2381;&#2360; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2349;&#2366;&#2327; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>There are three classes of TCP/IP networks. Each class uses the 32-bit IP address space differently, providing more or fewer bits for the network part of the address. These classes are class A, class B, and class C. A class A network number uses the first eight bits of the IP address as its \"network part.\" The remaining 24 bits comprise the host part of the IP address</p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Following - Ports(List I) with Uses(List II)</p><p><table style=\"border-collapse:collapse;\"></p><p><tr></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List-I (Port)</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List-II (Use)</th></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. USB</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Audio output</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. HDMI</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Peripheral connection</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Ethernet</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Network connection</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. VGA</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Video display</td></p><p></tr></p><p></table></p><p>Choose the correct answer:</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306; - &#2346;&#2379;&#2352;&#2381;&#2335; (&#2360;&#2370;&#2330;&#2368; I) &#2313;&#2346;&#2351;&#2379;&#2327; (&#2360;&#2370;&#2330;&#2368; II) &#2325;&#2375; &#2360;&#2366;&#2341;</p><p><table style=\"border-collapse:collapse;\"><tr></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. USB</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2321;&#2337;&#2367;&#2351;&#2379; &#2310;&#2313;&#2335;&#2346;&#2369;&#2335;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. HDMI</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2346;&#2375;&#2352;&#2367;&#2347;&#2375;&#2352;&#2354; &#2325;&#2344;&#2375;&#2325;&#2381;&#2358;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2312;&#2341;&#2352;&#2344;&#2375;&#2335;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2325;&#2344;&#2375;&#2325;&#2381;&#2358;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. VGA</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2357;&#2368;&#2337;&#2367;&#2351;&#2379; &#2337;&#2367;&#2360;&#2381;&#2346;&#2381;&#2354;&#2375;</td></tr></table></p><p>&#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">A-2, B-4, C-3, D-1</span><span class=\"hqt\" style=\"display:none\">A-2, B-4, C-3, D-1</span>",
      "<span class=\"eqt\">A-1, B-2, C-4, D-3</span><span class=\"hqt\" style=\"display:none\">A-1, B-2, C-4, D-3</span>",
      "<span class=\"eqt\">A-2, B-1, C-3, D-4</span><span class=\"hqt\" style=\"display:none\">A-2, B-1, C-3, D-4</span>",
      "<span class=\"eqt\">A-3, B-4, C-2, D-1</span><span class=\"hqt\" style=\"display:none\">A-3, B-4, C-2, D-1</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A-2 (USB): Universal Serial Bus for peripherals like mice, keyboards, and printers.</p><p>B-1 (HDMI): High-Definition Multimedia Interface; transmits both digital video and high-quality audio.</p><p>C-3 (Ethernet): The standard port for wired local area networks (LAN).</p><p>D-4 (VGA): Video Graphics Array; an older analog port used strictly for video output to monitors.</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about Operating Systems:</p><p>1. The operating system acts as an interface between the user and hardware.</p><p>2. Process scheduling is a function of the operating system.</p><p>3. An operating system is required only for computers connected to the Internet.</p><p>Which of the above statements are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2324;&#2352; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2311;&#2306;&#2335;&#2352;&#2347;&#2364;&#2375;&#2360; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360; &#2358;&#2375;&#2337;&#2381;&#2351;&#2370;&#2354;&#2367;&#2306;&#2327; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2366; &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2361;&#2376;&#2404;</p><p>3. &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2375;&#2357;&#2354; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 (Correct): The OS is the layer between the hardware and the user/application software.</p><p>Statement 2 (Correct): Process Scheduling is a core kernel function that decides which program gets to use the CPU at any given millisecond.</p><p>Statement 3 (Incorrect): An OS is the \"soul\" of the machine; it is required to boot the computer and manage local files/hardware, even if the computer never connects to a network.</p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>Flash memory is a type of</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2381;&#2354;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; ____ &#2325;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">PROM</span><span class=\"hqt\" style=\"display:none\">PROM</span>",
      "<span class=\"eqt\">EPOM</span><span class=\"hqt\" style=\"display:none\">EPOM</span>",
      "<span class=\"eqt\">RAM</span><span class=\"hqt\" style=\"display:none\">RAM</span>",
      "<span class=\"eqt\">EEPROM</span><span class=\"hqt\" style=\"display:none\">EEPROM</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Flash memory is a type of electronically erasable programmable read only memory (EEPROM), but may also be a standalone memory storage device such as a USB drive. EEPROM is a type of data memory device using an electronic device to erase or write digital data. Flash memory is a distinct type of EEPROM, which is programmed and erased in large blocks.Flash memory is known as a solid state storage device, meaning there are no moving parts -- everything is electronic instead of mechanical.</p><p>Few examples of flash memory:</p><p>&bull; BIOS chip</p><p>&bull; CompactFlash (most often found in digital cameras)</p><p>&bull; SmartMedia (most often found in digital cameras)</p><p>&bull; Memory Stick (most often found in digital cameras)</p><p>&bull; PCMCIA Type I and Type II memory cards (used as solid-state disks in laptops)</p><p>&bull; Memory cards for video game consoles</p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following common shortcut is used to insert hyperlinks in MS Word?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2357;&#2352;&#2381;&#2337; &#2350;&#2375;&#2306; &#2361;&#2366;&#2311;&#2346;&#2352;&#2354;&#2367;&#2306;&#2325; &#2337;&#2366;&#2354;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2358;&#2377;&#2352;&#2381;&#2335;&#2325;&#2335; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    ],
    "correct_option_id": 2,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ctrl+ Z</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Undo</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ctrl+ X</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Print</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Ctrl+ K</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Insert Hyperlink</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ctrl+ P</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Print</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ctrl+ A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Select All</td></tr></table>",
    "question_index": 142
  },
  {
    "question": "<span class=\"eqt\"><p>The RAM that is related to graphic card is called __</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2381;&#2352;&#2366;&#2347;&#2364;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2337; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; RAM &#2325;&#2379; __________ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">FRAM</span><span class=\"hqt\" style=\"display:none\">FRAM</span>",
      "<span class=\"eqt\">SRAM</span><span class=\"hqt\" style=\"display:none\">SRAM</span>",
      "<span class=\"eqt\">PRAM</span><span class=\"hqt\" style=\"display:none\">PRAM</span>",
      "<span class=\"eqt\">VRAM</span><span class=\"hqt\" style=\"display:none\">VRAM</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>VRAM</b> is an abbreviation for video random access memory and it is used to store graphics data. VRAM is generally located on the video card of the PC. The more VRAM a computer has, the more 2D and 3D images it can display at one time.</p>",
    "question_index": 143
  },
  {
    "question": "<span class=\"eqt\"><p>Consider a formula =B4+C4 is typed in cell C4. If cell C4 is copied and pasted into cell E6, what will be the formula in cell E6?</p></span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2344; &#2354;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2360;&#2375;&#2354; C4 &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2370;&#2340;&#2381;&#2352; =B4+C4 &#2335;&#2366;&#2311;&#2346; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2375;&#2354; C4 &#2325;&#2379; &#2325;&#2377;&#2346;&#2368; &#2325;&#2352;&#2325;&#2375; &#2360;&#2375;&#2354; E6 &#2350;&#2375;&#2306; &#2346;&#2375;&#2360;&#2381;&#2335; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2375;&#2354; E6 &#2350;&#2375;&#2306; &#2360;&#2370;&#2340;&#2381;&#2352; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">=B4+C4</span><span class=\"hqt\" style=\"display:none\">=B4+C4</span>",
      "<span class=\"eqt\">=C5+D5</span><span class=\"hqt\" style=\"display:none\">=C5+D5</span>",
      "<span class=\"eqt\">=D6+E6</span><span class=\"hqt\" style=\"display:none\">=D6+E6</span>",
      "<span class=\"eqt\">=E4+F4</span><span class=\"hqt\" style=\"display:none\">=E4+F4</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The original formula in cell C4 is:</p><p>=B4 + C4</p><p>When this formula is copied from C4 to E6, Excel adjusts relative references based on the shift:</p><p>From C4 to E6 &#8594; 2 columns right and 2 rows down</p><p>Now apply the same shift to each cell reference:</p><p>B4 &#8594; D6</p><p>C4 &#8594; E6</p><p>So, the formula in cell E6 becomes:</p><p>=D6 + E6</p>",
    "question_index": 144
  },
  {

  {
    "question": "<span class=\"eqt\"><p>Barcode reader can connect to computer through which type of port?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2366;&#2352;&#2325;&#2379;&#2337; &#2352;&#2368;&#2337;&#2352; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2346;&#2379;&#2352;&#2381;&#2335; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364; (&#2325;&#2344;&#2375;&#2325;&#2381;&#2335;) &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Optical Port</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2346;&#2381;&#2335;&#2367;&#2325;&#2354; &#2346;&#2379;&#2352;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Parallel Port</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2376;&#2352;&#2375;&#2354;&#2354; &#2346;&#2379;&#2352;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Serial Port</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2352;&#2367;&#2351;&#2354; &#2346;&#2379;&#2352;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Key Port</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2368; (key) &#2346;&#2379;&#2352;&#2381;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Barcode reader is an input device used for reading printed barcodes (Universal Product Code) available on products to be sold. A barcode reader emits a beam of light which reflects off the barcode image. A light sensitive detector in the barcode reader identifies the barcode image by recognising special bars at both the ends of the image.</p><p>Serial Port is that which transmits one bit of data through a single wire. Since, data is transmitted serially as a single bit. It provides slow speed data transmission. It is used to connect external modems, plotters, barcode readers, etc.</p>",
    "question_index": 147
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following cell reference in MS Excel does not change while copying or moving the formula to a different location in the worksheet?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2319;&#2325;&#2381;&#2360;&#2375;&#2354; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;- &#2360;&#2366; &#2360;&#2375;&#2354; &#2352;&#2375;&#2347;&#2352;&#2375;&#2306;&#2360; &#2357;&#2352;&#2381;&#2325;&#2358;&#2368;&#2335; &#2350;&#2375;&#2306; &#2398;&#2377;&#2352;&#2381;&#2350;&#2370;&#2354;&#2366; &#2325;&#2379; &#2325;&#2377;&#2346;&#2368; &#2325;&#2352;&#2344;&#2375; &#2351;&#2366; &#2325;&#2367;&#2360;&#2368; &#2349;&#2367;&#2344;&#2381;&#2344; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2344;&#2361;&#2368;&#2306; &#2348;&#2342;&#2354;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Relative Cell Referencing</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2354;&#2375;&#2335;&#2367;&#2357; &#2360;&#2375;&#2354; &#2352;&#2375;&#2347;&#2352;&#2375;&#2306;&#2360;</span>",
      "<span class=\"eqt\">Absolute Cell Referencing</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2348;&#2381;&#2360;&#2379;&#2354;&#2381;&#2351;&#2370;&#2335; &#2360;&#2375;&#2354; &#2352;&#2375;&#2347;&#2352;&#2375;&#2306;&#2360;</span>",
      "<span class=\"eqt\">Mixed Cell Referencing</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2325;&#2381;&#2360;&#2381;&#2337; &#2360;&#2375;&#2354; &#2352;&#2375;&#2347;&#2352;&#2375;&#2306;&#2360;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A relative cell reference change when copying or moving the formula or cell value to a different location in the worksheet. An absolute cell references does not change while copying or moving the formula to a different location in the worksheet. The cell references are fixed. Mixed cell reference allows fixing either the column name or the row number in a cell reference.</p><p>Therefore, (b) is the correct option.</p>",
    "question_index": 148
  },
